translation:
  language: es
  text: Efraín está oprimido, aplastado en juicio, porque se propuso andar tras un precepto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «tras un mandamiento» o «tras un precepto humano». El hebreo צָו es difícil y se ha entendido de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשׁוּק
  english_pob_choice: oppressed
  chosen_spanish: oprimido
  alternatives_spanish:
  - afligido
  - explotado
  lexicon: HALOT
  rationale: El participio pasivo de עשק expresa a alguien sometido a opresión o abuso. «Oprimido» es la equivalencia española más natural y conserva la fuerza profética del término.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Israel
  - el reino del norte
  lexicon: nombre propio bíblico
  rationale: Se conserva el nombre propio como en el texto fuente. En Oseas puede funcionar representativamente por el reino del norte, pero esa identificación no se explicita en el texto principal.
- source_word: רְצוּץ
  english_pob_choice: crushed
  chosen_spanish: aplastado
  alternatives_spanish:
  - quebrado
  - machacado
  lexicon: HALOT
  rationale: El participio pasivo comunica una imagen de violencia y devastación. «Aplastado» reproduce bien esa fuerza en español y combina con «oprimido» sin perder la metáfora.
- source_word: מִשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en juicio
  alternatives_spanish:
  - por juicio
  - en sentencia
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט puede referirse a juicio judicial o sentencia. «En juicio» preserva la concisión hebrea y deja abierta la relación entre acto judicial y veredicto.
- source_word: הוֹאִיל
  english_pob_choice: was determined
  chosen_spanish: se propuso
  alternatives_spanish:
  - estuvo dispuesto
  - determinó
  lexicon: HALOT
  rationale: El verbo expresa voluntad resuelta. «Se propuso» comunica decisión intencional en español y mantiene el matiz de determinación del hebreo.
- source_word: הָלַךְ אַחֲרֵי
  english_pob_choice: to walk after
  chosen_spanish: andar tras
  alternatives_spanish:
  - seguir
  - ir detrás de
  lexicon: idiomático hebreo
  rationale: La locución verbal conserva la imagen de conducta o seguimiento. «Andar tras» es una forma natural en español y mantiene mejor el giro profético que «seguir» a secas.
- source_word: צָו
  english_pob_choice: a command
  chosen_spanish: un mandamiento
  alternatives_spanish:
  - un mandato
  - una orden
  - una prescripción humana
  lexicon: HALOT
  rationale: El término es difícil y admite varias lecturas. Dado el revisado del audit trail, se mantiene la lectura de un objeto normativo; «mandamiento» es una opción española clara y digna, sin cerrar la ambigüedad interpretativa sobre si se trata de un precepto humano o de otra clase.
theological_decisions:
- issue: Sentido de צָו en Oseas 5:11
  english_pob_reading: A deliberate pursuit of 'a command' rather than the pejorative 'filth'; the term remains contested.
  chosen_spanish_reading: Una referencia a un mandamiento/precepto perseguido voluntariamente, sin resolver del todo si es humano o desviado.
  alternative_spanish_readings:
  - la filth/lo vil
  - un precepto humano
  - una orden
  rationale: El historial de revisión del POB muestra una decisión explícita de evitar una traducción depreciativa fija y mantener una lectura más cercana a «command». En español se conserva esa orientación con «mandamiento», pero se deja abierta la tensión interpretativa mediante nota.
  doctrine_reference: Preservar la tensión interpretativa documentada; no borrar alternativas textuales o teológicas cuando el hebreo las admite.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail, que reemplazó una lectura pejorativa por «a command». La redacción mantiene la estructura breve del hebreo y conserva la ambigüedad de צָו sin importar un sentido no documentado.
  spanish_consistency_notes:
  - Se usa «Efraín» como nombre propio transliterado, no una paráfrasis interpretativa.
  - «Oprimido» y «aplastado» mantienen el paralelismo de dos participios pasivos.
  - «En juicio» conserva la tersura hebrea y no fuerza una explicación exegética en el cuerpo del texto.
  - «Mandamiento» refleja la elección revisada del POB y evita resolver de antemano la discusión léxica de צָו.
  - Se prefirió una equivalencia formal-optimal con español natural, no una traducción mecánica palabra por palabra.
