translation:
  language: es
  text: 'De los hijos de Ooma: Zeitías[a], Zabadías, Edos, Ouel[b] y Banaías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista griega conserva nombres individuales; el paralelo masorético aproximado (Esdras 10) termina esta sección con un resumen en lugar de reproducir la misma enumeración.
    reason: cross_reference
  - marker: b
    text: El griego presenta una lista de nombres personales. «Los hijos de Ooma» explicita en español el sentido de grupo familiar implícito en la construcción «de Ooma».
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: From
  chosen_spanish: De
  alternatives_spanish:
  - Desde
  - Entre
  lexicon: LSJ
  rationale: En esta lista genealógica, ἐκ introduce el subconjunto perteneciente a la casa o clan nombrado; en español, «De» reproduce naturalmente esa relación de procedencia/pertenencia sin sonar artificial.
- source_word: τῶν Ὀομά
  english_pob_choice: the sons of Ooma
  chosen_spanish: los hijos de Ooma
  alternatives_spanish:
  - la familia de Ooma
  - la casa de Ooma
  - los descendientes de Ooma
  lexicon: LSJ
  rationale: La construcción griega con artículo y nombre propio funciona de manera elíptica para indicar el grupo familiar asociado a Ooma. «Los hijos de Ooma» conserva esa fuerza genealógica y sigue el sentido auditado del inglés, sin forzar una paráfrasis excesiva.
- source_word: Ζειτιάς
  english_pob_choice: Zeitias
  chosen_spanish: Zeitías
  alternatives_spanish:
  - Zetías
  - Zetias
  lexicon: transliteration from Greek
  rationale: Se translitera directamente la forma griega, manteniendo la secuencia vocálica y adaptando la acentuación al español para facilitar la lectura.
- source_word: Ζαβαδαίας
  english_pob_choice: Zabadias
  chosen_spanish: Zabadías
  alternatives_spanish:
  - Zabadaías
  - Zebadías
  lexicon: transliteration from Greek
  rationale: Se sigue la forma griega transmitida por Swete y no se normaliza al nombre hebreo más familiar; así se preserva la anclaje al testimonio griego que sirve de base.
- source_word: Ἠδός
  english_pob_choice: Edos
  chosen_spanish: Edos
  alternatives_spanish:
  - Ēdos
  - Idos
  lexicon: transliteration from Greek
  rationale: La transliteración simple «Edos» conserva la forma breve y legible en español sin introducir diacríticos innecesarios.
- source_word: Οὐὴλ
  english_pob_choice: Ouel
  chosen_spanish: Ouel
  alternatives_spanish:
  - Uel
  - Ouél
  lexicon: transliteration from Greek
  rationale: «Ouel» refleja de manera conservadora el inicio Οὐ- del griego y resulta pronunciable en español.
- source_word: Βαναίας
  english_pob_choice: Banaias
  chosen_spanish: Banaias
  alternatives_spanish:
  - Benaías
  - Banaías
  lexicon: transliteration from Greek
  rationale: Se mantiene la transliteración griega en vez de armonizarla con la forma hebrea tradicional, para respetar el texto fuente inmediato.
translation_notes:
  revision_awareness: El texto griego de Swete es el ancla principal. El paralelo hebreo/masorético se usa solo como control de sentido para nombres propios y para notar que aquí la enumeración griega no coincide con un resumen equivalente en Esdras 10. La versión inglesa auditada no requirió revisión adicional.
  spanish_consistency_notes:
  - Se mantiene «Ooma» como forma base del nombre del grupo, coherente con el inglés POB y con la transliteración directa del griego.
  - Se prefirió «hijos» para reflejar el valor genealógico del genitivo con artículo, siguiendo la decisión auditada en inglés.
  - Los nombres propios se conservaron como transliteraciones griegas estables, sin sustituirlos por formas hebreas normalizadas.
