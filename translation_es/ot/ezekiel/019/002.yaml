  text: and say[a], ‘What was your mother? A lioness. Among lions she lay down[b]; in the midst of young lions she reared her cubs.’
  footnotes:
  - marker: a
    text: Or 'Among lionesses she lay down.' The Hebrew plural can be understood more generally as 'lions,' but some translators render it by sense to match the feminine imagery of 'lioness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she raised' or 'she made many' her cubs. The Hebrew verb can carry the idea of increase, but in this context it likely refers to rearing offspring.
    reason: lexical_alternative
