  text: וַ/יָּבֹ֜אוּ עַד גֹּ֣רֶן הָאָטָ֗ד אֲשֶׁר֙ בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֔ן וַ/יִּ֨סְפְּדוּ שָׁ֔ם מִסְפֵּ֛ד גָּד֥וֹל וְ/כָבֵ֖ד מְאֹ֑ד וַ/יַּ֧עַשׂ לְ/אָבִ֛י/ו אֵ֖בֶל שִׁבְעַ֥ת יָמִֽים־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/010.yaml
  text: When they came to the threshing floor of Atad[a], which is beyond the Jordan, they lamented there with a very great and grievous lamentation[e][d][c][b], and he observed seven days of mourning for his father.
  footnotes:
  - marker: a
    text: Atad may reflect a name meaning 'bramble' or 'thornbush,' but here it functions as a place name.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan' / 'on the other side of the Jordan.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'a great and very heavy lamentation,' an idiom expressing intense mourning.
    reason: cultural_note
  - marker: d
    text: The Hebrew verb is singular ('he observed mourning'), likely referring specifically to Joseph; some translations smooth it to 'they.'
    reason: alternative_reading
  - marker: e
    text: Or 'great and very heavy'.
    reason: previous_rendering
