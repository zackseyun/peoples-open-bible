theological_decisions:
- issue: Divine title δέσποτα
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The Greek uses δέσποτα rather than κύριος. To preserve lexical distinction and avoid flattening titles, 'Master' is preferred here, though 'Sovereign' is also possible in elevated prayer language.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; consistency of key terms, or documented exception.'
- issue: Historical allusion to Sennacherib's attack on Jerusalem
  chosen_reading: Translate the allusion directly without importing details from 2 Kings/Isaiah
  alternative_readings:
  - Expanded rendering that specifies Jerusalem's deliverance
  rationale: The verse alludes to a known biblical event, but the translation should not add narrative details absent from the Greek. The prayer emphasizes God's public display of power among the nations.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not make; original-language primacy over translation tradition.'
