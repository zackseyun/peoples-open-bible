review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido del hebreo: secuencia narrativa («Entonces»), sujeto («Josué»), destinatario («al pueblo»), mandato reflexivo de קדשׁ, causalidad de כִּי, temporalidad («mañana»), nombre divino «Yahvé», ubicación comunitaria de בְּקִרְבְּכֶם y amplitud semántica de נִפְלָאוֹת. Sin embargo, las notas al pie están ancladas a palabras equivocadas: [a] aparece en «pueblo» pero explica «entre ustedes / en medio de ustedes»; [b] aparece en «Santifíquense» pero el English POB usa esa nota para la alternativa de «wonders», no para el imperativo.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. «Santifíquense» es defendible, pero «Conságrense» se alinea mejor con el English POB auditado («Consecrate yourselves») y evita que «santificar» suene más transformativo que preparatorio en español contemporáneo. También conviene reubicar las notas para que correspondan al segmento relevante y conservar la alternativa sobre «maravillas».
  glossary_alignment: 'Cumple bien con la terminología del proyecto: יְהוָה → «Yahvé»; nombres propios en forma bíblica española («Josué»); נִפְלָאוֹת → «maravillas». La única desalineación relevante con la auditoría inglesa es que הִתְקַדָּשׁוּ quedó como «Santifíquense» en vez del equivalente preferido de «Consecrate yourselves», y la nota de alternativa sobre «wonders» se perdió.'
  issues:
