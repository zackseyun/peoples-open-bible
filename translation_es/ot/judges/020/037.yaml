translation:
  language: es
  text: Entonces los hombres que estaban en emboscada se apresuraron y arremetieron contra Gabaa, y la emboscada avanzó[a] y golpeó a toda la ciudad a filo de la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'la emboscada se extendió' o 'tiró hacia adelante'; el verbo puede sugerir que la fuerza emboscada se proyectó hacia adelante o que siguió avanzando dentro de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹרֵב
  english_pob_choice: the men in ambush
  chosen_spanish: los hombres de la emboscada
  alternatives_spanish:
  - la emboscada
  - los emboscadores
  - los que estaban al acecho
  lexicon: HALOT
  rationale: El hebreo tiene forma singular, pero en el contexto militar se refiere de manera colectiva a la fuerza emboscada. 'Los hombres de la emboscada' conserva ese sentido personal y colectivo, y evita reducirlo a una abstracción impersonal.
- source_word: הֵחִישׁוּ
  english_pob_choice: quickly rushed
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - se dieron prisa
  - corrieron con rapidez
  lexicon: HALOT
  rationale: El verbo expresa prisa y movimiento urgente. En español, 'se apresuraron' comunica bien esa rapidez sin añadir matices ajenos.
- source_word: וַיִּפְשְׁטוּ אֶל
  english_pob_choice: rushed against
  chosen_spanish: arremetieron contra
  alternatives_spanish:
  - avanzaron contra
  - se lanzaron contra
  - se desplegaron contra
  lexicon: HALOT
  rationale: En este contexto bélico, la idea es una carga o ataque directo contra la ciudad. 'Arremetieron contra' expresa con naturalidad el movimiento agresivo que el inglés POB interpretó como assault movement toward/against.
- source_word: הַגִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Gabaa
  alternatives_spanish:
  - Gueba
  - Gibea
  lexicon: nombre propio
  rationale: Nombre propio de lugar; se translitera de forma reconocible en español bíblico. Se conserva la referencia geográfica sin paraphrasear.
- source_word: וַיִּמְשֹׁךְ
  english_pob_choice: advanced
  chosen_spanish: avanzó
  alternatives_spanish:
  - se extendió
  - se hizo adelante
  - se alargó
  lexicon: HALOT
  rationale: El verbo literalmente puede sugerir 'tiró/dibujó', pero aquí el contexto militar apunta a un desplazamiento hacia adelante. 'Avanzó' transmite la probable fuerza narrativa sin perder el carácter comprimido del hebreo.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - mató
  - hirió de muerte
  lexicon: HALOT
  rationale: '''Hirió'' mantiene la amplitud semántica de ''golpear/derrotar'', y deja que el complemento siguiente precise el modo letal. Evita cerrar prematuramente el sentido solo en ''mató''.'
- source_word: כָּל הָעִיר
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - todo el pueblo
  lexicon: HALOT
  rationale: El hebreo dice 'todo la ciudad'; en español, 'toda la ciudad' conserva la totalidad idiomática y puede abarcar el conjunto de la ciudad sin forzar una explicación adicional.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - por el filo de espada
  - a la boca de la espada
  lexicon: HALOT
  rationale: Es un modismo hebreo muy conocido que literalmente puede leerse 'a la boca de la espada'. 'A filo de espada' es una equivalencia española natural y fiel al sentido de muerte violenta con espada, preservando la imagen convencional sin volverla extraña.
translation_notes:
  revision_awareness: 'La revisión inglesa unió las dos cláusulas en una sola oración para mayor fluidez; el español sigue esa misma integración sintáctica y conserva los elementos clave: prisa, asalto contra Gabaa, avance de la emboscada y golpe a toda la ciudad con espada.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal cuando el texto lo requiera; en este versículo no aparece.
  - Se mantiene 'Gabaa' como transliteración breve y tradicionalmente comprensible en español.
  - Se preserva el paralelismo narrativo del hebreo con una sola oración coordinada, sin añadir información no presente en el texto.
