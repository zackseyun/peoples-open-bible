translation:
  language: es
  text: '¡Ay de los que profundizan[b] para ocultar consejo de Yahvé[a], cuyas obras están en tinieblas, y dicen: «¿Quién nos ve, y quién nos conoce?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de Yahvé»; es decir, intentan ocultar sus planes de él.'
    reason: lexical_alternative
  - marker: b
    text: 'Otra posible lectura: «los que cavan hondo para ocultar un plan de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay, de
  lexicon: HALOT
  rationale: Conserva el tono profético de denuncia/jucio. En español, «¡Ay de» comunica mejor la fórmula de lamento-oráculo que un simple «Woe» transliterado o un calco menos natural.
- source_word: הַמַּעֲמִיקִים
  english_pob_choice: those who go deep
  chosen_spanish: los que se adentran
  alternatives_spanish:
  - los que van muy adentro
  - los que profundizan
  lexicon: HALOT
  rationale: La imagen hebrea es de ‘profundizar’ con sentido figurado de entrar más y más en el ocultamiento. «Se adentran» mantiene la imagen sin sonar torpe en español.
- source_word: מֵיהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - lejos de Yahvé
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente ‘de Yahvé’, es decir, con la intención de ocultar el plan de él. Se mantiene el nombre divino según la convención española del proyecto.
- source_word: לַסְתִּר
  english_pob_choice: to hide
  chosen_spanish: para ocultar
  alternatives_spanish:
  - para esconder
  - para encubrir
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Ocultar» es natural y fiel al propósito de esconder el consejo.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - su plan
  - su propósito
  lexicon: HALOT
  rationale: «Consejo» reproduce el campo semántico de deliberación/plan. En este contexto, el posesivo hace explícita la idea de su propio designio secreto.
- source_word: בְמַחְשָׁךְ
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: HALOT
  rationale: «Tinieblas» preserva el valor bíblico de oscuridad con carga moral y figurada. Es más solemne que «oscuridad» y corresponde bien al tono profético.
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  lexicon: HALOT
  rationale: «Obras» es una equivalencia bíblica natural en español y conserva la referencia a lo que hacen, sin perder la fuerza moral del término.
- source_word: מִי רֹאֵנוּ
  english_pob_choice: Who sees us
  chosen_spanish: ¿Quién nos ve?
  alternatives_spanish:
  - ¿Quién puede vernos?
  - ¿Quién nos mira?
  lexicon: HALOT
  rationale: Reproduce de forma directa la pregunta hebrea y su desafío implícito. La forma simple es más fiel que añadir modalización.
- source_word: וּמִי יוֹדְעֵנוּ
  english_pob_choice: and who knows us
  chosen_spanish: ¿y quién nos conoce?
  alternatives_spanish:
  - ¿y quién sabe de nosotros?
  - ¿y quién nos sabe?
  lexicon: HALOT
  rationale: «Conoce» preserva la brevedad del hebreo y evita explicitar de más el sentido. En contexto, implica desconocimiento de sus actos por parte de Dios.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El pasaje usa el Tetragrámaton. La política española del proyecto prescribe «Yahvé» en el texto principal para mantener visible el nombre divino y su fuerza de pacto, en continuidad con el trabajo auditado del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB y se ajustó el nombre divino al estándar español del proyecto («Yahvé» en lugar de «the LORD»). Se mantuvo la ambigüedad de la imagen hebrea de ‘profundizar’/‘adentrarse’ y la posibilidad alternativa de leer el segundo hemistiquio como una descripción del ocultamiento de un plan.
  spanish_consistency_notes:
  - Se mantuvo el registro profético solemne con signos de exclamación iniciales.
  - «Tinieblas» se usó por coherencia con el lenguaje bíblico de oscuridad moral/secrecía.
  - Se conservaron preguntas breves y directas para reflejar la ironía desafiante del hebreo.
