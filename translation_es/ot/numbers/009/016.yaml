revisions:
- from: 'Así era continuamente: la nube lo cubría[a], y la apariencia de fuego por la noche.'
  to: 'Así sucedía continuamente: la nube lo cubría[a], y la apariencia de fuego de noche.'
  rationale: Se ajusta la primera cláusula para un español más natural que exprese habitualidad pasada sin rigidez («sucedía continuamente»), y se simplifica la expresión temporal a «de noche», que refleja bien el hebreo. Se mantiene intacto el sentido fuente, el referente contextual de «lo», y la cautela semántica de «apariencia de fuego».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:32Z'
