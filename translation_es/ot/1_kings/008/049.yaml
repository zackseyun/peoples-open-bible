translation:
  language: es
  text: entonces escucha en el cielo[a], desde el lugar de tu morada, su oración y su súplica, y defiende su causa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu morada». El hebreo enfatiza un lugar de morada establecido o fijo.
    reason: lexical_alternative
  - marker: b
    text: O «hazles justicia» o «vindica su causa». El hebreo dice literalmente «haz su justicia/juicio», un modismo para actuar a favor de su causa legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: then hear
  chosen_spanish: entonces escucha
  alternatives_spanish:
  - y escucha
  - escucha entonces
  lexicon: HALOT
  rationale: En esta secuencia peticional, el perfecto con prefijo funciona como ruego dirigido a Dios; en español, «escucha» expresa mejor la súplica. «Entonces» conserva el flujo lógico de las cláusulas previas sin volver la frase dura o mecánica.
- source_word: הַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - desde el cielo
  - en los cielos
  lexicon: HALOT
  rationale: El hebreo designa la esfera celestial de Dios. «En el cielo» es natural en español y mantiene la idea del ámbito divino sin forzar «desde», que no está explícito en el texto.
- source_word: מְכוֹן שִׁבְתְּךָ
  english_pob_choice: the place of your dwelling
  chosen_spanish: el lugar de tu morada
  alternatives_spanish:
  - el lugar estable de tu morada
  - tu morada
  lexicon: HALOT
  rationale: מְכוֹן señala un lugar establecido o fijado; «lugar de tu morada» preserva la estructura y la idea del domicilio divino. Evita una paráfrasis excesiva, aunque reconoce la fuerza de fijación que el inglés POB anotó.
- source_word: תְּפִלָּתָם
  english_pob_choice: their prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  - su oración petitoria
  lexicon: HALOT
  rationale: תפילה es el término común para oración. «Su oración» es la opción más directa y fiel en español.
- source_word: תְּחִנָּתָם
  english_pob_choice: their plea
  chosen_spanish: su súplica
  alternatives_spanish:
  - su ruego
  - su petición ferviente
  lexicon: HALOT
  rationale: תחינה añade el matiz de ruego intenso o apelación por misericordia. «Súplica» conserva esa intensidad y distingue bien este término del más general «oración».
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  english_pob_choice: and uphold their cause
  chosen_spanish: y defiende su causa
  alternatives_spanish:
  - y hazles justicia
  - y vindica su causa
  - y atiende su causa
  lexicon: HALOT
  rationale: 'El hebreo usa un modismo jurídico: «hacer su juicio/justicia». «Defiende su causa» comunica bien la idea forense y de intervención a favor de ellos en español, sin sonar literalista ni perder la tensión jurídica documentada por el POB inglés.'
theological_decisions:
- issue: Lenguaje del cielo como morada divina
  english_pob_reading: Retain the language of God hearing 'in heaven' from 'the place of your dwelling' without flattening it into abstraction.
  chosen_spanish_reading: Conservar que Dios escucha «en el cielo», en el lugar de su morada, sin convertirlo en una afirmación de confinamiento espacial.
  alternative_spanish_readings:
  - desde el cielo, el lugar de tu morada
  - en los cielos, tu morada
  rationale: El verso pertenece al lenguaje de la oración del templo y usa imagen espacial real. La traducción mantiene esa imaginería bíblica sin introducir una doctrina ajena de localización estricta de Dios.
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto sin añadir afirmaciones doctrinales no expresadas por él.'
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del POB inglés, que prefirió «the place of your dwelling» frente a una formulación más marcada como «the settled place of your dwelling». En español se refleja ese equilibrio con «el lugar de tu morada», manteniendo la suavidad y la proximidad al hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada del nombre divino solo cuando aparezca explícitamente; en este versículo no aparece.
  - «oración» y «súplica» se distinguieron para preservar la diferencia semántica del hebreo.
  - «defiende su causa» evita la literalidad de «haz su justicia» pero mantiene el campo judicial documentado por el POB.
