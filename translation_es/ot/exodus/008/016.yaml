translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: “Levántate muy temprano por la mañana y preséntate delante de Faraón. Mira, él sale al agua[a], y le dirás: ‘Así dice Yahvé: Deja ir a mi pueblo, para que me sirvan.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “al Nilo”; el hebreo dice más literalmente “al agua”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio del pacto, no un título. En español del proyecto, 'Yahvé' conserva ese nombre divino de manera transparente y auditable, siguiendo la decisión inglesa de no sustituirlo por un título.
- source_word: הַשְׁכֵּם בַּבֹּקֶר
  english_pob_choice: Rise early in the morning
  chosen_spanish: Levántate muy temprano por la mañana
  alternatives_spanish:
  - Levántate temprano por la mañana
  - Preséntate temprano por la mañana
  lexicon: HALOT
  rationale: La expresión es idiomática de acción temprana. 'Levántate muy temprano por la mañana' mantiene el imperativo y la naturalidad del español sin perder el matiz de anticipación.
- source_word: וְהִתְיַצֵּב לִפְנֵי
  english_pob_choice: and station yourself before
  chosen_spanish: y preséntate delante de
  alternatives_spanish:
  - y ponte delante de
  - y ponte en pie delante de
  lexicon: HALOT
  rationale: El hitpael de יצב implica colocarse deliberadamente en posición firme. 'Preséntate delante de' conserva el gesto intencional y confrontativo de manera más natural en español que un calco como 'estaciónate'.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: הִנֵּה introduce una atención inmediata. 'Mira' es más natural en español contemporáneo; mantiene el llamado de atención sin cargar con arcaísmo.
- source_word: הַמָּיְמָה
  english_pob_choice: to the water
  chosen_spanish: hacia el agua
  alternatives_spanish:
  - hacia el agua
  - al agua
  - hacia el Nilo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'al agua'. Dado que el POB inglés mantuvo esa literalidad y añadió en nota la posible referencia al Nilo, el texto español conserva 'agua' sin especificar más allá de lo que el hebreo explicita.
- source_word: שַׁלַּח עַמִּי
  english_pob_choice: Let my people go
  chosen_spanish: Deja ir a mi pueblo
  alternatives_spanish:
  - Deja ir a mi pueblo
  - Suelta a mi pueblo
  - Libera a mi pueblo
  lexicon: HALOT
  rationale: El imperativo piel de שלח exige una orden de liberación. 'Deja ir a mi pueblo' reproduce la fuerza idiomática clásica sin perder la base semántica de 'soltar/enviar fuera'.
- source_word: וְיַעַבְדֻנִי
  english_pob_choice: so that they may serve me
  chosen_spanish: para que me sirva
  alternatives_spanish:
  - para que me sirva
  - para que me sirvan
  - y me sirvan
  lexicon: HALOT
  rationale: El verbo עבד expresa 'servir'. En español, la concordancia natural con 'mi pueblo' puede oscilar entre singular colectivo y plural. Se eligió el singular colectivo 'me sirva' para mantener fluidez, dejando abierta la lectura colectiva del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión doctrinal del POB es transparentar el Tetragrama. En español, 'Yahvé' conserva el nombre propio divino y evita la sustitución por un título; también se alinea con la política del proyecto de no enmascarar el nombre revelado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor colectivo de 'mi pueblo' con el resultado 'me sirva'
  english_pob_reading: so that they may serve me
  chosen_spanish_reading: para que me sirva
  alternative_spanish_readings:
  - para que me sirvan
  - para que me sirva(n)
  rationale: El hebreo usa una forma plural al final, pero el antecedente 'mi pueblo' puede funcionar como colectivo. El español admite el singular colectivo; se usa por naturalidad y se documenta la tensión para no ocultar la referencia plural subyacente.
  doctrine_reference: Gramática de concordancia y referente colectivo en hebreo bíblico
translation_notes:
  revision_awareness: La redacción inglesa más reciente sustituyó 'Look' por 'Behold' para reflejar mejor הִנֵּה y mantener un registro más formal. En español se optó por 'Mira', que conserva la función discursiva de atención inmediata con un registro digno y natural; el resto del versículo sigue de cerca la lectura estable del audit trail inglés y del hebreo consonántico masorético.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - '''Mi pueblo'' se conserva como colectivo para reflejar עַמִּי; la concordancia verbal en la cláusula final se documenta en nota.'
  - Se evitó introducir 'Nilo' en el texto principal porque el hebreo dice literalmente 'el agua'; la especificación geográfica queda implícita y no sobretraduce el original.
