translation:
  language: es
  text: Entonces el faraón dio órdenes a unos hombres[a] respecto de él[b], y lo despidieron con su esposa y con todo lo que le pertenecía[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «hombres»; probablemente se refiere a agentes o asistentes del faraón, pero su función exacta no se especifica.
    reason: cultural_note
  - marker: b
    text: 'O también: «acerca de él».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todo lo que tenía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: gave ... orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - dio instrucciones
  lexicon: HALOT
  rationale: צוה expresa la acción de ordenar o mandar. «Dio órdenes» conserva el valor causativo y suena natural en español sin debilitar la fuerza del verbo.
- source_word: עָלָיו
  english_pob_choice: concerning him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - respecto de él
  lexicon: HALOT
  rationale: La preposición על con צוה puede indicar instrucciones referentes a alguien. «Acerca de él» mantiene la relación de referencia sin introducir una interpretación más específica de la necesaria.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: órdenes[a]
  alternatives_spanish:
  - hombres
  - personas
  - servidores
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hombres», pero en español no es natural repetir el sustantivo de manera rígida dentro de esta cláusula. La nota a explica que el texto hebreo menciona «hombres» y que el contexto probablemente alude a agentes o asistentes del faraón.
- source_word: וַיְשַׁלְּחוּ
  english_pob_choice: they sent ... away
  chosen_spanish: lo despidieron
  alternatives_spanish:
  - lo enviaron lejos
  - lo mandaron fuera
  lexicon: HALOT
  rationale: שלח aquí tiene el sentido de expulsar o despedir. «Lo despidieron» comunica bien la idea de hacerlos salir, aunque también admite la matización de envío/expulsión del contexto.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre directo se traduce de forma normal como «lo» en español.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: En este contexto marital, «su esposa» es la equivalencia más clara y digna en español contemporáneo.
- source_word: כָּל אֲשֶׁר לֽוֹ
  english_pob_choice: all that belonged to him
  chosen_spanish: todo lo que tenía[c]
  alternatives_spanish:
  - todo lo que le pertenecía
  - todo lo que era suyo
  lexicon: HALOT
  rationale: La frase hebrea expresa posesión amplia. «Todo lo que tenía» reproduce de forma natural la amplitud posesiva; la nota c conserva la alternativa más literal «todo lo que tenía» frente a «todo lo que era suyo».
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: El título se adapta a la ortografía y mayúscula usuales en español bíblico, manteniendo el referente histórico sin necesidad de transliteración.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando todas las notas al texto español mediante marcadores presentes en el versículo; además, se evitó crear notas sin ancla y se ajustó la redacción para mantener el sentido del hebreo y del audit trail en español natural.
  spanish_consistency_notes:
  - Se mantuvo «faraón» en minúscula por tratarse de un título usado como nombre común en contexto narrativo.
  - «Despidieron» conserva el valor de enviar fuera/dar por concluida la presencia de Abram y su casa, sin introducir detalles no presentes en el hebreo.
  - No se tradujo mecánicamente «hombres» en el cuerpo para evitar una construcción poco natural; la nota documenta el dato hebreo explícito.
