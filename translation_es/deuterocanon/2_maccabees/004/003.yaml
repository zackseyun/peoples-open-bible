translation:
  language: es
  text: Pero la hostilidad avanzaba[a] tanto, que incluso se cometían asesinatos por medio de uno de los aprobados por Simón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Avanzaba» conserva la imagen de progreso o empeoramiento del conflicto que está presente en el participio griego.
    reason: lexical_alternative
  - marker: b
    text: 'El griego deja indefinida a la persona: no identifica cuál de ellos era, sino que subraya que pertenecía al círculo aprobado por Simón. También puede entenderse: «por medio de cierto uno de los aprobados por Simón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχθρας
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - enemistad
  - odio
  lexicon: LSJ
  rationale: ἔχθρα expresa oposición hostil o enemistad. «Hostilidad» conserva bien la idea de conflicto creciente y suena natural en español moderno sin intensificar innecesariamente a «odio».
- source_word: ἐπὶ τοσοῦτον προβαινούσης
  english_pob_choice: advanced so far
  chosen_spanish: avanzaba tanto
  alternatives_spanish:
  - había avanzado hasta tal punto
  - progresaba hasta tal extremo
  lexicon: LSJ
  rationale: El genitivo absoluto presenta la hostilidad como algo que llega a un grado extremo. «Avanzaba tanto» mantiene la metáfora de progresión y encaja de forma fluida en español.
- source_word: διὰ τινος
  english_pob_choice: by one
  chosen_spanish: uno de
  alternatives_spanish:
  - por medio de uno
  - a través de uno
  lexicon: LSJ
  rationale: τινος es indefinido. En español, «uno de» reproduce la indefinición y evita especificar de más, en línea con la observación del texto griego.
- source_word: τῶν ὑπὸ τοῦ Σίμωνος δεδοκιμασμένων
  english_pob_choice: those approved by Simon
  chosen_spanish: los aprobados por Simón
  alternatives_spanish:
  - los aceptados por Simón
  - los probados por Simón
  - los de la confianza de Simón
  lexicon: LSJ
  rationale: δεδοκιμασμένων implica personas examinadas y aprobadas. «Los aprobados por Simón» sigue de cerca el valor del participio y conserva la referencia al círculo validado por Simón sin añadir funciones no explicitadas.
- source_word: φόνους
  english_pob_choice: murders
  chosen_spanish: asesinatos
  alternatives_spanish:
  - homicidios
  - muertes
  lexicon: LSJ
  rationale: φόνος designa normalmente asesinato o homicidio violento, no mera muerte. «Asesinatos» es claro en español y mantiene la fuerza del plural griego.
- source_word: συντελεῖσθαι
  english_pob_choice: were being committed
  chosen_spanish: cometía
  alternatives_spanish:
  - se perpetraban
  - se llevaban a cabo
  lexicon: LSJ
  rationale: El infinitivo pasivo indica ejecución o consumación de los asesinatos. En español, la construcción «uno de los aprobados por Simón cometía asesinatos» reproduce con naturalidad la acción y conserva el sujeto indefinido.
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail en inglés, donde se prefirió «committed by one of those approved by Simon» por naturalidad y por reflejar la indefinición del griego. En español se mantuvo esa indefinición con «uno de los aprobados por Simón».
  spanish_consistency_notes:
  - Se usa «Simón» para Σίμων, conforme a la forma española habitual del nombre.
  - Se traduce ἔχθρα con «hostilidad» y no con «enemistad» para conservar el matiz de conflicto activo y progresivo.
  - Se evita introducir términos eclesiásticos o interpretativos no presentes en el griego.
  - La frase se mantiene en un registro bíblico moderno y sobrio, sin calcar la sintaxis del inglés ni del griego de manera artificial.
