id: LEV.13.47
reference: Leviticus 13:47
source:
  edition: WLC
  text: וְ/הַ/בֶּ֕גֶד כִּֽי יִהְיֶ֥ה ב֖/וֹ נֶ֣גַע צָרָ֑עַת בְּ/בֶ֣גֶד צֶ֔מֶר א֖וֹ בְּ/בֶ֥גֶד פִּשְׁתִּֽים־׃
translation:
  text: And if a garment has in it an outbreak of leprosy[a], in a wool garment or in a linen garment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tsaraath, traditionally rendered 'leprosy,' refers here to a broader category of diseased or contaminated conditions, including those affecting garments, not specifically modern Hansen's disease.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֶּגֶד
  chosen: a garment
  alternatives:
  - the garment
  - clothing
  lexicon: HALOT
  rationale: בגד denotes a garment/article of clothing. Although the Hebrew has the article ('the garment'), English law-style discourse often uses an indefinite singular generically; 'a garment' reads naturally while preserving the generic case.
- source_word: כִּי יִהְיֶה בוֹ
  chosen: if ... has in it
  alternatives:
  - when ... has
  - if ... there is in it
  lexicon: HALOT
  rationale: כִּי with the imperfect here introduces a case in legal material, naturally rendered 'if' in English. The phrase בוֹ with היה expresses the presence of something in/on the garment; 'has in it' is idiomatic and keeps the locative sense.
- source_word: נֶגַע
  chosen: an outbreak
  alternatives:
  - a mark
  - an affliction
  - a plague
  - a spot
  lexicon: HALOT
  rationale: נגע is the standard term in Leviticus 13 for a visible affliction/mark. 'Outbreak' fits the inspection context and avoids the misleadingly broad English 'plague' for a garment.
- source_word: צָרָעַת
  chosen: leprosy
  alternatives:
  - a skin disease
  - defiling disease
  - scale disease
  lexicon: HALOT
  rationale: Traditional 'leprosy' is retained because צָרַעַת in Leviticus covers a broader ritual-impurity category than modern Hansen's disease, yet 'leprosy' remains the most recognizable conventional rendering in this legal context. The broader sense is worth preserving in a footnote.
- source_word: בְּבֶגֶד צֶמֶר
  chosen: in a wool garment
  alternatives:
  - in a garment of wool
  - on a wool garment
  lexicon: HALOT
  rationale: The phrase specifies the material of the garment under examination. 'Wool garment' is concise modern English. 'In' is kept to mirror the repeated ב preposition with the preceding בוֹ locative construction.
- source_word: אוֹ בְּבֶגֶד פִּשְׁתִּים
  chosen: or in a linen garment
  alternatives:
  - or in a garment of linen
  - or in a flax garment
  lexicon: HALOT
  rationale: פשתים refers to flax/linen textile material. 'Linen garment' is the natural English equivalent for the finished fabric rather than the raw plant source.
