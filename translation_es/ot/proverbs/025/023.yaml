revisions:
- from: El viento del norte hace caer la lluvia[a], y un rostro enojado, una lengua de secreto[b].
  to: El viento del norte trae lluvia[a], y un rostro enojado, una lengua calumniadora[b].
  rationale: Se ajusta el verbo principal a 'trae lluvia' para reflejar mejor la decisión inglesa 'brings forth' en español natural. Se cambia 'una lengua de secreto' por 'una lengua calumniadora' en el texto principal, porque el hebreo literal suena antinatural en español; la literalidad y las alternativas se conservan en la nota, en línea con la auditoría inglesa.
