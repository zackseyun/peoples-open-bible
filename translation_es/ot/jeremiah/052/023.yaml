translation:
  language: es
  text: Había noventa y seis granadas[a] hacia afuera; todas las granadas sobre la celosía, todo alrededor, eran cien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el exterior», «en una sola dirección» o quizá «a barlovento». El término hebreo es difícil; el sentido parece ser que noventa y seis se contaban desde un lado, mientras que el total alrededor de la celosía era cien.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִמֹּנִים
  english_pob_choice: pomegranates
  chosen_spanish: granadas
  alternatives_spanish:
  - pomegranadas
  - granadas ornamentales
  lexicon: HALOT
  rationale: El hebreo רִמּוֹנִים designa literalmente «granadas». En este contexto arquitectónico se trata de ornamentos con forma de granada, pero el sustantivo básico se conserva en el texto principal por fidelidad léxica, como en la edición inglesa.
- source_word: תִּשְׁעִים וְשִׁשָּׁה
  english_pob_choice: ninety-six
  chosen_spanish: noventa y seis
  alternatives_spanish:
  - '96'
  lexicon: HALOT
  rationale: La construcción numeral es directa y se vierte con el cardinal normal en español.
- source_word: ר֑וּחָה
  english_pob_choice: toward the outside
  chosen_spanish: hacia el exterior
  alternatives_spanish:
  - hacia afuera
  - en un solo lado
  - viento favorable
  lexicon: HALOT
  rationale: La forma con matiz direccional es difícil. En este contexto de recuento arquitectónico, la dirección exterior es la lectura más natural y la que mejor conserva la ambigüedad sin sobrecargar el español.
- source_word: כָּל הָרִמּוֹנִים מֵאָה
  english_pob_choice: all the pomegranates ... were one hundred
  chosen_spanish: todas las granadas ... eran cien
  alternatives_spanish:
  - el total de las granadas era de cien
  - todas las granadas sumaban cien
  lexicon: HALOT
  rationale: Se mantiene el énfasis hebreo en «todas las granadas» antes de expresar el total numérico, siguiendo la estructura del original y la decisión inglesa.
- source_word: הַשְּׂבָכָה
  english_pob_choice: the lattice
  chosen_spanish: la celosía
  alternatives_spanish:
  - la red
  - la reja
  - el entramado
  lexicon: HALOT
  rationale: שְׂבָכָה alude al ornamento reticulado o enrejado de la obra del pilar. «Celosía» comunica bien esa idea en español y suena más natural que una traducción más técnica o más literal.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - rodeando
  lexicon: HALOT
  rationale: El adverbio expresa circunferencia o contorno completo. «Alrededor» es la forma moderna y clara en español.
translation_notes:
  revision_awareness: El inglés auditado revisó la primera solución de רוּחָה, pasando de «on the visible side» a «toward the outside» para reflejar mejor su matiz direccional. La versión española sigue esa revisión y evita fijar una lectura más precisa de la que permite el hebreo.
  spanish_consistency_notes:
  - Se usa «granadas» de manera consistente para רִמּוֹנִים, conforme al valor léxico básico del término.
  - Se evita «Señor» o cualquier sustitución teológica porque el versículo no contiene el nombre divino ni un título equivalente.
  - «Celosía» preserva el referente arquitectónico sin introducir una interpretación más específica que la fuente no exige.
