  yaml_path: translation/ot/isaiah/065/012.yaml
  text: And I will destine you for the sword[a], and all of you will bow down for the slaughter, because I called and you did not answer; I spoke and you did not listen. And you did what was evil in my eyes[d][c][b], and chose what I did not delight in.
  footnotes:
  - marker: a
    text: Or 'I will appoint you' or 'I will number you.' The Hebrew verb also allows a wordplay with the 'god of Destiny' in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'will kneel' or 'will crouch.' The Hebrew verb literally refers to bending the knee; here it depicts collapse under judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'you did not hear' or, by implication, 'you did not obey.'
    reason: lexical_alternative
  - marker: d
    text: Or 'chose what I did not desire' / 'what I took no pleasure in.'
    reason: lexical_alternative
