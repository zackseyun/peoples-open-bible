translation:
  language: es
  text: Hacen de la noche día; la luz está cerca frente a la oscuridad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La luz está cerca a causa de la oscuridad», o «La luz está cerca antes de la oscuridad». El hebreo מִפְּנֵי puede entenderse de varias maneras; se conserva una traducción abierta para no fijar indebidamente la relación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְלָה
  english_pob_choice: night
  chosen_spanish: la noche
  alternatives_spanish:
  - noche
  lexicon: HALOT
  rationale: El sustantivo básico es “noche”. El artículo en español hace natural la oposición con “día” sin añadir contenido interpretativo.
- source_word: לְיוֹם
  english_pob_choice: into day
  chosen_spanish: día
  alternatives_spanish:
  - en día
  - como día
  lexicon: HALOT
  rationale: 'En la construcción con שׂים, el valor es transformativo: “hacer X Y / convertir X en Y”. En español, “hacer de la noche día” expresa bien esa transformación sin forzar un calco como “en día”.'
- source_word: יָשִׂימוּ
  english_pob_choice: they make
  chosen_spanish: hacen
  alternatives_spanish:
  - convierten
  - ponen
  lexicon: HALOT
  rationale: El verbo básico es “poner/colocar”, pero aquí la construcción idiomática pide un sentido causativo de transformación. “Hacen” conserva la naturalidad y permite la frase fija “hacer de X Y”.
- source_word: אוֹר
  english_pob_choice: Light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: El sustantivo significa “luz”. En español no hay razón para capitalizarlo; mantenerlo en minúscula evita una lectura teológica no respaldada por el hebreo.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - es cercano
  - está próximo
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa cercanía. “Está cerca” es la forma más natural en español y conserva la concisión del hebreo.
- source_word: מִפְּנֵי
  english_pob_choice: in the face of
  chosen_spanish: frente a
  alternatives_spanish:
  - ante
  - a causa de
  - de la presencia de
  lexicon: HALOT
  rationale: La POB inglesa preserva la imagen literal de “from the face/presence of” y evita decidir prematuramente por causalidad. “Frente a” mantiene la idea de confrontación o proximidad sin sobreinterpretar la relación.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - tinieblas
  - noche
  lexicon: HALOT
  rationale: “Oscuridad” reproduce el contraste con “luz” de forma directa y digna; “tinieblas” sería más literario pero menos neutro en español contemporáneo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que eliminó “they say”, porque el hebreo no lo contiene. Por eso el español evita introducir un verbo de habla y conserva solo la cláusula poética del versículo.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH/κύριος como ‘Yahvé’ cuando corresponda, aunque este versículo no lo contiene.
  - Se evitó capitalizar ‘luz’ para no introducir una lectura doctrinal ausente del texto.
  - La estructura breve y paralelística se conservó en español para reflejar la densidad poética del hebreo.
