translation:
  language: es
  text: Y harán el efod de oro[a], azul, púrpura, hilo carmesí y lino fino torcido, obra de un hábil diseñador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hilo de oro»; el hebreo dice simplemente «oro», aunque en este contexto de fabricación puede referirse al oro trabajado dentro de la tela.
    reason: lexical_alternative
  - marker: b
    text: O «obra de un diseñador» o «de un hábil artesano»; la expresión hebrea señala una labor artística y con diseño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּ
  english_pob_choice: And they shall make
  chosen_spanish: Y harán
  alternatives_spanish:
  - Y han de hacer
  - Y deben hacer
  lexicon: HALOT
  rationale: El imperfecto con waw consecutiva en una instrucción se vierte naturalmente como futuro injuntivo en español. "Harán" conserva el tono legislativo sin añadir obligación explícita que el hebreo no marca de forma directa.
- source_word: הָאֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el ephod
  - el vestidura sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico del vestuario cultual. En español bíblico y académico "efod" es inteligible y evita una paráfrasis interpretativa.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro tejido
  - hilo de oro
  lexicon: HALOT
  rationale: El hebreo dice simplemente "oro". En español, "de oro" comunica de forma natural el material; no se añade "hilo" porque no está explícito en el texto base, aunque el contexto textil sugiera trabajo del metal en la prenda.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul celeste
  - azul
  lexicon: HALOT
  rationale: Se traduce el término cromático estándar del tabernáculo con el color básico "azul", claro y fiel. No se especifica tinte o material, porque el hebreo aquí funciona como designación de color/material dentro de la lista.
- source_word: וְאַרְגָּמָן
  english_pob_choice: and purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - y púrpura
  - y morado
  lexicon: HALOT
  rationale: El hebreo nombra el color/dye de púrpura. En la serie de materiales, en español puede omitirse la conjunción antes del tercer color solo si la sintaxis fluye; aquí se mantiene la lista con comas, y "púrpura" preserva el valor tradicional y técnico.
- source_word: תּוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - hilo carmesí
  - escarlata
  lexicon: HALOT
  rationale: La expresión hebrea designa material teñido de escarlata/carmesí. Opto por "carmesí" para mantener el color sin introducir "hilo" en la línea principal, ya que el sustantivo material no es explícito en el hebreo.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: hilo de lino fino
  alternatives_spanish:
  - lino fino torcido
  - lino fino retorcido
  lexicon: HALOT
  rationale: שֵׁשׁ es lino fino; מָשְׁזָר expresa la cualidad de estar torcido/trenzado. "Hilo de lino fino" mantiene el material textil y sugiere la manufactura sin forzar una equivalencia técnica más pesada. La tensión entre "lino fino" y el componente de torsión queda parcialmente integrada en el sustantivo compuesto.
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de un hábil diseñador
  alternatives_spanish:
  - obra de un hábil artesano
  - trabajo de un diseñador experto
  - obra artística de un artesano
  lexicon: HALOT
  rationale: La frase apunta a trabajo artístico planificado, no a mera fabricación. "Hábil diseñador" conserva la idea de pericia y diseño intencional que el POB inglés quiso resaltar, sin estrechar indebidamente el sentido a bordado o a un oficio específico.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó repeticiones innecesarias de "of" antes de los materiales textiles, manteniendo intacto el sentido. La redacción española sigue esa misma economía sintáctica: conserva la lista de materiales de modo fluido, sin añadir preposiciones redundantes ni explicitar más de lo que el hebreo dice.'
  spanish_consistency_notes:
  - Se mantiene "efod" como término técnico estable del proyecto.
  - Se usa "oro" en la nota para reflejar la ambigüedad del hebreo entre material bruto y metal trabajado.
  - 'La serie cromática se vierte con términos naturales en español: azul, púrpura, carmesí.'
  - No se introduce "Cristo", "Señor" ni otras terminologías ajenas al pasaje.
  - '"Lino fino" y la nota sobre la torsión conservan la tensión lexical del hebreo sin sobreexplicar en el texto principal.'
