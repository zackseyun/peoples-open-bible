translation:
  language: es
  text: Como la obra de un grabador en piedra, como las grabaduras de un sello[a], grabarás las dos piedras con los nombres de los hijos de Israel[b]; las harás encerradas en engastes de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las grabaduras de un sello».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hijos de Israel»; aquí se refiere a los descendientes tribales de Israel cuyos nombres iban grabados en las piedras.'
    reason: cultural_note
lexical_decisions:
- source_word: מַעֲשֵׂה חָרַשׁ אֶבֶן
  english_pob_choice: Like the work of an engraver in stone
  chosen_spanish: Como la obra de un grabador en piedra
  alternatives_spanish:
  - La obra de un grabador en piedra
  - Como el trabajo de un grabador en piedra
  lexicon: HALOT
  rationale: La construcción hebrea expresa la manera o el tipo de trabajo artesanal. 'Obra' mantiene el sustantivo de resultado/confección, y 'grabador en piedra' conserva el oficio ligado a la piedra sin convertirlo en 'cantero', que sería más general y perdería la relación inmediata con el grabado.
- source_word: פִּתּוּחֵי חֹתָם
  english_pob_choice: the engravings of a signet
  chosen_spanish: las grabaduras de un sello
  alternatives_spanish:
  - los grabados de un sello
  - las incisiones de un sello
  lexicon: HALOT
  rationale: '''פִּתּוּחֵי'' señala incisiones o grabados; el POB inglés conserva la imagen de un sello/signet. En español, ''grabaduras'' mantiene el plural constructo y el carácter técnico de la incisión; ''sello'' evita imponer ''anillo-sello'' sin que el contexto lo exija.'
- source_word: תְּפַתַּח
  english_pob_choice: you shall engrave
  chosen_spanish: grabarás
  alternatives_spanish:
  - esculpirás
  - tallarás
  lexicon: HALOT
  rationale: El contexto es inscribir nombres en piedras preciosas, así que 'grabar' es el equivalente más natural y preciso en español. 'Tallar' sugiere trabajo más amplio en relieve; 'esculpir' sería demasiado escultórico.
- source_word: שְׁתֵּי הָאֲבָנִים
  english_pob_choice: the two stones
  chosen_spanish: las dos piedras
  alternatives_spanish:
  - las dos gemas
  - las dos piedras preciosas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'piedras'. Aunque son piedras preciosas en el contexto del pectoral, 'piedras' preserva el lexema base sin sobreespecificar. El artículo y el número se ajustan naturalmente al español.
- source_word: עַל שְׁמֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: with the names of the sons of Israel
  chosen_spanish: con los nombres de los hijos de Israel
  alternatives_spanish:
  - con los nombres de los hijos de Israel
  - según los nombres de los hijos de Israel
  - llevando los nombres de los hijos de Israel
  lexicon: HALOT
  rationale: '''עַל'' aquí introduce lo inscrito sobre las piedras; en español, ''con'' comunica bien la inscripción. ''Hijos de Israel'' mantiene la correspondencia con בְּנֵי y respeta la referencia genealógica a las tribus, sin neutralizarla a ''pueblo''.'
- source_word: מֻסַבֹּת
  english_pob_choice: enclosed
  chosen_spanish: rodeadas
  alternatives_spanish:
  - encerradas
  - montadas
  lexicon: HALOT
  rationale: El participio pasivo describe las piedras circundadas o sujetas por el engaste. 'Rodeadas' expresa esa envoltura sin sonar técnico en exceso; además enlaza bien con la imagen de la montura de oro.
- source_word: מִשְׁבְּצ֥וֹת זָהָב
  english_pob_choice: settings of gold
  chosen_spanish: engastes de oro
  alternatives_spanish:
  - monturas de oro
  - ajustes de oro
  - engastes de oro fino
  lexicon: HALOT
  rationale: '''מִשְׁבְּצֹות'' nombra monturas o engastes ornamentales. ''Engastes de oro'' es idiomático y preciso en español para joyería, sin añadir un adjetivo que el hebreo no exige.'
- source_word: תַּעֲשֶׂה אֹתָם
  english_pob_choice: you shall make them
  chosen_spanish: las harás
  alternatives_spanish:
  - las harás
  - las prepararás
  - las pondrás
  lexicon: HALOT
  rationale: El verbo abarca fabricar o disponer estas piedras en su forma final. 'Las harás' conserva la orden de fabricación y suena natural en español; el pronombre femenino concuerda con 'piedras'.
theological_decisions:
- issue: בְּנֵי יִשְׂרָאֵל como designación tribal masculina
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - hijos del pueblo de Israel
  - descendientes de Israel
  rationale: La POB inglesa conservó la filiación masculina por fidelidad al hebreo y por el contexto de las tribus nombradas. En español, 'hijos de Israel' mantiene esa relación genealógica y evita borrar la forma masculina del texto base. 'Descendientes' sería explicativo, pero menos literal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que afinó 'engraver in stone' y 'enclosed in settings of gold'. En español, eso llevó a preferir 'grabador en piedra' y 'rodeadas en engastes de oro', manteniendo la idea de trabajo artesanal preciso y de piedras sujetas por el engaste, sin forzar un tecnicismo mayor que el que ofrece el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y 'Yahvé' según la terminología estándar del proyecto, aunque este versículo no las contiene.
  - Se eligió 'grabar' en vez de 'esculpir' o 'tallar' para sostener la coherencia con contextos de inscripción.
  - '''Hijos de Israel'' preserva la forma masculina del original y su referencia a las tribus.'
  - No se usó 'SEÑOR' ni una paráfrasis devocional, porque el versículo trata de artesanía ritual y no del tetragrámaton.
