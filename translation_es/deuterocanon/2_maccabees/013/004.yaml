base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/013/004.yaml
  text: But the King of kings stirred up Antiochus’s anger against the wretch[a], and when Lysias pointed him out as being responsible for the evils and for all of them, he ordered them to put him to death, taking him to Beroea[b], as is the custom in that place.
  footnotes:
  - marker: a
    text: Or 'against the criminal' or 'against the villain' for 'the wretch' (Greek ἀλιτήριον), a strong term of moral condemnation.
    reason: lexical_alternative
  - marker: b
    text: Beroea here refers to the place of execution according to local custom.
    reason: cultural_note
