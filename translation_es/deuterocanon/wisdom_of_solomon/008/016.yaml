translation:
  language: es
  text: Cuando entre en mi casa[a], descansaré con ella; porque el trato con ella no tiene amargura, ni la vida con ella tiene dolor, sino gozo y alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descansaré con ella». El verbo griego sugiere reposo en estrecha asociación con la Sabiduría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  english_pob_choice: When I enter
  chosen_spanish: Cuando entre
  alternatives_spanish:
  - Al entrar
  - Cuando vaya a entrar
  lexicon: LSJ
  rationale: El participio aoristo introduce la circunstancia temporal de la acción principal. «Cuando entre» conserva esa relación temporal de manera natural en español sin perder el matiz de entrada efectiva.
- source_word: προσαναπαύσομαι
  english_pob_choice: I will find rest with her
  chosen_spanish: descansaré con ella
  alternatives_spanish:
  - hallaré descanso con ella
  - reposaré con ella
  lexicon: LSJ
  rationale: El futuro medio expresa reposo en asociación estrecha con la Sabiduría. «Descansaré con ella» mantiene la idea de reposo y la relación personal, con un español fluido.
- source_word: συναναστροφή
  english_pob_choice: association
  chosen_spanish: la compañía con ella
  alternatives_spanish:
  - la asociación con ella
  - la convivencia con ella
  - el trato con ella
  lexicon: LSJ
  rationale: El término apunta a convivencia o trato social. «Compañía con ella» comunica bien el sentido relacional y permite sostener el contraste con la amargura sin sonar técnico.
- source_word: πικρίαν
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - amargor
  - bitterness
  lexicon: LSJ
  rationale: «Amargura» reproduce el valor metafórico y emocional de πικρίαν en un español natural y bíblico.
- source_word: συμβίωσις
  english_pob_choice: life with her
  chosen_spanish: la vida con ella
  alternatives_spanish:
  - la convivencia con ella
  - vivir con ella
  lexicon: LSJ
  rationale: La palabra describe la vida compartida o la convivencia. «La vida con ella» sigue de cerca el inglés auditado y conserva la amplitud del término griego.
- source_word: ὀδύνην
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - aflicción
  lexicon: LSJ
  rationale: «Dolor» corresponde al sentido amplio de ὀδύνην y encaja con el paralelismo de la cláusula negativa.
- source_word: εὐφροσύνην
  english_pob_choice: gladness
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  - contento
  lexicon: LSJ
  rationale: El término expresa alegría festiva o bienestar gozoso. «Gozo» conserva un matiz reverente y distingue este primer término del siguiente.
- source_word: χαράν
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: «Alegría» es el equivalente más natural para χαράν en español y permite mantener la pareja retórica sin colapsar ambos sustantivos en uno solo.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Retain feminine references ('her')
  chosen_spanish_reading: Mantener «ella»
  alternative_spanish_readings:
  - neutralizar con «la Sabiduría»
  - usar formas impersonales
  rationale: El griego usa formas femeninas para la Sabiduría (αὐτῇ, αὐτῆς). Mantener «ella» conserva la personificación literaria y teológica sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish anchored in source text.'
translation_notes:
  revision_awareness: 'Se siguió la revisión final del inglés auditado: εἰσελθὼν se rinde con una entrada temporal directa; αὐτῇ se conserva con «ella»; συναναστροφή y συμβίωσις se distinguen como compañía/vida compartida para no borrar el paralelismo; y se evita añadir verbos explicativos que no están en el griego.'
  spanish_consistency_notes:
  - Se usa «Sabiduría» implícita por el contexto, pero el texto mantiene la personificación femenina con «ella» conforme al griego.
  - 'Se prefieren equivalentes españoles transparentes y dignos: amargura, dolor, gozo, alegría.'
  - El pie de nota se ancla en «descansaré con ella» para señalar la alternativa léxica documentada en el audit trail.
