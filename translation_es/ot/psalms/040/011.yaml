translation:
  language: es
  text: No he ocultado tu justicia[a] dentro de mi corazón; he hablado de tu fidelidad y de tu salvación[b]. No he encubierto tu amor fiel[c] ni tu verdad a la gran asamblea[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu rectitud»; el hebreo צדקה puede referirse a justicia moral o a acción/vindicación justa según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «tu liberación»; el hebreo תשועה también puede expresar rescate o liberación.
    reason: lexical_alternative
  - marker: c
    text: O «tu amor de pacto»; חסד es un término de pacto que también puede expresar amor leal o misericordia constante.
    reason: lexical_alternative
  - marker: d
    text: O «delante de la gran asamblea»; la construcción hebrea puede enfatizar tanto el público ante el que se habló como el grupo al que no se le ocultó.
    reason: alternative_reading
lexical_decisions:
- source_word: צִדְקָתְךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia vindicadora
  lexicon: HALOT
  rationale: צדקה puede denotar justicia/rectitud o acto justo/vindicación según el contexto. En español, «justicia» conserva ese campo semántico y evita la ambigüedad de «rectitud», que aquí sonaría más moralizante que forense/covenantal. Se anota la alternativa porque el texto admite esa tensión.
- source_word: כִסִּיתִי
  english_pob_choice: have not hidden
  chosen_spanish: he ocultado
  alternatives_spanish:
  - he escondido
  - he cubierto
  lexicon: HALOT
  rationale: El verbo כסה literalmente es «cubrir», pero en este modismo con «dentro de mi corazón» el sentido es no mantener algo reservado o callado. «Ocultar» comunica bien la imagen de no guardar en el interior y mantiene la distinción con el verbo siguiente.
- source_word: בְּתוֹךְ לִבִּי
  english_pob_choice: within my heart
  chosen_spanish: dentro de mi corazón
  alternatives_spanish:
  - en el centro de mi corazón
  - en lo íntimo de mi corazón
  lexicon: HALOT
  rationale: La expresión es idiomática para interioridad y reserva. «Dentro de mi corazón» es natural en español y conserva la metáfora del interior como lugar de ocultamiento.
- source_word: אֱמוּנָתְךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu fe constante
  - tu confiabilidad
  lexicon: HALOT
  rationale: אֱמוּנָה aquí apunta a la confiabilidad leal de Dios, no a la fe humana. «Fidelidad» es la correspondencia española más clara y estable para esa cualidad de pacto.
- source_word: וּתְשׁוּעָתְךָ
  english_pob_choice: and your salvation
  chosen_spanish: y tu salvación
  alternatives_spanish:
  - y tu liberación
  - y tu rescate
  lexicon: HALOT
  rationale: תשועה puede ser «salvación» o «liberación». Se conserva «salvación» porque abarca el sentido más amplio y mantiene la resonancia bíblica sin reducir el alcance a un solo acto de rescate.
- source_word: אָמָרְתִּי
  english_pob_choice: I have spoken of
  chosen_spanish: he hablado de
  alternatives_spanish:
  - he dicho
  - he proclamado
  lexicon: HALOT
  rationale: El hebreo dice simplemente «he dicho», pero el objeto directo en español pide una formulación natural. «He hablado de» transmite bien la idea de proclamación pública y evita una literalidad dura.
- source_word: כִחַדְתִּי
  english_pob_choice: have not concealed
  chosen_spanish: no he encubierto
  alternatives_spanish:
  - no he ocultado
  - no he disimulado
  lexicon: HALOT
  rationale: כחד implica ocultar, encubrir o no sacar a la luz. Se usa «encubierto» para distinguirlo levemente de «ocultar» y reflejar el paralelismo poético con el primer colon.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor constante
  alternatives_spanish:
  - tu amor leal
  - tu misericordia constante
  lexicon: HALOT
  rationale: חסד es un término de pacto difícil de reducir en español. «Amor constante» comunica la lealtad amorosa y la permanencia del compromiso mejor que una sola palabra teológica más tradicional.
- source_word: וַאֲמִתְּךָ
  english_pob_choice: and your truth
  chosen_spanish: y tu verdad
  alternatives_spanish:
  - y tu fidelidad
  - y tu verdad firme
  lexicon: HALOT
  rationale: אמת puede ser verdad, firmeza o confiabilidad. Se conserva «verdad» para distinguirla de אֱמוּנָה, que ya se tradujo como «fidelidad», y así mantener la pareja lexical del hebreo.
- source_word: לְקָהָל רָב
  english_pob_choice: from the great assembly
  chosen_spanish: ante la gran asamblea
  alternatives_spanish:
  - delante de la gran asamblea
  - en la gran asamblea
  lexicon: HALOT
  rationale: La construcción con לְ después de verbos de ocultar puede señalar tanto el público ante quien se habla como el grupo del cual no se oculta algo. En español, «ante la gran asamblea» preserva esa apertura pública y sigue la alternativa documentada por la POB inglesa.
theological_decisions:
- issue: Distinguir אֱמוּנָה y אֱמֶת sin fusionarlas
  english_pob_reading: Render אֱמוּנָתְךָ as 'your faithfulness' and אֲמִתְּךָ as 'your truth'
  chosen_spanish_reading: Traducir אֱמוּנָתְךָ como «tu fidelidad» y אֲמִתְּךָ como «tu verdad»
  alternative_spanish_readings:
  - Traducir ambas como «fidelidad»
  - Traducir ambas como «verdad»
  rationale: El versículo acumula atributos de pacto en paralelismo poético. Mantener dos términos distintos en español preserva la riqueza retórica del hebreo y evita aplanar el texto en una sola idea.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Valor aspectual de los perfectos hebreos en testimonio
  english_pob_reading: Use English present perfect forms
  chosen_spanish_reading: 'Usar pretérito perfecto compuesto: «he ocultado», «he hablado», «no he encubierto»'
  alternative_spanish_readings:
  - 'pretérito simple: «oculté», «hablé», «no encubrí»'
  rationale: En español, el pretérito perfecto compuesto expresa bien acciones completadas con relevancia testimonial presente, y suena más natural en este contexto confesional que una cadena rígida de pretéritos simples.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish, not archaic or academic)
- issue: Alcance de חֶסֶד como término de pacto
  english_pob_reading: your steadfast love
  chosen_spanish_reading: tu amor constante
  alternative_spanish_readings:
  - tu amor leal
  - tu misericordia constante
  - tu bondad constante
  rationale: חסד no se reduce limpiamente a una sola noción en español. «Amor constante» comunica la mezcla de afecto, lealtad y permanencia que la POB inglesa intentó preservar con 'steadfast love'.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el borrador español sigue la lectura auditada más reciente sin cambios documentados, manteniendo las alternancias léxicas señaladas por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque aquí el texto habla de las posesiones pronominales de segunda persona («tu...»), no del tetragrámaton explícito.
  - Se conserva la distinción entre «fidelidad» (אֱמוּנָה) y «verdad» (אֱמֶת), alineada con la decisión inglesa de no colapsar ambos términos.
  - Se evita el calco «en medio de mi corazón» porque en español suena menos idiomático que «dentro de mi corazón» y no añade precisión semántica.
  - «Gran asamblea» se deja como fórmula pública y cultual, evitando «congregación» para no imponer una terminología eclesiástica más estrecha que el hebreo.
