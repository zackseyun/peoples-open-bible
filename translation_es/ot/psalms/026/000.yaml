  text: לְ/דָוִ֨ד שָׁפְטֵ֤/נִי יְהוָ֗ה כִּֽי אֲ֭נִי בְּ/תֻמִּ֣/י הָלַ֑כְתִּי וּ/בַ/יהוָ֥ה בָּ֝טַ֗חְתִּי לֹ֣א אֶמְעָֽד׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/026/000.yaml
  text: Of David[a]. Judge me, Yahweh, for I have walked in my integrity, and I have trusted in Yahweh[c][b]; I will not slip.
  footnotes:
  - marker: a
    text: Or 'Judge me, O LORD.' The Hebrew verb can mean 'judge,' but here likely carries the sense 'vindicate' or 'give judgment in my favor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in my blamelessness.' The Hebrew term denotes integrity, wholeness, or blameless conduct.
    reason: lexical_alternative
  - marker: c
    text: Or 'I shall not totter' or 'I shall not waver.' The Hebrew image is of slipping or losing footing.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:18Z'
    unchanged: false
    changes_summary: Completed the verse by translating the full Hebrew text beyond the superscription; rendered יְהוָה as 'Yahweh' and preserved the formal, natural sense of the clauses.
translation:
  language: es
  text: De David[a]. Júzgame, Yahvé, porque he andado en mi integridad[b], y he confiado en Yahvé; no resbalaré[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hazme justicia, Yahvé» o «Vindícame, Yahvé». El verbo hebreo puede significar «juzgar», pero aquí probablemente lleva el sentido de dictar sentencia a favor del salmista.
    reason: lexical_alternative
  - marker: b
    text: O «en mi irreprochabilidad» o «en mi rectitud». El término hebreo puede expresar integridad, totalidad moral o conducta irreprochable.
    reason: lexical_alternative
  - marker: c
    text: O «no tropezaré» o «no vacilaré». La imagen hebrea es la de resbalar o perder firmeza al andar.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Salmo de David.
  - De parte de David.
  lexicon: Lema/superinscripción
  rationale: La fórmula hebrea indica atribución, no necesariamente autoría en sentido moderno. En español, ‘De David’ conserva brevedad y neutralidad, y permite la lectura tradicional sin sobreafirmar el valor exacto de la nota introductoria.
- source_word: שָׁפְטֵנִי
  english_pob_choice: Judge me, Yahweh,
  chosen_spanish: Júzgame, Yahvé,
  alternatives_spanish:
  - Hazme justicia, Yahvé,
  - Júzgame, oh Yahvé,
  lexicon: שׁפט
  rationale: El inglés POB mantuvo ‘Judge me’ y anotó que puede implicar ‘vindicate’. En español, ‘júzgame’ preserva el valor verbal directo del hebreo; la posible idea de vindicación queda retenida en la nota sin reemplazar el verbo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: יהוה
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ‘Yahvé’ en el texto principal. Esto conserva el nombre divino sin la convención de ocultarlo con un título genérico.'
- source_word: בְּתֻמִּי
  english_pob_choice: in my integrity
  chosen_spanish: en mi integridad
  alternatives_spanish:
  - en mi blamelessness
  - en mi rectitud
  lexicon: תֹּם
  rationale: ‘Integridad’ comunica bien la idea de totalidad, rectitud y conducta sin división. ‘Blamelessness’ sería más técnico en inglés; en español ‘integridad’ es natural y fiel, mientras la nota puede recordar las otras facetas semánticas.
- source_word: בָּטַחְתִּי
  english_pob_choice: I have trusted
  chosen_spanish: he confiado
  alternatives_spanish:
  - he puesto mi confianza
  - he esperado
  lexicon: בטח
  rationale: ‘Confiar’ es la equivalencia más directa y natural en español. Mantiene el acto continuo/completo del perfecto hebreo en un presente perfecto español.
- source_word: לֹא אֶמְעָד
  english_pob_choice: I will not slip.
  chosen_spanish: no resbalaré.
  alternatives_spanish:
  - no tropezaré
  - no vacilaré
  - no titubearé
  lexicon: מעד
  rationale: ‘Resbalaré’ conserva la imagen corporal de perder firmeza o piso, que es la que el inglés POB anotó (‘slip / totter / waver’). En español suena natural y permite la misma gama interpretativa.
theological_decisions:
- issue: Sentido de שׁפט en un lamento/oración de vindicación
  english_pob_reading: Judge me, Yahweh, with a note that the verb can mean vindicate or give judgment in my favor.
  chosen_spanish_reading: Júzgame, Yahvé, con la posible resonancia de ‘hazme justicia’ o ‘vindícame’ preservada en nota.
  alternative_spanish_readings:
  - Hazme justicia, Yahvé.
  - Vindícame, Yahvé.
  rationale: El hebreo permite un ruego judicial y, por contexto, de vindicación. El texto principal conserva la forma verbal más cercana; la nota guarda la tensión semántica sin resolverla de forma reductiva.
  doctrine_reference: Salmo de inocencia/vindicación; oración del justo ante Dios como juez.
- issue: Valor de תֹּם en la declaración ética del salmista
  english_pob_reading: in my integrity / blamelessness
  chosen_spanish_reading: en mi integridad
  alternative_spanish_readings:
  - en mi blamelessness
  - en mi rectitud
  rationale: ‘Integridad’ cubre la integridad moral y la idea de una conducta indivisa. Se evita un término demasiado técnico o artificial en español, pero se mantiene la opción alternativa en nota para no perder la tensión léxica.
  doctrine_reference: Ética del justo; integridad del caminar delante de Dios.
- issue: Imagen final de estabilidad
  english_pob_reading: I will not slip / totter / waver
  chosen_spanish_reading: no resbalaré
  alternative_spanish_readings:
  - no tropezaré
  - no vacilaré
  - no titubearé
  rationale: El hebreo usa una imagen de pérdida de apoyo. ‘Resbalaré’ conserva la metáfora física y resulta idiomático; las alternativas se mantienen como posibilidades semánticas reales, no como paráfrasis libres.
  doctrine_reference: Confianza en Yahvé como fundamento que impide la caída.
translation_notes:
  revision_awareness: La revisión más reciente completó el contenido del versículo más allá de la sola superinscripción, tradujo יְהוָה como ‘Yahweh’ en inglés y mantuvo un sentido formal y natural. Este borrador sigue esa ampliación, preserva la estructura completa del hebreo y refleja la misma decisión terminológica para el Nombre divino en español (‘Yahvé’).
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conservó el verbo directo ‘júzgame’ para שׁפט, dejando la posible idea de vindicación en la nota sin diluir el texto.
  - ‘Integridad’ se eligió por naturalidad y fidelidad; la nota recoge el rango semántico más amplio del hebreo.
  - La imagen final se tradujo con un verbo corporal (‘resbalar’), para conservar la metáfora de estabilidad/caída del original.
