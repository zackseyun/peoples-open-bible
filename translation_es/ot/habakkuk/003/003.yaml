translation:
  language: es
  text: Dios viene de Temán[a], y el Santo desde el monte Parán. Selah[b] Su esplendor[c][d] cubre los cielos, y su alabanza llena la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Temán también puede entenderse más generalmente como «el sur», aunque aquí probablemente sea el nombre de un lugar, en paralelo con el monte Parán.
    reason: lexical_alternative
  - marker: b
    text: Selah es un término litúrgico o musical de sentido incierto; por eso suele dejarse sin traducir.
    reason: cultural_note
  - marker: c
    text: O «majestad» o «gloria»; el hebreo הוֹד puede abarcar esos matices.
    reason: lexical_alternative
  - marker: d
    text: O «Su esplendor ha cubierto los cielos» o «Su esplendor cubrirá los cielos». En este contexto poético, las formas verbales hebreas también pueden entenderse como pasado o futuro; del mismo modo, la segunda cláusula puede traducirse «su alabanza ha llenado la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El sustantivo singular designa a Dios de forma directa. En español, «Dios» es la equivalencia natural y fiel, sin añadir matices ajenos al hebreo.
- source_word: מִתֵּימָן
  english_pob_choice: from Teman
  chosen_spanish: de Temán
  alternatives_spanish:
  - del sur
  lexicon: HALOT
  rationale: El contexto poético favorece el nombre propio Temán, en paralelo con «el monte Parán». Mantener la transliteración preserva la fuerza geográfica del paralelismo.
- source_word: יָבֹא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - vendrá
  - vino
  lexicon: HALOT
  rationale: El imperfecto en esta teofanía poética puede expresarse con presente vívido en español. «Viene» conserva la inmediatez litúrgica sin forzar el valor temporal.
- source_word: וְקָדוֹשׁ
  english_pob_choice: and the Holy One
  chosen_spanish: y el Santo
  alternatives_spanish:
  - y el Santo de Dios
  - y el santo
  lexicon: HALOT
  rationale: Aquí funciona como título divino sustantivado. «El Santo» mantiene la referencia a Dios y evita introducir una distinción no indicada por el hebreo.
- source_word: מֵהַר פָּארָן
  english_pob_choice: from Mount Paran
  chosen_spanish: desde el monte Parán
  alternatives_spanish:
  - desde el monte de Parán
  - desde el monte Paran
  lexicon: HALOT
  rationale: «Desde» reproduce bien el movimiento de procedencia en el poema. «Monte Parán» conserva el paralelo topográfico y el registro bíblico.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Pausa
  - Interludio
  lexicon: HALOT
  rationale: El sentido preciso es incierto; transliterarlo es la solución más transparente y sigue la práctica auditada del POB en inglés.
- source_word: הוֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - majestad
  - gloria
  lexicon: HALOT
  rationale: '«Esplendor» capta bien la imagen visual del texto: una radiación que cubre los cielos. «Gloria» o «majestad» son posibles, pero menos específicos en este contexto poético.'
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja de manera natural con «los cielos», que conserva el registro elevado y el paralelismo con «la tierra».
- source_word: וּתְהִלָּתוֹ
  english_pob_choice: and his praise
  chosen_spanish: y su alabanza
  alternatives_spanish:
  - y su fama
  - y su renombre
  lexicon: HALOT
  rationale: En español, «alabanza» comunica bien tanto el elogio debido a Dios como el prestigio que se extiende por toda la tierra. Mantiene la ambigüedad hebrea sin sobreexplicarla.
- source_word: מָלְאָה הָאָרֶץ
  english_pob_choice: fills the earth
  chosen_spanish: llena la tierra
  alternatives_spanish:
  - ha llenado la tierra
  - llenará la tierra
  lexicon: HALOT
  rationale: El verbo femenino concuerda con «su alabanza». El presente conserva la vividez poética que el POB inglés también buscó.
theological_decisions:
- issue: Retrato temporal de la teofanía
  english_pob_reading: 'Los verbos se entendieron como presente vívido: ''comes'', ''covers'', ''fills'''
  chosen_spanish_reading: 'Presente vívido: «viene», «cubre», «llena»'
  alternative_spanish_readings:
  - «vino», «cubrió», «llenó»
  - «vendrá», «cubrirá», «llenará»
  rationale: Habacuc 3 presenta la aparición de Dios de manera litúrgica y contemplativa. El presente en español conserva esa inmediatez sin decidir de forma absoluta entre pasado, presente o futuro profético.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica del poema
- issue: Referente de «el Santo»
  english_pob_reading: Título divino paralelo a 'God'
  chosen_spanish_reading: Título divino sustantivado en paralelo con «Dios»
  alternative_spanish_readings:
  - Un personaje santo distinto
  - Un ángel o ser exaltado
  rationale: El paralelismo hebreo indica que se trata del mismo referente divino. Traducirlo como título evita una lectura diferenciada que el texto no exige.
  doctrine_reference: Paralelismo sinonímico en poesía hebrea
translation_notes:
  revision_awareness: 'La revisión más reciente del inglés POB no introdujo cambios y el control cruzado reportó acuerdo alto, así que el borrador español sigue de cerca las decisiones auditadas: topónimo Temán, título divino «el Santo», presente vívido y nota alternativa para «alabanza/ha llenado».'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהַ conforme al valor léxico básico y al registro bíblico en español.
  - Se mantiene «Temán» como topónimo, evitando una generalización a «el sur» en el texto principal.
  - «El Santo» conserva el paralelismo con «Dios» y no introduce una entidad distinta.
  - «Selah» se deja transliterado por su función incierta.
  - «Esplendor» se reserva para הוֹד, manteniendo la imagen luminosa del verso.
  - «Los cielos» refleja el plural hebreo de שָׁמַיִם y armoniza con «la tierra».
  - «Su alabanza» preserva la ambigüedad entre lo que Dios merece y lo que de hecho se proclama de él.
