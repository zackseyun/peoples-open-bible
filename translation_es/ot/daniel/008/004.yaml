translation:
  language: es
  text: Vi al carnero embistiendo[a] hacia el occidente, hacia el norte y hacia el sur, y ninguna bestia podía mantenerse delante de él, y no había quien librara de su mano. Hizo lo que quiso y se engrandeció[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «corneando» o «arremetiendo». El hebreo describe la embestida violenta del carnero; el matiz exacto puede variar entre ataque y golpe de cuerno.
    reason: alternative_reading
  - marker: b
    text: O, «se magnificó», «se hizo grande» o «creció mucho». El hebreo puede expresar tanto el crecimiento como el engrandecimiento de sí mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - Yo vi
  - Estuve viendo
  lexicon: HALOT
  rationale: El perfecto qal 1cs de ראה expresa una visión narrativa pasada directa. En español, «Vi» es natural, fiel y suficiente sin añadir énfasis innecesario.
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho carnero
  - el ram
  lexicon: HALOT
  rationale: אַיִל designa un carnero. «Carnero» es el equivalente español más claro y digno; mantiene la imagen zoológica del texto visionario.
- source_word: מְנַגֵּחַ
  english_pob_choice: charging
  chosen_spanish: embistiendo
  alternatives_spanish:
  - corneando
  - arremetiendo
  - dando topetazos
  lexicon: HALOT
  rationale: El participio de נגח describe el empuje violento de un animal con cuernos. «Embestiendo» comunica bien la acción en español y conserva la fuerza dinámica del verbo sin volverlo demasiado literal o raro.
- source_word: יָמָּה וְצָפוֹנָה וָנֶגְבָּה
  english_pob_choice: westward and northward and southward
  chosen_spanish: hacia el occidente, hacia el norte y hacia el sur
  alternatives_spanish:
  - al oeste, al norte y al sur
  - hacia el oeste, hacia el norte y hacia el sur
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia cada punto cardinal. «Hacia...» preserva ese valor adverbial con buena naturalidad en español. «Occidente» refleja bien el par orientativo del hebreo y mantiene un registro un poco más elevado.
- source_word: וְכָל חַיּוֹת
  english_pob_choice: and no beasts
  chosen_spanish: ningún animal
  alternatives_spanish:
  - ninguna bestia
  - ningún ser viviente
  lexicon: HALOT
  rationale: En el contexto visionario, חַיּוֹת se refiere a animales o bestias. Dado que la frase está bajo negación, «ningún animal» expresa con naturalidad que ninguno podía resistirle.
- source_word: לֹא יַעַמְד֣וּ לְפָנָיו
  english_pob_choice: could stand before him
  chosen_spanish: podía mantenerse delante de él
  alternatives_spanish:
  - podían mantenerse delante de él
  - podía resistirle
  - podían resistirle
  lexicon: HALOT
  rationale: El giro hebreo «estar de pie delante de» expresa resistencia o capacidad de permanecer frente al oponente. «Mantenerse delante de él» conserva la imagen y el matiz de incapacidad para resistir.
- source_word: וְאֵין מַצִּיל מִיָּד֑וֹ
  english_pob_choice: there was no one who could rescue from his hand
  chosen_spanish: no había quien librara de su mano
  alternatives_spanish:
  - no había quien rescatara de su mano
  - no había quien lo salvara de su mano
  lexicon: HALOT
  rationale: נצל en hifil implica rescatar/librar. «Librara de su mano» mantiene el modismo hebreo de «mano» como poder o dominio, con un verbo natural en español bíblico contemporáneo.
- source_word: וְעָשָׂה כִרְצֹנוֹ
  english_pob_choice: He did as he pleased
  chosen_spanish: Hacía lo que quería
  alternatives_spanish:
  - Hizo lo que quiso
  - Actuaba según su voluntad
  lexicon: HALOT
  rationale: El modismo expresa actuar según la propia voluntad. En español, el imperfecto «Hacía» refleja el trasfondo progresivo o habitual de su expansión victoriosa y suena más fluido que una construcción más rígida.
- source_word: וְהִגְדִּיל
  english_pob_choice: and became great
  chosen_spanish: y se engrandecía
  alternatives_spanish:
  - y crecía mucho
  - y se hacía grande
  - y se magnificaba
  lexicon: HALOT
  rationale: El hifil de גדל puede significar hacerse grande o engrandecerse. Se mantiene la tensión semántica sin forzar una lectura exclusivamente reflexiva ni reducirla a mera expansión cuantitativa.
theological_decisions:
- issue: Si וְהִגְדִּיל debe sonar reflexivo o simplemente resultativo
  english_pob_reading: and became great
  chosen_spanish_reading: y se engrandecía
  alternative_spanish_readings:
  - y se engrandeció
  - y se hacía grande
  - y se magnificaba
  rationale: La forma hebrea permite tanto la idea de crecer como la de engrandecerse. «Se engrandecía» conserva esa ambigüedad útil y no resuelve de antemano la valoración del texto, en línea con la política de preservar tensiones léxicas y teológicas.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto inglés: no se introdujeron cambios respecto del consenso auditado, y se preservó la ambigüedad de וְהִגְדִּיל en español sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se usó «carnero» para אַיִל, en coherencia con el valor zoológico del hebreo.
  - Se mantuvo el modismo de «mano» como símbolo de poder/dominio, como en el audit trail inglés.
  - Se eligió un registro bíblico contemporáneo y readable, sin calco servil del inglés.
