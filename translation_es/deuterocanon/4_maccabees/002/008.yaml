translation:
  language: es
  text: Por tanto, aun si alguno es amante del dinero, al vivir conforme a la ley refrena su propia manera de vivir, prestando a los necesitados sin interés, y cuando llega el séptimo año[a], condonando la deuda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cuando llegan las semanas»; alusión al ciclo legal de liberación de deudas en el séptimo año.
    reason: cross_reference
  - marker: b
    text: O «asumiendo la pérdida del préstamo»; el participio griego puede subrayar la pérdida financiera que implica remitir la deuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτίκα γοῦν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así pues
  - Por ello
  - Entonces
  lexicon: LSJ
  rationale: La expresión introduce una consecuencia inmediata del argumento anterior; «Por tanto» conserva bien ese valor inferencial en español formal y natural.
- source_word: τῷ νόμῳ πολιτευόμενος
  english_pob_choice: by living according to the law
  chosen_spanish: al vivir conforme a la ley
  alternatives_spanish:
  - viviendo según la ley
  - al conducirse por la ley
  - al ordenar su vida según la ley
  lexicon: LSJ
  rationale: πολιτεύομαι remite al modo de vivir o conducirse. «Al vivir conforme a la ley» expresa esa regulación práctica de la vida por la ley sin sonar forzado en español.
- source_word: φιλάργυρός
  english_pob_choice: money-loving
  chosen_spanish: amante del dinero
  alternatives_spanish:
  - codicioso
  - ávido de dinero
  - avaricioso
  lexicon: LSJ
  rationale: El griego denota literalmente amor al dinero. «Amante del dinero» preserva esa imagen lexical con transparencia; «codicioso» sería más interpretativo.
- source_word: βιάζεται τὸν ἑαυτοῦ τρόπον
  english_pob_choice: he constrains his own way
  chosen_spanish: se constriñe en su propio modo de vida
  alternatives_spanish:
  - se fuerza en su propia manera de ser
  - domina su propio modo de vida
  - reprime su propio impulso
  lexicon: LSJ
  rationale: La construcción sugiere auto-coacción o auto-control de la conducta. «Se constriñe en su propio modo de vida» mantiene la idea de forzarse a sí mismo a una conducta distinta de la inclinación natural.
- source_word: τοῖς δεομένοις
  english_pob_choice: to those in need
  chosen_spanish: a los necesitados
  alternatives_spanish:
  - a quienes lo necesitan
  - a los que piden
  - a los menesterosos
  lexicon: LSJ
  rationale: En este contexto de préstamo, δεόμενοι apunta a personas necesitadas. «A los necesitados» es la opción más clara y fiel en español contemporáneo.
- source_word: δανείζων χωρὶς τόκων
  english_pob_choice: lending ... without interest
  chosen_spanish: prestando ... sin interés
  alternatives_spanish:
  - dando préstamos ... sin usura
  - prestando ... libre de interés
  - haciendo préstamos ... sin interés
  lexicon: LSJ
  rationale: τόκος es interés de un préstamo. «Sin interés» comunica de manera directa y natural el sentido legal y económico del pasaje.
- source_word: τὸ δάνειον
  english_pob_choice: the debt
  chosen_spanish: la deuda
  alternatives_spanish:
  - el préstamo
  - lo prestado
  - la obligación
  lexicon: LSJ
  rationale: Aunque el sustantivo puede significar el préstamo, aquí el contexto de remisión sabática favorece el efecto jurídico de la obligación. «La deuda» expresa mejor ese resultado.
- source_word: τῶν ἑβδομάδων ἐνστασῶν
  english_pob_choice: when the seventh year comes
  chosen_spanish: cuando llega el séptimo año
  alternatives_spanish:
  - cuando llegan las semanas
  - cuando llegan los siete tiempos
  - cuando se cumple el ciclo de siete
  lexicon: LSJ
  rationale: La frase alude al ciclo sabático de años, no simplemente a «semanas» literales. «Cuando llega el séptimo año» hace explícita la referencia legal implícita en el griego.
- source_word: χρεοκοπούμενος
  english_pob_choice: canceling the debt
  chosen_spanish: cancelando la deuda
  alternatives_spanish:
  - remitiendo la deuda
  - condonando la deuda
  - asumiendo la pérdida del préstamo
  lexicon: LSJ
  rationale: El participio puede destacar la cancelación formal de la obligación o la pérdida económica que ello implica. «Cancelando la deuda» da el sentido principal en el contexto.
theological_decisions:
- issue: Alusión a la ley del año sabático en τῶν ἑβδομάδων ἐνστασῶν χρεοκοπούμενος
  english_pob_reading: The verse refers to remission of debts at the arrival of the seventh year, so the main text renders the legal sense explicitly.
  chosen_spanish_reading: El versículo alude a la remisión de deudas cuando llega el séptimo año, por lo que el texto principal la expresa de modo explícito.
  alternative_spanish_readings:
  - 'Una traducción más literal y oscura sería: «cuando llegan las semanas, cancelando la deuda»'
  - También podría entenderse como énfasis en la pérdida económica personal más que en la cancelación jurídica
  rationale: 'El griego es condensado y algo difícil, pero el contexto legal es claro: la persona dominada por la ley presta sin interés y renuncia al cobro en el tiempo de liberación sabática. Hacer explícita esa referencia preserva la fuerza del pasaje sin añadir doctrina ajena.'
  doctrine_reference: Principio de equivalencia óptima; conservar el sentido legal de la alusión sin sobreexplicación innecesaria.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió una formulación inferencial natural para αὐτίκα γοῦν, se mantuvo el matiz de auto-coacción en βιάζεται τὸν ἑαυτοῦ τρόπον y se explicitó el séptimo año como referencia sabática. También se conservó la alternativa semántica de χρεοκοπούμενος como posible énfasis en la pérdida financiera.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «ley» para νόμος por el contexto ético-jurídico del pasaje.
  - «Amante del dinero» preserva la imagen lexical de φιλάργυρος sin convertirla en un juicio más amplio como «codicioso».
  - «Sin interés» evita el arcaísmo o la connotación excesiva de «usura», que no es necesaria aquí.
  - La puntuación conserva una sola oración amplia, reflejando la sintaxis del original griego.
