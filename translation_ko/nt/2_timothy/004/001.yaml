id: 2TI.4.1
reference: 2 Timothy 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀Διαμαρτύρομαι ἐνώπιον τοῦ θεοῦ καὶ ⸂Χριστοῦ Ἰησοῦ⸃, τοῦ μέλλοντος κρίνειν ζῶντας καὶ νεκρούς, ⸀καὶ τὴν ἐπιφάνειαν αὐτοῦ καὶ τὴν βασιλείαν αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/001.yaml
  text: 'I solemnly charge you before God and Messiah Jesus, who is about to judge the living and the dead, and by his appearing and his kingdom:'
translation:
  language: ko
  text: '나는 하나님 앞에서, 그리고 산 자와 죽은 자를 심판하실 메시아[a] 예수 앞에서, 또한 그분의 나타나심[b]과 그분의 나라를 두고 그대에게 엄숙히 경고합니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
  - marker: b
    text: 글로사리 지침에 따라 ἐπιφάνεια는 「나타나심」으로 통일한다. 1:10에서는 그리스도의 첫 강림을, 본 절에서는 다시 오심을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διαμαρτύρομαι
  english_pob_choice: I solemnly charge you
  chosen_korean: 엄숙히 경고합니다
  alternatives_korean:
  - 엄히 명령합니다
  - 엄숙히 증언합니다
  lexicon: BDAG
  rationale: 2:14의 διαμαρτυρόμενος(엄히 경고하여)와 어휘 통일. 「엄숙히 경고하다」가 본문의 임종 직전 권면의 무게(법정적·맹세적 함의)를 담는다.
- source_word: ἐνώπιον τοῦ θεοῦ καὶ Χριστοῦ Ἰησοῦ
  english_pob_choice: before God and Messiah Jesus
  chosen_korean: 하나님 앞에서, 그리고 ... 메시아 예수 앞에서
  alternatives_korean:
  - 하나님과 메시아 예수 앞에서
  - 하나님과 메시아 예수의 면전에서
  lexicon: BDAG
  rationale: 한국어로 「~ 앞에서」를 두 인격에 각각 적용하여 그 법정적·맹세적 임재의 무게를 살린다.
- source_word: τοῦ μέλλοντος κρίνειν ζῶντας καὶ νεκρούς
  english_pob_choice: who is about to judge the living and the dead
  chosen_korean: 산 자와 죽은 자를 심판하실
  alternatives_korean:
  - 산 자와 죽은 자를 심판하시려는
  - 살아 있는 자들과 죽은 자들을 심판하실
  lexicon: BDAG
  rationale: μέλλω + 부정사는 「장차 ~하시려는」을 가리키며, 임박한 종말의 심판을 함의한다. 「심판하실」이 그 미래성과 확실성을 함께 담는다.
- source_word: τὴν ἐπιφάνειαν αὐτοῦ καὶ τὴν βασιλείαν αὐτοῦ
  english_pob_choice: by his appearing and his kingdom
  chosen_korean: 그분의 나타나심과 그분의 나라를 두고
  alternatives_korean:
  - 그분의 나타나심과 그분의 왕국을 걸고
  - 그분의 나타나심과 그분의 나라를 들어
  lexicon: BDAG
  rationale: 헬라어는 단순 대격이지만 본 절은 「~을 두고 맹세함」의 함의를 가지는 것이 자연스럽다. 「~을 두고」가 한국어 맹세 표현으로 자연스럽다.
theological_decisions:
- issue: 4:1-8 임종 직전 권면(엄숙한 부탁)의 무게 보존
  chosen_reading: 하나님 앞에서, 그리고 산 자와 죽은 자를 심판하실 메시아 예수 앞에서, 또한 그분의 나타나심과 그분의 나라를 두고 그대에게 엄숙히 경고합니다
  alternative_readings:
  - 하나님과 메시아 예수 앞에서 엄숙히 명령합니다
  - 하나님과 메시아 예수의 면전에서 엄히 부탁합니다
  rationale: 본 절은 4:1-8의 임종 직전 권면을 여는 절로, 바울이 자신의 죽음을 앞두고 디모데에게 남기는 마지막 부탁의 무게를 담는다. 「하나님 앞에서, 그리고 ~ 앞에서, 또한 ~을 두고」의 삼중 강조 구조를 한국어로도 분명히 살려, 본 권면이 평범한 권고가 아니라 종말의 심판자 앞에 선 자의 엄숙한 맹세적 부탁임을 드러낸다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; north-star — true and powerful meaning'
