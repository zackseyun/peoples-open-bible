translation:
  language: es
  text: El padre de un justo[a] se alegrará mucho; el que engendra un hijo sabio[b] se alegrará con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «el padre de un justo, regocijándose se regocijará». La repetición intensifica la alegría.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el que engendra a uno sabio». El hebreo no repite explícitamente «hijo» en esta segunda línea, aunque el sentido filial queda fuertemente sugerido por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גול יגול
  english_pob_choice: will greatly rejoice
  chosen_spanish: se alegrará mucho
  alternatives_spanish:
  - se gozará grandemente
  - se regocijará mucho
  - se alegrará de verdad
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + imperfecto intensifica la acción. En español, «se alegrará mucho» comunica esa intensificación de manera natural y fiel, sin sonar forzada por una repetición mecánica.
- source_word: אֲבִי צַדִּיק
  english_pob_choice: the father of a righteous man
  chosen_spanish: el padre de un justo
  alternatives_spanish:
  - el padre de un hombre justo
  - el padre del justo
  - el padre de una persona justa
  lexicon: HALOT
  rationale: El constructo indica «padre de» y צַדִּיק funciona aquí como adjetivo sustantivado. «Justo» preserva el valor moral básico y evita sobrecargar el español con una perífrasis innecesaria, aunque «un hombre justo» queda como alternativa válida si se quisiera explicitar el masculino.
- source_word: צַדִּיק
  english_pob_choice: righteous man
  chosen_spanish: justo
  alternatives_spanish:
  - hombre justo
  - persona justa
  - recto
  lexicon: HALOT
  rationale: «Justo» es el equivalente más natural y directo de צַדִּיק en este contexto sapiencial. Se evita «recto» porque aquí la categoría moral de justicia es más transparente en español.
- source_word: יולד
  english_pob_choice: he who fathers
  chosen_spanish: el que engendra
  alternatives_spanish:
  - el que es padre de
  - el que da origen a
  - el que ha engendrado
  lexicon: HALOT
  rationale: El participio expresa la acción de engendrar/fathering en relación paralela con «padre». «El que engendra» conserva la fuerza verbal del hebreo y la estructura proverbial, sin añadir información no presente en la línea.
- source_word: חָכָם
  english_pob_choice: a wise son
  chosen_spanish: un hijo sabio
  alternatives_spanish:
  - un sabio hijo
  - un hijo prudente
  - uno sabio
  lexicon: HALOT
  rationale: Aunque «hijo» no aparece explícitamente en el hebreo de este hemistiquio, el contexto filial y la lectura tradicional del paralelismo lo hacen explícito para claridad en español. «Hijo sabio» mantiene la relación familiar que el contexto presupone.
- source_word: וישמח בו
  english_pob_choice: will be glad in him
  chosen_spanish: se gozará en él
  alternatives_spanish:
  - se alegrará en él
  - se gozará por él
  - hallará gozo en él
  lexicon: HALOT
  rationale: שמח admite «gozarse/alegrarse». «Se gozará en él» preserva la preposición בו y el vínculo afectivo directo con el hijo, manteniendo un registro digno y bíblico en español.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés: conserva la intensificación del verbo doble, mantiene la relación paterno-filial del paralelismo y explicita «hijo» en la segunda línea por claridad contextual, como hizo la traducción inglesa auditada. No se observan revisiones aplicadas en el registro inglés reciente.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» solo cuando el texto lo requiera; aquí no aparece ninguno de los dos.
  - Se mantiene «justo» para צַדִּיק y no «recto», por ser la opción más natural en español bíblico sapiencial.
  - Se conserva la intensificación verbal con una construcción adverbial natural en español, evitando una repetición artificial.
  - Las notas al pie distinguen entre la intensificación del verbo y la explicitación contextual de «hijo» en la segunda línea.
