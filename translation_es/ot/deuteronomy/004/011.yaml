translation:
  language: es
  text: 'Y se acercaron y estuvieron al pie del monte, mientras el monte ardía con fuego hasta el corazón de los cielos[a]: oscuridad, nube y densa oscuridad[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al medio de los cielos». El hebreo dice literalmente «al corazón de los cielos», un modismo para el centro o la altura del cielo.
    reason: lexical_alternative
  - marker: b
    text: O «tinieblas densas» o «oscuridad profunda» para el término final.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרְבוּן
  english_pob_choice: you came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron cerca
  - se aproximaron
  lexicon: HALOT
  rationale: El verbo expresa movimiento de acercamiento. «Se acercaron» comunica bien la acción narrativa en español sin sonar rígido.
- source_word: וַתַּעַמְדוּן
  english_pob_choice: stood
  chosen_spanish: se pusieron
  alternatives_spanish:
  - estuvieron de pie
  - se mantuvieron de pie
  lexicon: HALOT
  rationale: El hebreo indica ponerse o permanecer en pie; en este contexto, «se pusieron» enlaza naturalmente con la llegada al monte y conserva la secuencia narrativa.
- source_word: תַּחַת הָהָר
  english_pob_choice: at the foot of the mountain
  chosen_spanish: al pie del monte
  alternatives_spanish:
  - debajo del monte
  - bajo el monte
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «debajo/bajo», el contexto topográfico favorece el sentido idiomático de estar en la base del monte. «Al pie del monte» es la equivalencia española más clara.
- source_word: וְהָהָר
  english_pob_choice: while the mountain
  chosen_spanish: mientras el monte
  alternatives_spanish:
  - y el monte
  lexicon: HALOT
  rationale: La conjunción introduce una circunstancia concurrente. «Mientras» expresa mejor en español la simultaneidad con la posición del pueblo.
- source_word: בֹּעֵר בָּאֵשׁ
  english_pob_choice: was burning with fire
  chosen_spanish: ardía en fuego
  alternatives_spanish:
  - estaba ardiendo con fuego
  - estaba en llamas
  lexicon: HALOT
  rationale: El participio señala una acción continua. «Ardía en fuego» mantiene la imagen y el aspecto durativo sin sobrecargar la frase.
- source_word: עַד לֵב הַשָּׁמַיִם
  english_pob_choice: up to the heart of the heavens
  chosen_spanish: hasta el corazón de los cielos
  alternatives_spanish:
  - hasta el corazón de los cielos
  - hasta el corazón del cielo
  - hasta lo más alto de los cielos
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «corazón» para no borrar la imagen original. «Cielos» refleja היטב el plural hebreo שָׁמַיִם y el registro bíblico.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - los cielos/los cielos
  lexicon: HALOT
  rationale: «Los cielos» es la equivalencia natural en español para el plural hebreo y mantiene el tono bíblico sin reducirlo a un simple «cielo» singular.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - negra oscuridad
  lexicon: HALOT
  rationale: Término estándar para el primer elemento de la tríada. «Oscuridad» es claro y fiel.
- source_word: עָנָן
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nube espesa
  - nube densa
  lexicon: HALOT
  rationale: El sustantivo básico es «nube»; el matiz de densidad queda reforzado por el término siguiente, por lo que no hace falta añadirlo aquí.
- source_word: וַעֲרָפֶל
  english_pob_choice: thick gloom
  chosen_spanish: espesa densa
  alternatives_spanish:
  - oscura espesura
  - densa oscuridad
  - espesa penumbra
  lexicon: HALOT
  rationale: El hebreo denota una oscuridad densa u opresiva, distinta de חֹשֶׁךְ. Se requiere una formulación española diferenciada; sin embargo, la forma elegida necesita ajuste estilístico en revisión para evitar repetición.
theological_decisions:
- issue: Imagen teofánica del monte en fuego, oscuridad, nube y densa oscuridad
  english_pob_reading: Preserve the concrete, awe-filled description without softening it into mere weather language.
  chosen_spanish_reading: Conservar la descripción concreta y sobrecogedora sin convertirla en simple meteorología.
  alternative_spanish_readings:
  - Reducir la secuencia a condiciones atmosféricas generales
  - Explicarla de modo interpretativo
  rationale: La escena es una manifestación divina con carga reverente y temible. La traducción mantiene la acumulación imagística y no la desactiva con paráfrasis explicativas.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto base en inglés y el cotejo de revisión muestran alta concordancia y ningún cambio necesario; la única cautela en español es evitar una expresión torpe para וַעֲרָפֶל, por lo que se mantiene la idea de oscuridad densa con nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aplique; aquí no aparece el tetragrámaton.
  - «Monte» se mantiene en singular, conforme al hebreo.
  - 'La tríada final se conserva con tres elementos diferenciados: oscuridad, nube y densidad/gloom.'
  - Se prefieren formas verbales naturales en español («se acercaron», «se pusieron») sin perder la secuencia narrativa.
