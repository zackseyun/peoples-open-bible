translation:
  text: 'I am the union and the dissolution[a];

    I am the abiding[d][c][b],

    and I am the dissolution.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Reading ⲡⲡⲱⲧⲣ ⲙⲛ ⲡⲕⲱⲗⲉⲃⲟⲗ as “the First and the Outside.” The compound likely
      reflects kol + ebol (outside). Some editors might prefer “the Outer.”
    reason: lexical_alternative
  - marker: b
    text: Monē (ⲙⲟⲛⲏ) can denote dwelling, abode, or rest. “Dwelling” chosen for concreteness;
      “Rest” is possible contextually.
    reason: lexical_alternative
  - marker: c
    text: ⲡⲕⲱⲗ is a set phrase in Coptic Gnostic literature for “the All,” i.e., the
      totality.
    reason: cultural_note
  - marker: d
    text: Or 'I am the First and the Outside[a];\nI am the Dwelling[b];\nand I am
      the All[c] — I am.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲡⲱⲧⲣ
  chosen: the First
  alternatives:
  - the Beginning
  - the Firstborn
  lexicon: Crum; Layton (protos/ōtr usage in Coptic)
  rationale: Compound likely from Greek prot-; the Thunder formula frequently pairs
    “I am the first …” with other identifications. “First” preserves the titulary
    quality without over-specifying.
- source_word: ⲡⲕⲱⲗⲉⲃⲟⲗ
  chosen: the Outside
  alternatives:
  - the Outer
  - the Exterior
  lexicon: Crum (kol = all; ebol = out/outside; compounded usage attested)
  rationale: Read as kol + ebol (“outside/exterior”). Rendering as “Outside” keeps
    the spatial paradox with the following line’s “Dwelling.”
- source_word: ⲧⲙⲟⲛⲏ
  chosen: the Dwelling
  alternatives:
  - the Abode
  - the Resting-place
  lexicon: 'Greek monē → Coptic loan (monē: abode/dwelling/rest)'
  rationale: monē in Gnostic Coptic regularly denotes an abode/dwelling/rest. “Dwelling”
    is clear, retains concreteness, and pairs antithetically with “Outside.”
- source_word: ⲡⲕⲱⲗ
  chosen: the All
  alternatives:
  - the Whole
  - the Universe
  lexicon: Crum (kol = all, entirety)
  rationale: Standard Gnostic/Coptic title for the totality. “All” preserves the technical
    resonance without overstretching to cosmology-language.
- source_word: ⲁⲩⲱ
  chosen: and
  lexicon: Crum
  rationale: Simple connective preserving parataxis of the source.
parallelism_check: Three “I am” declarations are retained, with the first holding
  a pair (“First … Outside”), followed by single predicates that echo and broaden
  the paradox (“Dwelling” vs. “Outside”) and culminate in the totalizing title (“the
  All”). The cadence preserves the stacked asyndetic identifications characteristic
  of Thunder.
voice_check: Declarative first-person divine/feminine-prophetic voice is preserved
  with repeated “I am.” The tone remains oracular and paradox-embracing rather than
  interpretively smoothed.
alignment_risk_note: Alignment confidence is only medium, and the first three OCR
  lines (ⲧⲉⲛⲧⲕⲧⲓⲥⲓⲥ … ⲧⲁⲧⲁ) are difficult to segment and do not map cleanly to the
