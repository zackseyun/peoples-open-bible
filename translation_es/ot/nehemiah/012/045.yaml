  rationale: Se ajustó מִשְׁמֶרֶת de 'responsabilidad' a 'deber' para reflejar mejor un encargo cultual asignado y lograr una collocación más natural con el verbo. También se resolvió la elipsis con 'lo hicieron' para que el español sea claro sin perder la sobriedad del original. Se mejoró levemente el orden final a 'de su hijo Salomón' por naturalidad española, manteniendo el mismo referente.
