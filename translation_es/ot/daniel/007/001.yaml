  text: בִּ/שְׁנַ֣ת חֲדָ֗ה לְ/בֵלְאשַׁצַּר֙ מֶ֣לֶךְ בָּבֶ֔ל דָּנִיֵּאל֙ חֵ֣לֶם חֲזָ֔ה וְ/חֶזְוֵ֥י רֵאשֵׁ֖/הּ עַֽל מִשְׁכְּבֵ֑/הּ בֵּ/אדַ֨יִן֙ חֶלְמָ֣/א כְתַ֔ב רֵ֥אשׁ מִלִּ֖ין אֲמַֽר־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/007/001.yaml
  text: In the first year of Belshazzar king of Babylon[a], Daniel saw a dream and visions of his head while on his bed. Then he wrote down the dream and told the sum of the matter.
  footnotes:
  - marker: a
    text: Or, more literally, 'Then he wrote the dream; he said the head of the words.' The Aramaic idiom likely means he recorded the main points or summary of the matter.
    reason: lexical_alternative
