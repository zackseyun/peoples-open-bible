translation:
  language: es
  text: Han tocado la trompeta[a] y han preparado todo, pero nadie va al combate, porque mi furor está contra toda su multitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el cuerno' o 'el cuerno de carnero'.
    reason: lexical_alternative
  - marker: b
    text: O 'contra toda su riqueza/abundancia', si הֲמוֹנָהּ se toma en el sentido de abundancia material más que de población.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּקְעוּ
  english_pob_choice: have blown
  chosen_spanish: han tocado
  alternatives_spanish:
  - han sonado
  - han soplado
  lexicon: HALOT
  rationale: תקע con un instrumento de guerra se refiere a tocar o hacer sonar la trompeta. En español, 'han tocado' comunica de forma natural la acción completada sin calcar la forma verbal hebrea.
- source_word: בַתָּקוֹעַ
  english_pob_choice: the trumpet
  chosen_spanish: la trompeta
  alternatives_spanish:
  - el cuerno
  - el cuerno de carnero
  lexicon: HALOT
  rationale: El contexto militar pide un instrumento de señalización. 'Trompeta' es la opción más natural en español y mantiene la función comunicativa de la señal.
- source_word: וְהָכִין הַכֹּל
  english_pob_choice: and made everything ready
  chosen_spanish: han preparado todo
  alternatives_spanish:
  - han preparado todo el equipo
  - han puesto todo en orden
  lexicon: HALOT
  rationale: כין en hiphil expresa preparar, disponer o dejar listo. 'Han preparado todo' conserva la amplitud de הַכֹּל y suena natural en español.
- source_word: וְאֵין הֹלֵךְ
  english_pob_choice: but no one goes
  chosen_spanish: pero nadie va
  alternatives_spanish:
  - pero no hay quien vaya
  - y nadie va
  lexicon: HALOT
  rationale: El valor existencial de אֵין con participio se transmite con 'nadie va', que expresa ausencia de respuesta sin añadir sujeto explícito.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - a la guerra
  - para la guerra
  lexicon: HALOT
  rationale: Aquí מלחמה apunta al acto concreto de salir al combate. 'Batalla' conserva esa concreción y sigue de cerca la solución inglesa de POB.
- source_word: חֲרוֹנִי
  english_pob_choice: my wrath
  chosen_spanish: mi furor
  alternatives_spanish:
  - mi ira
  - mi enojo ardiente
  lexicon: HALOT
  rationale: חרון denota ira encendida o furia ardiente. 'Furor' comunica bien el matiz de ardor y juicio; 'ira' sería posible, pero menos intensa.
- source_word: אֶל כָּל הֲמוֹנָהּ
  english_pob_choice: against all her multitude
  chosen_spanish: contra toda su multitud
  alternatives_spanish:
  - contra toda su muchedumbre
  - contra toda su riqueza
  lexicon: HALOT
  rationale: המון puede significar multitud, muchedumbre o abundancia/riqueza. Se mantiene 'multitud' para respetar la lectura principal de POB y la ambigüedad documentada, con 'contra' para rendir el valor adversativo de אֶל en contexto de ira.
theological_decisions:
- issue: Referente del sufijo femenino en הֲמוֹנָהּ
  english_pob_reading: Rendered neutrally as 'her multitude' without specifying the antecedent in the main text.
  chosen_spanish_reading: Se conserva 'su multitud' sin identificar expresamente el antecedente.
  alternative_spanish_readings:
  - la multitud de la ciudad
  - la multitud de la tierra
  - su riqueza
  rationale: El hebreo no nombra de manera explícita un antecedente suficiente para decidirlo sin añadir interpretación. Mantener 'su multitud' preserva la tensión y la ambigüedad del texto fuente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del audit trail inglés, que prefirió 'goes to battle' frente a 'goes to the battle'. En español se reflejó esa naturalidad con 'va a la batalla'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto para el nombre divino, pero este versículo no lo contiene.
  - '''Batalla'' se conserva de manera consistente con el contexto militar y con la opción inglesa POB.'
  - '''Multitud'' mantiene la ambigüedad documentada entre población y abundancia, sin resolverla en el texto principal.'
