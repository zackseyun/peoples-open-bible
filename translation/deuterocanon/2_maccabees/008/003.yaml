theological_decisions:
- issue: Possible allusion in 'the blood crying out to him'
  chosen_reading: Retain the concrete image 'the blood ... crying out to him' without explicating vengeance or justice in the main text.
  alternative_readings:
  - the bloodshed crying out to him
  - the blood of the slain crying out to him for vengeance
  rationale: The Greek states the image but does not explicitly add 'for vengeance' or identify the victims in this clause. Preserving the metaphor maintains the text's theological resonance without importing an interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
