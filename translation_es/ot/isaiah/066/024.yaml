review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido básico del hebreo: salida, observación de los cadáveres, rebelión contra Dios, gusano que no muere, fuego que no se apaga y repulsión universal. Sin embargo, no preserva con precisión el reparto de notas del rastro inglés: la nota [a] quedó anclada en «mí» cuando en realidad corresponde a «gusano», y la nota [b] fue cambiada indebidamente a una alternativa para «no se apagará» cuando en inglés [b] corresponde a דֵרָאוֹן («abominación / horror / cosa repulsiva»).'
  spanish_quality_summary: El español es claro, natural y digno. «Cadáveres», «se rebelaron contra mí», «su fuego no se apagará» y «toda carne» funcionan bien. «Verán» es aceptable aunque algo menos marcado que «mirarán/contemplarán». «Abominación» es comprensible y bíblico, pero conviene acompañarlo con la nota léxica correcta sobre la rareza y matiz de דֵרָאוֹן.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías u otros términos sensibles. «Toda carne» preserva adecuadamente el hebraísmo con nota cultural. «Los hombres» mantiene la decisión de género del POB inglés.
  issues:
  - severity: high
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota [a] del POB inglés explica תוֹלַעְתָּם («su gusano / su larva / su gusano») y debe ir anclada en «gusano», no en «mí».
  - severity: high
    issue: La nota [b] explica el elemento equivocado
    rationale: En el POB inglés la nota [b] da alternativas para דֵרָאוֹן («abhorrence / horror / something loathsome»), no para «no será apagado / no se extinguirá». El borrador altera la evidencia auditada.
  - severity: medium
    issue: Texto de la nota [a] poco pulido
    rationale: «una especie de gusano» es redundante e impreciso. Mejor «gusano, larva o gusano infestante / larva»; una formulación breve como «gusano o larva» evita torpeza.
