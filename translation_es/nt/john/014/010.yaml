translation:
  language: es
  text: ¿No crees que yo estoy en el Padre y el Padre está en mí? Las palabras que yo les digo no las hablo de mí mismo[a], sino que el Padre, que permanece en mí[b], hace sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por mi propia iniciativa» o «por mi propia autoridad». «De mí mismo» conserva la amplitud del griego, que puede abarcar origen, iniciativa o autoridad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que habita en mí». «Permanece» mantiene la duratividad de μένω con español natural y claro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύεις
  english_pob_choice: believe
  chosen_spanish: crees
  alternatives_spanish:
  - confías
  lexicon: BDAG
  rationale: En el contexto joánico, πιστεύω se traduce de manera natural por «creer». «Confiar» es posible, pero en español desplaza el énfasis cognitivo/relacional del texto y no refleja tan directamente la recurrencia del verbo en Juan.
- source_word: ἐν τῷ πατρὶ ... ἐν ἐμοί
  english_pob_choice: in the Father ... in me
  chosen_spanish: estoy en el Padre ... el Padre está en mí
  alternatives_spanish:
  - soy uno con el Padre ... el Padre es uno conmigo
  - estoy unido al Padre ... el Padre está unido a mí
  lexicon: BDAG
  rationale: Se conserva la preposición «en» para respetar el lenguaje de mutua inhabitación del griego. En español, la formulación con «estoy en» / «está en mí» resulta natural y mantiene la tensión cristológica sin convertirla en paráfrasis interpretativa.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - dichos
  lexicon: BDAG
  rationale: «Palabras» es la equivalencia más directa y natural en español. «Dichos» o «palabras dichas» sonarían más marcados y no aportan ventaja contextual aquí.
- source_word: λέγω
  english_pob_choice: say
  chosen_spanish: digo
  alternatives_spanish:
  - hablo
  - les digo
  lexicon: BDAG
  rationale: «Digo» refleja el contenido expresado por Jesús y mantiene la diferencia con λαλῶ más adelante. En español, «las palabras que yo les digo» suena natural y precisa.
- source_word: ἀπ’ ἐμαυτοῦ
  english_pob_choice: from myself
  chosen_spanish: de mí mismo
  alternatives_spanish:
  - por mi propia iniciativa
  - por mi propia autoridad
  - por mí mismo
  lexicon: BDAG
  rationale: '«De mí mismo» conserva la estructura de origen del griego y deja abierta la gama de sentido que el audit trail inglés preserva: origen, iniciativa o autoridad. La nota permite explicitar esa amplitud sin resolverla de antemano.'
- source_word: λαλῶ
  english_pob_choice: speak
  chosen_spanish: hablo
  alternatives_spanish:
  - hablo
  - digo
  lexicon: BDAG
  rationale: Se usa «hablo» para mantener cierta distinción respecto de λέγω («digo»). En español, «hablar» aquí comunica bien el acto de enunciar sin forzar una duplicación artificial.
- source_word: μένων
  english_pob_choice: who remains
  chosen_spanish: que permanece
  alternatives_spanish:
  - que mora
  - que habita
  - que permanece en mí
  lexicon: BDAG
  rationale: «Permanece» reproduce la duratividad de μένω y encaja con la sintaxis española. «Mora» o «habita» son posibles, pero menos neutrales para una traducción de amplia inteligibilidad.
- source_word: ποιεῖ
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  - cumple
  lexicon: BDAG
  rationale: «Hace» corresponde bien al verbo genérico ποιέω y evita sobretraducir. Mantiene la relación con el objeto «sus obras».
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus obras
  - sus hechos
  - sus acciones
  lexicon: BDAG
  rationale: «Obras» conserva el vocabulario joánico de ἔργα. El posesivo «sus» representa αὐτοῦ presente en el griego y evita neutralizar la referencia personal.
theological_decisions:
- issue: Mutua inhabitación del Padre y del Hijo
  english_pob_reading: Retain the literal relational language 'I am in the Father and the Father is in me' without paraphrastic expansion.
  chosen_spanish_reading: Conservar «yo estoy en el Padre y el Padre está en mí» sin ampliarlo a fórmulas explicativas.
  alternative_spanish_readings:
  - yo y el Padre somos uno
  - estoy unido al Padre y el Padre está unido a mí
  - el Padre vive en mí y yo en él
  rationale: La versión mantiene la relación recíproca exacta del texto y evita armonizarla con otras expresiones joánicas. Así conserva la tensión cristológica sin imponer una paráfrasis doctrinal.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); principio de preservar la tensión teológica del original
- issue: Agencia de las palabras y las obras de Jesús
  english_pob_reading: Translate 'I do not speak from myself' and 'the Father who remains in me does his works' in a way that preserves distinction of persons without implying separation of essence or denial of the Son's full deity.
  chosen_spanish_reading: «No las hablo de mí mismo» y «el Padre, que permanece en mí, hace sus obras» preservan distinción personal y cooperación sin separar esencia.
  alternative_spanish_readings:
  - no las hablo por mi propia autoridad
  - el Padre que habita en mí está haciendo sus obras
  - el Padre hace las obras por medio de mí
  rationale: La redacción conserva el contraste entre el decir de Jesús y la acción del Padre, sin convertirlo en una subordinación ontológica. Así se mantiene la lectura cristológica alta compatible con la doctrina clásica.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
translation_notes:
  revision_awareness: El tramo inglés auditado fue revisado y quedó sin cambios en el último pase; la propuesta española sigue de cerca ese estado estable, conservando la nota de alternativa para ἀπ’ ἐμαυτοῦ y la de μένων sin añadir soluciones interpretativas no documentadas.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula para la referencia a la primera persona divina.
  - Se usa «obras» para ἔργα, en consonancia con el vocabulario joánico.
  - Se evita «SEÑOR» u otra sustitución que oculte el lenguaje relacional del texto.
  - La distinción entre «digo» y «hablo» ayuda a reflejar λέγω / λαλῶ sin sonar forzada en español.
  - La puntuación interrogativa y la comas siguen el orden sintáctico natural del español estándar.
