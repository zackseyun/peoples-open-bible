translation:
  language: es
  text: Salomón tenía cuatro mil establos[a] para caballos y carros, y doce mil jinetes[b]; los apostó en las ciudades de carros y con el rey en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballerizas» o «puestos para caballos»; el hebreo se refiere a unidades de alojamiento para caballos.
    reason: lexical_alternative
  - marker: b
    text: El paralelo en 1 Reyes 4:26 dice «cuarenta mil establos», mientras que Crónicas aquí dice «cuatro mil».
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי לִשְׁלֹמֹה
  english_pob_choice: Solomon had
  chosen_spanish: Salomón tenía
  alternatives_spanish:
  - había para Salomón
  - pertenecía a Salomón
  lexicon: HALOT
  rationale: La construcción hebrea con היה + ל expresa posesión o existencia. En español, "tenía" comunica con naturalidad la idea de posesión sin perder el valor relacional del original.
- source_word: אַרְבַּעַת אֲלָפִים
  english_pob_choice: four thousand
  chosen_spanish: cuatro mil
  alternatives_spanish:
  - cuatro millares
  lexicon: HALOT
  rationale: Es el equivalente cardinal directo y claro en español.
- source_word: אֻרְיוֹת
  english_pob_choice: stalls
  chosen_spanish: establos
  alternatives_spanish:
  - caballerizas
  - puestos para caballos
  lexicon: HALOT
  rationale: El término hebreo designa unidades de alojamiento para caballos. "Establos" es un equivalente natural y transparente; "caballerizas" también es posible, pero puede sonar más regional o más específicamente equina en registro.
- source_word: סוּסִים וּמַרְכָּבוֹת
  english_pob_choice: for horses and chariots
  chosen_spanish: para caballos y carros
  alternatives_spanish:
  - de caballos y carros
  - para caballos de carro y carros
  lexicon: HALOT
  rationale: Se conserva la doble referencia del hebreo. "Carros" es el equivalente más natural de מרכבות en español bíblico contemporáneo.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף
  english_pob_choice: and twelve thousand
  chosen_spanish: y doce mil
  alternatives_spanish:
  - y doce millares
  lexicon: HALOT
  rationale: Traducción numérica directa y estándar.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - hombres de a caballo
  - caballería
  lexicon: HALOT
  rationale: El término puede referirse a hombres montados. En español, "jinetes" es natural y conserva la imagen de tropas montadas; "caballería" volvería más colectivo el término y "hombres de a caballo" sería más explícito pero menos fluido.
- source_word: וַיַּנִּיחֵם
  english_pob_choice: he stationed them
  chosen_spanish: los puso
  alternatives_spanish:
  - los estacionó
  - los colocó
  lexicon: HALOT
  rationale: Aunque "estacionó" refleja bien el sentido militar-administrativo, "los puso" sigue con fidelidad el valor básico del verbo y suena más natural en español sin perder el matiz de distribución en lugares designados.
- source_word: בְּעָרֵי הָרֶכֶב
  english_pob_choice: in the chariot cities
  chosen_spanish: en las ciudades de los carros
  alternatives_spanish:
  - en las ciudades de los carros de guerra
  - en las ciudades de la carrocería
  lexicon: HALOT
  rationale: Se preserva de modo bastante literal la relación constructa del hebreo. "Ciudades de los carros" mantiene la forma del original; "carros de guerra" explicita el contexto militar pero añade interpretación.
- source_word: וְעִם הַמֶּלֶךְ
  english_pob_choice: and with the king
  chosen_spanish: y con el rey
  alternatives_spanish:
  - y junto al rey
  lexicon: HALOT
  rationale: Corresponde de forma directa al hebreo, sin añadir el complemento implícito.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico moderno.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: la versión inglesa mantiene un enfoque de equivalencia óptima, con la nota lexical sobre אֻרְיוֹת y la lectura del paralelismo administrativo de la distribución de fuerzas. No hay revisiones aplicadas en el contexto inglés, y la concordancia de revisión es alta.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para el Tetragrámaton como norma del proyecto, aunque este versículo no lo contiene.
  - Se eligió una sintaxis española natural («Salomón tenía...») para reflejar la posesión hebrea sin volverla pesada.
  - «Carros» se emplea para מרכבות de acuerdo con el uso bíblico hispano amplio y la claridad moderna.
  - No se añadió nota textual, porque no hay variante textual relevante en el paquete fuente; la única variación documentada es lexical y de contexto paralelo en 1 Reyes 4:26.
