translation:
  language: es
  text: 'Así les dirán ustedes: “Los dioses[b] que no hicieron los cielos y la tierra perecerán[a] de la tierra y de debajo de los cielos.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “serán destruidos” o “desaparecerán”. El verbo arameo puede denotar perecer o ser borrados.
    reason: lexical_alternative
  - marker: b
    text: “Los dioses” puede referirse a ídolos, a supuestas deidades o a ambos; el texto deja amplia la referencia polémica.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּדְנָה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: El adverbio deíctico arameo introduce una fórmula exacta de lo que debe decirse. “Así” conserva la fuerza instruccional y suena natural en español bíblico contemporáneo.
- source_word: תֵּאמְרוּן
  english_pob_choice: you shall say
  chosen_spanish: dirán
  alternatives_spanish:
  - diréis
  - deberán decir
  - ustedes dirán
  lexicon: HALOT
  rationale: La forma verbal en contexto es una instrucción profética dirigida al hablante/comunidad. En español, “dirán” mantiene el carácter de mandato de habla sin volver la frase pesada con perífrasis obligativa.
- source_word: לְהוֹם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a esas personas
  - a ellos mismos
  lexicon: HALOT
  rationale: La preposición con pronombre de 3.ª plural se vierte de manera directa con el dativo español estándar.
- source_word: אֱלָהַיָּא
  english_pob_choice: the gods
  chosen_spanish: Los dioses
  alternatives_spanish:
  - los dioses falsos
  - las deidades
  lexicon: HALOT
  rationale: Se conserva el plural determinado con “los dioses”. No se resuelve en el texto principal si el referente son ídolos, supuestas deidades o ambos, siguiendo el alcance polémico del arameo.
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - los cuales
  - quienes
  lexicon: HALOT
  rationale: La partícula relativa se traduce con la conjunción relativa más natural en español.
- source_word: שְׁמַיָּא וְאַרְקָא
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra creada
  lexicon: HALOT
  rationale: Se conserva la merisma bíblica de creación. En español, “cielos” refleja mejor el plural arameo que “cielo”, aunque la expresión sea singularizada en algunos registros tradicionales.
- source_word: לָא עֲבַדוּ
  english_pob_choice: did not make
  chosen_spanish: no hicieron
  alternatives_spanish:
  - no hicieron surgir
  - no formaron
  - no crearon
  lexicon: HALOT
  rationale: El verbo arameo de “hacer” se traduce con el equivalente más directo. “Hacer” en español bíblico cubre bien la acción creadora sin sobreinterpretar con “crear”.
- source_word: יֵאבַדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  - se perderán
  lexicon: HALOT
  rationale: Se mantiene el sentido intransitivo de אבד y su tono profético. “Perecerán” preserva la ambigüedad entre desaparición y destrucción, que el inglés POB también sostuvo con nota.
- source_word: מֵאַרְעָא
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - fuera de la tierra
  - de la tierra misma
  lexicon: HALOT
  rationale: 'En español, “tierra” es la opción más natural y coherente con la merisma anterior; evita la posible restricción a “país”. '
- source_word: וּמִן תְּחוֹת שְׁמַיָּא
  english_pob_choice: and from under the heavens
  chosen_spanish: y de debajo de los cielos
  alternatives_spanish:
  - y desde debajo de los cielos
  - y de bajo los cielos
  lexicon: HALOT
  rationale: Se conserva la idea espacial de “debajo/under” con una formulación clara y respetuosa del paralelismo. “Cielos” mantiene la correspondencia con שְׁמַיָּא.
theological_decisions:
- issue: Referencia de “los dioses”
  english_pob_reading: The verse may refer to idols, supposed deities, or both; the text leaves the polemical reference broad.
  chosen_spanish_reading: El texto principal deja igualmente abierto si se trata de ídolos, deidades supuestas o ambas cosas.
  alternative_spanish_readings:
  - Los dioses = ídolos
  - Los dioses = seres divinos reales
  rationale: El arameo permite una referencia amplia; la traducción no debe estrecharla sin base textual. Por eso se conserva “los dioses” en el cuerpo principal y se documenta la amplitud semántica en nota.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
- issue: Sentido de יֵאבַדוּ
  english_pob_reading: will perish / be destroyed / vanish
  chosen_spanish_reading: perecerán
  alternative_spanish_readings:
  - serán destruidos
  - desaparecerán
  - serán borrados
  rationale: “Perecerán” conserva la tensión entre fin, ruina y desaparición sin fijar una sola matización. Esto corresponde al rango del verbo arameo y a la nota auditada del inglés POB.
  doctrine_reference: Lexical tension preserved; do not collapse semantic range.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto arameo y el audit trail inglés. En particular, adopta la formulación revisada “the heavens” como “los cielos”, preserva el verbo de creación “hacer” y conserva la ambigüedad de ‘los dioses’ sin resolverla en el texto principal.
  spanish_consistency_notes:
  - Se usó “cielos” de manera consistente para שְׁמַיָּא, en paralelo con “tierra” para אַרְעָא.
  - Se prefirió “perecerán” para mantener el rango semántico de אבד sin doctrinalizar la caída de los dioses.
  - No se introdujo “Señor” ni otras máscaras terminológicas no presentes en el verso.
  - La nota[a] está anclada en la palabra ‘dioses’ porque la alternativa léxica afecta directamente ese referente.
