translation:
  language: es
  text: 'Entonces David mandó decir a Joab: «Envíame a Urías el hitita[a]». Y Joab envió a Urías a David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Hitita’ traduce el etnónimo hebreo הַחִתִּי. ‘Heteo’ es una alternativa tradicional en algunas Biblias, pero ‘hitita’ es más transparente para el lector moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió un mensaje
  lexicon: HALOT
  rationale: El verbo שׁלח admite ‘enviar’ en sentido general. En español, ‘envió’ conserva la narración y permite que la orden aparezca en el discurso directo siguiente sin añadir una paráfrasis innecesaria como ‘envió un mensaje’.
- source_word: שְׁלַח
  english_pob_choice: Send
  chosen_spanish: Manda
  alternatives_spanish:
  - Envía
  - Despacha
  lexicon: HALOT
  rationale: El imperativo pide una orden directa. ‘Manda’ comunica bien el tono jussivo y, en español, suena natural en un contexto militar o administrativo sin perder la fuerza del mandato.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - de regreso a mí
  lexicon: HALOT
  rationale: La forma preposicional con sufijo de 1.ª persona singular significa simplemente ‘a mí’. Se evita ‘de regreso a mí’ porque esa idea no está explícita en el hebreo.
- source_word: אֶת אֽוּרִיָּה הַחִתִּי
  english_pob_choice: Uriah the Hittite
  chosen_spanish: Urías el hitita
  alternatives_spanish:
  - Uría el hitita
  - Urías el heteo
  lexicon: HALOT
  rationale: Se usa ‘Urías’ como forma española común del nombre y ‘hitita’ para el etnónimo estándar moderno. El marcador de objeto directo אֶת no se traduce, porque no aporta contenido léxico en español.
- source_word: וַיִּשְׁלַח יוֹאָב אֶת אֽוּרִיָּה אֶל דָּוִד
  english_pob_choice: And Joab sent Uriah to David
  chosen_spanish: Y Joab envió a Urías a David
  alternatives_spanish:
  - Entonces Joab envió a Urías a David
  - Y Joab mandó a Urías a David
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo ‘enviar’ para reflejar la secuencia narrativa del hebreo. ‘A David’ conserva la meta direccional del original.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el auditoría inglesa POB: mantiene la repetición de ‘enviar’, preserva el imperativo directo y evita añadir matices no explícitos como ‘de regreso’. No se detectaron problemas textuales o doctrinales en esta unidad.'
  spanish_consistency_notes:
  - Se mantiene la misma raíz verbal (‘envió’ / ‘envió’) para reflejar el paralelismo del hebreo.
  - Se conserva un registro sobrio y narrativo, adecuado para prosa bíblica en español.
  - La puntuación del discurso directo intenta reflejar la fluidez del inglés POB sin perder la estructura semítica del original.
