translation:
  language: es
  text: Él juzgará entre las naciones y arbitrará[a] para muchos pueblos; y convertirán sus espadas en rejas de arado y sus lanzas en podaderas. Nación no alzará espada contra nación[b], y ya no aprenderán la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reprenderá a muchos pueblos» / «fallará para muchos pueblos». El verbo hebreo puede tener fuerza judicial o correctiva.
    reason: lexical_alternative
  - marker: b
    text: 'O «ya no aprenderán guerra». El hebreo dice literalmente: «no aprenderán más guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַט
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - hará justicia
  - gobernará como juez
  lexicon: HALOT
  rationale: שׁפט conserva su fuerza judicial; en español, "juzgará" expresa bien la función de decidir entre partes sin añadir un matiz de gobierno que el contexto no exige de forma explícita.
- source_word: בֵּין הַגּוֹיִם
  english_pob_choice: between the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: '"Entre las naciones" preserva el marco forense y la relación recíproca que sugiere בֵּין, además de corresponder al paralelismo con "muchos pueblos".'
- source_word: וְהוֹכִיחַ
  english_pob_choice: arbitrate for many peoples
  chosen_spanish: arbitrará para muchos pueblos
  alternatives_spanish:
  - reprenderá para muchos pueblos
  - resolverá para muchos pueblos
  - fallará para muchos pueblos
  lexicon: HALOT
  rationale: La raíz יכח puede abarcar reprensión, decisión y arbitraje. Siguiendo la lectura auditada de la POB, "arbitrará" mantiene la fuerza judicial/correctiva sin añadir la palabra "disputas", que no está explícita en hebreo.
- source_word: לְעַמִּים רַבִּים
  english_pob_choice: for many peoples
  chosen_spanish: para muchos pueblos
  alternatives_spanish:
  - para muchos pueblos y naciones
  - respecto de muchos pueblos
  lexicon: HALOT
  rationale: '"Pueblos" reproduce עַמִּים y conserva la distinción con גּוֹיִם; "para" comunica adecuadamente la idea de actuación en favor de ellos o con respecto a ellos.'
- source_word: וְכִתְּתוּ
  english_pob_choice: they will beat
  chosen_spanish: forjarán
  alternatives_spanish:
  - golpearán
  - martillarán
  - aplastarán
  lexicon: HALOT
  rationale: Aunque literalmente כתת es "golpear/abatir", en este giro de refabricación de armas en herramientas, "forjarán" comunica de manera natural el proceso metalúrgico implícito en español sin abandonar la imagen material.
- source_word: חַרְבוֹתָם
  english_pob_choice: their swords
  chosen_spanish: sus espadas
  alternatives_spanish:
  - sus armas blancas
  - sus espadas de guerra
  lexicon: HALOT
  rationale: חֶרֶב es "espada" de forma directa; mantener "espadas" evita generalizar innecesariamente a "armas".
- source_word: לְאִתִּים
  english_pob_choice: into plowshares
  chosen_spanish: en azadones
  alternatives_spanish:
  - en arados
  - en rejas de arado
  lexicon: HALOT
  rationale: אִתִּים designa implementos agrícolas. En español, "azadones" hace visible la transformación a herramienta de cultivo, aunque no sea un equivalente técnico único; se conserva la imagen de utensilio agrícola reconocible.
- source_word: וַחֲנִיתוֹתֵיהֶם
  english_pob_choice: and their spears
  chosen_spanish: y sus lanzas
  alternatives_spanish:
  - y sus picas
  - y sus venablos
  lexicon: HALOT
  rationale: חֲנִיתוֹת son armas arrojadizas o de asta; "lanzas" es el equivalente moderno más natural y amplio en español.
- source_word: לְמַזְמֵרוֹת
  english_pob_choice: into pruning hooks
  chosen_spanish: en podaderas
  alternatives_spanish:
  - en tijeras de podar
  - en hoces de poda
  lexicon: HALOT
  rationale: מַזְמֵרוֹת son instrumentos de poda. "Podaderas" mantiene la relación con la viticultura y el trabajo agrícola, en un español claro y digno.
- source_word: לֹא יִשָּׂא גוֹי אֶל גּוֹי חֶרֶב
  english_pob_choice: Nation will not lift up sword against nation
  chosen_spanish: Nación no alzará espada contra nación
  alternatives_spanish:
  - Una nación no alzará espada contra otra nación
  - No alzará nación espada contra nación
  lexicon: HALOT
  rationale: La locución נשא חרב se refleja bien con "alzar espada". Se conserva la concisión del hebreo y el paralelismo repetitivo de "nación... nación".
- source_word: וְלֹא יִלְמְדוּ עוֹד מִלְחָמָה
  english_pob_choice: and they will not learn war anymore
  chosen_spanish: ni aprenderán más la guerra
  alternatives_spanish:
  - y no aprenderán más guerra
  - ni volverán a aprender la guerra
  - ni se entrenarán más para la guerra
  lexicon: HALOT
  rationale: למד מלחמה es literalmente "aprender guerra". "Aprenderán más la guerra" conserva la imagen hebrea y su sentido de preparación o práctica militar sin sobreespecificarla.
theological_decisions:
- issue: Sujeto implícito de la acción judicial
  english_pob_reading: Retain the pronoun 'he' without specifying the referent in the verse itself.
  chosen_spanish_reading: Conservar el sujeto implícito en "Él" sin nombrarlo explícitamente en la línea.
  alternative_spanish_readings:
  - Yahvé juzgará entre las naciones
  - El Señor juzgará entre las naciones
  rationale: El hebreo usa un verbo en tercera masculina singular sin sujeto expreso. En español hace falta expresar el sujeto, pero se mantiene el pronombre "Él" para no resolver de forma prematura la referencia teológica y conservar la tensión del contexto.
  doctrine_reference: Preservar la ambigüedad teológica donde el texto fuente no la explicita.
translation_notes:
  revision_awareness: La redacción española sigue la revisión auditada de la POB al preferir "arbitrará" para וְהוֹכִיחַ, evitando añadir "disputas". También conserva la imagen bélica-agricultural de los instrumentos transformados, con un español más natural que el calco directo.
  spanish_consistency_notes:
  - Se mantiene "naciones" para גּוֹיִם y "pueblos" para עַמִּים, preservando la distinción léxica del hebreo.
  - Se usa "espadas" y "lanzas" para las armas, en línea con el léxico concreto del original.
  - '"Él" conserva el sujeto implícito sin introducir un nombre divino que el versículo no menciona explícitamente.'
  - La expresión "ni aprenderán más la guerra" refleja el orden y la literalidad suficiente del cierre hebreo.
