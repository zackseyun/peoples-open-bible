revisions:
- from: Por tanto[a], he aquí, vienen días, dice Yahvé, en que haré oír contra Rabá de los amonitas el clamor de guerra, y se convertirá en un montículo de desolación, y sus ciudades hijas[b] serán incendiadas[c] por el fuego. Entonces Israel desposeerá a los que lo habían desposeído[d], dice Yahvé.
  to: Por tanto, he aquí, vienen días, dice Yahvé, en que haré oír contra Rabá de los amonitas el clamor de guerra[a], y se convertirá en un montículo de desolación, y sus ciudades hijas[b] serán incendiadas. Entonces Israel desposeerá a los que lo desposeyeron[c], dice Yahvé.
  rationale: La revisión corrige la colocación de las notas para que correspondan a las expresiones pertinentes, elimina una nota innecesaria, mejora la naturalidad de 'serán incendiadas' y refuerza el paralelismo del juego verbal final con una forma más directa en español. El resto del borrador es sustancialmente fiel al hebreo y a la auditoría inglesa.
