  to: 'Y todos los habitantes de la tierra son considerados como nada; él hace conforme a su voluntad entre la hueste[a] del cielo y entre los habitantes de la tierra; y no hay nadie que pueda detener su mano[b], ni decirle: «¿Qué has hecho?»'
  rationale: Se ajusta «actúa» a «hace» para reflejar mejor עָבֵד; se cambia «ejército del cielo» por «hueste del cielo» para preservar la amplitud de בְּחֵיל שְׁמַיָּא y alinearse con la revisión inglesa final; se mejora la puntuación con punto y coma; y se añade la nota idiomática sobre «su mano», que es una decisión léxica significativa documentada en la auditoría.
