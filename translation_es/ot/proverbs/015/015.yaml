base_translation:
  language: en
  yaml_path: translation/ot/proverbs/015/015.yaml
  text: All the days of the afflicted are bad[b][a], but a cheerful heart is a continual feast.
  footnotes:
  - marker: a
    text: Or 'the poor' for 'the afflicted'; the Hebrew עָנִי can refer to one who is poor, afflicted, or oppressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'a cheerful heart' for 'a good heart'; the Hebrew expression refers to an inward disposition of gladness or well-being.
    reason: lexical_alternative
