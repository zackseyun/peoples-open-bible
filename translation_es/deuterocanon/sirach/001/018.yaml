translation:
  language: es
  text: El temor de Yahvé[a] es el comienzo de la sabiduría, y ella sacia con la abundancia de su cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Derramó conocimiento y entendimiento, y exaltó la gloria de los que la poseen». El griego difiere marcadamente del hebreo conservado aquí y probablemente refleja una forma textual distinta.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת יְהֹוָה
  english_pob_choice: the fear of Yahweh / the LORD
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - la reverencia por Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula bíblica de temor como mezcla de asombro, reverencia y temor real. Dado el criterio del proyecto, el Nombre divino se vierte como «Yahvé» en español, no como una máscara reverencial.
- source_word: רֵאשִׁית
  english_pob_choice: beginning
  chosen_spanish: comienzo
  alternatives_spanish:
  - principio
  - primera parte
  lexicon: HALOT
  rationale: «Comienzo» expresa con naturalidad el valor temporal/inicial del sustantivo y evita una formulación demasiado técnica; mantiene la conexión con la fórmula sapiencial sin añadir una idea doctrinal ajena.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente normal y claro en español para el sustantivo sapiencial; preserva el registro literario sin perder inteligibilidad.
- source_word: וּתְרַוֵּה
  english_pob_choice: she satisfies
  chosen_spanish: sacia
  alternatives_spanish:
  - llena
  - empapa
  - riega abundantemente
  lexicon: HALOT
  rationale: El verbo sugiere abundancia y satisfacción plena. «Sacia» recoge mejor ese efecto que un mero «llena» y funciona de modo natural en español, aunque la personificación femenina siga implícita en el contexto.
- source_word: בְּרֹב
  english_pob_choice: with the abundance of
  chosen_spanish: con la abundancia de
  alternatives_spanish:
  - en la abundancia de
  - por la abundancia de
  lexicon: HALOT
  rationale: La preposición española reproduce la relación de medio/contenido y conserva la fuerza cuantitativa del hebreo.
- source_word: תְּבוּאָתָהּ
  english_pob_choice: her produce
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su cosecha
  - su rendimiento
  lexicon: HALOT
  rationale: «Fruto» es una solución idiomática y amplia para el campo semántico de produce/yield en español, manteniendo la imagen agrícola sin sonar forzado. El posesivo «su» conserva la personificación femenina del hebreo.
theological_decisions:
- issue: Selección de testimonio principal en un versículo con fuerte divergencia textual greco-hebrea
  english_pob_reading: The main text follows the extant Hebrew; the Greek alternative is preserved in a footnote because it differs sharply and likely reflects another textual form.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la lectura griega divergente se registra en nota porque representa una forma textual distinta o emparentada.
  alternative_spanish_readings:
  - 'Traducir el griego como texto principal: «Él/ella derramó conocimiento y entendimiento, y exaltó la gloria de los que la poseen».'
  - Intentar armonizar hebreo y griego dentro del mismo versículo.
  rationale: La política del proyecto da primacía al hebreo donde está conservado. Aquí la diferencia con el griego es demasiado grande para ocultarla; por eso se mantiene el hebreo en el cuerpo del texto y se documenta la variante griega sin forzar una armonización artificial.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando este se conserva; preservar honestamente la incertidumbre textual'
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine personification with 'she' and 'her.'
  chosen_spanish_reading: Se conserva la personificación femenina con «ella» y «su».
  alternative_spanish_readings:
  - Usar «ello» o una forma impersonal.
  - Reformular para evitar la personificación.
  rationale: El hebreo presenta la sabiduría como realidad personificada; además, el sufijo posesivo femenino del sustantivo favorece mantener esa referencia. En español, «ella/su» comunica el rasgo literario sin recargar el verso.
  doctrine_reference: 'DOCTRINE.md §4: precisión de género antes que neutralización no motivada'
translation_notes:
  revision_awareness: La redacción española sigue la última decisión revisada del POB en cuanto a la idea de «satisfies»; por eso se eligió «sacia» en lugar de una versión más débil o más literal como «llena». También se mantuvo la prioridad del hebreo frente al paralelo griego, tal como indica el expediente de divergencia textual mayor.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto para יהוה.
  - Se preserva la personificación femenina de la sabiduría con «ella» y «su».
  - «Sacia» refleja la plenitud del verbo hebreo y evita el calco mecánico de «satisface» cuando en español resulta menos natural en este contexto.
  - La nota textual queda anclada en el versículo con el marcador [a], siguiendo la divergencia documentada entre hebreo y griego.
