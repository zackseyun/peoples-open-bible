translation:
  language: es
  text: Su follaje era hermoso y su fruto abundante, y en él había alimento para todos. Debajo de él encontraban sombra las bestias del campo, y en sus ramas habitaban las aves de los cielos, y de él se alimentaba toda carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los seres vivientes». El arameo dice literalmente «toda carne», un modismo bíblico para todos los seres animados.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָפְיֵהּ
  english_pob_choice: its foliage
  chosen_spanish: su follaje
  alternatives_spanish:
  - sus hojas
  lexicon: HALOT
  rationale: El término arameo se refiere al conjunto de hojas o cobertura del árbol. «Follaje» conserva el sentido colectivo y suena natural en español bíblico actual.
- source_word: שַׁפִּיר
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - lindo
  lexicon: HALOT
  rationale: El adjetivo expresa belleza/lozanía. «Hermoso» es claro, digno y adecuado para describir el árbol.
- source_word: אִנְבֵּהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - su cosecha
  lexicon: HALOT
  rationale: El sustantivo denota el fruto o producto del árbol. «Fruto» es la equivalencia más directa y natural.
- source_word: שַׂגִּיא
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - grande
  - mucho
  - copioso
  lexicon: HALOT
  rationale: El adjetivo indica grandeza o abundancia. «Abundante» comunica bien la plenitud del fruto.
- source_word: מָזוֹן
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - sustento
  lexicon: HALOT
  rationale: El término significa comida o sustento. «Alimento» mantiene un registro natural y suficientemente amplio.
- source_word: לְכֹלָּא
  english_pob_choice: for all
  chosen_spanish: para todos
  alternatives_spanish:
  - para todos los seres
  - para todos los demás
  lexicon: HALOT
  rationale: La frase significa literalmente «para todos». En español, «para todos» es conciso y deja que el contexto amplíe el alcance.
- source_word: בֵהּ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - allí
  lexicon: HALOT
  rationale: La preposición indica que el alimento estaba en relación con el árbol; «en él» reproduce la referencia directa al árbol.
- source_word: תְּחֹתוֹהִי
  english_pob_choice: under it
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  - bajo su sombra
  lexicon: HALOT
  rationale: Es un término espacial de debajo/bajo. «Debajo de él» es claro y evita añadir «sombra» antes de que aparezca la idea del refugio.
- source_word: תַּטְלֵל
  english_pob_choice: found shade
  chosen_spanish: se refugiaban
  alternatives_spanish:
  - encontraban sombra
  - se cobijaban
  lexicon: HALOT
  rationale: El verbo está asociado con sombra o abrigo. «Se refugiaban» transmite bien la idea de resguardo bajo el árbol y funciona con el plural colectivo.
- source_word: חֵיוַת בָּרָא
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  lexicon: HALOT
  rationale: La expresión bíblica designa animales salvajes terrestres. «Las bestias del campo» conserva el tono y la imagen del original.
- source_word: בְעַנְפוֹהִי
  english_pob_choice: in its branches
  chosen_spanish: en sus ramas
  alternatives_spanish:
  - entre sus ramas
  - en sus boughs
  lexicon: HALOT
  rationale: El sustantivo designa ramas o boughs. «Ramas» es más natural en español y mantiene la imagen arbórea.
- source_word: ידרון
  english_pob_choice: dwelt
  chosen_spanish: habitaban
  alternatives_spanish:
  - moraban
  - alojaban
  lexicon: HALOT
  rationale: El verbo significa habitar, alojarse o permanecer. «Habitaban» conserva el tono elevado sin perder claridad.
- source_word: צִפֲּרֵי שְׁמַיָּא
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves de los cielos
  lexicon: HALOT
  rationale: La expresión semítica puede rendirse como «del cielo» o «de los cielos». «De los cielos» conserva mejor el plural del arameo y el registro solemne.
- source_word: וּמִנֵּהּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - a partir de él
  lexicon: HALOT
  rationale: La referencia es al árbol; «de él» expresa de modo natural la fuente de la alimentación.
- source_word: יִתְּזִין
  english_pob_choice: was fed
  chosen_spanish: se alimentaba
  alternatives_spanish:
  - era alimentada
  - era sustentada
  lexicon: HALOT
  rationale: El verbo denota ser nutrido o alimentado. «Se alimentaba» reproduce el sentido pasivo/medio de manera fluida en español.
- source_word: כָּל בִּשְׂרָא
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todos los seres vivientes
  - toda criatura
  lexicon: HALOT
  rationale: Se conserva el idiomático «toda carne» para mantener la textura bíblica y la correspondencia con el arameo literal.
theological_decisions:
- issue: Tratamiento del modismo כָּל בִּשְׂרָא
  english_pob_reading: all flesh, with a note that it can mean all living creatures
  chosen_spanish_reading: toda carne, con nota explicativa de que el modismo puede significar todos los seres vivientes
  alternative_spanish_readings:
  - todos los seres vivientes
  - toda criatura
  rationale: La traducción principal conserva el modismo bíblico, como hace el POB en inglés, para no diluir la textura intertextual. La nota aclara el alcance semítico sin reemplazar la expresión del texto.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto arameo y el audit trail inglés del POB, sin cambios relevantes respecto de la lectura aprobada; mantiene el modismo «toda carne» y la imagen de refugio, ramas y alimento, con una única nota aclaratoria equivalente a la del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «toda carne» por coherencia con el POB inglés y por su valor idiomático bíblico.
  - Se prefieren formas naturales en español («follaje», «alimento», «habitaban») sin perder el registro solemne.
  - «Los cielos» conserva el plural del arameo y armoniza con el estilo bíblico del pasaje.
