translation:
  language: es
  text: Porque él habló y levantó un viento de tempestad[a], y alzó sus olas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo surgir un viento de tempestad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: he spoke
  chosen_spanish: él habló
  alternatives_spanish:
  - dijo
  - mandó
  lexicon: HALOT
  rationale: אמר normalmente significa 'decir/hablar'. En este contexto poético, con Dios como sujeto implícito por el entorno inmediato, 'él habló' conserva la acción verbal sin forzar el matiz explícito de 'mandó'.
- source_word: וַיַּעֲמֵד
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - hizo surgir
  - hizo levantarse
  - causó que se alzara
  lexicon: HALOT
  rationale: 'El hifil de עמד tiene fuerza causativa: hacer que algo se alce o se ponga en pie. ''Levantó'' transmite esa causalidad de forma natural en español y mantiene la imagen de que el viento aparece/ se yergue.'
- source_word: רוּחַ סְעָרָה
  english_pob_choice: a storm wind
  chosen_spanish: un viento de tempestad
  alternatives_spanish:
  - un viento tempestuoso
  - un vendaval
  - una tormenta
  lexicon: HALOT
  rationale: La combinación constructa nombra un viento caracterizado por la tempestad. 'Viento de tempestad' conserva el sustantivo 'viento' y la cualidad tormentosa; 'tormenta' sola perdería ese elemento léxico.
- source_word: וַתְּרוֹמֵם
  english_pob_choice: it lifted up
  chosen_spanish: alzó
  alternatives_spanish:
  - levantó
  - elevó
  lexicon: HALOT
  rationale: רום expresa elevar o alzar. Como el sujeto femenino singular es רוּחַ, el viento sigue siendo el agente. 'Alzó' encaja bien con la imagen de olas que suben bajo la acción del viento.
- source_word: גַּלָּיו
  english_pob_choice: its waves
  chosen_spanish: sus olas
  alternatives_spanish:
  - sus ondas
  - las olas de ella
  - las olas del mar
  lexicon: HALOT
  rationale: El sufijo de tercera persona masculina singular se refiere naturalmente al mar implícito por el contexto. 'Sus olas' es la forma idiomática española más clara y preserva la relación posesiva sin necesidad de explicitar el antecedente.
theological_decisions:
- issue: Sujeto divino implícito
  english_pob_reading: The subject is rendered as 'he,' referring to God from the immediate context.
  chosen_spanish_reading: Se mantiene el sujeto implícito como 'él', refiriéndose a Dios según el contexto inmediato.
  alternative_spanish_readings:
  - un sujeto impersonal como 'se habló'
  - omitir el sujeto personal
  rationale: El hebreo presenta la acción como iniciativa soberana de Dios dentro del poema. 'Él' mantiene la fluidez narrativa y la referencia contextual sin añadir una interpretación más fuerte que el texto.
  doctrine_reference: Salmos 107:23-32; soberanía de Yahvé sobre el mar y la tempestad
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin copiarlo mecánicamente: se mantuvo la fuerza causativa del hifil, se preservó el sujeto divino implícito y se tradujo רוּחַ סְעָרָה con un sintagma español que conserve explícitamente ''viento''. No se aplicaron revisiones posteriores al inglés base.'
  spanish_consistency_notes:
  - Se usa 'él' para el sujeto implícito, coherente con el contexto del salmo y con la lectura auditada.
  - '''Yahvé'' no aparece en el texto de este versículo, pero el referente divino implícito se mantiene en la nota teológica.'
  - '''Sus olas'' conserva la posesión del hebreo sin forzar género gramatical en español.'
