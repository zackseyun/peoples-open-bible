translation:
  language: es
  text: Y cuando mi señor el rey se acueste con sus padres[a], mi hijo Salomón y yo seremos considerados culpables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pecadores». El término hebreo puede designar a personas consideradas culpables o responsables; aquí el contexto sugiere un estatus legal-político más que una descripción moral general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will
  chosen_spanish: Y ... seremos / será
  alternatives_spanish:
  - Entonces ... será
  - Y acontecerá que
  lexicon: HALOT
  rationale: En español, la construcción más natural para introducir la consecuencia o apódosis es una coordinación simple con futuro implícito en el contexto. 'Y cuando...' conserva la relación resultativa sin sonar forzado.
- source_word: כִּשְׁכַב
  english_pob_choice: when ... lies down
  chosen_spanish: cuando ... se acueste
  alternatives_spanish:
  - cuando ... haya muerto
  - cuando ... descanse
  lexicon: HALOT
  rationale: שׁכב con 'con sus padres' es un modismo de muerte. 'Se acueste' conserva la imagen hebrea del acostarse y permite que el complemento idiomático señale el sentido de morir.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi dueño el rey
  lexicon: HALOT
  rationale: La fórmula cortesana en español natural es 'mi señor el rey', que mantiene el tono deferente de la súplica y evita el calco 'mi maestro'.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres [difuntos]
  lexicon: HALOT
  rationale: El hebreo usa un modismo para unirse a los antepasados muertos. 'Con sus padres' reproduce el giro tradicional en español bíblico y mantiene la ambigüedad idiomática sin explicitar de más.
- source_word: וְהָיִיתִי אֲנִי
  english_pob_choice: I ... will be counted
  chosen_spanish: yo ... seremos contados
  alternatives_spanish:
  - yo ... seré considerada
  - yo ... quedaré
  lexicon: HALOT
  rationale: El contexto legal-político exige explicitar el valor de 'ser' como estado atribuido. 'Seremos contados' traduce la noción de ser tenidos por/considerados algo, como en la POB inglesa 'will be counted'.
- source_word: וּבְנִי שְׁלֹמֹה
  english_pob_choice: and my son Solomon
  chosen_spanish: yo y mi hijo Salomón
  alternatives_spanish:
  - yo y Salomón, mi hijo
  - yo y mi hijo, Salomón
  lexicon: HALOT
  rationale: '''Mi hijo Salomón'' conserva la relación filial y el nombre propio en un orden natural para el español.'
- source_word: חַטָּאִים
  english_pob_choice: offenders
  chosen_spanish: culpables
  alternatives_spanish:
  - pecadores
  - delincuentes
  - ofensores
  lexicon: HALOT
  rationale: En este contexto sucesorio, el término tiene fuerza jurídico-política más que una descripción moral general. 'Culpables' preserva el matiz de ser tenidos por responsables, sin imponer el sentido exclusivamente religioso de 'pecadores'.
theological_decisions:
- issue: Valor del modismo 'con sus padres' como eufemismo de muerte
  english_pob_reading: with his fathers
  chosen_spanish_reading: con sus padres
  alternative_spanish_readings:
  - con sus antepasados
  - cuando muera
  rationale: Se conserva el modismo hebreo porque el texto depende de ese lenguaje tradicional. La claridad del sentido queda asegurada por el conjunto de la frase y no requiere desambiguación interpretativa en el cuerpo del verso.
  doctrine_reference: Lenguaje bíblico sobre la muerte y la reunión con los antepasados; no implica una formulación doctrinal específica.
- issue: Sentido de חַטָּאִים como estatus legal/político, no solo moral
  english_pob_reading: will be counted as offenders
  chosen_spanish_reading: seremos contados como culpables
  alternative_spanish_readings:
  - seremos tenidos por pecadores
  - seremos considerados culpables
  rationale: La POB inglesa opta por 'offenders' y explica que el contexto sugiere un estatus legal-político. 'Culpables' comunica esa condición de responsabilidad/amenaza sin reducirla a una acusación moral abstracta.
  doctrine_reference: Responsabilidad humana y exposición a juicio; el pasaje no enseña aquí una doctrina sistemática sobre pecado en general.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura auditada de la POB inglesa y conserva la decisión clave de no moralizar חַטָּאִים. Se mantiene el modismo hebreo 'con sus padres' por su valor idiomático y por la concordancia con el análisis del texto fuente. No se introdujeron cambios de sentido respecto del último pase revisado, que permaneció sin modificaciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada cuando no aparece el Tetragrámaton en este versículo.
  - '''Mi señor el rey'' conserva el registro cortesano adecuado para la escena.'
  - '''Culpables'' mantiene la fuerza jurídico-política indicada por la auditoría inglesa.'
  - La puntuación y el orden sintáctico se ajustan al español moderno sin perder la estructura condicional temporal del hebreo.
