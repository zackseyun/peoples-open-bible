  - marker: a
    text: «Víboras» refleja el término más específico y peligroso; también podría traducirse «áspides» o «serpientes venenosas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para las cuales no hay encantamiento» o «no hay conjuro». El sentido es que no pueden ser dominadas por ese medio.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el objeto de «morderán» para reflejar fielmente אֶתְכֶם («a ustedes») con un español natural compatible con «ustedes»: «y los morderán». También se eliminó la nota c porque defendía una opción gramaticalmente incorrecta y no respondía a una ambigüedad real del hebreo.'
