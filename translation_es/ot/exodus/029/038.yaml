translation:
  language: es
  text: 'Esto es lo que ofrecerás sobre el altar: dos corderos de un año cada día, de continuo[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «harás sobre el altar». El verbo hebreo es amplio («hacer»), pero aquí se refiere a presentar la ofrenda sacrificial.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de un año», es decir, corderos de un año.'
    reason: lexical_alternative
  - marker: c
    text: O «diariamente, continuamente». La expresión indica una ofrenda diaria y regular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  english_pob_choice: Now this
  chosen_spanish: Ahora esto
  alternatives_spanish:
  - Y esto
  - Esto
  lexicon: HALOT
  rationale: La expresión introduce una instrucción nueva y apunta hacia adelante; «Ahora esto» conserva el valor discursivo sin sonar rígido en español.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - harás sobre el altar
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es amplio («hacer»), el contexto sacrificial y la mención del altar justifican «ofrecerás» como equivalente natural y cultual en español.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - en el altar sacrificatorio
  lexicon: HALOT
  rationale: «Sobre el altar» reproduce bien la relación espacial del hebreo y funciona con naturalidad en el registro bíblico español.
- source_word: כְּבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos machos
  - lambs
  lexicon: HALOT
  rationale: «Corderos» es el término más natural y reconocido en español bíblico para כְּבָשִׂים; el contexto sacrificial y la edad especificada aportan la precisión necesaria.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: one-year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - “hijos de un año”
  lexicon: HALOT
  rationale: La frase hebrea literal es idiomática; «de un año» comunica la edad requerida sin calco innecesario, manteniendo la especificación sacrificial.
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: HALOT
  rationale: Equivalencia directa del numeral.
- source_word: לַיּוֹם
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - por día
  lexicon: HALOT
  rationale: «Cada día» expresa de forma natural la distribución diaria del sacrificio.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - de continuo
  - sin cesar
  - regularmente
  lexicon: HALOT
  rationale: En contexto cultual, תָּמִיד indica una ofrenda regular y continua; «continuamente» preserva esa idea sin convertirla en una paráfrasis interpretativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el cierre revisado del POB en inglés, que prefirió mantener la idea sacrificial explícita («offer») y unir con más estrechez la frecuencia diaria con «continually». En español, se conservó esa relación con «cada día, continuamente», sin añadir puntuación que separe innecesariamente ambas expresiones.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - No se usa «SEÑOR» ni otras convenciones de ocultamiento del nombre divino, pues el versículo no contiene el Tetragrámaton.
  - La elección de «ofrecerás» preserva el sentido cultual sin traducir mecánicamente el verbo hebreo «hacer».
