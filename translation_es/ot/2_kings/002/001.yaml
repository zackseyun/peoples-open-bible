translation:
  language: es
  text: Sucedió[a] que, cuando Yahvé estaba por hacer subir a Elías al cielo[b] en un torbellino, Elías y Eliseo fueron desde Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y sucedió» o «Aconteció».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los cielos»; aquí se vierte «el cielo» por naturalidad en español en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el episodio de manera fluida. «Y sucedió» conserva el arranque discursivo sin arcaísmo excesivo y es natural en español bíblico moderno.
- source_word: בְּהַעֲלוֹת
  english_pob_choice: when ... was about to take ... up
  chosen_spanish: cuando ... estaba por hacer subir
  alternatives_spanish:
  - cuando ... subía
  - al subir
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal y, en contexto, una acción inminente. «Estaba por hacer subir» mantiene el matiz prospectivo y el movimiento de עלה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto para el nombre propio de Dios, en lugar de sustituirlo por un título.
- source_word: אֶת אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: a Elías
  alternatives_spanish:
  - a Elijah
  lexicon: HALOT
  rationale: El marcador de objeto directo introduce al personaje; en español bíblico estándar el nombre se vierte como «Elías».
- source_word: בַּסְעָרָה
  english_pob_choice: by a whirlwind
  chosen_spanish: en un torbellino
  alternatives_spanish:
  - por un torbellino
  - en una tempestad
  lexicon: HALOT
  rationale: סְעָרָה puede denotar tempestad/torbellino. Aquí el contexto inmediato de la ascensión de Elías favorece «torbellino»; la preposición ב se puede expresar de modo locativo/instrumental con «en» en español.
- source_word: הַשָּׁמָיִם
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - a los cielos
  - al firmamento
  lexicon: HALOT
  rationale: 'Aunque el hebreo es plural, en este contexto la subida se expresa de manera natural en español como destino singular: «al cielo». Esto conserva la referencia sin sobrecargar con una pluralidad innecesaria en español.'
- source_word: וַיֵּלֶךְ
  english_pob_choice: went on
  chosen_spanish: siguieron su camino
  alternatives_spanish:
  - fueron
  - siguió
  lexicon: HALOT
  rationale: El verbo indica continuación del desplazamiento narrativo. «Siguieron su camino» comunica bien la idea de marcha continua en español y preserva el movimiento de la escena.
- source_word: וֶאֱלִישָׁע
  english_pob_choice: and Elisha
  chosen_spanish: Elías y Eliseo
  alternatives_spanish:
  - Elías y Elisha
  lexicon: HALOT
  rationale: Se mantienen los nombres propios en su forma castellana tradicional y se coordinan conforme al sentido del hebreo, donde ambos personajes van juntos.
- source_word: מִן הַגִּלְגָּל
  english_pob_choice: from Gilgal
  chosen_spanish: desde Gilgal
  alternatives_spanish:
  - de Gilgal
  - fuera de Gilgal
  lexicon: HALOT
  rationale: מן expresa origen/punto de partida. «Desde Gilgal» reproduce con precisión el punto de salida y suena natural en español.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre personal de Dios revelado en el texto hebreo, evitando la sustitución por un título. La forma española escogida sigue el estándar del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'הַשָּׁמָיִם: destino celestial'
  english_pob_reading: into heaven
  chosen_spanish_reading: al cielo
  alternative_spanish_readings:
  - a los cielos
  rationale: El plural hebreo puede referirse al cielo/los cielos según contexto. Aquí la traducción española opta por el singular idiomático «al cielo» por claridad narrativa, sin hacer una afirmación doctrinal adicional.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: Se ha seguido el estado de revisión más reciente, marcado como sin cambios necesarios; la redacción española se ajusta al mismo marco de decisiones léxicas y teológicas del texto inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, coherente con el criterio del proyecto.
  - Se usó «Elías» y «Eliseo» como formas españolas habituales y reconocibles.
  - «Torbellino» conserva la fuerza del hebreo סְעָרָה y evita suavizar la imagen.
  - La coordinación verbal y de sujetos respeta la escena de viaje compartido desde Gilgal.
