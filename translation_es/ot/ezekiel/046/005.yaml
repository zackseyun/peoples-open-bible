translation:
  language: es
  text: Y la ofrenda de grano será de una efa con el carnero[a], y con los corderos una ofrenda de grano según lo que su mano pueda dar[b], y un hin de aceite con cada efa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para el carnero'; la preposición hebrea puede marcar asociación o asignación en las instrucciones sacrificiales.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la dádiva de su mano'', un modismo que significa según lo que puede dar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda
  - ofrenda de cereal
  - oblación
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה no es una ofrenda genérica, sino una ofrenda cultual de cereal/grano. En español, 'ofrenda vegetal' mantiene el valor técnico tradicional sin sonar excesivamente moderno, y evita perder la referencia a una ofrenda no animal.
- source_word: אֵיפָה
  english_pob_choice: an ephah
  chosen_spanish: una efa
  alternatives_spanish:
  - una medida efa
  - un efa
  lexicon: HALOT
  rationale: Es una medida seca técnica; se translitera para conservar la precisión cultual y la forma del original, como en el inglés POB.
- source_word: לָאַיִל
  english_pob_choice: with the ram
  chosen_spanish: con el carnero
  alternatives_spanish:
  - para el carnero
  lexicon: HALOT
  rationale: La preposición ל puede indicar asociación o asignación. 'Con el carnero' refleja mejor la relación de acompañamiento distributivo que el contexto sacrificial establece y sigue de cerca el matiz del inglés POB.
- source_word: לַכְּבָשִׂים
  english_pob_choice: with the lambs
  chosen_spanish: con los corderos
  alternatives_spanish:
  - para los corderos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior y el mismo matiz de asociación/atribución, sin forzar una equivalencia de cantidad fija que el hebreo no expresa aquí.
- source_word: מַתַּת יָדוֹ
  english_pob_choice: as much as his hand can give
  chosen_spanish: según la dádiva de su mano
  alternatives_spanish:
  - según lo que su mano pueda dar
  - según lo que él pueda dar
  - según sus medios
  lexicon: HALOT
  rationale: El hebreo usa un modismo concreto ('la dádiva de su mano'). En español, 'según la dádiva de su mano' preserva la imagen verbal y la tensión idiomática, aunque requiere cierta literalidad para no borrar el auditable paralelo hebreo.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: En contexto sacrificial, el término estándar en español es 'aceite'; el hebreo no especifica aquí un subtipo, así que no se añade 'de oliva'.
- source_word: הִין
  english_pob_choice: a hin
  chosen_spanish: un hin
  alternatives_spanish:
  - hin
  lexicon: HALOT
  rationale: Medida líquida técnica transliterada para conservar la precisión cultual y el carácter no equivalente del original.
- source_word: לָאֵיפָה
  english_pob_choice: with each ephah
  chosen_spanish: con cada efa
  alternatives_spanish:
  - por cada efa
  - para cada efa
  lexicon: HALOT
  rationale: Se sigue la revisión del inglés POB que prefirió 'with each ephah' como relación distributiva natural; en español, 'con cada efa' comunica la misma distribución sin introducir una idea de finalidad o conversión no presente en el hebreo.
translation_notes:
  revision_awareness: El texto sigue la línea revisada del inglés POB en la frase final, prefiriendo una relación distributiva natural equivalente a 'with each ephah' en lugar de una formulación que sugeriría dirección o mera destinación. También conserva la tensión del modismo hebreo 'la dádiva de su mano' en vez de suavizarlo demasiado, porque el audit trail inglés lo mantuvo de forma explícita.
  spanish_consistency_notes:
  - Se mantuvo 'ofrenda vegetal' para מִנְחָה en coherencia con el valor sacrificial técnico documentado en el paquete fuente.
  - Se transliteraron 'efa' e 'hin' para preservar unidades cultuales específicas.
  - Se conservó 'carnero' y 'corderos' en registros bíblicos comunes y comprensibles para lectores hispanos.
  - La puntuación y el orden siguen el paralelismo hebreo con un estilo publicable en español bíblico contemporáneo.
