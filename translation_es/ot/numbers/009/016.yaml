  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: continuación resumitiva («Así»), estado habitual pasado («era continuamente»), la nube como sujeto definido, cobertura del tabernáculo/la morada como referente de «lo», y la cautela de מַרְאֵה en «apariencia de fuego». La nota alternativa también preserva correctamente la opción léxica del inglés POB.'
  spanish_quality_summary: El español es claro y fiel, pero «era continuamente» suena algo rígido y poco idiomático en español bíblico natural. Además, «por la noche» es aceptable, pero «de noche» encaja mejor con la concisión del hebreo y la cadencia del versículo. Una leve mejora produce una lectura más natural sin perder precisión.
  glossary_alignment: 'No hay términos del glosario principal en disputa aquí. Las decisiones léxicas son consistentes con el proyecto: «la nube», «apariencia de fuego», y el pronombre no personificado para el tabernáculo/la morada. La nota conserva adecuadamente la alternativa «lo que parecía fuego».'
