- from: 'Como aves que vuelan, así Yahvé de los Ejércitos protegerá a Jerusalén: protegiendo y librando, pasando por alto[a] y rescatando.'
  to: 'Como aves que vuelan, así Yahvé de los Ejércitos protegerá a Jerusalén: protegiendo y librando, pasando de largo[a] y rescatando.'
