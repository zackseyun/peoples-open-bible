translation:
  language: es
  text: Y derribó todos sus linderos[a] y cortó sus arboledas sagradas[b]; y le había sido concedido destruir a todos los dioses de la tierra, para que todas las naciones adoraran solo a Nabucodonosor, y todas sus lenguas y todas sus tribus lo invocaran como dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fronteras» o «límites». El término griego puede referirse a marcas fronterizas o a demarcaciones territoriales.
    reason: lexical_alternative
  - marker: b
    text: O «bosquecillos sagrados»; el griego suele aludir a espacios arbolados asociados al culto.
    reason: lexical_alternative
  - marker: c
    text: O «lo llamaran dios». La expresión griega combina la idea de invocarlo con la de tratarlo como divino.
    reason: alternative_reading
lexical_decisions:
- source_word: κατέσκαψεν
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - demolió
  - arrasó
  - destruyó
  lexicon: LSJ
  rationale: El verbo expresa un acto de desmantelamiento destructivo; «derribó» comunica bien la acción sin forzar una imagen demasiado literal de excavación.
- source_word: ὅρια
  english_pob_choice: borders
  chosen_spanish: linderos
  alternatives_spanish:
  - fronteras
  - límites
  - territorios
  lexicon: LSJ
  rationale: En contexto de conquista, ὅρια puede referirse a límites o marcas fronterizas. «Linderos» conserva esa idea de demarcación territorial y suena natural en español bíblico contemporáneo.
- source_word: ἄλση
  english_pob_choice: sacred groves
  chosen_spanish: bosquecillos sagrados
  alternatives_spanish:
  - bosques sagrados
  - arboledas sagradas
  - sotos sagrados
  lexicon: LSJ
  rationale: El término puede designar espacios arbolados de culto. «Bosquecillos sagrados» mantiene la referencia cultual explícita que el inglés POB hizo visible con «sacred groves».
- source_word: ἐξέκοψεν
  english_pob_choice: cut down
  chosen_spanish: cortó
  alternatives_spanish:
  - taló
  - derribó
  - arrancó
  lexicon: LSJ
  rationale: Con ἄλση, el sentido natural es cortar árboles o arboledas. «Cortó» es conciso y fiel, sin añadir matiz excesivo.
- source_word: δεδομένον αὐτῷ
  english_pob_choice: it had been granted to him
  chosen_spanish: le había sido concedido
  alternatives_spanish:
  - le había sido dado
  - se le había dado
  - le fue concedido
  lexicon: LSJ
  rationale: La construcción perifrástica expresa algo otorgado a él. «Le había sido concedido» conserva el pasivo y la idea de concesión sin identificar explícitamente al concedente.
- source_word: ἐξολοθρεῦσαι
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - exterminar
  - borrar
  lexicon: LSJ
  rationale: Aunque el verbo es fuerte, aquí el objeto son los dioses de la tierra en un marco narrativo de iconoclasia imperial. «Destruir» mantiene la fuerza sin sonar biológicamente literal.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del mundo
  - de la tierra habitada
  lexicon: LSJ
  rationale: La expresión griega es amplia. «De la tierra» refleja de forma directa el alcance universal del texto y sigue la revisión inglesa que corrigió 'land' a 'earth'.
- source_word: λατρεύσωσι
  english_pob_choice: might worship
  chosen_spanish: adoraran
  alternatives_spanish:
  - sirvieran cultualmente
  - rindieran culto
  - sirvieran en adoración
  lexicon: LSJ
  rationale: En contexto religioso, λατρεύω implica rendir culto. «Adoraran» es la opción más clara y natural en español, aunque conserva suficientemente el sentido cultual.
- source_word: μόνῳ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: LSJ
  rationale: «Solo» expresa exclusividad de manera natural en español y corresponde al énfasis del griego.
- source_word: γλῶσσαι
  english_pob_choice: languages
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  - pueblos
  lexicon: LSJ
  rationale: El griego dice literalmente «lenguas»; en español también puede funcionar como metonimia de grupos lingüísticos. Se mantiene así la cercanía al original y la paridad con «tribus».
- source_word: φυλαὶ
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - clanes
  - linajes
  - pueblos
  lexicon: LSJ
  rationale: «Tribus» es la equivalencia directa y conserva el paralelismo con «lenguas».
- source_word: ἐπικαλέσωνται αὐτὸν εἰς θεόν
  english_pob_choice: might call on him as god
  chosen_spanish: lo invocaran como dios
  alternatives_spanish:
  - lo llamaran dios
  - invocaran a él como dios
  - lo reconocieran como dios
  lexicon: LSJ
  rationale: La frase combina invocación y tratamiento divino. «Lo invocaran como dios» conserva ambos componentes y evita traducir de modo demasiado doctrinal o suavizado.
theological_decisions:
- issue: Imperial self-deification in the final clause
  english_pob_reading: 'Translate the statement straightforwardly as imperial self-deification: ''call on him as god.'''
  chosen_spanish_reading: 'Traducir la afirmación de manera directa como pretensión de divinización imperial: «lo invocaran como dios».'
  alternative_spanish_readings:
  - lo llamaran un dios
  - lo invocaran como Dios
  - lo adoraran como dios
  rationale: El griego presenta a Nabucodonosor como objeto exclusivo de culto y como destinatario de una invocación en calidad de dios. En español, «como dios» preserva la mayúscula/minúscula teológica y evita suavizar la pretensión blasfema del relato.
  doctrine_reference: Preservar la tensión teológica del texto narrativo sin armonizarla con categorías doctrinales externas.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma en cuenta el auditoría inglesa: se mantiene la destrucción de límites y bosquecillos sagrados, se traduce τῆς γῆς con alcance universal («de la tierra»), y se conserva la fórmula de auto-deificación de Nabucodonosor sin convertirla en una lectura doctrinalmente suavizada.'
  spanish_consistency_notes:
  - Se usa «Dios» solo donde el griego y el contexto lo exigen; aquí la referencia final es a «dios» en sentido pagano, por eso va en minúscula.
  - Se prefiere «Yahvé» en textos que lo requieran, pero esta unidad no contiene el tetragrámaton.
  - «Adoraran» se emplea para λατρεύω en un contexto cultual; si futuras secciones distinguen servicio de adoración, se deberá revisar.
  - «Lenguas y tribus» mantiene el paralelismo semítico del griego y la cadencia bíblica en español.
