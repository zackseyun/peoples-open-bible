translation:
  language: es
  text: Yo también podría hablar como ustedes[a], si su vida[b] estuviera en lugar de mi vida; podría amontonar palabras contra ustedes y menear la cabeza ante ustedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablaría como ustedes». El hebreo expresa posibilidad o capacidad en un escenario hipotético.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su alma». נֶפֶשׁ puede significar alma, vida, persona o yo mismo según el contexto.'
    reason: lexical_alternative
  - marker: c
    text: «Menear la cabeza» es un gesto de burla o desprecio en este contexto.
    reason: cultural_note
lexical_decisions:
- source_word: גַּם אָנֹכִי
  english_pob_choice: I too
  chosen_spanish: Yo también
  alternatives_spanish:
  - también yo
  - yo igualmente
  lexicon: HALOT
  rationale: Conserva el énfasis de reciprocidad y la autoafirmación enfática del hebreo sin sonar forzado en español.
- source_word: כָכֶם אֲדַבֵּרָה
  english_pob_choice: could speak like you
  chosen_spanish: podría hablar como ustedes
  alternatives_spanish:
  - hablaría como ustedes
  - podría hablar igual que ustedes
  lexicon: HALOT
  rationale: La idea es potencial e hipotética; 'podría hablar' refleja bien el valor modal y 'como ustedes' conserva la comparación con el modo de hablar de los amigos.
- source_word: לוּ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si tan solo
  lexicon: HALOT
  rationale: Introduce una condición contrafactual de manera natural en español.
- source_word: יֵשׁ נַפְשְׁכֶם תַּחַת נַפְשִׁי
  english_pob_choice: your soul were in place of my soul
  chosen_spanish: su vida[b] estuviera en lugar de mi vida
  alternatives_spanish:
  - su alma estuviera en lugar de mi alma
  - ustedes estuvieran en mi lugar
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser 'alma', 'vida', 'yo mismo' o 'persona'; aquí 'vida' mantiene el paralelismo sin imponer una lectura espiritual ajena al contexto de intercambio de condición humana.
- source_word: אַחְבִּירָה
  english_pob_choice: I could heap up words
  chosen_spanish: podría amontonar palabras
  alternatives_spanish:
  - podría acumular palabras
  - podría juntar palabras
  lexicon: HALOT
  rationale: '''Amontonar'' conserva la imagen de acumulación verbal que la revisión inglesa fijó como mejor reflejo del idiom, y suena idiomático en español.'
- source_word: עֲלֵיכֶם בְּמִלִּים
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes con palabras
  - en su contra con palabras
  lexicon: HALOT
  rationale: El contexto es hostil y adversativo; en español 'contra ustedes' expresa ese valor con claridad, sin perder la agresividad verbal del hebreo.
- source_word: וְאָנִיעָה עֲלֵיכֶם בְּמוֹ רֹאשִׁי
  english_pob_choice: and shake my head at you
  chosen_spanish: y sacudir mi cabeza en su contra
  alternatives_spanish:
  - y mover la cabeza contra ustedes
  - y negar con la cabeza en su contra
  lexicon: HALOT
  rationale: El gesto es de burla o desprecio. 'Sacudir mi cabeza' mantiene la imagen corporal; 'en su contra' hace explícito el destinatario hostil de la mueca, ya que el giro literal 'at you' sería menos natural en español.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al preferir una imagen de acumulación ('heap up words') sobre una de simple combinación. La versión española también evita una transliteración rígida de נֶפֶשׁ y mantiene la tensión semántica entre 'alma' y 'vida' con una nota explícita.
  spanish_consistency_notes:
  - Se usó 'ustedes' para una lectura natural y contemporánea del plural en español latinoamericano.
  - Se mantuvo 'vida' en el texto principal para נֶפֶשׁ, con nota que preserva la alternativa 'alma'.
  - '''Sacudir mi cabeza'' se entiende como gesto de burla/desprecio, en línea con el audit trail inglés.'
  - No se introdujeron términos eclesiásticos ajenos al hebreo; el registro es sobrio y directo.
