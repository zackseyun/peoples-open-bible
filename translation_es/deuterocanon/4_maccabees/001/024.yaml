translation:
  language: es
  text: La ira[a] es una pasión común al placer y al dolor, si uno reflexiona sobre la ocasión en que le sobrevino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «La ira es una pasión común al placer y al dolor, si alguien considera cuándo le sobrevino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: LSJ
  rationale: En este contexto filosófico, θυμός nombra el estado afectivo de la ira. 'Ira' conserva la fuerza del término sin volverlo demasiado coloquial; 'enojo' es más leve y 'cólera' suena más intensamente retórico.
- source_word: πάθος
  english_pob_choice: passion
  chosen_spanish: pasión
  alternatives_spanish:
  - emoción
  - afecto
  - padecimiento
  lexicon: LSJ
  rationale: El pasaje usa lenguaje técnico sobre las pasiones; 'pasión' mantiene ese registro filosófico mejor que 'emoción'. Además, permite conservar la relación con 'placer' y 'dolor' sin diluir el sentido.
- source_word: κοινόν
  english_pob_choice: common
  chosen_spanish: común
  alternatives_spanish:
  - compartida
  - propia de ambos
  - común a
  lexicon: LSJ
  rationale: κοινόν con los genitivos expresa pertenencia o participación compartida. 'Común a' reproduce esa relación de modo natural en español y conserva la precisión del griego.
- source_word: ἡδονῆς
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - deleite
  - gozo
  lexicon: LSJ
  rationale: '''Placer'' es el equivalente normal en el par ético-filosófico con ''dolor''. ''Deleite'' o ''gozo'' moverían el registro hacia un matiz más afectivo o religioso que el del original.'
- source_word: πόνου
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - sufrimiento
  - pena
  - fatiga
  lexicon: LSJ
  rationale: Aquí el contraste con ἡδονή apunta al dolor experimentado, no al esfuerzo. 'Dolor' es la correspondencia más directa y clara en español.
- source_word: ἐὰν ἐννοηθῇ τις
  english_pob_choice: if one reflects
  chosen_spanish: si uno reflexiona
  alternatives_spanish:
  - si alguien considera
  - si se piensa
  - si uno considera
  lexicon: LSJ
  rationale: La construcción es genérica e impersonal. 'Si uno reflexiona' expresa bien el acto mental implícito y suena natural en español sin perder el matiz reflexivo.
- source_word: ὅτε
  english_pob_choice: the occasion when
  chosen_spanish: la ocasión en que
  alternatives_spanish:
  - cuando
  - el momento en que
  - en que
  lexicon: LSJ
  rationale: El griego introduce la circunstancia concreta del surgimiento de la ira. 'La ocasión en que' ayuda a vincular la reflexión con el momento en que la pasión irrumpe.
- source_word: αὐτῷ περιέπεσεν
  english_pob_choice: it came upon him
  chosen_spanish: le sobrevino
  alternatives_spanish:
  - le aconteció
  - le ocurrió
  - vino sobre él
  lexicon: LSJ
  rationale: περιπίπτω expresa que algo cae sobre o sobreviene a una persona. 'Le sobrevino' es una fórmula natural y fiel que conserva la idea de irrupción inesperada.
translation_notes:
  revision_awareness: La redacción española sigue la lectura revisada del inglés POB, que optó por 'common to' para κοινόν. En español se reflejó esa precisión con 'común a', manteniendo el tono filosófico del versículo y la construcción impersonal del condicional.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología confesional ajena al pasaje, porque aquí no hay vocabulario divino.
  - Se mantuvo 'pasión' en sentido técnico-filosófico, no como 'afecto' o 'emoción', para conservar la terminología del libro.
  - El orden de los miembros 'placer y dolor' sigue el paralelismo del griego y del POB inglés.
  - Se prefirió 'le sobrevino' por naturalidad en español y por su cercanía al valor de περιέπεσεν.
