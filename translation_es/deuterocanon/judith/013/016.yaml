    issue: Conector «porque» tras la fórmula de juramento
    rationale: En griego ὅτι aquí introduce el contenido/assertión del juramento. En español, «porque» puede leerse como causa de «vive Yahvé» y resulta menos natural que una puntuación que marque la asseveración.
  - severity: low
    issue: «mancha» para μίασμα
    rationale: Aunque no es imposible, «mancha» reduce la fuerza moral/cultual de μίασμα. «Contaminación» o «impureza» preserva mejor el sentido de defilement en español eclesial claro.
