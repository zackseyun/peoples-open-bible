translation:
  language: es
  text: Y Yahvé habló a Moisés y a Aarón en el monte Hor[a], en la frontera de la tierra de Edom, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; alternativamente transliterado «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En español narrativo, para introducir discurso divino directo, «habló» suena natural y conserva el carácter de acto de palabra. «Dijo» también es posible, pero «habló» sigue mejor el tono del POB inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, no un sustituto titular. «Yahvé» es la forma establecida en el proyecto para יְהוָה y mantiene la distinción teológica del Tetragrámaton.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición hebrea de dirección y destinatario se expresa naturalmente con «a» en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mose
  lexicon: standard proper name
  rationale: Nombre propio bíblico en su forma española estándar.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: Se mantiene la repetición explícita del hebreo con «y a», conservando claridad y ritmo sintáctico.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: standard proper name
  rationale: Nombre propio bíblico en su forma española estándar con tilde.
- source_word: בְּהֹר הָהָר
  english_pob_choice: at Mount Hor
  chosen_spanish: en el monte Hor
  alternatives_spanish:
  - en Hor, el monte
  - al monte Hor
  lexicon: HALOT
  rationale: El hebreo usa una localización; en español, «en el monte Hor» es la formulación más natural y fiel. Se evita la construcción más rígida «al monte Hor» porque aquí el lugar funciona como marco narrativo, no como simple destino.
- source_word: עַל גְּבֻל
  english_pob_choice: on the border
  chosen_spanish: junto al límite
  alternatives_spanish:
  - sobre la frontera
  - en la frontera
  lexicon: HALOT
  rationale: «עַל» con «gĕvul» puede indicar proximidad/posición respecto del borde territorial. «Junto al límite» refleja esa relación espacial de forma idiomática en español sin forzar una imagen de estar literalmente encima de la frontera.
- source_word: אֶרֶץ אֱדוֹם
  english_pob_choice: the land of Edom
  chosen_spanish: de la tierra de Edom
  alternatives_spanish:
  - del país de Edom
  - de la región de Edom
  lexicon: HALOT
  rationale: Se conserva el sustantivo «tierra» para reflejar el constructo hebreo אֶרֶץ y la designación territorial de Edom.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: Fórmula narrativa estándar que introduce el discurso inmediato del verso siguiente; «diciendo» mantiene la apertura sintáctica del hebreo.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en vez de reemplazarlo por un título. La forma española del POB es «Yahvé», coherente con la política del proyecto para el Tetragrámaton y transparente respecto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El análisis coincide con la última pasada revisada: no se registraron cambios necesarios y la decisión principal ya estaba estabilizada. La presente redacción adapta el audit trail inglés al español con los mismos valores léxicos y teológicos, especialmente en el nombre divino y la localización territorial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en todo el texto.
  - 'Se conservan los nombres propios bíblicos con ortografía española usual: Moisés, Aarón, Edom.'
  - La secuencia «y a» refleja explícitamente la coordinación hebrea וְאֶל.
  - «Diciendo» conserva la función de לֵאמֹר como introducción al discurso del verso siguiente.
