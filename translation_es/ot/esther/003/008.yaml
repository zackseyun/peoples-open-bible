revisions:
- from: 'Entonces Amán dijo al rey Asuero[a]: «Hay un pueblo singular, disperso y esparcido entre los pueblos, en todas las provincias de tu reino. Sus leyes son distintas de las de cualquier otro pueblo, y no obedecen las leyes del rey; por eso no conviene al rey dejarlos permanecer[b]».'
  to: 'Entonces Amán dijo al rey Asuero[a]: «Hay cierto pueblo, disperso y separado entre los pueblos en todas las provincias de tu reino. Sus leyes son distintas de las de cualquier otro pueblo, y no obedecen las leyes del rey; por eso no conviene al rey dejarlos permanecer[b]».'
  rationale: Se corrige «pueblo singular» a «cierto pueblo» para reflejar mejor la insinuación indefinida del hebreo y del POB inglés. Se cambia «disperso y esparcido» por «disperso y separado» para conservar mejor la doble formulación hebrea sin colapsarla en casi un sinónimo. También se suaviza la puntuación para un español más natural.
