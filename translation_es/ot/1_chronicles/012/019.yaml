base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/019.yaml
  text: And the Spirit clothed Amasai[a], chief of the Thirty, and he said, “We are yours, David, and with you, son of Jesse! Peace, peace to you, and peace to your helpers[c][b], for your God helps you.” Then David received them and made them chiefs of the troops.
  footnotes:
