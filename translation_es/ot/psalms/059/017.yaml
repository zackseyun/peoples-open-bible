  language: en
  yaml_path: translation/ot/psalms/059/017.yaml
  text: But I will sing of your strength[a]; I will sing aloud of your steadfast love in the morning, for you have been a stronghold for me[c][b], and a refuge in the day of my distress.
  footnotes:
