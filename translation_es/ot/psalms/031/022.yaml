translation:
  language: es
  text: ¡Bendito sea Yahvé, porque me ha mostrado maravillosamente su amor leal en una ciudad fortificada[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una ciudad sitiada»; la expresión hebrea puede referirse tanto a una ciudad fortificada como a una bajo asedio.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - ¡Bendito!
  - ¡Alabado sea!
  lexicon: HALOT
  rationale: Es una exclamación doxológica dirigida a Dios; en español, «Bendito sea» preserva bien el valor benedictorio del participio pasivo sin volverlo una mera descripción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término estándar del proyecto para el Nombre divino, manteniendo la referencia pactual explícita sin sustituirla por una máscara reverencial.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la bendición; «porque» es natural en español y conserva la relación causal del hebreo.
- source_word: הִפְלִיא
  english_pob_choice: has wonderfully shown
  chosen_spanish: ha mostrado maravillosamente
  alternatives_spanish:
  - ha hecho maravillas
  - ha mostrado de forma admirable
  - ha obrado maravillosamente
  lexicon: HALOT
  rationale: El hifil de פלא expresa hacer algo extraordinario o maravilloso. Con el objeto «su amor leal», «ha mostrado maravillosamente» transmite adecuadamente la manifestación extraordinaria del חסד sin perder la fuerza verbal.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su lealtad amorosa
  - su amor constante
  lexicon: HALOT
  rationale: חסד tiene fuerza de amor pactual, leal. «Amor leal» comunica esa fidelidad relacional con claridad en español, evitando reducir el término a mera emoción o a un solo matiz tradicional.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: El dativo señala al beneficiario de la acción divina; «hacia mí» suena natural con «ha mostrado» y mantiene el sentido de dirección/personalidad del favor recibido.
- source_word: בְּעִיר מָצוֹר
  english_pob_choice: in a besieged city
  chosen_spanish: en una ciudad fortificada
  alternatives_spanish:
  - en una ciudad sitiada
  - como en una ciudad fortificada
  - en una ciudad bajo asedio
  lexicon: HALOT
  rationale: La expresión es ambigua y puede aludir a una ciudad sitiada o fortificada. Siguiendo la revisión del POB en inglés y la forma más directa del hebreo, se prefiere «ciudad fortificada»; en nota se preserva la alternativa de lectura.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el Nombre propio en español para mantener la referencia pactual y la transparencia textual del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de בְּעִיר מָצוֹר
  english_pob_reading: in a fortified city
  chosen_spanish_reading: en una ciudad fortificada
  alternative_spanish_readings:
  - en una ciudad sitiada
  - en una ciudad bajo asedio
  - como en una ciudad fortificada
  rationale: La frase admite más de una lectura legítima. La traducción principal conserva una solución sobria y literal; la nota mantiene la alternativa para no borrar la tensión lexical del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «besieged city» a «fortified city» para reflejar más directamente la frase hebrea y evitar una interpretación no exigida por el texto. La versión española sigue esa revisión, pero conserva en nota la ambigüedad reconocida por la auditoría.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Nombre divino, coherente con el estándar del proyecto.
  - «Amor leal» conserva el valor pactual de חסד sin caer en una paráfrasis excesiva.
  - Se evita resolver por completo la ambigüedad de בְּעִיר מָצוֹר y se documenta la alternativa en nota.
  - La puntuación y el tono buscan ser publicables y reverentes en español latinoamericano contemporáneo.
