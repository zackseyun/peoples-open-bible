translation:
  language: es
  text: 'Judá y la tierra de Israel: ellos eran tus comerciantes; intercambiaban tu mercancía por trigo de Minit, pannag[a], miel, aceite y bálsamo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva pannag por ser un término hebreo raro y de significado incierto; las propuestas léxicas incluyen un dulce, una especia o un producto de pastelería.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה וְאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: Judah and the land of Israel
  chosen_spanish: Judá y la tierra de Israel
  alternatives_spanish:
  - Judá e Israel
  - Judá y la tierra de Israel
  lexicon: HALOT
  rationale: Se conserva la distinción explícita del hebreo entre Judá y la tierra de Israel, sin reducirla al simple binomio Judá e Israel. 'Tierra de Israel' es natural en español y sigue de cerca la forma del texto.
- source_word: רֹכְלָיִךְ
  english_pob_choice: your merchants
  chosen_spanish: tus comerciantes
  alternatives_spanish:
  - tus mercaderes
  - tus tratantes
  lexicon: HALOT
  rationale: El término apunta a personas dedicadas al comercio. 'Comerciantes' es claro y fiel en español; 'mercaderes' también sería posible, pero 'comerciantes' suena más transparente en español moderno.
- source_word: בְּחִטֵּי מִנִּית
  english_pob_choice: with wheat of Minnith
  chosen_spanish: con trigo de Minit
  alternatives_spanish:
  - con trigo de Minnith
  - con trigo procedente de Minit
  lexicon: HALOT
  rationale: Se mantiene la relación de procedencia o designación ligada al lugar propio, sin añadir especificaciones no explícitas. Se usa 'Minit' como forma castellana del topónimo, y 'trigo de Minit' preserva el giro constructo del hebreo.
- source_word: פַנַּג
  english_pob_choice: pannag
  chosen_spanish: pannag
  alternatives_spanish:
  - confección
  - dulce
  - especia
  - pastel
  lexicon: HALOT
  rationale: El vocablo es raro y de significado incierto. Se conserva la transliteración para no imponer una equivalencia insegura; esto mantiene la tensión lexical documentada por el POB en inglés.
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel
  - miel de abeja
  lexicon: HALOT
  rationale: El sentido básico es 'miel'. 'Miel' es la opción natural y precisa en español.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite
  - aceite de oliva
  lexicon: HALOT
  rationale: Aunque el referente frecuente sea aceite de oliva, el hebreo dice solo 'aceite'. Se conserva la generalidad del término, como en el audit trail inglés.
- source_word: צֹרִי
  english_pob_choice: balm
  chosen_spanish: bálsamo
  alternatives_spanish:
  - bálsamo
  - resina aromática
  lexicon: HALOT
  rationale: '''Bálsamo'' comunica bien el valor aromático y comercial del término sin sobrecargar el texto con una glosa interpretativa.'
- source_word: נָתְנוּ מַעֲרָבֵךְ
  english_pob_choice: trading for your merchandise
  chosen_spanish: comerciaban por tu mercancía
  alternatives_spanish:
  - daban tu mercancía
  - intercambiaban por tu mercancía
  lexicon: HALOT
  rationale: El hebreo expresa una relación comercial de intercambio. En español, 'comerciaban por tu mercancía' captura el sentido funcional de la cláusula sin forzar una paráfrasis excesiva y mantiene el énfasis en el intercambio.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'trading for your wares' a 'they traded for your merchandise'. En español se optó por 'comerciaban por tu mercancía', una forma más directa y natural que conserva el valor comercial del verbo y del sustantivo. Se mantuvo la enumeración de bienes y se evitó especificar más allá de lo que permite el hebreo.
  spanish_consistency_notes:
  - Se usa 'tierra de Israel' para preservar la distinción del hebreo.
  - Se mantiene la transliteración 'pannag' con nota, conforme a la incertidumbre lexical documentada.
  - '''Aceite'' se conserva genérico, sin añadir ''de oliva''.'
  - Se prefiere 'bálsamo' como equivalente estable de צֹרִי en español.
  - La puntuación con punto y coma refleja la estructura relacional del hebreo y el ajuste del inglés auditado.
