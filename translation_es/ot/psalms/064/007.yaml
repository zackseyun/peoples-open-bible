translation:
  language: es
  text: 'Ellos maquinan injusticias: «Hemos perfeccionado un esquema cuidadosamente oculto[a]». Y el interior de un hombre, y el corazón, son profundos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Buscan injusticias: “Hemos completado un plan cuidadosamente buscado/indagado.”» El hebreo es compacto y difícil, con juego repetido sobre la raíz חפשׂ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַֽחְפְּֽשׂוּ
  english_pob_choice: They devise
  chosen_spanish: maquinan
  alternatives_spanish:
  - buscan
  - investigan
  - idean
  lexicon: HALOT
  rationale: En este contexto poético, el verbo no describe una búsqueda neutral sino la elaboración de un plan injusto; «maquinan» conserva la idea de actividad mental y de trama intencional sin perder el matiz de complot.
- source_word: עוֹלֹ֗ת
  english_pob_choice: injustices
  chosen_spanish: injusticias
  alternatives_spanish:
  - maldades
  - iniquidades
  - abusos
  lexicon: HALOT
  rationale: עוֹלָה expresa injusticia o mal obrado. «Injusticias» mantiene el plural y la fuerza moral de la palabra en un español claro y actual.
- source_word: תַּ֭מְנוּ
  english_pob_choice: We have perfected
  chosen_spanish: Hemos perfeccionado
  alternatives_spanish:
  - Hemos terminado
  - Hemos completado
  lexicon: HALOT
  rationale: El verbo comunica la idea de llevar algo a su culminación. «Perfeccionado» sigue la lectura del POB inglés sobre una afirmación jactanciosa de un plan ya totalmente preparado.
- source_word: חֵ֣פֶשׂ מְחֻפָּ֑שׂ
  english_pob_choice: a carefully concealed scheme
  chosen_spanish: un esquema cuidadosamente oculto
  alternatives_spanish:
  - un plan bien oculto
  - un esquema celosamente escondido
  - una trama cuidadosamente escondida
  lexicon: HALOT
  rationale: La secuencia hebrea es compacta y juega con la raíz חפשׂ. «Esquema cuidadosamente oculto» conserva el sentido de plan preparado con esmero y a la vez escondido, sin forzar una paráfrasis más amplia que el texto.
- source_word: וְ/קֶ֥רֶב אִ֝֗ישׁ
  english_pob_choice: the inward part of a man
  chosen_spanish: el íntimo de un hombre
  alternatives_spanish:
  - el interior de un hombre
  - el ser interior de un hombre
  - lo más profundo de un hombre
  lexicon: HALOT
  rationale: קֶרֶב nombra el interior o lo más interno. «El íntimo» conserva el sustantivo concreto y permite reflejar la singularidad distributiva de אִישׁ sin neutralizarla.
- source_word: וְ/לֵ֣ב עָמֹֽק
  english_pob_choice: the heart, are deep
  chosen_spanish: el corazón, son profundos
  alternatives_spanish:
  - el corazón es profundo
  - y el corazón es profundo
  - y el corazón, profundo
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica y difícil. Se mantiene la copulativa plural «son» para respetar el efecto poético y la concentración proverbial del hebreo; «profundos» deja abierta la referencia a la profundidad interior mencionada en la línea previa.
theological_decisions:
- issue: Antropología y singular masculino en אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - cada hombre
  rationale: El hebreo usa אִישׁ en singular masculino con valor representativo. Se conserva esa forma en español para no aplanar el rasgo gramatical y el alcance antropológico del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: La dificultad compacta del paralelismo final
  english_pob_reading: And the inward part of a man, and the heart, are deep.
  chosen_spanish_reading: Y el íntimo de un hombre, y el corazón, son profundos.
  alternative_spanish_readings:
  - Y el interior de un hombre y el corazón son profundos
  - Y el ser interior de un hombre y el corazón son profundos
  rationale: El hebreo es elíptico y admite cierta ambigüedad sintáctica. La versión española conserva esa tensión en lugar de resolverla demasiado, reflejando la densidad poética del original.
  doctrine_reference: POB method note on poetic compression
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se mantuvo «scheme» como base para el primer hemistiquio final en vez de «plot», y se reflejó el singular de אִישׁ con «un hombre» en lugar de una forma distributiva más explícita. La nota conserva la alternativa del texto difícil y el juego de palabras con חפשׂ.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros contextos, pero este versículo no contiene el nombre divino ni una cita directa del tetragrámaton.
  - Se eligió «injusticias» para עוֹלֹת por ser claro y natural en español, evitando «iniquidades» por su tono más arcaico.
  - Se mantuvo el paralelismo poético con un verbo copulativo explícito en la última cola para hacer legible la elipsis hebrea sin eliminar su tensión.
