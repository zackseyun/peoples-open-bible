translation:
  language: es
  text: Toma venganza de este hombre y de su campamento, y que caigan a espada. Recuerda sus blasfemias[a], y no les concedas permanencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'insultos' o 'injurias'; el griego puede abarcar habla abusiva en general, pero aquí el contexto de oración favorece el sentido más religioso de 'blasfemias'.
    reason: lexical_alternative
  - marker: b
    text: O 'no les concedas descanso' o 'no les concedas estancia'; el griego puede referirse a permanencia, morada o reposo, y aquí también puede implicar no darles continuidad o supervivencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίησον ἐκδίκησιν
  english_pob_choice: Take vengeance
  chosen_spanish: Haz venganza
  alternatives_spanish:
  - Toma venganza
  - Ejecuta venganza
  - Haz justicia
  lexicon: LSJ
  rationale: El griego expresa literalmente 'haz venganza'; en español, 'haz venganza' conserva la fuerza imperativa y judicial del ruego sin añadir una paráfrasis innecesaria. 'Haz justicia' suavizaría indebidamente el matiz punitivo.
- source_word: ἐν τῷ ἀνθρώπῳ τούτῳ
  english_pob_choice: on this man
  chosen_spanish: de este hombre
  alternatives_spanish:
  - contra este hombre
  - sobre este hombre
  lexicon: LSJ
  rationale: En español, con 'venganza' la relación se expresa de forma natural con 'de' para indicar el objeto del acto pedido. 'Contra' es posible, pero 'de este hombre' suena más directo en la petición.
- source_word: παρεμβολῇ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - encampamento
  - hueste
  lexicon: LSJ
  rationale: '''Campamento'' comunica bien el sentido militar de παρεμβολή y es natural en español. ''Hueste'' sería más arcaizante y menos transparente.'
- source_word: πεσάτωσαν
  english_pob_choice: let them fall
  chosen_spanish: que caigan
  alternatives_spanish:
  - caigan
  - que ellos caigan
  - que sean derribados
  lexicon: LSJ
  rationale: La forma exhortativa 'que caigan' reproduce el valor de súplica/imprecación del verbo griego. 'Sean derribados' añade una pasiva que el texto no exige.
- source_word: ἐν ῥομφαίᾳ
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con espada
  - por medio de la espada
  lexicon: LSJ
  rationale: '''A espada'' es una equivalencia idiomática natural en español bíblico y conserva el sentido de muerte violenta en combate o juicio. ''Por la espada'' es también posible, pero algo más pesado.'
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Ten presente
  - Acuérdate
  lexicon: LSJ
  rationale: '''Recuerda'' mantiene el imperativo dirigido a Dios y su fuerza judicial/covenantal. ''Acuérdate'' sería viable, pero algo más coloquial.'
- source_word: δυσφημιῶν
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - insultos
  - injurias
  - maldiciones
  lexicon: LSJ
  rationale: En este contexto de oración contra un enemigo impío, 'blasfemias' preserva el peso religioso de δυσφημίαι y coincide con la lectura teológica documentada por la POB inglesa. 'Insultos' o 'injurias' rebajarían ese matiz.
- source_word: μονήν
  english_pob_choice: grant them no survival
  chosen_spanish: no les concedas permanencia
  alternatives_spanish:
  - no les concedas descanso
  - no les concedas estancia
  - no les concedas sobrevivencia
  lexicon: LSJ
  rationale: μονή puede referirse a permanencia, estancia o lugar de permanencia. Dado que la revisión inglesa corrigió la idea hacia 'survival', en español 'permanencia' mantiene la noción de no otorgarles continuación o estabilidad sin forzar un término técnico raro. 'No les concedas supervivencia' sería más literal, pero menos natural y más duro en español eclesial.
theological_decisions:
- issue: Cómo traducir δυσφημιῶν en una imprecación dirigida a Dios
  english_pob_reading: blasphemies
  chosen_spanish_reading: blasfemias
  alternative_spanish_readings:
  - insultos
  - injurias
  rationale: La petición está en un contexto de conflicto sagrado y no solo de agravio interpersonal. 'Blasfemias' conserva la dimensión de irreverencia contra lo santo, que la POB inglesa quiso preservar explícitamente.
  doctrine_reference: Primacía del sentido original y del peso teológico del vocabulario hostil en una oración imprecatoria.
- issue: Valor de μονήν en la cláusula final
  english_pob_reading: grant them no survival
  chosen_spanish_reading: no les concedas permanencia
  alternative_spanish_readings:
  - no les concedas descanso
  - no les concedas estancia
  - no les concedas sobrevivencia
  rationale: El griego puede apuntar a permanencia, lugar de estancia o continuación de vida/seguridad. La versión española mantiene la ambigüedad controlada entre permanencia y continuidad, evitando una reducción demasiado estrecha a 'descanso'.
  doctrine_reference: Respeto por la tensión léxica documentada; no resolver en exceso cuando el original admite más de una lectura.
translation_notes:
  revision_awareness: 'La POB inglesa revisó dos puntos: sustituyó ''Carry out vengeance'' por ''Take vengeance'' como colocación más natural, y cambió la cláusula final desde ''give them no rest'' a ''grant them no survival'' para reflejar mejor μονήν. La versión española sigue esa revisión y conserva la fuerza imprecatoria, evitando suavizarla.'
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; por tanto no se aplica la convención del nombre divino aquí.'
  - Se usa 'blasfemias' para mantener el registro religioso documentado por la POB inglesa.
  - '''Campamento'' sigue el valor militar de παρεμβολή en un contexto de guerra.'
  - Se evitó 'siervo' u otras lexicalizaciones ajenas al texto; el versículo no contiene δοῦλος ni términos equivalentes.
