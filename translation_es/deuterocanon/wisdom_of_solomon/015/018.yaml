  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: los idólatras rinden honor religioso incluso a los animales más repulsivos, y estos resultan peores al compararlos en insensatez con los demás. Sin embargo, ''reverencian'' suena menos natural en español bíblico actual que ''veneran'', y ''comparados en necedad'' es algo rígido; ''comparados por su necedad'' o ''en su necedad'' expresa mejor la relación del dativo ἀνοίᾳ en español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero puede ganar naturalidad y legibilidad. 'Hasta los animales más detestables' funciona bien. El principal ajuste estilístico es sustituir 'los reverencian' por 'los veneran', que conserva el alcance religioso amplio de σέβονται y suena más idiomático. También conviene suavizar la construcción participial para que no parezca calco.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de 'animales' y 'detestables' es adecuada. Para σέβονται, 'veneran' se alinea mejor con la nota inglesa ('revere / worship / venerate') y con el español eclesial natural que 'reverencian'.
  issues:
  - severity: medium
    issue: '''los reverencian'' es poco natural en español corriente'
    rationale: Aunque comprensible, 'reverenciar' como verbo transitivo aquí suena más forzado que 'venerar', y el propio registro de alternativas del inglés y del borrador favorece una opción más idiomática sin pérdida semántica.
  - severity: low
    issue: '''comparados en necedad con los demás'' suena calcado'
    rationale: La frase reproduce de cerca la estructura griega, pero en español resulta más fluida una formulación como 'comparados por su necedad con los demás' o 'comparados, en su necedad, con los demás'.
  revised_spanish_text: Hasta los animales más detestables[a] los veneran; porque, comparados por su necedad con los demás, son peores.
