base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/025.yaml
  text: How can one who guides the plow become wise[b][a], who drives the ox with a goad and whose concerns are with the cattle?
  footnotes:
  - marker: a
    text: Hebrew is somewhat difficult in its first clause; the Greek parallel reads more explicitly, 'How will one who holds a plow become wise ... driving oxen ... ?' The translation follows the Hebrew while using the Greek to clarify the agricultural sense.
    reason: alternative_reading
  - marker: b
    text: Or 'whose talk is about the cattle.' The Hebrew can point either to his concerns generally or more specifically to what he speaks about; the Greek parallel leans toward 'speech/account.'
