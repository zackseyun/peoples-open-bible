  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; nombre propio «Josafat» es normal en español bíblico. «Pavor» es una opción legítima para פַּחַד y la nota conserva alternativas útiles. No hay conflictos doctrinales mayores.'
