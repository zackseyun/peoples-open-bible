translation:
  language: es
  text: En aquel día las vírgenes hermosas y los jóvenes se desmayarán de sed[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desfallecerán de sed».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva con un demostrativo fuerte. «Aquel» reproduce mejor la distancia enfática del hebreo que «ese», y mantiene la naturalidad del español.
- source_word: תִּתְעַלַּפְנָה
  english_pob_choice: will faint
  chosen_spanish: se desmayarán
  alternatives_spanish:
  - desfallecerán
  - se desvanecerán
  - se swoon
  lexicon: HALOT
  rationale: El verbo hitpael expresa caer en debilidad o perder el sentido. «Se desmayarán» es claro y natural en español, y conserva el matiz de colapso físico sin exagerar el registro.
- source_word: הַבְּתוּלֹת
  english_pob_choice: virgins
  chosen_spanish: las vírgenes
  alternatives_spanish:
  - las muchachas
  - las doncellas
  - las jóvenes
  lexicon: HALOT
  rationale: «Vírgenes» preserva la especificidad léxica de בְּתוּלֹת. «Muchachas» o «jóvenes» suavizarían indebidamente el término y perderían la precisión del hebreo.
- source_word: הַיָּפוֹת
  english_pob_choice: beautiful
  chosen_spanish: hermosas
  alternatives_spanish:
  - bellas
  - bonitas
  - lindas
  lexicon: HALOT
  rationale: El adjetivo describe a las vírgenes. «Hermosas» mantiene un registro digno y claro; evita tanto arcaísmo como connotaciones demasiado coloquiales.
- source_word: וְהַבַּחוּרִים
  english_pob_choice: and the young men
  chosen_spanish: y los jóvenes
  alternatives_spanish:
  - y los muchachos
  - y los mozos
  - y los varones jóvenes
  lexicon: HALOT
  rationale: En este contexto, בַּחוּרִים refiere a hombres jóvenes en la plenitud de la fuerza. «Los jóvenes» es idiomático y suficiente en español; «varones jóvenes» sería más explícito pero más pesado.
- source_word: בַּצָּמָא
  english_pob_choice: from thirst
  chosen_spanish: de sed
  alternatives_spanish:
  - por la sed
  - a causa de la sed
  - de la sed
  lexicon: HALOT
  rationale: La preposición expresa la causa de su desfallecimiento. «De sed» es la construcción natural en español y preserva la relación causal del hebreo sin añadir explicación.
theological_decisions:
- issue: Alcance del juicio profético y del cuadro corporal de «desmayarse»
  english_pob_reading: The verse depicts literal physical collapse from deprivation; no doctrinal expansion beyond the image is added.
  chosen_spanish_reading: El versículo presenta un colapso físico real por la sed, sin ampliar el cuadro a una interpretación espiritual no indicada por el texto.
  alternative_spanish_readings:
  - se agotarán espiritualmente
  - sufrirán una debilidad interior
  rationale: El hebreo y la traducción inglesa describen una imagen corporal concreta. Mantener el sentido físico evita espiritualizar el texto sin base explícita.
  doctrine_reference: Lectura literal del lenguaje profético y del juicio corporal en Amos 8:13.
translation_notes:
  revision_awareness: El texto se mantiene alineado con la revisión inglesa más reciente, que no introdujo cambios al pasaje. La traducción española sigue esa lectura estable, conservando la equivalencia léxica principal y la nota alternativa para תִּתְעַלַּפְנָה.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «vírgenes» para preservar la especificidad léxica de בְּתוּלֹת.
  - «Se desmayarán» reproduce mejor el matiz físico de תִּתְעַלַּפְנָה que un verbo más débil como «se agotarán».
  - «De sed» conserva la causalidad del hebreo con español natural y publicado.
