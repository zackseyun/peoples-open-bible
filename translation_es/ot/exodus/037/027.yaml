  text: וּ/שְׁתֵּי֩ טַבְּעֹ֨ת זָהָ֜ב עָֽשָׂה ל֣/וֹ מִ/תַּ֣חַת לְ/זֵר֗/וֹ עַ֚ל שְׁתֵּ֣י צַלְעֹתָ֔י/ו עַ֖ל שְׁנֵ֣י צִדָּ֑י/ו לְ/בָתִּ֣ים לְ/בַדִּ֔ים לָ/שֵׂ֥את אֹת֖/וֹ בָּ/הֶֽם־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/037/027.yaml
  text: And he made for it two rings of gold under its rim[a], on its two side frames, on its two sides[b], as holders for poles with which to carry it.
  footnotes:
  - marker: a
    text: Or 'under its molding.' The Hebrew זֵר refers to the decorative border or rim around the top.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats two related expressions: ''on its two side-pieces, on its two sides.'' The translation preserves both rather than smoothing them away.'
    reason: lexical_alternative
