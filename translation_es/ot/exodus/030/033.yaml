translation:
  language: es
  text: Cualquiera que componga algo semejante, o ponga algo de ello sobre un extraño[a], será cortado de entre su pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre un forastero» o «sobre un no autorizado»; זָר en este contexto sacerdotal puede señalar a alguien fuera del uso sagrado permitido.
    reason: lexical_alternative
  - marker: b
    text: «Será cortado de entre su pueblo» es una fórmula legal de pacto; el texto no especifica aquí el modo exacto de la pena.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ אֲשֶׁר
  english_pob_choice: Whoever
  chosen_spanish: Cualquiera que
  alternatives_spanish:
  - Toda persona que
  - Quienquiera que
  lexicon: HALOT
  rationale: El hebreo usa una fórmula legal genérica. «Cualquiera que» conserva el valor indefinido y la fuerza normativa sin sonar arcaico en español.
- source_word: יִרְקַח
  english_pob_choice: compounds
  chosen_spanish: componga
  alternatives_spanish:
  - mezcle
  - combine
  - prepare
  lexicon: HALOT
  rationale: En este contexto de una mezcla sagrada, «componga» comunica la acción técnica de preparar una composición, con un registro más natural que un calco de «compounds».
- source_word: כָּמֹהוּ
  english_pob_choice: any like it
  chosen_spanish: algo semejante
  alternatives_spanish:
  - algo igual
  - algo parecido a ella
  - algo de la misma clase
  lexicon: HALOT
  rationale: La frase apunta a una composición de la misma clase que el aceite sagrado. «Algo semejante» preserva la restricción por semejanza sin forzar una equivalencia exacta que el hebreo no explicita.
- source_word: וַאֲשֶׁר יִתֵּן מִמֶּנּוּ
  english_pob_choice: or puts any of it
  chosen_spanish: o ponga de ello
  alternatives_spanish:
  - o aplique parte de ello
  - o dé de ello
  - o use parte de ello
  lexicon: HALOT
  rationale: נתן con מן sugiere tomar una porción y ponerla/aplicarla. «Ponga de ello» es breve y fiel al sentido operativo sin especificar más de lo que dice el texto.
- source_word: עַל זָר
  english_pob_choice: on a stranger
  chosen_spanish: sobre un extraño
  alternatives_spanish:
  - sobre un forastero
  - sobre un ajeno
  - sobre un no autorizado
  lexicon: HALOT
  rationale: En el contexto sacerdotal, זָר puede referirse a alguien no perteneciente al ámbito permitido. Dado el audit trail inglés y la revisión reciente, «extraño» conserva el término base sin borrar la connotación de alguien fuera del círculo sagrado; se mantiene una nota para la ambigüedad cultual.
- source_word: וְנִכְרַת
  english_pob_choice: shall be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será apartado
  - será excluido
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico de «ser cortado», que refleja el idioma jurídico-covenantal sin resolverlo en una forma más interpretativa.
- source_word: מֵעַמָּיו
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus parientes
  - de su comunidad
  lexicon: HALOT
  rationale: «De entre su pueblo» mantiene la imagen de remoción de la comunidad pactal y suena natural en español bíblico moderno.
theological_decisions:
- issue: Sentido de זָר en la ley del aceite sagrado
  english_pob_reading: stranger
  chosen_spanish_reading: extraño
  alternative_spanish_readings:
  - forastero
  - ajeno
  - no autorizado
  rationale: La revisión inglesa reciente prefirió «stranger» sobre «unauthorized person», y el español sigue ese giro con «extraño». En el contexto sacerdotal, el término conserva la idea de alguien fuera del ámbito permitido sin cerrar indebidamente la referencia a etnia o estatus social.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fórmula penal וְנִכְרַת מֵעַמָּיו
  english_pob_reading: shall be cut off from his people
  chosen_spanish_reading: será cortado de entre su pueblo
  alternative_spanish_readings:
  - será excluido de entre su pueblo
  - será eliminado de entre su pueblo
  - será muerto
  rationale: 'Se mantiene el modismo legal sin precisar el mecanismo del castigo. Esto preserva la tensión canónica: el texto declara la sanción covenantal, pero no explica aquí su forma exacta.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «an unauthorized person» por «a stranger» para reflejar más directamente זָר. Este borrador español sigue esa preferencia con «un extraño», pero conserva en nota la posibilidad contextual de «no autorizado» dentro del ámbito sacerdotal. También preserva el modismo penal «será cortado» sin explicitar el mecanismo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma estándar del nombre divino cuando no aparece explícitamente en este versículo, conforme al criterio global del proyecto.
  - Se mantiene el registro jurídico-cultual con «será cortado de entre su pueblo» para conservar la fórmula bíblica tradicional y su tensión interpretativa.
  - «Extraño» se usa como equivalente principal de זָר según la revisión inglesa, pero la nota deja visible la lectura cultual de exclusión de uso sagrado.
  - Se evita «SEÑOR» y «Cristo», que no pertenecen a este pasaje.
