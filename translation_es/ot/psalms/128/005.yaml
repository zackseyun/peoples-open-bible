revisions:
- from: Que Yahvé te bendiga[a] desde Sion, y que veas el bien[b] de Jerusalén todos los días de tu vida.
  to: Que Yahvé te bendiga desde Sion, y que veas la prosperidad[a] de Jerusalén todos los días de tu vida.
  rationale: Se cambia 'el bien' por 'la prosperidad' para alinearse con la decisión léxica principal auditada del POB y mejorar la naturalidad contextual en español. Se elimina la nota sobre 'desde Sion' por ser innecesaria, y se conserva en nota la amplitud semántica de טוּב.
