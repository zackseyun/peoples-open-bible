revisions:
- from: La espada está afuera[a], y la pestilencia y el hambre están adentro. El que esté en el campo morirá a espada, y el que esté en la ciudad[b], el hambre y la pestilencia lo consumirán.
  to: La espada está afuera[a], y la pestilencia y la hambruna están adentro. El que esté en el campo morirá a espada, y al que esté en la ciudad[b], la hambruna y la pestilencia lo consumirán.
  rationale: Se ajusta רָעָב a 'hambruna' para reflejar mejor el sentido de 'famine' en contexto de juicio colectivo, y se pule la segunda cláusula y la nota b para mayor naturalidad en español sin apartarse del hebreo ni de la auditoría inglesa.
