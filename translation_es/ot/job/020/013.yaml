translation:
  language: es
  text: Lo guarda, no lo deja ir, y lo retiene en su boca[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘en su paladar’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְמֹל
  english_pob_choice: spares
  chosen_spanish: lo perdona
  alternatives_spanish:
  - lo deja pasar
  - se apiada de ello
  - lo reserva
  lexicon: HALOT
  rationale: חמל puede significar ‘mostrar piedad’ o ‘perdonar/ahorrar’. En este contexto poético de aferrarse a algo deseable, ‘lo perdona’ comunica la idea de no querer destruirlo o desprenderse de ello, manteniendo el matiz de trato indulgente sin perder fluidez en español.
- source_word: עָלֶיהָ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - a ello
  - sobre ello
  lexicon: HALOT
  rationale: El pronombre femenino singular del hebreo remite al objeto metafórico del verso anterior. En español, un objeto directo neutro singulado por contexto es la opción más natural y no añade peso interpretativo.
- source_word: לֹא יַעַזְבֶנָּה
  english_pob_choice: does not let it go
  chosen_spanish: no lo deja ir
  alternatives_spanish:
  - no lo abandona
  - no lo suelta
  - no lo deja
  lexicon: HALOT
  rationale: עזב en este marco no es solo ‘abandonar’ en sentido abstracto, sino rehusar soltar algo. ‘No lo deja ir’ conserva la fuerza activa del verbo y funciona con naturalidad en español moderno.
- source_word: וְיִמְנָעֶנָּה
  english_pob_choice: holds it in his mouth
  chosen_spanish: lo retiene
  alternatives_spanish:
  - lo contiene
  - lo guarda
  - lo sostiene
  lexicon: HALOT
  rationale: מנע expresa contener, retener o impedir. El contexto de la boca sugiere no tragar ni soltar; ‘lo retiene’ reproduce esa contención física y semántica sin sobretraducir la imagen.
- source_word: בְּתוֹךְ חִכּוֹ
  english_pob_choice: in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en su paladar
  - dentro de su boca
  lexicon: HALOT
  rationale: חך significa literalmente ‘paladar’, pero en español ‘en su boca’ comunica la imagen con claridad y sin rigidez anatómica. Se conserva la posibilidad literal en la nota para no perder la alternativa léxica.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió ‘holds it in his mouth’ frente a ‘holds it back in his mouth’ para ajustarse más de cerca al hebreo. La versión española sigue esa línea, usando ‘lo retiene en su boca’ y evitando añadir un equivalente de ‘back’ que el texto fuente no exige.
  spanish_consistency_notes:
  - Se mantuvo ‘lo’ de manera impersonal y contextual para reflejar el referente metafórico femenino singular del hebreo sin forzar la concordancia en español.
  - Se prefirió ‘boca’ en el cuerpo del texto y ‘paladar’ en nota para respetar la imagen hebrea sin volverla innecesariamente técnica.
  - El tono es sobrio y poético, acorde con la sección de Job, sin recurrir a fórmulas eclesiásticas ajenas al hebreo.
