- issue: Scope of אֶרֶץ in an apocalyptic judgment context
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The broader context of Isaiah 24 depicts worldwide devastation rather than merely a regional judgment. Rendering אֶרֶץ as 'the earth' preserves the cosmic scope without importing extra doctrine.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
