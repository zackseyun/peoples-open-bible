    issue: «Así ha dicho» para כֹּה אָמַר
    rationale: En fórmula profética española, «Así dice» es más natural y más estándar que «Así ha dicho», sin perder fidelidad.
  - severity: medium
    issue: «serán quemados» atenúa el matiz de וְנִצְרְבוּ
    rationale: El hebreo apunta a ser chamuscados/abrasados por el calor; «serán abrasados» preserva mejor la imagen de rostros expuestos al fuego que «quemados».
  - severity: low
    issue: «todos los rostros» frente a כָל פָּנִים
