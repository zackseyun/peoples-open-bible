    rationale: El hebreo כיוצא בו y el griego κατὰ τὴν ἀξίαν αὐτοῦ apuntan a lo apropiado o debido. En español eclesial legible, 'como corresponde' o 'como es debido' comunica mejor esa noción.
  - severity: low
