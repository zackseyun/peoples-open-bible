    issue: '"el pan asignado para mí" es poco idiomático en español'
    rationale: Aunque semánticamente cercano, no suena natural ni reproduce tan bien la idea de porción correspondiente/allotted portion como "el pan que me corresponde".
  - severity: low
    issue: La nota [a] no preserva la alternativa léxica principal del inglés
    rationale: La auditoría inglesa conserva una alternativa para "lying words" ('deceitful speech'), pero la nota española ofrece una reformulación verbal completa ('Aparta de mí...') en lugar de una alternativa léxica enfocada.
  revised_spanish_text: Aparta de mí la falsedad y las palabras mentirosas[a]; no me des pobreza ni riquezas; susténtame con el pan que me corresponde[b].
