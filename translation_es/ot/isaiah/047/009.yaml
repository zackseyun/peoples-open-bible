review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del versículo y mantiene el futuro profético, ''viudez'' y ''el gran poder de tus encantamientos''. Sin embargo, falla en dos puntos importantes frente a la evidencia fuente y la auditoría inglesa: (1) שְׁכֹל se ha vertido como ''desolación'', lo cual desplaza el sentido específico de ''bereavement'' / quedar privada, especialmente con matiz de pérdida de hijos; y (2) la lectura principal documentada para ב en las cláusulas finales es concesiva (''in spite of''), pero el español principal dice ''en medio de'', que cambia la relación semántica y no preserva la decisión auditada.'
  spanish_quality_summary: El español es fluido y digno, pero 'desolación' resulta semánticamente demasiado amplio y 'en medio de' suena más circunstancial que concesivo. 'En plena medida' es comprensible, aunque 'en toda su plenitud' o 'plenamente' serían opciones más idiomáticas; aun así, no es un problema grave. Conviene reparar el texto principal para reflejar mejor el sentido y mantener la legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en nombres divinos o títulos. Sí hay desalineación léxica con la decisión inglesa para שְׁכֹל ('bereavement') y con la decisión teológica/semántica sobre la preposición ב en las frases finales, que debe conservarse como concesiva en el cuerpo principal, dejando las otras posibilidades en nota.
  issues:
  - severity: high
    issue: '''Desolación'' para שְׁכֹל no preserva el sentido de ''bereavement''.'
    rationale: שְׁכֹל apunta a privación por pérdida, a menudo de hijos, no a ruina general. 'Desolación' amplía y difumina el campo semántico documentado por la auditoría inglesa.
  - severity: high
    issue: '''En medio de tus muchas hechicerías'' no refleja la lectura principal concesiva documentada.'
    rationale: La auditoría POB eligió 'in spite of' por la fuerza retórica del contexto. 'En medio de' introduce una idea locativa/circunstancial distinta y ya no preserva la decisión exegética principal.
  - severity: low
    issue: La nota [a] está anclada en 'vendrán', pero explica una alternativa de כְּתֻמָּם.
    rationale: El marcador debería aparecer en la frase que traduce 'en plena medida' / 'completamente', no en el verbo inicial.
  revised_spanish_text: 'Pero estas dos cosas te vendrán en un momento, en un solo día: duelo por hijos y viudez. En plena medida[a] vendrán sobre ti[b], a pesar de tus muchas hechicerías y del gran poder de tus encantamientos.'
  revised_footnotes:
  - marker: a
    text: 'O: ''completamente'' / ''por completo''.'
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como 'a causa de tus muchas hechicerías y del gran poder de tus encantamientos' o 'con tus muchas hechicerías y con el gran poder de tus encantamientos'.
    reason: alternative_reading
  revision_rationale: Se reemplazó 'desolación' por 'duelo por hijos' para reflejar mejor שְׁכֹל como privación/bereavement con el matiz contextual de pérdida filial. Se cambió 'en medio de' por 'a pesar de' para preservar la lectura concesiva documentada en la auditoría inglesa. También se reubicó la nota textual de כְּתֻמָּם al lugar correspondiente.
