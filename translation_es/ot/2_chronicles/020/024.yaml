- from: Cuando Judá llegó al mirador sobre el desierto[a], se volvieron hacia la multitud, y he aquí que eran cadáveres tendidos en tierra, y no había sobreviviente.
  to: Cuando Judá llegó al mirador sobre el desierto, se volvieron hacia la multitud, y he aquí, allí había cadáveres[a] tendidos en tierra, y no había ningún sobreviviente.
  rationale: Se corrige el anclaje de la nota para que corresponda a la frase explicada, y se mejora la naturalidad del español en la cláusula deíctica/existencial sin apartarse del hebreo ni de la auditoría inglesa. También se suaviza la expresión final para una lectura más idiomática.
