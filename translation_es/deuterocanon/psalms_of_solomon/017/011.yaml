translation:
  language: es
  text: Dios no tuvo misericordia de ellos. Buscó diligentemente su descendencia[a] y no dejó ni uno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su semilla» o «sus descendientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐλέησεν
  english_pob_choice: God did not have mercy on them
  chosen_spanish: Dios no tuvo misericordia de ellos
  alternatives_spanish:
  - Dios no los perdonó
  - Dios no los compadeció
  - Dios no los tuvo por dignos de misericordia
  lexicon: BDAG
  rationale: ἐλεέω expresa misericordia o compasión; en este contexto de juicio, el español natural y fiel es 'no tuvo misericordia de ellos'. Evita confundir el verbo con 'perdonar' o con un simple 'dejar pasar'.
- source_word: ἐξερεύνησεν
  english_pob_choice: searched out
  chosen_spanish: Investigó
  alternatives_spanish:
  - Buscó diligentemente
  - Rastreó
  - Examinó
  lexicon: BDAG
  rationale: El verbo comunica una búsqueda minuciosa. 'Investigó' conserva la idea de indagación exhaustiva, aunque en español puede sonar menos narrativa que 'buscó diligentemente'; se mantiene por claridad y brevedad en esta frase de juicio.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - semilla
  - descendientes
  lexicon: BDAG
  rationale: Aquí σπέρμα se refiere a posteridad, no a semilla literal. 'Descendencia' preserva el sentido genealógico sin sonar técnico ni arcaico. Se evita 'semilla' en el texto principal por posible ambigüedad en español.
- source_word: οὐκ ἀφῆκεν αὐτῶν ἕνα
  english_pob_choice: did not leave one of them
  chosen_spanish: no dejó uno de ellos
  alternatives_spanish:
  - no dejó a uno solo de ellos
  - no dejó ni uno de ellos
  - no dejó ni uno solo
  lexicon: BDAG
  rationale: La construcción griega expresa totalidad. 'No dejó uno de ellos' reproduce la sobriedad del original y conserva la fuerza absoluta de la negación; en español puede entenderse como 'no dejó a ninguno'.
theological_decisions:
- issue: Misericordia vs. perdón o simple ausencia de rescate
  english_pob_reading: God did not have mercy on them
  chosen_spanish_reading: Dios no tuvo misericordia de ellos
  alternative_spanish_readings:
  - Dios no los perdonó
  - Dios no los compadeció
  - Dios no los dejó
  rationale: La lectura inglesa revisada insiste en misericordia, no en 'spare'. El español debe preservar ese matiz covenantal/judicial sin suavizarlo. 'No tuvo misericordia' mantiene la tensión del juicio y evita confundir ἐλέησεν con φείδομαι.
  doctrine_reference: Salmo de juicio; distinción lexical entre ἐλεέω y φείδομαι
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que corrigió la antigua tendencia a traducir ἐλεέω como ''spare''. La frase española conserva la decisión final de la POB inglesa: misericordia explícita, no ''ahorrar'' ni ''perdonar''. También se respetó la equivalencia de σπέρμα como posteridad/descendencia en lugar de una lectura literal de ''semilla''.'
  spanish_consistency_notes:
  - Se usa 'Dios' de forma consistente para θεός.
  - '''Descendencia'' mantiene la referencia genealógica de σπέρμα.'
  - La negación total de 'no dejó uno de ellos' conserva el énfasis del griego sin añadir un sujeto implícito.
