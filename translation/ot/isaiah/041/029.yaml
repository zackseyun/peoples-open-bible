theological_decisions:
- issue: Referent of the denunciation
  chosen_reading: The verse condemns idols and the products associated with them as worthless and unreal.
  alternative_readings:
  - The verse condemns both the idol-makers and their idols together
  rationale: The immediate context is a polemic against idols and their inability to act or predict. The plural suffixes can encompass the whole idol system, but the final noun 'their cast images' makes the anti-idol focus explicit. The translation keeps the wording broad enough not to over-resolve the referent.
