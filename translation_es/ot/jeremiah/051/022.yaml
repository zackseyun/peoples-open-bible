translation:
  language: es
  text: Y contigo destrozaré[a] al hombre y a la mujer; y contigo destrozaré al anciano y al muchacho; y contigo destrozaré al joven y a la virgen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «por medio de ti» o «por ti»; el hebreo usa una preposición instrumental que presenta a Babilonia como instrumento del quebrantamiento.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «virgen»; en algunos contextos podría entenderse «joven mujer» o «doncella», pero aquí «virgen» es la opción que mejor conserva el valor habitual del término.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפַּצְתִּי
  english_pob_choice: I will shatter
  chosen_spanish: haré pedazos
  alternatives_spanish:
  - desmenuzaré
  - quebraré en pedazos
  - haré añicos
  lexicon: HALOT
  rationale: El hebreo expresa una ruptura violenta y repetida en forma profética con valor de futuro. «Haré pedazos» conserva la fuerza de נפּץ sin sonar excesivamente técnico o calcado en español.
- source_word: בְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - por medio de ti
  - por ti
  - con tu ayuda
  lexicon: HALOT
  rationale: La preposición hebrea tiene valor instrumental; en español, «contigo» mantiene el destinatario directo y puede implicar el instrumento de acción en un registro natural. Se conserva la lectura relacional sin borrar la fuerza instrumental.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - varón
  - hombre adulto
  lexicon: HALOT
  rationale: En el par con אִשָּׁה se trata de la pareja humana genérica masculina/femenina, no de «esposo». «El hombre» es la opción más natural y fiel.
- source_word: אִשָּׁה
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - esposa
  - hembra
  lexicon: HALOT
  rationale: En el paralelismo con אִישׁ, el sentido es general y no matrimonial. «La mujer» preserva esa amplitud semántica.
- source_word: זָקֵן
  english_pob_choice: old man
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el hombre mayor
  lexicon: HALOT
  rationale: El hebreo marca edad masculina singular. «Anciano» es una equivalencia digna y clara en español, y no introduce la idea de cargo eclesial que puede tener «anciano» en algunos contextos, porque aquí el contexto de edad ya la define.
- source_word: נָעַר
  english_pob_choice: young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  - el muchacho/adolescente
  lexicon: HALOT
  rationale: Aunque el término puede abarcar desde muchacho hasta joven, aquí el paralelismo de pares de edad favorece un término general. «El joven» mantiene la simetría con «el anciano» y evita sobreespecificar una edad.
- source_word: בָּחוּר
  english_pob_choice: young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el mozo
  - el muchacho
  - el hombre joven
  lexicon: HALOT
  rationale: La POB inglesa revisó esta línea para mantener la pareja de edad/sexo y no cargar demasiado el contraste. En español, «el joven» reproduce la categoría de edad con naturalidad; su repetición no es ideal estilísticamente, pero sigue el valor distributivo del hebreo y evita introducir una distinción no garantizada por el contexto.
- source_word: בְּתוּלָה
  english_pob_choice: virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la doncella
  - la joven virgen
  - la joven
  lexicon: HALOT
  rationale: El sentido léxico básico es «virgen», y el contexto no obliga a debilitarlo. «La virgen» preserva la fuerza semántica del término, aun cuando en español moderno pueda sonar más marcado que «doncella».
translation_notes:
  revision_awareness: El contexto de auditoría inglesa mantiene la estructura repetida «I will shatter...» y revisa la tercera serie para leer נַעַר como «young man» en vez de «youth». La versión española sigue esa decisión al usar un término de edad masculina natural y al conservar la repetición retórica del verbo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «haré pedazos» para reflejar la violencia de נפּץ sin recurrir a un calco rígido.
  - La repetición de «el joven» en la segunda y tercera serie sigue la pauta distributiva del hebreo, aunque en español podría sonar menos elegante.
  - No se introduce terminología eclesial para זָקֵן, porque aquí el rasgo determinante es la edad, no el oficio.
