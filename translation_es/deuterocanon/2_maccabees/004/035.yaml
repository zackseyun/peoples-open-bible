lexical_decisions:
- source_word: διʼ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_spanish: Por esta causa
  alternatives_spanish:
  - Por eso
  - Por esta razón
  lexicon: LSJ
  rationale: Expresa con naturalidad en español el conector causal que enlaza con lo anterior, manteniendo la relación causal sin añadir contenido nuevo.
- source_word: οὐ μόνον ... δὲ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino también
  alternatives_spanish:
  - no solamente ... sino también
  - no solo ... pero también
  lexicon: LSJ
  rationale: Corresponde al paralelismo enfático del griego y es la forma natural y clara en español.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: LSJ
  rationale: El contexto lo contrasta con 'las otras naciones', por lo que aquí designa al pueblo judío como grupo étnico-religioso; en español 'judíos' conserva mejor ese contraste que 'judeanos'.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - bastantes
  lexicon: LSJ
  rationale: Traducción directa y natural del cuantificador, sin intensificar más de lo que el griego exige.
- source_word: τῶν ἄλλων ἐθνῶν
  english_pob_choice: of the other nations
  chosen_spanish: de las otras naciones
  alternatives_spanish:
  - de los otros pueblos
  - de los demás pueblos
  lexicon: LSJ
  rationale: '''Naciones'' preserva el sentido amplio de ἔθνη como pueblos no judíos y evita introducir el término técnico ''gentiles'' donde el griego no lo exige.'
theological_decisions:
- issue: Alcance de Ἰουδαῖοι como designación identitaria
  english_pob_reading: Jews
  chosen_spanish_reading: judíos
  alternative_spanish_readings:
  - judeanos
  rationale: La oposición con 'las otras naciones' muestra que el término funciona como designación de un pueblo, no solo de una procedencia geográfica. 'Judíos' mantiene ese valor amplio en español y evita estrechar indebidamente el referente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego es breve y coincide ampliamente con el audit trail inglés; no se detectan revisiones sustantivas en el pasaje. Se conservó el paralelismo causal y correlativo sin añadir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se usa 'naciones' para ἔθνη, en coherencia con el criterio POB de no importar innecesariamente 'gentiles' cuando el contraste es étnico amplio.
  - Se mantiene 'judíos' en minúscula por norma ortográfica española dentro de una oración.
  - La puntuación reproduce la pausa del miembro causal y la estructura adversativa del griego.
