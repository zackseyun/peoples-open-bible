review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del arameo: reyes poderosos, autoridad sobre Jerusalén, dominio sobre todo «Más Allá del Río», y la tríada fiscal entregada a ellos. Sin embargo, «estaban sobre Jerusalén» suena menos natural y menos idiomático en español para autoridad política que «había … sobre Jerusalén» o «hubo … sobre Jerusalén». Además, el orden de «se les pagaban tributo, impuesto y peaje» es comprensible pero menos fluido que una formulación pasiva/impersonal más natural en español.'
  spanish_quality_summary: 'La calidad general es buena y legible, con terminología administrativa bien cuidada. La principal mejora necesaria es idiomática: ajustar la cópula y la cláusula final para sonar más natural en español sin perder la literalidad. Las notas están bien enfocadas; conviene suavizar «costumbre» en la nota b, porque en español actual puede sonar opaco como alternativa fiscal.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. «Reyes», «poderosos», «tributo», «impuesto» y «peaje» concuerdan bien con las decisiones auditadas. «Más Allá del Río» preserva la designación administrativa fija conforme al rastro inglés, aunque sigue siendo una expresión algo marcada; la nota cultural la justifica adecuadamente.
  issues:
  - severity: medium
    issue: «estaban sobre Jerusalén» es poco idiomático en español
    rationale: Aunque reproduce formalmente «were over Jerusalem», en español suena forzado para autoridad política. «Había reyes poderosos sobre Jerusalén» conserva el sentido de existencia/autoridad y mejora la naturalidad.
  - severity: low
    issue: La cláusula final puede fluir mejor
    rationale: «se les pagaban tributo, impuesto y peaje» es entendible, pero «se pagaban a ellos el tributo, el impuesto y el peaje» o «les eran pagados…» resulta más claro y digno. Se puede mantener sin añadir sentido.
  - severity: low
    issue: Alternativa «costumbre» en la nota b no es la mejor opción en español actual
    rationale: Proviene de «custom», pero en español moderno fiscal suena ambigua. «tributo, impuesto y derecho de aduana» o «tributo, gravamen y peaje» comunica mejor.
  revised_spanish_text: Y había reyes poderosos sobre Jerusalén[a], que gobernaban sobre todo Más Allá del Río, y a ellos se les pagaban tributo, impuesto y peaje[b].
  revised_footnotes:
