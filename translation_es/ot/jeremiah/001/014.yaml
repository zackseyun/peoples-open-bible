translation:
  language: es
  text: 'Y Yahvé me dijo: «Desde el norte irrumpirá el desastre[a] contra todos los habitantes de la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la calamidad»; más literalmente: «el mal», en el sentido de calamidad y no de mal moral.'
    reason: lexical_alternative
  - marker: b
    text: Probablemente se refiere a la tierra de Judá; alternativamente, «la tierra» o «la tierra entera».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Nombre divino (Tetragrámaton)
  rationale: Se conserva el nombre propio divino según la política del proyecto, en lugar de sustituirlo por un título. 'Yahvé' refleja el tetragrámaton con uso bíblico reconocible en español y mantiene la transparencia del texto fuente.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: Verbo narrativo secuencial
  rationale: La waw consecutiva marca avance narrativo. 'Y ... dijo' conserva la secuencia hebrea de manera natural en español y respeta el tono profético.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: Preposición con sufijo pronominal
  rationale: En español, con 'dijo' la idea se expresa de forma idiomática como 'me dijo'; mantiene el sentido de dirección hacia el profeta sin recargar la frase.
- source_word: מִצָּפוֹן
  english_pob_choice: From the north
  chosen_spanish: Desde el norte
  alternatives_spanish:
  - Del norte
  - Desde el septentrión
  lexicon: Indicación direccional
  rationale: '''Desde el norte'' reproduce con claridad el origen geográfico del juicio y suena natural en español contemporáneo. ''Del norte'' es posible, pero ''desde'' conserva mejor el matiz de procedencia.'
- source_word: תִּפָּתַח
  english_pob_choice: will break forth
  chosen_spanish: se abrirá
  alternatives_spanish:
  - estallará
  - se desatará
  - será abierta
  lexicon: Nifal de פתח
  rationale: El verbo hebreo significa literalmente 'ser abierta', y el POB inglés decidió preservar la imagen de irrupción. En español, 'se abrirá' conserva la metáfora con suficiente claridad, evitando añadir una interpretación más fuerte que el texto no exige.
- source_word: הָרָעָה
  english_pob_choice: the disaster
  chosen_spanish: el desastre
  alternatives_spanish:
  - la calamidad
  - el mal
  lexicon: רָעָה en contexto de juicio
  rationale: En este anuncio profético la palabra denota calamidad/jucio, no mal moral. 'Desastre' comunica ese sentido de manera clara y evita la confusión teológica de leer aquí 'mal' como perversidad moral.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - sobre de
  lexicon: Preposición de hostilidad
  rationale: Con un anuncio de juicio, la relación adversativa se expresa mejor con 'contra'. Preserva la fuerza hostil del hebreo sin perder naturalidad en español.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: all the inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los habitantes del país
  - todos los que habitan en la tierra
  lexicon: Fórmula colectiva con אֶרֶץ
  rationale: El hebreo puede referirse a 'la tierra' en sentido local o a 'la tierra' como mundo. El audit trail inglés optó por 'the land' como referencia probable a Judá; en español se conserva 'la tierra' con una nota que explicita la posible referencia local. 'País' sería más interpretativo.
theological_decisions:
- issue: Sentido de הָרָעָה en un contexto de juicio divino
  english_pob_reading: '''the disaster'' rather than ''the evil'''
  chosen_spanish_reading: '''el desastre'' en lugar de ''el mal'''
  alternative_spanish_readings:
  - '''la calamidad'''
  - '''el mal'''
  rationale: La frase anuncia una aflicción que viene sobre el pueblo; no conviene traducirla como mal moral, porque el hebreo aquí apunta a calamidad/jucio. 'Desastre' preserva la tensión sin atribuir a Dios una acción moralmente maligna.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension without importing doctrinal claims the text does not make.'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: '''the land'' likely refers to the land of Judah here; alternatively, ''the earth.'''
  chosen_spanish_reading: '''la tierra'' con referencia probable a Judá'
  alternative_spanish_readings:
  - '''la tierra'' en sentido universal'
  - '''el país'''
  rationale: Jeremías 1:14 habla del juicio que vendrá desde el norte sobre los habitantes del territorio en cuestión. Mantener 'la tierra' permite conservar la ambigüedad léxica del hebreo, mientras la nota aclara que probablemente alude a Judá.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La redacción inglesa más reciente sustituyó 'will be unleashed' por 'will break forth' para reflejar más directamente תִּפָּתַח y mantener un registro formal. La versión española sigue esa decisión con 'se abrirá', que conserva la imagen verbal de apertura/irrupción sin intensificarla más allá del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el tetragrámaton en coherencia con el estándar del proyecto.
  - Se evita 'mal' sin aclaración para no sugerir maldad moral donde el contexto exige calamidad.
  - '''La tierra'' conserva la ambigüedad del hebreo y se explica en nota por el probable referente local a Judá.'
  - El orden narrativo se mantiene simple y reverente, acorde con el estilo profético breve del versículo.
