    reason: lexical_alternative
  - marker: b
    text: O «para la elevación de Jerusalén» o «para el levantamiento de Jerusalén». La expresión griega habla de elevar o exaltar a Jerusalén.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige giros poco naturales («habiéndose puesto», «la cama de él»), simplifica la sintaxis para un español más claro y digno, y mantiene los elementos léxicos y teológicos importantes del original: oración interior, apelación a Dios como Señor de todo poder, las obras de sus manos, y la exaltación de Jerusalén. También elimina una nota secundaria no necesaria y normaliza la puntuación.'
