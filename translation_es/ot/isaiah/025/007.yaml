    reason: cross_reference
  revision_rationale: 'Se revisa para alinear el español con la secuencia léxica y la lógica del POB auditado: primero ''cubierta'' y luego ''velo''; se restaura mejor la imagen espacial del original con ''sobre''; se sustituyen las notas por las dos notas relevantes del registro inglés. Aunque ''cubre sobre'' es un giro algo pesado, aquí preserva de manera más transparente la repetición cognada y la preposición del hebreo. No requiere adjudicación adicional.'
