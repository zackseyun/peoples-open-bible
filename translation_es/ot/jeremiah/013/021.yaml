translation:
  language: es
  text: ¿Qué dirás cuando él ponga sobre ti a aquellos a quienes tú misma enseñaste a ser líderes sobre ti? ¿No te asirán los dolores de parto, como a una mujer en trabajo de parto?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuando él te visite/castigue'; el verbo hebreo puede significar 'atender, visitar, castigar', pero aquí probablemente lleva el sentido de poner o establecer gobernantes sobre Judá.
    reason: lexical_alternative
  - marker: b
    text: O 'jefes' o 'asociados cercanos'. El término hebreo puede referirse a líderes de clan o a compañeros íntimos; en este contexto probablemente apunta a quienes Judá había cultivado y que ahora pasan a gobernarla.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה תֹּאמְרִי
  english_pob_choice: What will you say
  chosen_spanish: ¿Qué dirás
  alternatives_spanish:
  - ¿Qué vas a decir
  - ¿Qué podrías decir
  lexicon: HALOT
  rationale: La pregunta retórica con 2ª femenina singular se vierte naturalmente con futuro simple en español. Se mantiene el tono de reproche/interpelación sin añadir explicación.
- source_word: כִּי יִפְקֹד עָלַיִךְ
  english_pob_choice: when he appoints over you
  chosen_spanish: cuando él ponga sobre ti
  alternatives_spanish:
  - cuando él visite sobre ti
  - cuando él te castigue
  - cuando él te ponga encima
  lexicon: HALOT
  rationale: פקד tiene un rango amplio; aquí el contexto inmediato de 'líderes sobre ti' favorece la idea de poner/establecer sobre alguien. 'Ponga sobre ti' conserva la ambigüedad del sujeto implícito y evita resolverlo como visita o castigo.
- source_word: וְאַתְּ לִמַּדְתְּ אֹתָם
  english_pob_choice: those whom you yourself taught
  chosen_spanish: a aquellos a quienes tú misma enseñaste
  alternatives_spanish:
  - a los que tú misma entrenaste
  - a los que tú acostumbraste
  lexicon: HALOT
  rationale: El piel de למד se traduce con 'enseñaste' porque el texto habla de haber formado/preparado a esas personas. Se conserva el énfasis pronominal con 'tú misma'.
- source_word: עָלַיִךְ אַלֻּפִים לְרֹאשׁ
  english_pob_choice: to be leaders over you
  chosen_spanish: a ser líderes sobre ti
  alternatives_spanish:
  - como jefes sobre ti
  - como caudillos sobre ti
  - como jefes de ti
  lexicon: HALOT
  rationale: אַלֻּפִים puede significar jefes/líderes o cercanos íntimos según contexto. Aquí, por el complemento לְרֹאשׁ y la repetición de 'sobre ti', la lectura política es la más probable. 'Líderes' es claro en español y mantiene el sentido de gobierno/superioridad.
- source_word: הֲלוֹא
  english_pob_choice: Will not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No será que
  lexicon: HALOT
  rationale: Introduce una pregunta retórica enfática que espera respuesta afirmativa. En español, '¿No' reproduce bien esa fuerza sin volverla demasiado pesada.
- source_word: חֲבָלִים
  english_pob_choice: labor pains
  chosen_spanish: dolores de parto
  alternatives_spanish:
  - pains de parto
  - contracciones
  - dolores de alumbramiento
  lexicon: HALOT
  rationale: En este contexto, junto con la comparación con una mujer dando a luz, el sentido es el de dolores de parto. 'Dolores de parto' es la forma más natural y clara en español.
- source_word: יֹאחֱזוּךְ
  english_pob_choice: seize you
  chosen_spanish: te asirán
  alternatives_spanish:
  - te tomarán
  - te agarrarán
  - te atraparán
  lexicon: HALOT
  rationale: אחז significa agarrar/asir. 'Te asirán' conserva la imagen de apresamiento súbito e intenso, acorde con el lenguaje poético del versículo.
- source_word: כְּמוֹ אֵשֶׁת לֵדָה
  english_pob_choice: like a woman in childbirth
  chosen_spanish: como a mujer en trabajo de parto
  alternatives_spanish:
  - como a una mujer en parto
  - como a una mujer dando a luz
  - como a una parturienta
  lexicon: HALOT
  rationale: Se conserva la comparación idiomática del hebreo con una formulación formal y natural en español. 'En trabajo de parto' refleja con precisión la experiencia descrita y evita una paráfrasis excesiva.
theological_decisions:
- issue: Sujeto implícito de יִפְקֹד
  english_pob_reading: left as generic 'he' rather than specifying God, enemy king, or ally
  chosen_spanish_reading: se mantiene el 'él' impersonal/ambiguo
  alternative_spanish_readings:
  - cuando Yahvé ponga sobre ti
  - cuando el enemigo ponga sobre ti
  - cuando él te visite/castigue
  rationale: El hebreo no explicita el sujeto y el contexto admite más de una referencia. Mantener 'él' preserva la tensión interpretativa documentada en el POB inglés y evita resolverla prematuramente.
  doctrine_reference: Conservar la ambigüedad textual donde el original la deja abierta.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: ''woman in childbirth'' se refleja como ''mujer en trabajo de parto'', manteniendo un registro más formal y natural. También se conserva la ambigüedad del sujeto de יִפְקֹד y la posible doble resonancia de אַלֻּפִים.'
  spanish_consistency_notes:
  - Se mantiene 'líderes' para אַלֻּפִים por coherencia con la lectura política adoptada en el audit trail inglés.
  - Se evita 'SEÑOR' o 'el SEÑOR' porque el versículo no contiene el tetragrámaton y no hay base para introducirlo.
  - '''Dolores de parto'' / ''trabajo de parto'' preservan la imagen obstétrica sin suavizarla.'
  - La segunda persona femenina singular se mantiene explícita con 'tú' y 'te' para reflejar el hebreo.
  - La puntuación conserva el tono retórico de dos preguntas consecutivas.
