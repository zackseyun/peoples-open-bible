    issue: La nota [c] está anclada en «Líbano» en vez de en la cláusula «salga fuego del zarzal».
    rationale: La nota explica la ambigüedad de תֵּצֵא אֵשׁ מִן הָאָטָד (jussivo/predictivo), no «los cedros del Líbano». Debe moverse al lugar relevante para evitar confusión exegética.
  - severity: low
