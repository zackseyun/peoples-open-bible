revisions:
- from: 'Entonces Yahvé envió a un hombre[a], un profeta, a los hijos de Israel, y les dijo: «Así dice Yahvé, el Dios de Israel: Yo los hice subir de Egipto, y los saqué de la casa de servidumbre[b]».'
  to: 'Entonces Yahvé envió a un hombre, un profeta, a los hijos de Israel[a], y les dijo: «Así dice Yahvé, el Dios de Israel: Yo los hice subir de Egipto, y los saqué de la casa de esclavitud[b]».'
  rationale: Se corrige la nota [a] para que presente una alternativa real y no repita la redacción principal. Se cambia «casa de servidumbre» por «casa de esclavitud» por mayor claridad y mejor correspondencia con la decisión auditada en inglés y con el hebreo עֲבָדִים. Se mantiene «Yo los hice subir» porque preserva el modismo del éxodo presente en הֶעֱלֵיתִי.
