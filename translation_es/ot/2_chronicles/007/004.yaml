  to: Entonces el rey y todo el pueblo ofrecieron sacrificios[a] delante de Yahvé.
  rationale: Se cambia «ofrecían» por «ofrecieron» para un español narrativo más natural y más alineado con la decisión inglesa auditada de suavizar la construcción hebrea sin perder el sentido. Se conserva «Yahvé» según la política del proyecto y se simplifica la nota para mayor claridad.
