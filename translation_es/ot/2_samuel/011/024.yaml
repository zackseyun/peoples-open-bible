translation:
  language: es
  text: Los arqueros dispararon contra tus siervos desde lo alto de la muralla, y murieron algunos de los siervos del rey[a]; también tu siervo Urías el hitita murió[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y murieron algunos de los siervos del rey»; la preposición puede entenderse de modo partitivo («algunos de»).'
    reason: lexical_alternative
  - marker: b
    text: O «está muerto» para la cláusula final, reflejando la forma estática del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרוּ / הַמּוֹרִים
  english_pob_choice: The archers shot
  chosen_spanish: Los arqueros dispararon
  alternatives_spanish:
  - los que disparaban dispararon
  - dispararon los tiradores
  lexicon: HALOT
  rationale: El participio y el verbo de ירה apuntan a la acción de disparar; en español, «arqueros» es el equivalente natural y militarmente claro, como en el inglés POB. «Dispararon» conserva la acción sin calco forzado.
- source_word: אֶל
  english_pob_choice: at
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: Con un verbo de disparar, «contra» expresa mejor el blanco hostil que un simple «a» y mantiene la fuerza direccional del hebreo sin volverlo mecánico.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus hombres
  lexicon: HALOT
  rationale: עבד conserva la deferencia cortesana y militar; «siervos» mantiene ese registro mejor que «hombres», y es más fiel al campo léxico que «servidores» en este contexto.
- source_word: מֵעַל הַחוֹמָה
  english_pob_choice: from atop the wall
  chosen_spanish: desde lo alto de la muralla
  alternatives_spanish:
  - desde arriba de la muralla
  - desde la muralla
  lexicon: HALOT
  rationale: «Desde lo alto» reproduce la idea de posición elevada de מֵעַל; «muralla» es una forma natural en español para הַחוֹמָה y mantiene el matiz defensivo.
- source_word: וַיָּמֻתוּ מֵעַבְדֵי הַמֶּלֶךְ
  english_pob_choice: and some of the king’s servants died
  chosen_spanish: murieron algunos de los siervos del rey
  alternatives_spanish:
  - murieron siervos del rey
  - y murieron algunos siervos del rey
  lexicon: HALOT
  rationale: La preposición partitiva מִן justifica «algunos de». «Siervos del rey» preserva la relación cortesana y refleja el hebreo mejor que «hombres del rey».
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - e incluso
  lexicon: HALOT
  rationale: «Y también» conserva la fuerza aditiva de וְגַם y su función de sumar el caso de Urías al de los otros muertos.
- source_word: עַבְדְּךָ אוּרִיָּה הַחִתִּי
  english_pob_choice: your servant Uriah the Hittite
  chosen_spanish: tu siervo Urías el hitita
  alternatives_spanish:
  - tu siervo Urías el heteo
  - tu servidor Urías el hitita
  lexicon: HALOT
  rationale: «Tu siervo» mantiene la fórmula de subordinación respetuosa; «hitita» es la transliteración étnica estándar y más comprensible en español bíblico moderno.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - está muerto
  - ha muerto
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede leerse como estática, en un reporte narrativo español «murió» es la equivalencia más natural y sigue la decisión del POB inglés.
theological_decisions:
- issue: Valor partitivo de מִן en la noticia de bajas
  english_pob_reading: some of the king’s servants died
  chosen_spanish_reading: murieron algunos de los siervos del rey
  alternative_spanish_readings:
  - murieron siervos del rey
  - murieron algunos siervos del rey
  rationale: Se mantiene explícita la idea partitiva porque el hebreo no presenta una pérdida total, sino parcial, y eso forma parte del sentido del informe militar.
  doctrine_reference: No aplica; decisión de precisión semántica y narrativa.
- issue: Forma final מֵת en un relato de muerte
  english_pob_reading: is dead / died
  chosen_spanish_reading: murió
  alternative_spanish_readings:
  - está muerto
  - ha muerto
  rationale: Se preserva la tensión entre la forma estativa hebrea y el flujo narrativo español mediante «murió», que comunica el hecho sin convertirlo en una descripción estática poco natural en español.
  doctrine_reference: No aplica; decisión aspectual y estilística.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el borrador sigue el pasaje hebreo WLC y el audit trail inglés POB con acuerdo alto y sin cambios recientes.
  spanish_consistency_notes:
  - Se usó «siervo(s)» de manera consistente para עבד en contexto cortesano/militar, siguiendo la fuerza relacional del hebreo.
  - Se mantuvo «murió» en la cláusula final para conservar la narración fluida en español sin perder la posibilidad alternativa indicada en nota.
  - Se eligió «muralla» para הַחוֹמָה por claridad bíblica y porque en español transmite mejor una fortificación defensiva que «muro» en este contexto.
