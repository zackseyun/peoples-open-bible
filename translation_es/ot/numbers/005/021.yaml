base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/021.yaml
  text: Then the priest shall make the woman swear with the oath of the curse[a], and the priest shall say to the woman, “May Yahweh make you a curse and an oath among your people[c][b], when Yahweh makes your thigh waste away and your abdomen swell.”
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'make you an example of cursing and oath-taking' among your people.
    reason: lexical_alternative
  - marker: b
    text: '''Your thigh fall away'' is a literal rendering of a difficult Hebrew expression. It may be a euphemism involving the reproductive organs or indicate wasting/shriveling of that part of the body.'
    reason: lexical_alternative
  - marker: c
    text: '''Abdomen'' may also be rendered ''belly'' or, in some interpretations, ''womb.'' The exact medical or reproductive effect described in this curse is debated.'
    reason: lexical_alternative
