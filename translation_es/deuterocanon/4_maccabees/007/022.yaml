review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido general del griego: el participio causal «sabiendo», la idea de soportar «todo dolor», la evaluación «es bienaventurado» y la pregunta retórica sobre dominar «las pasiones». También preserva adecuadamente la tríada conceptual ἀρετή / πάθη / εὐσέβεια. Sin embargo, «por causa de la piedad» suena más causal que final en este contexto, y conviene una formulación más natural en español para διὰ + acusativo con sentido de propósito o motivo devocional.'
  spanish_quality_summary: El español es claro y digno, pero «por causa de la virtud» y especialmente «por causa de la piedad» resultan algo rígidos. «Por amor a la virtud» y «por amor a la piedad» suenan más naturales y mantienen el matiz ético-devocional. El resto del versículo es legible y fiel. No se requieren notas obligatorias, aunque una nota opcional sobre «piedad/devoción reverente» sería posible; no es necesaria aquí.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Las pasiones» para πάθη y «virtud» para ἀρετή están bien. Para εὐσέβεια, el rastro inglés prefirió «godliness» con nota alternativa «piety»; en español «piedad» es una buena equivalencia directa y eclesialmente inteligible, por lo que puede mantenerse sin nota. El ajuste recomendado es estilístico-semántico en la preposición, no terminológico.
  issues:
  - severity: medium
    issue: «por causa de» suena demasiado rígido y causal en ambas frases con διὰ + acusativo
    rationale: En este contexto de motivación ética y religiosa, la construcción expresa mejor el motivo/finalidad de soportar y prevalecer. En español, «por amor a» comunica con más naturalidad el matiz de actuar movido por la virtud y la piedad, sin alejarse del sentido fuente.
  revised_spanish_text: Y sabiendo que es bienaventurado soportar todo dolor por amor a la virtud, ¿no prevalecería sobre las pasiones por amor a la piedad?
  revision_rationale: Se conserva toda la estructura y terminología principal del borrador, pero se reemplaza «por causa de» por «por amor a» para expresar de manera más idiomática y precisa el valor motivacional de διὰ + acusativo en este contexto ético-devocional.
