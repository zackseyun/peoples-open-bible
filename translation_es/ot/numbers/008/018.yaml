translation:
  language: es
  text: Y tomé a los levitas en lugar de todo primogénito entre los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los israelitas». El hebreo dice «entre los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  english_pob_choice: And I took
  chosen_spanish: Y tomé
  alternatives_spanish:
  - Y acepté
  - Y escogí
  lexicon: HALOT
  rationale: El wayyiqtol de לקח expresa una acción narrativa concreta; «tomé» conserva ese sentido sin introducir una interpretación más explícita que el hebreo no exige.
- source_word: אֶת
  english_pob_choice: '[direct object marker, untranslated]'
  chosen_spanish: '[marcado por el verbo y el objeto directo en español]'
  lexicon: —
  rationale: El marcador de objeto directo hebreo no tiene equivalente independiente en español; la relación sintáctica se expresa naturalmente con el verbo y el complemento directo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - la tribu de Leví
  lexicon: HALOT
  rationale: «Levitas» es el equivalente asentado y preciso para el grupo designado por el sustantivo plural gentilicio.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: Aquí תַּחַת expresa sustitución, no ubicación; «en lugar de» transmite con claridad el intercambio representativo del contexto cultual.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo y cada
  lexicon: HALOT
  rationale: Con un sustantivo singular como בְּכוֹר, כָּל tiene valor distributivo. En español, «todo primogénito» conserva esa fuerza sin forzar una repetición extraña.
- source_word: בְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero nacido
  - primogénito varón
  lexicon: HALOT
  rationale: «Primogénito» es el término bíblico natural en español para este sustantivo. No se añade «varón» en el texto principal porque el hebreo aquí no lo explicita.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión masculina plural del hebreo («hijos de Israel») por fidelidad al texto fuente y a la política de precisión de género del proyecto. «Entre» refleja de forma idiomática el valor partitivo/social de la preposición.
theological_decisions:
- issue: Conservación de «hijos de Israel»
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: El hebreo dice literalmente «hijos de Israel», y el POB en inglés documenta esa decisión por precisión formal y de género. Mantenerla en español evita neutralizar una forma masculina explícita que forma parte del texto recibido.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran revisiones aplicadas y el acuerdo de auditoría es alto. La redacción española sigue la misma decisión semántica del POB inglés para לקח, תַּחַת y בְּנֵי יִשְׂרָאֵל, ajustándola a una sintaxis natural en español.'
  spanish_consistency_notes:
  - Se mantuvo «levitas» para הַלְוִיִּם, evitando perífrasis como «la tribu de Leví» que desplazarían el referente.
  - «En lugar de» conserva la idea de sustitución ritual indicada por תַּחַת.
  - Se prefirió «primogénito» por ser el término bíblico natural y claro en español.
  - La nota al pie preserva la alternativa documental «israelitas» sin borrar la forma literal del hebreo.
