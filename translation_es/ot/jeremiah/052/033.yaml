translation:
  language: es
  text: Y se cambió la ropa de prisión[a] y comió pan delante de él[b] continuamente todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «cambió las vestiduras de su encarcelamiento».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «comió pan delante de él»; esto probablemente se refiere a que tomaba sus comidas en presencia del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁנָּה
  english_pob_choice: changed out of
  chosen_spanish: cambió
  alternatives_spanish:
  - se cambió
  - cambió de ropa
  lexicon: HALOT
  rationale: El verbo indica un cambio de vestidura; en español, «cambió» conserva la acción sin forzar un giro idiomático innecesario. El contexto de la frase siguiente aclara que se trata de ropa de prisión.
- source_word: אֵת בִּגְדֵי כִלְאוֹ
  english_pob_choice: his prison clothes
  chosen_spanish: sus ropas de prisión
  alternatives_spanish:
  - sus prendas de prisión
  - las vestiduras de su prisión
  lexicon: HALOT
  rationale: בִּגְדֵי es «ropas/vestidos» y כִלְאוֹ refiere a su encierro o prisión. «Ropas de prisión» conserva la relación posesiva y el matiz concreto del hebreo sin sonar demasiado técnico.
- source_word: וְאָכַל לֶחֶם
  english_pob_choice: ate bread
  chosen_spanish: comió pan
  alternatives_spanish:
  - comió alimento
  - tomó su comida
  lexicon: HALOT
  rationale: La expresión literal «comió pan» se mantiene porque el hebreo usa un modismo común para tomar una comida. En español suena natural y preserva la textura formal del original.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: «Delante de él» refleja de manera directa la idea espacial de לְפָנָיו y conserva el tono cortesano de la escena. «En su presencia» sería posible, pero algo más interpretativo.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - regularmente
  - sin cesar
  lexicon: HALOT
  rationale: תָּמִיד expresa continuidad o regularidad sostenida. «Continuamente» es la equivalencia más natural y cercana al ritmo del texto.
- source_word: כָּל יְמֵי חַיָּו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - toda su vida
  - por todos los días que vivió
  lexicon: HALOT
  rationale: Esta es una expresión hebrea estándar para la totalidad de la vida. «Todos los días de su vida» conserva el paralelismo y la cadencia del original.
translation_notes:
  revision_awareness: La revisión en inglés prefirió una traducción más directa de לְפָנָיו como «before him». En español se siguió esa misma orientación con «delante de él», manteniendo la referencia cortesana sin introducir una interpretación adicional. Se evitó añadir notas porque el sentido es suficientemente claro en la línea principal.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y público, apto para lectura bíblica comunitaria.
  - Se conserva la literalidad de «comió pan» porque el modismo es transparente en español y ayuda a reflejar la forma hebrea.
  - No se introdujo «Cristo», «SEÑOR» ni vocabulario doctrinal no presente en el versículo.
  - «Ropas de prisión» evita una paráfrasis excesiva y deja visible el vínculo con el hebreo כִלְאֹו.
