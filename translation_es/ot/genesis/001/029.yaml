translation:
  language: es
  text: 'Y Dios dijo: «He aquí[a], les he dado toda planta que da semilla[b], que está sobre la faz de toda la tierra, y todo árbol en el que hay fruto de árbol que da semilla[c]. Eso será para ustedes como alimento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «He aquí» conserva el valor de atención y solemnidad del hebreo הִנֵּה.
    reason: lexical_alternative
  - marker: b
    text: O «toda hierba que da semilla». El hebreo עֵשֶׂב puede abarcar vegetación de forma amplia; «planta» evita restringirlo indebidamente.
    reason: lexical_alternative
  - marker: c
    text: O «en el que está el fruto de un árbol que da semilla». Esta redacción sigue más de cerca el orden hebreo.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים con verbo singular, refiriéndose al Dios creador; en español, «Dios» preserva la referencia sin necesidad de artículo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - He ahí
  - Miren
  lexicon: HALOT
  rationale: «He aquí» conserva el valor de atención y solemnidad del marcador hebreo, y es más natural en español bíblico que «Behold» calco o un imperativo moderno.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: les he dado
  alternatives_spanish:
  - les doy
  - les he dado ya
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa con vigencia actual en el contexto de la creación; el pretérito perfecto español reproduce bien ese valor resultativo.
- source_word: כָּל עֵשֶׂב זֹרֵעַ זֶרַע
  english_pob_choice: every seed-bearing plant
  chosen_spanish: toda planta que da semilla
  alternatives_spanish:
  - toda planta sembradora de semilla
  - toda hierba que da semilla
  lexicon: HALOT
  rationale: עֵשֶׂב designa vegetación/plantas en general, no necesariamente «hierba» culinaria; «planta que da semilla» transmite el participio verbal de forma clara y evita un tecnicismo engañoso.
- source_word: אֲשֶׁר עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: that is on the face of all the earth
  chosen_spanish: que está sobre la faz de toda la tierra
  alternatives_spanish:
  - que está sobre toda la tierra
  - que está en la superficie de toda la tierra
  lexicon: HALOT
  rationale: «Faz de la tierra» conserva el idiomatismo espacial hebreo con un registro bíblico inteligible en español; «sobre» mantiene la relación locativa sin sobreexplicar.
- source_word: כָּל הָעֵץ
  english_pob_choice: every tree
  chosen_spanish: todo árbol
  alternatives_spanish:
  - cada árbol
  - todos los árboles
  lexicon: HALOT
  rationale: El singular distributivo hebreo se expresa naturalmente con «todo árbol» en español, manteniendo la idea de cada miembro de la clase.
- source_word: אֲשֶׁר בּוֹ פְרִי עֵץ זֹרֵעַ זָרַע
  english_pob_choice: that has in it fruit bearing seed
  chosen_spanish: en el que hay fruto de árbol que da semilla
  alternatives_spanish:
  - que tiene en él fruto de árbol que da semilla
  - que contiene fruto de árbol que da semilla
  lexicon: HALOT
  rationale: 'Se conserva la estructura relacional del hebreo: el árbol contiene fruto caracterizado por la capacidad de dar semilla. La formulación evita suavizar demasiado la tensión sintáctica y refleja mejor el encadenamiento nominal del original.'
- source_word: לָכֶם יִהְיֶה לְאָכְלָה
  english_pob_choice: It will be for you as food
  chosen_spanish: Les servirá de alimento
  alternatives_spanish:
  - les será para alimento
  - será para ustedes alimento
  lexicon: HALOT
  rationale: El hebreo expresa finalidad/uso, no mera identidad; «servirá de alimento» reproduce ese valor funcional en español natural, con referente colectivo mantenido por contexto.
theological_decisions:
- issue: La donación de alimento como concesión creacional
  english_pob_reading: I have given... It will be for you as food
  chosen_spanish_reading: les he dado... Les servirá de alimento
  alternative_spanish_readings:
  - les doy... será para ustedes alimento
  - les he concedido... les servirá de alimento
  rationale: La lectura resalta el acto creador de provisión divina como un don ya otorgado con efectos presentes. «Les he dado» mantiene la gratuidad del otorgamiento sin introducir un matiz legal ajeno al texto.
  doctrine_reference: Providencia y provisión creadora de Dios (Gn 1:29)
translation_notes:
  revision_awareness: La versión española sigue de cerca la última revisión del inglés auditado al conservar la solemnidad de הִנֵּה («He aquí») y la estructura relacional de la segunda cláusula («en el que hay fruto...»), pero adapta el idioma al español para evitar un calco demasiado pesado. También respeta el singular colectivo del cierre con una formulación funcional («Les servirá de alimento»).
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en contexto singular creador.
  - Se evita «SEÑOR» porque el texto hebreo no usa el tetragrámaton aquí.
  - «He aquí» se usa como equivalente estable de הִנֵּה en registro bíblico.
  - «Planta» traduce עֵשֶׂב por su amplitud semántica, no «hierba» en sentido culinario.
  - «Alimento» conserva el valor de uso/finalidad de לְאָכְלָה.
