  text: שִׁלְח֣וּ מַגָּ֔ל כִּ֥י בָשַׁ֖ל קָצִ֑יר בֹּ֤אֽוּ רְדוּ֙ כִּֽי מָ֣לְאָה גַּ֔ת הֵשִׁ֨יקוּ֙ הַ/יְקָבִ֔ים כִּ֥י רַבָּ֖ה רָעָתָֽ/ם־׃
base_translation:
  language: en
  yaml_path: translation/ot/joel/004/013.yaml
  text: Send in the sickle[a], for the harvest is ripe. Come, tread, for the winepress is full; the vats overflow[b], for their evil is great.
  footnotes:
  - marker: a
    text: Or 'descend'; some translations render 'tread' because the command likely envisions going down into the winepress to trample grapes.
    reason: lexical_alternative
  - marker: b
    text: Or 'their wickedness is great.'
    reason: lexical_alternative
