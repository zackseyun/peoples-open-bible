translation:
  language: es
  text: Señor[a], escucha; Señor, perdona; Señor, presta atención y actúa. No tardes, por amor de ti mismo, mi Dios, porque tu nombre es llamado sobre tu ciudad y tu pueblo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «tu ciudad y tu pueblo son llamados por tu nombre».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  lexicon: HALOT
  rationale: En una oración directa a Dios, «Señor» funciona naturalmente en español y conserva el carácter vocativo del título divino. Aunque la forma hebrea puede leerse como «mi Señor», el español de plegaria suele omitir el posesivo explícito.
- source_word: שְׁמָעָה
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: HALOT
  rationale: El imperativo de שׁמע pide oír y atender. «Escucha» comunica bien la súplica orante en español moderno sin perder el valor auditivo.
- source_word: סְלָחָה
  english_pob_choice: forgive
  chosen_spanish: perdona
  alternatives_spanish:
  - absuelve
  - indulta
  lexicon: HALOT
  rationale: En contexto penitencial, סלח corresponde de manera directa a «perdonar». «Perdona» es claro, fiel y de uso amplio en lenguaje bíblico y eclesial.
- source_word: הַקֲשִׁיבָה
  english_pob_choice: pay attention
  chosen_spanish: presta atención
  alternatives_spanish:
  - atiende
  - escucha con atención
  lexicon: HALOT
  rationale: 'El hifil de קשב intensifica la petición: no solo oír, sino atender activamente. «Presta atención» preserva ese matiz mejor que un simple «escucha».'
- source_word: וַעֲשֵׂה
  english_pob_choice: and act
  chosen_spanish: y actúa
  alternatives_spanish:
  - y hazlo
  - y obra
  lexicon: HALOT
  rationale: Aquí עשה no se reduce a «hacer» en abstracto, sino a una intervención decisiva. «Actúa» expresa bien esa fuerza pragmática en español natural.
- source_word: אַל תְּאַחַר
  english_pob_choice: Do not delay
  chosen_spanish: No tardes
  alternatives_spanish:
  - No demores
  - No te retrases
  lexicon: HALOT
  rationale: El valor es una prohibición de aplazar la acción. «No tardes» es idiomático, breve y suficientemente cercano al hebreo en una súplica urgente.
- source_word: לְמַעַנְךָ
  english_pob_choice: for your own sake
  chosen_spanish: por tu propio bien
  alternatives_spanish:
  - por amor de ti
  - por tu causa
  lexicon: HALOT
  rationale: La expresión hebrea apela al honor e interés propios de Dios. «Por tu propio bien» reproduce la fuerza reflexiva de manera natural; no se trata de utilidad humana, sino del propio nombre y reputación divinos.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  lexicon: HALOT
  rationale: Es una forma posesiva directa en invocación personal. «Mi Dios» es la correspondencia normal y transparente en español.
- source_word: שִׁמְךָ נִקְרָא עַל
  english_pob_choice: your name is called over
  chosen_spanish: tu nombre es invocado sobre
  alternatives_spanish:
  - tu nombre es llamado sobre
  - tu nombre está puesto sobre
  lexicon: HALOT
  rationale: El hebreo usa una pasiva con עַל que expresa pertenencia e identificación. «Es invocado sobre» conserva la imagen de «nombre» unido a la ciudad y al pueblo, sin borrar el trasfondo teológico de propiedad/cobertura; en español, «invocado» ayuda a sostener la solemnidad de la fórmula.
- source_word: עִירְךָ
  english_pob_choice: your city
  chosen_spanish: tu ciudad
  alternatives_spanish:
  - tu urbe
  lexicon: HALOT
  rationale: La referencia contextual es Jerusalén, pero el texto usa un posesivo simple. «Tu ciudad» mantiene esa relación directa sin explicitar el nombre propio del lugar.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: עַם designa al pueblo en sentido covenantal. «Tu pueblo» es la forma más fiel y solemne en español.
theological_decisions:
- issue: Identificación pactual expresada por שִׁמְךָ נִקְרָא עַל
  english_pob_reading: your name is called over your city and your people
  chosen_spanish_reading: tu nombre es invocado sobre tu ciudad y tu pueblo
  alternative_spanish_readings:
  - tu ciudad y tu pueblo son llamados por tu nombre
  - tu nombre es llamado sobre tu ciudad y tu pueblo
  rationale: El hebreo conserva la imagen de un nombre colocado/callado sobre un pueblo y una ciudad, señal de pertenencia y vínculo pactual. La redacción elegida preserva esa imagen sin reducirla a una paráfrasis totalmente idiomática, pero sigue siendo comprensible en español.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Tratamiento del vocativo divino אֲדֹנָי en oración
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  rationale: La forma hebrea puede leerse con matiz posesivo, pero en la oración española a Dios la forma vocativa «Señor» es la más natural y reverente. Se conserva la apelación directa sin cargar el texto con una posesión que el español litúrgico no exige.
  doctrine_reference: Translation philosophy §1
- issue: Sentido de לְמַעַנְךָ
  english_pob_reading: for your own sake
  chosen_spanish_reading: por tu propio bien
  alternative_spanish_readings:
  - por tu propio nombre
  - por tu causa
  rationale: La súplica apela al honor y a la reputación de Dios. «Por tu propio bien» comunica la fuerza reflexiva y la urgencia del ruego, aunque en español también podría expresarse como «por tu propio nombre»; se evita, no obstante, introducir un complemento no explícito en el hebreo principal.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del audit trail inglés, especialmente en la relación sintáctica de שִׁמְךָ נִקְרָא עַל. Se adoptó «sobre» en la imagen principal para reflejar mejor la preposición hebrea עַל, y se mantuvo la secuencia de imperativos y la súplica final con un tono solemne y breve.
  spanish_consistency_notes:
  - Se usa «Señor» para אֲדֹנָי en vocativo divino, conforme al estilo POB en español.
  - Se usa «mi Dios» para אֱלֹהַי, preservando la apelación personal explícita.
  - «Tu nombre es invocado sobre» conserva la imagen hebrea de pertenencia y evitó sustituirla por una paráfrasis totalmente lisa en el cuerpo principal.
  - La nota al pie mantiene la alternativa idiomática correspondiente al matiz pactual de la frase final.
