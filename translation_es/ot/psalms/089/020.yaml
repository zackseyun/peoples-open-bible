translation:
  language: es
  text: 'Entonces hablaste en una visión a tus fieles[a] y dijiste: «He puesto ayuda sobre un poderoso[b]; he exaltado a un escogido[c] de entre el pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra lectura, reflejada en algunas versiones, entiende: «a tu fiel».'
    reason: textual_variant
  - marker: b
    text: También puede traducirse «guerrero», «héroe» o «poderoso».
    reason: lexical_alternative
  - marker: c
    text: «Escogido» también puede entenderse como «joven», pero aquí el contexto favorece la selección divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: HALOT
  rationale: Marca una transición temporal y narrativa. «Entonces» conserva la relación secuencial con la palabra divina siguiente y suena natural en español bíblico actual.
- source_word: דִּבַּרְתָּ
  english_pob_choice: you spoke
  chosen_spanish: hablaste
  alternatives_spanish:
  - dijiste
  - hablaste
  lexicon: HALOT
  rationale: El hebreo usa דבר, más general que אמר. «Hablaste» ayuda a mantener la distinción que el POB inglés preserva entre “spoke” y “said”; aquí expresa el acto de comunicar una revelación.
- source_word: בְּחָזוֹן
  english_pob_choice: in a vision
  chosen_spanish: en visión
  alternatives_spanish:
  - en una visión
  - por medio de una visión
  lexicon: HALOT
  rationale: El ב con חָזוֹן indica el ámbito o modo de la revelación. «En visión» mantiene la concisión poética y la relación inmediata con la experiencia profética.
- source_word: לַחֲסִידֶיךָ
  english_pob_choice: to your faithful ones
  chosen_spanish: a tus fieles
  alternatives_spanish:
  - a tus santos
  - a tus piadosos
  - a tu fiel
  lexicon: HALOT
  rationale: חסיד designa a los leales al pacto, no necesariamente a “santos” en sentido eclesiástico. «Fieles» reproduce bien la lealtad pactal y evita cargar el término con un matiz posterior. El plural sigue el texto hebreo provisto.
- source_word: וַתֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijiste
  alternatives_spanish:
  - y dijo
  - y hablaste
  lexicon: HALOT
  rationale: 'Como continuación del discurso divino, en español es natural volver al sujeto tácito de segunda persona: «y dijiste». Conserva la continuidad del habla sin introducir ambigüedad.'
- source_word: שִׁוִּיתִי
  english_pob_choice: I have set
  chosen_spanish: He puesto
  alternatives_spanish:
  - He colocado
  - He establecido
  lexicon: HALOT
  rationale: El verbo transmite la idea de poner o situar. «He puesto» es fiel y claro en español, y permite mantener la imagen de ayuda asignada o dispuesta sobre alguien.
- source_word: עֵזֶר
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - socorro
  lexicon: HALOT
  rationale: El sustantivo significa ayuda o asistencia. «Ayuda» es el equivalente más directo y transparente; «auxilio» o «socorro» serían más marcados y menos neutros.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: Con שויתי y el objeto ‘ayuda’, la preposición expresa colocación o asignación. «Sobre» refleja la metáfora espacial de apoyo colocado encima de alguien.
- source_word: גִּבּוֹר
  english_pob_choice: a mighty one
  chosen_spanish: un poderoso
  alternatives_spanish:
  - un guerrero
  - un héroe
  - un varón poderoso
  lexicon: HALOT
  rationale: גבור puede ser guerrero, héroe o poderoso. «Un poderoso» conserva la amplitud semántica y evita restringirlo al ámbito militar, mientras mantiene el singular masculino del texto.
- source_word: הֲרִימֹתִי
  english_pob_choice: I have exalted
  chosen_spanish: he exaltado
  alternatives_spanish:
  - he levantado
  - he elevado
  lexicon: HALOT
  rationale: El hifil de רום comunica elevar o exaltar. «He exaltado» encaja con el tono real de la elección divina y reproduce el valor de elevación honorífica del hebreo.
- source_word: בָחוּר
  english_pob_choice: one chosen
  chosen_spanish: un escogido
  alternatives_spanish:
  - un elegido
  - un joven
  lexicon: HALOT
  rationale: Aunque בָּחוּר puede significar “joven”, el contexto de selección divina favorece el sentido de “escogido”. «Escogido» conserva esa tensión y respeta la lectura adoptada por el POB inglés.
- source_word: מֵעָם
  english_pob_choice: from the people
  chosen_spanish: de entre el pueblo
  alternatives_spanish:
  - del pueblo
  - entre el pueblo
  lexicon: HALOT
  rationale: La preposición מן indica origen o procedencia. «De entre el pueblo» hace explícita la idea de selección desde la masa general y suena más natural que un calco rígido.
theological_decisions:
- issue: Alcance del destinatario de לַחֲסִידֶיךָ
  english_pob_reading: Plural 'your faithful ones' following the supplied WLC consonantal/vocalized text, with a note preserving the singular textual tradition.
  chosen_spanish_reading: Plural «a tus fieles», con nota que reconoce la lectura singular en otra tradición textual.
  alternative_spanish_readings:
  - a tu fiel
  - a tus santos
  rationale: El texto hebreo proporcionado y su morfología son plurales. Para no armonizar silenciosamente con tradiciones que leen singular, se conserva el plural en el texto principal y se documenta la alternativa en una nota.
  doctrine_reference: Primacía del texto fuente y transparencia textual frente a la tradición de traducción.
- issue: Referente de «un escogido de entre el pueblo» en el contexto davídico
  english_pob_reading: The verse remains at the level of the immediate Davidic referent without explicit messianic expansion in translation.
  chosen_spanish_reading: La traducción mantiene el referente inmediato davídico sin explicitar una ampliación mesiánica.
  alternative_spanish_readings:
  - una lectura tipológica hacia el Mesías
  - un cumplimiento mesiánico explícito
  rationale: En el nivel léxico y gramatical, el verso habla de una elección y exaltación concretas. La posible lectura tipológica cristiana no debe imponerse en la traducción, aunque pueda reconocerse teológicamente en otros contextos.
  doctrine_reference: Respeto al sentido inmediato del texto y a la tensión entre lectura histórica y lectura tipológica.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB inglés, que volvió a una formulación más cercana a שִׁוִּיתִי עֵזֶר עַל גִּבּוֹר: «set help upon a mighty one». Por eso el español conserva la imagen de ayuda puesta «sobre» alguien y evita suavizarla a una forma más interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Fieles» se usa en sentido pactal, no como sustituto automático de «santos».
  - «Escogido» preserva la ambigüedad controlada entre elección y posible juventud, tal como lo hace la nota inglesa.
  - La sintaxis busca ser publicable y natural en español, sin perder la metáfora de colocación de la ayuda sobre el poderoso.
