translation:
  language: es
  text: 'El perezoso dice[a]: «¡Hay un león en el camino! ¡Un león en las plazas públicas!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las calles». El hebreo se refiere más específicamente a espacios públicos amplios o plazas dentro de una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: perezoso
  alternatives_spanish:
  - ocioso
  - indolente
  lexicon: HALOT
  rationale: El sustantivo designa un tipo de persona caracterizada por la pereza habitual. En español, 'perezoso' comunica esa cualidad de manera natural y comprensible; 'ocioso' o 'indolente' son posibles, pero 'perezoso' es el equivalente más directo y claro para un proverbio de carácter tipológico.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en el estilo proverbial expresa una afirmación general o habitual. El presente 'dice' conserva ese valor gnómico mejor que el pasado 'dijo'.
- source_word: שַׁחַל
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - león feroz
  - león joven
  lexicon: HALOT
  rationale: El término denota un león, con posible matiz de fuerza o fiereza, pero el proverbio no desarrolla esa distinción. Traducir simplemente 'león' mantiene el paralelismo y la repetición retórica.
- source_word: בַּדָּרֶךְ
  english_pob_choice: in the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la calle
  - en la vía
  lexicon: HALOT
  rationale: La expresión señala ubicación en una ruta transitada. 'En el camino' es natural en español y conserva el valor locativo sin introducir una idea distinta.
- source_word: אֲרִי
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - gran león
  lexicon: HALOT
  rationale: Se mantiene el mismo equivalente que para שַׁחַל para reflejar la sinonimia y la repetición enfática del dicho del perezoso.
- source_word: בֵּין הָרְחֹבוֹת
  english_pob_choice: in the public squares
  chosen_spanish: en las plazas públicas
  alternatives_spanish:
  - en las plazas
  - entre las calles anchas
  - en las calles
  lexicon: HALOT
  rationale: רְחֹבוֹת se refiere más específicamente a espacios abiertos amplios dentro de una ciudad, como plazas o explanadas. 'Plazas públicas' refleja ese matiz urbano mejor que 'calles', y conserva el contraste con el 'camino' del miembro anterior.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en su última revisión, con acuerdo alto del revisor; la versión española sigue esa lectura estable sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se usa 'león' de manera uniforme para ambos términos hebreos paralelos, como en el audit trail inglés.
  - Se evita 'SEÑOR' u otra convención de máscara porque no hay aquí un nombre divino en el texto.
  - '''Plazas públicas'' conserva el sentido urbano amplio de רְחֹבוֹת y evita reducirlo a ''calles''.'
