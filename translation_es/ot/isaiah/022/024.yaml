review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la imagen central del hebreo: toda la gloria de la casa paterna colgada de Eliacim como soporte, junto con la lista metafórica de recipientes. Sin embargo, hay dos desajustes relevantes con el audit trail y con la claridad semántica: «las ramas» reduce en exceso el raro וְהַצְּפִעוֹת a una imagen botánica demasiado literal donde el inglés auditado terminó en «the issue»; y «todos los utensilios pequeños» cambia el singular colectivo «every small vessel» a plural distributivo menos ceñido y algo menos elegante en español. También conviene mejorar la nota b para reflejar que el hebreo probablemente distingue líneas principales y ramas menores, sin fijar en el texto una metáfora botánica tan marcada.'
  spanish_quality_summary: 'El español es claro y legible, pero puede pulirse para sonar más natural y más preciso: «la descendencia y las ramificaciones» o «la descendencia y las líneas menores» evita la torpeza de «las ramas» aplicado a personas, y «todo utensilio pequeño» reproduce mejor el valor colectivo singular del hebreo/POB. El resto —«colgarán de él», «gloria», «cuencos», «cántaros»— es idiomático y digno.'
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. Las decisiones principales («gloria», no «honor»; imagen concreta de colgar; recipientes domésticos, no instrumentos) siguen bien la documentación inglesa. La excepción necesaria es ajustar la representación de וְהַצְּפִעוֹת para no fijar en español una metáfora menos sustentada que la del audit trail final.
  issues:
  - severity: medium
    issue: «las ramas» para וְהַצְּפִעוֹת suena demasiado literal y poco natural para miembros de familia
    rationale: El término hebreo es raro. La nota inglesa explica probablemente ‘descendientes principales y ramas menores’, pero el texto final inglés evitó ‘offshoots’ y quedó en ‘issue’. En español, «las ramas» aplicado a personas puede distraer o sonar tosco. Conviene una opción más idiomática que preserve la idea de líneas familiares secundarias.
  - severity: medium
    issue: «todos los utensilios pequeños» no reproduce tan bien el singular colectivo de כֹּל כְּלֵי הַקָּטָן
    rationale: El inglés auditado usa «every small vessel». En español, «todo utensilio pequeño» o «todo recipiente pequeño» conserva mejor el valor distributivo-colectivo y la secuencia estilizada de la imagen.
  - severity: low
    issue: La nota b repite la misma expresión del texto y no aclara suficientemente la distinción familiar
    rationale: La nota debería explicar la probable distinción entre descendencia principal y líneas secundarias, especialmente si el texto español evita una metáfora botánica rígida.
  revised_spanish_text: Y colgarán de él toda la gloria de la casa de su padre[a], la descendencia y las ramificaciones[b], todo utensilio pequeño, desde los cuencos[c] hasta todos los cántaros.
  revised_footnotes:
