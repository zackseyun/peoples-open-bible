translation:
  language: es
  text: Por la noche, mis huesos son traspasados en mí[a], y mis dolores que me roen[b] no se acuestan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «son perforados», «son horadados» o «son atravesados». El hebreo es difícil; la imagen literal puede entenderse también de forma más general como un dolor que «roe».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis nervios», «mis venas» o «mis tendones». El término hebreo es raro y puede nombrar canales o cuerdas del cuerpo; aquí se sigue la lectura contextual de dolores que no cesan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְלָה
  english_pob_choice: At night
  chosen_spanish: Por la noche
  alternatives_spanish:
  - De noche
  - En la noche
  lexicon: HALOT
  rationale: La forma temporal del hebreo funciona adverbialmente; «Por la noche» expresa bien el marco temporal sin sonar forzado en español.
- source_word: עֲצָמַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mi esqueleto
  - mi cuerpo
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del hebreo y la decisión inglesa de mantener la literalidad de «bones».
- source_word: נִקַּר
  english_pob_choice: are pierced
  chosen_spanish: son traspasados
  alternatives_spanish:
  - son perforados
  - son horadados
  - son atravesados
  lexicon: HALOT
  rationale: El verbo sugiere perforar/ahuecar/traspasar. «Son traspasados» conserva la violencia física de la imagen y resulta natural en español bíblico moderno.
- source_word: מֵעָלָי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - dentro de mí
  - sobre mí
  - de sobre mí
  lexicon: HALOT
  rationale: La expresión hebrea es difícil; la versión inglesa optó por una equivalencia idiomática. «En mí» preserva la localización interna de la aflicción con un español más directo y sobrio.
- source_word: וְעֹרְקַי
  english_pob_choice: my gnawing pains
  chosen_spanish: mis dolores roedores
  alternatives_spanish:
  - mis dolores que roe[n]
  - mis venas
  - mis nervios
  lexicon: HALOT
  rationale: El término es raro y debatido. La POB inglesa lo interpretó contextualmente como dolores que carcomen/roen. «Dolores roedores» mantiene esa lectura metonímica y no borra la tensión léxica frente a lecturas más anatómicas.
- source_word: לֹא יִשְׁכָּבוּן
  english_pob_choice: do not lie down
  chosen_spanish: no se acuestan
  alternatives_spanish:
  - no descansan
  - no reposan
  - no se tienden
  lexicon: HALOT
  rationale: Se conserva la metáfora del descanso/sueño del verbo literal «acostarse/recostarse», como en la decisión inglesa de mantener «lie down».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó «within me» a «in me» para mayor literalidad, y se preservó la decisión POB de mantener la imagen corporal intensa junto con la ambigüedad léxica de וְעֹרְקַי.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el nombre divino aparezca; este versículo no lo contiene.
  - Se conserva el registro poético y doloroso sin suavizar la imagen física.
  - No se normalizó el término raro וְעֹרְקַי a un órgano único en el texto principal, para no borrar la tensión documentada.
