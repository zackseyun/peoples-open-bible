translation:
  language: es
  text: ¿Acaso Dios oirá su clamor[a] cuando le sobrevenga[b] la aflicción[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su grito’ o ‘su súplica’.
    reason: lexical_alternative
  - marker: b
    text: O ‘si le sobreviene’; la conjunción hebrea también puede leerse condicionalmente, aunque el sentido temporal ‘cuando’ encaja bien en el contexto.
    reason: alternative_reading
  - marker: c
    text: ‘Aflicción’ también puede traducirse ‘problema’, ‘calamidad’ o ‘angustia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצַּעֲקָתוֹ
  english_pob_choice: his cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su voz de angustia
  - su súplica
  lexicon: HALOT
  rationale: צעקה expresa un clamor o grito de auxilio en contexto de aflicción. 'Clamor' conserva ese carácter urgente y solemne en español, y funciona bien como equivalente natural de 'his cry'.
- source_word: יִשְׁמַע
  english_pob_choice: will hear
  chosen_spanish: escuchará
  alternatives_spanish:
  - oirá
  - prestará atención
  - sentirá
  lexicon: HALOT
  rationale: El yiqtol aquí tiene fuerza futura/interrogativa. 'Escuchará' reproduce la pregunta retórica con naturalidad en español y sugiere atención efectiva, no mera percepción auditiva.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - el Poderoso
  lexicon: HALOT
  rationale: אֵל nombra a Dios en sentido general. 'Dios' es la equivalencia más clara y idiomática en español para esta pregunta retórica.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  - si es que
  - porque
  lexicon: HALOT
  rationale: Aunque כִּי puede ser condicional, el valor temporal encaja mejor aquí y sigue la lectura principal del POB en inglés. 'Cuando' conserva esa relación temporal sin forzar el español.
- source_word: תָבֹוא
  english_pob_choice: comes
  chosen_spanish: le sobrevenga
  alternatives_spanish:
  - llegue
  - caiga sobre él
  - venga
  lexicon: HALOT
  rationale: בוא con על expresa algo que viene sobre una persona. 'Le sobrevenga' comunica bien esa irrupción adversa con un matiz más natural que un simple 'venga'.
- source_word: עָלָיו
  english_pob_choice: upon him
  chosen_spanish: le
  alternatives_spanish:
  - sobre él
  - encima de él
  - contra él
  lexicon: HALOT
  rationale: El complemento ya queda incorporado en 'le sobrevenga', que refleja la construcción על con mayor fluidez en español y evita una repetición pesada.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: la angustia
  alternatives_spanish:
  - la aflicción
  - la tribulación
  - la calamidad
  - el apuro
  lexicon: HALOT
  rationale: '''Angustia'' captura bien la presión dolorosa e interna de צָרָה en este contexto. Mantiene el campo semántico de ''distress'' sin exagerar hacia catástrofe.'
theological_decisions:
- issue: 'Lectura de כִּי: temporal o condicional'
  english_pob_reading: when distress comes upon him
  chosen_spanish_reading: cuando le sobrevenga la angustia
  alternative_spanish_readings:
  - si le sobreviene la angustia
  - si la angustia le sobreviene
  rationale: Se mantiene la lectura temporal como opción principal, porque encaja mejor con la línea del hebreo y con la decisión auditada del POB en inglés. La alternativa condicional se preserva en nota para no borrar la ambigüedad real del hebreo.
  doctrine_reference: Poetic Hebrew syntax; no doctrinal issue.
translation_notes:
  revision_awareness: El inglés POB más reciente no muestra revisiones aplicadas y el juicio de revisión quedó en alta concordancia; por eso se conserva la lectura principal 'when' y el sentido de 'distress' sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֵל, conforme al estándar español del proyecto.
  - Se mantiene ‘angustia’ para צָרָה porque expresa bien la presión o aflicción del contexto.
  - Se evitó ‘SEÑOR’ porque el texto hebreo usa אֵל, no יהוה.
  - 'El verbo principal se formuló como pregunta retórica con inversión natural del español: ‘¿Acaso Dios escuchará…?’'
