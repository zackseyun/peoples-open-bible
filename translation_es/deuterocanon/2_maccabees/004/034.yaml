base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/004/034.yaml
  text: Therefore Menelaus took Andronicus aside privately and urged him to strike down Onias by treachery[a]. Andronicus went to Onias, and after winning his confidence by deceit and greeting him with oaths, giving him his right hand, though he was under suspicion, he persuaded him to come out from the place of asylum. Then he immediately shut him away[c][b], showing no regard for justice.
  footnotes:
  - marker: a
    text: The Greek word rendered 'to strike down ... by treachery' is textually and lexically difficult; the sense in context is that Menelaus privately urged Andronicus to arrange Onias's death.
    reason: textual_variant
  - marker: b
    text: Or 'to come out of the sanctuary' or 'to leave the refuge.' The Greek ἄσυλον refers to a protected place of asylum.
    reason: lexical_alternative
  - marker: c
    text: Context may imply more strongly, 'he murdered him' or 'had him put to death,' though the Greek verb here is less explicit.
    reason: alternative_reading
