translation:
  language: es
  text: El agua robada es dulce, y el pan en secreto[a] es agradable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pan de secreto» / «el pan en lugares ocultos». La expresión hebrea es comprimida; la traducción expresa el sentido idiomático más probable sin añadir «comido» ni otra acción que el texto no dice explícitamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: En hebreo, el sustantivo plural puede funcionar como colectivo. En español, ‘aguas’ conserva mejor la pluralidad formal del original y la imagen poética del verso; ‘agua’ sería también posible como masa, pero aquí el paralelo favorece la forma plural.
- source_word: גְּנוּבִים
  english_pob_choice: stolen
  chosen_spanish: robadas
  alternatives_spanish:
  - hurtadas
  - tomadas furtivamente
  lexicon: HALOT
  rationale: Es un participio pasivo de גנב. ‘Robadas’ comunica de modo natural la acción de haber sido obtenidas por robo, sin suavizar la fuerza léxica.
- source_word: יִמְתָּקוּ
  english_pob_choice: is sweet
  chosen_spanish: son dulces
  alternatives_spanish:
  - tienen dulzura
  - saben dulces
  lexicon: HALOT
  rationale: El verbo expresa cualidad gustativa/valorativa. En español, el predicado nominal plural ‘son dulces’ mantiene la equivalencia estatativa del hebreo y la concordancia con ‘aguas’.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  lexicon: HALOT
  rationale: ‘Pan’ preserva la imagen concreta y el paralelismo con ‘aguas’. ‘Alimento’ sería más genérico y menos fiel a la densidad imagética del texto.
- source_word: סְתָרִים
  english_pob_choice: in secret / of secrecy
  chosen_spanish: de secreto
  alternatives_spanish:
  - de secretismo
  - en secreto
  - de escondite
  lexicon: HALOT
  rationale: La forma hebrea es compacta y nominal, literalmente algo como ‘de secreto/ocultamiento’. ‘De secreto’ conserva la construcción abreviada sin añadir una acción no explícita, y refleja la revisión inglesa que evitó ‘eaten in secret’.
- source_word: יִנְעָם
  english_pob_choice: is pleasant
  chosen_spanish: es agradable
  alternatives_spanish:
  - es deleitoso
  - es placentero
  lexicon: HALOT
  rationale: ‘Agradable’ reproduce el valor evaluativo de נעם con un registro claro y digno en español. ‘Delicioso’ o ‘placentero’ serían posibles, pero ‘agradable’ mantiene mejor el paralelismo con ‘dulces’ sin intensificar demasiado.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la segunda cláusula desde una formulación interpretativa (‘bread eaten in secret’) a una más cercana al hebreo (‘bread of secrecy’). La versión española sigue esa decisión y evita introducir un verbo de consumo que no está en el original.
  spanish_consistency_notes:
  - Se mantiene ‘aguas’ en plural para respetar la forma hebrea y el paralelismo poético.
  - Se evita ‘SEÑOR’ o terminología teológica no pertinente, porque el versículo no contiene el nombre divino ni un título teológico explícito.
  - ‘De secreto’ reproduce la condensación nominal del hebreo; si se leyera como locución adverbial, la nota ofrece esa alternativa sin perder la lectura principal.
