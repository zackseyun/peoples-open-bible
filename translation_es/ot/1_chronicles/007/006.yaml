translation:
  language: es
  text: 'Los hijos de Benjamín: Bela, Beker[a] y Yedíael—tres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones tradicionales escriben este nombre como «Becher»; aquí se usa «Beker», una forma que representa más directamente el hebreo.
