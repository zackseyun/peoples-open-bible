translation:
  language: es
  text: Me vestiste de piel y carne[a], y me entretejiste con huesos y nervios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y me cubriste con huesos y nervios". El verbo hebreo también puede expresar cubrir o cercar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹר
  english_pob_choice: skin
  chosen_spanish: piel
  alternatives_spanish:
  - cáscara
  - cuero
  lexicon: HALOT
  rationale: En el contexto del cuerpo humano formado en el vientre, עוֹר designa 'piel'. 'Cuero' o 'cáscara' no corresponden al cuerpo humano y sonarían impropios en español.
- source_word: בָשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - músculo
  lexicon: HALOT
  rationale: '''Carne'' conserva la concreción corporal del paralelo con ''piel'' y es la equivalencia natural de בָשָׂר en español bíblico y moderno. ''Cuerpo'' es demasiado general; ''músculo'' estrecha indebidamente el sentido.'
- source_word: תַּלְבִּישֵׁנִי
  english_pob_choice: you clothed me
  chosen_spanish: me vestiste
  alternatives_spanish:
  - me cubriste
  - me revestiste
  lexicon: HALOT
  rationale: El hiphil de לבש significa vestir/poner ropa. 'Me vestiste' comunica bien la metáfora de poner piel y carne sobre la estructura corporal. 'Me revestiste' es posible pero menos natural; 'me cubriste' pierde la imagen de vestidura.
- source_word: בַּעֲצָמוֹת
  english_pob_choice: with bones
  chosen_spanish: con huesos
  alternatives_spanish:
  - con los huesos
  - en huesos
  lexicon: HALOT
  rationale: La preposición ב aquí expresa asociación/instrumento en el paralelismo. 'Con huesos' es la forma más natural en español y mantiene el valor compositivo del texto.
- source_word: גִידִים
  english_pob_choice: sinews
  chosen_spanish: tendones
  alternatives_spanish:
  - sienes
  - ligamentos
  lexicon: HALOT
  rationale: גִידִים refiere a tejidos conectivos. 'Tendones' es el equivalente más preciso en español contemporáneo; 'ligamentos' también es posible, pero 'tendones' suele ser más amplio y claro en este contexto poético.
- source_word: תְּסֹכְכֵנִי
  english_pob_choice: wove me together
  chosen_spanish: me entretejiste
  alternatives_spanish:
  - me cubriste
  - me cercaste
  - me tejiste
  lexicon: HALOT
  rationale: El verbo סכך puede significar cubrir, cercar o entretejer según el contexto. Aquí la imagen corporal sugiere una formación envolvente e ինտഗ്രada; 'me entretejiste' refleja bien la idea de articulación orgánica sin reducirla a 'cubrir'.
theological_decisions:
- issue: Imagen antropológica de la formación divina del cuerpo
  english_pob_reading: The verse is rendered as poetic description of God's forming Job's body in the womb, without importing additional doctrinal claims about creation beyond the text.
  chosen_spanish_reading: El verso se vierte como descripción poética de cómo Dios formó el cuerpo de Job en el vientre, sin añadir afirmaciones doctrinales que el texto no explicita.
  alternative_spanish_readings:
  - Una lectura más literal que ponga el acento en 'cubrir' o 'ceñir' en vez de entretejer.
  - Una lectura más interpretativa que haga explícita la creación ex nihilo.
  rationale: La poesía de Job presenta la formación corporal con imágenes concretas. 'Me entretejiste' preserva esa imagen y mantiene la tensión del hebreo entre cubrir, rodear y tejer, sin resolverla dogmáticamente ni desmaterializarla.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el último estado del POB en inglés, que pasó de 'knit me together' a 'wove me together' para reflejar más directamente el matiz de cubrir/entrelazar del verbo hebreo. La versión española adopta 'me entretejiste' por la misma razón, conservando el tono poético y la relación con la imagen de vestidura.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito conforme al sujeto del verso, sin introducir 'Yahvé' porque el hebreo no contiene el tetragrámaton en esta cláusula.
  - '''Piel'', ''carne'', ''huesos'' y ''tendones'' conservan el paralelismo corporal concreto del hebreo.'
  - '''Entretejiste'' funciona como equivalente optimal al cambio inglés reciente hacia ''wove me together''.'
