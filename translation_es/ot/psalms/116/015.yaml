translation:
  language: es
  text: Preciosa[a] a los ojos de Yahvé es la muerte de sus fieles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Costosa a la vista de Yahvé es la muerte de sus fieles».'
    reason: lexical_alternative
  - marker: b
    text: «Fieles» también puede traducirse como «santos» o «piadosos»; el hebreo se refiere a quienes se distinguen por su lealtad al pacto con Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקָר
  english_pob_choice: Precious
  chosen_spanish: Preciosa
  alternatives_spanish:
  - valiosa
  - costosa
  - estimada
  lexicon: HALOT
  rationale: El adjetivo expresa que algo es valioso, precioso o costoso. «Preciosa» conserva bien el sentido de valor y respeto del texto, con una formulación natural en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la vista de
  - en la perspectiva de
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de evaluación desde la perspectiva de alguien. «Ante los ojos de» mantiene la metáfora y su sentido de valoración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como forma española del nombre divino, no una sustitución por título.'
- source_word: הַמָּוְתָה
  english_pob_choice: the death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - la muerte misma
  lexicon: HALOT
  rationale: El artículo definido del hebreo se refleja de manera natural con «la muerte» en español, sin añadir énfasis inexistente en el original.
- source_word: לַחֲסִידָיו
  english_pob_choice: of his faithful ones
  chosen_spanish: de sus fieles
  alternatives_spanish:
  - de sus santos
  - de sus piadosos
  - de los que le son leales
  lexicon: HALOT
  rationale: חָסִיד denota personas marcadas por lealtad de pacto, piedad o fidelidad. «Fieles» comunica ese matiz sin imponer una carga eclesiástica posterior como «santos».
theological_decisions:
- issue: Valor de la muerte de los justos delante de Dios
  english_pob_reading: The verse states that the death of the LORD's faithful is precious/valuable in his sight, emphasizing divine regard rather than delight in death.
  chosen_spanish_reading: El versículo afirma que la muerte de los fieles de Yahvé es preciosa ante sus ojos, subrayando el valor que Dios le atribuye, no un deleite en la muerte misma.
  alternative_spanish_readings:
  - La muerte de sus fieles es costosa para Yahvé
  - La muerte de sus fieles es significativa ante Yahvé
  rationale: 'La palabra hebrea puede expresar preciosidad, costo o peso. La versión mantiene esa tensión sin resolverla en exceso: Dios considera valiosa esa muerte, pero el texto no afirma que se complazca en ella.'
  doctrine_reference: Preservar la tensión teológica del texto
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran acuerdo alto y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la lectura estable, preservando la ambigüedad léxica principal de יָקָר sin resolverla de forma interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - «Fieles» mantiene el matiz de lealtad de pacto de חֲסִידִים sin cargarlo con terminología eclesiástica posterior.
  - La construcción «ante los ojos de» conserva la metáfora hebrea y su sentido evaluativo.
