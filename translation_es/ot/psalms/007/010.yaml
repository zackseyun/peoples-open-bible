translation:
  language: es
  text: Te ruego que el mal de los impíos llegue a su fin, pero establece al justo; oh, Dios justo, que examinas los corazones y las mentes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «riñones», imagen de lo más profundo del ser, de los afectos y de la conciencia interior.'
    reason: cultural_note
lexical_decisions:
- source_word: יִגְמָר
  english_pob_choice: come to an end
  chosen_spanish: termine
  alternatives_spanish:
  - llegue a su fin
  - se acabe
  lexicon: HALOT
  rationale: El jussivo expresa una petición para que el mal cese o llegue a su término. «Termine» conserva esa idea de finalización en un español natural y reverente.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - oh
  lexicon: HALOT
  rationale: La partícula de ruego se expresa bien con una fórmula de súplica directa y contemporánea. «Por favor» mantiene el tono apelativo sin volverlo arcaico.
- source_word: רַע רְשָׁעִים
  english_pob_choice: the evil of the wicked
  chosen_spanish: el mal de los impíos
  alternatives_spanish:
  - la maldad de los impíos
  - las malas obras de los impíos
  lexicon: HALOT
  rationale: La combinación compacta hebrea vincula el mal con los impíos sin especificar si se trata de actos, condición o perversidad. «El mal de los impíos» conserva esa amplitud.
- source_word: וּתְכוֹנֵן
  english_pob_choice: establish
  chosen_spanish: establece
  alternatives_spanish:
  - afirma
  - haz firme
  lexicon: HALOT
  rationale: La petición pide que Dios haga firme al justo. «Establece» es idiomático en español y conserva el sentido de dar solidez o permanencia.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al justo hombre
  lexicon: HALOT
  rationale: El sustantivo funciona de forma representativa o colectiva. En español, «al justo» mantiene esa fuerza sin añadir explicaciones.
- source_word: בֹחֵן לִבּוֹת וּכְלָיֹות
  english_pob_choice: who examines hearts and minds
  chosen_spanish: que examinas los corazones y los riñones
  alternatives_spanish:
  - que examinas los corazones y las entrañas
  - que escudriñas los corazones y los riñones
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea concreta de «riñones» para transparencia textual, como el inglés POB original con nota cultural. «Corazones» conserva el antropologismo hebreo del centro interior de la persona.
- source_word: אֱלֹהִים צַדִּיק
  english_pob_choice: O righteous God
  chosen_spanish: oh Dios justo
  alternatives_spanish:
  - Dios es justo
  - justo Dios
  lexicon: HALOT
  rationale: La secuencia final puede leerse como vocativo o como declaración. En el flujo de oración, «oh Dios justo» hace explícita la dirección a Dios y conserva la tensión interpretativa sin resolverla dogmáticamente.
theological_decisions:
- issue: Si אֱלֹהִים צַדִּיק debe tomarse como vocativo o como una afirmación separada
  english_pob_reading: 'direct address/apposition: ''O righteous God'''
  chosen_spanish_reading: 'vocativo: ''oh Dios justo'''
  alternative_spanish_readings:
  - '''Dios es justo'' como cláusula separada'
  - '''justo Dios'' como aposición nominal'
  rationale: El contexto inmediato son peticiones dirigidas a Dios. El hebreo permite leer las palabras finales como invocación o como declaración, y la traducción española conserva esa tensión al integrar la frase en la oración sin cerrar la ambigüedad con una glosa doctrinal.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Cómo representar el paralelismo antropológico 'corazones y riñones'
  english_pob_reading: hearts and minds
  chosen_spanish_reading: corazones y riñones
  alternative_spanish_readings:
  - corazones y mentes
  - corazones y entrañas
  - corazones y lo más íntimo
  rationale: 'El hebreo usa una antropología concreta: el corazón para el centro interior y los riñones para la sede de las profundidades afectivas o morales. Mantener ambos términos evita sustituir la imagen por una explicación interpretativa en el texto principal.'
  doctrine_reference: POB lexical transparency principle
translation_notes:
  revision_awareness: El borrador sigue la forma final inglesa del POB, que sustituyó 'kidneys' por 'minds' en la prosa principal, pero en español se prefirió conservar la metáfora hebrea de 'riñones' en el texto principal para transparencia y se explicó su valor idiomático en nota. También se mantuvo la posibilidad de leer las palabras finales como vocativo o como afirmación, reflejando la nota alternativa del auditable inglés.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים conforme al estándar del proyecto.
  - Se preservó el paralelismo 'corazones y riñones' para no neutralizar una imagen corporal específica del hebreo.
  - Se empleó 'impíos' y 'justo' por su correspondencia semántica con רְשָׁעִים y צַדִּיק en este contexto.
  - La puntuación con punto y coma separa las dos peticiones del cierre vocativo y ayuda a leer la ambigüedad final sin forzar una interpretación exclusiva.
