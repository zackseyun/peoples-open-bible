translation:
  language: es
  text: Pero Daniel se propuso en su corazón no contaminarse[a] con la comida[b] del rey ni con el vino que él bebía, y pidió permiso al jefe de los eunucos[c] para no contaminarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''no hacerse impuro'' o ''no mancharse''. El hebreo expresa una noción de impureza/contaminación que puede leerse en sentido ritual o moral, sin precisar el mecanismo exacto.'
    reason: lexical_alternative
  - marker: b
    text: O 'la porción de comida' / 'los manjares'. El término hebreo se refiere a la provisión del rey.
    reason: lexical_alternative
  - marker: c
    text: O 'el jefe de los funcionarios de la corte' / 'el principal oficial'. El hebreo puede referirse a eunucos literales o a altos funcionarios de palacio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם ... עַל לִבּוֹ
  english_pob_choice: resolved in his heart
  chosen_spanish: se propuso en su corazón
  alternatives_spanish:
  - resolvió en su corazón
  - determinó en su corazón
  - puso en su corazón
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es 'puso sobre su corazón', un modismo de resolución interior. 'Se propuso en su corazón' conserva la decisión voluntaria e interna en un español natural, sin perder el valor idiomático del hebreo.
- source_word: יִתְגָּאַל
  english_pob_choice: defile himself
  chosen_spanish: contaminarse
  alternatives_spanish:
  - mancharse
  - hacerse impuro
  - contaminarse ritualmente
  lexicon: HALOT
  rationale: El hitpael de גאל aquí apunta a una noción de impureza o profanación. 'Contaminarse' comunica bien la fuerza ritual/moral sin especificar más de lo que el verso dice. Mantiene la tensión interpretativa del texto.
- source_word: פַּתְבַּג
  english_pob_choice: food
  chosen_spanish: la comida
  alternatives_spanish:
  - la porción de comida
  - los manjares
  - las delicias
  lexicon: HALOT
  rationale: El término se refiere a la provisión asignada por el rey. 'La comida' es breve, clara y suficientemente amplia; 'manjares' o 'delicias' podrían sugerir más lujo del que el hebreo exige.
- source_word: יֵין מִשְׁתָּיו
  english_pob_choice: the wine he drank
  chosen_spanish: el vino de su bebida
  alternatives_spanish:
  - el vino que bebía
  - el vino de sus banquetes
  - el vino de su mesa
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'el vino de su beber/banquete'. 'El vino de su bebida' conserva la relación posesiva del original; aunque algo literal, sigue siendo entendible en español y evita reducirlo sin base a 'vino del rey'.
- source_word: שַׂר הַסָּרִיסִים
  english_pob_choice: the chief of the eunuchs
  chosen_spanish: el jefe de los eunucos
  alternatives_spanish:
  - el jefe de los funcionarios de la corte
  - el principal oficial
  - el comandante de los eunucos
  lexicon: HALOT
  rationale: סריסים puede significar eunucos literales o, más ampliamente, altos funcionarios de la corte. 'Jefe de los eunucos' refleja el sentido léxico más directo y mantiene transparencia; la ambigüedad histórica se preserva en la nota.
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: he sought permission
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó permiso
  - suplicó
  - rogó
  lexicon: HALOT
  rationale: El verbo significa 'buscar' o 'pedir'. En este contexto, 'pidió' comunica de forma natural la petición dirigida al oficial. No se explicita 'permiso' en el texto español porque el complemento lo sugiere por el contexto inmediato.
- source_word: אֲשֶׁר לֹא יִתְגָּאַל
  english_pob_choice: that he might not defile himself
  chosen_spanish: que no se contaminara
  alternatives_spanish:
  - para no contaminarse
  - a fin de no contaminarse
  - que no se hiciera impuro
  lexicon: HALOT
  rationale: La cláusula expresa el propósito de la petición. En español, 'que no se contaminara' mantiene el matiz de finalidad y la referencia a la misma raíz verbal del inicio, reforzando la cohesión del verso.
theological_decisions:
- issue: Naturaleza exacta de la 'contaminación' de Daniel
  english_pob_reading: Render the concern as 'defile himself' without specifying whether the defilement was ceremonial, dietary-law related, or tied to idolatrous association.
  chosen_spanish_reading: Traducir con 'contaminarse' sin precisar si la impureza era ceremonial, dietética o por asociación con prácticas paganas.
  alternative_spanish_readings:
  - hacerse ritualmente impuro
  - violar la ley alimentaria de Moisés
  - contaminarse por alimentos ofrecidos a ídolos
  rationale: El hebreo no explica la base exacta de la negativa de Daniel. La traducción debe conservar esa amplitud en vez de resolverla interpretativamente. Así se preserva la tensión teológica y exegética del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de סָרִיסִים
  english_pob_reading: Translate as 'eunuchs' in the main text, while preserving 'court officials' as an alternative in a footnote.
  chosen_spanish_reading: Mantener 'eunucos' en el texto principal y explicar en nota la posibilidad de 'funcionarios de la corte'.
  alternative_spanish_readings:
  - funcionarios de la corte
  - oficiales del palacio
  - funcionarios reales
  rationale: La palabra hebrea puede referirse a eunucos literales o, más ampliamente, a funcionarios cortesanos. El texto principal conserva la forma más transparente al léxico, y la nota resguarda la amplitud semántica reconocida por el audit trail.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: The latest English revision pass reports 'unchanged' with no applied revisions; cross-check status is high_agreement with only minor issues, so the Spanish draft follows the audited English choices closely while keeping the original Hebrew ambiguities intact.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí; no aparece el nombre divino en el verso.
  - Se preserva 'eunucos' en el texto principal, con la amplitud semántica en nota.
  - '''Contaminarse'' se usa de manera consistente para יִתְגָּאַל en ambas apariciones del verso.'
  - La formulación española evita resolver la base exacta de la impureza de Daniel, conforme al audit trail.
