translation:
  language: es
  text: Ella será llevada ante la asamblea[a], y habrá una investigación sobre sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''habrá una visitación sobre sus hijos'', quizá con la implicación de un castigo judicial más que de una simple investigación.'
    reason: alternative_reading
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Esta
  - Esta mujer
  lexicon: LSJ
  rationale: El demostrativo femenino se refiere a la mujer adúltera del contexto inmediato. En español, el pronombre 'ella' mantiene la referencia y suena natural sin introducir más especificación de la que el griego exige.
- source_word: ἐκκλησίαν
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - comunidad
  lexicon: LSJ
  rationale: En Sirácides, el término designa el grupo reunido públicamente, no el sentido técnico posterior de 'iglesia'. 'Asamblea' conserva el marco comunitario y judicial.
- source_word: ἐξαχθήσεται
  english_pob_choice: will be brought out before
  chosen_spanish: será llevada ante
  alternatives_spanish:
  - será conducida ante
  - será sacada ante
  lexicon: LSJ
  rationale: El pasivo futuro de ἐξάγω expresa una acción pública de sacar/presentar a alguien a la vista. 'Será llevada ante' transmite bien esa exposición judicial en español natural.
- source_word: ἐπὶ τὰ τέκνα αὐτῆς
  english_pob_choice: concerning her children
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - contra sus hijos
  - sobre sus hijos
  - acerca de sus hijos
  lexicon: LSJ
  rationale: La construcción con ἐπί es flexible. Aquí el sentido apunta al objeto de la revisión o pesquisa, y en español 'de sus hijos' funciona de manera sobria y directa, sin decidir de antemano si la visita es neutral o punitiva.
- source_word: ἐπισκοπὴ
  english_pob_choice: scrutiny
  chosen_spanish: escrutinio
  alternatives_spanish:
  - inspección
  - visita
  - examen
  lexicon: LSJ
  rationale: ἐπισκοπή puede ser 'visita', 'inspección' o 'escrutinio', con posibles matices judiciales. 'Escrutinio' conserva el carácter formal y examinator io del término sin volverlo eclesiástico ni resolver la tensión entre investigación y juicio.
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - tendrá lugar
  lexicon: LSJ
  rationale: Un futuro existencial simple es la forma más idiomática en español y reproduce la estructura directa del griego.
theological_decisions:
- issue: Cómo traducir ἐκκλησία sin introducir lenguaje eclesial cristiano
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: El contexto sapiencial habla de exposición pública y juicio, no de una institución cristiana posterior. 'Asamblea' evita cargar el texto con un sentido eclesial ajeno al griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy over translation tradition
- issue: Si ἐπισκοπή debe sonar neutral o punitivo
  english_pob_reading: inspection/scrutiny with a possible punitive overtone in the note
  chosen_spanish_reading: escrutinio
  alternative_spanish_readings:
  - inspección
  - visita
  - castigo
  rationale: El texto griego no nombra explícitamente el castigo en esta cláusula, pero sí deja abierta la posibilidad de una pesquisa oficial con consecuencias. 'Escrutinio' preserva esa tensión; la nota mantiene la lectura más fuerte como alternativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB al preferir un sustantivo formal para ἐπισκοπή y mantener el tono judicial del versículo. Se ha optado por 'escrutinio' para conservar naturalidad en español y, a la vez, no eliminar la ambigüedad entre investigación y sanción implícita.
  spanish_consistency_notes:
  - Se mantiene 'asamblea' para ἐκκλησία, en consonancia con el valor comunitario/judicial del término en Sirácides.
  - Se evita 'iglesia' para no introducir una lectura eclesiológica posterior.
  - '''Ella'' preserva la referencia al sujeto femenino sin añadir sustantivos no presentes en el griego.'
  - '''Escrutinio'' conserva el matiz formal del griego ἐπισκοπή y permite la alternativa punteada en la nota.'
