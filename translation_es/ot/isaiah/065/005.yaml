translation:
  language: es
  text: 'los que dicen[a]: «Apártate; no te acerques a mí, porque soy más santo que tú». Estos son humo en mis narices, un fuego que arde todo el día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque soy demasiado santo para ti», o «porque me he mantenido santo de ti». La cláusula hebrea es difícil y expresa una pretensión de superioridad ritual o moral.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָאֹמְרִים
  english_pob_choice: who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - quienes dicen
  - los que andan diciendo
  lexicon: HALOT
  rationale: El participio sustantivado se traduce de manera natural con una relativa sustantivada en español; “los que dicen” conserva la función descriptiva y la continuidad con el reproche del contexto.
- source_word: קְרַב אֵלֶיךָ
  english_pob_choice: Keep to yourself
  chosen_spanish: Apártate
  alternatives_spanish:
  - Quédate aparte
  - Mantente a distancia
  lexicon: HALOT
  rationale: La expresión es imperativa y despectiva en contexto. “Apártate” comunica la separación social y ritual sin sonar artificial en español.
- source_word: אַל תִּגַּשׁ בִּי
  english_pob_choice: do not come near me
  chosen_spanish: no te acerques a mí
  alternatives_spanish:
  - no te aproximes a mí
  - no te llegues a mí
  lexicon: HALOT
  rationale: נגשׁ con ב expresa acercarse a una persona; “no te acerques a mí” preserva el sentido y la naturalidad del español.
- source_word: כִּי קְדַשְׁתִּיךָ
  english_pob_choice: for I am holier than you
  chosen_spanish: porque soy más santo que tú
  alternatives_spanish:
  - porque soy demasiado santo para ti
  - porque me he mantenido santo de ti
  lexicon: HALOT
  rationale: La cláusula es difícil y el POB la deja como una afirmación arrogante de superioridad en santidad. “Más santo que tú” conserva esa tensión sin resolverla prematuramente.
- source_word: עָשָׁן בְּאַפִּי
  english_pob_choice: are smoke in my nostrils
  chosen_spanish: humo en mi nariz
  alternatives_spanish:
  - humo en mis narices
  - humo en mi enojo
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de אף como nariz/narinas, evitando suavizarla a una abstracción sobre la ira. “En mi nariz” refleja el hebreo con claridad.
- source_word: אֵשׁ יֹקֶדֶת
  english_pob_choice: a fire burning
  chosen_spanish: un fuego que arde
  alternatives_spanish:
  - un fuego ardiente
  - un fuego que sigue ardiendo
  lexicon: HALOT
  rationale: La forma participial pide una acción continua; “que arde” reproduce bien el efecto intensificador.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - sin cesar
  lexicon: HALOT
  rationale: Equivalente idiomático natural en español que conserva la duración continua de la imagen.
theological_decisions:
- issue: Interpretación de כִּי קְדַשְׁתִּיךָ
  english_pob_reading: for I am holier than you
  chosen_spanish_reading: porque soy más santo que tú
  alternative_spanish_readings:
  - porque soy demasiado santo para ti
  - porque me he mantenido santo de ti
  rationale: Se mantiene la lectura que presenta la autoafirmación de santidad como arrogante y separadora, tal como exige el contexto profético. La traducción no intenta armonizar la dificultad del hebreo ni eliminar la ironía implícita.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El pasaje coincide con el control crítico principal: la versión inglesa POB ya había optado por una equivalencia óptima que conserva la dureza de la imagen y la dificultad de כִּי קְדַשְׁתִּיךָ. La presente redacción sigue esa línea, sin introducir reinterpretaciones doctrinales ni suavizar el lenguaje figurado.'
  spanish_consistency_notes:
  - Se conserva Yahvé para el nombre divino cuando aparezca en el libro; en este versículo no ocurre.
  - Se mantiene una dicción bíblica moderna y natural, evitando calcos innecesarios.
  - Se preserva la imagen corporal de nariz/narinas para אף, en lugar de sustituirla por una abstracción emocional.
