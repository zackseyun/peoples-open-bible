review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: presentación de los machos cabríos para la ofrenda por el pecado delante del rey y la asamblea, seguida del gesto ritual de poner las manos sobre ellos. También conserva correctamente la nota sobre el sujeto implícito de ''pusieron sus manos''. Sin embargo, ''hicieron acercar'' suena forzado y menos fiel al valor natural de ויגישו en este contexto, donde ''presentaron'' o ''trajeron'' expresa mejor el acto cultual sin calco innecesario.'
  spanish_quality_summary: El texto es comprensible, pero 'hicieron acercar' resulta poco idiomático en español bíblico natural y 'ellos' es redundante y algo tosco. 'Presentaron' mejora la fluidez y sigue siendo fiel al hebreo. El resto de la redacción es clara y de registro digno. Conviene también pulir la redacción de la nota a para quitar comillas/apóstrofos torpes.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Asamblea' para קהל está bien. 'Machos cabríos' representa bien שׂעירי. 'Sacrificio por el pecado' es aceptable, aunque 'ofrenda por el pecado' sería también válido; no hace falta cambiarlo para esta revisión. No hay términos teológicos del glosario mayor afectados.
  issues:
  - severity: medium
    issue: '''Hicieron acercar'' es una formulación poco natural en español'
    rationale: Aunque intenta reflejar el hiphil de נגשׁ, en español suena mecánico. En contexto sacrificial, 'presentaron' transmite fielmente el movimiento/acto cultual y coincide con la alternativa documentada en el audit trail.
  - severity: low
    issue: El pronombre explícito 'ellos' es innecesario
    rationale: El español no requiere ese sujeto expreso y su presencia endurece el estilo. Omitirlo preserva mejor la ambigüedad del hebreo sin añadir énfasis.
  - severity: low
    issue: La nota a tiene puntuación y comillas torpes
    rationale: 'La forma actual (''O: ''''...''''.'') no es limpia ni idiomática. Debe normalizarse para legibilidad editorial.'
  revised_spanish_text: Entonces presentaron los machos cabríos del sacrificio por el pecado[a] delante del rey y de la asamblea, y pusieron sus manos sobre ellos[b].
  revised_footnotes:
  - marker: a
    text: 'O: "presentaron los machos cabríos del sacrificio por el pecado delante del rey y de la asamblea".'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice "pusieron sus manos sobre ellos"; el sujeto más natural se refiere al rey y a la asamblea, quizá mediante representantes.
    reason: alternative_reading
  revision_rationale: Se ajusta el verbo principal a una expresión española más natural y fiel al uso cultual de נגשׁ, se elimina un pronombre redundante, y se corrige la presentación editorial de la nota sin cambiar el sentido ni la ambigüedad interpretativa preservada por el original y por el POB inglés.
