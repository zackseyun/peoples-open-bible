translation:
  language: es
  text: Pero las naciones seguían haciendo, cada una, sus propios dioses, y los ponían en las casas de los lugares altos que los samaritanos[a] habían hecho, cada nación en las ciudades donde habitaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los habitantes de Samaria habían hecho».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ עֹשִׂים
  english_pob_choice: kept making
  chosen_spanish: seguía haciendo
  alternatives_spanish:
  - hacía
  - continuaba haciendo
  lexicon: HALOT
  rationale: La construcción verbal con participio en narrativa pasada expresa acción continuada o habitual; en español, «seguía haciendo» comunica bien ese valor iterativo sin sonar forzado.
- source_word: גּוֹי גּוֹי
  english_pob_choice: each nation
  chosen_spanish: cada nación
  alternatives_spanish:
  - nación por nación
  - toda nación
  lexicon: HALOT
  rationale: 'La repetición distributiva pide un sentido de individualización: «cada nación» preserva ese valor de manera natural en español.'
- source_word: אֱלֹהָיו
  english_pob_choice: its own gods
  chosen_spanish: sus propios dioses
  alternatives_spanish:
  - sus dioses
  - los dioses de cada una
  lexicon: HALOT
  rationale: El sufijo posesivo es distributivo respecto de cada nación; «sus propios dioses» refleja tanto la posesión como la separación entre los cultos de cada pueblo.
- source_word: וַיַּנִּיחוּ
  english_pob_choice: they put
  chosen_spanish: los ponían
  alternatives_spanish:
  - los colocaban
  - los pusieron
  lexicon: HALOT
  rationale: El verbo denota colocar o depositar. En español, «ponían» mantiene el matiz de colocación cultual y, junto con el aspecto continuado del contexto, conserva la acción repetida.
- source_word: בְּבֵית הַבָּמוֹת
  english_pob_choice: in the houses of the high places
  chosen_spanish: en las casas de los lugares altos
  alternatives_spanish:
  - en las casas de los altares altos
  - en los santuarios de los lugares altos
  lexicon: HALOT
  rationale: La construcción literal «casa de los lugares altos» se entiende mejor en español como «casas de los lugares altos», manteniendo el referente arquitectónico/cultual sin sustituirlo por una equivalencia interpretativa demasiado fuerte.
- source_word: אֲשֶׁר עָשׂוּ הַשֹּׁמְרֹנִים
  english_pob_choice: that the Samaritans had made
  chosen_spanish: que los samaritanos habían hecho
  alternatives_spanish:
  - que la gente de Samaria había hecho
  - que los habitantes de Samaria habían hecho
  lexicon: HALOT
  rationale: El hebreo designa a los shomronim; el POB inglés optó por «Samaritans». En español, «samaritanos» es la correspondencia directa y conserva la referencia histórica del texto.
- source_word: בְּעָרֵיהֶם
  english_pob_choice: in the cities
  chosen_spanish: en las ciudades
  alternatives_spanish:
  - en sus ciudades
  - en las ciudades de ellos
  lexicon: HALOT
  rationale: El sufijo es distributivo y queda suficientemente expresado por el contexto inmediato; «en las ciudades» fluye con naturalidad en español.
- source_word: אֲשֶׁר הֵם יֹשְׁבִים שָׁם
  english_pob_choice: where they lived
  chosen_spanish: donde habitaban
  alternatives_spanish:
  - donde vivían
  - donde moraban
  lexicon: HALOT
  rationale: El participio expresa residencia estable. «Habitaban» es digno y preciso, y conserva mejor el matiz de asentamiento que un simple «vivían».
theological_decisions:
- issue: Identidad de הַשֹּׁמְרֹנִים
  english_pob_reading: the Samaritans
  chosen_spanish_reading: los samaritanos
  alternative_spanish_readings:
  - la gente de Samaria
  - los habitantes de Samaria
  rationale: El contexto histórico de la caída del reino del norte permite traducir directamente el etnónimo con la forma española usual. Aunque el POB inglés menciona una alternativa para evitar una lectura sectaria posterior, en español «samaritanos» sigue siendo claro y no añade doctrina ajena al pasaje.
  doctrine_reference: Preservar la referencia histórica del texto sin imponer una distinción posterior no requerida por el hebreo.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés al usar una formulación más literal para בְּבֵית הַבָּמוֹת y al reflejar directamente a הַשֹּׁמְרֹנִים como «los samaritanos». También conserva el valor distributivo de גּוֹי גּוֹי y el aspecto continuado de וַיִּהְיוּ עֹשִׂים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - «Dios» se reserva para traducciones explícitas de אֱלֹהִים; aquí el plural posesivo exige «dioses».
  - «Lugares altos» sigue el término del proyecto para בָּמוֹת, sin sustituirlo por una glosa interpretativa excesiva.
  - El final «donde habitaban» traduce el valor estable de יֹשְׁבִים sin introducir una paráfrasis teológica.
