translation:
  language: es
  text: 'Y hasta has nombrado profetas para proclamar acerca de ti en Jerusalén, diciendo: «¡Hay un rey en Judá!». Y ahora estos informes[a] llegarán al rey. Así que ahora, ven[b], y consultemos juntos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas cosas», «estas palabras» o «estos asuntos». El hebreo puede referirse ampliamente a palabras, asuntos o informes.
    reason: lexical_alternative
  - marker: b
    text: La acusación citada es literalmente «rey en Judá», una fórmula hebrea breve que implica una pretensión real sin nombrar explícitamente a Nehemías dentro de la cita.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And you have even
  chosen_spanish: Y aun has
  alternatives_spanish:
  - Y además has
  - Y también has
  - Por si fuera poco, has
  lexicon: HALOT
  rationale: La partícula añade énfasis acusatorio; «aun» conserva ese matiz sin volverse demasiado interpretativa.
- source_word: נְבִיאִים
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - mensajeros
  - vaticinadores
  lexicon: HALOT
  rationale: El sentido ordinario es de profetas reales; no hay base para rebajarlo a mensajeros genéricos.
- source_word: הֶעֱמַדְתָּ
  english_pob_choice: have appointed
  chosen_spanish: has puesto
  alternatives_spanish:
  - has नियुक्तado
  - has establecido
  - has asignado
  lexicon: HALOT
  rationale: En español, «poner» personas en una función pública reproduce de manera natural la idea de designar o colocar para un cometido.
- source_word: לִקְרֹא עָלֶיךָ
  english_pob_choice: to proclaim concerning you
  chosen_spanish: para proclamar acerca de ti
  alternatives_spanish:
  - para proclamar contra ti
  - para dar a conocer sobre ti
  - para anunciar respecto de ti
  lexicon: HALOT
  rationale: La preposición על admite la idea de «acerca de / respecto de»; se evita convertirlo en una acusación más específica que el hebreo por sí mismo.
- source_word: בִירוּשָׁלַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Correspondencia locativa directa y natural.
- source_word: מֶלֶךְ בִּיהוּדָה
  english_pob_choice: There is a king in Judah!
  chosen_spanish: ¡Hay un rey en Judá!
  alternatives_spanish:
  - ¡Un rey está en Judá!
  - ¡Rey en Judá!
  - ¡Él es rey en Judá!
  lexicon: HALOT
  rationale: La frase hebrea es breve y sin verbo explícito; «hay un rey en Judá» comunica la acusación sin añadir un sujeto nombrado que el texto no expresa en la cita.
- source_word: יִשָּׁמַע לַמֶּלֶךְ
  english_pob_choice: these reports will be heard by the king
  chosen_spanish: estos informes llegarán al rey
  alternatives_spanish:
  - el rey oirá estos informes
  - estos informes serán oídos por el rey
  - el rey escuchará estos informes
  lexicon: HALOT
  rationale: El pasivo hebreo de שמע puede expresar que algo «llega a oídos» de alguien; «llegarán al rey» mantiene la idea de circulación de rumores o informes sin forzar una voz pasiva torpe en español.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: these reports
  chosen_spanish: estos informes
  alternatives_spanish:
  - estas cosas
  - estas palabras
  - estos asuntos
  lexicon: HALOT
  rationale: דברים puede significar palabras, asuntos o reportes; en este contexto político, «informes» comunica bien la idea de denuncias o noticias que circulan.
- source_word: וְעַתָּה לְכָה
  english_pob_choice: So now, come
  chosen_spanish: Así que ahora, ven
  alternatives_spanish:
  - Y ahora, ven
  - Pues ahora, ven
  - Ven ahora
  lexicon: HALOT
  rationale: La invitación retórica se conserva de forma directa y natural en español.
- source_word: וְנִוָּעֲצָה
  english_pob_choice: and let us consult
  chosen_spanish: y consultemos
  alternatives_spanish:
  - y tomemos consejo
  - y conversemos
  - y deliberemos
  lexicon: HALOT
  rationale: El valor mutuo/colectivo del verbo se expresa con un subjuntivo exhortativo inclusivo en español.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - conjuntamente
  lexicon: HALOT
  rationale: Adverbio simple y natural que reproduce la acción conjunta.
theological_decisions:
- issue: Alcance de la acusación de realeza
  english_pob_reading: Render the alleged proclamation as an accusation of a royal claim without explicitly inserting Nehemiah's name into the quoted words.
  chosen_spanish_reading: Mantener la cita breve «¡Hay un rey en Judá!» sin añadir el nombre de Nehemías dentro de la cita.
  alternative_spanish_readings:
  - «¡Tú eres rey en Judá!»
  - «¡Nehemías es rey en Judá!»
  rationale: La frase hebrea es verbless y muy concisa; el contexto identifica al blanco de la acusación, pero la cita misma no lo nombra. La traducción preserva esa tensión textual sin expandirla.
  doctrine_reference: Primacía del texto original; no añadir contenido no expresado explícitamente por el hebreo.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail, que afinó la preposición de לִקְרֹא עָלֶיךָ hacia «concerning you / acerca de ti» por precisión formal; en español mantuve «acerca de ti» como equivalente natural y conservé la lectura reportiva de כַּדְּבָרִים הָאֵלֶּה como «informes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se usa «profetas» en sentido ordinario, no una forma debilitada.
  - «Judá» y «Jerusalén» conservan su forma estándar en español bíblico.
  - La puntuación reproduce la alternancia entre discurso directo e indirecto, y la nota a/b queda anclada en el texto donde corresponde.
