review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: continuación circunstancial («Y cuando»), incienso y libaciones a la Reina del Cielo, referencia contextual correcta a «nuestros maridos», y la idea de tortas hechas para representarla. Sin embargo, introduce una expansión interpretativa no expresada directamente en הֲמִבַּלְעֲדֵי אֲנָשֵׁינוּ al decir «sin el consentimiento de nuestros maridos». El hebreo pregunta si actuaron aparte de/sin sus maridos, no explicita el concepto de consentimiento. También conviene mantener más de cerca el paralelismo verbal con la repetición de «derramar libaciones».'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Reina del Cielo», «quemábamos incienso» y «libaciones» funcionan bien. No obstante, «al hacerle tortas» suena algo menos directo que una construcción más paralela al original, y «sin el consentimiento» recarga el texto con una inferencia sociológica. Una leve simplificación mejora fidelidad y naturalidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. El título pagano se conserva adecuadamente como «Reina del Cielo». El léxico ritual «incienso» y «libaciones» está bien. La principal corrección es evitar una paráfrasis interpretativa en la cláusula sobre los maridos.
  issues:
  - severity: high
    issue: «sin el consentimiento de nuestros maridos» añade una idea no explícita en el hebreo
    rationale: הֲמִבַּלְעֲדֵי אֲנָשֵׁינוּ significa ‘aparte de/sin nuestros maridos’. Puede implicar falta de participación o aprobación, pero «consentimiento» interpreta demasiado el texto base.
  - severity: medium
    issue: La sintaxis «al hacerle tortas» debilita la relación más directa del hebreo
    rationale: עָשִׂינוּ לָהּ כַּוָּנִים se expresa más naturalmente y con mayor cercanía como «que le hicimos tortas» o similar dentro de la pregunta retórica.
  - severity: low
    issue: La nota [a] no preserva la alternativa principal del inglés POB
    rationale: La nota inglesa no explica «libaciones» en general, sino que documenta alternativas para לְהַעֲצִבָהּ. La nota actual [a] es innecesaria; la nota útil es la asociada a «representarla».
  revised_spanish_text: Y cuando quemábamos incienso a la Reina del Cielo y le derramábamos libaciones, ¿acaso lo hacíamos aparte de nuestros maridos, que le hicimos tortas para representarla[a] y le derramamos libaciones?
