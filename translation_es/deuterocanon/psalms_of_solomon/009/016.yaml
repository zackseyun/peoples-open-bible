translation:
  language: es
  text: Y ahora, tú eres Dios, y nosotros somos tu pueblo, a quien amaste. Mira y ten compasión, oh Dios de Israel, porque somos tuyos; y no retires de nosotros tu misericordia, para que no vengan contra nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σύ ὁ θεός
  english_pob_choice: you are God
  chosen_spanish: tú eres Dios
  alternatives_spanish:
  - eres Dios
  - tú, Dios eres
  lexicon: None
  rationale: Mantiene el orden enfático del griego con una formulación natural en español, sin añadir un nombre divino distinto al sustantivo 'Dios'.
- source_word: λαὸς σοῦ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - el pueblo tuyo
  lexicon: BDAG
  rationale: '''Pueblo'' expresa mejor la relación pactal y colectiva que ''gente''.'
- source_word: ὃν ἠγάπησας
  english_pob_choice: whom you loved
  chosen_spanish: a quien amaste
  alternatives_spanish:
  - a quien has amado
  - que amaste
  lexicon: BDAG
  rationale: El aoristo se expresa de manera directa con 'amaste', conservando la referencia al amor previo de Dios por su pueblo.
- source_word: οἰκτείρησον
  english_pob_choice: have compassion
  chosen_spanish: ten compasión
  alternatives_spanish:
  - ten piedad
  - apiádate
  lexicon: BDAG
  rationale: '''Ten compasión'' reproduce bien el valor de súplica tierna del verbo sin sonar arcaico; evita cargarlo de matices más fuertes que el griego no exige.'
- source_word: ὁ θεὸς Ἰσραήλ
  english_pob_choice: O God of Israel
  chosen_spanish: oh Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - oh Dios de Israel
  lexicon: None
  rationale: Conserva la invocación directa del griego y la estructura vocativa natural en español.
- source_word: σοί ἐσμεν
  english_pob_choice: we are yours
  chosen_spanish: somos tuyos
  alternatives_spanish:
  - te pertenecemos
  - somos de ti
  lexicon: BDAG
  rationale: '''Somos tuyos'' comunica pertenencia de modo breve y fiel, con tono de alianza.'
- source_word: ἔλεός σου ἀφʼ ἡμῶν
  english_pob_choice: do not withdraw your mercy from us
  chosen_spanish: no retires de nosotros tu misericordia
  alternatives_spanish:
  - no apartes de nosotros tu misericordia
  - no dejes que tu misericordia se aparte de nosotros
  lexicon: BDAG
  rationale: '''Retirar'' conserva el sentido de apartar o hacer que cese la cercanía de la misericordia; es un equivalente idiomático claro en español.'
- source_word: ἐπιθῶνται
  english_pob_choice: lest they come against us
  chosen_spanish: para que no se alcen contra nosotros
  alternatives_spanish:
  - para que no vengan contra nosotros
  - para que no nos ataquen
  lexicon: BDAG
  rationale: La frase mantiene el sujeto implícito indefinido y evita especificar 'ataquen', que sería más interpretativo; 'se alcen contra' expresa bien la hostilidad subyacente.
theological_decisions:
- issue: Pertenencia pactal del pueblo a Dios
  english_pob_reading: we are yours
  chosen_spanish_reading: somos tuyos
  alternative_spanish_readings:
  - te pertenecemos
  - somos de ti
  rationale: La frase conserva una afirmación de pertenencia relacional y pactal sin forzar una formulación doctrinal posterior.
  doctrine_reference: Pertenencia del pueblo a Dios en lenguaje de alianza
- issue: Súplica por la misericordia divina
  english_pob_reading: do not withdraw your mercy from us
  chosen_spanish_reading: no retires de nosotros tu misericordia
  alternative_spanish_readings:
  - no apartes de nosotros tu misericordia
  - no dejes que tu misericordia se aparte de nosotros
  rationale: Se preserva la tensión textual entre la misericordia como don presente y la petición de que no se aparte o retire, sin neutralizarla.
  doctrine_reference: Misericordia divina y preservación
- issue: Agresores no especificados
  english_pob_reading: lest they come against us
  chosen_spanish_reading: para que no se alcen contra nosotros
  alternative_spanish_readings:
  - para que no vengan contra nosotros
  - para que no nos ataquen
  rationale: El griego no identifica al sujeto; por eso la versión española evita precisar quiénes son y conserva la amenaza abierta.
  doctrine_reference: Indeterminación del sujeto en ἐπιθῶνται
translation_notes:
  revision_awareness: La revisión inglesa más reciente suavizó 'attack' a 'come against us' para reflejar mejor el griego ἐπιθῶνται. La versión española sigue esa cautela y evita una especificación más fuerte como 'atacar', optando por 'se alcen contra nosotros' para conservar el sujeto no identificado y la amplitud semántica del original.
  spanish_consistency_notes:
  - Se usa 'Dios' como término básico para θεός, sin sustituirlo por una convención de mayúsculas o por 'Señor'.
  - Se mantiene un registro reverente pero moderno, con 'ten compasión' en lugar de una forma arcaica.
  - No se introduce 'Mesías' ni otros títulos ajenos al versículo.
  - No se añaden notas al pie, porque no hay marcas ancladas en el texto español.
