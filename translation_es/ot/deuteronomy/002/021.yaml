translation:
  language: es
  text: un pueblo grande[a], numeroso y alto como los Anakim. Yahvé los destruyó de delante de ellos, y ellos los desposeyeron y habitaron en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como los Anakim»; alternativamente, «como los Anakitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo-gente
  - un grupo de gente
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo singular; en español, «un pueblo» conserva naturalmente ese valor colectivo sin forzar un plural.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - gran
  lexicon: HALOT
  rationale: Con «pueblo», «grande» comunica tamaño o magnitud de manera clara en español y mantiene el tono descriptivo del hebreo.
- source_word: רַב
  english_pob_choice: numerous
  chosen_spanish: numeroso
  alternatives_spanish:
  - mucho
  - abundante
  lexicon: HALOT
  rationale: Se distingue de גָּדוֹל evitando repetir «grande»; «numeroso» expresa cantidad de personas, que es el matiz principal.
- source_word: רָם
  english_pob_choice: tall
  chosen_spanish: alto
  alternatives_spanish:
  - elevado
  - estatura alta
  lexicon: HALOT
  rationale: En el contexto de comparación con los anakitas, el rasgo físico de estatura está en vista; «alto» es la opción más natural en español.
- source_word: כָּעֲנָקִים
  english_pob_choice: like the Anakim
  chosen_spanish: como los anaceos
  alternatives_spanish:
  - como los anakitas
  - como los Anakim
  lexicon: HALOT
  rationale: Se conserva el nombre del grupo étnico con una forma española estable y bíblica; en este contexto el sentido es comparativo, no descriptivo libre.
- source_word: וַיַּשְׁמִידֵם
  english_pob_choice: destroyed them
  chosen_spanish: los destruyó
  alternatives_spanish:
  - los aniquiló
  - los exterminó
  lexicon: HALOT
  rationale: El verbo expresa destrucción/remoción. «Los destruyó» mantiene fuerza sin exceder el grado de especificación del texto inmediato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: מִפְּנֵיהֶם
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - de ante ellos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «de delante de ellos» conserva bien la imagen de expulsión y despeje del territorio.
- source_word: וַיִּירָשֻׁם
  english_pob_choice: they dispossessed them
  chosen_spanish: los desposeyeron
  alternatives_spanish:
  - tomaron posesión de ellos
  - los echaron y tomaron su tierra
  lexicon: HALOT
  rationale: «Desposeyeron» en español recoge la idea de quitar posesión, que es central en el verbo en este contexto de conquista territorial.
- source_word: וַיֵּשְׁבוּ תַחְתָּם
  english_pob_choice: lived in their place
  chosen_spanish: habitaron en su lugar
  alternatives_spanish:
  - vivieron en su lugar
  - se establecieron en su lugar
  lexicon: HALOT
  rationale: «Habitaron» conserva registro bíblico adecuado y «en su lugar» expresa la sustitución espacial indicada por תַחְתָּם.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. «Yahvé» mantiene la decisión teológica y editorial del proyecto de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Nombre étnico comparativo כָּעֲנָקִים
  english_pob_reading: like the Anakim
  chosen_spanish_reading: como los anaceos
  alternative_spanish_readings:
  - como los anakitas
  - como los Anakim
  rationale: La comparación apunta a un pueblo conocido en la tradición bíblica. «Anaceos» ofrece una forma española reconocible y evita una transliteración innecesariamente cruda en el cuerpo del texto.
  doctrine_reference: Uso consistente de nombres propios bíblicos en español para claridad lectora
translation_notes:
  revision_awareness: La revisión más reciente no indicó cambios necesarios; se conservó la lectura de base con adaptación al español y con la decisión proyectual de Yahvé y la equivalencia de nombre étnico en el comparativo.
  spanish_consistency_notes:
  - 'Se preservó la triple serie descriptiva del hebreo: grande, numeroso y alto.'
  - 'Se mantuvo la estructura causal/narrativa con dos verbos de acción sucesivos: destruyó / desposeyeron / habitaron.'
  - Se evitó «SEÑOR» para el Tetragrámaton conforme al estándar del proyecto.
  - La nota al pie marca la alternativa léxica del grupo comparado, como en el audit trail inglés.
