revisions:
- from: Busquen a Yahvé y su fuerza[a]; busquen siempre su rostro.
  to: Busquen a Yahvé y su fuerza[a]; busquen su rostro continuamente.
  rationale: Se ajusta תָּמִיד de 'siempre' a 'continuamente' para reflejar con mayor precisión el matiz del hebreo y la decisión documentada en la auditoría inglesa. También se mejora la naturalidad de la nota al pie en español, conservando la alternativa interpretativa 'presencia' y la explicación literal de 'rostro'.
  reviewer_model: gpt-5.4
