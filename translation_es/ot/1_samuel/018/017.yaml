translation:
  language: es
  text: 'Entonces Saúl dijo a David: «Aquí está mi hija mayor, Merab; te la daré por esposa. Solo sé para mí un hombre valeroso[a], y pelea las batallas de Yahvé». Porque Saúl dijo: «Que mi mano no esté contra él, sino que la mano de los filisteos esté contra él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre de valor para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Here is
  chosen_spanish: Aquí está
  alternatives_spanish:
  - Mira
  - He aquí
  - Aquí tienes
  lexicon: HALOT
  rationale: La partícula deíctica introduce la propuesta de Saúl con señalamiento inmediato. «Aquí está» conserva la fuerza presentativa del hebreo sin sonar arcaico en español.
- source_word: בִתִּי הַגְּדוֹלָה
  english_pob_choice: my older daughter
  chosen_spanish: mi hija mayor
  alternatives_spanish:
  - mi hija más grande
  - mi hija mayor de edad
  - mi primogénita
  lexicon: HALOT
  rationale: El hebreo indica edad/posición relativa entre las hijas. «Mayor» es el equivalente natural en español y evita intensificar indebidamente a «primogénita».
- source_word: מֵרַב
  english_pob_choice: Merab
  chosen_spanish: Merab
  alternatives_spanish:
  - Mirab
  lexicon: Transliteration from proper name
  rationale: Se conserva el nombre propio en transliteración estándar.
- source_word: אֶתֶּן לְךָ לְאִשָּׁה
  english_pob_choice: I will give her to you as a wife
  chosen_spanish: te la daré por esposa
  alternatives_spanish:
  - te la daré como esposa
  - te la daré en matrimonio
  - te la daré por mujer
  lexicon: HALOT
  rationale: En español, «dar por esposa» reproduce la fórmula matrimonial de modo natural y fiel al sentido idiomático del hebreo.
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero solo
  - Sin embargo,
  - Nada más
  lexicon: HALOT
  rationale: La partícula limita y condiciona la oferta. «Solo» expresa bien esa restricción en español contemporáneo.
- source_word: הֱיֵה לִּי לְבֶן חַיִל
  english_pob_choice: be a valiant man for me
  chosen_spanish: sé para mí un hombre valeroso
  alternatives_spanish:
  - sé para mí un hombre de valor
  - muéstrate como un hombre valiente para mí
  - sé para mí un hombre esforzado
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se refiere a un hombre de valor/capacidad en contexto militar. «Valeroso» conserva el matiz de valor personal y bélico. Se mantiene «para mí» porque el hebreo refleja el interés de Saúl.
- source_word: וְהִלָּחֵם
  english_pob_choice: and fight
  chosen_spanish: y pelea
  alternatives_spanish:
  - y combate
  - y haz guerra
  - y lucha
  lexicon: HALOT
  rationale: «Pelea» es la forma más directa y natural para el imperativo en este contexto. Evita un giro demasiado solemne que no añade precisión.
- source_word: מִלְחֲמוֹת יְהוָה
  english_pob_choice: the LORD’s battles
  chosen_spanish: las batallas de Yahvé
  alternatives_spanish:
  - las guerras de Yahvé
  - las batallas del Señor
  - las guerras del Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la pauta del proyecto, «Yahvé». «Batallas» mantiene el sustantivo concreto del hebreo y encaja con el contexto militar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el Tetragrámaton en español: «Yahvé».'
- source_word: יָדִי בּוֹ / יַד פְּלִשְׁתִּים
  english_pob_choice: my hand be against him / the hand of the Philistines be against him
  chosen_spanish: mi mano contra él / la mano de los filisteos contra él
  alternatives_spanish:
  - mi mano sobre él / la mano de los filisteos sobre él
  - mi mano lo hiera / los filisteos lo hieran
  - mi poder contra él / el poder de los filisteos contra él
  lexicon: HALOT
  rationale: «Mano» se conserva para respetar la metáfora hebrea de agencia y hostilidad. En español, la relación se expresa naturalmente con «contra él»; se evita explicitar demasiado la acción para no borrar la imagen original.
- source_word: וְשָׁאוּל אָמַר
  english_pob_choice: For Saul said
  chosen_spanish: Porque Saúl decía
  alternatives_spanish:
  - Pues Saúl decía
  - Ya que Saúl decía
  - Y Saúl decía
  lexicon: HALOT
  rationale: La cláusula explica la intención de Saúl. «Porque» transmite mejor la función explicativa que una simple coordinación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se mantiene la política del proyecto de no ocultarlo tras «SEÑOR», y en español se usa la forma ya establecida «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בֶן חַיִל
  english_pob_reading: valiant man / man of valor
  chosen_spanish_reading: hombre valeroso
  alternative_spanish_readings:
  - hombre de valor
  - hombre valiente
  - hombre esforzado
  rationale: La expresión es idiomática y, en este contexto, apunta a capacidad y valentía militar. «Valeroso» mantiene la fuerza moral y bélica sin volver el español torpe o excesivamente literal.
  doctrine_reference: 'DOCTRINE.md: Lexical force — idioms and military valor language'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «Look» a «Here is» para הִנֵּה; en español se eligió una formulación presentativa equivalente, «Aquí está», que conserva naturalidad y la función deíctica. También se observó la preferencia estable por traducir יְהוָה como «Yahvé», no como un sustituto reverencial.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología del proyecto para el Tetragrámaton.
  - Se conservó la metáfora de la «mano» en ambas frases paralelas para reflejar el hebreo y su paralelismo.
  - «Solo» traduce la partícula restrictiva אַךְ sin añadir contraste no explicitado por el texto.
  - El orden de las cláusulas sigue el flujo del hebreo y del audit trail inglés, con sintaxis española natural.
