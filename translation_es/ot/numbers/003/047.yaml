revisions:
- from: Tomarás cinco siclos[a] por cabeza[b], según el siclo del santuario[c]; el siclo equivale a veinte geras.
  to: Tomarás cinco siclos cada uno[a], según el siclo del santuario[b]; el siclo equivale a veinte geras.
  rationale: 'Se ajusta el texto principal para reflejar mejor la decisión distributiva del POB inglés: una expresión idiomática natural en español (''cada uno'') en lugar del literal ''por cabeza'' en el cuerpo del versículo. El literal hebreo se conserva en nota, como en la auditoría inglesa. Se reducen y ordenan las notas para evitar redundancia y mejorar legibilidad, manteniendo intacto el sentido fuente y la explicación cultural del ''siclo del santuario''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: mandato/instrucción, monto distributivo por persona, referencia al siclo del santuario como patrón, y equivalencia de veinte geras. Sin embargo, el texto principal hace explícito en exceso el idiomático לַגֻּלְגֹּלֶת con ''por cabeza'' dentro del cuerpo del versículo, mientras que el rastro POB inglés resolvió la distribución en la expresión equivalente a ''apiece'' y reservó el literal ''per head'' para nota. Además, la nota [a] actualmente duplica una frase que ya está en el texto principal y por eso deja de funcionar como alternativa literal.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y coherencia editorial. 'Cinco siclos por cabeza' es comprensible, aunque algo más tosco en el texto principal que 'cinco siclos cada uno'; y si se conserva el literal 'por cabeza', la nota [a] queda redundante. También conviene evitar tres notas seguidas cuando dos bastan. 'El siclo equivale a veinte geras' es buen español, aunque 'el siclo es de veinte geras' sería más cercano; no es necesario cambiarlo.
  glossary_alignment: 'La terminología es mayormente consistente: ''siclo'' para שׁקל y ''geras'' para גֵּרָה son aceptables en español bíblico. No hay términos teológicos del glosario mayor involucrados. La decisión sobre ''siclo del santuario'' está bien alineada con la rationale inglesa. La principal desalineación es estilístico-lexical: el inglés POB priorizó una expresión distributiva idiomática en texto principal y dejó ''por cabeza'' como nota literal; el español debería hacer lo mismo.'
  issues:
  - severity: medium
    issue: La frase principal 'por cabeza' introduce en el cuerpo del texto una literalidad que el POB inglés relegó a nota.
    rationale: לַגֻּלְגֹּלֶת significa literalmente 'por cabeza', pero la decisión auditada fue expresar la distribución de modo idiomático en el texto principal. En español, 'cada uno' preserva mejor esa estrategia y suena más natural.
  - severity: medium
    issue: La nota [a] es redundante con el texto principal actual.
    rationale: Si el versículo ya dice 'cinco siclos por cabeza', una nota que diga 'Literalmente, «cinco siclos por cabeza»' no aporta información alternativa real.
  - severity: low
    issue: Exceso de notas para una información breve.
    rationale: 'Las notas [a], [b] y [c] pueden simplificarse a dos: una lexical para el literal ''por cabeza'' y una cultural sobre el siclo del santuario.'
  revised_spanish_text: Tomarás cinco siclos cada uno[a], según el siclo del santuario[b]; el siclo equivale a veinte geras.
  revised_footnotes:
  - marker: a
    text: Literalmente, 'cinco siclos por cabeza'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, conforme al peso estándar del santuario; un siclo equivalía a veinte geras.
    reason: cultural_note
  revision_rationale: 'Se ajusta el texto principal para reflejar mejor la decisión distributiva del POB inglés: una expresión idiomática natural en español (''cada uno'') en lugar del literal ''por cabeza'' en el cuerpo del versículo. El literal hebreo se conserva en nota, como en la auditoría inglesa. Se reducen y ordenan las notas para evitar redundancia y mejorar legibilidad, manteniendo intacto el sentido fuente y la explicación cultural del ''siclo del santuario''.'
