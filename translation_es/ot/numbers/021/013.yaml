  - severity: low
    issue: Conector 'porque' algo pesado en este contexto descriptivo
    rationale: El hebreo כִּי es explicativo. 'Pues' suele fluir mejor en español bíblico narrativo-descriptivo, aunque 'porque' no es incorrecto.
  revised_spanish_text: Desde allí partieron y acamparon al otro lado del Arnón[a], que está en el desierto que se extiende desde el límite de los amorreos[b]; pues el Arnón es el límite de Moab, entre Moab y los amorreos.
  revised_footnotes:
