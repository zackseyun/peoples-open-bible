translation:
  language: es
  text: Entonces Judas, el hermano de Juan, fue herido; pero Juan los persiguió hasta llegar a Cedrón[a], que había construido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Kedrón». El nombre del lugar Κεδρών puede representarse en español con la forma tradicional «Cedrón» o con una transliteración más cercana al griego.
    reason: lexical_alternative
  - marker: b
    text: La cláusula «que había construido» se entiende más naturalmente como referida a Cedrón, el lugar al que llega Juan; el griego no amplía más el antecedente.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐτραυματίσθη
  english_pob_choice: was wounded
  chosen_spanish: fue herido
  alternatives_spanish:
  - resultó herido
  - fue lastimado
  lexicon: LSJ
  rationale: El aoristo pasivo expresa que Judas recibió una herida en combate. «Fue herido» conserva ese valor pasivo y es natural en español narrativo militar; «lastimado» suena menos específico y «resultó herido» añade un matiz algo más interpretativo.
- source_word: κατεδίωξεν
  english_pob_choice: pursued
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los acosó
  - los fue persiguiendo
  lexicon: LSJ
  rationale: El verbo indica persecución activa de enemigos en retirada. «Persiguió» es directo y fiel; el objeto plural «los» mantiene la referencia del texto griego y el tono narrativo.
- source_word: ἕως ἐλθεῖν
  english_pob_choice: until he came
  chosen_spanish: hasta llegar
  alternatives_spanish:
  - hasta que llegó
  - hasta que él llegó
  lexicon: LSJ
  rationale: La construcción con infinitivo expresa el límite de la persecución. En español, «hasta llegar» comunica de forma natural el movimiento sin forzar un sujeto explícito innecesario; el contexto deja claro que Juan es el sujeto.
- source_word: Κεδρών
  english_pob_choice: Kedron
  chosen_spanish: Cedrón
  alternatives_spanish:
  - Kedrón
  lexicon: LSJ
  rationale: Se eligió la forma tradicional hispana «Cedrón» por ser más reconocible para lectores bíblicos en español, sin alterar la referencia al topónimo griego Κεδρών. La nota conserva la alternativa transliterada.
- source_word: οἰκοδόμησεν
  english_pob_choice: had built
  chosen_spanish: había construido
  alternatives_spanish:
  - había edificado
  - construyó
  lexicon: LSJ
  rationale: El verbo σημαίνει 'construir/edificar'. El pluscuamperfecto español refleja bien la acción anterior al momento de llegada de Juan, igual que la lectura auditada en inglés. «Había construido» es claro y no introduce la noción de fortificación.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Swete LXX 1909 y refleja la revisión inglesa más reciente, que corrige el alcance del infinitivo para mantener a Juan como sujeto singular de «until he came». Se conservó la relación temporal con pluscuamperfecto en español y se optó por un topónimo tradicional con nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «fue herido» para preservar la pasiva de combate sin endurecer el estilo.
  - «Cedrón» se eligió como forma española tradicional; la variante «Kedrón» queda documentada en nota.
  - No se añadió información de fortificación, ya que οἰκοδόμησεν solo exige 'construir' / 'edificar'.
