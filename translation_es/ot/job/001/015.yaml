base_translation:
  language: en
  yaml_path: translation/ot/job/001/015.yaml
  text: And Sheba fell upon them and took them[a], and they struck down the young men with the edge of the sword[c][b]; and I alone have escaped to tell you.
  footnotes:
  - marker: a
    text: Or 'the Sabeans fell upon them.' The Hebrew uses the proper name 'Sheba,' likely referring to raiders from Sheba.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with the mouth of the sword,' an idiom meaning 'with the edge of the sword.'
    reason: lexical_alternative
  - marker: c
    text: '''The young men'' likely refers to Job''s servants attending the animals.'
    reason: cultural_note
