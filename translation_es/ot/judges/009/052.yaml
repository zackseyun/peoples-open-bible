- from: Abimelec llegó a la torre y combatió contra ella, y se acercó a la entrada de la torre para prenderla fuego.
  to: Abimelec llegó a la torre y combatió contra ella, y se acercó a la entrada de la torre para quemarla con fuego.
  rationale: Se reemplaza «para prenderla fuego» por «para quemarla con fuego» para reflejar con fidelidad e idiomaticidad el infinitivo hebreo לְשָׂרְפוֹ y el instrumental בָאֵשׁ. No se requieren notas.
  reviewer_model: gpt-5.4
