translation:
  language: es
  text: Y apartándose de la tienda[a], fueron a sus puestos asignados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus estaciones» o «sus lugares designados». El término griego puede referirse de manera más amplia a un orden dispuesto o a una posición asignada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψαντες
  english_pob_choice: turning away
  chosen_spanish: habiéndose apartado
  alternatives_spanish:
  - después de apartarse
  - volviéndose aparte
  - apartándose
  lexicon: LSJ
  rationale: El participio aoristo indica una acción previa al verbo principal. «Habiéndose apartado» conserva esa relación temporal y expresa el movimiento de alejamiento sin añadir una idea de regreso que el contexto no exige.
- source_word: σκηνῆς
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - tienda
  - tabernáculo
  lexicon: LSJ
  rationale: En este contexto narrativo, σκηνή designa una tienda o recinto portátil. «Tienda» es natural en español y evita la carga cultual de «tabernáculo», que no parece requerida aquí.
- source_word: ἐπορεύθησαν
  english_pob_choice: they went
  chosen_spanish: se fueron
  alternatives_spanish:
  - fueron
  - se dirigieron
  - partieron
  lexicon: LSJ
  rationale: El verbo narra simple movimiento. «Se fueron» comunica bien el desplazamiento en español moderno sin sobrecargar la frase con una matización técnica.
- source_word: διατάξεις
  english_pob_choice: assigned posts
  chosen_spanish: puestos asignados
  alternatives_spanish:
  - estaciones asignadas
  - lugares designados
  - órdenes
  lexicon: LSJ
  rationale: διάταξις puede significar disposición, orden o estación asignada. En este contexto, el sentido más probable es el de lugares o puestos designados, por eso «puestos asignados» refleja la función y mantiene la amplitud semántica sin forzar un tecnicismo militar.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - propios
  lexicon: LSJ
  rationale: El posesivo simple basta en español y reproduce el referente plural sin énfasis adicional.
translation_notes:
  revision_awareness: La revisión inglesa eliminó «after» para reflejar el participio con más directitud. Por eso la versión española usa una construcción participial («habiéndose apartado») que conserva la relación temporal previa sin introducir una conjunción explícita innecesaria.
  spanish_consistency_notes:
  - Se mantiene el tono bíblico sobrio y publicable, sin calcos demasiado rígidos.
  - «Tienda» se conserva como equivalente principal para σκηνή, coherente con el contexto narrativo.
  - «Puestos asignados» traduce διάταξεις de manera funcional y evita reducir indebidamente su posible amplitud semántica.
