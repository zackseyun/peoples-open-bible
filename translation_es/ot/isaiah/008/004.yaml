revisions:
- from: 'Porque antes que el muchacho[a] sepa gritar: «Mi padre» y «Mi madre», la riqueza de Damasco y el botín[b] de Samaria serán llevados delante del rey de Asiria.'
  to: 'Porque antes que el muchacho[a] sepa decir[b]: «Mi padre» y «Mi madre», la riqueza de Damasco y el botín[c] de Samaria serán llevados delante del rey de Asiria.'
  rationale: La revisión conserva el sentido del hebreo y del POB auditado, pero reemplaza «gritar» por «decir» para un español más natural en contexto infantil y menos sobreinterpretativo. Además, restaura la alternativa léxica de קְרֹא mediante una nota, tal como hace el POB inglés, y mantiene la nota contextual sobre «el muchacho».
  reviewer_model: gpt-5.4
