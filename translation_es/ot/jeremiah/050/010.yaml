translation:
  language: es
  text: Y Caldea[a] se convertirá en botín; todos los que la saqueen se hartarán[b], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los caldeos»; la forma hebrea es plural, pero aquí probablemente designa la tierra o el poder de Caldea, como lo sugiere el pronombre femenino posterior.
    reason: lexical_alternative
  - marker: b
    text: O «quedarán satisfechos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And ... will become
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... llegará a ser
  - Y ... se convertirá en
  lexicon: HALOT
  rationale: El hebreo profético perfecto con waw expresa un resultado futuro; en español, «será» comunica con naturalidad el estado resultante sin añadir una paráfrasis excesiva. «Llegará a ser» o «se convertirá en» son posibles, pero suenan más marcados que el original.
- source_word: כַשְׂדִּים
  english_pob_choice: Chaldea
  chosen_spanish: Caldea
  alternatives_spanish:
  - los caldeos
  - Babilonia
  lexicon: HALOT
  rationale: El contexto trata a כַשְׂדִּים como entidad territorial/política, apoyado por el sufijo femenino posterior en «la saqueen». «Caldea» conserva ese valor geográfico en español y evita convertirlo en un plural personal donde el hebreo funciona como nombre colectivo.
- source_word: לְשָׁלָל
  english_pob_choice: plunder
  chosen_spanish: para saqueo
  alternatives_spanish:
  - para botín
  - para presa
  lexicon: HALOT
  rationale: «Saqueo» transmite de forma clara la idea de ser entregada al despojo militar. «Botín» sería posible, pero «para saqueo» refleja bien la construcción predicativa y mantiene el matiz de despojo activo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los que
  - cada uno de los que
  lexicon: HALOT
  rationale: El cuantificador abarca a la totalidad de los agentes del despojo. En español, «todos los que» conserva esa fuerza sin forzar una literalidad rígida.
- source_word: שֹׁלְלֶיהָ
  english_pob_choice: who plunder her
  chosen_spanish: la saqueen
  alternatives_spanish:
  - la despojen
  - la saqueen a ella
  - sus saqueadores
  lexicon: HALOT
  rationale: El participio verbal hebreo expresa acción continua/agentiva; en español una relativa verbal («los que la saqueen») preserva mejor el sentido que un sustantivo estático. «Saqueen» mantiene la violencia concreta del término.
- source_word: יִשְׂבָּעוּ
  english_pob_choice: will have their fill
  chosen_spanish: quedarán saciados
  alternatives_spanish:
  - quedarán satisfechos
  - tendrán bastante
  - se saciarán
  lexicon: HALOT
  rationale: El verbo significa llenarse/saciarse. En contexto de botín, «quedarán saciados» expresa la abundancia obtenida sin perder la base semántica de satisfacción plena. «Se saciarán» es viable, pero «quedarán saciados» suena más natural en español bíblico contemporáneo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto, «Yahvé». La fórmula profética breve «dice Yahvé» reproduce con claridad el cierre oracular de נְאֻם יְהוָה; «declara Yahvé» o «oráculo de Yahvé» también serían posibles, pero aquí «dice» es conciso y fiel.
theological_decisions:
- issue: Renderización del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre propio divino, no un sustituto litúrgico. En la política terminológica del proyecto, la forma española establecida es «Yahvé», que preserva el nombre del pacto y evita el encubrimiento con un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de כַשְׂדִּים en contexto
  english_pob_reading: Chaldea
  chosen_spanish_reading: Caldea
  alternative_spanish_readings:
  - los caldeos
  - Babilonia
  rationale: Aunque la forma es plural, el contexto inmediato sugiere una entidad territorial/política femenina singular, no simplemente un grupo humano. «Caldea» mantiene esa tensión y suena natural en español sin borrar el valor colectivo original.
  doctrine_reference: Jeremiah 50:10 source context
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión inglesa final: se mantiene la lectura territorial de כַשְׂדִּים, la imagen de despojo y la fórmula profética final, sin cambios textuales relevantes en la tradición de trabajo consultada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se evita «SEÑOR» como sustituto ocultador del nombre divino.
  - Se prefiere «Caldea» por la lectura territorial implícita en el contexto.
  - Se conserva el paralelismo semántico entre «saqueo» y «saciados» sin añadir explicación interpretativa al cuerpo del texto.
  - La puntuación sigue el estilo español actual con cierre en coma antes de la fórmula profética.
