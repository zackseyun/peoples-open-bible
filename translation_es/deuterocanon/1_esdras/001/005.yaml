translation:
  language: es
  text: conforme al escrito de David, rey de Israel, y conforme a la grandeza de Salomón, su hijo; y estando de pie en el santuario[a], conforme a su división ancestral[b], ustedes, levitas, delante de sus hermanos, los hijos de Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'en lo santo' o 'en el lugar santo'; 'santuario' es una forma idiomática y clara de expresar el espacio sagrado.
    reason: lexical_alternative
  - marker: b
    text: La frase griega es condensada. El paralelo hebreo sugiere la idea de 'casas de sus padres' y 'sus divisiones', por lo que 'división ancestral' intenta reflejar esa organización por linajes sin añadir 'de servicio'.
    reason: alternative_reading
  - marker: c
    text: El griego dice literalmente 'los hijos de Israel'. Se conserva esa formulación familiar en español.
    reason: source_note
lexical_decisions:
- source_word: γραφὴν
  english_pob_choice: writing
  chosen_spanish: escritura
  alternatives_spanish:
  - escrito
  - escritura
  - registro
  lexicon: LSJ
  rationale: γραφή aquí señala una disposición o escrito concreto asociado con David, no 'Escritura' en sentido técnico posterior. 'Escritura' conserva el carácter de documento escrito y sigue de cerca el paralelismo con el hebreo בכתב.
- source_word: μεγαλειότητα
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - majestad
  - magnificencia
  - grandeza
  lexicon: LSJ
  rationale: El término puede expresar grandeza, esplendor o magnificencia. 'Grandeza' es natural en español y mantiene abierta la referencia a la escala o dignidad de la disposición de Salomón sin sobrecargarla con matices cortesanos.
- source_word: στᾶντες
  english_pob_choice: standing
  chosen_spanish: permaneciendo
  alternatives_spanish:
  - estando
  - en pie
  - de pie
  lexicon: LSJ
  rationale: El participio se conserva con fuerza durativa para reflejar la construcción griega y su vínculo con la frase locativa siguiente. 'Permaneciendo' funciona en español como equivalente formal sin perder el valor de postura/situación.
- source_word: ἐν τῷ ἁγίῳ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en el lugar sagrado
  lexicon: LSJ
  rationale: La frase griega literalmente dice 'en lo santo' / 'en el lugar santo'. 'Santuario' es idiomático y claro en español, y evita fijar demasiado la arquitectura exacta del recinto.
- source_word: μεριδαρχίαν
  english_pob_choice: division of service
  chosen_spanish: división
  alternatives_spanish:
  - curso
  - turno
  - división
  lexicon: LSJ
  rationale: La revisión inglesa eliminó 'of service' por no estar explícito en el griego. El término griego apunta a una división ordenada; en español 'división' mantiene el sentido básico sin añadir una glosa no atestiguada.
- source_word: πατρικὴν
  english_pob_choice: ancestral
  chosen_spanish: ancestral
  alternatives_spanish:
  - paterna
  - de vuestros padres
  - de vuestra casa paterna
  lexicon: LSJ
  rationale: El adjetivo remite al linaje o casa de los padres. 'Ancestral' comunica bien la organización por clanes y es congruente con el paralelo hebreo de 'casas de los padres'.
- source_word: τῶν ἔμπροσθεν τῶν ἀδελφῶν ὑμῶν
  english_pob_choice: before your brothers
  chosen_spanish: delante de vuestros hermanos
  alternatives_spanish:
  - ante vuestros hermanos
  - en presencia de vuestros hermanos
  - delante de vuestros hermanos
  lexicon: LSJ
  rationale: ἔμπροσθεν puede ser espacial o relacional. 'Delante de' preserva la escena litúrgica y la relación de servicio ante el resto de Israel de forma natural en español.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: LSJ
  rationale: El griego dice literalmente 'hijos de Israel'. Se mantiene la expresión familiar para respetar la forma del original y la decisión de no aplanar el lenguaje genealógico a una designación más genérica.
theological_decisions:
- issue: Expresión familiar masculina υἱῶν Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La frase es genealógica y covenantal. Se preserva la forma familiar masculina del original en lugar de neutralizarla, porque el texto enfatiza la identidad tribal y la relación de los levitas con Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Uso de la paralela hebrea para esclarecer la frase comprimida
  english_pob_reading: according to your ancestral division
  chosen_spanish_reading: conforme a vuestra división ancestral
  alternative_spanish_readings:
  - conforme a vuestra división
  - conforme a las casas de vuestros padres
  rationale: El griego es compacto; el paralelo hebreo muestra que la idea es organizativa y de linaje. La traducción sigue el griego pero permite que el sentido de orden tribal quede claro sin introducir elementos no presentes.
  doctrine_reference: PHILOSOPHY.md; user task requirement on parallel_sources
translation_notes:
  revision_awareness: La revisión más reciente en el audit trail eliminó la glosa inglesa 'of service' porque no está explícita en el griego. Esta versión española sigue esa decisión y evita añadir 'de servicio', manteniendo únicamente 'división' como correspondencia de μεριδαρχίαν. También conserva el paralelismo con el hebreo de forma implícita, sin desplazar el anclaje principal del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino por coherencia del proyecto; aquí no interviene.
  - '''Mesías/Cristo'' no aparece en el texto; no se aplica ninguna sustitución.'
  - Se preservó el orden y la progresión de las dos cláusulas con 'conforme a...', en correspondencia con κατὰ τὴν... καὶ κατὰ τὴν... .
  - '''Los hijos de Israel'' mantiene la fuerza genealógica del original y la preferencia del proyecto por no neutralizar expresiones familiares cuando son textualmente explícitas.'
