translation:
  language: es
  text: Ezequías tuvo riquezas y honra[a] muy grandes, e hizo depósitos para plata, oro, piedras preciosas, especias, escudos y toda clase de objetos deseables[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gloria» en lugar de «honra». En este contexto, sin embargo, el hebreo apunta más al prestigio y la dignidad real que a la carga teológica habitual de «gloria».
    reason: lexical_alternative
  - marker: b
    text: O «todo tipo de objetos preciosos» / «toda clase de vasos preciosos». La expresión hebrea es amplia y puede abarcar diversos artículos de lujo, no solo recipientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לִיחִזְקִיָּהוּ
  english_pob_choice: And Hezekiah had
  chosen_spanish: Y tuvo Ezequías
  alternatives_spanish:
  - Y había para Ezequías
  - Y Ezequías tenía
  lexicon: HALOT
  rationale: La construcción hebrea de posesión con ל + nombre se expresa naturalmente en español con 'tuvo' / 'tenía'. 'Tuvo' mantiene el avance narrativo inicial de וַיְהִי, y conserva el sentido posesivo del texto.
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: '''Riquezas'' comunica bien el contenido material del término en este contexto real y patrimonial. ''Riqueza'' también sería posible, pero el plural encaja mejor con la acumulación de bienes enumerada después.'
- source_word: וְכָבוֹד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  lexicon: HALOT
  rationale: En este contexto real y social, כָבוֹד apunta a prestigio, dignidad y realce público. 'Honra' evita sobrecargar el término con el peso teológico frecuente de 'gloria' y suena natural en español bíblico actual.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very great
  chosen_spanish: muy, muy grandes
  alternatives_spanish:
  - sumamente grandes
  - en extremo abundantes
  lexicon: HALOT
  rationale: La doble intensificación reproduce el énfasis hebreo. 'Muy, muy grandes' es una forma clara y fiel de reflejar הַרְבֵּה מְאֹד sin añadir una interpretación ajena.
- source_word: וְאֹצָרוֹת עָשָׂה לוֹ
  english_pob_choice: and he made storehouses
  chosen_spanish: y se hizo almacenes
  alternatives_spanish:
  - y se hizo tesorerías
  - y construyó depósitos
  lexicon: HALOT
  rationale: אֹצָרוֹת puede referirse a almacenes o cámaras del tesoro. Dado que la lista incluye diversos bienes almacenados, 'almacenes' preserva la amplitud semántica mejor que un término más especializado. 'Se hizo' refleja היטב la idea de hacer/preparar para sí.
- source_word: לְכֶסֶף וּלְזָהָב
  english_pob_choice: for silver and for gold
  chosen_spanish: para plata, oro
  alternatives_spanish:
  - para plata y para oro
  - para plata y oro
  lexicon: HALOT
  rationale: Se conserva la lista de bienes sin forzar la repetición mecánica de 'para' en español. 'Plata, oro' mantiene el inventario compacto y natural, a la vez que corresponde al hebreo.
- source_word: וּלְאֶבֶן יְקָרָה
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedra preciosa
  - gemas
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, el sentido es colectivo. 'Piedras preciosas' es la equivalencia idiomática natural en español para una lista de tesoros.
- source_word: וְלִבְשָׂמִים
  english_pob_choice: spices
  chosen_spanish: perfumes
  alternatives_spanish:
  - especias
  - aromas
  lexicon: HALOT
  rationale: בְשָׂמִים designa sustancias aromáticas; en un inventario de tesoros y bienes de lujo, 'perfumes' comunica mejor ese campo semántico en español que 'especias', que puede sonar más culinario.
- source_word: וּלְמָגִנִּים
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - broqueles
  - adargas
  lexicon: HALOT
  rationale: מָגִנִּים significa de manera específica 'escudos'. Se mantiene el término común y exacto, sin ampliar indebidamente a armamento general.
- source_word: וּלְכֹל כְּלֵי חֶמְדָּה
  english_pob_choice: and for every desirable article
  chosen_spanish: y toda clase de objetos deseables
  alternatives_spanish:
  - y todo objeto precioso
  - y toda clase de utensilios valiosos
  lexicon: HALOT
  rationale: 'כְּלֵי es amplio: objetos, utensilios, artículos. חֶמְדָּה añade valor deseable o codiciado. ''Toda clase de objetos deseables'' preserva esa amplitud sin restringirlo a recipientes ni convertirlo en un término demasiado técnico.'
translation_notes:
  revision_awareness: 'El pasaje inglés revisado eliminó repeticiones innecesarias de ''for'' en la lista, manteniendo el inventario completo. La versión española sigue el mismo principio: conserva todos los elementos del hebreo y del audit trail, pero adapta la enumeración a un español fluido sin perder precisión.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se evita 'Cristo' o 'Mesías' porque no aparecen en el versículo.
  - Se usa 'escudos' y no un hiperónimo militar, siguiendo la especificidad del hebreo.
  - La lista se presenta con coma serial española y cadencia de inventario, coherente con el hebreo y con la revisión inglesa.
