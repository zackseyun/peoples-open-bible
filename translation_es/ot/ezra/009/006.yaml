revisions:
- from: 'Y dije[a]: «Dios mío, estoy avergonzado y humillado para levantar mi rostro hacia ti, Dios mío, porque nuestras iniquidades se han multiplicado sobre nuestras cabezas, y nuestra culpa ha crecido hasta los cielos».'
  to: 'Y dije[a]: «Dios mío, estoy avergonzado y humillado de levantar mi rostro hacia ti, Dios mío, porque nuestras iniquidades se han multiplicado sobre nuestras cabezas, y nuestra culpa ha crecido hasta los cielos».'
  rationale: Se corrige una sintaxis española poco natural («para levantar») a la construcción idiomática «de levantar», sin cambiar el sentido del hebreo. También se repara la nota al pie para que preserve la alternativa singular atestiguada por el hebreo y la auditoría inglesa, en lugar de repetir el texto principal.
