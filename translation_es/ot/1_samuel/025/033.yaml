- from: Y bendita sea tu prudencia[a], y bendita seas[b], tú, que me has impedido hoy venir a sangre[c] y salvarme con mi propia mano.
  to: Y bendita sea tu prudencia[a], y bendita seas tú, que me has impedido en este día derramar sangre[b] y vengarme[c] con mi propia mano.
  rationale: Se ajusta el texto para reflejar con mayor fidelidad el sentido contextual documentado por el POB y para producir un español natural y digno. «Derramar sangre» comunica claramente דמים en el cuerpo del texto, mientras la nota conserva la posible matización de «culpa de sangre». «Vengarme con mi propia mano» expresa mejor el sentido de והושע ידי לי en este contexto narrativo, dejando la literalidad hebrea en nota. También se mejora la fluidez de «bendita seas tú» y se eleva ligeramente el registro con «en este día».
