revisions:
- from: Su inmundicia estaba en los dobladillos de su vestido[a]; no recordó su futuro. Por eso descendió de manera asombrosa[b]; no había consolador para ella. Mira, Yahvé, mi aflicción, porque el enemigo se ha engrandecido[c].
  to: Su inmundicia estaba en sus faldas; no recordó su futuro[a]. Por eso descendió de manera sorprendente[b]; no había consolador para ella. Mira, Yahvé, mi aflicción, porque el enemigo se ha engrandecido[c].
  rationale: Se ajusta בְּשׁוּלֶיהָ a un español más idiomático y poético ('en sus faldas'), se añade la alternativa de אַחֲרִיתָהּ en nota para reflejar la amplitud semántica auditada, y se suaviza 'asombrosa' a 'sorprendente' para evitar una connotación positiva mientras se mantiene el literal 'descendió'. También se simplifican las notas para que correspondan con precisión a los anclajes y a las alternativas relevantes del expediente inglés.
