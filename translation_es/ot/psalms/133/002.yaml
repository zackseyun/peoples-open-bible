    rationale: Aunque 'borde' es posible como alternativa, el contexto de 'la boca de sus vestiduras' apunta mejor a la abertura superior/cuello. En español, 'el cuello de sus vestiduras' es natural y más preciso; las otras opciones pueden conservarse en nota.
