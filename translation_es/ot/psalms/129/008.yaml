review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: los transeúntes no pronuncian la fórmula de bendición, y conserva correctamente «Yahvé» para יְהוָה. Sin embargo, «no dirán» y «los que pasan» desplazan el valor gnómico/general del hebreo hacia futuro y pierden algo del matiz de «pass by».'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse para sonar más natural y exacto: «los que pasan por allí» o «los que pasan» con presente encaja mejor que el futuro «no dirán». También conviene alinear el texto con la nota, colocando el marcador junto a «Yahvé», que es donde recae la variante explicada.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» en ambas ocurrencias. No hay otros términos doctrinales sensibles en disputa. La nota sobre YHWH está justificada, pero su anclaje actual en «dirán[a]» no corresponde al término comentado.'
  issues:
  - severity: medium
    issue: Tiempo verbal «no dirán»
    rationale: El hebreo qatal aquí se usa en sentido gnómico/descriptivo. En español, «no dicen» expresa mejor la acción habitual/general que el futuro «no dirán», que suena predictivo.
  - severity: low
    issue: «los que pasan» puede sonar algo incompleto
    rationale: Aunque es entendible, «los que pasan por allí» representa con más claridad הָעֹבְרִים como los que pasan al lado/en el lugar, en paralelo con el inglés auditado «those who pass by».
  - severity: medium
    issue: Marcador de nota mal anclado
    rationale: La nota explica el nombre divino YHWH, pero el marcador está colocado en «dirán[a]» en vez de junto a «Yahvé[a]». Debe anclarse al término relevante.
  revised_spanish_text: 'y los que pasan por allí no dicen: «La bendición de Yahvé[a] sea sobre ustedes; los bendecimos en el nombre de Yahvé».'
