translation:
  language: es
  text: Y el rey Salomón dio a la reina de Saba todo lo que deseaba[a], cuanto pidió, además de lo que había traído al rey. Luego se volvió y fue a su tierra[b], ella y sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aparte de lo que había traído al rey». La frase hebrea puede entenderse como una distinción entre los dones de Salomón y los dones que la reina había traído.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «regresó y fue a su tierra». El hebreo dice literalmente «se volvió y fue».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: HALOT
  rationale: En un contexto de dádiva real, «dio» reproduce con naturalidad el acto de otorgar regalos y conserva la sencillez del hebreo sin añadir matices no presentes.
- source_word: מַלְכַּת שְׁבָא
  english_pob_choice: the queen of Sheba
  chosen_spanish: la reina de Saba
  alternatives_spanish:
  - la reina de Sheba
  lexicon: HALOT
  rationale: El título se traduce como cargo real, y el topónimo se translitera en forma usual española «Saba», fiel al referente bíblico.
- source_word: כָּל חֶפְצָהּ
  english_pob_choice: all that she desired
  chosen_spanish: todo lo que deseaba
  alternatives_spanish:
  - todo su deseo
  - todo lo que quería
  lexicon: HALOT
  rationale: חֶפֶץ puede expresar deseo o lo deseado. «Todo lo que deseaba» mantiene el sentido idiomático y evita una formulación demasiado rígida o abstracta.
- source_word: אֲשֶׁר שָׁאָלָה
  english_pob_choice: whatever she asked
  chosen_spanish: lo que ella pidió
  alternatives_spanish:
  - cualquier cosa que pidió
  - lo que solicitó
  lexicon: HALOT
  rationale: El verbo שׁאל aquí aclara la demanda concreta de lo deseado. «Lo que ella pidió» conserva la relación entre deseo y solicitud con estilo natural en español.
- source_word: מִלְּבַד אֲשֶׁר הֵבִיאָה אֶל הַמֶּלֶךְ
  english_pob_choice: besides what she had brought to the king
  chosen_spanish: además de lo que había llevado al rey
  alternatives_spanish:
  - aparte de lo que había llevado al rey
  - además de lo que había traído al rey
  lexicon: HALOT
  rationale: מִלְּבַד expresa adición o excepción. «Además de» conserva la idea de que los dones de Salomón fueron extra a lo que ella ya había llevado, y «había llevado» sigue de cerca el movimiento de traer al encuentro.
- source_word: וַתַּהֲפֹךְ
  english_pob_choice: she turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - volvió atrás
  - se dio vuelta
  lexicon: HALOT
  rationale: El hebreo dice literalmente «se volvió». En español, «se volvió» preserva esa imagen narrativa sin convertirla de antemano en una paráfrasis explícita de «regresar».
- source_word: וַתֵּלֶךְ לְאַרְצָהּ
  english_pob_choice: went to her own land
  chosen_spanish: fue a su tierra
  alternatives_spanish:
  - volvió a su tierra
  - fue a su propio país
  lexicon: HALOT
  rationale: La expresión indica desplazamiento hacia su país de origen. «Fue a su tierra» es una forma natural y suficientemente cercana; el posesivo está implícito en el contexto.
- source_word: הִיא וַעֲבָדֶיהָ
  english_pob_choice: she and her servants
  chosen_spanish: ella y sus siervos
  alternatives_spanish:
  - ella y sus servidores
  - ella y sus servidores/servidumbre
  lexicon: HALOT
  rationale: עֲבָדִים puede ser «siervos» o «esclavos» según el contexto. Aquí, por tratarse del séquito de una reina, «siervos» comunica adecuadamente la relación de servicio sin forzar la carga de esclavitud.
theological_decisions:
- issue: 'Valor de מִלְּבַד: ¿excepción o adición?'
  english_pob_reading: The Hebrew phrase may be understood as distinguishing Solomon's gifts from the gifts the queen had brought him.
  chosen_spanish_reading: El texto permite entender que los dones de Salomón fueron además de lo que ella ya había llevado al rey.
  alternative_spanish_readings:
  - se puede entender como aparte de lo que ella había llevado al rey
  - puede leerse como en vez de lo que ella había llevado al rey
  rationale: 'No hay tensión doctrinal, pero sí una decisión semántica importante: el contexto favorece lectura aditiva, no sustitutiva. Mantener esa distinción evita borrar el contraste entre lo que la reina llevó y lo que recibió.'
  doctrine_reference: Ninguna; decisión de sentido contextual y léxico.
- issue: Valor narrativo de וַתַּהֲפֹךְ
  english_pob_reading: Or 'she returned and went to her land.' The Hebrew literally says 'she turned and went.'
  chosen_spanish_reading: Se conserva la imagen literal de que «se volvió y fue» antes de expresar implícitamente el retorno.
  alternative_spanish_readings:
  - regresó y fue a su tierra
  - dio la vuelta y fue a su tierra
  rationale: El hebreo usa una secuencia verbal concreta que puede perderse si se traduce demasiado interpretativamente. La formulación elegida preserva la imagen y al mismo tiempo comunica el desplazamiento final.
  doctrine_reference: Ninguna; decisión narrativa y estilística.
translation_notes:
  revision_awareness: 'Se siguió el sentido ya validado en el audit trail inglés: lectura aditiva de מִלְּבַד, preservación de la imagen literal de וַתַּהֲפֹךְ, y equivalencia idiomática para «all that she desired» y «whatever she asked». No se detectaron revisiones aplicadas en el inglés; el borrador español refleja el estado final aprobado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como default del proyecto para el Tetragrámaton, pero este versículo no lo contiene.
  - Se usa «Saba» para el topónimo y no «Sheba» en la línea principal, conforme al uso español bíblico y la transliteración funcional del nombre.
  - «Siervos» se eligió por el contexto de corte real; no se fuerza «esclavos» porque el foco no está en el estatus jurídico de servidumbre.
  - La puntuación y el orden de cláusulas buscan ser publicables en español sin perder la secuencia narrativa hebrea.
