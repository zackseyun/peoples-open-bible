    rationale: El hebreo habla de ser movido, sacudido o tambalear, no de ser derrotado/abatido. «Abatida» introduce un matiz de derrota o derribo que no es el mejor equivalente.
  - severity: medium
    issue: Las notas [a] y [b] no corresponden al orden y contenido del audit trail inglés
