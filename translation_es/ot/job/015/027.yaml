translation:
  language: es
  text: Porque ha cubierto su rostro con su grasa[a], y ha acumulado gordura sobre sus lomos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Porque cubrió su rostro con grasa e hizo pliegues de grasa sobre sus flancos»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa del versículo anterior. «Porque» conserva con naturalidad el valor causal del hebreo y funciona bien al inicio de la cláusula.
- source_word: כִסָּה
  english_pob_choice: has covered
  chosen_spanish: ha cubierto
  alternatives_spanish:
  - cubrió
  lexicon: HALOT
  rationale: El perfecto español comunica un estado resultante y sigue de cerca el valor verbal descrito en el audit trail inglés.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su presencia
  lexicon: HALOT
  rationale: El hebreo usa la imagen corporal concreta. «Rostro» es natural en español bíblico actual y mantiene la referencia física sin abrir una lectura más abstracta de «presencia».
- source_word: בְּחֶלְבּוֹ
  english_pob_choice: with his fat
  chosen_spanish: con su grasa
  alternatives_spanish:
  - con su sebo
  - con su gordura
  lexicon: HALOT
  rationale: חֵלֶב denota grasa/fat; «grasa» conserva la imagen concreta. «Sebo» es posible pero más técnico o arcaizante; «gordura» se reserva para el segundo cola por la idea de corpulencia.
- source_word: וַיַּעַשׂ
  english_pob_choice: has put
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha hecho
  - ha formado
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», en esta construcción el sentido idiomático es el de añadir o colocar algo sobre el cuerpo. «Ha puesto» expresa mejor esa acción acumulativa en español.
- source_word: פִּימָה
  english_pob_choice: fatness
  chosen_spanish: gordura
  alternatives_spanish:
  - grosor
  - pliegues de grasa
  lexicon: HALOT
  rationale: El sustantivo es raro y apunta a una masa o cobertura grasa. «Gordura» mantiene la idea de corpulencia y evita sobreinterpretar con una imagen demasiado específica.
- source_word: עֲלֵי
  english_pob_choice: '''on'''
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: La preposición señala ubicación espacial simple; «sobre» es la equivalencia más directa y natural en español.
- source_word: כָסֶל
  english_pob_choice: his loins
  chosen_spanish: sus lomos
  alternatives_spanish:
  - sus flancos
  - sus caderas
  lexicon: HALOT
  rationale: כָסֶל designa la zona de los lomos/flancos en descripción poética del cuerpo. «Lomos» conserva el registro anatómico bíblico sin perder inteligibilidad.
translation_notes:
  revision_awareness: 'Se sigue el flujo del texto hebreo y el audit trail inglés sin introducir una paráfrasis interpretativa. Se mantiene la tensión léxica de la imagen corporal: grasa/grasa, gordura/lomos, como reflejo de la duplicación poética del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «señor» u այլ tradiciones no pertinentes porque el verso es puramente descriptivo.
  - Se conserva la repetición de imaginería corporal del hebreo en dos miembros paralelos, sin fusionarlos.
