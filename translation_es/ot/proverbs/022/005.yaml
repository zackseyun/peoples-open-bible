translation:
  language: es
  text: Espinas y lazos[a] hay en el camino[b] del torcido[c]; el que guarda su vida[d] se mantiene lejos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trampas» para «lazos».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «en la senda de» o «en la vía de».
    reason: lexical_alternative
  - marker: c
    text: «El torcido» también puede verterse «el perverso» o «el de conducta torcida».
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «su alma»; aquí «vida» expresa mejor la preservación de sí mismo frente al peligro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִנִּים
  english_pob_choice: thorns
  chosen_spanish: espinas
  alternatives_spanish:
  - zarzas
  - abrojos
  lexicon: HALOT
  rationale: El término hebreo designa peligros punzantes o espinosos; en español, «espinas» conserva la imagen concreta y es natural en proverbios sapienciales.
- source_word: פַּחִים
  english_pob_choice: snares
  chosen_spanish: lazos
  alternatives_spanish:
  - trampas
  - redes
  lexicon: HALOT
  rationale: El paralelo con «espinas» sugiere peligros ocultos o de captura. «Lazos» mantiene la fuerza figurada y la resonancia sapiencial; «trampas» es posible, pero suena más mecánico.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - en la senda de
  - en la manera de
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino literal o modo de vida. «En el camino de» reproduce bien la metáfora de una trayectoria o conducta.
- source_word: עִקֵּשׁ
  english_pob_choice: the crooked
  chosen_spanish: el perverso
  alternatives_spanish:
  - el torcido
  - el de conducta torcida
  - el depravado
  lexicon: HALOT
  rationale: La imagen hebrea puede aludir a alguien moralmente torcido, de conducta desviada. «Perverso» recoge esa carga moral sin perder la gravedad; «torcido» conservaría más la metáfora concreta, pero en español puede sonar menos claro aplicado a una persona.
- source_word: שׁוֹמֵר נַפְשׁוֹ
  english_pob_choice: he who guards his life
  chosen_spanish: el que guarda su vida
  alternatives_spanish:
  - el que cuida su alma
  - el que se guarda a sí mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o sí mismo. En este contexto sapiencial de preservarse del peligro, «vida» expresa mejor el sentido práctico que «alma»; se conserva el valor representativo del participio con «el que».
- source_word: יִרְחַק
  english_pob_choice: keeps far
  chosen_spanish: se alejará
  alternatives_spanish:
  - se mantendrá lejos
  - estará lejos
  lexicon: HALOT
  rationale: El imperfecto expresa el resultado habitual o proverbial. «Se alejará» comunica bien la separación prudente y suena natural en español.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de esas cosas
  - de tales peligros
  lexicon: HALOT
  rationale: El pronombre plural retoma naturalmente «espinas y lazos». «De ellos» es conciso y mantiene la referencia plural sin añadir explicaciones.
theological_decisions:
- issue: Valor de נֶפֶשׁ en un proverbio de preservación
  english_pob_reading: here 'life' conveys the sense of preserving oneself from danger
  chosen_spanish_reading: aquí «vida» transmite la idea de preservarse del peligro
  alternative_spanish_readings:
  - aquí «alma» podría entenderse, pero sería menos claro
  - aquí «sí mismo» explicitaría el matiz reflexivo
  rationale: Se evita imponer «alma» donde el contexto no habla primariamente de la interioridad religiosa, sino de la conservación prudente de la persona. «Vida» recoge mejor el valor de autopreservación señalado en el audit trail.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Renderización del sustantivo moral עִקֵּשׁ
  english_pob_reading: the crooked may also be rendered the perverse or the devious
  chosen_spanish_reading: «el perverso» como opción principal, con posible matiz de torcido o desviado
  alternative_spanish_readings:
  - el torcido
  - el de conducta torcida
  - el depravado
  rationale: El hebreo conserva una imagen de torsión moral. En español, «perverso» expresa bien la desviación ética y es inteligible, sin borrar la tensión entre imagen concreta y juicio moral.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «path» a «way» para reflejar más directamente דֶּרֶךְ; la redacción española adopta «camino» para mantener esa misma directitud y el sentido proverbial, sin introducir una paraphrase excesiva. También se respetó la lectura figurada de los peligros en paralelo y el valor genérico del participio.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del Tetragrámaton cuando aparezca en otros pasajes; aquí no aplica.
  - Se ha evitado «Cristo», ya que no hay vocabulario mesiánico en este versículo.
  - Se mantiene el registro sapiencial breve y proverbial, con sujeto genérico («el que»).
  - «Lazos» se emplea por su fuerza figurada; si en un contexto similar se requiriera mayor literalidad, «trampas» sería una alternativa válida.
