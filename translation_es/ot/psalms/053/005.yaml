base_translation:
  language: en
  yaml_path: translation/ot/psalms/053/005.yaml
  text: Do not the workers of wickedness know—those who eat up my people as they eat bread? They do not call on God[a][b][c].
  footnotes:
  - marker: a
    text: Or 'evildoers' for 'workers of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who eat my people; they eat bread.' The sense is that they consume God's people as readily as ordinary food.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'my people' may be heard either as God speaking or as the psalmist speaking; the Hebrew does not make the speaker explicit here.
    reason: alternative_reading
