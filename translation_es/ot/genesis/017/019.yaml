translation:
  language: es
  text: 'Y Dios dijo[a]: «No, sino que Sara, tu esposa, te dará un hijo, y le pondrás por nombre Isaac. Y yo estableceré mi pacto con él como un pacto eterno para su descendencia después de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaac suena al verbo hebreo que significa «él ríe» o «él reirá».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים como sujeto singular con verbo singular; en español, «Dios» comunica con naturalidad esa referencia singular.
- source_word: אֲבָל
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - Pero
  - No, pero
  lexicon: HALOT
  rationale: La fuerza correctiva de אֲבָל responde a la petición anterior de Abraham; en español «No, sino que» transmite mejor la corrección enfática que un simple «pero».
- source_word: יֹלֶדֶת
  english_pob_choice: shall bear
  chosen_spanish: te dará a luz
  alternatives_spanish:
  - dará a luz
  - está por darte a luz
  - está dando a luz
  lexicon: HALOT
  rationale: Aunque la forma es participial, aquí funciona con valor futuro de promesa. «Te dará a luz» es natural en español y conserva el sentido predictivo.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: «Hijo» es la equivalencia directa y clara para בֵּן; el contexto ya especifica el sexo del niño.
- source_word: וְקָרָאתָ אֶת שְׁמוֹ
  english_pob_choice: you shall call his name
  chosen_spanish: le pondrás por nombre
  alternatives_spanish:
  - lo llamarás
  - le llamarás
  lexicon: HALOT
  rationale: En español, la fórmula idiomática más natural para esta construcción nominal es «poner por nombre». Mantiene la función de nombramiento sin calco pesado.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: HALOT
  rationale: Los nombres propios se transliteran según el uso establecido en español.
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - confirmaré
  - ratificaré
  - sostendré
  lexicon: HALOT
  rationale: En lenguaje de pacto, «establecer» refleja bien la idea de hacer que el pacto quede firme y en vigor.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: «Pacto» es el término bíblico más estable en español para בְּרִית y conserva la fuerza teológica del pasaje.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: La preposición indica relación de pacto con Isaac mismo; «con él» evita convertirla en mera ventaja a su favor.
- source_word: לִבְרִית עוֹלָם
  english_pob_choice: as an everlasting covenant
  chosen_spanish: como un pacto eterno
  alternatives_spanish:
  - como un pacto perpetuo
  - para un pacto eterno
  lexicon: HALOT
  rationale: La construcción expresa designación o resultado. «Como un pacto eterno» conserva la estructura y el matiz durativo de עוֹלָם.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - duradero
  lexicon: HALOT
  rationale: «Eterno» es una traducción sobria y tradicional para el valor de duración indefinida o permanente en este contexto de pacto.
- source_word: לְזַרְעוֹ אַחֲרָיו
  english_pob_choice: for his offspring after him
  chosen_spanish: para su descendencia después de él
  alternatives_spanish:
  - para su descendencia tras él
  - para su posteridad después de él
  lexicon: HALOT
  rationale: «Descendencia» preserva el sentido colectivo de זֶרַע sin sonar arcaico. «Después de él» mantiene la secuencia generacional explícita del hebreo.
theological_decisions:
- issue: Alcance del pacto prometido a Isaac y su descendencia
  english_pob_reading: God will establish his covenant with Isaac as an everlasting covenant for his offspring after him, without importing later systems.
  chosen_spanish_reading: Dios establecerá su pacto con Isaac como un pacto eterno para su descendencia después de él, sin cerrar el alcance teológico más allá del texto.
  alternative_spanish_readings:
  - Dios ratificará una alianza exclusivamente nacional con Isaac
  - Dios está definiendo aquí directamente la teología cristiana del pacto
  rationale: El versículo afirma el pacto con Isaac y con su descendencia. La traducción debe conservar esa afirmación sin reducirla a una lectura exclusivamente nacional ni expandirla a un sistema posterior que el texto no desarrolla por sí mismo.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió de cerca el auditorial inglés POB, especialmente en el valor futural de יֹלֶדֶת, la fórmula de nombramiento y el lenguaje de pacto. La principal adaptación al español fue convertir «you shall call his name» en la locución idiomática «le pondrás por nombre», sin perder el contenido semántico ni la solemnidad del pasaje.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים como sujeto singular.
  - Se mantuvo «pacto» para בְּרִית por consistencia terminológica bíblica.
  - Se eligió «descendencia» para זֶרַע por claridad y sentido colectivo.
  - Se conservó el nombre propio «Isaac» sin transliteración adicional.
  - La nota de sonido de Isaac se ancló al nombre en el texto con [a].
