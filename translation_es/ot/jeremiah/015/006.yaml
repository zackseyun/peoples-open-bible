- from: Tú me has abandonado, declara Yahvé; tú sigues yendo hacia atrás. Por eso he extendido mi mano contra ti y te he destruido; estoy cansado[a] de relentarme[b].
  to: Me has abandonado, declara Yahvé; sigues yendo hacia atrás.[a] Por eso he extendido mi mano contra ti y te he destruido; estoy cansado de ceder.[b]
