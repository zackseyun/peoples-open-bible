review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: adyacencia (''Junto a ellos''), participantes nombrados y grupo adicional, y el sintagma final con לְכִסֵּא פַּחַת עֵבֶר הַנָּהָר. Sin embargo, dos decisiones importantes no preservan bien el sentido auditado: ''silla'' suena demasiado doméstico y concreto para el contexto administrativo, y ''distrito al otro lado del río'' debilita el título regional persa que el POB documenta como ''Beyond the River''.'
  spanish_quality_summary: El español es generalmente claro y natural, pero 'para la silla del gobernador' resulta extraño y poco idiomático en un registro bíblico moderno; 'sede' comunica mejor el referente administrativo, con nota que preserve la alternativa literal. También conviene capitalizar 'Más allá del Río' como designación regional/titular y usar 'provincia' en vez de 'distrito' para reflejar mejor el trasfondo administrativo. El resto del versículo es legible.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. En nombres y gentilicios, el borrador es aceptable. La principal desviación está en עֵבֶר הַנָּהָר, donde el audit trail favorece un título administrativo propio; en español conviene 'la provincia Más allá del Río'. Para לְכִסֵּא, la mejor solución española es texto principal con 'sede' y nota que conserve 'asiento'/'silla' y la posible lectura de autoridad jurisdiccional.
  issues:
  - severity: high
    issue: '''silla'' para לְכִסֵּא en contexto administrativo'
    rationale: Aunque literalmente posible, 'silla' en español suena física y coloquial, y produce una frase poco natural ('para la silla del gobernador'). El audit trail permite una referencia a la sede/residencia oficial o a la autoridad jurisdiccional; 'sede' preserva mejor el sentido en español, con nota para la literalidad.
  - severity: medium
    issue: '''distrito al otro lado del río'' atenúa un título regional persa'
    rationale: עֵבֶר הַנָּהָר funciona como designación administrativa conocida. 'Provincia Más allá del Río' refleja mejor el valor titular documentado por el POB que una descripción genérica en minúscula.
  - severity: low
    issue: La nota [a] puede formularse con español más natural
    rationale: La glosa ''hicieron fuertes'' es poco idiomática; 'fortalecieron' basta para preservar la alternativa léxica.
