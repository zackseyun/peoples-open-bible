  - appellation
  lexicon: Crum Sahidic Coptic
  rationale: Abstract nominal form (ⲙⲛⲧ-) of ‘to name’; “naming” fits the contrast
    with “words.”
- source_word: ⲟⲩⲁⲧϯⲣⲉⲛ
  chosen: unnameable
  alternatives:
  - unnamable
  lexicon: Crum Sahidic Coptic
  rationale: Privative formation with ‘to name’; preserves technical apophatic nuance.
- source_word: ⲟⲩⲁⲧⲧⲉ
  chosen: ineffable
  alternatives:
  - unsayable
  lexicon: Crum Sahidic Coptic
  rationale: Privative formation with ‘to say/speak’; “ineffable” is the conventional
    rendering for apophatic diction.
- source_word: ⲟⲩⲁⲧⲙⲉⲉⲩⲉ
  chosen: indescribable
  alternatives:
  - without description
  lexicon: Crum Sahidic Coptic
  rationale: Privative with ‘to describe/think’; “indescribable” concisely communicates
    the sense.
- source_word: ⲃⲁⲑⲟⲥ
  chosen: Depth
  alternatives:
  - Abyss
  - Deep
  lexicon: Loan from Greek; Crum + Gnostic usage
  rationale: Technical Valentinian cosmological term; capitalized as a title per scholarly
    convention.
- source_word: ⲡⲗⲏⲣⲱⲙⲁ
  chosen: Pleroma
  alternatives:
  - Fullness
  lexicon: Loan from Greek; Crum + Gnostic usage
  rationale: Technical term for the divine Fullness; retained to preserve doctrinal
    specificity.
- source_word: ⲛϫⲁⲉⲓⲥ
  chosen: Beloved
  alternatives:
  - Loved One
  - Dear One
  lexicon: Crum Sahidic Coptic
  rationale: Conventional rendering of agapētos loanword; also functions as a christological
    epithet.
- source_word: ⲟⲩⲁⲧⲡⲉⲑⲁⲩ
  chosen: without envy
  alternatives:
  - without jealousy
  lexicon: Crum Sahidic Coptic
  rationale: Ap- privative with phthonos (envy); “without envy” is a recognized Valentinian
    trope.
- source_word: ⲙⲛⲧⲁⲡⲉⲉⲓ
  chosen: the Perfect
  alternatives:
  - the Complete One
  - the Perfect One
  lexicon: Crum Sahidic Coptic
  rationale: Abstract noun for completeness used as a title for the revealer; “the
    Perfect” preserves the title-like force.
- source_word: ⲁⲡⲟⲩⲱⲉⲓⲛ
  chosen: receive on loan
  alternatives:
  - borrow
  lexicon: Crum Sahidic Coptic
  rationale: Verb commonly means “to borrow”; context contrasts proper name with borrowed
    names of others.
- source_word: ⲥⲙⲁⲧ
  chosen: form
  alternatives:
  - shape
  - figure
  lexicon: Crum Sahidic Coptic
  rationale: “Form” suits the idiom “according to the form in which each is produced.”},{
technical_vocabulary_note: 'Key Valentinian terms are retained to preserve the text’s
  speculative theology: Pleroma (ⲡⲗⲏⲣⲱⲙⲁ) is kept rather than normalized to “Fullness,”
  and Depth (ⲃⲁⲑⲟⲥ) is capitalized as a cosmological title. Apophatic descriptors—unnameable
  (ⲟⲩⲁⲧϯⲣⲉⲛ), ineffable (ⲟⲩⲁⲧⲧⲉ), and indescribable (ⲟⲩⲁⲧⲙⲉⲉⲩⲉ)—are translated with
  conventional English theological terms rather than flattened paraphrase. Beloved
  (ⲛϫⲁⲉⲓⲥ) is treated as an epithet for the Son, not generalized to “loved one.”'
textual_note: 'Section boundary: This draft covers Codex I pp. 39–41 up to the clause
  praising “the Pleroma, the greatness of his name, and the Father’s sweetness,” corresponding
  to The Father’s Name (014). There is no Codex XII overlap for this portion. Several
  lines are paleographically challenging in the OCR (e.g., the sequence contrasting
  “words and naming” with the “invisible” character of the name; the clause “He did
  not hide it within himself”), and punctuation is supplied for readability. The rendering
  “He did not hide it within himself” reflects ⲛⲧⲁϥ ϩⲱⲡϥ ϭⲉ, taken idiomatically as
  “he did not conceal it,” rather than a reference to ‘love’ (ⲡϩⲱⲃ), which is graphically
  close in this hand. The triad “unnameable, ineffable, indescribable” is preserved
  from the privative forms and read as an apophatic sequence describing the Father
  prior to the revelatory speech of “the Perfect.”'
