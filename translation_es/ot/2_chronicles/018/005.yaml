base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/005.yaml
  text: So the king of Israel gathered the prophets[a], four hundred men, and said to them, “Should we go to Ramoth-gilead for battle, or should I refrain?” And they said, “Go up[b], and God will give it into the hand of the king.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of the king.'' The phrase is an idiom meaning into the king''s power or control.'
    reason: lexical_alternative
  - marker: b
    text: The prophets answer, 'Go up, and God will give it into the hand of the king.' Hebrew leaves 'the king' unspecified rather than saying 'your hand.'
    reason: alternative_reading
