id: SIR.48.10
reference: Sirach 48:10
source:
  edition: sefaria-ben-sira-kahana
  text: הכתוב נכון לעת, להשבית אף לפני חרון אל.<br><small>(י)</small> להשיב לב אבות על בנים, ולהכין שבטי ישראל.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ καταγραφεὶς ἐν ἐλεγμοῖς εἰς καιρούς, κοπάσαι ὀργὴν πρὸ θυμοῦ καὶ ἐπιστρέψαι καρδίαν πατρὸς πρὸς υἱὸν καὶ καταστῆσαι φυλὰς Ἰακώβ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:10
translation:
  text: who was appointed for the appointed time[a], to calm wrath before fury, to turn the heart of fathers to sons[c][b], and to restore the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew more fully: ''to make anger cease before the burning anger of God.'' The Greek reads more briefly, ''to calm wrath before fury.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew has 'fathers ... sons/children' in the plural; the Greek has the singular, 'father ... son.'
    reason: textual_variant
  - marker: c
    text: Greek reads 'the tribes of Jacob'; Hebrew reads 'the tribes of Israel.'
    reason: textual_variant
lexical_decisions:
- source_word: הכתוב נכון לעת / ὁ καταγραφεὶς ἐν ἐλεγμοῖς εἰς καιρούς
  chosen: who was appointed for times to come
  alternatives:
  - who was written down for the appointed time
  - who was recorded for rebukes in due times
  - who was designated for future times
  lexicon: HALOT; BDAG
  rationale: 'The Hebrew as transmitted is difficult: הכתוב normally means ''written,'' but with נכון לעת it points to someone marked out or designated for a future time. The Greek parallel has ὁ καταγραφεὶς ... εἰς καιρούς, likewise suggesting one recorded/designated with reference to future seasons. ''Appointed for times to come'' captures the forward-looking sense without overcommitting to the obscure Hebrew wording or reproducing the Greek''s uncertain ἐν ἐλεγμοῖς phrase.'
- source_word: להשבית אף / κοπάσαι ὀργήν
  lemma: להשבית
  chosen: to calm wrath
  alternatives:
  - to stop wrath
  - to quiet anger
  - to turn away wrath
  lexicon: HALOT; BDAG
  rationale: The Hebrew verb להשבית means to cause to cease; the Greek κοπάσαι means to stop or calm. 'Calm wrath' is readable modern English and preserves the sense of restraining divine anger rather than annihilating it.
- source_word: לפני חרון אל / πρὸ θυμοῦ
  chosen: before fury
  alternatives:
  - before anger blazes
  - before wrath
  - before divine fury
  lexicon: HALOT; BDAG
  rationale: The Hebrew explicitly has 'the burning anger of God,' while the Greek abbreviates to 'before fury.' The main line keeps the concise temporal sense 'before fury' in coordination with the previous phrase; the divine referent is already implied by the Elijah/Malachi context. A footnote preserves the fuller Hebrew nuance.
- source_word: להשיב לב אבות על בנים / ἐπιστρέψαι καρδίαν πατρὸς πρὸς υἱόν
  chosen: to turn the heart of a father to a son
  alternatives:
  - to turn the heart of fathers to children
  - to reconcile fathers and sons
  lexicon: HALOT; BDAG
  rationale: The Hebrew has plural 'fathers' and 'sons/children'; the Greek singularizes. Because the Greek is the project's base source for deuterocanonical books but the Hebrew survives here and should inform the rendering, the English uses a representative singular ('a father ... a son') to reflect the Greek wording while preserving the relational sense. 'Turn the heart' keeps the biblical idiom rather than flattening it to 'reconcile'.
- source_word: ולהכין שבטי ישראל / καταστῆσαι φυλὰς Ἰακώβ
  chosen: to restore the tribes of Israel
  alternatives:
  - to set in order the tribes of Jacob
  - to reestablish the tribes of Israel
  - to prepare the tribes of Israel
  lexicon: HALOT; BDAG
  rationale: The Hebrew verb להכין can mean prepare, establish, or set right; the Greek καταστῆσαι suggests establish or restore. 'Restore' best fits the prophetic-Elijah context of renewal. 'Israel' follows the Hebrew witness, while a footnote notes the Greek's 'Jacob'.
