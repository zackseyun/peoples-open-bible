lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque así
  lexicon: HALOT
  rationale: La conjunción introduce la relación discursiva con la declaración precedente; en español, «Porque» conserva esa conexión causal o explicativa de manera natural.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene con valor actual y solemne; «así dice» reproduce bien el giro formular sin volverlo forzado en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahweh
  - el Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre divino YHWH. Siguiendo la norma del proyecto, se conserva el nombre propio «Yahvé» en vez de ocultarlo con un equivalente funcional.
- source_word: חֶרֶב
  english_pob_choice: The sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  lexicon: HALOT
  rationale: En este contexto judicial y concreto, el arma funciona como amenaza específica ya identificada; el español natural mantiene el sustantivo definido «la espada».
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: of the king of Babylon
  chosen_spanish: del rey de Babilonia
  alternatives_spanish:
  - del rey babilonio
  lexicon: HALOT
  rationale: La cadena constructa se expresa de forma directa y transparente en español con «del rey de Babilonia», sin perder la referencia histórica precisa.
- source_word: תְּבוֹאֶךָ
  english_pob_choice: will come upon you
  chosen_spanish: vendrá sobre ti
  alternatives_spanish:
  - vendrá contra ti
  - te alcanzará
  lexicon: HALOT
  rationale: El verbo בוא con sujeto hostil en un contexto de juicio expresa irrupción amenazante; «vendrá sobre ti» conserva ese movimiento y evita una paráfrasis excesiva.
theological_decisions:
- issue: Renderización del nombre divino YHWH en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El testimonio textual contiene el Tetragrama directamente. Para una traducción auditable y transparente, se preserva el nombre divino «Yahvé» en la forma de lectura española, en vez de sustituirlo por una convención eclesial de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El español sigue el mismo ajuste de la revisión inglesa más reciente: se prefiere una lectura formal y directa del verbo de movimiento con sujeto hostil. La elección de «vendrá sobre ti» refleja la corrección editorial de evitar un matiz demasiado interpretativo como «contra ti», sin perder la fuerza adversativa del contexto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la política del proyecto para יהוה.
  - Se usa «Señor» para אֲדֹנָי y «Yahvé» para יְהוִה, preservando la distinción del título compuesto.
  - «Babilonia» se conserva como topónimo tradicional y transparente en español.
  - La sintaxis sigue la cadencia profética breve y solemne del hebreo sin introducir material explicativo ajeno al verso.
