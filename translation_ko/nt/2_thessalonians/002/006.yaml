id: 2TH.2.6
reference: 2 Thessalonians 2:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ νῦν τὸ κατέχον οἴδατε, εἰς τὸ ἀποκαλυφθῆναι αὐτὸν ἐν τῷ ⸀ἑαυτοῦ καιρῷ·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/006.yaml
  text: And now you know what is restraining him[b][a], so that he may be revealed in his own time.
translation:
  language: ko
  text: 그리고 이제 여러분은 그를 제지하고 있는 것[a]이 무엇인지 알고 있습니다. 이는 그가 자신의 때에 나타나도록 하기 위함입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그를 막고 있는 것」. 헬라어는 중성 표현을 사용하며 제지하는 주체를 특정하지 않는다. 본 절에서는 중성, 다음 7절에서는 남성(「제지하는 자」)으로 바뀐다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「정해진 때에」. 헬라어 καιρός는 적절하고 정해진 때를 함의할 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ κατέχον
  english_pob_choice: what is restraining
  chosen_korean: 그를 제지하고 있는 것
  alternatives_korean:
  - 그를 막고 있는 것
  - 제지하는 것
  lexicon: BDAG
  rationale: 중성 관사 + 분사 구조를 「~하고 있는 것」(비인격적)으로 옮긴다. 「제지」는 「막다」보다 능동적 차단의 의미를 더 정확히 담는다.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_korean: 알고 있습니다
  alternatives_korean:
  - 알고 계십니다
  - 압니다
  lexicon: BDAG
  rationale: 합쇼체로 자연스럽게.
- source_word: εἰς τὸ ἀποκαλυφθῆναι
  english_pob_choice: so that he may be revealed
  chosen_korean: 그가 ~ 나타나도록 하기 위함입니다
  alternatives_korean:
  - 그가 ~ 드러나도록 하기 위함입니다
  - 그가 ~ 계시되도록 하기 위함입니다
  lexicon: BDAG
  rationale: εἰς + 부정사 관사구의 목적/결과를 자연스럽게 옮긴다.
- source_word: ἐν τῷ ἑαυτοῦ καιρῷ
  english_pob_choice: in his own time
  chosen_korean: 자신의 때에
  alternatives_korean:
  - 자신에게 정해진 때에
  - 자신의 적절한 때에
  lexicon: BDAG
  rationale: 직역에 가까운 「자신의 때에」를 본문에 두고, 「정해진 때」 의미를 각주로 보존한다.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_korean: 그가
  alternatives_korean:
  - 그를
  lexicon: BDAG
  rationale: 남성 대명사는 앞서 언급된 「불법의 사람」을 가리킨다.
theological_decisions:
- issue: τὸ κατέχον이 가리키는 제지하는 힘/존재의 정체
  chosen_reading: 본문이 특정하지 않는다는 점을 보존하여 「제지하고 있는 것」으로만 옮김
  alternative_readings:
  - 로마 제국·질서
  - 성령
  - 천사적 존재
  - 하나님의 작정·섭리
  rationale: 본문 자체가 제지자를 명시하지 않으며 중성 표현을 사용한다. 번역도 그 침묵을 보존한다.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension'
- issue: καιρός의 정함의 의미
  chosen_reading: 「자신의 때」 — 해석적 「정해진 때」 표현은 각주로
  alternative_readings:
  - 자신의 정해진 때
  - 자신의 적절한 때
  rationale: 직역을 본문에 두어 해석의 폭을 좁히지 않는다.
  doctrine_reference: 'Optimal equivalence; preserve ambiguity'
