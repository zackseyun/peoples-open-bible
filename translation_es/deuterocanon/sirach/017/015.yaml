translation:
  language: es
  text: A cada nación le designó un gobernante, e Israel es la porción de Yahvé.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «y Israel es la porción de Yahvé». Se conserva «e» en el texto principal para reflejar de manera neutra la conjunción griega καί, sin volver explícito el matiz contrastivo que algunos entienden en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστῳ
  english_pob_choice: for each
  chosen_spanish: a cada
  alternatives_spanish:
  - para cada
  - a cada uno de
  lexicon: LSJ
  rationale: El dativo distributivo con ἔθνει expresa asignación individualizada; «a cada» comunica con naturalidad la idea de distribución sin añadir sobreexplicación.
- source_word: ἔθνει
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gentil nación
  lexicon: LSJ
  rationale: Aquí designa a los pueblos/naciones en general. «Nación» conserva el alcance amplio y evita restringirlo indebidamente a un contraste técnico con «gentiles».
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: le estableció
  alternatives_spanish:
  - le नियुक्तó
  - le puso
  - le designó
  lexicon: LSJ
  rationale: El verbo puede significar nombrar o poner en una posición de autoridad. «Le estableció» reproduce el acto de instituir a alguien en un cargo con español digno y claro.
- source_word: ἡγούμενον
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un líder
  - uno que gobierna
  lexicon: LSJ
  rationale: El participio apunta a quien conduce o gobierna. «Gobernante» expresa mejor la función de autoridad que «líder» en este contexto.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  lexicon: LSJ
  rationale: «Porción» conserva la imagen de asignación o lote compartido. Es una equivalencia natural del término y mantiene el matiz de pertenencia.
- source_word: Κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: LSJ
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el texto griego dice Κυρίου y el audit trail inglés fija «the Lord». En este versículo, «del Señor» sigue la formulación auditada y evita introducir una identificación no explícita en el griego de esta unidad.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  lexicon: LSJ
  rationale: Nombre propio estándar; no requiere ajuste.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: LSJ
  rationale: Copulativo simple; «es» es la opción directa y natural.
theological_decisions:
- issue: Relación entre las naciones y Israel
  english_pob_reading: The English audit trail finally retained 'and' rather than 'but' to reflect the Greek conjunction neutrally, while still understanding the second clause as distinctive.
  chosen_spanish_reading: e Israel es la porción del Señor
  alternative_spanish_readings:
  - pero Israel es la porción del Señor
  - mas Israel es la porción del Señor
  rationale: En español, «e» reproduce el καί copulativo sin forzar una oposición que el último pasaje auditado decidió no explicitar. La distinción teológica permanece implícita por contraste de contenido, no por una conjunción adversativa añadida.
  doctrine_reference: DOCTRINE.md §§1, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión final del audit trail inglés, que sustituyó la lectura adversativa por una copulativa neutral ('and'). Por eso el español evita «pero» y mantiene el contraste solo por el contenido de los dos miembros. También se evitó introducir «Yahvé» aquí, porque la unidad griega usa Κυρίου y el registro inglés ya fijó 'the Lord'.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para Κυρίου en coherencia con el audit trail inglés y con la cita griega de esta unidad.
  - «Gobernante» se eligió para ἡγούμενον por su valor funcional y por su naturalidad en español bíblico contemporáneo.
  - La conjunción «e» se usa por eufonía ante «Israel», preservando el valor copulativo de καί.
