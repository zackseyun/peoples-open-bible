base_translation:
  language: en
  yaml_path: translation/ot/micah/002/010.yaml
  text: Rise and go[a], for this is not the resting place; because of uncleanness it brings destruction[b], even grievous destruction.
  footnotes:
  - marker: a
    text: Or 'for this is not the place of rest.' The Hebrew noun can mean 'rest' or 'resting place,' and here likely refers to the land as Israel's place of settled repose.
    reason: lexical_alternative
  - marker: b
    text: Or 'it destroys—yes, a severe destruction.' The Hebrew uses a verb and cognate noun from the same root for emphasis.
    reason: lexical_alternative
