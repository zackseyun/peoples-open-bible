    rationale: צֹאן abarca ganado menor, especialmente ovejas y cabras; בָקָר denota ganado mayor/cattle. Traducir como especies concretas reduce el alcance semántico y no refleja bien los colectivos hebreos.
  - severity: medium
    issue: «un ganado muy grande» es poco natural y expresa mal מִקְנֶה כָּבֵד מְאֹד
    rationale: El hebreo usa «pesado» idiomáticamente para abundancia o gran cantidad. En español, «ganado muy grande» sugiere tamaño físico del ganado o una formulación poco idiomática, no una gran cantidad de animales.
  - severity: low
    issue: La nota b no corresponde bien a una mejora necesaria en el texto
    rationale: Si el texto principal ya puede expresar naturalmente la abundancia con «muchísimo ganado» o equivalente, no hace falta una nota separada para explicar «ganado»; la nota inglesa solo preserva alternativas para עֵרֶב רַב, no para מִקְנֶה.
