lexical_decisions:
- source_word: συνήγαγον
  english_pob_choice: they collected
  chosen_spanish: reunieron
  alternatives_spanish:
  - recogieron
  - juntaron
  lexicon: BDAG / LSJ
  rationale: El verbo aoristo de συνάγω aquí se refiere a juntar dinero o contribuciones. En español, "reunieron" conserva la idea de agrupar aportes y suena natural en contexto financiero.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - plata en dinero
  lexicon: BDAG
  rationale: El griego literalmente dice "plata" y a menudo funciona con sentido monetario. "Plata" preserva la imagen del original y permite entender el valor económico sin explicitar más de lo que el texto dice.
- source_word: καθὰ
  english_pob_choice: according to what
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: LSJ
  rationale: La construcción expresa proporción o medida. "Conforme a" comunica bien la distribución proporcional en español y mantiene la relación con la capacidad de cada uno.
- source_word: ἑκάστου
  english_pob_choice: each one’s
  chosen_spanish: de cada uno
  alternatives_spanish:
  - de cada persona
  - cada uno
  lexicon: BDAG
  rationale: El genitivo distributivo subraya la aportación individual. "De cada uno" es la forma más natural en español para expresar esa individualización.
- source_word: ἠδύνατο
  english_pob_choice: was able
  chosen_spanish: podía
  alternatives_spanish:
  - era capaz de
  - tenía medios para
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad o posibilidad. "Podía" conserva esa fuerza verbal de manera natural en español y no interpreta más allá del texto.
- source_word: ἡ χείρ
  english_pob_choice: hand
  chosen_spanish: la mano
  alternatives_spanish:
  - los medios
  - los recursos
  lexicon: BDAG
  rationale: Se conserva la imagen literal de "mano" para reflejar el giro idiomático del griego. La frase completa deja claro que se trata de capacidad o medios de aportar.
translation_notes:
  revision_awareness: La versión inglesa revisó la expresión idiomática para hacerla más natural («according to what each one’s hand was able to provide»). La redacción española mantiene la transparencia al original griego y conserva la imagen de la "mano" sin perder claridad contextual.
  spanish_consistency_notes:
  - Se mantuvo "plata" para ἀργύριον, en armonía con la preferencia POB de preservar el término fuente cuando la referencia monetaria es evidente por el contexto.
  - Se tradujo la expresión idiomática de modo transparente con nota explicativa, evitando reemplazarla por un equivalente totalmente desfigurado como "medios" en el texto principal.
  - La puntuación y el orden sintáctico buscan un español bíblico moderno, claro y publicable.
