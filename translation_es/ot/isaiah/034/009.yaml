review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: transformación pasiva de los wadis/cauces en brea, del polvo en azufre, y de la tierra en brea ardiente. También conserva correctamente la personificación femenina mediante posesivos. Sin embargo, una nota introduce una alternativa inglesa (''brimstone'') que no corresponde como alternativa española y debe corregirse.'
  spanish_quality_summary: El español principal es claro y natural. 'Sus wadis' es defendible con nota, y 'brea ardiente' comunica bien בֹּעֵרָה. El único problema notable de calidad es la nota b, que mezcla inglés y una glosa interpretativa ('azufre ardiente') no equivalente directo al término fuente.
  glossary_alignment: 'Alineado en términos clave: זפת -> ''brea'', גפרית -> ''azufre'', ארץ -> ''tierra''. No hay conflictos con la terminología base del proyecto. La excepción a corregir es solo metalingüística en la nota: debe preservarse la alternativa tradicional en español (''brimstone'' en inglés corresponde a ''azufre'' o, según tradición bíblica española, no suele mantenerse como anglicismo).'
  issues:
  - severity: medium
    issue: La nota b usa el anglicismo 'brimstone' como si fuera alternativa española.
    rationale: 'La tarea exige producir decisiones léxicas en español. La nota inglesa decía ''Traditional: brimstone''; en español no debe conservarse el término inglés como alternativa léxica para el lector final.'
  - severity: low
    issue: La nota b añade 'azufre ardiente', que no es una alternativa directa para גָפְרִית en este lugar.
    rationale: גָפְרִית significa 'azufre'; 'azufre ardiente' añade un matiz que en el versículo corresponde más bien a 'brea ardiente' al final, no al sustantivo mismo.
  revised_spanish_text: Sus wadis[a] serán convertidos en brea, y su polvo en azufre[b]; su tierra se convertirá en brea ardiente.
  revised_footnotes:
  - marker: a
    text: O «cauces» o «corrientes». El hebreo נְחָלִים puede referirse a wadis, cauces de torrente o torrentes estacionales.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: «brimstone», es decir, «azufre».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y legible, y se corrige solo la nota b para eliminar la falsa alternativa española y evitar un matiz no sustentado por el término hebreo. Así se preserva la intención del rastro POB sin dejar una nota impropia para la edición española.
