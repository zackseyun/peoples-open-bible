    issue: «se ha alzado» debilita la idea de remoción implícita en נִסַּע
    rationale: El hebreo, según la auditoría, evoca un cordel de tienda que es quitado/pull up; «alzarse» en español suele significar levantarse, no necesariamente ser retirado.
  - severity: high
    issue: Las notas al pie están mal ancladas
    rationale: La nota [a] se coloca en «Mueren», pero comenta alternativas para el cordel/remoción. La nota [b] está en «sabiduría», pero el POB en inglés tiene además una nota asociada a «They die» para la frase final completa «and not in wisdom».
  - severity: low
    issue: «dentro de ellos» es comprensible, pero «desde dentro» suena más natural con un verbo de remoción
    rationale: Ayuda a expresar el valor de בם sin producir una construcción rígida en español.
  revised_spanish_text: ¿No se les arranca[a] su cordel de tienda desde dentro? Mueren[b], y no en sabiduría.
