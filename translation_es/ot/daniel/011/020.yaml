translation:
  language: es
  text: Entonces se levantará en su lugar uno que hará pasar[a] a un exactor por el esplendor[b] del reino; pero dentro de pocos días será quebrantado[c], aunque no en ira y no en batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea permite también la idea de ‘enviar’ o ‘hacer venir’ a un funcionario que exige tributo; 'hacer pasar' conserva más de cerca la forma verbal del original.
    reason: lexical_alternative
  - marker: b
    text: 'También: ‘la gloria del reino’. El hebreo puede referirse al esplendor del reino o a su majestad como tal.'
    reason: lexical_alternative
  - marker: c
    text: 'También: ‘pero no en ira’ o ‘no por ira’. El hebreo es breve y deja algo comprimido el modo de su caída.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד עַל כַּנּוֹ
  english_pob_choice: Then one will arise in his place
  chosen_spanish: Entonces se levantará en su lugar
  alternatives_spanish:
  - Y se levantará en su lugar
  - Entonces surgirá en su lugar
  lexicon: HALOT
  rationale: El giro hebreo es idiomático de sucesión dinástica o reemplazo. En español, 'se levantará en su lugar' conserva la idea de suceder a otro sin volverla demasiado literal ni perder el movimiento narrativo del waw consecutivo.
- source_word: מַעֲבִיר נוֹגֵשׂ
  english_pob_choice: who will send an exactor
  chosen_spanish: uno que hará pasar un exactor
  alternatives_spanish:
  - uno que enviará un exactor
  - uno que hará pasar un recaudador
  lexicon: HALOT
  rationale: Se conserva el valor causal de la forma hiphil de עבר con una construcción española que mantiene la relación verbal y el sustantivo de oficio. 'Hará pasar' refleja mejor el hebreo que 'enviará', aunque suene algo más formal; 'exactor' preserva la fuerza semántica amplia de נוֹגֵשׂ.
- source_word: הֶדֶר מַלְכּוּת
  english_pob_choice: the splendor of the kingdom
  chosen_spanish: el esplendor del reino
  alternatives_spanish:
  - la gloria del reino
  - la majestad del reino
  lexicon: HALOT
  rationale: '''Esplendor'' reproduce el campo semántico de הדר sin limitarlo a una sola matización. Se mantiene la relación genitiva natural en español y la ambigüedad del hebreo sobre si se trata del brillo del reino o de su parte más magnífica.'
- source_word: וּבְיָמִים אֲחָדִים
  english_pob_choice: within a few days
  chosen_spanish: dentro de pocos días
  alternatives_spanish:
  - en pocos días
  - al cabo de unos días
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para un lapso breve. 'Dentro de pocos días' suena natural en español y conserva la brevedad temporal sin volverla matemática.
- source_word: יִשָּׁבֵר
  english_pob_choice: he will be broken
  chosen_spanish: será quebrantado
  alternatives_spanish:
  - será quebrado
  - será destruido
  lexicon: HALOT
  rationale: '''Quebrantado'' mantiene la imagen de ruptura del niphal y evita adelantar demasiado si la ruina es literal, política o mortal. ''Quebrado'' sería más directo, pero en español bíblico ''quebrantado'' conserva mejor el peso de la metáfora.'
- source_word: וְלֹא בְאַפַּיִם
  english_pob_choice: though not in anger
  chosen_spanish: aunque no en ira
  alternatives_spanish:
  - pero no en ira
  - y no en ira
  - aunque no por ira
  lexicon: HALOT
  rationale: אַפַּיִם puede denotar ira o furor; 'ira' es la opción más clara y digna en español. Se mantiene la reserva del hebreo, que es comprimido, sin forzar una causalidad más explícita que la del original.
- source_word: וְלֹא בְמִלְחָמָה
  english_pob_choice: and not in battle
  chosen_spanish: y no en batalla
  alternatives_spanish:
  - y no en guerra
  - ni en batalla
  lexicon: HALOT
  rationale: '''Batalla'' conserva el contraste puntual con la frase anterior y evita generalizar a ''guerra'' cuando el hebreo permite un matiz más concreto. La coordinación simple refleja bien la estructura paralela del verso.'
translation_notes:
  revision_awareness: El contexto crítico y la revisión más reciente muestran alto acuerdo y sin cambios necesarios; se mantiene la solución del pasaje como estable, sin introducir reinterpretaciones doctrinales o textuales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton.
  - Se preserva 'exactor' como término técnico, con nota explicativa, para no diluir la fuerza fiscal/coercitiva del hebreo.
  - '''Quebrantado'' se eligió por su valor imagístico y su registro bíblico comprensible en español.'
  - Se mantuvo la ambigüedad de la última cláusula con una nota, en vez de resolverla de modo interpretativo.
