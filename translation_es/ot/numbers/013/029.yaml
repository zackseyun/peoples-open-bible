review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien la distribución geográfica de los pueblos y refleja adecuadamente el valor de residencia estable de יוֹשֵׁב con «habita». Los etnónimos y la referencia regional al Négueb están bien conservados. Sin embargo, falta en español la nota alternativa equivalente a la nota inglesa sobre «habita/vive» para el participio repetido en todo el versículo, y conviene ajustar «junto al Jordán» a una formulación que preserve mejor la idea lineal de עַל יַד הַיַּרְדֵּן, mejor representada por «a lo largo del Jordán».
  spanish_quality_summary: El texto es claro, natural y de registro bíblico digno. «Región montañosa» funciona bien para בָּהָר. La secuencia «junto al mar y junto al Jordán» suena algo repetitiva y menos precisa que una solución con contraste espacial más idiomático. Las notas son útiles, pero están desalineadas con las notas del audit trail inglés en número y contenido.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. La adaptación de nombres y etnónimos es consistente con español bíblico. «Amalec», «Négueb», «hititas», «jebuseos», «amorreos» y «cananeos» son aceptables. La principal corrección es de precisión espacial e integridad de notas, no de terminología doctrinal.
  issues:
  - severity: medium
    issue: Falta una nota sobre el valor alternativo de «habita»/«vive» para יוֹשֵׁב.
    rationale: El audit trail inglés preserva explícitamente esta alternativa léxica para todo el versículo. El español debería reflejarla también, ya que «habita» es una decisión válida pero no única.
  - severity: medium
    issue: «Junto al Jordán» atenúa la fuerza de contigüidad lineal de עַל יַד הַיַּרְדֵּן.
    rationale: Aunque no es incorrecto, el hebreo idiomático apunta más a «a lo largo del Jordán» o «junto al lado del Jordán». La formulación revisada conserva mejor el matiz sin sonar forzada.
  - severity: low
    issue: La correspondencia y orden de notas no siguen bien el conjunto de decisiones preservadas en inglés.
    rationale: El inglés conserva alternativas para «lives», «Negev» y la expresión sobre el Jordán. La nota española actual sobre «región montañosa» es útil, pero omite una alternativa documentada más importante del audit trail.
  revised_spanish_text: Amalec habita[a] en la tierra del Négueb[b], y los hititas, los jebuseos y los amorreos habitan en la región montañosa, y los cananeos habitan junto al mar y a lo largo del Jordán[c].
  revised_footnotes:
