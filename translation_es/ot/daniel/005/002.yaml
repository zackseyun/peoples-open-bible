translation:
  language: es
  text: Belsasar dio la orden, al probar el vino[b], de traer los vasos de oro y de plata que Nabucodonosor su padre[a] había sacado del templo que estaba en Jerusalén, para que el rey y sus nobles, sus esposas y sus concubinas, bebieran de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo: ''su padre''; en el uso real de la realeza también puede significar ''su antepasado'' o ''su predecesor''.'
    reason: alternative_reading
  - marker: b
    text: O 'bajo la influencia del vino'; la expresión aramea dice literalmente 'en el sabor del vino'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמַר
  english_pob_choice: gave the order
  chosen_spanish: dio la orden
  alternatives_spanish:
  - dijo
  - mandó
  lexicon: HALOT
  rationale: El verbo arameo puede significar simplemente 'decir', pero aquí introduce un mandato con infinitivo de finalidad ('traer'). 'Dio la orden' reproduce mejor la fuerza directiva sin sobretraducir.
- source_word: בִּטְעֵם חַמְרָא
  english_pob_choice: as he tasted the wine
  chosen_spanish: al probar el vino
  alternatives_spanish:
  - mientras probaba el vino
  - bajo la influencia del vino
  lexicon: HALOT
  rationale: La expresión es literalmente 'en el sabor/prueba del vino'. 'Al probar el vino' conserva la imagen concreta y evita convertir en certeza una posible implicación de embriaguez.
- source_word: לְהַיְתָיָה
  english_pob_choice: to bring
  chosen_spanish: de traer
  alternatives_spanish:
  - de hacer traer
  - de llevar
  lexicon: HALOT
  rationale: La idea es hacer que los vasos sean traídos. En español, 'de traer' encaja naturalmente tras 'dio la orden' y mantiene la finalidad.
- source_word: מָאנֵי דַּהֲבָא וְכַסְפָּא
  english_pob_choice: the vessels of gold and silver
  chosen_spanish: los vasos de oro y de plata
  alternatives_spanish:
  - los recipientes de oro y de plata
  - los utensilios de oro y de plata
  lexicon: HALOT
  rationale: מָאנֵי es un término amplio para vasijas o utensilios; en este contexto del templo y del beber, 'vasos' es una opción natural en español y no restringe indebidamente el sentido.
- source_word: הַנְפֵּק
  english_pob_choice: had taken out
  chosen_spanish: había sacado
  alternatives_spanish:
  - había sacado fuera
  - había retirado
  lexicon: HALOT
  rationale: El verbo indica sacar fuera. 'Había sacado' es la forma más directa y fiel para el saqueo de los objetos del templo.
- source_word: אֲבוּהִי
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - su predecesor
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del texto. La posible ampliación a 'antepasado' o 'predecesor' se deja para nota, como en el audit trail inglés.
- source_word: הֵיכְלָא
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el palacio-templo
  lexicon: HALOT
  rationale: En referencia a Jerusalén, 'templo' es la traducción clara y exacta.
- source_word: וְיִשְׁתּוֹן בְּהוֹן
  english_pob_choice: might drink from them
  chosen_spanish: bebieran de ellos
  alternatives_spanish:
  - bebiesen de ellos
  - pudieran beber de ellos
  lexicon: HALOT
  rationale: 'El imperfecto expresa finalidad: que bebieran de ellos. ''Bebieran de ellos'' suena natural y mantiene el valor volitivo/purpose.'
- source_word: רַבְרְבָנוֹהִי
  english_pob_choice: his nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus grandes
  - sus altos funcionarios
  lexicon: HALOT
  rationale: El término apunta a los magnates o altos dignatarios de la corte. 'Nobles' conserva el registro histórico y es comprensible.
- source_word: שֵׁגְלָתֵהּ
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus reinas
  lexicon: HALOT
  rationale: Aunque el término puede abarcar mujeres de estatus real, 'esposas' es la equivalencia más amplia y prudente en español, sin forzar el título de 'reinas'.
- source_word: לְחֵנָתֵהּ
  english_pob_choice: his concubines
  chosen_spanish: sus concubinas
  alternatives_spanish:
  - sus mujeres secundarias
  - sus consortes
  lexicon: HALOT
  rationale: '''Concubinas'' es el equivalente estándar y preciso para una mujer de rango inferior al de esposa en el contexto cortesano.'
theological_decisions:
- issue: Kinship term applied to Nabucodonosor
  english_pob_reading: Retain the literal 'his father' in the main text
  chosen_spanish_reading: Conservar 'su padre' en el texto principal
  alternative_spanish_readings:
  - su antepasado
  - su predecesor
  rationale: La cuestión es histórica e idiomática, no doctrinal. Se mantiene la relación literal del hebreo/arameo en el texto y se deja constancia de la posible amplitud del uso real en nota.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Possible intoxication nuance in 'in the taste of the wine'
  english_pob_reading: Keep the concrete idiom in the main text and avoid stating drunkenness explicitly
  chosen_spanish_reading: Traducir con 'al probar el vino' sin afirmar embriaguez
  alternative_spanish_readings:
  - bajo la influencia del vino
  - cuando ya estaba ebrio
  rationale: El texto permite una implicación contextual, pero la expresión misma es concreta y no obliga a explicitar embriaguez. Se preserva la tensión en la nota.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y ninguna revisión aplicada en la última pasada; por eso no se introducen cambios interpretativos mayores. La versión española conserva la misma estructura semántica, con ajustes naturales de orden y estilo propios del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando aparezca el nombre divino; aquí no está presente.
  - Se evita 'SEÑOR' como sustituto teológico, ya que el verso no contiene el tetragrámaton ni una cita directa del nombre divino.
  - '''Vasos'' se usa por el contexto de objetos cultuales susceptibles de ser usados para beber, sin reducir prematuramente el término a ''copas''.'
  - '''Esposas'' y ''concubinas'' reflejan la distinción social del original sin suavizarla.'
