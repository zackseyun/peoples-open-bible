translation:
  language: es
  text: Porque el oro ha arruinado[a] a muchos, y desvía el corazón de los nobles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece una lectura sustancialmente distinta: «No te burles de un ignorante, para que tus antepasados no sean deshonrados».'
    reason: alternative_reading
  - marker: b
    text: 'También: «de los generosos»; el término hebreo puede denotar nobles, príncipes o personas generosas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - multitudes
  lexicon: HALOT
  rationale: El hebreo funciona como sustantivo/adjetivo plural y se refiere a un número grande de personas; "muchos" es la equivalencia natural y concisa en español.
- source_word: הִפְחִיז
  english_pob_choice: has ruined
  chosen_spanish: ha arruinado
  alternatives_spanish:
  - ha destruido
  - ha vuelto imprudentes
  - ha desviado
  lexicon: HALOT
  rationale: El verbo es difícil y raro. En el contexto del oro como agente dañino, "ha arruinado" comunica el efecto destructivo y moral sin forzar un matiz demasiado técnico.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - el oro
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo hebreo.
- source_word: יַשְׂגֶּה
  english_pob_choice: leads astray
  chosen_spanish: desvía
  alternatives_spanish:
  - extravía
  - hace errar
  - desvía del camino
  lexicon: HALOT
  rationale: El verbo expresa causar extravío o error; "desvía" conserva la idea de apartar del rumbo moral en un español fluido.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: HALOT
  rationale: En antropología hebrea el "corazón" es el centro de pensamiento y deseo. Mantenerlo preserva la imagen fuente y su fuerza sapiencial.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los generosos
  - los príncipes
  lexicon: HALOT
  rationale: El término puede significar nobles, príncipes o personas generosas. En este contexto, la lectura social de "nobles" encaja mejor con la referencia a estatus y riqueza, aunque la ambigüedad se conserva en nota.
theological_decisions:
- issue: Prioridad del hebreo frente a la variante griega sustancialmente diferente
  english_pob_reading: 'Translate the extant Hebrew as the primary text: a warning about gold corrupting many and misleading the heart of nobles.'
  chosen_spanish_reading: 'Traducir como texto principal el hebreo conservado: el oro arruina a muchos y desvía el corazón de los nobles.'
  alternative_spanish_readings:
  - No te burles de un ignorante, para que tus antepasados no sean deshonrados.
  rationale: La política del proyecto da primacía al hebreo conservado en Sirácides cuando está disponible. La griega aquí no es una simple variante verbal sino una línea sustancialmente distinta; por eso se preserva en nota, sin desplazar el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input/check'
translation_notes:
  revision_awareness: No hubo cambios en la última revisión; se mantiene la decisión de traducir el hebreo como texto principal y conservar la divergencia griega en nota.
  spanish_consistency_notes:
  - Se mantuvo "oro" como sujeto principal para seguir el hebreo.
  - Se usó "corazón" en vez de "mente" para conservar la antropología sapiencial hebrea.
  - '"Nobles" se eligió como forma principal, con la alternativa semántica de "generosos" preservada en nota.'
  - La marca [a] queda anclada en la cláusula del texto principal donde aparece la divergencia textual importante; [b] señala la ambigüedad léxica de נְדִיבִים.
