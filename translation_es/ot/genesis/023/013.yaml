    text: Or, more idiomatically, “If only you would listen to me.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “I have given the silver for the field,” with the perfect likely expressing a formal or performative offer in the negotiation; alternatively, “I will give the silver for the field.”
    reason: alternative_reading
