translation:
  language: es
  text: Y el rey de Egipto hizo rey a Joakim, su hermano, de Judea y Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre aparece aquí en griego como «Joakim»; la tradición hebrea paralela suele identificarlo como Jehoiaquim.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέδειξεν
  english_pob_choice: made
  chosen_spanish: hizo rey
  alternatives_spanish:
  - nombró
  - estableció
  - instaló
  lexicon: LSJ
  rationale: El verbo griego expresa la acción de elevar o constituir a alguien en un cargo real. «Hizo rey» conserva con naturalidad ese valor causativo y evita un calco demasiado técnico o burocrático.
- source_word: ὁ βασιλεὺς Αἰγύπτου
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  lexicon: LSJ
  rationale: La construcción posesiva es directa y se expresa con claridad en español mediante «el rey de Egipto», sin añadir matiz étnico que el griego no requiere.
- source_word: Ἰωακεὶμ
  english_pob_choice: Joakim
  chosen_spanish: Joakim
  alternatives_spanish:
  - Joaquim
  - Jehoiaquim
  lexicon: LSJ
  rationale: Se conserva la forma griega del nombre, conforme al texto base de 1 Esdras. La tradición hebrea paralela identifica a la figura con Jehoiaquim, pero esa armonización no gobierna la redacción principal.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: LSJ
  rationale: La relación de parentesco se vierte de manera directa y idiomática; el posesivo español mantiene la referencia pronominal del griego.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  lexicon: LSJ
  rationale: El sustantivo nombra de forma explícita la dignidad real; «rey» es el equivalente natural y preciso en español.
- source_word: τῆς Ἰουδαίας καὶ Ἰερουσαλήμ
  english_pob_choice: over Judea and Jerusalem
  chosen_spanish: sobre Judea y Jerusalén
  alternatives_spanish:
  - de Judea y Jerusalén
  - en Judea y Jerusalén
  lexicon: LSJ
  rationale: «Sobre» comunica el sentido de dominio o gobierno instalado que implica la acción de constituir rey. «De Judea y Jerusalén» sería posible, pero en español puede sonar menos explícito respecto del ejercicio del reinado.
translation_notes:
  revision_awareness: Se siguió el anclaje primario griego de 1 Esdras y se respetó la decisión auditada del POB inglés de conservar la forma griega del nombre propio, sin imponer la forma hebrea del paralelismo masorético.
  spanish_consistency_notes:
  - Se mantiene «Joakim» de forma consistente con el texto griego de 1 Esdras y con la estrategia POB de transliteración desde la fuente primaria.
  - Se usó «Judea» y «Jerusalén» como topónimos estándar en español bíblico, sin introducir formas arcaizantes innecesarias.
  - La estructura verbal «hizo rey» conserva el valor causativo del griego y evita sobreinterpretar el verbo como mera designación administrativa.
