translation:
  language: es
  text: Para el director del coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; la frase hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el músico director
  - Para el maestro de coro
  - Para el líder
  lexicon: HALOT
  rationale: En los sobrescritos de los Salmos, la expresión designa al responsable de la ejecución musical. «Director del coro» comunica bien esa función en español actual y mantiene el marco cultual-musical sin volverlo vago.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: Es el rótulo de género más exacto y reconocido en español para este encabezado. «Salmo» conserva la forma literaria y la terminología bíblica establecida.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición hebrea lamed en los títulos de salmos puede señalar autoría, asociación o dedicación. «De David» preserva esa amplitud sin concretar más de lo que el hebreo exige.
theological_decisions:
- issue: Alcance de la atribución davídica en el sobrescrito
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo permite varias relaciones posibles entre el salmo y David. Mantener «de David» conserva la tensión documental y evita decidir indebidamente entre autoría, dedicación o asociación.
  doctrine_reference: Preservar la ambigüedad textual cuando el original es amplio.
translation_notes:
  revision_awareness: 'El contexto de revisión muestra acuerdo alto y sin cambios, por lo que se mantiene la decisión principal del POB en inglés: un encabezado breve, claro y con la ambigüedad de לְדָוִד preservada en español.'
  spanish_consistency_notes:
  - Se usa «Salmo» como rótulo de género, en línea con el uso bíblico estándar en español.
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino.
  - Se conserva un registro sobrio y litúrgicamente legible, sin añadir información no presente en el sobrescrito.
  - La nota al pie ancla explícitamente la ambigüedad de לְדָוִד, igual que el audit trail inglés.
