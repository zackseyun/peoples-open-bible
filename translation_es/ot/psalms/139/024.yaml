translation:
  language: es
  text: Y mira si hay en mí algún camino dañino[a], y guíame por el camino eterno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algún camino ofensivo»; posiblemente «algún camino idolátrico».
    reason: lexical_alternative
  - marker: b
    text: O «el camino antiguo» o «el camino eterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאֵה
  english_pob_choice: And see
  chosen_spanish: Y mira
  alternatives_spanish:
  - y ve
  - y considera
  lexicon: HALOT
  rationale: El imperativo pide a Dios una acción directa de inspección. «Mira» comunica de forma natural y reverente la idea de examinar, sin perder la brevedad del hebreo.
- source_word: אִם
  english_pob_choice: whether there is any
  chosen_spanish: si hay
  alternatives_spanish:
  - si existe
  - si hubiera
  lexicon: HALOT
  rationale: En este contexto oracional, אִם introduce una pregunta indirecta. En español, «si hay» expresa con naturalidad esa indagación sin volverla mecánica.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - modo de vida
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora conductual y ética de דֶּרֶךְ, y es idiomático en español bíblico y moderno.
- source_word: עֹצֶב
  english_pob_choice: grievous
  chosen_spanish: de dolor
  alternatives_spanish:
  - doloroso
  - dañino
  - aflictivo
  - ofensivo
  lexicon: HALOT
  rationale: El término hebreo es semánticamente difícil y puede abarcar dolor, daño o lo que causa tristeza. «De dolor» mantiene la fuerza experiencial y no estrecha indebidamente el sentido a una sola opción interpretativa.
- source_word: בִּי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - dentro de mí
  lexicon: HALOT
  rationale: La preposición con sufijo primera persona se vierte de forma directa como «en mí», preservando la interioridad del examen divino.
- source_word: וּנְחֵנִי
  english_pob_choice: and lead me
  chosen_spanish: y guíame
  alternatives_spanish:
  - y llévame
  - y condúceme
  lexicon: HALOT
  rationale: נחה admite la idea de guiar/dirigir. «Guíame» funciona bien en español con «camino» y mantiene el tono de petición.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - sobre el camino
  lexicon: HALOT
  rationale: La preposición בְּ con דֶּרֶךְ se expresa naturalmente como «en el camino», manteniendo la imagen de esfera o curso de vida.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - antiguo
  - de siempre
  - perpetuo
  lexicon: HALOT
  rationale: En este cierre sapiencial-oracional, «eterno» comunica bien la permanencia y la orientación duradera del camino, y es una alternativa plenamente legítima al matiz de «antiguo» que la nota inglesa preserva.
theological_decisions:
- issue: Sentido de דֶּרֶךְ עֹצֶב
  english_pob_reading: any grievous way
  chosen_spanish_reading: algún camino de dolor
  alternative_spanish_readings:
  - algún camino dañino
  - algún camino aflictivo
  - algún camino ofensivo
  rationale: La lectura principal conserva la ambigüedad semántica del hebreo sin forzar una glosa doctrinal como «idolátrico». «De dolor» es suficientemente amplio para abarcar lo dañino o aflictivo que el salmista pide a Dios que detecte.
  doctrine_reference: Translation philosophy §3, §5
- issue: Sentido de דֶּרֶךְ עוֹלָם
  english_pob_reading: the everlasting way
  chosen_spanish_reading: el camino eterno
  alternative_spanish_readings:
  - el camino antiguo
  - el camino perpetuo
  rationale: La frase se entiende mejor como un camino duradero y aprobado por Dios, en contraste con el camino dañino. «Eterno» mantiene esa amplitud teológica sin imponer un sentido exclusivamente temporal o meramente arcaico.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase de revisión del POB inglés: no se registraron cambios en la base auditada. La versión española sigue esa misma lectura, conservando la ambigüedad léxica principal de עֹצֶב y el contraste con el camino duradero de עוֹלָם.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - «Camino» se usa de modo consistente para דֶּרֶךְ en ambos miembros del versículo.
  - Se evitó «SEÑOR» y se preservó el tono de súplica directa del hebreo.
  - Las notas al pie conservan la alternativa interpretativa amplia del inglés POB sin estrechar el sentido de עֹצֶב a «idolátrico» en el texto principal.
