  language: Latin
translation:
  text: The seventh way is greater than all the ways mentioned above[a], because they will waste away in confusion and be consumed in horrors and wither in fears, seeing the glory of the Most High, before whom they sinned while they lived[b], and before whom they will begin to be judged in the last times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Several words in this verse are textually rough in the Latin tradition. The sense is clear enough: the wicked undergo the most severe anguish when confronted with the glory of the Most High before whom they sinned.'
    reason: textual_variant
    anchor_ref: 7:87
  - marker: b
    text: 'Or ''The seventh way, greater than all the ways mentioned above: they waste away in confusion and are consumed in shame and wither in fears, because they see the glory of the Most High, before whom they sinned while they lived, and before whom they are to be judged in the last times.''.'
    reason: previous_rendering
