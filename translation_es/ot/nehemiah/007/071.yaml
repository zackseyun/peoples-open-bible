translation:
  language: es
  text: Y lo que dieron el resto del pueblo[a] fue veinte mil dáricos[b] de oro, dos mil minas[c] de plata y sesenta y siete túnicas para los sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el remanente del pueblo dio». Aquí se elige «el resto del pueblo» porque la frase funciona administrativamente para distinguir a la población restante de los donantes ya mencionados, no para hacer un punto teológico sobre un remanente fiel.
    reason: lexical_alternative
  - marker: b
    text: Un dárico era una moneda persa de oro.
    reason: cultural_note
  - marker: c
    text: La mina era una antigua unidad de peso y, por extensión, de valor monetario.
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: And what
  chosen_spanish: Y lo que
  alternatives_spanish:
  - Y aquello que
  - Y lo que dieron
  lexicon: HALOT
  rationale: La construcción relativa resumptiva introduce un nuevo elemento en la lista. «Y lo que» conserva la función administrativa del hebreo sin sobrerretraducirla.
- source_word: נָתְנוּ
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - dieron
  - aportó
  - ofreció
  lexicon: HALOT
  rationale: En español, con sujeto colectivo singular («el resto del pueblo»), el singular verbal es natural y fiel. «Dar» mantiene el sentido simple de aportar sin cargarlo de valor cultual o técnico.
- source_word: שְׁאֵרִית הָעָם
  english_pob_choice: the rest of the people
  chosen_spanish: el resto del pueblo
  alternatives_spanish:
  - el remanente del pueblo
  - los restantes del pueblo
  - el resto del pueblo
  lexicon: HALOT
  rationale: Se sigue la decisión inglesa de un sentido administrativo, no teológico. «Resto» evita convertir automáticamente שְׁאֵרִית en un término de remanente fiel, aunque esa posibilidad exista en otros contextos.
- source_word: זָהָב דַּרְכְּמוֹנִים
  english_pob_choice: gold darics
  chosen_spanish: daricos de oro
  alternatives_spanish:
  - monedas de oro
  - daricos
  - daricos de oro
  lexicon: HALOT
  rationale: «Daricos» preserva la moneda persa específica. El orden español más natural es «daricos de oro»; el oro queda como especificación del material, igual que en el hebreo.
- source_word: שְׁתֵּי רִבּוֹא
  english_pob_choice: twenty thousand
  chosen_spanish: veinte mil
  alternatives_spanish:
  - dos miríadas
  - dos decenas de millares
  lexicon: HALOT
  rationale: La cifra idiomática hebrea se expresa con el número equivalente estándar en español para claridad pública, como en la decisión inglesa.
- source_word: וְכֶסֶף מָנִים אַלְפָּיִם
  english_pob_choice: two thousand minas of silver
  chosen_spanish: dos mil minas de plata
  alternatives_spanish:
  - dos mil manés de plata
  - dos mil minas de plata
  - dos mil unidades de plata
  lexicon: HALOT
  rationale: «Mina» conserva la unidad antigua de peso/valor. El complemento «de plata» sigue al sustantivo para una sintaxis española natural sin perder la relación material.
- source_word: וְכָתְנֹת כֹּהֲנִים
  english_pob_choice: priests’ tunics
  chosen_spanish: túnicas de sacerdotes
  alternatives_spanish:
  - túnicas sacerdotales
  - vestiduras de sacerdotes
  - túnicas de los sacerdotes
  lexicon: HALOT
  rationale: «Túnicas» refleja כָּתְנֹת con precisión. Se evita «sacerdotales» porque puede sonar más litúrgico o técnico de lo que el inventario exige.
- source_word: שִׁשִּׁים וְשִׁבְעָה
  english_pob_choice: sixty-seven
  chosen_spanish: sesenta y siete
  alternatives_spanish:
  - sesenta y siete
  - sesenta y siete en total
  lexicon: HALOT
  rationale: Número cardinal estándar en español, sin necesidad de calco semítico.
theological_decisions:
- issue: שְׁאֵרִית הָעָם como posible 'remanente' con carga teológica
  english_pob_reading: the rest of the people
  chosen_spanish_reading: el resto del pueblo
  alternative_spanish_readings:
  - el remanente del pueblo
  - la porción remanente del pueblo
  rationale: En este contexto de registro de ofrendas, el término distingue a quienes aún no habían sido nombrados. Mantener «resto» evita introducir una lectura teológica de remanente fiel que el contexto inmediato no exige.
  doctrine_reference: Nehemías 7:71; uso contextual de שְׁאֵרִית en listas administrativas
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje fuente; la presente redacción sigue de cerca el texto hebreo y la decisión auditada en inglés, manteniendo el mismo criterio de precisión histórica y neutralidad contextual.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término base del proyecto, pero este versículo no lo contiene.
  - Se usa «daricos» para la moneda persa específica, en paralelo a la decisión inglesa de conservar el término técnico.
  - Se evita «remanente» en el texto principal para no cargar administrativamente el sintagma con un matiz teológico no requerido por el contexto.
  - La sintaxis española prioriza claridad pública sin diluir las unidades antiguas de medida y moneda.
