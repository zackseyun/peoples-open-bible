translation:
  language: es
  text: Pero fueron persuadidos contra ellos con aún mayor dureza[a], bajo la acusación de que habían sido sobornados como parte de un plan de fuga, y claramente ocurrió que él quedó convencido de esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene una sintaxis comprimida y algo áspera aquí; la cláusula final también puede traducirse: «y ocurrió claramente que él fue convencido de esto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείσθησαν
  english_pob_choice: they were persuaded
  chosen_spanish: fueron persuadidos
  alternatives_spanish:
  - fueron convencidos
  - fueron ganados
  lexicon: LSJ
  rationale: El pasivo de πείθω se conserva mejor con «fueron persuadidos», manteniendo la voz pasiva y la ambigüedad sobre el agente de la persuasión.
- source_word: αὐτοῖς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - por ellos
  - con ellos
  lexicon: LSJ
  rationale: En el contexto adverso, el dativo expresa el bando perjudicado o la postura tomada en su contra; «contra ellos» comunica esa fuerza judicial/política.
- source_word: σκληρότερον
  english_pob_choice: all the more harshly
  chosen_spanish: con aún mayor dureza
  alternatives_spanish:
  - más severamente
  - más cruelmente
  lexicon: LSJ
  rationale: El comparativo se refleja con «aún mayor» y el matiz de σκληρός con «dureza», opción natural en español sin perder el tono severo.
- source_word: δεδωροκημένοις
  english_pob_choice: they had been bribed
  chosen_spanish: habían sido sobornados
  alternatives_spanish:
  - habían recibido sobornos
  - habían sido corrompidos con regalos
  lexicon: LSJ
  rationale: El participio perfecto pasivo de lenguaje de soborno se expresa de forma directa con «sobornados», conservando la acusación pasiva.
- source_word: εἰς μηχανὴν τῆς ἐκφυγῆς
  english_pob_choice: as part of a scheme for escape
  chosen_spanish: como parte de un plan de fuga
  alternatives_spanish:
  - para una estratagema de escape
  - para una conspiración de fuga
  lexicon: LSJ
  rationale: μηχανή tiene el valor de plan/estratagema; «plan de fuga» es idiomático en español y mantiene el sentido acusatorio sin exagerarlo.
- source_word: συνεβῆ
  english_pob_choice: it clearly happened
  chosen_spanish: claramente ocurrió
  alternatives_spanish:
  - resultó
  - aconteció
  lexicon: LSJ
  rationale: Se conserva el giro impersonal y algo abrupto del griego con «ocurrió», evitando una paráfrasis más fluida que ocultaría la sintaxis comprimida.
- source_word: σαφῶς
  english_pob_choice: clearly
  chosen_spanish: claramente
  alternatives_spanish:
  - evidentemente
  - sin duda
  lexicon: LSJ
  rationale: Adverbio de claridad intelectual o factual; «claramente» es el equivalente más directo y sobrio.
- source_word: πιστωθῆναι
  english_pob_choice: he was convinced
  chosen_spanish: quedó convencido
  alternatives_spanish:
  - fue convencido
  - llegó a convencerse
  lexicon: LSJ
  rationale: El infinitivo pasivo se vierte con un resultado estado-orientado en español, «quedó convencido», que mantiene la pasividad y la consecuencia de aceptar la acusación.
theological_decisions:
- issue: Construcción griega comprimida y sujeto implícito en la cláusula final
  english_pob_reading: and it clearly happened that he was convinced of this
  chosen_spanish_reading: y claramente ocurrió que él quedó convencido de esto
  alternative_spanish_readings:
  - y resultó claramente que él fue convencido de esto
  - y claramente se vio que él quedó convencido de esto
  rationale: El griego es sintácticamente apretado y algo áspero. Se mantiene esa aspereza sin suavizarla excesivamente, y se conserva la posibilidad de que la clausula final describa un resultado perceptible más que una simple acción mental.
  doctrine_reference: N/A; cuestión sintáctico-semántica del texto
- issue: Valor adversativo del dativo αὐτοῖς
  english_pob_reading: against them
  chosen_spanish_reading: contra ellos
  alternative_spanish_readings:
  - para ellos
  - por ellos
  rationale: La POB inglesa resalta el valor adverso; el español «contra ellos» preserva la fuerza de la imputación y evita neutralizar el conflicto implícito.
  doctrine_reference: N/A; cuestión léxico-contextual
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail en la cláusula final, favoreciendo «convencido de esto»/«quedó convencido de esto» frente a opciones menos naturales como «convencido acerca de esto». También se mantiene la lectura acusatoria de «contra ellos» y el tono severo de «con aún mayor dureza» conforme al análisis léxico inglés.
  spanish_consistency_notes:
  - Se usa «sobornados» para el campo semántico de δωροδοκέω, en lugar de «corrupción» más vaga.
  - Se conserva el registro sobrio y jurídico con «contra ellos» para el dativo adversativo.
  - No se introduce terminología eclesiástica ajena al contexto histórico del libro.
  - La nota al pie marca la alternativa sintáctica real del griego sin añadir interpretaciones doctrinales.
