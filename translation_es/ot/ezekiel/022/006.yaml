translation:
  language: es
  text: Mira, los príncipes de Israel en ti, cada uno según su poder[a], estaban en ti para derramar sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cada uno según su brazo». Aquí «brazo» es un modismo hebreo para fuerza o poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira[a]!,
  alternatives_spanish:
  - ¡Mira!
  - ¡Mira, pues!
  - ¡Atiende!
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. En español, «Mira» conserva bien la fuerza deíctica y la naturalidad, sin cargar con el tono más arcaico de «He aquí».
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: the princes of Israel
  chosen_spanish: los príncipes de Israel
  alternatives_spanish:
  - los líderes de Israel
  - los jefes de Israel
  lexicon: HALOT
  rationale: נָשִׂיא puede significar jefe o príncipe; en este contexto profético de denuncia a las élites gobernantes, «príncipes» preserva el rango político y la fuerza tradicional del término.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: Aquí la palabra funciona distributivamente con la frase siguiente. «Cada uno» expresa naturalmente esa distribución en español sin añadir una glosa innecesaria.
- source_word: לִזְרֹעוֹ
  english_pob_choice: according to his power
  chosen_spanish: según su brazo
  alternatives_spanish:
  - según su fuerza
  - según su poder
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para/según su brazo». Como el propio audit trail reconoce el idiomatismo de «brazo» para fuerza o poder, se conserva la imagen corporal en el texto principal. Esto evita perder la tensión lexical del original; la equivalencia interpretativa de «según su poder» queda implícita por el modismo bíblico y puede explicarse en nota.
- source_word: הָיוּ בָךְ
  english_pob_choice: were in you
  chosen_spanish: estaban en ti
  alternatives_spanish:
  - estuvieron en ti
  - han estado en ti
  lexicon: HALOT
  rationale: La forma expresa presencia en la ciudad/persona femenina singular interpelada. «Estaban en ti» mantiene la localización directa y el tiempo narrativo sin sobreinterpretar aspecto perfectivo como duración continua.
- source_word: לְמַעַן שְׁפָךְ דָּם
  english_pob_choice: to shed blood
  chosen_spanish: para derramar sangre
  alternatives_spanish:
  - con el fin de derramar sangre
  - a fin de derramar sangre
  lexicon: HALOT
  rationale: La construcción final expresa propósito culpable. «Para derramar sangre» comunica el valor final sin añadir una intensificación interpretativa como «empeñados en». «Derramar sangre» es la expresión idiomática natural en español para שְׁפָךְ דָּם.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  - homicidio
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto «sangre» para conservar la imaginería hebrea. El contexto de violencia judicial/política lo hace inequívocamente sangriento sin necesidad de abstraerlo a «homicidio».
theological_decisions:
- issue: Cómo reflejar la acusación contra la élite gobernante sin suavizarla
  english_pob_reading: the princes of Israel ... were in you to shed blood
  chosen_spanish_reading: los príncipes de Israel ... estaban en ti para derramar sangre
  alternative_spanish_readings:
  - los príncipes de Israel ... estaban en ti, dispuestos a derramar sangre
  - los príncipes de Israel ... venían a derramar sangre
  rationale: El hebreo presenta una presencia activa con propósito criminal. La redacción elegida conserva esa imputación sin introducir una psicologización adicional que no está en el texto.
  doctrine_reference: Ética profética / responsabilidad de los gobernantes
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una revisión que prefirió un enunciado más literal: de una formulación interpretativa («bent on shedding blood») a «were in you to shed blood». Esta propuesta española sigue esa dirección de mayor literalidad, pero conserva el modismo hebreo de «brazo» en el texto principal para no borrar la imagen fuente. También evita sustituir «príncipes» por «líderes», pues el audit trail justifica el matiz político del término.'
  spanish_consistency_notes:
  - Se usa «príncipes» de forma consistente con el registro profético y con el valor político de נְשִׂיאִים.
  - Se conserva «sangre» en vez de «derramamiento de sangre» para reproducir el sustantivo concreto del hebreo.
  - El vocativo inicial se adapta a un español natural con signo de admiración inicial; el marcador [a] queda unido a «Mira» porque la nota explica el modismo de «brazo».
