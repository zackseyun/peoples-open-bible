translation:
  language: es
  text: Pero en el séptimo año la dejarás reposar y la abandonarás[a], para que coman los pobres de tu pueblo; y lo que ellos dejen, lo comerán los animales del campo[b]. Lo mismo harás con tu viña y con tus olivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la soltarás y la abandonarás’; los verbos hebreos subrayan que se suspende el cultivo normal y se deja la tierra sin labranza en el séptimo año.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘la bestia del campo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁבִיעִת
  english_pob_choice: But in the seventh year
  chosen_spanish: Pero en el séptimo año
  alternatives_spanish:
  - Y en el séptimo año
  lexicon: HALOT
  rationale: La frase introduce un contraste temporal con los seis años anteriores; en español, «pero» conserva ese contraste de manera natural y «en el séptimo año» expresa el valor adverbial del ordinal.
- source_word: תִּשְׁמְטֶנָּה
  english_pob_choice: you shall let it rest
  chosen_spanish: lo dejarás reposar
  alternatives_spanish:
  - lo soltarás
  - lo dejarás descansar
  lexicon: HALOT
  rationale: El verbo apunta al cese del cultivo normal en el año sabático. «Dejará reposar» comunica bien la idea agrícola sin sonar técnico ni forzar un abandono absoluto.
- source_word: וּנְטַשְׁתָּהּ
  english_pob_choice: and abandon it
  chosen_spanish: y lo abandonarás
  alternatives_spanish:
  - y lo dejarás
  - y lo dejarás yacer en barbecho
  lexicon: HALOT
  rationale: El segundo verbo añade con fuerza la idea de dejar el terreno sin uso ordinario. «Abandonarás» conserva esa fuerza, siguiendo la lectura auditada del POB en inglés, aunque en español suena más tajante que «dejarás».
- source_word: אֶבְיֹנֵי עַמֶּךָ
  english_pob_choice: the poor of your people
  chosen_spanish: los pobres de tu pueblo
  alternatives_spanish:
  - los necesitados de tu pueblo
  lexicon: HALOT
  rationale: אֶבְיֹן designa a los pobres o necesitados. «Pobres» es la forma más directa y natural en español; mantiene el vínculo comunitario de «tu pueblo».
- source_word: וְיִתְרָם
  english_pob_choice: what they leave
  chosen_spanish: lo que ellos dejen
  alternatives_spanish:
  - su resto
  - lo que quede
  lexicon: HALOT
  rationale: El sufijo plural apunta a lo que quede después de que coman los pobres. «Lo que ellos dejen» hace explícita la referencia y sigue de cerca la lógica del texto.
- source_word: תֹּאכַל חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field may eat
  chosen_spanish: lo comerán los animales del campo
  alternatives_spanish:
  - lo comerán las fieras del campo
  - lo comerán los animales salvajes del campo
  lexicon: HALOT
  rationale: «חַיַּת הַשָּׂדֶה» es una expresión idiomática para los animales salvajes. «Animales del campo» conserva el paralelismo y evita un calco demasiado duro; el verbo en futuro expresa la consecuencia permitida por la disposición legal.
- source_word: כֵּן תַּעֲשֶׂה
  english_pob_choice: You shall do the same
  chosen_spanish: Lo mismo harás
  alternatives_spanish:
  - Así harás
  - Harás lo mismo
  lexicon: HALOT
  rationale: La instrucción aplica la misma norma a lo que sigue. «Lo mismo harás» es una fórmula natural en español jurídico y mantiene la obligatoriedad.
- source_word: לְכַרְמְךָ
  english_pob_choice: with your vineyard
  chosen_spanish: con tu viña
  alternatives_spanish:
  - con tu viñedo
  lexicon: HALOT
  rationale: El término señala la plantación de vides. «Viña» es la opción más bíblica y precisa en español; «viñedo» suena más moderno, pero puede inclinarse hacia el terreno en vez del cultivo.
- source_word: לְזֵיתֶךָ
  english_pob_choice: your olive trees
  chosen_spanish: con tus olivos
  alternatives_spanish:
  - con tus árboles de olivo
  - con tu olivar
  lexicon: HALOT
  rationale: La forma hebrea puede referirse colectivamente a los olivos. «Olivos» conserva la referencia al cultivo sin añadir la noción de plantación colectiva más interpretativa que «olivar».
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión más reciente del POB inglés al preferir un verbo fuerte para וּנְטַשְׁתָּהּ y una expresión agrícola más directa para el término final; al mismo tiempo, ajusta el campo léxico al español natural con «dejar reposar» para תִּשְׁמְטֶנָּה y «olivos» para la colectividad agrícola.
  spanish_consistency_notes:
  - Se mantiene «pobres» para אֶבְיֹן, coherente con el POB inglés y con el registro legal del pasaje.
  - Se conserva el paralelismo entre la tierra en descanso, la alimentación de los pobres y el acceso posterior de los animales del campo.
  - «Con tus olivos» sigue la decisión auditada de traducir el término agrícola de manera colectiva y simple, sin introducir una glosa interpretativa como «olivar» en el texto principal.
