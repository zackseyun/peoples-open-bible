translation:
  language: es
  text: Tenemos una hermana pequeña, y no tiene pechos. ¿Qué haremos por nuestra hermana el día en que sea pedida en matrimonio[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se hable de ella». El hebreo puede referirse de manera general a que se hable acerca de ella, aunque en el contexto probablemente alude a negociaciones matrimoniales.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָחוֹת לָנוּ
  english_pob_choice: We have a little sister
  chosen_spanish: Tenemos una hermana
  alternatives_spanish:
  - Nuestra hermana
  lexicon: HALOT
  rationale: La construcción hebrea expresa pertenencia relacional (‘una hermana para nosotros / tenemos una hermana’). En español, ‘Tenemos una hermana’ comunica de forma natural esa relación sin perder el matiz de posesión familiar.
- source_word: קְטַנָּה
  english_pob_choice: little
  chosen_spanish: pequeña
  alternatives_spanish:
  - joven
  - menor
  lexicon: HALOT
  rationale: El adjetivo puede implicar pequeñez o juventud. ‘Pequeña’ conserva la idea de inmadurez o corta edad sin forzar una precisión que el hebreo no explicita.
- source_word: וְשָׁדַיִם אֵין לָהּ
  english_pob_choice: and she has no breasts
  chosen_spanish: y no tiene pechos
  alternatives_spanish:
  - y no le han crecido los pechos
  - y no tiene busto
  lexicon: HALOT
  rationale: Se mantiene la franqueza concreta del hebreo. ‘No tiene pechos’ es la forma más directa en español y preserva la preocupación por la inmadurez física sin suavizar el sentido.
- source_word: מַה נַּעֲשֶׂה
  english_pob_choice: What shall we do
  chosen_spanish: ¿Qué haremos
  alternatives_spanish:
  - ¿Qué vamos a hacer?
  - ¿Qué debemos hacer?
  lexicon: HALOT
  rationale: La forma interrogativa futura funciona bien en español para expresar deliberación colectiva. Conserva el tono de consejo o planificación del hebreo.
- source_word: לַאֲחֹתֵנוּ
  english_pob_choice: for our sister
  chosen_spanish: por nuestra hermana
  alternatives_spanish:
  - para nuestra hermana
  - sobre nuestra hermana
  lexicon: HALOT
  rationale: Aunque la preposición hebrea admite matices de acción en favor de ella, ‘por’ comunica bien la idea de actuar respecto de su situación. ‘Para’ también sería posible, pero ‘por’ suena más natural con ‘¿Qué haremos?’.
- source_word: בַּיּוֹם
  english_pob_choice: on the day
  chosen_spanish: en el día
  alternatives_spanish:
  - el día en que
  - cuando
  lexicon: HALOT
  rationale: Se conserva la estructura temporal explícita del hebreo. ‘En el día’ mantiene la forma del original; en español, ‘cuando’ aparece a continuación para completar la naturalidad sintáctica.
- source_word: שֶׁיְּדֻבַּר בָּהּ
  english_pob_choice: when she is spoken for
  chosen_spanish: cuando se hable de ella
  alternatives_spanish:
  - cuando sea pedida en matrimonio
  - cuando se trate de ella
  lexicon: HALOT
  rationale: El pasivo hebreo puede significar ‘ser hablado de’ o, en contexto matrimonial, ‘ser pedida en matrimonio / ser solicitada’. El español base retiene la lectura amplia (‘se hable de ella’) sin decidir en exceso, manteniendo la tensión documentada.
theological_decisions:
- issue: 'Ambigüedad del último miembro: discusión general o negociación matrimonial'
  english_pob_reading: The Hebrew may refer generally to discussion concerning her, though in context it likely points to marriage negotiations.
  chosen_spanish_reading: Puede referirse de manera general a que se hable de ella, aunque en contexto probablemente apunta a negociaciones matrimoniales.
  alternative_spanish_readings:
  - cuando sea pedida en matrimonio
  - cuando se hagan arreglos para ella
  rationale: 'La POB inglesa conserva la ambigüedad del hebreo y añade la probabilidad contextual. El español mantiene esa misma tensión: no cierra el sentido solo a matrimonio, pero reconoce que el contexto favorece esa interpretación.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y permanece sin cambios sustanciales; la presente versión española sigue el mismo juicio de alta concordancia y conserva la ambigüedad final documentada en la nota.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene ‘pechos’ por la concreción del hebreo y por coherencia con el tratamiento léxico de POB para términos corporales directos.
  - La nota reproduce la tensión semántica del pasivo hebreo y evita imponer una sola lectura interpretativa.
