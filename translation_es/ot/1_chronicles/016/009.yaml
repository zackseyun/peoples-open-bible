translation:
  language: es
  text: Cántenle; cántenle alabanzas; hablen[a] de todos sus hechos maravillosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuenten todas sus maravillas» o «mediten en todos sus hechos maravillosos». El verbo hebreo puede llevar un matiz hablado o reflexivo, aunque el contexto de exhortación pública favorece aquí un sentido verbal externo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten con gozo
  - Canten salmos
  lexicon: HALOT
  rationale: El imperativo plural de שׁיר pide una acción de cantar. En español, "Canten" es natural, directo y conserva el paralelismo poético con la segunda cola.
- source_word: לֹו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: La preposición ל con sufijo de 3 ms marca dirección o destinatario. "A él" comunica de forma natural el destinatario del canto y la alabanza.
- source_word: זַמְּרוּ
  english_pob_choice: sing praises
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - hagan música
  - salmodien
  lexicon: HALOT
  rationale: זמר en piel suele expresar hacer música o cantar alabanzas. "Canten alabanzas" conserva el valor cultual sin sonar forzado en español, y distingue esta cola de la primera.
- source_word: שִׂיחוּ
  english_pob_choice: speak of
  chosen_spanish: hablen de
  alternatives_spanish:
  - cuenten
  - relaten
  - mediten en
  lexicon: HALOT
  rationale: שׂיח puede ser hablar, recountar o meditar. En este llamado público y seguido de "todos sus hechos maravillosos", el sentido verbal externo es el más probable; "hablen de" lo expresa con naturalidad.
- source_word: בְּכָל
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - acerca de todos
  - en todos
  lexicon: HALOT
  rationale: Aunque la preposición literal es "en/ con", el español idiomático con "hablar" pide "de". "De todos" preserva la fuerza de totalidad de כָּל.
- source_word: נִפְלְאֹתָיו
  english_pob_choice: his wondrous deeds
  chosen_spanish: sus hechos maravillosos
  alternatives_spanish:
  - sus maravillas
  - sus obras maravillosas
  lexicon: HALOT
  rationale: El sustantivo de פלא apunta a actos extraordinarios que provocan asombro. "Hechos maravillosos" mantiene el carácter concreto de obras/actos y la dimensión de maravilla, sin arcaísmo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y el razonamiento léxico del audit trail inglés. No se aplicaron revisiones textuales ni cambios de sentido; se mantuvo el paralelismo imperativo y la referencia a los actos maravillosos de Dios.
  spanish_consistency_notes:
  - Se usa "a él" para el destinatario directo, evitando la mayúscula reverencial como convención no exigida por el texto.
  - '"Canten" repite el verbo en dos miembros para reflejar el paralelismo del hebreo.'
  - '"Hechos maravillosos" conserva la concreción de las acciones divinas y evita reducir נִפְלְאֹתָיו a una abstracción como "maravillas" sin contexto.'
