translation:
  language: es
  text: En el año en que el Tartan[a] vino a Asdod, cuando Sargón, rey de Asiria, lo envió, y combatió contra Asdod y la capturó,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tartan» probablemente es un título asirio, quizá equivalente a «comandante en jefe», más que un nombre personal.
    reason: cultural_note
lexical_decisions:
- source_word: בִּ/שְׁנַ֨ת
  english_pob_choice: In the year that
  chosen_spanish: En el año en que
  alternatives_spanish:
  - En el año cuando
  - En el año de
  lexicon: HALOT
  rationale: La construcción temporal hebrea introduce un marco cronológico. «En el año en que» suena natural en español y conserva el valor circunstancial sin añadir información.
- source_word: תַרְתָּן
  english_pob_choice: the Tartan
  chosen_spanish: el Tartan
  alternatives_spanish:
  - Tartan
  - el comandante en jefe
  lexicon: HALOT
  rationale: Se conserva la transliteración porque el hebreo y el expediente inglés lo tratan como un título asirio probable, no como un nombre propio. El artículo español refleja su valor de cargo.
- source_word: אַשְׁדּוֹדָ/ה
  english_pob_choice: to Ashdod
  chosen_spanish: a Asdod
  alternatives_spanish:
  - hacia Asdod
  lexicon: HALOT
  rationale: La he direccional indica movimiento hacia la ciudad; en español «a Asdod» es la forma más natural y fiel.
- source_word: בִּ/שְׁלֹח אֹת/וֹ
  english_pob_choice: when Sargon king of Assyria sent him
  chosen_spanish: cuando Sargón, rey de Asiria, lo envió
  alternatives_spanish:
  - al enviarlo Sargón, rey de Asiria
  - cuando fue enviado por Sargón, rey de Asiria
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa contemporaneidad circunstancial. En español se puede explicitar el sujeto como en el expediente inglés para aclarar la sintaxis sin alterar el sentido.
- source_word: סַֽרְג֖וֹן
  english_pob_choice: Sargon
  chosen_spanish: Sargón
  alternatives_spanish:
  - Sargon
  lexicon: HALOT
  rationale: Se usa la transliteración tradicional en español para el nombre real, con acento gráfico conforme a la ortografía española.
- source_word: מֶ֣לֶךְ אַשּׁ֑וּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa identifica a Sargón como gobernante. «Rey de Asiria» es la equivalencia natural y precisa en español.
- source_word: וַ/יִּלָּ֥חֶם בְּ/אַשְׁדּ֖וֹד
  english_pob_choice: and he fought against Ashdod
  chosen_spanish: y peleó contra Asdod
  alternatives_spanish:
  - y combatió contra Asdod
  - y hizo guerra contra Asdod
  lexicon: HALOT
  rationale: לָחַם con ב expresa combatir contra una ciudad. «Peleó contra» transmite bien el sentido militar de forma clara y moderna.
- source_word: וַֽ/יִּלְכְּדָֽ/הּ
  english_pob_choice: and captured it
  chosen_spanish: y la capturó
  alternatives_spanish:
  - y la tomó
  - y la conquistó
  lexicon: HALOT
  rationale: 'לָכַד en contexto militar significa capturar una ciudad. Se conserva el femenino pronominal refiriéndose a Asdod, «la». '
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el expediente inglés: conserva la secuencia temporal, el título asirio transliterado y el verbo militar final, sin suavizar el valor de captura. No se registran revisiones previas que alteren el sentido.'
  spanish_consistency_notes:
  - Se usa «Asdod» de manera consistente para la ciudad.
  - Se usa «Sargón» con acento español y «Asiria» como forma usual en español.
  - Se mantiene el pronombre femenino «la» para referirse a Asdod, en concordancia con el sustantivo implícito de ciudad.
