translation:
  language: es
  text: En todo lugar los ojos de Yahvé observan a los malos y a los buenos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל מָקוֹם
  english_pob_choice: In every place
  chosen_spanish: En todo lugar
  alternatives_spanish:
  - En todas partes
  - En cada lugar
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y locativa; «En todo lugar» mantiene esa amplitud sin volverla demasiado interpretativa. «En todas partes» sería más idiomático, pero «en todo lugar» refleja mejor la construcción del hebreo y su paralelismo conciso.
- source_word: עֵינֵי יְהוָה
  english_pob_choice: the eyes of Yahweh
  chosen_spanish: los ojos de Yahvé
  alternatives_spanish:
  - los ojos de Yahweh
  - los ojos del Señor
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de «ojos» y la relación constructa sin convertirla en una paráfrasis. Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: צֹפוֹת
  english_pob_choice: watch over
  chosen_spanish: vigilan
  alternatives_spanish:
  - observan
  - están vigilando
  - velan
  lexicon: HALOT
  rationale: El participio expresa acción continua. «Vigilan» es natural en español y conserva tanto la vigilancia continua como la idea de observación atenta sin añadir la noción de protección que «velan» podría sugerir.
- source_word: רָעִים וְטוֹבִים
  english_pob_choice: the evil and the good
  chosen_spanish: a los malos y a los buenos
  alternatives_spanish:
  - a los malos y a los justos
  - a los perversos y a los buenos
  - a los malos y a los rectos
  lexicon: HALOT
  rationale: Los adjetivos funcionan sustantivados y se refieren a personas. «A los malos y a los buenos» mantiene la brevedad sapiencial y evita suavizar el contraste léxico de רָעִים con una traducción más moralizante como «malvados» o más eclesial como «justos».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Según la norma del proyecto, en español se translitera como «Yahvé» para preservar el nombre personal del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado pasó de «are watching» a «watch over» para hacer más natural צֹפוֹת; en español se optó por «vigilan», que conserva la continuidad verbal sin sobrecargar el verso con una perífrasis menos concisa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el criterio general del proyecto para el nombre divino.
  - Se evita «justos» porque el hebreo contrasta «malos» y «buenos», no necesariamente un lenguaje técnico de justicia forense.
  - La nota al pie marca la alternativa tradicional «el SEÑOR» solo como dato de traducción histórica, no como texto principal.
