translation:
  language: es
  text: No respondas al necio conforme a su necedad[a][b], para que no tú también llegues a ser como él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de manera necia». La expresión hebrea «conforme a su necedad» puede referirse a responder de una manera que imite la necedad del necio.'
    reason: lexical_alternative
  - marker: b
    text: 'Proverbios 26:5 da la instrucción complementaria: «Responde al necio conforme a su necedad». Juntos, los dos dichos enseñan sabiduría situacional, no contradicción.'
    reason: cross_reference
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - Nunca
  lexicon: HALOT
  rationale: אַל introduce una prohibición; en español, «No» expresa de forma natural y fiel la orden negativa sin añadir énfasis ajeno al hebreo.
- source_word: תַּעַן
  english_pob_choice: answer
  chosen_spanish: respondas
  alternatives_spanish:
  - contestes
  - respondas a
  lexicon: HALOT
  rationale: ענה aquí significa contestar o responder a alguien. «Respondas» suena natural en español y mantiene la relación verbal con el proverbio siguiente.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - un necio
  - el tonto
  lexicon: HALOT
  rationale: כְּסִיל es el término sapiencial para una persona moralmente obstinada. «Nececio» conserva mejor ese matiz que opciones más coloquiales como «tonto».
- source_word: כְאִוַּלְתּוֹ
  english_pob_choice: according to his folly
  chosen_spanish: conforme a su necedad
  alternatives_spanish:
  - según su necedad
  - de acuerdo con su necedad
  - en un modo necio
  lexicon: HALOT
  rationale: El prefijo כ expresa correspondencia. «Conforme a su necedad» mantiene esa relación de ajuste o correspondencia sin resolver la tensión interpretativa entre «modo» y «respuesta merecida».
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: פֶּן introduce un resultado negativo a evitar. En español, «para que no» comunica con claridad el propósito preventivo y evita el arcaísmo de «no sea que».
- source_word: תִּשְׁוֶה
  english_pob_choice: you become like
  chosen_spanish: llegues a ser como
  alternatives_spanish:
  - te vuelvas como
  - llegues a parecerte a
  lexicon: HALOT
  rationale: El verbo שוה comunica hacerse igual o semejante. «Llegues a ser como» expresa con naturalidad el peligro de una semejanza moral gradual.
- source_word: לּוֹ
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - a él
  - como él
  lexicon: HALOT
  rationale: Con שוה, el complemento marca el referente de comparación. «Como él» es la forma más natural en español y preserva la comparación personal.
- source_word: גַם אָתָּה
  english_pob_choice: you also
  chosen_spanish: también tú
  alternatives_spanish:
  - tú también
  - incluso tú
  lexicon: HALOT
  rationale: La partícula intensiva añade que el destinatario podría entrar en la misma condición. «También tú» mantiene ese énfasis de inclusión y advertencia.
theological_decisions:
- issue: Tensión interpretativa con Proverbios 26:5
  english_pob_reading: Retain the literal tension by rendering 'according to his folly' without interpretive smoothing.
  chosen_spanish_reading: Mantener la tensión literal con «conforme a su necedad» sin suavizarla hacia un sentido único.
  alternative_spanish_readings:
  - responderle como su necedad merece
  - responder en un modo necio
  rationale: Los dos proverbios se presentan como instrucción situacional y deliberadamente paradójica. La traducción no debe resolver de antemano si la frase apunta al modo de responder o a una correspondencia con la necedad del interlocutor; esa tensión se conserva para que 26:5 funcione como complemento real.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje presenta una alta coincidencia con el audit trail inglés y no requiere cambios de revisión adicionales; se conserva la tensión proverbiale entre 26:4 y 26:5 sin armonización explicativa en el texto principal.
  spanish_consistency_notes:
  - Se conserva «necio» para כְּסִיל, coherente con el registro sapiencial.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - La relación comparativa de כְאִוַּלְתּוֹ se mantiene con «conforme a su necedad», sin reducirla a un simple juicio de merecimiento.
