  text: וַ/יֵּ֨ט מֹשֶׁ֣ה אֶת מַטֵּ/הוּ֮ עַל הַ/שָּׁמַיִם֒ וַֽ/יהוָ֗ה נָתַ֤ן קֹלֹת֙ וּ/בָרָ֔ד וַ/תִּ֥הֲלַךְ אֵ֖שׁ אָ֑רְצָ/ה וַ/יַּמְטֵ֧ר יְהוָ֛ה בָּרָ֖ד עַל אֶ֥רֶץ מִצְרָֽיִם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/009/023.yaml
  text: So Moses stretched out his staff toward the sky[a], and Yahweh sent thunder and hail, and fire came down to the earth. And Yahweh rained hail on the land of Egypt.
  footnotes:
