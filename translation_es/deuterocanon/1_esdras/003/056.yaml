  text: Y entonces el rey y los nobles se miraron unos a otros, y él comenzó a hablar acerca de la verdad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μεγιστᾶνες
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - grandes
  - magnates
  - príncipes
  lexicon: LSJ
  rationale: El término se refiere a altos dignatarios o cortesanos de rango elevado. «Nobles» es natural en español moderno y conserva bien el marco real de la escena sin volverla demasiado técnica o específica.
- source_word: ἔβλεπον εἰς τὸν ἕτερον
  english_pob_choice: looked at one another
  chosen_spanish: se miraban el uno al otro
  alternatives_spanish:
  - se miraban unos a otros
  - miraban al otro
  lexicon: LSJ
  rationale: La construcción es recíproca y describe un intercambio de miradas. «Se miraban el uno al otro» expresa con claridad esa reciprocidad en español y mantiene el sentido narrativo del griego.
- source_word: ἤρξατο λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a hablar
  - comenzó a decir
  lexicon: BDAG
  rationale: Es una construcción ingresiva normal. «Comenzó a hablar» conserva el inicio de la acción de manera natural en español y evita una formulación demasiado literal.
- source_word: ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: El artículo griego τῆς apunta a un referente concreto en el debate. «La verdad» conserva ese valor definido mejor que una traducción genérica sin artículo.
