revisions:
- from: Entonces salió el hijo de una mujer israelita[a], y él era hijo de un hombre egipcio, en medio de los hijos de Israel; y en el campamento riñeron[b] el hijo de la mujer israelita y un hombre israelita.
  to: Entonces salió el hijo de una mujer israelita, y él era hijo de un hombre egipcio, en medio de los hijos de Israel[a]; y en el campamento pelearon[b] el hijo de la mujer israelita y un hombre israelita.
  rationale: Se reubica la nota [a] para que corresponda a la frase correcta del hebreo, y se cambia «riñeron» por «pelearon» para reflejar mejor la elección principal documentada en el POB inglés y el contexto narrativo. Las notas se ajustan para que las alternativas y sus anclajes coincidan exactamente con el texto revisado.
