lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica como esta, בֶּן expresa filiación directa dentro de la lista. En español, «hijo de» es la forma más transparente y natural para reproducir ese patrón sin introducir un matiz más amplio de ascendencia que el hebreo de este verso no exige.
- source_word: תַּחַת
  english_pob_choice: Tahath
  chosen_spanish: Tahat
  alternatives_spanish:
  - Tahat
  lexicon: nombre propio transliterado
  rationale: Es nombre propio. Se conserva en transliteración. En español conviene adaptar mínimamente la grafía al uso fonético habitual, manteniendo la forma reconocible del nombre.
- source_word: אַסִּיר
  english_pob_choice: Assir
  chosen_spanish: Asir
  alternatives_spanish:
  - Assir
  lexicon: nombre propio transliterado
  rationale: Nombre propio; se translitera. Se prefiere «Asir» para evitar una duplicación consonántica no necesaria en español y conservar una lectura fluida, sin alterar la identificación del nombre.
- source_word: אֶבְיָסָף
  english_pob_choice: Ebiasaph
  chosen_spanish: Ebiasaf
  alternatives_spanish:
  - Abiasaf
  - Ebiasaph
  lexicon: nombre propio transliterado
  rationale: Nombre propio; se translitera desde el hebreo. Se elige «Ebiasaf» porque refleja de cerca la forma hebrea y evita la variante inglesa «Abiasaph», que no corresponde al auditable punto de partida. La -f final se adapta a la ortografía española común para ese sonido.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: nombre propio transliterado
  rationale: Nombre propio. En español bíblico, «Coré» es una forma tradicional y claramente identificable; además, mantiene una pronunciación natural en lectura pública.
