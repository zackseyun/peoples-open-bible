- from: ¿Quién puso sus medidas[a], si tú sabes, o quién extendió sobre ella un cordel?
  to: ¿Quién puso sus medidas, si lo sabes, o quién extendió sobre ella un cordel[a]?
  rationale: Se conserva la estructura y el sentido del hebreo, pero se corrige la nota para alinearla con la alternativa léxica documentada para קָּו y se mejora la naturalidad de «si tú sabes» a «si lo sabes».
