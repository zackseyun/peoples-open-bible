translation:
  language: es
  text: Cuando se haya puesto el sol, quedará limpio; y después podrá comer de las cosas santas[a], porque es su alimento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las ofrendas sagradas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «porque es su pan». Aquí «pan» significa su alimento asignado de las porciones sagradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא הַשֶּׁמֶשׁ
  english_pob_choice: When the sun has set
  chosen_spanish: Cuando se haya puesto el sol
  alternatives_spanish:
  - y entre el sol
  - cuando el sol se ponga
  - cuando el sol haya bajado
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «viene» o «entra» el sol, un giro idiomático que en español se expresa con naturalidad como puesta del sol. «Se haya puesto» conserva el valor temporal y el sentido ritual del original sin sonar forzado.
- source_word: וְטָהֵר
  english_pob_choice: he will be clean
  chosen_spanish: quedará limpio
  alternatives_spanish:
  - será limpio
  - quedará puro ritual
  - estará limpio
  lexicon: HALOT
  rationale: En este contexto levítico se trata de limpieza ritual, no de pureza moral. «Quedará limpio» transmite el estado resultante tras la puesta del sol y evita una formulación más abstracta o moralizante.
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  - entonces
  lexicon: HALOT
  rationale: La partícula marca secuencia legal. «Y después» mantiene el orden procedimental de la norma con español claro y sobrio.
- source_word: יֹאכַל
  english_pob_choice: he may eat
  chosen_spanish: podrá comer
  alternatives_spanish:
  - podrá comer de
  - comerá
  - tendrá permiso de comer
  lexicon: HALOT
  rationale: El imperfecto en contexto legal expresa autorización. «Podrá comer» comunica permiso de manera natural en español y preserva el valor normativo.
- source_word: מִן הַקֳּדָשִׁים
  english_pob_choice: from the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - de los cosas santas
  - de las ofrendas santas
  - de las cosas consagradas
  lexicon: HALOT
  rationale: «הַקֳּדָשִׁים» designa las porciones sagradas. «Cosas santas» sigue de cerca la forma del hebreo y mantiene la amplitud referencial; «ofrendas santas» sería más interpretativo.
- source_word: כִּי לַחְמ֖וֹ הֽוּא
  english_pob_choice: because it is his food
  chosen_spanish: porque es su alimento
  alternatives_spanish:
  - porque es su pan
  - porque esto es su alimento
  - pues es su comida
  lexicon: HALOT
  rationale: Aunque לֶחֶם significa literalmente «pan», aquí funciona como alimento/provisión asignada. «Alimento» preserva la idea sin estrecharla al pan literal. Mantener el singular «es» refleja el hebreo y la revisión auditada del POB.
theological_decisions:
- issue: Naturaleza de la pureza en la ley levítica
  english_pob_reading: ritual cleanness rather than moral purity
  chosen_spanish_reading: limpieza ritual, no pureza moral
  alternative_spanish_readings:
  - pureza moral
  - pureza espiritual
  - limpieza ceremonial
  rationale: 'En Levítico 22 el contraste es cultual: acceso a lo sagrado después de la puesta del sol. «Limpio» se deja en un registro sencillo y bíblico, pero la nota de decisión aclara que la referencia es ritual y no ética.'
  doctrine_reference: Levítico 22; pureza ritual sacerdotal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB, especialmente la corrección de la referencia al alimento en singular («es su alimento»), y se mantuvo la relación causal del hebreo con una formulación natural en español. También se conservó la tensión léxica entre la expresión idiomática del hebreo para la puesta del sol y su equivalente español idiomático.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparece en el texto base; este versículo no lo contiene.
  - Se prefirió «limpio» en vez de «puro» para no moralizar la categoría levítica.
  - Se mantuvo «cosas santas» como equivalente directo de las porciones sagradas, con nota alternativa para «ofrendas sagradas».
  - Se eligió el singular «es su alimento» conforme al sustantivo hebreo singular, aunque el referente sea colectivo en contexto.
