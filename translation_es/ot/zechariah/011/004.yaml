translation:
  language: es
  text: 'Así dice Yahvé mi Dios: Pastorea el rebaño para el degolladero[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rebaño de la matanza», es decir, el rebaño destinado al degolladero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Así pues
  lexicon: HALOT
  rationale: Marca profética estándar que introduce discurso divino directo. «Así» conserva el tono formal y natural en español sin añadir matices no presentes.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en la fórmula profética funciona como presente de proclamación. «Dice» reproduce mejor esa fuerza actual de autoridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo según la terminología POB, en lugar de sustituirlo por un título.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: El sufijo de primera persona singular exige una relación posesiva explícita; «mi Dios» es la forma directa y sobria en español bíblico moderno.
- source_word: רְעֵה
  english_pob_choice: Shepherd
  chosen_spanish: Pastorea
  alternatives_spanish:
  - Apacienta
  - Pastorea como pastor
  lexicon: HALOT
  rationale: El imperativo de רעה puede ser «pastorear / apacentar». «Pastorea» mantiene la imagen pastoral y el valor verbal del mandato mejor que un sustantivo o una expresión más perifrástica.
- source_word: צֹאן
  english_pob_choice: flock
  chosen_spanish: rebaño
  alternatives_spanish:
  - manada
  - flock
  lexicon: HALOT
  rationale: Como colectivo de ovejas, «rebaño» es la equivalencia natural en español y conserva el campo semántico pastoril.
- source_word: הַהֲרֵגָה
  english_pob_choice: for slaughter
  chosen_spanish: para la matanza
  alternatives_spanish:
  - para el sacrificio
  - destinado a la matanza
  lexicon: HALOT
  rationale: La construcción expresa un rebaño asociado con la matanza, sin añadir «marcado» ni otra idea ausente. «Matanza» preserva la fuerza de muerte violenta del sustantivo hebreo.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión doctrinal del POB es preservar el nombre propio de Dios en vez de ocultarlo tras una sustitución tradicional. En español, «Yahvé» es la forma establecida y legible para ese propósito.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación posesiva en «mi Dios»
  english_pob_reading: my God
  chosen_spanish_reading: mi Dios
  alternative_spanish_readings:
  - Dios mío
  - nuestro Dios
  rationale: El hebreo incluye un sufijo de primera persona singular. Mantener «mi Dios» preserva la referencia personal del hablante y evita generalizar el enunciado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de la frase «el rebaño para la matanza»
  english_pob_reading: the flock for slaughter
  chosen_spanish_reading: el rebaño para la matanza
  alternative_spanish_readings:
  - el rebaño destinado a la matanza
  - el rebaño de la matanza
  rationale: El hebreo presenta una expresión nominal concisa que indica destino o relación con la matanza. «Para la matanza» conserva esa sobriedad y evita introducir una pasividad o predestinación más fuerte que la del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El inglés POB pasó de «marked for slaughter» a «for slaughter» para ajustarse más de cerca al hebreo, que no añade la idea de «marcado». La versión española sigue esa revisión y evita igualmente cualquier inserción como «marcado», manteniendo solo la relación directa del rebaño con la matanza.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, en coherencia con el estándar POB.
  - Se usa el presente profético «dice» para אָמַר, siguiendo la convención de proclamación divina.
  - «Pastorea» conserva el imperativo verbal y encaja con la metáfora pastoril del capítulo.
  - La nota al pie ofrece la alternativa semántica necesaria sin ampliar indebidamente el texto principal.
