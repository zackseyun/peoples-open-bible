translation:
  language: es
  text: El camino de Yahvé[a] es un baluarte para los íntegros, pero destrucción para los que hacen el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la manera de actuar de Yahvé' o 'la senda que Yahvé prescribe'; el hebreo puede abarcar ambas ideas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעוֹז
  english_pob_choice: stronghold
  chosen_spanish: baluarte
  alternatives_spanish:
  - refugio
  - fortaleza
  - fortín
  lexicon: HALOT
  rationale: מָעוֹז expresa una imagen concreta de protección y fuerza. 'Baluarte' conserva la metáfora de defensa sin sonar forzado en español; 'refugio' es más suave y 'fortaleza' puede sonar algo más arquitectónico o militar según el contexto.
- source_word: לַתֹּם
  english_pob_choice: to the blameless
  chosen_spanish: para los de íntegro corazón
  alternatives_spanish:
  - para los íntegros
  - para los inocentes
  - para los rectos
  lexicon: HALOT
  rationale: תֹּם denota integridad, plenitud moral o ausencia de culpa. 'De íntegro corazón' comunica esa cualidad ética de manera natural en español y mantiene el valor personal del sustantivo en el proverbio.
- source_word: דֶּרֶךְ יְהוָה
  english_pob_choice: the way of Yahweh
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - la senda de Yahvé
  - el camino de Yahvé
  lexicon: HALOT
  rationale: El sintagma constructo se puede traducir de forma directa y natural como 'el camino de Yahvé'. Aunque puede aludir tanto a la manera de obrar de Yahvé como al camino que él dispone, la expresión en español conserva esa amplitud sin resolverla artificialmente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino propio tal como establece el proyecto: ''Yahvé'', en lugar de sustituirlo por un título o por la forma tradicional ''Jehová''.'
- source_word: וּמְחִתָּה
  english_pob_choice: but destruction
  chosen_spanish: pero destrucción
  alternatives_spanish:
  - pero ruina
  - pero terror
  - y destrucción
  lexicon: HALOT
  rationale: מְחִתָּה puede significar ruina, destrucción o desazón/terror. 'Destrucción' preserva el contraste directo con 'baluarte' y sigue de cerca la opción inglesa del POB.
- source_word: לְפֹעֲלֵי אָוֶן
  english_pob_choice: for those who do evil
  chosen_spanish: para los que hacen el mal
  alternatives_spanish:
  - para los obradores de iniquidad
  - para los malhechores
  - para los que practican maldad
  lexicon: HALOT
  rationale: La frase literalmente habla de quienes 'trabajan/hacen' אָוֶן. 'Los que hacen el mal' mantiene el valor verbal de פֹעֲלֵי con español claro y evita una fórmula demasiado arcaica.
- source_word: אָוֶן
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - iniquidad
  - maldad
  - perversidad
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, daño o conducta torcida. En este contraste sapiencial, 'el mal' es una equivalencia natural y suficientemente amplia en español.
theological_decisions:
- issue: Alcance semántico de 'el camino de Yahvé'
  english_pob_reading: Retain the broader phrase without specifying whether it means the LORD's own way of acting or the way he prescribes for humans.
  chosen_spanish_reading: Mantener la frase sin precisar si alude al modo de obrar de Yahvé o al camino que él establece.
  alternative_spanish_readings:
  - el obrar de Yahvé
  - el camino que Yahvé manda
  rationale: El hebreo permite esa doble referencia y la poesía sapiencial suele aprovecharla. La traducción conserva la ambigüedad teológica sin estrechar el sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés revisado cambió 'for' por 'to' en ambos miembros para reflejar mejor la preposición hebrea. En español, 'para' transmite de forma natural esa relación de destino/beneficio sin forzar la sintaxis y mantiene el paralelismo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de acuerdo con la norma del proyecto para יהוה.
  - Se eligió 'el mal' como equivalente amplio de אָוֶן, evitando especificar 'iniquidad' sin necesidad contextual.
  - '''Baluarte'' conserva la metáfora de protección y funciona con un registro bíblico digno y actual.'
  - La nota textual-teológica conserva la amplitud interpretativa del hebreo respecto de 'el camino de Yahvé'.
