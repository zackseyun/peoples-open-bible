translation:
  language: es
  text: 'Y de la media tribu de Manasés: Aner con sus pastizales, y Bileam[a] con sus pastizales, para el clan de los hijos restantes de Cohat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Bileam; el paralelo en Josué 21:25 lee Ibleam.
    reason: textual_variant
lexical_decisions:
- source_word: וּמִמַּחֲצִית מַטֵּה מְנַשֶּׁה
  english_pob_choice: And from the half-tribe of Manasseh
  chosen_spanish: Y de la media tribu de Manasés
  alternatives_spanish:
  - Y de la mitad de la tribu de Manasés
  - Y de la media tribu de Manasés
  lexicon: HALOT
  rationale: מַחֲצִית expresa 'mitad', pero en contexto tribal la expresión fijada en español es 'media tribu'. Conserva la subdivisión territorial sin forzar una paráfrasis.
- source_word: עָנֵר
  english_pob_choice: Aner
  chosen_spanish: Aner
  alternatives_spanish:
  - Anér
  lexicon: Transliteración propia
  rationale: Nombre propio transliterado de manera directa; no hay base para traducirlo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pasto
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno abierto asociado a la ciudad levítica; 'pastizales' comunica bien la función de terreno de uso común o de pastoreo, manteniendo el valor espacial concreto.
- source_word: בִּלְעָם
  english_pob_choice: Bileam
  chosen_spanish: Bileam
  alternatives_spanish:
  - Ibleam
  lexicon: Transliteración propia
  rationale: Se conserva la forma consonántica hebrea tal como hace la POB inglesa. La variante paralela en Josué 21:25 sugiere 'Ibleam', por lo que se mantiene la tensión textual sin resolverla en el cuerpo principal.
- source_word: לְמִשְׁפַּחַת לִבְנֵי קְהָת הַנּוֹתָרִים
  english_pob_choice: for the clan of the remaining sons of Kohath
  chosen_spanish: para el clan de los hijos restantes de Quet
  alternatives_spanish:
  - para la familia de los restantes hijos de Quet
  - para el clan de los demás hijos de Quet
  lexicon: HALOT
  rationale: מִשְׁפָּחָה se rinde como 'clan' por su sentido de grupo familiar amplio. הַנּוֹתָרִים significa 'los restantes'; 'hijos de Quet' traduce בני קהת con el nombre bíblico en forma española usual 'Quet'.
translation_notes:
  revision_awareness: 'Coincide con el texto fuente y con la revisión más reciente: no se registran cambios aplicados; la redacción mantiene la solución óptima ya verificada por el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí porque el versículo no contiene el tetragrámaton.
  - Se conserva la transliteración de nombres propios y la terminología de herencia territorial en estilo bíblico claro.
  - '''Clan'' se usa de forma consistente para מִשְׁפָּחָה en contextos genealógico-territoriales.'
