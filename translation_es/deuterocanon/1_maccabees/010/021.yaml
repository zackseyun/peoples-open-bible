translation:
  language: es
  text: Y Jonatán se puso la túnica sagrada en el séptimo mes, en el año ciento sesenta, en la fiesta de las Cabañas[a], y reunió fuerzas y fabricó muchas armas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fiesta de los Tabernáculos». El griego se refiere literalmente a la fiesta de la construcción de cabañas o refugios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεδύσατο
  english_pob_choice: put on
  chosen_spanish: se puso
  alternatives_spanish:
  - se vistió con
  - se colocó
  lexicon: LSJ
  rationale: El verbo medio expresa la acción concreta de vestirse o ponerse una prenda. «Se puso» es natural en español y conserva la acción física sin añadir matices ajenos.
- source_word: τὴν ἁγίαν στολήν
  english_pob_choice: the holy robe
  chosen_spanish: la túnica santa
  alternatives_spanish:
  - la sagrada vestidura
  - el santo vestido
  lexicon: LSJ
  rationale: στολή designa una vestidura/robe distinguida; con ἁγίαν señala una prenda consagrada. «Túnica santa» comunica el carácter sagrado sin sobreespecificar más allá del griego.
- source_word: τῷ ἑβδόμῳ μηνί
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: LSJ
  rationale: El dativo de tiempo se expresa de forma idiomática en español con «en». «Mes» corresponde directamente a μηνί.
- source_word: ἔτους ἑξηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred sixtieth year
  chosen_spanish: en el año ciento sesenta
  alternatives_spanish:
  - en el año ciento sesenta y uno
  - del año ciento sesenta
  lexicon: LSJ
  rationale: La construcción ordinal indica el año 160. «Año ciento sesenta» es claro y fiel en español contemporáneo.
- source_word: ἐν ἑορτῇ σκηνοπηγίας
  english_pob_choice: at the feast of Booths
  chosen_spanish: en la fiesta de las Cabañas
  alternatives_spanish:
  - en la fiesta de los Tabernáculos
  - en la fiesta de los refugios
  lexicon: LSJ
  rationale: σκηνοπηγία alude a la fiesta judía de las cabañas/refugios temporales. «Fiesta de las Cabañas» traduce el sentido literal; la alternativa tradicional «Tabernáculos» se conserva como opción conocida, pero el español prioriza la imagen del texto griego.
- source_word: συνήγαγεν δυνάμεις
  english_pob_choice: he gathered forces
  chosen_spanish: reunió fuerzas
  alternatives_spanish:
  - juntó tropas
  - reunió tropas
  lexicon: LSJ
  rationale: δυνάμεις puede significar fuerzas militares. «Reunió fuerzas» mantiene la amplitud del término y su sentido militar en contexto.
- source_word: κατεσκεύασεν ὅπλα πολλά
  english_pob_choice: made many weapons
  chosen_spanish: fabricó muchas armas
  alternatives_spanish:
  - hizo muchas armas
  - preparó muchas armas
  lexicon: LSJ
  rationale: κατασκευάζω aquí significa hacer o fabricar; ὅπλα son armas. «Fabricó» refleja bien la elaboración concreta sin exagerar.
theological_decisions:
- issue: Nombre de la fiesta judía de σκηνοπηγία
  english_pob_reading: feast of Booths, with a footnote noting the traditional feast of Tabernacles and the literal shelter/booth sense
  chosen_spanish_reading: fiesta de las Cabañas, con nota sobre la traducción tradicional «Tabernáculos» y el sentido literal de cabañas/refugios
  alternative_spanish_readings:
  - fiesta de los Tabernáculos
  - fiesta de los refugios temporales
  rationale: 'No es una decisión doctrinal, pero sí terminológica: el griego apunta al carácter concreto de la fiesta mediante la idea de cabañas/booths. En español conviene preservar ese sentido y dejar constancia de la denominación tradicional.'
  doctrine_reference: Terminología festiva judía; no aplica una doctrina cristiana específica.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el control inglés; no se registran revisiones aplicadas en el audit trail. La versión española sigue la misma línea de equivalencia óptima: léxica y sintácticamente cercana al griego, pero con español natural y lectura pública clara.'
  spanish_consistency_notes:
  - Se mantiene «Y Jonathan» siguiendo el nombre propio tal como aparece en la tradición textual del libro.
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Fiesta de las Cabañas» conserva el paralelismo con la imagen griega y evita eclipsar el matiz literal de σκηνοπηγία.
  - «Armas» y «fuerzas» mantienen el tono militar del contexto sin añadir detalles no presentes en el griego.
