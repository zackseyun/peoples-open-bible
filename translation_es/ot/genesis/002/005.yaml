revisions:
- from: Ahora bien, no había todavía arbusto del campo[a] en la tierra, ni había aún planta del campo, porque Yahvé Dios no había hecho llover sobre la tierra, y no había hombre para trabajar la tierra.
  to: Ahora bien, todavía no había en la tierra arbusto del campo[a], ni había brotado aún planta del campo, porque Yahvé Dios no había hecho llover sobre la tierra[b], y no había hombre para trabajar el suelo[c].
  rationale: Se revisa para preservar la distinción semántica entre הָאָרֶץ («tierra») y הָאֲדָמָה («suelo»), recuperar más claramente el valor de יִצְמָח con «había brotado», y mantener en notas las alternativas léxicas relevantes del expediente inglés. Se conserva «Yahvé Dios» conforme a la política del proyecto.
  reviewer_model: gpt-5.4
