translation:
  language: es
  text: Entonces Moisés y Aarón cayeron rostro en tierra delante de toda la asamblea de la congregación de los hijos de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «asamblea de la congregación» conserva dos términos comunitarios relacionados para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - cayeron postrados
  - se postraron
  lexicon: HALOT
  rationale: El verbo básico נפל expresa caída física; en este contexto la caída se entiende por la frase siguiente. «Cayeron» conserva la imagen hebrea sin añadir una interpretación más fuerte de la que exige el texto.
- source_word: עַל־פְּנֵיהֶם
  english_pob_choice: on their faces
  chosen_spanish: sobre sus rostros
  alternatives_spanish:
  - de rostro en tierra
  - postrados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para postración o humildad profunda. «Sobre sus rostros» mantiene la imagen literal y la conexión con el hebreo, de modo transparente para el lector español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: En este contexto indica presencia pública y espacial. «Delante de» suena natural en español y conserva el valor formal de la escena.
- source_word: כָּל
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - la totalidad de
  lexicon: HALOT
  rationale: Con un sustantivo colectivo, «toda» expresa el alcance total de manera natural en español sin perder la fuerza inclusiva del hebreo.
- source_word: קְהַל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - convocación
  lexicon: HALOT
  rationale: קהל designa un cuerpo reunido. «Asamblea» es el equivalente español más claro y establecido en contextos comunitarios y pactales.
- source_word: עֲדַת
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - comunidad
  lexicon: HALOT
  rationale: עֵדָה suele referirse al grupo organizado del pueblo. «Congregación» conserva el segundo término del doblete sin colapsarlo en uno solo, como hace el audit trail en inglés.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hijos de Israel». En español, «hijos de Israel» reproduce la formulación tradicional y mantiene el vínculo con la expresión hebrea sin neutralizarla.
theological_decisions:
- issue: Conservar el doble término comunitario קְהַל עֲדַת en lugar de reducirlo a una sola palabra
  english_pob_reading: Retain both terms as 'assembly of the congregation'
  chosen_spanish_reading: asamblea de la congregación
  alternative_spanish_readings:
  - asamblea de la comunidad
  - congregación reunida
  rationale: El hebreo emplea dos sustantivos relacionados para dar énfasis solemne y público. Mantener ambos términos evita aplanar la estructura y preserva la intensidad del escena.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Traducir בְּנֵי יִשְׂרָאֵל sin neutralizar el masculino explícito del hebreo
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel / los israelitas
  rationale: La forma hebrea es masculina y específica. «Los hijos de Israel» sigue de cerca el original y evita sustituirlo por un término más neutral que no está en el texto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; por eso el borrador mantiene la estructura del hebreo y la solución de doble término comunitario, con una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - Se conserva el doblete comunitario con «asamblea de la congregación», como en el audit trail en inglés.
  - Se traduce בְּנֵי יִשְׂרָאֵל literalmente como «los hijos de Israel», con nota de alternativa.
  - El tono es formal y bíblico, pero con sintaxis española moderna y legible.
