  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia hebrea: preguntar por el bienestar, dar pan y tomar/recibir de su mano. Sin embargo, las notas no preservan fielmente el rastro de auditoría inglés: la alternativa principal para el modismo inicial (''Te saludarán'') falta como nota, y la nota sobre שְׁתֵּי לֶחֶם introduce un literal incorrecto (''dos pan''). Además, para claridad y naturalidad en español bíblico, ''recibirás'' comunica mejor la acción social de aceptar lo dado, aunque ''tomarás'' sigue siendo posible.'
  spanish_quality_summary: El texto es claro y legible en español neutral. 'Te preguntarán por tu bienestar' suena natural y fiel al modismo. 'Dos panes' funciona bien. La mejora principal es estilística-semántica en 'los recibirás de su mano', que suena más idiomático en este contexto de regalo que 'los tomarás de su mano'. También conviene ajustar las notas para evitar literalismos incorrectos o redundantes.
  glossary_alignment: No hay términos del glosario principal en disputa aquí. Las decisiones sobre שָׁלוֹם -> 'bienestar' y לֶחֶם -> 'panes' están alineadas con el contexto. La revisión propuesta mantiene la imagen hebrea 'de su mano' y preserva la alternativa 'tomarás' en nota.
  issues:
  - severity: medium
    issue: 'La nota [a] da un literal incorrecto: «dos pan».'
    rationale: El hebreo שְׁתֵּי לֶחֶם significa literalmente 'dos pan(es)' en estructura hebrea, pero en español «dos pan» es gramaticalmente defectuoso y no sirve como nota útil. El rastro inglés en realidad explica que el hebreo dice literalmente 'two bread', no que deba reproducirse un español agramatical.
  - severity: medium
    issue: Falta una nota para la alternativa del modismo וְשָׁאֲלוּ לְךָ לְשָׁלוֹם.
    rationale: El POB inglés conserva como alternativa 'They will greet you'. Dado que el texto español eligió una forma más explícita ('Te preguntarán por tu bienestar'), conviene preservar la alternativa idiomática 'Te saludarán' en nota.
  - severity: low
    issue: '''Los tomarás de su mano'' es menos natural que ''los recibirás de su mano'' en contexto de donación.'
    rationale: Aunque לקח es literalmente 'tomar', el inglés auditado justificó 'receive' por la situación social. En español, 'recibirás' mantiene fidelidad y mejora la fluidez, dejando 'tomarás' como alternativa literal en nota.
