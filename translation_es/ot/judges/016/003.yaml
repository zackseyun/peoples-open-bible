translation:
  language: es
  text: Y Sansón estuvo acostado hasta la medianoche. Luego se levantó a medianoche y agarró las puertas del portón de la ciudad y los dos postes de la puerta, y los arrancó junto con la tranca[a]; se los puso sobre los hombros y los subió a la cima del monte que está enfrente de Hebrón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sacó junto con la tranca». El verbo hebreo puede expresar sacar o arrancar de su lugar.
    reason: lexical_alternative
  - marker: b
    text: O «que mira a Hebrón». El hebreo dice literalmente «sobre la faz de Hebrón», un modismo de ubicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay
  chosen_spanish: estuvo acostado
  alternatives_spanish:
  - yació
  - estuvo echado
  lexicon: HALOT
  rationale: El hebreo expresa la acción de recostarse o yacer; en español, «estuvo acostado» comunica el estado físico sin añadir explícitamente la idea de dormir, como tampoco lo hace el texto fuente.
- source_word: עַד חֲצִי הַלַּיְלָה / בַּחֲצִי הַלַּיְלָה
  english_pob_choice: until midnight / at midnight
  chosen_spanish: hasta la medianoche / a medianoche
  alternatives_spanish:
  - hasta el medio de la noche / en el medio de la noche
  lexicon: HALOT
  rationale: «Medianoche» es el equivalente natural y claro para el giro hebreo de «la mitad de la noche», preservando el contraste temporal entre ambas cláusulas.
- source_word: וַיֶּאֱחֹז
  english_pob_choice: seized
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - se apoderó de
  lexicon: HALOT
  rationale: El verbo hebreo es fuerte, pero en este contexto la fuerza narrativa ya está dada por el hecho mismo. «Tomó» evita una sobrecarga idiomática y permite que la frase siga fluyendo con naturalidad; el valor de acción intensa se mantiene en la secuencia completa y en la siguiente cláusula de arrancar.
- source_word: דַּלְתוֹת שַׁעַר הָעִיר
  english_pob_choice: the doors of the city gate
  chosen_spanish: las puertas de la puerta de la ciudad
  alternatives_spanish:
  - las hojas de la puerta de la ciudad
  - las puertas del portón de la ciudad
  lexicon: HALOT
  rationale: El hebreo distingue las puertas/paneles de la estructura de la puerta urbana. «Puerta de la ciudad» refleja bien el término arquitectónico, y «las puertas de la puerta de la ciudad» conserva la duplicación del original sin sustituirla por un término más interpretativo.
- source_word: וּבִשְׁתֵּי הַמְּזוּזוֹת
  english_pob_choice: and the two doorposts
  chosen_spanish: los dos postes
  alternatives_spanish:
  - los dos postes laterales
  - las dos jambas
  lexicon: HALOT
  rationale: מְזוּזוֹת puede referirse a los montantes o jambas; en español, «postes» es suficientemente comprensible y más natural que un tecnicismo, manteniendo la referencia a las piezas laterales de la entrada. El contexto de la puerta ya identifica su función.
- source_word: וַיִּסָּעֵם עִם הַבְּרִיחַ
  english_pob_choice: pulled them up with the bar
  chosen_spanish: los arrancó junto con la tranca
  alternatives_spanish:
  - los arrancó con la tranca
  - los sacó junto con la tranca
  lexicon: HALOT
  rationale: El verbo puede abarcar sacar o arrancar de su lugar. «Los arrancó» preserva la fuerza del acto y evita suavizarlo. «Tranca» comunica el sentido del hebreo para la barra de cierre de la puerta; incluir «junto con» refleja que la barra quedó unida al conjunto retirado.
- source_word: וַיָּשֶׂם עַל כְּתֵפָיו
  english_pob_choice: he put them on his shoulders
  chosen_spanish: se los puso sobre los hombros
  alternatives_spanish:
  - los puso sobre sus hombros
  - se los echó sobre los hombros
  lexicon: HALOT
  rationale: La construcción pronominal en español expresa con naturalidad que cargó los elementos retirados. «Sobre los hombros» reproduce el plural idiomático de la imagen corporal del original y del inglés POB.
- source_word: וַיַּעֲלֵם
  english_pob_choice: carried them up
  chosen_spanish: los subió
  alternatives_spanish:
  - los llevó hacia arriba
  - los cargó
  lexicon: HALOT
  rationale: El sufijo remite a las piezas de la puerta; en español, «los subió» es conciso y conserva tanto el traslado como la dirección ascendente ya expresada en el contexto inmediato.
- source_word: אֶל רֹאשׁ הָהָר
  english_pob_choice: to the top of the hill
  chosen_spanish: a la cima del monte
  alternatives_spanish:
  - a la cumbre del monte
  - a la cima del cerro
  lexicon: HALOT
  rationale: «Cabeza» en sentido topográfico se vierte de forma idiomática como «cima». «Monte» mantiene un registro algo más solemne y bíblico que «cerro», sin forzar una precisión geomorfológica que el hebreo no exige.
- source_word: אֲשֶׁר עַל פְּנֵי חֶבְרוֹן
  english_pob_choice: that is opposite Hebron
  chosen_spanish: que está enfrente de Hebrón
  alternatives_spanish:
  - que mira a Hebrón
  - que está frente a Hebrón
  lexicon: HALOT
  rationale: El hebreo usa un modismo locativo que puede significar «frente a» o «opuesto a». «Enfrente de» conserva esa relación espacial de modo claro y no técnico en español.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al preferir un arranque directo de la acción («lay» → «estuvo acostado») sin añadir la noción explícita de dormir. También se mantuvo el tono sobrio y directo de la versión auditada, preservando la fuerza narrativa del hebreo y su relación espacial final con Hebrón.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino ni un sustituto directo.
  - Se evitó «Cristo» y vocabulario teológico no presente en el pasaje.
  - La duplicación «puertas de la puerta de la ciudad» refleja la estructura hebrea sin normalizarla en exceso.
  - «Tranca» se prefirió por claridad popular en español; la nota conserva la alternativa de traducción más literal.
  - Se usó «Hebrón» con acento gráfico según el español estándar.
