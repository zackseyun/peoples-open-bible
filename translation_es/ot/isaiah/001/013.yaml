translation:
  language: es
  text: No sigan trayendo ofrenda de cereal inútil[a]; el incienso es una abominación para mí. Luna nueva y sábado, la convocatoria de una asamblea—no puedo soportar la iniquidad y la asamblea solemne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ofrenda vana de cereal» o «ofrenda vacía de cereal».
    reason: lexical_alternative
  - marker: b
    text: O, «no puedo soportar la iniquidad con la asamblea solemne». El hebreo es conciso y puede implicar la incompatibilidad entre el mal y la reunión de culto.
    reason: alternative_reading
lexical_decisions:
- source_word: תוֹסִיפוּ הָבִיא
  english_pob_choice: continue bringing
  chosen_spanish: No sigan trayendo
  alternatives_spanish:
  - No continúen trayendo
  - No vayan a seguir trayendo
  - No sigan llevando
  lexicon: HALOT
  rationale: El hifil de יסף con infinitivo expresa una acción continuada. En español, 'No sigan trayendo' comunica de forma natural la iteración/prosecución prohibida sin perder el valor aspectual del hebreo.
- source_word: מִנְחַת שָׁוְא
  english_pob_choice: worthless grain offerings
  chosen_spanish: ofrenda de cereal inútil
  alternatives_spanish:
  - ofrenda vana de cereal
  - ofrenda vacía de cereal
  - ofrenda de cereal vana
  lexicon: HALOT
  rationale: מִנְחָה en contexto cultual es una ofrenda de cereal. שָׁוְא aporta la idea de vacío, vanidad o inutilidad; 'inútil' conserva la fuerza de desprecio profético en un español claro, y la estructura 'ofrenda de cereal' mantiene la especificidad sacrificial.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - incienso ritual
  - ofrenda de incienso
  lexicon: HALOT
  rationale: El sustantivo denota directamente incienso. En este contexto culto, 'incienso' es suficiente y más natural; el valor sacrificial queda claro por el entorno de la frase.
- source_word: תּוֹעֵבָה הִיא לִי
  english_pob_choice: is an abomination to me
  chosen_spanish: es una abominación para mí
  alternatives_spanish:
  - me resulta abominable
  - es detestable para mí
  - me es una abominación
  lexicon: HALOT
  rationale: '''Abominación'' preserva la severidad del término profético y su registro bíblico. ''Para mí'' reproduce con naturalidad el dativo de relación לִי.'
- source_word: חֹדֶשׁ
  english_pob_choice: New moon
  chosen_spanish: Luna nueva
  alternatives_spanish:
  - mes nuevo
  - fiesta de luna nueva
  lexicon: HALOT
  rationale: En este marco cultual, חֹדֶשׁ se refiere a la observancia de la luna nueva. 'Luna nueva' es la expresión más transparente en español y evita una perífrasis innecesaria.
- source_word: שַׁבָּת
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbath
  - día de reposo
  lexicon: HALOT
  rationale: '''Sábado'' es la forma más inteligible para lectores de español y corresponde al día cultual referido por el hebreo. Se evita ''SEÑOR'' u otras sustituciones no presentes en el texto.'
- source_word: קְרֹא מִקְרָא
  english_pob_choice: the calling of an assembly
  chosen_spanish: la convocatoria de asamblea
  alternatives_spanish:
  - el convocar de una asamblea
  - la llamada de asamblea
  - la proclamación de asamblea
  lexicon: HALOT
  rationale: La construcción verbal-nominal se conserva de manera compacta. 'Convocatoria de asamblea' expresa bien la idea de reunir solemnemente sin sobreexplicar ni diluir la paralelía hebrea.
- source_word: לֹא אוּכַל
  english_pob_choice: I cannot endure
  chosen_spanish: no puedo soportar
  alternatives_spanish:
  - no puedo tolerar
  - no puedo endurecer
  - no puedo aguantar
  lexicon: HALOT
  rationale: Aunque el verbo literalmente significa 'poder', en contexto comunica intolerancia. 'No puedo soportar' es idiomático y conserva la fuerza del rechazo divino.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - el mal
  - la maldad
  - la injusticia
  lexicon: HALOT
  rationale: '''Iniquidad'' preserva el peso moral y el registro profético. En el contexto de culto denunciado, evita reducir el término a una noción demasiado genérica.'
- source_word: וַעֲצָרָה
  english_pob_choice: and solemn assembly
  chosen_spanish: y la asamblea solemne
  alternatives_spanish:
  - y la reunión solemne
  - y la asamblea sagrada
  - y la convocación solemne
  lexicon: HALOT
  rationale: עֲצָרָה designa una reunión religiosa solemne. 'Asamblea solemne' es una equivalencia estable y comprensible; el artículo en español ayuda a la fluidez sin alterar el referente.
theological_decisions:
- issue: Relación entre la maldad y la asamblea cultual en la cláusula final
  english_pob_reading: I cannot endure iniquity and solemn assembly
  chosen_spanish_reading: no puedo soportar la iniquidad y la asamblea solemne
  alternative_spanish_readings:
  - no puedo soportar la iniquidad con la asamblea solemne
  - no puedo soportar el mal y la asamblea solemne
  - no puedo soportar la iniquidad en medio de la asamblea solemne
  rationale: El hebreo yuxtapone אָוֶן y עֲצָרָה sin una preposición explícita. Mantener la coordinación en español preserva la tensión retórica y no resuelve prematuramente si la idea es incompatibilidad entre maldad y culto o maldad en el contexto de la asamblea. La redacción coordinada sigue el audit trail inglés; la alternativa interpretativa queda implícita por la tersedad del enunciado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última pasada de revisión y no requiere cambios sustantivos; se mantiene la tensión interpretativa reconocida en el audit trail inglés, especialmente en la cláusula final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto del nombre divino en este proyecto cuando corresponda; en este versículo no aparece el tetragrámaton en la superficie del texto, sino la primera persona divina.
  - '''Mesías/Cristo'' no interviene aquí.'
  - '''Iniquidad'' y ''abominación'' conservan el tono profético fuerte del hebreo y del inglés auditado.'
  - Se evita 'SEÑOR' como sustituto de nombre divino; no hay necesidad de máscara en este versículo.
  - '''Luna nueva'' y ''sábado'' reflejan el calendario cultual con español claro y sin sobreparáfrasis.'
