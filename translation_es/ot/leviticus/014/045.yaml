  glossary_alignment: 'No hay conflictos con los términos globales del proyecto. «Inmundo» alinea bien con טָמֵא en Levítico. El único ajuste necesario es alinear עפר con la decisión principal documentada por el POB inglés: «revoque/enlucido/yeso» como material de pared, con nota para la literalidad «polvo».'
