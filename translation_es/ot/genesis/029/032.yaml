    issue: «llamó su nombre Rubén» es un calco poco natural en español.
    rationale: Aunque intenta reflejar la fórmula hebrea וַתִּקְרָא שְׁמוֹ, en español bíblico moderno y legible la forma natural y digna es «le puso por nombre Rubén» o «llamó su nombre a Rubén». La redacción actual suena incorrecta para lectores hispanos.
  revised_spanish_text: 'Lea concibió y dio a luz un hijo[a], y le puso por nombre Rubén, porque dijo: «Porque Yahvé ha visto mi aflicción, ahora mi esposo me amará».'
