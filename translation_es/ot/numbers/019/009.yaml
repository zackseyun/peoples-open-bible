review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: mantiene el singular «un hombre limpio», la especificidad de «cenizas de la becerra», el depósito «fuera del campamento», la idea de custodia para la congregación y la tensión de חַטָּאת como «ofrenda por el pecado» con alternativa de purificación. Sin embargo, los marcadores de notas están invertidos respecto de su anclaje semántico: [a] aparece tras «en un lugar limpio» pero su contenido explica לְמֵי נִדָּה; y [b] aparece tras «impureza» pero su contenido explica חַטָּאת. Además, «agua para impureza» es demasiado poco idiomático en español; conviene conservar la formalidad del hebreo con «agua de impureza» y dejar «agua de purificación» en nota.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos problemas de legibilidad/editoriales: la colocación errónea de notas confunde al lector, y la frase «para agua para impureza» suena forzada y poco natural en español bíblico contemporáneo. «Para agua de impureza» preserva mejor la forma fuente sin caer en una construcción torpe. También conviene normalizar la puntuación de las notas, quitando la comilla sobrante inicial en la nota b.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé/Mesías u otros términos sensibles del glosario. «Ofrenda por el pecado» es una opción aceptable para חַטָּאת con nota alternativa «ofrenda de purificación».
  issues:
  - severity: high
    issue: Marcadores de notas anclados al lugar equivocado
    rationale: La nota [a] está colocada tras «en un lugar limpio», pero explica «agua de impureza / agua de purificación»; la nota [b] está colocada tras «impureza», pero explica «ofrenda por el pecado / de purificación». Esto rompe la correspondencia obligatoria entre anclaje y nota.
  - severity: medium
    issue: «para agua para impureza» es poco idiomático
    rationale: Aunque intenta reflejar la estructura del hebreo, en español resulta tosco y ambiguo. «para agua de impureza» conserva mejor la literalidad funcional y coincide con la alternativa ya documentada en el rastro inglés.
  - severity: low
    issue: Puntuación/comillas defectuosas en la nota b
    rationale: 'La nota comienza con una comilla simple sobrante: ''O:. Debe normalizarse a «O: ...» o equivalente.'
  revised_spanish_text: Entonces un hombre limpio recogerá las cenizas de la becerra y las pondrá fuera del campamento, en un lugar limpio; y quedarán guardadas para la congregación de los hijos de Israel, para agua de impureza[a]; es una ofrenda por el pecado[b].
  revised_footnotes:
