translation:
  language: es
  text: 'Y tú, hijo de hombre, di a la casa de Israel: «Así han dicho: “Ciertamente nuestras transgresiones y nuestros pecados están sobre nosotros, y en ellos nos consumimos[a]; ¿cómo podremos vivir?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos vamos pudriendo» / «nos vamos consumiendo» para «nos consumimos». El hebreo sugiere deterioro, descomposición o languidez bajo el peso de la culpa y del juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - hijo humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el vocativo profético fijo de Ezequiel y su forma tradicionalmente reconocible en español, sin perder el valor idiomático de referencia al ser humano.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Mantiene la imagen colectiva y pactal de ‘casa’, paralela al hebreo y al inglés POB.
- source_word: כֵּן אֲמַרְתֶּם לֵאמֹר
  english_pob_choice: Thus you have said
  chosen_spanish: Así habéis dicho
  alternatives_spanish:
  - Así habéis hablado
  - Esto es lo que habéis dicho
  lexicon: HALOT
  rationale: ‘Así’ conserva el valor deíctico/formal de כֵּן y la frase sigue de cerca la revisión inglesa más literal y solemne.
- source_word: פְשָׁעֵינוּ
  english_pob_choice: our transgressions
  chosen_spanish: nuestras rebeliones
  alternatives_spanish:
  - nuestras transgresiones
  - nuestros delitos
  lexicon: HALOT
  rationale: פשע suele implicar rebeldía o ruptura deliberada; ‘rebeliones’ hace visible esa fuerza moral mejor que un término más genérico.
- source_word: חַטֹּאתֵינוּ
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras culpas
  - nuestros pecados
  lexicon: HALOT
  rationale: ‘Pecados’ conserva el par hebreo con ‘rebeliones’ y resulta natural en español eclesial contemporáneo.
- source_word: עָלֵינוּ
  english_pob_choice: are upon us
  chosen_spanish: están sobre nosotros
  alternatives_spanish:
  - pesan sobre nosotros
  - caen sobre nosotros
  lexicon: HALOT
  rationale: Preserva la metáfora de carga/culpa que ‘upon us’ expresa en inglés.
- source_word: וּבָם
  english_pob_choice: in them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo permite ‘en ellos’, el contexto de desgaste bajo culpa y juicio hace que ‘por ellos’ comunique con mayor claridad la relación causal/mediadora sin borrar la imagen original.
- source_word: נְמַקִּים
  english_pob_choice: we are wasting away
  chosen_spanish: nos vamos deshaciendo
  alternatives_spanish:
  - nos estamos consumiendo
  - nos vamos consumiendo
  - nos vamos pudriendo
  lexicon: HALOT
  rationale: El verbo hebreo sugiere descomposición, languidez o deterioro progresivo. ‘Nos vamos deshaciendo’ conserva la idea de desintegración gradual y permite el mismo tono que la nota inglesa sobre decay/wasting.
- source_word: וְאֵיךְ נִחְיֶה
  english_pob_choice: so how can we live?
  chosen_spanish: ¿cómo, pues, viviremos?
  alternatives_spanish:
  - ¿y cómo viviremos?
  - ¿cómo podremos vivir entonces?
  lexicon: HALOT
  rationale: La pregunta final expresa desesperación ante la culpa; ‘pues’ retiene la inferencia implícita y la forma interrogativa directa del hebreo.
theological_decisions:
- issue: 'Tono de la declaración del pueblo: confesión versus desesperación bajo juicio'
  english_pob_reading: 'Rendered as a despairing acknowledgment of guilt and its consequences: ''Surely our transgressions and our sins are upon us ... so how can we live?'''
  chosen_spanish_reading: 'Declarado como un reconocimiento angustiado de culpa y de sus consecuencias: «Ciertamente nuestras rebeliones y nuestros pecados están sobre nosotros, y por ellos nos vamos deshaciendo; ¿cómo, pues, viviremos?»'
  alternative_spanish_readings:
  - Una confesión más neutral sin tono de desesperanza
  - Una formulación que enfatice solo arrepentimiento
  rationale: La frase final interrogativa y el verbo de deterioro sostienen la tensión entre culpa reconocida y desesperanza; la traducción no resuelve esa tensión, sino que la deja audible.
  doctrine_reference: Preservar la tensión teológica sin imponer una conclusión sobre arrepentimiento o restauración más allá del versículo.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se mantiene la fórmula más formal y literal para כֵּן/‘Thus you have said’, y se refleja la nota léxica inglesa sobre נְמַקִּים con una nota española equivalente. No se introducen lecturas doctrinales ajenas al texto.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como término de proyecto solo cuando el hebreo lo exige explícitamente; este versículo no contiene el tetragrámaton.
  - Se ha preferido ‘rebeliones’ para פשע porque en español conserva mejor la fuerza de ruptura deliberada que ‘transgresiones’ en este contexto.
  - La secuencia ‘por ellos nos vamos deshaciendo’ preserva la relación causal implícita sin borrar del todo la imagen hebrea de estar ‘en’ ellos.
  - ‘¿cómo, pues, viviremos?’ mantiene el cierre retórico y desesperado del hebreo; no se suaviza en una formulación más general.
