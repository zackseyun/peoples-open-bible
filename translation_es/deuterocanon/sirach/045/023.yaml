base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/045/023.yaml
  text: And Phinehas son of Eleazar inherited a third place in might[c][b][a], because he was zealous for the God of all and stood in the breach for his people.
  footnotes:
  - marker: a
    text: 'Greek: ''third in glory,'' where the Hebrew reads ''inherited a third place in might/valor.'' The Hebrew witness is followed here, with the Greek kept in view as a notable alternative nuance of honor.'
    reason: textual_variant
  - marker: b
    text: '''Stood in the breach'' is a Hebrew idiom for stepping in at a moment of communal danger, with intercessory or protective force.'
    reason: cultural_note
  - marker: c
    text: The Greek continues, 'and he made atonement for Israel,' an expansion not present in the extant Hebrew here.
    reason: textual_variant
