translation:
  language: es
  text: Así, Abraham volvió a sus muchachos[a], y ellos se levantaron y se fueron juntos a Beerseba, y Abraham se quedó en Beerseba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Abraham volvió a sus muchachos». Isaac no se menciona en esta cláusula, aunque sí está presente en la narración anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de regreso
  lexicon: HALOT
  rationale: שׁוּב en narrativa expresa la idea de volver o regresar. «Volvió» es natural en español y conserva el movimiento de retorno sin introducir matices adicionales.
- source_word: נְעָרָיו
  english_pob_choice: his young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachos
  - sus sirvientes
  - sus acompañantes
  lexicon: HALOT
  rationale: נַעַר puede significar joven, criado o sirviente según el contexto. Siguiendo la decisión inglesa de no especificar más de lo que el hebreo dice aquí, «sus jóvenes» conserva la forma lexical abierta; una nota aclara que Isaac no se menciona en esta cláusula.
- source_word: וַיָּקֻמוּ
  english_pob_choice: they arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: קום en secuencia narrativa marca el inicio de la acción. «Se levantaron» comunica con claridad ese paso inicial en español moderno, sin sonar arcaico.
- source_word: וַיֵּלְכוּ יַחְדָּו
  english_pob_choice: went together
  chosen_spanish: fueron juntos
  alternatives_spanish:
  - caminaron juntos
  - se fueron juntos
  lexicon: HALOT
  rationale: הלך con יַחְדָּו expresa desplazamiento conjunto. «Fueron juntos» conserva la sencillez del hebreo y no añade una idea de modo que no está explícita.
- source_word: בְּאֵר שָׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beerseba
  - Berseba
  lexicon: HALOT
  rationale: Como nombre propio de lugar, se translitera. «Beerseba» es la forma más reconocible y fiel en español eclesiástico amplio.
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - permaneció
  - vivió
  lexicon: HALOT
  rationale: ישב en este contexto geográfico puede significar residir o permanecer. «Se quedó» refleja de manera directa la idea de residir/seguir en el lugar sin cargar un sentido más técnico o arcaico.
theological_decisions:
- issue: El hebreo dice que Abraham volvió a sus jóvenes, sin nombrar a Isaac en esta cláusula.
  english_pob_reading: Translate the verse as written without supplying Isaac in the main text
  chosen_spanish_reading: Traducir el versículo tal como está, sin añadir a Isaac en el texto principal
  alternative_spanish_readings:
  - Abraham volvió con Isaac y sus jóvenes
  - Abraham volvió a sus jóvenes, junto con Isaac
  rationale: El texto hebreo nombra únicamente a Abraham como sujeto de «volvió»; no conviene armonizar añadiendo a Isaac al texto principal. La tensión narrativa queda preservada, mientras la nota explica la omisión explícita de Isaac en esta cláusula.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió un registro sobrio y formal, con «se levantaron» y «se quedó» para reflejar con más precisión el hebreo narrativo sin perder naturalidad en español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - 'Se usa un tratamiento consistente de nombres propios en transliteración española: «Beerseba».'
  - El plural «sus jóvenes» mantiene la apertura léxica de נְעָרָיו sin especificar «sirvientes» o «criados» más de lo necesario.
