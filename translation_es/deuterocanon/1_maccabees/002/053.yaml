translation:
  language: es
  text: José[a], en el tiempo de su angustia, guardó el mandamiento, y llegó a ser señor de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un mandamiento» o «el mandamiento»; el griego no especifica cuál mandamiento se quiere decir, y puede resumir en general la obediencia de José.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: Nombre propio bíblico
  rationale: El nombre propio se adapta a la forma española habitual y reconocible en lectura bíblica.
- source_word: ἐν καιρῷ
  english_pob_choice: in the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - en el tiempo de
  - en un tiempo de
  - al tiempo de
  lexicon: LSJ
  rationale: La construcción temporal se conserva de forma natural en español sin perder la relación de circunstancia histórica.
- source_word: στενοχωρίας
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - angustia
  lexicon: LSJ
  rationale: El término griego señala estrechez o presión aflictiva; «angustia» comunica bien esa constricción en español bíblico contemporáneo.
- source_word: ἐφύλαξε
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - guardó
  - cumplió
  lexicon: BDAG
  rationale: Para ἐντολήν, «guardó» preserva la idea de obediencia fiel y suena natural en español bíblico.
- source_word: ἐντολήν
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandamiento
  - el mandato
  - un mandamiento
  lexicon: BDAG
  rationale: El singular sin artículo en griego puede ser genérico o referirse a un mandamiento concreto; «el mandamiento» mantiene la fuerza moral-religiosa sin especificar indebidamente.
- source_word: κύριος
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - señor
  - gobernante
  - amo
  lexicon: BDAG
  rationale: Aquí κύριος describe autoridad elevada en Egipto, no el título divino; «señor» reproduce mejor el rango que «gobernante» y evita la connotación doméstica de «amo».
- source_word: Αἰγύπτου
  english_pob_choice: of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - de Egipto
  - sobre Egipto
  lexicon: LSJ
  rationale: El genitivo se vierte de manera directa con «de Egipto», conservando la expresión compacta y solemne del griego.
theological_decisions:
- issue: Alcance de ἐντολήν / a qué mandamiento se refiere José
  english_pob_reading: A general statement that Joseph remained obedient to God's command in his trial.
  chosen_spanish_reading: Una afirmación general de que José permaneció obediente al mandamiento de Dios en su prueba.
  alternative_spanish_readings:
  - Una alusión más específica a la negativa de José ante la esposa de Potifar como obediencia a un mandato concreto
  rationale: El griego no identifica qué mandamiento tiene en vista. La redacción española conserva la generalidad y no estrecha el sentido a un episodio particular, aunque el trasfondo narrativo pueda sugerir Génesis 39.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de forma excesiva.
translation_notes:
  revision_awareness: Coincide con el texto fuente griego y con la lectura auditada en inglés; no hay revisiones posteriores que alteren el sentido. Se mantiene la ambigüedad del singular ἐντολήν tal como la preservó la POB en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantiene «mandamiento» en singular para reflejar el griego y la nota de alternativa.
  - «Señor» traduce κύριος en sentido de autoridad humana elevada, no como título divino.
