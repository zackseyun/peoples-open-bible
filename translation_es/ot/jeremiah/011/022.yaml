review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: conclusión profética, fórmula de mensajero, nombre divino, anuncio de castigo, y las dos sentencias de muerte. Sin embargo, en la cláusula final רָעָב significa específicamente «hambre/famine» en el sentido de hambruna, y el inglés POB fijó deliberadamente «by famine». «Morirán de hambre» comunica el resultado, pero atenúa el marco de juicio-calamidad y desplaza el paralelismo con «a espada».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras naturales: (1) quitar la coma tras «Por tanto» para seguir la cadencia del POB auditado y una sintaxis más fluida; (2) cambiar «morirán de hambre» por «morirán por hambre» o similar. La opción más fiel y natural aquí es «por hambre», que mantiene el paralelismo de juicio sin sonar demasiado técnica como «por hambruna».'
  glossary_alignment: '«Yahvé» está bien alineado con el glosario del proyecto. «Así dice» y «de los ejércitos» son aceptables. «Castigarles» preserva adecuadamente פקד על en contexto judicial, aunque en texto corrido «castigarlos» sería ligeramente más panhispánico; no es un problema suficiente para exigir cambio. La principal desalineación es רָעָב: el borrador explica hambruna en la decisión léxica, pero el texto principal usa «de hambre», que no preserva tan bien el valor de calamidad pública señalado en la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «morirán de hambre» debilita el sentido específico de רָעָב
    rationale: רָעָב denota «hambre/famine» como calamidad o hambruna, no solo la sensación individual de hambre. Además, el inglés POB preserva el paralelismo formular «by the sword … by famine». «Por hambre» mantiene mejor ese valor judicial y paralelo.
  - severity: low
    issue: Coma innecesaria tras «Por tanto»
    rationale: El POB inglés ya eliminó la coma tras «Therefore» por fluidez formal. En español, «Por tanto así dice…» funciona bien sin coma y mantiene mejor la cadencia solemne.
  revised_spanish_text: 'Por tanto así dice Yahvé de los ejércitos: He aquí[a], voy a castigarles. Los jóvenes morirán a espada; sus hijos y sus hijas morirán por hambre.'
  revised_footnotes:
  - marker: a
    text: 'O: «voy a traer juicio sobre ellos». El hebreo dice literalmente: «estoy visitando sobre ellos», usando un verbo que en contextos de juicio puede significar llamar a cuentas o castigar.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la puntuación para mejor fluidez formal y se cambia «de hambre» por «por hambre» para preservar mejor el sentido de רָעָב como calamidad de hambre/hambruna y el paralelismo con «a espada», en línea con la auditoría inglesa y el hebreo fuente. Se conserva la nota léxica sobre פקד porque sigue siendo pertinente y bien anclada en «He aquí[a]».
