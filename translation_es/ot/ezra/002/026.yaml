translation:
  language: es
  text: los hijos de Rama y Geba[a], seiscientos veintiuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los descendientes de Rama y Geba». En esta lista censal, el hebreo «hijos de» puede designar un grupo más amplio de descendientes o de comunidad, no solo hijos inmediatos.
