  yaml_path: translation/ot/ecclesiastes/005/010.yaml
  text: When goods increase[a], those who consume them increase[b]; and what advantage is there to their owners except the seeing of their eyes?
  footnotes:
  - marker: a
    text: Or 'good things,' 'prosperity,' or 'wealth' for 'goods.' The Hebrew term can denote material good or prosperity more broadly; the immediate context favors possessions that can be consumed and owned.
    reason: lexical_alternative
  - marker: b
    text: Literally 'except the seeing of his eyes.' The Hebrew idiom suggests that the owner’s only benefit may be merely looking at what he has.
    reason: lexical_alternative
