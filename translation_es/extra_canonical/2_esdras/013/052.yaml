  text: And he said to me, “Just as no one can search out or know what is in the depths of the sea, so no one on earth can see my Son, or those who are with him, except at the time of that day.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:47Z'
    unchanged: false
    changes_summary: Changed 'his day' to 'that day' for closer alignment with the Latin diei and more natural formal English.
translation:
  language: es
  text: 'Y me dijo: «Así como nadie puede explorar ni saber lo que hay en las profundidades del mar, así nadie en la tierra podrá ver a mi Hijo, ni a los que están con él, excepto en el tiempo de aquel día».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: sicut non potest hoc vel scrutinare vel scire quis
  english_pob_choice: Just as no one can search out or know
  chosen_spanish: Así como nadie puede explorar ni saber
  alternatives_spanish:
  - Así como nadie puede investigar ni conocer
  - Tal como nadie puede escudriñar ni saber
  lexicon: scrutinare → explorar/escudriñar; scire → saber/conocer
  rationale: En español, «explorar» comunica bien la idea de indagar a fondo sin sonar arcaico; «saber» conserva la distinción con el acto de buscar o averiguar. Se evita una traducción mecánica que sobrecargue el verso con un calco rígido.
- source_word: quid sit in profundo maris
  english_pob_choice: what is in the depths of the sea
  chosen_spanish: lo que hay en las profundidades del mar
  alternatives_spanish:
  - lo que está en el fondo del mar
  - lo que hay en lo profundo del mar
  lexicon: profundum maris → profundidades del mar
  rationale: «Profundidades del mar» refleja el plural latino y mantiene la imagen de inaccesibilidad. «Lo que hay» da una formulación natural en español sin perder el sentido de contenido oculto.
- source_word: Filium meum
  english_pob_choice: my Son
  chosen_spanish: a mi Hijo
  alternatives_spanish:
  - a mi Hijo amado
  - a mi Hijo
  lexicon: Filius → Hijo
  rationale: Se conserva la relación posesiva directa del latín con «mi Hijo», en paralelo con la versión inglesa. No se añade «amado» porque el texto fuente no lo expresa aquí.
- source_word: eos qui cum eo sunt
  english_pob_choice: those who are with him
  chosen_spanish: a los que están con él
  alternatives_spanish:
  - a los que están con él
  - a quienes están con él
  lexicon: qui cum eo sunt → los que están con él
  rationale: La construcción española más natural es «los que están con él»; el objeto introducido por «ver» requiere «a los que» para claridad sintáctica. Se preserva el grupo acompañante sin especificarlo más allá de la fuente.
- source_word: nisi in tempore diei
  english_pob_choice: except at the time of that day
  chosen_spanish: excepto en el tiempo de aquel día
  alternatives_spanish:
  - excepto en el tiempo de ese día
  - sino en el tiempo de aquel día
  lexicon: tempore diei → en el tiempo de aquel día
  rationale: La revisión inglesa cambió «his day» por «that day» para ajustarse al latino diei; en español, «aquel día» refleja mejor esa distancia deíctica y evita la idea posesiva. «En el tiempo de» conserva el valor temporal del ablativo latino.
theological_decisions:
- issue: Identidad y revelación escatológica del Hijo
  english_pob_reading: no one on earth can see my Son, or those who are with him, except at the time of that day
  chosen_spanish_reading: nadie en la tierra podrá ver a mi Hijo, ni a los que están con él, excepto en el tiempo de aquel día
  alternative_spanish_readings:
  - nadie sobre la tierra podrá ver a mi Hijo
  - nadie en la tierra puede ver a mi Hijo
  rationale: Se mantiene el carácter escatológico y revelacional del dicho sin suavizar la restricción temporal. «Podrá ver» refleja el futuro de posibilidad/imposibilidad del enunciado y conserva el alcance universal de «nadie en la tierra».
  doctrine_reference: Escatología de revelación final / manifestación del Hijo
- issue: Traducción de la clausula final temporal
  english_pob_reading: except at the time of that day
  chosen_spanish_reading: excepto en el tiempo de aquel día
  alternative_spanish_readings:
  - salvo en aquel día
  - excepto entonces
  rationale: Se preserva la expresión temporal precisa del latino sin convertirla en una paráfrasis vaga. «Aquel día» mantiene la deixis y la referencia al momento señalado en el contexto apocalíptico.
  doctrine_reference: Tiempo señalado por Dios en la consumación
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «his day» por «that day» para alinearse mejor con el latín diei. La redacción española adopta «aquel día» para mantener esa distancia deíctica y evitar un posesivo inexistente en el original.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, pero aquí el versículo no contiene el tetragrámaton.
  - Se conserva «Hijo» con mayúscula por tratarse de una referencia cristológica directa del texto fuente.
  - «Profundidades del mar» y «aquel día» mantienen el tono apocalíptico y formal sin introducir explicaciones interpretativas.
