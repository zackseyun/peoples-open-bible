revisions:
- from: 'En un día de prosperidad[a], sé alegre; y en un día de adversidad, considera: Dios ha hecho lo uno tanto como lo otro, para que el hombre[b] no pueda descubrir nada de lo que vendrá después de él[c].'
  to: 'En un día de prosperidad[a], alégrate; y en un día de adversidad, considera: Dios ha hecho tanto lo uno como lo otro, para que el hombre[b] no descubra nada de lo que vendrá después de él[c].'
  rationale: Se ajusta «sé alegre» a «alégrate» para una exhortación más natural y fiel al modismo hebreo; se reemplaza «no pueda descubrir» por «no descubra» para evitar añadir un matiz modal no explícito; y se pule «lo uno tanto como lo otro» a «tanto lo uno como lo otro» por mayor naturalidad en español.
