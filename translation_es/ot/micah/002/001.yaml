translation:
  language: es
  text: ¡Ay de los que planean iniquidad y hacen el mal sobre sus camas! A la luz de la mañana lo hacen, porque está en el poder de su mano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque su mano es su dios», tomando «dios» como una descripción figurada de su poder autoexaltado.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de...!
  - ¡Ay! / ¡Ay de ustedes!
  lexicon: HALOT
  rationale: Como interjección profética de denuncia, en español «¡Ay!» conserva el tono de lamentación/juicio. Se amplía a «¡Ay de los que...!» para sonar natural y mantener el destinatario implícito del hebreo.
- source_word: חֹשְׁבֵי אָוֶן
  english_pob_choice: those who devise iniquity
  chosen_spanish: los que planean iniquidad
  alternatives_spanish:
  - los que maquinan iniquidad
  - los que idean iniquidad
  - los que piensan iniquidad
  lexicon: HALOT
  rationale: El participio expresa planificación deliberada, no simple pensamiento. «Planean» comunica bien la intención previa; «iniquidad» sigue de cerca el valor moral de אָוֶן y evita diluirlo en un término más general.
- source_word: וּפֹעֲלֵי רָע
  english_pob_choice: and work evil
  chosen_spanish: y hacen el mal
  alternatives_spanish:
  - y practican el mal
  - y obran mal
  - y ejecutan el mal
  lexicon: HALOT
  rationale: El paralelismo muestra paso de intención a acción. «Hacen el mal» es claro y natural en español; conserva la idea de realizar lo planeado sin sobreinterpretar el matiz.
- source_word: עַל מִשְׁכְּבוֹתָם
  english_pob_choice: on their beds
  chosen_spanish: sobre sus camas
  alternatives_spanish:
  - en sus camas
  - acostados en sus camas
  lexicon: HALOT
  rationale: La imagen espacial se conserva literalmente. «Sobre sus camas» sigue de cerca la preposición hebrea y mantiene el cuadro de planeación nocturna.
- source_word: בְּאוֹר הַבֹּקֶר
  english_pob_choice: At the light of morning
  chosen_spanish: Al brillo de la mañana
  alternatives_spanish:
  - A la luz de la mañana
  - Al amanecer
  - En la luz de la mañana
  lexicon: HALOT
  rationale: El hebreo es imagístico; «brillo» intenta preservar esa vividez y no reducirlo a una mera indicación temporal. «Al brillo de la mañana» es comprensible y mantiene el matiz de primera luz.
- source_word: יַעֲשׂוּהָ
  english_pob_choice: they do it
  chosen_spanish: lo hacen
  alternatives_spanish:
  - lo llevan a cabo
  - lo ejecutan
  - lo realizan
  lexicon: HALOT
  rationale: El sufijo femenino puede remitir al plan/iniquidad concebidos. «Lo hacen» es breve y fiel sin especificar más de lo que el hebreo exige.
- source_word: כִּי יֶשׁ לְאֵל יָדָם
  english_pob_choice: because it is in the power of their hand
  chosen_spanish: porque está en el poder de su mano
  alternatives_spanish:
  - porque su mano tiene poder
  - porque está en su poder
  - porque su mano es su dios
  lexicon: HALOT
  rationale: Se conserva la imagen de la mano como sede de capacidad/alcance. «En el poder de su mano» transmite la idea idiomática de posibilidad efectiva y deja abierta la tensión del hebreo con la nota.
theological_decisions:
- issue: Sentido de לְאֵל en la cláusula final
  english_pob_reading: idiomatic 'power' rather than a reference to God/god
  chosen_spanish_reading: «el poder de su mano» como capacidad efectiva para ejecutar sus planes
  alternative_spanish_readings:
  - «su mano es su dios»
  - «Dios está con su mano/poder»
  rationale: 'En el contexto inmediato la cláusula explica por qué actúan al amanecer: tienen la capacidad de hacerlo. Mantener «poder» evita forzar una lectura teológica en el cuerpo del texto y conserva la ambigüedad reconocida en la nota inglesa.'
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla indebidamente; cuando el hebreo admite una lectura figurada de «dios», dejarla en nota.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que afinó אָוֶן a «iniquity» y mantuvo la cláusula final como una expresión idiomática de poder. La versión española conserva ese ajuste semántico con «iniquidad» y deja la alternativa teológica en nota.
  spanish_consistency_notes:
  - Se evita «Señor» o mayúsculas reverenciales porque el versículo no contiene el nombre divino.
  - «Iniquidad» se usa para אָוֶן, en línea con la revisión inglesa más reciente y con su peso moral.
  - «Mal» se reserva para רָע, manteniendo el paralelismo con un término diferente del primero.
  - La nota en la cláusula final preserva la alternativa figurada sin imponerla en el texto principal.
