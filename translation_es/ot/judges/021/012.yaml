  language: en
  yaml_path: translation/ot/judges/021/012.yaml
  text: And among the inhabitants of Jabesh-gilead they found four hundred young virgins who had not known a man by lying with a male; and they brought them to the camp at Shiloh[a], which is in the land of Canaan.
  footnotes:
