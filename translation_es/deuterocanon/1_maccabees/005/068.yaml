review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: Judas cambia de rumbo hacia Azoto, derriba altares, quema las imágenes, toma botín y vuelve a Judea. También preserva correctamente γῆν ἀλλοφύλων como «la tierra de extranjeros» con la alternativa histórica en nota. Sin embargo, hay un problema de alineación editorial importante: la versión inglesa auditada fue revisada para eliminar el reflejo del plural κατέκαυσαν en el texto principal y, por tanto, la nota textual [b] ya no está respaldada por la línea inglesa final ni por la política de no sobrecargar el texto cuando se ha decidido suavizar el número en la traducción principal.'
  spanish_quality_summary: El español es claro, natural y digno. «Se desvió», «derribó», «imágenes esculpidas» y «regresó» son soluciones sólidas. El principal ajuste necesario es quitar la nota [b], porque introduce una tensión innecesaria con el texto principal español («quemó») y con la revisión auditada en inglés. Sin esa nota, el versículo queda más limpio y coherente. Un ajuste menor opcional de fluidez es mantener «quemó las imágenes esculpidas de sus dioses con fuego» o dejar el orden actual; ambos son aceptables.
  glossary_alignment: 'No hay términos del glosario principal en conflicto. Los topónimos y términos religiosos están bien manejados: «Azoto», «altares», «imágenes esculpidas», «dioses», «Judea». La decisión de no usar «filisteos» en el texto principal está correctamente documentada en la nota [a].'
  issues:
  - severity: medium
    issue: La nota [b] conserva una variante/plural que la auditoría inglesa final decidió no reflejar en el texto principal.
    rationale: El historial aplicado muestra una revisión posterior que eliminó «they burned» y mantuvo a Judas como sujeto consistente. Conservar la nota textual en español deja una señal editorial desalineada con la versión inglesa auditada final y con la traducción española principal.
  - severity: low
    issue: La ancla [b] en «las ciudades[b]» no corresponde idealmente al lugar de la variante verbal.
    rationale: Si existiera esa nota, debería anclarse junto al verbo «quemó», no al sintagma «las ciudades». Como se recomienda eliminarla, el problema desaparece.
  revised_spanish_text: Y Judas se desvió hacia Azoto[a], la tierra de extranjeros, y derribó sus altares, y quemó con fuego las imágenes esculpidas de sus dioses, y saqueó el botín de las ciudades, y regresó a Judea.
  revised_footnotes:
  - marker: a
    text: O, más específicamente en el contexto histórico, «la tierra de los filisteos». El griego dice más literalmente «la tierra de extranjeros».
    reason: alternative_reading
  revision_rationale: Se elimina la nota [b] para alinear el español con la auditoría inglesa final, que decidió mantener a Judas como sujeto continuo en el texto principal y no conservar la observación sobre el plural griego como nota activa en esta línea. El resto del versículo puede mantenerse tal como está, pues es fiel al griego y suena natural en español.
