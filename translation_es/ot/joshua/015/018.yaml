  yaml_path: translation/ot/joshua/015/018.yaml
  text: And when she came[a], she urged him to ask her father for a field. Then she got down from the donkey, and Caleb said to her[c][b], “What do you want?”
  footnotes:
  - marker: a
    text: Or “she persuaded him” or, more negatively, “she incited him.”
    reason: lexical_alternative
  - marker: b
    text: Or “she dismounted from the donkey”; the Hebrew verb may suggest a sudden descent.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom is literally “What is with you?” meaning “What do you want?” or “What troubles you?”
    reason: lexical_alternative
