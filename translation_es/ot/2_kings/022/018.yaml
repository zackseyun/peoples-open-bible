translation:
  language: es
  text: 'Pero al rey de Judá, que los envió a consultar a Yahvé, así le dirán: Así dice Yahvé, el Dios de Israel: En cuanto a las palabras que has oído[a]—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las palabras que oíste—». El hebreo deja la cláusula en suspenso y se completa en el versículo siguiente.'
