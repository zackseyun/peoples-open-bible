translation:
  language: es
  text: Y del canasto de los panes sin levadura que estaba delante de Yahvé, tomó una torta sin levadura, una torta de pan con aceite[a] y una oblea, y las puso sobre las porciones de grasa y sobre el muslo derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una torta mezclada con aceite». La frase hebrea puede describir pan preparado con aceite, pero el método exacto no se explicita.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסַּל
  english_pob_choice: from the basket
  chosen_spanish: del canasto
  alternatives_spanish:
  - de la canasta
  - del cesto
  lexicon: HALOT
  rationale: La preposición מִן indica origen. «Del canasto» conserva el sentido de procedencia y suena natural en español bíblico contemporáneo.
- source_word: הַמַּצּוֹת
  english_pob_choice: of unleavened bread
  chosen_spanish: de los panes sin levadura
  alternatives_spanish:
  - de las tortas sin levadura
  - de los panes ácimos
  lexicon: HALOT
  rationale: En este contexto ritual, מַצּוֹת alude a piezas de pan sin levadura dentro del canasto. «Panes sin levadura» es claro y evita tecnicismos poco transparentes.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión cultual señala la presencia de Yahvé. Se mantiene «Yahvé» conforme al criterio del proyecto, sin sustituirlo por un título velado.
- source_word: חַלַּת מַצָּה אַחַת
  english_pob_choice: one unleavened cake
  chosen_spanish: una torta sin levadura
  alternatives_spanish:
  - una torta ácima
  - una torta de pan sin levadura
  lexicon: HALOT
  rationale: חַלָּה designa una pieza de pan/torta; con מַצָּה especifica que es sin levadura. «Torta» funciona bien en español general para una pieza de pan ritual.
- source_word: חַלַּת לֶחֶם שֶׁמֶן אַחַת
  english_pob_choice: one cake of bread with oil
  chosen_spanish: una torta de pan con aceite
  alternatives_spanish:
  - una torta de pan mezclado con aceite
  - una torta de pan untado con aceite
  lexicon: HALOT
  rationale: La frase hebrea indica una pieza de pan asociada con aceite, pero no precisa el modo exacto. «Con aceite» conserva esa ambigüedad documentada sin sobreinterpretar el proceso.
- source_word: וְרָקִיק אֶחָד
  english_pob_choice: one wafer
  chosen_spanish: una galleta
  alternatives_spanish:
  - una oblea
  - una torta delgada
  lexicon: HALOT
  rationale: רָקִיק es una pieza fina y plana. «Galleta» es menos litúrgica pero comunica bien la idea de algo delgado y compacto; «oblea» también sería posible, aunque puede sugerir asociaciones eucarísticas no presentes en el texto.
- source_word: וַיָּשֶׂם
  english_pob_choice: and put them
  chosen_spanish: y las puso
  alternatives_spanish:
  - y las colocó
  - y las depositó
  lexicon: HALOT
  rationale: El verbo expresa acción concreta de poner/colocar. «Las puso» es natural en español y conserva la referencia a los tres objetos de pan.
- source_word: הַחֲלָבִים
  english_pob_choice: the fat portions
  chosen_spanish: las porciones de grasa
  alternatives_spanish:
  - las grasas
  - las piezas de grasa
  lexicon: HALOT
  rationale: En contexto sacrificial no se trata de grasa en sentido abstracto, sino de partes designadas. «Porciones de grasa» mantiene el valor ritual sin perder claridad.
- source_word: שׁוֹק הַיָּמִין
  english_pob_choice: the right thigh
  chosen_spanish: el muslo derecho
  alternatives_spanish:
  - la pierna derecha
  - la parte derecha de la pierna
  lexicon: HALOT
  rationale: שׁוֹק nombra la porción de la pierna en la ofrenda. «Muslo derecho» sigue de cerca la función de la pieza en el rito y es natural en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El hebreo contiene el Tetragrámaton directamente. Conforme al criterio del proyecto, se traduce por el nombre propio «Yahvé» en el texto principal, preservando la referencia al nombre del pacto y evitando el reemplazo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El pasaje coincide con el estado de revisión más reciente y no presenta cambios pendientes según el audit trail inglés; por eso se mantiene una solución cercana al original y consistente con la terminología POB para el nombre divino y el vocabulario sacrificial.
  spanish_consistency_notes:
  - Se conservó «Yahvé» para יְהוָה, en línea con la política del proyecto.
  - Se optó por «panes sin levadura» y «porciones de grasa» para mantener transparencia ritual sin tecnicismos innecesarios.
  - «Torta» se usa como equivalente funcional de חַלָּה; se evitó «oblea» en el texto principal por su posible sobrecarga cultural en español.
  - Se mantuvo la ambigüedad de לֶחֶם שֶׁמֶן con «con aceite», sin especificar si estaba mezclado, untado o preparado de otra manera.
