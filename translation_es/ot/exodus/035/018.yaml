translation:
  language: es
  text: las estacas del tabernáculo[a], y las estacas del atrio y sus cuerdas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus cordeles'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְדֹת
  english_pob_choice: pegs
  chosen_spanish: estacas
  alternatives_spanish:
  - clavijas
  - piquetes
  - piquetas
  lexicon: HALOT
  rationale: El término hebreo designa piezas para fijar o asegurar la estructura. En español, "estacas" comunica con claridad esa función de sujeción en un contexto de tienda/santuario y evita la ambigüedad de "clavijas", que puede sonar demasiado pequeña o mecánica.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del santuario
  lexicon: HALOT
  rationale: '"Tabernáculo" conserva el término cultual ya reconocido para מִשְׁכָּן y es fiel al valor del sustantivo en este inventario de objetos sagrados. "Morada" sería más literal pero demasiado general aquí.'
- source_word: הֶחָצֵר
  english_pob_choice: the courtyard
  chosen_spanish: el atrio
  alternatives_spanish:
  - el patio
  - el recinto
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, חָצֵר se refiere al espacio cercado exterior. "Atrio" es el término bíblico tradicional en español y refleja bien ese ámbito ritual; "patio" sería más cotidiano pero menos preciso en registro culto.
- source_word: מֵיתְרֵיהֶם
  english_pob_choice: their ropes
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus sogas
  - sus cordeles
  lexicon: HALOT
  rationale: El hebreo indica los elementos de amarre asociados con las estacas. "Cuerdas" reproduce la función con naturalidad en español; "sogas" puede sonar más grueso y "cordeles" más delgado de lo que el contexto sugiere.
- source_word: אֶת ... וְ/אֶת ... וְ/אֶת
  english_pob_choice: the pegs ... and the pegs ... and their ropes
  chosen_spanish: las estacas ... las estacas ... y sus cuerdas
  alternatives_spanish:
  - las estacas ... y las estacas ... y sus cuerdas
  lexicon: syntax
  rationale: El hebreo presenta una simple lista de objetos. En español se conserva la estructura inventarial con coordinación sucesiva, sin traducir el marcador de objeto directo, y manteniendo la repetición para reflejar el ritmo del original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y concuerda con el acceso auditado de la POB en inglés, sin introducir cambios respecto al pasaje revisado más reciente.
  spanish_consistency_notes:
  - Se prefirió "tabernáculo" y "atrio" como terminología cultual estable y clara en español.
  - Se eligió "cuerdas" como equivalente natural de מֵיתְרִים / מֵיתְרֵיהֶם, manteniendo la nota alternativa "cordeles" para reflejar la ambigüedad léxica preservada en la edición inglesa.
  - La lista conserva la repetición del hebreo para dar el carácter de inventario del versículo.
