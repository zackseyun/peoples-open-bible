revisions:
- from: 'Clama ahora: ¿acaso hay quien te responda? ¿Y a cuál de los santos[a] te volverás?'
  to: 'Llama ahora: ¿acaso hay quien te responda? ¿Y a cuál de los seres santos[a] te dirigirás?'
  rationale: Se ajusta קרא a una exhortación más neutra («Llama»), se reemplaza «los santos» por «los seres santos» para preservar mejor la transparencia de «holy ones» y evitar asociaciones doctrinales no deseadas en español, se mejora la naturalidad de תִּפְנֶה con «te dirigirás», y se corrige la nota para reflejar alternativas reales y la probable referencia a seres celestiales.
