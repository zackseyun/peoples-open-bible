review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: pregunta descriptiva seguida por cambio a trato directo, y preserva la repetición de ''allí''. También mantiene bien ''su amado'' y la nota sobre la incertidumbre botánica de תַּפּוּחַ. Sin embargo, hay dos problemas importantes: (1) la nota [a] está anclada en ''manzano'' pero en la evidencia inglesa esa nota corresponde a la incertidumbre de ''apple tree/apricot tree'', por lo que está bien conservarla allí; (2) la nota [b] es incorrecta en español: ''te arrojé el despertar'' no traduce la alternativa ''I aroused you'' y distorsiona el sentido. Además, ''recostada sobre su amado'' suena menos natural y menos preciso para מִתְרַפֶּקֶת עַל que ''apoyada en su amado''.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero necesita reparación menor para naturalidad y precisión. 'Debajo del manzano' puede simplificarse a 'Bajo el manzano' por fluidez poética. 'Recostada sobre su amado' resulta algo forzado en español e implica más reclinación corporal que apoyo/aferramiento; 'apoyada en su amado' comunica mejor la escena. La frase 'estuvo de parto contigo' es aceptable, aunque algo literal; conviene conservarla por fidelidad a la elección inglesa documentada.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Amado' para דּוֹדָהּ está bien. No aparecen términos teológicos de la lista global. La decisión entre 'desierto' y 'wilderness' es defendible, aunque 'desierto' estrecha algo el campo semántico; no requiere adjudicación mayor.
  issues:
  - severity: high
    issue: 'La nota [b] está mal formulada: ''te arrojé el despertar'''
    rationale: La alternativa inglesa es 'I aroused you', no una expresión española extraña. La nota actual no es español natural ni preserva el matiz semántico de עוֹרַרְתִּיךָ.
  - severity: medium
    issue: '''Recostada sobre su amado'' no es la mejor representación de מִתְרַפֶּקֶת עַל'
    rationale: El hebreo sugiere apoyo íntimo o aferramiento. En español, 'apoyada en su amado' es más natural y más cercano a 'leaning on' que 'recostada sobre', que puede sonar físicamente encima de él.
  - severity: low
    issue: '''Debajo del manzano'' podría mejorarse a ''Bajo el manzano'''
    rationale: Ambas son correctas, pero 'Bajo' suena más poético y fluido en este contexto bíblico.
