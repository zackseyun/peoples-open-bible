translation:
  language: es
  text: Pero no abandonó sus prostituciones de Egipto[a], porque en su juventud se acostaron con ella; acariciaron sus pechos de virgen[b] y derramaron sobre ella su prostitución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus fornicaciones de Egipto». El hebreo mantiene en todo el versículo la misma imaginería de prostitución para la infidelidad pactal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hicieron/manosearon los pechos de su virginidad», una imagen sexual explícita que se refiere a su explotación en la juventud.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּזְנוּתֶיהָ
  english_pob_choice: her prostitutions
  chosen_spanish: sus prostituciones
  alternatives_spanish:
  - sus fornicaciones
  - sus actos de prostitución
  - sus fornicaciones rituales
  lexicon: HALOT
  rationale: El plural abstracto conserva la idea de prácticas repetidas y, en el contexto de Ezequiel, la metáfora de infidelidad pactal. «Prostituciones» mantiene la fuerza concreta y chocante del hebreo mejor que opciones más suaves.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - originadas en Egipto
  lexicon: HALOT
  rationale: La preposición מן se entiende naturalmente como origen o procedencia. «De Egipto» refleja ese valor sin añadir interpretación.
- source_word: עָזָבָה
  english_pob_choice: did not abandon
  chosen_spanish: no abandonó
  alternatives_spanish:
  - no dejó
  - no desechó
  - no dejó de practicar
  lexicon: HALOT
  rationale: «Abandonar» expresa bien la cesación de una práctica previa y conserva un registro natural en español.
- source_word: שָׁכְבוּ אוֹתָהּ
  english_pob_choice: they had lain with her
  chosen_spanish: se acostaron con ella
  alternatives_spanish:
  - durmieron con ella
  - yacieron con ella
  lexicon: HALOT
  rationale: El verbo hebreo funciona como eufemismo sexual. «Se acostaron con ella» es claro en español y conserva el sentido sexual sin ser innecesariamente explícito.
- source_word: בִּנְעוּרֶיהָ
  english_pob_choice: in her youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando era joven
  - en su adolescencia
  - en sus años mozos
  lexicon: HALOT
  rationale: La expresión temporal se refiere a la etapa temprana de la vida; «juventud» es breve, natural y fiel al sentido.
- source_word: עִשּׂוּ דַּדֵּי בְתוּלֶיהָ
  english_pob_choice: they fondled her virgin breasts
  chosen_spanish: acariciaron sus pechos de virgen
  alternatives_spanish:
  - manosearon sus pechos de virgen
  - tocaron sus pechos de virgen
  - acariciaron el pecho de su virginidad
  lexicon: HALOT
  rationale: La frase hebrea es sexual y objetificante. «Acariciaron» sigue la revisión del POB en inglés y comunica el contacto físico-sexual; «pechos de virgen» preserva la referencia a la virginidad del hebreo.
- source_word: וַיִּשְׁפְּכ֥וּ תַזְנוּתָ֖/ם
  english_pob_choice: poured out their prostitution
  chosen_spanish: derramaron sobre ella su prostitución
  alternatives_spanish:
  - volcaron sobre ella su prostitución
  - desplegaron sobre ella su prostitución
  - vertieron sobre ella su prostitución
  lexicon: HALOT
  rationale: «Derramaron» conserva la imagen verbal de שפך y la metáfora de la actividad sexual/prostitutiva como algo vertido sobre ella. Mantener «prostitución» sostiene la consistencia léxica del verso.
- source_word: עָלֶֽי/הָ
  english_pob_choice: upon her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - sobre ella misma
  lexicon: HALOT
  rationale: «Sobre ella» reproduce el valor de עַל en una imagen figurada intensa y es natural en español contemporáneo.
theological_decisions:
- issue: Metáfora sexual profética para infidelidad pactal
  english_pob_reading: Retain the explicit sexual imagery in translation rather than soften it into abstract unfaithfulness.
  chosen_spanish_reading: Conservar la imaginería sexual explícita sin reducirla a una abstracción como «infidelidad».
  alternative_spanish_readings:
  - Pero no dejó sus infidelidades de Egipto...
  - Pero no abandonó su deslealtad de Egipto...
  rationale: Ezequiel usa lenguaje deliberadamente gráfico para denunciar la infidelidad de Jerusalén/Samaria. Una traducción suavizada perdería el impacto retórico del pasaje y borraría parte de su fuerza profética.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés al preferir un verbo de contacto sexual más natural en contexto («acariciaron») en lugar de una formulación más débil. También se mantuvo la consistencia léxica entre תַּזְנוּתֶיהָ y תַזְנוּתָם con «prostituciones/prostitución», como indica el audit trail.
  spanish_consistency_notes:
  - Se conservó la metáfora sexual a lo largo del versículo para no diluir el campo léxico de תַּזְנוּת.
  - «Pechos de virgen» refleja el énfasis de בְתוּלֶיהָ en la virginidad, sin convertirlo en una paráfrasis moral.
  - Se evitó «SEÑOR» o «Yahvé» porque este versículo no contiene el nombre divino.
  - La puntuación separa con punto y coma las dos acciones principales, siguiendo el ritmo retórico del hebreo y del POB en inglés.
