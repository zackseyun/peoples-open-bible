translation:
  language: es
  text: 'Y el rey les dijo[a]: «Lleven con ustedes a los servidores de su señor, y hagan que mi hijo Salomón monte sobre mi propia mula, y llévenlo abajo a Gihón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «hagan montar a mi hijo Salomón sobre mi propia mula». El verbo hebreo es causativo: los asistentes deben hacer que Salomón monte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  english_pob_choice: And the king said
  chosen_spanish: Y el rey les dijo
  alternatives_spanish:
  - Entonces el rey les dijo
  - Y el rey habló
  lexicon: HALOT
  rationale: Se conserva el avance narrativo del waw consecutivo con una fórmula natural en español. «Les dijo» reproduce el dativo del discurso directo con claridad y sin añadir matices.
- source_word: עַבְדֵי אֲדֹנֵיכֶם
  english_pob_choice: the servants of your lord
  chosen_spanish: a los servidores de vuestro señor
  alternatives_spanish:
  - a los siervos de vuestro señor
  - a los esclavos de vuestro señor
  lexicon: HALOT
  rationale: En el contexto cortesano, «servidores» comunica mejor la función subordinada y oficial que «esclavos», que sobrecargaría el estatuto legal. «Señor» conserva el registro reverente del hebreo y del inglés POB.
- source_word: וְהִרְכַּבְתֶּם
  english_pob_choice: have ... ride
  chosen_spanish: haced que ... monte
  alternatives_spanish:
  - haced montar a ...
  - poned a ... sobre
  lexicon: HALOT
  rationale: 'El hiphil es causativo: no dice simplemente que Salomón monte por sí mismo, sino que los destinatarios deben colocarlo para montar. «Haced que ... monte» preserva ese valor causativo en español.'
- source_word: שְׁלֹמֹה בְנִי
  english_pob_choice: my son Solomon
  chosen_spanish: mi hijo Salomón
  alternatives_spanish:
  - Salomón, mi hijo
  lexicon: HALOT
  rationale: Se mantiene el orden natural en español y el vínculo filial explícito, importante en el contexto de sucesión real.
- source_word: הַפִּרְדָּה אֲשֶׁר לִי
  english_pob_choice: my own mule
  chosen_spanish: mi propia mula
  alternatives_spanish:
  - la mula que es mía
  - mi mula
  lexicon: HALOT
  rationale: «Mi propia mula» conserva el énfasis de pertenencia y autorización real que el inglés POB resolvió con «my own mule». Se evita traducir de forma más analítica cuando el español puede expresar la misma fuerza de posesión de manera idiomática.
- source_word: גִּחוֹן
  english_pob_choice: Gihon
  chosen_spanish: Gihón
  alternatives_spanish:
  - Guijón
  lexicon: HALOT
  rationale: Es un topónimo propio y se translitera. Se mantiene la acentuación gráfica usual en español para facilitar la lectura.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la posesión a «my own mule» por naturalidad y claridad; por eso se opta por «mi propia mula» en español, que conserva el énfasis posesivo y el tono regio. También se respetó la lectura causativa del hiphil en וְהִרְכַּבְתֶּם.
  spanish_consistency_notes:
  - Se prefirió «señor» para אֲדֹנֵיכֶם siguiendo el registro cortesano del contexto.
  - «Servidores» se usa aquí como equivalente funcional de עַבְדֵי en un marco real, sin imponer «esclavos» donde el pasaje no lo subraya.
  - 'Los nombres propios se transliteran: Salomón y Gihón.'
  - La puntuación y el discurso directo siguen un español bíblico moderno y publicable sin arcaísmo excesivo.
