translation:
  language: es
  text: Y sucederá en aquel día, declara Yahvé, que me llamarás “mi esposo”, y ya no me llamarás “mi Baal[a]”.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo baʿli puede significar “mi señor”, “mi dueño” o incluso “mi esposo”; aquí se traduce “mi Baal” para preservar el juego de palabras y la probable alusión al culto a Baal en el contexto de Oseas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And in that day
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: Se absorbe el verbo auxiliar hebreo en una fórmula natural de futuro en español. “Sucederá” conserva el carácter prospectivo del giro profético sin sonar rígido.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: HALOT
  rationale: “En aquel día” es la equivalencia profética idiomática en español y mantiene el tono escatológico/covenantal del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino “Yahvé” según la norma del proyecto, y “dice” reproduce de manera sobria la fórmula profética de enunciación. “Declara” sería posible, pero aquí “dice” fluye mejor en español sin perder solemnidad.
- source_word: תִּקְרְאִי
  english_pob_choice: you will call
  chosen_spanish: me llamarás
  alternatives_spanish:
  - me dirás
  - me nombrarás
  lexicon: HALOT
  rationale: El verbo קרא aquí es el de dirigirse a alguien con un título o nombre. “Llamarás” conserva el valor relacional del acto de nombrar/dirigir.
- source_word: אִישִׁי
  english_pob_choice: My husband
  chosen_spanish: mi esposo
  alternatives_spanish:
  - mi marido
  - mi hombre
  lexicon: HALOT
  rationale: En este contexto marital, “mi esposo” comunica bien la relación de pacto restaurada. “Marido” también sería válido, pero “esposo” suena más natural y digno en español bíblico contemporáneo.
- source_word: וְלֹא תִקְרְאִי לִי עוֹד
  english_pob_choice: and you will no longer call me
  chosen_spanish: y no me llamarás más
  alternatives_spanish:
  - y ya no me llamarás
  - y no volverás a llamarme
  lexicon: HALOT
  rationale: “No me llamarás más” expresa con claridad la discontinuidad decisiva del futuro negado por עוֹד, manteniendo el paralelismo del verso.
- source_word: בַּעְלִי
  english_pob_choice: My Baal
  chosen_spanish: mi Baal
  alternatives_spanish:
  - mi señor
  - mi dueño
  - mi esposo
  lexicon: HALOT
  rationale: Se conserva el juego de palabras y la posible alusión polémica a Baal. Traducirlo como “mi señor” o “mi esposo” aplanaría la tensión léxica y teológica que el texto preserva.
theological_decisions:
- issue: Si preservar el posible eco de Baal en בַּעְלִי o resolverlo por el sentido común de ‘señor/esposo’
  english_pob_reading: My Baal
  chosen_spanish_reading: mi Baal
  alternative_spanish_readings:
  - mi señor
  - mi esposo
  - mi dueño
  rationale: En Oseas, el contraste entre la intimidad matrimonial y la terminología asociada a Baal tiene peso teológico. “Mi Baal” retiene esa tensión y evita domesticar el texto.
  doctrine_reference: Preservar la tensión léxica y teológica documentada; no resolver ambigüedad sin base textual.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español. Se mantuvo la decisión de preservar ‘mi Baal’ para no borrar la tensión léxica y teológica documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió ‘esposo’ por naturalidad y dignidad en español, sin perder el sentido marital del hebreo.
  - Se conservó ‘mi Baal’ en el texto principal para reflejar el juego de palabras y la posible referencia a Baal.
  - La puntuación y las comillas siguen usos estándar del español editorial bíblico.
