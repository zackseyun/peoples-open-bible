translation:
  language: es
  text: mientras los egipcios estaban enterrando a los que Yahvé había herido entre ellos, a todos los primogénitos, y sobre sus dioses[a] Yahvé había ejecutado juicios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "contra sus dioses".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִצְרַיִם
  english_pob_choice: while the Egyptians
  chosen_spanish: mientras los egipcios
  alternatives_spanish:
  - y los egipcios
  - ahora los egipcios
  lexicon: HALOT
  rationale: La conjunción con el sustantivo introduce un trasfondo circunstancial de acción simultánea. En español, 'mientras' comunica mejor la simultaneidad narrativa que una simple coordinación.
- source_word: מְקַבְּרִים
  english_pob_choice: were burying
  chosen_spanish: estaban enterrando
  alternatives_spanish:
  - estaban sepultando
  - enterraban
  lexicon: HALOT
  rationale: El participio expresa acción շարունակada en pasado; 'estaban enterrando' reproduce bien el valor progresivo sin sonar arcaizante.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: those whom
  chosen_spanish: a aquellos a quienes
  alternatives_spanish:
  - a quienes
  - a los que
  lexicon: HALOT
  rationale: La construcción hebrea marca el objeto directo seguido de relativo. En español, 'a aquellos a quienes' conserva la referencia personal y la progresión sintáctica del original.
- source_word: הִכָּה
  english_pob_choice: had struck down
  chosen_spanish: había herido
  alternatives_spanish:
  - había golpeado
  - había abatido
  - había herido de muerte
  lexicon: HALOT
  rationale: '''נכה'' puede expresar golpe/abatimiento con resultado letal en este contexto. ''Había herido'' mantiene la imaginería verbal; la cláusula siguiente ''a todos los primogénitos'' deja claro el alcance del juicio sin añadir una explicación ajena al texto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la convención del proyecto, evitando la sustitución por un título.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: Con un sufijo plural de personas, la preposición se entiende idiomáticamente como ubicación dentro del grupo. 'Entre ellos' suena natural en español y preserva la referencia colectiva a los egipcios.
- source_word: כָּל בְּכוֹר
  english_pob_choice: all the firstborn
  chosen_spanish: a todos los primogénitos
  alternatives_spanish:
  - a todo primogénito
  - a cada primogénito
  lexicon: HALOT
  rationale: La frase destaca la totalidad de los primogénitos alcanzados por la plaga. En español, el plural directo tras el objeto relativo evita una posesión implícita que el hebreo no exige.
- source_word: וּבֵאלֹהֵיהֶם
  english_pob_choice: and on their gods
  chosen_spanish: y contra sus dioses
  alternatives_spanish:
  - y sobre sus dioses
  - y acerca de sus dioses
  lexicon: HALOT
  rationale: Con עשה שְׁפָטִים, el ב sobre 'sus dioses' admite valor de 'contra' o 'sobre'. 'Contra' expresa con claridad el carácter judicial y polémico del acto divino.
- source_word: עָשָׂה ... שְׁפָטִים
  english_pob_choice: had executed judgments
  chosen_spanish: había ejecutado juicios
  alternatives_spanish:
  - había hecho juicios
  - había llevado a cabo juicios
  - había pronunciado juicios
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y judicial. 'Había ejecutado juicios' conserva la fuerza forense del original y evita diluir el acto en una formulación demasiado general.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto y no se sustituye por un título. Esto sigue la decisión doctrinal del proyecto y preserva la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referencia de 'sus dioses'
  english_pob_reading: retain 'their gods' as the text's claim without reinterpretation
  chosen_spanish_reading: mantener 'sus dioses' como afirmación del texto sin rebajarla a una paráfrasis
  alternative_spanish_readings:
  - sus ídolos
  - las deidades de Egipto
  - sus autoridades
  rationale: El hebreo habla directamente de los dioses de Egipto en el marco del juicio del éxodo. La traducción conserva esa afirmación sin reinterpretarla alegóricamente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de 'שְׁפָטִים'
  english_pob_reading: had executed judgments
  chosen_spanish_reading: había ejecutado juicios
  alternative_spanish_readings:
  - había realizado juicios
  - había pronunciado sentencias
  rationale: El término conserva un matiz judicial y de acto efectivo de justicia sobre los dioses de Egipto. 'Ejecutado juicios' reproduce ese peso sin suavizarlo.
  doctrine_reference: Lexical consistency — judicial act language
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del inglés POB, que ajustó la relación de 'all the firstborn' para evitar una posesión implícita. En español se reflejó como 'a todos los primogénitos', manteniendo la simultaneidad del entierro y la precisión del objeto afectado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se prefirió 'primogénitos' para בְּכוֹר en coherencia con el contexto pascual y la terminología bíblica en español.
  - '''Contra sus dioses'' mantiene la tensión judicial del hebreo; no se suaviza a ''sobre'' en el texto principal.'
  - La nota al pie está anclada explícitamente en 'a aquellos[a]' para cumplir la validación de marcadores.
