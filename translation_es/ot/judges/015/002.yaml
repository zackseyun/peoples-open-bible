translation:
  language: es
  text: 'Y su padre[a] le dijo: «De veras pensé que la aborrecías del todo, así que se la di a tu compañero. ¿No es mejor su hermana menor que ella? Por favor, que ella sea para ti en lugar de ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu amigo»; el término hebreo puede referirse ampliamente a un asociado o compañero, y en este contexto matrimonial algunos lo entienden como el hombre que acompañó a Sansón.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיהָ
  english_pob_choice: her father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ella
  - su padre le dijo
  lexicon: HALOT
  rationale: El constructo con sufijo femenino remite a la mujer mencionada en el contexto; en español, 'su padre' comunica la relación de posesión de manera natural y fiel. La inclusión de 'le dijo' queda explícita en el verbo principal del relato.
- source_word: אָמֹר אָמַרְתִּי
  english_pob_choice: I really thought
  chosen_spanish: De veras pensé
  alternatives_spanish:
  - Realmente pensé
  - Pensé ciertamente
  - De cierto pensé
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo perfecto intensifica la afirmación. 'De veras pensé' expresa bien esa fuerza enfática en español contemporáneo sin sonar mecánico.
- source_word: שָׂנֹא שְׂנֵאתָהּ
  english_pob_choice: you utterly hated her
  chosen_spanish: la aborrecías del todo
  alternatives_spanish:
  - la odiabas por completo
  - la odiabas del todo
  - la aborrecías completamente
  lexicon: HALOT
  rationale: El intensificador hebreo pide una fuerza fuerte, no una simple repetición. 'Aborrecer' comunica un rechazo intenso y evita suavizar indebidamente el verbo; 'del todo' refleja el énfasis total.
- source_word: וָאֶתְּנֶנָּה
  english_pob_choice: so I gave her
  chosen_spanish: así que se la di
  alternatives_spanish:
  - y se la di
  - por eso se la di
  lexicon: HALOT
  rationale: La waw consecutiva avanza la razón-consecuencia. En español, 'así que' reproduce bien el vínculo lógico del discurso del padre.
- source_word: לְמֵרֵעֶךָ
  english_pob_choice: to your companion
  chosen_spanish: a tu compañero
  alternatives_spanish:
  - a tu amigo
  - a tu acompañante
  - a tu compañero de boda
  lexicon: HALOT
  rationale: '''Compañero'' conserva el campo amplio de מֵרֵעַ (asociado, compañero, amigo) sin fijar más de lo que exige el texto. Mantiene también la ambigüedad documentada en la tradición auditada.'
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es
  - ¿No será
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera asentimiento. '¿No es' conserva esa fuerza en español natural y sobrio.
- source_word: אֲחֹתָהּ הַקְּטַנָּה
  english_pob_choice: her younger sister
  chosen_spanish: su hermana menor
  alternatives_spanish:
  - su hermana pequeña
  - su hermana más joven
  lexicon: HALOT
  rationale: En contexto fraternal, 'menor' es el equivalente idiomático de 'younger'. Además, evita la posible lectura afectiva de 'pequeña'.
- source_word: טוֹבָה מִמֶּנָּה
  english_pob_choice: better than she
  chosen_spanish: mejor que ella
  alternatives_spanish:
  - más buena que ella
  - mejor que la otra
  lexicon: HALOT
  rationale: '''Tov'' aquí expresa superioridad general. ''Mejor que ella'' es lo más neutro y fiel, sin restringir el juicio a belleza o valor moral específico.'
- source_word: תְּהִי נָא לְךָ
  english_pob_choice: Please let her be yours
  chosen_spanish: Te ruego que sea tuya
  alternatives_spanish:
  - Por favor, que sea tuya
  - Te suplico que sea tuya
  - Permite que sea tuya
  lexicon: HALOT
  rationale: El jussivo con 'נא' expresa ruego cortés. 'Te ruego que sea tuya' comunica la súplica de forma natural en español, sin añadir explícitamente lenguaje matrimonial que el hebreo no formula.
- source_word: תַּחְתֶּיהָ
  english_pob_choice: instead of her
  chosen_spanish: en lugar de ella
  alternatives_spanish:
  - en vez de ella
  - en su lugar
  - como sustituta de ella
  lexicon: HALOT
  rationale: '''תחת'' expresa sustitución. ''En lugar de ella'' es una equivalencia clara y corriente en español, manteniendo el sentido de reemplazo.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje hebreo con apoyo del audit trail inglés: conserva la intensificación de los verbos, la ambigüedad de מֵרֵעַ y el sentido de sustitución de תַּחַת, sin introducir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'su padre' y 'su compañero' por claridad narrativa en español, conservando la referencia relacional del hebreo.
  - La comparación final se dejó en forma neutra ('mejor que ella') para no introducir un matiz no sustentado por el hebreo.
