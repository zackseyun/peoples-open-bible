translation:
  language: es
  text: '¿No me has llamado ahora mismo[a]: «Mi Padre, tú eres el amigo[b] de mi juventud»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde ahora» o «de ahora en adelante». Aquí la expresión se entiende como una apelación reciente («ahora mismo»), no con sentido orientado al futuro.
    reason: lexical_alternative
  - marker: b
    text: O «guía». אַלּוּף puede denotar un asociado cercano, compañero o líder, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Have you not
  chosen_spanish: ¿No has...
  alternatives_spanish:
  - ¿Acaso no has...
  - ¿No has acaso...
  lexicon: HALOT
  rationale: La forma hebrea introduce una pregunta retórica que espera afirmación; en español, «¿No has...?» conserva ese valor de forma natural y directa.
- source_word: מֵעַתָּה
  english_pob_choice: just now
  chosen_spanish: ahora mismo
  alternatives_spanish:
  - recién
  - hace un momento
  - desde ahora
  lexicon: HALOT
  rationale: En este contexto señala una apelación reciente, no un sentido prospectivo de «desde ahora». «Ahora mismo» mantiene la inmediatez temporal sin forzar el texto.
- source_word: קראתי לִי
  english_pob_choice: called to me
  chosen_spanish: has llamado a mí
  alternatives_spanish:
  - has clamado a mí
  - me has llamado
  lexicon: HALOT
  rationale: El verbo con לִי expresa dirección de la llamada/apelación. «Has llamado a mí» conserva esa relación; la inversión con interrogación hace el español natural.
- source_word: אָבִי
  english_pob_choice: My Father
  chosen_spanish: Mi Padre
  alternatives_spanish:
  - Padre mío
  - Padre
  lexicon: HALOT
  rationale: Es una forma directa de invocación a Dios. «Mi Padre» reproduce el valor vocativo sin añadir marcación litúrgica ajena al hebreo.
- source_word: אַלּוּף
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  - íntimo amigo
  - guía
  lexicon: HALOT
  rationale: El campo semántico admite varios matices; siguiendo la revisión inglesa, «amigo» es el equivalente más natural en esta construcción relacional con «de mi juventud».
- source_word: נְעֻרַי
  english_pob_choice: of my youth
  chosen_spanish: de mi juventud
  alternatives_spanish:
  - desde mi juventud
  - de mis años mozos
  lexicon: HALOT
  rationale: La construcción posesiva se expresa bien con «de mi juventud», que conserva la relación genitiva y su tono idiomático.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  - tú eres
  lexicon: HALOT
  rationale: El pronombre independiente funciona como predicado copulativo; en español se expresa de modo natural con «tú eres».
theological_decisions:
- issue: Voz del pasaje y tono de la apelación
  english_pob_reading: The verse addresses personified Judah/Israel as a woman and quotes her recent appeal to the LORD.
  chosen_spanish_reading: El verso presenta a Judá/Israel personificada como mujer y cita su apelación reciente a Yahvé.
  alternative_spanish_readings:
  - Puede leerse más irónicamente, como denuncia de un arrepentimiento superficial.
  - Puede leerse como una oración sincera, sin decidir más allá del contexto.
  rationale: La forma verbal femenina y el contexto inmediato favorecen entender a Judá/Israel como destinataria personificada. La traducción conserva la cita sin resolver si la apelación fue sincera o irónica.
  doctrine_reference: Conservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se corrigió el problema previo de validación asegurando que cada marcador de nota aparezca explícitamente en el texto principal. La nota [a] quedó anclada en «amigo[a]». Se mantuvo la decisión revisada para אַלּוּף como «amigo», en línea con el último pase de revisión del auditor inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto principal cuando el referente es el nombre divino implícito en el discurso profético.
  - Se evitó «SEÑOR» como sustituto de ocultamiento del nombre divino.
  - Se conservó el tono retórico de pregunta y la cita directa con comillas españolas.
  - Se mantuvo «juventud» como equivalente estable de נְעֻרִים en este contexto relacional.
