lexical_decisions:
- source_word: ἐτάχυναν
  english_pob_choice: they hastened
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - se dieron prisa
  - aceleraron su marcha
  - se apresuraron contra ellos
  lexicon: LSJ
  rationale: El verbo aoristo de ταχύνω expresa prisa o aceleración de la acción. «Se apresuraron» conserva ese valor verbal en español natural, sin especificar más de lo que el griego dice.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  - contra aquellos
  lexicon: BDAG
  rationale: Con acción militar hostil, ἐπί con acusativo se entiende naturalmente como dirección hostil. «Contra ellos» comunica bien la oposición bélica en español.
- source_word: πόλεμον
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - combate
  - ataque
  - batalla
  lexicon: LSJ
  rationale: El objeto directo es literalmente «guerra». «Guerra» preserva el contenido léxico visible y suena natural en español al depender de «hacer guerra».
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa que pasó de una expresión demasiado literal e incómoda a una formulación natural («hastened to make war»), manteniendo el sentido de iniciar rápidamente hostilidades. Se conserva además la nota alternativa sobre la concisión del griego.
  spanish_consistency_notes:
  - Se mantiene «guerra» para πόλεμον, en coherencia con la decisión inglesa de no suavizar el sustantivo a «ataque» en el texto principal.
  - «Contra ellos» refleja el valor hostil de ἐπʼ αὐτούς sin introducir matices adicionales.
  - El registro es sobrio y publicable, evitando el calco excesivo pero sin ampliar el sentido del verso.
