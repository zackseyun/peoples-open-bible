translation:
  language: es
  text: Y ellos dirán a los habitantes de esta tierra, que han oído que tú, Yahvé, estás en medio de este pueblo, que tú, Yahvé, eres visto cara a cara[a], y que tu nube está sobre ellos, y tú vas delante de ellos en una columna de nube de día y en una columna de fuego de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te apareces cara a cara»; literalmente, «ojo a ojo eres visto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב הָאָרֶץ הַזֹּאת
  english_pob_choice: the inhabitants of this land
  chosen_spanish: los habitantes de esta tierra
  alternatives_spanish:
  - los que habitan en esta tierra
  - la gente que vive en esta tierra
  lexicon: HALOT
  rationale: El participio singular hebreo tiene fuerza colectiva. «Habitantes» conserva ese valor colectivo con naturalidad en español, y «esta tierra» refleja bien הָאָרֶץ הַזֹּאת sin perder la referencia cercana.
- source_word: שָׁמְעוּ
  english_pob_choice: have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  - han escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una realidad ya conocida por ellos. El presente perfecto «han oído» mantiene esa vigencia en español y encaja con el contexto de la reputación de Yahvé entre las naciones.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino explícito del Tetragrámaton, conforme a la convención POB. «Yahvé» es la forma española establecida en el proyecto, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - entre
  lexicon: HALOT
  rationale: «En medio de» conserva la idea de presencia inmanente y relacional, no solo local. Es la equivalencia más natural en español para esta construcción.
- source_word: עַיִן בְּעַיִן נִרְאָה
  english_pob_choice: are seen face to face
  chosen_spanish: eres visto cara a cara
  alternatives_spanish:
  - eres visto ojo a ojo
  - te manifiestas cara a cara
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ojo con ojo / ojo a ojo» con pasivo de ראה. El POB inglés optó por «face to face» en revisión reciente; en español, «cara a cara» comunica el mismo encuentro directo sin forzar una visión física absoluta, y preserva la tensión idiomática del texto.
- source_word: וַעֲנָנְךָ עֹמֵד עֲלֵהֶם
  english_pob_choice: your cloud stands over them
  chosen_spanish: tu nube está sobre ellos
  alternatives_spanish:
  - tu nube permanece sobre ellos
  - tu nube se cierne sobre ellos
  lexicon: HALOT
  rationale: «Está sobre ellos» reproduce con naturalidad el hebreo de la nube situada encima/protectora. «Se cierne» es posible, pero introduce un matiz menos estable que el original.
- source_word: וּבְעַמּוּד עָנָן
  english_pob_choice: in a pillar of cloud
  chosen_spanish: en una columna de nube
  alternatives_spanish:
  - en un pilar de nube
  - con una columna de nube
  lexicon: HALOT
  rationale: «Columna de nube» es la forma bíblica transparente y natural en español. Mantiene la imagen concreta del guía visible sin calcar de modo extraño la preposición hebrea.
- source_word: הֹלֵךְ לִפְנֵיהֶם
  english_pob_choice: you go before them
  chosen_spanish: vas delante de ellos
  alternatives_spanish:
  - caminas delante de ellos
  - los guías
  lexicon: HALOT
  rationale: «Vas delante de ellos» conserva el verbo de movimiento y la idea de precedencia directiva. «Guias» sería más interpretativo.
- source_word: וּבְעַמּוּד אֵשׁ
  english_pob_choice: in a pillar of fire
  chosen_spanish: en una columna de fuego
  alternatives_spanish:
  - en un pilar de fuego
  - con una columna de fuego
  lexicon: HALOT
  rationale: Se repite la misma solución para mantener paralelismo con «columna de nube» y reflejar la estructura hebrea.
- source_word: יוֹמָם ... לָיְלָה
  english_pob_choice: by day ... by night
  chosen_spanish: de día ... de noche
  alternatives_spanish:
  - durante el día ... durante la noche
  - by day ... by night
  lexicon: HALOT
  rationale: Son adverbios temporales idiomáticos en español. «De día» y «de noche» preservan brevedad, ritmo y paralelismo.
theological_decisions:
- issue: Nombre divino יְהוָה en el discurso de Moisés
  english_pob_reading: Yahweh / Yahweh
  chosen_spanish_reading: Yahvé / Yahvé
  alternative_spanish_readings:
  - el SEÑOR / el SEÑOR
  - Jehová / Jehová
  rationale: El versículo usa el nombre propio divino, no un título. Mantener «Yahvé» conserva la revelación del nombre del pacto y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión idiomática עַיִן בְּעַיִן נִרְאָה
  english_pob_reading: you are seen face to face
  chosen_spanish_reading: eres visto cara a cara
  alternative_spanish_readings:
  - te apareces cara a cara
  - eres visto ojo a ojo
  rationale: La frase es idiomática y no conviene resolverla demasiado. «Cara a cara» refleja el encuentro directo que el contexto sugiere, sin borrar la tensión entre el lenguaje literal «ojo a ojo» y el sentido comunicativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: La columna de nube y de fuego como signos de presencia y guía
  english_pob_reading: your cloud stands over them, and you go before them in a pillar of cloud by day and in a pillar of fire by night
  chosen_spanish_reading: tu nube está sobre ellos, y tú vas delante de ellos de día en una columna de nube y de noche en una columna de fuego
  alternative_spanish_readings:
  - tu nube permanece sobre ellos...
  - tu nube se cierne sobre ellos...
  rationale: Se conserva el paralelismo entre presencia protectora y guía visible. No se reemplaza por lenguaje más teológico abstracto, porque el hebreo presenta imágenes concretas de conducción divina.
  doctrine_reference: 'POB Translation Philosophy: preserve concrete biblical imagery where source warrants it'
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión inglesa más reciente, que prefirió «face to face» sobre «eye to eye» por naturalidad, pero también la observación auditada que advierte que el hebreo es literalmente «ojo a ojo». Por eso el español principal usa «cara a cara» por fluidez y fidelidad comunicativa, mientras la nota conserva la alternativa literal para no perder la tensión lexical del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva el paralelismo «columna de nube / columna de fuego» para reflejar el hebreo y la tradición bíblica sin cambiar el léxico base.
  - «Cara a cara» funciona como equivalente idiomático de la revisión inglesa, pero la nota asegura la transparencia al original «ojo a ojo».
  - Se usa «habitanes de esta tierra» en plural colectivo por el sentido del participio singular hebreo.
