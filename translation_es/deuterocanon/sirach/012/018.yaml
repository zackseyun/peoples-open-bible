translation:
  language: es
  text: No pasará, hasta que un fuego arda en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: “Moverá la cabeza, aplaudirá con sus manos, y murmurará mucho, y cambiará el semblante.” Este texto más amplio probablemente interpreta de manera explícita la hostilidad descrita de forma breve en el hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יַעֲבֹר
  english_pob_choice: he will not pass by
  chosen_spanish: No pasará
  alternatives_spanish:
  - No se irá
  - No seguirá adelante
  lexicon: HALOT
  rationale: עבר conserva en español el valor idiomático de avanzar o pasar de largo; en este contexto, la negación expresa perseverancia obstinada. 'No pasará' mantiene la brevedad del hebreo y la opción auditada del inglés sin forzar un giro más interpretativo.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: HALOT
  rationale: Marca el límite temporal de la acción de no pasar. 'Hasta que' es la forma natural en español para introducir ese umbral.
- source_word: תִּבְעַר
  english_pob_choice: he burns
  chosen_spanish: arda
  alternatives_spanish:
  - queme
  - se encienda
  - esté ardiendo
  lexicon: HALOT
  rationale: El valor verbal aquí es el de arder/quemar, no el de 'haber encendido'. 'Arda' refleja el presente durativo/gnómico con un castellano claro y digno, y conserva que el sujeto inmediato es el fuego/llama.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - contra él
  lexicon: HALOT
  rationale: La preposición con sufijo se vierte de modo directo como 'en él'. Aunque el contexto puede sugerir daño hostil, el hebreo conserva la localización interna y la versión principal no debe desplazarla.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: una llama
  alternatives_spanish:
  - un fuego
  - fuego
  lexicon: HALOT
  rationale: El hebreo habla de 'fuego' de forma indefinida; en español, 'una llama' transmite con naturalidad la imagen de algo que arde dentro de alguien. Se mantiene la metáfora sin añadir interpretación excesiva.
theological_decisions:
- issue: Primacía del hebreo breve frente al paralelo griego más amplio
  english_pob_reading: The main translation follows the extant Hebrew; the Greek fuller wording is preserved in a footnote because it may reflect an expanded or interpretive parallel.
  chosen_spanish_reading: La línea principal sigue el hebreo conservado; la formulación griega más extensa queda en nota como paralelo relevante.
  alternative_spanish_readings:
  - 'Seguir directamente el griego: ''Él moverá la cabeza, aplaudirá con las manos, y murmurará mucho, y cambiará el semblante.'''
  - Fusionar ambos testimonios en el texto principal.
  rationale: La política del proyecto favorece el hebreo donde se conserva, pero no borra el testimonio griego. En este caso, el griego añade gestos hostiles concretos que pueden iluminar el sentido del hebreo terso; por eso se documenta en nota sin sustituir la base hebrea.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde sobreviva; usar el paralelo griego como evidencia real sin desplazar la primacía hebrea.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que corrigió la idea de ''ha encendido'' a una construcción más natural y fiel al hebreo: el verbo describe que el fuego arde, no que el sujeto lo haya encendido. Por eso la versión española conserva la llama ardiendo como estado resultante, no una acción de encender.'
  spanish_consistency_notes:
  - Se mantuvo el pronombre singular masculino 'él' para reflejar el sufijo hebreo.
  - '''Arda'' evita tanto la pasividad como la idea de ''encender'' ajena a la revisión final.'
  - La nota conserva el contraste entre el texto hebreo breve y el paralelo griego expansivo sin mezclar ambos en el cuerpo principal.
  - Se eligió 'llama' por claridad natural en español, aunque 'fuego' sigue siendo una alternativa válida más literal.
