translation:
  language: es
  text: 'Jacob amó a Raquel[a], y dijo: «Te serviré siete años por Raquel, tu hija menor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y Jacob amó a Raquel». La conjunción inicial solo continúa la narración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - estaba enamorado de
  lexicon: HALOT
  rationale: El hebreo אָהַב expresa amor de forma directa. En español, «amó» conserva esa fuerza sin añadir una explicación interpretativa. «Amaba» podría sonar más durativo, y «estaba enamorado de» introduce una tonalidad más explícita que el hebreo no obliga a afirmar.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - afirmó
  - respondió
  lexicon: HALOT
  rationale: אמר introduce el discurso directo de manera estándar; «dijo» es la equivalencia natural y precisa en español. Otras opciones añaden matiz no requerido por el hebreo.
- source_word: אֶעֱבָדְךָ
  english_pob_choice: I will serve you
  chosen_spanish: Te serviré
  alternatives_spanish:
  - trabajaré para ti
  - te trabajaré
  lexicon: HALOT
  rationale: עבד aquí expresa labor o servicio prestado a Labán en el marco del matrimonio. «Te serviré» preserva el valor relacional y de servicio que la POB inglesa quiso mantener, sin volverlo meramente comercial.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: seven years
  chosen_spanish: siete años
  alternatives_spanish:
  - durante siete años
  lexicon: HALOT
  rationale: La expresión numérica es directa y no requiere ampliación. El español simple «siete años» reproduce fielmente la frase hebrea.
- source_word: בְּרָחֵל
  english_pob_choice: for Rachel
  chosen_spanish: por Raquel
  alternatives_spanish:
  - a cambio de Raquel
  - en favor de Raquel
  lexicon: HALOT
  rationale: La preposición ב aquí marca la base o el intercambio de la acción. En español, «por Raquel» comunica de modo breve y natural esa relación de finalidad o compensación. «A cambio de Raquel» explicita demasiado la transacción, y «en favor de» no encaja bien con el contexto.
- source_word: בִּתְּךָ
  english_pob_choice: your daughter
  chosen_spanish: tu hija
  alternatives_spanish:
  - tu hija mujer
  - tu muchacha
  lexicon: HALOT
  rationale: El sustantivo בת es «hija» con sufijo de segunda persona masculina singular. Se traduce de forma directa por claridad y fidelidad.
- source_word: הַקְּטַנָּה
  english_pob_choice: younger
  chosen_spanish: menor
  alternatives_spanish:
  - la menor
  - más joven
  lexicon: HALOT
  rationale: En contraste familiar, קטן aquí funciona como comparativo de edad/orden, no solo de tamaño. «Menor» es una opción natural en español y preserva el contraste implícito con la otra hija sin forzar una paráfrasis.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó «Now» por no estar en el hebreo; por eso el español comienza directamente con el sujeto y el verbo, sin marcador discursivo añadido. También se conservó la elección inglesa de 'serve' frente a 'work' para עבד, trasladándola a «serviré».
  spanish_consistency_notes:
  - Se usa «Raquel» como forma española estándar del nombre.
  - Se evita «SEÑOR» o sustituciones reverenciales porque no aparece el nombre divino en este versículo.
  - «hija menor» mantiene el contraste familiar sin sobreexplicar el hebreo.
  - La puntuación de diálogo sigue el español moderno con comillas angulares.
