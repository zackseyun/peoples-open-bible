translation:
  language: es
  text: Para los impíos[a], el mal fue creado, y por causa de ellos la destrucción se acaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y por causa de ellos vino a ser el diluvio». Esto refleja una cláusula final materialmente distinta del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: על רשע
  english_pob_choice: For the wicked
  chosen_spanish: Para los impíos
  alternatives_spanish:
  - Contra los impíos
  - Sobre los impíos
  - Para un impío
  lexicon: HALOT
  rationale: El על admite relación amplia ('para', 'contra', 'sobre'). En este contexto, y con el paralelo griego ἐπὶ τοὺς ἀνόμους, 'para los impíos' conserva la relación sin forzar una lectura meramente punitiva. El singular hebreo רשע funciona de modo colectivo/genericamente plural, por eso el español plural resulta natural.
- source_word: נבראה רעה
  english_pob_choice: evil was created
  chosen_spanish: el mal fue creado
  alternatives_spanish:
  - la calamidad fue creada
  - el desastre fue creado
  - el daño fue creado
  lexicon: HALOT
  rationale: רעה puede abarcar mal moral o calamidad. El POB inglés retiene 'evil' por transparencia formal; en español, 'el mal' es la correspondencia más directa y sobria, manteniendo la amplitud semántica sin estrecharla indebidamente a 'calamidad'.
- source_word: ובעבור
  english_pob_choice: and because of them
  chosen_spanish: y por causa de ellos
  alternatives_spanish:
  - y a causa de ellos
  - y por razón de ellos
  - y por ellos
  lexicon: HALOT
  rationale: בעבור expresa causalidad ('por causa de', 'a causa de'). El hebreo, complementado por el griego δι’ αὐτούς, identifica a los impíos como causa; 'por causa de ellos' preserva ese valor causal con naturalidad en español.
- source_word: תמוש
  english_pob_choice: comes to an end
  chosen_spanish: llega a su fin
  alternatives_spanish:
  - cesa
  - se aparta
  - termina
  lexicon: HALOT
  rationale: מוש puede significar moverse, retirarse o cesar. Dado el contexto, 'llega a su fin' expresa el sentido de terminación sin añadir elementos que el hebreo no obliga a entender.
- source_word: כלה
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la consumación
  - el fin
  - la ruina
  lexicon: HALOT
  rationale: כלה puede funcionar como sustantivo ('consumación, fin, destrucción') o como idea de completitud. El hebreo es condensado; en español, 'la destrucción' hace inteligible la secuencia y mantiene la fuerza de término final, sin importar la variante griega del diluvio al cuerpo principal.
theological_decisions:
- issue: Cómo reflejar la divergencia entre el hebreo conservado y el paralelo griego sobre el último hemistiquio
  english_pob_reading: Translate the Hebrew main text and preserve the Greek-based alternative in a footnote
  chosen_spanish_reading: Traducir el hebreo en el texto principal y señalar en nota la tradición griega con 'el diluvio'
  alternative_spanish_readings:
  - y por causa de ellos llegó el diluvio
  - y por ellos vino el diluvio
  rationale: En Sirácida, cuando el hebreo está conservado, el POB traduce ese testimonio como texto principal y usa el griego como control paralelo. Aquí el cierre hebreo difiere materialmente; por eso el texto principal sigue el hebreo, y la variante griega se preserva como lectura alternativa importante.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Swete Greek as parallel input.'
- issue: Si רעה debe sonar como mal moral o como calamidad castigadora
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - calamidad
  - desastre
  rationale: El término hebreo es amplio. Mantener 'mal' conserva la transparencia léxica y no obliga una reducción semántica que el contexto no exige totalmente; las opciones de calamidad/desastre quedan como alternativas auditables.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés: el segundo hemistiquio no se amplía con ideas como ''solo cuando esté completo'' ni con una explicitación ajena al hebreo. Se mantiene una solución breve y natural que refleje el cierre del texto hebreo, mientras la variante griega se reserva para la nota.'
  spanish_consistency_notes:
  - Se usó 'impíos' para τοὺς ἀνόμους / רשע en plural colectivo, en línea con el inglés 'the wicked'.
  - Se eligió 'el mal' para רעה por transparencia, evitando sustituirlo sin necesidad por 'calamidad' o 'desastre'.
  - Se tradujo el final hebreo de forma contenida ('la destrucción llega a su fin') y no se incorporó 'diluvio' al texto principal.
  - La nota distingue explícitamente la tradición griega para mantener auditable la divergencia textual.
