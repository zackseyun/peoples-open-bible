  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La nota sobre «shofar» está bien conservada. La elección «trompeta» en el texto principal concuerda con el rastro inglés. Conviene alinear mejor el doble uso de בנה con «edificadores / edificaban» en vez de «constructores / edificaban».
  issues:
