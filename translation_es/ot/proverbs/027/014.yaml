translation:
  language: es
  text: Quien bendice a su prójimo[a] a gran voz, muy de mañana[b], le será contado como una maldición[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su amigo» o «su compañero» para «su prójimo».'
    reason: lexical_alternative
  - marker: b
    text: 'El sentido es irónico: una bendición ostentosa a primera hora se recibe como si fuera una maldición.'
    reason: cultural_note
  - marker: c
    text: 'O: «le será considerada como una maldición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבָרֵךְ
  english_pob_choice: blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - saluda con bendición
  - alaba
  lexicon: HALOT
  rationale: El participio piel expresa bendecir a alguien con palabras; «bendice» conserva el sentido léxico básico sin reducirlo a un simple saludo.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su amigo
  - su compañero
  - su vecino
  lexicon: HALOT
  rationale: רֵעַ puede abarcar amigo, compañero o prójimo. «Prójimo» mantiene la relación interpersonal amplia y es natural en español bíblico contemporáneo.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con voz alta
  alternatives_spanish:
  - en voz alta
  - fuertemente
  - a gran voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta; «con voz alta» reproduce su fuerza audible sin volverla demasiado arcaica.
- source_word: בַּבֹּקֶר הַשְׁכֵּים
  english_pob_choice: rising early in the morning
  chosen_spanish: levantándose temprano por la mañana
  alternatives_spanish:
  - temprano por la mañana
  - alzándose de madrugada
  - levantándose de madrugada
  lexicon: HALOT
  rationale: La forma intensiva subraya la prisa o premura al madrugar; «levantándose temprano por la mañana» conserva la acción deliberada y el marco temporal.
- source_word: קְלָלָה
  english_pob_choice: a curse
  chosen_spanish: como una maldición
  alternatives_spanish:
  - por maldición
  - como un maldecir
  - por maldición
  lexicon: HALOT
  rationale: El sustantivo significa «maldición». En el giro final, el español fluye mejor con «como una maldición» para reflejar la ironía del dicho.
- source_word: תֵּחָשֶׁב לוֹ
  english_pob_choice: it will be counted to him as
  chosen_spanish: le será contado como
  alternatives_spanish:
  - le será considerado como
  - se le reputará como
  - le será tenido por
  lexicon: HALOT
  rationale: El nifal de חשב conserva la idea de ser contado/reputado. «Le será contado como» mantiene la pasiva y deja abierta la perspectiva del juicio social implícito.
theological_decisions:
- issue: 'Tensión irónica del proverbio: una bendición ostentosa se recibe como maldición'
  english_pob_reading: an ostentatious early-morning blessing is received as though it were a curse
  chosen_spanish_reading: una bendición dicha con ostentación y premura puede ser recibida como maldición
  alternative_spanish_readings:
  - una bendición exagerada se toma por maldición
  - una bendición matutina ruidosa cuenta como maldición
  rationale: No se suaviza la ironía del proverbio. La formulación española preserva que el problema no es la bendición en sí, sino su carácter intrusivo u ostentoso, que invierte su efecto social.
  doctrine_reference: Sabiduría proverbial; ironía retórica
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. No hubo pasajes revisados en la fuente inglesa; se conservó la ironía proverbial y la ambigüedad interpersonal de רֵעַ.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió un registro bíblico moderno y claro, evitando calcos demasiado literales donde el español exige una reformulación leve.
  - La estructura final preserva el paralelismo y la sentencia pasiva del hebreo.
