translation:
  language: es
  text: 'Sin embargo, estos podrán comer de todos los insectos alados que andan sobre cuatro patas: los que tienen patas articuladas[a] por encima de sus pies para saltar con ellas sobre la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición textual hebrea lee literalmente «que no patas»; la lectura tradicional entendida por el contexto y las versiones antiguas es «que tienen patas».
    reason: textual_variant
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Aun así
  lexicon: HALOT
  rationale: Introduce la excepción frente a la prohibición anterior; en español, «Sin embargo» transmite bien el contraste legal sin sonar arcaico.
- source_word: אֶת זֶה
  english_pob_choice: these
  chosen_spanish: esto
  alternatives_spanish:
  - estos
  - estas cosas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, en contexto introduce una clase permitida. «Esto» permite una referencia colectiva y natural en español.
- source_word: תֹּאכְלוּ
  english_pob_choice: you may eat
  chosen_spanish: comerán
  alternatives_spanish:
  - podrán comer
  - pueden comer
  lexicon: HALOT
  rationale: El contexto legal expresa permiso; en español, una construcción directa con futuro exhortativo/permisionario resulta natural y fiel al registro normativo.
- source_word: מִכֹּל שֶׁרֶץ הָעוֹף
  english_pob_choice: from all the swarming things that fly
  chosen_spanish: de entre todo insecto alado
  alternatives_spanish:
  - de entre todas las criaturas que se arrastran y vuelan
  - de todo ser alado que enjambra
  lexicon: HALOT
  rationale: «שֶׁרֶץ» apunta a criaturas pequeñas que pululan; en este contexto zoológico, «insecto» comunica bien la clase sin imponer «ave». «Alado» conserva el rasgo de vuelo.
- source_word: הַהֹלֵךְ עַל אַרְבַּע
  english_pob_choice: that go on all fours
  chosen_spanish: que anda sobre cuatro patas
  alternatives_spanish:
  - que camina en cuatro
  - que va sobre cuatro
  lexicon: HALOT
  rationale: «Anda sobre cuatro patas» refleja el movimiento de manera clara y fluida en español, manteniendo la imagen de locomoción sobre cuatro miembros.
- source_word: אֲשֶׁר לא כְרָעַיִם
  english_pob_choice: those that have jointed legs
  chosen_spanish: los que tienen patas articuladas
  alternatives_spanish:
  - los que tienen patas para saltar
  - los que tienen piernas unidas
  lexicon: HALOT
  rationale: La tradición textual comprende aquí que sí tienen patas especiales; «articuladas» preserva la idea funcional de extremidades adaptadas al salto sin forzar un tecnicismo excesivo.
- source_word: מִמַּעַל לְרַגְלָיו
  english_pob_choice: above their feet
  chosen_spanish: arriba de sus pies
  alternatives_spanish:
  - encima de sus pies
  - por encima de sus pies
  lexicon: HALOT
  rationale: 'Sigue de cerca la relación espacial del hebreo: las patas especiales están situadas por encima/debajo de la referencia de los pies ordinarios. «Pies» mantiene la imagen anatómica concreta.'
- source_word: לְנַתֵּר
  english_pob_choice: to hop
  chosen_spanish: para saltar
  alternatives_spanish:
  - para brincar
  - para dar saltos
  lexicon: HALOT
  rationale: «Saltar» transmite la función locomotora del término con naturalidad en español; es suficientemente cercano a «hop» y no introduce una imagen demasiado coloquial.
- source_word: בָּהֵן
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - por medio de ellas
  - mediante ellas
  lexicon: HALOT
  rationale: El referente son las patas especiales; «con ellas» conserva la relación instrumental y evita ambigüedad.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en el suelo
  - sobre el suelo
  lexicon: HALOT
  rationale: «Tierra» conserva la amplitud del hebreo y el registro bíblico, sin depender de «suelo», que en español puede sonar más restringido al piso físico.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece anclado en el texto español junto a «insecto alado[a]». La redacción sigue de cerca el paquete fuente hebreo y el rastro auditado inglés, conservando la tensión textual de la lectura tradicional frente al ketiv.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Patas» y «pies» se distinguen de forma funcional para reflejar la anatomía descrita en el hebreo.
  - Se evitó «aves» o «fowl» para no borrar el valor zoológico amplio de שֶׁרֶץ הָעוֹף en este contexto.
  - El plural implícito de la clase permitida se maneja naturalmente con «esto» y el verbo en futuro normativo en español.
