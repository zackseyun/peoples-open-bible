lexical_decisions:
- source_word: חֲצַר גַּדָּה
  english_pob_choice: Hazar-gaddah
  chosen_spanish: Hazar-Gadda
  alternatives_spanish:
  - HazarGadda
  - Hazar-Gadda
  lexicon: HALOT
  rationale: Es un topónimo; se translitera en español en vez de traducirse como 'enclosure/recinto'. Mantengo la forma compuesta del nombre propio y adapto la grafía al español con mayúsculas y guion para reflejar el compuesto sin añadir interpretación.
- source_word: חֶשְׁמוֹן
  english_pob_choice: Heshmon
  chosen_spanish: Hesmón
  alternatives_spanish:
  - Jesmón
  - Heshmón
  lexicon: HALOT
  rationale: Es un nombre de lugar. La adaptación 'Hesmón' conserva la referencia toponímica y suena natural en español bíblico, sin sobretraducir ni descomponer el nombre.
- source_word: בֵּית פָּלֶט
  english_pob_choice: Beth-pelet
  chosen_spanish: Bet-pelet
  alternatives_spanish:
  - Beth-pelet
  - Casa de Pelet
  lexicon: HALOT
  rationale: En una lista territorial, el hebreo funciona como nombre de lugar. Conservo el compuesto toponímico y uso 'Bet-' como transliteración de בֵּית, evitando traducirlo como 'casa de' para no perder el valor onomástico.
- source_word: וְ / וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea coordina los tres topónimos. En español se rinde con 'y'; no hace falta 'e' porque las palabras siguientes no comienzan con sonido /i/.
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo revisiones sustantivas; la versión española sigue la misma lista de topónimos con transliteración consistente y sin expansión interpretativa.
  spanish_consistency_notes:
