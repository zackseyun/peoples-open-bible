translation:
  language: es
  text: y investigarás[a], y escudriñarás, y preguntarás con diligencia; y he aquí, si es verdad y es cierto el asunto[b] que esta abominación se ha cometido en medio de ti,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «inquirirás».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si el informe es verdadero y el asunto está establecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָרַשְׁתָּ
  english_pob_choice: you shall investigate
  chosen_spanish: investigarás
  alternatives_spanish:
  - inquirirás
  - buscarás
  lexicon: HALOT
  rationale: En este contexto legal, דרש expresa una indagación formal. «Investigarás» conserva el valor de examen judicial y el tono actual de la POB en inglés.
- source_word: וְחָקַרְתָּ
  english_pob_choice: search out
  chosen_spanish: escudriñarás
  alternatives_spanish:
  - examinarás
  - sondearás
  lexicon: HALOT
  rationale: חקר intensifica la búsqueda y el examen cuidadoso. «Escudriñarás» mantiene esa idea de indagación minuciosa y distingue bien este verbo del anterior.
- source_word: וְשָׁאַלְתָּ הֵיטֵב
  english_pob_choice: inquire thoroughly
  chosen_spanish: preguntarás con diligencia
  alternatives_spanish:
  - inquirirás cuidadosamente
  - harás una investigación diligente
  lexicon: HALOT
  rationale: שאל puede significar preguntar o inquirir; הֵיטֵב añade intensidad. «Preguntarás con diligencia» suena natural en español y refleja la insistencia del hebreo sin perder la fuerza procesal.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y en efecto
  lexicon: HALOT
  rationale: «Y he aquí» reproduce el marcador discursivo de constatación o resultado, con un registro bíblico comprensible en español.
- source_word: אֱמֶת
  english_pob_choice: 'true'
  chosen_spanish: verdad
  alternatives_spanish:
  - verdadero
  - cierto
  lexicon: HALOT
  rationale: En la fórmula evaluativa, אמת funciona como predicado de veracidad. «Verdad» permite mantener la conexión con la otra mitad de la pareja confirmatoria en español.
- source_word: נָכוֹן
  english_pob_choice: certain
  chosen_spanish: confirmado
  alternatives_spanish:
  - establecido
  - cierto
  lexicon: HALOT
  rationale: נכון comunica que el asunto ha quedado asentado o verificado. «Confirmado» expresa bien la conclusión judicial de la pesquisa y evita una repetición menos natural de «cierto».
- source_word: הַדָּבָר
  english_pob_choice: it / the matter / the report
  chosen_spanish: que
  alternatives_spanish:
  - el asunto
  - el informe
  lexicon: HALOT
  rationale: La sintaxis española fluye mejor integrando el antecedente en una subordinada introducida por «que», sin añadir contenido ajeno. La referencia sigue siendo el asunto investigado.
- source_word: נֶעֶשְׂתָה
  english_pob_choice: has been done
  chosen_spanish: ha sido hecha
  alternatives_spanish:
  - ha sido cometida
  - ha ocurrido
  lexicon: HALOT
  rationale: El perfecto pasivo de עשה comunica que el hecho ya se realizó. «Ha sido hecha» conserva la pasividad del hebreo; en español se entiende que se trata del acto abominable.
- source_word: הַתּוֹעֵבָה הַזֹּאת
  english_pob_choice: this abomination
  chosen_spanish: esta abominación
  alternatives_spanish:
  - esta cosa abominable
  - esta detestable acción
  lexicon: HALOT
  rationale: תועבה es un término fuerte de repulsión moral y cultual. «Abominación» mantiene el peso técnico y bíblico que la POB preserva en inglés.
- source_word: בְּקִרְבֶּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - entre ustedes
  - dentro de tu comunidad
  lexicon: HALOT
  rationale: La expresión hebrea señala presencia dentro de la comunidad del pacto. «En medio de ti» es natural en español y reproduce esa localización comunitaria.
theological_decisions:
- issue: Fórmula judicial de verificación
  english_pob_reading: if it is true and certain that this abomination has been done in your midst
  chosen_spanish_reading: si es verdad y está confirmado que esta abominación ha sido hecha en medio de ti
  alternative_spanish_readings:
  - si el informe es verdadero y el asunto está establecido
  - si resulta verdad y cierto que esta abominación se ha cometido en medio de ti
  rationale: El hebreo acumula verbos de investigación y luego una fórmula de confirmación. La redacción española conserva esa secuencia judicial sin forzar un calco extraño, y deja ver que el resultado del examen es una constatación objetiva.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve legal verification and covenant seriousness without paraphrase'
translation_notes:
  revision_awareness: Se siguió de cerca el estado revisado del audio-tirón en inglés, sin cambios reportados en la última pasada; la formulación española refleja la misma conclusión legal y mantiene la fuerza de los tres verbos de indagación y de la cláusula confirmatoria.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general, pero este versículo no lo contiene.
  - Se preservó el registro legal y el valor intensivo de los tres verbos hebreos sin colapsarlos en una sola idea.
  - «Abominación» se conserva por coherencia con el término técnico bíblico que la POB mantiene en inglés.
  - La subordinada final en español evita una estructura demasiado literal de «la cosa», pero no añade contenido doctrinal nuevo.
