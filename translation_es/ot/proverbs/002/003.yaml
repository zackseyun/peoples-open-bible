translation:
  language: es
  text: Sí[a], si clamas por el entendimiento y alzas tu voz por el discernimiento,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sí» refleja el valor enfático de כִּי אִם, más que una simple condicional desnuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: yes, if
  chosen_spanish: Sí, si
  alternatives_spanish:
  - Ciertamente, si
  - Por cierto, si
  - Así que, si
  lexicon: HALOT
  rationale: La secuencia introduce una continuación condicional con énfasis. «Sí, si» conserva tanto la fuerza enfática como la apertura condicional sin volverlo rígidamente literal.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la comprensión
  - el discernimiento
  - la perspicacia
  lexicon: HALOT
  rationale: «Entendimiento» es una opción natural en español para el sustantivo sapiencial בינה y mantiene el paralelismo con el término siguiente sin borrar la relación cercana entre ambos.
- source_word: תִקְרָא
  english_pob_choice: call out
  chosen_spanish: clamas
  alternatives_spanish:
  - llamas
  - clamas en voz alta
  - gritas
  lexicon: HALOT
  rationale: El verbo expresa una apelación vocal intensa. «Clamar» comunica mejor esa urgencia que un simple «llamar» y encaja bien en el registro sapiencial.
- source_word: תְּבוּנָה
  english_pob_choice: discernment
  chosen_spanish: el discernimiento
  alternatives_spanish:
  - el entendimiento
  - la perspicacia
  - la inteligencia
  lexicon: HALOT
  rationale: «Discernimiento» preserva la cercanía semántica con בינה, pero permite distinguir en español los dos términos sapienciales sin fundirlos en una sola idea.
- source_word: תִּתֵּן קוֹלֶךָ
  english_pob_choice: lift up your voice
  chosen_spanish: alzas tu voz
  alternatives_spanish:
  - levantas tu voz
  - elevarás tu voz
  - levantas la voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala intensidad vocal. «Alzas tu voz» mantiene la imagen de elevar la voz y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El contexto inglés pasó de «raise your voice» a «lift up your voice» para acercarse más a la imagen hebrea. El español «alzas tu voz» sigue esa misma dirección idiomática sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo la pareja sapiencial como «entendimiento» / «discernimiento» para reflejar la cercanía pero no identidad total de בינה y תְּבוּנָה.
  - Se usó «clamas» para expresar la fuerza vocal de קרא en este contexto exhortativo.
  - No se recurrió a «SEÑOR» ni a terminología eclesiástica ajena al versículo, porque el texto no contiene el tetragrámaton ni léxico cultual.
