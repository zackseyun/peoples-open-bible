translation:
  language: es
  text: Porque tu furor contra mí y tu arrogancia[a] han subido a mis oídos, pondré mi gancho en tu nariz y mi freno en tus labios, y te haré volver por el camino por el que viniste.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu complacencia'; el hebreo puede denotar estar tranquilo, en seguridad o complacido, y en este contexto probablemente sugiere una seguridad arrogante.
    reason: lexical_alternative
  - marker: b
    text: O 'por el camino por el cual viniste'.
    reason: previous_rendering
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce con naturalidad la causa de la sentencia, conservando el valor causal del hebreo sin endurecer el español.
- source_word: הִתְרַגֶּזְךָ אֵלַי
  english_pob_choice: your raging against me
  chosen_spanish: tu furor contra mí
  alternatives_spanish:
  - tu rabia contra mí
  - tu enfurecimiento contra mí
  - tu ira contra mí
  lexicon: HALOT
  rationale: El hebreo expresa una agitación o furor hostil dirigido a Dios. 'Furor' preserva la intensidad y suena más sobrio y bíblico que una paráfrasis psicológica.
- source_word: שַׁאֲנַנְךָ
  english_pob_choice: your complacency
  chosen_spanish: tu arrogancia
  alternatives_spanish:
  - tu complacencia
  - tu autosuficiencia
  - tu seguridad
  lexicon: HALOT
  rationale: El audit trail inglés preserva la tensión entre 'complacency' y la posibilidad de 'arrogance'. En este contexto de juicio, 'arrogancia' comunica mejor la insolente confianza del rey sin perder el trasfondo de seguridad presuntuosa.
- source_word: עָלָה בְאָזְנַי
  english_pob_choice: have come up into my ears
  chosen_spanish: han subido a mis oídos
  alternatives_spanish:
  - han llegado a mis oídos
  - han ascendido hasta mis oídos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de algo que 'sube' hasta los oídos de Dios, manteniendo el antropomorfismo del hebreo y la fuerza auditiva del giro.
- source_word: חַחִי
  english_pob_choice: my hook
  chosen_spanish: mi gancho
  alternatives_spanish:
  - mi aro
  - mi anzuelo
  - mi gancho de nariz
  lexicon: HALOT
  rationale: '''Gancho'' es natural en español y conserva el instrumento de control. No se añade ''de nariz'' en el sustantivo porque la ubicación queda clara por el complemento siguiente.'
- source_word: בְּאַפֶּךָ
  english_pob_choice: in your nose
  chosen_spanish: en tu nariz
  alternatives_spanish:
  - en tus fosas nasales
  - en tu hocico
  lexicon: HALOT
  rationale: '''Nariz'' reproduce la imagen corporal del hebreo de forma directa y digna; ''hocico'' sería demasiado zoológico para el registro español de esta traducción.'
- source_word: מִתְגִּי
  english_pob_choice: my bit
  chosen_spanish: mi freno
  alternatives_spanish:
  - mi bocado
  - mi bridón
  - mi freno de caballo
  lexicon: HALOT
  rationale: En español, 'freno' comunica el implemento de control con claridad y naturalidad. 'Bocado' o 'bridón' serían más técnicos o menos transparentes para lectura pública.
- source_word: בִּשְׂפָתֶיךָ
  english_pob_choice: in your lips
  chosen_spanish: en tus labios
  alternatives_spanish:
  - entre tus labios
  - en tu boca
  lexicon: HALOT
  rationale: Se mantiene la imagen literal del hebreo. 'Labios' es más fiel que 'boca' y conserva el paralelismo con el instrumento de control.
- source_word: וַהֲשִׁיבֹתִיךָ
  english_pob_choice: I will turn you back
  chosen_spanish: te haré volver
  alternatives_spanish:
  - te devolveré
  - te haré regresar
  - te llevaré de vuelta
  lexicon: HALOT
  rationale: El causativo de שוב se expresa bien con 'haré volver', que en español suena natural y mantiene la acción divina de forzar el retorno.
- source_word: בַּדֶּרֶךְ אֲשֶׁר בָּאתָ בָּהּ
  english_pob_choice: by the way that you came
  chosen_spanish: por el camino por el que viniste
  alternatives_spanish:
  - por el camino que viniste
  - por la misma ruta por la que viniste
  lexicon: HALOT
  rationale: Se conserva la idea de reversión del trayecto en un español fluido. 'Viniste' expresa el pasado del movimiento y evita una calca rígida de la estructura relativa.
theological_decisions:
- issue: Antropomorfismo divino y control animal del enemigo
  english_pob_reading: Retain the concrete imagery ('into my ears,' 'my hook,' 'my bit') without softening it into abstraction.
  chosen_spanish_reading: Mantener la imagen concreta ('a mis oídos', 'mi gancho', 'mi freno') sin convertirla en mera abstracción.
  alternative_spanish_readings:
  - He escuchado tu arrogancia, así que te restringiré y te haré volver
  - Pondré límites a tu soberbia y te enviaré de regreso
  rationale: El hebreo usa un lenguaje vívido y corporal para afirmar la soberanía de Dios sobre el rey asirio. La versión española preserva esa fuerza sin suavizarla, respetando el registro imagético del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Tensión lexical entre 'complacency' y 'arrogance' para שַׁאֲנַן
  english_pob_reading: The Hebrew term can denote being at ease or secure, and in context likely carries the sense of arrogant self-assurance.
  chosen_spanish_reading: '''Arrogancia'' como lectura contextual principal, con el trasfondo de seguridad presuntuosa.'
  alternative_spanish_readings:
  - complacencia
  - seguridad
  - autosuficiencia
  rationale: Como el contexto es de juicio contra la amenaza asiria, la palabra española debe conservar la nota de insolencia y auto-confianza, sin borrar el matiz básico de estar 'en calma' o 'seguro'.
  doctrine_reference: HALOT; English audit footnote a
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y se mantuvo su decisión de no suavizar la imaginería corporal. Para el giro final, el español usa una formulación natural ('por el camino por el que viniste') que conserva el sentido de retorno sin la rigidez de una calca.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino explícito; la primera persona divina en el texto se deja como 'mí/mis'.
  - Se conserva el paralelismo corporal y el tono de juicio sin sustituirlo por lenguaje devocional más tradicional.
  - '''Freno'' se prefiere a ''bocado'' por claridad pública en español, aunque ambos reflejan el mismo campo semántico de control animal.'
