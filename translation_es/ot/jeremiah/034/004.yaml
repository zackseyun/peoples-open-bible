  - severity: low
    issue: «acerca de ti» después de «Así dice Yahvé»
    rationale: No es incorrecto, pero en español suena algo explicativo y menos idiomático en registro profético. «respecto de ti» preserva mejor el sentido de עָלֶיךָ como pronunciamiento concerniente a la persona.
  revised_spanish_text: 'Pero escucha la palabra de Yahvé, Sedecías, rey de Judá: Así dice Yahvé respecto de ti: No morirás a espada.'
  revision_rationale: 'Se hacen dos ajustes menores para mejorar fidelidad estilística y legibilidad eclesial del español: «Sedecías» como forma bíblica más establecida del nombre, y «respecto de ti» como formulación más natural del oráculo que conserva el valor de עָלֶיךָ. No se requieren notas al pie.'
