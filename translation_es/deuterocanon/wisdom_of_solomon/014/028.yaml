revisions:
- from: Pues, ya sea que, mientras hacen fiesta, enloquecen; o profetizan mentiras; o viven injustamente; o juran falsos juramentos rápidamente.
  to: Pues o bien, mientras festejan[a], enloquecen; o profetizan mentiras; o viven injustamente; o juran en falso[b] rápidamente.
  rationale: Se ajustó la sintaxis inicial para que la serie disyuntiva suene natural en español y refleje mejor el valor de ἢ γὰρ. Se reemplazó 'juran falsos juramentos' por 'juran en falso', que conserva la idea de juramento falso sin calco redundante. Se añadieron notas para las alternativas léxicas ya documentadas en la auditoría inglesa.
