translation:
  language: es
  text: Sin culpa[a], ellos corren y se ponen en su lugar; despierta para encontrarme y mira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corren y se preparan». El segundo verbo también puede expresar que se afirman o se disponen para actuar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלִי
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin la presencia de
  - careciendo de
  lexicon: HALOT
  rationale: La partícula expresa ausencia o carencia. En español, «sin» es la equivalencia más natural y directa, y conserva la brevedad del hebreo.
- source_word: עָוֺן
  english_pob_choice: guilt
  chosen_spanish: culpa
  alternatives_spanish:
  - iniquidad
  - maldad
  - delito
  lexicon: HALOT
  rationale: El contexto de protesta contra acusadores favorece una noción de responsabilidad o culpabilidad. «Culpa» mantiene el matiz moral-jurídico sin recurrir a un término más arcaico que en español suena menos natural.
- source_word: יְרוּצוּן
  english_pob_choice: they run
  chosen_spanish: ellos corren
  alternatives_spanish:
  - ellos se apresuran
  - ellos van corriendo
  lexicon: HALOT
  rationale: El verbo básico רוץ es correr/hastenerse. «Corren» conserva la imagen verbal concreta del hebreo y sigue siendo idiomático en español.
- source_word: וְיִכּוֹנָנוּ
  english_pob_choice: and set themselves in place
  chosen_spanish: y se ponen en posición
  alternatives_spanish:
  - y se preparan
  - y se establecen
  lexicon: HALOT
  rationale: El valor de כון en forma reflexiva puede sugerir situarse firmemente o disponerse para actuar. «Se ponen en posición» conserva la idea concreta de acomodarse/disponerse sin forzar demasiado una lectura exclusivamente militar; «se preparan» es posible pero más interpretativo.
- source_word: עוּרָה
  english_pob_choice: awake
  chosen_spanish: despierta
  alternatives_spanish:
  - despiértate
  - levántate
  - ríndete a la acción
  lexicon: HALOT
  rationale: Se trata de un imperativo dirigido a Dios. «Despierta» mantiene la metáfora poética de transición de inacción aparente a intervención, como en la POB inglesa.
- source_word: לִקְרָאתִי
  english_pob_choice: to meet me
  chosen_spanish: para salir a mi encuentro
  alternatives_spanish:
  - para encontrarme
  - para venir a mi encuentro
  - para confrontarme
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «a mi encuentro». En español, «salir a mi encuentro» comunica la misma idea idiomática con mayor naturalidad que un calco literal.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y toma nota
  lexicon: HALOT
  rationale: El imperativo de ראה admite «ver» o «mirar». «Mira» resulta más natural en español en una súplica poética, sin añadir contenido ajeno.
theological_decisions:
- issue: Antropomorfismo en la petición dirigida a Dios
  english_pob_reading: Retain the metaphor 'awake' rather than paraphrasing it away.
  chosen_spanish_reading: Conservar «despierta» como metáfora de intervención divina.
  alternative_spanish_readings:
  - alza tu intervención
  - ruge y actúa
  - levántate
  rationale: El hebreo usa lenguaje antropomórfico para pedir que Dios actúe. Mantener la metáfora respeta la tensión poética y teológica del lamento sin sugerir un sueño literal en Dios.
  doctrine_reference: Poética bíblica / lenguaje antropomórfico en la oración
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético de Salmos 59:5 y toma como control la solución auditada en inglés: «Without guilt, they run and set themselves in place; awake to meet me and see.» Se conserva la tensión del segundo verbo כון como disposición/establecimiento, sin cerrarlo de forma excesiva. No se registraron revisiones aplicadas en la base inglesa reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque el hebreo no contiene el nombre divino explícito aquí.
  - Se eligió un registro digno y contemporáneo, evitando arcaísmos innecesarios.
  - «Culpa» se usa por su fuerza moral-jurídica y su naturalidad en español; no se traduce con «iniquidad» para no introducir arcaísmo.
  - La nota al pie preserva la alternativa lexical del segundo verbo, como en el audit trail inglés.
