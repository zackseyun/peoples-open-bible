translation:
  language: es
  text: 'Y otro cayó en la tierra buena[a], y al crecer, produjo fruto ciento por uno[b]. Mientras decía estas cosas, clamaba: «El que tiene oídos para oír, oiga»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la buena tierra»; también «el buen suelo».
    reason: lexical_alternative
  - marker: b
    text: O «dio fruto ciento por uno».
    reason: lexical_alternative
  - marker: c
    text: 'Forma tradicional: «El que tiene oídos para oír, oiga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - otro más
  lexicon: BDAG
  rationale: ἕτερον señala un elemento distinto dentro de la serie del sembrador; en español, «otro» conserva la secuencia narrativa de manera natural y fiel.
- source_word: γῆν τὴν ἀγαθήν
  english_pob_choice: the good soil
  chosen_spanish: la tierra buena
  alternatives_spanish:
  - el buen suelo
  - la buena tierra
  lexicon: BDAG
  rationale: Aquí γῆ se refiere a la superficie agrícola receptiva; «tierra buena» suena natural en español y mantiene la amplitud de γῆ sin forzar «suelo» como único equivalente técnico.
- source_word: φυὲν
  english_pob_choice: when it grew
  chosen_spanish: al crecer
  alternatives_spanish:
  - cuando creció
  - después de crecer
  lexicon: BDAG
  rationale: El participio aoristo indica crecimiento anterior a la acción principal. «Al crecer» conserva la relación temporal de forma breve y fluida en español.
- source_word: ἐποίησεν καρπὸν
  english_pob_choice: it produced fruit
  chosen_spanish: produjo fruto
  alternatives_spanish:
  - dio fruto
  - llevó fruto
  lexicon: BDAG
  rationale: «Producir fruto» es una traducción clara y directa del verbo con καρπός. Se evita «dio fruto» por ser también posible, pero algo más idiomático que semánticamente menos explícito aquí.
- source_word: ἑκατονταπλασίονα
  english_pob_choice: a hundredfold
  chosen_spanish: ciento por uno
  alternatives_spanish:
  - cien veces más
  - cien por uno
  lexicon: BDAG
  rationale: La forma tradicional y transparente en español para expresar multiplicación abundante es «ciento por uno», que comunica el valor de ἑκατονταπλασίονα sin perder el matiz idiomático.
- source_word: ταῦτα λέγων
  english_pob_choice: As he said these things
  chosen_spanish: Mientras decía estas cosas
  alternatives_spanish:
  - Diciendo estas cosas
  - Al decir estas cosas
  lexicon: BDAG
  rationale: La construcción participial expresa simultaneidad con ἐφώνει; «Mientras decía estas cosas» conserva esa superposición temporal con un español natural.
- source_word: ἐφώνει
  english_pob_choice: he called out
  chosen_spanish: clamaba
  alternatives_spanish:
  - gritaba
  - proclamaba
  lexicon: BDAG
  rationale: El imperfecto de φωνέω comunica una voz audible y enfática. «Clamaba» mantiene el tono solemne y exhortativo del pasaje sin exagerar hacia un grito estridente.
- source_word: Ὁ ἔχων ὦτα ἀκούειν
  english_pob_choice: He who has ears to hear
  chosen_spanish: El que tiene oídos para oír
  alternatives_spanish:
  - Quien tiene oídos para oír
  - El que tenga oídos para oír
  lexicon: BDAG
  rationale: Se conserva la fórmula tradicional del dicho de Jesús en una forma plenamente natural para el español. «El que» mantiene la singularidad representativa sin requerir marcado masculino explícito en la pronominalización posterior.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo de tercera persona se expresa con el subjuntivo exhortativo «oiga», que es la manera más natural y solemne en español bíblico contemporáneo.
theological_decisions:
- issue: Fórmula exhortativa final y su fuerza representativa
  english_pob_reading: 'Traditional: ''He who has ears to hear, let him hear.'''
  chosen_spanish_reading: «El que tiene oídos para oír, oiga»
  alternative_spanish_readings:
  - «Quien tiene oídos para oír, oiga»
  - «El que tiene oídos para oír, que oiga»
  rationale: La frase conserva la función proverbial y exhortativa de Jesús. En español, la forma tradicional es suficientemente clara y solemne, y el subjuntivo «oiga» comunica bien el imperativo de tercera persona sin añadir dureza innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor semántico de γῆν τὴν ἀγαθήν
  english_pob_reading: the good soil / Or 'the good ground.'
  chosen_spanish_reading: la tierra buena
  alternative_spanish_readings:
  - el buen suelo
  - la buena tierra
  rationale: El texto habla de la receptividad del terreno en la parábola; «tierra buena» mantiene la imagen agrícola y permite que el lector perciba la cualidad del terreno sin reducirlo a un tecnicismo.
  doctrine_reference: 'Lexical policy: preserve source imagery where the metaphor is central'
translation_notes:
  revision_awareness: 'El auditorio inglés revisó dos puntos: (1) el participio φυὲν pasó de una traducción más explícita a una más natural («when it grew»), y (2) la fórmula de Ὁ ἔχων se ajustó de una redacción neutra a la tradicional «He who has». En español se optó por una solución equivalente y natural, «Al crecer» y «El que tiene», manteniendo el registro solemne sin sobretraducir el original. La multiplicación ἑκατονταπλασίονα se expresó con la locución idiomática «ciento por uno», ya usada de forma estable en español bíblico para este valor.'
  spanish_consistency_notes:
  - Se conserva el presente exhortativo con subjuntivo («oiga») para ἀκουέτω, coherente con el valor de mandato de tercera persona.
  - «Tierra buena» mantiene la metáfora agrícola de γῆν τὴν ἀγαθήν sin imponer la distinción técnica entre suelo y tierra.
  - La puntuación separa la frase narrativa de la cita directa para reflejar el cambio de discurso del griego.
  - No se introdujo lenguaje teológico adicional que no esté en el verso.
  - La nota a ofrece una alternativa léxica real en español, paralela a la del audit trail inglés.
