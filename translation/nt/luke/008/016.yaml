  text: Οὐδεὶς δὲ λύχνον ἅψας καλύπτει αὐτὸν σκεύει ἢ ὑποκάτω κλίνης τίθησιν, ἀλλ’ ἐπὶ λυχνίας ⸀τίθησιν, ἵνα οἱ εἰσπορευόμενοι βλέπωσιν τὸ φῶς.
translation:
  text: 'Now no one, after lighting a lamp, covers it with a container or puts it under a bed, but puts it on a lampstand, so that those who come in may see the light.'
