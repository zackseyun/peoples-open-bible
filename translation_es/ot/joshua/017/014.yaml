base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/014.yaml
  text: Then the sons of Joseph spoke to Joshua[a], saying, “Why have you given me one lot and one portion as an inheritance, though I am a numerous people, since Yahweh has blessed me until now?”
  footnotes:
