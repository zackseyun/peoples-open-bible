translation:
  language: es
  text: Porque, mientras andan entre sus obras[a], las examinan con cuidado, y quedan persuadidos por la vista, ya que las cosas que se ven son hermosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas que se ven son buenas». El griego καλὰ puede significar tanto «hermosas» como «buenas»; aquí se eligió «hermosas» porque el versículo resalta la persuasión por medio de la vista.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστρεφόμενοι
  english_pob_choice: while moving among
  chosen_spanish: mientras se mueven entre
  alternatives_spanish:
  - mientras viven entre
  - mientras se ocupan de
  - mientras andan entre
  lexicon: BDAG
  rationale: El participio expresa un desplazamiento o conducta dentro del ámbito de las obras; en español, «mientras se mueven entre» conserva el matiz espacial y experiencial sin volverlo demasiado abstracto.
- source_word: διεραυνῶσιν
  english_pob_choice: examine them closely
  chosen_spanish: las examinan con cuidado
  alternatives_spanish:
  - las investigan a fondo
  - las examinan minuciosamente
  - las escudriñan
  lexicon: LSJ
  rationale: El verbo intensifica la idea de búsqueda cuidadosa. «Las examinan con cuidado» es natural en español y mantiene la fuerza de una observación deliberada y atenta.
- source_word: πείθονται
  english_pob_choice: they are persuaded
  chosen_spanish: se dejan persuadir
  alternatives_spanish:
  - son persuadidos
  - quedan convencidos
  - se convencen
  lexicon: BDAG
  rationale: La forma pasiva/middle destaca que el observador es ganado por la evidencia visual. «Se dejan persuadir» conserva ese matiz causal y relacional mejor que una simple afirmación de convicción.
- source_word: τῇ ὄψει
  english_pob_choice: by the sight
  chosen_spanish: por lo que ven
  alternatives_spanish:
  - por la vista
  - por la visión
  - por lo visible
  lexicon: BDAG
  rationale: Aunque «la vista» es literal, en español «por lo que ven» comunica con claridad el valor instrumental y mantiene el énfasis en la experiencia visual. Evita una expresión demasiado técnica o ambigua.
- source_word: καλά
  english_pob_choice: beautiful
  chosen_spanish: hermosas
  alternatives_spanish:
  - buenas
  - bellas
  - atractivas
  lexicon: LSJ
  rationale: 'En este contexto, la cualidad estética domina el razonamiento: lo visto persuade porque es agradable a la mirada. «Hermosas» preserva esa lectura sin excluir del todo la resonancia de «buenas».'
- source_word: τὰ βλεπόμενα
  english_pob_choice: the things seen
  chosen_spanish: las cosas visibles
  alternatives_spanish:
  - las cosas que se ven
  - lo visible
  - las cosas observables
  lexicon: BDAG
  rationale: El participio señala realidades accesibles a la vista. «Las cosas visibles» suena natural en español y conserva la oposición implícita entre lo observado y la inferencia acerca de su origen.
theological_decisions:
- issue: Referente de αὐτοῦ
  english_pob_reading: his works, referring to God/the maker in the surrounding argument
  chosen_spanish_reading: sus obras, referido a Dios/el Creador en el argumento circundante
  alternative_spanish_readings:
