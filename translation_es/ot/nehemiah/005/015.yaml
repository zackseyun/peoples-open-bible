    issue: «cargaron pesadamente sobre el pueblo» es poco natural
    rationale: Aunque intenta conservar la metáfora de peso de הִכְבִּידוּ עַל, en español suena forzado. «Impusieron pesadas cargas sobre el pueblo» preserva mejor el sentido y la imagen.
  - severity: medium
    issue: «tomaron de ellos» suena calcado
    rationale: Es comprensible, pero «les quitaban» o «tomaban de ellos» puede afinarse. En esta cadena verbal, «les quitaban pan y vino» suena natural y sigue fiel al valor básico de לקח en contexto de exacción.
  - severity: medium
    issue: «dominaban sobre el pueblo» es menos idiomático que otras opciones
    rationale: Para שָׁלְטוּ עַל, «ejercían autoridad sobre el pueblo» o «gobernaban al pueblo» es más natural. «Dominaban sobre» resulta pesado.
  - severity: medium
