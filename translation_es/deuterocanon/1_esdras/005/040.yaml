revisions:
- from: Y les dijo Nehemías y Atharías que no participaran de las cosas santas hasta que se levantara un sacerdote vestido con el Urim y el Tumim[a][b].
  to: Y Nehemías y Atharías les dijeron que no participaran en las cosas sagradas hasta que se levantara un sacerdote vestido con el Urim y el Tumim[a][b].
  rationale: Se corrige la concordancia verbal con sujeto compuesto, se mejora la naturalidad del español en «participaran en las cosas sagradas», y se reescribe la nota a para que explique la base griega y la identificación tradicional sin contradecir el texto principal. La nota b se afina levemente para reflejar mejor el contexto sacerdotal.
