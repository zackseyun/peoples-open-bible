review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Yahvé habla a Gedeón, le promete su presencia y anuncia la derrota de Madián. También preserva correctamente יְהוָה como «Yahvé» y mantiene «Madián» en singular corporativo. Sin embargo, el verbo וְהִכִּיתָ está más cerca de «golpearás/herirás» que de «derrotarás», y la frase idiomática כְּאִישׁ אֶחָד no se expresa bien con «como a un solo hombre», porque el uso de la preposición «a» sugiere objeto directo humano y suena poco natural aquí.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «como a un solo hombre» resulta torpe y semánticamente equívoco en esta oración. Una formulación como «como un solo hombre» suena natural y conserva el modismo. También conviene evitar una interpretación demasiado fuerte en «derrotarás» cuando el proyecto inglés prefirió un verbo más cercano al hebreo.
  glossary_alignment: 'Alineación buena en términos del proyecto: «Yahvé» por יְהוָה está correcto; no hay conflictos mayores de glosario. La principal mejora es acercar נכה a «golpear» en vez de expandirlo a «derrotar», y ajustar el modismo «como un solo hombre» según la racionalidad documentada.'
  issues:
  - severity: medium
    issue: «derrotarás» sobretraduce וְהִכִּיתָ
    rationale: El inglés auditado eligió «you will strike» para conservar el vínculo léxico con נכה y evitar una interpretación más desarrollada como «defeat». En español, «golpearás» es más cercano al hebreo, aunque el contexto implique victoria.
  - severity: high
    issue: «como a un solo hombre» es una formulación poco natural y potencialmente engañosa para כְּאִישׁ אֶחָד
    rationale: La preposición «a» hace pensar que Madián es tratado como objeto personal singular (‘golpear a un solo hombre’) más que expresar el modismo comparativo. «Como un solo hombre» o «como si fuera un solo hombre» preserva mejor la comparación idiomática documentada.
  - severity: low
    issue: Falta el «Y» inicial del avance narrativo
    rationale: No es un error grave, porque el español puede omitir la conjunción en narrativa. Aun así, incluir «Y» refleja mejor el waw consecutivo del hebreo y la decisión inglesa auditada.
  revised_spanish_text: 'Y Yahvé le dijo[a]: «Ciertamente estaré contigo, y golpearás a Madián como un solo hombre».

    '
  revised_footnotes:
