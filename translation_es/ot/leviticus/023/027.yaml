base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/027.yaml
  text: But on the tenth day of this seventh month[a], it is the Day of Atonement. It shall be a holy convocation for you[c][b], and you shall afflict yourselves and present a food offering to Yahweh.
  footnotes:
