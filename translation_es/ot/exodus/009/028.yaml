revisions:
- from: Rueguen a Yahvé[a], porque ha habido bastante de los truenos de Dios y del granizo. Entonces los dejaré ir, y ya no tendrán que quedarse.
  to: Oren a Yahvé[a], porque ya ha habido bastante trueno de Dios y granizo. Entonces los dejaré ir, y no seguirán quedándose más.
  rationale: Se ajusta el verbo inicial a una opción más natural y bíblicamente estándar en español («Oren»), se corrige la cláusula final para evitar el matiz añadido de obligación en «tendrán que», y se alisa la expresión sobre el trueno/granizo sin perder el sentido ni la nota léxica documentada.
