revisions:
- from: 'Mi padre me hizo jurar[a], diciendo: «Mira, yo estoy muriendo. En mi sepulcro que cavé para mí en la tierra de Canaán, allí me sepultarás». Ahora, pues, te ruego que subas y sepultes a mi padre; y después volveré.'
  to: 'Mi padre me hizo jurar[a], diciendo: «Mira, yo estoy muriendo. En mi sepulcro que cavé para mí en la tierra de Canaán, allí me sepultarás». Ahora, pues, te ruego que me permitas subir para sepultar a mi padre; luego volveré.'
  rationale: Se corrigió la petición final para que José, no el destinatario, sea quien sube y sepulta a su padre, y para expresar el matiz de permiso implícito en el cohortativo dirigido al faraón. También se ajustó la nota al pie para conservar una alternativa léxica real, en línea con la auditoría inglesa.
