  to: Acercaos[a], naciones, para oír; y escuchad, pueblos. Que oiga la tierra, y todo lo que la llena[b], el mundo y todo lo que brota de él[c].
  rationale: Se ajusta el jussivo a un español más natural («Que oiga»), se corrige la alternativa de la nota [a] para reflejar fielmente la decisión inglesa documentada, y se sustituye «todos sus descendientes» por «todo lo que brota de él» para preservar mejor el valor amplio y generativo de כָּל־צֶאֱצָאֶיהָ sin limitarlo indebidamente a personas. Se añade una nota específica para mantener la alternativa genealógica/productiva documentada por el expediente POB.
