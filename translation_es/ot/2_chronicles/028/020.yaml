translation:
  language: es
  text: Entonces Tiglat-pileser, rey de Asiria, vino contra él y lo afligió[a], pero no lo fortaleció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo afligió, y no lo fortaleció». El hebreo también puede traducirse de manera más formal sin hacer explícita la fuerza contrastiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא עָלָיו
  english_pob_choice: came against him
  chosen_spanish: vino contra él
  alternatives_spanish:
  - vino a él
  - vino sobre él
  lexicon: HALOT
  rationale: El hebreo con בוא על en contexto político-militar expresa acción hostil; «vino contra él» conserva ese sentido adversativo de manera natural en español.
- source_word: תִּלְּגַת פִּלְנְאֶסֶר
  english_pob_choice: Tiglath-pileser
  chosen_spanish: Tiglat-pileser
  alternatives_spanish:
  - Tilgat-pilneser
  lexicon: Transliteración estándar del nombre asirio
  rationale: Se conserva el nombre propio como transliteración. «Tiglat-pileser» es una forma más reconocible y legible en español sin traducir el nombre.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - rey de Asur
  lexicon: Uso geopolítico usual
  rationale: La construcción se vierte de forma directa y clara; «Asiria» es el equivalente geopolítico normal en español.
- source_word: וַיָּצַר ל֖וֹ
  english_pob_choice: distressed him
  chosen_spanish: lo angustió
  alternatives_spanish:
  - lo afligió
  - lo apretó
  - lo hostigó
  lexicon: HALOT
  rationale: El verbo צרר puede expresar apretar, hostigar o causar angustia. «Lo angustió» mantiene la presión hostil sin restringir demasiado el sentido a un cerco militar.
- source_word: וְלֹא חֲזָקֽוֹ
  english_pob_choice: but did not strengthen him
  chosen_spanish: pero no lo fortaleció
  alternatives_spanish:
  - y no lo fortaleció
  - pero no le dio apoyo
  - pero no lo sostuvo
  lexicon: HALOT
  rationale: חזק conserva el valor de fortalecer/apoyar. «Pero no lo fortaleció» reproduce la cláusula adversativa sin introducir una interpretación más amplia que el hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa revisada optó por separar claramente las dos cláusulas: «distressed him, but did not strengthen him», en lugar de condensarlas como «afflicted him instead of strengthening him». Esta redacción se ha seguido en español para preservar la fuerza contrastiva del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto general, pero este versículo no contiene el nombre divino.
  - «Asiria» se usa como nombre geopolítico estándar.
  - Se evita una paráfrasis como «le hizo daño» porque el hebreo conserva la doble idea de presión hostil y falta de fortalecimiento.
