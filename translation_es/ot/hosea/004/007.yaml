    text: 'O: «A medida que se multiplicaron, así pecaron contra mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yo cambiaré su gloria por vergüenza».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota b para que corresponda a la cláusula final, conforme al rastro de auditoría inglés y a la sintaxis hebrea. También se mejora la redacción principal a «convertiré su gloria en vergüenza», que comunica con mayor naturalidad en español el sentido de cambio de estado de אָמִיר + בְּקָלוֹן, mientras se conserva en la nota la alternativa más literal «cambiaré ... por vergüenza».
