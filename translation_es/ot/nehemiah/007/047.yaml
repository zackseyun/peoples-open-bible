translation:
  language: es
  text: los hijos de Keros[a], los hijos de Sia, los hijos de Padon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de» en cada aparición de «hijos de»; la fórmula genealógica hebrea puede señalar una línea familiar más amplia, no solo hijos varones inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de la familia de
  lexicon: HALOT
  rationale: En este contexto genealógico/lista de repatriados, el hebreo constructo plural de בֵּן puede señalar una línea familiar o clan. «Los hijos de» preserva la forma formal de la lista y es natural en español bíblico; «descendientes de» sería posible, pero pierde el paralelismo repetido del hebreo.
- source_word: קֵירֹס
  english_pob_choice: Keros
  chosen_spanish: Queros
  alternatives_spanish:
  - Keros
  lexicon: transliteración del nombre propio
  rationale: Nombre propio transliterado. Se adapta a la ortografía española con «Qu» para el sonido /k/ ante «e»; no se traduce ni se interpreta.
- source_word: סִיעָא
  english_pob_choice: Sia
  chosen_spanish: Sia
  alternatives_spanish:
  - Siaa
  - Siah
  lexicon: transliteración del nombre propio
  rationale: Nombre propio transliterado sin añadir vocalización interpretativa. «Sia» es breve, legible y mantiene la forma del hebreo sin expandirla innecesariamente.
- source_word: פָדֽוֹן
  english_pob_choice: Padon
  chosen_spanish: Padón
  alternatives_spanish:
  - Padon
  - Pedón
  lexicon: transliteración del nombre propio
  rationale: Nombre propio transliterado. Se conserva la acentuación gráfica española en la última sílaba para reflejar la pronunciación llanamente final y hacer el nombre más natural en español.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran variantes textuales relevantes; se mantiene la estructura genealógica repetida con transliteración coherente de los tres nombres propios.
  spanish_consistency_notes:
  - Se mantiene «los hijos de» para reproducir la fórmula genealógica repetida del hebreo.
  - Se usa «Queros» con grafía española estándar para el nombre קֵירֹס.
  - «Padón» conserva la transliteración y añade tilde por adaptación ortográfica española; no implica un cambio de forma hebrea.
  - No se introducen notas teológicas porque el versículo es una lista de nombres propios sin carga doctrinal explícita.
