  yaml_path: translation/ot/joshua/014/011.yaml
  text: I am still as strong today as I was on the day Moses sent me; as my strength was then[a], so my strength is now, for battle and for going out and coming in.
  footnotes:
  - marker: a
    text: Or, more literally, 'for going out and coming in,' a Hebrew idiom for full vigor in action and leadership.
    reason: cultural_note
