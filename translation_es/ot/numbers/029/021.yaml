  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. Las decisiones cultuales están en general alineadas con POB. Recomiendo ajustar מִנְחָה a 'ofrendas de cereal' por precisión contextual, y כַּמִּשְׁפָּט a 'ordenanza' para corresponder mejor a 'ordinance' del rastro inglés. La nota sobre פָּרִים debe corregirse para no atribuir al hebreo una vaguedad que no tiene.
  issues:
