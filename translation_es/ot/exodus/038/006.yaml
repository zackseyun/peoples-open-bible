translation:
  language: es
  text: Hizo las varas de madera de acacia y las recubrió[a] de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobre» para el término final del material.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה expresa acción sucesiva. En español, «hizo» conserva el sentido verbal sin forzar una coordinación innecesaria; el contexto ya aporta la secuencia.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: las varas
  alternatives_spanish:
  - los postes
  - las pértigas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, בַּדִּים designa piezas de transporte. «Varas» es claro y natural en español bíblico; «poles» se traduce mejor como «varas» que como «barras», para evitar confusión estructural.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «maderas de acacias». En español, «de madera de acacia» expresa con naturalidad el material y evita un calco opaco.
- source_word: וַיְצַף
  english_pob_choice: and overlaid
  chosen_spanish: las cubrió
  alternatives_spanish:
  - las recubrió
  - las plateó
  lexicon: HALOT
  rationale: צפה en este contexto artesanal indica recubrir con metal. «Cubrió» mantiene la imagen básica y funciona bien en español; la sobrecarga técnica de «plateó» no es necesaria en un versículo narrativo breve.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: 'נְחֹשֶׁת puede referirse a cobre o bronce. Sigo la decisión auditada de la POB en sentido convencional del mobiliario del tabernáculo: «bronce».'
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; la única tensión léxica relevante es נְחֹשֶׁת, que admite «bronce» o «cobre». Se preserva esa alternativa en nota anclada al término del material.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo breve del hebreo sin introducir conectores no necesarios.
  - «Varas» evita la ambigüedad de «barras» en un contexto de transporte ritual.
  - La nota de alternativa solo se ancla al material final, donde existe la variación lexical documentada.
