translation:
  language: es
  text: 'Tomarán sus tiendas y sus rebaños; se llevarán sus cortinas de tienda, todos sus bienes y sus camellos, y gritarán[a] contra ellos: «¡Terror por todas partes!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «clamarán contra ellos: “¡Terror por todas partes!”». La construcción hebrea también puede entenderse como un grito dirigido sobre ellos, acerca de ellos o contra ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהֳלֵיהֶם
  english_pob_choice: their tents
  chosen_spanish: sus tiendas
  alternatives_spanish:
  - sus tiendas de campaña
  - sus tiendas de nomadismo
  lexicon: HALOT
  rationale: אָהֶל designa una tienda o vivienda portátil. En español, «tiendas» comunica de manera natural el contexto nómada sin sobrecargar el verso.
- source_word: צֹאנָם
  english_pob_choice: their flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ovejas
  - su ganado
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y otros animales de pastoreo. «Rebaños» conserva el sentido colectivo mejor que un referente más estrecho.
- source_word: יִקָּחוּ
  english_pob_choice: they will take
  chosen_spanish: Tomarán
  alternatives_spanish:
  - se llevarán
  - tomarán para sí
  lexicon: HALOT
  rationale: לקח en qal es «tomar». El contexto de despojo militar aporta la fuerza de saqueo sin añadir una paráfrasis innecesaria.
- source_word: יְרִיעוֹתֵיהֶם
  english_pob_choice: their tent curtains
  chosen_spanish: sus cortinas de tienda
  alternatives_spanish:
  - sus cortinas
  - sus lonas de tienda
  lexicon: HALOT
  rationale: יְרִיעָה puede ser cortina, paño o panel de tienda. «Cortinas de tienda» hace explícito el referente nomádico y sigue de cerca el hebreo.
- source_word: כָּל־כְּלֵיהֶם
  english_pob_choice: all their goods
  chosen_spanish: todos sus bienes
  alternatives_spanish:
  - todos sus utensilios
  - todos sus enseres
  lexicon: HALOT
  rationale: 'כְּלִי es un término amplio: utensilio, instrumento, pertenencia, bien. En una lista de botín, «bienes» reproduce ese alcance general en español.'
- source_word: גְּמַלֵּיהֶם
  english_pob_choice: their camels
  chosen_spanish: sus camellos
  alternatives_spanish:
  - sus dromedarios
  lexicon: HALOT
  rationale: Coincidencia léxica directa; «camellos» es la forma transparente y estándar en español.
- source_word: יִשְׂאוּ לָהֶם
  english_pob_choice: they will carry off ... for themselves
  chosen_spanish: llevarán
  alternatives_spanish:
  - se llevarán
  - transportarán
  lexicon: HALOT
  rationale: נָשָׂא con complemento dativo puede expresar llevarse algo como botín. En español, el contexto ya comunica la idea de despojo, por lo que «llevarán» basta y evita una redundancia artificial.
- source_word: וְקָרְאוּ עֲלֵיהֶם
  english_pob_choice: they will cry out against them
  chosen_spanish: gritarán contra ellos
  alternatives_spanish:
  - clamarán contra ellos
  - proclamarán contra ellos
  lexicon: HALOT
  rationale: קרא על puede ser «llamar/gritar sobre, contra, respecto de». «Gritarán contra ellos» preserva la dirección hostil del anuncio y la posibilidad de un grito proclamado.
- source_word: מָגוֹר מִסָּבִיב
  english_pob_choice: Terror on every side!
  chosen_spanish: «¡Terror por todos lados!»
  alternatives_spanish:
  - «¡Terror por todas partes!»
  - «¡Pavor por todos lados!»
  lexicon: HALOT
  rationale: La frase formulaica de Jeremías comunica terror circundante. «Por todos lados» suena natural en español y mantiene el efecto idiomático del hebreo.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y tiene en cuenta el ajuste del POB inglés que prefería un verbo de proclamar/gritar contra los afectados, no una lectura de ‘para sí’. No se introdujo material interpretativo adicional; se mantuvo la secuencia de botín y el grito de amenaza final.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto hebreo lo exige; aquí no aparece el nombre divino.
  - Se evitó «Cristo» y otras terminologías no pertinentes.
  - «Bienes» se usa como equivalente amplio de כְּלִים en un contexto de saqueo, coherente con el registro POB.
  - La puntuación reproduce el cierre enunciativo con cita final para el lema Jeremiasco «¡Terror por todos lados!»
