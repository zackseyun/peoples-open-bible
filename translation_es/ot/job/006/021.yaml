base_translation:
  language: en
  yaml_path: translation/ot/job/006/021.yaml
  text: For now you have become nothing[a]; you see terror[b], and you are afraid.
  footnotes:
  - marker: a
    text: Hebrew literally reads something like 'you have become not.' Many understand the sense as 'you have become nothing' or 'you have become like it,' that is, like the unreliable streams in the preceding verses.
    reason: textual_variant
  - marker: b
    text: Or 'you see calamity and are afraid.' The noun can denote terror, dismay, or a shattering disaster.
    reason: lexical_alternative
