translation:
  language: es
  text: Muéstrame una señal para bien[a], para que los que me aborrecen la vean y queden avergonzados, porque tú, Yahvé, me has ayudado y me has consolado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haz conmigo una señal de favor»; el hebreo dice literalmente: «haz conmigo una señal para bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֵׂה
  english_pob_choice: Show
  chosen_spanish: Haz
  alternatives_spanish:
  - Muestra
  - Hazme
  lexicon: HALOT
  rationale: El hebreo es un imperativo de ‘hacer/mar’ en una expresión idiomática con אֹות. En español, ‘Haz conmigo una señal’ conserva mejor el valor imperativo y la relación idiomática que un calco más literal; ‘Muestra’ sería más interpretativo.
- source_word: עִמִּי
  english_pob_choice: me / with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - me
  lexicon: HALOT
  rationale: La preposición literal es ‘con’. Dado el giro ‘hacer con alguien una señal’, ‘conmigo’ mantiene la base hebrea sin sonar forzado en español. ‘Para mí’ capta el sentido, pero desplaza la estructura original.
- source_word: אוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una marca
  lexicon: HALOT
  rationale: ‘Señal’ es el equivalente natural en español bíblico actual para un indicador visible de intervención divina. ‘Signo’ también es posible, pero ‘señal’ suena más fluido y conserva el sentido de algo perceptible.
- source_word: לְטוֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para favor
  - para mi bien
  lexicon: HALOT
  rationale: La frase hebrea apunta a un beneficio o bien concreto. ‘Para bien’ conserva la brevedad y la ambigüedad de ‘for good’ del texto inglés, sin convertirla en una explicación más explícita de favor.
- source_word: וְיִרְאוּ
  english_pob_choice: may see
  chosen_spanish: para que vean
  alternatives_spanish:
  - y vean
  - y puedan ver
  lexicon: HALOT
  rationale: El imperfecto expresa resultado esperado o finalidad. ‘Para que vean’ comunica de forma natural ese valor en español mejor que un simple futuro.
- source_word: שֹׂנְאַי
  english_pob_choice: those who hate me
  chosen_spanish: los que me aborrecen
  alternatives_spanish:
  - mis enemigos
  - los que me odian
  lexicon: HALOT
  rationale: ‘Los que me aborrecen’ preserva el participio sustantivado y la hostilidad personal del hebreo. ‘Los que me odian’ sería más directo, pero ‘aborrecer’ refleja bien el peso afectivo del término en registro bíblico.
- source_word: וְיֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: se avergüencen
  alternatives_spanish:
  - queden avergonzados
  - sean avergonzados
  lexicon: HALOT
  rationale: El hebreo puede indicar vergüenza pública o deshonra. ‘Se avergüencen’ mantiene el efecto sin recurrir a una pasiva poco natural; la fuerza de humillación pública queda implícita en el contexto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón del pedido: la acción previa de Yahvé en favor del salmista. ‘Porque’ es la traducción causal más clara y directa en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención POB de transliterar el nombre divino como ‘Yahvé’, no sustituirlo por un título. ‘Yahvé’ preserva la distinción del Tetragrámaton en el texto español.
- source_word: עֲזַרְתַּנִי
  english_pob_choice: have helped me
  chosen_spanish: me has ayudado
  alternatives_spanish:
  - me ayudaste
  - has ayudado a mí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa con relevancia presente. El pretérito perfecto compuesto ‘me has ayudado’ reproduce bien ese valor en español.
- source_word: וְנִחַמְתָּנִי
  english_pob_choice: comforted me
  chosen_spanish: me has consolado
  alternatives_spanish:
  - me has confortado
  - me has animado
  lexicon: HALOT
  rationale: נחם aquí significa consolar/comfortar. ‘Consolado’ es la opción más natural y bíblicamente precisa en español; ‘confortado’ es menos usual y ‘animado’ reduce demasiado el sentido.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: Se mantiene la decisión doctrinal y editorial de representar el Tetragrámaton con el nombre propio transliterado. Esto evita la sustitución por un título y conserva la referencia al pacto y a la revelación del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente no indicó cambios; el acuerdo entre los controles fue alto y no se reportaron problemas que obligaran a alterar la base semántica del versículo.
  spanish_consistency_notes:
  - Se preservó la secuencia petición → resultado → razón, siguiendo la estructura del hebreo y del texto auditado en inglés.
  - Se evitó traducir el final con un título divino sustitutorio; ‘Yahvé’ mantiene la política editorial POB.
  - ‘Conmigo’ y ‘para bien’ conservan la literalidad suficiente del hebreo, mientras ‘haz’ hace el español natural en una oración imperativa.
  - ‘Los que me aborrecen’ conserva el sujeto participial y la hostilidad personal del original.
