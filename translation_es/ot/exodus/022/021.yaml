translation:
  language: es
  text: No afligirán a ninguna viuda ni a ningún huérfano[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'niño sin padre' para 'huérfano'.
    reason: lexical_alternative
  - marker: b
    text: O 'oprimir' o 'maltratar' para 'afligir'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: ninguna / ningún
  alternatives_spanish:
  - toda
  - cada
  lexicon: HALOT
  rationale: En una prohibición con sustantivos singulares, כָּל tiene fuerza distributiva y de totalidad. En español, 'ninguna / ningún' comunica bien esa extensión negativa sin sonar forzado, conservando el alcance comprehensivo del hebreo.
- source_word: אַלְמָנָה
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: HALOT
  rationale: Es el equivalente léxico directo y natural en español, y mantiene el término social-jurídico del texto.
- source_word: יָתוֹם
  english_pob_choice: orphan
  chosen_spanish: huérfano
  alternatives_spanish:
  - niño sin padre
  - hijo sin padre
  lexicon: HALOT
  rationale: '''Huérfano'' es el equivalente moderno más claro. En este contexto legal hebreo puede implicar especialmente la condición de padre fallecido, pero en español ''huérfano'' comunica la referencia sin sobreexplicar.'
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: No / no
  alternatives_spanish:
  - No deberás
  lexicon: HALOT
  rationale: La negación de la prohibición se expresa con naturalidad mediante 'No ...ás' en español, preservando el mandato directo.
- source_word: תְעַנּוּן
  english_pob_choice: afflict
  chosen_spanish: afligirás
  alternatives_spanish:
  - oprimirás
  - maltratarás
  lexicon: HALOT
  rationale: '''Afligir'' conserva la amplitud semántica del Piel de ענה en este marco legal: causar sufrimiento o trato duro. ''Oprimir'' y ''maltratar'' son posibles, pero tienden a estrechar o a suavizar el alcance según el contexto. ''Afligir'' mantiene la gravedad del mandato.'
translation_notes:
  revision_awareness: El texto hebreo y el registro auditado en inglés muestran consenso alto y no requieren corrección sustantiva; la principal labor es trasladar con fidelidad la fuerza distributiva de כָּל y la amplitud de תְעַנּוּן a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa 'viuda' y 'huérfano' como términos bíblicos claros y estándar en español, sin introducir vocabulario eclesiástico innecesario.
  - La forma negativa 'No afligirás' conserva el tono legal del hebreo y de la POB inglesa sin volverlo más interpretativo.
  - Las notas al pie preservan alternativas léxicas relevantes que el inglés auditado ya documenta.
