    rationale: El hebreo contiene tanto el título «Adonai» como el nombre divino YHWH. El borrador conserva solo «Yahvé», lo que no preserva completamente el significado de la fuente ni la decisión lexical documentada.
  - severity: medium
    issue: Puntuación enfática poco natural
    rationale: «¡Escuchen y den testimonio contra la casa de Jacob[a]!, declara...» introduce una combinación extraña de admiración y coma. En español bíblico solemne, una puntuación declarativa simple es más natural aquí.
  - severity: low
