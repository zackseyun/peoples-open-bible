translation:
  language: es
  text: 'Ella dijo[a]: «Bebe, mi señor», y se apresuró a bajar su cántaro a su mano, y le dio de beber.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El hebreo literalmente dice «mi señor», usado aquí como una forma respetuosa de dirigirse a un hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵה
  english_pob_choice: Drink
  chosen_spanish: Bebe
  alternatives_spanish:
  - Toma
  - Bebe de esto
  lexicon: HALOT
  rationale: Es un imperativo directo de beber. «Bebe» conserva la brevedad y la fuerza inmediata del hebreo sin añadir explicaciones.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor
  - mi amo
  lexicon: HALOT
  rationale: En este contexto narrativo es un trato respetuoso a un hombre, no un título divino. «Mi señor» mantiene el valor literal y la deferencia social del hebreo.
- source_word: וַתְמַהֵר
  english_pob_choice: she quickly
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - rápidamente
  lexicon: HALOT
  rationale: El verbo expresa prisa. En español, integrarlo como verbo principal conserva mejor la secuencia narrativa que convertirlo solo en adverbio.
- source_word: וַתֹּרֶד כַּדָּהּ
  english_pob_choice: lowered her jar
  chosen_spanish: bajó su cántaro
  alternatives_spanish:
  - descendió su cántaro
  - lo puso abajo
  lexicon: HALOT
  rationale: ירד con el cántaro describe un movimiento hacia abajo desde la posición en que lo llevaba. «Bajó su cántaro» es natural y fiel al acto concreto.
- source_word: עַל יָדָהּ
  english_pob_choice: onto her hand
  chosen_spanish: sobre su mano
  alternatives_spanish:
  - en su mano
  - encima de su mano
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «sobre su mano». «Sobre su mano» preserva la imagen física sin importar detalles no explicitados por el texto.
- source_word: וַתַּשְׁקֵהוּ
  english_pob_choice: gave him a drink
  chosen_spanish: le dio de beber
  alternatives_spanish:
  - le dio un trago
  - lo hizo beber
  lexicon: HALOT
  rationale: El causativo de שׁקה significa hacer beber o dar de beber. «Le dio de beber» reproduce el sentido con naturalidad y sin perder el valor causativo.
theological_decisions:
- issue: Tratamiento respetuoso a un hombre con אֲדֹנִי
  english_pob_reading: my lord, with a footnote noting the alternative 'sir'
  chosen_spanish_reading: mi señor, con nota de alternativa «señor»
  alternative_spanish_readings:
  - señor
  - mi amo
  rationale: El hebreo usa una fórmula de cortesía hacia un varón. «Mi señor» conserva el matiz literal; la nota evita que se lea como título de autoridad absoluta o como referencia divina.
  doctrine_reference: Uso honorífico del trato en narrativa; no es un título teológico de Yahvé.
translation_notes:
  revision_awareness: Se siguió de cerca el tramo hebreo y el audit trail inglés, manteniendo la secuencia verbal, el trato respetuoso y la imagen concreta del cántaro. No se detectaron revisiones aplicadas en el paquete fuente, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «mi señor» por fidelidad al hebreo, con nota explicativa para no confundir el honorífico con un título divino.
  - Se conservó la concreción física del movimiento del cántaro y del dar de beber, sin añadir elementos del contexto no expresados aquí.
