translation:
  language: es
  text: Y fijaré tu límite desde el Mar Rojo[a] hasta el Mar de los filisteos, y desde el desierto hasta el Río[b]; porque daré en tu mano a los habitantes de la tierra, y tú los expulsarás de delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Mar de los Juncos».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el Éufrates.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׁתִּי
  english_pob_choice: And I will set
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y estableceré
  - Y fijaré
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de colocar o fijar un límite. En español, «poner» comunica bien la imagen de establecer un límite territorial y mantiene la fuerza futura de la promesa divina sin sobrecargar el texto.
- source_word: גְּבֻלְךָ
  english_pob_choice: your border
  chosen_spanish: tu límite
  alternatives_spanish:
  - tu frontera
  - tu borde territorial
  lexicon: HALOT
  rationale: En este contexto, el término se refiere al borde geográfico del territorio. «Límite» resulta natural en español y conserva el sentido de demarcación territorial; «frontera» podría sonar demasiado moderno o político.
- source_word: מִיַּם סוּף
  english_pob_choice: from the Red Sea
  chosen_spanish: desde el Mar Rojo
  alternatives_spanish:
  - desde el Mar de los Juncos
  lexicon: HALOT
  rationale: La tradición de traducción en español reconoce «Mar Rojo» como el referente geográfico usual. Se preserva la alternativa más literal en nota para transparencia con el hebreo יַם סוּף.
- source_word: יָם פְּלִשְׁתִּים
  english_pob_choice: the Sea of the Philistines
  chosen_spanish: el Mar de los filisteos
  alternatives_spanish:
  - el mar filisteo
  - el Mar Mediterráneo
  lexicon: HALOT
  rationale: Se conserva la designación hebrea transparente, sin sustituirla por una identificación geográfica interpretativa en el texto principal. Esto permite ver la relación etnogeográfica del nombre.
- source_word: וּמִמִּדְבָּר
  english_pob_choice: and from the wilderness
  chosen_spanish: y desde el desierto
  alternatives_spanish:
  - y desde la tierra despoblada
  - y desde el yermo
  lexicon: HALOT
  rationale: «מִדְבָּר» puede traducirse como «desierto» o «wilderness». En español, «desierto» es claro y natural; aquí no se requiere la carga bíblica específica de «desierto» frente a «wilderness» para afectar el sentido.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el río
  - el Éufrates
  lexicon: HALOT
  rationale: El artículo hebreo hace de «el Río» un nombre convencional del Éufrates. Mantener la mayúscula inicial en español ayuda a reflejar ese uso referencial sin introducir la identificación interpretativa en el texto principal.
- source_word: אֶתֵּן בְּיֶדְכֶם
  english_pob_choice: I will give ... into your hand
  chosen_spanish: pondré en tu mano
  alternatives_spanish:
  - daré en tu mano
  - entregaré en tu mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «Pondré en tu mano» conserva la imagen concreta y sigue de cerca la formulación auditable del inglés POB, sin forzar un giro más abstracto como «entregaré».
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: a los habitantes de la tierra
  alternatives_spanish:
  - a los que habitan la tierra
  - a los pobladores de la tierra
  lexicon: HALOT
  rationale: El participio sustantivado se expresa de manera idiomática con «habitantes». «Tierra» reproduce bien el sustantivo hebreo en este contexto de posesión territorial.
- source_word: וְגֵרַשְׁתָּמוֹ
  english_pob_choice: and you will drive them out
  chosen_spanish: y tú los expulsarás
  alternatives_spanish:
  - y tú los echarás
  - y tú los arrojarás fuera
  lexicon: HALOT
  rationale: «גרש» tiene el sentido fuerte de expulsar o echar fuera. «Expulsar» comunica ese valor con claridad y mantiene la fuerza del mandato/predicción en español.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La locución hebrea es literalmente espacial. «De delante de ti» conserva el idioma bíblico y la dirección de expulsión sin convertirlo en una paráfrasis más abstracta.
theological_decisions:
- issue: Identificación de יַם סוּף
  english_pob_reading: Red Sea; literal alternative retained in footnote as Sea of Reeds
  chosen_spanish_reading: Mar Rojo, con nota sobre el hebreo más literal
  alternative_spanish_readings:
  - Mar de los Juncos
  - Mar de las Cañas
  rationale: No hay una disputa doctrinal aquí, sino una decisión lexical-geográfica. Se mantiene la forma reconocible en español y se documenta la alternativa literal del hebreo para auditar la traducción.
  doctrine_reference: N/A
- issue: Identificación de הַנָּהָר
  english_pob_reading: 'the River, with note: the Euphrates'
  chosen_spanish_reading: el Río, con nota explicativa sobre el Éufrates
  alternative_spanish_readings:
  - el Éufrates
  - el gran Río
  rationale: El hebreo usa un nombre convencional con artículo. Traducirlo como «el Río» conserva la forma del texto y deja para la nota la identificación geográfica tradicional, siguiendo el criterio del POB en inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: He seguido el expediente inglés sin introducir cambios de revisión; el pasaje muestra acuerdo alto y no requiere ajustes textuales adicionales. Se conservan las dos notas del POB inglés en español, adaptadas a una formulación natural y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «Mar Rojo» en el cuerpo y se documenta la alternativa literal en nota, siguiendo el trail auditado.
  - «El Río» se mantiene con mayúscula inicial para reflejar su función referencial como designación del Éufrates.
  - Se evita sustituir «expulsar» por «echar fuera» para conservar la fuerza del verbo hebreo גרשׁ.
