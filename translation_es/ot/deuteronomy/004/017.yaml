  - marker: b
    text: O ‘en el cielo’ para ‘en los cielos’. El hebreo usa la forma plural ‘cielos’, que puede designar el cielo visible.
    reason: lexical_alternative
  revision_rationale: El texto principal está bien y no requiere cambios. Solo se ajustan levemente las notas para mejorar la naturalidad del español y reflejar con mayor precisión la explicación léxica ya documentada en el POB inglés.
