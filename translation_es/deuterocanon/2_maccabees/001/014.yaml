translation:
  language: es
  text: Porque cuando Antíoco y los amigos que estaban con él llegaron al lugar como para casarse con ella[a], con el fin de recibir el dinero por concepto de una dote mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como para vivir con ella» / «como para unirse en matrimonio con ella». El participio griego συνοικῶν puede referirse a vivir juntos o a entrar en matrimonio; aquí probablemente alude a la pretensión de casarse para apoderarse de los fondos del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικῶν
  english_pob_choice: as though to marry her
  chosen_spanish: como para casarse con ella
  alternatives_spanish:
  - como para vivir con ella
  - como para unirse a ella en matrimonio
  lexicon: LSJ
  rationale: El participio puede significar vivir con alguien o entrar en matrimonio. En este contexto narrativo, la opción refleja la pretensión de matrimonio, no una unión literal.
- source_word: παρεγένετο
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  - se presentaron
  lexicon: BDAG
  rationale: Verbo narrativo de llegada; en español, el plural concuerda naturalmente con «Antíoco y sus amigos con él».
- source_word: ὅ τε Ἀντίοχος καὶ οἱ σὺν αὐτῷ φίλοι
  english_pob_choice: Antiochus and his friends with him
  chosen_spanish: Antíoco y sus amigos con él
  alternatives_spanish:
  - Antíoco y los amigos con él
  - Antíoco y sus compañeros
  lexicon: LSJ
  rationale: Se conserva la coordinación explícita y la frase «con él». «Amigos» traduce φίλοι de manera literal, sin forzar un título técnico no explicitado aquí.
- source_word: χάριν τοῦ λαβεῖν
  english_pob_choice: in order to receive
  chosen_spanish: con el fin de recibir
  alternatives_spanish:
  - para recibir
  - a fin de obtener
  lexicon: BDAG
  rationale: La construcción expresa propósito; «con el fin de» conserva claramente esa finalidad y mantiene un registro formal.
- source_word: τὰ χρήματα πλείονα
  english_pob_choice: the money as a larger dowry
  chosen_spanish: el dinero como una dote mayor
  alternatives_spanish:
  - el dinero como una dote más grande
  - el dinero como una dote más cuantiosa
  lexicon: LSJ
  rationale: πλείονα aporta la idea de mayor cantidad; en contexto, ese dinero se presenta como dote. «Dote mayor» preserva la relación comparativa sin añadir más de lo que dice el griego.
- source_word: εἰς φερνῆς λόγον
  english_pob_choice: as a larger dowry
  chosen_spanish: como una dote
  alternatives_spanish:
  - bajo pretexto de dote
  - por concepto de dote
  - en calidad de dote
  lexicon: LSJ
  rationale: La frase idiomática remite al dinero considerado bajo la categoría de dote. En español, «como una dote» comunica el valor asignado sin hacer la expresión innecesariamente técnica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca exactamente en el texto español. La redacción mantiene la equivalencia óptima del audit trail inglés, pero ahora el anclaje de nota está integrado en la frase «casarse con ella[a]».
  spanish_consistency_notes:
  - Se mantuvo «Antíoco» como forma española del nombre propio.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, ya que este versículo no contiene el tetragrámaton.
  - «Dote» se usó de manera consistente para φερνή/φερνῆς λόγον, en línea con la lectura auditada.
  - Se preservó el valor de finalidad de χάριν τοῦ λαβεῖν mediante «con el fin de recibir».
