base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/027.yaml
  text: For you[a], O Yahweh of hosts, God of Israel, have revealed this to your servant, saying[c][b], ‘I will build you a house.’ Therefore your servant has found it in his heart to pray this prayer to you.
  footnotes:
  - marker: a
    text: Literally, 'have uncovered the ear of your servant,' a Hebrew idiom meaning 'have revealed this to your servant.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will build a house for you.' The word 'house' also carries covenantal overtones of dynasty in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'your servant has found his heart,' that is, has found the courage or resolve.
    reason: lexical_alternative
