translation:
  language: es
  text: Y sucederá que el día en que crucen el Jordán a la tierra que Yahvé tu Dios te da, levantarás para ti piedras grandes y las recubrirás con cal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las recubrirás con yeso»; el sustantivo hebreo se refiere a cal o yeso usado como revestimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בַּיּוֹם
  english_pob_choice: And on the day when ...
  chosen_spanish: Y sucederá que, el día en que ...
  alternatives_spanish:
  - Y será que, el día en que ...
  - Y acontecerá en el día en que ...
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una circunstancia futura. En español bíblico moderno, «Y sucederá que» conserva el giro narrativo sin sonar tan arcaico como una calca rígida, y «el día en que» mantiene el valor temporal del מקור hebreo.
- source_word: תַּעַבְרוּ אֶת הַיַּרְדֵּן
  english_pob_choice: you cross over the Jordan
  chosen_spanish: crucen el Jordán
  alternatives_spanish:
  - crucen sobre el Jordán
  - pasen el Jordán
  lexicon: HALOT
  rationale: «Cruzar el Jordán» expresa de forma natural el tránsito geográfico del hebreo עבר con el río/Jordán. Se mantiene el nombre propio «Jordán» sin añadir «río» porque no es necesario en el contexto y así coincide con el uso bíblico usual.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: hacia la tierra
  alternatives_spanish:
  - a la tierra
  - en la tierra
  lexicon: HALOT
  rationale: «Tierra» preserva el sentido covenantal-geográfico de אֶרֶץ en Deuteronomio. «Hacia» comunica dirección de entrada y evita sobreespecificar una preposición estática que no reflejaría bien el movimiento del hebreo.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé su Dios
  alternatives_spanish:
  - Yahvé tu Dios
  - el SEÑOR su Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» conforme a la terminología del proyecto. Se usa «su Dios» porque el hebreo aquí combina un sufijo singular de segunda persona con un verbo plural en la cláusula principal; en español, la referencia natural del mandato dirigido al pueblo puede expresarse con «su» para evitar una discordancia pronominal dentro de la frase publicada, sin cambiar la identidad divina.
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: les da
  alternatives_spanish:
  - les está dando
  - les dará
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso o segura desde la perspectiva del hablante. En español, «les da» mantiene naturalidad y el sentido actual/certidumbre sin recargar la frase con perífrasis.
- source_word: וַהֲקֵמֹתָ לְךָ
  english_pob_choice: you shall set up for yourself
  chosen_spanish: levantarás para ti
  alternatives_spanish:
  - erigirás para ti
  - pondrás en pie para ti
  lexicon: HALOT
  rationale: קום en hifil aplicado a piedras significa levantarlas/ponerlas en pie. «Levantarás para ti» es claro y cercano al valor verbal del hebreo; se conserva el matiz reflexivo/dativo de לְךָ con «para ti».
- source_word: אֲבָנִים גְּדֹלוֹת
  english_pob_choice: large stones
  chosen_spanish: piedras grandes
  alternatives_spanish:
  - grandes piedras
  - piedras enormes
  lexicon: HALOT
  rationale: «Piedras grandes» es el equivalente más natural y fiel en español. Se evita «grandes piedras» por preferencia estilística, sin perder el tamaño señalado por גְּדֹלוֹת.
- source_word: וְשַׂדְתָּ אֹתָם
  english_pob_choice: and plaster them
  chosen_spanish: y las cubrirás
  alternatives_spanish:
  - y las enlucirás
  - y las revestirás
  lexicon: HALOT
  rationale: El verbo שׂדָה alude a recubrir con yeso/cal. En español, «cubrirás» comunica la acción de aplicar una capa sobre las piedras sin exigir un tecnicismo que podría sonar innecesario en el cuerpo principal; el material se explicita en la última unidad de la cláusula.
- source_word: בַּשִּׂיד
  english_pob_choice: with lime
  chosen_spanish: con cal
  alternatives_spanish:
  - con yeso
  - con revestimiento de cal
  lexicon: HALOT
  rationale: שִׂיד puede referirse a cal o yeso usado como recubrimiento. «Cal» es la opción más concreta y amplia en español, y evita la redundancia de «enlucir con enlucido» o «yeso» si se entiende como material más estrecho.
theological_decisions:
- issue: Forma del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene la política del proyecto de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sujeto y pronombre en la cláusula del don de la tierra
  english_pob_reading: that Yahweh your God is giving you
  chosen_spanish_reading: que Yahvé su Dios les da
  alternative_spanish_readings:
  - que Yahvé tu Dios te da
  - que Yahvé su Dios está dando
  rationale: El hebreo presenta una tensión pronominal entre la segunda persona singular y el contexto plural del mandato. La redacción española prioriza la fluidez pública de la cláusula y la referencia comunitaria implícita del pasaje, sin alterar el sentido de que la tierra es un don de Yahvé.
  doctrine_reference: 'DOCTRINE.md: Pronombres y referencia colectiva en mandatos de pacto'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió el pronombre reflexivo de plural a singular en la cláusula de «for yourself». En español, el mandato se formuló con singular («levantarás para ti») para reflejar esa corrección. También se revisó la decisión inglesa sobre el material de recubrimiento para conservar en español la alternativa cal/yeso sin imponer un término técnico único.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del nombre divino en todo el registro.
  - Se evitó «Señor» como sustituto del Tetragrámaton, conforme al proyecto.
  - La secuencia verbal busca naturalidad española sin perder la estructura temporal del hebreo.
  - El término «cal» en el texto principal deja abierta la alternativa lexical explicada en la nota.
  - Se conservó la singularidad del mandato con «levantarás para ti».
