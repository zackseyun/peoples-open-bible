translation:
  language: es
  text: No entregues tu fuerza[a] a las mujeres, ni tus caminos a lo que destruye a los reyes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fuerza» puede incluir vigor, recursos o riqueza, no solo poder físico.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «ni tus caminos a la ruina de los reyes»; el hebreo permite una lectura más abstracta del verbo «destruir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - Nunca
  lexicon: HALOT
  rationale: La partícula negativa prohibitiva se expresa de forma natural en español con «No» ante el imperativo implícito.
- source_word: תִּתֵּן
  english_pob_choice: give
  chosen_spanish: entregues
  alternatives_spanish:
  - des
  - concedas
  - entregues
  lexicon: HALOT
  rationale: «Entregar» conserva la idea de poner algo en manos de otro con mayor intensidad que un simple «dar», adecuada al tono admonitorio del proverbio, sin forzar una interpretación excesiva.
- source_word: לַנָּשִׁים
  english_pob_choice: to women
  chosen_spanish: a las mujeres
  alternatives_spanish:
  - a las esposas
  - a una mujer
  lexicon: HALOT
  rationale: El hebreo es plural y dice literalmente «mujeres», no «esposas»; mantenerlo evita restringir indebidamente el alcance del texto.
- source_word: חֵילֶךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu vigor
  - tus recursos
  - tu poder
  lexicon: HALOT
  rationale: «Fuerza» preserva el campo semántico amplio de חֵיל, que puede incluir vigor, capacidad, recursos o riqueza. En español es la opción más clara y suficientemente amplia.
- source_word: וּדְרָכֶיךָ
  english_pob_choice: or your ways
  chosen_spanish: ni tus caminos
  alternatives_spanish:
  - y tus caminos
  - ni tu curso de vida
  lexicon: HALOT
  rationale: El paralelismo negativo se expresa naturalmente en español con «ni». «Caminos» conserva el plural hebreo y la metáfora de conducta o curso de vida.
- source_word: לַמְחוֹת
  english_pob_choice: to that which destroys
  chosen_spanish: a lo que destruye
  alternatives_spanish:
  - a la destrucción de
  - a lo que arruina
  - a lo que borra
  lexicon: HALOT
  rationale: La forma hebrea funciona de modo verbal y abstracto; la revisión inglesa optó por un singular impersonal para reflejar la forma gramatical. «A lo que destruye» mantiene esa abstracción sin introducir sujetos no explícitos.
- source_word: מְלָכִין
  english_pob_choice: kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - a los reyes
  - a reyes
  lexicon: HALOT
  rationale: El plural de מֶלֶךְ se traduce directamente por «reyes», preservando el marco real del proverbio.
theological_decisions:
- issue: Alcance de «mujeres» en el proverbio
  english_pob_reading: A wisdom warning against dissipating royal strength through sexual/relational entanglements, stated generally rather than as a blanket theological condemnation of women.
  chosen_spanish_reading: Una advertencia sapiencial contra gastar la fuerza real en vínculos que la debiliten, formulada de manera general y no como condena doctrinal de las mujeres.
  alternative_spanish_readings:
  - Una advertencia específica contra esposas extranjeras o la poligamia real
  - Una advertencia más amplia contra cualquier indulgencia que debilite al rey
  rationale: La traducción conserva el sustantivo plural del hebreo sin cargarlo con una generalización misógina. El sentido práctico moral se mantiene, pero sin ampliar el texto más allá de su forma.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Sentido de חֵילֶךָ
  english_pob_reading: Personal strength/vigor/resources in a broad sense
  chosen_spanish_reading: 'Fuerza personal en sentido amplio: vigor, capacidad y recursos'
  alternative_spanish_readings:
  - riqueza
  - potencia sexual específicamente
  rationale: «Fuerza» es lo bastante amplio para abarcar vigor, recursos y capacidad de acción, y así evita reducir el proverbio a una sola esfera moderna.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Naturaleza de «lo que destruye a los reyes»
  english_pob_reading: The proverb’s destructive object is rendered as a singular abstract/impersonal expression rather than a specific set of persons.
  chosen_spanish_reading: «A lo que destruye a los reyes» como expresión abstracta e impersonal.
  alternative_spanish_readings:
  - «a quienes destruyen a los reyes»
  - «a la destrucción de los reyes»
  rationale: El hebreo permite una construcción más abstracta, y la revisión inglesa prefirió un singular impersonal para reflejar mejor la forma y evitar añadir sujetos no explícitos. La versión española sigue esa decisión.
  doctrine_reference: Source text morphology; English audit revision pass
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «those who destroy kings» a «that which destroys kings» para reflejar mejor la forma singular femenina del hebreo y evitar implicar personas específicas no presentes en el texto. La redacción española sigue esa revisión con una construcción impersonal («a lo que destruye a los reyes»).
  spanish_consistency_notes:
  - Se mantuvo «mujeres» en plural para respetar el hebreo y no restringirlo a «esposas».
  - Se prefirió «fuerza» por su amplitud semántica, coherente con la nota de que puede incluir vigor, recursos o riqueza.
  - Se usó «caminos» para preservar la metáfora hebrea de conducta o rumbo de vida.
  - La estructura negativa con «ni» ayuda a reproducir el paralelismo del versículo en español.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en este versículo.
