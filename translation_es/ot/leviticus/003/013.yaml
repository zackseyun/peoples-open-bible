  yaml_path: translation/ot/leviticus/003/013.yaml
  text: And he shall lay his hand on its head and slaughter it before the tent of meeting[a], and the sons of Aaron shall throw its blood against the altar all around.
  footnotes:
  - marker: a
    text: Or 'dash its blood on the altar all around.' The Hebrew verb can be rendered with several English verbs in sacrificial contexts; 'throw' is chosen here as the most direct rendering.
    reason: lexical_alternative
