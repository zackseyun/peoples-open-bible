    text: Or 'to the feast.' The Hebrew מִשְׁתֶּה can be rendered 'banquet' or 'feast.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I am called by her.' In context this means 'I am invited by her.'
    reason: lexical_alternative
