  yaml_path: translation/ot/isaiah/034/011.yaml
  text: The desert owl and the hedgehog will possess her[a], and the owl and the raven will dwell in her[b]; he will stretch over her the measuring line of desolation and the plumb stones of emptiness.
  footnotes:
  - marker: a
    text: The identifications of the animals named here are uncertain. 'Desert owl' may also be rendered 'pelican' or 'cormorant,' and 'hedgehog' may also be rendered 'porcupine' or 'bittern.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the measuring line of tohu and the stones of bohu.' The phrase echoes Genesis 1:2 ('formless and empty' / 'waste and void') and portrays the land as reduced to uncreation.
    reason: cross_reference
