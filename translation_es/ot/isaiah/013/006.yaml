  rationale: Se corrigió la nota [a] para que preserve una alternativa real y no repita el texto principal. Se cambió «Aullad» por «Giman» para una lectura más natural y eclesialmente amplia, manteniendo la intensidad del imperativo; la alternativa «Aullen» conserva el matiz más áspero. Se ajustó «cercano está» a «está cerca» por mejor español contemporáneo. Se reemplazó «desde el Todopoderoso» por «de parte del Todopoderoso» para expresar mejor la procedencia del juicio en español.
