translation:
  language: es
  text: Pero contra cualquiera de los hijos de Israel[a], ni un perro aguzará su lengua, desde el hombre hasta la bestia, para que sepan que Yahvé hace distinción entre Egipto e Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni un perro ladrará contra ellos», un modismo que expresa paz y seguridad completas para Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְכֹל
  english_pob_choice: But against any of
  chosen_spanish: Pero contra cualquiera de
  alternatives_spanish:
  - Y contra todos
  - Pero para todos
  lexicon: HALOT
  rationale: El prefijo introduce contraste con el juicio sobre Egipto; en español, «contra cualquiera de» conserva esa oposición y el alcance distributivo sin sonar forzado.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de manera natural en español y con la misma fuerza nominal que la elección inglesa.
- source_word: יֶחֱרַץ כֶּלֶב לְשֹׁנוֹ
  english_pob_choice: not a dog will sharpen its tongue
  chosen_spanish: ni un perro aguzará su lengua
  alternatives_spanish:
  - ni un perro ladrará
  - ni un perro gruñirá
  lexicon: HALOT
  rationale: «Aguzará su lengua» preserva la imagen literal e idiomática del hebreo, como hizo la POB inglesa; no se reduce en el texto principal a «ladrará», aunque esa sea la lectura idiomática probable.
- source_word: לְמֵאִישׁ וְעַד בְּהֵמָה
  english_pob_choice: from man to beast
  chosen_spanish: ni contra hombre ni contra animal
  alternatives_spanish:
  - de hombre a animal
  - ni de hombre ni de animal
  lexicon: HALOT
  rationale: La secuencia expresa alcance total. En español, «ni contra hombre ni contra animal» comunica el sentido inclusivo del merismo con claridad, sin perder el contraste entre personas y bestias.
- source_word: לְמַעַן תֵּדְעוּן
  english_pob_choice: so that you may know
  chosen_spanish: para que sepáis
  alternatives_spanish:
  - a fin de que sepáis
  - para que conozcáis
  lexicon: HALOT
  rationale: La cláusula final expresa propósito; «para que sepáis» refleja bien el valor volitivo del imperfecto en español y mantiene el tono directo de la advertencia.
- source_word: יַפְלֶה
  english_pob_choice: makes a distinction
  chosen_spanish: hace distinción
  alternatives_spanish:
  - hace una diferencia
  - separa
  lexicon: HALOT
  rationale: El hifil de פלא aquí significa establecer una diferencia o separación entre dos grupos, no «hacer maravillas». «Hace distinción» conserva esa fuerza relacional de forma idiomática en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue la directriz del proyecto para representar el Tetragrámaton con el nombre propio «Yahvé», en lugar de sustituirlo por un título.
- source_word: בֵּין מִצְרַיִם וּבֵין יִשְׂרָאֵל
  english_pob_choice: between Egypt and Israel
  chosen_spanish: entre Egipto e Israel
  alternatives_spanish:
  - entre los egipcios e Israel
  - entre Egipto y los hijos de Israel
  lexicon: HALOT
  rationale: Se mantienen los nombres nacionales como en el hebreo; «entre Egipto e Israel» es breve, clara y conserva el contraste histórico-covenantal.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La lectura inglesa ya decidió no velar el nombre divino con un título. En español, «Yahvé» mantiene esa decisión y la hace legible para lectores bíblicos hispanohablantes.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance idiomático de la cláusula del perro
  english_pob_reading: not a dog will sharpen its tongue
  chosen_spanish_reading: ni un perro aguzará su lengua
  alternative_spanish_readings:
  - ni un perro ladrará
  - ni un perro hará ruido
  rationale: Se preserva la tensión entre imagen literal e idiomática. El texto principal conserva la metáfora; una lectura más explícitamente idiomática queda disponible como alternativa implícita en el expediente lexical.
  doctrine_reference: HALOT s.v. חרץ; lexical decision in English POB
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo cruzado señaló solo asuntos menores; por eso la redacción española sigue de cerca la solución auditada, preservando la imagen del perro y la distinción entre Egipto e Israel sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelismo entre el acto del perro y la distinción divina, sin suavizar la metáfora.
  - «Hijos de Israel» mantiene la formulación bíblica tradicional del sintagma, compatible con un registro moderno.
  - La puntuación sigue el flujo del hebreo y la frase final de propósito con tono natural en español.
