id: PHP.1.10
reference: Philippians 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τὸ δοκιμάζειν ὑμᾶς τὰ διαφέροντα, ἵνα ἦτε εἰλικρινεῖς καὶ ἀπρόσκοποι εἰς ἡμέραν Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/010.yaml
  text: so that you may approve the things that are excellent, in order that you may be pure and blameless for the day of Messiah,
translation:
  language: ko
  text: 그리하여 여러분이 가장 좋은 것을 분별하여[a] 메시아의 날을 위하여 순결하고 흠 없는 자가 되도록 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「가장 좋은 것을 인정하여」 또는 더 문자적으로 「서로 다른 것들을 분별하여」. 헬라어 δοκιμάζειν은 「시험하여 인정하다」의 의미를, τὰ διαφέροντα는 「더 뛰어난 것들」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὸ δοκιμάζειν
  english_pob_choice: so that you may approve
  chosen_korean: 그리하여 ~을 분별하여
  alternatives_korean:
  - ~을 시험하여 인정하여
  - ~을 인정하여
  lexicon: BDAG
  rationale: εἰς τό + 부정사는 목적·결과를 표현한다. δοκιμάζω가 「시험을 거쳐 인정·식별」의 의미이므로 「분별하여」가 자연스럽다. 영어 POB의 「approve」는 인정의 측면을 강조하지만, 한국어에서는 「분별」이 시험·식별·인정을 함께 담는다.
- source_word: τὰ διαφέροντα
  english_pob_choice: the things that are excellent
  chosen_korean: 가장 좋은 것
  alternatives_korean:
  - 더 뛰어난 것들
  - 서로 다른 것들
  - 중요한 것들
  lexicon: BDAG
  rationale: 본래 「다른 것들」이지만 관용적으로 「더 뛰어난 것·중요한 것」을 가리킨다. 「가장 좋은 것」이 그 비교 우위의 함의를 자연스럽게 담는다.
- source_word: εἰλικρινεῖς
  english_pob_choice: pure
  chosen_korean: 순결한
  alternatives_korean:
  - 진실한
  - 순전한
  lexicon: BDAG
  rationale: εἰλικρινής는 「순결·순전」을 가리키며, 윤리적 맥락에서 「순결」이 자연스럽다.
- source_word: ἀπρόσκοποι
  english_pob_choice: blameless
  chosen_korean: 흠 없는
  alternatives_korean:
  - 거치는 것이 없는
  - 책망할 것이 없는
  lexicon: BDAG
  rationale: 「흠 없다」가 도덕적 무결성을 간결하게 담아내며, 「순결한」과 짝을 이룬다.
- source_word: εἰς ἡμέραν Χριστοῦ
  english_pob_choice: for the day of Messiah
  chosen_korean: 메시아의 날을 위하여
  alternatives_korean:
  - 메시아의 날까지
  - 그리스도의 날을 위하여
  lexicon: BDAG
  rationale: εἰς는 종말론적 목표 지향을 가리키므로 「~을 위하여」가 자연스럽다. Χριστός는 칭호로 기능하므로 「메시아」로 옮긴다.
theological_decisions:
- issue: 종말론적 「~의 날」 구문에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아의 날
  alternative_readings:
  - 그리스도의 날
  rationale: 종말론적 「~의 날」 구문은 메시아의 도래를 가리키는 칭호적 표현이다. 한국 전통의 「그리스도의 날」은 음역으로 굳어져 칭호성이 가려지므로 「메시아의 날」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title)'
