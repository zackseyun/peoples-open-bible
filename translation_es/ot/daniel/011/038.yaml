translation:
  language: es
  text: Pero honrará a un dios de fortalezas[a] en su lugar[b]; honrará a un dios que sus padres no conocieron con oro, plata, piedras preciosas[c] y cosas deseables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dios de baluartes».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «sobre su base» o «sobre su pedestal»; la frase puede significar «en su lugar» o «en lugar de él».
    reason: alternative_reading
  - marker: c
    text: O «cosas preciosas» o «tesoros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֶאֱלֹהַּ
  english_pob_choice: Instead, ... a god
  chosen_spanish: En su lugar ... a un dios
  alternatives_spanish:
  - Pero ... a un dios
  - Y ... a un dios
  lexicon: HALOT
  rationale: El hebreo introduce contraste con el verso anterior; «En su lugar» comunica bien ese valor discursivo en español sin perder la referencia a una deidad.
- source_word: מָעֻזִּים
  english_pob_choice: fortresses
  chosen_spanish: fortalezas
  alternatives_spanish:
  - baluartes
  - fortificaciones
  - lugares fuertes
  lexicon: HALOT
  rationale: El plural denota lugares de fuerza o defensa. «Fortalezas» suena natural en español moderno y mantiene el sentido militar del contexto.
- source_word: עַל כַּנּוֹ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - sobre su base
  - sobre su pedestal
  - en lugar de él
  lexicon: HALOT
  rationale: La expresión es difícil e idiomática. «En su lugar» conserva el sentido probable y evita una literalidad oscura; la tensión del giro se conserva con la nota.
- source_word: יְכַבֵּד
  english_pob_choice: he will honor
  chosen_spanish: honrará
  alternatives_spanish:
  - glorificará
  - dará honra a
  lexicon: HALOT
  rationale: El piel de כבד aquí significa honrar. «Honrará» es breve, natural y coherente con ambas ocurrencias del verso.
- source_word: וְלֶאֱלוֹהַּ אֲשֶׁר לֹא יְדָעֻהוּ אֲבֹתָיו
  english_pob_choice: a god whom his fathers did not know
  chosen_spanish: a un dios que sus padres no conocieron
  alternatives_spanish:
  - a un dios desconocido por sus padres
  - a un dios que sus antepasados no conocieron
  lexicon: HALOT
  rationale: La cláusula describe una deidad desconocida para sus antepasados. Se mantiene «padres» para reflejar el término hebreo y el linaje ancestral.
- source_word: אֲבֹתָיו
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: En este contexto genealogíco e histórico, «padres» reproduce con fidelidad el plural masculino del hebreo y evita suavizarlo con un genérico más amplio.
- source_word: בְּזָהָב וּבְכֶסֶף
  english_pob_choice: with gold, silver
  chosen_spanish: con oro, plata
  alternatives_spanish:
  - por medio de oro y plata
  - mediante oro y plata
  lexicon: HALOT
  rationale: La preposición beth es instrumental/associativa; «con» es el equivalente más natural en español para expresar los medios de honor.
- source_word: וּבְאֶבֶן יְקָרָה
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - una piedra preciosa
  - piedras costosas
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, la frase funciona de manera colectiva en la serie de objetos valiosos. «Piedras preciosas» evita una singularidad artificial.
- source_word: וּבַחֲמֻדוֹת
  english_pob_choice: desirable things
  chosen_spanish: cosas deseables
  alternatives_spanish:
  - tesoros
  - cosas preciosas
  - objetos deseables
  lexicon: HALOT
  rationale: El sustantivo indica objetos valiosos o deseables en sentido amplio. «Cosas deseables» se mantiene cercano al sentido léxico sin restringirlo indebidamente.
theological_decisions:
- issue: Identidad del «dios de fortalezas»
  english_pob_reading: Render the phrase descriptively as 'a god of fortresses' without identifying it with a specific historical or eschatological figure or deity.
  chosen_spanish_reading: Traducir descriptivamente como «un dios de fortalezas» sin identificarlo con una deidad concreta ni con una figura histórica específica.
  alternative_spanish_readings:
  - el dios de las fortalezas
  - un dios guerrero específico
  - una referencia simbólica al poder militar
  rationale: El hebreo no aporta datos suficientes en este versículo para fijar una identificación particular. La traducción debe preservar la ambigüedad del texto y no resolver una cuestión debatida.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sentido de עַל־כַּנּוֹ
  english_pob_reading: Translate idiomatically as 'in his place.'
  chosen_spanish_reading: Traducir idiomáticamente como «en su lugar».
  alternative_spanish_readings:
  - sobre su base
  - sobre su pedestal
  - en lugar de él
  rationale: La frase es condensada y discutida. «En su lugar» expresa mejor el contraste probable en el contexto y evita una especificación excesiva; la nota conserva la alternativa más literal.
  doctrine_reference: Preservar la tensión textual sin forzar la resolución.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en «En su lugar[a]», [b] y [c] en «piedras preciosas[b][c]».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando el texto lo requiriera; este versículo no contiene el nombre divino.
  - Se prefirió «padres» sobre «antepasados» para reflejar con mayor cercanía אֲבֹתָיו y la formulación de la POB en inglés.
  - «Piedras preciosas» se usa de forma colectiva y natural en la serie de objetos de valor.
  - No se introdujo una identificación doctrinal del «dios de fortalezas» más allá de la descripción del texto.
