translation:
  language: es
  text: Delante de Yahvé, porque viene[a], porque viene para juzgar la tierra. Juzgará el mundo con justicia[c], y a los pueblos[b] con su fidelidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "porque viene, porque viene". El hebreo repite el verbo para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "las naciones" para "los pueblos".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "con su verdad".'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - antes de
  - en la presencia de
  lexicon: HALOT
  rationale: La expresión preposicional con פָּנִים puede llevar la idea de estar 'antes de' o 'en presencia de'. En español, 'delante de' conserva la relación espacial-relacional con naturalidad y suena más idiomático que un calco rígido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración, no como sustitución por un título. 'Yahvé' es la forma establecida en el proyecto para יהוה y es clara para un público eclesial amplio.
- source_word: כִּי בָא ... כִּי בָא
  english_pob_choice: for he is coming, for he is coming
  chosen_spanish: porque viene, porque viene
  alternatives_spanish:
  - porque está viniendo, porque está viniendo
  - porque ha venido, porque ha venido
  lexicon: HALOT
  rationale: El perfecto poético de בוא expresa inminencia o certeza. En español, 'viene' comunica mejor esa fuerza viva y anticipatoria que una traducción más analítica. Se conserva la repetición para mantener el énfasis del hebreo.
- source_word: לִשְׁפֹּט
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - gobernar
  - reinar
  lexicon: HALOT
  rationale: Aquí שׁפט se entiende en su sentido judicial, reforzado por 'con justicia' y por el paralelismo del versículo. 'Juzgar' es la equivalencia más directa y evita suavizar el contenido.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En paralelo con תֵּבֵל, el alcance es cósmico y universal. 'La tierra' preserva esa amplitud sin restringir el término a una región particular.
- source_word: יִשְׁפֹּט
  english_pob_choice: He will judge
  chosen_spanish: Juzgará
  alternatives_spanish:
  - juzga
  - está por juzgar
  lexicon: HALOT
  rationale: El imperfecto hebreo se vierte naturalmente al futuro en este anuncio profético-poético. 'Juzgará' mantiene el tono declarativo del texto.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra habitada
  lexicon: HALOT
  rationale: תבל denota el mundo habitado/ordenado. 'El mundo' es la opción natural en español y funciona bien en el paralelismo con 'la tierra'.
- source_word: בְּצֶדֶק
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - en justicia
  - con rectitud
  lexicon: HALOT
  rationale: Aunque צֶדֶק puede traducirse 'justicia' o 'rectitud', en este contexto judicial 'justicia' transmite mejor el marco de sentencia y gobierno moral. Se conserva la preposición 'con' para reflejar el בְּ.
- source_word: וְעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a las naciones
  - a los pueblos de la tierra
  lexicon: HALOT
  rationale: עַמִּים es plural de 'pueblos'; 'a los pueblos' respeta mejor el matiz léxico que 'naciones'. El acusativo se expresa naturalmente con 'a' en español.
- source_word: בֶּאֱמוּנָתוֹ
  english_pob_choice: with his faithfulness
  chosen_spanish: con su fidelidad
  alternatives_spanish:
  - con su verdad
  - con su lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה aquí denota firmeza, confiabilidad y fidelidad. 'Fidelidad' comunica bien ese campo semántico en español. 'Verdad' queda como alternativa útil porque el término también puede abarcar la idea de verdad en algunos contextos.
theological_decisions:
- issue: Alcance del juicio divino
  english_pob_reading: Retain 'judge' language without softening it to merely 'rule' or expanding it into a fully developed final-judgment doctrine.
  chosen_spanish_reading: Mantener el lenguaje de 'juzgar' sin reducirlo a 'reinar' ni expandirlo hacia una doctrina más desarrollada del juicio final.
  alternative_spanish_readings:
  - Traducir 'reinar' o 'gobernar' para destacar la realeza de Yahvé
  - Ampliar interpretivamente hacia el juicio escatológico final
  rationale: El hebreo afirma que Yahvé viene a juzgar la tierra; la traducción debe conservar ese contenido sin diluirlo ni cargarlo con más dogmática de la que el verso expresa. 'Juzgar' preserva la tensión entre realeza y sentencia.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Modo de referir el nombre divino
  english_pob_reading: the LORD / Yahweh in the audit trail context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El proyecto español sigue la política de transliterar el Tetragrámaton como 'Yahvé', no de sustituirlo por un título. Esto conserva el nombre propio revelado a Israel y se alinea con el criterio fuente-directo del proyecto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés, conservando la repetición de כִּי בָא, el paralelismo tierra/mundo y pueblos/fidelidad. No se introdujeron ampliaciones doctrinales ni se suavizó el lenguaje judicial. La revisión reciente del inglés no requirió cambios, y el español refleja esa estabilidad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se traduce שׁפט como 'juzgar', no como 'gobernar'.
  - Se mantiene la doble repetición de 'porque viene' para preservar el énfasis hebreo.
  - '''La tierra'' y ''el mundo'' se diferencian para reflejar הָאָרֶץ y תֵּבֵל.'
  - '''Con justicia'' y ''con su fidelidad'' mantienen el marco moral y relacional del versículo.'
