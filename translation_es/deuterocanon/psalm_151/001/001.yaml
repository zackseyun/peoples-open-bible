translation:
  language: es
  text: Yo era pequeño entre mis hermanos[a], y el menor en la casa de mi padre; estaba pastoreando[b] las ovejas de mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pequeño entre mis hermanos». El griego también puede sugerir pequeñez, juventud o poca importancia.
    reason: lexical_alternative
  - marker: b
    text: 'O «pastoreé las ovejas de mi padre». El imperfecto griego puede enfatizar una acción continua en el pasado: «estaba pastoreando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μικρὸς
  english_pob_choice: small
  chosen_spanish: Pequeño
  alternatives_spanish:
  - pequeño
  - menor
  - joven
  lexicon: LSJ
  rationale: μικρός denota literalmente pequeñez; en este contexto autobiográfico también puede insinuar poca consideración o juventud. «Pequeño» conserva la idea básica sin imponer de antemano el matiz de estatus o edad.
- source_word: ἐν τοῖς ἀδελφοῖς μου
  english_pob_choice: among my brothers
  chosen_spanish: entre mis hermanos
  alternatives_spanish:
  - entre mis hermanos varones
  - entre mis hermanos y hermanas
  - entre mis hermanos de sangre
  lexicon: LSJ
  rationale: ἀδελφοῖς es masculino plural; el contexto familiar de David apunta a sus hermanos varones. «Entre mis hermanos» mantiene la especificidad sin sobrecargar la frase.
- source_word: νεώτερος
  english_pob_choice: the youngest
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el más pequeño
  - el menor de todos
  lexicon: LSJ
  rationale: νεώτερος es comparativo, pero en este contexto funciona naturalmente como el miembro de menor edad. «El menor» comunica la relación familiar de edad sin convertir innecesariamente el comparativo en una explicitación más fuerte que el griego.
- source_word: ἐν τῷ οἴκῳ τοῦ πατρός μου
  english_pob_choice: in my father's house
  chosen_spanish: en la casa de mi padre
  alternatives_spanish:
  - en el hogar de mi padre
  - en la casa paterna
  - en la casa de mi padre
  lexicon: LSJ
  rationale: οἶκος puede significar «casa» o «hogar/casa-hogar». «Casa de mi padre» es natural en español y conserva el sentido familiar concreto del griego.
- source_word: ἔποιμαινον
  english_pob_choice: I was shepherding
  chosen_spanish: estaba pastoreando
  alternatives_spanish:
  - pastoreaba
  - estaba cuidando como pastor
  - apacentaba
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua en el pasado. «Estaba pastoreando» preserva mejor ese aspecto que un pretérito simple; «apacentaba» también sería posible, pero resulta menos transparente para el español moderno.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del padre
  - el ganado ovino
  lexicon: LSJ
  rationale: πρόβατα designa concretamente ovejas. «Las ovejas» es la forma más directa y fiel; «rebaño» suaviza la especificidad del sustantivo.
theological_decisions:
- issue: Alcance de la autodescripción de David
  english_pob_reading: small ... the youngest
  chosen_spanish_reading: pequeño ... el menor
  alternative_spanish_readings:
  - el más pequeño ... el más joven
  - el más insignificante ... el menor
  rationale: El verso presenta a David como comparativamente pequeño y de menor edad, pero no obliga a intensificar la idea hasta «insignificante» o a convertir el comparativo en superlativo. La traducción preserva esa tensión sin añadir interpretación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Referencia familiar masculina
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos varones
  - hermanos y hermanas
  rationale: El griego usa masculino plural y la escena presupone a los hermanos de David. Mantener «hermanos» evita una neutralización no respaldada por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Aspecto verbal del pastoreo
  english_pob_reading: I was shepherding
  chosen_spanish_reading: estaba pastoreando
  alternative_spanish_readings:
  - pastoreaba
  - apacentaba
  rationale: El imperfecto griego destaca una acción en curso en el pasado. La perífrasis española preserva mejor ese valor aspectual que un pretérito perfecto simple.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'La redacción sigue el patrón del audit trail inglés, pero ajusta la afinidad idiomática al español: mantiene μικρός como «pequeño», νεώτερος como «el menor» por la lectura contextual adoptada en la última revisión inglesa, y el imperfecto ἔποιμαινον como perífrasis progresiva para conservar el aspecto. También se retiene la concreción de «ovejas» frente a una lectura más general como «rebaño».'
  spanish_consistency_notes:
  - Se usa «hermanos» para reflejar el masculino plural griego en contexto familiar davídico.
  - Se evita «Cristo», «Señor» u այլ terminología no pertinente; el texto no contiene esos términos.
  - «Pastoreando» conserva el valor durativo del imperfecto y se alinea con la decisión inglesa de evitar un simple pretérito.
  - La puntuación reproduce la estructura de dos miembros con cesura medial, conforme al paralelismo del verso.
