  text: וְ/כֵלַ֖י כֵּלָ֣י/ו רָעִ֑ים ה֚וּא זִמּ֣וֹת יָעָ֔ץ לְ/חַבֵּ֤ל ענוים בְּ/אִמְרֵי שֶׁ֔קֶר וּ/בְ/דַבֵּ֥ר אֶבְי֖וֹן מִשְׁפָּֽט־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/032/007.yaml
  text: And the rogue’s devices are evil[a]; he devises schemes to ruin the humble with lying words[c][b], even when the needy speaks justice.
  footnotes:
  - marker: a
    text: Or 'tools,' 'instruments,' or 'weapons' for 'devices'; the Hebrew term can denote implements literally and methods metaphorically.
    reason: lexical_alternative
  - marker: b
    text: Or 'the afflicted' or 'the meek' for 'the humble.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''and when the poor man speaks justice/judgment''; the sense may be that the rogue opposes the poor even when the poor person’s case is just.'
    reason: lexical_alternative
