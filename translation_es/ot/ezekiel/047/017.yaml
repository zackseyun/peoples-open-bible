base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/017.yaml
  text: So the border shall be from the sea to Hazar-enon[a], at the border of Damascus; and on the north, northward, is the border of Hamath[b]. This shall be the north side.
  footnotes:
