translation:
  language: es
  text: Él dio esplendor, belleza y gloria a las fiestas, año tras año; cuando alababan su santo nombre, antes del amanecer resonaba el atrio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El final del verso es difícil en el hebreo conservado. El paralelo griego dice: «y desde temprano resonaba el santuario», lo que probablemente preserva el sentido general de la línea; aquí «atrio» sigue la revisión auditada que procura reflejar más de cerca el hebreo difícil.'
    reason: textual_variant
lexical_decisions:
- source_word: ויתן / ἔδωκεν
  english_pob_choice: He gave
  chosen_spanish: dio
  alternatives_spanish:
  - otorgó
  - concedió
  - dispensó
  lexicon: HALOT; LXX ἔδωκεν
  rationale: En español, "dio" conserva la sencillez y la direccionalidad del verbo hebreo y del griego, sin introducir una idea más interpretativa como "instituyó" o "adornó". El contexto de honrar las fiestas permite entender que les confirió estas cualidades.
- source_word: לחגים / ἐν ἑορταῖς
  english_pob_choice: to the festivals
  chosen_spanish: a las fiestas
  alternatives_spanish:
  - para las fiestas
  - en las fiestas
  lexicon: HALOT; LXX ἐν ἑορταῖς
  rationale: '"A las fiestas" mantiene la relación directa con el sustantivo hebreo y su función de destinatario/ámbito de la dádiva. En español suena natural y preserva la referencia a celebraciones festivas recurrentes.'
- source_word: בכל שנה ושנה
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - año tras año, sin falta
  lexicon: HALOT
  rationale: La locución española reproduce el valor iterativo del hebreo con un giro idiomático natural y solemne.
- source_word: הוד פאר וכבוד / εὐπρέπειαν
  english_pob_choice: splendor, beauty, and glory
  chosen_spanish: esplendor, belleza y gloria
  alternatives_spanish:
  - majestad, belleza y honor
  - esplendor y gloria
  lexicon: HALOT; LXX εὐπρέπειαν
  rationale: 'El hebreo agrupa términos cercanos de magnificencia: הוד, פאר y כבוד. Se conserva la triple acumulación en español para no borrar la tensión semántica y para reflejar el enriquecimiento del pasaje que el audit trail inglés señaló al añadir "beauty". "Gloria" traduce bien כבוד y "belleza" refleja פאר; "esplendor" cubre הוד en estilo elevado.'
- source_word: בהללו
  english_pob_choice: when they praised
  chosen_spanish: cuando alababan
  alternatives_spanish:
  - al alabar
  - mientras alababan
  lexicon: HALOT
  rationale: El valor temporal/circunstancial del prefijo ב se expresa con claridad mediante "cuando". "Alabar" es el equivalente más natural y reverente en español litúrgico contemporáneo.
- source_word: את שם קדשו
  english_pob_choice: his holy name
  chosen_spanish: su santo nombre
  alternatives_spanish:
  - su nombre santo
  - el santo nombre de él
  lexicon: HALOT
  rationale: Se conserva la fórmula bíblica normal en español, con orden natural y sin perder el carácter reverente del hebreo.
- source_word: לפני בקר / ἀπὸ πρωῒ
  english_pob_choice: before morning / from early morning
  chosen_spanish: antes de la mañana
  alternatives_spanish:
  - de madrugada
  - al amanecer
  lexicon: HALOT; LXX ἀπὸ πρωῒ
  rationale: La frase hebrea es difícil, y el griego apunta a una referencia temporal temprana. "Antes de la mañana" mantiene bastante cerca la superficie del hebreo, a la vez que deja abierta la idea de un canto temprano sin resolver de manera excesiva el problema textual.
- source_word: יָרן משפט / τὸ ἁγίασμα
  english_pob_choice: the court resounded / the sanctuary resounded
  chosen_spanish: resonaba el santuario
  alternatives_spanish:
  - resonaba el recinto sagrado
  - resonaba el templo
  lexicon: HALOT; LXX ἠχεῖν τὸ ἁγίασμα
  rationale: Dado que el final hebreo es oscuro y el griego habla explícitamente del santuario, se adopta "santuario" como la solución más auditable y coherente con la tradición textual. "Resonaba" preserva el efecto acústico del griego y evita una traducción demasiado interpretativa de משפט.
theological_decisions:
- issue: Relación entre el hebreo difícil y el griego paralelo en la clausula final
  english_pob_reading: Translate primarily from the Hebrew, but let the Greek parallel clarify the obscure closing phrase as temple praise sounding from early morning.
  chosen_spanish_reading: Traducir de manera principal el hebreo, dejando que el paralelo griego aclare que se trata del santuario que resonaba desde temprano.
  alternative_spanish_readings:
  - antes de la mañana resonaba el tribunal
  - de madrugada resonaba la corte
  - antes del alba resonaba el juicio
  rationale: El hebreo final es comprimido y semánticamente incierto. El griego paralelo ofrece una lectura cultual clara que ayuda a fijar el sentido sin anular el testimonio hebreo. En español conviene evitar "juicio" o "tribunal" porque cargarían el verso con una idea no asegurada por el conjunto textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando subsiste; usar el griego paralelo como control real de traducción'
translation_notes:
  revision_awareness: La versión inglesa revisada amplió la tríada de honor a "splendor, beauty, and glory" y ajustó la clausula final para reflejar mejor el hebreo difícil junto con el griego. Esta propuesta española sigue esa revisión, conservando la tríada plena y resolviendo la segunda mitad con una formulación cultual sobria y auditable.
  spanish_consistency_notes:
  - Se mantiene "santo nombre" para את שם קדשו, en línea con el registro bíblico del proyecto.
  - Se usa "santuario" para ἁγίασμα por coherencia con el griego paralelo y para evitar una interpretación innecesaria de משפט.
  - La tríada "esplendor, belleza y gloria" conserva la acumulación retórica del hebreo sin convertirla en una paráfrasis.
  - '"Año tras año" refleja la repetición anual del hebreo de forma natural en español.'
  - El texto evita "SEÑOR" como sustituto de Yahvé porque aquí no aparece el Tetragrámaton en la forma fuente dada.
