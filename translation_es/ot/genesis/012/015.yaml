translation:
  language: es
  text: Cuando los oficiales de Faraón la vieron, hablaron bien de ella a Faraón[a], y la mujer fue llevada a la casa de Faraón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «la elogiaron a Faraón» o «la recomendaron a Faraón».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «casa»; aquí puede implicar la casa real o la corte de Faraón, no solo el edificio físico.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׂרֵי פַרְעֹה
  english_pob_choice: Pharaoh’s officials
  chosen_spanish: los oficiales de Faraón
  alternatives_spanish:
  - los príncipes de Faraón
  - los jefes de Faraón
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a gobernantes, jefes u oficiales. En un contexto cortesano, «oficiales» comunica autoridad y función administrativa sin introducir la idea de linaje real que «príncipes» podría sugerir en español.
- source_word: וַיְהַלְלוּ אֹתָהּ אֶל־פַּרְעֹה
  english_pob_choice: they praised her to Pharaoh
  chosen_spanish: la alabaron ante Faraón
  alternatives_spanish:
  - la elogiaron ante Faraón
  - hablaron bien de ella ante Faraón
  lexicon: HALOT
  rationale: El piel de הלל aquí expresa alabanza o elogio. «La alabaron» conserva el valor léxico básico y «ante Faraón» refleja adecuadamente la dirección relacional del hebreo sin forzar una formulación demasiado literal.
- source_word: וַתֻּקַּח
  english_pob_choice: was taken
  chosen_spanish: fue llevada
  alternatives_spanish:
  - fue tomada
  - fue llevada consigo
  lexicon: HALOT
  rationale: La forma pasiva/medio-pasiva del hebreo resalta la falta de agente explícito. En español, «fue llevada» mantiene la pasividad de la acción y suena natural en el flujo narrativo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la mujer Sarai
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la mujer». Mantener «la mujer» evita añadir «esposa», que no es la forma léxica usada aquí, aunque el referente sea la esposa de Abram.
- source_word: בֵּית פַּרְעֹה
  english_pob_choice: into Pharaoh’s house
  chosen_spanish: a la casa de Faraón
  alternatives_spanish:
  - a la casa de Faraón
  - al palacio de Faraón
  - a la casa/linaje de Faraón
  lexicon: HALOT
  rationale: בַּיִת puede significar casa o casa real/entorno doméstico. «A la casa de Faraón» conserva la imagen hebrea con claridad; «palacio» sería más interpretativo y «casa/linaje» añadiría una glosa no explicitada por el texto.
- source_word: וַיִּרְאוּ אֹתָהּ
  english_pob_choice: saw her
  chosen_spanish: la vieron
  alternatives_spanish:
  - la miraron
  - la observaron
  lexicon: HALOT
  rationale: ראה es el verbo ordinario «ver». «La vieron» sigue de cerca el sentido básico sin ampliar el gesto narrativo.
translation_notes:
  revision_awareness: El texto español sigue el estado del audit trail inglés sin revisiones aplicadas; se mantiene la misma solución de equivalencia óptima para los verbos clave y la misma cautela en «casa de Faraón».
  spanish_consistency_notes:
  - Se mantiene «Faraón» como forma estable del nombre propio y la mayúscula reverencial convencional en español.
  - Se prefirió «la mujer» en lugar de «la esposa» para respetar la forma hebrea directa.
  - La pasiva española «fue llevada» preserva la falta de agente explícito del hebreo.
  - Las notas a pie conservan la alternativa léxica y la observación cultural del texto fuente.
