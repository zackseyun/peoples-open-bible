  glossary_alignment: No hay conflictos con la terminología base del proyecto. «el Todopoderoso» corresponde bien a παντοκράτωρ. «Aliado» preserva el matiz militar de συμμάχου. La principal corrección léxica necesaria es fortalecer κατέσφαξαν.
