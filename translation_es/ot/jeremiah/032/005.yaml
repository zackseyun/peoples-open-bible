base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/005.yaml
  text: And he will take Zedekiah to Babylon[a], and there he will remain until I attend to him, declares Yahweh. If you fight against the Chaldeans[b], you will not succeed.
  footnotes:
