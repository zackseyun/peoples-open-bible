translation:
  language: es
  text: 'Entonces dijo tu sierva: «Por favor, que la palabra de mi señor el rey traiga descanso, porque mi señor el rey es como el ángel de Dios[a], para oír lo bueno y lo malo[b]. Y que Yahvé tu Dios esté contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un ángel de Dios»; el hebreo también puede entenderse más ampliamente como «como un mensajero de Dios».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «oír lo bueno y lo malo», un modismo para discernir o juzgar entre lo bueno y lo malo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְחָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu servidora
  - tu esclava
  lexicon: HALOT
  rationale: El hebreo indica una mujer en condición de servidumbre. En español, «sierva» preserva la humillación deferente de la fórmula cortesana sin borrar del todo el matiz femenino que el inglés dejó implícito.
- source_word: יִהְיֶה נָּא
  english_pob_choice: Please let ... be
  chosen_spanish: sea, por favor
  alternatives_spanish:
  - quiera ser
  - hágase, por favor
  lexicon: HALOT
  rationale: La forma yusiva con נָא expresa ruego cortés. «Sea, por favor» mantiene la petición sin sobrecargar la frase con perífrasis innecesarias.
- source_word: דְּבַר אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: the word of my lord the king
  chosen_spanish: la palabra de mi señor el rey
  alternatives_spanish:
  - la decisión de mi señor el rey
  - el asunto de mi señor el rey
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «decisión». Aquí la petición apunta al pronunciamiento real; «palabra» conserva el paralelo hebreo y funciona bien en español.
- source_word: לִמְנוּחָה
  english_pob_choice: bring rest
  chosen_spanish: sea para descanso
  alternatives_spanish:
  - traiga descanso
  - sea de alivio
  - dé reposo
  lexicon: HALOT
  rationale: El sustantivo comunica reposo, alivio o tranquilidad. «Sea para descanso» refleja el efecto esperado del dictamen sobre la situación.
- source_word: כְּמַלְאַךְ הָאֱלֹהִים
  english_pob_choice: like the angel of God
  chosen_spanish: como el ángel de Dios
  alternatives_spanish:
  - como un ángel de Dios
  - como el mensajero de Dios
  lexicon: HALOT
  rationale: En esta comparación cortesana, «ángel» mantiene el valor elevado y tradicional del término sin imponer una paráfrasis interpretativa. La alternativa «mensajero» queda abierta porque el hebreo admite ese matiz.
- source_word: לִשְׁמֹעַ הַטּוֹב וְהָרָע
  english_pob_choice: to hear the good and the evil
  chosen_spanish: para oír lo bueno y lo malo
  alternatives_spanish:
  - para escuchar lo bueno y lo malo
  - para discernir entre lo bueno y lo malo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «oír lo bueno y lo malo». En español, «oír» conserva la literalidad; se entiende como capacidad de recibir y juzgar, sin convertirlo en una explicación más amplia de la que el texto da.
- source_word: וַיהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahvé, tu Dios
  - el SEÑOR tu Dios
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la convención POB en español: «Yahvé». La posesión «tu Dios» mantiene la relación de pacto del hebreo.'
- source_word: יְהִי עִמָּךְ
  english_pob_choice: may ... be with you
  chosen_spanish: esté contigo
  alternatives_spanish:
  - sea contigo
  - permanezca contigo
  lexicon: HALOT
  rationale: La fórmula jussiva de bendición se vierte naturalmente como «esté contigo», equivalente idiomático claro y reverente en español.
theological_decisions:
- issue: Comparación del rey con el ángel de Dios
  english_pob_reading: like the angel of God
  chosen_spanish_reading: como el ángel de Dios
  alternative_spanish_readings:
  - como un ángel de Dios
  - como el mensajero de Dios
  rationale: La POB inglesa mantiene «angel» en el texto principal y deja abierta la alternativa «messenger» en nota. En español se preserva esa elevación literaria y no se reduce la frase a una mera metáfora funcional.
  doctrine_reference: 'DOCTRINE.md: lenguaje figurado y equivalencias lexicográficas de מלאך'
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: La tradición POB documentada para español usa «Yahvé» como representación directa del Tetragrámaton. Se evita el ocultamiento del nombre con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión auditada más reciente: se mantuvo la literalidad de לִשְׁמֹעַ («oír») en vez de expandirla a «discernir», y se conservaron las opciones léxicas marcadas como abiertas en el aparato inglés, especialmente la ambigüedad de מלאך y el modismo judicial de «lo bueno y lo malo».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, coherente con el estándar español del proyecto.
  - Se usa «sierva» para שִׁפְחָתְךָ, conservando el matiz femenino sin recurrir a formulación arcaizante.
  - Se evita «SEÑOR» como máscara del nombre divino, conforme a la política del proyecto.
  - «Oír lo bueno y lo malo» conserva la literalidad del hebreo y deja la explicación en nota, en línea con el audit trail inglés.
