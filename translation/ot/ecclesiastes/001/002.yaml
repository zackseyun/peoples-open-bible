theological_decisions:
- issue: How to render הֶבֶל, Qoheleth's governing motif
  chosen_reading: Render with the concrete image — 'breath of breaths' for the superlative construct, 'mere breath' for the predicate — with a book-level footnote anchoring the Hebrew's three-way semantic range.
  alternative_readings:
  - fleeting
  - elusive
  - futility
  - meaninglessness
  - vanity
  - absurd
  rationale: The Hebrew הֶבֶל carries three linked senses at once (transient, elusive, ironic). Any abstracting English gloss selects one and drops the others — 'meaninglessness' (NIV) imports a nihilism Qoheleth does not assert; 'vanity' (KJV) reads as pride in modern English; 'futility' narrows to goal-frustration and drops the transience and incomprehensibility senses that carry Qoheleth's argument (3:11, 8:17). The concrete image 'breath' preserves all three senses, matches the author's deliberate choice of an image-bearing word over the abstract Hebrew alternatives he had available, and enables the superlative הֲבֵל הֲבָלִים to render naturally as 'breath of breaths' while predicate uses take 'mere breath' for evaluative tone. See tools/prompts/book_contexts/ecclesiastes.md for the full argument.
  doctrine_reference: Translation philosophy §§1, 3, 6
