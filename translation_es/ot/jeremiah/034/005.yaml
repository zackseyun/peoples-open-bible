    rationale: En este contexto significa «anteriores/precedentes», no «primeros» en sentido ordinal absoluto. La frase actual puede desorientar al lector y debilita la precisión exegética.
  - severity: medium
    issue: «que fueron antes de ti»
    rationale: Es comprensible, pero resulta torpe y demasiado calcado. «Que te precedieron» comunica mejor לְפָנֶיךָ en español natural.
  - severity: medium
    issue: «te harán lamento» para יִסְפְּדוּ לָךְ
    rationale: No suena idiomático en español general. El hebreo expresa lamentación/m duelo formal por alguien; «harán duelo por ti» preserva el sentido y la solemnidad con mejor legibilidad.
