review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo, mantiene el plural activo en «lo sepultaron», conserva «campo de sepultura» para בִּשְׂדֵה הַקְּבוּרָה, y respeta la razón causal de כִּי אָמְרוּ. También preserva correctamente la nota léxica sobre מְצוֹרָע. Sin embargo, «se acostó con sus padres» no es una forma española fielmente inteligible para la fórmula de muerte; suena como acción física y puede malentenderse, mientras el hebreo aquí es claramente la fórmula obituaria ‘durmió/reposó con sus padres’.
  spanish_quality_summary: La redacción general es clara y digna, pero «se acostó con sus padres» resulta poco natural y potencialmente equívoco en español moderno. Una reparación mínima a «durmió con sus padres» conserva el formulismo sin caer en la impropiedad semántica. El resto del versículo lee bien en español eclesial amplio.
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. El uso de «leproso» con nota explicativa coincide con el audit trail. «Uzías», «Jotam», «sepultaron», y «reinó en su lugar» son adecuados. La única decisión léxica a corregir es וַיִּשְׁכַּב.
  issues:
  - severity: medium
    issue: «se acostó con sus padres[a]» para וַיִּשְׁכַּב עִם אֲבֹתָיו
    rationale: Aunque intenta conservar la literalidad formulística, en español moderno «acostarse con» se entiende fácilmente como recostarse o incluso tiene otra connotación fuerte; no comunica con claridad la fórmula regia de muerte. «Durmió con sus padres» o «reposó con sus padres» preserva mejor el sentido y la tradición bíblica.
  revised_spanish_text: 'Y Uzías durmió con sus padres[a], y lo sepultaron con sus padres en el campo de sepultura que pertenecía a los reyes, porque dijeron: «Es un leproso». Y Jotam, su hijo, reinó en su lugar.'
  revised_footnotes:
