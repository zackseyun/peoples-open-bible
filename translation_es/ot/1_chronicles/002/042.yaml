translation:
  language: es
  text: 'Y los hijos de Caleb, hermano de Jerameel: Mesha, su primogénito, que fue padre de Zif[a], y los hijos de Maresa, padre de Hebrón[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Padre de» en Crónicas puede señalar también antepasado, jefe de clan o fundador, no solo padre biológico.
    reason: cultural_note
  - marker: b
    text: 'La sintaxis del hebreo en la cláusula final es difícil. El texto masorético dice literalmente: «y los hijos de Maresa, padre de Hebrón». Algunos entienden esto como «Maresa, padre de Hebrón», mientras que otros mantienen la redacción tal como se traduce aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  lexicon: HALOT
  rationale: La fórmula genealógica בְּנֵי se conserva de manera natural como «los hijos de» en español bíblico, manteniendo el flujo de lista genealógica. «Descendientes» sería posible, pero generaliza más de lo que el hebreo inmediato exige.
- source_word: כָלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar y reconocible en español.
- source_word: אֲחִי יְרַחְמְאֵל
  english_pob_choice: the brother of Jerahmeel
  chosen_spanish: hermano de Jerameel
  alternatives_spanish:
  - el hermano de Jerameel
  lexicon: HALOT
  rationale: Se conserva la relación de parentesco con un giro natural en español. «Jerameel» sigue la transliteración habitual del nombre, y se omite el artículo porque la construcción española con nombre propio lo permite sin pérdida de sentido.
- source_word: מֵישָׁע
  english_pob_choice: Mesha
  chosen_spanish: Mesá
  alternatives_spanish:
  - Mesha
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acento agudo final para reflejar la pronunciación española y evitar una lectura monosilábica. La forma base corresponde a la misma referencia nominal del hebreo.
- source_word: בְּכֹרוֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo primogénito
  - su primero nacido
  lexicon: HALOT
  rationale: «Primogénito» preserva la noción de orden de nacimiento y estatus. En español es la forma más natural y fiel para בְּכֹר.
- source_word: הוּא
  english_pob_choice: who was
  chosen_spanish: el cual fue
  alternatives_spanish:
  - que fue
  - quien fue
  lexicon: HALOT
  rationale: El pronombre independiente introduce una cláusula identificadora. «El cual fue» reproduce con claridad la función explicativa sin volver la frase demasiado moderna o suelta.
- source_word: אֲבִי זִיף
  english_pob_choice: the father of Ziph
  chosen_spanish: padre de Zif
  alternatives_spanish:
  - fundador de Zif
  - antepasado de Zif
  lexicon: HALOT
  rationale: En contextos genealógicos, אָב puede abarcar padre, antepasado o fundador. Se mantiene «padre de» para no forzar una interpretación más específica de la que el texto permite. «Zif» conserva la transliteración del topónimo/nombre.
- source_word: וּבְנֵי מָרֵשָׁה
  english_pob_choice: and the sons of Mareshah
  chosen_spanish: y los hijos de Maresa
  alternatives_spanish:
  - y los descendientes de Maresa
  - y los hijos de Maresa
  lexicon: HALOT
  rationale: Se mantiene la misma fórmula genealógica que al inicio. La forma «Maresa» es una transliteración castellana natural del nombre hebreo. La estructura hebrea es difícil, pero se preserva sin emendar.
- source_word: אֲבִי חֶבְרוֹן
  english_pob_choice: the father of Hebron
  chosen_spanish: padre de Hebrón
  alternatives_spanish:
  - fundador de Hebrón
  - antepasado de Hebrón
  lexicon: HALOT
  rationale: Como en Zif, se conserva «padre de» para respetar el valor genealógico/toponímico flexible de אָב. «Hebrón» corresponde al nombre conocido del lugar/persona y mantiene la forma tradicional española.
theological_decisions:
- issue: Valor genealógico de «padre de» en relación con Zif y Hebrón
  english_pob_reading: '''father of'' can denote not only a biological father but also an ancestor, clan head, or founder associated with a place.'
  chosen_spanish_reading: «padre de» puede designar no solo un padre biológico, sino también un antepasado, jefe de clan o fundador ligado a un lugar.
  alternative_spanish_readings:
  - fundador de
  - antepasado de
  - jefe de clan de
  rationale: La frase hebrea conserva una ambigüedad histórica y genealógica. El español debe mantener esa tensión sin resolverla artificialmente; por eso se conserva la literalidad y se explica el alcance posible.
  doctrine_reference: Uso genealógico de אָב en Crónicas
- issue: Sintaxis difícil del cierre «los hijos de Mareshah el padre de Hebron»
  english_pob_reading: Hebrew syntax in the final clause is difficult. The Masoretic Text reads literally, 'and the sons of Mareshah, the father of Hebron.' Some understand this to mean 'Mareshah the father of Hebron,' while others retain the wording as translated.
  chosen_spanish_reading: 'Se mantiene la lectura del texto masorético sin emendar: «y los hijos de Maresa, padre de Hebrón».'
  alternative_spanish_readings:
  - y Maresa, padre de Hebrón
  - y los hijos de Maresa, que fue padre de Hebrón
  rationale: La tensión sintáctica está documentada y no debe desaparecer en la traducción. El español conserva la estructura incómoda de manera legible, dejando abierta la lectura alternativa sin imponerla.
  doctrine_reference: Crítica textual y sintaxis hebrea de 1 Crónicas 2:42
translation_notes:
  revision_awareness: El texto inglés revisado eliminó una coma antes de «the father of Hebron» para acercar esa frase a «Mareshah»; en español se refleja esa misma cercanía sintáctica con «Maresa, padre de Hebrón», conservando la dificultad del original y sin añadir puntuación que sugiera una resolución interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino, aunque en este versículo no hay ocurrencia.
  - Se mantiene «hijos de» como fórmula genealógica en todo el verso para evitar alternar con «descendientes» sin motivo textual.
  - Se conserva «padre de» en ambos casos para reflejar la flexibilidad semítica del hebreo.
  - 'Los nombres propios se transliteran de forma consistente en español: Caleb, Jerameel, Mesá, Zif, Maresa y Hebrón.'
