revisions:
- from: Son como un espantapájaros en un sembrado de pepinos[a], y no pueden hablar; hay que cargarlos, porque no pueden caminar. No les teman, porque no pueden hacer daño[b], ni pueden hacer bien.
  to: Son como un espantapájaros en un campo de pepinos[a], y no pueden hablar; deben ser llevados, porque no pueden caminar. No les teman, porque no pueden hacer daño[b], ni pueden hacer bien.
  rationale: Se ajusta 'hay que cargarlos' a 'deben ser llevados' para reflejar mejor la construcción pasiva intensificada del hebreo y mantener un registro más digno. También se cambia 'sembrado de pepinos' por 'campo de pepinos' para alinearlo más de cerca con la elección auditada del POB inglés y mejorar la naturalidad. Se normaliza la puntuación de las notas sin cambiar su contenido sustancial.
