translation:
  language: es
  text: Moisés oyó al pueblo llorando según sus clanes[a], cada hombre a la entrada de su tienda. Y la ira de Yahvé ardió intensamente, y era malo a los ojos de Moisés[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por sus familias’. El término hebreo puede denotar grupos familiares o clanes.
    reason: lexical_alternative
  - marker: b
    text: O ‘y le resultó desagradable a Moisés’. Literalmente, ‘era malo a los ojos de Moisés’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - percibió
  lexicon: HALOT
  rationale: El verbo reporta percepción auditiva del llanto del pueblo. ‘Oyó’ es natural en español y conserva el hecho de oír sin introducir la idea de atención deliberada que tendría ‘escuchó’.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En el contexto del desierto, ‘el pueblo’ mantiene el colectivo de Israel sin volverlo un término político como ‘la nación’.
- source_word: בֹּכֶה
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - lamentando
  - sollozando
  lexicon: HALOT
  rationale: El participio expresa una acción en curso. ‘Llorando’ comunica bien el llanto audible y sostenido; ‘lamentando’ sería más interpretativo.
- source_word: לְמִשְׁפְּחֹתָיו
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - por sus familias
  - según sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede referirse a grupos familiares amplios o clanes. ‘Clanes’ conserva la precisión social del término; ‘familias’ es posible, pero menos específico.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa el singular distributivo masculino. ‘Cada hombre’ refleja esa forma con fidelidad y mantiene la distribución individual del sujeto.
- source_word: לְפֶתַח אָהֳלוֹ
  english_pob_choice: at the entrance of his tent
  chosen_spanish: a la entrada de su tienda
  alternatives_spanish:
  - en la entrada de su tienda
  - junto a la entrada de su tienda
  lexicon: HALOT
  rationale: ‘Entrada’ reproduce bien פֶּתַח; ‘tienda’ es la forma española más natural para אָהֶל en este contexto nómada.
- source_word: וַיִּחַר אַף יְהוָה
  english_pob_choice: the anger of Yahweh burned
  chosen_spanish: la ira de Yahvé ardió
  alternatives_spanish:
  - se encendió la ira de Yahvé
  - Yahvé se encendió en ira
  lexicon: HALOT
  rationale: La imagen hebrea es la de una ira que ‘arde’. ‘La ira de Yahvé ardió’ preserva la metáfora sin convertirla en una paráfrasis psicológica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según el criterio doctrinal del proyecto. ‘Yahvé’ evita el reemplazo por un título y refleja el Tetragrámaton.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: El intensificador refuerza el grado de la ira. Con ‘ardió’ en español, ‘mucho’ suena natural y suficiente; ‘grandemente’ resultaría más arcaico.
- source_word: וּבְעֵינֵי מֹשֶׁה רָע
  english_pob_choice: it was evil in the eyes of Moses
  chosen_spanish: y fue malo a los ojos de Moisés
  alternatives_spanish:
  - y fue desagradable a los ojos de Moisés
  - y le pareció malo a Moisés
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo con su fuerza valorativa. ‘Malo a los ojos de Moisés’ mantiene la literalidad auditada; ‘desagradable’ explicaría el sentido pero suaviza la tensión semántica.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Nombre divino directamente. La forma ‘Yahvé’ preserva ese nombre propio en español y sigue la decisión doctrinal del proyecto de no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered distributive אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: El distributivo hebreo es masculino singular. En español, ‘cada hombre’ conserva esa huella formal sin perder la función distributiva.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Hebrew idiom וּבְעֵינֵי מֹשֶׁה רָע
  english_pob_reading: it was evil in the eyes of Moses
  chosen_spanish_reading: y fue malo a los ojos de Moisés
  alternative_spanish_readings:
  - y le pareció malo a Moisés
  - y fue desagradable a los ojos de Moisés
  rationale: Se mantiene el giro evaluativo literal para no borrar la tensión semántica entre ‘malo’ y ‘desagradable’. La forma escogida deja abierta la interpretación del juicio de Moisés tal como hace el hebreo.
  doctrine_reference: POB lexical policy on preserving Hebrew idioms where intelligible
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustantivos; la solución española conserva las decisiones auditadas del texto inglés, en particular el nombre divino, el distributivo masculino y el modismo final.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma coherente con el criterio del proyecto para יְהוָה.
  - Se conserva la metáfora de ‘arder’ para la ira divina, sin normalizarla a una simple afirmación psicológica.
  - ‘Clanes’ se usa como equivalente principal de מִשְׁפְּחֹת, con nota alternativa para ‘familias’.
  - El cierre reproduce el idiomatismo hebreo ‘a los ojos de Moisés’ para preservar la tensión semántica del original.
