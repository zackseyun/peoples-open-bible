translation:
  text: Therefore, my children, do not pay attention to the beauty of women, nor dwell
    on their deeds; but walk in simplicity of heart, in the fear of the Lord, laboring
    in good works, and in learning, and in your flocks, until the Lord gives you a
    wife whom he himself chooses, so that you may not suffer as I did.
