translation:
  language: es
  text: ¡Oh vejez dichosa[a], y canas venerables, y una vida conforme a la ley, que un sello fiel de la muerte llevó a su cumplimiento!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bendita vejez'. El griego concentra la imagen en una exclamación de honra. 'Dichosa' conserva el tono laudatorio sin hacer el español más pesado.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακαρίου
  english_pob_choice: blessed
  chosen_spanish: dichosa
  alternatives_spanish:
  - bendita
  - bienaventurada
  lexicon: LSJ
  rationale: En este exclamativo laudatorio, 'dichosa' comunica dicha/envidiable honor sin sonar demasiado eclesiástico. 'Bienaventurada' sería posible, pero en español suele cargar una resonancia más litúrgica que el griego por sí solo no exige aquí.
- source_word: γήρως
  english_pob_choice: old age
  chosen_spanish: vejez
  alternatives_spanish:
  - edad avanzada
  - ancianidad
  lexicon: LSJ
  rationale: El sustantivo nombra la vejez misma; 'vejez' es natural y directo en español, manteniendo el tono de elogio de la etapa de la vida.
- source_word: σεμνῆς
  english_pob_choice: venerable
  chosen_spanish: venerables
  alternatives_spanish:
  - dignas
  - honorables
  - reverendas
  lexicon: LSJ
  rationale: '''Σεμνῆς'' expresa dignidad y respeto; ''venerables'' conserva la elevación solemne del texto y encaja bien con ''canas''.'
- source_word: πολιᾶς
  english_pob_choice: gray hair
  chosen_spanish: canas
  alternatives_spanish:
  - cabellos canos
  - cabellera cana
  lexicon: LSJ
  rationale: '''Canas'' es el equivalente idiomático breve en español y mantiene el metonímico de la senectud mejor que una perífrasis más larga.'
- source_word: βίου νομίμου
  english_pob_choice: a law-abiding life
  chosen_spanish: vida conforme a la ley
  alternatives_spanish:
  - vida obediente a la ley
  - vida legal
  - vida según la ley
  lexicon: LSJ
  rationale: En 4 Macabeos, la referencia apunta a la fidelidad a la Ley ancestral/judía. 'Conforme a la ley' conserva la idea de conformidad sin introducir una glosa demasiado explícita; 'legal' sonaría extraño en español bíblico.
- source_word: σφραγὶς
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - confirmación
  - atestación
  lexicon: LSJ
  rationale: La imagen es metafórica; 'sello' preserva el tropo de autenticación/consumación mejor que una explicación abstracta.
- source_word: πιστὴ
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - verdadero
  - confiable
  - seguro
  lexicon: LSJ
  rationale: '''Fiel'' es el equivalente natural de ''faithful'' y mantiene la relación compacta con ''sello'' sin añadir expansión interpretativa.'
- source_word: θανάτου
  english_pob_choice: of death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - por la muerte
  - mediante la muerte
  lexicon: LSJ
  rationale: Se conserva el genitivo metafórico como parte de la expresión 'sello de la muerte', en lugar de convertirlo en un instrumento explícito.
- source_word: ἐτελείωσεν
  english_pob_choice: brought to completion
  chosen_spanish: llevó a su cumplimiento
  alternatives_spanish:
  - perfeccionó
  - completó
  - consumó
  lexicon: LSJ
  rationale: '''Llevó a su cumplimiento'' comunica consumación/realización sin imponer una lectura técnica; respeta la fuerza finalizante del verbo en el contexto martirial.'
theological_decisions:
- issue: βίου νομίμου en contexto de martirio judío
  english_pob_reading: a law-abiding life
  chosen_spanish_reading: vida conforme a la ley
  alternative_spanish_readings:
  - vida obediente a la ley
  - vida según la ley
  rationale: La expresión alude a la fidelidad a la Ley en sentido judío/covenantal. 'Conforme a la ley' deja oír esa obediencia sin convertir el texto en una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §1, §5
- issue: ἐτελείωσεν y el riesgo de sobreteologizar
  english_pob_reading: brought to completion
  chosen_spanish_reading: llevó a su cumplimiento
  alternative_spanish_readings:
  - perfeccionó
  - consumó
  rationale: En el marco del martirio, el verbo puede sugerir cumplimiento y plenitud. 'Llevó a su cumplimiento' preserva esa fuerza sin adelantar una formulación doctrinal más amplia que el versículo no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Coincide con el último pase revisado sin cambios sustanciales; se mantiene la lectura de alta concordancia del griego, conservando la metáfora compacta de 'sello de la muerte' y la fuerza de 'τελείωσεν' como consumación.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones convencionales porque el verso no contiene el nombre divino.
  - '''Ley'' se mantiene en singular por fidelidad a ''νομίμου'' y al marco de 4 Macabeos.'
  - Se prefirió 'sello' en lugar de una expansión interpretativa para conservar la metáfora original.
  - El registro es solemne pero moderno, apto para lectura pública.
