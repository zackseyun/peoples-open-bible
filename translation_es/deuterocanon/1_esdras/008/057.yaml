  to: Y les entregó[a], tras haberlo pesado, seiscientos cincuenta talentos de plata, y vasos de plata por valor de cien talentos, y cien talentos de oro, y veinte cuencos de oro[b], y diez vasos de bronce fino y resplandeciente.
