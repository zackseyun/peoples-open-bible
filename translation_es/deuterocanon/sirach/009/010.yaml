translation:
  language: es
  text: 'No abandones a un amigo antiguo[a], porque el nuevo no es igual a él; vino nuevo, amigo nuevo: cuando envejece, lo beberás con alegría.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea hebrea suministrada para esta unidad parece pertenecer a otro dicho y no coincide con Sirácida 9:10; por eso la traducción sigue el testimonio griego.
    reason: textual_variant
lexical_decisions:
- source_word: Μὴ ἐγκαταλίπης
  english_pob_choice: Do not abandon
  chosen_spanish: No abandones
  alternatives_spanish:
  - No desampares
  - No dejes
  lexicon: LSJ
  rationale: ἐγκαταλείπω expresa dejar atrás o desertar relacionalmente; en español, «abandonar» mantiene bien la fuerza del vínculo, y el imperativo negativo suena natural y fiel al tono proverbial.
- source_word: φίλον ἀρχαῖον
  english_pob_choice: an old friend
  chosen_spanish: un amigo antiguo
  alternatives_spanish:
  - un amigo de mucho tiempo
  - un amigo viejo
  lexicon: LSJ
  rationale: ἀρχαῖον aquí indica antigüedad en la relación, no edad física. «Antiguo» conserva la idea de larga duración sin dar a entender necesariamente vejez personal.
- source_word: πρόσφατος
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - reciente
  - recién adquirido
  lexicon: LSJ
  rationale: 'El contraste proverbial con ἀρχαῖον pide el equivalente más directo y natural en español: «nuevo».'
- source_word: οὐκ ἔστιν ἔφισος αὐτῷ
  english_pob_choice: is not equal to him
  chosen_spanish: no es igual a él
  alternatives_spanish:
  - no se compara con él
  - no le llega a la par
  lexicon: LSJ
  rationale: La construcción comparativa se mantiene de forma transparente. «No es igual a él» conserva el sentido de desigualdad sin recargar la frase.
- source_word: οἶνος νέος φίλος νέος
  english_pob_choice: a new friend is like new wine
  chosen_spanish: vino nuevo, amigo nuevo
  alternatives_spanish:
  - un amigo nuevo es como vino nuevo
  - vino nuevo; amigo nuevo
  lexicon: LSJ
  rationale: El griego tiene una forma sentenciosa y elíptica. En español, una yuxtaposición breve preserva el carácter proverbial; la relación comparativa queda aclarada por la coma y la continuación.
- source_word: ἐὰν παλαιωθῇ
  english_pob_choice: when it grows old
  chosen_spanish: cuando envejece
  alternatives_spanish:
  - cuando se añeja
  - si envejece
  lexicon: LSJ
  rationale: El verbo remite al envejecimiento del vino. «Cuando envejece» es claro, idiomático y evita sonar técnico de más.
- source_word: μετ’ εὐφροσύνης πίεσαι αὐτόν
  english_pob_choice: you will drink it with gladness
  chosen_spanish: lo beberás con alegría
  alternatives_spanish:
  - lo beberás con gozo
  - lo beberás con gozo y alegría
  lexicon: LSJ
  rationale: εὐφροσύνη expresa alegría, gozo o regocijo. «Con alegría» reproduce bien el sustantivo griego en un español natural y digno.
theological_decisions:
- issue: Base textual para el versículo de Sirácida 9:10
  english_pob_reading: Translate from the Greek parallel rather than the supplied Hebrew line
  chosen_spanish_reading: Traducir el contenido del paralelo griego, no la línea hebrea suministrada, porque esa línea corresponde a otro dicho
  alternative_spanish_readings:
  - Intentar acomodar la línea hebrea como si fuera este versículo
  - Combinar ambos testimonios en una sola traducción
  rationale: 'El paquete de fuentes muestra una discrepancia explícita: el hebreo proporcionado no coincide con Sirácida 9:10, mientras que el griego sí coincide con el contenido tradicional de este dicho. Para no falsear la base textual, la versión española sigue el testimonio griego y deja constancia de la tensión textual en una nota.'
  doctrine_reference: 'PHILOSOPHY.md: para Sirácida, traducir del hebreo cuando sobreviva y del griego cuando no; documentar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: El historial de revisión incluido muestra una sustitución de un borrador no relacionado por una traducción que sigue el paralelo griego. Esta propuesta adopta ese mismo alineamiento textual y mantiene la discrepancia con el hebreo documentada de forma explícita.
  spanish_consistency_notes:
  - Se usa «abandonar» para ἐγκαταλίπης por su fuerza relacional, en lugar de «dejar» o «desamparar».
  - Se mantiene «amigo antiguo»/«amigo antiguo» como referencia a duración de la amistad, no a antigüedad histórica.
  - Se opta por «vino nuevo» y «cuando envejece» para sostener la imagen proverbial con naturalidad en español.
  - Se evita introducir terminología eclesiástica tradicional que no está en el texto fuente.
  - La nota textual queda anclada en el punto donde el lector puede ver la decisión de seguir el griego.
