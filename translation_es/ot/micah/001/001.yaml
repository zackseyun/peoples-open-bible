translation:
  language: es
  text: La palabra de Yahvé que vino a Miqueas el morastita[a], en los días de Jotam, Acaz y Ezequías, reyes de Judá, la cual vio acerca de Samaria y Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el morastita», es decir, un hombre de Moreset.'
    reason: cultural_note
  - marker: b
    text: 'O: «contra Samaria y Jerusalén». La preposición puede señalar el tema de la visión o, en contexto, un sentido adversativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר יְהוָה
  english_pob_choice: The word of Yahweh
  chosen_spanish: La palabra de Yahvé
  alternatives_spanish:
  - El mensaje de Yahvé
  - La palabra de Yahvé
  lexicon: HALOT
  rationale: דְּבַר en encabezados proféticos introduce una fórmula de revelación; en español, «la palabra» conserva la fórmula tradicional sin perder naturalidad. YHWH se rinde como «Yahvé» según la guía del proyecto, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que fue dirigida a
  - que llegó a
  lexicon: HALOT
  rationale: El giro profético expresa recepción de una palabra revelada; «vino a» reproduce bien la llegada de la palabra sin forzar una construcción pasiva poco natural en español.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Miqueas
  alternatives_spanish:
  - Micaías
  - Micah
  lexicon: Nombre propio bíblico estándar
  rationale: En español bíblico, el profeta se nombra normalmente «Miqueas». Es la forma más reconocible y lecturable para un público eclesial amplio.
- source_word: הַמֹּרַשְׁתִּי
  english_pob_choice: the Morashtite
  chosen_spanish: el morastita
  alternatives_spanish:
  - el de Moreset
  - el hombre de Moreset
  lexicon: HALOT
  rationale: El gentilicio identifica el origen de Miqueas. «Morastita» conserva el valor adjetival del hebreo y sigue de cerca la forma de la tradición inglesa, mientras que la nota aclara la referencia geográfica a Moreset.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en días de
  alternatives_spanish:
  - en tiempos de
  - durante los días de
  lexicon: HALOT
  rationale: La fórmula regnal puede sonar más natural en español con «en días de», manteniendo la estructura breve del hebreo y el valor cronológico de la expresión.
- source_word: יוֹתָם אָחָז יְחִזְקִיָּה
  english_pob_choice: Jotham, Ahaz, and Hezekiah
  chosen_spanish: Jotam, Acaz y Ezequías
  alternatives_spanish:
  - Jotam, Acaz y Ezequías
  lexicon: Nombres propios bíblicos estándar en español
  rationale: Se usan las formas bíblicas españolas consolidadas para los reyes de Judá, que son transparentes y fácilmente reconocibles en lectura pública.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: kings of Judah
  chosen_spanish: reyes de Judá
  alternatives_spanish:
  - los reyes de Judá
  lexicon: HALOT
  rationale: La frase constructa se rinde de manera directa y natural como «reyes de Judá»; el artículo no es necesario en español después de la enumeración.
- source_word: אֲשֶׁר חָזָה
  english_pob_choice: which he saw
  chosen_spanish: la cual vio
  alternatives_spanish:
  - que vio
  - que él vio
  lexicon: HALOT
  rationale: חָזָה conserva el sentido de visión profética. «La cual vio» mantiene la referencia al contenido revelado y evita añadir explicaciones interpretativas.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: En este encabezado, עַל introduce el asunto de la visión. «Acerca de» conserva la amplitud semántica sin imponer de entrada el matiz adversativo de «contra».
- source_word: שֹׁמְרוֹן וִירוּשָׁלָם
  english_pob_choice: Samaria and Jerusalem
  chosen_spanish: Samaria y Jerusalén
  alternatives_spanish:
  - Samaria y Jerusalén
  lexicon: Nombres propios bíblicos estándar
  rationale: Se conservan los nombres de las ciudades tal como funcionan metonímicamente en el texto, sin expandirlos a su sentido político implícito en el cuerpo principal.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la norma del proyecto, se mantiene el nombre divino como «Yahvé» en español, evitando la sustitución por un título y conservando la transparencia auditiva respecto del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor de עַל en el cierre profético
  english_pob_reading: concerning Samaria and Jerusalem
  chosen_spanish_reading: acerca de Samaria y Jerusalén
  alternative_spanish_readings:
  - contra Samaria y Jerusalén
  - sobre Samaria y Jerusalén
  rationale: El hebreo permite tanto referencia temática como un matiz adversativo. La redacción principal elige una lectura amplia y neutral; el español no fija innecesariamente una oposición si el contexto posterior desarrolla el juicio.
  doctrine_reference: Contexto profético de encabezados visionarios; nota léxica del POB inglés sobre la ambigüedad de עַל
translation_notes:
  revision_awareness: 'Coincide con la última revisión en inglés: no se registran cambios necesarios respecto del estado auditado más reciente, y la versión española sigue la misma decisión clave sobre el nombre divino y la ambigüedad de עַל.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יהוה en línea con la terminología del proyecto.
  - 'Se prefieren formas bíblicas españolas consolidadas para los nombres propios: Miqueas, Jotam, Acaz, Ezequías, Judá, Samaria y Jerusalén.'
  - El estilo mantiene la fórmula profética breve sin añadir glosas al cuerpo principal.
  - La nota de Moreset aclara el gentilicio sin recargar el texto base.
