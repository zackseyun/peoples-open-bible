translation:
  language: es
  text: 'Jesús dijo: «Estuve en medio del mundo, y me manifesté[a] a ellos en carne. Los hallé a todos ebrios; no hallé a ninguno sediento entre ellos.[b] Y mi alma se dolió por los hijos de la humanidad,[c] porque son ciegos en su corazón y no ven que entraron al mundo vacíos, buscando también salir[c] del mundo vacíos. Pero ahora están ebrios. Cuando hayan sacudido su vino,[d] entonces se arrepentirán.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ también puede significar «aparecí» o «resplandecí»; «me manifesté» conserva el matiz revelatorio del original.
    reason: lexical_alternative
  - marker: b
    text: La construcción copta es condensada; el testigo griego POxy hace explícito «no hallé a ninguno sediento entre ellos», lo que apoya el sentido negativo adoptado aquí.
    reason: textual_variant
  - marker: c
    text: Lit. «hijos de los hombres» en el fragmento griego; el copto tiene «hijos del humano», aquí vertido inclusivamente como «hijos de la humanidad». Además, el copto dice literalmente «salir del mundo»; también puede traducirse «irse del mundo».
    reason: cross_reference
  - marker: d
    text: La expresión traduce literalmente la imagen de «sacudir su vino»; alternativas posibles son «cuando el vino los deje» o «cuando se sobrieren».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲱϩⲉ / ‘stood’
  english_pob_choice: stood
  chosen_spanish: me mantuve
  alternatives_spanish:
  - estuve
  - estuve de pie
  lexicon: Crum; Layton
  rationale: En español, «me mantuve» conserva la idea de permanecer erguido/presentarse con firmeza sin sonar forzado. Es más natural que un calco como «estuve de pie», pero sigue el valor de permanencia del perfecto copto.
- source_word: ⲉⲣⲁⲧ ϩⲛⲡⲙⲏⲧⲉ
  english_pob_choice: in the midst
  chosen_spanish: en medio
  alternatives_spanish:
  - en el centro
  - en medio de
  lexicon: Layton
  rationale: «En medio» es la equivalencia idiomática más natural y mantiene la imagen espacial marcada del original.
- source_word: ⲕⲟⲥⲙⲟⲥ
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - cosmos
  lexicon: Crum
  rationale: «Mundo» es el equivalente normal y auditable en español para este préstamo copto; conserva amplitud referencial sin tecnicismo innecesario.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: appeared
  chosen_spanish: me manifesté
  alternatives_spanish:
  - aparecí
  - brillé
  - fui manifestado
  lexicon: Crum
  rationale: La forma copta puede significar ‘manifestarse’ o ‘aparecer’; «me manifesté» retiene más plenamente la fuerza revelatoria sin perder naturalidad en español. Evita la pasividad de «fui manifestado», que no está exigida por la sintaxis.
- source_word: ϩⲛⲥⲁⲣⲝ
  english_pob_choice: in flesh
  chosen_spanish: en carne
  alternatives_spanish:
  - en cuerpo
  - en la carne
  lexicon: Crum
  rationale: «En carne» refleja con fidelidad la crudeza del término y su uso teológico; es el equivalente usual en español bíblico para esta expresión.
- source_word: ⲧⲏⲣⲛⲧⲟⲟⲩ
  english_pob_choice: all (of them)
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de ellos
  - todos ellos
  lexicon: Layton
  rationale: «Todos» es conciso y natural en español, y mantiene la referencia total a los presentes.
- source_word: ⲧⲁϩⲟ / ⲧⲟϩⲉ
  english_pob_choice: drunk
  chosen_spanish: ebrios
  alternatives_spanish:
  - borrachos
  - intoxicados
  lexicon: Crum
  rationale: «Ebrio» preserva un registro digno y evita una coloquialidad que bajaría el tono del dicho; además conserva la imagen de estar bajo el efecto del vino.
- source_word: ⲗⲁⲁⲩ
  english_pob_choice: not one
  chosen_spanish: a ninguno
  alternatives_spanish:
  - no a uno
  - ni uno
  lexicon: Crum
  rationale: «A ninguno» expresa con claridad la negación total; el artículo/objeto directo español requiere esta solución para sonar natural.
- source_word: ⲯⲩⲭⲏ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  lexicon: Crum
  rationale: «Alma» es la correspondencia más transparente y tradicional en español para el afecto interior expresado por la ψυχή copta/greco-copta.
- source_word: ϯⲧⲕⲁⲥ
  english_pob_choice: was pained
  chosen_spanish: se dolió
  alternatives_spanish:
  - se afligió
  - se entristeció
  lexicon: Crum
  rationale: El giro pronominal «se dolió» comunica bien la conmoción afectiva intensa del original y suena más fluido que un pasivo perifrástico.
- source_word: ⲃⲗⲗⲉ
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - cegados
  lexicon: Crum
  rationale: «Ciegos» mantiene la imagen directa del texto y su fuerza diagnóstica sobre el corazón. «Cegados» sugeriría una acción externa no explícita en el copto.
- source_word: ϩⲏⲧ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: Crum
  rationale: «Corazón» conserva el centro antropológico y bíblico del copto, sin reducirlo a la mente racional.
- source_word: ϣⲟⲩⲟ
  english_pob_choice: empty
  chosen_spanish: vacíos
  alternatives_spanish:
  - vacío
  - sin nada
  lexicon: Crum
  rationale: «Vacíos» refleja el estado predicativo plural y mantiene el paralelismo con la salida del mundo.
- source_word: ⲥⲓⲛⲉ
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - buscan
  - procurando
  lexicon: Crum
  rationale: La revisión del audit trail indica que el copto aquí es una cláusula circunstancial, por lo que «buscando» reproduce mejor la acción concomitante que un verbo finito.
- source_word: ⲉⲃⲟⲗ (with ⲉⲓ)
  english_pob_choice: go out
  chosen_spanish: salir
  alternatives_spanish:
  - irse
  - abandonar
  lexicon: Layton
  rationale: «Salir» es la solución más natural en español para el movimiento fuera del mundo y conserva la imagen básica del copto.
- source_word: ⲧⲉⲛⲟⲩ
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: Crum
  rationale: «Ahora» es la equivalencia directa y fluida para el adverbio temporal.
- source_word: ⲛⲟⲩϩⲉ (ⲡⲉⲩⲏⲣⲡ as object)
  english_pob_choice: shaken off (their wine)
  chosen_spanish: sacudido su vino
  alternatives_spanish:
  - despojado de su vino
  - sacudido el vino de ellos
  - sobrio
  lexicon: Crum
  rationale: La imagen copta es vívida e inusual; «sacudido su vino» la conserva de manera bastante literal, sin convertirla prematuramente en una interpretación como «sobrio».
- source_word: ⲙⲉⲧⲁⲛⲟⲉⲓ
  english_pob_choice: repent
  chosen_spanish: se arrepentirán
  alternatives_spanish:
  - cambiarán de mente
  - harán penitencia
  lexicon: Crum; Lambdin
  rationale: «Arrepentirse» es la solución española estándar para este verbo en contextos de giro existencial/espiritual, y corresponde al valor del audit trail inglés.
theological_decisions:
- issue: Cómo verter la auto-presentación de Jesús en carne
  english_pob_reading: I appeared to them in flesh
  chosen_spanish_reading: me manifesté a ellos en carne
  alternative_spanish_readings:
  - aparecí a ellos en carne
  - fui manifestado a ellos en carne
  rationale: La versión española mantiene la tensión entre manifestación y aparición sin forzar una pasiva que el copto no requiere. «Me manifesté» preserva el matiz revelatorio y el carácter auditable de la elección.
  doctrine_reference: Cristología encarnacional; lenguaje de manifestación/aparición
- issue: Alcance de ⲛ̄ϣⲏⲣⲉ ⲛ̄ⲣ̄ⲣⲱⲙⲉ
  english_pob_reading: children of humanity
  chosen_spanish_reading: hijos de los hombres
  alternative_spanish_readings:
  - hijos de la humanidad
  - hijos del hombre
  rationale: Aquí se conservó «hijos de los hombres» porque el español lo entiende bien y refleja con más literalidad la fórmula tradicional que también aparece en el trasfondo griego. «Hijos de la humanidad» sería una clarificación inclusiva, pero atenúa la resonancia semítica.
  doctrine_reference: Antropología bíblica; fórmula semítica
- issue: Sentido de la embriaguez y del arrepentimiento final
  english_pob_reading: When they have shaken off their wine, then they will repent
  chosen_spanish_reading: Cuando hayan sacudido su vino, entonces se arrepentirán
  alternative_spanish_readings:
  - cuando se sobrieren, entonces se arrepentirán
  - cuando el vino los deje, entonces se arrepentirán
  rationale: Se preserva la metáfora extraña del texto en lugar de suavizarla. Eso deja visible la tensión lexical del original y evita sustituirla por una explicación interpretativa prematura.
  doctrine_reference: Metáfora de la sobriedad espiritual y el arrepentimiento
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: la cláusula con ⲥⲓⲛⲉ se trató como circunstancial («buscando») y no como un segundo verbo finito. También se respetó el consenso de alta concordancia del control cruzado, con la única tensión menor en la imagen final del vino, que se conserva de forma literal en el texto y se aclara en nota.'
  spanish_consistency_notes:
  - Se usa «Jesús» para el hablante y registro cristiano estándar.
  - «Mundo» traduce ⲕⲟⲥⲙⲟⲥ de manera consistente.
  - Se mantiene la metáfora de la embriaguez con lenguaje digno y no coloquial.
  - «En carne» conserva la crudeza cristológica del original.
  - La nota [a] se coloca en «vino» para señalar la alternativa interpretativa sobre la frase final.
