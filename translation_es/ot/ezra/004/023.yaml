base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/023.yaml
  text: Then[a], as soon as the copy of the letter of King Artaxerxes was read before Rehum and Shimshai the scribe and their associates, they went in haste to Jerusalem, to the Jews[b], and made them stop by force and power.
  footnotes:
  - marker: a
    text: Or 'went up against the Jews'; the Aramaic preposition can carry a hostile sense, which is reflected by the following action of stopping the work.
    reason: lexical_alternative
  - marker: b
    text: Or 'stopped them with force and strength.'
    reason: lexical_alternative
