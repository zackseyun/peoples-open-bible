  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. Las decisiones léxicas sobre «corazón fiel», «adorarlo», «su voluntad» y «alma dispuesta» están alineadas con la filosofía de equivalencia óptima y con la justificación teológica documentada para πίστις en este contexto.
