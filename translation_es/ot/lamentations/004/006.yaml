- from: Porque la iniquidad de la hija de mi pueblo[a] se ha vuelto mayor que el pecado de Sodoma, que fue destruida en un momento, y no se alzaron manos contra ella[b].
  to: Porque la iniquidad de la hija de mi pueblo se ha vuelto mayor que el pecado de Sodoma[a], que fue arrasada en un momento[b], y no se alzaron manos contra ella.
  rationale: Se corrigió la nota [a] para reflejar con fidelidad la alternativa documentada en el POB inglés, preservando la personificación 'la hija de mi pueblo'. Además, se cambió 'fue destruida' por 'fue arrasada' para acercarse mejor a הַהֲפוּכָה y al rationale intertextual de 'overthrown', manteniendo un español natural y eclesialmente legible. La cláusula final se dejó en una forma comprensible con nota de ambigüedad, sin forzar una interpretación única.
