    rationale: Aunque posible, «doncellas» en español puede sugerir principalmente jóvenes solteras o damas, y no transmite con suficiente claridad el contexto doméstico de asistentes femeninas que el POB inglés documenta con «maids».
  - severity: medium
    issue: «corrieron hacia ella» debilita ἐπέδραμον
    rationale: El griego denota una irrupción agresiva y repentina. «Corrieron hacia ella» describe solo dirección y movimiento, sin la carga de acometida presente en el original y reconocida en el audit trail.
  - severity: low
