  to: Y todo aquel a quien toque el hombre con el flujo[a], sin haberse lavado las manos en agua,[b] lavará su ropa y se bañará en agua, y quedará impuro hasta la tarde.
  rationale: 'Se corrigió la dirección del contacto para ajustarla al hebreo: no es la otra persona la que toca al afectado, sino el hombre con el flujo quien la toca. Se sustituyó ''el záb'' por ''el hombre con el flujo'' para seguir la decisión léxica auditada y mejorar la legibilidad en español. También se suavizó ''vestidos'' a ''ropa'' para un español más natural. Se mantuvo ''impuro'' por su valor ritual y se conservaron las alternativas pertinentes en notas.'
