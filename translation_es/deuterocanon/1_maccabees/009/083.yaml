review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del griego: llegada a Azoto, entrada en Bet-dagón buscando protección y quema de Azoto con sus ciudades vecinas por Jonatán. Conserva además la nota sobre Azoto/Asdod y la ambigüedad contextual de τὸ εἴδωλον αὐτῶν. Sin embargo, «templo-idolo» no es una solución española natural ni ortográficamente correcta, y el tramo inicial «hasta Azoto» añade un matiz direccional no explicitado aquí en el fragmento fuente aislado; conviene una redacción más limpia y fiel al sentido narrativo transmitido por la versión inglesa auditada.'
  spanish_quality_summary: La legibilidad general es buena, pero «su templo-idolo» suena forzado y poco idiomático; en español digno y claro se prefiere «el templo de su ídolo», con nota que preserve la posibilidad más literal «su ídolo». También es mejor «las ciudades de los alrededores» o «las ciudades vecinas» que «las ciudades de alrededor» en registro bíblico moderno. La ortografía requiere tilde en «ídolo».
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Los nombres propios están bien encaminados: «Azoto» para Ἄζωτον y «Bet-dagón» para Βηθδαγών. «Para salvarse» respeta correctamente el valor contextual de σωθῆναι como rescate físico. La principal corrección léxica es reemplazar «templo-idolo» por una formulación española natural que mantenga la racionalidad documentada en el POB.'
  issues:
  - severity: medium
    issue: «su templo-idolo» es una formulación poco natural y ortográficamente defectuosa
    rationale: Aunque intenta reflejar la tensión entre «ídolo» y santuario, en español suena artificial. «El templo de su ídolo» expresa el sentido contextual y la nota puede conservar la alternativa literal «su ídolo». Además, falta la tilde en «ídolo».
  - severity: low
    issue: «hasta Azoto» puede sonar añadido en un fragmento donde no se conserva el verbo rector previo
    rationale: El griego ofrece solo Ἄζωτον en continuidad con el contexto anterior; la versión inglesa mantiene «to Azotus» por conexión narrativa, pero en español aislado la frase puede leerse mejor como continuación con «a Azoto». No es un error grave, pero una leve reparación mejora fluidez y neutralidad.
  - severity: low
    issue: «las ciudades de alrededor» es menos idiomático que alternativas más naturales
    rationale: Para τὰς πόλεις τὰς κύκλῳ, «las ciudades de los alrededores» o «las ciudades vecinas» suena más natural en español eclesial general sin perder precisión.
