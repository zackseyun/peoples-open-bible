translation:
  language: es
  text: Y serán reunidos como prisioneros en un pozo, y serán encerrados en una cárcel; y después de muchos días serán visitados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo puede denotar tanto ser atendidos como ser llamados a cuentas; en este contexto de juicio, también puede implicar castigo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֻסְּפוּ
  english_pob_choice: they will be gathered together
  chosen_spanish: serán reunidos
  alternatives_spanish:
  - serán juntados
  - serán congregados
  lexicon: HALOT
  rationale: El pasivo plural expresa que los sujetos son reunidos por otro agente; «serán reunidos» conserva ese pasivo natural en español y evita una paráfrasis más libre.
- source_word: אֲסֵפָה
  english_pob_choice: together
  chosen_spanish: como
  alternatives_spanish:
  - en una reunión
  - juntamente
  lexicon: HALOT
  rationale: El sustantivo cognado intensifica la acción verbal; en español, «como prisioneros» reproduce la relación comparativa/asimilativa sin forzar una construcción artificial.
- source_word: אַסִּיר
  english_pob_choice: like prisoners
  chosen_spanish: como prisioneros
  alternatives_spanish:
  - como presos
  - como cautivos
  lexicon: HALOT
  rationale: Aunque la forma es singular, el contexto es colectivo. «Prisioneros» refleja el valor de grupo y mantiene el tono de confinamiento.
- source_word: עַל בּוֹר
  english_pob_choice: into a pit
  chosen_spanish: en un pozo
  alternatives_spanish:
  - a un pozo
  - dentro de un pozo
  lexicon: HALOT
  rationale: En español, «en un pozo» expresa de manera natural la situación de confinamiento. Dado que el hebreo puede funcionar con matiz de consignación a encierro, no es necesario intensificarlo a «dentro de».
- source_word: וְסֻגְּרוּ
  english_pob_choice: they will be shut up
  chosen_spanish: serán encerrados
  alternatives_spanish:
  - serán cerrados
  - serán recluidos
  lexicon: HALOT
  rationale: «Serán encerrados» es el equivalente idiomático más claro para el pasivo de סגר en contexto de prisión.
- source_word: עַל מַסְגֵּר
  english_pob_choice: in a prison
  chosen_spanish: en una cárcel
  alternatives_spanish:
  - en una prisión
  - en un calabozo
  - en confinamiento
  lexicon: HALOT
  rationale: מַסְגֵּר designa un lugar de detención; «cárcel» es un equivalente moderno y comprensible, sin excesiva carga interpretativa.
- source_word: וּמֵרֹב יָמִים
  english_pob_choice: after many days
  chosen_spanish: después de muchos días
  alternatives_spanish:
  - tras muchos días
  - después de mucho tiempo
  lexicon: HALOT
  rationale: La expresión idiomática comunica el transcurso de un largo periodo. «Después de muchos días» conserva el valor temporal de manera natural.
- source_word: יִפָּקֵדוּ
  english_pob_choice: they will be visited
  chosen_spanish: serán visitados
  alternatives_spanish:
  - serán castigados
  - serán tenidos en cuenta
  - serán requeridos
  lexicon: HALOT
  rationale: El verbo פקד en nifal es semánticamente amplio. Como el POB inglés revisado preserva «visited» para no estrechar el sentido, «serán visitados» mantiene la ambigüedad contextual en español. En este marco de juicio, la visita puede implicar intervención punitiva, pero esa inferencia se deja implícita.
theological_decisions:
- issue: Sentido de יִפָּקֵדוּ en un oráculo de juicio
  english_pob_reading: they will be visited
  chosen_spanish_reading: serán visitados
  alternative_spanish_readings:
  - serán castigados
  - serán requeridos
  rationale: El contexto es claramente judicial, pero el verbo hebreo no obliga por sí mismo a especificar la modalidad de la visita. Se preserva la amplitud semántica en el texto principal y la interpretación punitiva queda como posibilidad contextual, no como traducción cerrada.
  doctrine_reference: Preservar la tensión lexical cuando el original es amplio; no resolver interpretativamente más de lo que el texto exige.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «visited» sobre «punished» para no estrechar el hebreo פקד. La versión española sigue esa decisión revisada y evita introducir una interpretación punitiva explícita en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «pozo» y «cárcel» como equivalentes naturales de la imaginería de confinamiento, sin añadir elementos ausentes en el hebreo.
  - Se conserva la ambigüedad de פקד con una nota, de acuerdo con el criterio POB de documentar tensiones léxicas en vez de resolverlas de manera prematura.
