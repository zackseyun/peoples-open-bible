  yaml_path: translation/nt/romans/009/007.yaml
  text: Nor is it the case that because they are Abraham’s offspring[a], they are all children. Rather[c][b], “In Isaac your offspring will be called.”
  footnotes:
  - marker: a
    text: Or “seed.” The Greek word is singular but collective, referring to offspring or descendants.
    reason: lexical_alternative
  - marker: b
    text: Or “In Isaac your seed will be called,” echoing Genesis 21:12 more formally.
    reason: cross_reference
  - marker: c
    text: “Will be named” may also be understood as “will be called” or, in context, “will be reckoned/designated.”
    reason: lexical_alternative
