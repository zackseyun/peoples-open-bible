translation:
  language: es
  text: Y la joven que agrade al rey reinará en lugar de Vasti[a]. Esta propuesta agradó al rey[b], y así lo hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que halle favor en los ojos del rey». El hebreo dice literalmente: «que sea buena en los ojos del rey».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «El asunto le pareció bien al rey». El hebreo repite el modismo «ser bueno en los ojos de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la joven mujer
  lexicon: HALOT
  rationale: נַעֲרָה designa a una mujer joven. En español, «la joven» conserva la referencia etaria y suena natural y digna; «muchacha» puede sonar más coloquial o más juvenil de lo que el contexto requiere.
- source_word: אֲשֶׁר תִּיטַב בְּעֵינֵי הַמֶּלֶךְ
  english_pob_choice: who pleases the king
  chosen_spanish: que agrade al rey
  alternatives_spanish:
  - que le parezca bien al rey
  - que halle favor en los ojos del rey
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «ser buena en los ojos de». En español, «agrade al rey» comunica de forma natural el valor idiomático de agradar/ser del agrado de, sin perder la relación con el juicio del rey. Se preserva la tensión idiomática en la nota.
- source_word: תִּמְלֹךְ
  english_pob_choice: reign
  chosen_spanish: reinará
  alternatives_spanish:
  - será reina
  - gobernará
  lexicon: HALOT
  rationale: El verbo מלך apunta a reinar. Dado el contexto de sustitución de Vashti, «reinará» mantiene la forma verbal más cercana al hebreo y la elección revisada del POB en inglés.
- source_word: תַּחַת וַשְׁתִּי
  english_pob_choice: instead of Vashti
  chosen_spanish: en lugar de Vasti
  alternatives_spanish:
  - en vez de Vasti
  - en sustitución de Vasti
  lexicon: HALOT
  rationale: תַּחַת aquí expresa reemplazo. «En lugar de» es la equivalencia española más clara y natural. Se conserva el nombre propio en forma española usual «Vasti».
- source_word: וַיִּיטַב הַדָּבָר בְּעֵינֵי הַמֶּלֶךְ
  english_pob_choice: This proposal pleased the king
  chosen_spanish: La propuesta pareció bien al rey
  alternatives_spanish:
  - El asunto pareció bueno al rey
  - La cosa agradó al rey
  lexicon: HALOT
  rationale: דָּבָר puede ser «asunto», «palabra» o «propuesta». En este contexto de una sugerencia concreta, «propuesta» es la opción más precisa. «Pareció bien al rey» reproduce el hebraísmo con buena naturalidad en español.
- source_word: וַיַּעַשׂ כֵּן
  english_pob_choice: and he did so
  chosen_spanish: y así lo hizo
  alternatives_spanish:
  - y lo hizo así
  - y procedió de esa manera
  lexicon: HALOT
  rationale: La fórmula narrativa final indica ejecución de lo dicho. «Y así lo hizo» es idiomático y breve, equivalente al inglés del POB sin perder el cierre narrativo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés al reflejar con mayor cercanía el verbo «reinar» y al tratar «this proposal» como una sugerencia concreta del contexto. También se conservó la fuerza idiomática de «be good in the eyes of the king» con una solución española natural pero anotada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aplica.
  - Se conserva la transliteración habitual «Vasti» para el nombre propio.
  - Se evita «Cristo/Mesías» porque el versículo no contiene esa referencia.
  - Se eligió un registro bíblico contemporáneo, claro y formal, sin arcaísmos innecesarios.
