translation:
  language: es
  text: 'Ahora bien, Zelofehad[a], hijo de Héfer, hijo de Galaad, hijo de Maquir, hijo de Manasés, no tenía hijos varones, sino solo hijas; y estos son los nombres de sus hijas: Mahla, Noa[b], Hogla, Milca y Tirsa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Y/a Zelofehad», una introducción idiomática del caso de Zelofehad.'
    reason: lexical_alternative
  - marker: b
    text: Aquí Noa es la hija de Zelofehad, no el varón conocido por Génesis.
    reason: cultural_note
lexical_decisions:
- source_word: וְלִצְלָפְחָד
  english_pob_choice: Now Zelophehad
  chosen_spanish: Y a Zelofehad[a]
  alternatives_spanish:
  - Y para Zelofehad
  - Y de Zelofehad
  - Ahora Zelofehad
  lexicon: HALOT
  rationale: El prefijo ו + ל לפני el nombre introduce idiomáticamente el caso de Zelofehad, no simple posesión. En español, ‘Y a’ conserva el valor de introducción/dativo de caso sin endurecer la frase. Se mantiene el nombre propio transliterado en forma reconocible.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶּן
  english_pob_choice: son of ... son of ... son of ... son of
  chosen_spanish: hijo de ... hijo de ... hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ... descendiente de ... descendiente de ... descendiente de
  lexicon: HALOT
  rationale: La cadena genealógica repetida se conserva de manera formal, porque el hebreo repite ‘hijo de’ y la estructura es relevante para el contexto hereditario.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española habitual y transparente.
- source_word: לֹא הָיוּ ל֛וֹ בָּנִים
  english_pob_choice: had no sons
  chosen_spanish: no le habían nacido hijos varones
  alternatives_spanish:
  - no tenía hijos varones
  - no le habían nacido hijos
  lexicon: HALOT
  rationale: El hebreo expresa ausencia de hijos varones en contraste con las hijas. ‘Hijos varones’ preserva el valor de בָּנִים y evita ambigüedad; ‘no le habían nacido’ reproduce bien la relación posesiva del hebreo y su matiz de descendencia.
- source_word: כִּי אִם בָּנוֹת
  english_pob_choice: but only daughters
  chosen_spanish: sino solo hijas
  alternatives_spanish:
  - pero solo hijas
  - sino hijas solamente
  lexicon: HALOT
  rationale: La construcción negativa-exceptiva se vierte naturalmente con ‘sino solo’, que conserva la exclusividad. ‘Hijas’ corresponde a בָּנוֹת y mantiene el contraste de género explícito.
- source_word: וְאֵלֶּה שְׁמוֹת בְּנֹתָיו
  english_pob_choice: and these are the names of his daughters
  chosen_spanish: y estos son los nombres de sus hijas
  alternatives_spanish:
  - y estos son los nombres de sus hijas
  - y estas son las hijas llamadas así
  lexicon: HALOT
  rationale: Se mantiene la fórmula de introducción de lista. ‘Sus hijas’ conserva el sufijo posesivo; ‘estos son’ funciona con el sustantivo implícito ‘nombres’ en español de forma natural.
- source_word: מַחְלָה
  english_pob_choice: Mahlah
  chosen_spanish: Mahlá
  alternatives_spanish:
  - Mahlá
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación ortográfica española breve y reconocible, manteniendo cercanía al hebreo.
- source_word: וְנֹעָה
  english_pob_choice: Noah
  chosen_spanish: Noa[b]
  alternatives_spanish:
  - Noa
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española breve. La nota recuerda que aquí se trata de una hija de Zelofehad y no del personaje masculino conocido de Génesis; se conserva el hecho de que el hebreo puede confundir por la homografía del nombre.
- source_word: חָגְלָה
  english_pob_choice: Hoglah
  chosen_spanish: Hoglá
  alternatives_spanish:
  - Hoglá
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento gráfico para la lectura española.
- source_word: מִלְכָּה
  english_pob_choice: Milcah
  chosen_spanish: Milcá
  alternatives_spanish:
  - Milcá
  - Milká
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española breve; se conserva la identificación bíblica sin introducir variantes innecesarias.
- source_word: וְתִרְצָה
  english_pob_choice: and Tirzah
  chosen_spanish: y Tirzá
  alternatives_spanish:
  - y Tirzá
  - y Tirsa
  lexicon: HALOT
  rationale: Nombre propio transliterado con forma española transparente. Se conserva la conjunción final conforme al estilo enumerativo hebreo.
theological_decisions:
- issue: Ausencia de hijos varones frente a hijas como base legal de herencia
  english_pob_reading: had no sons, but only daughters
  chosen_spanish_reading: no le habían nacido hijos varones, sino solo hijas
  alternative_spanish_readings:
  - no tenía hijos varones, sino solo hijas
  - no le habían nacido hijos, sino solo hijas
  rationale: 'El versículo presenta el problema hereditaria/legal de Zelofehad: no hay varones, solo hijas. Mantener ‘hijos varones’ hace explícita la fuerza del hebreo בָּנִים y evita diluir la distinción de sexo que es crucial para la narrativa posterior de la herencia.'
  doctrine_reference: Números 27:1-11; Josué 17:3-4
- issue: Tratamiento del nombre Noa/Noah en una hija de Zelofehad
  english_pob_reading: Noah here is Zelophehad's daughter, not the male figure from Genesis
  chosen_spanish_reading: Noa[b] como hija de Zelofehad, no el personaje masculino de Génesis
  alternative_spanish_readings:
  - Noa
  - Noé
  rationale: La homografía puede causar confusión al lector hispanohablante; la nota aclara que el referente es femenino. No se cambia el nombre para no borrar la coincidencia textual del hebreo.
  doctrine_reference: Josué 17:3; Números 27:1
- issue: Genealogía como legitimación tribal
  english_pob_reading: son of ... son of ... son of ... son of
  chosen_spanish_reading: hijo de ... hijo de ... hijo de ... hijo de
  alternative_spanish_readings:
  - descendiente de ... descendiente de ... descendiente de ... descendiente de
  rationale: La cadena genealógica enlaza a Zelofehad con Manasés y sustenta su posición tribal dentro del reparto de la tierra. Conservar la forma repetida evita perder esa función jurídica e histórica.
  doctrine_reference: Josué 17:1-4
translation_notes:
  revision_awareness: Se revisó la primera forma propuesta para asegurar que cada marcador de nota aparezca exactamente en el texto español. También se ajustó la genealogía y la construcción negativa para preservar la fuerza del hebreo y evitar pérdida del contraste ‘hijos / hijas’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene ‘hijo de’ en la cadena genealógica por fidelidad estructural al hebreo.
  - Los nombres propios se adaptan a una ortografía española legible, sin sustituirlos por equivalentes tradicionales no atestiguados.
  - La nota [a] se ancla en el sintagma inicial y la nota [b] en el nombre Noa para cumplir la validación de marcadores.
