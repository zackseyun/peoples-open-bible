translation:
  language: es
  text: Forraje y un palo y cargas son para un asno[a]; pan y disciplina[b] y trabajo son para un esclavo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vara' para ῥάβδος.
    reason: lexical_alternative
  - marker: b
    text: O 'instrucción' o 'formación' para 'disciplina' (παιδεία).
    reason: lexical_alternative
  - marker: c
    text: Οἰκέτῃ se refiere específicamente a un esclavo o sirviente doméstico; 'esclavo doméstico' es una alternativa más explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - alimento
  - pastura
  lexicon: LSJ
  rationale: Designa alimento para animales. 'Forraje' comunica bien el sentido concreto para un asno en español actual, sin generalizarlo a comida humana.
- source_word: ῥάβδος
  english_pob_choice: a stick
  chosen_spanish: un palo
  alternatives_spanish:
  - una vara
  - un bastón
  - una vara de castigo
  lexicon: LSJ
  rationale: El paralelo proverbial admite un objeto simple para azuzar o controlar al asno. 'Palo' es natural y mantiene la imagen sin cargar de antemano un matiz disciplinario más fuerte que el griego inmediato.
- source_word: φορτία
  english_pob_choice: loads
  chosen_spanish: cargas
  alternatives_spanish:
  - bultos
  - pesos
  - fardos
  lexicon: LSJ
  rationale: El plural alude a cosas que se transportan sobre un animal de carga. 'Cargas' conserva esa concreción y la relación con el asno.
- source_word: ὄνῳ
  english_pob_choice: for a donkey
  chosen_spanish: para un asno
  alternatives_spanish:
  - para un burro
  - a un asno
  lexicon: LSJ
  rationale: '''Asno'' es preciso y sobrio. Mantiene el registro proverbial y evita una coloquialidad excesiva.'
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  lexicon: LSJ
  rationale: El griego dice literalmente 'pan'; no hay motivo para generalizar. 'Pan' conserva la concreción del texto fuente.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - corrección
  lexicon: LSJ
  rationale: En este dicho sapiencial la palabra puede abarcar instrucción y corrección, pero 'disciplina' preserva el campo semántico amplio y sigue el valor práctico que el audit trail inglés destaca.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - tarea
  lexicon: LSJ
  rationale: En contexto doméstico, 'trabajo' es directo y natural para la labor asignada a un esclavo.
- source_word: οἰκέτῃ
  english_pob_choice: a slave
  chosen_spanish: un esclavo
  alternatives_spanish:
  - un siervo
  - un sirviente
  - un esclavo doméstico
  lexicon: LSJ
  rationale: Οἰκέτης denota un esclavo o sirviente doméstico; siguiendo la preferencia del proyecto por 'esclavo' cuando el vínculo de dependencia es saliente, se mantiene esa fuerza social sin suavizarla.
theological_decisions:
- issue: Rendering of οἰκέτῃ in a wisdom saying about household labor
  english_pob_reading: a slave
  chosen_spanish_reading: un esclavo
  alternative_spanish_readings:
  - un sirviente
  - un esclavo doméstico
  rationale: No hay crux doctrinal mayor, pero el texto contrapone recursos asignados a un animal de carga con los de una persona en dependencia doméstica. 'Esclavo' preserva esa asimetría social, como en el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Scope of παιδεία in a proverb-like list
  english_pob_reading: discipline
  chosen_spanish_reading: disciplina
  alternative_spanish_readings:
  - instrucción
  - formación
  - corrección
  rationale: La serie 'pan, disciplina y trabajo' sugiere un conjunto de provisiones o asignaciones concretas, no mera educación abstracta. 'Disciplina' mantiene esa ambigüedad útil entre instrucción y corrección.
  doctrine_reference: LSJ; English footnote b
translation_notes:
  revision_awareness: El expediente inglés más reciente indica que no hubo cambios necesarios en la revisión final y que el consenso del control cruzado fue alto (agreement 1.0). La presente redacción sigue ese estado estable, manteniendo el valor literal de los sustantivos griegos y la elección socialmente fuerte de 'esclavo' para οἰκέτῃ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton, aunque este versículo no lo contiene.
  - '''Asno'' se usa por claridad y tono proverbial; ''burro'' queda como alternativa coloquial no preferida.'
  - '''Disciplina'' conserva la amplitud semántica de παιδεία sin reducirla a ''instrucción'' solamente.'
  - No se introduce 'siervo' para οἰκέτῃ, porque el audit trail inglés documenta la decisión de preservar la esclavitud/ dependencia doméstica como rasgo relevante.
