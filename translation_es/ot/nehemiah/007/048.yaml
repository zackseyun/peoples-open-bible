translation:
  language: es
  text: los hijos de Lebaná[a], los hijos de Hagabá, los hijos de Shalmai[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendientes de' en cada ocurrencia de 'hijos de'; la fórmula genealógica hebrea puede denotar una línea familiar o pertenencia de clan, no solo hijos varones inmediatos.
