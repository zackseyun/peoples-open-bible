translation:
  text: But when the commanders of the army of Assyria heard the words[a], they tore their tunics, and their souls were greatly troubled[b], and there arose a very great cry and outcry in the midst of the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tearing one's tunic was a customary expression of grief, shock, or distress.
    reason: cultural_note
  - marker: b
    text: Or 'their spirit was greatly troubled.' The Greek literally says 'their soul was greatly troubled,' using a collective singular expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἤκουσαν
  chosen: But when ... heard
  alternatives:
  - And when ... heard
  - Now when ... heard
  lexicon: BDAG
  rationale: ὡς with the aorist here introduces a temporal clause, naturally rendered 'when.' δέ is mildly connective/adversative; 'But' fits the narrative turn without overstating contrast.
- source_word: τὰ ῥήματα
  chosen: the words
  alternatives:
  - the report
  - these things
  lexicon: BDAG
  rationale: ῥήματα most directly means 'words' or 'things said.' Since the verse refers back to what was just announced, 'the words' preserves the lexical form while remaining idiomatic.
- source_word: οἱ ἄρχοντες τῆς δυνάμεως Ἀσσούρ
  chosen: the commanders of the army of Assyria
  alternatives:
  - the rulers of the force of Assyria
  - the officers of the Assyrian army
  lexicon: BDAG
  rationale: ἄρχοντες are leaders/rulers; in military context 'commanders' is the clearest English. δύναμις in this context refers to military force, so 'army' is preferable to the more wooden 'force.' Ἀσσούρ is rendered 'Assyria' rather than transliterated, since it denotes the nation/empire here.
- source_word: τοὺς χιτῶνας αὐτῶν διέρρηξαν
  chosen: they tore their tunics
  alternatives:
  - they tore their garments
  - they ripped their robes
  lexicon: BDAG
  rationale: χιτών is specifically a tunic/inner garment. 'Tunics' keeps the concrete image; 'garments' would be more general and lose specificity. Tearing clothing is a conventional sign of grief/distress.
- source_word: ἐταράχθη αὐτῶν ἡ ψυχὴ σφόδρα
  chosen: their soul was greatly troubled
  alternatives:
  - they were greatly troubled
  - their spirit was deeply shaken
  lexicon: BDAG
  rationale: The Greek explicitly uses singular ψυχή with possessive genitive, a collective expression. 'Their soul was greatly troubled' preserves the source's anthropological wording better than flattening to 'they were troubled,' while remaining understandable in English.
- source_word: ἐγένετο αὐτῶν κραυγὴ καὶ βοὴ μεγάλη σφόδρα
  chosen: there arose among them a cry and a very great outcry
  alternatives:
  - there was among them a cry and a very loud wailing
  - a great shouting and clamor broke out among them
  lexicon: BDAG
  rationale: ἐγένετο is idiomatically 'there arose'/'there was.' κραυγή and βοή are near-synonyms denoting loud crying/shouting; preserving both reflects the emphatic doubling. 'Outcry' for βοή differentiates the pair without paraphrasing.
- source_word: ἐν μέσῳ τῆς παρεμβολῆς
  chosen: in the midst of the camp
  alternatives:
  - throughout the camp
  - in the middle of the encampment
  lexicon: BDAG
  rationale: παρεμβολή is camp/encampment. 'In the midst of the camp' is a close rendering of the prepositional phrase and preserves the scene's spatial focus.
