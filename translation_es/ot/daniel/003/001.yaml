base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/001.yaml
  text: King Nebuchadnezzar made an image of gold[a], its height sixty cubits and its width six cubits. He set it up in the plain of Dura[b], in the province of Babylon.
  footnotes:
  - marker: a
    text: Or 'statue of gold.' The Aramaic term can denote an image or statue; 'idol' is also possible in light of the later context, but the main text preserves the more neutral wording of the verse itself.
    reason: lexical_alternative
  - marker: b
    text: A cubit was a standard ancient unit of length, roughly the distance from the elbow to the fingertips.
    reason: cultural_note
