    text: O 'con agua' en ambos casos de 'en agua'. El hebreo dice literalmente 'en el agua'.
    reason: lexical_alternative
  - marker: b
    text: Aquí 'impuro' se refiere a impureza ritual, no necesariamente a culpa moral.
    reason: theological_note
  revision_rationale: Se revisa para preservar en español la distinción léxica del hebreo entre lavar la ropa (כבס) y bañar/lavar el cuerpo (רחץ), tal como la auditoría inglesa la consideró significativa. También se ajusta 'hasta la tarde' a 'hasta el atardecer' para reflejar mejor עַד הָעָרֶב como límite temporal ritual. Las notas se conservan con anclajes correctos y en orden.
