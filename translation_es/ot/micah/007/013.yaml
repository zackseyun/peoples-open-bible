    text: O «el territorio». El hebreo אֶרֶץ puede significar «tierra», «territorio» o «mundo»; aquí «tierra» se refiere mejor al territorio bajo juicio que a la tierra entera.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «del fruto de sus obras», una expresión hebrea que señala las consecuencias producidas por lo que han hecho.
    reason: lexical_alternative
