  glossary_alignment: Alinea bien con la terminología del proyecto en 'Yahvé'. No hay conflicto doctrinal mayor. El uso de 'hacedor' es aceptable como equivalente de 'maker of', aunque menos idiomático que 'creador'; dado el expediente lexical, puede conservarse. 'Sion' y 'cielos y tierra' también son aceptables.
