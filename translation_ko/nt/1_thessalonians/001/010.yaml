id: 1TH.1.10
reference: 1 Thessalonians 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἀναμένειν τὸν υἱὸν αὐτοῦ ἐκ τῶν οὐρανῶν, ὃν ἤγειρεν ἐκ τῶν νεκρῶν, Ἰησοῦν τὸν ῥυόμενον ἡμᾶς ⸀ἐκ τῆς ὀργῆς τῆς ἐρχομένης.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/010.yaml
  text: and to wait for his Son from heaven[a], whom he raised from the dead—Jesus, who rescues us from the coming wrath.
  footnotes:
  - marker: a
    text: Or 'who delivers us from the wrath to come.'
    reason: lexical_alternative
translation:
  language: ko
  text: 또한 하나님께서 죽은 자들 가운데서 일으키신 그분의 아들, 곧 다가오는 진노에서 우리를 건지시는[a] 예수께서 하늘로부터 오시기를 기다리게 되었는지 알리고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「오실 진노에서 우리를 구하시는」. 현재 분사 ῥυόμενον은 예수의 정체성·행위로서의 구원을 가리키되, 다가오는 진노라는 미래 지향 정황 가운데 드러난다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμένειν
  english_pob_choice: to wait for
  chosen_korean: 오시기를 기다리게
  alternatives_korean:
  - 기다리기를
  - 고대하기를
  lexicon: BDAG
  rationale: 기대 어린 기다림. 한국어 「오시기를 기다리다」가 합쇼체 경어와 종말 대망의 어감을 함께 담는다.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his Son
  chosen_korean: 그분의 아들
  alternatives_korean:
  - 그의 아들
  - 자기 아들
  lexicon: BDAG
  rationale: 하나님을 지시하는 「그분」으로 경어성을 살리되 칭호 자체는 풀이 없이 보존한다.
- source_word: ἐκ τῶν οὐρανῶν
  english_pob_choice: from heaven
  chosen_korean: 하늘로부터
  alternatives_korean:
  - 하늘들로부터
  - 하늘에서
  lexicon: BDAG
  rationale: 헬라어 복수형이지만 한국어 관용상 「하늘」 단수로 옮긴다.
- source_word: ὃν ἤγειρεν ἐκ τῶν νεκρῶν
  english_pob_choice: whom he raised from the dead
  chosen_korean: 죽은 자들 가운데서 일으키신
  alternatives_korean:
  - 죽은 자 가운데서 살리신
  - 죽은 자들로부터 일으키신
  lexicon: BDAG
  rationale: 「일으키다」가 ἐγείρω의 부활 의미를 보존하며 한국 교회 전통의 표준이다. 「가운데서」가 ἐκ + 복수의 정황을 자연스럽게 담는다.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_korean: 예수
  alternatives_korean:
  - 예수님
  lexicon: BDAG
  rationale: 동격으로 칭호와 함께 묶이므로 호칭 없이 「예수」로 옮긴다. 문장 흐름에서는 「예수께서」 주격 표지가 경어성을 살린다.
- source_word: τὸν ῥυόμενον
  english_pob_choice: who rescues
  chosen_korean: 건지시는
  alternatives_korean:
  - 구원하시는
  - 구하시는
  lexicon: BDAG
  rationale: ῥύομαι의 「위험에서 빼내다」 의미를 「건지다」가 가장 잘 담는다. 한국 교회 전통의 「구원」은 σωτηρία와의 구분을 흐리므로 본문에서는 「건지시는」을 택한다.
- source_word: ἐκ τῆς ὀργῆς τῆς ἐρχομένης
  english_pob_choice: from the coming wrath
  chosen_korean: 다가오는 진노에서
  alternatives_korean:
  - 장차 임할 진노에서
  - 오는 진노로부터
  lexicon: BDAG
  rationale: ὀργή의 「진노」 어휘를 보존하고, 현재 분사 ἐρχομένη의 진행적 다가옴을 「다가오는」으로 담는다. 종말론적 무게를 좁히지 않는다.
theological_decisions:
- issue: 「다가오는 진노」의 종말론적 함의
  chosen_reading: 다가오는 진노에서 우리를 건지시는
  alternative_readings:
  - 장차 임할 심판
  - 마지막 환난
  - 최종 정죄
  rationale: 본문은 종말론적 무게를 담되 특정 체계로 좁히지 않는다. 「진노」 어휘를 그대로 보존하고, 「다가오는」으로 분사의 진행성을 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: 현재 분사 ῥυόμενον의 시제·정체성
  chosen_reading: 현재 분사를 정체성·행위로 옮긴 「건지시는」
  alternative_readings:
  - 건지실
  - 건지고 계시는
  rationale: 현재 분사는 예수를 「건지시는 분」으로 규정한다. 미래 대상(다가오는 진노)을 가리키되 헬라어 본문은 미래 시제로 좁히지 않으므로 「~시는」을 유지한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
