base_translation:
  language: en
  yaml_path: translation/ot/isaiah/050/001.yaml
  text: 'Thus says Yahweh: Where is your mother''s certificate of divorce[a], with which I sent her away? Or to which of my creditors did I sell you? Behold, you were sold because of your iniquities[c][b], and your mother was sent away because of your transgressions.'
  footnotes:
  - marker: a
    text: Or 'bill of divorce.' The Hebrew refers to a formal legal document of divorce.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'your mother' is a corporate metaphor for Zion/Jerusalem or the covenant people represented as a mother.
    reason: cultural_note
  - marker: c
    text: Or 'your mother was divorced.' The Hebrew verb is literally 'was sent away,' matching the divorce imagery of the verse.
    reason: lexical_alternative
