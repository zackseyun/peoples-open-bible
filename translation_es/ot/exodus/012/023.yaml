translation:
  language: es
  text: Porque Yahvé pasará por en medio para herir a Egipto; y cuando vea la sangre en el dintel y en los dos postes de la puerta, Yahvé pasará sobre[a] la entrada y no permitirá que el destructor[b] entre en sus casas para herir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasará por encima de». El hebreo usa aquí el verbo asociado con la Pascua; también puede entenderse con el sentido de «protegerá» o «librará», pero el texto conserva la conexión verbal con la Pascua.'
    reason: lexical_alternative
  - marker: b
    text: «El destructor» queda sin especificar en el hebreo; algunos entienden que se refiere a un agente angelical de juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en transliteración reverente y legible en español, siguiendo la política del proyecto; se evita sustituirlo por un título. «Yahvé» mantiene la referencia directa al Tetragrámaton sin perder claridad.
- source_word: וְעָבַר
  english_pob_choice: will pass through
  chosen_spanish: pasará
  alternatives_spanish:
  - pasará por en medio
  - pasará a través
  lexicon: HALOT
  rationale: El hebreo indica que Yahvé ‘pasa’ en el marco del juicio sobre Egipto; en español, «pasará» es natural y permite que el contexto concrete el movimiento sin introducir una formulación torpe.
- source_word: לִנְגֹּף
  english_pob_choice: to strike
  chosen_spanish: herir
  alternatives_spanish:
  - golpear
  - asestar un golpe a
  lexicon: HALOT
  rationale: Aquí el verbo expresa un golpe de juicio, no un simple contacto físico. «Herir» conserva la fuerza judicial del contexto con un registro bíblico claro en español.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar; en contexto se entiende el país y su pueblo bajo juicio.
- source_word: וְרָאָה
  english_pob_choice: when he sees
  chosen_spanish: cuando vea
  alternatives_spanish:
  - y verá
  - al ver
  lexicon: HALOT
  rationale: La secuencia temporal del versículo en español se expresa con naturalidad mediante «cuando vea», que conserva la relación temporal sin sobretraducir la forma verbal hebrea.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre sacrificial
  lexicon: HALOT
  rationale: Se mantiene la referencia definida al sangre ya aplicada a la casa; «la sangre» es suficiente y fiel al texto.
- source_word: הַמַּשְׁקוֹף
  english_pob_choice: the lintel
  chosen_spanish: el dintel
  alternatives_spanish:
  - el travesaño superior
  - el lintel
  lexicon: HALOT
  rationale: «Dintel» es el término arquitectónico normal en español para la parte superior horizontal del marco de la puerta, equivalente preciso de משקוף.
- source_word: שְׁתֵּי הַמְּזוּזוֹת
  english_pob_choice: the two doorposts
  chosen_spanish: las dos jambas
  alternatives_spanish:
  - los dos postes
  - los dos postes laterales
  lexicon: HALOT
  rationale: Aunque el inglés usa «doorposts», en español «jambas» es el término arquitectónico más preciso para los soportes verticales del vano; mantiene el paralelismo con «dintel».
- source_word: וּפָסַח
  english_pob_choice: will pass over
  chosen_spanish: pasará de largo
  alternatives_spanish:
  - pasará sobre
  - pasará por encima
  lexicon: HALOT
  rationale: Se conserva el valor narrativo de פסח en el contexto de Pascua sin forzar una paráfrasis interpretativa como «protegerá». «Pasará de largo» comunica el gesto de pasar sin acercarse al umbral marcado.
- source_word: עַל הַפֶּתַח
  english_pob_choice: the doorway
  chosen_spanish: por la puerta
  alternatives_spanish:
  - por el vano
  - por el umbral
  lexicon: HALOT
  rationale: «La puerta» en español funciona de forma natural como equivalente del acceso de la casa; «por la puerta» evita la repetición técnica excesiva tras nombrar dintel y jambas.
- source_word: וְלֹא יִתֵּן
  english_pob_choice: will not allow
  chosen_spanish: no permitirá
  alternatives_spanish:
  - no dejará
  - no consentirá
  lexicon: HALOT
  rationale: El hebreo idiomático con נתן + infinitivo expresa permiso. «No permitirá» reproduce esa fuerza de autorización/impedimento con precisión y naturalidad.
- source_word: הַמַּשְׁחִית
  english_pob_choice: the destroyer
  chosen_spanish: el destructor
  alternatives_spanish:
  - el que destruye
  - el ángel destructor
  lexicon: HALOT
  rationale: Se conserva la agentividad del sustantivo hebreo sin especificar más de lo que dice el texto. «Destructor» evita introducir ‘ángel’ en la línea principal.
- source_word: לָבֹא אֶל בָּתֵּיכֶם
  english_pob_choice: to enter your houses
  chosen_spanish: entre en sus casas
  alternatives_spanish:
  - entre en vuestras casas
  - entre en sus hogares
  lexicon: HALOT
  rationale: Se traduce de forma directa el infinitivo con valor de finalidad y la segunda persona plural con un posesivo reverente y claro. «Sus casas» es la forma natural en español bíblico moderno para el interlocutor plural.
- source_word: לִנְגֹּף
  english_pob_choice: to strike
  chosen_spanish: para herir
  alternatives_spanish:
  - para golpear
  - para castigar
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo de juicio al final del versículo. «Para herir» enlaza con la primera aparición y conserva el tono judicial del hebreo.
theological_decisions:
- issue: Relación entre Yahvé y «el destructor»
  english_pob_reading: 'Render both distinctly: the LORD acts in judgment and also restrains ''the destroyer'' from entering Israelite houses.'
  chosen_spanish_reading: 'Se distinguen claramente Yahvé y «el destructor»: Yahvé ejecuta el juicio y, además, no permite la entrada del destructor en las casas israelitas.'
  alternative_spanish_readings:
  - Identificar al destructor con Yahvé mismo
  - especificar «ángel destructor» en el texto principal
  rationale: El hebreo diferencia explícitamente a Yahvé del agente llamado הַמַּשְׁחִית. La traducción conserva esa tensión sin resolverla con una identificación que el texto no formula.
  doctrine_reference: Preservar la tensión teológica del texto original sin sobreexplicarla.
- issue: Valor de פסח en el marco de la Pascua
  english_pob_reading: Translate as 'pass over' in the main text while allowing the protective nuance to remain implicit.
  chosen_spanish_reading: Se traduce como «pasará de largo», dejando implícita la función protectora en el contexto.
  alternative_spanish_readings:
  - protegerá
  - perdonará
  - saltará sobre
  rationale: En español, «pasará de largo» mantiene la idea central de pasar sin detenerse sobre la entrada marcada, y conserva el vínculo narrativo con la Pascua sin reemplazar el verbo por una explicación del efecto.
  doctrine_reference: Primacía del lenguaje de la fuente; conservar la tensión léxica del relato pascual.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente disponible y no introduce cambios sustanciales respecto del contexto auditado en inglés; mantiene la distinción entre el paso de Yahvé, el signo de la sangre y la figura no especificada del destructor.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, de acuerdo con el estándar del proyecto.
  - Se mantiene «pasará de largo» para conservar la relación léxica con la Pascua.
  - Se evita «SEÑOR» como sustituto del Tetragrámaton.
  - Se prefiere «dintel» y «jambas» por precisión arquitectónica y coherencia interna.
