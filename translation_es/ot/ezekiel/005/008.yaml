translation:
  language: es
  text: 'Por tanto, así dice el Señor, Yahvé: He aquí[a], yo mismo estoy contra ti, y ejecutaré juicios en medio de ti, ante los ojos de las naciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Señor, YHWH». Se conserva el nombre divino como «Yahvé» en español, en vez de reemplazarlo con una forma enmascarada como «SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  - Por consiguiente
  lexicon: HALOT
  rationale: La conjunción inferencial introduce la consecuencia del oráculo anterior; «Por tanto» mantiene el valor conclusivo con registro bíblico natural en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  - de este modo dice
  lexicon: HALOT
  rationale: La fórmula profética en español se expresa con naturalidad en presente solemne. «Así dice» conserva la fuerza del mensajero sin volverla arcaica en exceso.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  - el Señor YHWH
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como «Yahvé». En español no hace falta el artificio inglés «SEÑOR DIOS»; la combinación «el Señor Yahvé» preserva el título compuesto y el nombre divino distintivo.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  - Aquí estoy
  lexicon: HALOT
  rationale: La partícula deíctica anuncia solemnemente la intervención divina. «He aquí» es la opción tradicional y transparente en español bíblico para este valor.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en tu contra
  lexicon: HALOT
  rationale: En contexto de juicio, la preposición expresa hostilidad; «contra ti» comunica mejor la oposición divina que una relación meramente espacial.
- source_word: גַּם אָ֑נִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - también yo
  - hasta yo
  - yo también
  lexicon: HALOT
  rationale: La construcción añade énfasis personal. «Yo mismo» preserva el refuerzo enfático de la intervención divina directa con buena naturalidad en español.
- source_word: וְעָשִׂיתִי ... מִשְׁפָּטִים
  english_pob_choice: I will execute judgments
  chosen_spanish: ejecutaré juicios
  alternatives_spanish:
  - haré juicios
  - aplicaré juicios
  - haré actos de juicio
  lexicon: HALOT
  rationale: El hebreo literal es «hacer juicios», pero en este contexto judicial español «ejecutar juicios» expresa con precisión la acción punitiva anunciada, manteniendo el plural del original.
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu interior
  - dentro de ti
  - en tu seno
  lexicon: HALOT
  rationale: Para una ciudad personificada en femenino singular, «en medio de ti» es la equivalencia más natural y clara; conserva la ubicación interna de la acción judicial.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  - delante de
  lexicon: HALOT
  rationale: La expresión subraya visibilidad pública. «Ante los ojos de» sigue de cerca la imagen hebrea y mantiene el matiz de exposición pública.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En Ezequiel se refiere a las naciones vecinas/paganas; «las naciones» es la opción estándar y menos ambigua en español bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / footnote notes Hebrew ‘the Lord YHWH’
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El proyecto español usa «Yahvé» para יְהוָה. En este versículo el título compuesto queda bien representado como «el Señor Yahvé», evitando la máscara convencional «SEÑOR» y preservando el nombre de pacto en una forma legible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de juicio en מִשְׁפָּטִים
  english_pob_reading: execute judgments
  chosen_spanish_reading: ejecutaré juicios
  alternative_spanish_readings:
  - ejecutaré sentencias
  - haré juicios
  rationale: La pluralidad del hebreo y el contexto de castigo público apuntan a acciones concretas de juicio, no a una noción abstracta de justicia. «Juicios» conserva esa carga, y el verbo «ejecutar» expresa la realización efectiva del acto.
  doctrine_reference: Ezequiel 5:8 within the oracle of imminent divine punishment
- issue: Visibilidad pública del castigo
  english_pob_reading: before the eyes of the nations
  chosen_spanish_reading: ante los ojos de las naciones
  alternative_spanish_readings:
  - a la vista de las naciones
  - en presencia de las naciones
  rationale: El texto enfatiza que el juicio será visible para otros pueblos. «Ante los ojos de» mantiene la imagen hebrea de exposición pública y ayuda a conservar el matiz de advertencia a las naciones.
  doctrine_reference: Ezequiel 5:8; public witness motif in prophetic judgment
translation_notes:
  revision_awareness: El control de revisión indica que no se requirieron cambios respecto del pase más reciente; la versión española se ajusta a ese estado estable y conserva las decisiones léxicas/documentadas del registro inglés, adaptadas al sistema terminológico español del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según el estándar del proyecto.
  - Se usa «Señor» para אֲדֹנָי y no «Señor Dios», porque la combinación española «el Señor Yahvé» ya distingue adecuadamente el título compuesto.
  - «Juicios» conserva el plural hebreo מִשְׁפָּטִים y el carácter concreto del castigo anunciado.
  - «Las naciones» evita el anacronismo de «los gentiles» en este contexto profético.
