translation:
  language: es
  text: Y Aram[a] de Damasco vino para ayudar a Hadadezer[b], rey de Zobá, y David derribó a veintidós mil hombres de Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo אֲרַם se traduce «Aram» y no la forma tradicional «Siria»; designa el reino arameo centrado en Damasco.
    reason: lexical_alternative
  - marker: b
    text: Hadadezer aparece escrito «Hadarezer» en algunos pasajes y traducciones.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino y
  lexicon: HALOT
  rationale: El wayyiqtol narra avance secuencial en pasado; en español, «vino» conserva bien el movimiento narrativo sin añadir matices ajenos. «Llegó» sería posible, pero aquí el foco está en el movimiento de Aram hacia la ayuda.
- source_word: אֲרַם דַּמֶּשֶׂק
  english_pob_choice: Aram of Damascus
  chosen_spanish: Aram de Damasco
  alternatives_spanish:
  - los arameos de Damasco
  - Siria de Damasco
  lexicon: HALOT
  rationale: Se mantiene «Aram» como designación étnico-política del hebreo, en vez de sustituirla por «Siria». «De Damasco» identifica el centro del reino arameo y sigue la decisión auditada del POB inglés.
- source_word: לַעְזֹר
  english_pob_choice: to help
  chosen_spanish: para ayudar
  alternatives_spanish:
  - para asistir
  - para venir en ayuda de
  lexicon: HALOT
  rationale: עזר expresa ayuda/auxilio de forma directa; «para ayudar» es natural en español y fiel a la fuerza básica del verbo.
- source_word: לַהֲדַדְעֶזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadezer
  alternatives_spanish:
  - Hadarezer
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio. La variante «Hadarezer» queda documentada como alternativa tradicional en nota.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Zobá
  alternatives_spanish:
  - el rey de Zobá
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera natural como «rey de Zobá». Se mantiene el topónimo con acento españolizado.
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - golpeó
  - mató
  lexicon: HALOT
  rationale: נכה en contexto militar puede abarcar herir con golpe decisivo, incluso mortal. «Hirió» conserva la idea de causar un daño contundente sin explicitar más de lo que el hebreo exige en esta línea.
- source_word: בַּאֲרָם
  english_pob_choice: of Aram
  chosen_spanish: a Aram
  alternatives_spanish:
  - contra Aram
  - entre Aram
  - de Aram
  lexicon: HALOT
  rationale: El hebreo marca el grupo afectado por la acción. En español, con «hirió» resulta más natural expresar el complemento con «a»; la forma «de Aram» sería menos idiomática aquí.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף אִישׁ
  english_pob_choice: twenty-two thousand men
  chosen_spanish: veintidós mil hombres
  alternatives_spanish:
  - veintidós mil
  - veintidós mil soldados
  lexicon: HALOT
  rationale: Se conserva «hombres» porque אִישׁ está explícito en el hebreo. «Soldados» sería interpretativo; la cifra se presenta de forma directa y completa.
theological_decisions:
- issue: Designación de Aram frente a «Siria»
  english_pob_reading: Aram of Damascus refers to the Aramean kingdom centered at Damascus, not the later conventional label Syria.
  chosen_spanish_reading: Aram de Damasco
  alternative_spanish_readings:
  - Siria de Damasco
  - los arameos de Damasco
  rationale: La decisión conserva la referencia histórica y étnica del hebreo, evitando importar una denominación posterior que podría oscurecer el trasfondo del texto.
  doctrine_reference: Historical-geographical precision in biblical ethnonyms
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión auditada del POB inglés de mantener «Aram»; también respeta la nota de variante del nombre Hadadezer/Hadarezer aunque aquí se conserva la forma principal.
  spanish_consistency_notes:
  - Se usó «Aram» de forma consistente como etnónimo/topónimo bíblico, no «Siria».
  - Se mantuvo la explicitud de «hombres» para reflejar אִישׁ.
  - La puntuación española separa claramente la cláusula de ayuda y la acción militar, sin añadir una conjunción o glosa que el hebreo no requiere.
