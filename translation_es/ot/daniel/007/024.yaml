translation:
  language: es
  text: En cuanto a los diez cuernos, de este reino se levantarán diez reyes; y otro se levantará después de ellos. Será diferente de los primeros[a], y humillará[b] a tres reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “será diverso de los primeros”.
    reason: lexical_alternative
  - marker: b
    text: O “rebajará” o “abatirá” a tres reyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקַרְנַיָּא עֲשַׂר
  english_pob_choice: the ten horns
  chosen_spanish: los diez cuernos
  alternatives_spanish:
  - los diez cuernos
  lexicon: HALOT
  rationale: Conservo el símbolo apocalíptico de 'cuernos' en lugar de interpretarlo, porque el propio pasaje explica luego a qué corresponde. 'En cuanto a' reproduce la fuerza temática del sintagma inicial en español natural.
- source_word: מִנַּהּ מַלְכוּתָה
  english_pob_choice: out of this kingdom
  chosen_spanish: de este reino
  alternatives_spanish:
  - desde este reino
  - de él, el reino
  lexicon: HALOT
  rationale: La referencia es al reino simbolizado por la bestia. 'De este reino' es idiomático en español y conserva la idea de procedencia sin añadir interpretación.
- source_word: מַלְכִין יְקֻמ֑וּן
  english_pob_choice: ten kings will arise
  chosen_spanish: se levantarán diez reyes
  alternatives_spanish:
  - surgirán diez reyes
  - aparecerán diez reyes
  lexicon: HALOT
  rationale: קוּם en este contexto habla del surgimiento de gobernantes. 'Se levantarán' mantiene cercanía formal y es natural en lenguaje profético.
- source_word: וְאָחֳרָן
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - uno posterior
  lexicon: HALOT
  rationale: '''Otro'' es breve y claro; el contexto ya proporciona el referente real, un rey posterior.'
- source_word: יְקוּם אַחֲרֵיהוֹן
  english_pob_choice: will arise after them
  chosen_spanish: se levantará después de ellos
  alternatives_spanish:
  - surgirá después de ellos
  - se alzará después de ellos
  lexicon: HALOT
  rationale: Mantiene el paralelismo verbal con la cláusula anterior y expresa la sucesión temporal indicada por 'después de ellos'.
- source_word: יִשְׁנֵא מִן קַדְמָיֵא
  english_pob_choice: will be different from the former ones
  chosen_spanish: será diferente de los primeros
  alternatives_spanish:
  - será distinto de los anteriores
  - será diverso de los primeros
  lexicon: HALOT
  rationale: El verbo aquí se entiende contextualmente como diferencia/distinción, no como odio. 'Los primeros' refleja a los reyes precedentes y preserva la tensión semántica sin resolverla de manera excesiva.
- source_word: קַדְמָיֵא
  english_pob_choice: the former ones
  chosen_spanish: los primeros
  alternatives_spanish:
  - los anteriores
  - los de antes
  lexicon: HALOT
  rationale: Remite a los reyes previos del pasaje. 'Los primeros' es conciso, formal y coherente con el registro profético.
- source_word: וּתְלָתָה מַלְכִין יְהַשְׁפִּל
  english_pob_choice: and he will humble three kings
  chosen_spanish: y humillará a tres reyes
  alternatives_spanish:
  - y abatirá a tres reyes
  - y los pondrá por tierra a tres reyes
  - y someterá a tres reyes
  lexicon: HALOT
  rationale: El haphel de שׁפל expresa hacer bajar/humillar/abajar. 'Humillará' conserva la imagen de rebajamiento sin concretar indebidamente el mecanismo político.
theological_decisions:
- issue: Naturaleza de la diferencia del último gobernante respecto de los anteriores
  english_pob_reading: He will be different from the former ones
  chosen_spanish_reading: Será diferente de los primeros
  alternative_spanish_readings:
  - Será más severo que los primeros
  - Cambiará respecto de los primeros
  rationale: El texto afirma diferencia, no un perfil teológico completo del personaje. La traducción preserva esa descripción sin importar esquemas interpretativos posteriores.
  doctrine_reference: Conservar la tensión exegética en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: Se siguió el cierre de revisión más reciente con estatus de alta concordancia y sin cambios aplicados; la redacción española mantiene el sentido del hebreo arameo y la solución auditada en inglés, con ajustes naturales de sintaxis española.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - '''Reyes'' traduce מַלְכִין en sentido político literal; no se sustituye por ''gobernantes'' porque la imagen del pasaje es monárquica.'
  - '''Se levantarán'' y ''se levantará'' mantienen el valor dinámico de קוּם sin caer en calco rígido.'
  - '''Humillará'' conserva el matiz de rebajar/abatir documentado en el audit trail, sin escoger un término más técnico o interpretativo.'
