translation:
  language: es
  text: y que los que se inscribían fueran también marcados a fuego en el cuerpo con la marca de la hoja de hiedra de Dioniso[a][b], y fueran además asignados a su autoridad restringida[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los que eran inscritos” o “los inscritos”.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, una marca con la hoja de hiedra de Dioniso, es decir, una marca corporal que los identificaba con el culto de Dioniso.
    reason: cultural_note
  - marker: c
    text: La expresión griega puede significar “autoridad restringida”, “estatus cívico restringido” o “condición legal recortada”. Es una fórmula comprimida y algo incierta.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπογραφομένους
  english_pob_choice: those who registered
  chosen_spanish: los que se inscribían
  alternatives_spanish:
  - los que eran inscritos
  - los que se registraban
  - los inscritos
  lexicon: LSJ
  rationale: El participio puede ser medio o pasivo y en este contexto administrativo admite la idea de inscribirse o ser inscritos. Opté por una forma natural en español que conserva la noción de registro/enrolamiento sin forzar una voz demasiado técnica.
- source_word: χαράσσεσθαι
  english_pob_choice: be branded
  chosen_spanish: fueran también marcados
  alternatives_spanish:
  - fueran también marcados con hierro
  - fueran también estampados
  - fueran también grabados
  lexicon: LSJ
  rationale: Con διὰ πυρός, el sentido apunta a una marca corporal por quemadura, pero en español 'marcados' permite incluir la idea de branding sin sonar excesivamente moderno o gráfico. El contexto de coerción se mantiene por el complemento 'con fuego'.
- source_word: διὰ πυρός
  english_pob_choice: by fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - por medio del fuego
  - con hierro candente
  lexicon: LSJ
  rationale: La expresión griega indica el medio de la marcación. 'Con fuego' es claro, fiel y natural en español; evita añadir un instrumento no explicitado por el texto.
- source_word: παρασήμῳ Διονύσου κισσοφύλλῳ
  english_pob_choice: with the ivy-leaf emblem/mark of Dionysus
  chosen_spanish: con la señal de hiedra de Dioniso
  alternatives_spanish:
  - con la marca de hiedra de Dioniso
  - con el emblema de hiedra de Dioniso
  - con la señal de la hoja de hiedra de Dioniso
  lexicon: LSJ
  rationale: παράσημον es un distintivo o señal identificadora; κισσοφύλλον remite a la hiedra, símbolo de Dioniso. 'Señal de hiedra' conserva el valor de marca distintiva y el referente cultual sin sobrerelocalizarlo como 'emblema' en un español que puede sonar más interpretativo.
- source_word: προκαταχωρίσαι
  english_pob_choice: be assigned / be enrolled
  chosen_spanish: fueran además asignados
  alternatives_spanish:
  - fueran además inscritos previamente
  - fueran además registrados de antemano
  - fueran además incorporados
  lexicon: LSJ
  rationale: El infinitivo expresa una incorporación oficial a una categoría o registro. 'Asignados' refleja bien la acción administrativa y evita reducir indebidamente la expresión a un simple registro mecánico.
- source_word: προσυνεσταλμένην αὐθεντίαν
  english_pob_choice: his restricted authority
  chosen_spanish: su autoridad restringida
  alternatives_spanish:
  - su autoridad reducida
  - su estatus legal restringido
  - su condición cívica restringida
  lexicon: LSJ
  rationale: La frase es compacta y ambigua; αὐθεντία puede abarcar autoridad, dominio o estatus, y προσυνεσταλμένην sugiere algo limitado o contraído. 'Autoridad restringida' mantiene esa tensión y es suficientemente conservadora para el español sin imponer una lectura más específica de la que permite el griego.
theological_decisions:
- issue: Marcación cultual asociada con Dioniso
  english_pob_reading: Retain explicit reference to Dionysus and his ivy-leaf emblem/mark without euphemism.
  chosen_spanish_reading: Mantener la mención explícita de Dioniso y su señal de hiedra, sin suavizarla a una marca genérica.
  alternative_spanish_readings:
  - marca pagana
  - señal idolátrica
  - distintivo cultual
  rationale: El texto nombra de manera concreta al dios y su símbolo. La traducción debe preservar el carácter religioso y coercitivo del pasaje, no diluirlo en una formulación más vaga.
  doctrine_reference: Translation philosophy §1, §6
- issue: Expresión administrativa ambigua προσυνεσταλμένην αὐθεντίαν
  english_pob_reading: Translate conservatively as 'restricted authority' and preserve a more interpretive alternative in a footnote.
  chosen_spanish_reading: Traducirla de manera conservadora como 'autoridad restringida', preservando la ambigüedad del griego.
  alternative_spanish_readings:
  - estatus cívico restringido
  - jurisdicción recortada
  - condición legal restringida
  rationale: La secuencia griega es comprimida y no obliga a decidir entre autoridad, estado cívico o estatus legal. 'Autoridad restringida' conserva el alcance posible sin sobreatribuir precisión que el original no garantiza.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión posterior del inglés auditado, que prefirió una formulación más natural y precisa: ''branded on the body with the ivy-leaf mark of Dionysus by fire'' y ''assigned to his restricted authority''. La versión española sigue esa dirección, pero conserva la ambigüedad del griego en ''autoridad restringida'' y evita intensificar innecesariamente el instrumento de la marca.'
  spanish_consistency_notes:
  - Se mantuvo 'Dioniso' como forma española estándar del nombre del dios.
  - Se evitó 'SEÑOR' u otra sustitución teológica porque el pasaje no contiene el nombre divino.
  - '''Marcados con fuego'' refleja la idea de branding sin introducir ''hierro candente'', que no está explícito en el griego.'
  - Se prefirió un estilo solemne pero claro, adecuado para lectura pública y auditoría textual.
