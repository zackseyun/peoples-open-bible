revisions:
- from: Trae a tu hermano menor[a] hasta mí, para que yo sepa que no son espías, sino hombres honestos. Entonces les devolveré a su hermano, y podrán comerciar en la tierra.
  to: Traigan a su hermano menor a mí, para que yo sepa que no son espías, sino hombres honestos. Entonces les devolveré a su hermano, y podrán comerciar[a] en la tierra.
  rationale: Se corrige la segunda persona para mantener el plural del hebreo y la coherencia interna del español. Se reemplaza 'hasta mí' por 'a mí' para una expresión más natural y fiel. Se elimina la nota innecesaria sobre אֵלַי y se añade una nota en 'comerciar', que sí corresponde a la alternativa léxica documentada en el English POB para תסחרו.
