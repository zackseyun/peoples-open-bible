theological_decisions:
- issue: Sense of ירשׁ with גּוֹיִם as object
  chosen_reading: territorial conquest/possession expressed as 'dispossess nations'
  alternative_readings:
  - inherit nations
  - possess nations
  rationale: The verse promises expansive restoration for Zion and her offspring. Rendering ירשׁ as 'dispossess' preserves the concrete covenant-land and conquest nuance without softening it into a purely abstract inheritance. The alternatives remain lexically possible and are worth preserving.
  doctrine_reference: Translation philosophy §1, §3, §5
