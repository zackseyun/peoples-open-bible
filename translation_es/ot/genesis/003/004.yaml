    rationale: La nota lexical sobre la construcción verbal pertenece más naturalmente a la cláusula citada que a 'la mujer'. La nota del plural debe anclarse donde aparece 'Ustedes'.
  revised_spanish_text: 'Pero la serpiente le dijo a la mujer: «Ustedes[a] ciertamente no morirán[b]».

