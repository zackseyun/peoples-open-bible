translation:
  language: es
  text: El comienzo de la contienda es como dejar salir el agua[a]; por tanto, abandona la querella antes de que estalle[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «El comienzo de la contienda es como uno que deja salir el agua», conservando más explícita la imagen de una persona que abre una salida o brecha.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo es difícil; puede sugerir «estalla», «irrumpe» o «se hace visible». Aquí se eligió «estalle» por ser una forma natural en español para la expansión repentina de un conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹטֵר
  english_pob_choice: letting out
  chosen_spanish: dejar salir
  alternatives_spanish:
  - liberar
  - soltar
  - abrir paso a
  lexicon: HALOT
  rationale: El participio transmite la imagen concreta de algo retenido que se deja escapar. En español, «dejar salir» conserva la metáfora del agua con naturalidad y sin perder el matiz físico de una apertura o liberación.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: el agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Aunque el hebreo es plural morfológico, en español la lectura natural y idiomática es el singular colectivo «el agua», que preserva mejor la imagen proverbial.
- source_word: רֵאשִׁית
  english_pob_choice: the beginning of
  chosen_spanish: el comienzo de
  alternatives_spanish:
  - el principio de
  - la primera fase de
  lexicon: HALOT
  rationale: «El comienzo de» expresa con claridad la idea de la primera etapa de la contienda, con tono proverbial y sin rigidez arcaica.
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: la contienda
  alternatives_spanish:
  - la discordia
  - la riña
  - el pleito
  lexicon: HALOT
  rationale: «Contienda» conserva el campo semántico de conflicto disputado propio de la sabiduría bíblica. Evita reducir el término a una simple pelea verbal y mantiene amplitud suficiente.
- source_word: וְלִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - y antes de
  lexicon: HALOT
  rationale: La expresión temporal se vierte de forma más natural en español con «antes de que», manteniendo la relación lógica entre la contienda incipiente y la acción preventiva.
- source_word: הִתְגַּלַּע
  english_pob_choice: it breaks out
  chosen_spanish: estalle
  alternatives_spanish:
  - esté expuesta
  - se desate
  - irrumpa
  lexicon: HALOT
  rationale: El verbo es difícil y puede sugerir salir a la vista o irrumpir con fuerza. En español, «estalle» comunica bien la idea de un conflicto que pasa a ser abierto e incontrolable, sin fijar indebidamente un solo matiz.
- source_word: הָרִיב
  english_pob_choice: the quarrel
  chosen_spanish: la querella
  alternatives_spanish:
  - la disputa
  - el pleito
  - la contienda
  lexicon: HALOT
  rationale: «Querella» mantiene el sentido de disputa concreta entre partes y evita repetir «contienda» en la segunda línea, lo que mejora el paralelismo en español.
- source_word: נְטוֹשׁ
  english_pob_choice: abandon
  chosen_spanish: abandona
  alternatives_spanish:
  - deja
  - suelta
  - desiste de
  lexicon: HALOT
  rationale: El imperativo exige cesar la participación antes de la escalada. «Abandona» refleja con fuerza la orden y se mantiene fiel al valor exhortativo del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la lectura auditada en inglés, pero ajusta la metáfora para un español fluido: se conserva la imagen del agua liberada y el mandato preventivo de abandonar la disputa antes de su explosión pública.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni una cita directa del tetragrámaton.
  - Se eligió «contienda/querella» para reflejar dos términos hebreos distintos y conservar el paralelismo sin redundancia innecesaria.
  - «Estalle» se usa para captar la dificultad del verbo hebreo sin cerrar otras posibilidades semánticas reconocidas por la POB.
