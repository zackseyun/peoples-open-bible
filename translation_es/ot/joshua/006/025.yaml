revisions:
- from: Pero Josué mantuvo con vida a Rahab la prostituta[a], junto con la casa de su padre y todo lo que le pertenecía, y ella ha habitado en medio de Israel hasta el día de hoy[b], porque escondió a los mensajeros que Josué envió a reconocer Jericó.
  to: Pero Josué mantuvo con vida a Rahab la prostituta[a], junto con la familia de su padre y todo lo que le pertenecía, y ella ha habitado en medio de Israel hasta el día de hoy, porque escondió a los mensajeros[b] que Josué envió a espiar Jericó.
  rationale: Se ajusta «la casa de su padre» a «la familia de su padre» para reflejar mejor el sentido contextual de בֵּית אָבִיהָ como hogar/unidad familiar. Se cambia «a reconocer Jericó» por «a espiar Jericó» para conservar la fuerza de לְרַגֵּל. También se simplifica y corrige la nota b para que realmente aclare la relación entre «mensajeros» y su misión en el contexto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:43:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: Josué preserva la vida de Rahab, de la casa de su padre y de todo lo suyo; ella reside en Israel hasta el presente del narrador; la razón es que ocultó a los mensajeros enviados a explorar Jericó. Sin embargo, hay dos ajustes importantes para alinearse mejor con la evidencia y el rastro auditado: (1) בֵּית אָבִיהָ en este contexto se refiere al hogar/unidad familiar de su padre, no solo a la casa-edificio, por lo que «la casa de su padre» queda algo estrecho frente a «la familia de su padre» o «la casa paterna»; (2) לְרַגֵּל expresa espionaje/reconocimiento encubierto, y «reconocer Jericó» es demasiado suave y puede sonar a simple inspección, mientras que «espiar Jericó» o «reconocer el terreno de Jericó» conserva mejor la fuerza del hebreo y del inglés POB.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. «Rahab la prostituta», «mantuvo con vida» y «en medio de Israel hasta el día de hoy» funcionan bien. «Ha habitado» es aceptable, aunque «ha vivido» sería un poco más idiomático; no es un problema serio. La nota b está mal justificada: el texto citado «los mensajeros» no necesita aclaración adicional sobre el hebreo, y la nota inglesa en realidad preserva la alternativa interpretativa de que eran los hombres enviados para espiar Jericó. Conviene reformularla con mayor precisión.'
  glossary_alignment: No hay conflicto con la terminología de proyecto. No aparece Yahvé ni otras entradas clave. «La prostituta» sigue bien la decisión léxica de הַזּוֹנָה. «Mensajeros» preserva adecuadamente הַמַּלְאָכִים. El principal desajuste está en לְרַגֵּל, donde la versión española suaviza indebidamente la noción de espionaje.
  issues:
  - severity: medium
    issue: «la casa de su padre» reduce demasiado בֵּית אָבִיהָ
    rationale: En este contexto la frase apunta al hogar/familia bajo el padre, no meramente al edificio. El rastro auditado prefirió «father’s household». En español, «la familia de su padre» expresa mejor el referente.
  - severity: medium
    issue: «a reconocer Jericó» debilita לְרַגֵּל
    rationale: El verbo hebreo indica reconocimiento con fines de espionaje. «Reconocer» por sí solo puede leerse como simple inspección. «A espiar Jericó» preserva mejor la fuerza semántica y la decisión del POB.
  - severity: low
    issue: La nota b no refleja bien la función de la nota inglesa
    rationale: La nota inglesa preserva la alternativa/explicación sobre «the messengers». En español conviene formularla como aclaración léxica breve, no como una glosa redundante de que el hebreo dice justamente lo que ya traduce el texto.
  revised_spanish_text: Pero Josué mantuvo con vida a Rahab la prostituta[a], junto con la familia de su padre y todo lo que le pertenecía, y ella ha habitado en medio de Israel hasta el día de hoy, porque escondió a los mensajeros[b] que Josué envió a espiar Jericó.
  revised_footnotes:
  - marker: a
    text: O «la ramera».
    reason: lexical_alternative
  - marker: b
    text: Es decir, los hombres que Josué envió a espiar Jericó.
    reason: lexical_alternative
  revision_rationale: Se ajusta «la casa de su padre» a «la familia de su padre» para reflejar mejor el sentido contextual de בֵּית אָבִיהָ como hogar/unidad familiar. Se cambia «a reconocer Jericó» por «a espiar Jericó» para conservar la fuerza de לְרַגֵּל. También se simplifica y corrige la nota b para que realmente aclare la relación entre «mensajeros» y su misión en el contexto.
