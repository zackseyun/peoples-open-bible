translation:
  language: es
  text: 'Y ningún habitante dirá[a]: «Estoy enfermo»; el pueblo que habita allí es perdonado de su iniquidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su culpa es llevada» o «su pecado es removido». El modismo hebreo habla literalmente de que la iniquidad es cargada o quitada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַל
  english_pob_choice: And no
  chosen_spanish: Y ningún
  alternatives_spanish:
  - Y no
  - Y nadie
  lexicon: HALOT
  rationale: בל con waw introduce una negación enfática en futuro. En español, «ningún» con el sustantivo singular «habitante» conserva la fuerza distributiva y la negación total sin sonar forzado.
- source_word: יֹאמַר
  english_pob_choice: will say
  chosen_spanish: dirá
  alternatives_spanish:
  - dirá que
  - dijera
  lexicon: HALOT
  rationale: El imperfecto profético en este contexto se expresa naturalmente con futuro simple en español.
- source_word: שָׁכֵן
  english_pob_choice: inhabitant
  chosen_spanish: habitante
  alternatives_spanish:
  - morador
  - residente
  lexicon: HALOT
  rationale: El participio/adjetivo funciona de manera genérica para una persona que vive allí; «habitante» es claro, idiomático y fiel al matiz residencial.
- source_word: חָלִיתִי
  english_pob_choice: I am sick
  chosen_spanish: Estoy enfermo
  alternatives_spanish:
  - Estoy enferma
  - Tengo una enfermedad
  - Estoy débil
  lexicon: HALOT
  rationale: El verbo חלה puede expresar enfermedad o debilidad. Aquí, dentro del discurso directo, «estoy enfermo» comunica el estado presente de forma natural sin cargar la frase con una interpretación más específica que la del hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: עם designa al colectivo humano; «pueblo» preserva el valor comunitario y suena más bíblico que «la gente» en este registro.
- source_word: הַיֹּשֵׁב בָּהּ
  english_pob_choice: who dwell there
  chosen_spanish: que habita allí
  alternatives_spanish:
  - que mora allí
  - que vive allí
  - que habita en ella
  lexicon: HALOT
  rationale: El participio singular tiene sentido distributivo colectivo. «Habita allí» conserva el matiz de residencia estable de ישב y evita una personificación innecesaria de la ciudad.
- source_word: נְשֻׂא
  english_pob_choice: are forgiven
  chosen_spanish: tiene su iniquidad llevada
  alternatives_spanish:
  - tiene su culpa apartada
  - tiene su pecado levantado
  - tiene su iniquidad perdonada
  lexicon: HALOT
  rationale: La construcción con נשׂא + עון es un modismo para cargar/llevar lejos la culpa. Se conserva la tensión léxica del hebreo mediante una formulación que deja visible la imagen de «llevar»; en español la redacción suena menos natural que «perdonada», pero esa alternativa pierde la imagen idiomática principal.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: עון puede abarcar culpa moral e iniquidad. «Iniquidad» mantiene el peso moral-jurídico del término y corresponde bien al uso heredado en este pasaje.
theological_decisions:
- issue: Relación entre ausencia de enfermedad y perdón de la iniquidad
  english_pob_reading: The verse presents both the absence of sickness and the forgiveness/removal of iniquity for Zion's people, without forcing a systematic claim that all sickness is directly caused by personal sin.
  chosen_spanish_reading: El versículo presenta juntas la ausencia de enfermedad y la remoción/perdón de la iniquidad para el pueblo de Sion, sin convertirlo en una afirmación sistemática de que toda enfermedad proviene directamente de un pecado personal.
  alternative_spanish_readings:
  - La sanidad es solo una metáfora de restauración espiritual
  - El texto enseña una relación causal estricta entre enfermedad individual y pecado individual
  rationale: El hebreo yuxtapone ambas bendiciones en un contexto de restauración. La traducción española conserva las dos dimensiones sin resolver la tensión teológica más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica en lugar de armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto al estado auditado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el Tetragrámaton esté presente; este versículo no lo contiene.
  - Se usa «iniquidad» para עָוֺן por coherencia con el valor moral-jurídico documentado.
  - La frase «habita allí» preserva la residencia estable de ישב sin introducir personificación adicional.
  - La nota textual conserva la tensión entre traducción idiomática y la imagen literal de נשׂא con עון.
