    text: O ‘vendrán humillados ante ti’; el verbo hebreo puede sugerir una sumisión forzada, abyecta o fingida.
    reason: lexical_alternative
  - marker: b
    text: O ‘pisarás sus lugares altos/fortalezas’; algunos entienden ‘sus espaldas’, pero ‘alturas’ es la traducción más directa del sustantivo hebreo.
