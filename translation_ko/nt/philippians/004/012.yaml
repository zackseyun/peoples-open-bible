id: PHP.4.12
reference: Philippians 4:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἶδα καὶ ταπεινοῦσθαι, οἶδα καὶ περισσεύειν· ἐν παντὶ καὶ ἐν πᾶσιν μεμύημαι, καὶ χορτάζεσθαι καὶ πεινᾶν, καὶ περισσεύειν καὶ ὑστερεῖσθαι·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/012.yaml
  text: 'I know how to be brought low, and I know how to abound. In every circumstance and in all things I have learned the secret: both to be well fed and to be hungry, both to abound and to be in need.'
translation:
  language: ko
  text: '나는 낮추어지는[a] 법도 알고, 풍성히 가지는[b] 법도 압니다. 어떠한 일에든지, 모든 상황에서든지, 나는 그 비결을 깨우쳤습니다[c]. 배부름과 굶주림에도, 풍성히 가짐과 궁핍에도 익숙합니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ταπεινόομαι는 「낮아짐」 「겸손해짐」의 수동·중간태로, 본문 맥락에서는 외적 형편의 낮음(궁핍·고난)을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 περισσεύω는 「풍성히 가지다」 「넘치다」를 뜻하며, 단순한 「부유함」보다 넓고 중립적인 표현이다.
    reason: lexical_alternative
  - marker: c
    text: 직역하면 「(비밀 의식에) 입문하였다」(μεμύημαι). 바울은 신비 종교의 입문 어휘를 비유로 빌려, 「살아내는 법의 비결을 터득함」을 표현한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know how
  chosen_korean: 알고 / 압니다
  alternatives_korean:
  - 할 줄 알다
  - 익히다
  lexicon: BDAG
  rationale: 부정사를 동반한 οἶδα는 실천적·체득된 앎을 가리키므로 「~할 줄 알다」 「~하는 법을 알다」가 적절하다. 한국어로는 「법도 알고 ... 법도 압니다」로 평행성을 보존한다.
- source_word: ταπεινοῦσθαι
  english_pob_choice: to be brought low
  chosen_korean: 낮추어지는
  alternatives_korean:
  - 비천해지는
  - 낮아지는
  lexicon: BDAG
  rationale: 본 번역의 ταπεινόομαι 기본 옮김. 수동·중간태의 형식과 외적 형편의 강제성을 「낮추어지는」으로 보존한다. 「겸손해지는」은 마음의 태도로 좁혀지므로 본문 맥락에 맞지 않는다.
- source_word: περισσεύειν
  english_pob_choice: to abound
  chosen_korean: 풍성히 가지는
  alternatives_korean:
  - 넘치는
  - 풍족한
  - 부유한
  lexicon: BDAG
  rationale: 본 번역의 περισσεύω 기본 옮김. 단순 「부유함」을 피하고 「풍성히 가짐」의 폭(물질·은혜·기쁨 등)을 보존한다.
- source_word: ἐν παντὶ καὶ ἐν πᾶσιν
  english_pob_choice: In every circumstance and in all things
  chosen_korean: 어떠한 일에든지, 모든 상황에서든지
  alternatives_korean:
  - 모든 것에서, 모든 일에서
  - 어떤 일에서나, 모든 처지에서나
  lexicon: BDAG
  rationale: 헬라어의 수사적 짝구를 한국어에서도 두 표현으로 살린다. 「어떠한 일」과 「모든 상황」으로 구체와 포괄을 모두 담는다.
- source_word: μεμύημαι
  english_pob_choice: I have learned the secret
  chosen_korean: 그 비결을 깨우쳤습니다
  alternatives_korean:
  - 비결을 배웠습니다
  - 비밀에 입문하였습니다
  - 그 비결을 터득했습니다
  lexicon: BDAG
  rationale: μυέω는 신비 종교 입문 어휘이나 바울은 비유적으로 사용한다. 「비결을 깨우치다」는 한국어로 자연스럽고, 완료 시제의 「터득되어 지속됨」의 함의를 담는다. 직역 「입문하다」는 각주로 보존한다.
- source_word: χορτάζεσθαι
  english_pob_choice: to be well fed
  chosen_korean: 배부름
  alternatives_korean:
  - 배불리 먹음
  - 풍족히 먹음
  lexicon: BDAG
  rationale: 다음의 「굶주림」과 직접적 대비를 만드는 「배부름」이 가장 자연스럽다.
- source_word: πεινᾶν
  english_pob_choice: to be hungry
  chosen_korean: 굶주림
  alternatives_korean:
  - 주림
  - 굶음
  lexicon: BDAG
  rationale: 「배부름」과 대비를 이루며, 가난·결핍의 무게를 「굶주림」이 잘 담는다.
- source_word: περισσεύειν / ὑστερεῖσθαι
  english_pob_choice: to abound / to be in need
  chosen_korean: 풍성히 가짐 / 궁핍
  alternatives_korean:
  - 풍족함 / 부족함
  - 넉넉함 / 결핍
  lexicon: BDAG
  rationale: 위와 어휘 일관성. 「풍성히 가짐」과 「궁핍」의 대비가 본문의 두 번째 짝을 분명히 한다.
- source_word: (전체 구조)
  english_pob_choice: 'both ... and ...'
  chosen_korean: ~과(와) ~에도, ~과(와) ~에도 익숙합니다
  alternatives_korean:
  - ~에도 ~에도 다 안다
  - ~ 또한 ~ 또한 익혔다
  lexicon: BDAG
  rationale: 헬라어의 두 짝을 한국어 명사형으로 압축해 리듬을 살리고, 「익숙합니다」로 μεμύημαι의 「체득된 상태」를 끝까지 잇는다.
