translation:
  language: es
  text: Yahvé me ha tratado conforme a mi rectitud[a]; conforme a la limpieza de mis manos[b] me ha recompensado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha recompensado». El verbo hebreo también puede significar tratar o retribuir a alguien según su conducta.
    reason: lexical_alternative
  - marker: b
    text: «La limpieza de mis manos» es un modismo hebreo para inocencia o pureza en las acciones.
    reason: cultural_note
lexical_decisions:
- source_word: יִגְמְלֵנִי
  english_pob_choice: has dealt with me
  chosen_spanish: me ha tratado
  alternatives_spanish:
  - me ha recompensado
  - me ha pagado
  - me ha dado trato
  lexicon: HALOT
  rationale: גמל puede expresar trato o retribución conforme a la conducta. «Me ha tratado» conserva el alcance amplio que el inglés POB quiso preservar, sin cerrar prematuramente el sentido solo a una recompensa positiva o a un pago estrictamente retributivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal, conforme a la política del proyecto para יהוה, evitando la sustitución por un título.
- source_word: כְּצִדְקָתִי
  english_pob_choice: according to my righteousness
  chosen_spanish: conforme a mi justicia
  alternatives_spanish:
  - según mi justicia
  - conforme a mi rectitud
  - según mi rectitud
  lexicon: HALOT
  rationale: צדקה se vierte aquí con «justicia» para conservar el valor ético y judicial del término en el contexto. «Conforme a» expresa adecuadamente la comparación o medida del prefijo כְּ.
- source_word: כְּבֹר יָדַי
  english_pob_choice: according to the cleanness of my hands
  chosen_spanish: conforme a la limpieza de mis manos
  alternatives_spanish:
  - conforme a la pureza de mis manos
  - conforme a la inocencia de mis manos
  lexicon: HALOT
  rationale: בֹּר denota limpieza o pureza; «limpieza» mantiene la imagen concreta de manos limpias y preserva el hebraísmo poético sin convertirlo directamente en una abstracción legal. «De mis manos» sigue naturalmente el constructo hebreo.
- source_word: יָשִׁיב לִי
  english_pob_choice: he has repaid me
  chosen_spanish: me ha recompensado
  alternatives_spanish:
  - me ha devuelto
  - me ha retribuido
  lexicon: HALOT
  rationale: El hiphil de שוב aquí comunica devolver o retribuir. «Me ha recompensado» encaja bien con el paralelismo y conserva la idea de retribución, sin forzar el matiz de simple devolución física.
theological_decisions:
- issue: Si el verso debe suavizarse para evitar que parezca una afirmación de mérito o de impecabilidad moral
  english_pob_reading: The verse is translated straightforwardly as David's claim that the LORD responded in accordance with his righteousness and clean conduct in the matter at hand.
  chosen_spanish_reading: El verso se traduce de forma directa como la afirmación de David de que Yahvé respondió conforme a su justicia y la limpieza de sus manos en el asunto tratado.
  alternative_spanish_readings:
  - El verso se suaviza para evitar el lenguaje de justicia personal
  - El verso se formula de modo que sugiera una inocencia absoluta o un mérito salvífico
  rationale: El hebreo usa explícitamente términos de primera persona para justicia y manos limpias. La traducción conserva ese lenguaje sin imponer una lectura doctrinal más amplia sobre perfección sin pecado o salvación por mérito. Así se preserva la tensión teológica del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto base y con la revisión más reciente marcada como sin cambios; no se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se usa «justicia» en lugar de «rectitud» por la relación más directa con el campo semántico de צִדְקָה en este contexto.
  - Se conserva el paralelismo poético con dos miembros coordinados y la repetición de «conforme a».
  - Las notas aclaratorias se anclan en el texto donde aparece el matiz lexical e idiomático.
