review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia ritual y la mayoría de las decisiones léxicas del hebreo: «carnero», «algo de su sangre», «lóbulo de la oreja», «pulgar» y «dedo gordo del pie» corresponden adecuadamente a אַיִל, מִדָּמוֹ, תְּנוּךְ אֹזֶן, בֹּהֶן יָד y בֹּהֶן רֶגֶל. Sin embargo, falla en un punto significativo con זָרַק: el hebreo describe arrojar o lanzar la sangre contra el altar, no «rociarla» en sentido suave. También conviene reflejar mejor סָבִיב como «por todos lados» / «todo alrededor» del altar.'
  spanish_quality_summary: El texto es claro y legible en español neutro y mantiene un registro digno. No obstante, «rociarás la sangre alrededor del altar» debilita la fuerza ritual del verbo y puede sugerir una aspersión ligera. Además, la nota [b] está bien orientada, pero el texto principal debería alinearse con ella; de lo contrario hay tensión entre texto y nota.
  glossary_alignment: No hay términos del glosario mayor implicados de forma conflictiva. La principal desalineación es con la decisión auditada para זָרַק («throw ... against»), que en español debe reflejarse como «arrojarás/lanzarás ... contra el altar» más que «rociarás».
  issues:
  - severity: high
    issue: «Rociarás» no preserva la fuerza de זָרַק
    rationale: La evidencia fuente y la auditoría inglesa insisten en una aplicación ritual enérgica, «throw ... against» / «dash», no una aspersión suave. «Rociar» introduce un matiz incorrecto y choca con la propia nota lexical alternativa.
  - severity: medium
    issue: «Alrededor del altar» puede sonar menos distributivo que «contra el altar por todos lados»
    rationale: סָבִיב modifica la acción sobre el altar en torno a sus lados. La construcción española más fiel en este contexto sacrificial es «contra el altar por todos lados» o «contra el altar todo alrededor».
  revised_spanish_text: Entonces sacrificarás el carnero[a], tomarás algo de su sangre y la pondrás sobre el lóbulo de la oreja derecha de Aarón, sobre el lóbulo de la oreja derecha de sus hijos, sobre el pulgar de su mano derecha y sobre el dedo gordo de su pie derecho; y arrojarás[b] la sangre contra el altar por todos lados.
  revised_footnotes:
  - marker: a
    text: O «punta de la oreja derecha de Aarón ... punta de la oreja derecha de sus hijos». El término hebreo puede designar más ampliamente el extremo de la oreja, aunque «lóbulo» es el sentido más probable en este contexto ritual.
    reason: lexical_alternative
  - marker: b
    text: O «la lanzarás contra el altar por todos lados». El verbo hebreo sugiere una aplicación ritual enérgica más que una aspersión suave.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal de la última cláusula para reflejar fielmente זָרַק y alinearlo con la auditoría inglesa y con la nota lexical. También se ajusta la frase final para expresar mejor la idea distributiva de סָבִיב alrededor de los lados del altar. El resto del versículo puede mantenerse tal como está.
