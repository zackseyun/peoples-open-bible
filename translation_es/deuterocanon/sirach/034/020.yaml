translation:
  language: es
  text: La bondad de Yahvé[a] es apropiada en tiempo de angustia, como una nube de lluvia en tiempo de sequía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «El Altísimo no se deleita en las ofrendas de los impíos, ni es aplacado por los pecados mediante una multitud de sacrificios». Los testigos hebreo y griego difieren sustancialmente en este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: נאה
  english_pob_choice: is fitting
  chosen_spanish: es apropiada
  alternatives_spanish:
  - es hermosa
  - es amable
  - es conveniente
  lexicon: HALOT
  rationale: El adjetivo expresa lo que resulta adecuado o propio en una situación; en español, «es apropiada» comunica esa idea de conveniencia sin reducirla a belleza estética.
- source_word: חסד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amor constante
  - misericordia
  - lealtad amorosa
  lexicon: HALOT
  rationale: En este contexto sapiencial, el término apunta al favor benévolo de Yahvé que socorre en la necesidad. «Bondad» es claro, natural y no fuerza una carga pactual más marcada de la que exige el contexto inmediato.
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: Proyecto POB
  rationale: La norma del proyecto pide el nombre divino explícito como «Yahvé». Esto preserva la referencia directa al nombre del pacto y evita el sustituto litúrgico en mayúsculas.
- source_word: בזמן מצוקה
  english_pob_choice: in a time of distress
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en tiempo de aflicción
  - en un tiempo de trouble
  lexicon: HALOT
  rationale: «Angustia» transmite bien la presión o aflicción intensa del hebreo y suena natural en español bíblico contemporáneo.
- source_word: כעב חזיזים
  english_pob_choice: like a rain cloud
  chosen_spanish: como una nube de lluvia
  alternatives_spanish:
  - como una nube tormentosa
  - como una nube de lluvia
  lexicon: HALOT
  rationale: La imagen es de una nube portadora de lluvia que alivia la sequedad. «Nube de lluvia» conserva el efecto vivificante y evita sobrecargarla con la idea de tormenta, que el texto no exige.
- source_word: בעת בצרת
  english_pob_choice: in a time of drought
  chosen_spanish: en tiempo de sequía
  alternatives_spanish:
  - en tiempo de escasez
  - en tiempo de aridez
  lexicon: HALOT
  rationale: El hebreo describe condiciones secas y estériles; «sequía» es la equivalencia española más clara y idiomática para esa imagen agrícola.
theological_decisions:
- issue: Elección entre el hebreo conservado y el paralelo griego muy distinto
  english_pob_reading: Translate the extant Hebrew as the main text while preserving the Greek's substantially different reading in a footnote.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y señalar en nota el testimonio griego, que presenta una lectura sustancialmente distinta.
  alternative_spanish_readings:
  - El Altísimo no se complace en las ofrendas de los impíos, ni es aplacado por una multitud de sacrificios por los pecados.
  - El Altísimo no se agrada de las ofrendas de los malvados, ni expía los pecados por una gran cantidad de sacrificios.
  rationale: Dado que en Sirácida el proyecto traduce del hebreo cuando éste está preservado, el texto principal debe seguir el testimonio hebreo de alta confianza. Sin embargo, el griego ofrece una tradición textual muy diferente y debe quedar visible para no borrar la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir «nube de lluvia» en lugar de una formulación más fuerte como «nube de tormenta», porque la imagen apunta a lluvia que alivia la sequía. También se integró la decisión del proyecto de usar «Yahvé» en lugar de un sustituto reverencial.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin calcos innecesarios.
  - «Angustia» y «sequía» conservan el paralelismo de necesidad y alivio.
  - La nota textual preserva explícitamente la lectura griega alternativa sin desplazar el hebreo principal.
