translation:
  text: For so great an organization[a], lacking no knowledge, must not be overlooked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for such a great system/body, being ignorant of nothing, must not be overlooked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... παροραθήσεσθαι
  chosen: must not be disregarded
  alternatives:
  - must not be overlooked
  - must not be ignored
  lexicon: LSJ
  rationale: παροράω commonly means to overlook, disregard, or ignore. In English, rendering the passive as 'be disregarded' avoids awkward repetition with the participle ἠγνοηκός and fits the rhetorical force of the clause.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: LSJ
  rationale: γάρ gives explanatory support to the preceding statement; 'for' preserves that connective force straightforwardly.
- source_word: οὕτω
  chosen: so great
  alternatives:
  - thus great
  - so considerable
  lexicon: LSJ
  rationale: 'Although οὕτω is literally ''thus/so,'' in combination with τηλικοῦτο it intensifies the magnitude: ''so great'' is natural English and preserves the emphasis.'
- source_word: τηλικοῦτο
  chosen: so great
  alternatives:
  - so large
  - so important
  lexicon: LSJ
  rationale: τηλικοῦτος denotes greatness in degree or magnitude. 'So great' best captures the elevated rhetorical register without over-specifying size or importance.
- source_word: σύστημα
  chosen: organization
  alternatives:
  - body
  - system
  - arrangement
  lexicon: LSJ
  rationale: σύστημα can denote a body formed together, an organized whole, or a system. In this context of an established civic/administrative structure, 'organization' communicates a coordinated entity more clearly than the more abstract 'system'.
- source_word: μηδὲν ἠγνοηκός
  chosen: having overlooked nothing
  alternatives:
  - being ignorant of nothing
  - having neglected nothing
  lexicon: LSJ
  rationale: The perfect participle of ἀγνοέω literally means 'having been ignorant of nothing,' but idiomatic English in context points to careful omission of nothing. 'Having overlooked nothing' conveys comprehensive attentiveness, though the underlying sense of lacking no awareness is retained.
