translation:
  language: es
  text: Y en toda ciudad de Judá hizo lugares altos para quemar incienso a otros dioses[a], y provocó a Yahvé, el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en toda ciudad y ciudad de Judá'', una expresión distributiva que significa ''por todas las ciudades de Judá''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל עִיר וָעִיר לִיהוּדָה
  english_pob_choice: And in every city of Judah
  chosen_spanish: Y en toda ciudad de Judá
  alternatives_spanish:
  - Y en cada ciudad de Judá
  - Y en toda una y otra ciudad de Judá
  lexicon: HALOT
  rationale: El hebreo usa una expresión distributiva que enfatiza la totalidad de las ciudades de Judá. En español, 'en toda ciudad de Judá' comunica esa extensión sin sonar forzado; conserva la idea distributiva sin repetir mecánicamente 'ciudad y ciudad'.
- source_word: עָשָׂה בָמוֹת
  english_pob_choice: he made high places
  chosen_spanish: hizo lugares altos
  alternatives_spanish:
  - levantó lugares altos
  - estableció lugares altos
  lexicon: HALOT
  rationale: '''Hizo'' sigue de cerca el verbo amplio עשה, y ''lugares altos'' es la equivalencia usual y precisa de בָמוֹת para estos sitios de culto. ''Levantó'' o ''estableció'' interpretan más de lo que el hebreo exige.'
- source_word: לְקַטֵּר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer humear incienso
  lexicon: HALOT
  rationale: '''Quemar incienso'' es la forma natural y fiel en español para el piel de קטר en este contexto cultual. Mantiene el sentido ritual sin añadir explicaciones.'
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - para otros dioses
  - a dioses extranjeros
  lexicon: HALOT
  rationale: '''Otros dioses'' reproduce de manera directa la oposición del hebreo a Yahvé. ''Extranjeros'' sería una interpretación posible, pero no está explícita en אֲחֵרִים.'
- source_word: וַיַּכְעֵס
  english_pob_choice: and he provoked
  chosen_spanish: y provocó
  alternatives_spanish:
  - y le provocó enojo
  - y lo irritó
  lexicon: HALOT
  rationale: El verbo hiphil expresa provocar a ira. En español, 'provocó' conserva esa fuerza y evita una perífrasis innecesaria, especialmente con el objeto explícito que sigue.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: ''Yahvé''. Es la forma establecida en el español del POB y preserva el nombre divino sin sustituirlo por un título.'
- source_word: אֱלֹהֵי אֲבֹתָיו
  english_pob_choice: the God of his fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: '''El Dios de sus padres'' conserva la fórmula bíblica y su resonancia de pacto. ''Antepasados'' sería más explícito para lectores modernos, pero suaviza la expresión tradicional del hebreo.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre personal de Dios. La traducción española sigue la convención POB para hacer visible el Tetragrámaton y no ocultarlo tras 'SEÑOR' u otra sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre 'otros dioses' y Yahvé
  english_pob_reading: to other gods ... and he provoked Yahweh
  chosen_spanish_reading: a otros dioses ... y provocó a Yahvé
  alternative_spanish_readings:
  - para otros dioses ... y provocó a Yahvé
  rationale: La estructura del versículo contrapone la actividad idólatra con la provocación contra Yahvé. 'A otros dioses' mantiene la acusación concreta del texto sin diluirla en una formulación más genérica.
  doctrine_reference: Deuteronomio 32:16-21; 2 Reyes 17:11
translation_notes:
  revision_awareness: 'El contexto auditado en inglés muestra una revisión que eliminó la repetición artificial ''city and city'' en favor de una redacción más natural, sin alterar el sentido distributivo. La versión española sigue esa decisión: conserva la totalidad enfática del hebreo, pero la expresa de modo idiomático con ''en toda ciudad de Judá''.'
  spanish_consistency_notes:
  - Se ha mantenido 'Yahvé' de manera consistente como equivalente del Tetragrámaton.
  - '''Dios'' se conserva para אֱלֹהִים en la expresión ''el Dios de sus padres'', siguiendo la fórmula bíblica.'
  - '''Lugares altos'' se usa como término técnico cultual, no como referencia geográfica.'
  - La nota [a] explica la lectura distributiva del hebreo sin sobrecargar el texto principal.
