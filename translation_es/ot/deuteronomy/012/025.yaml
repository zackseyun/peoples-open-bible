translation:
  language: es
  text: No lo comerás[a], para que te vaya bien a ti y a tus hijos después de ti, porque harás lo que es recto a los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus hijos varones después de ti» o, en sentido más amplio, «tu descendencia después de ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּאכְלֶנּוּ
  english_pob_choice: eat it
  chosen_spanish: lo comerás
  alternatives_spanish:
  - lo consumirás
  - lo comerás de ello
  lexicon: HALOT
  rationale: אָכַל expresa comer/consumir. En español, «lo comerás» mantiene el objeto directo prohibido de forma natural y breve, sin suavizar la fuerza del mandato negativo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Introduce finalidad o resultado. «Para que» es la equivalencia más natural en español y conserva la relación causal-final del hebreo.
- source_word: יִיטַב לְךָ
  english_pob_choice: it may go well with you
  chosen_spanish: te vaya bien
  alternatives_spanish:
  - te vaya bien a ti
  - te sea bien
  lexicon: HALOT
  rationale: El hebreo expresa una fórmula de bienestar pactal. «Te vaya bien» preserva el sentido idiomático en español sin reducirlo solo a prosperidad material.
- source_word: וּלְבָנֶיךָ אַחֲרֶיךָ
  english_pob_choice: and with your children after you
  chosen_spanish: y a tus hijos después de ti
  alternatives_spanish:
  - y a tus hijos después de ti
  - y a tu descendencia después de ti
  lexicon: HALOT
  rationale: בנים puede ser «hijos» en sentido familiar o «descendientes» en sentido más amplio. Aquí se conserva el lenguaje familiar del texto y la referencia generacional con una formulación clara en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón que sustenta la promesa de bienestar. «Porque» hace explícita la relación lógica en español.
- source_word: תַעֲשֶׂה
  english_pob_choice: you will do
  chosen_spanish: harás
  alternatives_spanish:
  - harás lo recto
  - obrarás
  lexicon: HALOT
  rationale: El imperfecto comunica una acción esperada en el marco de la obediencia. «Harás» preserva la referencia futura/condicional del hebreo.
- source_word: הַיָּשָׁר
  english_pob_choice: what is right
  chosen_spanish: lo que es recto
  alternatives_spanish:
  - lo recto
  - lo justo
  lexicon: HALOT
  rationale: יָשָׁר significa recto/upright. «Lo que es recto» conserva mejor el valor ético literal que una paráfrasis más amplia.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de evaluación divina. «Ante los ojos de Yahvé» mantiene la imagen idiomática y la valoración personal de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, siguiendo la práctica POB de no sustituirlo por un título genérico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El versículo usa el Tetragrámaton directamente. Se traduce como nombre propio divino, no como título, para conservar la identificación del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de בָנֶיךָ
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - descendencia
  - hijos varones
  rationale: La forma hebrea es masculina plural, pero aquí el contexto de bendición/pacto apunta a la posteridad. «Hijos» conserva el lenguaje familiar inmediato sin restringir indebidamente a varones ni ampliar demasiado la idea.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó estable con acuerdo alto y solo observaciones menores. Se corrige el anclaje de nota para que el marcador [a] aparezca exactamente en el texto español y no haya notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se conserva el modismo evaluativo «ante los ojos de Yahvé» para reflejar בְּעֵינֵי.
  - «Lo que es recto» mantiene la ética deuteronómica sin recurrir a una glosa excesiva.
  - La nota [a] está anclada en «hijos» y ofrece la alternativa generacional documentada por el POB inglés.
