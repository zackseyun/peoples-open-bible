  from: whose lawless deeds were forgiven, and whose sins were covered
  to: whose lawless deeds are forgiven, and whose sins are covered
  rationale: 'The Greek aorists (ἀφέθησαν, ἐπεκαλύφθησαν) here translate Hebrew passive participles from Psalm 32:1, denoting a present state of blessedness resulting from a completed action. Rendering them as simple past (''were forgiven'') in English obscures this gnomic/stative force, making it sound like a historical narrative rather than a general pronouncement of blessing. | Adjudicator: The reviewer is correct. The aorist passive verbs here (ἀφέθησαν, ἐπεκαλύφθησαν) in this beatitude (quoting Psalm 32:1) express a gnomic reality or a present state resulting from a completed action. T'
