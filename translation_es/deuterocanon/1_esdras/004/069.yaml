review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: Darío se levanta, besa a Zorobabel, escribe cartas a varias autoridades y ordena que lo encaminen con sus acompañantes para subir a construir Jerusalén. Sin embargo, la nota [a] está anclada a «lo besó», pero su contenido corresponde a προπέμψωσιν, no a κατεφίλησεν. Además, «le escribió cartas para» suena menos natural y algo ambiguo en español frente a la idea de escribir cartas dirigidas a autoridades en favor de él.'
  spanish_quality_summary: El español es claro y ampliamente legible, pero requiere un ajuste menor de naturalidad y de colocación de nota. «Le escribió cartas para todos...» conviene cambiarlo por «escribió cartas en favor de él a todos...» o formulación equivalente. «Lo enviaran en su camino» es comprensible, pero «lo encaminaran» o «lo ayudaran en su viaje» suena más idiomático y preserva la amplitud semántica; con nota se puede mantener la alternativa. También conviene mantener la nota [b] en «administradores» si se desea explicar «mayordomos».
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Las decisiones léxicas principales están bien alineadas con el rastro POB: «cartas», «gobernantes locales», «generales», «sátrapas», «subían», «construir». «Administradores» para οἰκονόμους es aceptable con nota. El problema principal es técnico-semántico: la nota de προπέμψωσιν debe ir en el verbo correspondiente en español, no en «lo besó».'
  issues:
  - severity: high
    issue: La nota [a] está colocada en la palabra equivocada.
    rationale: El contenido de la nota explica προπέμψωσιν («enviarlo adelante con apoyo/escortarlo/proveer para su viaje»), pero el ancla actual está en «lo besó», que traduce κατεφίλησεν. Esto falsea la relación entre texto y nota.
  - severity: medium
    issue: «Le escribió cartas para todos...» es poco natural y puede sonar como propósito en vez de destinatario.
    rationale: 'El griego expresa que escribió cartas para él, dirigidas a todas esas autoridades. En español conviene explicitar mejor la relación: «escribió cartas en favor de él a...» o similar.'
  - severity: low
    issue: «Lo enviaran en su camino» es entendible, pero no es la opción más idiomática.
    rationale: Para προπέμψωσιν, «lo encaminaran» suena más natural en español y sigue permitiendo la nota con alternativas como escoltarlo o proveer para su viaje.
  revised_spanish_text: Entonces el rey Darío se levantó y lo besó, y escribió cartas en favor de él a todos los administradores[a], los gobernantes locales, los generales y los sátrapas, para que lo encaminaran[b], junto con todos los que estaban con él y subían a construir Jerusalén.
  revised_footnotes:
  - marker: a
    text: O «mayordomos»; el griego puede referirse literalmente a administradores de casa o, en este contexto, a funcionarios administrativos.
    reason: lexical_alternative
  - marker: b
    text: O «lo escoltaran» o «proveyeran para su viaje»; el verbo griego puede implicar enviarlo adelante con apoyo.
    reason: lexical_alternative
  revision_rationale: Se corrigió la colocación de la nota léxica para que explique el verbo correspondiente a προπέμψωσιν, no «lo besó». También se mejoró la naturalidad y precisión de «escribió cartas en favor de él a...» y se sustituyó «lo enviaran en su camino» por «lo encaminaran», que preserva mejor el sentido en español con apoyo de la nota.
