revisions:
- from: Y acontecerá que, cuando entréis en la tierra que Yahvé os dará, conforme a lo que él ha prometido[a], guardaréis este servicio[b].
  to: Y cuando entren en la tierra que Yahvé les dará, tal como él ha prometido[a], guardarán este servicio[b].
  rationale: Se ajusta el texto al español neutral latinoamericano reemplazando formas peninsulares por «entren / les dará / guardarán». Se simplifica la fórmula inicial a «Y cuando» para evitar rigidez innecesaria, en línea con la decisión inglesa «And when». Se conserva «Yahvé» y «servicio» por fidelidad léxica y teológica. La nota [a] se mantiene pero se formula y ancla mejor al segmento completo que traduce כַּאֲשֶׁר דִּבֵּר.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:11:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: entrada futura en la tierra, don de Yahvé, referencia a su palabra/promesa previa, y mandato de guardar la práctica pascual. También preserva correctamente Yahvé para יְהוָה. Sin embargo, hay un problema de registro y naturalidad importante: mezcla voseo peninsular plural («entréis», «os dará», «guardaréis») con la meta declarada de español neutral latinoamericano. Además, la nota [a] está anclada en «ha prometido», pero la alternativa ofrecida («tal como él habló») corresponde al segmento completo כַּאֲשֶׁר דִּבֵּר, por lo que conviene reanclarla a toda la frase.'
  spanish_quality_summary: La redacción es comprensible y bastante fiel, pero «Y acontecerá que, cuando…» suena más rígido de lo necesario, y el uso de «entréis / os dará / guardaréis» no encaja con el estilo meta solicitado. «Entren / les dará / guardarán» mejora legibilidad panhispánica eclesial. «Este servicio» es aceptable en contexto cultual, aunque en español puede sonar algo amplio; la nota alternativa ayuda.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה → «Yahvé», הָאָרֶץ → «la tierra», וּשְׁמַרְתֶּם → «guardarán», הָעֲבֹדָה הַזֹּאת → «este servicio». La principal desviación no es léxica sino dialectal/estilística. También conviene que la nota lexical sobre כַּאֲשֶׁר דִּבֵּר corresponda mejor a la frase española revisada.'
  issues:
  - severity: medium
    issue: Uso de formas peninsulares de segunda persona plural
    rationale: «entréis», «os dará», «guardaréis» contradicen la meta de español neutral latinoamericano / ampliamente legible en iglesias.
  - severity: low
    issue: Apertura formulística algo rígida
    rationale: «Y acontecerá que, cuando» reproduce de forma pesada una fórmula hebrea que puede expresarse naturalmente como «Y cuando» sin pérdida de sentido.
  - severity: low
    issue: Anclaje de la nota [a] mejorable
    rationale: La alternativa literal afecta a toda la frase «tal como él dijo/habló», no solo al verbo «ha prometido».
  revised_spanish_text: Y cuando entren en la tierra que Yahvé les dará, tal como él ha prometido[a], guardarán este servicio[b].
  revised_footnotes:
