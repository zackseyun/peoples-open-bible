- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the repeated divine titles
  chosen_reading: A heightened oath-like invocation addressed to Israel and before God, preserved by repeating the full title sequence twice.
  alternative_readings:
  - A simple appositional title compressed into a single phrase
  rationale: The Hebrew repeats the sequence for solemn emphasis. Preserving the repetition maintains the rhetorical and theological weight without over-interpreting the exact nuance of the oath formula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense and theological tension'
