    text: Or 'people.' The Hebrew גּוֹי is a collective term for a people-group or nation.
    reason: lexical_alternative
  - marker: b
    text: '''Had not come near her'' is a Hebrew idiom implying that Abimelech had not had sexual relations with Sarah.'
    reason: cultural_note
