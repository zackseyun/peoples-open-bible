translation:
  language: es
  text: Y alzaron la vista desde lejos[a], y no lo reconocieron. Entonces alzaron su voz y lloraron, y cada uno rasgó su manto y arrojó polvo sobre su cabeza hacia los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde lejos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hacia los cielos», es decir, hacia arriba en un gesto de duelo.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׂא֨וּ אֶת עֵינֵיהֶם
  english_pob_choice: they lifted up their eyes
  chosen_spanish: alzaron sus ojos
  alternatives_spanish:
  - levantaron sus ojos
  - alzaron la vista
  lexicon: HALOT
  rationale: Conserva el giro hebreo de elevar los ojos, pero en español resulta más natural decir «alzar los ojos» que calcar literalmente la estructura inglesa. «Alzaron su vista» sería comprensible, pero pierde un poco el paralelismo corporal del hebreo.
- source_word: מֵרָחוֹק
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde una distancia
  lexicon: HALOT
  rationale: «Desde lejos» expresa bien la separación espacial en español natural y mantiene el valor adverbial del hebreo sin volverlo más técnico de lo necesario.
- source_word: הִכִּירֻהוּ
  english_pob_choice: they did not recognize him
  chosen_spanish: no lo reconocieron
  alternatives_spanish:
  - no lo conocieron
  - no lo identificaron
  lexicon: HALOT
  rationale: «Reconocer» es la opción más precisa para el contexto visual de Job cambiado por el sufrimiento. «Conocer» sería demasiado amplio, y «identificar» suena demasiado moderno y administrativo.
- source_word: וַיִּשְׂאוּ קוֹלָם
  english_pob_choice: they raised their voices
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron la voz
  - alzaron sus voces
  lexicon: HALOT
  rationale: Sigue el modismo hebreo de elevar la voz en lamento. Uso el singular distributivo «su voz» porque el hebreo y el español fluido permiten esa forma colectiva sin perder la fuerza del plural.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - se pusieron a llorar
  - sollozaron
  lexicon: HALOT
  rationale: «Lloraron» es el equivalente más directo y sobrio para el duelo. «Sollozaron» intensifica más de lo que el hebreo exige.
- source_word: וַיִּקְרְעוּ אִישׁ מְעִל֔וֹ
  english_pob_choice: each man tore his robe
  chosen_spanish: cada uno rasgó su manto
  alternatives_spanish:
  - cada hombre rasgó su ropa
  - cada uno rasgó su vestido
  lexicon: HALOT
  rationale: «Cada uno» refleja el distributivo אִישׁ. «Manto» conserva el sentido de la prenda exterior y evita una expansión genérica como «ropa», que diluiría el término específico.
- source_word: וַיִּזְרְקוּ עָפָר עַל רָאשֵׁיהֶם
  english_pob_choice: threw dust over their heads
  chosen_spanish: arrojaron polvo sobre su cabeza
  alternatives_spanish:
  - echaron polvo sobre sus cabezas
  - lanzaron polvo sobre la cabeza
  lexicon: HALOT
  rationale: Se mantiene el gesto de duelo, pero se ajusta al singular distributivo que el hebreo usa con cada hombre. «Polvo» corresponde a עָפָר con el mismo valor básico, y «sobre su cabeza» conserva la construcción singular requerida por la revisión del texto inglés.
- source_word: הַשָּׁמָיְמָה
  english_pob_choice: toward the heavens
  chosen_spanish: hacia los cielos
  alternatives_spanish:
  - hacia el cielo
  - hacia arriba
  lexicon: HALOT
  rationale: «Cielos» reproduce mejor el plural hebreo de שָׁמַיִם que «cielo» en singular. «Hacia los cielos» conserva tanto la dirección ascendente como el registro reverente del gesto de duelo.
theological_decisions:
- issue: Gesto de duelo expresado con orientación vertical final
  english_pob_reading: toward the heavens, that is, upward in a gesture of mourning
  chosen_spanish_reading: hacia los cielos
  alternative_spanish_readings:
  - hacia el cielo
  - hacia arriba
  rationale: El hebreo termina con una indicación direccional ascendente. Mantengo la referencia a los cielos para no aplanar el hebraísmo ni convertirlo en una simple indicación espacial genérica; el sentido cultural del duelo queda implícito en el contexto narrativo.
  doctrine_reference: Narrativa histórica sapiencial; no implica una doctrina específica, sino una práctica cultural de lamento.
translation_notes:
  revision_awareness: 'La redacción refleja la revisión del texto inglés más reciente: se respeta el distributivo singular en «cada uno rasgó su manto» / «sobre su cabeza» y se evita pluralizar indebidamente el gesto final. No se introducen lecturas alternativas que el paquete fuente no respalde.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; este versículo no lo contiene.
  - Se mantiene un registro bíblico sobrio y actual, evitando arcaísmos innecesarios.
  - «Manto» se conserva como término específico para מְעִיל, coherente con el estilo POB de precisión léxica.
  - La elección de «cielos» respeta la pluralidad de שָׁמַיִם y evita homogeneizarla en un singular genérico.
