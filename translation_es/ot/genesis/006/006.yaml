  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'En su corazón' suena idiomático, y la estructura de la oración fluye bien. No obstante, la combinación 'se entristeció ... y se dolió' funciona, pero puede afinarse para preservar mejor la distinción semántica entre los dos verbos sin rebajar el primero a mera tristeza. 'Sintió pesar' en la primera cola y 'se dolió en su corazón' en la segunda da mejor contraste y mayor fuerza.
