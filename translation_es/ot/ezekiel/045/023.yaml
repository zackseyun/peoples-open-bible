translation:
  language: es
  text: Durante los siete días de la fiesta[a], ofrecerá como holocausto a Yahvé siete toros y siete carneros sin defecto cada día, durante los siete días, y como sacrificio por el pecado[b] un macho cabrío cada día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festival» por «fiesta».
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda de purificación» por «sacrificio por el pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָג
  english_pob_choice: the feast
  chosen_spanish: la fiesta
  alternatives_spanish:
  - el festival
  - la fiesta solemne
  lexicon: HALOT
  rationale: חַג designa una fiesta peregrina o celebración cultual. En español, «fiesta» comunica bien el sentido religioso y queda natural en este contexto; «festival» suena más moderno pero menos bíblico, y «fiesta solemne» añade formalidad no explícita en el hebreo.
- source_word: יַעֲשֶׂה
  english_pob_choice: offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - presentará
  lexicon: HALOT
  rationale: Aunque el verbo base significa ‘hacer’, en contexto sacrificial se entiende la acción de presentar una ofrenda. «Ofrecerá» conserva ese valor cultual sin forzar una paráfrasis excesiva.
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, «holocausto» es el término tradicional y exacto para la ofrenda totalmente quemada. «Ofrenda quemada» sería más descriptivo, pero menos idiomático.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la norma del proyecto. La preposición «a» expresa bien la orientación/dedicación de la ofrenda en español.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: פָּרִים se refiere a bovinos machos destinados al sacrificio. «Toros» es claro y natural en español; «novillos» podría sugerir edad, y «bueyes» desdibuja el matiz sacrificial.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - ramos
  - machos de oveja
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español normal para rams. Es preciso y comprensible para lectores de iglesia.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - sin imperfección
  lexicon: HALOT
  rationale: La cualificación cultual de animales aptos se expresa de manera natural como «sin defecto». Mantiene la fuerza técnica sin sonar arcaico.
- source_word: לַיּוֹם
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - por día
  - día tras día
  lexicon: HALOT
  rationale: El hebreo tiene un valor distributivo. «Cada día» transmite con claridad la repetición diaria exigida en la ofrenda.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: sacrificio por el pecado
  alternatives_spanish:
  - ofrenda por el pecado
  - ofrenda de purificación
  lexicon: HALOT
  rationale: Se evita imponer automáticamente la terminología tradicional si el español puede mostrar mejor la función del rito. «Sacrificio por el pecado» conserva el vínculo con el término hebreo y sigue siendo inteligible; «ofrenda de purificación» es posible, pero más interpretativa.
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un macho de las cabras
  - un cabrío
  lexicon: HALOT
  rationale: La expresión hebrea indica un macho de cabra. «Macho cabrío» es la opción española más clara y directa para este animal sacrificial.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal del POB de no enmascarar el Tetragrámaton. «Yahvé» preserva el nombre del pacto y evita la convención litúrgica de sustituirlo por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: El hebreo puede referirse al sacrificio relacionado con el pecado o con la purificación ritual. En español, «sacrificio por el pecado» conserva la referencia al acto expiatorio sin cerrar indebidamente la ambigüedad de fondo.
  doctrine_reference: Levítico 4; Levítico 16
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail en cuanto a la acción sacrificial: se tradujo יַעֲשֶׂה con un verbo de ofrenda («ofrecerá») y se evitó ampliar innecesariamente el singular del macho cabrío. También se mantuvo la decisión doctrinal del POB de traducir el nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - Se conservó el nombre divino «Yahvé» conforme al estándar del proyecto.
  - 'Se usó lenguaje sacrificial técnico pero natural en español: «holocausto», «sacrificio por el pecado», «sin defecto».'
  - 'Se mantuvo el paralelismo numérico del hebreo: siete días, siete toros, siete carneros, cada día.'
  - No se introdujeron notas al pie porque el texto español no requería ambigüedades adicionales ancladas en el versículo.
