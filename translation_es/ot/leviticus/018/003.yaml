translation:
  language: es
  text: No hagan conforme a las obras de la tierra de Egipto[a], en la cual vivieron; ni hagan conforme a las obras de la tierra de Canaán, adonde yo los llevo; y no anden en sus estatutos[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: O 'conforme a las prácticas de la tierra de Egipto ... y conforme a las prácticas de la tierra de Canaán'. El hebreo usa un giro idiomático que literalmente habla de las 'obras' o 'hechos' de la tierra.
    reason: lexical_alternative
  - marker: b
    text: O 'no sigan sus costumbres/ordenanzas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַעֲשֵׂה
  english_pob_choice: according to the deeds of
  chosen_spanish: conforme a las obras de
  alternatives_spanish:
  - según las obras de
  - como las obras de
  - conforme al obrar de
  lexicon: HALOT
  rationale: La construcción hebrea compara la conducta con un patrón de obrar. En español, 'conforme a las obras de' conserva esa relación normativa/comparativa sin perder la concreción de 'obras' o 'hechos'.
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el país de Egipto
  lexicon: HALOT
  rationale: '''Tierra'' refleja bien el sustantivo הארץ/אֶרֶץ en este contexto y mantiene la formulación bíblica sin volverla artificial.'
- source_word: יְשַׁבְתֶּם בָּהּ
  english_pob_choice: in which you lived
  chosen_spanish: en la cual habitasteis
  alternatives_spanish:
  - donde vivisteis
  - en la que residisteis
  lexicon: HALOT
  rationale: '''Habitasteis'' conserva el matiz de residencia estable y suena natural en un registro bíblico sobrio. El relativo ''en la cual'' preserva la referencia precisa a Egipto.'
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall not do
  chosen_spanish: No hagan
  alternatives_spanish:
  - No haréis
  - No deberán hacer
  - No deben hacer
  lexicon: HALOT
  rationale: En español legal-bíblico, el mandato negativo directo en segunda persona plural transmite bien la prohibición. Se evita una perífrasis más pesada, pero se mantiene el valor exhortativo-jurídico.
- source_word: וּכְמַעֲשֵׂה אֶרֶץ כְּנַעַן
  english_pob_choice: according to the deeds of the land of Canaan
  chosen_spanish: ni hagan conforme a las obras de la tierra de Canaán
  alternatives_spanish:
  - ni según las obras de la tierra de Canaán
  - ni hagan como las obras de la tierra de Canaán
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera cláusula y se explicita la segunda prohibición con 'ni'. 'Las obras de la tierra de Canaán' mantiene el eco idiomático del hebreo sin convertirlo en una paráfrasis cultural.
- source_word: אֲשֶׁר אֲנִי מֵבִיא אֶתְכֶם שָׁמָּה
  english_pob_choice: where I am bringing you
  chosen_spanish: a la cual yo los llevo
  alternatives_spanish:
  - adonde yo los llevo
  - a la cual los estoy llevando
  - a donde yo los llevo
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o inminente. 'Los llevo' comunica ese movimiento divino de manera natural en español y evita una redundancia incómoda con 'allí' o 'allá'.
- source_word: וּבְחֻקֹּתֵיהֶם
  english_pob_choice: in their statutes
  chosen_spanish: en sus estatutos
  alternatives_spanish:
  - en sus decretos
  - en sus costumbres
  - en sus ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' preserva el valor jurídico-normativo del término dentro del lenguaje legal del Pentateuco y mantiene continuidad terminológica con el contexto.'
- source_word: לֹא תֵלֵכוּ
  english_pob_choice: you shall not walk
  chosen_spanish: no anden
  alternatives_spanish:
  - no caminen
  - no sigan
  - no vivan
  lexicon: HALOT
  rationale: '''Andar'' conserva la metáfora bíblica de conducta/forma de vida y resulta comprensible para lectores contemporáneos sin perder el trasfondo figurado.'
theological_decisions:
- issue: Si traducir la frase idiomática como una referencia a las prácticas de los pueblos o mantener la literalidad del hebreo 'obras de la tierra'
  english_pob_reading: according to the deeds/practices of the land of Egypt/Canaan
  chosen_spanish_reading: conforme a las obras de la tierra de Egipto / de la tierra de Canaán
  alternative_spanish_readings:
  - según las costumbres de Egipto/Canaán
  - según el modo de vivir de Egipto/Canaán
  - conforme a las prácticas de Egipto/Canaán
  rationale: Se conserva la forma idiomática del hebreo porque el pasaje formula la prohibición en términos de 'obras' vinculadas a la tierra. La opción elegida mantiene visible la tensión entre literalidad y referencia a la conducta humana sin ocultarla con una glosa interpretativa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo renderizar חֻקֹּתֵיהֶם en un contexto legal
  english_pob_reading: their statutes
  chosen_spanish_reading: sus estatutos
  alternative_spanish_readings:
  - sus costumbres
  - sus ordenanzas
  rationale: En este contexto, 'estatutos' conserva mejor el peso normativo del término y evita reducirlo a usos sociales neutrales. Además, mantiene el contraste implícito con los estatutos divinos del capítulo.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió 'according to the deeds of' y preservó la formulación legal 'walk in their statutes'. La redacción española refleja ese desplazamiento hacia una literalidad controlada, manteniendo el paralelismo de las dos cláusulas territoriales y la metáfora de caminar para conducta.
  spanish_consistency_notes:
  - Se mantuvo 'estatutos' para חֻקֹּתֵיהֶם por coherencia con el lenguaje jurídico del Pentateuco.
  - Se usó 'la tierra de' para אֶרֶץ de acuerdo con el patrón POB y la naturalidad del español bíblico moderno.
  - Se eligió 'andar' para תֵלֵכוּ a fin de conservar la metáfora de conducta, no simplemente 'seguir'.
  - Los marcadores [a] y [b] aparecen exactamente en el texto base y corresponden a notas ancladas.
