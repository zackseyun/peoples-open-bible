review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: Yahvé dio sus sábados como señal entre él e Israel, para que supieran que él es quien los santifica. También mantiene correctamente «Yahvé» para יהוה y «santifica» para מְקַדְּשָׁם, con una nota léxica válida. Sin embargo, hay un problema claro de fidelidad idiomática en «entre yo y ellos», que no es español correcto para בֵּינִי וּבֵינֵיהֶם y no añade valor semántico por imitar la forma hebrea.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «entre yo y ellos» suena incorrecto en español y afecta la legibilidad eclesial. Además, «para que fueran una señal» funciona, pero «para que fueran señal» o «para que fueran una señal» ambas son posibles; no requiere cambio. La puntuación y el flujo general son buenos.
  glossary_alignment: 'Alineación fuerte con la terminología del proyecto: יהוה → «Yahvé» correcto; מְקַדְּשָׁם → «que los santifica» correcto; שַׁבְּתוֹתַי → «mis sábados» aceptable y bien justificado, con alternativa útil en nota. La única desviación es gramatical, no terminológica: «entre yo y ellos» debe ser «entre mí y ellos».'
  issues:
  - severity: high
    issue: Uso de «entre yo y ellos»
    rationale: La expresión española correcta después de la preposición «entre» es «entre mí y ellos». El hebreo בֵּינִי וּבֵינֵיהֶם significa simplemente «entre mí y ellos»; conservar una forma no normativa por supuesto paralelismo hebreo perjudica la naturalidad sin mejorar la fidelidad.
  - severity: low
    issue: La justificación léxica defiende una forma incorrecta
    rationale: La nota/rationale afirma que «entre yo y ellos» se eligió por cercanía al hebreo, pero esa defensa no es sostenible en español estándar ni necesaria para preservar el sentido del original.
  revised_spanish_text: También les di mis sábados[a], para que fueran una señal entre mí y ellos, para que supieran que yo soy Yahvé, que los santifica[b].
