base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/026/008.yaml
  text: Then Abishai said to David[a], “God has delivered your enemy into your hand today. So now, please let me pin him to the earth with the spear in one blow[c][b], and I will not strike him a second time.”
  footnotes:
  - marker: a
    text: Or “has handed over your enemy into your power today.”
    reason: lexical_alternative
  - marker: b
    text: Literally “with the spear and into the earth, once”; the sense is that Abishai offers to pin him to the ground with a single thrust.
    reason: lexical_alternative
  - marker: c
    text: Or 'strike him with the spear into the ground'.
    reason: previous_rendering
