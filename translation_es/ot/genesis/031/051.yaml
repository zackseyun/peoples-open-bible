    text: O «pila de piedras» para «montón». El hebreo se refiere al conjunto de piedras levantado como testigo entre Labán y Jacob.
    reason: lexical_alternative
  - marker: b
    text: O «piedra erguida» para «pilar». El término hebreo designa una piedra erigida como marcador o memorial.
    reason: lexical_alternative
  revision_rationale: Se corrigió «entre yo y tú» a «entre mí y ti» por gramática española estándar y fidelidad idiomática. Se reemplazó «estela» por «pilar» para alinearse mejor con la decisión léxica auditada del POB y evitar matices españoles no requeridos por מַצֵּבָה, conservando «piedra erguida» en nota como alternativa significativa.
