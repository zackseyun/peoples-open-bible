translation:
  language: es
  text: Y cuando quemábamos incienso a la Reina del Cielo y le derramábamos libaciones, ¿acaso lo hacíamos aparte de nuestros maridos, que le hicimos tortas para representarla[a] y le derramamos libaciones?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para hacer su imagen» o «para representarla». El hebreo probablemente alude a tortas moldeadas en semejanza de la diosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Y en cuanto
  - Porque cuando
  lexicon: HALOT
  rationale: En este contexto introduce la defensa de las mujeres como una circunstancia explicativa, no una condición hipotética. «Y cuando» conserva el valor conjuntivo y suena natural en español.
- source_word: מְקַטְּרִים
  english_pob_choice: burned incense
  chosen_spanish: quemábamos incienso
  alternatives_spanish:
  - ofrecíamos incienso
  - quemábamos una ofrenda de incienso
  lexicon: HALOT
  rationale: El verbo cultual קטר aquí se refiere al acto ritual de quemar incienso. «Quemábamos incienso» es directo, natural y mantiene el sentido ritual sin añadir más de lo que el hebreo requiere.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  english_pob_choice: to the Queen of Heaven
  chosen_spanish: a la Reina del Cielo
  alternatives_spanish:
  - a la reina de los cielos
  - a la Reina de los cielos
  lexicon: HALOT
  rationale: Se mantiene el título pagano como tal, con mayúsculas por tratarse de un apelativo cultual. «Cielo» en singular sigue bien el hebreo sin forzar una forma más idiomática pero menos fiel.
- source_word: וּלְהַסֵּךְ לָהּ נְסָכִים
  english_pob_choice: and poured out drink offerings to her
  chosen_spanish: y le derramábamos libaciones
  alternatives_spanish:
  - y le vertíamos libaciones
  - y derramábamos ofrendas líquidas para ella
  lexicon: HALOT
  rationale: נסכים son libaciones u ofrendas líquidas derramadas. «Derramábamos libaciones» preserva el valor ritual con una formulación clara y reconocible en español.
- source_word: הֲמִבַּלְעֲדֵי אֲנָשֵׁינוּ
  english_pob_choice: was it apart from our husbands
  chosen_spanish: ¿acaso lo hacíamos sin el consentimiento de nuestros maridos?
  alternatives_spanish:
  - ¿acaso lo hacíamos aparte de nuestros maridos?
  - ¿acaso lo hacíamos sin nuestros maridos?
  lexicon: HALOT
  rationale: El hebreo pregunta si actuaron «sin» o «aparte de» sus hombres/esposos. En español, «sin el consentimiento de nuestros maridos» expone la fuerza social de independencia que el contexto sugiere, pero al ser una inferencia interpretativa se deja documentada como alternativa en la nota y en las opciones.
- source_word: אֲנָשֵׁינוּ
  english_pob_choice: our husbands
  chosen_spanish: nuestros maridos
  alternatives_spanish:
  - nuestros hombres
  - nuestros esposos
  lexicon: HALOT
  rationale: En el habla de estas mujeres, «maridos» es la identificación contextual más precisa. «Esposos» es posible, pero «maridos» resulta más natural en este registro y conserva la referencia relacional.
- source_word: עָשִׂינוּ לָהּ כַּוָּנִים
  english_pob_choice: that we made cakes for her
  chosen_spanish: al hacerle tortas
  alternatives_spanish:
  - al hacerle pasteles
  - al preparar tortas para ella
  - al hacerle tortas rituales
  lexicon: HALOT
  rationale: כַּוָּנִים son tortas o panes pequeños con forma especial, aquí vinculados al culto. «Tortas» conserva la referencia concreta; el verbo subordinado «al hacerle» expresa el propósito sin sobretraducir el objeto ritual.
- source_word: לְהַעֲצִבָהּ
  english_pob_choice: to depict her
  chosen_spanish: para representarla
  alternatives_spanish:
  - para hacer su imagen
  - para representarla en imagen
  - para darle forma a su figura
  lexicon: HALOT
  rationale: El hebreo admite la idea de representar o formar una imagen/likeness. «Para representarla» mantiene la amplitud semántica y evita decidir de más entre imagen material o mera semejanza.
- source_word: וְהַסֵּךְ לָהּ נְסָכִים
  english_pob_choice: and poured out drink offerings to her
  chosen_spanish: y derramarle libaciones
  alternatives_spanish:
  - y derramarle ofrendas líquidas
  - y hacerle libaciones
  lexicon: HALOT
  rationale: Se repite el mismo gesto ritual al final del versículo; conviene una traducción consistente. El infinitivo en español se integra de forma natural dentro de la pregunta y preserva la repetición enfática del hebreo.
theological_decisions:
- issue: Título divino pagano מְלֶכֶת הַשָּׁמַיִם
  english_pob_reading: Queen of Heaven
  chosen_spanish_reading: Reina del Cielo
  alternative_spanish_readings:
  - reina de los cielos
  rationale: Se conserva el título idolátrico tal como aparece en boca de las hablantes, sin sustituirlo por un término cristiano ni atenuarlo. La forma con mayúsculas distingue que es un título cultual.
  doctrine_reference: Jeremías 7:18; 44:17-19
- issue: Sentido de הֲמִבַּלְעֲדֵי אֲנָשֵׁינוּ
  english_pob_reading: was it apart from our husbands
  chosen_spanish_reading: ¿acaso lo hacíamos sin el consentimiento de nuestros maridos?
  alternative_spanish_readings:
  - ¿acaso lo hacíamos aparte de nuestros maridos?
  - ¿acaso lo hacíamos sin nuestros maridos?
  rationale: El hebreo plantea independencia respecto de los hombres de la casa. En español, «sin el consentimiento» explicita la relación de autoridad marital implícita en la defensa, pero se reconoce que es una interpretación contextual y no la única posibilidad estricta.
  doctrine_reference: Jeremías 44:15-19; cf. 1 Corintios 11:3 en cuanto a estructuras sociales, sin imponer una lectura doctrinal al texto
- issue: Sentido de כַּוָּנִים / לְהַעֲצִבָהּ
  english_pob_reading: cakes ... to depict her
  chosen_spanish_reading: tortas ... para representarla
  alternative_spanish_readings:
  - tortas ... para hacer su imagen
  - tortas rituales ... para representarla
  rationale: El contexto puede aludir a tortas con forma de la deidad o a una representación simbólica. «Para representarla» preserva esa tensión sin fijarla indebidamente en una sola imagen material.
  doctrine_reference: Jeremías 7:18; 44:19; lexicografía de כון/עצב en contexto cultual
translation_notes:
  revision_awareness: La versión inglesa auditada no presentó cambios en su revisión más reciente; por eso el español sigue de cerca la solución aprobada, conservando «Queen of Heaven», «drink offerings» como libaciones y la ambigüedad de כַּוָּנִים / לְהַעֲצִבָהּ mediante una formulación abierta.
  spanish_consistency_notes:
  - Se mantiene «Reina del Cielo» como equivalente estable del título cultual en Jeremías.
  - «Libaciones» se usa de manera uniforme para נְסָכִים en ambas ocurrencias del versículo.
  - «Maridos» refleja el referente social de אֲנָשֵׁינוּ en la voz de las mujeres; no se sustituye por un término eclesiástico.
  - Se preserva la tensión interpretativa en el bloque de las tortas con una nota alternativa, sin fijar más de lo que el hebreo exige.
