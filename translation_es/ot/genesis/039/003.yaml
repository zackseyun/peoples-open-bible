translation:
  language: es
  text: Su amo vio que Yahvé estaba con él, y que Yahvé hacía prosperar en su mano[a] todo lo que hacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de su mano» o «bajo su dirección»; el hebreo dice literalmente «en su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - notó
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de ראה expresa percepción directa en la narración; «vio» conserva la simplicidad narrativa sin añadir matices interpretativos.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: El contexto es el de la casa de Potifar y la relación de autoridad sobre José. «Amo» comunica bien esa relación social en español y evita la ambigüedad de «señor».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton con la forma editorial de la POB en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: אִתּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba con José
  lexicon: HALOT
  rationale: La frase preposicional expresa presencia divina con José; el pronombre «él» mantiene la referencia inmediata y fluida del hebreo.
- source_word: וְכֹל אֲשֶׁר הוּא עֹשֶׂה
  english_pob_choice: everything he did
  chosen_spanish: todo lo que él hacía
  alternatives_spanish:
  - todo lo que hizo
  - todo cuanto hacía
  lexicon: HALOT
  rationale: El hebreo abarca la totalidad de sus acciones, con posible valor durativo en el contexto narrativo. «Todo lo que él hacía» preserva esa amplitud sin forzar el aspecto.
- source_word: מַצְלִיחַ
  english_pob_choice: made prosper
  chosen_spanish: hacía prosperar
  alternatives_spanish:
  - daba éxito a
  - hacía que prosperara
  lexicon: HALOT
  rationale: El causativo de צלח expresa que Yahvé es quien concede éxito. «Hacía prosperar» refleja bien la causalidad divina y suena natural en español.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - por su mano
  - bajo su dirección
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de manera literal y comprensible. «En su mano» mantiene la imagen concreta y deja abierta la posible idea de instrumentación o esfera de acción.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el tetragrámaton. La POB en español debe preservar el nombre divino con la forma editorial adoptada, no reemplazarlo por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé en español'
translation_notes:
  revision_awareness: 'El borrador sigue el ajuste revisado del audit trail: mantiene «en su mano» como traducción formal del modismo hebreo y ordena la cláusula final para reflejar mejor la secuencia del original: primero la constatación de la presencia de Yahvé y luego el efecto causal sobre todo lo que José hacía.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Amo» se usa para reflejar la relación de autoridad doméstica del contexto esclavo, en línea con la lectura inglesa auditada.
  - La nota [a] conserva la alternativa semántica documentada sin resolver en exceso el modismo hebreo.
  - 'El orden de la segunda cláusula sigue la estructura del hebreo: sujeto divino, verbo causativo, objeto total y complemento idiomático final.'
