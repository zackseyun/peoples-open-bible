translation:
  language: es
  text: Todos los utensilios del tabernáculo para todo su servicio[a], y todas sus estacas, y todas las estacas del atrio, serán de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobre»; el hebreo נְחֹשֶׁת puede referirse de manera amplia a un metal a base de cobre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי
  english_pob_choice: utensils
  chosen_spanish: utensilios
  alternatives_spanish:
  - enseres
  - objetos
  - implementos
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos o instrumentos de uso. «Utensilios» reproduce bien el valor funcional y cultual del conjunto sin reducirlo a muebles ni hacerlo demasiado técnico.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda de reunión
  lexicon: HALOT
  rationale: En este contexto cultual, «tabernáculo» es el equivalente establecido y preciso para מִשְׁכָּן. Mantiene la referencia al santuario portátil sin introducir una paráfrasis.
- source_word: בְּכֹל עֲבֹדָתוֹ
  english_pob_choice: for all its service
  chosen_spanish: para todo su servicio
  alternatives_spanish:
  - en todo su servicio
  - para todo su uso
  - para toda su labor
  lexicon: HALOT
  rationale: La preposición בְּ con עֲבֹדָה expresa el ámbito/propósito del uso. «Para todo su servicio» conserva la finalidad natural en español y mantiene la idea de uso litúrgico o funcional.
- source_word: יְתֵדֹתָיו
  english_pob_choice: its pegs
  chosen_spanish: sus clavos
  alternatives_spanish:
  - sus estacas
  - sus piquetas
  - sus clavijas
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa «pegs», el campo semántico de יָתֵד puede abarcar un clavo o estaca de fijación. En español, «clavos» es amplio y entendible, pero «estacas» también sería posible; se mantiene la idea de piezas de sujeción. Se conserva la tensión léxica sin resolverla de manera excesivamente técnica.
- source_word: יִתְדֹת הֶחָצֵר
  english_pob_choice: the pegs of the courtyard
  chosen_spanish: los clavos del atrio
  alternatives_spanish:
  - las estacas del atrio
  - los clavos del patio
  - las piquetas del atrio
  lexicon: HALOT
  rationale: חָצֵר es el recinto exterior del santuario; «atrio» es la traducción cultual tradicional y clara en español. Se mantiene la misma solución léxica para יָתֵד que en la primera mitad del versículo, evitando una alternancia injustificada.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En listas de materiales del tabernáculo, «bronce» es la opción castellana convencional y coherente con la POB inglesa. Aunque el hebreo puede abarcar cobre o aleación de cobre, la redacción española conserva esa ambigüedad en la nota.
translation_notes:
  revision_awareness: El texto base inglés no presenta cambios de revisión relevantes; se siguió la lectura aprobada con alta concordancia y se mantuvo la misma nota léxica para נְחֹשֶׁת.
  spanish_consistency_notes:
  - Se conservó «tabernáculo» como término cultual estándar para מִשְׁכָּן.
  - Se usó «atrio» para חָצֵר por claridad cultual en español.
  - Se mantuvo una única solución para יָתֵד en todo el versículo para evitar oscilación léxica.
  - La nota sobre נְחֹשֶׁת preserva la alternativa «cobre» sin imponerla en el cuerpo principal.
