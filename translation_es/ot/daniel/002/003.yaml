  glossary_alignment: No hay conflictos con la terminología del proyecto. «espíritu» preserva רוּחַ correctamente en contexto antropológico; no hay nombres divinos ni términos mesiánicos involucrados. La decisión de mantener «espíritu» en vez de «mente» sigue bien la justificación léxica documentada.
