translation:
  language: es
  text: Si lo recuerdo[a], quedo consternado[b], y el temblor se apodera de mi carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando lo recuerdo». La conjunción hebrea puede leerse de modo condicional («si») o temporal («cuando»).'
    reason: alternative_reading
  - marker: b
    text: 'O: «el horror» o «el estremecimiento» se apodera de mi carne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Y si
  lexicon: HALOT
  rationale: El hebreo אִם admite lectura condicional o temporal; el audit trail inglés decidió mantener 'If' por mayor precisión frente al hebreo. En español, 'Si' conserva esa apertura sin forzar una lectura temporal exclusiva.
- source_word: זָכַרְתִּי
  english_pob_choice: I remember
  chosen_spanish: lo recuerdo
  alternatives_spanish:
  - me acuerdo de ello
  - lo tengo presente
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí una reacción viva y recurrente. 'Lo recuerdo' mantiene el presente poético natural en español y corresponde a la elección inglesa de un presente vividificado.
- source_word: וְנִבְהָלְתִּי
  english_pob_choice: I am dismayed
  chosen_spanish: me siento consternado
  alternatives_spanish:
  - estoy dismayo
  - me siento dismayed
  - me aterro
  lexicon: HALOT
  rationale: '''בהל'' expresa ser turbado, alarmado o dismayed. ''Me siento consternado'' comunica el sobresalto interior sin elevarlo necesariamente a terror pleno, y funciona bien con el tono reflexivo del verso.'
- source_word: וְאָחַז
  english_pob_choice: seizes
  chosen_spanish: se apodera de
  alternatives_spanish:
  - agarra
  - toma posesión de
  - me aflige
  lexicon: HALOT
  rationale: '''אחז'' significa asir, agarrar, apoderarse. En español, con sujeto pospuesto (''el temblor''), ''se apodera de'' transmite con naturalidad la acción de tomar control sobre el cuerpo, equivalente al inglés ''seizes''.'
- source_word: בְּשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi ser corporal
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de בשר con 'carne', como en el texto hebreo y en la traducción inglesa. 'Cuerpo' sería más interpretativo y diluiría la imaginería física.
- source_word: פַּלָּצוּת
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - horror
  - estremecimiento
  - terror
  lexicon: HALOT
  rationale: El sustantivo puede denotar horror, shuddering o una sacudida de temor. 'Temblor' preserva el componente corporal que el inglés resolvió con 'trembling' y evita convertirlo en una abstracción emocional más fuerte de lo que el hebreo exige.
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión final inglesa, que prefirió 'If' sobre 'When' para reflejar con mayor precisión וְאִם. Se mantuvo la imagen física de 'flesh' mediante 'carne' y la reacción emocional con un término español de consternación que no borra la intensidad del hebreo.
  spanish_consistency_notes:
  - Se conserva el registro poético y sobrio.
  - '''Carne'' se usa aquí en sentido literal-corporal, no moral.'
  - La ambigüedad condicional/temporal de וְאִם queda documentada en nota sin alterar el texto principal.
