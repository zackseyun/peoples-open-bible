translation:
  language: es
  text: Y aconteció[a] cuando ya llevaba mucho tiempo allí, que Abimélec, rey de los filisteos, se asomó por la ventana y vio, y he aquí que Isaac estaba jugueteando[b] con Rebeca su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Y sucedió". La fórmula hebrea introductoria marca un nuevo giro narrativo.
    reason: alternative_reading
  - marker: b
    text: O "riendo con", "jugando con" o, en un sentido más íntimo, "acariciando". El verbo hebreo está relacionado con el nombre de Isaac y puede denotar conducta juguetona o afectuosa; aquí sugiere un comportamiento que revelaba que Rebeca era su esposa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol introduce un nuevo desarrollo en la historia; "aconteció" preserva ese arranque solemne y natural en español sin sonar arcaico.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: que, cuando
  alternatives_spanish:
  - cuando
  - al
  lexicon: HALOT
  rationale: Aquí כִּי introduce la circunstancia temporal. En español, la combinación "que, cuando" mantiene la subordinación narrativa de forma clara y fiel al hebreo.
- source_word: אָֽרְכוּ ל֥וֹ שָׁם הַיָּמִים
  english_pob_choice: he had been there a long time
  chosen_spanish: había pasado allí mucho tiempo
  alternatives_spanish:
  - se habían prolongado para él allí los días
  - había permanecido allí mucho tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala una estadía prolongada. "Había pasado allí mucho tiempo" comunica el sentido de manera natural sin perder la duración implícita.
- source_word: וַיַּשְׁקֵף
  english_pob_choice: looked out
  chosen_spanish: se asomó
  alternatives_spanish:
  - miró hacia afuera
  - se inclinó a mirar
  lexicon: HALOT
  rationale: El verbo describe mirar desde un punto elevado o desde una abertura. "Se asomó" expresa bien la acción de mirar desde la ventana con naturalidad en español.
- source_word: בְּעַד הַחַלּוֹן
  english_pob_choice: through the window
  chosen_spanish: por la ventana
  alternatives_spanish:
  - a través de la ventana
  - desde la ventana
  lexicon: HALOT
  rationale: La preposición con "ventana" admite la idea de mirar por medio de la abertura. "Por la ventana" es idiomático y conserva la escena visual.
- source_word: וַיַּרְא וְהִנֵּה
  english_pob_choice: and saw, and behold
  chosen_spanish: y vio, y he aquí
  alternatives_spanish:
  - y vio, y resulta que
  - y vio, y he aquí que
  lexicon: HALOT
  rationale: Se conserva la secuencia enfática y el giro repentino de percepción. "He aquí" mantiene la vividez narrativa que marca הִנֵּה.
- source_word: מְצַחֵק
  english_pob_choice: was laughing with
  chosen_spanish: estaba riendo
  alternatives_spanish:
  - estaba jugando con
  - estaba bromeando con
  - estaba jugueteando con
  lexicon: HALOT
  rationale: El participio de צחק puede abarcar risa, juego o comportamiento íntimo. Dado el contexto, "estaba riendo" preserva la forma más directa sin cerrar del todo la ambigüedad que el relato usa para que Abimélec infiera la relación.
- source_word: אֵת רִבְקָה אִשְׁתּוֹ
  english_pob_choice: Rebekah his wife
  chosen_spanish: con Rebeca su esposa
  alternatives_spanish:
  - a Rebeca su esposa
  - junto con Rebeca su esposa
  lexicon: HALOT
  rationale: El objeto y la relación están unidos en la frase final; en español, "con Rebeca su esposa" comunica la escena de interacción y mantiene la identificación marital.
theological_decisions:
- issue: Alcance de מְצַחֵק en la escena
  english_pob_reading: was laughing with Rebekah his wife
  chosen_spanish_reading: estaba riendo con Rebeca su esposa / estaba riendo
  alternative_spanish_readings:
  - estaba jugando con Rebeca su esposa
  - estaba acariciando a Rebeca su esposa
  rationale: El hebreo admite un campo semántico más amplio que mera risa, con posible matiz de juego o intimidad. El español principal evita imponer una lectura más fuerte que la evidencia inmediata, pero la nota conserva las alternativas interpretativas reconocidas por la tradición de traducción.
  doctrine_reference: Génesis 26:8; uso lexical de צחק en el contexto narrativo
- issue: Relación implícita entre la conducta observada y el reconocimiento de esposa
  english_pob_reading: it implies conduct that revealed Rebekah was his wife
  chosen_spanish_reading: la escena deja ver que Rebeca era su esposa
  alternative_spanish_readings:
  - la escena indicaba que Rebeca era su esposa
  - la conducta reveló que Rebeca era su esposa
  rationale: La traducción debe dejar abierta la inferencia narrativa sin explicitar más de lo que el verso dice. "Estaba riendo" junto con el contexto mantiene la implicación sin sobreinterpretar.
  doctrine_reference: Génesis 26:8; coherencia narrativa del episodio
translation_notes:
  revision_awareness: La redacción española sigue de cerca el hebreo WLC y toma en cuenta el ajuste del POB inglés que sustituyó "caressing" por "laughing with" para reflejar más directamente מְצַחֵק sin expandir indebidamente el sentido. Se conservó la ambigüedad léxica en una nota, pero el texto principal usa una formulación pública y natural en español.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se prefirió "Abimélec" como forma española habitual del nombre propio, coherente con la tradición bíblica en español y sin afectar el contenido fuente.
  - '"Esposa" se eligió por claridad y fidelidad al hebreo אִשְׁתּוֹ en un contexto marital explícito.'
