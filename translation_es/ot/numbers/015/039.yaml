base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/039.yaml
  text: And it shall be a tassel for you[a], and when you see it, you shall remember all the commandments of Yahweh and do them, and you shall not go astray after your heart and after your eyes[c][b], after which you are whoring.
  footnotes:
  - marker: a
    text: Or 'fringe.' The Hebrew term refers to the tassel-like fringe attached to the garment.
    reason: lexical_alternative
  - marker: b
    text: Or 'follow after your heart and your eyes.' The Hebrew verb suggests pursuing or ranging after them.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'after which you are whoring,' using sexual-infidelity imagery as a metaphor for covenant unfaithfulness; alternatively, 'after which you go astray.'
    reason: lexical_alternative
