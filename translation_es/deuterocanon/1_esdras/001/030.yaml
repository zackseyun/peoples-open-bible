base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/030.yaml
  text: And throughout all Judea they mourned for Josiah[a]; and Jeremiah the prophet lamented over Josiah, and the leaders together with the women kept lamenting him to this day[b]; and this was ordained to be done forever.
  footnotes:
  - marker: a
    text: Or 'this was decreed to be done continually' or 'this was established as a perpetual custom.' The Greek wording suggests a formally established ongoing practice, but the exact administrative nuance of the verb is not fully explicit.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in 2 Chronicles 35:24–25 mentions all Judah and Jerusalem mourning Josiah and Jeremiah chanting a lament for him; 1 Esdras here expands the description with leaders and women lamenting 'to this day.'
    reason: cross_reference
