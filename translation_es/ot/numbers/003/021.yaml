  text: A Gersón pertenecían el clan de los libnitas y el clan de los simeítas; estos son los clanes de los gersonitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְגֵרְשׁוֹן
  english_pob_choice: To Gershon belonged
  chosen_spanish: A Gersón pertenecían
  alternatives_spanish:
  - Para Gersón
  - De Gersón
  lexicon: HALOT
  rationale: El prefijo ל en esta lista censal expresa relación/pertenencia. En español, "A Gersón pertenecían" comunica esa asignación o pertenencia de manera natural y conserva el valor relacional del hebreo.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la tribu de
  lexicon: HALOT
  rationale: En este contexto genealógico y censal, מִשְׁפָּחָה designa una subdivisión de parentesco. Aunque "clan" es posible, "familia de" resulta más natural en español y sigue siendo fiel al grupo de linaje señalado.
- source_word: הַלִּבְנִי
  english_pob_choice: the Libnites
  chosen_spanish: los libnitas
  alternatives_spanish:
  - la familia de Libni
  - los descendientes de Libni
  lexicon: HALOT
  rationale: El gentilicio indica el grupo descendiente de Libni. "Libnitas" preserva la forma de etnónimo y permite una lectura breve y clara en español.
- source_word: וּמִשְׁפַּחַת הַשִּׁמְעִי
  english_pob_choice: and the clan of the Shimeites
  chosen_spanish: y la familia de los simeítas
  alternatives_spanish:
  - y la familia de Shimei
  - y los descendientes de Shimei
  lexicon: HALOT
  rationale: La construcción paralela requiere una traducción igualmente de parentesco. "Simeítas" conserva el gentilicio y mantiene el paralelismo con "libnitas".
- source_word: אֵלֶּה הֵם
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - estos eran
  - estos son ellos
  lexicon: HALOT
  rationale: Es una fórmula identificadora típica de listas. "Estos son" es la forma más natural en español y conserva la función clasificadora del hebreo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans of
  chosen_spanish: los clanes de
  alternatives_spanish:
  - las familias de
  lexicon: HALOT
  rationale: El plural de מִשְׁפָּחָה reitera la idea de subdivisiones de parentesco. Aquí "clanes" ayuda a mantener la correspondencia con la primera mitad del versículo y el cierre del resumen.
- source_word: הַגֵּרְשֻׁנִּי
  english_pob_choice: the Gershonites
  chosen_spanish: los gersonitas
  alternatives_spanish:
  - los descendientes de Gersón
  - la casa de Gersón
  lexicon: HALOT
  rationale: El gentilicio designa la rama levítica descendiente de Gersón. "Gersonitas" es la forma española más transparente y breve para este grupo.
translation_notes:
  revision_awareness: El contexto de revisión indica alto acuerdo y que no hubo cambios necesarios; por ello se mantiene una traducción directa y estable del registro censal sin notas textuales.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico con "familia de" para מִשְׁפַּחַת y "clanes" para el resumen plural final.
  - Se usa "Gersón/gersonitas" y "Simeítas" como formas españolas transparentes de los nombres propios y sus gentilicios.
  - Se conserva el tono de lista censal sin ampliar el contenido más allá de la evidencia del hebreo.
