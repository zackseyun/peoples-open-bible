  text: וְ/גִלַּ֣ח הַ/נָּזִ֗יר פֶּ֛תַח אֹ֥הֶל מוֹעֵ֖ד אֶת רֹ֣אשׁ נִזְר֑/וֹ וְ/לָקַ֗ח אֶת שְׂעַר֙ רֹ֣אשׁ נִזְר֔/וֹ וְ/נָתַן֙ עַל הָ/אֵ֔שׁ אֲשֶׁר תַּ֖חַת זֶ֥בַח הַ/שְּׁלָמִֽים־־־־׃
