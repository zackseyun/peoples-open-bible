revisions:
- from: Y en el cuarto día, Holofernes hizo un banquete para sus esclavos[a] solamente, y no llamó a ninguno de los que estaban al servicio[b].
  to: Y al cuarto día, Holofernes dio un banquete para sus esclavos[a] solamente, y no invitó a ninguno de los que estaban de servicio[b].
  rationale: La revisión corrige calcos poco naturales y una ambigüedad importante en la cláusula final. «Al cuarto día» y «dio un banquete» son más idiomáticos en español. «No invitó» encaja mejor con el contexto de banquete que «no llamó». «Los que estaban de servicio» conserva la idea de personas ocupadas en tareas o asistencia, sin sugerir erróneamente que fueron llamados ‘al servicio’.
  reviewer_model: gpt-5.4
