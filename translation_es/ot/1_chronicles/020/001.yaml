translation:
  language: es
  text: Y aconteció en el tiempo del giro del año[a], en el tiempo cuando los reyes salen, que Joab sacó al ejército y devastó la tierra de los amonitas; vino y sitió Rabá. Pero David permanecía en Jerusalén. Y Joab atacó a Rabá y la derribó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «en la primavera, cuando los reyes salen a la guerra». El hebreo dice más literalmente: «al giro del año, al tiempo cuando los reyes salen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשׁוּבַת הַשָּׁנָה
  english_pob_choice: the turning of the year
  chosen_spanish: el giro del año
  alternatives_spanish:
  - la vuelta del año
  - el retorno del año
  - la primavera del año
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude literalmente al cambio o retorno del ciclo anual. «El giro del año» conserva esa imagen sin convertirla de antemano en una estación concreta. «Primavera» es interpretativa y depende del contexto militar, no de la frase en sí.
- source_word: לְעֵת צֵאת הַמְּלָכִים
  english_pob_choice: at the time when kings go out
  chosen_spanish: al tiempo cuando los reyes salen
  alternatives_spanish:
  - en la primavera, cuando los reyes salen a la batalla
  - al tiempo de salir los reyes
  - al tiempo de la campaña de los reyes
  lexicon: HALOT
  rationale: Mantiene el valor idiomático y la elipsis del hebreo, sin añadir «a la batalla» en el texto principal. El sentido militar está claro por el contexto inmediato, pero el original no lo explicita aquí.
- source_word: וַיִּנְהַג
  english_pob_choice: led out
  chosen_spanish: condujo
  alternatives_spanish:
  - sacó
  - guió
  - marchó al frente de
  lexicon: HALOT
  rationale: El verbo puede tener el matiz de conducir o llevar fuera. «Condujo» funciona con naturalidad en español para el mando de una fuerza militar y conserva el acto de dirigirla.
- source_word: חֵיל הַצָּבָא
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - la fuerza militar
  - la hueste
  - la tropa
  lexicon: HALOT
  rationale: La combinación de los dos sustantivos designa la fuerza militar. «El ejército» es la forma más natural y suficiente en español, sin añadir redundancia.
- source_word: וַיַּשְׁחֵת אֶת אֶרֶץ בְּנֵי עַמּוֹן
  english_pob_choice: devastated the land of the Ammonites
  chosen_spanish: devastó la tierra de los amonitas
  alternatives_spanish:
  - destruyó la tierra de los hijos de Amón
  - asoló el país de los amonitas
  - arruinó la tierra de los amonitas
  lexicon: HALOT
  rationale: «Devastó» reproduce bien el valor de arruinar/destruir en un contexto de campaña militar. «Amonitas» es la forma española más fluida y conserva la referencia étnica.
- source_word: וַיָּצַר
  english_pob_choice: besieged
  chosen_spanish: sitió
  alternatives_spanish:
  - asedió
  - puso sitio a
  - rodeó
  lexicon: HALOT
  rationale: Es el equivalente militar directo y natural en español para la acción de poner sitio a una ciudad.
- source_word: וְדָוִיד יֹשֵׁב בִּירוּשָׁלִָם
  english_pob_choice: But David stayed in Jerusalem
  chosen_spanish: Pero David permanecía en Jerusalén
  alternatives_spanish:
  - y David estaba en Jerusalén
  - mientras David permanecía en Jerusalén
  - pero David se quedó en Jerusalén
  lexicon: HALOT
  rationale: El participio expresa estado o permanencia. «Permanecía» comunica bien la continuidad, y «Pero» conserva el contraste narrativo que el contexto sugiere entre David y Joab.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - atacó
  - venció
  lexicon: HALOT
  rationale: El verbo es amplio y puede significar golpear, atacar o derrotar. «Hirió» preserva la fuerza verbal sin especificar más de lo que el hebreo dice en esta cláusula.
- source_word: וַיֶּהֶרְסֶהָ
  english_pob_choice: tore it down
  chosen_spanish: la derribó
  alternatives_spanish:
  - la demolió
  - la destruyó
  - la echó abajo
  lexicon: HALOT
  rationale: El verbo comunica derribar o demoler. «La derribó» mantiene la imagen de desmantelar o abatir la ciudad, y evita uniformar la acción con el verbo anterior de devastación.
- source_word: רַבָּה
  english_pob_choice: Rabbah
  chosen_spanish: Rabá
  alternatives_spanish:
  - Rabbá
  - Rabba
  lexicon: HALOT
  rationale: Se translitera el topónimo con la ortografía española habitual para nombres bíblicos, manteniendo la identificación del lugar.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el rastro auditado en inglés POB: conserva la locución temporal literal, mantiene la secuencia narrativa de campaña militar y distingue entre devastar la tierra, sitiar la ciudad, herirla y derribarla. No se introdujeron expansiones doctrinales ni se suavizó la tensión lexical de los verbos militares.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplica en este versículo.
  - Se usó «amonitas» como etnónimo natural en español, equivalente a «sons of Ammon / Ammonites» en el contexto.
  - Se preservó la distinción entre «devastó», «sitió», «hirió» y «la derribó» para reflejar los verbos hebreos distintos.
  - La nota al pie marca la única alternativa interpretativa relevante sobre la expresión temporal.
