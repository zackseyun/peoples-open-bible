translation:
  language: es
  text: E hizo lo malo[a] ante los ojos de Yahvé, conforme a todo lo que había hecho Joacim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Lo malo’ reproduce el sentido idiomático de ‘hacer el mal’; no designa solo un estado abstracto, sino conducta moralmente reprobable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: E hizo
  alternatives_spanish:
  - Y hizo
  - Hizo
  lexicon: HALOT
  rationale: El waw-consecutivo introduce la acción narrativa; en español, ‘e hizo’ conserva la conexión discursiva sin recargar el estilo. Se mantiene el valor verbal de עשה sin calco innecesario.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  - lo perverso
  lexicon: HALOT
  rationale: La expresión hebrea עשה הרע funciona como giro idiomático de conducta moralmente mala. ‘Lo malo’ mantiene la idea idiomática y resulta natural en español bíblico contemporáneo.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en los ojos de
  - a la vista de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de evaluación o juicio desde la perspectiva de Yahvé. ‘Ante los ojos de’ es natural en español y mantiene mejor la metáfora que ‘delante de’ o una paráfrasis explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar ‘Yahvé’ como nombre divino, preservando la referencia personal del texto hebreo en lugar de sustituirla por un título.'
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - como todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La secuencia expresa correspondencia plena con el comportamiento previo de Joacim. ‘Conforme a todo lo que’ reproduce bien esa equivalencia global sin sonar artificial en español.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto español aclara la anterioridad de la conducta de Joacim respecto del sujeto implícito en el contexto narrativo. ‘Había hecho’ respeta la relación temporal sin añadir sentido ajeno.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Jehoiaquim
  - Joaquim
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional y establecida para el nombre propio, manteniendo inteligibilidad para lectores en español.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En español, ‘Yahvé’ preserva el nombre divino como nombre propio y sigue la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la línea de la traducción inglesa auditada: acción narrativa simple, idiomática moral de עשה הרע, metáfora conservada de ‘los ojos de Yahvé’, y comparación plena con lo hecho por Joacim. No se detectan revisiones textuales relevantes en el expediente inglés.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente con el criterio del proyecto para יהוה.
  - Se mantiene ‘había hecho’ para reflejar anterioridad narrativa sin forzar una construcción más pesada.
  - ‘Joacim’ sigue la convención castellana usual y evita una transliteración innecesariamente extraña.
