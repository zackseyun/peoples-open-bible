review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: juramento divino, causa del juicio, profanación del santuario, doble expresión de idolatría/abominación y la negativa de compasión. También preserva adecuadamente la nota sobre אֶגְרַע. Sin embargo, hay dos ajustes necesarios para mayor fidelidad y naturalidad: (1) חַי אָ֗נִי se expresa mejor en español como fórmula juramentada completa, «tan cierto como que yo vivo», no solo «vivo yo»; (2) «no se compadecerá mi ojo» suena poco idiomático y debilita la fórmula hebrea לֹא תָחוֹס עֵינִי, que se traduce mejor «mi ojo no perdonará» o «mi ojo no tendrá compasión».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos giros algo rígidos o poco naturales: «vivo yo» queda incompleto como fórmula solemne en español, y «no se compadecerá mi ojo» resulta extraño. Además, «te disminuiré» es comprensible pero menos idiomático que «te reduciré»; aun así, dado el rastro de auditoría del POB y la nota léxica, puede conservarse si se explica con nota. La puntuación y el registro general son buenos.'
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Yahvé», «santuario» y «abominaciones». La combinación «Señor Yahvé» es aceptable aquí para אֲדֹנָי יְהוִה conforme a la política del proyecto. No hay conflicto terminológico doctrinal serio. La distinción entre שִׁקּוּצַיִךְ y תּוֹעֲבוֹתָיִךְ se mantiene correctamente.
  issues:
  - severity: medium
    issue: La fórmula de juramento «חַי אָ֗נִי» está vertida como «vivo yo».
    rationale: Aunque literal, en español bíblico-natural la fórmula se entiende mejor como «tan cierto como que yo vivo» o «por mi vida». «Vivo yo» suena truncado y menos solemne.
  - severity: medium
    issue: «No se compadecerá mi ojo» es poco idiomático para לֹא תָחוֹס עֵינִי.
    rationale: El hebreo preserva una imagen fija de juicio; en español natural y fiel conviene «mi ojo no perdonará» o «mi ojo no tendrá compasión». La redacción actual suena forzada.
  - severity: low
    issue: «Te disminuiré» es semánticamente posible pero algo poco natural en español contemporáneo.
    rationale: La base hebrea admite ‘reducir/menguar/cortar’. «Te reduciré» sería más idiomático, pero puede mantenerse «te disminuiré» para reflejar el audit trail, siempre con nota aclaratoria.
  revised_spanish_text: Por tanto, tan cierto como que yo vivo, declara el Señor Yahvé, ciertamente porque has profanado mi santuario con todas tus cosas detestables y con todas tus abominaciones, yo también te[a] disminuiré; mi ojo no perdonará, y yo tampoco tendré piedad.
  revised_footnotes:
