translation:
  language: es
  text: 'Pero él, lleno de furiosa ira por lo que se había dicho, porque todo su plan respecto de estas cosas había sido frustrado por la providencia de Dios, habló con amenazas, redoblando la presión:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλησθεὶς βαρεῖ χόλῳ
  english_pob_choice: filled with fierce anger
  chosen_spanish: lleno de furiosa ira
  alternatives_spanish:
  - lleno de fuerte ira
  - lleno de amarga ira
  - lleno de violenta cólera
  lexicon: LSJ
  rationale: χόλος expresa ira o cólera; βαρεῖ intensifica la cualidad como pesada, grave o severa. "Furiosa ira" comunica la intensidad sin perder la fuerza afectiva del griego, y evita suavizar el matiz.
- source_word: ἐπὶ τοῖς ῥηθείσιν
  english_pob_choice: at what had been said
  chosen_spanish: por lo que se había dicho
  alternatives_spanish:
  - ante lo dicho
  - a causa de lo dicho
  - por aquellas palabras
  lexicon: LSJ
  rationale: La frase remite a la declaración anterior. En español, "por lo que se había dicho" es natural y conserva la referencia causal sin añadir interpretación extra.
- source_word: προνοίᾳ θεοῦ
  english_pob_choice: by the providence of God
  chosen_spanish: por la providencia de Dios
  alternatives_spanish:
  - por la previsión de Dios
  - mediante la providencia de Dios
  - a causa de la providencia de Dios
  lexicon: LSJ
  rationale: πρόνοια aquí tiene fuerza providencial y teológica, no solo de previsión mental. "Providencia de Dios" mantiene el contenido doctrinal explícito del texto.
- source_word: διεσκεδάσθαι
  english_pob_choice: had been frustrated
  chosen_spanish: había sido frustrado
  alternatives_spanish:
  - había sido desbaratado
  - había sido dispersado
  - había sido deshecho
  lexicon: LSJ
  rationale: El verbo literalmente sugiere dispersión o esparcimiento, pero aquí se refiere a que el plan quedó echado a perder. "Frustrado" comunica bien el sentido contextual sin borrar del todo la imagen de ruptura.
- source_word: πᾶν αὐτοῦ νόημα
  english_pob_choice: all his plan
  chosen_spanish: todo su plan
  alternatives_spanish:
  - toda su intención
  - todo su designio
  - todo su propósito
  lexicon: LSJ
  rationale: νόημα puede ser pensamiento, intención o plan. Dado el contexto narrativo, "plan" es una buena equivalencia para el esquema que él pretendía ejecutar.
- source_word: ἐντείνων
  english_pob_choice: pressing the matter hard
  chosen_spanish: apremiando el asunto
  alternatives_spanish:
  - insistiendo con fuerza
  - apretando el asunto
  - presionando con fuerza
  lexicon: LSJ
  rationale: El participio expresa tensión o insistencia enérgica. "Apremiando el asunto" suena natural en español y conserva la idea de presión verbal y urgencia.
- source_word: μετὰ ἀπειλῆς
  english_pob_choice: with threats
  chosen_spanish: con amenazas
  alternatives_spanish:
  - amenazantemente
  - con una amenaza
  - de manera amenazadora
  lexicon: LSJ
  rationale: La construcción es directa e instrumental. "Con amenazas" es la opción más clara y fiel en español contemporáneo.
- source_word: εἶπεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - replicó
  - pronunció
  lexicon: LSJ
  rationale: En este contexto la forma verbal introduce discurso con tono y modo de hablar, no solo contenido. "Habló" funciona bien con las participios previos y preserva la cadencia narrativa.
theological_decisions:
- issue: Atribución explícita a la providencia divina
  english_pob_reading: by the providence of God
  chosen_spanish_reading: por la providencia de Dios
  alternative_spanish_readings:
  - mediante la providencia de Dios
  - por la previsión de Dios
  rationale: El texto atribuye de forma explícita el fracaso del plan a la acción providencial de Dios. Se conserva esa afirmación sin neutralizarla como mera casualidad o circunstancia.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la primacía del texto original; no resolver ni suavizar la atribución divina.'
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión que afinó dos decisiones: pasó de "heavy anger" a "fierce anger" y de "purpose" a "plan". La versión española refleja esas tendencias con "furiosa ira" y "plan", manteniendo el resto de la sintaxis y las relaciones causales del original griego.'
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεοῦ según la norma del proyecto.
  - Se conserva "providencia" para πρόνοια, evitando reemplazos devocionales menos precisos.
  - '"Plan" traduce νόημα en su valor narrativo, no como simple pensamiento interno.'
  - La puntuación con dos puntos al final respeta el suspenso del verbo introductorio griego y la continuidad del discurso.
