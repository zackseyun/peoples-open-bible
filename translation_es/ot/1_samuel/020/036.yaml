translation:
  language: es
  text: 'Y dijo a su muchacho[a]: «Corre, por favor, encuentra las flechas que yo estoy lanzando». El muchacho corrió, y lanzó la flecha más allá de él[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirviente», si se toma נַעַר en sentido de asistente doméstico o ayudante.
    reason: lexical_alternative
  - marker: b
    text: O «más allá del muchacho», es decir, más allá de donde estaba el muchacho.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְנַעֲרוֹ / הַנַּעַר
  english_pob_choice: his young man / the young man
  chosen_spanish: su joven / el joven
  alternatives_spanish:
  - su muchacho / el muchacho
  - su sirviente / el sirviente
  lexicon: HALOT
  rationale: נַעַר puede referirse a un joven, asistente o sirviente. Como en el contexto narrativo se trata del ayudante de Jonatán, «joven» conserva la referencia personal sin imponer una lectura servil más fuerte de la que exige el hebreo; el poseedor se expresa de forma natural en español con «su».
- source_word: רוּץ
  english_pob_choice: Run
  chosen_spanish: Corre
  alternatives_spanish:
  - Apresúrate
  - Ve corriendo
  lexicon: HALOT
  rationale: El imperativo de רוץ pide una acción física concreta. «Corre» preserva esa concreción mejor que una paráfrasis como «apresúrate».
- source_word: מְצָא נָא
  english_pob_choice: find, please
  chosen_spanish: encuentra, por favor
  alternatives_spanish:
  - por favor, encuentra
  - ve a encontrar
  lexicon: HALOT
  rationale: מְצָא significa «encontrar» y נָא añade cortesía o urgencia moderada. «Por favor» transmite bien ese matiz sin diluir el mandato.
- source_word: הַחִצִּים
  english_pob_choice: the arrows
  chosen_spanish: las flechas
  alternatives_spanish:
  - los dardos
  - las saetas
  lexicon: HALOT
  rationale: El sustantivo plural designa proyectiles arrojados con arco. En español bíblico y moderno, «flechas» es claro y natural; «saetas» sería más tradicional, pero menos neutral.
- source_word: אֲשֶׁר אָנֹכִי מוֹרֶה
  english_pob_choice: that I am shooting
  chosen_spanish: que yo estoy lanzando
  alternatives_spanish:
  - que yo lanzo
  - que yo estoy disparando
  lexicon: HALOT
  rationale: ירה aquí expresa el acto de disparar/lanzar una flecha. «Lanzando» evita la ambigüedad moderna de «disparar» con armas de fuego y conserva el gesto físico del arco.
- source_word: וְהוּא יָרָה הַחֵצִי
  english_pob_choice: and he shot the arrow
  chosen_spanish: y él lanzó la flecha
  alternatives_spanish:
  - y lanzó la flecha
  - y él disparó la flecha
  lexicon: HALOT
  rationale: El hebreo usa el singular con artículo. Se mantiene con «la flecha» para respetar la forma textual, y «lanzó» reproduce la acción de ירה en un contexto de arco sin introducir un registro ajeno.
- source_word: לְהַעֲבִירוֹ
  english_pob_choice: beyond him
  chosen_spanish: más allá de él
  alternatives_spanish:
  - pasando de él
  - por encima de él
  lexicon: HALOT
  rationale: El hiphil de עבר con sufijo indica hacer pasar algo más allá de la persona. «Más allá de él» preserva la relación direccional de manera breve y transparente.
translation_notes:
  revision_awareness: El texto inglés POB mantiene la secuencia narrativa y conserva el singular hebreo de «the arrow»; la versión española sigue esa misma decisión, pero ajusta el verbo de ירה a un español más natural («lanzar») y conserva la partícula de cortesía de נָא con «por favor».
  spanish_consistency_notes:
  - Se mantiene el tratamiento de נַעַר como «joven» en la línea principal para no sobrecargar el pasaje con una lectura servil no exigida por el contexto.
  - «Flechas» se usa para הַחִצִּים y «la flecha» para הַחֵצִי, conservando el contraste plural/singular del hebreo.
  - La preposición espacial final se vierte con «más allá de él» para reflejar el movimiento direccional de לְהַעֲבִירוֹ.
