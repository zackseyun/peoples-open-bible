id: GEN.32.5
reference: Genesis 32:5
source:
  edition: WLC
  text: וַ/יְצַ֤ו אֹתָ/ם֙ לֵ/אמֹ֔ר כֹּ֣ה תֹאמְר֔וּ/ן לַֽ/אדֹנִ֖/י לְ/עֵשָׂ֑ו כֹּ֤ה אָמַר֙ עַבְדְּ/ךָ֣ יַעֲקֹ֔ב עִם לָבָ֣ן גַּ֔רְתִּי וָ/אֵחַ֖ר עַד עָֽתָּה־־׃
translation:
  text: 'And he commanded them[a], saying[c][b], “Thus you shall say to my lord Esau: ‘Thus says your servant Jacob: I have sojourned with Laban and have stayed until now.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have lived as a foreigner with Laban and stayed there until now.” The verb rendered “have sojourned” can emphasize residing as an outsider.
    reason: lexical_alternative
  - marker: b
    text: “Your servant” is a deferential self-designation before Esau, not necessarily a statement of literal servitude.
    reason: cultural_note
  - marker: c
    text: Or '‘Thus says your servant Jacob, “I have sojourned with Laban and have remained until now.”’”'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he instructed
  - he ordered
  lexicon: HALOT
  rationale: צוה commonly denotes giving a charge or command. 'Commanded' preserves the directive force better than the softer 'instructed.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard speech-introduction formula; 'saying' keeps the Hebrew structure naturally in English.
- source_word: כֹּה תֹאמְרוּן
  chosen: Thus you shall say
  alternatives:
  - This is what you shall say
  - So you shall say
  lexicon: HALOT
  rationale: כֹּה introduces the exact message to be delivered. 'Thus you shall say' is a clear, moderately formal rendering that fits messenger formula language.
- source_word: לַאדֹנִי
  chosen: to my lord
  alternatives:
  - to my master
  lexicon: HALOT
  rationale: With 1cs suffix, Jacob refers to Esau deferentially as 'my lord.' 'Lord' here is a social title of respect, not a divine title; 'master' is possible but sounds harsher and less idiomatic in this interpersonal setting.
- source_word: לְעֵשָׂו
  chosen: to Esau
  lexicon: HALOT
  rationale: Personal name transliterated per translation philosophy. Retained appositionally after 'my lord' to reflect the Hebrew wording.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Common messenger formula. Although the Hebrew perfect can be rendered past in some contexts, in direct-message formulae English idiom favors the present 'Thus says.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, here it functions as a deferential self-designation in diplomatic speech. The bonded sense is not foregrounded, so 'servant' best matches context and English usage.
- source_word: גַּרְתִּי
  chosen: I have sojourned
  alternatives:
  - I have lived as a foreigner
  - I have stayed
  lexicon: HALOT
  rationale: גור often carries the nuance of residing as an outsider or temporary resident. 'Sojourned' preserves that nuance better than the flatter 'stayed,' while remaining understandable.
- source_word: וָאֵחַר
  chosen: and have remained
  alternatives:
  - and have stayed
  - and have delayed
  lexicon: HALOT
  rationale: The verb אחר here indicates continuing there until the present, not merely being late. 'Have remained' captures the durative/resultative sense in context.
- source_word: עַד עָתָּה
  chosen: until now
  alternatives:
  - to this time
  lexicon: HALOT
  rationale: Standard temporal expression; 'until now' is the natural modern English equivalent.
