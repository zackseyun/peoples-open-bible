translation:
  language: es
  text: Y después de haber sido conducidos en paz, con las acciones de gracias apropiadas[a], también allí resolvieron observar estos días como días de alegría, durante todo el tiempo de su residencia temporal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con las debidas confesiones». El griego puede significar confesión o acción de gracias; el contexto festivo favorece «acciones de gracias».
    reason: lexical_alternative
  - marker: b
    text: «Residencia temporal» refleja la idea griega de vivir como residentes temporales o extranjeros, no necesariamente de estar en un exilio formal.
    reason: cultural_note
lexical_decisions:
- source_word: καταχθέντες
  english_pob_choice: after they had been brought down
  chosen_spanish: después de haber sido conducidos
  alternatives_spanish:
  - después de haber sido llevados
  - después de haber sido traídos
  lexicon: LSJ
  rationale: El participio pasivo de κατάγω sugiere conducción hacia abajo o de regreso. En español, «conducidos» conserva la idea de traslado sin forzar el destino; «llevados» sería más general, y «traídos» suena menos natural aquí.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: con paz
  alternatives_spanish:
  - en paz
  - pacíficamente
  lexicon: LSJ
  rationale: La frase indica un modo o estado de retorno seguro y pacífico. «Con paz» mantiene la idea instrumental/modal del griego y suena natural en español bíblico contemporáneo.
- source_word: ἐν ταῖς πρεπούσαις ἐξομολογήσεσιν
  english_pob_choice: with the fitting thanksgivings
  chosen_spanish: con las acciones de gracias apropiadas
  alternatives_spanish:
  - con las confesiones apropiadas
  - con las alabanzas apropiadas
  - en las debidas acciones de gracias
  lexicon: LSJ
  rationale: ἐξομολόγησις puede significar confesión o acción de gracias/alabanza según el contexto. Aquí el contexto festivo favorece «acciones de gracias». «Apropiadas» refleja πρεπούσαις como «convenientes/fitting».
- source_word: ἔστησαν
  english_pob_choice: they resolved
  chosen_spanish: resolvieron
  alternatives_spanish:
  - determinaron
  - establecieron
  - se propusieron
  lexicon: LSJ
  rationale: Aunque literalmente significa «se pusieron en pie / se establecieron», en esta construcción con infinitivo expresa una decisión. «Resolvieron» transmite esa fuerza idiomática con naturalidad.
- source_word: ἄγειν τὰς ἡμέρας
  english_pob_choice: to observe these days
  chosen_spanish: observar estos días
  alternatives_spanish:
  - celebrar estos días
  - guardar estos días
  lexicon: LSJ
  rationale: Con días festivos, ἄγειν puede significar observar, celebrar o guardar. «Observar» conserva el matiz formal elegido en la versión inglesa y evita añadir una interpretación litúrgica más fuerte.
- source_word: ἐπὶ τὸν τῆς παροικίας αὐτῶν χρόνον
  english_pob_choice: throughout the time of their sojourning
  chosen_spanish: durante todo el tiempo de su sojournación
  alternatives_spanish:
  - durante todo el tiempo de su peregrinación
  - durante todo el tiempo de su residencia como extranjeros
  - durante todo el tiempo de su estancia
  lexicon: LSJ
  rationale: παροικία expresa la condición de vivir como forasteros o residentes temporales. Se conserva en español con un término transparente y se explica en nota; «exilio» sería demasiado fuerte y restrictivo.
- source_word: εὐφροσύνους
  english_pob_choice: as joyful ones
  chosen_spanish: como días de alegría
  alternatives_spanish:
  - como días alegres
  - como días de gozo
  - como días de regocijo
  lexicon: LSJ
  rationale: El adjetivo califica a los días. «Como días de alegría» expresa el valor predicativo sin sonar forzado en español.
theological_decisions:
- issue: 'παροικία: residencia temporal de extranjeros vs. exilio'
  english_pob_reading: sojourning reflects the Greek term for living as resident aliens or temporary dwellers, not necessarily formal exile.
  chosen_spanish_reading: sojournación, entendida como vida de residencia temporal como extranjeros.
  alternative_spanish_readings:
  - exilio
  - peregrinación
  - residencia
  rationale: El texto no obliga a «exilio»; el griego apunta a una condición de estancia ajena o temporal. Se conserva esa tensión con un término transliterado y se aclara en nota para no borrar el matiz social del pasaje.
  doctrine_reference: No doctrinal issue; lexical-cultural nuance only.
translation_notes:
  revision_awareness: Se siguió el ajuste de la revisión inglesa que prefirió «observe» para ἄγειν con «days», y se mantuvo la resolución terminológica de ἐξομολόγησις como acción de gracias por el contexto festivo. También se preservó la ambigüedad controlada de παροικία, evitando reducirla a «exilio».
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo porque no aparecen en el texto.
  - Se eligió un registro bíblico formal pero actual, sin depender de fórmulas eclesiásticas fijas.
  - «Sojournación» es un término marcado; se usa para conservar el matiz de παροικία con una explicación explícita en nota.
