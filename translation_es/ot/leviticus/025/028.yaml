translation:
  language: es
  text: Pero si su mano no halla lo suficiente para restituírselo, entonces lo que vendió quedará en poder del que lo compró hasta el año del jubileo; y saldrá en el jubileo, y él volverá[a] a su posesión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y volverá a su posesión» entendido con el bien vendido como sujeto, no con el vendedor.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָצְאָה יָדוֹ
  english_pob_choice: his hand does not find
  chosen_spanish: su mano no halla
  alternatives_spanish:
  - no tiene medios suficientes
  - no puede obtener
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de la ‘mano’ como metonimia de medios o recursos, manteniendo el sentido legal sin volverlo demasiado abstracto. ‘Halla’ reproduce bien el matiz de encontrar/alcanzar lo necesario.
- source_word: דֵּי
  english_pob_choice: enough
  chosen_spanish: lo suficiente
  alternatives_spanish:
  - suficiencia
  - bastante
  lexicon: HALOT
  rationale: דֵּי expresa suficiencia. ‘Lo suficiente’ es natural en español y encaja con el contexto económico-legal del rescate.
- source_word: הָשִׁיב לוֹ
  english_pob_choice: to restore it to him
  chosen_spanish: restituírselo
  alternatives_spanish:
  - devolvérselo
  - restaurárselo
  lexicon: HALOT
  rationale: ‘Restituir’ expresa mejor el acto jurídico de devolver algo a su dueño original. El pronombre enclítico evita una frase más pesada y conserva la referencia al objeto vendido.
- source_word: מִמְכָּרוֹ
  english_pob_choice: what he sold
  chosen_spanish: su venta
  alternatives_spanish:
  - lo que vendió
  - el bien vendido
  lexicon: HALOT
  rationale: El sustantivo puede referirse a la cosa vendida o a la transacción. Dado el paralelismo con la posesión del comprador hasta el jubileo, ‘su venta’ funciona en español como referencia legal al bien enajenado sin perder la ambigüedad del hebreo.
- source_word: בְּיַד הַקֹּנֶה אֹתוֹ
  english_pob_choice: in the hand of the one who bought it
  chosen_spanish: en poder del que lo compró
  alternatives_spanish:
  - en la mano del que lo compró
  - en posesión del comprador
  lexicon: HALOT
  rationale: ‘En poder de’ es un equivalente idiomático natural del hebreo ‘en la mano de’, preservando la idea de control/tenencia sin sonar forzado. Mantengo ‘el que lo compró’ para explicitar el participio.
- source_word: שְׁנַת הַיּוֹבֵל
  english_pob_choice: the year of Jubilee
  chosen_spanish: el año del jubileo
  alternatives_spanish:
  - el año del jubileo
  - el jubileo
  lexicon: HALOT
  rationale: ‘Año del jubileo’ sigue de cerca el hebreo y resulta claro en español. Conserva el término técnico de la legislación levítica.
- source_word: וְיָצָא בַּיּוֹבֵל
  english_pob_choice: it shall go out in the Jubilee
  chosen_spanish: saldrá en el jubileo
  alternatives_spanish:
  - saldrá en el jubileo
  - será liberado en el jubileo
  - volverá en el jubileo
  lexicon: HALOT
  rationale: El verbo יצא literalmente es ‘salir’. En este contexto legal, ‘saldrá’ mantiene la imagen de salida del dominio del comprador y deja que la cláusula siguiente concrete el resultado.
- source_word: וְשָׁב לַאֲחֻזָּתוֹ
  english_pob_choice: and he shall return to his property
  chosen_spanish: y él volverá a su posesión
  alternatives_spanish:
  - y volverá a su posesión
  - y ella volverá a su posesión
  - y volverá a su propiedad
  lexicon: HALOT
  rationale: Sigo la lectura del POB de tomar el sujeto como el dueño/original vendedor, lo que encaja con el contexto del jubileo. ‘Posesión’ refleja bien אֲחֻזָּה como heredad o tenencia hereditaria, sin reducirlo a mera propiedad abstracta.
theological_decisions:
- issue: Sujeto del verbo final וְשָׁב
  english_pob_reading: 'The original owner/seller is the subject: ''he shall return to his property.'''
  chosen_spanish_reading: 'El sujeto implícito se entiende como el dueño original: ‘él volverá a su posesión’.'
  alternative_spanish_readings:
  - ‘y volverá a su posesión’ con sujeto no explicitado
  - ‘y ella volverá a su posesión’ si se toma el bien vendido como sujeto
  rationale: El hebreo permite una referencia masculina singular ambigua entre el vendedor y el bien vendido. En el marco inmediato de la legislación del jubileo, la lectura personal del dueño original es la más probable y debe preservarse, sin negar la ambigüedad gramatical.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpreive tension where genuine ambiguity exists)
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado más reciente del texto fuente inglés, que no introdujo cambios respecto del pase anterior. Se conservó la misma resolución principal sobre el verbo final y se mantuvo la nota de ambigüedad como en el audit trail.
  spanish_consistency_notes:
  - Se usa ‘jubileo’ de manera consistente para יובל, siguiendo la terminología técnica de Levítico.
  - Se mantiene ‘posesión’ para אֲחֻזָּה como término de heredad/tenencia, evitando alternar con ‘propiedad’ en este versículo.
  - Se preserva la imagen hebrea de ‘su mano’ y ‘en poder de’ para conservar el color jurídico del original.
  - El pronombre en ‘restituírselo’ resume con claridad el referente del bien vendido sin perder precisión legal.
