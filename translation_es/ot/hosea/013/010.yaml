translation:
  language: es
  text: '¿Dónde está ahora tu rey[a], para que te salve en todas tus ciudades, y tus jueces, de quienes dijiste: «Dame un rey y príncipes[b]»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probable, «Yo sería tu rey; ¿dónde entonces está quien pueda salvarte...?» El hebreo inicial es difícil.
    reason: alternative_reading
  - marker: b
    text: «Príncipes» también puede traducirse «oficiales» o «gobernantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱהִי
  english_pob_choice: Where now is
  chosen_spanish: ¿Dónde está ahora
  alternatives_spanish:
  - ¿Dónde queda ahora
  - ¿Dónde está, pues
  lexicon: HALOT
  rationale: La forma hebrea es difícil; en este contexto de reprensión, la lectura interrogativa encaja mejor que una declaración. En español, «¿Dónde está ahora…?» conserva el tono de desafío y la fuerza retórica del original.
- source_word: מַלְכְּךָ
  english_pob_choice: your king
  chosen_spanish: tu rey
  alternatives_spanish:
  - tu rey propio
  - tu monarca
  lexicon: HALOT
  rationale: El sustantivo posesivo es directo. «Rey» mantiene el paralelismo político y la referencia singular a la monarquía pedida por Israel.
- source_word: אֵפוֹא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - entonces
  - pues
  lexicon: HALOT
  rationale: La partícula intensifica la pregunta. «Ahora» es la opción española más natural para reproducir esa urgencia interrogativa sin añadir interpretación ajena.
- source_word: וְיוֹשִׁיעֲךָ
  english_pob_choice: that he may save you
  chosen_spanish: para que te salve
  alternatives_spanish:
  - y te salve
  - a fin de que te salve
  lexicon: HALOT
  rationale: El verbo causativo de ישׁע expresa salvar/liberar. En español, el giro final «para que» conserva el matiz de propósito o resultado de la pregunta retórica sin endurecerla artificialmente.
- source_word: בְּכָל עָרֶיךָ
  english_pob_choice: in all your cities
  chosen_spanish: en todas tus ciudades
  alternatives_spanish:
  - por todas tus ciudades
  - en cada una de tus ciudades
  lexicon: HALOT
  rationale: La preposición ב con el sintagma totalizador se expresa bien como localización. «En todas tus ciudades» suena natural y preserva el alcance completo del juicio.
- source_word: וְשֹׁפְטֶיךָ
  english_pob_choice: and your judges
  chosen_spanish: y tus jueces
  alternatives_spanish:
  - y tus gobernantes
  - y tus magistrados
  lexicon: HALOT
  rationale: «Jueces» corresponde al sentido léxico principal de שׁפט y mantiene el paralelismo con rey y príncipes. Aunque puede aludir a dirigentes en general, no es necesario ampliar el término.
- source_word: אֲשֶׁר אָמַרְתָּ
  english_pob_choice: of whom you said
  chosen_spanish: de quienes dijiste
  alternatives_spanish:
  - acerca de quienes dijiste
  - a quienes dijiste
  lexicon: HALOT
  rationale: El relativo retoma a rey y jueces. «De quienes dijiste» suena idiomático en español y preserva la referencia retrospectiva sin sobreespecificar la relación sintáctica.
- source_word: תְּנָה לִּי
  english_pob_choice: Give me
  chosen_spanish: Dame
  alternatives_spanish:
  - Entrégame
  - Ponme
  lexicon: HALOT
  rationale: El imperativo de נתן con לִי se expresa naturalmente como «dame». Mantiene la petición directa del pueblo sin convertirla en una paráfrasis política más lejana.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  - monarca
  lexicon: HALOT
  rationale: El artículo indefinido ayuda a reflejar el pedido de un rey concreto para Israel.
- source_word: וְשָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - oficiales
  - gobernantes
  lexicon: HALOT
  rationale: «Príncipes» conserva el registro elevado y la forma tradicional del término político hebreo. Aunque puede equivaler a oficiales o gobernantes, el contexto permite mantener esta opción más cercana al léxico original.
theological_decisions:
- issue: Lectura del קשה/ambiguo אֱהִי al inicio del versículo
  english_pob_reading: 'Interrogative taunt: ''Where now is your king...?'' rather than a declarative ''I will be your king.'''
  chosen_spanish_reading: 'Interrogativa de reproche: «¿Dónde está ahora tu rey...?»'
  alternative_spanish_readings:
  - «Yo sería tu rey... »
  - «Yo sería tu rey; ¿dónde está entonces...? »
  - «Yo seré tu rey... »
  rationale: El contexto inmediato es de juicio por la confianza equivocada en la monarquía humana. Traducir con pregunta mantiene la ironía profética y evita introducir una afirmación positiva de realeza divina que el hebreo aquí no exige.
  doctrine_reference: Oseas 13:10; contexto de juicio profético sobre la monarquía de Israel
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que ajusta solo la puntuación final del inglés POB; la redacción y el enfoque exegético permanecen estables. La versión española refleja la misma decisión principal: lectura interrogativa del פתיחה קשה y preservación del paralelo rey/jueces/príncipes.'
  spanish_consistency_notes:
  - Se mantuvo «rey» y no «monarca» para conservar el paralelismo con «jueces» y «príncipes».
  - Se usó «jueces» como traducción directa de שׁפט, sin ampliar innecesariamente a «gobernantes».
  - «Príncipes» conserva el registro político elevado y corresponde a la alternativa léxica documentada.
  - La pregunta española conserva la ironía del reproche profético sin suavizarla.
