    text: Or 'without hands.' The Aramaic idiom indicates that the stone was not cut out by human agency.
    reason: lexical_alternative
  - marker: b
    text: Or 'the image.' The Aramaic word can denote an image or statue; here it refers to the great figure seen in the dream.
    reason: lexical_alternative
