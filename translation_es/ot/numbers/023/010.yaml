translation:
  language: es
  text: ¿Quién puede contar el polvo de Jacob, o enumerar la multitud de Israel[a]? Que yo muera la muerte de los rectos[b], y que mi fin sea como el suyo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cuarta parte de Israel»; también puede entenderse, de manera más interpretativa, «contar siquiera la cuarta parte de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «la muerte de los justos».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «como él»; el singular puede referirse a la figura representativa del recto, aunque «los rectos» es colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who can
  chosen_spanish: ¿Quién puede
  alternatives_spanish:
  - ¿Quién
  - ¿Quién podría
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica e implica imposibilidad; en español, «¿Quién puede» comunica naturalmente esa fuerza sin sobretraducir.
- source_word: מָנָה
  english_pob_choice: count
  chosen_spanish: contar
  alternatives_spanish:
  - enumerar
  - hacer el recuento de
  lexicon: HALOT
  rationale: «Contar» conserva el valor numérico básico y suena natural en español moderno; mantiene el paralelismo con el verbo siguiente.
- source_word: עֲפַר יַעֲקֹב
  english_pob_choice: the dust of Jacob
  chosen_spanish: el polvo de Jacob
  alternatives_spanish:
  - el polvo de Jacobo
  - la arena de Jacob
  lexicon: HALOT
  rationale: «Polvo» refleja el metáforo de innumerabilidad y mantiene el nombre pactual «Jacob» como en el hebreo y la POB inglesa.
- source_word: וּמִסְפָּר
  english_pob_choice: or number
  chosen_spanish: o enumerar
  alternatives_spanish:
  - o contar
  - y numerar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es nominal con prefijo conjuntivo, en español conviene verbalizarla para conservar el paralelismo retórico de la línea.
- source_word: אֶת רֹבַע יִשְׂרָאֵל
  english_pob_choice: the fourth part of Israel
  chosen_spanish: la cuarta parte de Israel
  alternatives_spanish:
  - la multitud de Israel
  - las cuatro partes de Israel
  - los cuartos de Israel
  lexicon: HALOT
  rationale: Se conserva la lectura más literal y auditables del hebreo. La expresión puede ser hiperbolítica o referirse a una porción de Israel; no se resuelve en el texto principal.
- source_word: תָּמֹת נַפְשִׁי
  english_pob_choice: Let me die / Let my soul die
  chosen_spanish: ¡Que muera yo
  alternatives_spanish:
  - ¡Que muera mi alma
  - ¡Que muera mi vida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi alma morirá», pero en español «muera yo» transmite el deseo poético con naturalidad sin perder el sentido.
- source_word: מוֹת יְשָׁרִים
  english_pob_choice: the death of the upright
  chosen_spanish: la muerte de los rectos
  alternatives_spanish:
  - la muerte de los justos
  - la muerte de los íntegros
  lexicon: HALOT
  rationale: «Rectos» conserva el valor lexical de יְשָׁרִים y evita cargar el texto con un matiz forense más fuerte de lo que exige el hebreo.
- source_word: וּתְהִי אַחֲרִיתִי
  english_pob_choice: and let my end be
  chosen_spanish: y que mi fin sea
  alternatives_spanish:
  - y que mi final sea
  - y que mi destino sea
  lexicon: HALOT
  rationale: «Fin» reproduce de forma concisa אַחֲרִית y funciona bien en paralelo con la muerte mencionada antes.
- source_word: כָּמֹהוּ
  english_pob_choice: like his
  chosen_spanish: como el suyo
  alternatives_spanish:
  - como él
  - como la de él
  lexicon: HALOT
  rationale: El sufijo singular masculino se conserva de manera comprensible en español con «el suyo», sin forzar una referencia demasiado explícita.
theological_decisions:
- issue: 'Rֹבַע יִשְׂרָאֵל: literalidad vs. interpretación contextual'
  english_pob_reading: the fourth part of Israel
  chosen_spanish_reading: la cuarta parte de Israel
  alternative_spanish_readings:
  - la multitud de Israel
  - las partes de Israel
  rationale: Se prioriza la forma hebrea visible en el texto para no eliminar una tensión lexical documentada. La interpretación probable de hipérbole queda implícita, como en el registro inglés anterior al ajuste revisional.
  doctrine_reference: Translation philosophy §1, §3
- issue: 'יְשָׁרִים: upright vs. righteous'
  english_pob_reading: the upright
  chosen_spanish_reading: los rectos
  alternative_spanish_readings:
  - los justos
  rationale: «Rectos» sigue más de cerca la imagen ética básica de ישר y evita introducir un término más técnico de justificación que no está explícito en el hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: 'נַפְשִׁי: literal ''my soul'' vs. natural Spanish'
  english_pob_reading: Let me die / Let my soul die
  chosen_spanish_reading: ¡Que muera yo
  alternative_spanish_readings:
  - ¡Que muera mi alma
  rationale: En español, mantener «mi alma» aquí sonaría rígido y menos natural que el hebreo poético. La forma elegida preserva la intención sin imponer una antropología ajena al verso.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa de trabajo pasó por una revisión que prefirió «the multitude of Israel» y simplificó «my soul» a «me». Para esta entrega española, se mantuvo la literalidad auditada de רֹבַע como «la cuarta parte» para no perder la tensión léxica documentada, y se naturalizó la primera persona como «yo» en el deseo poético, siguiendo la lógica del hebreo y la equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene «Jacob» y no «Jacobo» para uniformidad con el nombre pactual del texto hebreo y la práctica POB.
  - Se usa «Yahvé» solo cuando el hebreo lo requiere; este versículo no contiene el nombre divino.
  - 'Se preserva el paralelismo verbal con dos infinitivos españoles: «contar / enumerar».'
  - La puntuación con exclamación en la segunda cola intenta reflejar el tono volitivo del hebreo.
  - «Rectos» se elige de modo consistente para יְשָׁרִים en vez de alternar con «justos».
