lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal general; «cuando» es natural en español y no añade matices que el griego no exige.
- source_word: ἀπὸ τοῦ οἴνου
  english_pob_choice: from the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - de beber vino
  - de la embriaguez
  lexicon: BDAG
  rationale: Se conserva la referencia explícita al «vino», como en el griego. En contexto alude al estado producido por el vino, pero «del vino» evita paráfrasis excesiva.
- source_word: ἐγερθῶσιν
  english_pob_choice: they rise
  chosen_spanish: se levantan
  alternatives_spanish:
  - despiertan
  - se incorporan
  lexicon: BDAG
  rationale: El verbo puede abarcar levantarse o despertar tras los efectos del vino; «se levantan» mantiene una forma breve y cercana al griego, sin forzar el sentido a «despiertan».
- source_word: οὐ μέμνηται
  english_pob_choice: they do not remember
  chosen_spanish: no recuerdan
  alternatives_spanish:
  - no se acuerdan
  - no tienen memoria de
  lexicon: BDAG
  rationale: El sentido es de no recordar lo ocurrido. En español, el plural «recuerdan» expresa mejor el sujeto colectivo implícito que una forma singular literal.
- source_word: ἃ ἔπραξαν
  english_pob_choice: what they did
  chosen_spanish: lo que hicieron
  alternatives_spanish:
  - las cosas que hicieron
  - lo que habían hecho
  lexicon: BDAG
  rationale: La cláusula relativa se vierte de manera idiomática y directa. El pasado simple es suficiente aquí; el griego no obliga a un pluscuamperfecto en español.
translation_notes:
  revision_awareness: El texto griego es breve y coincide en sustancia con el audit trail inglés; no se detectan revisiones textuales relevantes más allá de la opción léxica sobre ἀπὸ τοῦ οἴνου y ἐγερθῶσιν.
  spanish_consistency_notes:
