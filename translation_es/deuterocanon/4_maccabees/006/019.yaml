review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido griego general: preserva la distinción entre τύπος y παράδειγμα, mantiene el valor religioso de ἀσεβείας y refleja la idea de convertirse en mal ejemplo para los jóvenes. Sin embargo, «modelo de impiedad» suena algo positivo en español y atenúa el matiz admonitorio; además, «para que llegáramos a ser» puede leerse como finalidad positiva más que como resultado temido. Una leve revisión mejora la fidelidad pragmática sin apartarse del griego ni de la auditoría inglesa.'
  spanish_quality_summary: El texto es claro y natural, pero puede sonar ligeramente forzado en dos puntos. «Modelo de impiedad» es inteligible, aunque «modelo» en español suele tener connotación más favorable; «patrón» o «ejemplo» serían posibles, pero para conservar la distinción con παράδειγμα conviene una formulación que mantenga contraste sin sonar elogiosa. También «comer lo que está contaminado» es comprensible, pero «lo impuro» resulta más idiomático y más cercano al contexto alimentario ritual/moral, siempre que no se vuelva demasiado técnico. La frase revisada gana naturalidad y fuerza retórica.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Impiedad» para ἀσεβείας está bien documentado. La revisión mantiene la distinción léxica entre τύπος y παράδειγμα con «patrón» / «ejemplo». Para μιαροφαγίας, «comer lo impuro» encaja con la nota alternativa ya documentada en la POB inglesa y suena más natural en español que «comer lo que está contaminado».
  issues:
  - severity: medium
    issue: «modelo de impiedad» puede sonar semánticamente demasiado positivo
    rationale: Aunque léxicamente defendible para τύπος, en español «modelo» suele sugerir algo digno de imitación. En un contexto de advertencia moral, «patrón de impiedad» preserva mejor la distinción con «ejemplo» sin esa connotación favorable.
  - severity: low
    issue: «para que llegáramos a ser» puede sugerir una finalidad neutral o positiva
    rationale: La construcción con ἵνα aquí expresa el resultado temido/concebido. «de modo que llegáramos a ser» o «hasta llegar a ser» comunica mejor el efecto indeseable en español.
  - severity: low
    issue: «comer lo que está contaminado» es correcto pero algo pesado
    rationale: La alternativa «comer lo impuro» es más idiomática y coincide con la alternativa ya reconocida por la auditoría inglesa, sin sobreinterpretar excesivamente el griego en este contexto.
  revised_spanish_text: y nosotros mismos llegaríamos a ser para los jóvenes un patrón de impiedad, de modo que llegáramos a ser un ejemplo de comer lo impuro.[a]
  revised_footnotes:
  - marker: a
    text: O «un ejemplo de comer lo que está contaminado».
    reason: lexical_alternative
  revision_rationale: Se ajusta «modelo» a «patrón» para evitar una connotación positiva no deseada y mantener la distinción con «ejemplo». Se cambia «para que» por «de modo que» para reflejar mejor el resultado temido. Se simplifica «comer lo que está contaminado» a «comer lo impuro» por mayor naturalidad en español, conservando la alternativa documentada en nota.
