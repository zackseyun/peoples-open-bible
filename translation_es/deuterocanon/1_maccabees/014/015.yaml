translation:
  language: es
  text: Honró las cosas sagradas[a] y aumentó los vasos del santuario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘glorificó el santuario’ o ‘honró las cosas santas’. El griego τὰ ἅγια puede referirse a las cosas sagradas o, por extensión, al santuario.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los vasos o implementos sagrados usados en el santuario.
    reason: cultural_note
lexical_decisions:
- source_word: τὰ ἅγια
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - el santuario
  - las cosas sagradas
  lexicon: LSJ
  rationale: El plural neutro puede referirse a cosas santas o, por extensión, al santuario. Como la segunda cláusula ya habla de los vasos del ámbito sagrado, ‘las cosas santas’ conserva la amplitud del griego sin fusionar las dos ideas.
- source_word: ἐδόξασεν
  english_pob_choice: honored
  chosen_spanish: honró
  alternatives_spanish:
  - glorificó
  - ensalzó
  lexicon: LSJ
  rationale: El verbo expresa dar gloria u honor. En español, ‘honró’ comunica reverencia hacia realidades sagradas de modo natural y fiel al núcleo semántico.
- source_word: ἐπλήθυνεν
  english_pob_choice: increased
  chosen_spanish: multiplicó
  alternatives_spanish:
  - aumentó
  - hizo numerosos
  lexicon: LSJ
  rationale: El verbo significa hacer más numerosos. ‘Multiplicó’ refleja mejor esa idea de aumento cuantitativo que ‘aumentó’, y encaja bien con objetos cultuales.
- source_word: τὰ σκεύη
  english_pob_choice: the vessels
  chosen_spanish: los vasos
  alternatives_spanish:
  - los utensilios
  - los implementos
  lexicon: LSJ
  rationale: En contexto cultual, σκεύη se refiere a vasos o implementos de uso sagrado. ‘Vasos’ es la opción más estándar y suficientemente formal en español bíblico.
- source_word: τῶν ἁγίων
  english_pob_choice: of the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - de las cosas santas
  - del lugar santo
  lexicon: LSJ
  rationale: El genitivo especifica la esfera sagrada a la que pertenecen los vasos. ‘Del santuario’ da claridad natural en español y mantiene el marco cultual.
translation_notes:
  revision_awareness: La versión inglesa fue revisada por última vez sin cambios; se conserva su decisión de distinguir τὰ ἅγια de τὰ σκεύη τῶν ἁγίων, evitando colapsar ambos miembros de la oración en una sola idea.
  spanish_consistency_notes:
  - Se mantuvo ‘santuario’ para τῶν ἁγίων por claridad cultual, mientras que τὰ ἅγια se vertió como ‘las cosas santas’ para conservar la distinción léxica del griego.
  - ‘Vasos’ se usa en sentido ceremonial, no doméstico; por eso se añade una nota cultural.
  - Se evitó ‘glorificó’ en el texto principal porque en español puede sonar más abstracto que ‘honró’ en este contexto histórico-litúrgico.
