revisions:
- from: En la mano de Dios está el gobierno de todo hombre[a], y delante del legislador pone su honor.
  to: En la mano de Dios está el dominio de todo hombre[a], y delante del legislador pone su honor[b].
  rationale: Se ajusta «gobierno» a «dominio» para reflejar mejor מֶמְשֶׁלֶת como potestad o regla, no mera administración. Se conserva el resto de la estructura, que sigue fielmente el hebreo. Además, se añade la nota léxica omitida para הוֹדוֹ, en línea con el rastro de auditoría inglés.
