review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: condición adversativa, negación de la impureza, afirmación de limpieza, vindicación y resultado de fecundidad/concepción. Sin embargo, la cláusula final no es fiel: וְנִזְרְעָה זָרַע es 3fs y se refiere a la mujer, no a un plural impersonal. «Concebirán en ella descendencia» introduce un sujeto ajeno y suena más interpretativo que el hebreo o el English POB.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la frase final resulta poco natural y gramaticalmente extraña en español bíblico contemporáneo. «Será declarada inocente» es aceptable, aunque algo más forense que «será absuelta/quedará libre/será vindicada»; no obstante, permanece dentro de un rango fiel. La nota al pie actual está bien formulada.
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo la gestión de impureza/limpieza. «No se ha contaminado» y «está limpia» son compatibles con la evidencia y con la racionalidad documentada. La principal desviación está en el idiomático וְנִזְרְעָה זָרַע, que debe expresarse con sujeto femenino singular: «concebirá descendencia» o equivalente.'
  issues:
  - severity: high
    issue: 'La cláusula final usa un plural impersonal no respaldado por el hebreo: «concebirán en ella descendencia».'
    rationale: וְנִזְרְעָה es verbo 3fs; el sujeto es la mujer. La redacción actual introduce agentes externos implícitos y altera el sentido directo de que ella concebirá.
  - severity: medium
    issue: La frase final suena poco natural en español.
    rationale: «Concebirán en ella descendencia» no es una formulación idiomática clara en español neutral y distrae del sentido principal de concepción/fecundidad.
  - severity: low
    issue: La nota al pie está anclada en «no se ha contaminado» en lugar del modismo final preservado por el English POB.
    rationale: El English POB documenta especialmente el modismo hebreo «ser sembrada con semilla». En español conviene conservar esa explicación donde corresponde, para justificar «concebirá descendencia».
  revised_spanish_text: Pero si la mujer no se ha contaminado y está limpia, entonces será declarada inocente y concebirá descendencia[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «será sembrada con semilla», un modismo que significa concebir o tener descendencia.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula final para reflejar el sujeto femenino singular del hebreo y producir un español natural y fiel: «concebirá descendencia». También se traslada la nota al modismo final, que es donde la evidencia fuente y el audit trail inglés señalan la principal dificultad léxica. No se requiere adjudicación adicional porque la reparación es directa y de bajo riesgo interpretativo.'
