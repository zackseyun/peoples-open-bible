translation:
  language: es
  text: Dios no retira su ira; debajo de él se postran los que ayudan a Rahab[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab es un nombre poético que puede referirse a un monstruo del caos, al poder soberbio del mar o, figurativamente, a Egipto.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - Dios
  lexicon: HALOT
  rationale: אֱלוֹהַּ es un sustantivo singular para Dios y no el nombre propio Yahvé. En español, «Dios» comunica de manera natural y fiel esa referencia sin introducir un título no presente en el hebreo.
- source_word: יָשִׁיב
  english_pob_choice: turn back
  chosen_spanish: retira
  alternatives_spanish:
  - hace volver
  - revoca
  - retiene
  lexicon: HALOT
  rationale: El hebreo expresa la idea de causar que algo retroceda o se aparte. En español, «retira» conserva la noción de movimiento hacia atrás o de retirada, y funciona con naturalidad junto a «su ira».
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  - su nariz
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «su nariz», el uso idiomático aquí es ira/enojo. «Ira» mantiene la fuerza poética y evita una traducción demasiado literal que oscurezca el sentido.
- source_word: תחתו
  english_pob_choice: beneath him
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  - bajo su poder
  - ante él
  lexicon: HALOT
  rationale: La preposición transmite posición inferior y sometimiento. «Debajo de él» conserva la imagen espacial del hebreo y el matiz de subordinación.
- source_word: שָׁחֲחוּ
  english_pob_choice: bow down
  chosen_spanish: se postran
  alternatives_spanish:
  - se inclinan
  - se doblan
  - se inclinan profundamente
  lexicon: HALOT
  rationale: El verbo describe estar doblados o inclinados en señal de sumisión. Tras la revisión inglesa que prefirió «bow down», «se postran» es una equivalencia española formal, clara y fiel al gesto de humillación.
- source_word: עֹזְרֵי
  english_pob_choice: the helpers of
  chosen_spanish: los ayudadores de
  alternatives_spanish:
  - los auxiliares de
  - los aliados de
  - los que ayudan a
  lexicon: HALOT
  rationale: El constructo plural de עזר pide una relación nominal con Rahab. «Ayudadores» reproduce el sustantivo con suficiente literalidad; «aliados» sería más interpretativo.
- source_word: רָהַב
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - Egipto
  - la soberbia
  - el monstruo marino
  lexicon: HALOT
  rationale: El audit trail inglés retiene «Rahab» para no resolver en exceso la imagen poética. En español se conserva la transliteración para respetar esa ambigüedad y la tensión semántica documentada.
theological_decisions:
- issue: Identidad de Rahab
  english_pob_reading: Rahab retained as a transliterated poetic/proper name
  chosen_spanish_reading: Rahab se conserva como nombre poético/transliterado
  alternative_spanish_readings:
  - Egipto
  - la soberbia
  - un monstruo caótico o poder del mar
  rationale: El hebreo puede aludir a una figura caótica, al mar soberbio o, en otros contextos, a Egipto. Mantener «Rahab» evita cerrar indebidamente el sentido y preserva la ambigüedad literaria del texto.
  doctrine_reference: Preservar la tensión teológica y poética sin resolverla de forma artificial.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del audit trail inglés, que cambió la imagen de שָׁחֲחוּ de «crouch» a «bow down». Por eso se optó por «se postran», una formulación española formal que refleja mejor la sumisión física y poética.
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלוֹהַּ porque no es el tetragrámaton ni un caso de κύριος indirecto.
  - «Ira» se usa por la fuerza idiomática de אַף; no se traduce literalmente «nariz».
  - «Rahab» permanece transliterado para mantener la ambigüedad reconocida por el audit trail inglés.
  - El registro español es sobrio y bíblico, pero evita calcos innecesarios como «bajo él» cuando «debajo de él» suena más natural.
