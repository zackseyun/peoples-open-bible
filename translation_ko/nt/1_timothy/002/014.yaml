id: 1TI.2.14
reference: 1 Timothy 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ Ἀδὰμ οὐκ ἠπατήθη, ἡ δὲ γυνὴ ⸀ἐξαπατηθεῖσα ἐν παραβάσει γέγονεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/014.yaml
  text: And Adam was not deceived[a], but the woman, having been deceived[b], came to be in transgression.
  footnotes:
  - marker: a
    text: Or 'having been deceived'; the verb here is stronger than the earlier 'was deceived' and may carry the sense 'thoroughly deceived' or 'completely deceived.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has become in transgression' or 'became in transgression'; the Greek perfect verb can emphasize the resulting state.
    reason: lexical_alternative
translation:
  language: ko
  text: 또한 아담은 속지 않았지만, 여자는 철저히 속아[a] 범죄에 빠지게 되었습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐξαπατηθεῖσα는 강조 합성형으로, 앞 절의 「속지 않았다」(ἠπατήθη)보다 강한 「철저히 속음」 「완전히 미혹됨」의 어감을 가질 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「범죄에 들어갔다」 「범죄에 처하게 되었다」. 헬라어 완료형 γέγονεν은 그 결과 상태의 지속을 강조할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἠπατήθη
  english_pob_choice: was not deceived
  chosen_korean: 속지 않았지만
  alternatives_korean:
  - 미혹되지 않았지만
  lexicon: BDAG
  rationale: ἀπατάω는 「속이다」. 「속지 않았다」가 자연스럽다.
- source_word: ἡ δὲ γυνὴ
  english_pob_choice: but the woman
  chosen_korean: 여자는
  alternatives_korean:
  - 그 여자는
  - 하와는
  lexicon: BDAG
  rationale: 정관사 + γυνή. 본문은 「하와」를 명시하지 않으므로 「여자」 유지.
- source_word: ἐξαπατηθεῖσα
  english_pob_choice: having been deceived
  chosen_korean: 철저히 속아
  alternatives_korean:
  - 완전히 미혹되어
  - 깊이 속아
  lexicon: BDAG
  rationale: ἐξαπατάω는 강조 합성형. 앞 절의 단순 ἀπατάω와 구별하여 「철저히」로 강조 어감을 살린다.
- source_word: ἐν παραβάσει γέγονεν
  english_pob_choice: came to be in transgression
  chosen_korean: 범죄에 빠지게 되었습니다
  alternatives_korean:
  - 범죄에 들어갔습니다
  - 범죄 가운데 처하게 되었습니다
  lexicon: BDAG
  rationale: παράβασις는 「선을 넘음·범죄」. γίνομαι + ἐν의 상태 진입을 「빠지게 되었습니다」로 자연스럽게 옮긴다.
theological_decisions:
- issue: 2:14 - 아담은 속지 않음, 여자는 철저히 속아 범죄
  chosen_reading: 「또한 아담은 속지 않았지만, 여자는 철저히 속아 범죄에 빠지게 되었습니다.」
  alternative_readings:
  - 「아담은 미혹되지 않았으나, 여자는 미혹되어 범죄 가운데 처하게 되었습니다.」
  rationale: 본 절은 13-15절의 창조·타락 논증의 중심으로, 약화하거나 강화하지 않고 옮긴다. ἀπατάω(아담)와 강조 합성형 ἐξαπατάω(여자)의 어휘 대조를 한국어 「속지 않았다 / 철저히 속아」로 보존하여, 본문이 그리는 비대칭(아담의 죄 없음을 말하는 것이 아니라, 미혹의 양상이 다름)을 그대로 드러낸다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; original-language primacy'
