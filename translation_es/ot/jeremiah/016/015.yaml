review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: contraste con v. 14, fórmula de juramento con Yahvé, salida desde la tierra del norte y desde todas las tierras, expulsión divina, y promesa de retorno a la tierra dada a sus padres. Sin embargo, la puntuación y una nota requieren ajuste. El hebreo no justifica un cierre exclamativo dentro de la cita seguido de punto fuera de comillas; además, la nota [b] explica innecesariamente «Yahvé» cuando el texto principal ya sigue la política del proyecto, mientras falta la nota alternativa documentada para «sus padres / sus antepasados».'
  spanish_quality_summary: El español es claro y legible, con tono bíblico natural. «hizo subir», «los hijos de Israel», «tierra del norte» y «los haré volver» funcionan bien. La principal mejora es normalizar la puntuación de la cita y alinear las notas con las alternativas léxicas realmente relevantes. También conviene evitar una nota redundante sobre el nombre divino.
  glossary_alignment: 'Buen alineamiento global con la terminología del proyecto: יְהוָה → «Yahvé», בְּנֵי יִשְׂרָאֵל → «los hijos de Israel», y לַאֲבוֹתָם → «sus padres». No hay conflicto doctrinal. La excepción está en las notas: debe preservarse la alternativa léxica de «sus antepasados» para לַאֲבוֹתָם, en lugar de una nota sobre «Yahvé» que no responde a una ambigüedad del versículo.'
  issues:
  - severity: medium
    issue: 'Puntuación poco natural en la cita: «... arrojado!». Porque...'
    rationale: La combinación de signo de exclamación dentro de comillas seguido de punto fuera de comillas resulta torpe en español. Además, el inglés auditado muestra una ruptura de cita con punto, no exclamación. Conviene cerrar la cita con punto y seguir con «Porque...».
  - severity: medium
    issue: La nota [b] no preserva la alternativa léxica documentada para לַאֲבוֹתָם
    rationale: El expediente inglés conserva la alternativa «their ancestors» frente a «their fathers». En español, la nota pertinente debe anclarse en «padres» y ofrecer «antepasados», no explicar de nuevo por qué se usa «Yahvé».
  - severity: low
    issue: El anclaje de [b] en «Yahvé» es redundante
    rationale: La política del proyecto ya establece «Yahvé» como forma principal. Aquí no hay una ambigüedad nueva que requiera nota en español.
