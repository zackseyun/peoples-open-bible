translation:
  language: es
  text: La sentencia es por decreto de los vigilantes[a], y la decisión por la palabra de los seres santos, para que los vivos sepan que el Altísimo gobierna en el reino de los hombres[c] y lo da a quien él quiere, y establece sobre él al más humilde de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La sentencia es por el decreto de los vigilantes, y la decisión es una petición por la palabra de los seres santos». El arameo es condensado, y שְאֵלְתָא puede entenderse como «petición» o «solicitud».'
    reason: lexical_alternative
  - marker: b
    text: «Vigilantes» es una traducción literal de un término propio de Daniel para seres celestiales; muchos intérpretes entienden que se refiere a ángeles.
    reason: cultural_note
  - marker: c
    text: 'O: «sobre el reino de los hombres» o «sobre el reino de la humanidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְזֵרַת
  english_pob_choice: by the decree of
  chosen_spanish: por decreto de
  alternatives_spanish:
  - según el decreto de
  - por la decisión de
  lexicon: HALOT
  rationale: Gְזֵרָה en arameo judicial expresa una resolución formal; 'por decreto de' conserva el valor instrumental y jurídico en español.
- source_word: עִירִין
  english_pob_choice: the watchers
  chosen_spanish: los vigilantes
  alternatives_spanish:
  - los vigilantes celestiales
  - los ángeles
  lexicon: HALOT
  rationale: '''Vigilantes'' es el equivalente literal y mantiene el término técnico de Daniel sin reducirlo interpretativamente a ''ángeles''.'
- source_word: פִּתְגָמָא
  english_pob_choice: the sentence
  chosen_spanish: la sentencia
  alternatives_spanish:
  - la palabra
  - el asunto
  - el decreto
  lexicon: HALOT
  rationale: En este contexto de tribunal celestial, 'sentencia' comunica mejor el pronunciamiento judicial que 'asunto' o 'palabra'.
- source_word: וּמֵאמַר
  english_pob_choice: and the decision
  chosen_spanish: y la decisión
  alternatives_spanish:
  - y la palabra
  - y el mandamiento
  lexicon: HALOT
  rationale: El paralelo con פִּתְגָמָא pide una expresión formal; 'decisión' conserva el matiz de resolución autoritativa.
- source_word: קַדִּישִׁין
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los seres santos
  - los santos seres
  lexicon: HALOT
  rationale: '''Santos'' reproduce la referencia a seres celestiales consagrados; en español es el término más natural para el paralelo celestial sin explicitar ''ángeles''.'
- source_word: שְׁאֵלְתָא
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la petición
  - la solicitud
  - la demanda
  lexicon: HALOT
  rationale: Aunque puede significar 'petición', aquí el paralelismo y la función oracular favorecen 'la palabra', evitando una connotación de dependencia o ruego.
- source_word: עַד דִּבְרַת דִּי
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: La construcción introduce propósito/resultados; 'para que' es natural y conserva la fuerza final de la cláusula.
- source_word: חַיַּיָּא
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que viven
  - los seres vivos
  lexicon: HALOT
  rationale: '''Los vivos'' transmite la universalidad del sustantivo sin añadir precisión innecesaria.'
- source_word: שַׁלִּיט עִלָּיָא
  english_pob_choice: the Most High rules
  chosen_spanish: el Altísimo gobierna
  alternatives_spanish:
  - el Altísimo reina
  - el Altísimo tiene dominio
  lexicon: HALOT
  rationale: '''Gobierna'' comunica la autoridad activa de שַׁלִּיט, mientras ''Altísimo'' corresponde al título עִלָּיָא.'
- source_word: בְּמַלְכוּת אֱנוֹשָׁא
  english_pob_choice: in the kingdom of mankind
  chosen_spanish: en el reino de los hombres
  alternatives_spanish:
  - en el reino de la humanidad
  - sobre el reino de los hombres
  lexicon: HALOT
  rationale: '''Reino de los hombres'' sigue el valor genérico humano del arameo y mantiene la imagen regia de ''reino'' con naturalidad en español.'
- source_word: וּלְמַן דִּי יִצְבֵּא יִתְּנִנַּהּ
  english_pob_choice: and gives it to whom he wills
  chosen_spanish: y lo da a quien él quiere
  alternatives_spanish:
  - y lo da a quien desea
  - y lo entrega a quien le place
  lexicon: HALOT
  rationale: '''A quien él quiere'' preserva la libertad soberana del sujeto divino con español claro y reverente.'
- source_word: וּשְׁפַל אֲנָשִׁים
  english_pob_choice: the lowliest of men
  chosen_spanish: al más humilde de los hombres
  alternatives_spanish:
  - al más bajo de los hombres
  - al más despreciado de los hombres
  - al más humilde entre los hombres
  lexicon: HALOT
  rationale: La expresión idiomática apunta a un superlativo de bajeza social; 'el más humilde de los hombres' mantiene el grado superlativo sin sonar duro o arcaico.
- source_word: יְקִים עֲלַיְהּ
  english_pob_choice: sets up over it
  chosen_spanish: establece sobre él
  alternatives_spanish:
  - levanta sobre él
  - pone sobre él
  - designa sobre él
  lexicon: HALOT
  rationale: '''Establece'' expresa la acción de instalar/poner en cargo a alguien; ''sobre él'' conserva el referente del reino/ámbito implícito.'
theological_decisions:
- issue: Identidad de los vigilantes y los santos
  english_pob_reading: Retain the heavenly-court terminology 'watchers' and 'holy ones' rather than interpretively rendering them as angels.
  chosen_spanish_reading: Mantener 'vigilantes' y 'santos' como términos del tribunal celestial, sin explicarlos como 'ángeles' en el texto principal.
  alternative_spanish_readings:
  - ángeles
  - seres celestiales
  rationale: El arameo presenta una escena de corte celestial con vocabulario técnico propio; conservar esos términos preserva la imaginería y la tensión interpretativa del pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Representación del valor genérico humano
  english_pob_reading: Use 'mankind' and 'men' where the Aramaic has generic human reference and an idiomatic masculine expression.
  chosen_spanish_reading: Usar 'los hombres' y 'de los hombres' para el referente genérico humano del arameo, sin neutralizarlo a 'humanidad' en el texto principal.
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: El original emplea formas masculinas genéricas; en español, 'los hombres' conserva esa referencia colectiva y la imagen idiomática sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando cualquier marcador de nota no anclado en el texto; ahora solo aparece [a], que corresponde a una nota efectivamente presente en la traducción.
  spanish_consistency_notes:
  - Se mantuvo 'vigilantes' para עִירִין conforme al término técnico daniélico.
  - Se prefirió 'santos' para קַדִּישִׁין como equivalente natural en español, sin explicitar 'ángeles' en el texto principal.
  - '''Los hombres'' conserva el genérico humano del arameo y mantiene el contraste con ''los vivos''.'
  - '''Altísimo'' traduce el título עִלָּיָא con mayúscula reverente.'
  - Se evitó añadir marcadores de nota no usados en el texto para cumplir la validación de anclaje.
