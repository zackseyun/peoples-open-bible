translation:
  language: es
  text: Y tocaron las trompetas, y Cendebeo y su campamento fueron puestos en confusión[a], y muchos de ellos cayeron heridos[b]; pero los que quedaron huyeron a la fortaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron derrotados» / «fueron puestos en fuga» para ἐτροπώθη. El verbo militar griego puede expresar un sentido más fuerte que «fueron puestos en confusión».
    reason: lexical_alternative
  - marker: b
    text: «Cayeron heridos» sigue de cerca el griego y no implica necesariamente que todos murieran; puede referirse a hombres derribados en combate con heridas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισαν
  english_pob_choice: sounded
  chosen_spanish: tocaron
  alternatives_spanish:
  - sonaron
  - hicieron sonar
  lexicon: LSJ
  rationale: El verbo griego expresa tocar una trompeta como señal militar. En español, «tocaron las trompetas» es natural, claro y conserva la imagen concreta sin forzar un calco.
- source_word: ταῖς σάλπιγξιν
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - con las trompetas
  - las bocinas
  lexicon: LSJ
  rationale: 'El dativo instrumental se expresa de modo natural en español con el objeto directo verbalizado: «tocaron las trompetas». Mantiene el mismo instrumento militar y evita una construcción rígida.'
- source_word: ἐτροπώθη
  english_pob_choice: were thrown into confusion
  chosen_spanish: quedaron desordenados
  alternatives_spanish:
  - fueron derrotados
  - fueron puestos en fuga
  - quedaron confundidos
  lexicon: LSJ
  rationale: El pasivo de τρέπω en contexto militar puede significar derrota, desorden o dispersión. «Quedaron desordenados» conserva el efecto inmediato del texto sin resolverlo demasiado pronto en una derrota total, como hace la nota inglesa.
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - ejército
  - hueste
  - campamento militar
  lexicon: LSJ
  rationale: Aquí el término puede referirse al campamento o, por extensión, a la fuerza militar. «Campamento» preserva la concreción del griego y sigue siendo idiomático en español.
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - cayeron en combate
  lexicon: LSJ
  rationale: Es un modismo bélico normal en español y corresponde bien a la brevedad del griego.
- source_word: τραυματίαι
  english_pob_choice: wounded
  chosen_spanish: heridos
  alternatives_spanish:
  - heridos de gravedad
  - casuales heridos
  - malheridos
  lexicon: LSJ
  rationale: El griego señala a los heridos; «heridos» evita añadir la idea de muerte y conserva la fuerza del participio sustantivado.
- source_word: καταλειφθέντες
  english_pob_choice: those who were left
  chosen_spanish: los que quedaron
  alternatives_spanish:
  - los sobrevivientes
  - los que fueron dejados
  lexicon: LSJ
  rationale: La forma participial significa los que quedaron restantes. «Los que quedaron» es natural en español y mantiene la referencia abierta a quienes permanecieron con vida.
- source_word: ὀχύρωμα
  english_pob_choice: stronghold
  chosen_spanish: refugio fortificado
  alternatives_spanish:
  - fortaleza
  - castillo fortificado
  - baluarte
  lexicon: LSJ
  rationale: El sustantivo designa un lugar fortificado. «Refugio fortificado» comunica la idea de un lugar seguro y defensivo, manteniendo la función del término en el contexto narrativo.
theological_decisions:
- issue: Naturaleza de la derrota expresada por ἐτροπώθη
  english_pob_reading: were thrown into confusion; the Greek military verb can carry the stronger sense of defeat and dispersal.
  chosen_spanish_reading: quedaron desordenados
  alternative_spanish_readings:
  - fueron derrotados
  - fueron puestos en fuga
  - quedaron confundidos
  rationale: La redacción española evita fijar el matiz como una derrota total antes de la cláusula siguiente, donde el texto ya explica que los restantes huyeron. Así se preserva la tensión semántica del verbo griego y el desarrollo narrativo.
  doctrine_reference: Ninguno; decisión léxico-narrativa.
- issue: Alcance de τραυματίαι en un contexto de batalla
  english_pob_reading: '''Fell wounded'' reflects the Greek closely and need not mean all died; it can denote men struck down in battle as wounded.'
  chosen_spanish_reading: cayeron heridos
  alternative_spanish_readings:
  - cayeron muertos
  - fueron heridos en la batalla
  rationale: «Heridos» mantiene abierta la posibilidad de supervivencia y evita introducir muerte donde el griego no la exige. La frase sigue siendo fiel al valor bélico del pasaje.
  doctrine_reference: Ninguno; precisión histórica y semántica.
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura global del texto inglés auditado, sin cambios sustanciales respecto a la revisión más reciente. Se conservan las dos tensiones léxicas ya señaladas: el alcance militar de ἐτροπώθη y la ambigüedad de τραυματίαι.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o griego lo exija en este expediente; aquí no aparece.
  - Se mantiene «Mesías/Cristo» fuera de este versículo; no aplica.
  - Se evita «SEÑOR» como sustituto reverencial porque no hay tetragrámaton ni cita divina en este versículo.
  - «Campamento» se elige para παρεμβολή siguiendo el contexto militar concreto.
  - No se introduce lenguaje doctrinal ajeno al relato histórico.
