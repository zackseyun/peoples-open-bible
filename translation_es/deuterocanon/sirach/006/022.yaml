translation:
  language: es
  text: Porque la disciplina[a] es conforme a su nombre, y no es evidente para muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Porque la sabiduría es conforme a su nombre, y no es evidente para muchos». El testimonio hebreo lee «disciplina» donde el griego lee «sabiduría».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמּוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - sabiduría
  lexicon: HALOT
  rationale: El hebreo מוסר denota disciplina, instrucción o corrección. Como el testimonio hebreo conserva esta lectura y el paralelo griego presenta σοφία ('sabiduría'), se mantiene la idea de disciplina en el texto principal. En español, 'disciplina' es claro y natural, y preserva el sentido ético-formativo del término.
- source_word: בִּשְׁמָהּ
  english_pob_choice: true to its name
  chosen_spanish: conforme a su nombre
  alternatives_spanish:
  - según su nombre
  - como su nombre indica
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'según/en conformidad con su nombre'. 'Conforme a su nombre' comunica bien la correspondencia entre el nombre y la realidad sin introducir una paráfrasis excesiva.
- source_word: נְכוֹחָה
  english_pob_choice: evident
  chosen_spanish: evidente
  alternatives_spanish:
  - clara
  - manifiesta
  - recta
  lexicon: HALOT
  rationale: En el contexto de לְרַבִּים הִיא, el sentido es que no resulta patente o visible para muchos. 'Evidente' reproduce ese valor semántico y se corresponde con el paralelo griego φανερά.
- source_word: לְרַבִּים
  english_pob_choice: to many
  chosen_spanish: para muchos
  alternatives_spanish:
  - a muchos
  - entre muchos
  lexicon: HALOT
  rationale: La preposición con el adjetivo plural se expresa de modo natural en español como 'para muchos'. Mantiene la idea de accesibilidad o percepción limitada sin forzar la sintaxis.
theological_decisions:
- issue: Divergencia de testigos en el primer sustantivo (hebreo vs. griego)
  english_pob_reading: The Hebrew witness reads 'discipline' where the Greek reads 'wisdom.'
  chosen_spanish_reading: El texto principal sigue 'disciplina', y la nota preserva la variante griega 'sabiduría'.
  alternative_spanish_readings:
  - seguir el griego con 'sabiduría'
  - armonizar los dos testigos con una paráfrasis
  rationale: Como el proyecto da primacía al hebreo donde Sirácida se conserva en hebreo, el texto principal mantiene 'disciplina'. La nota deja visible la divergencia con σοφία para no borrar la tensión textual documentada.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde existe; usar el griego como input real de traducción'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el último pase indicó que no había cambios necesarios y el veredicto de revisión fue de alta concordancia con solo cuestiones menores.
  spanish_consistency_notes:
  - Se mantuvo 'disciplina' en vez de 'sabiduría' para reflejar el testimonio hebreo principal.
  - Se eligió 'evidente' para hacer explícita la idea de fανερά / נְכוֹחָה sin elevar el registro.
  - La nota al pie conserva la lectura griega alternativa sin absorberla en el cuerpo del versículo.
