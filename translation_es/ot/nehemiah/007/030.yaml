translation:
  language: es
  text: los hombres de Ramá y Geba[a], seiscientos veintiuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Geba»; algunas traducciones leen «Gibeah», influidas por la lista paralela de Esdras 2:26 o por la confusión entre nombres de lugar semejantes.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: La forma constructa de אִישׁ en este tipo de lista censal designa a los varones vinculados con el lugar. «Los hombres de» conserva mejor ese valor que una neutralización genérica.
- source_word: הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Rama
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se translitera con acento gráfico para mantener la pronunciación natural y la forma habitual en español bíblico.
- source_word: וָגָבַע
  english_pob_choice: and Geba
  chosen_spanish: y Geba
  alternatives_spanish:
  - y Gueba
  - y Gibea
  lexicon: HALOT
  rationale: La consonantización corresponde a גבע, por lo que «Geba» sigue de cerca la forma hebrea y la decisión auditada de la POB inglesa.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וְאֶחָד
  english_pob_choice: six hundred twenty-one
  chosen_spanish: seiscientos veintiuno
  alternatives_spanish:
  - '621'
  lexicon: HALOT
  rationale: El cardinal se expresa con palabras para mantener el registro bíblico leído en español y reflejar la secuencia numérica del hebreo sin perder naturalidad.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; la presente redacción sigue esa lectura estable, manteniendo la variante textual señalada solo en nota.
  spanish_consistency_notes:
  - Se conserva el patrón censal «los hombres de…» para armonía con otras listas genealógicas y censales.
  - Se usa «Ramá» con tilde y «Geba» como transliteraciones consistentes con un español bíblico moderno y legible.
  - No se introduce ninguna interpretación adicional; el versículo se limita al registro de nombres y cifra.
