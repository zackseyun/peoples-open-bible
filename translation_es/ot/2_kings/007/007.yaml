  to: Así que se levantaron y huyeron al anochecer[a], y dejaron sus tiendas, sus caballos y sus asnos, el campamento tal como estaba[b], y huyeron para salvar sus vidas[c].
  rationale: Se corrige el singular «su vida» a plural «sus vidas» para reflejar mejor אֶל נַפְשָׁם; se reubican las notas al segmento que realmente explican; y se alisa la puntuación para un español más natural y claro.
