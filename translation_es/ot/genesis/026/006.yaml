  text: Así que Isaac se quedó en Gerar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - vivió
  - habitó
  - se estableció
  - permaneció
  lexicon: HALOT
  rationale: El hebreo expresa la continuación de la residencia o permanencia de Isaac en Gerar dentro del avance narrativo. «Se quedó» comunica en español moderno esa permanencia sin el tono arcaico de «habitó» ni la idea más fuerte de instalación definitiva que puede sugerir «se estableció».
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: convención onomástica bíblica
  rationale: Nombre propio conservado por transliteración habitual al español.
- source_word: בִּגְרָר
  english_pob_choice: in Gerar
  chosen_spanish: en Gerar
  alternatives_spanish:
  - en la región de Gerar
  - en Guerar
  lexicon: HALOT
  rationale: La preposición ב indica localización; «en» es la equivalencia natural en español para el lugar llamado Gerar. Se mantiene el topónimo en la forma más reconocible y consistente.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: valor discursivo del waw consecutivo
  rationale: El waw consecutivo enlaza con la acción previa y marca progresión narrativa. «Así que» conserva el matiz de consecuencia contextual que el audit trail inglés resolvió con «So», sin perder fluidez en español.
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo y ninguna revisión aplicada; por ello no se introducen variantes textuales ni notas de tensión, y la traducción sigue de cerca la sencillez narrativa del hebreo.
  spanish_consistency_notes:
  - Se mantiene el nombre «Gerar» de forma uniforme.
  - Se evita un verbo de residencia demasiado permanente para reflejar el hebreo narrativo simple.
  - La oración conserva un enlace discursivo inicial para reproducir el waw consecutivo sin sobretraducirlo.
