lexical_decisions:
- source_word: Λεύκιος
  english_pob_choice: Lucius
  chosen_spanish: Lucio
  alternatives_spanish:
  - Lucio (Latinizado)
  - Lúcio
  lexicon: Nombre propio grecolatino; convención histórica en español
  rationale: Se conserva el nombre propio mediante la forma española asentada ‘Lucio’, equivalente funcional de la transliteración inglesa 'Lucius'.
- source_word: ὕπατος
  english_pob_choice: consul
  chosen_spanish: cónsul
  alternatives_spanish:
  - jefe magistrado
  - procónsul
  lexicon: LSJ
  rationale: En contexto romano, el término designa el cargo de cónsul; ‘cónsul’ es la equivalencia natural y precisa en español.
- source_word: Ῥωμαίων
  english_pob_choice: of the Romans
  chosen_spanish: de los romanos
  alternatives_spanish:
  - romano
  lexicon: LSJ
  rationale: 'Se mantiene explícito el genitivo plural como relación de pertenencia/identificación del cargo: ‘cónsul de los romanos’.'
- source_word: Πτολεμαίῳ
  english_pob_choice: Ptolemy
  chosen_spanish: Ptolomeo
  alternatives_spanish:
  - Ptolemeo
  lexicon: Nombre propio grecolatino; convención histórica en español
  rationale: Se usa la forma española común del nombre propio del destinatario.
- source_word: βασιλεῖ
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: LSJ
  rationale: El título real se expresa de manera directa con ‘rey’, conservando la aposición del saludo epistolar.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - que te vaya bien
  - salud
  lexicon: LSJ
  rationale: Se reproduce la fórmula epistolar griega con una expresión española natural. ‘Saludos’ comunica el valor convencional sin literalismo engañoso.
theological_decisions:
- issue: Fórmula epistolar griega sin contenido doctrinal explícito
  english_pob_reading: Greek has the conventional letter-opening formula 'to King Ptolemy, greetings.'
  chosen_spanish_reading: El griego presenta la fórmula convencional de apertura de carta ‘al rey Ptolomeo, saludos’.
  alternative_spanish_readings:
  - al rey Ptolomeo, que te vaya bien
  - al rey Ptolomeo, salud
  rationale: No hay carga doctrinal; la decisión es conservar la convención literaria del original sin sobrerrecrear el tono ni volverlo demasiado moderno.
  doctrine_reference: none
translation_notes:
  revision_awareness: El texto griego breve coincide sustancialmente con el testimonio auditado en inglés; no se requieren revisiones sustantivas. Se preserva la nota cultural sobre la fórmula de saludo, ajustada al español.
  spanish_consistency_notes:
  - Se mantiene la transliteración española habitual de nombres propios grecolatinos.
  - Se evita traducir mecánicamente χαίρειν como ‘regocijaos’; en español epistolar natural corresponde ‘saludos’.
  - La estructura conserva el orden y la función de la fórmula de encabezado de carta.
