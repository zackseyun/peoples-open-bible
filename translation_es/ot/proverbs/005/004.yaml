translation:
  language: es
  text: pero al final ella es amarga como el ajenjo[a], afilada como una espada de dos filos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «pero su fin es amargo como el ajenjo, afilado como una espada de dos filos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרִיתָהּ
  english_pob_choice: but in the end she
  chosen_spanish: pero al final ella
  alternatives_spanish:
  - pero su final
  - pero después ella
  lexicon: HALOT
  rationale: אַחֲרִית denota el final, el desenlace o el resultado final. Con el sufijo femenino singular, el referente es la mujer. En español, "al final ella" conserva el contraste proverbial y mantiene explícito el referente femenino sin sonar forzado.
- source_word: מָרָה
  english_pob_choice: is bitter
  chosen_spanish: es amarga
  alternatives_spanish:
  - es amarga
  - llega a ser amarga
  lexicon: HALOT
  rationale: El predicado describe el resultado de su camino. "Amarga" conserva la metáfora de algo desagradable y doloroso; en español, el adjetivo femenino concuerda naturalmente con el referente implícito de la mujer.
- source_word: כַלַּעֲנָה
  english_pob_choice: like wormwood
  chosen_spanish: como el ajenjo
  alternatives_spanish:
  - como el absintio
  - como la artemisa amarga
  lexicon: HALOT
  rationale: לענה nombra el ajenjo, planta proverbialmente asociada con la amargura. "Ajenjo" es el equivalente bíblico más transparente en español y preserva la imagen concreta.
- source_word: חַדָּה
  english_pob_choice: sharp
  chosen_spanish: aguda
  alternatives_spanish:
  - afilada
  - punzante
  lexicon: HALOT
  rationale: El adjetivo modifica la espada. "Aguda" es una equivalencia directa y digna en español; mantiene la idea de filo cortante y encaja bien con la imagen proverbial.
- source_word: כְּחֶרֶב פִּיּוֹת
  english_pob_choice: like a two-edged sword
  chosen_spanish: como una espada de dos filos
  alternatives_spanish:
  - como una espada de dos cortes
  - como una espada de dos bordes
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente una espada con dos filos. "Espada de dos filos" es la forma tradicional y clara en español, y conserva la fuerza idiomática del original sin explicar de más.
translation_notes:
  revision_awareness: La versión inglesa final revisó "double-edged" a "two-edged" por mayor formalidad. La redacción española adopta la equivalencia formal tradicional "de dos filos", que corresponde bien al hebreo y mantiene la precisión del ajuste revisado.
  spanish_consistency_notes:
  - Se mantiene "aj enjo" para לענה por consistencia bíblica y transparencia léxica.
  - Se usa "espada de dos filos" como equivalente idiomático estable en español para la imagen de dos cortes/filos.
  - El pronombre explícito "ella" conserva el referente femenino que en hebreo está marcado por el sufijo pronominal.
