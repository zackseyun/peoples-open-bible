review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: rebaños/carneros, reunión hacia la destinataria femenina, servicio, subida al altar, aceptación favorable y embellecimiento de la casa. Sin embargo, desajusta el rastro de notas del POB: la nota [a] inglesa pertenece a la cláusula de ''subirán ... sobre mi altar'', no a ''Cedar''; y la nota [b] inglesa explica ''mi casa gloriosa'', no ''Nebaiot''. Además, ''Cedar'' se aparta innecesariamente de la forma alineada con el inglés auditado (''Kedar'') y ''la casa de mi gloria'' aunque defendible, no sigue la elección principal del POB (''my glorious house'') tan bien como ''mi casa gloriosa''.'
  spanish_quality_summary: El español es claro y digno, pero necesita reparación menor por anclaje y contenido de notas, y por una mejor naturalidad/alineación en nombres propios y en la frase final. 'Subirán con aceptación sobre mi altar' es comprensible; en español suena más natural 'Subirán con aceptación a mi altar' mientras preserva la imagen cultual. 'Mi casa gloriosa' fluye mejor que 'la casa de mi gloria' en el texto principal, dejando la literalidad para nota.
  glossary_alignment: No hay conflictos con los términos teológicos por defecto del proyecto. Los nombres propios deben mantenerse de forma consistente con el audit trail; aquí conviene 'Kedar' y 'Nebaiot'. Las decisiones 'rebaños', 'carneros', 'te servirán', 'mi altar' y 'embelleceré' están bien alineadas con la evidencia y la filosofía POB.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras/frases incorrectas.
    rationale: La nota [a] del POB inglés comenta la cláusula 'They will go up with acceptance on my altar', no el nombre 'Kedar'. La nota [b] comenta 'my glorious house', no 'Nebaioth'. Esto altera el audit trail y puede confundir al lector.
  - severity: medium
    issue: '''Cedar'' no sigue la forma principal auditada para קֵדָר.'
    rationale: El English POB usa 'Kedar' y la filosofía indicada favorece transliteración consistente. 'Cedar' puede ser reconocible en español, pero aquí es una desviación no necesaria de la alineación fuente-auditoría.
  - severity: medium
    issue: '''la casa de mi gloria'' es menos natural en el texto principal que una opción equivalente más fluida.'
    rationale: El hebreo literal puede preservarse en nota. En el texto principal, 'mi casa gloriosa' comunica mejor el sentido de בֵית תִּפְאַרְתִּי y se alinea más estrechamente con 'my glorious house' del POB.
  - severity: low
    issue: La preposición en 'sobre mi altar' suena algo rígida en español.
    rationale: Aunque עַל puede ser 'sobre', en esta construcción sacrificial 'a mi altar' o 'sobre mi altar' ambas son defendibles; 'a mi altar' resulta más natural sin perder sentido.
  revised_spanish_text: Todos los rebaños de Kedar serán reunidos para ti; los carneros de Nebaiot te servirán. Subirán con aceptación[a] a mi altar, y yo embelleceré mi casa gloriosa[b].
