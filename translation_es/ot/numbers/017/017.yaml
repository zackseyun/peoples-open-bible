    issue: 'La cláusula final está demasiado calcada: ''El nombre de cada hombre escribirás''.'
    rationale: Aunque inteligible, el orden marcado no suena natural en español general y no aporta una ganancia exegética suficiente. 'Escribirás el nombre de cada hombre en su vara' conserva el mandato directo y la fuerza distributiva de אִישׁ.
  - severity: low
