    rationale: Aunque ἐν τῇ νυκτὶ ταύτῃ incluye preposición, el español formal natural prefiere 'esta noche'. La revisión inglesa auditada hizo un ajuste paralelo por naturalidad, y en español el cambio es aún más recomendable.
