translation:
  language: es
  text: 'Pero cuando Jeremías se enteró, los reprendió y dijo: «El lugar permanecerá desconocido hasta que Dios reúna a su pueblo[a] y tenga misericordia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «hasta que Dios reúna una reunión del pueblo, y llegue a haber misericordia». La redacción española suaviza esta expresión idiomática para hacer claro el sentido probable.'
    reason: lexical_alternative
  - marker: b
    text: La frase final del griego es más literal como «y llegue a haber misericordia»; se traduce con una expresión personal porque el contexto atribuye la acción misericordiosa a Dios.
    reason: theological_note
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: LSJ
  rationale: La expresión marca transición narrativa con fuerza temporal; «Pero cuando» conserva el giro del relato y su matiz conectivo sin sonar forzado en español.
- source_word: ἔγνων
  english_pob_choice: learned of it
  chosen_spanish: se enteró
  alternatives_spanish:
  - llegó a saberlo
  - supo de ello
  - se dio cuenta
  lexicon: BDAG
  rationale: Aquí el aoristo indica que Jeremías llegó a conocer la noticia de lo ocurrido; «se enteró» comunica adquisición de información mejor que un simple «sabía».
- source_word: μεμψάμενος
  english_pob_choice: he reproved
  chosen_spanish: los reprendió
  alternatives_spanish:
  - los reprochó
  - les reprendió
  - habiéndoles reprochado
  lexicon: LSJ
  rationale: El participio transmite censura dirigida a ellos. «Los reprendió» conserva el valor de reprobación con un registro natural y formal.
- source_word: ἄγνωστος
  english_pob_choice: unknown
  chosen_spanish: desconocido
  alternatives_spanish:
  - ignorado
  - oculto
  - no conocido
  lexicon: LSJ
  rationale: El adjetivo significa literalmente «no conocido». «Desconocido» es la equivalencia más directa y clara en español.
- source_word: ὁ τόπος
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - ese lugar
  - el sitio
  - la ubicación
  lexicon: BDAG
  rationale: La referencia es a la localización previamente mencionada; «el lugar» es natural y suficientemente definido.
- source_word: ἔσται
  english_pob_choice: will remain
  chosen_spanish: permanecerá
  alternatives_spanish:
  - será
  - seguirá siendo
  lexicon: BDAG
  rationale: Aunque el verbo es «ser», el contexto expresa continuidad de un estado. «Permanecerá» reproduce mejor esa duración que un simple «será».
- source_word: ἕως ἂν συνάγῃ
  english_pob_choice: until God gathers
  chosen_spanish: hasta que Dios reúna
  alternatives_spanish:
  - hasta que Dios junte
  - hasta que Dios congregue
  - hasta que Dios congregue de nuevo
  lexicon: BDAG
  rationale: La construcción indica una acción futura contingente; «hasta que Dios reúna» expresa bien el sentido de reunión futura sin forzar el subjuntivo español.
- source_word: ἐπισυναγωγὴν τοῦ λαοῦ
  english_pob_choice: his people together
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - la reunión del pueblo
  - a su pueblo reunido
  - la congregación del pueblo
  lexicon: LSJ
  rationale: El griego usa un sustantivo de «reunión/recogimiento» con una construcción algo áspera; en español, el sentido se hace claro con el verbo «reúna» y el complemento «a su pueblo». Se evita añadir «juntos» por redundancia innecesaria.
- source_word: ἔλεος γένηται
  english_pob_choice: shows mercy
  chosen_spanish: tenga misericordia
  alternatives_spanish:
  - se muestre misericordioso
  - se haga misericordia
  - llegue la misericordia
  lexicon: BDAG
  rationale: Aunque la frase griega es nominal e idiomática, el contexto atribuye la acción a Dios. «Tenga misericordia» expresa la agencia divina de forma natural y fiel al sentido.
theological_decisions:
- issue: Agencia divina en la última cláusula
  english_pob_reading: and shows mercy
  chosen_spanish_reading: y tenga misericordia
  alternative_spanish_readings:
  - y se haga misericordia
  - y la misericordia llegue
  rationale: El griego literalmente presenta «misericordia» como sujeto de «llegar a ser», pero el contexto inmediato identifica a Dios como el actor. En español, se explicita esa agencia con una construcción personal sin alterar el sentido.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia de «el pueblo»
  english_pob_reading: his people
  chosen_spanish_reading: su pueblo
  alternative_spanish_readings:
  - el pueblo
  - el pueblo de Dios
  rationale: Aunque el griego dice simplemente «el pueblo», el sujeto de la acción es Dios y el contexto es el pueblo perteneciente a él. «Su pueblo» preserva la relación implícita sin añadir comentario doctrinal.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: He incorporado el dato del audit trail inglés de que la última revisión prefirió un registro más formal para el verbo de censura, y he mantenido esa formalidad con «reprendió». También he respetado la decisión de expresar de manera natural la cláusula idiomática final, explicitando la agencia divina en español.
  spanish_consistency_notes:
  - He mantenido «Dios» para θεός y «su pueblo» para el referente contextual implícito.
  - He usado «misericordia» como equivalente estable de ἔλεος, sin sustituirlo por «favor» o «gracia».
  - He preferido «reprendió» para μεμψάμενος en un registro formal y bíblico, coherente con el audit trail inglés.
  - He evitado un calco duro de la construcción nominal griega al final, porque en español resultaría poco natural y menos claro.
