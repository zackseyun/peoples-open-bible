translation:
  language: es
  text: 'Y mi amo me hizo jurar[a], diciendo: «No tomarás para mi hijo una esposa de entre las hijas de los cananeos, en cuya tierra habito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «entre quienes habito». El hebreo dice literalmente: «el cananeo, en cuya tierra habito», con una expresión singular colectiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבִּעֵנִי
  english_pob_choice: made me swear
  chosen_spanish: me hizo jurar
  alternatives_spanish:
  - me puso bajo juramento
  - me obligó a jurar
  lexicon: HALOT
  rationale: El verbo causativo expresa que otro colocó al hablante bajo juramento. «Me hizo jurar» conserva esa fuerza causal en español natural y evita debilitar el acto solemne del juramento.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: Aquí el hablante se refiere a su superior humano; en español «mi señor» comunica la relación de dependencia y respeto sin introducir una connotación eclesiástica o de dominio doméstico más fuerte que el hebreo contextual.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Es la introducción estándar de discurso directo; «diciendo» mantiene el enlace narrativo de manera transparente.
- source_word: לֹא תִקַּח
  english_pob_choice: You shall not take
  chosen_spanish: No tomarás
  alternatives_spanish:
  - No debes tomar
  - No tomarás para ti
  lexicon: HALOT
  rationale: El imperfecto prohibitivo en contexto de mandato solemne se vierte bien con futuro de mandato en español. «No tomarás» preserva la seriedad de la instrucción.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una mujer como esposa
  lexicon: HALOT
  rationale: En este contexto matrimonial, la palabra significa específicamente «esposa» y no simplemente «mujer».
- source_word: לִבְנִי
  english_pob_choice: for my son
  chosen_spanish: para mi hijo
  alternatives_spanish:
  - para mi hijo Isaac
  - para mi hijo propio
  lexicon: HALOT
  rationale: El hebreo dice solo «mi hijo». «Para mi hijo» reproduce el dato textual sin añadir el nombre del hijo desde el contexto mayor.
- source_word: מִבְּנוֹת הַכְּנַעֲנִי
  english_pob_choice: from the daughters of the Canaanites
  chosen_spanish: de entre las hijas de los cananeos
  alternatives_spanish:
  - de las hijas de los cananeos
  - de mujeres cananeas
  lexicon: HALOT
  rationale: «De entre» refleja mejor la idea de selección/exclusión de un grupo y conserva la estructura colectiva del hebreo. «Hijas de los cananeos» mantiene la forma formal del original.
- source_word: אֲשֶׁר אָנֹכִי יֹשֵׁב בְּאַרְצוֹ
  english_pob_choice: in whose land I am dwelling
  chosen_spanish: en cuya tierra habito
  alternatives_spanish:
  - en cuya tierra estoy habitando
  - donde habito
  - en la tierra en que habito
  lexicon: HALOT
  rationale: 'El hebreo usa una relativa singular colectiva y centra la idea en la tierra. «En cuya tierra habito» conserva la referencia territorial y funciona con naturalidad en español; evita la ambigüedad de una lectura demasiado literal de «el cananeo». '
- source_word: יֹשֵׁב
  english_pob_choice: am dwelling
  chosen_spanish: habito
  alternatives_spanish:
  - estoy habitando
  - estoy viviendo
  - morando
  lexicon: HALOT
  rationale: El participio expresa residencia continua. «Habito» es la forma más natural y estable en español para una permanencia actual; «morando» sería más arcaizante.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo WLC y toma como guía el audit trail inglés de la POB, especialmente en el matiz causativo de «hacer jurar», la fuerza prohibitiva de «No tomarás» y la nota sobre la expresión singular colectiva final. No se añadieron datos no presentes en el versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada en otros contextos, aunque este versículo no la contiene.
  - Se eligió «mi señor» para אֲדֹנִי por tratarse de un superior humano; no se usó «Señor» para evitar confusión con lenguaje divino.
  - «Habito» traduce la residencia continua de יֹשֵׁב sin perder naturalidad en español.
  - La nota al pie preserva la tensión entre la literalidad de «en cuya tierra habito» y la alternativa idiomática «entre quienes habito».
