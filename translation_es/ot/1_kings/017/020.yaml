review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Elías clama a Yahvé, lo invoca como «Yahvé, mi Dios», expresa la extensión sorprendida de «también», y atribuye a Yahvé la calamidad de la muerte del hijo. También preserva correctamente la tensión teológica de הֲרֵעוֹתָ como daño/calamidad, no necesariamente mal moral. Sin embargo, hay dos problemas de fidelidad/forma: la nota [a] está anclada en «dijo» aunque la alternativa léxica corresponde a «has hecho daño», y la nota [b] está anclada en «daño» aunque su contenido corresponde a «estoy residiendo».'
  spanish_quality_summary: El español es en general claro y digno, pero tiene detalles mejorables para naturalidad y puntuación. «Con la cual yo estoy residiendo» suena algo rígido; «con quien me estoy hospedando» o «con quien me hospedo» comunica mejor la idea de residir como huésped/dependiente. Además, la puntuación vocativa «¡Oh Yahvé, mi Dios!,» no es idiomática; debe ir sin coma después del cierre exclamativo o bien sin signos exclamativos. El resto es legible y apropiado.
  glossary_alignment: 'Se alinea bien con los términos del proyecto: יְהוָה -> «Yahvé»; אֱלֹהַי -> «mi Dios»; בן -> «hijo»; el matiz de רעע se mantiene con «hacer daño». No hay conflicto terminológico mayor. La principal corrección necesaria es de anclaje de notas y una mejora de naturalidad para מִתְגּוֹרֵר.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: La nota [a] explica la alternativa de הֲרֵעוֹתָ («has hecho mal/daño»), pero está puesta en «dijo». La nota [b] explica מִתְגּוֹרֵר («estoy de paso/huésped/dependiente»), pero está puesta en «daño». Esto rompe la trazabilidad léxica exigida por el registro POB.
  - severity: medium
    issue: «Con la cual yo estoy residiendo» es demasiado rígido y poco idiomático.
    rationale: Aunque no es incorrecto, no suena natural en español bíblico contemporáneo y no transmite tan claramente la idea de huésped/dependiente que sí documenta el inglés POB.
  - severity: low
    issue: Puntuación impropia en el vocativo exclamativo.
    rationale: «¡Oh Yahvé, mi Dios!,» lleva una coma innecesaria tras el signo de cierre. En español debe escribirse «¡Oh Yahvé, mi Dios!» seguido directamente de la pregunta, o reformularse sin exclamación.
  revised_spanish_text: 'Entonces él clamó a Yahvé y dijo: «¡Oh Yahvé, mi Dios! ¿Acaso también has hecho daño[a] a la viuda con quien me estoy hospedando[b], al hacer morir a su hijo?»'
  revised_footnotes:
