  verdict: revise
  source_alignment_summary: El borrador español sigue el griego paralelo, pero no sigue el texto principal vigente del rastro POB en inglés, que fue revisado para reflejar el hebreo conservado en este versículo. Dado el estado auditado actual, la traducción española debe alinearse con la lectura hebrea en el texto principal y conservar la divergencia griego/hebreo en nota.
  spanish_quality_summary: El español actual es claro y digno, pero traduce otro texto. Además, «ocúpate en ella» suena menos natural que «ocúpate de ella», aunque ese punto queda superado porque el texto principal debe cambiarse. La revisión propuesta produce un español natural, fiel y apto para lectura pública.
  glossary_alignment: No hay conflicto con términos troncales del proyecto como Yahvé, Mesías o esclavo. Para מַתַּן conviene «don» o «regalo»; aquí «don» mantiene mejor dignidad sapiencial. Para צַדִּיק, el inglés auditado usa «the righteous» con valor singular genérico; en español «del justo» preserva mejor la construcción hebrea y evita ambigüedad. וּרְצוֹנוֹ se refleja bien como «su favor».
  issues:
  - severity: high
    issue: El borrador español traduce la lectura griega, no el texto principal auditado en inglés.
    rationale: 'El English POB vigente para SIR.11.20 dice: «The gift of the righteous will stand for those who fear him[a], and his favor will prosper forever.» La versión española actual («Permanece firme en tu alianza…») corresponde a una etapa anterior y ya no coincide con la decisión editorial aplicada.'
  - severity: medium
    issue: Falta una nota textual que preserve la importante divergencia entre el hebreo y el griego.
    rationale: El rastro inglés conserva en nota que el testigo hebreo dice esta línea mientras el griego difiere sustancialmente. La revisión española debe reflejar esa misma incertidumbre textual en nota, y no solo una nota léxica sobre «alianza» o «envejece».
  - severity: low
    issue: La formulación «ocúpate en ella» es poco idiomática en español general.
    rationale: Si se siguiera la lectura griega, «ocúpate de ella» sonaría más natural. No obstante, este ajuste es secundario porque el problema principal es de alineación textual.
  revised_spanish_text: El don del justo permanecerá para los que le temen[a], y su favor prosperará para siempre.
