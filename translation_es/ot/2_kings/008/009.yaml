base_translation:
  language: en
  yaml_path: translation/ot/2_kings/008/009.yaml
  text: So Hazael went to meet him and took a gift in his hand[a], and every good thing of Damascus, a load of forty camels. He came and stood before him and said, “Your son Ben-hadad king of Aram has sent me to you, saying[b], ‘Will I recover from this sickness?’”
  footnotes:
  - marker: a
    text: “Your son” is a deferential expression of humility toward a respected superior; it does not necessarily indicate literal sonship.
    reason: cultural_note
  - marker: b
    text: Or more literally, “Will I live from this sickness?”
    reason: lexical_alternative
