    rationale: Es comprensible pero rígido y poco idiomático. El English POB eligió como lectura principal «those in whom you trust», dejando «objects of trust» como alternativa. En español, «aquellos en quienes confías» preserva mejor el sentido contextual sin negar el literal, que puede ir en nota.
