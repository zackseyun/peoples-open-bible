id: 1CO.8.10
reference: '1 Corinthians 8:10'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν γάρ τις ἴδῃ σὲ τὸν ἔχοντα γνῶσιν ἐν εἰδωλείῳ κατακείμενον, οὐχὶ ἡ συνείδησις αὐτοῦ ἀσθενοῦς ὄντος οἰκοδομηθήσεται εἰς τὸ τὰ εἰδωλόθυτα ἐσθίειν;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/010.yaml
  text: For if someone sees you[a], who have knowledge, reclining in an idol’s temple, will not his conscience, being weak, be built up to eat food sacrificed to idols?
  footnotes:
  - marker: a
    text: 'Or ''be emboldened.'' The Greek literally says ''be built up,'' using Paul''s usual edification language with likely irony.'
    reason: lexical_alternative
translation:
  language: ko
  text: 누군가가, 지식을 가진 그대가 우상의 신전에서 식탁에 앉아 있는 것을 본다면, 약한 자의 양심이 우상에게 바쳐진 음식을 먹도록 「세움」을 받지 않겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν εἰδωλείῳ κατακείμενον
  english_pob_choice: reclining in an idol’s temple
  chosen_korean: 우상의 신전에서 식탁에 앉아
  alternatives_korean:
  - 우상 신전에 비스듬히 누워
  lexicon: BDAG
  rationale: κατάκειμαι는 그리스-로마 식사 자세(triclinium에 비스듬히 기댐). 한국어 「식탁에 앉아」로 자연화하되 식사 정황을 살린다.
- source_word: οἰκοδομηθήσεται εἰς τὸ … ἐσθίειν
  english_pob_choice: be built up to eat
  chosen_korean: 먹도록 「세움」을 받지 않겠습니까
  alternatives_korean:
  - 먹도록 부추겨지지 않겠습니까
  lexicon: BDAG
  rationale: 'οἰκοδομέω를 1절·3:9의 긍정적 「세움」과 어휘 연결하면서, 본 절의 반어적·부정적 결과(약자의 양심이 거짓 용기로 무장되어 양심에 반해 먹게 됨)를 인용부호로 표시.'
