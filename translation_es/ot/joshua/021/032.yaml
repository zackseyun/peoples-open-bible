translation:
  language: es
  text: 'Y de la tribu de Neftalí: Cedes en Galilea[a], la ciudad de refugio para el homicida, con sus tierras de pasto; Hammot-dor con sus tierras de pasto[b]; y Kartán con sus tierras de pasto—tres ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad de refugio para el que ha matado». El hebreo se refiere a quien ha causado una muerte, especialmente en el contexto legal de asilo, no necesariamente a un homicida premeditado.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice Hammot-dor; algunas tradiciones identifican el lugar con Hammat.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִמַּטֵּה נַפְתָּלִי
  english_pob_choice: And from the tribe of Naphtali
  chosen_spanish: Y de la tribu de Neftalí
  alternatives_spanish:
  - Y de la vara de Neftalí
  - Y de la estirpe de Neftalí
  lexicon: HALOT
  rationale: En contextos de repartición tribal, מַטֶּה significa 'tribu', no 'vara'. En español, 'de la tribu de' comunica con naturalidad la pertenencia y evita un calco innecesario.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  english_pob_choice: the city of refuge for the manslayer
  chosen_spanish: la ciudad de refugio para el homicida
  alternatives_spanish:
  - la ciudad de refugio para el matador
  - la ciudad de refugio para el asesino
  lexicon: HALOT
  rationale: La fórmula jurídica se conserva como 'ciudad de refugio'. Para הָרֹצֵחַ, 'homicida' mantiene el peso legal de quien ha dado muerte sin cargar automáticamente la idea de asesinato premeditado; así se preserva mejor la tensión del término.
- source_word: קֶדֶשׁ בַּגָּלִיל
  english_pob_choice: Kedesh in Galilee
  chosen_spanish: Quedes en Galilea
  alternatives_spanish:
  - Quedes en el Galilea
  - Cedes en Galilea
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma naturalizada al español como 'Quedes'. 'En Galilea' es la forma idiomática para el marcador geográfico בַּגָּלִיל.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus pastizales
  - su terreno común
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a la ciudad, a menudo para pastoreo. 'Tierras de pasto' conserva la idea de área comunal para uso ganadero y suena natural en español bíblico contemporáneo.
- source_word: חַמֹּת דֹּאר
  english_pob_choice: Hammoth-dor
  chosen_spanish: Hammot-dor
  alternatives_spanish:
  - Jamot-dor
  - Hammat-dor
  lexicon: HALOT
  rationale: Se conserva el compuesto del texto hebreo con transliteración directa y un guion para reflejar la unidad del nombre propio. 'Hammot-dor' sigue de cerca la forma consonántica del hebreo y la opción auditada en inglés.
- source_word: קַרְתָּן
  english_pob_choice: Kartan
  chosen_spanish: Cartán
  alternatives_spanish:
  - Kartan
  - Cartánah
  lexicon: HALOT
  rationale: 'Como topónimo, se translitera con adaptación española del sonido inicial y acento gráfico para lectura natural: ''Cartán''.'
- source_word: עָרִים שָׁלֹשׁ
  english_pob_choice: three cities
  chosen_spanish: tres ciudades
  alternatives_spanish:
  - ciudades, tres
  lexicon: HALOT
  rationale: El cierre resumido del hebreo se vierte en orden normal del español como 'tres ciudades'.
theological_decisions:
- issue: Тérmino legal de הָרֹצֵחַ en la ciudad de refugio
  english_pob_reading: manslayer
  chosen_spanish_reading: homicida
  alternative_spanish_readings:
  - asesino
  - matador
  - el que mata
  rationale: 'La tradición POB en inglés distingue el término jurídico del moral. En español, ''homicida'' conserva mejor esa zona intermedia: alguien que ha causado una muerte, sin imponer por sí mismo la idea de asesinato deliberado.'
  doctrine_reference: Números 35; Deuteronomio 19
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura final de la POB en inglés, sin cambios de sentido relevantes respecto del pase revisado, que quedó en alta concordancia y sin revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se transliteran los nombres propios de manera consistente y se adapta la ortografía a una lectura española natural.
  - '''Tierras de pasto'' se usa de forma uniforme para מִגְרָשׁ en esta línea, reflejando la fórmula repetida del listado territorial.'
