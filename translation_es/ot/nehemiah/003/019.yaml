translation:
  language: es
  text: Junto a él, Ezer hijo de Jesúa, oficial de Mizpa, reparó otra sección[a] frente a la subida al arsenal[b] en el ángulo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una segunda sección». La frase hebrea puede enfatizar que Ezer reparó un tramo adicional del muro.
    reason: lexical_alternative
  - marker: b
    text: O «el arsenal» o «las armas». El hebreo probablemente se refiere aquí a un lugar asociado con armas almacenadas, de ahí «arsenal».
    reason: lexical_alternative
  - marker: c
    text: O «la esquina».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - fortaleció
  - hizo reparaciones en
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo funciona de manera idiomática para la labor de reconstrucción del muro. «Reparó» comunica con naturalidad esa acción de obra sin perder el valor de participación en la restauración.
- source_word: עַל יָדוֹ
  english_pob_choice: Next to him
  chosen_spanish: Junto a él
  alternatives_spanish:
  - al lado de él
  - junto a su mano
  lexicon: HALOT
  rationale: La expresión marca la secuencia espacial de los constructores. «Junto a él» es el equivalente español más natural y claro para esta relación de vecindad en la lista.
- source_word: שַׂר הַמִּצְפָּה
  english_pob_choice: official of Mizpah
  chosen_spanish: oficial de Mizpa
  alternatives_spanish:
  - gobernante de Mizpa
  - jefe de Mizpa
  - príncipe de Mizpa
  lexicon: HALOT
  rationale: שַׂר denota un cargo de liderazgo o administración. «Oficial» preserva el matiz cívico-administrativo sin cargar el término con connotaciones monárquicas.
- source_word: מִדָּה שֵׁנִית
  english_pob_choice: another section
  chosen_spanish: otra sección
  alternatives_spanish:
  - una segunda sección
  - una segunda medida
  lexicon: HALOT
  rationale: La frase probablemente indica un tramo adicional del muro asignado a Ezer. «Otra sección» transmite la idea de un segmento adicional de forma natural en español, y mantiene la ambigüedad útil del hebreo entre medida y tramo.
- source_word: מִנֶּגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  lexicon: HALOT
  rationale: En este contexto topográfico, «frente a» expresa de modo claro la ubicación ubicada del otro lado del punto de referencia. Conserva la precisión espacial de «opposite».
- source_word: עֲלֹת
  english_pob_choice: the ascent to
  chosen_spanish: la subida a
  alternatives_spanish:
  - la ascensión a
  - el acceso a
  lexicon: HALOT
  rationale: El infinitivo sustantivado funciona aquí como designación de un camino o pendiente ascendente. «La subida a» es idiomático en español y mantiene la imagen topográfica.
- source_word: הַנֶּשֶׁק
  english_pob_choice: the armory
  chosen_spanish: el arsenal
  alternatives_spanish:
  - la armería
  - las armas
  lexicon: HALOT
  rationale: Aunque el término puede referirse al armamento en general, el contexto de una referencia topográfica favorece un lugar donde se guardan armas. «Arsenal» conserva esa referencia de depósito militar y evita sobreespecificar.
- source_word: הַמִּקְצֹעַ
  english_pob_choice: the angle
  chosen_spanish: el ángulo
  alternatives_spanish:
  - la esquina
  - el rincón
  lexicon: HALOT
  rationale: El término designa una esquina o quiebre angular del muro. «Ángulo» conserva el matiz geométrico-topográfico elegido en la traducción inglesa y resulta adecuado en español formal.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con el control comparativo y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se conserva «Mesías/Cristo» fuera de este versículo solo según el uso del texto fuente; aquí no aplica.
  - «Mizpa» se translitera de forma estable para el topónimo.
  - La puntuación y el orden siguen el flujo narrativo de la lista de constructores en Nehemías 3.
