translation:
  language: es
  text: 'Pero él dijo[a]: «Sea lo que sea, déjame correr». Entonces le dijo: «Corre». Y Ahimaaz corrió por el camino de la llanura[b] y pasó al cusita[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pase lo que pase, déjame correr». La expresión hebrea es idiomática y expresa la insistencia de Ahimaaz en correr sin importar el resultado.'
    reason: alternative_reading
  - marker: b
    text: «La llanura» probablemente se refiere a la llanura del Jordán; el hebreo no exige esa especificación geográfica más completa en el texto principal.
    reason: cultural_note
  - marker: c
    text: 'O: «adelantó al cusita». El hebreo puede entenderse como «pasó» en el sentido de rebasar a otro corredor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי מָה אָרוּץ
  english_pob_choice: But he said, “Whatever happens, let me run.”
  chosen_spanish: «Sea lo que sea, déjame correr».
  alternatives_spanish:
  - «Pase lo que pase, déjame correr».
  - «Sea como sea, yo correré».
  - «Como quiera que sea, déjame correr».
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no funciona como una pregunta literal. En español, «Sea lo que sea» conserva el matiz de insistencia y de disposición a correr sin importar el resultado. «Déjame correr» reproduce el pedido de permiso implícito en el contexto.
- source_word: רוּץ
  english_pob_choice: Run
  chosen_spanish: Corre
  alternatives_spanish:
  - ¡Corre!
  - Vamos, corre
  lexicon: HALOT
  rationale: El hebreo es un imperativo directo. «Corre» es la forma breve, natural y fiel al mandato en español.
- source_word: דֶּרֶךְ הַכִּכָּר
  english_pob_choice: by the way of the plain
  chosen_spanish: por el camino de la llanura
  alternatives_spanish:
  - por la vía de la llanura
  - por el camino del llano
  - por el camino de la región llana
  lexicon: HALOT
  rationale: דֶּרֶךְ es «camino/ruta» y הַכִּכָּר es «la llanura». «Por el camino de la llanura» mantiene la estructura hebrea sin añadir una precisión geográfica no exigida por el texto principal.
- source_word: וַיַּעֲבֹר אֶת־הַכּוּשִׁי
  english_pob_choice: and passed the Cushite
  chosen_spanish: y pasó al cusita
  alternatives_spanish:
  - y sobrepasó al cusita
  - y dejó atrás al cusita
  - y adelantó al cusita
  lexicon: HALOT
  rationale: עָבַר con objeto directo puede significar «pasar, sobrepasar, adelantar». En este contexto de carrera, la idea es que Ahimaaz rebasó al mensajero cusita. «Pasó al cusita» conserva la ambigüedad del hebreo y deja clara la acción narrativa.
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: al cusita
  alternatives_spanish:
  - al etíope
  - al hombre de Cus
  lexicon: HALOT
  rationale: כּוּשִׁי designa a un cusita, es decir, alguien de Cush. «Cusita» preserva la designación étnico-geográfica del original mejor que «etíope», que en español puede sonar más tradicional pero es más interpretativo.
- source_word: אֲחִימַעַץ
  english_pob_choice: Ahimaaz
  chosen_spanish: Ahimaaz
  lexicon: transliteration
  rationale: Nombre propio transliterado de manera estándar en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y mantiene la misma lectura idiomática de וִיהִי מָה אָרוּץ, la misma decisión de no especificar «llanura del Jordán» en el cuerpo principal, y la misma ambigüedad controlada de עָבַר con objeto directo. No hay revisiones aplicadas en el expediente inglés; por eso la versión española conserva la misma estructura narrativa y las mismas opciones léxicas principales.
  spanish_consistency_notes:
  - Se usa «cusita» para הַכּוּשִׁי, siguiendo el valor étnico-geográfico del hebreo.
  - Se mantiene «camino de la llanura» para דֶּרֶךְ הַכִּכָּר sin sobreespecificar la geografía.
  - «Sea lo que sea» traduce la insistencia idiomática, no una pregunta literal.
  - El verbo «pasó» deja abierta la idea de rebasar/adelantar, como en la nota alternativa del inglés.
