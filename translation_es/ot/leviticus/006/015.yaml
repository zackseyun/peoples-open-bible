    text: Literalmente, «será hecha fumar por completo»; es decir, la ofrenda será consumida enteramente sobre el altar.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos principales: sustituye «la hará» por «la preparará», en línea con la decisión contextual del POB para עשה en procedimiento sacrificial, y reemplaza «será enteramente convertida en humo» por una formulación española más natural que aún preserva la idea cultual de consumo total. También se reajustan las notas para reflejar mejor las alternativas documentadas del expediente inglés, especialmente en «estatuto perpetuo».'
