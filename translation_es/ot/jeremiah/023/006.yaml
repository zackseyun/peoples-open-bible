review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: «En sus días», la salvación de Judá, la seguridad de Israel y la fórmula de nombramiento. También preserva correctamente «Yahvé» para יהוה. Sin embargo, en el título final se aparta innecesariamente de la decisión auditada de la POB inglesa, que prefiere «righteousness» sobre «justice» en este contexto teológico; en español, «rectitud» o una formulación equivalente preserva mejor ese matiz que «justicia» sola.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene un par de ajustes deseables para naturalidad y precisión. «Judá será salvado» suena menos idiomático que «Judá será salvo». Además, el pie [a] está anclado a «salvado», pero el pie inglés [a] documenta una alternativa para el título final, no para תִּוָּשַׁע. El pie [b] actual también se desvía: el pie inglés [b] trata del matiz de «righteousness/justice», no de «dwell securely».'
  glossary_alignment: 'Alineación buena en general: יהוה → «Yahvé» conforme al proyecto; nombres propios correctos; fórmula nominal bien conservada. El principal desajuste terminológico está en צִדְקֵנוּ, donde el inglés auditado privilegia «righteousness» y solo conserva «justice» como alternativa. En español conviene reflejar eso con «Yahvé es nuestra rectitud» y dejar «justicia» como alternativa en nota.'
  issues:
