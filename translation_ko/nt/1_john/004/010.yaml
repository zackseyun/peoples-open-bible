  text: ἐν τούτῳ ἐστὶν ἡ ἀγάπη, οὐχ ὅτι ἡμεῖς ⸀ἠγαπήκαμεν τὸν θεόν, ἀλλ’ ὅτι αὐτὸς ἠγάπησεν ἡμᾶς καὶ ἀπέστειλεν τὸν υἱὸν αὐτοῦ ἱλασμὸν περὶ τῶν ἁμαρτιῶν ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/010.yaml
  text: 'In this is love: not that we have loved God, but that he loved us and sent his Son as an atoning sacrifice for our sins.'
  footnotes:
  - marker: a
    text: Or 'propitiation'; also possibly 'expiation.' The Greek term ἱλασμός refers to the Son's sacrificial dealing with sins.
    reason: lexical_alternative
translation:
  language: ko
  text: '사랑은 이것에 있습니다: 우리가 하나님을 사랑한 것이 아니라, 그분이 우리를 사랑하셔서 우리 죄들에 대한 화목제물[a]로 자기 아들을 보내신 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἱλασμός는 2:2와 같은 어휘로, 진노를 가라앉히고 관계를 회복시키는 희생을 가리킨다. 같은 어근의 ἱλαστήριον(롬 3:25 「속죄소」)과 구별하여 「화목제물」로 옮긴다.
    reason: lexical_alternative
