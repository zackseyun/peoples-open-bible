translation:
  language: es
  text: Clamé a él con mi boca[a], y la alabanza estaba bajo mi lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y había alabanza bajo mi lengua». El sustantivo hebreo también puede entenderse como «exaltación», en el sentido de alabanza expresada con palabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Dios
  lexicon: HALOT
  rationale: El hebreo usa un pronombre de 3ª persona masculina singular; en español, «a él» conserva esa forma pronominal sin sustituirla por el nombre divino. El antecedente contextual es Dios, pero el texto fuente aquí dice literalmente «a él».
- source_word: פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca
  - mis labios
  lexicon: HALOT
  rationale: פֶּה es literalmente «boca». En español, «con mi boca» resulta natural y mantiene la imagen corporal concreta del hebreo.
- source_word: קָרָאתִי
  english_pob_choice: I cried out
  chosen_spanish: clamé
  alternatives_spanish:
  - grité
  - llamé
  lexicon: HALOT
  rationale: En contexto de oración, קרא expresa invocación intensa. «Clamé» comunica mejor esa súplica urgente que un simple «llamé», y evita sobreexplicar.
- source_word: וְרוֹמַם
  english_pob_choice: and praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - alabanza
  - exaltación
  - alabanza exaltada
  lexicon: HALOT
  rationale: La revisión inglesa optó por «praise» en lugar de «exaltation». En español, «alabanza» refleja de forma natural el sentido contextual de elogio pronunciado, y el posesivo «su» hace explícita la referencia implícita al que recibe la alabanza, sin alterar el vínculo con el antecedente divino del versículo.
- source_word: תַּ֣חַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  lexicon: HALOT
  rationale: La preposición significa «bajo/debajo de». «Bajo» conserva la concisión poética del hebreo y encaja con la imagen de algo colocado en la lengua, listo para ser expresado.
- source_word: לְשׁוֹנִי
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi lengua
  - mi habla
  lexicon: HALOT
  rationale: El sustantivo es literalmente «lengua». Mantenerlo preserva la metáfora corporal del texto hebreo y su fuerza poética.
translation_notes:
  revision_awareness: El texto inglés auditado revisó «exaltation» a «praise» por mayor precisión y naturalidad; la versión española sigue esa revisión y conserva la estructura paralela del verso, manteniendo el pronombre explícito del hebreo y la imagen corporal de boca/lengua.
  spanish_consistency_notes:
  - Se mantiene «a él» para reflejar el pronombre hebreo, sin reemplazarlo por una paráfrasis nominativa.
  - Se usa «alabanza» en vez de «exaltación» conforme a la revisión inglesa, pero se documenta la alternativa léxica en nota.
  - Se conserva la metáfora corporal «mi boca / mi lengua» para mantener la imaginería del original.
  - La puntuación y el orden siguen un paralelismo poético claro y publicable en español.
