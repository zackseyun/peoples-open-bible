id: EZK.33.30
reference: Ezekiel 33:30
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם בְּנֵ֣י עַמְּ/ךָ֗ הַ/נִּדְבָּרִ֤ים בְּ/ךָ֙ אֵ֣צֶל הַ/קִּיר֔וֹת וּ/בְ/פִתְחֵ֖י הַ/בָּתִּ֑ים וְ/דִבֶּר חַ֣ד אֶת אַחַ֗ד אִ֤ישׁ אֶת אָחִי/ו֙ לֵ/אמֹ֔ר בֹּֽאוּ נָ֣א וְ/שִׁמְע֔וּ מָ֣ה הַ/דָּבָ֔ר הַ/יּוֹצֵ֖א מֵ/אֵ֥ת יְהוָֽה־־־־־׃
translation:
  text: And you[a], son of man, the sons of your people who talk about you beside the walls and in the doorways of the houses, each one speaking with another, each man with his brother, saying[b], ‘Come now and hear what the word is that comes from Yahweh.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who speak with you,' though the context more likely means they are talking about Ezekiel among themselves.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'that comes out from the LORD'; that is, the prophetic word proceeding from him.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A more literal rendering preserves the idiom and its rhetorical force better than smoothing it to 'human one' or 'mortal'.
- source_word: בְּנֵי עַמְּךָ
  chosen: the sons of your people
  alternatives:
  - your people
  - the people of your nation
  lexicon: HALOT
  rationale: Rendered gender-accurately and formally to reflect the Hebrew expression. Though it refers broadly to the people, the masculine form is retained per translation philosophy.
- source_word: הַנִּדְבָּרִים בְּךָ
  chosen: who talk about you
  alternatives:
  - who speak of you
  - who talk with you
  lexicon: HALOT
  rationale: The preposition ב with דבר here most naturally means speaking about Ezekiel rather than speaking with him. 'Talk about you' is idiomatic modern English while preserving the sense.
- source_word: אֵצֶל הַקִּירוֹת
  chosen: beside the walls
  alternatives:
  - by the walls
  - next to the walls
  lexicon: HALOT
  rationale: אצל indicates proximity. 'Beside' is natural and sufficiently literal.
- source_word: וּבְפִתְחֵי הַבָּתִּים
  chosen: and in the doorways of the houses
  alternatives:
  - and at the entrances of the houses
  - and in the openings of the houses
  lexicon: HALOT
  rationale: פתחי refers to entryways/openings. 'Doorways' is clear modern English and fits the domestic setting.
- source_word: וְדִבֶּר חַד אֶת אַחַד
  chosen: each one speaking with another
  alternatives:
  - one speaks to another
  - one with another speaks
  lexicon: HALOT
  rationale: The clause describes reciprocal conversation. English participial phrasing fits the flow after the relative clause and avoids a jarring shift while preserving the distributive sense.
- source_word: אִישׁ אֶת אָחִיו
  chosen: each man with his brother
  alternatives:
  - a man with his companion
  - each one with his fellow
  lexicon: HALOT
  rationale: The Hebrew is concrete and masculine. 'Brother' may denote fellow member of the people, but retaining the familial term reflects the source wording.
- source_word: בֹּאוּ נָא
  chosen: Come now
  alternatives:
  - Please come
  - Come, please
  lexicon: HALOT
  rationale: נָא adds entreaty or invitation. 'Come now' captures the idiomatic urging without sounding overly formal.
- source_word: וְשִׁמְעוּ
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: '''Hear'' preserves the common biblical resonance of שמע while remaining natural in context.'
- source_word: מָה הַדָּבָר
  chosen: what the word is
  alternatives:
  - what the message is
  - what the matter is
  lexicon: HALOT
  rationale: דבר here refers to the prophetic utterance/message. 'Word' preserves the prophetic register; 'message' is possible but less textually transparent.
- source_word: הַיּוֹצֵא מֵאֵת יְהוָה
  chosen: that comes out from the LORD
  alternatives:
  - that comes from the LORD
  - going out from the LORD
  lexicon: HALOT
  rationale: The participle יצא literally means 'going out/coming out.' 'Comes out from' preserves the vivid source imagery of a word proceeding from YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
