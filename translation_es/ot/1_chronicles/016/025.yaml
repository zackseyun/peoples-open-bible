translation:
  language: es
  text: Porque Yahvé es grande y muy digno de alabanza, y ha de ser temido[a] por encima de todos los dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'temible'. El hebreo expresa algo que inspira temor reverente y asombro; 'ha de ser temido' conserva con más claridad esa fuerza en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o razón del llamado a la adoración. En español, 'Porque' conserva bien el valor explicativo y suena natural al inicio de la cláusula.
- source_word: גָד֨וֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - excelso
  lexicon: HALOT
  rationale: El adjetivo expresa grandeza en estatura, rango y majestad. 'Grande' es la opción directa y natural en español para esta afirmación sobre Yahvé.
- source_word: יְהוָ֤ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del pacto mediante la transliteración 'Yahvé', conforme al criterio del proyecto y en lugar de sustituirlo por un título.
- source_word: מְהֻלָּל
  english_pob_choice: to be praised
  chosen_spanish: digno de alabanza
  alternatives_spanish:
  - alabado
  - que ha de ser alabado
  lexicon: HALOT
  rationale: El participio pasivo comunica que Yahvé es objeto de alabanza por su propia calidad. 'Digno de alabanza' preserva el valor predicativo de modo fluido en español y evita una construcción demasiado pesada.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - muchísimo
  - sobremanera
  lexicon: HALOT
  rationale: El adverbio intensifica la alabanza. 'En gran manera' mantiene el énfasis fuerte del hebreo sin volver la frase coloquial.
- source_word: נוֹרָא
  english_pob_choice: to be feared
  chosen_spanish: temible
  alternatives_spanish:
  - para ser temido
  - inspirador de temor reverente
  lexicon: HALOT
  rationale: El término expresa la cualidad de provocar temor reverente y asombro. 'Temible' conserva ese peso semántico en español; aunque puede sonar fuerte, aquí se ajusta al paralelo con el inglés POB y al contexto de adoración reverente.
- source_word: עַל כָּל אֱלֹהִים
  english_pob_choice: above all gods
  chosen_spanish: sobre todos los dioses
  alternatives_spanish:
  - por encima de todos los dioses
  - más que todos los dioses
  lexicon: HALOT
  rationale: La preposición indica superioridad/comparación. 'Sobre todos los dioses' reproduce bien la relación de exaltación frente a los otros dioses, manteniendo el contraste polémico del pasaje.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: HALOT
  rationale: Aquí el plural se refiere a las deidades de las naciones, no al Dios de Israel. 'Dioses' es la equivalencia directa y conserva el contraste del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo usa el Tetragrámaton directamente. Se mantiene la decisión del POB de rendirlo como el nombre propio de Dios, no como una sustitución titulada; en español, 'Yahvé' es la forma estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נוֹרָא aplicado a Dios
  english_pob_reading: to be feared
  chosen_spanish_reading: temible
  alternative_spanish_readings:
  - para ser temido
  - inspirador de temor reverente
  rationale: La idea central es que Dios merece reverencia y provoca asombro temeroso. 'Temible' preserva esa tensión semántica sin diluirla en un simple 'asombroso'.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern Spanish without flattening theological weight)
translation_notes:
  revision_awareness: La revisión más reciente concluyó que no eran necesarios cambios; este borrador sigue esa línea de alta concordancia con la fuente y con el audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino, en coherencia con el estándar del proyecto.
  - Se evitó 'SEÑOR' para no ocultar el Tetragrámaton.
  - '''Dioses'' conserva el plural del hebreo אֱלֹהִים en contraste con Yahvé.'
  - La frase 'digno de alabanza en gran manera' conserva el paralelismo hebreo con intensidad adverbial natural en español.
