translation:
  language: es
  text: Y entre el aposento alto[a] de la esquina y la Puerta de las Ovejas, los orfebres y los comerciantes hicieron reparaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ascenso de la esquina» o «la cámara alta de la esquina». El hebreo עֲלִיָּה puede referirse a un aposento o cámara alta, o a una subida; la característica arquitectónica exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵין
  english_pob_choice: And between
  chosen_spanish: Y entre
  alternatives_spanish:
  - Y de entre
  - Ahora entre
  lexicon: HALOT
  rationale: La conjunción más la preposición introduce un tramo final de la muralla; «Y entre» conserva la relación espacial y el enlace narrativo sin añadir matices ajenos.
- source_word: עֲלִיַּת
  english_pob_choice: the upper room
  chosen_spanish: la torre
  alternatives_spanish:
  - el aposento alto
  - la subida
  - el piso alto
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el hebreo puede referirse a una estructura elevada o a una subida. Dado que el español «aposento alto» puede sonar demasiado específico para una fortificación y «subida» puede quedar ambiguo, «torre» funciona como una solución contextual prudente solo para la referencia topográfica, manteniendo la incertidumbre del lugar exacto.
- source_word: הַפִּנָּה
  english_pob_choice: the corner
  chosen_spanish: del ángulo
  alternatives_spanish:
  - de la esquina
  - del rincón
  - de la esquina fortificada
  lexicon: HALOT
  rationale: «פִּנָּה» denota una esquina o ángulo del muro. «Del ángulo» conserva el sentido geométrico y evita convertirlo en un nombre propio sin base explícita.
- source_word: לְשַׁעַר הַצֹּאן
  english_pob_choice: the Sheep Gate
  chosen_spanish: la Puerta de las Ovejas
  alternatives_spanish:
  - la Puerta del Rebaño
  - la Puerta de los Corderos
  - la Puerta de las ovejas
  lexicon: HALOT
  rationale: El nombre de la puerta se entiende literalmente en español. «Puerta de las Ovejas» sigue de cerca el hebreo y es transparente; se evita una forma tradicional no motivada por el audit trail.
- source_word: הֶחֱזִיקוּ
  english_pob_choice: made repairs
  chosen_spanish: hicieron reparaciones
  alternatives_spanish:
  - repararon
  - fortalecieron
  - trabajaron en ella
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo funciona como término técnico de reparación de murallas. «Hicieron reparaciones» preserva el valor idiomático del capítulo sin forzar una traducción excesivamente literal ni sustituirlo por «fortalecieron».
- source_word: הַצֹּרְפִים
  english_pob_choice: the goldsmiths
  chosen_spanish: los orfebres
  alternatives_spanish:
  - los plateros
  - los refinadores
  - los metalistas
  lexicon: HALOT
  rationale: El participio designa a artesanos de metales preciosos. «Orfebres» es la correspondencia natural en español para un oficio que trabaja oro y otros metales finos.
- source_word: וְהָרֹכְלִים
  english_pob_choice: the merchants
  chosen_spanish: los comerciantes
  alternatives_spanish:
  - los mercaderes
  - los traficantes
  - los vendedores
  lexicon: HALOT
  rationale: El término hebreo indica personas dedicadas al comercio. «Comerciantes» es amplio, claro y adecuado en español moderno; «mercaderes» sería posible, pero más marcado estilísticamente.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; la concordancia general con el control cruzado es alta (agreement 1.0), sin correcciones aplicadas. La versión española respeta esa estabilidad y solo resuelve en español la ambigüedad lexical ya documentada para עֲלִיָּה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el registro narrativo sobrio propio de Nehemías 3, con terminología de construcción y oficios.
  - «Puerta de las Ovejas» se traduce literalmente por tratarse de un nombre de lugar establecido en el contexto del capítulo.
