translation:
  text: Do not give what is holy to the dogs[a], lest they throw them onto the dung-heap.
    Do not throw pearls to the pigs[f][e][d][c][b], lest they do it [...].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘What is holy’ translates an adjectival noun (ⲡⲉⲧⲟⲩⲁⲁⲃ), literally ‘the
      holy [thing]’.
    reason: lexical_alternative
  - marker: b
    text: ‘Dung-heap’ renders Greek loan ⲕⲟⲡⲣⲓⲁ, the refuse/dung pile common in village
      life.
    reason: cultural_note
  - marker: c
    text: The Coptic continues only with ⲡⲗⲁ… before a break; many editors conjecture
      a verb like ‘trample,’ influenced by Matt 7:6, but the manuscript does not preserve
      it.
    reason: lacuna_or_restoration
  - marker: d
    text: Spelling ⲛ̄ⲛⲟⲩϩⲟⲟⲣ (ms) normalized to ⲛⲡⲟⲩϩⲟⲣ reflects dialectal/plural
      article variation.
    reason: dialect_note
  - marker: e
    text: Or 'lest they [...].'.
    reason: previous_rendering
  - marker: f
    text: Or 'lest they throw it'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϫⲉⲙⲡⲣϯ
  chosen: do not give
  alternatives:
  - do not offer
  lexicon: Layton; Crum s.v. ⲧⲓ/ϯ
  rationale: The negative prohibitive ⲙⲡⲣ + infinitive is best rendered as a direct
    imperative in English; ϯ means give (Crum).
- source_word: ⲡⲉⲧⲟⲩⲁⲁⲃ
  chosen: what is holy
  alternatives:
  - the holy [thing]
  - the holy
  lexicon: Crum s.v. ⲟⲩⲁⲁⲃ
  rationale: Adjectival noun; indefinite generic sense fits proverbial tone. Preserves
    strangeness without making it ecclesiastical (e.g., “the sacred”).
- source_word: 'ⲛⲡⲟⲩϩⲟⲣ (ms: ⲛ̄ⲛⲟⲩϩⲟⲟⲣ)'
  chosen: to the dogs
  alternatives:
  - to dogs
  lexicon: Crum s.v. ϩⲟⲟⲣ
  rationale: Plural article with ϩⲟⲟⲣ ‘dog’. Definite article carried into natural
    English as a generic plural.
- source_word: ϫⲉⲕⲁⲁⲥ
  chosen: lest
  alternatives:
  - so that not
  - for fear that
  lexicon: Crum s.v. ⲕⲁⲥ; Layton (conjunction usage)
  rationale: Standard rendering of the preventative conjunction; “lest” retains Thomas’s
    gnomic sharpness.
- source_word: ⲛⲟⲩⲛⲟⲩϫⲉⲛⲧⲟⲟⲩ / ⲛⲟⲩϫⲉ
  chosen: throw it
  alternatives:
  - cast it
  - hurl it
  lexicon: Crum s.v. ⲛⲟⲩϫⲉ
  rationale: Semantic core is ‘throw, cast’. “Throw” is plain and keeps repetition
    with the second clause.
- source_word: ⲕⲟⲡⲣⲓⲁ
  chosen: dung-heap
  alternatives:
  - dung-pile
  - midden
  lexicon: Crum s.v. ⲕⲟⲡⲣⲓⲁ (Greek loan)
  rationale: Greek loanword kopria; “dung-heap” is accurate and concrete.
- source_word: ⲙⲡⲣⲛⲟⲩϫⲉ
  chosen: do not throw
  alternatives:
  - do not cast
  lexicon: Crum s.v. ⲛⲟⲩϫⲉ; Layton (negative imperative)
  rationale: Repetition of the same verb in both clauses is likely intentional; keep
    it in English.
- source_word: ⲛⲡⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ
  chosen: pearls
  alternatives:
  - the pearls
  - a pearl (collective)
  lexicon: Crum s.v. ⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ
  rationale: Loanword for ‘pearl’; context demands plural in English idiom, though
    article usage is variable in Coptic.
- source_word: ⲛⲡⲉϣⲁⲩ
  chosen: to the pigs
  alternatives:
  - to the swine
  lexicon: Crum s.v. ϣⲁⲩ
  rationale: ϣⲁⲩ = swine/pigs; “pigs” is plain and concrete.
- source_word: ϩⲓⲛⲁ ϫⲉ
  chosen: lest
  alternatives:
  - so that not
  lexicon: Layton (subordinators)
  rationale: Here functions as a preventative/purpose clause; “lest” keeps symmetry
    with the first clause.
- source_word: ⲉⲓⲣⲉ ⲛⲧⲟϥ (fragmentary)
  chosen: do [...] to it
  alternatives:
  - trample it (hypothesized)
  lexicon: Crum s.v. ⲉⲓⲣⲉ
  rationale: Only ⲉⲓⲣⲉ ⲛⲧⲟϥ is visible before the lacuna begins; we avoid supplying
    the complement.
textual_note: The saying is preserved on NH II, 48. The manuscript reads ⲛ̄ⲛⲟⲩϩⲟⲟⲣ
  (lb 30), which Dilley normalizes to ⲛⲡⲟⲩϩⲟⲣ; this reflects a plural article usage
  with Lycopolitan coloring and does not affect meaning. The construction ⲛⲟⲩⲛⲟⲩϫⲉⲛⲧⲟⲟⲩ
  (lb 31) is best understood as ‘they will throw it’/‘they throw it’ with 3pl subject
  and object ‘it’. After the mid-saying dot, the second clause proceeds normally until
  lb 33, where only ⲡⲗⲁ… survives and the text breaks off; Dilley leaves it as ⲡⲗⲁ…,
  and the remainder of the clause is lost. No restoration is supplied here. The punctuation
  point (·) in lb 32 marks the coordination of the two prohibitions.
