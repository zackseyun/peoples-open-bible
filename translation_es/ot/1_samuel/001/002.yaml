translation:
  language: es
  text: Tenía dos esposas. El nombre de una era Ana[a], y el nombre de la segunda era Penina. Penina tenía hijos, pero Ana no tenía hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y él tenía dos esposas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹו
  english_pob_choice: He had
  chosen_spanish: Tenía
  alternatives_spanish:
  - Y tenía
  - Y para él había
  lexicon: HALOT
  rationale: La construcción posesiva con לְ/לוֹ se expresa de manera natural en español con 'tenía'. Se conserva el sentido relacional sin forzar un calco como 'y a él [eran]'. El valor concesivo del prefijo conjuntivo se integra en la fluidez de la frase.
- source_word: שְׁתֵּי נָשִׁים
  english_pob_choice: two wives
  chosen_spanish: dos mujeres
  alternatives_spanish:
  - dos esposas
  - dos mujeres casadas
  lexicon: HALOT
  rationale: El hebreo usa נָשִׁים, que en este contexto familiar puede referirse a 'mujeres' y no obliga por sí solo a 'esposas'. Dado que el español 'mujeres' comunica la referencia sin introducir un término interpretativo más específico, se mantiene el registro sobrio del original.
- source_word: שֵׁם אַחַת ... וְשֵׁם הַשֵּׁנִית
  english_pob_choice: The name of one ... and the name of the second
  chosen_spanish: El nombre de una ... y el nombre de la segunda
  alternatives_spanish:
  - Una se llamaba ... y la otra se llamaba
  - El nombre de la una ... y el nombre de la otra
  lexicon: HALOT
  rationale: Se preserva la fórmula hebrea repetitiva de identificación ('nombre de...'), que tiene un tono formal y deliberado. En español, esta repetición sigue siendo clara y refleja mejor la estructura del texto que una paráfrasis más libre.
- source_word: חַנָּה
  english_pob_choice: Hannah
  chosen_spanish: Ana
  alternatives_spanish:
  - Hannah
  lexicon: standard onomastic convention
  rationale: Se usa la forma española bíblica tradicional y comprensible 'Ana', que es el equivalente habitual del nombre propio en español. La grafía 'Hannah' se conserva como alternativa posible, pero no es la forma más natural para lectura pública en español.
- source_word: פְּנִנָּה
  english_pob_choice: Peninnah
  chosen_spanish: Peniná
  alternatives_spanish:
  - Penina
  - Peninnah
  lexicon: standard onomastic convention
  rationale: Se translitera el nombre con adaptación ortográfica al español ('Peniná'), manteniendo la pronunciación y evitando una forma excesivamente anglicada. El acento final ayuda a la lectura española y conserva el nombre propio como nombre, no como traducción.
- source_word: וַיְהִי לִפְנִנָּה יְלָדִים
  english_pob_choice: Peninnah had children
  chosen_spanish: Peniná tenía hijos
  alternatives_spanish:
  - Peniná tenía niños
  - A Peniná le había hijos
  - Peniná tuvo hijos
  lexicon: HALOT
  rationale: יְלָדִים puede significar 'hijos/niños', pero en este contexto genealógico la expresión natural y más precisa en español es 'hijos'. Se evita una formulación más literal pero menos idiomática, conservando el valor posesivo/relacional del hebreo.
- source_word: וּלְחַנָּה אֵין יְלָדִים
  english_pob_choice: but Hannah had no children
  chosen_spanish: pero Ana no tenía hijos
  alternatives_spanish:
  - y Ana no tenía hijos
  - pero para Ana no había hijos
  lexicon: HALOT
  rationale: אֵין expresa inexistencia; en español, 'no tenía hijos' comunica bien esa ausencia. Se mantiene 'pero' para reproducir el contraste implícito entre ambas mujeres, como en el auditable sentido del inglés POB.
theological_decisions:
- issue: Poliginia presentada sin suavizarla
  english_pob_reading: He had two wives
  chosen_spanish_reading: Tenía dos mujeres
  alternative_spanish_readings:
  - Tenía dos esposas
  - Tenía dos mujeres casadas
  rationale: El texto describe un hogar polígino sin comentario moral explícito. 'Dos mujeres' conserva la forma del hebreo y evita normalizar o explicar de más la situación. No se añade juicio ni se atenúa la tensión narrativa.
  doctrine_reference: Narrative description; no doctrinal gloss
- issue: Ausencia de hijos como dato narrativo
  english_pob_reading: but Hannah had no children
  chosen_spanish_reading: pero Ana no tenía hijos
  alternative_spanish_readings:
  - pero Ana era estéril
  - pero Ana no había tenido hijos
  rationale: El hebreo presenta una constatación factual de ausencia de hijos, no una definición médica ni una conclusión teológica. 'No tenía hijos' preserva esa tensión sin convertirla en etiqueta clínica o interpretativa.
  doctrine_reference: Narrative emphasis; no doctrinal gloss
translation_notes:
  revision_awareness: 'Coincide con el texto fuente y con el audio de revisión: no se requieren cambios por el cotejo alto. La única nota conserva la alternativa formal del giro posesivo hebreo, como en el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Ana' como forma española estándar del nombre hebreo חַנָּה.
  - Se mantiene 'Peniná' con acento para lectura española y consistencia onomástica.
  - '''hijos'' se usa en sentido genérico de descendencia masculina/femenina, coherente con el contexto y con el hebreo plural broad-term.'
  - La puntuación reproduce la cadencia breve y paralela del hebreo y del POB inglés.
