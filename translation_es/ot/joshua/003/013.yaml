  text: וְ/הָיָ֡ה כְּ/נ֣וֹחַ כַּפּ֣וֹת רַגְלֵ֣י הַ/כֹּהֲנִ֡ים נֹשְׂאֵי֩ אֲר֨וֹן יְהוָ֜ה אֲד֤וֹן כָּל הָ/אָ֨רֶץ֙ בְּ/מֵ֣י הַ/יַּרְדֵּ֔ן מֵ֤י הַ/יַּרְדֵּן֙ יִכָּ֣רֵת֔וּ/ן הַ/מַּ֥יִם הַ/יֹּרְדִ֖ים מִ/לְ/מָ֑עְלָ/ה וְ/יַעַמְד֖וּ נֵ֥ד אֶחָֽד־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/003/013.yaml
  text: And when the soles of the feet of the priests carrying the ark of Yahweh[a], the Lord of all the earth, come to rest in the waters of the Jordan, the waters flowing down from above will be cut off in the Jordan[b], and they will stand in one heap.
  footnotes:
  - marker: a
    text: Or, 'the ark of the Lord of all the earth.' The Hebrew can be read with 'Lord of all the earth' closely linked to 'ark,' though the main text takes it as an appositional title for the LORD.
    reason: alternative_reading
  - marker: b
    text: Or, 'the waters coming down from upstream.'
    reason: lexical_alternative
