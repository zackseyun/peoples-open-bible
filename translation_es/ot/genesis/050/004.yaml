translation:
  language: es
  text: 'Cuando pasaron los días de su luto[a], José habló a la casa de Faraón, diciendo: «Si ahora he hallado favor ante ustedes, por favor, hablen a oídos de Faraón[b], diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los días de su llanto»; el contexto funerario favorece «luto» o «duelo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en los oídos de Faraón», un modismo que significa «para que Faraón lo oiga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: had passed
  chosen_spanish: pasaron
  alternatives_spanish:
  - habían pasado
  - transcurrieron
  lexicon: HALOT
  rationale: עבר aquí expresa el transcurrir de un período de tiempo. En español, «pasaron» reproduce bien esa idea sin forzar una perífrasis innecesaria en una narración secuencial.
- source_word: יְמֵי בְכִיתוֹ
  english_pob_choice: the days of his mourning
  chosen_spanish: los días de su luto
  alternatives_spanish:
  - los días de su llanto
  - sus días de duelo
  lexicon: HALOT
  rationale: בכי puede significar llanto, pero en este contexto funerario el sentido idiomático es el período de duelo. «Luto» comunica esa carga ritual y emotiva con naturalidad en español.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: דבר indica hablar o dirigirse con palabras. «Habló» conserva el valor verbal general y encaja con la construcción siguiente.
- source_word: אֶל בֵּית פַּרְעֹה
  english_pob_choice: to Pharaoh’s household
  chosen_spanish: a la casa de Faraón
  alternatives_spanish:
  - a la corte de Faraón
  - a la casa real de Faraón
  lexicon: HALOT
  rationale: בית mantiene la imagen de «casa», pero aquí designa el ámbito de la casa real o del personal del palacio. «Casa de Faraón» es fiel al hebreo y entendible en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma de infinitivo introductorio se rinde naturalmente con «diciendo» para marcar la continuación del discurso.
- source_word: אִם נָא
  english_pob_choice: If I have now
  chosen_spanish: Si ahora
  alternatives_spanish:
  - Si de verdad
  - Si por favor
  lexicon: HALOT
  rationale: נָא añade cortesía/súplica. En esta primera ocurrencia, como en el inglés POB, se suaviza con «ahora» dentro de la cláusula condicional, reservando la petición explícita para el siguiente imperativo.
- source_word: מָצָאתִי חֵן בְּעֵינֵיכֶם
  english_pob_choice: found favor in your eyes
  chosen_spanish: he hallado favor ante ustedes
  alternatives_spanish:
  - he hallado gracia a sus ojos
  - he encontrado favor en sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para obtener favor/aprobación. «Ante ustedes» comunica en español la evaluación favorable, evitando una literalidad rígida de «en sus ojos» sin perder la imagen relacional.
- source_word: דַּבְּרוּ נָא
  english_pob_choice: please speak
  chosen_spanish: por favor hablen
  alternatives_spanish:
  - les ruego que hablen
  - por favor, hablen
  lexicon: HALOT
  rationale: El plural imperativo con נָא pide una solicitud cortés. «Por favor hablen» expresa bien esa entreaty en español y conserva el plural.
- source_word: בְּאָזְנֵי פַרְעֹה
  english_pob_choice: in Pharaoh’s hearing
  chosen_spanish: en oídos de Faraón
  alternatives_spanish:
  - a oídos de Faraón
  - en presencia de Faraón
  lexicon: HALOT
  rationale: 'La frase hebrea es idiomática: habla de decir algo de modo que Faraón lo oiga. Se conserva la imagen corporal de «oídos» porque el POB inglés también la mantiene de forma transparente.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y diciendo
  lexicon: HALOT
  rationale: Se mantiene como marcador de discurso citado, dejando la frase abierta porque el contenido continúa en el versículo siguiente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado auditado más reciente del texto inglés POB y conserva su solución de estructura temporal, el valor idiomático de «favor en tus/ustedes ojos» y la apertura del discurso hacia el versículo siguiente, sin introducir cambios no atestiguados por el expediente.
  spanish_consistency_notes:
  - Se usó «Faraón» de manera consistente para פַּרְעֹה.
  - Se prefirió «luto» por el contexto funerario, manteniendo una alternativa textual en nota.
  - Se evitó «SEÑOR» o fórmulas tradicionales no presentes en el verso.
  - La cita queda abierta porque el hebreo continúa en el versículo siguiente.
