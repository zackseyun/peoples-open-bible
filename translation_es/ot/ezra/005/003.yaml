base_translation:
  language: en
  yaml_path: translation/ot/ezra/005/003.yaml
  text: 'At that time Tattenai[a], the governor of Beyond the River[c][b], and Shethar-bozenai and their associates came to them and spoke thus to them: “Who gave you a decree to build this house and to complete this structure?”'
  footnotes:
  - marker: a
    text: Or 'Who gave you a command/decree to build this house and to finish this structure?' The Aramaic טְעֵם can denote an official order or decree.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative name for the region west of the Euphrates.'
    reason: cultural_note
  - marker: c
    text: The term rendered 'structure' may refer more specifically to the temple's building work; some understand it as 'wall' or 'framework.'
    reason: lexical_alternative
