translation:
  language: es
  text: Pero nosotros, Antíoco, persuadidos por una ley divina, regimos nuestra vida por ella, y consideramos que ninguna compulsión es más fuerte que la obediencia a nuestra ley.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θείῳ
  english_pob_choice: divine
  chosen_spanish: divina
  alternatives_spanish:
  - de Dios
  - godly
  lexicon: LSJ
  rationale: El adjetivo modifica a νόμῳ y señala el carácter divino de la ley. «Divina» es natural en español y conserva la afirmación sin precisar más de lo que el griego expresa.
- source_word: πεπεισμένοι
  english_pob_choice: being persuaded
  chosen_spanish: persuadidos
  alternatives_spanish:
  - convencidos
  - habiendo sido persuadidos
  lexicon: LSJ
  rationale: El participio perfecto pasivo de πείθω expresa un estado resultante. «Persuadidos» conserva ese estado de manera idiomática en español y evita una paráfrasis más larga.
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: LSJ
  rationale: En este contexto macabeo νόμος remite a la ley judía/Torá. «Ley» es la equivalencia transparente y reconoce el valor comunitario y normativo del término.
- source_word: πολιτευόμεθα
  english_pob_choice: order our lives by it
  chosen_spanish: ordenamos nuestra vida por ella
  alternatives_spanish:
  - vivimos conforme a ella
  - guiamos nuestra vida por ella
  lexicon: LSJ
  rationale: El verbo puede referirse a vivir o conducirse como miembro de una comunidad política. «Ordenamos nuestra vida por ella» conserva la idea de conducta regulada por la ley sin introducir una imagen demasiado técnica.
- source_word: οὐδεμίαν ἀνάγκην
  english_pob_choice: no compulsion
  chosen_spanish: ninguna compulsión
  alternatives_spanish:
  - ninguna necesidad
  - ninguna coacción
  lexicon: LSJ
  rationale: Aquí ἀνάγκη tiene sentido de presión coercitiva. «Compulsión» comunica bien esa fuerza impuesta por el tirano y sigue de cerca la fuerza del griego.
- source_word: βιαιοτέραν
  english_pob_choice: stronger
  chosen_spanish: más fuerte
  alternatives_spanish:
  - más violenta
  - más coercitiva
  lexicon: LSJ
  rationale: El comparativo de βίαιος apunta a fuerza coercitiva. «Más fuerte» funciona naturalmente con «compulsión» en español y preserva la comparación sin exagerar el matiz.
- source_word: τῆς πρὸς τὸν νόμον ἡμῶν εὐπειθείας
  english_pob_choice: than obedience to our law
  chosen_spanish: que la obediencia a nuestra ley
  alternatives_spanish:
  - que el cumplimiento de nuestra ley
  - que la sumisión dócil a nuestra ley
  lexicon: LSJ
  rationale: εὐπείθεια denota disposición a obedecer o conformidad obediente. «Obediencia» es la equivalencia más clara y solemne; mantiene el contraste entre coerción externa y fidelidad a la ley.
theological_decisions:
- issue: Carácter divino de la ley
  english_pob_reading: a divine law
  chosen_spanish_reading: una ley divina
  alternative_spanish_readings:
  - la ley divina
  - una ley de Dios
  rationale: El griego θείῳ νόμῳ es anartro y puede entenderse cualitativamente. «Una ley divina» preserva esa forma sin convertirla en una fórmula más interpretativa de lo que exige el texto.
  doctrine_reference: Primacía del texto original; mantener las tensiones semánticas sin resolverlas artificialmente.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente: usa un presente participial natural («persuadidos») y evita añadir posesivos o explicaciones que no están en el griego, especialmente en la cláusula final sobre la obediencia a la ley.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto no usa κύριος.
  - Se mantuvo «ley»/«nuestra ley» para νόμος en coherencia con el contexto macabeo.
  - No se usó «Cristo» ni terminología cristológica ajena al pasaje.
  - «Compulsión» se eligió para mantener el valor coercitivo de ἀνάγκη.
