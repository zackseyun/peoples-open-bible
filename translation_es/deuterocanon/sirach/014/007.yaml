translation:
  language: es
  text: Aun si hace el bien[a], lo hace con olvido, y al final revela su maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo hace de manera olvidadiza» o «lo hace como si estuviera olvidado»; el griego dice literalmente «con/en olvido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἂν
  english_pob_choice: Even if
  chosen_spanish: Aun si
  alternatives_spanish:
  - Aunque
  - Y si
  lexicon: LSJ
  rationale: La forma concesiva pide una construcción natural en español que conserve la fuerza de concesión de κἂν; «Aun si» reproduce bien el matiz de posibilidad concedida sin afirmar la condición.
- source_word: εὖ ποιῇ
  english_pob_choice: does good
  chosen_spanish: hace el bien
  alternatives_spanish:
  - obra bien
  - hace algo bueno
  lexicon: LSJ
  rationale: εὖ ποιέω expresa hacer el bien o actuar benéficamente. «Hace el bien» es idiomático en español y mantiene el valor moral de la acción.
- source_word: ἐν λήθῃ
  english_pob_choice: in forgetfulness
  chosen_spanish: en el olvido
  alternatives_spanish:
  - olvidadamente
  - como olvidado
  - sin recordar
  lexicon: LSJ
  rationale: La expresión es literalmente «en olvido/olvido-oblivión». «En el olvido» conserva la imagen de λήθη y la ambigüedad entre descuido, falta de memoria o quedar como olvidado.
- source_word: ποιεῖ
  english_pob_choice: he does it
  chosen_spanish: lo hace
  alternatives_spanish:
  - obra así
  - lo realiza
  lexicon: LSJ
  rationale: El verbo repetido retoma la acción previa; «lo hace» preserva la referencia implícita sin recargar la frase.
- source_word: ἐπʼ ἐσχάτων
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - al último
  - por último
  - en el fin
  lexicon: LSJ
  rationale: Es un modismo temporal de culminación. «Al final» es natural y fiel al sentido de desenlace.
- source_word: ἐκφαίνει
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - pone de manifiesto
  - saca a luz
  - muestra
  lexicon: LSJ
  rationale: El verbo significa sacar a la luz o manifestar. «Revela» es claro y conserva la idea de exposición moral.
- source_word: τὴν κακίαν αὐτοῦ
  english_pob_choice: his evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su perversidad
  - su malicia
  lexicon: LSJ
  rationale: κακία puede abarcar maldad, wickedness o malicia. «Maldad» expresa bien la cualidad moral negativa sin restringirla solo a malicia hostil.
translation_notes:
  revision_awareness: El texto griego concuerda sustancialmente con el audit trail inglés; no se aplicaron revisiones posteriores que alteren la traducción propuesta.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros términos no pertinentes, ya que el verso no contiene el nombre divino ni cristología explícita.
  - Se mantuvo el paralelismo verbal con «hace ... revela» para reflejar la repetición de ποιεῖ y el contraste moral final.
  - «Maldad» se eligió por amplitud semántica equivalente al inglés POB «evil» y al griego κακία.
