revisions:
- from: No estés entre los que estrechan la mano[a], entre los que se hacen fiadores de deudas.
  to: No estés entre los que dan la mano[a], entre los que salen fiadores de deudas.
  rationale: Se cambia 'estrechan la mano' por 'dan la mano' para evitar la lectura predominante de saludo y acercarse mejor al gesto de compromiso económico que expresa el hebreo. Se prefiere 'salen fiadores' por su idiomaticidad jurídica en español, manteniendo fielmente la idea de hacerse responsable por deudas ajenas. La nota se actualiza para conservar la alternativa auditada 'en prenda'/'préstamos'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura prohibitiva y el sentido de asociación con dos grupos: quienes realizan el gesto de prenda y quienes salen de garantes por obligaciones ajenas. Sin embargo, ''estrechan la mano'' en español moderno se oye principalmente como saludo y debilita el matiz de gesto legal/financiero de תקע כף. El resto, especialmente ''fiadores de deudas'', sigue adecuadamente el hebreo y la auditoría inglesa.'
  spanish_quality_summary: El español es claro y natural, pero 'estrechan la mano' introduce una lectura cotidiana impropia del contexto sapiencial sobre fianzas. Una pequeña reparación mejora la precisión sin volver el texto tosco. 'Dan la mano en prenda' conserva la imagen corporal y explicita el marco de garantía. 'salen fiadores de deudas' suena idiomático y jurídico sin rigidez excesiva.
  glossary_alignment: No hay términos teológicos mayores en este versículo. La decisión sobre surety está bien alineada con el proyecto al mantener 'fiador'. La única excepción necesaria es ajustar la expresión del gesto de תקע כף para evitar un falso amigo idiomático en español.
  issues:
  - severity: medium
    issue: '''estrechan la mano'' sugiere saludo más que compromiso de prenda'
    rationale: Aunque puede captar el gesto físico, en español actual normalmente significa saludar o cerrar un acuerdo de modo general, no específicamente asumir una fianza. El hebreo y la nota inglesa apuntan a 'strike hands in pledge'.
  - severity: low
    issue: La nota alternativa queda mejor si refleja el ajuste principal
    rationale: Si se corrige el texto base, la nota debe conservar la alternativa documentada sin crear desajuste entre texto y nota.
  revised_spanish_text: No estés entre los que dan la mano[a], entre los que salen fiadores de deudas.
  revised_footnotes:
