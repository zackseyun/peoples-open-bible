translation:
  language: es
  text: Una oración del afligido cuando desfallece[a] y derrama delante de Yahvé su lamento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando se ve abrumado» para «cuando desfallece».
    reason: lexical_alternative
  - marker: b
    text: O «su meditación» o «su queja» para «su lamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Una oración
  alternatives_spanish:
  - Oración
  lexicon: HALOT
  rationale: Como encabezado nominal, el español requiere naturalmente un artículo indefinido. «Oración» conserva el sustantivo simple sin añadir sentido ajeno al hebreo.
- source_word: לְעָנִי
  english_pob_choice: of the afflicted one
  chosen_spanish: del afligido
  alternatives_spanish:
  - del pobre
  - del oprimido
  - del afligido uno
  lexicon: HALOT
  rationale: El sustantivo עָנִי puede abarcar aflicción, opresión o pobreza. «Afligido» refleja bien el campo semántico en un contexto de lamentación, y el artículo sustantivado en español evita forzar un masculino explícito añadido.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - que
  lexicon: HALOT
  rationale: En este encabezado introduce la circunstancia temporal de la oración, por lo que «cuando» expresa mejor el valor contextual que una causalidad.
- source_word: יַעֲטֹף
  english_pob_choice: he grows faint
  chosen_spanish: desfallece
  alternatives_spanish:
  - se consume
  - se agota
  - se ve abrumado
  lexicon: HALOT
  rationale: El verbo puede transmitir debilidad, desfallecimiento o abatimiento. «Desfallece» es natural en español y mantiene la imagen de flaquear sin sobreespecificar la emoción.
- source_word: וְלִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la relación espacial y relacional de לִפְנֵי. Se conserva «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - derram[a]
  - vacía
  - expone
  lexicon: HALOT
  rationale: El verbo mantiene la metáfora de volcar o derramar lo interior en la presencia divina. «Derrama» es idiomático y fiel.
- source_word: שִׂיחוֹ
  english_pob_choice: his complaint
  chosen_spanish: su lamento
  alternatives_spanish:
  - su queja
  - su meditación
  - su gemido
  lexicon: HALOT
  rationale: שִׂיחַ puede ser meditación, queja o lamento. En un marco de dolor y súplica, «lamento» conserva el tono de elegía sin limitarse a una queja meramente verbal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se lo vierte como «Yahvé» en el cuerpo del texto para preservar el nombre pactual de Dios, en lugar de ocultarlo con una sustitución convencional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: mantiene el valor circunstancial de כִּי, la imagen verbal de יִשְׁפֹּךְ y la ambigüedad controlada de שִׂיחוֹ. También respeta la revisión aplicada en el inglés que prefirió una forma no marcada por género para לְעָנִי.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el criterio terminológico del proyecto para יְהוָה.
  - «Afligido» funciona aquí como sustantivo sustantivado en español y evita añadir una especificación de género no exigida por el hebreo.
  - «Lamento» conserva el registro poético del salmo y deja abierta, en nota, la alternativa semántica de «queja» o «meditación».
