review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: guardar todos los estatutos y juicios, hacerlos, y el propósito de que la tierra no los vomite. También preserva la personificación fuerte de la tierra. Sin embargo, hay dos puntos mejorables para mayor fidelidad e idiomaticidad: «Así que guardarán» suena más predictivo que exhortativo en español, y «a la cual yo los llevo» debilita el matiz participial de acción en curso mejor expresado como «estoy llevando» o «llevo».'
  spanish_quality_summary: 'El texto es generalmente claro y de registro digno, pero «los harán» y especialmente «mis juicios» suenan algo rígidos en español eclesial contemporáneo. Como el proyecto quiere preservar la distinción léxica, «juicios» puede mantenerse con nota, pero conviene suavizar la sintaxis global. «Para que» funciona, aunque «de modo que no» sería más natural; no obstante, no es necesario cambiarlo. La mejora principal es usar una forma exhortativa más natural: «Así que guarden… y cúmplanlos» o «… y háganlos».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La distinción entre חֻקּוֹת y מִשְׁפָּטִים se conserva. La metáfora de קיא se mantiene correctamente con «vomite».
  issues:
  - severity: medium
    issue: «Así que guardarán» suena principalmente futuro declarativo, no exhortación normativa.
    rationale: El hebreo en este contexto legal-covenantal tiene fuerza mandatoria. En español bíblico natural, «guarden» o «deben guardar» comunica mejor la exhortación que «guardarán».
  - severity: medium
    issue: «a la cual yo los llevo» es menos natural y expresa peor la acción en curso de מֵבִיא.
    rationale: El participio hebreo señala la acción divina actual/progresiva. «a la cual yo los estoy llevando» o «adonde yo los llevo» lo refleja mejor y suena más idiomático.
  - severity: low
    issue: La nota [a] está anclada solo en «juicios», aunque comenta dos términos legales.
    rationale: No es incorrecto, pero sería más claro anclar la nota al sintagma completo «estatutos y juicios[a]» como ya está, manteniendo la explicación de ambos términos.
  revised_spanish_text: Así que guarden todos mis estatutos y todos mis juicios[a], y háganlos, para que la tierra a la cual yo los estoy llevando para habitar en ella no los vomite[b].
  revised_footnotes:
