lexical_decisions:
- source_word: עַד
  english_pob_choice: yet
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - hasta
  lexicon: HALOT
  rationale: En este contexto promesivo, עַד expresa que la acción de Dios todavía se cumplirá. «Aún» conserva esa fuerza prospectiva sin sonar incompleto como un simple «hasta» en español.
- source_word: יְמַלֵּה
  english_pob_choice: he will fill
  chosen_spanish: llenará
  alternatives_spanish:
  - llena
  - pueda llenar
  lexicon: HALOT
  rationale: 'El piel imperfecto con sujeto implícito en el contexto se rinde naturalmente con futuro: «llenará». Mantiene el valor de promesa y la imagen concreta de llenura.'
- source_word: שְׂחוֹק
  english_pob_choice: laughter
  chosen_spanish: risa
  alternatives_spanish:
  - laughter (préstamo innecesario)
  - alegría
  - burla
  lexicon: HALOT
  rationale: El sustantivo denota risa; «risa» es el equivalente natural en español y preserva la imagen corporal del texto. «Alegría» sería más abstracto y «burla» introduciría una connotación no sustentada aquí.
- source_word: פִּיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu boca
  - tu boca y tu hablar
  lexicon: HALOT
  rationale: Se conserva el sustantivo corporal literal. En español «boca» suena más natural que «mouth» traducido de forma rígida y mantiene la imagen de ser llenada.
- source_word: וּשְׂפָתֶיךָ
  english_pob_choice: and your lips
  chosen_spanish: y tus labios
  alternatives_spanish:
  - y tu habla
  - y tus palabras
  lexicon: HALOT
  rationale: La paralelismo poético con «tu boca» se mantiene con la referencia literal a los labios. «Habla» o «palabras» aplanarían la imagen física del hebreo.
- source_word: תְרוּעָה
  english_pob_choice: shouting
  chosen_spanish: gritos de júbilo
  alternatives_spanish:
  - clamor
  - exclamaciones de alegría
  - gritos
  lexicon: HALOT
  rationale: El término puede abarcar un clamor alto, muchas veces de gozo o triunfo. «Gritos de júbilo» conserva el sentido de voz elevada y explicita el matiz positivo sugerido por el contexto sin volverlo demasiado interpretativo.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: The subject is rendered as 'he,' referring to God from the immediate context.
  chosen_spanish_reading: Se mantiene el sujeto explícito «Él», refiriéndolo a Dios por el contexto inmediato.
  alternative_spanish_readings:
  - Tu boca será llenada de risa
  - Dios llenará tu boca de risa
  rationale: En Job 8:20 el hablante sigue refiriéndose a Dios como agente; conservar «Él» preserva la continuidad del argumento y la responsabilidad divina de la restauración. «Dios» sería más explícito, pero el pronombre respeta mejor el hilo del discurso y la forma verbal hebrea.
  doctrine_reference: 'Translation philosophy: primacía de la fuente original; preservar el sujeto teológico implícito cuando el contexto lo identifica claramente.'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la propuesta inglesa; no se documentaron revisiones textuales que alteren la línea principal. La nota alternativa reproduce la ambigüedad semántica de עַד observada en el aparato inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el texto principal del proyecto, pero aquí el sujeto está pronominalizado por continuidad contextual, tal como en el hebreo y en la versión inglesa auditada.
  - Se evitó «SEÑOR» como sustituto, siguiendo la política del proyecto para el Tetragrámaton cuando aparece explícito.
