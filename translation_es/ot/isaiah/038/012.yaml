review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general bien el sentido del hebreo y del POB inglés: conserva la imagen de la morada/tienda desmontada, la metáfora del tejido, y el cambio poético de tercera a segunda persona. También preserva adecuadamente las alternativas léxicas en notas. Sin embargo, hay varios puntos donde el español no refleja con precisión o naturalidad el sentido documentado.'
  spanish_quality_summary: 'La base es comprensible, pero hay giros poco naturales o inexactos en español: «como tienda de pastor» suena incompleto sin artículo; «mi vida como tejedor» deja ambiguo el comparante; «él me corta» queda demasiado absoluto frente a «cuts me off»; y «tú me llevas a su fin» es poco idiomático y además introduce un posesivo («su») sin referente claro. Se puede mejorar la fluidez sin perder literalidad.'
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas sobre «morada», «telar» y el mantenimiento del cambio de sujeto son compatibles con el expediente inglés. La principal necesidad es ajustar formulaciones españolas para reflejar mejor esas mismas decisiones.
  issues:
  - severity: medium
    issue: «como tienda de pastor»
    rationale: Aunque entendible, en español suena más natural y digno «como la tienda de un pastor», que además refleja mejor el valor genitivo del hebreo.
  - severity: high
    issue: «he enrollado mi vida como tejedor»
    rationale: 'La frase es poco idiomática y puede leerse como si el hablante fuera tejedor. El sentido documentado es manejar/enrollar la vida como obra de un tejedor; conviene explicitar ligeramente la comparación: «he enrollado mi vida como un tejedor».'
  - severity: medium
    issue: «él me corta»
    rationale: No transmite bien el matiz de «cuts me off» documentado en el POB. En español bíblico natural, «él me corta» suena incompleto; «él me corta de allí» o mejor «él me corta» con complemento contextual sería posible, pero la opción más fiel y natural aquí es «él me corta» solo si el contexto inmediato lo sostiene. Dado el paralelo, «él me corta» sigue siendo débil; «él me corta del telar» sobretraduce. Conviene «él me corta» solo si se mantiene la preposición previa «desde el telar», pero el conjunto mejora con puntuación más clara.
  - severity: high
    issue: «tú me llevas a su fin»
    rationale: Es gramaticalmente extraño e introduce un posesivo de referente confuso. El hebreo y el POB inglés significan «tú me llevas a mi fin / me llevas al fin / me pones fin». La formulación actual no es buen español ni fiel al objeto directo implícito.
  - severity: low
    issue: Nota c no reproduce del todo la alternativa inglesa
    rationale: 'La nota dice «desde la urdimbre / los hilos colgantes», pero la alternativa inglesa conserva explícitamente la idea verbal: «from the thrum/warp he cuts me off». Conviene que la nota española mantenga la frase completa para mayor claridad.'
