    issue: 'La nota [a] del borrador («O: “sobre tu corazón”») es espuria y no refleja ninguna alternativa significativa del expediente.'
    rationale: El inglés auditado usa la nota a para una alternativa sobre «Sheol / grave», no para «upon your heart». La nota actual no añade información útil y desordena la correspondencia del aparato crítico.
  - severity: medium
    issue: Falta en español la nota que preserve la alternativa interpretativa de «Sheol / el sepulcro / la tumba» en la cláusula «los celos tan inexorables como el Seol».
    rationale: El expediente inglés conserva explícitamente esa alternativa; el revisor español debe mantenerla, especialmente porque «Seol» puede requerir aclaración para lectores hispanohablantes.
  - severity: low
    issue: La asignación de marcadores debe reorganizarse para que las notas aparezcan donde corresponden en el texto revisado.
    rationale: El proyecto exige marcadores únicos y anclados exactamente en la frase pertinente.
