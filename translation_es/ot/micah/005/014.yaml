revisions:
- from: Y haré venganza en ira y furor sobre las naciones que no han escuchado[a].
  to: Y ejecutaré venganza en ira y furor sobre las naciones que no han escuchado[a].
  rationale: Se reemplaza «haré venganza» por «ejecutaré venganza» para expresar de manera natural en español el modismo hebreo עשה + נקם y conservar la fuerza judicial del original y del POB inglés. No se requieren otros cambios.
