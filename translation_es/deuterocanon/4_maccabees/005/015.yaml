lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: having received
  chosen_spanish: habiendo recibido
  alternatives_spanish:
  - habiendo tomado
  - habiendo obtenido
  lexicon: BDAG
  rationale: 'El participio aoristo de λαμβάνω introduce una circunstancia anterior al verbo principal. En español, «habiendo recibido» comunica con naturalidad la recepción de una autorización, coherente con la revisión inglesa que prefirió «received permission». '
- source_word: ἐξουσίαν
  english_pob_choice: permission
  chosen_spanish: permiso
  alternatives_spanish:
  - autorización
  - derecho
  - autoridad
  lexicon: BDAG
  rationale: 'En este contexto de habla pública, ἐξουσία puede indicar autoridad, derecho o permiso. «Permiso» expresa bien la idea de licencia concedida para hablar sin forzar una noción más institucional de poder. '
- source_word: τοῦ λέγειν
  english_pob_choice: to speak
  chosen_spanish: para hablar
  alternatives_spanish:
  - de hablar
  - para decir
  lexicon: BDAG
  rationale: 'El infinitivo articular expresa el ámbito de la autorización. En español, «para hablar» es la forma más natural y clara para esa función. '
- source_word: ἤρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: 'ἤρξατο tiene sentido inceptivo estándar. «Comenzó» mantiene el registro formal y la fluidez del español. '
- source_word: δημηγορεῖν
  english_pob_choice: to address the assembly
  chosen_spanish: a dirigirse a la asamblea
  alternatives_spanish:
  - a hacer uso de la palabra ante la asamblea
  - a hablar ante la asamblea
  - a dirigirse al pueblo
  lexicon: LSJ
  rationale: 'El verbo implica hablar en público ante un conjunto reunido. «Dirigirse a la asamblea» conserva el matiz cívico/público sin cargarlo con tono peyorativo o demasiado técnico. '
- source_word: οὕτως
  english_pob_choice: as follows
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de la siguiente manera
  lexicon: BDAG
  rationale: 'La palabra introduce el discurso que sigue. En español, «así» es breve y natural al final de la frase introductoria. '
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «taken the right to speak» a «received permission to speak» por mayor naturalidad y precisión al reflejar λαβὼν ... ἐξουσίαν. En español se siguió esa línea con «habiendo recibido permiso para hablar», manteniendo el registro formal y el valor público de δημηγορεῖν.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o lenguaje de reverencia no presente en el texto.
  - Se preservó el carácter formal y público de la escena con «asamblea».
  - No hay tensión teológica específica en este versículo; la decisión principal es léxica y pragmática.
