translation:
  language: es
  text: 'Yo también les haré esto: haré venir sobre ustedes un terror repentino[a], una enfermedad debilitante[b] y fiebre, que consumen los ojos[c] y agotan la vida; sembrarán su semilla en vano, y sus enemigos la comerán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pondré sobre ustedes un terror repentino». El verbo hebreo también puede expresar la idea de imponer o hacer venir un juicio sobre alguien.'
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «consunción». El término exacto de la enfermedad es incierto; el hebreo probablemente se refiere de manera más general a una enfermedad que debilita o consume.
    reason: lexical_alternative
  - marker: c
    text: 'O: «que hacen desfallecer los ojos y consumen la vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף אֲנִי
  english_pob_choice: I also
  chosen_spanish: Yo también
  alternatives_spanish:
  - yo incluso
  - también yo
  lexicon: HALOT
  rationale: אַף con el pronombre independiente añade énfasis y continuación. «Yo también» reproduce bien esa fuerza en español natural, sin perder el matiz de réplica judicial.
- source_word: אֶעֱשֶׂה זֹּאת לָכֶם
  english_pob_choice: will do this to you
  chosen_spanish: haré esto contra ustedes
  alternatives_spanish:
  - haré esto para ustedes
  - haré tal cosa contra ustedes
  lexicon: HALOT
  rationale: En este contexto de juicio, לָכֶם pide dirección adversa; «contra ustedes» comunica mejor la intención punitiva en español que un simple «a ustedes».
- source_word: וְהִפְקַדְתִּי עֲלֵיכֶם
  english_pob_choice: I will appoint over you
  chosen_spanish: pondré sobre ustedes
  alternatives_spanish:
  - haré venir sobre ustedes
  - visitaré sobre ustedes
  lexicon: HALOT
  rationale: El hiphil de פקד puede expresar poner, encomendar o imponer algo sobre alguien. «Pondré sobre ustedes» conserva el sentido de asignar/imponer un castigo sin forzar una fórmula demasiado literal.
- source_word: בֶּהָלָה
  english_pob_choice: sudden terror
  chosen_spanish: un terror repentino
  alternatives_spanish:
  - terror súbito
  - pánico repentino
  - consternación repentina
  lexicon: HALOT
  rationale: La palabra denota terror/pánico con idea de irrupción inesperada. «Repentino» mantiene el golpe abrupto que el hebreo sugiere.
- source_word: הַשַּׁחֶפֶת
  english_pob_choice: wasting disease
  chosen_spanish: una enfermedad que consume
  alternatives_spanish:
  - enfermedad de desgaste
  - consunción
  lexicon: HALOT
  rationale: El término antiguo es incierto; en español moderno «enfermedad que consume» comunica el rasgo de desgaste sin especificar indebidamente una dolencia moderna.
- source_word: הַקַּדַּחַת
  english_pob_choice: fever
  chosen_spanish: fiebre
  alternatives_spanish:
  - fiebre ardiente
  - ardor febril
  lexicon: HALOT
  rationale: El sustantivo apunta a fiebre/ardor febril. «Fiebre» es claro y fiel; el contexto ya aporta el matiz de violencia de la enfermedad.
- source_word: מְכַלּוֹת עֵינַיִם
  english_pob_choice: consuming the eyes
  chosen_spanish: que consumen los ojos
  alternatives_spanish:
  - que hacen fallar los ojos
  - que desgastan la vista
  lexicon: HALOT
  rationale: 'Se conserva la imagen verbal del hebreo: algo que va consumiendo la capacidad visual. «Los ojos» es más literal que «la vista», aunque ambas son posibles.'
- source_word: וּמְדִיבֹת נָפֶשׁ
  english_pob_choice: draining the life
  chosen_spanish: y desgastan la vida
  alternatives_spanish:
  - y agotan la vida
  - y consumen el ánimo
  - y secan el alma
  lexicon: HALOT
  rationale: נפש aquí se entiende como vida/vitalidad, no como una afirmación doctrinal sobre el alma. «Desgastan la vida» mantiene el paralelismo con «consumen los ojos» y la idea de agotamiento vital.
- source_word: וּזְרַעְתֶּם לָרִיק זַרְעֲכֶם
  english_pob_choice: you will sow your seed in vain
  chosen_spanish: sembrarán su semilla en vano
  alternatives_spanish:
  - sembrarán su semilla para nada
  - plantarán su semilla inútilmente
  lexicon: HALOT
  rationale: לָרִיק expresa vaciedad/ineficacia. «En vano» es idiomático y fiel; «semilla» conserva la imagen agrícola del hebreo.
- source_word: וַאֲכָלֻהוּ אֹיְבֵיכֶם
  english_pob_choice: and your enemies will eat it
  chosen_spanish: y sus enemigos la comerán
  alternatives_spanish:
  - y sus enemigos la devorarán
  - y la comerán sus enemigos
  lexicon: HALOT
  rationale: Se mantiene la coordinación simple del hebreo con «y». «La comerán» preserva la imagen agrícola de consumo del producto sembrado, sin añadir causalidad.
theological_decisions:
- issue: Rendering of נָפֶשׁ in a curse context
  english_pob_reading: draining the life
  chosen_spanish_reading: desgastan la vida
  alternative_spanish_readings:
  - desgastan el alma
  - agotan el espíritu
  - consumen la vida
  rationale: Para no importar una antropología posterior, נֶפֶשׁ se entiende como vida/vitalidad en un contexto de enfermedad y juicio. «Vida» preserva el valor del hebreo sin sugerir una doctrina del alma separada del cuerpo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Retaining the agricultural image of the final colon
  english_pob_reading: and your enemies will eat it
  chosen_spanish_reading: y sus enemigos la comerán
  alternative_spanish_readings:
  - y sus enemigos la devorarán
  - y será comida por sus enemigos
  rationale: El hebreo presenta la pérdida de la cosecha con una imagen concreta de consumo. En español, conservar el verbo «comer» mantiene esa figura sin suavizarla ni interpretarla.
  doctrine_reference: Translation philosophy §2
- issue: Scope of the judgment formula
  english_pob_reading: I also will do this to you
  chosen_spanish_reading: Yo también haré esto contra ustedes
  alternative_spanish_readings:
  - Yo también haré esto a ustedes
  - También yo haré esto
  rationale: La cláusula introduce retribución pactual. «Contra ustedes» explicita la dirección adversa del castigo sin agregar contenido ajeno al texto.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «for your enemies will eat it» por «and your enemies will eat it» para seguir más de cerca la conjunción hebrea. Esta versión española también evita una causalidad añadida y mantiene la coordinación simple con «y».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto, aunque este versículo no lo contiene.
  - Se usa «vida» para נָפֶשׁ en sentido de vitalidad afectada por la enfermedad, conforme al enfoque auditado.
  - Se conserva la imagen agrícola del último colon con «semilla» y «comerán», evitando una paráfrasis explicativa.
