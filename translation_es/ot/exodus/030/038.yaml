revisions:
- from: Cualquiera que haga algo igual para olerlo[a] será eliminado[b] de entre su pueblo.
  to: Cualquiera que haga algo semejante para olerlo[a] será cortado[b] de entre su pueblo.
  rationale: Se ajusta la sanción a una formulación más cercana a la expresión legal hebrea y a la decisión auditada del inglés POB de conservar la tensión interpretativa. También se mejora la naturalidad de כָמֹהָ con «algo semejante».
