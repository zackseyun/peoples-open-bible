- from: Entonces me acercaré a ustedes para el juicio[a], y seré un testigo veloz contra los hechiceros, contra los adúlteros, contra los que juran en falso, contra los que oprimen el salario de un jornalero, la viuda y el huérfano, y los que hacen torcer al forastero[b], y no me temen, dice Yahvé de los Ejércitos[c].
  to: Entonces me acercaré a ustedes para juicio[a], y seré un testigo pronto contra los hechiceros, contra los adúlteros, contra los que juran en falso, contra los que oprimen el salario de un jornalero, la viuda y el huérfano, y contra los que apartan al forastero[b], y no me temen, dice Yahvé de los Ejércitos[c].
  rationale: Se corrigió la cláusula sobre גֵר para reflejar mejor el sentido hebreo de apartar/desviar al forastero en un contexto de injusticia, evitando una construcción española poco natural y ambigua. Se ajustaron «para juicio» y «testigo pronto» por mayor naturalidad y dignidad sin perder el valor forense. También se corrigió la nota tradicional final para que realmente preserve una alternativa distinta del texto principal.
