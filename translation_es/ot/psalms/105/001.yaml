review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imperativa hebrea y las decisiones principales: «Den gracias» por הוֹדוּ, «invoquen su nombre» por קִרְאוּ בִּשְׁמוֹ, «den a conocer» por הוֹדִיעוּ, y «entre los pueblos» por בָעַמִּים. También respeta correctamente la política del proyecto al usar «Yahvé» para יהוה. La única desviación relevante es «sus hazañas» para עֲלִילוֹתָיו, que intensifica el sentido hacia actos heroicos o proezas; el hebreo y la auditoría inglesa prefieren un término más amplio como «deeds/acts».'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «hazañas» suena más enfático y literariamente coloreado que el hebreo exige, y puede sugerir heroicidad extraordinaria más que simplemente obras o actos. «Sus obras» o «sus hechos» sería más fiel y igualmente legible. La nota al pie actual no aporta una alternativa real, porque repite la lectura principal; conviene eliminarla.
  glossary_alignment: 'Alineación general buena con el glosario del proyecto: «Yahvé» está correctamente usado en el texto principal. «Invoquen su nombre» encaja bien con קרא + בשם. No hay conflictos con otros términos doctrinales. La nota de «Yahvé» debe retirarse porque en español ya es la forma principal, no una alternativa.'
  issues:
  - severity: medium
    issue: «Sus hazañas» sobretraduce עֲלִילוֹתָיו
    rationale: עֲלִילוֹתָיו significa sus hechos/actos/obras. «Hazañas» añade un matiz de proeza heroica que no está explícito en el término y va más allá de la decisión inglesa «his deeds».
  - severity: medium
    issue: La nota [a] es innecesaria y está mal categorizada
    rationale: 'La nota dice «Hebreo: Yahvé», pero «Yahvé» ya aparece en el texto principal y además es la política española del proyecto. No preserva una alternativa textual ni aclara una ambigüedad nueva en español.'
  revised_spanish_text: Den gracias a Yahvé; invoquen su nombre; den a conocer entre los pueblos sus obras.
  revision_rationale: Se reemplaza «sus hazañas» por «sus obras» para conservar mejor el sentido amplio de עֲלִילוֹתָיו sin intensificación innecesaria. Se elimina la nota [a] porque el texto principal ya usa correctamente «Yahvé» según la política del proyecto y la nota no aporta una alternativa ni una aclaración necesaria.
