translation:
  language: es
  text: Y vino la palabra de Yahvé[a] a Zacarías, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - aconteció
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética 'la palabra de Yahvé ...', 'vino' expresa de manera natural en español la irrupción o llegada del mensaje divino sin volverlo un calco pesado de 'y fue'.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: דְּבַר en la expresión fija דְּבַר יְהוָה remite a la fórmula profética 'la palabra de Yahvé'. 'Palabra' conserva la repetición técnica del hebreo y el registro bíblico del pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español como 'Yahvé', en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal del proyecto y preserva la referencia al Tetragrámaton.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el destinatario de la revelación; 'a' es la equivalencia natural y fiel en español.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zecharías
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio bíblico para una lectura pública clara y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - y dijo
  lexicon: HALOT
  rationale: לֵאמֹר introduce discurso directo; 'diciendo' mantiene la transición formal y la apertura hacia las palabras que siguen.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El español del proyecto lo vierte como 'Yahvé' para conservar el nombre personal de Dios y no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español donde corresponde al nombre divino.
  spanish_consistency_notes:
  - 'Se mantuvo el orden y la función sintáctica del hebreo: fórmula narrativa + sujeto profético + destinatario + participio de habla.'
  - Se evitó 'el SEÑOR' en el texto principal porque el proyecto pide representar יְהוָה como 'Yahvé' en español.
  - '''Zacarías'' se normaliza como nombre propio español, mientras que el nombre divino conserva su forma distintiva del proyecto.'
