translation:
  language: es
  text: Y el sacerdote, hijo de Aarón, estará con los levitas cuando los levitas cobren el diezmo, y los levitas subirán el diezmo del diezmo[a] a la casa de nuestro Dios, a las cámaras del almacén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un diezmo del diezmo». La expresión hebrea dice literalmente «el diezmo del diezmo» y se refiere a la porción que los levitas entregan de lo que reciben.
    reason: lexical_alternative
  - marker: b
    text: O «tesorería». Aquí el sentido parece ser un espacio de guardado para los diezmos y ofrendas, no una tesorería monetaria en sentido estricto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: estará
  alternatives_spanish:
  - deberá estar
  - ha de estar
  lexicon: HALOT
  rationale: En este contexto estipulativo, la forma hebrea mira a una disposición futura o normativa. «Estará» conserva ese valor prospectivo en español sin sobrecargar el mandato.
- source_word: הַכֹּהֵן בֶּן אַהֲרֹן
  english_pob_choice: the priest, a son of Aaron
  chosen_spanish: el sacerdote, hijo de Aarón
  alternatives_spanish:
  - el sacerdote, un hijo de Aarón
  - un sacerdote aarónico
  lexicon: HALOT
  rationale: «Hijo de Aarón» refleja con fidelidad la identificación genealógica del hebreo. Se evita «aarónico» porque es más interpretativo y menos transparente al texto base.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto a
  lexicon: HALOT
  rationale: 'La idea es de acompañamiento simple: el sacerdote está presente junto con los levitas durante la recolección del diezmo.'
- source_word: בַּעְשֵׂר
  english_pob_choice: when the Levites collect the tithe
  chosen_spanish: cuando los levitas cobren el diezmo
  alternatives_spanish:
  - cuando los levitas recojan el diezmo
  - al diezmar los levitas
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la acción de diezmar/cobrar el diezmo. «Cobren» comunica bien el acto de recibir o recaudar el diezmo en español actual, manteniendo el valor funcional del contexto.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los leviitas
  lexicon: HALOT
  rationale: Término técnico y estable para el grupo cultual. «Levitas» es la forma natural y reconocible en español bíblico contemporáneo.
- source_word: יַעֲלוּ
  english_pob_choice: shall bring up
  chosen_spanish: subirán
  alternatives_spanish:
  - llevarán arriba
  - traerán arriba
  lexicon: HALOT
  rationale: El hebreo puede conservar un matiz direccional hacia el recinto sagrado. «Subirán» preserva esa imagen sin perder claridad en español.
- source_word: מַעֲשַׂר הַמַּעֲשֵׂר
  english_pob_choice: the tithe of the tithe
  chosen_spanish: el diezmo del diezmo
  alternatives_spanish:
  - la décima del diezmo
  - una décima del diezmo
  lexicon: HALOT
  rationale: La construcción hebrea es literal y técnica. «El diezmo del diezmo» conserva la forma y el sentido de la porción que los levitas entregan de lo que reciben.
- source_word: לְבֵית אֱלֹהֵינוּ
  english_pob_choice: to the house of our God
  chosen_spanish: a la casa de nuestro Dios
  alternatives_spanish:
  - a la casa de nuestro Dios
  - al templo de nuestro Dios
  lexicon: HALOT
  rationale: «Casa de nuestro Dios» reproduce la fórmula covenantal del hebreo y evita sustituirla por una equivalencia más explicativa como «templo».
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los aposentos
  - las salas
  lexicon: HALOT
  rationale: En contexto cultual, el término alude a compartimentos o cuartos de almacenamiento del complejo del templo. «Cámaras» es una forma tradicional y suficientemente precisa en español bíblico.
- source_word: לְבֵית הָאוֹצָר
  english_pob_choice: of the storehouse
  chosen_spanish: del almacén
  alternatives_spanish:
  - del depósito
  - de la casa del almacén
  lexicon: HALOT
  rationale: El contexto trata de granos, porciones y diezmos, no principalmente de dinero. «Almacén» transmite mejor la función de resguardo material que «tesorería» en español.
theological_decisions:
- issue: Sentido de אוֹצָר en un contexto de diezmos agrícolas
  english_pob_reading: storehouse
  chosen_spanish_reading: almacén
  alternative_spanish_readings:
  - tesorería
  - depósito
  rationale: El pasaje trata de productos y contribuciones cultuales almacenadas. «Almacén» evita la asociación monetaria que tendría «tesorería» y mantiene el foco material del texto.
  doctrine_reference: Administración del culto y provisión para el templo/servicio levítico.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] junto a «sacerdote» y [b] junto a «nuestro Dios». La redacción mantiene el paralelismo del hebreo y la decisión auditada de traducir אוֹצָר como espacio de almacenamiento.'
  spanish_consistency_notes:
  - Se mantuvo «casa de nuestro Dios» en lugar de «templo» para conservar la fórmula bíblica del hebreo.
  - Se usó «levitas» de manera uniforme en ambas cláusulas.
  - Se preservó «diezmo del diezmo» como forma literal y técnica.
  - «Cámaras» se emplea en sentido arquitectónico-cultual, no como metáfora moderna.
