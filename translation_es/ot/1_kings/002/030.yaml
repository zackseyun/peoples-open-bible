translation:
  language: es
  text: 'Entonces Benaías fue a la tienda de Yahvé[a] y le dijo: «Así dice el rey: “Sal”». Pero él dijo: «No, porque aquí moriré». Y Benaías llevó la respuesta de vuelta al rey, diciendo: «Así habló Joab, y así me respondió».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el tabernáculo de Yahvé». El hebreo dice «la tienda de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֶל יְהוָה
  english_pob_choice: the tent of the LORD
  chosen_spanish: la tienda de Yahvé
  alternatives_spanish:
  - el tabernáculo de Yahvé
  - la tienda del SEÑOR
  lexicon: HALOT
  rationale: אֹהֶל significa literalmente “tienda”. El audit trail inglés opta por “tent” por fidelidad al hebreo narrativo, y en español “tienda” conserva esa literalidad mejor que “tabernáculo”, que introduce una terminología más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: se translitera el nombre divino como “Yahvé” y no se lo sustituye por un título. Esto preserva el nombre personal del pacto en lugar de ocultarlo tras una convención litúrgica.'
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  english_pob_choice: Thus says the king
  chosen_spanish: Así ha dicho el rey
  alternatives_spanish:
  - Así dice el rey
  - Esto es lo que dice el rey
  lexicon: HALOT
  rationale: La fórmula mensajera hebrea se conserva con una expresión solemne y natural en español. “Así ha dicho” mantiene el tono reportivo-formal del hebreo sin forzar un calco demasiado rígido.
- source_word: צֵא
  english_pob_choice: Come out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Sal de aquí
  lexicon: HALOT
  rationale: El imperativo יצא puede expresarse por “sal” en español, que reproduce la orden de manera directa. Se evita añadir elementos no presentes en el hebreo.
- source_word: לֹא כִּי פֹה אָמוּת
  english_pob_choice: No, for I will die here
  chosen_spanish: No, porque aquí moriré
  alternatives_spanish:
  - No, pues aquí moriré
  - No; aquí moriré
  lexicon: HALOT
  rationale: 'El hebreo expresa negativa con una razón/resolución: no saldrá porque morirá en ese lugar. “Porque” comunica bien esa relación causal en español y conserva la fuerza de decisión del personaje.'
- source_word: וַיָּשֶׁב ... דָּבָר
  english_pob_choice: brought word back
  chosen_spanish: llevó la palabra
  alternatives_spanish:
  - llevó el informe
  - volvió con la respuesta
  lexicon: HALOT
  rationale: El giro hebreo שׁוּב + דָּבָר indica regresar con un informe o noticia. “Llevó la palabra” suena natural en español bíblico moderno y mantiene el valor de “palabra/mensaje” sin ampliar innecesariamente el contenido.
- source_word: כֹּה דִבֶּר יוֹאָב וְכֹה עָנָנִי
  english_pob_choice: Thus Joab spoke, and thus he answered me
  chosen_spanish: Así habló Joab, y así me respondió
  alternatives_spanish:
  - Así habló Joab, y así me contestó
  - Así habló Joab, y así me respondió a mí
  lexicon: HALOT
  rationale: Se conserva la repetición de כֹּה con “así ... y así ...” para reflejar el estilo formal de reporte exacto. “Respondió” mantiene el paralelismo con “habló” y el valor relacional del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. La lectura del POB inglés es “Yahweh”, y en español se mantiene esa decisión como “Yahvé” para preservar la transparencia auditiva y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se mantuvo la lectura ya acordada en el audit trail inglés: el nombre divino se traduce de forma transparente, אֹהֶל se rinde literalmente como “tienda”, y la fórmula reportiva se conserva con paralelismo formal sin introducir reinterpretaciones. No se detectaron revisiones pendientes en el registro fuente.'
  spanish_consistency_notes:
  - Se evitó “SEÑOR” para יְהוָה, en coherencia con la política del proyecto sobre el nombre divino.
  - “tienda” reproduce el valor concreto de אֹהֶל mejor que “tabernáculo”, aunque se deja la alternativa en nota por su uso tradicional.
  - La secuencia reportiva final conserva la repetición de “así” para reflejar el hebreo כֹּה ... וְכֹה.
