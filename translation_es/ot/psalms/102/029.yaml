translation:
  language: es
  text: Los hijos de tus siervos habitarán[a], y su descendencia quedará firme delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Los hijos de tus siervos habitarán, y su semilla quedará firme delante de ti»
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The children of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los niños de
  - Los descendientes de
  lexicon: HALOT
  rationale: El constructo plural de בֵּן puede expresar descendencia filial. En español, «hijos de» conserva la relación familiar y sigue siendo natural en un registro bíblico. «Descendientes de» suaviza el matiz filial; «niños de» sería inadecuado.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: En este contexto de dirección a Dios, «siervos» mantiene la relación de pertenencia y servicio con dignidad. «Esclavos» sería más fuerte lexicalmente, pero aquí el audit trail inglés optó por «servants»; «servidores» suena más administrativo y menos bíblico.
- source_word: יִשְׁכּוֹנוּ
  english_pob_choice: will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - dwellarán
  lexicon: HALOT
  rationale: El verbo שכן significa «habitar, residir». Dado que el pasaje revisado en inglés retiró «secure», conviene no añadir estabilidad explícita. «Habitarán» es claro y directo; «morarán» es posible pero más solemne.
- source_word: וְזַרְעָם
  english_pob_choice: and their offspring
  chosen_spanish: y su descendencia
  alternatives_spanish:
  - y su linaje
  - y su semilla
  lexicon: HALOT
  rationale: זֶרַע nombra colectivamente la prole o descendencia. «Descendencia» conserva el sentido colectivo y evita el arcaísmo de «semilla». Usé singular colectivo, como suele hacer el español en este tipo de construcción.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión literal apunta a estar «ante/de cara a» Dios. «Delante de ti» es fiel y fluido en español; «en tu presencia» explicita el matiz, pero puede sonar un poco más interpretativo.
- source_word: יִכּוֹן
  english_pob_choice: will be established
  chosen_spanish: será establecida
  alternatives_spanish:
  - quedará firme
  - será afirmada
  lexicon: HALOT
  rationale: El nifal de כון expresa quedar/ser establecido, fijado, firme. «Será establecida» preserva la voz pasiva/resultativa sin introducir un matiz adicional. Mantengo el singular concordando con «descendencia».
theological_decisions:
- issue: Si traducir el versículo como una promesa explícitamente pactual o escatológica
  english_pob_reading: Retain the verse as a statement of enduring stability for the servants' descendants in God's presence without importing a more specific doctrinal framework.
  chosen_spanish_reading: Mantener el versículo como una afirmación de permanencia de la descendencia de los siervos delante de Dios, sin precisar más el marco doctrinal.
  alternative_spanish_readings:
  - Leerlo como una promesa pactual explícita para la línea de Israel
  - Leerlo como una promesa escatológica explícita de salvación final
  rationale: El hebreo afirma morada y establecimiento delante de Dios, pero no especifica por sí mismo el mecanismo teológico completo. La redacción española evita resolver esa tensión y conserva el alcance del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés al no añadir un equivalente de «secure»; el hebreo solo dice que habitarán. También conserva la estructura paralela del verso y el sustantivo colectivo para זֶרַע.
  spanish_consistency_notes:
  - Se usa «siervos» para עֲבָדֶיךָ, en coherencia con el tratamiento reverencial dirigido a Dios.
  - Se prefiere «descendencia» para זֶרַע por claridad natural en español, manteniendo el sentido colectivo.
  - «Delante de ti» conserva el valor relacional de לְפָנֶיךָ sin sobreexplicar.
  - La nota al pie recoge la alternativa más literal «semilla», que el audit trail inglés marcó como opción léxica válida.
