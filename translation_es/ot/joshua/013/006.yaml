base_translation:
  language: en
  yaml_path: translation/ot/joshua/013/006.yaml
  text: All the inhabitants of the hill country from Lebanon to Misrephoth-maim[a], all the Sidonians—I myself will drive them out before the sons of Israel. Only allot it to Israel as an inheritance[c][b], as I have commanded you.
  footnotes:
  - marker: a
    text: Misrephoth-maim is a place name; the name may mean something like 'burnings of water,' but its exact sense is uncertain.
    reason: cultural_note
  - marker: b
    text: Or 'I will dispossess them before the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'allot it' reflects the idiom of assigning land, often by lot.
    reason: lexical_alternative
