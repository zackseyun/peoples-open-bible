translation:
  language: es
  text: Un poco de sueño, un poco de somnolencia, un poco de plegar las manos para recostarse[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un poco de plegar las manos para descansar». El infinitivo hebreo puede denotar el acto de recostarse en general, con el descanso o el sueño como resultado implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: un poco de
  alternatives_spanish:
  - un poquito de
  - algo de
  lexicon: HALOT
  rationale: La repetición triple de מְעַט pide en español una fórmula breve y paralela. «Un poco de» conserva la gradación mínima y el tono proverbial sin sonar coloquial.
- source_word: שֵׁנוֹת
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - dormir
  - sueño ligero
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, en español la equivalencia natural es el sustantivo massivo «sueño». Mantiene el paralelismo con los demás miembros de la línea.
- source_word: תְּנוּמ֑וֹת
  english_pob_choice: slumber
  chosen_spanish: adormecimiento
  alternatives_spanish:
  - somnolencia
  - sueño
  lexicon: HALOT
  rationale: «Adormecimiento» refleja un estado cercano pero algo distinto de «sueño», preservando la cercanía poética que el inglés resolvió con «slumber» frente a «sleep».
- source_word: חִבֻּ֖ק יָדַ֣יִם
  english_pob_choice: folding of the hands
  chosen_spanish: cruzar las manos
  alternatives_spanish:
  - plegar las manos
  - juntar las manos
  lexicon: HALOT
  rationale: La expresión hebrea describe una postura de inactividad. «Cruzar las manos» comunica esa postura de forma natural en español, sin perder la idea de manos inmóviles y ociosas.
- source_word: לִשְׁכָּב
  english_pob_choice: to lie down
  chosen_spanish: para recostarse
  alternatives_spanish:
  - para acostarse
  - para tumbarse
  lexicon: HALOT
  rationale: El infinitivo indica el resultado o propósito de la postura, y puede abarcar acostarse/recostarse. «Recostarse» evita especificar demasiado «dormir» y conserva la amplitud semántica observada en la nota inglesa.
translation_notes:
  revision_awareness: El texto inglés y el control cruzado presentan acuerdo alto y no requieren revisión sustantiva; se preserva la estructura tripartita y la ambigüedad del infinitivo final, evitando especificar más de lo que el hebreo garantiza.
  spanish_consistency_notes:
  - Se mantiene «sueño» para שֵׁנוֹת como sustantivo natural en español, evitando un plural artificial.
  - Se distingue el segundo miembro con «adormecimiento» para conservar el paralelismo semántico sin repetir exactamente «sueño».
  - «Cruzar las manos» funciona como equivalente idiomático de una postura de inactividad, pero la nota conserva la alternativa más cercana al hebreo.
  - No se introduce vocabulario teológico, ya que el versículo es proverbial y no contiene términos doctrinales directos.
