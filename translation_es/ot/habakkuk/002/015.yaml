translation:
  language: es
  text: ¡Ay de aquel que hace beber a su prójimo, derramando tu furor[a] y aun embriagándolo[b], para mirar su desnudez[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu ira»; el término hebreo puede sugerir también calor o, en contexto, un matiz de veneno.
    reason: lexical_alternative
  - marker: b
    text: Hebreo difícil; algunos entienden esta cláusula de otra manera, como «añadiendo tu botella», o armonizan la persona para leer «su furor».
    reason: alternative_reading
  - marker: c
    text: O «sus partes íntimas»; el hebreo se refiere a la desnudez expuesta en un sentido vergonzoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Woe a...!
  - ¡Ay!
  lexicon: HALOT
  rationale: La interjección profética expresa lamento y denuncia. En español, «¡Ay de...!» comunica de forma natural el tono de juicio sin perder el valor oracular.
- source_word: מַשְׁקֵה
  english_pob_choice: who makes ... drink
  chosen_spanish: que hace beber
  alternatives_spanish:
  - que da de beber
  - que causa beber
  lexicon: HALOT
  rationale: El hiphil indica causar que otro beba. «Hace beber» conserva la coerción y suena más natural que una formulación más literal pero pesada.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su compañero
  lexicon: HALOT
  rationale: «Prójimo» recoge el sentido de fellow person, con resonancia ética adecuada para una denuncia profética. «Vecino» sería posible, pero en español puede sonar más restringido geográficamente.
- source_word: מְסַפֵּחַ
  english_pob_choice: pouring out
  chosen_spanish: derramando
  alternatives_spanish:
  - añadiendo
  - mezclando
  lexicon: HALOT
  rationale: El verbo es difícil y admite varias lecturas. Dado el cuadro de intoxicación y la presencia de «tu furor», «derramando» preserva el gesto activo y violento sin fijar prematuramente una explicación más técnica.
- source_word: חֲמָתְךָ
  english_pob_choice: your wrath
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu ira
  - tu veneno
  - tu calor
  lexicon: HALOT
  rationale: El término puede significar ira, furor o calor, y en algunos contextos puede acercarse a la idea de veneno. «Furor» mantiene la fuerza emocional y la tensión del texto, mientras que la nota preserva la alternativa de «ira» y la posibilidad de un matiz venenoso.
- source_word: וְאַף
  english_pob_choice: and even
  chosen_spanish: y aun
  alternatives_spanish:
  - y además
  - sí, incluso
  - y también
  lexicon: HALOT
  rationale: El adverbio intensifica y añade escalamiento. «Y aun» conserva ese énfasis en español bíblico actual sin sonar arcaizante.
- source_word: שַׁכֵּר
  english_pob_choice: making him drunk
  chosen_spanish: embriagándolo
  alternatives_spanish:
  - haciéndolo borracho
  - causándole embriaguez
  lexicon: HALOT
  rationale: El verbo expresa causar intoxicación. «Embriagándolo» es conciso, formal y transmite el resultado sin explicitar innecesariamente el mecanismo.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - con el fin de
  - a fin de
  lexicon: HALOT
  rationale: Marca finalidad. En español, «para» es suficiente y más natural; el contexto mantiene la idea de propósito dañino.
- source_word: הַבִּיט
  english_pob_choice: to look on
  chosen_spanish: mirar
  alternatives_spanish:
  - contemplar
  - fijar la vista en
  - ver
  lexicon: HALOT
  rationale: El verbo significa mirar o observar. «Mirar» es directo y deja que el contexto aporte la carga moral de la escena.
- source_word: מְעוֹרֵיהֶם
  english_pob_choice: their nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - sus partes íntimas
  - su vergüenza
  lexicon: HALOT
  rationale: El sustantivo alude a la desnudez expuesta, en sentido vergonzoso. «Desnudez» es idiomático y suficientemente explícito; la alternativa anatómica se preserva en nota.
theological_decisions:
- issue: Desplazamiento de persona en חֲמָתְךָ dentro de un lamento en tercera persona
  english_pob_reading: Retain the shift with 'your wrath' in the main text
  chosen_spanish_reading: 'Conservar el cambio a segunda persona: «tu furor»'
  alternative_spanish_readings:
  - armonizar como «su furor»
  - reinterpretar como «su botella» para suavizar la sintaxis
  rationale: El hebreo conserva un cambio llamativo de persona. La traducción no lo aplana para no perder la aspereza retórica ni ocultar la dificultad textual; la nota deja constancia de la alternativa interpretativa.
  doctrine_reference: Principio de fidelidad formal y transparencia textual
- issue: Imaginería de vergüenza sexual en el propósito final
  english_pob_reading: 'Render the purpose clause as voyeuristic exposure: ''in order to look on their nakedness'''
  chosen_spanish_reading: «para mirar su desnudez»
  alternative_spanish_readings:
  - «para mirar su vergüenza»
  - «para mirar sus partes íntimas»
  rationale: La frase conserva la imagen de exposición vergonzosa sin añadir más contenido que el que el hebreo permite. «Desnudez» mantiene la referencia bíblica al deshonor por exposición.
  doctrine_reference: Respeto al sentido figurado y al pudor del texto
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del texto inglés, que eliminó el guion largo y ajustó la puntuación para mayor fluidez. Se ha mantenido la estructura de tres miembros y el tono formal, respetando además la tensión textual del cambio de persona y la ambigüedad del verbo מְסַפֵּחַ.
  spanish_consistency_notes:
  - Se conserva Yahvé como nombre divino por defecto cuando corresponda, pero en este versículo no aparece.
  - Se usa una formulación profética breve y solemne («¡Ay de...!») acorde con el registro del pasaje.
  - Las notas preservan las alternativas léxicas relevantes sin introducir armonizaciones silenciosas.
