  - severity: high
    issue: «y ahora soy tu esclavo» cambia la decisión principal de tiempo/aspecto
    rationale: La revisión inglesa fijó «and now I will be your servant» para reflejar mejor la secuencia hebrea. Pasar a presente en el texto principal se aparta de la decisión auditada y rompe la simetría con «seré» al inicio.
  - severity: medium
    issue: «desde antes» para מֵאָז suena poco natural
    rationale: מֵאָז aquí marca tiempo previo/antes, no un punto de arranque continuo. «en el pasado» o «antes» comunica mejor el contraste con «ahora» en español natural.
  - severity: medium
