review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: imposición de una mano, sobre la cabeza de la חטאת, sacrificio del animal, y ubicación ritual correspondiente al lugar del holocausto. También conserva adecuadamente la nota alternativa sobre חטאת como posible «ofrenda de purificación». Sin embargo, «degollará / se degüella» introduce un matiz más estrecho que el verbo técnico hebreo שׁחט y que la POB inglesa («slaughter»), y «para ofrenda por el pecado» suena menos natural que una formulación española más idiomática para el valor de designación/finalidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay una pequeña aspereza estilística en «para ofrenda por el pecado», donde «como ofrenda por el pecado» fluye mejor en español legal-ritual. Además, «degollar» es comprensible, pero en registro bíblico general «sacrificar» expresa mejor el tecnicismo cultual sin reducirlo al corte de garganta.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Holocausto» para עֹלָה está bien. «Ofrenda por el pecado» sigue la decisión documentada para חטאת y preserva la alternativa «ofrenda de purificación» en nota. El ajuste recomendado es terminológico-estilístico para שׁחט y para la frase con לְחַטָּאת.
  issues:
  - severity: medium
    issue: «degollará / se degüella» para שׁחט
    rationale: Aunque «degollar» puede usarse en contexto sacrificial, שׁחט es el verbo técnico general de sacrificar/slaughter, no necesariamente un foco léxico en el degüello. «Sacrificará / se sacrifica» preserva mejor el registro cultual y evita estrechar el sentido.
  - severity: low
    issue: «para ofrenda por el pecado» suena poco idiomático
    rationale: El hebreo לְחַטָּאת expresa finalidad o designación. En español bíblico-natural, «como ofrenda por el pecado» comunica esa función con mayor fluidez que «para ofrenda por el pecado».
  revised_spanish_text: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado[a] y la sacrificará como ofrenda por el pecado, en el lugar donde se sacrifica el holocausto.
  revised_footnotes:
  - marker: a
    text: O «ofrenda de purificación» para ambas ocurrencias de «ofrenda por el pecado»; el término hebreo puede designar la ofrenda que trata el pecado y la impureza ritual.
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene íntegramente el sentido del hebreo y la decisión léxica principal sobre חטאת, pero mejora la fidelidad funcional y la naturalidad del español: «sacrificará» corresponde mejor al verbo técnico שׁחט en una ley ritual, y «como ofrenda por el pecado» expresa de modo más idiomático la finalidad/designación de לְחַטָּאת.'
