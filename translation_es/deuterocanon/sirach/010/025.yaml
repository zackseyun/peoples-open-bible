review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue correctamente la línea griega que, según el paquete canónico y la nota de major_mismatch, debe regir el texto principal en Sirácides 10:25. También preserva en nota el testimonio hebreo alternativo. Sin embargo, la nota española añade «importante» y usa «esclavo» donde el rastro inglés de auditoría para esta variante concreta dice «servant»; dado que la propia nota inglesa traduce el hebreo con menor fuerza léxica aquí, conviene alinearla más de cerca con el audit trail en español.
  spanish_quality_summary: 'El texto principal es claro, natural y digno: «No te hagas sabio... y no te jactes...». La sintaxis fluye bien en español. Solo conviene suavizar y ajustar la nota para reflejar con mayor precisión el encuadre textual del POB y evitar una sobreinterpretación editorial no presente en el inglés.'
  glossary_alignment: No hay términos teológicos de la lista principal en juego. La decisión principal sigue el griego, como exige la filosofía del proyecto para deuterocanónicos en casos de desajuste mayor. En la nota variante, «siervo» alinea mejor con el audit trail inglés («servant») que «esclavo» en este caso específico, ya que aquí se está reproduciendo una nota textual del POB más que imponiendo la preferencia general de δοῦλος/עבד.
  issues:
  - severity: medium
    issue: La nota dice «Testimonio alternativo importante» en vez de reflejar más literalmente el encuadre del POB.
    rationale: El inglés dice «The extant Hebrew witness here differs substantially»; «importante» introduce una valoración editorial distinta. Conviene hablar de «testimonio hebreo conservado» o equivalente y de su diferencia sustancial.
  - severity: medium
    issue: La nota usa «esclavo» donde el audit trail inglés para esta variante usa «servant».
    rationale: Aunque el glosario favorece «esclavo» cuando el POB escogió «slave», aquí la propia nota inglesa dice «servant». Como se trata de reproducir fielmente la nota textual ya auditada, «siervo»/«servidor» es mejor ajuste contextual.
  revised_spanish_text: No te hagas sabio[a] al realizar tu trabajo, y no te jactes en tiempo de angustia.
  revised_footnotes:
  - marker: a
    text: 'El testimonio hebreo conservado aquí difiere sustancialmente: «Un siervo prudente es exaltado, y un siervo necio no se quejará»; el verbo final es incierto y también puede llevar un matiz como «murmurar» o «buscar pretexto».'
    reason: textual_variant
  revision_rationale: 'Se conserva intacto el texto principal porque refleja correctamente la lectura griega adoptada por el proyecto. Solo se ajusta la nota para alinearla mejor con el audit trail inglés: se explicita que es el testimonio hebreo conservado el que difiere sustancialmente, se evita la valoración extra «importante», y se usa «siervo» para seguir más de cerca «servant» en esta variante documentada.'
