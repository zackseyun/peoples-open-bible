    rationale: La nota sobre «canales» corresponde a «ríos», y la nota sobre «templo» corresponde a «palacio». En el borrador ambas aparecen después de «se abren», lo que incumple la disciplina de anclar cada nota en la palabra o frase relevante.
  - severity: low
    issue: «Se derrite» suena menos natural para un edificio en español
    rationale: Aunque es posible, en español «el palacio se derrite» puede sonar demasiado literal. «Se deshace» preserva mejor el valor metafórico de נָמוֹג en este contexto de colapso/disolución.
