translation:
  language: es
  text: 'Y sucedió[a], cuando Joram vio a Jehú, que dijo: «¿Es paz, Jehú?» Él respondió: «¿Qué paz puede haber[b], mientras continúan las prostituciones de Jezabel, tu madre, y sus muchas hechicerías?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando ... vio». La fórmula hebrea narrativa puede expresarse de forma más breve, pero aquí se mantiene una redacción que conserve el movimiento secuencial del original.
    reason: lexical_alternative
  - marker: b
    text: O «¿Qué paz?». El hebreo repite «paz» para producir un efecto retórico; la pregunta de Jehú niega que pueda haber paz en esas condiciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּרְאוֹת
  english_pob_choice: And it happened, when ... saw
  chosen_spanish: Y sucedió, cuando ... vio
  alternatives_spanish:
  - Cuando ... vio
  - Y cuando ... vio
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva con una solución natural en español que mantiene el avance del relato sin volverla pesada. «Y sucedió» refleja el valor secuencial de וַיְהִי y «cuando ... vio» preserva la construcción temporal.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is it peace
  chosen_spanish: ¿Hay paz para ti?
  alternatives_spanish:
  - ¿Es paz?
  - ¿Vienes en paz?
  lexicon: HALOT
  rationale: Se conserva «paz» para mantener el juego verbal con la respuesta de Jehú. En español, «¿Hay paz para ti?» comunica la pregunta de forma natural y deja explícito el sustantivo que se repite en la réplica.
- source_word: מָה הַשָּׁלוֹם
  english_pob_choice: What peace can there be
  chosen_spanish: ¿Qué paz puede haber
  alternatives_spanish:
  - ¿Qué paz?
  - ¿Cómo puede haber paz?
  lexicon: HALOT
  rationale: La pregunta es retórica y niega la posibilidad de paz. «¿Qué paz puede haber?» mantiene el sustantivo «paz» y transmite la fuerza idiomática sin perder la repetición del hebreo.
- source_word: עַד
  english_pob_choice: so long as
  chosen_spanish: mientras continúan
  alternatives_spanish:
  - hasta que terminen
  - mientras
  lexicon: HALOT
  rationale: 'El valor aquí es durativo-condicional: la paz es imposible mientras persista la situación descrita. «Mientras continúan» expresa esa continuidad de modo claro en español.'
- source_word: זְנוּנֵי
  english_pob_choice: the prostitutions
  chosen_spanish: las prostituciones
  alternatives_spanish:
  - los desvaríos sexuales
  - las fornicaciones
  - las prostituciones idolátricas
  lexicon: HALOT
  rationale: Se conserva el término fuerte y concreto que refleja la crudeza del hebreo y su posible doble carga moral y cultual. «Prostituciones» evita suavizar el golpe retórico de Jehú.
- source_word: אִיזֶבֶל אִמְּךָ
  english_pob_choice: Jezebel your mother
  chosen_spanish: Jezabel, tu madre
  alternatives_spanish:
  - tu madre Jezabel
  - Jezabel tu madre
  lexicon: HALOT
  rationale: La aposición se vierte de manera directa y acusatoria. El orden con coma en español hace clara la identificación sin perder la dureza del reproche.
- source_word: וּכְשָׁפֶיָה
  english_pob_choice: and her sorceries
  chosen_spanish: y sus hechicerías
  alternatives_spanish:
  - y sus artes de hechicería
  - y sus sortilegios
  lexicon: HALOT
  rationale: «Hechicerías» es natural y fiel para כְּשָׁפִים/כְּשָׁפֶיהָ en un registro bíblico comprensible. Conserva el sentido de prácticas mágicas/sorceriles sin volver el verso arcaizante.
- source_word: הָרַבִּים
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  - abundantes
  lexicon: HALOT
  rationale: El adjetivo intensifica la magnitud de las hechicerías de Jezabel. «Muchas» es el equivalente más simple y natural en español.
theological_decisions:
- issue: Cómo mantener el juego de palabras y la tensión retórica con שָׁלוֹם
  english_pob_reading: '''Is it peace'' / ''What peace can there be'' with repeated ''peace'''
  chosen_spanish_reading: «¿Hay paz para ti?» / «¿Qué paz puede haber?» con repetición de «paz»
  alternative_spanish_readings:
  - ¿Estás bien? / ¿Qué bienestar puede haber?
  - ¿Vienes en paz? / ¿Qué paz?
  rationale: Se preserva el mismo lexema para no diluir la ironía y el contraste entre la pregunta de Joram y la réplica de Jehú. Traducirlo como «bien» o «bienestar» haría perder la fuerza del intercambio.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Cómo renderizar זְנוּנֵי sin suavizar la acusación de Jehú
  english_pob_reading: '''the prostitutions of Jezebel your mother'' with footnote for ''whorings'' / moral and cultic unfaithfulness'
  chosen_spanish_reading: «las prostituciones de Jezabel, tu madre»
  alternative_spanish_readings:
  - las fornicaciones de Jezabel, tu madre
  - las idolatrías de Jezabel, tu madre
  - las deslealtades de Jezabel, tu madre
  rationale: «Prostituciones» conserva el impacto del término hebreo y permite abarcar la carga literal y figurada sin reducirla a una sola interpretación. La nota puede explicar que el hebreo admite también el matiz de infidelidad moral y cultual.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El registro inglés más reciente indica que no hubo revisiones pendientes y que el texto fue confirmado con alta concordancia. La propuesta española sigue esa lectura estable y conserva tanto la repetición de «paz» como el tono fuerte de «prostituciones» y «hechicerías».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; este versículo no lo incluye.
  - Se conserva «Jehú» y «Joram» con la ortografía bíblica habitual en español.
  - Se eligió un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La puntuación reproduce el diálogo directo y la secuencia narrativa del hebreo.
