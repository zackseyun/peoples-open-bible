translation:
  language: es
  text: Entonces los habitantes de Jerusalén hicieron rey a Ahazías[a], su hijo menor, en su lugar, porque la banda que vino con los árabes al campamento había matado a todos los hijos mayores. Así reinó Ahazías, hijo de Jehoram, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tropa que vino entre los árabes al campamento». La frase hebrea puede entenderse de otro modo según se tome la preposición con «árabes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְלִיכוּ
  english_pob_choice: made ... king
  chosen_spanish: hicieron rey
  alternatives_spanish:
  - proclamaron rey
  - lo establecieron como rey
  lexicon: HALOT
  rationale: 'El hifil de מלך es causativo: instalar a alguien como rey. «Hicieron rey» conserva ese valor causativo de forma natural en español y evita reducirlo a un mero «reinó».'
- source_word: יוֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los residentes de Jerusalén
  - los que vivían en Jerusalén
  lexicon: HALOT
  rationale: La construcción literal es «los moradores de Jerusalén». «Habitantes» es idiomático, claro y fiel al sentido formal del hebreo.
- source_word: בְנוֹ הַקָּטֹן
  english_pob_choice: his youngest son
  chosen_spanish: su hijo menor
  alternatives_spanish:
  - su hijo más joven
  - su hijo pequeño
  lexicon: HALOT
  rationale: En contraste con «todos los mayores», קטן aquí señala al menor de los hijos. «Menor» es natural en español y conserva la oposición de edad/orden.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en lugar de él
  alternatives_spanish:
  - en su lugar
  - en vez de él
  lexicon: HALOT
  rationale: La preposición expresa sustitución sucesoria. «En lugar de él» mantiene la relación de reemplazo en un registro sobrio y comprensible.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de la entronización de Ocozías; «porque» es la equivalencia directa y natural en español.
- source_word: כָל הָרִאשֹׁנִים
  english_pob_choice: all the older sons
  chosen_spanish: todos los mayores
  alternatives_spanish:
  - todos los primeros
  - todos los anteriores
  - todos los primogénitos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todos los primeros/anteriores», pero el contexto inmediato habla de los hijos de Joram; por eso en español se sobreentiende «hijos» y se expresa la idea de los mayores frente al menor. No se añade explícitamente «hijos» para no ir más allá del texto, aunque el referente está claro.
- source_word: הָרַג
  english_pob_choice: had killed
  chosen_spanish: había matado
  alternatives_spanish:
  - había dado muerte a
  - había asesinado
  lexicon: HALOT
  rationale: El perfecto pluscuamperfecto español reproduce bien la anterioridad respecto a la instalación en el trono. «Había matado» es neutro y fiel; «asesinado» sería más interpretativo.
- source_word: הַגְּדוּד
  english_pob_choice: the band
  chosen_spanish: la banda
  alternatives_spanish:
  - el tropel
  - el destacamento
  - la tropa
  lexicon: HALOT
  rationale: Se mantiene la restricción del POB inglés, que revisó «raiding band» a «band». «Banda» conserva el valor militar/colectivo sin cargar de interpretación adicional.
- source_word: הַבָּא בָעַרְבִים
  english_pob_choice: that came with the Arabs
  chosen_spanish: que vino con los árabes
  alternatives_spanish:
  - que vino entre los árabes
  - que vino contra los árabes
  lexicon: HALOT
  rationale: La preposición ב con ערבִים permite una relación asociativa. El POB inglés prefirió «with the Arabs»; en español «con los árabes» mantiene esa lectura sin perder la ambigüedad subyacente.
- source_word: לַמַּחֲנֶה
  english_pob_choice: into the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - al campo
  - hacia el campamento
  lexicon: HALOT
  rationale: Aunque el inglés explicita la entrada («into»), en español «al campamento» comunica el movimiento direccional con naturalidad. El contexto de incursión mantiene el sentido de llegada/irrupción.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: El verbo final es una nota summativa de reinado. «Reinó» reproduce directamente el hebreo sin añadir matiz aspectual innecesario.
- source_word: אֲחַזְיָהוּ בֶן יְהוֹרָם מֶלֶךְ יְהוּדָה
  english_pob_choice: Ahaziah son of Jehoram, king of Judah
  chosen_spanish: Ocozías, hijo de Joram, rey de Judá
  alternatives_spanish:
  - Ocozías hijo de Joram, rey de Judá
  - Ocozías, hijo de Joram, el rey de Judá
  lexicon: HALOT
  rationale: Se identifica a Ocozías por filiación y reino con puntuación aclaratoria equivalente al inglés. «Rey de Judá» se toma como aposición a Joram, no a Ocozías, siguiendo la lectura sintáctica del hebreo y del POB inglés.
theological_decisions:
- issue: Cómo traducir la sucesión real sin suavizar el causativo del hebreo
  english_pob_reading: made Ahaziah... king in his place
  chosen_spanish_reading: hicieron rey a Ocozías... en lugar de él
  alternative_spanish_readings:
  - lo proclamaron rey en su lugar
  - lo establecieron como rey
  rationale: El texto presenta una acción humana de instalación en el trono, no solo la experiencia pasiva de gobernar. La formulación elegida conserva ese acto de legitimación/sucesión.
  doctrine_reference: 2 Crónicas 22:1; 1 Reyes 1:35 (paralelo de instalación real)
- issue: Alcance de «los mayores» frente al hebreo literal «los primeros»
  english_pob_reading: all the older sons
  chosen_spanish_reading: todos los mayores
  alternative_spanish_readings:
  - todos los primeros
  - todos los anteriores
  rationale: La POB inglesa explica que el referente son los hijos mayores de Joram. En español, «los mayores» preserva la contraposición con «su hijo menor» sin introducir una glosa interpretativa más allá de lo requerido por el contexto inmediato.
  doctrine_reference: 2 Crónicas 22:1; contexto narrativo de la casa de Joram
- issue: Lectura de הַבָּא בָעַרְבִים
  english_pob_reading: the band that came with the Arabs
  chosen_spanish_reading: la banda que vino con los árabes
  alternative_spanish_readings:
  - la banda que vino entre los árabes
  - la banda que vino contra los árabes
  rationale: El inglés POB preserva una lectura asociativa («with the Arabs») y nota la posibilidad alternativa. En español se mantiene la misma ambigüedad controlada, sin resolver el hebreo de manera excesiva.
  doctrine_reference: 2 Crónicas 22:1; nota lexical del POB inglés
translation_notes:
  revision_awareness: Se siguió de cerca la revisión inglesa reciente que prefirió «band» sobre «raiding band» y «reigned» sobre «became king». La versión española refleja esa restricción léxica, manteniendo una nota para la ambigüedad de הַבָּא בָעַרְבִים. También se respetó la relación sintáctica de «rey de Judá» como aposición a Joram, no a Ocozías.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió «Ocozías» como forma castellana tradicional del nombre propio, coherente con el resto del AT en español.
  - «Banda» se usa de modo restringido para conservar el paralelo con el audit trail inglés y la ambigüedad militar del hebreo.
  - La puntuación mantiene la aposición «hijo de Joram, rey de Judá» para evitar ambigüedad sintáctica.
