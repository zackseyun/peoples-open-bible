translation:
  language: es
  text: Entonces sacarán a la joven[a] a la entrada de la casa de su padre, y los hombres de su ciudad la apedrearán con piedras, y morirá, porque ha cometido una vileza[b] en Israel al prostituirse[c] mientras estaba en la casa de su padre. Así extirparás el mal de en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la muchacha». El hebreo נַעַר puede referirse a una joven mujer, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «una acción vergonzosa» o «una cosa abominable». נְבָלָה denota una ofensa moral gravemente chocante.
    reason: lexical_alternative
  - marker: c
    text: O «al cometer inmoralidad sexual». זנה evoca literalmente prostitución o conducta de ramera y suele usarse también para conducta sexual ilícita más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la niña
  - la joven mujer
  lexicon: HALOT
  rationale: En este contexto legal, נער puede referirse a una muchacha/joven mujer. «La joven» preserva la referencia a edad y condición social sin añadir matices no explicitados por el hebreo.
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el umbral
  - la puerta
  - el acceso
  lexicon: HALOT
  rationale: פֶּתַח designa una apertura o entrada. «La entrada» es natural en español moderno y mantiene el valor espacial del hebreo.
- source_word: בֵּית אָבִיהָ
  english_pob_choice: her father's house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - el hogar de su padre
  - la casa paterna
  lexicon: HALOT
  rationale: Se conserva la concreción de «casa» sin sustituirla por una paráfrasis más interpretativa como «hogar». En esta fórmula legal, la casa paterna funciona también como marco familiar y social.
- source_word: וּסְקָלוּהָ ... בָּאֲבָנִים
  english_pob_choice: shall stone her with stones
  chosen_spanish: la apedrearán con piedras
  alternatives_spanish:
  - la apedrearán
  - la lapidarán con piedras
  lexicon: HALOT
  rationale: El hebreo repite la idea de apedrear con piedras. «Apedrear con piedras» conserva la redundancia enfática del original mejor que un verbo solo, y es comprensible en español bíblico contemporáneo.
- source_word: אַנְשֵׁי עִירָהּ
  english_pob_choice: the men of her city
  chosen_spanish: los hombres de su ciudad
  alternatives_spanish:
  - la gente de su ciudad
  - los varones de su ciudad
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Se mantiene el sujeto masculino plural, como en el hebreo, sin neutralizarlo innecesariamente.
- source_word: נְבָלָה
  english_pob_choice: an outrageous act
  chosen_spanish: una vileza
  alternatives_spanish:
  - una atrocidad
  - una acción vergonzosa
  - una cosa abominable
  lexicon: HALOT
  rationale: נְבָלָה expresa una ofensa moral gravemente chocante. «Vileza» comunica bien la carga de ignominia y evita suavizarla.
- source_word: לִזְנוֹת
  english_pob_choice: by prostituting herself
  chosen_spanish: al prostituirse
  alternatives_spanish:
  - al cometer inmoralidad sexual
  - al ejercer prostitución
  - al entregarse a prostitución
  lexicon: HALOT
  rationale: El verbo זנה mantiene un colorido de prostitución/fornicación ilícita. «Al prostituirse» conserva esa fuerza sin convertirla en una abstracción más amplia que la del hebreo.
- source_word: בֵּית אָבִיהָ
  english_pob_choice: in her father's house
  chosen_spanish: en la casa de su padre
  alternatives_spanish:
  - mientras estaba en la casa de su padre
  - bajo el techo de su padre
  lexicon: HALOT
  rationale: La repetición del sintagma en español debe sonar natural y, a la vez, conservar la localización concreta del hebreo.
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  english_pob_choice: So you shall purge the evil from your midst
  chosen_spanish: Así extirparás el mal de en medio de ti
  alternatives_spanish:
  - Así purgarás el mal de en medio de ti
  - Así eliminarás el mal de entre ustedes
  lexicon: HALOT
  rationale: בער en fórmulas deuteronómicas expresa eliminar/arrancar lo malo de la comunidad. «Extirparás» comunica con precisión la fuerza judicial del mandato y su registro solemne en español.
theological_decisions:
- issue: Intensidad moral de נְבָלָה
  english_pob_reading: an outrageous act
  chosen_spanish_reading: una vileza
  alternative_spanish_readings:
  - una atrocidad
  - una acción vergonzosa
  - una cosa abominable
  rationale: La traducción debe conservar el peso moral y comunitario del término sin diluirlo en lenguaje suave. «Vileza» mantiene el reproche fuerte que el contexto legal exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Registro penal y corporativo de la sentencia
  english_pob_reading: the men of her city shall stone her with stones
  chosen_spanish_reading: los hombres de su ciudad la apedrearán con piedras
  alternative_spanish_readings:
  - la gente de su ciudad la apedreará
  - los varones de su ciudad la lapidarán
  rationale: El hebreo presenta un acto judicial comunitario realizado por los hombres de la ciudad. Se conserva esa precisión social y de género para no borrar el patrón textual.
  doctrine_reference: Translation philosophy §4
- issue: Fórmula de juicio deuteronómica
  english_pob_reading: purge the evil from your midst
  chosen_spanish_reading: extirparás el mal de en medio de ti
  alternative_spanish_readings:
  - purgarás el mal de en medio de ti
  - eliminarás el mal de entre ustedes
  rationale: La fórmula legal no es solo moralizante; expresa una acción judicial para limpiar la comunidad del mal. «Extirparás» retiene esa fuerza y la continuidad con el lenguaje deuteronómico.
  doctrine_reference: Deuteronomio 13:5; 17:7; 19:19; 21:21
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y mantiene las decisiones auditadas del POB inglés: ‘young woman’ como «la joven», ‘outrageous act’ como «vileza», ‘by prostituting herself’ como «al prostituirse», y la fórmula deuteronómica de expulsar/arrancar el mal de la comunidad. No se detectaron cambios de revisión en el expediente inglés reciente.'
  spanish_consistency_notes:
  - Se conserva el sujeto masculino plural «los hombres de su ciudad» conforme al hebreo אַנְשֵׁי.
  - Se mantiene la estructura legal con repetición de «casa de su padre / en la casa de su padre» para reflejar el paralelismo del original.
  - «Apedrearán con piedras» reproduce la intensificación semítica sin volverla innecesariamente redundante en exceso.
  - Se usa «Yahvé» solo cuando el nombre divino aparece; este versículo no lo contiene.
