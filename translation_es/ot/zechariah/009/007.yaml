translation:
  language: es
  text: Quitaré su sangre de su boca y sus cosas detestables[a] de entre sus dientes. Entonces él también será un remanente[b] para nuestro Dios; será como un líder de clan en Judá, y Ecrón será como el jebuseo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Cosas detestables'' puede aludir a prácticas idolátricas o ritualmente impuras, incluso alimentos asociados con culto pagano.'
    reason: cultural_note
  - marker: b
    text: O 'él también permanecerá para nuestro Dios' o 'él también quedará para nuestro Dios'. El verbo hebreo también puede traducirse de forma más general como 'permanecer' o 'quedar', aunque 'será un remanente' conserva mejor el matiz profético.
    reason: lexical_alternative
  - marker: c
    text: '''Como el jebuseo'' probablemente sugiere incorporación a Judá, ya que los jebuseos fueron absorbidos en Jerusalén en vez de permanecer como poder hostil separado.'
    reason: cross_reference
lexical_decisions:
- source_word: וַהֲסִרֹתִי
  english_pob_choice: I will remove
  chosen_spanish: Quitaré
  alternatives_spanish:
  - Retiraré
  - Quitaré de allí
  - Eliminaré
  lexicon: HALOT
  rationale: El verbo causativo expresa la acción de apartar o quitar lo que está en la boca; en español, 'quitar' es natural y conserva la imagen concreta sin debilitarla.
- source_word: דָמָיו
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - su sangre derramada y culpable
  - su sangre
  lexicon: HALOT
  rationale: Se mantiene la literalidad de 'sangre' para conservar la imagen del texto hebreo y no interpretar en exceso el sentido en la línea principal.
- source_word: מִפִּיו
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca
  - de entre su boca
  lexicon: HALOT
  rationale: La imagen corporal se conserva de forma directa y natural en español.
- source_word: שִׁקֻּצָיו
  english_pob_choice: his detestable things
  chosen_spanish: sus cosas detestables
  alternatives_spanish:
  - sus abominaciones
  - sus cosas abominables
  - sus cosas impuras
  lexicon: HALOT
  rationale: '''Cosas detestables'' conserva la fuerza negativa de שִׁקּוּץ sin cerrar el referente a una sola categoría en español; el contexto puede incluir prácticas idolátricas o impuras.'
- source_word: מִבֵּין שִׁנָּיו
  english_pob_choice: from between his teeth
  chosen_spanish: de entre sus dientes
  alternatives_spanish:
  - de entre sus dientes
  - de entre los dientes
  lexicon: HALOT
  rationale: Se conserva la imagen vívida del alimento o práctica removida 'de entre los dientes' con una formulación natural en español.
- source_word: וְנִשְׁאַר גַּם הוּא
  english_pob_choice: Then he too will be a remnant
  chosen_spanish: Entonces él también será un remanente
  alternatives_spanish:
  - Entonces él también permanecerá
  - Entonces él también quedará
  - Entonces él también será dejado
  lexicon: HALOT
  rationale: '''Remanente'' preserva la resonancia profética de נִשְׁאַר en contexto; ''también'' refleja גַּם y se mantiene el sujeto singular de forma explícita.'
- source_word: לֵאלֹהֵינוּ
  english_pob_choice: for our God
  chosen_spanish: para nuestro Dios
  alternatives_spanish:
  - para nuestro Dios
  - a nuestro Dios
  - perteneciente a nuestro Dios
  lexicon: HALOT
  rationale: '''Para nuestro Dios'' comunica relación/pertenencia de modo natural en español y mantiene la inclusión del grupo de habla de Israel.'
- source_word: וְהָיָה כְּאַלֻּף בִּיהוּדָה
  english_pob_choice: he will be like a clan leader in Judah
  chosen_spanish: será como un líder de clan en Judá
  alternatives_spanish:
  - será como un jefe en Judá
  - será como un caudillo en Judá
  - será como un jefe de mil en Judá
  lexicon: HALOT
  rationale: אַלּוּף puede referirse a un jefe o líder de clan; 'líder de clan' comunica la función social en español contemporáneo sin forzar el vocablo hacia 'mil', que aquí resulta menos probable.
- source_word: וְעֶקְרוֹן כִּיבוּסִי
  english_pob_choice: and Ekron will be like the Jebusite
  chosen_spanish: y Ecrón será como el jebuseo
  alternatives_spanish:
  - y Ecrón será como el jebuseo
  - y Ecrón será como un jebuseo
  lexicon: HALOT
  rationale: Se translitera el etnónimo al uso habitual español como 'jebuseo' para preservar la referencia al pueblo integrado en Jerusalén/Judá, siguiendo el valor comparativo del hebreo.
theological_decisions:
- issue: Sentido de 'será un remanente' en וְנִשְׁאַר
  english_pob_reading: The verse uses remnant language to describe a transformed survivor belonging to Israel's God.
  chosen_spanish_reading: '''Será un remanente'' conserva la resonancia profética y permite la idea de supervivencia e incorporación.'
  alternative_spanish_readings:
  - '''Permanecerá'''
  - '''Será dejado'''
  - '''Quedará'''
  rationale: El hebreo admite un sentido general de 'quedar/permanecer', pero en el contexto profético de Zacarías la expresión 'remanente' aporta la carga teológica correcta sin abandonar la base léxica.
  doctrine_reference: Translation philosophy §1 y §5
- issue: Alcance de 'sus cosas detestables'
  english_pob_reading: '''Detestable things'' likely refers to idolatrous or ritually unclean things, possibly food associated with pagan worship.'
  chosen_spanish_reading: '''Sus cosas detestables'' deja abierta la referencia a prácticas idolátricas o impuras sin imponer una sola explicación.'
  alternative_spanish_readings:
  - '''Sus abominaciones'''
  - '''Sus impurezas'''
  - '''Sus cosas idolátricas'''
  rationale: El español 'cosas detestables' mantiene la amplitud semántica del hebreo y conserva la tensión interpretativa documentada en el audit trail.
  doctrine_reference: Translation philosophy §3
- issue: Comparación con 'el jebuseo'
  english_pob_reading: '''Like the Jebusite'' likely suggests incorporation into Judah, as the Jebusites were absorbed into Jerusalem rather than remaining a separate hostile power.'
  chosen_spanish_reading: '''Como el jebuseo'' conserva la comparación y la posible idea de incorporación más que de mera destrucción política.'
  alternative_spanish_readings:
  - '''Como un jebuseo'''
  - '''Como los jebuseos'''
  rationale: La formulación comparativa permite leer el cierre como asimilación/incorporación dentro del pueblo, sin resolver la imagen en una sola interpretación rígida.
  doctrine_reference: Translation philosophy §3 y §5
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión en inglés, que no introdujo cambios. Se conserva la estructura, el paralelismo y la tensión entre lectura literal e interpretación remanente/incorporación.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera explícitamente; en este versículo no aparece el tetragrámaton en la superficie española por tratarse de una predicción en primera persona divina traducida directamente.
  - Se usa 'remanente' para conservar la resonancia profética de נִשְׁאַר y no reducir el valor teológico del término.
  - '''Jebuseo'' se escribe en minúscula como etnónimo común en español.'
  - 'La puntuación reproduce el quiebre lógico del hebreo: acción de limpieza, resultado de remanente y comparación final.'
