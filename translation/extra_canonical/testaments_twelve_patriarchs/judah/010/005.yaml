translation:
  text: And when I threatened him, he went in to her, but he wasted the seed on the
    ground, according to the command of his mother. So he too died in wickedness.
    And I wanted to give Shelah also to her, but his mother did not allow it; for
    she acted wickedly, because she was not from the daughters of Canaan, as she herself
    was.
