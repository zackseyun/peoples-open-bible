translation:
  language: es
  text: Entonces todo el pueblo se fueron, cada hombre a su casa, y David se volvió para bendecir a su casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hogar» o «su familia». El hebreo puede referirse tanto al edificio como al hogar o la familia vinculados a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - salió
  lexicon: HALOT
  rationale: El wayyiqtol de הלך marca la siguiente acción narrativa. En español, «se fue» comunica de manera natural y directa el movimiento de salida sin añadir matices que el hebreo no exige.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la asamblea
  - toda la gente
  lexicon: HALOT
  rationale: עָם se entiende aquí como el conjunto del pueblo reunido. «Pueblo» conserva el valor colectivo y suena más natural en español bíblico que «gente» o «asamblea» en este cierre narrativo.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El uso distributivo de אִישׁ después de «todo el pueblo» expresa individualidad. Se mantiene el masculino del hebreo con «cada hombre», siguiendo la decisión auditada de no neutralizar innecesariamente.
- source_word: לְבֵיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su vivienda
  lexicon: HALOT
  rationale: בַּיִת puede referirse al edificio o al ámbito doméstico. Aquí, tras el movimiento de salida, «a su casa» reproduce de forma simple la referencia primaria sin forzar la lectura a «hogar».
- source_word: וַיִּסֹּב
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - se dirigió
  lexicon: HALOT
  rationale: סבב expresa un cambio de dirección. «Se volvió» es idiomático en español y conserva la acción de volverse hacia su propia casa sin introducir la idea interpretativa de «regresar».
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: para bendecir
  alternatives_spanish:
  - para dar bendición
  - para pronunciar una bendición
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para bendecir» mantiene la forma verbal sencilla y la carga teológica del acto de bendecir sin ampliar el texto.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su familia
  - a su casa, es decir, su familia
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «household» por la probable referencia doméstica ampliada, en español el sintagma «su casa» conserva la ambigüedad productiva del hebreo entre edificio y grupo familiar. Dado que el contexto ya usa «casa» en la línea anterior y no exige explicitar «familia», se preserva la misma forma.
theological_decisions:
- issue: 'Alcance de בַּיִת: edificio o esfera doméstica/familiar'
  english_pob_reading: David turned to bless his household.
  chosen_spanish_reading: David se volvió para bendecir a su casa.
  alternative_spanish_readings:
  - David se volvió para bendecir a su familia.
  - David se volvió para bendecir a su hogar.
  rationale: El hebreo permite tanto la casa física como la unidad doméstica asociada. El español «su casa» conserva esa tensión sin resolverla de manera innecesaria; la ambigüedad es fiel al término y coherente con el uso inmediato del mismo vocablo en la línea anterior.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con la revisión final inglesa: no se reportan cambios aplicados y el texto fue confirmado con alto acuerdo. La redacción española sigue esa misma lectura estable sin introducir expansiones.'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «pueblo» y «casa» para reproducir la estructura narrativa del hebreo.
  - Se preservó el masculino distributivo de אִישׁ con «cada hombre», según la filosofía auditada.
  - Se evitó «SEÑOR» o «Yahvé» porque este versículo no contiene el nombre divino ni una cita directa del mismo.
  - 'La nota de pie de página marca la única ambigüedad lexical relevante: «casa» como edificio o como unidad doméstica.'
