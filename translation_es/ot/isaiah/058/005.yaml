review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura retórica del hebreo y mantiene los elementos principales: ayuno, humillación propia, cabeza inclinada como planta de pantano, cilicio/ceniza y el día aceptable a Yahvé. Sin embargo, introduce varios desajustes con el sentido y con la auditoría POB: ''yo escogí'' cambia innecesariamente el valor de אֶבְחָרֵהוּ (''que yo escojo/elijo''); la nota [b] no corresponde al lugar ni contenido de la nota inglesa, que en realidad pertenece a ''como un junco''; y la última cláusula queda algo elíptica en español al omitir el artículo/preposición natural (''un día agradable/aceptable a Yahvé'').'
  spanish_quality_summary: El texto es generalmente legible y digno, pero necesita pequeños ajustes para mayor naturalidad y precisión. '¿Es este el ayuno que yo escojo...?' suena mejor y es más fiel que el pretérito. 'Extender cilicio y ceniza' es entendible, aunque 'tender cilicio y ceniza' o 'extenderse sobre cilicio y ceniza' sería más explícito; no es imprescindible cambiarlo. La frase final se beneficia de 'un día aceptable a Yahvé' para sonar completa y más cercana al valor de רָצוֹן.
  glossary_alignment: 'Se alinea bien con ''Yahvé'' y con ''ayuno''. ''Cilicio'' es una opción aceptable para שַׂק en registro bíblico. ''Una persona'' para אָדָם es admisible dado el audit trail inglés revisado, aunque el hebreo es representativo masculino singular. El mayor problema terminológico-documental es la mala colocación de la nota [b]: debe acompañar ''junco'' y reflejar las alternativas de אגמון, no reinterpretar ''ayuno''.'
  issues:
  - severity: medium
    issue: Tiempo verbal de אֶבְחָרֵהוּ
    rationale: El hebreo y el English POB expresan una elección vigente ('that I choose'), no un pasado ('yo escogí'). El pretérito no destruye el sentido, pero sí desplaza el matiz evaluativo actual sin necesidad.
  - severity: high
    issue: Nota [b] anclada al lugar equivocado y con contenido no respaldado
    rationale: La auditoría inglesa preserva una nota alternativa sobre כְּאַגְמֹן ('reed/bulrush/rush'), no sobre צוֹם. En español, la nota [b] en 'ayuno' introduce una explicación interpretativa nueva y deja sin segunda nota la alternativa léxica documentada.
  - severity: low
    issue: Frase final algo incompleta en español
    rationale: '''¿Llamarás a esto ayuno, y día agradable a Yahvé?'' es comprensible, pero suena truncado. ''¿Llamarás a esto ayuno, y un día aceptable a Yahvé?'' reproduce mejor la coordinación nominal y el valor de רָצוֹן.'
  revised_spanish_text: '¿Es este el ayuno que yo escojo: un día para que una persona se humille?[a] ¿Es para inclinar su cabeza como un junco,[b] y para extender cilicio y ceniza? ¿Llamarás a esto ayuno, y un día aceptable a Yahvé?'
  revised_footnotes:
