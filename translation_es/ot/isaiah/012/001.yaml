translation:
  language: es
  text: 'Y dirás en aquel día: «Te alabaré[a], Yahvé, porque aunque estuviste airado conmigo, tu ira se apartó[b], y me consuelas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te daré gracias», ya que el verbo hebreo puede significar tanto dar gracias como alabar en adoración.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «tu ira volvió atrás». El hebreo usa «nariz» o «ira» como modismo para el furor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: And you will say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Y dirás entonces
  - Y dirás en aquel día
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético expresa una acción futura o anunciada; en español, «dirás» comunica de forma natural esa proyección futura sin perder el valor exhortativo/narrativo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se conserva mejor con «en aquel día», que mantiene el tono escatológico e idiomático del hebreo.
- source_word: אוֹדְךָ
  english_pob_choice: I will praise you
  chosen_spanish: Te alabaré
  alternatives_spanish:
  - Te daré gracias
  - Te agradeceré
  lexicon: HALOT
  rationale: ידה en Hifil puede significar alabar o dar gracias. Aquí el contexto es de adoración y liberación, por lo que «alabar» refleja mejor la fuerza doxológica; se conserva la alternativa de agradecimiento en nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre propio del pacto como «Yahvé», siguiendo el criterio del POB de no ocultar el Tetragrama tras un título.
- source_word: אָנַפְתָּ בִּי
  english_pob_choice: you were angry with me
  chosen_spanish: te enojaste contra mí
  alternatives_spanish:
  - estuviste airado conmigo
  - te airaste conmigo
  lexicon: HALOT
  rationale: אָנף expresa estar airado. «Te enojaste contra mí» es natural en español y conserva la relación personal del objeto con la persona afectada.
- source_word: יָשֹׁב אַפְּךָ
  english_pob_choice: your anger has turned away
  chosen_spanish: tu ira se apartó
  alternatives_spanish:
  - tu ira se volvió atrás
  - tu ira se desvió
  lexicon: HALOT
  rationale: אַף es un hebraísmo para «ira/enojo». «Se apartó» transmite bien la imagen idiomática de que la ira retrocede, sin forzar una metáfora extraña al español.
- source_word: וּתְנַחֲמֵנִי
  english_pob_choice: and you comfort me
  chosen_spanish: y me consuelas
  alternatives_spanish:
  - y me has consolado
  - y me consuelas
  lexicon: HALOT
  rationale: נחם en Piel significa consolar/comfortar. El presente mantiene la vividez del resultado en la doxología; además, el paralelismo con la línea anterior se lee con naturalidad en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: La decisión doctrinal del POB es conservar el nombre personal de Dios y no sustituirlo por «Señor». En español, «Yahvé» es la forma más ampliamente reconocible y reverente dentro de este proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza concesiva de כִּי
  english_pob_reading: for though you were angry with me
  chosen_spanish_reading: porque aunque te enojaste contra mí
  alternative_spanish_readings:
  - porque te enojaste contra mí
  - aunque te enojaste contra mí
  rationale: 'El hebreo permite una relación causal, pero el encadenamiento del versículo pide un matiz concesivo: la alabanza surge pese a la ira pasada, porque esa ira ha cedido y Dios consuela. «Porque aunque» preserva ambas fuerzas sin añadir contenido ajeno.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la última revisión: se mantienen el nombre divino como Yahvé, el matiz concesivo de כִּי y la lectura idiomática de אַף como ira que se aparta. La principal decisión estilística en español es usar «Te alabaré» y «me consuelas» para un registro bíblico natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la distinción entre «ira» (אַף) y el acto de consolar (נחם), sin suavizar la tensión del verso.
  - La forma verbal en español se ajusta al futuro profético sin recurrir a calcos mecánicos del inglés.
