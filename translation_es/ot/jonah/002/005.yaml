translation:
  language: es
  text: 'Y yo dije: «He sido arrojado de delante de tus ojos[a]; sin embargo, volveré a mirar hacia tu santo templo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de tu vista» o «fuera de tu presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Pero yo
  - Entonces yo
  lexicon: HALOT
  rationale: La conjunción con pronombre personal mantiene la continuidad narrativa con énfasis en el hablante. En español, «Y yo» conserva esa unión simple sin añadir un contraste que el hebreo no exige.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - pensé
  - hablé
  lexicon: HALOT
  rationale: El verbo hebreo normalmente significa «decir». En poesía orante puede acercarse al discurso interior, pero «dije» preserva mejor la forma verbal del original y suena natural en español.
- source_word: נִגְרַשְׁתִּי
  english_pob_choice: I have been driven out
  chosen_spanish: He sido arrojado
  alternatives_spanish:
  - He sido expulsado
  - He sido echado
  - Fui expulsado
  lexicon: HALOT
  rationale: El nifal de גרש expresa haber sido echado o expulsado. «He sido arrojado» conserva el sentido pasivo y la fuerza vívida de desplazamiento. Se evita una ampliación legal o exílica que el texto no explicita.
- source_word: מִנֶּגֶד עֵינֶיךָ
  english_pob_choice: from before your eyes
  chosen_spanish: de delante de tus ojos
  alternatives_spanish:
  - de tu vista
  - fuera de tu presencia
  - alejado de tu mirada
  lexicon: HALOT
  rationale: 'La expresión es concreta: literalmente, «de delante de tus ojos». «De delante de tus ojos» preserva la imagen hebrea y, al mismo tiempo, es comprensible en español. La alternativa más interpretativa «fuera de tu presencia» queda implícita sin imponerse en el texto principal.'
- source_word: אַךְ
  english_pob_choice: yet
  chosen_spanish: sin embargo
  alternatives_spanish:
  - pero
  - no obstante
  - ciertamente
  lexicon: HALOT
  rationale: La partícula introduce un giro fuerte desde la aparente exclusión hacia la esperanza renovada. «Sin embargo» transmite bien el contraste con un registro claro y digno.
- source_word: אוֹסִיף
  english_pob_choice: I will again
  chosen_spanish: todavía miraré
  alternatives_spanish:
  - volveré a mirar
  - miraré otra vez
  - seguiré mirando
  lexicon: HALOT
  rationale: El hifil de יסף con infinitivo sugiere hacer algo de nuevo o continuar haciéndolo. En este contexto, el sentido de reanudación se expresa naturalmente con «todavía miraré», que comunica continuidad de esperanza sin sobretraducir la partícula.
- source_word: לְהַבִּיט
  english_pob_choice: look toward
  chosen_spanish: mirar hacia
  alternatives_spanish:
  - volver la mirada hacia
  - contemplar
  - mirar
  lexicon: HALOT
  rationale: El infinitivo significa «mirar». Con אֶל, el enfoque direccional se expresa mejor en español con «mirar hacia», especialmente por tratarse de una orientación devocional hacia el templo.
- source_word: הֵיכַל קָדְשֶׁךָ
  english_pob_choice: your holy temple
  chosen_spanish: tu santo templo
  alternatives_spanish:
  - tu templo santo
  - tu santuario santo
  - el templo de tu santidad
  lexicon: HALOT
  rationale: הֵיכָל, en referencia a Dios, se rinde con naturalidad como «templo». El adjetivo «santo» refleja קָדְשֶׁךָ y conserva la formulación bíblica sin recurrir a una paráfrasis más abstracta.
theological_decisions:
- issue: Cómo expresar la exclusión divina de מִנֶּגֶד עֵינֶיךָ sin resolverla demasiado
  english_pob_reading: from before your eyes
  chosen_spanish_reading: de delante de tus ojos
  alternative_spanish_readings:
  - de tu vista
  - fuera de tu presencia
  rationale: El hebreo es una imagen concreta que puede implicar tanto percepción como favor/presencia divina. El español mantiene la imagen literal para no cerrar la tensión teológica; la lectura más interpretativa se deja como posibilidad, no como sustituto del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; se ha mantenido la lectura de continuidad narrativa, la imagen concreta de exclusión y el giro de esperanza renovada sin ampliar el contenido del verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - «Templo» se usa para הֵיכָל por consistencia con el uso bíblico referido a la morada de Dios.
  - Se conserva el contraste entre exclusión y esperanza sin convertirlo en una paráfrasis doctrinal.
