translation:
  language: es
  text: 'En mis oídos[a] Yahvé de los Ejércitos[b] juró: Ciertamente muchas casas se volverán una desolación, casas grandes y buenas, sin morador.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «En mis oídos», un modismo que indica que Isaías oyó esto directamente.'
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé de las Huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָזְנַי
  english_pob_choice: In my ears
  chosen_spanish: En mis oídos
  alternatives_spanish:
  - En mi oído
  - Yo lo oí
  lexicon: HALOT
  rationale: Conservo el giro idiomático hebreo y su efecto de inmediatez profética. En español, 'En mis oídos' mantiene la imagen sin perder claridad; 'Yo lo oí' sería más explicativo pero menos pegado al texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: 'Sigo el criterio editorial del proyecto para el Tetragrámaton: usar ''Yahvé'' como nombre propio divino, no una sustitución tradicional por título. ''SEÑOR'' ocultaría el nombre revelado.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de los Ejércitos
  lexicon: HALOT
  rationale: '''Ejércitos'' reproduce el campo semántico de la expresión sin la opacidad de ''Huestes''. Conserva el título divino de mando sobre fuerzas ordenadas.'
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguramente
  - En verdad
  lexicon: HALOT
  rationale: En contexto de juramento, la construcción funciona como una fuerte afirmación. 'Ciertamente' comunica bien la certeza solemne en español sin convertirlo en una condicional literal.
- source_word: בָּתִּים רַבִּים
  english_pob_choice: many houses
  chosen_spanish: muchas casas
  alternatives_spanish:
  - muchas viviendas
  - muchas mansiones
  lexicon: HALOT
  rationale: El referente es concreto y arquitectónico; 'casas' es el equivalente más directo y natural. Evito 'mansiones' por exceso interpretativo.
- source_word: לְשַׁמָּה
  english_pob_choice: will become a desolation
  chosen_spanish: se volverán una desolación
  alternatives_spanish:
  - quedarán desoladas
  - se convertirán en desolación
  lexicon: HALOT
  rationale: La frase nominal señala el resultado del juicio. 'Se volverán una desolación' conserva ese valor resultativo y suena natural en español.
- source_word: גְּדֹלִים וְטוֹבִים
  english_pob_choice: great and good houses
  chosen_spanish: casas grandes y buenas
  alternatives_spanish:
  - casas grandes y hermosas
  - casas grandes y prósperas
  lexicon: HALOT
  rationale: Mantengo la yuxtaposición adjetival simple. 'Buenas' deja el valor de calidad/aprecio sin adelantar excesivamente una interpretación estética o económica.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin morador
  alternatives_spanish:
  - sin habitantes
  - sin nadie que habite
  lexicon: HALOT
  rationale: '''Sin morador'' es breve, solemne y corresponde al hebreo compacto. Aunque singular, funciona de manera genérica en español y preserva la fuerza de despoblación.'
theological_decisions:
- issue: Tratamiento del nombre divino YHWH y del título צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - SEÑOR de los Ejércitos
  - Yahvé de las Huestes
  rationale: El texto hebreo usa el nombre propio divino, no un mero título. Siguiendo la norma del proyecto, se traduce YHWH como 'Yahvé'. Para צְבָאוֹת, 'de los Ejércitos' conserva el sentido de mando y evita el calco más arcaico 'Huestes', menos transparente hoy.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Función de אִם לֹא en un contexto de juramento
  english_pob_reading: Surely
  chosen_spanish_reading: Ciertamente
  alternative_spanish_readings:
  - Si no
  - En verdad
  - Seguro que
  rationale: No debe leerse como una condicional ordinaria. En juramentos y fórmulas solemnes, la expresión afirma con intensidad la certeza de lo dicho; 'Ciertamente' transmite mejor esa fuerza en español.
  doctrine_reference: Uso idiomático hebreo en fórmulas de juramento
translation_notes:
  revision_awareness: 'Alineado con la última revisión: no se requirieron cambios sustanciales; se mantiene el sentido del juicio y el tratamiento del nombre divino según la política editorial actual.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, coherente con la terminología del proyecto.
  - '''Ejércitos'' se usa para צְבָאוֹת en concordancia con la lectura inglesa ''of Armies''.'
  - '''Casas'' conserva el referente concreto del hebreo, evitando una abstracción de ''hogares''.'
  - '''Sin morador'' preserva el cierre seco del versículo y su imagen de abandono total.'
