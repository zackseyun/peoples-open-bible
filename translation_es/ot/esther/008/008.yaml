revisions:
- from: Pero ustedes pueden escribir acerca de los judíos conforme a lo que les parezca bueno[a], en nombre del rey, y sellarlo con el anillo de sello[b] del rey; porque un documento que se escribe en nombre del rey y se sella con el anillo de sello del rey no puede ser revocado.
  to: Pero ustedes pueden escribir acerca de los judíos como les parezca bien[a], en nombre del rey, y sellarlo con el anillo de sello del rey; porque un documento escrito en nombre del rey y sellado con el anillo de sello del rey no puede ser revocado[b].
  rationale: Se corrige la ubicación y el contenido de la nota b para que coincidan con la decisión léxica auditada sobre la irrevocabilidad del edicto. También se mejora la naturalidad y fidelidad de la construcción legal con «documento escrito… y sellado…» y se suaviza el modismo inicial a «como les parezca bien», dejando la mayor transparencia literal en la nota [a].
