base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/016.yaml
  text: 'Half of it he burns in the fire[a]; over the other half he eats meat: he roasts a roast and is satisfied. He also warms himself and says, “Aha! I am warm[c][b]; I have seen the fire.”'
  footnotes:
  - marker: a
    text: Or “he roasts meat”; Hebrew literally uses a cognate expression, “he roasts a roast.”
    reason: lexical_alternative
  - marker: b
    text: Or “I have seen the flame.” The Hebrew noun can denote fire, flame, or glowing light.
    reason: lexical_alternative
  - marker: c
    text: Or 'he eats meat, he roasts a roast'.
    reason: previous_rendering
