    text: Or “your only son.” The Hebrew adjective means “only” or “unique,” and can be rendered either way in English here.
    reason: lexical_alternative
  - marker: b
    text: Or “did not spare.” The Hebrew verb can mean “withhold,” “hold back,” or in context “spare.”
    reason: lexical_alternative
