translation:
  language: es
  text: 'De los porteros: Salumo y Tobanes[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «De los porteros: Salumo y Tobanes». El testimonio hebreo paralelo para esta sección no coincide estrechamente en este punto y no conserva estos nombres en la misma forma.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: From
  chosen_spanish: De entre
  alternatives_spanish:
  - De
  - Entre
  lexicon: LSJ
  rationale: En una lista de personal, ἐκ señala el grupo del cual provienen los nombrados. «De entre» conserva la idea de pertenencia al conjunto y suena natural en español de registro bíblico.
- source_word: τῶν θυρωρῶν
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los porteros del templo
  lexicon: LSJ
  rationale: θυρωρός es quien cuida la puerta o la entrada. «Porteros» mantiene la función con una palabra breve y bíblicamente inteligible en español; «guardianes de la puerta» sería más explicativo pero menos idiomático.
- source_word: Σάλλουμος
  english_pob_choice: Shallumus
  chosen_spanish: Salumús
  alternatives_spanish:
  - Shallumus
  - Salumus
  lexicon: transliteration from Greek
  rationale: Se busca reflejar la forma griega Σάλλουμος sin forzar una armonización con una forma hebrea distinta. «Salumús» preserva mejor la terminación griega y evita importar una identificación no garantizada por el texto griego.
- source_word: Τοβάνης
  english_pob_choice: Tobanes
  chosen_spanish: Tobanes
  alternatives_spanish:
  - Tobanes
  - Tobanés
  lexicon: transliteration from Greek
  rationale: La forma griega Τοβάνης se representa directamente como «Tobanes», sin convertirla en un nombre hebreo familiarizante que no está en el testimonio primario.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete LXX 1909 y mantiene la observación auditada de que el paralelo hebreo no alinea estrechamente esta línea ni conserva los nombres en la misma forma. No se requieren cambios de sentido ni notas doctrinales.
  spanish_consistency_notes:
  - Se usa «porteros» para θυρωροί, en coherencia con el valor funcional de guardia de acceso.
  - Se evita normalizar Σάλλουμος a una forma hebrea distinta; la transliteración sigue el griego como fuente primaria.
  - Se conserva una estructura breve de lista, apropiada para un registro nominal.
