translation:
  language: es
  text: y que Dios les haga el bien[a], y recuerde su pacto con Abraham, Isaac y Jacob, que fueron sus esclavos fieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les haga bien». El griego expresa un deseo de acción benéfica de parte de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαθοποιῆσαι
  english_pob_choice: do good
  chosen_spanish: les haga bien
  alternatives_spanish:
  - les haga el bien
  - les favorezca
  - les beneficie
  lexicon: LSJ
  rationale: El infinitivo aoristo en este contexto expresa un deseo o súplica de beneficio divino. En español, «hacer bien»/«hacerles bien» comunica de manera natural esa acción benéfica sin añadir contenido interpretativo.
- source_word: μνησθῆναι
  english_pob_choice: remember
  chosen_spanish: recuerde
  alternatives_spanish:
  - se acuerde de
  - tenga presente
  - sea mindful de
  lexicon: LSJ
  rationale: En contexto de pacto, el verbo implica más que memoria mental; sugiere atención fiel al pacto. «Recuerde» mantiene la resonancia bíblica y la forma de súplica sin expandir el sentido en el texto principal.
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: LSJ
  rationale: Aunque «covenant» suele ser «pacto» en español bíblico, aquí la referencia a Abraham, Isaac y Jacob confirma el trasfondo pactual. «Pacto» conserva la fuerza bíblica y es claro para lectura pública.
- source_word: δούλων
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: LSJ
  rationale: Siguiendo la preferencia terminológica del proyecto, δοῦλος se rinde como «esclavo» cuando la pertenencia vinculada a Dios es teológicamente relevante. Aquí la frase «sus esclavos fieles» preserva esa relación de propiedad y lealtad.
- source_word: πιστῶν
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - leales
  - confiables
  lexicon: LSJ
  rationale: El adjetivo califica a «esclavos» y describe la relación de Abraham, Isaac y Jacob con Dios. «Fieles» es la forma más directa y natural en español, con resonancia bíblica.
theological_decisions:
- issue: Renderizar δοῦλος aplicado a Abraham, Isaac y Jacob
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  rationale: El texto identifica a los patriarcas como δοῦλοι de Dios. Mantener «esclavos» conserva la relación de pertenencia y evita suavizar un término que el audit trail del POB trata como teológicamente significativo.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; Translation philosophy §§1, 5'
translation_notes:
  revision_awareness: El texto griego se corresponde bien con el seguimiento auditado en inglés. Se conservó la tensión terminológica de δοῦλοι como «esclavos», pese a que una revisión inglesa reciente propuso «servants» por registro; la corrección regresiva restauró «slaves», confirmando la elección más fuerte. No se introducen variantes textuales ni ampliaciones no sustentadas.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός según el estándar del proyecto.
  - Se usa «pacto» para διαθήκη en sentido bíblico-covenantal.
  - 'Se conserva el orden de los patriarcas como en el griego: Abraham, Isaac y Jacob.'
  - La puntuación y el uso de coma siguen el español bíblico moderno y la legibilidad pública.
