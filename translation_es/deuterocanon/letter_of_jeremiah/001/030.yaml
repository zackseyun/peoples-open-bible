translation:
  language: es
  text: Y en sus casas los sacerdotes se sientan con ostentación[a], con sus túnicas rasgadas, y sus cabezas y sus barbas rapadas, con las cabezas descubiertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se sientan en asientos'; el verbo griego puede denotar sentarse en un asiento ceremonial. Un sentido literal relacionado con un asiento de carro es menos probable en este contexto interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: διφρεύουσιν
  english_pob_choice: sit in state
  chosen_spanish: se sientan en dignidad
  alternatives_spanish:
  - se sientan
  - se sientan en trono
  - se sientan en asiento ceremonial
  lexicon: LSJ
  rationale: El griego sugiere una postura sentada con posible matiz ceremonial. Como el contexto es doméstico, 'se sientan en dignidad' conserva la idea de una postura ostentosa o de honor sin forzar una imagen de carro o de trono literal.
- source_word: χιτῶνας
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - vestiduras
  - ropas
  - vestidos
  lexicon: LSJ
  rationale: '''Túnicas'' reproduce con precisión el tipo de prenda básica indicada por χιτών y evita ampliar indebidamente a cualquier prenda genérica.'
- source_word: διερρωγότας
  english_pob_choice: torn
  chosen_spanish: rasgadas
  alternatives_spanish:
  - rotas
  - desgarradas
  - hechas jirones
  lexicon: LSJ
  rationale: El participio perfecto describe prendas ya rasgadas; 'rasgadas' es natural en español y mantiene el estado resultante sin archaísmo.
- source_word: ἐξυρημένους
  english_pob_choice: shaved
  chosen_spanish: rapadas
  alternatives_spanish:
  - afeitadas
  - rasuradas
  - sin pelo
  lexicon: LSJ
  rationale: Para cabezas y barbas, 'rapadas' comunica el acto de quitar el cabello con fuerza y concisión, y resulta idiomático en español bíblico contemporáneo.
- source_word: ἀκάλυπτοί
  english_pob_choice: uncovered
  chosen_spanish: descubierta
  alternatives_spanish:
  - sin cubrir
  - sin velo
  - al descubierto
  lexicon: LSJ
  rationale: '''Descubierta'' reproduce la idea de no cubierto aplicada a la cabeza, y en español fluye naturalmente con ''la cabeza descubierta''.'
- source_word: οἴκοις
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - moradas
  - casas de ellos
  lexicon: LSJ
  rationale: El texto griego dice literalmente 'casas'; se conserva ese sentido básico sin reinterpretarlo como templo o santuario, tal como exige el audit trail.
theological_decisions:
- issue: Descripción cultual de sacerdotes idolátricos sin añadir interpretación externa
  english_pob_reading: Render the verse descriptively without importing interpretive labels such as 'mourning rites' or 'ecstatic ritual.'
  chosen_spanish_reading: Traducir la escena de manera descriptiva, sin añadir etiquetas interpretativas como 'ritos de duelo' o 'éxtasis ritual.'
  alternative_spanish_readings:
  - Interpretar explícitamente las túnicas rasgadas y las cabezas rapadas como señales de duelo
  - Interpretar 'se sientan en dignidad' como entronización ceremonial
  rationale: La lista de rasgos visibles del griego debe mantenerse concreta. La versión española describe la escena sin convertirla en una explicación ritual que el texto no expresa de forma directa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente redacción mantiene ese acuerdo y solo afina la naturalidad del español sin alterar las decisiones auditadas.
  spanish_consistency_notes:
  - Se mantuvo 'casas' para οἴκοις, conforme al texto griego y al audit trail.
  - Se evitó 'SEÑOR' o terminología interpretativa no presente en el verso.
  - '''Túnicas'', ''rasgadas'', ''rapadas'' y ''descubierta'' preservan la secuencia descriptiva del original.'
  - La nota al pie se ancla en 'se sientan en dignidad' para reflejar la alternativa semántica de διφρεύουσιν.
