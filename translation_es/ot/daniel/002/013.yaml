    reason: lexical_alternative
  - marker: b
    text: O «estaban siendo muertos» o «estaban siendo asesinados». La forma verbal sugiere que las ejecuciones ya estaban en curso.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la expresión verbal de la acción en curso sobre los sabios para lograr un español natural y fiel al contexto. 'Ejecutados' comunica mejor en español la muerte impuesta por decreto, mientras mantiene el aspecto progresivo indicado por el arameo. Se conserva 'salió el decreto' por su valor literal y la nota ya explica la alternativa idiomática.
