revisions:
- from: entonces te deleitarás en Yahvé[a], y yo te haré subir sobre las alturas de la tierra; te haré comer la herencia de Jacob tu padre[b], porque la boca de Yahvé ha hablado.
  to: entonces te deleitarás en Yahvé, y yo te haré cabalgar sobre las alturas de la tierra[a]; te alimentaré con la herencia de Jacob tu padre[b], porque la boca de Yahvé ha hablado.
  rationale: Se revisa para alinear mejor el español con el hebreo y con el razonamiento documentado del POB. «Te haré cabalgar» preserva el causativo y la imaginería de רכב. «Te alimentaré con» evita una construcción poco idiomática con «herencia» y sigue expresando el disfrute otorgado de la bendición pactual. La nota a se reancla correctamente en «alturas», y la nota b se pule para mayor naturalidad.
