translation:
  language: es
  text: Pero ahora[a], si perdonas su pecado —pero si no[b], por favor, bórrame de tu libro que has escrito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevas lejos su pecado» o «perdonas su pecado»; el hebreo usa literalmente el modismo de «levantar/cargar» con «pecado».
    reason: lexical_alternative
  - marker: b
    text: «Tu libro» puede referirse a un registro divino de los vivos o, por extensión, al libro de la vida; el hebreo no lo especifica más.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: El giro discursivo es urgente y contrasta con la súplica anterior; «Pero ahora» conserva mejor el matiz adversativo que un simple «y ahora».
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  lexicon: HALOT
  rationale: La partícula condicional se expresa de forma directa con «si».
- source_word: תִּשָּׂא
  english_pob_choice: you will forgive
  chosen_spanish: perdonas
  alternatives_spanish:
  - llevas
  - cargas
  - llevas lejos
  - absolves
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de «llevar/levantar» con «pecado»; en español, «perdonas» comunica con claridad la fuerza idiomática sin perder el valor teológico del acto.
- source_word: חַטָּאתָם
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su culpa
  - su falta
  lexicon: HALOT
  rationale: «Pecado» mantiene el peso lexical y teológico del sustantivo hebreo, y el posesivo singular colectivo español comunica naturalmente el sufijo plural hebreo.
- source_word: וְאִם אַיִן
  english_pob_choice: but if not
  chosen_spanish: y si no
  alternatives_spanish:
  - pero si no
  - o si no
  lexicon: HALOT
  rationale: La construcción es elíptica y contrastiva; en español, «y si no» reproduce bien la brevedad de la cláusula y mantiene la oposición implícita con la petición anterior.
- source_word: מְחֵנִי
  english_pob_choice: blot me out
  chosen_spanish: bórrame
  alternatives_spanish:
  - borra mi nombre
  - elimíname
  - bórrame del registro
  lexicon: HALOT
  rationale: «Bórrame» preserva la imagen de eliminar una inscripción o registro. El contexto del libro hace innecesario explicitar «nombre» en el texto principal.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - te lo ruego
  lexicon: HALOT
  rationale: La partícula de súplica se vierte con la fórmula contemporánea y reverente «por favor».
- source_word: מִסִּפְרְךָ
  english_pob_choice: out of your book
  chosen_spanish: de tu libro
  alternatives_spanish:
  - de tu registro
  - de tu rollo
  - de tu libro de vida
  lexicon: HALOT
  rationale: «Libro» es la opción más fiel e idiomática, y conserva la ambigüedad del referente divino sin resolverlo prematuramente.
- source_word: אֲשֶׁר כָּתָבְתָּ
  english_pob_choice: that you have written
  chosen_spanish: que has escrito
  alternatives_spanish:
  - que escribiste
  - el cual has escrito
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa naturalmente con el presente perfecto español, que comunica una acción completada con relevancia actual.
theological_decisions:
- issue: Naturaleza del «libro» divino
  english_pob_reading: your book
  chosen_spanish_reading: tu libro
  alternative_spanish_readings:
  - tu registro
  - tu libro de vida
  - tu rollo
  rationale: El hebreo no especifica el tipo exacto de libro. Mantener «tu libro» conserva la tensión teológica, evitando decidir si se trata del libro de la vida, un registro de los vivos u otro registro divino.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
- issue: Valor idiomático de נשׂא con objeto «pecado»
  english_pob_reading: you will forgive their sin
  chosen_spanish_reading: perdonas su pecado
  alternative_spanish_readings:
  - llevas su pecado
  - cargas con su pecado
  - absuelves su pecado
  rationale: Aunque el hebreo literalmente dice «levantar/cargar» el pecado, en español «perdonar» es la equivalencia funcional más clara. La imagen idiomática queda respaldada por la nota, para no ocultar la base lexical del original.
  doctrine_reference: 'Notas léxicas: conservar el sentido idiomático sin borrar la literalidad del hebreo.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios necesarios y el consenso de revisión es alto. La redacción española sigue el mismo sentido base del audit trail inglés, preservando la ambigüedad del «libro» y la fuerza idiomática de נשׂא con «pecado».'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según el contexto del pasaje, pero aquí el referente pronominal directo permite mantener «tu» sin introducir el nombre divino en el verso.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos como «ruego» salvo en la nota.
  - La puntuación con raya reproduce la contrastiva hebrea y la estructura del inglés auditado.
  - No se convierte «libro» en «libro de la vida» en el texto principal para no resolver la tensión teológica documentada.
