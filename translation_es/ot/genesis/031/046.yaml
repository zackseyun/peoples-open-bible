    issue: Marcadores de notas mal asignados respecto del contenido
    rationale: La nota [a] en el borrador explica «hermanos», pero el contenido de la nota [a] inglesa auditada corresponde a la alternativa espacial «sobre el montón». Las notas deben ir en orden y anclarse en la frase pertinente del texto español.
  - severity: medium
    issue: Falta la nota sobre la lectura más literal de עַל
    rationale: El inglés POB preserva explícitamente la alternativa «on the heap». En español debe mantenerse como «sobre el montón» anclada en la frase final para no perder una alternativa significativa del hebreo.
  - severity: low
