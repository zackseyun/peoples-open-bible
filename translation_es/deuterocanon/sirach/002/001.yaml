  source_alignment_summary: 'El borrador refleja fielmente el hebreo primario y el griego de apoyo: vocativo filial singular, acercarse para servir a Yahvé, preparación personal y expectativa de prueba. Sin embargo, omite en la nota la alternativa más literal ''prepara tu alma''/''tu ser'' que el rastro inglés conserva, y la formulación ''para toda prueba'' suena menos natural que una construcción plural en español para el sentido distributivo de לְכָל נִסָּיוֹן.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Hijo mío' y 'Yahvé' están bien. La frase central sería más idiomática como 'prepárate para toda clase de pruebas' o 'prepárate para cada prueba'. También conviene afinar la nota para reflejar mejor la tensión hebreo/griego entre prueba y tentación y la alternativa literal con 'alma'.
  glossary_alignment: 'Alinea bien con los términos del proyecto: יהוה → ''Yahvé''; עבד/δουλεύειν → ''servir''; נִסָּיוֹן/πειρασμός → ''prueba'' con nota de alternativa. No hay conflicto doctrinal. La decisión reflexiva por נפשך está bien, pero la nota debería preservar la alternativa literal documentada por el POB en inglés.'
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa literal relacionada con נַפְשְׁךָ / τὴν ψυχήν σου.
    rationale: El rastro inglés documenta explícitamente 'prepare your soul for trial' como alternativa significativa. En español conviene conservar 'prepara tu alma para la prueba' o equivalente para no perder una decisión léxica auditada.
  - severity: low
    issue: '''para toda prueba'' es comprensible pero algo poco idiomático en español.'
    rationale: El hebreo expresa preparación integral ante cualquier clase de prueba. En español suena más natural 'para toda clase de pruebas' o 'para cada prueba' sin alterar el sentido.
  - severity: low
    issue: La nota actual introduce 'examen', que no es la mejor alternativa contextual.
    rationale: Aunque puede entrar en el campo semántico de testing, 'examen' en español contemporáneo distrae y no refleja tan bien la carga sapiencial de prueba/tentación.
  revised_spanish_text: Hijo mío[a], si te acercas para servir a Yahvé, prepárate para toda clase de pruebas.
  revised_footnotes:
  - marker: a
    text: 'O: «prepara tu alma para la prueba»; el hebreo y el griego usan un término que puede referirse a prueba o a tentación, según el contexto.'
    reason: lexical_alternative
