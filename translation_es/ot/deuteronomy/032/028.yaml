lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del enunciado anterior. En español, «Porque» conserva bien esa relación y suena natural en registro bíblico moderno.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: El sustantivo colectivo singular designa un grupo nacional/étnico. «Nación» sigue de cerca la decisión auditada en inglés y mantiene el matiz colectivo.
- source_word: אֹבַד עֵצוֹת
  english_pob_choice: devoid of counsel
  chosen_spanish: sin consejo
  alternatives_spanish:
  - carente de consejo
  - sin discernimiento
  - falto de prudencia
  lexicon: HALOT
  rationale: La expresión describe una condición de carencia de buen consejo o plan prudente. «Sin consejo» es breve, idiomático en español y evita sobreexplicar el hebreo.
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: ellos son
  alternatives_spanish:
  - son ellos
  - ellos
  lexicon: HALOT
  rationale: El pronombre independiente da énfasis al sujeto. En español se conserva con «ellos» y se explicita la cópula con «son» para reflejar la cláusula nominal.
- source_word: וְאֵין
  english_pob_choice: and there is no
  chosen_spanish: y no hay
  alternatives_spanish:
  - y no existe
  - y no hay allí
  lexicon: HALOT
  rationale: La negación existencial queda bien en español con «no hay», que reproduce la estructura de existencia/ausencia sin forzar la sintaxis.
- source_word: בָּהֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - entre ellos
  lexicon: HALOT
  rationale: El valor locativo interno del preposición se expresa de manera directa con «en ellos», manteniendo el paralelo con la primera cola.
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  - prudencia
  lexicon: HALOT
  rationale: En el campo sapiencial, «entendimiento» comunica la capacidad de discernir y corresponde bien al par hebreo con «consejo».
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin revisiones sustantivas; la versión española sigue la misma lectura y conserva el paralelismo sapiential del hebreo.
  spanish_consistency_notes:
  - Se evita «Señor» o terminología teológica no presente en el versículo.
  - Se conserva el paralelismo entre la falta de consejo y la ausencia de entendimiento.
  - El registro es bíblico y claro, sin depender de calcos innecesarios.
