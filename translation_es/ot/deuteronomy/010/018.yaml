revisions:
- from: Él hace justicia al huérfano y a la viuda[a], y ama al extranjero residente[b], dándole[c] pan y vestido.
  to: Él hace justicia al huérfano y a la viuda[a], y ama al extranjero residente[b], dándole pan[c] y ropa.
  rationale: Se mantiene la fidelidad general del borrador, pero se corrige «vestido» a «ropa» para reflejar mejor el sentido general de שִׂמְלָה y evitar una lectura demasiado específica o poco natural. También se ajusta la nota c para que describa con precisión la literalidad de לֶחֶם («pan») y el sentido de la expresión completa en español.
  reviewer_model: gpt-5.4
