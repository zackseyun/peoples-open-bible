translation:
  language: es
  text: Rómpela en pedazos[a] y derrama aceite sobre ella; es una ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «en trozos» o «en fragmentos». El hebreo enfatiza que la ofrenda se rompe en partes más pequeñas antes de derramar el aceite sobre ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּת֤וֹת
  english_pob_choice: Break
  chosen_spanish: Rómpelo
  alternatives_spanish:
  - Divídelo
  - Desmenúzalo
  lexicon: HALOT
  rationale: El infinitivo absoluto con fuerza imperativa en instrucciones sacrificiales pide una acción directa. «Rómpelo» conserva el gesto concreto y natural en español, sin suavizar la fuerza verbal del hebreo.
- source_word: אֹתָ/הּ
  english_pob_choice: it
  chosen_spanish: lo/él
  alternatives_spanish:
  - la
  - ello
  lexicon: referencia pronominal al sacrificio/ofrenda
  rationale: El sufijo femenino se refiere a la ofrenda, pero en español el antecedente puede expresarse de modo neutro o masculino gramatical según el sustantivo implícito. Aquí se integra en «Rómpelo» por fluidez, manteniendo la referencia al objeto sacrificial.
- source_word: פִּתִּ֔ים
  english_pob_choice: into pieces
  chosen_spanish: en pedazos
  alternatives_spanish:
  - en trozos
  - en fragmentos
  lexicon: HALOT
  rationale: El plural expresa el resultado de romper la ofrenda. «En pedazos» es idiomático, claro y suficientemente literal para el contexto ritual.
- source_word: וְ/יָצַקְתָּ֥
  english_pob_choice: and pour
  chosen_spanish: y derrama
  alternatives_spanish:
  - y vierte
  - y echarás
  lexicon: HALOT
  rationale: «Derrama» comunica bien la acción de verter aceite sobre la ofrenda y suena natural en español bíblico contemporáneo, conservando la secuencia instructiva del hebreo.
- source_word: עָלֶ֖י/הָ
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre ella
  lexicon: preposición על con sufijo
  rationale: La preposición pide dirección hacia la superficie del objeto. «Sobre él» es funcional y evita una repetición poco elegante de «it» con un referente no personal.
- source_word: שָׁ֑מֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: El hebreo dice simplemente «aceite». En español, «aceite» expresa el término básico sin añadir «de oliva», que no está explícito en el texto.
- source_word: מִנְחָ֖ה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  lexicon: HALOT
  rationale: En Levítico 2 el término designa la ofrenda no animal de productos del campo. «Ofrenda vegetal» comunica la clase de ofrenda en español bíblico actual; se evita «grano» porque aquí el ofrecimiento puede incluir harina y preparaciones cocidas, no solo grano crudo.
- source_word: הִֽוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - esto es
  - se trata de
  lexicon: pronombre independiente copulativo
  rationale: El pronombre independiente identifica la ofrenda ya descrita. En español basta la cópula «es» para preservar la predicación sin sobrecargar la frase.
theological_decisions:
- issue: Naturaleza de מִנְחָה en Levítico 2
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  rationale: 'No hay una decisión doctrinal controvertida, pero sí una elección cultual importante: el término no se reduce a «grano» en sentido estrecho. «Ofrenda vegetal» mantiene la categoría ritual de ofrenda procedente de productos de la tierra, acorde con el contexto de Levítico 2.'
  doctrine_reference: Levítico 2; léxico cultual de מִנְחָה
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios respecto del sentido base del hebreo ni del trazado auditado en inglés.'
  spanish_consistency_notes:
  - Se mantuvo una equivalencia funcional con el hebreo imperativo secuencial.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no pertinentes aquí.
  - «Ofrenda vegetal» se usa de manera consistente para מִנְחָה en este contexto ritual.
  - La puntuación y el orden reflejan una instrucción ceremonial breve y directa.
