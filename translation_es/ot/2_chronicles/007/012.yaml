translation:
  language: es
  text: 'Entonces Yahvé se apareció a Salomón de noche[a] y le dijo[b]: «He oído tu oración y he escogido este lugar para mí como casa de sacrificio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la noche».
    reason: lexical_alternative
  - marker: b
    text: O «para una casa de sacrificio»; es decir, un lugar apartado para la adoración sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - se mostró
  - se reveló
  lexicon: HALOT
  rationale: El niphal de ראה aquí señala una manifestación visible de Yahvé a Salomón. «Se apareció» conserva el sentido teofánico de manera natural en español sin añadir más de lo que el texto dice.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según la pauta del proyecto: transliteración del Tetragrámaton, no una sustitución por título. «Yahvé» es la forma estándar del proyecto en español.'
- source_word: בַּלָּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: La expresión hebrea indica el momento nocturno. «De noche» es idiomático en español y conserva el valor temporal sin sonar forzado.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - He escuchado
  - Oí
  lexicon: HALOT
  rationale: El perfecto comunica una acción completada con relevancia presente en el discurso directo divino. «He oído» reproduce bien ese matiz.
- source_word: תְּפִלָּתֶךָ
  english_pob_choice: your prayer
  chosen_spanish: tu oración
  alternatives_spanish:
  - tu plegaria
  - tu súplica
  lexicon: HALOT
  rationale: El sustantivo se refiere a la oración en sentido amplio; «oración» es el equivalente más directo y claro en español.
- source_word: וּבָחַרְתִּי
  english_pob_choice: and have chosen
  chosen_spanish: y he escogido
  alternatives_spanish:
  - y he elegido
  - y he seleccionado
  lexicon: HALOT
  rationale: El perfecto expresa una decisión divina ya tomada y vigente. «He escogido» mantiene ese valor y suena natural en español.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar aquí
  lexicon: HALOT
  rationale: La referencia inmediata es al emplazamiento del templo. «Este lugar» es claro, conciso y suficientemente específico.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mi propio uso
  - como mío
  lexicon: HALOT
  rationale: El dativo expresa destino/pertenencia divina. «Para mí» comunica esa relación sin sobrecargar la frase.
- source_word: לְבֵית זָבַח
  english_pob_choice: as a house of sacrifice
  chosen_spanish: como casa de sacrificio
  alternatives_spanish:
  - como casa para el sacrificio
  - como casa de sacrificios
  - como lugar de sacrificio
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «para/como casa de sacrificio». «Casa de sacrificio» conserva la transparencia léxica y la función cultual sin reemplazarla por una interpretación más libre como «templo».
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de traducir el Tetragrámaton como nombre propio transliterado, preservando la identidad del Dios del pacto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión anterior fue ajustada para hacer explícito en español el valor temporal de בַּלָּיְלָה sin depender de notas; por eso se usa «de noche» en el texto principal. También se evitó añadir notas no ancladas, ya que la validación exige que todo marcador de nota aparezca exactamente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה.
  - 'Se conserva el paralelismo verbal con perfecto en español: «He oído... y he escogido».'
  - «Casa de sacrificio» se deja literal para respetar la transparencia del hebreo.
  - No se introducen marcas de nota, para evitar desajustes entre texto y aparato crítico.
