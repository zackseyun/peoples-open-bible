    text: 'O: «los hombres de tu parentesco», «tus compañeros de exilio» o «los hombres de tu derecho de redención». La frase hebrea es difícil y usa la raíz relacionada con redención y el pariente-redentor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como herencia».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sintaxis del relativo para que el español sea natural y fiel al antecedente colectivo del hebreo, se mueve la nota [b] al sintagma correcto («como posesión»), y se ajusta el imperativo a una forma más clara en español neutro. Se conservan las decisiones léxicas principales del audit trail: «Hijo de hombre», la repetición «tus hermanos, tus hermanos», «los hombres de tu redención», «casa de Israel» y «Yahvé».'
