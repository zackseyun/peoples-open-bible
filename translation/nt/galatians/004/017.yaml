theological_decisions:
- issue: Meaning of the opponents' action in ἐκκλεῖσαι ὑμᾶς
  chosen_reading: Paul means the agitators want to exclude the Galatians from Paul and his circle, thereby making the Galatians seek the agitators' approval.
  alternative_readings:
  - Paul means they want to exclude the Galatians from God's blessing or the church more generally.
  rationale: The immediate context (vv. 16-20) centers on Paul's relationship with the Galatians and the rival teachers' influence over them. The purpose clause 'so that you may be eager for them' favors a social-relational exclusion designed to redirect loyalty, not an explicit theological statement about final salvation or covenant membership. The English 'shut you out' preserves this without over-specifying the object from which they are excluded.
