    text: O «desde el comienzo». El hebreo literalmente dice «desde el principio».
    reason: lexical_alternative
  - marker: b
    text: O «consejo».
    reason: lexical_alternative
  - marker: c
    text: O «se mantendrá» / «será establecido».
    reason: lexical_alternative
