translation:
  language: es
  text: Cinco de ustedes perseguirán a cien[a], y cien de ustedes perseguirán a diez mil[b], y sus enemigos caerán delante de ustedes por la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguirán persiguiendo»; el hebreo רָדַף admite también la idea de «perseguir» en ambas cláusulas.
    reason: lexical_alternative
  - marker: b
    text: El hebreo רְבָבָה puede significar «diez mil» o «miríada»; aquí «diez mil» conserva mejor el paralelismo numérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָדְפוּ
  english_pob_choice: will chase
  chosen_spanish: perseguirán
  alternatives_spanish:
  - correrán tras
  - irán en persecución de
  lexicon: HALOT
  rationale: רדף expresa perseguir/correr tras. En español, «perseguirán» conserva el valor militar y es natural en un registro bíblico digno; «cazar» o «correrán tras» son menos precisos en este contexto.
- source_word: מִכֶּם
  english_pob_choice: of you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - entre ustedes
  - de entre ustedes
  lexicon: HALOT
  rationale: 'El מן partitivo con sufijo aquí indica cantidad tomada del grupo: «cinco de ustedes», «cien de ustedes». «De entre ustedes» es posible, pero «de ustedes» es más directo y fluido en español.'
- source_word: חֲמִשָּׁה מֵאָה
  english_pob_choice: Five of you will chase a hundred
  chosen_spanish: Cinco de ustedes perseguirán a cien
  alternatives_spanish:
  - Cinco de ustedes correrán tras cien
  lexicon: HALOT
  rationale: El hebreo presenta una relación numérica simple; el español puede expresar el objeto implícito con «a cien» para mantener la naturalidad sin perder la imagen de superioridad militar.
- source_word: וּמֵאָה מִכֶּם רְבָבָה יִרְדֹּפוּ
  english_pob_choice: and a hundred of you will chase ten thousand
  chosen_spanish: y cien de ustedes perseguirán a diez mil
  alternatives_spanish:
  - y cien de ustedes perseguirán a una miríada
  lexicon: HALOT
  rationale: רְבָבָה puede significar «diez mil» o «miríada». Siguiendo la decisión inglesa de reflejar el paralelismo numérico con claridad, «diez mil» comunica mejor la progresión cuantitativa.
- source_word: רְבָבָה
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - miríada
  lexicon: HALOT
  rationale: Aunque «miríada» es un equivalente léxico posible, en español contemporáneo «diez mil» conserva con más exactitud la escala numérica del paralelo hebreo.
- source_word: וְנָפְלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - serán derribados
  - caerán abatidos
  lexicon: HALOT
  rationale: נפל conserva la imagen de caída. «Caerán» mantiene esa imaginería en español; «serán derribados» explicita más de lo que el hebreo dice.
- source_word: אֹיְבֵיכֶם
  english_pob_choice: your enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - tus enemigos
  lexicon: HALOT
  rationale: El plural de cortesía o inclusivo según la tradición del español bíblico puede expresarse como «ustedes»; por coherencia, el posesivo correspondiente es «sus». No se cambia el referente colectivo del hebreo.
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  lexicon: HALOT
  rationale: La locución idiomática hebrea se traduce de forma natural con «delante de ustedes», equivalente a la derrota en presencia del pueblo.
- source_word: לֶחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - por medio de la espada
  lexicon: HALOT
  rationale: La preposición hebrea en este contexto indica el medio de muerte/derrota. «A espada» es una fórmula española bíblica natural y conserva la fuerza marcial sin sonar calcada.
theological_decisions:
- issue: 'Promesa militar de pacto: mantener el carácter concreto sin suavizarlo'
  english_pob_reading: Retain the direct military promise without softening or paraphrasing.
  chosen_spanish_reading: Mantener la promesa militar concreta, sin convertirla en una generalidad moral o espiritual.
  alternative_spanish_readings:
  - Interpretarla como aliento general sobre la victoria
  - Reformularla como imagen figurada sin contenido militar directo
  rationale: El versículo pertenece a las bendiciones del pacto en Levítico 26. La traducción debe conservar la estructura de promesa concreta y la hipérbole numérica, en vez de diluirla en abstracción.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: 'Revisión final: no se registran cambios aplicados en la última pasada; el texto se mantiene en alto acuerdo con el control cruzado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general para el Tetragrámaton, pero este versículo no lo contiene.
  - Se usó «ustedes/sus» para mantener consistencia con un registro bíblico neutral latinoamericano.
  - 'Se preservó el paralelismo numérico del hebreo con numerales explícitos: cinco/cien/diez mil.'
  - Se conservó la imaginería bélica de «caer» y «a espada» sin intensificarla más allá del hebreo.
