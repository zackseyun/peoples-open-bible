translation:
  language: es
  text: Me derriba por todos lados[a], y desaparezco; arranca mi esperanza como un árbol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y voy / y perezco». El hebreo dice literalmente «y voy», probablemente expresando el resultado de haber sido derribado: Job queda arruinado o desaparece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְּצֵנִי
  english_pob_choice: tears me down
  chosen_spanish: me derriba
  alternatives_spanish:
  - me destruye
  - me demuele
  - me derriba y me arruina
  lexicon: HALOT; נתץ
  rationale: El verbo expresa derribar o demoler con fuerza destructiva. «Me derriba» conserva esa violencia en un español natural y directo, sin suavizarla.
- source_word: סָבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - por todas partes
  - en derredor
  - alrededor
  lexicon: HALOT; סבב
  rationale: La idea es de ataque o ruina total, envolvente. «Por todos lados» comunica bien la extensión completa del daño en español contemporáneo.
- source_word: וָאֵלַךְ
  english_pob_choice: and I am gone
  chosen_spanish: y me voy
  alternatives_spanish:
  - y desaparezco
  - y perezco
  - y me he ido
  lexicon: HALOT; הלך
  rationale: El hebreo dice literalmente «y voy», pero en este contexto funciona como resultado de ser derribado. «Y me voy» conserva la literalidad básica y deja el matiz de quedar fuera, perdido o acabado, sin cargarlo con una interpretación más fuerte de la necesaria.
- source_word: וַיַּסַּע
  english_pob_choice: he has uprooted
  chosen_spanish: arranca
  alternatives_spanish:
  - desarraiga
  - quita
  - arranca de raíz
  lexicon: HALOT; נסע
  rationale: En este contexto la imagen es la de sacar algo de su lugar, como una planta o una estaca. «Arranca» reproduce la fuerza verbal y prepara la comparación con el árbol.
- source_word: כָּעֵץ
  english_pob_choice: like a tree
  chosen_spanish: como a un árbol
  alternatives_spanish:
  - como un árbol
  - cual árbol
  lexicon: HALOT; עץ
  rationale: La comparación es sencilla y directa. «Como a un árbol» suena natural en español y conserva el valor comparativo del hebreo.
- source_word: תִּקְוָתִי
  english_pob_choice: my hope
  chosen_spanish: mi esperanza
  alternatives_spanish:
  - mi esperanza confiada
  - mi expectativa
  lexicon: HALOT; תקוה
  rationale: «Esperanza» es el equivalente natural de תקוה en este lamento de Job. Mantiene el contraste entre la destrucción física y la ruina de su expectativa de restauración.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete hebreo WLC y la lectura inglesa POB. Se conserva la tensión reconocida en וָאֵלַךְ: el texto hebreo dice literalmente «y voy», mientras que el sentido contextual puede ser «y desaparezco» o «y perezco». No se introduce ninguna emendación textual.'
  spanish_consistency_notes:
  - Se usa «mi esperanza» para תִּקְוָתִי, en consonancia con el valor habitual de תקוה.
  - Se evita «SEÑOR» o terminología teológica no presente en el verso; el texto habla de un desastre personal, no de una confesión doctrinal.
  - La comparación final mantiene la imagen arbórea sin añadir «de raíz» al texto principal, aunque la nota admite la lectura implícita de arranque total.
