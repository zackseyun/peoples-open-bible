translation:
  language: es
  text: Sus pies corren hacia el mal[a], y se apresuran a derramar sangre inocente; sus pensamientos son pensamientos de iniquidad; devastación y destrucción están en sus calzadas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "para hacer el mal"; el hebreo expresa dirección u orientación hacia el mal y también puede entenderse de manera más explícitamente activa.
    reason: lexical_alternative
  - marker: b
    text: O "en sus caminos"; el término hebreo designa literalmente calzadas o caminos principales, y aquí también sugiere el curso de su conducta.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֵיהֶם
  english_pob_choice: their feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - los pies de ellos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta y su valor metonímico para la conducta, con una formulación natural en español.
- source_word: לָרַע
  english_pob_choice: to evil
  chosen_spanish: hacia el mal
  alternatives_spanish:
  - para el mal
  - al mal
  - hacia lo malo
  lexicon: HALOT
  rationale: La preposición y el sustantivo/adjetivo apuntan a dirección o orientación moral; 'hacia el mal' conserva bien ese movimiento sin añadir una acción que el hebreo no explicita.
- source_word: יָרֻצוּ
  english_pob_choice: run
  chosen_spanish: corren
  alternatives_spanish:
  - ruegan
  - se lanzan
  - corren deprisa
  lexicon: HALOT
  rationale: '''Corren'' preserva el verbo de movimiento rápido de manera clara y natural.'
- source_word: וִימַהֲרוּ
  english_pob_choice: and they hurry
  chosen_spanish: y se apresuran
  alternatives_spanish:
  - y se dan prisa
  - y se apresuran con rapidez
  lexicon: HALOT
  rationale: Mantiene el paralelismo con el verbo anterior y la idea de premura o eagerness.
- source_word: לִשְׁפֹּךְ דָּם נָקִי
  english_pob_choice: to shed innocent blood
  chosen_spanish: para derramar sangre inocente
  alternatives_spanish:
  - para verter sangre inocente
  - para derramar la sangre del inocente
  lexicon: HALOT
  rationale: '''Derramar sangre inocente'' reproduce el idiomismo bíblico con registro bíblico y comprensible en español.'
- source_word: מַחְשְׁבוֹתֵיהֶם
  english_pob_choice: their thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus planes
  - sus designios
  - sus proyectos
  lexicon: HALOT
  rationale: La repetición del sustantivo y el paralelismo favorecen 'pensamientos', que conserva la amplitud semántica de מחשבות sin limitarlo a 'planes'.
- source_word: מַחְשְׁבוֹת אָוֶן
  english_pob_choice: thoughts of iniquity
  chosen_spanish: pensamientos de iniquidad
  alternatives_spanish:
  - pensamientos de maldad
  - planes de iniquidad
  - pensamientos de perversidad
  lexicon: HALOT
  rationale: '''Iniquidad'' corresponde con buena cercanía léxica a אָוֶן y fue la elección revisada en el audit trail inglés; en español mantiene el registro formal y el peso moral del término.'
- source_word: שֹׁד
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - ruina
  - violencia
  - desolación
  lexicon: HALOT
  rationale: En paralelo con el siguiente término, 'devastación' transmite el efecto destructivo sin borrar la distinción poética entre ambos sustantivos.
- source_word: וָשֶׁבֶר
  english_pob_choice: and destruction
  chosen_spanish: y destrucción
  alternatives_spanish:
  - y ruina
  - y quebranto
  - y fractura
  lexicon: HALOT
  rationale: '''Destrucción'' conserva el paralelismo con ''devastación'' en español y refleja el campo semántico de ruina/quebranto.'
- source_word: בִּמְסִלּוֹתָם
  english_pob_choice: in their highways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - en sus sendas
  - en sus calzadas
  - en sus carreteras
  lexicon: HALOT
  rationale: '''מְסִלּוֹת'' puede referir a caminos elevados o vías principales, pero en español ''sus caminos'' mantiene el posible sentido literal y también el matiz de conducta/curso de vida. ''Highways'' en inglés se vierte aquí de forma más general para evitar un tecnicismo poco natural.'
theological_decisions:
- issue: Alcance moral de אָוֶן
  english_pob_reading: thoughts of iniquity
  chosen_spanish_reading: pensamientos de iniquidad
  alternative_spanish_readings:
  - pensamientos de maldad
  - pensamientos de perversidad
  - planes de iniquidad
  rationale: Se mantiene el tono acusatorio del versículo y la cercanía léxica al hebreo, sin suavizar el juicio moral ni convertirlo en un mero problema circunstancial.
  doctrine_reference: Isaías 59:7
- issue: Valor metonímico de los pies y los caminos
  english_pob_reading: Their feet... in their highways
  chosen_spanish_reading: sus pies... en sus caminos
  alternative_spanish_readings:
  - sus pies... en sus sendas
  - sus pies... en sus vías
  rationale: Se conserva la imagen física que expresa la conducta habitual; 'caminos' permite además la lectura figurada del modo de vivir.
  doctrine_reference: Proverbios 1:16; Romanos 3:15
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que prefirió 'iniquity' para אָוֶן, así como la nota auditada sobre el doble valor de מְסִלּוֹתָם como vías literales y curso de conducta. La redacción española sigue esa decisión léxica y conserva el paralelismo poético del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'sus pensamientos son pensamientos de iniquidad' para reflejar la repetición retórica del hebreo.
  - '''Iniquidad'' se usa aquí por cercanía léxica y registro bíblico; no se sustituyó por ''maldad'' para no perder la correspondencia con el audit trail.'
  - '''Caminos'' traduce ''highways'' de modo amplio, adecuado al doble sentido literal y figurado del pasaje.'
