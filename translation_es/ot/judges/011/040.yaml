  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo en la mayor parte del versículo: «De año en año», «las hijas de Israel», la idea habitual de «solían ir», el objeto «la hija de Jefté el galaadita» y «cuatro días en el año» están sustancialmente alineados con la evidencia fuente. Sin embargo, no sigue el estado más reciente del rastro de auditoría inglés, que revisó el texto principal de «lament» a «commemorate». Dado que el POB inglés documenta esa revisión como aplicada, el español debe reflejarla en el texto principal y preservar «lamentar» como alternativa en nota, no al revés.'
  spanish_quality_summary: 'El español es mayormente legible y digno, pero presenta dos problemas claros: 1) la elección principal «a lamentar» ya no coincide con la decisión auditada; 2) la nota contiene el anglicismo/forma incorrecta «recountar», que no es español natural. Conviene reparar la nota con una opción idiomática como «a hablar de» o «a relatar acerca de». El resto del verso suena natural en español eclesial general.'
  glossary_alignment: 'No hay conflicto con la terminología global del proyecto (no aparecen Yahvé, Mesías, etc.). La principal cuestión léxica es לְתַנּוֹת: el español debe seguir la decisión auditada vigente del POB inglés, usando «conmemorar» en el texto principal y dejando «lamentar» y una alternativa de tipo «relatar/hablar de» en nota para preservar la tensión interpretativa.'
  issues:
