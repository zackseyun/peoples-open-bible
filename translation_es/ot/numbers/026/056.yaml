translation:
  language: es
  text: Según la suerte[a], su herencia será repartida entre el grupo mayor y el menor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la suerte, su herencia será repartida entre los muchos y los pocos». El hebreo contrasta un grupo mayor con uno menor en el acto de distribución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  english_pob_choice: According to
  chosen_spanish: Según
  alternatives_spanish:
  - Por
  - Conforme a
  - De acuerdo con
  lexicon: HALOT
  rationale: La expresión idiomática no significa literalmente «sobre la boca de» en español; «según» comunica bien la idea de conformidad con la decisión de la suerte, manteniendo el valor normativo del giro hebreo.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - la lota
  - el lote
  lexicon: HALOT
  rationale: En contexto de reparto por designación, «suerte» es el equivalente español más natural para גּוֹרָל. «Lote» podría sonar a porción asignada, pero aquí el instrumento de adjudicación es lo que importa.
- source_word: תֵּחָלֵק
  english_pob_choice: shall be divided
  chosen_spanish: será repartida
  alternatives_spanish:
  - será dividida
  - será asignada
  - será repartida por sorteo
  lexicon: HALOT
  rationale: El nifal expresa pasividad en la distribución de la herencia. «Será repartida» suena natural en español y conserva la idea de distribución hereditaria.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión hereditaria
  - su posesión
  - su heredad
  lexicon: HALOT
  rationale: La forma hebrea dice «su herencia»; en español, el posesivo puede mantenerse sin forzar el género del referente. «Herencia» es claro y fiel al contexto de asignación territorial.
- source_word: בֵּין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - entre los
  lexicon: HALOT
  rationale: «Entre» reproduce directamente la relación comparativa introducida por בֵּין.
- source_word: רַב
  english_pob_choice: the larger
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más numeroso
  - el mayor grupo
  - el grande
  lexicon: HALOT
  rationale: En este contexto de distribución, רַב contrasta con מְעָט por cantidad relativa. «El mayor» conserva la comparación implícita sin añadir una explicación innecesaria.
- source_word: לִמְעָט
  english_pob_choice: the smaller
  chosen_spanish: el menor
  alternatives_spanish:
  - el más pequeño
  - el menor grupo
  - el poco
  lexicon: HALOT
  rationale: «El menor» mantiene el paralelismo con «el mayor» y comunica la oposición cuantitativa del hebreo de forma natural en español.
translation_notes:
  revision_awareness: El texto inglés existente fue revisado y se mantuvo estable; la versión española sigue el mismo sentido auditable, pero adapta la dicción para que suene natural en español sin perder el valor idiomático de עַל פִּי הַגּוֹרָל ni el contraste cuantitativo de רַב / לִמְעָט.
  spanish_consistency_notes:
  - Se prefirió «suerte» para גּוֹרָל en lugar de «sorteo» para conservar el sustantivo tradicional del reparto por designación, aunque la nota ofrece la alternativa de «por la suerte».
  - Se mantuvo el paralelismo «el mayor / el menor» para reflejar el contraste hebreo sin sobreinterpretar si se trata de tamaño o número, tal como hace el audit trail inglés con «larger / smaller».
  - «Herencia» se usa como equivalente de נַחֲלָה en un contexto de asignación tribal; no se añadió ningún término eclesiástico o interpretativo.
