translation:
  language: es
  text: Cuando un justo se aparta de su justicia y comete injusticia[a], morirá por causa de esos actos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en ellos» o «por ellos»; el sentido es que muere a causa de esos actos injustos. O «maldad», «iniquidad» o «perversidad» para «injusticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּב
  english_pob_choice: When ... turns
  chosen_spanish: Cuando ... se aparta
  alternatives_spanish:
  - Al volverse
  - Cuando ... regresa
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo expresa una cláusula temporal. En español, "cuando" conserva el valor temporal-condicional, y "se aparta" comunica con naturalidad el giro moral implícito en el contexto sin perder el movimiento de retorno/desvío del verbo שוב.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: un justo
  alternatives_spanish:
  - una persona justa
  - el justo
  lexicon: HALOT
  rationale: El adjetivo sustantivado se refiere aquí a una persona justa concreta en sentido genérico. "Justo" es la forma más directa y natural en español bíblico sin neutralizar innecesariamente el matiz personal.
- source_word: מִצִּדְקָתוֹ
  english_pob_choice: from his righteousness
  chosen_spanish: de su justicia
  alternatives_spanish:
  - de su rectitud
  - de su conducta justa
  lexicon: HALOT
  rationale: צדקה puede verterse como "justicia" o "rectitud". Aquí, como estado o práctica moral de la persona justa, "justicia" mantiene mejor la correspondencia léxica con el contraste del versículo, aunque en español puede sonar también a conducta justa.
- source_word: וְעָשָׂה עָוֶל
  english_pob_choice: and does injustice
  chosen_spanish: y comete injusticia
  alternatives_spanish:
  - y hace mal
  - y obra iniquidad
  - y comete maldad
  lexicon: HALOT
  rationale: El hebreo usa una expresión común para hacer/commeter mal. "Comete injusticia" conserva el peso ético-jurídico de עָוֶל y mantiene el contraste con "justicia".
- source_word: וּמֵת בָּהֶם
  english_pob_choice: he shall die because of them
  chosen_spanish: morirá por causa de ellas
  alternatives_spanish:
  - morirá a causa de ellas
  - morirá por ellas
  - morirá en ellas
  lexicon: HALOT
  rationale: El pronombre plural apunta a las acciones injustas mencionadas. "Por causa de ellas" expresa con claridad el valor causal que el inglés POB también hizo explícito, sin perder la referencia a los actos previos.
theological_decisions:
- issue: La relación entre justicia previa, caída moral y muerte
  english_pob_reading: 'The translation remains text-immanent: a righteous man who turns from righteousness and does injustice will die because of those wrongful acts.'
  chosen_spanish_reading: El texto presenta a un justo que se aparta de su justicia, comete injusticia y muere por causa de esos actos, sin resolver aquí categorías doctrinales posteriores.
  alternative_spanish_readings:
  - El texto enseña la pérdida de la salvación
  - El texto se refiere solo a muerte temporal dentro del ámbito del pacto
  rationale: El hebreo afirma la reversión moral y su consecuencia sin especificar marcos doctrinales posteriores. La traducción debe conservar esa tensión, no cerrarla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue el sentido del hebreo masorético y coincide en lo esencial con el audit trail inglés: cláusula temporal, sujeto singular sustantivado, contraste justicia/injusticia y muerte causal. Se mantiene la equivalencia óptima, con español natural y sin suavizar la tensión moral del versículo.'
  spanish_consistency_notes:
  - Se usó "justo" para צַדִּיק y "justicia" para צִדְקָה, manteniendo el juego léxico del hebreo.
  - '"Comete injusticia" conserva el valor ético-jurídico de עָוֶל.'
  - La referencia causal se explicitó como "por causa de ellas" para reflejar בָּהֶם.
  - Se evitó traducir mecánicamente como "en ellas", que sería opaco en español.
