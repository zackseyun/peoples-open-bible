translation:
  language: es
  text: Solo[a], que Yahvé te conceda sensatez[b] y entendimiento, y te mande respecto de Israel[c], para que guardes la ley de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solamente»; la partícula hebrea puede funcionar como restricción enfática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «perspicacia» o «discreción»; el hebreo apunta a sensatez práctica o buen juicio.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «te comisione acerca de Israel» o «te dé encargo sobre Israel»; el verbo hebreo puede expresar un mandato o encargo relacionado con Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Ciertamente
  lexicon: HALOT
  rationale: אַךְ es una partícula restrictiva o enfática. «Solo» conserva bien el matiz de limitación/enfoque inicial sin volver el verso demasiado adversativo.
- source_word: יִתֶּן
  english_pob_choice: may ... give
  chosen_spanish: que ... te conceda
  alternatives_spanish:
  - que ... te dé
  - te dé
  - quiera darte
  lexicon: HALOT
  rationale: En contexto expresa deseo o bendición. «Que ... te conceda» reproduce un tono optativo natural en español y mantiene la dirección benedictiva del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé», conservando el Tetragrama sin sustituirlo por un título.'
- source_word: שֵׂכֶל
  english_pob_choice: insight
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - perspicacia
  - discreción
  lexicon: HALOT
  rationale: שֵׂכֶל apunta a sensatez práctica, juicio acertado o buen entendimiento. En español, «sabiduría» comunica con claridad esa capacidad de actuar y decidir bien, y se complementa con בִינָה sin colapsar por completo los dos términos.
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: inteligencia
  alternatives_spanish:
  - entendimiento
  - discernimiento
  - comprensión
  lexicon: HALOT
  rationale: בִינָה denota discernimiento/entendimiento. «Inteligencia» aquí funciona en su sentido clásico de capacidad de comprender y discernir, manteniendo diferencia léxica respecto de שֵׂכֶל.
- source_word: וִיצַוְּךָ עַל יִשְׂרָאֵל
  english_pob_choice: command you concerning Israel
  chosen_spanish: te dé orden acerca de Israel
  alternatives_spanish:
  - te comisione acerca de Israel
  - te encargue de Israel
  - te mande respecto de Israel
  lexicon: HALOT
  rationale: La combinación de צוה con עַל admite la idea de dar encargo/mandato en relación con Israel. «Te dé orden acerca de Israel» conserva el núcleo verbal de «mandar» y evita introducir sin necesidad la idea más fuerte de instalarte «sobre» Israel.
- source_word: וְלִשְׁמוֹר
  english_pob_choice: that you may keep
  chosen_spanish: para que guardes
  alternatives_spanish:
  - a fin de que guardes
  - para observar
  - con el fin de guardar
  lexicon: HALOT
  rationale: El infinitivo con prefijo expresa finalidad. «Para que guardes» es natural en español y refleja el propósito de la concesión divina y del encargo.
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la enseñanza de
  lexicon: HALOT
  rationale: En este contexto pactual, «ley» es la equivalencia más reconocible y fiel, sin excluir el trasfondo de instrucción que puede notarse en una nota alternativa.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  - tu Dios
  lexicon: HALOT
  rationale: Traducción directa y covenantal del sufijo de segunda persona singular, manteniendo la relación personal y pactual con Dios.
theological_decisions:
- issue: Renderizado del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en lugar de reemplazarlo por un título. Esta decisión sigue la política del POB y evita ocultar el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de וִיצַוְּךָ עַל יִשְׂרָאֵל en contexto real
  english_pob_reading: command you concerning Israel
  chosen_spanish_reading: te dé orden acerca de Israel
  alternative_spanish_readings:
  - te comisione acerca de Israel
  - te encargue de Israel
  - te mande respecto de Israel
  rationale: Se evita una lectura que importe más de lo que exige la sintaxis, pero se mantiene la idea de un mandato/encargo relacionado con Israel. La redacción sigue siendo compatible con el contexto de la investidura real y la responsabilidad de Salomón.
  doctrine_reference: Contexto narrativo de 1 Crónicas 22; sentido verbal de צוה con עַל
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que prefirió una formulación más directa de צוה con עַל y ajustó el enlace final de propósito. En español se optó por una solución intermedia que conserva el núcleo verbal de encargo/mandato sin introducir una colocación demasiado fuerte de autoridad que el hebreo no exija explícitamente.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se conservan dos términos distintos para שֵׂכֶל y בִינָה con valores próximos pero no idénticos.
  - Se usa «ley» para תורה en coherencia con el contexto pactual y con la tradición del proyecto, dejando abierta la nota alternativa de «instrucción».
  - La construcción final con «para que guardes» refleja finalidad y fluidez natural en español, sin perder el sentido del infinitivo hebreo.
