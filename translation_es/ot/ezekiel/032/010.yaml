translation:
  language: es
  text: Yo haré que muchos pueblos queden sobrecogidos por ti, y sus reyes se estremecerán por ti[a] cuando blanda mi espada ante ellos; y temblarán a cada momento, cada hombre por su propia vida[c][b], en el día de tu caída.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "sus reyes sentirán un horror terrible por ti"; el hebreo usa un verbo y un sustantivo de la misma raíz para expresar horror intenso.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "cuando haga volar mi espada ante ellos".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "de momento en momento".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁמּוֹתִי
  english_pob_choice: I will make ... appalled
  chosen_spanish: haré que ... queden sobrecogidos
  alternatives_spanish:
  - los dejaré desolados
  - los haré quedar asombrados
  - los dejaré atónitos
  lexicon: HALOT
  rationale: El hifil de שמם aquí expresa provocar un estado intenso en los pueblos; en español, "sobrecogidos" conserva la reacción de miedo/impacto sin perder naturalidad. Evita el peso semántico excesivo de "desolados" en un contexto de reacción emocional.
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos y naciones
  lexicon: HALOT
  rationale: '"Pueblos" refleja mejor que "naciones" el matiz colectivo étnico del hebreo עַמִּים. Se mantiene el plural cuantificado del original.'
- source_word: יִשְׂעֲרוּ ... שַׂעַר
  english_pob_choice: will shudder over you
  chosen_spanish: se estremecerán sobre ti
  alternatives_spanish:
  - temblarán de horror ante ti
  - se horrorizarán por ti
  - se sacudirán sobre ti
  lexicon: HALOT
  rationale: El verbo y su cognado nominal forman una intensificación de estremecimiento/horror. "Se estremecerán" conserva la fuerza física y emocional; "sobre ti" reproduce עָלֶיךָ sin añadir una explicación no explícita.
- source_word: בְּעוֹפְפִי חַרְבִּי
  english_pob_choice: when I brandish my sword
  chosen_spanish: cuando blandiré mi espada
  alternatives_spanish:
  - cuando haré volar mi espada
  - cuando agitaré mi espada
  - cuando alzaré mi espada
  lexicon: HALOT
  rationale: עוּף literalmente sugiere volar, pero en este giro idiomático con la espada el sentido natural es blandirla. "Blandiré" conserva la imaginería bélica sin caer en una literalidad extraña para el español.
- source_word: עַל פְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: ante ellos
  alternatives_spanish:
  - delante de ellos
  - frente a ellos
  - en presencia de ellos
  lexicon: HALOT
  rationale: '"Ante ellos" es una equivalencia idiomática clara para el marco espacial de la manifestación pública del juicio. Evita introducir una teatralidad más fuerte que la del hebreo.'
- source_word: וְחָרְדוּ
  english_pob_choice: and they will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - quedarán aterrados
  - quedarán temblando
  lexicon: HALOT
  rationale: חרד denota temblor por temor; "temblarán" mantiene la reacción física básica. Se evita duplicar de forma innecesaria la fuerza de "sobrecogidos" en la primera cola.
- source_word: לִרְגָעִים
  english_pob_choice: every moment
  chosen_spanish: a cada momento
  alternatives_spanish:
  - en todo momento
  - momento tras momento
  - de momento en momento
  lexicon: HALOT
  rationale: La pluralidad de רגעים con ל expresa repetición temporal. "A cada momento" suena natural en español y conserva la idea de continuidad angustiosa.
- source_word: אִישׁ לְנַפְשׁוֹ
  english_pob_choice: each man for his own life
  chosen_spanish: cada hombre por su propia vida
  alternatives_spanish:
  - cada uno por su vida
  - cada hombre por su alma
  - cada uno por sí mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ en este contexto de peligro mortal se entiende mejor como "vida". "Cada hombre" preserva la forma distributiva masculina del hebreo y la explicitud de la referencia individual.
- source_word: בְּיוֹם מַפַּלְתֶּךָ
  english_pob_choice: on the day of your downfall
  chosen_spanish: en el día de tu caída
  alternatives_spanish:
  - en el día de tu caída en desgracia
  - el día de tu derribo
  - el día de tu ruina
  lexicon: HALOT
  rationale: מַפָּלָה puede ser "caída" o "ruina"; "caída" sigue de cerca la imagen sin cargar más interpretación. "En el día" reproduce con fidelidad la fórmula temporal del hebreo.
theological_decisions:
- issue: Agencia divina directa en el juicio
  english_pob_reading: The speaker is God directly threatening Egypt and the nations with fear through his own sword.
  chosen_spanish_reading: El hablante es Dios quien amenaza directamente a Egipto y a los pueblos con temor por medio de su propia espada.
  alternative_spanish_readings:
  - La espada podría entenderse solo como instrumento histórico de Babilonia.
  - El texto podría leerse como una amenaza mediada sin énfasis en la primera persona divina.
  rationale: Los sufijos y verbos en primera persona presentan agencia divina directa. La redacción española mantiene esa inmediatez y no oculta la posesión divina de la espada.
  doctrine_reference: Teología bíblica del juicio divino; soberanía de Dios en el castigo histórico.
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que prefirió mantener עָלֶיךָ como "sobre ti"/"ante ti" sin añadir la idea de "because of you". En español se conservó la relación espacial repetida con "sobre ti" y "ante ellos", y se evitó ampliar el verbo cognado con un sustantivo explicativo excesivo. También se mantuvo la continuidad de la imagen bélica y la cadencia de juicio final.
  spanish_consistency_notes:
  - Se usa "pueblos" para עַמִּים, conforme al valor colectivo del hebreo.
  - Se traduce יְהוָה no aplica en este versículo; se respeta la primera persona divina implícita.
  - Se mantiene "espada" sin sustituirla por un equivalente abstracto, preservando la imaginería concreta.
  - '"Caída" se elige frente a "ruina" por mayor proximidad formal al sustantivo hebreo מַפָּלָה.'
  - Se evita el tradicionalismo de "SEÑOR" porque el texto hebreo aquí está en primera persona divina, no en una sustitución nominal.
