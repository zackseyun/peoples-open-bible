    reason: lexical_alternative
  - marker: b
    text: Los pronombres masculinos singulares «él» probablemente se refieren al gran águila de la alegoría (cf. Ezequiel 17:3–4), aunque algunos traducen más impersonalmente «ello».
    reason: cross_reference
  - marker: c
    text: La repetición de «llegó a ser una vid» se conserva del hebreo para énfasis.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el error principal dejando de usar el anglicismo «boughs» y reemplazándolo por «frondas», que comunica extensión vegetal/ramaje de manera natural en español. También se mejoró levemente la fluidez con «de baja estatura». Las notas se realinearon con el audit trail: la referencia personal de los pronombres masculinos ahora se explica donde corresponde, y la nota sobre la repetición enfática se ancla a la segunda mención de «vid».'
