revisions:
- from: Yahvé se sentó entronizado sobre el diluvio[a]; Yahvé se sienta entronizado como Rey para siempre.
  to: Yahvé se sentó entronizado sobre el diluvio[a]; Yahvé está entronizado como rey para siempre.
