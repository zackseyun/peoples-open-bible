translation:
  language: es
  text: Cuando David oyó[a], envió a Joab y a todo el ejército de los valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “y a todo el ejército de los valientes”; el hebreo puede leerse con “los valientes” en aposición a “el ejército” o como una especificación de tipo genitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: When David heard
  chosen_spanish: Cuando David oyó
  alternatives_spanish:
  - Y David oyó
  - David oyó de ello
  lexicon: HALOT
  rationale: שמע en qal wayyiqtol significa 'oír' o 'escuchar'. En español, 'cuando' suaviza la secuencia narrativa implícita en la forma consecutiva, como hace la traducción inglesa auditada. 'Oyó de ello' es posible por el contexto, pero el objeto no está expresado en el versículo.
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - y envió
  - despachó
  lexicon: HALOT
  rationale: שלח en qal significa 'enviar'. 'Envió' conserva la sencillez del hebreo; 'despachó' sería más marcadamente militar, pero añade un matiz que el hebreo no exige.
- source_word: אֶת יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: a Joab
  alternatives_spanish:
  - a Joab
  lexicon: Nombre propio / marcador de objeto directo
  rationale: El marcador אֶת no se traduce; en español se expresa naturalmente el destinatario con la preposición 'a' ante el nombre propio.
- source_word: וְאֵת כָּל הַצָּבָא
  english_pob_choice: and all the army
  chosen_spanish: y a todo el ejército
  alternatives_spanish:
  - y a todo el ejército
  - y a todo el host
  lexicon: HALOT
  rationale: צָבָא aquí se refiere al cuerpo militar. 'Ejército' es la equivalencia moderna más clara y fiel; 'host' sería más tradicional pero menos natural en español actual.
- source_word: הַגִּבֹּרִים
  english_pob_choice: the mighty men
  chosen_spanish: de los valientes
  alternatives_spanish:
  - de los valientes
  - de los hombres poderosos
  - de los guerreros
  lexicon: HALOT
  rationale: גִּבֹּרִים puede significar 'valientes', 'guerreros' o 'mighty men'. Dado que en esta construcción probablemente especifica o appone al ejército, 'de los valientes' preserva el valor lexical y refleja de modo natural la relación constructa que la edición inglesa resolvió con 'of the mighty men'.
translation_notes:
  revision_awareness: 'La edición inglesa revisada añadió “of” para reflejar mejor la relación constructa entre “army” y “mighty men”. En español, esa relación se expresa de forma natural con “de los valientes”, manteniendo la misma ambigüedad controlada: puede entenderse como aposición o como especificación del ejército.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se tradujo el sustantivo militar צָבָא como 'ejército' por claridad contemporánea, sin perder el matiz de fuerza organizada.
  - '''Valientes'' conserva el campo semántico de גִּבֹּרִים sin sobredeterminar una élite técnica no explicitada en el versículo.'
