review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español preserva fielmente la secuencia y el sentido del griego: salida urgente, regreso a Antioquía, hallazgo de Felipe ejerciendo control sobre la ciudad, combate contra él y toma de la ciudad por la fuerza. No omite ni añade información relevante.'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis coordinada refleja bien el estilo narrativo del original. «Halló» suena algo más literario que «encontró», pero sigue siendo plenamente legible y apropiado para el registro bíblico. «Dominando la ciudad» comunica adecuadamente el sentido de control efectivo.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Las decisiones léxicas coinciden razonablemente con el POB inglés: «salió» por ἀπῆρεν, «con prisa» por κατὰ σπουδήν, «volvió a Antioquía» por ἀπέστρεψεν εἰς Ἀντιόχειαν, «dominando la ciudad» por κυριεύοντα τῆς πόλεως, «combatió contra él» por ἐπολέμησεν πρὸς αὐτόν, y «tomó la ciudad por la fuerza» por κατελάβετο τὴν πόλιν βίᾳ.'
  issues:
