translation:
  language: es
  text: La gloria de los hombres jóvenes es su fuerza[a], y el esplendor de los ancianos es la canicie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La belleza de los hombres jóvenes es su fuerza, y el honor de los ancianos es la canicie».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְאֶרֶת
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - belleza
  - esplendor
  - ornamento
  lexicon: HALOT
  rationale: El sustantivo puede abarcar belleza, honra y aquello que da prestigio. En español, «gloria» conserva mejor la idea de distinción honorable del proverbio y mantiene el paralelismo con la segunda cola.
- source_word: בַּחוּרִים
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jóvenes varones
  - muchachos
  - jóvenes en su vigor
  lexicon: HALOT
  rationale: El hebreo es masculino plural. «Jóvenes» es natural en español y mantiene la referencia etaria; el contexto no exige marcar «varones» de manera explícita en el texto principal.
- source_word: כֹּחָם
  english_pob_choice: their strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su vigor
  - su poder
  lexicon: HALOT
  rationale: El sustantivo denota fuerza/poder. «Fuerza» es la equivalencia más directa y natural en español, y conserva el sentido proverbial de vigor juvenil.
- source_word: הֲדַר
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - honor
  - majestad
  - belleza
  lexicon: HALOT
  rationale: El término se relaciona con honor y adorno. «Esplendor» funciona bien como paralelo de «gloria» y mantiene el registro elevado del proverbio.
- source_word: זְקֵנִים
  english_pob_choice: old men
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los hombres de edad avanzada
  - los mayores
  lexicon: HALOT
  rationale: Aquí el contraste es de edad, no de oficio. «Ancianos» comunica edad avanzada con dignidad y refleja mejor el matiz proverbial que una traducción meramente biológica o coloquial.
- source_word: שֵׂיבָה
  english_pob_choice: gray hair
  chosen_spanish: la canicie
  alternatives_spanish:
  - las canas
  - el cabello cano
  - la vejez
  lexicon: HALOT
  rationale: El sustantivo puede referirse a canicie o al estado de vejez visible en el cabello gris. «Canicie» preserva la imagen concreta y formal del hebreo sin reducirla a una paráfrasis como «vejez».
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético (WLC) y el audit trail inglés. No se detectaron revisiones aplicadas ni divergencias textuales relevantes; se conservó la estructura poética bipartita y el contraste de edad/fuerza/canicie.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro proverbial y bíblico, pero con español moderno y natural.
  - «Ancianos» se usa aquí por edad, no como título eclesiástico.
  - «Canicie» conserva la imagen del hebreo y evita perder el valor concreto de שֵׂיבָה.
