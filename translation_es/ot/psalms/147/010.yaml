translation:
  language: es
  text: No se complace en la fuerza del caballo; no halla placer en las piernas[a] del hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Piernas» traduce de manera natural el hebreo שׁוֹקֵי; también puede entenderse como «muslos». En este contexto, la referencia apunta a la fuerza física humana.
    reason: lexical_alternative
  - marker: b
    text: «El hombre» conserva el masculino singular del hebreo, usado aquí de manera representativa para la fuerza humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְבוּרַת
  english_pob_choice: in the strength of
  chosen_spanish: en la fuerza de
  alternatives_spanish:
  - en el poder de
  - en la fortaleza de
  lexicon: HALOT
  rationale: גְּבוּרָה expresa fuerza, poder o vigor. «Fuerza» es la opción más natural en español y mantiene el contraste poético con la capacidad física humana y animal.
- source_word: הַסּוּס
  english_pob_choice: the horse
  chosen_spanish: el caballo
  alternatives_spanish:
  - el caballo
  lexicon: HALOT
  rationale: El sustantivo definido se refiere de forma directa al caballo. En español, «caballo» es el equivalente natural y claro para conservar la imagen poética.
- source_word: יֶחְפָּץ
  english_pob_choice: he does not delight
  chosen_spanish: no se complace
  alternatives_spanish:
  - no se deleita
  - no desea
  lexicon: HALOT
  rationale: חפץ puede expresar deleite, deseo o agrado. «No se complace» preserva el matiz afectivo sin volver idéntico el segundo miembro del paralelismo.
- source_word: בְּשׁוֹקֵי
  english_pob_choice: in the legs of
  chosen_spanish: en las piernas de
  alternatives_spanish:
  - en los muslos de
  - en las patas de
  lexicon: HALOT
  rationale: שׁוֹק puede referirse a la pierna o al muslo. En este contexto de fuerza física, «piernas» es comprensible y idiomático en español moderno; «muslos» sería posible, pero menos natural para este paralelismo.
- source_word: הָאִישׁ
  english_pob_choice: a man / the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - el varón
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y funciona aquí de modo representativo. «El hombre» conserva esa singularidad genérica sin neutralizar el rasgo masculino del hebreo.
theological_decisions:
- issue: Valor representativo del masculino singular הָאִישׁ
  english_pob_reading: the man / a man preserves the masculine singular Hebrew in representative use
  chosen_spanish_reading: el hombre preserva el singular masculino representativo
  alternative_spanish_readings:
  - un hombre
  - la humanidad
  rationale: El verso no contrasta especies de personas sino la fuerza humana frente a lo que agrada a Dios. Mantener «el hombre» conserva la forma del hebreo y su función representativa en el paralelismo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto base en inglés pasó de «the legs of the man» a «the legs of a man» para reflejar mejor el singular genérico. La versión española mantiene la función representativa del hebreo con «el hombre» y conserva el contraste poético entre la fuerza del caballo y la capacidad física humana.
  spanish_consistency_notes:
  - Se usó «fuerza» para גְּבוּרָה, coherente con un registro claro y bíblico en español.
  - Se evitó «SEÑOR» o equivalentes, porque el versículo no contiene el tetragrámaton ni una cita directa del mismo.
  - 'Se mantuvo el paralelismo con dos miembros negativos y verbos distintos: «no se complace» / «no se deleita».'
