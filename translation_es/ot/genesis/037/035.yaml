translation:
  language: es
  text: 'Entonces se levantaron todos sus hijos y todas sus hijas para consolarlo, pero él rehusó ser consolado y dijo: «Porque descenderé a Sheol[a], a mi hijo[b], de luto». Y su padre lloró por él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sepulcro»; hebreo «a Sheol».
    reason: lexical_alternative
  - marker: b
    text: O «descenderé de luto a Sheol a mi hijo».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: El verbo narrativo קום expresa incorporarse o levantarse. «Se levantaron» es natural en español y conserva el movimiento de la escena sin añadir interpretación.
- source_word: כָל בָּנָיו וְכָל בְּנֹתָיו
  english_pob_choice: all his sons and all his daughters
  chosen_spanish: todos sus hijos y todas sus hijas
  alternatives_spanish:
  - todos sus hijos
  - todos sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente varones y mujeres; por eso se conserva la pareja marcada en lugar de generalizarla como «hijos» solamente.
- source_word: לְנַחֲמוֹ
  english_pob_choice: to comfort him
  chosen_spanish: para consolarlo
  alternatives_spanish:
  - para confortarlo
  - para darle consuelo
  lexicon: HALOT
  rationale: El piel de נחם aquí se refiere a brindar consuelo en duelo. «Consolar» es el equivalente español más natural y fiel al contexto.
- source_word: וַיְמָאֵן
  english_pob_choice: he refused
  chosen_spanish: rehusó
  alternatives_spanish:
  - se negó
  - rechazó
  lexicon: HALOT
  rationale: מאן expresa negativa firme. «Rehusó» mantiene el tono directo y formal del relato bíblico.
- source_word: לְהִתְנַחֵם
  english_pob_choice: to be comforted
  chosen_spanish: ser consolado
  alternatives_spanish:
  - recibir consuelo
  - dejarse consolar
  lexicon: HALOT
  rationale: El hitpael de נחם puede tener sentido pasivo/reflexivo. En español, «ser consolado» preserva esa pasividad sin forzar una lectura reflexiva.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de su negativa y la cita que sigue. «Porque» comunica de modo claro la relación causal y explicativa.
- source_word: אֵרֵד
  english_pob_choice: I will go down
  chosen_spanish: descenderé
  alternatives_spanish:
  - bajaré
  - iré abajo
  lexicon: HALOT
  rationale: ירד se conserva con el valor direccional de «descender». En este contexto también prepara la referencia a Sheol.
- source_word: אֶל־בְּנִי
  english_pob_choice: to my son
  chosen_spanish: hacia mi hijo
  alternatives_spanish:
  - a mi hijo
  - para mi hijo
  lexicon: HALOT
  rationale: La preposición אֶל puede expresar dirección o destino. «Hacia mi hijo» mantiene el matiz direccional y evita añadir una precisión no explícita en el hebreo.
- source_word: אָבֵל
  english_pob_choice: mourning
  chosen_spanish: enlutado
  alternatives_spanish:
  - de luto
  - en duelo
  - enlutado de dolor
  lexicon: HALOT
  rationale: El término designa un estado de duelo. «Enlutado» conserva el tono sobrio y da una equivalencia idiomática aceptable en español bíblico moderno.
- source_word: שְׁאֹלָה
  english_pob_choice: to Sheol
  chosen_spanish: a Sheol
  alternatives_spanish:
  - al Seol
  - al sepulcro
  - a la morada de los muertos
  lexicon: HALOT
  rationale: Se translitera el término hebreo para preservar su peso conceptual y no reducirlo prematuramente a «sepulcro» o «grave». En español, «Sheol» es la forma más transparente y auditable.
- source_word: וַיֵּבְךְּ אֹתוֹ אָבִיו
  english_pob_choice: So his father wept for him
  chosen_spanish: Así lo lloró su padre
  alternatives_spanish:
  - Y su padre lloró por él
  - Entonces su padre lloró por él
  lexicon: HALOT
  rationale: El verbo בכה puede expresarse en español como «llorar» o «llorar por». «Lo lloró» reproduce el objeto pronominal del hebreo y el carácter afectivo de la frase, manteniendo la concisión narrativa.
theological_decisions:
- issue: Rendering of שְׁאוֹל (Sheol)
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - la tumba
  - la morada de los muertos
  rationale: Se preserva el término hebreo porque nombra una realidad bíblica con carga semántica propia; traducirlo de entrada como «tumba» o «sepulcro» aplanaría el alcance del texto y resolvería una tensión que el hebreo deja abierta.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolving it prematurely.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente que colocó el complemento adverbial final («enlutado») para evitar acumulación incómoda de frases direccionales. Se mantuvo esa claridad en español sin perder el orden semántico del hebreo ni la distinción entre los hijos y las hijas.
  spanish_consistency_notes:
  - Se usó «Sheol» por consistencia con la política POB de transparencia frente a términos del inframundo hebreo.
  - Se prefirió «consolar/ser consolado» para נחם en este contexto funerario, evitando variantes más interpretativas.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
