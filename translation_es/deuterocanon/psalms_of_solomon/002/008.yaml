translation:
  language: es
  text: Porque apartó su rostro de mostrarles misericordia[a]—joven y anciano y sus hijos[b], todos a la vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apartó su rostro de compadecerse de ellos».'
    reason: lexical_alternative
  - marker: b
    text: «Joven y anciano» traduce formas griegas singulares usadas de manera colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψεν
  english_pob_choice: turned ... away
  chosen_spanish: apartó
  alternatives_spanish:
  - volvió atrás
  - retiró
  lexicon: BDAG
  rationale: El verbo expresa un giro de alejamiento; «apartó» conserva la idea de desviar o volver lejos sin forzar una abstracción.
- source_word: τὸ πρόσωπον αὐτοῦ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su presencia
  - su semblante
  lexicon: BDAG
  rationale: «Rostro» preserva la imagen concreta del texto y su tono bíblico natural en español.
- source_word: ἀπὸ ἐλέους αὐτῶν
  english_pob_choice: from mercy toward them
  chosen_spanish: de la misericordia hacia ellos
  alternatives_spanish:
  - de mostrarles misericordia
  - de compadecerse de ellos
  lexicon: BDAG
  rationale: La construcción griega es comprimida; en español, «de la misericordia hacia ellos» refleja el movimiento relacional sin resolver la imagen en una paráfrasis interpretativa.
- source_word: νέον καὶ πρεσβύτην
  english_pob_choice: young and old
  chosen_spanish: joven y anciano
  alternatives_spanish:
  - joven y viejo
  - los jóvenes y los ancianos
  lexicon: BDAG
  rationale: Como en el inglés POB, la pareja funciona distributivamente y abarca todas las edades; «joven y anciano» es natural y conserva el contraste.
- source_word: τέκνα αὐτῶν
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: BDAG
  rationale: Aquí τέκνα abarca a los hijos de manera general; «sus hijos» es claro y fiel en español.
- source_word: εἰς ἅπαξ
  english_pob_choice: all at once
  chosen_spanish: de una vez
  alternatives_spanish:
  - todos a la vez
  - en un solo momento
  lexicon: BDAG
  rationale: La frase comunica simultaneidad y totalidad; «de una vez» transmite ese golpe único y completo en español contemporáneo.
theological_decisions:
- issue: Imagen antropomórfica del sujeto que aparta su rostro
  english_pob_reading: Preserved the concrete idiom 'turned his face away' rather than interpreting it abstractly.
  chosen_spanish_reading: Se preserva la imagen concreta de que apartó su rostro, en lugar de abstraerla como mera retirada de favor.
  alternative_spanish_readings:
  - retiró su misericordia
  - les negó compasión
  rationale: El texto conserva una figura relacional y corporal. Mantenerla evita aplanar la tensión teológica y respeta el modo en que el original expresa el juicio.
  doctrine_reference: Preservar la tensión teológica sin resolverla en abstracción.
translation_notes:
  revision_awareness: La versión inglesa revisada optó por una formulación más literal de ἀπὸ ἐλέους αὐτῶν («from mercy toward them») y suavizó la puntuación. La redacción española sigue esa decisión al mantener la relación entre «apartó su rostro» y «de la misericordia hacia ellos», sin convertirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «misericordia» como equivalente de ἔλεος, en coherencia con el registro bíblico del proyecto.
  - «Rostro» conserva la imaginería corporal del texto, alineada con el tratamiento del inglés POB.
  - La secuencia «joven y anciano y sus hijos» refleja el encadenamiento del griego sin añadir conectores explicativos innecesarios.
