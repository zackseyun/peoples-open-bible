  to: Tu camino y tus obras han traído estas cosas sobre ti. Esta es tu maldad[a], porque es amarga, porque llega hasta tu corazón.
  rationale: Se hizo una reparación mínima pero necesaria en 'זֹאת רָעָתֵךְ'. El borrador 'tu mal' no funciona bien en español en esta construcción y, tal como aparece, incluso genera discordancia gramatical. 'Tu maldad' preserva de manera clara la fuerza acusatoria documentada por la auditoría inglesa, mientras la nota mantiene las alternativas 'calamidad' y 'desgracia' para el matiz de consecuencia sufrida. El resto del versículo puede mantenerse, pues refleja fielmente el hebreo y la revisión inglesa.
