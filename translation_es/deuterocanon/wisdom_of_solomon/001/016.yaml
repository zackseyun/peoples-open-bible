translation:
  language: es
  text: Pero los impíos[a], con sus manos y sus palabras, lo llamaron; considerándolo un amigo, se consumieron, e hicieron una alianza con él[b], porque son dignos de pertenecer a su porción[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, «él» se refiere a la Muerte personificada en el contexto inmediato anterior.
    reason: cross_reference
  - marker: b
    text: O «hicieron un pacto con él».
    reason: lexical_alternative
  - marker: c
    text: O «de pertenecer a su lote».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los irreverentes
  lexicon: LSJ
  rationale: ἀσεβεῖς apunta a quienes carecen de reverencia ante Dios; en español, «impíos» conserva mejor ese matiz religioso-moral que «malvados», que puede sonar más general. «Irreverentes» es posible, pero resulta menos natural en este contexto sapiencial.
- source_word: ταῖς χερσὶ καὶ τοῖς λόγοις
  english_pob_choice: with their hands and with their words
  chosen_spanish: con sus manos y con sus palabras
  alternatives_spanish:
  - por sus hechos y por sus palabras
  - con manos y palabras
  lexicon: LSJ
  rationale: La imagen concreta de manos y palabras se mantiene en español para conservar el paralelismo y la fuerza retórica del griego. «Hechos» explicita la idea, pero suaviza la concreción original.
- source_word: προσεκαλέσαντο αὐτόν
  english_pob_choice: called for him
  chosen_spanish: lo llamaron
  alternatives_spanish:
  - lo convocaron
  - lo invitaron
  - lo llamaron hacia sí
  lexicon: LSJ
  rationale: El medio puede implicar llamar hacia sí o buscar su cercanía. «Lo llamaron» es la forma más natural en español y conserva la acción sin sobreespecificar una invitación formal o una convocatoria.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo / él
  alternatives_spanish:
  - la Muerte
  - muerte
  lexicon: LSJ
  rationale: El pronombre se refiere a la Muerte personificada en el contexto inmediato anterior. La traducción principal conserva el pronombre para seguir el griego, mientras la nota aclara el antecedente.
- source_word: φίλον ἡγησάμενοι αὐτόν
  english_pob_choice: considering him a friend
  chosen_spanish: considerándolo un amigo
  alternatives_spanish:
  - teniéndolo por amigo
  - considerándolo como amigo
  lexicon: LSJ
  rationale: «ἡγέομαι» con acusativo predicativo expresa considerar o tener por. «Amigo» reproduce bien la ironía de tratar a la Muerte como aliada.
- source_word: ἐτάκησαν
  english_pob_choice: they wasted away
  chosen_spanish: se consumieron
  alternatives_spanish:
  - se desvanecieron
  - se derritieron
  lexicon: LSJ
  rationale: El verbo sugiere derretirse o consumirse. En español, «se consumieron» preserva la idea de deterioro autodestructivo con naturalidad y sin perder la imagen original.
- source_word: συνθήκην ἔθεντο πρὸς αὐτόν
  english_pob_choice: they made a covenant with him
  chosen_spanish: hicieron un pacto con él
  alternatives_spanish:
  - hicieron una alianza con él
  - concertaron un pacto con él
  lexicon: LSJ
  rationale: συνθήκη puede significar pacto, acuerdo o convenio. Aquí «pacto» conserva la solemnidad del compromiso y evita imponer «covenant» como tecnicismo bíblico en español donde el contexto no es un pacto divino.
- source_word: ἄξιοί εἰσιν
  english_pob_choice: they are worthy
  chosen_spanish: se consideran dignos
  alternatives_spanish:
  - son dignos
  - merecen
  lexicon: LSJ
  rationale: El griego presenta una afirmación de valía o mérito. Dado que la cláusula funciona como motivo de la alianza con la Muerte, «se consideran dignos» deja sentir la ironía y el matiz subjetivo del juicio.
- source_word: τῆς ἐκείνου μερίδος εἶναι
  english_pob_choice: to belong to his portion
  chosen_spanish: de pertenecer a su porción
  alternatives_spanish:
  - de estar en su lote
  - de compartir su suerte
  lexicon: LSJ
  rationale: μερίς puede ser porción, parte o lote. «Porción» mantiene el valor del sustantivo griego y la relación posesiva; «de pertenecer» refleja la construcción de finalidad/resultado sin forzarla.
theological_decisions:
- issue: Referente de αὐτόν (la Muerte personificada)
  english_pob_reading: The pronoun refers to Death from the immediate preceding context, but the main text retains 'him' rather than substituting 'death.'
  chosen_spanish_reading: El pronombre se mantiene en la traducción principal, con nota explícita de que se refiere a la Muerte personificada del contexto anterior.
  alternative_spanish_readings:
  - sustituirlo por «la Muerte» en el cuerpo del texto
  - repetir «muerte» para eliminar la ambigüedad
  rationale: El contexto literario personifica a la Muerte; por eso la equivalencia más fiel conserva el pronombre y deja que el contexto haga su trabajo. La nota evita que el lector pierda el antecedente sin borrar la forma griega.
  doctrine_reference: Primacía del texto fuente y preservación de la personificación literaria.
- issue: συνθήκη como pacto/alianza
  english_pob_reading: they made a covenant with him
  chosen_spanish_reading: hicieron un pacto con él
  alternative_spanish_readings:
  - hicieron una alianza con él
  - hicieron un convenio con él
  rationale: Aunque el término puede sonar solemne, no se trata de un pacto divino del tipo teológico-covenantal clásico. «Pacto» mantiene la gravedad del acto y la ironía de aliarse con la Muerte sin introducir una carga doctrinal innecesaria.
  doctrine_reference: Consistencia léxica con matiz contextual; evitar sobredeterminación teológica.
translation_notes:
  revision_awareness: La versión inglesa auditada conserva la personificación de la Muerte y opta por una equivalencia sobria; la revisión reciente solo suavizó una repetición en inglés sin alterar el sentido. En español, se mantuvo la estructura paralela del versículo y se decidió conservar el pronombre, aclarado mediante nota, y traducir συνθήκη como «pacto» por claridad y gravedad contextual.
  spanish_consistency_notes:
  - Se mantiene «impíos» para ἀσεβεῖς, conforme al valor religioso del término.
  - Se conserva la imagen concreta de «manos» y «palabras» para respetar el paralelismo.
  - «Pacto» se usa aquí como equivalente de συνθήκη, sin forzar un tecnicismo eclesiástico.
  - La personificación de la Muerte queda explícita en la nota, no en el cuerpo del versículo, para respetar el pronombre griego.
  - «Porción» conserva la ambigüedad semántica de μερίς entre porción, lote y suerte.
