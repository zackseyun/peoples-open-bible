revisions:
- from: Entonces, cuando se leyó delante de Rehum y de Simsai, el escriba, y de sus asociados, la copia de la carta del rey Artajerjes, fueron de prisa a Jerusalén, a los judíos[a], y los hicieron cesar por la fuerza y el poder[b].
  to: Entonces, tan pronto como se leyó ante Rehum, Simsai el escriba y sus asociados la copia de la carta del rey Artajerjes, fueron de prisa a Jerusalén, a los judíos[a], y los hicieron detenerse por la fuerza y el poder[b].
  rationale: 'La revisión es menor y no doctrinal: refuerza la inmediatez temporal del original, aligera la sintaxis española y sustituye una expresión causativa algo rígida por otra más idiomática sin perder fuerza semántica.'
