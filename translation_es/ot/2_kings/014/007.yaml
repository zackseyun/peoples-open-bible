translation:
  language: es
  text: Él abatió a diez mil de Edom en el Valle de la Sal[a], capturó Sela en batalla y le puso por nombre Jokteel, hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sela» también puede entenderse en su sentido léxico como «la peña» o «la roca»; aquí, sin embargo, probablemente funciona como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - abatió
  lexicon: HALOT
  rationale: En contexto militar, נכה puede expresar causar una derrota o golpe letal. «Hirió» conserva la acción de ataque sin añadir más explicitud que la del hebreo.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - edomitas
  - Idumea
  lexicon: HALOT
  rationale: El hebreo nombra directamente a Edom; en español conviene mantener el nombre propio y no convertirlo en un etnónimo que el texto no dice de forma explícita.
- source_word: בְּגֵיא הַמֶּלַח
  english_pob_choice: in the Valley of Salt
  chosen_spanish: en el Valle de la Sal
  alternatives_spanish:
  - en el Valle Salado
  - en el valle de la sal
  lexicon: HALOT
  rationale: La construcción nominal se vierte de modo directo y natural en español. Se conserva el topónimo tradicional con artículo definido.
- source_word: עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: ten thousand
  chosen_spanish: diez mil hombres
  alternatives_spanish:
  - diez mil
  - diez mil de Edom
  lexicon: HALOT
  rationale: El hebreo presenta el número sin un sustantivo expreso; en español, «diez mil hombres» explicita el referente humano implícito en el contexto bélico sin alejarse del sentido.
- source_word: וְתָפַשׂ
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  - se hizo con
  lexicon: HALOT
  rationale: En un contexto de guerra, תפשׂ indica tomar posesión de un lugar; «capturó» comunica bien la acción militar.
- source_word: הַסֶּלַע
  english_pob_choice: Sela
  chosen_spanish: Sela
  alternatives_spanish:
  - la peña
  - la roca
  - el peñasco
  lexicon: HALOT
  rationale: Se conserva el nombre propio por la probabilidad contextual de toponimia, como en el auditable inglés POB. El valor léxico común queda implícito y puede señalarse como alternativa.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en la guerra
  - en combate
  lexicon: HALOT
  rationale: La frase adverbial se traduce con economía y naturalidad, manteniendo el contexto bélico inmediato.
- source_word: וַיִּקְרָא אֶת שְׁמָהּ
  english_pob_choice: called its name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - lo llamó
  - le puso por nombre
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea de nombramiento con transparencia formal. «Llamó su nombre» refleja con fidelidad la estructura del original.
- source_word: יָקְתְאֵל
  english_pob_choice: Joktheel
  chosen_spanish: Jokteel
  alternatives_spanish:
  - Joktheel
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español con grafía natural y reconocible, manteniendo la correspondencia con el topónimo bíblico.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: La fórmula temporal se expresa de forma idiomática en español y conserva la referencia al momento de la redacción.
translation_notes:
  revision_awareness: El inglés POB revisó su redacción de «ten thousand Edomites» a «ten thousand of Edom» para ajustarse más al hebreo. En español, la elección «diez mil hombres» preserva el referente humano implícito sin introducir un etnónimo que el hebreo no explicita. También se mantiene la decisión toponímica de «Sela» con nota de alternativa léxica, coherente con el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene la transliteración de nombres propios bíblicos y el tono sobrio, sin paráfrasis expansivas.
  - La puntuación sigue el orden natural del español, manteniendo las tres acciones principales del hebreo.
