    rationale: Aunque intenta conservar el matiz pasivo del nifal, la frase resulta forzada y menos natural que «te echarán de menos» o «se notará tu ausencia». La traducción debe ser clara y eclesialmente legible.
  - severity: low
    issue: El nombre «Jonathan» no está plenamente castellanizado
    rationale: En español bíblico y de lectura eclesial, «Jonatán» es la forma más normal y reconocible. No afecta gravemente el sentido, pero mejora la naturalidad y la consistencia.
  - severity: low
    issue: 'La nota contiene una alternativa poco natural: «tu lugar estará ausente»'
    rationale: En español un lugar o asiento no suele describirse como «ausente»; mejor «vacío» o «desocupado», o bien explicar que el hebreo literalmente repite la idea de ‘ser notado/faltar’.
