  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue de cerca la decisión del POB inglés: una imprecación dirigida a Dios con futuro solemne, ''dureza de corazón'' para מְגִנַּת לֵב, y ''tu maldición'' para תַּאֲלָתְךָ. También preserva adecuadamente las dos notas del inglés: la lectura alternativa volitiva y la rareza léxica de la expresión ''cubierta/escudo de corazón''.'
  spanish_quality_summary: 'La frase principal es clara y natural en español bíblico moderno. Sin embargo, la nota [a] contiene una formulación poco idiomática: ''tu maldición contra ellos'' queda elíptica y menos natural que una forma completa como ''sea sobre ellos'' o ''venga sobre ellos''. Además, las comillas iniciales dentro de la nota sobran. Conviene armonizar la nota alternativa con la sintaxis digna y clara del texto principal.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Dureza de corazón' y 'maldición' son elecciones adecuadas y fieles; no intervienen términos sensibles como Yahvé/Mesías/esclavo. La decisión de mantener futuro imprecatorio en vez de jussivo explícito concuerda con el audit trail inglés.
  issues:
  - severity: medium
    issue: 'La nota [a] usa una alternativa española poco natural: ''tu maldición contra ellos''.'
    rationale: El hebreo alternativo puede expresarse en español de forma más idiomática y formal como 'sea sobre ellos' o 'venga sobre ellos'. La formulación actual suena truncada y no representa tan bien el paralelismo del verso.
  - severity: low
    issue: La nota [a] empieza con una comilla simple innecesaria antes de 'También puede leerse'.
    rationale: Es un detalle tipográfico menor, pero conviene corregirlo para mantener pulcritud editorial.
  revised_spanish_text: Tú les darás dureza de corazón[a][b]; tu maldición será sobre ellos.
  revised_footnotes:
  - marker: a
    text: 'También puede leerse: «Que les des dureza de corazón; tu maldición sea sobre ellos». El imperfecto hebreo puede oírse como imprecación.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «cubierta/escudo de corazón». La expresión es rara; «dureza de corazón» refleja el sentido probable en el contexto.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel, claro y bien alineado con el POB inglés. Solo se repara la nota alternativa para que el español sea más natural y completo, manteniendo la misma justificación exegética sobre el imperfecto imprecatorio.
