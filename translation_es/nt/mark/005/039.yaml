translation:
  language: es
  text: 'Y entrando, les dice: «¿Por qué están haciendo alboroto y llorando? La niña no ha muerto, sino que duerme».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: εἰσελθὼν
  english_pob_choice: entering in
  chosen_spanish: Y entrando
  alternatives_spanish:
  - Y después de entrar
  - Y al entrar
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma breve y natural en español con «entrando», manteniendo la relación previa al verbo principal sin añadir una secuencia temporal más fuerte de la que exige el griego.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos con «dice», que preserva vivacidad narrativa mejor que el pasado.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: En esta reprensión, el valor idiomático es causal/interrogativo, por lo que «¿Por qué?» comunica mejor la fuerza del griego que un más literal «¿Qué?».
- source_word: θορυβεῖσθε
  english_pob_choice: are you making a commotion
  chosen_spanish: están haciendo alboroto
  alternatives_spanish:
  - están causando un disturbio
  - están alborotando
  lexicon: BDAG
  rationale: «Hacer alboroto» transmite bien la idea de perturbación ruidosa y pública, en un español claro y sobrio.
- source_word: κλαίετε
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - lamentando
  - sollozando
  lexicon: BDAG
  rationale: «Llorando» refleja el acto de llanto de manera natural; no se fuerza un matiz ritualizante que el griego no explicita aquí.
- source_word: παιδίον
  english_pob_choice: the child
  chosen_spanish: la niña
  alternatives_spanish:
  - el niño
  - la hija
  lexicon: BDAG
  rationale: Aunque el sustantivo griego es neutro y puede traducirse como «el niño/la niña» según contexto, aquí el relato previo identifica a la menor como hija de Jairo; «la niña» hace explícita esa identificación contextual sin perder fidelidad al referente.
- source_word: οὐκ ἀπέθανεν
  english_pob_choice: has not died
  chosen_spanish: no murió
  alternatives_spanish:
  - no ha muerto
  - no está muerta
  lexicon: BDAG
  rationale: Se opta por un pasado simple natural en español para reflejar el evento negado, sin añadir una lectura explicativa. La negación mantiene la tensión del dicho de Jesús.
- source_word: καθεύδει
  english_pob_choice: is sleeping
  chosen_spanish: duerme
  alternatives_spanish:
  - está durmiendo
  - está dormida
  lexicon: BDAG
  rationale: «Duerme» conserva el valor metafórico y la concisión del presente griego. En español suena más directo y solemne que una perífrasis progresiva.
theological_decisions:
- issue: Si la afirmación de Jesús debe resolverse como negación literal de la muerte o como lenguaje metafórico de sueño
  english_pob_reading: Retain the wording 'has not died, but is sleeping' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener «no murió, sino que duerme» en el texto principal, sin expandir la metáfora.
  alternative_spanish_readings:
  - no está realmente muerta, sino dormida
  - no murió definitivamente, sino que duerme
  rationale: El griego presenta una afirmación breve y tensa que puede leerse metafóricamente en vista de la resurrección venidera. La traducción conserva esa tensión sin resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «And entering in» para reflejar más directamente el participio εἰσελθών sin añadir una secuencia temporal explícita. La presente versión española sigue ese mismo criterio con «Y entrando». También ajusta el referente de παιδίον a «la niña» por el contexto inmediato de la narración, sin alterar el sentido del término griego.
  spanish_consistency_notes:
  - Se mantiene el presente narrativo en «dice» para conservar el estilo marcano.
  - «Duerme» preserva la metáfora sin interpretarla como simple inconsciencia.
  - La identificación contextual de la menor como «la niña» evita una traducción genérica innecesaria y sigue el flujo narrativo del pasaje.
