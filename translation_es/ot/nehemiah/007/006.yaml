translation:
  language: es
  text: 'Estos son los hijos de la provincia que subieron[a] del cautiverio de los exiliados[b], a quienes Nabucodonosor, rey de Babilonia, había llevado cautivos, y que regresaron[c] a Jerusalén y a Judá, cada hombre a su ciudad[d]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más naturalmente, «subieron de». El hebreo usa el lenguaje convencional de ascenso hacia la tierra/Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «del cautiverio de los exiliados», preservando dos sustantivos relacionados.
    reason: lexical_alternative
  - marker: c
    text: O «y volvieron». El hebreo funciona aquí como una segunda cláusula descriptiva paralela a «que subieron».
    reason: alternative_reading
  - marker: d
    text: 'Expresión distributiva: literalmente, «cada hombre a su ciudad». Refleja a los retornados por casas o familias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - los hijos de
  - los descendientes de
  - la gente de
  lexicon: HALOT
  rationale: En español, «hijos de» conserva la forma semítica de pertenencia/descendencia sin sonar tan rígido como un calco literal. Mantiene el registro genealógico y listístico del pasaje.
- source_word: הַמְּדִינָה
  english_pob_choice: the province
  chosen_spanish: la provincia
  alternatives_spanish:
  - el distrito
  - la región
  - la jurisdicción
  lexicon: HALOT
  rationale: En el contexto persa del libro, מְדִינָה designa una unidad administrativa; «provincia» es el equivalente histórico y natural en español.
- source_word: הָעֹלִים
  english_pob_choice: who came up
  chosen_spanish: que subieron
  alternatives_spanish:
  - que fueron subiendo
  - que ascendieron
  - que vinieron
  lexicon: HALOT
  rationale: עלה conserva aquí el lenguaje convencional de subir a Jerusalén/entrar en la tierra. «Subieron» preserva esa imagen sin forzar el español.
- source_word: מִשְּׁבִי הַגּוֹלָה
  english_pob_choice: from the captivity of the exiles
  chosen_spanish: del cautiverio de los exiliados
  alternatives_spanish:
  - de la cautividad de los exiliados
  - del exilio
  - de la cautividad del destierro
  lexicon: HALOT
  rationale: La expresión hebrea acumula dos sustantivos relacionados. «Cautiverio de los exiliados» conserva esa doble fuerza sin borrar la tensión léxica que el inglés POB también preserva.
- source_word: הֶגְלָה
  english_pob_choice: had carried away
  chosen_spanish: había llevado cautivos
  alternatives_spanish:
  - había deportado
  - había exiliado
  - había llevado al destierro
  lexicon: HALOT
  rationale: El verbo describe el traslado forzoso de los deportados. «Había llevado cautivos» comunica la acción y mantiene el matiz de coerción de forma idiomática en español.
- source_word: נְבוּכַדְנֶצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezar
  lexicon: HALOT
  rationale: «Nabucodonosor» es la forma española asentada y plenamente reconocible para el rey de Babilonia.
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: and who returned
  chosen_spanish: y que regresaron
  alternatives_spanish:
  - y volvieron
  - y retornaron
  lexicon: HALOT
  rationale: El verbo שׁוּב se vierte naturalmente como «regresar» en español. Se mantiene la función relativa del inglés auditado («and who returned») para una sintaxis fluida y fiel.
- source_word: לִירוּשָׁלַם וְלִיהוּדָה
  english_pob_choice: to Jerusalem and to Judah
  chosen_spanish: a Jerusalén y a Judá
  alternatives_spanish:
  - a Jerusalén y Judá
  - hacia Jerusalén y Judá
  lexicon: HALOT
  rationale: Se conserva el doble destino con preposición repetida en la medida en que el español permite claridad y ritmo, y «Judá» se entiende como la región/provincia, no solo la tribu.
- source_word: אִישׁ לְעִירוֹ
  english_pob_choice: each man to his city
  chosen_spanish: cada hombre a su ciudad
  alternatives_spanish:
  - cada uno a su ciudad
  - cada hombre a su pueblo
  - cada cual a su ciudad
  lexicon: HALOT
  rationale: La expresión distributiva se conserva de manera directa. «Cada hombre» refleja la forma masculina singular hebrea y evita diluir el valor representativo del original.
theological_decisions:
- issue: Conservación del lenguaje masculino singular representativo en אִישׁ
  english_pob_reading: each man to his city
  chosen_spanish_reading: cada hombre a su ciudad
  alternative_spanish_readings:
  - cada uno a su ciudad
  - cada persona a su ciudad
  rationale: El hebreo usa una forma masculina singular con valor distributivo. En este contexto de lista/registro, la traducción conserva esa forma sin neutralizarla, mientras el sentido abarca a los retornados como unidades familiares o de casa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El contexto inglés pasó de una redacción con «and they returned» a una estructura más fluida («and who returned») para reflejar la sintaxis hebrea de dos descriptores paralelos. La versión española adopta esa misma solución con una segunda relativa («y que regresaron»), manteniendo la continuidad sintáctica y el valor descriptivo del verbo final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Provincia» se usa para מְדִינָה en sentido persa-administrativo, coherente con el resto del libro.
  - «Judá» se conserva como región/provincia en paralelo con «Jerusalén».
  - Se evita sustituir «hijos» por una formulación neutral que borre el paralelo formal del hebreo.
  - La puntuación reproduce una cadencia de lista narrativa adecuada para un registro bíblico moderno.
