translation:
  language: es
  text: ¿Son tus días como los días del hombre[a], o tus años como los días de un hombre poderoso[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mortal' para אֱנוֹשׁ, destacando la fragilidad humana.
    reason: lexical_alternative
  - marker: b
    text: Hebreo גָבֶר también puede traducirse 'hombre', 'varón' o 'hombre fuerte'; se opta por 'hombre poderoso' para conservar la distinción con אֱנוֹשׁ en la línea anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִימֵי
  english_pob_choice: Are your days like the days of
  chosen_spanish: ¿Son tus días como los días de...
  alternatives_spanish:
  - ¿Son tus días iguales a los días de...
  - ¿Acaso tus días son como los días de...
  lexicon: HALOT
  rationale: La pregunta retórica comparativa se expresa de manera natural en español con '¿Son ... como ...?', conservando el paralelismo poético sin volverlo mecánico.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el mortal
  - el ser humano
  lexicon: HALOT
  rationale: '''Hombre'' preserva la referencia humana genérica y el contraste con Dios. ''Mortal'' explicita la fragilidad, pero sería más interpretativo en el cuerpo principal.'
- source_word: יָמֶיךָ
  english_pob_choice: your days
  chosen_spanish: tus días
  alternatives_spanish:
  - los días tuyos
  lexicon: HALOT
  rationale: Traducción directa y idiomática del sustantivo en constructo con sufijo de segunda persona masculina singular.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: En este paralelismo poético, la partícula introduce una segunda comparación alternativa; 'o' refleja mejor esa función que 'si'.
- source_word: שְׁנוֹתֶיךָ
  english_pob_choice: your years
  chosen_spanish: tus años
  alternatives_spanish:
  - los años tuyos
  lexicon: HALOT
  rationale: Correspondencia directa con el sustantivo plural y sufijo posesivo, manteniendo el eco con 'tus días'.
- source_word: כִּימֵי
  english_pob_choice: like the days of
  chosen_spanish: como los días de
  alternatives_spanish:
  - igual que los días de
  lexicon: HALOT
  rationale: Se conserva la repetición comparativa del primer colon en un español claro y paralelo.
- source_word: גָבֶר
  english_pob_choice: a mighty man
  chosen_spanish: un hombre poderoso
  alternatives_spanish:
  - un hombre fuerte
  - un varón poderoso
  - un hombre valeroso
  lexicon: HALOT
  rationale: '''Hombre poderoso'' mantiene la distinción con אֱנוֹשׁ y refleja la fuerza/vigor asociados a גָבֶר sin forzar ''guerrero'' ni suavizarlo demasiado.'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del inglés POB, que prefirió 'mighty man' sobre 'strong man' para גבר, conservando el contraste con אֱנוֹשׁ. También respeta el juicio auditado de que אִם funciona aquí como alternativa poética y no como condicional.
  spanish_consistency_notes:
  - Se mantiene 'hombre' para אֱנוֹשׁ y 'hombre poderoso' para גָבֶר para reflejar la distinción léxica documentada.
  - Se usa 'como' para ambos miembros del paralelismo, con puntuación interrogativa natural en español.
  - Las notas al pie se limitan a alternativas léxicas explícitamente atestiguadas por el audit trail inglés.
