translation:
  language: es
  text: Así perezcan todos tus enemigos, Yahvé; pero sean los que lo aman como la salida del sol en su fuerza[a]. Y la tierra tuvo reposo[b] cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «los que lo aman [son] como la salida del sol en su fuerza».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la tierra estaba quieta»; esta expresión en Jueces suele denotar un período de paz o reposo después del conflicto.'
    reason: cross_reference
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So may
  chosen_spanish: Así perezcan
  alternatives_spanish:
  - Así sea
  - De esta manera
  lexicon: HALOT
  rationale: El hebreo introduce una conclusión deseada con valor jussivo; en español, «Así perezcan» comunica mejor el deseo/imprecación que una traducción meramente copulativa.
- source_word: יֹאבְדוּ
  english_pob_choice: perish
  chosen_spanish: perezcan
  alternatives_spanish:
  - se destruyan
  - mueren
  lexicon: HALOT
  rationale: «Perezcan» conserva la fuerza de ruina o desaparición sin precisar el modo, como hace la opción inglesa «perish».
- source_word: כָל אוֹיְבֶיךָ
  english_pob_choice: all your enemies
  chosen_spanish: todos tus enemigos
  alternatives_spanish:
  - cada uno de tus enemigos
  - todos los enemigos tuyos
  lexicon: HALOT
  rationale: Es una correspondencia directa y natural del constructo hebreo, manteniendo el plural totalizador.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme a la norma del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: וְאֹהֲבָיו
  english_pob_choice: but those who love him
  chosen_spanish: pero los que lo aman
  alternatives_spanish:
  - y los que lo aman
  - pero los que aman a él
  lexicon: HALOT
  rationale: El sufijo masculino singular se entiende naturalmente como referencia a Yahvé; el español mantiene el contraste con la primera cláusula mediante «pero».
- source_word: כְּצֵאת הַשֶּׁמֶשׁ
  english_pob_choice: be like the rising of the sun
  chosen_spanish: como la salida del sol
  alternatives_spanish:
  - como el salir del sol
  - como el amanecer del sol
  lexicon: HALOT
  rationale: La expresión hebrea con יצא aplicada al sol se vierte mejor como su salida o salida del sol, sin sobrecargarla con una paráfrasis.
- source_word: בִּגְבֻרָתוֹ
  english_pob_choice: in its strength
  chosen_spanish: en su poder
  alternatives_spanish:
  - en su fuerza
  - en todo su vigor
  lexicon: HALOT
  rationale: «גבורה» puede expresar fuerza/poder/vigor; «en su poder» conserva la intensidad del cuadro solar y fluye bien en español. La nota permite la alternativa literal «fuerza».
- source_word: וַתִּשְׁקֹט הָאָרֶץ
  english_pob_choice: And the land had rest
  chosen_spanish: Y la tierra tuvo paz
  alternatives_spanish:
  - Y la tierra descansó
  - Y la tierra estuvo quieta
  lexicon: HALOT
  rationale: En Jueces, la fórmula expresa cese de conflicto y estabilidad. «Tuvo paz» comunica el valor idiomático mejor que una quietud puramente acústica.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: Equivalencia directa del período de tiempo.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: La lectura auditada del POB en inglés usa el nombre propio divino, no un sustituto reverencial. En español, «Yahvé» es la forma adoptada para mantener esa decisión teológica y textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default Yahvé'
- issue: Referente del pronombre en וְאֹהֲבָיו
  english_pob_reading: him = the LORD
  chosen_spanish_reading: lo = Yahvé
  alternative_spanish_readings:
  - a él = Yahvé
  - sus amadores
  rationale: El sufijo masculino singular se refiere al nombre divino inmediatamente precedente. Se conserva el cambio de segunda persona a tercera persona sin suavizarlo.
  doctrine_reference: Hebrew discourse reference in Judges 5:31; English audit note on pronoun referent
- issue: Valor de la comparación en כְּצֵאת הַשֶּׁמֶשׁ בִּגְבֻרָתוֹ
  english_pob_reading: be like the rising of the sun in its strength
  chosen_spanish_reading: como la salida del sol en su poder
  alternative_spanish_readings:
  - como el salir del sol en su fuerza
  - como el amanecer en su vigor
  rationale: Se preserva la imagen comparativa del sol emergiendo con plenitud de fuerza, sin convertirla en una metáfora distinta ni debilitar el paralelismo.
  doctrine_reference: Poetic imagery and simile preservation in Judges 5:31
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que añadió «may» antes de la segunda cláusula para marcar el valor jussivo y el paralelo con la primera. En español se resolvió con la estructura exhortativa «Así perezcan ...; pero sean ...», que conserva el matiz optativo sin necesitar un auxiliar adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Tierra tuvo paz» sigue el sentido idiomático de quietud/resto que en Jueces indica cesación de conflicto.
  - La imagen del sol se conservó literal y dignamente, sin expandirla más allá de la comparación hebrea.
  - El pronombre singular de la segunda cláusula se dejó explícitamente ligado a Yahvé en la nota para evitar ambigüedad en español.
