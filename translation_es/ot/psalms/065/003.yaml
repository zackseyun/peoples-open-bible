  to: Oh, tú que escuchas la oración[a], a ti vendrán toda carne.
  rationale: Se corrige la concordancia del verbo al plural para reflejar mejor יָבֹאוּ (‘vendrán’) y se mejora levemente la puntuación del vocativo. Se conserva «toda carne» en el texto principal, con la nota explicativa ya documentada por el POB.
