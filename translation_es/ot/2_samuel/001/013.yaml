review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: David pregunta por el origen del joven mensajero, y este se identifica por descendencia respecto de un gēr amalecita. Sin embargo, dos elecciones debilitan la fidelidad fina al audit trail: «le había dado el informe» sobretraduce הַמַּגִּיד לוֹ frente al inglés POB «who told him», y «forastero» para גֵּר no preserva tan bien en español el matiz de residente extranjero/foráneo establecido por la nota y la revisión inglesa hacia «sojourner».'
  spanish_quality_summary: El español es generalmente claro y digno, pero puede hacerse más natural y preciso. «David» debe seguir la ortografía española habitual «David» o «Davíd»? En español bíblico estándar es «David», pero el proyecto ya usa «David» en el borrador; no es un problema. Sí conviene mejorar «que le había dado el informe», que suena administrativo y menos narrativo, por «que le había informado» o «que le había dado la noticia». También «forastero amalecita» puede sonar ambiguo en español, como si «forastero» bastara sin el matiz de residencia; «extranjero residente amalecita» es más preciso, aunque algo técnico. La construcción general es legible.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión léxica es גֵּר. Dado el audit trail inglés, el español debería reflejar mejor el estatus de residente foráneo; «extranjero residente» alinea mejor con la nota que «forastero». «El joven» para הַנַּעַר y «hijo de» para בֶּן אִישׁ están bien.
  issues:
  - severity: medium
    issue: «que le había dado el informe» es demasiado interpretativo y poco idiomático para el registro narrativo bíblico
    rationale: הַמַּגִּיד לוֹ identifica al joven como el que le comunicó la noticia. «Dar el informe» suena burocrático y se aleja del audit trail inglés «who told him». «Que le había informado» o «que le había dado la noticia» preserva mejor el sentido.
  - severity: medium
    issue: «forastero» no refleja con suficiente precisión el matiz de גֵּר en este contexto
    rationale: Aunque comprensible, «forastero» en español puede sugerir simplemente alguien de fuera o de paso. El inglés POB revisado privilegia «sojourner», y la nota habla de residencia en tierra ajena. «Extranjero residente» comunica mejor esa condición social/jurídica.
  - severity: low
    issue: La nota al pie necesita ajustarse al texto revisado y simplificarse levemente
    rationale: Si el texto principal usa «extranjero residente», la nota debería conservar la alternativa de estructura interpretativa, no repetir una formulación menos precisa como principal. También conviene pulir «estaba de paso o viviendo como forastero», que mezcla posibilidades de manera algo suelta.
  revised_spanish_text: 'David dijo al joven que le había informado: «¿De dónde eres tú?». Y él dijo: «Yo soy hijo de un extranjero residente amalecita[a]».'
  revised_footnotes:
