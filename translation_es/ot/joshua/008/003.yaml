base_translation:
  language: en
  yaml_path: translation/ot/joshua/008/003.yaml
  text: So Joshua and all the people of war rose to go up against Ai[a], and Joshua chose thirty thousand men, mighty men of valor[c][b], and sent them out by night.
  footnotes:
  - marker: a
    text: Or 'all the people of war' / 'all the army.' The Hebrew phrase is literally 'all the people of the war.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to go up to Ai.' The Hebrew idiom 'go up' is retained, while the context suggests hostile movement against the city.
    reason: lexical_alternative
  - marker: c
    text: Or 'mighty men of valor.'
    reason: lexical_alternative
