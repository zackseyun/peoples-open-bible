    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse: «el líder en el lugar del tesoro», «el que estaba a cargo de la tesorería» o «el que estaba a cargo de la cámara del tesoro». La frase griega es breve y admite más de una relación sintáctica.'
    reason: lexical_alternative
