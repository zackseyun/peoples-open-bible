translation:
  language: es
  text: Hasta los picos de los montes y los cimientos del mundo[a]—cuando él los contempla, tiemblan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cimientos del mundo»; el paralelo griego dice «los cimientos de la tierra».'
    reason: alternative_reading
lexical_decisions:
- source_word: קִצְבֵי
  english_pob_choice: peaks of
  chosen_spanish: los picos de
  alternatives_spanish:
  - los extremos de
  - las cumbres de
  - las cimas de
  lexicon: HALOT
  rationale: En el paralelo con «los montes», קִצְבֵי describe sus partes más altas o extremas. «Picos» conserva la imagen viva y suena natural en español, sin perder la fuerza poética del hebreo ni del griego τὰ ὄρη.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes
  lexicon: HALOT
  rationale: «Montes» es un equivalente digno y bíblico en español para הָרִים; aquí acompaña bien a «picos» y mantiene el registro poético-cósmico del versículo.
- source_word: וִיסוֹדֵי
  english_pob_choice: and the foundations of
  chosen_spanish: y los cimientos de
  alternatives_spanish:
  - y las bases de
  - y los fundamentos de
  lexicon: HALOT
  rationale: יסוד expresa la idea de fundamento o base estructural. «Cimientos» es claro en español y conserva la imagen de solidez que también refleja el griego θεμέλια.
- source_word: תֵבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - el mundo habitado
  lexicon: HALOT
  rationale: תֵבֵל suele designar el mundo ordenado o habitado. «El mundo» reproduce bien la amplitud cósmica del hebreo; «la tierra» quedaría más cerca del griego paralelo, pero el auditorio POB ya documenta esa tensión.
- source_word: בְּהַבִּיטוֹ אֲלֵיהֶם
  english_pob_choice: when he looks at them
  chosen_spanish: cuando él los mira
  alternatives_spanish:
  - cuando los contempla
  - al mirarlos
  lexicon: HALOT
  rationale: El hebreo tiene una cláusula temporal con sujeto implícito; en español, «cuando él los mira» conserva la misma relación temporal y mantiene al sujeto divino implícito, sin explicitar «Dios» donde el texto no lo nombra.
- source_word: רַעַשׁ
  english_pob_choice: with trembling
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - se agitan
  lexicon: HALOT
  rationale: El sustantivo רַעַשׁ intensifica la reacción sísmica. Dado que el verbo ya expresa la sacudida, la revisión inglesa eliminó la expansión redundante; en español, «tiemblan» resume naturalmente la acción resultante.
- source_word: יִרְעָשׁוּ
  english_pob_choice: they quake
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - se sacuden
  lexicon: HALOT
  rationale: רעש aquí describe un temblor o sacudida fuerte. «Tiemblan» es idiomático y conserva la imagen de conmoción física, en línea con el griego συνσείονται.
theological_decisions:
- issue: Sujeto divino implícito en «cuando él los mira»
  english_pob_reading: The subject is rendered as lowercase 'he' rather than explicitly naming God.
  chosen_spanish_reading: Se conserva el sujeto implícito con «él», sin nombrar a Dios explícitamente.
  alternative_spanish_readings:
  - cuando Dios los mira
  - al mirarlos, Dios los hace temblar
  rationale: El hebreo y el contexto sugieren a Dios como sujeto, pero el enunciado original no lo formula de modo explícito. Mantener «él» preserva la economía del texto y evita resolver una tensión que el original deja implícita.
  doctrine_reference: Primacía del texto original y preservación de la ambigüedad/sutileza literaria.
- issue: Tensión textual entre «el mundo» y el griego «la tierra»
  english_pob_reading: Hebrew 'the foundations of the world'; the Greek parallel reads 'the foundations of the earth.'
  chosen_spanish_reading: «cimientos del mundo» en el texto principal, con nota sobre la variante griega «la tierra».
  alternative_spanish_readings:
  - cimientos de la tierra
  - fundamentos de la tierra
  rationale: El hebreo testimoniado por Kahana usa תֵבֵל ('mundo'), mientras el paralelo griego tiene γῆ ('tierra'). En español, «mundo» refleja mejor el hebreo principal, y la nota preserva la variante significativa del griego sin ocultarla.
  doctrine_reference: Crítica textual comparada y transparencia documental.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés que eliminó la expansión redundante «with trembling», de modo que el español evita añadir un adverbio o complemento equivalente y deja que el verbo «tiemblan» cargue la idea de la sacudida.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto solo cuando el nombre divino aparece explícitamente; aquí el sujeto está implícito, por eso se mantiene «él».
  - Se prefirió «montes» sobre «montañas» por registro poético bíblico y por la solidez de la pareja «picos / montes».
  - La nota a pie conserva la variante textual hebreo/griego sin introducirla en el cuerpo principal.
