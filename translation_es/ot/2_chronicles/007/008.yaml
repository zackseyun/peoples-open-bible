base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/007/008.yaml
  text: At that time Solomon kept the feast for seven days[a], and all Israel with him, a very great assembly[b], from Lebo-hamath to the Brook of Egypt.
  footnotes:
  - marker: a
    text: Or 'from the entrance of Hamath.' The Hebrew may be understood either as a place-name ('Lebo-hamath') or as a descriptive boundary expression.
    reason: alternative_reading
  - marker: b
    text: Or 'to the Wadi of Egypt.' The Hebrew word can denote a seasonal watercourse or brook rather than a major river.
    reason: lexical_alternative
