translation:
  language: es
  text: Iré a los hombres importantes y les hablaré, porque conocen el camino de Yahvé, la justicia[a] de su Dios. Pero ellos también, juntos, han roto el yugo; han arrancado las ataduras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio de su Dios» o «la ordenanza de su Dios». El hebreo puede referirse a justicia, juicio u ordenanza legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֲכָה לִּי
  english_pob_choice: I will go
  chosen_spanish: Iré
  alternatives_spanish:
  - Déjame ir
  - Iré para mí
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención decidida; en español, el futuro simple comunica bien resolución sin forzar una perífrasis artificial ni añadir matices no sustentados por el hebreo.
- source_word: הַגְּדֹלִים
  english_pob_choice: the great men
  chosen_spanish: los hombres importantes
  alternatives_spanish:
  - los grandes hombres
  - los principales
  - los líderes
  lexicon: HALOT
  rationale: En este contexto se trata de personas socialmente prominentes o poderosas. 'Hombres importantes' conserva esa fuerza social en español natural, sin convertir de forma demasiado interpretativa en 'líderes'.
- source_word: וַאֲדַבְּרָה אוֹתָם
  english_pob_choice: and speak to them
  chosen_spanish: y les hablaré
  alternatives_spanish:
  - y les hablaré directamente
  - y les hablaré a ellos
  lexicon: HALOT
  rationale: El verbo indica la intención de dirigirse a ellos; 'les hablaré' es una correspondencia natural y formal en español, manteniendo la directividad del texto.
- source_word: דֶּרֶךְ יְהוָה
  english_pob_choice: the way of Yahweh
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - la senda de Yahvé
  - el modo de obrar de Yahvé
  lexicon: HALOT
  rationale: '''Camino'' conserva el idiomatismo hebreo y su amplitud semántica de conducta, dirección o voluntad. No se reduce a una sola idea más estrecha.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en español como 'Yahvé', conforme al criterio POB para el Tetragrámaton, en lugar de ocultarlo con un sustituto titulado.
- source_word: מִשְׁפַּט אֱלֹהֵיהֶם
  english_pob_choice: the justice of their God
  chosen_spanish: la justicia de su Dios
  alternatives_spanish:
  - el juicio de su Dios
  - el decreto de su Dios
  - la ordenanza de su Dios
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar justicia, juicio u ordenanza legal. Aquí, en paralelo con 'el camino de Yahvé', 'la justicia de su Dios' conserva bien el sentido ético-jurídico sin resolver la tensión semántica hacia una sola opción estrecha.
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  - Ciertamente
  lexicon: HALOT
  rationale: Marca contraste adversativo fuerte. 'Pero' es la opción más natural y clara en español para introducir la oposición con lo anterior.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - todos juntos
  - de consuno
  lexicon: HALOT
  rationale: La idea es de acción colectiva. 'Juntos' comunica la fuerza del adverbio sin sonar forzado, y evita intensificar más de lo que el hebreo requiere.
- source_word: שָׁבְרוּ עֹל
  english_pob_choice: have broken the yoke
  chosen_spanish: han roto el yugo
  alternatives_spanish:
  - han quebrado el yugo
  - han destruido el yugo
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del 'yugo', que puede implicar restricción, obligación o sometimiento. 'Han roto' reproduce la imagen con claridad y sobriedad.
- source_word: נִתְּקוּ מוֹסֵרוֹת
  english_pob_choice: have torn off the bonds
  chosen_spanish: han arrancado las ataduras
  alternatives_spanish:
  - han roto las ligaduras
  - han desgarrado las cadenas
  - han desprendido las ataduras
  lexicon: HALOT
  rationale: מוֹסֵרוֹת son ataduras, ligaduras o bandas; 'ataduras' es un término amplio y fiel. 'Arrancado' refleja bien la violencia del verbo y mantiene la imagen de liberación/rebelión sin explicitarla demasiado.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto exige preservar el nombre personal divino en español. 'Yahvé' es la forma adoptada para el Tetragrámaton, evitando la sustitución por un título y manteniendo la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de מִשְׁפַּט en el paralelismo del versículo
  english_pob_reading: the justice of their God / judgment / ordinance
  chosen_spanish_reading: la justicia de su Dios
  alternative_spanish_readings:
  - el juicio de su Dios
  - la ordenanza de su Dios
  - el decreto de su Dios
  rationale: El término hebreo admite una gama de sentidos legales y éticos. En este paralelismo, 'justicia' conserva el campo semántico sin cerrar indebidamente la ambigüedad documentada por la POB inglesa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Metáfora del yugo y las ataduras
  english_pob_reading: Retain the metaphor of breaking the yoke and tearing off the bonds
  chosen_spanish_reading: Mantener la metáfora del yugo roto y las ataduras arrancadas
  alternative_spanish_readings:
  - Interpretarlo como rechazo de la ley de Dios
  - Interpretarlo como rechazo de la autoridad social
  rationale: El hebreo presenta imágenes concretas de ruptura y desatadura. La traducción española conserva esa imagen sin reinterpretarla, para no perder la tensión teológica y literaria del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió 'together' frente a 'all together'; por eso se traduce como 'juntos'. También se preserva la distinción auditada entre la referencia personal del Tetragrámaton y el sentido amplio de מִשְׁפַּט, sin estrecharlo a un solo matiz legal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, coherente con el estándar del proyecto.
  - Se prefirió 'hombres importantes' para הַגְּדֹלִים por su naturalidad en español y su valor social concreto.
  - Se conservaron las metáforas de 'yugo' y 'ataduras' sin explicarlas en el cuerpo del texto.
  - Se usó 'justicia' como término principal para מִשְׁפַּט, con nota alternativa para preservar la tensión lexical.
  - La puntuación y el registro buscan ser bíblicos y publicables en español moderno, sin arcaísmos innecesarios.
