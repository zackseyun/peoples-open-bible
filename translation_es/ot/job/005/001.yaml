    reason: lexical_alternative
  revision_rationale: Se ajusta קרא a una exhortación más neutra («Llama»), se reemplaza «los santos» por «los seres santos» para preservar mejor la transparencia de «holy ones» y evitar asociaciones doctrinales no deseadas en español, se mejora la naturalidad de תִּפְנֶה con «te dirigirás», y se corrige la nota para reflejar alternativas reales y la probable referencia a seres celestiales.
