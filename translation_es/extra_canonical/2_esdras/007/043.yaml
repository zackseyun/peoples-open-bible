translation:
  language: es
  text: de la gloria del Altísimo, por la cual todos comenzarán a ver lo que ha sido puesto delante de ellos. Un período
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: claritatis Altissimi
  english_pob_choice: of the glory of the Most High
  chosen_spanish: de la gloria del Altísimo
  alternatives_spanish:
  - de la claridad del Altísimo
  - de la esplendencia del Altísimo
  lexicon: claritas; Altissimus
  rationale: El latín claritatis puede abarcar 'gloria', 'esplendor' o 'claridad'. El POB inglés opta por 'glory', y en español 'gloria' conserva bien la dimensión de resplandor divino sin introducir una abstracción menos natural. 'Altísimo' corresponde de forma estable a Altissimus.
- source_word: unde omnes incipiant uidere
  english_pob_choice: by which all will begin to see
  chosen_spanish: por la cual todos comenzarán a ver
  alternatives_spanish:
  - por la cual todos empezarán a ver
  - mediante la cual todos comenzarán a ver
  lexicon: unde; incipiant videre
  rationale: '''Unde'' expresa medio o resultado: ''por la cual'' comunica la relación causal/instrumental con naturalidad en español. ''Incipiant'' pide un inicio real del acto de ver, por eso se mantiene ''comenzarán a ver''.'
- source_word: quae anteposita sunt
  english_pob_choice: what has been set before them
  chosen_spanish: lo que ha sido puesto delante de ellos
  alternatives_spanish:
  - lo que ha sido presentado delante de ellos
  - lo que está puesto delante de ellos
  lexicon: quae anteposita sunt
  rationale: '''Anteposita sunt'' significa literalmente ''puesto delante/colocado delante''. ''Puesto delante de ellos'' conserva la imagen espacial y evita suavizarla a una mera idea de presentación.'
- source_word: Spatium
  english_pob_choice: A period
  chosen_spanish: Un período
  alternatives_spanish:
  - Una duración
  - Un lapso
  lexicon: spatium
  rationale: Aquí el término inicia una nueva unidad temporal. 'Período' es la forma más sobria y publicable en español para el arranque del sintagma temporal sin añadir una precisión que el fragmento latino aún no completa.
theological_decisions:
- issue: Imagen de revelación escatológica mediante la gloria del Altísimo
  english_pob_reading: of the glory of the Most High, by which all will begin to see what has been set before them
  chosen_spanish_reading: de la gloria del Altísimo, por la cual todos comenzarán a ver lo que ha sido puesto delante de ellos
  alternative_spanish_readings:
  - de la gloria del Altísimo, mediante la cual todos empezarán a ver lo que les ha sido puesto delante
  rationale: El texto latino presenta la gloria del Altísimo como medio de revelación, no como mero atributo abstracto. La traducción conserva esa función reveladora sin desarrollar más de lo que el fragmento permite.
  doctrine_reference: Apocalíptica / revelación divina
translation_notes:
  revision_awareness: La revisión más reciente corrigió un borrador ajeno al latín y estableció que claritatis Altissimi = 'of the glory of the Most High', unde omnes incipiant uidere = 'by which all will begin to see', quae anteposita sunt = 'what has been set before them', y Spatium = 'A period'. Esta versión sigue ese mapeo y evita la antigua lectura aproximativa de 'about'.
  spanish_consistency_notes:
  - Se preserva 'Altísimo' para Altissimus, en línea con el uso español habitual y con la preferencia de no ocultar el referente divino.
  - '''Gloria'' se mantiene como el equivalente principal de claritas en este contexto, siguiendo la decisión inglesa auditada.'
  - No se añadió una equivalencia temporal completa para Spatium, porque el fragmento latino disponible es incompleto; se deja como arranque nominal con 'Un período'.
