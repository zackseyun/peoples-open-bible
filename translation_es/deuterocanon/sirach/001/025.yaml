revisions:
- from: Los ángeles de Dios se alegrarán en ella[a], y proclamarán toda la alabanza de Yahvé[b].
  to: Si deseas la sabiduría[a], guarda los mandamientos, y el Señor te la concederá[b].
  rationale: Se reemplaza el borrador porque no refleja la lectura fuente adoptada por el expediente de POB. La versión revisada sigue el griego paralelo, conserva la personificación femenina de la sabiduría con 'la', usa 'guarda los mandamientos' por fidelidad bíblica natural en español, y mantiene 'el Señor' para κύριος dado que la fuente inmediata aquí es griega, no una mención directa del Tetragrámaton.
