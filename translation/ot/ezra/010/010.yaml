theological_decisions:
- issue: Corporate covenantal culpability
  chosen_reading: adding to the guilt of Israel
  alternative_readings:
  - increasing Israel's trespass
  - adding to Israel's guilt
  rationale: The verse frames the offense not merely as private misconduct but as increasing the covenant community's guilt. The translation preserves this corporate theological dimension without expanding it beyond the Hebrew wording.
  doctrine_reference: Translation philosophy §3, §5
