translation:
  language: es
  text: 'El ojo que se burla de un padre y desprecia la obediencia[a] a una madre: los cuervos del valle[b] le sacarán el ojo, y las crías del águila[c] lo comerán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el mandato”, “la instrucción” o “la atención debida” de una madre; el raro término hebreo probablemente se refiere a la obediencia o atención filial que se le debe.
    reason: lexical_alternative
  - marker: b
    text: Hebreo “cuervos del valle”; נַחַל también puede entenderse como “wadi” o “cauce de torrente”.
    reason: lexical_alternative
  - marker: c
    text: Hebreo נָשֶׁר puede referirse a un águila o a un buitre; aquí se conserva la forma tradicional “águila”.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  english_pob_choice: The eye
  chosen_spanish: El ojo
  alternatives_spanish:
  - Un ojo
  lexicon: HALOT
  rationale: Mantengo el sujeto proverbial singular con artículo definido, como en el inglés auditado, porque introduce naturalmente al agente del dicho y suena idiomático en español.
- source_word: תִּלְעַג
  english_pob_choice: mocks
  chosen_spanish: se burla de
  alternatives_spanish:
  - mofa de
  - escarnece de
  lexicon: HALOT
  rationale: לעג expresa burla despectiva; 'se burla de' comunica con claridad el desprecio activo sin endurecer innecesariamente el registro.
- source_word: לְאָב
  english_pob_choice: a father
  chosen_spanish: de un padre
  alternatives_spanish:
  - de su padre
  - de un padre cualquiera
  lexicon: HALOT
  rationale: El hebreo no marca posesivo explícito. Conservo el valor proverbial general con 'de un padre', evitando añadir 'su' sin base textual.
- source_word: וְתָבוּז
  english_pob_choice: and despises
  chosen_spanish: y desprecia
  alternatives_spanish:
  - y desdeña
  - y tiene en poco
  lexicon: HALOT
  rationale: בוז denota menosprecio. 'Desprecia' es una equivalencia directa, clara y solemne en español.
- source_word: לִיקֲּהַת אֵם
  english_pob_choice: obedience to a mother
  chosen_spanish: la obediencia a una madre
  alternatives_spanish:
  - la instrucción de una madre
  - el mandato de una madre
  - la atención debida a una madre
  lexicon: HALOT
  rationale: 'Sigo la decisión auditada del inglés: la expresión rara probablemente apunta a la respuesta filial debida a la madre. ''La obediencia'' preserva el sentido práctico y evita sobreespecificar más de lo que el hebreo garantiza.'
- source_word: עֹרְבֵי נַחַל
  english_pob_choice: ravens of the valley
  chosen_spanish: los cuervos del valle
  alternatives_spanish:
  - los cuervos del wadi
  - los cuervos del torrente
  lexicon: HALOT
  rationale: עֹרְבֵי es 'cuervos'; נַחַל puede ser valle, wadi o cauce de torrente. 'Valle' mantiene la imagen accesible en español y sigue el criterio auditado del inglés.
- source_word: יִקְּרוּהָ
  english_pob_choice: will peck it out
  chosen_spanish: lo arrancarán
  alternatives_spanish:
  - lo picotearán hasta sacarlo
  - le sacarán el ojo
  lexicon: HALOT
  rationale: El verbo נקר describe a las aves picando/sacando el ojo. 'Lo arrancarán' conserva la violencia de la imagen sin sonar torpe en español. El objeto 'lo' se refiere al ojo mencionado al inicio.
- source_word: בְנֵי נָשֶׁר
  english_pob_choice: the young of the eagle
  chosen_spanish: los hijos del águila
  alternatives_spanish:
  - las crías del águila
  - los aguiluchos
  - los hijos del buitre
  lexicon: HALOT
  rationale: נֶשֶׁר puede designar águila o buitre, pero el audit trail inglés conserva 'eagle' por tradición. 'Hijos del águila' reproduce de cerca la construcción hebrea בְנֵי y mantiene la ambigüedad zoológica sin resolverla en exceso.
theological_decisions:
- issue: Referencia filial y ética de honra/desprecio
  english_pob_reading: A proverb about contempt for father and mother, with a rare term describing what is owed to the mother.
  chosen_spanish_reading: Un proverbio sobre la burla al padre y el desprecio de la obediencia debida a la madre.
  alternative_spanish_readings:
  - el mandato de una madre
  - la instrucción de una madre
  - la autoridad de una madre
  rationale: 'No hay una cuestión doctrinal compleja, pero sí una tensión léxica importante: יקהת es raro y el inglés POB opta por ''obedience''. En español mantengo esa lectura sin domesticarla a una formulación más amplia, porque el proverbio contrasta deshonra filial con la conducta que se debe a la madre.'
  doctrine_reference: Éxodo 20:12; Proverbios 1:8; 6:20
translation_notes:
  revision_awareness: 'El inglés POB fue revisado mínimamente para mayor naturalidad: se añadió el artículo antes de ''ravens'' y se mantuvo el resto del verso sin cambios sustanciales. La versión española sigue esa línea de precisión y conserva las mismas decisiones léxicas claves, especialmente la lectura de יקהת y la ambigüedad de נַחַל y נָשֶׁר.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'SEÑOR' porque no aparece en el texto fuente.
  - Se conserva el paralelismo proverbial con dos miembros negativos y dos sanciones aviarias, sin expandirlo interpretativamente.
  - '''Hijos del águila'' refleja la construcción hebrea literal y preserva la nota de ambigüedad zoológica documentada en el inglés auditado.'
