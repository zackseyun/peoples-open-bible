  text: לֹ֥א תִשָּׂ֖א שֵׁ֣מַע שָׁ֑וְא אַל תָּ֤שֶׁת יָֽדְ/ךָ֙ עִם רָשָׁ֔ע לִ/הְיֹ֖ת עֵ֥ד חָמָֽס־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/exodus/023/001.yaml
  text: You shall not spread a false report[b][a]. Do not join hands with a wicked man to be a malicious witness.
  footnotes:
  - marker: a
    text: Or 'carry/bear a false report.' The Hebrew verb is literally 'lift/carry,' here used for circulating a report.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not put your hand with a wicked man to be a malicious witness.' The Hebrew idiom is literally 'put your hand with,' and 'violent witness' may also be understood as 'malicious' or 'unjust' witness in this legal context.
    reason: lexical_alternative
