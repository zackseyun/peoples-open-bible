id: PHP.1.22
reference: Philippians 1:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ δὲ τὸ ζῆν ἐν σαρκί, τοῦτό μοι καρπὸς ἔργου— καὶ τί αἱρήσομαι οὐ γνωρίζω·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/022.yaml
  text: But if to go on living in the flesh means fruitful labor for me, yet which I will choose I do not know.
translation:
  language: ko
  text: 그러나 육신 가운데 계속 사는 것[a]이 내게 결실 있는 수고[b]를 의미한다면 — 그러나 어느 쪽을 택할지 나는 알지 못합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「몸 안에서 사는 것」. 헬라어 σάρξ는 이 문맥에서 도덕적 「죄성」이 아니라 육체적 지상 생애를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「수고의 열매」 또는 「결실 있는 일」. 헬라어 καρπὸς ἔργου는 압축된 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ζῆν
  english_pob_choice: to go on living
  chosen_korean: 계속 사는 것
  alternatives_korean:
  - 사는 것
  - 살아가는 것
  lexicon: BDAG
  rationale: 관사 부정사가 현재 상황에서의 지속적 삶을 가리킨다. 「계속 사는 것」이 지속성을 자연스럽게 표현한다.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_korean: 육신 가운데
  alternatives_korean:
  - 몸 안에서
  - 육체로
  lexicon: BDAG
  rationale: σάρξ는 본 문맥에서 도덕적 「죄성」이 아니라 육체적 지상 생애를 가리킨다. 「육신 가운데」가 한국어 성서 어법에서 정착되었으며, 바울의 어휘를 보존한다.
- source_word: καρπὸς ἔργου
  english_pob_choice: fruitful labor
  chosen_korean: 결실 있는 수고
  alternatives_korean:
  - 수고의 열매
  - 결실 있는 일
  lexicon: BDAG
  rationale: 압축된 헬라어 표현을 「결실 있는 수고」로 풀어 사역적 결실의 함의를 살린다.
- source_word: αἱρήσομαι
  english_pob_choice: I will choose
  chosen_korean: 택할지
  alternatives_korean:
  - 선택할지
  - 고를지
  lexicon: BDAG
  rationale: αἱρέομαι는 두 가능성 중 선택을 가리킨다. 「택할지」가 자연스럽다.
- source_word: οὐ γνωρίζω
  english_pob_choice: I do not know
  chosen_korean: 알지 못합니다
  alternatives_korean:
  - 모릅니다
  - 알 수 없습니다
  lexicon: BDAG
  rationale: γνωρίζω가 본래 「알리다」이나 이 문맥에서는 부정과 결합되어 「알지 못함」을 표현한다. 영어 POB의 결정을 따른다.
theological_decisions:
- issue: σάρξ의 의미 — 본 절에서
  chosen_reading: 육체적 지상 생애 (육신 가운데)
  alternative_readings:
  - 죄성 (도덕적)
  rationale: 본 절은 메시아와 함께 있기 위해 떠나는 것과 지상 생애의 지속을 대조한다. 따라서 σάρξ는 도덕적 부패가 아니라 육체적 실존을 가리킨다.
  doctrine_reference: 'Contested terms: σάρξ = 육신 (literal) / 죄성 (metaphorical)'
