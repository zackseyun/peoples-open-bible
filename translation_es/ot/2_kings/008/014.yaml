translation:
  language: es
  text: 'Entonces se alejó de Eliseo y fue a su amo, quien le dijo: «¿Qué te dijo Eliseo?». Y él respondió: «Me dijo: “Seguramente te recuperarás[a]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente vivirás». El hebreo repite literalmente el verbo para dar énfasis: «viviendo, vivirás». En este contexto, la expresión se refiere a recuperarse de la enfermedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went away
  chosen_spanish: se alejó
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: הלך en la forma narrativa avanza la acción. «Se alejó» comunica bien el movimiento de salida desde Eliseo sin sonar forzado en español, y refleja el matiz de separación que el inglés POB expresó con “went away”.
- source_word: מֵאֵת אֱלִישָׁע
  english_pob_choice: from Elisha
  chosen_spanish: de Eliseo
  alternatives_spanish:
  - desde Eliseo
  - alejado de Eliseo
  lexicon: HALOT
  rationale: מֵאֵת marca separación o procedencia. En español, «de Eliseo» es la forma más natural y directa; el matiz de alejamiento ya queda indicado por «se alejó».
- source_word: וַיָּבֹא אֶל אֲדֹנָיו
  english_pob_choice: came to his master
  chosen_spanish: fue a su señor
  alternatives_spanish:
  - fue a su amo
  - fue a su dueño
  lexicon: HALOT
  rationale: בוא + אֶל expresa llegada a una persona. Aquí אֲדֹנָיו se refiere al superior humano de Hazael, no a un título divino. «Señor» mantiene la relación de superioridad señalada por el hebreo y evita imponer una lectura distinta del contexto cortesano.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su superior
  lexicon: HALOT
  rationale: Aunque el sustantivo procede de אדון, aquí designa a un superior humano. «Señor» es fiel al valor relacional del término en un contexto de corte; «amo» es posible, pero suena más duro en español y puede desentonar con el registro narrativo.
- source_word: מָה אָמַר לְךָ אֱלִישָׁע
  english_pob_choice: What did Elisha say to you?
  chosen_spanish: ¿Qué te dijo Eliseo?
  alternatives_spanish:
  - ¿Qué dijo Eliseo a ti?
  - ¿Qué te ha dicho Eliseo?
  lexicon: HALOT
  rationale: La pregunta hebrea se expresa naturalmente con pasado simple en español. «¿Qué te dijo Eliseo?» preserva el contenido interrogativo sin añadir elementos interpretativos.
- source_word: אָמַר לִי
  english_pob_choice: He told me
  chosen_spanish: Me dijo
  alternatives_spanish:
  - Me habló y dijo
  - Me respondió
  lexicon: HALOT
  rationale: אָמַר con objeto indirecto puede traducirse de manera natural como «me dijo». Es una opción directa y fiel, equivalente al inglés POB «He told me».
- source_word: חָיֹה תִחְיֶה
  english_pob_choice: You will surely recover
  chosen_spanish: Ciertamente sanarás
  alternatives_spanish:
  - Seguramente vivirás
  - Vivirás ciertamente
  lexicon: HALOT
  rationale: 'La construcción infinitivo absoluto + imperfecto intensifica la afirmación: «seguramente/ciertamente». En este contexto de enfermedad, «sanarás» expresa mejor la intención comunicativa que un literal «vivirás», sin borrar la fuerza enfática del hebreo.'
theological_decisions:
- issue: Sentido de חָיֹה תִחְיֶה en contexto de enfermedad
  english_pob_reading: You will surely recover
  chosen_spanish_reading: Ciertamente sanarás
  alternative_spanish_readings:
  - Ciertamente vivirás
  - Seguramente te recuperarás
  rationale: El hebreo literalmente repite la raíz de vivir para intensificar. El POB inglés optó por «recover» por el contexto de la enfermedad. En español, «sanarás» comunica con más claridad ese mismo sentido contextual, sin negar la literalidad subyacente que se mantiene en la nota.
  doctrine_reference: 'Principio de equivalencia óptima: conservar la intensificación hebrea y expresar en español el sentido contextual más claro.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió «surely recover» sobre «certainly recover» para un tono ligeramente más formal y directo. La redacción española sigue ese ajuste al usar «ciertamente» y una forma verbal natural para el contexto de enfermedad.
  spanish_consistency_notes:
  - Se mantiene «Eliseo» para el nombre propio con ortografía española estándar.
  - Se usó «se alejó» para reflejar la salida de la presencia de Eliseo y no un simple desplazamiento neutro.
  - «Señor» se emplea aquí en sentido social/cortesano, no como título divino.
  - La nota conserva la tensión entre el valor literal «vivir» y el sentido contextual de recuperación/sanidad.
