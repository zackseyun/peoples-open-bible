translation:
  language: es
  text: 'Entonces dije[a]: «¡Ah, Señor Yahvé! Ellos dicen de mí[b]: “¿No es él uno que habla en parábolas?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces dije: “¡Ah, Señor Yahvé! Ellos me dicen… ”»; el hebreo puede entenderse como lo que dicen acerca de Ezequiel o como lo que le dicen directamente.'
    reason: alternative_reading
  - marker: b
    text: Hebreo «mashal mashalim», literalmente, «uno que habla parábolas/proverbios»; la expresión también puede sugerir hablar en dichos figurados o enunciados enigmáticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Luego dije
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; «Entonces dije» conserva la secuencia con un español natural y digno.
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Aha!
  - ¡Ay!
  - ¡Alas!
  lexicon: HALOT
  rationale: Es una interjección de dolor o lamento; «¡Ah!» reproduce ese matiz con sobriedad en español moderno.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la combinación de título y nombre divino con el valor auditivo del texto hebreo, siguiendo el criterio del proyecto para יְהוָה como «Yahvé».
- source_word: הֵמָּה אֹמְרִים לִי
  english_pob_choice: They are saying of me
  chosen_spanish: Ellos están diciendo de mí
  alternatives_spanish:
  - Están diciendo de mí
  - Ellos me están diciendo
  lexicon: HALOT
  rationale: La construcción hebrea permite tanto «a mí» como «de mí» en el sentido de hablar acerca de alguien; se conserva la referencia a cómo lo caracterizan.
- source_word: הֲלֹא
  english_pob_choice: Is he not
  chosen_spanish: ¿No es él
  alternatives_spanish:
  - ¿No es así que él
  - ¿Acaso no es él
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento; «¿No es él…?» mantiene esa fuerza en español.
- source_word: מְמַשֵּׁל מְשָׁלִים
  english_pob_choice: a speaker of parables
  chosen_spanish: un hablador de parábolas
  alternatives_spanish:
  - un hablante de parábolas
  - uno que habla parábolas
  - un expositor de proverbios
  lexicon: HALOT
  rationale: El hebreo expresa un agente caracterizado por hablar mashalím; «hablador de parábolas» refleja el giro idiomático sin perder el tono formal ni convertirlo en una paráfrasis interpretativa.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese hombre
  - él mismo
  lexicon: HALOT
  rationale: El pronombre retoma a Ezequiel dentro de la cita reportada; «él» es la correspondencia directa y suficiente.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé
  rationale: El texto combina el título אדֹנָי con el nombre propio יְהוִה. En español, «Señor Yahvé» preserva esa distinción y sigue la convención del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue la revisión posterior que prefirió una fórmula más cercana al hebreo idiomático («speaker of parables») en lugar de una paráfrasis con sentido de intensidad o desprecio. Se incorporó esa preferencia al español con «hablador de parábolas».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה conforme al criterio del proyecto.
  - Se conserva un registro formal y profético, evitando el tono coloquial de «Aha» o traducciones explicativas excesivas.
  - Las comillas y signos de interrogación siguen la puntuación española estándar.
