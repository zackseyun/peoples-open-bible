  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Dios», «Nehemías» y «sacerdotes» están bien. La decisión «cuando agradó a Dios» es aceptable, aunque «cuando le pareció bien a Dios» reflejaría más de cerca ἔδοξεν; no es necesario forzar cambio por ello. El objeto implícito del participio y la finalidad de ἐπὶ τὸ πῦρ están bien explicitados en español.
