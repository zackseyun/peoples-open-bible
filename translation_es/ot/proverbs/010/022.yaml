translation:
  language: es
  text: La bendición de Yahvé enriquece, y no trae consigo dolor[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «y no añade dolor con ella». El hebreo tiene un verbo masculino singular (יוֹסִף), mientras que «bendición» es femenino; por eso la cláusula puede entenderse con un sujeto implícito («él») o como una formulación más fluida que toma «bendición» como referencia del sentido.
    reason: alternative_reading
  - marker: b
    text: «Dolor» también puede traducirse «pena», «aflicción» o «trabajo penoso».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּת
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición concedida
  - beneficio
  lexicon: HALOT
  rationale: 'El sustantivo en constructo expresa una bendición o beneficio otorgado. «Bendición» es el equivalente natural en español y conserva la relación posesiva: «la bendición de Yahvé».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, conforme al criterio del proyecto. «Yahvé» evita la sustitución por un título y mantiene la referencia personal del texto hebreo.
- source_word: תַעֲשִׁיר
  english_pob_choice: makes rich
  chosen_spanish: enriquece
  alternatives_spanish:
  - hace rico
  - da riqueza
  lexicon: HALOT
  rationale: 'El Hifil es causativo: «hacer rico» / «enriquecer». «Enriquece» comunica esa fuerza verbal en español con naturalidad y brevedad proverbial.'
- source_word: יוֹסִף
  english_pob_choice: it adds
  chosen_spanish: añade
  alternatives_spanish:
  - agrega
  - suma
  lexicon: HALOT
  rationale: 'El verbo es masculino singular en hebreo. En español, para no introducir un sujeto explícito no presente, se opta por una construcción impersonal natural: «no añade dolor». Esto conserva la tensión gramatical sin forzar un antecedente masculino.'
- source_word: עֶצֶב
  english_pob_choice: sorrow
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - aflicción
  - pesadumbre
  - trabajo penoso
  lexicon: HALOT
  rationale: El término puede abarcar dolor, pena, aflicción o fatiga penosa. «Dolor» es suficientemente amplio y claro en español, y permite que la cláusula mantenga su alcance proverbial.
- source_word: עִמָּהּ
  english_pob_choice: with it
  chosen_spanish: con ella
  alternatives_spanish:
  - junto con ella
  - con eso
  lexicon: HALOT
  rationale: El sufijo femenino singular retoma «bendición», que en español es femenino. «Con ella» refleja ese antecedente y evita neutralizar el género que sí está marcado en hebreo.
theological_decisions:
- issue: Tensión gramatical entre el sujeto femenino implícito de «bendición» y el verbo masculino singular יוֹסִף
  english_pob_reading: The clause was revised in English from 'he adds' to 'it adds' to avoid introducing an ambiguous masculine subject, while still noting the Hebrew ambiguity.
  chosen_spanish_reading: «y no añade dolor con ella» como construcción impersonal natural que no explicita sujeto alguno y permite que el lector perciba la relación con la bendición.
  alternative_spanish_readings:
  - «y ella no añade dolor con ella»
  - «y él no añade dolor con ella»
  - «y no se le añade dolor»
  rationale: 'En español, la opción más fiel y natural es evitar un sujeto explícito inexistente en el texto. Así se conserva la tensión del hebreo: el verbo es 3ms, pero el referente inmediato es la bendición femenina. La formulación no resuelve de manera artificial la ambigüedad.'
  doctrine_reference: Preservar la tensión gramatical documentada del versículo; no armonizarla sin base textual.
translation_notes:
  revision_awareness: 'La traducción sigue el estado revisado más reciente del POB inglés, que cambió «he adds» por «it adds» para evitar introducir un sujeto masculino ambiguo. En español, esto se refleja mejor con una impersonalidad natural: «no añade dolor con ella».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el nombre divino, conforme al estándar del proyecto.
  - Se prefirió «bendición» y no «bendición-gift» o «beneficio», porque el contexto proverbial admite el valor clásico de bendición sin pérdida de precisión.
  - «Dolor» se usa como equivalente amplio de עֶצֶב, dejando abiertas las posibles connotaciones de pena, aflicción o fatiga.
  - La nota al pie preserva la ambigüedad gramatical del hebreo sin introducir una lectura doctrinal o interpretativa adicional.
