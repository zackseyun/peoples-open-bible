translation:
  language: es
  text: ¿Dónde están los dioses de Hamat y de Arpad? ¿Dónde están los dioses de Sefarvaim? ¿Y han librado a Samaria de mi mano?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rescataron' o 'salvaron' para 'libraron'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están
  alternatives_spanish:
  - ¿Dónde está
  - ¿En dónde están
  lexicon: HALOT
  rationale: Es una interrogativa de localización. En español, el plural concuerda naturalmente con el sujeto plural 'los dioses', manteniendo el tono desafiante del hebreo.
- source_word: אֱלֹהֵי
  english_pob_choice: the gods of
  chosen_spanish: los dioses de
  alternatives_spanish:
  - los dioses de los
  - las deidades de
  lexicon: HALOT
  rationale: El constructo plural con nombres de lugar exige en español una forma explícita y natural. 'Los dioses de' conserva el valor idolátrico y polémico del texto.
- source_word: חֲמָת וְאַרְפָּד
  english_pob_choice: Hamath and Arpad
  chosen_spanish: Hamat y de Arpad
  alternatives_spanish:
  - Jamat y de Arpad
  - Hamath y Arpad
  lexicon: HALOT
  rationale: 'Se conservan los topónimos como transliteraciones. El segundo ''de'' se omite en el hebreo por el enlace coordinado; en español conviene repetirlo para fluidez: ''de Hamat y de Arpad''.'
- source_word: סְפַרְוָיִם
  english_pob_choice: Sepharvaim
  chosen_spanish: Sefarvaim
  alternatives_spanish:
  - Sefarvaim
  - Sepharváim
  lexicon: HALOT
  rationale: Se adopta una transliteración española estable y legible, cercana a la forma inglesa auditada, sin mecanizarla.
- source_word: וְכִי
  english_pob_choice: And have
  chosen_spanish: ¿Y acaso
  alternatives_spanish:
  - ¿Y han
  - ¿Y realmente
  lexicon: HALOT
  rationale: En esta pregunta retórica, la partícula introduce el desafío culminante. '¿Y acaso' preserva la fuerza interrogativa y el matiz polémico sin volverlo demasiado rígido.
- source_word: הִצִּילוּ
  english_pob_choice: delivered
  chosen_spanish: libraron
  alternatives_spanish:
  - rescataron
  - salvaron
  - delivraron
  lexicon: HALOT
  rationale: El verbo הִצִּילוּ puede ser 'rescatar/salvar/librar'. 'Libraron' funciona bien en este contexto militar y de derrota nacional, preservando la fuerza de 'deliver' del audit trail.
- source_word: אֶת שֹׁמְר֖וֹן
  english_pob_choice: Samaria
  chosen_spanish: a Samaria
  alternatives_spanish:
  - a la ciudad de Samaria
  - a Samaria misma
  lexicon: HALOT
  rationale: El marcador de objeto no se traduce. Se mantiene el nombre propio reconocido en español, sin añadir explicaciones que el hebreo no exige.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - de mi dominio
  lexicon: HALOT
  rationale: Se conserva la imagen corporal y política del hebreo. 'De mi mano' es idiomático en español y mantiene la arrogancia del hablante, como en el texto auditado.
theological_decisions:
- issue: Referencia de 'mi mano' en la burla del emisario asirio
  english_pob_reading: Retain first-person boast without interpretive qualification
  chosen_spanish_reading: Conservar el desafío en primera persona sin aclaraciones interpretativas
  alternative_spanish_readings:
  - de la mano del rey asirio
  - de su poder
  rationale: El hebreo presenta la burla tal como la pronuncia el hablante. La traducción española mantiene la misma tensión retórica y no introduce una identificación explicativa que el texto no exige.
  doctrine_reference: Primacía del texto original; conservar la tensión literaria y teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la propuesta española sigue esa lectura estable, conservando la misma fuerza retórica y la misma ambigüedad léxica principal en הִצִּילוּ.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene 'Samaria' como topónimo bíblico estándar en español.
  - Se evita 'SEÑOR' porque no corresponde al pasaje.
  - La puntuación reproduce el paralelismo de dos preguntas y una pregunta final desafiante.
