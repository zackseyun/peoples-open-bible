  to: Tres copas en forma de flor de almendro[a] había en una rama, con bulbo[b] y flor; y tres copas en forma de flor de almendro había en una rama, con bulbo[b] y flor. Así era en las seis ramas que salían del candelabro.
  rationale: Se corrige el término clave כַּפְתֹּר a «bulbo» para preservar la decisión léxica del POB y el sentido del hebreo. Se elimina la nota innecesaria sobre «rama/brazo» y se repone la nota léxica pertinente sobre la alternativa «botón». Se mantiene la estructura repetitiva del versículo y un español claro y digno.
