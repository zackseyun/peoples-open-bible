translation:
  language: es
  text: El rey de Babilonia ha oído la noticia[a] sobre ellos, y se le han aflojado las manos; la angustia se ha apoderado de él, angustia como la de una mujer en parto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el informe acerca de ellos». El sustantivo hebreo puede traducirse más literalmente como «su noticia», pero en contexto se refiere a la noticia sobre el ejército invasor.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - oyeron
  - ha escuchado
  lexicon: HALOT
  rationale: El verbo שׁמע aquí se refiere a recibir una noticia. En español, «ha oído» comunica bien la acción completada con efecto presente, sin forzar un calco de «escuchar» que sonarí a más activo o intencional de lo que exige el contexto.
- source_word: מֶֽלֶךְ בָּבֶ֛ל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  - el rey de Babilonia
  lexicon: HALOT
  rationale: La construcción posesiva es directa; «el rey de Babilonia» es natural y fiel. Se conserva el referente político-geográfico sin añadir matices no presentes en el hebreo.
- source_word: שִׁמְעָם
  english_pob_choice: the report about them
  chosen_spanish: la noticia sobre ellos
  alternatives_spanish:
  - su noticia
  - la noticia de ellos
  - el informe sobre ellos
  lexicon: HALOT
  rationale: El sustantivo derivado de שמע puede significar noticia, informe o rumor. En este contexto, el sufijo pronominal no indica que la noticia provenga de ellos, sino que trata acerca de ellos; por eso «sobre ellos» preserva la relación semántica aclarada en el audit trail inglés.
- source_word: וְרָפוּ יָדָיו
  english_pob_choice: his hands have gone limp
  chosen_spanish: se le han aflojado las manos
  alternatives_spanish:
  - le han quedado flácidas las manos
  - sus manos se han debilitado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe pérdida de fuerza o ánimo. «Se le han aflojado las manos» mantiene la imagen corporal y sugiere bien la parálisis del temor, sin volverla demasiado interpretativa.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: la angustia
  alternatives_spanish:
  - la aflicción
  - la tribulación
  - el apuro
  lexicon: HALOT
  rationale: Aquí צָרָה expresa presión dolorosa y amenaza intensa. «Angustia» encaja con el paralelo inmediato y con el tono emocional del versículo; evita la suavización de «problema» o «trouble».
- source_word: הֶחֱזִיקַתְהוּ
  english_pob_choice: has seized him
  chosen_spanish: lo ha agarrado
  alternatives_spanish:
  - lo ha tomado
  - lo ha apresado
  - lo ha sujetado
  lexicon: HALOT
  rationale: El hiphil de חזק expresa tomar por la fuerza, dominar o apoderarse de alguien. «Ha agarrado» conserva la fuerza de aprehensión con un verbo natural en español; se mantiene la idea de ser vencido por la angustia.
- source_word: חִיל
  english_pob_choice: anguish
  chosen_spanish: dolor
  alternatives_spanish:
  - retorcimiento
  - temblor
  - angustia
  lexicon: HALOT
  rationale: Aunque HALOT admite matices de estremecimiento, retorcimiento y dolor, en este versículo el término se coordina con la comparación del parto. «Dolor» permite mantener la intensidad sin duplicar exactamente «angustia», y deja visible el componente físico del sufrimiento.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman in labor
  chosen_spanish: como de mujer en parto
  alternatives_spanish:
  - como una mujer en labor de parto
  - como una mujer que da a luz
  lexicon: HALOT
  rationale: La comparación remite al dolor del alumbramiento. «Como de mujer en parto» es una forma compacta y reverente en español bíblico actual; conserva la imagen sin convertirla en paráfrasis explicativa.
theological_decisions:
- issue: Metáfora de debilidad y terror en el rey de Babilonia
  english_pob_reading: his hands have gone limp; distress has seized him
  chosen_spanish_reading: se le han aflojado las manos; la angustia lo ha agarrado
  alternative_spanish_readings:
  - sus manos se han debilitado; la angustia lo ha tomado
  - se le han quedado sin fuerza las manos; la angustia lo ha sujetado
  rationale: Se conserva la metáfora física de manos debilitadas como señal de pánico o falta de resolución. No se espiritualiza ni se moraliza el cuadro; el texto presenta una reacción de derrota ante el juicio anunciado.
  doctrine_reference: Jeremías 50:43; cf. Is 13:7-8 por el lenguaje de terror ante el día de Yahvé
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: שמע como recepción de noticia, el giro idiomático de «manos aflojadas», חזק como aprehensión violenta, y חִיל más la comparación con una mujer en parto como culminación del cuadro de angustia. No se detectaron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece explícitamente.
  - Se mantiene «Babilonia» y no «Babilón» para concordancia con el uso bíblico español contemporáneo del proyecto.
  - La nota a cubre la ambigüedad de שִׁמְעָם sin repetir innecesariamente el término técnico en el cuerpo del texto.
