    text: O 'por sangre humana'. El hebreo dice literalmente 'por la sangre del hombre', con 'hombre' en sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: O 'te abrumará'. El hebreo dice literalmente 'te cubrirá', preservando la imagen de ser cubierto o sobrecogido por el juicio.
    reason: lexical_alternative
  revision_rationale: Se corrigieron las notas para que coincidan con los anclajes y con el audit trail del POB inglés; se eliminó la nota redundante sobre 'Líbano'; se mejoró 'por la sangre de hombre' a 'por la sangre del hombre' para un español natural que conserve el singular representativo; y se ajustó 'violencia contra la tierra' a 'violencia hecha a la tierra' para reflejar mejor el sentido victimario explicitado por la rationale inglesa.
