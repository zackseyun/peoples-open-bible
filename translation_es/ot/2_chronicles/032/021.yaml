base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/021.yaml
  text: And Yahweh sent an angel[a], who wiped out every mighty warrior, leader, and commander in the camp of the king of Assyria. So he returned to his own land with shame on his face. And when he entered the house of his god[b], some of those who came from his own body struck him down there with the sword.
  footnotes:
  - marker: a
    text: Or 'a messenger.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who came out from his own inward parts'; compare 2 Kings 19:37, which specifies that they were his sons.
    reason: cross_reference
