translation:
  language: es
  text: Porque los muertos ya habían caído amontonados unos sobre otros[a], él se puso en medio y contuvo la ira, y cortó el camino hacia los vivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «poniéndose entre ellos, contuvo la ira y cortó el camino hacia los vivos»; o «... y cerró el paso hacia los vivos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σωρηδόν
  english_pob_choice: in heaps
  chosen_spanish: en montones
  alternatives_spanish:
  - en pilas
  - amontonados
  lexicon: LSJ
  rationale: El adverbio expresa la acumulación de cadáveres. «En montones» conserva la imagen física y suena natural en español bíblico contemporáneo.
- source_word: πεπτωκότων
  english_pob_choice: had already fallen
  chosen_spanish: ya habían caído
  alternatives_spanish:
  - habían caído
  - ya estaban caídos
  lexicon: LSJ
  rationale: El participio perfecto indica un estado resultante de una caída previa. «Ya habían caído» preserva esa anterioridad sin sonar rígido.
- source_word: ἐπʼ ἀλλήλων
  english_pob_choice: one upon another
  chosen_spanish: unos sobre otros
  alternatives_spanish:
  - uno sobre otro
  - sobrepuestos unos a otros
  lexicon: LSJ
  rationale: La expresión describe cuerpos apilados. «Unos sobre otros» transmite la relación recíproca de forma idiomática en español.
- source_word: μεταξὺ στὰς
  english_pob_choice: he stood in the midst
  chosen_spanish: se puso en medio
  alternatives_spanish:
  - estuvo en medio
  - se colocó entre ellos
  lexicon: LSJ
  rationale: El participio con μεταξὺ comunica una posición interpuesta. «Se puso en medio» mantiene la función mediadora y resulta más natural que una calca.
- source_word: ἀνέκοψεν
  english_pob_choice: checked
  chosen_spanish: contuvo
  alternatives_spanish:
  - detuvo
  - reprimió
  - retuvo
  lexicon: LSJ
  rationale: El verbo significa frenar o hacer retroceder. «Contuvo» conserva la idea de detener una fuerza en curso sin añadir más de lo que el griego permite.
- source_word: τὴν ὀργήν
  english_pob_choice: the wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  lexicon: LSJ
  rationale: Aunque el contexto es de juicio divino, en español «ira» comunica la fuerza del término con dignidad y evita un tecnicismo innecesario. Se conserva la tensión entre emoción e ինտensidad punitiva del contexto.
- source_word: διέσχισεν
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - separó
  - abrió paso cortando
  - partió
  lexicon: LSJ
  rationale: El verbo literalmente expresa una acción de división o corte. «Cortó» mantiene la imagen de interrupción del avance de la muerte/ira con sobriedad.
- source_word: τὴν πρὸς τοὺς ζῶντας ὁδόν
  english_pob_choice: the way to the living
  chosen_spanish: el camino hacia los vivos
  alternatives_spanish:
  - la vía a los vivos
  - la ruta hacia los vivos
  - el camino a los vivos
  lexicon: LSJ
  rationale: «Camino hacia los vivos» conserva la metáfora espacial y el contraste con los muertos. «Hacia» refleja bien la dirección implícita en πρὸς.
theological_decisions:
- issue: Sujeto implícito en la acción mediadora
  english_pob_reading: Retain the pronoun 'he' without supplying the name in the verse itself.
  chosen_spanish_reading: Mantener el pronombre implícito con «él», sin añadir el nombre en el texto principal.
  alternative_spanish_readings:
  - él, de pie entre ellos
  - Aarón se puso en medio
  rationale: El griego no nombra al sujeto en este verso; el contexto inmediato lo recupera. Mantener «él» respeta la economía del original y evita introducir una glosa explicativa en la línea principal.
  doctrine_reference: Primacía del texto fuente y de su referencia contextual inmediata; evitar explicitar en la traducción lo que el griego deja implícito.
- issue: Sentido de ὀργή en el contexto narrativo
  english_pob_reading: Render as 'wrath' with the implication of divine judgment.
  chosen_spanish_reading: Traducir con «ira», dejando que el contexto señale su carácter de juicio divino.
  alternative_spanish_readings:
  - furor
  - cólera
  rationale: «Ira» es un término claro y solemne en español. Aunque el contexto remite a juicio divino, el griego no añade un calificativo explícito, así que conviene no sobrecargar la frase con una paráfrasis doctrinal.
  doctrine_reference: Conservar el peso teológico sin añadir elementos inexistentes en el texto base.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente; el griego normalizado de la capa de traducción se mantiene con alta confianza, y la redacción española sigue de cerca la sintaxis y las imágenes del original sin ampliar el sujeto ni explicitar interpretaciones no marcadas.
  spanish_consistency_notes:
  - Se usa «ira» para ὀργή en coherencia con un registro bíblico solemne, aunque en notas se reconoce el trasfondo de juicio divino.
  - Se conserva «los vivos» para ζῶντας, en paralelo directo con «los muertos», manteniendo el contraste imagístico del verso.
  - 'La puntuación reproduce una progresión narrativa: acumulación de muertos, mediación, contención de la ira y cierre del camino.'
