review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del hebreo: Moisés verá la tierra desde cierta distancia, pero no entrará en ella, la tierra que Dios da a los hijos de Israel. Sin embargo, hay dos desajustes relevantes con el rastro auditado: (1) la nota [b] del inglés POB está anclada a “sons of Israel”, pero en el borrador español se reutilizó para justificar «no irás»; eso rompe la preservación de la alternativa significativa documentada. (2) «a la tierra» es aceptable, pero «en la tierra» o «a entrar en la tierra» refleja mejor la fuerza de אֶל הָאָרֶץ en combinación con לֹא תָבֹא, evitando que la negación suene solo a desplazamiento general y no a acceso negado.'
  spanish_quality_summary: 'El español es claro y natural, con tono digno y legible. «Porque desde lejos verás la tierra» funciona bien, aunque «Pues» también sería posible. La principal mejora estilístico-semántica es hacer más explícita la idea de entrada prohibida: «no entrarás en ella» suena más idiomático y más preciso en español bíblico moderno que «no irás allí, a la tierra».'
  glossary_alignment: 'La terminología principal está bien alineada: הָאָרֶץ como «la tierra» y בְנֵי יִשְׂרָאֵל como «los hijos de Israel» respetan la política del proyecto. No hay nombres divinos ni términos doctrinales sensibles adicionales en este versículo. Debe restaurarse la nota sobre «hijos de Israel» para conservar la decisión lexical/theológica auditada.'
  issues:
  - severity: high
    issue: La nota [b] está asignada al lugar equivocado.
    rationale: En el English POB, la nota b documenta la decisión de traducir לִבְנֵי יִשְׂרָאֵל como “sons of Israel”. En el borrador español, [b] se usa para justificar «no irás», con lo cual se pierde una alternativa significativa preservada por la auditoría.
  - severity: medium
    issue: «No irás allí, a la tierra» suena menos preciso que una formulación de entrada negada.
    rationale: El hebreo לֹא תָבֹא אֶל הָאָרֶץ en este contexto expresa no llegar/entrar en la tierra. «No entrarás en ella» o una formulación equivalente comunica mejor el acceso prohibido sin sacrificar naturalidad.
  - severity: low
    issue: La alternativa «desde enfrente» en la nota [a] es menos natural que «desde el lado opuesto» o «desde lejos».
    rationale: Aunque busca reflejar מִנֶּגֶד, «desde enfrente» en español puede sonar coloquial o espacialmente impreciso. Conviene pulir la nota sin alterar el sentido.
  revised_spanish_text: Porque desde lejos[a] verás la tierra, pero no entrarás en ella, en la tierra que yo doy a los hijos de Israel[b].
  revised_footnotes:
  - marker: a
    text: O “desde el lado opuesto” o “desde lejos”; la expresión hebrea indica que Moisés verá la tierra sin entrar en ella.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente se dice “los hijos de Israel” o “los israelitas”. El hebreo dice “los hijos de Israel”.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota [b] para que preserve la decisión auditada sobre בְנֵי יִשְׂרָאֵל. Además, se ajusta la cláusula central a «no entrarás en ella» para reflejar con mayor precisión el sentido de acceso negado de לֹא תָבֹא אֶל הָאָרֶץ en español natural y digno. La nota [a] se pule para una alternativa más idiomática.
