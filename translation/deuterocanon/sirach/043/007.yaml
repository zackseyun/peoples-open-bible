translation:
  text: From them come the appointed time and the fixed seasons by statute[b][a], and the work he desired is in its cycle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult in the second line. The Cairo Geniza text reads approximately, 'and the desired thing/work ... in its cycle.' The Greek parallel reads, 'From the moon is the sign of a festival, a luminary waning at completion.'
    reason: alternative_reading
  - marker: b
    text: Masada scroll reads, 'for great is the Lord who made it,' where the Cairo Geniza text has a different and more difficult wording.
    reason: textual_variant
lexical_decisions:
- source_word: בם
  chosen: From them come
  alternatives:
  - In them
  - By them
  lexicon: HALOT
  rationale: The preposition ב normally means 'in/by,' but in this compressed poetic line, with the moon in view from the Greek parallel, the sense is that the calendrical markers derive from these heavenly bodies. 'From them come' makes the implied relation explicit in readable English while staying close to the Hebrew sense and the Greek's association of the moon with festival-signs.
- source_word: מועד
  chosen: appointed time
  alternatives:
  - festival
  - appointed feast
  - set time
  lexicon: HALOT
  rationale: מועד can denote an appointed time or festival. Because the Hebrew pairs it with זמני and the Greek parallel speaks of a 'sign of a feast/festival,' the broader calendrical sense is primary here. 'Appointed time' preserves that sense without narrowing it to feast alone.
- source_word: וזמני חוק
  chosen: the fixed seasons by statute
  alternatives:
  - the appointed seasons of ordinance
  - the times fixed by decree
  - the lawful seasons
  lexicon: HALOT
  rationale: זמנים are times/seasons; חוק conveys something fixed, prescribed, or statutory. The phrase points to the ordered, rule-governed calendar. 'Fixed seasons by statute' preserves both temporal and normative force in idiomatic English.
- source_word: וחפץ
  chosen: and the work he desired
  alternatives:
  - and his pleasure
  - and the thing he willed
  - and delight
  lexicon: HALOT
  rationale: חפץ often means desire, pleasure, or what is willed. In context of cosmic order, it likely refers to what the creator intends or desires to be accomplished. 'The work he desired' makes the implied object concrete enough for English while retaining the volitional nuance.
- source_word: עשיו
  chosen: he desired
  alternatives:
  - his maker
  - made it
  - its maker
  lexicon: HALOT
  rationale: The consonantal form is difficult in the Cairo Geniza reading. Taken as related to עשה/עשיו, it is obscure; the Greek parallel does not directly support 'maker' here, and the Hebrew as transmitted is compressed. Given the line's sense, the clause is rendered to express divine intention rather than overstate a precise morphology. A footnote preserves the textual difficulty and the Masada divergence.
- source_word: בתקופתו
  chosen: in its cycle
  alternatives:
  - in its season
  - at its turning
  - in its appointed circuit
  lexicon: HALOT
  rationale: תקופה denotes a circuit, turn, or seasonal cycle. In an astronomical context, 'cycle' best captures the recurring motion of the luminary and its calendrical function.
