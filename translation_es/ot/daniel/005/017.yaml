review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del arameo: conserva «respondió y dijo», el matiz de presencia en «delante del rey», la negativa a aceptar la recompensa, y el contraste de בְּרַם. Sin embargo, dos elecciones léxicas debilitan la fidelidad precisa al contexto: «tus regalos» para נְבָזְבְּיָתָךְ suaviza demasiado el sentido de recompensas reales, y «la escritura» para כְּתָבָא en este pasaje puede sonar en español a concepto abstracto o incluso a Escritura sagrada, cuando el contexto es el escrito/inscripción misteriosa.'
  spanish_quality_summary: El texto es legible y digno, pero puede mejorarse en naturalidad y precisión contextual. «Que tus dones sean para ti mismo» es aceptable, aunque algo rígido; puede mantenerse por cercanía al original. La mejora principal es usar «recompensas» en vez de «regalos» y «el escrito» en vez de «la escritura» para evitar ambigüedad no deseada en español bíblico contemporáneo.
  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos en este versículo. Las decisiones principales dependen de precisión contextual: «recompensas» alinea mejor con la justificación del POB para נְבָזְבְּיָתָךְ, y «el escrito» preserva mejor el referente concreto de כְּתָבָא sin introducir la posible ambigüedad de «Escritura».'
  issues:
  - severity: medium
    issue: «tus regalos» para וּנְבָזְבְּיָתָךְ
    rationale: El inglés auditado eligió «your rewards» y la justificación léxica apunta a compensaciones reales, no meros obsequios. «Regalos» reduce la fuerza contextual del ofrecimiento del rey.
  - severity: medium
    issue: «la escritura» para כְּתָבָא
    rationale: Aunque literalmente posible, en español puede sugerir «la Escritura» o una cualidad abstracta. En Daniel 5 el referente es un escrito/inscripción concreto y enigmático.
  revised_spanish_text: 'Entonces Daniel respondió y dijo delante del rey: «Que tus dones sean para ti mismo, y da tus recompensas a otro. Sin embargo, leeré el escrito para el rey y le daré a conocer la interpretación».'
  revision_rationale: 'Se ajustan dos términos para reflejar mejor el contexto y la auditoría léxica del POB: «recompensas» transmite con más precisión la idea de compensación real prometida por el rey, y «el escrito» evita la ambigüedad potencial de «la escritura» en español, manteniendo a la vez el referente concreto del texto misterioso en la pared. No se requieren notas al pie.'
