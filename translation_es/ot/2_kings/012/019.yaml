  to: Entonces Joás, rey de Judá, tomó todos los objetos sagrados que Josafat, Joram y Ocozías, sus padres[a], reyes de Judá, habían dedicado, junto con sus propios objetos sagrados, y todo el oro hallado en los tesoros de la casa de Yahvé y de la casa del rey, y lo envió a Hazael, rey de Aram; entonces se apartó de Jerusalén[b].
