translation:
  language: es
  text: 'Entonces los hijos de Israel dijeron a Samuel[a]: «No ceses de clamar a Yahvé, nuestro Dios, por nosotros, para que nos salve de la mano de los filisteos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No ceses de clamar a Yahvé, nuestro Dios, por nosotros». El hebreo, de forma más literal, dice: «No calles para nosotros de clamar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conservo la expresión formal del hebreo con «hijos», que mantiene la imagen familiar/covenantal del constructo. «Israelitas» sería más idiomático, pero menos transparente al texto fuente.
- source_word: אַל תַּחֲרֵשׁ
  english_pob_choice: Do not cease / Do not be silent
  chosen_spanish: No ceses
  alternatives_spanish:
  - No calles
  - No guardes silencio
  lexicon: HALOT
  rationale: El verbo חרשׁ aquí tiene el sentido de callar o permanecer en silencio. En español, «No ceses» recoge bien el valor contextual que el POB inglés adjudicó, sin sonar forzado; se preserva la idea implícita de insistir en la intercesión.
- source_word: מִמֶּנּוּ
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - en favor nuestro
  - de nuestra parte
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de tomar la construcción como relacional, no espacial. «Por nosotros» es natural en español y conserva la idea de intercesión en beneficio de Israel.
- source_word: מִזְּעֹק
  english_pob_choice: from crying out
  chosen_spanish: de clamar
  alternatives_spanish:
  - de gritar
  - de pedir con fuerza
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso de auxilio. «Clamar» es el equivalente español más digno y bíblico, y mantiene el carácter de súplica intensa que el inglés POB expresó con «cry out».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Sigo el criterio del proyecto para el Tetragrama: se vierte como «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: Traducción directa y clara del posesivo, conservando la apelación de pacto que Israel hace al dirigirse a Samuel.
- source_word: וְיֹשִׁעֵנוּ
  english_pob_choice: that he may save us
  chosen_spanish: para que nos salve
  alternatives_spanish:
  - y nos salve
  - a fin de que nos salve
  lexicon: HALOT
  rationale: El waw con el imperfecto/jusivo expresa finalidad o resultado. «Para que nos salve» es natural en español y conserva la relación de propósito del hebreo.
- source_word: מִיַּד פְּלִשְׁתִּים
  english_pob_choice: from the hand of the Philistines
  chosen_spanish: de la mano de los filisteos
  alternatives_spanish:
  - del poder de los filisteos
  - de los filisteos
  lexicon: HALOT
  rationale: Mantengo la imagen idiomática de «mano» para conservar la fuerza de la liberación desde dominio o control, como hizo el POB inglés.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrama directamente. Según la política del proyecto, se mantiene el nombre divino transliterado en vez de sustituirlo por un título litúrgico, para preservar la referencia covenantal explícita del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה/YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente que reemplazó una formulación demasiado literal por una más natural: el sentido no es un silencio absoluto, sino una exhortación a no dejar de interceder. También mantiene la decisión revisada de interpretar מִמֶּנּוּ como relación de beneficio («por nosotros») y no como un simple «de nosotros».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente con la norma del proyecto para el Tetragrama.
  - «Clamar» se usa para זעק, evitando una opción menos intensa como «gritar» y manteniendo el registro bíblico.
  - «Hijos de Israel» preserva la imagen hebrea; no se normaliza a «israelitas» en este versículo.
  - La nota al pie ofrece la alternativa textual/lexical sin introducir una divergencia doctrinal.
