lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: Then ... commanded
  chosen_spanish: Entonces ... mandó
  alternatives_spanish:
  - Entonces ... ordenó
  - Entonces ... dio instrucciones a
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo; en español, «entonces» conserva la secuencia y «mandó» comunica una orden autoritativa sin sonar excesivamente rígido.
- source_word: שָׂרֵי
  english_pob_choice: leaders
  chosen_spanish: jefes
  alternatives_spanish:
  - líderes
  - oficiales
  - príncipes
  lexicon: HALOT
  rationale: שָׂרִים se refiere a personas con rango o autoridad. «Jefes» es un equivalente natural y amplio en español, cercano a la función de liderazgo sin implicar nobleza monárquica.
- source_word: לְכָל שָׂרֵי יִשְׂרָאֵל
  english_pob_choice: all the leaders of Israel
  chosen_spanish: a todos los jefes de Israel
  alternatives_spanish:
  - a todos los líderes de Israel
  - a todos los oficiales de Israel
  lexicon: HALOT
  rationale: La preposición con infinitivo de dirección se expresa naturalmente con «a». «De Israel» preserva la relación genitiva y «todos» mantiene la inclusión total del liderazgo nacional.
- source_word: לַעְזֹר
  english_pob_choice: to help
  chosen_spanish: que ayudaran
  alternatives_spanish:
  - que asistieran
  - que apoyaran
  lexicon: HALOT
  rationale: El infinitivo de עזר expresa ayuda directa. En español, la subordinada final con subjuntivo («que ayudaran») suena natural y fiel al propósito del mandato.
- source_word: לִשְׁלֹמֹה בְנוֹ
  english_pob_choice: Solomon his son
  chosen_spanish: a Salomón, su hijo
  alternatives_spanish:
  - a su hijo Salomón
  - a Salomón, hijo suyo
  lexicon: HALOT
  rationale: El hebreo coloca primero el destinatario y luego la identificación filial. «A Salomón, su hijo» conserva esa relación y suena claro en español.
translation_notes:
  revision_awareness: La edición inglesa revisada solo ajustó la puntuación final; el sentido semántico permanece estable. La redacción española se alinea con esa lectura estable y no requiere notas textuales.
  spanish_consistency_notes:
  - Se usa «mandó» para mantener la fuerza directiva de צוה.
  - Se prefiere «jefes» como equivalente amplio y natural de שָׂרֵי en este contexto administrativo.
  - La estructura «que ayudaran» refleja propósito/dependencia verbal sin añadir contenido interpretativo.
