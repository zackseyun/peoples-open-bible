  to: Y para el príncipe habrá tierra a ambos lados del distrito santo[a] y de la posesión de la ciudad, junto al distrito santo y junto a la posesión de la ciudad, desde el lado occidental hacia el occidente y desde el lado oriental hacia el oriente; y en longitud, correspondiente a una de las porciones tribales, desde el límite occidental hasta el límite oriental[b].
  rationale: Se ajusta la traducción para reflejar mejor el sentido catastral de תְּרוּמַת הַקֹּדֶשׁ, el valor de adyacencia de אֶל־פְּנֵי, y la aclaración contextual de que las «porciones» son tribales. También se adopta «occidental/oriental» en el texto principal conforme a la racionalidad auditada del POB, dejando la literalidad «mar» en nota.
