  yaml_path: translation/extra_canonical/2_esdras/007/127.yaml
  text: 'And he answered and said[a], “This is the thought of the struggle that the man born on the earth has fought:'
  footnotes:
  - marker: a
    text: Or 'the man born on earth must fight:'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
