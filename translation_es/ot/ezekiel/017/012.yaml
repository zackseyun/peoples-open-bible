  text: אֱמָר נָא֙ לְ/בֵ֣ית הַ/מֶּ֔רִי הֲ/לֹ֥א יְדַעְתֶּ֖ם מָה אֵ֑לֶּה אֱמֹ֗ר הִנֵּה בָ֨א מֶֽלֶךְ בָּבֶ֤ל יְרוּשָׁלִַ֨ם֙ וַ/יִּקַּ֤ח אֶת מַלְכָּ/הּ֙ וְ/אֶת שָׂרֶ֔י/הָ וַ/יָּבֵ֥א אוֹתָ֛/ם אֵלָ֖י/ו בָּבֶֽלָ/ה־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/012.yaml
  text: Say now to the rebellious house[a], ‘Do you not know what these things mean?’ Say, ‘Behold[c][b], the king of Babylon came to Jerusalem and took its king and its officials and brought them to him in Babylon.’
  footnotes:
  - marker: a
    text: Or 'what these things are.' The Hebrew likely asks whether the rebellious house understands the meaning of the allegory.
    reason: lexical_alternative
  - marker: b
    text: Or 'its princes.' The Hebrew term can refer to royal or governing leaders.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to Babylon' with a directional ending; English may also be rendered 'in Babylon' after 'brought them.'
    reason: lexical_alternative
