translation:
  language: es
  text: Se te mostró[a] para que supieras que Yahvé[b], él es Dios; no hay otro fuera de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Has sido mostrado», enfatizando el sentido pasivo; es decir, fuiste hecho ver estas cosas.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé, él es Dios»; el pronombre añade énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְאֵתָ
  english_pob_choice: were shown
  chosen_spanish: fuiste mostrado
  alternatives_spanish:
  - has sido mostrado
  - te mostraron
  - fuiste hecho ver
  lexicon: HALOT
  rationale: El Hophal de ראה tiene valor pasivo/causativo-pasivo. En español, «fuiste mostrado» conserva esa pasividad y el hecho de que el destinatario fue hecho ver algo, sin volverlo un activo simple como «viste».
- source_word: לָדַעַת
  english_pob_choice: so that you might know
  chosen_spanish: para que supieras
  alternatives_spanish:
  - para que conocieras
  - para saber
  - a fin de que supieras
  lexicon: HALOT
  rationale: La construcción con ל marca propósito. «Para que supieras» comunica finalidad de manera natural en español y mantiene el valor intencional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio doctrinal del proyecto, el Tetragrámaton se vierte como «Yahvé» en el texto principal, preservando el nombre propio del pacto y evitando la sustitución por un título.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  - él mismo
  lexicon: HALOT
  rationale: 'El pronombre independiente aporta énfasis: «Yahvé, él es Dios». En español, «él» conserva esa fuerza enfática sin añadir «solo» o «único», que no corresponde a esta cláusula.'
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el verdadero Dios
  lexicon: HALOT
  rationale: Como predicado nominal, «Dios» es la forma más natural y fiel en español. «El Dios» suena forzado aquí y «el verdadero Dios» agrega matiz no expresado de manera explícita por la forma hebrea.
- source_word: אֵין עוֹד
  english_pob_choice: there is no other
  chosen_spanish: no hay otro
  alternatives_spanish:
  - no existe otro
  - no hay nadie más
  - no hay otro más
  lexicon: HALOT
  rationale: La fórmula idiomática niega cualquier otro además de Yahvé. «No hay otro» reproduce bien la negación absoluta con un español claro y sobrio.
- source_word: מִלְבַדּוֹ
  english_pob_choice: besides him
  chosen_spanish: fuera de él
  alternatives_spanish:
  - aparte de él
  - además de él
  - excepto él
  lexicon: HALOT
  rationale: La expresión preposicional marca exclusión. «Fuera de él» conserva ese sentido de exclusión en español, y además suena natural en una afirmación de unicidad divina.
theological_decisions:
- issue: Cómo expresar la afirmación exclusiva sobre Dios
  english_pob_reading: there is no other besides him
  chosen_spanish_reading: no hay otro fuera de él
  alternative_spanish_readings:
  - no hay otro además de él
  - no existe otro aparte de él
  rationale: El hebreo afirma unicidad exclusiva sin desarrollar una formulación filosófica. «No hay otro fuera de él» conserva esa exclusividad con un español directo y bíblicamente sobrio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Valor del pronombre enfático
  english_pob_reading: Yahweh, he is God
  chosen_spanish_reading: Yahvé, él es Dios
  alternative_spanish_readings:
  - Yahvé es Dios
  - Yahvé, él mismo es Dios
  rationale: El pronombre independiente en hebreo añade énfasis y no debe perderse del todo. «Él es Dios» preserva esa fuerza sin sobretraducirla con explicaciones ajenas al texto.
  doctrine_reference: 'HALOT; DOCTRINE.md: sensitivity to emphatic pronouns'
- issue: Nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El proyecto pide «Yahvé» como forma principal en español. Se mantiene el nombre personal de Dios revelado a Israel, en lugar de la sustitución tradicional por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto coincide con el paquete fuente y con la auditoría inglesa: se preserva el pasivo de הָרְאֵתָ, el propósito de לָדַעַת, el nombre divino como Yahvé, el pronombre enfático de הוּא y la exclusividad de אֵין עוֹד מִלְבַדּוֹ. No se aplicaron revisiones posteriores en el registro fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del Tetragrámaton, coherente con la terminología española del proyecto.
  - «Dios» se usó como predicado nominal natural en español, sin introducir «el Dios» por razones de estilo.
  - La negación final se expresó con «fuera de él» para conservar exclusión y fluidez.
  - Se evitó «Cristo», «Señor» y otras sustituciones tradicionales que no corresponden al hebreo de este versículo.
