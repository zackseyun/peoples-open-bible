revisions:
- from: y para revelar una lámpara[a] para nosotros en la casa de nuestro Señor[b], para darnos alimento en el tiempo de nuestra esclavitud; y mientras estábamos esclavizados[c], no fuimos abandonados
  to: y para revelar para nosotros una lámpara[a] en la casa de Yahvé[b], para darnos alimento en el tiempo de nuestra esclavitud; y mientras estábamos esclavizados[c], no fuimos abandonados
  rationale: Se corrige 'nuestro Señor' a 'Yahvé' para ajustarse a la terminología obligatoria del proyecto cuando κύριος representa el nombre divino en contexto veterotestamentario. También se mejora levemente la naturalidad del español reordenando 'revelar una lámpara para nosotros' a 'revelar para nosotros una lámpara', sin alterar el significado ni la imaginería fuente. Se actualiza la nota b para que coincida con el texto revisado.
