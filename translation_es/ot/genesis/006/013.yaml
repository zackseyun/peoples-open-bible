translation:
  language: es
  text: 'Entonces Dios dijo a Noé[a]: «El fin de toda carne ha llegado delante de mí, porque la tierra está llena de violencia a causa de ellos. Y he aquí, voy a destruirlos con la tierra[c][d][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un fin de toda carne ha llegado delante de mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la tierra está llena de violencia a causa de ellos».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo, literalmente: «los estoy destruyendo con la tierra»; algunos entienden «junto con la tierra» o toman «la tierra» como un segundo objeto: «los estoy destruyendo a ellos y a la tierra».'
    reason: alternative_reading
  - marker: d
    text: 'O: «junto con la tierra».'
    reason: previous_rendering
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Se mantiene el nombre común para el referente divino sin añadir artículo innecesario; en español bíblico moderno, 'Dios' es la forma natural y fiel al hebreo.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español.
- source_word: קֵץ כָּל בָּשָׂר
  english_pob_choice: the end of all flesh
  chosen_spanish: El fin de toda carne
  alternatives_spanish:
  - El fin de todo ser viviente
  - El fin de toda humanidad
  lexicon: HALOT
  rationale: '''Carne'' conserva la fuerza lexical de בָּשָׂר y el alcance amplio del juicio. ''Toda carne'' mantiene la formulación solemne y la resonancia intertextual del hebreo; ''humanidad'' estrecharía indebidamente el campo.'
- source_word: בָּא לְפָנַי
  english_pob_choice: has come before me
  chosen_spanish: ha llegado delante de mí
  alternatives_spanish:
  - ha venido delante de mí
  - ha llegado a mi presencia
  lexicon: HALOT
  rationale: '''Llegado delante de mí'' conserva la imagen judicial de la frase sin sonar forzado en español; expresa que el caso está ahora presentado ante Dios para juicio.'
- source_word: מָלְאָה הָאָרֶץ חָמָס
  english_pob_choice: the earth is filled with violence
  chosen_spanish: la tierra está llena de violencia
  alternatives_spanish:
  - la tierra se ha llenado de violencia
  - el mundo está lleno de violencia
  lexicon: HALOT
  rationale: '''Tierra'' traduce el hebreo הָאָרֶץ sin decidir prematuramente entre ''tierra'' y ''mundo''; aquí el español permite conservar la amplitud del contexto del diluvio. ''Violencia'' es el equivalente directo de חָמָס.'
- source_word: מִפְּנֵיהֶם
  english_pob_choice: because of them
  chosen_spanish: a causa de ellos
  alternatives_spanish:
  - por ellos
  - por causa de ellos
  lexicon: HALOT
  rationale: La preposición expresa causalidad; 'a causa de ellos' es natural y conserva el sentido de responsabilidad causal sin sobreinterpretar la imagen literal de 'delante de'.
- source_word: וְהִנְנִי
  english_pob_choice: And behold, I am about to
  chosen_spanish: Y he aquí, yo voy a
  alternatives_spanish:
  - Y he aquí, estoy por
  - Y he aquí, yo estoy a punto de
  lexicon: HALOT
  rationale: '''He aquí'' conserva el deíctico enfático, y ''voy a'' comunica inminencia en un español digno y claro. Se evita una paráfrasis excesiva pero se mantiene el valor discursivo de la fórmula.'
- source_word: מַשְׁחִיתָם
  english_pob_choice: destroy them
  chosen_spanish: destruirlos
  alternatives_spanish:
  - arruinarlos
  - corromperlos
  lexicon: HALOT
  rationale: El hifil de שׁחת en contexto de juicio pide 'destruir'. 'Corromper' podría sugerir la idea de 'arruinar/malear' pero no es la opción principal aquí; 'destruir' corresponde mejor al anuncio del diluvio.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: with the earth
  chosen_spanish: con la tierra
  alternatives_spanish:
  - junto con la tierra
  - y la tierra
  lexicon: HALOT
  rationale: Se conserva la posibilidad de una lectura comitativa ('con la tierra') que refleja la construcción hebrea y evita decidir demasiado pronto entre 'and the earth' y 'with the earth'. En español, 'con la tierra' preserva la relación de juicio sobre ambos sin imponer una coordinación más interpretativa.
theological_decisions:
- issue: Alcance de 'toda carne'
  english_pob_reading: A broad category including living creatures under judgment, not merely humans.
  chosen_spanish_reading: Una categoría amplia que incluye a los seres vivientes bajo juicio, no solo a los seres humanos.
  alternative_spanish_readings:
  - Solo a la humanidad
  - A toda la humanidad y los animales
  rationale: '''Toda carne'' en el contexto del diluvio conserva la amplitud del hebreo y no reduce indebidamente el juicio a una sola clase de seres. El español mantiene la tensión textual sin explicitar más de lo que el versículo dice.'
  doctrine_reference: Génesis 6–7; uso bíblico de בָּשָׂר
- issue: Sentido de 'la tierra' (הָאָרֶץ)
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - terruño
  rationale: En el marco del diluvio, 'tierra' comunica mejor el alcance cósmico/universal que 'país'. No se estrecha a una región local.
  doctrine_reference: Génesis 6–7; lectura universal del diluvio
- issue: Construcción final 'destruirlos con la tierra'
  english_pob_reading: Hebrew literally, 'I am destroying them with the earth'; some understand 'along with the earth' or take 'the earth' as a second object.
  chosen_spanish_reading: los voy a destruir con la tierra
  alternative_spanish_readings:
  - los voy a destruir junto con la tierra
  - los voy a destruir y la tierra
  rationale: Se preserva la ambigüedad hebrea sin forzar una solución única. 'Con la tierra' permite que el lector perciba que la tierra también está implicada en el juicio, mientras deja abierta la relación sintáctica exacta.
  doctrine_reference: Génesis 6:13; nota textual/estructural del hebreo
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: se mantiene el paralelismo de juicio, la amplitud de ''toda carne'' y la ambigüedad final de אֶת הָאָרֶץ. Se prefirió una formulación española natural (''ha llegado delante de mí'', ''a causa de ellos'', ''con la tierra'') sin perder la imaginería judicial ni el alcance del diluvio. Se evitó traducir mecánicamente desde el inglés cuando eso habría oscurecido la sintaxis hebrea o producido una frase poco natural en español.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים y 'Noé' para נֹחַ.
  - '''Toda carne'' se conserva como término técnico-bíblico amplio, coherente con el POB inglés.'
  - '''Tierra'' traduce הָאָרֶץ de manera consistente en este contexto universal.'
  - Se mantiene 'violencia' para חָמָס y no se suaviza a 'maldad' o 'corrupción'.
  - La clausula final conserva la tensión interpretativa del hebreo mediante 'con la tierra' y notas alternativas.
