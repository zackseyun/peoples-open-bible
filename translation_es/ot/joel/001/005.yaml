translation:
  language: es
  text: Despierten, borrachos, y lloren; giman, todos los que beben vino, por el vino dulce[a], porque ha sido cortado de su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino nuevo» o «vino fresco» para el hebreo עָסִיס.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָקִיצוּ
  english_pob_choice: Wake up
  chosen_spanish: Despiértense
  alternatives_spanish:
  - Despierten
  - ¡Despierten!
  lexicon: HALOT
  rationale: El imperativo plural exhorta a salir del letargo o aturdimiento. «Despiértense» comunica bien la llamada profética y mantiene el tono directo del hebreo.
- source_word: שִׁכּוֹרִים
  english_pob_choice: you drunkards
  chosen_spanish: borrachos
  alternatives_spanish:
  - ebrios
  - personas ebrias
  lexicon: HALOT
  rationale: Es un vocativo plural con valor caracterizador. «Borrachos» conserva la fuerza directa del insulto profético mejor que una perífrasis más suave.
- source_word: וּבְכוּ
  english_pob_choice: and weep
  chosen_spanish: y lloren
  alternatives_spanish:
  - y lloren de dolor
  - y giman
  lexicon: HALOT
  rationale: El verbo expresa llanto/lamentación. «Lloren» es natural en español y corresponde al lamento exigido por el contexto.
- source_word: וְהֵילִלוּ
  english_pob_choice: wail
  chosen_spanish: giman
  alternatives_spanish:
  - aúllen
  - clamen
  lexicon: HALOT
  rationale: El verbo implica un clamor fuerte de duelo. «Giman» comunica lamentación intensa sin introducir innecesariamente la imagen animal de «aúllen».
- source_word: כָּל שֹׁתֵי יָיִן
  english_pob_choice: all you drinkers of wine
  chosen_spanish: todos los que beben vino
  alternatives_spanish:
  - todos los bebedores de vino
  - todos ustedes que beben vino
  lexicon: HALOT
  rationale: El participio describe a los caracterizados por beber vino. La construcción con «todos los que» preserva la fuerza vocativa sin sonar forzada en español.
- source_word: עָסִיס
  english_pob_choice: the sweet wine
  chosen_spanish: el vino dulce
  alternatives_spanish:
  - el vino nuevo
  - el mosto
  - el vino fresco
  lexicon: HALOT
  rationale: El término designa vino recién exprimido o dulce. «Vino dulce» sigue la opción inglesa y comunica bien el sentido sin el tecnicismo de «mosto».
- source_word: נִכְרַת
  english_pob_choice: has been cut off
  chosen_spanish: ha sido quitado
  alternatives_spanish:
  - ha sido cortado
  - se ha cortado
  lexicon: HALOT
  rationale: El nifal de כרת puede expresar ser cortado o eliminado. «Ha sido quitado» mantiene el resultado consumado y suena natural en español, aunque la imagen literal de corte queda implícita.
- source_word: מִפִּיכֶם
  english_pob_choice: from your mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca
  - de vuestra boca
  - de sus labios
  lexicon: HALOT
  rationale: La imagen es literal. Se eligió la forma de cortesía/plural «su» para un español bíblico actual y neutral, manteniendo la referencia corporal concreta.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el archivo auditado en inglés. Se conserva la secuencia imperativa y el motivo del lamento, pero se ajusta la sintaxis para un español natural y publicable. Se mantuvo la tensión léxica de עָסִיס con una nota alternativa, ya que el término admite más de una equivalencia válida.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «vino dulce» como equivalente principal de עָסִיס, en línea con el audit trail inglés, sin excluir las alternativas más técnicas.
  - Se evitó «SEÑOR» y otras sustituciones no motivadas por el texto fuente.
  - «Despiértense» conserva el plural imperativo del hebreo y coordina con los demás mandatos del versículo.
