translation:
  language: es
  text: si escuchas la voz de Yahvé tu Dios, guardando todos sus mandamientos que yo te mando hoy, haciendo lo recto a los ojos de Yahvé tu Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce una condición; en español, «si» expresa mejor esa relación condicional sin añadir causalidad.
- source_word: תִשְׁמַע
  english_pob_choice: you listen
  chosen_spanish: escuchas
  alternatives_spanish:
  - oyes
  - obedeces
  lexicon: HALOT
  rationale: Con בְּקוֹל, el verbo conserva la imagen de oír/escuchar una voz. «Escuchas» mantiene el matiz auditivo y deja implícita la obediencia que el contexto exige, sin reducirlo a «obedeces».
- source_word: בְּקוֹל
  english_pob_choice: to the voice
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - la voz
  lexicon: HALOT
  rationale: La expresión hebrea שׁמע בקול se conserva con «la voz de», que reproduce la metáfora relacional del original y es natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como nombre divino transliterado, en lugar de un sustituto titular.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Es la forma pactal estándar y directa del hebreo; «tu Dios» es la equivalencia más clara y precisa.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardar
  alternatives_spanish:
  - para observar
  - para obedecer
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Guardar» es el equivalente bíblico-natural que comunica observancia cuidadosa y obediente de los mandamientos.
- source_word: כָּל מִצְוֺתָיו
  english_pob_choice: all his commandments
  chosen_spanish: todos sus mandamientos
  alternatives_spanish:
  - todos sus preceptos
  - todas sus órdenes
  lexicon: HALOT
  rationale: «Mandamientos» corresponde bien a מִצְוֹת en contexto legal/pactual; se conserva «todos» para reflejar la totalidad explícita del hebreo.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te mando hoy
  alternatives_spanish:
  - que yo te estoy mandando hoy
  - que hoy te mando
  lexicon: HALOT
  rationale: El participio hebreo puede expresarse en español simple sin perder fuerza durativa/discursiva en un contexto de exhortación directa; «te mando hoy» es natural y fiel.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para practicar
  - para cumplir
  lexicon: HALOT
  rationale: Se mantiene el infinitivo de propósito con una forma sobria y literal. «Para hacer» enlaza con la cláusula siguiente sin añadir explicación interpretativa.
- source_word: הַיָּשָׁר
  english_pob_choice: what is right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo correcto
  - lo justo
  lexicon: HALOT
  rationale: יָשָׁר tiene el valor de rectitud/uprightness. «Lo recto» preserva mejor esa cualidad moral objetiva que una mera corrección pragmática.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - a la vista de
  lexicon: HALOT
  rationale: La locución idiomática se conserva con un equivalente transparente en español. «Ante los ojos de» comunica evaluación según la perspectiva divina.
theological_decisions:
- issue: Uso del nombre divino YHWH en la traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la directriz doctrinal del proyecto de transliterar el Tetragrámaton, preservando el nombre pactual en lugar de sustituirlo por un título. Esto mantiene la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Relación entre ‘escuchar la voz’ y la obediencia implícita
  english_pob_reading: you listen to the voice
  chosen_spanish_reading: si escuchas la voz
  alternative_spanish_readings:
  - si obedeces la voz
  - si prestas atención a la voz
  rationale: El hebreo שׁמע con בְּקוֹל incluye la idea de escuchar con respuesta obediente. «Escuchas la voz» conserva la metáfora auditiva y deja que la obediencia la determine el contexto inmediato, sin convertir el verbo en una paráfrasis explícita.
  doctrine_reference: Deut 13:19; cf. uso idiomático hebreo de שׁמע בקול
translation_notes:
  revision_awareness: 'He tenido en cuenta el pass de revisión más reciente: se prefirió mantener las frases infinitivas más cercanas al hebreo. En español, eso se refleja con «para guardar» y «para hacer», en lugar de soluciones más interpretativas como «guardando» o «haciendo» como gerundios de modo. También se preservó el nombre divino como «Yahvé» siguiendo la decisión doctrinal del POB.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se traduce אֱלֹהֶיךָ como «tu Dios» sin añadir títulos no presentes.
  - Se mantiene la estructura condicional con «si» para כִּי.
  - «Lo recto» conserva el valor ético de הַיָּשָׁר sin expandirlo.
  - No se añadieron notas de pie porque el verso no plantea una variante textual o ambigüedad que requiera marcarse en la superficie.
