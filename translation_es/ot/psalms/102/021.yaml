translation:
  language: es
  text: para oír el gemido del preso[a], para liberar a los hijos de la muerte,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los destinados a morir» o «los condenados a muerte». El hebreo dice literalmente «hijos de la muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad o resultado en la oración. En español, «oír» conserva la dirección más inmediata del hebreo y funciona de manera natural con el paralelismo de infinitivos.
- source_word: אֶנְקַת
  english_pob_choice: the groaning of
  chosen_spanish: el gemido de
  alternatives_spanish:
  - el gemido angustiado de
  - el suspiro de
  lexicon: HALOT
  rationale: El sustantivo describe lamento o gemido bajo aflicción. «Gemido» conserva el peso del sufrimiento; «suspiro» sería demasiado leve para este contexto.
- source_word: אָסִיר
  english_pob_choice: the prisoner
  chosen_spanish: el preso
  alternatives_spanish:
  - el prisionero
  - el cautivo
  lexicon: HALOT
  rationale: אָסִיר designa a alguien encerrado o sujeto. «Preso» es breve, claro y natural en español; «cautivo» podría sugerir más bien captura guerrera o servidumbre.
- source_word: לְפַתֵּחַ
  english_pob_choice: to release
  chosen_spanish: liberar
  alternatives_spanish:
  - desatar
  - soltar
  - abrir paso para
  lexicon: HALOT
  rationale: Aunque el verbo בסיס es literalmente «abrir», en este contexto con personas en confinamiento la idea idiomática es ponerlas en libertad. «Liberar» comunica bien esa fuerza sin perder la relación con la salida de la prisión.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos de
  - descendientes de
  lexicon: HALOT
  rationale: En español, «hijos de» conserva la imagen idiomática del hebreo mejor que una paráfrasis más abstracta. Se mantiene el masculino plural porque refleja el giro fuente.
- source_word: תְמוּתָה
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el morir
  - la sentencia de muerte
  lexicon: HALOT
  rationale: El sustantivo significa «muerte». Mantenerlo en la frase «hijos de la muerte» preserva la imagen hebrea; la nota explica el sentido idiomático posible de condenados a morir.
translation_notes:
  revision_awareness: La revisión reciente indicó que no se requerían cambios; la redacción española se alinea con el texto hebreo y con la solución inglesa auditada, manteniendo la imagen idiomática y explicando su sentido en nota.
  spanish_consistency_notes:
  - Se conserva el paralelismo de infinitivos con «para... para...».
  - Se mantiene el genitivo idiomático «hijos de la muerte» en el texto principal y se aclara en nota.
  - El tono es sobrio y publicable, con vocabulario moderno pero reverente.
