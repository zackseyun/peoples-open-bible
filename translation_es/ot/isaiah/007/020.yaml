translation:
  language: es
  text: En aquel día el Señor afeitará con una navaja alquilada, desde más allá del Río, con el rey de Asiria, la cabeza y el pelo de los pies[a]; y también barrerá la barba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «el vello de las piernas»; «los pies» puede funcionar además como eufemismo para la zona genital, subrayando la humillación total.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגַלַּח
  english_pob_choice: will shave
  chosen_spanish: afeitará
  alternatives_spanish:
  - rasurará
  - quitará el pelo
  lexicon: HALOT
  rationale: El verbo piel de גלח expresa afeitar o rasurar. «Afeitará» transmite la imagen con naturalidad en español y conserva el carácter corporal e ինտenso del juicio.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «the Lord» para אֲדֹנָי, en este proyecto el nombre divino se vierte como «Yahvé» en el texto principal. Aquí no se trata del Tetragrámaton explícito, pero el hebreo usa la forma divina soberana y el verso está en un contexto profético donde Yahvé actúa como agente del juicio.
- source_word: בְּתַעַר הַשְּׂכִירָה
  english_pob_choice: with a hired razor
  chosen_spanish: con una navaja alquilada
  alternatives_spanish:
  - con una navaja contratada
  - con una navaja de alquiler
  lexicon: HALOT
  rationale: תער es «navaja/rastrillo» para afeitar; שׂכירה significa «alquilada» o «contratada». «Navaja alquilada» conserva la metáfora del instrumento empleado por otro sin volverla interpretativa.
- source_word: בְּעֶבְרֵי נָהָר
  english_pob_choice: from beyond the River
  chosen_spanish: de más allá del río
  alternatives_spanish:
  - desde la región de más allá del río
  - del otro lado del río
  lexicon: HALOT
  rationale: La expresión es geográfica e idiomática. «De más allá del río» mantiene la forma breve y transparente del hebreo sin especificar el Éufrates en el texto principal.
- source_word: בְּמֶלֶךְ אַשּׁוּר
  english_pob_choice: with the king of Assyria
  chosen_spanish: con el rey de Asiria
  alternatives_spanish:
  - por medio del rey de Asiria
  - es decir, el rey de Asiria
  lexicon: HALOT
  rationale: La preposición puede expresar instrumento o aposición. «Con el rey de Asiria» conserva el vínculo directo con la imagen de la navaja y deja visible que Asiria es el agente instrumental del juicio.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza
  lexicon: HALOT
  rationale: Término anatómico directo; se mantiene sin ajuste interpretativo.
- source_word: וְשַׂעַר הָרַגְלָיִם
  english_pob_choice: the hair of the feet
  chosen_spanish: el pelo de los pies
  alternatives_spanish:
  - el vello de las piernas
  - el vello púbico
  lexicon: HALOT
  rationale: Se conserva la literalidad de «pies» para reflejar la transparencia del hebreo, que puede funcionar como eufemismo. «Pelo» es más natural que «cabello» en esta zona del cuerpo. La nota preserva la alternativa semántica.
- source_word: וְגַם אֶת הַזָּקָן
  english_pob_choice: and it will also sweep away the beard
  chosen_spanish: y también barrerá la barba
  alternatives_spanish:
  - y también removerá la barba
  - e incluso quitará la barba
  lexicon: HALOT
  rationale: גם añade énfasis. «Barrerá» sigue la fuerza de ספה («barrer, arrebatar, quitar por completo») y sugiere una eliminación total, como en el inglés POB.
- source_word: תִּסְפֶּה
  english_pob_choice: it will also sweep away
  chosen_spanish: barrerá
  alternatives_spanish:
  - eliminará
  - arrasará
  lexicon: HALOT
  rationale: El verbo ספה en este contexto expresa quitar o barrer por completo. En español, «barrerá» comunica bien la totalidad del acto y mantiene la personificación del instrumento.
theological_decisions:
- issue: Función de Asiria como instrumento de juicio
  english_pob_reading: The verse depicts the Lord using Assyria as his instrument of humiliating judgment against Judah.
  chosen_spanish_reading: El verso presenta a Yahvé usando al rey de Asiria como instrumento de juicio humillante contra Judá.
  alternative_spanish_readings:
  - El verso solo describe una derrota militar sin matiz de humillación.
  - El verso es únicamente una metáfora de depuración sin referencia al juicio.
  rationale: La secuencia de afeitar la cabeza, el pelo de los pies y la barba apunta a deshonra y despojo total, no solo a derrota. La estructura hebrea identifica al rey de Asiria como la navaja alquilada usada por Yahvé.
  doctrine_reference: Isaías 7:20; juicio divino mediante instrumento humano; humillación pactual de Judá
- issue: Traducción del título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el hebreo aquí usa la forma אֲדֹנָי, el proyecto español privilegia «Yahvé» como forma principal para el nombre divino, por coherencia terminológica. No se usa «SEÑOR» como máscara tipográfica, y el contexto profético favorece la referencia al Dios de Israel actuando soberanamente.
  doctrine_reference: Convención terminológica POB en español; nombre divino en profetas
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y su revisión más reciente, que no introdujo cambios. La solución española conserva la metáfora central, la fuerza humillante del juicio y la alternativa semántica sobre «los pies» documentada en el POB inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino según la convención del proyecto.
  - Se preservó la metáfora de instrumento alquilado con «navaja alquilada».
  - «El pelo de los pies» conserva la literalidad hebrea y la nota recoge la alternativa interpretativa.
  - «Barrerá» refleja la fuerza totalizante de ספה sin debilitarla en una paráfrasis genérica.
