translation:
  language: es
  text: Pero si no redime el campo, o si ha vendido el campo a otro hombre[a], ya no podrá ser redimido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a otra persona». Hebreo: «a otro hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La forma condicional continúa la cláusula anterior, pero en este contexto legal la partícula inicial también aporta contraste; «Pero si» comunica mejor esa transición que un simple «si».
- source_word: יִגְאַל / יִגָּאֵל
  english_pob_choice: redeem / be redeemed
  chosen_spanish: rescata / ser rescatado
  alternatives_spanish:
  - redime / ser redimido
  - recompra / poder ser recompensado
  - reivindica / ser reivindicado
  lexicon: HALOT
  rationale: El verbo גאל en este contexto jurídico-sacral expresa la recuperación legal del bien. En español, «rescatar» transmite bien la idea de recuperar algo mediante pago o acción legal sin perder del todo el sentido técnico; en la pasiva, «ser rescatado» conserva la relación con el activo.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo de cultivo
  - la parcela
  - el terreno
  lexicon: HALOT
  rationale: שׂדה aquí designa el terreno específico del caso. «Campo» es la correspondencia más natural y suficientemente precisa en español; «terreno» o «parcela» introducirían matices no requeridos por el hebreo.
- source_word: מָכַר
  english_pob_choice: has sold
  chosen_spanish: ha vendido
  alternatives_spanish:
  - vendió
  - vende
  lexicon: HALOT
  rationale: El perfecto hebreo en esta cláusula condicional señala una venta completada con efecto jurídico presente. El presente perfecto español («ha vendido») reproduce bien esa anterioridad con consecuencia actual.
- source_word: לְאִישׁ אַחֵר
  english_pob_choice: to another man
  chosen_spanish: a otro hombre
  alternatives_spanish:
  - a otra persona
  - a alguien más
  lexicon: HALOT
  rationale: Aunque «hombre» puede funcionar de modo genérico en español legal, aquí también refleja de forma más directa איש. Se conserva la fuerza del singular masculino del original, como hace la POB en inglés con «another man».
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: ya no
  alternatives_spanish:
  - de nuevo
  - otra vez
  - todavía
  lexicon: HALOT
  rationale: 'En esta frase legal, עוד no funciona como mera repetición temporal sino como cierre de posibilidad: después de la venta, la redención queda excluida. «Ya no» expresa con claridad esa prohibición permanente en español.'
theological_decisions:
- issue: Valor legal-sacral de גאל en Levítico 27
  english_pob_reading: redeem / be redeemed
  chosen_spanish_reading: rescatar / ser rescatado
  alternative_spanish_readings:
  - redimir / ser redimido
  - recomprar / poder ser recomprado
  rationale: Aunque el contexto es jurídico, el verbo גאל mantiene en Levítico su carga técnica de recuperación autorizada del bien. «Rescatar» preserva ese valor de liberación/recuperación sin forzar una interpretación más teológica de la necesaria; además permite una pasiva natural en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Tratamiento del masculino genérico en לְאִישׁ אַחֵר
  english_pob_reading: another man
  chosen_spanish_reading: otro hombre
  alternative_spanish_readings:
  - otra persona
  - alguien más
  rationale: La forma hebrea usa איש, masculino singular. La redacción española conserva esa huella léxica, siguiendo el criterio de precisión formal cuando el texto legal no exige neutralización semántica.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se siguió de cerca el audito inglés sin traducir mecánicamente: se mantuvieron la estructura condicional y el paralelismo activo/pasivo, pero se eligieron equivalentes españoles idiomáticos («Pero si», «ya no podrá ser rescatado») que conservan el sentido legal del hebreo. No hubo revisiones previas en el paquete, y el verificador indicó pleno acuerdo.'
  spanish_consistency_notes:
  - Se usa «rescatar» de manera consistente para גאל, manteniendo la relación entre la forma activa y la pasiva.
  - Se conserva el masculino singular de איש como «hombre» para reflejar la forma del hebreo y el inglés POB.
  - «Campo» se emplea como término base sin ampliar indebidamente a «tierra» o «terreno».
  - La partícula final עוֹד se interpreta aquí como cierre de posibilidad, por eso se traduce «ya no».
