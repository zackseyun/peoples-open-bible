    text: 'Hebreo literalmente: «si al escuchar escuchas la voz de Yahvé tu Dios», un modismo que expresa escucha atenta y obediente.'
    reason: lexical_alternative
  revision_rationale: Se revisa el verbo principal de la prótasis para reflejar con claridad la obediencia intensificada del hebreo, manteniendo a la vez 'la voz' como modismo pactual. Se añade 'entonces' para hacer explícita la consecuencia. El resto del texto se conserva por ser fiel, natural y terminológicamente coherente.
