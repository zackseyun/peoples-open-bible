translation:
  language: es
  text: Y Joroboam durmió con sus padres[a], con los reyes de Israel[b], y Zacarías, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acostó con sus padres»; el hebreo usa una fórmula convencional para la muerte de un rey.
    reason: lexical_alternative
  - marker: b
    text: O «entre los reyes de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de regnal summary para la muerte de un rey. En español, «se acostó» conserva el valor convencional de la fórmula sin volverla demasiado literal ni perder su sentido eufemístico. «Murió» explicita el sentido pero borra la fórmula; «durmió» suena más marcado y menos natural aquí.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: Se mantiene la fórmula tradicional del texto real. «Padres» sigue de cerca el hebreo y preserva el paralelismo con la expresión precedente; «antepasados» aclara el sentido pero debilita la forma idiomática.
- source_word: עִם מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: with the kings of Israel
  chosen_spanish: con los reyes de Israel
  alternatives_spanish:
  - entre los reyes de Israel
  - junto a los reyes de Israel
  lexicon: HALOT
  rationale: Se conserva el paralelismo de עִם como «con». La lectura directa refleja mejor la estructura hebrea que una paráfrasis como «entre», aunque esta sea una posible interpretación contextual.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: «Reinó» es la equivalencia estándar y concisa en avisos regios. «Comenzó a reinar» añade un matiz aspectual no expresado explícitamente por el hebreo.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: HALOT
  rationale: Se usa la forma española asentada del nombre propio. No requiere transliteración porque el nombre tiene equivalente bíblico estable en español.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: La filiación es directa y no presenta ambigüedad. «Su hijo» es natural en español y conserva la relación familiar sin sobrecarga.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: En contextos sucesorios, «en su lugar» transmite de manera idiomática la idea de reemplazo real. «En vez de él» es posible, pero menos propio del registro histórico-regio.
translation_notes:
  revision_awareness: 'Coincide con el corte inglés auditado: se conserva la fórmula regia idiomática, el paralelismo de עִם y la sucesión dinástica sin expansión interpretativa. No hay revisiones aplicadas en el inglés, y el borrador español sigue ese mismo estado estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «reyes» y no «monarcas» para sostener la correspondencia léxica con el hebreo y con el audit trail inglés.
  - El nombre propio se normaliza como «Zacarías», consistente con la tradición bíblica española.
  - La puntuación sigue el estilo narrativo español con coma tras el inciso del sujeto y cierre con punto final.
