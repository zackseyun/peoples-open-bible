base_translation:
  language: en
  yaml_path: translation/ot/ezra/001/003.yaml
  text: Whoever among all his people is among you[a], may his God be with him, and let him go up to Jerusalem, which is in Judah, and rebuild the house of Yahweh[b], the God of Israel—he is the God who is in Jerusalem.
  footnotes:
  - marker: a
    text: Or, 'and build the house of the LORD.' The Hebrew verb simply means 'build'; 'rebuild' makes explicit the restoration context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he is God who is in Jerusalem.' The Hebrew can be rendered more tersely, but the article favors 'the God.'
    reason: alternative_reading
