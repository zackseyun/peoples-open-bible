translation:
  language: es
  text: Después de esto, murió el rey de los amonitas, y Hanún, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Y aconteció después de esto
  - Más tarde
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea marca transición temporal. «Después de esto» conserva la secuencia sin añadir aspereza innecesaria ni interpretar más allá del texto.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó
  lexicon: HALOT
  rationale: El verbo מות expresa muerte de forma directa. «Murió» es el equivalente natural y fiel en español, sin suavizar el hecho.
- source_word: מֶלֶךְ בְּנֵ֣י עַמּ֑וֹן
  english_pob_choice: the king of the Ammonites
  chosen_spanish: el rey de los amonitas
  alternatives_spanish:
  - el rey de Amón
  - el rey de los hijos de Amón
  lexicon: HALOT
  rationale: La expresión בני עמון designa al pueblo amonita. En español, «amonitas» es la forma idiomática y transparente para la relación étnica/política.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: En este contexto de sucesión, מלך indica el acceso al trono. «Reinó» mantiene la correspondencia verbal y suena natural en español.
- source_word: חָנ֥וּן
  english_pob_choice: Hanun
  chosen_spanish: Hanún
  alternatives_spanish:
  - Hanun
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio al español; el acento gráfico ayuda a la pronunciación en lectura pública y es coherente con el uso hispano.
- source_word: בְּנ֖/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo pronominal remite al rey muerto. «Su hijo» es claro, conciso y fiel al referente.
- source_word: תַּחְתָּֽי/ו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - en lugar de él
  lexicon: HALOT
  rationale: La expresión de sucesión תחת + sufijo se puede rendir como «en su lugar» en español, que comunica la sustitución dinástica de manera natural.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el verbo de sucesión a una forma más cercana al hebreo («reigned»). El español conserva esa elección con «reinó», manteniendo la misma correspondencia semántica y el matiz de sucesión real.
  spanish_consistency_notes:
  - Se mantiene «amonitas» para בני עמון, conforme al uso bíblico estándar en español y sin oscurecer el valor étnico del constructo.
  - Se conserva el esquema narrativo breve del hebreo con una sola cláusula temporal inicial y dos acciones coordinadas.
  - No se introduce nota textual porque el hebreo masorético y el auditor inglés están en acuerdo alto, sin variantes relevantes.
