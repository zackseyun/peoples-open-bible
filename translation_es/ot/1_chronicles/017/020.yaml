translation:
  language: es
  text: ¡Oh Yahvé, no hay nadie como tú, y no hay Dios aparte de ti[a], en todo lo que hemos oído con nuestros propios oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hay Dios fuera de ti» / «no hay ningún dios excepto tú».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre del pacto YHWH con la forma española establecida por el proyecto. «Yahvé» comunica el nombre propio divino sin sustituirlo por un título.
- source_word: אֵין כָּמוֹךָ
  english_pob_choice: there is none like you
  chosen_spanish: no hay nadie como tú
  alternatives_spanish:
  - no hay otro como tú
  - no existe nadie semejante a ti
  lexicon: HALOT
  rationale: La negación existencial con el comparativo se expresa de modo natural en español como ausencia total de semejante. «Nadie» mantiene la fuerza universal de אֵין כָּמוֹךָ.
- source_word: וְאֵין אֱלֹהִים זוּלָתֶךָ
  english_pob_choice: and there is no God besides you
  chosen_spanish: y no hay Dios fuera de ti
  alternatives_spanish:
  - y no hay Dios además de ti
  - y no hay Dios aparte de ti
  - y no hay ningún dios excepto tú
  lexicon: HALOT
  rationale: «Fuera de ti» conserva bien el valor de זוּלָתֶךָ como exclusión/apartamiento. Se capitaliza «Dios» porque el contexto afirma la unicidad del Dios verdadero, no la existencia de deidades menores.
- source_word: בְּכֹל אֲשֶׁר שָׁמַעְנוּ
  english_pob_choice: in all that we have heard
  chosen_spanish: en todo lo que hemos oído
  alternatives_spanish:
  - según todo lo que hemos oído
  - en cuanto a todo lo que hemos oído
  - de todo lo que hemos oído
  lexicon: HALOT
  rationale: La frase hebrea se entiende como ámbito de lo oído, y el castellano «en todo lo que hemos oído» es fluido y fiel. Se evita «según» porque podría introducir una relación demasiado interpretativa.
- source_word: בְּאָזְנֵינוּ
  english_pob_choice: with our own ears
  chosen_spanish: con nuestros propios oídos
  alternatives_spanish:
  - con nuestros oídos
  - en nuestros oídos
  lexicon: HALOT
  rationale: La imagen corporal de oír de primera mano se mantiene con una expresión idiomática clara. «Propios» reproduce la fuerza enfática de la experiencia directa.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Se preserva el nombre propio del pacto, conforme a la convención del proyecto, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la confesión exclusiva
  english_pob_reading: there is no God besides you
  chosen_spanish_reading: no hay Dios fuera de ti
  alternative_spanish_readings:
  - no hay ningún dios excepto tú
  - no hay Dios aparte de ti
  rationale: La formulación sostiene una afirmación exclusiva, no solo comparativa. «Fuera de ti» conserva la negación de toda deidad distinta del Yahvé confesado.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que ajustó 'according to all that' a 'in all that', reflejada aquí como «en todo lo que». También se preserva la lectura exclusiva de la segunda cláusula, sin suavizarla a una mera comparación entre seres divinos.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma fija para YHWH.
  - Se capitaliza «Dios» en sentido del único Dios verdadero.
  - Se evita el calco rígido «según todo lo que» porque el hebreo expresa mejor el ámbito de lo oído que una norma o criterio.
  - La nota a ofrece la alternativa de puntuación/segmentación sin alterar el contenido sustantivo.
