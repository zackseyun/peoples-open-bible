translation:
  language: es
  text: Y Gorgias y la tropa están en la región montañosa cerca de nosotros[a]. Pero ahora hagan frente a nuestros enemigos y peleen contra ellos, y después de esto tomen los despojos con valentía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el monte cerca de nosotros». El griego ἐν τῷ ὄρει puede referirse a un monte específico o, más ampliamente, a la región montañosa.
    reason: lexical_alternative
  - marker: b
    text: O «con confianza» o «con atrevimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γοργίας
  english_pob_choice: Gorgias
  chosen_spanish: Gorgias
  alternatives_spanish:
  - Gorjias
  lexicon: transliteración de nombre propio
  rationale: El nombre propio se translitera de forma directa; "Gorgias" es la forma normal y transparente en español bíblico.
- source_word: δύναμις
  english_pob_choice: force
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el ejército
  - las tropas
  lexicon: LSJ
  rationale: En contexto militar, δύναμις denota un contingente armado. "La fuerza" conserva la amplitud semántica de la elección inglesa sin especificar indebidamente tamaño u ორგანიზación militar.
- source_word: ἐν τῷ ὄρει
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en el monte
  - en la zona de montes
  lexicon: LSJ
  rationale: El griego puede referirse a un monte concreto o a una zona montañosa; "región montañosa" mantiene esa amplitud y suena natural en español.
- source_word: ἐγγὺς ἡμῶν
  english_pob_choice: near us
  chosen_spanish: cerca de nosotros
  alternatives_spanish:
  - próximo a nosotros
  - a nuestro lado
  lexicon: LSJ
  rationale: Expresa de manera directa la inmediatez espacial de la amenaza.
- source_word: στῆτε
  english_pob_choice: stand against
  chosen_spanish: manténganse frente a
  alternatives_spanish:
  - pónganse frente a
  - resistan frente a
  lexicon: LSJ
  rationale: En español, "mantenerse frente a" comunica la idea de resistir y hacer frente con firmeza en combate sin sonar forzado.
- source_word: πολεμήσατε
  english_pob_choice: fight
  chosen_spanish: peleen contra
  alternatives_spanish:
  - combatan contra
  - hagan guerra contra
  lexicon: LSJ
  rationale: '"Peleen contra" es una equivalencia natural y directa para el mandato bélico; evita un giro demasiado arcaico.'
- source_word: σκῦλα
  english_pob_choice: the spoils
  chosen_spanish: los despojos
  alternatives_spanish:
  - el botín
  - el saqueo
  lexicon: LSJ
  rationale: '"Despojos" reproduce el sustantivo de resultado tras la victoria y conserva el registro bíblico sin convertirlo en un término más coloquial como "botín".'
- source_word: μετὰ παρρησίας
  english_pob_choice: with boldness
  chosen_spanish: con valentía
  alternatives_spanish:
  - con confianza
  - abiertamente
  lexicon: LSJ
  rationale: παρρησία aquí comunica libertad de acción y ausencia de temor después de la victoria. "Con valentía" mantiene la fuerza exhortativa en un español natural.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la solución inglesa auditada, manteniendo la ambigüedad geográfica de ἐν τῷ ὄρει y la amplitud de παρρησία; no se introdujeron cambios de revisión relevantes.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" o equivalentes porque no hay aquí vocabulario divino.
  - Se mantuvo un registro militar sobrio y bíblico, con "despojos" para σκῦλα y "con valentía" para παρρησία.
  - La sintaxis intenta ser natural en español sin perder la secuencia imperativa del griego.
