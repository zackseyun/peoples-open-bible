  rationale: Se ajusta 'moradas' a 'asentamientos' para reflejar con más precisión y naturalidad el sentido clasificatorio de לְמֹשְׁבֹתָם en este contexto territorial/genealógico. También se eliminan comas innecesarias para mejorar la fluidez y alinearse con la revisión inglesa ya auditada. El resto del texto se conserva por ser fiel al hebreo y al razonamiento léxico-teológico documentado.
