  text: וַ/יַּשְׁכֵּ֨ם דָּוִ֜ד בַּ/בֹּ֗קֶר וַ/יִּטֹּ֤שׁ אֶת הַ/צֹּאן֙ עַל שֹׁמֵ֔ר וַ/יִּשָּׂ֣א וַ/יֵּ֔לֶךְ כַּ/אֲשֶׁ֥ר צִוָּ֖/הוּ יִשָׁ֑י וַ/יָּבֹא֙ הַ/מַּעְגָּ֔לָ/ה וְ/הַ/חַ֗יִל הַ/יֹּצֵא֙ אֶל הַ/מַּ֣עֲרָכָ֔ה וְ/הֵרֵ֖עוּ בַּ/מִּלְחָמָֽה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/020.yaml
  text: So David rose early in the morning[a], left the sheep with a keeper, took the supplies, and went, just as Jesse had commanded him[b]. He came to the encampment as the army was going out to the battle line and shouting the war cry.
  footnotes:
  - marker: a
    text: Or 'the camp-circle' or 'the wagon-rampart'; the Hebrew term may refer more specifically to the camp's circular formation or defensive perimeter.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and they shouted in/for the battle.'
    reason: lexical_alternative
