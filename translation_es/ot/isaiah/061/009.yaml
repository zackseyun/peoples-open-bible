translation:
  language: es
  text: Su descendencia será conocida entre las naciones[a], y sus descendientes en medio de los pueblos[b]; todos los que los vean reconocerán que ellos son descendencia bendecida por Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre los gentiles» para «entre las naciones».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa «semilla» en ambas ocurrencias de זֶרַע; aquí se vierte como «descendencia» para un español más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנוֹדַע
  english_pob_choice: will be known
  chosen_spanish: será conocida
  alternatives_spanish:
  - será hecha conocida
  - será reconocida
  lexicon: HALOT
  rationale: El nifal de ידע admite un sentido pasivo/reflexivo de ‘ser conocido’ o ‘ser reconocido’. En español, ‘será conocida’ conserva ese valor sin añadir una agencia explícita que el hebreo no exige.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  lexicon: HALOT
  rationale: גוים aquí funciona en el sentido amplio de pueblos o naciones. ‘Entre las naciones’ preserva ese alcance internacional y evita introducir una distinción judíos/gentiles que el verso no explicita.
- source_word: זַרְעָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - sus hijos
  lexicon: HALOT
  rationale: זֶרַע es un sustantivo colectivo. ‘Su descendencia’ comunica bien el sentido colectivo y es natural en español; ‘semilla’ sonaría más técnico o metafórico en este contexto.
- source_word: וְצֶאֱצָאֵיהֶם
  english_pob_choice: their descendants
  chosen_spanish: sus vástagos
  alternatives_spanish:
  - sus descendientes
  - su descendencia
  lexicon: HALOT
  rationale: El término añade un paralelismo cercano a זרע. ‘Vástagos’ mantiene un matiz poético y evita repetir exactamente ‘descendencia’, pero sigue siendo comprensible en español bíblico contemporáneo.
- source_word: בְּתוֹךְ הָעַמִּים
  english_pob_choice: in the midst of the peoples
  chosen_spanish: en medio de los pueblos
  alternatives_spanish:
  - en medio de las gentes
  - entre los pueblos
  lexicon: HALOT
  rationale: ‘En medio de’ reproduce la imagen espacial de בתוך. ‘Pueblos’ refleja עמים como grupos distintos; ‘gentes’ sería más idiomático en algunos registros pero menos preciso al paralelismo hebreo.
- source_word: כָּל רֹאֵיהֶם
  english_pob_choice: all who see them
  chosen_spanish: todos los que los vean
  alternatives_spanish:
  - todos sus observadores
  - todos los que los miran
  lexicon: HALOT
  rationale: El participio se vierte naturalmente como relativa en español. ‘Los vean’ conserva la generalidad del hebreo y fluye mejor que una formulación nominalizada.
- source_word: יַכִּירוּם
  english_pob_choice: will recognize that they are
  chosen_spanish: reconocerán que ellos son
  alternatives_spanish:
  - reconocerán a ellos
  - los reconocerán como
  lexicon: HALOT
  rationale: El verbo נכר en hifil puede significar reconocer o identificar. En español, ‘reconocerán que ellos son’ evita un objeto duplicado torpe y recoge la estructura de contenido que el texto establece.
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  lexicon: HALOT
  rationale: El hebreo repite el mismo lexema; en español, ‘descendencia’ permite mantener la idea colectiva y enlazar con el comienzo del versículo sin sonar arcaico.
- source_word: בֵּרַךְ
  english_pob_choice: blessed
  chosen_spanish: bendecida
  alternatives_spanish:
  - bendita
  - que Yahvé ha bendecido
  lexicon: HALOT
  rationale: La forma participial funciona adjetivamente. ‘Bendecida’ conserva el valor pasivo; concuerda con ‘descendencia’ como sustantivo colectivo femenino en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ‘Yahvé’. Esto preserva el nombre divino en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. Siguiendo la política del proyecto, se traslada como ‘Yahvé’ para mantener visible el nombre del pacto y no reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de זֶרַע aplicado dos veces
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - semilla
  - linaje
  rationale: En este contexto poético-profético, el doble uso de זֶרַע apunta a un grupo humano descendiente y bendecido. ‘Descendencia’ conserva el sentido colectivo y evita la connotación botánica de ‘semilla’ en español.
  doctrine_reference: HALOT; paralelismo poético del versículo
- issue: Relación entre ‘ser conocida’ y ‘reconocerán’
  english_pob_reading: will be known / will recognize
  chosen_spanish_reading: será conocida / reconocerán
  alternative_spanish_readings:
  - será reconocida / identificarán
  rationale: Mantengo la tensión del hebreo entre el estado público de la descendencia y la reacción de los observadores. El verso no sólo afirma que se les identificará, sino que serán reconocidos como portadores de bendición.
  doctrine_reference: Estructura verbal de נודע / נכר en el verso
translation_notes:
  revision_awareness: La versión en inglés fue revisada para eliminar el pronombre objeto redundante después de ‘recognize’, quedando ‘will recognize that they are’. En español se refleja directamente esa estructura con ‘reconocerán que ellos son’, sin un objeto duplicado adicional. También se conservó el paralelismo del hebreo entre זרע y צאצאים, aunque con una solución estilística distinta en la segunda mitad para evitar monotonía.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, según la convención del proyecto.
  - ‘Naciones’ y ‘pueblos’ se mantienen diferenciados para reflejar גוים / עמים.
  - Se evita ‘Cristo’, ‘SEÑOR’ y ‘siervo’ porque no corresponden a este versículo.
  - La segunda mitad del verso conserva el complemento de contenido con ‘que ellos son’, siguiendo el audit trail inglés.
  - Los marcadores [a] y [b] aparecen solo donde corresponde en el texto principal.
