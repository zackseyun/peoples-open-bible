id: LUK.14.26
reference: 'Luke 14:26'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἴ τις ἔρχεται πρός με καὶ οὐ μισεῖ τὸν πατέρα ⸀ἑαυτοῦ καὶ τὴν μητέρα καὶ τὴν γυναῖκα καὶ τὰ τέκνα καὶ τοὺς ἀδελφοὺς καὶ τὰς ἀδελφάς, ἔτι ⸀τε καὶ τὴν ⸂ψυχὴν ἑαυτοῦ⸃, οὐ δύναται ⸂εἶναί μου μαθητής⸃.
base_translation:
  language: en
  yaml_path: translation/nt/luke/014/026.yaml
  text: 'If anyone comes to me and does not hate his own father and mother and wife and children and brothers and sisters—and even his own life—he cannot be my disciple[a][b].'
  footnotes:
  - marker: a
    text: 'Or ''does not love ... less.'' The verb is literally ''hate,'' but in this context it expresses a demand that loyalty to Jesus take precedence over even the closest family ties; compare Matt 10:37.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''his own soul.'' Here ''life'' reflects the likely sense of ψυχή in the context of the cost of discipleship.'
    reason: lexical_alternative
translation:
  language: ko
  text: 「누구든지 내게로 와서 자기 부모와 처자와 형제와 자매와 심지어 자기 목숨까지도 미워하지 아니하면, 내 제자가 될 수 없다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: '14:26 μισέω의 셈어적 비교 어법 — 「미워하다」의 직역 보존'
  chosen_reading: 미워하지 아니하면 ... 내 제자가 될 수 없다
  alternative_readings:
  - 더 사랑하지 아니하면
  - 덜 사랑하지 아니하면
  rationale: '헬라어 μισέω는 셈어 어법에서 「덜 사랑하다 / 우선순위에서 밀어내다」를 표현하는 강한 대조적 비교 어법이다(창 29:31, 신 21:15-17, 마 6:24 참조). 마 10:37은 같은 사상을 「더 사랑하면 ... 합당치 아니하다」로 풀어 썼다. 본 번역은 누가의 「미워하다」 직역을 유지하되, 한국 독자에게 익숙한 「더 사랑하다」 어법으로 풀어내지 않는다 — 제자됨의 절대적 우선순위라는 본문의 무게가 그 직역 충격으로 전달되기 때문이다.'
  doctrine_reference: DOCTRINE.md §1; §5
