translation:
  language: es
  text: treinta camellas que amamantaban y sus crías, cuarenta vacas y diez toros, veinte asnas y diez pollinos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diez asnillos» o «diez crías de asno»; el término hebreo puede referirse a un asno joven, pero en esta lista de ganado también podría entenderse como asnos machos emparejados con las asnas.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellas
  alternatives_spanish:
  - camellos
  lexicon: HALOT
  rationale: El sustantivo está en plural masculino en hebreo, pero aquí se especifica con מֵינִיקוֹת, es decir, animales que amamantan; en español conviene explicitar el sexo con «camellas» para reflejar la concordancia natural con «que amamantaban».
- source_word: מֵינִיקוֹת
  english_pob_choice: nursing
  chosen_spanish: que amamantaban
  alternatives_spanish:
  - lactantes
  - que daban de mamar
  lexicon: HALOT
  rationale: El participio indica hembras que están dando leche a sus crías. «Que amamantaban» conserva la acción concreta y suena natural en español.
- source_word: וּבְנֵיהֶם
  english_pob_choice: and their young
  chosen_spanish: y sus crías
  alternatives_spanish:
  - y sus jóvenes
  - y sus hijos
  lexicon: HALOT
  rationale: En contexto animal, «crías» comunica mejor que «hijos» o «jóvenes» la relación de descendencia de los camellos.
- source_word: פָּרוֹת
  english_pob_choice: cows
  chosen_spanish: vacas
  alternatives_spanish:
  - hembras bovinas
  - reses
  lexicon: HALOT
  rationale: Es la manera más natural y precisa de rendir el femenino plural de ganado bovino en español.
- source_word: וּפָרִים
  english_pob_choice: and ten bulls
  chosen_spanish: y diez toros
  alternatives_spanish:
  - y diez bueyes
  lexicon: HALOT
  rationale: פָרִים son machos de ganado bovino; «toros» conserva la distinción sexual del inventario mejor que «bueyes».
- source_word: אֲתֹנוֹת
  english_pob_choice: female donkeys
  chosen_spanish: asnas
  alternatives_spanish:
  - asnas hembras
  - burras
  lexicon: HALOT
  rationale: «Asnas» es breve y fiel al femenino específico; en español bíblico puede sonar más digno que una glosa larga.
- source_word: וַעְיָרִם
  english_pob_choice: ten foals
  chosen_spanish: diez pollinos
  alternatives_spanish:
  - diez crías de asno
  - diez potros
  lexicon: HALOT
  rationale: El término puede referirse a asnos jóvenes. Dado que la lista contrasta con las asnas, «pollinos» transmite bien la idea de crías de asno sin forzar sexo adulto o una relación técnica de cría.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió el final de «ten male donkeys» a «ten foals» para reflejar mejor וַעְיָרִם como animales jóvenes. El español sigue esa revisión con «pollinos», y además ajusta el inicio a «camellas que amamantaban» para hacer explícita la concordancia semántica del participio hebreo.
  spanish_consistency_notes:
  - Se mantiene el estilo de lista de animales con numerales cardinales explícitos.
  - Se evita «SEÑOR» o terminología teológica no pertinente al versículo.
  - Se prioriza vocabulario zoológico claro y contemporáneo, sin introducir explicaciones ajenas al texto.
  - «Pollinos» se usa como equivalente bíblicamente inteligible de jóvenes asnos, manteniendo la ambigüedad de edad sin imponer sexo adulto.
