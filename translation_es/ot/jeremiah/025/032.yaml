translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: «He aquí[a], la calamidad está saliendo de nación a nación[b], y una gran tormenta se está levantando[c] desde los extremos de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira» o «Miren». El hebreo הִנֵּה es un marcador deíctico que llama la atención con urgencia profética.
    reason: lexical_alternative
  - marker: b
    text: O «de una nación a otra». El hebreo puede expresar propagación sucesiva entre naciones.
    reason: alternative_reading
  - marker: c
    text: O «desde las partes más lejanas de la tierra» o «desde los confines de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Mantiene la fórmula profética solemne y directa sin sonar artificial en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración, conforme a la pauta del proyecto, en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: ‘Ejércitos’ comunica bien la amplitud del título divino en español y evita un giro demasiado arcaico; ‘hosts’ no es idiomático en español.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: Se preserva la fuerza deíctica y exhortativa con un español natural y digno; ‘He aquí’ sería más literal, pero más arcaizante.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desastre
  - mal
  lexicon: HALOT
  rationale: En este contexto de juicio, la palabra apunta a calamidad destructiva, no a mal moral. ‘Calamidad’ conserva esa tensión semántica sin sugerir culpa ética en Dios.
- source_word: יֹצֵאת
  english_pob_choice: is going out
  chosen_spanish: está saliendo
  alternatives_spanish:
  - sale
  - está yendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso o inminente; el presente progresivo español la comunica con naturalidad.
- source_word: מִגּוֹי אֶל גּוֹי
  english_pob_choice: from nation to nation
  chosen_spanish: de nación a nación
  alternatives_spanish:
  - de un pueblo a otro
  - de una nación a otra
  lexicon: HALOT
  rationale: ‘Nación’ reproduce con precisión el alcance del paralelismo y mantiene el ritmo breve del hebreo. Se evita añadir ‘una’ porque el hebreo es más general.
- source_word: וְסַעַר גָּדוֹל
  english_pob_choice: a great storm
  chosen_spanish: una gran tormenta
  alternatives_spanish:
  - un gran temporal
  - una gran tempestad
  lexicon: HALOT
  rationale: ‘Tormenta’ es claro y vigoroso en español; ‘gran’ conserva el énfasis del adjetivo hebreo.
- source_word: יֵעוֹר
  english_pob_choice: is being stirred up
  chosen_spanish: está siendo despertada
  alternatives_spanish:
  - está siendo agitada
  - será despertada
  - está siendo levantada
  lexicon: HALOT
  rationale: El verbo niphal conserva la idea de ser despertado/avivado. Con ‘tormenta’ en español, ‘despertada’ reproduce la imagen dinámica sin forzar un verbo impersonal.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  english_pob_choice: from the farthest parts of the earth
  chosen_spanish: desde los extremos de la tierra
  alternatives_spanish:
  - desde las partes más lejanas de la tierra
  - desde los confines de la tierra
  lexicon: HALOT
  rationale: La expresión idiomática hebrea señala lejanía extrema; ‘extremos’ conserva la imagen espacial y el tono bíblico, con buen entendimiento en español.
theological_decisions:
- issue: Sentido de רָעָה en un oráculo de juicio
  english_pob_reading: Rendered as 'disaster' rather than 'evil'
  chosen_spanish_reading: ‘calamidad’ en vez de ‘mal’
  alternative_spanish_readings:
  - mal
  - desastre
  rationale: En este contexto, la referencia es a juicio destructivo que avanza entre naciones. ‘Calamidad’ evita atribuir mal moral a Yahvé y preserva la tensión lexical del hebreo.
  doctrine_reference: Principio de primacía del texto original; evitar importar una implicación doctrinal que el término no exige.
translation_notes:
  revision_awareness: El testigo inglés revisado permanece estable; no hubo cambios aplicados en la última pasada, y la presente propuesta sigue el mismo sentido global con ajustes naturales al español.
  spanish_consistency_notes:
  - Se usa Yahvé conforme al estándar del proyecto para יְהוָה.
  - Se eligió ‘de los ejércitos’ para צְבָאוֹת por claridad idiomática y consistencia terminológica.
  - Se mantiene la distinción entre calamidad/desgracia y mal moral al traducir רָעָה.
  - 'Se conserva el paralelismo de movimiento y extensión geográfica: de nación a nación / desde los extremos de la tierra.'
  - Se evita una versión demasiado literal que sonaría ajena al español, pero sin perder la imaginería profética.
