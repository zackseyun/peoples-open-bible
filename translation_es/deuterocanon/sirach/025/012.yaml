    issue: «se mantiene firme en él» para ὁ κρατῶν αὐτοῦ
    rationale: κρατέω aquí comunica asir, retener o poseer con firmeza. «Mantenerse firme en él» introduce una relación locativa/estativa no explícita y debilita el matiz de posesión o asimiento señalado por el inglés auditado.
  - severity: low
