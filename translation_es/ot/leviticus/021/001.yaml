translation:
  language: es
  text: 'Y Yahvé dijo a Moisés: «Habla a los sacerdotes, los hijos de Aarón, y diles: Ninguno se hará impuro por un muerto[a] entre su pueblo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por una נֶפֶשׁ (nefesh)»; en este contexto de pureza, un giro idiomático para una persona muerta o un cadáver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un título sustitutivo. 'Yahvé' sigue el valor transliterado usado por la POB en inglés y es estándar en español bíblico académico y eclesial moderno.
- source_word: אֱמֹר ... וְאָמַרְתָּ
  english_pob_choice: Speak ... and say
  chosen_spanish: Habla ... y diles
  alternatives_spanish:
  - Di ... y diles
  - Habla ... y di
  lexicon: HALOT
  rationale: El hebreo repite אמר para introducir la orden y luego su contenido. 'Habla ... y diles' preserva la repetición con español natural y refleja el carácter imperativo/deliverativo del mandato.
- source_word: הַכֹּהֲנִים בְּנֵי אַהֲרֹן
  english_pob_choice: the priests, the sons of Aaron
  chosen_spanish: los sacerdotes, los hijos de Aarón
  alternatives_spanish:
  - los sacerdotes, los descendientes de Aarón
  - los sacerdotes, Aaronitas
  lexicon: HALOT
  rationale: '''Hijos de Aarón'' reproduce la identificación apposicional y la filiación sacerdotal concreta. ''Sacerdotes'' mantiene el término funcional claro en español; ''hijos'' evita suavizar la relación familiar-covenantal.'
- source_word: לְנֶפֶשׁ
  english_pob_choice: for a dead person
  chosen_spanish: por un muerto
  alternatives_spanish:
  - por un cadáver
  - por una persona muerta
  lexicon: HALOT
  rationale: En este contexto de pureza ritual, נֶפֶשׁ designa idiomáticamente al difunto/cuerpo muerto como foco de impureza. 'Muerto' es breve, natural y suficientemente claro; evita el literal 'alma' y también el posible tecnicismo excesivo de 'cadáver'.
- source_word: יִטַּמָּא
  english_pob_choice: shall not make himself unclean
  chosen_spanish: se hará impuro
  alternatives_spanish:
  - se contaminará ritualmente
  - se defile
  lexicon: HALOT
  rationale: La POB en inglés opta por el lenguaje ritual, no moral. En español, 'se hará impuro' mantiene la categoría cultual y evita 'mancharse/contaminarse' con sobrecarga ética. El sujeto implícito plural se refleja con 'Ninguno'.
- source_word: בְּעַמָּיו
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - entre los suyos
  - entre su gente
  lexicon: HALOT
  rationale: '''Entre su pueblo'' conserva la referencia comunitaria y el marco pactal. ''Entre'' traduce adecuadamente la relación locativa/social del hebreo sin introducir una restricción familiar que el versículo no explicita.'
theological_decisions:
- issue: Impureza ritual vs. pecado moral
  english_pob_reading: Render as ritual impurity language ('make himself unclean') rather than moral pollution language.
  chosen_spanish_reading: Traducir con lenguaje de impureza ritual ('se hará impuro') y no con lenguaje moralizante.
  alternative_spanish_readings:
  - se contaminará
  - se manchará
  rationale: El contexto es legislación sacerdotal sobre contaminación por cadáver, no una afirmación sobre culpa moral. El español debe conservar la categoría cultual para no desplazar el sentido bíblico del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sujeto plural implícito de la prohibición
  english_pob_reading: None shall make himself unclean ...
  chosen_spanish_reading: Ninguno se hará impuro ...
  alternative_spanish_readings:
  - Un sacerdote no se hará impuro ...
  - Ninguno de ellos se hará impuro ...
  rationale: El hebreo dirige la orden a los sacerdotes en plural; la revisión inglesa corrigió el singular. 'Ninguno' refleja mejor la distribución plural sin perder solemnidad ni precisar indebidamente un singular genérico.
  doctrine_reference: Applied revision pass 2026-04-23T11:11:15Z
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que cambió 'A priest shall not' por 'None shall' para reflejar con mayor precisión el plural hebreo dirigido a los sacerdotes. El español adopta igualmente un sujeto plural distributivo ('Ninguno') y conserva la terminología ritual de impureza.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para el Tetragrámaton en todo el registro.
  - Se conserva 'sacerdotes' para כהנים y 'hijos de Aarón' para la identificación sacerdotal específica.
  - '''Impuro'' se usa en sentido ritual, coherente con la POB inglesa y con la ley de pureza levítica.'
  - La nota [a] explica la equivalencia idiomática de נֶפֶשׁ sin reemplazarla por 'alma'.
