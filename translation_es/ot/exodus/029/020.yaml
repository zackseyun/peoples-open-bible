translation:
  language: es
  text: Entonces sacrificarás el carnero[a], tomarás algo de su sangre y la pondrás sobre el lóbulo de la oreja derecha de Aarón, sobre el lóbulo de la oreja derecha de sus hijos, sobre el pulgar de su mano derecha y sobre el dedo gordo de su pie derecho; y arrojarás[b] la sangre contra el altar por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «punta de la oreja derecha de Aarón ... punta de la oreja derecha de sus hijos». El término hebreo puede designar más ampliamente el extremo de la oreja, aunque «lóbulo» es el sentido más probable en este contexto ritual.
    reason: lexical_alternative
  - marker: b
    text: O «la lanzarás contra el altar por todos lados». El verbo hebreo sugiere una aplicación ritual enérgica más que una aspersión suave.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַטְתָּ / שָׁחַט
  english_pob_choice: slaughter
  chosen_spanish: sacrificarás
  alternatives_spanish:
  - matarás
  - degollarás
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo describe la matanza ritual del animal. En español, «sacrificarás» comunica la acción cultual con naturalidad; «degollarás» sería más literal pero más duro, y «matarás» demasiado general.
- source_word: הָאַיִל / אַיִל
  english_pob_choice: ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  - el carnero sacrificial
  lexicon: HALOT
  rationale: «Carnero» es el equivalente idiomático y preciso en español para el animal sacrificial especificado.
- source_word: מִדָּמוֹ
  english_pob_choice: some of its blood
  chosen_spanish: algo de su sangre
  alternatives_spanish:
  - parte de su sangre
  - de su sangre
  lexicon: HALOT
  rationale: La partícula מִן aquí expresa la toma de una porción para su aplicación ritual. «Algo de su sangre» refleja bien esa porción sin forzar una traducción demasiado técnica.
- source_word: תְּנוּךְ אֹזֶן
  english_pob_choice: lobe of ... ear
  chosen_spanish: lóbulo de la oreja
  alternatives_spanish:
  - punta de la oreja
  - extremo de la oreja
  lexicon: HALOT
  rationale: «Lóbulo» es la opción española más natural y concreta en este contexto ritual, manteniendo la decisión léxica del POB inglés.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - del lado derecho
  lexicon: HALOT
  rationale: El adjetivo señala el miembro del lado derecho; en español se expresa con el adjetivo pospuesto, de forma natural y fiel.
- source_word: בֹּהֶן יָד
  english_pob_choice: thumb
  chosen_spanish: pulgar
  alternatives_spanish:
  - dedo pulgar
  lexicon: HALOT
  rationale: El término hebreo designa el pulgar de la mano; «pulgar» es la equivalencia anatómica estándar en español.
- source_word: בֹּהֶן רֶגֶל
  english_pob_choice: big toe
  chosen_spanish: dedo gordo del pie
  alternatives_spanish:
  - gordo del pie
  - primer dedo del pie
  lexicon: HALOT
  rationale: Para el pie, el hebreo designa el dedo mayor; «dedo gordo del pie» es claro, actual y preciso.
- source_word: וְזָרַקְתָּ / זָרַק
  english_pob_choice: throw ... against
  chosen_spanish: rociarás
  alternatives_spanish:
  - arrojarás
  - echarás
  - salpicarás
  lexicon: HALOT
  rationale: Aunque el hebreo sugiere una aplicación ritual enérgica, en español «rociarás» conserva el registro cultual y la idea de dispersión sobre el altar con mayor naturalidad que «arrojarás» o «salpicarás». Se mantiene el valor ritual sin excesiva literalidad mecánica.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por alrededor
  lexicon: HALOT
  rationale: «Alrededor» reproduce el sentido distributivo de cobertura completa en torno al altar y suena natural en español.
theological_decisions:
- issue: 'Naturaleza de la acción con la sangre: «throw ... against» frente a una imagen más suave'
  english_pob_reading: The Hebrew verb suggests a forceful ritual application rather than a gentle sprinkling.
  chosen_spanish_reading: Se mantiene el carácter ritual de la aplicación de la sangre sin traducirlo como una aspersión suave o meramente decorativa.
  alternative_spanish_readings:
  - salpicarás la sangre alrededor del altar
  - esparcirás la sangre alrededor del altar
  rationale: La nota inglesa distingue entre una acción ritual enérgica y una aspersión leve. En español, «rociarás» puede sonar más suave, pero en este contexto todavía comunica un gesto litúrgico de aplicación; se conserva sin explicitar violencia física innecesaria, dado que el verso describe el rito y no el modo exacto de impacto.
  doctrine_reference: Levítico 1–8; Hebreos 9:22
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el auditable inglés POB sin cambios de revisión recientes; la coincidencia del control cruzado es alta y el contenido inglés quedó sin modificaciones en el último pase.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene «carnero» para אַיִל, coherente con el uso sacrificial.
  - Se conserva la secuencia ritual con verbos en futuro de mandato, como en el hebreo con waw consecutiva en contexto instructivo.
  - «Pulgar» y «dedo gordo del pie» siguen la equivalencia anatómica documentada en el audit trail inglés.
