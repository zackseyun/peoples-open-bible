review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: mandato de colocar/engastar, referencia al objeto con ''en él'', ''cuatro hileras'', y la enumeración de las tres piedras de la primera hilera. Sin embargo, se aparta innecesariamente del rastro auditado del POB en la elección de אֹדֶם: el inglés documentó ''ruby'' como opción principal con nota de incertidumbre, mientras que el español puso ''cornalina'' como texto base e invirtió la nota.'
  spanish_quality_summary: 'El español es claro y natural, pero conviene ajustar dos puntos para mayor fidelidad y fluidez: ''engastes de piedra'' suena menos natural que ''engastes de piedras'' y contradice la propia decisión léxica contextual colectiva; además, ''será de una cornalina'' resulta algo pesado en una lista de gemas, donde ''será un rubí, un topacio y una esmeralda'' es más directo.'
  glossary_alignment: 'No hay conflictos con la terminología teológica global. El asunto principal es alinearse con la decisión léxica documentada del POB para אֹדֶם: usar ''rubí'' en el texto principal y conservar ''cornalina'' como alternativa en nota. También conviene armonizar מִלֻּאַת אֶבֶן con el sentido colectivo ya reconocido: ''engastes de piedras''.'
  issues:
  - severity: medium
    issue: אֹדֶם fue traducido como 'cornalina' en el texto principal.
    rationale: El inglés POB auditado eligió 'ruby' como forma principal, con 'carnelian' en nota por la incertidumbre mineral. El español debe preservar esa decisión salvo razón fuerte documentada, que aquí no se dio.
  - severity: medium
    issue: '''engastes de piedra'' debería ser ''engastes de piedras''.'
    rationale: El hebreo singular funciona colectivamente en contexto, y tanto el inglés POB como la propia nota léxica española reconocen el valor plural. En español, el plural suena más natural y preciso para varias gemas.
  - severity: low
    issue: La nota al pie invierte la relación principal/alternativa para la primera gema.
    rationale: Si el texto principal dice 'rubí', la nota debe indicar que también puede corresponder a 'cornalina', no al revés.
  revised_spanish_text: 'Y pondrás en él engastes de piedras[a], cuatro hileras de piedras: la primera hilera será un rubí, un topacio y una esmeralda.'
  revised_footnotes:
  - marker: a
    text: La identificación precisa de estas gemas es incierta. ‘Rubí’ también puede corresponder a ‘cornalina’; ‘topacio’ también puede corresponder a ‘crisólito’ o ‘peridoto’; ‘esmeralda’ también puede corresponder a ‘berilo’.
    reason: lexical_alternative
  revision_rationale: Se revisa para mantener la decisión léxica principal del POB auditado para אֹדֶם ('rubí') con la alternativa en nota, y para mejorar la naturalidad y precisión de מִלֻּאַת אֶבֶן como 'engastes de piedras'. El resto de la sintaxis y la secuencia de piedras se conserva.
