translation:
  language: es
  text: El impío verá y se enojará[a]; rechinará los dientes y se derretirá; el deseo de los impíos perecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los impíos verán y se enojarán»; el singular hebreo «impío» es representativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - el impío, en singular representativo
  - un impío
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo masculino singular de valor representativo. En español, «el impío» conserva esa singularidad sin introducir innecesariamente «hombre», que sonaría menos natural aquí, pero deja claro que no se trata de un plural genérico en la forma del original.
- source_word: יִרְאֶה
  english_pob_choice: will see
  chosen_spanish: lo verá
  alternatives_spanish:
  - verá
  - lo verá y verá
  lexicon: HALOT
  rationale: El imperfecto qal expresa acción futura en el contexto poético. Se traduce con futuro simple; el pronombre «lo» recoge implícitamente el cuadro de prosperidad/honor de los justos en el salmo sin añadir contenido ajeno.
- source_word: וְכָעָס
  english_pob_choice: and be angry
  chosen_spanish: y se enojará
  alternatives_spanish:
  - y se irritará
  - y se enfurecerá
  lexicon: HALOT
  rationale: כעס expresa enojo, irritación o resentimiento. «Se enojará» es una equivalencia natural y sobria en español; evita intensificar demasiado el matiz emocional sin perder la reacción hostil.
- source_word: שִׁנָּיו יַחֲרֹק
  english_pob_choice: he will gnash his teeth
  chosen_spanish: crujirá sus dientes
  alternatives_spanish:
  - rechinará los dientes
  - hará rechinar sus dientes
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y expresa rabia/frustración. En español, «rechinará los dientes» es la equivalencia más idiomática; sin embargo, «crujirá sus dientes» mantiene la imaginería sonora del original y la tensión poética sin introducir un modismo demasiado fijado. Se preserva el carácter figurado de la acción.
- source_word: וְנָמָס
  english_pob_choice: and melt away
  chosen_spanish: y se derretirá
  alternatives_spanish:
  - y se consumirá
  - y se deshará
  lexicon: HALOT
  rationale: La forma verbal transmite disolución, derretimiento o debilitamiento. «Se derretirá» conserva la metáfora vívida del hebreo y su progresión poética tras el enojo y el rechinar de dientes.
- source_word: תַּאֲוַת
  english_pob_choice: the desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - la ansia
  - el anhelo
  lexicon: HALOT
  rationale: El constructo significa deseo, anhelo o ansia. «El deseo» es amplio, claro y suficientemente literal para el sustantivo abstracto del hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: of the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los injustos
  lexicon: HALOT
  rationale: El plural sustantivado se mantiene de forma natural como colectivo en español. «Impíos» conserva el registro bíblico y la carga moral del término mejor que equivalentes más psicológicos o sociológicos.
- source_word: תֹּאבֵד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - desaparecerá
  lexicon: HALOT
  rationale: El verbo אבד expresa desaparición o ruina completa. «Perecerá» preserva el peso semántico y el tono sentencioso del cierre del versículo.
theological_decisions:
- issue: Lectura representativa del singular hebreo רָשָׁע
  english_pob_reading: the wicked man
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - los impíos
  - una persona impía
  rationale: El hebreo usa singular masculino, pero en este contexto funciona de manera representativa. En español se conserva la singularidad sin forzar una marca de género adicional; la forma «el impío» comunica bien el valor colectivo implícito y mantiene la economía del verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail en inglés y no introduce cambios de fondo. Se conserva la progresión poética del hebreo: ver → enojarse → rechinar los dientes → derretirse → perecer. La principal decisión de adaptación al español afecta la idiomaticidad de חרק שיניים, donde se eligió una solución más literal que la convención española más fija para mantener la imaginería sonora del original.'
  spanish_consistency_notes:
  - Se mantiene «impío/impíos» para רָשָׁע/רְשָׁעִים, en coherencia interna del verso.
  - Se usa futuro simple para la cadena verbal, reflejando el valor resultativo/profético del hebreo poético.
  - No se sustituye la imaginería concreta por una paráfrasis abstracta; el final conserva «perecerá» para אבד.
