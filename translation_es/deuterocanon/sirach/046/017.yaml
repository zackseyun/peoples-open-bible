translation:
  language: es
  text: En un gran estruendo[a] fue oída su voz, y los jefes[b] del enemigo fueron sometidos, y todos los gobernantes[c] de los filisteos perecieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en un gran estruendo»; el paralelo griego lo expresa más explícitamente: «el Señor tronó desde el cielo y con gran sonido hizo oír su voz».'
    reason: alternative_reading
  - marker: b
    text: O «los puestos militares del enemigo», si נציבי se toma en sentido impersonal o de guarnición, en vez de personal.
    reason: lexical_alternative
  - marker: c
    text: «Gobernantes de los filisteos» refleja el título filisteo conocido por 1 Samuel; también podría leerse «señores de los filisteos».
    reason: cross_reference
lexical_decisions:
- source_word: בפרע אדיר
  english_pob_choice: in a mighty crash
  chosen_spanish: en un gran estruendo
  alternatives_spanish:
  - en un gran crash
  - con un gran estruendo
  - en un gran trueno
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y algo incierta, pero el contexto y el paralelo griego apuntan a un acontecimiento sonoro violento. «Estruendo» conserva la fuerza auditiva sin decidir de manera excesiva por «trueno», que el hebreo aquí no enuncia de forma tan directa.
- source_word: נשמע קולו
  english_pob_choice: his voice was heard
  chosen_spanish: fue oída su voz
  alternatives_spanish:
  - se oyó su voz
  - su voz fue escuchada
  lexicon: HALOT
  rationale: La pasiva impersonal mantiene la sintaxis y el foco en la voz divina. «Fue oída» es natural en español y conserva el carácter solemne del enunciado.
- source_word: ויכנע
  english_pob_choice: were subdued
  chosen_spanish: fueron abatidos
  alternatives_spanish:
  - fueron sometidos
  - quedaron humillados
  - fueron vencidos
  lexicon: HALOT
  rationale: El verbo puede llevar el sentido de humillación o sometimiento. En este contexto bélico, «abatidos» comunica bien la idea de quedar reducidos/derrotados sin perder la resonancia de descenso y sometimiento.
- source_word: נציבי צר
  english_pob_choice: the leaders of the foe
  chosen_spanish: los jefes del enemigo
  alternatives_spanish:
  - los gobernadores del enemigo
  - los puestos militares del enemigo
  - los jefes del adversario
  lexicon: HALOT
  rationale: נציב puede referirse a un oficial, jefe o puesto militar según el contexto. Dado el paralelismo con el siguiente colon sobre los gobernantes filisteos, la lectura personal («jefes») encaja mejor. «Enemigo» recoge צר como colectivo.
- source_word: ויאבד
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - desaparecieron
  lexicon: HALOT
  rationale: La forma puede traducirse intransitivamente. «Perecieron» reproduce el efecto poético y mantiene el foco en el destino de los gobernantes filisteos.
- source_word: סרני פלשתים
  english_pob_choice: the rulers of the Philistines
  chosen_spanish: los gobernantes de los filisteos
  alternatives_spanish:
  - los señores de los filisteos
  - los príncipes de los filisteos
  lexicon: HALOT
  rationale: סרנים es el título conocido para los dirigentes filisteos. «Gobernantes» es claro en español contemporáneo y evita tanto el arcaísmo como posibles resonancias no deseadas de «señores».
theological_decisions:
- issue: Referencia del pronombre "su" en «fue oída su voz»
  english_pob_reading: The voice is God's voice.
  chosen_spanish_reading: La voz es la de Dios.
  alternative_spanish_readings:
  - La voz podría entenderse de manera indirecta por medio de Samuel en el contexto.
  - La referencia puede quedar implícita y se ilumina por el paralelo griego.
  rationale: El hebreo deja el referente implícito, pero el paralelo griego atribuye claramente el trueno y la voz al Señor. Conservar «su voz» permite mantener el hilo poético y la tensión contextual sin resolverla artificialmente; la identificación con Dios se entiende por el conjunto del pasaje.
  doctrine_reference: Mantener la identificación contextual sin borrar la tensión textual; usar el paralelo griego como apoyo traductológico, no como sustitución del hebreo.
translation_notes:
  revision_awareness: El inglés POB final revisó «enemy» por «foe» para reflejar mejor el singular hebreo צר; en español se optó por «enemigo» para conservar naturalidad y porque el singular colectivo funciona bien en esta construcción. También se siguió la línea del audit trail que entiende el primer hemistiquio a la luz del hebreo, con apoyo del paralelo griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero en este versículo no aparece el tetragrámaton explícito en el hebreo citado; por eso el texto español conserva la referencia implícita de la voz sin introducir un nombre divino que el hebreo no escriba aquí.
  - Se prefirió «gobernantes» para סרני por claridad moderna y por coherencia con títulos filisteos en contexto histórico.
  - La opción «estruendo» preserva la ambigüedad entre ruido, crash y trueno sin sobreinterpretar la forma hebrea.
  - Se evitó «siervo» o vocabulario eclesiástico no pertinente; el registro es poético-histórico y militar.
