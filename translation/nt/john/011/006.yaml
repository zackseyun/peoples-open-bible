id: JHN.11.6
reference: John 11:6
source:
  edition: SBLGNT
  text: ὡς οὖν ἤκουσεν ὅτι ἀσθενεῖ, τότε μὲν ἔμεινεν ἐν ᾧ ἦν τόπῳ δύο ἡμέρας·
translation:
  text: So when he heard that he was sick[a], he then stayed two days in the place where he was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he is sick.' Greek uses the present tense after 'heard,' but English commonly renders it as past in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς οὖν
  chosen: So when
  alternatives:
  - Therefore when
  - When therefore
  - So
  lexicon: BDAG
  rationale: The combination marks narrative progression and inference from the previous context. 'So when' gives natural English while preserving both the connective force of οὖν and the temporal sense of ὡς.
- source_word: ἤκουσεν
  chosen: he heard
  alternatives:
  - he learned
  - he was told
  lexicon: BDAG
  rationale: Aorist of ἀκούω is straightforwardly rendered 'heard.' This preserves the ordinary verbal sense without adding interpretive nuance.
- source_word: ὅτι ἀσθενεῖ
  chosen: that he was sick
  alternatives:
  - that he was ill
  - that he was weak
  lexicon: BDAG
  rationale: ἀσθενέω here refers to physical illness in the Lazarus narrative. 'Sick' is idiomatic and clear in modern English. Although the Greek present is literally 'is sick,' English commonly shifts to 'was sick' after a past reporting verb.
- source_word: τότε μὲν
  chosen: then indeed
  alternatives:
  - then
  - at that time indeed
  - so then
  lexicon: BDAG
  rationale: μέν is mildly emphatic here and anticipates the later movement in the narrative. 'Then indeed' preserves the emphasis better than omitting μέν entirely, while remaining readable.
- source_word: ἔμεινεν
  chosen: he stayed
  alternatives:
  - he remained
  - he continued
  lexicon: BDAG
  rationale: μένω in this context means to remain in a place. 'Stayed' is natural English; 'remained' is possible but slightly more formal.
- source_word: ἐν ᾧ ἦν τόπῳ
  chosen: in the place where he was
  alternatives:
  - where he was
  - in the place he was staying
  lexicon: BDAG
  rationale: The Greek is somewhat redundant in a way natural to Koine narrative. This rendering preserves the locative emphasis without over-paraphrasing. A shorter English rendering is possible, but this one stays closer to the source.
- source_word: δύο ἡμέρας
  chosen: two days
  lexicon: BDAG
  rationale: 'Direct and unambiguous accusative of duration: he stayed for a period of two days.'
