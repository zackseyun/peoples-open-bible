revisions:
- from: 'Y Gilead capturó los vados[a] del Jordán contra Efraín. Y cuando los fugitivos de Efraín decían: «Déjame cruzar», los hombres de Gilead le decían: «¿Eres un efraimita?» Y si él respondía: «No»,'
  to: 'Y Galaad capturó los vados[a] del Jordán contra Efraín. Y siempre que los fugitivos de Efraín decían: «Déjame cruzar», los hombres de Galaad le decían: «¿Eres un efraimita?». Si él decía: «No»,'
  rationale: Se corrige el topónimo a la forma española establecida («Galaad»), se fortalece el valor iterativo de וְהָיָה כִּי con «siempre que», y se pule la cláusula final para un español más natural y fiel al sentido procedural del pasaje. También se añade el punto tras la pregunta directa antes de continuar con la condición siguiente.
