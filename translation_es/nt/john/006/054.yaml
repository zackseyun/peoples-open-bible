translation:
  language: es
  text: El que come mi carne y bebe mi sangre tiene vida eterna[a][b], y yo lo resucitaré en el último día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alimenta de»; o más vividamente «mastica». El verbo griego τρώγω es más concreto que el verbo general para «comer».
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «lo levantaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρώγων
  english_pob_choice: The one who eats
  chosen_spanish: El que come
  alternatives_spanish:
  - El que se alimenta de
  - El que mastica
  lexicon: BDAG
  rationale: El participio con artículo funciona como un sustantivo personal; en español, «El que come» conserva esa fuerza singular y la acción continua sin volverla artificial. «Se alimenta de» sería más interpretativo, y «mastica» reproduce la vividez pero puede sonar excesivo en el texto principal.
- source_word: τρώγων
  english_pob_choice: eats
  chosen_spanish: come
  alternatives_spanish:
  - se alimenta de
  - mastica
  lexicon: BDAG
  rationale: «Come» es la equivalencia directa y natural de τρώγω en este contexto. Mantiene el sentido concreto sin agregar una intensidad que el texto no obliga a fijar en la línea principal.
- source_word: μου τὴν σάρκα
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi naturaleza humana
  lexicon: BDAG
  rationale: σάρξ se vierte como «carne» para conservar la literalidad del griego y la tensión teológica del pasaje. «Cuerpo» suaviza y reinterpreta; «naturaleza humana» no corresponde aquí al sentido concreto del texto.
- source_word: καὶ πίνων μου τὸ αἷμα
  english_pob_choice: and drinks my blood
  chosen_spanish: y bebe mi sangre
  alternatives_spanish:
  - y toma mi sangre
  - y ingiere mi sangre
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con «come» y el valor literal de αἷμα como «sangre». «Bebe» es natural en español y preserva el registro concreto sin eufemismo.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: El presente indicativo se expresa de modo directo con «tiene», que comunica posesión presente de vida eterna en una forma idiomática y fiel.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  - vida del siglo
  lexicon: BDAG
  rationale: «Vida eterna» es la traducción estándar y adecuada en Juan. Aunque αἰώνιος puede tener matiz de edad/era, en español esta forma comunica bien la calidad y duración escatológica del término.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo mismo
  lexicon: BDAG
  rationale: La crasis se conserva con un simple «y yo», que refleja el énfasis del sujeto sin sobrecargar la frase.
- source_word: ἀναστήσω
  english_pob_choice: will raise
  chosen_spanish: resucitaré
  alternatives_spanish:
  - levantaré
  - levantaré de nuevo
  lexicon: BDAG
  rationale: En este contexto escatológico, «resucitaré» comunica claramente el sentido de ἀνίστημι. «Levantaré» sería demasiado amplio en español y menos preciso para una promesa de resurrección.
- source_word: αὐτὸν
  english_pob_choice: him up
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a esa persona
  lexicon: BDAG
  rationale: El pronombre masculino singular se refleja con «lo», que mantiene la referencia gramatical singular del griego. En español el clítico no requiere reproducir la partícula «up» de la versión inglesa.
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  english_pob_choice: on the last day
  chosen_spanish: en el último día
  alternatives_spanish:
  - el día postrero
  - al final
  lexicon: BDAG
  rationale: «En el último día» es la forma natural y esjatológica en español, preservando el sentido temporal fijado por el griego.
theological_decisions:
- issue: Cómo traducir el lenguaje de comer/beber sin resolver la tensión interpretativa
  english_pob_reading: Literal eating/drinking language retained without interpretive expansion
  chosen_spanish_reading: Lenguaje literal de comer y beber mantenido sin expansión interpretativa
  alternative_spanish_readings:
  - Interpretación eucarística explícita en el texto principal
  - Interpretación metafórica como creer en el texto principal
  rationale: El griego emplea verbos concretos y términos físicos («carne», «sangre»). La traducción principal mantiene esa literalidad para no cerrar la tensión entre lectura sacramental y metafórica; cualquier interpretación queda para notas o comentario, no para el cuerpo del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo expresar ἀναστήσω en un contexto de promesa escatológica
  english_pob_reading: will raise him up
  chosen_spanish_reading: lo resucitaré
  alternative_spanish_readings:
  - lo levantaré
  - lo levantaré de nuevo
  rationale: En español, «resucitaré» comunica directamente la dimensión de resurrección que el contexto de «el último día» exige. No introduce una doctrina ajena; simplemente explicita el sentido escatológico ya presente en el griego.
  doctrine_reference: Juan 6:54; doctrina de la resurrección escatológica
- issue: Tratamiento del objeto masculino singular αὐτόν
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - a él
  - la persona
  rationale: El griego usa masculino singular y refiere al sujeto singular del participio. En español, «lo» conserva esa referencia sin neutralizarla ni volverla impersonal.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el estado de concordancia general fue alto, con solo asuntos menores. Por eso se mantiene la solución literal de «carne/sangre» y la promesa escatológica con una formulación española clara y publication-readable.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ, conforme al criterio del proyecto en contextos literales.
  - Se conserva la pluralidad semántica potencial de τρώγω en una nota, pero el texto principal usa el español natural «come».
  - «Vida eterna» y «en el último día» siguen el uso joánico estándar en español.
  - Se evita «Cristo» o lenguaje eclesiástico ajeno porque el versículo no lo exige.
  - El pronombre objeto «lo» respeta el singular masculino del griego sin añadir ambigüedad.
