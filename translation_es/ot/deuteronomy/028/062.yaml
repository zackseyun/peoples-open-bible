translation:
  language: es
  text: Y quedaréis pocos en número[a], aunque habíais llegado a ser como las estrellas de los cielos en multitud[b], porque no escuchaste[c] la voz de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pocos en número»; literalmente, «personas de poca cantidad», un modismo para indicar que quedarían muy pocos, no una referencia exclusiva a varones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mientras habíais sido tan numerosos como las estrellas del cielo». La construcción puede leerse con matiz contrastivo o concesivo.'
    reason: alternative_reading
  - marker: c
    text: La expresión hebrea «escuchar la voz de Yahvé» es lenguaje de pacto y también puede implicar «obedecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁאַרְתֶּם
  english_pob_choice: you will be left
  chosen_spanish: quedarás
  alternatives_spanish:
  - serás dejado
  - quedaréis
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa quedar como remanente tras juicio o pérdida. En español, «quedarás» comunica bien el resultado pasivo y mantiene un tono natural; se conserva el sujeto colectivo implícito como en el hebreo, que alterna número en el discurso.
- source_word: בִּמְתֵי מְעָט
  english_pob_choice: few in number
  chosen_spanish: reducido a muy pocos
  alternatives_spanish:
  - pocos en número
  - muy pocos
  lexicon: HALOT
  rationale: La expresión idiomática apunta a pequeñez numérica, no a «hombres» de manera específica. «Reducido a muy pocos» transmite la idea de escasez extrema con naturalidad en español y conserva el matiz de disminución.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - mientras que
  lexicon: HALOT
  rationale: La construcción introduce contraste concesivo entre la abundancia pasada y la reducción futura. «Aunque» es la equivalencia española más clara y fiel al valor de contraste.
- source_word: הֱיִיתֶם
  english_pob_choice: you had become
  chosen_spanish: habías llegado a ser
  alternatives_spanish:
  - habías sido
  - eras
  lexicon: HALOT
  rationale: En este contexto histórico-comparativo, el verbo no solo describe un estado sino una culminación de multiplicación. «Habías llegado a ser» refleja mejor ese proceso alcanzado; se mantiene la singularidad colectiva del hebreo en la forma española del discurso.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  english_pob_choice: as the stars of the heavens
  chosen_spanish: como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas del firmamento
  lexicon: HALOT
  rationale: Se conserva la imagen bíblica tradicional y el plural hebreo «los cielos», que no debe aplanarse sin razón. «Los cielos» preserva la forma del original y su sabor poético.
- source_word: לָרֹב
  english_pob_choice: as numerous
  chosen_spanish: en multitud
  alternatives_spanish:
  - en gran número
  - muchísimas
  lexicon: HALOT
  rationale: La frase modifica la comparación astral para expresar gran cantidad. «En multitud» suena natural, mantiene el valor cuantitativo y permite una cadencia más cercana al hebreo.
- source_word: כִּי לֹא שָׁמַעְתָּ
  english_pob_choice: because you did not listen
  chosen_spanish: porque no escuchaste
  alternatives_spanish:
  - porque no obedeciste
  - porque no oíste
  lexicon: HALOT
  rationale: שׁמע con בְּקוֹל suele implicar escuchar con atención y también obedecer. «No escuchaste» preserva la imagen lexical de oír/prestar atención, dejando viva la implicación de desobediencia sin sustituirla por un verbo interpretativo.
- source_word: בְּקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - la palabra de
  lexicon: HALOT
  rationale: La fórmula deuteronómica «escuchar la voz de» es una expresión de pacto que conviene mantener. «La voz de» reproduce el idiomatismo sin diluirlo en una mera idea abstracta de obediencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto exige traducir el Tetragrámaton como «Yahvé». Se evita la sustitución por un título, preservando el nombre propio del Dios del pacto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - el Dios tuyo
  lexicon: HALOT
  rationale: La expresión de pacto se conserva de forma directa y natural en español. «Tu Dios» corresponde al vínculo relacional del hebreo y encaja con la fórmula deuteronómica completa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. La línea editorial del proyecto pide transliterarlo como «Yahvé» para preservar el nombre revelado y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Número verbal colectivo en la cláusula final
  english_pob_reading: retain singular 'you did not listen' within a plural-address verse
  chosen_spanish_reading: 'conservar el cambio de número como singular discursivo: «no escuchaste»'
  alternative_spanish_readings:
  - 'normalizar a plural: «no escuchasteis»'
  - neutralizar la variación con una construcción impersonal
  rationale: El hebreo pasa de formas plurales a un verbo singular, fenómeno retórico común en Deuteronomio para dirigirse a Israel como colectivo. En español se conserva ese rasgo con el singular, sin explicar en el cuerpo del texto lo que el hebreo deja perceptible.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Sentido covenantal de escuchar la voz
  english_pob_reading: did not listen to the voice ... can also imply did not obey
  chosen_spanish_reading: «no escuchaste la voz de Yahvé» con implicación obediencial mantenida
  alternative_spanish_readings:
  - «no obedeciste a la voz de Yahvé»
  - «no atendiste a la voz de Yahvé»
  rationale: El hebreo conserva la imagen de escuchar la voz, que en Deuteronomio implica obedecer. La traducción mantiene esa imagen primaria y no la reduce a una paráfrasis doctrinal, para no perder la tensión lexical.
  doctrine_reference: Deuteronomio 28:62; uso de שׁמע + קול en contexto de pacto
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; se mantuvo la equivalencia óptima con preservación del contraste, del idiomatismo numérico y de la fórmula de pacto. No se añadieron expansiones interpretativas más allá de las respaldadas por el texto fuente y el audit trail en inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה de manera consistente con la política del proyecto.
  - Se mantiene la imagen verbal «escuchar la voz» para no sustituirla por una mera paráfrasis de obediencia.
  - Se respeta el contraste concesivo entre la abundancia anterior y la reducción presente.
  - La nota de pluralidad en «los cielos» preserva el sabor del hebreo sin introducir ambigüedad doctrinal.
