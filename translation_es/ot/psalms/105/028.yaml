translation:
  language: es
  text: Él envió oscuridad e hizo que todo quedara oscuro[a], y ellos no se rebelaron contra sus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no se rebelaron contra su palabra/mandato». El hebreo también puede entenderse en singular, y el sujeto de «ellos» no está explícito; algunos lo aplican a los egipcios, y otros a Moisés y Aarón.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo básico de enviar se expresa de manera natural y formal con «envió», conservando el valor narrativo del hebreo sin añadir matices que no están en el texto.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - gloom
  lexicon: HALOT
  rationale: «Oscuridad» es el equivalente directo, claro y digno para el sustantivo hebreo; mantiene el referente de la plaga sin cargarlo con un registro más literario de lo necesario.
- source_word: וַיַּחְשִׁךְ
  english_pob_choice: made it dark
  chosen_spanish: la oscureció
  alternatives_spanish:
  - la hizo oscura
  - la ennegreció
  - la volvió oscura
  lexicon: HALOT
  rationale: El verbo hifil expresa causación. «La oscureció» preserva esa fuerza causativa en español de forma breve y natural, con el objeto implícito femenino referido a «oscuridad».
- source_word: מָרוּ
  english_pob_choice: rebel
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - fueron rebeldes
  - se resistieron
  lexicon: HALOT
  rationale: El verbo מרה en este contexto tiene fuerza de rebelión/desobediencia. «Se rebelaron» conserva la carga covenantal y evita suavizarlo a mera resistencia.
- source_word: דברו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su palabra
  - su mandato
  lexicon: HALOT
  rationale: El hebreo presenta un plural en forma y el POB inglés lo reflejó como «words». En español, «sus palabras» reproduce mejor esa pluralidad formal; «su palabra» o «su mandato» serían interpretaciones posibles, pero más interpretativas que el hebreo.
theological_decisions:
- issue: Sujeto implícito de «ellos no se rebelaron»
  english_pob_reading: Retain the ambiguous plural 'they' without specifying the subject.
  chosen_spanish_reading: Conservar «ellos» sin identificar explícitamente a quiénes se refiere.
  alternative_spanish_readings:
  - los egipcios no se rebelaron contra sus palabras
  - Moisés y Aarón no se rebelaron contra su palabra
  rationale: El hebreo deja implícito el sujeto plural, y el contexto ha recibido distintas lecturas. La traducción española preserva esa ambigüedad para no resolver una tensión interpretativa que el texto fuente no resuelve.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación semántica de «sus palabras» / «su palabra»
  english_pob_reading: Or, 'and they did not rebel against his word/command.'
  chosen_spanish_reading: Mantener «sus palabras» en el texto principal, con la alternativa singular en nota.
  alternative_spanish_readings:
  - su palabra
  - su mandato
  rationale: La forma plural del hebreo favorece «palabras», pero el sentido puede singularizarse como «palabra» o «mandato». La nota preserva la alternativa sin imponerla en el texto principal.
  doctrine_reference: Principio de transparencia textual y preservación de alternativas léxicas.
translation_notes:
  revision_awareness: 'El contexto inglés fue revisado sin cambios finales: la versión vigente mantiene la ambigüedad del sujeto y la alternativa singular/plural en nota. La redacción española sigue esa misma línea, conservando el paralelismo poético y el valor causativo del verbo hifil.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto cuando aparezca el nombre divino; aquí el versículo no lo contiene.
  - Se usó «oscuridad» en lugar de «tinieblas» para un registro claro y moderno, coherente con el español bíblico transparente del proyecto.
  - Se conservó la pluralidad de «palabras» para reflejar la forma hebrea y la decisión inglesa de no forzar el singular en el cuerpo del texto.
  - No se explicitó un sujeto para «ellos» más allá del pronombre, a fin de preservar la ambigüedad exegética documentada.
