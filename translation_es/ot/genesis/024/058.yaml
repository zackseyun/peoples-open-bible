translation:
  language: es
  text: 'Así que llamaron a Rebeca y le dijeron: «¿Irás con este hombre?». Y ella dijo: «Iré».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - llamaron a
  - convocaron
  lexicon: HALOT
  rationale: קרא aquí expresa llamar a alguien para que se acerque y participe en la conversación. «Llamaron» mantiene la acción directa y natural en español sin volverla más solemne o más fuerte de lo que exige el contexto.
- source_word: לְרִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebekah
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma bíblica usual en español. «Rebeca» refleja היטב la forma hebrea רִבְקָה y es la convención más reconocible para lectores hispanohablantes.
- source_word: וַיֹּאמְרוּ אֵלֶיהָ
  english_pob_choice: said to her
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dijeron
  - le hablaron
  lexicon: HALOT
  rationale: El hebreo usa el verbo general «decir» con objeto indirecto; en español, «le dijeron» conserva esa forma y suena natural. No se cambia por «preguntaron» para no sustituir el verbo fuente por una interpretación explícita.
- source_word: הֲתֵלְכִי
  english_pob_choice: Will you go
  chosen_spanish: ¿Irás?
  alternatives_spanish:
  - ¿Vas a ir?
  - ¿Quieres ir?
  lexicon: HALOT
  rationale: El verbo הלך en segunda femenina singular interrogativa expresa una pregunta simple sobre ir. «¿Irás?» reproduce de forma directa la pregunta sin añadir la noción de voluntad que no está explícita en la forma verbal.
- source_word: עִם הָאִישׁ הַזֶּה
  english_pob_choice: with this man
  chosen_spanish: con este hombre
  alternatives_spanish:
  - con este hombre
  - con este varón
  lexicon: HALOT
  rationale: אִישׁ significa «hombre»; aunque el referente narrativo es el siervo de Abraham, el hebreo dice literalmente «este hombre». Se conserva esa formulación para mantener la transparencia del texto.
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella respondió
  alternatives_spanish:
  - Y ella dijo
  - Y contestó
  lexicon: HALOT
  rationale: Aunque el hebreo usa el verbo general «decir», el contexto es una respuesta a una pregunta. En español, «respondió» comunica de manera natural la función discursiva sin perder el enlace con el diálogo; es una equivalencia funcional aceptable aquí.
- source_word: אֵלֵךְ
  english_pob_choice: I will go
  chosen_spanish: Iré
  alternatives_spanish:
  - Iré
  - Voy a ir
  lexicon: HALOT
  rationale: El imperfecto de הלך en primera persona singular expresa una decisión/declaración de futuro simple. «Iré» es la forma más concisa y fiel en español para esta promesa inmediata.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue confirmado como de alta concordancia y sin cambios requeridos. La versión española sigue de cerca el hebreo, preservando «este hombre» y la respuesta final breve de Rebeca, con un ajuste estilístico mínimo en «respondió» para naturalidad discursiva en español.
  spanish_consistency_notes:
  - Se mantiene «Rebeca» como forma bíblica estándar en español.
  - Se conserva «con este hombre» en vez de interpretar «siervo», porque el hebreo no lo dice aquí.
  - La pregunta se traduce de manera directa con futura simple («¿Irás?»), evitando añadidos de voluntad o deseo.
  - El cierre breve («Iré») preserva la contundencia de la respuesta hebrea.
