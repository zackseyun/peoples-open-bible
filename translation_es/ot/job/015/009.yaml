translation:
  language: es
  text: ¿Qué sabes tú que nosotros no sabemos? ¿Qué entiendes tú que no esté con nosotros?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien, «que no lo tengamos». El hebreo dice literalmente: «y no está con nosotros»; la expresión puede entenderse como ausencia de posesión o de presencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué...
  alternatives_spanish:
  - ¿Qué cosa...
  - ¿Cuál...
  lexicon: HALOT
  rationale: El interrogativo hebreo introduce una pregunta retórica breve. «Qué» conserva la concisión y naturalidad en español sin añadir contenido.
- source_word: יָּדַעְתָּ
  english_pob_choice: do you know
  chosen_spanish: sabes
  alternatives_spanish:
  - has sabido
  - sabías
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí con fuerza presente retórica; «sabes» comunica mejor la impugnación inmediata del verso que un pasado o perfecto español.
- source_word: וְלֹא נֵדָע
  english_pob_choice: that we do not know
  chosen_spanish: que nosotros no sepamos
  alternatives_spanish:
  - que no sabemos
  - que no conozcamos
  lexicon: HALOT
  rationale: La cláusula relativa con negación expresa contraste entre el conocimiento de Job y el de sus interlocutores. «Sepamos» mantiene el valor subjuntivo esperado tras «qué sabes tú que...», y preserva el énfasis retórico.
- source_word: תָּבִין
  english_pob_choice: do you understand
  chosen_spanish: entiendes
  alternatives_spanish:
  - disciernes
  - percibes
  lexicon: HALOT
  rationale: בין suele indicar entender o discernir. «Entiendes» es la equivalencia española más clara y mantiene el paralelismo con «sabes».
- source_word: וְלֹא עִמָּנוּ הוּא
  english_pob_choice: that is not with us
  chosen_spanish: que no esté con nosotros
  alternatives_spanish:
  - que no lo tengamos
  - que no está entre nosotros
  - y no está con nosotros
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «y no con nosotros es ello». En español, «no esté con nosotros» conserva la idea de presencia/posesión sin perder la ambigüedad del referente, que en contexto es el entendimiento mencionado.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de Job 15:9 y el audio de la POB inglesa: pregunta retórica doble, paralelismo semántico entre «saber»/«entender» y preservación de la ambigüedad de עִמָּנוּ הוּא mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «sabes/entiendes» en presente retórico para reflejar el perfecto hebreo con valor actual.
  - Se mantiene la referencia inclusiva «nosotros» para conservar el contraste comunitario del texto.
  - La nota al pie preserva la alternativa entre posesión y presencia, como en la auditoría inglesa.
