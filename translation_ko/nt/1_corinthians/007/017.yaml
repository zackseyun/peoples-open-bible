  text: 다만, 주께서 각 사람에게 나누어 주신 대로, 하나님께서 각 사람을 부르신 대로, 그대로 행하십시오. 이것은 내가 모든 교회에서 그렇게 명하는 바입니다.
  philosophy: optimal-equivalence
