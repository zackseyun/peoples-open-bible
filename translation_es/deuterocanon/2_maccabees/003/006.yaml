translation:
  language: es
  text: Y le informó que el tesoro en Jerusalén estaba lleno de inmensas sumas de dinero[a], de modo que la cantidad de los fondos separados era innumerable, y que no pertenecían a la cuenta de los sacrificios[b], sino que era posible que estas cosas cayeran bajo la autoridad del rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incalculables riquezas». El griego puede referirse al monto de diversas sumas depositadas en el tesoro.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, no formaban parte de la cuenta o asignación regular de los sacrificios.
    reason: lexical_alternative
  - marker: c
    text: 'O: «quedaran bajo el control del rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήγγειλεν
  english_pob_choice: reported
  chosen_spanish: le informó
  alternatives_spanish:
  - le reportó
  - le dio aviso
  lexicon: LSJ
  rationale: El verbo expresa que alguien presenta un informe o comunica una noticia a una autoridad. «Le informó» mantiene el sentido narrativo de comunicar datos sin sonar mecánico en español.
- source_word: χρημάτων ἀμυθήτων
  english_pob_choice: immense sums of money
  chosen_spanish: inmensas sumas de dinero
  alternatives_spanish:
  - riquezas incontables
  - vastas cantidades de dinero
  lexicon: LSJ
  rationale: χρήματα aquí se refiere a dinero/caudales, y ἀμύθητος añade la idea de magnitud desmedida. «Inmensas sumas de dinero» conserva el valor financiero y la escala hiperbólica.
- source_word: γαζοφυλάκιον
  english_pob_choice: treasury
  chosen_spanish: tesoro
  alternatives_spanish:
  - tesorería
  - tesoro del templo
  lexicon: LSJ
  rationale: En este contexto el término designa el depósito de valores del templo. «Tesoro» es natural en español y conserva la idea de lugar donde se guardan riquezas.
- source_word: τὸ πλῆθος τῶν διαφόρων
  english_pob_choice: the amount of the separate funds
  chosen_spanish: la cantidad de los depósitos separados
  alternatives_spanish:
  - la multitud de las distintas sumas
  - el monto de los depósitos diversos
  lexicon: LSJ
  rationale: διαφόρων probablemente alude a sumas distintas o depositadas por separado, no solo a 'diferencias' abstractas. «Depósitos separados» refleja mejor la idea de fondos distintos confiados al tesoro.
- source_word: ἀναρίθμητον
  english_pob_choice: beyond counting
  chosen_spanish: innumerable
  alternatives_spanish:
  - incalculable
  - sin número
  lexicon: LSJ
  rationale: El adjetivo significa literalmente no contable. «Innumerable» preserva la hipérbole con buena fluidez en español.
- source_word: μὴ προσήκειν αὐτὰ πρὸς τὸν τῶν θυσιῶν λόγον
  english_pob_choice: they did not pertain to the account of the sacrifices
  chosen_spanish: no pertenecían al reparto de los sacrificios
  alternatives_spanish:
  - no pertenecían a la cuenta de los sacrificios
  - no se referían al gasto de los sacrificios
  lexicon: LSJ
  rationale: προσήκειν expresa pertenencia o correspondencia; λόγος aquí puede entenderse como cuenta, administración o reparto. «Reparto» comunica la idea administrativa de asignación de fondos, aunque el griego deja abierta la referencia exacta.
- source_word: ὑπὸ τὴν τοῦ βασιλέως ἐξουσίαν πεσεῖν
  english_pob_choice: to fall under the king’s authority
  chosen_spanish: cayeran bajo la autoridad del rey
  alternatives_spanish:
  - pasaran a la autoridad del rey
  - quedaran bajo el poder del rey
  lexicon: LSJ
  rationale: La construcción idiomática indica llegar a estar bajo la jurisdicción o poder de alguien. «Cayeran bajo la autoridad del rey» preserva la imagen y la fuerza jurídica.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos fondos
  - estos bienes
  lexicon: LSJ
  rationale: El pronombre retoma los fondos mencionados. «Estas cosas» se mantiene cercano al griego; el antecedente financiero se entiende por el contexto.
theological_decisions:
- issue: Relación de los fondos con los sacrificios del templo
  english_pob_reading: The verse distinguishes the monies from the sacrificial account rather than denying their sacred association altogether.
  chosen_spanish_reading: El versículo distingue los fondos de la cuenta de los sacrificios, sin resolver del todo su vínculo con el uso sagrado del templo.
  alternative_spanish_readings:
  - Los fondos eran totalmente profanos y ajenos al templo.
  - Los fondos podían ser legítimamente confiscados porque no formaban parte del culto.
  rationale: El griego afirma que no pertenecían al 'λόγος' de los sacrificios, lo cual señala una distinción administrativa real. La traducción evita ir más allá del dato textual y conserva la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: Se siguió la revisión reciente del inglés al preferir formulaciones más precisas para dinero/fondos («cantidad»/«monto» en vez de expresiones más vagas) y para προσήκειν («pertenecían a»/«no pertenecían al» en lugar de equivalentes demasiado libres). En español se reforzó esa precisión con «cantidad de los depósitos separados» y «no pertenecían al reparto de los sacrificios».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para el nombre divino; aquí no aplica.
  - Se usó un registro sobrio y eclesialmente legible, sin recurrir a arcaísmos innecesarios.
  - «Tesoro» se eligió por naturalidad y precisión contextual frente a «tesorería» o «cámara del tesoro».
