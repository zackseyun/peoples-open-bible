translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: ¡Ay de la ciudad de derramamiento de sangre[a], de la olla en la que está su herrumbre y cuya herrumbre no ha salido de ella! Sáquenla[b] pieza por pieza; no ha caído sobre ella ninguna suerte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad de sangre»; el hebreo plural apunta a culpa de sangre o derramamiento de sangre.
    reason: lexical_alternative
  - marker: b
    text: Es decir, saquen su contenido en porciones separadas, sin escogerlas por sorteo.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferencial del contexto anterior con un tono profético natural en español.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Mantiene la fórmula profética clásica sin volverla rígida en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: 'Se preservan ambos elementos del título compuesto: el nombre divino Yahvé y el título אדוני como Señor. Se evita el reemplazo por una convención de máscara y se mantiene la distinción auditable.'
- source_word: אוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Desdicha para
  lexicon: HALOT
  rationale: En español, '¡Ay de' comunica bien el clamor de lamentación y juicio profético.
- source_word: עִיר הַדָּמִים
  english_pob_choice: the city of bloodshed
  chosen_spanish: la ciudad de sangre
  alternatives_spanish:
  - la ciudad de derramamiento de sangre
  - la ciudad sanguinaria
  lexicon: HALOT
  rationale: Conserva el valor idiomático del plural hebreo, que apunta a culpa de sangre/derramamiento de sangre. 'Ciudad de sangre' es breve y readable; la nota conserva la alternativa interpretativa más explícita.
- source_word: סִיר
  english_pob_choice: the pot
  chosen_spanish: la olla
  alternatives_spanish:
  - el caldero
  - la vasija
  lexicon: HALOT
  rationale: En español 'olla' es la imagen más natural para el recipiente de cocina del símil, sin perder la concreción metafórica.
- source_word: חֶלְאָה
  english_pob_choice: rust
  chosen_spanish: herrumbre
  alternatives_spanish:
  - óxido
  - escoria
  - suciedad
  lexicon: HALOT
  rationale: '''Herrumbre'' preserva el campo semántico de corrosión/depósito adherido al metal y suena más digno que ''óxido'' en este registro. La nota puede aclarar la alternativa lexical.'
- source_word: בָהּ / מִמֶּנָּה
  english_pob_choice: in it / from it
  chosen_spanish: en ella / de ella
  alternatives_spanish:
  - en eso / de eso
  - en ella / fuera de ella
  lexicon: HALOT
  rationale: Se respeta la referencia femenina del sustantivo hebreo subyacente ('ciudad'/'olla') con un español natural y coherente.
- source_word: לֹא יָצְאָה מִמֶּנָּה
  english_pob_choice: has not gone out from it
  chosen_spanish: no ha salido de ella
  alternatives_spanish:
  - no ha salido fuera de ella
  - no ha sido quitada de ella
  lexicon: HALOT
  rationale: Mantiene la imagen de algo adherido que no se ha desprendido del recipiente.
- source_word: לִנְתָחֶיהָ לִנְתָחֶיהָ הוֹצִיאָהּ
  english_pob_choice: Bring it out piece by piece
  chosen_spanish: Sáquenla pieza por pieza
  alternatives_spanish:
  - Sáquenla trozo por trozo
  - Extráiganla pieza por pieza
  lexicon: HALOT
  rationale: La repetición hebrea tiene fuerza distributiva; 'pieza por pieza' la conserva. Se usa imperativo plural como en español bíblico/narrativo para el mandato divino directo.
- source_word: נְתָחִים
  english_pob_choice: piece
  chosen_spanish: pieza
  alternatives_spanish:
  - trozo
  - porción
  - pedazo
  lexicon: HALOT
  rationale: '''Pieza'' refleja bien el sentido de porciones separadas sin cargar de materialidad excesiva.'
- source_word: לֹא נָפַל עָלֶיהָ גּוֹרָל
  english_pob_choice: no lot has fallen on it
  chosen_spanish: no ha caído sobre ella ninguna suerte
  alternatives_spanish:
  - no le ha tocado ninguna suerte
  - no se ha echado suerte sobre ella
  lexicon: HALOT
  rationale: '''Suerte'' comunica el resultado del sorteo y conserva la imagen de lote/selección, mientras el añadido ''ninguna'' naturaliza el hebreo sin perder fuerza.'
theological_decisions:
- issue: Forma de rendir el Nombre divino en יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - Yahvé Dios
  - el Señor Yahvé
  rationale: La política POB para el Tetragrámaton es 'Yahvé'; aquí, al aparecer junto a אֲדֹנָי, se conserva el valor compuesto con 'el Señor' para reflejar el título, sin ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de עִיר הַדָּמִים
  english_pob_reading: the city of bloodshed
  chosen_spanish_reading: la ciudad de sangre
  alternative_spanish_readings:
  - la ciudad de derramamiento de sangre
  - la ciudad sanguinaria
  rationale: Se mantiene la carga de culpa de sangre del hebreo sin forzar una interpretación moralizante más explícita de lo que exige el texto. La nota deja abierta la lectura de 'derramamiento de sangre'.
  doctrine_reference: 'DOCTRINE.md: Metaphorical and forensic language — preserve metaphor unless context compels abstraction'
- issue: Sentido de la acción distributiva final
  english_pob_reading: no lot has fallen on it
  chosen_spanish_reading: no ha caído sobre ella ninguna suerte
  alternative_spanish_readings:
  - no le ha tocado ninguna suerte
  - no se ha echado suerte sobre ella
  rationale: Se conserva la imagen de sorteo/porción sin convertirla en una explicación abstracta. El español permite mantener el símbolo del reparto sin selección.
  doctrine_reference: 'DOCTRINE.md: Preserve figurative structure where intelligible'
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por la revisión más reciente: el mandato distributivo se coloca naturalmente como acción principal (''Sáquenla pieza por pieza'') y se conserva la imagen de la suerte final. También se ajustó la metáfora del recipiente para sonar natural en español sin perder la fuerza del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme a la política del proyecto.
  - '''Señor'' traduce el título אֲדֹנָי dentro de la fórmula compuesta.'
  - Se prefirió 'herrumbre' para חֶלְאָה por su vínculo con corrosión adherida al metal.
  - Se mantuvo la metáfora del recipiente con 'olla' y pronombres femeninos coherentes con el hebreo.
  - La imperatividad plural de 'Sáquenla' sigue el mandato directo del hebreo y resulta natural en español bíblico.
