    text: «Hermanos» puede tener un sentido de parentesco más amplio aquí, no limitado a hermanos varones literales.
    reason: cultural_note
  - marker: b
    text: O «camellos veloces», si se entiende el término raro como una referencia a dromedarios o camellos de marcha rápida.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a 'hermanos' y 'camellos', y se ajusta 'de entre todas las naciones' a 'de todas las naciones' por fidelidad más directa al hebreo, sin cambiar el sentido general del borrador.
