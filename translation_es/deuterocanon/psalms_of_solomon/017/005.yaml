    issue: La nota [a] no preserva la alternativa léxica documentada.
    rationale: El inglés tiene como alternativa «seed», mientras que la nota española dice «O “descendencia”, es decir, sus descendientes», repitiendo el mismo concepto en vez de ofrecer la opción más literal («simiente» o «semilla»).
  - severity: medium
    issue: «No faltaría delante de ti» es poco idiomático para τοῦ μὴ ἐκλείπειν.
    rationale: Aunque «faltar» puede sugerir ausencia, en este contexto de continuidad dinástica «no desaparecería» o «no cesaría» comunica mejor la idea de no extinguirse, y sigue la alternativa ya documentada.
  revised_spanish_text: Tú, Yahvé, escogiste a David como rey sobre Israel, y tú le juraste acerca de su descendencia[a] para siempre, que su reino no desaparecería ante ti[b].
