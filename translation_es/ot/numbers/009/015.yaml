translation:
  language: es
  text: El día en que fue levantado el tabernáculo, la nube cubrió el tabernáculo, la tienda del testimonio[a]; y al anochecer estaba sobre el tabernáculo como la apariencia de fuego hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tienda del testigo». La frase hebrea puede traducirse de cualquiera de las dos maneras; aquí se conserva «testimonio» por ser el término cultual más establecido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  english_pob_choice: Now on the day
  chosen_spanish: Y en el día en que
  alternatives_spanish:
  - Y el día en que
  - Cuando
  lexicon: HALOT
  rationale: El hebreo introduce un marco temporal con waw + preposición; en español, «Y en el día en que» conserva la relación temporal y la conexión discursiva sin sonar mecánico.
- source_word: הָקִים
  english_pob_choice: was set up
  chosen_spanish: fue erigido
  alternatives_spanish:
  - fue levantado
  - fue instalado
  lexicon: HALOT
  rationale: El verbo alude a la acción de poner en pie/establecer la tienda. «Fue erigido» mantiene el sentido pasivo y es natural en español bíblico sin perder precisión.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: «Mishkán» designa el santuario portátil del desierto; «tabernáculo» es el equivalente tradicional y claro en español.
- source_word: כִּסָּה
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - ocultó
  - cubría
  lexicon: HALOT
  rationale: El verbo expresa cobertura física directa; «cubrió» reproduce esa imagen de manera simple y fiel.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube divina
  - la nube
  lexicon: HALOT
  rationale: El referente es la nube conocida de la presencia divina en el desierto; «la nube» es suficiente y natural en español.
- source_word: לְאֹהֶל הָעֵדֻת
  english_pob_choice: the tent of the testimony
  chosen_spanish: la tienda del testimonio
  alternatives_spanish:
  - la tienda del testimonio
  - la tienda del testimonio[a]
  lexicon: HALOT
  rationale: El hebreo puede entenderse como una explicación appositiva del tabernáculo. «Tienda» evita la repetición de «tabernáculo» y mantiene la identificación cultual. Se conserva «testimonio» por ser el término establecido para עֵדוּת en este contexto.
- source_word: וּבָעֶרֶב
  english_pob_choice: and in the evening
  chosen_spanish: y por la tarde
  alternatives_spanish:
  - y al anochecer
  - y en la tarde
  lexicon: HALOT
  rationale: «Por la tarde» comunica naturalmente el cambio temporal hacia el ocaso sin forzar una literalidad que en español sonaría dura.
- source_word: יִהְיֶה
  english_pob_choice: it was
  chosen_spanish: estuvo
  alternatives_spanish:
  - era
  - estaba
  lexicon: HALOT
  rationale: En este contexto descriptivo, el imperfecto hebreo expresa situación continuada; «estuvo» transmite la permanencia localizada sobre el tabernáculo en el tiempo narrado.
- source_word: עַל הַמִּשְׁכָּן
  english_pob_choice: over the tabernacle
  chosen_spanish: sobre el tabernáculo
  alternatives_spanish:
  - encima del tabernáculo
  - sobre el tabernáculo
  lexicon: HALOT
  rationale: La preposición señala posición encima/sobre. «Sobre» es la forma más natural y fiel en español.
- source_word: כְּמַרְאֵה אֵשׁ
  english_pob_choice: like the appearance of fire
  chosen_spanish: como apariencia de fuego
  alternatives_spanish:
  - como el aspecto de fuego
  - como la apariencia de fuego
  lexicon: HALOT
  rationale: Se conserva la comparación visual sin afirmar identidad. «Como apariencia de fuego» refleja con sobriedad la construcción hebrea y su valor comparativo.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta la mañana siguiente
  - hasta el amanecer
  lexicon: HALOT
  rationale: «Hasta la mañana» es la equivalencia idiomática más clara y concisa para el límite temporal final.
theological_decisions:
- issue: Relación entre «el tabernáculo» y «la tienda del testimonio»
  english_pob_reading: 'Appositional: the second phrase identifies the first'
  chosen_spanish_reading: 'Apposicional: «la tienda del testimonio» identifica al tabernáculo'
  alternative_spanish_readings:
  - «la nube cubrió el tabernáculo, es decir, la tienda del testimonio»
  - «la nube cubrió el tabernáculo hacia la tienda del testimonio»
  rationale: La sintaxis hebrea favorece que la segunda expresión aclare la primera. Mantener la equivalencia appositiva evita introducir una relación espacial más fuerte de la que el texto exige.
  doctrine_reference: Éxodo 40; Números 9:15-23
- issue: Valor del término cultual עֵדוּת
  english_pob_reading: testimony retained as the more established cultic term
  chosen_spanish_reading: «testimonio» conservado como término cultual establecido
  alternative_spanish_readings:
  - «testigo»
  - «witness» transliterado no aplicable en español
  rationale: En español bíblico, «testimonio» es el equivalente cultual más transparente para עֵדוּת y mantiene el vínculo con el arca y la revelación del pacto.
  doctrine_reference: Éxodo 25:16, 21-22; Números 1:50
- issue: Naturaleza de la comparación con fuego
  english_pob_reading: like the appearance of fire
  chosen_spanish_reading: 'comparación, no identidad: «como apariencia de fuego»'
  alternative_spanish_readings:
  - «como fuego»
  - «parecía fuego»
  rationale: El hebreo usa una comparación visual. La formulación elegida evita sugerir que la nube fuera literalmente fuego, preservando la imagen sin resolver indebidamente su tensión descriptiva.
  doctrine_reference: Éxodo 13:21-22; Números 9:15-23
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en la lectura general: marco temporal inicial, nube sobre el tabernáculo, identificación appositiva con la tienda del testimonio, y comparación visual con fuego hasta la mañana. No se registraron revisiones posteriores que alteren el contenido base.'
  spanish_consistency_notes:
  - Se prefirió «tabernáculo» para הַמִּשְׁכָּן por coherencia con la terminología cultual estándar en español.
  - «Tienda del testimonio» conserva la equivalencia de לְאֹהֶל הָעֵדֻת sin añadir explicación intratextual.
  - Se mantuvo el orden y la puntuación que favorecen una lectura litúrgica clara en español.
  - La comparación final se dejó explícitamente comparativa para no desdibujar la tensión entre nube y fuego.
