review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura temporal del hebreo: בִּהְיוֹתְכֶם = «cuando eran/ustedes eran», מְתֵי מִסְפָּר = «pocos en número», כִּמְעַט intensifica esa pequeñez, y בָּהּ = «en ella» refleja la referencia a la tierra. El punto principal a ajustar es וְגָרִים: «forasteros» es posible, pero atenúa el matiz de residentes temporales/sojourners que el inglés auditado quiso preservar explícitamente. También la nota al pie no refleja bien las alternativas documentadas en inglés.'
  spanish_quality_summary: El español es claro y legible. «Pocos en número» y «muy pocos» suenan naturales en registro bíblico moderno. Sin embargo, la nota «casi nada / apenas nada» resulta menos natural para personas y se aleja de las alternativas del audit trail; conviene usar formulaciones personales como «muy pocos de verdad» o «casi ninguno». Además, puede omitirse «ustedes» para mayor fluidez bíblica, aunque no es obligatorio.
  glossary_alignment: No hay conflictos con términos doctrinales principales del proyecto. Sí conviene alinear גור con una opción española que conserve mejor el valor de «sojourners»; «residentes temporales» o «extranjeros residentes» preservan mejor la decisión léxica documentada que «forasteros».
  issues:
  - severity: medium
    issue: «forasteros» debilita el matiz de וְגָרִים
    rationale: El participio de גור no solo indica ajenidad genérica, sino residencia temporal como extranjeros en la tierra. El audit trail inglés eligió «sojourners» precisamente para conservar esa carga social/covenantal. «Forasteros» es entendible, pero más amplio y menos preciso.
  - severity: medium
    issue: La nota al pie no sigue las alternativas auditadas
    rationale: El inglés preserva «few indeed» / «almost none». La nota española «casi nada» / «apenas nada» trata al referente como cosa, no como personas, y «apenas nada» no corresponde bien a la alternativa documentada.
  - severity: low
    issue: «ustedes» es innecesario en el texto principal
    rationale: El sufijo verbal ya marca la persona en español. Omitirlo mejora la naturalidad y mantiene el sentido.
  revised_spanish_text: cuando eran pocos en número[a], muy pocos, y residentes temporales en ella.
