revisions:
- from: Porque yo soy Yahvé, su Dios. Por tanto, conságrense y sean santos, porque yo soy santo. Y no se contaminarán[a] con ningún animal que se arrastra sobre la tierra.
  to: Porque yo soy Yahvé, su Dios. Por tanto, conságrense[a] y sean santos, porque yo soy santo. Y no se contaminen[b] con ningún ser que pulula y se mueve sobre la tierra.
  rationale: Se ajusta la cláusula final para reflejar mejor la distinción hebrea entre שׁרץ y רמשׂ, se mejora la naturalidad del prohibitivo en español, y se corrigen las notas para que presenten alternativas reales y alineadas con la auditoría inglesa.
