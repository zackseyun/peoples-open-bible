translation:
  language: es
  text: Entonces el hombre que se acostó con ella dará al padre de la joven cincuenta siclos de plata, y ella será su esposa, porque la violó[a]. No podrá despedirla[b] todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humilló» o «la rebajó». El hebreo puede traducirse más literalmente así, pero en este contexto se refiere a una violación o agravio sexual.
    reason: lexical_alternative
  - marker: b
    text: «Despedirla» se refiere a desecharla o divorciarse de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: Then ... shall give
  chosen_spanish: Entonces ... dará
  alternatives_spanish:
  - Y ... dará
  lexicon: HALOT
  rationale: La conjunción consecutiva introduce la secuencia legal; en español, «Entonces» expresa mejor el avance de la disposición sin perder la fuerza obligatoria de la forma verbal futura.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el individuo
  lexicon: HALOT
  rationale: En este contexto jurídico, איש designa al sujeto masculino específico del caso. «Hombre» es natural y preciso en español.
- source_word: הַשֹּׁכֵב עִמָּהּ
  english_pob_choice: who lay with her
  chosen_spanish: que se acostó con ella
  alternatives_spanish:
  - que yació con ella
  - que durmió con ella
  lexicon: HALOT
  rationale: La construcción participial describe al hombre por el acto sexual. «Se acostó con ella» es idiomático y suficientemente sobrio en español; «durmió con ella» sería más coloquial.
- source_word: לַאֲבִי הַנַּעֲרָ
  english_pob_choice: to the young woman's father
  chosen_spanish: a su padre
  alternatives_spanish:
  - al padre de la joven
  - al padre de la muchacha
  lexicon: HALOT
  rationale: El hebreo dice literalmente «al padre de la joven». Dado que la referencia ya está establecida por el contexto inmediato, «su padre» evita repeticiones en español sin cambiar el sentido.
- source_word: חֲמִשִּׁים כָּסֶף
  english_pob_choice: fifty shekels of silver
  chosen_spanish: cincuenta siclos de plata
  alternatives_spanish:
  - cincuenta piezas de plata
  - cincuenta monedas de plata
  lexicon: HALOT
  rationale: El hebreo alude a una medida de peso monetario. «Siclos de plata» comunica mejor la equivalencia económica que una traducción vaga como «piezas de plata».
- source_word: וְלוֹ תִהְיֶה לְאִשָּׁה
  english_pob_choice: and she shall become his wife
  chosen_spanish: y ella será su esposa
  alternatives_spanish:
  - y ella llegará a ser su esposa
  - y ella le pertenecerá como esposa
  lexicon: HALOT
  rationale: La frase expresa un estado resultante matrimonial. «Será su esposa» conserva la relación legal sin añadir matices de propiedad ajenos al texto.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: por cuanto
  alternatives_spanish:
  - porque
  - debido a que
  lexicon: HALOT
  rationale: La fórmula causal se vierte con una expresión formal y clara. «Por cuanto» suena natural en registro bíblico y mantiene el valor causal del hebreo.
- source_word: עִנָּהּ
  english_pob_choice: has violated her
  chosen_spanish: la humilló
  alternatives_spanish:
  - la violó
  - la afligió
  - la degradó
  lexicon: HALOT
  rationale: El verbo ענה en esta cláusula tiene una gama que incluye humillar, rebajar y, en contexto sexual, violentar. Dado que el español bíblico tradicional conserva «humilló» y el texto inmediato ya establece la relación sexual, aquí se mantiene el término menos interpretativo, sin borrar la tensión semántica documentada.
- source_word: לֹא יוּכַל שַׁלְּחָהּ
  english_pob_choice: He may not send her away
  chosen_spanish: No podrá despedirla
  alternatives_spanish:
  - No podrá echarla
  - No podrá repudiarla
  - No podrá divorciarse de ella
  lexicon: HALOT
  rationale: «Despedirla» reproduce la imagen básica de enviar fuera/desechar, mientras que «repudiarla» o «divorciarse de ella» interpretan más explícitamente el efecto legal. Aquí se conserva la formulación del original con claridad suficiente.
- source_word: כָּל יָמָיו
  english_pob_choice: all his days
  chosen_spanish: en todos sus días
  alternatives_spanish:
  - todos los días de su vida
  - por toda su vida
  lexicon: HALOT
  rationale: La idiomática hebrea expresa duración de por vida. «En todos sus días» mantiene el ritmo y la literalidad funcional; en español también puede leerse como «mientras viva».
theological_decisions:
- issue: Cómo reflejar la fuerza de עִנָּהּ sin borrar la tensión entre la formulación más literal y el sentido contextual de violencia sexual
  english_pob_reading: has violated her
  chosen_spanish_reading: la humilló
  alternative_spanish_readings:
  - la violó
  - la degradó
  - la afligió
  rationale: El audit trail inglés opta por «violated her» para no perder la gravedad del contexto ni sobreespecificar más allá de la cláusula. En español, «la humilló» conserva la raíz semántica más cercana al verbo hebreo y deja visible la tensión contextual; se evita «la violó» por ser más interpretativo que la forma verbal inmediata, aunque el entorno legal sí apunta a violencia sexual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tratamiento de la cláusula causal תַּחַת אֲשֶׁר en un marco legal
  english_pob_reading: because
  chosen_spanish_reading: por cuanto
  alternative_spanish_readings:
  - porque
  - debido a que
  rationale: La frase introduce la razón jurídica de la obligación. «Por cuanto» preserva el tono formal y causal del hebreo sin añadir explicación externa.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: 'Coincide con el paso de revisión más reciente: sin cambios sustantivos requeridos respecto del cierre de auditoría; la redacción española mantiene la tensión semántica documentada para ענה y la función causal de תַּחַת אֲשֶׁר.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto; este versículo no contiene el Tetragrámaton.
  - Se conserva «siclos de plata» como equivalente económico estándar, en línea con la decisión inglesa.
  - «Despedirla» mantiene el valor jurídico de envío/dismissal sin imponer «divorciarla» como glosa principal.
  - La referencia pronominal «su padre» es anafórica y fluye en español porque la joven ya ha sido introducida en el contexto inmediato.
