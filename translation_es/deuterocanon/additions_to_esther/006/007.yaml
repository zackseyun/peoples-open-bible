review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: conserva la relación causal de διὰ τοῦτο, el verbo general ἐποίησεν como «hizo», el numeral «dos», el contraste entre «el pueblo de Dios» y «todas las naciones», y mantiene correctamente «naciones» en el texto principal con «gentiles» como alternativa de nota. El único ajuste necesario es de legibilidad/idiomaticidad en la expresión de κλήρους.'
  spanish_quality_summary: «Por esta razón hizo dos suertes» es comprensible y muy bíblico, pero en español general actual suena algo rígido. «Echó dos suertes» sería más idiomático, pero introduciría un verbo no presente en el griego. La mejor reparación mínima es mantener «hizo» y cambiar «suertes» por «sorteos», que comunica con claridad moderna la idea de lotes/suertes sin añadir acción no explicitada. También conviene normalizar la redacción de la nota quitando comillas y prefijo innecesarios.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» está correcto; no aparece Yahvé, Mesías/Cristo, espíritu, etc. La decisión «naciones» frente a «gentiles» sigue fielmente la auditoría inglesa y está bien documentada.
  issues:
  - severity: medium
    issue: La combinación «hizo dos suertes» suena poco natural en español contemporáneo neutral.
    rationale: Aunque «suertes» es un equivalente bíblico tradicional para κλήροι, con el verbo «hizo» produce una construcción algo forzada. Dado que el inglés auditado insistió en no introducir «cast», conviene preservar «hizo» pero usar un objeto más natural en español, como «dos sorteos». Esto mantiene el valor semántico sin endurecer el estilo.
  - severity: low
    issue: 'La nota al pie está redactada con formato poco limpio: «''O: …»'
    rationale: La nota debe ser clara y editorialmente limpia en español. Basta con «O bien, “todos los gentiles”. …» o formulación equivalente.
  revised_spanish_text: Por esta razón hizo dos sorteos[a], uno para el pueblo de Dios y uno para todas las naciones;
