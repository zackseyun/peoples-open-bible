lexical_decisions:
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - permanecía
  lexicon: BDAG
  rationale: En español, «estaba» expresa con naturalidad el estado continuo de la frase y refleja el valor imperfectivo de ἦν sin sonar rígido. «Permanecía» sería posible, pero añade un matiz más interpretativo; «era» suena menos idiomático aquí.
- source_word: ἐν τῷ οἴκῳ αὐτῆς
  english_pob_choice: in her house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en su vivienda
  lexicon: BDAG
  rationale: «Casa» corresponde de forma directa a οἶκος y conserva la sencillez locativa del griego. «Hogar» es más afectivo y menos literal; «vivienda» resulta más técnico.
- source_word: χηρεύουσα
  english_pob_choice: living as a widow
  chosen_spanish: viviendo como viuda
  alternatives_spanish:
  - siendo viuda
  - en condición de viuda
  - viuda
  lexicon: BDAG
  rationale: El participio describe una condición continuada. «Viviendo como viuda» preserva ese valor durativo y evita reducirlo a un mero estado nominal. «Siendo viuda» es correcto pero menos natural en español; «viuda» sería demasiado condensado.
- source_word: ἔτη τρία καὶ μῆνας τέσσορες
  english_pob_choice: for three years and four months
  chosen_spanish: durante tres años y cuatro meses
  alternatives_spanish:
  - por tres años y cuatro meses
  - tres años y cuatro meses
  lexicon: BDAG
  rationale: El español requiere una marca temporal explícita para la duración. «Durante» expresa bien el lapso continuo asociado a su viudez; «por» también es posible, pero puede sonar menos preciso en este contexto.
- source_word: Ἰουδεὶθ
  english_pob_choice: Judith
  chosen_spanish: Judit
  alternatives_spanish:
  - Judith
  lexicon: transliteration
  rationale: Se adopta la forma española habitual del nombre propio bíblico, «Judit», que es la forma natural en castellano y mantiene la identificación inequívoca del personaje.
translation_notes:
  revision_awareness: El texto griego es directo y de alta concordancia con el audit trail inglés. La revisión inglesa reciente ajustó ἦν a una forma más directa y χηρεύουσα a una expresión durativa; el español sigue esa misma línea con «estaba» y «viviendo como viuda», sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene el nombre propio en la forma española estándar «Judit» para coherencia con el uso bíblico en castellano.
  - 'Se conserva la simplicidad sintáctica del original: estado + lugar + condición + duración.'
  - No se introduce terminología eclesiástica ni se amplía el sentido del pasaje más allá de la duración de la viudez.
