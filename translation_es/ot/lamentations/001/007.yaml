base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/007.yaml
  text: Jerusalem remembered in the days of her affliction and her wanderings all her precious things that were from days of old[a]. When her people fell into the hand of the foe, and there was no one to help her, foes saw her[b]; they laughed at her ruin.
  footnotes:
  - marker: a
    text: Or 'and her homelessness' for 'and her wanderings'; the Hebrew term is rare and debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'they laughed at her ruin/desolation' for 'they laughed at her downfall'; the Hebrew noun likely refers to Jerusalem's collapse or devastated condition.
    reason: lexical_alternative
