  rationale: 'Se ajusta el español para reflejar mejor las decisiones documentadas del POB y la semántica hebrea: se hace explícito el objeto en la prohibición de contacto, se reemplaza «atravesado» por una formulación que conserva la idea de ejecución por proyectil, se convierte el futuro final en permiso explícito, y se corrige la nota b para que esté plenamente en español. No se requieren cambios doctrinales ni adjudicación compleja.'
