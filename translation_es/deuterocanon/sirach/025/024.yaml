translation:
  language: es
  text: De una mujer[b] es el comienzo del pecado, y a causa de ella todos morimos juntos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y a causa de ella todos morimos». El hebreo puede leerse como una acción ya consumada, mientras que el paralelo griego favorece el presente universal; por eso el texto principal usa un presente general.'
    reason: lexical_alternative
  - marker: b
    text: La línea probablemente alude a la mujer del relato de la caída primigenia; el verso lo sugiere de forma breve, sin desarrollar allí mismo la teología.
    reason: cross_reference
lexical_decisions:
- source_word: מֵאִשָּׁה / ἀπὸ γυναικὸς
  english_pob_choice: From a woman
  chosen_spanish: De una mujer
  alternatives_spanish:
  - De mujer
  - Por una mujer
  - Desde una mujer
  lexicon: HALOT; LXX ἀπό
  rationale: La preposición de origen/causa se vierte de manera natural con «de» en español, y «una mujer» conserva el sustantivo genérico singular del hebreo y del griego. «Mujer» es preferible a «esposa» porque el texto no especifica relación matrimonial.
- source_word: תְחִלַת / ἀρχή
  english_pob_choice: the beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el principio
  - el inicio
  - el origen
  lexicon: HALOT; LSJ
  rationale: «Comienzo» mantiene el valor de arranque u origen inicial y suena natural en español moderno. También deja intacta la formulación proverbial y breve del verso.
- source_word: עָוֹן / ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - iniquidad
  - culpa
  - mal
  lexicon: HALOT; BDAG/LSJ
  rationale: Aunque el hebreo admite «iniquidad» o «culpa», el paralelo griego usa ἁμαρτίας, que apunta al campo semántico de «pecado». «Pecado» es la opción más clara y fiel en español sin rebajar la carga moral.
- source_word: וּבִגְלָלָהּ / δι' αὐτὴν
  english_pob_choice: because of her
  chosen_spanish: por ella
  alternatives_spanish:
  - a causa de ella
  - debido a ella
  - por causa de ella
  lexicon: HALOT; LSJ
  rationale: La relación causal puede expresarse en español de forma compacta con «por ella», que refleja bien el hebreo y el griego sin añadir matices instrumentales innecesarios.
- source_word: גָוַעְנוּ / ἀποθνήσκομεν
  english_pob_choice: we all die together
  chosen_spanish: todos morimos juntos
  alternatives_spanish:
  - todos morimos
  - todos perecemos juntos
  - todos morimos en conjunto
  lexicon: HALOT; LSJ
  rationale: El hebreo permite un sentido completivo («morimos/perdimos»), mientras que el griego presenta un presente general («morimos»). «Morimos juntos» conserva la fuerza colectiva de יַחַד sin forzar un universal abstracto como simple «todos». La colocación de «todos» delante de «morimos» mantiene la universalidad del enunciado.
- source_word: יַחַד / πάντες
  english_pob_choice: together / all
  chosen_spanish: juntos
  alternatives_spanish:
  - todos
  - en conjunto
  - al mismo tiempo
  lexicon: HALOT; LSJ
  rationale: יַחַד puede funcionar adverbialmente como «juntos» o con valor colectivo. Aquí el griego trae πάντες, pero el hebreo preserva la idea de unidad en la muerte; «juntos» deja visible ese matiz sin perder fluidez.
theological_decisions:
- issue: Mantener la atribución gendered y la asociación con la mujer sin neutralizarla ni explicarla en el cuerpo principal
  english_pob_reading: Retain 'From a woman is the beginning of sin, and because of her we all die together.'
  chosen_spanish_reading: De una mujer es el comienzo del pecado[a][b], y por ella todos morimos juntos.
  alternative_spanish_readings:
  - Del ser humano es el comienzo del pecado, y por ella todos morimos.
  - De una mujer vino el comienzo del pecado, y por ella todos morimos juntos.
  rationale: El hebreo y el griego expresan explícitamente «mujer» en singular. La traducción debe conservar esa tensión teológica y literaria sin suavizarla con un genérico como «ser humano».
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión que ajustó la primera cláusula de un pasado implícito («vino/llegó a ser») a una formulación más fiel al verbo nominal: «es el comienzo». También se mantuvo la fuerza colectiva de יַחַד en una expresión idiomática española.'
  spanish_consistency_notes:
  - Se conserva «mujer» en singular para reflejar el hebreo y el griego, en lugar de neutralizar el sujeto.
  - «Comienzo» y no «principio» mantiene el paralelismo breve y sobrio del proverbio.
  - «Morimos juntos» conserva la dimensión colectiva explícita del texto hebreo y evita añadir una paráfrasis doctrinal.
  - Las notas se anclan en el texto con [a] y [b] para respetar la trazabilidad editorial.
