translation:
  language: es
  text: Mis enemigos me cazaron como a un ave[a], sin motivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa un infinitivo absoluto con el verbo finito («cazando me cazaron») para intensificar la acción; alternativamente: «Mis enemigos ciertamente me cazaron como a un ave, sin motivo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צ֥וֹד / צָד֛וּנִי
  english_pob_choice: hunted me
  chosen_spanish: me cazaron
  alternatives_spanish:
  - me persiguieron
  - me dieron caza
  - me acecharon y cazaron
  lexicon: HALOT
  rationale: El hebreo intensifica la acción verbal con infinitivo absoluto más verbo finito. En español, "cazar" conserva la imagen de presa y depredación mejor que un simple "perseguir"; el plural sujeto y el objeto directo son naturales y fieles al sentido.
- source_word: כַּצִּפּ֖וֹר
  english_pob_choice: like a bird
  chosen_spanish: como a un ave
  alternatives_spanish:
  - como a un pájaro
  - como un ave
  - como a un pájaro pequeño
  lexicon: HALOT
  rationale: צִפּוֹר es un ave pequeña en sentido general, no una especie concreta. "Como a un ave" conserva la comparación y el matiz de presa vulnerable sin sonar demasiado coloquial.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis enemigos
  - mis adversarios
  - mis foes
  lexicon: HALOT
  rationale: El término designa claramente enemigos o adversarios hostiles. "Mis enemigos" es la equivalencia más directa y transparente en español.
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin motivo
  - gratuitamente
  - sin razón
  lexicon: HALOT
  rationale: Aquí expresa hostilidad injustificada. "Sin causa" reproduce bien la afirmación moral del texto y mantiene una formulación breve y bíblica en español.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y conserva la intensidad verbal señalada en el audit trail inglés, pero evita añadir adverbios no explícitos como «relentlessly». Se mantiene la comparación con un ave y la cláusula de injusticia «sin causa».
  spanish_consistency_notes:
  - Se usó «cazar» para reflejar el campo semántico de צוד con imagen de presa, en línea con la decisión inglesa de 'hunted'.
  - Se prefirió «ave» como término general y neutro; «pájaro» sería posible, pero «ave» suena más sobrio y amplio en este contexto.
  - «Sin causa» conserva la brevedad del original y la acusación de persecución injusta.
