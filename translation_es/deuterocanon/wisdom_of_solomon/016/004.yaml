  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La principal cuestión léxica es ἔνδεια: el inglés auditado dejó constancia de «want» con alternativas «deprivation/lack», por lo que en español «privación» o «carencia» se alinea mejor que «necesidad». La decisión «los que tiranizaban» está bien alineada con la nota inglesa sobre la fuerza verbal.'
