base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/024/010.yaml
  text: And David said to Saul[a], “Why do you listen to the words of men, saying, ‘Look[b], David seeks your harm’?”
  footnotes:
  - marker: a
    text: Or, “the words of man / human words.” The Hebrew singular can sometimes carry a more general human sense, but here it is rendered “a man” to reflect the singular form and the likely reference to an accuser.
    reason: lexical_alternative
  - marker: b
    text: Or, “David seeks evil against you.” The Hebrew phrase can be rendered more literally with “evil,” but “harm” communicates the intended accusation in natural English.
    reason: lexical_alternative
