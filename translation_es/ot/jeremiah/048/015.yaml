review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del hebreo: devastación de Moab, movimiento abrupto relacionado con sus ciudades, descenso de sus mejores jóvenes al degüello, y la fórmula solemne final con el título divino y el nombre Yahvé. Sin embargo, la nota [a] no preserva con suficiente fidelidad la alternativa documentada en el POB inglés, que es más literalmente ''y uno ha subido contra sus ciudades'' que ''sus ciudades han sido atacadas''.'
  spanish_quality_summary: 'El español es en general claro y digno. ''Moab está devastada'' y ''declara el Rey, cuyo nombre es Yahvé de los Ejércitos'' funcionan bien. La frase ''los más escogidos de sus jóvenes'' suena algo menos natural que una formulación como ''lo mejor de sus jóvenes'' o ''sus jóvenes más escogidos'', pero sigue siendo inteligible y fiel. El problema principal está en las notas: la nota [b] reemplaza indebidamente la nota léxica auditada por una nota teológica nueva, y la nota [a] podría ajustarse mejor a la evidencia.'
  glossary_alignment: 'Buena alineación global con la terminología del proyecto: יְהוָה → ''Yahvé'', צְבָאוֹת → ''de los Ejércitos'', y mantenimiento del título divino ''el Rey''. No hay conflicto doctrinal. Debe preservarse mejor la nota alternativa auditada para עָלָה y conviene que la nota sobre ''el Rey'' corresponda al tipo de nota léxica documentada, no a una explicación nueva no pedida.'
  issues:
  - severity: medium
    issue: La nota [a] no conserva con precisión la alternativa auditada del POB inglés.
    rationale: El inglés preserva explícitamente la posibilidad 'and one has gone up against her cities'. La nota española actual reduce esa alternativa a 'sus ciudades han sido atacadas', lo cual resume pero pierde el matiz del sujeto implícito y del verbo 'subir contra'.
  - severity: medium
    issue: La nota [b] introduce una nota teológica nueva en lugar de reflejar la alternativa léxica auditada.
    rationale: 'El POB inglés documenta como nota: ''Traditional English: the LORD of hosts.'' En español, la nota correspondiente debería recoger el equivalente tradicional, por ejemplo ''Tradicional: «Yahvé/SERÑOR de los ejércitos»'' según política; no hace falta una explicación de que ''el Rey'' es título divino.'
  - severity: low
    issue: '''Los más escogidos de sus jóvenes'' es algo rígido en español.'
    rationale: No es infiel, pero una formulación levemente más natural mejora la legibilidad sin perder la fuerza de מִבְחַר.
  revised_spanish_text: Moab[a] está devastada, y sus ciudades han subido; lo mejor de sus jóvenes ha bajado a la matanza, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  revised_footnotes:
