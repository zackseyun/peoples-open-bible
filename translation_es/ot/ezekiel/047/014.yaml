    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «les caerá», un modismo para indicar que se les asigna como herencia.'
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota del modismo de juramento al lugar correcto en el texto y se mantuvieron las otras notas con anclajes más adecuados. Además, se cambió «respecto de la cual» por «acerca de la cual» para una lectura más natural sin perder el matiz formal de la relación con el juramento.
