base_translation:
  language: en
  yaml_path: translation/ot/psalms/021/013.yaml
  text: For you will make them turn their back[c][b][a]; with your bowstrings you will aim at their faces.
  footnotes:
  - marker: a
    text: Literally, 'you will set them as a shoulder.' The Hebrew idiom likely means causing the enemies to turn their back in retreat or presenting them broadside as targets.
    reason: lexical_alternative
  - marker: b
    text: Or 'with your cords/strings you will make ready [your arrows/bow] against their faces.' The Hebrew imagery is compressed, and some translations keep the more literal 'make ready.'
    reason: alternative_reading
  - marker: c
    text: Or 'turn their back; with your bowstrings you will aim'.
    reason: previous_rendering
