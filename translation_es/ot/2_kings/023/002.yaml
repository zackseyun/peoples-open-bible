translation:
  language: es
  text: Entonces el rey subió a la casa de Yahvé[b], y con él todos los hombres de Judá[a], y todos los habitantes de Jerusalén, y los sacerdotes, y los profetas, y todo el pueblo, desde el pequeño hasta el grande[c]; y leyó a oídos de ellos todas las palabras del Libro del Pacto que había sido hallado en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todos los hombres de Judá». La expresión puede funcionar representativamente para la población, pero se conserva en la traducción la formulación masculina.'
    reason: lexical_alternative
  - marker: b
    text: O «el templo de Yahvé». Literalmente, «la casa de Yahvé».
    reason: lexical_alternative
  - marker: c
    text: O «desde el menor hasta el mayor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba o hacia un lugar elevado. En español, «subió» conserva ese valor direccional hacia la casa de Yahvé sin sonar forzado.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene la expresión literal del hebreo «casa de YHWH». El proyecto pide «Yahvé» para el Nombre divino, y «casa» preserva mejor el encuadre del texto que «templo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé», como forma transparente del Nombre del pacto.'
- source_word: כָל אִישׁ יְהוּדָה
  english_pob_choice: all the men of Judah
  chosen_spanish: todos los hombres de Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  - todos los varones de Judá
  lexicon: HALOT
  rationale: אִישׁ es singular, pero aquí funciona colectivamente. Se conserva el matiz masculino-representativo con «hombres», coherente con la decisión auditada del POB en inglés.
- source_word: כָל יֹשְׁבֵי יְרוּשָׁלַם
  english_pob_choice: all the inhabitants of Jerusalem
  chosen_spanish: todos los habitantes de Jerusalén
  alternatives_spanish:
  - todos los residentes de Jerusalén
  - todos los que vivían en Jerusalén
  lexicon: HALOT
  rationale: יֹשְׁבֵי designa a los que habitan en un lugar; «habitantes» es el equivalente español más directo y natural.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: Marcador simple de acompañamiento; «con él» es la forma más idiomática en español.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: כֹּהֲנִים se traduce de manera estándar por «sacerdotes» en este contexto cultual.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  lexicon: HALOT
  rationale: נְבִיאִים corresponde de forma estándar a «profetas».
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  lexicon: HALOT
  rationale: La colectividad hebrea se expresa con naturalidad en español como «todo el pueblo», sin perder el alcance total del colectivo.
- source_word: לְמִקָּטֹן וְעַד גָּדוֹל
  english_pob_choice: from small to great
  chosen_spanish: desde el pequeño hasta el grande
  alternatives_spanish:
  - desde el más pequeño hasta el más grande
  - desde el menor hasta el mayor
  lexicon: HALOT
  rationale: El hebreo usa una escala idiomática de totalidad social. «Desde el pequeño hasta el grande» sigue de cerca la forma del original; es fiel y comprensible.
- source_word: וַיִּקְרָא
  english_pob_choice: he read
  chosen_spanish: leyó
  alternatives_spanish:
  - proclamó
  - leyó en voz alta
  lexicon: HALOT
  rationale: El objeto es un libro escrito; por tanto, «leyó» es la correspondencia más precisa. El contexto de audición queda claro por la frase siguiente.
- source_word: בְאָזְנֵיהֶם
  english_pob_choice: in their hearing
  chosen_spanish: en sus oídos
  alternatives_spanish:
  - a sus oídos
  - delante de ellos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal «en sus oídos», que en español es inteligible y mantiene el tono auditivo del original. La alternativa más idiomática sería «en su presencia» o «en su audición», pero estas pierden la imagen.
- source_word: כָל דִּבְרֵי
  english_pob_choice: all the words of
  chosen_spanish: todas las palabras de
  alternatives_spanish:
  - todos los asuntos de
  - todo lo escrito en
  lexicon: HALOT
  rationale: Con un libro leído en público, דִּבְרֵי se refiere de manera directa a «palabras». Se mantiene la correspondencia literal sin ampliarla a «asuntos».
- source_word: סֵפֶר הַבְּרִית
  english_pob_choice: the Book of the Covenant
  chosen_spanish: el Libro del Pacto
  alternatives_spanish:
  - el libro del pacto
  - el Libro de la Alianza
  lexicon: HALOT
  rationale: Se conserva el sentido formal de título. «Pacto» refleja el campo semántico de בְּרִית; «Alianza» es posible, pero «Pacto» corresponde mejor al registro bíblico español y al uso auditado del POB.
- source_word: הַנִּמְצָא
  english_pob_choice: that had been found
  chosen_spanish: que había sido hallado
  alternatives_spanish:
  - que fue hallado
  - que se había encontrado
  lexicon: HALOT
  rationale: El participio pasivo remite al hallazgo previo del rollo. El pluscuamperfecto español clarifica la anterioridad respecto de la lectura.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: 'Se repite la misma elección léxica para mantener consistencia: «casa de Yahvé», no «templo», por fidelidad a la formulación hebrea.'
theological_decisions:
- issue: Renderizado del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se preserva el Nombre con «Yahvé» en vez de sustituirlo por una convención eclesial como «el Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Expresión colectiva masculina כָל אִישׁ יְהוּדָה
  english_pob_reading: all the men of Judah
  chosen_spanish_reading: todos los hombres de Judá
  alternative_spanish_readings:
  - todo el pueblo de Judá
  - todas las personas de Judá
  rationale: Se mantiene el valor colectivo y la forma masculina del hebreo. No se neutraliza a «pueblo» porque el POB auditado conserva el matiz representativo masculino.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con concordancia alta y sin revisiones sustanciales. La única adaptación principal fue ajustar la terminología fija del proyecto para el Nombre divino a «Yahvé» y conservar en español la fuerza representativa de la expresión masculina colectiva.
  spanish_consistency_notes:
  - Se usa consistentemente «Yahvé» para יְהוָה y «casa de Yahvé» para בֵּית יְהוָה.
  - 'Se mantiene el paralelismo de la enumeración: rey, hombres de Judá, habitantes de Jerusalén, sacerdotes, profetas y todo el pueblo.'
  - «Leyó en sus oídos» conserva la imagen auditiva hebrea y es compatible con el español bíblico moderno.
  - Se evita «templo» en el texto principal para no desplazar la metáfora literal del hebreo, pero se deja constancia de la alternativa.
  - «Pacto» se conserva para בְּרִית por coherencia con la terminología bíblica y con el título del documento citado.
