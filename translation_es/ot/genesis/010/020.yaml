review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: fórmula resumitiva, filiación genealógica, clasificación por clanes/lenguas y localización en tierras. Sin embargo, hay un desajuste interno importante entre el texto y la nota [b]: el texto español dice «tierras[b]», pero la nota explica el hebreo «lenguas», por lo que la ancla está en el lugar equivocado. Además, la nota inglesa relevante sobre la preposición repetida de clasificación no fue preservada, y conviene añadirla en español porque el uso de «por» puede sonar menos esperado al lector.'
  spanish_quality_summary: 'La redacción es natural, clara y digna en español bíblico actual: «Estos son los hijos de Cam, por sus clanes, por sus lenguas, en sus tierras, por sus naciones». «Cam» es forma española establecida y «clanes/lenguas/tierras/naciones» mantiene bien la fórmula. El principal problema es técnico-editorial de notas, no de estilo principal.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cam» es una adaptación onomástica española razonable. «Por sus clanes / por sus lenguas / por sus naciones» sigue la decisión auditada de conservar la fuerza clasificatoria; «en sus tierras» preserva el valor locativo de בְּאַרְצֹתָם. La nota de alternativa para «hijos de» como «descendientes de» es aceptable.
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «tierras», pero explica «lenguas».
    rationale: Esto produce una incoherencia formal y puede confundir al lector sobre qué término se está aclarando. El marcador debe moverse a «lenguas» o la nota debe reescribirse para «tierras».
  - severity: low
    issue: Falta una nota que preserve la alternativa auditada sobre el valor clasificatorio de la preposición repetida.
    rationale: El English POB conservó explícitamente la alternativa «according to their...». En español, una nota breve ayuda a justificar «por» frente a «según» y mantiene el rastro auditivo de la decisión léxica.
  revised_spanish_text: Estos son los hijos de Cam[a], por sus clanes[b], por sus lenguas[c], en sus tierras, por sus naciones.
