translation:
  language: es
  text: Di a Eleazar hijo de Aarón el sacerdote que levante los incensarios[a] de en medio de la quema[b], y esparza el fuego más lejos, porque se han vuelto santos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «braserillos». El hebreo se refiere a recipientes usados para llevar brasas e incienso.
    reason: lexical_alternative
  - marker: b
    text: O «de en medio del ardor» o «de entre la quemazón». El hebreo se refiere a la escena de la quema, no solo al fuego como sustancia.
    reason: lexical_alternative
  - marker: c
    text: 'O «porque son santos». El perfecto hebreo puede enfatizar el estado resultante: «se han vuelto santos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Tell
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Ordena decir
  lexicon: HALOT
  rationale: El imperativo de אמר introduce una instrucción directa. En español, «Di» conserva la inmediatez mandativa sin agregar paráfrasis.
- source_word: אֶלְעָזָר בֶּן אַהֲרֹן הַכֹּהֵן
  english_pob_choice: Eleazar son of Aaron the priest
  chosen_spanish: Eleazar hijo de Aarón el sacerdote
  alternatives_spanish:
  - Eleazar, hijo de Aarón el sacerdote
  - Eleazar hijo de Aarón, el sacerdote
  lexicon: HALOT
  rationale: Se conserva la cadena nominal del hebreo con una apposición natural en español. «El sacerdote» sigue más de cerca la construcción hebrea y mantiene el vínculo sacerdotal del nombre.
- source_word: וְיָרֵם
  english_pob_choice: to lift
  chosen_spanish: que levante
  alternatives_spanish:
  - que alce
  - que tome
  lexicon: HALOT
  rationale: El jussivo tras el imperativo expresa el contenido de la orden. «Que levante» reproduce bien esa fuerza exhortativa en español.
- source_word: הַמַּחְתֹּת
  english_pob_choice: the censers
  chosen_spanish: los incensarios
  alternatives_spanish:
  - los censers
  - los braseros
  lexicon: HALOT
  rationale: Se elige «incensarios» como término culto y comprensible en español para el recipiente ritual de brasas/incienso. «Censer» no es natural en español moderno, y «braseros» puede inducir a otra imagen.
- source_word: מִבֵּין הַשְּׂרֵפָה
  english_pob_choice: out from among the burning
  chosen_spanish: de entre el fuego
  alternatives_spanish:
  - de entre la quemazón
  - de entre lo quemado
  lexicon: HALOT
  rationale: El hebreo puede referirse al fuego o al lugar/estado de la quema. «De entre el fuego» preserva la imagen concreta y sigue de cerca el sentido preferido por la POB inglesa, sin forzar una interpretación más explicativa.
- source_word: וְאֶת הָאֵשׁ זְרֵה הָלְאָה
  english_pob_choice: and scatter the fire farther away
  chosen_spanish: y esparza el fuego más lejos
  alternatives_spanish:
  - y disperse el fuego más allá
  - y arroje el fuego aparte
  lexicon: HALOT
  rationale: זרה significa esparcir/dispersar, y הָלְאָה añade distancia. «Más lejos» comunica esa dirección adverbial de manera clara y fiel.
- source_word: כִּי קָדֵשׁוּ
  english_pob_choice: for they have become holy
  chosen_spanish: porque se han vuelto sagrados
  alternatives_spanish:
  - porque son sagrados
  - porque han sido santificados
  lexicon: HALOT
  rationale: Se mantiene la tensión entre estado resultante y posible cualidad actual. «Se han vuelto sagrados» refleja el perfecto hebreo como estado adquirido, sin ocultar la idea de consagración.
theological_decisions:
- issue: Referente del plural קָדֵשׁוּ
  english_pob_reading: The plural refers to the censers
  chosen_spanish_reading: El plural se refiere principalmente a los incensarios
  alternative_spanish_readings:
  - El plural incluye también el fuego
  - El plural alude de modo colectivo a los objetos del ofrecimiento
  rationale: 'El antecedente plural más cercano y natural es הַמַּחְתֹּת («los incensarios»). Eso encaja con la lógica narrativa: los incensarios quedan apartados porque han quedado consagrados por su presentación ante Yahvé.'
  doctrine_reference: Numeros 17:2; cf. la santidad de los objetos dedicados al servicio divino
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo con apoyo del audit trail inglés. No hubo revisiones aplicadas en el ciclo más reciente; la redacción propuesta conserva la decisión de leer קָדֵשׁוּ como estado resultante y de entender el plural como referente principal de los incensarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto principal cuando el contexto del nombre divino lo requiera; en este versículo no aparece explícitamente.
  - «Incensarios» se mantiene como término técnico ritual, coherente con la terminología POB para כלי de incienso cuando el contexto lo permite.
  - «Sagrados» traduce el estado de קָדֵשׁוּ sin borrar la tensión entre santidad adquirida y condición actual.
