base_translation:
  language: en
  yaml_path: translation/ot/2_kings/013/025.yaml
  text: Then Jehoash son of Jehoahaz took back the cities from the hand of Ben-hadad son of Hazael[a], which he had taken from the hand of Jehoahaz his father in war. Three times Joash struck him[b], and he restored the cities of Israel.
  footnotes:
  - marker: a
    text: 'Hebrew uses two forms of the same royal name in this verse: ''Jehoash'' earlier and ''Joash'' later.'
    reason: lexical_alternative
  - marker: b
    text: Or 'defeated him.' The Hebrew verb can denote striking in battle with the sense of military defeat.
    reason: lexical_alternative
