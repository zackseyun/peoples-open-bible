  text: וַ/יִּקַּ֞ח יְהוֹאָ֣שׁ מֶֽלֶךְ יְהוּדָ֗ה אֵ֣ת כָּל הַ/קֳּדָשִׁ֡ים אֲשֶׁר הִקְדִּ֣ישׁוּ יְהוֹשָׁפָ֣ט וִ/יהוֹרָם֩ וַ/אֲחַזְיָ֨הוּ אֲבֹתָ֜י/ו מַלְכֵ֤י יְהוּדָה֙ וְ/אֶת קֳדָשָׁ֔י/ו וְ/אֵ֣ת כָּל הַ/זָּהָ֗ב הַ/נִּמְצָ֛א בְּ/אֹצְר֥וֹת בֵּית יְהוָ֖ה וּ/בֵ֣ית הַ/מֶּ֑לֶךְ וַ/יִּשְׁלַ֗ח לַֽ/חֲזָאֵל֙ מֶ֣לֶךְ אֲרָ֔ם וַ/יַּ֖עַל מֵ/עַ֥ל יְרוּשָׁלִָֽם־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/012/019.yaml
  text: Then Jehoash king of Judah took all the holy things that Jehoshaphat[a], Jehoram, and Ahaziah, his fathers, the kings of Judah, had dedicated, along with his own holy things, and all the gold found in the treasuries of the house of Yahweh and of the king’s house, and sent it to Hazael king of Aram[b]; then he went up away from Jerusalem.
  footnotes:
  - marker: a
    text: Or, 'and he withdrew from Jerusalem.' The Hebrew literally says, 'and he went up from upon Jerusalem,' an idiom indicating that Hazael ceased his advance against the city.
    reason: lexical_alternative
  - marker: b
    text: '''His fathers'' means his royal forefathers or ancestors.'
    reason: cultural_note
