translation:
  language: es
  text: Mi pueblo, recuerda, por favor, lo que planeó Balac, rey de Moab, y lo que le respondió Balaam, hijo de Beor, desde Shittim[a] hasta Gilgal, para que conozcas las justas acciones[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shittim y Gilgal son nombres de lugares que evocan el recorrido de Israel desde las llanuras de Moab hasta la entrada en la tierra.
    reason: cultural_note
  - marker: b
    text: 'O: «los actos de salvación de Yahvé» o «las acciones de justicia de Yahvé». El plural hebreo puede abarcar tanto liberación como justicia y fidelidad pactal.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַמִּי
  english_pob_choice: My people
  chosen_spanish: Pueblo mío
  alternatives_spanish:
  - Mi pueblo
  lexicon: HALOT
  rationale: En español, el vocativo natural y reverente es 'Pueblo mío'; conserva la relación de pertenencia pactal sin sonar forzado. 'Mi pueblo' también es posible, pero 'Pueblo mío' sigue mejor el tono exhortativo del hebreo.
- source_word: זְכָר נָא
  english_pob_choice: please remember
  chosen_spanish: por favor recuerda
  alternatives_spanish:
  - recuerda, por favor
  - recuerda ahora
  - no olvides
  lexicon: HALOT
  rationale: '''זְכָר נָא'' combina mandato con una partícula de ruego; ''por favor recuerda'' comunica bien la súplica respetuosa sin arcaísmo.'
- source_word: מַה יָּעַץ
  english_pob_choice: what ... planned
  chosen_spanish: lo que planeó
  alternatives_spanish:
  - lo que aconsejó
  - lo que maquinó
  - lo que ideó
  lexicon: HALOT
  rationale: Aunque 'ייעץ' puede significar aconsejar, aquí el contexto es hostil. 'Planeó' expresa la intención concreta de Balac sin debilitar la fuerza del verbo.
- source_word: בָּלָק מֶלֶךְ מוֹאָב
  english_pob_choice: Balak king of Moab
  chosen_spanish: Balac, rey de Moab
  alternatives_spanish:
  - Balac, el rey de Moab
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la forma usual en español bíblico ('Balac') y la aposición directa 'rey de Moab'.
- source_word: וּמֶה עָנָה אֹתוֹ
  english_pob_choice: and what ... answered him
  chosen_spanish: y lo que le respondió
  alternatives_spanish:
  - y qué le respondió
  - y cuál fue su respuesta a él
  lexicon: HALOT
  rationale: La construcción hebrea pide una respuesta dada a Balac; 'le respondió' es la forma natural en español y mantiene el objeto pronominal.
- source_word: בִּלְעָם בֶּן בְּעוֹר
  english_pob_choice: Balaam son of Beor
  chosen_spanish: Balaam, hijo de Beor
  alternatives_spanish:
  - Balaam, hijo de Beor
  lexicon: HALOT
  rationale: Se preserva la filiación de forma directa y transparente.
- source_word: מִן הַשִּׁטִּים עַד הַגִּלְגָּל
  english_pob_choice: from Shittim to Gilgal
  chosen_spanish: desde Shittim hasta Gilgal
  alternatives_spanish:
  - de Shittim a Gilgal
  - desde Acacia Grove hasta Gilgal
  lexicon: HALOT
  rationale: Se mantienen los nombres propios de lugar como en la tradición de transliteración; 'desde... hasta...' refleja el marcaje de recorrido y transición histórica.
- source_word: לְמַעַן דַּעַת
  english_pob_choice: so that you may know
  chosen_spanish: para que conozcas
  alternatives_spanish:
  - a fin de que conozcas
  - para que sepas
  lexicon: HALOT
  rationale: El hebreo expresa propósito; en segunda persona singular implícita dirigida al pueblo, 'para que conozcas' suena natural y conserva la relación directa.
- source_word: צִדְקוֹת
  english_pob_choice: the righteous acts
  chosen_spanish: las justas acciones
  alternatives_spanish:
  - las acciones justas
  - las justas obras
  - los actos de justicia
  lexicon: HALOT
  rationale: '''צִדְקוֹת'' en plural puede abarcar actos justos, fieles y rectos de Yahvé. ''Justas acciones'' conserva el vínculo con ''justicia/rectitud'' y evita estrecharlo solo a ''salvación''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto en español, evitando la sustitución por un título.
theological_decisions:
- issue: Sentido de צִדְקוֹת יְהוָה
  english_pob_reading: Yahweh's righteous acts
  chosen_spanish_reading: las justas acciones de Yahvé
  alternative_spanish_readings:
  - los actos de salvación de Yahvé
  - las acciones de justicia de Yahvé
  rationale: La frase apunta a las obras históricas de Yahvé que revelan su justicia pactal y su fidelidad, sin reducirse solo a liberación ni solo a retribución judicial.
  doctrine_reference: Translation philosophy §3; Contested terms table on יְהוָה
- issue: Valor del recuerdo histórico en el verso
  english_pob_reading: remember ... from Shittim to Gilgal
  chosen_spanish_reading: recuerda ... desde Shittim hasta Gilgal
  alternative_spanish_readings:
  - recuerda ... de Shittim a Gilgal
  - ten presente ... desde Shittim hasta Gilgal
  rationale: El verso convoca a Israel a rememorar un tramo histórico concreto para interpretar la fidelidad de Yahvé; la preposición de recorrido ayuda a preservar ese arco narrativo.
  doctrine_reference: Contexto profético-histórico de Miqueas 6
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje fuente hebreo (WLC), la traducción inglesa POB y sus notas auditadas. No hubo revisiones aplicadas en el contexto inglés más reciente; la presente propuesta mantiene la lectura principal y conserva en notas la amplitud semántica documentada para מַה יָּעַץ, צִדְקוֹת y los topónimos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - 'Se mantiene transliteración de nombres propios bíblicos donde la tradición española admite formas asentadas: ''Balac'', ''Balaam'', ''Shittim'', ''Gilgal''.'
  - Se evita 'SEÑOR' como sustituto del nombre divino, siguiendo la política del proyecto.
  - '''justas acciones'' conserva la tensión entre justicia, rectitud y hechos históricos sin forzar una sola lectura.'
