revisions:
- from: Sus alas estaban unidas[a], cada una con la otra. Al moverse, no se volvían[b]; cada una iba derecho hacia adelante.
  to: Sus alas estaban unidas[a], cada una con su hermana. Al moverse, no se volvían[b]; cada una iba recto hacia adelante.
  rationale: Se hizo un ajuste menor para acercar la redacción española a la decisión léxica auditada del hebreo idiomático, preservando mejor la imagen de correspondencia entre las alas mediante «cada una con su hermana», ya aclarada por la nota. También se mejoró la naturalidad de la cláusula final con «iba recto hacia adelante».
