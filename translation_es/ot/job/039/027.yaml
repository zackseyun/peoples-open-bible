translation:
  language: es
  text: ¿Acaso el águila vuela alto[a] por tu mandato[b] y pone su nido en las alturas?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «planea» para «vuela alto».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «sobre tu boca», un modismo que significa «por tu mandato» o «según tu palabra».
    reason: lexical_alternative
  - marker: c
    text: «Águila» también puede entenderse de manera más amplia como un ave grande de rapiña; en algunos contextos podría incluir un buitre.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Is it
  chosen_spanish: ¿Está... que
  alternatives_spanish:
  - ¿Acaso... que
  - ¿Es que...?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica, no una condición real. En español, «¿Está... que» conserva el valor interrogativo sin volverlo condicional de manera artificial.
- source_word: עַל פִּיךָ
  english_pob_choice: at your command
  chosen_spanish: a tu mando
  alternatives_spanish:
  - por tu palabra
  - según tu orden
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre tu boca», un modismo de autoridad. «A tu mando» mantiene la idea de orden/comando con naturalidad en español.
- source_word: יַגְבִּיהַּ
  english_pob_choice: flies high
  chosen_spanish: vuele en alto
  alternatives_spanish:
  - vuele muy alto
  - se eleve
  - planee en lo alto
  lexicon: HALOT
  rationale: El hiphil de גבה expresa hacer alto o elevarse. «Vuele en alto» conserva la imagen de altura sin forzar una paráfrasis excesiva.
- source_word: נָשֶׁר
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - ave de rapiña
  - buitre
  lexicon: HALOT
  rationale: «Águila» es la equivalencia usual y la más natural en este contexto poético de elevación y nido alto. Mantiene la lectura tradicional sin perder el sentido del ave rapaz.
- source_word: יָרִים קִנּוֹ
  english_pob_choice: makes its nest on high
  chosen_spanish: ponga su nido en las alturas
  alternatives_spanish:
  - levante su nido en alto
  - coloque su nido en alto
  - alce su nido
  lexicon: HALOT
  rationale: El verbo y el sustantivo juntos expresan la acción de levantar/ubicar el nido en un lugar elevado. «Ponga su nido en las alturas» refleja esa colocación elevada mejor que una simple repetición de «levantar».
theological_decisions:
- issue: La pregunta retórica expresa la soberanía de Dios sobre la conducta del ave
  english_pob_reading: Is it at your command that the eagle flies high and makes its nest on high?
  chosen_spanish_reading: ¿Está a tu mando que el águila vuele en alto y ponga su nido en las alturas?
  alternative_spanish_readings:
  - ¿Acaso el águila vuela en alto por tu orden y pone su nido en alto?
  - ¿Está el águila bajo tu mando para volar alto y hacer su nido en alto?
  rationale: Se conserva la fuerza retórica del interrogante y la relación de dominio implícita en el hebreo, sin convertirla en una afirmación doctrinal distinta. La formulación mantiene la pregunta sobre el control humano frente a la libertad dada por Dios al ave.
  doctrine_reference: Soberanía divina en el discurso de Yahvé a Job (Job 38–41)
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «lifts up its nest» por «makes its nest on high» para reflejar mejor la idea de ubicar el nido en un lugar elevado. La versión española sigue esa decisión al usar «ponga su nido en las alturas», mientras conserva «vuele en alto» para el primer verbo.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» como norma del proyecto, aunque este versículo no los contiene.
  - Se usa «águila» como término principal por coherencia con la lectura POB, sin excluir la amplitud semántica indicada en la nota.
  - «A tu mando» evita el calco «sobre tu boca» en el texto principal, pero la nota preserva el modismo hebreo para auditar la decisión.
