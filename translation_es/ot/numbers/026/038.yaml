translation:
  language: es
  text: 'Los hijos de Benjamín, según sus clanes: de Bela[a], el clan de los Belaitas; de Ashbel, el clan de los Ashbelitas; de Ahiram, el clan de los Ahiramitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ahiram en el Texto Masorético corresponde a “Ahiam” en algunas tradiciones textuales y versiones en inglés; el texto principal sigue aquí la lectura hebrea.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: The sons of Benjamin
  chosen_spanish: Los hijos de Benjamín
  alternatives_spanish:
  - Los descendientes de Benjamín
  - Los hijos de Benjamín
  lexicon: HALOT
  rationale: En una lista genealógica y censal, בְּנֵי puede equivaler a “hijos” de forma formal y transparente. “Descendientes” también sería posible, pero “hijos de Benjamín” conserva mejor la estructura del hebreo y el tono de lista tribal.
- source_word: לְ/מִשְׁפְּחֹתָ/ם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus clanes
  - de acuerdo con sus clanes
  - según sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí denota subdivisiones clánicas dentro de la tribu. “Según” refleja bien el valor distributivo/organizativo del prefijo ל en este contexto censal, y “clanes” preserva la terminología más precisa frente a “familias”, que puede sonar demasiado genérico en español.
- source_word: לְבֶלַע
  english_pob_choice: of Bela
  chosen_spanish: de Bela
  alternatives_spanish:
  - para Bela
  - a Bela
  lexicon: HALOT
  rationale: En esta enumeración genealógica, el ל inicial no indica dirección sino pertenencia/origen. “De Bela” es la forma española más natural para marcar esa relación de descendencia.
- source_word: מִשְׁפַּחַת הַבַּלְעִי
  english_pob_choice: the clan of the Belaites
  chosen_spanish: el clan de los belaítas
  alternatives_spanish:
  - el clan belaíta
  - la familia de los belaítas
  lexicon: HALOT
  rationale: El gentilicio hebreo apunta a una designación de grupo derivado de Bela. “Belaítas” reproduce esa formación de manera clara y mantiene el paralelismo con los demás nombres del versículo.
- source_word: לְאַשְׁבֵּל
  english_pob_choice: of Ashbel
  chosen_spanish: de Ashbel
  alternatives_spanish:
  - para Ashbel
  - a Ashbel
  lexicon: HALOT
  rationale: Como con Bela, el ל introduce el antepasado del clan. “De Ashbel” comunica la relación genealógica sin añadir interpretación.
- source_word: מִשְׁפַּחַת הָאַשְׁבֵּלִי
  english_pob_choice: the clan of the Ashbelites
  chosen_spanish: el clan de los ashbelitas
  alternatives_spanish:
  - el clan ashbelita
  - la familia de los ashbelitas
  lexicon: HALOT
  rationale: “Ashbelitas” sigue el patrón etnónimo del hebreo y conserva la forma de clan. La opción singular “clan ashbelita” es posible, pero el plural evita ambigüedad y se ajusta al elenco de grupos.
- source_word: לַאֲחִירָם
  english_pob_choice: of Ahiram
  chosen_spanish: de Ahiram
  alternatives_spanish:
  - de Ahiam
  lexicon: HALOT
  rationale: Se sigue la lectura masorética אֲחִירָם, que el POB inglés también toma como base principal. “De Ahiram” mantiene la correspondencia con el nombre hebreo en el texto fuente.
- source_word: מִשְׁפַּחַת הָאֲחִירָמִי
  english_pob_choice: the clan of the Ahiramites
  chosen_spanish: el clan de los ahiramitas
  alternatives_spanish:
  - el clan ahiramita
  - la familia de los ahiramitas
  lexicon: HALOT
  rationale: El gentilicio se vierte con el patrón español “-itas”, que hace visible la pertenencia a un linaje/clan. “Clan de los ahiramitas” preserva el paralelismo con las dos menciones anteriores y la fuerza colectiva del hebreo.
theological_decisions:
- issue: Lectura textual de Ahiram vs. Ahiam
  english_pob_reading: The main text follows the Hebrew reading 'Ahiram'; a footnote notes that some textual traditions and English versions read 'Ahiam'.
  chosen_spanish_reading: El texto principal sigue la lectura hebrea 'Ahiram'.
  alternative_spanish_readings:
  - '''Ahiam'' en algunas tradiciones textuales y versiones'
  - '''Ahiam'' como variante textual'
  rationale: Dado que el testimonio base masorético lee אֲחִירָם, el texto español principal conserva esa forma. La variante se deja registrada para no borrar la tensión documental entre tradiciones, pero no se incorpora al cuerpo principal porque el POB inglés también prioriza la lectura hebrea.
  doctrine_reference: Crítica textual / tradición masorética
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el hebreo masorético y el audit trail inglés; no se requirieron revisiones sustantivas. La única tensión relevante es la variante textual de Ahiram/Ahiam, mantenida mediante nota sin alterar el texto principal.
  spanish_consistency_notes:
  - Se conservó “clan” para מִשְׁפָּחָה por ser el término más preciso en contexto censal tribal.
  - Se usó “hijos de” para בְּנֵי por su correspondencia formal con la lista genealógica.
  - Se mantuvo la transliteración de nombres propios para evitar normalizaciones no sustentadas.
  - Se eligió “según” para לְמִשְׁפְּחֹתָם porque expresa bien la organización por clanes en español sin forzar una preposición genealógica artificial.
