review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la lista de grupos de autoridad y las notas culturales principales, pero falla en el verbo principal. וַיִּתְנַדְּבוּ en este contexto, según el propio rastro POB, se refiere a dar/ofrecer voluntariamente una contribución material, no a ofrecerse a sí mismos para servicio. También conviene alinear mejor la nota léxica con מְלֶאכֶת como «obra/trabajo» del rey.
  spanish_quality_summary: El español es claro y natural en general. «Jefes», «casas paternas» y «encargados» funcionan bien. Sin embargo, «se ofrecieron voluntariamente» cambia el sentido hacia autoofrecimiento personal. «Los millares y de los cientos» del registro léxico interno está mal formulado, aunque el texto corrido ya evita ese problema. «Obra del rey» suena un poco más bíblico/natural que «trabajo del rey», pero este último no es incorrecto.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La principal desalineación es semántica con la decisión auditada para וַיִּתְנַדְּבוּ ('gave willingly'). Las notas deben mantener la alternativa de libre ofrenda/voluntariedad en vez de autoofrecimiento.
  issues:
  - severity: high
    issue: El verbo principal «se ofrecieron voluntariamente» no preserva el sentido contextual de contribución voluntaria.
    rationale: La evidencia fuente y la decisión léxica inglesa indican una respuesta de ofrenda/donación libre en el contexto de las contribuciones para la casa de Dios, no un voluntariado personal para servicio.
  - severity: medium
    issue: La nota [c] se centra en alternativas para «trabajo del rey», cuando la nota alternativa más necesaria según el rastro POB corresponde al verbo principal.
    rationale: El inglés conserva una nota léxica sobre la voluntariedad del verbo («gave willingly / offered willingly / volunteered»). En español, la ambigüedad creada por el borrador exige corregir el texto y trasladar la nota al verbo.
  - severity: low
    issue: «Trabajo del rey» es fiel, pero «obra del rey» puede sonar más natural en contexto administrativo/cultual.
    rationale: מְלֶאכֶת permite trabajo/obra/servicio. En este pasaje, «obra del rey» encaja mejor con proyectos y responsabilidades reales sin cambiar el sentido.
  revised_spanish_text: Entonces los jefes de las casas paternas[a], los jefes de las tribus de Israel, los jefes de los millares y de los cientos[b], y los encargados de la obra del rey, dieron voluntariamente[c].
