translation:
  language: es
  text: Porque la violencia hecha al Líbano te cubrirá[b], y la destrucción de las bestias te aterrorizará, por la sangre del hombre[a] y la violencia hecha a la tierra, a la ciudad y a todos los que habitan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por sangre humana'. El hebreo dice literalmente 'por la sangre del hombre', con 'hombre' en sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: O 'te abrumará'. El hebreo dice literalmente 'te cubrirá', preservando la imagen de ser cubierto o sobrecogido por el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַס
  english_pob_choice: violence done to
  chosen_spanish: violencia hecha al
  alternatives_spanish:
  - violencia contra
  - mal hecho a
  - agravio hecho a
  lexicon: HALOT
  rationale: חָמָס puede expresar violencia, agravio o injusticia violenta. Aquí el objeto afectado es Líbano, así que en español conviene explicitar la relación con una construcción natural que conserve la idea de violencia sufrida, sin suavizar el término.
- source_word: לְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: Líbano
  alternatives_spanish:
  - Lebanon
  lexicon: HALOT
  rationale: Es nombre propio geográfico y se conserva por transliteración adaptada al español común.
- source_word: יְכַסֶּךָּ
  english_pob_choice: will cover you
  chosen_spanish: te cubrirá
  alternatives_spanish:
  - te envolverá
  - te sobrevendrá
  - te abrumará
  lexicon: HALOT
  rationale: כסה significa literalmente 'cubrir'. Mantengo la imagen verbal, que en el contexto profético sugiere alcance o sobrecogimiento retributivo, sin reemplazarla por una paráfrasis interpretativa.
- source_word: שֹׁד
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - devastación
  - ruina
  - saqueo
  lexicon: HALOT
  rationale: שֹׁד denota ruina violenta o devastación. 'Destrucción' reproduce bien el paralelismo con 'violencia' y no restringe demasiado el sentido.
- source_word: בְּהֵמ֖וֹת
  english_pob_choice: beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - el ganado
  lexicon: HALOT
  rationale: El plural abarca animales en general. 'Bestias' conserva el registro elevado y poético del profeta, y es más fiel que 'ganado', que sería demasiado específico.
- source_word: יְחִיתַ֑/ן
  english_pob_choice: will terrify you
  chosen_spanish: te aterrorizará
  alternatives_spanish:
  - te aterrará
  - te espantará
  - te llenará de terror
  lexicon: HALOT
  rationale: La forma verbal causativa de חתת expresa causar terror o consternación. En español, 'te aterrorizará' mantiene el paralelismo y la dirección al singular, coherente con el texto hebreo y la revisión del POB en inglés.
- source_word: מִ/דְּמֵ֤י אָדָם֙
  english_pob_choice: because of the blood of man
  chosen_spanish: por la sangre de hombre
  alternatives_spanish:
  - a causa de la sangre de hombre
  - por la sangre humana
  - por la sangre derramada de hombre
  lexicon: HALOT
  rationale: La preposición causal מִן permite 'por' o 'a causa de'. Mantengo 'hombre' en singular como en el hebreo, preservando la forma representativa sin forzar una abstracción como 'humanidad'.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humano
  - humanidad
  - persona
  lexicon: HALOT
  rationale: Se conserva el singular representativo del hebreo. 'Hombre' reproduce la forma fuente y deja abierta la referencia amplia a la humanidad, en línea con el tratamiento del POB en inglés.
- source_word: וַחֲמַס אֶרֶץ
  english_pob_choice: and the violence done to the land
  chosen_spanish: y la violencia contra la tierra
  alternatives_spanish:
  - y la violencia hecha a la tierra
  - y el agravio contra la tierra
  - y la violencia de la tierra
  lexicon: HALOT
  rationale: El segundo חמס sigue siendo violencia infligida a un objeto/víctima. 'Contra la tierra' suena natural en español y conserva la relación de agresión sin introducir elementos ajenos al hebreo.
- source_word: קִרְיָה
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - una ciudad
  - la urbe
  - el poblado
  lexicon: HALOT
  rationale: קִרְיָה significa ciudad o poblado. Aquí el artículo definido es adecuado porque el contexto inmediato apunta a la ciudad construida con violencia (cf. el v. 12).
- source_word: יֹשְׁבֵי בָהּ
  english_pob_choice: all who dwell in it
  chosen_spanish: todos los que habitan en ella
  alternatives_spanish:
  - todos sus habitantes
  - quienes habitan en ella
  - todos los moradores de ella
  lexicon: HALOT
  rationale: El participio expresa a los habitantes. 'Todos los que habitan en ella' conserva el valor verbal y el tono profético, a la vez que fluye bien en español.
theological_decisions:
- issue: Sentido representativo de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humanidad
  - humano
  - persona
  rationale: El hebreo está en singular y funciona de manera representativa. Mantener 'hombre' preserva la forma del texto sin perder el alcance colectivo implícito; evita una nivelación interpretativa prematura.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Relación causal de la sangre y la violencia
  english_pob_reading: because of the blood of man and the violence done to the land
  chosen_spanish_reading: por la sangre de hombre y la violencia contra la tierra
  alternative_spanish_readings:
  - a causa de la sangre de hombre y de la violencia contra la tierra
  - por la sangre humana y la violencia contra la tierra
  rationale: La partícula causal hebrea sostiene una lectura de retribución fundada en derramamiento de sangre y violencia. 'Por' mantiene la causalidad sin sobreexplicar, y deja visible la tensión poética del juicio.
  doctrine_reference: 'DOCTRINE.md §Poetic and prophetic discourse; Contested terms: דָּם'
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió el pronombre de 'them' a 'you' para concordar con el singular del destinatario. La versión española refleja ese ajuste con el singular 'te' en ambos verbos principales. También se mantuvo la estructura poética del hebreo, conservando la secuencia de violencia, destrucción, sangre y violencia contra la tierra, la ciudad y sus habitantes.
  spanish_consistency_notes:
  - Se usó 'Líbano' para לְבָנוֹן en lugar de un equivalente explicativo.
  - Se mantuvo 'hombre' para אָדָם por fidelidad al singular representativo del hebreo.
  - Se conservó 'te' en singular en toda la cláusula principal, en consonancia con la forma verbal hebrea y la revisión auditada.
  - '''Bestias'' se eligió por el registro poético y profético; no se rebajó a ''animales'' ni se especificó ''ganado''.'
  - '''Ciudad'' se mantuvo con artículo definido porque el contexto sugiere una ciudad concreta o representativa, no una ciudad indefinida.'
