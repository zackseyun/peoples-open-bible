translation:
  language: es
  text: los dos pilares, y las dos copas[a] de los capiteles[b] que estaban sobre la parte superior de los pilares, y las dos enrejaduras[c] para cubrir las dos copas de los capiteles que estaban sobre la parte superior de los pilares;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "globos" o "formas redondeadas"; el término hebreo se refiere a elementos redondeados de los capiteles, y la forma arquitectónica exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: La traducción tradicional española a veces usa "chapiteles" para "capiteles".
    reason: lexical_alternative
  - marker: c
    text: O "redes" para "enrejaduras".
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדִים
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  lexicon: HALOT
  rationale: En contexto arquitectónico del templo, "pilares" comunica bien la pieza estructural sin forzar una terminología más técnica que no aporta más claridad en español.
- source_word: גֻלֹּת
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - globos
  - formas redondeadas
  - cuencos
  lexicon: HALOT
  rationale: El hebreo designa formas redondeadas asociadas a los capiteles. "Copas" mantiene la idea de un recipiente o bulto redondeado y suena más natural que "cuencos" en una lista arquitectónica, aunque la forma exacta sigue siendo incierta.
- source_word: כֹּתָרֹת
  english_pob_choice: capitals
  chosen_spanish: capiteles
  alternatives_spanish:
  - chapiteles
  - coronas
  lexicon: HALOT
  rationale: '"Capiteles" es el término arquitectónico normal en español para la parte superior ornamental de una columna o pilar. Evita tanto el arcaísmo "chapiteles" como el sentido demasiado figurado de "coronas".'
- source_word: רֹאשׁ
  english_pob_choice: tops
  chosen_spanish: cabeza
  alternatives_spanish:
  - parte superior
  - tope
  lexicon: HALOT
  rationale: Aquí el hebreo usa "cabeza" literalmente, pero en español la expresión fija "sobre la cabeza de los pilares" conserva la imagen original y refleja la repetición del texto hebreo mejor que una paráfrasis más libre.
- source_word: שְּׂבָכ֣וֹת
  english_pob_choice: latticeworks
  chosen_spanish: enrejaduras
  alternatives_spanish:
  - enmaderados en red
  - rejillas
  - redes
  lexicon: HALOT
  rationale: El término apunta a una estructura entretejida o en forma de red. "Enrejaduras" conserva el sentido de entramado ornamental y evita imponer una imagen demasiado específica como "rejillas".
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - con el fin de cubrir
  - a cubrir
  lexicon: HALOT
  rationale: La infinitiva de propósito se expresa naturalmente con "para cubrir" en español, manteniendo la finalidad sin sobreexplicarla.
- source_word: שְׁנַיִם / שְׁתָּיִם / שְׁתֵּי
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - '2'
  lexicon: HALOT
  rationale: Se preserva la repetición numérica del hebreo con "dos" para mantener la estructura inventarial del versículo.
- source_word: אֲשֶׁר עַל רֹאשׁ הָעַמּוּדִים
  english_pob_choice: that were on the tops of the pillars
  chosen_spanish: que estaban sobre la cabeza de los pilares
  alternatives_spanish:
  - que estaban sobre la parte superior de los pilares
  - que estaban en la cima de los pilares
  lexicon: HALOT
  rationale: Se mantiene la repetición descriptiva del hebreo y su imagen espacial. "Cabeza" traduce con mayor cercanía el término hebreo que "parte superior", aunque suene menos idiomático; aquí la fidelidad a la imagen arquitectónica pesa más que una normalización estilística.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la estructura repetitiva del hebreo y coincide con el audit trail inglés en los rasgos clave: pilares, formas redondeadas/copas de los capiteles, y entramados para cubrirlas. No se introdujeron cambios de sentido doctrinal ni textual, y se conserva la incertidumbre arquitectónica en torno a גֻלֹּת y שְּׂבָכ֣וֹת.'
  spanish_consistency_notes:
  - 'Se mantuvo un registro terminológico consistente: pilares / capiteles / copas / enrejaduras.'
  - Se conservó la repetición de la cláusula relativa para reflejar el paralelismo del hebreo.
  - Se evitó "SEÑOR" u otros términos teológicos irrelevantes en este versículo.
  - La puntuación reproduce una enumeración extensa y coordinada, propia del inventario arquitectónico del pasaje.
