  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀νυνὶ δὲ διαφορωτέρας τέτυχεν λειτουργίας, ὅσῳ καὶ κρείττονός ἐστιν διαθήκης μεσίτης, ἥτις ἐπὶ κρείττοσιν ἐπαγγελίαις νενομοθέτηται.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/008/006.yaml
  text: But as it is[a], he has obtained a more excellent ministry, by as much as he is also the mediator of a better covenant[c][b], which has been enacted on better promises.
  footnotes:
  - marker: a
    text: Or 'superior ministry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has been established on better promises.'
    reason: lexical_alternative
  - marker: c
    text: The Greek word can mean 'covenant' or, in some contexts, 'testament'; here 'covenant' fits the context of Jeremiah's new covenant promise cited in the following verses.
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 이제 그분은 더 뛰어난 봉사를 얻으셨으니, 그만큼 그분은 더 좋은 언약의 중보자가 되십니다. 이 언약은 더 좋은 약속들 위에 세워졌습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_korean: 언약
  alternatives_korean:
  - 계약
  lexicon: BDAG
  rationale: 성경의 διαθήκη는 단순한 계약이 아니라 하나님이 일방적으로 세우신 언약을 가리킨다. 한국 교회 전통 용어 「언약」을 그대로 사용한다.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_korean: 중보자
  alternatives_korean:
  - 중재자
  lexicon: BDAG
  rationale: 히브리서의 신학적 핵심어로서 「중보자」로 옮긴다.
