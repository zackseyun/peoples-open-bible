    text: O ‘sobre los arameos’; el hebreo ‘Aram’ puede referirse al reino o a sus fuerzas. Las versiones tradicionales en español suelen decir ‘Siria’, pero el nombre propio hebreo es Aram.
    reason: lexical_alternative
