translation:
  language: es
  text: ¿Podrá gobernar[a] uno que odia la justicia? ¿Y condenarías tú al justo Poderoso?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regir» o «refrenar»; más literalmente, «atar». El verbo hebreo probablemente expresa aquí la idea de ejercer gobierno o restricción.
    reason: lexical_alternative
  - marker: b
    text: O «el poderoso justo» o «el justo grande». La frase se entiende más naturalmente aquí como referencia a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: הַ/אַף
  english_pob_choice: Can
  chosen_spanish: ¿Podrá…?
  alternatives_spanish:
  - ¿Puede…?
  - ¿Acaso podrá…?
  lexicon: HALOT
  rationale: La partícula interrogativa introduce una pregunta retórica enfática. «Podrá» conserva el valor interrogativo con un matiz de capacidad/aptitud, cercano al efecto de «Can» en inglés sin volver la frase pesada.
- source_word: שׂוֹנֵא
  english_pob_choice: one who hates
  chosen_spanish: uno que odia
  alternatives_spanish:
  - el que odia
  - quien odia
  - enemigo de
  lexicon: HALOT
  rationale: El participio funciona sustantivado; «uno que odia» preserva el rasgo caracterizador continuo y suena natural en español.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la rectitud judicial
  - el derecho
  lexicon: HALOT
  rationale: Aquí el contexto apunta al orden justo de gobierno y al lenguaje forense. «La justicia» es la opción más clara y fiel en español, como en la decisión inglesa.
- source_word: יַחֲבֹשׁ
  english_pob_choice: govern
  chosen_spanish: gobernar
  alternatives_spanish:
  - regir
  - reinar
  - gobernar y contener
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede significar literalmente «atar» o por extensión «refrenar», el contexto retórico de autoridad y gobierno favorece «gobernar», que comunica la fuerza idiomática sin perder el sentido de ejercicio de poder.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: el Justo
  alternatives_spanish:
  - el justo
  - el recto
  - el que es justo
  lexicon: HALOT
  rationale: El adjetivo describe rectitud moral y, en combinación con el siguiente sustantivo/adjetivo, puede funcionar como designación de Dios. «El Justo» permite mantener la densidad teológica sin forzar una perífrasis.
- source_word: כַּבִּיר
  english_pob_choice: Mighty One
  chosen_spanish: Poderoso
  alternatives_spanish:
  - Grande
  - Grande y Poderoso
  - Poderoso Grande
  lexicon: HALOT
  rationale: El término puede leerse como sustantivado o adjetivo intensivo. «Poderoso» conserva la idea de majestad/fuerza. En español, unirlo a «el Justo» como título compuesto («el Justo Poderoso») mantiene la ambigüedad referencial y el peso honorífico sin añadir un sustantivo inexistente en el hebreo.
- source_word: תַּרְשִׁיעַ
  english_pob_choice: will you condemn
  chosen_spanish: condenarías
  alternatives_spanish:
  - condenarás
  - declararías culpable
  - declararías injusto
  lexicon: HALOT
  rationale: El Hiphil expresa declarar culpable/condenar. En la pregunta retórica, el condicional español reproduce bien el valor de reproche o incredulidad implícito en el hebreo y suena más natural que un futuro simple.
theological_decisions:
- issue: Referente de «el Justo Poderoso»
  english_pob_reading: A reference to God, rendered with capitalization as 'Mighty One'
  chosen_spanish_reading: Referencia a Dios, sin explicitar el nombre divino pero con título reverencial
  alternative_spanish_readings:
  - el justo poderoso
  - el Poderoso justo
  - el Justo Grande
  rationale: La frase hebrea puede entenderse naturalmente como alusión a Dios dentro del argumento de Eliú. En español, la mayúscula en «Justo» y «Poderoso» conserva el valor honorífico y sugiere el referente divino sin añadir un título interpretativo extra. Se evita traducir con «SEÑOR» porque el texto no usa el tetragrámaton en esta línea.
  doctrine_reference: Job 34:17; cf. el argumento de justicia divina en el discurso de Eliú
translation_notes:
  revision_awareness: 'Coincide con el sentido principal del audit trail inglés: dos preguntas retóricas sobre la idoneidad para gobernar y para condenar al ser justo y poderoso, con el segundo miembro probablemente referido a Dios. Se adoptó una solución española que preserva la tensión semántica entre el verbo idiomático de gobierno y el posible matiz de «atar/restringir», reflejado en nota.'
  spanish_consistency_notes:
  - Se usa «Dios» sólo en la nota teológica y no en el texto principal para respetar la ambigüedad documentada del hebreo.
  - «Justo Poderoso» mantiene la capitalización reverencial y la estructura compacta del hebreo, evitando expandirlo a un título no atestiguado.
  - La forma verbal «condenarías» reproduce mejor la segunda pregunta retórica que un futuro simple, dado el tono de reproche implícito.
