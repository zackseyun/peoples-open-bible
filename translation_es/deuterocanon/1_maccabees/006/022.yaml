translation:
  language: es
  text: 'Y fueron al rey y dijeron[a][b]: «¿Hasta cuándo no actuarás…?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conservado en este testimonio está incompleto y se interrumpe después de la pregunta «¿Hasta cuándo no actuarás…?». Los puntos suspensivos reflejan esa truncación del testimonio, no una paráfrasis.
    reason: textual_variant
  - marker: b
    text: 'Más literalmente: «¿Hasta cuándo no harás…?». El verbo ποιέω puede significar de manera amplia «hacer»; se eligió «actuar» por claridad en esta cláusula truncada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se dirigieron
  - fueron caminando
  lexicon: LSJ
  rationale: El aoristo de πορεύομαι expresa ir o dirigirse. En español, «fueron» conserva la acción narrativa de movimiento sin introducir un matiz más fuerte de viaje o desplazamiento que el griego no exige aquí.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - ante el rey
  lexicon: LSJ
  rationale: La preposición πρός con acusativo indica movimiento hacia una persona para audiencia o petición. «Al rey» es la forma natural y fiel en español para ese acceso/presentación.
- source_word: Ἕως πότε
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo…?
  alternatives_spanish:
  - ¿Por cuánto tiempo…?
  - ¿Hasta cuándo más…?
  lexicon: LSJ
  rationale: Es un modismo de reproche o urgencia. «¿Hasta cuándo…?» reproduce de forma directa la fuerza interrogativa del griego y es idiomática en español.
- source_word: οὐ ποιήσεις
  english_pob_choice: will you not act
  chosen_spanish: no actuarás
  alternatives_spanish:
  - no harás nada
  - no tomarás acción
  lexicon: LSJ
  rationale: ποιέω es amplio ('hacer, obrar, actuar'). Dado que el complemento falta en este testimonio truncado, «actuarás» preserva el sentido de intervención requerida sin añadir un objeto no atestiguado.
