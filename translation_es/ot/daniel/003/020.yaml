translation:
  language: es
  text: Y mandó a ciertos guerreros valientes de su ejército atar a Sadrac[a], Mesac y Abednego, para echarlos en el horno de fuego ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «en el horno ardiente de fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְגֻבְרִין
  english_pob_choice: certain men / And [to] men
  chosen_spanish: a ciertos hombres
  alternatives_spanish:
  - y a ciertos hombres
  - a algunos hombres
  lexicon: HALOT
  rationale: El hebreo introduce los destinatarios del mandato con preposición y conjunción; en español, 'a ciertos hombres' comunica de forma natural el objeto del mandato sin calco innecesario.
- source_word: גִּבָּרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres fuertes
  - guerreros
  - hombres de valor
  lexicon: HALOT
  rationale: La expresión es un modismo militar que denota hombres capaces y vigorosos. 'Hombres valientes' conserva el matiz de valor/capacidad bélica sin sonar anticuado en español.
- source_word: דִּי בְחַיְלֵהּ
  english_pob_choice: who were in his army
  chosen_spanish: que estaban en su ejército
  alternatives_spanish:
  - que estaban en su fuerza
  - que estaban en su poder
  lexicon: HALOT
  rationale: Aquí חַיִל se entiende como fuerza militar. 'Ejército' expresa con naturalidad esa pertenencia militar en español y mantiene el sentido contextual del POB inglés.
- source_word: אֲמַר
  english_pob_choice: he commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dijo
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar 'decir', el contexto exige un acto directivo. 'Mandó' es breve, claro y fiel a la fuerza del mandato.
- source_word: לְכַפָּתָה
  english_pob_choice: to bind
  chosen_spanish: que ataran
  alternatives_spanish:
  - que sujetaran
  - que ligaran
  - que amarraran
  lexicon: HALOT
  rationale: El infinitivo de finalidad se vuelve subordinada en español para naturalidad narrativa. 'Ataran' conserva el sentido de atar/bind con registro digno.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abednego
  chosen_spanish: Sadrac, Mesac y Abednego
  alternatives_spanish:
  - Sadraq, Mesaq y Abednego
  lexicon: HALOT
  rationale: Se usan las formas españolas tradicionales de transliteración bíblica para los nombres propios, manteniendo reconocimiento lector y continuidad eclesial.
- source_word: לְמִרְמֵא
  english_pob_choice: to throw
  chosen_spanish: para echarlos
  alternatives_spanish:
  - para arrojarlos
  - para lanzarlos
  lexicon: HALOT
  rationale: '''Echar'' refleja el movimiento violento del verbo en un español bíblico comprensible y evita una repetición demasiado pesada de ''tirar''.'
- source_word: לְאַתּוּן נוּרָא יָקִדְתָּא
  english_pob_choice: into the blazing furnace of fire
  chosen_spanish: en el horno de fuego ardiente
  alternatives_spanish:
  - en el horno de fuego abrasador
  - en el horno ardiente de fuego
  lexicon: HALOT
  rationale: 'Se preservan los tres elementos semánticos: horno, fuego y carácter ardiente/blazing. ''Horno de fuego ardiente'' reproduce la intensidad sin la duplicación inglesa más idiomática que literal.'
translation_notes:
  revision_awareness: 'Se atendió la validación previa corrigiendo el anclaje del marcador de nota: ahora [a] aparece junto a un nombre propio en el texto y la nota ofrece la alternativa tradicional relacionada con la expresión del horno de fuego. La redacción se mantiene alineada con el hebreo y con el POB inglés, sin introducir traducción mecánica.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera de este versículo porque no aparece ningún tetragrámaton ni κύριος alusivo.
  - 'Se eligieron transliteraciones españolas estándar: Sadrac, Mesac y Abednego.'
  - '''Mandó'' traduce la fuerza directiva de אֲמַר en contexto narrativo.'
  - '''Horno de fuego ardiente'' conserva el contenido semántico completo del sintagma final sin perder fluidez en español.'
