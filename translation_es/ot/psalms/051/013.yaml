translation:
  language: es
  text: No me arrojes de tu presencia[a], y no quites de mí tu Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu espíritu santo» o, más literalmente, «el espíritu de tu santidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּשְׁלִיכֵנִי
  english_pob_choice: cast me away
  chosen_spanish: no me arrojes
  alternatives_spanish:
  - no me eches
  - no me apartes
  - no me alejes
  lexicon: HALOT
  rationale: El hebreo usa el Hiphil de שלך con fuerza de expulsar/arroj ar. En español, «arrojes» conserva esa intensidad y la súplica directa mejor que un verbo más suave como «alejes» o «apartes».
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from your presence
  chosen_spanish: de tu presencia
  alternatives_spanish:
  - de delante de ti
  - de tu rostro
  lexicon: HALOT
  rationale: «Presencia» comunica naturalmente el valor relacional y cultual de פנים/לְפָנִים sin calco incómodo. «Delante de ti» es posible, pero menos idiomático en español actual.
- source_word: רוּחַ קָדְשְׁךָ
  english_pob_choice: your Holy Spirit
  chosen_spanish: tu Espíritu Santo
  alternatives_spanish:
  - tu espíritu santo
  - el espíritu de tu santidad
  lexicon: HALOT
  rationale: En este contexto de oración, el referente es el Espíritu de Dios. En español, la forma establecida y reverente es «Espíritu Santo»; se mantiene mayúscula para señalar el referente personal/divino, mientras la nota preserva la alternativa más literal.
- source_word: תִּקַּח
  english_pob_choice: take
  chosen_spanish: quites
  alternatives_spanish:
  - tomes
  - retires
  - retire
  lexicon: HALOT
  rationale: Aunque el verbo básico es «tomar», en español «quitar de mí» expresa mejor la acción de retirar algo ya presente. Se mantiene el sentido directo del hebreo sin introducir una interpretación más fuerte que el texto.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartado de mí
  lexicon: HALOT
  rationale: «De mí» reproduce con naturalidad la preposición hebrea y encaja con el imperativo negativo anterior. Las alternativas añaden matiz espacial que el hebreo no exige.
theological_decisions:
- issue: Cómo renderizar רוּחַ קָדְשְׁךָ sin borrar la tensión entre literalidad y referencia personal divina
  english_pob_reading: your Holy Spirit
  chosen_spanish_reading: tu Espíritu Santo
  alternative_spanish_readings:
  - tu espíritu santo
  - el espíritu de tu santidad
  rationale: La frase hebrea admite una lectura más literal, pero en el conjunto del salmo la referencia es al Espíritu propio de Dios. «Espíritu Santo» preserva esa referencia sin añadir doctrina ajena al texto; la nota conserva la alternativa literal para auditar la decisión.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: se conserva la súplica paralela con dos negativos, el valor relacional de «from your presence» y la referencia teológica a «Holy Spirit». No se requirieron revisiones respecto al pasaje fuente.'
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúscula por tratarse del Espíritu de Dios, en coherencia con el contexto teológico del salmo y con la decisión inglesa auditada.
  - «Presencia» se prefiere a un calco de «rostro» para una lectura pública natural en español, sin perder el trasfondo hebreo de פני/לפניך.
  - 'Se mantiene el paralelismo sintáctico con dos prohibiciones: «No me arrojes... y no quites...».'
