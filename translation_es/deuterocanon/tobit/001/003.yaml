translation:
  language: es
  text: Yo, Tobit, caminaba en los caminos de la verdad y de la rectitud todos los días de mi vida, y hice muchas obras de misericordia para mis hermanos y para mi pueblo, que fueron conmigo al país de los asirios, a Nínive.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁδοῖς ἀληθείας
  english_pob_choice: in the ways of truth
  chosen_spanish: en los caminos de la verdad
  alternatives_spanish:
  - en las sendas de la verdad
  - en caminos de verdad
  lexicon: LSJ
  rationale: Conserva la imagen plural de conducta (‘caminos’) y la cualidad moral de ἀλήθεια sin volverla una abstracción más plana. ‘En los caminos de la verdad’ es natural en español y mantiene el paralelismo ético del texto.
- source_word: ἐπορευόμην
  english_pob_choice: walked
  chosen_spanish: caminaba
  alternatives_spanish:
  - andaba
  - me conducía
  lexicon: LSJ
  rationale: En contexto moral, πορεύομαι expresa el modo de vida. ‘Caminaba’ preserva la metáfora bíblica de conducta continua mejor que ‘iba’ y suena más natural que una construcción más forzada.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aquí la auto-descripción de Tobit combina fidelidad moral y conducta correcta; ‘justicia’ funciona bien en español como equivalente amplio y respeta la polisemia ética del término. ‘Rectitud’ sería posible, pero ‘justicia’ conserva mejor la resonancia bíblica y de pacto.
- source_word: ἐλεημοσύνας πολλὰς ἐποίησα
  english_pob_choice: I did many acts of mercy
  chosen_spanish: hice muchas obras de misericordia
  alternatives_spanish:
  - di muchas limosnas
  - realicé muchas obras caritativas
  lexicon: LSJ
  rationale: ἐλεημοσύνη puede referirse a limosna concreta, pero también a actos de misericordia. Dado que el contexto incluye a hermanos y pueblo, ‘obras de misericordia’ mantiene la amplitud del griego sin estrecharlo indebidamente a una sola ayuda material.
- source_word: τοῖς ἀδελφοῖς μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis compatriotas
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego. En este contexto puede abarcar a correligionarios o paisanos, pero el texto no exige explicitarlo en el cuerpo; ‘mis hermanos’ es fiel y natural.
- source_word: τῷ ἔθνει
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi nación
  - la nación
  lexicon: LSJ
  rationale: ‘Pueblo’ comunica mejor en español la referencia étnico-comunitaria del griego en primera persona, y encaja de manera natural junto a ‘mis hermanos’.
- source_word: τοῖς προπορευθεῖσιν μετʼ ἐμοῦ
  english_pob_choice: who went with me
  chosen_spanish: que fue conmigo
  alternatives_spanish:
  - que iban conmigo
  - que marcharon conmigo
  lexicon: LSJ
  rationale: El participio sugiere a los que fueron en el desplazamiento/exilio junto con Tobit. ‘Que fue conmigo’ suena más natural en español y conserva la idea de compañía de viaje/deportación sin forzar una literalidad áspera.
- source_word: εἰς χώραν Ἀσσυρίων
  english_pob_choice: into the land of the Assyrians
  chosen_spanish: al país de los asirios
  alternatives_spanish:
  - a la tierra de los asirios
  - al territorio de los asirios
  lexicon: LSJ
  rationale: ‘País’ traduce bien χώρα en un registro bíblico claro y evita sonar demasiado técnico. ‘Asirios’ conserva el genitivo étnico del griego; ‘tierra’ también sería posible, pero ‘país’ fluye mejor en español.
- source_word: εἰς Νινευή
  english_pob_choice: to Nineveh
  chosen_spanish: a Nínive
  alternatives_spanish:
  - hacia Nínive
  - a Ninevé
  lexicon: LSJ
  rationale: Nombre propio de ciudad con la forma española usual ‘Nínive’.
theological_decisions:
- issue: δικαιοσύνη como virtud personal en una confesión narrativa
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El verso resume la vida fiel de Tobit y sus actos de misericordia; en español, ‘justicia’ mantiene la fuerza moral y relacional del término sin reducirlo a justicia forense o social exclusivamente. Se conserva la tensión ética amplia del griego.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δικαιοσύνη'
- issue: 'ἐλεημοσύνη: limosna concreta o misericordia amplia'
  english_pob_reading: many acts of mercy
  chosen_spanish_reading: muchas obras de misericordia
  alternative_spanish_readings:
  - muchas limosnas
  - muchas obras caritativas
  rationale: El griego puede abarcar limosna material y misericordia en sentido más amplio. Dado que la frase se dirige a hermanos y pueblo, ‘obras de misericordia’ respeta la amplitud semántica sin imponer solo una ayuda económica.
  doctrine_reference: 'DOCTRINE.md: lexical range for ἐλεημοσύνη'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete 1909 y toma en cuenta el audit trail inglés: se preservó el paralelismo ‘caminos... y justicia’, la amplitud de ἐλεημοσύνας y la referencia comunitaria de ‘mis hermanos’/‘mi pueblo’. No se incorporó la retrotraducción hebrea como Vorlage; solo se usó como apoyo contextual secundario, conforme a la nota del expediente. Tampoco fue necesario añadir nota textual, porque no hay divergencia relevante entre los testigos para este versículo en la base auditada.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma del proyecto solo cuando el texto lo exige; aquí no aparece el nombre divino en el griego base de esta línea.
  - Se mantuvo ‘justicia’ para δικαιοσύνη por coherencia con el uso ético del versículo y con la política de distinguirlo de ‘rectitud’ cuando el contexto no pide esa precisión.
  - Se eligió ‘obras de misericordia’ para no restringir indebidamente ἐλεημοσύνη a la limosna monetaria.
  - Se tradujo el destino final con ‘Nínive’, forma española estándar y reconocible.
  - El término ‘mis hermanos’ conserva la forma del griego y deja abierta la referencia amplia a compatriotas o parientes, como indica el audit trail inglés.
