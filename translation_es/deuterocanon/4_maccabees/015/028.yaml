lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: LSJ
  rationale: Marca contraste adversativo simple; «Pero» es la equivalencia natural y sobria en español bíblico contemporáneo.
- source_word: θεοσεβοῦς
  english_pob_choice: God-fearing
  chosen_spanish: el temeroso de Dios
  alternatives_spanish:
  - piadoso
  - devoto
  - que teme a Dios
  lexicon: LSJ
  rationale: El compuesto conserva explícitamente la referencia a Dios; «temeroso de Dios» mantiene ese valor reverente y evita diluirlo en «piadoso», que puede sonar más genérico.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: Standard proper-name usage
  rationale: Se conserva la forma habitual y ampliamente reconocible del nombre propio en español bíblico.
- source_word: καρτερίας
  english_pob_choice: steadfastness
  chosen_spanish: perseverancia
  alternatives_spanish:
  - constancia
  - fortaleza
  - resistencia
  lexicon: LSJ
  rationale: El sustantivo expresa resistencia firme bajo presión; «perseverancia» comunica bien la constancia moral en español sin perder el matiz de aguante.
- source_word: θυγάτηρ
  english_pob_choice: the daughter
  chosen_spanish: la hija
  alternatives_spanish:
  - su hija
  lexicon: LSJ
  rationale: El griego usa el artículo sin posesivo; en español, «la hija» preserva esa sobriedad y evita añadir una relación posesiva no explicitada.
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - rememoró
  lexicon: LSJ
  rationale: El aoristo medio de μιμνῄσκομαι admite «recordó»; es claro, breve y natural en español narrativo.
theological_decisions:
- issue: Cómo traducir θεοσεβοῦς sin borrar la referencia explícita a Dios
  english_pob_reading: God-fearing Abraham
  chosen_spanish_reading: Abraham, el temeroso de Dios
  alternative_spanish_readings:
  - Abraham, piadoso
  - Abraham, devoto
  - Abraham, que teme a Dios
  rationale: La frase griega no dice solo que Abraham fuera moralmente bueno, sino reverente respecto de Dios. «Temeroso de Dios» conserva el componente teológico explícito y sigue siendo inteligible para lectores eclesiales en español.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue el orden del griego más de cerca que una paráfrasis libre: primero el contraste («Pero»), luego el sujeto («la hija»), después el verbo («recordó») y finalmente el objeto de recuerdo («la perseverancia de Abraham, el temeroso de Dios»). Se mantuvo la referencia explícita a Dios en θεοσεβοῦς, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se prefirió «perseverancia» para καρτερίας por su naturalidad en español y su capacidad de reflejar constancia bajo presión.
  - Se evitó «Cristo» u otra terminología no presente en el verso; no hay tensión textual adicional que resolver.
  - La estructura «el temeroso de Dios» preserva el valor atributivo del adjetivo compuesto sin convertirlo en una oración relativa obligatoria en el cuerpo del texto.
