translation:
  language: es
  text: Entonces recordarás tus caminos y te avergonzarás cuando recibas a tus hermanas[a], las mayores que tú así como las menores que tú; y yo te las daré como hijas[b], pero no por tu pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando tomes a tus hermanas, las mayores que tú y las menores que tú».'
    reason: lexical_alternative
  - marker: b
    text: La frase niega que este don provenga del pacto de Jerusalén; no surge de un derecho o mérito suyo.
    reason: theological_note
lexical_decisions:
- source_word: וְזָכַרְתְּ
  english_pob_choice: Then you will remember
  chosen_spanish: Entonces recordarás
  alternatives_spanish:
  - Y recordarás
  lexicon: HALOT
  rationale: En el discurso profético, la forma con prefijo y la secuencia anterior expresan consecuencia futura; «entonces» conserva ese valor resultativo, y «recordarás» mantiene el sentido básico de זכר.
- source_word: דְּרָכַיִךְ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tu conducta
  - tu manera de vivir
  lexicon: HALOT
  rationale: «Caminos» reproduce la metáfora hebrea de דֶּרֶךְ sin explicarla en exceso. En contexto moral puede aludir a conducta, pero el lenguaje figurado bíblico en español lo comunica con naturalidad.
- source_word: וְנִכְלַמְתְּ
  english_pob_choice: and be ashamed
  chosen_spanish: y te avergonzarás
  alternatives_spanish:
  - y serás humillada
  - y quedarás avergonzada
  lexicon: HALOT
  rationale: נכלם expresa vergüenza o humillación. «Te avergonzarás» es la forma más directa y natural en español, preservando la respuesta moral interior.
- source_word: בְּקַחְתֵּךְ
  english_pob_choice: when you receive
  chosen_spanish: cuando recibas
  alternatives_spanish:
  - cuando tomes
  - al recibir
  lexicon: HALOT
  rationale: El infinitivo con ב funciona temporalmente. «Cuando recibas» sigue la lectura relacional/restaurativa del contexto y evita la dureza de «tomar».
- source_word: אֲחוֹתַיִךְ
  english_pob_choice: your sisters
  chosen_spanish: a tus hermanas
  alternatives_spanish:
  - a tus hermanas tuyas
  lexicon: HALOT
  rationale: Se conserva el parentesco literal de la alegoría. «Hermanas» refleja la relación entre Jerusalén y las ciudades figuradas sin diluirla en términos abstractos.
- source_word: הַגְּדֹלוֹת מִמֵּךְ אֶל הַקְּטַנּוֹת מִמֵּךְ
  english_pob_choice: those older than you as well as those younger than you
  chosen_spanish: las mayores que tú así como las menores que tú
  alternatives_spanish:
  - las mayores que tú y las menores que tú
  - tus hermanas mayores y tus hermanas menores
  lexicon: HALOT
  rationale: Los comparativos hebreos equivalen naturalmente a edad/jerarquía en la metáfora familiar. «Mayores» y «menores» conserva el paralelismo; «así como» refleja el valor aditivo de אֶל en este contexto.
- source_word: וְנָתַתִּי אֶתְהֶן לָךְ לְבָנוֹת
  english_pob_choice: and I will give them to you as daughters
  chosen_spanish: y yo te las daré como hijas
  alternatives_spanish:
  - y te las daré por hijas
  - y las pondré como hijas para ti
  lexicon: HALOT
  rationale: El giro idiomático לְבָנוֹת se expresa con «como hijas», que preserva la metáfora de incorporación dependiente bajo Jerusalén. El pronombre anticipado «las» ayuda a la fluidez española.
- source_word: וְלֹא מִבְּרִיתֵךְ
  english_pob_choice: but not by your covenant
  chosen_spanish: pero no por tu pacto
  alternatives_spanish:
  - pero no a causa de tu pacto
  - pero no en virtud de tu pacto
  lexicon: HALOT
  rationale: La preposición hebrea niega que el don provenga del pacto de Jerusalén. «Por tu pacto» comunica la fuente o base negada sin cargar la frase con una explicación más interpretativa que el hebreo.
theological_decisions:
- issue: Sentido de «tu pacto» en la cláusula final
  english_pob_reading: The restoration and incorporation of the 'sisters' is not grounded in Jerusalem's own covenantal standing or merit.
  chosen_spanish_reading: La restauración y la incorporación de las «hermanas» no se fundamentan en el pacto propio de Jerusalén ni en algún mérito suyo.
  alternative_spanish_readings:
  - No es conforme al pacto de Jerusalén
  - No ocurre en virtud de ninguna prerrogativa de Jerusalén
  rationale: El hebreo niega el fundamento del don en el pacto de la destinataria. La redacción española conserva esa tensión sin resolverla en una formulación doctrinal más amplia que el texto no exige.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreexplicarla.
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditada: se mantuvo la lectura relacional de בְּקַחְתֵּךְ con «cuando recibas», se conservó el matiz aditivo de אֶל con «así como», y se tradujo מִבְּרִיתֵךְ de forma breve y no interpretativa como «por tu pacto», evitando expandirla a una explicación causal más larga en el cuerpo del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se mantiene «pacto» para בְּרִית, coherente con el estilo del POB en contextos covenantales.
  - Se conserva la metáfora familiar «hermanas/hijas» sin convertirla en términos institucionales.
  - La puntuación sigue el español moderno y la cadencia profética en una sola oración larga, como en el patrón inglés auditado.
