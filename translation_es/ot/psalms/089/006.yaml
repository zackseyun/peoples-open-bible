revisions:
- from: Los cielos alabarán tus maravillas[a], oh Yahvé; sí, tu fidelidad en la asamblea de los santos.
  to: Los cielos alabarán tus maravillas, Yahvé; sí, tu fidelidad en la asamblea de los seres santos[a].
  rationale: Se revisa principalmente קְדֹשִׁים para reflejar mejor la decisión del POB inglés («the holy ones») y preservar la ambigüedad contextual sin arrastrar la carga tradicional de «los santos». También se corrige la nota para que ofrezca una alternativa real y se suaviza el vocativo para un español más natural.
  reviewer_model: gpt-5.4
