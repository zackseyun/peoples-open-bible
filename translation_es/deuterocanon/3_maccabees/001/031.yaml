translation:
  language: es
  text: Pero algunos[a], despreciando con descuido los bastiones de la piedad de la ciudad, se entregaron de buena gana, como si fueran a participar de alguna gran fama por la futura asociación[b] con el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los fundamentos de la piedad de la ciudad». El griego usa una metáfora de estructuras de apoyo.
    reason: lexical_alternative
  - marker: b
    text: O «por la futura compañía con el rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνιοι
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunas personas
  lexicon: LSJ
  rationale: Es un plural indefinido que señala a una parte del grupo. «Algunos» es natural en español y conserva el contraste con el conjunto mayor.
- source_word: ἐπιπολαίως
  english_pob_choice: carelessly
  chosen_spanish: con ligereza
  alternatives_spanish:
  - superficialmente
  - temerariamente
  - sin cuidado
  lexicon: LSJ
  rationale: El adverbio expresa una actitud superficial o poco considerada. «Con ligereza» reproduce bien ese matiz en español y encaja con el verbo «despreciando» sin añadir más juicio del necesario.
- source_word: στυγοῦντες
  english_pob_choice: despising
  chosen_spanish: despreciando
  alternatives_spanish:
  - aborreciendo
  - detestando
  - odiando
  lexicon: LSJ
  rationale: El verbo puede ser fuerte, pero aquí se combina con el adverbio de superficialidad y expresa rechazo despectivo. «Despreciando» preserva la fuerza negativa sin volverlo emocionalmente más intenso de lo que pide el contexto.
- source_word: τὰς τῆς πόλεως εὐσεβείας ἐπιβάθρας
  english_pob_choice: the bulwarks of the city's piety
  chosen_spanish: los bastiones de la piedad de la ciudad
  alternatives_spanish:
  - los soportes de la piedad de la ciudad
  - los fundamentos de la piedad de la ciudad
  - los baluartes de la piedad de la ciudad
  lexicon: LSJ
  rationale: ἐπιβάθραι designa apoyos, bases o soportes, aquí en sentido metafórico. «Bastiones» mantiene la imagen de estructuras que sostienen y protege el tono formal; «piedad» traduce εὐσέβεια sin reducirlo a una simple religión institucional.
- source_word: εὐσεβείας
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - reverencia
  - religión
  lexicon: LSJ
  rationale: En este contexto helenístico judío, εὐσέβεια expresa devoción reverente. «Piedad» es conciso, solemne y adecuado para el vínculo entre la ciudad y su vida religiosa.
- source_word: εὐχερῶς
  english_pob_choice: readily
  chosen_spanish: fácilmente
  alternatives_spanish:
  - prontamente
  - de buena gana
  - sin dificultad
  lexicon: LSJ
  rationale: El adverbio indica facilidad y disposición. «Fácilmente» conserva la idea de poca resistencia; en español funciona bien con «se entregaron».
- source_word: ἑαυτοὺς ἐδίδοσαν
  english_pob_choice: gave themselves over
  chosen_spanish: se entregaron
  alternatives_spanish:
  - se rindieron
  - se dieron
  - se entregaron a sí mismos
  lexicon: LSJ
  rationale: 'La forma media/reflexiva es importante: se abandonaron voluntariamente. «Se entregaron» mantiene ese matiz de auto-cesión y suena natural en español.'
- source_word: ὡς
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera
  - pensando que
  - como
  lexicon: LSJ
  rationale: Introduce una expectativa subjetiva, no un hecho objetivo. «Como si» preserva ese matiz hipotético.
- source_word: μεγάλης τινὸς ... εὐκλείας
  english_pob_choice: some great renown
  chosen_spanish: alguna gran fama
  alternatives_spanish:
  - alguna gran gloria
  - algún gran renombre
  - alguna gran distinción
  lexicon: LSJ
  rationale: εὐκλεία es fama buena, renombre o buena reputación. «Fama» es claro en español; con «gran» conserva el valor honorífico sin introducir un eco teológico impropio.
- source_word: κοινωνήσοντες
  english_pob_choice: would share in
  chosen_spanish: participar de
  alternatives_spanish:
  - tener parte en
  - compartir
  - gozar de
  lexicon: LSJ
  rationale: El participio futuro expresa una participación esperada. «Participar de» es idiomático y fiel al sentido de tener parte en un honor.
- source_word: ἀπὸ τῆς ἐσομένης τῷ βασιλεῖ συναναστροφῆς
  english_pob_choice: from the association with the king that was to come
  chosen_spanish: por la futura asociación con el rey
  alternatives_spanish:
  - por la futura compañía con el rey
  - por la futura convivencia con el rey
  - a causa de la asociación futura con el rey
  lexicon: LSJ
  rationale: συναναστροφή denota asociación o trato social. «Asociación» es lo bastante amplio para no forzar una cercanía específica, y «futura» reproduce ἐσομένης. «Por» expresa la fuente o causa de esa esperanza de fama.
theological_decisions:
- issue: Renderización de εὐσέβεια en un contexto cívico-religioso helenístico judío
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - reverencia
  - religión
  rationale: El pasaje habla de la actitud reverente de la ciudad y de las estructuras que la sostienen. «Piedad» mantiene el peso religioso y cívico sin estrecharlo a un uso cristiano posterior ni volverlo demasiado institucional.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 6
translation_notes:
  revision_awareness: La redacción sigue el sentido del griego y toma en cuenta el ajuste del audit trail inglés desde «supports» a «bulwarks» para ἐπιβάθρας, manteniendo una imagen fuerte de estructuras de apoyo. También conserva la tensión entre una lectura literal de κοινωνήσοντες y la causalidad expresada por ἀπὸ τῆς ἐσομένης τῷ βασιλεῖ συναναστροφῆς, sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí no aplica.
  - «Piedad» se mantiene para εὐσέβεια en este contexto helenístico judío.
  - «Se entregaron» conserva el matiz reflexivo de ἑαυτοὺς ἐδίδοσαν.
  - La metáfora de apoyo se ha vertido con «bastiones», siguiendo el registro formal y la revisión inglesa.
  - Se conserva la ambigüedad de συναναστροφή mediante «asociación» y una nota alternativa en la nota al pie.
