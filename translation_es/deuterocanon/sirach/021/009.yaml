translation:
  language: es
  text: Una asamblea de los sin ley es como un manojo de estopa[a], y su fin es una llama de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una reunión de los sin ley es como estopa reunida». El griego comprime la imagen: literalmente, «estopa reunida, una asamblea de los sin ley».'
    reason: lexical_alternative
lexical_decisions:
- source_word: στιππύον
  english_pob_choice: tow
  chosen_spanish: estopa
  alternatives_spanish:
  - hilaza
  - estopa de lino
  - estopa de lino
  lexicon: LSJ
  rationale: El griego designa material fibroso combustible, especialmente desperdicio de lino. En español, «estopa» comunica bien esa materia inflamable y conserva la imagen de combustible seco sin sonar técnico o extraño.
- source_word: συνηγμένον
  english_pob_choice: bundle
  chosen_spanish: manojo
  alternatives_spanish:
  - haz
  - atado
  - reunido
  lexicon: LSJ
  rationale: El participio expresa algo «reunido/juntado»; en español, «manojo» funciona como equivalente natural para un conjunto compacto de material combustible, manteniendo la idea de algo recogido para arder.
- source_word: συναγωγὴ ἀνόμων
  english_pob_choice: assembly of the lawless
  chosen_spanish: una asamblea de los inicuos
  alternatives_spanish:
  - una asamblea de los inicuos
  - una reunión de los malvados
  - una congregación de los inicuos
  lexicon: LSJ
  rationale: συναγωγή es una reunión o asamblea; ἄνομος apunta a quienes no viven conforme a la ley, no solo a una maldad genérica. «Inicuos» preserva el tono moral-jurídico sin sustituirlo por un término más blando.
- source_word: συντέλεια
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - final
  - resultado
  - consumación
  lexicon: LSJ
  rationale: Aquí la palabra señala el desenlace o término final del grupo. «Fin» es natural en español y mantiene la fuerza conclusiva sin introducir una elaboración escatológica mayor que la del griego.
- source_word: φλὸξ πυρός
  english_pob_choice: a flame of fire
  chosen_spanish: una llama de fuego
  alternatives_spanish:
  - llama ígnea
  - llama ardiente
  - fuego llameante
  lexicon: LSJ
  rationale: La expresión intensifica la imagen del fuego. «Una llama de fuego» conserva la redundancia enfática del griego y su tono poético, sin suavizarla.
theological_decisions:
- issue: Cómo rendir ἀνόμων sin perder su carga legal-moral
  english_pob_reading: lawless
  chosen_spanish_reading: inicuos
  alternative_spanish_readings:
  - sin ley
  - malvados
  - impíos
  rationale: El inglés auditado preserva «lawless», es decir, quienes desprecian la ley. En español, «inicuos» mantiene la gravedad moral y judicial mejor que un mero «malvados», y evita convertirlo en una categoría doctrinal ajena al contexto sapiencial.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si conviene expandir o mantener la metáfora comprimida
  english_pob_reading: Direct simile/metaphor with minimal expansion
  chosen_spanish_reading: Similitud directa con expansión mínima
  alternative_spanish_readings:
  - Una asamblea de los inicuos está reunida como estopa
  - La reunión de los malvados es como combustible apilado
  rationale: La imagen debe seguir siendo inmediata y visible. «Es como un manojo de estopa» conserva la metáfora del combustible seco y la relación entre reunión humana y material destinado a arder, sin añadir interpretación.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No se registraron revisiones posteriores; el pasaje quedó en acuerdo alto y sin cambios en la última pasada auditada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - Se evitó «SEÑOR» o «Cristo», porque no corresponden al texto griego de este versículo.
  - La metáfora de combustible se conservó sin sustituirla por una explicación moralizante.
  - «Inicuos» se usa aquí como equivalente contextual de ἄνομος, no como tecnicismo doctrinal fijo.
