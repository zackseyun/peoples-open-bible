    issue: «el fruto de tu ganado» para פְּרִי בְהֶמְתְּךָ
    rationale: Aunque «fruto» refleja la forma hebrea, en español moderno con animales suena extraño y no transmite con claridad «descendencia/crías». La evidencia fuente y el POB auditado apuntan a «offspring of your livestock».
  - severity: medium
    issue: «crías de tu ganado» para שְׁגַר אֲלָפֶיךָ
    rationale: El texto inglés revisado asentó «calves of your herd». La opción española actual es demasiado amplia y no preserva esa especificidad documentada.
  - severity: low
    issue: Marcador [a] sobre «Consumirá» no es necesario
    rationale: La decisión «consumirá» ya está bien explicada en decisiones léxicas; la nota añade poco para el lector final y recarga el texto sin necesidad.
  - severity: low
    issue: «mosto» frente a «vino nuevo»
    rationale: «Mosto» es preciso, pero «vino nuevo» refleja más transparentemente la decisión inglesa documentada y es más reconocible en lectura eclesial amplia.
