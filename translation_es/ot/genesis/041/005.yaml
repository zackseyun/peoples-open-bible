translation:
  language: es
  text: Entonces durmió y soñó por segunda vez[a]; y he aquí, siete espigas[b] subían en un solo tallo[c], llenas[d] y buenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «soñó otra vez». El hebreo indica una segunda ocasión.
    reason: lexical_alternative
  - marker: b
    text: O «cabezas de grano». El término hebreo puede referirse a la espiga o cabeza portadora del grano.
    reason: lexical_alternative
  - marker: c
    text: O «caña». El hebreo se refiere al tallo o eje de la planta; «tallo» es la opción más natural en español aquí.
    reason: lexical_alternative
  - marker: d
    text: O «lozanas», «bien formadas» o «rellenas». El adjetivo describe espigas bien nutridas o bien llenas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּישָׁן
  english_pob_choice: Then he slept
  chosen_spanish: Entonces durmió
  alternatives_spanish:
  - Y durmió
  - Luego durmió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia narrativa de forma natural en español y mantiene el sentido simple de dormir.
- source_word: וַיַּחֲלֹם שֵׁנִית
  english_pob_choice: dreamed a second time
  chosen_spanish: soñó por segunda vez
  alternatives_spanish:
  - soñó de nuevo
  - tuvo un segundo sueño
  lexicon: HALOT
  rationale: שֵׁנִית expresa «por segunda vez». «Soñó por segunda vez» refleja con claridad la repetición y suena idiomático en español.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: La fórmula introduce una presentación vívida dentro del sueño. «Y he aquí» preserva ese valor discursivo y es una equivalencia tradicional comprensible.
- source_word: שֶׁבַע שִׁבֳּלִים
  english_pob_choice: seven ears of grain
  chosen_spanish: siete espigas
  alternatives_spanish:
  - siete espigas de grano
  - siete cabezas de grano
  lexicon: HALOT
  rationale: שִׁבֳּלִים puede referirse a la espiga o cabeza portadora del grano. En español, «espigas» es claro y natural; el contexto agrícola hace innecesario expandirlo aquí.
- source_word: עֹלֹת
  english_pob_choice: were coming up
  chosen_spanish: subían
  alternatives_spanish:
  - iban subiendo
  - brotaban
  lexicon: HALOT
  rationale: El participio presenta la acción de manera vívida y continua en el sueño. «Subían» comunica bien ese movimiento ascendente sin sobrecargar el estilo.
- source_word: בְּקָנֶה אֶחָד
  english_pob_choice: on one stalk
  chosen_spanish: en una sola caña
  alternatives_spanish:
  - sobre una sola caña
  - de una sola caña
  - en un solo tallo
  lexicon: HALOT
  rationale: קָנֶה es un tallo o caña. «En una sola caña» conserva la imagen vegetal y la relación de soporte de modo natural en español.
- source_word: בְּרִיאוֹת
  english_pob_choice: plump
  chosen_spanish: sanas
  alternatives_spanish:
  - lozanas
  - gruesas
  - llenas
  lexicon: HALOT
  rationale: En este contexto de cereal, el adjetivo describe espigas bien formadas y nutridas. «Sanas» es una opción comprensible y sobria; mantiene la valoración de buen estado sin sonar extraña para espigas.
- source_word: וְטֹבוֹת
  english_pob_choice: and good
  chosen_spanish: y buenas
  alternatives_spanish:
  - y hermosas
  - y finas
  lexicon: HALOT
  rationale: טוֹב conserva su amplitud semántica de bondad, calidad o agrado. «Buenas» es la correspondencia directa y deja abierta esa amplitud evaluativa.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una equivalencia óptima y no fue revisada en el último pase; la propuesta española sigue de cerca esa lectura, conservando la presentación vívida del sueño, la imagen agrícola de las espigas y la dualidad semántica de los adjetivos sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni alusiones directas al nombre divino.
  - Se eligió «espigas» en lugar de una traducción más técnica como «cabezas de grano» porque el español lo entiende con naturalidad y no altera el referente.
  - «Sanas» y «buenas» reproducen la doble valoración del hebreo sin convertirla en interpretación fisiológica o moral.
