translation:
  language: es
  text: Y, escuchen o se rehúsen[a] —porque son una casa rebelde[b]—, sabrán que ha habido un profeta entre ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oigan o cesen'; el hebreo contrapone literalmente 'oír' con 'cesar/retraerse', aquí con el sentido de rehusar atender el mensaje.
    reason: lexical_alternative
  - marker: b
    text: O 'porque casa rebelde son'. La expresión conserva la metáfora de la casa como unidad corporativa del pueblo.
    reason: lexical_alternative
  - marker: c
    text: O 'que un profeta ha estado entre ellos' o 'en medio de ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה / And they
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y ellos
  - En cuanto a ellos
  lexicon: HALOT
  rationale: El hebreo pone el pronombre al frente para énfasis, pero en español el énfasis puede conservarse con la estructura de la cláusula sin repetir 'ellos'. 'Y' mantiene la conexión discursiva de forma natural.
- source_word: אִם יִשְׁמְעוּ ... וְאִם יֶחְדָּלוּ
  english_pob_choice: whether they listen or refuse
  chosen_spanish: si escuchan o se niegan a hacerlo
  alternatives_spanish:
  - si oyen o cesan
  - si prestan atención o se rehúsan
  lexicon: HALOT
  rationale: La pareja condicional expresa dos posibilidades. 'Escuchan' comunica el valor de 'oír con atención/hear and heed'; 'se niegan a hacerlo' conserva el contraste con יֶחְדָּלוּ sin forzar un calco duro ni perder la fuerza de rechazo que el contexto profético implica.
- source_word: בֵּית מְרִי
  english_pob_choice: a rebellious house
  chosen_spanish: casa rebelde
  alternatives_spanish:
  - una casa rebelde
  - casa de rebelión
  - un pueblo rebelde
  lexicon: HALOT
  rationale: Se preserva la metáfora de 'casa' como unidad corporativa y covenantal, tal como en el hebreo y en la POB inglesa. 'Rebelde' traduce מְרִי de manera idiomática en español.
- source_word: וְיָדְעוּ
  english_pob_choice: they will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - entonces sabrán
  - conocerán
  lexicon: HALOT
  rationale: El imperfecto con valor resultativo/futuro se vierte naturalmente como 'sabrán'. En español el 'entonces' queda implícito por la secuencia condicional y no es necesario en el texto principal.
- source_word: נָבִיא
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: El sustantivo es directo e indefinido; 'un profeta' conserva el matiz del hebreo y la lectura de la POB inglesa.
- source_word: הָיָה בְתוֹכָם
  english_pob_choice: has been among them
  chosen_spanish: hubo un profeta entre ellos
  alternatives_spanish:
  - un profeta ha estado entre ellos
  - un profeta estuvo en medio de ellos
  - un profeta ha estado en su medio
  lexicon: HALOT
  rationale: Aunque el inglés usa presente perfecto, el hebreo puede expresar una presencia concluida reconocida por su efecto. En español, 'hubo... entre ellos' transmite esa presencia real sin sonar forzado. 'Entre ellos' preserva la alternativa de 'in their midst' recogida en la nota inglesa.
theological_decisions:
- issue: 'Respuesta al mensaje profético: oír frente a rehusar'
  english_pob_reading: The verse states that the prophet's presence will be recognized regardless of whether the people heed the message.
  chosen_spanish_reading: El versículo afirma que la presencia del profeta será reconocida tanto si escuchan como si se niegan, sin suavizar la rebeldía de la casa.
  alternative_spanish_readings:
  - '... tanto si oyen como si dejan de oír'
  - '... tanto si prestan atención como si la rechazan'
  rationale: La tensión no está entre mera audición y silencio, sino entre escuchar con obediencia y rechazar. 'Se niegan a hacerlo' conserva la fuerza de la negativa sin añadir doctrina ni explicar de más, y mantiene la advertencia profética.
  doctrine_reference: Translation philosophy §3, §6
- issue: Metáfora corporativa de 'casa rebelde'
  english_pob_reading: a rebellious house
  chosen_spanish_reading: casa rebelde
  alternative_spanish_readings:
  - casa de rebelión
  - pueblo rebelde
  rationale: Se retiene la imagen de 'casa' para no diluir el lenguaje de pacto y de identidad colectiva de Ezequiel. La rebeldía no se convierte en una categoría abstracta; sigue siendo la condición de la casa de Israel en el contexto profético.
  doctrine_reference: Ezequiel 2:3–5; Translation philosophy §4
- issue: Presencia del profeta 'entre ellos'
  english_pob_reading: has been among them
  chosen_spanish_reading: hubo un profeta entre ellos
  alternative_spanish_readings:
  - ha estado entre ellos
  - estuvo en medio de ellos
  rationale: La nota inglesa permite 'among them' / 'in their midst'. En español, 'entre ellos' comunica esa localización y su valor testimonial. El pretérito 'hubo' refleja con naturalidad la presencia ya consumada cuyo reconocimiento queda como resultado.
  doctrine_reference: Ezequiel 2:5; Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó 'refuse to listen' a 'refuse' para reflejar con mayor cercanía el hebreo יֶחְדָּלוּ y evitar repetición innecesaria. Por eso el español evita ampliar el verbo con una explicación interna y opta por 'se niegan a hacerlo', manteniendo la breve oposición semítica.
  spanish_consistency_notes:
  - Se preserva 'casa' para בית מְרִי, coherente con el patrón de Ezequiel y con la terminología POB.
  - '''Escuchan'' y ''se niegan a hacerlo'' mantienen la polaridad obediencia/rechazo sin introducir una distinción artificial entre oír y obedecer.'
  - '''Entre ellos'' se usa de manera consistente para la localización de la presencia profética, evitando una formulación excesivamente literal como ''en medio de ellos'' cuando no mejora la naturalidad del español.'
