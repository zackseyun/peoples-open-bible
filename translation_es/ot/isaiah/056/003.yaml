base_translation:
  language: en
  yaml_path: translation/ot/isaiah/056/003.yaml
  text: Let not the foreigner who has joined himself to Yahweh say[a], “Yahweh will surely separate me from his people”; and let not the eunuch say, “Behold[c][b], I am a dry tree.”
  footnotes:
  - marker: a
    text: Or “who joins himself to the LORD.” The Hebrew participle may be rendered as ongoing or completed action.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew has an emphatic form: “The LORD will surely separate me from his people.”'
    reason: lexical_alternative
  - marker: c
    text: Or “court official” in some contexts; here “eunuch” best fits the context, especially the image of being “a dry tree.”
    reason: alternative_reading
