  text: un décimo por cada cordero[a], para los siete corderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «un décimo, un décimo para el un cordero, para los siete corderos». El hebreo usa una fórmula distributiva que significa una décima parte para cada uno de los siete corderos.'
