translation:
  language: es
  text: Y no rebuscarás tu viña[a], ni recogerás las uvas caídas[b] de tu viña; las dejarás para el pobre y para el forastero[c]. Yo soy Yahvé, el Dios de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no despojarás por completo tu viña». El hebreo alude a volver sobre las vides para tomar lo que quedó después de la cosecha principal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo que haya caído de tu viña» o «las rebuscas de tu viña». El hebreo se refiere a uvas que quedaron atrás o cayeron durante la cosecha.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «residente extranjero». El hebreo גֵּר designa a una persona no nativa que vive entre Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַרְמְךָ
  english_pob_choice: your vineyard
  chosen_spanish: tu viña
  alternatives_spanish:
  - tu viñedo
  - tu viña
  lexicon: HALOT
  rationale: כֶּרֶם designa una plantación de vides; en español bíblico y moderno, «viña» es natural y conserva el campo agrícola sin introducir una palabra más técnica de lo necesario.
- source_word: תְעוֹלֵל
  english_pob_choice: strip ... bare
  chosen_spanish: desnudaráס
  alternatives_spanish:
  - despojarás por completo
  - vendimiarás de nuevo
  - harás rebusca
  lexicon: HALOT
  rationale: El hebreo expresa la acción de pasar otra vez por la viña para quitar lo que queda. «Desnudar» intenta reflejar la fuerza de dejar la viña sin resto; sin embargo, en español la forma más clara y natural sería «despojarás por completo» o «no harás rebusca». Mantengo el matiz de exhaustividad del audit trail inglés.
- source_word: פֶּרֶט
  english_pob_choice: the fallen grapes
  chosen_spanish: los granos caídos
  alternatives_spanish:
  - las uvas caídas
  - los racimos caídos
  - lo caído
  lexicon: HALOT
  rationale: פֶּרֶט se refiere a lo que cae o queda separado durante la cosecha. En este contexto de viña, «uvas caídas» sería más literal; «granos caídos» conserva la idea de fruto suelto, aunque es menos preciso para una viña. Se conserva la tensión concreta del término de cosecha.
- source_word: תְלַקֵּט
  english_pob_choice: gather
  chosen_spanish: recogerás
  alternatives_spanish:
  - juntarás
  - espigarás
  - recolectarás
  lexicon: HALOT
  rationale: לקט significa recoger o juntar lo caído. «Recogerás» es idiomático en español y mantiene la prohibición de levantar lo que quedó de la cosecha.
- source_word: לֶעָנִי
  english_pob_choice: for the poor
  chosen_spanish: para el pobre
  alternatives_spanish:
  - para el necesitado
  - para el indigente
  lexicon: HALOT
  rationale: עָנִי nombra al pobre o afligido. «El pobre» es la opción más directa y comprensible en un mandato legal.
- source_word: וְלַגֵּר
  english_pob_choice: and for the sojourner
  chosen_spanish: y para el forastero
  alternatives_spanish:
  - y para el extranjero
  - y para el residente forastero
  - y para el forastero residente
  lexicon: HALOT
  rationale: גֵּר designa al no nativo que vive entre Israel. «Forastero» comunica bien la idea de alguien de fuera sin convertirlo en un término burocrático. En nota se preserva la posibilidad de «forastero residente» como alternativa interpretativa.
- source_word: תַּעֲזֹב אֹתָם
  english_pob_choice: you shall leave them
  chosen_spanish: los dejarás
  alternatives_spanish:
  - los abandonarás
  - los dejarás allí
  lexicon: HALOT
  rationale: עזב aquí significa dejar para otros, no abandonar en sentido absoluto. «Los dejarás» es claro y fiel al mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto, en vez de sustituirlo por un título. Es la forma española tradicionalmente usada para transliterar el Tetragrámaton y mantiene la referencia personal del nombre revelado.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios (plural)
  lexicon: HALOT
  rationale: El hebreo tiene un sufijo de segunda persona plural. En español, «su Dios» puede corresponder tanto a singular de respeto como a plural; aquí se conserva la fórmula solemne, con nota de consistencia si se requiere distinguir el plural explícitamente.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; la decisión del POB inglés de renderizarlo como Yahweh se refleja en español como Yahvé, una transliteración estable y transparente en castellano. Se evita la sustitución litúrgica por «el SEÑOR» para no ocultar el nombre propio.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה YHWH → Yahvé/Yahweh'
- issue: Valor de גֵּר en la legislación
  english_pob_reading: sojourner / resident foreigner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - extranjero residente
  - forastero residente
  - forastero
  rationale: El POB inglés conserva la tensión entre la traducción tradicional «sojourner» y la explicación «resident foreigner». En español, «forastero» mantiene la idea de persona no originaria de Israel, y la nota puede explicitar que se trata de alguien que vive entre el pueblo.
  doctrine_reference: 'DOCTRINE.md: lexical nuance — גֵּר'
- issue: Fórmula final de posesión del pacto
  english_pob_reading: your God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - vuestro Dios
  - tu Dios
  rationale: Aunque el hebreo es plural, la frase fija del pacto en español puede sonar más solemne con «su Dios». La alternativa «vuestro Dios» sería más explícita respecto al plural, pero menos neutral en registro panhispánico.
  doctrine_reference: 'DOCTRINE.md: pronoun/register consistency'
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo inglés y quedó sin cambios en el último paso de revisión, con alto acuerdo entre auditores. Por eso el español sigue de cerca la segmentación y las decisiones léxicas del audit trail, manteniendo la tensión entre el sentido agrícola concreto y la fórmula del pacto.
  spanish_consistency_notes:
  - Se conservó «Yahvé» para יְהוָה, consistente con el estándar del proyecto.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - Se mantuvo el registro legal-litúrgico, sin expandir el mandato más allá de lo que el hebreo dice.
  - Se preservó la distinción entre el fruto dejado en la viña y la obligación de dejarlo para el pobre y el forastero.
