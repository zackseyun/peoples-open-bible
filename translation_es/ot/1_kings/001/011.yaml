revisions:
- from: 'Entonces Natán dijo a Betsabé[a], madre de Salomón: «¿No has oído que Adonías, hijo de Haguit, ha llegado a reinar, y que nuestro señor David no lo sabe?»'
  to: 'Entonces Natán dijo a Betsabé, madre de Salomón: «¿No has oído que Adonías, hijo de Haguit, ha llegado a ser rey[a], y nuestro señor David no lo sabe?»'
  rationale: Se reemplaza «ha llegado a reinar» por «ha llegado a ser rey» para reflejar mejor el valor eventivo de מָלַךְ en el contexto de una sucesión al trono. Se elimina la nota innecesaria sobre «Betsabé» y se añade la nota léxica que sí está respaldada por el audit trail inglés, preservando la alternativa contextual sin sobretraducir el hebreo.
