translation:
  language: es
  text: Pero, después de entrar en Judea y acercarse a Bet-sur, un lugar fortificado a unos cinco esquenos[a] de Jerusalén, la sitiaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El esqueno era una antigua unidad de distancia; su longitud exacta variaba según región y contexto.
    reason: cultural_note
lexical_decisions:
- source_word: εἰσελθὼν
  english_pob_choice: after entering
  chosen_spanish: después de entrar
  alternatives_spanish:
  - habiendo entrado
  - cuando entró
  lexicon: LSJ
  rationale: El participio aoristo antecede a la acción principal y expresa secuencia temporal; «después de entrar» comunica esa relación con naturalidad en español sin perder el valor narrativo previo.
- source_word: συνεγγίσας
  english_pob_choice: approaching
  chosen_spanish: acercarse
  alternatives_spanish:
  - aproximarse
  - llegar cerca de
  lexicon: LSJ
  rationale: El verbo indica movimiento hacia Bet-sur. En español, «acercarse» es claro, idiomático y suficientemente preciso para este contexto militar.
- source_word: Βεθσουρῶν
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Beth-zur
  - Betzur
  lexicon: transliteration
  rationale: Se conserva el nombre propio semítico con una transliteración transparente al español. «Bet-sur» evita una forma demasiado anglicada y mantiene reconocible el topónimo.
- source_word: ἐρυμνῷ χωρίῳ
  english_pob_choice: a fortified place
  chosen_spanish: un lugar fortificado
  alternatives_spanish:
  - una plaza fortificada
  - un sitio fortificado
  - una fortaleza
  lexicon: LSJ
  rationale: ἐρυμνός expresa fortificado/fuerte y χωρίον, lugar o sitio. «Un lugar fortificado» preserva ambos componentes sin convertirlo indebidamente en «fortaleza», que sería más específico de lo que exige el griego.
- source_word: ὡσεὶ σχοίνους πέντε
  english_pob_choice: about five schoeni
  chosen_spanish: a unos cinco esquenos
  alternatives_spanish:
  - aproximadamente cinco esquenos
  - como cinco esquenos
  - a unos cinco schoeni
  lexicon: LSJ
  rationale: Se mantiene la unidad antigua de medida en forma transliterada para no falsear precisión con una conversión moderna incierta. «A unos» reproduce el valor aproximado de ὡσεὶ.
- source_word: ἀπέχοντι
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - alejado de Jerusalén
  - distante de Jerusalén
  lexicon: LSJ
  rationale: El participio modifica el lugar descrito y señala distancia. «De Jerusalén» funciona de modo natural en la frase española y conserva la relación espacial.
- source_word: ἔθλιβε
  english_pob_choice: was besieging it
  chosen_spanish: la sitiaba
  alternatives_spanish:
  - la acosaba
  - la oprimía
  - la apremiaba
  lexicon: LSJ
  rationale: En contexto militar, θλίβω expresa presión hostil sostenida. El audit trail inglés opta por «was besieging it»; en español, «la sitiaba» es la equivalencia más precisa y formal para esa presión militar continuada.
translation_notes:
  revision_awareness: El texto inglés revisado cambió «was pressing it hard» por «was besieging it» para reflejar mejor el valor militar de ἔθλιβε. La versión española sigue esa revisión y adopta «la sitiaba» como equivalente natural y formal.
  spanish_consistency_notes:
  - Se mantiene el tono histórico sobrio propio de un relato de guerra helenístico.
  - No se sustituye la unidad antigua por una equivalencia moderna, para preservar la transparencia del dato original.
  - La referencia espacial queda ligada a Jerusalén en una construcción natural para el español.
  - El pronombre objeto directo femenino singular «la» retoma implícitamente a Bet-sur/lugar fortificado en español, como en el inglés «it».
