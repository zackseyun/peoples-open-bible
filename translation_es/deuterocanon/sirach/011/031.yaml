translation:
  language: es
  text: En tiempo de desgracia se olvida el placer[a], y el fin del hombre habla de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Pues, al convertir las cosas buenas en malas, acecha; y sobre lo escogido pondrá mancha». El hebreo y el griego difieren notablemente aquí; el texto principal sigue el hebreo conservado como testigo principal de Sirácides cuando está disponible.'
    reason: textual_variant
lexical_decisions:
- source_word: עֵת רָעָה
  english_pob_choice: an evil time
  chosen_spanish: tiempo de desgracia
  alternatives_spanish:
  - un mal tiempo
  - un tiempo de maldad
  - una hora mala
  lexicon: HALOT
  rationale: עֵת significa 'tiempo' o 'ocasión'. En español, 'tiempo de desgracia' expresa con naturalidad la idea de adversidad sin endurecer la frase con 'mal tiempo', que podría sonar meteorológico o ambiguo. Mantiene el tono sapiencial y el valor de situación adversa del hebreo.
- source_word: תְּשַׁכֵּח
  english_pob_choice: makes pleasure be forgotten
  chosen_spanish: se olvida
  alternatives_spanish:
  - hace que se olvide
  - hace olvidar
  - borra de la memoria
  lexicon: HALOT
  rationale: 'El hiphil es causativo: la situación adversa provoca que el placer quede olvidado. ''Se olvida'' conserva la idea sin una construcción pesada en español, y deja implícita la fuerza causativa del sujeto circunstancial.'
- source_word: תַּעֲנוּג
  english_pob_choice: pleasure
  chosen_spanish: el placer
  alternatives_spanish:
  - la delicia
  - el deleite
  - el gozo
  lexicon: HALOT
  rationale: תַּעֲנוּג denota deleite o disfrute placentero. 'Placer' es claro, breve y adecuado al registro sapiencial. 'Gozo' podría desplazar el matiz hacia alegría religiosa, que no está exigida aquí.
- source_word: וְסוֹף אָדָם
  english_pob_choice: and a man's end
  chosen_spanish: el fin del hombre
  alternatives_spanish:
  - el fin de una persona
  - el final del hombre
  - el fin del ser humano
  lexicon: HALOT
  rationale: Se conserva el singular proverbial de אָדָם. 'El fin del hombre' mantiene la fuerza gnómica y el paralelismo de sentencia breve. En español, 'hombre' funciona aquí como genérico representativo, no como masculino excluyente.
- source_word: יַגִּיד עָלָיו
  english_pob_choice: tells about him
  chosen_spanish: lo declara
  alternatives_spanish:
  - habla de él
  - da testimonio de él
  - lo revela
  lexicon: HALOT
  rationale: נגד en hiphil puede significar 'declarar' o 'hacer saber'. 'Lo declara' transmite que el fin de la persona pone en evidencia su realidad. Es más conciso que 'habla de él' y más fuerte que una mera referencia temática.
theological_decisions:
- issue: Singular proverbial אָדָם
  english_pob_reading: a man's end
  chosen_spanish_reading: el fin del hombre
  alternative_spanish_readings:
  - el fin de una persona
  - el fin de un ser humano
  rationale: Se mantiene el singular representativo del hebreo. La forma genérica 'hombre' conserva la densidad proverbial sin neutralizar innecesariamente el texto. No se introduce una abstracción que debilite el dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos controvertidos para אָדָם
- issue: Diferencia textual entre hebreo y griego
  english_pob_reading: Main text follows the extant Hebrew as the primary witness; Greek parallel notes an alternate saying about turning good into evil and placing blame.
  chosen_spanish_reading: El texto principal sigue el hebreo; el griego ofrece una sentencia distinta sobre trocar lo bueno en malo y poner culpa sobre lo elegido.
  alternative_spanish_readings:
  - seguir el griego en el texto principal
  - fusionar ambos testigos en una paráfrasis
  rationale: La evidencia hebrea y la griega divergen notablemente. Como en el POB inglés, el texto base debe seguir el hebreo por ser el testigo principal conservado, mientras que la variante griega se registra como nota para no borrar la tensión textual.
  doctrine_reference: Principio editorial POB sobre testigos textuales y notas variantes; criterio de transparencia textual
translation_notes:
  revision_awareness: El borrador incorpora la revisión más reciente del POB inglés, que prefirió un valor más amplio y natural para עֵת ('time' en vez de 'hour'). Aquí se reflejó con 'tiempo de desgracia' para mantener naturalidad en español y conservar el matiz de circunstancia adversa. También se atendió el equilibrio entre la línea hebrea principal y la variante griega documentada en la nota.
  spanish_consistency_notes:
  - Se evita 'Señor' o terminología de sustitución para el nombre divino porque este versículo no la requiere.
  - '''Hombre'' se usa en sentido genérico representativo, coherente con el singular sapiencial del hebreo.'
  - El final del versículo se traduce de forma breve y proverbial para preservar el ritmo sentencioso del original.
