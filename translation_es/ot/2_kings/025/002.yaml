translation:
  language: es
  text: Así la ciudad quedó sitiada[a] hasta el undécimo año del rey Zedequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «la ciudad vino a sitio»; es un hebraísmo que expresa que la ciudad estaba en estado de asedio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: remained
  chosen_spanish: quedó
  alternatives_spanish:
  - estuvo
  - permaneció
  - llegó a estar
  lexicon: HALOT
  rationale: 'El hebreo usa בוא en una expresión idiomática con sentido resultativo: la ciudad llegó a estar en estado de asedio. En español, «quedó» comunica bien ese estado persistente sin perder la idea de resultado del verbo.'
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo con artículo definido.
- source_word: בַּמָּצוֹר
  english_pob_choice: under siege
  chosen_spanish: sitiada
  alternatives_spanish:
  - bajo sitio
  - en sitio
  - en estado de sitio
  lexicon: HALOT
  rationale: מָצוֹר refiere al asedio/sitio. En español, el participio «sitiada» expresa con naturalidad el estado resultante que el inglés POB resolvió como «under siege».
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  lexicon: HALOT
  rationale: Marca temporal de término; «hasta» es la forma idiomática en español para introducir el límite cronológico.
- source_word: עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: the eleventh year
  chosen_spanish: el undécimo año
  alternatives_spanish:
  - el año once
  - el año undécimo
  lexicon: HALOT
  rationale: 'La datación regnal hebrea se expresa naturalmente en español con ordinal: «el undécimo año», preservando el valor cronológico del original.'
- source_word: לַמֶּלֶךְ
  english_pob_choice: of King
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey en
  - del reinado
  lexicon: HALOT
  rationale: En fórmulas regnales, ל introduce la relación con el monarca; en español la formulación idiomática es «del rey ...».
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Zedequías
  alternatives_spanish:
  - Sedecías
  - Sedequías
  lexicon: Transliteración estándar bíblica en español
  rationale: Se usa la forma bíblica española más reconocible y estable, manteniendo la equivalencia nominal con el nombre propio hebreo.
translation_notes:
  revision_awareness: La versión inglesa POB adoptó una solución óptima («remained under siege») para un hebraísmo resultativo. En español se mantiene la misma decisión interpretativa con «quedó sitiada», evitando una traducción mecánica de «vino/entró en sitio» y conservando el sentido de estado prolongado reconocido en el audit trail. No se registraron revisiones posteriores ni cambios de juicio en el control cruzado.
  spanish_consistency_notes:
  - Se mantuvo la nomenclatura bíblica española «Zedequías» para la coherencia interna del libro y de la tradición de transliteración bíblica en español.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el tetragrámaton ni vocabulario teológico adicional.
  - «Sitiada» preserva la imagen de asedio sin forzar una construcción nominal poco natural en español.
