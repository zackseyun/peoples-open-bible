translation:
  language: es
  text: Los entregó en manos de los gabaonitas[a], y ellos los colgaron en el monte delante de Yahvé, y los siete cayeron juntos. Fueron ejecutados en los primeros días de la siega, al comienzo de la siega de cebada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los impalaron” o “los expusieron públicamente”. El verbo hebreo puede referirse, de manera más amplia, a colgar cuerpos para exhibición pública, no necesariamente en el sentido más restringido de “colgar”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽיִּתְּנֵ֞ם / וַיִּתֵּן
  english_pob_choice: He gave them
  chosen_spanish: Lo entregó
  alternatives_spanish:
  - Los dio
  - Los entregó
  lexicon: HALOT
  rationale: El hebreo con objeto y la expresión idiomática 'en la mano de' comunica transferencia a dominio ajeno; en español, 'entregar' conserva mejor esa idea de ponerlos bajo control de otros. Mantengo en la textura general una formulación natural sin perder el valor judicial del verbo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La locución hebrea señala control o jurisdicción. 'En manos de' es la equivalencia española natural y conserva el matiz de quedar sometidos al poder de otro.
- source_word: הַגִּבְעֹנִים
  english_pob_choice: the Gibeonites
  chosen_spanish: los gabaonitas
  alternatives_spanish:
  - los de Gabaón
  lexicon: HALOT
  rationale: Se usa el etnónimo español transparente y ampliamente reconocible para el grupo de Gabaón.
- source_word: וַיֹּקִיעֻם
  english_pob_choice: they hanged them
  chosen_spanish: los colgaron
  alternatives_spanish:
  - los impalaron
  - los expusieron públicamente
  lexicon: HALOT
  rationale: El verbo admite una gama semántica de colgar, empalar o exponer en público. En el texto principal, 'los colgaron' es la solución española más natural y acorde con la lectura principal del POB inglés, sin cerrar la ambigüedad léxica documentada.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - sobre el monte
  lexicon: HALOT
  rationale: '''Monte'' funciona bien en español bíblico para el hebreo הַר, manteniendo la referencia topográfica concreta y un registro digno.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto. 'Delante de' refleja la relación espacial y judicial del hebreo sin sustituirla por una formulación más interpretativa.
- source_word: וַיִּפְּלוּ שבעתים יָחַד
  english_pob_choice: and the seven of them fell together
  chosen_spanish: y los siete cayeron juntos
  alternatives_spanish:
  - y los siete de ellos cayeron juntos
  - y los siete cayeron al mismo tiempo
  lexicon: HALOT
  rationale: El hebreo presenta el resultado colectivo con valor numérico explícito. En español, conviene hacer explícito 'los siete' para una lectura fluida y exacta, conservando la idea de caer juntos.
- source_word: הֻמְתּוּ
  english_pob_choice: They were put to death
  chosen_spanish: Fueron muertos
  alternatives_spanish:
  - Fueron puestos a muerte
  - Fueron ejecutados
  lexicon: HALOT
  rationale: El pasivo causativo de מות permite 'fueron muertos' en español bíblico sobrio. Evita suavizar el hecho con un verbo menos directo y mantiene el valor de ejecución judicial.
- source_word: בִּימֵי קָצִיר בָּרִאשֹׁנִים
  english_pob_choice: in the first days of harvest
  chosen_spanish: en los primeros días de la siega
  alternatives_spanish:
  - durante los primeros días de la cosecha
  - en los primeros días de la cosecha
  lexicon: HALOT
  rationale: '''Siega'' refleja bien el campo semántico agrícola del hebreo קָצִיר y conserva un tono bíblico claro. ''Primeros días'' sigue de cerca la construcción temporal.'
- source_word: תְּחִלַּת קְצִיר שְׂעֹרִים
  english_pob_choice: at the beginning of the barley harvest
  chosen_spanish: al comienzo de la siega de cebada
  alternatives_spanish:
  - al inicio de la cosecha de cebada
  - al comienzo de la cosecha de cebada
  lexicon: HALOT
  rationale: La frase apposicional especifica la estación con cebada. 'Siega de cebada' mantiene la imagen agrícola y la precisión del hebreo sin sobreexplicar.
theological_decisions:
- issue: Ambigüedad del verbo יקע en un contexto de ejecución pública
  english_pob_reading: they hanged them; footnote preserves 'impaled' or 'exposed them publicly'
  chosen_spanish_reading: los colgaron; nota preserva 'los impalaron' o 'los expusieron públicamente'
  alternative_spanish_readings:
  - los impalaron
  - los expusieron públicamente
  rationale: No se debe resolver artificialmente la tensión léxica. El texto principal adopta la lectura idiomática más natural en español, mientras la nota conserva la amplitud semántica reconocida por el POB inglés y evita cerrar indebidamente el modo exacto de la ejecución.
  doctrine_reference: Preservar la ambigüedad documentada del texto fuente y no sobretraducirla.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se prefirió una equivalencia más cercana para וַיִּתֵּן/וַיִּתְּנֵם con ''lo entregó'', se eliminó una relación consecutiva excesiva en favor de la secuencia coordinada, y se mantuvo la nota lexical sobre יקע. También se respetó la distinción temporal entre ''los primeros días de la siega'' y ''el comienzo de la siega de cebada''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la norma del proyecto.
  - Se mantiene un registro bíblico moderno con 'monte', 'siega' y 'delante de'.
  - No se introduce 'Señor' como máscara del nombre divino.
  - La nota a debe anclarse en 'colgaron' para reflejar la alternativa lexical documentada.
