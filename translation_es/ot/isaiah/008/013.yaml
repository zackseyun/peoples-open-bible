revisions:
- from: ¡Yahvé de los ejércitos, a él lo santificaréis[a]! Él será vuestro temor[b], y él será vuestro pavor.
  to: A Yahvé de los ejércitos, a él lo reconocerán como santo[a]. Que él sea su temor[b], y que él sea su pavor.
  rationale: 'Se ajusta קדשׁ a una formulación española que preserve el sentido contextual documentado por el POB: reconocer/tratar como santo, no hacer santo. También se cambia la construcción final a «Que él sea...» para reflejar mejor la fuerza exhortativa del hebreo y del audit trail inglés, y se elimina la exclamación añadida. Se mantienen «Yahvé», «de los ejércitos», «temor» y «pavor» por su buena alineación con fuente y glosario.'
  reviewer_model: gpt-5.4
