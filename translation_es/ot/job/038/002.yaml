revisions:
- from: ¿Quién es este que oscurece el consejo con palabras sin conocimiento?[a]
  to: ¿Quién es este que oscurece el consejo con palabras sin entendimiento?[a]
  rationale: Se conserva la fidelidad general del borrador, pero se sustituye «sin conocimiento» por «sin entendimiento» para lograr un español más natural y contextualmente preciso para בְּלִי דָעַת, sin alterar el sentido fuente ni la tensión semántica documentada.
  reviewer_model: gpt-5.4
