revisions:
- from: ¡Mira![a] Yahvé está por arrojarte violentamente, oh hombre, y envolverte estrechamente.
  to: Mira[a], Yahvé está por arrojarte violentamente, oh hombre, y envolverte bien.
  rationale: Se ajusta el inicio para un tono más natural y digno en español, sin perder la fuerza deíctica de הִנֵּה. Se reemplaza «envolverte estrechamente» por «envolverte bien», que expresa la intensificación de עטה de forma más idiomática. Se pule la nota para que el español sea más natural, preservando la ambigüedad documentada del hebreo.
