revisions:
- from: Porque con razón avergonzaríamos a nuestros antepasados si no nos sirviéramos de la obediencia a la ley como consejo y entendimiento[a].
  to: Porque con razón avergonzaríamos a nuestros antepasados si no nos sirviéramos de la obediencia a la ley para consejo y entendimiento[a].
  rationale: 'Se hizo un ajuste menor de naturalidad y precisión idiomática: «para consejo y entendimiento» suena más claro en español que «como consejo y entendimiento» y sigue siendo fiel al griego y a la auditoría inglesa. Se mantuvo «avergonzaríamos a nuestros antepasados» por coherencia con la decisión exegética principal del POB. No se requiere adjudicación adicional.'
