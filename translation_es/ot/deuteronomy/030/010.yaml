review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura condicional del hebreo, conserva «Yahvé», «mandamientos», «estatutos», «corazón» y «alma», y refleja adecuadamente שׁוּב con «vuelves». Sin embargo, las notas al pie están cruzadas respecto del inglés auditado: la nota [a] del inglés corresponde al verbo «vuelves/return», no a «tu Dios», y la nota [b] corresponde a «obedecer la voz», no a «libro de la ley».'
  spanish_quality_summary: El texto base es claro y natural en español eclesial contemporáneo. La única mejora menor en el cuerpo del texto es preferir «los que están escritos» para evitar que la relativa parezca modificar solo «estatutos» en vez del conjunto «mandamientos y estatutos». Las notas actuales, además de estar mal ancladas, introducen contenido no respaldado por el rastro auditado.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> «Yahvé» correctamente; אֱלֹהֶיךָ -> «tu Dios»; מִצְוֺתָיו -> «sus mandamientos»; חֻקֹּתָיו -> «sus estatutos»; שׁוּב -> «vuelves» mantiene la tensión teológica de «return». Debe corregirse la documentación de notas para que las alternativas léxicas coincidan con las decisiones inglesas auditadas.'
  issues:
  - severity: high
    issue: Las notas [a] y [b] están ancladas a lugares equivocados.
    rationale: En el audit trail, [a] pertenece a «if you return» (שׁוּב) y [b] a «obey the voice» (שׁמע בקול). En el borrador español, [a] aparece tras «tu Dios» y [b] tras «libro de la ley», lo que distorsiona la evidencia y la justificación léxica.
  - severity: high
    issue: El contenido de las notas no corresponde al material auditado.
    rationale: La nota [a] mezcla dos asuntos distintos («obedeces la voz» y «te vuelves»), mientras que la nota [b] comenta «la ley/libro del pacto», tema no preservado como nota en el inglés. Esto altera el aparato explicativo autorizado.
  - severity: medium
    issue: La relativa «que están escritos» puede sonar como si modificara solo «estatutos».
    rationale: Aunque comprensible, en español «sus mandamientos y sus estatutos, que están escritos...» puede generar leve ambigüedad sintáctica. «sus mandamientos y sus estatutos, los que están escritos...» o una reestructuración similar aclara que el participio colectivo abarca ambos términos.
  revised_spanish_text: si obedeces la voz[a] de Yahvé tu Dios, guardando sus mandamientos y sus estatutos, los que están escritos en este libro de la ley, si vuelves[b] a Yahvé tu Dios con todo tu corazón y con toda tu alma.
  revised_footnotes:
  - marker: a
    text: Hebreo «obedecer la voz de Yahvé»; la expresión significa atender obedientemente lo que él dice.
    reason: lexical_alternative
  - marker: b
    text: O «te vuelves» o «te arrepientes» ante Yahvé tu Dios.
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron las notas para alinearlas con el rastro auditado en inglés y con los lugares correctos del texto: [a] ahora explica el modismo «obedecer la voz», y [b] preserva las alternativas de שׁוּב («te vuelves» / «te arrepientes»). También se ajustó levemente la sintaxis con «los que están escritos» para que la referencia abarque claramente tanto «mandamientos» como «estatutos».'
