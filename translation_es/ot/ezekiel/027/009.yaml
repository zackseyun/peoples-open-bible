  text: זִקְנֵ֨י גְבַ֤ל וַ/חֲכָמֶ֨י/הָ֙ הָ֣יוּ בָ֔/ךְ מַחֲזִיקֵ֖י בִּדְקֵ֑/ךְ כָּל אֳנִיּ֨וֹת הַ/יָּ֤ם וּ/מַלָּֽחֵי/הֶם֙ הָ֣יוּ בָ֔/ךְ לַ/עֲרֹ֖ב מַעֲרָבֵֽ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/027/009.yaml
  text: The elders of Gebal and her skilled men were within you[a], repairing your breaches[c][b]. All the ships of the sea and their sailors were within you to barter for your wares.
  footnotes:
  - marker: a
    text: Gebal is the Phoenician city later known in Greek as Byblos.
    reason: alternative_reading
  - marker: b
    text: Or 'repairing your breaches'; the Hebrew can refer to structural damage, cracks, or seams needing repair.
    reason: lexical_alternative
  - marker: c
    text: Or 'to barter for your wares.'
    reason: lexical_alternative
