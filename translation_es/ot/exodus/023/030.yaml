translation:
  language: es
  text: Poco a poco los expulsaré de delante de ti[a], hasta que te hagas fecundo y tomes posesión de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene un sufijo singular; el referente probablemente es colectivo, es decir, los habitantes o pueblos de la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'O: «heredes la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט מְעַט
  english_pob_choice: Little by little
  chosen_spanish: Poco a poco
  alternatives_spanish:
  - gradualmente
  - un poco a la vez
  lexicon: HALOT
  rationale: La repetición de מְעַט intensifica la idea de una acción gradual; «poco a poco» es el equivalente natural en español y conserva el valor de proceso continuo sin volver la frase rígida.
- source_word: אֲגָרְשֶׁנּוּ
  english_pob_choice: I will drive them out
  chosen_spanish: los expulsaré
  alternatives_spanish:
  - los echaré
  - los sacaré
  lexicon: HALOT
  rationale: גרשׁ expresa expulsar o echar fuera. «Expulsaré» mantiene mejor la fuerza causativa y la idea de remover a los habitantes del territorio que un verbo más débil o más coloquial.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de ante ti
  lexicon: HALOT
  rationale: La expresión hebrea alude a la presencia/frente de alguien. «De delante de ti» conserva el giro idiomático de forma clara y bíblica en español, sin ocultar la imagen espacial del original.
- source_word: תִּפְרֶה
  english_pob_choice: you become fruitful
  chosen_spanish: te hagas fecundo
  alternatives_spanish:
  - te multipliques
  - te vuelvas fructífero
  lexicon: HALOT
  rationale: פרה denota ser fecundo o fructificar. En español, «te hagas fecundo» comunica el sentido resultativo de crecimiento y aumento de población, aunque «te multipliques» también es posible en este contexto.
- source_word: וְנָחַלְתָּ
  english_pob_choice: and take possession of
  chosen_spanish: heredes
  alternatives_spanish:
  - tomes posesión de
  - posesiones
  lexicon: HALOT
  rationale: נחל en este contexto puede significar recibir como herencia o entrar en posesión. Dado que el POB inglés dejó abierta la alternativa «inherit the land», «heredes» conserva la relación de herencia/promesa sin perder el matiz de posesión territorial.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En el contexto del pacto, הָאָרֶץ se refiere a la tierra prometida. «La tierra» es la forma más sobria y fiel; evita añadir una especificación que el versículo no expresa de manera explícita.
theological_decisions:
- issue: Objeto colectivo con sufijo singular en el hebreo
  english_pob_reading: The English POB initially reflected the singular grammar ('him') and then revised it to the plural sense ('them') to match the collective referent.
  chosen_spanish_reading: los expulsaré
  alternative_spanish_readings:
  - lo expulsaré
  - las expulsaré
  - los expulsaré
  rationale: El hebreo usa sufijo singular, pero el referente son los pueblos/ocupantes de la tierra de manera colectiva. En español, el plural «los» comunica con transparencia el sentido contextual sin forzar un singular artificial; aquí no se conserva la tensión gramatical porque el uso natural del español exige el plural para un referente colectivo humano.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se pasó de «him» a «them» para reflejar el referente colectivo, manteniendo el resto de la línea sin cambios. La versión española adopta desde el inicio el plural colectivo natural («los»), y conserva la alternativa léxica de נחל con nota.'
  spanish_consistency_notes:
  - Se mantiene Yahvé en el proyecto como traducción del nombre divino, aunque este versículo no lo contiene.
  - Se traduce el verbo de expulsión con fuerza causal («expulsaré») para corresponder al valor de גרשׁ.
  - «La tierra» se deja sin ampliación interpretativa, porque el contexto canónico ya identifica el territorio prometido.
  - La nota sobre נחל preserva la alternativa «heredar/tomar posesión» documentada en el audit trail inglés.
