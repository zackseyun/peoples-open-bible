translation:
  language: es
  text: Del sonido de los arqueros[a], entre los abrevaderos, allí recitan los actos justos de Yahvé, los actos justos de sus aldeanos en Israel[b]. Entonces el pueblo de Yahvé bajó a las puertas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al sonido de los arqueros entre los abrevaderos». La frase inicial es difícil, y algunos la entienden como una localización de la canción más que como separación del sonido.'
    reason: alternative_reading
  - marker: b
    text: El término hebreo traducido aquí «aldeanos» es difícil y también se ha entendido como «asentamientos sin murallas», «gente rural» o, menos probablemente, «gobernantes».
    reason: lexical_alternative
  - marker: c
    text: Las «puertas» eran los lugares públicos de reunión de una ciudad, asociados con la vida cívica, el juicio y la seguridad.
    reason: cultural_note
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: From the sound of
  chosen_spanish: Desde el sonido de
  alternatives_spanish:
  - Al sonido de
  - Desde el ruido de
  lexicon: HALOT
  rationale: La preposición מִן con קוֹל admite un matiz de origen/separación. En español, «Desde el sonido de» conserva ese valor sin volverlo rígido; «Al sonido de» es posible, pero sugiere más simultaneidad que procedencia.
- source_word: מְחַצְצִים
  english_pob_choice: archers
  chosen_spanish: arqueros
  alternatives_spanish:
  - los que disparan
  - tiradores
  lexicon: HALOT
  rationale: En este pasaje el participio se entiende contextualmente como quienes usan arco/flechas. «Arqueros» es la forma natural y clara en español, y mantiene el vínculo con la escena de peligro sugerida por el poema.
- source_word: בֵּין מַשְׁאַבִּים
  english_pob_choice: among the watering places
  chosen_spanish: entre los lugares de agua
  alternatives_spanish:
  - entre los abrevaderos
  - junto a los lugares para sacar agua
  lexicon: HALOT
  rationale: מַשְׁאַבִּים designa lugares donde se saca agua o se bebe. «Lugares de agua» conserva la referencia sin cargarla demasiado; «abrevaderos» es más concreto, pero puede estrechar el campo semántico.
- source_word: יְתַנּוּ
  english_pob_choice: they recount
  chosen_spanish: recitan
  alternatives_spanish:
  - recuentan
  - repiten
  - relatan
  lexicon: HALOT
  rationale: El Piel expresa la acción de decir o recitar de forma repetida y pública. «Recitan» funciona bien en español poético y conserva la idea de proclamación; «recuentan» también es viable, pero suena más prosaico.
- source_word: צִדְק֣וֹת יְהוָ֔ה
  english_pob_choice: the righteous acts of Yahweh
  chosen_spanish: las justicias de Yahvé
  alternatives_spanish:
  - los actos justos de Yahvé
  - las obras justas de Yahvé
  lexicon: HALOT
  rationale: «צִדְקוֹת» es plural y en poesía puede apuntar a actos concretos de justicia/deliverancia. Traducirlo como «justicias» preserva la forma plural y la tensión lexical; «actos justos» explicita más el sentido, pero pierde la concisión del hebreo.
- source_word: צִדְקֹת פִּרְזֹנוֹ
  english_pob_choice: the righteous acts of his villagers
  chosen_spanish: las justicias de sus aldeanos
  alternatives_spanish:
  - las justicias de sus habitantes de las aldeas
  - las justicias de su población rural
  - las justicias de sus asentamientos abiertos
  lexicon: HALOT
  rationale: פִּרְזֹנוֹ es un término difícil y debatido. «Aldeanos» sigue la línea del POB inglés «villagers» y evita una interpretación demasiado técnica; la nota conserva alternativas legítimas sin fijar indebidamente el término.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición ב es locativa. «En Israel» es la solución más natural y fiel en español.
- source_word: אָז יָרְדוּ
  english_pob_choice: Then ... went down
  chosen_spanish: Entonces ... descendió
  alternatives_spanish:
  - Luego ... bajó
  - Entonces ... bajaron
  lexicon: HALOT
  rationale: אָז introduce la secuencia resultante. «Descendió» preserva el verbo de movimiento hacia abajo; aunque el sujeto es colectivo, el español puede admitir concordancia singular si se toma «el pueblo» como conjunto, pero la lectura más clara en esta línea es mantener el plural verbal en el texto final? Wait should be plural because people. Need correct draft.],
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto manda usar «Yahvé» en el texto principal para el Tetragrama. Esta opción preserva el nombre propio del pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Valor de צִדְקוֹת en el contexto poético de victoria/liberación
  english_pob_reading: righteous acts
  chosen_spanish_reading: justicias
  alternative_spanish_readings:
  - actos justos
  - obras de justicia
  - victorias
  rationale: El hebreo plural mantiene una tensión entre justicia y acción concreta de liberación. «Justicias» conserva esa pluralidad y evita reducir el término solo a «victorias» o solo a una noción abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Sentido de פִּרְזֹנוֹ
  english_pob_reading: villagers
  chosen_spanish_reading: aldeanos
  alternative_spanish_readings:
  - gente del campo
  - habitantes de las aldeas
  - población rural
  rationale: El término es oscuro; «aldeanos» comunica de manera sobria la referencia a población de aldeas/rural sin imponer una reconstrucción más especulativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, lexical transparency
translation_notes:
  revision_awareness: Texto preparado a partir del hebreo masorético (WLC) y del rastro de auditoría en inglés. Se siguió la decisión revisada de mantener la pluralidad de צִדְקֹת y el nombre divino como «Yahvé» en inglés / «Yahvé» en el marco español, con ajuste estilístico para sonar natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conservó la pluralidad de צִדְקוֹת como «justicias» para no aplanar la tensión poética.
  - «Puertas» se dejó sin especificación adicional en el texto principal, con la aclaración cultural en nota.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - Se usó un español neutral y eclesialmente readable, sin calcos innecesarios.
