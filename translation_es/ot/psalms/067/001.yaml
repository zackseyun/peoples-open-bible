lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder
  - Al director
  lexicon: HALOT
  rationale: En los encabezados de los Salmos, el término señala a la persona encargada de la dirección musical o del desempeño litúrgico. En español, 'director musical' expresa esa función con claridad y evita la ambigüedad de 'líder'. 'Para' refleja el lamed direccional/funcional de un encabezado.
- source_word: בִּנְגִינֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - sobre instrumentos de cuerda
  - con música de cuerda
  - con instrumentos musicales de cuerda
  lexicon: HALOT
  rationale: El sustantivo se refiere a música o instrumentos de cuerda en encabezados musicales. 'Con instrumentos de cuerda' mantiene el sentido instrumental y suena natural en español. 'Sobre' es posible, pero menos idiomático aquí.
- source_word: מִזְמ֥וֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Salmo
  - Un canto
  lexicon: HALOT
  rationale: Es la etiqueta de género habitual. 'Un salmo' conserva el valor de designación literaria sin añadir matices no explicitados por el hebreo.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Una canción
  alternatives_spanish:
  - Un canto
  - Una canción poética
  lexicon: HALOT
  rationale: El término es un designador de género directo. Se mantiene separado de מִזְמוֹר para preservar la doble denominación hebrea. 'Canción' es comprensible en español moderno y no borra la distinción del original.
translation_notes:
  revision_awareness: La revisión más reciente indica concordancia alta y que no hubo cambios necesarios; este borrador sigue esa lectura estable, manteniendo la estructura breve del encabezado y la distinción entre los dos rótulos genéricos finales.
  spanish_consistency_notes:
  - Se conserva 'salmo' y 'canción' como etiquetas de género separadas, en paralelo al hebreo.
  - Se usa 'director musical' como equivalente funcional de לַמְנַצֵּחַ, sin introducir lenguaje eclesiástico más específico que el exigido por el texto.
  - La nota a pie de página marca la alternativa preposicional plausible sin alterar el texto principal.
