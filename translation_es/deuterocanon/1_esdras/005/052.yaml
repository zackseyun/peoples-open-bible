translation:
  language: es
  text: Y todos los que habían hecho un voto a Dios[a] comenzaron, desde la luna nueva del primer mes, a ofrecer sacrificios a Dios[b], aunque el templo de Dios aún no había sido construido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con un giro más literal, «habían votado un voto». La expresión griega es intensiva y muy cercana a un hebraísmo; «habían hecho un voto» preserva bien el sentido en español natural.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en Esdras difiere aquí, pues habla de la Fiesta de las Enramadas y de los holocaustos diarios prescritos. 1 Esdras conserva una redacción griega distinta, y esa es la que sigue el texto principal.
    reason: cross_reference
lexical_decisions:
- source_word: ὅσοι
  english_pob_choice: all who
  chosen_spanish: todos los que
  alternatives_spanish:
  - los que
  - cuantos
  lexicon: LSJ
  rationale: La expresión griega introduce un grupo abierto e indefinido. «Todos los que» conserva bien ese alcance inclusivo en español sin sonar forzado.
- source_word: εὔξαντο εὐχήν
  english_pob_choice: had vowed a vow
  chosen_spanish: habían hecho voto
  alternatives_spanish:
  - habían prometido un voto
  - habían votado
  lexicon: LSJ
  rationale: El giro cognado expresa hacer un voto, no una oración. «Habían hecho voto» conserva el valor idiomático y el tiempo anterior del aoristo en contexto narrativo.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: LSJ
  rationale: Dativo sencillo de destinatario/relación. En español «a Dios» es la forma natural y exacta para el voto y para los sacrificios.
- source_word: ἀπὸ τῆς νουμηνίας
  english_pob_choice: from the new moon
  chosen_spanish: desde la luna nueva
  alternatives_spanish:
  - desde la novilunio
  - desde el día de luna nueva
  lexicon: LSJ
  rationale: νουμηνία designa el inicio del mes lunar y, por extensión, el momento cultual de la luna nueva. «Luna nueva» comunica el sentido calendárico-litúrgico mejor que una paráfrasis más larga.
- source_word: τοῦ πρώτου μηνός
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - del mes primero
  lexicon: LSJ
  rationale: Correspondencia directa y transparente del genitivo temporal. «Primer mes» es claro y natural en español.
- source_word: ἤρξαντο προσφέρειν
  english_pob_choice: began ... to offer
  chosen_spanish: comenzaron ... a ofrecer
  alternatives_spanish:
  - empezaron a ofrecer
  - se pusieron a ofrecer
  lexicon: LSJ
  rationale: El aoristo ingresivo señala el inicio de la acción. «Comenzaron a ofrecer» mantiene ese matiz con un español sobrio y fluido.
- source_word: θυσίας
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  lexicon: LSJ
  rationale: θυσίαι refiere específicamente a sacrificios. «Sacrificios» es más preciso que el más amplio «ofrendas».
- source_word: καὶ ὁ ναὸς τοῦ θεοῦ οὔπω ᾠκοδόμητο
  english_pob_choice: though the temple of God had not yet been built
  chosen_spanish: aunque el templo de Dios todavía no había sido construido
  alternatives_spanish:
  - y el templo de Dios todavía no había sido construido
  - aunque el templo de Dios aún no estaba edificado
  lexicon: LSJ
  rationale: 'El griego coordina con καί, pero el contexto es concesivo: la actividad sacrificial empieza pese a que el templo no está terminado. «Aunque» explicita ese valor sin apartarse del original; «había sido construido» reproduce la pasiva resultativa de forma idiomática en español.'
theological_decisions:
- issue: Fuerza concesiva de la cláusula final coordinada con καί
  english_pob_reading: 'Render the clause concessively: ''though the temple of God had not yet been built.'''
  chosen_spanish_reading: 'Traducir la cláusula como concesiva: «aunque el templo de Dios todavía no había sido construido».'
  alternative_spanish_readings:
  - «y el templo de Dios todavía no había sido construido»
  rationale: La coordinación griega no es meramente aditiva en la lógica del pasaje; subraya la tensión entre el inicio del culto sacrificial y la ausencia del templo terminado. El español concesivo comunica mejor esa relación narrativa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación con el paralelo hebreo de Esdras
  english_pob_reading: Retain the Greek statement about vows and the not-yet-built temple as the main text.
  chosen_spanish_reading: Conservar el contenido griego sobre los votos y el templo aún no construido como texto principal.
  alternative_spanish_readings:
  - Ajustar la frase al paralelo de Esdras 3 sobre la Fiesta de los Tabernáculos y los holocaustos diarios
  rationale: El testimonio griego de 1 Esdras tiene primacía como fuente base de esta sección. No debe harmonizarse con el paralelo hebreo cuando las diferencias son materiales.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha' and 'Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios sustanciales; este borrador mantiene la primacía del griego de Swete, la fuerza concesiva de la última cláusula y la diferencia material respecto del paralelo hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» de manera uniforme para τῷ θεῷ / τοῦ θεοῦ.
  - Se mantiene «luna nueva» para νουμηνία, en estilo culto pero natural.
  - «Sacrificios» conserva la precisión cultual de θυσίας.
  - La cláusula final se formula con «aunque» para reflejar el valor concesivo reconocido en el audit trail inglés.
