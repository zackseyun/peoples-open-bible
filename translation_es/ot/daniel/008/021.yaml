review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: identifica al macho cabrío como el rey de Grecia/Javán, al gran cuerno como el primer rey, y conserva la relación simbólica del versículo. También mantiene correctamente la singularidad de מֶלֶךְ y el valor secuencial de הָרִאשׁוֹן.'
  spanish_quality_summary: 'El español es claro y natural en general. Sin embargo, la nota a usa una alternativa poco idiomática en español bíblico y general: ''el cabrío'' no funciona bien como equivalente natural de ''the goat''. Conviene cambiarla por ''la cabra'' o mejor limitarla a ''el macho cabrío'' / ''la cabra''. Además, ''pelo abundante'' suena algo interpretativo; ''pelaje'' o ''pelo áspero/largo'' conserva mejor el matiz descriptivo.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Grecia' para יָוָן sigue el expediente inglés con nota alternativa 'Javán'. 'Rey' y 'cuerno' están bien alineados. No aparecen términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: La nota al pie a contiene la alternativa 'el cabrío'.
    rationale: En español neutro y eclesial, 'el cabrío' no es una forma natural para el animal en este contexto y puede sonar impropia o confusa. La nota debe preservar alternativas viables y legibles.
  - severity: low
    issue: La explicación 'con pelo abundante' en la nota a es algo libre.
    rationale: El inglés auditado subraya el carácter vívido y peludo/áspero del hebreo. 'Pelaje' o 'pelo largo/áspero' transmite mejor el matiz sin sobreinterpretar.
  revised_spanish_text: Y el macho cabrío peludo es el rey de Grecia[a][b], y el gran cuerno que está entre sus ojos es el primer rey.
  revised_footnotes:
  - marker: a
    text: O, 'el macho cabrío' o simplemente 'la cabra'. La expresión hebrea es más vívida, pues describe un macho cabrío de pelaje notable.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'Javán', un término que aquí suele referirse a Grecia o al ámbito griego.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota léxica para evitar una alternativa española poco idiomática ('el cabrío') y para ajustar la explicación del matiz peludo del hebreo a una formulación más precisa y legible.
