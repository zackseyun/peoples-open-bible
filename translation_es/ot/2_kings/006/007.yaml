translation:
  language: es
  text: 'Y dijo[a]: «Sácalo para ti». Entonces extendió su mano y lo tomó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Levántalo para ti». El imperativo hebreo puede traducirse más literalmente como «levanta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol en hebreo narra secuencia; en español, «Y dijo» conserva el avance narrativo sin añadir una relación temporal más fuerte de la que el texto exige.
- source_word: הָרֶם
  english_pob_choice: Lift it up for yourself
  chosen_spanish: Levántalo
  alternatives_spanish:
  - Alzalo
  - Levántalo para ti
  lexicon: HALOT
  rationale: El imperativo de רוּם expresa levantar/alzar. En español, el objeto implícito se entiende por contexto, y «Levántalo» reproduce mejor la orden directa y natural que una expansión explicativa obligatoria.
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para vos
  - por ti mismo
  lexicon: HALOT
  rationale: El dativo pronominal añade implicación personal o beneficio. «Para ti» conserva ese matiz sin forzar una lectura reflexiva excesiva.
- source_word: וַיִּשְׁלַח יָדוֹ
  english_pob_choice: he reached out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - estiró su mano
  lexicon: HALOT
  rationale: El hebreo es idiomático para extender la mano con intención de asir algo. «Extendió su mano» es natural en español y mantiene la acción concreta.
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: and took it
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo agarró
  - lo recogió
  lexicon: HALOT
  rationale: לקח significa básicamente «tomar». «Lo tomó» preserva el sentido verbal sin introducir un matiz más coloquial o interpretativo que el hebreo no obliga.
theological_decisions:
- issue: Conservación del mandato sin suavizar la fuerza verbal
  english_pob_reading: Lift it up for yourself.
  chosen_spanish_reading: Levántalo para ti.
  alternative_spanish_readings:
  - Tómalo para ti
  - Alzalo para ti
  rationale: El texto presenta una instrucción concreta; no hay razón para convertirla en una paráfrasis menos directa. La forma elegida mantiene la imperatividad y el beneficio personal implícito.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó la orden de «Pick it up» a «Lift it up» para reflejar con mayor precisión הָרֶם. La presente redacción sigue esa revisión y conserva el resto del movimiento narrativo: orden, extensión de la mano y acto de tomar.'
  spanish_consistency_notes:
  - Se mantiene un español neutro y publicable, con verbos directos y sin calcos rígidos.
  - Se evita introducir «Cristo», «SEÑOR» u otra terminología no presente en el hebreo.
  - El objeto directo implícito se deja recuperable por contexto, como en el flujo narrativo del hebreo y del POB inglés.
