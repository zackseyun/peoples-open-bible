  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: delimitación territorial, reparto hereditario entre las doce tribus, y doble porción para José. Sin embargo, la formulación del título compuesto אֲדֹנָי יְהוִה como «Yahvé, el Señor» invierte el orden semántico del hebreo y suena menos natural y menos fiel que una forma como «el Señor Yahvé».'
  spanish_quality_summary: El español es claro y legible, con buena naturalidad general. «Este es el límite» y «José tendrá dos porciones» funcionan bien. La principal debilidad estilística y de fidelidad es «Así dice Yahvé, el Señor», que resulta algo forzado en español y no representa de la mejor manera el compuesto título+nombre.
  glossary_alignment: 'Cumple bien con «Yahvé» para יהוה, «tierra» para הָאָרֶץ y «porciones» para חֲבָלִים. Requiere ajuste en el tratamiento del compuesto אֲדֹנָי יְהוִה: debe preservarse mejor como título seguido del nombre divino, no como nombre seguido de aposición.'
