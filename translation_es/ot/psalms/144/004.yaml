translation:
  language: es
  text: El hombre[a] es como un soplo[b]; sus días son como una sombra que pasa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la humanidad'. אָדָם es masculino en forma, pero puede funcionar de manera genérica para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O 'vapor', 'vanidad' o 'vaciedad'. הֶבֶל puede expresar brevedad, insustancialidad o futilidad; aquí se prioriza la imagen de transitoriedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: Man
  chosen_spanish: El hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: HALOT
  rationale: El hebreo usa אָדָם de manera genérica para la humanidad, pero conserva forma masculina representativa. En español, 'el hombre' mantiene esa fuerza proverbial y la forma del original sin volver la frase pesada.
- source_word: לַהֶבֶל
  english_pob_choice: like a breath
  chosen_spanish: como un soplo
  alternatives_spanish:
  - como un vapor
  - como vanidad
  - como vaciedad
  lexicon: HALOT
  rationale: 'El valor básico de הֶבֶל es de algo breve e insustancial: aliento/vaho. ''Soplo'' conserva la imagen física de fragilidad y transitoriedad mejor que ''vanidad'', que en español suena más moral o abstracta.'
- source_word: דָּמָה
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - se asemeja a
  - es comparable a
  lexicon: HALOT
  rationale: El verbo expresa semejanza directa. 'Es como' es la forma más natural en español y preserva la comparación poética sin añadir matiz.
- source_word: יָמָיו
  english_pob_choice: his days
  chosen_spanish: sus días
  alternatives_spanish:
  - los días de su vida
  - su vida
  lexicon: HALOT
  rationale: La expresión hebrea refiere al lapso vital de una persona. 'Sus días' refleja con precisión el plural posesivo del original y conserva el estilo conciso del verso.
- source_word: כְּצֵל עוֹבֵר
  english_pob_choice: like a passing shadow
  chosen_spanish: como una sombra que pasa
  alternatives_spanish:
  - como sombra pasajera
  - como la sombra de algo que pasa
  lexicon: HALOT
  rationale: El participio de עבר mantiene la idea de algo en tránsito. 'Una sombra que pasa' reproduce la imagen y la acción de modo claro y poético en español.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre la fuente hebrea y el testimonio auditado en inglés; no se requieren revisiones sustantivas respecto al sentido principal. La única decisión visible es mantener la metáfora de fragilidad ('soplo') y la comparación participial ('sombra que pasa') con español natural.
  spanish_consistency_notes:
  - Se mantiene 'El hombre' para reflejar el masculino representativo del hebreo, con nota de alternativa genérica.
  - Se evita 'SEÑOR' o formulaciones interpretativas, porque el verso no contiene el Tetragrámaton ni una cita divina.
  - '''Soplo'' preserva mejor la insubstancialidad que ''aliento'' en este contexto poético.'
  - '''Sus días'' conserva el hebraísmo breve del plural posesivo.'
