revisions:
- from: No han abandonado a sus hermanos[a] estos muchos días, hasta hoy; y han guardado la custodia del mandamiento de Yahvé, su Dios.
  to: No han abandonado a sus hermanos[a] todos estos muchos días, hasta hoy; y han guardado el encargo del mandamiento de Yahvé su Dios.
  rationale: Se revisa solo lo necesario para mejorar fidelidad semántica y naturalidad en español. «El encargo del mandamiento» representa mejor מִשְׁמֶרֶת מִצְוַת que «la custodia del mandamiento». Se añade «todos» para suavizar «estos muchos días» sin perder el sabor del original. Se conserva «hermanos» con nota y «Yahvé» conforme al proyecto.
