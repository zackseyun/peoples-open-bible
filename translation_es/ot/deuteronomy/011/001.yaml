    issue: «su encargo» para מִשְׁמַרְתּוֹ
    rationale: Aunque léxicamente posible, en español actual suena a comisión puntual o recado. En este contexto legal-covenantal, מִשְׁמֶרֶת apunta a aquello que debe guardarse/observarse, su obligación o requerimiento. El inglés «his charge» busca formalidad compacta, pero trasladarlo como «encargo» pierde precisión semántica.
