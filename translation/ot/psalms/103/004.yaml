id: PSA.103.4
reference: Psalms 103:4
source:
  edition: WLC
  text: הַ/גּוֹאֵ֣ל מִ/שַּׁ֣חַת חַיָּ֑יְ/כִי הַֽ֝/מְעַטְּרֵ֗/כִי חֶ֣סֶד וְ/רַחֲמִֽים׃
translation:
  text: who redeems your life from the pit[a], who crowns you with steadfast love and compassion[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from destruction' or 'from the grave.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and compassion' or 'and tender mercies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹאֵל
  chosen: who redeems
  alternatives:
  - who rescues
  - who acts as redeemer
  lexicon: HALOT
  rationale: The participle from גאל denotes redeeming or reclaiming, often with covenantal/rescue overtones. 'Who redeems' preserves the verbal force and theological resonance without over-specifying legal kinship language in this poetic context.
- source_word: מִשַּׁחַת
  chosen: from the pit
  alternatives:
  - from destruction
  - from the grave
  lexicon: HALOT
  rationale: שַׁחַת can denote a pit, grave, or destruction. 'Pit' is the most concrete and textually direct rendering, while still allowing the poetic sense of mortal ruin. Alternatives are preserved in a footnote because the term can be understood more abstractly as destruction or more specifically as the grave.
- source_word: חַיָּיִכִי
  chosen: your life
  alternatives:
  - your soul
  lexicon: HALOT
  rationale: Though the form reflects 'your life/lives,' English idiom prefers the singular 'your life.' 'Soul' would import a more immaterial sense not required by חַיִּים here; the psalm speaks broadly of the person's life being delivered.
- source_word: הַמְעַטְּרֵכִי
  chosen: who crowns you
  alternatives:
  - who surrounds you
  - who adorns you
  lexicon: HALOT
  rationale: The verb עטר commonly means to crown or encircle with honor. 'Who crowns you' best fits the metaphor of bestowing honor and benefits, and pairs naturally with the following objects.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant love
  lexicon: HALOT
  rationale: חסד is a theologically rich term for loyal, covenantal love. 'Steadfast love' is established, readable modern English that preserves both affection and constancy better than the archaic 'lovingkindness.'
- source_word: וְרַחֲמִים
  chosen: and mercies
  alternatives:
  - and compassion
  - and tender mercies
  lexicon: HALOT
  rationale: The plural רחמים often conveys acts or abundance of compassion/mercy. 'Mercies' preserves the plural form and poetic parallelism with חסד, while 'compassion' is a viable smoother alternative.
