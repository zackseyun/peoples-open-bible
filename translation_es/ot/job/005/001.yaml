review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura retórica del hebreo y la mayor parte del sentido: imperativo + pregunta retórica + segunda pregunta paralela. Sin embargo, se aparta del POB auditado en dos puntos importantes: «Clama» intensifica קְרָא más de lo necesario frente a «Call», y «los santos» en el texto principal introduce con fuerza en español la lectura de santos humanos, precisamente la asociación que el POB inglés evitó al preferir «holy ones».'
  spanish_quality_summary: El español es fluido y legible, pero «te volverás» suena menos natural aquí que «te dirigirás» o «acudirás/te volverás hacia». Además, la nota actual no preserva bien la alternativa, porque repite «santos» en vez de explicar alternativas como «santos» o «seres santos/celestiales».
  glossary_alignment: 'No hay conflicto con términos globales mayores como Yahvé/Mesías. Sí hay desalineación con la decisión léxica documentada para מִקְּדֹשִׁים: el proyecto quiso evitar una traducción principal demasiado interpretativamente cargada; en español «los santos» carga más que «los santos seres» o mejor «los seres santos».'
  issues:
  - severity: medium
    issue: «Clama» sobretraduce קְרָא
    rationale: El hebreo y el POB inglés prefieren la exhortación más neutra «Call». «Clama» añade un matiz de grito o súplica intensa no exigido por el verbo.
  - severity: high
    issue: «los santos» en el texto principal distorsiona la referencia probable de מִקְּדֹשִׁים
    rationale: En español bíblico e iglesia-lectura, «los santos» se entiende fácilmente como personas santas o creyentes fallecidos. El audit trail inglés evitó justamente esa carga mediante «holy ones» con nota.
  - severity: low
    issue: La nota al pie no presenta con claridad las alternativas léxicas
    rationale: La nota repite «santos» en vez de ofrecer alternativas como «santos» o «seres celestiales/seres santos», y no ayuda a desambiguar el principal problema semántico.
  - severity: low
    issue: «te volverás» es menos idiomático en este contexto
    rationale: Aunque posible, suena algo extraño sin complemento explícito. «te dirigirás» conserva bien el sentido de פנה y mejora la naturalidad.
  revised_spanish_text: 'Llama ahora: ¿acaso hay quien te responda? ¿Y a cuál de los seres santos[a] te dirigirás?'
