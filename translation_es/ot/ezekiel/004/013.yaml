base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/004/013.yaml
  text: And Yahweh said[c][b][a], “Thus the sons of Israel will eat their bread unclean among the nations where I will drive them.”
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'defiled.' The term carries ritual impurity overtones, especially in the context of exile among foreign nations.
    reason: lexical_alternative
  - marker: c
    text: Or 'where I will banish them' or 'where I will scatter them.'
    reason: lexical_alternative
