translation:
  language: es
  text: Y yo cobré ánimo conforme a la ayuda de Yahvé mi Dios, y reuní de Israel a hombres[a] para subir conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 7:28 dice «jefes» o «líderes» en lugar de «hombres». 1 Esdras sigue aquí la redacción griega.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθαρσὴς ἐγενόμην
  english_pob_choice: I took courage
  chosen_spanish: cobré ánimo
  alternatives_spanish:
  - me animé
  - tomé valor
  - me fortalecí
  lexicon: LSJ
  rationale: La expresión griega indica volverse valiente, confiado o animado. «Cobré ánimo» comunica ese fortalecimiento interior con naturalidad en español y evita endurecer el matiz hacia una mera decisión voluntarista.
- source_word: κατὰ τὴν ἀντίλημψιν
  english_pob_choice: according to the help
  chosen_spanish: según la ayuda
  alternatives_spanish:
  - por la ayuda
  - por el apoyo
  - con la ayuda
  lexicon: LSJ
  rationale: ἀντίλημψις tiene el sentido de ayuda, apoyo o asistencia. «Según» conserva el valor de κατὰ y mantiene la relación causal/moduladora sin introducir una paráfrasis más libre.
- source_word: Κυρίου θεοῦ μου
  english_pob_choice: the Lord my God
  chosen_spanish: el Señor, mi Dios
  alternatives_spanish:
  - el Señor mi Dios
  - Yahvé, mi Dios
  lexicon: LSJ
  rationale: El griego dice Κύριος θεός μου; se conserva «el Señor, mi Dios» como equivalente natural y reverente. Aunque el proyecto suele usar «Yahvé» para el nombre divino hebreo, aquí la fuente principal es el griego κύριος y la forma elegida refleja ese testimonio textual.
- source_word: συνήγαγον
  english_pob_choice: I gathered
  chosen_spanish: reuní
  alternatives_spanish:
  - junté
  - congregué
  - asamblea
  lexicon: LSJ
  rationale: El aoristo expresa la acción de reunir personas. «Reuní» es directo, claro y suficientemente formal; evita un matiz excesivamente eclesiástico que no está en el griego.
- source_word: ἐκ τοῦ Ἰσραὴλ
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - de entre los israelitas
  lexicon: LSJ
  rationale: La frase indica el grupo de procedencia. «De Israel» es conciso y fiel, y el contexto aclara que se trata de personas tomadas de entre el pueblo.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  - líderes
  lexicon: LSJ
  rationale: El griego dice literalmente «hombres». Se mantiene ese valor, sin importar desde el paralelo hebreo la lectura «jefes» o «cabezas», porque 1 Esdras sigue aquí el testimonio griego.
- source_word: ὥστε συναναβῆναί μοι
  english_pob_choice: to go up with me
  chosen_spanish: para que subieran conmigo
  alternatives_spanish:
  - para subir conmigo
  - de modo que subieran conmigo
  - para acompañarme en la subida
  lexicon: LSJ
  rationale: La construcción expresa finalidad o resultado. «Para que subieran conmigo» suena natural en español y conserva el idiomatismo de la subida a Jerusalén sin perder la dirección del movimiento.
theological_decisions:
- issue: Relación entre el testimonio griego y el paralelo hebreo sobre los convocados
  english_pob_reading: The Greek reads 'men'; the Hebrew parallel reads 'heads' or 'leaders.'
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - líderes
  - jefes
  - cabezas
  rationale: La lectura principal debe seguir el griego, que es el ancla de 1 Esdras. La opción «hombres» evita importar la formulación del paralelo hebreo, aunque se reconoce que ese paralelo apoya una lectura distinta en la tradición relacionada.
  doctrine_reference: Primacía del texto fuente original; fidelidad al testimonio griego frente a armonización con paralelos.
- issue: Nombre divino en un pasaje donde el griego usa κύριος
  english_pob_reading: the Lord my God
  chosen_spanish_reading: el Señor, mi Dios
  alternative_spanish_readings:
  - Yahvé, mi Dios
  - el Señor mi Dios
  rationale: Aunque el proyecto normalmente usa «Yahvé» para el tetragrámaton, aquí el texto primario es griego y contiene κύριος. Por eso se traduce «el Señor, mi Dios», manteniendo la referencia a Dios sin forzar una retroversión que el griego no exige.
  doctrine_reference: Criterio de fuente primaria; tratamiento contextual del nombre divino en traducción del griego.
translation_notes:
  revision_awareness: El pasaje fue revisado y se mantuvo sin cambios en el último pase de revisión; el consenso de auditoría fue alto, con solo una observación menor sobre la relación entre el griego y el paralelo hebreo en el sustantivo final.
  spanish_consistency_notes:
  - Se conserva un registro formal y readable para iglesia, sin calcos innecesarios.
  - No se introdujo «Yahvé» porque el ancla principal es el griego κύριος, no el hebreo con el nombre divino explícito.
  - Se mantuvo la distinción de género del griego ἄνδρας como «hombres», conforme a la política de fidelidad al texto fuente.
  - «Subieran conmigo» preserva el idiomatismo bíblico de la subida sin endurecerlo en una sintaxis arcaica.
