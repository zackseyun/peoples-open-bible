    rationale: La política del proyecto es contextual, no un reemplazo ciego. Aquí el propio material inglés documenta 'Lord ... God' para אדני ... אלהינו.
  - severity: low
    issue: La nota al pie puede sonar más natural en español
    rationale: '''El hebreo usa formas plurales'' es comprensible, pero ''usa sustantivos en plural'' fluye mejor y refleja con más precisión la observación gramatical.'
