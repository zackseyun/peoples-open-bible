    text: Or traditionally, 'the giants.' The Hebrew term 'Nephilim' is rare and its precise sense is uncertain.
    reason: alternative_reading
  - marker: b
    text: '''Sons of God'' may also be understood as ''divine beings'' or, in some interpretations, human rulers or the godly line of Seth.'
    reason: alternative_reading
  - marker: c
    text: '''Daughters of man'' uses ''man'' in a collective sense, that is, human women.'
    reason: lexical_alternative
