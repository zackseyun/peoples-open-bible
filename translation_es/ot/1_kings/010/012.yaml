  to: El rey hizo de la madera de almug[a] soportes[b] para la casa de Yahvé y para la casa del rey, y cítaras y arpas para los cantores. Nunca antes había llegado madera de almug como esa, ni se ha visto ninguna hasta hoy.
  rationale: Se añadió la nota faltante sobre מִסְעָד para reflejar la incertidumbre léxica preservada en el audit trail inglés. Se mejoró la naturalidad de לֹא בָא כֵן con 'había llegado ... como esa', que comunica mejor la idea de llegada de madera semejante. También se explicitó 'ninguna' en la cláusula final para evitar ambigüedad y conservar el sentido de repetición implícita.
