lexical_decisions:
- source_word: הַבָּאִים
  english_pob_choice: those who came
  chosen_spanish: los que vinieron
  alternatives_spanish:
  - los que venían
  - los que llegaron
  lexicon: HALOT
  rationale: El participio con artículo funciona de modo sustantivo para un grupo definido. En español, «los que vinieron» expresa bien el valor de grupo introducido por la lista sin sonar forzado.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Preposición de acompañamiento directa y natural en español.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: transliteración tradicional española
  rationale: En español bíblico, «Zorobabel» es la forma habitual y reconocible para este nombre; mantiene la referencia propia de la tradición española sin alterar la identidad del personaje.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: transliteración bíblica
  rationale: La forma española «Jesúa» reproduce el nombre postexílico y evita confundirlo con «Josué», siguiendo la distinción documentada en la tradición de Ezra-Nehemías.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azaria
  - Azaríah
  lexicon: transliteración tradicional española
  rationale: «Azarías» es la forma española estándar, plenamente reconocible y fiel al nombre hebreo.
- source_word: רַעַמְיָה
  english_pob_choice: Raamiah
  chosen_spanish: Raamías
  alternatives_spanish:
  - Raamiah
  lexicon: transliteración bíblica
  rationale: Se conserva la forma del MT en Nehemías con adaptación gráfica española; no se armoniza con la variante de Esdras 2:2 en el texto principal.
- source_word: נַחֲמָנִי
  english_pob_choice: Nahamani
  chosen_spanish: Nahamani
  alternatives_spanish:
  - Najamani
  lexicon: transliteración bíblica
  rationale: Nombre propio raro; se mantiene la forma más directa y auditable del texto hebreo.
- source_word: מָרְדֳּכַי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: transliteración tradicional española
  rationale: «Mardoqueo» es la forma española tradicional y establecida del nombre.
- source_word: בִּלְשָׁן
  english_pob_choice: Bilshan
  chosen_spanish: Bilsán
  alternatives_spanish:
  - Bilshan
  lexicon: transliteración bíblica
  rationale: Ajuste gráfico español del nombre propio, manteniendo la forma base hebrea sin añadir interpretación.
- source_word: מִסְפֶּרֶת
  english_pob_choice: Mispereth
  chosen_spanish: Mispéret
  alternatives_spanish:
  - Misperet
  - Mispereth
  lexicon: transliteración bíblica
  rationale: Se conserva el nombre propio del MT en Nehemías, con acentuación española para lectura fluida.
- source_word: בִּגְוַי
  english_pob_choice: Bigvai
  chosen_spanish: Bigvai
  alternatives_spanish:
  - Bigvái
  lexicon: transliteración bíblica
  rationale: Nombre propio preservado sin cambios por ser ya transparente y estable en uso bíblico.
- source_word: נְחוּם
  english_pob_choice: Nehum
  chosen_spanish: Nehum
  alternatives_spanish:
  - Rehum
  lexicon: transliteración bíblica
  rationale: El texto hebreo de Nehemías lee Nehum; se sigue la forma del propio versículo, no la del paralelo de Esdras.
- source_word: בַּעֲנָה
  english_pob_choice: Baanah
  chosen_spanish: Baaná
  alternatives_spanish:
  - Baanah
  lexicon: transliteración bíblica
  rationale: Nombre propio adaptado a ortografía española con acento prosódico natural.
- source_word: מִסְפַּר
  english_pob_choice: The number
  chosen_spanish: El número
  alternatives_spanish:
  - La cifra
  - El total
  lexicon: HALOT
  rationale: Introducción directa del total censal que continúa en el versículo siguiente.
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - los varones de
  - la gente de
  lexicon: HALOT
  rationale: Se conserva el valor masculino explícito de אַנְשֵׁי para no neutralizar el sustantivo; «hombres de» es claro y fiel en español.
- source_word: עַם יִשְׂרָאֵל
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - el pueblo israelita
  - la gente de Israel
  lexicon: HALOT
  rationale: Construcción natural en español para la comunidad nacional designada por el hebreo.
theological_decisions:
- issue: Término masculino explícito en אַנְשֵׁי
  english_pob_reading: the men of the people of Israel
  chosen_spanish_reading: los hombres del pueblo de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - los hombres de Israel
  rationale: Se mantiene el masculino explícito del hebreo sin convertirlo en un colectivo neutro. En este contexto censal, la precisión léxica importa más que la simplificación inclusiva.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Diferencias de nombres con el paralelo de Esdras 2:2
  english_pob_reading: Main text follows MT forms in Nehemiah; footnotes preserve parallel variants
  chosen_spanish_reading: El texto principal sigue las formas del MT en Nehemías; las notas preservan las variantes del paralelo
  alternative_spanish_readings:
  - armonizar con Esdras 2:2 en el texto principal
  - omitir la variante paralela
  rationale: No se borra la tensión documental entre listas paralelas; se respeta el texto de Nehemías y se indica la variante de Esdras en nota.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no produjo cambios; esta redacción conserva las decisiones del pasaje y sigue el texto masorético de Nehemías sin armonizar las variantes paralelas.
  spanish_consistency_notes:
  - Se usó la forma española tradicional de varios nombres propios cuando está bien establecida (Zorobabel, Jesúa, Mardoqueo, Azarías).
  - Se mantuvo «el pueblo de Israel» para la construcción final, pero se preservó «los hombres de» para reflejar el plural masculino del hebreo.
  - Se siguió la puntuación española con dos puntos para introducir la cifra censal en el siguiente versículo.
  - Las notas de variante paralela se mantienen separadas para no fusionar lecturas distintas de Nehemías y Esdras.
