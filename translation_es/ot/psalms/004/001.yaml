translation:
  language: es
  text: 'Para el director del coro: con instrumentos de cuerda[a]. Salmo de David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; la expresión hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director
  - Para el líder musical
  lexicon: HALOT
  rationale: En los encabezamientos de los salmos, el término funciona como una indicación musical dirigida al responsable de la ejecución. «Director del coro» comunica bien esa función en español moderno sin perder el matiz litúrgico y musical.
- source_word: בִּנְגִינוֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con cuerdas
  - con música de cuerda
  - sobre instrumentos de cuerda
  lexicon: HALOT
  rationale: El sustantivo señala música o instrumentos de cuerda. «Con instrumentos de cuerda» es natural en español y conserva la dirección musical sin añadir detalles no expresados en el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Canción
  - Salmo lírico
  lexicon: HALOT
  rationale: En este contexto, el término es una designación de género establecida. «Salmo» es la equivalencia precisa y reconocible en español bíblico.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición hebrea puede indicar autoría, asociación o dedicación. «De David» preserva esa amplitud sin resolver indebidamente la ambigüedad del encabezamiento.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezamiento
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no exige restringir el sentido a autoría directa. «De David» mantiene la tensión documental y tradicional del superscrito, en línea con la decisión auditada del POB inglés.
  doctrine_reference: Preservar la ambigüedad textual y no convertirla en una afirmación histórica más fuerte de la que permite el hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto auditado: no hubo cambios en la revisión más reciente y el criterio inglés mantiene alta concordancia. La versión española sigue esa lectura estable sin introducir interpretaciones nuevas.'
  spanish_consistency_notes:
  - Se conserva el formato de encabezamiento poético-litúrgico del hebreo.
  - «Salmo» se mantiene como término de género, no como paráfrasis.
  - No se usa «Señor» para ningún término divino aquí, pues el versículo no contiene el tetragrámaton.
  - La nota al pie solo acompaña la ambigüedad de לְדָוִד y no se extiende a otros elementos.
