translation:
  language: es
  text: Un sabio avanzará por sus palabras[a], y un hombre prudente agradará a los grandes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Por sus palabras» mantiene el valor instrumental del griego ἐν λόγοις; también podría entenderse «en su habla» o «mediante sus palabras».
    reason: alternative_reading
  - marker: b
    text: O «los grandes», «nobles» o «gobernantes». El griego se refiere de manera amplia a personas socialmente prominentes o poderosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - hombre sabio
  - experto
  lexicon: BDAG
  rationale: En literatura sapiencial, σοφός suele designar sabiduría práctica y discernimiento, no mera erudición. «Sabio» es la equivalencia natural y fiel en español.
- source_word: ἐν λόγοις
  english_pob_choice: by his words
  chosen_spanish: por sus palabras
  alternatives_spanish:
  - en su habla
  - mediante sus palabras
  lexicon: BDAG
  rationale: La preposición ἐν tiene aquí valor instrumental/medio. «Por sus palabras» comunica de forma idiomática que el medio de avance es el habla.
- source_word: προάξει ἑαυτόν
  english_pob_choice: will advance himself
  chosen_spanish: se adelantará
  alternatives_spanish:
  - se promoverá
  - avanzará para sí mismo
  lexicon: BDAG
  rationale: El verbo sugiere avanzar o ponerse delante, con matiz de auto-proyección logrado por el uso de las palabras. En español, «se adelantará» conserva la idea de adelantarse o hacerse lugar sin cargar el texto con una formulación demasiado moderna o negativa.
- source_word: ἄνθρωπος φρόνιμος
  english_pob_choice: a prudent man
  chosen_spanish: un hombre prudente
  alternatives_spanish:
  - un hombre sensato
  - un hombre inteligente
  lexicon: BDAG
  rationale: ἄνθρωπος es singular masculino y se mantiene como «hombre» por fidelidad de género gramatical. φρόνιμος expresa buen juicio práctico; «prudente» es la equivalencia más adecuada en el contexto sapiencial.
- source_word: ἀρέσει
  english_pob_choice: will please
  chosen_spanish: agradará
  alternatives_spanish:
  - encontrará favor
  - será agradable a
  lexicon: BDAG
  rationale: ἀρέσκω significa agradar o ser agradable a alguien. «Agradará» es directo y natural en español para la relación social implícita en el versículo.
- source_word: μεγιστᾶσιν
  english_pob_choice: great men
  chosen_spanish: a los grandes
  alternatives_spanish:
  - a los nobles
  - a los poderosos
  - a los grandes hombres
  lexicon: LSJ
  rationale: μεγιστᾶσιν alude ampliamente a personas prominentes, influyentes o poderosas. «A los grandes» conserva la amplitud del término y evita restringirlo indebidamente a un cargo específico.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de forma alta; no hay revisiones aplicadas ni tensiones textuales especiales. La versión española conserva el paralelismo de dos miembros y la amplitud social de μεγιστᾶσιν sin especificarlo como un oficio concreto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se conserva la distinción sapiencial entre «sabio» y «prudente» para reflejar ambos adjetivos griegos.
  - «A los grandes» reproduce la amplitud social de μεγιστᾶσιν sin introducir «nobles» o «gobernantes» como lectura cerrada.
