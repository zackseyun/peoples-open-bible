translation:
  language: es
  text: Y restauraré la fortuna de Judá y la fortuna de Israel[a], y los reconstruiré como al principio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «restauraré la cautividad» o «haré volver a los cautivos» de Judá y de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁבֹתִי
  english_pob_choice: I will restore
  chosen_spanish: haré volver
  alternatives_spanish:
  - restauraré
  - restituiré
  lexicon: HALOT
  rationale: La forma causativa de שוב expresa hacer regresar o revertir una condición. En español, «haré volver» conserva la idea de retorno y funciona bien con el sustantivo siguiente, sin perder el matiz de restauración general que el contexto desarrolla.
- source_word: שְׁבוּת
  english_pob_choice: fortunes
  chosen_spanish: la cautividad
  alternatives_spanish:
  - la suerte
  - la fortuna
  - el cautiverio
  lexicon: HALOT
  rationale: La POB inglesa preserva en nota la alternativa más literal ligada al exilio. En español, «cautividad» mantiene ese vínculo semántico y evita que «fortunas» suene a prosperidad económica, pero la nota explica que el hebreo también puede entenderse idiomáticamente como restauración de la condición de exilio.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: transliteration standard
  rationale: Nombre propio nacional en español bíblico estándar.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: transliteration standard
  rationale: Nombre propio nacional estándar; aquí aparece en paralelo con Judá para abarcar al pueblo entero.
- source_word: וּבְנִתִים
  english_pob_choice: and I will rebuild them
  chosen_spanish: y los edificaré
  alternatives_spanish:
  - y los reconstruiré
  - y los levantaré
  lexicon: HALOT
  rationale: בנה puede significar 'construir' o 'reconstruir'. Dado que el hebreo no requiere explícitamente el prefijo 're-', «edificaré» conserva la imagen verbal sin sobreespecificar; el contexto de restauración ya comunica la reconstrucción.
- source_word: כְּבָרִאשֹׁנָה
  english_pob_choice: as at the first
  chosen_spanish: como al principio
  alternatives_spanish:
  - como antes
  - como al comienzo
  - como en el primer tiempo
  lexicon: HALOT
  rationale: La expresión apunta a un estado anterior original. «Como al principio» es natural en español y preserva la comparación con el estado inicial, tal como la POB inglesa lo expresa con 'as at the first'.
theological_decisions:
- issue: Alcance de שְׁבוּת en un oráculo de restauración
  english_pob_reading: restore the fortunes
  chosen_spanish_reading: haré volver la cautividad
  alternative_spanish_readings:
  - restauraré la suerte
  - restauraré la fortuna
  - haré volver a los cautivos
  rationale: El versículo promete restauración nacional integral, pero el hebreo conserva una referencia idiomática al exilio/cautiverio. En español, 'cautividad' deja visible esa tensión sin reducir el pasaje a mera prosperidad material. La nota mantiene abierta la lectura idiomática de 'restaurar la cautividad' o 'hacer volver a los cautivos'.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El texto coincide con el testimonio hebreo base y con la solución inglesa auditada: el verbo causativo de שוב se vierte con una expresión natural de retorno/restauración, שְׁבוּת se mantiene con una opción que deja visible la tensión entre cautiverio e idiomática restauración, y בנה conserva su fuerza edificadora en un contexto de reconstrucción. No se registran revisiones posteriores que alteren esta lectura.'
  spanish_consistency_notes:
  - Se usa «Judá» y «Israel» como nombres propios estándar y consistentes con el registro bíblico en español.
  - Se evita «SEÑOR» u այլ sustitución porque el verso no contiene el nombre divino.
  - «Como al principio» mantiene el nivel formal y la comparación temporal del hebreo sin sonar arcaico.
  - La nota del primer segmento preserva la alternativa literal relevante para la transparencia del proyecto.
