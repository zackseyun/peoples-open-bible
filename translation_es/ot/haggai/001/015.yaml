  glossary_alignment: 'No hay términos del glosario mayor en juego. El nombre propio «Darío» está bien. La cuestión principal es la formulación de la datación regnal: conviene usar un español idiomático que preserve el título real explícito, p. ej. «del rey Darío», en línea con la racionalidad documentada por el POB.'
