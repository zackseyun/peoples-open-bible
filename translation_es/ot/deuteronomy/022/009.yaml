review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura básica del mandato y en varias elecciones léxicas clave: ''No sembrarás'', ''tu viña'', ''dos clases de semilla'' y la cláusula final sobre la semilla y el producto de la viña. Sin embargo, no preserva bien la decisión auditada del POB para תִּקְדַּשׁ, que en este contexto legal se entendió como consecuencia punitiva/jurídica (''be forfeited'') y no como una santificación positiva. Además, ''la plenitud'' no representa con claridad הַמְלֵאָה en español bíblico-natural; el sentido es el rendimiento total o la cosecha entera.'
  spanish_quality_summary: 'El español actual del borrador suena forzado y ambiguo: ''se haga [a] sagrada la plenitud'' es poco natural y puede sugerir una idea devocional equivocada. También la colocación del marcador [a] interrumpe la sintaxis. Una redacción como ''no sea que se pierda toda la cosecha'' o ''quede vedado todo el rendimiento'' comunica mejor el efecto legal. ''Producto'' o ''cosecha'' funciona mejor que ''plenitud''.'
  glossary_alignment: 'No hay conflictos con términos de alto nivel como Yahvé/Mesías, pero sí hay desalineación con la rationale documentada para תִּקְדַּשׁ: el proyecto inglés eligió evitar ''be holy/consecrated'' en el texto principal. En español conviene seguir esa decisión y preservar la alternativa literal en nota. ''Viña'' es aceptable para כַּרְמְךָ; ''dos clases de semilla'' está bien para כִּלְאָיִם.'
  issues:
  - severity: high
    issue: תִּקְדַּשׁ se vertió como 'se haga sagrada' en el texto principal
    rationale: La auditoría inglesa documenta que aquí el sentido principal es una consecuencia legal de pérdida/forfeitura, no una santificación positiva. En español, 'se haga sagrada' induce una lectura errónea.
  - severity: high
    issue: הַמְלֵאָה se tradujo como 'la plenitud'
    rationale: '''La plenitud'' no suena natural en este contexto agrícola y no comunica claramente ''el rendimiento total / la cosecha entera''.'
  - severity: medium
    issue: La sintaxis de la cláusula de consecuencia es torpe
    rationale: La secuencia 'no sea que se haga [a] sagrada la plenitud, la semilla...' resulta poco clara. El hebreo enumera los elementos afectados del rendimiento; el español necesita una estructura más fluida.
  - severity: low
    issue: El marcador de nota está colocado de manera poco natural
    rationale: Conviene anclar la nota al verbo o expresión relevante sin romper la lectura.
  revised_spanish_text: 'No sembrarás tu viña con dos clases de semilla, no sea que se pierda[a] toda la cosecha: la semilla que siembres y el producto de la viña.'
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «sea consagrada» o «se haga santa»; es decir, quede apartada del uso ordinario.
    reason: lexical_alternative
  revision_rationale: Se ajusta תִּקְדַּשׁ al sentido legal documentado por el POB ('se pierda' como consecuencia de quedar vedado/forfeitado), mientras la nota conserva la alternativa más literal de consagración. Se reemplaza 'la plenitud' por 'toda la cosecha' para reflejar הַמְלֵאָה con español natural y claro. También se mejora la fluidez de la enumeración final sin apartarse del sentido fuente.
