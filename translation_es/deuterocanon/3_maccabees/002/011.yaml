translation:
  language: es
  text: Pues incluso cuando con frecuencia nuestros padres[a] fueron afligidos, tú les ayudaste en su humillación y los rescataste de grandes males[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice «nuestros padres».
    reason: lexical_alternative
  - marker: b
    text: O «de grandes calamidades» o «de grandes desgracias». El griego κακά aquí probablemente se refiere a circunstancias gravemente dañinas más que al mal moral en sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ δὲ
  english_pob_choice: For even
  chosen_spanish: Pues aun cuando
  alternatives_spanish:
  - porque incluso
  - y aun cuando
  - pues incluso
  lexicon: LSJ
  rationale: La construcción introduce un fundamento explicativo con énfasis. «Pues aun cuando» conserva el valor causal/discursivo y el matiz de refuerzo de «For even» sin sonar rígido en español.
- source_word: πλεονάκις
  english_pob_choice: often
  chosen_spanish: con frecuencia
  alternatives_spanish:
  - muchas veces
  - repetidamente
  - a menudo
  lexicon: LSJ
  rationale: El adverbio expresa repetición. «Con frecuencia» es natural en español contemporáneo y mantiene la idea de recurrencia.
- source_word: θλιβέντων
  english_pob_choice: were afflicted
  chosen_spanish: fueron afligidos
  alternatives_spanish:
  - fueron oprimidos
  - fueron atribulados
  - fueron acosados
  lexicon: BDAG
  rationale: El participio pasivo denota haber sido puestos bajo presión o sufrimiento. «Afligidos» preserva el tono elevado del texto y el campo semántico de padecimiento general.
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: LSJ
  rationale: El griego dice literalmente «de nuestros padres», y la forma masculina plural se conserva en español. Se evita neutralizar a «antepasados» sin necesidad textual.
- source_word: ἐβοήθησας αὐτοῖς
  english_pob_choice: you helped them
  chosen_spanish: tú les ayudaste
  alternatives_spanish:
  - tú acudiste en su ayuda
  - tú les socorriste
  lexicon: BDAG
  rationale: βοηθέω significa ayudar o acudir en auxilio. «Les ayudaste» es directo y fiel al verbo simple del original.
- source_word: ἐν τῇ ταπεινώσει
  english_pob_choice: in their humiliation
  chosen_spanish: en su humillación
  alternatives_spanish:
  - en su bajeza
  - en su abatimiento
  - en su aflicción
  lexicon: BDAG
  rationale: ταπείνωσις puede indicar humillación, abatimiento o condición humilde. «Humillación» conserva la idea de haber sido rebajados, y evita confundir este término con θλιβέντων.
- source_word: ἐρρύσω
  english_pob_choice: rescued
  chosen_spanish: los rescataste
  alternatives_spanish:
  - los libraste
  - los salvaste
  lexicon: BDAG
  rationale: ῥύομαι implica rescatar o liberar de un peligro. «Rescataste» comunica con viveza la acción liberadora sin cargar de inmediato una lectura soteriológica más amplia.
- source_word: ἐκ μεγάλων κακῶν
  english_pob_choice: from great evils
  chosen_spanish: de grandes males
  alternatives_spanish:
  - de grandes calamidades
  - de grandes desgracias
  - de grandes males y tribulaciones
  lexicon: LSJ
  rationale: κακά puede abarcar males, desgracias o calamidades. «Males» sigue de cerca el griego y, en este contexto histórico, permite entenderse como graves circunstancias dañinas más que como mal moral abstracto.
theological_decisions:
- issue: Lenguaje ancestral masculino
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El griego usa πατέρων, un plural masculino explícito. Se mantiene esa forma en la traducción principal, siguiendo la política de precisión de género cuando el texto así lo indica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de κακά en un relato de liberación histórica
  english_pob_reading: great evils
  chosen_spanish_reading: grandes males
  alternative_spanish_readings:
  - grandes calamidades
  - grandes desgracias
  rationale: Aquí κακά no exige una lectura de maldad moral; puede referirse a daños severos, desgracias o calamidades. «Males» conserva la forma lexical cercana al griego y deja abierta la interpretación contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el pasaje se mantiene estable. Se conserva la misma lectura de fondo del audit trail inglés, con ajustes naturales para un español público y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular («tú») conforme al griego y al inglés auditado.
  - Se conserva la distinción entre «afligidos» y «humillación», evitando fusionar ambos matices en una sola palabra.
  - Se traduce el final con «males» para mantener la cercanía formal al griego κακά, tal como el inglés preserva «evils» con nota aclaratoria.
