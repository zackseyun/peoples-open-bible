- from: 'Y de los shilonitas[a]: Asaías, el primogénito, y sus hijos.'
  to: 'Y de los silonitas[a]: Asaías, el primogénito, y sus hijos varones.'
  rationale: Se ajusta el gentilicio a una forma más natural en español («silonitas») manteniendo la alternativa tradicional en nota, y se precisa בָנָיו como «sus hijos varones» para conservar la fuerza específica de «sons» del hebreo.
