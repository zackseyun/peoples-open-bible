translation:
  language: es
  text: Los levitas rodearán al rey por todos lados[a], cada uno con sus armas en la mano; y cualquiera que entre en la casa será condenado a muerte. Estén con el rey cuando entre y cuando salga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo»; el hebreo dice «la casa», una designación común del templo en Crónicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקִּיפוּ
  english_pob_choice: shall surround
  chosen_spanish: rodearán
  alternatives_spanish:
  - deben rodear
  - han de rodear
  lexicon: HALOT
  rationale: El verbo en hiphil expresa una acción de cercar/rodear con fuerza de instrucción. En español, «rodearán» transmite bien el mandato con un futuro deóntico natural y digno, sin endurecerlo con una perífrasis demasiado pesada.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levítes
  lexicon: HALOT
  rationale: Designación cultual e identitaria directa. «Levitas» es la forma normal y clara en español bíblico moderno.
- source_word: סָבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: La idea es de cerco completo. «Por todos lados» conserva el valor intensivo e idiomático del hebreo sin sonar arcaico.
- source_word: אִישׁ וְכֵלָיו בְּיָדוֹ
  english_pob_choice: each man with his weapons in his hand
  chosen_spanish: cada uno con sus armas en la mano
  alternatives_spanish:
  - cada hombre con sus armas en la mano
  - cada uno con su arma en la mano
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente; por eso «cada uno» es natural. כֵלָיו aquí se entiende como equipo/armas defensivas; «armas» recoge el sentido colectivo. «En la mano» mantiene la imagen concreta del hebreo.
- source_word: וְהַבָּא אֶל הַבַּיִת
  english_pob_choice: whoever enters the house
  chosen_spanish: cualquiera que entre en la casa
  alternatives_spanish:
  - el que entre en la casa
  - quien entre en la casa
  lexicon: HALOT
  rationale: El participio con artículo tiene valor genérico. «Cualquiera que entre» expresa bien la universalidad jurídica de la advertencia.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal «casa», como en el texto hebreo. Aunque en Crónicas puede referirse al templo, la lectura básica es suficientemente fiel aquí; la alternativa se documenta como posibilidad contextual.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será ejecutado
  - será puesto a muerte
  lexicon: HALOT
  rationale: El hophal expresa pasiva de ejecución. En español, «será muerto» reproduce la sobriedad legal del original y evita ampliar el matiz más allá de la amenaza formulada.
- source_word: וִהְי֥וּ אֶת הַמֶּלֶךְ
  english_pob_choice: Be with the king
  chosen_spanish: Estén con el rey
  alternatives_spanish:
  - Permanezcan con el rey
  - Sean con el rey
  lexicon: HALOT
  rationale: El hebreo expresa presencia acompañante. «Estén con el rey» conserva la cercanía del original y su tono imperativo plural.
- source_word: בְּבֹאוֹ וּבְצֵאתוֹ
  english_pob_choice: when he comes in and when he goes out
  chosen_spanish: cuando entre y cuando salga
  alternatives_spanish:
  - en su entrada y en su salida
  - cuando venga y cuando salga
  lexicon: HALOT
  rationale: La expresión hebrea es un par idiomático de movimientos/actividad. La versión española mantiene el paralelismo con un giro natural y fiel.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se preserva la advertencia legal con el futuro deóntico y la pasiva de ejecución, y se mantiene «la casa» en el texto principal porque el inglés POB también retuvo la literalidad con nota contextual sobre el posible referente al templo. La frase final se alinea con la revisión más reciente del inglés («Be with the king») mediante «Estén con el rey».
  spanish_consistency_notes:
  - Se usó «los levitas» para el grupo sacerdotal/levítico, de manera consistente con la terminología bíblica estándar en español.
  - Se mantuvo «la casa» en el cuerpo del verso y se añadió nota para la alternativa contextual «el templo», siguiendo el criterio fuente-cercano del POB.
  - «Será muerto» conserva la fuerza legal del hebreo sin introducir una perífrasis interpretativa excesiva.
