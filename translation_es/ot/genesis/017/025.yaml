lexical_decisions:
- source_word: וְיִשְׁמָעֵאל
  english_pob_choice: And Ishmael
  chosen_spanish: Y Ismael
  alternatives_spanish:
  - Ahora Ismael
  lexicon: HALOT
  rationale: La conjunción ו se conserva como continuidad narrativa simple con «Y», sin añadir matices que el hebreo no exige. El nombre propio se translitera como «Ismael».
- source_word: בְּנ֔וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina singular se expresa de modo natural en español con «su hijo», manteniendo la referencia a Abraham sin recargar la frase.
- source_word: בֶּן שְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: was thirteen years old
  chosen_spanish: tenía trece años
  alternatives_spanish:
  - era de trece años
  - era un hijo de trece años
  lexicon: HALOT
  rationale: La expresión hebrea de edad se vierte con una formulación idiomática en español. «Tenía trece años» comunica con claridad el valor temporal sin perder el sentido del original.
- source_word: בְּהִמֹּל/וֹ
  english_pob_choice: when ... was circumcised
  chosen_spanish: cuando fue circuncidado
  alternatives_spanish:
  - cuando se circuncidó
  - al ser circuncidado
  lexicon: HALOT
  rationale: El infinitivo con ב y sufijo tiene sentido temporal; el nifal de מול se refleja bien con pasiva española. Se mantiene el sujeto personal («fue circuncidado») conforme al hebreo y al ajuste revisado del inglés POB.
- source_word: אֵת בְּשַׂר עָרְלָתוֹ
  english_pob_choice: the flesh of his foreskin
  chosen_spanish: en la carne de su prepucio
  alternatives_spanish:
  - la carne de su prepucio
  - el prepucio de su carne
  lexicon: HALOT
  rationale: El hebreo usa un objeto concreto y enfático. En español, «prepucio» comunica con precisión el término anatómico; «en la carne de» conserva el matiz de ámbito o respectividad que la revisión inglesa intentó preservar sin hacer la frase antinatural.
theological_decisions:
- issue: Cómo expresar la relación entre el sujeto personal y el complemento corporal en la cláusula de la circuncisión
  english_pob_reading: when the flesh of his foreskin was circumcised
  chosen_spanish_reading: cuando fue circuncidado en la carne de su prepucio
  alternative_spanish_readings:
  - cuando la carne de su prepucio fue circuncidada
  - cuando fue circuncidado en su prepucio
  rationale: El hebreo conserva a Ismael como referente de la acción mediante el sufijo del infinitivo, y el objeto directo específico mediante אֵת + sustantivo corporal. La formulación elegida evita convertir la parte del cuerpo en sujeto lógico de la pasiva y mantiene la tensión formal del original sin oscurecer el sentido narrativo.
  doctrine_reference: Génesis 17:25; práctica de la circuncisión del pacto en el contexto abrahámico
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés que reestructuró la cláusula de la circuncisión para reflejar con mayor claridad el hebreo. En español se evita la construcción menos natural «circuncidado en la carne de su prepucio» como calco rígido, pero se conserva la relación formal entre el sujeto y el complemento corporal con una preposición locativa/respectiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - Se usa «circuncidado» y no un circunloquio como «recibió la circuncisión», para no diluir el verbo del hebreo.
  - «Prepucio» se conserva por precisión anatómica y por fidelidad al léxico pactal del pasaje.
