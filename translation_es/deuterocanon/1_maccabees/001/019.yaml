translation:
  language: es
  text: Y tomaron las ciudades fortificadas en la tierra de Egipto; y él tomó el botín de la tierra de Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατελάβοντο
  english_pob_choice: captured
  chosen_spanish: tomaron
  alternatives_spanish:
  - capturaron
  - se apoderaron de
  - ocuparon
  lexicon: LSJ
  rationale: En este contexto militar, el verbo griego indica tomar control de plazas por la fuerza. «Tomaron» conserva la simplicidad verbal del original y permite mantener el cambio de sujeto plural sin añadir una connotación más técnica de la que exige el griego. «Capturaron» también sería posible, pero «tomaron» aquí encaja bien con el paralelismo del versículo.
- source_word: πόλεις
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - ciudadelas
  lexicon: LSJ
  rationale: El sentido ordinario es «ciudades»; no hay indicio suficiente para rebajar o especificar a «poblaciones» o «ciudadelas».
- source_word: ὀχυράς
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - fuertes
  - bien defendidas
  - amuralladas
  lexicon: LSJ
  rationale: El adjetivo describe ciudades con defensa sólida. «Fortificadas» reproduce de forma natural y precisa la idea de plazas reforzadas militarmente.
- source_word: γῇ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  lexicon: LSJ
  rationale: «En la tierra de Egipto» sigue de cerca la construcción griega y suena natural en español bíblico contemporáneo. «País» o «territorio» serían posibles, pero menos cercanos al registro de la frase.
- source_word: ἔλαβεν
  english_pob_choice: he took
  chosen_spanish: él tomó
  alternatives_spanish:
  - él se llevó
  - él se apoderó de
  lexicon: LSJ
  rationale: La forma singular debe conservarse porque el griego cambia del plural al singular. «Él tomó» mantiene esa transición sin sobreexplicar el referente.
- source_word: σκῦλα
  english_pob_choice: the plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - los despojos
  - el saqueo
  lexicon: LSJ
  rationale: El sustantivo denota las cosas arrebatadas en guerra. «Botín» es el equivalente más natural en español y preserva el valor bélico del término; «despojo(s)» también sería posible, pero suena menos idiomático aquí.
theological_decisions:
- issue: 'Cambio de número verbal: plural en la primera cláusula y singular en la segunda'
  english_pob_reading: Preserve the grammatical shift in English
  chosen_spanish_reading: Conservar el plural «tomaron» y el singular «él tomó»
  alternative_spanish_readings:
  - 'Nivelar ambas cláusulas en plural: «y tomaron ... y tomaron»'
  - 'Nivelar ambas cláusulas en singular: «y tomó ... y tomó»'
  rationale: El griego pasa de κατελάβοντο (plural) a ἔλαβεν (singular). Mantener esa variación en español preserva la transparencia del testimonio y evita borrar la distinción entre la acción conjunta de capturar ciudades y la acción singular atribuida al rey al tomar el botín.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa auditada no introduce notas ni revisiones textuales; el pasaje fue aprobado sin cambios en la última pasada de revisión, con acuerdo alto. La presente propuesta sigue esa lectura y conserva la oscilación de número del griego.
  spanish_consistency_notes:
  - Se mantiene «tierra de Egipto» para seguir la construcción del griego y la decisión inglesa auditada.
  - No se usa «Señor» ni terminología teológica especial, porque el versículo no la contiene.
  - «Botín» se usa en sentido militar y no como equivalente de «spoils» con matiz honorífico.
