translation:
  language: es
  text: 'Y él dijo[a]: «Tú sabes que el reino era mío, y que todo Israel había puesto los ojos en mí para reinar; pero el reino cambió de rumbo y vino a ser de mi hermano, porque era suyo de parte de Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «todo Israel había puesto sus rostros sobre mí». El modismo hebreo expresa dirección, expectativa o intención.
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque le vino de Yahvé». El hebreo afirma procedencia y asignación divina sin usar explícitamente un verbo de dar.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: HALOT
  rationale: En este contexto de sucesión real, ‘reino’ es la forma más natural en español y comunica tanto el dominio como la condición real. ‘Realeza’ o ‘reinado’ son posibles, pero suenan más abstractos o menos directos para la escena.
- source_word: וְעָלַי שָׂמוּ כָל־יִשְׂרָאֵל פְּנֵיהֶם
  english_pob_choice: all Israel had set their faces on me
  chosen_spanish: todo Israel había puesto sus rostros sobre mí
  alternatives_spanish:
  - todo Israel había fijado su mirada en mí
  - todo Israel me había tenido en mira para reinar
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de ‘poner el rostro sobre’ porque el POB inglés también preserva la idiomaticidad literal. En español, ‘pusieron sus rostros sobre mí’ mantiene el valor figurado de intención/dirección, aunque suene marcado; por eso se ofrecen alternativas más naturales en nota.
- source_word: לִמְלֹךְ
  english_pob_choice: to reign
  chosen_spanish: para reinar
  alternatives_spanish:
  - para convertirse en rey
  - para gobernar como rey
  lexicon: HALOT
  rationale: ‘Reinar’ es el equivalente directo y conciso del infinitivo de מלך en este contexto. Evita añadir explicaciones que no están en el hebreo.
- source_word: וַתִּסֹּב
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - cambió de curso
  - dio un giro
  lexicon: HALOT
  rationale: ‘Se volvió’ conserva la imagen de giro o cambio de dirección del reino, como en el inglés ‘turned’, sin interpretar mecánicamente el mecanismo del cambio sucesorio.
- source_word: וַתְּהִי לְאָחִי
  english_pob_choice: became my brother’s
  chosen_spanish: vino a ser de mi hermano
  alternatives_spanish:
  - pasó a mi hermano
  - llegó a ser de mi hermano
  lexicon: HALOT
  rationale: La construcción con לְ expresa pertenencia o transferencia. ‘Vino a ser de mi hermano’ mantiene el movimiento del cambio de posesión sin imponer una formulación más interpretativa como ‘perteneció’.
- source_word: כִּי מֵיְהוָה הָיְתָה לּוֹ
  english_pob_choice: for it was his from Yahweh
  chosen_spanish: porque de Yahvé era para él
  alternatives_spanish:
  - porque de Yahvé le era
  - porque le vino de Yahvé
  lexicon: HALOT
  rationale: La cláusula final conserva la fuente divina con ‘de Yahvé’ y la dirección a su favor con ‘era para él’. Se evita añadir ‘dio’ o ‘entregó’, porque el hebreo afirma procedencia/relación de pertenencia más que el acto verbal de dar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino revelado, conforme al estándar del proyecto, en lugar de sustituirlo por un título. ‘Yahvé’ es el término base en español para preservar la referencia directa al Tetragrámaton.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi hermano carnal
  - mi hermano de sangre
  lexicon: HALOT
  rationale: Es el término de parentesco directo y suficiente en español. El contexto identifica a Salomón como el hermano de Adonías, sin necesidad de especificación adicional.
theological_decisions:
- issue: Cómo expresar la pertenencia divina en la cláusula final
  english_pob_reading: for it was his from Yahweh
  chosen_spanish_reading: porque de Yahvé era para él
  alternative_spanish_readings:
  - porque le vino de Yahvé
  - porque Yahvé se lo dio
  rationale: El hebreo no usa aquí un verbo explícito de dar; afirma que el reino ‘era’ para él ‘desde/de parte de Yahvé’. La traducción elegida conserva esa relación de procedencia y asignación divina sin intensificarla indebidamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Uso del nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La edición POB renderiza el Tetragrámaton con el nombre propio divino para evitar el reemplazo tradicional por una titulación. Esto mantiene visible el dato del texto fuente y la teología del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con la fuente y sin cambios necesarios en la pasada más reciente; esta propuesta mantiene esa línea, conservando la imagen idiomática hebrea y la afirmación teológica final sobre la procedencia del reino desde Yahvé.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conserva ‘reino’ en lugar de ‘realeza’ o ‘reinado’ para mantener la escena de sucesión.
  - Se mantiene el modismo semiliteral ‘poner sus rostros sobre mí’ en el texto principal, con alternativa más idiomática en nota.
  - ‘Mi hermano’ se deja sin especificación adicional porque el contexto inmediato ya identifica la relación familiar.
