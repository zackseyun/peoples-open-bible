translation:
  language: es
  text: 'Pero él, queriendo justificarse, dijo a Jesús: «¿Y quién es mi prójimo[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Y quién cuenta como mi prójimo?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλων
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo decir
  lexicon: BDAG
  rationale: El participio presente expresa la intención o motivación del hombre; «queriendo» conserva ese valor aspectual y suena natural en español sin añadir interpretación extra.
- source_word: δικαιῶσαι
  english_pob_choice: to justify
  chosen_spanish: justificarse
  alternatives_spanish:
  - declararse en lo correcto
  - vindicar(se)
  lexicon: BDAG
  rationale: En este contexto el verbo indica intentar presentarse como justo o en lo correcto. «Justificarse» mantiene el vínculo léxico con δικαιόω y conserva la tensión narrativa sin convertirlo en un tecnicismo doctrinal ajeno al pasaje.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - se
  - él mismo
  lexicon: BDAG
  rationale: El reflexivo griego apunta al mismo sujeto; en español, «a sí mismo» explicita la referencia y encaja bien con el infinitivo pronominal «justificarse».
- source_word: εἶπεν πρὸς τὸν Ἰησοῦν
  english_pob_choice: said to Jesus
  chosen_spanish: dijo a Jesús
  alternatives_spanish:
  - habló a Jesús
  - le dijo a Jesús
  lexicon: BDAG
  rationale: Fórmula narrativa directa y sobria. «Jesús» sigue la convención habitual para Ἰησοῦς en español.
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: La conjunción introduce la réplica inmediata; «Y» reproduce el flujo discursivo de manera natural en español.
- source_word: τίς ἐστίν μου πλησίον
  english_pob_choice: who is my neighbor
  chosen_spanish: ¿quién es mi prójimo?
  alternatives_spanish:
  - ¿quién cuenta como mi prójimo?
  - ¿quién es mi vecino?
  lexicon: BDAG
  rationale: «Prójimo» es el equivalente bíblico estable de πλησίον en este contexto intertextual con la ley; preserva el sentido relacional y evita reducirlo al valor geográfico de «vecino».
theological_decisions:
- issue: Sentido de δικαιῶσαι ἑαυτόν en el intercambio narrativo
  english_pob_reading: The man's attempt to justify himself, i.e., to show himself to be in the right.
  chosen_spanish_reading: El hombre intenta justificarse a sí mismo, es decir, presentarse como estando en lo correcto.
  alternative_spanish_readings:
  - intentar vindicarse
  - buscar excusarse
  rationale: El pasaje no introduce aquí una tesis paulina técnica sobre la justificación; describe una maniobra retórica en una conversación legal-ética. «Justificarse a sí mismo» conserva la ironía del relato y el valor lexical de δικαιόω sin sobrecargarlo doctrinalmente.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión previa indicó conformidad alta y ningún cambio necesario en el contenido base; en esta versión se corrige la ancladura de notas, eliminando la nota no anclada para que el registro sea validable.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio estándar.
  - Se evitó «SEÑOR» porque aquí no aparece κύριος ni una cita del nombre divino.
  - «Prójimo» preserva el término bíblico tradicional y la relación con el contexto legal de la pregunta.
  - Se usó una estructura española natural sin suavizar la tensión de autojustificación presente en el griego.
