translation:
  language: es
  text: y el blandir[a] de espadas, y escuadrones de caballería desplegados, y ataques y contraataques de ambos bandos, y el movimiento de los escudos, y masas de lanzas, y el lanzamiento de proyectiles, y el resplandor de ornamentos de oro, y toda clase de armadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego puede sugerir el acto de blandir, sacar o desenvainar las espadas; aquí se traduce «el blandir» para conservar la acción dinámica en este catálogo militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαχαιρῶν σπασμούς
  english_pob_choice: the brandishing of swords
  chosen_spanish: los brandidos de espadas
  alternatives_spanish:
  - el blandido de espadas
  - el ondear de espadas
  - la espada alzada
  lexicon: LSJ
  rationale: σπασμός expresa una acción de sacar, tirar o brandir; en este catálogo bélico, «brandidos» conserva la fuerza dinámica sin convertirlo en un simple brillo visual. Se evita una traducción demasiado explicativa o demasiado literal.
- source_word: ἴλας ἵππων διατεταγμένας
  english_pob_choice: squadrons of cavalry drawn up
  chosen_spanish: escuadrones de caballería desplegados
  alternatives_spanish:
  - tropas de caballería ordenadas
  - compañías de jinetes formadas
  lexicon: LSJ
  rationale: ἴλη designa una unidad de caballería; «escuadrones» transmite bien esa idea militar en español. «Desplegados» refleja διατεταγμένας como ordenados para la batalla.
- source_word: προσβολὰς γινομένας
  english_pob_choice: attacks
  chosen_spanish: ataques
  alternatives_spanish:
  - asalto
  - embestidas
  lexicon: LSJ
  rationale: προσβολή en contexto militar es un ataque o asalto. «Ataques» es claro y fiel, sin estrechar innecesariamente el sentido.
- source_word: καταδρομὰς ἑκατέρων
  english_pob_choice: counterattacks by both sides
  chosen_spanish: contraataques de ambos bandos
  alternatives_spanish:
  - irrupciones de ambos lados
  - arremetidas de cada lado
  lexicon: LSJ
  rationale: καταδρομή puede ser incursión, arremetida o contraataque. Dado el paralelo con προσβολάς y el modificador ἑκατέρων, «contraataques de ambos bandos» preserva la reciprocidad militar.
- source_word: ἀσπίδων κινήσεις
  english_pob_choice: the movement of shields
  chosen_spanish: el movimiento de los escudos
  alternatives_spanish:
  - el sacudir de los escudos
  - el blandeo de los escudos
  lexicon: LSJ
  rationale: κίνησις es movimiento; «de los escudos» sigue el plural genitivo griego y mantiene la imagen general de maniobra en combate sin sobreespecificar.
- source_word: καμάτων πλήθη
  english_pob_choice: masses of spears
  chosen_spanish: masas de lanzas
  alternatives_spanish:
  - multitudes de venablos
  - montones de armas de asta
  lexicon: LSJ
  rationale: El término transmitido καμάτων es difícil en este contexto. La tradición auditada en inglés opta por «spears» para dar sentido militar coherente; «lanzas» reproduce esa decisión en español sin fingir certeza absoluta sobre el matiz exacto.
- source_word: βελῶν βολάς
  english_pob_choice: the shooting of missiles
  chosen_spanish: el lanzamiento de proyectiles
  alternatives_spanish:
  - la lluvia de dardos
  - el disparo de flechas
  lexicon: LSJ
  rationale: βέλος y βολή permiten un sentido general de proyectil/tiro. «Proyectiles» conserva la amplitud del griego mejor que reducirlo a flechas o dardos.
- source_word: χρυσέων κόσμων ἐκλάμψεις
  english_pob_choice: the gleaming of golden ornaments
  chosen_spanish: el resplandor de ornamentos de oro
  alternatives_spanish:
  - el brillo de adornos de oro
  - los destellos de adornos dorados
  lexicon: LSJ
  rationale: κόσμος puede ser adorno, ornamento o equipamiento decorativo; con χρυσέων y ἐκλάμψεις, «resplandor» y «ornamentos de oro» reproducen el fulgor ornamental sin cargarlo de interpretación adicional.
- source_word: παντοίους θωρακισμούς
  english_pob_choice: all kinds of armor
  chosen_spanish: toda clase de armadura
  alternatives_spanish:
  - toda variedad de armamento defensivo
  - toda suerte de corazas
  lexicon: LSJ
  rationale: θωρακισμός se relaciona con armadura o protección del torso. «Toda clase de armadura» sigue de cerca el valor general y mantiene el paralelismo con la lista de objetos bélicos.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió «brandishing of swords» frente a «flashing of swords» para captar mejor σπασμούς. También conserva la solución de sentido para καμάτων como una referencia militar difícil, sin suavizar la tensión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «caballería» para ἵππων en sentido metonímico de fuerza montada, coherente con el audit trail inglés.
  - Se conserva un registro bélico enumerativo y paralelo, evitando añadir conectores explicativos que no están en el griego.
  - Se usa «armadura» en sentido amplio, no necesariamente solo una coraza individual, para respetar el carácter genérico de θωρακισμούς.
