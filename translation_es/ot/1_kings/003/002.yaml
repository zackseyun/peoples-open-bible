    rationale: La redacción es fiel al hebreo, pero en español puede sentirse opaca sin nota. La solución adecuada no es cambiar a «templo» en el texto principal, sino añadir la nota lexical alternativa ya justificada por la auditoría.
  revised_spanish_text: Solo el pueblo sacrificaba en los lugares altos, porque todavía no se había construido una casa[a] para el nombre de Yahvé en aquellos días.
