id: GEN.35.8
reference: Genesis 35:8
source:
  edition: WLC
  text: וַ/תָּ֤מָת דְּבֹרָה֙ מֵינֶ֣קֶת רִבְקָ֔ה וַ/תִּקָּבֵ֛ר מִ/תַּ֥חַת לְ/בֵֽית אֵ֖ל תַּ֣חַת הָֽ/אַלּ֑וֹן וַ/יִּקְרָ֥א שְׁמ֖/וֹ אַלּ֥וֹן בָּכֽוּת־׃פ
translation:
  text: And Deborah[a], Rebekah’s nurse, died, and she was buried below Bethel, under the oak[b]. So he called its name Allon-bacuth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Allon-bacuth likely means 'Oak of Weeping'; alternatively, if אַלּוֹן is taken as 'terebinth,' 'Terebinth of Weeping.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew tree term אַלּוֹן may refer to an oak or a terebinth; the exact species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵינֶקֶת
  chosen: nurse
  alternatives:
  - wet nurse
  - nursing woman
  lexicon: HALOT
  rationale: The noun denotes a woman who nurses and cares for a child. 'Nurse' is natural modern English and fits the likely role of Rebekah’s longtime nurse; 'wet nurse' is possible but more specific than the context requires.
- source_word: מִתַּחַת לְבֵית־אֵל
  chosen: below Bethel
  alternatives:
  - from under Bethel
  - south of Bethel
  lexicon: HALOT
  rationale: The preposition with תַּחַת here is idiomatic for a location lower than or beneath a place. 'Below Bethel' preserves the spatial sense without overinterpreting as a compass direction.
- source_word: תַּחַת הָאַלּוֹן
  chosen: under the oak
  alternatives:
  - beneath the oak
  - under the terebinth
  lexicon: HALOT
  rationale: תַּחַת means 'under/beneath.' אַלּוֹן can refer to a large tree, often rendered 'oak' or sometimes 'terebinth.' 'Oak' is the traditional and likely sense here; the lexical alternative is preserved in a footnote because the species identification is not certain.
- source_word: וַיִּקְרָא שְׁמוֹ
  chosen: So its name was called
  alternatives:
  - and he called its name
  - and one called its name
  lexicon: HALOT
  rationale: The Hebrew has a 3ms verb with a 3ms suffix, but the subject is left implicit. English commonly uses a passive here to avoid supplying an uncertain subject while preserving the naming formula. The suffix most naturally refers to the tree/site just mentioned, hence 'its name.'
- source_word: אַלּוֹן בָּכוּת
  chosen: Allon-bacuth
  alternatives:
  - Oak of Weeping
  - Terebinth of Weeping
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated in the main text. Because the meaning is transparent and interpretively useful, the gloss is preserved in a footnote.
- source_word: וַתִּקָּבֵר
  chosen: she was buried
  alternatives:
  - and they buried her
  lexicon: HALOT
  rationale: The verb is Niphal, naturally rendered as passive/reflexive in English. 'She was buried' matches the form without introducing an explicit subject.
- source_word: וַתָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb simply means 'died.' 'Passed away' would soften the directness of the Hebrew beyond what the source warrants.
