translation:
  language: es
  text: Al séptimo día examinará la lesión, y si la lesión se ha extendido en la ropa, o en la urdimbre, o en la trama[a], o en el cuero, en cualquier objeto hecho de cuero para uso, la lesión es una enfermedad cutánea[b] destructiva; es impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tejido transversal».
    reason: lexical_alternative
  - marker: b
    text: Hebreo tsaraʿat, tradicionalmente vertido «lepra», pero en Levítico el término abarca una condición ritual más amplia y puede aplicarse también a ropa y cuero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: he shall examine
  chosen_spanish: examinará
  alternatives_spanish:
  - verá
  - inspeccionará
  lexicon: HALOT
  rationale: En contexto sacerdotal de diagnóstico ritual, ראה no es solo ‘ver’, sino realizar una revisión formal. ‘Examinará’ comunica mejor la acción procedimental que ‘verá’ y es natural en español.
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la lesión
  alternatives_spanish:
  - la infección
  - la plaga
  - la afección
  lexicon: HALOT
  rationale: נגַע en Levítico 13 designa una marca o afección que se evalúa ritualmente. ‘Lesión’ evita tanto la carga médica moderna de ‘infección’ como el peso tradicional ambiguo de ‘plaga’, y funciona también para ropa y cuero.
- source_word: פָשָׂה
  english_pob_choice: has spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha crecido
  - se ha propagado
  lexicon: HALOT
  rationale: El verbo expresa propagación o extensión. ‘Se ha extendido’ reproduce bien esa idea en español bíblico contemporáneo.
- source_word: בֶּגֶד
  english_pob_choice: garment
  chosen_spanish: la ropa
  alternatives_spanish:
  - la prenda
  - el vestido
  lexicon: HALOT
  rationale: Aunque ‘prenda’ o ‘vestido’ también serían posibles, ‘ropa’ es más amplio y natural en español para una pieza textil susceptible de contaminarse.
- source_word: שְׁתִי
  english_pob_choice: warp
  chosen_spanish: la urdimbre
  alternatives_spanish:
  - el urdimbre
  - los hilos de urdimbre
  lexicon: HALOT
  rationale: ‘Urdimbre’ es el equivalente técnico estándar en español para los hilos longitudinales del tejido y conserva la precisión del término hebreo.
- source_word: עֵרֶב
  english_pob_choice: woof
  chosen_spanish: la trama
  alternatives_spanish:
  - la trama transversal
  - la weft
  lexicon: HALOT
  rationale: ‘Trama’ es el par técnico natural de ‘urdimbre’ en español y expresa la hebra transversal. Mantiene el contraste textil que el hebreo presupone.
- source_word: עוֹר
  english_pob_choice: leather
  chosen_spanish: el cuero
  alternatives_spanish:
  - el pellejo
  - la piel
  lexicon: HALOT
  rationale: En este contexto de material trabajado, ‘cuero’ es la opción más clara y natural en español. Evita ‘piel’, que puede sonar más general o anatómica.
- source_word: לְכֹל אֲשֶׁר יֵעָשֶׂה הָעוֹר לִמְלָאכָה
  english_pob_choice: in anything for which leather is made for work
  chosen_spanish: en cualquier cosa para la cual se hace el cuero para trabajo
  alternatives_spanish:
  - en cualquier artículo hecho de cuero
  - para cualquier uso en que se haga cuero
  lexicon: HALOT
  rationale: He mantenido una estructura cercana al hebreo para conservar el alcance legal de la cláusula. ‘Para la cual se hace el cuero para trabajo’ refleja el uso funcional y amplio, aunque suene más formal.
- source_word: צָרַעַת
  english_pob_choice: skin disease
  chosen_spanish: una sarna
  alternatives_spanish:
  - una enfermedad cutánea
  - una afección de la piel
  lexicon: HALOT
  rationale: La tradición léxica de la POB evita ‘lepra’ como término médico estrecho. En español, ‘sarna’ comunica una afección contagiosa y marcada sin reducirla a una categoría moderna inadecuada; se mantiene el carácter técnico-ritual del término hebreo.
- source_word: מַמְאֶרֶת
  english_pob_choice: destructive
  chosen_spanish: destructiva
  alternatives_spanish:
  - corrosiva
  - maligna
  - devoradora
  lexicon: HALOT
  rationale: El adjetivo apunta a una cualidad dañina o consumidora. ‘Destructiva’ conserva ese sentido activo de deterioro y es transparente en español.
- source_word: טָמֵא הוּא
  english_pob_choice: it is unclean
  chosen_spanish: es impura
  alternatives_spanish:
  - está impura
  - es ritualmente impura
  lexicon: HALOT
  rationale: El hebreo establece un estado de impureza ritual. ‘Impura’ es conciso y natural; el contexto levítico deja claro que no es una valoración moral sino cultual.
theological_decisions:
- issue: Alcance de צָרַעַת aplicado a ropa y cuero
  english_pob_reading: skin disease
  chosen_spanish_reading: sarna
  alternative_spanish_readings:
  - lepra
  - enfermedad de la piel
  - afección impura
  rationale: Como el pasaje aplica el término a materiales no humanos, conviene evitar ‘lepra’ como diagnóstico médico moderno. ‘Sarna’ funciona aquí como término de afección visible y contaminante, manteniendo la amplitud ritual del hebreo sin medicalizarlo indebidamente.
  doctrine_reference: Principio de primacía del texto original; distinción entre categoría ritual bíblica y diagnóstico médico moderno.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó la cláusula final de leather para reflejar más de cerca el hebreo (‘made for work’). La redacción española conserva ese alcance con una estructura formal equivalente: ‘para la cual se hace el cuero para trabajo’. También se mantuvo la decisión auditada de no traducir צָרַעַת como ‘lepra’, respetando la amplitud ritual del término.'
  spanish_consistency_notes:
  - Se preservó la terminología técnica de tejido con ‘urdimbre’ y ‘trama’, paralela a warp/woof.
  - Se evitó ‘SEÑOR’ u otras sustituciones porque el versículo no contiene el Tetragrámaton.
  - ‘Impura’ traduce טָמֵא en sentido ritual, coherente con el contexto levítico.
  - 'La estructura del cierre mantiene la fuerza clasificatoria del hebreo: una lesión de tipo צָרַעַת y estado impuro.'
