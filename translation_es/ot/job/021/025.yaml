    rationale: Aunque es cercano al hebreo, en español suena forzado. «Con amargura en el alma» conserva la referencia interior de נֶפֶשׁ y la cualidad afectiva de מָרָה con mejor legibilidad.
  - severity: medium
    issue: «del bien» suena demasiado abstracto tras «ha disfrutado»
    rationale: בַּטּוֹבָה aquí apunta a participar de lo bueno de la vida. «De lo bueno» mantiene la amplitud semántica y suena más natural que «del bien» en español actual.
