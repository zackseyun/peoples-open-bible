translation:
  language: es
  text: El que hiere a un hombre de modo que muere, ciertamente será puesto a muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «El que hiere a un hombre y muere, ciertamente será puesto a muerte»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכֵּה
  english_pob_choice: strikes
  chosen_spanish: hiere
  alternatives_spanish:
  - golpea
  - da un golpe a
  - ataca
  lexicon: HALOT
  rationale: 'El hebreo participial introduce un caso legal: «el que hiere». En español, «hiere» conserva el valor causal de causar daño corporal y funciona con naturalidad en una fórmula jurídica. «Golpea» sería más literal en forma, pero puede sonar demasiado débil frente al contexto penal; «ataca» sugiere intención que el texto no explicita.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: HALOT
  rationale: En este contexto legal, אִישׁ designa a un varón o, más ampliamente, a un individuo humano; el audit trail inglés conservó «a man». En español, «hombre» mantiene esa correspondencia sin neutralizar innecesariamente el término.
- source_word: וָמֵת
  english_pob_choice: so that he dies
  chosen_spanish: y éste muere
  alternatives_spanish:
  - de modo que muere
  - y muere
  - con el resultado de que muere
  lexicon: HALOT
  rationale: La construcción conjuntiva más el perfecto expresa resultado. «Y éste muere» mantiene la relación consecuencia-de-acción de manera breve y natural; el demostrativo «éste» evita ambigüedad de referencia en español.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente será condenado a muerte
  alternatives_spanish:
  - sin duda morirá
  - será muerto
  - debe ser ejecutado
  lexicon: HALOT
  rationale: La forma infinitivo absoluto + imperfecto intensifica una sentencia legal de muerte. «Ciertamente será condenado a muerte» preserva el peso jurídico y la certeza del castigo sin recurrir a una expresión menos idiomática o más interpretativa como «ejecutado».
- source_word: מַכֵּה אִישׁ וָמֵת מוֹת יוּמָת
  english_pob_choice: Whoever strikes a man so that he dies shall surely be put to death.
  chosen_spanish: El que hiere a un hombre y éste muere, ciertamente será condenado a muerte.
  alternatives_spanish:
  - Quien golpea a un hombre y éste muere, ciertamente será condenado a muerte.
  - El que golpee a un hombre y muera, ciertamente morirá.
  lexicon: HALOT
  rationale: La apertura «El que» reproduce bien la casuística legal del hebreo. La formulación completa evita añadir elementos ajenos al texto y conserva la estructura condicional de ley sin mecanicismo excesivo.
translation_notes:
  revision_awareness: El texto inglés final mantiene la lectura casuística «Whoever strikes... so that he dies» y su nota formal alternativa; no hay revisiones recientes que alteren el sentido base. La versión española sigue esa misma decisión, conservando la consecuencia explícita y el lenguaje jurídico de sentencia de muerte.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto cuando el contexto lo requiera; aquí el versículo no contiene el nombre divino.
  - Se mantiene el registro jurídico sobrio y directo, evitando paráfrasis explicativas.
  - «Condenado a muerte» se eligió para reflejar la fuerza legal del hebreo sin desplazar el sentido a un matiz exclusivamente forense moderno.
