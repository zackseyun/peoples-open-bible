translation:
  language: es
  text: 'Jeroboam dijo a su esposa: «Por favor, levántate y disfrázate, para que no sepan[a] que eres la esposa de Jeroboam, y ve a Silo. He aquí, allí está Ahías el profeta; él es quien habló acerca de mí[b], que yo sería rey sobre este pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y no sabrán»; el hebreo deja indefinido el sujeto.
    reason: lexical_alternative
  - marker: b
    text: O, «ser rey sobre este pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se rinde naturalmente con 'dijo' en español; es la opción más directa y pública para el relato.
- source_word: לְאִשְׁתּוֹ
  english_pob_choice: to his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  lexicon: HALOT
  rationale: El posesivo indica con claridad la relación conyugal; 'esposa' mantiene el valor relacional sin sonar áspero en español.
- source_word: קוּמִי נָא
  english_pob_choice: Please arise
  chosen_spanish: Por favor, levántate
  alternatives_spanish:
  - Por favor, alzate
  - Levántate, por favor
  lexicon: HALOT
  rationale: El imperativo con נָא expresa ruego/cortesía; 'por favor' reproduce bien ese matiz, y 'levántate' es un equivalente idiomático claro en español.
- source_word: וְהִשְׁתַּנִּית
  english_pob_choice: disguise yourself
  chosen_spanish: disfrázate
  alternatives_spanish:
  - cámbiate la apariencia
  - hazte irreconocible
  lexicon: HALOT
  rationale: El hitpael de שנה aquí indica alterar la apariencia para no ser reconocida; 'disfrázate' comunica bien esa acción concreta y evita una paráfrasis excesiva.
- source_word: וְלֹא יֵדְעוּ
  english_pob_choice: so that they will not know
  chosen_spanish: para que no sepan
  alternatives_spanish:
  - y no sabrán
  - para que no lo sepan
  lexicon: HALOT
  rationale: El hebreo expresa finalidad/resultados; en español, 'para que no sepan' conserva el sentido y respeta el sujeto indefinido del original sin explicitarlo indebidamente.
- source_word: כִּי אַתְּ אֵשֶׁת יָרָבְעָם
  english_pob_choice: that you are the wife of Jeroboam
  chosen_spanish: que eres la esposa de Jeroboam
  alternatives_spanish:
  - que eres la mujer de Jeroboam
  - que eres la esposa de Jeroboam
  lexicon: HALOT
  rationale: La construcción identifica a la mujer por su relación con Jeroboam; 'esposa' es preciso y natural, y conserva el valor identificador del hebreo.
- source_word: וְהָלַכְתְּ שִׁלֹה
  english_pob_choice: and go to Shiloh
  chosen_spanish: y ve a Silo
  alternatives_spanish:
  - y ve a Shiló
  - y irás a Silo
  lexicon: HALOT
  rationale: El verbo tiene fuerza directiva en contexto; 've' funciona como mandato natural en español, y 'Silo' sigue la forma castellana usual del topónimo.
- source_word: הִנֵּה שָׁם
  english_pob_choice: Behold, ... is there
  chosen_spanish: Mira, allí está
  alternatives_spanish:
  - He aquí, allí está
  - Mira, está allí
  lexicon: HALOT
  rationale: הִנֵּה llama la atención. 'Mira' mantiene la deíxis de forma clara y digna en español contemporáneo.
- source_word: אֲחִיָּה הַנָּבִיא
  english_pob_choice: Ahijah the prophet
  chosen_spanish: Ahías el profeta
  alternatives_spanish:
  - Ahías, el profeta
  lexicon: HALOT
  rationale: Nombre transliterado; el título se traduce de manera directa y reconocible.
- source_word: הוּא דִבֶּר
  english_pob_choice: he is the one who spoke
  chosen_spanish: él fue quien habló
  alternatives_spanish:
  - él habló
  - él es quien habló
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; 'él fue quien habló' preserva ese énfasis de forma natural en español.
- source_word: עָלַי
  english_pob_choice: concerning me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - concerning me
  - sobre mí
  lexicon: HALOT
  rationale: Con דבר, על tiene el valor de 'acerca de/con respecto a'. 'Acerca de mí' es claro y no añade matices ajenos.
- source_word: לְמֶלֶךְ
  english_pob_choice: that I would be king
  chosen_spanish: diciendo que yo sería rey
  alternatives_spanish:
  - diciendo que yo llegaría a ser rey
  - diciendo que sería rey
  lexicon: HALOT
  rationale: El lamed marca resultado/estatus; en español, integrar la idea con 'sería rey' transmite de forma natural la promesa de entronización sin forzar la estructura.
- source_word: עַל הָעָם הַזֶּה
  english_pob_choice: over this people
  chosen_spanish: sobre este pueblo
  alternatives_spanish:
  - sobre este pueblo
  - sobre esta gente
  lexicon: HALOT
  rationale: '''Pueblo'' conserva el singular colectivo del hebreo עָם y el registro bíblico apropiado.'
theological_decisions:
- issue: El verbo de mandato y la cortesía de la petición
  english_pob_reading: Please arise and disguise yourself
  chosen_spanish_reading: Por favor, levántate y disfrázate
  alternative_spanish_readings:
  - Levántate, por favor, y disfrázate
  - Por favor, alzate y cámbiate la apariencia
  rationale: No hay carga doctrinal, pero sí un matiz de tono. 'Por favor' conserva la entreaty del נָא sin volver el texto coloquial en exceso.
  doctrine_reference: N/A
- issue: Sujeto indefinido en 'y no sepan'
  english_pob_reading: they will not know
  chosen_spanish_reading: para que no sepan
  alternative_spanish_readings:
  - para que no lo sepan
  - para que nadie lo sepa
  rationale: Se preserva la ambigüedad del hebreo sin especificar indebidamente un sujeto o convertirlo en una generalización distinta.
  doctrine_reference: N/A
- issue: Valor profético de la cláusula final
  english_pob_reading: that I would be king over this people
  chosen_spanish_reading: diciendo que yo sería rey sobre este pueblo
  alternative_spanish_readings:
  - diciendo que yo llegaría a ser rey sobre este pueblo
  - diciendo que habría de ser rey sobre este pueblo
  rationale: La frase refleja una profecía respecto al reinado de Jeroboam sin añadir interpretaciones teológicas adicionales; se mantiene el sentido declarativo del oráculo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó el registro a un tono más formal y acercó varias expresiones al hebreo: ''arise'', ''Behold'' y la cláusula final sobre el reinado. Por eso la versión española evita un coloquialismo excesivo, conserva la fuerza directiva del original y mantiene la referencia profética final con una estructura explícita.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada del Tetragrámaton cuando aparezca; aquí no aparece.
  - Se mantiene 'esposa' y no 'mujer' por la relación conyugal explícita.
  - '''Silo'' sigue la forma castellana usual del topónimo.'
  - '''pueblo'' conserva el singular colectivo de עָם.'
  - No se introduce 'Cristo' ni otras terminologías no presentes en el versículo.
