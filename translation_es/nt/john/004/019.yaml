review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: «La mujer le dijo … veo que tú eres un profeta». Mantiene correctamente el pasado narrativo para λέγει, el dativo «le», y el reconocimiento perceptivo de θεωρῶ con «veo». También conserva la indefinición de προφήτης con «un profeta». El único problema de alineación relevante está en la nota: la alternativa indicada repite «Señor» en vez de ofrecer la alternativa contextual equivalente a «Sir», que en español sería mejor «señor» o «usted, señor» según redacción; además, el anclaje «Señor[a]» queda bien, pero la nota debe expresar con claridad que la alternativa es un tratamiento respetuoso, no repetir la lectura principal.'
  spanish_quality_summary: 'El texto principal es natural, claro y de registro eclesial legible. «La mujer le dijo: «Señor[a], veo que tú eres un profeta»» suena bien en español moderno. El pronombre «tú» es aceptable para reflejar el énfasis de σύ, aunque no imprescindible; no produce torpeza. La principal falla de calidad está en la redacción de la nota y en la documentación interna, donde hay confusión y repetición de «Señor».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριε se mantiene como «Señor» en el texto principal, con alternativa en nota, conforme al criterio POB para κύριος. No hay conflicto con Yahvé/Mesías/u otros términos sensibles. Se recomienda corregir la nota para que preserve de verdad la alternativa contextual de cortesía.'
  issues:
  - severity: medium
    issue: La nota al pie no preserva correctamente la alternativa a «Señor».
    rationale: El inglés dice «Or “Sir.”». La nota española actual dice «O «Señor»», que repite la lectura principal y no comunica la alternativa interpretativa de trato respetuoso.
  - severity: low
    issue: La documentación teológica/lexical interna contiene formulaciones confusas sobre la alternativa de κύριε.
    rationale: Aparecen expresiones como «Señor[a]» y una glosa desordenada en las decisiones teológicas. No afecta directamente el texto bíblico, pero conviene normalizar la explicación.
  revised_spanish_text: 'La mujer le dijo: «Señor[a], veo que tú eres un profeta».'
  revised_footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede ser una forma respetuosa de dirigirse a alguien, además de «Señor».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel, natural y conforme al criterio terminológico del proyecto. Solo se corrige la nota para que preserve de manera real la alternativa contextual de cortesía presente en el inglés auditado y en el valor semántico de κύριε.
