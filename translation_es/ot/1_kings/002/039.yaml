translation:
  language: es
  text: 'Entonces, al cabo de tres años, dos esclavos[a] de Simei huyeron a Aquis, hijo de Maaca, rey de Gat. Y le informaron a Simei, diciendo: «Mira, tus esclavos están en Gat».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavos» traduce עֲבָדִים / עֲבָדֶיךָ con su fuerza de dependencia vinculada a un amo; otras versiones podrían suavizarlo como «siervos», pero aquí la huida hace relevante el estatus servil.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ שָׁלֹשׁ שָׁנִים
  english_pob_choice: at the end of three years
  chosen_spanish: al cabo de tres años
  alternatives_spanish:
  - después de tres años
  - al término de tres años
  lexicon: HALOT
  rationale: La construcción señala el punto final de un período de tres años. «Al cabo de» conserva ese cierre temporal sin sonar tan calcado como «al final de».},{
- source_word: וַיִּבְרְחוּ
  english_pob_choice: ran away
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: HALOT
  rationale: ברח expresa huida. «Huyeron» es natural en español bíblico moderno y mantiene la idea de fuga del dominio de su amo.
- source_word: שְׁנֵי עֲבָדִים / עֲבָדֶיךָ
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: El contexto destaca su condición vinculada a un amo y su huida; por eso «esclavos» conserva la fuerza lexical que el POB inglés documentó para עבד cuando el estatus servil es prominente.
- source_word: לְשִׁמְעִי
  english_pob_choice: to Shimei
  chosen_spanish: a Simei
  alternatives_spanish:
  - para Simei
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del aviso. «A Simei» es la forma natural en español.
- source_word: אֶל אָכִישׁ
  english_pob_choice: to Achish
  chosen_spanish: a Aquis
  alternatives_spanish:
  - junto a Aquis
  lexicon: HALOT
  rationale: La expresión marca movimiento hacia una persona; «a Aquis» sigue el valor direccional del hebreo.
- source_word: בֶּן מַעֲכָה
  english_pob_choice: son of Maacah
  chosen_spanish: hijo de Maaca
  lexicon: HALOT
  rationale: Es la traducción estándar del patronímico, manteniendo los nombres propios transliterados de modo consistente.
- source_word: מֶלֶךְ גַּת
  english_pob_choice: king of Gath
  chosen_spanish: rey de Gat
  lexicon: HALOT
  rationale: La cadena constructa identifica el cargo y el territorio. «Rey de Gat» es la forma directa y fiel en español.
- source_word: וַיַּגִּידוּ לְשִׁמְעִי לֵאמֹר
  english_pob_choice: And they told Shimei, saying
  chosen_spanish: Y le avisaron a Simei, diciendo
  alternatives_spanish:
  - Y le informaron a Simei, diciendo
  - Y dijeron a Simei
  lexicon: HALOT
  rationale: El verbo הגיד suele introducir un informe o noticia. «Avisaron» comunica bien el tono narrativo de una noticia reportada; se conserva «diciendo» para introducir el discurso directo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Ve
  lexicon: HALOT
  rationale: Es una partícula deíctica de atención. «Mira» preserva la inmediatez sin la solemnidad arcaica de «He aquí».
- source_word: בְּגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en la ciudad de Gat
  lexicon: HALOT
  rationale: La preposición locativa indica presencia en la ciudad; «en Gat» es la opción más directa y natural.
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que sustituyó «slaves» por «servants», pero la restauración posterior volvió a «slaves» por coherencia con la política léxica y la prominencia contextual del estatus de dependencia. La presente versión española sigue esa decisión restaurada y la expresa con «esclavos».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - 'Se usaron transliteraciones consistentes: Simei, Aquis, Maaca y Gat.'
  - Se evitó «he aquí» para הִנֵּה por preferencia de español contemporáneo claro.
  - La puntuación y el orden siguen un español narrativo natural sin añadir contenido interpretativo.
