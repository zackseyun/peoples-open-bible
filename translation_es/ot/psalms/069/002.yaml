    rationale: Aunque calca el inglés «O God», en español actual de registro bíblico suena menos natural y algo afectado. El hebreo solo marca vocativo directo; «Dios» con coma preserva fielmente el sentido sin añadir matiz no necesario.
  - severity: low
    issue: Redacción de la nota con «garganta/cuello»
    rationale: La barra es comprensible, pero «la garganta o el cuello» lee mejor en español corrido y mantiene la misma información léxica.
