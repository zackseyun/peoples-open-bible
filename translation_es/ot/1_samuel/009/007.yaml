base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/007.yaml
  text: Then Saul said to his young man[a], “But look, if we go, what will we bring to the man? For the bread is gone from our bags, and there is no gift to bring to the man of God[b]. What do we have?”
  footnotes:
  - marker: a
    text: Or 'the bread is spent from our vessels/containers.' The Hebrew uses 'bread' concretely and 'vessels' for the containers holding their provisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'present' for 'gift.' The Hebrew term refers to something brought to a respected person.
    reason: lexical_alternative
