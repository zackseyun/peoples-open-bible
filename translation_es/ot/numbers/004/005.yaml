translation:
  language: es
  text: Cuando el campamento se ponga en marcha, Aarón y sus hijos vendrán y quitarán el velo de la cortina, y cubrirán con él el arca del testimonio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el arca del pacto». Sin embargo, el hebreo aquí dice «testimonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: shall come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrá
  - deberán venir
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto tiene sujeto compuesto (‘Aarón y sus hijos’) y sentido colectivo. En español, ‘vendrán’ conserva el valor futuro/instructivo natural y evita una construcción forzada en singular.
- source_word: בִּנְסֹעַ הַמַּחֲנֶה
  english_pob_choice: When the camp sets out
  chosen_spanish: Cuando el campamento se ponga en marcha
  alternatives_spanish:
  - Cuando el campamento salga
  - al levantarse el campamento
  - cuando el campamento viaje
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se expresa bien con ‘cuando’. ‘Se ponga en marcha’ comunica de modo natural el inicio del desplazamiento del campamento sin perder la idea de partida.
- source_word: וְהוֹרִדוּ
  english_pob_choice: take down
  chosen_spanish: bajarán
  alternatives_spanish:
  - quitarán
  - descolgarán
  - retirarán
  lexicon: HALOT
  rationale: En el contexto de desmontar el santuario, ‘bajarán’ refleja la acción de descender/descolgar la cortina. Es más concreto que ‘retirarán’ y más idiomático que una traducción demasiado mecánica.
- source_word: פָּרֹכֶת
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  - cortinaje
  lexicon: HALOT
  rationale: ‘Velo’ preserva el valor cultual específico que el POB en inglés mantuvo con ‘veil’. Evita la pérdida de especificidad que tendría ‘cortina’ en español.
- source_word: הַמָּסָךְ
  english_pob_choice: of the screen
  chosen_spanish: del cortinaje
  alternatives_spanish:
  - de la pantalla
  - de la cortina
  - del resguardo
  lexicon: HALOT
  rationale: Para mantener el paralelismo del hebreo פָּרֹכֶת הַמָּסָךְ sin sonar artificial, ‘cortinaje’ funciona como un sustantivo español que refleja la idea de una cobertura/biombo textil. Se evita ‘pantalla’, que sería engañoso en español moderno.
- source_word: וְכִסּוּ בָהּ
  english_pob_choice: and cover ... with it
  chosen_spanish: y cubrirán con él
  alternatives_spanish:
  - y lo cubrirán con ella
  - y lo envolverán con ella
  - y lo taparán con ella
  lexicon: HALOT
  rationale: ‘Cubrirán’ corresponde directamente a כסה. Se usa ‘con él’ porque el referente inmediato en español es ‘velo’/‘velo del cortinaje’, aunque el antecedente hebreo es femenino; la elección prioriza la claridad anafórica en español sin perder el sentido instrumental.
- source_word: אֲרֹן הָעֵדֻת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio o del testimonio/registro
  lexicon: HALOT
  rationale: Se conserva ‘testimonio’ para seguir el hebreo עֵדוּת y no reemplazarlo por la fórmula tradicional ‘pacto’, como lo hizo el POB inglés. ‘Arca del testimonio’ es transparente y fiel al original.
theological_decisions:
- issue: Término tradicional para אֲרֹן הָעֵדֻת
  english_pob_reading: the ark of the testimony; footnote notes the more traditional 'ark of the covenant'
  chosen_spanish_reading: el arca del testimonio
  alternative_spanish_readings:
  - el arca del pacto
  - el arca del convenio
  rationale: El hebreo dice ‘testimonio’ (עֵדוּת), no ‘pacto’ (בְּרִית). Por eso se evita importar la denominación tradicional más conocida cuando difiere del término fuente. La nota conserva la tensión con la lectura tradicional.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre la tradición de traducción)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: no se siguen mecánicamente las formas inglesas, sino que se trasladan sus decisiones clave al español con control del hebreo. No se detectaron revisiones posteriores que alteraran el sentido base; el pasaje permanece estable.'
  spanish_consistency_notes:
  - Se mantiene ‘Aarón’ y no ‘Aaron’ por convención española.
  - ‘Arca del testimonio’ conserva la terminología del original frente a la fórmula tradicional ‘arca del pacto’.
  - Se eligió un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - El pronombre ‘él’ en ‘con él’ sigue la cohesión natural del español; la referencia funcional es al velo/cortinaje como conjunto textil.
