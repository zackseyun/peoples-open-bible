review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Simón denuncia la existencia de grandes sumas privadas depositadas en Jerusalén y afirma que no eran bienes del templo sino del rey Seleuco. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y naturalidad: (1) «los tesoros de Jerusalén» traduce γαζοφυλακίοις de forma poco precisa, porque en español sugiere riquezas más que depósitos o tesorerías; (2) «no compartidos con el templo» es posible, pero suena menos natural en español que una formulación que preserve mejor la idea de no pertenencia o no conexión con el templo. También sobra la duplicación de nota a/b sobre la misma frase.'
  spanish_quality_summary: El español es generalmente claro, pero presenta cierta rigidez léxica. «Decenas de millares» y «fondos privados» son aceptables, aunque algo administrativos; «tesorerías» mejora bastante la legibilidad frente a «tesoros». La nota [a] ya cubre la alternativa de «intereses/asuntos/causa», por lo que el anclaje [b] en «intereses» resulta redundante e innecesario. La frase revisada gana fluidez y mantiene un registro digno y eclesialmente legible.
  glossary_alignment: No hay términos de glosario mayor implicados como Yahvé/Mesías/Espíritu. La decisión sobre χρημάτων como «fondos» es admisible. La distinción teológica/lexical entre fondos privados y propiedad del templo se conserva y debe mantenerse con claridad.
  issues:
  - severity: medium
    issue: «los tesoros de Jerusalén» para γαζοφυλακίοις
    rationale: El griego se refiere a repositorios o tesorerías, no a «tesoros» como objetos de riqueza. «Tesorerías de Jerusalén» o «cámaras del tesoro en Jerusalén» es más fiel e idiomático.
  - severity: medium
    issue: «no compartidos con el templo» suena poco natural en español
    rationale: Aunque refleja una alternativa posible, en el texto principal español conviene una formulación más clara como «que no pertenecían al templo» o «no vinculados al templo». Esto preserva la distinción central entre depósitos privados y propiedad del templo.
  - severity: low
    issue: Redundancia de notas [a] y [b] sobre la misma expresión
    rationale: La nota [a] ya recoge las alternativas para τοῖς τοῦ βασιλέως πράγμασιν. Mantener además [b] anclada en «intereses» repite información sin aportar claridad.
