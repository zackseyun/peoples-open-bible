translation:
  language: es
  text: No me deja recuperar el aliento[a], porque me llena de amargura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No me deja recobrar el aliento»; literalmente: «No me da restaurar mi aliento/espíritu».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me llena de cosas amargas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְּנֵנִי
  english_pob_choice: does not let me
  chosen_spanish: No me deja
  alternatives_spanish:
  - No me permite
  - No me da
  lexicon: HALOT
  rationale: 'נתן con este infinitivo es idiomático: expresa permiso o dejación, no un acto de dar literal. En español, «no me deja» conserva la fuerza causal sin volverse rígido.'
- source_word: הָשֵׁב רוּחִי
  english_pob_choice: catch my breath
  chosen_spanish: recuperar el aliento
  alternatives_spanish:
  - volver a respirar
  - recobrar mi espíritu
  - restaurar mi aliento
  lexicon: HALOT
  rationale: La construcción con שוב en causativo más רוּחַ apunta aquí a poder respirar de nuevo o recobrarse, no a una restauración espiritual. «Recuperar el aliento» reproduce bien el valor idiomático en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: HALOT
  rationale: Aquí introduce la causa de la afirmación anterior. En español, «porque» expresa de manera natural esa relación causal en un registro poético claro.
- source_word: יַשְׂבִּיעַנִי
  english_pob_choice: fills me
  chosen_spanish: me sacia
  alternatives_spanish:
  - me llena
  - me colma
  - me satisface
  lexicon: HALOT
  rationale: El hiphil de שבע tiene el sentido de llenar/satisfacer. En contexto negativo, «me sacia» conserva la idea de ser colmado por algo opresivo, y permite enlazar directamente con el complemento siguiente.
- source_word: מַמְּרֹרִים
  english_pob_choice: with bitterness
  chosen_spanish: de amarguras
  alternatives_spanish:
  - con amargura
  - de cosas amargas
  - de amarguras amargas
  lexicon: HALOT
  rationale: El plural nominal puede referirse a cosas o experiencias amargas. «De amarguras» suena natural en español y retiene el carácter acumulativo y concreto del plural hebreo, sin reducirlo solo a un estado abstracto.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo y con el sentido auditado en la POB inglesa: una queja poética sobre la imposibilidad de tomar aliento y la experiencia de ser colmado de amargura. No se requieren revisiones respecto del pase inglés revisado más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque el hebreo aquí no contiene el tetragrámaton.
  - Se preserva el paralelismo entre la imposibilidad de respirar y la plenitud de amargura, evitando suavizar el tono de queja.
  - «Aliento» se usa para reflejar רוּחַ sin decidir prematuramente entre «espíritu» y «viento»; el contexto favorece respiración/aliento.
