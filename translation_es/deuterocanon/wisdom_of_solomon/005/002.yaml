translation:
  language: es
  text: Cuando lo vean[a], se turbarán con un temor terrible y quedarán asombrados ante lo inesperado de su salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «viendo, se turbarán con temor terrible, y quedarán asombrados ante lo inesperado de la salvación». Los pronombres «lo» y «su» se deducen del contexto del justo en el versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: When they see him
  chosen_spanish: Al verlo
  alternatives_spanish:
  - Cuando lo vean
  - Después de verlo
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción temporal anterior o concomitante; en español, «Al verlo» reproduce con naturalidad esa relación. El objeto implícito se recupera del contexto inmediato y se expresa como pronombre átono para evitar una elipsis demasiado abrupta.
- source_word: ταραχθήσονται
  english_pob_choice: they will be shaken
  chosen_spanish: se turbarán
  alternatives_spanish:
  - serán sacudidos
  - se conmoverán
  lexicon: LSJ
  rationale: El pasivo futuro de ταράσσω indica agitación interior. «Se turbarán» conserva esa inquietud fuerte en un español natural; «serán sacudidos» sonaría más físico y menos idiomático en este contexto.
- source_word: φόβῳ δεινῷ
  english_pob_choice: with dreadful fear
  chosen_spanish: con un temor terrible
  alternatives_spanish:
  - por un temor terrible
  - con un miedo terrible
  lexicon: LSJ
  rationale: La dativa expresa modo o causa de la turbación. «Temor terrible» mantiene el peso enfático de δεινός sin caer en un registro forzado; «miedo» es posible, pero «temor» preserva mejor el tono bíblico y la solemnidad.
- source_word: ἐκστήσονται
  english_pob_choice: they will be astonished
  chosen_spanish: quedarán asombrados
  alternatives_spanish:
  - se quedarán fuera de sí
  - se maravillarán
  lexicon: LSJ
  rationale: El futuro medio de ἐξίστημι aquí denota asombro intenso. «Quedarán asombrados» comunica bien el impacto emocional; evita una expresión demasiado idiomática como «fuera de sí», que podría sugerir pérdida de control más fuerte de lo que el griego exige.
- source_word: ἐπὶ τῷ παραδόξῳ
  english_pob_choice: at the unexpectedness
  chosen_spanish: por lo insólito
  alternatives_spanish:
  - ante lo inesperado
  - por lo inesperado
  lexicon: LSJ
  rationale: El adjetivo sustantivado παράδοξος funciona como «lo insólito / inesperado». «Por lo insólito» conserva ese valor sustantivado y sugiere la causa del asombro. Se evita una paráfrasis más larga que diluya la condensación del griego.
- source_word: τῆς σωτηρίας
  english_pob_choice: of his salvation
  chosen_spanish: de su salvación
  alternatives_spanish:
  - de la salvación
  - de su liberación
  lexicon: LSJ
  rationale: σωτηρία puede ser «salvación» o «liberación». Se mantiene «salvación» por el registro teológico de Sabiduría. El posesivo «su» se conserva porque el referente se deduce del contexto inmediato y el español lo requiere para una referencia clara.
theological_decisions:
- issue: Referente implícito del justo en el versículo anterior
  english_pob_reading: 'Explicitly render the object and possessive as referring to the righteous man: ''see him'' and ''his salvation.'''
  chosen_spanish_reading: Expresar el objeto como «lo» y el posesivo como «su» para referirlos al justo del contexto previo.
  alternative_spanish_readings:
  - Al verlo, se turbarán... por lo insólito de la salvación
  - Al ver al justo, se turbarán... por lo insólito de la salvación
  rationale: El griego omite el objeto y el posesivo porque el contexto los suministra. En español, conviene hacer explícita la referencia pronominal; no se añade contenido doctrinal, sino que se recupera una elipsis contextual.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacía del contexto inmediato sobre la literalidad rígida.'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada en inglés y no requiere revisión adicional; se conserva la decisión de explicitar el referente implícito del justo, y no se añaden matices no respaldados por el griego.
  spanish_consistency_notes:
  - Se usa «salvación» en vez de «liberación» por la carga teológica del libro, aunque el griego también permitiría «liberación».
  - Se evita «Cristo» y vocabulario específicamente cristológico porque el pasaje trata del justo en sentido sapiencial, no de una identificación posterior.
  - «Temor terrible» mantiene el énfasis de δεινός sin introducir un tono arcaizante innecesario.
