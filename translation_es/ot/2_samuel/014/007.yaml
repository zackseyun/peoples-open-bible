translation:
  language: es
  text: 'Y he aquí[a], toda la familia se ha levantado contra tu sierva, y han dicho: «Entrega al que hirió a su hermano, para que lo matemos por la vida de su hermano, a quien mató; y destruiremos también al heredero». Así apagarían mi brasa restante[b], dejando a mi marido sin nombre ni remanente[c] sobre la faz de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira». El hebreo introduce la escena con una partícula de atención; «he aquí» mantiene un registro más solemne y bíblico.
    reason: spanish_style_note
  - marker: b
    text: La imagen hebrea es la de una brasa o ascua viva que representa la última supervivencia o esperanza de un linaje familiar.
    reason: cultural_note
  - marker: c
    text: «Sin nombre ni remanente» alude a que no quede ni memoria duradera ni descendencia sobreviviente para su marido, no solo a su reputación.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁפְחָתֶךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu servidora
  - tu esclava
  lexicon: HALOT
  rationale: En el discurso deferente de la mujer ante el rey, el término conserva la idea de subordinación respetuosa. «Sierva» comunica esa humildad sin volverlo torpe; «esclava» sería demasiado fuerte en este registro.
- source_word: קָמָה ... עַל
  english_pob_choice: has risen up against
  chosen_spanish: se ha levantado contra
  alternatives_spanish:
  - se ha alzado contra
  - se ha puesto contra
  lexicon: HALOT
  rationale: La locución expresa acción hostil, no solo postura física. «Se ha levantado contra» reproduce bien la fuerza del hebreo en español natural.
- source_word: כָל הַמִּשְׁפָּחָה
  english_pob_choice: the whole family
  chosen_spanish: toda la familia
  alternatives_spanish:
  - todo el clan
  - todos los parientes
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּחָה designa al grupo familiar ampliado. «Familia» es comprensible y fiel; «toda» preserva el valor colectivo.
- source_word: תְּנִי
  english_pob_choice: Give up
  chosen_spanish: Entrega
  alternatives_spanish:
  - Haz entrega de
  - Entrégalo
  lexicon: HALOT
  rationale: En este contexto judicial, la petición es forzar la entrega del culpable. «Entrega» comunica esa exigencia mejor que un simple «da».
- source_word: מַכֵּה אָחִיו
  english_pob_choice: the one who struck his brother
  chosen_spanish: al que hirió a su hermano
  alternatives_spanish:
  - al que golpeó a su hermano
  - al agresor de su hermano
  lexicon: HALOT
  rationale: «Hirió» conserva el valor verbal de נכה sin anticipar demasiado el resultado. Mantiene la progresión del pasaje antes de decir explícitamente «a quien mató».
- source_word: וּנְמִתֵהוּ
  english_pob_choice: so that we may put him to death
  chosen_spanish: para que lo matemos
  alternatives_spanish:
  - para ejecutarlo
  - y lo mataremos
  lexicon: HALOT
  rationale: El cohortativo expresa intención. En español, «para que lo matemos» es claro y suficientemente judicial sin añadir tecnicismo innecesario.
- source_word: בְּנֶפֶשׁ אָחִיו
  english_pob_choice: for the life of his brother
  chosen_spanish: por la vida de su hermano
  alternatives_spanish:
  - a causa de la vida de su hermano
  - en pago por la vida de su hermano
  lexicon: HALOT
  rationale: La expresión refleja retribución de vida por vida. «Por la vida de su hermano» conserva el valor forense y es idiomática.
- source_word: אֲשֶׁר הָרָג
  english_pob_choice: whom he killed
  chosen_spanish: a quien mató
  alternatives_spanish:
  - que mató
  - al que dio muerte
  lexicon: HALOT
  rationale: La cláusula relativa aclara que la herida resultó mortal. «Mató» es directo y fiel al texto.
- source_word: וְנַשְׁמִידָה גַּם אֶת הַיּוֹרֵשׁ
  english_pob_choice: and we will destroy the heir also
  chosen_spanish: y destruiríamos también al heredero
  alternatives_spanish:
  - y destruiremos también al heredero
  - y borraremos también al heredero
  lexicon: HALOT
  rationale: El sentido del hebreo es el intento ulterior de eliminar al heredero. «Heredero» es la equivalencia natural de הַיּוֹרֵשׁ; se conserva la gravedad con «destruiríamos» en la secuencia narrativa del relato citado.
- source_word: וְכִבּוּ אֶת גַּחַלְתִּי
  english_pob_choice: Thus they would quench my remaining ember
  chosen_spanish: Así apagarían mi brasa que aún queda
  alternatives_spanish:
  - Así extinguirían mi brasa que aún queda
  - Así apagarían mi carbón encendido
  lexicon: HALOT
  rationale: La imagen es de una brasa/ascua superviviente que representa la última esperanza de la línea familiar. «Brasa» comunica mejor que «emb​​er» en español corriente, y «que aún queda» preserva la idea de lo restante.
- source_word: לְבִלְתִּי שׂוּם
  english_pob_choice: leaving
  chosen_spanish: dejando
  alternatives_spanish:
  - para no dejar
  - sin dejar
  lexicon: HALOT
  rationale: El infinitivo de resultado/purpose se vierte naturalmente con «dejando», que expresa la consecuencia del acto sin forzar la sintaxis.
- source_word: לְאִישִׁי שֵׁם וּשְׁאֵרִית
  english_pob_choice: my husband neither name nor remnant
  chosen_spanish: a mi marido sin nombre ni remanente
  alternatives_spanish:
  - a mi marido sin nombre ni resto
  - a mi marido sin nombre ni posteridad
  lexicon: HALOT
  rationale: «Nombre» conserva el valor memorial y de continuidad de linaje; «remanente» refleja שְׁאֵרִית como lo que sobrevive. «Marido» es la referencia contextual más natural aquí.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - en la faz de la tierra
  - sobre la superficie de la tierra
  lexicon: HALOT
  rationale: Es un hebraísmo solemne bien establecido en español bíblico y reproduce la idiomática del original sin perder claridad.
theological_decisions:
- issue: Valor de la fórmula «nombre ni remanente» como memoria y descendencia, no solo reputación
  english_pob_reading: '''Name nor remnant'' refers to preserving a man''s memory and surviving line, not merely his reputation.'
  chosen_spanish_reading: «Nombre ni remanente» alude a la memoria perdurable y a la línea sobreviviente, no solo al prestigio social.
  alternative_spanish_readings:
  - solo reputación
  - memoria y posteridad
  rationale: 'El hebreo va más allá del honor social: implica extinción de memoria y descendencia. La traducción mantiene esa tensión con un par semántico abierto y no lo reduce a fama.'
  doctrine_reference: Memoria/linaje en el uso bíblico de שֵׁם y שְׁאֵרִית
- issue: Metáfora de la brasa/ascua restante como última esperanza de la casa
  english_pob_reading: The Hebrew uses the image of a remaining live coal/ember for the last surviving hope of a family line.
  chosen_spanish_reading: La brasa restante conserva la metáfora de la última esperanza de la casa familiar.
  alternative_spanish_readings:
  - la última chispa
  - el último carbón
  rationale: Conviene no aplanar la imagen. «Brasa» es natural en español y preserva la carga metafórica de supervivencia y continuidad.
  doctrine_reference: Metáfora hebrea de continuidad familiar
- issue: Relación entre «hermano» y la declaración de muerte retributiva
  english_pob_reading: 'The clause states the family''s further intent: eliminating the surviving son as heir.'
  chosen_spanish_reading: La cláusula presenta la intención de eliminar también al heredero sobreviviente.
  alternative_spanish_readings:
  - matar al heredero
  - borrar al heredero
  rationale: Se conserva el tono judicial y la escalada de violencia del relato. No se suaviza la intención homicida del texto.
  doctrine_reference: Justicia retributiva en el relato narrativo
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje revisado del auditorio inglés: se prefirió un registro más formal con «he aquí/Así», se conservó la imagen de la brasa en vez de aplanarla, y se mantuvo la secuencia narrativa de la amenaza contra el heredero y la extinción de nombre y remanente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto; este versículo no lo contiene.
  - «Sierva» se reserva para autodesignación humilde en contexto de súplica o deferencia.
  - «Brasa» se usa aquí por la metáfora de continuidad familiar; no se fuerza a «carbón» salvo que el contexto lo requiera.
  - «Remanente» se conserva para שְׁאֵרִית cuando el texto enfatiza supervivencia/lo que queda.
