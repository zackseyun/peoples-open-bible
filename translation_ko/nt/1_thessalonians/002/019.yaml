id: 1TH.2.19
reference: 1 Thessalonians 2:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τίς γὰρ ἡμῶν ἐλπὶς ἢ χαρὰ ἢ στέφανος καυχήσεως— ἢ οὐχὶ καὶ ὑμεῖς— ἔμπροσθεν τοῦ κυρίου ἡμῶν Ἰησοῦ ἐν τῇ αὐτοῦ παρουσίᾳ;
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/019.yaml
  text: For what is our hope or joy or crown of boasting—is it not indeed you?—before our Lord Jesus at his coming[a].
  footnotes:
  - marker: a
    text: Or 'at his presence' or 'at his arrival.' The Greek παρουσίᾳ can denote presence or arrival; in this context it refers to the Lord Jesus's future coming.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리의 소망이나 기쁨이나 자랑의 면류관이 무엇이겠습니까? 우리 주 예수께서 임재하실[a] 때 그분 앞에서, 바로 여러분이 아니겠습니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「오실」, 「강림하실」. 헬라어 παρουσία는 「임재·도래」를 가리키며, 본 문맥에서는 주 예수의 종말론적 재림을 가리킨다. 본 번역은 본문의 「임재」 의미를 보존하되 종말론적 강림의 함의를 본 각주로 분명히 한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπὶς ἢ χαρὰ ἢ στέφανος καυχήσεως
  english_pob_choice: hope or joy or crown of boasting
  chosen_korean: 소망이나 기쁨이나 자랑의 면류관
  alternatives_korean:
  - 소망과 기쁨과 자랑의 화관
  - 소망이나 기쁨이나 자랑의 관
  lexicon: BDAG
  rationale: στέφανος는 경기 우승의 화관. 한국 교회 전통의 「면류관」을 채택하되, 권위의 왕관(διάδημα)이 아닌 영예의 화관임을 유지한다.
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_korean: 임재하실
  alternatives_korean:
  - 오실
  - 강림하실
  - 도래하실
  lexicon: BDAG
  rationale: παρουσία는 본래 「임재·도래」를 가리킨다. 본 번역은 글로사리 정책에 따라 본 절에서는 「임재」를 채택하되, 4:15와 5:23의 종말론적 무게가 큰 곳에서는 「재림」을 택한다. 자세한 정책은 theological_decisions 참조.
theological_decisions:
- issue: παρουσία의 한국어 선택 — 본 절에서는 「임재」
  chosen_reading: 우리 주 예수께서 임재하실 때 그분 앞에서
  alternative_readings:
  - 우리 주 예수의 강림 때에 그분 앞에서
  - 우리 주 예수의 재림 때에 그분 앞에서
  rationale: 헬라어 παρουσία는 「임재」와 「도래」 두 의미를 함께 담는다. 본 번역의 정책은 (1) 종말론적 강림 자체에 초점이 명확한 4:15와 「채어 올려짐」 정황, 5:23의 거룩하게 보존됨 정황에서는 「재림」 어휘로 종말론적 무게를 분명히 살리고, (2) 본 19절과 같이 「그분 앞에서」의 임재 정황이 우선적 의미인 곳에서는 「임재」로 본문 어휘의 폭을 보존하는 것이다. 종말론적 함의는 각주로 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; KOREAN_PIPELINE.md Glossary — παρουσία case-by-case'
