  yaml_path: translation/ot/jeremiah/046/026.yaml
  text: And I will give them into the hand of those who seek their life[a], and into the hand of Nebuchadnezzar king of Babylon, and into the hand of his servants. But afterward she will dwell as in days of old[b], declares Yahweh.
