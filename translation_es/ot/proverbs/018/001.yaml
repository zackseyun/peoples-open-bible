translation:
  language: es
  text: El que se aparta busca su propio deseo; contra toda sana prudencia[a] se lanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sana prudencia» también puede renderizarse «sana sabiduría» o «buen juicio».
    reason: lexical_alternative
  - marker: b
    text: 'O: «Quien se separa busca deseo; contra toda sana sabiduría se pelea». El hebreo de la segunda línea es difícil, sobre todo el verbo raro traducido aquí «se lanza».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְתַאֲוָה
  english_pob_choice: his own desire
  chosen_spanish: su propio deseo
  alternatives_spanish:
  - deseo egoísta
  - ansia
  - por deseo
  lexicon: HALOT
  rationale: El prefijo לְ con תַאֲוָה expresa finalidad o motivo. En español, «su propio deseo» comunica con naturalidad que la acción del apartado está orientada por su propio querer, sin añadir psicología extra al hebreo.
- source_word: יְבַקֵּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - persigue
  - anda en busca de
  lexicon: HALOT
  rationale: El piel de בקש suele significar «buscar» o «procurar». «Busca» es directo y conserva el valor proverbial del verbo.
- source_word: נִפְרָד
  english_pob_choice: whoever isolates himself
  chosen_spanish: el que se aparta
  alternatives_spanish:
  - quien se aísla
  - el separado
  - el que se separa
  lexicon: HALOT
  rationale: El participio nifal de פרד puede expresar separación; en este contexto sapiencial conviene reflejar la acción de apartarse de la comunidad. «El que se aparta» mantiene la fuerza genérica sin volverlo demasiado explicativo.
- source_word: בְּכָל
  english_pob_choice: against all
  chosen_spanish: contra toda
  alternatives_spanish:
  - en toda
  - con toda
  - frente a toda
  lexicon: HALOT
  rationale: La preposición בְ en esta línea es difícil y la relación con el verbo siguiente es breve y tensa. «Contra toda» conserva el matiz adversativo que el POB inglés resolvió con «against all».
- source_word: תּוּשִׁיָּה
  english_pob_choice: sound judgment
  chosen_spanish: sana prudencia
  alternatives_spanish:
  - sabiduría sana
  - buen juicio
  - sabiduría práctica
  lexicon: HALOT
  rationale: תּוּשִׁיָּה puede referirse a sabiduría eficaz, juicio sólido o sensatez práctica. «Sana prudencia» comunica bien la idea de juicio firme y sensato, y evita reducir el término a mera teoría.
- source_word: יִתְגַּלָּע
  english_pob_choice: he breaks out against
  chosen_spanish: se lanza
  alternatives_spanish:
  - estalla contra
  - rompe contra
  - se desata
  lexicon: HALOT
  rationale: El hitpael raro de געל/גלע es difícil. En español, «se lanza» conserva la imagen de irrupción o embestida hostil sin fingir una precisión léxica que el hebreo no asegura.
theological_decisions:
- issue: El valor proverbial de la auto-separación frente a la comunidad y la sabiduría
  english_pob_reading: Whoever isolates himself seeks his own desire; he breaks out against all sound judgment.
  chosen_spanish_reading: El que se aparta busca su propio deseo; contra toda sana prudencia se lanza.
  alternative_spanish_readings:
  - Quien se aísla busca su propio deseo; contra toda sana sabiduría se lanza.
  - El que se separa busca deseo; contra toda buena sensatez se lanza.
  rationale: La línea contrasta la autoexclusión motivada por el deseo propio con una reacción hostil contra la sabiduría práctica. «Sana prudencia» mantiene el sentido sapiencial sin forzar una lectura doctrinal ajena al proverbio.
  doctrine_reference: Sabiduría bíblica / ética comunitaria en Proverbios
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés POB y conserva la dificultad de la segunda línea. La decisión principal es mantener la ambigüedad léxica de תּוּשִׁיָּה con una equivalencia española natural, sin suavizar el verbo raro de יִתְגַּלָּע ni convertir el proverbio en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usa «apartarse» para נִפְרָד, en línea con la auto-separación del contexto.
  - Se usa «sana prudencia» para תּוּשִׁיָּה, manteniendo el campo semántico de sabiduría práctica.
  - Se conserva una estructura paralela breve y proverbial, acorde con el hebreo poético.
  - Las notas a y b separan la variante de lectura de la alternativa léxica, como en el POB inglés.
