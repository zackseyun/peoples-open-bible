translation:
  language: es
  text: Y después de armar a cada uno de ellos, no tanto con la seguridad de escudos y lanzas[a] como con el aliento que infundían las nobles palabras, y después de relatar un sueño digno de confianza[b], los alegró a todos sobremanera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tanto con la seguridad de escudos y lanzas como con la exhortación que infundían las nobles palabras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un sueño creíble». El griego presenta el sueño como digno de confianza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθοπλίσας
  english_pob_choice: after arming
  chosen_spanish: después de armar
  alternatives_spanish:
  - habiendo armado
  - después de equipar
  lexicon: LSJ
  rationale: El participio aoristo se vierte en una secuencia narrativa natural en español. «Armar» conserva la idea de preparar para la guerra sin sobrecargar el prefijo intensivo.
- source_word: οὐ τὴν ... ἀσφάλειαν, ὡς τὴν ... παράκλησιν
  english_pob_choice: not so much with the security of shields and spears as with encouragement
  chosen_spanish: no tanto con la seguridad de escudos y lanzas como con el ánimo
  alternatives_spanish:
  - no tanto con la seguridad de escudos y lanzas como con la exhortación
  - no con la protección de escudos y lanzas, sino más bien con el ánimo
  lexicon: LSJ
  rationale: La estructura comparativa se reproduce con «no tanto ... como ...». «ἀσφάλεια» aquí es seguridad o resguardo; «παράκλησις» se expresa mejor como «ánimo» en este contexto militar, sin perder el matiz de aliento/exhortación.
- source_word: ἀσπίδων καὶ λογχῶν
  english_pob_choice: shields and spears
  chosen_spanish: escudos y lanzas
  alternatives_spanish:
  - escudos y picas
  - escudos y lanzas
  lexicon: LSJ
  rationale: Son términos militares directos. «Lanzas» es claro y natural en español; «picas» también es posible, pero menos general.
- source_word: ἐν τοῖς ἀγαθοῖς λόγοις
  english_pob_choice: found in noble words
  chosen_spanish: hallado en nobles palabras
  alternatives_spanish:
  - en nobles palabras
  - por medio de nobles palabras
  - hallado en buenas palabras
  lexicon: LSJ
  rationale: «ἀγαθός» puede ser simplemente «bueno», pero aquí el tono es moral/elevado; «nobles» preserva mejor ese matiz en español sin volverlo más interpretativo de lo que permite el griego.
- source_word: προσηγησάμενος
  english_pob_choice: after relating
  chosen_spanish: después de relatar
  alternatives_spanish:
  - después de contar
  - después de narrar
  lexicon: LSJ
  rationale: El participio medio indica presentar o narrar algo a los oyentes. «Relatar» es formal y preciso.
- source_word: ὄνειρον ἀξιόπιστον
  english_pob_choice: a trustworthy dream
  chosen_spanish: un sueño digno de confianza
  alternatives_spanish:
  - un sueño confiable
  - un sueño creíble
  - un sueño digno de fe
  lexicon: LSJ
  rationale: «ἀξιόπιστος» es «digno de confianza/creíble». «Digno de confianza» evita añadir una interpretación sobre el origen del sueño y conserva la valoración positiva del narrador.
- source_word: ὑπὲρ τὰ πάντα
  english_pob_choice: he made them all rejoice exceedingly
  chosen_spanish: los alegró a todos sobremanera
  alternatives_spanish:
  - los alegró a todos en gran manera
  - los alegró sobremanera
  - los hizo regocijarse enormemente
  lexicon: LSJ
  rationale: La frase funciona de modo intensivo con el verbo de alegrar. «Sobremanera» expresa bien el exceso/intensidad del griego sin introducir un objeto adicional.
- source_word: ηὔφραινεν
  english_pob_choice: he made them all rejoice
  chosen_spanish: los alegró a todos
  alternatives_spanish:
  - los llenó de alegría
  - los hizo regocijarse
  lexicon: LSJ
  rationale: 'El imperfecto causativo de εὐφραίνω se vierte como acción continuada o resultativa: «alegró». «Los alegró a todos» mantiene la fuerza causativa con español natural.'
theological_decisions:
- issue: Naturaleza del sueño
  english_pob_reading: Rendered ὄνειρον ἀξιόπιστον as 'a trustworthy dream' without specifying divine origin.
  chosen_spanish_reading: «un sueño digno de confianza» sin especificar origen divino
  alternative_spanish_readings:
  - un sueño creíble
  - un sueño inspirado
  rationale: El texto afirma que el sueño es confiable, pero no identifica en este versículo su procedencia. La traducción conserva esa tensión y no añade una interpretación doctrinal no explicitada por el griego.
  doctrine_reference: Preservar la tensión textual sin resolverla indebidamente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del texto inglés: conserva la comparativa «no tanto ... como ...», vierte ἐν τοῖς ἀγαθοῖς λόγοις con una expresión natural («hallado en nobles palabras») y expresa ὑπὲρ τὰ πάντα con un intensificador idiomático («sobremanera»).'
  spanish_consistency_notes:
  - Se mantiene «después de + infinitivo» para los participios narrativos, en concordancia con el estilo del POB español.
  - «Lanzas» se usa como equivalente general de λόγχαι, sin forzar «picas» o «lanzas largas».
  - «Nobles» conserva el tono ético de ἀγαθός mejor que un simple «buenas» en este contexto.
  - «Sueño digno de confianza» evita resolver el pasaje hacia «inspirado» o «divino».
