translation:
  language: es
  text: 'Y ella se levantó hacia la vigilia de la mañana, y mandó un mensaje a Holofernes, diciendo: «Que ahora mi señor dé órdenes de permitir a tu sierva[a] salir para orar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu esclava». El griego usa la forma femenina de doulos, que puede significar «sierva» o «esclava» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστη
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: BDAG
  rationale: El aoristo expresa que Judith se incorporó en ese momento; en español, «se levantó» es natural y fiel al acto narrativo sin sobrecargar el tono.
- source_word: πρὸς τὴν ἑωθινὴν φυλακήν
  english_pob_choice: toward the morning watch
  chosen_spanish: hacia la guardia de la mañana
  alternatives_spanish:
  - hacia la vigilia de la mañana
  - al amanecer
  lexicon: LSJ
  rationale: Conservo πρὸς con «hacia» y φυλακή como «guardia» en sentido de vigilancia/turno; «de la mañana» mantiene el valor de ἑωθινή sin convertirlo simplemente en una hora exacta.
- source_word: ἀπέστειλεν πρὸς Ὁλοφέρνην
  english_pob_choice: sent to Holofernes
  chosen_spanish: envió a Holofernes
  alternatives_spanish:
  - mandó un mensaje a Holofernes
  - envió palabra a Holofernes
  lexicon: BDAG
  rationale: El griego indica el envío de un mensaje o mensajero; en español, «envió a Holofernes» es idiomático y suficientemente claro, sobre todo porque el participio siguiente introduce el contenido del mensaje.
- source_word: Ἐπιταξάτω
  english_pob_choice: Let ... give orders
  chosen_spanish: dé órdenes
  alternatives_spanish:
  - mande
  - ordene
  lexicon: BDAG
  rationale: La fuerza de mandato queda bien expresada con «dé órdenes», que comunica la petición de autorizar una instrucción formal sin volverse rígidamente literal.
- source_word: ὁ κύριός μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor amo
  - mi dueño
  lexicon: BDAG
  rationale: Como título de respeto dirigido a un superior humano, «mi señor» preserva la deferencia social y evita introducir una lectura divina que no corresponde al contexto.
- source_word: ἐᾶσαι
  english_pob_choice: to allow
  chosen_spanish: permitir
  alternatives_spanish:
  - dejar
  - autorizar
  lexicon: BDAG
  rationale: El infinitivo expresa concesión; «permitir» es claro y conserva la relación entre la orden solicitada y la acción de salir.
- source_word: τὴν δούλην σου
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  lexicon: BDAG
  rationale: Aunque δούλη puede significar «esclava», aquí funciona como autodesignación deferente ante un superior. «Sierva» mantiene el matiz de subordinación y es la opción más natural en español bíblico sin borrar del todo la tensión léxica.
- source_word: ἐπὶ προσευχὴν
  english_pob_choice: for prayer
  chosen_spanish: para orar
  alternatives_spanish:
  - para la oración
  - con el fin de orar
  lexicon: BDAG
  rationale: La frase expresa finalidad. En español, «para orar» comunica directamente el propósito y evita una formulación más nominal que sería menos natural.
- source_word: ἐξελθεῖν
  english_pob_choice: to go out
  chosen_spanish: salir
  alternatives_spanish:
  - salir afuera
  - irse
  lexicon: BDAG
  rationale: El infinitivo de movimiento se traduce de manera breve y directa como «salir», que encaja bien con la petición completa.
theological_decisions:
- issue: Tratamiento de κύριος como título humano y no divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - Señor
  rationale: En este pasaje el referente es Holofernes, así que el título debe leerse como deferencia cortesana. «Mi señor» conserva el registro de respeto sin activar el uso devocional de «Señor».
  doctrine_reference: 'DOCTRINE.md: κύριος Kyrios → Lord; aplicación contextual para títulos humanos'
- issue: Elección entre «sierva» y «esclava» para δούλη
  english_pob_reading: your servant
  chosen_spanish_reading: tu sierva
  alternative_spanish_readings:
  - tu esclava
  rationale: La POB inglesa documenta la alternativa lexical «slave/servant». En español, «sierva» preserva la auto-humillación respetuosa del discurso cortesano, mientras que «esclava» resaltaría con más dureza el estatus jurídico. El contexto favorece la lectura deferencial, pero la tensión queda anotada en la decisión léxica y en la nota.
  doctrine_reference: 'DOCTRINE.md: δοῦλος doulos → servant / slave (context-dependent)'
translation_notes:
  revision_awareness: El registro inglés auditado fue revisado y quedó sin cambios en la última pasada (agreement alta, verdict agree). La versión española mantiene ese mismo sentido, ajustando solo la formulación para que suene natural en español sin perder las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento respetuoso de Holofernes con «mi señor» y no con «Señor», para evitar ambigüedad teológica.
  - Se eligió «sierva» en el texto principal, pero la nota conserva la alternativa «esclava» para reflejar la tensión lexical de δούλη.
  - «Guardia de la mañana» conserva la imagen temporal de φυλακή sin sustituirla por una explicación más interpretativa.
  - La construcción completa de la petición se mantiene en una sola cita directa, coherente con el tono narrativo del versículo.
