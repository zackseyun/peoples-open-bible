revisions:
- from: Y aconteció[a] que, cuando los comandantes de los carros vieron que él no era el rey de Israel, se volvieron de perseguirlo.
  to: Y sucedió[a] que, cuando los comandantes de los carros vieron que él no era el rey de Israel, dejaron de perseguirlo.
  rationale: Se ajusta la introducción narrativa a un español más natural («Y sucedió») y, sobre todo, se corrige la cláusula final para expresar con claridad el sentido idiomático de מֵאַחֲרָיו. La nota al pie se conserva porque el inglés auditado preserva la alternativa literal, pero se formula de manera más precisa para español.
