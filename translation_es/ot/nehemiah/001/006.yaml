review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro auditado en inglés: conserva el lenguaje antropomórfico, la expresión «hijos de Israel», el valor confesional de «hemos pecado contra ti» y la referencia a «la casa de mi padre». Sin embargo, dos puntos necesitan ajuste para mayor fidelidad y mejor español: (1) «que hoy estoy orando delante de ti» suena menos natural que «que estoy orando delante de ti hoy» y preserva mejor la secuencia hebrea; (2) וַאֲנִי tiene matiz enfático, mejor reflejado por «Aun yo» o «Incluso yo» que por «Yo», además de evitar el giro menos natural «Yo y ...».'
  spanish_quality_summary: El texto es claro, digno y ampliamente legible, pero presenta leves asperezas sintácticas. «Y confesando» funciona, aunque «mientras confieso» sería más natural; no obstante, puede mantenerse para cercanía formal con el participio coordinado. El mayor problema de estilo es «Yo y la casa de mi padre hemos pecado», que en español bíblico-legible suena menos natural y pierde el énfasis del hebreo. También conviene reubicar «hoy» para evitar una colocación algo forzada.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no aparece el nombre divino en este versículo; «siervo» para עבד en oración reverente es coherente con la excepción documentada; «hijos de Israel» respeta la decisión lexical y teológica auditada; «pecados» y «contra ti» son adecuados. La nota al pie sobre «hijos de Israel» está bien formulada y útil para el lector hispano.'
  issues:
  - severity: medium
    issue: La colocación de «hoy» en «que hoy estoy orando delante de ti» suena algo forzada.
    rationale: El hebreo tiene הַיּוֹם antes de «día y noche», pero en español la frase fluye mejor como «que estoy orando delante de ti hoy, día y noche», sin perder sentido ni registro.
  - severity: medium
    issue: «Yo y la casa de mi padre hemos pecado» no refleja bien el énfasis de וַאֲנִי y suena menos natural en español.
    rationale: El inglés auditado añadió «Even I» para marcar el énfasis. En español, «Aun yo y la casa de mi padre hemos pecado» o «Incluso yo...» preserva mejor ese valor y mantiene el hebraísmo inteligible.
  revised_spanish_text: Te ruego que tu oído esté atento y tus ojos estén abiertos, para oír la oración de tu siervo, que estoy orando delante de ti hoy, día y noche, por los hijos de Israel, tus siervos[a], y confesando los pecados de los hijos de Israel, que hemos pecado contra ti. Aun yo y la casa de mi padre hemos pecado.
  revised_footnotes:
