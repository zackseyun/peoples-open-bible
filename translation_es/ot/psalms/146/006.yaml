translation:
  language: es
  text: el que hizo los cielos y la tierra[a], el mar y todo lo que hay en ellos, el que mantiene su fidelidad para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el que mantiene la verdad para siempre'. El hebreo אֱמֶת puede significar 'verdad' o 'fidelidad'; aquí 'fidelidad' expresa mejor la idea de confiabilidad duradera.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hace
  lexicon: HALOT
  rationale: El participio qal describe al sujeto con valor caracterizador, pero en español el pasado simple funciona naturalmente para la referencia creadora de Dios y conserva bien el sentido del acto creador sin volver la frase pesada.
- source_word: שָׁמַיִם וָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  lexicon: HALOT
  rationale: La merisma hebrea apunta al orden creado completo. En español, 'los cielos y la tierra' es la fórmula más natural y transparente, y mantiene la amplitud del conjunto creado.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular con artículo, en español 'el mar' comunica con claridad la referencia colectiva de la creación y encaja bien con la tríada cielo-tierra-mar.
- source_word: וְאֶת כָּל אֲשֶׁר בָּם
  english_pob_choice: and all that is in them
  chosen_spanish: y todo lo que hay en ellos
  alternatives_spanish:
  - y todo lo que está en ellos
  - y cuanto hay en ellos
  lexicon: HALOT
  rationale: La construcción hebrea abarca de manera total los contenidos de los elementos creados mencionados. 'Todo lo que hay en ellos' conserva esa amplitud de forma clara y idiomática.
- source_word: הַשֹּׁמֵר
  english_pob_choice: who keeps
  chosen_spanish: el que guarda
  alternatives_spanish:
  - el que preserva
  - el que mantiene
  lexicon: HALOT
  rationale: El participio de שמר puede abarcar guardar, custodiar y preservar. 'Guardar' es el equivalente más amplio y natural en español, y permite luego expresar el objeto אֱמֶת sin forzar la frase.
- source_word: אֱמֶת
  english_pob_choice: faith
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la verdad
  lexicon: HALOT
  rationale: El audit trail inglés terminó con 'faith' por naturalidad, pero el hebreo אֱמֶת puede significar tanto verdad como fidelidad. En español, 'la verdad' mantiene la posibilidad léxica abierta y suena plenamente bíblica; 'fidelidad' sigue siendo una alternativa viable si se quisiera explicitar el matiz relacional.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La idea es de duración perpetua. 'Para siempre' es la formulación más natural en español y conserva el valor temporal absoluto del hebreo.
theological_decisions:
- issue: Valor de אֱמֶת aplicado a Dios
  english_pob_reading: faith / faithfulness with lexical room for truth
  chosen_spanish_reading: la verdad, con posible matiz de fidelidad
  alternative_spanish_readings:
  - la fidelidad
  - la verdad
  rationale: El verso celebra a Yahvé como Creador y como el que permanece confiable para siempre. En español, 'la verdad' evita cerrar demasiado el campo semántico de אֱמֶת, mientras que la nota mantiene la alternativa 'fidelidad' para lectores que deseen enfatizar la confiabilidad pactal.
  doctrine_reference: Translation philosophy §3, §5
- issue: Título creador en cadena descriptiva
  english_pob_reading: who made... who keeps...
  chosen_spanish_reading: el que hizo... el que guarda...
  alternative_spanish_readings:
  - quien hizo... quien guarda...
  - el que hace... el que guarda...
  rationale: La repetición del relativo participial en hebreo sostiene una descripción continua de Yahvé. En español, 'el que hizo... el que guarda...' reproduce bien la estructura, con fluidez natural y sin perder la continuidad retórica del salmo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase final desde 'who keeps faithfulness forever' a 'who keeps faith forever' por naturalidad. La versión española sigue la misma línea de naturalidad, pero conserva la ambigüedad léxica de אֱמֶת mediante una nota que menciona explícitamente 'verdad' y 'fidelidad'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito en la sintaxis descriptiva del salmo sin introducir un título adicional no atestiguado en el verso.
  - Se prefirió 'el que' para reproducir el valor atributivo del participio hebreo de forma natural en español.
  - '''Los cielos y la tierra'' respeta la merisma creativa hebrea sin necesidad de explicitar ''el universo''.'
  - '''La verdad'' se usa en el texto principal por fidelidad al rango semántico del hebreo, mientras la nota preserva la alternativa ''fidelidad''.'
