lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - también contra
  lexicon: HALOT
  rationale: La secuencia repetida introduce una lista de destinos de juicio; en español, «contra» expresa mejor la orientación hostil/judicial que «sobre», y conserva el paralelismo de la serie.
- source_word: דִּיבוֹן
  english_pob_choice: Dibon
  chosen_spanish: Dibón
  alternatives_spanish:
  - Dibon
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado al español con acento gráfico por la acentuación natural de la forma española.
- source_word: נְב֔וֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Nebo
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene transliterado sin traducir.
- source_word: בֵּית דִּבְלָתָֽיִם
  english_pob_choice: Beth-diblathaim
  chosen_spanish: Bet-diblataim
  alternatives_spanish:
  - Bet-diblataim
  - Beth-diblataim
  - Casa de Diblataim
  lexicon: HALOT
  rationale: Como topónimo compuesto, se conserva la forma transliterada en lugar de traducir בית como «casa». «Bet» reproduce el elemento inicial del nombre y «diblataim» refleja la terminación dual preservada en la tradición textual; en español se adapta la ortografía para lectura natural.
translation_notes:
  revision_awareness: El texto inglés auditado no mostró revisiones aplicadas y el pasaje permanece en alta concordancia con la fuente hebrea; por ello, la versión española sigue de cerca la estructura breve y repetitiva del original sin expandirla.
  spanish_consistency_notes:
  - Se mantiene el paralelismo repetido de «y contra» para reflejar la cadena preposicional hebrea.
  - Se usa transliteración consistente para los tres topónimos, con adaptación gráfica española mínima.
  - El guion largo final reproduce la suspensión del verso en la edición inglesa auditada.
