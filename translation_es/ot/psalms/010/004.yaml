base_translation:
  language: en
  yaml_path: translation/ot/psalms/010/004.yaml
  text: In the pride of his face[a], the wicked man does not seek; all his thoughts are[b], “There is no God.”
  footnotes:
  - marker: a
    text: Or, “God is in none of his thoughts.” The Hebrew can also be understood as describing the absence of God from all his thinking rather than quoting his thought directly.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, “in the height of his nose/face,” an idiom for haughty pride or arrogant bearing.
    reason: cultural_note
