translation:
  language: es
  text: Entonces los líderes presentaron la ofrenda de dedicación[a] para el altar, en el día en que fue ungido, y los líderes presentaron su ofrenda delante del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la dedicación del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִיבוּ
  english_pob_choice: presented
  chosen_spanish: presentaron
  alternatives_spanish:
  - trajeron
  - ofrecieron
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hifil de קרב expresa traer o presentar una ofrenda. «Presentaron» conserva el sentido cultual sin forzar una perífrasis pesada en español, y permite repetir con naturalidad en la segunda mitad del versículo.
- source_word: הַנְּשִׂאִים
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los príncipes
  lexicon: HALOT
  rationale: נָשִׂיא en Números designa a los cabezas de las tribus. «Líderes» es claro en español moderno y respeta la función de representación; «príncipes» sugiere monarquía y «jefes» puede sonar más áspero o ambiguo.
- source_word: חֲנֻכַּת הַמִּזְבֵּחַ
  english_pob_choice: the dedication offering for the altar
  chosen_spanish: la ofrenda de dedicación del altar
  alternatives_spanish:
  - la dedicación del altar
  - la ofrenda de la dedicación del altar
  lexicon: HALOT
  rationale: חֲנֻכָּה denota dedicación. En español, «ofrenda de dedicación del altar» expresa que no solo se habla del acto, sino del don asociado a esa dedicación. «La dedicación del altar» sería más literal, pero puede sonar como si se presentara el evento mismo.
- source_word: בְּיוֹם הִמָּשַׁח אֹתוֹ
  english_pob_choice: on the day it was anointed
  chosen_spanish: el día en que fue ungido
  alternatives_spanish:
  - el día de su ungimiento
  - cuando fue ungido
  lexicon: HALOT
  rationale: La construcción temporal exige marcar el momento con precisión. «El día en que fue ungido» es natural, fiel y mantiene el referente al altar sin necesidad de repetirlo.
- source_word: קָרְבָּנָם
  english_pob_choice: their offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su don
  - su ofrenda sacrificial
  lexicon: HALOT
  rationale: קָרְבָּן es un término cultual general para ofrenda/presentación. «Su ofrenda» es la equivalencia española más transparente y litúrgicamente sobria.
- source_word: לִפְנֵי הַמִּזְבֵּחַ
  english_pob_choice: before the altar
  chosen_spanish: delante del altar
  alternatives_spanish:
  - ante el altar
  - frente al altar
  lexicon: HALOT
  rationale: לִפְנֵי en contexto ritual y espacial puede renderizarse como «delante de» o «ante». «Delante del altar» es claro y conserva la escena de presentación frente al altar.
theological_decisions:
- issue: ¿Cómo traducir el acto ritual sin borrar su fuerza cultual?
  english_pob_reading: presented / offering / anointed
  chosen_spanish_reading: presentaron / ofrenda / ungido
  alternative_spanish_readings:
  - ofrecieron / sacrificio / consagrado
  - trajeron / presente / ungido
  rationale: El versículo describe una presentación ritual ligada a la dedicación del altar. «Presentaron» y «ofrenda» mantienen la acción cultual sin convertirla en lenguaje demasiado técnico o en términos que desplacen el énfasis del texto.
  doctrine_reference: Culto/ritual del tabernáculo en Números 7
- issue: ¿Mantener «ungido» para el altar?
  english_pob_reading: on the day it was anointed
  chosen_spanish_reading: el día en que fue ungido
  alternative_spanish_readings:
  - el día en que fue consagrado
  - el día de su unción
  rationale: El texto habla de la unción del altar, no de una consagración genérica. «Ungido» conserva el detalle ritual concreto y evita suavizar un término con carga bíblica específica.
  doctrine_reference: Consagración por unción en la legislación cultual
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés sin cambios sustantivos: mantiene la doble mención de los líderes, el valor temporal de בְּיוֹם, y la tensión lexical entre una traducción más explicativa («ofrenda de dedicación») y una más literal («dedicación del altar»), preservada aquí en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto cuando no aparece el Tetragrámaton en este versículo.
  - Se mantuvo «ofrenda» para קָרְבָּן, coherente con el léxico cultual del contexto.
  - Se prefirió la repetición de «los líderes» para reflejar la repetición del hebreo y evitar pérdida de énfasis.
  - «Ungido» se aplicó al altar, no a una persona, para respetar el referente del texto.
