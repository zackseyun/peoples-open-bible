  text: 'Once the master of the house has risen and shut the door[a], and you begin to stand outside and knock on the door, saying, ‘Lord, open to us,’ then he will answer you, ‘I do not know you[c][b], where you are from.’'
  footnotes:
  - marker: a
    text: 'Or, more formally, ''After the master of the house has risen and shut the door.'''
    reason: lexical_alternative
  - marker: b
    text: 'Greek κύριε, traditionally ''Lord''; in the parable it may also be understood as ''Master'' or ''Sir.'''
    reason: alternative_reading
  - marker: c
    text: 'Greek more literally, ''I do not know you, where you are from.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 「집주인이 일어나 문을 닫은 후에, 너희가 밖에 서서 문을 두드리며 「주여, 우리에게 열어 주십시오」 할 때에, 그가 너희에게 대답하여 이르되 「내가 너희를 알지 못한다. 너희가 어디서 왔느냐?」 할 것이다.」
  philosophy: optimal-equivalence
