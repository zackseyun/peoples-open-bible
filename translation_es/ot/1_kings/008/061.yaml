review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la exhortación jussiva, la lealtad íntegra del corazón, el nombre divino «Yahvé», y el sentido general de andar en los estatutos y guardar los mandamientos. Sin embargo, la renderización de עִם como «de Yahvé» altera de manera innecesaria la relación expresada en el hebreo («con Yahvé nuestro Dios») y debilita la cercanía/alianza del original. Además, la nota [a] con «sin división de Yahvé» resulta poco natural y semánticamente confusa en español.
  spanish_quality_summary: El español es mayormente claro y digno, pero «sea enteramente de Yahvé» suena menos natural y menos fiel que «esté por completo con Yahvé» o «sea íntegro con Yahvé». La nota alternativa también necesita reparación para sonar idiomática. El resto del versículo es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé», «mandamientos» y el registro bíblico general. La principal desalineación es sustituir el valor de עִם («con») por «de», pese a que la guía pide trabajar desde la evidencia fuente primero. Conviene conservar «con Yahvé» en el texto principal y expresar la alternativa de שָׁלֵם como «sin división» o «indiviso» aplicada al corazón, no a la relación posesiva.
  issues:
  - severity: high
    issue: «de Yahvé, nuestro Dios» para עִם יְהוָה אֱלֹהֵינוּ
    rationale: El hebreo עִם significa «con». La solución «de Yahvé» introduce pertenencia en lugar de compañía/lealtad relacional y cambia el matiz fuente sin necesidad. «Con Yahvé nuestro Dios» es fiel y natural en español en esta construcción con «corazón».
  - severity: medium
    issue: La nota [a] dice «sea sin división de Yahvé»
    rationale: 'En español esa frase es poco idiomática y puede entenderse como una división perteneciente a Yahvé. La alternativa debe modificar «corazón»: «esté sin división con Yahvé» o «sea indiviso con Yahvé».'
  - severity: low
    issue: «el corazón de ustedes» es correcto pero algo pesado
    rationale: No es erróneo, pero «su corazón» sería más fluido en español general. Aun así, puede mantenerse si se desea explicitar el plural.
  revised_spanish_text: Que, por tanto, el corazón de ustedes esté enteramente con Yahvé nuestro Dios[a], para andar en sus estatutos y guardar sus mandamientos, como en este día[b].
  revised_footnotes:
  - marker: a
    text: 'O: «sin división»: «Que, por tanto, el corazón de ustedes esté sin división con Yahvé nuestro Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «como en este día», aludiendo al día presente como modelo o testigo de esa lealtad.'
    reason: lexical_alternative
  revision_rationale: Se revisa la preposición relacional para reflejar fielmente עִם («con») y se ajusta la sintaxis a un español natural con «estar ... con». También se corrige la nota alternativa para que «sin división» modifique apropiadamente al corazón y no produzca una frase confusa. Se mueve la nota [b] al sintagma pertinente «como en este día», donde realmente ancla la explicación del hebraísmo.
