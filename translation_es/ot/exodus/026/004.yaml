revisions:
- from: Y harás lazadas de azul[a] en el borde de la primera cortina, en el extremo de la primera unión[b]; y así harás en el borde de la cortina exterior[c] de la segunda unión[b].
  to: Y harás lazadas de azul[a] en el borde de la una cortina, en el extremo del primer conjunto unido[b]; y así harás en el borde de la cortina exterior[c] del segundo conjunto unido[b].
  rationale: 'La revisión corrige dos puntos de fidelidad: preserva mejor הָאֶחָת con «la una cortina» en vez de «la primera», y hace explícito que חֹבָרֶת/מַחְבֶּרֶת aluden a un grupo de cortinas ya ensambladas mediante «conjunto unido». También suaviza la puntuación para una lectura más natural en español sin perder la estructura del original.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:14:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y conserva las notas léxicas clave sobre תְּכֵלֶת y חֹבָרֶת/מַחְבֶּרֶת. Sin embargo, introduce dos desajustes relevantes: (1) הָאֶחָת (''la una/la una cortina'') se volvió ''la primera'', aunque la decisión inglesa auditada preserva deliberadamente ''the one''; y (2) חֹבָרֶת/מַחְבֶּרֶת no significa meramente ''unión'' sino el conjunto de cortinas ya unido, por lo que ''primera unión/segunda unión'' suena demasiado abstracto y puede hacer pensar en la acción o punto de unión, no en el grupo ensamblado.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero 'primera unión' y 'segunda unión' suenan poco naturales en contexto de textiles y pierden precisión referencial. 'Cortina exterior' es aceptable, aunque 'cortina más exterior' o 'cortina exterior' depende del flujo; aquí basta 'cortina exterior'. También conviene evitar la coma tras 'cortina', porque separa innecesariamente el modificador locativo.
  glossary_alignment: 'No hay conflictos con la terminología teológica de proyecto. Las decisiones léxicas principales son mayormente adecuadas: ''azul'', ''borde'', ''cortina'', ''y así''. La principal corrección de glosario/contexto es hacer que חֹבָרֶת/מַחְבֶּרֶת se exprese como ''conjunto unido'' o equivalente, no solo ''unión''.'
  issues:
  - severity: medium
    issue: הָאֶחָת se tradujo como 'la primera'
    rationale: El hebreo dice literalmente 'la una', y la auditoría inglesa preserva esa elección de manera intencional. En español puede sonar algo rígido, pero 'la primera' añade una numeración no explícita.
  - severity: high
    issue: חֹבָרֶת / מַחְבֶּרֶת se tradujo como 'unión'
    rationale: El término hebreo se refiere al conjunto de cortinas acopladas como una unidad. 'Unión' en español suena abstracto o puntual, y no transmite bien el referente material del pasaje.
  - severity: low
    issue: Puntuación y sintaxis algo pesadas en 'la primera cortina, en el extremo...'
    rationale: La coma no ayuda y el verso fluye mejor sin ella, manteniendo la relación espacial continua del hebreo.
  revised_spanish_text: Y harás lazadas de azul[a] en el borde de la una cortina, en el extremo del primer conjunto unido[b]; y así harás en el borde de la cortina exterior[c] del segundo conjunto unido[b].
  revised_footnotes:
  - marker: a
    text: O «violeta» o «azul violáceo»; el hebreo תְּכֵלֶת designa el tinte/material azul característico usado en el tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: Los términos hebreos para «conjunto unido» (חֹבָרֶת / מַחְבֶּרֶת) se refieren a un grupo de cortinas unidas como una sola unidad; tradicionalmente también puede decirse «acoplamiento».
    reason: lexical_alternative
  - marker: c
    text: O «la cortina de más afuera» para «la cortina exterior».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos de fidelidad: preserva mejor הָאֶחָת con «la una cortina» en vez de «la primera», y hace explícito que חֹבָרֶת/מַחְבֶּרֶת aluden a un grupo de cortinas ya ensambladas mediante «conjunto unido». También suaviza la puntuación para una lectura más natural en español sin perder la estructura del original.'
