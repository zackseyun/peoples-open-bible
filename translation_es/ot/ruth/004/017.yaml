translation:
  language: es
  text: 'Entonces las vecinas le pusieron nombre[a], diciendo: «Le ha nacido un hijo a Noemí». Y le pusieron por nombre Obed. Fue padre de Isaí, padre de David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Le ha nacido un hijo a Noemí». Las vecinas hablan de la línea familiar restaurada de Noemí por medio del hijo de Rut, no de Noemí como madre biológica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁכֵנוֹת
  english_pob_choice: the neighbor women
  chosen_spanish: las vecinas
  alternatives_spanish:
  - las mujeres vecinas
  - las mujeres del vecindario
  lexicon: HALOT
  rationale: El sustantivo femenino plural designa a mujeres que vivían cerca. «Vecinas» es natural en español y conserva tanto la cercanía como el género.
- source_word: וַתִּקְרֶאנָה לוֹ שֵׁם
  english_pob_choice: gave him a name
  chosen_spanish: le pusieron nombre
  alternatives_spanish:
  - lo llamaron
  - le dieron un nombre
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática de nombramiento. En español, «poner nombre» reproduce bien la acción de nombrar y conserva el dativo indirecto «le».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: Es la partícula quotativa estándar; «diciendo» introduce de forma directa la declaración citada.
- source_word: יֻלַּד בֵּן לְנָעֳמִי
  english_pob_choice: A son has been born to Naomi
  chosen_spanish: Le ha nacido un hijo a Noemí
  alternatives_spanish:
  - Un hijo ha nacido para Noemí
  - A Noemí le ha nacido un hijo
  lexicon: HALOT
  rationale: El pasivo con ל marca a Noemí como beneficiaria/recipiente. «Le ha nacido» suena natural en español y mantiene la perspectiva comunitaria sin convertirla en una afirmación biológica sobre la maternidad de Noemí.
- source_word: וַתִּקְרֶאנָה שְׁמוֹ עוֹבֵד
  english_pob_choice: And they named him Obed
  chosen_spanish: Y lo llamaron Obed
  alternatives_spanish:
  - Y le pusieron por nombre Obed
  - Y nombraron a su nombre Obed
  lexicon: HALOT
  rationale: La fórmula hebrea pide un verbo directo de nombrar. «Lo llamaron Obed» es idiomático, claro y fiel.
- source_word: עוֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Es un nombre propio; debe transliterarse, no traducirse.
- source_word: אֲבִי
  english_pob_choice: father of
  chosen_spanish: padre de
  alternatives_spanish:
  - antepasado de
  lexicon: HALOT
  rationale: En esta genealogía inmediata, la relación paterna directa es la lectura más simple y fiel. «Padre de» conserva la estructura genealógica del texto.
- source_word: יִשַׁי
  english_pob_choice: Jesse
  chosen_spanish: Isaí
  alternatives_spanish:
  - Jesse
  - Yishai
  lexicon: HALOT
  rationale: «Isaí» es la forma española bíblica tradicional y comprensible; conserva el nombre propio sin transliteración excesivamente técnica.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
theological_decisions:
- issue: Relación de Noemí con el recién nacido en la proclamación comunitaria
  english_pob_reading: Retain the wording 'to Naomi' in the main text without clarifying it as biological maternity.
  chosen_spanish_reading: Mantener «a Noemí» / «le ha nacido un hijo a Noemí» sin aclarar maternidad biológica.
  alternative_spanish_readings:
  - Le ha nacido un nieto a Noemí
  - Noemí ha recibido un hijo
  rationale: El hebreo presenta la perspectiva de las vecinas sobre la restauración de la línea familiar de Noemí por medio del hijo de Rut. Traducir «nieto» resolvería la tensión literaria y familiar que el texto conserva; el español debe mantener esa amplitud sin sobreexplicar.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el cierre genealógico del versículo; conserva la tensión de «le ha nacido un hijo a Noemí» documentada en el POB inglés y no introduce una aclaración no presente en el texto fuente. No se registran revisiones posteriores en el paquete de control.
  spanish_consistency_notes:
  - Se usa «Noemí» como forma española estándar del nombre propio.
  - Se conserva el nombre propio «Obed» sin traducción semántica.
  - «Padre de» se mantiene dos veces para reflejar la genealogía directa del hebreo.
  - El pie de nota se ancla en «hijo» para explicar la posible lectura alternativa sin alterar el texto principal.
