theological_decisions:
- issue: Rendering of בְּרִית in a political agreement between kings
  chosen_reading: treaty
  alternative_readings:
  - covenant
  rationale: Although בְּרִית is often rendered 'covenant,' here the context is a negotiated interstate pact rather than a divine-human covenant. 'Treaty' better reflects the plain sense without denying the lexical connection. The covenantal alternative is preserved in footnotes for auditability.
