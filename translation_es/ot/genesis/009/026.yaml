revisions:
- from: 'Y dijo[a]: «Bendito sea Yahvé, el Dios de Sem, y que Canaán sea su esclavo».'
  to: 'Y dijo: «Bendito sea Yahvé, el Dios de Sem, y que Canaán sea esclavo de ellos[a]».'
