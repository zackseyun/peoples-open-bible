review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido base del hebreo: prohibición de que la herencia pase de una tribu a otra, seguida por la razón de que cada tribu debe mantenerse unida a su propia herencia. También preserva correctamente «los hijos de Israel» con nota alternativa, en línea con el rastro auditado inglés.'
  spanish_quality_summary: El español es claro y digno, pero «se apegará a su propia herencia» suena menos natural y algo ambiguo en un contexto legal-territorial. Además, el sujeto real de יִדְבְּקוּ es plural («las tribus»), y una formulación plural mejora la fluidez y evita la personificación singular innecesaria. «Se mantendrán unidas a su propia herencia» conserva la metáfora de דבק con mejor legibilidad en español.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Herencia», «tribu» y «los hijos de Israel» están bien alineados con las decisiones auditadas. La única mejora necesaria es estilístico-lexical en la representación de דבק y la concordancia/sintaxis distributiva.
  issues:
  - severity: medium
    issue: La frase «cada una de las tribus de los hijos de Israel se apegará a su propia herencia» suena algo forzada en español.
    rationale: Aunque «apegarse» puede reflejar דבק, en contexto jurídico-territorial español resulta menos idiomático que «mantenerse unidas» o «aferrarse». La formulación actual es comprensible, pero no la más natural ni la más elegante para lectura bíblica pública.
  - severity: low
    issue: La elección singular «cada una ... se apegará» reproduce el distributivo, pero pierde la naturalidad del predicado plural implícito en el hebreo con «las tribus».
    rationale: El hebreo tiene יִדְבְּקוּ en plural con «las tribus» como sujeto semántico. En español, «porque las tribus ... se mantendrán unidas» o «porque cada una ... se mantendrá unida» mejora la concordancia conceptual y la fluidez.
  revised_spanish_text: No se transferirá ninguna herencia de una tribu a otra tribu[a], porque las tribus de los hijos de Israel se mantendrán unidas a su propia herencia.
  revised_footnotes:
  - marker: a
    text: 'O «las tribus de Israel». Hebreo: «las tribus de los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el sentido jurídico de תִסֹּב con «se transferirá», así como «herencia», «tribu» y «los hijos de Israel». Se revisa la segunda cláusula para reflejar de manera más natural en español el plural de יִדְבְּקוּ y la idea de דבק en contexto territorial: «se mantendrán unidas a su propia herencia» suena más claro y bíblicamente digno que «se apegará». La nota alternativa se mantiene intacta y correctamente anclada.'
