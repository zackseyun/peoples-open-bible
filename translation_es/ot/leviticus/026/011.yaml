translation:
  language: es
  text: Y pondré mi morada[a] entre ustedes, y no los aborreceré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mi tabernáculo". El hebreo מִשְׁכָּן puede referirse específicamente al tabernáculo, pero más ampliamente significa "morada" o "lugar de habitación".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "mi alma no los aborrecerá"; es un hebraísmo que expresa una fuerte repulsión personal, aquí negada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will set
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y colocaré
  - Y estableceré
  lexicon: HALOT
  rationale: נתן en este contexto expresa colocar o disponer algo. En español, ‘poner’ con futuro conserva la acción concreta sin sonar forzado; ‘establecer’ sería posible, pero puede sugerir una formulación más abstracta.
- source_word: מִשְׁכָּנִי
  english_pob_choice: my dwelling place
  chosen_spanish: mi morada
  alternatives_spanish:
  - mi tabernáculo
  - mi habitación
  lexicon: HALOT
  rationale: מִשְׁכָּן puede referirse al tabernáculo, pero su sentido básico es un lugar de habitación. ‘Morada’ mantiene la idea de presencia habitacional de Yahvé entre su pueblo, sin reducirla de entrada al mueble o estructura cultual. En nota se preserva la alternativa ‘tabernáculo’.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - dentro de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea significa ‘en medio de ustedes’. ‘Entre ustedes’ es natural en español y evita la lectura individualista de ‘dentro de ustedes’.
- source_word: תִגְעַל
  english_pob_choice: will not abhor
  chosen_spanish: no los abominaré
  alternatives_spanish:
  - no los rechazaré
  - no los repugnaré
  lexicon: HALOT
  rationale: געל comunica una fuerte repulsión/aborrecimiento. ‘Abominar’ conserva mejor esa fuerza que ‘rechazar’; el prefijo negativo y el verbo en primera persona reflejan bien la decisión divina del hebreo. ‘Repugnar’ suena menos bíblico en español.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: yo
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: 'Aunque el hebreo dice literalmente ‘mi alma/mi vida’, el propio audit trail inglés decidió no dejar la idiomática literalidad en la línea principal por naturalidad. En español, ‘yo’ comunica la misma fuerza personal de la expresión sin perder el sentido: no es una mera emoción impersonal, sino la disposición personal de Yahvé.'
theological_decisions:
- issue: Cómo traducir מִשְׁכָּן sin estrecharlo innecesariamente a una institución cultual específica
  english_pob_reading: my dwelling place
  chosen_spanish_reading: mi morada
  alternative_spanish_readings:
  - mi tabernáculo
  rationale: La lectura principal de la POB en inglés privilegia el sentido amplio de presencia habitable de Dios. ‘Morada’ permite ese alcance y conserva el trasfondo del tabernáculo sin imponerlo como única opción.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar נַפְשִׁי sin una literalidad española que suene extraña
  english_pob_reading: I will not abhor you
  chosen_spanish_reading: no los abominaré
  alternative_spanish_readings:
  - mi alma no los abominará
  - no los rechazaré
  rationale: El hebreo usa una forma idiomática (‘mi alma’). Siguiendo la revisión inglesa, la traducción española puede expresar el contenido con naturalidad y mantener la intensidad afectiva del verbo sin introducir rareza innecesaria. La elección evita minimizar ‘gעל’ a ‘rechazar’.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La edición inglesa inicial decía ‘my soul will not abhor you’, pero la revisión más reciente optó por ‘I will not abhor you’ para sonar más natural sin perder el hebraísmo subyacente. La versión española sigue esa misma línea: conserva la fuerza del verbo y evita una literalidad innecesaria en la cláusula final.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el sujeto implícito en primera persona, según el estándar del proyecto.
  - ‘Morada’ mantiene el campo semántico de presencia divina sin sustituirlo por terminología eclesial tradicional no exigida por el hebreo.
  - ‘Abominar’ preserva la intensidad de געל mejor que ‘rechazar’.
  - Se evita ‘SEÑOR’ como máscara del nombre divino porque la tradición del proyecto favorece la transparencia del tetragrámaton.
