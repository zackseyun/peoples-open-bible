base_translation:
  language: en
  yaml_path: translation/ot/psalms/081/015.yaml
  text: In a little while I would subdue their enemies[b][a], and turn my hand against their adversaries.
  footnotes:
  - marker: a
    text: Or 'Soon I would subdue their enemies.' The Hebrew כִּמְעַט can express nearness in time ('soon') or, less likely here, 'almost.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I would turn back my hand upon their adversaries,' an idiom for directing power in judgment against them.
    reason: lexical_alternative
