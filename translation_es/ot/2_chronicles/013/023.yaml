translation:
  language: es
  text: Abías durmió con sus padres, y lo sepultaron en la Ciudad de David. Y Asa, su hijo, reinó en su lugar. En sus días la tierra tuvo descanso[a] por diez años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra estuvo quieta por diez años».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: Conservo el valor idiomático hebreo de la fórmula de muerte sin reducirla al glosado interpretativo «murió». En español, «durmió» mantiene la imagen bíblica tradicional y resulta natural en este contexto.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres de origen
  lexicon: HALOT
  rationale: «Padres» reproduce la relación familiar de la fórmula hebrea y es un equivalente bíblico claro en español. «Antepasados» suaviza el paralelismo tradicional, pero puede ser más explicativo que el hebreo.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo es activo plural; «lo sepultaron» conserva esa forma. Elegí «sepultaron» por su registro bíblico y digno, más cercano al tono narrativo de Crónicas.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the City of David
  chosen_spanish: en la Ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: Es un nombre propio geográfico establecido. Mantengo la mayúscula en «Ciudad de David» por tratarse de un topónimo bíblico fijo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: «Reinó» reproduce de forma directa el verbo de entronización/sucesión sin añadir un matiz incoativo no explicitado en el hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: «En su lugar» expresa la sucesión dinástica de manera natural en español y mantiene el sentido de reemplazo inherente a la expresión hebrea.
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante su reinado
  - En su tiempo
  lexicon: HALOT
  rationale: Conservo la fórmula temporal literal del hebreo. «En sus días» es natural en registro bíblico y deja abierta la referencia al período de reinado sin explicitarla.
- source_word: שָׁקְטָה
  english_pob_choice: had rest
  chosen_spanish: tuvo descanso
  alternatives_spanish:
  - estuvo quieta
  - estuvo en paz
  - descansó
  lexicon: HALOT
  rationale: El hebreo indica quietud/tranquilidad/liberación de disturbio. «Tuvo descanso» preserva bien el sentido bíblico de alivio nacional; no lo reduzco a «en paz» porque puede sugerir un matiz más amplio que el texto no exige.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del reino
  lexicon: HALOT
  rationale: «La tierra» es una equivalencia directa y adecuada para el ámbito territorial del texto. «País» sería posible, pero introduce una resonancia moderna menos acorde con el registro del pasaje.
- source_word: עֶשֶׂר שָׁנִים
  english_pob_choice: for ten years
  chosen_spanish: por diez años
  alternatives_spanish:
  - durante diez años
  - diez años
  lexicon: HALOT
  rationale: En español, «por diez años» comunica bien la duración y evita una construcción demasiado literal. Mantiene la extensión temporal sin añadir información.
theological_decisions:
- issue: Fórmula de muerte real «dormir con los padres»
  english_pob_reading: Retains the idiom 'slept with his fathers' rather than flattening it to 'died'.
  chosen_spanish_reading: «Durmió con sus padres» conserva la imagen idiomática de la muerte sin interpretarla como un simple fallecimiento.
  alternative_spanish_readings:
  - murió
  - se reunió con sus antepasados
  rationale: La fórmula hebrea es un eufemismo narrativo tradicional. En español conviene mantener la imagen, porque el texto de Crónicas usa una expresión formularia de muerte y sepultura real que no se debe despojar de su forma.
  doctrine_reference: Uso bíblico del eufemismo de muerte; narrativa real de Crónicas
- issue: Duración de la quietud de la tierra
  english_pob_reading: '''the land had rest for ten years'' with note ''Or the land was quiet for ten years.'''
  chosen_spanish_reading: «la tierra tuvo descanso por diez años» con alternativa implícita de quietud.
  alternative_spanish_readings:
  - la tierra estuvo quieta por diez años
  - la tierra descansó diez años
  rationale: El hebreo שָׁקְטָה puede expresar quietud, tranquilidad o ausencia de conflicto. «Tuvo descanso» es una opción bíblica que refleja el sentido histórico-político del pasaje; «estuvo quieta» también es posible, pero suena menos idiomática en español contemporáneo.
  doctrine_reference: Lectura histórica de Crónicas; matiz léxico de שָׁקַט
translation_notes:
  revision_awareness: 'Coincido con el estado de alta concordancia del audit trail inglés: no hay revisiones aplicadas y la traducción mantiene la misma lectura global. La única nota necesaria en español es la alternativa léxica para שָׁקְטָה, ya que «tuvo descanso» y «estuvo quieta» son equivalentes cercanos en el campo semántico del pasaje.'
  spanish_consistency_notes:
  - Mantengo «Yahvé» solo cuando el hebreo lo requiera; este versículo no contiene el tetragrámaton.
  - Uso «durmió» en lugar de «murió» para conservar la fórmula narrativa hebrea.
  - Conservo mayúsculas en «Ciudad de David» por tratarse de un topónimo bíblico fijo.
  - «En sus días» y «en su lugar» siguen el registro bíblico natural del pasaje.
