translation:
  language: es
  text: Entonces este Sesbasar vino[a] y puso los cimientos de la casa de Dios que está en Jerusalén; y desde entonces hasta ahora se sigue construyendo[b], pero no está terminada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «dio los cimientos». El arameo usa una expresión idiomática de fundamento.
    reason: lexical_alternative
  - marker: b
    text: O, más formalmente, «está siendo construido». El arameo expresa un proceso continuo con valor pasivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: HALOT
  rationale: Marca secuencia narrativa temporal. «Entonces» mantiene el avance del relato con naturalidad en español.
- source_word: שֵׁשְׁבַּצַּר
  english_pob_choice: Sheshbazzar
  chosen_spanish: Sesbasar
  alternatives_spanish:
  - Sheshbazzar
  lexicon: Transliteración tradicional ajustada al español
  rationale: Se conserva el nombre propio, adaptado a la fonética ortográfica española para lectura pública, sin alterar la identificación del personaje.
- source_word: דֵּךְ
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  - aquel
  lexicon: HALOT
  rationale: El demostrativo apunta al personaje mencionado en el contexto inmediato; «este» reproduce la deixis con naturalidad.
- source_word: אֲתָא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: HALOT
  rationale: Verbo narrativo simple. «Vino» conserva el movimiento y el ritmo del relato sin añadir matices no requeridos.
- source_word: יְהַב אֻשַּׁיָּא
  english_pob_choice: laid the foundations
  chosen_spanish: puso los cimientos
  alternatives_spanish:
  - echó los cimientos
  - sentó los cimientos
  - estableció los cimientos
  lexicon: HALOT
  rationale: El arameo es literalmente «dio cimientos», pero en español «poner los cimientos» expresa de forma idiomática la acción constructiva y mantiene la fuerza material del original.
- source_word: בֵית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión fuente «casa de Dios» en vez de sustituirla por «templo», porque el texto arameo usa esa formulación concreta.
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que está en Jerusalén
  - que estaba en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa sitúa la casa; el presente español resulta natural para una ubicación estable y sigue de cerca el valor locativo del arameo.
- source_word: וּמִן אֱדַיִן וְעַד כְּעַן
  english_pob_choice: and from then until now
  chosen_spanish: y desde entonces hasta ahora
  alternatives_spanish:
  - y desde aquel tiempo hasta ahora
  - y desde entonces hasta el presente
  lexicon: HALOT
  rationale: La secuencia temporal abarcarca desde el acto inicial hasta el momento del hablante. «Desde entonces hasta ahora» es idiomático y fiel.
- source_word: מִתְבְּנֵא
  english_pob_choice: it has been being built
  chosen_spanish: se sigue construyendo
  alternatives_spanish:
  - está siendo construido
  - ha estado siendo construido
  lexicon: HALOT
  rationale: El arameo expresa un proceso pasivo/durativo continuo. «Se sigue construyendo» comunica continuidad y evita una pasiva demasiado pesada en español, sin borrar el aspecto progresivo.
- source_word: וְלָא שְׁלִם
  english_pob_choice: but it is not finished
  chosen_spanish: pero no está terminada
  alternatives_spanish:
  - pero no ha sido terminada
  - pero no está completa
  lexicon: HALOT
  rationale: La forma negativa indica no-completitud al presente. «No está terminada» mantiene la idea de obra aún inconclusa con claridad natural.
theological_decisions:
- issue: Referencia al nombre divino en la expresión «casa de Dios»
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - la casa de Yahvé
  - el templo de Dios
  rationale: Aquí el texto arameo dice explícitamente «Dios», no el Tetragrámaton. Por eso se mantiene «Dios» y no se introduce «Yahvé» en la traducción principal.
  doctrine_reference: Faithfulness to source wording; distinction between אֱלָהָא and יהוה
- issue: Aspecto durativo del verbo de construcción
  english_pob_reading: it has been being built
  chosen_spanish_reading: se sigue construyendo
  alternative_spanish_readings:
  - está siendo construido
  - ha estado siendo construido
  rationale: La referencia inglesa fue revisada para reflejar un proceso continuo. En español, «se sigue construyendo» preserva ese valor progresivo sin forzar una estructura demasiado artificial.
  doctrine_reference: Aspect and verbal semantics in Aramaic narrative
- issue: Selección léxica para la acción de fundamento
  english_pob_reading: laid the foundations
  chosen_spanish_reading: puso los cimientos
  alternative_spanish_readings:
  - echó los cimientos
  - sentó los cimientos
  rationale: El arameo literalmente habla de «dar cimientos», pero el español más natural y fiel al acto constructivo es «poner los cimientos». Evita calco opaco y conserva el sentido factual.
  doctrine_reference: Lexical equivalence and idiomatic Spanish
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más directamente pasiva y progresiva («it has been being built») sobre «has been under construction». La versión española refleja ese sentido continuo con una construcción natural («se sigue construyendo»), manteniendo la idea de proceso inacabado desde entonces hasta ahora.
  spanish_consistency_notes:
  - Se mantiene «Dios» para בֵית אֱלָהָא, en coherencia con el estándar POB de no reemplazar términos explícitos del original por equivalentes litúrgicos más interpretativos.
  - Se translitera el nombre propio en forma española «Sesbasar» para facilitar lectura pública sin perder identificabilidad.
  - 'Se preserva la tensión aspectual del arameo: acción inicial de cimiento seguida de construcción continua e incompletitud final.'
  - No se introduce «Yahvé» porque el verso no contiene יהוה; el término fuente es אֱלָהָא («Dios»).
