translation:
  language: es
  text: También mencionó a Job[a], que mantuvo todos los caminos de la justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y hizo bien a los que enderezan caminos». El testimonio hebreo, en cambio, lee «que mantuvo todos los caminos de la justicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: וגם
  english_pob_choice: He also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: El hebreo añade otra figura al catálogo de justos recordados; «También» conserva el valor aditivo sin forzar un sujeto explícito que el español no necesita aquí.
- source_word: הזכיר
  english_pob_choice: mentioned
  chosen_spanish: mencionó
  alternatives_spanish:
  - recordó
  - hizo mención de
  lexicon: HALOT
  rationale: El verbo hebreo puede significar mencionar o traer a la memoria. «Mencionó» reproduce bien el sentido directo y la naturalidad del español, mientras que la tradición griega con ἐμνήσθη queda registrada en la nota.
- source_word: את איוב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente transliterado; no requiere adaptación semántica.
- source_word: ומכלכל
  english_pob_choice: who upheld
  chosen_spanish: que sostuvo
  alternatives_spanish:
  - que mantuvo
  - que sustentó
  - que dirigió
  lexicon: HALOT
  rationale: El participio de כלכל admite la idea de sostener, sustentar o dirigir. En este contexto, con «caminos de la justicia», «sostuvo» conserva la fuerza de apoyo perseverante y evita una paráfrasis más interpretativa que «dirigió».
- source_word: כל דרכי צדק
  english_pob_choice: all the ways of righteousness
  chosen_spanish: todos los caminos de la justicia
  alternatives_spanish:
  - todos los caminos de la rectitud
  - todas las sendas de la justicia
  - todos los caminos de la justicia
  lexicon: HALOT
  rationale: «דרכי» es literalmente «caminos/sendas» y «צדק» puede ser «justicia» o «rectitud». Se eligió «justicia» por su fuerza bíblica y su equivalencia contextual; «caminos» conserva la imagen hebrea y el plural totalizante de «todos».
theological_decisions:
- issue: Diferencia entre el hebreo conservado y el paralelo griego en la segunda mitad del versículo
  english_pob_reading: 'Primary text follows the Hebrew: ''who upheld all the ways of righteousness,'' with a footnote preserving the Greek alternative.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «que sostuvo todos los caminos de la justicia», con nota que preserva la alternativa griega.'
  alternative_spanish_readings:
  - «y hizo bien a los que enderezan caminos»
  - «y benefició a los que enderezan caminos»
  rationale: Donde el hebreo está preservado, se toma como texto principal. La tradición griega ofrece una formulación sustancialmente distinta; por eso se conserva en la nota sin desplazar la lectura hebrea.
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo conservado; el paralelo griego se registra como tradición alternativa real'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: la idea de ''maintained'' fue actualizada a ''upheld''; en español se optó por «sostuvo», que conserva la noción de sostener/apoyar de forma natural. La nota mantiene explícita la divergencia del paralelo griego.'
  spanish_consistency_notes:
  - Se mantuvo «Job» como nombre propio sin transliteración adicional.
  - Se prefirió «justicia» para צדק por consistencia con el léxico POB y por la fuerza bíblica del término en este contexto.
  - Se evitó «SEÑOR» u otra convención de máscara porque el versículo no contiene el tetragrámaton ni un caso equivalente.
