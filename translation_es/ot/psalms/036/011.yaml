review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y acierta en מְשֹׁךְ = «Prolonga», לְיֹדְעֶיךָ = «a los que te conocen» y לְיִשְׁרֵי לֵב = «a los rectos de corazón». Sin embargo, se aparta de dos decisiones centrales del audit trail inglés: חַסְדְּךָ fue fijado como «steadfast love», no «mercy», y וְצִדְקָתְךָ fue fijado como «righteousness», con «justice» solo como alternativa. En español, «misericordia» reduce el matiz de amor leal/pactual, y «justicia» desplaza innecesariamente el sentido principal de «rectitud/justicia» moral-covenantal señalado por POB.'
  spanish_quality_summary: 'El español es claro y legible, pero puede alinearse mejor con el proyecto usando una pareja más paralela y semánticamente precisa: «amor constante» y «rectitud». «Prolonga» funciona bien en registro bíblico moderno. La nota actual de «dibuja/estira» suena poco natural; conviene «saca/extiende» o mantener la formulación heredada del inglés como alternativa más idiomática.'
  glossary_alignment: No hay conflicto con términos globales como Yahvé/Mesías. Sí hay desalineación con las decisiones léxicas documentadas de חֶסֶד y צְדָקָה. Para este versículo, «amor constante» refleja mejor «steadfast love», y «rectitud» refleja la elección principal inglesa «righteousness», dejando «justicia» como alternativa en nota si se desea.
  issues:
  - severity: high
    issue: חַסְדְּךָ traducido como «misericordia»
    rationale: El audit trail inglés eligió «steadfast love» por su fuerza de amor leal y duradero. «Misericordia» es comprensible pero estrecha el campo semántico y pierde el matiz pactual destacado en la justificación.
  - severity: medium
    issue: וְצִדְקָתְךָ traducido como «justicia» en el texto principal
    rationale: El inglés fijó «righteousness» como lectura principal y «justice» como alternativa. En este paralelismo poético, «rectitud» o «justicia» pueden servir, pero la principal debería reflejar la elección auditada.
  - severity: low
    issue: Nota de מְשֹׁךְ con «dibuja/estira»
    rationale: «Dibuja» no representa bien el valor verbal en español bíblico natural. Una alternativa como «Extiende» y la nota «literalmente, ‘saca/extiende’» comunica mejor la imagen sin sonar extraña.
  revised_spanish_text: Prolonga tu amor constante[a] a los que te conocen, y tu rectitud[b] a los rectos de corazón.
  revised_footnotes:
  - marker: a
    text: O «Extiende tu amor constante»; literalmente, «saca/extiende tu amor constante».
    reason: lexical_alternative
  - marker: b
    text: O «tu justicia».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar con mayor fidelidad las decisiones léxicas documentadas por POB: חֶסֶד como amor leal y duradero («amor constante») y צְדָקָה con sentido principal de «rectitud», dejando «justicia» como alternativa. Se conserva «Prolonga» porque reproduce bien el valor contextual de מְשֹׁךְ en español natural.'
