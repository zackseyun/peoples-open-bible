translation:
  language: es
  text: No seas para mí causa de terror[a]; tú eres mi refugio en el día de la calamidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «un objeto de pavor», «una causa de consternación» o «una ruina».
    reason: lexical_alternative
  - marker: b
    text: Aquí «calamidad» significa adversidad o desastre, no mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No seas
  alternatives_spanish:
  - No te conviertas en
  - No llegues a ser
  lexicon: HALOT
  rationale: La negación exhortativa con el imperfecto/jusivo se expresa naturalmente en español con una prohibición directa; «No seas» conserva el valor de súplica y mandato negativo.
- source_word: תִּהְיֵה
  english_pob_choice: be
  chosen_spanish: seas
  alternatives_spanish:
  - te conviertas
  - llegues a ser
  lexicon: HALOT
  rationale: Aquí funciona como estado en una petición negativa. «Seas» reproduce el verbo copulativo sin forzar un matiz de cambio que el contexto no exige.
- source_word: לִמְחִתָּה
  english_pob_choice: a terror
  chosen_spanish: un terror
  alternatives_spanish:
  - un objeto de pavor
  - una causa de consternación
  - una ruina
  lexicon: HALOT
  rationale: El término puede abarcar terror, consternación o ruina/shattering. En esta oración, la traducción más breve y directa es «un terror», que conserva la fuerza afectiva y la relación de efecto sobre el hablante.
- source_word: מַחֲסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi abrigo
  - mi amparo
  lexicon: HALOT
  rationale: «Refugio» es la equivalencia más estable y reconocible en lenguaje bíblico de oración, y mantiene la imagen de amparo protector.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - en tiempo de
  lexicon: HALOT
  rationale: La preposición con «día» admite varias opciones; «en el día de» conserva la construcción semítica de manera natural en español.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desgracia
  alternatives_spanish:
  - calamidad
  - desastre
  - mal
  lexicon: HALOT
  rationale: Aquí el sustantivo denota adversidad/calamidad, no mal moral. «Desgracia» comunica bien esa idea en español contemporáneo y evita la ambigüedad ética de «mal».
theological_decisions:
- issue: Cómo traducir רָעָה sin implicar mal moral
  english_pob_reading: disaster here means calamity or trouble, not moral evil
  chosen_spanish_reading: desgracia = calamidad/adversidad, no mal moral
  alternative_spanish_readings:
  - mal
  - evil
  - calamidad
  rationale: El contexto es una petición de protección en una situación adversa; por eso se evita una traducción moralizante. «Desgracia» transmite el sentido de infortunio o calamidad sin confundirlo con pecado o maldad.
  doctrine_reference: Principio de primacía del texto original y claridad semántica en contextos de juicio/adversidad.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación asegurando que cada marcador de nota esté anclado exactamente en el texto principal: [a] en «terror» y [b] en «desgracia».'
  spanish_consistency_notes:
  - Se mantuvo el registro reverente y directo propio de una súplica.
  - Se evitó el calco rígido de «no llegues a ser» porque «No seas» es natural y fiel al valor del hebreo.
  - Se preservó la distinción semántica entre adversidad y mal moral en רָעָה.
  - «Refugio» se conserva como término bíblico estable y transparente en español.
