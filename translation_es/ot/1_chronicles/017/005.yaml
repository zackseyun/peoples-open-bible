translation:
  language: es
  text: Porque no he habitado en una casa desde el día en que hice subir a Israel hasta este día[a], sino que he ido de tienda en tienda y de morada en morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he ido de tienda en tienda y de tabernáculo en tabernáculo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  english_pob_choice: have not lived
  chosen_spanish: no he habitado
  alternatives_spanish:
  - no he vivido
  - no he morado
  lexicon: HALOT
  rationale: El verbo יָשַׁב suele expresar habitar o residir cuando rige un lugar. En español, «habitar» conserva ese sentido locativo con dignidad y evita la falsa literalidad de «sentarme».
- source_word: בְּבַיִת
  english_pob_choice: in a house
  chosen_spanish: en una casa
  alternatives_spanish:
  - en la casa
  - en un templo
  lexicon: HALOT
  rationale: בית aquí es un sustantivo indefinido y general; «casa» comunica mejor que «templo», que introduciría una especificación no presente en el hebreo.
- source_word: הֶעֱלֵיתִי אֶת יִשְׂרָאֵל
  english_pob_choice: I brought up Israel
  chosen_spanish: hice subir a Israel
  alternatives_spanish:
  - saqué a Israel
  - guié a Israel hacia arriba
  lexicon: HALOT
  rationale: La forma causativa expresa «hacer subir/traer arriba». «Hice subir a Israel» mantiene la imagen verbal del hebreo y la agencia divina sin forzar una paráfrasis histórica más explícita.
- source_word: וָאֶהְיֶה
  english_pob_choice: I have gone
  chosen_spanish: he estado
  alternatives_spanish:
  - he sido
  - he ido
  lexicon: HALOT
  rationale: El hebreo literalmente dice «y he sido/estuve», pero el contexto siguiente de movimiento entre tiendas pide en español una expresión de permanencia o condición itinerante. «He estado» preserva la idea sin sobreinterpretar el verbo.
- source_word: מֵאֹהֶל אֶל אֹהֶל
  english_pob_choice: from tent to tent
  chosen_spanish: de tienda en tienda
  alternatives_spanish:
  - de una tienda a otra
  - de carpa a carpa
  lexicon: HALOT
  rationale: La repetición hebrea se refleja de manera natural en español con una construcción paralela. «Tienda» es el término más transparente y bíblicamente reconocible para אֹהֶל.
- source_word: וּמִמִּשְׁכָּן
  english_pob_choice: and from dwelling place to dwelling place
  chosen_spanish: y de morada en morada
  alternatives_spanish:
  - y de tabernáculo en tabernáculo
  - y de lugar de morada en lugar de morada
  lexicon: HALOT
  rationale: מִשְׁכָּן puede referirse a morada o tabernáculo. «Morada» conserva el sentido de residencia/dwelling sin imponer el término técnico «tabernáculo» en el texto principal, manteniendo el paralelismo con la frase anterior.
theological_decisions:
- issue: Término para la ausencia de residencia divina en una casa permanente frente a lenguaje de santuario móvil
  english_pob_reading: Use 'house' and 'dwelling place' rather than 'temple' in the main text.
  chosen_spanish_reading: Usar «casa» y «morada» en vez de «templo» o un tecnicismo fijo en el texto principal.
  alternative_spanish_readings:
  - Usar «templo» para בית
  - Usar «tabernáculo» para משכן
  rationale: El versículo contrasta una casa fija con una secuencia de alojamientos móviles. «Templo» introduciría una idea posterior no explícita en el hebreo; «morada» conserva el valor semántico amplio de משכן y permite mantener el paralelismo sin cargar el verso con terminología técnica innecesaria.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readable modern Spanish without importing later terminology.'
translation_notes:
  revision_awareness: 'Se siguió la última revisión del POB en inglés: la última frase quedó más cercana al hebreo con el paralelismo «de morada en morada». La nota alternativa se mantiene solo para reflejar la posibilidad léxica de משכן como «tabernáculo».'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo hebreo con dos miembros: «de tienda en tienda» / «de morada en morada».'
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - «He habitado» y «he estado» se usan con valor aspectual compatible con el contexto narrativo y la movilidad descrita.
