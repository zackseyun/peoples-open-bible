translation:
  language: es
  text: Cuando llegaron a la era de Nacón[a], Uzá extendió la mano hacia el arca de Dios y la sujetó, porque los bueyes tropezaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «la era de Nahón» o, menos probablemente, «la era establecida/firme».
    reason: lexical_alternative
  - marker: b
    text: O «los bueyes resbalaron» o «los bueyes casi la volcaron».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּרֶן
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - lugar de trilla
  - era de trilla
  lexicon: HALOT
  rationale: En español bíblico actual, «era» comunica de manera natural el lugar agrícola para trillar. Mantiene el sentido del inglés POB «threshing floor» sin introducir una perífrasis innecesaria.
- source_word: נָכוֹן
  english_pob_choice: Nacon’s
  chosen_spanish: Nacón
  alternatives_spanish:
  - de Nacón
  - la era establecida/firme
  lexicon: HALOT
  rationale: El hebreo puede leerse como nombre propio en aposición al sustantivo; por eso se translitera como topónimo «Nacón». Se conserva la alternativa adjetival en nota porque el sentido «establecido/firmado» también es posible.
- source_word: וַיִּשְׁלַח
  english_pob_choice: reached out
  chosen_spanish: extendió la mano
  alternatives_spanish:
  - alargó la mano
  - estiró la mano
  lexicon: HALOT
  rationale: El verbo expresa aquí el movimiento de la mano hacia el objeto. «Extendió la mano» es una equivalencia idiomática clara en español y refleja la dirección del gesto.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca
  lexicon: HALOT
  rationale: Se conserva la construcción completa para reflejar explícitamente el sintagma hebreo y la identificación sagrada del arca.
- source_word: וַיֹּאחֶז בּוֹ
  english_pob_choice: took hold of it
  chosen_spanish: la tomó
  alternatives_spanish:
  - la sujetó
  - se agarró de ella
  - la asió
  lexicon: HALOT
  rationale: El contexto narrativo muestra a Uzá poniendo la mano sobre el arca. «La tomó» comunica de forma breve y natural la acción de agarrar/sujetar sin añadir violencia que el hebreo no exige.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la causa de la acción de Uzá; «porque» es la opción más directa y transparente en español.
- source_word: שָׁמְטוּ
  english_pob_choice: stumbled
  chosen_spanish: resbalaron
  alternatives_spanish:
  - se deslizaron
  - tropezaron
  - casi volcaron el arca
  lexicon: HALOT
  rationale: El verbo puede expresar deslizarse o dejar caer. En este contexto con los bueyes como sujeto, «resbalaron» preserva la idea de pérdida de firmeza sin sobreexplicar el grado de peligro.
- source_word: הַבָּקָר
  english_pob_choice: the oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - el ganado
  - los toros
  lexicon: HALOT
  rationale: En este contexto de tiro, בקר alude a animales de trabajo; «bueyes» es preciso y natural en español, y más específico que «ganado».
theological_decisions:
- issue: Motivo inmediato de la acción de Uzá
  english_pob_reading: Uzza acted because the oxen stumbled, creating an apparent threat to the ark.
  chosen_spanish_reading: Uzá actuó porque los bueyes resbalaron, creando un peligro inmediato para el arca.
  alternative_spanish_readings:
  - Uzá actuó porque los bueyes casi volcaron el arca
  - Uzá actuó porque los bueyes se deslizaron
  rationale: El hebreo solo indica una causa ligada al movimiento inestable de los bueyes; no añade más explicación. La traducción debe conservar esa tensión narrativa sin expandir el hecho más allá de lo que dice el texto. «Resbalaron» mantiene la ambigüedad sobre la mecánica exacta del peligro.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Lectura de נָכוֹן como topónimo o adjetivo
  english_pob_reading: Nacon’s / possibly 'the fixed/established threshing floor.'
  chosen_spanish_reading: Nacón
  alternative_spanish_readings:
  - la era establecida
  - la era firme
  - la era de Nacón
  rationale: El POB inglés preserva la tensión lexicográfica entre nombre propio y adjetivo. En español, el cuerpo principal sigue la lectura de topónimo, mientras la nota conserva la alternativa semántica para no borrar la posibilidad documental del adjetivo.
  doctrine_reference: Translation philosophy §§1, 2, 4
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; la presente redacción sigue el estado más reciente, con concordancia alta y sin cambios necesarios según el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «arca de Dios» para reflejar fielmente el sintagma hebreo completo.
  - Se usa «Uzá» como forma hispanizada del nombre propio, consistente con el POB en español.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - La nota del marcador b conserva la ambigüedad verbal entre resbalar, deslizarse y volcar, sin decidir más de lo que el hebreo afirma.
