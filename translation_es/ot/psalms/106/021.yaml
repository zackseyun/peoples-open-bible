translation:
  language: es
  text: Se olvidaron de Dios, su Salvador[a], que había hecho grandes cosas en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su libertador». El participio hebreo puede destacar a Dios como el que los salva.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכְחוּ
  english_pob_choice: they forgot
  chosen_spanish: se olvidaron de
  alternatives_spanish:
  - olvidaron
  - han olvidado
  lexicon: HALOT
  rationale: El qal perfecto 3cp narra una acción pasada completa. En español, «se olvidaron de» expresa bien ese hecho histórico y suena natural en el recuento salmódico.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - el Dios Poderoso
  lexicon: HALOT
  rationale: Aunque אֵל puede sugerir fuerza, aquí identifica al Dios de Israel. «Dios» comunica con claridad esa designación sin añadir énfasis que el contexto no exige.
- source_word: מוֹשִׁיעָם
  english_pob_choice: their Savior
  chosen_spanish: su Salvador
  alternatives_spanish:
  - su libertador
  - el que los salva
  lexicon: HALOT
  rationale: El participio hifil con sufijo expresa a quien salva como rasgo característico. «Su Salvador» preserva la cualidad nominal y funciona de manera natural en español; «salvador» conserva mejor el paralelismo teológico que «libertador».
- source_word: עֹשֶׂה
  english_pob_choice: who had done
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - hacedor de
  lexicon: HALOT
  rationale: 'El participio de עשה modifica a Dios como una descripción relativa. En español, la cláusula relativa «que había hecho» refleja el trasfondo retrospectivo del recuerdo: olvidaron al Dios que ya había actuado por ellos.'
- source_word: גְדֹלֹות
  english_pob_choice: great things
  chosen_spanish: grandes cosas
  alternatives_spanish:
  - grandes hechos
  - grandes obras
  lexicon: HALOT
  rationale: El sustantivo plural/substantivado de גדול permite una expresión amplia. «Grandes cosas» es fiel y sobria; «hechos» u «obras» serían posibles, pero estrechan más el alcance.
- source_word: בְּמִצְרָיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición ב marca ubicación. «En Egipto» es la correspondencia directa y suficientemente clara en español contemporáneo.
theological_decisions:
- issue: Cómo renderizar אֵל en relación con el Dios del pacto
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Poderoso
  - el Dios fuerte
  rationale: El versículo no desarrolla una afirmación titulativa separada sobre la fuerza divina; simplemente señala al Dios olvidado por Israel. «Dios» mantiene esa referencia sin sobrecargar el texto.
  doctrine_reference: Primacía del sentido original y claridad reverente en traducción bíblica.
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en lo esencial: perfecto narrativo, identificación de אֵל como «Dios», y participio de מוֹשִׁיעָם con valor nominal. No se documentaron revisiones posteriores que alteren la decisión base.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y directo de la divinidad como «Dios», coherente con la pauta del proyecto para אֵל en este contexto.
  - «Su Salvador» conserva la cualidad del participio sin forzar una paráfrasis expansiva.
  - La nota al pie preserva la alternativa «libertador» porque el audit trail inglés también la documenta como posibilidad léxica.
