translation:
  language: es
  text: Él los barrió de la tierra y los arrancó[a], y hizo cesar de la tierra su memoria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo וְסִחָם es difícil; el paralelo griego apoya el sentido de remover o borrar. Una traducción alternativa es: «los borró de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסִחָם
  english_pob_choice: he swept them
  chosen_spanish: los barrió
  alternatives_spanish:
  - los borró
  - los eliminó
  - los barrió de allí
  lexicon: HALOT
  rationale: El hebreo es poco frecuente y algo incierto en aislamiento; el paralelo griego apoya la idea de una remoción contundente. «Barrió» conserva la imagen viva de expulsión/limpieza sin precisar indebidamente si el matiz primario es secar, quitar o destruir.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra del país
  - de la tierra / del país
  lexicon: HALOT
  rationale: «אֶרֶץ» puede significar «tierra» o «país», pero aquí, con la repetición en ambos miembros y el griego ἀπὸ γῆς, el sentido universal de erradicación queda mejor con «de la tierra».
- source_word: וַיִּתְּשֵׁם
  english_pob_choice: and uprooted them
  chosen_spanish: los arrancó
  alternatives_spanish:
  - los desarraigó
  - los arrancó de raíz
  - los desplantó
  lexicon: HALOT
  rationale: El verbo נתשׁ expresa sacar de raíz. «Arrancó» es natural en español y mantiene la fuerza metafórica; el contexto ya comunica la idea de desarraigo total.
- source_word: וַיַּשְׁבֵּת
  english_pob_choice: and he made ... cease
  chosen_spanish: hizo cesar
  alternatives_spanish:
  - puso fin a
  - acabó con
  - hizo desaparecer
  lexicon: HALOT
  rationale: El hifil de שׁבת significa «causar que cese». «Hizo cesar» reproduce con precisión esa causatividad y evita volverlo una mera destrucción genérica.
- source_word: זִכְרָם
  english_pob_choice: their memory
  chosen_spanish: su memoria
  alternatives_spanish:
  - su recuerdo
  - su remembranza
  - su memorial
  lexicon: HALOT
  rationale: «Memoria» es fiel y natural en español bíblico contemporáneo. Mantiene la idea de borrar el recuerdo público o la permanencia de su nombre/identidad.
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés y la revisión más reciente indica que no se requieren cambios. Se conservó la correspondencia con el hebreo y el griego paralelo: remoción contundente, arrancar de raíz y cesación de la memoria.'
  spanish_consistency_notes:
  - Se usa «tierra» de manera uniforme para מֵאֶרֶץ / ἀπὸ γῆς, preservando el alcance universal.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente; el versículo no contiene el Tetragrámaton ni lenguaje cristológico.
  - «Memoria» se mantiene como sustantivo abstracto para reflejar זִכְרָם y el paralelismo con la desaparición pública del recuerdo.
