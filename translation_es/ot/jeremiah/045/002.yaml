lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Así es como
  lexicon: HALOT
  rationale: La fórmula profética introductoria funciona en español de manera natural con 'Así dice', que conserva el registro solemne sin sonar forzado.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En la fórmula mensajera profética, el presente performativo en español ('dice') reproduce bien el valor proclamativo del hebreo y del inglés auditado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma editorial de la POB para español, conforme al criterio del proyecto de no sustituirlo por una máscara como 'SEÑOR'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se refleja de forma directa y plenamente inteligible en español, preservando el título pactual.
- source_word: עָלֶיךָ
  english_pob_choice: concerning you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - sobre ti
  - en cuanto a ti
  - contra ti
  lexicon: HALOT
  rationale: '''Acerca de ti'' conserva la amplitud semántica de על con אמר sin cargar el sentido hacia hostilidad (''contra ti'') ni simple destinatario (''a ti'').'
- source_word: בָּרוּךְ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruch
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma española usual 'Baruc', manteniendo identificación clara y lectura natural en español.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La POB inglesa conserva el nombre propio divino; en español, la forma editorial coherente del proyecto es 'Yahvé', por fidelidad al Tetragrama y por legibilidad eclesial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de עָלֶיךָ con אמר
  english_pob_reading: concerning you
  chosen_spanish_reading: acerca de ti
  alternative_spanish_readings:
  - contra ti
  - sobre ti
  - a ti
  rationale: El hebreo permite un rango que la POB inglesa resolvió como 'concerning you' con nota alternativa. En español, 'acerca de ti' retiene la neutralidad del mensaje dirigido a Baruc sin decidir prematuramente por una lectura hostil.
  doctrine_reference: HALOT / sintaxis hebrea de על + pronombre en fórmulas proféticas
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés sin depender mecánicamente de él: conserva la fórmula profética, el nombre divino según la política española del proyecto, y la ambigüedad de עלֶיךָ mediante una elección neutral y una nota alternativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar español del proyecto.
  - '''Baruc'' adapta el nombre propio a la ortografía española sin alterar la identidad del referente.'
  - La puntuación con dos puntos reproduce la apertura de un oráculo introductorio y prepara la cita siguiente.
