translation:
  language: es
  text: y los patrusitas[a], los casluhitas (de quienes salieron los filisteos), y los caftoritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘de allí salieron los filisteos’. El hebreo vincula de manera más natural esta cláusula con los casluhitas en Crónicas, aunque Génesis 10:14 tiene la misma redacción y la tradición más amplia también asocia a los filisteos con Caftor (cf. Amós 9:7; Jeremías 47:4).
    reason: cross_reference
lexical_decisions:
- source_word: פַּתְרֻסִים
  english_pob_choice: Pathrusites
  chosen_spanish: patrusitas
  alternatives_spanish:
  - patrusitas
  - pathrusitas
  lexicon: HALOT
  rationale: Se conserva el nombre étnico por transliteración, como en la base inglesa. En español, ‘patrusitas’ evita una forma demasiado anglicada y mantiene la relación con Pathros sin traducir indebidamente el etnónimo.
- source_word: כַּסְלֻחִים
  english_pob_choice: Casluhites
  chosen_spanish: casluhitas
  alternatives_spanish:
  - kasluhitas
  lexicon: HALOT
  rationale: También se translitera el etnónimo desconocido, preservando la forma hebrea y evitando inferencias sobre su identificación histórica.
- source_word: אֲשֶׁר יָצְאוּ מִשָּׁם
  english_pob_choice: from whom ... came
  chosen_spanish: de quienes salieron
  alternatives_spanish:
  - de donde salieron
  - de quienes procedieron
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘que salieron de allí’. En español, ‘de quienes salieron’ sigue la decisión inglesa de vincular la cláusula con el grupo antecedente y mantiene la relación de origen sin volver demasiado espacial la expresión.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: Se usa el etnónimo español usual. El artículo plural es natural en este contexto genealógico y corresponde al grupo conocido en la tradición bíblica.
- source_word: כַּפְתֹּרִים
  english_pob_choice: Caphtorites
  chosen_spanish: caftoritas
  alternatives_spanish:
  - captoritas
  lexicon: HALOT
  rationale: Se translitera el etnónimo como nombre de pueblo, conservando la referencia a Caphtor. ‘Caftoritas’ sigue la forma tradicional hispana del topónimo sin suavizar el vínculo étnico.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: HALOT
  rationale: En una lista genealógica, el marcador objeto más conjunción se refleja con coordinación simple en español, sin calco del marcador hebreo.
theological_decisions:
- issue: Relación de origen de los filisteos
  english_pob_reading: The Hebrew most naturally links this clause to the Casluhites here in Chronicles, though Genesis 10:14 has the same wording and the broader tradition also associates the Philistines with Caphtor.
  chosen_spanish_reading: Se mantiene en el texto principal la lectura de que los filisteos salieron de los casluhitas, sin borrar la tensión con la tradición que los vincula con Caftor.
  alternative_spanish_readings:
  - los filisteos (que salieron de allí)
  - los filisteos, procedentes de Caftor
  rationale: El texto hebreo de Crónicas conecta naturalmente la cláusula relativa con los casluhitas; a la vez, la tradición bíblica más amplia también asocia a los filisteos con Caftor. La traducción principal conserva esa conexión inmediata y la nota explica la tensión sin resolverla artificialmente.
  doctrine_reference: Génesis 10:14; Amós 9:7; Jeremías 47:4
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al pasaje hebreo y al audit trail inglés; se conserva la misma lectura genealógica y la misma observación de tensión textual/tradicional.'
  spanish_consistency_notes:
  - Se prefirió transliterar los tres etnónimos para mantener la estructura genealógica del verso.
  - ‘De quienes salieron’ reproduce la decisión inglesa de ligar la relativa al grupo precedente, evitando un calco espacial excesivo.
  - Se usa ‘filisteos’ con artículo en el texto principal por naturalidad del español, mientras la nota preserva la observación literal del hebreo.
