translation:
  language: es
  text: Sin embargo, a pesar de todo esto[a], su traicionera hermana Judá no volvió a mí con todo su corazón, sino solo con falsedad[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá, su hermana traicionera». El hebreo permite esta relación appositiva, y la traducción adopta el orden más natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «sino falsamente» / «sino con engaño», indicando que el retorno de Judá no fue sincero sino meramente externo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם / בְּכָל זֹאת
  english_pob_choice: Yet / in spite of all this
  chosen_spanish: Sin embargo, a pesar de todo esto
  alternatives_spanish:
  - Y además, a pesar de todo esto
  - No obstante, pese a todo esto
  lexicon: HALOT
  rationale: La concesión y el contraste del hebreo se expresan con una fórmula natural en español. «Sin embargo» conserva el giro adversativo de וְגַם en contexto, y «a pesar de todo esto» traduce bien el valor concesivo de בְּכָל זֹאת sin perder referencia a los actos previos de juicio y advertencia.
- source_word: שָׁבָה אֵלַי
  english_pob_choice: did not return to me
  chosen_spanish: no volvió a mí
  alternatives_spanish:
  - no retornó a mí
  - no se volvió a mí
  lexicon: HALOT
  rationale: «Volver a mí» mantiene el sentido relacional y de restauración del verbo שׁוּב en contexto de pacto. Se evita una paráfrasis más doctrinal que el texto no exige, pero se conserva la carga de regreso y respuesta a Dios.
- source_word: בָּגוֹדָה
  english_pob_choice: treacherous
  chosen_spanish: traicionera
  alternatives_spanish:
  - infiel
  - desleal
  lexicon: HALOT
  rationale: El adjetivo hebreo comunica ruptura de lealtad de pacto. «Traicionera» reproduce mejor la fuerza de la deslealtad activa que «infiel», y encaja con la imagen profética de Judá como hermana.
- source_word: אֲחוֹתָהּ יְהוּדָה
  english_pob_choice: her treacherous sister Judah
  chosen_spanish: su hermana traicionera Judá
  alternatives_spanish:
  - Judá, su hermana traicionera
  - su hermana, Judá, traicionera
  lexicon: HALOT
  rationale: Se conserva la apposición y la metáfora familiar. En español, el orden «su hermana traicionera Judá» suena natural y mantiene la relación de hermana sin borrar el peso retórico del antropomorfismo nacional.
- source_word: בְּכָל לִבָּהּ
  english_pob_choice: with all her heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con su corazón entero
  - de todo corazón
  lexicon: HALOT
  rationale: Es el equivalente idiomático más claro en español para expresar integridad, sinceridad y totalidad de intención. Conserva el contraste con la respuesta meramente externa e insincera de Judá.
- source_word: כִּי אִם בְּשֶׁקֶר
  english_pob_choice: but only in falsehood
  chosen_spanish: sino solo en falsedad
  alternatives_spanish:
  - sino en falso
  - pero únicamente con engaño
  - sino solo falsamente
  lexicon: HALOT
  rationale: «כי אם» exige un giro restrictivo/exceptivo; «sino solo» lo expresa de forma natural. «Falsedad» mantiene el sustantivo hebreo בְּשֶׁקֶר y evita diluir la idea en una simple adverbialidad, preservando la tensión entre apariencia de retorno e insinceridad.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino en español según la norma del proyecto. «Declara» reproduce la solemnidad profética de נְאֻם sin sonar arcaico; «Yahvé» evita la sustitución por un título en lugar del nombre propio.
theological_decisions:
- issue: Noción de «volver» como retorno de pacto
  english_pob_reading: Rendered שׁוּב as 'return to me' with implicit repentance/covenant-restoration sense
  chosen_spanish_reading: «No volvió a mí» mantiene el sentido de retorno relacional, con la resonancia de arrepentimiento/restauración sin explicitarla en exceso
  alternative_spanish_readings:
  - no se volvió a mí
  - no regresó a mí
  rationale: El contexto profético sugiere una respuesta al llamado de Yahvé más que un mero cambio de lugar. En español, «volver a mí» conserva la dimensión de relación y de obediencia del pacto, sin añadir una formulación doctrinal ajena al versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metáfora de Judá como hermana
  english_pob_reading: Retained feminine familial imagery explicitly
  chosen_spanish_reading: Se mantiene explícitamente «su hermana» para preservar la imagen profética
  alternative_spanish_readings:
  - Judá como nación
  - Judá
  rationale: La imagen de hermana es parte del argumento profético y de la acusación de infidelidad entre hermanas simbólicas. Suprimirla suavizaría la fuerza retórica y el trasfondo de pacto del pasaje.
  doctrine_reference: Translation philosophy §5
- issue: Fuerza moral de בָּגוֹדָה
  english_pob_reading: treacherous
  chosen_spanish_reading: «traicionera» conserva la fuerza de ruptura de lealtad
  alternative_spanish_readings:
  - infiel
  - desleal
  rationale: El término no es solo una descripción emocional; acusa quiebre de fidelidad. «Traicionera» comunica mejor la deslealtad activa y la gravedad moral del hebreo.
  doctrine_reference: HALOT / lexical audit
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que reordenó la frase equivalente a «faithless Judah, her sister» para reflejar mejor la apposición hebrea y la fuerza de בָּגוֹדָה. La redacción española sigue esa decisión al colocar primero la relación de hermana y luego el adjetivo «traicionera», sin perder la naturalidad del español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto, en coherencia con la transparencia del texto fuente.
  - «Volver a mí» se mantiene como traducción de שׁוּב en contexto de pacto; no se convierte en una paráfrasis doctrinal.
  - «Con todo su corazón» conserva el hebraísmo idiomático sin convertirlo en un comentario interpretativo.
  - La puntuación con comas refleja la apposición hebrea y la frase final restrictiva de forma clara para lectores modernos.
