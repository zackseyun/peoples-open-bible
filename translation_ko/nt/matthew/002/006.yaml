  text: 『유다 땅 베들레헴아, 너는 결코 유다의 통치자들 가운데 가장 작은 자가 아니다. 너에게서 한 통치자가 나와, 내 백성 이스라엘을 목자처럼 돌볼 것이기 때문이다.』」
