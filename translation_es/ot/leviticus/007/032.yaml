    rationale: La auditoría inglesa escogió 'thigh' por precisión sacrificial-anatómica. En español, 'muslo' preserva mejor esa precisión que 'pierna', que es más amplia.
  - severity: medium
    issue: La nota [a] repite el texto principal.
    rationale: Si el texto principal dice 'la pierna derecha', la nota 'O la pierna derecha' no aporta alternativa real. Debe ofrecer la alternativa significativa restante.
  - severity: medium
    issue: '''de entre los sacrificios de sus ofrendas de paz'' es redundante y no refleja limpiamente la construcción fuente.'
    rationale: El hebreo expresa 'from your sacrifices of peace offerings'. En español, 'de sus sacrificios de paz' transmite mejor la relación sin duplicar 'sacrificios/ofrendas'.
  - severity: low
    issue: Orden y fluidez de la cláusula principal mejorables.
    rationale: '''Y el muslo derecho lo darán...'' suena más natural y claro que ''Y la pierna derecha la darán...''.'
  revised_spanish_text: Y el muslo derecho lo darán como contribución al sacerdote, de sus sacrificios de paz[a][b][c].
