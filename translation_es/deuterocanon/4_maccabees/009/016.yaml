lexical_decisions:
- source_word: δορυφόρων
  english_pob_choice: bodyguards
  chosen_spanish: guardias
  alternatives_spanish:
  - escoltas
  - guardias del rey
  - guardianes
  lexicon: LSJ
  rationale: δορυφόρος significa literalmente «portador de lanza», pero en este contexto narrativo designa a guardias de función oficial. «Guardias» comunica la función sin introducir una imagen más específica que el griego no exige; «escoltas» sería posible, pero menos directo en español corriente.
- source_word: λεγόντων
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  - dijeron
  lexicon: BDAG
  rationale: El participio presente en genitivo indica acción concurrente y durativa. «Decían» reproduce esa continuidad de forma natural en español; «estaban diciendo» sería más explícito, pero más pesado.
- source_word: Ὁμολόγησον
  english_pob_choice: Confess
  chosen_spanish: Confiesa
  alternatives_spanish:
  - Consiente
  - Agueda
  - Reconoce
  lexicon: BDAG
  rationale: Aunque el inglés POB revisó su redacción para reflejar mejor la forma verbal, en español el mandato con complemento infinitivo suena mejor como «confiesa que...», manteniendo la fuerza exhortativa y la correspondencia formal con Ὁμολόγησον.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - el acto de comer
  - que comas
  lexicon: BDAG
  rationale: El infinitivo aoristo complementa al imperativo anterior y se expresa de manera natural como «comer» en español. «Que comas» haría más explícita la subordinación, pero alteraría ligeramente la estructura.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ὅπως introduce finalidad o resultado buscado. «Para que» es la equivalencia española más directa y transparente.
- source_word: ἀπαλλαγῇς
  english_pob_choice: you may be released
  chosen_spanish: seas liberado
  alternatives_spanish:
  - seas puesto en libertad
  - quedes libre
  - te liberes
  lexicon: BDAG
  rationale: El pasivo subjuntivo de ἀπαλλάσσω expresa ser liberado o soltado de una situación. «Seas liberado» conserva el pasivo y es más sobrio; «seas puesto en libertad» es posible, pero más jurídico y menos flexible.
theological_decisions:
- issue: Naturaleza de la orden implícita en Ὁμολόγησον φαγεῖν
  english_pob_reading: Confess that you will eat
  chosen_spanish_reading: Confiesa que comerás
  alternative_spanish_readings:
  - Consiente en comer
  - Reconoce que comerás
  rationale: No hay aquí confesión doctrinal, sino una solicitud forzada de asentimiento a comer. «Confiesa que comerás» conserva la tensión entre el sentido más formal de Ὁμολόγησον y su valor pragmático en contexto, sin diluirlo en una mera invitación.
  doctrine_reference: Lexical semantics / discourse context
- issue: Sentido de ἀπαλλαγῇς en un contexto de coerción
  english_pob_reading: you may be released
  chosen_spanish_reading: seas liberado
  alternative_spanish_readings:
  - seas puesto en libertad
  - quedes libre
  - escapes
  rationale: La escena sugiere liberación de la presión o del castigo inmediato; el griego es suficientemente amplio para no especificar más. «Seas liberado» mantiene esa amplitud y el matiz pasivo del original.
  doctrine_reference: Lexical semantics / narrative context
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «Agree to eat» a «Confess that you will eat» para reflejar con mayor precisión Ὁμολόγησον φαγεῖν. La redacción española sigue esa revisión al usar «Confiesa que comerás», preservando la fuerza del imperativo y la estructura del original.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras convenciones no pertinentes, porque el pasaje no contiene el tetragrámaton ni un título divino.
  - Se eligió «guardias» en vez de «escoltas» para mantener naturalidad sin perder la función del grupo.
  - Se mantuvo el pasivo en «seas liberado» para reflejar ἀπαλλαγῇς.
  - El orden general sigue de cerca el griego y el inglés auditado, pero con sintaxis española fluida.
