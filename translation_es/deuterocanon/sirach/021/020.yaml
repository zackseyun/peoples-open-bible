revisions:
- from: El necio levanta su voz en la risa[a], pero el hombre astuto apenas sonreirá en silencio.
  to: El necio levanta su voz mientras ríe[a], pero el hombre sagaz apenas sonreirá en silencio.
  rationale: Se ajusta «ἐν γέλωτι» a una expresión española más natural («mientras ríe») y se reemplaza «astuto» por «sagaz» para reflejar mejor el valor contextual de πανοῦργος como sagacidad discreta, no picardía. Se conserva «en silencio» porque funciona bien en español y mantiene el contraste con la voz alzada del necio.
