translation:
  language: es
  text: Pero Hermón, después de haber dado de beber a los elefantes salvajes[a], y de dejarlos llenos por la abundante provisión de vino y saturados de olíbano[b], llegó de madrugada al palacio para informar de estas cosas al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'crueles' o 'feroces'. El adjetivo griego puede subrayar la falta de piedad o la ferocidad de los elefantes.
    reason: lexical_alternative
  - marker: b
    text: '''Olíbano'' traduce λίβανος específicamente, no ''incienso'' en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηλεῖς
  english_pob_choice: savage
  chosen_spanish: salvajes
  alternatives_spanish:
  - crueles
  - sin piedad
  - feroces
  lexicon: LSJ
  rationale: El adjetivo describe a los elefantes como fieros e incontrolables. 'Salvajes' es natural en español para animales peligrosos y preserva bien la fuerza del término sin volverlo demasiado abstracto.
- source_word: ποτίσας
  english_pob_choice: after giving ... drink
  chosen_spanish: después de haber dado de beber
  alternatives_spanish:
  - habiéndolos hecho beber
  - después de abrevarlos
  lexicon: LSJ
  rationale: 'El participio indica acción previa: Hermón hizo que los elefantes bebieran. ''Después de haber dado de beber'' mantiene ese sentido causal y es idiomático en español.'
- source_word: πεπληρωμένους τῆς τοῦ οἴνου πολλῆς χορηγίας
  english_pob_choice: filled with an abundant supply of wine
  chosen_spanish: llenos de la abundante provisión de vino
  alternatives_spanish:
  - llenos de abundante vino
  - colmados de la abundante provisión de vino
  lexicon: LSJ
  rationale: La construcción expresa que los elefantes quedaron llenos por una gran provisión de vino. 'Abundante provisión de vino' conserva el matiz de χορηγία como suministro/provisión, no solo cantidad.
- source_word: τοῦ λιβάνου μεμεστωμένους
  english_pob_choice: saturated with frankincense
  chosen_spanish: saturados de olíbano
  alternatives_spanish:
  - colmados de incienso
  - empapados de olíbano
  lexicon: LSJ
  rationale: λίβανος designa específicamente el olíbano/frankincense, no incienso en general. 'Saturados' expresa bien el estado de plenitud/repletez de μεμεστωμένους; 'olíbano' mantiene la precisión léxica y evita generalizar.
- source_word: ὄρθριος
  english_pob_choice: early in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - temprano en la mañana
  - al amanecer
  lexicon: LSJ
  rationale: La palabra señala una llegada muy temprana. 'De madrugada' es natural en español y no fija innecesariamente la hora exacta.
- source_word: αὐλήν
  english_pob_choice: court
  chosen_spanish: patio real
  alternatives_spanish:
  - corte
  - patio de palacio
  lexicon: LSJ
  rationale: En contexto real, αὐλή puede referirse al recinto o al patio del palacio. 'Patio real' conserva la idea espacial del griego y evita restringirla solo a 'corte' como institución.
- source_word: προσαγγεῖλαι
  english_pob_choice: to report
  chosen_spanish: para informar
  alternatives_spanish:
  - para anunciar
  - para comunicar
  lexicon: LSJ
  rationale: 'El infinitivo expresa propósito: Hermón acudió para dar noticia al rey. ''Informar'' funciona bien en un contexto administrativo y conserva el tono oficial.'
theological_decisions:
- issue: Terminología para λίβανος
  english_pob_reading: '''Frankincense'' translates λίβανος specifically, not incense in general.'
  chosen_spanish_reading: '''Olíbano'' traduce λίβανος de manera específica, no ''incienso'' en general.'
  alternative_spanish_readings:
  - incienso
  - resina aromática
  rationale: La nota inglesa distingue el término específico de la sustancia. En español, 'olíbano' es el equivalente más preciso y evita diluir la referencia en el genérico 'incienso'.
  doctrine_reference: precisión léxica bíblica; no doctrinal
- issue: Sujeto de los participios de estado
  english_pob_reading: Clarified that the participles 'filled' and 'saturated' modify the elephants, not Hermon.
  chosen_spanish_reading: Los participios 'llenos' y 'saturados' modifican a los elefantes, no a Hermón.
  alternative_spanish_readings:
  - Hermón lleno y saturado
  - con ellos llenos y saturados
  rationale: La sintaxis española puede hacer ambiguo el referente. La formulación elegida mantiene explícito que el estado recae sobre los elefantes, como en la revisión inglesa.
  doctrine_reference: claridad sintáctica; no doctrinal
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente: los participios de estado se entienden como referidos a los elefantes. Se conservó el registro formal y la secuencia narrativa: acción previa, estado resultante, llegada temprana y propósito ante el rey.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se prefirió 'olíbano' por precisión léxica frente a 'incienso'.
  - '''Salvajes'' conserva la fuerza de ἀνηλεῖς sin volver la frase innecesariamente técnica.'
  - '''De madrugada'' respeta ὄρθριος sin precisar una hora exacta.'
  - '''Patio real'' preserva el espacio del recinto palaciego y evita reducir αὐλή a ''corte'' institucional.'
