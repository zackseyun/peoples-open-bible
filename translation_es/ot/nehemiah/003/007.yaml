  to: Junto a ellos, Melatías el gibeonita y Jadón el meronotita hicieron reparaciones[a], junto con los hombres de Gabaón y de Mizpa, para la sede[b] del gobernador de la provincia Más allá del Río.
  rationale: Se ajusta 'silla' a 'sede' para producir un español natural y fiel al contexto administrativo, sin perder la ambigüedad documentada gracias a la nota. También se cambia 'distrito al otro lado del río' por 'provincia Más allá del Río' para reflejar mejor la designación persa auditada y su carácter de título regional. Se pule la nota del verbo para mayor naturalidad.
