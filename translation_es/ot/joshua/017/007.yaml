  text: וַ/יְהִ֤י גְבוּל מְנַשֶּׁה֙ מֵֽ/אָשֵׁ֔ר הַֽ/מִּכְמְתָ֔ת אֲשֶׁ֖ר עַל פְּנֵ֣י שְׁכֶ֑ם וְ/הָלַ֤ךְ הַ/גְּבוּל֙ אֶל הַ/יָּמִ֔ין אֶל יֹשְׁבֵ֖י עֵ֥ין תַּפּֽוּחַ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/007.yaml
  text: And the border of Manasseh was from Asher to Michmethath[a], which is opposite Shechem; then the border went southward[c][b], toward the inhabitants of En-tappuah.
  footnotes:
  - marker: a
    text: Or 'which is before Shechem' or 'which faces Shechem.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the right'; in boundary descriptions this may refer to a southward direction.
    reason: lexical_alternative
  - marker: c
    text: En-tappuah means 'spring of Tappuah.'
    reason: cultural_note
