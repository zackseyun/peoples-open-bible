revisions:
- from: ¿Por qué[a], Yahvé, nos haces errar de tus caminos y endureces nuestro corazón[b] para no temerte? Vuelve[c], por amor de tus siervos, las tribus de tu heredad.
  to: ¿Por qué[a], Yahvé, nos haces errar de tus caminos y endureces nuestro corazón[b], apartándolo de temerte? Vuelve[c], por amor de tus siervos, las tribus de tu heredad.
  rationale: Se ajusta «para no temerte» a «apartándolo de temerte» para reflejar mejor la separación expresada por el hebreo מִן tras «endurecer». Se conservan el singular colectivo «nuestro corazón», el nombre divino «Yahvé» y el tono de lamento. También se presenta un texto final con marcadores de nota claramente anclados en sus palabras correspondientes.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:02:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y preserva la tensión teológica del causativo directo dirigido a Yahvé. También mantiene correctamente «Yahvé», «endureces», «Vuelve» y la referencia a «las tribus de tu heredad/herencia». Sin embargo, «para no temerte» introduce un matiz final/consecutivo menos fiel que la separación expresada por מִן en «מִיִּרְאָתֶךָ»; conviene una formulación española más cercana a «apartados de temerte» o «de temerte». Además, la colocación de las notas [b] y [c] no sigue bien el rastro inglés: [b] debe anclar «corazón» y [c] «Vuelve».'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico. «Nos haces errar» funciona, aunque suena algo rígido; sigue siendo aceptable. «Por amor de tus siervos» es natural en registro eclesial. La principal mejora estilístico-fiel es evitar «para no temerte», que suena más interpretativo. También conviene ordenar los marcadores de notas según su lugar en el texto.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> «Yahvé» correctamente; עבד en este contexto -> «siervos» está justificado; נחלה -> «heredad» es aceptable y pactal. No hay conflicto serio con el glosario. La excepción relevante es que la explicación de «nuestro corazón» debe mantenerse con su anclaje correcto, y la nota de «Vuelve/Vuélvete» debe ir en «Vuelve».'
  issues:
  - severity: medium
    issue: «para no temerte» suaviza/cambia el valor de מִן en «מִיִּרְאָתֶךָ»
    rationale: El hebreo expresa separación respecto del temor reverente («de temerte», «apartados de temerte»), no primariamente propósito («para no...»). La redacción actual interpreta más de lo necesario.
  - severity: medium
    issue: Marcadores de notas desordenados respecto a sus anclajes
    rationale: La nota [b] explica «nuestro corazón» pero en el texto actual [b] está bien allí mientras [c] aparece en «Vuelve»; sin embargo, la traducción inglesa ancla [c] en «Return» y [b] en «servants» por un desajuste editorial. En español, para cumplir la disciplina del proyecto, los marcadores deben aparecer en orden textual y cada nota debe corresponder claramente a su frase; aquí conviene normalizarlos sin ambigüedad.
  revised_spanish_text: ¿Por qué[a], Yahvé, nos haces errar de tus caminos y endureces nuestro corazón[b], apartándolo de temerte? Vuelve[c], por amor de tus siervos, las tribus de tu heredad.
