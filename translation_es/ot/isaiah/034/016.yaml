translation:
  language: es
  text: 'Busquen en el libro de Yahvé y lean: no faltará ni una de estas; ninguna carecerá de su compañera. Porque su boca ha mandado[a], y su Espíritu los ha reunido[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Porque mi boca ha mandado»; algunos traductores conservan aquí la primera persona.'
    reason: alternative_reading
  - marker: b
    text: 'O: «y su aliento» o «y su viento los ha reunido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  english_pob_choice: Search
  chosen_spanish: Busquen
  alternatives_spanish:
  - Buscad
  - Examinen
  lexicon: HALOT
  rationale: El imperativo plural de דרשׁ pide una búsqueda activa o consulta. En español, «busquen» comunica esa acción de consultar la fuente escrita sin sonar demasiado arcaico.
- source_word: מֵעַל סֵפֶר יְהוָה
  english_pob_choice: in the book of Yahweh
  chosen_spanish: en el libro de Yahvé
  alternatives_spanish:
  - en el libro de Yahvé, consulten
  - del libro de Yahvé
  lexicon: HALOT
  rationale: La frase apunta a consultar el registro escrito de Yahvé. «En el libro de Yahvé» conserva la imagen textual y sigue el default del proyecto para el nombre divino.
- source_word: וּקְרָאוּ
  english_pob_choice: and read
  chosen_spanish: y lean
  alternatives_spanish:
  - y proclamen
  - y llamen
  lexicon: HALOT
  rationale: Con un libro como objeto, קרא se entiende naturalmente como leer. «Lean» es directo y fiel al contexto inmediato.
- source_word: אַחַת מֵהֵנָּה לֹא נֶעְדָּרָה
  english_pob_choice: not one of these will be missing
  chosen_spanish: no faltará ni una de estas
  alternatives_spanish:
  - no faltará ninguna de estas
  - no estará ausente ni una de estas
  lexicon: HALOT
  rationale: El hebreo expresa que ninguna de las criaturas enumeradas estará ausente. «No faltará ni una de estas» conserva el distributivo y suena natural en español.
- source_word: אִשָּׁה רְעוּתָהּ לֹא פָקָדוּ
  english_pob_choice: none will lack her mate
  chosen_spanish: ninguna carecerá de su compañera
  alternatives_spanish:
  - ninguna carecerá de su pareja
  - ninguna estará sin su compañera
  lexicon: HALOT
  rationale: En el contexto de animales apareados, רְעוּתָהּ señala compañera/pareja. «Compañera» mantiene el paralelismo y evita reducir de más el matiz relacional; «carecerá de» refleja el sentido de פקד en este entorno.
- source_word: פָקָדוּ
  english_pob_choice: will lack
  chosen_spanish: carecerá
  alternatives_spanish:
  - faltará
  - estará sin
  lexicon: HALOT
  rationale: Aquí פקד tiene el sentido de estar sin algo o carecer de ello. «Carecerá» preserva ese matiz de ausencia o privación.
- source_word: כִּי פִי הוּא צִוָּה
  english_pob_choice: For his mouth has commanded
  chosen_spanish: Porque su boca lo ha mandado
  alternatives_spanish:
  - Porque mi boca lo ha mandado
  - Porque es su boca la que lo ha mandado
  lexicon: HALOT
  rationale: El hebreo tiene una tensión notable entre la lectura literal de primera persona («mi boca») y la referencia en tercera persona que sigue. El español principal sigue la línea coherente de tercera persona del audit trail inglés, pero la nota preserva la alternativa literal importante.
- source_word: וְרוּחוֹ
  english_pob_choice: and his Spirit
  chosen_spanish: y su Espíritu
  alternatives_spanish:
  - y su aliento
  - y su viento
  lexicon: HALOT
  rationale: En este contexto de agencia divina, רוּחַ se entiende mejor como «Espíritu». «Aliento» y «viento» siguen siendo alternativas léxicas reales que conviene preservar en nota.
- source_word: קִבְּצָן
  english_pob_choice: has gathered them
  chosen_spanish: los ha reunido
  alternatives_spanish:
  - los ha juntado
  - los ha congregado
  lexicon: HALOT
  rationale: קבץ significa reunir o juntar. «Los ha reunido» expresa bien la acción divina y permite un español claro sin perder el sentido de colección/convocatoria.
theological_decisions:
- issue: Tensión de persona en «su boca» / «mi boca»
  english_pob_reading: For his mouth has commanded, and his Spirit has gathered them.
  chosen_spanish_reading: Porque su boca lo ha mandado, y su Espíritu los ha reunido.
  alternative_spanish_readings:
  - Porque mi boca lo ha mandado, y su Espíritu los ha reunido.
  - Porque mi boca lo ha mandado, y mi Espíritu los ha reunido.
  rationale: El hebreo presenta una oscilación de persona que no conviene borrar. El texto principal adopta una referencia coherente a Yahvé en tercera persona, como en el audit trail inglés, mientras la nota conserva la lectura más literal de primera persona.
  doctrine_reference: Preservar la tensión gramatical sin resolverla artificialmente
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; se mantiene la lectura estable del pase más reciente, con la misma resolución principal del audit trail inglés y las alternativas literales preservadas en notas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «Espíritu» con mayúscula por referencia divina en paralelo con la agencia de Yahvé.
  - «Compañera» conserva el paralelismo relacional del hebreo sin imponer terminología eclesiástica ajena al contexto zoológico.
  - Las notas respetan la tensión persona/voz del hebreo en vez de simplificarla.
