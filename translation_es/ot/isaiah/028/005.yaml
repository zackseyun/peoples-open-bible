translation:
  language: es
  text: En aquel día Yahvé de los ejércitos será una corona de hermosura y una diadema de esplendor para el remanente de su pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva con una expresión natural en español. «Aquel» mantiene la distancia y el tono solemne de la fórmula bíblica, sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: usar «Yahvé» como transliteración del nombre divino, en vez de sustituirlo por un título como «SEÑOR».'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los huestes
  lexicon: HALOT
  rationale: El sustantivo plural comunica la imagen de ejércitos/huestes. «De los ejércitos» es transparente en español y conserva el sentido básico del título.
- source_word: לַעֲטֶרֶת צְבִי
  english_pob_choice: a crown of beauty
  chosen_spanish: una corona de hermosura
  alternatives_spanish:
  - una corona de belleza
  - una corona de gloria
  lexicon: HALOT
  rationale: «עֲטֶרֶת» es «corona». Para צְבִי, «hermosura» permite expresar el matiz de belleza/esplendor sin confundirlo con la siguiente palabra «gloria», preservando la distinción poética.
- source_word: וְלִצְפִירַת תִּפְאָרָה
  english_pob_choice: and a diadem of splendor
  chosen_spanish: y una diadema de gloria
  alternatives_spanish:
  - y una diadema de esplendor
  - y una corona de gloria
  lexicon: HALOT
  rationale: «צְפִירָה» sugiere una diadema/círculo ornamental, distinto de «corona». «Gloria» traduce bien תִּפְאָרָה en registro bíblico y conserva el paralelismo con el miembro anterior.
- source_word: לִשְׁאָר עַמּוֹ
  english_pob_choice: for the remnant of his people
  chosen_spanish: para el remanente de su pueblo
  alternatives_spanish:
  - para el resto de su pueblo
  - para el resto del pueblo
  lexicon: HALOT
  rationale: En Isaías, שְׁאָר funciona como término teológico del «remanente». «Para» refleja bien la preposición de beneficio/destino, y «remanente» conserva la carga profética del término.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה junto con צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - SEÑOR de los ejércitos
  rationale: Se mantiene el nombre propio divino en español según la política del proyecto. «De los ejércitos» da acceso al sentido del título sin recurrir a la sustitución tradicional por «SEÑOR»; además, evita perder la referencia militar/celestial del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor profético de שְׁאָר
  english_pob_reading: the remnant of his people
  chosen_spanish_reading: el remanente de su pueblo
  alternative_spanish_readings:
  - el resto de su pueblo
  - los sobrevivientes de su pueblo
  rationale: En el contexto isaiano, «remanente» conserva el peso teológico del concepto, no solo una idea cuantitativa. «Resto» o «sobrevivientes» debilitarían ese valor técnico-profético.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones y el control cruzado reportó alta concordancia; por ello, el borrador español mantiene el mismo perfil semántico con ajustes naturales de estilo y terminología del proyecto. Se asumió la convención editorial de usar «Yahvé» en español para יְהוָה.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable, sin arcaísmos innecesarios.
  - Se preservó la distinción poética entre «hermosura» y «gloria» para reflejar los dos miembros paralelos del hebreo.
  - Se usó «remanente» como término técnico consistente con Isaías y con la línea terminológica del proyecto.
  - No se emplearon notas al pie porque no fue necesario introducir una lectura alternativa en este versículo.
