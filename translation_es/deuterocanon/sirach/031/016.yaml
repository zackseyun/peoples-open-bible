revisions:
- from: Porque por causa de cualquier asunto, el ojo tiembla, y lágrimas fluyen del rostro[a].
  to: Pues[a] por causa de todo asunto, el ojo tiembla, y lágrimas fluyen del rostro.
  rationale: Se aligera la duplicación causal para un español más natural sin perder la explicación introducida por כי, se ajusta «cualquier asunto» a «todo asunto» para reflejar mejor כל דבר, y se mueve la nota al inicio porque la variante textual afecta al versículo completo, no solo a una palabra final.
