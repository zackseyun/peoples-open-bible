review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: abstención de construir casas para habitar y ausencia de posesión agrícola. Sin embargo, la frase española final usa discordancia de género y número con una lista singular/colectiva (''viña, campo y semilla'') y suena poco natural: ''han sido nuestros''. El hebreo לֹא יִהְיֶה לָּנוּ expresa no posesión (''no hemos tenido'' / ''no han sido nuestros'' adaptado idiomáticamente), por lo que conviene una formulación española más natural y fiel.'
  spanish_quality_summary: 'La primera mitad es clara y digna. ''para habitar en ellas'' es aceptable, aunque ''para vivir en ellas'' sería más llano; no requiere cambio. La segunda mitad necesita ajuste por naturalidad y concordancia. También es preferible mantener la coordinación simple del original (''y viña y campo y semilla'') en vez de introducir ''ni... ni... ni'' si luego la nota ya explica la literalidad; pero esto es secundario. La mejor reparación menor es: ''y no hemos tenido viña, ni campo, ni semilla.'''
  glossary_alignment: No hay términos del glosario mayor en juego. 'Viña', 'campo' y 'semilla' respetan bien las decisiones léxicas documentadas. La nota al pie es útil y preserva la alternativa más literal. El problema principal está en la realización española de la posesión negativa, no en la terminología.
  issues:
  - severity: high
    issue: Discordancia en 'ni viña, ni campo, ni semilla han sido nuestros'
    rationale: Los tres sustantivos aparecen en singular y dos son femeninos; 'nuestros' no concuerda naturalmente con la serie y produce una frase torpe en español.
  - severity: high
    issue: La cláusula posesiva negativa está vertida de forma poco idiomática
    rationale: Aunque el hebreo puede representarse como 'no han sido nuestros', en español esa formulación suena forzada aquí. 'No hemos tenido viña, ni campo, ni semilla' expresa con claridad la no posesión continua indicada por לֹא יִהְיֶה לָּנוּ.
  - severity: low
    issue: La nota al pie está anclada a 'ellas' en vez de a la cláusula posesiva alternativa
    rationale: La nota explica la alternativa literal de la segunda mitad del versículo, por lo que conviene colocar el marcador donde esa información resulta pertinente, no en 'ellas'.
  revised_spanish_text: y no para construir casas para habitar en ellas; y no hemos tenido viña, ni campo, ni semilla[a].
  revised_footnotes:
  - marker: a
    text: 'Literalmente: “y viña y campo y semilla no han sido para nosotros”; la frase hebrea usa una construcción de posesión negativa.'
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final para expresar la posesión negativa de manera natural en español y sin discordancia gramatical, manteniendo el sentido del hebreo. Se conserva la alternativa más literal en nota y se mueve su anclaje al lugar relevante. No se requiere adjudicación adicional.
