translation:
  language: es
  text: para que crean que Yahvé[a], el Dios de sus padres, el Dios de Abraham, el Dios de Isaac y el Dios de Jacob[b], se te ha aparecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». En español, la tradición suele verterlo «el SEÑOR»; aquí se conserva el nombre divino en forma transliterada para reflejar el original.'
    reason: alternative_reading
  - marker: b
    text: O «el Dios de sus antepasados». El hebreo dice más literalmente «sus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa con naturalidad la finalidad de la cláusula sin perder el valor purposivo del hebreo.
- source_word: יַאֲמִינוּ
  english_pob_choice: they may believe
  chosen_spanish: crean
  alternatives_spanish:
  - crean
  - crean en
  - tengan fe
  lexicon: HALOT
  rationale: En este contexto la finalidad es que acepten como verdadero el signo y el testimonio de Moisés; «crean» comunica bien esa aceptación de fe/confianza.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - puesto que
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben creer, no una causa.
- source_word: נִרְאָה
  english_pob_choice: has appeared
  chosen_spanish: se ha aparecido
  alternatives_spanish:
  - ha aparecido
  - ha sido visto
  lexicon: HALOT
  rationale: El nifal de ראה aquí comunica una aparición divina concluida y vigente; «se ha aparecido» conserva ese matiz mejor que un simple «apareció».
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  - para ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se vierte de modo directo y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española proyectada por la política terminológica del proyecto, evitando la sustitución por un título.
- source_word: אֱלֹהֵי אֲבֹתָם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: La construcción posesiva masculina plural se mantiene con «padres», que refleja con precisión el idioma de alianza y la referencia patriarcal del hebreo.
- source_word: אֱלֹהֵי אַבְרָהָם אֱלֹהֵי יִצְחָק וֵאלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Abraham, the God of Isaac, and the God of Jacob
  chosen_spanish: el Dios de Abraham, el Dios de Isaac y el Dios de Jacob
  alternatives_spanish:
  - Dios de Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Se conserva la repetición solemne de la construcción hebrea, en lugar de comprimirla, para mantener el énfasis retórico y reverente del original.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; se traduce con la forma proyectada por la norma del proyecto en español para preservar el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered ancestral term אֲבֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: Se conserva el valor masculino plural del hebreo y su lenguaje de alianza, sin neutralizarlo a un término más genérico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo base y con el audit trail inglés; no se registran revisiones textuales o de sentido que exijan modificaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva la repetición de «el Dios de» ante cada patriarca para reflejar la cadencia del hebreo.
  - «Sus padres» se usa en sentido ancestral/pactual, no como referencia exclusiva al padre inmediato.
