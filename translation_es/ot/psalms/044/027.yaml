  yaml_path: translation/ot/psalms/044/027.yaml
  text: Rise up as our help[c][b][a], and redeem us for the sake of your steadfast love.
  footnotes:
  - marker: a
    text: Or 'Rise up to help us'; the Hebrew literally has 'Rise up, help for us,' preserving the noun 'help' rather than a verb.
    reason: lexical_alternative
  - marker: b
    text: Or 'ransom us' or 'rescue us'; the Hebrew verb can denote deliverance by payment or by decisive intervention.
    reason: lexical_alternative
  - marker: c
    text: '''Steadfast love'' translates Hebrew hesed, often referring to faithful, loyal love within God''s covenant relationship.'
    reason: cultural_note
