review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: mantiene el alcance cósmico de πᾶσα ἡ γῆ / ὁ οὐρανός, conserva la personificación de ἀλήθεια con pronombres femeninos, y refleja la nota sobre la irregularidad de μετʼ αὐτοῦ. La única desalineación relevante está en σείεται καὶ τρέμει: el orden y matiz de ''tiemblan y se estremecen'' atenúan la primera idea de sacudida y vuelven casi redundante el par verbal.'
  spanish_quality_summary: El español es claro, digno y natural. Sin embargo, 'todas las obras tiemblan y se estremecen' suena menos preciso que una secuencia que preserve primero la sacudida y luego el temblor. Además, para esta personificación, mayúscula en 'Verdad' dentro de la nota mejora la coherencia con la explicación ya dada, aunque no exige cambio en el texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'La verdad', 'el cielo', 'bendice' y 'nada injusto' están bien elegidos. La personificación femenina se conserva correctamente con 'la' y 'ella'.
  issues:
  - severity: medium
    issue: El binomio 'tiemblan y se estremecen' no refleja con suficiente nitidez σείεται καὶ τρέμει.
    rationale: El primer verbo griego aporta la idea de ser sacudido/mecer(se), y el segundo la de temblar. En español actual, 'tiemblan y se estremecen' invierte el peso semántico y produce un efecto casi duplicativo. 'Se sacuden y tiemblan' o similar preserva mejor el paralelismo intensivo.
  revised_spanish_text: Toda la tierra invoca la verdad[a], y el cielo la bendice; y todas las obras se sacuden y tiemblan[b], y con ella no hay nada injusto.
  revised_footnotes:
  - marker: a
    text: 'Griego: ''invoca la verdad'' o ''llama a la verdad''; el verbo puede entenderse como una aclamación o una invocación dirigida a la Verdad personificada.'
    reason: lexical_alternative
  - marker: b
    text: El griego transmitido dice 'con él/ello' en la cláusula final (μετʼ αὐτοῦ), aunque las referencias anteriores a la Verdad son femeninas; la traducción sigue el sentido de la personificación.
    reason: textual_variant
  revision_rationale: 'Se ajusta únicamente el par verbal para reflejar mejor σείεται καὶ τρέμει, conservando la viveza del original: primero sacudida, luego temblor. El resto del verso ya era fiel al griego, al POB inglés y al registro español buscado.'
