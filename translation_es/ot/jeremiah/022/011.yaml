base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/011.yaml
  text: 'For thus says Yahweh concerning Shallum son of Josiah[a], king of Judah, who reigned in place of Josiah his father, who went out from this place: He shall never return there again.'
  footnotes:
  - marker: a
    text: Or 'to Shallum'; the Hebrew preposition can be read more literally as direct address, but here it likely introduces the subject of the oracle.
    reason: lexical_alternative
