lexical_decisions:
- source_word: עֵינַיִם
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - mirada
  - ojos
  lexicon: HALOT
  rationale: Se conserva el sustantivo corporal literal, como en el hebreo, para mantener la imagen metonímica de la actitud orgullosa y la paralelismo con las otras partes del cuerpo.
- source_word: רָמוֹת
  english_pob_choice: haughty
  chosen_spanish: altivos
  alternatives_spanish:
  - altaneros
  - orgullosos
  - elevados
  lexicon: HALOT
  rationale: El sentido es moral y actitudinal, no físico. 'Altivos' comunica elevación soberbia en un español natural y poético, sin perder la fuerza ética del término.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua
  - habla
  lexicon: HALOT
  rationale: '''Lengua'' conserva el órgano corporal usado metonímicamente para el habla, acorde con la lista de miembros corporales del proverbio.'
- source_word: שָׁקֶר
  english_pob_choice: lying
  chosen_spanish: mentirosa
  alternatives_spanish:
  - de mentira
  - falsa
  - engañosa
  lexicon: HALOT
  rationale: Como adjetivo aplicado a 'lengua', 'mentirosa' expresa de manera directa y idiomática la cualidad activa de decir falsedad, equivalente funcional de 'lying tongue'.
- source_word: יָדַיִם
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - manos
  lexicon: HALOT
  rationale: Se mantiene el plural corporal literal para preservar el paralelismo hebreo y la metonimia de acción violenta.
- source_word: שֹׁפְכוֹת
  english_pob_choice: that shed
  chosen_spanish: que derraman
  alternatives_spanish:
  - que vierten
  - derramando
  lexicon: HALOT
  rationale: El participio se vierte como una cláusula relativa que en español suena natural y conserva la acción característica, continua o habitual.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre
  lexicon: HALOT
  rationale: Se traduce literalmente; en este contexto, la sangre implica derramamiento de sangre o homicidio.
- source_word: נָקִי
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - inocente
  - sin culpa
  - ajena a culpa
  lexicon: HALOT
  rationale: '''Inocente'' es la collocación española más natural y fiel para ''blood''. Mantiene el sentido de sangre derramada injustamente sobre una persona sin culpa.'
translation_notes:
  revision_awareness: El texto base en inglés y la revisión cruzada muestran plena conformidad con el hebreo; no hay variantes textuales ni decisiones teológicas adicionales que requieran nota. La redacción española busca máxima fidelidad al paralelismo y a la imaginería corporal del verso.
  spanish_consistency_notes:
  - 'Se mantiene el orden enumerativo del hebreo y del inglés auditado: ojos, lengua, manos.'
  - Se prefieren equivalentes corporales literales para conservar la estructura poética y la metonimia.
  - '''Altivos'' se usa por su valor moral en español bíblico contemporáneo, evitando un calco demasiado físico como ''elevados''.'
