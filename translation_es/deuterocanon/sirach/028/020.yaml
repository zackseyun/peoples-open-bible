translation:
  language: es
  text: Porque su yugo es un yugo de hierro[a], y sus ataduras son ataduras de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su yugo ... sus ataduras”, si la imagen se entiende de modo más abstracto y no como personificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγός
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  lexicon: BDAG
  rationale: El sustantivo denota literalmente un yugo. En este contexto sapiencial conviene conservar la imagen concreta de opresión y sujeción, en vez de generalizarla a “carga”.
- source_word: σιδηροῦς
  english_pob_choice: iron
  chosen_spanish: de hierro
  alternatives_spanish:
  - hecho de hierro
  - ferreo
  lexicon: LSJ
  rationale: El adjetivo significa de manera directa “de hierro” o “hecho de hierro”. La forma breve española conserva el paralelo proverbial del griego.
- source_word: δεσμοί
  english_pob_choice: bonds
  chosen_spanish: ataduras
  alternatives_spanish:
  - cadenas
  - grilletes
  lexicon: BDAG
  rationale: El término se refiere a ligaduras o restricciones. “Ataduras” mantiene el paralelismo con “yugo” y no especifica más de lo que exige el texto.
- source_word: χαλκεῖοι
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - broncíneas
  - de cobre
  lexicon: LSJ
  rationale: El adjetivo indica algo hecho de bronce o cobre. “De bronce” es la equivalencia más natural y clara en español moderno.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su / sus
  alternatives_spanish:
  - de ella
  - de él
  lexicon: BDAG
  rationale: En griego el antecedente es femenino y el contexto personifica la fuerza dañina. En español, “su” y “sus” conservan la referencia femenina implícita sin forzar una explicitación innecesaria.
theological_decisions:
- issue: Personificación femenina de la fuerza dañina
  english_pob_reading: Use 'her' throughout
  chosen_spanish_reading: Mantener la referencia femenina implícita con los posesivos "su" y "sus".
  alternative_spanish_readings:
  - Usar "su" de forma neutra e impersonal
  - Explicitar "de ella"
  rationale: El griego repite un posesivo femenino y el contexto presenta la imagen de manera personificada. El español con posesivos conserva la fuerza literaria sin perder naturalidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
translation_notes:
  revision_awareness: Se siguió el paso de revisión más reciente, que quedó sin cambios, y el control cruzado indicó acuerdo alto. No se detectaron ajustes textuales necesarios respecto del audit trail en inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo retórico del original: "yugo ... yugo" / "ataduras ... ataduras".'
  - Se prefirió "de hierro" y "de bronce" para conservar la concisión proverbial del griego.
  - La nota al pie reproduce la alternativa documentada en el texto inglés sobre la posible lectura más abstracta de la referencia.
