  text: But concerning Joppa and Gazara[a], you ask for them. They were inflicting great harm on the people and on our land. For these we will give one hundred talents[c][b]. And he answered him not a word.
  footnotes:
  - marker: a
    text: Greek 'Gazarenōn' is formally a plural referring to Gazara and its people/inhabitants; the translation renders the place name directly because the request concerns possession of the city/territory.
    reason: lexical_alternative
  - marker: b
    text: Or 'These places were causing a great blow among the people and to our land.' The Greek term for 'harm' can also denote a blow, wound, or plague-like calamity.
    reason: lexical_alternative
  - marker: c
    text: The clause 'For these we will give one hundred talents' is terse in Greek and may mean compensation in place of surrendering Joppa and Gazara.
    reason: alternative_reading
