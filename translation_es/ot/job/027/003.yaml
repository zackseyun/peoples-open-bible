translation:
  language: es
  text: Pues, mientras todavía esté mi aliento en mí[a], y el espíritu de Dios[b] en mis fosas nasales,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi respiración». Hebreo נִשְׁמָה puede significar «aliento», «respiración» o, en algunos contextos, «vida».
    reason: lexical_alternative
  - marker: b
    text: O «el aliento de Dios». Hebreo רוּחַ puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: En este contexto introduce una afirmación solemne y suelta el tono explicativo de la cláusula, por lo que «Porque» comunica bien la conexión discursiva sin forzar una causalidad más fuerte de la que exige el hebreo.
- source_word: כָל עוֹד
  english_pob_choice: as long as ... still
  chosen_spanish: mientras todavía
  alternatives_spanish:
  - mientras aún
  - por todo el tiempo que
  - siempre que
  lexicon: HALOT
  rationale: La combinación expresa duración continua; «mientras todavía» reproduce la idea de continuidad y permanencia de manera natural en español.
- source_word: נִשְׁמָתִי
  english_pob_choice: my breath
  chosen_spanish: mi aliento
  alternatives_spanish:
  - mi respiración
  - mi hálito
  - mi vida-breath
  lexicon: HALOT
  rationale: נשמה aquí señala el aliento vital. «Aliento» conserva la concreción física del paralelismo con «en mis narices» y evita leer «alma» donde el contexto respiratorio domina.
- source_word: בִי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - dentro de mí
  lexicon: HALOT
  rationale: La preposición marca presencia interior; «en mí» es la forma más directa y fiel al hebreo.
- source_word: וְרוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: HALOT
  rationale: Aunque el paralelismo permite «aliento», el audit trail inglés decidió preservar la distinción léxica y la revisión reciente optó por «spirit». En español, «espíritu» mantiene esa distinción y deja abierta la tensión semántica de רוּחַ.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es un título singular para Dios, frecuente en Job. «Dios» es la equivalencia natural y precisa en español.
- source_word: בְּאַפִּי
  english_pob_choice: in my nostrils
  chosen_spanish: en mis narices
  alternatives_spanish:
  - en mi nariz
  - en mis fosas nasales
  lexicon: HALOT
  rationale: El hebreo es concreto y corporal. «Narices» conserva la imagen poética directa; aunque menos usual que «fosas nasales», sigue siendo claro y refleja bien la literalidad de אַף en este contexto.
theological_decisions:
- issue: Valor de רוּחַ en paralelo con נִשְׁמָתִי
  english_pob_reading: the spirit of God
  chosen_spanish_reading: el espíritu de Dios
  alternative_spanish_readings:
  - el aliento de Dios
  - el Espíritu de Dios
  rationale: La nota inglesa preserva la ambigüedad léxica de רוּחַ, y la revisión final en inglés eligió «spirit» para reflejar mejor esa palabra. En español, «espíritu» mantiene la tensión sin resolverla en una lectura puramente fisiológica, pero tampoco impone de antemano una referencia plenamente pneumatológica. Así se conserva la apertura del hebreo y del audit trail.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail, que distinguió deliberadamente entre נִשְׁמָתִי y רוּחַ al pasar de una segunda repetición de «breath» a «spirit». Por eso el español mantiene dos términos distintos: «aliento» y «espíritu».'
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלוֹהַּ conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el hebreo aquí no usa יהוה.
  - Se mantuvo el paralelismo corporal de «en mis narices» para no desdibujar la imagen poética.
  - Se eligió «espíritu» en el segundo hemistiquio para preservar la tensión semántica de רוּחַ según el audit trail.
