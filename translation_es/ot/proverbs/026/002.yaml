review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del proverbio y preserva la imagen de un ave errante y otra en vuelo, junto con la idea de que una maldición infundada no se asienta. Sin embargo, se aparta innecesariamente del rastro auditado del POB en un punto importante: el inglés eligió específicamente ''sparrow'' para צִפּוֹר, mientras que el español pasó a ''pájaro'' en el texto principal y relegó ''gorrión'' a nota. Dado que el hebreo permite un término más general, esto no es una traición al original, pero sí pierde una decisión léxica ya documentada y una mejor correspondencia con el paralelismo ''gorrión/golondrina''.'
  spanish_quality_summary: El español es claro, natural y digno. 'En su vagar', 'en su vuelo' y 'no llega a posarse' funcionan bien en registro proverbial. La principal mejora es hacer que la nota de alternativa zoológica corresponda al segundo término de ave, no al primero, para alinearse con el expediente inglés y evitar una distribución confusa de notas.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. 'Maldición', 'sin causa' y 'posarse' son adecuados. La corrección principal es alinear כַּצִּפּוֹר con 'gorrión' en el texto principal, manteniendo la posible generalidad en nota si se desea; y reflejar la alternativa 'vencejo' para דְּרוֹר en la nota del segundo ave, como hizo el inglés con 'swift'.
  issues:
  - severity: medium
    issue: El texto principal usa 'pájaro' para כַּצִּפּוֹר en vez de 'gorrión'.
    rationale: Aunque צִפּוֹר puede ser general, el expediente inglés documentó y adoptó una elección específica ('sparrow') por adecuación literaria y paralelismo. El español puede preservar esa decisión de forma natural con 'gorrión'.
  - severity: medium
    issue: 'La nota [a] está anclada al primer término de ave, pero el inglés preserva la alternativa zoológica para el segundo ave (דְּרוֹר: swallow/swift).'
    rationale: La distribución actual de notas altera el rastro auditado y puede inducir a pensar que la incertidumbre léxica principal recae en צִפּוֹר en vez de דְּרוֹר.
  - severity: low
    issue: La nota [b] dice 'inmerecida o sin fundamento', mientras el texto principal mantiene 'sin causa'.
    rationale: No es incorrecto, pero conviene mantener la explicación como ampliación del hebreo literal sin crear tensión innecesaria con la redacción principal.
  revised_spanish_text: Como un gorrión en su vagar, como una golondrina[a] en su vuelo, así la maldición sin causa[b] no llega a posarse[c].
