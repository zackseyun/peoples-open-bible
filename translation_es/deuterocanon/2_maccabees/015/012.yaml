translation:
  language: es
  text: 'Ahora su visión era así: Onías[a], que había llegado a ser sumo sacerdote, varón noble y bueno, modesto en el porte, apacible en su conducta, y que hablaba con propiedad, y que desde niño había cultivado todas las cualidades propias de la virtud—este hombre, extendiendo las manos, estaba orando por todo el cuerpo del pueblo judío.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por toda la comunidad de los judíos». El griego presenta a los judíos como un solo cuerpo corporativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρία
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - espectáculo
  lexicon: LSJ
  rationale: En este contexto introduce el contenido de una escena vista, por lo que «visión» transmite mejor la experiencia revelada que una simple «aparición» o un «espectáculo».
- source_word: γενόμενον ἀρχιερέα
  english_pob_choice: who had become high priest
  chosen_spanish: que había llegado a ser sumo sacerdote
  alternatives_spanish:
  - que se había hecho sumo sacerdote
  - el antiguo sumo sacerdote
  lexicon: LSJ
  rationale: El participio indica un haber llegado a ese cargo; en español, el pluscuamperfecto conserva la retrospectiva. «Sumo sacerdote» expresa el rango sin volver la frase menos directa.
- source_word: καλὸν καὶ ἀγαθόν
  english_pob_choice: noble and good
  chosen_spanish: varón noble y bueno
  alternatives_spanish:
  - hombre noble y bueno
  - honorable y bueno
  lexicon: LSJ
  rationale: En la descripción de carácter, καλός suele ser «noble» u «honorable» más que «bello». «Varón» mantiene el tono solemne del retrato moral.
- source_word: αἰδήμονα μὲν τὴν ἀπάντησιν
  english_pob_choice: modest in bearing
  chosen_spanish: modesto en el porte
  alternatives_spanish:
  - modesto en el comportamiento
  - respetuoso en el encuentro
  lexicon: LSJ
  rationale: La expresión es idiomática; «porte» comunica de manera natural la compostura exterior sin añadir una escena específica de saludo o encuentro.
- source_word: πρᾶον δὲ τὸν τρόπον
  english_pob_choice: gentle in manner
  chosen_spanish: suave en el modo de ser
  alternatives_spanish:
  - manso en el trato
  - afable en el carácter
  lexicon: LSJ
  rationale: πρᾶος puede ser «suave», «manso» o «benigno». Elegí «suave en el modo de ser» para conservar la cualidad ética sin sonar demasiado coloquial. El texto inglés resalta el modo de conducta; en español esta frase mantiene esa idea.
- source_word: λαλιάν προειμένον πρεπόντως
  english_pob_choice: one who spoke fittingly
  chosen_spanish: y que hablaba con propiedad
  alternatives_spanish:
  - y que hablaba de manera conveniente
  - y que tenía un hablar adecuado
  lexicon: LSJ
  rationale: La dificultad está en la idea de un habla apropiada/ajustada. «Con propiedad» preserva el valor de πρεπόντως y sugiere un lenguaje bien ordenado sin sobrerrepresentar la oscuridad del griego.
- source_word: ἐκ παιδὸς ἐκμεμελετηκότα
  english_pob_choice: from childhood had cultivated
  chosen_spanish: desde niño había cultivado
  alternatives_spanish:
  - desde niño había practicado
  - desde la niñez había formado
  lexicon: LSJ
  rationale: El perfecto participial apunta a una formación persistente y de largo plazo. «Había cultivado» suena natural en español y mantiene la idea de hábito adquirido desde temprano.
- source_word: πάντα τὰ τῆς ἀρετῆς ἴδια
  english_pob_choice: all the proper qualities of virtue
  chosen_spanish: todas las cualidades propias de la virtud
  alternatives_spanish:
  - todo lo que pertenece a la virtud
  - todos los rasgos distintivos de la virtud
  lexicon: LSJ
  rationale: La frase indica lo que pertenece o es característico de la virtud. «Cualidades propias de la virtud» conserva esa relación sin endurecerla en una glosa demasiado literal.
- source_word: κατεύχεσθαι
  english_pob_choice: praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - estaba orando fervientemente
  - estaba suplicando
  lexicon: LSJ
  rationale: El verbo implica oración intercesora; «orar» es claro y digno en español. Se mantiene el matiz de acción continua con «estaba orando».
- source_word: τῷ παντὶ τῶν Ἰουδαίων συστήματι
  english_pob_choice: for the whole body of the Jews
  chosen_spanish: por todo el cuerpo de los judíos
  alternatives_spanish:
  - por toda la comunidad de los judíos
  - por toda la asamblea de los judíos
  lexicon: LSJ
  rationale: σύστημα puede referirse a un cuerpo organizado o una totalidad corporativa. «Cuerpo» conserva esa imagen colectiva que el inglés POB marcó, sin convertirla en un término eclesial ajeno al texto.
theological_decisions:
- issue: Onias como intercesor en la visión
  english_pob_reading: Render the scene straightforwardly as Onias stretching out his hands and praying for the Jewish people.
  chosen_spanish_reading: Presentar sin atenuación a Onías extendiendo las manos y orando por el pueblo judío.
  alternative_spanish_readings:
  - Presentarlo solo como deseando el bien a los judíos
  - suavizarlo como una escena simbólica sin oración real
  rationale: κατεύχεσθαι significa oración real, y la escena retrata a Onías como intercesor en la visión. La traducción conserva esa tensión teológica/literaria sin explicarla ni resolverla.
  doctrine_reference: Preservar la tensión teológica del pasaje sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del inglés POB, especialmente el cambio de «practiced» a «had cultivated» para ἐκμεμελετηκότα, y mantiene la lectura intercesora de κατεύχεσθαι. Se preserva también la nota alternativa sobre la expresión corporativa de σύστημα.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «sumo sacerdote» como equivalente contextual de ἀρχιερεύς.
  - «Judíos» conserva el sentido colectivo de τὸ παντὶ ... συστήματι con la nota explicativa.
  - El tono general es formal y readable para uso eclesial, sin arcaísmos innecesarios.
