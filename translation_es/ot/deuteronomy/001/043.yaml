translation:
  language: es
  text: Así les hablé, pero no escucharon; se rebelaron contra la boca de Yahvé[a], actuaron presuntuosamente y subieron a la región montañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: “la boca de Yahvé”; es decir, lo que Yahvé había mandado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲדַבֵּר
  english_pob_choice: So I spoke
  chosen_spanish: Así les hablé
  alternatives_spanish:
  - Y les hablé
  - Entonces les hablé
  lexicon: HALOT
  rationale: El verbo דּבר en piel es ‘hablar’. En español, ‘Así’ comunica con naturalidad la continuidad o consecuencia narrativa del contexto, sin forzar un calco de la conjunción hebrea.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se expresa de modo natural con el dativo átono ‘les’ en español, manteniendo el plural sin recargar la frase.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: but you did not listen
  chosen_spanish: pero no escucharon
  alternatives_spanish:
  - y no escucharon
  - pero no obedecieron
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar u obedecer según el contexto. Aquí, como en el inglés POB, ‘escucharon’ preserva la oposición directa a ‘les hablé’ sin sobreespecificar obediencia, que queda expresada en la cláusula siguiente.
- source_word: וַתַּמְרוּ
  english_pob_choice: you rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - desafiaron
  - fueron rebeldes
  lexicon: HALOT
  rationale: מָרָה indica rebelión o desafío contra autoridad. ‘Se rebelaron’ es la equivalencia más directa y natural en este contexto de desobediencia al mandato divino.
- source_word: אֶת פִּי יְהוָה
  english_pob_choice: against the mouth of Yahweh
  chosen_spanish: contra la boca de Yahvé
  alternatives_spanish:
  - contra la boca de Yahweh
  - contra lo que Yahvé había dicho
  - contra la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen literal ‘boca’ porque el hebreo dice ‘la boca de Yahvé’. Aunque es idiomática para ‘lo que Yahvé había ordenado’, mantenerla deja visible la tensión léxica documentada por el texto fuente y evita sustituirla sin base.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de rendir el Tetragrámaton como ‘Yahvé’, preservando el nombre propio divino en lugar de una sustitución de título.
- source_word: וַתָּזִדוּ
  english_pob_choice: acted presumptuously
  chosen_spanish: actuaron presuntuosamente
  alternatives_spanish:
  - fueron presuntuosos
  - actuaron con insolencia
  lexicon: HALOT
  rationale: זיד expresa conducta soberbia, presuntuosa o insolente. ‘Actuaron presuntuosamente’ reproduce con fidelidad el matiz moral y encaja bien con el registro bíblico.
- source_word: וַתַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - marcharon hacia arriba
  lexicon: HALOT
  rationale: עלה significa literalmente ‘subir’. ‘Subieron’ conserva el movimiento sin añadir un matiz militar que el verbo por sí solo no exige.
- source_word: הָהָרָה
  english_pob_choice: into the hill country
  chosen_spanish: a la región montañosa
  alternatives_spanish:
  - al monte
  - a la serranía
  - a la zona montañosa
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia una zona elevada. ‘Región montañosa’ es natural en español y mantiene la referencia topográfica amplia más que un monte único.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, por lo que se preserva el nombre divino con la transliteración ‘Yahvé’, coherente con la política del proyecto y con el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés auditado cambió de ‘the command of the LORD’ a ‘the mouth of the LORD’ para reflejar más directamente אֶת־פִּי. La versión española sigue ese ajuste y conserva la imagen hebrea de ‘boca’ en lugar de suavizarla a ‘mandato’, manteniendo la tensión lexical documentada.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, conforme al criterio del proyecto.
  - Se evita ‘obedecieron’ porque el inglés POB eligió ‘listen’; la desobediencia queda explícita en ‘se rebelaron’.
  - ‘Región montañosa’ traduce el valor direccional de הָהָרָה sin introducir precisión geográfica excesiva.
  - El pie de nota marca la literalidad hebrea de ‘boca’ y su sentido idiomático, como en el audit trail inglés.
