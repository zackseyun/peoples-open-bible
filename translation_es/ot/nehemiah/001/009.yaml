  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé en este versículo. La fórmula ‘mi nombre’ se conserva correctamente, y ‘desterrados’ encaja razonablemente para נִדַּחֲכֶם. Se debe mantener la distinción entre ‘guardar’ y ‘poner por obra’.
