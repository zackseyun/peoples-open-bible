revisions:
- from: 'Ahora bien, cuando Eliseo[a], el hombre de Dios, oyó que el rey de Israel había rasgado sus vestidos, envió al rey a decir: “¿Por qué has rasgado tus vestidos? Que él venga a mí[b], y sabrá que hay un profeta en Israel”.'
  to: 'Ahora bien, cuando Eliseo, el hombre de Dios, oyó que el rey de Israel había rasgado sus vestidos[a], mandó decir al rey: «¿Por qué has rasgado tus vestidos? Que él venga a mí[b], y sabrá que hay un profeta en Israel».'
  rationale: Se corrige una construcción española poco natural y potencialmente engañosa («envió al rey a decir») por «mandó decir al rey», que transmite fielmente el hebreo y suena idiomática. También se repara la nota léxica [a] para que realmente presente una alternativa significativa y se conservan el título profético y la aclaración contextual sobre Naamán.
