translation:
  language: es
  text: Una enfermedad leve hace que el médico se ponga pálido[a]; un rey hoy[b], y mañana caerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo describe literalmente un cambio de color asociado con la enfermedad; el paralelo griego presenta la imagen de un médico que queda desconcertado o burlado, pero la traducción principal conserva el efecto corporal visible.
    reason: lexical_alternative
  - marker: b
    text: 'El griego añade: «y mañana terminará / llegará a su fin», interpretando el hebreo «caerá» de manera más específica como muerte o fin definitivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁמֶץ / μακρὸν
  english_pob_choice: slight
  chosen_spanish: leve
  alternatives_spanish:
  - pequeña
  - mínima
  - ligera
  lexicon: HALOT / paralelo griego
  rationale: El hebreo y el griego transmiten una afección de poca magnitud; «leve» conserva esa idea con naturalidad en español y mantiene el contraste irónico del proverbio.
- source_word: מַחֲלָה / ἀρρώστημα
  english_pob_choice: illness
  chosen_spanish: enfermedad
  alternatives_spanish:
  - dolencia
  - mal
  - sickness
  lexicon: HALOT / LSJ
  rationale: «Enfermedad» es el equivalente más claro y digno en español contemporáneo para una dolencia general, sin intensificar indebidamente la gravedad.
- source_word: יַצְהִיב / σκώπτει ἰατρός
  english_pob_choice: makes a physician turn pale
  chosen_spanish: hace que el médico se ponga pálido
  alternatives_spanish:
  - hace palidecer al médico
  - hace que el médico se vea amarillo
  - hace que el médico se vuelva pálido
  lexicon: HALOT / tradición hebrea y paralelo griego
  rationale: El hebreo expresa un cambio visible de color asociado con la enfermedad. En español, «ponerse pálido» transmite ese efecto corporal de forma natural; se preserva la fuerza imagística sin imponer «amarillo», que suena menos idiomático.
- source_word: רוֹפֵא
  english_pob_choice: physician
  chosen_spanish: médico
  alternatives_spanish:
  - físico
  - doctor
  - curandero
  lexicon: HALOT
  rationale: «Médico» funciona bien en español moderno y conserva el referente profesional del hebreo, con un registro sobrio y claro.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: HALOT
  rationale: Título regnal directo y estable; «rey» es la correspondencia natural y fiel.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: Adverbio temporal simple y exacto para el contraste con «mañana».
- source_word: וּמָחָר
  english_pob_choice: and tomorrow
  chosen_spanish: y mañana
  alternatives_spanish:
  - pero mañana
  - mañana
  lexicon: HALOT
  rationale: Se conserva la yuxtaposición breve del hebreo; el contraste temporal queda claro sin añadir explicación.
- source_word: יִפּוֹל
  english_pob_choice: he falls
  chosen_spanish: caerá
  alternatives_spanish:
  - caerá en ruina
  - morirá
  - se hundirá
  lexicon: HALOT / interpretación del paralelo griego
  rationale: El hebreo permite un sentido más general de caída o derrumbe; en español, el futuro simple «caerá» mantiene esa amplitud. El paralelo griego especifica el desenlace como muerte, pero el texto base hebreo no obliga a fijarlo en la traducción principal.
theological_decisions:
- issue: Si el final del rey debe explicitarse como muerte o dejarse en sentido más general
  english_pob_reading: The English POB keeps the broader Hebrew 'he falls' and notes the Greek specificity 'will come to his end.'
  chosen_spanish_reading: «mañana caerá»
  alternative_spanish_readings:
  - mañana morirá
  - mañana llegará a su fin
  - mañana caerá en la muerte
  rationale: Se sigue la primacía del hebreo en la redacción principal, preservando la tensión entre el testimonio hebreo y la interpretación más explícita del griego en una nota.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la imagen corporal de la enfermedad en el médico
  english_pob_reading: The English POB revised 'look yellow' to 'turn pale' for natural English while preserving discoloration imagery.
  chosen_spanish_reading: «se ponga pálido»
  alternative_spanish_readings:
  - se vea amarillo
  - amarillee
  - palidezca
  rationale: La elección conserva la imagen de cambio visible por enfermedad y suena idiomática en español. No se borra la tensión entre la metáfora cromática hebrea y la naturalidad receptiva en la lengua meta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador toma en cuenta la revisión inglesa más reciente, que sustituyó «look yellow» por «turn pale» para naturalizar la expresión sin perder la imagen de palidez. En español, se adoptó una solución equivalente: «se ponga pálido». También se mantuvo la amplitud de «caerá» para el final del rey, con nota sobre la lectura más explícita del griego.'
  spanish_consistency_notes:
  - Se usa «médico» en lugar de «doctor» para un registro más sobrio y uniforme con proverbios sapienciales.
  - Se conserva «rey» y no «monarca» para no elevar artificialmente el registro.
  - «Hoy... y mañana...» reproduce el paralelismo temporal corto del original.
  - No se introduce «Cristo», «Señor» ni otros equivalentes no pertinentes al versículo.
