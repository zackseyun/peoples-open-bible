translation:
  language: es
  text: la que abandona al compañero de su juventud y olvida el pacto de su Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposo de su juventud». El hebreo puede denotar un compañero íntimo y aquí probablemente se refiere a su pareja matrimonial.
    reason: lexical_alternative
  - marker: b
    text: «El pacto de su Dios» probablemente alude al pacto matrimonial hecho bajo la autoridad o el testimonio de Dios, aunque también puede evocar su obligación de pacto más amplia delante de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֹזֶבֶת
  english_pob_choice: who abandons
  chosen_spanish: la que abandona
  alternatives_spanish:
  - la que deja
  - la que abandona
  lexicon: HALOT
  rationale: El participio femenino singular expresa una mujer caracterizada por dejar atrás a alguien. En español, «abandona» comunica con naturalidad la fuerza de «forsake/abandon» sin perder el matiz relacional y moral del hebreo.
- source_word: אַלּוּף
  english_pob_choice: companion
  chosen_spanish: compañero
  alternatives_spanish:
  - amigo íntimo
  - esposo
  - pareja
  lexicon: HALOT
  rationale: ALּוּF puede denotar un asociado íntimo o compañero. «Compañero» conserva el sentido léxico amplio y permite que el contexto matrimonial se infiera, sin cerrar prematuramente la ambigüedad con «esposo» en el texto principal.
- source_word: נְעוּרֶיהָ
  english_pob_choice: of her youth
  chosen_spanish: de su juventud
  alternatives_spanish:
  - desde su juventud
  - de sus años mozos
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de modo idiomático como «de su juventud». Mantiene la idea de una relación temprana y establecida en los años jóvenes.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - pacto vinculante
  - covenio
  lexicon: HALOT
  rationale: Aunque «covenant» suele rendirse por «pacto» en español bíblico, aquí ese término es claro, digno y ampliamente entendible. Preserva el peso jurídico-relacional del hebreo sin forzar una terminología eclesiástica más estrecha.
- source_word: אֱלֹהֶיהָ
  english_pob_choice: her God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - el Dios de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular se conserva en español mediante «su Dios»; el referente femenino ya está suficientemente claro por el contexto inmediato. Esta forma evita redundancia y mantiene la naturalidad del verso.
- source_word: שָׁכֵחָה
  english_pob_choice: forgets
  chosen_spanish: olvida
  alternatives_spanish:
  - ha olvidado
  - descuida
  lexicon: HALOT
  rationale: Aunque el hebreo es perfecto, el discurso proverbial suele expresarse en presente gnómico. «Olvida» comunica una conducta habitual o caracterizadora, más que un mero evento puntual del pasado.
theological_decisions:
- issue: ¿Cómo traducir בְּרִית אֱלֹהֶיהָ sin resolver en exceso si se trata del pacto matrimonial o de una obligación más amplia ante Dios?
  english_pob_reading: the covenant of her God, with likely implication of the marriage covenant under divine witness
  chosen_spanish_reading: el pacto de su Dios, dejando visible la posibilidad de que aluda al pacto matrimonial bajo la autoridad o testimonio divinos
  alternative_spanish_readings:
  - su pacto matrimonial delante de Dios
  - el pacto de Dios en sentido más amplio
  rationale: 'El hebreo dice literalmente «el pacto de su Dios». La versión española conserva esa formulación y no la reduce a «matrimonio» en el texto principal. Así se mantiene la tensión documentada: el contexto sugiere la relación conyugal, pero la expresión bíblica es más amplia y teológicamente cargada.'
  doctrine_reference: Preservar la tensión teológica y exegética en lugar de resolverla de forma reductiva.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: conserva la ambigüedad de אַלּוּף mediante «compañero» y mantiene la expresión literal «el pacto de su Dios» sin reinterpretarla. No se registraron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene el estilo poético y proverbial con sintaxis directa.
  - Se evita «SEÑOR» porque aquí el hebreo dice אֱלֹהֶיהָ, no el Tetragrámaton.
  - «Pacto» se usa de forma consistente para בְּרִית en este verso.
  - La puntuación con dos notas al pie sigue el patrón del audit trail inglés, con marcas únicas y correspondencia exacta en el texto.
