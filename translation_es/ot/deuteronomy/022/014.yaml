  rationale: Se corrige la primera expresión idiomática a una forma española natural y jurídicamente clara («la acusa falsamente») y la segunda a una formulación que preserva la imagen reputacional del hebreo sin añadir contenido («le da mala fama»). Además, se restauran en español las notas significativas del rastro POB en inglés sobre el modismo difamatorio, el eufemismo sexual y el sentido forense de «virginidad».
