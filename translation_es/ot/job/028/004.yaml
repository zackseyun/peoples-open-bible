base_translation:
  language: en
  yaml_path: translation/ot/job/028/004.yaml
  text: He breaks open a shaft away from where people dwell[a]; forgotten by the foot, they hang far from men[c][b], they sway.
  footnotes:
  - marker: a
    text: Or 'He breaks open a channel/torrent-bed away from where a sojourner is.' The Hebrew is difficult, especially the words נחל and גר; many understand the line in light of the chapter's mining imagery and so render נחל as 'shaft.'
    reason: alternative_reading
  - marker: b
    text: Literally 'forgotten from/by foot.' The sense is that this place or these workers are beyond the notice or reach of those walking above.
    reason: lexical_alternative
  - marker: c
    text: Or 'they are lowered' or 'they dangle.' The Hebrew verb can suggest being suspended or let down, likely by ropes in a mine.
    reason: lexical_alternative
