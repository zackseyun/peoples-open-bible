translation:
  language: es
  text: Como una gota de agua del mar y un grano de arena[a], así son pocos años en el día de la eternidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guijarro de arena»; ψῆφος a menudo significa «guijarro», pero aquí probablemente se refiere a un solo grano de arena por estar unido a ἄμμου («de arena»).
    reason: lexical_alternative
  - marker: b
    text: O «en el día de la edad». La expresión griega es compacta y puede traducirse de manera más literal, pero aquí se entiende como la inmensidad de la eternidad frente a los años humanos.
    reason: alternative_reading
lexical_decisions:
- source_word: σταγών
  english_pob_choice: drop
  chosen_spanish: gota
  alternatives_spanish:
  - gota pequeña
  - gotita
  lexicon: LSJ
  rationale: σταγών designa una sola gota; «gota» es natural en español y conserva la imagen de pequeñez sin añadir matiz innecesario.
- source_word: ψῆφος
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - guijarro
  - piedrecilla
  lexicon: LSJ
  rationale: Aunque ψῆφος puede significar «guijarro», aquí está unido a ἄμμου («de arena»), por lo que la idea es la de una sola partícula de arena. «Grano» comunica mejor esa unidad mínima en español.
- source_word: ὀλίγα ἔτη
  english_pob_choice: a few years
  chosen_spanish: pocos años
  alternatives_spanish:
  - unos pocos años
  - unos años
  lexicon: LSJ
  rationale: La expresión griega subraya brevedad; «pocos años» es el equivalente más natural y directo en español.
- source_word: ἡμέρα αἰῶνος
  english_pob_choice: the day of eternity
  chosen_spanish: el día de la eternidad
  alternatives_spanish:
  - el día de la era
  - el día del siglo
  lexicon: LSJ
  rationale: αἰών aquí contrasta la pequeñez de la vida humana con una duración inconmensurable. «Eternidad» preserva ese contraste teológico-temporal mejor que «edad» o «era» en español.
- source_word: οὕτως
  english_pob_choice: so are
  chosen_spanish: así son
  alternatives_spanish:
  - así resultan
  - de ese modo son
  lexicon: LSJ
  rationale: Introduce la comparación y, en español, requiere una forma plural natural concordante con «años».
theological_decisions:
- issue: Sentido de αἰών en ἐν ἡμέρᾳ αἰῶνος
  english_pob_reading: eternity
  chosen_spanish_reading: eternidad
  alternative_spanish_readings:
  - edad
  - era
  - siglo
  rationale: El contexto contrasta la breve duración humana con una escala inmensurable. «Eternidad» expresa con mayor claridad ese valor temporal-teológico sin oscurecer el paralelo poético del texto griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense over translation tradition.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden plenamente; no se registran revisiones aplicadas y no hubo cambios necesarios en la última pasada de revisión.
