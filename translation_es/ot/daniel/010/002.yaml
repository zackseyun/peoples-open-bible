translation:
  language: es
  text: En aquellos días, yo, Daniel, estaba lamentándome por tres semanas de días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tres semanas de días»; es una expresión que enfatiza semanas ordinarias de días y no una unidad simbólica.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En ese tiempo
  lexicon: HALOT
  rationale: La expresión temporal con ב + יָמִים + demostrativo es una fórmula narrativa estándar. «En aquellos días» conserva el plural y suena natural y reverente en español.
- source_word: אֲנִי דָנִיֵּאל
  english_pob_choice: I, Daniel,
  chosen_spanish: yo, Daniel
  alternatives_spanish:
  - yo Daniel
  - Daniel mismo
  lexicon: HALOT
  rationale: El pronombre independiente más el nombre propio tiene valor enfático y de autoidentificación. En español, la apposición con coma expresa bien esa fuerza sin forzar el orden.
- source_word: הָיִיתִי מִתְאַבֵּל
  english_pob_choice: was mourning
  chosen_spanish: estaba de luto
  alternatives_spanish:
  - estaba lamentándome
  - estaba afligido
  lexicon: HALOT
  rationale: El verbo con היה y el participio hitpael indica un estado/acción continua en pasado. «Estaba de luto» comunica bien el estado prolongado de duelo y mantiene la carga de luto más que un simple «estaba afligido».
- source_word: שְׁלֹשָׁה שָׁבֻעִים יָמִים
  english_pob_choice: three weeks of days
  chosen_spanish: tres semanas de días
  alternatives_spanish:
  - tres semanas
  - tres semanas completas
  lexicon: HALOT
  rationale: La secuencia literal «semanas, días» funciona como modismo que aclara que se trata de semanas ordinarias de siete días, no de una unidad simbólica. «Tres semanas de días» preserva la rareza y el matiz explicativo del hebreo sin añadir ‘completas’.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «three full weeks» a «three weeks of days» para acercarse más al hebreo y evitar añadir «full». La redacción española sigue ese mismo criterio, manteniendo la literalidad idiomática sin introducir ‘completas’.
  spanish_consistency_notes:
  - Se mantiene «Daniel» como nombre propio sin añadir título.
  - No se usa «SEÑOR» ni otras sustituciones porque este versículo no contiene el Tetragrámaton ni κύριος.
  - «Luto» se eligió por su claridad y por conservar el sentido de estado prolongado más que un mero sentimiento momentáneo.
