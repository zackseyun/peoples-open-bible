translation:
  language: es
  text: Entonces ustedes subirán tras él, y él vendrá y se sentará en mi trono, y reinará en mi lugar; y yo lo he designado[a] para que sea gobernante sobre Israel y sobre Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘yo lo he mandado para que sea príncipe o líder sobre Israel y sobre Judá’. El verbo hebreo צוה suele significar ‘mandar/ordenar’, y נָגִיד también puede traducirse ‘príncipe’ o ‘líder’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲלִיתֶם
  english_pob_choice: you shall go up
  chosen_spanish: ustedes subirán
  alternatives_spanish:
  - ustedes irán tras él
  - ustedes ascenderán
  lexicon: HALOT
  rationale: עלה expresa literalmente ‘subir/ascender’. En español, ‘subir’ conserva el movimiento procesional sin volver la frase artificial. Mantiene también la fuerza direccional del mandato futuro.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - después de él
  - detrás de él
  lexicon: HALOT
  rationale: La expresión indica seguimiento inmediato en una procesión o escolta. ‘Tras él’ es natural en español y conserva el orden y la relación de honor.
- source_word: וּבָא
  english_pob_choice: he shall come
  chosen_spanish: él vendrá
  alternatives_spanish:
  - él entrará
  lexicon: HALOT
  rationale: בוא puede significar ‘venir’ o ‘entrar’. ‘Vendrá’ sigue siendo amplio y evita imponer más de lo que el texto dice, dejando que la escena avance hacia el trono.
- source_word: וְיָשַׁב עַל כִּסְאִי
  english_pob_choice: sit on my throne
  chosen_spanish: se sentará en mi trono
  alternatives_spanish:
  - se sentará sobre mi trono
  - tomará su asiento en mi trono
  lexicon: HALOT
  rationale: ישב con עַל + trono es lenguaje entronizador. ‘Se sentará en mi trono’ conserva la imagen real y suena natural en español moderno.
- source_word: וְהוּא יִמְלֹךְ תַּחְתָּי
  english_pob_choice: he shall reign in my place
  chosen_spanish: reinará en mi lugar
  alternatives_spanish:
  - reinará después de mí
  - reinará en vez de mí
  lexicon: HALOT
  rationale: תחת + sufijo indica reemplazo o sucesión en el oficio. ‘En mi lugar’ comunica bien la sucesión real sin cargar innecesariamente el matiz adversativo de ‘en vez de mí’.
- source_word: צִוִּיתִי
  english_pob_choice: I have appointed
  chosen_spanish: yo lo he designado
  alternatives_spanish:
  - yo lo he mandado
  - yo le he encargado
  lexicon: HALOT
  rationale: El POB inglés opta por ‘appointed’ por el valor performativo del verbo en este contexto. ‘He designado’ expresa mejor en español esa investidura oficial que un simple ‘mandado’, sin borrar el trasfondo de ‘ordenar’ que se conserva en la nota.
- source_word: לִהְיוֹת נָגִיד
  english_pob_choice: to be ruler
  chosen_spanish: para que sea gobernante
  alternatives_spanish:
  - para que sea príncipe
  - para que sea líder
  - para que sea jefe
  lexicon: HALOT
  rationale: נָגִיד puede ser ‘príncipe’, ‘líder’ o ‘gobernante’. ‘Gobernante’ comunica autoridad establecida y se distingue de ‘reinará’, preservando la diferencia léxica que el audit trail señala entre מלך y נָגִיד.
- source_word: עַל יִשְׂרָאֵל וְעַל יְהוּדָה
  english_pob_choice: over Israel and over Judah
  chosen_spanish: sobre Israel y sobre Judá
  alternatives_spanish:
  - sobre Israel y Judá
  lexicon: HALOT
  rationale: Repetir ‘sobre’ refleja la repetición de עַל y mantiene el tono formal de investidura con autoridad sobre ambos pueblos.
theological_decisions:
- issue: Diferencia entre מלך y נָגִיד en la misma cláusula
  english_pob_reading: rendered as 'he shall reign' for מלך and 'ruler' for נָגִיד
  chosen_spanish_reading: ‘reinará’ para מלך y ‘gobernante’ para נָגִיד
  alternative_spanish_readings:
  - ‘rey’ para ambos
  - ‘príncipe’ para נָגִיד
  rationale: La decisión preserva la distinción del hebreo entre la acción de reinar y la función asignada. No se aplanan ambos términos en ‘rey’, porque el texto los usa con matices distintos y el audit trail documenta esa diferencia.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje permaneció estable, y la propuesta española sigue la lectura auditada sin ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma predeterminada para el nombre divino cuando aparezca; en este versículo no se presenta.
  - Se conserva la distinción entre ‘reinará’ y ‘gobernante’ para reflejar מלך y נָגִיד por separado.
  - El español evita ‘SEÑOR’ como sustituto del nombre divino; no aplica aquí, pero la política terminológica queda alineada con el proyecto.
  - ‘Tras él’ y ‘subirán’ reflejan el movimiento procesional sin sobreinterpretar la escena.
