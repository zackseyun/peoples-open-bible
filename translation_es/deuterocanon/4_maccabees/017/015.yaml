translation:
  language: es
  text: Pero la piedad hacia Dios venció[a], coronando a sus propios atletas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la piedad hacia Dios venció, coronando a sus propios atletas». El griego personifica θεοσέβεια con forma femenina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεοσέβεια
  english_pob_choice: godliness
  chosen_spanish: piedad hacia Dios
  alternatives_spanish:
  - piedad
  - devoción a Dios
  - reverencia hacia Dios
  lexicon: LSJ
  rationale: θεοσέβεια designa reverencia/devoción dirigida a Dios. En español, "piedad" por sí sola puede sonar más amplia o tradicional, así que añado "hacia Dios" para conservar la orientación explícita del sustantivo griego sin volverlo demasiado técnico.
- source_word: ἐνίκα
  english_pob_choice: won
  chosen_spanish: venció
  alternatives_spanish:
  - ganó
  - prevaleció
  - fue victoriosa
  lexicon: LSJ
  rationale: El imperfectivo narrativo expresa triunfo o superioridad en la escena. "Venció" suena natural en español y mantiene el sentido competitivo y victorioso mejor que una perífrasis más pesada.
- source_word: τοὺς ἑαυτῆς
  english_pob_choice: its own
  chosen_spanish: sus propios
  alternatives_spanish:
  - sus
  - de ella, sus
  - sus mismos
  lexicon: LSJ
  rationale: El griego usa un posesivo reflexivo ligado a un sustantivo femenino personificado. En español, "sus propios" conserva la pertenencia y el énfasis sin forzar un pronombre femenino que pueda sonar artificial en el contexto.
- source_word: ἀθλητάς
  english_pob_choice: athletes
  chosen_spanish: atletas
  alternatives_spanish:
  - contendientes
  - competidores
  - campeones
  lexicon: LSJ
  rationale: El término remite de manera directa a la imagen atlética de competición. "Atletas" preserva la metáfora con claridad en español y evita interpretar el resultado más allá del término griego.
- source_word: στεφανοῦσα
  english_pob_choice: crowning
  chosen_spanish: coronando
  alternatives_spanish:
  - ceñendo con corona
  - otorgando la corona a
  - premiando con corona
  lexicon: LSJ
  rationale: El participio alude al acto de coronar al vencedor en el certamen. "Coronando" mantiene la imagen breve y literal; "otorgando la corona a" explicitaría demasiado la metáfora.
theological_decisions:
- issue: Personificación de θεοσέβεια
  english_pob_reading: Translate as 'godliness' with the personification retained through the participle 'crowning,' but without a feminine English pronoun.
  chosen_spanish_reading: Traducir con un sustantivo abstracto personalizable en la frase, pero sin imponer un género femenino explícito en el pronombre.
  alternative_spanish_readings:
  - La piedad ganó, coronando a sus propios atletas.
  - La piedad hacia Dios venció, coronando a sus atletas.
  rationale: El griego personifica θεοσέβεια con forma femenina y la presenta como vencedora en una competencia. En español, "la piedad hacia Dios" conserva el sujeto personificado; el posesivo "sus propios" mantiene el eco de pertenencia sin introducir una lectura doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete (1909) y el audit trail inglés: conserva la personificación de θεοσέβεια, la imagen atlética de ἀθλητάς y la metáfora de στεφανοῦσα. No se detectaron revisiones posteriores en el expediente; el criterio del inglés POB (equivalencia óptima) se mantuvo en español con ajustes naturales de estilo.'
  spanish_consistency_notes:
  - Se emplea "Dios" para θεοσέβεια por ser un sustantivo de devoción dirigida explícitamente a él.
  - '"Atletas" se conserva como imagen competitiva literal, no como metáfora suavizada.'
  - '"Coronando" preserva el acto victorioso del certificado/laurel sin convertirlo en una explicación interpretativa.'
  - La nota mantiene la alternativa de género porque el griego personifica el sustantivo en femenino y el español puede expresarlo de más de una manera.
