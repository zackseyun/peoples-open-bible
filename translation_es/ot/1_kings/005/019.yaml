translation:
  language: es
  text: 'Y he aquí[a], me propongo edificar una casa para el nombre de Yahvé mi Dios[b], conforme a lo que Yahvé habló a David, mi padre, diciendo: «Tu hijo, a quien pondré en tu lugar sobre tu trono[c], él edificará la casa para mi nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para edificar un templo»; el hebreo dice literalmente «edificar una casa».
    reason: lexical_alternative
  - marker: b
    text: La fórmula «para el nombre de Yahvé mi Dios» conserva el giro hebreo del templo dedicado al nombre y la presencia de Yahvé.
    reason: cultural_note
  - marker: c
    text: O «a quien estableceré después de ti»; el hebreo dice literalmente «a quien pondré/daré en tu lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנְנִי
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y ahora
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce la declaración con un matiz de atención y presentación solemne; «Y he aquí» conserva esa fuerza discursiva sin perder naturalidad en español.
- source_word: אֹמֵר
  english_pob_choice: I intend
  chosen_spanish: yo pienso
  alternatives_spanish:
  - yo intento
  - yo estoy diciendo
  lexicon: HALOT
  rationale: En este contexto el participio expresa resolución o propósito, no mera enunciación; «yo pienso» comunica la intención en español sin volverlo demasiado coloquial.
- source_word: לִבְנוֹת בַּיִת
  english_pob_choice: to build a house
  chosen_spanish: edificar una casa
  alternatives_spanish:
  - construir una casa
  - edificar un templo
  lexicon: HALOT
  rationale: «Casa» mantiene el valor literal de בַּיִת y la resonancia teológica del templo como «casa»; «edificar» conserva un registro más bíblico y solemne que «construir».
- source_word: לְשֵׁם יְהוָה אֱלֹהָי
  english_pob_choice: for the name of Yahweh my God
  chosen_spanish: para el nombre de Yahvé mi Dios
  alternatives_spanish:
  - para el nombre de Yahvé, mi Dios
  - en honor del nombre de Yahvé mi Dios
  lexicon: HALOT
  rationale: Se preserva la fórmula del templo «para el nombre de» en vez de explicitarla como simple homenaje; «Yahvé» sigue la norma del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» conforme a la convención del proyecto, evitando la sustitución por un título.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... spoke
  chosen_spanish: conforme a lo que ... habló
  alternatives_spanish:
  - tal como ... habló
  - como ... habló
  lexicon: HALOT
  rationale: La comparación enlaza la intención de Salomón con la promesa previa; «conforme a lo que ... habló» expresa correspondencia de forma clara y fiel.
- source_word: אֶל דָּוִד אָבִי
  english_pob_choice: to David my father
  chosen_spanish: a David, mi padre
  alternatives_spanish:
  - a mi padre David
  lexicon: HALOT
  rationale: Se mantiene el orden casi directo del hebreo y la relación filial explícita en un español natural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: Es el introductor estándar de cita; «diciendo» conserva la forma simple y fiel.
- source_word: בִּנְךָ
  english_pob_choice: Your son
  chosen_spanish: Tu hijo
  alternatives_spanish:
  - el hijo tuyo
  lexicon: HALOT
  rationale: «Tu hijo» es la equivalencia directa e idiomática de la posesión pronominal hebrea.
- source_word: אֲשֶׁר אֶתֵּן תַּחְתֶּיךָ
  english_pob_choice: whom I will set in your place
  chosen_spanish: a quien pondré en tu lugar
  alternatives_spanish:
  - a quien estableceré en tu lugar
  - a quien daré en tu lugar
  lexicon: HALOT
  rationale: «Pondré en tu lugar» conserva la idea de sustitución/sucesión real y evita perder la fuerza de reemplazo que tiene el hebreo.
- source_word: עַל כִּסְאֶךָ
  english_pob_choice: on your throne
  chosen_spanish: sobre tu trono
  alternatives_spanish:
  - en tu trono
  - en el trono que es tuyo
  lexicon: HALOT
  rationale: «Sobre tu trono» refleja el idiomático hebreo de entronización y sucesión sin sobreinterpretarlo.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese mismo
  lexicon: HALOT
  rationale: Se conserva el pronombre enfático para destacar al hijo designado como el edificador.
- source_word: יִבְנֶה הַבַּיִת
  english_pob_choice: will build the house
  chosen_spanish: edificará la casa
  alternatives_spanish:
  - construirá la casa
  - edificará el templo
  lexicon: HALOT
  rationale: Se mantiene «casa» por coherencia con בַּיִת y la alusión al templo; «edificará» preserva el tono formal.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - en favor de mi nombre
  - para el nombre mío
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea del templo como lugar dedicado al nombre divino, sin convertirla en paráfrasis explicativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa; el proyecto pide «Yahvé» para preservar el nombre pactual y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula del templo «para el nombre de»
  english_pob_reading: for the name of Yahweh my God / for my name
  chosen_spanish_reading: para el nombre de Yahvé mi Dios / para mi nombre
  alternative_spanish_readings:
  - en honor de Yahvé mi Dios
  - dedicada a Yahvé mi Dios
  rationale: La fórmula no se reduce a mera dedicación honorífica; retiene el lenguaje bíblico del nombre como presencia y pertenencia, por lo que se conserva literalmente con claridad en español.
  doctrine_reference: Temple theology in Kings; preserved by English POB as a lexical-theological formula
- issue: Sucesión real y sustitución implícita en תַּחְתֶּיךָ
  english_pob_reading: whom I will set in your place
  chosen_spanish_reading: a quien pondré en tu lugar
  alternative_spanish_readings:
  - a quien nombraré después de ti
  - a quien estableceré tras de ti
  rationale: Se mantiene la tensión entre nombramiento y reemplazo sucesorio; «en tu lugar» comunica ambas sin suavizarlas.
  doctrine_reference: Royal succession context in 1 Kings
translation_notes:
  revision_awareness: Se ha revisado la propuesta contra el texto hebreo consonante-vocalizado (WLC) y el audit trail inglés. Se mantuvo la fórmula templaria literal, la referencia al Nombre divino y la tensión sucesoria de תַּחְתֶּיךָ sin diluirlas; no hubo indicios de necesidad de enmiendas textuales.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «casa» para בַּיִת por coherencia con la teología del templo.
  - Se conserva «nombre» en ambas apariciones de לְשֵׁם / לִשְׁמִי.
  - El registro es bíblico y solemne, pero en español moderno natural.
  - Las notas distinguen entre alternativa léxica y nota teológica para no mezclar niveles de decisión.
