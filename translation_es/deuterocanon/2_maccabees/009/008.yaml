translation:
  language: es
  text: Pero el que había pensado, en su arrogancia por encima de los hombres, dar órdenes hasta a las olas del mar, y se imaginaba que podría pesar en una balanza las alturas de los montes, fue derribado a tierra y llevado en una litera, mostrando claramente a todos el poder de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego presenta una repetición irregular: «la fe, la fe, el poder». Probablemente se trata de una corrupción textual o de una repetición de escriba; la traducción sigue el sentido claro de la cláusula, «el poder de Dios».'
    reason: textual_variant
lexical_decisions:
- source_word: ἀντιδοκῶν
  english_pob_choice: had thought
  chosen_spanish: había pensado
  alternatives_spanish:
  - había supuesto
  - se imaginaba
  - había presumido
  lexicon: LSJ
  rationale: El participio introduce la autovaloración previa del personaje con ironía. «Había pensado» comunica esa presunción sin sonar artificial en español y mantiene el contraste con su humillación posterior.
- source_word: τοῖς τῆς θαλάσσης κύμασιν
  english_pob_choice: the waves of the sea
  chosen_spanish: las olas del mar
  alternatives_spanish:
  - las olas del mar
  - las olas del océano
  lexicon: LSJ
  rationale: Es una expresión directa y natural en español, fiel a la imagen elevada del griego sin forzar una construcción genitiva calcada.
- source_word: διὰ τὴν ὑπὲρ ἀνθρώπων ὑπερηφανίαν
  english_pob_choice: in his arrogance over men
  chosen_spanish: en su arrogancia sobre los hombres
  alternatives_spanish:
  - por su orgullo sobre los hombres
  - por su arrogancia contra los hombres
  lexicon: LSJ
  rationale: '«Sobre los hombres» conserva el matiz de superioridad de ὑπέρ: se exaltaba por encima de la humanidad. Se mantiene «hombres» por fidelidad al valor genérico masculino del griego, sin neutralizarlo innecesariamente.'
- source_word: πλάστιγγι
  english_pob_choice: on a scale
  chosen_spanish: en una balanza
  alternatives_spanish:
  - sobre una balanza
  - con una balanza
  lexicon: LSJ
  rationale: En español, «balanza» expresa con claridad el instrumento de pesar. «En una balanza» es una forma idiomática para la imagen de medir/pesar alturas imposibles.
- source_word: τῶν ὀρέων ... ὕψη
  english_pob_choice: the heights of the mountains
  chosen_spanish: las alturas de los montes
  alternatives_spanish:
  - las alturas de las montañas
  - los altos de los montes
  - las cumbres de los montes
  lexicon: LSJ
  rationale: Se conserva el paralelismo de dos sustantivos y el tono hiperbólico. «Montes» refleja bien el registro elevado de ὄρη.
- source_word: στήσειν
  english_pob_choice: weigh out
  chosen_spanish: pesar
  alternatives_spanish:
  - medir
  - determinar
  - fijar
  lexicon: LSJ
  rationale: Con «balanza» en el contexto, el verbo debe sugerir la operación de pesar/medir lo imposible. «Pesar» funciona mejor en español que una paráfrasis como «establecer».
- source_word: κατὰ γῆν γενόμενος
  english_pob_choice: was brought down to the ground
  chosen_spanish: fue derribado a tierra
  alternatives_spanish:
  - fue abatido a tierra
  - quedó postrado en tierra
  - fue arrojado al suelo
  lexicon: LSJ
  rationale: El giro marca su caída de la pretensión a la humillación física. «Fue derribado a tierra» mantiene la fuerza de descenso y evita añadir un «ahora» no explicitado en el griego.
- source_word: ἐν φορίᾳ παρεκομίζετο
  english_pob_choice: carried in a litter
  chosen_spanish: llevado en una litera
  alternatives_spanish:
  - transportado en una litera
  - llevado en una camilla
  - llevado en un litter
  lexicon: LSJ
  rationale: «Litera» es el equivalente español más natural y digno para φορία en este contexto histórico. «Llevado» conserva la pasividad del verbo sin precisar de más.
- source_word: φανερὰν ... πᾶσιν
  english_pob_choice: showing plainly to all
  chosen_spanish: mostrando claramente a todos
  alternatives_spanish:
  - mostrando abiertamente a todos
  - haciendo evidente a todos
  - manifestando claramente a todos
  lexicon: LSJ
  rationale: La frase adverbial se vierte de forma fluida y directa, conservando el efecto público del testimonio que produce su estado.
- source_word: τοῦ θεοῦ ... δύναμιν
  english_pob_choice: the power of God
  chosen_spanish: el poder de Dios
  alternatives_spanish:
  - la fuerza de Dios
  - el poder divino
  lexicon: LSJ
  rationale: La construcción genitiva se conserva de manera simple y solemne. «Poder» es la mejor opción para δύναμις en este contexto de manifestación pública.
- source_word: τὴν πίστιν τὴν πίστιν τὴν δύναμιν
  english_pob_choice: the power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fidelidad y el poder
  - la fe y el poder
  lexicon: LSJ
  rationale: La secuencia griega presenta una repetición anómala de πίστιν que parece corrupción o dittografía. Como el sentido claro de la cláusula es la manifestación del poder de Dios, la traducción principal sigue ese sentido y no fuerza «fe» o «fidelidad» en el cuerpo del texto.
theological_decisions:
- issue: Cómo verter ἀνθρώπων sin neutralizar indebidamente el griego
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: El griego usa plural masculino con fuerza representativa. Mantener «los hombres» preserva la superioridad arrogante que el texto atribuye al personaje, sin borrar la forma concreta del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tratamiento de la repetición anómala de πίστιν en el texto griego
  english_pob_reading: Translate the evident sense as 'the power of God' in the main text and preserve the irregularity as a textual footnote
  chosen_spanish_reading: 'Traducir el sentido evidente: ''el poder de Dios'', con nota textual sobre la repetición irregular'
  alternative_spanish_readings:
  - incluir 'la fe' en el texto principal
  - traducir 'la fidelidad' como parte de la cláusula
  rationale: La repetición de πίστιν en el testimonio de Swete sugiere un problema textual o una dittografía. Para no introducir una idea secundaria incierta, el texto principal expresa el sentido claro y la nota documenta la irregularidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail inglés al omitir cualquier equivalente de «now», porque no está explícito en el griego, y he mantenido la lectura central de humillación pública y manifestación del poder de Dios.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «poder» para δύναμις, conforme a los defaults del proyecto.
  - Se conserva el registro formal y narrativo, sin convertir la frase en paráfrasis devocional.
  - La imagen de la litera se traduce con un término español corriente y comprensible para lectores bíblicos amplios.
