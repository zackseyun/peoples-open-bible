  yaml_path: translation/ot/jeremiah/034/005.yaml
  text: You will die in peace[a]. And as spices were burned for your fathers, the former kings who were before you, so they will burn spices for you, and they will lament for you, saying, “Alas, lord!” For I have spoken the word[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'as funeral burnings were made for your fathers.' The Hebrew refers to ceremonial burnings in honor of deceased kings, likely of spices or aromatics, not the burning of the body.
    reason: cultural_note
  - marker: b
    text: Or 'Ah, lord!' The Hebrew is a formal cry of lament over a ruler.
    reason: lexical_alternative
