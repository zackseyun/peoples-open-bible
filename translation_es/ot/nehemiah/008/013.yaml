translation:
  language: es
  text: Y al segundo día[a] se reunieron los jefes de las casas paternas de todo el pueblo, los sacerdotes y los levitas, a Esdras el escriba, para adquirir entendimiento de las palabras de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jefes de las familias». La expresión hebrea dice literalmente «los jefes de las casas paternas», es decir, líderes de clan o de familia extensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הַשֵּׁנִי
  english_pob_choice: And on the second day
  chosen_spanish: Y al segundo día
  alternatives_spanish:
  - Y en el segundo día
  - Entonces, al segundo día
  lexicon: HALOT
  rationale: Conserva la secuencia narrativa del waw y la referencia temporal directa. «Al segundo día» es natural en español y refleja bien la relación temporal del hebreo.
- source_word: נֶאֶסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  lexicon: HALOT
  rationale: El nifal plural expresa acción colectiva intransitiva. «Se reunieron» es idiomático en español y mantiene el valor de asamblea sin añadir matices ajenos.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de familia
  - los cabezas de las casas de los padres
  lexicon: HALOT
  rationale: La expresión apunta a líderes de clan o de unidades familiares extensas. «Casas paternas» conserva la estructura hebrea y «jefes» comunica con claridad la función de liderazgo.
- source_word: לְכָל הָעָם
  english_pob_choice: of all the people
  chosen_spanish: de todo el pueblo
  alternatives_spanish:
  - de todo el pueblo reunido
  - de todo el pueblo
  lexicon: HALOT
  rationale: En contexto modifica a los líderes, indicando que proceden de todo el pueblo. «De todo el pueblo» es claro y fiel al alcance colectivo.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the priests, and the Levites
  chosen_spanish: los sacerdotes y los levitas
  alternatives_spanish:
  - los sacerdotes, y los levitas
  - los sacerdotes y levitas
  lexicon: HALOT
  rationale: Se mantienen los dos grupos como participantes en la reunión. «Sacerdotes» y «levitas» son equivalentes estándar y transparentes en español.
- source_word: אֶל עֶזְרָא הַסֹּפֵר
  english_pob_choice: to Ezra the scribe
  chosen_spanish: ante Esdras, el escriba
  alternatives_spanish:
  - a Esdras, el escriba
  - hacia Esdras, el escriba
  lexicon: HALOT
  rationale: Aunque אֶל suele indicar dirección, aquí el sentido contextual es aproximación/reunión ante Esdras. «Ante» evita una traducción demasiado mecánica y refleja la escena de consulta. «Escriba» preserva la función experta de סֹפֵר.
- source_word: וּלְהַשְׂכִּיל
  english_pob_choice: to gain insight
  chosen_spanish: para entender
  alternatives_spanish:
  - para ganar entendimiento
  - para adquirir discernimiento
  - para comprender
  lexicon: HALOT
  rationale: El hifil de שׂכל tiene un sentido de actuar con entendimiento o lograr discernimiento. «Para entender» es la opción más natural en español y conserva la finalidad sin sobreinterpretar.
- source_word: אֶל דִּבְרֵי הַתּוֹרָה
  english_pob_choice: into the words of the law
  chosen_spanish: las palabras de la ley
  alternatives_spanish:
  - los דברי de la ley
  - las palabras de la Torá
  - los términos de la ley
  lexicon: HALOT
  rationale: «דברי» se vierte de manera directa como «palabras», y «ley» mantiene el valor de תּוֹרָה en este contexto instructivo/covenantal. Se evita «Torá» para que el versículo siga siendo inmediatamente inteligible, sin perder la referencia al cuerpo normativo.
theological_decisions:
- issue: Valor de תּוֹרָה en contexto de instrucción pública
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Torá
  - la instrucción
  rationale: En Nehemías 8 el contexto es la lectura y explicación pública del texto normativo. «La ley» comunica de manera clara el contenido de la instrucción divina sin introducir una terminología menos transparente para el lector general.
  doctrine_reference: Torá como instrucción/corpus normativo en el contexto de la renovación del pacto; cf. Nehemías 8:1-8.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el acuerdo alto del audit trail inglés. Se mantiene la estructura narrativa, la lista de participantes y el propósito final. La única adaptación interpretativa principal es אֶל עֶזְרָא como «ante Esdras», por el sentido contextual de reunión y consulta, no de simple movimiento físico.
  spanish_consistency_notes:
  - Se usa «Esdras» para עֶזְרָא y «escriba» para הַסֹּפֵר, en coherencia con la tradición bíblica española y con la función específica del término.
  - Se conserva «levitas» y «sacerdotes» como términos eclesialmente transparentes y fieles al hebreo.
  - «Para entender» mantiene el matiz final de finalidad del infinitivo hebreo mejor que una paráfrasis más amplia.
