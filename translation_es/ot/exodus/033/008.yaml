review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la escena habitual: la salida repetida de Moisés, la reacción reverente del pueblo y la observación hasta que él entra en la tienda. Sin embargo, no preserva de forma suficientemente fiel dos decisiones clave del rastro POB: הָאֹהֶל se redujo en inglés a ''the tent'' con nota alternativa, mientras que el español cambió el texto principal a ''tabernáculo''; además, omitió la nota distributiva para אִישׁ (''cada hombre''). También ''miraban tras Moisés'' suena poco natural en español, aunque intenta reflejar אַחֲרֵי.'
  spanish_quality_summary: El texto es mayormente claro, pero 'al[a] tabernáculo' resulta torpe por la colocación de la nota y por la elección léxica frente al hebreo. 'Miraban tras Moisés' es comprensible pero poco idiomático en español general eclesial; 'seguían mirando a Moisés' o 'seguían con la vista a Moisés' sería más natural. Conviene además mantener paralelismo entre 'la tienda' sagrada y 'su tienda' de cada israelita.
  glossary_alignment: 'No hay conflicto con términos doctrinales mayores, pero sí con la decisión léxica documentada para הָאֹהֶל: debe preferirse ''la tienda'' en el texto principal, con nota alternativa para ''la Tienda''. También conviene respetar la política de preservar el masculino distributivo documentado en inglés mediante ''cada hombre'' o, si se suaviza por naturalidad española, explicarlo con nota. Aquí corresponde conservar ''cada hombre'' y la nota, porque el inglés POB lo preservó explícitamente.'
  issues:
  - severity: high
    issue: '''tabernáculo'' en el texto principal para הָאֹהֶל'
    rationale: El hebreo dice simplemente 'la tienda', y el English POB documenta esa elección en el texto principal con alternativa en nota. Cambiar a 'tabernáculo' altera una decisión auditada y añade un matiz cultual no expresado en la forma del verso.
  - severity: medium
    issue: Falta la nota distributiva para אִישׁ
    rationale: El English POB conserva 'each man' y explica en nota que el singular masculino es distributivo. El borrador español neutraliza a 'cada uno' y pierde esa justificación documentada.
  - severity: medium
    issue: '''miraban tras Moisés'' es poco idiomático'
    rationale: Intenta calcar אַחֲרֵי, pero en español suena forzado. Debe reflejar que lo seguían con la vista mientras se alejaba, sin perder naturalidad.
  - severity: low
    issue: Anclaje de nota en 'al[a] tabernáculo' poco limpio
    rationale: La nota debe anclarse de forma más natural sobre 'tienda[a]' o frase equivalente en el texto revisado.
