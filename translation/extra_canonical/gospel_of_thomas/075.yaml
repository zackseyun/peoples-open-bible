translation:
  text: Jesus said[a], “Many are standing at the door[e][d][c][b], but it is the solitary
    ones who will enter into the place of the bridal chamber.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic idiom is literally ‘standing on their feet’; rendered simply
      ‘standing’ in English.
    reason: dialect_note
  - marker: b
    text: ⲙⲟⲛⲁⲭⲟⲥ (Greek μονάχος) can mean ‘solitary’ or later ‘monk.’ In Thomas the
      emphasis falls on singleness/wholeness (‘single one’), hence ‘solitary one’
      here.
    reason: lexical_alternative
  - marker: c
    text: The text reads ‘the place of the bridal chamber’ (ⲡⲙⲁ ⲛϣⲉⲗⲉⲉⲧ), not simply
      ‘the bridal chamber’; retained to reflect the Coptic construction.
    reason: lexical_alternative
  - marker: d
    text: MS has ϩⲓⲣⲙ̄ⲡⲣⲟ vs normalized ϩⲓⲣⲛⲡⲣⲟ; and printed ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ ⲛⲉⲧⲛⲁⲃⲱⲕ vs
      normalized ⲡⲙⲟⲛⲁⲭⲟⲥ ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ, emphasizing a singular subject.
    reason: textual_variant
  - marker: e
    text: Or 'the solitary one is the one who will enter'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲛϩⲁϩ
  chosen: there are many
  alternatives:
  - many there are
  lexicon: Crum, s.v. ⲟⲩⲛ-/ⲟⲩⲛϩⲁϩ
  rationale: Standard existential construction; fronted in English as ‘there are many’
    to preserve Coptic word order and emphasis.
- source_word: ⲱϩⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ
  chosen: standing
  alternatives:
  - standing on their feet
  lexicon: Crum, s.v. ⲱϩⲉⲣ ‘stand’
  rationale: Coptic idiom ‘stand on (one’s) feet’ = ‘stand’; translated idiomatically
    to avoid tautology in English while noting the idiom in a footnote.
- source_word: ϩⲓⲣ ⲛⲡⲣⲟ
  chosen: at the door
  alternatives:
  - by the door
  - near the door
  lexicon: Crum, s.v. ϩⲓⲣ; Crum, s.v. ⲡⲣⲟ ‘door’
  rationale: ϩⲓⲣ with noun often ‘at/by’; ‘at the door’ is concise and natural while
    matching the spatial nuance.
- source_word: ⲁⲗⲗⲁ
  chosen: but
  alternatives:
  - rather
  lexicon: Loan from Gk ἀλλά
  rationale: Adversative marker; simple ‘but’ keeps Thomas’s sharp contrast.
- source_word: ⲡⲙⲟⲛⲁⲭⲟⲥ
  chosen: the solitary one
  alternatives:
  - the monk
  - the single one
  lexicon: Crum, s.v. ⲙⲟⲛⲁⲭⲟⲥ; cf. Greek μονάχος ‘solitary’
  rationale: In Thomas the ‘single/solitary’ motif is thematic; choosing ‘solitary
    one’ avoids anachronistic institutional ‘monk’ while preserving the Greek loan’s
    sense.
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ
  chosen: is the one who will enter
  alternatives:
  - who is going to go in
  - who will go in
  lexicon: Layton, Coptic Grammar, on relative future (ⲡⲉⲧⲉⲣⲉ + inf.)
  rationale: Relative future identifying the subject; ‘is the one who will enter’
    preserves the identificational force of ⲡⲉⲧⲉⲣⲉ-.
- source_word: ⲉϩⲟⲩⲛ
  chosen: enter
  alternatives:
  - go in
  - enter in
  lexicon: Crum, s.v. ⲉϩⲟⲩⲛ ‘go in, enter’
  rationale: Combined with ⲉ + goal; rendered as ‘enter’ and carried by the relative
    clause.
- source_word: ⲡⲙⲁ ⲛϣⲉⲗⲉⲉⲧ
  chosen: the place of the bridal chamber
  alternatives:
  - the bridal chamber
  lexicon: Crum, s.v. ⲙⲁ ‘place’; Crum, s.v. ϣⲉⲗⲉⲉⲧ ‘bride-chamber’
  rationale: ⲙⲁ is explicit; retaining ‘place of’ preserves the Coptic construction
    and Thomas’s concrete locution.
textual_note: 'Dialect/orthography: The manuscript writes ϩⲓⲣⲙ̄ⲡⲣⲟ (NHAM02.46 l.12);
  Dilley normalizes to ϩⲓⲣⲛⲡⲣⲟ. Such m/n variation after ϩⲓⲣ is common in Sahidic/Lycopolitan
  transmission. Likewise, the printed segmentation ⲁϩⲉⲣⲁⲧⲟⲩ corresponds to normalized
  ⲱϩⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ (‘standing on their feet’). The printed line shows ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ ⲛⲉⲧⲛⲁⲃⲱⲕ
  (l.12), but Dilley’s normalization reads ⲡⲙⲟⲛⲁⲭⲟⲥ ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ, clarifying a singular
  definite subject with a relative-future clause. No lacunae are present, and there
  is no POxy Greek overlap for this saying.'
