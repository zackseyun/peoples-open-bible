  text: 그러나 그들이 가죽끈으로 바울을 매어 늘이려 할 때, 바울이 곁에 서 있는 백부장에게 말했습니다. 「로마 시민인 사람을[a] 정죄도 하지 않고 채찍질하는 것이 당신들에게 합법적입니까?」
