  text: אַ֣נְתְּה מַלְכָּ֗/א חָזֵ֤ה הֲוַ֨יְתָ֙ וַ/אֲל֨וּ צְלֵ֥ם חַד֙ שַׂגִּ֔יא צַלְמָ֨/א דִּכֵּ֥ן רַ֛ב וְ/זִיוֵ֥/הּ יַתִּ֖יר קָאֵ֣ם לְ/קָבְלָ֑/ךְ וְ/רֵוֵ֖/הּ דְּחִֽיל׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/031.yaml
  text: You[a], O king, were watching, and behold, there was a single great statue[b]. That statue was immense, and its splendor was extraordinary; it was standing before you[c], and its appearance was terrifying.
  footnotes:
  - marker: a
    text: Aramaic צְלֵם can be rendered 'image' or 'statue'; 'statue' is chosen here because the context describes a large visible figure standing before the king.
    reason: lexical_alternative
  - marker: b
    text: Or 'its brightness was surpassing.' The phrase emphasizes the figure's exceptional radiance or splendor.
    reason: lexical_alternative
  - marker: c
    text: Or 'its aspect was dreadful.' The Aramaic describes an appearance that evokes fear.
    reason: lexical_alternative
