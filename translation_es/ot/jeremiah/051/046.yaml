    text: Or 'rumor' or 'news' for 'report' (שְׁמוּעָה). The Hebrew term can denote any circulated tidings, whether confirmed or not.
    reason: lexical_alternative
  - marker: b
    text: Literally 'lest your heart become soft.' The expression means to lose courage or grow fainthearted.
    reason: lexical_alternative
  - marker: c
    text: Or 'ruler over ruler.' The phrase may describe either conflict between rulers or rapid political turnover.
    reason: alternative_reading
