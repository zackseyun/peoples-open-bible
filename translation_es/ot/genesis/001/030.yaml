base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/030.yaml
  text: And to every beast of the earth[a], and to every bird of the heavens, and to everything that creeps on the earth in which there is a living creature, every green plant is for food[c][b]. And it was so.
