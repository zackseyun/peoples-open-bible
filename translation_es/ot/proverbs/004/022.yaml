translation:
  language: es
  text: Porque son vida para quienes los hallan, y sanidad[a] para toda su carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'salud para todo su cuerpo'. El hebreo dice literalmente 'sanidad para toda su carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o causal del proverbio con lo anterior. En español, 'Porque' conserva bien ese valor y suena natural al inicio de una sentencia sapiencial.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, funciona idiomáticamente como sustantivo abstracto. 'Vida' es la equivalencia natural y mantiene el sentido general sin forzar el plural.
- source_word: הֵם
  english_pob_choice: they are
  chosen_spanish: ellos son
  alternatives_spanish:
  - son
  - estas son
  lexicon: HALOT
  rationale: El hebreo usa un pronombre copulativo que retoma las palabras/instrucciones del contexto. En español se expresa con 'ellos son' para conservar la referencia y la fluidez.
- source_word: לְמֹצְאֵיהֶם
  english_pob_choice: to those who find them
  chosen_spanish: para quienes los hallan
  alternatives_spanish:
  - para los que los encuentran
  - para quienes los encuentran
  lexicon: HALOT
  rationale: El participio con sufijo señala a las personas que encuentran 'ellos', es decir, las palabras enseñadas. 'Hallar' comunica el acto de encontrar en un registro bíblico natural; 'los' mantiene el referente plural masculino/neutro del antecedente.
- source_word: וּלְכָל
  english_pob_choice: and to all
  chosen_spanish: y para todo
  alternatives_spanish:
  - y a todo
  - y para todos
  lexicon: HALOT
  rationale: La partícula lamed coordina el segundo resultado con el primero. En español, 'para' reproduce mejor el valor beneficiario/relacional que un simple 'a' en este paralelismo.
- source_word: בְּשָׂרוֹ
  english_pob_choice: their flesh
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  - su organismo
  - su propia carne
  lexicon: HALOT
  rationale: El sentido literal es 'carne', pero en español 'medicina para todo su cuerpo' expresa con claridad el efecto físico buscado por el proverbio. Se evita 'carne' por posible ambigüedad o aspereza idiomática, sin perder el referente corporal.
- source_word: מַרְפֵּא
  english_pob_choice: healing
  chosen_spanish: medicina
  alternatives_spanish:
  - sanidad
  - curación
  - remedio
  lexicon: HALOT
  rationale: '''Medicina'' conserva bien la idea de algo que cura o restablece la salud. Aunque ''sanidad'' o ''curación'' son posibles, ''medicina'' encaja mejor con el paralelismo y con la idea de efecto terapéutico del proverbio.'
theological_decisions:
- issue: How to render the bodily image in a proverb about life-giving instruction
  english_pob_reading: healing to all their flesh
  chosen_spanish_reading: medicina para todo su cuerpo
  alternative_spanish_readings:
  - sanidad para toda su carne
  - curación para todo su cuerpo
  rationale: El hebreo usa una imagen corporal concreta. 'Cuerpo' comunica el alcance físico del beneficio de manera inteligible para lectores actuales, mientras que 'carne' preserva más literalmente el hebreo pero puede sonar menos natural o más ambigua en español. Se mantiene la fuerza terapéutica del proverbio sin borrar su referencia corporal.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 5
- issue: Generic plural reference in proverbial discourse
  english_pob_reading: those who find them / their flesh
  chosen_spanish_reading: quienes los hallan / su cuerpo
  alternative_spanish_readings:
  - los que los encuentran / su carne
  - quienes las hallan / su carne
  rationale: El hebreo combina un referente plural con sufijo singular genérico. En español, 'su cuerpo' mantiene el valor colectivo/proverbial sin introducir una lectura individualizada innecesaria. La traducción conserva la relación con el antecedente plural implícito.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El inglés POB revisó 'his flesh' a 'their flesh' para ajustar el antecedente plural y reflejar mejor el sufijo hebreo. En español se optó por una solución más idiomática, 'su cuerpo', que conserva el sentido corporal del hebreo sin perder claridad ni introducir un plural explícito innecesario.
  spanish_consistency_notes:
  - Se conservó 'Porque' para el enlace explicativo propio del proverbio.
  - Se evitó 'SEÑOR' o equivalentes no pertinentes; el versículo no contiene el nombre divino.
  - '''hallan'' mantiene un registro sobrio y bíblico sin arcaizar en exceso.'
  - '''medicina'' expresa el valor curativo del término hebreo sin forzar una lectura doctrinal adicional.'
