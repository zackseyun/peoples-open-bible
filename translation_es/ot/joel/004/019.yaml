review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: juicio sobre Egipto y Edom, causa por la violencia contra los hijos de Judá, y referencia a la sangre inocente derramada en la tierra de Judá. Sin embargo, hay dos problemas de fidelidad/forma: 1) el relativo en español está mal construido (''cuyo sangre inocente derramaron''), y 2) las notas a y c están ancladas a palabras/frases equivocadas respecto de las alternativas documentadas en el POB inglés.'
  spanish_quality_summary: El texto es mayormente natural y digno, pero 'cuyo sangre' es gramaticalmente incorrecto; debe ser 'cuya sangre inocente derramaron' o una reestructuración equivalente. 'Desierto de desolación' es aceptable, aunque algo pesado; conserva bien el doble sustantivo hebreo. 'Por la violencia hecha a' es comprensible, pero 'por la violencia contra' suena más natural en español e igualmente fiel, especialmente dado que esa alternativa ya está documentada.
  glossary_alignment: No hay conflicto con la terminología del proyecto. Los nombres propios ('Egipto', 'Edom', 'Judá') están bien. 'Hijos de Judá' preserva correctamente בְּנֵי יְהוּדָה con nota colectiva adecuada. 'Sangre inocente' corresponde bien a דָם נָקִיא. No aparecen términos con políticas especiales como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: high
    issue: 'Construcción gramatical incorrecta: ''cuyo sangre inocente derramaron'''
    rationale: 'En español debe concordar con ''sangre'' femenina: ''cuya sangre inocente derramaron''. La forma actual afecta seriamente la legibilidad y corrección.'
  - severity: medium
    issue: Las notas [a] y [c] están ancladas en lugares equivocados
    rationale: La nota [a] documenta una alternativa para מֵחֲמַס ('por/a causa de la violencia contra...'), no para 'desolación'; por tanto debe anclarse en la frase causal. La nota [c] documenta la alternativa de דָם נָקִיא ('la sangre de los inocentes'), así que debe anclarse en 'sangre inocente', no en 'su tierra'.
  - severity: low
    issue: '''Violencia hecha a'' suena menos natural que ''violencia contra'''
    rationale: Aunque defendible, en español bíblico moderno 'violencia contra' comunica mejor la relación de agresión sin pérdida de sentido y coincide con la alternativa auditada.
  revised_spanish_text: Egipto se convertirá en desolación, y Edom en un desierto de desolación, por la violencia contra[a] los hijos de Judá[b], cuya sangre inocente[c] derramaron en su tierra.
  revised_footnotes:
