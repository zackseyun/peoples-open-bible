translation:
  language: es
  text: Pero si la mancha permanece en su lugar y no se ha extendido[a], es la cicatriz del forúnculo, y el sacerdote lo declarará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de ella»; el hebreo idiomático significa que la mancha permanece donde está, en vez de extenderse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La forma condicional lleva un matiz de contraste con el caso anterior; en español, «Pero si» reproduce mejor ese giro adversativo sin perder la condicionalidad.
- source_word: תַּחְתֶּיהָ
  english_pob_choice: in its place
  chosen_spanish: en su lugar / en su lugar, es decir, permanece donde está
  alternatives_spanish:
  - debajo de ella
  - bajo ella
  lexicon: HALOT
  rationale: El hebreo literalmente dice «debajo de ella», pero en este contexto idiomático expresa que la mancha no se desplaza. «En su lugar» comunica el sentido diagnóstico con naturalidad en español.
- source_word: תַּעֲמֹד
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - está
  - se queda
  lexicon: HALOT
  rationale: El verbo literalmente es «estar de pie», pero aquí describe continuidad en la misma ubicación. «Permanece» preserva esa idea de persistencia situacional.
- source_word: הַבַּהֶרֶת
  english_pob_choice: the bright spot
  chosen_spanish: la mancha
  alternatives_spanish:
  - la mancha brillante
  - la mancha blanca
  lexicon: HALOT
  rationale: En Levítico 13 se trata de una marca visible en la piel; «mancha» es más natural en español y suficientemente amplio para no fijar un matiz diagnóstico que el hebreo no obliga a precisar aquí.
- source_word: לֹא פָשָׂתָה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no se ha propagado
  - no ha crecido
  lexicon: HALOT
  rationale: La imagen es de propagación sobre la piel. «No se ha extendido» mantiene la metáfora espacial y el valor clínico del verbo.
- source_word: צָרֶבֶת
  english_pob_choice: the scar
  chosen_spanish: la cicatriz
  alternatives_spanish:
  - la marca
  - la huella
  lexicon: HALOT
  rationale: El término refiere al rastro dejado por inflamación o quemadura; «cicatriz» comunica bien el resultado residual visible, sin forzar una explicación médica adicional.
- source_word: הַשְּׁחִין
  english_pob_choice: the boil
  chosen_spanish: la hinchazón
  alternatives_spanish:
  - el forúnculo
  - la llaga
  lexicon: HALOT
  rationale: Aunque en inglés POB usa «boil», en español «hinchazón» conserva el campo semántico de inflamación y evita introducir un término demasiado específico o clínicamente moderno que el contexto no exige.
- source_word: וְטִהֲרוֹ
  english_pob_choice: the priest shall pronounce him clean
  chosen_spanish: el sacerdote lo declarará limpio
  alternatives_spanish:
  - el sacerdote lo pronunciará limpio
  - el sacerdote lo declarará puro
  lexicon: HALOT
  rationale: En el marco ritual, טהר tiene valor declarativo, no curativo. «Declarará limpio» mantiene la función forense del sacerdote y suena natural en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  lexicon: HALOT
  rationale: Es la designación estándar del funcionario cultual en Levítico; «sacerdote» es el equivalente natural y ampliamente inteligible en español.
theological_decisions:
- issue: Declaración ritual de pureza, no curación médica
  english_pob_reading: Render טהר in declarative ritual terms ('pronounce him clean') rather than implying physical healing.
  chosen_spanish_reading: «Lo declarará limpio» presenta la acción del sacerdote como una decisión ritual de estado, no como una sanación corporal.
  alternative_spanish_readings:
  - lo limpiará
  - lo sanará
  - lo purificará
  rationale: El contexto de Levítico 13 es el examen de una afección cutánea dentro del sistema de pureza; la función del sacerdote es determinar el estado ritual. El español debe preservar esa distinción sin medicalizar ni moralizar el verbo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se documentaron cambios necesarios y el consenso fue de alta concordancia. La formulación española conserva la decisión clave sobre תַּחְתֶּיהָ como expresión idiomática de permanencia sin expansión.'
  spanish_consistency_notes:
  - Se mantiene «limpio» para conservar el lenguaje ritual de pureza, en vez de sustituirlo por «puro» o por una fórmula más interpretativa.
  - «Sacerdote» se usa de forma consistente para הַכֹּהֵן en Levítico.
  - La elección de «mancha» y «cicatriz» evita sobreespecificar el diagnóstico y respeta el carácter descriptivo del hebreo.
