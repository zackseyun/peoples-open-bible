theological_decisions:
- issue: Whether πνεῦμα ἀσθενείας should be rendered in a way that minimizes or removes spiritual agency
  chosen_reading: Retain explicit reference to 'a spirit of weakness' in the main text
  alternative_readings:
  - a disabling spirit
  - an infirmity caused by a spirit
  rationale: The Greek explicitly includes πνεῦμα ('spirit'), so the translation should preserve that element rather than reduce the condition to a merely medical description. At the same time, the wording avoids importing a more specific demonological claim than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
