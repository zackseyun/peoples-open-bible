lexical_decisions:
- source_word: וְ/נֶפֶשׁ
  english_pob_choice: and the persons
  chosen_spanish: y las personas
  alternatives_spanish:
  - y las almas
  - y los seres
  lexicon: HALOT
  rationale: En este contexto de recuento, נֶפֶשׁ funciona como término de cómputo para individuos, no como referencia al alma inmortal. 'Personas' comunica de manera natural y precisa el sentido contable en español, manteniendo el valor de plural humano sin introducir connotaciones ajenas.
- source_word: אָדָם
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - humanos
  - de la humanidad
  lexicon: HALOT
  rationale: אָדָם aquí aclara que se trata de seres humanos. Dado que el inglés POB resolvió la tensión semántica integrando el matiz humano en 'persons', el español sigue esa línea con 'personas', que ya implica humanidad sin requerir una expansión torpe.
- source_word: שִׁשָּׁה עָשָׂר אָלֶף
  english_pob_choice: sixteen thousand
  chosen_spanish: dieciséis mil
  alternatives_spanish:
  - dieciséis mil
  lexicon: HALOT
  rationale: La secuencia numeral hebrea expresa 16.000 de forma directa. En español estándar se expresa naturalmente como 'dieciséis mil', sin necesidad de nota adicional.
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB inglés, que abandonó una expansión pesada como 'de la humanidad' y consolidó נֶפֶשׁ אָדָם como 'persons'. En español, 'personas' conserva esa solución formal y legible, sin añadir un equivalente innecesario.
  spanish_consistency_notes:
  - Se mantiene el plural humano 'personas' para נֶפֶשׁ en contextos de conteo.
  - No se introduce 'alma(s)', para evitar un matiz ajeno al inventario/censo.
  - La nota explica la literalidad hebrea sin desplazar la traducción principal.
