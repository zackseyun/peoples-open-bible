translation:
  language: es
  text: ¿No hizo en el vientre, el que me hizo a mí, también a él, y nos formó en un solo vientre?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y nos formó en el mismo vientre». La expresión hebrea «un solo vientre» también puede entenderse de modo más idiomático como «el mismo vientre», subrayando el origen humano compartido.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Did not
  chosen_spanish: ¿No...?
  alternatives_spanish:
  - ¿Acaso no...?
  - ¿No es verdad que...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No...?» conserva de forma natural ese valor interrogativo sin añadir contenido.
- source_word: בַּבֶּטֶן
  english_pob_choice: in the womb
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el útero
  - en el seno materno
  lexicon: HALOT
  rationale: El contexto es prenatal y de formación humana. «Vientre» es claro, digno y natural en español bíblico contemporáneo; mantiene la referencia corporal sin endurecerla con un tecnicismo.
- source_word: עֹשֵׂנִי
  english_pob_choice: he who made me
  chosen_spanish: el que me hizo a mí
  alternatives_spanish:
  - mi Hacedor
  - el que me formó
  lexicon: HALOT
  rationale: 'El participio con sufijo funciona sustantivamente: «el que me hizo». Se conserva el carácter verbal y personal del hebreo; «mi Hacedor» sería más nominal e interpretativo.'
- source_word: עָשָׂהוּ
  english_pob_choice: make him
  chosen_spanish: me hizo a mí
  alternatives_spanish:
  - hizo a él
  - lo hizo
  lexicon: HALOT
  rationale: En la cláusula, el hebreo retoma la acción creadora respecto del otro sujeto del contexto inmediato. Para no perder la simetría y evitar ambigüedad en español, se expresa con el mismo verbo «hacer» y el complemento explícito del referente implícito del contexto.
- source_word: וַיְכֻנֶנּוּ
  english_pob_choice: form us
  chosen_spanish: nos formó
  alternatives_spanish:
  - nos estableció
  - nos modeló
  lexicon: HALOT
  rationale: כּוּן en esta construcción se entiende como dar forma o formar en el vientre. «Formó» preserva el paralelismo con «hizo» y refleja bien el sentido de formación prenatal compartida.
- source_word: בָּרֶחֶם
  english_pob_choice: in one womb
  chosen_spanish: en un solo vientre
  alternatives_spanish:
  - en el mismo vientre
  - en un solo seno
  lexicon: HALOT
  rationale: Se mantiene la imagen poética de un «vientre» común. «Un solo vientre» conserva la concisión del hebreo y la idea de origen compartido sin forzar una explicación biológica.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un solo
  alternatives_spanish:
  - el mismo
  - uno
  lexicon: HALOT
  rationale: En combinación con «vientre», «un solo» comunica la unidad y la procedencia común. Es una forma natural en español para reproducir la fuerza compacta del hebreo.
theological_decisions:
- issue: Referente humano compartido en el argumento de Job
  english_pob_reading: The verse affirms that both Job and his servant/slave were made by the same divine Creator in the womb.
  chosen_spanish_reading: El versículo afirma que Job y la persona del contexto fueron hechos por el mismo Creador y formados en el mismo origen prenatal.
  alternative_spanish_readings:
  - El versículo habla solo de un ser humano genérico.
  - Se refiere exclusivamente al esclavo/siervo mencionado antes.
  rationale: El contexto inmediato trata de la relación de Job con sus siervos, pero el hebreo deja el referente humano más implícito que explícito. La traducción mantiene esa referencia contextual sin introducir una especificación más fuerte de la que el texto exige.
  doctrine_reference: Anthropology; Translation philosophy 1, 3
- issue: Valor de «un solo vientre»
  english_pob_reading: The phrase is retained literally enough to preserve the poetic claim of common human origin before God, without forcing a biological claim that Job and his servant had the same mother.
  chosen_spanish_reading: La frase se conserva de modo suficientemente literal para retener la afirmación poética de origen humano común ante Dios, sin convertirla en una afirmación biológica sobre la misma madre.
  alternative_spanish_readings:
  - en el mismo vientre
  - de un mismo vientre
  rationale: '«Un solo vientre» es una reproducción cercana del hebreo y preserva la tensión poética: origen compartido y misma dignidad delante de Dios. En español, «el mismo vientre» suaviza un poco la extrañeza, pero también puede sonar más explicativo que el hebreo.'
  doctrine_reference: Translation philosophy 3, 6
translation_notes:
  revision_awareness: Se revisó la línea para conservar la pregunta retórica, el paralelismo entre «hizo» y «formó», y la expresión compacta «un solo vientre» sin expandir innecesariamente el texto. La nota alternativa se mantiene porque el hebreo permite tanto la lectura literal como la idiomática de origen compartido.
  spanish_consistency_notes:
  - Se mantuvo «vientre» para בטן y רחם por coherencia con el campo semántico prenatal del pasaje.
  - Se conservó el verbo «hacer» para עשה y «formar» para כון, siguiendo el paralelismo del hebreo.
  - La puntuación con coma antes de la segunda cláusula refleja el paralelismo poético sin imponer segmentación interpretativa.
