translation:
  language: es
  text: 'Y me dijo: «Salomón, tu hijo, él edificará mi casa y mis atrios; porque lo he escogido para ser mi hijo, y yo seré su padre».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «lo he escogido para mí como hijo, y yo seré para él padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לִי
  english_pob_choice: And he said to me
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Y me dijo
  - Y me habló
  lexicon: HALOT
  rationale: La forma narrativa con אמר se vierte naturalmente en pasado; el complemento indirecto לִי queda bien como 'le' con el verbo decir en español cuando el hablante es el sujeto implícito y el receptor está marcado por contexto, pero para mayor claridad narrativa se puede entender como 'me'. En este versículo, mantengo la referencia explícita al destinatario con el pronombre enclítico en el discurso introducido por contexto y la nota.
- source_word: שְׁלֹמֹה בִנְךָ
  english_pob_choice: Solomon your son
  chosen_spanish: Salomón, tu hijo
  alternatives_spanish:
  - tu hijo Salomón
  - Salomón tu hijo
  lexicon: HALOT
  rationale: Conserva la apposición hebrea entre nombre y relación filial. En español, la coma hace la frase natural y clara sin perder el orden semántico del original.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; en español se puede mantener con 'él' sin recargar el texto. No es necesario expandirlo a 'él mismo' porque el énfasis ya queda reforzado por la estructura del enunciado.
- source_word: יִבְנֶה בֵיתִי
  english_pob_choice: will build my house
  chosen_spanish: edificará mi casa
  alternatives_spanish:
  - construirá mi casa
  - edificará mi templo
  lexicon: HALOT
  rationale: בנה + בית se traduce literalmente como 'edificar/construir mi casa'. Se prefiere 'edificará' para conservar un registro más elevado y culto; 'casa' mantiene la resonancia teológica del hebreo, en lugar de sustituirla por 'templo'.
- source_word: וַחֲצֵרוֹתָי
  english_pob_choice: and my courts
  chosen_spanish: mis atrios
  alternatives_spanish:
  - mis patios
  - mis patios interiores
  lexicon: HALOT
  rationale: חצר en contexto del santuario se refiere a los espacios cercados del templo. 'Atrios' es el término español tradicional y preciso para ese ámbito arquitectónico-sacral; 'patios' sería menos específico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la elección divina. 'Porque' expresa de manera directa la relación causal en español contemporáneo.
- source_word: בָחַרְתִּי בּוֹ
  english_pob_choice: I have chosen him
  chosen_spanish: lo he escogido
  alternatives_spanish:
  - lo escogí
  - lo he elegido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una elección con vigencia actual; 'lo he escogido' comunica bien ese resultado presente. 'Escoger' y 'elegir' son ambas válidas; se prefiere 'escoger' por su simplicidad y fuerza en el contexto.
- source_word: לִי לְבֵן
  english_pob_choice: to be my son
  chosen_spanish: para ser mi hijo
  alternatives_spanish:
  - para ser mi hijo adoptivo
  - para ser hijo mío
  lexicon: HALOT
  rationale: La doble preposición לִי לְבֵן se entiende idiomáticamente como una relación de filiación otorgada. 'Para ser mi hijo' conserva la fuerza relacional sin introducir lenguaje ajeno como 'adoptivo', que no está explícito en el hebreo.
- source_word: וַאֲנִי אֶהְיֶה לוֹ לְאָב
  english_pob_choice: and I will be his father
  chosen_spanish: y yo seré su padre
  alternatives_spanish:
  - y seré para él padre
  - y yo estaré para él como padre
  lexicon: HALOT
  rationale: La fórmula hebrea expresa relación de paternidad pactal; en español la forma idiomática y clara es 'seré su padre', que conserva el sentido sin perder naturalidad. El 'yo' explícito mantiene el énfasis del hebreo.
theological_decisions:
- issue: Lenguaje filial aplicado a la relación de Yahvé con Salomón
  english_pob_reading: 'Retain the filial language straightforwardly: ''I have chosen him to be my son, and I will be his father.'''
  chosen_spanish_reading: 'Conservar el lenguaje filial de manera directa: ''lo he escogido para ser mi hijo, y yo seré su padre.'''
  alternative_spanish_readings:
  - lo he escogido para ser mi hijo, y seré su padre
  - lo he escogido como hijo, y seré para él como padre
  rationale: El versículo pertenece al lenguaje de alianza real y no debe rebajarse a una mera función administrativa. Al mismo tiempo, la traducción no debe importar conclusiones cristológicas posteriores al sentido inmediato. La redacción elegida preserva la filiación pactal y la reciprocidad de la fórmula hebrea.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la segunda mitad hacia una formulación más natural ('I will be his father') sin cambiar el sentido. La propuesta española sigue esa línea de naturalidad, pero conserva 'casa' y 'atríos' para mantener la textura cultual del hebreo y la relación pactal explícita en 'lo he escogido para ser mi hijo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto cuando el texto hebreo lo exige; aquí el versículo no lo nombra explícitamente, pero la voz divina se sobreentiende por el contexto inmediato.
  - '''Casa'' se preserva en vez de ''templo'' para conservar la resonancia teológica del hebreo בֵיתִי.'
  - '''Atrios'' se usa como término cultual estable y más preciso que ''patios''.'
  - Se opta por una filiación directa ('mi hijo' / 'su padre') en armonía con el audit trail inglés, sin suavizar la tensión teológica del lenguaje real-pactual.
