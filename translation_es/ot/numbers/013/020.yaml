review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: evaluación de la tierra, presencia de árboles, exhortación y toma del fruto, seguido por la nota temporal. Sin embargo, varios giros no reflejan de la mejor manera las decisiones auditadas ni el español objetivo: ''estéril'' sobreinterpreta רָזָה; ''árbol'' en singular suena menos natural que el plural contextual; y la nota al pie está puesta sobre ''cobraos ánimo'' cuando la nota inglesa preserva la explicación/alternativa sobre la frase temporal de las uvas tempranas.'
  spanish_quality_summary: 'El texto es comprensible, pero mezcla registro algo arcaizante (''cobraos'', ''tomad'') con formulaciones poco naturales (''si hay en ella árbol o no'', ''los días eran los días''). Puede mantenerse un tono bíblico digno con mejor naturalidad: ''sed fuertes'', ''si hay árboles en ella o no'', y una nota temporal algo más idiomática sin perder transparencia al hebreo.'
  glossary_alignment: 'No hay conflictos con términos doctrinales del glosario principal. Las decisiones léxicas necesitan ajuste contextual: רָזָה se expresa mejor como ''pobre'' o ''poco fértil'' que ''estéril''; עֵץ conviene en plural ''árboles'' con nota sobre ''madera''; וְהִתְחַזַּקְתֶּם debe seguir la revisión auditada hacia ''sed fuertes''; בִּכּוּרֵי עֲנָבִים pide una nota aclaratoria sobre ''primeras uvas'' más que una nota en el imperativo.'
  issues:
  - severity: medium
    issue: '''estéril'' para רָזָה'
    rationale: El hebreo contrasta tierra 'gorda/fértil' con 'delgada/pobre'. 'Estéril' puede sugerir absoluta infertilidad, más fuerte que el original y más fuerte que 'lean' en la auditoría inglesa.
  - severity: medium
    issue: '''si hay en ella árbol o no'' suena poco natural'
    rationale: Aunque formalmente posible, el singular genérico aquí resulta tosco en español. El contexto de reconocimiento de la tierra favorece 'si hay árboles en ella o no', preservando además la decisión inglesa principal.
  - severity: medium
    issue: La nota al pie está en el lugar equivocado
    rationale: La auditoría inglesa usa la nota b para explicar la frase temporal 'los días... de las primeras uvas', no para ofrecer alternativa a וְהִתְחַזַּקְתֶּם. En español conviene conservar esa aclaración cultural/temporal.
  - severity: low
    issue: '''cobraos ánimo'' no sigue la revisión inglesa final'
    rationale: La revisión aplicada cambió 'be courageous' a 'be strong'. En español, 'sed fuertes' o 'fortaleceos' reflejan mejor esa decisión documentada que 'cobraos ánimo'.
  - severity: low
    issue: '''primicias de las uvas'' puede sonar demasiado cultual en el texto principal'
    rationale: La propia auditoría inglesa evitó cargar demasiado el matiz cultual en la narración. 'Las primeras uvas' o 'uvas tempranas' comunica mejor la referencia estacional, con nota aclaratoria si se desea mayor precisión.
