revisions:
- from: Pero, ¿acaso en verdad habitará Dios con el hombre sobre la tierra? He aquí[a], los cielos y los cielos de los cielos no te pueden contener; ¡cuánto menos esta casa que he construido!
  to: Pero, ¿acaso en verdad habitará Dios con el hombre sobre la tierra? He aquí[a], los cielos y el cielo más alto no te pueden contener, mucho menos esta casa que he construido.
  rationale: Se ajusta la expresión cósmica a un español más natural y fiel al sentido superlativo documentado en el audit trail ('el cielo más alto'), y se reemplaza la exclamación final por 'mucho menos' para reflejar mejor el argumento a fortiori sin añadir énfasis innecesario. Se conserva 'con el hombre' con su nota, en continuidad con la decisión teológica y léxica ya auditada.
