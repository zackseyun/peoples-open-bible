revisions:
- from: Y será que beberás del arroyo[a], y yo he mandado a los cuervos[c] para que te sustenten[b] allí.
  to: Y sucederá que beberás del arroyo[a], y he mandado a los cuervos[c] que te provean[b] allí.
  rationale: Se ajusta la apertura a un español más natural y bíblicamente digno («Y sucederá que»), se mejora la fluidez de la cláusula de provisión con «que te provean», y se normaliza la nota b. También se afina la alternativa de נחל con «torrente», que encaja mejor que «corriente» como opción léxica para este contexto.
