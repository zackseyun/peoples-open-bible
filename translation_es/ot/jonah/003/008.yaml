translation:
  language: es
  text: Que tanto el hombre como la bestia se cubran con saco[a], y que clamen con fuerza a Dios, y que cada uno se vuelva de su mal camino y de la violencia que hay en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cilicio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתְכַּסּוּ
  english_pob_choice: let ... be covered
  chosen_spanish: sean cubiertos
  alternatives_spanish:
  - se cubran
  - se vistan
  lexicon: HALOT
  rationale: El hitpael de כסה puede ser reflexivo o funcionar de manera medio-pasiva según el contexto. En español, "sean cubiertos" conserva bien el tono jussivo/decreto y evita una construcción menos natural.
- source_word: שַׂקִּים
  english_pob_choice: sackcloth
  chosen_spanish: saco
  alternatives_spanish:
  - cilicio
  - tela de saco
  lexicon: HALOT
  rationale: En español bíblico, "saco" comunica el material/vestido de duelo de forma directa y comprensible. "Cilicio" es tradicional, pero puede sonar más eclesiástico; "tela de saco" explicita el objeto pero pierde concisión.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  - las personas
  lexicon: HALOT
  rationale: Aquí אָדָם aparece en contraste con la bestia, y el singular masculino funciona de manera representativa para la población humana. "El hombre" mantiene ese valor y la correspondencia con la fuente.
- source_word: וְהַבְּהֵמָה
  english_pob_choice: and beast
  chosen_spanish: como la bestia
  alternatives_spanish:
  - y los animales
  - y el ganado
  lexicon: HALOT
  rationale: '"Bestia" conserva el contraste solemne humano/animal del hebreo. Se prefiere una construcción paralela con "el hombre" para mantener el ritmo del mandato.'
- source_word: וְיִקְרְאוּ אֶל אֱלֹהִים
  english_pob_choice: let them call out ... to God
  chosen_spanish: clamen ... a Dios
  alternatives_spanish:
  - griten ... a Dios
  - invocan ... a Dios
  lexicon: HALOT
  rationale: קרא אֶל aquí es invocación intensa. "Clamen" comunica mejor la urgencia de una súplica que un simple "llamen", y preserva el carácter litúrgico del llamado sin sobretraducirlo.
- source_word: בְּחָזְקָה
  english_pob_choice: mightily
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con ímpetu
  - ardientemente
  - con vehemencia
  lexicon: HALOT
  rationale: La preposición + sustantivo expresa intensidad. "Con fuerza" es natural en español y mantiene la idea de clamor vigoroso sin añadir matices interpretativos excesivos.
- source_word: וְיָשֻׁבוּ
  english_pob_choice: let ... turn
  chosen_spanish: se vuelva
  alternatives_spanish:
  - se arrepienta
  - retorne
  lexicon: HALOT
  rationale: שׁוב tiene el sentido básico de volver/turnar. "Se vuelva" preserva la metáfora de cambio de rumbo; "se arrepienta" comunica la implicación moral, pero estrecha el verbo bíblico.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  - todos
  lexicon: HALOT
  rationale: El singular distributivo admite una representación idiomática en español. "Cada uno" conserva la fuerza distributiva y evita una repetición menos natural tras "el hombre".
- source_word: מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: from his evil way
  chosen_spanish: de su mal camino
  alternatives_spanish:
  - de su camino malo
  - de su camino perverso
  lexicon: HALOT
  rationale: '"Camino" conserva la metáfora ética hebrea para conducta. "Mal camino" suena natural y fiel; "perverso" añade intensidad interpretativa no exigida por el término.'
- source_word: וּמִן הֶחָמָס
  english_pob_choice: and from the violence
  chosen_spanish: y de la violencia
  alternatives_spanish:
  - y de la injusticia
  - y del abuso
  lexicon: HALOT
  rationale: חָמָס suele denotar violencia o violencia injusta. "Violencia" es la correspondencia más directa y estable en español.
- source_word: אֲשֶׁר בְּכַפֵּיהֶם
  english_pob_choice: that is in their hands
  chosen_spanish: que hay en sus manos
  alternatives_spanish:
  - que está en sus manos
  - que llevan en las manos
  lexicon: HALOT
  rationale: La imagen idiomática en hebreo apunta a actos/acciones bajo su control o cometidos por ellos. "Que hay en sus manos" conserva la metáfora y resulta natural en español.
theological_decisions:
- issue: Lenguaje de arrepentimiento en שׁוב
  english_pob_reading: Rendered as 'turn' rather than 'repent'
  chosen_spanish_reading: se vuelva
  alternative_spanish_readings:
  - se arrepienta
  - retorne
  rationale: La traducción principal mantiene el verbo concreto de movimiento/cambio de dirección. Así se preserva la metáfora hebrea y, a la vez, se deja visible la dimensión moral del llamamiento al cambio.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lenguaje representativo de género en הָאָדָם / אִישׁ
  english_pob_reading: Retained 'man' and 'each man'
  chosen_spanish_reading: el hombre / cada uno
  alternative_spanish_readings:
  - la gente / cada persona
  - la humanidad / todos
  rationale: Se conserva el valor representativo del singular masculino en contraste con la bestia, pero en אִישׁ se usa una forma española más idiomática, "cada uno", que mantiene la distribución sin perder claridad.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar la repetición de 'man' tras 'each' y ajustar 'his hands' al singular distributivo. La redacción española refleja ese mismo sentido distributivo con 'cada uno' y mantiene la referencia singular de 'sus manos' como imagen idiomática colectiva del hebreo.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים, conforme al estándar del proyecto.
  - Se traduce el llamado intensivo de קרא con 'clamen', no con 'llamen', para conservar urgencia y súplica.
  - '''Mal camino'' mantiene la metáfora ética de ''way'' sin convertirla en paráfrasis doctrinal.'
  - La nota al pie marca una alternativa cultural válida ('cilicio') sin desplazar la elección principal más transparente al lector general.
