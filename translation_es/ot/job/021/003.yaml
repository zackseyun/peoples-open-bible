translation:
  language: es
  text: Ténganme paciencia[a], y hablaré; y después de que haya hablado[b], pueden burlarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sopórtenme», «Aguántenme». El hebreo literalmente usa «llevar / cargar», pero aquí tiene el sentido de soportar o tolerar a alguien mientras habla.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y después de hablar yo, pueden burlarse». El hebreo puede entenderse como futuro simple («se burlarán») o con matiz concesivo/permisivo («pueden burlarse»); el texto principal adopta esta última opción por encajar mejor en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂאוּ/נִי
  english_pob_choice: Bear with me
  chosen_spanish: Toleradme
  alternatives_spanish:
  - Soportadme
  - Aguantadme
  - Tened paciencia conmigo
  lexicon: HALOT
  rationale: El hebreo usa נָשָׂא con sufijo de primera persona, con el sentido idiomático de 'tolerar / soportar a alguien' para dejarlo hablar. 'Toleradme' conserva la fuerza interpersonal sin sonar arcaico.
- source_word: וְ/אָנֹכִי
  english_pob_choice: and I
  chosen_spanish: y
  alternatives_spanish:
  - y yo
  - y por mi parte yo
  - entonces yo
  lexicon: HALOT
  rationale: El énfasis de אָנֹכִי se mantiene por la estructura directa 'y hablaré' en español; añadir 'yo' sería posible, pero no necesario y sonaría pesado en este contexto.
- source_word: אֲדַבֵּר
  english_pob_choice: will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - hablaré yo
  lexicon: HALOT
  rationale: El piel de דבר corresponde al verbo general 'hablar'. 'Hablaré' es natural, solemne y fiel al discurso formal de Job.
- source_word: וְ/אַחַר
  english_pob_choice: and after
  chosen_spanish: y después de que
  alternatives_spanish:
  - y luego de que
  - y después
  - entonces
  lexicon: HALOT
  rationale: אַחַר introduce una secuencia temporal. En español, 'después de que' expresa con claridad la subordinación temporal que sigue.
- source_word: דַּבְּרִי
  english_pob_choice: I have spoken
  chosen_spanish: hable
  alternatives_spanish:
  - haya hablado
  - hable yo
  - haya terminado de hablar
  lexicon: HALOT
  rationale: La forma hebrea es literalmente 'mi hablar', y el inglés POB opta por 'after I have spoken' para la fluidez. En español, 'después de que hable' comunica esa misma secuencia sin sobrecargar la frase; el perfecto 'haya hablado' sería una alternativa válida, pero menos directo aquí.
- source_word: תַלְעִיג
  english_pob_choice: you may mock
  chosen_spanish: podréis burlaros
  alternatives_spanish:
  - burlaros
  - podéis burlaros
  - podréis mofaros
  - burlaréis
  lexicon: HALOT
  rationale: 'El hebreo permite un matiz concesivo/permisivo: después de que hable, entonces se les deja burlarse. ''Podréis burlaros'' conserva esa concesión y la segunda persona plural, mientras ''burlaros'' sin auxiliar sonaría más abrupto en español.'
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase revisado: el texto hebreo y el audit trail inglés siguen apoyando la lectura concesiva de la última cláusula y el sentido idiomático de נָשָׂא como ''tolerar/soportar''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita 'sufridme' por su tono más arcaico en español actual; 'toleradme' conserva mejor la naturalidad y la fuerza imperativa.
  - Se conserva la segunda persona plural para reflejar el hebreo plural.
