translation:
  language: es
  text: 'Pero Marta estaba distraída, ocupada con mucho servir. Y se acercó y dijo[a]: «Señor, ¿no te importa que mi hermana me haya dejado sola para servir? Dile, pues, que me ayude».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿no te importa que mi hermana me haya dejado sola para hacer todo el servicio?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιεσπᾶτο
  english_pob_choice: was distracted
  chosen_spanish: estaba distraída
  alternatives_spanish:
  - estaba apartada
  - estaba absorbida
  - estaba ocupada
  lexicon: BDAG
  rationale: El imperfecto expresa una acción o estado en desarrollo; «estaba distraída» comunica bien la idea de ser apartada de la atención principal en un español natural, sin convertirlo en una mera ocupación.
- source_word: περὶ πολλὴν διακονίαν
  english_pob_choice: with much serving
  chosen_spanish: con mucho servicio
  alternatives_spanish:
  - con mucha labor de servicio
  - con muchos preparativos
  - con mucho ministerio
  lexicon: BDAG
  rationale: Aquí διακονία se refiere al servicio práctico del hogar, no al ministerio formal. «Con mucho servicio» mantiene la concreción del acto, aunque suena ligeramente menos idiomático que una paráfrasis como «preparativos».
- source_word: ἐπιστᾶσα
  english_pob_choice: she came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - se puso de pie junto a él
  - se aproximó
  - vino hacia él
  lexicon: BDAG
  rationale: El participio introduce la acción de acercarse antes de hablar. «Se acercó» es natural en español y preserva el movimiento previo al discurso.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor Jesús
  lexicon: BDAG
  rationale: Se conserva el título reverente habitual para Jesús en español. Aunque el proyecto usa «Yahvé» para יהוה, aquí el término griego dirigido a Jesús se vierte de forma directa como «Señor».
- source_word: οὐ μέλει σοι
  english_pob_choice: does it not matter to you
  chosen_spanish: ¿no te importa
  alternatives_spanish:
  - ¿no te preocupa
  - ¿no te concierne
  - ¿no te parece importante
  lexicon: BDAG
  rationale: La locución expresa preocupación o interés. «¿No te importa?» reproduce la queja de Marta con una forma breve y natural; no añade más intensidad emocional de la que el griego exige.
- source_word: μόνην με κατέλειπεν διακονεῖν
  english_pob_choice: has left me to serve alone
  chosen_spanish: me haya dejado sola para servir
  alternatives_spanish:
  - me haya dejado sola para hacer el servicio
  - me haya abandonado para servir sola
  - me haya dejado sola sirviendo
  lexicon: BDAG
  rationale: La construcción conserva tanto «sola» como la idea de quedar para servir. «Haya dejado» refleja el contenido subordinado del reclamo, y «para servir» mantiene el infinitivo de propósito/resultado sin sobretraducirlo.
- source_word: εἰπὲ οὖν αὐτῇ
  english_pob_choice: Tell her, then
  chosen_spanish: Dile, pues
  alternatives_spanish:
  - Así que dile
  - Por tanto, dile
  - Dile entonces
  lexicon: BDAG
  rationale: El imperativo es directo; «pues» reproduce bien la inferencia de οὖν en español bíblico actual.
- source_word: συναντιλάβηται
  english_pob_choice: to help me
  chosen_spanish: que me ayude
  alternatives_spanish:
  - que me eche una mano
  - que me asista
  - que venga a ayudarme
  lexicon: BDAG
  rationale: El verbo expresa ayuda conjunta o asistencia. «Que me ayude» es la opción más clara y natural en español, sin perder el sentido de cooperación implícito.
theological_decisions:
- issue: Título Κύριε aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene el tratamiento reverente dirigido a Jesús y la convención cristiana más extendida en español. No hay motivo contextual para sustituirlo por otra forma.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de διακονία en un contexto doméstico
  english_pob_reading: serving
  chosen_spanish_reading: servicio
  alternative_spanish_readings:
  - ministerio
  - atención doméstica
  rationale: El contexto es la atención práctica del hogar, no una categoría eclesial. Traducirlo como «servicio» evita sobrecargar el verso con un matiz ministerial no sostenido por el contexto.
  doctrine_reference: BDAG διακονία, contexto narrativo doméstico de Lucas 10:40
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del audit trail inglés y no requiere revisiones sustantivas; se han ajustado únicamente la naturalidad del español y la cohesión sintáctica, manteniendo las tensiones léxicas relevantes (διακονία como servicio práctico, οὐ μέλει σοι como reclamo de interés/preocupación).
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος, conforme a la lectura doctrinal del proyecto para Jesús.
  - Se usa «servicio» y no «ministerio» para διακονία, porque el contexto es doméstico.
  - La nota al pie mantiene una alternativa posible sin desplazar el texto principal.
  - El registro es bíblico moderno, no arcaizante, y evita calcos innecesarios.
