translation:
  language: es
  text: 'Y esta es la copia de la carta: el gran rey Artajerjes escribe lo siguiente[b] a los gobernantes y a los gobernadores locales de las ciento veintisiete provincias[a] desde la India hasta Etiopía, que están sujetos a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Provincias» traduce aquí el término administrativo griego; también podría entenderse como «regiones» o «tierras».
    reason: lexical_alternative
  - marker: b
    text: «Escribe lo siguiente» también puede verterse «escribe así» o «escribe de la siguiente manera».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολῆς
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  - carta escrita
  lexicon: LSJ
  rationale: ἐπιστολή designa una comunicación escrita formal. En español, 'carta' conserva naturalidad y el registro epistolar sin introducir un término más técnico o eclesiástico que el texto no exige.
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - duplicado
  lexicon: LSJ
  rationale: ἀντίγραφον es una copia o reproducción de un documento. 'Copia' es la equivalencia más clara y pública en español administrativo.
- source_word: Βασιλεὺς μέγας
  english_pob_choice: Great King
  chosen_spanish: Gran Rey
  alternatives_spanish:
  - el gran rey
  - Rey Grande
  lexicon: LSJ
  rationale: Es un título real fijo. 'Gran Rey' preserva la fuerza titulary y el orden natural del español, evitando suavizarlo a una mera descripción.
- source_word: Ἀρταξέρξης
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerjes I
  - Artajerjes
  lexicon: LSJ
  rationale: La forma española estándar del nombre es 'Artajerjes', que es transparente para lectores bíblicos en español y corresponde al mismo referente.
- source_word: χωρῶν
  english_pob_choice: provinces
  chosen_spanish: provincias
  alternatives_spanish:
  - regiones
  - tierras
  - distritos
  lexicon: LSJ
  rationale: Aunque χωρών puede significar 'regiones' o 'tierras', el contexto imperial administrativo favorece 'provincias' como equivalente funcional, igual que en el auditable inglés POB.
- source_word: ἄρχουσι
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - regidores
  - autoridades
  - príncipes
  lexicon: LSJ
  rationale: ἄρχοντες señala personas con autoridad. 'Gobernantes' comunica la amplitud del cargo sin confundirlo con τοπάρχαις, que se vierte aparte como autoridad más local.
- source_word: τοπάρχαις
  english_pob_choice: local governors
  chosen_spanish: gobernadores locales
  alternatives_spanish:
  - gobernantes locales
  - jefes locales
  - gobernadores de distrito
  lexicon: LSJ
  rationale: τοπάρχης se refiere a un gobernante de una localidad o distrito. 'Gobernadores locales' preserva el matiz administrativo y el contraste con los ἄρχοντες.
- source_word: ὑποτεταγμένοις
  english_pob_choice: who are subject to him
  chosen_spanish: que están sujetos a él
  alternatives_spanish:
  - subordinados a él
  - bajo su autoridad
  - sometidos a él
  lexicon: LSJ
  rationale: El participio expresa subordinación efectiva al rey. 'Sujetos a él' mantiene esa relación de dependencia con un tono formal adecuado al encabezado imperial.
- source_word: τάδε γράφει
  english_pob_choice: writes these things
  chosen_spanish: escribe lo siguiente
  alternatives_spanish:
  - escribe estas cosas
  - escribe así
  - escribe de la siguiente manera
  lexicon: LSJ
  rationale: La expresión griega es epistolar y formulaica. 'Escribe lo siguiente' es idiomático en español y conserva el valor introductorio sin literalismo pesado.
theological_decisions:
- issue: Tratamiento del registro imperial y ausencia de armonización religiosa
  english_pob_reading: Render the verse as a formal imperial letter heading without importing later theological or historical harmonization.
  chosen_spanish_reading: Presentar el versículo como encabezado formal de una carta imperial, sin añadir interpretaciones históricas o doctrinales ajenas al texto.
  alternative_spanish_readings:
  - Convertirlo en una proclamación generalizada del rey
  - Suavizar la fórmula a un mero saludo narrativo
  rationale: El pasaje es administrativo y narrativo, no doctrinal. El español debe conservar la solemnidad y la estructura de encabezado oficial que refleja el griego, sin expandir ni reinterpretar el contenido.
  doctrine_reference: 'Principio POB: primacía de la lengua original y rendición transparente del registro del texto fuente.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la solución inglesa auditada, manteniendo el encabezado epistolar, el título real y la terminología administrativa sin añadir harmonización interpretativa. Se optó por 'copia de la carta' y 'escribe lo siguiente' como equivalentes naturales del griego ἀντίγραφον y τάδε γράφει, respectivamente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni el nombre divino explícito.
  - '''Artajerjes'' se conserva como forma española estable del nombre propio, coherente con el uso bíblico en español.'
  - '''Gobernantes'' y ''gobernadores locales'' distinguen bien ἄρχουσι y τοπάρχαις, evitando colapsar ambos términos en una sola categoría.'
  - La puntuación reproduce el ritmo formal del encabezado de carta con dos puntos tras 'carta' y una cláusula relativa final clara.
