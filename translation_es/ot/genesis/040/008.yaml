translation:
  language: es
  text: 'Ellos le dijeron[a]: «Hemos soñado un sueño, y no hay quien lo interprete». José les dijo[b]: «¿No pertenecen las interpretaciones a Dios? Por favor, cuéntenmelos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Soñamos un sueño». El hebreo dice literalmente: «un sueño soñamos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿No es a Dios a quien pertenecen las interpretaciones?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲלוֹם חָלַמְנוּ
  english_pob_choice: We have dreamed a dream
  chosen_spanish: Hemos soñado un sueño
  alternatives_spanish:
  - Soñamos un sueño
  - Hemos tenido un sueño
  lexicon: HALOT
  rationale: El hebreo usa un acusativo cognado (“sueño soñamos”). En español, “soñar un sueño” conserva esa figura de manera natural y transparente; el perfecto compuesto refleja bien la relevancia presente del hecho en la escena.
- source_word: וּפֹתֵר אֵין אֹתוֹ
  english_pob_choice: and there is no one to interpret it
  chosen_spanish: y no hay quien lo interprete
  alternatives_spanish:
  - y no hay intérprete para ello
  - y nadie puede interpretarlo
  lexicon: HALOT
  rationale: פֹתֵר es participio activo, con sentido de “intérprete/uno que interpreta”. “No hay quien lo interprete” mantiene la idea de ausencia de intérprete en un español idiomático, sin perder la fuerza verbal del hebreo.
- source_word: הֲלוֹא
  english_pob_choice: Do not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. En español, “¿No pertenecen...?” conserva mejor la fuerza interrogativa que una forma imperativa literal.
- source_word: לֵאלֹהִים פִּתְרֹנִים
  english_pob_choice: interpretations belong to God
  chosen_spanish: las interpretaciones pertenecen a Dios
  alternatives_spanish:
  - las interpretaciones son de Dios
  - Dios es quien da las interpretaciones
  lexicon: HALOT
  rationale: El hebreo expresa posesión o fuente con ל + אֱלֹהִים. “Pertenecen a Dios” reproduce esa relación sin añadir explicaciones ajenas al texto y preserva la afirmación teológica de que la capacidad de interpretar depende de Dios.
- source_word: פִּתְרֹנִים
  english_pob_choice: interpretations
  chosen_spanish: las interpretaciones
  alternatives_spanish:
  - la interpretación
  - las soluciones
  lexicon: HALOT
  rationale: El sustantivo es plural en hebreo; conservar el plural en español refleja la forma y el sentido genérico del enunciado.
- source_word: סַפְּרוּ נָא לִי
  english_pob_choice: Please tell them to me
  chosen_spanish: Les ruego que me las cuenten
  alternatives_spanish:
  - Por favor, cuéntenmelas
  - Les pido que me las digan
  lexicon: HALOT
  rationale: סִפֵּר significa “contar / relatar / decir”. El plural “las” sigue el ajuste revisado en la POB inglesa para hacer concordar el pronombre con “interpretaciones” y, a la vez, puede referirse a los sueños mencionados. El matiz cortés de נָא queda bien expresado con “les ruego”.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Transliteration standard
  rationale: Nombre propio bíblico en su forma española usual y reconocible.
theological_decisions:
- issue: Referencia de אֱלֹהִים en la afirmación de José
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - los dioses
  rationale: En el relato de José, la referencia apunta al Dios verdadero como fuente de la capacidad de interpretación. El contexto no sugiere politeísmo genérico, por lo que “Dios” es la opción fiel y coherente con la lectura POB.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension rather than resolve it only where the source is genuinely ambiguous'
translation_notes:
  revision_awareness: La POB inglesa fue revisada para cambiar «it» por «them» en la respuesta de José, reflejando el plural de «interpretations» y el posible sentido plural de los sueños narrados. En español, esa revisión se refleja con «las» en «me las cuenten», manteniendo la concordancia con el plural y la flexibilidad semántica del pasaje.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio bíblico en forma española estándar: José.'
  - Se conserva el plural «interpretaciones» para reflejar el hebreo פִּתְרֹנִים y la revisión inglesa.
  - «Pertenecen a Dios» reproduce la relación de posesión/fuente sin introducir una glosa interpretativa excesiva.
  - El pronombre de objeto directo en «me las cuenten» queda alineado con la revisión auditada de la POB inglesa.
  - El tono cortés de נָא se expresa con «Les ruego», que resulta natural en español bíblico moderno.
