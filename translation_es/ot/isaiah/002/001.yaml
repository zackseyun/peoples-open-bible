translation:
  language: es
  text: La palabra que Isaías hijo de Amoz vio acerca de Judá y Jerusalén[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra» puede entenderse como «el mensaje» o «el asunto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «vio»; expresión profética habitual para recibir revelación en visión.'
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘mensaje’. En un encabezado profético, ‘la palabra’ conserva la forma concreta del hebreo y es natural en español sin añadir interpretación.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Se requiere un relativo simple; ‘que’ es la forma más natural y fiel en español para introducir la cláusula restrictiva.
- source_word: חָזָה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - tuvo una visión
  - recibió en visión
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente ‘ver’ y funciona aquí como expresión profética convencional. ‘Vio’ preserva la metáfora y evita una paráfrasis interpretativa.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Yesaías
  lexicon: Convención onomástica estándar
  rationale: Los nombres propios se adaptan por la forma española habitual y reconocible.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación genealógica se expresa con naturalidad en español como ‘hijo de’.
- source_word: אָמ֑וֹץ
  english_pob_choice: Amoz
  chosen_spanish: Amoz
  alternatives_spanish:
  - Amós
  lexicon: Convención onomástica estándar
  rationale: Se conserva la transliteración convencional del nombre propio hebreo, no el nombre del profeta Amós.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - contra
  lexicon: HALOT
  rationale: En encabezados proféticos, עַל introduce el tema del mensaje. ‘Acerca de’ es neutral y mantiene abierta la tensión entre juicio y esperanza que el oráculo desarrolla.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: Convención bíblica estándar
  rationale: Se usa la forma española establecida para el nombre del reino/territorio.
- source_word: וִירוּשָׁלִָם
  english_pob_choice: and Jerusalem
  chosen_spanish: y Jerusalén
  alternatives_spanish:
  - e Jerusalén
  lexicon: Convención bíblica estándar
  rationale: La conjunción y el topónimo se trasladan de modo directo y natural al español.
theological_decisions:
- issue: Naturaleza de la revelación profética en חָזָה
  english_pob_reading: Retain the visionary language 'saw' rather than interpret it as merely 'spoke' or 'received.'
  chosen_spanish_reading: Mantener ‘vio’ como lenguaje visionario profético
  alternative_spanish_readings:
  - tuvo una visión
  - recibió revelación
  rationale: El hebreo usa explícitamente el verbo ‘ver’. Traducirlo así preserva el modo de revelación sin diluir la expresión profética en una formulación más general.
  doctrine_reference: Philosophy of translation §§1, 3
- issue: Alcance de עַל en el encabezado
  english_pob_reading: Render as 'concerning Judah and Jerusalem.'
  chosen_spanish_reading: ‘acerca de Judá y Jerusalén’
  alternative_spanish_readings:
  - contra Judá y Jerusalén
  - sobre Judá y Jerusalén
  rationale: '‘Acerca de’ comunica el tema del oráculo sin imponer un matiz adversativo. Así se conserva la tensión teológica: el pasaje incluye juicio, pero el encabezado no restringe el contenido solo a condena.'
  doctrine_reference: Philosophy of translation §3
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios de fondo: el encabezado se mantiene breve, visionario y neutral. No hubo revisiones posteriores que afectaran el contenido base; la versión final coincide con la lectura aprobada de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘Judá’ y ‘Jerusalén’ con la ortografía española estándar.
  - Se conserva el paralelismo breve del encabezado hebreo sin añadir glosas al cuerpo del texto.
  - ‘Vio’ queda como verbo principal para respetar la imaginería profética documentada.
