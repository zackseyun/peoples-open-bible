review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: ubicación sobre el candelabro, acción de ordenar/disponer las lámparas, referencia cultual delante de Yahvé, y continuidad del rito. Sin embargo, «arreglará» no es la mejor equivalencia para יַעֲרֹךְ en este contexto sacerdotal; suena más a reparar o componer que a disponer ordenadamente.'
  spanish_quality_summary: El español es claro y natural, pero «arreglará las lámparas» resulta menos idiomático y menos preciso en registro bíblico-cultual que «pondrá en orden» o «dispondrá». El resto de la redacción es legible y digno. No se requieren notas al pie en español para preservar el sentido.
  glossary_alignment: Alinea correctamente «Yahvé» para יְהוָה, «candelabro» para מְנוֹרָה, «puro» para הַטְּהֹרָה, «lámparas» para הַנֵּרוֹת y «continuamente» para תָּמִיד. La única desviación relevante es la elección de «arreglará» para יַעֲרֹךְ, donde el audit trail favorece la idea de ordenar/disponer, no de arreglar.
  issues:
  - severity: medium
    issue: «arreglará» para יַעֲרֹךְ
    rationale: Aunque posible en algunos contextos, en español moderno «arreglar» suele sugerir reparar, componer o solucionar. Aquí el hebreo ערך en contexto cultual significa poner en orden o disponer las lámparas. «Dispondrá» o «pondrá en orden» preserva mejor la acción ritual documentada en el POB inglés.
  revised_spanish_text: Sobre el candelabro puro dispondrá las lámparas delante de Yahvé continuamente.
  revision_rationale: 'Se sustituye «arreglará» por «dispondrá» para reflejar con más precisión el valor de יַעֲרֹךְ en contexto sacerdotal: ordenar o colocar en debida disposición. El resto del texto puede mantenerse, pues es fiel al hebreo, al uso terminológico del proyecto y a la legibilidad en español.'
