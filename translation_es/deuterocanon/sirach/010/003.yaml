translation:
  language: es
  text: Como el juez[a] de un pueblo, así son sus oficiales; y como el jefe de una ciudad, así son sus habitantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Un rey indisciplinado destruirá a su pueblo, y una ciudad será habitada por la inteligencia de los gobernantes». El hebreo conservado y el griego de este versículo difieren considerablemente; el texto principal sigue el testimonio hebreo existente.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּשׁוֹפֵט
  english_pob_choice: as the judge
  chosen_spanish: como el juez
  alternatives_spanish:
  - como el magistrado
  - como el gobernante
  lexicon: HALOT
  rationale: שׁוֹפֵט puede funcionar como juez o gobernante; en español, «juez» conserva el valor comparativo del proverbio y mantiene una relación natural con la estructura de כְּ sin endurecer el sentido hacia un título administrativo más específico de lo que el hebreo exige.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - la gente
  lexicon: HALOT
  rationale: El hebreo es genérico y proverbial. «Un pueblo» reproduce esa amplitud colectiva mejor que una referencia definida o un término demasiado coloquial.
- source_word: מְלִיצָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus intérpretes
  - sus consejeros
  - sus voceros
  lexicon: HALOT
  rationale: El término puede sugerir intérpretes o portavoces, pero en este contexto de liderazgo político el audit trail inglés opta por una función gubernativa. «Oficiales» comunica ese campo administrativo sin introducir una especificación que el hebreo no obliga a dar.
- source_word: וּכְרֹאשׁ עִיר
  english_pob_choice: and as the head of a city
  chosen_spanish: y como la cabeza de una ciudad
  alternatives_spanish:
  - y como el jefe de una ciudad
  - y como el gobernante de una ciudad
  lexicon: HALOT
  rationale: «Cabeza» conserva la imagen corporal/metafórica de רֹאשׁ que el inglés POB retiene con «head». Es fiel y transparente, aunque en español también podrían usarse equivalentes funcionales como «jefe» o «gobernante».
- source_word: יוֹשְׁבָיו
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que viven en ella
  - sus residentes
  lexicon: HALOT
  rationale: יוֹשְׁבִים son los que se sientan o habitan un lugar. «Habitantes» es natural, breve y mantiene el paralelismo proverbial.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the extant Hebrew witness; the Greek parallel is preserved in a footnote as an alternative reading.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado; el paralelo griego se preserva en una nota como lectura alternativa.
  alternative_spanish_readings:
  - 'Seguir el griego: «Un rey indisciplinado destruirá a su pueblo, y una ciudad será habitada por la inteligencia de los gobernantes».'
  - Fusionar hebreo y griego en una sola redacción armonizada.
  rationale: La política del proyecto para Sirácides es traducir desde el hebreo cuando éste se conserva con alta confianza. Aquí el hebreo y el griego difieren de forma notable, así que la lectura principal debe reflejar el proverbio hebreo y la variante griega debe quedar documentada para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input/consistency check.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión indicada como sin cambios y mantiene el acuerdo alto entre testigos, preservando en nota la divergencia importante entre hebreo y griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el Nombre divino; este versículo no lo contiene.
  - «Juez», «oficiales», «cabeza» e «habitantes» siguen de cerca la imagen hebrea y la decisión inglesa sin introducir lenguaje eclesiástico no requerido.
  - 'La nota al pie usa el mismo criterio del POB inglés: el griego se documenta como alternativa textual, no como base del texto principal.'
