translation:
  language: es
  text: Llegue delante de ti el gemido del prisionero; según la grandeza de tu brazo, preserva a los hijos de la muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los hijos de la muerte», un modismo hebreo para personas condenadas o destinadas a morir.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֣וֹא
  english_pob_choice: Let ... come
  chosen_spanish: Llegue
  alternatives_spanish:
  - Que llegue
  - Venga
  lexicon: HALOT
  rationale: El hebreo es un imperfecto usado con fuerza jussiva en oración. En español, un subjuntivo exhortativo como «Llegue» conserva bien la súplica dirigida a Dios sin sonar forzado.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión hebrea es relacional y espacial. «Delante de ti» mantiene el movimiento hacia Dios y es natural en español bíblico contemporáneo.
- source_word: אֶנְקַת
  english_pob_choice: the groaning
  chosen_spanish: el gemido
  alternatives_spanish:
  - el groan
  - el suspiro
  lexicon: HALOT
  rationale: El sustantivo denota una queja audible de aflicción. «Gemido» comunica con claridad esa carga sonora y lamentativa en español.
- source_word: אָסִיר
  english_pob_choice: the prisoner
  chosen_spanish: el prisionero
  alternatives_spanish:
  - el cautivo
  - el preso
  lexicon: HALOT
  rationale: El término se refiere a uno retenido en confinamiento. «Prisionero» es transparente y de registro culto-neutral; «cautivo» puede sugerir un matiz más bélico.
- source_word: כְּגֹדֶל
  english_pob_choice: according to the greatness of
  chosen_spanish: según la grandeza de
  alternatives_spanish:
  - conforme a la grandeza de
  - de acuerdo con la grandeza de
  lexicon: HALOT
  rationale: La preposición comparativa expresa medida o norma. «Según la grandeza de» refleja bien el estándar apelado en la oración.
- source_word: זְרוֹעֲךָ
  english_pob_choice: your arm
  chosen_spanish: tu brazo
  alternatives_spanish:
  - tu brazo poderoso
  - tu fuerza
  lexicon: HALOT
  rationale: Aunque el hebreo usa «brazo» como metáfora concreta de poder, en español «brazo» transmite mejor la imagen corporal que «arm» literalmente, sin perder el sentido de fuerza divina.
- source_word: הוֹתֵר
  english_pob_choice: preserve
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - mantén con vida
  - sálvalos de la muerte
  lexicon: HALOT
  rationale: El hiphil imperativo pide que Dios haga permanecer o librar de la muerte. «Preserva» es amplio, reverente y suficientemente próximo al sentido de conservar la vida.
- source_word: בְּנֵי תְמוּתָה
  english_pob_choice: the children of death
  chosen_spanish: los hijos de la muerte
  alternatives_spanish:
  - los hijos de la muerte
  - los destinados a morir
  - los condenados a muerte
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal para no aplanar la idiomática ni interpretarla de antemano. En español suena fuerte y auditable, como en el inglés POB revisado.
theological_decisions:
- issue: Si la cláusula final debe explicitar o no el destino mortal de la expresión hebrea.
  english_pob_reading: the children of death
  chosen_spanish_reading: los hijos de la muerte
  alternative_spanish_readings:
  - los destinados a morir
  - los condenados a muerte
  rationale: Se opta por la literalidad idiomática para preservar la tensión del hebreo y seguir la revisión del POB inglés, que prefirió mantener la expresión en vez de explicarla en el texto principal.
  doctrine_reference: Poética bíblica; idiomatismos semíticos
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que volvió a una formulación literal en la cláusula final («the children of death») para preservar el modismo hebreo. El español refleja esa decisión y evita expandir el sentido en el texto principal.
  spanish_consistency_notes:
  - Se usa «tu» para el paralelismo directo con el hebreo y con el tono de oración del salmo.
  - Se preserva la metáfora corporal «brazo» en lugar de abstraerla a «poder» para mantener la imagen original.
  - El lema final conserva el modismo hebreo con nota explicativa, siguiendo la estrategia del texto inglés revisado.
  - El estilo mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
