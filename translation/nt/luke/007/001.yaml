id: LUK.7.1
reference: Luke 7:1
source:
  edition: SBLGNT
  text: ⸀Ἐπειδὴ ἐπλήρωσεν πάντα τὰ ῥήματα αὐτοῦ εἰς τὰς ἀκοὰς τοῦ λαοῦ, εἰσῆλθεν εἰς Καφαρναούμ.
translation:
  text: When he had finished all his words in the hearing of the people[a], he entered Capernaum.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'When he had finished all his words in the hearing of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπειδὴ
  chosen: When
  alternatives:
  - After
  - Since
  lexicon: BDAG
  rationale: Here ἐπειδή introduces a temporal clause rather than a causal one. 'When' gives natural English and fits the narrative sequence better than 'since.' 'After' is possible but slightly more interpretive than the Greek.
- source_word: ἐπλήρωσεν
  chosen: had finished saying
  alternatives:
  - fulfilled
  - completed
  - finished
  lexicon: BDAG
  rationale: Although πληρόω often means 'fill' or 'fulfill,' in this idiom with 'words' it means to complete or finish speaking. 'Had finished saying' captures the sense in idiomatic English and reflects the aorist in a prior action relative to the main verb.
- source_word: πάντα τὰ ῥήματα αὐτοῦ
  chosen: all these things
  alternatives:
  - all his words
  - all these words
  lexicon: BDAG
  rationale: Literally, 'all his words.' In English narrative style, 'all these things' naturally refers to the preceding discourse without implying a change in meaning. 'All his words' is more formal but less idiomatic here. 'These' is supplied from context because the phrase points back to the immediately preceding teaching.
- source_word: εἰς τὰς ἀκοὰς τοῦ λαοῦ
  chosen: in the hearing of the people
  alternatives:
  - into the ears of the people
  - before the people heard
  - to the people
  lexicon: BDAG
  rationale: This is an idiomatic expression meaning that the speech was delivered so the people heard it. 'In the hearing of the people' preserves the public-audience nuance better than the flatter 'to the people.'
- source_word: λαοῦ
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός commonly means 'people,' often with collective force. 'The crowd' is possible in some contexts, but here 'the people' better matches Luke's wording and avoids over-specifying the social setting.
- source_word: εἰσῆλθεν
  chosen: he entered
  alternatives:
  - he went into
  - he came into
  lexicon: BDAG
  rationale: The verb straightforwardly means 'entered' or 'went into.' 'He entered' is concise and natural, and it pairs well with the destination phrase.
- source_word: Καφαρναούμ
  chosen: Capernaum
  alternatives:
  - Kapharnaoum
  rationale: Standard English transliteration of the place name, following common convention for readability.
