translation:
  language: es
  text: Ellos lo expulsan de la luz a las tinieblas[a], y lo destierran del mundo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «A las tinieblas» refleja el movimiento del hebreo hacia una esfera de oscuridad; también podría traducirse «a la oscuridad».
    reason: lexical_alternative
  - marker: b
    text: «Mundo» traduce תֵּבֵל; el término puede significar también «el mundo habitado».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶהְדְּפֻהוּ
  english_pob_choice: They drive him
  chosen_spanish: Ellos lo expulsan
  alternatives_spanish:
  - Ellos lo empujan
  - Ellos lo arrojan
  lexicon: HALOT
  rationale: El hebreo expresa una acción activa en plural contra un objeto masculino singular. «Expulsan» conserva la fuerza de desplazamiento/expulsión del verbo y su tono de exclusión, más natural en español bíblico que un calco como «manejan» o un simple «persiguen».
- source_word: מֵאוֹר
  english_pob_choice: from light
  chosen_spanish: de la luz
  alternatives_spanish:
  - desde la luz
  - de luz
  lexicon: HALOT
  rationale: La preposición de separación מֵ pide una idea de procedencia o alejamiento. «De la luz» es la forma más directa y fluida en español, manteniendo el contraste poético con «tinieblas».
- source_word: אֶל חֹשֶׁךְ
  english_pob_choice: into darkness
  chosen_spanish: a las tinieblas
  alternatives_spanish:
  - hacia la oscuridad
  - a la oscuridad
  lexicon: HALOT
  rationale: El movimiento de un ámbito a otro se expresa bien con «a». Se eligió «tinieblas» porque en español bíblico conserva mejor el contraste solemne con «luz» y el campo semántico de oscuridad intensa.
- source_word: וּמִתֵּבֵל
  english_pob_choice: from the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de la tierra
  - del mundo habitado
  lexicon: HALOT
  rationale: תֵּבֵל suele referirse al mundo, especialmente al mundo habitado. «Del mundo» reproduce la concisión del hebreo y coincide con la decisión auditada del texto inglés; «mundo habitado» sería más explicativo, pero menos poético.
- source_word: יְנִדֻּהוּ
  english_pob_choice: banish him
  chosen_spanish: lo destierran
  alternatives_spanish:
  - lo expulsan
  - lo echan
  lexicon: HALOT
  rationale: El verbo en hifil comunica la acción de hacer salir o excluir. «Destierran» capta con claridad la fuerza social/judicial de expulsión definitiva y evita repetir exactamente el primer verbo, preservando el paralelismo con variación léxica.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sustancialmente igual en la última revisión, sin cambios aplicados; la traducción española sigue la misma decisión de contraste «luz/tinieblas» y la pareja «expulsan/destierran» para reflejar el hebreo sin sobreinterpretación.
  spanish_consistency_notes:
  - Se mantuvo «luz» para אוֹר y «tinieblas» para חֹשֶׁךְ, conservando el contraste bíblico tradicional pero con lenguaje claro.
  - Se evitó «SEÑOR» o sustituciones teológicas no presentes, porque el versículo no contiene el nombre divino.
  - «Mundo» se usa en sentido de תֵּבֵל como totalidad habitada, no como abstracción filosófica.
