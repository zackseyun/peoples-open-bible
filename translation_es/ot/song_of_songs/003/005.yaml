  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y del POB inglés: conjuro solemne, vocativo poético, fórmula con gacelas/ciervas, doble verbo de provocar/despertar, y la ambigüedad final de «amor» como sujeto implícito. Sin embargo, hay un problema gramatical importante en español: «Te conjuro» es singular, mientras que el vocativo «hijas de Jerusalén» y los verbos posteriores son plurales. Debe decir «Las conjuro» o «Os conjuro»; para español latinoamericano neutral, «Las conjuro» es mejor. Además, «hasta que quiera» preserva bien la ambigüedad, pero el anclaje de la nota [a] está mal colocado sobre «conjuro» cuando la nota explica la cláusula final.'
  spanish_quality_summary: El español es claro y digno, pero la discordancia pronominal en «Te conjuro» afecta seriamente la corrección y la legibilidad. «Despierten ni aviven» es aceptable, aunque «despierten ni aviven el amor» suena un poco menos natural que «despierten ni provoquen», pero no exige cambio. El resto del verso es bien leído y eclesialmente legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «hijas de Jerusalén», «gacelas», «ciervas», «amor» y la preservación de la ambigüedad final concuerdan con la auditoría inglesa. La única desviación relevante es formal/gramatical, no terminológica. También debe corregirse la ubicación de la nota [a] para que corresponda al lugar pertinente en el texto.
  issues:
  - severity: high
    issue: Discordancia de número/persona en «Te conjuro»
    rationale: El hebreo se dirige a un grupo («hijas de Jerusalén»; verbos 2mp). En español, «Te» es singular y contradice el vocativo plural. Para español neutro latinoamericano, «Las conjuro» reproduce correctamente el objeto plural femenino.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota [a] explica «hasta que quiera / hasta que le plazca», no el verbo «conjuro». Según las reglas, el marcador debe aparecer en la palabra o frase relevante del texto.
