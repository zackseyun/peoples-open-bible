review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del hebreo: petición para que cese el mal de los impíos, petición paralela para afirmar al justo, y cierre dirigido a Dios como el que examina el interior humano. Sin embargo, hay dos ajustes importantes: «Por favor» suena demasiado coloquial para el registro poético-oracional, y «riñones» en español bíblico actual resulta torpe y menos inteligible que en inglés; aquí conviene una equivalencia idiomática con nota que preserve la imagen hebrea.'
  spanish_quality_summary: La redacción es mayormente clara, pero «Por favor» rebaja el tono digno del salmo y «oh Dios justo» suena algo calcado; «oh, Dios justo» o mejor una formulación sin exceso enfático mejora la fluidez. «Los riñones» es comprensible solo con esfuerzo y distrae en español eclesial general. «La mente» o «lo más íntimo» sería más natural, pero dado el inglés POB final («hearts and minds»), «los corazones y las mentes» es la opción más legible y alineada con la auditoría.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «Dios» es correcto para אֱלֹהִים. «Justo» para צַדִּיק funciona bien. La principal cuestión léxica es antropológica: aunque el hebreo dice «riñones», la revisión inglesa ya adoptó un equivalente idiomático; por tanto, en español conviene seguir esa decisión en el texto principal y conservar la literalidad en nota.'
  issues:
  - severity: medium
    issue: «Por favor» para נָא
    rationale: Aunque semánticamente posible, en poesía bíblica española suena conversacional y poco digno. «Te ruego» o una súplica sin partícula explícita refleja mejor el tono oracional.
  - severity: high
    issue: «riñones» en el texto principal
    rationale: El hebreo literal es correcto, pero en español moderno produce extrañeza innecesaria y reduce la legibilidad. El inglés POB auditado ya resolvió esto con una equivalencia idiomática. Debe decir «mentes» y explicar en nota el hebreo literal.
  - severity: low
    issue: Puntuación y naturalidad del vocativo
    rationale: «oh Dios justo» puede mejorarse con puntuación española y mejor cadencia; además, el cierre puede fluir mejor con raya o coma vocativa.
  - severity: low
    issue: Nota a marcada como alternativa_reading
    rationale: La nota sobre «termine» no preserva una alternativa textual o teológica significativa; es más bien explicación léxica menor y puede omitirse para evitar aparato innecesario.
  revised_spanish_text: Te ruego que el mal de los impíos llegue a su fin, pero establece al justo; oh, Dios justo, que examinas los corazones y las mentes[a].
