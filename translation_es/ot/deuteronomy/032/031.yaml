- source_word: צוּרָם
  english_pob_choice: their rock
  chosen_spanish: su roca
  alternatives_spanish:
  - su Roca
  lexicon: HALOT
  rationale: En español, minúscula ayuda a marcar el contraste con la Roca verdadera sin perder el juego verbal deliberado entre ambas ocurrencias de צוּר.
- source_word: וְאֹיְבֵינוּ פְּלִילִים
  english_pob_choice: and our enemies are judges
  chosen_spanish: y nuestros enemigos son jueces
  alternatives_spanish:
  - y aun nuestros enemigos son jueces
  - y nuestros enemigos juzgan
  lexicon: HALOT
  rationale: «פְּלִילִים» es literalmente un sustantivo con sentido de jueces/arbitros; se conserva la lectura forense de forma directa y natural en español, evitando una paráfrasis excesiva.
theological_decisions:
- issue: Conservar «Roca» como metáfora/título divino en vez de reemplazarla por un equivalente explicativo
  english_pob_reading: Retain 'Rock' as the main-text metaphor/title for Israel's God
  chosen_spanish_reading: Mantener «Roca» con mayúscula para Yahvé
  alternative_spanish_readings:
  - protector
  - refugio
  - fuerza
  rationale: El hebreo usa el mismo sustantivo para Yahvé y para el falso apoyo de las naciones; traducirlo como «Roca» preserva el contraste literario y teológico, sin resolver la imagen por interpretación.
  doctrine_reference: Primacía del idioma original; conservar la tensión retórica y teológica del texto fuente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que prefirió una traducción más literal de וְאֹיְבֵינוּ פְּלִילִים, evitando la paráfrasis inferencial «como aun nuestros enemigos juzgan». La forma final sigue esa decisión y conserva la sintaxis simple y directa del hebreo.
  spanish_consistency_notes:
  - Se usa «Roca» con mayúscula solo para el referente divino de ישראל; «roca» minúscula para el objeto comparado, manteniendo el contraste.
  - Se prefirió «porque» para la relación explicativa del versículo, alineado con el flujo argumental del Cántico de Moisés.
  - «jueces» se mantiene en plural para reflejar el sustantivo hebreo y el sentido colectivo del enunciado.
