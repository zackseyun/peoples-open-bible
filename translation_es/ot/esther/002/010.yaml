review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Ester no reveló ni su pueblo ni su ascendencia/parentesco porque Mardoqueo se lo había ordenado. Conserva adecuadamente el pluscuamperfecto narrativo y la fuerza de צִוָּה. Sin embargo, la sintaxis con objeto personal (''a su pueblo'', ''a su parentela'') no encaja con ''dar a conocer'' en este contexto; lo que se da a conocer es la identidad/origen, no ''a'' las personas. Además, el pronombre singular ''lo'' después de dos complementos coordinados resulta algo impreciso.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero suena algo forzada por la construcción 'dar a conocer a su pueblo ni a su parentela'. En español natural y fiel conviene decir 'no había dado a conocer su pueblo ni su parentela' o, mejor aún, usar un verbo más directo como 'revelar' o 'declarar'. 'Parentela' es posible, pero en lectura bíblica general puede sonar menos natural; 'linaje' expresa mejor la nota de ascendencia que documenta el expediente inglés.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. El nombre ''Ester'' es aceptable en español. La principal cuestión léxica es מוֹלַדְתָּהּ: el inglés auditado optó por ''kindred'' con nota de ''ancestry/family line''. En español, ''linaje[a]'' preserva mejor esa gama semántica que ''parentela'', y la nota puede recoger las alternativas de parentesco/ascendencia/origen.'
  issues:
  - severity: medium
    issue: Construcción española poco natural con 'dar a conocer' + objeto introducido por 'a'
    rationale: El hebreo expresa que Ester no hizo saber su pueblo y su linaje. En español, 'dar a conocer a su pueblo' suena como si el pueblo fuera el destinatario o una persona presentada, no el contenido ocultado.
  - severity: medium
    issue: '''Parentela'' es menos natural y menos preciso que ''linaje'' en este contexto'
    rationale: מוֹלַדְתָּהּ aquí apunta probablemente a ascendencia o línea familiar, no solo a parientes vivos. 'Linaje' o 'ascendencia' comunica mejor la distinción respecto de 'su pueblo'.
  - severity: low
    issue: Pronombre singular 'lo' tras dos elementos coordinados
    rationale: Aunque comprensible, 'lo' después de 'su pueblo ni su parentela' puede sonar algo impreciso. Con 'eso' o una reformulación con 'revelar' la referencia resulta más natural.
  revised_spanish_text: Ester no había revelado a su pueblo ni a su linaje[a], porque Mardoqueo le había mandado que no lo revelara.
  revised_footnotes:
