review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la prohibición y el referente pronominal implícito del hebreo: no comerlo, sino derramarlo. Sin embargo, עַל הָאָרֶץ en este contexto ritual concreto se alinea mejor con ‘en el suelo’ que con ‘sobre la tierra’, conforme también al audit trail inglés (‘on the ground’).'
  spanish_quality_summary: El español es claro y digno, pero ‘sobre la tierra’ suena menos natural y algo más amplio/abstracto que la instrucción física concreta del versículo. ‘En el suelo’ mejora la naturalidad y precisión ritual sin paraphrasear. El resto del texto y la nota se leen bien.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de mantener el pronombre implícito en vez de explicitar ‘la sangre’ en el texto principal. El borrador respeta esa decisión; solo conviene ajustar הָאָרֶץ a ‘suelo’ por contexto.
  issues:
  - severity: medium
    issue: ‘sobre la tierra’ para עַל הָאָרֶץ
    rationale: Aunque ‘tierra’ es posible léxicamente, aquí la instrucción describe el acto concreto de verter la sangre en el suelo. ‘En el suelo’ comunica mejor el sentido físico y coincide con la decisión contextual documentada en inglés (‘on the ground’).
  - severity: low
    issue: Desajuste menor entre decisión léxica y forma final
    rationale: 'La entrada léxica para תֹּאכְלֶנּוּ dice ‘chosen_spanish: lo comerás’, mientras el texto correctamente dice ‘No lo comerás’. No afecta el versículo final, pero muestra una pequeña inconsistencia editorial.'
  revised_spanish_text: No lo comerás[a]; lo derramarás en el suelo como agua.
