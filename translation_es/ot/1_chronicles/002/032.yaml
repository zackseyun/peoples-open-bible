lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En listas genealógicas, בני introduce un subgrupo familiar; en español, «Los hijos de» comunica de forma natural la relación genealógica sin forzar la conjunción inicial.
- source_word: יָדָע
  english_pob_choice: Jada
  chosen_spanish: Yada
  alternatives_spanish:
  - Jada
  - Jeda
  lexicon: HALOT
  rationale: Se translitera el nombre propio desde el hebreo. «Yada» conserva mejor la consonante inicial y es legible en español bíblico.
- source_word: אֲחִי
  english_pob_choice: brother
  chosen_spanish: hermano de
  alternatives_spanish:
  - hermano
  - pariente de
  lexicon: HALOT
  rationale: La construcción en hebreo indica relación de posesión o pertenencia entre personas; en español, «hermano de» expresa con claridad la dependencia genealógica.
- source_word: שַׁמַּי
  english_pob_choice: Shammai’s
  chosen_spanish: Samai
  alternatives_spanish:
  - Shamai
  - Sammai
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. «Samai» evita una grafía anglicada y mantiene una forma breve y pronunciable.
- source_word: יֶתֶר
  english_pob_choice: Jether
  chosen_spanish: Jéter
  alternatives_spanish:
  - Jeter
  - Yéter
  lexicon: HALOT
  rationale: Nombre propio transliterado; se usa acento gráfico para indicar la pronunciación castellana y distinguirlo de formas comunes del español.
- source_word: וְיוֹנָתָן
  english_pob_choice: and Jonathan
  chosen_spanish: y Jonatán
  alternatives_spanish:
  - y Jonathan
  - y Jehonatán
  lexicon: HALOT
  rationale: «Jonatán» es la forma bíblica española más reconocible y fiel al nombre hebreo en contexto narrativo.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - entonces murió
  - y murió
  lexicon: HALOT
  rationale: El wayyiqtol narra el siguiente hecho; en español, «murió» es natural y transmite el avance narrativo sin añadir matices no presentes.
- source_word: לֹא בָנִים
  english_pob_choice: without sons
  chosen_spanish: sin hijos
  alternatives_spanish:
  - sin hijos varones
  - sin descendencia masculina
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «no hijos», pero en contexto genealógico señala que no dejó descendencia; «sin hijos» reproduce el sentido idiomático de la nota inglesa sin sobreespecificar género en el texto principal.
translation_notes:
  revision_awareness: Se siguió el acuerdo alto entre el texto hebreo y el audit trail inglés; no hubo revisiones aplicadas en el paso anterior y no se detectaron variantes textuales o tensiones teológicas adicionales para este versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yada» como transliteración estable de יָדָע y «Samai» para שַׁמַּי, con acentos solo cuando ayudan a la pronunciación en español.
  - Se evitó «SEÑOR» u այլ terminología teológica no pertinente, porque el versículo es genealógico y no contiene nombres divinos.
  - La nota al pie conserva la alternativa literal de la frase final, siguiendo el valor explicativo de la auditoría inglesa.
