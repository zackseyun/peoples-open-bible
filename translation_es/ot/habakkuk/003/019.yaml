base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/019.yaml
  text: 'Yahweh God is my strength[a]; he makes my feet like the deer’s, and he causes me to tread on my heights[d][c][b].


    For the choir director: with my stringed instruments.'
  footnotes:
  - marker: a
    text: 'Or, traditionally, ''The Lord GOD is my strength.'' The Hebrew more literally has two titles: ''YHWH, my Lord.'''
    reason: alternative_reading
  - marker: b
    text: Literally 'like does'; the image is of sure-footed agility on steep terrain.
    reason: lexical_alternative
  - marker: c
    text: Or 'my high places.' The phrase may refer to elevated places of security or triumph.
    reason: lexical_alternative
  - marker: d
    text: 'This closing line functions as a musical subscription: ''For the choir director; with my stringed instruments.'''
    reason: cultural_note
