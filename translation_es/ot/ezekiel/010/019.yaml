translation:
  language: es
  text: Entonces los querubines alzaron sus alas y se elevaron de la tierra ante mis ojos al salir, con las ruedas junto a ellos[a]; y se pararon[b] a la entrada de la puerta oriental de la casa de Yahvé, y la gloria del Dios de Israel estaba sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'frente a ellos' o 'a su lado'. La expresión hebrea denota una posición correspondiente.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice 'se paró/estuvo' en singular; el sujeto puede entenderse como la estructura compuesta del carro-trono, no solo los querubines.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: lifted up
  chosen_spanish: alzaron
  alternatives_spanish:
  - levantaron
  - alzaron sus alas
  lexicon: HALOT
  rationale: El verbo נשׂא con ‘sus alas’ describe un movimiento físico de elevación. ‘Alzaron’ conserva la imagen concreta y suena natural en español; el complemento explícito ‘sus alas’ evita una redundancia pesada.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los querubines
  lexicon: HALOT
  rationale: ‘Querubines’ reproduce el término técnico bíblico sin sustituirlo por una palabra más genérica. Mantiene la imaginería visionaria de Ezequiel.
- source_word: כַּנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - las alas de ellos
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del constructo con sufijo pronominal.
- source_word: וַיֵּרֹמּוּ מִן־הָאָרֶץ
  english_pob_choice: rose from the earth
  chosen_spanish: se elevaron de la tierra
  alternatives_spanish:
  - subieron de la tierra
  - fueron alzados de la tierra
  lexicon: HALOT
  rationale: El valor elevativo del verbo aquí se expresa bien con ‘se elevaron’, que conserva el dinamismo de la escena sin forzar una pasiva artificial.
- source_word: לְעֵינַי
  english_pob_choice: before my eyes
  chosen_spanish: ante mis ojos
  alternatives_spanish:
  - a mis ojos
  - delante de mis ojos
  lexicon: HALOT
  rationale: Equivale al hebreo idiomático y preserva la perspectiva de testigo ocular de Ezequiel.
- source_word: בְּצֵאתָם
  english_pob_choice: as they went out
  chosen_spanish: al salir
  alternatives_spanish:
  - cuando salían
  - mientras salían
  lexicon: HALOT
  rationale: La expresión infinitiva con preposición marca simultaneidad temporal; ‘al salir’ es la forma más concisa y natural en español.
- source_word: וְהָאוֹפַנִּים
  english_pob_choice: with the wheels
  chosen_spanish: con las ruedas
  alternatives_spanish:
  - y las ruedas
  lexicon: HALOT
  rationale: Aunque el hebreo introduce la frase con waw, el sentido continúa la descripción de acompañamiento. ‘Con las ruedas’ comunica mejor la relación espacial.
- source_word: לְעֻמָּתָם
  english_pob_choice: beside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - en correspondencia con ellos
  - frente a ellos
  lexicon: HALOT
  rationale: El término indica posición correspondiente o contigua. ‘Junto a ellos’ es idiomático y evita cargar la frase con un matiz técnico innecesario.
- source_word: וַיַּעֲמֹד
  english_pob_choice: they stood
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se pararon
  - quedaron en pie
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular en el testimonio auditado, el contexto inmediato es plural y la revisión inglesa lo normaliza al plural. En español, ‘se detuvieron’ mantiene la lectura contextual y el sentido de pausa/estacionamiento de la visión.
- source_word: פֶּתַח שַׁעַר
  english_pob_choice: the entrance of the gate
  chosen_spanish: a la entrada de la puerta
  alternatives_spanish:
  - en la entrada de la puerta
  - junto a la entrada de la puerta
  lexicon: HALOT
  rationale: ‘פתח שער’ designa la zona de acceso de la puerta; ‘a la entrada’ refleja bien la localización sin sobrerinterpretar.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: ‘Yahvé’. ‘Casa’ conserva el hebreo בית sin reemplazarlo por ‘templo’, que sería interpretativo.'
- source_word: הַקַּדְמוֹנִי
  english_pob_choice: eastern
  chosen_spanish: oriental
  alternatives_spanish:
  - oriental
  - del oriente
  - del este
  lexicon: HALOT
  rationale: ‘Oriental’ es una forma natural y precisa en español bíblico para indicar la orientación geográfica de la puerta.
- source_word: וּכְבוֹד אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the glory of the God of Israel
  chosen_spanish: la gloria del Dios de Israel
  alternatives_spanish:
  - la gloria del Dios de Israel
  - la gloria del Dios de Israel
  lexicon: HALOT
  rationale: Es una equivalencia directa que conserva la fórmula recurrente en Ezequiel para la manifestación visible de la presencia divina.
- source_word: עֲלֵיהֶם
  english_pob_choice: above them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición expresa posición elevada; ‘sobre ellos’ es la formulación más sobria y clara en español.
- source_word: מִלְמָעְלָה
  english_pob_choice: from above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - desde lo alto
  - por encima
  lexicon: HALOT
  rationale: Aunque la revisión inglesa suprima la redundancia, el hebreo sí refuerza la altura. En español, ‘desde arriba’ preserva ese matiz sin sonar demasiado pesado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto establece ‘Yahvé’ como forma principal para el Tetragrámaton. Se evita la convención de máscara litúrgica ‘SEÑOR’ para conservar la auditable identidad del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Función de וַיַּעֲמֹד en el contexto
  english_pob_reading: they stood
  chosen_spanish_reading: se detuvieron
  alternative_spanish_readings:
  - estuvieron
  - se quedaron
  rationale: Aunque la revisión inglesa opta por pluralizar, el hebreo conserva una forma singular y la escena describe una detención/posamiento del carro-querubines. ‘Se detuvieron’ comunica la acción sin fijar indebidamente el sujeto personal.
  doctrine_reference: Ezequiel 10:19, lectura contextual del sujeto colectivo de la visión
translation_notes:
  revision_awareness: La base inglesa auditada pasó por una revisión que prefirió ‘they stood’ frente a ‘it stood’ y omitió la glosa redundante ‘from above’. En el español se siguió la lectura contextual plural para la pausa visionaria y se conservó el refuerzo espacial de מִלְמָעְלָה con una expresión breve (‘desde arriba’) porque el hebreo lo incluye explícitamente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ en lugar de una máscara litúrgica, conforme al estándar del proyecto.
  - ‘Querubines’ y ‘gloria del Dios de Israel’ conservan la terminología visionaria estable de Ezequiel.
  - ‘Casa de Yahvé’ preserva la imagen arquitectónica/hebraica sin sustituirla por ‘templo’.
  - Se evitó ‘siervo’, ‘SEÑOR’ y otras sustituciones tradicionales no requeridas por la evidencia textual.
