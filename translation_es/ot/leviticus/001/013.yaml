translation:
  language: es
  text: Pero lavará las entrañas y las piernas con agua, y el sacerdote presentará todo ello y lo hará subir en humo sobre el altar. Es un holocausto, una ofrenda hecha por fuego[a], olor grato para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «una ofrenda por fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֶּרֶב
  english_pob_choice: the entrails
  chosen_spanish: las entrañas
  alternatives_spanish:
  - las partes internas
  - las vísceras
  lexicon: HALOT
  rationale: En contexto sacrificial, designa los órganos internos del animal. «Entrañas» conserva la concreción corporal y es natural en español bíblico contemporáneo sin volverse técnico en exceso.
- source_word: הַכְּרָעַיִם
  english_pob_choice: the legs
  chosen_spanish: las piernas
  alternatives_spanish:
  - las patas
  - los muslos
  lexicon: HALOT
  rationale: El término se refiere a las extremidades del animal sacrificial, especialmente las inferiores. «Piernas» es claro y directo en español; «patas» sonaría más animalizado de lo deseable en este contexto ritual.
- source_word: יִרְחַץ בַּמָּיִם
  english_pob_choice: shall wash ... with water
  chosen_spanish: lavará ... con agua
  alternatives_spanish:
  - enjuagará ... con agua
  - lavará ... en agua
  lexicon: HALOT
  rationale: El verbo implica lavado real. «Con agua» preserva el instrumental explícito del hebreo y «lavará» es la forma más natural en español.
- source_word: וְהִקְרִיב
  english_pob_choice: shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - acercará
  lexicon: HALOT
  rationale: En el procedimiento sacrificial, el hiphil de קרב expresa traer/presentar la ofrenda. «Presentará» evita fusionarlo con el verbo siguiente, que describe específicamente la combustión ritual.
- source_word: אֶת הַכֹּל
  english_pob_choice: all of it
  chosen_spanish: todo ello
  alternatives_spanish:
  - todo
  - la totalidad
  lexicon: HALOT
  rationale: Expresa la totalidad de la víctima preparada de modo idiomático en español y mantiene el énfasis totalizante del hebreo.
- source_word: וְהִקְטִיר
  english_pob_choice: turn it into smoke
  chosen_spanish: lo hará subir en humo
  alternatives_spanish:
  - lo quemará
  - lo convertirá en humo
  lexicon: HALOT
  rationale: El verbo cultual no es simplemente «quemar», sino hacer que la ofrenda ascienda en humo sobre el altar. «Lo hará subir en humo» conserva esa fuerza ritual sin sonar artificial.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: «Sobre» reproduce bien la localización ritual del acto y funciona con naturalidad en español.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - una ofrenda totalmente quemada
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente cultual tradicional en español para esta ofrenda específica y comunica su totalidad consumida por el fuego.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda ígnea
  lexicon: HALOT
  rationale: El término alude a una ofrenda hecha por fuego. «Ofrenda encendida» mantiene el vínculo con el fuego sin depender de un calco pesado; se preserva la alternativa más literal en la nota.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: olor grato
  alternatives_spanish:
  - aroma agradable
  - aroma placentero
  lexicon: HALOT
  rationale: La expresión es idiomática de aceptación agradable ante Yahvé. «Olor grato» conserva el lenguaje sensorial del hebreo y es tradicionalmente inteligible en español.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, conservando el Tetragrámaton como «Yahvé» en el texto principal.
theological_decisions:
- issue: Expresión cultual de רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: olor grato
  alternative_spanish_readings:
  - aroma agradable
  - aroma de grato olor
  rationale: La frase no describe una cualidad física de Dios, sino el carácter aceptable de la ofrenda mediante imagen olfativa. «Olor grato» mantiene la metáfora sin explicar en exceso ni desactivar su fuerza cultual.
  doctrine_reference: Translation philosophy §3
- issue: Distinción entre los dos verbos sacrificiales consecutivos
  english_pob_reading: shall present ... and turn it into smoke
  chosen_spanish_reading: presentará ... y lo hará subir en humo
  alternative_spanish_readings:
  - ofrecerá ... y lo quemará
  - presentará ... y lo quemará
  rationale: Conviene conservar la distinción entre traer/presentar la víctima y luego hacerla humear en el altar. Eso evita borrar un detalle procedimental importante del texto hebreo.
  doctrine_reference: Translation philosophy §6
- issue: Renderización de אִשֵּׁה
  english_pob_reading: a food offering
  chosen_spanish_reading: una ofrenda encendida
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda ígnea
  rationale: Se prioriza en español la referencia al fuego como rasgo definitorio de la categoría sacrificial. La expresión mantiene la tensión entre término técnico y transparencia semántica.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con el enfoque óptimo-equi valente del audit trail inglés, pero adapta algunas elecciones al español para mantener naturalidad, distinción ritual y fidelidad terminológica. No se detectan revisiones previas aplicadas en el expediente base.
  spanish_consistency_notes:
  - Se usó «Yahvé» de acuerdo con el estándar del proyecto para el nombre divino.
  - Se mantuvo la distinción entre «presentará» y «lo hará subir en humo» para reflejar los dos verbos hebreos consecutivos.
  - «Holocausto» se empleó como equivalente cultual establecido para עֹלָה en español.
  - La nota a pie de página conserva la alternativa literal relacionada con la ofrenda por fuego.
  - Se evitaron arcaísmos innecesarios salvo términos cultuales ya asentados en español bíblico.
