revisions:
- from: Cuando los hubieron llevado abajo al lugar llamado Schedia[a], y se hubo completado el viaje por mar, tal como había sido decretado por el rey, ordenó que los acamparan en el hipódromo delante de la ciudad, un lugar abierto muy apto para exhibirlos como ejemplo, a la vista de todos los que entraban en la ciudad y de los que desde allí eran enviados al campo para viajar[b], para que no tuvieran trato con sus fuerzas ni, en absoluto, fueran considerados dignos de un recinto cercado.
  to: Cuando fueron llevados al lugar llamado Schedia[a], y se completó la travesía, tal como había sido decretado por el rey, él ordenó que acamparan en el hipódromo[b] delante de la ciudad, un lugar abierto muy apto para hacer de ellos un ejemplo, visible a todos los que entraban en la ciudad y a los que desde allí eran enviados a la región de viaje, para que no tuvieran trato con sus fuerzas ni en absoluto fueran considerados dignos de un recinto[c].
  rationale: 'Se corrige la sintaxis para un español natural y fiel al griego: «fueron llevados» en lugar de «los hubieron llevado abajo»; «ordenó que acamparan» en vez de «que los acamparan»; «travesía» para la idea de viaje completado; «a la región de viaje» para mantener el sentido de envío fuera a la χώρα sin el giro débil «para viajar»; y «recinto» para una formulación más limpia de περίβολος. También se reorganizan las notas para que el anclaje corresponda al lugar pertinente y se preserve la alternativa léxica documentada.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:09:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura general del griego y del POB inglés: llegada a Schedia, final del viaje, decreto del rey, encierro en el hipódromo visible al público, y doble propósito de aislamiento y humillación. Sin embargo, varias elecciones no preservan bien el sentido o suenan poco naturales en español: «los hubieron llevado abajo» fuerza la direccionalidad y resulta gramaticalmente torpe; «los acamparan» introduce un sujeto implícito extraño en vez de expresar que el rey ordenó que ellos acamparan/fueran instalados; «al campo para viajar» debilita «a la región/en el país en viaje»; y la nota [b] no corresponde bien al anclaje textual, porque comenta la cláusula final aunque está colocada en «viajar».'
  spanish_quality_summary: La legibilidad es aceptable, pero hay giros poco idiomáticos y algo calcados del inglés/griego. «Cuando los hubieron llevado abajo» y «los acamparan» suenan antinaturales; «para viajar» es débil donde conviene «de viaje» o «en viaje». «Recinto cercado» es comprensible, pero «recinto» o «cerco» basta. El registro puede mantenerse digno con una sintaxis más natural sin perder precisión.
  glossary_alignment: No hay términos teológicos de proyecto especialmente implicados aquí. «Hipódromo» está bien y coincide con la decisión documentada. La transliteración «Schedia» está bien. La decisión para περίβολος puede expresarse mejor en español como «recinto» sin perder el matiz de enclosure. Conviene conservar la nota léxica de alternativa sobre «hipódromo/racecourse» y reubicar o reformular la nota final para explicar mejor la cláusula de aislamiento y negación de un recinto.
  issues:
  - severity: high
    issue: «Cuando los hubieron llevado abajo» es antinatural y no refleja bien la pasiva participial griega.
    rationale: ἀχθέντων indica que fueron llevados/traídos al lugar. «Hubieron llevado» es un pluscuamperfecto arcaizante e impropio aquí, y «abajo» suena forzado en español.
  - severity: high
    issue: «ordenó que los acamparan» tiene construcción defectuosa.
    rationale: παρεμβαλεῖν depende de «ordenó» con objeto directo «a ellos». En español natural debe ser «ordenó que acamparan» o «ordenó instalarlos/que fueran acampados». La forma actual deja ambiguo quién acampa a quién.
  - severity: medium
    issue: «eran enviados al campo para viajar» no expresa bien πρὸς ἐκδημίαν.
    rationale: La idea es ser enviados al país/región en viaje o de viaje. «Para viajar» suena débil y funcionalmente extraña.
  - severity: medium
    issue: La nota [b] está mal anclada y su contenido no corresponde al punto del texto donde aparece.
    rationale: El texto la coloca tras «viajar», pero la nota comenta sobre todo la cláusula final acerca de no asociarse con las fuerzas del rey y no ser considerados dignos de un recinto.
  - severity: low
    issue: «recinto cercado» es redundante.
    rationale: περίβολος ya implica cerco/enclosure. «Recinto» comunica mejor el sentido con español más limpio.
