translation:
  language: es
  text: La apariencia de la nieve[a] deslumbra los ojos[c], y ante su caída[b] el corazón tiembla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo podría leerse aquí como «blancura», pero el paralelo griego y el contexto meteorológico favorecen «nieve».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea sobre su «lluvia/chaparrón» es textualmente incómoda en este contexto; el paralelo griego apoya entenderla como la caída o precipitación de la nieve.
    reason: textual_variant
  - marker: c
    text: Masada conserva una línea vecina diferente en esta sección («y la vista asombra el corazón»), lo que muestra cierta inestabilidad en la disposición de estos cola entre los testigos hebreos.
    reason: textual_variant
lexical_decisions:
- source_word: תואר
  english_pob_choice: appearance
  chosen_spanish: blancura
  alternatives_spanish:
  - apariencia
  - belleza
  - forma
  lexicon: HALOT
  rationale: El hebreo apunta al rasgo visible del fenómeno; en esta línea la cualidad destacada es el color/blancura que provoca el efecto visual. En español, «blancura» conserva esa cualidad perceptible y encaja con el paralelo griego sobre la nieve.
- source_word: לבנה
  english_pob_choice: snow
  chosen_spanish: nieve
  alternatives_spanish:
  - blancura
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse como «blancura», el contexto meteorológico y el paralelo griego χιών favorecen entender el referente como nieve. Por eso el texto principal usa «nieve» y deja la alternativa en nota.
- source_word: יגהה עינים
  english_pob_choice: dazzles the eyes
  chosen_spanish: deslumbra los ojos
  alternatives_spanish:
  - brightens the eyes
  - hace brillar los ojos
  lexicon: HALOT
  rationale: «Deslumbra» reproduce bien el impacto visual intenso y naturaliza el modismo hebreo en español sin perder la fuerza poética. También armoniza con el griego, que expresa el asombro de la mirada.
- source_word: ממטרו
  english_pob_choice: at its falling
  chosen_spanish: ante su caída
  alternatives_spanish:
  - en su caída
  - ante su lluvia
  - ante su precipitación
  lexicon: HALOT
  rationale: El hebreo transmitido es algo áspero en contexto, y la tradición griega apunta a la bajada/caída del fenómeno. «Ante su caída» conserva la imagen de descenso y funciona bien en español sin introducir «lluvia» de manera discordante.
- source_word: יהמה לב
  english_pob_choice: the heart trembles
  chosen_spanish: el corazón tiembla
  alternatives_spanish:
  - el corazón se agita
  - el corazón se estremece
  - el corazón ruge
  lexicon: HALOT
  rationale: La revisión inglesa eligió «trembles» para reflejar el vigor de יהמה. «Tiembla» mantiene la agitación interior, es idiomático en español y preserva la fuerza afectiva del original sin suavizarla.
theological_decisions:
- issue: Tratamiento del motivo meteorológico con apoyo hebreo y griego
  english_pob_reading: The appearance of snow dazzles the eyes, and at its falling the heart trembles.
  chosen_spanish_reading: Como la blancura de la nieve deslumbra los ojos, y ante su caída el corazón tiembla.
  alternative_spanish_readings:
  - Como la apariencia de la nieve deslumbra los ojos, y ante su caída el corazón tiembla.
  - Como la blancura deslumbra los ojos, y ante su caída el corazón tiembla.
  rationale: 'No hay una tensión doctrinal, sino una decisión de traducción entre una lectura más cercana al hebreo («blancura») y la identificación contextual con la nieve respaldada por el griego. La formulación elegida mantiene ambas dimensiones: el rasgo visible y el referente meteorológico.'
  doctrine_reference: None
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente en el cierre («trembles»), pero se mantuvo la identificación contextual con la nieve por el paralelo griego y el entorno meteorológico del pasaje. También se respetó la ambigüedad hebrea de לבנה en nota, en vez de borrarla.
  spanish_consistency_notes:
  - Se usa un español bíblico moderno y legible, evitando calcos innecesarios.
  - «Deslumbra» conserva la intensidad visual sin recurrir a un castellano arcaizante.
  - «Corazón tiembla» mantiene la fuerza emotiva del hebreo revisado y del paralelo griego.
  - Se evita «SEÑOR» u otra terminología no pertinente, ya que el versículo no contiene el Nombre divino.
