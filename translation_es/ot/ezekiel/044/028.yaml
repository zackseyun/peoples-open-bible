    rationale: Aunque es comprensible y cercano al hebreo, «será por heredad» no suena tan natural ni tan claro como «será su heredad» o «les será como heredad». El inglés auditado opta por una formulación declarativa llana; en español conviene suavizar la construcción sin perder la elipsis.
