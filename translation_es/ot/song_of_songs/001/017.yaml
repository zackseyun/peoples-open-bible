  glossary_alignment: No hay términos teológicos mayores en juego. El principal problema terminológico es que el borrador no convierte la decisión léxica inglesa 'rafters' en un equivalente español adecuado. Dado que el propio expediente inglés reconoce incertidumbre léxica, en español conviene usar un término natural como 'largueros' y conservar la incertidumbre en nota, en vez de importar el inglés. 'Cedros' y 'cipreses' concuerdan con el expediente y las notas alternativas.
