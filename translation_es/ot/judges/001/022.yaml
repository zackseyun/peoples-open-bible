translation:
  language: es
  text: La casa de José[a] también subieron contra Betel, y Yahvé estaba con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'subieron a Betel'. El verbo hebreo dice literalmente 'subieron', pero en este contexto militar probablemente significa avanzar contra la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - subió
  - marchó contra
  - avanzó contra
  lexicon: HALOT
  rationale: El hebreo עלה conserva el sentido literal de 'subir', pero en este contexto militar con un lugar objetivo puede implicar avance hostil. 'Subió contra' preserva la imagen del verbo y hace clara la orientación bélica sin alejarse del hebreo.
- source_word: בֵית יוֹסֵף
  english_pob_choice: The house of Joseph
  chosen_spanish: La casa de José
  alternatives_spanish:
  - La casa de José
  - Los descendientes de José
  - La casa de José
  lexicon: HALOT
  rationale: La expresión es una designación tribal/clánica estable. 'La casa de José' mantiene la forma formal y el eco bíblico mejor que una paráfrasis explicativa.
- source_word: גַּם הֵם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - también ellos
  - incluso ellos
  lexicon: HALOT
  rationale: La partícula añade esta acción a campañas previas; 'también' comunica la adición de manera natural en español sin forzar el pronombre explícito.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Betel
  - Beth-el
  lexicon: HALOT
  rationale: El nombre propio del lugar se adapta a la ortografía usual en español bíblico. No se añade preposición separada porque la idea direccional ya está en 'subió contra'.
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para יהוה: ''Yahvé'' en el texto principal, preservando el nombre del pacto en lugar de enmascararlo con un título.'
- source_word: עִמָּם
  english_pob_choice: was with them
  chosen_spanish: estaba con ellos
  alternatives_spanish:
  - estaba con ellos
  - estaba a favor de ellos
  - estaba entre ellos
  lexicon: HALOT
  rationale: La preposición עם con sufijo expresa presencia y apoyo divinos. 'Estaba con ellos' es la traducción más directa e idiomática, sin sobredeterminar la relación.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La fuente hebrea usa directamente el Tetragrámaton. En español, el proyecto requiere 'Yahvé' como forma principal para conservar el nombre del pacto y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés. Se conservó la tensión entre el sentido literal de עלה ('subir') y su valor militar contextual. No hubo revisiones textuales aplicadas en el paquete fuente, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme a la terminología del proyecto para יהוה.
  - Se eligió 'Betel' como forma española habitual del topónimo.
  - '''Casa de José'' conserva el lenguaje tribal/covenantal del hebreo.'
  - La nota al pie marca la alternativa literal/direccional de 'subió a Betel' frente al matiz militar de 'subió contra'.
