  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. El versículo no contiene términos sensibles como Yahvé/Mesías/espíritu. La decisión principal es léxica: para כבה conviene ''apagar'' en el texto principal por naturalidad española, conservando ''extinguir'' como alternativa en nota para preservar la imagen auditada.'
