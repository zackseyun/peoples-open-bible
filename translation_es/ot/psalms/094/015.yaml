translation:
  language: es
  text: Porque el juicio volverá a la rectitud[a], y todos los rectos de corazón irán tras él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la justicia». Hebreo צֶדֶק puede significar «justicia» o «rectitud»; aquí se traduce «rectitud» para distinguirlo de מִשְׁפָּט («juicio»).'
    reason: lexical_alternative
  - marker: b
    text: Lit. «y tras él todos los rectos de corazón»; el sentido es que los rectos de corazón seguirán o se alinearán con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la fundamentación del dicho anterior con un conector causal/narrativo natural en español. 'Porque' conserva la relación lógica sin volver el verso innecesariamente enfático.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - hacia
  lexicon: HALOT
  rationale: 'En la construcción con יָשׁוּב, la dirección del retorno se expresa naturalmente en español con ''a'': ''volverá a la justicia''. Evita un calco rígido y mantiene la idea de movimiento hacia un estándar.'
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: HALOT
  rationale: Aquí el término puede significar 'righteousness' o 'justice'. En español, 'justicia' preserva mejor el paralelismo con מִשְׁפָּט y permite mantener la tensión entre el acto judicial y la norma moral sin duplicar 'rectitud' innecesariamente.
- source_word: יָשׁוּב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - se volverá
  - regresará
  lexicon: HALOT
  rationale: '''Volverá'' reproduce de manera directa el sentido de שוב y sugiere restauración de un estado correcto. Es natural en español poético y suficiente para la imagen de retorno.'
- source_word: מִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la justicia
  - la sentencia
  lexicon: HALOT
  rationale: '''Juicio'' conserva el peso forense/judicial de מִשְׁפָּט y distingue este sustantivo de צֶדֶק. ''Justicia'' habría tendido a borrar esa diferencia; ''sentencia'' sería demasiado estrecho.'
- source_word: וְאַחֲרָיו
  english_pob_choice: will follow after it
  chosen_spanish: tras él seguirán
  alternatives_spanish:
  - y tras él irán
  - y después de él lo seguirán
  lexicon: HALOT
  rationale: La frase hebrea literalmente significa 'y después de él'. En español, 'tras él seguirán' comunica de forma natural la idea de acompañar/aderirse al juicio restaurado. El pronombre masculino 'él' puede referirse al juicio, como antecedente más cercano, sin forzar la referencia.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  - cada uno de
  lexicon: HALOT
  rationale: '''Todos'' refleja el valor colectivo del hebreo y funciona fluidamente con el sustantivo siguiente.'
- source_word: יִשְׁרֵי
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los íntegros
  - los justos
  lexicon: HALOT
  rationale: Derivado de ישר, el término describe a quienes son moralmente rectos. 'Rectos' mantiene la imagen de integridad y evita confundirlos con el juicio/justicia del hemistiquio anterior.
- source_word: לֵב
  english_pob_choice: in heart
  chosen_spanish: de corazón
  alternatives_spanish:
  - en el corazón
  - en su corazón
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. 'De corazón' preserva el genitivo antropológico y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Relación entre 'juicio' y 'justicia'
  english_pob_reading: The verse states that judgment, presently perverted, will again align with righteousness.
  chosen_spanish_reading: El verso afirma que el juicio volverá a conformarse con la justicia.
  alternative_spanish_readings:
  - El juicio seguirá hasta que prevalezca la justicia
  - La justicia pertenece a los justos
  rationale: La forma verbal de שוב con עַד צֶדֶק sugiere retorno/restauración, no mera duración. La traducción conserva la esperanza de un orden moral restaurado, sin resolver de antemano la tensión entre ambos sustantivos.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica)
- issue: Referencia de 'tras él'
  english_pob_reading: The suffix refers to 'judgment,' yielding 'all the upright in heart will follow it.'
  chosen_spanish_reading: 'El sufijo se entiende como referencia a ''el juicio'', dando: ''tras él seguirán todos los rectos de corazón''.'
  alternative_spanish_readings:
  - El sufijo podría referirse de manera amplia a la justicia
  - La frase podría entenderse como 'y después de él están todos los rectos de corazón'
  rationale: Se adopta el antecedente inmediato más probable, מִשְׁפָּט, sin añadir una precisión doctrinal que el hebreo no exige. La formulación española conserva la idea de adhesión o seguimiento del orden restaurado.
  doctrine_reference: Translation philosophy §1 y §6
translation_notes:
  revision_awareness: El paso de la revisión inglesa añadió explícitamente 'after' para reflejar mejor la frase hebrea וְאַחֲרָיו. La versión española incorpora ese matiz con 'tras él seguirán', manteniendo la naturalidad del verso y la distinción entre יִשְׁפָּט/צֶדֶק.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Juicio'' se reserva para מִשְׁפָּט y ''justicia'' para צֶדֶק, preservando la distinción lexical del hebreo.'
  - '''Rectos de corazón'' traduce la idiomaticidad de יִשְׁרֵי לֵב sin ampliarla a una paráfrasis moral más extensa.'
  - La preposición 'tras' permite reflejar el valor de 'after' añadido en la revisión inglesa sin forzar un calco.
