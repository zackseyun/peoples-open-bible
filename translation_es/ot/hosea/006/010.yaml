translation:
  language: es
  text: 'En la casa de Israel he visto una cosa horrible[a]: allí hay prostitución en Efraín[b]; Israel se ha contaminado a sí mismo[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una cosa espantosa'. El término hebreo denota algo chocante o atroz.
    reason: lexical_alternative
  - marker: b
    text: O 'hay prostitución de Efraín'. La frase hebrea es condensada, y la relación marcada por la preposición puede expresarse de varias maneras.
    reason: alternative_reading
  - marker: c
    text: O 'Israel está contaminado' o 'Israel ha quedado impuro'.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּבֵית יִשְׂרָאֵל
  english_pob_choice: In the house of Israel
  chosen_spanish: En la casa de Israel
  alternatives_spanish:
  - Entre la casa de Israel
  - En Israel
  lexicon: HALOT
  rationale: Conservo la imagen de la casa/casa-dución del pueblo del pacto, que en español suena natural y refleja mejor la metáfora que un simple 'en Israel'.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: HALOT
  rationale: El perfecto español comunica una observación válida en el presente y mantiene el valor discursivo del qatal profético.
- source_word: שעריריה
  english_pob_choice: a horrible thing
  chosen_spanish: una cosa horrible
  alternatives_spanish:
  - una cosa espantosa
  - una cosa abominable
  lexicon: HALOT
  rationale: La expresión hebrea apunta a algo chocante o atroz; 'cosa horrible' transmite bien la repulsión moral sin cargar el texto con un término demasiado interpretativo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Mantengo el adverbio locativo explícito para reproducir la referencia al lugar mencionado en la cláusula anterior.
- source_word: זְנוּת
  english_pob_choice: prostitution
  chosen_spanish: prostitución
  alternatives_spanish:
  - fornicación
  - inmoralidad sexual
  - fornicación espiritual
  lexicon: HALOT
  rationale: '''Prostitución'' conserva la fuerza del símil sexual de Oseas y es comprensible en español moderno sin recurrir a un arcaísmo como ''fornicación'' o a una paráfrasis menos precisa.'
- source_word: לְאֶפְרַיִם
  english_pob_choice: there is prostitution in Ephraim
  chosen_spanish: hay prostitución en Efraín
  alternatives_spanish:
  - hay prostitución de Efraín
  - hay prostitución para Efraín
  lexicon: HALOT
  rationale: El ל prefijado es elíptico; en español, 'hay prostitución en Efraín' refleja de manera natural la construcción y evita una atribución demasiado rígida que oscurezca el hebreo.
- source_word: נִטְמָא
  english_pob_choice: has defiled itself
  chosen_spanish: se ha contaminado
  alternatives_spanish:
  - está contaminado
  - se ha hecho impuro
  lexicon: HALOT
  rationale: El nifal puede expresar estado resultante y también culpa propia. 'Se ha contaminado' mantiene la idea de impureza adquirida por la infidelidad del pueblo, sin introducir más de lo que el hebreo exige.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Conservo el nombre del pueblo del pacto, manteniendo el paralelismo retórico entre 'casa de Israel', 'Efraín' e 'Israel'.
theological_decisions:
- issue: Cómo reflejar la metáfora de זְנוּת sin reducirla solo a pecado sexual literal o solo a idolatría
  english_pob_reading: Rendered as 'prostitution' in the main text, allowing Hosea's recurring marriage/unfaithfulness metaphor to remain vivid without narrowing it to either literal immorality or idolatry alone.
  chosen_spanish_reading: '''Prostitución'' en el texto principal, dejando abierta la carga de infidelidad de pacto propia de Oseas.'
  alternative_spanish_readings:
  - fornicación
  - harlotía
  - inmoralidad sexual
  rationale: La metáfora profética incluye tanto la imagen sexual como la infidelidad religiosa. 'Prostitución' es la opción moderna más fiel y no obliga a decidir prematuramente entre lo literal y lo figurado.
  doctrine_reference: Translation philosophy §3, §6
- issue: 'Cómo traducir נִטְמָא: estado pasivo o culpa resultante'
  english_pob_reading: Translated as 'has defiled itself.'
  chosen_spanish_reading: '''se ha contaminado'''
  alternative_spanish_readings:
  - está contaminado
  - se ha hecho impuro
  rationale: En contexto, la impureza no es solo una condición pasiva sino el resultado de la propia infidelidad del pueblo. El reflexivo español comunica esa implicación moral sin exceder el hebreo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto sigue el mismo juicio de la POB inglesa revisada: mantener la imagen de la casa de Israel, traducir con naturalidad la construcción elíptica de לְאֶפְרַיִם como ''hay prostitución en Efraín'', y reflejar la impureza resultante con un verbo reflexivo. No se introducen notas porque el español principal puede expresar las mismas decisiones sin abrir variantes textuales obligatorias.'
  spanish_consistency_notes:
  - Se conserva la distinción retórica entre 'casa de Israel', 'Efraín' e 'Israel'.
  - '''Cosa horrible'' mantiene el registro sobrio y el impacto moral del término hebreo.'
  - '''Prostitución'' se usa de manera consistente con el campo semántico de Oseas y con la terminología POB.'
  - '''Se ha contaminado'' evita suavizar la acusación y preserva la agencia culpable implícita en el nifal.'
