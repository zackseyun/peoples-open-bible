translation:
  language: es
  text: Y los hijos de Israel[a] partieron[b] de Ramesés a Sucot, unos seiscientos mil hombres a pie[c], sin contar a los niños[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «se pusieron en marcha». El verbo hebreo puede denotar levantar el campamento e iniciar el viaje.
    reason: lexical_alternative
  - marker: c
    text: La frase «unos seiscientos mil hombres a pie» cuenta a los hombres; los niños quedan excluidos de este número.
    reason: cultural_note
  - marker: d
    text: O «aparte de los niños pequeños». El hebreo טף se refiere a niños o pequeños dependientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: journeyed
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - viajaron
  lexicon: HALOT
  rationale: נסע en contexto de viaje puede expresar salir, partir o emprender marcha. «Partieron» comunica bien el inicio del desplazamiento sin forzar un giro demasiado literal ni perder el sentido narrativo.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo בני. «Hijos de Israel» es natural en español bíblico y mantiene la forma del original mejor que «israelitas», aunque esa sería una posible equivalencia contextual.
- source_word: מֵרַעְמְסֵס
  english_pob_choice: from Rameses
  chosen_spanish: desde Ramesés
  alternatives_spanish:
  - desde Raamsés
  - de Ramesés
  lexicon: HALOT
  rationale: El מן inicial expresa punto de salida; en español «desde» reproduce mejor ese valor que un simple «de». Se usa la transliteración común «Ramesés».
- source_word: סֻכֹּתָה
  english_pob_choice: to Succoth
  chosen_spanish: hasta Sucot
  alternatives_spanish:
  - a Sucot
  - hacia Sucot
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el destino. «Hasta Sucot» es una solución natural y precisa en español para ese valor direccional.
- source_word: כְּשֵׁשׁ מֵאוֹת אֶלֶף
  english_pob_choice: about six hundred thousand
  chosen_spanish: unos seiscientos mil
  alternatives_spanish:
  - aproximadamente seiscientos mil
  - como seiscientos mil
  lexicon: HALOT
  rationale: El prefijo כ en esta cifra indica aproximación. «Unos seiscientos mil» transmite la indeterminación de manera fluida y fiel.
- source_word: רַגְלִי
  english_pob_choice: on foot
  chosen_spanish: de a pie
  alternatives_spanish:
  - a pie
  - andando
  lexicon: HALOT
  rationale: La forma describe a los que avanzaban caminando. «De a pie» suena natural en español y conserva el matiz de desplazamiento pedestre.
- source_word: הַגְּבָרִים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - adultos
  lexicon: HALOT
  rationale: גברים destaca a los varones en contraste con los dependientes. «Hombres» mantiene ese sentido básico sin sobrerrestringirlo.
- source_word: לְבַד מִטָּף
  english_pob_choice: besides children
  chosen_spanish: sin contar a los niños
  alternatives_spanish:
  - además de los niños
  - aparte de los niños
  lexicon: HALOT
  rationale: טף se refiere a niños o pequeños dependientes. «Sin contar a los niños» expresa claramente la exclusión del total contado, manteniendo el sentido del hebreo y del audit trail inglés.
translation_notes:
  revision_awareness: 'Se ha seguido el pasaje en alta concordancia con el texto hebreo y el audit trail inglés. Se conservan las dos tensiones principales del versículo: el matiz verbal de נסע como salida/marcha y el alcance de טף como niños o dependientes pequeños, indicado en nota. No hay revisiones previas aplicadas en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Ramesés» y «Sucot» como transliteraciones consistentes con uso bíblico en español.
  - «Hijos de Israel» se conserva por fidelidad formal al hebreo, sin sustituirlo por una generalización interpretativa.
  - La cifra se expresa con aproximación («unos») para reflejar el כ hebreo.
  - «De a pie» evita una lectura militarizante de רַגְלִי que no está exigida por el contexto.
