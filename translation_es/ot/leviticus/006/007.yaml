translation:
  language: es
  text: 'Y esta es la ley de la ofrenda de cereal: los hijos de Aarón la presentarán delante de Yahvé[a], frente al altar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción para» u «ordenanza de» la ofrenda de cereal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Ahora bien, esta es
  - Y esto es
  lexicon: HALOT
  rationale: La construcción introductoria señala una nueva sección normativa. «Y esta es» conserva la conexión del hebreo con un español natural y digno.
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la regulación de
  lexicon: HALOT
  rationale: En contexto sacrificial, תּוֹרָה introduce una norma ritual. «Ley» preserva el valor formal y legislativo que el texto tiene aquí, sin perder claridad en español.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en Levítico designa la ofrenda cereal/vegetal, no una ofrenda genérica. «Ofrenda de cereal» es clara y evita la ambigüedad de «ofrenda» sola.
- source_word: הַקְרֵב אֹתָהּ
  english_pob_choice: shall present it
  chosen_spanish: la presentarán
  alternatives_spanish:
  - la acercarán
  - la ofrecerán
  lexicon: HALOT
  rationale: El verbo קרב expresa la acción ritual de presentar o acercar la ofrenda. «La presentarán» comunica bien el acto cultual en español sin forzar una paráfrasis.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los descendientes de Aarón
  - los hijos de Aarón
  lexicon: HALOT
  rationale: «Hijos de Aarón» reproduce con fidelidad la designación sacerdotal y mantiene la terminología bíblica usual en español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: יְהוָה se vierte «Yahvé». «Delante de» refleja bien לִפְנֵי en un contexto de presentación cultual.'
- source_word: אֶל פְּנֵי הַמִּזְבֵּחַ
  english_pob_choice: in front of the altar
  chosen_spanish: frente al altar
  alternatives_spanish:
  - ante el altar
  - en la parte frontal del altar
  lexicon: HALOT
  rationale: La expresión distingue un segundo referente espacial, separado de לִפְנֵי יְהוָה. «Frente al altar» conserva esa localización concreta y no la fusiona con la frase anterior.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, en español se conserva el nombre divino como «Yahvé», evitando el reemplazo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de תּוֹרָה en legislación sacrificial
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - regulación
  rationale: Aunque תּוֹרָה puede abarcar instrucción o norma, aquí la frase funciona como encabezado prescriptivo. «Ley» preserva el tono normativo y sacrificial del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El texto base en inglés quedó sin revisiones en el último pase; la concordancia de revisión indica acuerdo alto y no se documentaron cambios posteriores. La redacción española sigue directamente el hebreo, con el audit trail inglés como apoyo para las decisiones léxicas y cultuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Ofrenda de cereal» se usa de forma consistente para מִנְחָה en contexto levítico.
  - 'La relación espacial se conserva en dos sintagmas distintos: «delante de Yahvé» y «frente al altar».'
  - El registro es formal y bíblico, pero con sintaxis española natural.
