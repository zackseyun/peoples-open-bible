revisions:
- from: Y harás el patio del tabernáculo; al lado del sur, hacia el sur, habrá cortinas[a] para el patio de lino fino torcido, de cien codos de largo para un lado.
  to: Y harás el patio del tabernáculo; para el lado del sur, hacia el sur, habrá cortinas[a] para el patio, de lino fino torcido, de cien codos de largo para un lado.
  rationale: Se ajusta 'al lado del sur' a 'para el lado del sur' para reflejar mejor la construcción hebrea y la auditoría inglesa. También se corrige la nota léxica para que ofrezca una alternativa real y útil a 'cortinas', preservando mejor el matiz funcional de קְלָעִים. Se añade una coma tras 'patio' para mejorar la lectura de la frase material-descriptiva.
