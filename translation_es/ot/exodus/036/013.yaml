translation:
  language: es
  text: E hizo cincuenta corchetes[a] de oro, y unió las cortinas una con otra con los corchetes, de modo que el tabernáculo quedó unido en uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el tabernáculo fue uno». El hebreo puede traducirse de manera más formal; «quedó unido en uno» resalta el resultado de la unión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he made
  chosen_spanish: E hizo
  alternatives_spanish:
  - Y hizo
  - Y realizó
  lexicon: HALOT
  rationale: עשה es el verbo ordinario ‘hacer’ y en este contexto de fabricación de piezas del tabernáculo el verbo español natural y fiel es ‘hacer’. 'E hizo' mantiene el enlace narrativo sin sonar pesado.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - cinquenta
  lexicon: HALOT
  rationale: Cardinal directo y sin ambigüedad; se conserva el número exacto del hebreo.
- source_word: קַרְסֵי זָהָב
  english_pob_choice: gold clasps
  chosen_spanish: broches de oro
  alternatives_spanish:
  - ganchos de oro
  - abrazaderas de oro
  - clavijas de oro
  lexicon: HALOT
  rationale: קֶרֶס en este contexto tabernacular designa un elemento de unión para las cortinas. 'Broches' comunica bien la función de sujeción y unión en español, sin imponer más forma de la que exige el texto. 'De oro' conserva el material.
- source_word: וַיְחַבֵּר
  english_pob_choice: and joined
  chosen_spanish: y unió
  alternatives_spanish:
  - y juntó
  - y conectó
  lexicon: HALOT
  rationale: חבר expresa unión física; 'unió' es la forma más natural y precisa en español para este ensamblaje.
- source_word: אֶת הַיְרִעֹת
  english_pob_choice: the curtains
  chosen_spanish: las cortinas
  alternatives_spanish:
  - los lienzos
  - los paños
  lexicon: HALOT
  rationale: יְרִיעוֹת son las piezas textiles del tabernáculo. 'Cortinas' es la equivalencia española estable y clara, acorde con el uso tradicional del pasaje y suficientemente precisa para el lector.
- source_word: אַחַת אֶל אַחַת
  english_pob_choice: to one another
  chosen_spanish: una con otra
  alternatives_spanish:
  - una a otra
  - entre sí
  lexicon: HALOT
  rationale: La repetición femenina singular expresa reciprocidad. 'Una con otra' conserva esa relación mutua de modo natural en español.
- source_word: בַּקְּרָסִים
  english_pob_choice: with the clasps
  chosen_spanish: con los broches
  alternatives_spanish:
  - por medio de los broches
  - mediante los broches
  lexicon: HALOT
  rationale: La preposición instrumental indica el medio de la unión. 'Con' reproduce bien ese valor instrumental en español.
- source_word: וַיְהִי הַמִּשְׁכָּן אֶחָד
  english_pob_choice: so that the tabernacle became one
  chosen_spanish: de modo que el tabernáculo quedó uno
  alternatives_spanish:
  - y el tabernáculo fue uno
  - de manera que el tabernáculo se hizo uno
  lexicon: HALOT
  rationale: El hebreo presenta el resultado de la unión. 'Quedó uno' comunica el estado resultante de forma natural y preserva la idea de unidad lograda; mantiene la tensión entre una lectura más literal ('fue uno') y la lectura resultativa destacada por el POB inglés ('became one').
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico para la estructura sagrada. 'Tabernáculo' es el equivalente estándar y más reconocible en español bíblico.
theological_decisions:
- issue: 'Resultado de la unión de las cortinas: unidad del tabernáculo'
  english_pob_reading: so that the tabernacle became one
  chosen_spanish_reading: de modo que el tabernáculo quedó uno
  alternative_spanish_readings:
  - y el tabernáculo fue uno
  - de modo que el tabernáculo llegó a ser uno
  rationale: No hay una afirmación doctrinal añadida; el punto es narrativo y estructural. Se conserva el matiz de resultado que el inglés POB subraya, sin borrar la posibilidad más formal del hebreo.
  doctrine_reference: None
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y ninguna revisión aplicada al inglés base; por eso se mantiene la línea de traducción del POB inglés, con ajuste natural de resultado en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «tabernáculo» para מִשְׁכָּן conforme al estándar del proyecto y del contexto del Éxodo.
  - Se traduce el valor instrumental de בְּ/בַּקְּרָסִים con «con», evitando una calca menos natural.
  - «Broches» se prefiere sobre «ganchos» porque destaca la función de unión sin fijar indebidamente la forma del objeto.
