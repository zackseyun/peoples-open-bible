translation:
  language: es
  text: Sheva era secretario[a], y Zadok y Abiatar eran sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escriba». El término hebreo puede denotar un escriba real o un secretario; aquí se usa «secretario» para aclarar el cargo administrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שיא
  english_pob_choice: Sheva
  chosen_spanish: Sheva
  alternatives_spanish:
  - Seba
  - Shéva
  lexicon: N/A (nombre propio)
  rationale: El hebreo consonántico se representa mejor como nombre propio transliterado. Mantengo 'Sheva' para seguir de cerca la forma del texto base y la decisión auditada en inglés; 'Seba' sería una adaptación más castellana, pero aquí perdería transparencia respecto del testimonio textual.
- source_word: סֹפֵר
  english_pob_choice: secretary
  chosen_spanish: secretario
  alternatives_spanish:
  - escriba
  - recorder
  - oficial de archivos
  lexicon: HALOT
  rationale: El término designa un cargo administrativo cortesano. 'Secretario' comunica en español moderno la función gubernamental mejor que 'escriba', que en español suele sonar más genérico o escolar. 'Escriba' se conserva como alternativa válida, pero aquí 'secretario' refleja mejor el oficio oficial indicado por el contexto.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Zadoc
  alternatives_spanish:
  - Sadoc
  - Zadok
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado. 'Zadoc' es una forma natural en español y mantiene la identificación del personaje; 'Sadoc' sería una adaptación tradicional, pero no es necesaria para este registro.
- source_word: אֶבְיָתָר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiatar
  - Abiatar
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado con la forma usual en español bíblico. La vocalización española 'Abiatar' es clara y estable para el lector, sin alejarse del hebreo.
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes
  - curas
  lexicon: HALOT
  rationale: El plural hebreo nombra a los sacerdotes cultuales. 'Sacerdotes' es el equivalente normal en español bíblico y conserva la función institucional de Zadoc y Abiatar.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y
  lexicon: N/A (conjunción)
  rationale: La conjunción repetida se vierte con 'y' para conservar la estructura enumerativa del original y la claridad del listado administrativo.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y el control cruzado informa alta concordancia; por ello la propuesta española sigue de cerca la estructura y las decisiones léxicas ya aprobadas, sin introducir variantes textuales ni interpretativas adicionales.
  spanish_consistency_notes:
  - Conservo nombres propios en transliteración estable y no los traduzco.
  - Mantengo el paralelismo nominal del hebreo con dos miembros unidos por 'y'.
  - Uso 'secretario' como término funcional, con nota alternativa para 'escriba'.
  - '''Sacerdotes'' se mantiene en plural para reflejar exactamente el hebreo כֹּהֲנִים.'
