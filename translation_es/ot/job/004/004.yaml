translation:
  language: es
  text: Tus palabras han levantado[a] al que tropieza, y has fortalecido rodillas que cedían[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han sostenido» o «han hecho ponerse en pie», por «han levantado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «rodillas que se doblan»; el sentido es de rodillas que flaquean o ceden por debilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוֹשֵׁל
  english_pob_choice: the one who stumbles
  chosen_spanish: al que tropieza
  alternatives_spanish:
  - al que vacila
  - al que tambalea
  - al que desfallece
  lexicon: HALOT
  rationale: El participio describe a una persona en acto de tropezar, vacilar o tambalear. «Tropieza» conserva la imagen concreta y funciona con naturalidad en español sin volverla demasiado abstracta.
- source_word: יְקִימוּן
  english_pob_choice: have raised up
  chosen_spanish: han levantado
  alternatives_spanish:
  - han sostenido
  - han hecho poner en pie
  - han apoyado
  lexicon: HALOT
  rationale: 'El hiphil de קום tiene fuerza causativa: hacer ponerse en pie, levantar, sostener. «Han levantado» comunica bien la acción causativa y mantiene el paralelismo con la segunda cola.'
- source_word: מִלֶּיךָ
  english_pob_choice: your words
  chosen_spanish: Tus palabras
  alternatives_spanish:
  - Tu hablar
  - Tus dichos
  - Tu discurso
  lexicon: HALOT
  rationale: מִלִּים es plural de «palabra». «Tus palabras» es la equivalencia más directa y natural en español.
- source_word: בִרְכַּיִם
  english_pob_choice: knees
  chosen_spanish: rodillas
  alternatives_spanish:
  - las rodillas
  - las piernas
  lexicon: HALOT
  rationale: El término corporal se mantiene literalmente porque la imagen poética es transparente y se entiende con claridad en español.
- source_word: כֹּרְעוֹת
  english_pob_choice: that were giving way
  chosen_spanish: que cedían
  alternatives_spanish:
  - que se doblaban
  - que se vencían
  - que flaqueaban
  lexicon: HALOT
  rationale: כרע sugiere doblarse, inclinarse o ceder hacia abajo. En español, «cedían» comunica la idea de rodillas que pierden firmeza, sin perder la imagen de debilitamiento.
- source_word: תְּאַמֵּץ
  english_pob_choice: you have strengthened
  chosen_spanish: has fortalecido
  alternatives_spanish:
  - has hecho fuertes
  - has dado firmeza a
  - has robustecido
  lexicon: HALOT
  rationale: El piel de אמץ significa fortalecer, hacer firme. «Has fortalecido» es una solución clara y fiel al valor causativo-fortalecedor del verbo.
translation_notes:
  revision_awareness: El cotejo más reciente indicó alta concordancia y sin cambios necesarios; se mantiene la estructura poética y la relación causal entre «levantar» y «fortalecer» con una formulación natural en español.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo semántico entre ambas mitades del versículo: levantar al que tropieza / fortalecer rodillas débiles.'
  - Se mantiene un registro sobrio y bíblico, evitando paráfrasis expansivas.
  - «Palabras» traduce directamente el plural hebreo מִלֶּיךָ.
  - La imagen corporal de las rodillas se conserva sin sustituirla por un abstracto como «ánimo» o «fuerza», porque el hebreo es concreto.
