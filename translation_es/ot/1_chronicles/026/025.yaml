translation:
  language: es
  text: 'Y sus hermanos de Eliezer: Rehabías su hijo[a], e Jesaías su hijo, y Joram su hijo, y Zicri su hijo, y Shelomit su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sus hermanos de Eliezer». La construcción hebrea probablemente introduce la rama familiar asociada con Eliezer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  english_pob_choice: And his brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus hermanos de familia
  lexicon: HALOT
  rationale: «אָח» en plural con sufijo posesivo se mantiene naturalmente como «hermanos». En contexto genealógico puede ampliarse a parientes, pero el hebreo conserva la relación fraterna y el listado funciona como línea familiar, así que «sus hermanos» es la opción más directa y fiel.
- source_word: לֶאֱלִיעֶזֶר
  english_pob_choice: belonging to Eliezer
  chosen_spanish: de Eliezer
  alternatives_spanish:
  - pertenecientes a Eliezer
  - de la rama de Eliezer
  lexicon: HALOT
  rationale: La preposición relacional ל aquí introduce una vinculación genealógica. En español, «de Eliezer» reproduce bien esa relación sin sobreexplicarla; la nota conserva la alternativa más literal y la lectura de rama familiar.
- source_word: רְחַבְיָהוּ
  english_pob_choice: Rehabiah
  chosen_spanish: Rehabías
  alternatives_spanish:
  - Rehabiahu
  lexicon: Convención onomástica hispana basada en transliteración
  rationale: Se translitera el nombre propio con una forma fluida para el español bíblico. «Rehabías» conserva la referencia al nombre hebreo sin crear una forma artificialmente técnica.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo
  lexicon: HALOT
  rationale: El marcador filial repetido en la genealogía se vierte como «su hijo» para mantener explícita la sucesión de descendencia que el hebreo repite.
- source_word: וִישַׁעְיָהוּ
  english_pob_choice: and Jeshaiah
  chosen_spanish: e Isaías
  alternatives_spanish:
  - y Jesaías
  - e Yeshayahu
  lexicon: Convención onomástica hispana basada en transliteración
  rationale: Aunque el inglés POB evita identificarlo con el profeta Isaías por claridad, en español la forma tradicional «Isaías» es la transliteración más reconocible y readable para este nombre personal, sin afirmar identidad con el profeta.
- source_word: וְיֹרָם
  english_pob_choice: and Joram
  chosen_spanish: y Joram
  alternatives_spanish:
  - y Jehoram
  lexicon: Convención onomástica hispana basada en transliteración
  rationale: Se mantiene la forma breve del nombre tal como aparece en este versículo. «Joram» respeta mejor la forma escrita que una expansión a «Jehoram».
- source_word: וְזִכְרִי
  english_pob_choice: and Zichri
  chosen_spanish: y Zicri
  alternatives_spanish:
  - y Zikri
  lexicon: Convención onomástica hispana basada en transliteración
  rationale: La transliteración se adapta al español con ortografía natural. «Zicri» transmite el nombre propio sin añadir forma interpretativa.
- source_word: וּשְׁלֹמוֹת
  english_pob_choice: and Shelomith
  chosen_spanish: y Selomit
  alternatives_spanish:
  - y Shelomit
  - y Salomit
  lexicon: Convención onomástica hispana basada en transliteración
  rationale: Se elige una forma hispanizada del nombre propio que preserve la referencia sin forzar la grafía inglesa. «Selomit» es legible en español y mantiene la identidad del nombre.
theological_decisions:
- issue: Construcción relacional de לֶאֱלִיעֶזֶר en una genealogía
  english_pob_reading: The Hebrew construction likely introduces the Eliezerite branch of the family line.
  chosen_spanish_reading: El hebreo introduce la rama familiar asociada con Eliezer.
  alternative_spanish_readings:
  - El hebreo probablemente introduce a los descendientes de Eliezer.
  - El hebreo puede entenderse como una referencia a la rama de Eliezer.
  rationale: El texto no solo enumera nombres, sino que encuadra la lista en una rama genealógica. La redacción española mantiene esa fuerza relacional sin convertirla en una explicación excesiva dentro del versículo.
  doctrine_reference: N/A — nota genealógica y textual, no doctrinal.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere cambios revisionales adicionales; la única tensión relevante es la construcción relacional de לֶאֱלִיעֶזֶר, resuelta con una traducción natural y una nota que conserva la lectura más literal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma editorial general, pero este versículo no contiene el nombre divino.
  - Se conservaron los nombres propios en formas españolas legibles y consistentes con uso bíblico habitual.
  - Se preservó la cadena genealógica mediante el repetido «su hijo», reflejando el énfasis del hebreo.
