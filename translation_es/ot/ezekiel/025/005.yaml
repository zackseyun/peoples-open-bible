translation:
  language: es
  text: Y haré de Rabá un pastizal para camellos[a], y de los amonitas[b] un lugar de reposo para los rebaños[c]; entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una morada para camellos» o «una habitación para camellos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Amón».'
    reason: lexical_alternative
  - marker: c
    text: O «un lugar donde se recuestan los rebaños».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré de
  alternatives_spanish:
  - haré
  - pondré
  - convertiré en
  lexicon: HALOT
  rationale: En esta construcción causativa con un lugar y un complemento de resultado, el sentido no es simplemente 'dar' sino 'hacer/convertir en'. 'Haré de' comunica bien esa transformación sin perder la relación verbal del hebreo.
- source_word: רַבָּה
  english_pob_choice: Rabbah
  chosen_spanish: Rabá
  alternatives_spanish:
  - Rabá de los amonitas
  lexicon: HALOT
  rationale: Es nombre propio, por lo que se translitera. Se adapta a la ortografía española con acento agudo en la última sílaba, como suele hacerse con topónimos bíblicos agudos en español.
- source_word: לִנְוֵה גְמַלִּים
  english_pob_choice: a pasture for camels
  chosen_spanish: un pastizal para camellos
  alternatives_spanish:
  - una morada para camellos
  - un lugar de habitación para camellos
  - un pasto para camellos
  lexicon: HALOT
  rationale: נוה puede ser 'habitación', 'morada' o 'pastizal' según el contexto. Aquí, por la imagen pastoril y la mención de camellos, 'pastizal' expresa naturalmente el lugar destinado a ellos sin oscurecer el matiz de desolación.
- source_word: גְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - camellos
  lexicon: HALOT
  rationale: Equivalente léxico directo del sustantivo plural hebreo.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'los hijos de Amón', en español el etnónimo 'amonitas' transmite mejor el referente. Se conserva el plural colectivo idiomático sin perder la identidad del grupo.
- source_word: לְמִרְבַּץ צֹאן
  english_pob_choice: a resting place for flocks
  chosen_spanish: un lugar de reposo para los rebaños
  alternatives_spanish:
  - un lugar donde se recuestan los rebaños
  - un aprisco para rebaños
  - un lugar de echadero para rebaños
  lexicon: HALOT
  rationale: מִרְבַּץ es un lugar donde el ganado se recuesta o descansa. 'Lugar de reposo' conserva la imagen de descanso y evita introducir una noción de corral que el hebreo no exige. 'Rebaños' comunica bien צֹאן en español.
- source_word: צֹאן
  english_pob_choice: flocks
  chosen_spanish: los rebaños
  alternatives_spanish:
  - las ovejas
  - el ganado menor
  - los rebaños de ovejas
  lexicon: HALOT
  rationale: El término abarca ganado menor en conjunto. 'Rebaños' es natural en español y mantiene el valor colectivo pastoral mejor que una especificación limitada a ovejas.
- source_word: וִידַעְתֶּם
  english_pob_choice: then you will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - entonces sabrán
  - y conocerán
  lexicon: HALOT
  rationale: El hebreo une la consecuencia con la declaración divina. En español, 'y sabrán' mantiene la secuencia resultativa de forma sobria; el contexto ya hace evidente el juicio que conduce al conocimiento de Yahvé. La alternativa 'entonces' es posible, pero no indispensable.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé''. Es la forma española establecida en este marco para preservar el nombre divino y no sustituirlo por un título.'
theological_decisions:
- issue: Nombre divino YHWH en una fórmula de reconocimiento
  english_pob_reading: then you will know that I am Yahweh
  chosen_spanish_reading: y sabrán que yo soy Yahvé
  alternative_spanish_readings:
  - entonces sabrán que yo soy Yahvé
  - y conocerán que yo soy Yahvé
  rationale: 'La frase final no solo identifica a Dios sino que expresa el motivo teológico recurrente en Ezequiel: el juicio demostrará quién es Yahvé. Se mantiene la fórmula personal ''yo soy Yahvé'' sin sustituir el nombre por un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se requirieron cambios respecto al consenso de revisión reciente; el pasaje muestra alto acuerdo y la redacción española mantiene la equivalencia óptima con el auditoría inglesa, respetando la imagen pastoril y la fórmula profética final.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se prefirió 'amonitas' como etnónimo natural en español, dejando la forma literal en nota.
  - '''Rebaños'' se usó para צֹאן por su valor colectivo y su naturalidad en la imagen pastoral.'
  - La estructura final conserva la fuerza resultativa del hebreo sin sobreexplicarla.
