revisions:
- from: Y aconteció que, cuando él mencionó el arca de Dios, Eli cayó hacia atrás del asiento, al lado de la puerta, y se le rompió la nuca, y murió, porque el hombre era viejo y pesado. Y había juzgado a Israel cuarenta años.
  to: Y aconteció que, cuando él mencionó el arca de Dios, Elí cayó hacia atrás desde el asiento, junto a la puerta[a], y se le rompió el cuello, y murió, porque el hombre era viejo y pesado[b]. Y había juzgado a Israel cuarenta años.
  rationale: Se ajustó la sintaxis locativa para que el español suene natural y refleje mejor la relación del hebreo; se añadió la nota del modismo de la puerta/portón y la nota sobre el sentido literal de 'pesado', siguiendo la auditoría inglesa; y se cambió 'nuca' por 'cuello' para una lectura más natural y amplia en español general.
