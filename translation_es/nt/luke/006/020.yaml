translation:
  language: es
  text: 'Y él, alzando los ojos hacia sus discípulos, decía: «Bienaventurados los pobres[a][b], porque de ustedes es el reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con dirección más explícita al auditorio, «Bienaventurados ustedes que son pobres». La expresión griega está en tercera persona por su forma, pero el «de ustedes» siguiente muestra que el discurso se dirige directamente a los discípulos.
    reason: lexical_alternative
  - marker: b
    text: Lucas dice «los pobres», no «los pobres en espíritu» (compárese con Mt 5:3).
    reason: cross_reference
lexical_decisions:
- source_word: ἐπάρας
  english_pob_choice: lifting up
  chosen_spanish: alzando
  alternatives_spanish:
  - levantando
  - alzando los ojos
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa y concreta. «Alzando» conserva la imagen corporal de elevar la mirada y suena natural en español bíblico actual.
- source_word: εἰς
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - para
  lexicon: BDAG
  rationale: Con «ojos» y un destinatario personal, la dirección del mirar es lo central. «Hacia» expresa esa orientación sin sonar forzado.
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: decía
  alternatives_spanish:
  - estaba diciendo
  - iba diciendo
  lexicon: BDAG
  rationale: El imperfecto marca discurso en curso. En español, «decía» transmite bien ese valor aspectual de forma idiomática.
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Benditos
  lexicon: BDAG
  rationale: En contexto de bienaventuranza, «Bienaventurados» es el término tradicional y más adecuado para una declaración de bendición, sin perder dignidad ni fuerza religiosa.
- source_word: οἱ πτωχοί
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los indigentes
  lexicon: BDAG
  rationale: Lucas dice simplemente «los pobres»; no se añade «en espíritu». Se mantiene la referencia socioeconómica básica del texto griego.
- source_word: ὑμετέρα
  english_pob_choice: yours
  chosen_spanish: de ustedes
  alternatives_spanish:
  - su
  - les pertenece
  lexicon: BDAG
  rationale: El posesivo predicativo requiere una construcción natural en español. «De ustedes es» conserva la relación posesiva y el énfasis directo del discurso.
- source_word: βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia más estable y clara en español, y preserva la formulación bíblica sin restringir indebidamente el alcance semántico.
theological_decisions:
- issue: Si πτωχοί debe entenderse como pobreza material/social o como «pobres en espíritu»
  english_pob_reading: poor
  chosen_spanish_reading: los pobres
  alternative_spanish_readings:
  - los pobres en espíritu
  rationale: El texto de Lucas no añade la expansión interpretativa de Mateo 5:3. Mantener «los pobres» preserva la tensión textual y no armoniza indebidamente los evangelios.
  doctrine_reference: Translation philosophy §1 Primacía del idioma original; §3 Preservar tensiones teológicas del texto
- issue: Si la bienaventuranza debe hacerse en tercera persona o como dirección directa al auditorio
  english_pob_reading: Blessed are the poor
  chosen_spanish_reading: Bienaventurados los pobres
  alternative_spanish_readings:
  - Bienaventurados ustedes, los pobres
  - Bienaventurados sean los pobres
  rationale: Aunque ὑμετέρα hace presente a la audiencia, la forma nominal de οἱ πτωχοί sigue siendo la más cercana en español a la estructura griega. Se mantiene la tercera persona con el posesivo posterior para reflejar ambas señales del texto.
  doctrine_reference: Translation philosophy §6 Español moderno legible sin sobreinterpretación
translation_notes:
  revision_awareness: 'Se corrigió la presentación para anclar las dos notas al texto: el marcador [a] se coloca en «los pobres» para la alternativa formal/directa, y el marcador [b] para la aclaración de que Lucas no dice «en espíritu». Esto evita notas huérfanas y conserva la distinción entre la forma gramatical tercera persona y el sentido discursivo directo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero aquí el griego tiene θεοῦ y la forma establecida en español para el sintagma es «Dios».
  - Se prefirió «Bienaventurados» por su registro bíblico y por corresponder mejor a Μακάριοι en una beatitud.
  - Se evitó armonizar con Mateo 5:3 para no borrar la particularidad lucana.
  - Se usó «de ustedes es» para reproducir con naturalidad el posesivo predicativo ὑμετέρα ἐστίν.
