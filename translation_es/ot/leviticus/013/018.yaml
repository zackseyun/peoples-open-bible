    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָשָׂר
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - la carne
  lexicon: HALOT
  rationale: בָשָׂר puede significar literalmente ‘carne’, pero en este contexto legal-diagnóstico el referente es la persona/cuerpo afectado. ‘El cuerpo’ comunica mejor el caso en español moderno sin reducirlo a tejido muscular ni perder el alcance referencial.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: Aquí כִּי introduce una cláusula de caso. ‘Cuando’ reproduce bien el valor procedimental de la ley y suena natural en español; ‘si’ queda como alternativa válida de condición.
- source_word: יִהְיֶה
  english_pob_choice: has
  chosen_spanish: tenga
  alternatives_spanish:
  - hay
  - llegue a tener
  lexicon: HALOT
  rationale: El hebreo usa ‘ser/estar’. En español, ‘tenga’ mantiene la idea de posesión o presencia de la afección sin forzar una traducción demasiado literal o torpe.
- source_word: בּוֹ
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  lexicon: HALOT
  rationale: La preposición marca localización en el cuerpo. ‘En’ es la solución más natural y fiel en español, sin necesidad de explicitar más.
- source_word: בְעֹרוֹ
  english_pob_choice: in its skin
  chosen_spanish: en su piel
  alternatives_spanish:
  - en su piel
  - en su cutis
  lexicon: HALOT
  rationale: עֹור es ‘piel/dermis’. ‘Piel’ es el equivalente directo y claro en español; ‘cutis’ sería menos general y más marcado estilísticamente.
- source_word: שְׁחִין
  english_pob_choice: a boil
  chosen_spanish: una inflamación
  alternatives_spanish:
  - un forúnculo
  - un absceso
  - una llaga inflamada
  lexicon: HALOT
  rationale: שְׁחִין designa una lesión inflamatoria, con posible valor médico amplio. Se eligió ‘inflamación’ para conservar el carácter general del término sin imponer de forma exclusiva una imagen clínica específica; las alternativas más concretas siguen siendo plausibles según contexto.
- source_word: וְנִרְפָּא
  english_pob_choice: and it heals
  chosen_spanish: y se haya sanado
  alternatives_spanish:
  - y se sana
  - y ha sanado
  - y se sana
  lexicon: HALOT
  rationale: El nifal de רפא admite sentido pasivo o resultativo. ‘Se haya sanado’ refleja bien el estado resultante y encaja con la secuencia legal; también deja abierta la lectura alternativa ‘es sanado / ha sanado’.
translation_notes:
  revision_awareness: Coincide sustancialmente con la última revisión del POB en inglés, que no requirió cambios. Se conserva la misma estructura de caso legal y la misma ambigüedad controlada entre una lesión en proceso de sanación y el estado ya sanado.
  spanish_consistency_notes:
  - Se mantiene ‘el cuerpo’ para בָשָׂר, en línea con la decisión inglesa de evitar una traducción demasiado cruda de ‘flesh’ en este contexto.
  - ‘Piel’ se usa para עֹור como equivalente natural y consistente con el habla médica/legal en español.
  - Se preserva la construcción legal condicional con ‘cuando’, paralela a la decisión inglesa.
  - Se añadió la posibilidad de lectura alternativa en nota para reflejar la ambigüedad de כִּי e יִהְיֶה sin sobrecargar el texto principal.
