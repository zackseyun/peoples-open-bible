review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el hebreo y la línea de la POB en inglés: mandato a ir al faraón por la mañana, aviso de que sale hacia el agua, instrucción de ponerse en posición para encontrarlo junto al Nilo, y llevar la vara convertida en serpiente. Sin embargo, el texto español está truncado/corrupto al final (''fue تبدیل?''), y además los marcadores de notas están invertidos respecto de sus anclajes semánticos: [a] aparece en ''por la mañana'' pero la nota trata de יְאֹר/Nilo; [b] aparece en ''Nilo'' pero la nota trata de נָחָשׁ/serpiente.'
  spanish_quality_summary: La redacción es generalmente legible y digna, pero 'te pondrás para recibirlo' suena algo menos natural y menos preciso que 'te pondrás frente a él para encontrarte con él' o 'te pararás para encontrarte con él'. Más importante, la corrupción textual final hace el versículo inaceptable en su forma actual. También debe corregirse la colocación de notas para cumplir la disciplina editorial del proyecto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. 'Nilo' para יְאֹר y 'serpiente' para נָחָשׁ concuerdan con la auditoría inglesa. 'Vara' para מַטֶּה es aceptable. No aparecen Yahvé, Mesías, δοῦλος, etc.
  issues:
  - severity: high
    issue: Texto español corrupto e incompleto al final del versículo
    rationale: La frase 'la vara que fue تبدیل?' no preserva el sentido fuente ni constituye español válido. Debe restaurarse a una formulación completa como 'la vara que fue convertida en serpiente'.
  - severity: high
    issue: Marcadores de notas al pie mal anclados
    rationale: La nota [a] explica יְאֹר/Nilo pero está colocada en 'por la mañana'; la nota [b] explica נָחָשׁ/serpiente pero está colocada en 'Nilo'. El proyecto exige que cada marcador aparezca exactamente en la palabra o frase relevante.
  - severity: medium
    issue: '''te pondrás para recibirlo'' debilita la fuerza de לִקְרָאתוֹ'
    rationale: '''Recibirlo'' puede sugerir acogida más que encuentro/confrontación. El hebreo y la POB inglesa apuntan a ''meet him''. En español, ''para encontrarte con él'' o ''para salir a su encuentro'' preserva mejor el valor semántico.'
  revised_spanish_text: Ve al faraón por la mañana. Mira, él sale al agua, y te pondrás para encontrarte con él en la orilla del Nilo[a], y tomarás en tu mano la vara que fue convertida en serpiente[b].
  revised_footnotes:
