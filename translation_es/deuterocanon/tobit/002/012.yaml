translation:
  language: es
  text: Y ella lo enviaba a los dueños[a], y ellos también le pagaban el salario, añadiendo también un cabrito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amos'. El griego dice 'señores/amos' (κυρίοις), aquí refiriéndose a aquellos para quienes ella trabajaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστελλεν
  english_pob_choice: would send
  chosen_spanish: lo enviaba
  alternatives_spanish:
  - lo mandaba
  - lo remitía
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción habitual o repetida; en español, el imperfecto 'enviaba' conserva mejor ese valor que un pretérito simple.
- source_word: τοῖς κυρίοις
  english_pob_choice: to the owners
  chosen_spanish: a los amos
  alternatives_spanish:
  - a los dueños
  - a los señores
  lexicon: BDAG
  rationale: En este contexto doméstico y laboral, κύριοι se refiere a quienes estaban a cargo de ella o para quienes trabajaba. 'Amos' refleja con mayor naturalidad la relación de dependencia que 'señores', y mantiene la posibilidad del valor de autoridad sin elevarlo a título divino.
- source_word: ἀπέδωκαν
  english_pob_choice: paid
  chosen_spanish: le pagaban
  alternatives_spanish:
  - le daban
  - le retribuían
  lexicon: BDAG
  rationale: Con τὸν μισθόν como objeto, el verbo expresa pago de salario. 'Pagaban' es la opción más precisa y natural en español.
- source_word: τὸν μισθόν
  english_pob_choice: wages
  chosen_spanish: el salario
  alternatives_spanish:
  - el pago
  - la paga
  lexicon: BDAG
  rationale: μισθός denota remuneración por trabajo. 'Salario' comunica claramente la idea de compensación laboral en español moderno.
- source_word: προσδόντες
  english_pob_choice: adding
  chosen_spanish: añadiendo además
  alternatives_spanish:
  - dando además
  - sumando además
  lexicon: BDAG
  rationale: El participio indica una acción suplementaria respecto del salario. 'Añadiendo además' conserva ese matiz de añadidura sin forzar la sintaxis.
- source_word: ἔριφον
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un chivito
  - una cría de cabra
  lexicon: LSJ
  rationale: ἔριφος designa una cabra joven. 'Cabrito' es natural y claro en español, y transmite bien la imagen de un animal joven ofrecido como extra.
theological_decisions:
- issue: Sentido de κύριοι en un contexto no teológico
  english_pob_reading: owners
  chosen_spanish_reading: amos
  alternative_spanish_readings:
  - dueños
  - señores
  rationale: No hay aquí un uso teológico de κύριος, sino una referencia a quienes dirigían la relación laboral. 'Amos' conserva la fuerza relacional y jerárquica del griego sin introducir una connotación de título sagrado.
  doctrine_reference: 'DOCTRINE.md: términos contestados para κύριος; principio de mantener el valor contextual no teológico'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan en una escena de remuneración laboral con un añadido alimentario. No se requieren revisiones textuales; la única cuestión interpretativa importante es κύριοι, cuyo sentido contextual se vierte en español con 'amos' y se deja una alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo el imperfecto narrativo ('enviaba', 'pagaban') para reflejar la acción habitual.
  - Se evitó 'Señor' para κύριοι, porque el contexto es doméstico/laboral y no honorífico-teológico.
  - '''Salario'' se eligió para μισθόν por claridad moderna, sin perder el sentido de paga laboral.'
