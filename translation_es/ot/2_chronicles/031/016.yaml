    text: Or 'those registered by genealogy among the males.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'for the matter of a day on its day,' that is, the requirement for each day.
    reason: lexical_alternative
  - marker: c
    text: Or 'in their watches' or 'by their duty-shifts.'
    reason: lexical_alternative
