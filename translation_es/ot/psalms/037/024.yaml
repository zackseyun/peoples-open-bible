translation:
  language: es
  text: Aunque caiga[a], no será derribado[b], porque Yahvé le sostiene la mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque si cae». La conjunción hebrea puede traducirse «porque», «si» o, por el contexto, con valor concesivo como «aunque».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será echado por tierra» o «será arrojado». El verbo hebreo expresa ser lanzado o derribado con fuerza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Porque
  - Si
  - Cuando
  lexicon: HALOT
  rationale: 'El valor de כִּי aquí es concesivo en el contexto: el justo puede caer, pero no quedar abatido. «Aunque» reproduce de forma natural esa concesión en español sin perder la tensión del verso.'
- source_word: יִפֹּל
  english_pob_choice: he falls
  chosen_spanish: caiga
  alternatives_spanish:
  - cae
  - pueda caer
  - tropezar
  lexicon: HALOT
  rationale: De נפל, el sentido básico es «caer». El subjuntivo «caiga» encaja bien tras la concesiva «Aunque» y preserva la posibilidad general de la acción sin especificarla como caída moral o física.
- source_word: יוּטָל
  english_pob_choice: he will not be hurled down
  chosen_spanish: no será derribado
  alternatives_spanish:
  - no será arrojado
  - no será echado por tierra
  - no caerá de cabeza
  lexicon: HALOT
  rationale: El Hophal de טול expresa ser lanzado o arrojado. «Derribado» comunica la fuerza pasiva de una caída provocada por otro y mantiene la distinción con יִפֹּל, aunque es algo menos gráfica que una versión literal como «arrojado».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en la forma adoptada por el proyecto, en lugar de sustituirlo por un título. «Yahvé» refleja directamente el Tetragrámaton.
- source_word: סוֹמֵךְ
  english_pob_choice: holds
  chosen_spanish: sostiene
  alternatives_spanish:
  - apoya
  - sujeta
  - mantiene
  lexicon: HALOT
  rationale: El participio de סמך comunica apoyo o sostén continuo. «Sostiene» es natural en español y expresa acción continua de apoyo divino sin forzar la imagen.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  - su mano
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de la mano en hebreo. En español, «sostiene su mano» mantiene la figura de Yahvé como quien apoya o retiene la mano del justo.
theological_decisions:
- issue: Alcance de la caída del justo
  english_pob_reading: The verse speaks generally of the righteous person's setbacks rather than specifically of moral apostasy.
  chosen_spanish_reading: El verso habla en general de tropiezos o contratiempos del justo, no de una apostasía moral específica.
  alternative_spanish_readings:
  - Se refiere específicamente al pecado o fracaso espiritual
  - Se refiere solo a peligro físico
  rationale: El hebreo usa un lenguaje amplio de caer y ser derribado, sin precisar el tipo de dificultad. La traducción conserva esa amplitud para no cerrar el sentido a una sola lectura doctrinal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La revisión en inglés ajustó «upholds his hand» a «holds his hand» por naturalidad idiomática; en español se optó por «sostiene su mano», que conserva la imagen y suena natural. No hubo cambios sustanciales en el sentido global tras la última revisión.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la distinción entre caer (יִפֹּל) y ser derribado (יוּטָל).
  - La concesiva «Aunque» refleja el valor contextual de כִּי sin perder la posibilidad de otras lecturas indicada en la nota.
  - «Su mano» mantiene la imagen corporal concreta del hebreo sin añadir elementos interpretativos.
