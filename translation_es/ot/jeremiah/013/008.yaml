translation:
  language: es
  text: Entonces la palabra de Yahvé vino a mí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y sucedió, la palabra de Yahvé vino a mí, diciendo.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y vino a suceder
  lexicon: HALOT
  rationale: El waw-consecutivo introduce avance narrativo. «Entonces» comunica la secuencia con naturalidad en español y evita un giro arcaizante. El verbo se completa idiomáticamente con «vino», que conserva el movimiento hacia el profeta sin añadir contenido extra.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» preserva de forma más directa el sustantivo דְבַר y la fórmula profética fija. «Mensaje» explicaría el sentido, pero sería más interpretativo que el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma establecida del proyecto en español. «Yahvé» evita la sustitución por un título y mantiene el valor del Tetragrámaton.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de manera directa como «a mí». Es la forma natural y precisa en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El infinitivo introduce la cita directa siguiente. «Diciendo» reproduce la función introductoria de manera transparente y conserva el tono bíblico sin forzar un calco rígido.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton; por eso se preserva el nombre propio en español, no una sustitución por título. «Yahvé» sigue la política del proyecto y mantiene la referencia personal y pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura de la versión inglesa auditada; no se detectan revisiones pendientes relevantes respecto del flujo narrativo ni de la fórmula profética.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma uniforme para יהוה.
  - La fórmula profética se dejó en orden natural español sin perder la cadencia del original.
  - «Diciendo» funciona como marcador de cita, equivalente al inglés auditado «saying».
