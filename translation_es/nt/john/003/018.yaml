translation:
  language: es
  text: El que cree en él no es juzgado[a]; pero el que no cree ya ha sido juzgado[b], porque no ha creído en el nombre del Hijo único de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «condenado» en ambas ocurrencias de «juzgado». El verbo griego es κρίνω, que puede significar «juzgar» o, según el contexto, «condenar».
    reason: lexical_alternative
  - marker: b
    text: O «del único Hijo de Dios»; tradicionalmente, «del Hijo unigénito de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πιστεύων
  english_pob_choice: the one who believes
  chosen_spanish: el que cree
  alternatives_spanish:
  - quien cree
  - el que está creyendo
  lexicon: BDAG
  rationale: El participio articular presente funciona de manera sustantiva y expresa una acción habitual o general. «El que cree» preserva bien ese valor sin sonar forzado en español.
- source_word: εἰς αὐτὸν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él con confianza
  - hacia él
  lexicon: BDAG
  rationale: Con πιστεύω, εἰς expresa la orientación confiada de la fe hacia una persona. En español, «cree en él» es la forma natural y fiel para ese giro.
- source_word: οὐ κρίνεται
  english_pob_choice: is not judged
  chosen_spanish: no es juzgado
  alternatives_spanish:
  - no es condenado
  lexicon: BDAG
  rationale: Se mantiene «juzgado» para reflejar más directamente κρίνω y conservar la tensión léxica que el audit trail inglés quiso preservar en la revisión final. «Condenado» explicita el resultado adverso, pero va más allá del verbo en sí.
- source_word: ὁ δὲ μὴ πιστεύων
  english_pob_choice: but the one who does not believe
  chosen_spanish: pero el que no cree
  alternatives_spanish:
  - pero quien no cree
  - pero el incrédulo
  lexicon: BDAG
  rationale: δέ marca contraste; el participio articular se vuelve naturalmente «el que no cree». «Incrédulo» sería más interpretativo y menos cercano a la estructura griega.
- source_word: ἤδη κέκριται
  english_pob_choice: has already been judged
  chosen_spanish: ya ha sido juzgado
  alternatives_spanish:
  - ya está juzgado
  - ya ha sido condenado
  lexicon: BDAG
  rationale: El perfecto indica un estado vigente resultante de una acción previa; «ya ha sido juzgado» conserva ese valor. «Ya está juzgado» también es posible, pero el auxiliar pasivo mantiene mejor la correspondencia verbal.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación anterior; «porque» es la equivalencia española más clara y directa.
- source_word: μὴ πεπίστευκεν
  english_pob_choice: he has not believed
  chosen_spanish: no ha creído
  alternatives_spanish:
  - no ha llegado a creer
  - no creyó
  lexicon: BDAG
  rationale: El perfecto enfatiza una condición persistente de incredulidad. «No ha creído» conserva ese matiz mejor que un pretérito simple.
- source_word: εἰς τὸ ὄνομα
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - en la autoridad del nombre
  lexicon: BDAG
  rationale: Se conserva la expresión joánica concreta «nombre» sin explicitarla en el texto principal. El lector puede entender implícitamente identidad y autoridad, pero el español mantiene el sustantivo del original.
- source_word: τοῦ μονογενοῦς υἱοῦ
  english_pob_choice: of the one and only Son
  chosen_spanish: del Hijo único
  alternatives_spanish:
  - del Hijo unigénito
  - del Hijo único y especial
  lexicon: BDAG
  rationale: μονογενής enfatiza unicidad. «Hijo único» comunica esa idea de modo claro y natural en español; se evita «unigénito» en el texto principal por su posible carga tradicional y menor claridad contemporánea.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: 'Genitivo posesivo directo y sin dificultad: «de Dios».'
theological_decisions:
- issue: κρίνω en ambos miembros de la frase
  english_pob_reading: Use 'judged' in both occurrences
  chosen_spanish_reading: Usar «juzgado» en ambas ocurrencias
  alternative_spanish_readings:
  - usar «condenado» en ambas ocurrencias
  rationale: La revisión inglesa decidió reflejar κρίνω de forma más directa y consistente. En español, «juzgado» preserva mejor la amplitud del verbo y evita cerrar prematuramente el sentido en «condenado», aunque el contexto sí deja ver un juicio adverso.
  doctrine_reference: Mantener la tensión léxica del original; primacía del idioma fuente sobre la tradición de traducción.
- issue: μονογενής aplicado al Hijo
  english_pob_reading: one and only / only begotten in note
  chosen_spanish_reading: Hijo único, con nota sobre «Hijo unigénito/único»
  alternative_spanish_readings:
  - Hijo unigénito
  - Hijo único y solamente
  rationale: Teológicamente conviene no perder la singularidad filial de Jesús. «Hijo único» comunica bien la idea principal; la nota preserva la lectura tradicional «unigénito» y la alternativa «único» como eco del valor léxico de μονογενής.
  doctrine_reference: Afirmación de la unicidad del Hijo; referencia nicena y continuidad histórica de la fórmula tradicional.
translation_notes:
  revision_awareness: La auditoría inglesa pasó de «condenado» a «juzgado» en ambas ocurrencias para reflejar κρίνω de manera más directa y consistente. La versión española sigue esa revisión final y conserva la alternativa «condenado» en nota para no perder la tensión semántica contextual.
  spanish_consistency_notes:
  - He mantenido «juzgado» y «juzgado[b]» de forma consistente con la decisión revisada del audit trail inglés.
  - «Hijo único» sigue la elección final de μονογενής, con nota que preserva la alternativa tradicional «Hijo unigénito».
  - El texto evita sustituir «nombre» por una glosa explicativa, conforme al criterio joánico y a la transparencia del POB.
