id: ROM.13.9
reference: Romans 13:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ γάρ· Οὐ μοιχεύσεις, Οὐ φονεύσεις, Οὐ κλέψεις, Οὐκ ἐπιθυμήσεις, καὶ εἴ τις ἑτέρα ἐντολή, ἐν ⸂τῷ λόγῳ τούτῳ⸃ ἀνακεφαλαιοῦται, ⸂ἐν τῷ⸃· Ἀγαπήσεις τὸν πλησίον σου ὡς σεαυτόν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/009.yaml
  text: 'For this: "You shall not commit adultery, you shall not murder, you shall not steal, you shall not covet," and if there is any other commandment, it is summed up in this word: "You shall love your neighbor as yourself."'
translation:
  language: ko
  text: '「간음하지 말라, 살인하지 말라[a], 도둑질하지 말라, 탐내지 말라」 하신 이 계명들, 그리고 다른 어떤 계명이 있든지, 그 모든 것이 「네 이웃을 네 자신같이 사랑하라」 하신 이 한마디 말씀[b] 안에 다 요약됩니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 동사 φονεύω는 불법적 살인을 가리키므로, 전통적인 「살인하지 말라」가 광범위한 「죽이지 말라」보다 정확하다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「이 진술 안에」. 헬라어 λόγος는 「말씀」·「진술」·「격언」 등을 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μοιχεύσεις / Οὐ φονεύσεις / Οὐ κλέψεις / Οὐκ ἐπιθυμήσεις
  english_pob_choice: You shall not commit adultery / murder / steal / covet
  chosen_korean: 간음하지 말라 / 살인하지 말라 / 도둑질하지 말라 / 탐내지 말라
  alternatives_korean:
  - 간음·살인·도둑질·탐욕을 금하는 명령
  lexicon: BDAG
  rationale: 십계명 인용은 한국 성경 전통의 정형 「~하지 말라」를 그대로 유지하여 인용성과 구약 간 본문 연결을 보존한다. 합쇼체 본문 내 직접 인용으로 처리한다.
- source_word: φονεύσεις
  english_pob_choice: you shall not murder
  chosen_korean: 살인하지 말라
  alternatives_korean:
  - 죽이지 말라
  lexicon: BDAG
  rationale: φονεύω는 불법적 살인. 더 넓은 「죽이지 말라」보다 「살인하지 말라」가 어휘적으로 정확하다.
- source_word: ἐπιθυμήσεις
  english_pob_choice: you shall not covet
  chosen_korean: 탐내지 말라
  alternatives_korean:
  - 욕망하지 말라
  lexicon: BDAG
  rationale: 십계명 문맥의 ἐπιθυμέω는 「탐내다」의 좁은 의미.
- source_word: εἴ τις ἑτέρα ἐντολή
  english_pob_choice: if there is any other commandment
  chosen_korean: 다른 어떤 계명이 있든지
  alternatives_korean:
  - 또 다른 어떤 계명이라도
  lexicon: BDAG
  rationale: τις의 미결 의미와 ἑτέρα의 「다른」을 자연스럽게 보존한다.
- source_word: ἀνακεφαλαιοῦται
  english_pob_choice: it is summed up
  chosen_korean: 요약되다
  alternatives_korean:
  - 한 머리 아래 모이다
  - 압축되다
  lexicon: BDAG
  rationale: 「하나의 머리 아래 모음」의 어원적 의미를 「요약된다」로 자연스럽게 옮긴다.
- source_word: ἐν τῷ λόγῳ τούτῳ
  english_pob_choice: in this word
  chosen_korean: 이 한마디 말씀 안에
  alternatives_korean:
  - 이 진술 안에
  - 이 말씀 안에
  lexicon: BDAG
  rationale: λόγος가 압축된 진술을 가리키므로 「한마디 말씀」으로 무게와 압축성을 함께 살린다.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_korean: 네 이웃
  alternatives_korean:
  - 네 옆 사람
  lexicon: BDAG
  rationale: 레위기 인용 문맥에서 「이웃」이 정형. 13:8의 「다른 사람」(τὸν ἕτερον)과 어휘 구분을 유지한다.
theological_decisions:
- issue: 십계명 인용 형식
  chosen_reading: 한국 성경 전통의 「~하지 말라」 직접 인용 형식
  alternative_readings:
  - 합쇼체 부드러운 명령형
  rationale: 헬라어가 칠십인역 미래 직설법 형식을 그대로 인용한다. 한국 독자에게 익숙한 십계명 정형을 유지하여 상호 본문성을 보존한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선·읽기 가능한 현대어로 신학적 무게를 보존하라'
