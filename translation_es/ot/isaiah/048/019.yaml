    rationale: La nota [a] explica alternativas para כִּמְעֹתָיו, no para 'arena'; y la nota [b] explica שְׁמוֹ, por lo que debe anclarse en 'su nombre'. Tal como está, el lector recibe información léxica incorrectamente asociada.
  revised_spanish_text: Tu descendencia habría sido como la arena, y los descendientes de tu cuerpo como sus granos[a]; su nombre[b] no habría sido cortado ni destruido de delante de mí.
