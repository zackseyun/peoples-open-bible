translation:
  language: es
  text: para guardar los senderos de la justicia, y él vigila el camino de sus fieles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fiel», «su piadoso» o «su leal». El hebreo חסידו puede referirse a alguien caracterizado por lealtad de pacto o piedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִנְצֹר
  english_pob_choice: to guard
  chosen_spanish: guardar
  alternatives_spanish:
  - proteger
  - custodiar
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad y el sentido protector de נצר. En español, "guardar" mantiene bien la idea de resguardar con naturalidad literaria, sin endurecer el verso.
- source_word: אָרְחוֹת
  english_pob_choice: the paths
  chosen_spanish: los senderos
  alternatives_spanish:
  - los caminos
  - las sendas
  lexicon: HALOT
  rationale: אָרְחוֹת es plural y alude a vías o trayectos. "Senderos" conserva el plural y suena más fluido en español bíblico que una repetición mecánica de "caminos".
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  lexicon: HALOT
  rationale: Aunque la POB inglesa opta por "justice", en este contexto sapiencial מִשְׁפָּט puede abarcar el orden correcto, lo justo y lo recto. "Derecho" permite reflejar esa dimensión normativa sin reducirla solo al ámbito abstracto de "justicia".
- source_word: וְדֶרֶךְ
  english_pob_choice: and ... the way
  chosen_spanish: y ... el camino
  alternatives_spanish:
  - y ... la senda
  - y ... la vía
  lexicon: HALOT
  rationale: דֶרֶךְ es singular y conviene mantener la variación hebrea entre plural y singular. "Camino" es la equivalencia más natural en español y preserva el paralelismo.
- source_word: חסידו
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus piadosos
  - sus leales
  lexicon: HALOT
  rationale: La forma hebrea se presenta como singular con sufijo, pero el contexto de la revisión del POB favorece una lectura colectiva. "Fieles" comunica bien la idea de lealtad/covenant loyalty sin recurrir a "santos" o a un término eclesiástico más cargado.
- source_word: יִשְׁמֹר
  english_pob_choice: he watches over
  chosen_spanish: vigila
  alternatives_spanish:
  - guarda
  - cuida
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, vigilar o vigilar atentamente. "Vigila" evita repetir "guardar" y conserva el matiz de supervisión protectora del sujeto implícito, entendido en el contexto como Dios.
theological_decisions:
- issue: Referencia del sujeto implícito de "él vigila"
  english_pob_reading: The subject is God, carried over from the preceding context.
  chosen_spanish_reading: El sujeto implícito sigue siendo Dios, por continuidad con el contexto inmediato.
  alternative_spanish_readings:
  - un sujeto impersonal
  - se vigila
  rationale: Proverbios 2:6–8 continúa la acción de Yahvé como dador de sabiduría y protector. Hacer explícita la referencia en español no es necesario en el texto, pero la traducción debe dejar claro que no se trata de un sujeto impersonal.
  doctrine_reference: Continuidad contextual de 2:6–8; lectura teológica de Yahvé como agente protector
- issue: Alcance de חסידו
  english_pob_reading: his faithful ones
  chosen_spanish_reading: sus fieles
  alternative_spanish_readings:
  - sus piadosos
  - sus fieles unos
  rationale: La revisión inglesa del POB se inclinó por un plural contextual. En español, "sus fieles" reproduce esa lectura colectiva y conserva la idea de lealtad de pacto/piedad sin importar un vocabulario eclesial posterior.
  doctrine_reference: Decisión léxica del POB sobre חָסִיד y la revisión plural del contexto
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión del POB que pasó de un singular a un plural en חסידו. También reconoce la elección inglesa de "justice" para מִשְׁפָּט, pero opta por un equivalente español que preserve mejor el matiz normativo amplio en este proverbio, sin borrar la tensión semántica. Se mantuvo la variación poética entre plural y singular en "senderos/camino" y el sujeto implícito se dejó en tercera persona singular por continuidad contextual.
  spanish_consistency_notes:
  - Se usa "Yahvé" cuando el contexto requiera nombrar explícitamente al agente divino, pero aquí el verso permite mantener el sujeto implícito.
  - '"Fieles" se usa en sentido relacional de lealtad de pacto, no como término técnico eclesiástico.'
  - '"Guardar" y "vigila" se distribuyen para evitar repetición excesiva y respetar la paridad semántica entre נצר y שׁמר.'
  - Se conserva una nota para marcar la alternativa legítima "justicia", porque el hebreo admite ambas lecturas en español según el énfasis deseado.
