review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido central del hebreo: Noemí contrasta su partida «llena» con su regreso «vacía», mantiene la agencia divina directa, y distingue adecuadamente entre el sentido forense de עָנָה בִי y la calamidad de הֵרַע לִי. Sin embargo, hay un problema importante de fidelidad al proyecto y a la legibilidad española en el nombre propio נָעֳמִי.'
  spanish_quality_summary: El español es claro y digno, pero «Naomi» en el texto principal rompe la forma española eclesial normal y contradice la propia nota alternativa interna que reconoce «Noemí». Además, la nota [a] no funciona realmente como alternativa léxica útil, sino como comentario explicativo redundante.
  glossary_alignment: Se alinea bien con «Yahvé» para יהוה, «el Todopoderoso» para שדי, y preserva la tensión teológica documentada. La principal desalineación es el uso de «Naomi» en vez de la forma española legible y establecida «Noemí».
  issues:
  - severity: medium
    issue: Uso de «Naomi» en lugar de «Noemí»
    rationale: El hebreo נָעֳמִי corresponde al nombre que en español bíblico se lee de forma estable como «Noemí». La explicación del borrador de mantener «Naomi» por seguir el audit trail inglés no justifica apartarse de la legibilidad y convención españolas; además, la fuente inglesa no impone transliteración inglesa en el texto meta.
  - severity: low
    issue: Nota [a] no aporta una alternativa real
    rationale: 'La nota dice «También: “llena”», pero esa es precisamente la lectura del texto principal. No preserva una alternativa significativa del inglés ni resuelve una ambigüedad nueva en español, por lo que conviene eliminarla.'
