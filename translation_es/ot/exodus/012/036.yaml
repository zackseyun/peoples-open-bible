translation:
  language: es
  text: Yahvé dio al pueblo favor a los ojos de los egipcios, de modo que les dieron lo que pedían[a]; y despojaron a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «les prestaron». El verbo hebreo aquí se ha entendido ya sea como prestar, ya sea como conceder lo que se pedía.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַֽיהוָה
  english_pob_choice: the LORD / Yahweh in source-aware audit context
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo nombra explícitamente a יהוה; en el proyecto español se usa 'Yahvé' como forma principal para no ocultar el nombre divino. Mantiene la referencia directa al nombre del pacto y evita la sustitución por un título genérico.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - concedió
  - otorgó
  lexicon: HALOT
  rationale: El sentido básico del verbo es 'dar'. En español, 'dio' es natural y fiel al valor verbal simple sin añadir matices no exigidos por el contexto.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  - benevolencia
  lexicon: HALOT
  rationale: Aquí חֵן expresa disposición favorable o buena voluntad. 'Favor' conserva bien ese sentido relacional y resulta transparente en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a la vista de
  - ante
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para evaluación o percepción. 'A los ojos de' mantiene el giro idiomático en un español natural y reconocible.
- source_word: וַיַּשְׁאִלוּם
  english_pob_choice: they let them have what they asked
  chosen_spanish: les dieron lo que pedían
  alternatives_spanish:
  - les concedieron lo que solicitaban
  - les permitieron pedir y recibieron
  lexicon: HALOT
  rationale: El verbo puede entenderse como una concesión a la petición, y en este contexto evita la impresión de un préstamo comercial. 'Les dieron lo que pedían' comunica con claridad la respuesta favorable de los egipcios y preserva la tensión interpretativa sin fijarla indebidamente.
- source_word: וַיְנַצְּלוּ
  english_pob_choice: they plundered
  chosen_spanish: despojaron
  alternatives_spanish:
  - saquearon
  - desvalijaron
  lexicon: HALOT
  rationale: El pi'el de נצל aquí tiene el sentido de despojar o desvestir de bienes. 'Despojaron' es fiel, sobrio y suficientemente fuerte en español; además evita un tono demasiado militar que podría estrechar el alcance del verbo.
- source_word: אֶת מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: El objeto es la entidad nacional colectiva, no solo individuos. 'Egipto' reproduce ese valor corporativo de manera natural en español.
theological_decisions:
- issue: 'La frase וַיַּשְׁאִלוּם: préstamo tradicional vs. entrega bajo petición'
  english_pob_reading: 'so that they let them have what they asked; traditional footnote: ''so that they lent to them.'''
  chosen_spanish_reading: de modo que les dieron lo que pedían
  alternative_spanish_readings:
  - de modo que les prestaron lo que pedían
  - de modo que les concedieron lo que solicitaban
  rationale: El relato subraya la intervención de Yahvé haciendo que los egipcios favorezcan a Israel, no una transacción normal de préstamo. 'Les dieron lo que pedían' evita imponer la idea de devolución obligatoria y preserva el contraste narrativo con el despojo posterior. La lectura tradicional se conserva como alternativa posible, pero no se adopta como principal porque en español puede sonar a préstamo comercial.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que ajustó la cláusula de וַיַּשְׁאִלוּם de 'let them ask' a 'let them have what they asked'. La propuesta española sigue esa dirección al evitar una formulación demasiado literal de 'pedir' como acción aislada y al centrar el resultado en lo concedido. También se respetó la nota tradicional sobre 'prestar' sin convertirla en el sentido principal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al criterio del proyecto para יהוה.
  - Se eligió 'Egipto' como colectivo nacional, en coherencia con el análisis del objeto hebreo.
  - '''Despojaron'' conserva la fuerza del verbo sin importar un matiz excesivamente técnico o militar.'
  - No se usó 'SEÑOR' como sustituto del nombre divino.
  - La nota al pie se ancla en 'a los ojos de' para preservar el idioma hebreo y ofrecer una alternativa más literal.
