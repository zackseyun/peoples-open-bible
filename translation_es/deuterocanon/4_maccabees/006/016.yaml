lexical_decisions:
- source_word: ὁ Ἐλεάζαρος
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eliezer
  lexicon: LSJ
  rationale: Es nombre propio; se translitera en español como en el audit trail inglés, sin traducirlo.
- source_word: ὥσπερ
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera
  - así como
  lexicon: LSJ
  rationale: Introduce una comparación irreal o de efecto; «como si» reproduce bien ese matiz en español natural.
- source_word: πικρότερον
  english_pob_choice: more bitterly
  chosen_spanish: más amargamente
  alternatives_spanish:
  - más cruelmente
  - más gravemente
  lexicon: LSJ
  rationale: Conserva la imagen de πικρός («amargo») en vez de suavizarla; «amargamente» mantiene la fuerza metafórica y el tono retórico.
- source_word: διὰ τῆς συμβουλίας
  english_pob_choice: by this counsel
  chosen_spanish: por este consejo
  alternatives_spanish:
  - por esta advertencia
  - a causa de este consejo
  lexicon: LSJ
  rationale: διά con genitivo puede expresar medio o causa; el contexto de la presión verbal sobre Eleazar favorece una relación instrumental/causal. «Consejo» conserva el matiz de la POB inglesa y «este» refleja el artículo contextual.
- source_word: αἰκισθείς
  english_pob_choice: having been tortured
  chosen_spanish: haber sido torturado
  alternatives_spanish:
  - haber sido maltratado
  - haber sido atormentado
  lexicon: LSJ
  rationale: El verbo denota abuso severo o tortura; en contexto martirial, «torturado» comunica la intensidad correcta.
- source_word: ἀνεβόησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - gritó
  - clamó
  lexicon: LSJ
  rationale: Indica una alocución fuerte y repentina; «exclamó» es sobrio y natural en español narrativo, sin debilitar la fuerza del verbo griego.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés concuerdan estrechamente; la única decisión relevante para el español fue representar ὥσπερ con una comparación irreal natural («como si») y διὰ τῆς συμβουλίας como relación instrumental/causal («por este consejo»), manteniendo el color metafórico de πικρότερον y la severidad de αἰκισθείς.
  spanish_consistency_notes:
  - Se preservó el nombre propio «Eleazar» por transliteración consistente.
  - Se mantuvo «consejo» para συμβουλία, alineado con la POB inglesa, pero en español puede entenderse también como «advertencia»; por eso se añadió nota alternativa.
  - «Exclamó» evita una exageración innecesaria y sigue siendo compatible con ἀνεβόησεν, que expresa una voz elevada o repentina.
