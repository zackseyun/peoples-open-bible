revisions:
- from: Él nos escogerá nuestra heredad[a], la gloria de Jacob, a quien ama[b]. Selah[c]
  to: Él escoge para nosotros nuestra heredad[a], la gloria de Jacob, a quien ama[c][b]. Selah
  rationale: Se ajusta el verbo principal al presente elegido por el POB inglés («escoge») y se mejora la naturalidad del dativo de ventaja con «para nosotros». Se conserva «heredad» por su valor de porción asignada y «la gloria de Jacob» como solución española clara para גְּאוֹן. También se corrige la correspondencia de la nota [a] para que el futuro quede como alternativa real, y se ordenan los marcadores [c][b] como en el audit trail inglés, manteniendo la nota cultural de «Selah» asociada al término relevante y la nota de lectura alternativa en la cláusula final.
