review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida el griego: conserva «Por tanto», «de su pueblo», «que su Señor esté con él», la subida a Jerusalén en Judea, «la casa del Señor de Israel» y la cláusula final sobre el Señor que habita en Jerusalén. Sin embargo, no preserva de forma consistente el cambio de número documentado en el griego y en la auditoría inglesa: el texto español puesto en línea usa singular («que edifique») e incluso contiene un error tipográfico («edific[e]»), mientras que la decisión léxica reconoce correctamente el plural griego οἰκοδομείτωσαν. También faltan las notas que la auditoría inglesa consideró significativas, especialmente la del cambio singular/plural y la divergencia con el paralelo hebreo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «edific[e]» es inaceptable como texto final. «La cual está en Judea» es comprensible aunque algo pesado; «que está en Judea» suena más natural. Conviene también usar «este» sin tilde conforme a la ortografía actual. El resto mantiene buen registro bíblico y legibilidad eclesial.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: κύριος → «Señor», Ἰερουσαλήμ → «Jerusalén», Ἰουδαία → «Judea», οἶκος → «casa». No aparece el nombre divino hebreo, así que no aplica «Yahvé». La elección «Señor de Israel» respeta la forma griega no armonizada. El punto a corregir es de forma/sintaxis más que de glosario: debe reflejarse el plural de οἰκοδομείτωσαν con una nota explicativa, tal como en la auditoría inglesa.'
  issues:
  - severity: high
    issue: El texto español no preserva el cambio de número del griego en οἰκοδομείτωσαν.
    rationale: 'La fuente y la nota inglesa destacan un cambio deliberadamente conservado: singular al inicio y plural en el mandato de construir. El borrador usa singular en el texto corrido («que edifique») pese a que sus propias decisiones léxicas dicen «que edifiquen». Esto borra una característica textual importante.'
  - severity: high
    issue: Error tipográfico/editorial en «edific[e]».
    rationale: Los corchetes dentro de la palabra muestran que el texto no está listo para publicación y generan ambigüedad gramatical.
  - severity: medium
    issue: Faltan notas necesarias para transparentar decisiones textuales relevantes.
    rationale: La auditoría inglesa incluye como mínimo la nota sobre el cambio singular/plural y la diferencia notable con el paralelo hebreo; ambas siguen siendo pertinentes en español. Sin ellas, se pierde trazabilidad del razonamiento textual.
  - severity: low
    issue: «la cual está en Judea» suena más pesado de lo necesario.
    rationale: «que está en Judea» comunica el mismo contenido con español más natural y moderno sin sacrificar fidelidad.
