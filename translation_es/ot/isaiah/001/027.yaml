translation:
  language: es
  text: Sion será redimida por justicia[a], y los que regresan a ella[b] por rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por juicio»; el hebreo מִשְׁפָּט puede significar «justicia» o «juicio», y aquí señala el medio por el cual Sion es redimida.
    reason: alternative_reading
  - marker: b
    text: O, «sus retornantes» o «sus retornados». El participio hebreo de שוב puede referirse a quienes regresan, y también puede evocar un retorno espiritual.
    reason: alternative_reading
lexical_decisions:
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  lexicon: HALOT
  rationale: Nombre propio geográfico y teológico que se translitera en español como «Sion»; mantiene la referencia bíblica sin traducir el nombre.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: by justice
  chosen_spanish: por justicia
  alternatives_spanish:
  - con justicia
  - mediante justicia
  - por juicio
  lexicon: HALOT
  rationale: La preposición ב puede indicar medio o instrumento. «Por justicia» conserva ese valor causal/instrumental y evita desplazar el sentido hacia un mero acto de juicio. «Justicia» mantiene la fuerza legal-ética del término.
- source_word: תִּפָּדֶה
  english_pob_choice: will be redeemed
  chosen_spanish: será redimida
  alternatives_spanish:
  - será rescatada
  - será librada
  - será rescatada mediante precio
  lexicon: HALOT
  rationale: El nifal de פדה expresa ser redimido o rescatado. «Será redimida» conserva la resonancia covenantal y teológica, y es natural en español bíblico contemporáneo.
- source_word: וְשָׁבֶיהָ
  english_pob_choice: her returnees
  chosen_spanish: sus retornos
  alternatives_spanish:
  - sus que vuelven
  - sus retornantes
  - sus arrepentidos
  lexicon: HALOT
  rationale: El participio de שוב con sufijo femenino puede entenderse literalmente como «los que vuelven/retornan»; en español, «sus retornos» reproduce de forma concisa la idea de personas en retorno sin añadir explícitamente arrepentimiento, que el hebreo también puede sugerir pero no obliga aquí.
- source_word: בִּצְדָקָה
  english_pob_choice: by righteousness
  chosen_spanish: por rectitud
  alternatives_spanish:
  - por justicia
  - con rectitud
  - mediante rectitud
  lexicon: HALOT
  rationale: צְדָקָה puede ser «justicia» o «rectitud». Se eligió «rectitud» para distinguirlo de מִשְׁפָּט, que ya se tradujo con «justicia», y así preservar la pareja léxica del hebreo sin aplanarla.
theological_decisions:
- issue: Sentido de וְשָׁבֶיהָ
  english_pob_reading: her returnees
  chosen_spanish_reading: sus retornos
  alternative_spanish_readings:
  - sus arrepentidos
  - los que vuelven a ella
  rationale: El contexto de Isaías 1 está marcado por llamado al retorno y a la restauración tras juicio. Sin embargo, el hebreo permite una lectura más literal de personas que regresan, sin forzar la idea de arrepentimiento explícito en la línea principal. Por eso la traducción principal mantiene la ambigüedad controlada con una forma breve y publicable, mientras la nota preserva la alternativa más literal.
  doctrine_reference: 'Principio de la POB: preservar tensiones semánticas relevantes y no resolver por anticipado una ambigüedad del original'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB en inglés, que prefirió «returnees» frente a «repentant ones» para acercarse más al hebreo y evitar expansión interpretativa. En español, opté por una forma igualmente literal y breve («sus retornos») y preservé la alternativa más explícita en nota, sin introducir «arrepentidos» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Sion» como transliteración estándar del nombre propio.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - Se distinguieron «justicia» y «rectitud» para reflejar la pareja מִשְׁפָּט / צְדָקָה.
  - La nota de la segunda cola conserva la ambigüedad del participio hebreo entre retorno literal y resonancia espiritual.
