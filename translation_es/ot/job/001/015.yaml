  to: Y Saba[a] cayó sobre ellos y se los llevó; y a los jóvenes[c] los mataron al filo de la espada[b]; y solo yo he escapado para decírtelo.
  rationale: 'La revisión conserva las decisiones léxicas centrales del POB auditado, pero corrige pequeños desajustes de naturalidad y precisión semántica: se ancla la nota al nombre propio «Saba», se refuerza el resultado letal de הִכּוּ en contexto con «los mataron», y se reemplaza el más interpretativo «darte la noticia» por el más directo «decírtelo», más cercano a לְהַגִּיד לָךְ.'
