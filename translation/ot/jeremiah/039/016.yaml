id: JER.39.16
reference: Jeremiah 39:16
source:
  edition: WLC
  text: הָל֣וֹךְ וְ/אָמַרְתָּ֡ לְ/עֶבֶד מֶ֨לֶךְ הַ/כּוּשִׁ֜י לֵ/אמֹ֗ר כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִי֩ מבי אֶת דְּבָרַ֜/י אֶל הָ/עִ֥יר הַ/זֹּ֛את לְ/רָעָ֖ה וְ/לֹ֣א לְ/טוֹבָ֑ה וְ/הָי֥וּ לְ/פָנֶ֖י/ךָ בַּ/יּ֥וֹם הַ/הֽוּא־־־־׃
translation:
  text: 'Go and say to Ebed-melech the Cushite[a], ‘Thus says Yahweh of hosts, the God of Israel: Behold, I am bringing my words against this city for harm and not for good[b], and they will come to pass before you on that day.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ethiopian.' The Hebrew says 'the Cushite.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for disaster and not for good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָל֣וֹךְ וְאָמַרְתָּ
  chosen: Go and say
  alternatives:
  - Go, and you shall say
  - Go and speak
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies or reinforces the command. In idiomatic English, 'Go and say' best captures the directive force without awkward literalism.
- source_word: לְעֶבֶד מֶלֶךְ
  chosen: to Ebed-melech
  alternatives:
  - to Ebed-Melech
  lexicon: HALOT
  rationale: This is a proper name, not a common noun phrase here. Per translation philosophy, names are transliterated rather than translated.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  lexicon: HALOT
  rationale: '''Cushite'' is the more direct rendering of the ethnonym and avoids importing later geographic assumptions. ''Ethiopian'' is a traditional but less precise equivalent.'
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' is both accurate and natural in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'of hosts' preserves the established sense of heavenly and earthly armies under God's command. 'Of armies' is possible but narrower and less idiomatic in this title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's God.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction marks solemn immediacy. 'Behold' preserves the prophetic weight; though slightly elevated, it remains understandable here.
- source_word: מבי (מֵבִיא)
  chosen: bringing
  alternatives:
  - about to bring
  - causing to come
  lexicon: HALOT
  rationale: The participial form conveys imminent or certain action. 'I am bringing' reflects the aspect well in context.
- source_word: אֶת־דְּבָרַי
  chosen: my words
  alternatives:
  - my word
  - what I have spoken
  lexicon: HALOT
  rationale: Plural is explicit in Hebrew. Here it refers to the announced judgments, so 'my words' is retained rather than smoothing to singular.
- source_word: אֶל הָעִיר הַזֹּאת
  chosen: against this city
  alternatives:
  - upon this city
  - to this city
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with words of judgment in this context English 'against this city' best conveys hostile direction and matches the following phrase 'for harm and not for good.'
- source_word: לְרָעָה וְלֹא לְטוֹבָה
  chosen: for harm and not for good
  alternatives:
  - for disaster and not for welfare
  - for evil and not for good
  lexicon: HALOT
  rationale: רָעָה in judgment contexts often denotes calamity/disaster rather than moral evil. 'Harm' is clear modern English and preserves the contrast with 'good' without overinterpreting.
- source_word: וְהָיוּ לְפָנֶיךָ
  chosen: they will come to pass before you
  alternatives:
  - they will be before you
  - they will happen in your presence
  lexicon: HALOT
  rationale: Literally 'they will be before you,' but in context the sense is that the announced words/events will occur in his sight. 'Come to pass before you' communicates this clearly while staying close to the Hebrew idea.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression; 'on that day' is natural modern English.
