translation:
  language: es
  text: 'Y dijo a las criadas[a]: «Tráiganme aceite y ungüentos, y cierren las puertas del jardín, para que me bañe».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirvientas jóvenes» o «doncellas»; el término griego puede abarcar muchachas o jóvenes asistentes femeninas, y el contexto favorece a las empleadas domésticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: κορασίοις
  english_pob_choice: servant girls
  chosen_spanish: sirvientas
  alternatives_spanish:
  - chicas de servicio
  - jóvenes sirvientas
  - doncellas
  lexicon: LSJ
  rationale: El griego puede significar muchachas o jóvenes asistentes femeninas. En este contexto narrativo, se trata de ayudantes domésticas bajo su autoridad; «sirvientas» conserva la función servicial sin perder el matiz femenino.
- source_word: Ἐνέγκατε δή μοι
  english_pob_choice: Bring me
  chosen_spanish: Traedme
  alternatives_spanish:
  - Llevadme
  - Traed para mí
  - Acercaos con
  lexicon: LSJ
  rationale: El imperativo plural exige una orden directa. «Traedme» es natural en español y refleja bien la petición inmediata del griego sin añadir demasiado énfasis ni suavizarla.
- source_word: ἔλαιον
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: LSJ
  rationale: El griego dice simplemente «aceite». En español, «aceite» es la equivalencia directa y evita especificar «de oliva», que no está explícito en el texto.
- source_word: σμήγματα
  english_pob_choice: ointments
  chosen_spanish: ungüentos
  alternatives_spanish:
  - pomadas
  - cosméticos
  - perfumes
  lexicon: LSJ
  rationale: σμήγματα se refiere a sustancias para untar o frotar el cuerpo, especialmente en el baño. «Ungüentos» conserva esa amplitud mejor que un término más estrecho como «perfumes» o más técnico como «cosméticos».
- source_word: θύρας τοῦ παραδείσου
  english_pob_choice: the doors of the garden
  chosen_spanish: las puertas del jardín
  alternatives_spanish:
  - las puertas del huerto
  - las compuertas del jardín
  - las puertas del parque
  lexicon: LSJ
  rationale: παράδεισος en griego helenístico suele designar un jardín o parque cerrado. «Jardín» es la forma más clara en español; «puertas» sigue de cerca θύρας sin convertirlo en «portones» o «rejas».
- source_word: κλείσατε
  english_pob_choice: shut
  chosen_spanish: cerrad
  alternatives_spanish:
  - cerrad con llave
  - tapad
  - clausurad
  lexicon: LSJ
  rationale: El verbo significa cerrar o echar. «Cerrad» es natural y fiel; «con llave» añadiría un detalle no presente en el griego.
- source_word: ὅπως λούσωμαι
  english_pob_choice: so that I may bathe
  chosen_spanish: para que me bañe
  alternatives_spanish:
  - para lavarme
  - a fin de bañarme
  - para que me lave
  lexicon: LSJ
  rationale: El medio de λούω aquí indica bañarse uno mismo. «Bañe» preserva el sentido corporal específico mejor que «lave», que en español puede sonar más general.
translation_notes:
  revision_awareness: La versión inglesa auditada usa una equivalencia óptima estable y no reporta revisiones textuales; el griego coincide con la lectura recibida y no requiere ajuste de contenido.
  spanish_consistency_notes:
  - Se mantuvo «aceite» sin especificar «de oliva», porque el griego solo dice ἔλαιον.
  - Se eligió «ungüentos» para σμήγματα por ser más amplio y natural que «perfumes» o «cosméticos».
  - Se tradujo παράδεισος como «jardín», no como «paraíso», porque aquí describe un espacio cerrado doméstico, no el sentido escatológico posterior.
  - Se preservó el matiz de una orden plural directa con «Traedme» y «cerrad».
  - Se usó «bañe» para reflejar la acción de bañarse, no solo lavarse de forma genérica.
