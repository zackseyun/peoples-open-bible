translation:
  language: es
  text: Y ahora[a], amo y señor, si en verdad hay una falta en este pueblo y están pecando contra su Dios, y si averiguamos que este tropiezo está entre ellos, subiremos y haremos guerra contra ellos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «error» o «pecado por ignorancia» para ἀγνόημα, destacando la posible falta de conocimiento en la falta cometida.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα κύριε
  english_pob_choice: master lord
  chosen_spanish: señor soberano
  alternatives_spanish:
  - señor
  - soberano señor
  - amo y señor
  lexicon: LSJ
  rationale: La expresión griega duplica el tratamiento con δέσποτα y κύριε. En español, «señor soberano» conserva el doble matiz de autoridad y no introduce la forma litúrgica «Señor» para una dirección humana.
- source_word: ἀγνόημα
  english_pob_choice: offense
  chosen_spanish: falta
  alternatives_spanish:
  - error
  - ofensa
  - pecado por ignorancia
  lexicon: LSJ
  rationale: ἀγνόημα puede implicar error o falta con matiz de ignorancia. «Falta» mantiene la amplitud semántica sin fijar más de lo que el contexto militar-político exige.
- source_word: ἁμαρτάνουσιν εἰς τὸν θεὸν αὐτῶν
  english_pob_choice: they are sinning against their God
  chosen_spanish: están pecando contra su Dios
  alternatives_spanish:
  - pecan contra su Dios
  - están ofendiendo a su Dios
  lexicon: LSJ
  rationale: El presente griego sugiere acción en curso; «están pecando» preserva ese aspecto. «Contra su Dios» reproduce el valor direccional de εἰς con ἁμαρτάνω.
- source_word: ἐπισκεψόμεθα
  english_pob_choice: we ascertain
  chosen_spanish: averiguamos
  alternatives_spanish:
  - inspeccionamos
  - examinamos
  - descubrimos
  lexicon: LSJ
  rationale: Aquí el verbo tiene el sentido de investigar o determinar. «Averiguamos» comunica búsqueda de información de modo natural en español y mantiene la lógica condicional.
- source_word: σκάνδαλον
  english_pob_choice: stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - ocasión de caída
  - escándalo
  lexicon: LSJ
  rationale: El término conserva la metáfora de obstáculo que lleva a caer. «Tropiezo» es breve y claro en español; evita el falso amigo «escándalo».
- source_word: ἀναβησόμεθα
  english_pob_choice: we will go up
  chosen_spanish: subiremos
  alternatives_spanish:
  - marcharemos arriba
  - iremos contra
  lexicon: LSJ
  rationale: El verbo significa literalmente «subir». «Subiremos» conserva la forma y puede implicar ascenso militar sin añadir paráfrasis.
- source_word: ἐκπολεμήσομεν
  english_pob_choice: make war against
  chosen_spanish: guerrearemos contra
  alternatives_spanish:
  - haremos guerra contra
  - combatiremos contra
  - lucharemos contra
  lexicon: LSJ
  rationale: El compuesto expresa acción bélica organizada. «Guerrearemos contra» reproduce la fuerza militar con estilo bíblico natural en español.
theological_decisions:
- issue: 'Doble tratamiento dirigido a Holofernes: δέσποτα κύριε'
  english_pob_reading: master lord
  chosen_spanish_reading: señor soberano
  alternative_spanish_readings:
  - señor
  - soberano señor
  rationale: Como el interlocutor es Holofernes y no Dios, no conviene usar «Señor» con valor divino. La traducción conserva la reverencia retórica y la duplicación del original.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce según contexto; títulos humanos no deben confundirse con el nombre divino'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto español junto al término afectado. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός sin mayúsculas devocionales añadidas.
  - Se preservó el valor militar de ἀναβησόμεθα y ἐκπολεμήσομεν con un registro bíblico claro.
  - No se usó «SEÑOR» como máscara para κύριος porque aquí el destinatario es un hombre.
  - La puntuación y el orden siguen de cerca la sintaxis griega sin calco rígido.
