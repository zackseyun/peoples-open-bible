lexical_decisions:
- source_word: וְ/אַרְפַּכְשַׁד
  english_pob_choice: And Arpachshad
  chosen_spanish: Y Arpacsad
  alternatives_spanish:
  - Ahora Arpacsad
  - Arpacsad
  lexicon: HALOT
  rationale: Se conserva la conjunción para mantener la secuencia genealógica. El nombre propio se translitera según el hebreo, con adaptación ortográfica natural al español como Arpacsad.
- source_word: חַי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió hasta
  lexicon: HALOT
  rationale: En fórmulas genealógicas, el verbo expresa la duración de vida antes de la paternidad. 'Vivió' es el equivalente natural y preciso en español.
- source_word: חָמֵשׁ וּ/שְׁלֹשִׁים שָׁנָה
  english_pob_choice: thirty-five years
  chosen_spanish: treinta y cinco años
  alternatives_spanish:
  - cinco y treinta años
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'cinco y treinta años', pero en español moderno la forma idiomática y clara es 'treinta y cinco años', sin alterar el sentido.
- source_word: וַ/יּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, el verbo indica paternidad generativa. 'Engendró' conserva mejor la fuerza genealógica que opciones más débiles como 'tuvo'.
- source_word: שָׁלַח
  english_pob_choice: Shelah
  chosen_spanish: Sela
  alternatives_spanish:
  - Salah
  - Shelah
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional ligada a la tradición bíblica latina y ampliamente reconocible en español, sin perder la referencia al nombre hebreo. Dado que la fuente inglesa POB señala la variante 'Salah', se conserva en nota como alternativa textual/tradicional.
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente del inglés POB: no hay cambios aplicados en el pasaje base y la concordancia general es alta.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia genealógica con la conjunción inicial 'Y'.
  - Se prefirió 'vivió' para reflejar la fórmula de edad, y 'engendró' para la relación genealógica directa.
  - Se usó una forma española reconocible para el nombre propio ('Sela'), dejando constancia de la variante 'Salah' en nota.
  - El registro es sobrio y bíblico, evitando calcos innecesarios del inglés.
