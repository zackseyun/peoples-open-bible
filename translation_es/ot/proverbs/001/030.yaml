    reason: alternative_reading
  - marker: b
    text: O «toda mi corrección» o «todo mi reproche».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto principal porque es fiel y natural. Solo se corrige el aparato crítico para alinearlo con la evidencia fuente y la auditoría inglesa: la nota de alternativa volitiva se ancla a «No quisieron», y la nota léxica del segundo hemistiquio se añade a «reprensión».'
