  source_alignment_summary: 'El borrador refleja bien la estructura causal y conserva la metáfora sexual de זנה, además de mantener ''ídolos'' con nota para גִּלּוּלִים. Sin embargo, ''contra ti'' para לָךְ sobreinterpreta la preposición, ya que el expediente inglés y el hebreo favorecen ''a ti''. También el anclaje de la nota [a] está mal colocado: la nota trata de ''ídolos'', no de ''contra ti''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'se hacen contra ti' suena menos natural que 'se te hacen' o 'se hacen a ti', y 'por tus prostituciones' resulta algo torpe en plural. Una formulación más natural y fiel sería 'Estas cosas se te hacen por tu prostitución tras las naciones, porque te contaminaste con sus ídolos[a].'
  glossary_alignment: No hay términos del glosario principal en disputa aquí. La decisión 'ídolos' concuerda con el razonamiento documentado. La metáfora sexual debe conservarse; 'prostitución' funciona mejor en singular como en el POB inglés. La excepción necesaria es corregir לָךְ a 'te/se te' en vez de 'contra ti'.
  issues:
