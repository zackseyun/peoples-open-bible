base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/019.yaml
  text: And I said[a], ‘How I would set you among the children and give you a desirable land, a beautiful inheritance of the hosts of nations.’ And I said, ‘You will call me[b], “My Father,” and you will not turn away from following me.’
  footnotes:
  - marker: a
    text: Or, more broadly, 'among the children'; Hebrew literally 'among the sons.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase here is difficult; it may mean 'the most splendid heritage of the nations' or 'a glorious inheritance among the nations.'
    reason: alternative_reading
