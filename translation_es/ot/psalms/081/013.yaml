translation:
  language: es
  text: Así los entregué[a] a la obstinación[b] de su corazón; anduvieron en sus propios consejos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los entregué», con un pronombre singular en la forma verbal que trata a Israel como pueblo colectivo; aquí se vierte en plural por claridad natural en español.'
    reason: lexical_alternative
  - marker: b
    text: O «dureza» o «terquedad» de su corazón.
    reason: lexical_alternative
  - marker: c
    text: O «según sus propios planes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲשַׁלְּחֵהוּ
  english_pob_choice: So I gave them over
  chosen_spanish: Así los entregué
  alternatives_spanish:
  - Así los dejé
  - Así los abandoné
  - Así los entregué en manos de
  lexicon: HALOT
  rationale: El hebreo expresa una acción divina de “entregar/soltar” con sentido judicial, no un simple envío. «Entregué» conserva esa fuerza de juicio y funciona bien en español bíblico moderno. Se usa el plural «los» porque el referente es Israel como pueblo colectivo, aunque el sufijo hebreo sea singular en la forma.
- source_word: בִּשְׁרִירוּת
  english_pob_choice: to the stubbornness
  chosen_spanish: a la obstinación
  alternatives_spanish:
  - a la dureza
  - a la terquedad
  - a la autosuficiencia obstinada
  lexicon: HALOT
  rationale: שְׁרִירוּת denota obstinación, dureza de voluntad o terquedad interior. «Obstinación» comunica bien esa resistencia moral sin exagerar ni suavizar el término.
- source_word: לִבָּם
  english_pob_choice: of their heart
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de su corazón colectivo
  - de sus corazones
  lexicon: HALOT
  rationale: Aunque el hebreo usa corazón singular con sufijo plural, en español «de su corazón» suena natural y respeta la idea de una disposición interior colectiva. Se evita pluralizar artificialmente el sustantivo.
- source_word: יֵלְכוּ
  english_pob_choice: they walked
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - iban
  - andaban
  lexicon: HALOT
  rationale: En contextos éticos, הלך puede expresar conducta o manera de proceder. «Anduvieron» conserva el movimiento figurado y la fuerza conductual del hebreo, con un tono bíblico claro en español.
- source_word: בְּמוֹעֲצוֹתֵיהֶם
  english_pob_choice: in their own counsels
  chosen_spanish: en sus propios consejos
  alternatives_spanish:
  - según sus propios planes
  - en sus propias decisiones
  - según sus propias deliberaciones
  lexicon: HALOT
  rationale: מוֹעֵצוֹת puede significar consejos, planes o deliberaciones. «Consejos» mantiene el paralelismo bíblico y la conexión con la guía divina frente a la auto-dirección humana. «Propios» refleja el contraste enfático del hebreo.
theological_decisions:
- issue: 'Cambio de número: sufijo singular en el primer verbo y plural en el resto'
  english_pob_reading: Retain the singular in the first clause and plural thereafter
  chosen_spanish_reading: Mantener el plural en la cláusula principal por el referente colectivo de Israel, sin forzar un singular artificial en español
  alternative_spanish_readings:
  - Así lo entregué ...
  - Así les entregué ...
  rationale: El hebreo presenta un sujeto colectivo tratado como singular en la forma verbal, pero el sentido es el pueblo de Israel. En español, el plural («los») comunica mejor el referente colectivo y conserva la naturalidad del texto sin borrar la referencia comunitaria.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza judicial del acto divino
  english_pob_reading: give over rather than a more neutral send away
  chosen_spanish_reading: «entregué» en vez de un verbo neutral como «envié» o «despedí»
  alternative_spanish_readings:
  - los envié
  - los dejé ir
  - los aparté
  rationale: 'El contexto es de juicio de pacto: Dios abandona al pueblo a su propia obstinación. «Entregué» preserva esa carga judicial y evita suavizar el sentido del hebreo.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto inglés revisó «him» por «them» para concordar con los rasgos plurales del hebreo, manteniendo la lectura colectiva de Israel. El español refleja ese ajuste con «los», y conserva la secuencia de juicio divino + conducta autónoma del pueblo.
  spanish_consistency_notes:
  - Se mantiene «corazón» en singular por fidelidad al hebreo idiomático, aunque el referente sea colectivo.
  - «Consejos» conserva el paralelismo con lenguaje bíblico y evita reducir el término solo a «planes».
  - No se usa «SEÑOR» como sustituto de Yahvé porque este versículo no contiene el nombre divino explícito; el sujeto divino queda implícito por la construcción verbal en español.
