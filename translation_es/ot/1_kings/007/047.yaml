translation:
  language: es
  text: Y Salomón dejó todos los utensilios sin pesar[a], porque eran muchísimos; el peso del bronce no se determinó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Salomón dejó todos los utensilios porque eran muchísimos; el peso del bronce no se investigó ni se averiguó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנַּח
  english_pob_choice: left ... unweighed
  chosen_spanish: dejó ... sin pesar
  alternatives_spanish:
  - los puso aparte
  - los dejó
  - los dejó sin cuantificar por peso
  lexicon: HALOT; uso contextual de נוח/ינח
  rationale: El verbo en este contexto expresa que Salomón no procedió a pesar los objetos. En español, 'dejó ... sin pesar' comunica de forma natural la idea de que quedaron sin ese proceso, sin añadir una interpretación ajena al pasaje.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los vasos
  - todos los artículos
  - todos los implementos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos/utensilios. En un contexto de mobiliario y objetos del templo, 'utensilios' conserva amplitud y suena claro en español; 'vasos' podría ser demasiado restrictivo.
- source_word: מֵרֹב מְאֹד מְאֹד
  english_pob_choice: because they were exceedingly many
  chosen_spanish: porque eran en extremo muchos
  alternatives_spanish:
  - porque eran muchísimos
  - por la gran abundancia
  - porque eran muy, muy רבים
  lexicon: HALOT
  rationale: 'La preposición con רֹב indica la causa: por la gran cantidad. La repetición intensiva de מְאֹד queda bien reflejada con ''en extremo'', que preserva el énfasis sin volver el español pesado.'
- source_word: לֹא נֶחְקַר
  english_pob_choice: was not determined
  chosen_spanish: no se determinó
  alternatives_spanish:
  - no se investigó
  - no se averiguó
  - no se calculó
  lexicon: HALOT
  rationale: El nifal de חקר aquí expresa que no se llegó a establecer el dato. En relación con el peso, 'no se determinó' comunica mejor la ausencia de un cálculo final que 'no se investigó'.
- source_word: מִשְׁקַל
  english_pob_choice: the weight
  chosen_spanish: el peso
  alternatives_spanish:
  - la medida por peso
  - la cantidad en peso
  - el peso total
  lexicon: HALOT
  rationale: El sustantivo denota peso o cantidad medida por peso. 'El peso' es la correspondencia más directa y natural en español.
- source_word: הַנְּחֹשֶׁת
  english_pob_choice: the bronze
  chosen_spanish: el bronce
  alternatives_spanish:
  - el cobre
  - la aleación de bronce
  lexicon: HALOT; contexto del templo
  rationale: En el contexto del templo, נְחֹשֶׁת se entiende convencionalmente como bronce. 'Bronce' mantiene fidelidad al uso material del pasaje y coincide con la decisión auditada en inglés.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta versión mantiene la lectura auditada y conserva la ambigüedad lexical principal de לֹא נֶחְקַר mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada cuando el texto lo requiera; aquí no aparece.
  - '''Utensilios'' se usa para כֵּלִים por su amplitud semántica en contexto del templo.'
  - '''Bronce'' se conserva para נְחֹשֶׁת conforme al contexto cultual.'
  - La negación y el sentido de no culminación en 'no se determinó' preservan la idea de un peso no establecido, sin sobrerrepresentar el verbo hebreo.
