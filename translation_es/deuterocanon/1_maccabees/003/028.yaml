translation:
  language: es
  text: Y abrió su tesoro y dio paga[a] a sus fuerzas por un año; y les mandó que por un año estuvieran listos para toda necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Paga» traduce ὀψώνια aquí; el término también puede sugerir provisiones o raciones en contextos militares, pero la mención del tesoro favorece la idea de remuneración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desbloqueó
  lexicon: LSJ
  rationale: ἤνοιξεν es el aoristo de ἀνοίγω y significa simplemente ‘abrió’. En español, «abrió» es la equivalencia natural y suficiente; «desbloqueó» añade una precisión que el griego no exige.
- source_word: τὸ γαζοφυλάκιον
  english_pob_choice: treasury
  chosen_spanish: su tesorería
  alternatives_spanish:
  - su tesoro
  - su cámara de tesoros
  - su almacén
  lexicon: LSJ
  rationale: En este contexto militar-fiscal, el término designa el lugar donde se guardan fondos. «Tesorería» comunica bien la función económica sin forzar una imagen más ornamental.
- source_word: ὀψώνια
  english_pob_choice: pay
  chosen_spanish: paga
  alternatives_spanish:
  - pago
  - salario
  - raciones
  lexicon: LSJ
  rationale: El audit trail inglés favorece «pay» por el contexto militar y la apertura de la tesorería. En español, «paga» expresa naturalmente la remuneración de tropas sin limitarla a un salario moderno.
- source_word: ταῖς δυνάμεσιν αὐτοῦ
  english_pob_choice: his forces
  chosen_spanish: a sus fuerzas
  alternatives_spanish:
  - a sus tropas
  - a su ejército
  lexicon: LSJ
  rationale: El plural δυνάμεσιν es amplio y militar. «Fuerzas» conserva esa amplitud y sigue de cerca la elección inglesa, mientras que «tropas» y «ejército» estrechan un poco más el matiz.
- source_word: εἰς τὸ ἐνιαυτόν
  english_pob_choice: for a year
  chosen_spanish: por un año
  alternatives_spanish:
  - para un año
  - durante un año
  lexicon: LSJ
  rationale: La expresión idiomática indica duración o provisión para el transcurso de un año. «Por un año» es natural en español y reproduce bien la duración.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio instrucciones
  lexicon: LSJ
  rationale: El verbo implica una dirección con autoridad. «Mandó» conserva el tono imperativo y resulta más fluido en español que una forma más pesada.
- source_word: ἑτοίμους
  english_pob_choice: ready
  chosen_spanish: preparados
  alternatives_spanish:
  - listos
  - dispuestos
  lexicon: LSJ
  rationale: Aunque el inglés eligió «ready», en español militar «preparados» comunica con claridad el estado requerido sin sonar redundante junto a «estar».
- source_word: πᾶσαν χρείαν
  english_pob_choice: every need
  chosen_spanish: toda necesidad
  alternatives_spanish:
  - toda necesidad que surgiera
  - cada necesidad
  lexicon: LSJ
  rationale: χρεία significa ‘necesidad’ o ‘necesidad/requerimiento’. «Toda necesidad» mantiene la amplitud del griego y es una formulación natural en español.
translation_notes:
  revision_awareness: La redacción sigue el sentido del griego de Swete con concordancia alta en el audit trail inglés. Se preservó la relación entre la apertura de la tesorería y la entrega de ὀψώνια, manteniendo la decisión revisada de «pay» en inglés como «paga» en español. También se conservó la repetición temporal de εἰς τὸ ἐνιαυτόν como dos miembros distintos del versículo.
  spanish_consistency_notes:
  - Se mantiene «tesorería» para γαζοφυλάκιον en un marco militar-fiscal.
  - Se traduce ὀψώνια con un término de remuneración general («paga») y no con «raciones», porque el contexto de la tesorería inclina el sentido hacia pago.
  - «Fuerzas» conserva el plural militar de δυνάμεσιν y evita estrechar innecesariamente el referente.
  - La repetición de «por un año» refleja la estructura del griego y evita suavizar el paralelismo final.
