translation:
  language: es
  text: Y mientras entraba a las ciudades de Ptolemaida[a], apostó fuerzas como guarnición en cada ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego, literalmente, «a las ciudades Ptolemaida». La frase está sintácticamente comprimida; aquí se entiende como las ciudades pertenecientes a Ptolomeo o bajo control ptolemaico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And as
  chosen_spanish: Y mientras
  alternatives_spanish:
  - Y cuando
  - Ahora bien, mientras
  lexicon: LSJ
  rationale: La construcción introduce una transición temporal y simultánea; «Y mientras» conserva el valor de contemporaneidad de ὡς y el enlace narrativo de δέ sin sonar forzado en español.
- source_word: εἰσεπορεύετο
  english_pob_choice: he entered into
  chosen_spanish: entraba
  alternatives_spanish:
  - iba entrando
  - entró
  lexicon: LSJ
  rationale: El imperfecto expresa movimiento progresivo o reiterado. «Entraba» reproduce mejor ese matiz que un perfecto simple y encaja con la secuencia narrativa.
- source_word: εἰς τὰς πόλεις Πτολεμαΐς
  english_pob_choice: into the cities of Ptolemais
  chosen_spanish: en las ciudades de Ptolemaida
  alternatives_spanish:
  - en las ciudades ptolemaicas
  - en las ciudades de Ptolomeo
  lexicon: LSJ
  rationale: Se mantiene la lectura contextual de Πτολεμαΐς como un genitivo/adjetivo ligado a «ciudades», no como un único destino urbano. «Ptolemaida» conserva la forma propia del nombre y la relación con el dominio ptolemaico.
- source_word: ἀπετάσσε
  english_pob_choice: he stationed
  chosen_spanish: colocó
  alternatives_spanish:
  - destacó
  - apostó
  - estacionó
  lexicon: LSJ
  rationale: En contexto militar, el verbo describe el acto de disponer tropas en lugares definidos. «Colocó» es natural en español y permite completar el sentido con la frase siguiente sin añadir carga interpretativa excesiva.
- source_word: τὰς δυνάμεις
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - contingentes
  lexicon: LSJ
  rationale: «Fuerzas» es un equivalente amplio y fiel para el término militar sin precisar indebidamente el tamaño o composición de las unidades.
- source_word: φρουράν
  english_pob_choice: as a garrison
  chosen_spanish: como guarnición
  alternatives_spanish:
  - para guarnición
  - de guarnición
  lexicon: LSJ
  rationale: 'El acusativo funciona como complemento de función: las fuerzas son dispuestas para ocupar el papel de guarnición. «Como guarnición» expresa bien esa función militar en español.'
- source_word: ἐν ἑκάστῃ πόλει
  english_pob_choice: in each city
  chosen_spanish: en cada ciudad
  alternatives_spanish:
  - en toda ciudad
  lexicon: LSJ
  rationale: La distribución singular de ἑκάστῃ se conserva con «cada ciudad», que mantiene el valor individualizador del griego.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el expediente inglés revisado, pero ajusta la sintaxis para un español natural: mantiene el imperfecto narrativo, la lectura comprimida de Πτολεμαΐς como modificador de «ciudades», y el valor militar de la colocación de fuerzas como guarnición. Se evita traducir mecánicamente «into» donde el contexto español requiere una relación locativa más fluida.'
  spanish_consistency_notes:
  - Se usa «Ptolemaida» para Πτολεμαΐς en vez de «Ptolemais», priorizando una forma española inteligible y tradicionalmente reconocible.
  - Se preserva el matiz de movimiento progresivo con el imperfecto «entraba» en lugar de un pretérito puntual.
  - «Guarnición» mantiene el sentido técnico militar del término griego φρουράν.
