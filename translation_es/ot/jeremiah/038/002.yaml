base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/002.yaml
  text: 'Thus says Yahweh: He who remains in this city will die by the sword[a], by famine, and by pestilence; but he who goes out to the Chaldeans will live, and his life will be to him as spoil, and he will live.'
  footnotes:
