translation:
  language: es
  text: 'Entonces sus hermanos también vinieron y se postraron delante de él y dijeron[a]: «Aquí estamos, tus esclavos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus siervos». El hebreo עֲבָדִים puede denotar tanto siervos como esclavos; aquí se eligió «esclavos» para conservar la expresión intensa de sometimiento de los hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - fueron
  - llegaron
  lexicon: HALOT
  rationale: El verbo הלך puede significar ‘ir’ o ‘venir’ según la perspectiva narrativa. En este contexto el movimiento es hacia José, por lo que en español ‘vinieron’ comunica la orientación deíctica con naturalidad.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: 'Marca adición o énfasis: no solo el mensaje previo, sino ahora los hermanos mismos se presentan personalmente ante José.'
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - los hermanos de él
  - los hermanos suyos
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera masculina singular se refiere a José; ‘sus hermanos’ es la forma natural y precisa en español.
- source_word: וַיִּפְּלוּ לְפָנָיו
  english_pob_choice: fell down before him
  chosen_spanish: se postraron delante de él
  alternatives_spanish:
  - cayeron delante de él
  - se inclinaron delante de él
  lexicon: HALOT
  rationale: נפל + לפני expresa caída/postración en señal de sometimiento. ‘Se postraron’ preserva mejor la fuerza física y deferente que un simple ‘se inclinaron’.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y respondieron
  - diciendo
  lexicon: HALOT
  rationale: Fórmula narrativa estándar que introduce el discurso directo.
- source_word: הִנֶּנּוּ
  english_pob_choice: Here we are
  chosen_spanish: Aquí estamos
  alternatives_spanish:
  - He aquí que estamos
  - Míranos, aquí estamos
  lexicon: HALOT
  rationale: Es una fórmula idiomática de auto-presentación. ‘Aquí estamos’ mantiene el sentido sin recurrir a un ‘he aquí’ arcaico.
- source_word: לְךָ
  english_pob_choice: your
  chosen_spanish: tus
  alternatives_spanish:
  - de ti
  - para ti
  lexicon: HALOT
  rationale: En la frase predicativa ‘esclavos de ti/para ti’, el español natural expresa la relación posesiva/destinada mediante ‘tus esclavos’.
- source_word: לַעֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: HALOT
  rationale: עֲבָדִים puede abarcar ‘siervos’ o ‘esclavos’, pero el contexto aquí subraya una rendición fuerte y deliberada ante José. ‘Esclavos’ conserva esa intensidad y sigue la decisión lexicográfica auditada del POB.
theological_decisions:
- issue: Término de subordinación laboral/servil en עֲבָדִים
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: No es un cruce doctrinal mayor, pero sí un término con peso lexical. El acto de los hermanos es una sumisión marcada; ‘esclavos’ preserva mejor la fuerza de su ofrecimiento que una opción suavizada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos controvertidos para δοῦλος / lenguaje de servidumbre
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que temporalmente suavizó «slaves» a «servants», pero la restauración posterior volvió a «slaves». La traducción española sigue esa decisión final y la justifica con el valor semántico fuerte de עֲבָדִים en este contexto.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» como política general del proyecto, aunque este versículo no contiene ninguno de esos términos.
  - Se conserva un registro bíblico claro y moderno, evitando calcos innecesarios pero sin debilitar la fuerza de la sumisión expresada por el texto.
  - La nota al pie usa un único marcador y se ancla solo en la palabra relevante del discurso directo.
