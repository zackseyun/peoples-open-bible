translation:
  language: es
  text: ¡Ay de los que decretan decretos de iniquidad[a], y de los que siguen escribiendo opresión[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maldad», «mal» o «aflicción»; el hebreo puede denotar maldad moral o daño injusto. «Iniquidad» encaja bien con el contexto jurídico.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo hace un juego de palabras: literalmente, «los que decretan decretos de maldad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de los...!
  - ¡Ay, los que...!
  lexicon: HALOT
  rationale: El hebreo הוֹי introduce una interjección profética de juicio. En español, «¡Ay de...!» comunica con naturalidad el tono de lamentación y amenaza judicial sin perder la fuerza del anuncio profético.
- source_word: הַחֹקְקִים
  english_pob_choice: those who decree
  chosen_spanish: los que decretan
  alternatives_spanish:
  - los que dictan
  - los que legislan
  - los que establecen
  lexicon: HALOT
  rationale: El participio tiene sentido jurídico/gubernamental. «Decretan» conserva la idea de decisiones vinculantes y evita un término demasiado moderno o institucional como «legislan».
- source_word: חִקְקֵי
  english_pob_choice: decrees
  chosen_spanish: decretos
  alternatives_spanish:
  - estatutos
  - ordenanzas
  lexicon: HALOT
  rationale: Se mantiene la repetición cognada del hebreo con una forma nominal igualmente jurídica. «Decretos» refleja bien la fuerza normativa sin forzar una traducción eclesiástica.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - opresión
  - maldad
  - mal
  lexicon: HALOT
  rationale: El término puede abarcar maldad moral y daño injusto. Dado que el POB inglés revisó hacia «iniquity» para acercarse más al hebreo, «iniquidad» conserva esa amplitud ética y jurídica en español.
- source_word: וּמְכַתְּבִים
  english_pob_choice: and the writers who keep writing
  chosen_spanish: y de los escribas que siguen escribiendo
  alternatives_spanish:
  - y de los que escriben
  - y de los redactores que siguen escribiendo
  - y de los escribas que escriben
  lexicon: HALOT
  rationale: El participio paralelo apunta a quienes producen documentos escritos con autoridad. «Escribas» es una opción contextual, porque el versículo alude a redactores de decisiones legales; «siguen escribiendo» refleja el aspecto durativo/intensivo señalado en el audit trail.
- source_word: עָמָל
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - trabajo penoso
  - fatiga
  - miseria
  - trouble
  lexicon: HALOT
  rationale: En este contexto judicial, el término describe carga e injusticia impuestas a otros. «Opresión» capta el daño social y legal que el inglés POB también prioriza.
- source_word: כִּתֵּבוּ
  english_pob_choice: who keep writing
  chosen_spanish: siguen escribiendo
  alternatives_spanish:
  - escriben
  - han escrito
  - van escribiendo
  lexicon: HALOT
  rationale: Aunque la forma es perfecto, en la construcción funciona para intensificar la actividad del participio. «Siguen escribiendo» mantiene la continuidad y el énfasis de producción escrita persistente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: el paso de «wickedness» a «iniquity» para אָוֶן, y el ajuste estructural que añade paralelismo antes de «the writers». La versión española conserva ese matiz con «iniquidad» y mantiene la simetría sintáctica con dos miembros coordinados.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evitó «Señor»/«SEÑOR» porque no hay referencia al tetragrámaton aquí.
  - Se mantuvo el tono profético de juicio con «¡Ay de...!», equivalente natural y reverente en español.
  - «Escribas» se eligió como término contextual para los redactores de decretos, sin convertirlo en un oficio religioso no indicado explícitamente por el hebreo.
