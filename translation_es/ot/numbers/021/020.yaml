review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la secuencia geográfica básica, pero no preserva bien dos decisiones clave del hebreo y del audit trail inglés: el movimiento ''desde Bamot al valle ... a la cima de Pisgá'' queda desajustado por la puntuación/sintaxis española, y la nota alternativa/ancoraje está invertida. Además, ''el frente del desierto'' suena poco natural en español y no refleja tan bien el sentido idiomático de עַל־פְּנֵי como ''que domina la región desolada'' o similar.'
  spanish_quality_summary: El texto es generalmente legible, pero 'y desde Bamot, el valle...' produce una apposición confusa; 'mira hacia el frente del desierto' es forzado y poco idiomático; y la nota [a] está colocada en 'Pisgá' aunque explica הַיְשִׁימֹן. Hace falta una reparación menor para claridad y fidelidad.
  glossary_alignment: No hay términos teológicos mayores en juego. El topónimo Bamot está bien. 'Pisgá' es aceptable. Para הַיְשִׁימֹן, el inglés POB usa 'wasteland' con nota alternativa 'Jeshimon'; en español conviene 'región desolada' o 'desierto' con la nota anclada allí, no en 'Pisgá'.
  issues:
  - severity: high
    issue: Marcador de nota [a] anclado al término equivocado
    rationale: La nota [a] explica la alternativa para הַיְשִׁימֹן ('yeshimón/Jeshimon'), pero en el borrador está colocada en 'Pisgá', que corresponde a הַפִּסְגָּה. Esto desinforma al lector y rompe la trazabilidad del audit trail.
  - severity: medium
    issue: Sintaxis geográfica confusa en 'y desde Bamot, el valle...'
    rationale: 'El hebreo enumera etapas: ''y desde Bamot al valle ... , a la cima de Pisgá''. En español, la coma tras ''Bamot'' hace que ''el valle'' parezca aposición de Bamot en lugar de destino siguiente.'
  - severity: medium
    issue: Expresión poco natural 'mira hacia el frente del desierto'
    rationale: Aunque intenta reflejar עַל־פְּנֵי, en español suena calcada y extraña. Una formulación como 'que domina la región desolada' o 'que da hacia la región desolada' comunica mejor el modismo sin perder el sentido visual/topográfico.
  - severity: low
    issue: La nota cultural [b] tiene comillas y puntuación impropias
    rationale: Comienza con una comilla simple innecesaria y puede pulirse para español natural y estilo editorial consistente.
