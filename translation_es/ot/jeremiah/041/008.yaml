base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/041/008.yaml
  text: But ten men were found among them[a], and they said to Ishmael, “Do not put us to death, for we have hidden stores in the field—wheat and barley[b], oil and honey.” So he refrained and did not put them to death among their brothers.
  footnotes:
  - marker: a
    text: Or “treasures” for “hidden stores”; the context favors concealed provisions rather than valuables in general.
    reason: lexical_alternative
  - marker: b
    text: “Among their brothers” likely means among their fellow men who were with them and were being killed.
    reason: cultural_note
