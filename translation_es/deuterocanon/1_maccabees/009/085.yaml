  - severity: low
    issue: '''Los quemados'' suena algo abrupto en español.'
    rationale: Aunque es literalmente posible, 'los que fueron quemados' resulta más natural y claro en español e igualmente fiel al participio pasivo, especialmente en un texto bíblico de registro digno.
  - severity: low
    issue: '''Se retiró'' es menos preciso que ''partió'' para ἀπῆρεν.'
    rationale: El verbo apunta a partida/departure más que a retirada táctica. 'Partió' o 'se fue' reflejan mejor la idea básica sin añadir matiz contextual no explicitado.
