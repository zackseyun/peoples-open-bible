  glossary_alignment: No hay conflictos con la terminología del proyecto. «José», «ganado» y «dinero» son adecuados. La decisión de no añadir «alimento» en el texto principal concuerda con la revisión inglesa auditada. Se conserva correctamente «si» para אִם, con posibilidad contextual explicada en nota.
