translation:
  language: es
  text: Silbaré para ellos y los reuniré[a], porque los he redimido[b], y serán tan numerosos como antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haré una señal para ellos»; el verbo hebreo puede denotar silbar o sisear como una convocatoria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se multiplicarán como se multiplicaron antes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁרְקָה
  english_pob_choice: I will whistle
  chosen_spanish: Silbaré
  alternatives_spanish:
  - Haré un silbido
  - Soplaré un silbido
  - Haré una señal
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de silbar o emitir un silbido como señal de convocatoria. 'Silbaré' conserva esa imagen de llamada directa y natural en español, sin añadir una connotación negativa como podría ocurrir con 'silbar' en ciertos contextos modernos.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - hacia ellos
  lexicon: HALOT
  rationale: La preposición ל con sufijo pronominal marca aquí el destinatario de la señal. 'Para ellos' funciona bien con el verbo de convocatoria y reproduce el sentido de llamada dirigida a su favor.
- source_word: וַאֲקַבְּצֵם
  english_pob_choice: and gather them
  chosen_spanish: y los reuniré
  alternatives_spanish:
  - y los juntaré
  - y los congregaré
  lexicon: HALOT
  rationale: קבץ implica reunir o congregar, a menudo con trasfondo de restauración del pueblo disperso. 'Reuniré' comunica ese sentido de retorno y restauración sin sobrecargar el verso.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la razón de la reunión: el acto redentor previo de Yahvé. ''Porque'' expresa de forma clara y natural esa relación causal en español.'
- source_word: פְדִיתִי/ם
  english_pob_choice: I have redeemed them
  chosen_spanish: los he redimido
  alternatives_spanish:
  - los he rescatado
  - los he rescatado pagando su rescate
  lexicon: HALOT
  rationale: פדה remite a liberar mediante rescate o redención. 'Redimido' preserva el valor teológico y covenantal del verbo, que en español bíblico sigue siendo transparente y fiel.
- source_word: וְרָב֖וּ כְּמ֥וֹ רָבֽוּ
  english_pob_choice: and they will be as many as they were before
  chosen_spanish: y serán tantos como antes
  alternatives_spanish:
  - y se multiplicarán como antes
  - y serán muchos como lo fueron antes
  lexicon: HALOT
  rationale: La secuencia expresa aumento numérico y restauración a una condición previa de abundancia. 'Serán tantos como antes' mantiene el comparativo y la idea de restauración poblacional en un español fluido y digno.
theological_decisions:
- issue: Redención como base de la reunión/restauración
  english_pob_reading: The verse is rendered as national restoration and regathering grounded in God's prior redemption, without specifying a narrower doctrinal mechanism beyond the text.
  chosen_spanish_reading: El versículo presenta la reunión del pueblo como consecuencia de una redención ya realizada por Yahvé, sin precisar un mecanismo doctrinal más estrecho que el que ofrece el texto.
  alternative_spanish_readings:
  - Una lectura más escatológica que concrete detalles no explícitos en el verso
  - Una lectura meramente simbólica o espiritualizada de la reunión
  rationale: El hebreo une convocatoria, reunión, redención y aumento numérico. La traducción española conserva esa secuencia causal y restauradora sin imponer un sistema teológico ajeno al pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión del POB en inglés al preferir una equivalencia directa y natural en el cierre: ''as they were before'' se refleja como ''como antes'', manteniendo la idea de restauración numérica sin forzar una paráfrasis.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - 'Se mantiene el paralelismo verbal con futuro en español: ''Silbaré... los reuniré... los he redimido... serán''.'
  - '''Redimido'' conserva el peso covenantal del término, en lugar de sustituirlo por una formulación más genérica.'
