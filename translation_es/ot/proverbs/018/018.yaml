translation:
  language: es
  text: La suerte pone fin a las disputas[a], y decide entre los poderosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La suerte resuelve las disputas y decide entre los poderosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדְיָנִים
  english_pob_choice: disputes
  chosen_spanish: disputas
  alternatives_spanish:
  - contiendas
  - pleitos
  - riñas
  lexicon: HALOT
  rationale: El sustantivo hebreo alude a conflictos o controversias. «Disputas» conserva el alcance general del término y suena natural en español moderno, sin estrecharlo indebidamente a riñas meramente personales.
- source_word: יַשְׁבִּית
  english_pob_choice: puts an end to
  chosen_spanish: pone fin a
  alternatives_spanish:
  - hace cesar
  - detiene
  - termina
  lexicon: HALOT
  rationale: 'El hifil de שבת tiene sentido causativo: hacer cesar. «Pone fin a» transmite bien esa causalidad en español idiomático, manteniendo la fuerza del verbo sin sonar forzado.'
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - la decisión por sorteo
  - la suerte echada
  lexicon: HALOT
  rationale: Aunque «el lote» sería más literal, en español bíblico y actual «la suerte» comunica con claridad el medio de decisión por sorteo. Se conserva la referencia al procedimiento de echar suertes, sin introducir una expresión artificial.
- source_word: וּבֵין
  english_pob_choice: and decides between
  chosen_spanish: y decide entre
  alternatives_spanish:
  - y separa entre
  - y discrimina entre
  - y arbitra entre
  lexicon: HALOT
  rationale: La preposición בין marca el ámbito relacional o de contraste entre partes. «Decide entre» sigue la revisión inglesa más reciente y expresa bien la función judicial/arbitral del proverbio.
- source_word: עֲצוּמִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los valientes
  - los grandes
  lexicon: HALOT
  rationale: El adjetivo designa a quienes son fuertes o poderosos. «Los poderosos» mantiene el valor semántico y resulta más natural que una traducción más arcaica como «los fuertes» en este contexto proverbial.
theological_decisions:
- issue: La elección del medio de resolución en el proverbio
  english_pob_reading: The lot puts an end to disputes, and decides between the mighty.
  chosen_spanish_reading: La suerte pone fin a las disputas, y decide entre los poderosos.
  alternative_spanish_readings:
  - La suerte pone fin a las disputas, y separa entre los poderosos.
  - La suerte pone fin a las disputas, y arbitra entre los poderosos.
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión de sentido: el proverbio atribuye a la suerte una función de resolución entre contendientes. «Decide entre» preserva el matiz judicial/arbitral preferido en la revisión inglesa, sin exagerar con una paráfrasis interpretativa.'
  doctrine_reference: Sabiduría proverbial; uso de suertes en decisiones humanas (cf. contexto bíblico general)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que cambió «separates between the mighty» por «decides between the mighty» para reflejar con más precisión el sentido contextual. En español se adoptó esa misma orientación semántica. También se tomó en cuenta que el hebreo usa «la suerte» como instrumento de decisión; se evitó una transliteración rígida que sonara poco natural en español.
  spanish_consistency_notes:
  - Se mantuvo «disputas» para מִדְיָנִים, consistente con el valor amplio de controversias o contenciones.
  - «La suerte» se eligió como equivalente idiomático de הַגּוֹרָל; no se usó «el lote» por sonar menos natural en español actual.
  - «Los poderosos» conserva el tono proverbial y el campo semántico de עֲצוּמִים sin añadir género explícito ni restringir el referente.
