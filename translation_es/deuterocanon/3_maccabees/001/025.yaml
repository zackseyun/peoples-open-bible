translation:
  language: es
  text: Y la multitud[a], como antes, continuaba con ellos, suplicando; pero los ancianos alrededor del rey trataban de muchas maneras de apartar su mente arrogante de la trama que había concebido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la multitud, como antes, continuaba con ellos en súplica». El griego ἀνεστρέφετο con δεόμενον admite varias traducciones muy cercanas.'
    reason: alternative_reading
lexical_decisions:
- source_word: πλῆθος
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  - la muchedumbre
  lexicon: LSJ
  rationale: Mantiene el sentido colectivo y formal del griego sin bajar el registro a un término más coloquial como 'gente'.
- source_word: ὡς ἔμπροσθεν
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como previamente
  - como antes de esto
  lexicon: LSJ
  rationale: Expresa la referencia temporal de manera natural en español y conserva la idea de continuidad respecto de lo anterior.
- source_word: ἀνεστρέφετο
  english_pob_choice: continued
  chosen_spanish: continuaba
  alternatives_spanish:
  - seguía
  - se mantenía
  lexicon: LSJ
  rationale: En este contexto con el participio δεόμενον, el verbo comunica una acción sostenida o continuada; 'continuaba' respeta ese valor imperfectivo con buena fluidez en español.
- source_word: δεόμενον
  english_pob_choice: pleading
  chosen_spanish: suplicando
  alternatives_spanish:
  - rogando
  - implorando
  - pidiendo con insistencia
  lexicon: LSJ
  rationale: '''Suplicando'' comunica la urgencia y la petición intensa del participio sin recurrir a una fórmula litúrgica más rígida.'
- source_word: οἱ περὶ τὸν βασιλέα πρεσβύτεροι
  english_pob_choice: the elders around the king
  chosen_spanish: los ancianos alrededor del rey
  alternatives_spanish:
  - los consejeros del rey
  - los ancianos que rodeaban al rey
  - los mayores alrededor del rey
  lexicon: LSJ
  rationale: Se conserva el sustantivo 'ancianos' para no especificar indebidamente una función cortesana que el griego no define explícitamente, manteniendo también la preposición espacial de cercanía al rey.
- source_word: πολλαχῶς ἐπειρῶντο
  english_pob_choice: were trying in many ways
  chosen_spanish: trataban de muchas maneras
  alternatives_spanish:
  - intentaban por muchos medios
  - procuraban de muchas maneras
  - hacían muchos intentos
  lexicon: LSJ
  rationale: La expresión transmite la variedad e insistencia de los intentos; 'trataban de muchas maneras' resulta idiomático y conserva el matiz del imperfecto.
- source_word: ἀγέρωχον ... νοῦν
  english_pob_choice: his arrogant mind
  chosen_spanish: su mente arrogante
  alternatives_spanish:
  - su mente altiva
  - su pensamiento soberbio
  - su disposición arrogante
  lexicon: LSJ
  rationale: '''Mente arrogante'' preserva el juicio moral del adjetivo y el valor interior de νοῦς; se evita suavizar el término con una paráfrasis menos directa.'
- source_word: ἐξιστάνειν
  english_pob_choice: to turn ... away
  chosen_spanish: apartar
  alternatives_spanish:
  - desviar
  - hacer cambiar
  - retirar
  lexicon: LSJ
  rationale: El verbo sugiere mover o desplazar la mente de su curso; 'apartar' es breve, natural y compatible con el complemento que sigue.
- source_word: τῆς ἐντεθυμημένης ἐπιβουλῆς
  english_pob_choice: the plot he had conceived
  chosen_spanish: del complot que había concebido
  alternatives_spanish:
  - de la trama que había planeado
  - de la conspiración que había ideado
  - del designio que había concebido
  lexicon: LSJ
  rationale: '''Complot'' refleja bien el carácter hostil de ἐπιβουλή y ''había concebido'' reproduce el aspecto de algo deliberado y ya formado en la mente.'
theological_decisions:
- issue: Valor moral y psicológico de νοῦς y ἀγέρωχος
  english_pob_reading: his arrogant mind
  chosen_spanish_reading: su mente arrogante
  alternative_spanish_readings:
  - su mente altiva
  - su pensamiento soberbio
  rationale: No se neutraliza el juicio moral del texto; se mantiene una formulación que presenta la disposición interior del rey como arrogante, en línea con la evaluación explícita del griego.
  doctrine_reference: No aplica; decisión de matiz léxico-moral del relato histórico.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada, incorporando la revisión que favoreció 'continued with them' por su relación más natural con τούτοις. En español se optó por 'continuaba con ellos' para conservar esa continuidad relacional y el valor imperfectivo del verbo griego, sin forzar una literalidad innecesaria.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita divina.
  - Se usa 'Mesías/Cristo' no aplica aquí; no hay terminología mesiánica en el pasaje.
  - '''Ancianos'' reproduce el término del griego sin convertirlo en ''consejeros'', ya que el texto no precisa un cargo técnico.'
  - La puntuación en español separa con punto y coma los dos miembros principales, reflejando la contraposición del griego.
