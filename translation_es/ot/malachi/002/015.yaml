base_translation:
  language: en
  yaml_path: translation/ot/malachi/002/015.yaml
  text: Did not one make them[a], with a remnant of the Spirit for him? And what was the one seeking? Godly offspring. So guard yourselves in your spirit[c][b], and let no one deal treacherously with the wife of his youth.
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: ''Did not one make, and a remnant of spirit was his?'' Other interpretations include, ''No one with even a remnant of spirit does this,'' or taking ''the one'' as Abraham.'
    reason: alternative_reading
  - marker: b
    text: Or 'a remnant of spirit was his'; possibly 'he had abundance of spirit.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'seed of God'; also rendered 'godly seed' or 'offspring of God.'
    reason: lexical_alternative
