translation:
  language: es
  text: Guardarás la Fiesta de los Panes sin levadura. Durante siete días comerás panes sin levadura, como te mandé, en el tiempo señalado del mes de Abib, porque en él saliste de Egipto. Y nadie se presentará delante de mí con las manos vacías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y no aparecerán delante de mí con las manos vacías». El hebreo cambia de la segunda persona singular en los mandatos anteriores a un verbo en tercera persona plural en esta cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: חַג הַמַּצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la Fiesta de los Panes sin levadura
  alternatives_spanish:
  - la fiesta de los panes sin levadura
  - la festividad de los panes sin levadura
  - la Fiesta de los Panes Ácimos
  lexicon: HALOT
  rationale: חַג expresa una fiesta o celebración cultual; en español, «Fiesta» conserva el carácter ritual sin volverlo técnico en exceso. מַצּוֹת son panes sin levadura; «Panes sin levadura» es claro, natural y mantiene el referente concreto mejor que una forma más litúrgica.
- source_word: תִּשְׁמֹר
  english_pob_choice: you shall keep
  chosen_spanish: Guardarás
  alternatives_spanish:
  - Observarás
  - Guardarás/observarás
  lexicon: HALOT
  rationale: שׁמר en contexto legal-cultual puede ser «guardar» u «observar». «Guardarás» mantiene el mandato covenantal y suena natural en español bíblico sin perder la fuerza normativa.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - Por siete días
  - Siete días
  lexicon: HALOT
  rationale: La expresión temporal indica duración. «Durante siete días» comunica bien el intervalo exigido y fluye de manera idiomática en español.
- source_word: תֹּאכַל מַצּוֹת
  english_pob_choice: you shall eat unleavened bread
  chosen_spanish: comerás panes sin levadura
  alternatives_spanish:
  - comerás pan sin levadura
  - comerás ázimos
  lexicon: HALOT
  rationale: מַצּוֹת es plural en hebreo; «panes sin levadura» refleja mejor la forma plural y evita la abstracción singularizada de «pan sin levadura». «Ázimos» es posible pero menos transparente para lectura general.
- source_word: כַּאֲשֶׁר צִוִּיתִךָ
  english_pob_choice: as I commanded you
  chosen_spanish: como te lo he mandado
  alternatives_spanish:
  - como te mandé
  - según te lo mandé
  lexicon: HALOT
  rationale: El hebreo expresa una comparación con un mandato previo. «Como te lo he mandado» conserva la referencia a la orden divina previa y resulta natural en español; el pronombre «lo» ayuda a completar el objeto implícito del mandato.
- source_word: לְמוֹעֵד
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en el tiempo fijado
  - en la cita señalada
  lexicon: HALOT
  rationale: מוֹעֵד puede ser tiempo señalado/apuntado. «Tiempo señalado» conserva la idea de una fecha fijada por Dios sin introducir el matiz de reunión que sería menos pertinente aquí.
- source_word: חֹדֶשׁ הָאָבִיב
  english_pob_choice: the month of Abib
  chosen_spanish: del mes de Abib
  alternatives_spanish:
  - del mes de Aviv
  - del mes del espigado
  lexicon: HALOT
  rationale: Como designación calendárica, se conserva el nombre propio del mes. «Abib» mantiene la forma hebrea tradicional y evita perder el carácter técnico del calendario.
- source_word: כִּי ב֖/וֹ יָצָ֣אתָ מִ/מִּצְרָ֑יִם
  english_pob_choice: for in it you came out from Egypt
  chosen_spanish: porque en él saliste de Egipto
  alternatives_spanish:
  - pues en él saliste de Egipto
  - porque en él fuiste sacado de Egipto
  lexicon: HALOT
  rationale: בוֹ retoma el mes mencionado; en español, «en él» preserva el referente temporal. יָצָאתָ es un salir activo; «saliste de Egipto» reproduce con naturalidad el lenguaje del éxodo sin forzar una pasiva.
- source_word: וְלֹא יֵרָא֥וּ פָנַ֖/י רֵיקָֽם
  english_pob_choice: And no one shall appear before me empty-handed.
  chosen_spanish: Y nadie se presentará delante de mí en vano.
  alternatives_spanish:
  - Y nadie comparecerá delante de mí vacío de manos.
  - Y nadie aparecerá ante mí sin ofrenda.
  lexicon: HALOT
  rationale: El hebreo usa un idiomático «no serán vistos mis rostros» con sentido de comparecer ante Dios; «se presentará delante de mí» preserva la idea de comparecer en su presencia. רֵיקָם significa «vacío» o «en vacío»; aquí se ha optado por «en vano» para una lectura castellana natural, aunque la expresión puede entenderse también como «sin nada». La tensión entre presencia cultual y ausencia de ofrenda se conserva en las notas.
theological_decisions:
- issue: Idiomatic divine presence in the final clause
  english_pob_reading: before me / before my face
  chosen_spanish_reading: delante de mí
  alternative_spanish_readings:
  - ante mí
  - en mi presencia
  rationale: 'La frase hebrea literalmente habla de «mi rostro», pero su valor es idiomático: comparecer ante Dios. «Delante de mí» conserva el sentido relacional sin calcar la anatomía semítica. Se evita «SEÑOR» porque el texto hebreo aquí habla en primera persona divina.'
  doctrine_reference: Ex 23:15; idiom of divine presence in Hebrew משפט/cultic language
- issue: Rendering of רֵיקָם
  english_pob_reading: empty-handed
  chosen_spanish_reading: en vano
  alternative_spanish_readings:
  - vacío
  - sin nada
  - sin ofrenda
  rationale: El audit trail inglés opta por «empty-handed», que en contexto cultual implica no comparecer sin una dádiva. En español, «en vano» es más idiomático como resultado de venir vacío de presente; aun así, como puede sugerir inutilidad en vez de carencia material, se documentan alternativas más literales. Se mantiene abierta la posibilidad de entender un gesto cultual/ofrenda sin sobreespecificarlo en el texto principal.
  doctrine_reference: Ex 23:15; cultic obligation and offering language
translation_notes:
  revision_awareness: El inglés POB revisó la última cláusula desde una forma plural («they shall not appear») a una impersonal («no one shall appear») para reflejar mejor el valor indefinido del hebreo. La presente versión española sigue esa decisión con «nadie se presentará», manteniendo el carácter general de la prohibición. También se ha tenido en cuenta la nota auditada sobre el hebreo idiomático de «before me / before my face», traducido como «delante de mí».
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el hebreo presenta el nombre divino explícito; aquí no aparece, por lo que el versículo conserva la primera persona divina.
  - Se mantiene «Abib» como nombre calendárico propio, no como glosa semántica.
  - Se ha preferido el plural concreto «panes sin levadura» para reflejar מַצּוֹת.
  - La cláusula final conserva el sentido cultual de comparecer ante Dios sin reducirla a una mera ausencia de objetos.
