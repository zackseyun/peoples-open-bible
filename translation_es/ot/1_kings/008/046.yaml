translation:
  language: es
  text: Cuando pequen contra ti—porque no hay hombre[a] que no peque—, y te enojes contra ellos, y los entregues a un enemigo, y sus captores[b] los lleven cautivos a la tierra del enemigo, lejana o cercana,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no hay ser humano que no peque».
    reason: lexical_alternative
  - marker: b
    text: Lit. «sus cautivadores».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֶטְאוּ לָךְ
  english_pob_choice: they sin against you
  chosen_spanish: pequen contra ti
  alternatives_spanish:
  - pecan contra ti
  - cometan pecado contra ti
  lexicon: HALOT
  rationale: El hebreo חטא con ל expresa pecado cometido contra alguien; en español, "contra ti" comunica bien el agravio relacional dirigido a Yahvé. "Pecar" mantiene el valor verbal sin cargar innecesariamente el estilo.
- source_word: אֵין אָדָם אֲשֶׁר לֹא יֶחֱטָא
  english_pob_choice: there is no one who does not sin
  chosen_spanish: no hay hombre[a] que no peque
  alternatives_spanish:
  - no hay ser humano que no peque
  - no hay nadie que no peque
  lexicon: HALOT
  rationale: Se preserva el valor genérico de אָדָם con "hombre" en el texto principal, siguiendo la decisión lexical auditada del POB, y se añade una nota para la alternativa inclusiva natural en español. "Peque" conserva el aspecto general del hebreo sin sobretraducir.
- source_word: וְאָנַפְתָּ בָם
  english_pob_choice: and you become angry with them
  chosen_spanish: y te enojes contra ellos
  alternatives_spanish:
  - y te airas contra ellos
  - y te irrites contra ellos
  lexicon: HALOT
  rationale: '"אָנַף" indica ira divina; "enojes" es natural y sobrio en español bíblico moderno. "Contra ellos" mantiene el destino de la ira en el objeto de la acción.'
- source_word: וּנְתַתָּם לִפְנֵי אוֹיֵב
  english_pob_choice: and give them over to an enemy
  chosen_spanish: y los entregues delante de un enemigo
  alternatives_spanish:
  - y los pongas ante un enemigo
  - y los entregues a un enemigo
  lexicon: HALOT
  rationale: '"Entregar" reproduce bien נתן en este contexto de juicio y derrota. "Delante de" conserva con más fidelidad el לפני del hebreo, aunque en español resulta algo más literal que "a un enemigo".'
- source_word: אוֹיֵב
  english_pob_choice: an enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - el enemigo
  - un adversario
  lexicon: HALOT
  rationale: El singular sin artículo en el hebreo se refleja con "un enemigo", como en el POB inglés. Luego el versículo distingue la forma con artículo en la expresión posterior.
- source_word: וְשָׁבוּם שֹׁבֵיהֶם
  english_pob_choice: and their captors carry them away captive
  chosen_spanish: y sus cautivadores los lleven cautivos
  alternatives_spanish:
  - y sus captores los lleven cautivos
  - y los lleven cautivos los que los cautivaron
  lexicon: HALOT
  rationale: El hebreo presenta a los cautivadores como sujeto y a los cautivos como objeto; "cautivadores" conserva esa relación y evita perder el paralelismo. "Lleven cautivos" refleja el matiz de deportación, no solo de traslado.
- source_word: אֶל אֶרֶץ הָאוֹיֵב
  english_pob_choice: to the land of the enemy
  chosen_spanish: a la tierra del enemigo
  alternatives_spanish:
  - a la tierra del adversario
  - a la tierra del enemigo
  lexicon: HALOT
  rationale: '"Tierra" traduce אֶרֶץ de manera directa y digna. "Del enemigo" preserva el artículo hebreo en esta segunda mención, como en el audit trail inglés.'
- source_word: רְחוֹקָה אוֹ קְרוֹבָה
  english_pob_choice: whether far away or near
  chosen_spanish: lejana o cercana
  alternatives_spanish:
  - lejos o cerca
  - sea lejana o cercana
  lexicon: HALOT
  rationale: Los adjetivos femeninos concuerdan con "tierra". En español, la formulación breve "lejana o cercana" suena natural y mantiene el contraste semántico.
theological_decisions:
- issue: Nombre divino implícito en el discurso de Salomón
  english_pob_reading: you / them
  chosen_spanish_reading: ti / ellos, con referencia implícita a Yahvé en el contexto inmediato
  alternative_spanish_readings:
  - tú / ellos
  - a ti / a ellos
  rationale: El hebreo usa segunda persona dirigida a Dios en la oración. El español mantiene el pronombre de trato directo sin ocultar el nombre divino; la identificación con Yahvé queda determinada por el contexto de la oración de dedicación.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; nomenclature policy for YHWH
- issue: Universalidad del pecado humano expresada por אָדָם
  english_pob_reading: there is no one who does not sin
  chosen_spanish_reading: no hay hombre que no peque
  alternative_spanish_readings:
  - no hay ser humano que no peque
  - no hay nadie que no peque
  rationale: La forma hebrea singular genérica se conserva con "hombre" en la línea principal por fidelidad al source text y a la política del proyecto; se reconoce en la nota la alternativa inclusiva y natural en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; contested term אָדָם
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión auditada del POB inglés en el punto de אָדָם (de "man" a "one" en inglés por naturalidad inclusiva) y en la clausula de cautiverio (añadiendo "captive" para reflejar mejor la construcción hebrea). En español, se optó por conservar el singular genérico "hombre" en el texto principal por la política lexical del proyecto, pero se añadió una nota con la alternativa inclusiva. También se mantuvo explícito el doble movimiento semántico de שָׁבוּם שֹׁבֵיהֶם: sujetos que cautivan y objeto llevado cautivo.'
  spanish_consistency_notes:
  - '"Pequen/peque" se usa de manera consistente para חטא en este versículo.'
  - '"Yahvé" no aparece en la superficie del verso porque el hebreo usa pronombres, pero el contexto de la oración se presupone.'
  - Se preserva la distinción entre "enemigo" sin artículo y "del enemigo" con artículo.
  - '"Cautivadores" se eligió para reflejar el sujeto hebreo sin reemplazarlo por una formulación más interpretativa.'
