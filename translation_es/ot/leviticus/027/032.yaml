translation:
  language: es
  text: Y todo diezmo[a] del ganado y del rebaño[b], todo décimo animal que pase bajo la vara[c], será santo para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «décima parte». El hebreo usa el término técnico «diezmo» para una décima porción apartada.
    reason: lexical_alternative
  - marker: b
    text: El hebreo es un término colectivo para el pequeño ganado, especialmente ovejas y cabras.
    reason: lexical_alternative
  - marker: c
    text: O «cayado». La frase alude al conteo del ganado al pasar uno por uno bajo la vara del pastor.
    reason: cultural_note
lexical_decisions:
- source_word: מַעְשַׂר
  english_pob_choice: tithe
  chosen_spanish: diezmo
  alternatives_spanish:
  - décima parte
  - tributo
  lexicon: HALOT
  rationale: En este contexto legal, el término técnico para la porción de una décima es «diezmo»; mantiene la fuerza normativa y es natural en español bíblico moderno.
- source_word: בָּקָר
  english_pob_choice: the herd
  chosen_spanish: el ganado
  alternatives_spanish:
  - la vacada
  - los bovinos
  lexicon: HALOT
  rationale: El hebreo es un colectivo para ganado bovino; «ganado» comunica bien el conjunto en español sin perder la referencia a animales de cría.
- source_word: וָ/צֹאן
  english_pob_choice: the flock
  chosen_spanish: la ovejada
  alternatives_spanish:
  - el rebaño
  - la grey
  lexicon: HALOT
  rationale: Para conservar el paralelismo colectivo con «ganado», se usa «ovejada» como término amplio para el pequeño ganado; es menos común, pero refleja mejor la imagen de conjunto que una traducción restrictiva a ovejas y cabras.
- source_word: הָֽ/עֲשִׂירִי
  english_pob_choice: every tenth animal
  chosen_spanish: todo décimo animal
  alternatives_spanish:
  - el décimo
  - cada décimo animal
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el décimo»; en español se explicita «animal» para dejar claro que se trata de cada animal que cae en la cuenta, sin añadir contenido ajeno.
- source_word: יַעֲבֹר תַּ֣חַת הַ/שָּׁבֶט
  english_pob_choice: that passes under the rod
  chosen_spanish: que pase bajo la vara
  alternatives_spanish:
  - que pase bajo el cayado
  - que pase bajo el bastón
  lexicon: HALOT
  rationale: «Vara» reproduce bien el instrumento de conteo pastoral. Mantiene la imagen de pasar uno por uno bajo la vara, como en el audit trail inglés, sin sobrecargar el texto.
- source_word: קֹּ֖דֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: En la fórmula legal-cultual, «santo» preserva la categoría de pertenencia apartada para Dios. «Consagrado» explicaría el estado, pero «santo» sigue mejor la construcción predicativa del hebreo.
- source_word: לַֽ/יהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé», evitando el reemplazo por «SEÑOR» y manteniendo la forma del nombre del pacto.'
theological_decisions:
- issue: Cómo verter la colección distributiva «todo… el décimo»
  english_pob_reading: every tenth animal that passes under the rod
  chosen_spanish_reading: todo décimo animal que pase bajo la vara
  alternative_spanish_readings:
  - el décimo animal que pase bajo la vara
  - cada décimo animal que pase bajo la vara
  rationale: La frase española conserva el valor distributivo de cada animal contado. «Todo» reproduce el alcance general, y «décimo animal» resuelve la elipsis del hebreo con el mínimo necesario para la claridad.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Nombre divino en la fórmula de dedicación
  english_pob_reading: holy to Yahweh
  chosen_spanish_reading: santo para Yahvé
  alternative_spanish_readings:
  - santo a Yahvé
  - consagrado a Yahvé
  rationale: «Para Yahvé» expresa pertenencia/dedicación con naturalidad y mantiene la diferencia respecto de una simple descripción de estado. Evita la convención de ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la revisión inglesa final eliminó los guiones largos y prefirió comas para fluidez; en español se optó por la misma cadencia con comas y una estructura simple, manteniendo intactos los elementos auditados: diezmo, paso bajo la vara, y dedicación a Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del nombre divino, coherente con el estándar del proyecto.
  - Se usó «vara» para שֵׁבֶט por la imagen pastoral de conteo, en paralelo con el audit trail inglés.
  - «Santo» conserva la fórmula cultual breve del hebreo; no se amplió a una paráfrasis explicativa en el texto principal.
