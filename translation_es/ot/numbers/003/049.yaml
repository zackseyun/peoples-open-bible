translation:
  language: es
  text: Y Moisés tomó el dinero de la redención[a] de entre los que excedían[b] el número de los redimidos por los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el dinero del rescate». El término hebreo puede referirse al pago hecho para la redención.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, de aquellos israelitas cuyo número excedía al número representado por los levitas en el cómputo de redención.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  lexicon: HALOT
  rationale: El wayyiqtol de לקח expresa la acción narrativa estándar ‘tomar’. En español, ‘tomó’ conserva esa sencillez y evita introducir una relación de recepción que el hebreo no exige.
- source_word: כֶּסֶף הַפִּדְיֹם
  english_pob_choice: the redemption money
  chosen_spanish: el dinero del rescate
  alternatives_spanish:
  - el dinero de la redención
  - el precio del rescate
  - la plata del rescate
  lexicon: HALOT
  rationale: La frase designa el pago asociado a la redención. ‘Dinero del rescate’ suena natural en español y conserva el valor cultual/jurídico; ‘plata’ sería más literal al sustantivo hebreo, pero menos idiomático y más estrecho que el sentido monetario aquí.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: La preposición marca procedencia/origen. ‘De parte de’ da en español la idea de procedencia desde un grupo humano sin sobreespecificar la imagen de ‘de la mano de’.
- source_word: הָעֹדְפִים
  english_pob_choice: those who were in excess
  chosen_spanish: los que excedían
  alternatives_spanish:
  - los que estaban en exceso
  - los excedentes
  - los que sobraban
  lexicon: HALOT
  rationale: El participio de עודף expresa excedencia comparativa. ‘Los que excedían’ mantiene esa relación cuantitativa en un español compacto; evita interpretar el término como meramente ‘sobrantes’ sin la idea de comparación.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - más que
  lexicon: HALOT
  rationale: Aquí עַל introduce la comparación de exceso numérico. En español, la construcción ‘excedían a’ expresa de forma natural la misma relación comparativa.
- source_word: פְּדוּיֵי הַלְוִיִּם
  english_pob_choice: those redeemed by the Levites
  chosen_spanish: los rescatados por los levitas
  alternatives_spanish:
  - los redimidos por los levitas
  - los que fueron rescatados por los levitas
  lexicon: HALOT
  rationale: El constructo participial pasivo indica a los que quedaron cubiertos por la función redentora asociada a los levitas. ‘Rescatados’ preserva la conexión con פדיון y con ‘dinero del rescate’; ‘redimidos’ también es posible, pero ‘rescatados’ armoniza mejor con la terminología elegida en la línea principal.
theological_decisions:
- issue: Terminología de פדיון / redención en un contexto de pago sustitutivo
  english_pob_reading: the redemption money
  chosen_spanish_reading: el dinero del rescate
  alternative_spanish_readings:
  - el dinero de la redención
  - la plata del rescate
  - el precio del rescate
  rationale: En este versículo el término no es un concepto abstracto, sino una suma monetaria vinculada a una sustitución contable. ‘Dinero del rescate’ comunica ese valor sin forzar una formulación doctrinal más técnica que el hebreo no requiere aquí.
  doctrine_reference: Redención sustitutiva en el contexto del censo levítico (cf. Nm 3:46-48).
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la forma hebrea y el ajuste revisado del inglés POB, que prefiere una expresión más natural para el grupo comparativo (''those who were in excess over those redeemed by the Levites''). En español se optó por una equivalencia idiomática equivalente: ''los que excedían a los rescatados por los levitas''.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando el Tetragrámaton aparece explícitamente; en este versículo no aparece.
  - Se evita ‘Señor’ o una máscara eclesial porque aquí no hay nombre divino en el texto.
  - Se conserva ‘rescate’/‘rescatar’ para reflejar la terminología cultual de פדה/פדיון sin convertirla en una paráfrasis moral.
