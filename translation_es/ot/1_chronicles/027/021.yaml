translation:
  language: es
  text: 'para la media tribu de Manasés en Galaad: Iddo, hijo de Zacarías; para Benjamín: Jaasiel[a], hijo de Abner.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
