translation:
  language: es
  text: Después, Hezrón se llegó[a] a la hija de Macir, padre[c] de Galaad, y la tomó[b] cuando tenía sesenta años, y ella le dio a luz a Segub.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue a». El hebreo «se llegó a / entró a» funciona como un modo discreto de referirse a la unión marital o sexual.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «la desposó» o «la tomó como esposa».'
    reason: lexical_alternative
  - marker: c
    text: «Padre de Galaad» puede significar padre inmediato, antepasado o fundador en uso genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: Marca la secuencia temporal del relato genealógico. «Después» es natural y conserva el orden sin añadir matices no presentes en el hebreo.
- source_word: בָּא אֶל
  english_pob_choice: went in to
  chosen_spanish: entró a
  alternatives_spanish:
  - fue a
  - se unió a
  lexicon: HALOT
  rationale: El hebreo usa el modismo «venir/entrar a» con una mujer. En español, «entró a» conserva mejor ese giro indirecto que una paráfrasis explícita, sin perder la alusión relacional/sexual del contexto.
- source_word: בַּת מָכִיר
  english_pob_choice: the daughter of Machir
  chosen_spanish: la hija de Macir
  alternatives_spanish:
  - la hija de Machir
  - Machir, su hija
  lexicon: HALOT
  rationale: Se mantiene la cadena genealógica en forma transparente. «Macir» refleja la transliteración usual al español del nombre propio.
- source_word: אֲבִי גִלְעָד
  english_pob_choice: the father of Gilead
  chosen_spanish: padre de Galaad
  alternatives_spanish:
  - antepasado de Galaad
  - fundador de Galaad
  lexicon: HALOT
  rationale: El hebreo genealógico permite sentido de progenitor/fundador, pero la formulación directa «padre de» preserva la ambigüedad documentada sin interpretarla de más. «Galaad» es la forma española tradicional del topónimo/nombre.
- source_word: לְקָחָהּ
  english_pob_choice: he took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - la tomó por esposa
  - se casó con ella
  lexicon: HALOT
  rationale: La POB inglesa conserva la literalidad del verbo con posible sentido matrimonial. «La tomó» reproduce esa fuerza verbal y deja que el contexto genealogíco sugiera la unión matrimonial.
- source_word: וְהוּא בֶּן שִׁשִּׁים שָׁנָה
  english_pob_choice: when he was sixty years old
  chosen_spanish: cuando tenía sesenta años
  alternatives_spanish:
  - y era de sesenta años
  - siendo de sesenta años
  lexicon: HALOT
  rationale: El hebreo literal es una idiomática «hijo de sesenta años». En español, «cuando tenía sesenta años» comunica con naturalidad el mismo dato de edad sin ocultar el valor idiomático.
- source_word: וַתֵּלֶד ל֖וֹ
  english_pob_choice: she bore ... to him
  chosen_spanish: ella le dio a luz a
  alternatives_spanish:
  - ella le parió a
  - ella le dio a luz
  lexicon: HALOT
  rationale: Se preserva la relación marcada por el dativo «a él» con una formulación natural en español. «Dio a luz a» es digna y clara para la genealogía.
- source_word: שְׂגוּב
  english_pob_choice: Segub
  chosen_spanish: Segub
  alternatives_spanish:
  - Ségub
  lexicon: HALOT
  rationale: Se mantiene la transliteración estándar del nombre propio sin forzar acentuación no atestiguada.
theological_decisions:
- issue: Sentido del modismo hebreo בָּא אֶל con una mujer
  english_pob_reading: went in to; discreet reference to marital/sexual union
  chosen_spanish_reading: «entró a» conserva el modismo y la discreción del hebreo
  alternative_spanish_readings:
  - «tuvo relaciones con»
  - «se unió a»
  rationale: La forma española evita una explicitación mayor que el texto no exige, pero no disimula la carga relacional del hebreo. Esto mantiene la tensión lexical documentada por la POB inglesa.
  doctrine_reference: Uso bíblico del eufemismo/idioma matrimonial en narrativa genealógica
- issue: Valor de אֲבִי גִלְעָד como parentesco o fundación
  english_pob_reading: father of Gilead may mean immediate father, ancestor, or founder
  chosen_spanish_reading: «padre de Galaad» mantiene abierta la relación exacta
  alternative_spanish_readings:
  - «antepasado de Galaad»
  - «fundador de Galaad»
  rationale: No se debe cerrar la ambigüedad que el auditorio inglés preservó. La forma elegida es fiel al hebreo y permite las tres posibilidades genealógicas sin adjudicar una sola.
  doctrine_reference: Ambigüedad genealógica en fórmulas cronísticas
- issue: Relación de לְקָחָהּ con matrimonio
  english_pob_reading: he took her may also be rendered he married her or he took her as wife
  chosen_spanish_reading: «la tomó» deja implícita la posible lectura matrimonial
  alternative_spanish_readings:
  - «la tomó por esposa»
  - «se casó con ella»
  rationale: La literalidad conserva el enlace con el hebreo y evita reemplazar un verbo con una interpretación cerrada. El contexto permite la lectura matrimonial sin necesidad de explicitarla.
  doctrine_reference: Semántica verbal de לקח en contextos conyugales
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés sin traducirlo mecánicamente. No se introdujeron cambios textuales adicionales respecto al sentido base del WLC y de la POB inglesa; las decisiones revisadas de la POB (modismo sexual discreto, ambigüedad genealógica y verbo de tomar a una mujer) se conservaron en español con equivalentes naturales.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aparece, así que no aplica.
  - Se prefirió «Galaad» como forma española del nombre propio.
  - Se mantuvo un registro genealógico sobrio y legible, sin añadir explicaciones al cuerpo del texto.
  - Los corchetes de nota se colocaron solo en los lugares con alternativa lexical relevante.
