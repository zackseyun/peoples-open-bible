translation:
  language: es
  text: 'Y pasé junto a ti y te vi revolcándote en tu sangre[a], y te dije: «¡En tu sangre, vive!» Sí, te dije: «¡En tu sangre[b], vive!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque estabas en tu sangre, ¡vive!». La preposición hebrea puede entenderse con matiz concesivo en este contexto.'
    reason: alternative_reading
  - marker: b
    text: La frase «¡En tu sangre, vive!» se repite en hebreo para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱבֹר עָלַיִךְ
  english_pob_choice: I passed by you
  chosen_spanish: pasé junto a ti
  alternatives_spanish:
  - pasé por ti
  - pasé a tu lado
  lexicon: HALOT
  rationale: עָבר en este marco narrativo expresa pasar de largo o junto a alguien. «Junto a ti» comunica con naturalidad la relación espacial sin añadir interpretación.
- source_word: וָאֶרְאֵךְ
  english_pob_choice: and saw you
  chosen_spanish: y te vi
  alternatives_spanish:
  - y te miré
  lexicon: HALOT
  rationale: ראה significa sencillamente «ver». La forma breve «te vi» conserva el movimiento narrativo y la inmediatez del hebreo.
- source_word: מִתְבּוֹסֶסֶת
  english_pob_choice: wallowing in your blood
  chosen_spanish: revolcándote
  alternatives_spanish:
  - retorciéndote
  - debatiéndote
  - agitando tu cuerpo
  lexicon: HALOT
  rationale: El participio reflexivo describe un movimiento convulsivo o de agitación en un estado de abandono. «Revolcándote» mantiene la imagen corporal fuerte del texto y evita una paráfrasis moralizante; también conserva mejor la vividez que «retorciéndote» en este contexto.
- source_word: בְּדָמָיִךְ
  english_pob_choice: in your blood
  chosen_spanish: en tu sangre
  alternatives_spanish:
  - en tu sangre derramada
  - cubierta de tu sangre
  lexicon: HALOT
  rationale: El plural hebreo se vierte de manera natural como «sangre» en español. Se mantiene la preposición «en» para no resolver la expresión ni hacia «sangre derramada» ni hacia una lectura más explicativa.
- source_word: וָאֹמַר לָךְ
  english_pob_choice: and I said to you
  chosen_spanish: y te dije
  alternatives_spanish:
  - y te hablé
  - y te dije a ti
  lexicon: HALOT
  rationale: אמר con complemento indirecto se expresa naturalmente como «te dije». Conserva la fórmula de habla repetida sin recargar el estilo.
- source_word: בְּדָמַיִךְ חֲיִי
  english_pob_choice: In your blood, live!
  chosen_spanish: ¡En tu sangre, vive!
  alternatives_spanish:
  - ¡Vive en tu sangre!
  - ¡Aunque estés en tu sangre, vive!
  - ¡Aun en tu sangre, vive!
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y enfática. Se conserva el orden abrupto «En tu sangre, vive!» para no borrar la tensión entre el sentido locativo literal y la posible fuerza concesiva.
- source_word: וָאֹמַר לָךְ ... חֲיִי (repeated)
  english_pob_choice: Yes, I said to you, ‘In your blood, live!’
  chosen_spanish: 'Sí, te dije: “¡En tu sangre, vive!”'
  alternatives_spanish:
  - 'Y te dije otra vez: “¡En tu sangre, vive!”'
  - 'Sí, te dije otra vez: “¡En tu sangre, vive!”'
  lexicon: HALOT
  rationale: La repetición del hebreo se refleja con «Sí» para preservar el énfasis retórico sin alargar indebidamente la línea. Se mantiene la reiteración del mandato como rasgo estilístico significativo.
theological_decisions:
- issue: Fuerza de ב en בְּדָמַיִךְ חֲיִי
  english_pob_reading: Locative/instrumental wording preserved literally as 'In your blood, live!' with a footnoted concessive alternative
  chosen_spanish_reading: Se conserva la formulación literal «En tu sangre, vive!» y se señala que también puede entenderse con matiz concesivo.
  alternative_spanish_readings:
  - «Aunque estabas en tu sangre, vive!»
  - «Aun en tu sangre, vive!»
  rationale: El hebreo admite más de una relación semántica para la preposición. La versión principal conserva la tensión del original sin resolverla en paráfrasis; la nota ofrece la lectura concesiva documentada por el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «wallowing» frente a «thrashing about», pero en español se optó por «revolcándote» porque reproduce mejor la imagen corporal y el movimiento en una sola palabra natural, manteniendo el tono formal y la repetición enfática.
  spanish_consistency_notes:
  - Se mantiene «tú/te» para la segunda persona femenina singular, conforme al hebreo.
  - Se conserva «sangre» sin expandir a «sangre derramada», a fin de no decidir prematuramente entre matiz locativo y posible alusión a nacimiento o sangre de muerte.
  - La puntuación con comillas y signos de exclamación sigue un registro bíblico moderno y claro.
  - No se usa «Señor» ni «Cristo» porque no aparecen en el versículo.
  - La duplicación del mandato queda visible en la línea y en la nota para reflejar el paralelismo hebreo.
