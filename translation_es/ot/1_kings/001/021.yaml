    issue: Calco innecesario en 'seremos contados como culpables'
    rationale: El inglés explicita 'will be counted', pero en español 'seremos considerados culpables' comunica mejor el valor predicativo/jurídico de וְהָיִיתִי ... חַטָּאִים sin rigidez.
