translation:
  language: es
  text: Y él juzgará al mundo con justicia[a]; juzgará a los pueblos con equidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mundo habitado».
    reason: alternative_reading
  - marker: b
    text: O «con rectitud» o «con imparcialidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Y él mismo
  - Pero él
  lexicon: HALOT
  rationale: La conjunción más el pronombre personal continúan el pensamiento con énfasis leve en el sujeto. «Y él» conserva el flujo directo del hebreo sin sobrerrealzar la oposición o el énfasis.
- source_word: יִשְׁפֹּט
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - juzga
  - gobernará
  lexicon: HALOT
  rationale: El verbo שׁפט tiene fuerza judicial y de gobierno, pero aquí se conserva el valor de «juzgar» para ambas cláusulas, siguiendo la revisión inglesa más consistente con el paralelo.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra
  lexicon: HALOT
  rationale: תֵּבֵל suele referirse al mundo habitado o al orden mundial. «El mundo» es natural en español y mantiene el alcance universal sin restringirlo a la esfera física.
- source_word: בְּצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - en rectitud
  - justamente
  lexicon: HALOT
  rationale: צֶדֶק expresa la norma o modo del juicio. En español, «con justicia» comunica con claridad esa cualidad moral y jurídica; «rectitud» queda como alternativa válida pero menos idiomática aquí.
- source_word: לְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a las naciones
  - a los pueblos de la tierra
  lexicon: HALOT
  rationale: לְאֻמִּים denota colectividades humanas, ya sean pueblos o naciones. «Pueblos» preserva el plural y evita modernizar innecesariamente a «naciones» cuando el matiz étnico-colectivo también es posible.
- source_word: בְּמֵישָׁרִים
  english_pob_choice: with equity
  chosen_spanish: con equidad
  alternatives_spanish:
  - con rectitud
  - con justicia
  - con imparcialidad
  lexicon: HALOT
  rationale: מֵישָׁרִים expresa equidad, rectitud e integridad imparcial. «Con equidad» sigue de cerca el sentido formal preferido en la revisión inglesa y se distingue bien de la primera cláusula.
theological_decisions:
- issue: Doble descripción del juicio divino universal
  english_pob_reading: The verse speaks of God's universal judgment and rule in morally right and equitable terms, without narrowing it to a specific eschatological timetable.
  chosen_spanish_reading: El versículo presenta el juicio universal de Dios en términos moralmente justos y equitativos, sin fijar un calendario escatológico específico.
  alternative_spanish_readings:
  - Un juicio presente y continuo
  - Un juicio final exclusivamente escatológico
  rationale: Los imperfectos hebreos en poesía pueden expresar futuro o acción característica. La traducción conserva la orientación futura natural en este contexto, pero no resuelve el momento exacto del cumplimiento más allá de la afirmación del gobierno justo de Dios.
  doctrine_reference: Mantener la tensión teológica sin resolverla fuera del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió mantener «judge» en ambos miembros y reemplazó «fairness» por «equity» para acercarse más a מֵישָׁרִים. La versión española sigue esa decisión al usar «juzgará» dos veces y «con equidad» en la segunda cláusula, mientras que en la primera conserva «con justicia» para צדק.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en el contexto; este versículo no lo contiene.
  - «Justicia» y «equidad» se distinguen para reflejar el paralelismo hebreo entre צֶדֶק y מֵישָׁרִים.
  - Se evita alternar con «gobernará» para no diluir la repetición verbal del hebreo, en línea con la revisión auditada.
  - La puntuación con punto y coma ayuda a reflejar el paralelo poético de dos miembros coordinados.
