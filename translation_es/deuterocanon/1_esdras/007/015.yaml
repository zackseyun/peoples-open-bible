translation:
  language: es
  text: porque había cambiado el parecer del rey de Asiria[a] hacia ellos, para fortalecer sus manos en la obra del Señor, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego y el paralelo hebreo leen «rey de Asiria»; aunque el contexto más amplio de Esdras apunta al gobernante persa, aquí se conserva la expresión del testimonio base en vez de armonizarla.
    reason: alternative_reading
lexical_decisions:
- source_word: μετέστρεψεν
  english_pob_choice: had turned
  chosen_spanish: había vuelto
  alternatives_spanish:
  - había girado
  - había cambiado
  - había dirigido de nuevo
  lexicon: BDAG
  rationale: El verbo griego expresa un cambio de orientación o una inversión de la disposición. En español, «había vuelto» conserva la idea de volver o desviar una disposición sin sonar tan mecánico como «había turnado», y encaja con la subordinada causal introducida por ὅτι.
- source_word: βουλήν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - intención
  lexicon: BDAG
  rationale: βουλή puede referirse a consejo, plan o propósito. «Consejo» mantiene el matiz deliberativo del texto y funciona bien en español bíblico, sin cerrar innecesariamente el sentido a una mera estrategia.
- source_word: τοῦ βασιλέως Ἀσσυρίων
  english_pob_choice: of the king of Assyria
  chosen_spanish: del rey de Asiria
  alternatives_spanish:
  - del rey asirio
  lexicon: BDAG
  rationale: Se conserva la forma del testimonio griego, que dice literalmente «rey de Asiria». Aunque el contexto mayor de Esdras apunta al gobernante persa, el texto base y el paralelo hebreo mantienen esta designación, por lo que no se armoniza en la traducción principal.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: toward them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - sobre ellos
  - en favor de ellos
  lexicon: BDAG
  rationale: La preposición con acusativo expresa dirección hacia un objetivo. «Hacia ellos» comunica esa orientación de modo natural y evita sobreinterpretar el valor positivo como si el griego dijera explícitamente «en favor de ellos».
- source_word: κατισχῦσαι τὰς χεῖρας αὐτῶν
  english_pob_choice: to strengthen their hands
  chosen_spanish: para fortalecer sus manos
  alternatives_spanish:
  - para hacer fuertes sus manos
  - para animarlos
  lexicon: BDAG
  rationale: Se preserva el modismo bíblico de «fortalecer las manos», que corresponde bien al paralelo hebreo y mantiene la imagen de capacitar o dar ánimo para la tarea.
- source_word: τὰ ἔργα Κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: the work of the Lord, the God of Israel
  chosen_spanish: la obra del Señor, el Dios de Israel
  alternatives_spanish:
  - la obra del Señor Dios de Israel
  - la obra del Señor, Dios de Israel
  lexicon: BDAG
  rationale: El griego tiene «las obras», pero el inglés POB, siguiendo la lectura del flujo del texto, adopta el singular colectivo «the work». En español, «la obra» es una forma natural y fiel. «Señor» refleja el κύριος griego, mientras que «el Dios de Israel» preserva la apposición teológica sin convertirla en un título más elaborado de lo que el texto exige.
theological_decisions:
- issue: Cómo renderizar κύριος en este contexto de cita/eco veterotestamentario
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto usa «Yahvé» para יהוה en textos hebreos, aquí la fuente inmediata es el griego κύριος. Siguiendo el criterio del POB inglés, se conserva «Señor» en el texto principal para respetar el testimonio griego sin forzar una identificación editorial directa con el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → Yahvé'
- issue: Tratar la expresión histórica «rey de Asiria» sin armonizarla con el contexto persa de Esdras
  english_pob_reading: retain 'king of Assyria' in the main text
  chosen_spanish_reading: mantener «rey de Asiria»
  alternative_spanish_readings:
  - rey de Persia
  - el rey
  rationale: La traducción debe dejar visible la tensión documental del testimonio griego y su paralelo hebreo. Cambiarlo a «rey de Persia» resolvería la dificultad a costa de borrar un dato transmitido por la fuente.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al reflejar la relación causal con «porque», mantener el valor direccional de ἐπʼ αὐτούς como «hacia ellos» y conservar la idea de capacitar para la tarea con «fortalecer sus manos en la obra». También respeta la decisión revisada de no traducir la frase como si fuera «para la obra», sino con un matiz de participación activa en ella.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con el criterio del proyecto para el griego, mientras «Yahvé» queda reservado para el hebreo YHWH directo.
  - Se usa «Asiria» y no «asirio» para reflejar la construcción genitiva del original y la formulación del audit trail en inglés.
  - «La obra» conserva el singular colectivo del flujo traducido en inglés, aunque el griego tenga plural; se evita una expansión interpretativa.
  - La imagen idiomática «fortalecer sus manos» se conserva por claridad bíblica y correspondencia con el paralelo hebreo.
