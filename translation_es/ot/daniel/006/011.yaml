  text: וְ֠/דָנִיֵּאל כְּ/דִ֨י יְדַ֜ע דִּֽי רְשִׁ֤ים כְּתָבָ/א֙ עַ֣ל לְ/בַיְתֵ֔/הּ וְ/כַוִּ֨ין פְּתִיחָ֥ן לֵ/הּ֙ בְּ/עִלִּיתֵ֔/הּ נֶ֖גֶד יְרוּשְׁלֶ֑ם וְ/זִמְנִין֩ תְּלָתָ֨ה בְ/יוֹמָ֜/א ה֣וּא בָּרֵ֣ךְ עַל בִּרְכ֗וֹ/הִי וּ/מְצַלֵּ֤א וּ/מוֹדֵא֙ קֳדָ֣ם אֱלָהֵ֔/הּ כָּ/ל קֳבֵל֙ דִּֽי הֲוָ֣א עָבֵ֔ד מִן קַדְמַ֖ת דְּנָֽה־׀־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/011.yaml
  text: And when Daniel knew that the document had been signed[a], he went to his house. Now the windows in his upper room were open toward Jerusalem, and three times a day he knelt on his knees and prayed and gave thanks before his God[c][b], just as he had been doing before this.
  footnotes:
  - marker: a
    text: Or "the writing had been signed"; the Aramaic refers to the officially written decree being formally enacted.
    reason: lexical_alternative
  - marker: b
    text: Or "facing Jerusalem."
    reason: lexical_alternative
  - marker: c
    text: The phrase "he knelt on his knees" expresses Daniel's prayer posture; the underlying verb is associated with kneeling here in context.
    reason: cultural_note
