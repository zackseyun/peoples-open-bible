  to: 'Y recordé la profecía de Amós[a], como dijo: «Sus fiestas se convertirán en duelo, y todos sus regocijos en lamento». Y lloré.'
  rationale: Se ajusta la cita a la segunda persona plural del original mediante «sus... sus», que en español neutral de lectura pública preserva mejor el plural sin forzar «vosotros/vuestras». También se corrige la nota al pie a una formulación idiomática. El resto del versículo puede mantenerse por fidelidad y buena legibilidad.
