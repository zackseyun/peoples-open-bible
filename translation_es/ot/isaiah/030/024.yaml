review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del POB inglés: animales de labor, alimento preparado de calidad, y la imagen agrícola del aventado con dos herramientas. Sin embargo, una elección verbal introduce un matiz temporal no presente en el original: «habrá sido aventado» sugiere futuro perfecto, mientras que el hebreo relativo y el inglés apuntan simplemente al forraje como ya/propiamente aventado. También conviene simplificar la relativa para mayor naturalidad española.'
  spanish_quality_summary: El texto es generalmente claro, digno y legible. «Bueyes», «forraje» y «bieldo» están bien elegidos para registro bíblico-agropecuario. «Asnos» es aceptable, aunque algo más rígido que «burros»; no requiere cambio. La frase «el cual habrá sido aventado» suena demasiado pesada y menos natural que «que ha sido aventado».
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu o esclavo. Las decisiones léxicas principales siguen de cerca el expediente inglés y el hebreo. Se preservan correctamente las notas sobre «sazonado/salado» y sobre las herramientas de aventar.
  issues:
  - severity: medium
    issue: «habrá sido aventado» añade un matiz temporal ajeno al hebreo
    rationale: אֲשֶׁר זֹרֶה describe el forraje como aventado/procesado; el futuro perfecto español sugiere anterioridad futura innecesaria. «que ha sido aventado» o «aventado» comunica mejor el sentido.
  - severity: low
    issue: La relativa «el cual» suena más pesada de lo necesario
    rationale: En español bíblico moderno, «que» resulta más natural y fluido sin pérdida de precisión.
  revised_spanish_text: Y los bueyes y los asnos que trabajan la tierra comerán forraje sazonado[a], que ha sido aventado con pala y con bieldo[b].
