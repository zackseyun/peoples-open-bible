translation:
  language: es
  text: para que tus hijos, a quienes amaste, aprendan, oh Yahvé, que no es el producto de las cosechas lo que sustenta a un hombre[a], sino tu palabra la que preserva a los que confían en ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Esta línea probablemente alude a Deuteronomio 8:3: la vida humana no se sostiene solo por alimento, sino por la palabra de Dios.'
    reason: cross_reference
  - marker: b
    text: O «los que te creen». El participio griego puede expresar tanto confianza como respuesta creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα μάθωσιν
  english_pob_choice: so that ... might learn
  chosen_spanish: para que ... aprendan
  alternatives_spanish:
  - a fin de que ... aprendan
  - para que ... lleguen a saber
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad; en español, «para que» comunica de forma natural ese valor purposivo sin añadir contenido no presente en el griego.
- source_word: οἱ υἱοί σου
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: BDAG
  rationale: El griego dice literalmente «tus hijos». «Hijos» conserva el paralelismo y la referencia filial sin neutralizar el término ni introducir una restricción extra que el contexto no exige.
- source_word: οὓς ἠγάπησας
  english_pob_choice: whom you loved
  chosen_spanish: a quienes amaste
  alternatives_spanish:
  - a quienes has amado
  - a quienes quisiste
  lexicon: BDAG
  rationale: El aoristo se vierte naturalmente en pasado simple. «A quienes amaste» mantiene la afirmación directa del amor divino con solemnidad y claridad.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - Señor
  - oh Señor
  lexicon: BDAG
  rationale: Aunque el texto griego usa Κύριε, aquí corresponde Yahvé por la convención del proyecto cuando el vocativo griego remite al nombre divino. Se conserva además la fuerza vocativa con «oh».
- source_word: οὐχ αἱ γενέσεις τῶν καρπῶν
  english_pob_choice: it is not the produce of crops
  chosen_spanish: no es el producto de las cosechas
  alternatives_spanish:
  - no son los frutos de la tierra
  - no es el rendimiento de los cultivos
  lexicon: LSJ
  rationale: γενέσεις aquí apunta a producto, producción o rendimiento. «Producto de las cosechas» comunica con naturalidad la idea agrícola amplia, sin restringirla a «fruta» ni forzar un calco.
- source_word: τρέφουσιν ἄνθρωπον
  english_pob_choice: nourishes a man
  chosen_spanish: el que sustenta a un hombre
  alternatives_spanish:
  - el que alimenta a un hombre
  - el que nutre a un ser humano
  lexicon: BDAG
  rationale: τρέφουσιν requiere un verbo de sostén vital; «sustenta» recoge mejor el valor de alimentar y mantener con vida. Se mantiene el singular genérico de ἄνθρωπον con «un hombre».
- source_word: ἀλλὰ τὸ ῥῆμά σου
  english_pob_choice: but your word
  chosen_spanish: sino tu palabra
  alternatives_spanish:
  - sino tu dicho
  - sino lo que dices
  lexicon: BDAG
  rationale: ῥῆμα se traduce de forma natural como «palabra», especialmente en un contexto de autoridad divina y resonancia bíblica. «Sino» expresa con precisión el contraste adversativo.
- source_word: τοὺς σοὶ πιστεύοντας
  english_pob_choice: those who trust in you
  chosen_spanish: a los que confían en ti
  alternatives_spanish:
  - a los que creen en ti
  - a los que ponen su confianza en ti
  lexicon: BDAG
  rationale: El participio con dativo puede expresar creer o confiar. «Confían en ti» reproduce bien la confianza personal y dependiente que el contexto sugiere, sin reducirlo a una mera adhesión intelectual.
- source_word: διατηρεῖ
  english_pob_choice: preserves
  chosen_spanish: preserva
  alternatives_spanish:
  - sostiene
  - guarda
  lexicon: BDAG
  rationale: διατηρεῖ comunica preservar, mantener a salvo o conservar con vida. «Preserva» conserva el contraste con el alimento físico y mantiene el matiz de protección y continuidad vital.
theological_decisions:
- issue: Posible eco de Deuteronomio 8:3 sobre la vida sostenida por la palabra de Dios
  english_pob_reading: Retain the allusive wording 'your word preserves' without importing fuller quotation language such as 'man shall not live by bread alone.'
  chosen_spanish_reading: Conservar la alusión mediante «tu palabra preserva» sin insertar la formulación completa de Deuteronomio 8:3.
  alternative_spanish_readings:
  - expandir la línea para hacer explícita la cita de Deuteronomio
  - armonizarla con «no solo de pan vivirá el hombre»
  rationale: El griego de Sabiduría tiene su propia redacción. La versión española mantiene la resonancia bíblica sin sobretraducir ni fusionar el verso con una cita más amplia que no aparece en el texto fuente.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor genérico de ἄνθρωπον
  english_pob_reading: man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - ser humano
  rationale: El singular genérico se conserva para reflejar la forma del griego y su fuerza representativa. «Un hombre» es la forma más directa y fiel en español sin borrar el singular.
  doctrine_reference: Translation philosophy §4
- issue: Tratamiento del vocativo Κύριε en relación con el nombre divino
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Señor
  - Yahvé
  rationale: Dado el marco editorial del proyecto, el vocativo se hace explícito como nombre divino en lugar de ocultarlo tras «Señor». «Oh Yahvé» respeta el tono de oración y la identificación teológica del destinatario.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se tomó en cuenta el expediente inglés más reciente, incluida la revisión que prefirió «children» sobre «sons» por naturalidad en inglés. En español se conserva «hijos» porque corresponde literalmente a οἱ υἱοί σου y mantiene la precisión filológica del original sin necesidad de neutralización.
  spanish_consistency_notes:
  - Se usa Yahvé conforme al estándar del proyecto para el nombre divino.
  - Se traduce ῥῆμα como «palabra» y πιστεύω con dativo como «confiar en» en este contexto.
  - Se mantiene el singular genérico de ἄνθρωπον con «un hombre».
  - Se evita armonizar el verso con la redacción completa de Deuteronomio 8:3.
