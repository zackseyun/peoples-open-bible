  yaml_path: translation/ot/jeremiah/046/025.yaml
  text: 'Yahweh of hosts[a], the God of Israel, says: Behold, I am about to punish Amon of No, and Pharaoh, and Egypt, and her gods, and her kings, and Pharaoh[b], and those who trust in him.'
  footnotes:
