lexical_decisions:
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa del pan de la Presencia
  lexicon: HALOT
  rationale: שֻׁלְחָן designa simplemente una mesa; en este contexto tabernacular se entiende como la mesa sagrada, pero el hebreo de este versículo no repite la designación más completa. «Mesa» conserva la concisión del texto fuente y suena natural en español.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus artículos
  lexicon: HALOT
  rationale: כְּלִי tiene un rango amplio de objetos, implementos o utensilios. «Utensilios» comunica bien ese conjunto en español moderno y mantiene el sentido funcional aplicado a las piezas del tabernáculo.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - la menorá
  lexicon: HALOT
  rationale: מְנוֹרָה es un soporte de lámparas; «candelabro» expresa su función de forma clara y natural en español, mientras que «menorá» se reserva como alternativa transliterada pero no como opción principal.
- source_word: כֵּלֶיהָ
  english_pob_choice: its utensils
  chosen_spanish: sus utensilios
  alternatives_spanish:
  - sus vasos
  - sus artículos
  lexicon: HALOT
  rationale: El sufijo femenino remite a la menorá / candelabro. Se conserva la misma solución léxica que para כְּלֵי en el segmento anterior para mantener consistencia y claridad.
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: el altar del incienso
  alternatives_spanish:
  - el altar de incienso
  - el altar de la fragancia
  lexicon: HALOT
  rationale: La construcción en hebreo nombra el altar asociado con el incienso. «Del incienso» reproduce bien la relación de pertenencia/asociación y mantiene un registro bíblico claro en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una traducción concisa de los objetos del tabernáculo y conserva una nota alternativa para מִזְבַּח הַקְּטֹרֶת; el español sigue esa misma línea, sin ampliar innecesariamente las denominaciones cultuales.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o transliteraciones no necesarias porque este versículo no contiene el nombre divino.
  - Se mantuvo la serie coordinada simple con repeticiones de «y» para reflejar la sintaxis hebrea.
  - «Utensilios» se usó de manera uniforme para כֵּלִים, sin variar a «vasos» para no introducir una diferencia no señalada por la fuente.
