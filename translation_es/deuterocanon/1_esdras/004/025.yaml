translation:
  language: es
  text: Pero el rey prevalece sobre ellos y gobierna sobre ellos, y es su señor, y todo lo que les diga, le obedecen[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le escuchan» / «le hacen caso». El verbo griego es literalmente de la familia de «oír», pero aquí tiene el sentido de obedecer a una orden real.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  english_pob_choice: But the king
  chosen_spanish: Pero el rey
  alternatives_spanish:
  - Y el rey
  - Ahora bien, el rey
  lexicon: LSJ
  rationale: δέ tiene aquí un matiz adversativo o de continuación argumentativa; en español, «Pero» conserva bien ese giro. βασιλεύς se traduce de forma directa como «rey».
- source_word: ὑπερισχύει
  english_pob_choice: prevails over
  chosen_spanish: prevalece sobre
  alternatives_spanish:
  - es más fuerte que
  - tiene ventaja sobre
  lexicon: LSJ
  rationale: El verbo expresa superioridad o prevalencia. «Prevalece sobre» mantiene la relación comparativa sin volver la frase innecesariamente coloquial.
- source_word: κυριεύει αὐτῶν
  english_pob_choice: rules over them
  chosen_spanish: gobierna sobre ellos
  alternatives_spanish:
  - señorea sobre ellos
  - domina sobre ellos
  lexicon: LSJ
  rationale: κυριεύω implica ejercer señorío o dominio. «Gobierna sobre ellos» es claro y natural en español, y conserva la idea de autoridad efectiva.
- source_word: δεσπόζει αὐτῶν
  english_pob_choice: is master over them
  chosen_spanish: es su señor
  alternatives_spanish:
  - tiene dominio sobre ellos
  - es dueño de ellos
  lexicon: LSJ
  rationale: δεσπόζω es más fuerte que κυριεύω y apunta a señorío absoluto. «Es su señor» preserva esa intensificación en español sin perder legibilidad; se mantiene la distinción semántica respecto de «gobierna».
- source_word: πᾶν ὃ ἐὰν εἴπῃ αὐτοῖς
  english_pob_choice: whatever he says to them
  chosen_spanish: todo lo que les diga
  alternatives_spanish:
  - cuanto les diga
  - cualquier cosa que les diga
  lexicon: LSJ
  rationale: 'La construcción expresa indefinición: «todo lo que» / «cuanto». «Todo lo que les diga» es idiomático en español y refleja adecuadamente el valor del original.'
- source_word: ἐνακούουσιν
  english_pob_choice: they obey
  chosen_spanish: lo obedecen
  alternatives_spanish:
  - le escuchan
  - le hacen caso
  lexicon: LSJ
  rationale: Aunque el verbo está relacionado etimológicamente con oír/escuchar, en este contexto de mandato real la fuerza es de obediencia. «Lo obedecen» capta mejor esa función que una traducción meramente auditiva.
theological_decisions:
- issue: Relación entre escuchar y obedecer en ἐνακούουσιν
  english_pob_reading: The Greek verb is literally a hearing-word, but here it carries the sense of obedience to royal command.
  chosen_spanish_reading: En este contexto, el verbo se vierte como obediencia, aunque su trasfondo sea de oír/escuchar.
  alternative_spanish_readings:
  - le escuchan
  - le prestan atención
  rationale: El pasaje está describiendo la autoridad del rey; por eso la respuesta adecuada no es solo auditiva sino obediencial. La nota debe conservar la tensión léxica sin diluirla.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente; se sigue el texto auditado de la POB inglesa y el griego de Swete con concordancia alta y observación menor sobre la última cláusula.
  spanish_consistency_notes:
  - 'Se conservó la distinción entre κυριεύει y δεσπόζει mediante dos expresiones distintas en español: «gobierna sobre» y «es su señor».'
  - Se evitó traducir ἐνακούουσιν de manera puramente literal como «oyen» para no perder el valor contextual de obediencia.
  - Se mantuvo un registro sobrio y publicable, adecuado para una Biblia de lectura eclesial amplia.
