translation:
  language: es
  text: Jehoiaquim tenía veinticinco años[a] cuando comenzó a reinar, y reinó once años en Jerusalén. Hizo lo malo[b] a los ojos de Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «era hijo de veinticinco años». El hebreo usa un modismo de edad que en español se expresa de forma más natural con la edad directa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «hizo el mal». Se mantiene la fórmula evaluativa del hebreo sin especificar más de lo que dice el texto.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: was twenty-five years old
  chosen_spanish: tenía veinticinco años
  alternatives_spanish:
  - era hijo de veinticinco años
  - era de veinticinco años
  lexicon: HALOT
  rationale: El hebreo usa el modismo de edad 'hijo de... años'. En español, la forma natural y fiel es expresar la edad directamente con 'tenía veinticinco años', sin conservar mecánicamente 'hijo de'.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joaquim
  alternatives_spanish:
  - Jehoiaquim
  - Joacim
  lexicon: Uso onomástico tradicional y comparación con la forma hebrea
  rationale: Se adopta 'Joaquim' como forma española breve y reconocible del nombre hebreo, manteniendo la referencia al personaje histórico sin introducir una transliteración innecesariamente pesada.
- source_word: בְּמָלְכ֔וֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - al comenzar a reinar
  - cuando llegó a ser rey
  lexicon: HALOT
  rationale: La construcción temporal marca el momento de ascensión al trono. 'Comenzó a reinar' expresa con naturalidad en español el valor inceptivo de la frase.
- source_word: וְאַחַת עֶשְׂרֵה שָׁנָה מָלַךְ
  english_pob_choice: and he reigned eleven years
  chosen_spanish: y reinó once años
  alternatives_spanish:
  - y fue rey once años
  - y gobernó once años
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente más directo de מָלַךְ en un aviso regnal; conserva el valor dinástico y evita una paráfrasis más débil.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: nombre geográfico estándar
  rationale: Topónimo conocido que no requiere aclaración adicional.
- source_word: וַיַּעַשׂ הָרַע
  english_pob_choice: He did what was evil
  chosen_spanish: Hizo lo malo
  alternatives_spanish:
  - Hizo el mal
  - Hizo lo que era malo
  lexicon: HALOT
  rationale: El hebreo usa una fórmula evaluativa de conducta. 'Hizo lo malo' preserva esa valoración sin añadir explicaciones interpretativas.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a la vista de
  - ante
  lexicon: HALOT
  rationale: Se conserva el modismo evaluativo. 'A los ojos de' es idiomático en español y refleja bien el juicio de perspectiva del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto en español: ''Yahvé'' para el Tetragrama, preservando el nombre divino personal en lugar de sustituirlo por un título.'
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El sufijo posesivo señala relación personal y responsabilidad de pacto. 'Su Dios' es la forma natural en español y mantiene la referencia al Dios de Judá.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama. La traducción española del POB mantiene el nombre propio divino, y 'Yahvé' es la forma española estable del mismo principio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Evaluación moral resumida en וַיַּעַשׂ הָרַע
  english_pob_reading: He did what was evil
  chosen_spanish_reading: Hizo lo malo
  alternative_spanish_readings:
  - Hizo el mal
  - Hizo lo que era malo
  rationale: La frase hebrea formula un juicio moral de manera breve y convencional. 'Hizo lo malo' conserva la carga evaluativa sin suavizarla ni expandirla indebidamente.
  doctrine_reference: Uso narrativo y evaluativo del hebreo bíblico en fórmulas regnales
