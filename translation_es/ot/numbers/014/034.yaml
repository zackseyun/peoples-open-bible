translation:
  language: es
  text: Según el número de los días en que espiaron[a] la tierra, cuarenta días, día por año, día por año, llevarán sus iniquidades cuarenta años, y conocerán mi alienación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reconocieron». El verbo hebreo se refiere a una misión de reconocimiento de la tierra; «espiaron» preserva mejor ese matiz que una opción más neutral como «exploraron».
    reason: lexical_alternative
  - marker: b
    text: O «mi hostilidad» o «mi disgusto». La expresión hebrea es rara y aquí sugiere extrañamiento u oposición judicial de parte de Dios hacia esta generación rebelde, no un «quebrantamiento de promesa» ni infidelidad divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפַּר הַיָּמִים
  english_pob_choice: According to the number of the days
  chosen_spanish: Según el número de los días
  alternatives_spanish:
  - De acuerdo con el número de los días
  - Conforme al número de los días
  lexicon: HALOT
  rationale: La construcción hebrea expresa correspondencia o proporción entre los días de exploración y el período de juicio. «Según el número de» conserva esa relación sin sonar forzado en español.
- source_word: תַּרְתֶּם
  english_pob_choice: you spied out
  chosen_spanish: exploraron
  alternatives_spanish:
  - reconocieron
  - espiaron
  lexicon: HALOT
  rationale: En este contexto el verbo se refiere a la misión de reconocimiento de la tierra. «Exploraron» es claro y natural en español; «espiaron» sería más fuerte, pero puede sonar más acusatorio que el contexto inmediato exige.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En Números, el referente es la tierra prometida, pero el hebreo dice simplemente «la tierra». Se mantiene esa forma más directa sin sobreexplicarla.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: forty days
  chosen_spanish: cuarenta días
  lexicon: HALOT
  rationale: Correspondencia numérica directa y sin ambigüedad.
- source_word: יוֹם לַשָּׁנָה יוֹם לַשָּׁנָה
  english_pob_choice: a day for a year, a day for a year
  chosen_spanish: día por año, día por año
  alternatives_spanish:
  - un día por cada año
  - día por cada año
  lexicon: HALOT
  rationale: La repetición hebrea es enfática y se conserva en español. «Día por año» reproduce la fórmula de equivalencia de manera sobria y fiel.
- source_word: תִּשְׂאוּ אֶת עֲוֺנֹתֵיכֶם
  english_pob_choice: you shall bear your iniquities
  chosen_spanish: llevarán sus iniquidades
  alternatives_spanish:
  - llevarán su culpa
  - sufrirán por sus iniquidades
  lexicon: HALOT
  rationale: נשא עון es un modismo de gran peso que implica cargar con la culpa y sus consecuencias. «Llevarán sus iniquidades» preserva la imagen concreta y el tono judicial del hebreo.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: Equivalencia directa del período de juicio.
- source_word: וִידַעְתֶּם
  english_pob_choice: and you shall know
  chosen_spanish: y conocerán
  alternatives_spanish:
  - y sabrán
  - y experimentarán
  lexicon: HALOT
  rationale: ידע puede incluir conocimiento experiencial. «Conocerán» mantiene esa amplitud sin añadir una interpretación demasiado explícita.
- source_word: תְּנוּאָתִי
  english_pob_choice: my alienation
  chosen_spanish: mi alejamiento
  alternatives_spanish:
  - mi alienación
  - mi hostilidad
  - mi disgusto
  - mi oposición
  lexicon: HALOT
  rationale: La revisión inglesa privilegia una idea de extrañamiento o retirada relacional más que oposición activa. «Mi alejamiento» comunica esa distancia judicial/relacional y evita la lectura tradicional de «quebrantamiento de promesa», que sugeriría infidelidad divina no requerida por el hebreo.
theological_decisions:
- issue: Sentido de תְּנוּאָתִי en un contexto de juicio divino
  english_pob_reading: my alienation
  chosen_spanish_reading: mi alejamiento
  alternative_spanish_readings:
  - mi alienación
  - mi hostilidad
  - mi disgusto
  - mi oposición
  rationale: La fórmula no debe entenderse como una falla de Dios en cumplir su palabra, sino como la expresión de su relación de rechazo/retirada frente a una generación rebelde. «Mi alejamiento» conserva el matiz de extrañamiento y juicio sin imputar infidelidad divina.
  doctrine_reference: Translation philosophy §1, §3
- issue: Correspondencia simbólica entre cuarenta días y cuarenta años
  english_pob_reading: a day for a year, a day for a year
  chosen_spanish_reading: día por año, día por año
  alternative_spanish_readings:
  - un día por cada año
  - día por cada año
  rationale: 'La repetición no es mero estilo: marca la proporcionalidad del castigo. Mantenerla en español ayuda a preservar la fuerza interpretativa del pasaje.'
  doctrine_reference: Números 14:34; principio de juicio proporcional
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó el último segmento de «my opposition» a «my alienation» para reflejar mejor el matiz de extrañamiento/retirada. También se respetó la decisión auditada de conservar la repetición enfática «a day for a year, a day for a year».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton está presente; este versículo no lo contiene.
  - Se mantuvo «la tierra» en lugar de «la tierra prometida» para no expandir el hebreo.
  - «Iniquidades» conserva el peso jurídico-moral del modismo נשא עון.
  - La puntuación con punto y coma separa la fórmula proporcional del resultado de juicio sin alterar la sintaxis hebrea.
