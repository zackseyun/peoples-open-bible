translation:
  language: es
  text: 'Y de Neftalí dijo: «Neftalí[a], saciado de favor y colmado de la bendición de Yahvé, toma posesión del mar y del sur»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «el occidente y el sur», pues «mar» puede funcionar como término direccional para el oeste en hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְנַפְתָּלִי
  english_pob_choice: And of Naphtali
  chosen_spanish: Y de Neftalí
  alternatives_spanish:
  - Y a Neftalí
  - Y acerca de Neftalí
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula de bendición introduce al destinatario o asunto del dicho. En español, «de» reproduce con naturalidad esa relación de encabezamiento en la serie de bendiciones tribales.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: HALOT
  rationale: Verbo narrativo simple que introduce el oráculo; «dijo» preserva su fuerza directa y es la opción más natural en español.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: HALOT
  rationale: Nombre propio tribal transliterado a la forma usual en español bíblico, sin perder la referencia al mismo nombre hebreo.
- source_word: שְׂבַע
  english_pob_choice: satisfied with
  chosen_spanish: saciado de
  alternatives_spanish:
  - satisfecho con
  - colmado de
  lexicon: HALOT
  rationale: Como adjetivo, expresa estar plenamente satisfecho o repleto. En español, «saciado de» conserva bien el valor de plenitud sin sonar forzado.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - benevolencia
  - agrado
  - aceptación
  lexicon: HALOT
  rationale: Aquí denota favor o benevolencia otorgada, en paralelo con la bendición divina. «Favor» es breve, claro y fiel al matiz relacional.
- source_word: וּמָלֵא
  english_pob_choice: and full of
  chosen_spanish: y colmado de
  alternatives_spanish:
  - y lleno de
  - y rebosante de
  lexicon: HALOT
  rationale: El predicado coordina con שׂבע y expresa plenitud. «Colmado de» mantiene el paralelismo y sugiere abundancia sin agregar contenido.
- source_word: בִּרְכַּת יְהוָה
  english_pob_choice: the blessing of Yahweh
  chosen_spanish: la bendición de Yahvé
  alternatives_spanish:
  - la bendición de Yahveh
  - la bendición de Yahwéh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma exigida por el proyecto, no como sustitución por un título. «Bendición» reproduce el sustantivo constructo sin ampliarlo.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el occidente
  lexicon: HALOT
  rationale: El sentido literal es «mar». El valor direccional posible se preserva en nota, pero el texto principal mantiene la lectura léxica directa.
- source_word: וְדָרוֹם
  english_pob_choice: and the south
  chosen_spanish: y el sur
  alternatives_spanish:
  - y la región del sur
  - y el mediodía
  lexicon: HALOT
  rationale: דָרוֹם designa el sur o la región meridional; «el sur» es la opción más clara y sobria en español.
- source_word: יְרָשָׁה
  english_pob_choice: possess
  chosen_spanish: poseerá
  alternatives_spanish:
  - tomará posesión de
  - heredará
  lexicon: HALOT
  rationale: En este contexto de bendición territorial, ירשׁ expresa toma de posesión. «Poseerá» preserva el matiz de dominio/ocupación más directamente que «heredará».
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo contiene el nombre propio divino, no un título. Se mantiene la decisión del proyecto de transliterarlo como «Yahvé», preservando la referencia al nombre pactal revelado a Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin cambios recientes en la revisión inglesa; por ello, esta versión española sigue de cerca la lectura estable de la POB inglesa, conservando la alternativa direccional en nota para no borrar la ambigüedad documentada de יָם.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evita sustituir «mar» por «occidente» en el cuerpo principal, porque la lectura literal es la adoptada en la base inglesa y la ambigüedad queda documentada en la nota.
  - «Neftalí» sigue la transliteración española habitual del nombre tribal.
  - La estructura de cita con dos puntos y comillas reproduce adecuadamente la fórmula introductoria del dicho.
