translation:
  language: es
  text: 'y para el sacrificio de paz[a]: dos reses, cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Eliasaf hijo de Deuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar' para 'sacrificio de paz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para
  - como sacrificio de
  lexicon: HALOT
  rationale: La secuencia hebrea introduce otro elemento dentro de la lista de ofrendas; conservar tanto la conjunción como la preposición mantiene el estilo inventarial del texto.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: En español, 'ofrendas de paz' conserva el término cultual tradicional sin ocultar el sentido de bienestar/completitud que admite el hebreo.
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos bovinos
  lexicon: HALOT
  rationale: בָּקָר es un término colectivo para ganado bovino; 'cabezas de ganado' evita precisar sexo o especie secundaria y funciona bien en un inventario sacrificial.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos ovinos
  - cinco ramos
  lexicon: HALOT
  rationale: אֵילִם designa carneros; 'carneros' es el equivalente natural y fiel en español.
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco cabrones
  lexicon: HALOT
  rationale: עַתֻּדִים señala machos cabríos; 'machos cabríos' preserva el matiz sexual del término sacrificial con registro claro y digno.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five one-year-old lambs
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos añales
  lexicon: HALOT
  rationale: La expresión constructa literal 'hijos de un año' se expresa de forma idiomática en español como 'de un año', conservando la exigencia de edad.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Este fue el ofrecimiento de
  - Ésta fue la ofrenda de
  lexicon: HALOT
  rationale: En el cierre narrativo, el pretérito español resulta natural y fiel; 'ofrenda' traduce קָרְבָּן en contexto sacrificial.
- source_word: אֶלְיָסָף
  english_pob_choice: Eliasaph
  chosen_spanish: Eliasaf
  alternatives_spanish:
  - Eliasaph
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con ortografía española ampliamente legible; 'Eliasaf' evita una forma inglesa no necesaria en el texto español.
- source_word: בֶּן דְּעוּאֵל
  english_pob_choice: son of Deuel
  chosen_spanish: hijo de Deuel
  alternatives_spanish:
  - hijo de Deuel
  lexicon: convención patronímica
  rationale: La relación patronímica se expresa de manera directa y natural en español mediante 'hijo de'.
theological_decisions:
- issue: הַשְּׁלָמִים / peace offerings
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: No se fuerza una paráfrasis doctrinal; se mantiene un término cultual reconocible que aún permite percibir la amplitud semántica del hebreo.
  doctrine_reference: Levítico 3; HALOT s.v. שְׁלָמִים
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden plenamente; no se registran revisiones aplicadas en el tramo de referencia, y la traducción española sigue la misma lectura sin cambios textuales relevantes.
  spanish_consistency_notes:
  - Se mantiene un estilo inventarial y repetitivo acorde con el género de Números 7.
  - Se evita la transliteración inglesa 'Eliasaph' dentro del texto principal, usando la forma española 'Eliasaf'.
  - '''Ofrendas de paz'' conserva la terminología bíblica estándar sin ocultar el campo semántico de שְׁלָמִים.'
