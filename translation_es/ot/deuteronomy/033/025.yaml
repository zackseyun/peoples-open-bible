translation:
  language: es
  text: Tus barras serán de hierro y bronce[a], y como tus días[b], así será tu fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus sandalias/zapatos serán de hierro y bronce». El sustantivo hebreo puede referirse al calzado, aunque en este contexto muchos lo entienden como barras o cerrojos por la imagen metálica y el trasfondo de seguridad.
    reason: lexical_alternative
  - marker: b
    text: O «así será tu descanso/seguridad». El término hebreo final es raro e incierto; «fuerza» es una traducción tradicional que encaja con el contexto de bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: El hebreo nombra el metal de forma directa; «hierro» es el equivalente natural en español y conserva la imaginería material del paralelismo con נְחֹשֶׁת.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En contextos bíblicos el término puede abarcar cobre/bronce; «bronce» funciona mejor en español junto con «hierro» y mantiene la fuerza figurativa del texto.
- source_word: מִנְעָלֶיךָ
  english_pob_choice: your bars
  chosen_spanish: tus barras
  alternatives_spanish:
  - tus sandalias
  - tus zapatos
  - tus cerrojos
  lexicon: HALOT
  rationale: Sigo la decisión de la POB inglesa de leer la imagen como elemento de seguridad defensiva en este contexto. «Barras» comunica bien esa lectura en español, sin cerrar la alternativa léxica de calzado, que se preserva en nota.
- source_word: וּכְיָמֶיךָ
  english_pob_choice: and as your days
  chosen_spanish: y como tus días
  alternatives_spanish:
  - y conforme a tus días
  lexicon: HALOT
  rationale: La partícula comparativa כ se expresa naturalmente con «como» en español. La frase conserva la relación proporcional del hebreo entre los días y lo que sigue.
- source_word: דָּבְאֶךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu descanso
  - tu seguridad
  - tu vigor
  lexicon: HALOT
  rationale: El término es raro y de sentido incierto. «Fuerza» mantiene la lectura tradicional y encaja con el contexto de bendición sostenida; no elimina las alternativas preservadas en la nota.
theological_decisions:
- issue: Imagen de seguridad o de calzado en la metáfora final
  english_pob_reading: The verse promises durable security and sustaining strength for the tribe/person addressed.
  chosen_spanish_reading: El versículo promete seguridad duradera y fuerza sostenida para la tribu o persona destinataria.
  alternative_spanish_readings:
  - El versículo describe sandalias o calzado firmes para terreno difícil y vigor continuo.
  - La cláusula final puede referirse a descanso o seguridad según los días de la persona.
  rationale: No hay una cuestión doctrinal decisiva, pero sí una ambigüedad léxica real. Mantengo la lectura de seguridad/fuerza que mejor integra la imagen metálica y el contexto de bendición, dejando visibles las alternativas en nota.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión lexical y teológica cuando el hebreo es incierto; no resolverla artificialmente.'
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente de alta concordancia: no se requerían cambios adicionales. La redacción española sigue la decisión auditable de la POB inglesa y conserva las dos incertidumbres léxicas principales mediante notas.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes de máscara; aquí no aparece el Tetragrámaton.
  - Se usó «fuerza» para דָּבְאֶךָ siguiendo la POB inglesa, sin clausurar las alternativas semánticas.
  - Se mantuvo «bronce» como pareja idiomática de «hierro» en español.
  - «Barras» refleja la lectura contextual de seguridad, pero la nota conserva la posibilidad de calzado.
  - La puntuación y el orden de miembros siguen de cerca el paralelismo hebreo y la disposición de la POB inglesa.
