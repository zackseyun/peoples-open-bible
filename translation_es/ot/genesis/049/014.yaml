translation:
  language: es
  text: Isacar es un asno de fuertes huesos, echado entre los apriscos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las alforjas». El término hebreo es raro y su sentido es debatido; aquí se mantiene la lectura pastoral tradicional que mejor encaja con la bendición poética.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂשכָ֖ר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: nombre propio bíblico (transliteración estándar en español)
  rationale: Se conserva el nombre propio con la forma bíblica usual en español, que es inteligible y estable en la tradición bíblica hispana.
- source_word: חֲמֹ֣ר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - donkey
  lexicon: sentido léxico básico del animal de carga
  rationale: En español bíblico, 'asno' comunica el animal de manera digna y natural en un verso poético. Mantiene el registro sin perder claridad.
- source_word: גָּ֑רֶם
  english_pob_choice: strong-boned
  chosen_spanish: de fuertes huesos
  alternatives_spanish:
  - robusto de huesos
  - de huesos fuertes
  - robusto
  lexicon: HALOT
  rationale: La imagen hebrea describe una constitución ósea fuerte; 'de fuertes huesos' conserva la concreción corporal y el valor descriptivo del original, sin volverlo meramente idiomático.
- source_word: רֹבֵ֖ץ
  english_pob_choice: lying down
  chosen_spanish: echado
  alternatives_spanish:
  - tendido
  - recostado
  - yaciendo
  lexicon: HALOT
  rationale: '''Echado'' funciona bien en español para un animal en postura de reposo y mantiene la sencillez pictórica del participio.'
- source_word: בֵּ֥ין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  lexicon: HALOT
  rationale: La preposición se rinde de forma directa por 'entre', sin necesidad de ampliación.
- source_word: הַֽ/מִּשְׁפְּתָֽיִם
  english_pob_choice: the sheepfolds
  chosen_spanish: los apriscos
  alternatives_spanish:
  - los rediles
  - los apriscos de ovejas
  - las bolsas de aparejo
  lexicon: HALOT
  rationale: El término hebreo es raro y debatido. Como la POB inglesa eligió el sentido pastoral tradicional, 'apriscos' preserva esa lectura en español con un término claro y bíblico, sin imponer una glosa interpretativa excesiva.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios; no hubo revisiones aplicadas al texto de partida. Se mantuvo la decisión auditada de la POB inglesa para el término raro הַמִּשְׁפְּתָיִם, reflejando en español la misma preferencia por el sentido pastoral tradicional con nota de alternativa.
  spanish_consistency_notes:
  - Se usó 'Isacar' como forma española del nombre propio para consistencia bíblica.
  - Se evitó 'Cristo' u otras equivalencias no pertinentes; el verso es poético y no presenta decisiones cristológicas.
  - '''Asno'' y ''apriscos'' conservan un tono bíblico claro y contemporáneo, acorde con una traducción pública y auditada.'
