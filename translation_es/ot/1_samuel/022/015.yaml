base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/015.yaml
  text: Was today the first time that I inquired of God for him? Far be it from me! Let not the king impute anything to his servant or to all my father’s house[a], for your servant knew nothing of all this, whether little or much.
  footnotes:
