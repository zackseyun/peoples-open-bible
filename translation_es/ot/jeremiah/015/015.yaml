translation:
  language: es
  text: Tú lo sabes, Yahvé; acuérdate de mí y atiéndeme[a], y véngame de mis perseguidores[b]. En tu paciencia no me quites[c]; sabe que por tu causa llevo reproche[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «visítame», «tenme presente» o «cuida de mí» para «atiéndeme» (וּפָקְדֵנִי).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toma venganza por mí contra mis perseguidores» o «véngame contra mis perseguidores». También puede traducirse «mis perseguidores» como «los que me persiguen».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «No me tomes en la longitud de tu ira», un modismo que significa «En tu paciencia/longanimidad no me quites».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «sabe que llevo reproche por tu causa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando la forma propia en lugar de ocultarla tras un sustituto reverencial.
- source_word: זָכְרֵנִי
  english_pob_choice: remember me
  chosen_spanish: acuérdate de mí
  alternatives_spanish:
  - recuérdame
  - tenme presente
  lexicon: HALOT
  rationale: El imperativo de זכר pide recordar de manera directa; en español, 'acuérdate de mí' conserva la súplica y suena natural en contexto de oración.
- source_word: וּפָקְדֵנִי
  english_pob_choice: attend to me
  chosen_spanish: atiéndeme
  alternatives_spanish:
  - visítame
  - tenme presente
  - cuida de mí
  lexicon: HALOT
  rationale: פקד abarca visitar, atender, tomar nota o intervenir. 'Atiéndeme' mantiene la idea de atención activa sin restringirla a una sola acepción.
- source_word: וְהִנָּקֶם לִי מֵרֹדְפַי
  english_pob_choice: take vengeance for me on my persecutors
  chosen_spanish: haz venganza por mí de mis perseguidores
  alternatives_spanish:
  - véngame de mis perseguidores
  - haz justicia por mí contra mis perseguidores
  - haz venganza por mí contra mis perseguidores
  lexicon: HALOT
  rationale: La forma niphal de נקם expresa aquí venganza/vindicación judicial en favor del hablante. 'Haz venganza por mí' preserva la fuerza del ruego sin suavizarla.
- source_word: מֵרֹדְפַי
  english_pob_choice: my persecutors
  chosen_spanish: mis perseguidores
  alternatives_spanish:
  - los que me persiguen
  - mis acosadores
  lexicon: HALOT
  rationale: רדף indica persecución literal, pero en este contexto lamentatorio el sentido hostil es claro. 'Perseguidores' comunica mejor esa carga que un simple 'los que me siguen'.
- source_word: לְאֶרֶךְ אַפְּךָ
  english_pob_choice: In your patience
  chosen_spanish: En tu paciencia
  alternatives_spanish:
  - En tu longanimidad
  - En tu tardanza para enojarte
  - Por tu paciencia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea alude a la lentitud para la ira. 'Paciencia' es una opción idiomática y fiel en español; 'longanimidad' sería más técnica.
- source_word: תִּקָּחֵנִי
  english_pob_choice: do not take me away
  chosen_spanish: no me quites
  alternatives_spanish:
  - no me lleves
  - no me apartes
  - no me arrebates
  lexicon: HALOT
  rationale: לקח puede significar tomar o llevarse. En este lamento, 'no me quites' reproduce con naturalidad la idea de ser removido o apartado antes del tiempo.
- source_word: שְׂאֵתִי
  english_pob_choice: I bear
  chosen_spanish: llevo
  alternatives_spanish:
  - soporto
  - cargo con
  - padezco
  lexicon: HALOT
  rationale: נשא aquí expresa cargar o soportar reproche. 'Llevo' funciona bien en español y mantiene la imagen de carga.
- source_word: עָלֶיךָ חֶרְפָּה
  english_pob_choice: reproach for your sake
  chosen_spanish: reproche por causa de ti
  alternatives_spanish:
  - reproche por tu causa
  - reproche en relación contigo
  - afrenta por tu causa
  lexicon: HALOT
  rationale: La preposición עַל puede expresar causa o relación. 'Por causa de ti' conserva esa conexión sin forzar una reinterpretación teológica.
theological_decisions:
- issue: Naturaleza de la petición de venganza divina
  english_pob_reading: take vengeance for me on my persecutors
  chosen_spanish_reading: haz venganza por mí de mis perseguidores
  alternative_spanish_readings:
  - véngame de mis perseguidores
  - haz justicia por mí contra mis perseguidores
  rationale: 'Se mantiene la tensión teológica del texto: Jeremías apela a la justicia retributiva de Dios en medio de la persecución. No se suaviza la petición ni se la convierte en mera consolación interior.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Sentido de la frase sobre la paciencia de Yahvé
  english_pob_reading: In your patience do not take me away
  chosen_spanish_reading: En tu paciencia no me quites
  alternative_spanish_readings:
  - En tu longanimidad no me lleves
  - Por tu paciencia no me apartes
  rationale: La expresión idiomática se conserva sin diluirla. 'Paciencia' refleja la idea de longanimidad divina, mientras 'no me quites' mantiene la posible referencia a ser removido o morir en medio de la demora divina.
  doctrine_reference: Mantener la ambigüedad textual del hebreo
- issue: Relación entre el reproche de Jeremías y Yahvé
  english_pob_reading: know that I bear reproach on your account
  chosen_spanish_reading: sabe que por causa de ti llevo reproche
  alternative_spanish_readings:
  - sabe que llevo reproche por tu causa
  - sabe que llevo afrenta por causa de ti
  rationale: La frase conserva que el desprecio sufrido por Jeremías está ligado a su relación con Yahvé. No se elimina la tensión de hablarle a Dios desde la vergüenza pública.
  doctrine_reference: Mantener la relación pactual implícita en el reproche
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todos los marcadores de nota aparezcan exactamente anclados en el texto español. No se introdujeron marcadores sin anclaje, y se mantuvo la lectura fuente-auditable del verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יהוה.
  - Se eligió 'paciencia' para לְאֶרֶךְ אַפְּךָ por naturalidad en español, con nota que conserva la imagen idiomática hebrea.
  - '''Perseguidores'' mantiene el matiz hostil de רֹדְפַי sin perder legibilidad.'
  - La frase final conserva la relación causal/relacional de עָלֶיךָ חֶרְפָּה con 'por causa de ti'.
