    rationale: No afecta el sentido ni la identidad del personaje y es una adaptación ortográfica aceptable en español; aun así, conviene vigilar la consistencia onomástica a nivel de libro si el proyecto prefiere reflejar consonantes dobles con mayor literalidad.
