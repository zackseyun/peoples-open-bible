translation:
  language: es
  text: 'Él dijo: «Mañana». Y dijo: «Conforme a tu palabra, para que sepas que no hay nadie como Yahvé nuestro Dios».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Dijo
  lexicon: HALOT
  rationale: Verbo narrativo wayyiqtol de אמר. En español, 'Él dijo' mantiene claridad referencial y el avance narrativo sin sobrecargar con una conjunción inicial innecesaria.
- source_word: לְמָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Para mañana
  - Al día siguiente
  lexicon: HALOT
  rationale: Adverbio temporal directo. 'Mañana' es la forma natural y exacta en español para la respuesta breve del verso.
- source_word: כִּדְבָרְךָ
  english_pob_choice: According to your word
  chosen_spanish: Conforme a tu palabra
  alternatives_spanish:
  - Según tu palabra
  - Como has dicho
  lexicon: HALOT
  rationale: La expresión conserva el valor idiomático de 'según/conforme a lo que has dicho' sin perder la formalidad ni la aceptación de la propuesta.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Marcador final de propósito; 'para que' es la equivalencia natural y transparente en español.
- source_word: תֵּדַע
  english_pob_choice: you may know
  chosen_spanish: sepas
  alternatives_spanish:
  - llegues a saber
  - puedas saber
  lexicon: HALOT
  rationale: El imperfecto tras לְמַעַן expresa finalidad. 'Sepas' refleja correctamente el propósito dirigido a Faraón en español contemporáneo.
- source_word: אֵין
  english_pob_choice: there is no one
  chosen_spanish: no hay nadie
  alternatives_spanish:
  - no existe nadie
  - no hay ninguno
  lexicon: HALOT
  rationale: Negación existencial idiomática en español; 'nadie' comunica mejor el sentido personal de la comparación que una formulación más literal.
- source_word: כַּיהוָה
  english_pob_choice: like Yahweh
  chosen_spanish: como Yahvé
  alternatives_spanish:
  - como Yahweh
  - como el SEÑOR
  lexicon: HALOT
  rationale: La comparación usa el nombre divino YHWH. Se mantiene 'Yahvé' conforme al término de proyecto para el Tetragrámaton, preservando la referencia al nombre propio del Dios del pacto.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - nuestros dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural con sufijo de primera persona plural, el contexto exige referencia singular al Dios de Israel; 'nuestro Dios' es la traducción idiomática correcta.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh rather than the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: usar el nombre propio divino en lugar de un sustituto litúrgico. ''Yahvé'' mantiene la audibilidad del nombre del pacto y la coherencia con el texto fuente.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La corrección necesaria respecto del intento previo era anclar cualquier nota al texto. Aquí no se requiere nota al pie porque la decisión teológica del nombre divino se expresa directamente en el texto principal y las decisiones léxicas lo documentan.
  spanish_consistency_notes:
  - Se conservó un registro formal pero natural en español, sin calco innecesario de la sintaxis inglesa.
  - '''Conforme a tu palabra'' mantiene la fuerza idiomática de כִּדְבָרְךָ.'
  - '''Yahvé'' se usa en el texto principal según la terminología del proyecto, evitando el encubrimiento por ''SEÑOR''.'
  - 'La comparación negativa se expresó de modo idiomático: ''no hay nadie como Yahvé nuestro Dios''.'
