translation:
  language: es
  text: 'Y a los hijos de Gersón, de las familias de los levitas, de la media tribu de Manasés, les dieron Golan en Basán, la ciudad de refugio para el homicida, con sus pastizales, y Beestera[a] con sus pastizales: dos ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Beestera; compárese 1 Crónicas 6:71, donde aparece Ashtarot.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/לִ/בְנֵי גֵרְשׁוֹן
  english_pob_choice: And to the sons of Gershon
  chosen_spanish: Y a los hijos de Gersón
  alternatives_spanish:
  - Y a los descendientes de Gersón
  - Y a los gersonitas
  lexicon: HALOT
  rationale: בני expresa literalmente ‘hijos’; en un reparto tribal/genealógico, ‘hijos de Gersón’ conserva la forma hebrea y resulta natural en español bíblico sin perder transparencia.
- source_word: מִ/מִּשְׁפְּחֹת הַ/לְוִיִּם
  english_pob_choice: from the clans of the Levites
  chosen_spanish: de las familias de los levitas
  alternatives_spanish:
  - de los clanes de los levitas
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת puede abarcar subdivisiones de parentesco; en español, ‘familias’ comunica bien la unidad tribal y evita una sonoridad demasiado técnica, aunque ‘clanes’ también sería posible.
- source_word: מֵ/חֲצִי מַטֵּה מְנַשֶּׁה
  english_pob_choice: from the half-tribe of Manasseh
  chosen_spanish: de la media tribu de Manasés
  alternatives_spanish:
  - de la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: מַטֶּה en este contexto de distribución territorial es ‘tribu’; ‘media tribu’ sigue de cerca la construcción hebrea y suena idiomático en español bíblico.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  english_pob_choice: the city of refuge for the manslayer
  chosen_spanish: la ciudad de refugio para el homicida
  alternatives_spanish:
  - la ciudad de refugio para el que dio muerte
  - la ciudad de refugio para el asesino
  lexicon: HALOT
  rationale: La fórmula legal fija es ‘ciudad de refugio’. Para הָרֹצֵחַ, ‘homicida’ mantiene la amplitud jurídica del término sin forzar la idea de asesinato premeditado; ‘asesino’ sería demasiado fuerte aquí.
- source_word: גלון בַּ/בָּשָׁן
  english_pob_choice: Golan in Bashan
  chosen_spanish: Golan en Basán
  alternatives_spanish:
  - Golan en el Basán
  lexicon: HALOT
  rationale: Son nombres propios geográficos; se transliteran. ‘Basán’ es la forma castellana natural del topónimo bíblico.
- source_word: מִגְרָשֶׁ֔/הָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pasto
  - sus campos abiertos
  lexicon: HALOT
  rationale: מִגְרָשׁ denota el terreno abierto alrededor de una ciudad levítica, usado para pastoreo y funciones asociadas; ‘pastizales’ transmite bien esa zona de uso comunal sin sobreexplicar.
- source_word: בְּעֶשְׁתְּרָה
  english_pob_choice: Beeshterah
  chosen_spanish: Beestera
  alternatives_spanish:
  - Ashtarot
  lexicon: HALOT
  rationale: Se sigue la lectura masorética del nombre en el texto principal. ‘Beestera’ reproduce la forma del hebreo en español; la variante tradicional ‘Ashtarot’ se reserva como alternativa por la correspondencia en 1 Crónicas 6:71.
- source_word: עָרִים שְׁתָּיִם
  english_pob_choice: two cities
  chosen_spanish: dos ciudades
  lexicon: HALOT
  rationale: Cierre contable directo del versículo; ‘dos ciudades’ es la forma más natural y fiel en español.
- source_word: implicit verbal sense in allotment list
  english_pob_choice: they gave
  chosen_spanish: les dieron
  alternatives_spanish:
  - se les dieron
  - fueron dadas
  lexicon: HALOT
  rationale: Aunque el hebreo no expresa un verbo finito, el contexto de reparto territorial exige suplir el sentido. ‘Les dieron’ mantiene la agencia implícita del reparto y hace la frase completa en español.
theological_decisions:
- issue: designación legal de עִיר מִקְלַט הָרֹצֵחַ
  english_pob_reading: the city of refuge for the manslayer
  chosen_spanish_reading: la ciudad de refugio para el homicida
  alternative_spanish_readings:
  - la ciudad de refugio para el asesino
  - la ciudad de refugio para el que dio muerte
  rationale: No hay una carga doctrinal adicional, pero sí una tensión jurídica en la palabra hebrea. ‘Homicida’ conserva la ambigüedad legal del pasaje y evita especificar intención que el contexto inmediato no exige.
  doctrine_reference: Números 35; Deuteronomio 19; Josué 20
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto de origen y el criterio auditado de la edición inglesa se mantienen sin modificaciones relevantes, por lo que la versión española sigue de cerca esa decisión estable.'
  spanish_consistency_notes:
  - Se mantiene ‘hijos de Gersón’ para conservar la correspondencia con בני y la formulación genealógica del pasaje.
  - ‘Ciudad de refugio’ se conserva como término legal fijo; ‘homicida’ refleja la amplitud jurídica del hebreo הָרֹצֵחַ en este contexto.
  - Se usa ‘pastizales’ para מִגְרָשׁ, siguiendo la idea de terreno abierto asociado a las ciudades levíticas.
  - 'Los topónimos propios se transliteran: Golan, Basán y Beestera; se documenta la variante ‘Ashtarot’ en nota.'
  - ‘Media tribu de Manasés’ refleja el reparto territorial del texto y su formulación tradicional en español bíblico.
