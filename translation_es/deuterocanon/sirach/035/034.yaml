translation:
  language: es
  text: Pon a trabajar a un niño[a], y hallarás descanso; deja sus manos ociosas, y buscará libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''trabaja con un niño ... suéltale las manos''. La imagen griega sugiere mantener ocupado al niño y no permitirle la ociosidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργασαι
  english_pob_choice: Put ... to work
  chosen_spanish: Pon a trabajar
  alternatives_spanish:
  - Haz trabajar
  - Emplea
  - Haz laborar
  lexicon: LSJ
  rationale: El imperativo aoristo de ἐργάζομαι pide una acción puntual y fuerte. En español, 'pon a trabajar' transmite de manera natural la fuerza imperativa sin perder el matiz práctico de mantener ocupado al niño.
- source_word: ἐν παιδί
  english_pob_choice: a child
  chosen_spanish: a un niño
  alternatives_spanish:
  - a un niño joven
  - con un niño
  - a un muchacho
  lexicon: LSJ
  rationale: En este contexto sapiencial, παιδί se entiende con naturalidad como 'niño' o joven bajo disciplina doméstica. 'A un niño' conserva la imagen concreta y evita una paráfrasis excesiva.
- source_word: εὑρήσεις ἀνάπαυσιν
  english_pob_choice: you will find rest
  chosen_spanish: hallarás descanso
  alternatives_spanish:
  - encontrarás descanso
  - hallarás reposo
  - encontrarás alivio
  lexicon: LSJ
  rationale: ἀνάπαυσις puede ser 'descanso' o 'reposo'. 'Descanso' es claro y idiomático en español, y conserva la forma proverbial del resultado.
- source_word: ἄνες
  english_pob_choice: leave ... idle
  chosen_spanish: deja ... ociosas
  alternatives_spanish:
  - suelta
  - afloja
  - deja libres
  lexicon: LSJ
  rationale: ἄνες es el imperativo de ἀνίημι, con el sentido de aflojar o soltar. Dado que el objeto son las manos, 'deja ... ociosas' explicita el resultado práctico de aflojar la disciplina y evita una traducción demasiado literal y oscura.
- source_word: χεῖρας αὐτῷ
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  - su actividad
  - su trabajo
  lexicon: LSJ
  rationale: La imagen concreta de 'manos' se mantiene en español porque el griego usa χεῖρας y la metáfora es transparente. El plural conserva el valor metonímico de actividad o labor.
- source_word: ζητήσει ἐλευθερίαν
  english_pob_choice: he will seek freedom
  chosen_spanish: buscará libertad
  alternatives_spanish:
  - buscará independencia
  - pedirá libertad
  - buscará licencia
  lexicon: LSJ
  rationale: ἐλευθερία significa 'libertad' o 'libertad/libertad personal'. En esta sentencia doméstica, el punto es que el niño buscará librarse de la restricción; 'libertad' conserva el término exacto sin introducir connotaciones políticas ajenas al proverbio.
theological_decisions:
- issue: Sentido social y doméstico de παιδί y ἐλευθερία
  english_pob_reading: Translate straightforwardly as a wisdom saying about disciplining a child, without softening the social hierarchy or importing modern political connotations into 'freedom.'
  chosen_spanish_reading: Traducirlo como un dicho sapiencial sobre la disciplina de un niño, manteniendo la imagen doméstica y sin cargar 'libertad' con matices políticos modernos.
  alternative_spanish_readings:
  - Traducir παιδί como 'esclavo' o 'siervo'
  - Traducir ἐλευθερία como 'licencia' o 'capricho'
  rationale: El griego dice παιδί, que en primer plano significa 'niño' y en contexto puede referirse a un joven bajo autoridad. El texto no requiere imponer 'esclavo'. Tampoco ἐλευθερία necesita reinterpretarse; 'libertad' conserva la tensión entre restricción y deseo de soltar el control.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el último pase indicó que no eran necesarios cambios y el resultado se mantiene estable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se usa un español moderno y digno, evitando calcos innecesarios pero sin suavizar la fuerza proverbial del griego.
  - '''Libertad'' se conserva por fidelidad léxica; la nota aclara que el contexto es doméstico, no político.'
