  yaml_path: translation/ot/2_samuel/015/018.yaml
  text: And all his servants were passing by at his side[a], and all the Cherethites, and all the Pelethites, and all the Gittites—six hundred men who had come on foot with him from Gath—were passing on before the king.
  footnotes:
