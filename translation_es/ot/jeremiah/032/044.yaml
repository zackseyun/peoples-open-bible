translation:
  language: es
  text: Campos serán comprados con plata, y se escribirán escrituras en un rollo, y serán selladas y atestiguadas por testigos[a], en la tierra de Benjamín, alrededor de Jerusalén, y en las ciudades de Judá, en las ciudades de la región montañosa, en las ciudades de la Sefelá[b] y en las ciudades del Négueb; porque restauraré su fortuna[c], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atestiguadas por testigos». El hebreo dice literalmente «y hacer testificar testigos», una fórmula jurídica de atestación formal.
    reason: lexical_alternative
  - marker: b
    text: La Sefelá es la llanura baja o piedemonte de Judá; el hebreo conserva aquí un nombre regional específico.
    reason: cultural_note
  - marker: c
    text: O «haré volver a sus exiliados» / «restauraré su cautiverio». La expresión hebrea puede denotar tanto el regreso del exilio como una restauración más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂדוֹת
  english_pob_choice: Fields
  chosen_spanish: Campos
  alternatives_spanish:
  - Tierras
  - Campos de labranza
  lexicon: HALOT
  rationale: El plural hebreo designa parcelas de propiedad rural en un contexto de compra; en español, «campos» comunica bien el terreno a adquirir sin forzar una tecnificación excesiva. «Tierras» sería más amplio, pero menos concreto en este contexto legal-comercial.
- source_word: בַּכֶּסֶף
  english_pob_choice: with silver
  chosen_spanish: con plata
  alternatives_spanish:
  - por dinero
  - con dinero
  lexicon: HALOT
  rationale: La imagen concreta del hebreo es «con plata/dinero» como medio de pago. «Con plata» conserva el término material y resulta natural en español.
- source_word: וְכָתוֹב בַּסֵּפֶר
  english_pob_choice: deeds will be written in a scroll
  chosen_spanish: escrituras serán escritas en un rollo
  alternatives_spanish:
  - contratos serán escritos en un libro
  - documentos serán escritos en un registro
  lexicon: HALOT
  rationale: El hebreo continúa la secuencia jurídica de compraventa. «Escrituras» expresa mejor el documento legal que «deeds» en español; «rollo» mantiene el sentido físico de סֵפֶר sin reemplazarlo por «libro», que suena menos específico aquí.
- source_word: וְחָתוֹם
  english_pob_choice: sealed
  chosen_spanish: selladas
  alternatives_spanish:
  - y selladas
  - y cerradas con sello
  lexicon: HALOT
  rationale: 'En español conviene integrar el participio dentro de la lista: «escritas... selladas...». La forma pasiva conserva la serie legal breve del hebreo.'
- source_word: וְהָעֵד עֵדִים
  english_pob_choice: witnessed by witnesses
  chosen_spanish: testificadas por testigos
  alternatives_spanish:
  - atestiguadas por testigos
  - y testigos testificando
  lexicon: HALOT
  rationale: El hebreo usa una fórmula jurídica enfática con verbo y sustantivo de la misma raíz. «Testificadas por testigos» mantiene esa fuerza formal sin sonar tan repetitivo como una traducción literal.
- source_word: בְּאֶרֶץ בִּנְיָמִן
  english_pob_choice: in the land of Benjamin
  chosen_spanish: en la tierra de Benjamín
  alternatives_spanish:
  - en el territorio de Benjamín
  lexicon: HALOT
  rationale: «Tierra» reproduce bien אֶרֶץ en referencia tribal, y «Benjamín» sigue la forma española del nombre propio.
- source_word: וּבִסְבִיבֵי יְרוּשָׁלַםִ
  english_pob_choice: around Jerusalem
  chosen_spanish: alrededor de Jerusalén
  alternatives_spanish:
  - en los alrededores de Jerusalén
  lexicon: HALOT
  rationale: La expresión señala el área circundante; «alrededor de» es claro y fluido en español.
- source_word: וּבְעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - en los poblados de Judá
  lexicon: HALOT
  rationale: «Ciudades» conserva la fórmula repetida del texto y el paralelismo geográfico.
- source_word: הָהָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la serranía
  - la zona montañosa
  lexicon: HALOT
  rationale: En contexto geográfico de Judá, el término designa la zona alta o montañosa. «Región montañosa» es claro en español y mantiene el valor topográfico sin introducir un tecnicismo innecesario.
- source_word: הַשְּׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la Sefelá
  alternatives_spanish:
  - la llanura baja
  - el llano
  lexicon: HALOT
  rationale: Aquí se preserva el topónimo tradicional de la región de Judá para no perder la referencia geográfica específica. Dado que el inglés POB también consideró la forma técnica, el español puede mantenerla con apoyo de nota.
- source_word: הַנֶּגֶב
  english_pob_choice: the Negeb
  chosen_spanish: el Négueb
  alternatives_spanish:
  - el sur
  - la región del sur
  lexicon: HALOT
  rationale: Es un nombre regional establecido, no solo una dirección. La transliteración «Négueb» preserva la especificidad geográfica dentro de la lista.
- source_word: כִּי אָשִׁיב אֶת שְׁבוּתָם
  english_pob_choice: for I will restore their fortunes
  chosen_spanish: porque haré volver su cautiverio
  alternatives_spanish:
  - porque restauraré su fortuna
  - porque haré volver a sus exiliados
  lexicon: HALOT
  rationale: Se conserva la tensión idiomática del hebreo. Aunque el sentido amplio incluye restauración, «haré volver su cautiverio» refleja de modo más directo el giro hebreo que la paráfrasis interpretativa «restauraré su fortuna». La frase admite la resonancia de regreso del exilio sin borrar el lenguaje original.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se traduce de forma solemne y breve con «declara Yahvé». Se preserva el nombre divino según el criterio del proyecto.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título genérico. El español del proyecto lo vierte como «Yahvé» para conservar la identidad del nombre del pacto y mantener continuidad con la política editorial establecida.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance idiomático de שְׁבוּת
  english_pob_reading: restore their fortunes
  chosen_spanish_reading: haré volver su cautiverio
  alternative_spanish_readings:
  - restauraré su fortuna
  - haré volver a sus exiliados
  rationale: El hebreo permite una lectura idiomática amplia de restauración, pero también conserva la imagen de cautiverio/exilio. En español, «haré volver su cautiverio» mantiene la tensión textual y no reduce la frase a una sola interpretación interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el packet hebreo y el audit trail inglés; se conserva la secuencia legal de compra, escritura, sellado y testimonio, así como la tensión idiomática de שְׁבוּת. Se adopta Yahvé según la política del proyecto y se mantiene una nota cultural para Sefelá y Négueb.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se conserva la lista geográfica con paralelismo sintáctico en una sola oración.
  - Se evita introducir «SEÑOR» como sustituto del nombre divino.
  - Se opta por «cautiverio» para preservar la ambigüedad idiomática del hebreo en este versículo.
  - «Sefelá» y «Négueb» se dejan como nombres regionales con nota explicativa.
