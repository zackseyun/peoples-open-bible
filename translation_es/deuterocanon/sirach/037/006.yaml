translation:
  language: es
  text: No olvides a un amigo en tu interior, y no lo descuides[a] cuando tengas bienes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo abandones»; el hebreo transmitido es difícil, y el paralelo griego sugiere el sentido de no dejarlo de lado ni olvidarlo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de esta línea es incierto; el paralelo griego dice «en tus posesiones», lo que también puede entenderse como «cuando tengas riqueza» o «cuando tengas bienes».
    reason: textual_variant
lexical_decisions:
- source_word: אל תשכח / μὴ ἐπιλάθῃ
  english_pob_choice: Do not forget
  chosen_spanish: No olvides
  alternatives_spanish:
  - No te olvides de
  - No dejes de recordar
  lexicon: HALOT; LXX μὴ ἐπιλάθῃ
  rationale: La forma prohibitiva es directa en ambos testigos. «No olvides» suena natural en español y conserva el valor exhortativo sin añadir matices ajenos.
- source_word: חבר / φίλου
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a un compañero
  - a un asociado
  lexicon: HALOT; LSJ φίλος
  rationale: El contexto ético y la correspondencia con φίλου favorecen «amigo» frente a términos más genéricos o sociales.
- source_word: בקרב / ἐν τῇ ψυχῇ σου
  english_pob_choice: in your heart
  chosen_spanish: en tu interior
  alternatives_spanish:
  - en tu corazón
  - en tu alma
  lexicon: HALOT; LXX ψυχή
  rationale: El hebreo y el griego apuntan a una interioridad personal. «En tu interior» evita fijar indebidamente «corazón» o «alma» y preserva el sentido interior.
- source_word: ואל תעזבהן / μὴ ἀμνημονήσῃς αὐτοῦ
  english_pob_choice: do not neglect him / do not forsake him
  chosen_spanish: y no lo descuides
  alternatives_spanish:
  - y no lo abandones
  - y no lo olvides
  lexicon: HALOT; LXX ἀμνημονέω
  rationale: El hebreo transmitido es difícil y el griego habla de no ser «desmemoriado» respecto de él. «No lo descuides» comunica el deber ético de no dejarlo de lado sin sobretraducir como abandono absoluto.
- source_word: בשללך / ἐν χρήμασίν σου
  english_pob_choice: when you have spoil / when you have wealth
  chosen_spanish: cuando tengas bienes
  alternatives_spanish:
  - cuando tengas riqueza
  - cuando tengas posesiones
  - cuando tengas botín
  lexicon: HALOT; LSJ χρήματα
  rationale: El griego χρήματα puede significar bienes, posesiones o riqueza; el hebreo es incierto. «Bienes» mantiene amplitud semántica y evita comprometerse con «botín» o con una lectura demasiado específica.
theological_decisions:
- issue: Relación entre el hebreo difícil y el paralelo griego en la segunda línea
  english_pob_reading: The Hebrew text is difficult in the second line; the Greek parallel reads, 'and do not be unmindful of him in your possessions,' which supports the sense 'do not neglect him when you have wealth.'
  chosen_spanish_reading: La segunda línea se vierte con cautela como una exhortación a no descuidar al amigo cuando se poseen bienes.
  alternative_spanish_readings:
  - y no lo abandones cuando tengas riquezas
  - y no lo olvides cuando tengas posesiones
  rationale: La evidencia disponible muestra una tensión textual real. El español debe conservar la advertencia ética sin borrar la incertidumbre del fundamento semántico entre «bienes/riqueza/posesiones» y el posible valor de «botín» del inglés revisado.
  doctrine_reference: Principio de transparencia textual y fidelidad a los testigos paralelos
- issue: ¿«En tu interior» o una localización física como «en batalla»?
  english_pob_reading: Do not forget a friend in battle...
  chosen_spanish_reading: Se sigue el sentido interior atestiguado por el hebreo y el paralelo griego, no la revisión inglesa posterior que interpreta בקרב como «en batalla».
  alternative_spanish_readings:
  - No olvides a un amigo en batalla
  - No olvides a un amigo en medio de la lucha
  rationale: El paquete original hebreo/griego apunta a interioridad (בקרב / ἐν τῇ ψυχῇ σου). La revisión inglesa posterior introduce una lectura distinta de בקרב; no debe imponerse al español sin base suficiente en el testigo fuente.
  doctrine_reference: Preferencia por la evidencia textual primaria sobre una revisión interpretativa posterior
translation_notes:
  revision_awareness: 'La revisión inglesa posterior cambió dos puntos clave: reinterpretó בקרב como «in battle» y sustituyó el cierre «when you have wealth» por «when you have spoil». Para este borrador español se priorizó el paquete fuente original (hebreo + griego paralelo) y se marcó la tensión textual mediante notas, evitando adoptar sin más la lectura revisada.'
  spanish_consistency_notes:
  - Se usó «amigo» para חבר siguiendo el paralelo φίλου.
  - Se evitó «SEÑOR» o terminología no pertinente; no hay nombres divinos en el versículo.
  - «Bienes» funciona como opción inclusiva frente a la ambigüedad de χρήματα.
  - La redacción mantiene un tono sapiencial, breve y exhortativo, propio de Sirácide.
