translation:
  language: es
  text: 'Y, llamando aparte[a] a los dos, les dijo: «Bendigan a Dios y denle gracias; denle gloria, y denle gracias delante de todos los que viven por lo que ha hecho con ustedes[b]. Es bueno bendecir a Dios y exaltar su nombre, proclamando honorablemente las palabras de las obras de Dios; y no se muestren reacios[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego literalmente dice 'llamando a los dos en secreto/aparte'; aquí se entiende como una acción apartada de los demás, no necesariamente furtiva.
    reason: lexical_alternative
  - marker: b
    text: El griego literalmente dice 'por lo que ha hecho con ustedes'; esto también puede entenderse como 'por lo que ha hecho por ustedes'.
    reason: lexical_alternative
  - marker: c
    text: El testimonio griego proporcionado queda incompleto al final del versículo, terminando en 'y no ...'; la prohibición continúa en el versículo siguiente.
    reason: textual_variant
lexical_decisions:
- source_word: καλέσας
  english_pob_choice: calling
  chosen_spanish: llamando
  alternatives_spanish:
  - habiendo llamado
  - convocando
  lexicon: BDAG
  rationale: Participio introductorio de la acción narrativa. 'Llamando' conserva el flujo del relato sin forzar una construcción más pesada.
- source_word: τοὺς δύο
  english_pob_choice: the two of them
  chosen_spanish: a los dos
  alternatives_spanish:
  - a los dos hombres
  - a ambos
  lexicon: BDAG
  rationale: La referencia es a los dos interlocutores concretos; en español basta 'a los dos' para mantener la claridad y naturalidad.
- source_word: κρυπτῶς
  english_pob_choice: privately
  chosen_spanish: aparte
  alternatives_spanish:
  - en privado
  - secretamente
  lexicon: BDAG
  rationale: Indica que los llamó lejos de otros. 'Aparte' expresa esa separación sin añadir la connotación furtiva de 'secretamente'.
- source_word: Εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Alaben
  - Bendigán
  lexicon: BDAG
  rationale: El imperativo dirigido a Dios conserva mejor el idiomatismo bíblico con 'bendecir' que con un simple 'alabar'.
- source_word: ἐξομολογεῖσθε
  english_pob_choice: give thanks
  chosen_spanish: denle gracias
  alternatives_spanish:
  - confiesen
  - alábenle
  lexicon: BDAG
  rationale: En este contexto de reconocimiento público de las obras de Dios, la idea es agradecimiento y alabanza agradecida, por lo que 'dar gracias' comunica bien el sentido.
- source_word: μεγαλωσύνην δίδοτε αὐτῷ
  english_pob_choice: give him glory
  chosen_spanish: denle gloria
  alternatives_spanish:
  - asígnenle grandeza
  - denle grandeza
  lexicon: BDAG
  rationale: La revisión inglesa favoreció 'give him glory' como sentido más natural de μεγαλωσύνην δίδοτε. En español, 'darle gloria' transmite la honra pública implícita sin perder la fuerza doxológica.
- source_word: ἐνώπιον πάντων τῶν ζώντων
  english_pob_choice: before all the living
  chosen_spanish: delante de todos los que viven
  alternatives_spanish:
  - en presencia de todos los vivos
  - ante todos los vivientes
  lexicon: BDAG
  rationale: Mantiene el alcance público y solemne del mandato, con español natural.
- source_word: περὶ ὧν ἐποίησεν μεθʼ ὑμῶν
  english_pob_choice: for what he has done with you
  chosen_spanish: por lo que ha hecho con ustedes
  alternatives_spanish:
  - por lo que ha hecho por ustedes
  - acerca de lo que hizo con ustedes
  lexicon: BDAG
  rationale: Conserva el 'con ustedes' del griego, que la audit trail distingue de la lectura interpretativa 'por ustedes'.
- source_word: ἀγαθὸν
  english_pob_choice: It is good
  chosen_spanish: Bueno es
  alternatives_spanish:
  - Es bueno
  - Conviene
  lexicon: BDAG
  rationale: '''Bueno es'' reproduce el valor sentencioso del original con un tono bíblico natural en español.'
- source_word: ὑψοῦν τὸ ὄνομα αὐτοῦ
  english_pob_choice: to exalt his name
  chosen_spanish: exaltar su nombre
  alternatives_spanish:
  - levantar su nombre
  - glorificar su nombre
  lexicon: BDAG
  rationale: La fórmula bíblica se expresa de forma directa y reconocible en español.
- source_word: τοὺς λόγους τῶν ἔργων τοῦ θεοῦ
  english_pob_choice: the words of the works of God
  chosen_spanish: las palabras de las obras de Dios
  alternatives_spanish:
  - el relato de las obras de Dios
  - las palabras acerca de las obras de Dios
  lexicon: BDAG
  rationale: Se conserva la compresión del griego sin resolver demasiado la expresión; 'palabras de las obras' refleja la estructura textual con transparencia.
- source_word: ἐντίμως ὑποδεικνύντες
  english_pob_choice: declaring honorably
  chosen_spanish: declarando con honor
  alternatives_spanish:
  - declarándolas honorablemente
  - mostrando con honor
  lexicon: BDAG
  rationale: La expresión describe el modo reverente de exponer las obras de Dios. 'Declarando con honor' mantiene el adverbio de manera y resulta natural en español.
- source_word: καὶ μὴ
  english_pob_choice: and do not be reluctant
  chosen_spanish: y no se muestren reacios
  alternatives_spanish:
  - y no vacilen
  - y no se nieguen
  lexicon: BDAG
  rationale: El fragmento griego termina incompleto; la frase española deja abierta la continuación y refleja una advertencia/prohibición sin cerrar indebidamente la oración.
theological_decisions:
- issue: Tratamiento de εὐλογεῖτε dirigido a Dios
  english_pob_reading: Bless God
  chosen_spanish_reading: Bendigan a Dios
  alternative_spanish_readings:
  - Alaben a Dios
  - Bendigán a Dios
  rationale: Se conserva el lenguaje bíblico de bendecir a Dios en vez de sustituirlo por una paráfrasis más genérica. Esto mantiene el registro doxológico y la forma tradicional del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Sentido de ἐξομολογεῖσθε en el contexto
  english_pob_reading: give thanks
  chosen_spanish_reading: denle gracias
  alternative_spanish_readings:
  - confiesen
  - alábenle
  rationale: Aquí el verbo no se orienta a confesión de pecado sino a reconocimiento agradecido y público de las obras de Dios. 'Dar gracias' comunica mejor la carga teológica de gratitud y testimonio.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Valor de μεγαλωσύνην δίδοτε αὐτῷ
  english_pob_reading: give him glory
  chosen_spanish_reading: denle gloria
  alternative_spanish_readings:
  - denle grandeza
  - asígnenle grandeza
  rationale: La revisión inglesa prefirió 'give him glory' como equivalente más natural y exacto. En español, 'darle gloria' expresa honor divino y evita un calco demasiado duro, sin borrar la idea de grandeza.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La auditoría inglesa revisó μεγαλωσύνην δίδοτε αὐτῷ de 'give him greatness' a 'give him glory' por mayor naturalidad y exactitud, y ajustó ἐντίμως ὑποδεικνύντες a 'declaring honorably'. La versión española sigue esa revisión en clave natural, manteniendo la incompletitud final del testimonio griego y sin suavizar la tensión lexical de 'bendecir/dar gracias/dar gloria'.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεόν, evitando sustituciones litúrgicas.
  - '''Bendigan'' preserva el mandato doxológico; ''denle gracias'' refleja ἐξομολογεῖσθε en sentido de agradecimiento público.'
  - Se conserva 'con ustedes' para μεθʼ ὑμῶν, siguiendo la decisión inglesa de no interpretarlo de entrada como 'por ustedes'.
  - El final queda abierto con 'y no se muestren reacios', en coherencia con el fragmento griego incompleto.
