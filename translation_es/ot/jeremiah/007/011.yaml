revisions:
- from: ¿Se ha convertido esta casa[a], que lleva mi nombre, en una cueva de ladrones[a] a vuestros ojos? Yo mismo, sí, he visto esto —declara Yahvé.
  to: ¿Se ha convertido esta casa, sobre la cual es invocado mi nombre, en una cueva de ladrones[a] ante sus propios ojos? Aun yo mismo, miren, lo he visto, declara Yahvé.
  rationale: La revisión corrige el uso indebido del marcador de nota, mejora la fidelidad del modismo «llamado por mi nombre» con una formulación bíblicamente reconocible en español, y ajusta el registro hacia un español neutral más natural. También refuerza el énfasis de la cláusula final para reflejar mejor גַּם אָנֹכִי הִנֵּה רָאִיתִי.
