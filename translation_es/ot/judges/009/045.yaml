    text: Or 'attacked the city.' The Hebrew verb is literally 'fought' and, with the preposition used here, likely means military action against the city.
    reason: lexical_alternative
  - marker: b
    text: '''Sowed it with salt'' is a symbolic act of devastation and curse, marking the city''s ruin.'
