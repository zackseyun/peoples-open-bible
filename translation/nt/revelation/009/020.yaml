theological_decisions:
- issue: Rendering ἀνθρώπων in a generic collective sense
  chosen_reading: humanity
  alternative_readings:
  - mankind
  - people
  rationale: The term is generic for human beings, not specifically male. 'Humanity' preserves the collective scope without flattening the contrast between those killed and those remaining.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relationship of repentance to cessation of idolatry in ἵνα μὴ προσκυνήσουσιν
  chosen_reading: purpose/result nuance rendered as 'so as not to worship'
  alternative_readings:
  - so that they would not worship
  - with the result that they would not worship
  rationale: The verse presents repentance as turning away from idolatrous practice. The translation preserves that repentance entails ceasing demon/idol worship without over-specifying a theological theory of repentance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
