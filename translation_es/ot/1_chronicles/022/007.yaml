translation:
  language: es
  text: 'Y David dijo a Salomón su hijo[a]: «En cuanto a mí, tenía en mi corazón[b] edificar una casa para el nombre de Yahvé mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mi hijo Salomón». El orden hebreo permite destacar que Salomón es el hijo de David.'
    reason: alternative_reading
  - marker: b
    text: 'O: «estaba en mi corazón»; es decir, un propósito o resolución interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ... dijo» conserva ese flujo sin añadir una relación causal o temporal más fuerte de la que el hebreo exige.
- source_word: לִשְׁלֹמֹה בְנוֹ
  english_pob_choice: to Solomon his son
  chosen_spanish: a Salomón su hijo
  alternatives_spanish:
  - a su hijo Salomón
  - a Salomón, su hijo
  lexicon: HALOT
  rationale: Se mantiene el orden natural en español y la relación filial explícita del hebreo, sin perder la identificación de Salomón como hijo de David.
- source_word: אֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Yo
  - Por mi parte
  lexicon: HALOT
  rationale: El pronombre explícito tiene valor enfático; «En cuanto a mí» reproduce ese énfasis de contraste o autoenfoque mejor que un simple «yo».
- source_word: הָיָה עִם לְבָבִי
  english_pob_choice: it was in my heart
  chosen_spanish: estaba en mi corazón
  alternatives_spanish:
  - lo tenía en mi corazón
  - mi corazón estaba dispuesto
  lexicon: HALOT
  rationale: La frase idiomática expresa intención o resolución interior. «Estaba en mi corazón» conserva la imagen y el sentido de propósito interno que el inglés POB documenta.
- source_word: לִבְנוֹת בַּיִת
  english_pob_choice: to build a house
  chosen_spanish: edificar una casa
  alternatives_spanish:
  - construir una casa
  - edificar un templo
  lexicon: HALOT
  rationale: Se preserva «casa» para respetar el término literal del hebreo y su lenguaje cultual; «edificar» da un registro bíblico natural en español y corresponde a la noción de construir en este contexto.
- source_word: לְשֵׁם
  english_pob_choice: for the name of
  chosen_spanish: para el nombre de
  alternatives_spanish:
  - en honor del nombre de
  - para el nombre
  lexicon: HALOT
  rationale: La formulación mantiene la densidad teológica del hebreo, que no se reduce a una simple dedicación funcional sino que apunta al «nombre» divino como centro de referencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención proyectiva del español POB para el Tetragrámaton: «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título.'
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - el Dios mío
  - mi Dios
  lexicon: HALOT
  rationale: Se conserva el sufijo posesivo de primera persona explícito en el hebreo; David habla de Yahvé como su Dios personal.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto usa directamente el Tetragrámaton. La decisión española mantiene el nombre propio divino como «Yahvé», evitando la sustitución por un título y siguiendo la práctica POB de transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cómo traducir הָיָה עִם לְבָבִי
  english_pob_reading: it was in my heart
  chosen_spanish_reading: estaba en mi corazón
  alternative_spanish_readings:
  - lo tenía en mi corazón
  - mi corazón estaba dispuesto
  rationale: La expresión hebrea señala intención, propósito o resolución interior. En español, «estaba en mi corazón» mantiene tanto la imagen como la tensión semántica entre locución literal e intención interna.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Cómo verter לִבְנוֹת בַּיִת
  english_pob_reading: to build a house
  chosen_spanish_reading: edificar una casa
  alternative_spanish_readings:
  - construir una casa
  - edificar un templo
  rationale: Se conserva «casa» porque el hebreo dice literalmente eso, aun cuando el referente sea el templo. No se reemplaza por «templo» para no borrar la formulación bíblica de «casa para el nombre de Yahvé».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Revisión alineada con el último pase sin cambios sustantivos: se preserva la literalidad controlada del hebreo, la convención española «Yahvé», y el valor idiomático de «estaba en mi corazón» sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva «mi Dios» para אֱלֹהָי, sin añadir artículo que altere la relación posesiva.
  - «Casa» se mantiene donde el hebreo dice בַּיִת, evitando sustituirlo por «templo» en el texto principal.
  - El registro es bíblico y contemporáneo, sin dependencia de fórmulas tradicionales de sustitución del nombre divino.
