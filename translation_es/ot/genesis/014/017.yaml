base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/017.yaml
  text: Then the king of Sodom went out to meet him after his return from defeating Kedorlaomer and the kings who were with him[a], to the Valley of Shaveh (that is[b], the King's Valley).
  footnotes:
