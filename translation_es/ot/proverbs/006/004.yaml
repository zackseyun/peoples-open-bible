translation:
  language: es
  text: No des sueño a tus ojos[a], ni somnolencia a tus párpados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'adormecimiento' para 'somnolencia'. El término hebreo sugiere un sueño ligero o una cabezada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No permitas
  lexicon: HALOT
  rationale: אַל introduce una prohibición directa; en español, 'No' es la forma más natural y fiel para una orden negativa sin añadir intensidad no explícita en el hebreo.
- source_word: תִּתֵּן
  english_pob_choice: give
  chosen_spanish: des
  alternatives_spanish:
  - dejes
  - concedas
  lexicon: HALOT
  rationale: El verbo נתן conserva la imagen concreta de 'dar'. 'Des' reproduce bien el giro idiomático español ('dar sueño a...') y mantiene la fuerza corporal de la expresión hebrea.
- source_word: שֵׁנָה
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño nocturno
  - dormir
  lexicon: HALOT
  rationale: שֵׁנָה significa 'sleep'; 'sueño' es el sustantivo español más directo y natural para preservar la imagen del texto.
- source_word: לְעֵינֶיךָ
  english_pob_choice: to your eyes
  chosen_spanish: a tus ojos
  alternatives_spanish:
  - para tus ojos
  - en tus ojos
  lexicon: HALOT
  rationale: La preposición ל marca aquí el complemento del verbo en un giro idiomático. 'A tus ojos' mantiene la metáfora hebrea sin forzar una paráfrasis.
- source_word: וּתְנוּמָה
  english_pob_choice: nor slumber
  chosen_spanish: ni adormecimiento
  alternatives_spanish:
  - ni sopor
  - ni somnolencia
  lexicon: HALOT
  rationale: תְנוּמָה puede referirse a una modorra o cabeceo ligero. 'Adormecimiento' conserva esa semántica de sueño ligero/dormitar, evitando equipararla sin matiz a שֵׁנָה.
- source_word: לְעַפְעַפֶּיךָ
  english_pob_choice: to your eyelids
  chosen_spanish: a tus párpados
  alternatives_spanish:
  - a tus ojos parpadeantes
  - a tus párpados cerrados
  lexicon: HALOT
  rationale: עַפְעַף designa los párpados. 'Párpados' es el equivalente directo y más claro en español, y preserva el paralelismo poético del hebreo.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden plenamente en la lectura y el paralelismo. No se requieren revisiones textuales; la única decisión relevante es la elección en español para expresar con naturalidad el sueño ligero sugerido por תְנוּמָה.
  spanish_consistency_notes:
  - Se conservó el paralelismo corporal entre 'ojos' y 'párpados' como en el hebreo.
  - Se evitó 'SEÑOR' o cualquier terminología no pertinente, porque el versículo no contiene el Tetragrámaton ni lenguaje divino.
  - '''Sueño'' y ''adormecimiento'' mantienen la diferencia semántica entre שֵׁנָה y תְנוּמָה.'
