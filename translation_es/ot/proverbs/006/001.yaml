review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura condicional y el sentido legal-financiero general del hebreo: vocativo paternal, salir fiador por otro, y sellar una garantía mediante un gesto de manos. Sin embargo, dos elecciones debilitan la fidelidad al texto fuente y al rastro auditado en inglés: «has dado tu mano» atenúa demasiado el modismo concreto de תקעת/כפיך, y «para un extraño» no refleja bien לַזָּר, que aquí corresponde mejor a «a un extraño» o idiomáticamente «con un extraño».'
  spanish_quality_summary: El español es legible y digno, pero puede mejorarse para sonar más natural y exacto en un registro bíblico moderno. «Has salido fiador» y «por tu prójimo» funcionan bien. En cambio, «has dado tu mano en prenda para un extraño» resulta menos idiomático y algo ambiguo. «Has estrechado tu mano en prenda[a] a un extraño[b]» o una formulación equivalente comunica mejor el gesto de compromiso sin perder claridad.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son apropiadas salvo el tratamiento del modismo manual: conviene conservar mejor la imagen de ‘golpear/estrechar manos’ y ajustar la preposición de לַזָּר a «a».'
  issues:
  - severity: medium
    issue: «has dado tu mano» debilita el modismo de תקעת/כפיך
    rationale: El hebreo habla de ‘golpear/estrechar las manos’ como gesto que sella una garantía. «Dar la mano» en español puede sonar simplemente a saludo o cortesía y no preserva tan claramente la imagen concreta ni el trasfondo jurídico.
  - severity: medium
    issue: «para un extraño» no refleja bien לַזָּר
    rationale: La preposición ל se ha conservado en inglés como «to a stranger», con nota aclaratoria. En español, «para un extraño» sugiere beneficio o finalidad más que la contraparte del acuerdo. «A un extraño» es más fiel; la nota puede explicar el valor idiomático ‘con un extraño’.
  - severity: low
    issue: La nota b usa «dado la mano» en vez de explicar el gesto de estrechar/golpear manos
    rationale: Dado que la revisión del texto principal debe reflejar mejor el modismo, la nota también debe armonizarse con esa explicación cultural.
