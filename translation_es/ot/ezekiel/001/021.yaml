translation:
  language: es
  text: Cuando ellos iban, estos iban; y cuando se paraban, estos se paraban; y cuando eran alzados de sobre la tierra, las ruedas eran alzadas junto a ellos[a], porque el espíritu[b] de los seres vivientes[c] estaba en las ruedas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «correspondientes a ellos» o «frente a ellos».'
    reason: lexical_alternative
  - marker: b
    text: «Espíritu» también puede entenderse como «viento» o «aliento».
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa una forma singular colectiva; el contexto apunta al conjunto de los seres vivientes.
    reason: theological_note
lexical_decisions:
- source_word: בְּלֶכְתָּם יֵלֵכוּ
  english_pob_choice: When they went, these went
  chosen_spanish: Cuando ellos iban, estos iban
  alternatives_spanish:
  - Cuando ellos iban, ellos iban
  - Al ir ellos, iban
  lexicon: HALOT
  rationale: El hebreo expresa una relación temporal con ב + infinitivo constructo; en español, «cuando» comunica con naturalidad ese valor. «Iban» conserva el paralelismo verbal y el aspecto progresivo/iterativo de la escena visionaria mejor que una forma más interpretativa.
- source_word: וּבְעָמְדָם יַעֲמֹדוּ
  english_pob_choice: and when they stood, these stood
  chosen_spanish: y cuando se detenían, estos se detenían
  alternatives_spanish:
  - y cuando estaban de pie, estos estaban de pie
  - y cuando paraban, estos paraban
  lexicon: HALOT
  rationale: עמד puede significar «estar de pie» o «detenerse / permanecer». En este contexto de movimiento y reposo coordinados, «se detenían» expresa la alternancia con la primera cláusula y resulta natural en español, sin perder la correspondencia formal.
- source_word: וּבְהִנָּשְׂאָם
  english_pob_choice: and when they were lifted up
  chosen_spanish: y cuando eran alzados
  alternatives_spanish:
  - y cuando eran levantados
  - y cuando se elevaban
  lexicon: HALOT
  rationale: El nifal de נשׂא tiene sentido pasivo/reflexivo. «Eran alzados» preserva esa pasividad y mantiene el lenguaje repetido de la elevación en la visión, sin convertirlo en una acción meramente intransitiva.
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from above the earth
  chosen_spanish: de encima de la tierra
  alternatives_spanish:
  - desde arriba de la tierra
  - de sobre la tierra
  lexicon: HALOT
  rationale: מֵעַל indica una posición por encima de algo. «De encima de la tierra» reproduce el sentido espacial con idiomaticidad castellana y sin reducirlo a «de la tierra».
- source_word: יִנָּשְׂא֤וּ הָאֽוֹפַנִּים
  english_pob_choice: the wheels were lifted up
  chosen_spanish: las ruedas eran alzadas
  alternatives_spanish:
  - las ruedas eran levantadas
  - las ruedas se alzaban
  lexicon: HALOT
  rationale: Se conserva el pasivo del nifal para mantener el vínculo verbal entre los seres vivientes y las ruedas. «Eran alzadas» sigue de cerca el verbo hebreo y evita una paráfrasis más libre.
- source_word: לְעֻמָּתָם
  english_pob_choice: alongside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - al lado de ellos
  - correspondiendo a ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La expresión puede denotar posición correspondiente, opuesta o alineada. En este contexto de movimiento sincronizado, «junto a ellos» comunica bien la coincidencia de posición y movimiento, sin resolver en exceso la ambigüedad.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación causal del movimiento coordinado; «porque» transmite con claridad esa relación en español.
- source_word: ר֥וּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el viento
  - el aliento
  lexicon: HALOT
  rationale: En este contexto visionario, «espíritu» conserva la ambigüedad hebrea sin imponer de inmediato «viento» o «aliento». Es la opción más apta para la coherencia de la escena y del audit trail inglés.
- source_word: הַחַיָּה
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - el ser viviente
  lexicon: HALOT
  rationale: Aunque el hebreo tiene forma singular colectiva, el contexto de la visión remite al conjunto de los seres vivientes. «Seres vivientes» mantiene el campo semántico y evita forzar un singular que en español sonaría menos claro.
- source_word: בָּאוֹפַנִּים
  english_pob_choice: was in the wheels
  chosen_spanish: estaba en las ruedas
  alternatives_spanish:
  - estaba dentro de las ruedas
  - moraba en las ruedas
  lexicon: HALOT
  rationale: La preposición ב marca localización. «Estaba en las ruedas» es la forma más directa y natural, y preserva la relación interior/locativa sin añadir matices no explicitados por el hebreo.
theological_decisions:
- issue: Sentido de רוּחַ en la visión
  english_pob_reading: 'the spirit; alternatives preserved: wind / breath'
  chosen_spanish_reading: 'el espíritu; alternativas preservadas: viento / aliento'
  alternative_spanish_readings:
  - el viento
  - el aliento
  rationale: La escena explica el movimiento sincronizado de las ruedas con los seres vivientes. «Espíritu» preserva la lectura animadora sin identificar de manera explícita al Espíritu Santo. Se conservan las alternativas para reflejar la polisemia del hebreo.
  doctrine_reference: Mantener la tensión lexical sin resolverla dogmáticamente.
- issue: Número de הַחַיָּה
  english_pob_reading: the living creatures (collective sense from singular Hebrew)
  chosen_spanish_reading: los seres vivientes
  alternative_spanish_readings:
  - el ser viviente
  - las criaturas vivientes
  rationale: Aunque el hebreo usa un singular con artículo, el contexto visual abarca a los seres vivientes como grupo. El plural español evita una posible confusión y sigue la revisión del audit trail inglés que favorece el sentido colectivo.
  doctrine_reference: Primacía del hebreo con sensibilidad al contexto narrativo.
translation_notes:
  revision_awareness: El borrador inglés revisado cambió «the living creature» por «the living creatures» para reflejar mejor el sentido colectivo del contexto. En español se siguió esa revisión con «los seres vivientes», manteniendo el valor colectivo sin perder la base singular del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Se mantuvo «espíritu» para רוּחַ, reservando «viento» y «aliento» como alternativas de nota.
  - Se prefirió «seres vivientes» por claridad contextual y para armonizar con la revisión inglesa.
  - Se conservó la estructura paralela del hebreo con tres cláusulas temporales coordinadas.
  - Se optó por un español neutro, bíblico y publicable, sin calcos innecesarios.
