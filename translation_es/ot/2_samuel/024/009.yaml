  text: 'Joab gave the number of the census of the people to the king: Israel was eight hundred thousand valiant men who drew the sword[a], and the men of Judah were five hundred thousand men.'
  footnotes:
  - marker: a
    text: The parallel in 1 Chronicles 21:5 gives different totals (1,100,000 for Israel and 470,000 for Judah). The translation here follows the Hebrew text of 2 Samuel without harmonizing the numbers.
    reason: cross_reference
