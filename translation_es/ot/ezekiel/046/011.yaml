translation:
  language: es
  text: En las fiestas y en los tiempos señalados[a], la ofrenda de cereal será de una efa para el toro y de una efa para el carnero, y para los corderos, según lo que pueda dar[b]; y un hin de aceite por cada efa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo distingue entre «fiestas» y «tiempos señalados», preservando tanto las celebraciones festivas como las fechas rituales fijadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la dádiva de su mano»; es decir, según sus medios o según lo que esté en condiciones de dar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַחַגִּים
  english_pob_choice: At the festivals
  chosen_spanish: En las fiestas
  alternatives_spanish:
  - En los festivales
  - En las fiestas solemnes
  lexicon: HALOT
  rationale: חַגִּים designa celebraciones festivas del calendario cultual. «Fiestas» es natural en español y conserva el sentido religioso sin sonar técnico de más.
- source_word: וּבַמּוֹעֲדִים
  english_pob_choice: and the appointed times
  chosen_spanish: y en los tiempos señalados
  alternatives_spanish:
  - y en los tiempos appointed
  - y en las fechas señaladas
  - y en los tiempos fijados
  lexicon: HALOT
  rationale: מּוֹעֲדִים se refiere a tiempos fijados o señalados; «tiempos señalados» mantiene la distinción respecto de חַגִּים y evita reducir ambos términos a un solo concepto.
- source_word: תִּהְיֶה הַמִּנְחָה
  english_pob_choice: the grain offering shall be
  chosen_spanish: la ofrenda de cereal será
  alternatives_spanish:
  - la ofrenda será
  - la ofrenda de grano será
  - la oblación será
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial es la ofrenda vegetal/cereal. «Ofrenda de cereal» conserva el valor técnico sin cargar la frase con una forma demasiado eclesiástica o anticuada.
- source_word: אֵיפָה
  english_pob_choice: one ephah
  chosen_spanish: de una efa
  alternatives_spanish:
  - de una medida efa
  - de una efa
  lexicon: HALOT
  rationale: אֵיפָה es una medida de capacidad seca; mantener «efa» translitera la unidad y evita perder la especificidad metrológica del texto.
- source_word: לַפָּר
  english_pob_choice: for the bull
  chosen_spanish: para el toro
  alternatives_spanish:
  - para el bull
  - para el novillo
  lexicon: HALOT
  rationale: פָּר se refiere a un bovino sacrificial adulto; «toro» comunica mejor el referente animal en español y conserva el tono sacrificial del listado.
- source_word: וְאֵיפָה לָאַיִל
  english_pob_choice: and one ephah for the ram
  chosen_spanish: y de una efa para el carnero
  alternatives_spanish:
  - y una efa para el carnero
  - y de una medida efa para el carnero
  lexicon: HALOT
  rationale: El paralelo exige repetir la unidad con el mismo patrón sintáctico. «Carnero» es el equivalente más directo de אַיִל en este contexto sacrificial.
- source_word: וְלַכְּבָשִׂים מַתַּת יָדוֹ
  english_pob_choice: and for the lambs as much as he is able to give
  chosen_spanish: y para los corderos, según la dádiva de su mano
  alternatives_spanish:
  - y para los corderos, según lo que pueda dar
  - y para los corderos, conforme a lo que su mano dé
  lexicon: HALOT
  rationale: Se preserva el idiomatismo literal «dádiva de su mano» para no borrar la tensión lexical del hebreo. La frase sigue siendo inteligible en español y deja ver la base idiomática que el POB inglés explicó en nota.
- source_word: וְשֶׁמֶן הִין לָאֵיפָה
  english_pob_choice: with a hin of oil to each ephah
  chosen_spanish: y un hin de aceite por cada efa
  alternatives_spanish:
  - y un hin de aceite para cada efa
  - y aceite, un hin por cada efa
  lexicon: HALOT
  rationale: הִין es otra medida de capacidad; «por cada efa» expresa correctamente la distribución del aceite, manteniendo la relación medida-a-medida del hebreo.
theological_decisions:
- issue: Tratamiento del lenguaje ritual de la ofrenda sacrificial
  english_pob_reading: the grain offering shall be one ephah... with a hin of oil to each ephah
  chosen_spanish_reading: la ofrenda de cereal será de una efa... y un hin de aceite por cada efa
  alternative_spanish_readings:
  - la ofrenda será de una efa...
  - la ofrenda vegetal será de una efa...
  rationale: No se despoja el verso de su carácter técnico sacrificial. «Ofrenda de cereal» mantiene la categoría cultual sin sustituirla por un término más genérico que debilitaría la precisión del texto.
  doctrine_reference: Lexical theology of sacrificial offerings in Torah/Ezekiel cultic legislation
translation_notes:
  revision_awareness: 'Coincide con el contexto de alta concordancia del control previo: no se registraron cambios de revisión y la traducción inglesa auditada no requirió ajustes. La versión española sigue esa lectura estable, preservando la distinción entre חגּים y מועדים y la expresión idiomática de מַתַּת יָדוֹ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva la distinción entre «fiestas» y «tiempos señalados» para reflejar dos términos hebreos diferentes.
  - Se usa «efa» y «hin» como transliteraciones metrológicas consistentes con la política del proyecto.
  - «Ofrenda de cereal» sigue la terminología sacrificial precisa del POB en lugar de un genérico más amplio.
