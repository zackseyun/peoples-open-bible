id: OBA.1.16
reference: Obadiah 1:16
source:
  edition: WLC
  text: כִּ֗י כַּֽ/אֲשֶׁ֤ר שְׁתִיתֶם֙ עַל הַ֣ר קָדְשִׁ֔/י יִשְׁתּ֥וּ כָֽל הַ/גּוֹיִ֖ם תָּמִ֑יד וְ/שָׁת֣וּ וְ/לָע֔וּ וְ/הָי֖וּ כְּ/ל֥וֹא הָיֽוּ־־׃
translation:
  text: For just as you drank on my holy mountain[a], all the nations will drink continually; they will drink and swallow[b], and they will be as though they had never been.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swallow'; the Hebrew verb may emphasize consuming the drink completely.
    reason: lexical_alternative
  - marker: b
    text: The drinking imagery likely refers to experiencing divine judgment, a common prophetic metaphor.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding judgment statement; 'For' fits the discourse flow better than a stronger asseverative 'Indeed' or a more narrowly causal 'Because'.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks comparison between Edom's act and the nations' coming experience. 'Just as' makes the correspondence explicit in natural English.
- source_word: שְׁתִיתֶם
  chosen: you drank
  alternatives:
  - you have drunk
  lexicon: HALOT
  rationale: Qal perfect 2mp, addressed to Edom. Simple past works well in prophetic discourse, referring to their celebratory/drunken participation over Jerusalem's fall.
- source_word: עַל הַר קָדְשִׁי
  chosen: on my holy mountain
  alternatives:
  - upon my holy mountain
  lexicon: HALOT
  rationale: Retains the concrete location, referring to Zion/Jerusalem as the Lord's holy mountain. 'On' is idiomatic modern English.
- source_word: יִשְׁתּוּ
  chosen: will drink
  alternatives:
  - shall drink
  lexicon: HALOT
  rationale: Imperfect 3mp in prophetic context indicates future consequence for the nations.
- source_word: כָל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: In prophetic judgment context גוים refers to the nations generally, not specifically 'Gentiles' in a later Jewish-Christian contrast.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - continually on and on
  - without ceasing
  lexicon: HALOT
  rationale: Conveys ongoing, unrelenting action. Here it intensifies the image of repeated drinking of judgment.
- source_word: וְשָׁתוּ
  chosen: they will drink
  alternatives:
  - and they will drink
  lexicon: HALOT
  rationale: The repeated verb is preserved to reflect the Hebrew's rhetorical intensification rather than collapsed into a single English verb.
- source_word: וְלָעוּ
  chosen: gulp it down
  alternatives:
  - swallow
  - stammer
  - reel
  lexicon: HALOT
  rationale: The verb likely carries the sense of swallowing down greedily or completely in this context. 'Gulp it down' communicates forcefully the image of consuming the cup of judgment. Alternatives such as 'reel' reflect a possible contextual inference from drunkenness, but the lexical core is better represented by swallowing.
- source_word: וְהָיוּ כְּלֹא הָיוּ
  chosen: they will be as though they had never been
  alternatives:
  - they will be as if they had not been
  - they will become as though they had never existed
  lexicon: HALOT
  rationale: This idiom expresses total obliteration. The chosen rendering is idiomatic and preserves the force of the Hebrew comparison without over-expanding it.
