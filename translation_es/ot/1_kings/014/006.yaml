revisions:
- from: 'Y aconteció que, cuando Ahiías oyó el sonido de sus pies al entrar por el umbral, dijo: «Entra, mujer de Jeroboam[a]. ¿Por qué te estás disfrazando? Yo estoy enviado a ti con un mensaje duro[b]».'
  to: 'Y sucedió que, cuando Ahiías oyó el sonido de sus pies al entrar por el umbral, dijo: «Entra, esposa de Jeroboam. ¿Por qué te disfrazas[a]? Porque he sido enviado a ti con un mensaje duro[b]».'
  rationale: Se corrige la construcción no idiomática «estoy enviado a ti» por «he sido enviado a ti», que comunica con claridad el participio pasivo hebreo en español natural. Se reubica la nota [a] a la cláusula de «te disfrazas», que es donde pertenece la alternativa léxica. Además, se suaviza el diálogo con formulaciones más naturales en español general («sucedió», «esposa», «te disfrazas») sin apartarse del sentido fuente ni de las decisiones léxicas documentadas.
