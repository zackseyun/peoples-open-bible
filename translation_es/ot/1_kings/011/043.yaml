translation:
  language: es
  text: Salomón durmió[a] con sus padres y fue sepultado en la ciudad de David su padre, y Roboam su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», expresión convencional para la muerte y la incorporación a los antepasados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En la fórmula funeraria hebrea, שׁכב עם־אבות funciona como eufemismo convencional para la muerte. «Durmió» conserva esa formulación idiomática con naturalidad en español y evita explicitar «murió» donde el texto fuente mantiene el giro tradicional.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: El hebreo usa una expresión fija de obituario real. En español, «con sus padres» reproduce el paralelismo familiar y la fuerza genealógica del original con mayor naturalidad que una paráfrasis más interpretativa como «con sus antepasados».
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: El pasivo niphal pide una voz pasiva en español. «Fue sepultado» mantiene un registro digno y bíblico sin alterar el sentido; «fue enterrado» es posible, pero menos solemne en este contexto real.
- source_word: בְּעִיר דָּוִד אָבִיו
  english_pob_choice: in the city of David his father
  chosen_spanish: en la ciudad de David, su padre
  alternatives_spanish:
  - en la ciudad de David, el de su padre
  - en la ciudad de David, ciudad de su padre
  lexicon: HALOT
  rationale: La frase identifica el lugar de sepultura y a la vez relaciona a David como padre de Salomón. El español conserva esa aposición con una coma, siguiendo de cerca la sintaxis hebrea y la decisión auditada en inglés.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - fue rey
  lexicon: HALOT
  rationale: En las fórmulas de sucesión, «reinó» es el equivalente más directo y estable en español. Mantiene el tono de noticia dinástica sin agregar matices no presentes en el hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La preposición marca sustitución sucesoria. «En su lugar» es la forma más natural en español y preserva el valor de reemplazo mejor que «después de él», que sería solo temporal.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo recibido y con la auditoría inglesa: no hay revisiones aplicadas ni variantes textuales relevantes que afecten esta versión española.'
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y formular del obituario real.
  - «Salomón» y «Roboam» siguen la forma española estándar de los nombres propios bíblicos.
  - La puntuación conserva la aposición de «su padre» unida a «David» sin convertirla en una glosa explicativa.
