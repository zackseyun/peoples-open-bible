translation:
  language: es
  text: Presta atención[a] a mí, Yahvé, y oye la voz de mis adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «oye la voz de mis adversarios»; esto puede significar oír sus acusaciones contra Jeremías o tomar nota de sus planes hostiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  english_pob_choice: Pay attention
  chosen_spanish: Pon atención
  alternatives_spanish:
  - Presta atención
  - Escucha atentamente
  lexicon: HALOT
  rationale: El imperativo de קשׁב pide una atención deliberada y activa, no solo oír. «Pon atención» es natural en español y conserva la súplica urgente del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo tiene el nombre propio del pacto, no un título. En español se mantiene la forma de transliteración establecida «Yahvé», coherente con el criterio del proyecto de no sustituir el nombre divino por una mayúscula de ocultamiento.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: El sufijo de primera persona con la preposición אל expresa dirección hacia la persona del hablante. «A mí» es la forma española más directa y natural con «pon atención».
- source_word: וּשְׁמַע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  - y atiende
  lexicon: HALOT
  rationale: שׁמע en imperativo puede ser «oír» o «escuchar». Dado que el primer verbo ya expresa atención, «oye» mantiene la paralela simple del hebreo sin redundancia innecesaria.
- source_word: לְקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el clamor de
  - el sonido de
  lexicon: HALOT
  rationale: קוֹל puede significar «voz» o «sonido». «La voz de» conserva la imagen concreta del hebreo y encaja bien con el contexto de oración y conflicto.
- source_word: יְרִיבַי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis oponentes
  - los que contienden conmigo
  - mis acusadores
  lexicon: HALOT
  rationale: Derivado de ריב, refiere a quienes contienden, disputan o se oponen al hablante. «Adversarios» mantiene un valor amplio y fuerte sin restringirlo solo a acusación legal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. En la línea doctrinal del proyecto, el nombre propio se representa en español como «Yahvé» para preservar la identificación personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto coincide con el audit trail inglés en sentido y decisiones principales: atención activa para הַקְשִׁיבָה, nombre divino como Yahvé, y «la voz de mis adversarios» para לְקוֹל יְרִיבַי. No se introducen cambios textuales ni variantes mayores respecto del contexto de revisión más reciente, que indica conformidad alta y sin cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - «Pon atención» evita un calco rígido y preserva la fuerza exhortativa del hebreo.
  - La nota [a] se ancla en «Pon atención» porque ahí recae la principal alternativa semántica del verbo הַקְשִׁיבָה.
  - «adversarios» conserva la amplitud de יְרִיבַי sin convertirlo exclusivamente en «acusadores».
