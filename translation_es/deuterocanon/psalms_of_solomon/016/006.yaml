translation:
  language: es
  text: No apartes de mí tu misericordia[a], ¡oh Dios!, ni el recuerdo de ti[b] en mi corazón hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Misericordia» también podría traducirse «compasión» o, de manera más interpretativa, «amor leal».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la memoria acerca de ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἀποστήσῃς
  english_pob_choice: Do not withdraw
  chosen_spanish: No apartes
  alternatives_spanish:
  - No retires
  - No quites
  - No alejes
  lexicon: BDAG
  rationale: ἀποστήσῃς expresa la idea de hacer que algo se aparte o se retire. En español, «apartar» comunica bien esa retirada sin añadir una carga hostil que el griego no exige.
- source_word: τὸ ἔλεός σου
  english_pob_choice: your mercy
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu compasión
  - tu amor leal
  lexicon: LEH
  rationale: ἔλεος se traduce de forma directa como «misericordia»; es el equivalente más claro y natural en español bíblico contemporáneo.
- source_word: τὴν μνήμην περὶ σοῦ
  english_pob_choice: the remembrance of you
  chosen_spanish: la memoria de ti
  alternatives_spanish:
  - el recuerdo de ti
  - la remembranza de ti
  lexicon: LEH
  rationale: μνήμην indica memoria/recuerdo, y περὶ σοῦ orienta esa memoria hacia Dios. «La memoria de ti» conserva la forma compacta del griego; «el recuerdo de ti» sería una alternativa más idiomática pero menos cercana al sustantivo elegido.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - alma
  - corazón interior
  lexicon: LEH
  rationale: En el lenguaje bíblico, καρδία abarca el centro interior de la persona. «Corazón» es la correspondencia española estable y suficientemente amplia.
- source_word: ἕως θανάτου
  english_pob_choice: until death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta el final de mi vida
  - hasta la muerte
  lexicon: LEH
  rationale: La expresión temporal es directa; «hasta la muerte» mantiene la claridad y la proximidad al griego.
translation_notes:
  revision_awareness: La revisión inglesa reciente elidió el verbo en la segunda cola para reflejar que μηδὲ coordina dos objetos bajo un solo verbo griego. En español, la misma estructura se conserva de manera natural con «ni la memoria de ti de mi corazón», sin introducir un segundo verbo.
  spanish_consistency_notes:
  - Se mantiene «misericordia» para ἔλεος, conforme al valor léxico directo.
  - Se preserva el paralelismo breve del griego con una sola negación verbal y una segunda cola coordinada por «ni».
  - «Dios» se usa para ὁ θεός, sin máscara reverencial adicional.
  - «Corazón» traduce καρδία en sentido interior, coherente con el lenguaje bíblico español.
