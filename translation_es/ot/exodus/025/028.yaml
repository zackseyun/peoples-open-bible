review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mandato instructivo (''Harás''), material (''de madera de acacia''), revestimiento en oro, y la cláusula final con sentido instrumental. Sin embargo, ''se cargará la mesa'' suena menos natural y algo impreciso en español bíblico contemporáneo para un mueble transportado; ''se llevará la mesa'' conserva mejor la idea de נשא (''llevar'') y sigue la instrumentalidad de בָם.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero admite una mejora pequeña de naturalidad y precisión verbal. 'Las varas' funciona bien para הַבַּדִּים. 'Cubrirás de oro' es aceptable, aunque 'recubrirás de oro' sería un poco más técnico; no es necesario cambiarlo. La nota al pie necesita pulirse levemente en puntuación y formulación para español natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones 'varas', 'madera de acacia', 'mesa' y la nota sobre instrumentalidad son coherentes con el expediente inglés.
  issues:
  - severity: medium
    issue: '''se cargará la mesa'' no es la mejor representación española de נשא en este contexto'
    rationale: Aunque 'cargar' puede funcionar, para un objeto cultual con varas de transporte 'llevar' suena más natural y preciso en español, sin perder la voz impersonal/pasiva del hebreo.
  - severity: low
    issue: Redacción de la nota al pie algo torpe
    rationale: 'La formulación actual con comilla inicial sobrante y ''idea de medio o instrumento'' puede simplificarse a un español más limpio: ''O: «con ellas se llevará la mesa». El hebreo puede expresar instrumentación.'''
  revised_spanish_text: Harás las varas de madera de acacia y las cubrirás de oro[a], y por medio de ellas se llevará la mesa.
  revised_footnotes:
  - marker: a
    text: 'O: «con ellas se llevará la mesa». El hebreo puede expresar instrumentación.'
    reason: lexical_alternative
