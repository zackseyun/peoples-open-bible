translation:
  language: es
  text: que comieron la grosura de sus sacrificios y bebieron el vino de sus ofrendas de bebida[b]; que se levanten y vengan en su ayuda; que sean su refugio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''que sea sobre ustedes un refugio'', con verbo y sustantivo en singular; el español sigue el sentido plural por el referente plural ''dioses'' en el contexto.'
    reason: alternative_reading
  - marker: b
    text: O 'sus libaciones' para 'sus ofrendas de bebida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  - los que
  lexicon: HALOT
  rationale: Introduce la cláusula relativa con naturalidad en español y conserva el tono de reproche dirigido a los dioses del contexto inmediato.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grosura
  alternatives_spanish:
  - grasa
  - lo mejor
  lexicon: HALOT
  rationale: ‘Grosura’ transmite el sentido concreto de la grasa sacrificial y suena más cultual que la simple ‘grasa’, sin perder la imagen física del hebreo.
- source_word: זְבָחֵי/מוֹ
  english_pob_choice: their sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas sacrificadas
  - sus víctimas
  lexicon: HALOT
  rationale: ‘Sacrificios’ es el equivalente directo y conserva el referente cultual con el sufijo plural posesivo.
- source_word: יֹאכֵלוּ
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comen
  - solían comer
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí participa del recuento irónico; en español, el pasado simple reproduce bien el efecto retrospectivo del reproche.
- source_word: יִשְׁתּוּ
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - beben
  - solían beber
  lexicon: HALOT
  rationale: Mantiene el paralelismo con ‘comieron’ y la misma lectura retrospectiva de la burla.
- source_word: יֵין
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: Equivalente directo y claro en español.
- source_word: נְסִיכָם
  english_pob_choice: their drink offerings
  chosen_spanish: sus ofrendas líquidas
  alternatives_spanish:
  - sus libaciones
  - sus ofrendas de bebida
  lexicon: HALOT
  rationale: ‘Ofrendas líquidas’ conserva el sentido sacrificial sin depender de un tecnicismo menos transparente; se preserva la idea de libación y el posesivo plural.
- source_word: יָק֨וּמוּ
  english_pob_choice: let them rise up
  chosen_spanish: levántense
  alternatives_spanish:
  - que se levanten
  - levántense, pues
  lexicon: HALOT
  rationale: Sostiene el tono sarcástico de desafío/jussivo dirigido a los dioses falsos, con una forma imperativa natural en español.
- source_word: וְיַעְזְרֻכֶם
  english_pob_choice: and help you
  chosen_spanish: y ayúdenlos
  alternatives_spanish:
  - y vengan en su ayuda
  - y socórranlos
  lexicon: HALOT
  rationale: El sufijo pronominal plural de 2ª persona se expresa con ‘los’/‘les’ según el tratamiento textual del receptor colectivo; aquí se opta por ‘los’ para un español directo y bíblico. El mandato continúa la ironía del contexto.
- source_word: יְהִי
  english_pob_choice: let them be
  chosen_spanish: que sean
  alternatives_spanish:
  - que sea
  - séanse
  lexicon: HALOT
  rationale: En español, el plural concuerda con el antecedente plural implícito de los dioses y mantiene el valor jussivo.
- source_word: עֲלֵיכֶם
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - sobre ustedes
  - para ustedes
  lexicon: HALOT
  rationale: El posesivo ‘su’ naturaliza la relación de protección en español; el plural del destinatario queda implícito por el contexto.
- source_word: סִתְרָה
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - escondite
  - protección
  lexicon: HALOT
  rationale: ‘Refugio’ corresponde bien a la revisión inglesa final y expresa con dignidad la idea de cobijo/protección del sustantivo hebreo.
theological_decisions:
- issue: Número verbal en la cláusula final
  english_pob_reading: The Hebrew singular form is rendered with a plural sense in English, referring back to the plural gods in the context.
  chosen_spanish_reading: 'La forma final se vierte en plural: ‘que sean su refugio’, tomando como referente a los dioses falsos del contexto.'
  alternative_spanish_readings:
  - que sea su refugio
  - que esté sobre ustedes como refugio
  rationale: El hebreo presenta un singular verbal y nominal notable; sin borrarlo, el español necesita concordancia con el antecedente plural implícito. La nota conserva la tensión formal del hebreo.
  doctrine_reference: Deuteronomio 32:37-38; filosofía de traducción §3, §6
- issue: Fuerza irónica de la frase
  english_pob_reading: The verse is a taunt continuing the mockery of Israel's false gods.
  chosen_spanish_reading: La traducción conserva el tono de burla y desafío contra los dioses falsos, sin suavizarlo en una exhortación neutra.
  alternative_spanish_readings:
  - una formulación más neutra y descriptiva
  - una burla menos marcada
  rationale: El contexto inmediato exige mantener la ironía retórica; no se debe convertir la reprensión en una simple observación narrativa.
  doctrine_reference: Deuteronomio 32:37-39; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El inglés auditado fue revisado de ‘shelter’ a ‘refuge’; la versión española adopta directamente ‘refugio’ para alinearse con la revisión más reciente y formal de סִתְרָה, manteniendo intacta la estructura irónica del versículo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como terminología de fondo del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se evita ‘SEÑOR’ como máscara y se conserva el léxico sacrificial explícito (‘sacrificios’, ‘ofrendas líquidas’).
  - ‘Refugio’ se usa como término culto y natural en español para סִתְרָה, sin desdibujar la imagen de protección.
  - La puntuación con punto y coma reproduce la secuencia retórica del hebreo y del inglés auditado.
