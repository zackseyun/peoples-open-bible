source:
  edition: WLC
  text: וְ/עָשָׂ֣ה הַ/כֹּהֵ֗ן אֶחָ֤ד לְ/חַטָּאת֙ וְ/אֶחָ֣ד לְ/עֹלָ֔ה וְ/כִפֶּ֣ר עָלָ֔י/ו מֵ/אֲשֶׁ֥ר חָטָ֖א עַל הַ/נָּ֑פֶשׁ וְ/קִדַּ֥שׁ אֶת רֹאשׁ֖/וֹ בַּ/יּ֥וֹם הַ/הֽוּא־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/006/011.yaml
  text: And the priest shall offer one as a sin offering and one as a burnt offering[a], and he shall make atonement for him because he sinned by reason of the dead person[b], and he shall consecrate his head on that day.
  footnotes:
  - marker: a
    text: Or 'one for a purification offering.' The Hebrew term חַטָּאת can denote the sin/purification offering, especially in ritual-impurity contexts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the נפשׁ'; here, in context, it refers to a dead person, that is, a corpse that caused defilement.
    reason: cultural_note
