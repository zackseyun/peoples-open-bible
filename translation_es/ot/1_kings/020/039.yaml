  text: As the king was passing by[a], he cried out to the king and said, “Your servant went out into the midst of the battle, and behold, a man turned aside and brought a man to me and said, ‘Guard this man. If he is ever missing, then your life shall be for his life[b], or you shall weigh out a talent of silver.’”
  footnotes:
