translation:
  language: es
  text: Por la mañana, se le inquietó el espíritu, así que mandó llamar a todos los magos de Egipto y a todos sus sabios. Faraón les contó su sueño, pero no había quien los[a] interpretara para Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "interpretarlos". Aunque el antecedente inmediato es un sustantivo singular ("su sueño"), el pronombre plural puede referirse a los elementos del sueño o tratar la experiencia onírica de manera distributiva. Algunas traducciones lo suavizan como "interpretarlo".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - Cuando llegó la mañana
  lexicon: HALOT
  rationale: Expresa naturalmente el marco temporal narrativo sin alejarse del hebreo.
- source_word: וַתִּפָּעֶם רוּחוֹ
  english_pob_choice: his spirit was troubled
  chosen_spanish: se le inquietó el espíritu
  alternatives_spanish:
  - su espíritu estaba turbado
  - se agitó su espíritu
  lexicon: HALOT
  rationale: Mantiene רוּחַ como 'espíritu' y reproduce la pasividad/afectación del verbo con una construcción natural en español.
- source_word: וַיִּשְׁלַח וַיִּקְרָא
  english_pob_choice: he sent and called
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - envió y llamó
  - envió a llamar
  lexicon: HALOT
  rationale: En español, 'mandó llamar' comunica con claridad la secuencia funcional de enviar mensajeros y convocar, sin perder el sentido doble del hebreo.
- source_word: חַרְטֻמֵּי מִצְרַיִם
  english_pob_choice: the magicians of Egypt
  chosen_spanish: los magos de Egipto
  alternatives_spanish:
  - los hechiceros de Egipto
  - los escribas rituales de Egipto
  lexicon: HALOT
  rationale: '''Magos'' es el equivalente idiomático más claro en español para este grupo de especialistas egipcios asociado con artes secretas e interpretación de sueños.'
- source_word: כָּל חֲכָמֶיהָ
  english_pob_choice: all its wise men
  chosen_spanish: todos sus sabios
  alternatives_spanish:
  - todos sus consejeros
  - todos sus hombres sabios
  lexicon: HALOT
  rationale: '''Sabios'' reproduce bien el sustantivo en un contexto cortesano y conserva la referencia a Egipto mediante el posesivo ''sus''.'
- source_word: וַיְסַפֵּר פַּרְעֹה לָהֶם אֶת חֲלֹמוֹ
  english_pob_choice: Pharaoh told them his dreams
  chosen_spanish: Faraón les contó sus sueños
  alternatives_spanish:
  - Faraón les relató sus sueños
  - Faraón les narró sus sueños
  lexicon: HALOT
  rationale: El hebreo usa el objeto plural; por eso se traduce 'sus sueños' para reflejar la forma recibida, en línea con la revisión inglesa.
- source_word: וְאֵין פֹּתֵר אֹתָם לְפַרְעֹה
  english_pob_choice: but there was no one who could interpret them for Pharaoh
  chosen_spanish: pero no había quien los interpretara para Faraón
  alternatives_spanish:
  - pero nadie podía interpretarlos para Faraón
  - pero no había intérprete de ellos para Faraón
  lexicon: HALOT
  rationale: '''Interpretar'' es el verbo adecuado para פתר en el contexto de sueños; ''los'' conserva el plural del objeto hebreo.'
theological_decisions:
- issue: El término ruah en un estado de agitación interior
  english_pob_reading: his spirit was troubled
  chosen_spanish_reading: se le inquietó el espíritu
  alternative_spanish_readings:
  - su espíritu estaba turbado
  - se agitó su espíritu
  rationale: No se reduce a 'mente' para no borrar la referencia literal a 'espíritu'; la fórmula española mantiene la tensión entre interioridad y literalidad.
  doctrine_reference: Antropología bíblica; distinción entre espíritu e interioridad emocional
- issue: Plural hebreo en 'los interpretara' / 'sus sueños'
  english_pob_reading: his dreams ... interpret them
  chosen_spanish_reading: sus sueños ... los interpretara
  alternative_spanish_readings:
  - su sueño ... lo interpretara
  rationale: Se conserva el plural que el texto masorético muestra y que la revisión inglesa decidió explicitar, evitando suavizarlo en singular.
  doctrine_reference: Crítica textual y fidelidad al plural pronominal del hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió 'his dream' por 'his dreams' para concordar con el objeto plural hebreo 'interpret them'. La versión española sigue esa decisión y mantiene el plural 'sus sueños' / 'los interpretara'.
  spanish_consistency_notes:
  - Se mantiene 'Faraón' en lugar de 'el faraón' para seguir el uso de nombre propio estabilizado en la tradición bíblica en español.
  - Se usa 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Magos'' y ''sabios'' se distinguen como dos grupos diferentes, como en el hebreo.'
  - La puntuación reproduce la progresión narrativa con una pausa clara tras 'Por la mañana'.
