revisions:
- from: Porque Yahvé ha puesto el Jordán como frontera[a] entre nosotros y ustedes, hijos de Rubén e hijos de Gad. Ustedes no tienen porción en Yahvé. Y así sus hijos podrían hacer que nuestros hijos dejaran de temer a Yahvé.
  to: Porque Yahvé ha puesto el Jordán como límite[a] entre nosotros y ustedes, hijos de Rubén e hijos de Gad. Ustedes no tienen porción en Yahvé. Y así sus hijos podrían hacer que nuestros hijos dejaran de temer a Yahvé.
  rationale: Se cambia 'frontera' por 'límite' como equivalente principal de גְּבוּל para evitar una connotación política moderna y reflejar mejor una división establecida entre grupos. Se conserva el resto porque es fiel al hebreo, al audit trail inglés y a la terminología del proyecto.
