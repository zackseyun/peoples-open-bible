revisions:
- from: 'Y les ordenaron al pueblo[a], diciendo: «Cuando vean el arca del pacto de Yahvé, su Dios, y a los sacerdotes levitas[b] llevándola, entonces partirán de su lugar y seguirán detrás de ella».'
  to: 'Y ordenaron al pueblo, diciendo: «Cuando vean el arca del pacto de Yahvé, su Dios, y a los sacerdotes levitas[a] llevándola, entonces partirán de su lugar e irán tras ella».'
  rationale: Se elimina el dativo redundante «les» para ajustarse mejor al hebreo y al español natural; se suprime la nota [a] original por ser innecesaria; se conserva la nota sobre «sacerdotes levitas» porque sí refleja una alternativa documentada; y se mejora «seguirán detrás de ella» a «irán tras ella» para mantener la imagen espacial con mejor fluidez.
