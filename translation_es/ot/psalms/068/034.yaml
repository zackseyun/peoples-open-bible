translation:
  language: es
  text: al que cabalga en los cielos más altos[a], que son desde tiempos antiguos—he aquí, hace oír su voz[b], una voz poderosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en los cielos de los cielos de antiguo».
    reason: lexical_alternative
  - marker: b
    text: O «pronuncia su voz, una voz de fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָ/רֹכֵב
  english_pob_choice: to him who rides
  chosen_spanish: al que cabalga
  alternatives_spanish:
  - al que monta
  - al jinete
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva para describir a Dios como el que cabalga. «Al que cabalga» conserva la imagen verbal y el valor referencial del hebreo sin volverla un sustantivo más abstracto.
- source_word: בִּ/שְׁמֵי שְׁמֵי
  english_pob_choice: in the highest heavens
  chosen_spanish: en los cielos más altos
  alternatives_spanish:
  - en los cielos de los cielos
  - en el cielo supremo
  lexicon: HALOT
  rationale: La cadena constructa expresa un superlativo hebreo. «Los cielos más altos» comunica bien ese valor en español y evita una construcción demasiado literal o pesada.
- source_word: קֶדֶם
  english_pob_choice: ancient
  chosen_spanish: de tiempos antiguos
  alternatives_spanish:
  - de antiguo
  - de antaño
  - desde tiempos antiguos
  lexicon: HALOT
  rationale: Aquí el término modifica temporalmente a «los cielos», no espacialmente. «De tiempos antiguos» conserva la referencia temporal y suena natural en español bíblico contemporáneo.
- source_word: הֵן
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ciertamente
  - he aquí, pues
  lexicon: HALOT
  rationale: Es una partícula de atención. «He aquí» mantiene el tono poético y solemne de la línea.
- source_word: יִתֵּן
  english_pob_choice: he gives forth
  chosen_spanish: da
  alternatives_spanish:
  - da a conocer
  - emite
  - hace sonar
  lexicon: HALOT
  rationale: Con «voz» como objeto, el hebreo significa emitir/expresar la voz. «Da» conserva la concisión del hebreo; la frase completa «da su voz» transmite el giro idiomático.
- source_word: בְּ/קוֹל/וֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - con su voz
  - en su voz
  lexicon: HALOT
  rationale: La preposición es idiomática en la expresión hebrea. En español, el sentido se expresa de manera natural con «su voz».
- source_word: קוֹל עֹז
  english_pob_choice: a mighty voice
  chosen_spanish: una voz poderosa
  alternatives_spanish:
  - una voz fuerte
  - una voz de poder
  lexicon: HALOT
  rationale: La construcción literal es «voz de fuerza». «Una voz poderosa» preserva la fuerza semántica y mantiene una formulación fluida y digna en español.
theological_decisions:
- issue: Referente del cabalgante
  english_pob_reading: The verse continues the description of Israel's God from the surrounding context, without specifying a narrower christological or angelic referent.
  chosen_spanish_reading: El versículo sigue describiendo al Dios de Israel en lenguaje poético exaltado, sin especificar en el texto un referente cristológico o angelical más estrecho.
  alternative_spanish_readings:
  - Una lectura tipológica podría aplicar la imagen al Mesías.
  - Podría leerse como una figura angelical.
  rationale: El hebreo presenta de manera directa al Dios que cabalga. La traducción debe conservar ese referente inmediato y no introducir una identificación posterior en el texto principal.
  doctrine_reference: Afirmaciones; filosofía de traducción, fidelidad referencial y cautela teológica
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se conserva la estructura «cielos más altos» con el modificador temporal separado («de tiempos antiguos»), y se refleja el matiz idiomático de נתן קול como «da su voz».'
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el contexto del versículo anterior, como en el audit trail inglés, sin añadir un sujeto explícito que el hebreo aquí no repite.
  - Se mantiene un registro poético y solemne, evitando calcos rígidos pero preservando la imaginería del texto.
  - Las notas al pie mantienen la alternativa léxica principal del audit trail y señalan la posibilidad de una formulación más literal.
