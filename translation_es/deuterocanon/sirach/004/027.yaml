review_pass:
  verdict: revise
  source_alignment_summary: 'La primera línea está bien alineada con el hebreo y el paralelo griego: «No te rebajes ante un necio» refleja adecuadamente el modismo de autoabatimiento. La segunda línea capta la idea general apoyada por el griego, pero «no favorezcas a los poderosos» desplaza dos matices del registro auditado: el ámbito de comparecer «ante» gobernantes y el sentido más judicial/social de parcialidad, mejor que una acción directa de beneficiar a los poderosos.'
  spanish_quality_summary: El borrador es claro y legible, pero puede mejorarse para ajustarse más estrechamente al texto auditado y a la simetría proverbial. «No muestres parcialidad ante los gobernantes» suena natural, conserva «before rulers» y evita la posible lectura de patronazgo material que puede tener «favorezcas a los poderosos». También conviene anclar la nota [b] en la segunda cláusula revisada.
  glossary_alignment: No hay términos del glosario mayor en juego. «Necio» corresponde bien a נבל. Para מושלים, «gobernantes» o «gobernantes/rulers» es preferible a «poderosos» porque sigue más de cerca el valor de ‘los que gobiernan’. Para ואל תאמן, «muestres parcialidad» se alinea mejor con la decisión léxica del POB que «favorezcas».
  issues:
  - severity: medium
    issue: «a los poderosos» para לִפְּנֵי מוֹשְׁלִים
    rationale: La fuente y el English POB enfatizan «before rulers», no simplemente «to the powerful». «Poderosos» amplía el referente social y pierde el matiz de estar en presencia de quienes gobiernan.
  - severity: medium
    issue: «no favorezcas» para וְאַל תַּאֲמֵן
    rationale: Aunque transmite parte del sentido, puede sugerir beneficiar activamente más que incurrir en favoritismo o parcialidad. «No muestres parcialidad» preserva mejor el modismo apoyado por el griego y el razonamiento documentado.
  - severity: low
    issue: La nota [b] explica «no aceptes el rostro de un poderoso», pero el texto principal no refleja el matiz de presencia/comparecencia
    rationale: Al revisar a «ante los gobernantes», la relación entre texto y nota queda más coherente con el audit trail.
  revised_spanish_text: No te rebajes ante un necio[a], y no muestres parcialidad ante los gobernantes[b].
