translation:
  language: es
  text: Oigan, montes, la causa[a] de Yahvé, y ustedes, firmes[b] fundamentos de la tierra; porque Yahvé tiene una causa contra su pueblo[c], y contenderá con Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: ‘pleito’, ‘litigio’ o ‘controversia’ para רִיב, término usado con frecuencia en un marco de acusación legal del pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: ‘fuertes’ o ‘antiguos’ fundamentos de la tierra’ para ‘firmes fundamentos de la tierra’.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘con su pueblo’; en este contexto legal, el sentido es ‘contra su pueblo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oíd
  lexicon: HALOT
  rationale: El imperativo plural llama solemnemente a los testigos de la creación. 'Oigan' conserva la apelación directa y suena natural en español actual; 'escuchen' sería más interpretativo y 'oíd' más arcaico.
- source_word: הָרִים
  english_pob_choice: O mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  lexicon: HALOT
  rationale: '''Montes'' mantiene el tono poético y profético de la dirección vocativa. En español, funciona con naturalidad en un contexto solemne; ''montañas'' también es posible, pero ''montes'' suena más bíblico sin volverse arcaico.'
- source_word: רִיב
  english_pob_choice: case
  chosen_spanish: caso
  alternatives_spanish:
  - pleito
  - controversia
  - litigio
  lexicon: HALOT
  rationale: Se conserva el matiz forense/covenantal de רִיב sin cargar el texto con un tecnicismo. 'Caso' reproduce la amplitud del inglés POB y permite mantener la tensión legal del pasaje; 'pleito' o 'litigio' sonarían más estrechos o demasiado técnicos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del POB de transliterar el Nombre divino en lugar de sustituirlo por un título. 'Yahvé' es la forma española establecida en este proyecto y preserva el nombre propio del pacto.
- source_word: הָאֵתָנִים
  english_pob_choice: enduring
  chosen_spanish: firmes
  alternatives_spanish:
  - duraderos
  - permanentes
  - antiguos
  lexicon: HALOT
  rationale: El adjetivo expresa solidez, permanencia y resistencia. 'Firmes' comunica bien la idea en español y encaja con 'fundamentos de la tierra'; 'duraderos' o 'antiguos' captan solo parte del sentido.
- source_word: מֹסְדֵי אָרֶץ
  english_pob_choice: foundations of the earth
  chosen_spanish: fundamentos de la tierra
  alternatives_spanish:
  - cimientos de la tierra
  - fundamentos de la tierra
  lexicon: HALOT
  rationale: Se traduce la imagen cósmica de soporte de la tierra. 'Fundamentos' mantiene dignidad y claridad; 'cimientos' sería igualmente posible, pero un poco más doméstico.
- source_word: עִם עַמּוֹ
  english_pob_choice: against his people
  chosen_spanish: contra su pueblo
  alternatives_spanish:
  - con su pueblo
  lexicon: HALOT
  rationale: Aunque la preposición literal es 'con', el contexto legal de רִיב exige el valor adversativo. 'Contra su pueblo' hace explícita la lectura forense que el inglés POB documenta.
- source_word: יִתְוַכָּח
  english_pob_choice: he will contend
  chosen_spanish: contenderá
  alternatives_spanish:
  - discutirá
  - pleiteará
  - argumentará
  lexicon: HALOT
  rationale: El verbo hitpael de יכח conserva la idea de disputa o contienda judicial. 'Contenderá' mantiene el tono solemne y el paralelismo con רִיב mejor que opciones más coloquiales.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio estándar sin variación.
theological_decisions:
- issue: Renderizado del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el Nombre propio del pacto, siguiendo la decisión del POB de no ocultarlo detrás de 'el SEÑOR'. En español, 'Yahvé' es la forma adoptada en este proyecto para una lectura reverente y auditable.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación legal expresada por עִם עַמּוֹ
  english_pob_reading: against his people
  chosen_spanish_reading: contra su pueblo
  alternative_spanish_readings:
  - con su pueblo
  rationale: En el marco de רִיב, la relación no es meramente asociativa sino acusatoria. 'Contra su pueblo' conserva la tensión del litigio del pacto que el texto exige.
  doctrine_reference: Micah 6:2 covenant-lawsuit context
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la última revisión sin cambios: se mantuvo la lectura forense de רִיב y la fuerza adversativa de עִם en el contexto del litigio del pacto, además de la transliteración del Nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה, conforme al criterio general del proyecto.
  - '''Caso'' y ''contenderá'' preservan el registro judicial del pasaje sin introducir tecnicismos innecesarios.'
  - '''Montes'' y ''fundamentos de la tierra'' mantienen el paralelismo poético y la imaginería cósmica del hebreo.'
  - Se evitó 'SEÑOR' para no ocultar el Nombre divino, siguiendo la pauta del POB.
