review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: introducción contrastiva («Y estos»), futuro instructivo, función ritual asociada a «la maldición», ubicación en el monte Ebal y lista tribal correcta. También preserva adecuadamente la nota alternativa para עַל הַקְּלָלָה. Sin embargo, «se pondrán» suaviza y cambia innecesariamente el verbo básico «estar de pie/ponerse de pie», y «para la maldición» suena algo menos natural en español ceremonial que «para la maldición» acompañado de un verbo más estable como «estarán».'
  spanish_quality_summary: El texto es generalmente claro y legible, con nombres tribales bien hispanizados. La principal mejora estilística es reemplazar «se pondrán» por «estarán», que suena más natural en una instrucción de ubicación ritual y corresponde mejor al paralelismo con el versículo anterior. El resto del español es adecuado.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la política general de fidelidad léxica. Los nombres propios en español tradicional («Rubén», «Aser», «Zabulón», «Neftalí») son aceptables y legibles. La nota léxica sobre «para la pronunciación de la maldición» / «para maldecir» está bien preservada.
  issues:
  - severity: medium
    issue: «se pondrán» para יַעַמְדוּ
    rationale: El hebreo יעמדו significa literalmente «estarán de pie / se pararán». «Se pondrán» puede expresar colocación, pero en español aquí suena menos preciso y menos natural que «estarán» o «se pararán», especialmente en un contexto ceremonial de ubicación tribal.
  revised_spanish_text: 'Y estos estarán para la maldición en el monte Ebal: Rubén[a], Gad, Aser, Zabulón, Dan y Neftalí.'
  revised_footnotes:
