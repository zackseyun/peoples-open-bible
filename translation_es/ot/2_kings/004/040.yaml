translation:
  language: es
  text: 'Y lo sirvieron a los hombres para comer. Pero mientras comían del guiso, gritaron y dijeron: «¡Muerte en la olla[a], hombre de Dios!». Y no pudieron comer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «muerte en la olla». La expresión probablemente significa que el guiso era mortal o estaba envenenado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְקוּ
  english_pob_choice: they poured it out
  chosen_spanish: lo sirvieron
  alternatives_spanish:
  - lo vaciaron
  - lo echaron
  lexicon: HALOT
  rationale: El verbo hebreo literalmente tiene la idea de verter o echar. En español, en el contexto de repartir comida ya preparada, «lo sirvieron» comunica con naturalidad la acción distributiva sin perder el sentido de que se pasó el alimento para comer.
- source_word: לַאֲנָשִׁים
  english_pob_choice: for the men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - para los hombres
  - a las personas
  lexicon: HALOT
  rationale: אֲנָשִׁים es el plural de אִישׁ y aquí designa a los varones reunidos. «A los hombres» conserva esa referencia concreta sin neutralizarla.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  - para que comieran
  lexicon: HALOT
  rationale: La construcción expresa finalidad. «Para comer» reproduce con claridad esa función en español.
- source_word: כְּאָכְלָם
  english_pob_choice: as they were eating
  chosen_spanish: mientras comían
  alternatives_spanish:
  - cuando comían
  - al comer
  lexicon: HALOT
  rationale: La construcción indica acción simultánea. «Mientras comían» transmite mejor en español el desarrollo del episodio durante la comida.
- source_word: מֵהַנָּזִיד
  english_pob_choice: from the stew
  chosen_spanish: del guiso
  alternatives_spanish:
  - del estofado
  - de la sopa espesa
  lexicon: HALOT
  rationale: נָזִיד es un plato hervido o cocido, cercano a «guiso». Elegí una palabra natural y suficientemente amplia en español.
- source_word: צָעָקוּ
  english_pob_choice: they cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - exclamaron
  lexicon: HALOT
  rationale: El verbo expresa un clamor fuerte y urgente. «Gritaron» lo comunica con fuerza y naturalidad en español.
- source_word: מָוֶת בַּסִּיר
  english_pob_choice: There is death in the pot
  chosen_spanish: Muerte en la olla
  alternatives_spanish:
  - Hay muerte en la olla
  - Veneno en la olla
  lexicon: HALOT
  rationale: Conservo la expresión hebrea casi literalmente para no apagar su fuerza idiomática. En español, el enunciado breve «Muerte en la olla» mantiene el golpe retórico y deja abierta la posibilidad de que se trate de algo mortal o venenoso.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: man of God
  chosen_spanish: hombre de Dios
  alternatives_spanish:
  - varón de Dios
  - oh hombre de Dios
  lexicon: HALOT
  rationale: Es el título habitual para Eliseo. «Hombre de Dios» es la forma más clara y fiel en español; no se añade una partícula vocativa que el hebreo no exige explícitamente.
- source_word: וְלֹא יָכְלוּ לֶאֱכֹל
  english_pob_choice: And they could not eat
  chosen_spanish: Y no pudieron comer
  alternatives_spanish:
  - y no pudieron seguir comiendo
  - y no les fue posible comer
  lexicon: HALOT
  rationale: El hebreo dice simplemente que no pudieron comer, sin objeto explícito final. «No pudieron comer» reproduce esa concisión sin añadir «lo».
theological_decisions:
- issue: Conservar la ambigüedad de «muerte en la olla» sin interpretarla de inmediato como veneno
  english_pob_reading: The phrase likely means the stew was deadly or poisonous, but the vivid idiom should be preserved in the main text rather than interpreted away as 'poison.'
  chosen_spanish_reading: Se mantiene «Muerte en la olla» en el texto principal, con la posibilidad de entenderlo como alimento mortal o envenenado.
  alternative_spanish_readings:
  - Veneno en la olla
  - Hay veneno en la olla
  rationale: El hebreo es deliberadamente vívido y breve. Traducirlo como «veneno» aclara el sentido probable, pero borra la formulación literal y su impacto. La redacción elegida preserva esa tensión textual.
  doctrine_reference: Conservación de la imagen y de la ambigüedad semántica del original
- issue: Traducción del título אִישׁ הָאֱלֹהִים
  english_pob_reading: man of God
  chosen_spanish_reading: hombre de Dios
  alternative_spanish_readings:
  - varón de Dios
  - oh hombre de Dios
  rationale: El contexto muestra un tratamiento directo a Eliseo. «Hombre de Dios» mantiene el título reconocido sin añadir solemnidad o matiz ajenos al hebreo.
  doctrine_reference: Uso descriptivo del título profético en el texto narrativo
translation_notes:
  revision_awareness: 'El auditor inglés revisó la última cláusula para quitar el objeto implícito «it», de modo que la línea final en español también evita añadir un objeto inexistente: «Y no pudieron comer». La decisión principal no afecta el contenido, sino la preservación de la concisión hebrea y de la imagen idiomática «muerte en la olla».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים conforme al estándar del proyecto.
  - No se usa «Cristo» ni terminología eclesiástica añadida; el título profético se conserva como «hombre de Dios».
  - «Guiso» se usa para נָזִיד por claridad moderna y tono bíblico sobrio.
  - La nota al pie marca la lectura literal e idiomática sin sustituir el texto principal.
