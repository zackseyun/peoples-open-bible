translation:
  language: es
  text: Y acontecerá en todo el país[a], declara Yahvé, que dos tercios en él serán cortados y perecerán[b], pero un tercio quedará en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda la tierra». El hebreo אֶרֶץ puede significar «tierra» o «país/territorio»; aquí el contexto inmediato favorece la referencia al territorio en cuestión.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «boca de dos», un modismo cuantitativo que aquí significa dos partes de tres; por eso se traduce «dos tercios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: La fórmula profética de futuro se vierte con un giro natural y solemne en español. «Acontecerá» conserva el carácter de anuncio sin sonar arcaico en exceso.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la región
  - en toda la tierra
  lexicon: HALOT
  rationale: «Eretz» puede significar «tierra» o «país/land». En español, «tierra» mantiene la amplitud semántica y evita restringir prematuramente el alcance; el contexto inmediato permite esta lectura amplia sin imponer «mundo».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la norma del proyecto. «Dice» reproduce la fórmula profética con naturalidad; «declara» sería posible, pero «dice» es más directo y fiel al hebreo como fórmula de enunciación.
- source_word: פִּי שְׁנַיִם
  english_pob_choice: two-thirds
  chosen_spanish: dos tercios
  alternatives_spanish:
  - dos partes
  - una doble porción
  lexicon: HALOT
  rationale: El hebreo es un modismo cuantitativo, literalmente «boca de dos», para dos partes de tres. En español, «dos tercios» comunica el valor idiomático de forma clara y exacta.
- source_word: יִכָּרְתוּ
  english_pob_choice: will be cut off
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán exterminados
  - serán eliminados
  lexicon: HALOT
  rationale: «Cortar» conserva la raíz metafórica y su resonancia judicial/covenantal sin añadir una interpretación más fuerte que el verbo exige. «Serán cortados» sigue de cerca la pasiva niphal.
- source_word: יִגְוָעוּ
  english_pob_choice: perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - morirán
  - desaparecerán
  lexicon: HALOT
  rationale: Se elige «perecerán» para reflejar el matiz formal del verbo y mantenerlo distinguible de «serán cortados». «Morirán» sería más llano, pero menos cercano al registro y a la revisión inglesa adoptada.
- source_word: וְהַשְּׁלִשִׁית
  english_pob_choice: but one-third
  chosen_spanish: pero un tercio
  alternatives_spanish:
  - y el tercio
  - y la tercera parte
  lexicon: HALOT
  rationale: «Un tercio» expresa con precisión la relación proporcional ya establecida con «dos tercios». El «pero» recoge el contraste adversativo del hebreo en el contexto de juicio y remanente.
- source_word: יִוָּתֶר
  english_pob_choice: will be left
  chosen_spanish: quedará
  alternatives_spanish:
  - será dejado
  - permanecerá
  lexicon: HALOT
  rationale: El nifal de יתר significa «quedar, permanecer, ser dejado». «Quedará» es el equivalente español más natural y evita el giro pasivo artificial «será dejado».
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - el mundo
  rationale: El contexto inmediato favorece una referencia territorial concreta más que universal. «La tierra» preserva esa amplitud sin forzar «el mundo»; además mantiene la posibilidad semántica del hebreo entre territorio y tierra en general.
  doctrine_reference: Primacía de la evidencia en lengua original; filosofía de traducción del POB
- issue: Carga teológica de יִכָּרְתוּ
  english_pob_reading: will be cut off
  chosen_spanish_reading: serán cortados
  alternative_spanish_readings:
  - serán destruidos
  - serán eliminados
  rationale: «Ser cortado» conserva la resonancia bíblica de exclusión/jucio sin especificar más de lo que el verbo exige. Esto evita sustituir la tensión textual por una interpretación más explicativa que la fuente no impone.
  doctrine_reference: Precisión lexical y conservación de la tensión semántica
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «die» por «perish» para reflejar más de cerca el hebreo יִגְוָעוּ y conservar un registro más formal. La redacción española sigue esa revisión con «perecerán», mientras mantiene «serán cortados» para יִכָּרְתוּ y «quedará» para יִוָּתֶר. También se mantuvo la decisión contextual de traducir אֶרֶץ como «tierra» en vez de universalizarla como «mundo».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - 'Se mantiene la distinción entre los dos verbos de juicio: «serán cortados» y «perecerán».'
  - «Dos tercios / un tercio» refleja el modismo hebreo de forma transparente en español.
  - «Quedará en ella» conserva el paralelismo con «en ella» del hebreo final y la referencia al mismo espacio territorial.
