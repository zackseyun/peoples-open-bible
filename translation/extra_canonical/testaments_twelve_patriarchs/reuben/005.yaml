translation:
  text: 1[a]. For women are evil, my children; and because they do not have authority or power over a man, they scheme by their appearance how they may draw him to themselves. 2. And the one whom they are not able to enchant by appearance, him they overcome through deceit. 3[b]. For an angel of God also told me concerning them and taught me that women are overcome by the spirit of sexual immorality more than a man, and in their heart they devise things against men; and by adornment they lead their minds astray, and through a glance they sow the poison, and first in thought and then by the act they take captive. 4. For a woman is not able to force a man openly, but by a harlot's manner she acts craftily against him. 5. Therefore flee sexual immorality, my children, and command your wives and your daughters not to adorn their heads and their faces for the deception of the mind; for every woman who uses deceit in these things is reserved for eternal punishment. 6. For in this way they also charmed the Watchers before the flood; for as they kept looking at them continually, they also came to be in desire for them, and they conceived the deed in their mind; for they were changing themselves into the form of men and appearing to them while they were with their husbands. 7. And they also, desiring in their minds their appearance, gave birth to giants[d][c]. For the Watchers appeared to them as reaching up to heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their outward form' in verses 1-2; the Greek term can denote appearance, figure, or presentation.
    reason: lexical_alternative
  - marker: b
    text: '''Watchers'' refers to heavenly beings known from Jewish traditions about the time before the flood; compare Genesis 6 in later interpretive tradition, especially 1 Enoch.'
    reason: cross_reference
  - marker: c
    text: The wording in verses 6-7 reflects a developed interpretive tradition about the Watchers, their desire, and the birth of giants.
    reason: cultural_note
  - marker: d
    text: 'The final clause may be understood hyperbolically: the Watchers appeared to the women as towering up to heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηραί
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: LSJ
  rationale: Retains the stark moral force of Reuben's warning without softening to merely 'bad.'
- source_word: δολιεύονται
  chosen: scheme
  alternatives:
  - act deceitfully
  - plot
  lexicon: LSJ
  rationale: Captures ongoing crafty intent in a readable exhortational register.
- source_word: σχήμασιν / τοῦ σχήματος
  chosen: appearance
  alternatives:
  - form
  - outward presentation
  lexicon: LSJ
  rationale: In context the term refers to outward presentation used to entice, not merely abstract form.
- source_word: ἐπισπάσωνται
  chosen: draw ... to themselves
  alternatives:
  - attract
  - pull toward themselves
  lexicon: LSJ
  rationale: Preserves the image of pulling or drawing a man toward them.
- source_word: καταγοητεῦσασθαι
  chosen: enchant
  alternatives:
  - bewitch
  - seduce
  lexicon: LSJ
  rationale: Keeps the stronger sense of beguiling or bewitching tied to deceptive allure.
- source_word: ἀπάτης
  chosen: deceit
  alternatives:
  - trickery
  - fraud
  lexicon: LSJ
  rationale: A standard moral term here; 'deceit' is clear and weighty.
- source_word: ἡττῶνται τῷ πνεύματι τῆς πορνείας
  chosen: are overcome by the spirit of sexual immorality
  alternatives:
  - are weaker before the spirit of fornication
  - are defeated by the spirit of whoredom
  lexicon: LSJ
  rationale: Preserves the passive sense of being mastered, while rendering πορνεία in accessible modern English.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: LSJ
  rationale: Follows project style for readability while keeping the vice term morally specific.
- source_word: ἐν καρδίᾳ μηχανῶνται
  chosen: in their heart they devise things
  alternatives:
  - they plot in their heart
  - they contrive inwardly
  lexicon: LSJ
  rationale: Keeps the inward deliberative sense and the biblical anthropology of the heart.
- source_word: διὰ τῆς κοσμήσεως
  chosen: by adornment
  alternatives:
  - through ornament
  - by beautifying themselves
  lexicon: LSJ
  rationale: Maintains the concrete means of seduction named in the Greek.
- source_word: πλανῶσι ... τὰς διανοίας
  chosen: lead their minds astray
  alternatives:
  - deceive their thoughts
  - mislead their minds
  lexicon: LSJ
  rationale: Brings out moral/intellectual seduction rather than simple confusion.
- source_word: διὰ τοῦ βλέμματος τὸν ἰὸν ἐνσπείρουσι
  chosen: through a glance they sow the poison
  alternatives:
  - through the look they inject venom
  - by their gaze they plant poison
  lexicon: LSJ
  rationale: Retains the vivid metaphor of poisonous corruption entering through the look.
- source_word: τῷ ἔργῳ αἰχμαλωτίζουσιν
  chosen: by the act they take captive
  alternatives:
  - by deed they enslave
  - in the act they capture
  lexicon: LSJ
  rationale: Preserves the sequence from inward temptation to outward deed and the captivity metaphor.
- source_word: εἰς πρόσωπον
  chosen: openly
  alternatives:
  - face to face
  - to the face
  lexicon: LSJ
  rationale: 'Idiomatic rendering in context: not by overt force.'
- source_word: ἐν σχήματι πορνικοῖς
  chosen: by a harlot's manner
  alternatives:
  - in a seductive guise
  - with a prostitute's appearance
  lexicon: LSJ
  rationale: Conveys sexualized presentation without over-specifying beyond the Greek.
- source_word: πανουργεύεται
  chosen: acts craftily against him
  alternatives:
  - deals cunningly with him
  - outwits him
  lexicon: LSJ
  rationale: Keeps the moral sense of cunning manipulation.
- source_word: Λοιπὸν φεύγετε
  chosen: Therefore flee
  alternatives:
  - So then flee
  - Hence flee
  lexicon: LSJ
  rationale: Strong imperative preserved in elevated but readable English.
- source_word: προστάσσετε
  chosen: command
  alternatives:
  - instruct
  - order
  lexicon: LSJ
  rationale: The testamentary tone is forceful; 'command' best reflects the imperative strength.
- source_word: πρὸς ἀπάτην διανοίας
  chosen: for the deception of the mind
  alternatives:
  - to deceive the mind
  - for mental deception
  lexicon: LSJ
  rationale: Keeps the genitival relation broad and morally pointed.
- source_word: κόλασιν αἰώνιον
  chosen: eternal punishment
  alternatives:
  - everlasting punishment
  lexicon: LSJ
  rationale: Straightforward rendering of the phrase without doctrinal softening.
- source_word: τετήρηται
  chosen: is reserved
  alternatives:
  - has been kept
  - is kept in store
  lexicon: LSJ
  rationale: Reflects the perfect passive sense of being kept for judgment.
- source_word: Ἐγρηγόρους
  chosen: Watchers
  alternatives:
  - Grigori
  lexicon: LSJ
  rationale: Established rendering for the angelic beings in Second Temple tradition; preserves intertextual resonance.
- source_word: συνεχῶς
  chosen: continually
  alternatives:
  - constantly
  - unceasingly
  lexicon: LSJ
  rationale: Matches the durative force of repeated looking.
- source_word: συνέλαβον τῇ διανοίᾳ τὴν πρᾶξιν
  chosen: they conceived the deed in their mind
  alternatives:
  - they formed the act in thought
  - they grasped the act in their mind
  lexicon: LSJ
  rationale: Preserves the sequence from mental conception to action, echoing the chapter's moral logic.
- source_word: μετεσχηματίζοντο
  chosen: they were changing themselves into the form of
  alternatives:
  - they transformed themselves into
  - they disguised themselves as
  lexicon: LSJ
  rationale: Keeps the middle/reflexive nuance and the connection to outward form.
- source_word: συνεφαίνοντο
  chosen: appearing to them
  alternatives:
  - showing themselves to them
  - being seen by them
  lexicon: LSJ
  rationale: Simple rendering that fits the visionary/deceptive context.
- source_word: τῇ διανοίᾳ τῆς φαντασίας
  chosen: in their minds the appearance
  alternatives:
  - the image in their imagination
  - the fantasy in their mind
  lexicon: LSJ
  rationale: Avoids overly modern psychological language while preserving the inward image/imagination sense.
- source_word: γίγαντας
  chosen: giants
  alternatives:
  - giant offspring
  lexicon: LSJ
  rationale: Standard rendering with clear Second Temple resonance.
- source_word: ἕως ... τοῦ οὐρανοῦ φθάνοντες
  chosen: as reaching up to heaven
  alternatives:
  - as extending to heaven
  - as tall enough to reach heaven
  lexicon: LSJ
  rationale: Preserves the hyperbolic visionary description without over-interpreting the syntax.
