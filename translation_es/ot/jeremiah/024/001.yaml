translation:
  language: es
  text: Yahvé me mostró, y he aquí, dos canastas de higos[a] puestas delante del templo de Yahvé, después de que Nabucodrezzar[b], rey de Babilonia, llevó al destierro a Jeconías, hijo de Joacim, rey de Judá, junto con los oficiales[c] de Judá, los artesanos y los herreros[d] de Jerusalén, y los llevó a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cestas de higos»; el hebreo designa un recipiente para la fruta, no necesariamente una canasta de un tipo específico.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Nabucodrezzar»; muchas versiones castellanas usan la forma más familiar «Nabucodonosor».'
    reason: lexical_alternative
  - marker: c
    text: O «los príncipes de Judá»; el hebreo שָׂרִים puede referirse a gobernantes, jefes o funcionarios de rango.
    reason: lexical_alternative
  - marker: d
    text: O «los trabajadores del metal»; los términos hebreos probablemente denotan obreros especializados llevados al destierro.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְאַנִי
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me dejó ver
  lexicon: HALOT
  rationale: El hiphil de ראה tiene fuerza de 'mostrar' o 'hacer ver'. En español, 'me mostró' conserva la iniciativa reveladora de Yahvé y suena natural y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada, conforme al criterio POB, en vez de sustituirlo por un título.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: La partícula introduce una presentación vívida de la visión. 'Y he aquí' reproduce bien ese efecto en español bíblico contemporáneo sin sonar arcaizante en exceso.
- source_word: שְׁנֵי דּוּדָאֵי תְאֵנִים
  english_pob_choice: two baskets of figs
  chosen_spanish: dos canastas de higos
  alternatives_spanish:
  - dos cestas de higos
  - dos recipientes de higos
  lexicon: HALOT
  rationale: דּוּד puede referirse a un recipiente tipo canasta o cesta. 'Canastas' es la opción más natural en español para frutos presentados delante del templo.
- source_word: מוּעָדִים
  english_pob_choice: were set
  chosen_spanish: puestas
  alternatives_spanish:
  - colocadas
  - puestas allí
  lexicon: HALOT
  rationale: El participio pasivo indica objetos situados delante del templo. En español, 'puestas' integra bien la idea sin forzar un calco como 'apuntadas' o 'designadas'.
- source_word: לִפְנֵי הֵיכַל יְהוָה
  english_pob_choice: before the temple of Yahweh
  chosen_spanish: delante del templo de Yahvé
  alternatives_spanish:
  - frente al templo de Yahvé
  - ante el templo de Yahvé
  lexicon: HALOT
  rationale: '''Delante de'' expresa con claridad la ubicación espacial. ''Templo'' traduce הֵיכָל en su sentido arquitectónico habitual.'
- source_word: אַחֲרֵי הַגְלוֹת
  english_pob_choice: after ... had taken into exile
  chosen_spanish: después de que ... había llevado al destierro
  alternatives_spanish:
  - tras haber deportado
  - después de haber exiliado
  lexicon: HALOT
  rationale: Se conserva el orden temporal previo al cuadro visionario mediante un pluperfecto español. 'Llevar al destierro' evita la abstracción de 'exiliar' y refleja el acto forzado.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadrezzar
  chosen_spanish: Nabucodrezzar
  alternatives_spanish:
  - Nabucodonosor
  lexicon: HALOT
  rationale: Se sigue más de cerca la forma hebrea del nombre, que se aproxima a 'Nabucodrezzar', en vez de armonizarla al nombre más familiar en la tradición castellana.
- source_word: יְכָנְיָהוּ
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Conías
  lexicon: HALOT
  rationale: '''Jeconías'' / ''Jeconías'' es la forma estable en español para esta variante del nombre. Se mantiene la identificación histórica del exiliado.'
- source_word: שָׂרֵי יְהוּדָה
  english_pob_choice: the officials of Judah
  chosen_spanish: los oficiales de Judá
  alternatives_spanish:
  - los príncipes de Judá
  - los jefes de Judá
  lexicon: HALOT
  rationale: שָׂרִים designa autoridades o funcionarios de rango. 'Oficiales' evita restringir indebidamente el término a la nobleza y coincide con la opción auditada en inglés.
- source_word: הֶחָרָשׁ
  english_pob_choice: the craftsmen
  chosen_spanish: los artesanos
  alternatives_spanish:
  - los carpinteros
  - los oficios
  lexicon: HALOT
  rationale: El término puede abarcar trabajadores hábiles en distintos oficios. 'Artesanos' comunica bien la amplitud del grupo deportado en español.
- source_word: הַמַּסְגֵּר
  english_pob_choice: the smiths
  chosen_spanish: los herreros
  alternatives_spanish:
  - los metalúrgicos
  - los metalistas
  lexicon: HALOT
  rationale: El término probablemente señala trabajadores del metal, especialmente herreros. 'Herreros' es la equivalencia más clara y natural en español.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La preposición indica el lugar de procedencia de los deportados. 'De Jerusalén' es idiomático y suficiente en el contexto.
- source_word: וַיְבִאֵם בָּבֶל
  english_pob_choice: and had brought them to Babylon
  chosen_spanish: y los había llevado a Babilonia
  alternatives_spanish:
  - y los había traído a Babilonia
  - y los condujo a Babilonia
  lexicon: HALOT
  rationale: El verbo expresa traslado forzoso. 'Llevado a Babilonia' mantiene la dirección y la fuerza de deportación sin perder naturalidad en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en transliteración, siguiendo la práctica POB y evitando el sustituto litúrgico 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Valor de los objetos del sueño/visión: דּוּדָאֵי תְאֵנִים'
  english_pob_reading: two baskets of figs
  chosen_spanish_reading: dos canastas de higos
  alternative_spanish_readings:
  - dos cestas de higos
  - dos recipientes de higos
  rationale: El hebreo describe recipientes con higos; no hay motivo para espiritualizar ni precisar más de lo que el texto exige. 'Canastas' conserva la imagen concreta de la visión.
  doctrine_reference: Narrative imagery in Jeremiah 24:1
- issue: Orden temporal del destierro
  english_pob_reading: after ... had taken into exile ... and had brought them to Babylon
  chosen_spanish_reading: después de que ... había llevado al destierro ... y los había llevado a Babilonia
  alternative_spanish_readings:
  - tras haber deportado ... y los había traído a Babilonia
  - después de haber exiliado ...
  rationale: La forma verbal española mantiene la secuencia histórica previa a la visión sin alterar el contenido doctrinal o profético del pasaje.
  doctrine_reference: Narrative sequencing / historical referent
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del audit trail inglés: Yahvé para el Tetragrámaton, Nabucodrezzar para la forma hebrea del nombre del rey de Babilonia, y la secuencia temporal de un pluperfecto español para reflejar el valor de אַחֲרֵי הַגְלוֹת / וַיְבִאֵם. No se introdujeron cambios textuales respecto del sentido auditado; solo ajustes idiomáticos propios del español.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' consistentemente para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo 'canastas' en el texto principal, con nota alternativa para 'cestas'.
  - Se eligieron 'oficiales', 'artesanos' y 'herreros' para reflejar grupos sociales/ocupacionales distintos sin fusionarlos.
  - La sintaxis conserva la relación temporal del hebreo con un pasado anterior en español.
