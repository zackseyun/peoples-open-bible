translation:
  language: es
  text: Tu rectitud es como los montes de Dios[a]; tus juicios son un gran abismo. Yahvé[b], tú salvas al hombre y a la bestia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los montes de Dios», quizá en el sentido de «montes poderosos» o «los montes más altos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tú salvas a la humanidad y a los animales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקָתְךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia recta
  lexicon: HALOT
  rationale: En este poema, צִדְקָה expresa la cualidad de lo que es justo y recto en Dios. En español, 'justicia' comunica bien ese campo semántico y mantiene el paralelo con 'juicios'. 'Rectitud' es posible, pero aquí suena menos natural y puede debilitar la correspondencia con el segundo hemistiquio.
- source_word: כְּהַרְרֵי אֵל
  english_pob_choice: like the mountains of God
  chosen_spanish: como los montes de Dios
  alternatives_spanish:
  - como los montes divinos
  - como montes de Dios
  lexicon: HALOT
  rationale: Sigo la transparencia formal del hebreo y de la decisión inglesa. 'Montes de Dios' conserva la imagen y permite percibir el posible valor superlativo o descriptivo del hebreo sin cerrarlo prematuramente. 'Montes divinos' suavizaría la ambigüedad, pero sería una interpretación más que una traducción.
- source_word: מִשְׁפָּטֶךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus sentencias
  - tus decretos
  - tu justicia
  lexicon: HALOT
  rationale: '''Juicios'' preserva la diferencia léxica respecto de צִדְקָה y refleja bien las decisiones o actos judiciales de Dios. ''Justicia'' sería posible, pero en español borraría el contraste poético entre justicia y juicios.'
- source_word: תְּהוֹם רַבָּה
  english_pob_choice: a great deep
  chosen_spanish: un gran abismo
  alternatives_spanish:
  - un gran profundo
  - un inmenso mar profundo
  - un gran mar profundo
  lexicon: HALOT
  rationale: '''Abismo'' comunica en español la hondura inmensurable de תְּהוֹם y mantiene el tono poético. ''Gran profundo'' resulta poco natural en español; ''gran abismo'' conserva la imagen sin añadir demasiada interpretación.'
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  - la gente
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico representativo en paralelo con 'bestia'. 'El hombre' conserva esa forma compacta y la fuerza poética del contraste. 'La humanidad' explicita el sentido inclusivo, pero borra la singularidad retórica del hebreo.
- source_word: וּבְהֵמָה
  english_pob_choice: and beast
  chosen_spanish: y la bestia
  alternatives_spanish:
  - y los animales
  - y el ganado
  lexicon: HALOT
  rationale: '''Bestia'' reproduce con mayor cercanía la pareja tradicional con אָדָם y mantiene el registro elevado del poema. ''Animales'' sería más general, pero menos fiel al paralelismo y menos intenso en español.'
- source_word: תוֹשִׁיעַ
  english_pob_choice: you save
  chosen_spanish: tú salvas
  alternatives_spanish:
  - tú libras
  - tú preservas
  - tú rescatas
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע admite salvar, librar o preservar. 'Salvas' es la opción más amplia y teológicamente resonante en español, sin excluir el matiz de preservación providencial que el contexto sugiere.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  - Oh SEÑOR
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Mantengo el vocativo con ''Oh'' para reflejar el giro exhortativo del hebreo. Se evita ''SEÑOR'' por la política terminológica del POB y para no ocultar el nombre divino.'
theological_decisions:
- issue: Nombre divino יְהוָה en vocativo
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Oh SEÑOR
  rationale: El texto hebreo usa el Nombre divino directamente. La traducción conserva el vocativo y el nombre propio revelado, conforme a la política del proyecto, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sustantivo genérico אָדָם en paralelo con בְּהֵמָה
  english_pob_reading: man and beast
  chosen_spanish_reading: el hombre y la bestia
  alternative_spanish_readings:
  - la humanidad y los animales
  - el ser humano y los animales
  rationale: El hebreo presenta un singular representativo en contraste poético con 'bestia'. En español, 'el hombre' mantiene esa forma compacta y el paralelismo, sin forzar una paráfrasis inclusiva que diluya la figura retórica.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם adam → man / humankind (context)'
translation_notes:
  revision_awareness: El texto sigue de cerca la última pasada revisada, que no requirió cambios. Se mantuvo la decisión principal sobre el Nombre divino y la estructura poética del paralelismo, ajustando el español para naturalidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה según la terminología del proyecto.
  - Se conserva la distinción entre 'justicia' y 'juicios' para reflejar צִדְקָתְךָ / מִשְׁפָּטֶךָ.
  - '''Montes de Dios'' mantiene la ambigüedad del hebreo y se ancla con nota.'
  - '''El hombre y la bestia'' preserva el singular genérico de אָדָם y el paralelismo poético.'
  - '''Bestia'' se mantiene por registro y fidelidad al binomio hebreo, aunque ''animales'' queda como alternativa nota.'
