  spanish_quality_summary: 'El español es claro y bastante natural, pero necesita un ajuste principal: «¿Y por qué hemos de servirlo nosotros?» cambia el valor modal del hebreo/POB, que pregunta «¿por qué deberíamos servirlo?» más que «¿por qué tenemos que servirlo?». Además, «Pero ¿por qué…?» expresa mejor el matiz adversativo de וּמַדּוּעַ que «Y por qué». El resto es legible y digno.'
