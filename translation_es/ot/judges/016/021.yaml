translation:
  language: es
  text: Entonces los filisteos se apoderaron de él, le sacaron los ojos[a], lo bajaron a Gaza, lo ataron con grilletes de bronce, y estaba moliendo en la casa de los presos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le vaciaron los ojos». El verbo hebreo es un término concreto para mutilar los ojos; «le sacaron los ojos» hace explícita la violencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la prisión». Literalmente, «en la casa de los presos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאחֲזוּהוּ
  english_pob_choice: seized him
  chosen_spanish: se apoderaron de él
  alternatives_spanish:
  - lo agarraron
  - lo capturaron
  lexicon: HALOT
  rationale: אחז expresa tomar o asir con fuerza. En español, «se apoderaron de él» comunica la acción hostil y el dominio sobre Sansón con fuerza comparable a «seized him», sin sonar demasiado técnico ni suavizar el impacto.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: El nombre del pueblo se mantiene con el equivalente estándar en español. El artículo definido es natural porque se trata del grupo conocido que actúa en la escena.
- source_word: וַיְנַקְּרוּ אֶת עֵינָיו
  english_pob_choice: gouged out his eyes
  chosen_spanish: le sacaron los ojos
  alternatives_spanish:
  - le arrancaron los ojos
  - lo cegaron
  lexicon: HALOT
  rationale: נקר aquí denota una mutilación concreta de los ojos. «Le sacaron los ojos» conserva la violencia física de la frase y evita diluirla en «lo cegaron», que sería más general. Aunque «arrancaron» es posible, «sacaron» mantiene buena naturalidad en español.
- source_word: וַיּוֹרִידוּ אֹתוֹ עַזָּתָה
  english_pob_choice: brought him down to Gaza
  chosen_spanish: lo bajaron a Gaza
  alternatives_spanish:
  - lo llevaron a Gaza
  - lo condujeron a Gaza
  lexicon: HALOT
  rationale: La forma causativa de ירד conserva el matiz direccional de «hacer bajar». «Lo bajaron a Gaza» reproduce bien la imagen espacial y la humillación implícita, mientras que «llevaron» o «condujeron» suavizarían ese matiz.
- source_word: עַזָּתָה
  english_pob_choice: to Gaza
  chosen_spanish: a Gaza
  alternatives_spanish:
  - hacia Gaza
  lexicon: HALOT
  rationale: El sufijo direccional se traduce naturalmente por el movimiento hacia la ciudad. «A Gaza» es claro y fiel al valor de dirección del hebreo.
- source_word: וַיַּאַסְרוּהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ataron
  alternatives_spanish:
  - lo encadenaron
  - lo sujetaron
  lexicon: HALOT
  rationale: אסר significa atar o sujetar con ligaduras. «Lo ataron» es el equivalente más directo y evita introducir una especificación no expresada aún por el hebreo.
- source_word: בַּנְחֻשְׁתַּיִם
  english_pob_choice: with bronze shackles
  chosen_spanish: con grilletes de bronce
  alternatives_spanish:
  - con cadenas de bronce
  - con argollas de bronce
  lexicon: HALOT
  rationale: La forma dual/plural refiere a ataduras metálicas. «Grilletes» comunica con precisión una sujeción física de prisionero; «de bronce» sigue la convención bíblica para נְחֹשֶׁת. Se mantiene el peso material sin forzar una imagen moderna ajena al texto.
- source_word: וַיְהִי טוֹחֵן
  english_pob_choice: he was grinding
  chosen_spanish: y estuvo moliendo
  alternatives_spanish:
  - y molía
  - y quedó moliendo
  lexicon: HALOT
  rationale: La construcción marca un estado o actividad resultante. «Estuvo moliendo» expresa la acción continua y obligada sin añadir el objeto «grano», que no aparece en el hebreo.
- source_word: בְּבֵית הָאֲסִירִים
  english_pob_choice: in the prison house
  chosen_spanish: en la casa de los presos
  alternatives_spanish:
  - en la casa de los prisioneros
  - en la prisión
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en la casa de los presos/prisioneros». «Casa de los presos» conserva la concreción de la imagen mejor que «prisión», y evita un giro demasiado abstracto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audito inglés: conserva la secuencia verbal, el matiz direccional de «bajaron a Gaza», la violencia concreta de la mutilación ocular y la imagen final de trabajo forzado en la «casa de los presos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene «filisteos» como etnónimo estándar.
  - «Grilletes de bronce» conserva el valor material de נְחֻשְׁתַּיִם sin sustituirlo por un término eclesiástico.
  - La frase final evita añadir «grano» para no exceder lo expresado por טוֹחֵן.
