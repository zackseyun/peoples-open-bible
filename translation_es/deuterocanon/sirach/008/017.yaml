revisions:
- from: No te aconsejes con un necio[a], porque no podrá guardar una cosa.
  to: No te hagas fiador por uno más fuerte que tú; y si te has hecho fiador[a], actúa como quien debe pagar.
  rationale: Se restituye la lectura hebrea principal, en conformidad con la fuente validada y el POB inglés. «Hazte fiador» expresa con claridad moderna el valor jurídico-financiero de ערב; «por uno más fuerte que tú» conserva la idea práctica de alguien superior o más allá de tus posibilidades; la repetición de «fiador» mantiene consistencia léxica en ambas cláusulas; y «actúa como quien debe pagar» refleja la comparación implícita de כמשלם. La variante griega se preserva en nota como lectura alternativa, no como texto principal.
