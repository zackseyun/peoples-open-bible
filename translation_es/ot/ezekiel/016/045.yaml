translation:
  language: es
  text: Tú eres la hija de tu madre[a], que aborrecía a su esposo y a sus hijos e hijas; y eres la hermana de tus hermanas, que aborrecían a sus esposos y a sus hijos e hijas. Tu madre era hitita, y tu padre era amorreo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "despreciaba" / "detestaba" para el verbo hebreo געל, que expresa fuerte repulsión.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת אִמֵּךְ
  english_pob_choice: the daughter of your mother
  chosen_spanish: la hija de tu madre
  alternatives_spanish:
  - la hija de tu madre
  - tu madre, contigo como hija
  lexicon: HALOT
  rationale: Conservo la estructura genealógica del hebreo para mantener la acusación por linaje y el paralelismo del verso, tal como hace el POB en inglés. En español, "la hija de tu madre" suena natural y preserva la imagen sin convertirla en una paráfrasis.
- source_word: גֹּעֶלֶת
  english_pob_choice: who loathed
  chosen_spanish: aborrecía
  alternatives_spanish:
  - despreciaba
  - detestaba
  lexicon: HALOT
  rationale: El verbo expresa fuerte repulsión o rechazo. "Aborrecía" mantiene el peso afectivo y la dureza retórica sin perder la intensidad del hebreo; además permite reflejar la nota de alternativa léxica del POB inglés.
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - su hombre
  lexicon: HALOT
  rationale: En este contexto doméstico y relacional, el sentido es marital. "Esposo" es claro y digno en español y conserva el valor contextual que el POB identifica para אִישׁ con sufijo.
- source_word: וּבָנֶיהָ
  english_pob_choice: and her children
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a sus hijos
  - y a su descendencia
  lexicon: HALOT
  rationale: Sigo la decisión del POB de no restringir a "hijos" biológicos masculinos. "Hijos" en español puede funcionar de manera colectiva en este contexto; la preposición repetida ayuda a conservar el paralelismo de la enumeración.
- source_word: וַאֲחוֹת אֲחוֹתֵךְ
  english_pob_choice: and the sister of your sisters
  chosen_spanish: y eres la hermana de tus hermanas
  alternatives_spanish:
  - y eres una hermana de tus hermanas
  - y eres la hermana entre tus hermanas
  lexicon: HALOT
  rationale: El hebreo intensifica la relación de semejanza y pertenencia. En español, "la hermana de tus hermanas" mantiene la estructura retórica, aunque suene marcada; evita suavizar el vínculo simbólico que el POB conserva.
- source_word: אֲשֶׁר גָּעֲלוּ
  english_pob_choice: who loathed
  chosen_spanish: que aborrecían
  alternatives_spanish:
  - que despreciaban
  - que detestaban
  lexicon: HALOT
  rationale: Mantengo la misma raíz semántica que en la primera cláusula para conservar la repetición enfática del hebreo y la consistencia del POB. La repetición de "aborrecían" refuerza la fuerza acusatoria.
- source_word: אַנְשֵׁיהֶן
  english_pob_choice: their husbands
  chosen_spanish: a sus esposos
  alternatives_spanish:
  - a sus maridos
  - a sus hombres
  lexicon: HALOT
  rationale: El plural de אִישׁ en contexto conyugal se traduce naturalmente como "esposos". Repito la preposición para reflejar la estructura del original y la serie de objetos directos del reproche.
- source_word: וּבְנֵיהֶן
  english_pob_choice: and their children
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a sus hijos
  - y a su descendencia
  lexicon: HALOT
  rationale: Como en la primera mitad del verso, "hijos" conserva el sentido colectivo de offspring/descendencia sin estrechar innecesariamente el hebreo a varones.
- source_word: אִמְּכֶן חִתִּית
  english_pob_choice: Your mother was a Hittite
  chosen_spanish: Tu madre era hitita
  alternatives_spanish:
  - Tu madre fue hitita
  - Tu madre, hitita
  lexicon: HALOT
  rationale: Sigo el patrón nominal predicativo del hebreo. "Hitita" mantiene la designación étnica; el verbo "era" es la forma más natural en español para el estado/identidad sin forzar una cronología ajena al texto.
- source_word: וַאֲבִיכֶן אֱמֹרִי
  english_pob_choice: and your father an Amorite
  chosen_spanish: y tu padre amorreo
  alternatives_spanish:
  - y tu padre era amorreo
  - y tu padre, amorreo
  lexicon: HALOT
  rationale: Conservo la concisión del hebreo y del POB inglés. En español, la omisión del verbo copulativo en la segunda cola funciona como estilo profético y deja oír el paralelismo acusatorio del original.
theological_decisions:
- issue: Lenguaje de parentesco étnico como injuria profética, no como genealogía literal
  english_pob_reading: Retained as metaphorical/taunting ancestry language within Ezekiel's prophetic indictment, not as a literal genealogical statement about Jerusalem's biological origins.
  chosen_spanish_reading: Se conserva como lenguaje metafórico y de reproche dentro de la acusación profética, no como una afirmación genealógica literal sobre el origen biológico de Jerusalén.
  alternative_spanish_readings:
  - Lectura literal de ascendencia étnica
  - Reescritura suavizada para evitar el tono insultante
  rationale: La fuerza del pasaje depende del insulto profético y del parentesco simbólico. Traducirlo de forma literal mantiene la tensión teológica e histórica sin resolverla artificialmente; suavizarlo borraría el impacto retórico que el texto quiere producir.
  doctrine_reference: Preservar la tensión textual y el habla profética directa; primacía del texto fuente sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'Coincido con el estado de alta concordancia del control cruzado: no se requieren revisiones sustantivas respecto del sentido base. La versión española mantiene el paralelismo, la carga acusatoria y la lectura metafórica documentada en el POB inglés.'
  spanish_consistency_notes:
  - Uso "hitita" y "amorreo" como gentilicios étnicos estándar, en minúscula por tratarse de nombres comunes en español.
  - Mantengo "hijos" en sentido colectivo para בנים, coherente con la decisión inglesa de "children".
  - Preservo la repetición de "aborrecía/aborrecían" para reflejar el mismo verbo hebreo en ambas cláusulas.
  - Conservo el tono profético directo sin añadir explicaciones dentro del cuerpo del verso.
  - La nota al pie se ancla en "aborrecía" para ofrecer la alternativa léxica sin duplicar marcadores.
