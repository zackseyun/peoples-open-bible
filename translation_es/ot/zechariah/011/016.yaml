translation:
  language: es
  text: Porque he aquí[a], yo levanto a un pastor en la tierra que no atenderá a los que perecen[b], no buscará a los dispersos, no sanará a la quebrantada, no sostendrá a la sana[c], pero comerá la carne de las más gordas y arrancará sus pezuñas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira». El hebreo introduce la declaración con una partícula de énfasis.
    reason: alternative_reading
  - marker: b
    text: O «los que desaparecen» / «los destruidos» para «los que perecen».
    reason: lexical_alternative
  - marker: c
    text: O «la que está de pie» para «la sana». El hebreo es literalmente «la que está en pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵקִים
  english_pob_choice: am raising up
  chosen_spanish: levanto
  alternatives_spanish:
  - alzo
  - levanto en pie
  - establezco
  lexicon: HALOT
  rationale: El hebreo Hiphil de קום expresa poner/levantar. «Levanto» mantiene la agencia divina y el movimiento de instaurar sin añadir una instalación formal que el texto no explicita.
- source_word: רֹעֶה
  english_pob_choice: a shepherd
  chosen_spanish: un pastor
  alternatives_spanish:
  - un pastor de ovejas
  - un pastor
  lexicon: HALOT
  rationale: «Pastor» comunica de modo natural la imagen pastoral y la función de liderazgo. En español eclesial es el equivalente más inteligible y fiel sin perder la metáfora.
- source_word: הַנִּכְחָדוֹת
  english_pob_choice: the perishing
  chosen_spanish: los que perecen
  alternatives_spanish:
  - los que desaparecen
  - los perdidos
  - los destruidos
  lexicon: HALOT
  rationale: El término hebreo apunta a los que están desapareciendo o pereciendo. «Los que perecen» conserva la ambigüedad entre pérdida y destrucción que el audit trail inglés quiso preservar.
- source_word: יִפְקֹד
  english_pob_choice: attend to
  chosen_spanish: atenderá
  alternatives_spanish:
  - visitará
  - cuidará de
  - se ocupará de
  lexicon: HALOT
  rationale: En contexto de pastoreo, פקד puede ser visitar, atender o cuidar. «Atenderá» es natural en español y amplia lo suficiente para reflejar el sentido de cuidado o inspección.
- source_word: הַנַּעַר
  english_pob_choice: the scattered
  chosen_spanish: los dispersos
  alternatives_spanish:
  - el joven
  - la oveja joven
  - los descarriados
  lexicon: HALOT
  rationale: Aunque נער puede significar «joven», el contexto del rebaño y el paralelo con «buscar» favorecen una referencia a miembros dispersos o vulnerables del rebaño. «Los dispersos» sigue la revisión inglesa y evita forzar un sentido juvenil literal.
- source_word: יְבַקֵּשׁ
  english_pob_choice: seek
  chosen_spanish: buscará
  alternatives_spanish:
  - procurará
  - buscará diligentemente
  lexicon: HALOT
  rationale: בקש se traduce de forma directa con «buscar». Es breve, idiomático y conserva el paralelismo de las acciones pastorales.
- source_word: הַנִּשְׁבֶּרֶת
  english_pob_choice: the broken
  chosen_spanish: el quebrantado
  alternatives_spanish:
  - la quebrada
  - el herido
  - el roto
  lexicon: HALOT
  rationale: El participio pasivo expresa la condición de estar quebrado o dañado. «El quebrantado» es un español bíblico claro que conserva la metáfora sin limitarla a lesión física.
- source_word: יְרַפֵּא
  english_pob_choice: heal
  chosen_spanish: sanará
  alternatives_spanish:
  - curará
  - restaurará
  - vendrá a sanar
  lexicon: HALOT
  rationale: רפא significa sanar/curar. «Sanará» es la forma más natural y fiel en español para mantener el paralelismo pastoral.
- source_word: הַנִּצָּבָה
  english_pob_choice: the healthy
  chosen_spanish: el sano
  alternatives_spanish:
  - el que está en pie
  - el que queda de pie
  - el saludable
  lexicon: HALOT
  rationale: La forma literal significa «el que está de pie»; el audit trail inglés prefirió «the healthy» para expresar el probable sentido contextual. «El sano» comunica esa idea en español sin ocultar la base literal, que se preserva en la documentación.
- source_word: יְכַלְכֵּל
  english_pob_choice: sustain
  chosen_spanish: sostendrá
  alternatives_spanish:
  - mantendrá
  - sustentará
  - proveerá para
  lexicon: HALOT
  rationale: כלכל puede significar sostener, mantener o proveer. «Sostendrá» refleja bien la idea de cuidado continuo y dependencia del rebaño.
- source_word: הַבְּרִיאָה
  english_pob_choice: the fat ones
  chosen_spanish: los engordados
  alternatives_spanish:
  - los gordos
  - los bien alimentados
  - los sanos
  lexicon: HALOT
  rationale: בריא puede denotar gordura, salud o buen estado. En un cuadro depredador, «los engordados» preserva la imagen de animales cebados para el consumo, sin suavizarla.
- source_word: פַרְסֵיהֶן
  english_pob_choice: their hooves
  chosen_spanish: sus pezuñas
  alternatives_spanish:
  - sus cascos
  - sus pezuñas
  lexicon: HALOT
  rationale: פרסה es la pezuña o casco de animales. «Pezuñas» es un término preciso y natural en español bíblico y zootécnico.
- source_word: יְפָרֵק
  english_pob_choice: tear off
  chosen_spanish: arrancará
  alternatives_spanish:
  - desgarrará
  - romperá
  - separará
  lexicon: HALOT
  rationale: פרק puede expresar arrancar, romper o separar violentamente. «Arrancará» comunica de forma vívida la violencia del gesto sin exagerar más allá del hebreo.
theological_decisions:
- issue: Identidad del pastor malvado
  english_pob_reading: Render the figure simply as 'a shepherd' without identifying him as a specific historical or eschatological person in the translation.
  chosen_spanish_reading: Traducirlo simplemente como «un pastor», sin identificarlo en el texto como un personaje histórico o escatológico concreto.
  alternative_spanish_readings:
  - un pastor malo
  - un pastor inútil
  - el pastor perverso
  rationale: El verso presenta la figura en términos descriptivos y deja abierta su identificación. La traducción debe conservar esa tensión profética sin imponer una interpretación que el hebreo del versículo no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente reemplazó «For look» por «For behold», cambió «the straying» a «the scattered» y «the standing» a «the healthy». Esta redacción española sigue esas decisiones revisadas: usa «Porque he aquí», «los dispersos» y «el sano», manteniendo el resto de la imagen pastoral y violenta del texto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Pastor» se usa para רֹעֶה por coherencia con el lenguaje profético-pastoral.
  - Se conserva la tensión entre literalidad y sentido contextual en «los que perecen» y «el sano», reflejando las alternativas documentadas.
