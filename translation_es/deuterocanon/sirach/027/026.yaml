  source_alignment_summary: 'El borrador refleja bien la estructura proverbial y el sentido básico del griego: quien cava una cavidad cae en ella, y quien prepara una trampa queda preso en ella. Sin embargo, παγίδα fue documentado en el rastro inglés como ''snare'' con intención de conservar una imagen más específica y literaria que ''trap/trampa''; en español ''trampa'' es posible, pero aquí conviene una opción más ajustada a la imaginería sapiencial.'
  spanish_quality_summary: 'El español es claro y natural. La única mejora importante es léxica y de tono: ''hoyo'' funciona, pero ''foso'' encaja mejor con la imaginería proverbial de βόθρον; y ''pone una trampa'' suena más genérico que ''tiende un lazo'', que además permite una mejor correspondencia con παγίδα. También conviene evitar una nota innecesariamente amplia (''red'') que introduce una alternativa menos precisa en este contexto.'
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. La revisión propuesta sigue el criterio de fidelidad léxica del POB al distinguir βόθρον de παγίδα con dos imágenes diferentes ('foso' / 'lazo') en lugar de una formulación más genérica.
  issues:
  - severity: medium
    issue: '`trampa` debilita la distinción imagística de παγίδα'
    rationale: El expediente inglés eligió 'snare' precisamente para no aplanar la segunda imagen. En español, 'lazo' conserva mejor la idea de un artefacto para atrapar y mantiene el tono proverbial/literario.
  - severity: low
    issue: La nota al pie propone alternativas demasiado abiertas
    rationale: Mencionar 'red' como alternativa puede desviar la imagen sin apoyo contextual suficiente. Si se mantiene una nota, debería limitarse a aclarar el matiz de 'lazo' frente a 'trampa'.
  - severity: low
    issue: '`hoyo` es correcto pero algo menos preciso que `foso`'
    rationale: βόθρον en un proverbio de caída/daño admite 'hoyo', pero 'foso' suena más intencional y sentencioso en español bíblico moderno sin caer en arcaísmo.
  revised_spanish_text: El que cava un foso caerá en él, y el que tiende un lazo[a] será atrapado en él.
  revised_footnotes:
  - marker: a
    text: O «una trampa». «Lazo» conserva mejor la imagen de παγίδα como artefacto para atrapar.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la imaginería para reflejar mejor la distinción del griego y la rationale del POB en inglés: βόθρον como ''foso'' y παγίδα como ''lazo''. También se simplifica la referencia pronominal final a ''en él'' por concordar naturalmente con ''lazo'' y mantener el paralelismo proverbial. No se requiere adjudicación adicional.'
