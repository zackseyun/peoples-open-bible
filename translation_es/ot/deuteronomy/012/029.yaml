revisions:
- from: Cuando Yahvé tu Dios[a] corte de delante de ti a las naciones, que tú vas allí para tomarlas en posesión, y tú las tomes en posesión y habites en su tierra,
  to: Cuando Yahvé tu Dios[a] corte de delante de ti las naciones adonde tú vas para desposeerlas, y las desposeas y habites en su tierra,
  rationale: Se revisa para reflejar con más precisión ירש como 'desposeer' en ambos casos, en línea con la evidencia fuente y la decisión léxica inglesa auditada. También se mejora la fluidez de la cláusula relativa en español sin apartarse del sentido del hebreo. La nota sobre el nombre divino se conserva intacta y correctamente anclada.
