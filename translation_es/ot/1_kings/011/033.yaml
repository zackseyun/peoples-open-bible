  to: porque me han abandonado y se han postrado ante Astarté[a], el dios de los sidonios, ante Quemos, el dios de Moab, y ante Milcom[b], el dios de los amonitas, y no han andado en mis caminos, para hacer lo recto ante mis ojos y mis estatutos y mis juicios, como David, su padre[c].
  rationale: 'Se corrigen tres errores graves de sentido y de alineación con el audit trail: el hebreo usa ''dios de'' en los tres sintagmas, y solo en Astarté corresponde conservar la tensión entre forma gramatical y referente femenino mediante una nota, no mediante cambio del texto principal. También se vuelve idiomático ''los amonitas'' para בְנֵי עַמּוֹן, en línea con la decisión inglesa documentada. Se mantienen las demás elecciones del borrador, incluida la estructura literal del tramo final, porque reflejan adecuadamente la fuente.'
