revisions:
- from: Yahvé tronó desde los cielos[a], y el Altísimo dio su voz.
  to: Yahvé tronó desde el cielo, y el Altísimo dio su voz[a].
  rationale: Se corrige «desde los cielos» a «desde el cielo» para ajustarse a la decisión auditada del POB y mejorar la naturalidad en español. También se mueve la nota al pie para anclarla correctamente a «dio su voz», que es el elemento que la nota explica.
  reviewer_model: gpt-5.4
