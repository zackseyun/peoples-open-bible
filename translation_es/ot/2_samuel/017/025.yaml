translation:
  language: es
  text: Y Absalón puso a Amasa al frente del ejército en lugar de Joab. Amasa era hijo de un hombre llamado Jitra, el israelita[a], que había ido a unirse a Abigail, hija de Nahás, hermana de Zeruía, madre de Joab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Jitra el israelita». 1 Crónicas 2:17 tiene «Jeter el ismaelita».'
    reason: textual_variant
lexical_decisions:
- source_word: שָׂם
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - estableció
  - colocó
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de poner o instalar a alguien en un cargo. En español, «puso» comunica ese cambio de manera natural sin añadir una formalidad que el contexto no exige.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: Aquí la idea es de reemplazo, no de posición física. «En lugar de» conserva con claridad el sentido de sustitución que la POB en inglés también destacó.
- source_word: עַל הַצָּבָא
  english_pob_choice: over the army
  chosen_spanish: sobre el ejército
  alternatives_spanish:
  - al frente del ejército
  - en mando del ejército
  lexicon: HALOT
  rationale: La preposición hebrea marca autoridad sobre la fuerza militar. «Sobre el ejército» sigue de cerca la estructura y mantiene el sentido de mando.
- source_word: בֶן אִישׁ
  english_pob_choice: the son of a man
  chosen_spanish: hijo de un hombre
  alternatives_spanish:
  - hijo de cierto hombre
  - descendiente de un hombre
  lexicon: HALOT
  rationale: El hebreo es deliberadamente indefinido. «Hijo de un hombre» conserva esa indefinición sin introducir más precisión de la que ofrece el texto.
- source_word: וּשְׁמוֹ יִתְרָא
  english_pob_choice: whose name was Ithra
  chosen_spanish: llamado Jitra
  alternatives_spanish:
  - de nombre Jitra
  - cuyo nombre era Jitra
  lexicon: HALOT
  rationale: Reorganicé la frase para fluidez en español y mantuve la función identificadora del nombre. «Jitra» refleja el nombre propio en forma castellana usual para este versículo.
- source_word: הַיִּשְׂרְאֵלִי
  english_pob_choice: the Israelite
  chosen_spanish: el israelita
  alternatives_spanish:
  - israelita
  - de Israel
  lexicon: HALOT
  rationale: Sigo la lectura del texto hebreo masorético. «El israelita» preserva el valor gentilicio sin armonizarlo con Crónicas, donde aparece la variante «ismaelita».
- source_word: אֲשֶׁר בָּא אֶל
  english_pob_choice: who had gone in to
  chosen_spanish: que se había llegado a
  alternatives_spanish:
  - que había entrado a
  - que había tenido relaciones con
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo de unión sexual. «Se había llegado a» conserva el eufemismo bíblico en un español natural y suficientemente claro.
- source_word: אֲבִיגַל בַּת נָחָשׁ
  english_pob_choice: Abigail the daughter of Nahash
  chosen_spanish: Abigail, hija de Nahás
  alternatives_spanish:
  - Abigail hija de Nahás
  - Abigail, la hija de Nahás
  lexicon: HALOT
  rationale: 'Mantengo la relación filiatoria explícita y adapto el nombre propio a la forma habitual en español bíblico con tilde en la última sílaba: «Nahás».'
- source_word: אֲחוֹת צְרוּיָה
  english_pob_choice: sister of Zeruiah
  chosen_spanish: hermana de Zeruía
  alternatives_spanish:
  - la hermana de Zeruía
  - Zeruía, hermana de ella
  lexicon: HALOT
  rationale: La cadena constructa se resuelve de forma directa como relación de parentesco. «Zeruía» es la forma española habitual del nombre propio.
- source_word: אֵם יוֹאָב
  english_pob_choice: Joab’s mother
  chosen_spanish: madre de Joab
  alternatives_spanish:
  - la madre de Joab
  - madre de Joab
  lexicon: HALOT
  rationale: La aposición final identifica a Zeruía. En español, «madre de Joab» conserva la relación sin forzar un posesivo donde el sintagma nominal resulta más natural.
theological_decisions:
- issue: Variación textual en el nombre y etnónimo de Ithra
  english_pob_reading: 'Hebrew: ''Ithra the Israelite.'' 1 Chronicles 2:17 has ''Jether the Ishmaelite.'''
  chosen_spanish_reading: Jitra, el israelita
  alternative_spanish_readings:
  - Jeter, el ismaelita
  - Jitra, el ismaelita
  rationale: El texto base sigue el hebreo masorético de Samuel. La variante de Crónicas se conserva como alternativa textual implícita en la nota, pero no se sustituye en el cuerpo principal porque no pertenece al testimonio principal de este versículo.
  doctrine_reference: Crítica textual bíblica; armonización entre Samuel y Crónicas
- issue: Eufemismo sexual en 'בא אל'
  english_pob_reading: who had gone in to Abigail
  chosen_spanish_reading: que se había llegado a Abigail
  alternative_spanish_readings:
  - que había entrado a Abigail
  - que había tenido relaciones con Abigail
  rationale: La POB en inglés conservó el eufemismo hebreo en vez de explicitarlo. En español, «se había llegado a» mantiene esa reserva expresiva sin perder el sentido contextual de unión sexual.
  doctrine_reference: Lenguaje bíblico y pudor textual
- issue: Relación de parentesco final entre Zeruía y Joab
  english_pob_reading: sister of Zeruiah, Joab’s mother
  chosen_spanish_reading: hermana de Zeruía, madre de Joab
  alternative_spanish_readings:
  - Zeruía, hermana de Joab
  - Zeruía, madre de Joab
  rationale: 'La lectura mantiene la sintaxis del hebreo: Abigail es hermana de Zeruía, y Zeruía es madre de Joab. Esta estructura evita invertir o simplificar indebidamente los vínculos familiares.'
  doctrine_reference: Fidelidad sintáctica al texto fuente
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la naturalidad de la frase filial ('the daughter of Nahash'). La presente versión española sigue ese mismo nivel de naturalidad sin perder la relación explícita de filiación, y conserva la variante textual de Crónicas en nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evitó «Cristo» porque no hay lenguaje mesiánico en el versículo.
  - Se eligió «el israelita» para respetar el texto hebreo de Samuel y no armonizar con la variante de Crónicas.
  - Se usó «madre de Joab» para una construcción española natural, equivalente a la aposición final hebrea.
