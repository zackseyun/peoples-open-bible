  language: en
  yaml_path: translation/ot/1_chronicles/028/001.yaml
  text: 'Then David assembled at Jerusalem all the leaders of Israel: the leaders of the tribes[a], the leaders of the divisions that served the king, the commanders of thousands and of hundreds, and the leaders over all the property and livestock belonging to the king and to his sons, together with the officials, the mighty men, and every mighty man of valor.'
  footnotes:
