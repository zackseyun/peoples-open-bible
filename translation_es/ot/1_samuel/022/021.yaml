  text: Abiatar le dijo a David que Saúl había matado a los sacerdotes de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le dijo
  alternatives_spanish:
  - le contó
  - le informó
  lexicon: HALOT
  rationale: El hifil de נגד comunica hacer saber o decir. En español, «le dijo» reproduce de modo natural la relación de hablante y destinatario sin añadir un matiz excesivamente formal o técnico.
- source_word: אֶבְיָתָר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiatar
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio según uso bíblico estándar en español, manteniendo la identificación del personaje sin traducirlo.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: Sintaxis del hebreo bíblico
  rationale: La ל prefijada marca aquí destinatario indirecto; en español se expresa naturalmente con «a David».
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  lexicon: HALOT
  rationale: Introduce el contenido del mensaje de Abiatar; «que» es la subordinación más directa y natural en español.
- source_word: הָרַג
  english_pob_choice: had killed
  chosen_spanish: había matado
  alternatives_spanish:
  - había asesinado
  - había dado muerte a
  lexicon: HALOT
  rationale: El qatal reporta una acción anterior al acto de decir. El pluscuamperfecto español conserva esa anterioridad. «Había matado» es claro y fiel al valor léxico sin intensificar innecesariamente con «asesinado».
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saúl
  lexicon: Convención onomástica
  rationale: Nombre propio bíblico convencional en español.
- source_word: כֹּהֲנֵי יְהוָה
  english_pob_choice: the priests of Yahweh
  chosen_spanish: los sacerdotes de Yahvé
  alternatives_spanish:
  - los sacerdotes de Yahvé
  - los sacerdotes de Yahveh
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de manera natural con «los sacerdotes de Yahvé». Se mantiene el nombre divino según la norma del proyecto, evitando la sustitución por un título.
theological_decisions:
- issue: Renderizado del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el nombre divino propio, no un título. En español se adopta la forma estable del proyecto, «Yahvé», para conservar la referencia al nombre del pacto sin ocultarla detrás de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y coincide con la decisión inglesa auditada: un verbo de habla simple, el orden del contenido reportado y el uso explícito del nombre divino. No se detectan variantes textuales ni tensiones léxicas que requieran nota al pie en esta unidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de acuerdo con la terminología del proyecto.
  - Se usa el pluscuamperfecto «había matado» para reflejar la anterioridad del hecho reportado.
  - 'Los nombres propios se presentan en su forma española habitual: Abiatar, David, Saúl.'
