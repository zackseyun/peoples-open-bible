id: COL.1.19
reference: Colossians 1:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ἐν αὐτῷ εὐδόκησεν πᾶν τὸ πλήρωμα κατοικῆσαι
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/019.yaml
  text: For in him all the fullness was pleased to dwell,
translation:
  language: ko
  text: 이는 모든 충만[a]이 그분 안에 거하기를 기뻐하셨기[b] 때문이며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「모든 충만」은 흔히 「하나님의 충만」으로 이해된다. 골로새서 2:9 참조.
    reason: cross_reference
  - marker: b
    text: '많은 번역이 함의된 주어를 명시한다(예: 「하나님이 ... 기뻐하셨다」). 헬라어는 주어를 명시하지 않는다.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_korean: 이는 ... 때문이며
  alternatives_korean:
  - 왜냐하면
  - 곧
  lexicon: BDAG
  rationale: 앞 절의 「으뜸 되심」에 대한 근거를 제시한다. 「이는 ~ 때문이며」가 다음 절과의 연결을 매끄럽게 한다.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분 안에
  alternatives_korean:
  - 그분 안에서
  lexicon: BDAG
  rationale: 「거하다」 동사와 결합하므로 「~에 거하기」가 자연스럽다.
- source_word: εὐδόκησεν
  english_pob_choice: was pleased
  chosen_korean: 기뻐하셨기
  alternatives_korean:
  - 기쁘게 여기셨기
  - 뜻하셨기
  lexicon: BDAG
  rationale: εὐδοκέω의 「선한 기뻐하심」을 「기뻐하셨기」로 옮긴다. 본문은 주어를 명시하지 않으므로 「하나님이」를 본문에 추가하지 않는다.
- source_word: πᾶν τὸ πλήρωμα
  english_pob_choice: all the fullness
  chosen_korean: 모든 충만
  alternatives_korean:
  - 온전한 충만
  - 충만 전체
  lexicon: BDAG
  rationale: 글로사리 기본값에 따라 πλήρωμα를 「충만」으로 옮긴다. 본문은 「하나님의」를 명시적으로 추가하지 않고 각주로 보존한다. 골로새서 2:9에서 「신성의 충만」으로 명시된다.
- source_word: κατοικῆσαι
  english_pob_choice: to dwell
  chosen_korean: 거하기를
  alternatives_korean:
  - 머무르기를
  - 거주하기를
  lexicon: BDAG
  rationale: κατοικέω의 「정착하여 거함」을 「거하기를」로 옮긴다. 한국 교회의 정립된 표현이다.
theological_decisions:
- issue: εὐδόκησεν의 함의된 주어
  chosen_reading: 본문에서 주어를 명시하지 않음
  alternative_readings:
  - 하나님이 기뻐하셨다
  - 아버지께서 기뻐하셨다
  rationale: 헬라어는 동사의 주어를 명시하지 않는다. 본 번역은 본문 추가를 피하고 함의된 주어를 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension'
- issue: πᾶν τὸ πλήρωμα의 지시
  chosen_reading: 「모든 충만」(「하나님의」를 본문에 추가하지 않음)
  alternative_readings:
  - 하나님의 모든 충만
  - 그분의 모든 충만
  rationale: 정통 신학은 아들의 완전한 신성을 고백하나, 본 절은 명시적 속격을 두지 않는다. 본문은 추가하지 않고 골로새서 2:9 참조를 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Affirmations; Preserve theological tension; cross-ref Col 2:9'
