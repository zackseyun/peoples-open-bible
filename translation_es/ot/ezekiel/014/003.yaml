- from: Hijo de hombre[a], estos hombres han puesto sus ídolos en su corazón y han colocado el tropiezo de su iniquidad delante de su rostro[b]. ¿Acaso debería ser consultado por ellos?
  to: Hijo de hombre, estos hombres han puesto sus ídolos[a] en su corazón y han colocado el tropiezo de su iniquidad delante de sus rostros[b]. ¿Acaso he de dejar que me consulten?
