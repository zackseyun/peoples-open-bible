lexical_decisions:
- source_word: οὐθὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: LSJ
  rationale: El neutro οὐθέν funciona aquí como objeto absoluto de 'amar'; 'nada' preserva la amplitud semántica del griego y suena natural en español.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama con amor
  - quiere
  lexicon: BDAG
  rationale: '''Ama'' reproduce directamente ἀγαπάω con un registro natural en español y conserva el peso teológico del amor divino sin añadir paráfrasis.'
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En este contexto εἰ μὴ introduce una excepción; 'sino' es la forma idiomática más clara en español para mantener esa relación exclusiva.
- source_word: τὸν ... συνοικοῦντα
  english_pob_choice: the one who dwells with
  chosen_spanish: al que habita con
  alternatives_spanish:
  - al que mora con
  - al que vive con
  lexicon: LSJ
  rationale: El participio sustantivado expresa una relación continua de asociación. 'Habita con' conserva el matiz de convivencia estable y suena más cercano al registro bíblico que 'vive con'.
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - Sabiduría
  - sabiduría
  lexicon: BDAG
  rationale: 'En español, el artículo definido hace natural la referencia: ''la sabiduría''. Se mantiene en minúscula para no resolver por la ortografía una personificación que el contexto literario sugiere pero no impone en la forma del verso.'
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: wisdom (lowercase), with a note that Wisdom is strongly personified in this chapter
  chosen_spanish_reading: la sabiduría, en minúscula
  alternative_spanish_readings:
  - la Sabiduría
  - Sabiduría
  rationale: El contexto del libro personifica intensamente a σοφία, pero el verso no exige una capitalización interpretativa. Mantener minúscula conserva la tensión literaria y permite que la personificación emerja del contexto, no de una decisión tipográfica.
  doctrine_reference: Preservar la tensión literaria/teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión final del inglés POB, especialmente el cambio de 'lives with' a 'dwells with'. En español, 'habita con' refleja mejor esa permanencia relacional que una opción más leve como 'vive con'.
  spanish_consistency_notes:
  - Se usa 'Dios' sin variación, en concordancia con la terminología POB.
  - Se mantiene 'sabiduría' en minúscula para no imponer una lectura ortográfica donde el griego no la marca.
  - La construcción 'al que' conserva el participio sustantivado griego con naturalidad en español.
  - '''Sino'' traduce la excepción de εἰ μὴ con fluidez idiomática y sin perder exclusividad.'
