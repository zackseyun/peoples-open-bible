base_translation:
  language: en
  yaml_path: translation/ot/numbers/016/024.yaml
  text: Speak to the congregation[a], saying, ‘Move away from around the dwelling of Korah, Dathan[b], and Abiram.’
  footnotes:
  - marker: a
    text: Or “Move away from the vicinity of the dwelling of Korah, Dathan, and Abiram.” The Hebrew verb is literally “go up,” but here it functions as a command to withdraw.
    reason: lexical_alternative
  - marker: b
    text: “Dwelling” translates Hebrew mishkan here in the sense of a habitation or tent-area, not necessarily the sanctuary tabernacle.
    reason: cultural_note
