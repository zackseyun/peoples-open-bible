  yaml_path: translation/ot/exodus/022/025.yaml
  text: If you take your neighbor’s cloak as a pledge[b][a], you shall return it to him before the sun sets.
  footnotes:
  - marker: a
    text: Or 'garment' or 'outer garment' for 'cloak.' The Hebrew term refers specifically to an outer covering that could serve as protection at night.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'until the coming of the sun'; that is, by sunset.
    reason: lexical_alternative
