translation:
  language: es
  text: 'Entonces Moisés dijo a los jueces de Israel: «Cada uno de ustedes debe[n] matar a sus hombres[a] que se han unido a Baal Peor[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «maten, cada hombre, a sus hombres», es decir, cada juez debía dar muerte a los varones bajo su jurisdicción que se habían adherido a Baal Peor.
    reason: lexical_alternative
  - marker: b
    text: O «Baal-peor».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפְטֵי
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - líderes
  - funcionarios
  lexicon: HALOT
  rationale: El sustantivo se refiere aquí a quienes ejercen autoridad judicial y de gobierno dentro de Israel. «Jueces» es la equivalencia más directa y natural en español, y conserva el matiz de autoridad judicial del hebreo.
- source_word: הִרְגוּ
  english_pob_choice: must kill
  chosen_spanish: debe matar
  alternatives_spanish:
  - mate
  - deben matar
  - ejecute
  lexicon: HALOT
  rationale: El imperativo plural transmite una orden. En español, «debe matar» expresa con naturalidad la fuerza obligatoria del mandato sin introducir el matiz jurídico más específico de «ejecutar», que no está explícito en el verbo hebreo.
- source_word: אִישׁ אֲנָשָׁיו
  english_pob_choice: Each of you ... his men
  chosen_spanish: Cada uno de ustedes ... a sus hombres
  alternatives_spanish:
  - cada hombre ... a sus hombres
  - cada uno ... a sus personas
  lexicon: HALOT
  rationale: La construcción distributiva hebrea es literalmente «un hombre, sus hombres». En español, «Cada uno de ustedes ... a sus hombres» conserva el sentido distributivo y la referencia masculina, sin sonar artificial.
- source_word: הַנִּצְמָדִים
  english_pob_choice: who have joined themselves
  chosen_spanish: que se han unido
  alternatives_spanish:
  - que se han adherido
  - que se han pegado
  - que se han enlazado
  lexicon: HALOT
  rationale: El participio nifal de צמד comunica unión o adhesión estrecha. «Se han unido» reproduce esa idea de manera clara y sin forzar la imagen verbal.
- source_word: לְבַעַל פְּעֹור
  english_pob_choice: to Baal Peor
  chosen_spanish: a Baal Peor
  alternatives_spanish:
  - a Baal-peor
  - al Baal de Peor
  lexicon: HALOT
  rationale: El nombre propio se expresa de forma más directa como «Baal Peor», siguiendo la revisión inglesa que quitó «of». En español, la preposición «a» conserva el movimiento de adhesión al ídolo nombrado.
theological_decisions:
- issue: Naturaleza del mandamiento de matar
  english_pob_reading: Render the command straightforwardly as Moses ordering Israel's judges to kill the offending men under their charge, without adding legal or ritual explanation not explicit in the verse.
  chosen_spanish_reading: Traducir la orden de manera directa, como Moisés mandando a los jueces de Israel matar a los varones culpables bajo su autoridad, sin añadir explicación legal o ritual no presente en el versículo.
  alternative_spanish_readings:
  - usar «ejecutar» para resaltar castigo judicial
  - ampliar con «juicio de pacto»
  rationale: El hebreo presenta una orden inmediata y severa. La traducción debe conservar esa fuerza sin importar al texto una categoría jurídica o teológica más específica que el versículo no desarrolla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia masculina en אִישׁ אֲנָשָׁיו
  english_pob_reading: Preserve masculine reference with 'Each of you ... his men.'
  chosen_spanish_reading: Conservar la referencia masculina con «Cada uno de ustedes ... a sus hombres».
  alternative_spanish_readings:
  - cada uno ... a quienes están bajo ustedes
  - todos ... su gente
  rationale: El hebreo es explícitamente masculino y, por el contexto, alude a los varones ofensores. En español conviene reflejar esa masculinidad gramatical y contextual en lugar de neutralizarla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que eliminó «of» en el nombre propio para reflejar más directamente el nombre Baal Peor. También preserva la fuerza imperativa del hebreo sin introducir el término jurídico «ejecutar».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Baal Peor» se conserva como nombre propio compuesto, en armonía con la revisión inglesa y con la transparencia del original hebreo.
  - La frase distributiva se ha naturalizado en español sin perder la estructura semántica de «un hombre / sus hombres».
