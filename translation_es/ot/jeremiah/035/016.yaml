- from: Porque los hijos de Jehonadab hijo de Recab han guardado el mandamiento de su padre, el que les mandó[a]; pero este pueblo no me ha escuchado[b].
  to: Porque los hijos de Jehonadab hijo de Recab han guardado el mandamiento de su padre, que él les mandó; pero este pueblo no me ha escuchado[a].
  rationale: Se elimina la nota no respaldada por la auditoría inglesa y se corrige «el que les mandó» a «que él les mandó», que expresa con más naturalidad y precisión la cláusula relativa hebrea. Se conserva la nota sobre «escuchado/obedecido» porque sí refleja una alternativa léxica documentada y relevante.
