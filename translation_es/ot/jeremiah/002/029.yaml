translation:
  language: es
  text: ¿Por qué contienden[a] conmigo? Todos ustedes se han rebelado[b] contra mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disputan conmigo». El verbo hebreo también puede expresar contienda, disputa o litigio.
    reason: lexical_alternative
  - marker: b
    text: O «han transgredido contra mí». El verbo hebreo suele tener el sentido más fuerte de rebelión o ruptura de lealtad.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo?
  - ¿Por cuál razón?
  lexicon: HALOT
  rationale: Interrogativo natural en español para una pregunta retórica que pide la razón del reproche divino; conserva la fuerza directa del hebreo sin volverlo artificioso.
- source_word: תָרִיבוּ
  english_pob_choice: do you contend
  chosen_spanish: contendéis
  alternatives_spanish:
  - discutís
  - litigáis
  - pleiteáis
  lexicon: HALOT
  rationale: ריב puede abarcar contienda, disputa o lenguaje forense. «Contendéis» mantiene esa amplitud y suena más cercano al peso confrontativo del hebreo que una sola opción técnica.
- source_word: אֵלַי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - para conmigo
  lexicon: HALOT
  rationale: En español, con el verbo de contienda, «conmigo» reproduce la relación confrontativa de forma idiomática sin añadir más hostilidad de la que el contexto ya expresa. «Contra mí» sería posible, pero especifica más de lo que el hebreo exige aquí.
- source_word: כֻּלְּכֶם
  english_pob_choice: All of you
  chosen_spanish: Todos ustedes
  alternatives_spanish:
  - Todos ustedes, por completo
  - Cada uno de ustedes
  lexicon: HALOT
  rationale: La forma hebrea es enfática y colectiva. «Todos ustedes» conserva la totalidad del reproche en español contemporáneo y claro.
- source_word: פְּשַׁעְתֶּם
  english_pob_choice: have rebelled
  chosen_spanish: se han rebelado
  alternatives_spanish:
  - han transgredido
  - se han sublevado
  - han quebrantado lealtad
  lexicon: HALOT
  rationale: פשע suele implicar rebelión o ruptura de lealtad, no sólo falta moral genérica. «Se han rebelado» preserva esa fuerza covenantal que la POB inglesa también prioriza.
- source_word: בִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - en mí
  lexicon: HALOT
  rationale: Con פשע, la preposición marca a la persona ofendida; en español la locución natural es «contra mí», que comunica rebelión dirigida a Yahvé.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la norma del proyecto, y la fórmula profética se vierte con una expresión breve y solemne. «Dice» refleja el valor formulaico del hebreo נְאֻם sin sobrerretorizarlo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide transliterar el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre de pacto en lugar de ocultarlo tras un título genérico. La forma «Yahvé» sigue la decisión doctrinal del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza covenantal de פשע
  english_pob_reading: have rebelled
  chosen_spanish_reading: se han rebelado
  alternative_spanish_readings:
  - han transgredido
  - se han sublevado
  - han pecado contra mí
  rationale: La lectura no se limita a una infracción moral; expresa rebelión contra la relación de pacto. «Se han rebelado» mantiene esa tensión sin diluirla en un simple «pecado» o «transgresión».
  doctrine_reference: HALOT / uso profético de פשע en textos de acusación de pacto
translation_notes:
  revision_awareness: 'La versión inglesa auditada ya concluyó sin cambios necesarios en su última revisión y mostró alto acuerdo entre revisores. Este borrador español sigue esa línea: mantiene la pregunta retórica, la amplitud de ריב, la fuerza de פשע y la forma profética breve del cierre, sin introducir paráfrasis adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto tipográfico para preservar el nombre divino explícito.
  - «Contendéis» y «se han rebelado» mantienen el tono de acusación profética y no suavizan el conflicto.
  - Las notas al pie preservan las alternativas léxicas relevantes que el texto español puede también sugerir.
