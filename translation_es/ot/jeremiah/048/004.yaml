translation:
  language: es
  text: Moab está destrozada[a]; sus pequeños han hecho oír su grito de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo צעוריה es difícil. Puede significar «sus pequeños» o «sus jóvenes»; algunos lo entienden de otro modo, incluso como referencia a ciudades o, menos probablemente aquí, a Zoar.
    reason: alternative_reading
lexical_decisions:
- source_word: נִשְׁבְּרָ֖ה
  english_pob_choice: is shattered
  chosen_spanish: está quebrantada
  alternatives_spanish:
  - está rota
  - ha sido quebrantada
  lexicon: HALOT
  rationale: El nifal de שבר expresa estar roto/quebrantado. «Está quebrantada» conserva el estado resultante y suena natural en español profético, sin suavizar la fuerza de juicio.
- source_word: מוֹאָ֑ב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Mab
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio geográfico/nacional tal como en la tradición bíblica y en el inglés POB.
- source_word: הִשְׁמִ֥יעוּ
  english_pob_choice: have made ... heard
  chosen_spanish: han hecho oír
  alternatives_spanish:
  - han causado que se oiga
  - han proclamado
  lexicon: HALOT
  rationale: 'El hifil de שמע tiene valor causativo: hacer oír, dar a oír. «Han hecho oír» preserva esa causatividad sin volver la frase pesada.'
- source_word: זְּעָקָ֖ה
  english_pob_choice: a cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - un clamor
  - un grito
  lexicon: HALOT
  rationale: זעקה denota un clamor o grito de angustia. «Clamor» comunica mejor en español bíblico la intensidad y el tono de lamentación/aflicción que un simple «grito».
- source_word: צעורי/ה
  english_pob_choice: her little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus jóvenes
  - sus hijos pequeños
  lexicon: HALOT
  rationale: La forma es difícil. El POB inglés optó por «her little ones» como lectura principal. En español, «sus pequeños» conserva la referencia probable a dependientes o descendencia joven, manteniendo abierta la dificultad textual sin forzar una identificación más precisa.
translation_notes:
  revision_awareness: El inglés POB revisó la frase final de «made their cry heard» a una forma más natural; en español se refleja directamente con «han hecho oír su clamor», que preserva el valor causativo del hifil y la naturalidad sintáctica.
  spanish_consistency_notes:
  - Se mantiene «Moab» como nombre propio sin artículo.
  - «Quebrantada» reproduce el estado pasivo/resultante del nifal mejor que un simple adjetivo estático.
  - «Clamor» se usa para mantener el registro profético y evitar una reducción a ruido genérico.
  - La nota textual se ancla en la palabra «pequeños» para señalar la dificultad de צעורי/ה.
