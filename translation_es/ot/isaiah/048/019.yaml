    text: El hebreo dice literalmente 'su nombre'; el singular puede personificar la descendencia como una línea colectiva. Otras traducciones reflejan 'su nombre' o 'el nombre de ellos'.
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural; solo se corrigen los anclajes de las notas para que correspondan a los términos hebreos que explican.
