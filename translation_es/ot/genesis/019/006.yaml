translation:
  language: es
  text: Lot salió hacia ellos, a la entrada[a], y cerró la puerta detrás de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia la abertura» o «hacia el umbral». El hebreo distingue entre la entrada o abertura (פֶּתַח) y la puerta misma (דֶּלֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - fue afuera
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada simple; «salió» conserva el movimiento de יצא con naturalidad en español sin añadir matiz innecesario.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El hebreo indica movimiento dirigido hacia los hombres fuera. En español, «hacia ellos» expresa mejor esa orientación espacial que un simple «a ellos».
- source_word: לוֹט
  english_pob_choice: Lot
  chosen_spanish: Lot
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio según la convención estándar.
- source_word: הַפֶּתְחָה
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - al umbral
  - a la puerta
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura o entrada, y el prefijo direccional marca movimiento hacia ese lugar. «A la entrada» mantiene la distinción respecto de דֶּלֶת, que aparece después.
- source_word: וְהַדֶּלֶת
  english_pob_choice: the door
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta misma
  - el postigo
  lexicon: HALOT
  rationale: דֶּלֶת se refiere al objeto puerta, distinto de פֶּתַח. En español, «puerta» conserva esa diferencia.
- source_word: סָגַר
  english_pob_choice: shut
  chosen_spanish: cerró
  alternatives_spanish:
  - cerró con llave
  - atrancó
  lexicon: HALOT
  rationale: En español, «cerró la puerta» es la colocación más natural y suficiente para reproducir la acción narrativa de סגר. «Cerró» es menos marcado que «encerró» o «atrancó» y no añade fuerza no explicitada.
- source_word: אַחֲרָיו
  english_pob_choice: behind him
  chosen_spanish: detrás de sí
  alternatives_spanish:
  - tras él
  - después de él
  lexicon: HALOT
  rationale: El sentido es espacial, no temporal; «detrás de sí» comunica con claridad que cerró la puerta después de salir.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa concuerdan estrechamente; no se registran revisiones aplicadas en la traducción inglesa más reciente, y el sentido se mantiene estable.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «entrada» y «puerta» para reflejar la diferencia léxica del hebreo.
  - Se evita un calco como «después de él», porque en español podría sonar temporal y no espacial.
  - La puntuación y el orden de palabras buscan una lectura fluida y pública sin perder el paralelismo del original.
