    issue: Valor verbal de «וַיִּשְׁמְרוּ» traducido como «ellos vigilaban»
    rationale: El hebreo narrativo con wayyiqtol se refleja mejor aquí con un pretérito simple («vigilaron») que con un imperfecto progresivo («vigilaban»), especialmente en una nota histórica de encabezado. Además, el inglés POB auditado usa «they watched», no una forma durativa.
  - severity: low
    issue: Pronombre explícito «ellos» innecesario
    rationale: En español el sujeto ya está claro por la forma verbal y por «hombres» en la cláusula anterior. Omitirlo mejora la fluidez sin pérdida de sentido.
