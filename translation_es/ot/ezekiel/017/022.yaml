revisions:
- from: 'Así dice el Señor Yahvé: Yo mismo tomaré de la cima del cedro alto y lo pondré a un lado[a]. De la punta de sus brotes tiernos sacaré yo mismo un retoño tierno[b], y yo mismo lo plantaré sobre un monte alto y elevado.'
  to: 'Así dice el Señor Yahvé: Yo mismo tomaré de la cima del cedro alto y lo pondré[a]. De la punta de sus brotes tiernos arrancaré yo mismo un retoño tierno[b], y yo mismo lo plantaré sobre un monte alto y elevado.'
  rationale: Se corrige 'lo pondré a un lado' a 'lo pondré' para reflejar fielmente וְנָתַתִּי sin añadir la idea de apartarlo. Se cambia 'sacaré' por 'arrancaré' para conservar mejor la fuerza botánica de אֶקְטֹף. Se mantienen las demás decisiones, que son claras, fieles y coherentes con la terminología del proyecto.
