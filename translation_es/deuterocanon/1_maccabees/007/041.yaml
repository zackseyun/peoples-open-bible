translation:
  language: es
  text: Cuando los que venían de parte del rey[a] proferían insultos[b], salió tu ángel y abatió a ciento ochenta y cinco mil de entre ellos.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los enviados por el rey». El griego puede referirse más ampliamente a quienes vienen del rey o actúan de su parte, sin precisar su función exacta.
    reason: lexical_alternative
  - marker: b
    text: O «blasfemaban». El verbo griego puede significar hablar con insulto, injuriar o hablar impíamente; aquí se conserva una formulación más amplia.
    reason: lexical_alternative
  - marker: c
    text: Esto alude a la destrucción del ejército asirio en tiempos de Ezequías; compárese 2 Reyes 19:35 e Isaías 37:36.
    reason: cross_reference
lexical_decisions:
- source_word: Οἱ παρὰ τοῦ βασιλέως
  english_pob_choice: those from the king
  chosen_spanish: los que estaban del lado del rey
  alternatives_spanish:
  - los del rey
  - los enviados por el rey
  - los hombres del rey
  lexicon: LSJ
  rationale: La construcción griega indica personas asociadas al rey, sin precisar exactamente si son enviados, tropas o partidarios. En español, «estaban del lado del rey» conserva esa relación de pertenencia o apoyo sin cerrar indebidamente la identificación.
- source_word: ἐδυσφήμουν
  english_pob_choice: were speaking abusively
  chosen_spanish: hablaban insultantemente
  alternatives_spanish:
  - estaban blasfemando
  - proferían injurias
  - hablaban con desprecio
  lexicon: LSJ
  rationale: El verbo puede abarcar hablar mal, injuriar o blasfemar. «Hablaban insultantemente» mantiene el valor amplio de habla ofensiva sin imponer de entrada el matiz más técnico de «blasfemar», que el contexto sugiere pero no obliga léxicamente.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - fue y salió
  - salió de allí
  lexicon: LSJ
  rationale: El aoristo de salida se expresa de manera natural y breve con «salió», sin perder el movimiento narrativo del griego.
- source_word: ἄγγελός σου
  english_pob_choice: your angel
  chosen_spanish: tu ángel
  alternatives_spanish:
  - tu mensajero
  lexicon: LSJ
  rationale: En este contexto de juicio divino e intervención sobrenatural, «ángel» es la traducción más adecuada y coincide con la lectura histórica del pasaje. «Mensajero» sería posible léxicamente, pero debilitaría el sentido celestial aquí.
- source_word: ἐπάταξεν
  english_pob_choice: struck down
  chosen_spanish: abatió
  alternatives_spanish:
  - hirió
  - golpeó
  - derribó
  lexicon: LSJ
  rationale: El verbo puede significar golpear o herir, pero aquí resulta claramente letal por el resultado. «Abatió» comunica la acción y la caída mortal con un registro sobrio y bíblico en español.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - entre ellos
  - en medio de ellos
  lexicon: LSJ
  rationale: La frase distributiva señala a un número tomado dentro del grupo afectado. «De entre ellos» expresa mejor en español que la cifra fue sacada de ese conjunto, preservando la idea colectiva del griego.
- source_word: ἑκατὸν ὀγδοήκοντα πέντε χιλιάδας
  english_pob_choice: one hundred eighty-five thousand
  chosen_spanish: ciento ochenta y cinco mil
  alternatives_spanish:
  - '185.000'
  - ciento ochenta y cinco mil personas
  lexicon: LSJ
  rationale: Se reproduce el numeral explícito del griego en forma corrida, adecuada para prosa bíblica en español.
theological_decisions:
- issue: Si δυσφημέω debe sonar específicamente como «blasfemar» o de manera más amplia como habla ofensiva
  english_pob_reading: were speaking abusively
  chosen_spanish_reading: hablaban insultantemente
  alternative_spanish_readings:
  - estaban blasfemando
  - proferían blasfemias
  rationale: 'La POB inglesa conserva la amplitud semántica del verbo y deja que el contexto histórico cargue el peso teológico. El español sigue esa estrategia: la expresión indica habla ofensiva sin convertirla en una traducción más interpretativa de lo que el léxico exige.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar el referentе de ἄγγελος en un episodio de intervención divina
  english_pob_reading: your angel
  chosen_spanish_reading: tu ángel
  alternative_spanish_readings:
  - tu mensajero
  rationale: La escena alude a la ejecución de juicio por un agente celestial. «Tu ángel» preserva esa lectura tradicional del relato y evita una desmitologización que el contexto no apoya.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no requieren cambios sustantivos; la revisión más reciente también indicó que no eran necesarios ajustes. La redacción española sigue esa misma lectura base, manteniendo la amplitud semántica de δυσφημέω y el valor sobrenatural de ἄγγελος.
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελος conforme a la lectura histórica del pasaje y a la terminología POB.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino explícito ni una cita directa del Tetragrámaton.
  - Se conserva un registro bíblico moderno, sin arcaísmos innecesarios, y con numerales escritos en palabras para continuidad estilística.
