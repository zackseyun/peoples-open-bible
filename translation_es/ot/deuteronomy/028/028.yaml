translation:
  language: es
  text: Yahvé te golpeará con locura, ceguera y confusión[a] de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perplejidad de corazón» o «desconcierto de corazón».
    reason: alternative_reading
lexical_decisions:
- source_word: יַכְּכָה
  english_pob_choice: will strike you
  chosen_spanish: te golpeará
  alternatives_spanish:
  - te herirá
  - te castigará
  - te abatirá
  lexicon: HALOT
  rationale: El verbo hiphil de נכה expresa golpear/causar un golpe o plaga. «Golpear» conserva la fuerza del juicio de pacto en español moderno; «herir» o «castigar» suavizan o desplazan el matiz físico del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español, el proyecto mantiene «Yahvé» como transliteración estándar del Tetragrámaton, evitando el sustituto litúrgico «SEÑOR».
- source_word: בְּשִׁגָּעוֹן
  english_pob_choice: with madness
  chosen_spanish: con locura
  alternatives_spanish:
  - con demencia
  - con insensatez
  - con desvarío
  lexicon: HALOT
  rationale: שִׁגָּעוֹן denota locura o perturbación mental. «Locura» es natural en español y comunica bien el juicio descrito sin perder el valor léxico central.
- source_word: וּבְעִוָּרוֹן
  english_pob_choice: and blindness
  chosen_spanish: ceguera
  alternatives_spanish:
  - ceguera mental
  - ceguera
  - y ceguera
  lexicon: HALOT
  rationale: עִוָּרוֹן significa ceguera. En español, la coordinación queda integrada con la serie de complementos introducidos por «con»; por eso se deja simplemente «ceguera», sin añadir explicaciones que no están en el hebreo.
- source_word: וּבְתִמְהוֹן לֵבָב
  english_pob_choice: and confusion of heart
  chosen_spanish: confusión[a] de corazón
  alternatives_spanish:
  - perplejidad de corazón
  - desconcierto de corazón
  - estupor de corazón
  lexicon: HALOT
  rationale: תִמְהוֹן expresa confusión, desconcierto o consternación. «Confusión de corazón» preserva la imagen hebrea del centro interior (לֵבָב) sin reemplazarla por una paráfrasis psicológica más amplia. Se conserva la tensión entre «corazón» como sede interior y la idea de confusión mental.
- source_word: לֵבָב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: Aunque לֵבָב puede abarcar mente, voluntad o interioridad, «corazón» es la forma más literal y reconocible en español bíblico. Mantiene la antropología hebrea sin diluirla en una abstracción moderna.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo emplea el Nombre divino directamente. La traducción conserva ese nombre propio como «Yahvé» conforme a la convención del proyecto, en vez de sustituirlo por un título o una forma tradicional posterior.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de תִמְהוֹן לֵבָב
  english_pob_reading: confusion of heart
  chosen_spanish_reading: confusión de corazón
  alternative_spanish_readings:
  - desconcierto de corazón
  - perplejidad de corazón
  - estupor de corazón
  rationale: La expresión hebrea mantiene la imagen del «corazón» como sede de pensamiento, voluntad y orientación. «Confusión de corazón» conserva esa metáfora y el potencial semántico de desorientación interior sin interpretar el texto en clave exclusivamente emocional.
  doctrine_reference: HALOT; antropología bíblica hebrea
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo masorético y con la auditoría inglesa: no se registran revisiones aplicadas en el expediente reciente, y el dictamen de control indica alto grado de acuerdo sin cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva «corazón» para לֵבָב, porque en español bíblico comunica mejor la sede interior hebrea que «mente» en este contexto.
  - La nota al pie recoge las alternativas semánticas admitidas por el audit trail inglés para תִמְהוֹן לֵבָב.
  - 'La coordinación española usa «con» para reflejar la serie instrumental del hebreo: «con locura, ceguera y confusión de corazón».'
