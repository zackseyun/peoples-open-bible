translation:
  language: es
  text: Y todo el pueblo se reunió como un solo hombre[a] en la plaza que estaba delante de la Puerta del Agua, y le dijeron a Esdras el escriba que trajera el Libro de la Ley de Moisés, que Yahvé había mandado a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como un solo hombre», un modismo que significa «como uno solo» o «de común acuerdo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  lexicon: HALOT
  rationale: El nifal de אסף aquí expresa la reunión del pueblo. En español, «se reunió» es natural, digno y conserva la acción colectiva sin sobrecargar el matiz formal.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - la totalidad del pueblo
  lexicon: HALOT
  rationale: La expresión es colectiva y distributiva. «Todo el pueblo» reproduce bien el alcance global del hebreo y es idiomático en español.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - como uno solo
  - con un solo acuerdo
  lexicon: HALOT
  rationale: Se conserva la fuerza idiomática del hebreo con su imagen masculina singular, sin neutralizarla. «Como un solo hombre» es claro y refleja la unidad de acción.
- source_word: הָרְחוֹב
  english_pob_choice: the square
  chosen_spanish: la plaza
  alternatives_spanish:
  - el espacio abierto
  - la explanada
  lexicon: HALOT
  rationale: El término designa un espacio público abierto; «plaza» comunica mejor la referencia urbana que un calco más rígido.
- source_word: לִפְנֵי שַׁעַר הַמָּיִם
  english_pob_choice: before the Water Gate
  chosen_spanish: delante de la Puerta del Agua
  alternatives_spanish:
  - en frente de la Puerta del Agua
  - ante la Puerta del Agua
  lexicon: HALOT
  rationale: La preposición hebrea expresa localización frente a la puerta. «Delante de» mantiene la relación espacial con naturalidad en español.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el escriba experto
  lexicon: HALOT
  rationale: Es el título establecido para Esdras en este contexto. «Escriba» conserva el oficio y el peso técnico-religioso del término.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: que trajera
  alternatives_spanish:
  - que llevara
  - que hiciera traer
  lexicon: HALOT
  rationale: En español, el complemento con subjuntivo resulta natural después de «dijeron a Esdras». «Trajera» comunica el causativo hebreo sin añadir dirección no explicitada.
- source_word: סֵפֶר תּוֹרַת מֹשֶׁה
  english_pob_choice: the Book of the Law of Moses
  chosen_spanish: el Libro de la Ley de Moisés
  alternatives_spanish:
  - el libro de la ley de Moisés
  - el rollo de la ley de Moisés
  lexicon: HALOT
  rationale: «Libro» es la forma convencional y comprensible para סֵפֶר, y «Ley de Moisés» representa fielmente la construcción genitiva sin explicarla más de lo que el hebreo permite.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת יִשְׂרָאֵל
  english_pob_choice: which Yahweh had commanded Israel
  chosen_spanish: que Yahvé había mandado a Israel
  alternatives_spanish:
  - que Yahvé había mandado para Israel
  - que Yahvé había ordenado a Israel
  lexicon: HALOT
  rationale: La sintaxis hebrea permite entender a Israel como destinatario de la orden. «Mandado a Israel» es la forma más directa y conserva la relación personal y covenantal del mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal según la terminología del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: La expresión idiomática כְּאִישׁ אֶחָד
  english_pob_reading: as one man
  chosen_spanish_reading: como un solo hombre
  alternative_spanish_readings:
  - como uno solo
  - con un solo acuerdo
  rationale: La frase hebrea subraya unidad de acción. En español conviene conservar la imagen idiomática para no perder la intensidad de la unanimidad comunitaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. Traducirlo como «Yahvé» preserva el nombre propio del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: conserva la localización «delante de» para לִפְנֵי, evita añadir movimiento innecesario a הָרְחוֹב, y refleja el ajuste final de la cláusula verbal con un complemento directo simple («mandado a Israel»).'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «Esdras el escriba» para conservar el título funcional del personaje.
  - «Libro de la Ley de Moisés» sigue el orden y alcance del hebreo sin expandirlo con interpretación adicional.
