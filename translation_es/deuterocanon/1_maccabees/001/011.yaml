translation:
  language: es
  text: 'En aquellos días salieron de Israel unos hombres impíos[a], y persuadieron a muchos, diciendo: «Vayamos y hagamos un pacto con las naciones que nos rodean, porque desde que nos separamos de ellas[b], muchos males nos han hallado[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hijos de iniquidad» o «hijos de ilegalidad/sin ley». La expresión griega es más literalmente familiar, pero aquí se usa idiomáticamente para personas caracterizadas por la impiedad o la falta de ley.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde que fuimos separados de ellas». El griego también puede entenderse con un matiz más pasivo.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «muchos males nos hallaron»; es decir, muchas calamidades o desgracias nos sobrevinieron.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν ἐξ Ἰσραὴλ
  english_pob_choice: came out from Israel
  chosen_spanish: salieron de Israel
  alternatives_spanish:
  - salieron desde Israel
  - surgieron de Israel
  lexicon: LSJ
  rationale: El giro expresa procedencia desde dentro de Israel, no solo aparición abstracta. «Salieron de Israel» conserva la imagen de salida y la procedencia sin añadir una interpretación más fuerte que el griego.
- source_word: υἱοὶ παράνομος
  english_pob_choice: lawless men
  chosen_spanish: unos hijos de iniquidad
  alternatives_spanish:
  - unos hombres inicuos
  - unos rebeldes
  - unos hijos de desobediencia
  lexicon: LSJ
  rationale: El griego tiene una formulación familiar/idiomática y algo irregular, que no obliga a una traducción literal por «hijos» en sentido biológico. Aquí se conserva el color semítico con «hijos de iniquidad», mientras la nota explica que se trata de personas caracterizadas por la impiedad/ilegalidad.
- source_word: ἀνέπεισαν πολλοὺς
  english_pob_choice: persuaded many
  chosen_spanish: persuadieron a muchos
  alternatives_spanish:
  - ganaron a muchos
  - indujeron a muchos
  - engañaron a muchos
  lexicon: LSJ
  rationale: El verbo indica persuadir o inducir. «Persuadieron a muchos» sigue de cerca el valor léxico sin añadir de por sí la evaluación negativa, que ya aporta el contexto.
- source_word: Πορευθῶμεν
  english_pob_choice: Let us go
  chosen_spanish: Vayamos
  alternatives_spanish:
  - Vámonos
  - Vamos
  lexicon: LSJ
  rationale: Es una exhortación inclusiva en subjuntivo. «Vayamos» es natural, solemne y fiel al sentido hortatorio.
- source_word: διαθώμεθα διαθήκην
  english_pob_choice: make a covenant
  chosen_spanish: hagamos un pacto
  alternatives_spanish:
  - entremos en un pacto
  - hagamos un convenio
  lexicon: LSJ
  rationale: El contexto es de alianza formal con peso histórico-religioso. En español, «pacto» comunica bien la idea covenantal y resulta idiomático; se evita «acuerdo» por ser demasiado débil. Se mantiene «pacto» como término principal, con conciencia de la carga bíblica de διαθήκη.
- source_word: τῶν ἐθνῶν τῶν κύκλῳ ἡμῶν
  english_pob_choice: the nations around us
  chosen_spanish: las naciones de alrededor nuestro
  alternatives_spanish:
  - las naciones que nos rodean
  - las naciones circundantes
  - los pueblos de alrededor nuestro
  lexicon: LSJ
  rationale: «Naciones» conserva el referente geopolítico del texto. «De alrededor nuestro» mantiene la proximidad espacial del griego κύκλῳ sin pasar a una paráfrasis excesiva; «pueblos» sería posible, pero aquí «naciones» refleja mejor la formulación del contexto histórico.
- source_word: ἀφʼ ἧς ἐχωρίσθημεν ὑπʼ αὐτῶν
  english_pob_choice: since we separated ourselves from them
  chosen_spanish: desde que nos apartamos de ellas
  alternatives_spanish:
  - desde que fuimos separados de ellas
  - desde que nos separamos de ellas
  - desde que nos apartaron de ellas
  lexicon: LSJ
  rationale: La construcción puede leerse con matiz activo o pasivo. Se elige una forma reflexiva natural en español («nos apartamos») para captar el sentido de distanciamiento histórico sin decidir de manera innecesariamente rígida entre pasivo y activo.
- source_word: εὗρεν ἡμᾶς κακὰ πολλὰ
  english_pob_choice: many evils have found us
  chosen_spanish: muchos males nos han hallado
  alternatives_spanish:
  - muchas desgracias nos han sobrevenido
  - muchas calamidades nos han alcanzado
  - muchos males nos han sobrevenido
  lexicon: LSJ
  rationale: El griego dice literalmente que «muchos males nos hallaron». Se conserva la imagen verbal con «han hallado»; «males» refleja κακά de forma directa y en este contexto apunta a calamidades o desgracias, no a maldad moral.
theological_decisions:
- issue: Terminología de διαθήκη en un contexto de alianza con naciones vecinas
  english_pob_reading: make a covenant
  chosen_spanish_reading: hagamos un pacto
  alternative_spanish_readings:
  - hagamos un acuerdo
  - entremos en una alianza
  rationale: Se evita reducir el término a mera diplomacia. «Pacto» preserva el peso formal y casi jurídico de διαθήκη, y en español bíblico conserva mejor la resonancia teológica que «acuerdo».
  doctrine_reference: Consistencia de términos clave; lectura covenantal de διαθήκη
- issue: Valor de κακά πολλὰ en la clausula final
  english_pob_reading: many evils have found us
  chosen_spanish_reading: muchos males nos han hallado
  alternative_spanish_readings:
  - muchas desgracias nos han sobrevenido
  - muchas calamidades nos han alcanzado
  rationale: Se mantiene la fuerza del idioma original, donde el mal aparece como algo que «encuentra» al sujeto. En español, «males» puede abarcar calamidades, desastres o aflicciones, sin cargar el texto con una moralización ajena.
  doctrine_reference: Principio de imagen léxica conservada cuando el español la soporta
translation_notes:
  revision_awareness: El inglés auditado fue revisado mínimamente para hacer más natural ἀφʼ ἧς con «since»; la presente versión española sigue esa decisión con «desde que», manteniendo el resto del enunciado conforme al texto griego y al audit trail inglés. Se preservó la imagen de «hallar» en la cláusula final para no perder el giro literal documentado.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino por norma del proyecto para el Tetragrámaton; aquí no aplica.
  - Se eligió «pacto» para διαθήκη, coherente con una traducción bíblica que distingue el término de un simple acuerdo civil.
  - «Naciones» se mantuvo por fidelidad al contexto histórico de 1 Macabeos; no se sustituyó por «gentiles» porque el pasaje es narrativo-histórico y el griego habla de ἔθνη.
  - La formulación «hijos de iniquidad» conserva el tono semítico del griego y se explica en nota para lectores hispanos.
  - La imagen final «nos han hallado» se conservó deliberadamente para reflejar el griego literal y la decisión inglesa auditada.
