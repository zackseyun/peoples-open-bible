translation:
  language: es
  text: Desde la antigüedad no han oído, ni han escuchado; ningún ojo ha visto a un Dios aparte de ti[a], que actúa para el que lo espera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde la antigüedad nadie ha oído, nadie ha prestado oído, ningún ojo ha visto a ningún dios aparte de ti, que actúa para los que lo esperan». La sintaxis hebrea es condensada y admite varias traducciones estrechamente emparentadas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמֵעוֹלָם
  english_pob_choice: From of old
  chosen_spanish: Desde la antigüedad
  alternatives_spanish:
  - Desde antiguo
  - Desde tiempos remotos
  lexicon: HALOT
  rationale: La expresión marca un tiempo que se extiende hacia el pasado lejano. «Desde la antigüedad» conserva ese valor temporal de manera natural en español sin intensificarlo más de lo que permite el hebreo.
- source_word: שָׁמְעוּ
  english_pob_choice: they have not heard
  chosen_spanish: no han oído
  alternatives_spanish:
  - no han escuchado
  lexicon: HALOT
  rationale: El verbo en plural se mantiene como plural en español para reflejar directamente la forma hebrea. «Oír» comunica el dato básico del oído, y el paralelismo con el siguiente verbo favorece una traducción sobria.
- source_word: הֶאֱזִינוּ
  english_pob_choice: they have not listened
  chosen_spanish: ni han escuchado
  alternatives_spanish:
  - ni han prestado oído
  - ni han dado oído
  lexicon: HALOT
  rationale: La forma causativa expresa oír con atención, por eso «escuchar» transmite mejor la intensificación que simplemente «oír». «Prestar oído» sería más literal, pero menos natural en español moderno.
- source_word: עַיִן לֹא רָאָתָה
  english_pob_choice: no eye has seen
  chosen_spanish: ningún ojo ha visto
  alternatives_spanish:
  - ojo no ha visto
  lexicon: HALOT
  rationale: Se conserva la imagen poética singular-colectiva del hebreo, pero en español «ningún ojo» suena más fluido y mantiene el valor generalizador. No se expande a «nadie» para no borrar la imagen corporal del texto.
- source_word: אֱלֹהִים זוּלָתְךָ
  english_pob_choice: a God besides you
  chosen_spanish: a un Dios fuera de ti
  alternatives_spanish:
  - a un Dios además de ti
  - a ningún Dios fuera de ti
  lexicon: HALOT
  rationale: 'El hebreo expresa exclusividad: no hay otra deidad comparable al Dios dirigido en la oración. «Fuera de ti» mantiene bien esa exclusividad sin convertir el sintagma en una paráfrasis teológica más fuerte que el original. Se conserva «Dios» con mayúscula porque el referente es el verdadero Dios.'
- source_word: יַעֲשֶׂה
  english_pob_choice: who acts
  chosen_spanish: que actúa
  alternatives_spanish:
  - que obra
  - que hace
  lexicon: HALOT
  rationale: «Actúa» reproduce bien el valor amplio de עשה en contexto divino y suena claro en español actual. «Obra» sería también posible, pero puede sonar más marcado en registro eclesiástico.
- source_word: לִמְחַכֵּה לוֹ
  english_pob_choice: for the one who waits for him
  chosen_spanish: para el que espera en él
  alternatives_spanish:
  - para el que lo espera
  - para quien espera en él
  lexicon: HALOT
  rationale: El participio singular se vierte con «el que» para respetar la forma singular; no se pluraliza. «Espera en él» expresa de modo natural la confianza y expectativa implicadas en מְחַכֵּה, sin perder el complemento pronominal.
theological_decisions:
- issue: Si el versículo afirma la absoluta unicidad de Dios o una acción divina sin precedentes
  english_pob_reading: The translation preserves both by rendering 'no eye has seen a God besides you, who acts for the one who waits for him,' attaching the relative clause to 'God besides you.'
  chosen_spanish_reading: 'La redacción conserva la exclusividad de Dios y, a la vez, la cláusula relativa sobre su actuación: «ningún ojo ha visto a un Dios fuera de ti, que actúa para el que espera en él».'
  alternative_spanish_readings:
  - Desde la antigüedad no han oído, ni han escuchado; ningún ojo ha visto, fuera de ti, oh Dios, al que actúa para el que espera en él
  - Desde la antigüedad nadie ha oído...
  rationale: El hebreo es comprimido y permite más de una puntuación o enlace sintáctico. La opción elegida sigue de cerca el orden masorético sin eliminar la tensión entre la unicidad divina y su obrar para los que esperan en él.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador refleja la revisión más reciente del inglés POB, que retiró la paráfrasis «no one»/«no ear» para conservar con mayor directidad los plurales hebreos; por eso se mantienen dos verbos plurales en español y se evita resolver el sujeto de manera interpretativa.
  spanish_consistency_notes:
  - Se usa «Dios» con mayúscula para el referente divino verdadero, en coherencia con la tradición POB y la distinción frente a posibles deidades rivales.
  - Se mantiene el singular en «el que espera» para reflejar el participio singular hebreo y no suavizarlo innecesariamente en plural.
  - Se conserva la imagen de «ojo» en vez de sustituirla por un genérico como «nadie», porque forma parte del paralelismo poético del versículo.
  - «Fuera de ti» se usa aquí como equivalente funcional de exclusividad; no equivale a una negación espacial, sino a la exclusión de cualquier otro Dios.
