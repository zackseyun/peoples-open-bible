revisions:
- from: 'Y él dijo: «¿Quién te dijo que estabas desnudo? ¿Has comido del árbol de que te mandé que no comieras?»'
  to: 'Y él dijo: «¿Quién te dijo que estabas desnudo? ¿Has comido del árbol del cual te mandé no comer?»'
  rationale: Se reemplaza la construcción relativa forzada «de que te mandé que no comieras» por «del cual te mandé no comer», que conserva el sentido del hebreo, refleja mejor la revisión formal del inglés POB y suena natural en español bíblico moderno sin añadir ni quitar contenido. No hacen falta notas al pie, porque en español esta solución evita la ambigüedad sin pérdida semántica relevante.
