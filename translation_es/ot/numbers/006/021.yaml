  to: Esta es la ley del nazareo que promete su ofrenda a Yahvé por su nazareato, además de lo que alcance su mano[a]. Conforme al voto que hace, así hará, según la ley de su nazareato.
  rationale: Se corrige la sintaxis para reflejar con más claridad que el nazareo promete su ofrenda a Yahvé, y se traslada la nota al pie al modismo hebreo sobre la capacidad económica, que es donde el inglés auditado preserva la alternativa léxica pertinente. Se mantiene «nazareo/nazareato» y la estructura legal repetitiva del versículo.
