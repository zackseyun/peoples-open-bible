revisions:
- from: Pero con un torrente avasallador hará un fin completo de su lugar[a], y la oscuridad perseguirá a sus enemigos.
  to: Pero con un torrente avasallador acabará por completo con su lugar[a], y las tinieblas perseguirán a sus enemigos.
  rationale: Se ajusta la frase verbal para lograr un español natural y fiel al sentido intensivo de כָּלָה יַעֲשֶׂה; se sustituye «la oscuridad» por «las tinieblas» para una imaginería profética más idiomática; y se afina la nota para explicar mejor el femenino singular hebreo y la posible personificación, manteniendo la ambigüedad deliberada del texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: giro adversativo, imagen de inundación destructora, destrucción total del lugar, y persecución de los enemigos por la oscuridad. También preserva adecuadamente el cambio de sufijos entre «su lugar» y «sus enemigos». Sin embargo, «hará un fin completo» suena poco idiomático en español bíblico natural, y «la oscuridad» es menos preferible que «las tinieblas» o simplemente «tinieblas» para חֹשֶׁךְ en este registro.'
  spanish_quality_summary: El texto es comprensible, pero tiene dos problemas de naturalidad. Primero, «hará un fin completo» es un calco extraño; «acabará por completo con su lugar» o «pondrá fin por completo a su lugar» sería más natural. Segundo, «la oscuridad perseguirá» es correcto, pero «las tinieblas perseguirán» encaja mejor con el tono profético y la imaginería bíblica sin volverse arcaico. «Torrente avasallador» es aceptable, aunque «inundación desbordante/avasalladora» sería también viable.
  glossary_alignment: No hay conflicto con la terminología clave del proyecto. No aparecen Yahvé, Mesías, etc. La decisión de mantener «su lugar» con nota es coherente con el expediente inglés revisado, aunque la nota puede formularse con más claridad para explicar el femenino singular y la posible personificación.
  issues:
  - severity: medium
    issue: «hará un fin completo» es poco idiomático en español
    rationale: Aunque reproduce de cerca el inglés auditado, en español suena forzado y poco natural. El hebreo כָּלָה יַעֲשֶׂה pide una expresión de destrucción total más idiomática.
  - severity: low
    issue: «la oscuridad» es menos eficaz que «las tinieblas» en registro profético
    rationale: חֹשֶׁךְ significa literalmente «oscuridad», pero en español bíblico-literario «tinieblas» comunica mejor la fuerza poética y judicial del contexto sin añadir interpretación.
  - severity: low
    issue: La nota al pie puede aclarar mejor la relación entre el texto principal y la alternativa
    rationale: Tal como está, repite «su lugar» sin distinguir con suficiente precisión entre la lectura neutra en español y el matiz femenino singular del hebreo.
  revised_spanish_text: Pero con un torrente avasallador acabará por completo con su lugar[a], y las tinieblas perseguirán a sus enemigos.
  revised_footnotes:
