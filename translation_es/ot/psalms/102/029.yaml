review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: los descendientes de los siervos de Dios habitarán y su descendencia quedará establecida delante de él. También respeta la decisión auditada de no añadir explícitamente «seguridad» a יִשְׁכּוֹנוּ. Sin embargo, «será establecida» suena algo calcado y menos natural en español bíblico actual; «quedará firme» o «quedará establecida» serían más idiomáticos. Además, la nota con «su semilla» es fiel como alternativa léxica, pero en español actual conviene mantenerla claramente como opción más literal.'
  spanish_quality_summary: 'El texto es claro y mayormente natural. «Los hijos de tus siervos habitarán» funciona bien y conserva el matiz filial. El principal ajuste es estilístico: «su descendencia será establecida delante de ti» resulta comprensible, pero algo rígido. «Su descendencia quedará firme delante de ti» comunica mejor el valor resultativo de יִכּוֹן en español natural, sin perder fidelidad. La nota al pie está bien anclada y ordenada.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Siervos» para עֲבָדֶיךָ está justificado por el contexto. «Descendencia» para זַרְעָם es una buena equivalencia colectiva. No aparece ningún término sensible del glosario mayor que requiera corrección.
  issues:
  - severity: medium
    issue: «será establecida» suena poco idiomático en este contexto
    rationale: Aunque es semánticamente posible para יִכּוֹן, en español natural y eclesial «quedará firme» o «quedará establecida» suena menos calcado y refleja mejor el estado resultante.
  - severity: low
    issue: La nota alternativa con «semilla» requiere formulación claramente literal
    rationale: «Semilla» es una alternativa válida por el hebreo זֶרַע, pero en español moderno puede sonar extraña; conviene conservarla solo como alternativa más literal, no como preferida.
  revised_spanish_text: Los hijos de tus siervos habitarán[a], y su descendencia quedará firme delante de ti.
  revised_footnotes:
  - marker: a
    text: O «Los hijos de tus siervos habitarán, y su semilla quedará firme delante de ti»
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y el sentido del borrador, pero se reemplaza «será establecida» por «quedará firme» para un español más natural y digno, mientras se preserva el valor de estabilidad de יִכּוֹן. También se ajusta la nota para que la alternativa literal siga la redacción revisada.
