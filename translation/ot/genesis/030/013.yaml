id: GEN.30.13
reference: Genesis 30:13
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר לֵאָ֔ה בְּ/אָשְׁרִ֕/י כִּ֥י אִשְּׁר֖וּ/נִי בָּנ֑וֹת וַ/תִּקְרָ֥א אֶת שְׁמ֖/וֹ אָשֵֽׁר־׃
translation:
  text: Then Leah said[b][a], “Happy am I! For women will call me happy.” So she called his name Asher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name Asher sounds like the Hebrew words for “happy” and “call happy” in Leah’s statement.
    reason: lexical_alternative
  - marker: b
    text: Or “women,” since “daughters” can function idiomatically for women more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָשְׁרִי
  chosen: Happy am I
  alternatives:
  - In my happiness
  - For my happiness
  - With good fortune for me
  lexicon: HALOT
  rationale: The noun אֹשֶׁר/אָשֶׁר denotes happiness, blessedness, or good fortune. In this naming context, an exclamatory rendering best captures Leah's speech and the wordplay with the child's name. 'Happy am I' is idiomatic English and preserves the first-person suffix.
- source_word: אִשְּׁרוּנִי
  chosen: will call me happy
  alternatives:
  - will pronounce me happy
  - will count me happy
  - will call me blessed
  lexicon: HALOT
  rationale: From אשר in the Piel, the sense is to declare or call someone happy/blessed. 'Will call me happy' preserves the verbal link with בְּאָשְׁרִי and the name אָשֵׁר. 'Blessed' is possible, but 'happy' better maintains the immediate wordplay in modern English.
- source_word: בָּנוֹת
  chosen: daughters
  alternatives:
  - women
  - girls
  lexicon: HALOT
  rationale: The plural of 'daughter' can idiomatically refer to women more broadly, but the formal lexical value is 'daughters.' Retaining 'daughters' stays closer to the Hebrew while remaining understandable; the broader social sense is preserved in a footnote.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ אָשֵׁר
  chosen: So she called his name Asher
  alternatives:
  - So she named him Asher
  lexicon: HALOT
  rationale: This follows the common Hebrew naming formula closely. 'Called his name' is slightly more formal but transparent; it also preserves the narrative rhythm of Genesis naming scenes.
- source_word: אָשֵׁר
  chosen: Asher
  alternatives:
  - Happy
  - Blessed
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather than translated. The semantic force of the name is preserved through the surrounding wordplay and footnote rather than by rendering the name itself.
