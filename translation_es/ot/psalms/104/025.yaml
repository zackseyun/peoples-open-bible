translation:
  language: es
  text: He aquí el mar[a], grande y ancho; en él hay seres que pululan sin número[b][c], criaturas, pequeñas y grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «ancho de manos», un modismo para gran amplitud o vasta extensión.
    reason: cultural_note
  - marker: b
    text: O «criaturas que pululan allí, sin número».
    reason: lexical_alternative
  - marker: c
    text: 'Otra redacción posible: «allí hay seres que pululan».'
    reason: previous_rendering
lexical_decisions:
- source_word: זֶה
  english_pob_choice: There is
  chosen_spanish: Allí está
  alternatives_spanish:
  - He aquí
  - Este es
  lexicon: HALOT
  rationale: En este contexto de presentación poética, זֶה introduce la escena de manera deíctica. «Allí está» conserva la idea de señalamiento y suena natural en español sin convertirlo en una mera identificación abstracta.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  - la mar
  lexicon: HALOT
  rationale: El hebreo יָם puede traducirse por «mar» con plena naturalidad en español. «Mar» comunica bien la imagen poética y evita una palabra más técnica o menos común como «océano».
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - enorme
  - vasto
  lexicon: HALOT
  rationale: Aquí el adjetivo expresa tamaño real dentro de una descripción poética. «Grande» es la equivalencia más directa y sobria; no se fuerza una elevación retórica adicional.
- source_word: וּרְחַב יָדָיִם
  english_pob_choice: wide
  chosen_spanish: ancho
  alternatives_spanish:
  - de gran amplitud
  - de gran extensión
  lexicon: HALOT
  rationale: El hebreo conserva una imagen idiomática de amplitud. La edición inglesa decidió no mantener literalmente «hands» por razones de fluidez; en español, «ancho» transmite esa amplitud de forma clara y digna, sin perder el sentido idiomático.
- source_word: שָׁם
  english_pob_choice: in it / there
  chosen_spanish: en él
  alternatives_spanish:
  - allí
  - en ese mar
  lexicon: HALOT
  rationale: El adverbio locativo remite al mar mencionado. «En él» conecta de manera precisa los seres con el mar y evita la redundancia de un segundo «allí».
- source_word: רֶמֶשׂ
  english_pob_choice: swarming things
  chosen_spanish: seres que pululan
  alternatives_spanish:
  - criaturas que se mueven
  - animales que pululan
  lexicon: HALOT
  rationale: Para el ámbito marino, el término designa seres pequeños o numerosos en movimiento. «Pululan» conserva el matiz colectivo y abundante de «swarming things» mejor que una versión más neutral como «se mueven».
- source_word: וְאֵין מִסְפָּר
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - sin cuento
  lexicon: HALOT
  rationale: La expresión hebrea señala que no pueden contarse. «Sin número» es una equivalencia directa, bíblica y transparente en español.
- source_word: חַיּוֹת
  english_pob_choice: living creatures
  chosen_spanish: criaturas vivientes
  alternatives_spanish:
  - seres vivos
  - animales
  lexicon: HALOT
  rationale: «Criaturas vivientes» preserva el carácter amplio del hebreo sin restringirlo a animales terrestres. También mantiene el tono poético de la línea.
- source_word: קְטַנּוֹת עִם גְּדֹלוֹת
  english_pob_choice: both small and great
  chosen_spanish: pequeñas junto con grandes
  alternatives_spanish:
  - pequeñas y grandes
  - tanto pequeñas como grandes
  lexicon: HALOT
  rationale: La construcción hebrea expresa inclusión de ambos tamaños. «Junto con» refleja bien עִם y mantiene el paralelismo poético.
theological_decisions:
- issue: Si זֶה debe sonar como mera identificación o como presentación admirativa
  english_pob_reading: There is the sea
  chosen_spanish_reading: Allí está el mar
  alternative_spanish_readings:
  - Este es el mar
  - He aquí el mar
  rationale: El verso no está definiendo el mar, sino presentándolo en la contemplación del orden creado. «Allí está» conserva el gesto de señalar y el tono contemplativo del hebreo.
  doctrine_reference: Salmo 104 como doxología de la creación
- issue: Cómo rendir רֶמֶשׂ sin perder su amplitud zoológica ni forzar «reptiles»
  english_pob_reading: swarming things
  chosen_spanish_reading: seres que pululan
  alternative_spanish_readings:
  - criaturas que pululan
  - seres que se agitan
  rationale: En este contexto marítimo, el término abarca seres pequeños y numerosos. «Seres que pululan» preserva la idea de abundancia móvil sin estrechar indebidamente la referencia.
  doctrine_reference: Lenguaje de la creación y la diversidad de las criaturas
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que suavizó la literalidad de «broad of hands» a «wide» y ajustó la sintaxis de la frase sobre los seres marinos. Esta propuesta española toma en cuenta esa revisión, pero conserva una nota que hace visible el modismo hebreo subyacente en la primera cláusula y mantiene la estructura poética completa del versículo.
  spanish_consistency_notes:
  - Se mantiene «mar» para יָם y «grande/ancho» para el paralelismo adjetival.
  - Se evita «SEÑOR» porque no hay aquí un tetragrámaton ni una cita del nombre divino.
  - «Sin número» conserva la fórmula bíblica y la claridad del original.
  - La puntuación separa los miembros poéticos sin borrar la unidad sintáctica del versículo.
