translation:
  language: es
  text: 'hijo de hombre[a], escribe para ti el nombre del día, este mismo día[b]: el rey de Babilonia ha puesto sitio a Jerusalén[c] en este mismo día[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «anota la fecha». Literalmente: «escribe para ti el nombre del día».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «este mismo día» / «en este mismo día», repitiendo la expresión para dar énfasis.
    reason: lexical_alternative
  - marker: c
    text: O, «ha venido contra Jerusalén». El verbo hebreo se entiende aquí como el comienzo del asedio babilónico.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el giro hebreo de vocativo dirigido a Ezequiel y mantiene su fuerza idiomática sin convertirlo en una paráfrasis genérica.
- source_word: כתוב לְךָ
  english_pob_choice: write down for yourself
  chosen_spanish: escribe para ti
  alternatives_spanish:
  - escribe para ti mismo
  - anota para ti
  lexicon: HALOT
  rationale: El imperativo más el dativo reflexivo se expresa con naturalidad en español como una acción personal dirigida al profeta; 'para ti' preserva el matiz de encargo individual.
- source_word: אֶת שֵׁם הַיּוֹם
  english_pob_choice: the name of the day
  chosen_spanish: el nombre del día
  alternatives_spanish:
  - la fecha
  - la designación del día
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea literal, ya que el POB inglés también mantiene 'name of the day' para no borrar la expresión idiomática que en contexto apunta a registrar la fecha.
- source_word: אֶת עֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: this very day
  chosen_spanish: este mismo día
  alternatives_spanish:
  - este día mismo
  - este día exacto
  lexicon: HALOT
  rationale: '''עֶצֶם'' intensifica la exactitud; ''este mismo día'' reproduce bien la insistencia temporal del hebreo y del inglés POB.'
- source_word: סָמַךְ
  english_pob_choice: has laid siege to
  chosen_spanish: ha puesto sitio a
  alternatives_spanish:
  - ha sitiado
  - ha cercado
  lexicon: HALOT
  rationale: Aunque el verbo puede abarcar el movimiento hostil contra la ciudad, el contexto militar requiere explicitar el inicio del asedio. 'Poner sitio a' es la expresión española natural y fiel a la decisión inglesa revisada.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  lexicon: HALOT
  rationale: Correspondencia directa del sintagma nominal, sin añadir connotaciones ajenas al hebreo.
- source_word: אֶל יְר֣וּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: En español, con 'poner sitio', la preposición natural es 'a'; evita forzar 'contra' cuando el verbo ya comunica la hostilidad militar.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en ese mismo día
  - en el mismo día
  lexicon: HALOT
  rationale: Reproduce el énfasis temporal del hebreo con una formulación idiomática en español; se repite para reflejar la duplicación enfática del original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y refleja la revisión inglesa más reciente, que prefirió 'laid siege to Jerusalem' por ser la forma más natural en inglés; en español se expresa con 'ha puesto sitio a Jerusalén', sin perder el matiz de inicio del asedio ni la repetición enfática de 'este mismo día'.
  spanish_consistency_notes:
  - Se conserva 'Hijo de hombre' como vocativo profético, coherente con el tratamiento POB del hebreo בֶּן אָדָם.
  - '''Poner sitio a'' evita el calco impropio y comunica el valor militar del verbo en este contexto.'
  - La repetición de 'este mismo día' en la cláusula final preserva el énfasis temporal del hebreo.
  - Se mantiene 'Babilonia' y 'Jerusalén' con ortografía española estándar.
