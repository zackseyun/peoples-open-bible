translation:
  language: es
  text: Porque Yahvé oye a los necesitados[a], y no desprecia a sus prisioneros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cautivos». El término hebreo puede referirse en general a quienes están retenidos en esclavitud o confinamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduzco la base causal del versículo con 'Porque', que conserva el valor explicativo y suena natural en español poético.
- source_word: שֹׁמֵעַ
  english_pob_choice: hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye
  lexicon: HALOT
  rationale: El participio expresa acción característica; 'oye' mantiene la idea de responder al clamor sin añadir matices ajenos. 'Escucha' podría sonar más interpretativo en este contexto.
- source_word: אֶל אֶבְיוֹנִים
  english_pob_choice: the needy
  chosen_spanish: a los necesitados
  alternatives_spanish:
  - a los pobres
  - a los necesitados
  - a los afligidos
  lexicon: HALOT
  rationale: אֶבְיוֹנִים denota a los pobres o necesitados. 'Necesitados' conserva la vulnerabilidad socioeconómica sin restringir el término solo a pobreza material ni desplazar el tono amplio del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Sigo el criterio del proyecto para el nombre divino: ''Yahvé'', preservando el Tetragrámaton en vez de ocultarlo con un título.'
- source_word: אֲסִירָיו
  english_pob_choice: his prisoners
  chosen_spanish: sus prisioneros
  alternatives_spanish:
  - sus cautivos
  - sus prisioneros
  lexicon: HALOT
  rationale: Conservo el posesivo 'sus' para reflejar el sufijo de tercera persona y traduzco אסיר por 'prisioneros', que comunica la idea de confinamiento sin forzar un sentido específico de guerra o esclavitud.
- source_word: לֹא בָזָה
  english_pob_choice: does not despise
  chosen_spanish: no desprecia
  alternatives_spanish:
  - no menosprecia
  - no desdeña
  lexicon: HALOT
  rationale: '''Desprecia'' reproduce con claridad בזה como tratar con desdén o desprecio, manteniendo el paralelismo con el verbo de oído y la afirmación general del texto.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El hebreo usa directamente el Nombre divino. En español se preserva como 'Yahvé', conforme al criterio del proyecto, para no enmascarar la referencia del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido posesivo de אֲסִירָיו
  english_pob_reading: his prisoners
  chosen_spanish_reading: sus prisioneros
  alternative_spanish_readings:
  - sus cautivos
  - los prisioneros
  rationale: Mantengo el posesivo porque el sufijo hebreo expresa pertenencia/referencia a Yahvé. No se generaliza a 'los prisioneros' para no perder ese matiz teológico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ningún cambio aplicado en la última revisión; por ello la redacción española sigue de cerca las decisiones léxicas ya validadas, ajustándolas solo para fluidez natural en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - Se conserva el posesivo 'sus' para reflejar el sufijo hebreo de tercera persona.
  - '''Necesitados'' mantiene amplitud semántica frente a ''pobres'' o ''afligidos''.'
  - La estructura causal con 'Porque' reproduce el enlace del versículo con el contexto anterior.
