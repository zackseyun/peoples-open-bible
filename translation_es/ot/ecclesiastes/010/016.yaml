translation:
  language: es
  text: ¡Ay de ti, oh tierra, cuando tu rey es un joven[a] y tus príncipes comen por la mañana[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «¡Ay de ti, oh tierra, cuyo rey es un niño!». El sustantivo hebreo נָעַר puede significar niño, joven o muchacho; aquí probablemente resalta la inmadurez para gobernar.'
    reason: lexical_alternative
  - marker: b
    text: La frase «comen por la mañana» probablemente implica una conducta de autoindulgencia o festín en un momento impropio, en contraste con la alabanza del versículo siguiente.
    reason: cultural_note
lexical_decisions:
- source_word: אִי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ti, tierra!
  lexicon: HALOT
  rationale: El hebreo es una interjección de lamento o denuncia. En español, «¡Ay de ti!» transmite bien esa exclamación de desgracia con tono profético/sapiencial. «Woe» no se calca; se expresa con una exclamación natural y solemne.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: de ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona femenina singular se dirige a la tierra. En español, la construcción exclamativa más natural es «¡Ay de ti!», que mantiene el vocativo implícito sin forzar un calco preposicional.
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  lexicon: HALOT
  rationale: Aquí se refiere a una entidad política o nacional, no a la tierra en sentido cósmico. «Tierra» conserva la amplitud del hebreo y suena natural en una denuncia sapiencial dirigida al reino.
- source_word: שֶׁמַּלְכֵּךְ
  english_pob_choice: when your king
  chosen_spanish: cuando tu rey es
  alternatives_spanish:
  - cuyo rey es
  - mientras tu rey es
  lexicon: HALOT
  rationale: La relación relativa se adapta a una cláusula temporal/circunstancial en español. «Cuando tu rey es» fluye con naturalidad y conserva la idea de la condición del reino bajo ese rey.
- source_word: נָעַר
  english_pob_choice: a youth
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un niño
  lexicon: HALOT
  rationale: El término puede abarcar niño, joven o muchacho; el contexto destaca inmadurez para gobernar. «Un joven» comunica esa falta de madurez sin afirmar necesariamente infancia literal. La nota preserva la alternativa «niño» donde el contexto podría intensificar la inmadurez.
- source_word: וְשָׂרַיִךְ
  english_pob_choice: and your princes
  chosen_spanish: y tus príncipes
  alternatives_spanish:
  - y tus gobernantes
  - y tus oficiales
  lexicon: HALOT
  rationale: «Príncipes» reproduce con dignidad el rango cortesano de los שָׂרִים y coincide con la tradición de traducción que mantiene la jerarquía del texto. «Gobernantes» o «oficiales» serían posibles, pero más planos.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: La expresión temporal es sencilla. «Por la mañana» es la forma idiomática y natural en español para el momento del día indicado.
- source_word: יֹאכֵלוּ
  english_pob_choice: eat
  chosen_spanish: comen
  alternatives_spanish:
  - comen y beben
  - banquetean
  lexicon: HALOT
  rationale: El verbo básico es «comer». En el contexto, la connotación negativa se sugiere por la escena y se explicita en el verso siguiente; por eso el texto principal no sobreinterpreta con «banquetean».
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene una traducción optimally equivalent y añade una nota léxica sobre נָעַר y una nota cultural sobre comer por la mañana. El español conserva esa tensión: no se resuelve la ambigüedad de נָעַר hacia un solo sentido absoluto, y no se explicita «banquetear» en el texto principal para no añadir interpretación que el hebreo no exige de inmediato.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni alusiones directas necesarias.
  - Se usa «príncipes» para שָׂרִים por coherencia con el registro del texto y con la decisión inglesa documentada.
  - La exclamación inicial se formula con puntuación española («¡Ay de ti!») para sostener el tono de lamentación/amonestación sin perder fuerza.
  - No se fuerza una lectura de edad literal para נָעַר; el español deja abierta la inmadurez de gobierno, como en el audit trail inglés.
