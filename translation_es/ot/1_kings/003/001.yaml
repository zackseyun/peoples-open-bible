translation:
  language: es
  text: Salomón hizo alianza matrimonial con el faraón, rey de Egipto[a], y tomó a la hija del faraón y la llevó a la ciudad de David hasta que terminó de edificar su propia casa, la casa de Yahvé[b], y la muralla alrededor de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "se emparentó por matrimonio con el faraón". El verbo hebreo puede subrayar la entrada en una relación matrimonial, aquí probablemente con matiz de alianza política.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "el templo de Yahvé" para "la casa de Yahvé".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַתֵּן
  english_pob_choice: formed a marriage alliance with
  chosen_spanish: hizo alianza matrimonial con
  alternatives_spanish:
  - se emparentó por matrimonio con
  - se hizo yerno de
  lexicon: HALOT
  rationale: El hitpael de חתן aquí expresa entrar en una relación matrimonial con fuerza de alianza, no solo el acto de casarse. 'Hizo alianza matrimonial con' conserva el matiz político y dinástico del contexto real.
- source_word: אֶת פַּרְעֹה מֶלֶךְ מִצְרָיִם
  english_pob_choice: with Pharaoh king of Egypt
  chosen_spanish: con el faraón, rey de Egipto
  alternatives_spanish:
  - con el faraón, el rey de Egipto
  lexicon: HALOT
  rationale: La construcción aposicional identifica a Faraón como rey de Egipto. En español, la coma hace clara la apposición y mantiene la fluidez sin añadir contenido.
- source_word: וַיִּקַּח אֶת בַּת פַּרְעֹה
  english_pob_choice: and he took Pharaoh’s daughter
  chosen_spanish: y tomó a la hija del faraón
  alternatives_spanish:
  - y se casó con la hija del faraón
  lexicon: HALOT
  rationale: לקח con mujer como objeto funciona como modismo matrimonial. 'Tomó a la hija del faraón' sigue de cerca el hebreo y deja que la cláusula anterior ya haya explicitado el sentido matrimonial.
- source_word: וַיְבִיאֶהָ
  english_pob_choice: and brought her
  chosen_spanish: y la llevó
  alternatives_spanish:
  - y la llevó consigo
  - y la introdujo
  lexicon: HALOT
  rationale: El verbo indica hacer venir o llevar. 'La llevó' es natural en español y conserva el movimiento hacia el destino mencionado.
- source_word: אֶל עִיר דָּוִד
  english_pob_choice: into the city of David
  chosen_spanish: a la ciudad de David
  alternatives_spanish:
  - hacia la ciudad de David
  - a la ciudad de David, dentro de ella
  lexicon: HALOT
  rationale: '''A'' comunica el traslado hacia el destino sin forzar un ''en'' que suene innecesario en español. El movimiento ya está claro por el verbo.'
- source_word: עַד כַּלֹּתוֹ
  english_pob_choice: until he had finished
  chosen_spanish: hasta que terminó
  alternatives_spanish:
  - hasta que hubo terminado
  - hasta terminar
  lexicon: HALOT
  rationale: La forma verbal marca el punto final de una acción. En español, 'hasta que terminó' expresa bien la relación temporal sin un pluperfecto pesado.
- source_word: לִבְנוֹת
  english_pob_choice: building
  chosen_spanish: de edificar
  alternatives_spanish:
  - de construir
  - de levantar
  lexicon: HALOT
  rationale: Tras 'terminó', el infinitivo en español queda natural como 'terminó de edificar'. 'Edificar' mantiene el tono elevado del pasaje y corresponde al campo semántico de construir.
- source_word: אֶת בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su casa
  alternatives_spanish:
  - su propio palacio
  - su palacio
  lexicon: HALOT
  rationale: En contexto real puede aludir al palacio, pero 'casa' es la equivalencia más directa del hebreo בית. El posesivo ya distingue esta casa de la de Yahvé.
- source_word: וְאֶת בֵּית יְהוָה
  english_pob_choice: and the house of the LORD
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahvé, el templo
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva 'casa' por fidelidad al hebreo בית, y 'Yahvé' según el estándar doctrinal del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con la forma establecida para español del proyecto, 'Yahvé', en vez de una sustitución por título.
- source_word: וְאֶת חוֹמַת יְרוּשָׁלִַם סָבִיב
  english_pob_choice: and the wall around Jerusalem
  chosen_spanish: y la muralla alrededor de Jerusalén
  alternatives_spanish:
  - y la muralla de Jerusalén alrededor
  - y el muro alrededor de Jerusalén
  lexicon: HALOT
  rationale: '''חוֹמָה'' puede ser muro o muralla; ''muralla'' comunica mejor la fortificación urbana. ''Alrededor de Jerusalén'' preserva la idea de circunvalación dada por סָבִיב.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme al estándar del proyecto, se traslada como 'Yahvé' para preservar el nombre propio del Dios del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la relación de Salomón con Faraón
  english_pob_reading: formed a marriage alliance with
  chosen_spanish_reading: hizo alianza matrimonial con
  alternative_spanish_readings:
  - se emparentó por matrimonio con
  - se casó con
  rationale: El hitpael de חתן en este contexto regio sugiere una relación dinástica y política, no mera nota privada sobre matrimonio. 'Alianza matrimonial' conserva esa tensión.
  doctrine_reference: HALOT; contexto histórico-literario de alianzas dinásticas
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al omitir cualquier coma innecesaria antes de la cláusula con 'hasta que'. También conserva la preferencia revisada por una formulación fluida y directa, sin añadir material interpretativo no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar doctrinal del proyecto.
  - Se conserva 'casa' para בֵּית en ambas apariciones, evitando sustituirlo por 'templo' salvo nota alternativa.
  - '''Muralla'' se eligió para חוֹמָה por claridad urbana y tono bíblico adecuado en español.'
  - La cláusula temporal 'hasta que terminó de edificar' refleja correctamente el cierre de la acción en el hebreo.
