translation:
  language: es
  text: 'No diga el extranjero que se ha unido a Yahvé[a]: «Yahvé ciertamente me apartará[b] de su pueblo»; ni diga el eunuco[c]: «He aquí, yo soy un árbol seco».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que se une a Yahvé». El participio hebreo puede entenderse como acción en curso o como acción ya realizada.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo tiene una forma enfática: «Yahvé de veras me apartará de su pueblo» o «Yahvé ciertamente me separará de su pueblo».'
    reason: lexical_alternative
  - marker: c
    text: O «oficial de la corte» en algunos contextos; aquí «eunuco» encaja mejor, especialmente por la imagen de «un árbol seco».
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן הַנֵּכָר
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el hijo de tierra extraña
  - el forastero
  - el alienígena
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y denota a una persona de origen ajeno al pueblo; «extranjero» comunica bien la condición de no pertenencia sin caer en calco antinatural.
- source_word: הַנִּלְוָה אֶל יְהוָה
  english_pob_choice: who has joined himself to Yahweh
  chosen_spanish: que se ha unido a Yahvé
  alternatives_spanish:
  - que se une a Yahvé
  - que se ha adherido a Yahvé
  - que se ha allegado a Yahvé
  lexicon: HALOT
  rationale: El participio nifal con el complemento preposicional expresa una unión/adhesión a Yahvé; «se ha unido» conserva la idea relacional y de alianza sin forzar un tecnicismo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton según la norma del proyecto, no como sustitución por un título.
- source_word: הַבְדֵּל יַבְדִּילַנִי
  english_pob_choice: will surely separate me
  chosen_spanish: ciertamente me apartará
  alternatives_spanish:
  - me separará sin duda
  - me apartará por completo
  - seguramente me excluirá
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito aporta énfasis. «Ciertamente» preserva la fuerza sin añadir una paráfrasis excesiva; «apartar» refleja היטב la separación relacional del contexto.
- source_word: מֵעַל עַמּוֹ
  english_pob_choice: from his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - alejado de su pueblo
  - fuera de su pueblo
  lexicon: HALOT
  rationale: La construcción indica separación respecto del grupo al que pertenece; «de su pueblo» es natural y suficientemente preciso en español.
- source_word: הַסָּרִיס
  english_pob_choice: the eunuch
  chosen_spanish: el eunuco
  alternatives_spanish:
  - el oficial de la corte
  lexicon: HALOT
  rationale: En este contexto la imagen de «árbol seco» favorece el sentido físico tradicional de «eunuco», que además preserva la tensión social y cultual del texto.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí que
  lexicon: HALOT
  rationale: La partícula introduce una autoafirmación enfática; «He aquí» mantiene el registro formal y la deíxis solemne del hebreo, coherente con la revisión inglesa que prefirió «Behold».
- source_word: עֵץ יָבֵשׁ
  english_pob_choice: a dry tree
  chosen_spanish: un árbol seco
  alternatives_spanish:
  - un árbol marchito
  - un árbol sin vida
  - un árbol estéril
  lexicon: HALOT
  rationale: Se conserva la metáfora literal del hebreo. «Seco» reproduce la imagen sin interpretarla de más; «estéril» explicaría el sentido, pero desplazaría la figura original.
theological_decisions:
- issue: Conservar las categorías concretas de exclusión potencial
  english_pob_reading: Retain both 'foreigner' and 'eunuch' plainly in the main text without softening or interpretive expansion.
  chosen_spanish_reading: Mantener «extranjero» y «eunuco» en el texto principal, sin suavizar ni sustituir por términos genéricos.
  alternative_spanish_readings:
  - usar «forastero» o «extranjero» de forma generalizada
  - usar «oficial» en lugar de «eunuco»
  rationale: El versículo aborda directamente a dos grupos concretos que podrían asumir exclusión del pueblo de Dios. Preservar esas categorías mantiene la fuerza teológica del anuncio sin anticipar conclusiones doctrinales posteriores.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nombre divino en la cláusula de separación
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la decisión doctrinal y terminológica del proyecto para el Tetragrámaton, conservando el nombre propio de Dios en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «Look» por «Behold» para reflejar mejor הֵן en un registro formal; en español se adoptó «He aquí» por la misma razón, manteniendo el énfasis sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - «Extranjero» y «eunuco» conservan las categorías concretas del hebreo y del POB inglés.
  - 'El orden y la puntuación siguen la progresión del hebreo: prohibición al extranjero, cita directa, y luego prohibición al eunuco con su autoevaluación enfática.'
