translation:
  language: es
  text: ¡Despierta y levántate para mi juicio[a], mi Dios y mi Señor, para mi causa[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para mi justicia» o «para mi vindicación»; el hebreo puede referirse al juicio, a la justicia o a una vindicación legal según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «para mi caso», «para mi disputa» o «para mi pleito»; el hebreo señala una controversia o causa legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעִירָה
  english_pob_choice: Awake
  chosen_spanish: ¡Despierta!
  alternatives_spanish:
  - ¡Ruégate despertar!
  - ¡Sacúdete!
  lexicon: HALOT
  rationale: El imperativo pide a Dios que actúe con prontitud; «despierta» conserva la imagen vívida de aparente inacción divina sin volverla explicativa ni mecánica.
- source_word: וְהָקִיצָה
  english_pob_choice: and rise up
  chosen_spanish: y levántate
  alternatives_spanish:
  - y despierta
  - y alzate
  lexicon: HALOT
  rationale: Se mantiene el segundo mandato con un verbo distinto para preservar el paralelismo intensificado del hebreo. «Levántate» comunica intervención activa y evita una repetición plana de «despierta».
- source_word: לְמִשְׁפָּטִי
  english_pob_choice: for my judgment
  chosen_spanish: para mi juicio
  alternatives_spanish:
  - para mi justicia
  - para mi vindicación
  lexicon: HALOT
  rationale: «Juicio» reproduce con naturalidad el campo forense de מִשְׁפָּט en este contexto. Se evita cerrar el sentido sólo a «justicia» o «vindicación», que también son posibles pero más interpretativos; la nota conserva esa tensión semántica.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: Forma directa de vocativo y posesivo, totalmente transparente en español.
- source_word: וַאדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi dueño
  - mi soberano
  lexicon: HALOT
  rationale: Como título reverencial dirigido a Dios, «Señor» es la equivalencia española más clara y fiel. «Dueño» sería demasiado duro y «soberano» añade un matiz no exigido por el texto.
- source_word: לְרִיבִי
  english_pob_choice: for my cause
  chosen_spanish: para mi causa
  alternatives_spanish:
  - para mi disputa
  - para mi pleito
  - para mi caso
  lexicon: HALOT
  rationale: «Causa» comunica de forma natural la disputa legal o contenciosa de רִיב sin volverlo excesivamente técnico. Mantiene la amplitud del término hebreo y encaja bien en la oración poética.
theological_decisions:
- issue: 'Cómo traducir los títulos dirigidos a Dios: אֱלֹהַי וַאדֹנָי'
  english_pob_reading: my God and my Lord
  chosen_spanish_reading: mi Dios y mi Señor
  alternative_spanish_readings:
  - mi Dios y mi dueño
  rationale: Se preserva el carácter de oración directa con dos títulos divinos traducidos de manera estándar y reverente. «Señor» es preferible a «dueño» porque en español bíblico mantiene el registro litúrgico sin perder la fuerza del título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Divine address should remain direct and reverent.'
- issue: Alcance de מִשְׁפָּט en un contexto judicial
  english_pob_reading: for my judgment
  chosen_spanish_reading: para mi juicio
  alternative_spanish_readings:
  - para mi justicia
  - para mi vindicación
  rationale: El hebreo puede referirse al acto de juzgar, al veredicto o a la vindicación legal. «Juicio» conserva esa amplitud sin resolver prematuramente la ambigüedad. La nota deja abierta la lectura alternativa que el contexto permite.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension; do not erase forensic ambiguity where the source supports it.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del expediente al reflejar לְמִשְׁפָּטִי con un término forense directo y al ordenar la cláusula final de modo natural en español sin perder el paralelismo del hebreo: imperativos iniciales, luego el motivo jurídico y finalmente la apelación vocativa con la causa. También se mantiene la tensión semántica documentada entre juicio/justicia/vindicación y causa/caso/disputa mediante notas.'
  spanish_consistency_notes:
  - Se usa «Dios» y «Señor» como títulos divinos traducidos, conforme a la política del proyecto.
  - 'Se conserva el tono poético y urgente del hebreo con dos imperativos distintos: «despierta» y «levántate».'
  - «Juicio» y «causa» son opciones publicables que mantienen el registro forense sin sobreexplicar.
  - La puntuación separa claramente el vocativo final para reflejar la estructura retórica del verso.
