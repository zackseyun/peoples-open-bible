translation:
  language: es
  text: 'Y se le informó a Tamar, diciendo: «Mira, tu suegro sube a Timnat para esquilar sus ovejas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira, tu suegro sube a Timnat para esquilar su rebaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: was told
  chosen_spanish: se le informó
  alternatives_spanish:
  - se le dijo
  - le fue dicho
  lexicon: HALOT
  rationale: El pasivo reportivo hebreo pide una construcción impersonal en español. «Se le informó» conserva el sentido de noticia transmitida sin forzar un sujeto explícito y suena natural en registro bíblico moderno.
- source_word: לְתָמָר
  english_pob_choice: Tamar
  chosen_spanish: a Tamar
  alternatives_spanish:
  - para Tamar
  - Tamar
  lexicon: HALOT
  rationale: El dativo del hebreo se expresa naturalmente con «a» en español. Se mantiene el nombre propio transliterado, como en la tradición del proyecto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'y le dijeron:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El hebreo conserva la fórmula de introducción del discurso. En español, «diciendo» refleja esa marca sin eliminarla, a diferencia de una mera puntuación que borraría el rastro formal.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Ve
  lexicon: HALOT
  rationale: «Mira» reproduce la fuerza deíctica e interpelativa de הִנֵּה con español claro y digno. Es más natural que «He aquí» para este contexto narrativo.
- source_word: חָמִיךְ
  english_pob_choice: your father-in-law
  chosen_spanish: tu suegro
  alternatives_spanish:
  - tu padre político
  lexicon: HALOT
  rationale: El término de parentesco se mantiene de forma explícita. «Suegro» es la equivalencia directa y conserva el matiz relacional del hebreo.
- source_word: עֹלֶה
  english_pob_choice: is going up
  chosen_spanish: sube
  alternatives_spanish:
  - va subiendo
  - está subiendo
  lexicon: HALOT
  rationale: El participio qal de עלה puede expresar movimiento en curso o inminente. «Sube» conserva la dirección ascendente sin sobredeterminar el aspecto con perífrasis innecesaria.
- source_word: תִמְנָתָה
  english_pob_choice: to Timnah
  chosen_spanish: a Timnat
  alternatives_spanish:
  - hacia Timnat
  lexicon: HALOT
  rationale: El nombre geográfico se translitera como «Timnat»; la he direccional se expresa con la preposición «a», que es la forma idiomática española más natural.
- source_word: לָגֹז
  english_pob_choice: to shear
  chosen_spanish: para esquilar
  alternatives_spanish:
  - para cortar la lana
  - para trasquilar
  lexicon: HALOT
  rationale: El infinitivo de finalidad se vierte con «para». «Esquilar» es el verbo preciso para el acto de cortar la lana de las ovejas y preserva el sentido técnico del contexto.
- source_word: צֹאנוֹ
  english_pob_choice: his sheep
  chosen_spanish: sus ovejas
  alternatives_spanish:
  - su rebaño
  - su ganado menor
  lexicon: HALOT
  rationale: En el contexto de esquila, el sustantivo colectivo צאן se concreta naturalmente como «ovejas». Se mantiene el posesivo masculino singular «sus» conforme al sufijo hebreo.
translation_notes:
  revision_awareness: La revisión inglesa agregó explícitamente «saying» para reflejar לֵאמֹר. La versión española conserva esa marca con «diciendo» para mantener la misma sensibilidad al texto fuente, y sigue la decisión revisada de expresar la noticia en forma reportiva sin perder la introducción del discurso.
  spanish_consistency_notes:
  - Se usa «Tamar» como nombre propio sin adaptación.
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto directo.
  - Se optó por «ovejas» y no «rebaño» en el texto principal porque el contexto de esquila favorece una referencia específica y concreta; se deja la alternativa en nota.
  - La puntuación española usa comillas angulares para el discurso directo y conserva la estructura narrativa del hebreo.
