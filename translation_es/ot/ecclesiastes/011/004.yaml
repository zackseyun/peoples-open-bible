translation:
  language: es
  text: Quien vigila el viento no sembrará[a], y quien mira las nubes no segará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «El que observa el viento no sembrará, y el que ve las nubes no segará.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  english_pob_choice: watches
  chosen_spanish: vigila
  alternatives_spanish:
  - observa
  - mira
  - está pendiente de
  lexicon: HALOT
  rationale: El participio describe atención continua en un dicho sapiencial. «Vigila» conserva la idea de prestar atención constante sin sugerir protección física como «guarda».
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: El contexto agrícola y el paralelismo con nubes muestran el sentido meteorológico. «Viento» evita introducir un matiz espiritual no sustentado por el pasaje.
- source_word: יִזְרָע
  english_pob_choice: will not sow
  chosen_spanish: no sembrará
  alternatives_spanish:
  - no siembra
  - no va a sembrar
  lexicon: HALOT
  rationale: 'El imperfecto hebreo expresa un resultado proverbial general. En español, el futuro simple transmite bien esa consecuencia habitual: quien se obsesiona con el viento no sembrará.'
- source_word: וְרֹאֶה
  english_pob_choice: and whoever looks
  chosen_spanish: y quien mira
  alternatives_spanish:
  - y quien observa
  - y quien ve
  lexicon: HALOT
  rationale: El participio paralelo al primero introduce otro sujeto general. «Quien mira» mantiene la genericidad y la observación atenta sin volverlo más técnico de lo necesario.
- source_word: בֶעָבִים
  english_pob_choice: at the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - hacia las nubes
  - en las nubes
  lexicon: HALOT
  rationale: La preposición hebrea puede implicar dirección u objeto de la mirada; en español, con «mira» el complemento directo natural es «las nubes». El matiz de atención queda implícito en el verbo.
- source_word: יִקְצֽוֹר
  english_pob_choice: will not reap
  chosen_spanish: no segará
  alternatives_spanish:
  - no cosechará
  - no recogerá
  lexicon: HALOT
  rationale: «Segar» preserva el paralelismo clásico de sembrar/segar y el valor agrícola del verbo. Aunque «cosechar» sería más amplio, «segar» es más preciso al eco del original.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido y la estructura del hebreo y con la auditoría inglesa: dos cláusulas paralelas con sujeto genérico, imágenes meteorológicas, y futuro proverbial negativo. Se mantuvo la fuerza proverbial sin añadir interpretación.'
  spanish_consistency_notes:
  - Se preserva la paralelismo participial con «Quien... y quien...».
  - Se eligieron formas verbales naturales en español que reflejan el resultado habitual del proverbio.
  - No se usó «espíritu» para רוּחַ porque el contexto obliga a «viento».
  - Se mantuvo el campo semántico agrícola con «sembrará» y «segará».
