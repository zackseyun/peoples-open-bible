    rationale: La evidencia fuente muestra אֲדֹנָי, no el nombre divino יהוה. Aunque el proyecto prefiere «Yahvé» para יהוה, aquí debe preservarse el valor de título/vocativo divino como «Señor». Traducirlo como «Yahvé» altera el significado léxico inmediato de la fuente.
