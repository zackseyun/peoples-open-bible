translation:
  language: es
  text: Todos los confines de la tierra recordarán y volverán a Yahvé[a], y todas las familias de las naciones se postrarán[b] ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa aquí el nombre divino YHWH; se traduce con «Yahvé» para mantener visible el nombre del pacto.
    reason: theological_note
  - marker: b
    text: O «adorarán ante ti». El verbo hebreo se refiere literalmente a inclinarse o postrarse, a menudo como acto de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכְּרוּ
  english_pob_choice: will remember
  chosen_spanish: recordarán
  alternatives_spanish:
  - se acordarán
  - traerán a la memoria
  lexicon: HALOT
  rationale: El qal imperfecto 3mp expresa futuro/predicción. «Recordarán» conserva el sentido básico de זכר y suena natural en español bíblico moderno.
- source_word: וְיָשֻׁבוּ
  english_pob_choice: and return
  chosen_spanish: y volverán
  alternatives_spanish:
  - y regresarán
  - y se convertirán
  lexicon: HALOT
  rationale: שוב con אֶל marca movimiento de regreso o vuelta. «Volverán» preserva ese valor léxico sin forzar explícitamente «arrepentirse», aunque la idea puede estar implícita.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - al Señor
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino del texto hebreo según la norma del proyecto: יְהוָה → «Yahvé». La preposición אֶל se expresa con el destino directo «a».'
- source_word: כָּל אַפְסֵי אָרֶץ
  english_pob_choice: all the ends of the earth
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - todos los extremos de la tierra
  - todas las regiones más remotas de la tierra
  lexicon: HALOT
  rationale: La expresión idiomática transmite alcance universal. «Confines» conserva bien la imagen espacial y resulta idiomático en español.
- source_word: וְיִשְׁתַּחֲוּוּ
  english_pob_choice: will bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - se arrodillarán
  lexicon: HALOT
  rationale: El verbo denota la acción corporal de inclinarse/prostrarse; «se postrarán» retiene la fuerza gestual y, por contexto, también el valor de reverencia o adoración.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: ante ti
  alternatives_spanish:
  - delante de ti
  - en tu presencia
  lexicon: HALOT
  rationale: 'La expresión es idiomática: literalmente «ante tu rostro». «Ante ti» preserva la relación directa en segunda persona sin cargar el español con una literalidad extraña.'
- source_word: כָּל מִשְׁפְּחוֹת גּוֹיִם
  english_pob_choice: all the families of the nations
  chosen_spanish: todas las familias de las naciones
  alternatives_spanish:
  - todos los clanes de las naciones
  - todas las familias de los pueblos
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת apunta a grupos familiares/clánicos; «familias» es preciso y claro. גּוֹיִם se conserva como «naciones» para no estrechar indebidamente el alcance.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El hebreo trae el Tetragrama de forma directa. Siguiendo la terminología del proyecto, se translitera como «Yahvé» para preservar la identidad del nombre del pacto y evitar el disfraz litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וְיִשְׁתַּחֲוּוּ
  english_pob_reading: bow down
  chosen_spanish_reading: se postrarán
  alternative_spanish_readings:
  - adorarán
  - se inclinarán
  rationale: La forma verbal describe una postración física. «Se postrarán» conserva la imagen corporal y deja que el matiz de adoración surja del contexto, sin imponer una traducción más interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto base en inglés ya mostraba alta concordancia con el hebreo y no requería revisiones sustantivas; la presente versión ajusta únicamente la salida al español conforme a las convenciones terminológicas del proyecto, especialmente el nombre divino y el verbo de postración.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético entre «recordarán y volverán» y «se postrarán» con ritmo natural en español.
  - «Naciones» se conserva para גּוֹיִם, evitando la carga técnica posterior de «gentiles».
  - La elección de «ante ti» respeta la segunda persona singular del hebreo.
  - La nota al pie se vincula al nombre divino, no a una glosa de «Señor», porque la traducción publicada usa «Yahvé».
