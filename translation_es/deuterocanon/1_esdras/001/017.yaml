translation:
  language: es
  text: Y los hijos de Israel que fueron hallados[a] en aquel tiempo celebraron la Pascua y la fiesta de los panes sin levadura[b] por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «fueron hallados»; es decir, los que estaban presentes en ese tiempo.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «la fiesta de los ázimos». Se prefiere «los panes sin levadura» para mayor claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγοσαν
  english_pob_choice: kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - guardaron
  - observaron
  - celebraron solemnemente
  lexicon: LSJ
  rationale: En contexto festivo, el verbo griego funciona idiomáticamente para la observancia de una fiesta. En español, «celebraron» comunica con naturalidad la realización de la Pascua y la fiesta sin forzar un calco como «trajeron» o «llevaron».
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: LSJ
  rationale: Se conserva la expresión filial del griego, que es más cercana al texto que «israelitas». «Hijos» mantiene la forma y la resonancia bíblica sin perder inteligibilidad en español.
- source_word: οἱ εὑρεθέντες
  english_pob_choice: who were found at that time
  chosen_spanish: los que fueron hallados
  alternatives_spanish:
  - los que estaban presentes
  - los hallados
  lexicon: LSJ
  rationale: El participio pasivo conserva la idea de ser encontrados/presentes en la situación. «Fueron hallados» refleja la forma verbal y, en este contexto, implica los que estaban allí o disponibles en ese momento.
- source_word: ἐν τῷ καιρῷ τούτῳ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - en esa ocasión
  lexicon: LSJ
  rationale: «καιρός» aquí señala el momento u ocasión concreta. «En aquel tiempo» es una solución natural y fiel que preserva el valor temporal sin sobrerinterpretar.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pésaj
  - la Pascua judía
  lexicon: LSJ
  rationale: «Pascua» es el equivalente español estándar y digno para la fiesta, conforme al uso bíblico común y sin perder la referencia a la celebración pascual.
- source_word: τὴν ἑορτὴν τῶν ἀζύμων
  english_pob_choice: the feast of unleavened bread
  chosen_spanish: la fiesta de los panes sin levadura
  alternatives_spanish:
  - la fiesta de los ázimos
  - la fiesta de los panes ázimos
  lexicon: LSJ
  rationale: Se traduce el nombre de la fiesta de manera clara y bíblicamente reconocible. «Panes sin levadura» evita un tecnicismo menos transparente para lectores generales, sin ocultar el sentido literal de ἀζύμων.
- source_word: ἡμέρας ἑπτά
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: LSJ
  rationale: La acusativo de duración se expresa de forma natural en español con «por siete días», que conserva la idea temporal de extensión continua.
translation_notes:
  revision_awareness: 'Se ajustó la traducción para que cada nota estuviera anclada explícitamente en el texto español, corrigiendo el problema anterior donde los marcadores no aparecían en la frase traducida. La redacción se mantiene pegada al griego y al auditoría inglesa: participio pasivo, valor temporal de καιρός, nombre de la Pascua y duración de siete días.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y publicación-readable.
  - Se evita la sustitución por terminología eclesiástica no requerida por el texto.
  - La decisión de «hijos» conserva la forma del griego sin masculinizar indebidamente una fórmula más amplia que el español bíblico tradicional ya usa.
