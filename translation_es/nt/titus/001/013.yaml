translation:
  language: es
  text: Este testimonio es verdadero. Por esta razón[a], repréndelos severamente, para que sean sanos en la fe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sanos en su fe». La expresión griega puede referirse tanto a estar sanos en su propia fe como a estar sanos en la fe cristiana como conjunto de creencias.
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - declaración
  lexicon: BDAG
  rationale: «Testimonio» conserva el matiz de una afirmación o declaración con valor probatorio, más que una simple «declaración». En español suena natural y mantiene bien la fuerza evidencial del texto.
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - cierto
  - veraz
  lexicon: BDAG
  rationale: Como predicado de «testimonio», «verdadero» es la forma más directa y natural en español, equivalente a la afirmación de correspondencia con la realidad.
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - por eso
  - por lo cual
  lexicon: BDAG
  rationale: La expresión introduce una conclusión causal desde lo dicho antes. «Por esta razón» transmite con claridad la inferencia sin forzar un giro arcaico.
- source_word: ἔλεγχε
  english_pob_choice: rebuke
  chosen_spanish: repréndelos
  alternatives_spanish:
  - corrígelos
  - redargúyelos
  lexicon: BDAG
  rationale: El imperativo pide confrontación directa. «Repréndelos» expresa la dimensión correctiva y disciplinaria mejor que opciones más suaves como «corrígelos».
- source_word: ἀποτόμως
  english_pob_choice: sharply
  chosen_spanish: severamente
  alternatives_spanish:
  - con dureza
  - tajantemente
  lexicon: BDAG
  rationale: En español, «severamente» comunica bien la intensidad y firmeza del adverbio sin sonar impropio o excesivamente literal. Mantiene el tono exhortativo fuerte del pasaje.
- source_word: ὑγιαίνωσιν
  english_pob_choice: may be sound
  chosen_spanish: sean sanos
  alternatives_spanish:
  - estén sanos
  - gocen de buena salud
  lexicon: BDAG
  rationale: El verbo tiene sentido literal de salud, pero en las Pastorales suele funcionar metafóricamente para integridad doctrinal/espiritual. «Sean sanos» preserva la metáfora en español.
- source_word: πίστει
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe cristiana
  - la doctrina
  lexicon: BDAG
  rationale: Con artículo, πίστις puede referirse al contenido de la fe cristiana o al ámbito de la fidelidad creyente. «La fe» conserva la ambigüedad productiva del griego y permite oír el trasfondo doctrinal sin cerrarlo demasiado.
theological_decisions:
- issue: Sentido de ἐν τῇ πίστει
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - en la fe
  - en la fe cristiana
  rationale: En las Pastorales, la expresión puede apuntar al cuerpo de la fe cristiana o al estado de firmeza/salud dentro de la fe. Dado el valor contestado de πίστις en el proyecto, «la fe» mantiene la amplitud semántica sin borrar la tensión entre contenido doctrinal y condición espiritual.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy #3'
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registraron cambios necesarios y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «testimonio» para μαρτυρία, en línea con el valor evidencial del contexto.
  - Se evitó «SEÑOR» o sustituciones tradicionales no requeridas; el versículo no contiene el nombre divino.
  - Se preservó la metáfora de salud en «sean sanos», coherente con la lectura auditada de ὑγιαίνωσιν.
  - La nota mantiene la alternativa doctrinal sobre πίστις sin resolver artificialmente la ambigüedad.
