    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota trata de la ambigüedad de קִרְבַת אֱלֹהִים («la cercanía de Dios» / «acercarse a Dios»), pero el marcador aparece en «me buscan[a]». Esto incumple la disciplina requerida de que el marcador aparezca exactamente en la palabra o frase pertinente.
