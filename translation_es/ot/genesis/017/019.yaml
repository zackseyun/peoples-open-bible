review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: respuesta correctiva de Dios a Abraham, promesa de un hijo por medio de Sara, mandato de nombrarlo Isaac, y establecimiento del pacto con Isaac y su descendencia. Sin embargo, «te dará a luz un hijo» no es idiomático ni fiel al sujeto materno en español; la expresión natural es «te dará un hijo» o «dará a luz un hijo para ti».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta una frase poco natural: «Sara... te dará a luz un hijo» suena incorrecta en español estándar, porque quien da a luz es al hijo, no ‘a ti’ el acto de dar a luz. El resto del verso fluye bien. La nota al pie está bien formulada y correctamente anclada.'
  glossary_alignment: Buena alineación general con la terminología del proyecto. «Dios» es correcto para אֱלֹהִים. «Pacto» para בְּרִית es aceptable y está documentado. «Isaac» conserva el nombre convencional, con nota explicativa adecuada. No hay conflicto con los términos teológicos por defecto del proyecto.
  issues:
  - severity: medium
    issue: Expresión española no idiomática en «te dará a luz un hijo»
    rationale: Aunque intenta reflejar לְךָ, en español esa construcción resulta extraña e incorrecta. El hebreo significa que Sara dará a luz un hijo para Abraham; «te dará un hijo» expresa eso con naturalidad sin perder el dativo.
  revised_spanish_text: 'Y Dios dijo[a]: «No, sino que Sara, tu esposa, te dará un hijo, y le pondrás por nombre Isaac. Y yo estableceré mi pacto con él como un pacto eterno para su descendencia después de él».'
  revised_footnotes:
  - marker: a
    text: Isaac suena al verbo hebreo que significa «él ríe» o «él reirá».
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la expresión «te dará a luz un hijo» por «te dará un hijo» para lograr un español natural y fiel al sentido del hebreo. Se conserva el resto, incluyendo la fuerza correctiva de «No, sino que», la fórmula de nombramiento y el lenguaje de pacto.
