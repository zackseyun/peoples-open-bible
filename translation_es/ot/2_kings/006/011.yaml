translation:
  language: es
  text: 'El corazón del rey de Aram se perturbó mucho por este asunto, y llamó a sus siervos y les dijo: «¿No me dirán quién de los nuestros está del lado[a] del rey de Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está a favor del rey de Israel». La expresión hebrea es breve e implica lealtad o colusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּעֵר
  english_pob_choice: was greatly troubled
  chosen_spanish: se perturbó mucho
  alternatives_spanish:
  - se agitó mucho
  - se inquietó profundamente
  - se turbó mucho
  lexicon: HALOT
  rationale: El verbo expresa agitación interior fuerte. «Se perturbó mucho» conserva la idea de trastorno emocional sin limitarla solo a enojo; «se agitó mucho» sería más físico, y «se turbó mucho» es posible pero algo menos directo en español moderno.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - mente
  - interior
  lexicon: HALOT
  rationale: En español, «corazón» comunica de manera natural el centro interior de la persona y preserva el paralelismo idiomático con el hebreo, donde el «corazón» incluye pensamiento y emoción.
- source_word: עַל הַדָּבָר הַזֶּה
  english_pob_choice: over this matter
  chosen_spanish: por este asunto
  alternatives_spanish:
  - acerca de este asunto
  - por esta cosa
  - a causa de este asunto
  lexicon: HALOT
  rationale: «Asunto» es el equivalente natural de דָּבָר en este contexto de una situación cortesana y de inteligencia; «por» expresa bien la causa del trastorno en español.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus asistentes
  lexicon: HALOT
  rationale: «Siervos» mantiene el vínculo léxico con עֶבֶד y puede abarcar personal de corte. «Servidores» sería también posible, pero «siervos» refleja mejor el campo semántico del término sin volverlo excesivamente doméstico.
- source_word: הֲלוֹא תַּגִּידוּ לִי
  english_pob_choice: Will you not tell me
  chosen_spanish: ¿No me dirán...
  alternatives_spanish:
  - ¿No me dirán...
  - ¿Acaso no me dirán...
  - ¿No van a decirme...
  lexicon: HALOT
  rationale: La forma interrogativa retórica queda bien en «¿No me dirán...?» y transmite la urgencia del rey. Se evita una paráfrasis más explicativa para no suavizar la fuerza del hebreo.
- source_word: מִי מִשֶּׁלָּנוּ
  english_pob_choice: who among us
  chosen_spanish: quién de los nuestros
  alternatives_spanish:
  - quién entre nosotros
  - quién de los nuestros
  - quién es de los nuestros
  lexicon: HALOT
  rationale: «Quién de los nuestros» reproduce el sentido de insider dentro del grupo arameo y suena natural en español. Conserva la sospecha de traición interna que ya está en el inglés POB.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: is for the king of Israel
  chosen_spanish: está del lado del rey de Israel
  alternatives_spanish:
  - apoya al rey de Israel
  - está a favor del rey de Israel
  - es para el rey de Israel
  lexicon: HALOT
  rationale: El hebreo sugiere lealtad o colusión, no simplemente dirección física. «Está del lado de» expresa esa adhesión sospechada sin perder la ambigüedad del original; «es para» sonaría menos natural en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura auditada del inglés POB, pero ajusta el registro al español natural: «corazón» para לֵב, «por este asunto» para עַל הַדָּבָר הַזֶּה, y «está del lado de» para la sospecha de lealtad/collusión expresada al final. No se detectaron revisiones en el pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre geográfico/político, no «Siria», para seguir el hebreo y evitar un anacronismo interpretativo.
  - Se usa «siervos» en coherencia con la elección léxica del campo de עֶבֶד, aunque en un contexto real de corte podría entenderse también como funcionarios.
  - No se capitaliza «corazón» ni se introduce una lectura psicológica moderna que borre el antropologismo hebreo.
