translation:
  language: es
  text: 'Lo que es más pesado que tú[a], no lo lleves; y con alguien más rico que tú, no te asocies. ¿Qué puede unir a un tiesto con una vasija? Esta lo golpea, y se rompe. ¿O qué puede unirse: un rico con un pobre?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No levantes una carga más allá de ti, y no compartas con uno más fuerte y más rico que tú». El griego añade «más fuerte» además de «más rico».'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּבֵד מִמְּךָ / βάρος ὑπὲρ σὲ
  english_pob_choice: what is heavier than you
  chosen_spanish: Lo que es más pesado que tú
  alternatives_spanish:
  - una carga más pesada que tú
  - lo que te sobrepasa en peso
  lexicon: HALOT; Greek parallel βάρος ὑπὲρ σὲ
  rationale: El hebreo y el griego expresan una comparación de peso/carga superior a la capacidad del destinatario. En español, 'más pesado que tú' mantiene la imagen concreta sin forzar un calco extraño.
- source_word: מַה תִּשָּׂא / μὴ ἄρῃς
  english_pob_choice: do not carry
  chosen_spanish: no lo lleves
  alternatives_spanish:
  - no lo cargues
  - no lo alces
  lexicon: HALOT; Greek μὴ ἄρῃς
  rationale: La forma hebrea es retórica, pero funciona como prohibición; el griego lo hace explícito. 'No lo lleves' suena natural en español y conserva la idea de cargar algo que excede la propia fuerza.
- source_word: וְאֶל עָשִׁיר מִמְּךָ
  english_pob_choice: with one richer than you
  chosen_spanish: con uno más rico que tú
  alternatives_spanish:
  - con un rico más que tú
  - con alguien más rico que tú
  lexicon: HALOT
  rationale: Se conserva el comparativo social del hebreo. 'Uno más rico que tú' es fiel y fluido en español.
- source_word: מַה תִּתְחַבָּר / μὴ κοινώνει
  english_pob_choice: do not associate
  chosen_spanish: no te asocies
  alternatives_spanish:
  - no te juntes
  - no entres en comunión
  lexicon: HALOT; Greek μὴ κοινώνει
  rationale: El hitpael de חבר expresa unirse o asociarse. En español, 'no te asocies' preserva el sentido de vincularse o entrar en relación estrecha sin introducir lenguaje eclesiástico no motivado por el texto.
- source_word: כָּבֵד / βάρος
  english_pob_choice: heavier / burden
  chosen_spanish: más pesado
  alternatives_spanish:
  - más carga
  - más gravoso
  lexicon: HALOT; Louw-Nida (conceptual parallel)
  rationale: '''Pesado'' comunica la metáfora física del peso mejor que una abstracción como ''gravoso''. La decisión conserva la tensión entre peso literal y carga figurada.'
- source_word: ἰσχυροτέρῳ σου
  english_pob_choice: stronger than you
  chosen_spanish: más fuerte que tú
  alternatives_spanish:
  - más poderoso que tú
  - más robusto que tú
  lexicon: Greek Swete LXX 1909
  rationale: Aunque el hebreo conservado no lo dice, la tradición griega añade el rasgo de fortaleza además de riqueza. Como la cláusula principal sigue el hebreo, esta ampliación no se incorpora al cuerpo principal, pero se refleja en la nota textual.
theological_decisions:
- issue: Relación entre el hebreo conservado y la expansión griega
  english_pob_reading: Follow the Hebrew wording in the main text, while allowing the Greek to clarify the prohibitive force.
  chosen_spanish_reading: Seguir el hebreo en el texto principal y dejar que el griego solo aclare la fuerza prohibitiva.
  alternative_spanish_readings:
  - 'Incorporar la expansión griega: ''con uno más fuerte y más rico que tú'''
  - Traducir únicamente el sentido general sin distinguir la base hebrea de la griega
  rationale: En Sirácida, cuando el hebreo está disponible, el texto base debe gobernar la redacción principal. El griego sirve como control y añade una matización importante ('más fuerte') que no debe borrarse, pero tampoco imponerse sobre el hebreo en el cuerpo del versículo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como apoyo sin desplazar el testimonio extante.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente: conserva la pregunta retórica inicial como advertencia, mantiene la prohibición contra asociarse con uno más rico, y refleja las cláusulas posteriores sobre el tiesto, la vasija y el hombre rico frente al pobre. La nota textual recoge la ampliación griega de ''más fuerte''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda; este versículo no contiene el nombre divino.
  - '''Asociarse'' evita ''comunión'' para no introducir un matiz eclesial no pedido por el texto.'
  - '''Tiesto'' y ''vasija'' respetan la imagen concreta del paralelismo sapiencial.'
  - Se preserva la tensión textual entre el hebreo principal y la ampliación griega mediante nota a pie de página.
