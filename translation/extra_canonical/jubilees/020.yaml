translation:
  text: '1[a]. And in the forty-second jubilee, in the first year of the seventh week, Abraham called Ishmael and his twelve sons, and Isaac and his sons, and the six sons of Keturah and their children. And he commanded them to keep the way of the LORD, to do righteousness, and that each should love his brother, and that they should thus be among all people, each toward the other, to practice justice and righteousness on the earth.

    2. And that they should circumcise their sons according to the covenant that was established with them, and that they should not turn aside from this, neither to the right nor to the left from any path that the LORD commanded[b]; and that we should keep ourselves from all fornication and uncleanness, and that we should put away from among us every act of fornication and uncleanness. And if a woman belonging to you commits harlotry, or even a daughter, burn her with fire, and let them not commit fornication after their eyes and after their heart, and let them not take wives for themselves from the daughters of Canaan, for the seed of Canaan will be rooted out from the land. And he told them of the judgment of the Watchers,

    3. and the judgment of Sodom, how they were judged because of their wickedness, and because of fornication and uncleanness and corruption among themselves: by fornication they died. And you also, guard yourselves from all fornication and uncleanness and from every pollution of sin, so that you may not make your name a curse, and all your life a reproach, and all your sons perish by the sword, and you become accursed like Sodom, and all your remnant like the sons of Gomorrah. Listen to me, my children, and love

    4. the God of heaven, and cling to all his commandments, and do not walk after their idols and after their impurities. And do not make for yourselves molten gods or carved images, for they are emptiness, and there is no spirit in them; for they are the work of hands, and all who trust in them trust in nothing. Do not serve them, and do not bow down to them. But serve the God

    5. Most High, and bow down to him, and continually seek his face at all times, and do uprightness and righteousness before him, so that he may direct your way and give you mercy, and send down for you the rain of morning and evening, and bless all the work that you do on the earth, and bless your grain

    6. and your womb, and bless the seed of your body and the seed of your land, and the offspring of your cattle and the offspring of

    7. your flocks. And you will be for a blessing on the earth, and all the nations of the earth will desire you,

    8. and they will bless your children in my name, so that they may be blessed as I am. And he gave to Ishmael and to his sons and to the sons of Keturah gifts, and he sent them away from Isaac his son; but everything he gave

    9. to Isaac his son. And Ishmael and his sons and the sons of Keturah and their children went together and settled from Paran as far as the entrance of Babylon, in all the land that faces eastward toward

    10. the desert. And these mingled with those[c][b][b], and their name was called Arabs and Ishmaelites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is syntactically dense in Ge'ez. The sense appears to be that Abraham urged mutual love and a public life marked by justice and righteousness among all peoples.
    reason: segmentation_note
    anchor_ref: '20:1'
  - marker: b
    text: The phrase rendered 'circumcise their sons according to the covenant' is contextually inferred from the Abrahamic covenant formula; the wording is compressed in this witness.
    reason: lexical_alternative
    anchor_ref: '20:2'
  - marker: b
    text: The command about a woman or daughter who commits harlotry is severe and legal in tone; the Ge'ez is explicit about burning with fire.
    reason: cultural_note
    anchor_ref: '20:2'
  - marker: b
    text: '''The judgment of the Watchers'' refers to the punishment of the rebellious heavenly beings known from Enochic tradition.'
    reason: cross_reference
    anchor_ref: '20:2'
  - marker: c
    text: '''Rain of morning and evening'' may reflect the familiar agricultural blessing of timely rains, comparable to ''early and late rain.'''
    reason: lexical_alternative
    anchor_ref: '20:5'
lexical_decisions:
- source_word: ኢዮቤልዉ
  chosen: jubilee
  alternatives:
  - Jubilee period
  lexicon: Ge'ez/chronological usage in Jubilees
  rationale: Preserves Jubilees's technical chronological framework rather than generalizing to an era or generation.
- source_word: ሳብዕ
  chosen: week
  alternatives:
  - heptad
  - week of years
  lexicon: Jubilees chronological idiom
  rationale: Within Jubilees, the numbered 'week' inside a jubilee refers to a week of years. The main text keeps the familiar term 'week' while the chapter context preserves the calendrical sense.
- source_word: ፍኖተ እግዚአብሔር
  chosen: the way of the LORD
  alternatives:
  - the path of the LORD
  lexicon: Common Semitic metaphor
  rationale: Retains covenantal and ethical force with recognizable biblical diction.
- source_word: እምየማነ ወኢፀጋመ
  chosen: neither to the right nor to the left
  alternatives:
  - neither to the right nor from any path
  lexicon: Ge'ez directional idiom
  rationale: Accurately reflects the standard biblical idiom of not turning to the right or the left.
theological_decisions:
- issue: Covenant command in v.2 implies circumcision though the verb is not explicit in English tradition-free isolation
  chosen_reading: Rendered as 'they should circumcise their sons according to the covenant'
  alternative_readings:
  - they should bind their sons to the covenant
  - they should enroll their sons in the covenant
  rationale: In Abrahamic context, 'sons' plus 'covenant established with them' strongly points to circumcision as the covenantal act; leaving it vague would obscure the text's legal force.
  doctrine_reference: Translation philosophy §Original-language primacy over translation tradition; preserve plain sense in context.
- issue: Severity of sexual legislation in v.2
  chosen_reading: Kept the command 'burn her with fire' in the main text
  alternative_readings:
  - punish her by fire
  - destroy her
  rationale: The Ge'ez is explicit and the legal severity is theologically significant in Jubilees' holiness ethic; softening it would hide the text's stance.
