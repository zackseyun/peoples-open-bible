translation:
  language: es
  text: 'Y extendiendo la mano, lo tocó, diciendo: «Quiero; sé limpio». Y enseguida la lepra[a] desapareció de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más ampliamente, «una enfermedad de la piel»; el término griego λέπρα en el uso bíblico puede referirse a una gama de afecciones cutáneas graves, no solo a la lepra moderna.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκτείνας
  english_pob_choice: stretching out
  chosen_spanish: extendiendo
  alternatives_spanish:
  - estirando
  - extendida
  lexicon: BDAG
  rationale: El participio aoristo se vierte de modo natural con un gerundio que preserve la acción física previa al verbo principal. «Extendiendo» mantiene la imagen concreta sin sonar forzado en español.
- source_word: τὴν χεῖρα
  english_pob_choice: hand
  chosen_spanish: la mano
  alternatives_spanish:
  - la diestra
  - el brazo
  lexicon: BDAG
  rationale: Χείρ en este contexto corporal concreto se traduce con el equivalente directo «mano»; así se conserva la sencillez del gesto de Jesús.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: lo tocó
  alternatives_spanish:
  - puso la mano sobre él
  - lo asió
  lexicon: BDAG
  rationale: El verbo medio de ἅπτω en este giro significa «tocar». En español, «lo tocó» reproduce la acción inmediata y la cercanía física señalada por el texto.
- source_word: εἰπών
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introductorio de discurso se mantiene con «diciendo» para reflejar el flujo participial del griego y a la vez sonar natural en español.
- source_word: Θέλω
  english_pob_choice: I am willing
  chosen_spanish: Quiero
  alternatives_spanish:
  - Estoy dispuesto
  - Quiero hacerlo
  lexicon: BDAG
  rationale: Aquí θέλω expresa voluntad/disposición. En español, «Quiero» es breve, directo y apto para el habla de Jesús; «estoy dispuesto» explicita la disposición pero alarga innecesariamente la frase.
- source_word: καθαρίσθητι
  english_pob_choice: be cleansed
  chosen_spanish: sé limpiado
  alternatives_spanish:
  - sé purificado
  - quedá limpio
  lexicon: BDAG
  rationale: Se conserva el sentido de limpieza/cleansing, no solo curación médica. «Sé limpiado» refleja la dimensión ritual y social de la impureza en la escena, aunque suene menos idiomático que «sé limpio»; se prefiere por fidelidad semántica al mandato pasivo de καθαρίζω.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» es claro, idiomático y conserva la inmediatez de εὐθέως sin un tono excesivamente técnico.
- source_word: ἡ λέπρα
  english_pob_choice: leprosy
  chosen_spanish: la lepra
  alternatives_spanish:
  - una enfermedad de la piel
  - una afección cutánea
  lexicon: BDAG
  rationale: Se mantiene el término tradicional «lepra» como equivalente reconocible en los relatos evangélicos, dejando la amplitud semántica del término griego para una nota.
- source_word: ἀπῆλθεν ἀπ’ αὐτοῦ
  english_pob_choice: left him
  chosen_spanish: se apartó de él
  alternatives_spanish:
  - se fue de él
  - salió de él
  lexicon: BDAG
  rationale: La idea idiomática es la desaparición/remoción de la lepra. «Se apartó de él» comunica bien el alejamiento del mal sin sugerir un movimiento literal demasiado rígido en español.
theological_decisions:
- issue: καθαρίσθητι en un contexto de sanación de un leproso
  english_pob_reading: be cleansed
  chosen_spanish_reading: sé limpiado
  alternative_spanish_readings:
  - sé curado
  - sé sanado
  rationale: La orden no solo apunta a sanidad física, sino también a purificación ritual y restauración a la comunidad. «Sé limpiado» preserva esa tensión teológica; «sé curado/sanado» la reduciría a lo médico.
  doctrine_reference: La traducción debe mantener la dimensión de pureza/impureza ritual en los evangelios, sin eliminar el matiz de restauración social.
- issue: λέπρα y su alcance semántico
  english_pob_reading: leprosy with footnote for broader skin disease
  chosen_spanish_reading: lepra con nota de posible afección cutánea más amplia
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  rationale: «Lepra» conserva la tradición textual y la legibilidad bíblica; la nota deja constancia de que el término griego puede abarcar varias afecciones serias de la piel, no solo la lepra moderna.
  doctrine_reference: Respeto al término heredado del relato evangélico sin ocultar la incertidumbre léxica del griego bíblico.
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego y el audit trail inglés; no se detectaron revisiones posteriores que alteren la lectura básica del versículo. La redacción española intenta conservar el orden de acciones, la fuerza del mandato y la nota semántica sobre λέπρα sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - «Lepra» se mantiene por coherencia con la tradición evangélica y con la decisión auditada en inglés.
  - Se preserva la distinción entre curación física y limpieza ritual mediante «sé limpiado».
  - 'La puntuación de discurso directo sigue normas españolas: dos puntos antes de la cita y comillas angulares no se usaron para mantener sobriedad editorial consistente con el registro del proyecto.'
