theological_decisions:
- issue: Whether to specify the speaker as 'a man' or 'the rich young man' in this verse
  chosen_reading: one
  alternative_readings:
  - a man
  - a rich young man
  rationale: This verse alone uses εἷς ('one'). Although the broader pericope identifies the figure more fully through parallels and later context, this verse should not import those details prematurely.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
- issue: Force of the question about action and eternal life
  chosen_reading: what good thing must I do so that I may have eternal life?
  alternative_readings:
  - what good deed shall I do to obtain eternal life?
  - what good thing should I do that I may have eternal life?
  rationale: The wording preserves the man's action-oriented question without importing a doctrinal resolution about works, merit, or salvation beyond what the Greek explicitly states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
