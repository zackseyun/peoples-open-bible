review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura principal de finalidad y en el matiz administrativo de ἐπισκέψωνται como ‘inspeccionen’. Sin embargo, omite un elemento importante del sentido fuente y del audit trail inglés: la cláusula relativa implícita ‘que está en tu mano’, apoyada por el paralelo hebreo. Además, ‘κατὰ τὴν Ἰουδαίαν καὶ κατὰ Ἰερουσαλήμ’ queda aceptablemente representado, aunque ‘inspeccionen Judea y Jerusalén’ suena algo directo en español; puede mantenerse por cercanía al POB inglés.'
  spanish_quality_summary: El español es claro y digno, pero la nota b actual no preserva la razón léxica/documental del inglés y termina sustituyendo contenido textual por explicación. También conviene ajustar ‘Judea’ a ‘Judea’/‘Jerusalén’ sin problema; la frase completa mejora al incluir ‘que está en tu mano’, que en español es inteligible y bíblicamente natural.
  glossary_alignment: Hay desalineación con la preferencia del proyecto para יהוה/YHWH -> ‘Yahvé’ cuando el contexto lo justifica. Aquí el griego tiene Κυρίου y el audit trail inglés escogió ‘the Lord’; no es necesario forzar ‘Yahvé’ en esta línea. ‘Señor’ es defendible. El problema principal no es terminológico sino la omisión de la cláusula ‘en tu mano’.
  issues:
  - severity: high
    issue: Omisión de ‘que está en tu mano’
    rationale: El inglés POB y la evidencia paralela hebrea explicitan que la ley del Señor es la que está ‘en tu mano’, con sentido de posesión/encargo. El borrador la elimina por completo, reduciendo el contenido semántico del original auditado.
  - severity: medium
    issue: Nota b no corresponde al contenido preservado por el POB inglés
    rationale: La nota inglesa explica el modismo ‘in your hand’; la nota española actual habla solo de ‘la ley del Señor’ y del estándar normativo, por lo que pierde la justificación documentada y no compensa la omisión textual.
  - severity: low
    issue: Ligera rigidez en ‘inspeccionen Judea y Jerusalén’
    rationale: Es comprensible y bastante fiel, pero en español también sería natural ‘inspeccionen Judea y Jerusalén’ o ‘inspeccionen lo relativo a Judea y Jerusalén’. No requiere cambio forzoso si se conserva la formulación compacta del POB.
  revised_spanish_text: para que inspeccionen[a] Judea y Jerusalén, conforme a la ley del Señor que está en tu mano[b].
  revised_footnotes:
  - marker: a
    text: O ‘supervisen’ o ‘indaguen sobre’. El verbo griego puede denotar inspección, supervisión o investigación oficial.
    reason: lexical_alternative
  - marker: b
    text: La expresión ‘en tu mano’ está respaldada por el paralelo hebreo en Esdras 7 y probablemente significa ‘encomendada a ti’ o ‘en tu posesión’.
    reason: cross_reference
  revision_rationale: Se restituye la cláusula ‘que está en tu mano’, omitida en el borrador pese a estar documentada en el audit trail inglés y apoyada por el paralelo hebreo. Se ajustan las notas para reflejar las alternativas léxicas y la explicación intertextual preservadas por el POB. Se mantiene ‘el Señor’ porque aquí el griego usa Κυρίου y no exige forzar ‘Yahvé’ en el texto principal.
