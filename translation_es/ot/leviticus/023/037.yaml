  to: 'Estos son los tiempos señalados de Yahvé, que ustedes proclamarán como convocaciones santas, para presentar una ofrenda hecha por fuego[a] a Yahvé: un holocausto y una ofrenda de grano, un sacrificio y libaciones, lo correspondiente a cada día en su día[b].'
  rationale: Se corrigió el anclaje de la nota [a] para que recaiga sobre el término que traduce אִשֶּׁה, se reemplazó 'ofrenda encendida' por 'ofrenda hecha por fuego' para mayor fidelidad al hebreo y al rastro de auditoría inglés, y se afinó la cláusula final para expresar mejor el sentido prescriptivo de דְּבַר יוֹם בְּיוֹמוֹ en español natural.
