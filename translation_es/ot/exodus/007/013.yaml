    text: O 'el corazón de Faraón se puso duro'. El verbo hebreo puede traducirse más literalmente como 'se volvió fuerte/firme', aquí en el sentido de endurecimiento.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor: se sustituye ''no les hizo caso'' por ''no los escuchó'' para reflejar con más fidelidad שׁמע אליהם y mantener un registro más digno y menos coloquial. También se corrige la ortografía y se pule la nota al pie sin cambiar su contenido esencial.'
