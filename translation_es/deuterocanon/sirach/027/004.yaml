translation:
  language: es
  text: Cuando se agita una criba, quedan los desechos[a]; así se revela la inmundicia de una persona en sus pensamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estiércol» o «basura» para «desechos»; el término griego puede denotar desecho o excremento, y el proverbio usa el material grosero que queda al cribar como imagen de lo que el razonamiento interior de una persona pone al descubierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν σείσματι
  english_pob_choice: When a sieve is shaken
  chosen_spanish: Cuando se agita una criba
  alternatives_spanish:
  - En el agitar de una criba
  - Al sacudir una criba
  lexicon: LSJ
  rationale: El griego presenta una imagen proverbial de sacudir una criba; en español, una estructura temporal natural con «cuando» comunica el valor general del proverbio sin perder la escena.
- source_word: κοσκίνου
  english_pob_choice: a sieve
  chosen_spanish: una criba
  alternatives_spanish:
  - un tamiz
  - un cedazo
  lexicon: LSJ
  rationale: «Criba» es claro, idiomático y conserva la imagen de separación por sacudida. «Tamiz» o «cedazo» son posibles, pero «criba» suena más proverbial y directo en español.
- source_word: διαμενεῖ
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - queda
  - se queda
  lexicon: LSJ
  rationale: El verbo indica que algo se queda o persiste tras el movimiento. «Permanece» mantiene la concisión y la relación con lo que queda al cribar.
- source_word: κοπρία
  english_pob_choice: the refuse
  chosen_spanish: el estiércol
  alternatives_spanish:
  - la basura
  - los desechos
  - la inmundicia
  lexicon: LSJ
  rationale: En el primer hemistiquio el término puede referirse a desecho grosero, incluso excremento. «Estiércol» preserva la fuerza material y áspera del original, aunque en español también suene rudo; la nota aclara la amplitud del campo semántico.
- source_word: σκύβαλα
  english_pob_choice: filth
  chosen_spanish: las inmundicias
  alternatives_spanish:
  - la basura
  - los desechos
  - la suciedad
  lexicon: LSJ
  rationale: «σκύβαλα» denota residuo vil o excremento. En la aplicación a la persona, «las inmundicias» conserva la aspereza moral sin volverla demasiado técnica o agrícola.
- source_word: ἀνθρώπου
  english_pob_choice: a person's
  chosen_spanish: de una persona
  alternatives_spanish:
  - de un hombre
  - de alguien
  lexicon: LSJ
  rationale: Aunque el griego usa un singular masculino genérico, en español «de una persona» comunica mejor el valor proverbial general y evita una posible lectura restrictiva por género, en línea con el ajuste del audit trail inglés.
- source_word: ἐν λογισμῷ αὐτοῦ
  english_pob_choice: in his thoughts
  chosen_spanish: en sus pensamientos
  alternatives_spanish:
  - en su razonamiento
  - en su pensamiento
  - en sus razonamientos
  lexicon: LSJ
  rationale: «λογισμός» puede ser pensamiento, razonamiento o deliberación. «Pensamientos» es natural en español y refleja bien que el interior de la persona queda expuesto por lo que piensa o razona.
theological_decisions:
- issue: Imagen proverbial de impureza material aplicada al interior humano
  english_pob_reading: so a person's filth is revealed in his thoughts
  chosen_spanish_reading: así se revelan las inmundicias de una persona en sus pensamientos
  alternative_spanish_readings:
  - así queda al descubierto la suciedad de una persona en sus pensamientos
  - así se ve la inmundicia de una persona en sus pensamientos
  rationale: La frase conserva el paralelismo entre lo que queda en la criba y lo que sale a la luz en la interioridad humana. «Se revelan» mantiene la idea de manifestación sin suavizar la aspereza del símil.
  doctrine_reference: Sabiduría proverbial / antropología moral en Sirácida
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete (ἐν σείσματι κοσκίνου... σκύβαλα ἀνθρώπου ἐν λογισμῷ αὐτοῦ) y toma el inglés POB como control auditado, especialmente en la decisión de mantener el valor de residuo/impureza y de expresar λογισμός como el interior pensante. Se adoptó una formulación española natural que preserva la aspereza del proverbio.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable aquí, pues el versículo no contiene el tetragrama ni κύριος.
  - Se evitó «Cristo»/«Mesías» por no ser pertinentes al pasaje.
  - Se mantuvo un registro proverbial y sobrio, sin suavizar el léxico de desecho.
  - «Persona» se eligió como genérico natural en español, reflejando la decisión inglesa de no dejar una lectura exclusivamente masculina en la forma final.
