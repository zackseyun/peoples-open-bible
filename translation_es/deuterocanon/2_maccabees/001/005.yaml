translation:
  language: es
  text: y que escuche[a] sus súplicas, y se reconcilie[b] con ustedes, y no los abandone en tiempo de mal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haga caso a sus súplicas».
    reason: lexical_alternative
  - marker: b
    text: O «vuelva a ser favorable hacia ustedes» o «sea aplacado hacia ustedes».
    reason: alternative_reading
  - marker: c
    text: O «en un tiempo de angustia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπακούσαι
  english_pob_choice: may he hear
  chosen_spanish: que escuche
  alternatives_spanish:
  - que oiga
  - que atienda
  - que haga caso
  lexicon: LSJ
  rationale: En este contexto de oración dirigida a Dios, ὑπακούω expresa una respuesta atenta a las peticiones. «Escuche» conserva la idea de oír con atención y suena natural en español contemporáneo, sin forzar «responder».
- source_word: τῶν δεήσεων
  english_pob_choice: prayers
  chosen_spanish: súplicas
  alternatives_spanish:
  - oraciones
  - peticiones
  - ruegos
  lexicon: LSJ
  rationale: δέησις implica ruego urgente o súplica. «Súplicas» mantiene mejor esa intensidad que el más general «oraciones», aunque ambas son posibles en español.
- source_word: καταλλαγείη
  english_pob_choice: be reconciled
  chosen_spanish: se reconcilie
  alternatives_spanish:
  - vuelva a ser favorable
  - sea aplacado
  - se muestre favorable de nuevo
  lexicon: LSJ
  rationale: El verbo apunta a restauración de relación o favor. «Se reconcilie» preserva esa tensión relacional sin reducirla a mera emoción ni imponer un trasfondo técnico que el griego no explicita.
- source_word: ἐγκαταλίποι
  english_pob_choice: abandon
  chosen_spanish: abandone
  alternatives_spanish:
  - desampare
  - deje
  - forsake
  lexicon: LSJ
  rationale: ἐγκαταλείπω significa abandonar o forsake. «Abandone» es claro y fiel en español moderno; «desampare» sería más tradicional pero menos directo.
- source_word: ἐν καιρῷ πονηρῷ
  english_pob_choice: in an evil time
  chosen_spanish: en un tiempo malo
  alternatives_spanish:
  - en un tiempo malo/aflictivo
  - en un tiempo de mal
  - en un tiempo de angustia
  lexicon: LSJ
  rationale: El griego califica el tiempo como πονηρός, con sentido de malo, adverso o inicuo. «Tiempo malo» mantiene la cercanía formal y el matiz adverso; «tiempo de angustia» sería más interpretativo.
theological_decisions:
- issue: Cómo traducir καταλλαγείη sin borrar la tensión entre reconciliación y favor restaurado
  english_pob_reading: be reconciled to you
  chosen_spanish_reading: se reconcilie con ustedes
  alternative_spanish_readings:
  - vuelva a ser favorable con ustedes
  - sea aplacado hacia ustedes
  rationale: La forma griega admite la idea de restablecimiento de relación/favor. «Se reconcilie con ustedes» conserva esa amplitud y evita especificar el mecanismo o convertirlo en mera apaciguación emocional.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisiones sustantivas; se mantuvo la secuencia optativa y la ambigüedad teológica de καταλλαγείη, ajustando solo el español para naturalidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda a יהוה; aquí no aparece, así que no aplica.
  - Se evitó «Señor» como máscara donde el texto no lo exige.
  - Se eligió «súplicas» para conservar el valor intensivo de δέησις.
  - Se mantuvo «tiempo malo» para reflejar πονηρῷ sin reinterpretarlo excesivamente.
