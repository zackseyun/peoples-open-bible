translation:
  text: A slip is better from the ground than from the tongue[a]; so the downfall of the wicked will come in haste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fall of evils will come quickly'; the Greek κακῶν can be read abstractly ('evils') or personally ('the wicked').
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀλίσθημα
  chosen: a slip
  alternatives:
  - a stumbling
  - a fall
  - a misstep
  lexicon: LSJ
  rationale: The noun denotes a slipping or stumble. 'A slip' is concise and preserves the proverb-like contrast with speech. 'Misstep' could suggest moral error rather than a literal slip from the ground.
- source_word: ἀπὸ ἐδάφους
  chosen: from the ground
  alternatives:
  - on the ground
  - from the earth
  lexicon: LSJ
  rationale: The phrase naturally refers to a slip occasioned by the ground/footing. 'From the ground' keeps the Greek preposition and the concrete image.
- source_word: μᾶλλον ἢ ἀπὸ γλώσσης
  chosen: is better ... than from the tongue
  alternatives:
  - rather than from the tongue
  - than one from the tongue
  lexicon: LSJ
  rationale: The comparison is elliptical in Greek. Supplying 'is better' makes the proverb intelligible in English while preserving the contrast between a physical slip and a verbal one.
- source_word: γλώσσης
  chosen: the tongue
  alternatives:
  - speech
  - the mouth
  lexicon: LSJ
  rationale: '''Tongue'' preserves the concrete metaphor for speech used in wisdom literature. ''Speech'' would flatten the imagery.'
- source_word: πτῶσις
  chosen: the downfall
  alternatives:
  - the fall
  - ruin
  lexicon: LSJ
  rationale: In the second clause the noun points to collapse or ruin. 'Downfall' fits the moral-proverbial context better than the more neutral 'fall'.
- source_word: κακῶν
  chosen: of the wicked
  alternatives:
  - of evils
  - of evil men
  - of bad people
  lexicon: LSJ
  rationale: Although the form could be read abstractly ('evils'), in this context with 'πτῶσις' it most naturally refers to wicked persons. 'The wicked' gives idiomatic English and matches wisdom-style moral categorization.
- source_word: κατὰ σπουδήν
  chosen: in haste
  alternatives:
  - quickly
  - with urgency
  - suddenly
  lexicon: LSJ
  rationale: The phrase conveys speed or haste. 'In haste' is a natural adverbial rendering and preserves the sense that the downfall comes swiftly.
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  - will happen
  lexicon: LSJ
  rationale: A straightforward future of coming. 'Will come' is idiomatic with 'downfall' in English.
