translation:
  language: es
  text: 'La gente le dijo según esta palabra[a], diciendo: «Así se hará al hombre que lo derribe[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «según esta palabra». El hebreo conserva la referencia a la misma formulación del asunto; la versión española la mantiene de manera más directa que una paráfrasis como «lo mismo».
    reason: lexical_alternative
  - marker: b
    text: O «que lo mate». El verbo hebreo puede significar golpear, abatir o matar; en este contexto bélico puede implicar un golpe fatal, pero el texto principal conserva una formulación más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ הָעָם
  english_pob_choice: The people told him
  chosen_spanish: La gente le respondió
  alternatives_spanish:
  - El pueblo le dijo
  - La gente le dijo
  lexicon: HALOT
  rationale: הָעָם aquí puede funcionar como un colectivo presente en la escena; en español, «la gente» mantiene naturalidad y evita forzar un sentido nacional demasiado amplio. «Respondió» refleja que la frase reporta la contestación del pueblo a lo que él preguntaba o decía, sin apartarse del valor comunicativo de אמר.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: according to this word
  chosen_spanish: según esta palabra
  alternatives_spanish:
  - conforme a esta palabra
  - de acuerdo con esta palabra
  lexicon: HALOT
  rationale: El hebreo usa una expresión adverbial que remite a la misma formulación del asunto. «Según esta palabra» conserva el sustantivo «palabra» y la relación preposicional, más cercana al ajuste revisado del inglés POB que una paráfrasis idiomática como «lo mismo».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - a saber
  lexicon: HALOT
  rationale: Introducción estándar de discurso directo; «diciendo» mantiene el enlace sintáctico sin añadir contenido.
- source_word: כֹּה יֵעָשֶׂה
  english_pob_choice: Thus it will be done
  chosen_spanish: Así se hará
  alternatives_spanish:
  - De esta manera se hará
  - Así será hecho
  lexicon: HALOT
  rationale: La pasiva impersonal hebrea expresa lo que acontecerá en premio al vencedor. «Así se hará» conserva el valor impersonal/pasivo en un español natural y digno.
- source_word: לָאִישׁ
  english_pob_choice: for the man
  chosen_spanish: con el hombre
  alternatives_spanish:
  - para el hombre
  - al hombre
  lexicon: HALOT
  rationale: El hebreo marca al destinatario/beneficiario del premio. En español, «con el hombre» evita ambigüedad y se integra con la construcción pasiva en contexto, aunque «para el hombre» también es posible.
- source_word: אֲשֶׁר יַכֶּנּוּ
  english_pob_choice: who strikes him down
  chosen_spanish: que lo hiera de muerte
  alternatives_spanish:
  - que lo golpee
  - que lo derribe
  lexicon: HALOT
  rationale: נכה puede significar golpear, abatir o matar según el contexto. Aquí el combate con Goliat presupone un golpe fatal; «hiera de muerte» preserva la fuerza marcial y explicita el resultado probable sin limitar el verbo a un mero golpe físico.
translation_notes:
  revision_awareness: El borrador sigue la revisión del inglés POB que pasó de una paráfrasis más libre a «according to this word» / «Thus it will be done», por lo que la versión española conserva la referencia a «palabra» y una pasiva impersonal. También mantiene la tensión léxica de נכה, sin reducirla sin más a «matar».
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de una forma de ocultamiento del nombre divino, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el texto.
  - Se prefiere un registro bíblico contemporáneo, claro y sobrio, sin arcaísmos innecesarios.
