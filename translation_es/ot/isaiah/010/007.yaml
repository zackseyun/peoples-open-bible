translation:
  language: es
  text: Pero él no piensa así[a], y su corazón no piensa así; porque su corazón está puesto en destruir, y en eliminar a no pocas[b] naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no intenta así»; el verbo hebreo puede expresar concebir o proponerse algo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «no pocas», litotes que significa una gran cantidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַמֶּה
  english_pob_choice: think
  chosen_spanish: piensa
  alternatives_spanish:
  - intenta
  - imagina
  lexicon: HALOT
  rationale: El piel de דמה aquí expresa lo que el rey asirio supone o concibe. «Piensa» es natural en español y conserva el valor cognitivo sin volverlo más interpretativo de lo que permite el hebreo.
- source_word: לְבָבוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: לבב designa el centro interior del pensamiento y la voluntad. «Corazón» preserva el modismo antropológico hebreo y funciona bien junto con «considera» para reflejar el matiz mental.
- source_word: יַחְשֹׁב
  english_pob_choice: reckon
  chosen_spanish: lo considera
  alternatives_spanish:
  - lo piensa
  - lo calcula
  - lo evalúa
  lexicon: HALOT
  rationale: חשב puede significar pensar, calcular o considerar. Como el primer verbo ya se traduce con «piensa», «lo considera» mantiene la paralelismo y evita repetir exactamente la misma idea sin perder el matiz de evaluación interior.
- source_word: לְהַשְׁמִיד
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - devastar
  lexicon: HALOT
  rationale: El causativo de שׁמד indica causar destrucción. «Destruir» es claro y fiel; no intensifica indebidamente hasta «aniquilar».
- source_word: בִּלְבָבוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su mente
  - dentro de sí
  lexicon: HALOT
  rationale: Repetir «en su corazón» conserva el énfasis hebreo en la intención interna y el propósito asentado.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: cortar de raíz
  alternatives_spanish:
  - cortar
  - eliminar
  - exterminar
  lexicon: HALOT
  rationale: כרת significa cortar o remover. En español, «cortar de raíz» comunica bien la fuerza destructiva del pasaje sin convertir el verbo en una paráfrasis más fuerte de lo que exige el texto.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este contexto político, גויים refiere a entidades nacionales. «Naciones» es la opción más idiomática y precisa en español.
- source_word: לֹא מְעָט
  english_pob_choice: not a few
  chosen_spanish: no pocas
  alternatives_spanish:
  - muchas
  - no un pequeño número de
  lexicon: HALOT
  rationale: 'El hebreo usa litotes: literalmente «no pocas». «No pocas» conserva la figura retórica y evita nivelarla a «muchas».'
- source_word: וְהוּא
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Sin embargo, él
  lexicon: HALOT
  rationale: El valor adversativo del contexto hace que «Pero» exprese mejor el contraste entre la intención humana del invasor y la perspectiva divina del pasaje.
theological_decisions:
- issue: Contraste entre el propósito divino y la intención del rey asirio
  english_pob_reading: Render the verse to preserve the contrast between God's purpose and the king of Assyria's own destructive intent without adding explanatory theology.
  chosen_spanish_reading: La traducción conserva el contraste entre el propósito divino del contexto y la intención destructiva del rey asirio, sin explicar más de lo que el versículo dice.
  alternative_spanish_readings:
  - Una versión más interpretativa que diga explícitamente que no entiende el propósito de Dios
  rationale: El versículo presenta la tensión entre lo que Dios está haciendo en el contexto y lo que el asirio piensa/intenta por su cuenta. Mantener esa tensión evita resolverla con una explicación teológica añadida.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador mantiene alta concordancia con el control cruzado y conserva las notas léxicas sobre יְדַמֶּה, יַחְשֹׁב y לֹא מְעָט.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לְבָב/בְּלְבָבוֹ, en línea con el uso del POB inglés y con el idiomatismo hebreo.
  - Se preserva la litotes «no pocas» en vez de normalizarla a «muchas», para no perder la figura retórica.
  - «Pero» al inicio refleja el valor adversativo del contexto inmediato.
  - «Cortar de raíz» busca equivaler funcionalmente a «cut off» sin añadir un matiz doctrinal distinto.
