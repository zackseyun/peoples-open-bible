  yaml_path: translation/ot/judges/021/014.yaml
  text: So Benjamin returned at that time[a], and they gave them the women whom they had kept alive from the women of Jabesh-gilead; but they did not find enough for them that way.
  footnotes:
  - marker: a
    text: Or, more literally, 'but they did not find so for them.' The Hebrew expression is elliptical, meaning that there were not enough women for them by this means.
    reason: lexical_alternative
