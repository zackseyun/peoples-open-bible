translation:
  language: es
  text: 'Él le dijo: «Mira, hay en esta ciudad un hombre de Dios, y el hombre es estimado; todo lo que él dice ciertamente sucede. Ahora vayamos allá; quizás nos diga el camino[a] por el que hemos andado»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «nuestro camino sobre el cual hemos ido». La frase probablemente se refiere al curso que debían tomar desde este punto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira, ahora
  alternatives_spanish:
  - Mira
  - Mira, pues
  - Mira ahora
  lexicon: HALOT
  rationale: La combinación hebrea llama la atención e introduce una exhortación suave; «Mira, ahora» conserva ese impulso discursivo en un español natural y digno, sin caer en un calco arcaizante.
- source_word: אִישׁ אֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - un varón de Dios
  - un hombre piadoso
  lexicon: HALOT
  rationale: Se conserva el valor de título o designación religiosa, no una simple descripción moral. «Hombre de Dios» es el equivalente más transparente y ampliamente inteligible en español.
- source_word: נִכְבָּד
  english_pob_choice: held in honor
  chosen_spanish: es estimado
  alternatives_spanish:
  - es honrado
  - es respetado
  - goza de honor
  lexicon: HALOT
  rationale: El hebreo expresa un estado pasivo de consideración social. «Es estimado» transmite bien esa cualidad sin perder el matiz de prestigio público.
- source_word: כֹּל אֲשֶׁר יְדַבֵּר בּוֹא יָבֹא
  english_pob_choice: all that he says surely comes to pass
  chosen_spanish: todo lo que él diga, ciertamente sucederá
  alternatives_spanish:
  - todo lo que él diga, seguramente se cumplirá
  - cuanto diga, sin duda acontecerá
  lexicon: HALOT
  rationale: Se conserva la fuerza enfática del hebreo con una construcción natural en español. «Sucederá» mantiene el sentido de realización efectiva sin forzar una expresión demasiado literal.
- source_word: עַתָּה נֵלֲכָה שָׁם
  english_pob_choice: Now let us go there
  chosen_spanish: Ahora vamos allá
  alternatives_spanish:
  - Ahora vayamos allá
  - Vamos ahora allá
  lexicon: HALOT
  rationale: La cohortativa plural se expresa de manera directa e idiomática. «Vamos allá» mantiene el movimiento narrativo y la inmediatez de la invitación.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: quizás
  alternatives_spanish:
  - tal vez
  - quizá
  lexicon: HALOT
  rationale: Se elige una partícula de incertidumbre sobria y natural en español. «Quizás» preserva el tono de esperanza no asegurada del hebreo.
- source_word: יַגִּיד לָנוּ
  english_pob_choice: he will tell us
  chosen_spanish: nos indique
  alternatives_spanish:
  - nos diga
  - nos haga saber
  lexicon: HALOT
  rationale: El verbo hebreo puede significar hacer saber o comunicar. Aquí «nos indique» encaja bien con el contexto de pedir dirección, sin perder el sentido de comunicación reveladora.
- source_word: אֶת דַּרְכֵּנוּ אֲשֶׁר הָלַכְנוּ עָלֶיהָ
  english_pob_choice: the way on which we have gone
  chosen_spanish: el camino por donde hemos andado
  alternatives_spanish:
  - el camino por el que hemos ido
  - la senda por la que hemos caminado
  lexicon: HALOT
  rationale: Se mantiene el referente literal del hebreo («nuestro camino» / el camino recorrido), pero en español resulta más natural decir «por donde hemos andado». Así se conserva la base textual sin perder claridad idiomática.
theological_decisions:
- issue: Título «hombre de Dios» como designación profética
  english_pob_reading: man of God
  chosen_spanish_reading: hombre de Dios
  alternative_spanish_readings:
  - varón de Dios
  - hombre piadoso
  rationale: Se conserva el rótulo bíblico tradicional y su función narrativa como designación de una figura reconocida de autoridad religiosa. No se reduce a una cualidad moral general.
  doctrine_reference: 'Translation philosophy: original-language primacy; evitar sustituir títulos bíblicos por paráfrasis devocionales.'
- issue: Fuerza de certeza en «todo lo que él diga ciertamente sucederá»
  english_pob_reading: all that he says surely comes to pass
  chosen_spanish_reading: todo lo que él diga, ciertamente sucederá
  alternative_spanish_readings:
  - todo lo que él diga, seguramente se cumplirá
  - cuanto diga, sin duda acontecerá
  rationale: Se conserva la afirmación de confiabilidad atribuida al hombre de Dios, sin convertirla en una generalidad vaga. El adverbio «ciertamente» refleja la intensificación del hebreo.
  doctrine_reference: Faithful rendering of Hebrew emphatic construction; no doctrinal expansion beyond the narrative claim.
translation_notes:
  revision_awareness: La versión inglesa revisó la clausula final desde una paráfrasis de dirección («the way we should go») hacia una más literal («the way on which we have gone»). En español se reflejó esa revisión manteniendo la imagen del camino recorrido, pero ajustándola a un giro natural («el camino por donde hemos andado»). También se conservó el valor intensivo de «all that he says surely comes to pass» sin simplificarlo a una mera posibilidad.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים según el estándar del proyecto.
  - Se evitó «Señor» o sustituciones litúrgicas no presentes en el hebreo.
  - «Mira, ahora» reproduce la función deíctica de הִנֵּה + נָא con registro contemporáneo.
  - La última cláusula preserva el campo semántico de «camino» para mantener la relación con la formulación hebrea.
