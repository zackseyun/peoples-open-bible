review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mandato en 2ms, dos disposiciones, seis por disposición, sobre la mesa pura, delante de Yahvé. Sin embargo, el texto español introduce una duplicación verbal no sustentada por la fuente (''Y pondrás ... las dispondrás'') y las notas al pie están intercambiadas respecto de sus anclajes.'
  spanish_quality_summary: 'La frase actual es poco natural y gramaticalmente defectuosa por la secuencia ''Y pondrás[a] las dispondrás''. Con una reparación mínima queda clara, digna y natural: ''Y las pondrás en dos filas[a], seis en cada fila, sobre la mesa pura[b] delante de Yahvé.'''
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יְהוָה y 'pura' para הַטָּהֹר en sentido cultual. 'Filas' es una buena elección principal para מַעֲרָכוֹת. No hay conflictos con la terminología del proyecto; el problema es de redacción y de colocación de notas.
  issues:
  - severity: high
    issue: Duplicación verbal no fiel ni natural en 'Y pondrás[a] las dispondrás'
    rationale: El hebreo tiene un solo verbo finito וְשַׂמְתָּ ('y pondrás/colocarás'). La redacción española mezcla dos verbos y produce una construcción incorrecta.
  - severity: medium
    issue: Las notas al pie están asociadas a los lugares equivocados
    rationale: La nota [a] habla de alternativas para וְשַׂמְתָּ, pero el lugar donde debe preservarse la alternativa significativa según el POB es 'dos filas / dos arreglos / dos montones'. La nota [b] actual habla de alternativas para מַעֲרָכוֹת, pero está anclada en 'cada fila'. Además, falta la nota sobre 'mesa pura / mesa limpia' preservada por el POB inglés.
  - severity: low
    issue: Objeto directo mal realizado frente a la decisión léxica documentada
    rationale: Las decisiones léxicas dicen que אוֹתָם se expresa con 'los', pero el borrador no lo realiza correctamente. En español natural aquí conviene 'las' porque el referente implícito es 'las tortas/los panes' según el contexto inmediato; al menos debe aparecer un objeto directo coherente.
  revised_spanish_text: Y las pondrás en dos filas[a], seis en cada fila, sobre la mesa pura[b] delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: O «en dos arreglos» o «en dos montones». El término hebreo se refiere a una disposición ordenada de los panes.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la mesa pura»; «la mesa limpia» es otra posible traducción, con sentido ritual más que de mera limpieza física.
    reason: lexical_alternative
  revision_rationale: 'Se elimina la duplicación verbal para reflejar el único verbo hebreo y producir un español correcto. Se reubican y corrigen las notas para que correspondan a los términos significativos preservados por el POB inglés: la disposición de los panes y el valor cultual de ''pura''.'
