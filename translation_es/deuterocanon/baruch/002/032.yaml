translation:
  language: es
  text: y me alabarán en la tierra de su exilio[a], y recordarán mi nombre[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de su deportación». El griego puede referirse a la remoción y asentamiento fuera de la patria; aquí «exilio» encaja mejor con el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Mi nombre» conserva el modismo bíblico para la identidad revelada y el honor de Dios; compárese el uso pactual de «nombre» en otras Escrituras.
    reason: cross_reference
lexical_decisions:
- source_word: αἰνέσουσίν
  english_pob_choice: they will praise
  chosen_spanish: me alabarán
  alternatives_spanish:
  - me elogiarán
  - me ensalzarán
  - me darán alabanza
  lexicon: LSJ / uso bíblico griego
  rationale: El futuro de αἰνέω expresa alabanza verbal a Dios. En español, «alabar» comunica de forma natural y digna ese acto de adoración, sin perder el valor cultual del verbo.
- source_word: ἐν γῇ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: BDAG
  rationale: «Tierra» reproduce bien la imagen locativa y resulta más bíblica y clara en español que una paráfrasis como «país». Mantiene además la ambigüedad contextual entre territorio y ámbito de vida.
- source_word: ἀποικισμοῦ
  english_pob_choice: of their exile
  chosen_spanish: de su exilio
  alternatives_spanish:
  - de su deportación
  - de su destierro
  lexicon: LSJ
  rationale: El contexto de dispersión y juicio favorece «exilio» como equivalente natural y fiel. «Deportación» es posible, pero en español suena más técnico y menos abarcador; «destierro» es cercano pero menos neutro en registro.
- source_word: μνησθήσονται
  english_pob_choice: they will remember
  chosen_spanish: recordarán
  alternatives_spanish:
  - se acordarán de
  - tendrán presente
  lexicon: BDAG
  rationale: El verbo medio futuro de μιμνῄσκομαι se expresa de forma simple con «recordarán». En español, el objeto directo implícito («mi nombre») permite una formulación natural sin añadir material interpretativo.
- source_word: τοῦ ὀνόματός μου
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - el nombre de mí
  - mi reputación
  lexicon: BDAG
  rationale: Se conserva el modismo bíblico «mi nombre», que en el contexto de pacto remite a la identidad revelada y al honor de Dios. No se sustituye por una glosa como «mi reputación» para no debilitar la fuerza teológica del giro.
theological_decisions:
- issue: Sentido de «mi nombre» en un contexto de pacto
  english_pob_reading: Retain the idiom 'my name' literally
  chosen_spanish_reading: Mantener «mi nombre» literalmente
  alternative_spanish_readings:
  - mi reputación
  - quién soy
  rationale: El texto usa un modismo bíblico estable que carga identidad, presencia y honor divinos. La traducción literal conserva esa resonancia sin reducirla a una explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de ἀποικισμός en un contexto de castigo y restauración
  english_pob_reading: Render as 'exile'
  chosen_spanish_reading: Traducir con «exilio»
  alternative_spanish_readings:
  - deportación
  - dispersión
  rationale: «Exilio» comunica bien la condición de pueblo apartado de su tierra dentro del marco de juicio y futura restauración. No se elige «deportación» porque estrecha demasiado el matiz y suena administrativo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'Coincide con la lectura final auditada: no se registran revisiones posteriores ni cambios pendientes; la línea griega y la decisión inglesa permanecen estables.'
