translation:
  language: es
  text: 'Y sucedió que todo el que lo vio dijo: «No ha habido ni se ha visto cosa semejante desde el día en que los hijos de Israel[a] subieron de la tierra de Egipto hasta hoy. Considérenlo[b], tomen consejo y hablen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Lit. «Pongan sobre ustedes acerca de ello»; el hebreo usa un giro idiomático para exhortar a reflexionar sobre el hecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ...
  chosen_spanish: Y sucedió que ...
  alternatives_spanish:
  - Y fue que ...
  - Y ocurrió que ...
  lexicon: HALOT
  rationale: La fórmula narrativa introduce la reacción resultante; en español, “Y sucedió que” preserva el arranque discursivo sin sonar mecánico ni arcaizante.
- source_word: כָל הָרֹאֶה
  english_pob_choice: everyone who saw it
  chosen_spanish: todo el que lo vio
  alternatives_spanish:
  - todos los que lo vieron
  - todo observador
  lexicon: HALOT
  rationale: El participio sustantivado con כָל expresa una clase universal de observadores. “Todo el que lo vio” conserva ese alcance general en español natural.
- source_word: וְאָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - diría
  - solía decir
  lexicon: HALOT
  rationale: En secuencia narrativa, el perfecto hebreo se vierte de forma directa con el pretérito simple en español.
- source_word: לֹא נִהְיְתָה וְלֹא נִרְאֲתָה כָּזֹאת
  english_pob_choice: Nothing like this has happened or been seen
  chosen_spanish: No ha habido ni se ha visto cosa semejante
  alternatives_spanish:
  - Nunca ha habido ni se ha visto algo así
  - No ha ocurrido ni se ha visto cosa semejante
  lexicon: HALOT
  rationale: 'Se conservan los dos verbos hebreos con un paralelismo idiomático en español: existir/ocurrir y ser visto. “Cosa semejante” mantiene el valor enfático de כָּזֹאת sin sobreexplicar.'
- source_word: לְמִיּוֹם עֲלוֹת בְּנֵי יִשְׂרָאֵל מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the day the sons of Israel came up from the land of Egypt
  chosen_spanish: desde el día en que los hijos de Israel subieron de la tierra de Egipto
  alternatives_spanish:
  - desde el día en que los israelitas subieron de la tierra de Egipto
  - desde el día en que los hijos de Israel salieron de la tierra de Egipto
  lexicon: HALOT
  rationale: “Subieron” reproduce el verbo de ascenso del éxodo. “Hijos de Israel” conserva la forma hebrea, y “de la tierra de Egipto” mantiene la preposición del origen con fidelidad al texto.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: “Hasta hoy” es la equivalencia temporal más natural y clara en español, manteniendo el mismo punto de referencia narrativo que el hebreo.
- source_word: שִׂימוּ לָכֶם עָלֶיהָ
  english_pob_choice: Consider it
  chosen_spanish: Pónganselo a consideración
  alternatives_spanish:
  - Pónganlo en su corazón
  - Considérenlo
  lexicon: HALOT
  rationale: La idiomática hebrea de “poner sobre uno” se vuelve en español con una exhortación equivalente al acto de evaluar el hecho. “Pónganselo a consideración” conserva el plural imperativo y la idea de reflexionar sobre ello.
- source_word: עֻצוּ
  english_pob_choice: take counsel
  chosen_spanish: tomen consejo
  alternatives_spanish:
  - deliberen
  - consulten
  lexicon: HALOT
  rationale: El imperativo llama a deliberación colectiva. “Tomen consejo” mantiene la fuerza formal y comunitaria del verbo.
- source_word: וְדַבֵּרוּ
  english_pob_choice: and speak
  chosen_spanish: y hablen
  alternatives_spanish:
  - y digan algo
  - y hablen al respecto
  lexicon: HALOT
  rationale: La orden final es breve y abierta; “hablen” conserva la tersura imperativa del hebreo sin añadir contenido no explicitado.
theological_decisions:
- issue: Render of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva la forma masculina y genealógica del hebreo, alineada con la decisión auditada de la POB inglesa de mantener “sons of Israel” por fidelidad gramatical y etnónima.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas en la base inglesa; el español sigue la misma lectura sin introducir tensiones nuevas, conservando el paralelismo intensivo de los dos verbos negativos y el imperativo final de deliberación.
  spanish_consistency_notes:
  - Se mantuvo “hijos de Israel” para reproducir la forma masculina del etnónimo hebreo y su paralelismo con la tradición auditada.
  - Se evitó “SEÑOR” u otras sustituciones teológicas no pertinentes; el verso no contiene el nombre divino explícito.
  - “Hasta hoy” se eligió por naturalidad idiomática, sin perder el valor de anclaje temporal narrativo.
  - La secuencia verbal en español sigue el flujo narrativo del hebreo sin convertirlo en paráfrasis interpretativa.
