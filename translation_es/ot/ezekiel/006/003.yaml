  text: וְ/אָ֣מַרְתָּ֔ הָרֵי֙ יִשְׂרָאֵ֔ל שִׁמְע֖וּ דְּבַר אֲדֹנָ֣/י יְהוִ֑ה כֹּה אָמַ֣ר אֲדֹנָ֣/י יְ֠הוִה לֶ/הָרִ֨ים וְ/לַ/גְּבָע֜וֹת לָ/אֲפִיקִ֣ים ו/ל/גאית הִנְ/נִ֨י אֲנִ֜י מֵבִ֤יא עֲלֵי/כֶם֙ חֶ֔רֶב וְ/אִבַּדְתִּ֖י בָּמֽוֹתֵי/כֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/006/003.yaml
  text: 'and say[a], ‘Mountains of Israel, hear the word of the Lord GOD. Thus says the Lord GOD to the mountains and to the hills, to the ravines and to the valleys: Behold, I myself am bringing a sword upon you[b], and I will destroy your high places.’'
  footnotes:
