translation:
  language: es
  text: Un corazón tranquilo[a] es vida para el cuerpo, pero los celos[b] son podredumbre para los huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un corazón sanador es vida para el cuerpo». El término hebreo se relaciona más literalmente con «sanidad» o «salud» que con «tranquilidad».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «envidia». El término hebreo puede denotar celos, envidia o celo, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיֵּי
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida de
  - vivencia
  lexicon: HALOT
  rationale: El constructo hebreo funciona aquí de modo predicativo e idiomático. «Vida» reproduce el sentido natural del proverbio en español sin añadir una paráfrasis ajena al texto.
- source_word: בְשָׂרִים
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - la carne
  - la carne humana
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «fleshes/carnes», en este contexto sapiencial se refiere al organismo físico en su conjunto. «Cuerpo» comunica mejor esa referencia idiomática en español contemporáneo.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: «Corazón» conserva la metáfora antropológica bíblica y es la equivalencia más natural en español para el centro interior de la persona.
- source_word: מַרְפֵּא
  english_pob_choice: tranquil
  chosen_spanish: tranquilo
  alternatives_spanish:
  - sanador
  - sano
  - apacible
  - de salud
  lexicon: HALOT
  rationale: La raíz apunta a sanidad, salud o remedio; en este proverbio describe un corazón con efecto vivificante. «Tranquilo» expresa bien ese estado en español, y la alternativa más literal queda documentada en la nota.
- source_word: וּ/רְקַב
  english_pob_choice: but ... is rottenness
  chosen_spanish: pero ... son carcoma
  alternatives_spanish:
  - pero ... es podredumbre
  - y ... es descomposición
  - pero ... es rottedumbre
  lexicon: HALOT
  rationale: La conjunción es adversativa por el contraste del proverbio. Para רֶקֶב, «carcoma» conserva una imagen concreta de deterioro interno en español; «podredumbre» o «descomposición» son alternativas más literales pero menos vivas.
- source_word: עֲצָמֹת
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - los huesos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. En la poesía sapiencial, «huesos» puede aludir al armazón físico y a la vitalidad profunda.
- source_word: קִנְאָה
  english_pob_choice: jealousy
  chosen_spanish: los celos
  alternatives_spanish:
  - la envidia
  - el celo
  lexicon: HALOT
  rationale: El término hebreo admite «celos», «envidia» o «celo» según el contexto. Aquí el paralelismo negativo favorece una pasión resentida o posesiva; «celos» es una opción amplia y natural en español, mientras que «envidia» queda preservada como alternativa lexical en la nota.
theological_decisions:
- issue: Valor antropológico de «corazón / cuerpo / huesos»
  english_pob_reading: The proverb uses concrete bodily imagery to describe inner disposition and physical vitality, without forcing later doctrinal categories onto the terms.
  chosen_spanish_reading: El proverbio mantiene la imaginería corporal concreta para hablar de la disposición interior y de la vitalidad física, sin sustituirla por categorías doctrinales posteriores.
  alternative_spanish_readings:
  - Alegorizar los términos como si fueran sólo símbolos morales.
  - Reemplazar «corazón» por «mente» o «huesos» por «ánimo».
  rationale: La poesía sapiencial conserva imágenes corporales reales y debe leerse en su propio marco. La traducción evita reducirlas a un lenguaje abstracto que borre la fuerza del proverbio.
  doctrine_reference: Antropología bíblica sapiencial; lectura contextual de la poesía hebrea.
- issue: Sentido de קִנְאָה como pasión negativa
  english_pob_reading: The Hebrew word can denote jealousy, envy, or zeal depending on context; here the negative parallel favors jealousy/envy.
  chosen_spanish_reading: Aquí se entiende como una pasión negativa de celos o envidia, no como celo piadoso.
  alternative_spanish_readings:
  - «celo» en sentido positivo.
  - «pasión» de forma vaga y no específica.
  rationale: El paralelismo con «carcoma/podredumbre» indica un efecto destructivo. Por eso se descarta el valor positivo de «celo» y se preserva la ambigüedad controlada entre celos y envidia.
  doctrine_reference: Proverbios 14:30; uso contextual de קִנְאָה en el hebreo bíblico.
translation_notes:
  revision_awareness: 'El contexto inglés revisado permanece estable: no hubo cambios en el pasaje ni en las decisiones auditadas, y la versión española sigue de cerca las opciones léxicas documentadas, manteniendo la tensión entre el sentido más literal («sanidad/salud», «envidia») y la expresión natural en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo «corazón» como término antropológico bíblico, consistente con el estilo sapiencial.
  - Se eligió «cuerpo» para evitar una lectura teológica ajena asociada a «carne» en español.
  - Se conservó la imaginería de «huesos» sin suavizarla, conforme al hebreo y al estilo proverbial.
  - Los marcadores de nota aparecen anclados en el texto exactamente donde corresponden.
