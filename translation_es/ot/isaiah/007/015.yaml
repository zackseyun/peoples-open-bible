translation:
  language: es
  text: Comerá cuajada y miel[a][b] para cuando ya sepa rechazar el mal y escoger el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando sepa rechazar el mal y escoger el bien». La expresión hebrea puede señalar el tiempo para el cual esto ya aplica.'
    reason: alternative_reading
  - marker: b
    text: «Cuajada» también puede entenderse como «mantequilla» o «crema», en referencia amplia a un producto lácteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶמְאָה
  english_pob_choice: curds
  chosen_spanish: cuajada
  alternatives_spanish:
  - mantequilla
  - crema
  lexicon: HALOT
  rationale: El término hebreo designa un producto lácteo, probablemente leche cuajada más que mantequilla moderna. En español, «cuajada» comunica bien esa idea sin arrastrar la imagen de mantequilla industrializada.
- source_word: וּדְבַשׁ
  english_pob_choice: and honey
  chosen_spanish: y miel
  alternatives_spanish:
  - y miel silvestre
  lexicon: HALOT
  rationale: «Miel» es la equivalencia normal y clara para דבש. No hay base suficiente aquí para restringirla a una variedad específica.
- source_word: יֹאכֵל
  english_pob_choice: he will eat
  chosen_spanish: Comerá
  alternatives_spanish:
  - estará comiendo
  - va a comer
  lexicon: HALOT
  rationale: El yiqtol expresa futuro en este anuncio profético; «comerá» preserva esa fuerza sin sobrecargarla.
- source_word: לְדַעְתּוֹ
  english_pob_choice: by the time he knows
  chosen_spanish: hasta que sepa
  alternatives_spanish:
  - cuando sepa
  - al saber
  lexicon: HALOT
  rationale: La construcción temporal se rinde naturalmente con «hasta que sepa», que en español marca el límite temporal de la acción sin convertirla en propósito. Mantiene la tensión temporal del hebreo.
- source_word: מָאוֹס
  english_pob_choice: to refuse
  chosen_spanish: rechazar
  alternatives_spanish:
  - repudiar
  - despreciar
  lexicon: HALOT
  rationale: En el contraste moral con «escoger», el verbo expresa una decisión práctica. «Rechazar» evita el matiz demasiado afectivo de «despreciar».
- source_word: בָּרָע
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - lo maligno
  lexicon: HALOT
  rationale: El artículo hebreo aporta especificidad general; «el mal» conserva el contraste moral y la forma definida del original.
- source_word: וּבָחוֹר
  english_pob_choice: and choose
  chosen_spanish: y escoger
  alternatives_spanish:
  - y elegir
  - y seleccionar
  lexicon: HALOT
  rationale: «Escoger» es el correlato natural de «rechazar» en español y conserva el paralelismo moral del texto.
- source_word: בַּטּוֹב
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bueno
  lexicon: HALOT
  rationale: «El bien» reproduce la polaridad ética del hebreo mejor que una expresión meramente cualitativa como «lo bueno».
theological_decisions:
- issue: Sentido temporal de לְדַעְתּוֹ y relación con la alimentación del niño
  english_pob_reading: Rendered temporally as 'by the time he knows to refuse the evil and choose the good.'
  chosen_spanish_reading: «hasta que sepa rechazar el mal y escoger el bien»
  alternative_spanish_readings:
  - «cuando sepa rechazar el mal y escoger el bien»
  - «para que sepa rechazar el mal y escoger el bien»
  - «al tiempo que sepa rechazar el mal y escoger el bien»
  rationale: 'La frase puede leerse temporalmente y no debe convertirse en finalidad causal. «Hasta que» expresa bien el punto límite temporal y conserva la tensión del signo profético: la dieta y la madurez moral aparecen juntas sin que una se reduzca a causa directa de la otra.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió un valor temporal más preciso para לְדַעְתּוֹ ('by the time'). En español se resolvió con «hasta que sepa», que conserva el límite temporal y suena natural sin perder la ambigüedad controlada del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «el mal / el bien» para reflejar el contraste definido del hebreo, en línea con la decisión inglesa de conservar la definitud.
  - Se evitó «Cristo», «SEÑOR» y otras sustituciones no pertinentes; este versículo no contiene nombres divinos ni terminología mesiánica.
  - «Cuajada» se eligió por su valor semántico amplio; si el contexto litúrgico prefiriera una variante más tradicional, la nota explica la alternativa sin alterar el texto principal.
