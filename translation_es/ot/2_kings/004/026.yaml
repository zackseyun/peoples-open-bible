translation:
  language: es
  text: 'Ahora, por favor, corre a su encuentro y dile: «¿Estás bien[a]? ¿Está bien tu esposo? ¿Está bien el niño[b]?». Y ella respondió: «Está bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo shalom, repetido cuatro veces en este versículo, puede denotar paz, plenitud o bienestar. Aquí se refiere al bienestar: «¿Está bien…?» / «Está bien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Está bien el muchacho?». El hebreo yeled puede significar «niño» o «muchacho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - Pues ahora
  lexicon: HALOT
  rationale: Adverbio temporal que introduce la instrucción urgente; «Ahora» es natural, directo y conserva la inmediatez sin añadir matiz innecesario.
- source_word: רֽוּץ נָא
  english_pob_choice: please run
  chosen_spanish: corre, por favor
  alternatives_spanish:
  - ve corriendo
  - corre ahora, por favor
  lexicon: HALOT
  rationale: El imperativo transmite la urgencia, y «por favor» refleja el valor atenuante/político de נָא. El orden «corre, por favor» suena natural en español y mantiene la fuerza exhortativa.
- source_word: לִקְרָאתָהּ
  english_pob_choice: to meet her
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - a encontrarte con ella
  - para salir a su encuentro
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «a su encuentro» reproduce bien la idea de ir al encuentro de una persona sin calco duro.
- source_word: וֶאֱמָר לָהּ
  english_pob_choice: and say to her
  chosen_spanish: y dile
  alternatives_spanish:
  - y dile a ella
  - y háblale
  lexicon: HALOT
  rationale: «Decir a alguien» en español suele expresarse de forma más natural con «decirle»; se mantiene el destinatario explícito sin perder cercanía al verbo מקור.
- source_word: הֲשָׁלוֹם לָךְ
  english_pob_choice: Is it well with you?
  chosen_spanish: ¿Está bien contigo?
  alternatives_spanish:
  - ¿Estás bien?
  - ¿Hay paz para ti?
  lexicon: HALOT
  rationale: Se conserva el valor de bienestar de שָׁלוֹם que el POB inglés documenta. «¿Está bien contigo?» preserva la estructura relacional y evita reducirlo solo a salud física.
- source_word: הֲשָׁלוֹם לְאִישֵׁךְ
  english_pob_choice: Is it well with your husband?
  chosen_spanish: ¿Está bien con tu esposo?
  alternatives_spanish:
  - ¿Está bien tu esposo?
  - ¿Tu esposo está bien?
  lexicon: HALOT
  rationale: «אִישׁ» aquí es «esposo» en el contexto de una mujer casada; se conserva el patrón repetido de bienestar con «¿Está bien con...?» y se evita una formulación menos paralela.
- source_word: הֲשָׁלוֹם לַיָּלֶד
  english_pob_choice: Is it well with the child?
  chosen_spanish: ¿Está bien con el niño?
  alternatives_spanish:
  - ¿Está bien el niño?
  - ¿Está bien con el hijo?
  lexicon: HALOT
  rationale: יַלֶד puede significar «niño/niño(a), hijo(a), muchacho». Aquí el contexto narrativo ya identifica al hijo de la mujer, y «niño» es la opción más natural y neutral en español; no se fuerza «hijo» porque el hebreo no lo dice explícitamente en esta forma.
- source_word: וַתֹּאמֶר שָׁלוֹם
  english_pob_choice: And she said, ‘It is well.’
  chosen_spanish: 'Y ella respondió: «Está bien».'
  alternatives_spanish:
  - 'Y ella dijo: «Todo está bien».'
  - 'Y ella respondió: «Paz».'
  lexicon: HALOT
  rationale: שָׁלוֹם aquí funciona como respuesta breve de bienestar, no solo como «paz» en sentido abstracto. «Está bien» comunica el sentido idiomático y mantiene la sobriedad del original.
theological_decisions:
- issue: Valor de שָׁלוֹם en una serie de preguntas de bienestar
  english_pob_reading: The repeated shalom denotes peace, wholeness, or well-being; here it refers to welfare.
  chosen_spanish_reading: «Está bien / ¿Está bien con…?» como fórmula de bienestar
  alternative_spanish_readings:
  - «¿Hay paz…?»
  - «¿Todo está en paz…?»
  - «¿Estás bien…?»
  rationale: La secuencia hebrea repite שָׁלוֹם cuatro veces para preguntar por el estado general de la mujer, su esposo y el niño. En español, «está bien» comunica bienestar general sin restringirlo a ausencia de conflicto ni introducir una teología técnica ajena al contexto.
  doctrine_reference: Lexical semantics of שָׁלוֹם in narrative Hebrew; no doctrinal issue beyond semantic range.
translation_notes:
  revision_awareness: No hay cambios aplicados en la última revisión inglesa; el texto inglés final y la evaluación cruzada de alta concordancia respaldan una traducción estable. La versión española busca conservar esa estabilidad, mientras adapta la repetición de שָׁלוֹם a una fórmula natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el estándar del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se preservó la repetición estructural de las tres preguntas para reflejar el patrón hebreo.
  - Se evitó traducir שָׁלוֹם simplemente como «paz» para no perder el matiz de bienestar contextual.
  - Se usó «esposo» para אִישׁ por el contexto relacional y narrativo.
  - Se eligió «niño» para יָּלֶד por naturalidad en español y porque el contexto ya identifica al hijo.
