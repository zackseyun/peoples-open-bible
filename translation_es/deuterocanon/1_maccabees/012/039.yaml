translation:
  language: es
  text: Y Trifón buscó reinar sobre Asia[a], ponerse la corona y echar mano de Antíoco, el rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «Asia» no designa el continente moderno, sino el ámbito político helenístico en juego.
    reason: cultural_note
  - marker: b
    text: O «atacar a Antíoco, el rey»; literalmente, «extender las manos contra Antíoco, el rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτησεν
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - intentó
  - aspiró a
  lexicon: BDAG
  rationale: El aoristo de ζητέω expresa aquí una intención u objetivo político; «buscó» transmite bien esa finalidad sin añadir una idea de éxito que el griego no dice.
- source_word: βασιλεῦσαι
  english_pob_choice: to rule
  chosen_spanish: reinar
  alternatives_spanish:
  - gobernar
  - llegar a ser rey
  lexicon: LSJ
  rationale: El infinitivo de βασιλεύω puede significar reinar o ejercer el poder real. «Reinar» conserva el matiz monárquico y se ajusta al paralelo inmediato de «ponerse la corona».
- source_word: τῆς Ἀσίας
  english_pob_choice: Asia
  chosen_spanish: Asia
  alternatives_spanish:
  - la provincia de Asia
  - el Asia helenística
  lexicon: LSJ
  rationale: Se conserva «Asia» como transliteración, porque el texto se refiere al reino/ámbito helenístico y no al continente moderno. La nota aclara la referencia histórica sin sobrecargar el texto principal.
- source_word: περιθέσθαι τὸ διάδημα
  english_pob_choice: to put on the crown
  chosen_spanish: ponerse la corona
  alternatives_spanish:
  - ponerse el diadema
  - ceñirse la diadema real
  lexicon: LSJ
  rationale: διάδημα es la insignia real. En español, «corona» comunica de manera natural la asunción de la realeza; «diadema» sería más literal pero menos idiomático en este contexto.
- source_word: ἐκτεῖναι χεῖρας ἐπ’ Ἀντίοχον
  english_pob_choice: to lay hands on Antiochus
  chosen_spanish: extender las manos contra Antíoco
  alternatives_spanish:
  - alzar la mano contra Antíoco
  - atacar a Antíoco
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literaliza una acción hostil. «Extender las manos contra» conserva la imagen verbal del griego y deja abierta la forma exacta de la agresión, como hace el original.
- source_word: τὸν βασιλέα
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: Se mantiene el título apposicional para identificar a Antíoco como rey; «el rey» es la forma más directa y natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado del texto griego y el audit trail inglés: ambición de reinar, gesto de asumir la insignia real y acción hostil contra Antíoco. Se prefirió una solución española natural sin perder la imaginería del original ni introducir explicaciones interpretativas en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene «Antíoco» como forma española estándar del nombre propio.
  - Se usa «Asia» con nota cultural para evitar confundir el término con la geografía moderna.
  - «Corona» se eligió como equivalente idiomático de la diadema real, dejando la alternativa más literal en nota.
  - 'El orden verbal refleja la serie del griego: buscar → reinar → ponerse la corona → extender las manos contra.'
