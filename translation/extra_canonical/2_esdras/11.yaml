lexical_decisions:
- source_word: aquila
  chosen: eagle
  alternatives:
  - great eagle
  lexicon: Lewis & Short
  rationale: The standard sense is 'eagle.' No modifier is present in the Latin, and the apocalyptic symbolism carries without expansion.
- source_word: ascendebat de mari
  chosen: was coming up from the sea
  alternatives:
  - was rising from the sea
  - ascended from the sea
  lexicon: Lewis & Short
  rationale: '''Coming up from the sea'' preserves the visionary emergence motif and reads naturally in English apocalyptic style.'
- source_word: duodecim alae pennarum
  chosen: twelve feathered wings
  alternatives:
  - twelve wings of feathers
  lexicon: Lewis & Short
  rationale: The phrase is somewhat pleonastic in Latin; 'feathered wings' preserves the wording without awkwardness.
- source_word: contrariae pennae
  chosen: opposing wings
  alternatives:
  - counter-wings
  - secondary wings
  lexicon: Lewis & Short
  rationale: '''Contrariae'' suggests wings set over against or in succession to the main ones. ''Opposing wings'' keeps the formal strangeness of the vision and avoids over-interpreting the symbol.'
- source_word: pennaculis minutis et modicis
  chosen: little pinions, small and slight
  alternatives:
  - small winglets
  - tiny feathers
  lexicon: Lewis & Short
  rationale: '''Pennacula'' are diminutive wing-structures; ''pinions'' fits avian imagery better than ''feathers,'' and the paired adjectives are retained for emphasis.'
- source_word: quiescentia / quiescebat
  chosen: at rest
  alternatives:
  - quiet
  - still
  - inactive
  lexicon: Lewis & Short
  rationale: '''At rest'' preserves the temporary inactivity of the heads without implying sleep until verse 28 explicitly says one ''awoke.'''
- source_word: subiecti erant ei omnia sub caelo
  chosen: everything under heaven was subjected to it
  alternatives:
  - all things under heaven were subject to it
  lexicon: Lewis & Short
  rationale: This keeps the passive force of imperial domination and the cosmic scope of the vision.
- source_word: surrexit aquila super ungues suos
  chosen: the eagle rose up on its claws
  alternatives:
  - stood up on its talons
  lexicon: Lewis & Short
  rationale: '''Claws'' is a direct rendering of ''ungues.'' ''Talons'' is possible, but ''claws'' better matches the later repeated condemnation of its ''ungues tui pessimi.'''
- source_word: uigilare ... dormite ... per tempus uigilate
  chosen: keep watch ... sleep ... keep watch in turn
  alternatives:
  - be awake ... sleep ... be awake for a time
  lexicon: Lewis & Short
  rationale: The command concerns succession in rule; 'keep watch in turn' captures the temporal distribution implied by 'per tempus.'
- source_word: de medietate corporis eius
  chosen: from the midst of its body
  alternatives:
  - from the middle of its body
  lexicon: Lewis & Short
  rationale: A slightly more elevated phrase suits the apocalyptic register while remaining literal.
- source_word: tenuit tempus tuum
  chosen: hold your length of time
  alternatives:
  - reign as long as you did
  - hold your time
  lexicon: Lewis & Short
  rationale: The Latin speaks specifically of duration, not merely office. The phrase is slightly formal to preserve that emphasis.
- source_word: principatum tenere / gerere
  chosen: hold rule / held rule
  alternatives:
  - exercise dominion
  - hold the principate
  lexicon: Lewis & Short
  rationale: '''Rule'' is accessible modern English while preserving the political sense of dominion.'
- source_word: subalares
  chosen: under-wings
  alternatives:
  - sub-wings
  - lesser wings
  lexicon: Lewis & Short
  rationale: The Latin is a technical-sounding formation; 'under-wings' preserves the image and the hierarchy within the eagle.
- source_word: conplexa est duo capita secum
  chosen: drew the two heads to itself
  alternatives:
  - gathered the two heads with itself
  - embraced the two heads with itself
  lexicon: Lewis & Short
  rationale: The literal 'embraced' sounds misleading in context; the sense is that the middle head gathered the others into its action.
- source_word: cum labore multo
  chosen: with much oppression
  alternatives:
  - with much toil
  - with great hardship
  lexicon: Lewis & Short
  rationale: Though 'labor' can mean toil, in this imperial context it points to burdensome rule imposed on subjects; 'oppression' makes the political force clear.
- source_word: potentatum tenuit orbis terrarum
  chosen: it had dominion over the inhabited world
  alternatives:
  - it held power over the world
  - it held sovereignty over the earth
  lexicon: Lewis & Short
  rationale: This preserves the imperial scope of 'orbis terrarum' and the noun of power in a natural English phrase.
- source_word: sicut leo suscitatus de silua mugiens
  chosen: like a lion roused from the forest, roaring
  alternatives:
  - awakened from the forest
  - bellowing
  lexicon: Lewis & Short
  rationale: '''Roused'' fits the sudden emergence; ''roaring'' is the natural English sound for a lion, even though Latin ''mugire'' is broader.'
- source_word: uocem hominis
  chosen: a human voice
  alternatives:
  - the voice of a man
  lexicon: Lewis & Short
  rationale: The phrase contrasts the lion's roar with articulate speech; 'human voice' is idiomatic and preserves the contrast.
- source_word: Altissimus
  chosen: the Most High
  alternatives: []
  lexicon: Lewis & Short
  rationale: Project policy requires 'Altissimus' to be rendered 'the Most High,' preserving the title's theological weight.
- source_word: fortem
  chosen: the Mighty One
  alternatives:
  - the Strong One
  lexicon: Lewis & Short
  rationale: The title is parallel to 'the Most High' and should remain titular rather than flattened into an adjective.
- source_word: mansuetos ... quiescentes
  chosen: the meek ... the peaceable
  alternatives:
  - the gentle ... the quiet
  lexicon: Lewis & Short
  rationale: These terms describe the vulnerable and non-threatening victims of imperial violence; 'peaceable' avoids implying mere passivity.
- source_word: uerum dicentes
  chosen: those who speak truth
  alternatives:
  - truth-tellers
  lexicon: Lewis & Short
  rationale: A transparent rendering preserves the verbal force and prophetic tone.
- source_word: qui fructificabant
  chosen: those who bore fruit
  alternatives:
  - those who were fruitful
  - those who prospered
  lexicon: Lewis & Short
  rationale: The image may be metaphorical for productive communities; 'bore fruit' preserves the metaphor rather than reducing it to prosperity.
- source_word: contumelia
  chosen: insolence
  alternatives:
  - outrage
  - arrogance
  lexicon: Lewis & Short
  rationale: The term denotes abusive arrogance directed upward; 'insolence' fits the prophetic accusation.
- source_word: non apparens non appareas
  chosen: disappear, so that you may not appear again
  alternatives:
  - as you vanish, vanish utterly
  - be unseen and never be seen again
  lexicon: Lewis & Short
  rationale: The doubled form is emphatic. This rendering preserves the repetition without becoming unintelligible.
- source_word: pennacula tua pessima
  chosen: your wicked little pinions
  alternatives:
  - your evil winglets
  lexicon: Lewis & Short
  rationale: The diminutive should remain visible in English because the vision distinguishes these from the main wings.
- source_word: capita tua maligna
  chosen: your evil heads
  alternatives:
  - your wicked heads
  lexicon: Lewis & Short
  rationale: '''Maligna'' is rendered ''evil'' here to preserve the moral charge of the oracle.'
- source_word: omne corpus tuum uanum
  chosen: all your worthless body
  alternatives:
  - your whole empty body
  - all your vain body
  lexicon: Lewis & Short
  rationale: '''Vain'' in older English can mislead; ''worthless'' conveys the judgment pronounced on the empire''s totality.'
- source_word: refrigeret ... releuetur
  chosen: may have rest and be relieved
  alternatives:
  - may be refreshed and eased
  lexicon: Lewis & Short
  rationale: The paired verbs express release after oppression; this rendering keeps both relief and repose.
theological_decisions:
- issue: Identity and register of the lion figure
  chosen_reading: Rendered straightforwardly as a lion speaking with a human voice, without importing later messianic interpretation into the main text.
  alternative_readings:
  - Explicitly identify the lion as the Messiah in the main text
  - Translate more symbolically as a lion-like figure
  rationale: In this chapter the text presents the figure phenomenologically within Ezra's vision. The interpretation belongs to the following chapter, so the main text should preserve narrative suspense and apocalyptic sequence.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Verse 40 corrupt or awkward clauses
  chosen_reading: Translated the Latin as a denunciation of the fourth beast's oppressive dominion, smoothing only enough for intelligible English while preserving the sense of textual roughness.
  alternative_readings:
  - Emend more aggressively toward a reconstructed Greek/Semitic sense
  - Translate hyper-literally and leave the English obscure
  rationale: The Latin in vv. 40-41 shows signs of textual difficulty (including the transmitted verbs around conquest and inhabiting the world). Since no daughter-language readings are transcribed here, the draft keeps close to the Latin's apparent meaning and flags the issue in a footnote rather than silently reconstructing.
- issue: Political force of 'cum labore multo' and related oppression language
  chosen_reading: Rendered in terms of oppression rather than mere toil.
  alternative_readings:
  - with much labor
  - with great hardship
  rationale: The oracle condemns imperial violence against the earth's inhabitants. In context, the burden falls on the ruled, not the ruler's exertion; therefore the English should make the oppressive force visible.
