  yaml_path: translation/deuterocanon/3_maccabees/004/011.yaml
  text: When they had been brought down to the place called Schedia[a], and the voyage had been completed, as had been decreed by the king, he ordered them to encamp in the hippodrome before the city, an open area very well suited for making an example of them, lying in full view of all who were traveling into the city and of those being sent out from there into the country on a journey[b], so that they might neither associate with his forces nor at all be considered worthy of an enclosure.
  footnotes:
