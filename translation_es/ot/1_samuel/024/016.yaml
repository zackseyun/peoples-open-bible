translation:
  language: es
  text: Que Yahvé sea juez y juzgue[a] entre mí y ti, y vea y defienda mi causa[c], y me vindique de tu mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé será juez y juzgará entre mí y ti; verá y contenderá por mi causa»'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «de tu mano», un modismo para quedar librado del poder o control de alguien.'
    reason: cultural_note
  - marker: c
    text: 'O: «litigue por mi causa» o «contienda por mi causa». La expresión hebrea usa lenguaje de litigio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito del hebreo, siguiendo el criterio del proyecto de no ocultar el Tetragrama. "Yahvé" es la forma establecida en el estándar español del POB y resulta natural y reverente en español.
- source_word: וְהָיָה
  english_pob_choice: May ... be
  chosen_spanish: Que ... sea
  alternatives_spanish:
  - Sea ...
  - Yahvé será ...
  lexicon: HALOT
  rationale: En este contexto de súplica o deseo, el hebreo funciona como una invocación optativa. "Que ... sea" reproduce mejor ese valor que un futuro simple en español.
- source_word: לְדַיָּן
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - árbitro
  - juez de causa
  lexicon: HALOT
  rationale: דַּיָּן nombra a quien actúa como juez o árbitro en una disputa. "Juez" es la equivalencia más directa y transparente en español jurídico-religioso.
- source_word: וְשָׁפַט
  english_pob_choice: judge / decide
  chosen_spanish: juzgue
  alternatives_spanish:
  - dicte sentencia
  - decida
  lexicon: HALOT
  rationale: Se conserva la familia semántica de משפט con el verbo "juzgar" para evitar perder la repetición del texto hebreo. En español, "juzgue" mantiene el paralelismo con "juez" y no introduce un matiz ajeno.
- source_word: בֵּינִי וּבֵינֶךָ
  english_pob_choice: between me and you
  chosen_spanish: entre yo y tú
  alternatives_spanish:
  - entre mí y ti
  - entre nosotros
  lexicon: HALOT
  rationale: Se mantiene la relación bilateral del hebreo de forma transparente. Aunque "entre mí y ti" es más esperable en español normativo, aquí la fórmula conserva mejor el valor personal directo del original en una súplica estilizada.
- source_word: וְיֵרֶא
  english_pob_choice: May he see
  chosen_spanish: y vea
  alternatives_spanish:
  - y mire
  - y tome conocimiento
  lexicon: HALOT
  rationale: El verbo ראה se traduce de manera literal como "ver", preservando la imagen bíblica de que Dios toma nota de la situación.
- source_word: וְיָרֵב אֶת רִיבִי
  english_pob_choice: plead my case
  chosen_spanish: pleitee mi causa
  alternatives_spanish:
  - defienda mi causa
  - litigue por mi causa
  lexicon: HALOT
  rationale: La raíz ריב tiene un fuerte trasfondo de disputa legal. "Pleitee mi causa" conserva esa resonancia forense sin reducirla a una simple defensa retórica. Se evita "cause" por ser anglicismo; "causa" comunica bien el litigio.
- source_word: וְיִשְׁפְּטֵנִי
  english_pob_choice: vindicate me
  chosen_spanish: me vindique
  alternatives_spanish:
  - me haga justicia
  - me declare justo
  lexicon: HALOT
  rationale: En este contexto el pedido es de una resolución favorable frente a la persecución injusta. "Vindique" mantiene la fuerza judicial de un fallo favorable y deja visible la tensión entre juicio y liberación.
- source_word: מִיָּדֶךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tus manos
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de manera literal, porque en español "de tu mano" todavía puede expresar poder o control. Esto respeta la imagen del original sin explicitarla en exceso.
theological_decisions:
- issue: Valor optativo de la secuencia verbal
  english_pob_reading: Use English optative 'May...' throughout the verse
  chosen_spanish_reading: Usar "Que..." / subjuntivo en toda la oración
  alternative_spanish_readings:
  - '"Yahvé será juez..."'
  - '"Yahvé sea juez..."'
  rationale: El hebreo presenta una apelación orante, no una simple predicción. El subjuntivo español refleja mejor la súplica de David y conserva el tono de invocación del texto.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: Tratamiento del Tetragrama
  english_pob_reading: Render the divine name as Yahweh rather than 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto de forma consistente con la política del POB, evitando el sustituto litúrgico que borra la forma visible del hebreo.
  doctrine_reference: Project terminology defaults for יהוה / YHWH
- issue: Intensidad forense de ריב / משפט
  english_pob_reading: plead my case / vindicate me
  chosen_spanish_reading: pleitee mi causa / me vindique
  alternative_spanish_readings:
  - defienda mi causa / me haga justicia
  - litigue por mi causa / me absuelva
  rationale: 'El texto combina disputa legal y petición de fallo favorable. "Pleitee" y "vindique" conservan ambos polos: litigio y resolución justa, sin diluir la tensión semántica del hebreo.'
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'La versión inglesa más reciente volvió a alinear los verbos judiciales con la repetición de משפט: ''judge and judge between me and you, and see and plead my case, and vindicate me from your hand''. La redacción española sigue esa linealidad y conserva la serie verbal unida en una sola oración, con subjuntivo optativo al inicio.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva un registro reverente pero claro, apto para lectura eclesial contemporánea.
  - Se evita convertir 'de tu mano' en una explicación interpretativa dentro del texto principal; la aclaración queda en nota.
  - 'Se usan verbos judiciales coherentes: juez / juzgue / pleitee / vindique, para reflejar la red legal del hebreo.'
  - Se corrige el orden español a 'entre yo y tú' solo para reflejar la bilateralidad literal del hebreo, aunque la nota reconoce la opción normativa 'entre mí y ti'.
