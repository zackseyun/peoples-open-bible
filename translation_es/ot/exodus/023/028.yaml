revisions:
- from: Y enviaré delante de ti[a] la avispa, y ella expulsará al heveo, al cananeo y al hitita de delante de ti.
  to: Y enviaré el avispón delante de ti[a], y expulsará al heveo, al cananeo y al hitita de delante de ti.
  rationale: Se ajusta הַצִּרְעָה de «avispa» a «avispón» para reflejar mejor la decisión léxica documentada (‘hornet’) y se elimina «ella» por naturalidad del español, sin perder la relación sintáctica del hebreo. La nota se actualiza para mantener coherencia con el término principal revisado.
