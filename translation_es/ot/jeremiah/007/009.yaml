translation:
  language: es
  text: ¿Robarán, asesinarán, cometerán adulterio, jurarán falsamente, quemarán incienso a Baal y se irán tras[a] otros dioses que no han conocido[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘seguir otros dioses’.
    reason: lexical_alternative
  - marker: b
    text: La cláusula ‘que no han conocido’ también puede traducirse ‘a quienes no han conocido’ o, interpretativamente, ‘a quienes no han reconocido’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/גָנֹב
  english_pob_choice: Will you steal
  chosen_spanish: ¿Robar[a]
  alternatives_spanish:
  - ¿Vais a robar?
  - ¿Robaréis?
  lexicon: HALOT
  rationale: La secuencia interrogativa-retórica hebrea con infinitivo absoluto/constructivo funciona como acusación directa; en español, un infinitivo exclamativo/interrogativo conserva la fuerza abrupta de la denuncia sin añadir material no atestiguado. Se ancla [a] porque la misma ambigüedad léxica del inglés POB también afecta al inicio de la cláusula en español.
- source_word: רָצֹחַ
  english_pob_choice: murder
  chosen_spanish: asesinar
  alternatives_spanish:
  - matar
  - cometer homicidio
  lexicon: HALOT
  rationale: רצח denota matar ilícitamente, no matar en general. 'Asesinar' preserva mejor la carga moral y jurídica que 'matar' en español actual.
- source_word: וְנָאֹף
  english_pob_choice: commit adultery
  chosen_spanish: cometer adulterio
  alternatives_spanish:
  - ser adúlteros
  - adulterar
  lexicon: HALOT
  rationale: El verbo נאף es el término estándar para adulterio. 'Cometer adulterio' es la equivalencia idiomática más natural y precisa en español.
- source_word: וְהִשָּׁבֵעַ לַשֶּׁקֶר
  english_pob_choice: swear falsely
  chosen_spanish: jurar falsamente
  alternatives_spanish:
  - jurar en falso
  - jurar mentira
  lexicon: HALOT
  rationale: La expresión describe prestar juramento en apoyo de una falsedad. 'Jurar falsamente' mantiene el valor legal-ético y es natural en español bíblico contemporáneo.
- source_word: וְקַטֵּר לַבָּעַל
  english_pob_choice: burn incense to Baal
  chosen_spanish: quemar incienso a Baal
  alternatives_spanish:
  - ofrecer incienso a Baal
  - echar incienso a Baal
  lexicon: HALOT
  rationale: קטר en contexto cúltico se refiere a quemar incienso o hacer humo ritual. 'Quemar incienso' es la forma directa y reconocible en español, sin perder el sentido cultual.
- source_word: לַבָּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Se conserva el nombre divino/título propio 'Baal' como transliteración estándar, acorde con el uso auditado en inglés.
- source_word: וְהָלֹךְ אַחֲרֵי
  english_pob_choice: go after
  chosen_spanish: andar tras
  alternatives_spanish:
  - ir tras
  - seguir tras
  lexicon: HALOT
  rationale: El hebreo 'ir/andar tras' expresa seguimiento y lealtad religiosa. 'Andar tras' preserva la metáfora del original y sugiere adhesión continua, no solo movimiento físico.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros dioses extranjeros
  lexicon: HALOT
  rationale: La frase significa de manera directa 'otros dioses'. 'Otros dioses' evita introducir el matiz interpretativo de 'ajenos/extranjeros' sin apoyo inmediato del texto.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם
  english_pob_choice: that you have not known
  chosen_spanish: que no habéis conocido
  alternatives_spanish:
  - a quienes no habéis conocido
  - que no conocéis
  lexicon: HALOT
  rationale: 'ידע puede implicar más que conocimiento cognitivo: relación, reconocimiento o familiaridad pactual. ''Habéis conocido'' conserva la ambigüedad deliberada del inglés POB y su tono de reproche; ''a quienes'' sería posible, pero el relativo ''que'' mantiene fluidez sin resolver demasiado la tensión semántica.'
theological_decisions:
- issue: El verbo ידע aplicado a los dioses
  english_pob_reading: that you have not known
  chosen_spanish_reading: que no habéis conocido
  alternative_spanish_readings:
  - a quienes no habéis conocido
  - que no habéis reconocido
  rationale: En contextos de pacto, 'conocer' en hebreo puede implicar reconocimiento relacional además de conocimiento factual. La traducción mantiene 'conocer' para no cerrar la tensión teológica entre ignorancia, rechazo y falta de relación, tal como hace el POB inglés.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Forma verbal retórica de la pregunta
  english_pob_reading: Will you steal...
  chosen_spanish_reading: ¿Robar...
  alternative_spanish_readings:
  - ¿Vais a robar...
  - ¿Robaréis...
  rationale: El profeta no solo informa conductas; las acusa con ironía retórica. En español, el infinitivo interrogativo conserva mejor la lista abrupta de delitos que una pregunta finita más explicativa.
  doctrine_reference: Rhetorical prophetic rebuke.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente del POB inglés; no hubo revisiones aplicadas en el paquete fuente. La decisión española sigue la misma lectura óptima-equivalente: lista de verbos acusatorios en serie, con cierre relativo que preserva la ambigüedad de ידע. No se introdujeron cambios textuales ni doctrinales adicionales.'
  spanish_consistency_notes:
  - Se usa 'Baal' como nombre propio, no 'el Baal', por coherencia con la práctica auditada del POB inglés y la legibilidad en español.
  - '''Conocer'' se mantiene para ידע para conservar la tensión relacional/cognitiva, en vez de reducirlo a ''reconocer'' o ''acknowledge''.'
  - '''Andar tras'' reproduce la metáfora semítica de seguimiento y lealtad religiosa sin paraphrasear a ''adorar'' o ''seguir'' solamente.'
  - La puntuación con raya final conserva el flujo del verso dentro de su apertura retórica y prepara la continuación del discurso.
