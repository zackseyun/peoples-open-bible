translation:
  language: es
  text: Pues[a] sus pies corren al mal[b][c], y se apresuran a derramar sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque sus pies corren al mal»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «al mal»; también puede entenderse como «hacia el mal».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para hacer el mal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Conserva la fuerza explicativa de la cláusula hebrea y suena natural en español al introducir la razón del dicho anterior.
- source_word: רַגְלֵיהֶם
  english_pob_choice: their feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus pasos
  - sus pies mismos
  lexicon: HALOT
  rationale: Mantiene la imagen corporal concreta del hebreo y la metáfora de movimiento apresurado.
- source_word: לָרַע
  english_pob_choice: to evil
  chosen_spanish: al mal
  alternatives_spanish:
  - hacia el mal
  - para hacer el mal
  lexicon: HALOT
  rationale: La preposición más el sustantivo se vierte con concisión en español como destino o dirección; conserva la tersura del hebreo sin expandirlo a 'hacer el mal'.
- source_word: יָרוּצוּ
  english_pob_choice: run
  chosen_spanish: corren
  alternatives_spanish:
  - corren velozmente
  - acuden corriendo
  lexicon: HALOT
  rationale: '''Corren'' preserva la imagen básica de movimiento rápido y encaja con el paralelismo del verso.'
- source_word: וִימַהֲרוּ
  english_pob_choice: and they hurry
  chosen_spanish: se apresuran
  alternatives_spanish:
  - se dan prisa
  - se precipitan
  lexicon: HALOT
  rationale: Reproduce la intensificación del verbo hebreo con una forma idiomática y directa en español.
- source_word: לִשְׁפָּךְ
  english_pob_choice: to shed
  chosen_spanish: para derramar
  alternatives_spanish:
  - a derramar
  - con el fin de derramar
  lexicon: HALOT
  rationale: En combinación con 'sangre', 'derramar' es el equivalente natural de la expresión hebrea y mantiene el valor violento del giro idiomático.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: HALOT
  rationale: '''Sangre'' preserva el sustantivo simple del hebreo; el contexto ya comunica el sentido de violencia y homicidio.'
translation_notes:
  revision_awareness: La versión inglesa auditada es estable y no muestra revisiones aplicadas; el hebreo presenta alta concordancia con la traducción inglesa, así que la decisión principal en español es conservar la brevedad paralela y la imagen corporal sin sobreexplicar.
  spanish_consistency_notes:
  - Se mantiene 'mal' en lugar de una expansión interpretativa como 'maldad' o 'hacer el mal' en el texto principal, siguiendo la concisión del hebreo.
  - 'Se conserva el paralelismo verbal con dos miembros breves: ''corren'' // ''se apresuran''.'
  - '''Derramar sangre'' se usa como giro idiomático bíblico transparente en español, evitando una paráfrasis más explícita.'
