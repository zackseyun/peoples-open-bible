  language: en
  yaml_path: translation/ot/ezra/008/035.yaml
  text: 'Those who had come from the captivity[a], the sons of the exile, offered burnt offerings to the God of Israel: twelve bulls for all Israel, ninety-six rams, seventy-seven lambs, and twelve male goats as a sin offering[c][b]. All of it was a burnt offering to Yahweh.'
  footnotes:
