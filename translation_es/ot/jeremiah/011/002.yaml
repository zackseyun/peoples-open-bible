translation:
  language: es
  text: Oigan las palabras de esta alianza[a], y háblales a los hombres de Judá y a los habitantes de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre de Judá»; la expresión es colectiva/distributiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide una convocatoria a prestar atención. «Oigan» conserva la fuerza de recepción auditiva sin convertirlo en una orden de obediencia explícita en el texto principal.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - las expresiones de
  lexicon: HALOT
  rationale: El plural constructo de דבר se vierte de forma directa y natural como «las palabras de», manteniendo el vínculo con el contenido verbal del pacto.
- source_word: הַבְּרִית הַזֹּאת
  english_pob_choice: this covenant
  chosen_spanish: este pacto
  alternatives_spanish:
  - este pacto solemne
  - esta alianza
  lexicon: HALOT
  rationale: בְּרִית puede traducirse como «pacto» con buena fidelidad y claridad en español. «Pacto» mantiene el peso jurídico-relacional sin imponer de entrada el registro eclesiástico de «alianza».
- source_word: וְדִבַּרְתָּם
  english_pob_choice: and speak them
  chosen_spanish: y háblenlas
  alternatives_spanish:
  - y declárenlas
  - y háblenlo
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere a «las palabras», de ahí el plural femenino en español. Se adopta una forma imperativa plural idiomática para reflejar la instrucción en contexto; el español necesita concordancia de número y género con «palabras».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: Con destinatarios de habla, la preposición española natural es «a».
- source_word: אִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - cada hombre de Judá
  - el hombre de Judá
  lexicon: HALOT
  rationale: Se preserva el valor masculino del singular distributivo אִישׁ con una expresión colectiva natural en español. «Los hombres de Judá» refleja la forma hebrea sin suavizarla a «el pueblo».
- source_word: וְעַל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y contra
  - y acerca de
  lexicon: HALOT
  rationale: En paralelo con אֶל, aquí marca igualmente a quién se dirige la palabra. «Y a» comunica el sentido de destinatario sin introducir matiz adversativo o temático.
- source_word: יֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio sustantivado de ישׁב se rinde de modo natural como «habitantes», preservando la referencia a quienes viven en la ciudad.
theological_decisions:
- issue: Valor colectivo/distributivo de אִישׁ יְהוּדָה
  english_pob_reading: the men of Judah
  chosen_spanish_reading: los hombres de Judá
  alternative_spanish_readings:
  - cada hombre de Judá
  - el pueblo de Judá
  rationale: El hebreo usa un singular masculino con fuerza colectiva/distributiva. Se conserva esa huella semántica con «los hombres de Judá», evitando neutralizarla en una forma más genérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente. El presente borrador sigue la lectura aprobada con concordancia textual alta y sin cambios respecto del sentido base.
  spanish_consistency_notes:
  - Se usó «pacto» para בְּרִית de manera consistente con el registro bíblico y la transparencia terminológica del proyecto.
  - Se mantuvo la distinción entre el objeto directo «las palabras» y los destinatarios introducidos por «a».
  - La concordancia de género en «háblenlas» responde al referente español «las palabras» y no altera el contenido del original.
  - Se preservó el matiz masculino de אִישׁ sin recurrir a un universalizante «personas» o «pueblo» que borraría la forma hebrea.
