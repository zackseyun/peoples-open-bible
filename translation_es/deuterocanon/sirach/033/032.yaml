translation:
  language: es
  text: El día en que se cumplan los días de tu vida[a], y en el momento de la muerte, da una herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "en el día del cumplimiento de los días de tu vida".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - En aquel día
  - El día en que
  lexicon: LSJ
  rationale: La preposición temporal ἐν con dativo se expresa de manera natural en español con 'en'. 'En el día' conserva la referencia temporal precisa del griego sin introducir solemnidad innecesaria.
- source_word: συντελείας
  english_pob_choice: are completed
  chosen_spanish: se cumplan
  alternatives_spanish:
  - lleguen a su fin
  - se consumen
  - se completen
  lexicon: LSJ
  rationale: El sustantivo indica cierre, culminación o completitud. En español, una forma verbal como 'se cumplan' comunica bien la idea de que los días de la vida llegan a su término, manteniendo la fuerza de cumplimiento/completación sin calco rígido.
- source_word: ἡμερῶν ζωῆς σου
  english_pob_choice: the days of your life
  chosen_spanish: los días de tu vida
  alternatives_spanish:
  - los días de tu vida terrenal
  - los días de tu existencia
  lexicon: LSJ
  rationale: La cadena genitiva griega se traduce de forma directa y natural como 'los días de tu vida'. Es transparente en español y conserva la estructura idiomática semítica del original.
- source_word: καιρῷ τελευτῆς
  english_pob_choice: the time of death
  chosen_spanish: el tiempo de la muerte
  alternatives_spanish:
  - el momento de la muerte
  - la hora de morir
  - el tiempo de tu fin
  lexicon: LSJ
  rationale: καιρός señala un tiempo oportuno o señalado; τελευτή puede referirse al fin o a la muerte. 'El tiempo de la muerte' mantiene la generalidad del original y su tono sapiencial, aunque 'el momento de la muerte' sería una alternativa más idiomática.
- source_word: διδὸς
  english_pob_choice: give
  chosen_spanish: da
  alternatives_spanish:
  - entrega
  - concede
  - otorga
  lexicon: LSJ
  rationale: El imperativo es simple y directo. 'Da' conserva la sobriedad del mandato y funciona bien en un consejo práctico sobre disposición de bienes.
- source_word: κληρονομίαν
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una heredad
  - un legado
  - la herencia
  lexicon: LSJ
  rationale: κληρονομία denota herencia o patrimonio heredado. 'Una herencia' es la equivalencia más clara y transparente en español para el acto de disponer bienes al final de la vida.
theological_decisions:
- issue: Si κληρονομίαν debe sonar como instrucción práctica de patrimonio o como metáfora espiritual.
  english_pob_reading: an inheritance
  chosen_spanish_reading: una herencia
  alternative_spanish_readings:
  - un legado
  - la herencia
  rationale: 'El contexto sapiencial es práctico y familiar: la frase instruye sobre la disposición de bienes al final de la vida. ''Una herencia'' preserva esa concreción legal/familiar sin añadir sentidos metafóricos no presentes en el griego.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'your life's days' por 'the days of your life' para mayor naturalidad y formalidad. La versión española sigue esa misma relación semántica con 'los días de tu vida', sin cambiar el sentido del original griego.
  spanish_consistency_notes:
  - Se mantiene 'herencia' para κληρονομίαν por transparencia legal/familiar.
  - Se conserva 'tiempo de la muerte' para reflejar el valor amplio de καιρός sin sobreinterpretar.
  - El orden de la frase sigue el paralelismo del griego y la audit trail inglesa, con una adaptación fluida al español.
