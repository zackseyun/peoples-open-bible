translation:
  language: es
  text: Ahora bien, hubo hambre en la tierra, además de la primera hambruna que hubo en los días de Abraham. Así que Isaac fue a Abimelec, rey de los filisteos, en Gerar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Gerar». La forma hebrea de «Gerar» incluye una terminación direccional, que puede señalar movimiento hacia Gerar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora bien, hubo
  alternatives_spanish:
  - Y hubo
  - Hubo
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce una nueva circunstancia narrativa. «Ahora bien» conserva el arranque de escena y el valor discursivo sin sonar mecánico; «hubo» expresa bien la existencia del evento.
- source_word: רָעָב
  english_pob_choice: a famine
  chosen_spanish: hambre
  alternatives_spanish:
  - una hambruna
  - escasez de alimentos
  lexicon: HALOT
  rationale: En contexto narrativo bíblico, רָעָב designa una carestía grave. «Hambre» es más natural en español bíblico y evita cargar con una explicación interpretativa extra; el artículo indefinido queda implícito por el verbo y la construcción.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: Aquí אֶרֶץ puede entenderse como el territorio/área habitada. «Tierra» preserva el alcance amplio y tradicional del hebreo narrativo, sin limitarlo innecesariamente a un país moderno.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: Marca adición o distinción respecto de otra hambruna previa. «Además de» comunica con claridad la relación comparativa sin perder la idea de excepción.
- source_word: הָרָעָב הָרִאשׁוֹן
  english_pob_choice: the first famine
  chosen_spanish: el primer hambre
  alternatives_spanish:
  - la primera hambre
  - la primera hambruna
  lexicon: HALOT
  rationale: Se mantiene el ordinal explícito. En español, «primer hambre» suena más natural que «primera hambre» en esta construcción, aunque ambas son posibles; «hambre» conserva el término básico del hebreo.
- source_word: אֲשֶׁר הָיָה בִּימֵי אַבְרָהָם
  english_pob_choice: that had been in the days of Abraham
  chosen_spanish: que había habido en los días de Abraham
  alternatives_spanish:
  - que fue en los días de Abraham
  - que había sido en los días de Abraham
  lexicon: HALOT
  rationale: El relativo identifica la hambruna anterior con referencia al tiempo de Abraham. «Había habido» refleja mejor la anterioridad y evita forzar una localización más concreta que la del hebreo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: So Isaac went
  chosen_spanish: Así que Isaac fue
  alternatives_spanish:
  - Entonces Isaac fue
  - Y fue Isaac
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración. «Así que» reproduce la progresión narrativa con cierta consecuencia discursiva, sin afirmar una causalidad más fuerte de la que el texto exige; «fue» es natural en español cuando el movimiento se entiende por contexto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - a casa de
  lexicon: HALOT
  rationale: Con un destino personal, «a» es la opción más directa y natural en español.
- source_word: אֲבִימֶּלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  - Abimélec
  lexicon: HALOT
  rationale: Se translitera conforme al uso español habitual en biblias y estudios, manteniendo la forma del nombre propio sin forzar la grafía inglesa.
- source_word: מֶלֶךְ פְּלִשְׁתִּים
  english_pob_choice: king of the Philistines
  chosen_spanish: rey de los filisteos
  alternatives_spanish:
  - rey filisteo
  - monarca de los filisteos
  lexicon: HALOT
  rationale: La cadena constructa se vuelve naturalmente posesiva en español. «Filisteos» mantiene el valor étnico-político sin introducir matices ajenos.
- source_word: גְּרָרָה
  english_pob_choice: at Gerar
  chosen_spanish: a Gerar
  alternatives_spanish:
  - en Gerar
  - hacia Gerar
  lexicon: HALOT
  rationale: El hebreo termina con una terminación direccional que puede señalar movimiento hacia Gerar. Dado que el verbo ya expresa el desplazamiento, «a Gerar» conserva esa dirección de manera natural en español.
theological_decisions:
- issue: Tratamiento de la geografía y dirección final de גְּרָרָה
  english_pob_reading: at Gerar, with a footnote noting the directional ending can explicitly mark movement toward Gerar
  chosen_spanish_reading: a Gerar, con nota sobre el matiz direccional del hebreo
  alternative_spanish_readings:
  - en Gerar
  - hacia Gerar
  rationale: El hebreo puede leerse como destino explícito. En español, «a Gerar» mantiene tanto la naturalidad como la fuerza direccional; la nota conserva la alternativa sin imponer una localización estática.
  doctrine_reference: N/A (topónimo y sintaxis de movimiento)
- issue: Referencia histórica a una hambruna anterior en tiempos de Abraham
  english_pob_reading: the first famine that had been in the days of Abraham
  chosen_spanish_reading: el primer hambre que había habido en los días de Abraham
  alternative_spanish_readings:
  - la primera hambre que había sido en los días de Abraham
  - la primera hambruna que había habido en los días de Abraham
  rationale: 'No hay una carga doctrinal especial, pero sí una tensión de temporalidad: el texto distingue una hambruna anterior y la sitúa en la era de Abraham. Se preserva la anterioridad sin armonizarla más de lo que el hebreo permite.'
  doctrine_reference: N/A (referencia histórica)
- issue: Designación étnico-política פְּלִשְׁתִּים
  english_pob_reading: Philistines
  chosen_spanish_reading: filisteos
  alternative_spanish_readings:
  - pueblo filisteo
  - filisteo
  rationale: Se conserva el etnónimo estándar sin rebajar su fuerza histórica ni convertirlo en un título religioso.
  doctrine_reference: N/A (etnónimo histórico)
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la estructura narrativa, la referencia a la primera hambruna, el movimiento de Isaac y la posible dirección implícita de גְּרָרָה. No se aplicaron revisiones posteriores en el expediente inglés; esta versión sigue ese estado estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la pauta del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se eligió «Abimelec» como forma española estable y «filisteos» para el etnónimo histórico, en línea con un registro bíblico moderno y legible.
  - «Hambre» se mantuvo para reflejar el sustantivo hebreo sin añadir una paráfrasis explicativa más fuerte que la del texto fuente.
  - La nota de Gerar conserva el matiz direccional del hebreo sin alterar el texto principal.
