review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia verbal hebrea y el sentido militar general: invasión contra Judá, intimidación, apertura de brecha para provecho propio, e imposición de un rey rival. También preserva correctamente «hijo de Tabeel» y la referencia femenina a Judá. Sin embargo, «aterroricémosla» suena algo calcado y menos natural en español bíblico legible, y la nota b introduce «fractemos», forma poco natural. Conviene un ajuste menor de estilo sin cambiar el sentido fuente.'
  spanish_quality_summary: El texto es claro y bastante natural, pero puede mejorar en fluidez y dignidad con «aterroricemos» en lugar de «aterroricémosla» manteniendo el clítico, y con una nota alternativa más idiomática. «Abramos brecha en ella para nosotros» funciona bien y conserva tanto la imagen militar como el matiz de provecho propio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se mantiene «Judá», el femenino para la entidad personificada, y «hijo de Tabeel». Las decisiones léxicas están alineadas con la auditoría inglesa, salvo la conveniencia estilística de preferir una forma verbal más natural y una nota alternativa menos forzada.
  issues:
  - severity: medium
    issue: «aterroricémosla» es menos natural que «aterroricemos» + clítico en este registro
    rationale: Aunque comprensible y fiel al sentido de causar terror, la forma con acento y enclítico resulta más pesada en español eclesial moderno. «y aterroricemos a Judá / y la aterroricemos» o mantener «y aterroricemos su tierra» no es necesario; basta ajustar a una forma más fluida conservando el referente femenino.
  - severity: low
    issue: La nota b usa «fractemos», opción poco idiomática
    rationale: Como alternativa léxica documentada, conviene ofrecer formulaciones españolas naturales como «abramos paso» o «la partamos», no una forma rara que distrae del propósito de la nota.
  revised_spanish_text: Subamos contra Judá[a], y aterroricémosla, y abramos brecha en ella[b] para nosotros, y pongamos por rey en medio de ella al hijo de Tabeel.
  revised_footnotes:
  - marker: a
    text: O «Subamos hacia Judá» o «Subamos para atacar a Judá». El hebreo admite el matiz de movimiento militar; la forma principal preserva el giro hostil de la expresión.
    reason: lexical_alternative
  - marker: b
    text: O «y la partamos para nosotros» o «y la abramos para nosotros». El verbo hebreo es difícil; la imagen principal conserva la idea de abrir una brecha violenta.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor: se conserva el texto principal, que es sustancialmente fiel, pero se corrige la nota b para eliminar una alternativa española poco natural («fractemos»). No se requiere adjudicación adicional porque el sentido fuente y la solución española son claros.'
