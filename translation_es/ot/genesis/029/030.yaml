translation:
  language: es
  text: Así que se unió también a Raquel, y amó a Raquel más que a Lea[a]; y sirvió con él por otros siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «amó a Raquel antes que a Lea» o «en lugar de Lea». El hebreo puede marcar comparación; aquí el sentido más natural es «más que a Lea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא ... אֶל רָחֵל
  english_pob_choice: he went in to Rachel also
  chosen_spanish: entró también a Raquel
  alternatives_spanish:
  - fue también a Raquel
  - tuvo relaciones con Raquel también
  lexicon: HALOT
  rationale: El hebreo con בוא + אֶל en este contexto matrimonial es un eufemismo convencional que implica consumación. En español, «entró a» preserva ese valor idiomático sin explicitar en exceso, y «también» conserva גַּם como añadido después de Lea.
- source_word: וַיֶּאֱהַב ... אֶת רָחֵל
  english_pob_choice: he loved Rachel
  chosen_spanish: amó a Raquel
  alternatives_spanish:
  - amó profundamente a Raquel
  lexicon: HALOT
  rationale: אָהַב es el verbo común «amar». No hay un intensificador verbal aparte, por lo que conviene mantener una traducción simple y directa.
- source_word: מִלֵּאָה
  english_pob_choice: more than Leah
  chosen_spanish: más que a Lea
  alternatives_spanish:
  - en lugar de Lea
  - antes que a Lea
  lexicon: HALOT
  rationale: La preposición מִן después de un verbo de afecto marca comparación. En español, «más que a Lea» reproduce de manera natural y fiel la fuerza comparativa que la POB inglesa señaló.
- source_word: וַיַּעֲבֹד עִמּוֹ
  english_pob_choice: he served with him
  chosen_spanish: sirvió con él
  alternatives_spanish:
  - trabajó para él
  - sirvió a él
  lexicon: HALOT
  rationale: עבד puede significar «servir» o «trabajar». Con עִם + sufijo, el hebreo dice literalmente «sirvió con él», refiriéndose a la continuación del trabajo bajo Labán. Se conserva la preposición para no diluir la forma del hebreo.
- source_word: עוֹד שֶׁבַע שָׁנִים אֲחֵרוֹת
  english_pob_choice: for another seven years
  chosen_spanish: por otros siete años
  alternatives_spanish:
  - por siete años más
  - por otro período de siete años
  lexicon: HALOT
  rationale: עוֹד más numeral y אֲחֵרוֹת expresan un período adicional. «Por otros siete años» es español natural y comunica bien la extensión añadida del servicio.
translation_notes:
  revision_awareness: Se corrigió la puntuación y se aseguró que el marcador de nota [a] aparezca exactamente en el texto principal donde corresponde. La redacción mantiene la lectura comparativa documentada por la POB inglesa y evita una paráfrasis más fuerte que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantuvo «Raquel» y «Lea» como nombres propios estándar en español bíblico.
  - Se conservó el matiz idiomático de בוא + אֶל en forma eufemística, sin volverlo explícito de manera innecesaria.
  - «Amó» se usó para reflejar el verbo simple אָהַב sin intensificación añadida.
  - «Sirvió con él» preserva la preposición del hebreo, aunque en español podría sonar menos fluido que «trabajó para él»; se eligió por fidelidad al dato gramatical.
  - La nota [a] queda anclada correctamente en el texto para evitar una nota huérfana.
