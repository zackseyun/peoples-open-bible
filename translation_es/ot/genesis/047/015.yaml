  to: 'Cuando el dinero de la tierra de Egipto y de la tierra de Canaán se acabó[a], todos los egipcios[b] vinieron a José, diciendo: «Danos[c] pan. ¿Por qué hemos de morir ante ti? Porque el dinero se acabó».'
  rationale: Se ajusta la súplica directa a «Danos pan» para un español más natural y eclesialmente legible, y se cambia «delante de usted» por «ante ti» para reflejar de manera más directa e idiomática el singular hebreo dirigido a José. No cambia el sentido ni las notas léxicas preservadas.
