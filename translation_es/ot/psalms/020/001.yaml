translation:
  language: es
  text: Para el maestro de música[a]. Un salmo de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «director de música» o «líder»; en los encabezados de salmos, el hebreo suele referirse al responsable musical.
    reason: alternative_reading
  - marker: b
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de música
  alternatives_spanish:
  - Para el director de música
  - Para el líder
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala a la persona responsable de la ejecución musical. «Maestro de música» comunica bien la función superscripcional en español natural, sin perder el valor direccional del hebreo.
- source_word: מִזְמ֥וֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: El sustantivo designa un salmo/canto asociado con la interpretación musical. «Salmo» es la equivalencia más precisa y estable en este contexto literario.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados de salmos puede indicar autoría, asociación, dedicación o posesión. «De David» preserva esa ambigüedad sin decidir indebidamente entre «por David» y «para David».
theological_decisions:
- issue: Ambigüedad del superscrito davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a resolver si el encabezado indica autoría, dedicación o asociación. La traducción mantiene la tensión semántica en español con «de David».
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto hebreo, la traducción inglesa auditada y la revisión más reciente; no se registran cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «David» como nombre propio y «salmo» como término técnico literario.
  - Se evita introducir «SEÑOR» u otras sustituciones no presentes en el hebreo de este versículo.
  - La preposición «para» en el primer hemistiquio refleja la función direccional del encabezado sin sobretraducirlo.
