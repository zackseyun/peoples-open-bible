translation:
  language: es
  text: 'Yo dije a Yahvé[a]: «Tú eres mi Señor; no tengo bien fuera de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Mi bien no está fuera de ti», expresando que el bien del salmista no se extiende aparte de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתְּ
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Dije
  - He dicho
  lexicon: HALOT
  rationale: Aunque la forma consonántica puede parecer femenina de 2.ª persona singular, el contexto exige una confesión en primera persona. En español conviene explicitar el sujeto para evitar ambigüedad y conservar el acto de habla del salmista.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: La preposición ל marca dirección/indirecto de habla, por lo que en español natural corresponde 'a'. Se sigue el estándar del proyecto para יהוה como 'Yahvé', manteniendo el nombre divino visible y no sustituido por una convención de ocultamiento.
- source_word: אֲדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - Señor mío
  - mi Amo
  lexicon: HALOT
  rationale: 'Con sufijo de primera persona, el sentido es posesivo: ''mi Señor''. ''Señor'' preserva el tono reverente y evita la aspereza de ''amo'' en este contexto de oración.'
- source_word: אָתָּה
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú
  lexicon: HALOT
  rationale: 'El pronombre independiente es enfático y, en una cláusula nominal, el español requiere la cópula para expresar de manera idiomática la identificación: ''Tú eres mi Señor''.'
- source_word: טוֹבָתִי
  english_pob_choice: my good
  chosen_spanish: mi bien
  alternatives_spanish:
  - mi bien-estar
  - mi bondad
  - mi bienestar
  lexicon: HALOT
  rationale: El sustantivo puede abarcar bien, beneficio o bienestar. 'Mi bien' es breve, natural en español y conserva la amplitud semántica sin convertirlo en una cualidad moral de la persona.
- source_word: בַּל
  english_pob_choice: 'no'
  chosen_spanish: 'no'
  alternatives_spanish:
  - nada
  - no hay
  lexicon: HALOT
  rationale: El negativo poético introduce una negación fuerte. 'No tengo' transmite con naturalidad la negación existencial en español y conserva la fuerza del enunciado sin forzar una paráfrasis explicativa.
- source_word: עָלֶיךָ
  english_pob_choice: apart from you
  chosen_spanish: fuera de ti
  alternatives_spanish:
  - aparte de ti
  - más allá de ti
  - sin ti
  lexicon: HALOT
  rationale: La construcción idiomática expresa que el bien del hablante no existe separadamente de Dios. 'Fuera de ti' mantiene la imagen espacial del hebreo y conserva la tensión semántica documentada por la nota inglesa; 'sin ti' sería más interpretativo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la convención doctrinal del proyecto para hacer visible el Tetragrámaton. 'Yahvé' es la forma establecida en español del texto POB, y evita la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la cláusula final
  english_pob_reading: I have no good apart from you
  chosen_spanish_reading: no tengo bien fuera de ti
  alternative_spanish_readings:
  - mi bien no está fuera de ti
  - no hay bien para mí fuera de ti
  - mi bien no se halla aparte de ti
  rationale: 'La redacción conserva la brevedad del hebreo y la tensión interpretativa: el hablante niega la existencia de su bien separado de Dios. ''Fuera de ti'' deja abierta la relación espacial/relacional sin resolverla en una sola paráfrasis.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el texto español se ajusta al estado de alta concordancia y conserva las decisiones auditadas del inglés POB sin introducir nuevas lecturas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה según el estándar del proyecto.
  - Se conserva la distinción reverencial 'Señor' para אֲדֹנָי.
  - La negación y la relación final se expresan de modo que permanezca la tensión semántica del hebreo.
  - El español evita calcar mecánicamente la sintaxis inglesa y sigue una formulación natural pero fuente-dependiente.
