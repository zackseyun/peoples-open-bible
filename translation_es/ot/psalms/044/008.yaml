    rationale: La nota habla de una alternativa para «adversarios» pero en realidad remite al participio siguiente. Conviene reemplazarla por una nota que explique directamente el valor participial de מְשַׂנְאֵינוּ, si se conserva nota.
  revised_spanish_text: Porque tú nos has salvado de nuestros adversarios, y has avergonzado a los que nos odian[a].
