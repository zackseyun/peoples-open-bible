    text: 'Literalmente: «con la lanza y a tierra, una vez»; la expresión describe el acto de fijarlo al suelo con un solo lance.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el cambio de sentido más importante: el hebreo expresa la petición/oferta de Abisay, no una orden a David. Por eso «déjame» sustituye al imperativo «atraviésalo». También se ajustó el verbo principal a «clavarlo al suelo», que comunica con más fidelidad e idiomaticidad la imagen de fijarlo al suelo con la lanza en un solo golpe, en línea con la decisión documentada en la POB inglesa. Se mantuvieron la nota alternativa sobre «en tu poder» y la nota literal sobre la construcción hebrea.'
