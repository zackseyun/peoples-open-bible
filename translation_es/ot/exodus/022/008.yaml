  to: 'Por cualquier caso de agravio, acerca de un buey, un asno, una oveja[a], una prenda, o cualquier objeto perdido, del cual alguien diga: «Este es», el asunto de ambas partes vendrá ante Dios[b]. Aquel a quien Dios declare culpable pagará el doble a su prójimo.'
  rationale: Se corrigen los anclajes de notas para que correspondan al término comentado, se sustituye «vestido» por «prenda» para reflejar mejor la amplitud de שַׂלְמָה, y se cambia «Esto es» por «Este es» para lograr un español natural que preserve la función identificativa del hebreo. El resto del texto puede mantenerse.
