translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Una vez más[a] habrá en este lugar, que está desolado, sin hombre ni animal, y en todas sus ciudades, un pastizal de pastores[c][b], donde hacen descansar los rebaños.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ‘de nuevo’ o ‘otra vez’.'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión hebrea fija para desolación total: ‘sin hombre ni animal’.'
    reason: cultural_note
  - marker: c
    text: 'También: ‘una morada de pastores’ o ‘un aprisco de pastores’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de hosts
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé según el criterio del proyecto, y צְבָאוֹת se vierte de forma transparente como ‘de los ejércitos’, que expresa mejor el sentido bíblico que un préstamo de ‘hosts’ en español.
- source_word: עוֹד
  english_pob_choice: Yet again
  chosen_spanish: Aún habrá
  alternatives_spanish:
  - Todavía habrá
  - Habrá de nuevo
  - Una vez más habrá
  lexicon: HALOT
  rationale: En este contexto profético de restauración, עוֹד introduce continuidad y reaparición futura. ‘Aún habrá’ mantiene la idea de ‘todavía’/‘de nuevo’ sin sonar forzado en español.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  lexicon: HALOT
  rationale: ‘Lugar’ es la equivalencia natural y fiel para el deíctico locativo. Conserva el énfasis demostrativo del hebreo.
- source_word: הֶחָרֵב
  english_pob_choice: which is desolate
  chosen_spanish: que está desolado
  alternatives_spanish:
  - desolado
  - que está en ruinas
  lexicon: HALOT
  rationale: Se traduce como relativa descriptiva para dar fluidez en español, manteniendo el valor de ruina/desolación del participio.
- source_word: מֵאֵין אָדָם וְעַד בְּהֵמָה
  english_pob_choice: without man or beast
  chosen_spanish: sin hombre ni animal
  alternatives_spanish:
  - sin hombre ni bestia
  - sin persona ni animal
  lexicon: HALOT
  rationale: Se preserva la fórmula de desolación total con ‘hombre ni animal’. ‘Animal’ comunica bien בְּהֵמָה sin arcaísmo; se evita suavizar la fuerza idiomática del hebreo.
- source_word: וּבְכָל עָרָיו
  english_pob_choice: and in all its cities
  chosen_spanish: y en todas sus ciudades
  alternatives_spanish:
  - y en todas las ciudades de ella
  lexicon: HALOT
  rationale: El sufijo posesivo se entiende territorialmente y en español se expresa con ‘sus ciudades’, como en la auditoría inglesa.
- source_word: נְוֵה
  english_pob_choice: a pasture / habitation / fold
  chosen_spanish: una morada
  alternatives_spanish:
  - un aprisco
  - un redil
  - una habitación
  lexicon: HALOT
  rationale: Se opta por un término más literal y amplio que no reduzca prematuramente el sentido. El hebreo admite la idea de morada, aprisco o redil; ‘morada’ deja espacio para el paralelo con los pastores y las ovejas/rebaños.
- source_word: רֹעִים
  english_pob_choice: of shepherds
  chosen_spanish: de pastores
  alternatives_spanish:
  - para pastores
  lexicon: HALOT
  rationale: Se conserva el vínculo constructo de נְוֵה רֹעִים con una relación nominal natural en español.
- source_word: מַרְבִּצִים צֹאן
  english_pob_choice: where they make flocks lie down
  chosen_spanish: donde hacen recostar los rebaños
  alternatives_spanish:
  - donde hacen descansar los rebaños
  - donde hacen echarse los rebaños
  - donde recuestan los rebaños
  lexicon: HALOT
  rationale: 'El hifil participio es causativo: los pastores hacen que el rebaño se eche/recoste. ‘Recostar’ conserva la imagen y suena más digno que una paráfrasis demasiado libre.'
theological_decisions:
- issue: Fórmula de desolación total con אָדָם y בְּהֵמָה
  english_pob_reading: without man or beast
  chosen_spanish_reading: sin hombre ni animal
  alternative_spanish_readings:
  - sin humanidad ni animal
  - sin personas ni bestias
  rationale: 'Se mantiene la fuerza del dicho formularia: ausencia total de vida humana y animal. ‘Hombre’ preserva el paralelo bíblico tradicional sin cambiar el alcance semántico.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Alcance de נְוֵה רֹעִים
  english_pob_reading: a pasture of shepherds
  chosen_spanish_reading: una morada de pastores
  alternative_spanish_readings:
  - un aprisco de pastores
  - un redil de pastores
  - una pastura de pastores
  rationale: El hebreo permite más de una imagen espacial. En español, ‘morada’ evita cerrar el sentido solo a un campo de pasto y puede abarcar el lugar de residencia/estancia pastoril. La ambigüedad se conserva mejor que con una sola imagen demasiado específica.
  doctrine_reference: HALOT נְוֵה; נוֹה
translation_notes:
  revision_awareness: La auditoría inglesa revisó la frase final desde ‘a pasture for shepherds’ a ‘a pasture of shepherds’ para ajustarse más de cerca a נְוֵה רֹעִים sin perder naturalidad. En español se optó por ‘una morada de pastores’ para respetar ese mismo ajuste y conservar la posibilidad de una imagen de estancia/pastoreo, manteniendo a la vez el participio causativo de ‘hacer recostar’ los rebaños.
  spanish_consistency_notes:
  - Se mantiene Yahvé en lugar de SEÑOR para el Tetragrámaton.
  - ‘Ejércitos’ se usa para צְבָאוֹת por transparencia semántica en español.
  - ‘Animal’ traduce בְּהֵמָה en la fórmula idiomática sin atenuar la desolación.
  - ‘Rebaños’ traduce צֹאן como colectivo natural en español; ‘recostar’ conserva el matiz causativo de מַרְבִּצִים.
  - Las notas [a], [b] y [c] aparecen ancladas exactamente en el texto para evitar notas huérfanas.
