translation:
  language: es
  text: Porque con mucha sabiduría viene mucha aflicción[a], y quien aumenta conocimiento aumenta dolor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque con mucha sabiduría viene mucha pesadumbre»; el hebreo כָּעַס puede denotar aflicción, pesadumbre o irritación.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y el que añade conocimiento añade dolor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la razón o explicación de la afirmación anterior. «Porque» conserva la fuerza explicativa y suena natural en español bíblico contemporáneo.
- source_word: בְּרֹב
  english_pob_choice: with much
  chosen_spanish: en mucha
  alternatives_spanish:
  - con mucha
  - en abundancia de
  lexicon: HALOT
  rationale: El hebreo expresa una circunstancia de abundancia o medida elevada. «En mucha» reproduce con economía la construcción preposicional y mantiene el paralelismo con el segundo hemistiquio.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: HALOT
  rationale: Es el equivalente normal y exacto para חָכְמָה en Eclesiastés.
- source_word: רָב
  english_pob_choice: much
  chosen_spanish: mucha
  alternatives_spanish:
  - gran
  - abundante
  lexicon: HALOT
  rationale: Concuerda con «sabiduría» y preserva el énfasis cuantitativo del hebreo.
- source_word: כָּעַס
  english_pob_choice: vexation
  chosen_spanish: vexación
  alternatives_spanish:
  - grief
  - dolor
  - frustración
  - ira
  lexicon: HALOT
  rationale: Se conserva el matiz interpretativo del POB inglés. «Vexación» puede sonar menos común, pero en español bíblico comunica bien la inquietud, irritación o aflicción existencial que el término puede abarcar en Eclesiastés; además evita reducirlo solo a ira o a dolor físico.
- source_word: וְיוֹסִיף דַּעַת
  english_pob_choice: and he who increases knowledge
  chosen_spanish: y quien añade conocimiento
  alternatives_spanish:
  - y el que aumenta conocimiento
  - y el que incrementa conocimiento
  lexicon: HALOT
  rationale: El verbo הוסיף se vierte con la idea de añadir o aumentar. La relativa «quien añade» conserva el carácter proverbial y evita una paráfrasis excesiva.
- source_word: דַּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: «Conocimiento» mantiene la distinción léxica frente a «sabiduría» y refleja bien el campo semántico de דַּעַת.
- source_word: יוֹסִיף מַכְאֽוֹב
  english_pob_choice: increases pain
  chosen_spanish: añade dolor
  alternatives_spanish:
  - aumenta el dolor
  - incrementa sufrimiento
  lexicon: HALOT
  rationale: Se conserva el paralelismo verbal con la primera mitad. «Dolor» es una traducción amplia y natural de מַכְאוֹב, adecuada tanto para sufrimiento físico como existencial.
translation_notes:
  revision_awareness: Alineado con el audit trail inglés y su filosofía de equivalencia óptima. Se preservó el paralelismo proverbial y la tensión semántica de כָּעַס sin suavizarla. No hubo revisiones aplicadas en el último pase, y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «sabiduría» y «conocimiento», siguiendo la distinción léxica del original.
  - «Vexación» se usa deliberadamente como término marcado para כָּעַס, con nota alternativa para lectores que prefieran un matiz de tristeza o irritación.
  - Se conserva el repetido «añade» para reflejar el paralelismo de יוֹסִיף en ambos miembros.
  - La puntuación mantiene dos cola proverbiales separadas por coma, como en la estructura hebrea.
