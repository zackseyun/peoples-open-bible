review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal y judicial del hebreo: לָכֵן/כֹּה אָמַר introduce el oráculo, יַעַן se traduce correctamente como causa, שָׁכַחַתְּ אֹתִי y וַתַּשְׁלִיכִי אֹתִי אַחֲרֵי גַוֵּךְ conservan la acusación de olvido y rechazo deliberado, y שְׂאִי se vierte adecuadamente como consecuencia judicial futura. Sin embargo, hay dos desajustes relevantes: 1) אֲדֹנָי יְהוִה no debe quedar como «el Señor Yahvé» sino mejor «el Señor Dios, Yahvé» o equivalente que preserve ambos elementos y el nombre divino con español natural; 2) זִמָּתֵךְ en este contexto sexualizado se acerca más a «lascivia»/«obscenidad»/«perversidad» que a «infamia», que resulta demasiado general y atenúa el matiz léxico documentado por el POB.'
  spanish_quality_summary: 'El texto es legible, digno y mayormente natural. No obstante, «detrás de tu espalda» suena algo redundante en español; «a tus espaldas» preserva el modismo con mejor fluidez. La nota actual no aporta una verdadera alternativa, pues repite esencialmente la misma redacción. La frase final mejora si mantiene una pareja semántica más cercana al hebreo: «tu lascivia y tus prostituciones» o «tu obscenidad y tus prostituciones».'
  glossary_alignment: Cumple bien con «Yahvé» para יְהוָה, pero la combinación compuesta אֲדֹנָי יְהוִה requiere una solución más fiel a ambos componentes en español. «Señor Yahvé» es posible, pero suena menos natural y puede difuminar el valor de אֲדֹנָי como título reverencial separado. «Tu infamia» no sigue bien la decisión léxica inglesa para זִמָּה («lewdness») ni el campo semántico sexual inmediato de Ezequiel 23.
  issues:
  - severity: medium
    issue: Renderización de אֲדֹנָי יְהוִה como «el Señor Yahvé»
    rationale: Aunque conserva «Yahvé», la combinación resulta menos natural y no refleja con claridad ambos elementos del título compuesto. En español bíblico claro, «el Señor Dios, Yahvé» preserva mejor el doble título y el nombre divino.
  - severity: medium
    issue: «tu infamia» debilita זִמָּתֵךְ
    rationale: זִמָּה en Ezequiel 23 forma pareja con «prostituciones» y denota conducta sexualmente perversa/lasciva. «Infamia» es demasiado amplia y pierde el matiz documentado por el POB.
  - severity: low
    issue: «detrás de tu espalda» es poco idiomático
    rationale: No es incorrecto, pero «a tus espaldas» suena más natural en español y conserva el sentido de rechazo deliberado.
  - severity: low
    issue: La nota a pie no ofrece una alternativa real útil
    rationale: La nota repite casi la misma frase del texto. Conviene usarla para explicar el modismo hebreo, o bien ofrecer una alternativa genuina como «me arrojaste a tus espaldas».
  revised_spanish_text: 'Por tanto, así dice el Señor Dios, Yahvé: Porque me has olvidado y me has echado a tus espaldas[a], tú también llevarás tu lascivia y tus prostituciones.'
  revised_footnotes:
  - marker: a
    text: 'O: «me arrojaste a tus espaldas». El hebreo expresa un modismo de rechazo o desprecio deliberado.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el título divino para preservar mejor אֲדֹנָי יְהוִה en español natural sin ocultar «Yahvé»; se mejora el modismo «behind your back» con «a tus espaldas»; y se reemplaza «infamia» por «lascivia» para reflejar mejor זִמָּה en el contexto sexualizado y alinearlo con la decisión inglesa «lewdness». No se requiere adjudicación adicional, porque la corrección es clara a partir del hebreo y de la guía terminológica del proyecto.
