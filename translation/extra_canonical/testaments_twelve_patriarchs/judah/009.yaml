translation:
  text: 'For eighteen years my father made peace with his brother Esau[a], and his sons were with us after we came from Mesopotamia, from Laban.


    2 And when the eighteen years were fulfilled, Esau, my father''s brother, came against us with a large and powerful people.


    3 And Jacob struck Esau with a bow, and he fell, slain by Jacob''s bow, dead on Mount Seir.


    4 And we pursued the sons of Esau, and they also had a fortified city, and we were not able to enter it. But sitting down around it, we besieged it.


    5 And because they did not open to us after twenty days, while they were watching, I brought up a ladder; and placing my shield over my head, and receiving the stones, I went up and killed four of their mighty men.


    6 And Reuben and Gad killed another six. Then they entered in succession.


    7 Then they asked us for terms of peace, and after counsel had been taken with our father, we accepted them.


    8 And they were giving us five hundred cors of wheat, and five hundred measures of oil, and five hundred measures of wine, until the famine[b][b][c], when we went down into Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness here states that Jacob struck Esau with a bow and that Esau fell dead on Mount Seir. This differs from the Genesis narrative and should be read as part of this testament's retelling rather than silently harmonized.
    reason: cross_reference
    anchor_ref: '9:3'
  - marker: c
    text: Or 'bearing the stones' or 'withstanding the stones.' The Greek participle suggests that Judah climbed while taking the stones thrown at him.
    reason: lexical_alternative
    anchor_ref: '9:5'
  - marker: b
    text: A cor is an ancient dry measure. The Greek preserves ancient units rather than giving modern equivalents.
    reason: cultural_note
    anchor_ref: '9:8'
  - marker: b
    text: The wording of the oil quantity is textually uncertain in the surviving Greek/OCR line, but the sense is a parallel tribute of wheat, oil, and wine in substantial amounts.
    reason: textual_variant
    anchor_ref: '9:8'
lexical_decisions:
- source_word: ἐποίησεν ... εἰρήνην
  chosen: made peace
  alternatives:
  - was at peace with
  - kept peace with
  lexicon: LSJ
  rationale: The idiom is active and relational, not merely a state. 'Made peace' preserves the concrete covenantal/reconciliatory sense.
- source_word: λαῷ βαρεῖ καὶ ἰσχυρῷ
  chosen: with a heavy and powerful people
  alternatives:
  - with a great and strong people
  - with a weighty and mighty host
  lexicon: LSJ
  rationale: βαρύς literally means 'heavy'; in military context it can imply formidable or burdensome. I retained 'heavy' to preserve the texture of the Greek, while 'powerful' clarifies ἰσχυρός.
- source_word: ἔπαισεν ἐν τόξῳ
  chosen: struck ... with a bow
  alternatives:
  - smote ... with a bow
  - shot ... with a bow
  lexicon: LSJ
  rationale: The phrase indicates a bow-shot without requiring a modernized verb like 'shot.' 'Struck with a bow' keeps the older martial register of the testament.
- source_word: δυναστῶν
  chosen: mighty men
  alternatives:
  - rulers
  - champions
  - powerful men
  lexicon: LSJ
  rationale: In this siege context the word likely refers to leading strong warriors rather than civil magistrates. 'Mighty men' fits the military narrative and elevated style.
- source_word: τὰ πρὸς εἰρήνην
  chosen: terms of peace
  alternatives:
  - the things pertaining to peace
  - peace proposals
  lexicon: LSJ
  rationale: This is an idiomatic expression for peace negotiations. 'Terms of peace' is natural English while remaining close to the Greek sense.
- source_word: κόρους
  chosen: cors
  alternatives:
  - measures
  - kor measures
  lexicon: LSJ
  rationale: A transliterated ancient dry measure preserves specificity and avoids falsely precise modern equivalents.
- source_word: μέτρα
  chosen: measures
  alternatives:
  - jars
  - units
  lexicon: LSJ
  rationale: The Greek is generic. 'Measures' keeps the source's non-specificity.
- source_word: ἀποδεχόμενος τοὺς λίθους
  chosen: receiving the stones
  alternatives:
  - withstanding the stones
  - taking the blows of the stones
  lexicon: LSJ
  rationale: The participle suggests taking or bearing the stones hurled at him. 'Receiving the stones' is slightly formal but transparent and vivid.
