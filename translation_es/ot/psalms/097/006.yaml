review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: los cielos como testigos cósmicos, la declaración de צִדְקוֹ y la visión universal de su gloria por todos los pueblos. Sin embargo, el texto principal en español se aparta de la decisión principal auditada por el POB inglés en צִדְקוֹ, que eligió ''his righteousness'' con ''his justice'' solo como alternativa en nota. En español, ''justicia'' como texto principal no es imposible, pero no preserva con suficiente fidelidad esa elección documentada.'
  spanish_quality_summary: 'El español es natural, claro y de buen registro bíblico: ''Los cielos declaran... y todos los pueblos ven su gloria'' suena bien y es plenamente legible. La única mejora necesaria es alinear mejor el término central con la decisión auditada y ajustar la nota para que la alternativa quede como ''justicia''.'
  glossary_alignment: No hay conflicto con la terminología general del proyecto salvo en la gestión de צִדְקוֹ/δικαιοσύνη-type language, donde el proyecto pide preservar la tensión entre 'justicia' y 'rectitud'. Aquí conviene usar 'rectitud' en el texto principal para reflejar mejor el inglés auditado 'righteousness', dejando 'justicia' en nota como alternativa legítima.
  issues:
  - severity: medium
    issue: El texto principal usa 'su justicia' donde el POB inglés eligió como lectura principal 'his righteousness'.
    rationale: Aunque צִדְקוֹ puede significar 'justicia', la auditoría inglesa documenta 'righteousness' como opción principal y 'justice' como alternativa. En español, 'rectitud' preserva mejor esa prioridad semántica sin borrar la alternativa judicial.
  - severity: low
    issue: La nota invierte la relación principal/alternativa del audit trail inglés.
    rationale: La nota actual ofrece 'su rectitud' como alternativa a un texto principal con 'su justicia'. Para conservar la racionalidad documentada, es preferible texto principal 'su rectitud' con nota 'O «su justicia»'.
  revised_spanish_text: Los cielos declaran su rectitud[a], y todos los pueblos ven su gloria.
