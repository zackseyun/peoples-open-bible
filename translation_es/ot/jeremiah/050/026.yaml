translation:
  language: es
  text: Vengan contra ella desde el extremo[a]; abran sus bodegas[b]; amontónenla como montones, y dedíquenla a la destrucción[c]; que no le quede remanente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desde el fin’ o ‘desde la extremidad’. La expresión hebrea puede significar desde los confines de la tierra o del territorio.
    reason: lexical_alternative
  - marker: b
    text: O ‘graneros’ o ‘almacenes’. El término hebreo puede referirse literalmente a lugares de alimentación o, por extensión, a depósitos de provisiones.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘dedíquenla a la destrucción’, término asociado con poner algo bajo el anatema para destrucción total.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan contra ella
  - Avancen contra ella
  - Entren
  lexicon: HALOT
  rationale: El imperativo plural convoca a los atacantes. En español, ‘Vengan’ conserva el llamado directo; el complemento ‘contra ella’ queda explícito por el contexto de hostilidad, no por el verbo solo.
- source_word: לָהּ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - a ella
  - sobre ella
  lexicon: HALOT
  rationale: La preposición hebrea puede tener sentido adversativo en contexto militar. ‘Contra ella’ mantiene la fuerza hostil sin volver la frase artificial.
- source_word: מִקֵּץ
  english_pob_choice: from the farthest border
  chosen_spanish: desde el extremo
  alternatives_spanish:
  - desde el fin
  - desde la extremidad
  - desde los confines
  lexicon: HALOT
  rationale: קֵץ significa ‘fin’ o ‘extremidad’. En español, ‘desde el extremo’ conserva la imagen espacial y deja abierta la posibilidad del matiz territorial sin añadir más de lo que el hebreo exige.
- source_word: פִּתְחוּ
  english_pob_choice: open
  chosen_spanish: abran
  alternatives_spanish:
  - abran
  - abran de par en par
  - desbloqueen
  lexicon: HALOT
  rationale: Imperativo plural directo de פתח. ‘Abran’ es la forma natural y fiel en español.
- source_word: מַאֲבֻסֶיהָ
  english_pob_choice: her storehouses
  chosen_spanish: sus bodegas
  alternatives_spanish:
  - sus graneros
  - sus almacenes
  - sus establos
  lexicon: HALOT
  rationale: El término puede referirse literalmente a lugares de alimentación o, por extensión, a depósitos de provisiones. ‘Bodegas’ funciona en español como espacio de almacenamiento y mantiene el sentido contextual de lugar guardado, aunque no identifica un tipo agrícola específico.
- source_word: סָלּוּהָ
  english_pob_choice: pile her up
  chosen_spanish: arrójenla como montones
  alternatives_spanish:
  - amántenla como montones
  - acumulen la como montones
  - apílenla
  lexicon: HALOT
  rationale: El verbo sugiere amontonar o apilar. En español, ‘arrójenla como montones’ preserva la imagen de escombro/destrucción que sigue y evita una construcción demasiado literal que suene extraña con el objeto pronominal.
- source_word: כְמוֹ עֲרֵמִים
  english_pob_choice: like heaps
  chosen_spanish: como montones
  alternatives_spanish:
  - como pilas
  - como montículos
  - como haces
  lexicon: HALOT
  rationale: עֲרֵמִים son ‘montones’ o ‘pilas’. ‘Montones’ es claro, natural y suficientemente amplio para no precisar indebidamente el tipo de montón.
- source_word: וְהַחֲרִימוּהָ
  english_pob_choice: devote her to destruction
  chosen_spanish: dedíquenla a la destrucción
  alternatives_spanish:
  - destrúyanla por completo
  - pónganla bajo anatema
  - conságrenla a la destrucción
  lexicon: HALOT
  rationale: חרם en Hifil expresa la dedicación de algo al juicio de destrucción. ‘Dediquenla a la destrucción’ conserva la idea de ‘devotar/consagrar’ al juicio sin reducirla a mero ‘destruir’.
- source_word: אַל תְּהִי לָהּ שְׁאֵרִית
  english_pob_choice: let no remnant remain to her
  chosen_spanish: que no le quede remanente
  alternatives_spanish:
  - que no le quede resto
  - que no le quede superviviente
  - que no tenga remanente
  lexicon: HALOT
  rationale: שְׁאֵרִית es ‘remanente/resto’. ‘Que no le quede remanente’ comunica bien la totalización del juicio con una fórmula natural en español.
theological_decisions:
- issue: Valor técnico de חרם en un oráculo de juicio
  english_pob_reading: devote her to destruction
  chosen_spanish_reading: dedíquenla a la destrucción
  alternative_spanish_readings:
  - destrúyanla por completo
  - pónganla bajo anatema
  rationale: El hebreo no solo habla de aniquilación material, sino de una acción de juicio con peso cultual/covenantal. La opción elegida intenta conservar esa densidad sin imponer un término técnico poco transparente para el lector general.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el análisis inglés auditado. Se mantuvieron el impulso militar del imperativo, el matiz territorial de מִקֵּץ, el sentido de depósito de מַאֲבֻסֶיהָ y la carga técnica de הַחֲרִימוּהָ. No se observan revisiones previas que alteren el contenido base.
  spanish_consistency_notes:
  - Se prefirió ‘Yahvé’ solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ y también ‘Cristo’, porque no aparecen en el pasaje.
  - ‘Remanente’ conserva el tono profético y la resonancia bíblica de שְׁאֵרִית.
  - ‘Bodegas’ se eligió por naturalidad en español; en notas se preserva la posibilidad de ‘graneros’ o ‘almacenes’.
