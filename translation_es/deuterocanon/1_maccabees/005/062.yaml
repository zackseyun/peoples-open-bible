lexical_decisions:
- source_word: αὐτοὶ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Ahora bien, ellos
  - Mas ellos
  lexicon: BDAG
  rationale: δέ marca contraste con lo anterior. «Pero ellos» comunica con claridad ese contraste en español moderno sin añadir matiz no sustentado por el griego.
- source_word: σπέρματος
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - progenie
  - semilla
  lexicon: BDAG
  rationale: En este contexto genealógico, σπέρματος expresa pertenencia por línea familiar. «Descendencia» es natural en español y conserva el sentido de procedencia genealógica mejor que un calco como «semilla».
- source_word: ἀνδρῶν
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - guerreros
  - personas
  lexicon: BDAG
  rationale: El griego es masculino plural y alude a figuras masculinas concretas. «Hombres» mantiene esa referencia sin introducir una restricción semántica excesiva.
- source_word: ἐδόθη
  english_pob_choice: had been given
  chosen_spanish: había sido dada
  alternatives_spanish:
  - fue dada
  - se había dado
  lexicon: BDAG
  rationale: El aoristo pasivo en el contexto retrospectivo se vierte naturalmente al español con pluscuamperfecto pasivo para reflejar que la acción precede al juicio del enunciado.
- source_word: σωτηρία
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - salvación
  - rescate
  - victoria
  lexicon: BDAG
  rationale: En 1 Macabeos el término remite a una salvación concreta e ისტორical. «Liberación» conserva ese sentido de rescate/auxilio nacional sin cargar el texto con un matiz doctrinal posterior.
- source_word: διὰ χειρὸς αὐτῶν
  english_pob_choice: through their hand
  chosen_spanish: por cuya mano
  alternatives_spanish:
  - por medio de los cuales
  - a través de ellos
  - por sus manos
  lexicon: BDAG
  rationale: La construcción se mantiene como un giro idiomático semítico/sep­tua­gin­ta­l. «Por cuya mano» reproduce la imagen de agencia mediada y respeta el sabor del original sin sonar mecánico en español.
theological_decisions:
- issue: Naturaleza de σωτηρία en un contexto histórico-militar
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - victoria
  rationale: El pasaje habla de la acción concreta por la cual Israel fue rescatado. «Liberación» preserva esa referencia histórica y evita tanto una espiritualización indebida como una reducción meramente bélica.
  doctrine_reference: 'DOCTRINE.md: primacía del sentido del original; no imponer formulaciones tradicionales cuando el contexto es histórico'
- issue: Mantenimiento del giro de agencia διὰ χειρὸς αὐτῶν
  english_pob_reading: through their hand
  chosen_spanish_reading: por cuya mano
  alternative_spanish_readings:
  - por medio de los cuales
  - a través de ellos
  rationale: La imagen de la mano expresa mediación humana en una obra atribuida en última instancia a Dios o a su acción en la historia. Se conserva el valor figurado del original sin sobreexplicarlo.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; conservar la textura bíblica y la relación agente-instrumento'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: mantener la cláusula relativa cerca del sustantivo que modifica y conservar la construcción de agencia con mano. También se ha preferido un español natural que refleje el orden y la relación gramatical del griego sin depender de fórmulas eclesiásticas fijas.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; por tanto no hay ajuste de tetragrámaton.
  - «Liberación» se usa aquí en sentido histórico-nacional, coherente con el contexto de 1 Macabeos y con la elección inglesa de «deliverance».
  - La nota [a] preserva la alternativa idiomática para la expresión de agencia, ya que el español admite más naturalidad con «por medio de ellos» o «por su mano».
