translation:
  language: es
  text: Aguzan su lengua como una serpiente; el veneno de víbora[a] está bajo sus labios. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «áspid»; el hebreo nombra una serpiente venenosa, pero la especie exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: «Selah» probablemente es una notación litúrgica o musical; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: שָֽׁנֲנ֣וּ
  english_pob_choice: sharpen
  chosen_spanish: aguzan
  alternatives_spanish:
  - afilan
  - filan
  - ahilan
  lexicon: HALOT
  rationale: El hebreo en pi’el expresa la idea de hacer más agudo o cortante. En español, «aguzar» comunica bien la imagen poética de una lengua hecha peligrosa por el habla, y evita una repetición menos natural de «afilar» aplicada a la lengua.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - sus lenguas
  lexicon: HALOT
  rationale: El hebreo usa el singular con sufijo plural, creando una imagen colectiva. En español, «su lengua» conserva ese singular colectivo y suena más natural que pluralizarlo.
- source_word: כְּמוֹ נָחָשׁ
  english_pob_choice: like a snake
  chosen_spanish: como serpiente
  alternatives_spanish:
  - como serpiente
  - como culebra
  - como víbora
  lexicon: HALOT
  rationale: «נָחָשׁ» designa una serpiente/serpiente venenosa en sentido amplio. «Serpiente» es claro y digno en español bíblico, y mantiene el valor genérico sin fijar una especie no requerida por el contexto.
- source_word: חֲמַת
  english_pob_choice: the venom
  chosen_spanish: el veneno
  alternatives_spanish:
  - el veneno
  - la ponzoña
  lexicon: HALOT
  rationale: En combinación con una serpiente o víbora, el sustantivo alude a la sustancia letal del animal. «Veneno» es el equivalente más transparente en español; «ponzoña» es posible pero más arcaizante.
- source_word: עַכְשׁוּב
  english_pob_choice: viper
  chosen_spanish: víbora
  alternatives_spanish:
  - víbora
  - áspid
  - víbora venenosa
  lexicon: HALOT
  rationale: El término hebreo nombra una serpiente venenosa, pero la especie exacta es incierta. «Víbora» conserva la fuerza zoológica y el carácter peligroso sin imponer una identificación más precisa de la que permite el hebreo.
- source_word: תַּ֖חַת שְׂפָתֵ֣י/מוֹ
  english_pob_choice: is under their lips
  chosen_spanish: está bajo sus labios
  alternatives_spanish:
  - está bajo sus labios
  - se esconde bajo sus labios
  - está debajo de sus labios
  lexicon: HALOT
  rationale: La preposición expresa ubicación inferior o encubierta. «Está bajo sus labios» mantiene la imagen de algo oculto y letal en la palabra pronunciada, con una construcción natural en español.
- source_word: סֶֽלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: El término se translitera porque su función precisa es incierta y probablemente litúrgico-musical. No se traduce interpretativamente para no borrar la tensión documental del hebreo.
theological_decisions:
- issue: El paralelismo entre lengua y serpiente comunica violencia verbal sin suavizar el texto.
  english_pob_reading: Their speech is portrayed as deadly and deceitful through the metaphor of a snake and viper venom.
  chosen_spanish_reading: Su habla se presenta como mortal y engañosa mediante la metáfora de la serpiente y el veneno de víbora.
  alternative_spanish_readings:
  - Su habla se presenta como engañosa mediante la metáfora de la serpiente.
  - Su lengua es comparada con un animal venenoso.
  rationale: La traducción conserva la carga moral y la agresividad de la imagen. No se diluye en una paráfrasis general sobre malas palabras, porque el hebreo usa una metáfora corporal y venenosa muy concreta.
  doctrine_reference: Salmo 140:3-4; Santiago 3:6
- issue: Selah se mantiene como marcador incierto en lugar de interpretarse como pausa, porque el hebreo no lo define con precisión.
  english_pob_reading: '''Selah'' is likely a liturgical or musical notation; its precise meaning is uncertain.'
  chosen_spanish_reading: Selah se mantiene sin explicación interpretativa dentro del texto principal.
  alternative_spanish_readings:
  - Pausa.
  - Interludio.
  - Nota musical.
  rationale: La transliteración respeta la incertidumbre del término y su posible función cultual o musical. Traducirlo como «pausa» o similar sería más específico que la evidencia disponible.
  doctrine_reference: Salmos 3:2; 9:16; 140:4
translation_notes:
  revision_awareness: 'No se requieren cambios respecto al control más reciente: la traducción mantiene el paralelismo poético, la imagen venenosa y la transliteración de Selah, en línea con el alto grado de acuerdo del verificador.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino en este proyecto, pero aquí no aparece en el verso.
  - Se conserva el singular colectivo «su lengua» para reflejar la forma hebrea singular con sufijo plural.
  - «Serpiente» y «víbora» distinguen el símil general y la referencia más específica del segundo miembro del paralelismo.
  - «Selah» se deja sin traducir en el cuerpo del texto y se aclara solo en nota.
