translation:
  language: es
  text: Pero naves[a] vendrán desde la costa de Quitim, y afligirán a Asur[b], y afligirán a Eber[c]; y él también[d] llegará a su destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quitim puede referirse específicamente a Chipre o, de manera más amplia, a pueblos marítimos del occidente.
    reason: alternative_reading
  - marker: b
    text: Asur también puede traducirse 'Asiria'.
    reason: lexical_alternative
  - marker: c
    text: Eber puede referirse a Eber como nombre de pueblo, a los hebreos, o a pueblos 'del otro lado' de un límite como el Éufrates.
    reason: alternative_reading
  - marker: d
    text: El hebreo dice 'y él también'; el antecedente es incierto, y algunos lo entienden de manera más colectiva como 'también ello' o como un gobernante que representa el poder venido de Quitim.
    reason: alternative_reading
lexical_decisions:
- source_word: צִים
  english_pob_choice: ships
  chosen_spanish: naves
  alternatives_spanish:
  - barcos
  - buques
  lexicon: HALOT
  rationale: El hebreo se refiere a embarcaciones de mar. 'Naves' comunica bien ese sentido en español natural y mantiene un registro digno; 'barcos' es posible, pero algo más general y menos solemne.
- source_word: מִיַּד
  english_pob_choice: from the coast of
  chosen_spanish: desde la costa de
  alternatives_spanish:
  - desde el lado de
  - desde la región de
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'de la mano de', pero en un marco geográfico puede expresar el lado o la zona asociada a un lugar. Dado que aquí se habla de naves, 'desde la costa de' es la equivalencia española más natural y fiel al sentido marítimo.
- source_word: כִּתִּים
  english_pob_choice: Kittim
  chosen_spanish: Quitim
  alternatives_spanish:
  - Kittim
  - Citim
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración. 'Quitim' se ajusta a la tradición española de transliterar el grupo consonántico inicial con Q, y evita una reinterpretación geográfica prematura.
- source_word: וְעִנּוּ
  english_pob_choice: they shall afflict
  chosen_spanish: afligirán
  alternatives_spanish:
  - humillarán
  - oprimirán
  lexicon: HALOT
  rationale: El verbo ענה en piel puede abarcar afligir, humillar u oprimir. 'Afligirán' reproduce bien la amplitud del término sin concretar demasiado el modo de subyugación.
- source_word: אַשּׁוּר
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asiria
  lexicon: HALOT
  rationale: Se preserva la forma hebrea del nombre propio. 'Asiria' es una equivalencia interpretativa válida, pero 'Asur' mantiene mejor la forma del texto fuente y la posible ambigüedad entre pueblo y territorio.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Eber
  alternatives_spanish:
  - el más allá
  - los hebreos
  lexicon: HALOT
  rationale: El término puede funcionar como nombre propio o referirse más ampliamente a un grupo/población relacionada. La transliteración 'Eber' conserva esa ambigüedad mejor que resolverla en español.
- source_word: וְגַם הוּא
  english_pob_choice: and he too
  chosen_spanish: y él también
  alternatives_spanish:
  - y eso también
  - y ello también
  lexicon: HALOT
  rationale: El hebreo usa pronombre masculino singular. 'Y él también' refleja con más precisión la gramática, aunque el antecedente siga siendo incierto.
- source_word: עֲדֵי אֹבֵד
  english_pob_choice: shall come to destruction
  chosen_spanish: llegará a destrucción
  alternatives_spanish:
  - perecerá
  - acabará en destrucción
  - será destruido por completo
  lexicon: HALOT
  rationale: La frase expresa dirección hacia la ruina o el perecer. 'Llegará a destrucción' conserva ese movimiento final sin intensificarlo más allá de lo que el hebreo exige.
theological_decisions:
- issue: Identificación de Quitim, Asur, Eber y el pronombre final singular
  english_pob_reading: Mantener los nombres hebreos Kittim, Asshur y Eber, y traducir el pronombre final como singular 'he' sin especificar el referente histórico.
  chosen_spanish_reading: Conservar Quitim, Asur y Eber, y dejar 'él' en singular sin resolver el referente.
  alternative_spanish_readings:
  - Entender Quitim como Chipre o pueblos marítimos del occidente
  - Entender Asur como Asiria
  - Entender Eber como los hebreos o como pueblos del otro lado del Éufrates
  - Entender el pronombre final como colectivo ('ello', 'eso') o referido a un poder/régulo de Quitim
  rationale: El versículo es profético y su identificación histórica es discutida. La traducción debe preservar la tensión interpretativa del hebreo y no imponer una identificación que el texto no explicita. Por eso se mantienen los nombres propios y el pronombre singular, dejando la ambigüedad intacta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. No se aplicaron revisiones posteriores; el último pase indicó 'unchanged' y alta concordancia.
  spanish_consistency_notes:
  - Se prefirió 'naves' para צִים por ser natural en español y mantener el sentido marítimo.
  - 'Se conservan los nombres propios hebreos como transliteraciones: Quitim, Asur y Eber.'
  - Se mantuvo la ambigüedad del pronombre singular 'él' para no resolver el referente histórico.
  - '''Afligirán'' se usa de forma uniforme para ambos verbos וְעִנּוּ.'
  - El cierre 'llegará a destrucción' conserva la dirección final del hebreo sin sobreinterpretar el resultado.
