translation:
  language: es
  text: Entonces el sacerdote saldrá de la casa hasta la entrada de la casa y cerrará la casa por siete días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejará cerrada la casa por siete días». El verbo hebreo puede denotar cerrar el acceso durante un período de inspección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then ... shall go out
  chosen_spanish: Entonces ... saldrá
  alternatives_spanish:
  - y saldrá
  - entonces el sacerdote saldrá
  lexicon: HALOT
  rationale: En material legal/procedimental, el waw + qatal avanza la secuencia; «Entonces» conserva ese valor consecutivo de manera natural en español, y «saldrá» mantiene el sentido directivo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: En contexto levítico, כֹּהֵן se rinde normalmente por «sacerdote». La forma simple es clara y fiel sin añadir matices no presentes en el hebreo.
- source_word: מִן הַבַּיִת
  english_pob_choice: out of the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - fuera de la casa
  - desde la casa
  lexicon: HALOT
  rationale: Con «saldrá», el español expresa naturalmente el movimiento con «de la casa»; evita una redundancia pesada y conserva la salida desde el interior.
- source_word: אֶל פֶּתַח הַבָּיִת
  english_pob_choice: to the doorway of the house
  chosen_spanish: hacia la entrada de la casa
  alternatives_spanish:
  - a la entrada de la casa
  - al umbral de la casa
  lexicon: HALOT
  rationale: פֶּתַח designa la apertura/entrada. «Entrada» es preciso y natural; «hacia» refleja el desplazamiento sin forzar una localización más específica que el hebreo no exige.
- source_word: וְהִסְגִּיר
  english_pob_choice: and shut up
  chosen_spanish: y cerrará
  alternatives_spanish:
  - y encerrará
  - y pondrá bajo cierre
  lexicon: HALOT
  rationale: El hifil de סגר aquí significa cerrar o dejar cerrado para una inspección. «Cerrará» es claro en español y evita la expresión «shut up», que en español sería ambigua o arcaica.
- source_word: אֶת הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - esa casa
  - la vivienda
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido sin introducir un equivalente interpretativo como «vivienda».
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: El hebreo expresa duración; en español, «por siete días» comunica de forma natural el período de cierre/aislamiento.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo de control indica alta concordancia; por eso la redacción española sigue de cerca el sentido procedimental del hebreo y de la POB inglesa, ajustando solo la idiomaticidad necesaria en español.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן, en línea con el uso levítico.
  - «Entrada de la casa» conserva פֶּתַח sin sobredeterminar el tipo de abertura.
  - «Cerrar» evita un calco poco natural de «shut up» y preserva la función legal del verbo.
  - Se usa «por siete días» para expresar duración de manera fluida en español.
  - La nota al pie conserva la alternativa de cierre/aislamiento sin desplazar el sentido principal.
