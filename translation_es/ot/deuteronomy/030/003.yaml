translation:
  language: es
  text: entonces Yahvé tu Dios restaurará tu suerte[a] y tendrá compasión de ti, y te volverá a reunir[b] de entre todos los pueblos[c] donde Yahvé tu Dios te ha dispersado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «restaurará tu cautiverio»; el hebreo usa un modismo que señala la restauración de una condición de aflicción o exilio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y él volverá y te reunirá».'
    reason: alternative_reading
  - marker: c
    text: 'O: «de entre todas las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, conservando el nombre del pacto y evitando la máscara tradicional de 'SEÑOR'.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: דios expresa fielmente אֱלֹהִים en este contexto de relación de pacto; el posesivo de segunda persona mantiene la cercanía del texto hebreo.
- source_word: שָׁב יְהוָה אֱלֹהֶיךָ אֶת שְׁבוּתְךָ
  english_pob_choice: will restore your fortunes
  chosen_spanish: restaurará tu suerte
  alternatives_spanish:
  - restaurará tu cautiverio
  - hará volver tu cautiverio
  - restaurará tu restauración
  lexicon: HALOT
  rationale: El hebreo usa un modismo de restauración; 'tu suerte' comunica en español la reversión de la condición adversa sin volver literal y confuso el giro idiomático. 'Cautiverio' sería más literal, pero en este versículo podría sugerir erróneamente que el objeto directo son cautivos concretos.
- source_word: וְרִחֲמֶךָ
  english_pob_choice: and have compassion on you
  chosen_spanish: y tendrá compasión de ti
  alternatives_spanish:
  - y te mostrará misericordia
  - y se apiadará de ti
  lexicon: HALOT
  rationale: רָחַם expresa compasión misericordiosa; 'tendrá compasión de ti' es natural, digno y mantiene el matiz afectivo sin forzar un giro arcaico.
- source_word: וְשָׁב וְקִבֶּצְךָ
  english_pob_choice: and he will gather you again
  chosen_spanish: y te volverá a reunir
  alternatives_spanish:
  - y te reunirá otra vez
  - y volverá a reunirte
  lexicon: HALOT
  rationale: El segundo וְשָׁב puede funcionar como matiz reiterativo/adverbial o como verbo separado. 'Te volverá a reunir' comunica bien la recolección restauradora sin introducir una distinción no explícita.
- source_word: מִכָּל הָעַמִּים
  english_pob_choice: from all the peoples
  chosen_spanish: de entre todos los pueblos
  alternatives_spanish:
  - de entre todas las naciones
  - de todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים puede referirse a pueblos o naciones; 'pueblos' preserva el sentido étnico-colectivo plural y suena más natural en español bíblico contemporáneo.
- source_word: הֱפִיצְךָ
  english_pob_choice: has scattered you
  chosen_spanish: te había dispersado
  alternatives_spanish:
  - te había esparcido
  - te había dispersado
  lexicon: HALOT
  rationale: פּוּץ en hifil apunta a dispersar/esparcir; 'dispersado' es claro y encaja con el lenguaje de exilio del versículo.
- source_word: שָׁמָּה
  english_pob_choice: where
  chosen_spanish: adonde
  alternatives_spanish:
  - donde
  - allí donde
  lexicon: HALOT
  rationale: En español, 'adonde' refleja de forma natural el movimiento implícito de la recolección desde los lugares del exilio, manteniendo el valor locativo del relativo.
theological_decisions:
- issue: Modismo hebreo שׁוּב אֶת־שְׁבוּת
  english_pob_reading: restore your fortunes
  chosen_spanish_reading: restaurará tu suerte
  alternative_spanish_readings:
  - restaurará tu cautiverio
  - hará volver tu cautiverio
  - restaurará tu cautiverio y condición
  rationale: Se preserva el carácter idiomático del hebreo como reversión de la desgracia/exilio. 'Tu suerte' es una equivalencia española comprensible que evita confundir el modismo con una devolución literal de cautivos.
  doctrine_reference: Restauración/exilio en el lenguaje profético deuteronómico; cf. Dt 30:1-3.
- issue: Sentido del segundo וְשָׁב unido a וְקִבֶּצְךָ
  english_pob_reading: and he will gather you again
  chosen_spanish_reading: y te volverá a reunir
  alternative_spanish_readings:
  - y volverá a reunirte
  - y te reunirá otra vez
  - y regresará para reunirte
  rationale: El hebreo permite entender el verbo como un giro reiterativo o como verbo independiente. La redacción española conserva la idea de nueva reunión/restauración sin imponer una lectura más fuerte de 'volver' aplicada a Dios mismo.
  doctrine_reference: Restauración del pueblo disperso; cf. lenguaje de reunión en exilio y pacto.
translation_notes:
  revision_awareness: 'La versión sigue de cerca la decisión del POB en inglés: mantener el modismo de restauración para שׁוּב אֶת־שְׁבוּת, traducir רִחַם con compasión, y reflejar la posibilidad de leer וְשָׁב como matiz reiterativo unido a קִבֵּץ. No se detectaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al estándar del proyecto.
  - '''Pueblos'' conserva el plural colectivo de עַמִּים sin forzar ''naciones'' como única opción.'
  - '''Restaurará tu suerte'' prioriza la claridad idiomática en español sin ocultar la nota sobre el cautiverio.'
  - La estructura verbal evita un calco pesado pero conserva la secuencia de restauración, compasión y reunión.
