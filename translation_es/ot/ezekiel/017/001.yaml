lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: El hebreo con waw consecutiva e היה introduce una secuencia narrativa/formulaica. En español, "Y vino" conserva el movimiento discursivo natural de la fórmula profética sin volverla demasiado rígida o arcaizante.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética, דָּבָר nombra la revelación divina. "La palabra" preserva el idiomatismo profético y su fuerza canónica mejor que una explicación más interpretativa como "mensaje".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que en español se conserva el nombre divino propio como "Yahvé". No se sustituye por un título, siguiendo la política POB y la evidencia de la fuente.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se traduce de forma directa y natural como "a mí". Se evita un giro más solemne que no añade precisión.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido del discurso. "Diciendo:" mantiene la fórmula profética y prepara la cita directa con claridad; el dos puntos en español funciona mejor que la coma inglesa.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa privilegia la transliteración del nombre divino y rechaza la sustitución por un título. En español, "Yahvé" conserva esa decisión teológica y textual, mientras que "el SEÑOR" ocultaría el nombre y "Jehová" no corresponde a la forma elegida por POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la fórmula profética breve, el nombre divino como transliteración y el infinitivo lamed con un equivalente español idiomático. No se requiere revisión respecto del paso más reciente, que quedó sin cambios.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de manera consistente con el estándar del proyecto para יהוה.
  - '"La palabra" conserva el valor profético-revelatorio de דְבַר sin añadir explicaciones.'
  - La nota al pie ofrece la alternativa literal documentada en el audit trail inglés, sin duplicar marcadores.
  - La puntuación con dos puntos en "diciendo:" refleja mejor el arranque de discurso en español.
