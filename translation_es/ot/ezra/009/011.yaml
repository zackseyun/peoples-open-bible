base_translation:
  language: en
  yaml_path: translation/ot/ezra/009/011.yaml
  text: which you commanded by the hand of your servants the prophets[a], saying, ‘The land that you are entering to possess is a land of impurity because of the impurity of the peoples of the lands[b], because of their abominations with which they have filled it from end to end with their uncleanness.’
  footnotes:
  - marker: a
    text: Hebrew literally, 'from mouth to mouth,' an idiom meaning the land was filled completely, from one end to the other.
    reason: lexical_alternative
  - marker: b
    text: Or 'an unclean land' for 'a land of impurity.' The Hebrew term carries defilement language that may include both ritual and moral overtones.
    reason: lexical_alternative
