translation:
  language: es
  text: Desde el día en que Yahvé sacó a nuestros padres de la tierra de Egipto hasta este día, hemos sido desobedientes a Yahvé nuestro Dios, y nos hemos obstinado[a] en no escuchar su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hemos actuado con descuido al no escuchar su voz». El verbo griego ἐσχεδιάζομεν es poco común y puede sugerir negligencia o falta de atención, más que una forma más específica de rebelión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τῆς ἡμέρας ἧς
  english_pob_choice: From the day when
  chosen_spanish: Desde el día en que
  alternatives_spanish:
  - Desde el día que
  - Desde que
  lexicon: LSJ
  rationale: La expresión marca un punto de inicio de una condición continua. «Desde el día en que» conserva bien la idea temporal de comienzo y suena natural en español bíblico actual.
- source_word: ἐξήγαγεν
  english_pob_choice: brought ... out
  chosen_spanish: sacó ... de
  alternatives_spanish:
  - sacó ... fuera de
  - hizo salir ... de
  lexicon: LSJ
  rationale: El verbo expresa sacar o hacer salir. «Sacó ... de» reproduce con naturalidad el movimiento de éxodo y mantiene la resonancia narrativa del texto griego.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Maestro
  lexicon: LSJ
  rationale: En este contexto deuterocanónico, Κύριος se refiere al Dios de Israel. En español bíblico, «el Señor» comunica ese título con claridad y dignidad; se evita «Yahvé» aquí porque el texto fuente es griego y la forma de cita no muestra el nombre hebreo directamente.
- source_word: τοὺς πατέρας ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros progenitores
  lexicon: LSJ
  rationale: El griego es masculino plural y alude a los antecesores de Israel. «Nuestros padres» preserva la forma concreta del original y la carga histórica de la confesión.
- source_word: ἐκ γῆς Αἰγύπτου
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra egipcia
  - fuera de Egipto
  lexicon: LSJ
  rationale: «De la tierra de Egipto» refleja de cerca la formulación griega y mantiene el lenguaje solemne del éxodo.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: LSJ
  rationale: Es una expresión temporal estándar que indica continuidad desde el éxodo hasta el presente confesional. «Hasta este día» es breve y fiel.
- source_word: ἤμεθα ἀπειθοῦντες
  english_pob_choice: we have been disobedient
  chosen_spanish: hemos sido desobedientes
  alternatives_spanish:
  - hemos estado desobedientes
  - éramos desobedientes
  lexicon: LSJ
  rationale: La construcción perifrástica expresa una conducta continua desde el pasado hasta ahora. «Hemos sido desobedientes» conserva ese valor durativo en español sin forzar un giro demasiado literal.
- source_word: πρὸς Κύριον θεὸν ἡμῶν
  english_pob_choice: to the Lord our God
  chosen_spanish: al Señor nuestro Dios
  alternatives_spanish:
  - contra el Señor nuestro Dios
  - hacia el Señor nuestro Dios
  lexicon: LSJ
  rationale: Con ἀπειθέω, πρός puede señalar la relación dirigida al destinatario de la desobediencia. «Al Señor nuestro Dios» suena natural en español y no añade una hostilidad explícita que el griego no exige.
- source_word: ἐσχεδιάζομεν
  english_pob_choice: we have been stubborn
  chosen_spanish: hemos sido obstinados
  alternatives_spanish:
  - hemos actuado con negligencia
  - hemos sido descuidados
  - hemos sido indiferentes
  lexicon: LSJ
  rationale: El verbo es raro y, en el contexto, sugiere resistencia voluntaria más que simple descuido. «Hemos sido obstinados» recoge mejor esa fuerza que una lectura meramente negligente.
- source_word: πρὸς τὸ μὴ ἀκούειν
  english_pob_choice: about not listening
  chosen_spanish: en no escuchar
  alternatives_spanish:
  - para no escuchar
  - al no escuchar
  - respecto de no escuchar
  lexicon: LSJ
  rationale: La construcción expresa la esfera o el modo de esa obstinación. «En no escuchar» es natural en español y mantiene la relación con la acción descrita sin convertirla en una finalidad más fuerte de la que el griego requiere.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su palabra
  - su voz
  lexicon: LSJ
  rationale: El griego dice literalmente «voz», una forma bíblica común para referirse a la palabra u आदेश de Dios. «Su voz» conserva el idiomático del texto fuente; «su palabra» sería ya interpretativo.
theological_decisions:
- issue: Título divino Κύριος en griego deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto fuente usa Κύριος, no el tetragrámaton hebreo. En este marco, «el Señor» preserva el título divino sin importar una convención tipográfica de mayúsculas ni introducir una transliteración que el griego no ofrece directamente.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / equivalente reverente en español'
- issue: Tensión entre desobediencia general y obstinación específica
  english_pob_reading: we have been disobedient ... we have been stubborn about not listening to his voice
  chosen_spanish_reading: hemos sido desobedientes ... hemos sido obstinados en no escuchar su voz
  alternative_spanish_readings:
  - hemos sido desobedientes ... hemos sido negligentes en no escuchar su voz
  - hemos sido desobedientes ... hemos sido descuidados en no escuchar su voz
  rationale: La revisión inglesa favorece una lectura más fuerte de ἐσχεδιάζομεν como resistencia voluntaria. «Obstinados» mantiene esa tensión confesional sin suavizarla a mera negligencia.
  doctrine_reference: 'DOCTRINE.md: conservar la fuerza del término raro cuando el contexto la aclara'
translation_notes:
  revision_awareness: El inglés audit trail pasó de una lectura más débil de ἐσχεδιάζομεν como «negligent/careless» a una más fuerte como «stubborn». La versión española sigue la revisión más reciente y, al mismo tiempo, conserva en nota la alternativa léxica más suave porque el verbo griego es raro y semánticamente discutible.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para Κύριος, coherente con el título divino en el texto griego.
  - Se tradujo ἀπειθοῦντες con «desobedientes», conservando el sentido moral-legal del término.
  - La frase final usa «su voz» para respetar el léxico literal del griego.
  - La puntuación y el registro buscan una prosa bíblica moderna, solemne y publicable.
