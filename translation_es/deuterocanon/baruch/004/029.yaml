translation:
  language: es
  text: Porque el que trajo sobre ustedes los males les traerá una alegría eterna con su salvación[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gozo eterno». El griego εὐφροσύνη puede traducirse «alegría» o «gozo».
    reason: lexical_alternative
  - marker: b
    text: O «con su liberación». El griego σωτηρία puede significar «salvación» o «liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγαγὼν
  english_pob_choice: brought ... upon
  chosen_spanish: os trajo ... los males
  alternatives_spanish:
  - os causó ... los males
  - os hizo venir ... los males
  - os trajo ... las desgracias
  lexicon: BDAG
  rationale: El participio aoristo de ἐπάγω tiene sentido causativo. «Os trajo ... los males» conserva el paralelismo verbal con el futuro ἐπάξει y suena natural en español; «los males» refleja τὰ κακά con fuerza directa sin introducir un matiz más interpretativo que «desgracias».
- source_word: τὰ κακὰ
  english_pob_choice: evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males
  - los evils
  - las desgracias
  - las calamidades
  lexicon: BDAG
  rationale: κακά puede ser «males», «calamidades» o «desdichas». «Los males» es una equivalencia sobria y suficientemente fuerte en español bíblico, sin suavizar el peso moral o doloroso del término.
- source_word: ἐπάξει
  english_pob_choice: will bring
  chosen_spanish: os traerá
  alternatives_spanish:
  - os traerá
  - os hará venir
  - os causará
  lexicon: BDAG
  rationale: Se mantiene «traerá» para conservar el juego verbal con «trajo» en la primera mitad del versículo, como hace el texto griego con el mismo verbo en dos tiempos distintos.
- source_word: τὴν αἰώνιον εὐφροσύνην
  english_pob_choice: everlasting gladness
  chosen_spanish: una alegría eterna
  alternatives_spanish:
  - un gozo eterno
  - una alegría perpetua
  - una dicha eterna
  lexicon: BDAG
  rationale: εὐφροσύνη puede rendirse como «alegría», «gozo» o «regocijo». «Alegría» resulta natural y clara en español, y «eterna» traduce αἰώνιον de manera directa. Se conserva la alternativa semántica «gozo» en la nota.
- source_word: μετὰ τῆς σωτηρίας ὑμῶν
  english_pob_choice: with your salvation
  chosen_spanish: con vuestra salvación
  alternatives_spanish:
  - con vuestra salvación
  - junto con vuestra liberación
  - con vuestra liberación
  lexicon: BDAG
  rationale: σωτηρία puede significar «salvación» o «liberación». Se prefiere «salvación» por su peso teológico y porque encaja bien con el registro bíblico del pasaje; «con» conserva la relación acompañante del griego μετὰ.
theological_decisions:
- issue: Agencia divina tanto en el juicio como en la restauración
  english_pob_reading: The same divine agent who brought calamity is said to bring everlasting gladness and salvation.
  chosen_spanish_reading: El mismo agente divino que trajo los males también traerá la alegría eterna y la salvación.
  alternative_spanish_readings:
  - Suavizar la primera mitad para no atribuir directamente los males a Dios.
  - Reformular en pasiva impersonal para atenuar la agencia.
  rationale: El griego atribuye ambas acciones al mismo sujeto con verbos paralelos. La traducción conserva esa tensión teológica sin suavizar el hecho de que el mismo que permitió/causó el juicio es el que traerá la restauración.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que eliminó «these» por no estar en el griego. Por eso la línea española no añade demostrativos y mantiene una correspondencia directa con ὁ γὰρ ἐπαγαγών / ἐπάξει.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se preserva el paralelismo verbal «trajo / traerá» para reflejar el mismo verbo griego en participio y futuro.
  - «Salvación» se mantiene por defecto doctrinal; la alternativa «liberación» queda registrada en nota.
  - No se introducen demostrativos ajenos al griego, en consonancia con la revisión del POB en inglés.
