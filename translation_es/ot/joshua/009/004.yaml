base_translation:
  language: en
  yaml_path: translation/ot/joshua/009/004.yaml
  text: They too acted with cunning[a], and went and made provisions, and took worn-out sacks for their donkeys, and worn-out wineskins[b], split open and patched.
  footnotes:
  - marker: a
    text: Or 'made provisions for themselves'; the Hebrew verb וַיִּצְטַיָּרוּ is difficult and has been understood in more than one way. The context of deceptive appearance supports 'disguised themselves' here.
    reason: alternative_reading
  - marker: b
    text: Or 'bound up' or 'tied up,' describing wineskins repaired by tying after they had split.
    reason: lexical_alternative
