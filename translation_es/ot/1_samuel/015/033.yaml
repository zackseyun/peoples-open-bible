translation:
  language: es
  text: 'Entonces Samuel dijo[a]: «Así como tu espada dejó a las mujeres sin hijos, así tu madre quedará sin hijos entre las mujeres». Y Samuel despedazó[b] a Agag delante de Yahvé en Gilgal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así como tu espada ha dejado enlutadas a las mujeres, así tu madre quedará enlutada entre las mujeres». El hebreo usa el mismo verbo en ambas cláusulas, subrayando una retribución medida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cortó a Agag en pedazos»; tradicionalmente, «lo hizo pedazos». El verbo hebreo es muy violento y concreto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁכְּלָה / תִּשְׁכַּל
  english_pob_choice: has made women childless / will be childless
  chosen_spanish: dejó a las mujeres sin hijos / quedará sin hijos
  alternatives_spanish:
  - las privó de hijos / será privada de hijos
  - las dejó sin hijos / quedará privada de hijos
  - las enlutó por sus hijos / quedará enlutada por sus hijos
  lexicon: HALOT
  rationale: La raíz שׁכל en este contexto expresa la pérdida de hijos. En español, «dejar sin hijos» comunica de forma natural el resultado y conserva el paralelismo entre ambas cláusulas. «Privó de hijos» es posible, pero menos fluido; «enlutó» desplaza el sentido hacia duelo, no al resultado léxico principal.
- source_word: חַרְבֶּךָ
  english_pob_choice: your sword
  chosen_spanish: tu espada
  alternatives_spanish:
  - tu arma
  - la espada de tu mano
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «espada», que en español también funciona metonímicamente para la violencia ejercida. No hace falta explicitar la mano ni generalizar a «arma».
- source_word: מִנָּשִׁים
  english_pob_choice: among women
  chosen_spanish: entre las mujeres
  alternatives_spanish:
  - de entre las mujeres
  - entre todas las mujeres
  lexicon: HALOT
  rationale: La preposición מן en esta construcción comparativa se vierte de modo idiomático como «entre», manteniendo la idea de comparación o grupo de referencia sin sonar forzado en español.
- source_word: וַיְשַׁסֵּף
  english_pob_choice: hacked ... to pieces
  chosen_spanish: hizo pedazos
  alternatives_spanish:
  - cortó en pedazos
  - hizo trizas
  - despedazó
  lexicon: HALOT
  rationale: El verbo שׁסף es violento y concreto. «Hizo pedazos» preserva la fuerza sin recurrir a un giro demasiado arcaico; «cortó en pedazos» o «despedazó» son alternativas válidas, pero la forma elegida resulta más directa y publicable.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה, traducido como «Yahvé». «Delante de» mantiene la relación espacial/ritual de לִפְנֵי sin convertirla en una formulación demasiado cultual o jurídica para el español.
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Gilgal
  - en Guilgal
  lexicon: HALOT
  rationale: Como topónimo, «en Gilgal» es la opción más natural en español. Se mantiene la forma tradicional del nombre propio en transliteración simple.
theological_decisions:
- issue: Intensidad de la retribución expresada por el mismo verbo en ambas cláusulas
  english_pob_reading: The Hebrew uses the same verb in both clauses, emphasizing measured retribution.
  chosen_spanish_reading: El hebreo usa el mismo verbo en ambas cláusulas, subrayando una retribución medida.
  alternative_spanish_readings:
  - El hebreo repite el mismo verbo en ambas cláusulas, marcando retribución proporcional.
  - La repetición del verbo pone de relieve la correspondencia del castigo.
  rationale: La traducción española debe conservar el paralelismo verbal con «dejó... sin hijos / quedará sin hijos» para no perder el efecto de correspondencia entre acción y juicio. Eso preserva la tensión ética y retórica del texto sin añadir comentario interpretativo al cuerpo del versículo.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; DOCTRINE.md contested terms: lexical symmetry and retribution'
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado en el sentido, el paralelismo verbal y la intensidad del verbo final. No se registraron revisiones posteriores que alteren la lectura aprobada; se mantiene el estado de alta concordancia y la decisión de conservar la retribución medida y la violencia explícita.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Entre las mujeres» conserva el valor comparativo de מִנָּשִׁים sin calco rígido.
  - «Hizo pedazos» mantiene la fuerza del verbo hebreo sin arcaísmo excesivo.
  - La puntuación reproduce el cierre narrativo con la coordinación final del acto de Samuel.
