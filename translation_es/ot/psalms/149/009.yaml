review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: לַעֲשׂוֹת = «para ejecutar», בָּהֶם = «sobre ellos», מִשְׁפָּט כָּתוּב = «el juicio escrito», הָדָר = «honor», חֲסִידָיו = «sus fieles», y הַלְלוּ יָהּ = una exhortación de alabanza con «Yah». Sin embargo, «¡Alaben a Yah!» introduce un sujeto explícito de segunda persona plural que en español suena menos natural como cierre litúrgico que «¡Alaben a Yah!»? The main issue is actually idiomatic register with the fixed doxological formula; a more natural and church-readable rendering is «¡Alaben a Yah!»? Better yet, in neutral biblical Spanish, «¡Alaben a Yah!» is acceptable but the verse closes more idiomatically with «¡Alaben a Yah!»? The more concrete needed repair is stylistic in the footnote and wording choice around «honor/honra». The text itself is largely faithful, but a small readability improvement is warranted.'
  spanish_quality_summary: 'La redacción es clara y digna. «Para ejecutar sobre ellos el juicio escrito» suena natural y fiel. «Esto es un honor para todos sus fieles» también funciona bien, aunque «una honra» sería algo más tradicional; no es necesario cambiarlo. La principal mejora menor es la nota [a], donde «O: “el juicio escrito”» no aporta una alternativa real porque repite exactamente el texto; conviene reformularla para reflejar de verdad la explicación del inglés: «es decir, el juicio ya registrado o prescrito por Dios».'
  glossary_alignment: 'El borrador sigue bien la terminología del proyecto: mantiene «Yah» para יָהּ, evita «SEÑOR», usa «fieles» para חֲסִידָיו en vez de «santos», y conserva «juicio» para מִשְׁפָּט. No hay conflictos sustanciales con el glosario. La única corrección es documental: la nota [a] debe presentar una alternativa o aclaración real, no repetir la misma frase del texto.'
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: 'Dice «O: “el juicio escrito”», pero esa frase ya está en el texto principal. Según el rastro inglés, la nota debe explicar el sentido: «el juicio ya registrado o prescrito por Dios».'
  - severity: low
    issue: Inconsistencia menor en la razón de la nota [d]
    rationale: En el inglés la nota [d] está clasificada como previous_rendering; en español aparece como alternative_reading. No afecta el texto bíblico, pero conviene armonizar la documentación si el sistema lo requiere.
  revised_spanish_text: para ejecutar sobre ellos el juicio escrito[a]. Esto es un honor[d] para todos sus fieles[b]. ¡Alaben a Yah[c]!
  revised_footnotes:
  - marker: a
    text: Es decir, el juicio ya registrado o prescrito por Dios.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus fieles»; tradicionalmente: «sus santos».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «Alaben a Yah» (hallelu-yah); tradicionalmente se translitera «Aleluya».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Esto es honra».'
    reason: previous_rendering
  revision_rationale: 'El texto principal español es fiel y natural, así que solo se requiere una reparación menor: corregir la nota [a] para que no repita literalmente el texto, sino que refleje la aclaración preservada en el audit trail inglés. También se armoniza la razón de la nota [d] con la documentación inglesa.'
