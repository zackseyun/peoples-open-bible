translation:
  language: es
  text: 'Los habitantes de Jebús dijeron a David[a]: «No entrarás aquí». Pero David capturó la fortaleza de Sion, es decir, la Ciudad de David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No vendrás aquí» / «No entrarás aquí». El hebreo literalmente dice: «No vendrás aquí», funcionando como una negativa de acceso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי יְבוּס
  english_pob_choice: the inhabitants of Jebus
  chosen_spanish: los habitantes de Jebús
  alternatives_spanish:
  - los que habitaban en Jebús
  - los residentes de Jebús
  lexicon: HALOT
  rationale: El constructo hebreo designa literalmente a quienes habitan Jebús. «Habitantes» conserva el sentido colectivo de forma natural en español y mantiene la referencia al lugar.
- source_word: לֹא תָבֹוא הֵנָּה
  english_pob_choice: You will not come in here
  chosen_spanish: No entrarás aquí
  alternatives_spanish:
  - No vendrás aquí
  - No entrarás acá
  lexicon: HALOT
  rationale: El hebreo usa «venir» + «aquí» como fórmula idiomática de denegación de acceso. En español, «No entrarás aquí» comunica mejor la negativa de entrada sin forzar la expresión.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto militar, el verbo indica la toma de una plaza fortificada. «Capturó» conserva bien ese matiz bélico y sigue de cerca la decisión inglesa auditable.
- source_word: מְצֻדַת צִיּוֹן
  english_pob_choice: the stronghold of Zion
  chosen_spanish: la fortaleza de Sion
  alternatives_spanish:
  - el bastión de Sion
  - la ciudadela de Sion
  lexicon: HALOT
  rationale: מְצוּדָה puede ser «fortaleza» o «bastión». «Fortaleza» es clara en español y mantiene la idea de una posición defensiva; «Sion» sigue la forma española usual del topónimo.
- source_word: הִיא עִיר דָּוִיד
  english_pob_choice: that is, the City of David
  chosen_spanish: es decir, la Ciudad de David
  alternatives_spanish:
  - esto es, la Ciudad de David
  - la cual es la Ciudad de David
  lexicon: HALOT
  rationale: La cláusula pronominal funciona como identificación explicativa. «Es decir» hace explícita la equivalencia sin añadir contenido ajeno al hebreo. «Ciudad de David» se conserva como nombre propio fijo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y concuerda con el control inglés: mantiene la negativa de entrada en forma idiomática, traduce el término militar con fuerza apropiada y conserva la apposición explicativa final sin suavizarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Jebús» y «Sion» se mantienen como topónimos bíblicos establecidos en español.
  - Se evita «Señor» o una paráfrasis explicativa adicional, porque el hebreo aquí es narrativo y preciso.
