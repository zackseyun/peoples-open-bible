  glossary_alignment: 'Se respeta correctamente «Yahvé» para יְהוָה. No hay conflictos con la terminología base del proyecto. La principal desalineación está en רָקִיק: «galleta» no encaja bien con el uso sacrificial; «oblea» preserva mejor el valor técnico sin ser ininteligible. La nota debe trasladarse desde לִפְנֵי יְהוָה a «con aceite», en línea con la justificación léxica inglesa.'
