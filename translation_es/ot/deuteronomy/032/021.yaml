revisions:
- from: Ellos me provocaron a celos con lo que no es un dios[a]; me irritaron con sus ídolos. Así que yo los provocaré a celos con los que no son pueblo[c][b]; los irritaré con una nación necia.
  to: Ellos me provocaron celos con lo que no es un dios[a]; me provocaron a ira con sus ídolos. Así que yo les provocaré celos con los que no son un pueblo[c][b]; les provocaré a ira con una nación necia.
  rationale: 'Se ajusta el español para reflejar mejor los causativos hebreos repetidos y el paralelismo recíproco del versículo: «provocaron celos / les provocaré celos» y «provocaron a ira / les provocaré a ira». También se mejora la naturalidad de «no pueblo» con «no son un pueblo», manteniendo la nota que preserva la formulación más literal y chocante.'
