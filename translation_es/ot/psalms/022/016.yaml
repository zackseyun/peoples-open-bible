translation:
  language: es
  text: Se seca como un tiesto mi fuerza, y mi lengua se pega a mis quijadas[a]; tú me pones en el polvo de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi lengua se pega a mi paladar». El término hebreo para esta parte de la boca es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָבֵשׁ
  english_pob_choice: is dried up
  chosen_spanish: se seca
  alternatives_spanish:
  - se ha secado
  - se marchita
  lexicon: HALOT
  rationale: El verbo expresa el estado de desecación. En español, «se seca» comunica con naturalidad la imagen poética de agotamiento físico sin añadir matices que el hebreo no exige.
- source_word: כַּחֶרֶשׂ
  english_pob_choice: like a potsherd
  chosen_spanish: como un tiesto
  alternatives_spanish:
  - como un pedazo de cerámica
  - como un fragmento de barro
  lexicon: HALOT
  rationale: El sustantivo designa cerámica quebrada o un fragmento de vasija. «Tiesto» conserva en español la imagen breve, seca y frágil del inglés «potsherd» y sigue siendo comprensible en registro bíblico.
- source_word: כֹּחִי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi vigor
  - mi poder
  lexicon: HALOT
  rationale: Aquí כֹּחַ alude a fuerza corporal o vitalidad. «Fuerza» es la equivalencia más natural y fiel en español.
- source_word: וּלְשׁוֹנִי
  english_pob_choice: and my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - y mi lengua
  lexicon: HALOT
  rationale: Referencia anatómica directa; en español conviene mantener la forma simple y literal.
- source_word: מֻדְבָּק
  english_pob_choice: sticks
  chosen_spanish: se pega
  alternatives_spanish:
  - se adhiere
  - queda pegada
  lexicon: HALOT
  rationale: El participio pasivo expresa que algo queda adherido. «Se pega» reproduce la imagen física con buen flujo poético en español.
- source_word: מַלְקוֹחָי
  english_pob_choice: to my jaws
  chosen_spanish: a mis mandíbulas
  alternatives_spanish:
  - a mis quijadas
  - a mi paladar
  lexicon: HALOT
  rationale: El término es difícil y puede referirse a la parte interna de la boca o a la mandíbula. «Mandíbulas» mantiene la lectura corporal directa que eligió la POB inglesa; se conserva la nota de alternativa por la incertidumbre léxica.
- source_word: וְלַעֲפַר
  english_pob_choice: and ... in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - hasta el polvo
  - al polvo
  lexicon: HALOT
  rationale: La preposición puede sugerir dirección o colocación. En español, «en el polvo» fluye de modo natural con el verbo final y conserva la imagen de postración.
- source_word: מָוֶת
  english_pob_choice: of death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - mortal
  - del sepulcro
  lexicon: HALOT
  rationale: Se preserva el genitivo poético sin interpretar de más como «sepulcro». La expresión mantiene la dureza de la imagen hebrea.
- source_word: תִּשְׁפְּתֵנִי
  english_pob_choice: you lay me
  chosen_spanish: tú me pones
  alternatives_spanish:
  - tú me colocas
  - tú me echas
  lexicon: HALOT
  rationale: El verbo significa poner o colocar. «Tú me pones» conserva el valor de segunda persona directa y la lectura del salmo como oración dirigida a Dios.
theological_decisions:
- issue: Agencia divina en la cláusula final
  english_pob_reading: 'Direct address to God: ''you lay me in the dust of death.'''
  chosen_spanish_reading: «tú me pones en el polvo de la muerte» como خطاب directo a Dios
  alternative_spanish_readings:
  - «soy puesto en el polvo de la muerte»
  - «me han puesto en el polvo de la muerte»
  rationale: 'Se preserva la segunda persona singular del hebreo, manteniendo la tensión teológica: el sufriente atribuye su extrema postración a la acción soberana de Dios sin resolver cómo se relaciona con los agentes humanos hostiles.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y coincide con la lectura auditada de la POB inglesa: imagen de desecación, comparación con cerámica quebrada, lengua adherida y cierre en segunda persona dirigido a Dios. No se reportan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la segunda persona del verbo final por coherencia con el salmo en oración directa, sin explicitarlo en el texto para no añadir contenido no presente.
  - Se conserva un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - La nota sobre «paladar» se ancla en el punto léxico donde existe incertidumbre en la parte de la boca; el texto principal usa «mandíbulas» por coherencia con la decisión inglesa auditada.
