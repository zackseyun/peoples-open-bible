translation:
  language: es
  text: Entonces los hombres tomaron parte de sus provisiones, pero no pidieron consejo[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la boca de Yahvé»; es decir, su dirección o decisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - tomaron para sí
  - recibieron
  lexicon: HALOT
  rationale: לקח expresa la acción concreta de tomar. «Tomaron» conserva esa concreción sin añadir matices no presentes en el hebreo.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los hombres de Israel
  - los líderes
  lexicon: HALOT
  rationale: El sustantivo significa simplemente «los hombres». El contexto identifica después a los representantes, pero no lo dice explícitamente aquí.
- source_word: מִצֵּידָם
  english_pob_choice: some of their provisions
  chosen_spanish: parte de sus provisiones
  alternatives_spanish:
  - algo de sus alimentos
  - sus provisiones
  lexicon: HALOT
  rationale: צֵיד se refiere a provisiones para el camino; el prefijo מִן introduce valor partitivo. «Parte de sus provisiones» comunica bien esa idea sin hacerla más específica de lo que el texto exige.
- source_word: פִּי יְהוָה
  english_pob_choice: the counsel of Yahweh
  chosen_spanish: consultaron a Yahvé
  alternatives_spanish:
  - buscaron la palabra de Yahvé
  - pidieron consejo de Yahvé
  - consultaron el parecer de Yahvé
  lexicon: HALOT
  rationale: La expresión literal es «la boca de Yahvé», un modismo para buscar su decisión o dirección. En español, el verbo «consultar» expresa de forma natural la búsqueda de dirección divina sin desfigurar el giro idiomático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto y en lugar de una sustitución por título.
- source_word: לֹא שָׁאָלוּ
  english_pob_choice: did not ask counsel from
  chosen_spanish: no consultaron
  alternatives_spanish:
  - no preguntaron a
  - no indagaron a
  lexicon: HALOT
  rationale: שאל puede significar «preguntar, consultar, inquirir». Dado el objeto idiomático, «no consultaron» expresa la falta de búsqueda de dirección divina de manera fluida y fiel.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio divino en vez de reemplazarlo por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
- issue: Valor del modismo פִּי יְהוָה
  english_pob_reading: the counsel of Yahweh
  chosen_spanish_reading: consultaron a Yahvé
  alternative_spanish_readings:
  - consultaron la boca de Yahvé
  - consultaron el consejo de Yahvé
  - buscaron dirección de Yahvé
  rationale: El hebreo literalmente dice «la boca de Yahvé», expresión idiomática para pedir su decisión o dirección. En español, el verbo «consultar» preserva el sentido de buscar guía divina sin introducir una imagen extraña o demasiado explicativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense over translation tradition'
translation_notes:
  revision_awareness: El borrador sigue el giro revisado del audit trail inglés, que prefiere una formulación más literal y natural para el modismo de פִּי יְהוָה. En español se resolvió con «no consultaron a Yahvé», manteniendo el valor idiomático de consulta/guía divina sin calco forzado. También se preserva el nombre divino como Yahvé, conforme al criterio del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente con el estándar del proyecto.
  - «Consultar» se emplea para el modismo de búsqueda de dirección divina, evitando calcos como «boca de Yahvé» en el texto principal.
  - «Provisiones» mantiene el sentido colectivo de צֵיד y funciona bien con el partitivo «parte de».
