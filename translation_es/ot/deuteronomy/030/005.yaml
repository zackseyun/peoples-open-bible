revisions:
- from: Yahvé tu Dios te hará entrar en la tierra que tus padres poseyeron[a], y tú la poseerás[b]; y te hará bien y te multiplicará más que a tus padres.
  to: Yahvé tu Dios te hará entrar en la tierra que tus padres poseyeron[a], y tú la poseerás; y te hará bien[b] y te multiplicará más que a tus padres.
  rationale: 'Se conserva el texto base casi intacto, pero se corrige la ubicación de la nota [b] para que corresponda al verbo hebreo וְהֵיטִבְךָ («te hará bien»). Además, se ajusta su contenido para reflejar la alternativa inglesa documentada en el audit trail: la traducción principal española adopta la opción más literal («te hará bien»), por lo que la nota debe ofrecer la alternativa contextual «te prosperará».'
