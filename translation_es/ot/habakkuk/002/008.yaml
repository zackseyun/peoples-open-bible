review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura causal del hebreo, la reversión de שלל/ישלוך ('despojar' ... 'despojarán'), la distinción entre גּוֹיִם ('naciones') y עַמִּים ('pueblos'), y la enumeración final sobre la tierra, la ciudad y sus habitantes. Sin embargo, 'la sangre de los hombres' no sigue bien la revisión auditada del POB inglés ('human blood') ni representa con claridad el valor genérico de אָדָם en español actual; además, 'te despojará' en singular desajusta la concordancia más natural con 'todos los pueblos restantes'.
  spanish_quality_summary: El español es generalmente claro y digno, pero puede mejorarse en naturalidad y concordancia. 'Todo el resto de los pueblos te despojará' suena forzado; en español bíblico natural resulta mejor 'todos los pueblos restantes te despojarán' o similar. 'La violencia hecha a' es comprensible pero menos idiomático que 'la violencia hecha contra' o 'la violencia contra'; aun así, puede mantenerse una formulación cercana al audit trail. El cambio principal necesario es evitar 'los hombres' como si fueran varones y ajustar el sujeto plural.
  glossary_alignment: 'No hay conflicto con terminología mayor del proyecto. ''Despojar'' es defendible para שלל y preserva la reversión. ''Naciones'' y ''pueblos'' reflejan bien el cambio léxico. La decisión sobre אָדָם debe alinearse con la revisión inglesa vigente: en español aquí corresponde ''sangre humana'' mejor que ''sangre de los hombres''.'
  issues:
  - severity: medium
    issue: '''la sangre de los hombres'' introduce una lectura masculina marcada'
    rationale: El hebreo אָדָם aquí es genérico/colectivo y el POB inglés fue revisado a 'human blood'. En español contemporáneo 'los hombres' puede sonar excluyente o menos natural que 'humana'.
  - severity: medium
    issue: Concordancia discutible en 'todo el resto de los pueblos te despojará'
    rationale: 'Aunque el singular colectivo puede defenderse, en español natural la frase suena mejor y más clara con sujeto plural: ''todos los pueblos restantes te despojarán''.'
  - severity: low
    issue: El anclaje de la nota [a] sobre 'despojado' es innecesario si se conserva la opción principal sin ambigüedad
    rationale: La alternativa 'saqueado' puede mantenerse, pero no es imprescindible duplicar notas en ambos verbos si se simplifica el verso.
  revised_spanish_text: Porque tú has despojado a muchas naciones, todos los pueblos restantes te despojarán[a], por sangre humana[b] y por la violencia hecha a la tierra, a la ciudad y a todos los que habitan en ella.
  revised_footnotes:
