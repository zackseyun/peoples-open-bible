review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del griego y la línea del POB inglés: una exhortación sapiencial a no arruinar un acto bueno con reproche o con palabras que causan pena. Sin embargo, «en ningún don» desplaza el distributivo de ἐν πάσῃ δόσει («en todo/cada don») hacia una negación absoluta menos natural en español, y «tristeza de palabras» suena más opaco que el griego permite en español.'
  spanish_quality_summary: El texto es mayormente digno y legible, pero «Hijo mío» sobredetermina género frente a Τέκνον, donde el POB inglés preservó amplitud con «My child». En español sapiencial «Hijo mío» es tradicional, pero aquí conviene una opción más inclusiva y fiel como «Hijo[a]» no funciona; mejor «Hijo mío» podría defenderse, aunque la nota alternativa actual («Niño mío») no es la mejor. La reparación principal es mejorar naturalidad y exactitud en la segunda cláusula.
  glossary_alignment: No hay conflictos con terminología-base del proyecto. Las decisiones clave («reproche», «don») son compatibles con el audit trail. No intervienen términos teológicos sensibles del glosario general.
  issues:
  - severity: medium
    issue: «en ningún don» para ἐν πάσῃ δόσει
    rationale: El griego expresa distributivo positivo («en todo/cada don»), no una construcción negativa de alcance total. «En ningún don» en español nace de la negación previa, pero debilita la correspondencia léxica y suena menos directa que «en ningún regalo» o, mejor, «con todo don / en todo don / con cada don».
  - severity: medium
    issue: «tristeza de palabras» es demasiado opaco en español
    rationale: Aunque reproduce la compresión griega, en español resulta poco idiomático y puede sonar como tristeza causada por las palabras de otro, no como palabras que entristecen. El POB inglés conservó literalidad, pero incluso allí añadió nota aclaratoria. En español conviene una formulación un poco más clara, como «penas con tus palabras» o «palabras que causen tristeza», manteniendo nota.
  - severity: low
    issue: La nota a sobre «Niño mío» no ofrece la mejor alternativa
    rationale: «Niño mío» introduce matiz infantil no presente en Τέκνον. Si se conserva «Hijo mío», la nota debería apuntar a «Hijo» o «Hija/ hijo» no es viable en texto bíblico continuo; mejor no forzar esa alternativa.
  revised_spanish_text: Hijo mío, en las cosas buenas no añadas reproche, ni con todo don[a] palabras que causen tristeza.
  revised_footnotes:
  - marker: a
    text: O «con cada dádiva, no añadas palabras hirientes». El griego literalmente dice «ni en todo don tristeza de palabras», una expresión condensada que advierte contra arruinar la generosidad con palabras que entristecen.
    reason: lexical_alternative
