translation:
  language: es
  text: El sonido de una multitud en los montes[a], como de un gran pueblo. El sonido del estruendo de reinos[b], de naciones reunidas. Yahvé de los ejércitos está reuniendo un ejército para la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El sonido de una multitud sobre los montes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «El sonido del tumulto de reinos, de naciones que se reúnen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  english_pob_choice: The sound of
  chosen_spanish: La voz de
  alternatives_spanish:
  - El sonido de
  - La voz de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, ruido o voz. En este contexto de tumulto bélico, 'voz' conserva el valor auditivo y permite una frase natural en español sin sugerir necesariamente habla articulada. Se mantiene la repetición paralela del término en ambas cláusulas.
- source_word: הָמ֛וֹן
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - un tumulto
  - una muchedumbre
  - un rumor
  lexicon: HALOT
  rationale: הָמוֹן denota una masa numerosa y ruidosa. 'Multitud' reproduce bien la idea colectiva y, junto con el contexto sonoro, evita reducir el término solo al ruido o solo a la cantidad.
- source_word: בֶּֽ/הָרִ֖ים
  english_pob_choice: in the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - en las montañas
  - sobre los montes
  - en las montañas
  lexicon: HALOT
  rationale: La preposición con הָרִים es naturalmente locativa. 'Montes' es un equivalente digno y bíblicamente reconocible en español; también preserva el plural y la imaginería del terreno elevado.
- source_word: דְּמ֣וּת
  english_pob_choice: like
  chosen_spanish: como de
  alternatives_spanish:
  - como
  - semejante a
  - a manera de
  lexicon: HALOT
  rationale: Aquí דְּמוּת funciona comparativamente. 'Como de' mantiene la comparación y permite conservar el matiz de semejanza sin endurecerlo en una equivalencia absoluta.
- source_word: עַם רָ֑ב
  english_pob_choice: a great people
  chosen_spanish: un pueblo grande
  alternatives_spanish:
  - un pueblo numeroso
  - un gran pueblo
  - un pueblo vasto
  lexicon: HALOT
  rationale: עַם רָב expresa un colectivo grande/numeroso. 'Pueblo grande' conserva el paralelismo con el hebreo y mantiene la amplitud del término sin introducir una reinterpretación más específica que el texto.
- source_word: שְׁא֞וֹן
  english_pob_choice: an uproar
  chosen_spanish: el estruendo
  alternatives_spanish:
  - el tumulto
  - el ruido
  - el clamor
  lexicon: HALOT
  rationale: שְׁאוֹן designa un estrépito o conmoción sonora. 'Estruendo' capta la fuerza auditiva del término y funciona bien en paralelo con 'voz'.
- source_word: מַמְלְכ֤וֹת גּוֹיִם֙
  english_pob_choice: of kingdoms, of nations
  chosen_spanish: de reinos, de naciones
  alternatives_spanish:
  - de reinos de naciones
  - de reinos y naciones
  - de los reinos de las naciones
  lexicon: HALOT
  rationale: La secuencia acumula entidades políticas/poblacionales. 'De reinos, de naciones' conserva el encadenamiento del hebreo y evita suavizar la repetición intensiva.
- source_word: נֶֽאֱסָפִ֔ים
  english_pob_choice: gathered together
  chosen_spanish: reunidas
  alternatives_spanish:
  - juntadas
  - asambleadas
  - congregadas
  lexicon: HALOT
  rationale: El participio nifal de אסף indica ser reunidos o juntados. 'Reunidas' es natural en español y conserva la idea de concentración colectiva; se evita 'congregadas' por su posible carga eclesial.
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Esta forma preserva el nombre divino propio sin sustituirlo por un título.'
- source_word: צְבָא֔וֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: En el título divino יְהוָה צְבָאוֹת, 'los ejércitos' comunica de forma clara y reverente la idea de fuerzas celestiales/terrestres. En español, 'de los ejércitos' resulta más transparente que el calco 'de los hosts'.
- source_word: מְפַקֵּ֖ד
  english_pob_choice: is mustering
  chosen_spanish: está pasando revista a
  alternatives_spanish:
  - está reuniendo
  - está alistando
  - está pasando revista
  lexicon: HALOT
  rationale: פקד abarca contar, visitar, designar y pasar revista; con צְבָא el matiz militar es decisivo. 'Está pasando revista a' expresa el acto militar de inspeccionar/convocar fuerzas y preserva mejor la solemnidad que un simple 'reuniendo'.
- source_word: צְבָ֥א
  english_pob_choice: an army
  chosen_spanish: un ejército
  alternatives_spanish:
  - una tropa
  - una hueste
  - una fuerza
  lexicon: HALOT
  rationale: Aquí צָבָא es claramente una fuerza militar concreta. 'Ejército' es la equivalencia moderna más clara y fiel en español.
- source_word: מִלְחָמָֽה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - de batalla
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser guerra o batalla. 'Para la batalla' refleja bien el propósito inmediato del ejército reunido y suena natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la política del POB en español de transliterar el Nombre divino como 'Yahvé', preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título divino צְבָאוֹת
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de los ejércitos celestiales
  rationale: El hebreo presenta un título que comunica dominio sobre fuerzas organizadas. En español, 'de los ejércitos' conserva el sentido militar y reverente sin introducir una palabra ajena al registro bíblico.
  doctrine_reference: Title theology — divine warfare and sovereignty in Isaiah
- issue: Valor comparativo de דְּמוּת
  english_pob_reading: like
  chosen_spanish_reading: como de
  alternative_spanish_readings:
  - como
  - semejante a
  rationale: El hebreo no afirma identidad, sino semejanza auditiva. 'Como de' conserva la comparación y evita cerrar el texto en una equivalencia más fuerte de la que el original exige.
  doctrine_reference: Comparative syntax in prophetic poetry
translation_notes:
  revision_awareness: Se tuvo en cuenta el alto grado de acuerdo del control cruzado y la observación de variantes menores en la imagen locativa/comparativa. La redacción española conserva la paralelismo poético, mantiene el Nombre divino y evita suavizar la acumulación de términos políticos y militares del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el estándar del proyecto.
  - Se usa 'ejércitos' para צְבָאוֹת en el título divino, evitando una transliteración opaca.
  - Se mantiene la repetición de 'voz' en ambas cláusulas para reflejar el paralelismo del hebreo.
  - Se preserva la distinción entre comparación ('como de') y afirmación directa.
  - Se evita 'congregadas' por su posible resonancia eclesial ajena al contexto militar.
