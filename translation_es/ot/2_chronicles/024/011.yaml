translation:
  language: es
  text: Y siempre que los levitas llevaban el cofre[a] a la supervisión del rey, y cuando veían que había mucho dinero, el escriba del rey y el funcionario del sumo sacerdote venían, vaciaban el cofre, lo llevaban y lo devolvían a su lugar. Así lo hacían día tras día[b], y reunían dinero en abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el arca’, si se toma el término hebreo de manera más literal; aquí se refiere al recipiente de las ofrendas, no al arca del pacto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘plata’; en este contexto administrativo la palabra se refiere al dinero reunido.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרוֹן
  english_pob_choice: the chest
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  - la caja
  - el arca
  lexicon: HALOT
  rationale: El hebreo usa הָאָרוֹן, término que puede referirse literalmente al ‘arca’; sin embargo, el audit trail inglés aclara que aquí se trata del contenedor de la ofrenda, no del arca del pacto. En español, ‘arca’ conserva el término del original, y la nota explica la referencia funcional para no confundirla con el arca del pacto.
- source_word: פְּקֻדַּת הַמֶּלֶךְ
  english_pob_choice: the king’s oversight
  chosen_spanish: al encargo del rey
  alternatives_spanish:
  - bajo la supervisión del rey
  - a la supervisión del rey
  - al cuidado del rey
  lexicon: HALOT
  rationale: פְּקֻדָּה en este contexto administrativo expresa encargo, cargo o supervisión. ‘Al encargo del rey’ comunica la relación oficial sin sonar demasiado técnico, y mantiene el matiz de administración que destaca el audit trail inglés.
- source_word: בְּיַד הַלְוִיִּם
  english_pob_choice: by the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - por mano de los levitas
  - por los levitas
  - bajo el cuidado de los levitas
  lexicon: HALOT
  rationale: La expresión hebrea indica agencia/instrumentalidad. En español, ‘los levitas’ dentro de ‘llevaban’ ya expresa adecuadamente quién realizaba la acción, sin forzar un calco como ‘por mano de’.
- source_word: רַב הַכֶּסֶף
  english_pob_choice: the money was abundant
  chosen_spanish: el dinero era mucho
  alternatives_spanish:
  - había mucho dinero
  - el dinero era abundante
  - la plata era mucha
  lexicon: HALOT
  rationale: כֶּסֶף puede significar ‘plata’ o ‘dinero’; en este contexto de recolección administrativa, ‘dinero’ es la mejor equivalencia funcional. ‘Era mucho’ conserva la idea de abundancia de manera natural en español.
- source_word: סוֹפֵר הַמֶּלֶךְ
  english_pob_choice: the king’s scribe
  chosen_spanish: el escriba del rey
  alternatives_spanish:
  - el secretario real
  - el escriba real
  lexicon: HALOT
  rationale: סוֹפֵר en contextos administrativos es ‘escriba’ o ‘secretario’. ‘Escriba del rey’ preserva la oficina histórica y es claro para lectores de español.
- source_word: פְקִיד כֹּהֵן הָרֹאשׁ
  english_pob_choice: the chief priest’s officer
  chosen_spanish: el funcionario del sumo sacerdote
  alternatives_spanish:
  - el oficial del sumo sacerdote
  - el delegado del sumo sacerdote
  - el ayudante del sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo presenta a un subordinado administrativo del sumo sacerdote. ‘Funcionario’ es suficientemente amplio para el cargo y evita introducir una jerarquía no explícita en el texto.
- source_word: וִיעָרוּ
  english_pob_choice: empty
  chosen_spanish: vaciaban
  alternatives_spanish:
  - desocupaban
  - vaciarían
  - vertían
  lexicon: HALOT
  rationale: El verbo describe sacar el contenido del recipiente. ‘Vaciaban’ es idiomático y directo en español, y conserva el movimiento de extracción sin añadir detalles no presentes.
- source_word: וְיִשָּׂאֻהוּ
  english_pob_choice: carry it
  chosen_spanish: la llevaban
  alternatives_spanish:
  - la cargaban
  - la transportaban
  - la conducían
  lexicon: HALOT
  rationale: נָשָׂא puede significar llevar o cargar. ‘La llevaban’ encaja con la secuencia del movimiento del recipiente y su retorno al lugar correspondiente.
- source_word: וִישִׁיבֻהוּ אֶל מְקֹמוֹ
  english_pob_choice: return it to its place
  chosen_spanish: la devolvían a su lugar
  alternatives_spanish:
  - la volvían a su lugar
  - la regresaban a su lugar
  - la ponían de nuevo en su lugar
  lexicon: HALOT
  rationale: 'El hiphil de שוב es causativo: devolver/retornar. ‘La devolvían a su lugar’ es natural en español y mantiene el valor de restitución del objeto a su ubicación original.'
- source_word: כֹּה עָשׂוּ לְיוֹם בְּיוֹם
  english_pob_choice: Thus they did day by day
  chosen_spanish: Así hacían de día en día
  alternatives_spanish:
  - Así lo hacían día tras día
  - Así lo hacían diariamente
  - Así hacían cada día
  lexicon: HALOT
  rationale: La expresión hebrea es iterativa. ‘De día en día’ mantiene el sabor idiomático y el sentido de repetición continua sin perder inteligibilidad.
- source_word: וַיַּאַסְפוּ כֶסֶף לָרֹב
  english_pob_choice: they gathered money in abundance
  chosen_spanish: reunían dinero en abundancia
  alternatives_spanish:
  - recogían mucho dinero
  - juntaban dinero en abundancia
  - reunían plata en gran cantidad
  lexicon: HALOT
  rationale: אָסַף es ‘reunir/recoger’. ‘Dinero en abundancia’ reproduce la abundancia final y sigue la decisión contextual de traducir כֶּסֶף como dinero en esta administración de ofrendas.
theological_decisions:
- issue: Identidad del objeto llamado הָאָרוֹן
  english_pob_reading: the chest, not the ark of the covenant
  chosen_spanish_reading: el arca como recipiente de recolección, no como el arca del pacto
  alternative_spanish_readings:
  - el cofre de recolección
  - la caja de ofrendas
  - el arca del pacto
  rationale: El contexto narrativo y el audit trail inglés indican que no se trata del arca del pacto, sino de un contenedor para las ofrendas. En español se conserva ‘arca’ por fidelidad al hebreo, pero la nota aclara su función para evitar una lectura teológicamente errónea.
  doctrine_reference: 2 Crónicas 24:8-11; uso contextual del término הָאָרוֹן
translation_notes:
  revision_awareness: El texto inglés fue revisado para eliminar comas innecesarias alrededor de ‘by the Levites’, sin cambios léxicos. La versión española sigue esa fluidez sintáctica y traduce el flujo de la oración de manera continua, respetando el carácter administrativo y repetitivo del versículo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención general del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se traduce כֶּסֶף como ‘dinero’ por el contexto de recaudación; no se usa ‘plata’ en el texto principal, pero se conserva la nota para la ambigüedad léxica.
  - Se conserva ‘arca’ en el texto principal para reflejar el hebreo, con nota aclaratoria para evitar confusión con el arca del pacto.
  - El tono es formal y bíblico, pero con español moderno y natural.
  - Se evita ‘SEÑOR’ como sustituto del nombre divino porque el versículo no lo requiere y el proyecto prefiere Yahvé en contextos pertinentes.
