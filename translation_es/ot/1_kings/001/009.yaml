revisions:
- from: Adonías sacrificó ovejas, ganado y animales engordados junto a la piedra de Zohelet[a], que está al lado de En-rogel, e invitó a todos sus hermanos, los hijos del rey, y a todos los hombres de Judá, los siervos del rey[b].
  to: Adonías sacrificó ovejas, ganado y animales cebados[a] junto a la piedra de Zohelet[b], que está al lado de En-rogel, e invitó[c] a todos sus hermanos, los hijos del rey, y a todos los hombres de Judá[d], los siervos del rey[e].
  rationale: Se hicieron ajustes menores para mejorar la naturalidad del español («animales cebados») y, sobre todo, para preservar en español las alternativas léxicas y notas culturales ya documentadas en el audit trail inglés. No hay cambio sustancial de sentido.
