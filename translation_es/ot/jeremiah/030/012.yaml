translation:
  language: es
  text: 'Porque así dice Yahvé: Tu fractura es incurable[a]; tu herida es grave.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu lesión es incurable; tu herida es severa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la declaración divina con una conexión discursiva natural en español. 'Porque' conserva la relación explicativa del hebreo y funciona bien con la fórmula profética.
- source_word: כֹה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así ha dicho Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética solemne y directa. 'Ha dicho' preserva el valor de declaración ya emitida, mientras que 'así dice' sería una alternativa más literal pero algo menos natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el nombre divino. Se conserva el nombre propio del pacto sin reemplazarlo por una máscara tradicional.
- source_word: אָנ֣וּשׁ
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - desesperada
  - sin remedio
  - grave
  lexicon: HALOT
  rationale: El adjetivo expresa la idea de algo que no puede sanarse. En combinación con las imágenes médicas del verso, 'incurable' preserva con precisión la fuerza metafórica.
- source_word: לְ/שִׁבְרֵ֑/ךְ
  english_pob_choice: your fracture
  chosen_spanish: tu fractura
  alternatives_spanish:
  - tu quebradura
  - tu quebranto
  - tu herida
  lexicon: HALOT
  rationale: '''Fractura'' mantiene la imagen corporal y médica que el texto sugiere. ''Quebranto'' sería más abstracto; ''herida'' ya corresponde mejor al segundo hemistiquio.'
- source_word: נַחְלָ֖ה
  english_pob_choice: is grievous
  chosen_spanish: es grave
  alternatives_spanish:
  - es severa
  - es dolorosa
  - es incurable
  lexicon: HALOT
  rationale: Aquí la forma predica la condición de la herida. 'Grave' comunica la severidad sin repetir innecesariamente 'incurable', manteniendo la distinción entre ambos miembros del paralelismo.
- source_word: מַכָּתֵֽ/ךְ
  english_pob_choice: your wound
  chosen_spanish: tu herida
  alternatives_spanish:
  - tu golpe
  - tu lesión
  - tu llaga
  lexicon: HALOT
  rationale: '''Herida'' es el equivalente natural en español para este contexto de daño corporal. Preserva el paralelismo con ''fractura'' y el campo semántico médico del verso.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto en español prescribe 'Yahvé' para יְהוָה. Esto mantiene la transparencia del nombre propio del pacto y evita la convención de enmascararlo como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión léxica entre 'fractura' e 'herida'
  english_pob_reading: Your fracture is incurable; your wound is grievous.
  chosen_spanish_reading: Tu fractura es incurable; tu herida es grave.
  alternative_spanish_readings:
  - Tu quebranto es incurable; tu herida es severa.
  - Tu lesión es incurable; tu herida es grave.
  rationale: 'Se conserva la distinción del paralelismo hebreo: una imagen de ruptura/fractura y otra de herida. Traducir ambos miembros con el mismo término habría borrado la tensión léxica documentada por el POB inglés.'
  doctrine_reference: POB lexical transparency principle
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre la versión inglesa y el análisis léxico, sin revisiones aplicadas en la última pasada. La versión española sigue esa lectura estable, preservando la metáfora médica y la fórmula profética sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino en lugar de 'SEÑOR'.
  - Se conserva el paralelismo corporal con 'fractura' / 'herida' para reflejar el hebreo.
  - '''incurable'' se usa en sentido médico-metafórico, no como juicio moral.'
  - El orden y la puntuación reproducen de manera natural la declaración profética en español.
