translation:
  language: es
  text: Porque toda persona que hace estas cosas es una abominación para Yahvé, y a causa de estas abominaciones Yahvé tu Dios los está expulsando[a] de delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'está desposeyéndolos'; el verbo hebreo puede enfatizar hacer que las naciones pierdan la posesión de la tierra, además de expulsarlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición anterior. En español, 'Porque' comunica con naturalidad el valor explicativo-causal del hebreo en este contexto.
- source_word: תוֹעֲבַת יְהוָה
  english_pob_choice: an abomination to Yahweh
  chosen_spanish: una abominación para Yahvé
  alternatives_spanish:
  - una cosa abominable para Yahvé
  - una detestación para Yahvé
  lexicon: HALOT
  rationale: Mantiene la fuerza fuerte de תועבה y el vínculo relacional con el nombre divino. 'Para Yahvé' evita suavizar la carga moral y conserva el giro del original, aunque en español suene un poco más directo que 'ante Yahvé'.
- source_word: כָּל עֹשֵׂה אֵלֶּה
  english_pob_choice: everyone who does these things
  chosen_spanish: toda persona que hace estas cosas
  alternatives_spanish:
  - todo el que hace estas cosas
  - quienquiera que haga estas cosas
  lexicon: HALOT
  rationale: El participio con כָּל expresa universalidad indefinida. 'Toda persona que hace estas cosas' conserva ese alcance sin sonar mecánico.
- source_word: וּבִגְלַל
  english_pob_choice: and because of
  chosen_spanish: y a causa de
  alternatives_spanish:
  - y por causa de
  - y por razón de
  lexicon: HALOT
  rationale: Expresa el valor causal del sintagma con una construcción natural en español.
- source_word: הַתּוֹעֵבֹת הָאֵלֶּה
  english_pob_choice: these abominations
  chosen_spanish: estas abominaciones
  alternatives_spanish:
  - estas cosas abominables
  - estas prácticas detestables
  lexicon: HALOT
  rationale: Se conserva la repetición léxica de תועבה con el singular anterior y el plural aquí, porque el texto enlaza las prácticas prohibidas con el juicio resultante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el nombre del pacto en vez de ocultarlo tras un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Yahvé
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: Refleja el sufijo de segunda persona singular y mantiene el tono directo del discurso a Israel.
- source_word: מוֹרִישׁ
  english_pob_choice: is driving them out
  chosen_spanish: está expulsando
  alternatives_spanish:
  - está desposeyéndolos
  - está quitándoles la posesión
  lexicon: HALOT
  rationale: El Hifil de ירש puede incluir la idea de desposeer, pero en este contexto la imagen inmediata es de expulsión de la tierra. 'Está expulsando' es claro y fiel, aunque la nota preserva la posibilidad de 'desposeer'.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: Pronombre de objeto directo natural en español.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - ante ti
  - de tu presencia
  lexicon: HALOT
  rationale: Conserva el valor espacial de 'from before your face/presence' con una fórmula idiomática en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton; el proyecto pide conservar el nombre divino en español como 'Yahvé'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se revisó el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español junto al término anotado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'abominación/abominaciones' para תועבה, porque el paralelo singular-plural es significativo en el versículo.
  - '''de delante de ti'' refleja mejor la imagen espacial hebrea que una paráfrasis más libre.'
