translation:
  language: es
  text: 'Así dice Yahvé[a], el Rey de Israel y su Redentor, Yahvé de los ejércitos: Yo soy el primero, y yo soy el último[b]; fuera de mí no hay Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, 'Yahvé de los ejércitos'.
    reason: lexical_alternative
  - marker: b
    text: O 'fuera de mí no hay dios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre del pacto se conserva como transliteración del Tetragrama, siguiendo la práctica POB de no ocultarlo con 'SEÑOR'. 'Yahvé' es la forma española más estable y readable para esa decisión.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the King of Israel
  chosen_spanish: el Rey de Israel
  alternatives_spanish:
  - Rey de Israel
  lexicon: HALOT
  rationale: La estructura constructa se refleja de manera directa y natural en español con el artículo explícito, manteniendo el título formal y la aposición con 'Yahvé'.
- source_word: גֹאֲלוֹ
  english_pob_choice: his Redeemer
  chosen_spanish: su Redentor
  alternatives_spanish:
  - el que lo redime
  - su Rescatador
  lexicon: HALOT
  rationale: '''Redentor'' preserva el valor teológico y relacional del término en un registro bíblico natural. ''Rescatador'' o una perífrasis explicativa serían más interpretativos o menos solemnes.'
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se traduce el título de forma lexical y transparente. 'Ejércitos' corresponde al sentido básico de צְבָאוֹת; se evita 'SEÑOR de los ejércitos' por coherencia con la forma del nombre divino en la POB y se conserva la fuerza militar/cósmica del título.
- source_word: אֲנִי רִאשׁוֹן
  english_pob_choice: I am the first
  chosen_spanish: Yo soy el primero
  alternatives_spanish:
  - Yo soy primero
  lexicon: HALOT
  rationale: El predicado adjetival con pronombre explícito se vierte con copula para una cadencia natural y solemne en español, conservando la autoidentificación enfática.
- source_word: וַאֲנִי אַחֲרוֹן
  english_pob_choice: and I am the last
  chosen_spanish: y yo soy el último
  alternatives_spanish:
  - y yo soy postrero
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'el primero'. 'Último' es claro y fiel; 'postrero' sería más arcaizante sin aportar mayor precisión.
- source_word: וּמִבַּלְעָדַי
  english_pob_choice: apart from me
  chosen_spanish: fuera de mí
  alternatives_spanish:
  - aparte de mí
  - además de mí
  lexicon: HALOT
  rationale: La expresión española 'fuera de mí' comunica con naturalidad la exclusión absoluta de la cláusula. 'Aparte de mí' también es viable, pero 'fuera de mí' suena más solemne y directo en este contexto.
- source_word: אֵין אֱלֹהִים
  english_pob_choice: there is no God
  chosen_spanish: no hay Dios
  alternatives_spanish:
  - no existe Dios
  - no hay dios
  lexicon: HALOT
  rationale: Se conserva el monoteísmo absoluto con el sustantivo capitalizado 'Dios' en español. 'No hay Dios' es la forma más natural y solemne; la minúscula ('dios') podría sugerir deidades rivales, como nota alternativa si se quisiera enfatizar la lectura genérica.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  rationale: Se mantiene la transparencia lexical del título hebreo sin sustituirlo por un equivalente tradicional menos literal. 'Ejércitos' preserva el contenido de צְבָאוֹת; 'Todopoderoso' sería más interpretativo que lexical.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 2, 6; Contested terms table for יְהוָה'
- issue: Afirmación monoteísta de אֵין אֱלֹהִים
  english_pob_reading: there is no God
  chosen_spanish_reading: no hay Dios
  alternative_spanish_readings:
  - no hay dios
  rationale: La frase expresa exclusividad divina absoluta. En español, capitalizar 'Dios' comunica la lectura teológica plena sin añadir contenido ajeno al hebreo. La alternativa en minúscula queda disponible si se desea subrayar la forma genérica del sustantivo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; here the context is not genuinely ambiguous'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el auditor inglés y no requiere revisión adicional respecto del sentido de los nombres divinos, los títulos regios o la cláusula monoteísta. Se conserva la misma estructura retórica y la misma tensión lexical de exclusividad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con el proyecto.
  - Se traduce צְבָאוֹת como 'de los ejércitos' para reflejar el valor lexical y evitar la máscara tradicional 'SEÑOR'.
  - Se usa 'Redentor' para גֹאֲלֹו por su naturalidad bíblica y su carga teológica.
  - La cláusula final se vierte como 'no hay Dios' para mantener la afirmación absoluta del hebreo.
  - Los dos miembros paralelos 'el primero / el último' se conservaron con copulativa explícita para reflejar el énfasis del original.
