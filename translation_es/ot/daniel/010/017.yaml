translation:
  language: es
  text: Entonces, ¿cómo puede este siervo de mi señor[a] hablar con mi señor de esta manera[b]? En cuanto a mí, desde ahora[c] ya no me quedan fuerzas, y no me queda aliento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi amo» en ambos casos de «mi señor».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «este siervo de mi señor ... mi señor este», con la repetición de «este» expresando inmediatez; el español lo suaviza idiomáticamente como «de esta manera».'
    reason: lexical_alternative
  - marker: c
    text: O «ahora» para «desde ahora».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵיךְ / יוּכַל
  english_pob_choice: So how can
  chosen_spanish: Entonces, ¿cómo puede
  alternatives_spanish:
  - Y cómo puede
  - ¿Cómo puede?
  lexicon: HALOT
  rationale: La pregunta es retórica y enlaza con la escena anterior. «Entonces, ¿cómo puede» conserva la fuerza discursiva de la conjunción y la idea de capacidad, con español natural.
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: El contexto hebreo usa עֶבֶד con valor de auto-humillación cortesana. Sin embargo, el proyecto POB suele preservar la fuerza léxica de δοῦλος/‘slave’ cuando el término expresa dependencia fuerte; aquí «esclavo» mantiene esa intensidad mejor que «siervo», aunque en español suene más duro.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: En este contexto de dirección humana y cortesana, «mi señor» expresa respeto formal sin confundirlo con Yahvé. «Mi amo» o «mi maestro» serían posibles, pero menos naturales o más cargados.
- source_word: זֶה
  english_pob_choice: this / like this
  chosen_spanish: a así
  alternatives_spanish:
  - de esta manera
  - así mismo
  lexicon: HALOT
  rationale: El hebreo repite זֶה con valor de deíxis inmediata. En español, la repetición se resuelve con «así» para no sonar forzado, pero el comentario lexical preserva la tensión entre literalidad y fluidez.
- source_word: לְדַבֵּר עִם
  english_pob_choice: speak with
  chosen_spanish: hablar con
  alternatives_spanish:
  - hablar a
  - dirigirse a
  lexicon: HALOT
  rationale: «Hablar con» refleja la relación recíproca del hebreo עִם y conserva un tono formal sin alterar el sentido.
- source_word: וַאֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: La construcción introduce un cambio enfático al estado de Daniel. «En cuanto a mí» reproduce bien el giro discursivo.
- source_word: מֵעַתָּה
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - ahora
  - de aquí en adelante
  lexicon: HALOT
  rationale: «Desde ahora» conserva la inmediatez temporal del hebreo y suena natural en español contemporáneo.
- source_word: לֹא יַעֲמָד בִּי כֹחַ
  english_pob_choice: no strength remains in me
  chosen_spanish: no me queda fuerza
  alternatives_spanish:
  - no permanece fuerza en mí
  - ya no tengo fuerza
  lexicon: HALOT
  rationale: La imagen hebrea de «no mantenerse/estar en pie» en mí se vuelve en español idiomático «no me queda fuerza», que comunica la misma idea de agotamiento sin perder el sentido de remanente.
- source_word: וּנְשָׁמָה
  english_pob_choice: and no breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - aliento vital
  lexicon: HALOT
  rationale: נְשָׁמָה designa aquí la respiración física o aliento de vida, no el Espíritu Santo ni «espíritu» en sentido interior. «Aliento» mantiene la concreción corporal.
- source_word: לֹא נִשְׁאֲרָה בִי
  english_pob_choice: is left in me
  chosen_spanish: no me ha quedado
  alternatives_spanish:
  - no queda en mí
  - no permanece en mí
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa lo que permanece o queda. «No me ha quedado» sigue bien la idea de residuo físico y encaja con el paralelismo.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי como título humano
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - mi maestro
  rationale: El texto se dirige a un personaje exaltado, pero humano. Traducirlo como «mi señor» evita introducir una mayúscula teológica o sustituirlo por un término eclesiástico no requerido por el hebreo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; and contested term guidance for κύριος/Lord by analogy to title rendering.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: su lectura de עֶבֶד como «servant» y su nota sobre la repetición de זֶה. La presente versión ajusta el registro al español, conservando la deíxis con «así» y la idea de auto-humillación, aunque se optó por «esclavo» para reflejar con más fuerza el valor léxico que el proyecto POB suele preservar cuando el contexto lo permite. También se mantuvo la lectura física de נְשָׁמָה como «aliento» y el valor de remanente de «no strength remains in me» con un equivalente idiomático.'
  spanish_consistency_notes:
  - Se usa «mi señor» para אֲדֹנִי en contexto humano, conforme al criterio del proyecto para títulos no divinos.
  - Se evita «SEÑOR» porque no hay aquí referencia a יהוה; el hablante se dirige al ser celestial como superior humano en el discurso cortesano.
  - «Aliento» se reserva para נְשָׁמָה en sentido físico, evitando confundirlo con «Espíritu».
