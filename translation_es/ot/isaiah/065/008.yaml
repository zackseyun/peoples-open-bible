revisions:
- from: 'Así dice Yahvé: Como cuando se halla el mosto[a] en un racimo, y se dice: «No lo destruyas, porque hay bendición en él», así actuaré yo por amor de mis siervos, para no destruirlos a todos[b].'
  to: 'Así dice Yahvé: Como cuando se halla vino nuevo[a] en un racimo, y se dice: «No lo destruyas, porque hay bendición en él», así actuaré yo por causa de mis siervos, para no destruirlos a todos[b].'
  rationale: Se cambia 'mosto' por 'vino nuevo' para ajustarse mejor a la decisión léxica documentada del POB inglés y para evitar una imagen menos natural en español con 'en un racimo'. También se suaviza 'por amor de' a 'por causa de' por mayor naturalidad contemporánea, sin alterar el sentido.
  reviewer_model: gpt-5.4
