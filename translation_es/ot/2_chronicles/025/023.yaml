translation:
  language: es
  text: Y Joás, rey de Israel, capturó a Amasías, rey de Judá, hijo de Joás, hijo de Joacaz, en Bet-semes, y lo llevó a Jerusalén. Entonces derribó la muralla de Jerusalén, desde la puerta de Efraín hasta la puerta del Ángulo[a], cuatrocientos codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'desde la puerta de Efraín hasta la puerta que da al frente' o 'que mira hacia'. La expresión 'puerta del Ángulo' sigue la identificación probable a partir del pasaje paralelo de 2 Reyes 14:13.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּפַשׂ
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - lo apresó
  - lo tomó preso
  lexicon: HALOT
  rationale: El verbo hebreo indica tomar por la fuerza o poner bajo custodia. 'Capturó' conserva el sentido militar y suena natural en español contemporáneo, sin suavizarlo con 'apresó' ni volverlo demasiado explicativo con 'tomó preso'.
- source_word: בְּבֵית שָׁמֶשׁ
  english_pob_choice: at Beth-shemesh
  chosen_spanish: en Bet-semes
  alternatives_spanish:
  - en Bet-Semes
  - en Beth-semes
  lexicon: HALOT
  rationale: La preposición con un topónimo se expresa naturalmente con 'en'. 'Bet-semes' sigue la transliteración bíblica habitual en español y evita una calca innecesaria del inglés.
- source_word: וַיְבִיאֵהוּ
  english_pob_choice: brought him
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trajo
  - lo condujo
  lexicon: HALOT
  rationale: El hiphil de בוא aquí significa hacer venir o llevar a alguien a un lugar. 'Lo llevó' comunica bien la acción sin sobreespecificar el modo; 'lo trajo' sería posible, pero en español puede sonar más dependiente del punto de vista del hablante.
- source_word: וַיִּפְרֹץ בְּחוֹמַת יְרוּשָׁלִַם
  english_pob_choice: he broke down the wall of Jerusalem
  chosen_spanish: derribó la muralla de Jerusalén
  alternatives_spanish:
  - abrió una brecha en la muralla de Jerusalén
  - rompió la muralla de Jerusalén
  lexicon: HALOT
  rationale: El verbo פרץ en este contexto describe una ruptura en una fortificación. 'Derribó la muralla' es claro y fiel al efecto resultante; 'abrió una brecha' mantiene más explícita la imagen de asalto, pero es menos directo.
- source_word: מִשַּׁעַר אֶפְרַיִם עַד שַׁעַר הַפּוֹנֶה
  english_pob_choice: from the Ephraim Gate to the Corner Gate
  chosen_spanish: desde la puerta de Efraín hasta la puerta del Ángulo
  alternatives_spanish:
  - desde la puerta de Efraín hasta la puerta del Rincón
  - desde la puerta de Efraín hasta la puerta que da vuelta
  lexicon: HALOT
  rationale: Se conserva el nombre propio 'puerta de Efraín'. Para הַפּוֹנֶה, el POB inglés optó por 'Corner Gate' siguiendo la identificación probable de 2 Reyes 14:13. 'Puerta del Ángulo' mantiene la ambigüedad del hebreo y la tradición identificatoria sin imponer una glosa interpretativa demasiado fuerte.
- source_word: אַרְבַּע מֵאוֹת אַמָּה
  english_pob_choice: four hundred cubits
  chosen_spanish: cuatrocientos codos
  alternatives_spanish:
  - cuatrocientos codos de longitud
  - cuatrocientos codos de extensión
  lexicon: HALOT
  rationale: La medida hebrea se traslada directamente a la unidad española tradicional 'codos'. El texto no explicita longitud, así que se conserva la forma breve y precisa.
- source_word: בֶּן יוֹאָשׁ בֶּן יְהוֹאָחָז
  english_pob_choice: the son of Joash, son of Jehoahaz
  chosen_spanish: hijo de Joás, hijo de Joacaz
  alternatives_spanish:
  - hijo de Joás, hijo de Jehoacaz
  - hijo de Joás, descendiente de Joacaz
  lexicon: HALOT
  rationale: Se preserva la estructura genealógica del hebreo con dos generaciones. 'Joacaz' es la forma castellana más extendida del nombre, y mantiene la correspondencia sin cargar la frase con una paráfrasis.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la auditoría inglesa en los puntos lexicográficos clave: captura militar, traslado a Jerusalén, ruptura de la muralla, y el tramo de la muralla entre las dos puertas. Se conserva la alternativa interpretativa para הַפּוֹנֶה en nota, porque la identificación tradicional depende del paralelo de 2 Reyes 14:13 y el hebreo permite una lectura más literal.'
  spanish_consistency_notes:
  - Se usa 'Bet-semes' y no 'Beth-shemesh' para mantener consistencia con transliteraciones españolas habituales.
  - Se emplea 'puerta' en minúscula por tratarse de un nombre común dentro de una serie de topónimos/gates, manteniendo la mayúscula solo en nombres propios del lugar.
  - '''Muralla'' se usa para בחומה, en línea con el sentido defensivo de fortificación y con la claridad idiomática del español.'
  - '''Codos'' conserva la medida antigua sin convertirla a unidades modernas, como en el texto inglés auditado.'
