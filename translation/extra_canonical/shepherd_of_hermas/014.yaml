theological_decisions:
- issue: Rendering of ἅγιοι
  chosen_reading: Translate as ‘holy ones’ rather than ‘saints.’
  alternative_readings:
  - saints
  rationale: Preserves the literal communal identity without importing later ecclesiastical coloration; aligns with Cartha’s aim to keep early-church texture concrete.
- issue: σχίσματα in a stone allegory vs. ecclesial schism
  chosen_reading: Render as ‘cracks’ in the main text.
  alternative_readings:
  - divisions
  - schisms
  rationale: In this immediate context, the visual of cracked stones is primary; a footnote preserves awareness of the term’s later ecclesial sense to avoid over-reading church-order polemic here.
- issue: κύριος (Kyrios)
  chosen_reading: Translate as ‘Lord.’
  alternative_readings:
  - Master
  rationale: Follows project default for Kyrios to render ‘Lord,’ reflecting covenantal usage without over-specific christological import within Hermas’s visionary context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Kyrios → Lord'
- issue: πίστις
  chosen_reading: Translate as ‘faith.’
  alternative_readings:
  - faithfulness
  - trust
  rationale: Here πίστις is a possessed quality (‘having faith’) alongside wealth; ‘faith’ is the clear, established sense.
  doctrine_reference: 'DOCTRINE.md: Contested terms — pistis → faith'
