revisions:
- from: Y escribió en las tablas[a], como la primera escritura, las Diez Palabras que Yahvé había hablado a ustedes en el monte, de en medio del fuego, en el día de la asamblea; y Yahvé me las dio.
  to: Y escribió en las tablas[a], como en la primera escritura, las diez palabras que Yahvé había hablado a ustedes en el monte, de en medio del fuego, el día de la asamblea; y Yahvé me las dio.
  rationale: 'Se hacen ajustes menores de estilo y naturalidad sin cambiar el sentido: se clarifica la comparación de כַּמִּכְתָּב הָרִאשׁוֹן con «como en la primera escritura», se normaliza «las diez palabras» como equivalente literal más idiomático en español, y se mejora «el día de la asamblea» para evitar un calco innecesario. No se requiere adjudicación doctrinal adicional.'
