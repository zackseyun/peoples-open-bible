translation:
  language: es
  text: E hizo que los camellos se echaran fuera de la ciudad, junto al pozo de agua, a la hora de la tarde, a la hora en que salen las mujeres[a] a sacar agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a la hora de salir las mujeres que sacan agua». El participio es femenino plural, por lo que se especifica mujeres y no un grupo mixto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְרֵךְ
  english_pob_choice: made ... kneel down
  chosen_spanish: hizo que ... se arrodillaran
  alternatives_spanish:
  - hizo arrodillar
  - causó que ... se arrodillaran
  lexicon: HALOT
  rationale: El verbo en hifil expresa causación aplicada a los camellos. En español, "hizo que se arrodillaran" conserva la fuerza causativa y el gesto concreto sin sonar forzado; "arrodillar" comunica mejor que un calco como "causó que se inclinaran".
- source_word: הַגְּמַלִּים
  english_pob_choice: the camels
  chosen_spanish: los camellos
  alternatives_spanish:
  - los dromedarios
  lexicon: HALOT
  rationale: Sustantivo directo y transparente; "camellos" es el equivalente natural en español para el contexto del relato.
- source_word: מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - afuera de la ciudad
  - fuera del pueblo
  lexicon: HALOT
  rationale: מִחוּץ significa "fuera de". "Ciudad" mantiene la referencia habitual de עִיר; "pueblo" sería posible en el contexto, pero "ciudad" es más neutral y fiel al término base.
- source_word: אֶל בְּאֵר הַמָּיִם
  english_pob_choice: by the well of water
  chosen_spanish: junto al pozo de agua
  alternatives_spanish:
  - al pozo de agua
  - junto al pozo
  lexicon: HALOT
  rationale: Aunque אֶל puede indicar movimiento hacia, aquí el resultado espacial del relato queda mejor en español con "junto a". Se conserva la frase nominal concreta "pozo de agua" sin volverla artificial.
- source_word: לְעֵת עֶרֶב
  english_pob_choice: at evening time
  chosen_spanish: a la hora de la tarde
  alternatives_spanish:
  - al atardecer
  - por la tarde
  lexicon: HALOT
  rationale: La construcción temporal pide un equivalente natural. "A la hora de la tarde" preserva el valor de temporalidad explícita de לְעֵת y distingue este marcador del siguiente; "por la tarde" sería más idiomático pero menos marcado.
- source_word: לְעֵת צֵאת הַשֹּׁאֲבֹת
  english_pob_choice: at the time when the women who draw water go out
  chosen_spanish: a la hora en que salen las mujeres a sacar agua
  alternatives_spanish:
  - a la hora en que salen las mujeres que sacan agua
  - cuando las mujeres salen a sacar agua
  lexicon: HALOT
  rationale: El participio femenino plural señala mujeres, no un grupo mixto. En español, "las mujeres" conserva ese rasgo. "A sacar agua" expresa el infinitivo de finalidad/acción de manera natural y fiel; "las mujeres que sacan agua" también sería posible, pero la solución elegida fluye mejor en la frase temporal.
theological_decisions:
- issue: Referencia al género femenino del participio "las que sacan agua"
  english_pob_reading: The participle is feminine plural, specifying women rather than a mixed group.
  chosen_spanish_reading: las mujeres a sacar agua
  alternative_spanish_readings:
  - las mujeres que sacan agua
  - las aguadoras
  rationale: No hay tensión doctrinal, pero sí una decisión de precisión lexical. Se mantiene el dato de género plural femenino sin introducir un tecnicismo moderno ni borrar la referencia explícita a mujeres.
  doctrine_reference: Precisión gramatical del texto hebreo; no doctrinal.
translation_notes:
  revision_awareness: La redacción sigue el sentido del hebreo y la línea del POB en inglés, pero adapta la temporalidad para que el español suene natural. Se mantuvo la doble marca temporal con repetición de "a la hora" para reflejar la estructura hebrea de לְעֵת ... לְעֵת ..., y se preservó el rasgo femenino del participio con "las mujeres". La nota de revisión del inglés confirma que la segunda frase funciona como clarificación temporal; en español se conservó esa relación sin sobrecargar la sintaxis.
  spanish_consistency_notes:
  - Se usa "camellos" de forma consistente con el relato patriarcal.
  - Se mantiene "pozo de agua" como traducción transparente de בְּאֵר הַמָּיִם.
  - Se evita "SEÑOR" u otros sustitutos porque este versículo no contiene el nombre divino.
  - Se conserva la estructura paralela del hebreo con dos expresiones temporales introducidas por "a la hora".
