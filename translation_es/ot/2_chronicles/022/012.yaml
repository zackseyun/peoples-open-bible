translation:
  language: es
  text: Y él estuvo con ellos en la casa de Dios[b], escondiéndose[a] durante seis años, mientras Atalía reinaba sobre el país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo escondido»; el participio hebreo puede entenderse de manera reflexiva («escondiéndose») o como una descripción de su estado oculto en el contexto.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los recintos del templo; literalmente, «la casa de Dios».
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And he was
  chosen_spanish: Y él estuvo
  alternatives_spanish:
  - Y él era
  - Y él permaneció
  lexicon: HALOT
  rationale: El hebreo narra una continuación de estado/presencia; en español, "estuvo" comunica presencia continuada de modo natural y conserva el avance narrativo sin sobretraducir.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  - junto a ellos
  lexicon: HALOT
  rationale: La preposición con sufijo indica compañía; "con ellos" es la equivalencia más directa y clara.
- source_word: בְּבֵית הָאֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en la casa de Yahvé
  - en el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal "casa de Dios". Aunque el contexto apunta al recinto del templo, el hebreo dice literalmente "casa de Dios", y esa formulación es plenamente comprensible en español.
- source_word: מִתְחַבֵּא
  english_pob_choice: hiding himself / being hidden
  chosen_spanish: escondiéndose
  alternatives_spanish:
  - siendo escondido
  - oculto
  lexicon: HALOT
  rationale: El hitpael permite una lectura reflexiva o pasiva. "Escondiéndose" mantiene la fuerza verbal y deja abierta la tensión documentada entre la acción reflexiva y el estado de estar oculto.
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: for six years
  chosen_spanish: durante seis años
  alternatives_spanish:
  - por seis años
  - seis años
  lexicon: HALOT
  rationale: En español, la duración se expresa con naturalidad mediante "durante"; preserva la idea temporal sin añadir contenido ajeno.
- source_word: וַעֲתַלְיָה
  english_pob_choice: while Athaliah
  chosen_spanish: mientras Atalía
  alternatives_spanish:
  - y Atalía
  - al mismo tiempo que Atalía
  lexicon: HALOT
  rationale: El waw tiene sentido contemporáneo aquí; "mientras" comunica que la acción de esconderse ocurrió durante el reinado de Atalía.
- source_word: מֹלֶכֶת
  english_pob_choice: was reigning
  chosen_spanish: reinaba
  alternatives_spanish:
  - estaba reinando
  - gobernaba
  lexicon: HALOT
  rationale: El participio femenino expresa acción continua. "Reinaba" mantiene el valor durativo en un español más sobrio y natural que el perífrasis "estaba reinando".
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - sobre la tierra del país
  lexicon: HALOT
  rationale: '"הָאָרֶץ" puede significar tierra o país/territorio. Se conserva "tierra" para reflejar la amplitud del hebreo, sin precisar más allá de lo que el texto exige.'
translation_notes:
  revision_awareness: Coincide con el texto fuente y con el audit trail inglés en la lectura durativa y en la ambigüedad del participio hitpael. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» para conservar la expresión hebrea literal y la transparencia audit trail.
  - Se prefirió «Atalía» como forma española estable del nombre propio.
  - Se evitó «SEÑOR» porque el hebreo aquí no usa el tetragrámaton sino הָאֱלֹהִים.
  - La nota sobre el participio preserva la tensión entre lectura reflexiva y pasiva documentada en el inglés POB.
