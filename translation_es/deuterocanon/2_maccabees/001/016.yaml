translation:
  language: es
  text: Después de abrir la puerta oculta de la cámara de humo[a], arrojaron piedras y derribaron[b] al líder; y, después de hacerlo pedazos, lanzaron las cabezas a los que estaban afuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sala del horno» o «el lugar de humo o incienso»; el término griego es raro y su referente preciso es incierto.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego evoca un golpe como de rayo o trueno; puede significar que lo abatieron violentamente, no necesariamente que cayó un rayo literal del cielo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοίξαντες
  english_pob_choice: After opening
  chosen_spanish: Después de abrir
  alternatives_spanish:
  - Habiendo abierto
  - Cuando abrieron
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción anterior a los verbos principales; «Después de abrir» conserva la secuencia sin sonar forzado en español.
- source_word: τὴν ... κρυπτὴν θύραν
  english_pob_choice: the hidden door
  chosen_spanish: la puerta oculta
  alternatives_spanish:
  - la puerta secreta
  - la puerta escondida
  lexicon: LSJ
  rationale: κρυπτήν comunica algo oculto o escondido. «Puerta oculta» es natural y mantiene el valor semántico sin añadir matices innecesarios.
- source_word: τοῦ φατινώματος
  english_pob_choice: of the smoke chamber
  chosen_spanish: de la cámara de humo
  alternatives_spanish:
  - de la sala del horno
  - del lugar de humo o incienso
  lexicon: LSJ
  rationale: El sustantivo es raro y su referente exacto es incierto. «Cámara de humo» preserva esa incertidumbre y refleja el campo semántico propuesto por la auditoría inglesa sin fijar demasiado el objeto.
- source_word: βάλλοντες πέτρους
  english_pob_choice: they threw stones
  chosen_spanish: arrojaron piedras
  alternatives_spanish:
  - tiraron piedras
  - lanzaron piedras
  lexicon: LSJ
  rationale: El participio describe una acción violenta y simple. «Arrojaron piedras» es claro, idiomático y conserva el carácter agresivo del griego.
- source_word: συνεκεραύνωσαν
  english_pob_choice: struck down ...
  chosen_spanish: derribaron
  alternatives_spanish:
  - abatieron
  - golpearon mortalmente
  - lo derribaron con un golpe fulminante
  lexicon: LSJ
  rationale: La auditoría inglesa retiró la expansión interpretativa de «thunderbolt-like blow» para mantener naturalidad y no sobreexplicar el verbo. En español, «derribaron» transmite el resultado violento sin imponer un rayo literal ni una paráfrasis excesiva.
- source_word: τὸν ἡγεμόνα
  english_pob_choice: the leader
  chosen_spanish: al jefe
  alternatives_spanish:
  - al líder
  - al gobernador
  - al comandante
  lexicon: LSJ
  rationale: ἡγεμών puede ser líder, gobernador o comandante según el contexto. «Jefe» es amplio, entiende bien el cargo en español y evita precisar una función administrativa no asegurada por el griego.
- source_word: μέλη ποιήσαντες
  english_pob_choice: after cutting him into pieces
  chosen_spanish: después de hacerlo pedazos
  alternatives_spanish:
  - después de despedazarlo
  - después de dismemberarlo
  lexicon: LSJ
  rationale: La expresión griega es idiomática y brutal, indicando división del cuerpo en partes. «Hacerlo pedazos» comunica el sentido de manera clara y natural en español.
- source_word: τὰς κεφαλὰς
  english_pob_choice: the heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - sus cabezas
  - las cabezas cortadas
  lexicon: LSJ
  rationale: Se preserva el plural del griego. No se reduce al singular ni se explica de más; el plural probablemente corresponde a la desmembración mencionada antes.
- source_word: τοῖς ἔξω παρρίψαντες
  english_pob_choice: they threw ... to those outside
  chosen_spanish: lanzaron ... a los de afuera
  alternatives_spanish:
  - las arrojaron afuera
  - las echaron a los de afuera
  lexicon: LSJ
  rationale: El dativo plural se entiende mejor como personas fuera del lugar. «A los de afuera» conserva ese valor personal mejor que una mera indicación espacial.
theological_decisions:
- issue: Cómo traducir συνεκεραύνωσαν sin imponer un milagro ni borrar la imaginería violenta
  english_pob_reading: The verb evokes a thunderbolt or lightning strike; it may mean they struck him down violently, not necessarily that a literal bolt fell from heaven.
  chosen_spanish_reading: Se traduce de modo no expansivo como «derribaron», preservando la violencia del acto sin afirmar un rayo literal ni añadir una metáfora no explicitada en el texto final.
  alternative_spanish_readings:
  - lo fulminaron
  - lo abatieron como por un rayo
  - lo golpearon con fuerza de trueno
  rationale: El griego contiene imaginería de trueno/rayo, pero el contexto inmediato presenta atacantes humanos que arrojan piedras. La traducción debe conservar la tensión y evitar resolverla en una dirección más fuerte de la que el texto exige.
  doctrine_reference: Primacía del original y preservación de la tensión léxica; no forzar una lectura milagrosa ni despojar al verbo de su violencia narrativa.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó la expansión interpretativa de συνεκεραύνωσαν («with a thunderbolt-like blow») para dejar simplemente «struck down», y también suavizó «out to those outside» a «to those outside». La redacción española sigue esa revisión: evita un rayo literal o una glosa explicativa, y usa «a los de afuera» para mantener el valor personal del dativo sin redundancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro digno y claro, sin arcaísmos innecesarios.
  - No se sustituye el valor violento de μέλη ποιήσαντες por un eufemismo excesivo; «hacerlo pedazos» mantiene la crudeza del pasaje.
  - «Los de afuera» refleja el dativo plural personal del griego mejor que una mera indicación espacial.
