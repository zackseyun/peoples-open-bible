translation:
  language: es
  text: Y pondré la justicia como cordel de medir[a], y la rectitud como plomada[b]; el granizo barrerá el refugio de la mentira, y las aguas inundarán el abrigo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «línea de medición»; el hebreo קָו designa un cordel o línea usada para medir.
    reason: lexical_alternative
  - marker: b
    text: O «plomo»; מִשְׁקָלֶת alude al instrumento usado para verificar la vertical.
    reason: lexical_alternative
  - marker: c
    text: O «escondite»; el hebreo סֵתֶר denota un lugar de ocultamiento o protección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y haré
  - Y estableceré
  lexicon: HALOT
  rationale: שׂוּם puede significar poner, establecer o disponer. «Pondré» conserva la fuerza declarativa del hebreo y suena natural en español sin añadir interpretación innecesaria.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la sentencia
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט expresa el estándar justo de Dios en la metáfora. «Justicia» comunica mejor esa idea en español actual; «juicio» seguiría siendo posible, pero es menos claro en este contexto figurado.
- source_word: לְקָו
  english_pob_choice: the measuring line
  chosen_spanish: como cordel
  alternatives_spanish:
  - como línea de medición
  - como regla
  lexicon: HALOT
  rationale: קָו es un cordel o línea de medir. En español, «cordel» mantiene la imagen de construcción y medición; «línea de medición» sería más explicativo pero menos idiomático.
- source_word: וּצְדָקָה
  english_pob_choice: and righteousness
  chosen_spanish: y la rectitud
  alternatives_spanish:
  - y la justicia
  - y la justicia recta
  lexicon: HALOT
  rationale: צְדָקָה conserva aquí la dimensión moral y de conformidad con lo recto. «Rectitud» mantiene la distinción respecto de מִשְׁפָּט y evita reducir ambos términos a un solo equivalente.
- source_word: לְמִשְׁקָלֶת
  english_pob_choice: the plumb line
  chosen_spanish: como plomada
  alternatives_spanish:
  - como plomo de albañil
  - como nivel
  lexicon: HALOT
  rationale: מִשְׁקָלֶת alude al instrumento de aplomar. «Plomada» es el equivalente español más natural y preciso para la metáfora arquitectónica.
- source_word: וְיָעָה
  english_pob_choice: will sweep away
  chosen_spanish: barrerá
  alternatives_spanish:
  - arrasará
  - limpiará
  lexicon: HALOT
  rationale: יעע describe acción de barrer o apartar. Con granizo como sujeto, «barrerá» reproduce bien la imagen de destrucción súbita y directa.
- source_word: בָרָד
  english_pob_choice: hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - la granizada
  lexicon: HALOT
  rationale: Término meteorológico directo. «Granizo» es claro y fiel al hebreo.
- source_word: מַחְסֵה כָזָב
  english_pob_choice: the refuge of lies
  chosen_spanish: el refugio de la mentira
  alternatives_spanish:
  - el refugio de engaños
  - el abrigo de la falsedad
  lexicon: HALOT
  rationale: 'El sintagma conserva el valor genitivo: un refugio caracterizado por la mentira/falseamiento. «Mentira» es transparente en español y mantiene la conexión con el contexto inmediato de falsa seguridad.'
- source_word: וְסֵתֶר
  english_pob_choice: and the shelter
  chosen_spanish: y el abrigo
  alternatives_spanish:
  - y el refugio oculto
  - y el escondite
  lexicon: HALOT
  rationale: סֵתֶר denota lugar de ocultamiento o protección. «Abrigo» funciona en español como cobertura/protección y evita duplicar exactamente «refugio».
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - las corrientes
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «las aguas», que también refuerza el paralelismo poético y la imagen de juicio inundante.
- source_word: יִשְׁטֹפוּ
  english_pob_choice: will flood
  chosen_spanish: inundarán
  alternatives_spanish:
  - desbordarán
  - cubrirán
  lexicon: HALOT
  rationale: שׁטף comunica inundación o desborde. «Inundarán» expresa con claridad el efecto devastador sobre el abrigo.
theological_decisions:
- issue: Distinción entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: justice / righteousness
  chosen_spanish_reading: justicia / rectitud
  alternative_spanish_readings:
  - juicio / justicia
  - justicia / justicia
  rationale: Mantener dos términos distintos preserva la paralelismo semántico del verso y evita borrar la tensión entre el orden justo de Dios y la cualidad moral de lo recto. En español, «justicia / rectitud» expresa bien esa diferencia sin forzar el léxico.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Metáfora de juicio destructivo con refugio y aguas
  english_pob_reading: hail will sweep away the refuge of lies, and waters will flood the shelter
  chosen_spanish_reading: el granizo barrerá el refugio de la mentira, y las aguas inundarán el abrigo
  alternative_spanish_readings:
  - el granizo arrasará el refugio de la mentira, y las aguas desbordarán el abrigo
  - el granizo barrerá el refugio de la falsedad, y las aguas inundarán el escondite
  rationale: 'La imagen del juicio no se suaviza: el granizo y las aguas conservan su carácter devastador. «Refugio de la mentira» mantiene la crítica a la falsa seguridad del contexto inmediato, y «abrigo» deja sentir la ironía de una protección que no puede resistir el juicio.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto español sigue de cerca el pasaje fuente y el audit trail en inglés, sin cambios de revisión recientes; se mantiene la equivalencia óptima y la distinción léxica entre מִשְׁפָּט y צְדָקָה.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se conservaron imágenes arquitectónicas y meteorológicas coherentes con el hebreo.
  - «Mentira» traduce כָזָב con claridad y mantiene la fuerza polémica del contexto.
  - Se prefirió «rectitud» para צְדָקָה a fin de no colapsar el paralelismo con מִשְׁפָּט.
