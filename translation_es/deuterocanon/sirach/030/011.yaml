translation:
  language: es
  text: No le des autoridad[a] en su juventud, y no pases por alto sus faltas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No le des control en su juventud». El hebreo puede significar concederle dominio o autoridad; el paralelo griego lee «no le des autoridad en la juventud».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus corrupciones» o «sus actos destructivos». El sentido es que no deben ignorarse las conductas dañinas de un joven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δῷς αὐτῷ ἐξουσίαν / תמשילהו
  english_pob_choice: Do not give him free rein
  chosen_spanish: No le des autoridad
  alternatives_spanish:
  - No le des libertad total
  - No le concedas control
  - No le permitas mandar
  lexicon: HALOT; LXX ἐξουσία
  rationale: El hebreo causativo de משל y el griego ἐξουσία apuntan a no conceder poder, control o licencia a un joven. En español, «autoridad» conserva la idea de poder delegado sin volverla excesivamente coloquial; la nota preserva la alternativa entre autoridad y control.
- source_word: ἐν νεότητι / בנעוריו
  english_pob_choice: in his youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando es joven
  - durante su juventud
  lexicon: HALOT
  rationale: La expresión temporal es directa y natural en español; «en su juventud» conserva el valor del período de juventud sin añadir matices.
- source_word: תשא לשחיתותיו
  english_pob_choice: do not overlook his faults
  chosen_spanish: no pases por alto sus faltas
  alternatives_spanish:
  - no ignores sus faltas
  - no disculpes sus faltas
  - no dejes pasar sus corrupciones
  lexicon: HALOT
  rationale: El hebreo לשחיתותיו puede referirse a actos corruptos, ruinosos o faltas morales. Siguiendo la revisión inglesa, «faltas» es lo bastante amplio y cercano al texto sin ampliar interpretativamente; «pasar por alto» refleja bien el valor idiomático de נשא en este contexto disciplinario.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que sustituyó una paráfrasis más expansiva por «faults/faltas» para acercarse más a לשחיתותיו sin expandir el sentido. También toma en cuenta el paralelismo hebreo con el griego ἐξουσίαν, manteniendo la tensión lexical entre autoridad/control.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo negativo doble del versículo: una advertencia sobre otorgar poder y otra sobre no dejar pasar las faltas.'
  - «Autoridad» se usa aquí por fidelidad al campo semántico de משל/ἐξουσία, no como término eclesiástico.
  - «Faltas» mantiene la amplitud semántica documentada en el hebreo y evita una paráfrasis moralizante más fuerte.
