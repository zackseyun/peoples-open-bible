lexical_decisions:
- source_word: וַיֹּאמֶר אֶל־דָּוִד
  english_pob_choice: And he said to David
  chosen_spanish: Y él dijo a David
  alternatives_spanish:
  - Y dijo a David
  - Y él le dijo a David
  lexicon: WLC; HALOT
  rationale: Conservo el sujeto indefinido del hebreo con «él», porque el texto no lo nombra en la cláusula. «Dijo a David» expresa bien el dativo con אֶל sin sobretraducir.
- source_word: צַדִּיק אַתָּה מִמֶּנִּי
  english_pob_choice: You are more righteous than I
  chosen_spanish: Tú eres más justo que yo
  alternatives_spanish:
  - Tú eres más recto que yo
  - Tú estás más en lo correcto que yo
  lexicon: WLC; HALOT
  rationale: «צַדִּיק» puede ser «justo» o «recto/en lo correcto». En español «más justo que yo» mantiene el valor moral y la comparación implícita de מִן sin sonar forzado.
- source_word: גְּמַלְתַּנִי הַטּוֹבָה
  english_pob_choice: you have dealt well with me
  chosen_spanish: me has tratado bien
  alternatives_spanish:
  - me has hecho bien
  - me has correspondido con bien
  lexicon: WLC; HALOT
  rationale: El verbo גמל aquí expresa tratar a alguien de cierta manera. «Tratar bien» reproduce la relación directa y natural del hebreo sin introducir una imagen de retribución que el texto aquí no exige.
- source_word: גְּמַלְתִּיךָ הָרָעָה
  english_pob_choice: I have dealt evil with you
  chosen_spanish: te he tratado mal
  alternatives_spanish:
  - te he hecho mal
  - te he correspondido con mal
  lexicon: WLC; HALOT
  rationale: Sigo la misma raíz verbal en español con «he tratado mal» para conservar el contraste retórico. «Mal» preserva el antónimo de «bien» y evita suavizar רָעָה a solo daño físico.
theological_decisions:
- issue: Comparative righteousness / moral standing
  english_pob_reading: You are more righteous than I
  chosen_spanish_reading: Tú eres más justo que yo
  alternative_spanish_readings:
  - Tú estás más en lo correcto que yo
  - Tú eres más recto que yo
  rationale: La confesión de Saúl es moral y relacional, no solo jurídica. «Más justo» conserva esa tensión y el reconocimiento de culpa o inferioridad moral ante David.
  doctrine_reference: 1 Samuel 24:18; cf. idea de rectitud moral en comparaciones de juicio
- issue: Rendering of גמל as reciprocal treatment rather than literal repayment
  english_pob_reading: you have dealt well with me / I have dealt evil with you
  chosen_spanish_reading: me has tratado bien / te he tratado mal
  alternative_spanish_readings:
  - me has correspondido con bien / te he correspondido con mal
  - me has hecho bien / te he hecho mal
  rationale: La revisión inglesa del POB privilegia «dealt well/evil» para acercarse a גמל. En español, «tratar bien/mal» comunica esa reciprocidad de modo natural y mantiene el paralelismo con el hebreo.
  doctrine_reference: Paralelismo hebreo y reciprocidad ética en la narrativa de 1 Samuel
translation_notes:
  revision_awareness: Sigo la revisión más reciente del POB, que abandonó una traducción de retribución más explícita en favor de una rendición más directa de גמל. En español, elegí una fórmula igualmente directa y natural («me has tratado bien / te he tratado mal») para conservar el contraste sin añadir imágenes ajenas al hebreo.
  spanish_consistency_notes:
  - Uso «David» sin transliteración para el nombre propio ya asentado en español.
  - Mantengo el contraste bien/mal para reflejar הַטּוֹבָה / הָרָעָה y la repetición verbal de גמל.
  - El texto evita «SEÑOR» y no introduce ningún término teológico ajeno al versículo.
  - La puntuación española usa comillas angulares para la cita directa y coloca la nota al pie inmediatamente tras «yo».
