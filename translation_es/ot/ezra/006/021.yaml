translation:
  language: es
  text: Los hijos de Israel que habían regresado del exilio comieron[a], junto con todos los que se habían apartado de la impureza[b] de los pueblos de la tierra para buscar a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''los israelitas''. Hebreo: ''los hijos de Israel''.'
    reason: lexical_alternative
  - marker: b
    text: O 'de la inmundicia / contaminación de los pueblos de la tierra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: The sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la expresión hebrea de forma transparente y natural en español. 'Hijos de Israel' refleja el constructo sin reducirlo a una etiqueta más interpretativa como 'israelitas'.
- source_word: הַשָּׁבִים מֵהַגּוֹלָה
  english_pob_choice: who had returned from the exile
  chosen_spanish: que habían regresado del exilio
  alternatives_spanish:
  - que habían vuelto del cautiverio
  - los exiliados que habían regresado
  lexicon: HALOT
  rationale: '''Exilio'' comunica con mayor precisión y naturalidad el estado histórico en este contexto que ''cautiverio''. El participio se vierte con pluscuamperfecto para reflejar una acción previa.'
- source_word: וְכֹל הַנִּבְדָּל
  english_pob_choice: together with everyone who had separated himself
  chosen_spanish: junto con todos los que se habían apartado
  alternatives_spanish:
  - y todos los que se habían separado
  - junto con cualquiera que se hubiera apartado
  lexicon: HALOT
  rationale: El niphal participial indica separación voluntaria o resultante; en español, 'se habían apartado' conserva esa idea sin sobreespecificar el matiz reflexivo masculino del hebreo.
- source_word: מִטֻּמְאַת גּוֹיֵי הָאָרֶץ
  english_pob_choice: from the uncleanness of the peoples of the land
  chosen_spanish: de la impureza de los pueblos de la tierra
  alternatives_spanish:
  - de la inmundicia de los pueblos de la tierra
  - de la contaminación ritual de los pueblos de la tierra
  lexicon: HALOT
  rationale: '''Impureza'' preserva el campo cultual/ritual de טֻמְאָה y mantiene la ambigüedad entre lo ritual y lo moral. ''Pueblos de la tierra'' sigue la referencia colectiva sin convertirla en un término técnico ajeno al español.'
- source_word: לִדְרֹשׁ
  english_pob_choice: to seek
  chosen_spanish: para buscar
  alternatives_spanish:
  - para buscar a Yahvé
  - para inquirir de
  lexicon: HALOT
  rationale: En español, 'buscar' comunica bien el sentido devocional de דרשׁ con Dios como objeto, sin reducirlo a 'adorar' ni llevarlo al terreno exclusivo de consultar oráculos. Se mantiene la finalidad con 'para'.
- source_word: לַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - al Nombre divino
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para YHWH: ''Yahvé'' en el texto principal, en lugar de la convención de ''SEÑOR''.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios que es de Israel
  lexicon: HALOT
  rationale: Es la equivalencia estándar y más clara para el constructo, preservando la identificación pactual del Dios de Israel.
theological_decisions:
- issue: Identidad de los participantes adicionales en la Pascua
  english_pob_reading: The verse includes not only returned exiles but also other persons who separated themselves from the uncleanness of the local peoples and joined the returned community in seeking the LORD, the God of Israel.
  chosen_spanish_reading: El versículo incluye no solo a los regresados del exilio, sino también a otros que se apartaron de la impureza de los pueblos de la tierra para buscar a Yahvé, el Dios de Israel.
  alternative_spanish_readings:
  - '...para unirse a ellos y buscar a Yahvé...'
  - '...como prosélitos que se habían apartado...'
  rationale: El hebreo no identifica explícitamente a ese grupo como prosélitos ni añade una cláusula clara de 'unirse a ellos' en este punto. La traducción conserva la amplitud del texto y evita resolver una tensión histórica/teológica que el original deja abierta.
  doctrine_reference: Preservar la tensión textual en lugar de cerrarla interpretativamente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del POB inglés que eliminó ''para unirse a ellos'' por no estar explícito en el hebreo. Por eso la cláusula final en español expresa solo la finalidad dada por לִדְרֹשׁ: ''para buscar a Yahvé, el Dios de Israel''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para YHWH, conforme a la terminología del proyecto.
  - '''Impureza'' se eligió para טֻמְאָה por su carga cultual, evitando ''inmundicia'' como forma principal aunque se deja como alternativa.'
  - '''Hijos de Israel'' conserva la metáfora genealógica del hebreo sin forzar una masculinización exclusiva.'
  - No se añadió una equivalencia explícita de 'unirse a ellos', en línea con la revisión auditada del inglés POB.
