    rationale: Aunque intenta reproducir el complemento implícito de παραζηλώσει, en español estándar la construcción correcta es «provocará celos en el enemigo» o «provocará al enemigo a celos»; la forma actual suena defectuosa y entorpece la lectura.
  - severity: medium
