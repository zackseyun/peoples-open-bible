theological_decisions:
- issue: Identity of 'David their king'
  chosen_reading: Retained as 'David their king' in the main text without interpretive expansion.
  alternative_readings:
  - the historical David restored
  - a future Davidic king / messianic ruler
  rationale: The Hebrew text names 'David' directly. Within Christian canonical reading this can carry messianic significance, but the verse itself does not explicitly identify the referent beyond the Davidic royal figure. Preserving the wording maintains theological tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of פחדו אל יהוה ואל טובו
  chosen_reading: Rendered as movement in reverent trembling toward the LORD and his goodness.
  alternative_readings:
  - they will fear the LORD and his goodness
  - they will stand in awe of the LORD and his bounty
  rationale: The combination of פחד with אֶל suggests not mere emotional fear but an awed approach. This avoids implying that God's goodness is itself a threat, while preserving the trembling reverence of the Hebrew.
