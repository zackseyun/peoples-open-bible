  language: en
  yaml_path: translation/ot/exodus/010/001.yaml
  text: Then Yahweh said to Moses[a], "Go in to Pharaoh, because I have hardened his heart and the heart of his servants[b], so that I may set these signs of mine among them."
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have made heavy his heart.'' The idiom means that the LORD hardened or made Pharaoh unresponsive.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'in his midst.' The sense may be Pharaoh specifically, or Pharaoh together with his servants/court.
    reason: alternative_reading
