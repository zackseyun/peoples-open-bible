translation:
  language: es
  text: Entonces Sarai, esposa de Abram, tomó a Agar la egipcia, su esclava, después de que Abram había vivido diez años en la tierra de Canaán[a], y se la dio a Abram, su esposo, como esposa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al término de diez años de que Abram habitaba en la tierra de Canaán».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como esposa»; el texto también identifica a Agar como esclava de Sarai.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - la tomó
  - cogió
  lexicon: HALOT
  rationale: לקח en narración resulta naturalmente en 'tomó'; en español conserva la secuencia narrativa sin añadir matiz innecesario.
- source_word: שָׂרַי אֵשֶׁת אַבְרָם
  english_pob_choice: Sarai, Abram’s wife,
  chosen_spanish: Sarai, esposa de Abram,
  alternatives_spanish:
  - Sarai, la esposa de Abram
  - Sarai, mujer de Abram
  lexicon: HALOT
  rationale: La apposición identifica a Sarai por su relación con Abram; 'esposa de Abram' es claro y fiel, sin forzar una perífrasis más pesada.
- source_word: הָגָר הַמִּצְרִית
  english_pob_choice: Hagar the Egyptian
  chosen_spanish: Agar la egipcia
  alternatives_spanish:
  - Agar, la egipcia
  - Agar la mujer egipcia
  lexicon: HALOT
  rationale: El gentilicio indica origen/identidad étnica; 'la egipcia' es conciso e idiomático en español.
- source_word: שִׁפְחָתָהּ
  english_pob_choice: her female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su criada
  lexicon: HALOT
  rationale: שִׁפְחָה denota esclava o sierva femenina. Se conserva 'esclava' para reflejar la fuerza léxica y la relación de dependencia social marcada en el contexto.
- source_word: מִקֵּץ עֶשֶׂר שָׁנִים לְשֶׁבֶת אַבְרָם בְּאֶרֶץ כְּנָעַן
  english_pob_choice: after Abram had lived ten years in the land of Canaan
  chosen_spanish: al cabo de diez años de haber habitado Abram en la tierra de Canaán
  alternatives_spanish:
  - después de que Abram hubo habitado diez años en la tierra de Canaán
  - al término de diez años de la estancia de Abram en la tierra de Canaán
  lexicon: HALOT
  rationale: La construcción hebrea expresa el cierre de un período temporal vinculado al habitar de Abram; 'al cabo de' comunica esa culminación con naturalidad y precisión.
- source_word: וַתִּתֵּן אֹתָהּ לְאַבְרָם אִישָׁהּ ל֥וֹ לְאִשָּׁה
  english_pob_choice: and gave her to Abram her husband as a wife
  chosen_spanish: y la dio a Abram, su esposo, como esposa
  alternatives_spanish:
  - y la entregó a Abram, su esposo, como esposa
  - y se la dio a Abram, su esposo, para que fuera su esposa
  lexicon: HALOT
  rationale: El hebreo expresa entrega y el resultado/estatus de esposa. 'Como esposa' preserva el valor formal sin añadir una interpretación como 'concubina', que el texto no usa.
theological_decisions:
- issue: Estatus de Agar frente a Sarai y Abram
  english_pob_reading: Retain 'her female slave' and 'as a wife' together, preserving the tension rather than resolving it.
  chosen_spanish_reading: Conservar 'su esclava' y 'como esposa' juntas, sin convertir el vínculo en 'concubina' ni suavizar la esclavitud.
  alternative_spanish_readings:
  - su sierva ... como esposa
  - su criada ... para ser esposa
  rationale: El hebreo identifica a Agar simultáneamente como esclava de Sarai y como mujer dada a Abram en calidad de esposa. La traducción mantiene ambas realidades sin armonizarlas.
  doctrine_reference: Preservar la tensión del texto fuente y la primacía del original frente a la tradición interpretativa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al evitar sobretraducir el dativo final de לוֹ y al mantener el cierre temporal con una fórmula natural en español. También se conservó la tensión documentada entre la condición servil de Agar y su entrega como esposa, sin resolverla con vocabulario eclesiástico tradicional.
  spanish_consistency_notes:
  - Se usa 'Agar' como forma española estándar del nombre propio.
  - Se usa 'esclava' por la fuerza léxica de שִׁפְחָה, en coherencia con el POB inglés.
  - '''Como esposa'' refleja el valor de לְאִשָּׁה sin añadir ''para él'' al final, en línea con la revisión inglesa.'
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; no aparece el Tetragrámaton en este versículo.
  - La puntuación mantiene la aposición y la cláusula temporal de forma legible para lectura pública.
