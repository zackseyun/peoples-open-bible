translation:
  language: es
  text: Se ha acordado de su amor leal y de su fidelidad a la casa de Israel; todos los confines de la tierra han visto la salvación[a] de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la liberación de nuestro Dios»; en contexto salmódico, el hebreo también puede dar la idea de una acción salvadora victoriosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכַר
  english_pob_choice: has remembered
  chosen_spanish: se ha acordado
  alternatives_spanish:
  - ha recordado
  - se ha lembrado
  lexicon: HALOT
  rationale: El hebreo qal perfecto expresa una acción completa con relevancia presente. En español, «se ha acordado» comunica bien el sentido de recordar con efecto actual, sin endurecer el estilo.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד en este contexto tiene fuerza relacional y pactual. «Amor leal» conserva esa fidelidad durable mejor que «misericordia», y suena natural en español bíblico contemporáneo.
- source_word: וֶאֱמוּנָתוֹ
  english_pob_choice: and his faithfulness
  chosen_spanish: y de su fidelidad
  alternatives_spanish:
  - y de su fe
  - y de su verdad
  - y de su constancia
  lexicon: HALOT
  rationale: אֱמוּנָה aquí describe fiabilidad, no mera creencia. «Fidelidad» es la correspondencia más clara en español y mantiene el paralelismo con חֶסֶד.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - a la casa de Israel
  - hacia la casa de Israel
  lexicon: HALOT
  rationale: La preposición לְ puede marcar dirección o beneficio. «Para» preserva esa relación de beneficio/covenantalidad y resulta fluida en español.
- source_word: רָאוּ
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: El perfecto hebreo funciona bien con el presente perfecto español en este canto de alabanza, subrayando que el hecho ya ha ocurrido con vigencia presente.
- source_word: כָל אַפְסֵי אָרֶץ
  english_pob_choice: all the ends of the earth
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - toda la tierra hasta sus rincones más lejanos
  lexicon: HALOT
  rationale: El modismo hebreo se expresa de forma idiomática en español con «confines de la tierra», que mantiene el alcance universal sin sonar forzado.
- source_word: יְשׁוּעַת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - la victoria
  lexicon: HALOT
  rationale: «Salvación» preserva la amplitud teológica del sustantivo hebreo en contexto salmódico, sin restringirlo a una victoria militar.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: of our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - de Dios nuestro
  - de nuestro Dios mismo
  lexicon: HALOT
  rationale: La construcción genitiva se vuelve de manera natural como «de nuestro Dios», manteniendo la referencia al Dios del pueblo sin añadir matices ajenos.
theological_decisions:
- issue: Matiz pactual de חֶסֶד y אֱמוּנָה
  english_pob_reading: Rendered as 'steadfast love' and 'faithfulness'
  chosen_spanish_reading: «amor leal» y «fidelidad»
  alternative_spanish_readings:
  - «misericordia» y «verdad»
  - «amor de pacto» y «fidelidad»
  rationale: El versículo celebra la fiabilidad pactal de Dios hacia Israel. «Amor leal» y «fidelidad» conservan ese campo semántico sin recurrir a un calco arcaizante ni diluir el vínculo relacional.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Alcance de יְשׁוּעַת אֱלֹהֵינוּ
  english_pob_reading: Rendered as 'the salvation of our God'
  chosen_spanish_reading: «la salvación de nuestro Dios»
  alternative_spanish_readings:
  - «la liberación de nuestro Dios»
  - «la victoria de nuestro Dios»
  rationale: El hebreo admite una gama que incluye liberación y, en ciertos contextos, victoria. «Salvación» preserva esa amplitud teológica y el énfasis universal del salmo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincido con el control de alta concordancia: no se requieren cambios sustantivos respecto al análisis auditado. La decisión principal en español es mantener el par semántico pactual de חֶסֶד / אֱמוּנָה con términos naturales («amor leal» / «fidelidad») y conservar el alcance amplio de יְשׁוּעָה como «salvación».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce una sustitución litúrgica.
  - «Casa de Israel» se conserva como expresión covenantal reconocible en español.
  - La estructura verbal en perfecto compuesto («se ha acordado», «han visto») refleja la vigencia presente del hecho en el canto.
  - No se usa «SEÑOR» porque el hebreo aquí no contiene el Tetragrámaton.
