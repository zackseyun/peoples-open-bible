lexical_decisions:
- source_word: προτείναντα
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - tendió
  lexicon: LSJ
  rationale: El participio describe un gesto físico de extender la mano hacia adelante. «Extendió» es natural en español moderno y conserva el movimiento sin sonar artificial.
- source_word: τὴν δεξιὰν
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - la derecha
  - su diestra
  lexicon: LSJ
  rationale: En español conviene explicitar «mano» porque el griego dice literalmente «la derecha». «Su mano derecha» evita ambigüedad y mantiene la referencia corporal.
- source_word: παραδοῦναι
  english_pob_choice: handed
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - pasó a
  - puso en las manos de
  lexicon: LSJ
  rationale: El verbo tiene el matiz de entregar o poner en posesión de otro. «Entregó» preserva mejor esa fuerza que un simple «dio», y sigue la revisión inglesa más cercana a παραδοῦναι.
- source_word: ῥομφαίαν χρυσῆν
  english_pob_choice: a golden sword
  chosen_spanish: una espada de oro
  alternatives_spanish:
  - una espada dorada
  - una espada de oro fino
  - un sable de oro
  lexicon: LSJ
  rationale: ῥομφαία es una espada o gran hoja; «espada» es la equivalencia clara y sobria en español. «De oro» reproduce el genitivo/adjetivo material sin forzar un valor meramente cromático.
- source_word: διδόντα
  english_pob_choice: as he gave it
  chosen_spanish: mientras la entregaba
  alternatives_spanish:
  - al entregarla
  - al darla
  - mientras la daba
  lexicon: LSJ
  rationale: El participio marca simultaneidad con el acto de presentar la espada. «Mientras la entregaba» mantiene esa simultaneidad y enlaza bien con la acción anterior.
- source_word: προσφωνῆσαι
  english_pob_choice: addressed him with these words
  chosen_spanish: le dirigió estas palabras
  alternatives_spanish:
  - le habló así
  - lo saludó con estas palabras
  - le dijo
  lexicon: LSJ
  rationale: El verbo implica dirigirse a alguien de modo formal o intencional. «Le dirigió estas palabras» conserva el tono introductorio y prepara la cita siguiente sin añadir contenido.
- source_word: τάδε
  english_pob_choice: with these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - esto
  - las siguientes palabras
  lexicon: LSJ
  rationale: «τάδε» introduce la cita que sigue. «Estas palabras» es el equivalente más natural en español y evita una literalidad innecesaria.
- source_word: Ἰούδα
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: standard Greek onomastics
  rationale: Aquí se trata de Judas Macabeo, no de la tribu de Judá. «Judas» es la transliteración estándar y la más clara para el lector español.
- source_word: Ἰερεμίαν
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremias
  lexicon: standard Greek onomastics
  rationale: El nombre del profeta se vierte normalmente como «Jeremías» en español. Es la forma más reconocible y fiel al referente bíblico.
theological_decisions:
- issue: Presentación de Jeremías entregando la espada en una escena visionaria
  english_pob_reading: Render the action straightforwardly as part of the narrative vision without adding interpretive qualifiers in the verse itself.
  chosen_spanish_reading: Traducir la acción de manera directa, sin añadir en este versículo que ocurre en una visión.
  alternative_spanish_readings:
  - Entonces Jeremías, en visión, extendió su mano derecha...
  - Entonces Jeremías apareció y entregó...
  rationale: El griego de este versículo narra la acción sin explicarla. La dimensión visionaria pertenece al contexto inmediato y no debe importarse aquí, para no resolver ni alterar la tensión narrativa del texto.
  doctrine_reference: Preservar la tensión narrativa y no introducir aclaraciones doctrinales no presentes en el versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «handed» sobre «gave» para reflejar mejor παραδοῦναι. En español, esa decisión se refleja con «entregó», que conserva la idea de poner algo en manos de otro sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Jeremías» para el nombre del profeta y «Judas» para Judas Macabeo.
  - Se usa «espada» como equivalente general de ῥομφαία para claridad, sin introducir una especificación no indicada por el griego.
  - No se añade ninguna nota de visión dentro del texto, para respetar el flujo narrativo del versículo.
