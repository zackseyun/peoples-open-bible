revisions:
- from: Las nubes son un [a]cubrimiento para él, de modo que no ve; y anda por la bóveda de los cielos.
  to: Las nubes son una cobertura para él[a], de modo que no ve; y anda por la bóveda de los cielos.
  rationale: Se corrige la colocación del marcador de nota, se sustituye «cubrimiento» por «cobertura» para mayor naturalidad y claridad en español, y se ajusta la nota para reflejar con más precisión la alternativa léxica y sintáctica preservada en el English POB.
