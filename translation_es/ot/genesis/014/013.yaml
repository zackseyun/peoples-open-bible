base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/013.yaml
  text: Then a fugitive came and told Abram the Hebrew[a]. Now he was dwelling by the oaks of Mamre the Amorite, brother of Eshcol and brother of Aner[c][b]; these were allies of Abram.
  footnotes:
  - marker: a
    text: Or 'by the terebinths of Mamre.' The Hebrew term can denote large trees, often identified as oaks or terebinths.
    reason: lexical_alternative
  - marker: b
    text: Or 'kinsman of Eshcol and kinsman of Aner.' The Hebrew word for 'brother' can also refer to a broader family relation.
    reason: lexical_alternative
  - marker: c
    text: Literally 'owners/masters of a covenant' with Abram, that is, men bound to him by treaty.
    reason: cultural_note
