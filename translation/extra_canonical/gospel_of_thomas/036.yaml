  chosen_basis: coptic
  rationale: POxy 655 expands the topic to include food and broader exhortations (lilies,
    stature) and explicitly mentions clothing; the Coptic NH II text preserves only
    the compressed prohibition about anxiety regarding what you will put on yourselves.
    Where they overlap (concern about clothing), the sense aligns; we translate the
    Coptic as transmitted without importing Greek expansions.
