translation:
  language: es
  text: 'Entonces Yahvé me dijo: «Toma otra vez para ti el equipo[a] de un pastor necio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «implementos» o «utensilios». El término hebreo es amplio y se refiere a los artículos o útiles asociados con un pastor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y luego ... dijo
  lexicon: WLC/HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» conserva la secuencia natural en español sin perder el valor progresivo del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: WLC/HALOT
  rationale: Se mantiene el nombre divino personal del Tetragrámaton, conforme al criterio POB, en lugar de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El complemento con dirección a la primera persona se expresa naturalmente en español con «me»; «a mí» sería más enfático pero menos fluido aquí.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  lexicon: HALOT
  rationale: En este mandato, עוֹד señala repetición de una acción previa; «otra vez» comunica mejor ese valor que «todavía».
- source_word: קַח לְךָ
  english_pob_choice: Take for yourself
  chosen_spanish: Toma para ti
  alternatives_spanish:
  - Toma
  - Consigue para ti
  lexicon: HALOT
  rationale: El imperativo más el dativo reflexivo expresan participación personal en la acción. «Para ti» conserva ese matiz sin sobrerrepresentarlo.
- source_word: כְּלִי
  english_pob_choice: equipment
  chosen_spanish: equipo
  alternatives_spanish:
  - implementos
  - utensilios
  - equipo/herramientas
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos o útiles asociados al oficio; en este contexto pastoral, «equipo» mantiene la amplitud semántica y suena natural en español.
- source_word: רֹעֶה
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - pastor de ovejas
  - pastor
  lexicon: HALOT
  rationale: En español bíblico, «pastor» comunica la función sin añadir especificaciones; el contexto ya indica que se trata de una imagen pastoral.
- source_word: אֱוִלִי
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - foolish
  lexicon: HALOT
  rationale: «Necio» reproduce bien la carga moral e intelectual de אֱוִילִי sin suavizarla; «insensato» también sería posible, pero es menos directo.
theological_decisions:
- issue: Identidad del pastor simbólico
  english_pob_reading: Render the phrase descriptively as 'a foolish shepherd' without specifying whether this represents a particular historical ruler, false leaders generally, or an eschatological figure.
  chosen_spanish_reading: Traducir descriptivamente como «un pastor necio» sin precisar si alude a un líder histórico, a malos dirigentes en general o a una figura escatológica.
  alternative_spanish_readings:
  - un líder necio
  - un pastor corrupto
  - un anti-pastor escatológico
  rationale: El hebreo solo ofrece la designación simbólica; la versión española conserva esa tensión interpretativa y evita resolverla donde el texto no lo hace.
  doctrine_reference: Preservar la tensión teológica sin imponer una identificación interpretativa.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado fue alto y estable, por lo que se mantiene una solución directa y sobria en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton, conforme al estándar POB.
  - Se usa «necio» para אֱוִלִי, alineado con la fuerza moral del término.
  - «Equipo» se eligió como colectivo natural para כְּלִי en un contexto de oficio pastoral.
