  glossary_alignment: 'Alineación parcial con el glosario del proyecto: aunque el valor por defecto para עֶבֶד/δοῦλος favorece ''esclavo'', el propio marco del proyecto permite excepciones con razón contextual documentada. Aquí esa razón sí existe en el expediente inglés: autohumillación cortesana ante el rey. ''Mi señor el rey'', ''Jerusalén'' y la nota de דָּבָר están bien alineados.'
