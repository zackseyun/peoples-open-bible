translation:
  text: for himself and for his wife[a], and stored what was being kept. And at the completion of the seven years which he had completed there, exactly seven years, in the second month, on the seventeenth day, the serpent came and approached the woman, and the serpent said to the woman, “Has God commanded you, saying, ‘You shall not eat from every tree of the garden’?”
  philosophy: optimal-equivalence
