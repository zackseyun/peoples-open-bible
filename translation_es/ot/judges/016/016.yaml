translation:
  language: es
  text: Y sucedió que, cuando ella lo apremiaba con sus palabras todos los días y lo instaba, su alma se impacientó[a] hasta el punto de morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo más literalmente: ''su alma se acortó para morir''; es un modismo que expresa extrema angustia, exasperación o agotamiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: And it happened that, when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y aconteció que, cuando
  - Cuando
  lexicon: HALOT
  rationale: Conserva la transición narrativa del hebreo וַיְהִי כִּי con un giro natural en español. 'Sucedió que' mantiene el tono bíblico sin sonar tan arcaico como 'aconteció que', y 'cuando' preserva la subordinación temporal del contexto.
- source_word: הֵצִיקָה לוֹ
  english_pob_choice: she pressed him
  chosen_spanish: ella lo apremiaba
  alternatives_spanish:
  - ella lo oprimía
  - ella lo acosaba
  - ella lo presionaba
  lexicon: HALOT
  rationale: El verbo expresa presión o aflicción repetida. 'Apremiar' comunica bien la insistencia coercitiva de la escena sin reducirla solo a presión física, y encaja con el complemento verbal inmediato.
- source_word: בִּדְבָרֶיהָ
  english_pob_choice: with her words
  chosen_spanish: con sus palabras
  alternatives_spanish:
  - con lo que decía
  - por sus palabras
  lexicon: HALOT
  rationale: La preposición instrumental más el sustantivo concreto se rinden de forma directa y clara. 'Con sus palabras' preserva la imagen textual sin explicación añadida.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - a diario
  - constantemente
  lexicon: HALOT
  rationale: Aunque el hebreo usa una expresión más nominal, en español la formulación natural y fiel es 'todos los días', que mantiene la idea de persistencia continua.
- source_word: וַתְּאַלֲצֵהוּ
  english_pob_choice: urged him
  chosen_spanish: lo insistía
  alternatives_spanish:
  - lo apremiaba
  - lo urgía
  - lo acosaba
  lexicon: HALOT
  rationale: Este verbo intensifica la presión ya expresada antes. 'Lo insistía' no es una calca perfecta, pero en español comunica repetición insistente y evita una mera repetición mecánica de 'apremiaba'; refleja la acumulación de presión del hebreo.
- source_word: וַתִּקְצַר נַפְשׁוֹ
  english_pob_choice: his soul grew impatient
  chosen_spanish: se le acortó el ánimo
  alternatives_spanish:
  - se le acortó el alma
  - perdió la paciencia
  - quedó extenuado
  lexicon: HALOT
  rationale: Se conserva el núcleo idiomático 'acortarse' ligado al sujeto interior, pero en español se usa 'ánimo' para expresar de manera comprensible la tensión interna y la exasperación. 'Alma' sería más literal, pero en esta frase puede sonar menos natural; 'ánimo' comunica mejor el estado emocional sin borrar la imagen hebrea.
- source_word: לָמוּת
  english_pob_choice: to the point of death
  chosen_spanish: hasta morir
  alternatives_spanish:
  - hasta el punto de morir
  - al borde de la muerte
  - de tanto que quería morir
  lexicon: HALOT
  rationale: El infinitivo expresa resultado extremo. 'Hasta morir' mantiene la fuerza resultativa sin introducir una interpretación psicológica no explicitada por el hebreo.
theological_decisions:
- issue: El estado interior expresado por נַפְשׁוֹ y la intensidad de la frase final
  english_pob_reading: his soul grew impatient to the point of death
  chosen_spanish_reading: se le acortó el ánimo hasta morir
  alternative_spanish_readings:
  - se le acortó el alma hasta morir
  - su alma se impacientó hasta morir
  - quedó exhausto hasta morir
  rationale: El hebreo usa una idiomática tensión interior, no una declaración doctrinal sobre el alma como entidad separada. 'Ánimo' permite expresar el desbordamiento emocional con claridad española, mientras la nota conserva la literalidad del idiomático 'acortarse' y su sentido extremo.
  doctrine_reference: Antropología bíblica; uso idiomático de נֶפֶשׁ / נַפְשׁוֹ en el AT
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó ''urged him on'' a ''urged him'' y prefirió ''his soul grew impatient'' para acercarse al valor idiomático del hebreo. La propuesta española refleja ese mismo equilibrio: mantiene la presión verbal acumulada y conserva la imagen interior sin traducirla de forma excesivamente literal ni suavizarla.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de la serie, aunque este versículo no lo contiene.
  - Se evita 'SEÑOR' como sustituto teológico no presente aquí.
  - '''Ánimo'' se usa aquí solo para renderizar el estado interior idiomático de נַפְשׁוֹ; no pretende reemplazar sistemáticamente ''alma'' en otros contextos.'
  - La puntuación sigue el patrón narrativo de una sola oración extensa, propia del hebreo de la perícopa.
