revisions:
- from: Ciertamente herirás a los habitantes de aquella ciudad con el filo de la espada[a], dedicándola a la destrucción, junto con todo lo que hay en ella y su ganado[b], con el filo de la espada.
  to: Ciertamente herirás a los habitantes de aquella ciudad con el filo de la espada, dedicándola a la destrucción[a], junto con todo lo que hay en ella y su ganado, con el filo de la espada[b].
  rationale: La traducción principal es sustancialmente fiel y no requiere reescritura de contenido, pero sí una corrección necesaria del aparato de notas para que cada nota explique el término fuente correcto. Se reubicó la nota de חרם al sintagma «destrucción» y se restauró para לְפִי חָרֶב una nota que preserve la alternativa literal documentada por el POB inglés.
