base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/022.yaml
  text: David said to Abiathar[a], “I knew on that day, when Doeg the Edomite was there, that he would surely tell Saul[c][b]. I am responsible for all the lives of your father’s house.”
  footnotes:
  - marker: a
    text: Or “that Doeg the Edomite was there.” The Hebrew conjunction can be taken as introducing the content of what David knew rather than a temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew uses an infinitive absolute with the finite verb: “telling, he would tell,” an emphatic form meaning “he would surely tell.”'
    reason: lexical_alternative
  - marker: c
    text: Or “I have caused the death of” or “I am the cause of” every life in your father’s house.
    reason: lexical_alternative
