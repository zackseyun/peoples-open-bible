translation:
  language: es
  text: Y levantaré sobre ellos un solo pastor[a], mi siervo David, y él los pastoreará; los pastoreará[c][b], y será su pastor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pondré sobre ellos un solo pastor».
    reason: lexical_alternative
  - marker: b
    text: «David» puede referirse literalmente a David como figura real idealizada, o más ampliamente a un futuro gobernante davídico.
    reason: alternative_reading
  - marker: c
    text: El hebreo repite el verbo de pastorear; también puede significar «apacentar» o «cuidar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: levantaré
  alternatives_spanish:
  - haré surgir
  - estableceré
  - pondré
  lexicon: HALOT
  rationale: הקים en esta forma causativa expresa levantar, establecer o designar. «Levantaré» conserva la idea de iniciativa divina y de designación de un líder, sin añadir una especificación que el hebreo no exige.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - para ellos
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición עַל con este verbo señala colocación con autoridad o supervisión. «Sobre ellos» mantiene esa relación de liderazgo pastoral.
- source_word: רֹעֶה אֶחָד
  english_pob_choice: one shepherd
  chosen_spanish: un solo pastor
  alternatives_spanish:
  - un pastor
  - un pastor único
  lexicon: HALOT
  rationale: «Un solo pastor» preserva la singularidad enfática del hebreo y su fuerza unificadora. «Pastor» es preferible en español para la función metafórica y relacional del texto.
- source_word: וְרָעָה
  english_pob_choice: and he will shepherd
  chosen_spanish: y él los pastoreará
  alternatives_spanish:
  - y los apacentará
  - y los pastoreará y los cuidará
  lexicon: HALOT
  rationale: רעה en contexto pastoral abarca pastorear, apacentar y cuidar. «Pastoreará» mantiene la metáfora y permite oír la repetición verbal del versículo.
- source_word: אֵת עַבְדִּי דָוִד
  english_pob_choice: my servant David
  chosen_spanish: mi siervo David
  alternatives_spanish:
  - David, mi siervo
  - mi esclavo David
  lexicon: HALOT
  rationale: עבד aquí funciona como título de relación fiel y delegada; en español bíblico, «siervo» comunica mejor ese matiz que «esclavo», que sería demasiado duro en este contexto. Se conserva «David» sin expandirlo interpretativamente.
- source_word: הוּא
  english_pob_choice: he himself
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis, pero en español la repetición de «él» en las cláusulas sucesivas ya conserva suficientemente la prominencia del sujeto sin sonar forzado.
- source_word: יִרְעֶה אֹתָם
  english_pob_choice: he will shepherd them
  chosen_spanish: él los pastoreará
  alternatives_spanish:
  - él los apacentará
  - él los cuidará como pastor
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo de la línea anterior para reflejar la repetición hebrea y la insistencia del texto en la acción pastoral continua.
- source_word: וְהוּא יִהְיֶה לָהֶן לְרֹעֶה
  english_pob_choice: and he will be their shepherd
  chosen_spanish: y él será para ellos pastor
  alternatives_spanish:
  - y será su pastor
  - y él será su pastor
  lexicon: HALOT
  rationale: La construcción expresa función y relación. «Será para ellos pastor» suena natural en español y conserva la estructura relacional sin perder el valor metafórico.
theological_decisions:
- issue: Identidad de David en contexto profético
  english_pob_reading: Retain 'David' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener «David» en el texto principal sin ampliarlo a «Mesías» o «descendiente de David».
  alternative_spanish_readings:
  - el Mesías
  - un futuro rey davídico
  rationale: El hebreo dice «David» y la traducción no debe resolver en el texto una tensión interpretativa que el original deja abierta. Se preserva el nombre propio para que el lector perciba la promesa davídica y su posible alcance escatológico.
  doctrine_reference: Primacía del texto original; preservación de la tensión profética sin resolverla en traducción.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al conservar la repetición verbal del hebreo sin introducir un énfasis adicional equivalente a «he himself» en la primera clausula, y mantiene la estructura rítmica del versículo con dos enunciados de pastoreo antes de la cláusula final de relación pastoral.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparezca explícitamente; aquí no aparece.
  - Se eligió «pastor/pastoreará» para reflejar el campo semántico de רעה sin pasar a un lenguaje más general como «guiar».
  - Se mantiene «David» como nombre propio, sin convertirlo en título interpretativo.
  - «Siervo» se usa por su valor bíblico-relacional y no se reemplaza por «esclavo» porque el contexto es de honor y comisión divina.
