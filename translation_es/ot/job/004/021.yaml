translation:
  language: es
  text: ¿No se les arranca[a] su cordel de tienda desde dentro? Mueren[b], y no en sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su cordel es arrancado de ellos»; tradicionalmente, «su excelencia es quitada de ellos». El hebreo probablemente evoca la imagen de una tienda, con un cordel de vida o cordel de tienda que es arrancado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sin sabiduría» o «antes de adquirir sabiduría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: La partícula interrogativa-retórica pide en español una formulación que conserve la expectativa de asentimiento. ¿No...? reproduce la fuerza interrogativa sin añadir interpretación.
- source_word: נִסַּע
  english_pob_choice: pulled up
  chosen_spanish: se ha alzado
  alternatives_spanish:
  - ha sido arrancado
  - se ha retirado
  - ha sido levantado
  lexicon: HALOT
  rationale: El inglés POB vio una imagen de tienda/cuerda. En español, 'se ha alzado' conserva la idea de haber sido levantada o sacada desde dentro, manteniendo la imaginería sin forzar 'arrancado'.
- source_word: יִתְרָם
  english_pob_choice: their tent-cord
  chosen_spanish: su cordel de tienda
  alternatives_spanish:
  - su cuerda de tienda
  - su cordón de tienda
  - su cordel
  lexicon: HALOT
  rationale: '''Cordel de tienda'' comunica la imagen concreta de una cuerda asociada a la tienda, alineada con la lectura auditada del POB. ''Cordel'' permite una equivalencia natural en español y conserva el tono de metáfora corporal/tentaria.'
- source_word: בָּם
  english_pob_choice: within them
  chosen_spanish: dentro de ellos
  alternatives_spanish:
  - en ellos
  - desde dentro de ellos
  lexicon: HALOT
  rationale: La preposición ב con sufijo se expresa de modo natural como 'dentro de ellos' para conservar el matiz interno que el POB destacó.
- source_word: יָמ֗וּתוּ
  english_pob_choice: They die
  chosen_spanish: Mueren
  alternatives_spanish:
  - Ellos mueren
  - Perecen
  lexicon: HALOT
  rationale: El verbo común morir se mantiene sin intensificación. El presente gnómico en español puede reflejar el valor proverbial del hebreo.
- source_word: וְלֹא בְחָכְמָה
  english_pob_choice: and not in wisdom
  chosen_spanish: y no en sabiduría
  alternatives_spanish:
  - y sin sabiduría
  - y no con sabiduría
  - y no habiendo alcanzado sabiduría
  lexicon: HALOT
  rationale: Se conserva la tersa estructura hebrea que el POB decidió mantener. 'Sabiduría' traduce בְחָכְמָה de forma directa y deja abierta la ambigüedad entre 'sin sabiduría' y 'antes de obtener sabiduría'.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas con marcadores presentes en el texto. La traducción conserva la imagen de tienda/cuerda y la ambigüedad final de בחכמה, en línea con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y directo.
  - Se evitó 'SEÑOR' u այլ sustituciones no pertinentes porque el verso no contiene el Tetragrámaton.
  - '''Sabiduría'' preserva la ambigüedad semántica señalada por el POB, sin resolverla de más.'
