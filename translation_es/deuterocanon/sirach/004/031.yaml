translation:
  language: es
  text: No seas soberbio[a] al hablar, y flojo y negligente en tu trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene una forma distinta de este dicho: «No tengas la mano extendida para recibir, y retraída cuando devuelves».'
    reason: textual_variant
lexical_decisions:
- source_word: גַבְהָן
  english_pob_choice: proud
  chosen_spanish: soberbio
  alternatives_spanish:
  - orgulloso
  - altivo
  - arrogante
  lexicon: HALOT
  rationale: El hebreo expresa una actitud de altura o presunción; en español, «soberbio» comunica bien esa connotación moral sin sonar tan coloquial como «orgulloso» ni tan técnica como «arrogante». Se aplica al modo de hablar, no al órgano físico, siguiendo el ajuste idiomático del POB inglés.
- source_word: בִּלְשׁוֹנֶךָ
  english_pob_choice: in your speech
  chosen_spanish: en tu habla
  alternatives_spanish:
  - con tu lengua
  - en tu lengua
  - en tu manera de hablar
  lexicon: HALOT
  rationale: Literalmente es «en tu lengua», pero en español «en tu habla» transmite mejor la manera de expresarte y evita una calca poco natural. Mantiene el alcance oral del mandamiento sin perder claridad.
- source_word: רָפוּי
  english_pob_choice: slack
  chosen_spanish: flojo
  alternatives_spanish:
  - laxo
  - descuidado
  - débil
  lexicon: HALOT
  rationale: El término denota falta de firmeza, relajación o debilidad. «Flojo» preserva esa idea de falta de diligencia y funciona naturalmente junto con el segundo término hebreo, manteniendo la duplicación de censura.
- source_word: רָשִׁישׁ
  english_pob_choice: negligent
  chosen_spanish: negligente
  alternatives_spanish:
  - descuidado
  - indolente
  - perezoso
  lexicon: HALOT
  rationale: El hebreo es raro y se superpone semánticamente con רָפוּי. «Negligente» conserva la idea de incumplimiento o falta de cuidado en el trabajo, reflejando la decisión inglesa de no colapsar ambos matices en una sola palabra.
- source_word: בִּמְלַאכְתֶּךָ
  english_pob_choice: in your work
  chosen_spanish: en tu trabajo
  alternatives_spanish:
  - en tu labor
  - en tu tarea
  - en tu oficio
  lexicon: HALOT
  rationale: «מלאכה» abarca trabajo, tarea u ocupación. «Trabajo» es el equivalente más claro y amplio en español moderno, adecuado para una exhortación práctica.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y la forma griega de Sirácida 4:31
  english_pob_reading: Translate the extant Hebrew as the main text; preserve the Greek as a footnote alternative.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y anotar la forma griega como variante textual.
  alternative_spanish_readings:
  - «No permitas que tu mano esté extendida para recibir, ni retraída al devolver»
  - Harmonizar la idea de generosidad/repago en el texto principal
  rationale: La lectura hebrea está atestiguada con alta confianza, por lo que debe gobernar el texto principal. La versión griega no es solo estilística; presenta otro dicho. Por fidelidad al proyecto, se conserva la diferencia en una nota en vez de armonizarla.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida se conserva en hebreo; preservar honestamente la incertidumbre textual'
- issue: Registro moral de la amonestación
  english_pob_reading: A warning against pride in speech and negligence in work
  chosen_spanish_reading: Una advertencia contra la soberbia al hablar y la negligencia en el trabajo
  alternative_spanish_readings:
  - orgullo en la habla
  - altivez en el habla
  rationale: El versículo combina ética del habla con ética del trabajo. El español elegido conserva esa doble instrucción de forma natural y publicable, sin endurecer innecesariamente el estilo.
  doctrine_reference: Ética sapiencial de Sirácida
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios; el estado final fue de alta concordancia y sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exija; aquí no aparece.
  - 'Se conserva el paralelismo hebreo de dos rasgos afines: flojo y negligente.'
  - Se evita traducir mecánicamente desde el griego, porque el hebreo superviviente es la base principal de esta sección.
