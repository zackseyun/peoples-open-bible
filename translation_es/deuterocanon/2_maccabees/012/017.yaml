translation:
  language: es
  text: Desde allí avanzaron setecientos cincuenta estadios y llegaron a Charax y a los judíos llamados Toubianoi[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los así llamados judíos Toubianoi»; el nombre de grupo Τουβιηνοί también puede verterse de manera interpretativa como «Tobiadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκεῖθεν δὲ
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: LSJ
  rationale: La expresión señala el punto de partida narrativo; «Desde allí» es natural en español y conserva la referencia al lugar anterior sin añadir sentido extra.
- source_word: ἀποσπάσαντες
  english_pob_choice: marched
  chosen_spanish: avanzaron
  alternatives_spanish:
  - marcharon
  - partieron
  - se alejaron
  lexicon: LSJ
  rationale: El participio sugiere un desplazamiento de salida. «Avanzaron» mantiene el movimiento narrativo con un tono sobrio; «marcharon» sería más militar y más marcado en español.
- source_word: σταδίους ἑπτακοσίους πεντήκοντα
  english_pob_choice: seven hundred fifty stadia
  chosen_spanish: setecientos cincuenta estadios
  alternatives_spanish:
  - 750 estadios
  - unos ochenta y seis millas
  lexicon: LSJ
  rationale: Se conserva la medida antigua en la forma explícita del original. Mantener «estadios» preserva el color histórico y evita sustituir el dato por una conversión moderna en el texto principal.
- source_word: διήνυσαν
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - recorrieron
  - completaron el trayecto
  - fueron
  lexicon: LSJ
  rationale: El verbo expresa haber cubierto la distancia hasta el destino. «Llegaron» da una lectura natural en español y refleja el logro del recorrido.
- source_word: εἰς τὸν Χάρακα
  english_pob_choice: to Charax
  chosen_spanish: a Charax
  alternatives_spanish:
  - hacia Charax
  - hasta Charax
  lexicon: LSJ
  rationale: Es un nombre propio transliterado; la preposición «a» expresa bien el movimiento hacia el lugar sin sobreinterpretar la dirección.
- source_word: τοὺς λεγομένους Τουβιηνοὺς Ἰουδαίους
  english_pob_choice: the Jews called Toubianoi
  chosen_spanish: los judíos llamados Toubianoi
  alternatives_spanish:
  - los llamados judíos Toubianoi
  - los judíos conocidos como Tobiadas
  - los llamados judíos tobíadas
  lexicon: LSJ
  rationale: Se conserva la forma transliterada del etnónimo/grupo, siguiendo el criterio del POB inglés de no normalizar prematuramente a «Tobiadas» en el texto principal. «Llamados» reproduce λεγομένους con fidelidad.
translation_notes:
  revision_awareness: 'El borrador sigue el griego de Swete 1909 y coincide con la línea editorial inglesa revisada: mantiene la secuencia de viaje, conserva la medida antigua y preserva el etnónimo transliterado en el texto principal, dejando la alternativa interpretativa para nota.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no aplica la convención del nombre divino.
  - Se mantiene la transliteración «Toubianoi» en lugar de normalizar a «Tobiadas» para respetar la decisión auditada del POB inglés.
  - El orden coordinado «y a Charax y a los judíos...» refleja la estructura griega sin introducir puntuación interpretativa fuerte.
