translation:
  language: es
  text: Pero si nuestro Señor vivo se ha enojado por poco tiempo por causa de reprensión y disciplina, otra vez se reconciliará con sus propios esclavos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus propios siervos’. El griego δούλοις puede traducirse como ‘esclavos’ o ‘siervos’, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘volverá a mostrarse favorable hacia sus propios esclavos/siervos’. El verbo griego puede enfatizar la restauración del favor después del enojo.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: LSJ
  rationale: Mantiene la transición condicional con un matiz contrastivo natural en español, sin perder el enlace con el contexto previo.
- source_word: χάριν
  english_pob_choice: for the sake of
  chosen_spanish: con motivo de
  alternatives_spanish:
  - por causa de
  - por razón de
  lexicon: LSJ
  rationale: La construcción con genitivos expresa causa o propósito; ‘con motivo de’ conserva ese valor explicativo sin sonar forzado.
- source_word: ἐπιπλήξεως
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reprensión severa
  - reproche
  lexicon: LSJ
  rationale: ‘Reprensión’ comunica censura/corrección con tono digno y bíblico; evita endurecer demasiado el término o volverlo raro en español.
- source_word: παιδίας
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrección
  - instrucción
  lexicon: LSJ
  rationale: En este marco de enojo correctivo divino, ‘disciplina’ conserva la idea de corrección formativa y punitiva a la vez.
- source_word: ὁ ζῶν κύριος ἡμῶν
  english_pob_choice: our living Lord
  chosen_spanish: nuestro Señor vivo
  alternatives_spanish:
  - nuestro Señor que vive
  - el Señor que vive
  lexicon: LSJ
  rationale: Se preserva el énfasis en la vida del Señor con una formulación natural en español. ‘Señor’ sigue el valor de κύριος y ‘vivo’ traduce ζῶν.
- source_word: βραχέως
  english_pob_choice: for a little while
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - brevemente
  - por breve tiempo
  lexicon: LSJ
  rationale: Expresa duración corta de manera clara y fluida en español, equivalente al valor adverbial temporal del griego.
- source_word: ἐπωργίσται
  english_pob_choice: has become angry
  chosen_spanish: se ha enojado
  alternatives_spanish:
  - ha estado enojado
  - se ha airado
  lexicon: LSJ
  rationale: El perfecto indica un estado resultante; ‘se ha enojado’ mantiene esa persistencia sin sonar demasiado abstracto.
- source_word: καὶ πάλιν
  english_pob_choice: he will again
  chosen_spanish: otra vez
  alternatives_spanish:
  - y de nuevo
  - y una vez más
  lexicon: LSJ
  rationale: En español, el adverbio puede colocarse naturalmente antes del verbo futuro para conservar la idea de restauración posterior.
- source_word: καταλλαγήσεται
  english_pob_choice: be reconciled with
  chosen_spanish: se reconciliará con
  alternatives_spanish:
  - será aplacado respecto de
  - volverá a favor con
  lexicon: LSJ
  rationale: ‘Reconciliarse con’ expresa restauración relacional de forma directa y clara, sin añadir terminología sacrificial ajena al contexto.
- source_word: τοῖς ἑαυτοῦ δούλοις
  english_pob_choice: his own slaves
  chosen_spanish: sus propios esclavos
  alternatives_spanish:
  - sus propios siervos
  - sus propios servidores
  lexicon: LSJ
  rationale: Se mantiene la fuerza léxica de δοῦλοις como ‘esclavos’, conforme al criterio del proyecto cuando el vínculo de pertenencia es salientable. ‘Propios’ refleja ἑαυτοῦ.
theological_decisions:
- issue: Renderizar δοῦλοις en relación con κύριος
  english_pob_reading: his own slaves
  chosen_spanish_reading: sus propios esclavos
  alternative_spanish_readings:
  - sus propios siervos
  - sus propios servidores
  rationale: El contraste Señor/esclavos expresa con mayor nitidez la relación de pertenencia del texto. No se suaviza a ‘siervos’ sin una razón contextual, porque el valor de δούλοις es significativo aquí.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δοῦλος; Translation philosophy §1'
- issue: Sentido de καταλλαγήσεται en relación divina-humanidad
  english_pob_reading: he will again be reconciled with his own slaves
  chosen_spanish_reading: otra vez se reconciliará con sus propios esclavos
  alternative_spanish_readings:
  - otra vez será aplacado respecto de sus propios esclavos
  - otra vez volverá a estar en paz con sus propios esclavos
  rationale: La frase presenta enojo temporal y restauración posterior. ‘Se reconciliará con’ conserva esa restauración relacional sin especificar mecanismo y sin perder la iniciativa divina.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre ‘slaves’ y ‘servants’; la corrección regresiva restableció ‘slaves’ conforme a la política del proyecto. La redacción española sigue esa decisión y evita suavizar δοῦλοις a ‘siervos’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma por defecto cuando el texto griego cita o alude al nombre divino; aquí κύριος se vierte como ‘Señor’ por el uso del LXX y el contexto de título, no como sustituto del nombre.
  - Se mantiene ‘esclavos’ para δούλοις conforme a la política terminológica y al expediente auditado.
  - ‘Señor vivo’ preserva el participio ζῶν con un español natural y reverente.
  - ‘Reconciliará’ conserva el valor relacional de καταλλαγήσεται sin introducir lenguaje técnico adicional.
