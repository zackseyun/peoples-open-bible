translation:
  language: es
  text: Porque cuando un hombre halla a su enemigo y lo deja ir sano y salvo[a][b], Yahvé te pague con bien por lo que has hecho por mí en este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y lo envía en paz» / «y lo deja ir en paz». El hebreo dice literalmente «en un camino bueno».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé te pagará con bien». La forma hebrea puede oírse tanto como un deseo o bendición como una declaración futura.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: For when
  chosen_spanish: Porque cuando
  alternatives_spanish:
  - Y cuando
  - Pues cuando
  - Porque si
  lexicon: HALOT
  rationale: La partícula introduce aquí una explicación generalizadora con matiz causal; «Porque cuando» conserva ese enlace discursivo sin convertirlo en una mera condicionalidad.
- source_word: יִמְצָא אִישׁ
  english_pob_choice: a man finds
  chosen_spanish: un hombre halla
  alternatives_spanish:
  - una persona halla
  - alguien halla
  lexicon: HALOT
  rationale: El hebreo usa singular masculino genérico. «Un hombre» mantiene la forma marcada del original y su valor representativo.
- source_word: אֹיְבוֹ
  english_pob_choice: his enemy
  chosen_spanish: a su enemigo
  alternatives_spanish:
  - al que le es hostil
  - a su adversario
  lexicon: HALOT
  rationale: «Enemigo» es la equivalencia natural y fiel para el sustantivo con sufijo de tercera persona.
- source_word: וְשִׁלְּחוֹ
  english_pob_choice: and lets him go
  chosen_spanish: y lo deja ir
  alternatives_spanish:
  - y lo despide
  - y lo suelta
  - y lo envía
  lexicon: HALOT
  rationale: En contexto describe liberar a alguien que estaba a merced de otro; «lo deja ir» expresa el acto sin endurecerlo con un verbo menos idiomático en español.
- source_word: בְּדֶרֶךְ טוֹבָה
  english_pob_choice: on his way safely
  chosen_spanish: por su camino en paz
  alternatives_spanish:
  - en paz
  - seguro
  - por un buen camino
  lexicon: HALOT
  rationale: La nota inglesa preserva la imagen hebrea de «camino bueno» pero reconoce que la idea en contexto es una liberación segura. En español, «por su camino en paz» mantiene la imagen y transmite el resultado de seguridad. Se ancla con nota para indicar la alternativa más directa «en paz»/«seguro».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: יְשַׁלֶּמְךָ
  english_pob_choice: may Yahweh repay you
  chosen_spanish: Yahvé te pague
  alternatives_spanish:
  - Yahvé te recompense
  - Yahvé te retribuya
  lexicon: HALOT
  rationale: El yiqtol en boca de Saúl puede leerse como deseo o bendición; «te pague» conserva el valor de retribución del verbo y suena natural en español. La ambigüedad se preserva en la nota textual equivalente al audit trail inglés.
- source_word: טוֹבָה
  english_pob_choice: with good
  chosen_spanish: con bien
  alternatives_spanish:
  - con bondad
  - con cosas buenas
  lexicon: HALOT
  rationale: «Con bien» reproduce la repetición léxica de טוב/טובה y comunica adecuadamente el valor beneficioso de la retribución.
- source_word: תַּחַת הַיּוֹם הַזֶּה אֲשֶׁר עָשִׂיתָה לִי
  english_pob_choice: for what you have done to me this day
  chosen_spanish: por lo que has hecho por mí en este día
  alternatives_spanish:
  - a cambio de lo que me has hecho hoy
  - en recompensa de lo que has hecho por mí hoy
  lexicon: HALOT
  rationale: La expresión hebrea de compensación se vierte con una construcción idiomática española que conserva el sentido de retribución correspondiente al acto de David. «Por mí» refleja que Saúl es el beneficiario de la acción de David; «en este día» mantiene el matiz temporal solemne del original.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se preserva el nombre divino en español, sin sustituirlo por «SEÑOR» ni por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Ambigüedad de יְשַׁלֶּמְךָ como deseo o declaración
  english_pob_reading: may Yahweh repay you / the LORD will repay you
  chosen_spanish_reading: Yahvé te pague
  alternative_spanish_readings:
  - Yahvé te pagará
  - Yahvé te recompense
  rationale: La forma verbal puede oírse como bendición/deseo o como afirmación predictiva. «Te pague» mantiene deliberadamente esa apertura, evitando fijar indebidamente una sola lectura.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una expresión natural del resultado de seguridad frente a una literalidad rígida para בְּדֶרֶךְ טוֹבָה. En español, se conservó la imagen del camino y se explicitó la paz/seguridad mediante una nota para no borrar la tensión entre literalidad y sentido contextual.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conservó el masculino genérico «un hombre» por fidelidad al hebreo.
  - La frase idiomática «por su camino en paz» intenta equilibrar la imagen hebrea con la claridad natural del español.
  - «Te pague» preserva la ambigüedad entre deseo y profecía sin forzar el modo verbal.
