base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/022.yaml
  text: What is desired in a man is his steadfast love[b][a], and a poor man is better than a liar.
  footnotes:
  - marker: a
    text: Or, 'A man's desire is his steadfast love'; the Hebrew of the first line is terse and may be read either as describing what is desirable in a person or as identifying a person's desire with his kindness/loyalty.
    reason: alternative_reading
  - marker: b
    text: '''Steadfast love'' translates חֶסֶד, a rich term that can also mean kindness, loyalty, or faithful love depending on context.'
    reason: lexical_alternative
