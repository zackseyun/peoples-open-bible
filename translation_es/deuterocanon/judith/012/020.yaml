translation:
  language: es
  text: Y Holofernes se deleitó con ella[a], y bebió una gran cantidad de vino, tanto como nunca había bebido en un solo día desde que nació.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por ella» o «a causa de ella», indicando que Judith fue la causa del deleite de Holofernes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠυφράνθη
  english_pob_choice: was delighted
  chosen_spanish: se deleitó
  alternatives_spanish:
  - se alegró
  - se regocijó
  lexicon: LSJ
  rationale: El griego expresa que Holofernes llegó a un estado de alegría o deleite. «Se deleitó» conserva el matiz emocional sin volverlo excesivamente solemne ni introducir un sentido no atestiguado.
- source_word: ἀπʼ αὐτῆς
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - por ella
  - a causa de ella
  lexicon: LSJ
  rationale: La preposición ἀπό aquí admite valor causal u originativo. «Con ella» funciona naturalmente en español y mantiene la ambigüedad de que ella fue la ocasión de su deleite.
- source_word: ἔπιεν οἶνον πολὺν σφόδρα
  english_pob_choice: he drank a very great amount of wine
  chosen_spanish: bebió mucho vino
  alternatives_spanish:
  - bebió una gran cantidad de vino
  - bebió vino en gran abundancia
  lexicon: LSJ
  rationale: El griego intensifica fuertemente la cantidad. En español, «bebió mucho vino» es más natural que una construcción demasiado pesada, aunque sigue comunicando la excesividad del consumo.
- source_word: ὅσον οὐκ ἔπιεν πώποτε
  english_pob_choice: as much as he had never drunk
  chosen_spanish: tanto como nunca había bebido
  alternatives_spanish:
  - más de lo que había bebido nunca
  - como nunca antes había bebido
  lexicon: LSJ
  rationale: La comparación de medida se conserva mejor con «tanto como». La doble negación refleja el alcance total del antecedente y mantiene la fuerza comparativa del griego.
- source_word: ἐν ἡμέρᾳ μιᾷ
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un único día
  lexicon: LSJ
  rationale: La expresión temporal es directa. «En un solo día» reproduce con claridad el énfasis en la unidad del lapso.
- source_word: ἀφʼ οὗ ἐγεννήθη
  english_pob_choice: since he was born
  chosen_spanish: desde que nació
  alternatives_spanish:
  - desde su nacimiento
  - desde que había nacido
  lexicon: LSJ
  rationale: La referencia temporal abarca toda la vida hasta ese momento. «Desde que nació» es una equivalencia natural y fiel al valor temporal del griego.
translation_notes:
  revision_awareness: El texto griego leído en Swete coincide sustancialmente con la traducción inglesa auditada; no se observan revisiones que alteren el sentido. La principal decisión en español fue mantener la ambigüedad causal de ἀπʼ αὐτῆς con una formulación natural.
  spanish_consistency_notes:
  - Se mantiene «Holofernes» como nombre propio estable en todo el pasaje.
  - Se evita «vino» con calco arcaizante y se conserva una estructura española fluida.
  - La nota [a] queda anclada en «con ella» para reflejar la alternativa causal documentada.
