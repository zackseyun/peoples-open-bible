translation:
  language: es
  text: Maskil[a] de David[b], cuando estaba en la cueva. Una oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Maskil, término técnico en los encabezamientos de salmos; quizá indica una composición contemplativa o instructiva.
    reason: lexical_alternative
  - marker: b
    text: O 'para David' o 'por David'; el encabezamiento hebreo puede denotar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - contemplación
  - canto de instrucción
  - instrucción
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado porque el encabezado del salmo es incierto en su fuerza exacta. Traducirlo como 'contemplación' o 'instrucción' sería más interpretativo que el hebreo permite; mantener 'Maskil' respeta la etiqueta poética y la tensión lexical documentada.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: '''De David'' conserva en español la ambigüedad de ל en los encabezamientos de salmos: puede indicar autoría, dedicación o asociación. Es idiomático y no fuerza una relación exclusiva que el hebreo no especifica.'
- source_word: בִּהְיוֹתוֹ
  english_pob_choice: when he was
  chosen_spanish: cuando estaba
  alternatives_spanish:
  - mientras estaba
  - en su estar
  - cuando se hallaba
  lexicon: HALOT
  rationale: La construcción temporal se expresa de forma natural con 'cuando estaba', sin perder el valor circunstancial del infinitivo con prefijo ב. 'Cuando se hallaba' sería más solemne, pero menos directo.
- source_word: בַמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - en una cueva
  - dentro de la cueva
  lexicon: HALOT
  rationale: El artículo hebreo pide una referencia definida; 'en la cueva' lo refleja mejor que 'en una cueva'. Aunque no identifica cuál cueva, el encabezado la presenta como conocida o al menos determinada dentro de la tradición narrativa.
- source_word: תְפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Una oración
  alternatives_spanish:
  - oración
  - plegaria
  lexicon: HALOT
  rationale: Se mantiene el valor de rótulo genérico del encabezamiento con 'Una oración'. 'Plegaria' sería posible, pero 'oración' es más transparente y neutral en español contemporáneo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la colocación de las notas en el texto inglés. En español, la nota [a] se ancla en 'Maskil' y la nota [b] en 'de David', manteniendo la correspondencia entre marcador y decisión lexical.
  spanish_consistency_notes:
  - Se preserva la transliteración 'Maskil' como término técnico no resuelto por la evidencia.
  - Se evita 'SEÑOR' o equivalentes porque el verso no contiene el nombre divino.
  - '''Una oración'' se separa por punto final para reflejar la fuerza de encabezado del hebreo.'
  - La traducción mantiene la puntuación breve y paratáctica del superescrito hebreo.
