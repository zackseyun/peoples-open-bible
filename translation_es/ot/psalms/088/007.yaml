translation:
  language: es
  text: Tú me has puesto en la fosa más profunda[a], en lugares oscuros, en las profundidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú me has puesto en la fosa más baja, en oscuridad, en los lugares profundos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁתַּנִי
  english_pob_choice: You have put me
  chosen_spanish: Tú me has puesto
  alternatives_spanish:
  - Tú me has colocado
  - Tú me has puesto allí
  lexicon: HALOT
  rationale: El verbo expresa que el sujeto divino ha colocado al hablante en esa condición. «Tú me has puesto» es natural en español, conserva la segunda persona dirigida a Dios y evita suavizar la agencia divina.
- source_word: בְּב֣וֹר
  english_pob_choice: in the pit
  chosen_spanish: en el pozo
  alternatives_spanish:
  - en una fosa
  - en el hoyo
  - en la cisterna
  lexicon: HALOT
  rationale: En este contexto poético, בּוֹר puede aludir a un pozo, cisterna o fosa de encierro. «Pozo» comunica bien la imagen de descenso y encierro sin decidir demasiado pronto entre las opciones concretas.
- source_word: תַּחְתִּיּוֹת
  english_pob_choice: lowest
  chosen_spanish: más hondo
  alternatives_spanish:
  - más bajo
  - de lo más profundo
  - inferior
  lexicon: HALOT
  rationale: La idea es de extremidad de profundidad. «Más hondo» conserva el superlativo de manera idiomática en español y se ajusta al sustantivo «pozo».
- source_word: בְּמַחֲשַׁכִּים
  english_pob_choice: in dark places
  chosen_spanish: en lugares oscuros
  alternatives_spanish:
  - en tinieblas
  - en oscuridades
  - en regiones oscuras
  lexicon: HALOT
  rationale: El plural hebreo sugiere espacios oscuros; «lugares oscuros» mantiene la pluralidad conceptual y evita reducirlo a una abstracción.
- source_word: בִּמְצֹלֽוֹת
  english_pob_choice: in the depths
  chosen_spanish: en las profundidades
  alternatives_spanish:
  - en lo profundo
  - en las honduras
  - en los abismos
  lexicon: HALOT
  rationale: «Profundidades» refleja el campo semántico de hondura/abismo y suena natural en español poético, conservando la imagen de estar sumergido o hundido.
theological_decisions:
- issue: Agencia divina en el lamento
  english_pob_reading: 'Retained direct second-person address: ''You have put me'''
  chosen_spanish_reading: 'Se mantiene el trato directo a Dios: «Tú me has puesto»'
  alternative_spanish_readings:
  - Me han puesto
  - He caído
  - Estoy en el pozo más hondo
  rationale: El hebreo atribuye explícitamente la acción al interlocutor divino. Mantener el «Tú» preserva la tensión teológica del lamento sin atenuarla ni convertirla en una descripción impersonal.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue la misma lectura estable, conservando la ambigüedad lexical de בּוֹר, תַּחְתִּיּוֹת, מַחֲשַׁכִּים y מְצֹלוֹת sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se eligió «Yahvé» cuando aparece el nombre divino, pero aquí el hebreo usa un verbo en segunda persona sin el nombre explícito; por eso la traducción mantiene solo el pronombre «Tú».
  - Se prefirió «pozo» sobre «cisterna» o «sepulcro» porque el contexto poético admite varias imágenes de descenso y encierro, y «pozo más hondo» conserva mejor la amplitud semántica.
  - Se mantuvo el plural conceptual de los términos oscuros mediante «lugares oscuros» y «profundidades», evitando singularizar indebidamente la imagen.
