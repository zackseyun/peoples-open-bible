translation:
  language: es
  text: Pues también José rogó a nuestro padre que orase por sus hermanos, para que el Señor no les imputara pecado, porque habían obrado mal contra él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐδεήθη
  english_pob_choice: begged
  chosen_spanish: rogó
  alternatives_spanish:
  - imploró
  - suplicó
  lexicon: BDAG
  rationale: Capta la petición ferviente con la fuerza emocional propia de la intercesión de José.
- source_word: προσεύξηται
  english_pob_choice: to pray
  chosen_spanish: que orase
  alternatives_spanish:
  - que rogase
  lexicon: BDAG
  rationale: προσεύχομαι es 'orar' por antonomasia.
- source_word: λογίσηται ... ἁμαρτίαν
  english_pob_choice: reckon sin
  chosen_spanish: imputara pecado
  alternatives_spanish:
  - contara como pecado
  - tuviera por pecado
  lexicon: BDAG
  rationale: '''Imputar'' conserva la metáfora contable de λογίζομαι.'
- source_word: ἐποίησαν πονηρὸν εἰς αὐτόν
  english_pob_choice: had done evil against him
  chosen_spanish: habían obrado mal contra él
  alternatives_spanish:
  - le habían hecho mal
  - le habían hecho daño
  lexicon: BDAG
  rationale: '''Obrar mal contra'' conserva la formulación testamentaria con dignidad.'
theological_decisions:
- issue: Lenguaje de intercesión
  chosen_reading: José pide que el Señor no impute pecado a sus hermanos.
  alternative_readings:
  - José mismo perdona directamente sin referencia a la imputación divina
  rationale: El testimonio griego enmarca explícitamente la misericordia de José como oración intercesora respecto a la imputación divina.
