  to: Y la tarifa era un pim[a] para las rejas del arado, para las azadas, para las horquillas de tres puntas, para las hachas[b], y para ajustar los aguijones.
  rationale: Se corrige el sentido principal de הַפְּצִירָה a «la tarifa» para alinearlo con la decisión contextual documentada por la POB inglesa, dejando «el afilado» en nota alternativa. Se precisa מַחֲרֵשֹׁת como «las rejas del arado» en lugar de «los arados». También se mejora la naturalidad de los implementos y del infinitivo final con «horquillas de tres puntas» y «ajustar los aguijones», manteniendo la incertidumbre semántica sin sobreinterpretar.
