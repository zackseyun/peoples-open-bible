translation:
  language: es
  text: Pero cuando nadie respondió, apartó la cortina y entró en el dormitorio, y lo encontró tendido muerto sobre el dosel[a]; y le habían quitado la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la red de la cama» o «sobre la colgadura de la cama». El término griego χελώνις puede referirse al dosel, a una red o a una colgadura asociada con el lecho.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su cabeza había sido quitada de él»; es decir, había sido decapitado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δʼ οὐθεὶς ἐπήκουσεν
  english_pob_choice: But when no one answered
  chosen_spanish: Pero cuando nadie respondió
  alternatives_spanish:
  - Pero cuando nadie contestó
  - Y cuando nadie respondió
  lexicon: LSJ
  rationale: ἐπακούω aquí expresa la reacción a una llamada o aviso, no solo el acto de oír. «Respondió» conserva la idea relacional de que alguien debía contestar.
- source_word: διαστείλας
  english_pob_choice: he drew aside the curtain
  chosen_spanish: apartó la cortina
  alternatives_spanish:
  - corrió la cortina
  - apartó el velo
  lexicon: LSJ
  rationale: El participio sugiere separar o echar hacia un lado algo que obstruye la entrada. En español, «apartó la cortina» conserva la acción sin forzar un objeto más preciso que el griego no explicita.
- source_word: κοιτῶνα
  english_pob_choice: bedroom
  chosen_spanish: dormitorio
  alternatives_spanish:
  - alcoba
  - cámara
  lexicon: LSJ
  rationale: κοιτών designa una habitación para dormir. «Dormitorio» es natural y fiel en español contemporáneo.
- source_word: ἐπὶ τῆς χελώνιδος
  english_pob_choice: upon the canopy
  chosen_spanish: sobre el dosel
  alternatives_spanish:
  - sobre la cubierta de la cama
  - sobre la red o colgadura de la cama
  lexicon: LSJ
  rationale: χϵλώνις en este contexto parece referirse al dosel, cubertura o colgadura vinculada con la cama. «Dosel» mantiene la imagen de un elemento superior de la cama y deja espacio para la ambigüedad material documentada.
- source_word: ἐρριμμένον
  english_pob_choice: lying dead
  chosen_spanish: tendido
  alternatives_spanish:
  - echado
  - arrojado
  lexicon: LSJ
  rationale: El participio perfecto de ῥίπτω expresa que el cuerpo quedó arrojado y yacía así. «Tendido» comunica el estado resultante de manera natural en español.
- source_word: νεκρόν
  english_pob_choice: dead
  chosen_spanish: muerto
  alternatives_spanish:
  - sin vida
  - cadáver
  lexicon: LSJ
  rationale: El adjetivo describe su estado. «Muerto» es directo y no añade un sustantivo ausente en el griego.
- source_word: ἡ κεφαλὴ αὐτοῦ ἀφῄρητο ἀπʼ αὐτοῦ
  english_pob_choice: his head had been taken from him
  chosen_spanish: su cabeza le había sido quitada
  alternatives_spanish:
  - su cabeza le había sido removida
  - había sido decapitado
  lexicon: LSJ
  rationale: El griego dice literalmente que la cabeza había sido quitada o retirada de él. La pasiva perifrástica en español conserva ese enunciado literal y evita cerrar prematuramente con una síntesis interpretativa.
theological_decisions:
- issue: Lectura literal de la decapitación sin suavizarla a una paráfrasis interpretativa
  english_pob_reading: his head had been taken from him
  chosen_spanish_reading: su cabeza le había sido quitada
  alternative_spanish_readings:
  - había sido decapitado
  - su cabeza había sido separada de él
  rationale: La redacción griega enfatiza la violencia del hecho con una formulación literal. Se conserva esa tensión en español para no sustituir el dato narrativo por un resumen interpretativo.
  doctrine_reference: Fidelidad al testimonio narrativo del texto fuente
- issue: Identificación del objeto de χελώνις con un elemento de cama sin fijarlo demasiado
  english_pob_reading: upon the canopy
  chosen_spanish_reading: sobre el dosel
  alternative_spanish_readings:
  - sobre la red de la cama
  - sobre la colgadura de la cama
  rationale: El contexto de dormitorio y lecho lujoso permite una referencia a un dosel o colgadura. «Dosel» funciona bien en español y mantiene la ambigüedad del término griego.
  doctrine_reference: Precisión lexical sin sobreespecificación
- issue: Respuesta a la llamada expresada como «nadie respondió»
  english_pob_reading: when no one answered
  chosen_spanish_reading: cuando nadie respondió
  alternative_spanish_readings:
  - cuando nadie contestó
  - cuando nadie dio respuesta
  rationale: La escena presupone una llamada previa; la traducción por «respondió» mantiene la relación pragmática implícita en ἐπήκουσεν.
  doctrine_reference: Coherencia pragmática del relato
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para ἐρριμμένον νεκρόν y simplificó la última cláusula a «taken from him». La versión española sigue esa preferencia de naturalidad sin perder la literalidad básica del griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «muerto»/«tendido» para reflejar el estado resultante sin añadir interpretación.
  - «Dosel» se eligió como equivalente publicable de χελώνις en este contexto, con nota de alternativa por la ambigüedad del término.
