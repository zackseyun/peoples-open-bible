translation:
  language: es
  text: 'Y se informó a Rebeca de las palabras de Esaú, su hijo mayor. Entonces ella mandó y llamó a Jacob, su hijo menor, y le dijo: «Mira, Esaú tu hermano se está consolando[a] respecto de ti, para matarte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se está consolando de ti, para matarte»; se conserva más de cerca la fuerza literal de la expresión hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: were told
  chosen_spanish: se informó
  alternatives_spanish:
  - le dijeron
  - se le dio aviso
  - fue dada a conocer
  lexicon: HALOT
  rationale: La forma pasiva/causativa comunica que la noticia llegó a Rebeca sin identificar al agente. «Se informó» mantiene ese valor pasivo y suena natural en español.
- source_word: דִּבְרֵי עֵשָׂו
  english_pob_choice: the words of Esau
  chosen_spanish: las palabras de Esaú
  alternatives_spanish:
  - lo que dijo Esaú
  - los dichos de Esaú
  lexicon: HALOT
  rationale: דִּבְרֵי conserva el vínculo con «palabras/matters of». «Las palabras de Esaú» es fiel y legible, y deja abierto que se trata de lo que Esaú había dicho o intentado.
- source_word: בְּנָהּ הַגָּדֹל
  english_pob_choice: her older son
  chosen_spanish: su hijo mayor
  alternatives_spanish:
  - su hijo mayor de edad
  - su hijo el mayor
  lexicon: HALOT
  rationale: En el contraste familiar con «el menor», גָּדֹל se refiere a edad/estatus. «Hijo mayor» es la forma española natural para ese contraste.
- source_word: וַתִּשְׁלַח וַתִּקְרָא
  english_pob_choice: she sent and called
  chosen_spanish: mandó y llamó
  alternatives_spanish:
  - envió y llamó
  - mandó a llamar
  lexicon: HALOT
  rationale: Se conservan dos verbos coordinados. «Mandó y llamó» reproduce la secuencia de acción sin sobreinterpretar el modo exacto del envío; «mandó a llamar» sería más idiomático pero fusiona la doble acción.
- source_word: בְּנָהּ הַקָּטָן
  english_pob_choice: her younger son
  chosen_spanish: su hijo menor
  alternatives_spanish:
  - su hijo más joven
  - su hijo pequeño
  lexicon: HALOT
  rationale: קָטָן aquí contrasta con גָּדֹל y señala al hijo menor, no pequeñez física. «Hijo menor» es el equivalente familiar más claro.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: Como marcador discursivo, הנה llama la atención. «Mira» preserva la inmediatez sin arcaísmo.
- source_word: מִתְנַחֵם
  english_pob_choice: is comforting himself
  chosen_spanish: se está consolando
  alternatives_spanish:
  - se está confortando
  - se consuela
  lexicon: HALOT
  rationale: El hitpael de נחם conserva la idea literal de consolarse/consolarse a sí mismo. «Se está consolando» mantiene la fuerza verbal y la progresión aspectual en español.
- source_word: לְךָ
  english_pob_choice: concerning you
  chosen_spanish: respecto de ti
  alternatives_spanish:
  - acerca de ti
  - por ti
  lexicon: HALOT
  rationale: La preposición marca la esfera o el objeto del consuelo de Esaú. «Respecto de ti» conserva esa relación sin convertirla en una paráfrasis interpretativa.
- source_word: לְהָרְגֶךָ
  english_pob_choice: to kill you
  chosen_spanish: para matarte
  alternatives_spanish:
  - con el fin de matarte
  - a fin de matarte
  lexicon: HALOT
  rationale: El infinitivo con ל expresa el contenido o el objetivo de ese consuelo. «Para matarte» es la forma más directa y fiel en español.
theological_decisions:
- issue: La expresión de que Esaú se está «consolando» mientras planea matar a Jacob mantiene una tensión semántica evidente
  english_pob_reading: ‘is comforting himself concerning you, to kill you’ preserves the more literal force of the Hebrew expression.
  chosen_spanish_reading: «se está consolando respecto de ti, para matarte» conserva la tensión entre el sentido literal de consolarse y la intención homicida implícita en el contexto.
  alternative_spanish_readings:
  - «se está preparando para matarte»
  - «está buscando venganza contra ti»
  - «se está tranquilizando pensando en matarte»
  rationale: El hebreo usa un verbo de consuelo en una situación hostil; el audit trail inglés opta por mantener esa literalidad con nota. En español conviene preservar esa tensión y no reemplazarla por una interpretación más explícita de venganza.
  doctrine_reference: Narrativa patriarcal; observación semántica del verbo hitpael de נחם
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión del POB en inglés, que volvió a una formulación más literal para מִתְנַחֵם y evitó una expansión interpretativa como «by planning to kill you». En español se refleja esa misma decisión con una frase que conserva la ambigüedad/ tensión del hebreo y una nota alternativa breve.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «hijo mayor/menor» para el contraste גדול/קטן, coherente con el contexto familiar.
  - «Consolando» se reserva aquí para reproducir el valor literal del hitpael de נחם, no como aprobación del acto.
  - La puntuación y el uso de comillas angulares siguen la convención española moderna y mantienen el diálogo claro.
