translation:
  language: es
  text: Y José y Azarías fueron puestos en fuga y fueron perseguidos hasta los límites de Judea; y aquel día cayeron, del pueblo de Israel, unos dos mil hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «cayeron ... a dos mil hombres»; la expresión probablemente da un total aproximado, de ahí «unos dos mil hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτροπώθη
  english_pob_choice: were routed
  chosen_spanish: fueron puestos en fuga
  alternatives_spanish:
  - fueron derrotados
  - fueron desbaratados
  - fueron puestos en desbandada
  lexicon: LSJ
  rationale: El pasivo de τροπόω/τρέπω en contexto militar expresa una derrota que rompe la formación y obliga a huir. En español, «puestos en fuga» comunica bien esa idea de desbandada sin sobrecargar con interpretación adicional.
- source_word: ἐδιώχθησαν
  english_pob_choice: were pursued
  chosen_spanish: fueron perseguidos
  alternatives_spanish:
  - fueron acosados
  - fueron cazados
  - fueron perseguidos tras ellos
  lexicon: LSJ
  rationale: El pasivo de διώκω aquí describe una persecución hostil después de la derrota. «Fueron perseguidos» es natural y conserva la secuencia narrativa.
- source_word: ἕως τῶν ὁρίων τῆς Ἰουδαίας
  english_pob_choice: as far as the borders of Judea
  chosen_spanish: hasta los límites de Judea
  alternatives_spanish:
  - hasta las fronteras de Judea
  - hasta el territorio de Judea
  - hasta los confines de Judea
  lexicon: LSJ
  rationale: ὅρια puede significar límites o fronteras. «Límites» es claro en español y mantiene la extensión del movimiento indicado por ἕως.
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fallecieron
  - murieron
  - quedaron tendidos
  lexicon: LSJ
  rationale: En relato de batalla, el verbo «caer» conserva el valor idiomático de ἔπεσον sin explicitar más de lo que el griego dice. En español, «cayeron» mantiene esa sobriedad narrativa.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  - ese mismo día
  lexicon: LSJ
  rationale: Es una expresión temporal estándar; «aquel día» suena natural y mantiene el carácter deíctico del griego.
- source_word: ἐκ τοῦ λαοῦ Ἰσραήλ
  english_pob_choice: of the people of Israel
  chosen_spanish: del pueblo de Israel
  alternatives_spanish:
  - entre el pueblo de Israel
  - del pueblo israelita
  - de Israel
  lexicon: LSJ
  rationale: El genitivo indica pertenencia o procedencia respecto del pueblo. «Del pueblo de Israel» refleja esa relación de manera clara y bíblicamente sobria.
- source_word: εἰς δισχιλίους ἄνδρας
  english_pob_choice: about two thousand men
  chosen_spanish: unos dos mil hombres
  alternatives_spanish:
  - dos mil hombres
  - hasta dos mil hombres
  - aproximadamente dos mil hombres
  lexicon: LSJ
  rationale: La construcción griega puede expresar un total aproximado. «Unos dos mil hombres» preserva la cautela de la POB inglesa y evita convertir la cifra en exactitud matemática.
theological_decisions:
- issue: Tratamiento del verbo de derrota militar y su relación con muerte posterior
  english_pob_reading: were routed ... and on that day about two thousand men ... fell
  chosen_spanish_reading: fueron puestos en fuga ... y aquel día cayeron
  alternative_spanish_readings:
  - fueron derrotados ... y aquel día murieron
  - fueron desbaratados ... y aquel día perecieron
  rationale: El griego distingue entre la derrota/huida de José y Azarías y la caída de hombres de Israel. La traducción mantiene esa tensión sin convertir automáticamente «cayeron» en un verbo explícito de muerte, aunque el contexto lo implique.
  doctrine_reference: Narrativa histórica de batalla; fidelidad al valor léxico del texto sin interpretación doctrinal añadida.
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del expediente: alta concordancia y sin revisiones aplicadas; se mantiene la decisión inglesa de tratar la cifra como aproximada.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se conserva la distinción narrativa entre la derrota de los dos jefes y la caída de hombres de Israel.
  - «Límites de Judea» mantiene el plural de ὅρια sin forzar una solución más interpretativa.
