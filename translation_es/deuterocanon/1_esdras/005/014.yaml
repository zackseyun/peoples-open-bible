lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  - descendientes de
  lexicon: LSJ
  rationale: En esta lista censal y genealógica, υἱοὶ funciona como fórmula de pertenencia a una línea familiar. «Los hijos de» conserva la estructura formal del griego y resulta natural en español bíblico sin volverla demasiado interpretativa.
- source_word: Ἀδωνεικάμ
  english_pob_choice: Adonikam
  chosen_spanish: Adonikam
  alternatives_spanish:
  - Adoneicam
  - Adonikam
  lexicon: LSJ
  rationale: Nombre propio transliterado, siguiendo el texto griego y la práctica del proyecto. La forma «Adonikam» mantiene la cercanía con el paralelo semítico y evita una normalización innecesaria.
- source_word: τριάκοντα ἑπτά
  english_pob_choice: thirty-seven
  chosen_spanish: treinta y siete
  alternatives_spanish:
  - '37'
  lexicon: LSJ
  rationale: Se expresa el valor numérico exactamente en español corriente y solemne. Se conserva la discrepancia material con el paralelo masorético, sin armonizarla.
- source_word: Βοσαί
  english_pob_choice: Bosai
  chosen_spanish: Bosai
  alternatives_spanish:
  - Bosaí
  - Bosái
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego. Se mantiene la forma breve y directa del testimonio griego, en lugar de ajustar a una reconstrucción hebrea.
- source_word: δισχίλιοι ἑξακόσιοι ἕξ
  english_pob_choice: two thousand six hundred six
  chosen_spanish: dos mil seiscientos seis
  alternatives_spanish:
  - '2.606'
  lexicon: LSJ
  rationale: Se traduce el número de manera exacta y legible en español, preservando la cifra del griego sin interpretaciones adicionales.
- source_word: Ἀδειλίου
  english_pob_choice: Adilion
  chosen_spanish: Adilión
  alternatives_spanish:
  - Adilion
  - Adelio
  lexicon: LSJ
  rationale: Se translitera el nombre propio en una forma española naturalizada por acentuación, manteniendo la referencia al genitivo griego sin intentar reconstruir un equivalente hebreo.
- source_word: τετρακόσιοι πεντήκοντα τέσσαρες
  english_pob_choice: four hundred fifty-four
  chosen_spanish: cuatrocientos cincuenta y cuatro
  alternatives_spanish:
  - '454'
  - cuatrocientos y cincuenta y cuatro
  lexicon: LSJ
  rationale: Se vierte con exactitud el número griego en español moderno y claro, conservando el estilo de lista censal.
theological_decisions:
- issue: Divergencia numérica entre 1 Esdras y el paralelo masorético de Esdras/Nehemías en la casa de Adonikam
  english_pob_reading: Translate the Greek figures and names as given in 1 Esdras without harmonizing to the MT parallel
  chosen_spanish_reading: Traducir las cifras y nombres del griego de 1 Esdras sin armonizarlos con el paralelo masorético
  alternative_spanish_readings:
  - Armonizar el número de Adonikam con el paralelo de 666
  rationale: La primacía textual recae en el griego de 1 Esdras para esta obra deuterocanónica. La diferencia con el paralelo hebreo se conserva visiblemente mediante nota, en vez de borrarse por armonización.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original para los libros deuterocanónicos; los paralelos del texto masorético funcionan como control y referencia, no como texto rector'
translation_notes:
  revision_awareness: El texto base y el control de revisión concuerdan en que no se requieren cambios; se mantiene la lectura griega con la discrepancia numérica señalada en nota.
  spanish_consistency_notes:
  - Se conserva «hijos de» para reflejar la fórmula genealógica del griego.
  - Se usa «Adonikam» sin adaptación religiosa interpretativa adicional.
  - Los números se expresan con palabras para mantener el registro de lista censal bíblica.
  - La nota a pie marca la divergencia textual relevante entre 1 Esdras y el paralelo masorético.
