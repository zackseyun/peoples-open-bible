    rationale: La auditoría inglesa eligió 'yet lovely' como lectura principal por el probable contraste contextual y dejó 'and lovely' como alternativa en nota. El español debería preservar esa misma jerarquía salvo razón fuerte en contra, que aquí no se justifica suficientemente.
  - severity: low
