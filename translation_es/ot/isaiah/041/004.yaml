translation:
  language: es
  text: ¿Quién ha actuado y hecho esto, llamando a las generaciones desde el principio? Yo, Yahvé, soy el primero, y con los últimos[a], soy yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y con el último, soy yo»; tradicionalmente se entiende que Yahvé está presente desde la primera generación hasta la última.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién fue el que
  lexicon: HALOT
  rationale: Interrogativo natural para introducir la pregunta retórica sin añadir información.
- source_word: פָעַל וְעָשָׂה
  english_pob_choice: has acted and done this
  chosen_spanish: ha actuado y hecho esto
  alternatives_spanish:
  - ha obrado y hecho esto
  - ha trabajado y realizado esto
  lexicon: HALOT
  rationale: Los dos verbos se conservan para mantener la intensificación del hebreo; 'actuado' comunica la acción eficaz en español sin perder naturalidad.
- source_word: קֹרֵא
  english_pob_choice: calling
  chosen_spanish: llamando
  alternatives_spanish:
  - convocando
  - llamando continuamente
  lexicon: HALOT
  rationale: El participio expresa acción continua o característica; 'llamando' conserva esa progresión y permite el objeto 'las generaciones'.
- source_word: הַדֹּרוֹת
  english_pob_choice: the generations
  chosen_spanish: las generaciones
  alternatives_spanish:
  - las edades
  - las sucesivas generaciones
  lexicon: HALOT
  rationale: '''Generaciones'' es el equivalente directo y natural para דּוֹרוֹת, y encaja con el marco histórico del versículo.'
- source_word: מֵרֹאשׁ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: HALOT
  rationale: Se preserva el valor temporal de la expresión; 'desde el principio' es idiomático y fiel al sentido de origen histórico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio y no como sustituto titulado; 'Yahvé' es la forma española del transliterado usado por POB.
- source_word: רִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primero
  - el primero en orden
  lexicon: HALOT
  rationale: Adjetivo predicativo que expresa primacía; en español necesita artículo para sonar natural y conservar el valor definido.
- source_word: וְאֶת אַחֲרֹנִים
  english_pob_choice: and with the last ones
  chosen_spanish: y con los últimos
  alternatives_spanish:
  - y con los últimos unos
  - y con los últimos hombres
  lexicon: HALOT
  rationale: Se conserva el plural hebreo sin forzar una singularización; 'con' sigue el valor relacional que la lectura inglesa documenta para esta construcción elíptica.
- source_word: אֲנִי הוּא
  english_pob_choice: I am he
  chosen_spanish: yo soy él
  alternatives_spanish:
  - yo soy el mismo
  - soy yo
  lexicon: HALOT
  rationale: Se mantiene la fórmula de autoidentificación compacta y su tensión teológica; 'yo soy él' es la forma más cercana y sobria en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La traducción española conserva el nombre propio mediante 'Yahvé' para evitar la sustitución por un título genérico y mantener la trazabilidad del nombre revelado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de וְאֶת אַחֲרֹנִים
  english_pob_reading: God is present with the last ones
  chosen_spanish_reading: con los últimos
  alternative_spanish_readings:
  - con el último
  - al final
  rationale: La construcción hebrea es elíptica y la lectura inglesa preserva el plural. En español se retiene el plural y la preposición 'con' para no cerrar prematuramente la ambigüedad y reflejar la continuidad de la presencia divina hasta las últimas generaciones.
  doctrine_reference: Isaías 41:4 en el contexto de soberanía divina sobre la historia
- issue: Fórmula אֲנִי הוּא
  english_pob_reading: I am he
  chosen_spanish_reading: yo soy él
  alternative_spanish_readings:
  - soy yo
  - yo soy el mismo
  rationale: La fórmula isaiana de autoidentificación debe permanecer breve y densa. 'Yo soy él' reproduce la tersura del hebreo y evita explicitar más de lo que el texto dice.
  doctrine_reference: Isaías 41:4; uso isaiano de אֲנִי הוּא
translation_notes:
  revision_awareness: 'Se revisó el balance entre fidelidad formal y naturalidad en español. Se mantuvieron los rasgos tensos del hebreo: la doble acción verbal, el participio de convocatoria, el plural de ''los últimos'' y la autoidentificación final breve. No hubo revisiones aplicadas en el paquete inglés reciente, y el acuerdo de control fue alto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estable para יְהוָה.
  - Se mantiene 'yo soy él' para la fórmula אֲנִי הוּא en armonía con el estilo conciso de Isaías.
  - Se conserva el plural 'los últimos' para reflejar אַחֲרֹנִים sin singularizarlo innecesariamente.
  - Los corchetes de nota aparecen solo donde hay nota textual explícita en el español.
