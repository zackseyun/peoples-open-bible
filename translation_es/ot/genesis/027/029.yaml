translation:
  language: es
  text: ¡Que te sirvan pueblos, y naciones se postren[a] ante ti. Ten dominio sobre tus hermanos[b], y que los hijos de tu madre se postren ante ti. Malditos los que te maldigan, y benditos los que te bendigan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te rindan homenaje». El verbo hebreo repetido puede denotar postración ante un superior, humano o divino; aquí el contexto favorece homenaje o sumisión, no adoración.
    reason: lexical_alternative
  - marker: b
    text: O «Sé señor de tus hermanos». Se evita «señor» en el texto principal para no confundirlo con el título divino; el hebreo expresa autoridad o supremacía sobre los hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַֽעַבְד֣וּ/ךָ
  english_pob_choice: serve you
  chosen_spanish: te sirvan
  alternatives_spanish:
  - te sirvan como esclavos
  - te estén sujetos
  lexicon: HALOT
  rationale: El verbo עבד en esta bendición expresa servicio o sujeción hacia el destinatario. En español, «te sirvan» comunica esa relación sin forzar un matiz laboral ni introducir una lectura más fuerte de esclavitud que el contexto inmediato no exige.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - gentes
  - naciones
  lexicon: HALOT
  rationale: «Pueblos» preserva el plural colectivo de עמים y funciona bien en paralelo con «naciones» en la segunda línea.
- source_word: ו/ישתחו לְ/ךָ
  english_pob_choice: bow down to you
  chosen_spanish: se postren ante ti
  alternatives_spanish:
  - se inclinen ante ti
  - te rindan homenaje
  lexicon: HALOT
  rationale: El verbo שחה/השתחוה puede describir postración reverente ante una autoridad humana. «Se postren ante ti» conserva la imagen corporal sin convertirla en adoración religiosa.
- source_word: לְאֻמִּים
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - clanes
  lexicon: HALOT
  rationale: «Naciones» mantiene el paralelismo poético y da variedad natural en español frente a «pueblos».
- source_word: הֱוֵה גְבִיר
  english_pob_choice: Be master
  chosen_spanish: Sé dueño
  alternatives_spanish:
  - Sé señor
  - Sé gobernante
  lexicon: HALOT
  rationale: גביר expresa dominio o autoridad sobre otros. Se evita «señor» por la posible confusión con el título divino; «dueño» comunica posesión/autoridad en un registro claro y breve, aunque se reconoce que la imagen es relacional y de supremacía familiar.
- source_word: לְ/אַחֶ֔י/ךָ
  english_pob_choice: over your brothers
  chosen_spanish: de tus hermanos
  alternatives_spanish:
  - sobre tus hermanos
  - para con tus hermanos
  lexicon: HALOT
  rationale: Aunque el hebreo lleva ל, la construcción idiomática con גביר expresa superioridad sobre el grupo. En español, «de tus hermanos» funciona naturalmente con «Sé dueño» y evita una redundancia pesada.
- source_word: בְּנֵי אִמֶּךָ
  english_pob_choice: your mother's sons
  chosen_spanish: los hijos de tu madre
  alternatives_spanish:
  - los hijos de tu madre
  - tus hermanos maternos
  lexicon: HALOT
  rationale: 'Se preserva la formulación literal y su matiz restrictivo: no solo «hermanos» en general, sino «los hijos de tu madre».'
- source_word: אֹרְרֶי/ךָ אָר֔וּר
  english_pob_choice: Cursed be those who curse you
  chosen_spanish: Maldito el que te maldiga
  alternatives_spanish:
  - Sea maldito el que te maldiga
  - Malditos sean los que te maldigan
  lexicon: HALOT
  rationale: La fórmula hebrea es recíproca y proverbial. En español, el singular genérico «el que te maldiga» reproduce bien la forma sentenciosa y evita añadir un plural que el hebreo no exige.
- source_word: וּֽ/מְבָרֲכֶ֖י/ךָ בָּרֽוּךְ
  english_pob_choice: and blessed be those who bless you
  chosen_spanish: y bendito el que te bendiga
  alternatives_spanish:
  - y benditos los que te bendigan
  - y bendito sea el que te bendiga
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la cláusula anterior y la forma proverbial. El singular genérico suena natural en español y conserva la fuerza general del enunciado.
theological_decisions:
- issue: Lenguaje de reverencia/prostración hacia un destinatario humano
  english_pob_reading: bow down to you
  chosen_spanish_reading: se postren ante ti
  alternative_spanish_readings:
  - te rindan homenaje
  - te adoren
  rationale: El verbo puede designar postración tanto ante Dios como ante seres humanos. Aquí el contexto es la bendición patriarcal sobre Jacob y señala supremacía humana/familiar, no adoración. Se conserva la tensión textual sin sacarla del ámbito del honor y la sujeción.
  doctrine_reference: No confundir reverencia humana con culto; preservar el alcance contextual del hebreo.
translation_notes:
  revision_awareness: El pasaje se mantuvo alineado con la última revisión del texto inglés auditado, que no introdujo cambios de contenido. La decisión principal en español fue resolver el campo semántico de גְבִיר sin perder la nota de autoridad sobre la familia, y conservar la fórmula paralela de maldición/bendición con equivalencia proverbial natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda; aquí el versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y «Cristo» por no ser pertinentes al pasaje.
  - Se eligió un registro bíblico claro y moderno, pero sin suavizar la fuerza de postración y maldición/bendición.
  - La puntuación sigue la convención española y el paralelismo del hebreo.
