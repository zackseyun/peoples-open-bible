    reason: lexical_alternative
  - marker: b
    text: 'O: «los que queden vivos podrán burlar con astucia al mundo entero».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota [a] para que refleje la alternativa auditada de τοὺς υἱοὺς Ἰσραήλ. Se mejora la naturalidad de «mujeres tales» a «mujeres así». Se ajusta la nota [b] para incluir las dos alternativas preservadas en inglés. Se afina κατασοφίσασθαι con «burlar con astucia», que comunica mejor la idea de vencer por sagacidad.
