translation:
  language: es
  text: Harás dos anillos de oro y los pondrás sobre las dos hombreras[a] del efod, por abajo, en su parte delantera, frente a su unión[b], por encima de la banda tejida[c] del efod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'piezas de hombro' o 'secciones de hombro'. El hebreo alude a las partes del efod donde se colocaban los anillos.
    reason: lexical_alternative
  - marker: b
    text: O 'frente a su juntura' o 'frente a su punto de unión'. El hebreo מֶחְבַּרְתּוֹ designa de manera amplia el lugar donde la prenda se une.
    reason: lexical_alternative
  - marker: c
    text: O 'el ceñidor tejido del efod' o 'la banda tejida con destreza del efod'. El hebreo חֵשֶׁב denota la pieza tejida especial que sirve como banda o sujeción del efod.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַבְּע֣וֹת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - sortijas
  lexicon: HALOT
  rationale: En este contexto de confección del efod, טַבָּעוֹת designa anillos metálicos para fijación. 'Anillos' es claro, natural en español y conserva la función material.
- source_word: כִתְפ֨וֹת
  english_pob_choice: shoulder-pieces
  chosen_spanish: hombreras
  alternatives_spanish:
  - hombros
  - piezas de hombro
  - correas de hombro
  lexicon: HALOT
  rationale: Aunque el hebreo se relaciona con 'hombros', aquí describe las partes del vestido. 'Hombreras' comunica bien en español una sección superior del atuendo sin sugerir anatomía.
- source_word: הָ/אֵפ֤וֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el pectoral
  - el vestido sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico 'efod', ya establecido para este objeto cultual y más fiel que una paráfrasis.
- source_word: מִ/לְּ/מַ֨טָּה
  english_pob_choice: underneath
  chosen_spanish: por abajo
  alternatives_spanish:
  - debajo
  - en la parte inferior
  lexicon: HALOT
  rationale: La expresión indica ubicación inferior en la prenda. 'Por abajo' suena natural en español y mantiene la orientación espacial.
- source_word: מִ/מּ֣וּל פָּנָ֔י/ו
  english_pob_choice: on its front side
  chosen_spanish: al frente de él
  alternatives_spanish:
  - en su parte frontal
  - frente a su frente
  lexicon: HALOT
  rationale: Para un objeto, la idea de 'front side' se expresa mejor como 'al frente de él'. Se evita una traducción demasiado anatómica de 'rostro/cara'.
- source_word: לְ/עֻמַּ֖ת
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - en oposición a
  - correspondiente a
  lexicon: HALOT
  rationale: La relación es de correspondencia posicional. 'Frente a' conserva la alineación descrita sin sonar demasiado abstracto.
- source_word: מֶחְבַּרְתּ֑/וֹ
  english_pob_choice: its seam
  chosen_spanish: su unión
  alternatives_spanish:
  - su costura
  - su juntura
  - su punto de unión
  lexicon: HALOT
  rationale: El sustantivo hebreo abarca el lugar de unión de la prenda. 'Unión' preserva esa amplitud mejor que 'costura', que sería más estrecha y podría fijar indebidamente la imagen a una costura textil.
- source_word: מִ/מַּ֕עַל
  english_pob_choice: above
  chosen_spanish: encima de
  alternatives_spanish:
  - sobre
  - por encima de
  lexicon: HALOT
  rationale: Indica posición superior respecto del punto de referencia. 'Encima de' es la forma más natural en español aquí.
- source_word: לְ/חֵ֖שֶׁב הָ/אֵפֽוֹד
  english_pob_choice: the skillfully woven band of the ephod
  chosen_spanish: el tejido fino del efod
  alternatives_spanish:
  - la banda tejida del efod
  - el ceñidor tejido del efod
  - el cinturón tejido del efod
  lexicon: HALOT
  rationale: חֵשֶׁב es un componente tejido y especial del efod. 'Tejido fino' conserva la idea de una pieza trabajada con esmero; no se usa 'cinturón' o 'ceñidor' porque podría sugerir una prenda demasiado común y estrecha.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustantivos. Esta propuesta mantiene la misma estructura y sentido del pasaje, ajustando la expresión española para hacer explícita la colocación espacial y la amplitud de מֶחְבַּרְתּוֹ.
  spanish_consistency_notes:
  - Se mantiene 'efod' como transliteración técnica, coherente con el resto del proyecto.
  - '''Anillos de oro'' corresponde al valor material y funcional del hebreo טַבְּעֹת.'
  - '''Unión'' evita restringir indebidamente מֶחְבַּרְתּוֹ a una costura específica.'
  - '''Tejido fino'' intenta reflejar la pieza especial del efod sin sobretraducir חֵשֶׁב.'
