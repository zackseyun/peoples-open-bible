translation:
  language: es
  text: Con justicia un rey establece una tierra, pero un hombre[a] de sobornos[b] la derriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «un hombre», usado aquí en sentido representativo o genérico.
    reason: cultural_note
  - marker: b
    text: O «de contribuciones», «de regalos» u «ofrendas»; el término hebreo puede denotar aportes u obsequios, pero en este contexto probablemente se refiere a pagos corruptos, de ahí «sobornos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El hebreo es genérico y proverbial; en español, «un rey» conserva ese valor representativo mejor que un rey específico con artículo definido.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: by justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - por justicia
  - mediante justicia
  - con juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar justicia, juicio y orden legal. «Con justicia» expresa en español natural el ejercicio recto del gobierno sin perder el matiz judicial.
- source_word: יַעֲמִיד
  english_pob_choice: establishes
  chosen_spanish: establece
  alternatives_spanish:
  - hace firme
  - sostiene
  - afirma
  lexicon: HALOT
  rationale: El hiphil de עמד comunica hacer firme o poner en estabilidad. «Establece» reproduce bien la idea causal y es idiomático en español.
- source_word: אָרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - un país
  - una nación
  - la tierra
  lexicon: HALOT
  rationale: En el género sapiencial se refiere a un territorio o reino bajo gobierno. «Una tierra» conserva el sentido genérico y evita restringirlo a una nación moderna.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular y funciona de modo representativo. Se mantiene «un hombre» para respetar la fuerza lexical del hebreo y el paralelismo del proverbio.
- source_word: תְּרוּמוֹת
  english_pob_choice: of bribes
  chosen_spanish: de ofrendas
  alternatives_spanish:
  - de dádivas
  - de contribuciones
  - de sobornos
  lexicon: HALOT
  rationale: La raíz puede denotar ofrendas, contribuciones o tributos, y el contexto también permite la lectura de pagos corruptos. En el texto español se conserva una traducción abierta («ofrendas») y la tensión semántica se explica en nota, en vez de fijar prematuramente solo «sobornos».
- source_word: יֶהֶרְסֶנָּה
  english_pob_choice: tears it down
  chosen_spanish: la derriba
  alternatives_spanish:
  - la destruye
  - la arruina
  - la demuele
  lexicon: HALOT
  rationale: הרס significa derribar o demoler. «La derriba» conserva la imagen concreta de destrucción y es conciso en español.
theological_decisions:
- issue: 'Sentido de תְּרוּמוֹת: ofrendas/contribuciones o pagos corruptos'
  english_pob_reading: The term can denote offerings or levies, but in this context it likely refers to corrupt payments, hence 'bribes.'
  chosen_spanish_reading: «Un hombre de ofrendas» mantiene abierta la posibilidad léxica, mientras la nota aclara que el contexto puede apuntar a pagos corruptos.
  alternative_spanish_readings:
  - «un hombre de sobornos»
  - «un hombre de contribuciones»
  - «un hombre de dádivas»
  rationale: El texto hebreo admite un rango semántico amplio; el inglés POB documenta esa tensión. En español, conviene no borrar la ambigüedad con una sola opción si el verso puede leerse como referencia a ofrendas/tributos o a sobornos, por lo que se conserva una forma abierta con nota explicativa.
  doctrine_reference: Proverbios sapienciales; tensión lexical documentada en el texto fuente y la auditoría inglesa
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; no se registran revisiones aplicadas. La propuesta española sigue esa lectura de alta concordancia y conserva la tensión léxica de תְּרוּמוֹת con una nota, en lugar de resolverla de forma demasiado estrecha.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrama.
  - Se usa «un rey» y «un hombre» para sostener el carácter proverbial y genérico del hebreo.
  - «Con justicia» y «la derriba» buscan naturalidad sin alejarse del paralelismo semántico del original.
