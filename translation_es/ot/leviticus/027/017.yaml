translation:
  language: es
  text: Si consagra[a] su campo desde el año del jubileo, tu tasación quedará en vigor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dedica su campo». El verbo hebreo expresa la acción de apartarlo como santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - En caso de que
  - Cuando
  lexicon: HALOT
  rationale: La partícula condicional abre una cláusula jurídica de caso; «si» es la correspondencia directa y natural en español.
- source_word: מִשְּׁנַת הַיֹּבֵל
  english_pob_choice: from the year of jubilee
  chosen_spanish: desde el año del jubileo
  alternatives_spanish:
  - a partir del año del jubileo
  - desde el año del jubileo
  lexicon: HALOT
  rationale: El hebreo usa מִן con שְׁנַת para indicar punto de partida temporal. «Desde» conserva ese valor de inicio ligado al sistema del jubileo.
- source_word: יַקְדִּישׁ
  english_pob_choice: he consecrates
  chosen_spanish: consagra
  alternatives_spanish:
  - dedica
  - santifica
  lexicon: HALOT
  rationale: El verbo causativo de קדשׁ expresa poner algo aparte como sagrado. «Consagra» preserva mejor el matiz cultual que «dedica» y evita una lectura demasiado general.
- source_word: שָׂדֵהוּ
  english_pob_choice: his field
  chosen_spanish: su campo
  alternatives_spanish:
  - su campo de cultivo
  - su terreno
  lexicon: HALOT
  rationale: El sustantivo es el término común para campo; el posesivo se refiere sin dificultad al propietario en el contexto legal.
- source_word: כְּעֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valuación
  alternatives_spanish:
  - tu evaluación
  - según tu valuación
  - conforme a tu valuación
  lexicon: HALOT
  rationale: «עֶרֶךְ» en este pasaje es una tasación reglamentaria. «Valuación» mantiene el sentido técnico y jurídico más de cerca que «valor» o «evaluación».
- source_word: יָקוּם
  english_pob_choice: shall stand
  chosen_spanish: se mantendrá
  alternatives_spanish:
  - quedará en pie
  - permanecerá
  - se establecerá
  lexicon: HALOT
  rationale: En contexto legal, קום comunica vigencia o validez de la tasación. «Se mantendrá» expresa continuidad normativa con tono natural en español.
theological_decisions:
- issue: Verbo cultual para separar algo para Dios
  english_pob_reading: consecrates
  chosen_spanish_reading: consagra
  alternative_spanish_readings:
  - dedica
  - santifica
  rationale: El hebreo presenta una acción de apartar el campo como algo santo dentro de la legislación cultual. «Consagra» conserva la dimensión sagrada sin cargar el texto con formulaciones doctrinales ajenas al contexto.
  doctrine_reference: Principio de equivalencia óptima; primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB no introdujo cambios; este borrador sigue la lectura estable «If he consecrates his field from the year of jubilee, your valuation shall stand», trasladando a español el matiz jurídico y cultual sin depender de una máscara reverencial para el nombre divino, que aquí no aparece.
  spanish_consistency_notes:
  - Se mantiene el registro legal y cultual del pasaje.
  - «Consagra» se usa de forma coherente con la decisión inglesa de «consecrates».
  - «Valuación» se emplea como término técnico para עֶרֶךְ en este contexto.
  - No hay mención de יהוה en este versículo, por lo que no corresponde ninguna decisión sobre el nombre divino.
