review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal, el paralelismo con repetición de «boca», el sentido hostil de «contra mí» y la imagen concreta de «lengua». Sin embargo, falla en un punto importante de alineación con la evidencia fuente y con la auditoría inglesa: דִּבְּרוּ אִתִּי aquí fue entendido por la POB como habla dirigida al salmista, por lo que «han hablado conmigo» sugiere conversación mutua y no preserva bien el matiz. Debe ajustarse a «me han hablado» o «han hablado conmigo» solo en nota alternativa, no en texto principal.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «se han abierto» suena menos natural que «han abierto» cuando el sujeto es «la boca... y la boca...». Además, la nota b contradice el texto principal: explica que el sentido es habla dirigida al salmista, pero mantiene «conmigo», que en español normalmente implica intercambio recíproco. Una pequeña reparación mejora naturalidad y precisión.'
  glossary_alignment: No hay términos del glosario mayor en disputa. «Malvado», «engaño», «contra mí» y «lengua mentirosa» son aceptables. La revisión propuesta mantiene el paralelismo hebreo y la decisión léxica documentada en inglés para אִתִּי.
  issues:
  - severity: high
    issue: «han hablado conmigo» no preserva bien el valor contextual de דִּבְּרוּ אִתִּי
    rationale: 'La auditoría inglesa explica que, aunque literalmente puede ser «conmigo/with me», en este contexto hostil significa habla dirigida al salmista: «they have spoken to me». En español, «hablar conmigo» suele implicar conversación con participación mutua, no simplemente dirigirse a alguien con palabras hostiles.'
  - severity: medium
    issue: La nota b está desalineada con el texto principal
    rationale: La nota afirma que la POB entiende un habla dirigida al salmista, «por eso “conmigo”», pero precisamente «conmigo» no expresa bien esa dirección en español. Debe explicar «me han hablado» como la opción principal y reservar «han hablado conmigo» como alternativa más literal.
  - severity: low
    issue: «se han abierto» es menos natural que «han abierto»
    rationale: 'Con «la boca... y la boca...» como sujeto, el español fluye mejor con verbo transitivo activo: «han abierto contra mí». El reflexivo no es incorrecto, pero resulta más pesado y menos directo.'
  revised_spanish_text: Porque la boca del malvado y la boca del engaño han abierto contra mí[a]; me han hablado con lengua mentirosa[b].
  revised_footnotes:
