translation:
  language: es
  text: 'a quienes dijo: «Esto es reposo[a]; dejen descansar al cansado; y esto es descanso[b]», pero no quisieron oír[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esto es el lugar de reposo». El hebreo מְנוּחָה puede significar tanto «reposo» como «lugar de reposo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y esto es refrigerio». El hebreo מַרְגֵּעָה se superpone con la idea de reposo, pero puede destacar alivio o refrescamiento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «pero no quisieron escuchar/obedecer». El hebreo שׁמע («oír») también puede llevar el sentido de atender o obedecer.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר / אֲלֵיהֶם
  english_pob_choice: to whom he said
  chosen_spanish: a quienes dijo
  alternatives_spanish:
  - a los cuales dijo
  - a quienes él dijo
  lexicon: HALOT
  rationale: La construcción relativa hebrea con אֲשֶׁר y el complemento direccional אֲלֵיהֶם se vierte naturalmente en español como 'a quienes dijo', manteniendo la relación de destinatario sin forzar una estructura más pesada.
- source_word: מְנוּחָה
  english_pob_choice: This is rest
  chosen_spanish: Esto es reposo
  alternatives_spanish:
  - Esto es descanso
  - Esto es el lugar de reposo
  lexicon: HALOT
  rationale: '''Reposo'' conserva el sustantivo abstracto y permite reflejar el matiz de calma/cesación. Se evita resolver de antemano la posible tensión entre ''rest'' y ''resting place'', que el inglés POB preservó en nota.'
- source_word: הָנִיחוּ
  english_pob_choice: let the weary rest
  chosen_spanish: dejen reposar
  alternatives_spanish:
  - dejen descansar
  - hagan reposar
  - permitan reposar
  lexicon: HALOT
  rationale: El imperativo causativo expresa dejar o permitir reposo. 'Dejen reposar' comunica bien la fuerza exhortativa en español y sigue la revisión inglesa que prefirió 'let the weary rest'.
- source_word: לֶעָיֵף
  english_pob_choice: to the weary
  chosen_spanish: al cansado
  alternatives_spanish:
  - al fatigado
  - al exhausto
  - al fatigado y cansado
  lexicon: HALOT
  rationale: עָיֵף significa cansado, fatigado, exhausto. 'Al cansado' es claro, natural y suficiente para el registro bíblico sin perder el referente humano concreto.
- source_word: מַרְגֵּעָה
  english_pob_choice: and this is repose
  chosen_spanish: y esto es descanso
  alternatives_spanish:
  - y esto es reposo
  - y esto es alivio
  - y esto es refrigerio
  lexicon: HALOT
  rationale: Aunque el inglés eligió 'repose' para conservar distinción, en español 'descanso' comunica la idea básica y mantiene el paralelismo con 'reposo'. Se conserva en nota la posible matización de alivio/refrescamiento.
- source_word: אָבוּא שְׁמוֹעַ
  english_pob_choice: they were not willing to hear
  chosen_spanish: no quisieron oír
  alternatives_spanish:
  - no quisieron escuchar
  - no quisieron obedecer
  - no estuvieron dispuestos a oír
  lexicon: HALOT
  rationale: אבה expresa voluntad o disposición; unido a שׁמע, el sentido básico es negarse a oír, con posible implicación de obedecer. 'No quisieron oír' preserva esa tensión sin cerrarla en una interpretación más fuerte.
theological_decisions:
- issue: 'Alcance de מְנוּחָה: ''reposo'' versus ''lugar de reposo'''
  english_pob_reading: This is rest / Or 'This is the resting place.'
  chosen_spanish_reading: Esto es reposo
  alternative_spanish_readings:
  - Esto es el lugar de reposo
  - Esto es descanso
  rationale: El hebreo puede referirse tanto a la cualidad de reposo como al lugar donde se descansa. Siguiendo el criterio del POB de no resolver la ambigüedad, el texto principal conserva la forma breve 'reposo' y la nota ofrece la alternativa espacial.
  doctrine_reference: Translation philosophy §3, §5
- issue: 'Matiz de שׁמע: oír, escuchar, obedecer'
  english_pob_reading: yet they were not willing to hear
  chosen_spanish_reading: pero no quisieron oír
  alternative_spanish_readings:
  - pero no quisieron escuchar
  - pero no quisieron obedecer
  - pero no hicieron caso
  rationale: שׁמע puede implicar respuesta obediente, pero aquí el texto hebreo y el POB inglés mantienen el verbo de oír para conservar la tensión lexicográfica. El contexto profético sostiene la idea de rechazo a la advertencia sin imponer 'obedecer' en el cuerpo principal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Tomé como base el último estado revisado del inglés POB, que cambió 'give rest to the weary' por 'let the weary rest'. Por eso el español usa una formulación causativa permisiva ('dejen reposar') en lugar de una expresión más directiva. También mantuve la distinción semántica entre מְנוּחָה y מַרְגֵּעָה mediante un par 'reposo/descanso', dejando en notas la posibilidad de 'lugar de reposo' y 'refrigerio'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiriera explícitamente; este versículo no lo contiene.
  - Se evitó 'SEÑOR' por no aparecer el tetragrámaton en este versículo.
  - Se prefirió 'reposo/descanso' en vez de alternar con léxico eclesiástico más marcado como 'sosiego' o 'quietud'.
  - Se mantuvo 'oír' en la cláusula final para preservar la tensión entre audición y obediencia que el POB inglés documenta.
