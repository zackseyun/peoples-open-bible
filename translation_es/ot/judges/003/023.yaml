review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: Ehud sale a un espacio adyacente, cierra las puertas del aposento alto detrás de sí y luego las asegura. Sin embargo, la nota y algunas decisiones léxicas necesitan ajuste para alinearse mejor con el expediente inglés y con español natural.'
  spanish_quality_summary: El texto principal es claro y mayormente natural. «salió al vestíbulo» y «cerró tras de sí las puertas del aposento alto» funcionan bien. La principal debilidad es «las aseguró», que en español suena menos preciso que «las cerró con llave» o «las dejó cerradas con llave». Además, la nota contiene un anglicismo no traducido («anteroom») y una alternativa discutible («corredor») donde el inglés auditado tenía «antechamber» y «colonnade».
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La elección «aposento alto» para הָעֲלִיָּה es adecuada y bíblicamente legible. «vestíbulo» para הַמִּסְדְּרוֹנָה mantiene bien la rareza arquitectónica; las alternativas en nota deben normalizarse al español: «antecámara» en vez de «anteroom», y puede conservarse «pórtico» y «columnata»/«colonnata» según el expediente; «columnata» es la opción española más natural para ‘colonnade’.'
  issues:
  - severity: medium
    issue: «y las aseguró» es impreciso para וְנָעָל
    rationale: Aunque comunica que las dejó firmes, נעל con puertas indica trabarlas/cerrarlas con seguro. En español bíblico-natural, «las cerró con llave» expresa mejor el sentido contextual sin perder naturalidad.
  - severity: medium
    issue: La nota al pie contiene el anglicismo «anteroom»
    rationale: La nota debe estar completamente en español. La alternativa auditada correspondiente es «antecámara».
  - severity: low
    issue: La alternativa «corredor» no refleja tan bien el expediente inglés como «columnata»
    rationale: El inglés preserva ‘colonnade’ como una alternativa significativa. «Corredor» es posible, pero desplaza el matiz arquitectónico documentado; «columnata» conserva mejor la opción del expediente.
  - severity: low
    issue: Coma antes de «y las aseguró/cerró con llave» es innecesaria
    rationale: En español fluye mejor la coordinación simple sin esa coma en una secuencia verbal narrativa breve.
  revised_spanish_text: Entonces Ehud salió al vestíbulo[a] y cerró tras de sí las puertas del aposento alto y las cerró con llave.
  revised_footnotes:
  - marker: a
    text: O «al pórtico», «a la antecámara» o «a la columnata»; el término hebreo es raro y se refiere a un espacio arquitectónico adyacente.
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y el sentido del borrador, pero se corrige «las aseguró» por «las cerró con llave» para reflejar con más precisión נעל en este contexto. También se normaliza la nota al español y se ajustan las alternativas para alinearlas con el expediente inglés auditado. No se requiere adjudicación adicional.
