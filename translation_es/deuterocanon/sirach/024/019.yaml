translation:
  language: es
  text: Vengan a mí[a], los que me desean[b], y llénense de mis frutos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Acérquense a mí». El griego expresa una invitación a aproximarse.
    reason: lexical_alternative
  - marker: b
    text: O «los que me anhelan». El participio griego expresa un deseo intenso.
    reason: lexical_alternative
  - marker: c
    text: O «mi producto» o «mi cosecha». El griego se refiere a lo que es producido; «frutos» se elige para preservar la imagen poética circundante de la Sabiduría como planta fecunda.
    reason: lexical_alternative
lexical_decisions:
- source_word: προέλθετέ
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Venid aquí
  - Acercaos
  - Venid a mí
  lexicon: LSJ
  rationale: El imperativo plural expresa una invitación a acercarse. «Venid» conserva la fuerza de llamado directo y es natural en español bíblico sin añadir matices no presentes en el griego.
- source_word: πρὸς μέ
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - junto a mí
  lexicon: LSJ
  rationale: La preposición de dirección se vierte de forma directa con «a mí», que acompaña de manera idiomática el imperativo en español.
- source_word: οἱ ἐπιθυμοῦντές μου
  english_pob_choice: you who desire me
  chosen_spanish: los que me deseáis
  alternatives_spanish:
  - los que me anheláis
  - los que me deseáis con ardor
  - los que me suspiráis
  lexicon: LSJ
  rationale: El participio comunica deseo intenso. «Deseáis» mantiene la relación léxica con ἐπιθυμέω sin suavizarla; el plural masculino genérico en español puede incluir al grupo mixto, y el imperativo plural sostiene la forma exhortativa.
- source_word: γενημάτων
  english_pob_choice: fruits
  chosen_spanish: frutos
  alternatives_spanish:
  - producción
  - producto
  - rendimiento
  lexicon: LSJ
  rationale: «Frutos» conserva la imagen poética de lo que brota o es producido, alineada con la decisión inglesa de mantener el campo metafórico de la Sabiduría como planta fecunda. «Frutos» es más natural y menos comercial que «produce».
- source_word: ἐμπλήσθητε
  english_pob_choice: be filled
  chosen_spanish: saciaos
  alternatives_spanish:
  - llenáos
  - sed llenos
  - satisfaéos
  lexicon: LSJ
  rationale: El imperativo pasivo pide una acción recibida más que realizada. En español, «saciaos» comunica mejor la imagen de plenitud resultante de participar de los frutos, sin perder del todo el sentido de ser llenados; además evita una frase demasiado técnica o dura.
theological_decisions:
- issue: Sabiduría personificada en primera persona
  english_pob_reading: 'Retain first-person feminine personification without allegorical expansion: ''Come to me... be filled with my fruits.'''
  chosen_spanish_reading: 'Mantener la personificación en primera persona sin explicarla alegóricamente: «Venid a mí... y saciaos con mis frutos».'
  alternative_spanish_readings:
  - Venid a mí, los que buscáis mi sabiduría, y saciaos con sus beneficios
  - Acercaos a mí... y llenáos de mis enseñanzas
  rationale: El griego presenta a la Sabiduría hablando de sí misma y de sus frutos. La traducción conserva esa voz y la metáfora agrícola, en vez de convertir «frutos» en una explicación doctrinal que el texto no ofrece.
  doctrine_reference: Preservar la tensión literaria y teológica del texto sapiencial; primacía del original sobre la explicación interpretativa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se detectaron revisiones aplicadas. La versión española sigue la misma decisión de conservar la invitación directa y la imagen de «frutos», ajustando solo la sintaxis para naturalidad en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aplica.
  - Se mantuvo el plural exhortativo «venid / saciaos» para reflejar el griego.
  - «Frutos» preserva la imaginería sapiencial sin convertirla en explicación doctrinal.
  - Se evitó «Cristo» u այլ terminología no pertinente; el pasaje habla de Sabiduría personificada.
