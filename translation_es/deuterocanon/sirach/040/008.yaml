translation:
  language: es
  text: Y con toda carne está su ansiedad, y su riqueza ahuyenta su sueño.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «con toda carne, desde el hombre hasta la bestia, y sobre los pecadores, siete veces más que esto». Esta redacción más amplia no está presente en la línea hebrea conservada usada aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: ועם כל בשר
  english_pob_choice: And with all flesh
  chosen_spanish: Y con toda carne
  alternatives_spanish:
  - Y con toda carne viviente
  - Y entre toda carne
  lexicon: HALOT
  rationale: Conservo el alcance colectivo de בשר como referencia a toda existencia viviente/encarnada. 'Carne' mantiene el paralelismo con el hebreo y funciona de modo natural en español bíblico sin perder la amplitud del término.
- source_word: דאגתם
  english_pob_choice: their anxiety
  chosen_spanish: su ansiedad
  alternatives_spanish:
  - su preocupación
  - su inquietud
  - su cuidado
  lexicon: HALOT
  rationale: דאג expresa preocupación afligida o ansiosa; 'ansiedad' reproduce mejor la carga emocional y sapiencial que 'cuidado' o 'preocupación'. El posesivo en singular colectivo 'su' refleja el hebreo con naturalidad en español.
- source_word: עמם
  english_pob_choice: is with them
  chosen_spanish: está con ellos
  alternatives_spanish:
  - permanece con ellos
  - va con ellos
  lexicon: HALOT
  rationale: La frase preposicional se vierte de forma directa como presencia acompañante. 'Está con ellos' es la copula implícita más natural en español.
- source_word: ועשרם
  english_pob_choice: and their wealth
  chosen_spanish: y su riqueza
  alternatives_spanish:
  - y sus riquezas
  - y su abundancia
  lexicon: HALOT
  rationale: עֹשֶׁר se refiere a riqueza o posesiones; 'riqueza' es el equivalente más directo y mantiene el tono sapiencial. 'Riquezas' sería posible, pero el singular colectivo resulta más fluido en español.
- source_word: מניד שנתם
  english_pob_choice: drives away their sleep
  chosen_spanish: ahuyenta su sueño
  alternatives_spanish:
  - les quita el sueño
  - perturba su sueño
  - aleja su sueño
  lexicon: HALOT
  rationale: El valor verbal sugiere apartar o hacer huir el sueño. 'Ahuyenta' conserva la imagen dinámica de algo que espanta el descanso, con buena naturalidad en español.
- source_word: μετὰ πάσης σαρκὸς ἀπὸ ἀνθρώπου ἕως κτήνους
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda criatura
  - desde el hombre hasta la bestia
  lexicon: BDAG
  rationale: El paralelo griego amplía explícitamente el alcance 'desde el hombre hasta la bestia'. En el texto principal mantengo la compacta 'toda carne', que ya expresa esa totalidad sin importar una expansión no presente en el hebreo extante.
- source_word: ἐπὶ ἁμαρτωλῶν ἑπταπλάσια πρὸς ταῦτα
  english_pob_choice: not adopted in main text
  chosen_spanish: sobre los pecadores, siete veces más que estas
  alternatives_spanish:
  - y sobre los pecadores, siete veces más que estas
  - y contra los pecadores, siete veces más que estas
  lexicon: BDAG
  rationale: El griego añade una cláusula ausente del hebreo conservado. La reservo para nota porque el texto principal de Sirácides se ancla en el hebreo cuando está disponible; aun así, la traducción española de la variante griega debe quedar registrada como alternativa textual relevante.
theological_decisions:
- issue: Primacía del hebreo frente a la expansión griega en Sirácides
  english_pob_reading: Main text follows the extant Hebrew line; Greek expansion preserved in footnote.
  chosen_spanish_reading: El texto principal sigue la línea hebrea conservada; la expansión griega queda en nota.
  alternative_spanish_readings:
  - Incorporar la cláusula griega al cuerpo del versículo
  rationale: En Sirácides, cuando el hebreo está disponible, la edición POB privilegia ese testimonio como base textual. La cláusula griega es una variante significativa, pero no desplaza la lectura hebrea conservada. La nota mantiene visible la tensión textual sin borrarla.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como input real sin desplazar la primacía del original conservado.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del audit trail al preferir 'riqueza' frente a 'abundancia', y conserva el cierre breve del hebreo sin incorporar la expansión griega al cuerpo principal. La nota refleja la variante griega como lectura alternativa importante.
  spanish_consistency_notes:
  - Se mantiene 'carne' para בשר, en armonía con el uso técnico-poético del hebreo y con el alcance colectivo señalado por el paralelo griego.
  - Se evita 'SEÑOR' u այլ sustitución litúrgica porque aquí no aparece el tetragrámaton ni un equivalente funcional relevante.
  - '''Ansiedad'' y ''riqueza'' reproducen el tono sapiencial de tensión entre preocupación y posesiones sin suavizar el contraste.'
  - La nota usa numeración de marca única y está anclada directamente en el segmento afectado.
