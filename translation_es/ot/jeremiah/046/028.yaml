translation:
  language: es
  text: Pero no temas, mi esclavo Jacob[a], declara Yahvé, porque yo estoy contigo. Porque haré una destrucción total de todas las naciones adonde te he expulsado, pero a ti no te destruiré por completo. Sin embargo, te disciplinaré con justicia, y no te dejaré impune[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi siervo Jacob». El hebreo עבד puede leerse como «esclavo» o «siervo»; aquí se mantiene «esclavo» por su fuerza léxica, siguiendo el criterio del proyecto cuando no hay una razón contextual para suavizarlo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ciertamente no te absolveré». El hebreo repite la idea con una construcción intensificada y puede tener sentido forense, «declarar inocente», además de la idea de no dejar sin castigo. Asimismo, el hebreo repite «haré una destrucción total / no te destruiré por completo» para contrastar retóricamente a las naciones con Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירָא
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no te asustes
  lexicon: HALOT
  rationale: La prohibición hebrea con ירא se expresa de manera natural y directa en español con 'no temas'. Conserva el tono de exhortación y consuelo profético sin añadir matices ajenos.
- source_word: עַבְדִּי יַעֲקֹב
  english_pob_choice: my servant Jacob
  chosen_spanish: mi esclavo Jacob
  alternatives_spanish:
  - mi siervo Jacob
  - Jacob, mi esclavo
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica de δοῦλος/עבד como 'esclavo', conforme al criterio del proyecto cuando el matiz de subordinación es relevante. 'Mi siervo' suavizaría la relación y perdería esa fuerza; se conserva además el nombre propio 'Jacob' porque el hebreo no dice 'Israel'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne y el nombre divino conforme al estándar del proyecto. 'Declara' refleja bien la fórmula נְאֻם sin reducirla a mero discurso directo.
- source_word: כִּי אִתְּךָ אָנִי
  english_pob_choice: for I am with you
  chosen_spanish: porque yo estoy contigo
  alternatives_spanish:
  - porque estoy contigo
  - pues yo estoy contigo
  lexicon: HALOT
  rationale: La frase de presencia divina se vierte en español con una formulación idiomática y clara. Se conserva el énfasis del pronombre 'yo'.
- source_word: אֶעֱשֶׂה כָלָה
  english_pob_choice: I will make a full end
  chosen_spanish: haré una destrucción total
  alternatives_spanish:
  - haré un fin completo
  - haré un exterminio completo
  lexicon: HALOT
  rationale: La repetición de כָּלָה en el verso sostiene la idea de destrucción completa. En español, 'destrucción total' comunica el alcance sin sonar demasiado mecánico; se evita diluir la intensidad con expresiones más vagas.
- source_word: בְּכָל הַגּוֹיִם
  english_pob_choice: of all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - de todas las naciones
  - sobre todas las naciones
  lexicon: HALOT
  rationale: El hebreo con בְּ aquí introduce el ámbito en el que recae la destrucción. 'Entre' comunica bien ese alcance distributivo en español y mantiene la idea de juicio sobre el conjunto de las naciones.
- source_word: אֲשֶׁר הִדַּחְתִּיךָ שָׁמָּה
  english_pob_choice: where I have driven you
  chosen_spanish: a las cuales te he echado
  alternatives_spanish:
  - a donde te he expulsado
  - donde te he dispersado
  lexicon: HALOT
  rationale: הדח en el contexto del exilio expresa expulsar/arrojar. 'He echado' conserva la fuerza del verbo y el movimiento forzado; 'expulsado' es posible, pero 'echado' mantiene la dureza del original con buena naturalidad en español.
- source_word: וְאֹתְךָ לֹא אֶעֱשֶׂה כָלָה
  english_pob_choice: but of you I will not make a full end
  chosen_spanish: pero a ti no te haré destrucción total
  alternatives_spanish:
  - pero de ti no haré una destrucción total
  - pero no te destruiré del todo
  lexicon: HALOT
  rationale: Se preserva el contraste retórico con la cláusula anterior. 'A ti' coloca el pronombre enfático donde el hebreo lo resalta, y la repetición de 'destrucción total' mantiene la tensión textual.
- source_word: וְיִסַּרְתִּיךָ
  english_pob_choice: Yet I will discipline you
  chosen_spanish: Sin embargo, te disciplinaré
  alternatives_spanish:
  - Pero te corregiré
  - Te castigaré
  lexicon: HALOT
  rationale: יסר suele implicar disciplina correctiva, no mera retribución. 'Disciplinaré' conserva ese matiz y evita reducir la acción divina a castigo simple.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - con juicio
  - con rectitud
  - según justicia
  lexicon: HALOT
  rationale: Se mantiene el valor de משפט como marco justo y ordenado de la disciplina. 'Con justicia' es claro y no desplaza el matiz legal/forense que el verso puede sugerir.
- source_word: וְנַקֵּה לֹא אֲנַקֶּךָּ
  english_pob_choice: and I will by no means leave you unpunished
  chosen_spanish: y no te dejaré impune en absoluto
  alternatives_spanish:
  - y de ningún modo te declararé inocente
  - y no te absolveré en absoluto
  lexicon: HALOT
  rationale: Se conserva la intensidad de la negación absoluta y el posible matiz forense de נקה sin obligar al lector español a una lectura demasiado técnica. 'Impune' comunica bien la idea de no quedar sin consecuencia.
theological_decisions:
- issue: Tensión entre preservación y disciplina divina
  english_pob_reading: God promises preservation of Jacob from annihilation while still subjecting him to just discipline.
  chosen_spanish_reading: Dios preserva a Jacob de la destrucción total, pero no lo exime de una disciplina justa.
  alternative_spanish_readings:
  - Dios no destruirá por completo a Jacob en ningún sentido.
  - La disciplina divina aquí es solo castigo, no corrección.
  rationale: La estructura del verso contrapone la destrucción total de las naciones con la no-destrucción total de Jacob, seguida de disciplina y no-impunidad. La traducción conserva ambas afirmaciones sin resolver la tensión a favor de una sola.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Coincide con la última revisión auditada sin cambios sustanciales; se conservan la repetición de כָלָה, la presencia divina, y la tensión entre preservación de Jacob y disciplina justa.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se mantiene 'destrucción total' para reflejar la repetición de כָלָה y el contraste retórico con las naciones.
  - Se conserva 'esclavo' para עבד por consistencia terminológica del POB español, con nota alternativa para 'siervo'.
  - '''Con justicia'' traduce לַמִּשְׁפָּט sin borrar el posible trasfondo forense.'
  - La cláusula final se formula como impunidad/castigo para preservar el doble matiz de נקה sin exagerar una sola lectura.
