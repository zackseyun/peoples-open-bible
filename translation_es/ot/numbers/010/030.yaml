translation:
  language: es
  text: 'Pero él le respondió[a]: «No iré; más bien, iré a mi tierra y a mi parentela».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y a mis parientes»; el término hebreo también puede significar «lugar de nacimiento» o «lugar natal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: But he said to him
  chosen_spanish: Pero él le respondió
  alternatives_spanish:
  - Y él le dijo
  - Pero le dijo
  lexicon: HALOT
  rationale: El waw consecutivo puede ser simple coordinación narrativa, pero en contexto la respuesta funciona como contraste con la petición anterior; por eso «Pero» conserva el giro adversativo del POB. «Respondió» hace explícita la función de réplica en español sin alterar el sentido del hebreo.
- source_word: לֹא אֵלֵךְ
  english_pob_choice: I will not go
  chosen_spanish: No iré
  alternatives_spanish:
  - No voy a ir
  - No me iré
  lexicon: HALOT
  rationale: El imperfecto de הלך en habla directa expresa intención/decisión. «No iré» mantiene la fuerza de rechazo y suena natural en español formal. «No me iré» sería más interpretativo y «No voy a ir» más coloquial.
- source_word: כִּי אִם
  english_pob_choice: Rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - antes bien
  - más que
  lexicon: HALOT
  rationale: Tras una negación, la construcción introduce una corrección contrastiva. «Más bien» reproduce bien el valor de rectificación del hebreo y evita añadir un matiz adversativo demasiado fuerte que tendría «sino» en español.
- source_word: אֶל אַרְצִי
  english_pob_choice: to my own land
  chosen_spanish: a mi tierra
  alternatives_spanish:
  - a mi país
  - a mi país natal
  - a mi país propio
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra, país o territorio. «Tierra» es la opción más fiel y amplia en este contexto patriarcal/geográfico. No se añadió «propia» porque el posesivo ya queda claro con «mi» y en español sonaría redundante.
- source_word: וְאֶל מוֹלַדְתִּי
  english_pob_choice: and to my own kindred
  chosen_spanish: y a mi parentela
  alternatives_spanish:
  - y a mis parientes
  - y a mi familia
  - y a mi lugar de origen
  lexicon: HALOT
  rationale: מוֹלַדְתִּי puede referirse a parentesco, lugar de nacimiento o tierra natal. En paralelo con «mi tierra», «parentela» preserva el sentido social/familiar sin convertirlo en mera repetición geográfica. «Parientes» es viable, pero «parentela» suena más compacto y bíblico en español contemporáneo.
- source_word: אֵלֵךְ
  english_pob_choice: I will go
  chosen_spanish: iré
  alternatives_spanish:
  - voy
  - me iré
  lexicon: HALOT
  rationale: La repetición del verbo al final refuerza determinación. «Iré» conserva el paralelismo con la primera cláusula y mantiene el futuro de resolución en discurso directo.
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético (WLC) y la lectura auditada del POB en inglés. Se mantuvo la estructura de negación + rectificación («No iré; más bien, iré...»), y se preservó la ambigüedad de מוֹלַדְתִּי mediante una nota que recoge las alternativas documentadas por el POB.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en otros pasajes cuando corresponde; este versículo no contiene el nombre divino.
  - Se evita «Señor» o fórmulas eclesiásticas no motivadas por el hebreo.
  - «Parentela» se usa aquí por el matiz de grupo familiar, no como traducción rígida en todos los contextos de מוֹלֶדֶת.
  - La puntuación española conserva la relación adversativa y la cita directa de manera publicable.
