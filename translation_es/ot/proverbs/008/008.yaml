revisions:
- from: Todas las palabras de mi boca son rectas[a]; no hay en ellas nada torcido ni perverso.
  to: Todas las palabras de mi boca son justas[a]; no hay en ellas nada torcido ni desviado.
  rationale: Se ajusta צֶדֶק a «justas» para alinearlo mejor con «righteous», y se cambia «perverso» por «desviado» para conservar el paralelismo de dos metáforas de desviación moral. También se corrige la nota para ofrecer una alternativa léxica más cercana a las opciones auditadas en inglés y al hebreo.
