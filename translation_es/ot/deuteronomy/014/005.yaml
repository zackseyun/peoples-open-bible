translation:
  language: es
  text: el venado[a], la gacela, el corzo, la cabra montés, el íbex, el antílope y la oveja de montaña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres de animales en este versículo son inciertos. «Corzo» también puede ser «gamo» o «ciervo rojo»; «cabra montés» puede ser «íbex»; «íbex» puede también ser «addax»; «antílope» puede ser «buey salvaje» o «uro»; «oveja de montaña» puede ser «gamo montés» o «cabra montés».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּל
  english_pob_choice: the deer
  chosen_spanish: el venado
  alternatives_spanish:
  - el ciervo
  - el corzo
  lexicon: HALOT
  rationale: El hebreo designa un cérvido; en español, "venado" es el término general claro y natural para un lector actual. "Ciervo" también es posible, pero "venado" comunica mejor la categoría sin sonar arcaico ni demasiado técnico.
- source_word: צְבִי
  english_pob_choice: the gazelle
  chosen_spanish: la gacela
  alternatives_spanish:
  - el antílope
  - la gacela
  lexicon: HALOT
  rationale: El equivalente español más directo y transparente para esta especie es "gacela". "Antílope" sería más amplio y menos preciso, así que se evita como opción principal.
- source_word: יַחְמוּר
  english_pob_choice: the roebuck
  chosen_spanish: el corzo
  alternatives_spanish:
  - el gamo
  - el ciervo rojo
  lexicon: HALOT
  rationale: La identificación exacta es incierta. Entre las opciones españolas disponibles, "corzo" funciona como un cérvido reconocible y breve. Se preserva la incertidumbre mediante nota, ya que la tradición inglesa también admite otras identificaciones.
- source_word: אַקּוֹ
  english_pob_choice: the wild goat
  chosen_spanish: la cabra montés
  alternatives_spanish:
  - la cabra salvaje
  - el íbice
  lexicon: HALOT
  rationale: El hebreo apunta a un caprino salvaje. "Cabra montés" es la forma más natural en español para expresar esa clase de animal sin perder el rasgo de vida silvestre. "Íbice" se reserva como alternativa técnica.
- source_word: דִישֹׁן
  english_pob_choice: the ibex
  chosen_spanish: el íbice
  alternatives_spanish:
  - el addax
  - la cabra montés
  lexicon: HALOT
  rationale: Aquí la identificación ya en inglés se mantiene como "ibex". En español, "íbice" es el calco zoológico adecuado y conserva la especificidad de la lista de rumiantes salvajes.
- source_word: תְאוֹ
  english_pob_choice: the antelope
  chosen_spanish: el antílope
  alternatives_spanish:
  - el buey salvaje
  - el uro
  lexicon: HALOT
  rationale: La especie es incierta. Siguiendo la opción inglesa, "antílope" ofrece una solución clara y moderna, mientras que las lecturas bovinas se mantienen como alternativas documentadas.
- source_word: זָמֶר
  english_pob_choice: the mountain sheep
  chosen_spanish: la oveja de montaña
  alternatives_spanish:
  - el gamo montés
  - la cabra montés
  lexicon: HALOT
  rationale: La especie exacta es incierta. "Oveja de montaña" reproduce de manera accesible la imagen zoológica y evita un tecnicismo poco transparente para el lector común.
translation_notes:
  revision_awareness: El texto sigue de cerca el estado final del audit trail inglés, sin cambios de revisión pendientes; la única adaptación es la naturalización léxica al español manteniendo la misma serie de animales y la misma nota de incertidumbre zoológica.
  spanish_consistency_notes:
  - Se mantiene la lista zoológica en el mismo orden del hebreo y del inglés POB.
  - Se usa «íbice» para conservar la especificidad zoológica donde el inglés opta por "ibex".
  - Se evita traducir mecánicamente con calcos ingleses cuando el español ofrece términos más naturales, pero sin ampliar la identificación más allá de lo que admite el source packet.
