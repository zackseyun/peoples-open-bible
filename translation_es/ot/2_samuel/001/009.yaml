revisions:
- from: 'Y él me dijo: «Por favor, ponte sobre mí y ponme a muerte, porque la angustia me ha atrapado[a], aunque mi vida todavía está en mí[b]».'
  to: 'Y él me dijo: «Por favor, ponte sobre mí y dame muerte, porque la angustia se ha apoderado de mí[a], aunque mi vida aún está en mí[b]».'
  rationale: Se revisó el texto para usar español idiomático y digno sin perder el sentido del hebreo ni las decisiones del POB inglés. 'Dame muerte' refleja mejor la petición causativa que 'ponme a muerte'; 'se ha apoderado de mí' comunica mejor la fuerza de אֲחָזַנִי que 'me ha atrapado'; y la nota b se corrigió al español y al literal documentado. Se mantuvo 'angustia' con nota por la incertidumbre de הַשָּׁבָץ y 'vida' para נֶפֶשׁ en contexto.
