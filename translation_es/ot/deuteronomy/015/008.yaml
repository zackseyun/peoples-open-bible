revisions:
- from: En cambio[a], debes abrir tu mano hacia él y ciertamente prestarle lo suficiente para toda su falta.
  to: En cambio[a], debes abrir tu mano a él y ciertamente prestarle lo suficiente para su necesidad, para todo lo que le falte.
  rationale: Se ajusta לוֹ a un dativo natural en español («a él») y se reemplaza «para toda su falta» por una formulación fiel e idiomática que expresa tanto דֵּי מַחְסֹרוֹ («lo suficiente para su necesidad») como אֲשֶׁר יֶחְסַר לוֹ («para todo lo que le falte»). Se conserva la nota sobre el énfasis del infinitivo absoluto y el tono moderno y digno del proyecto.
