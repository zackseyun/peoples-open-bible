review_pass:
  verdict: revise
  source_alignment_summary: El borrador español se apoya demasiado en el paralelo griego y no preserva suficientemente el anclaje del texto principal en el hebreo. «Pero sano y fuerte en su estado» introduce material del griego («healthy and strong in constitution») que no corresponde al hebreo breve, y además sustituye «vivo» por «sano». «Azotado en su cuerpo» también sigue el griego más que el hebreo, donde la forma concreta es «herido/afligido en su carne».
  spanish_quality_summary: El español es legible, pero «pero sano y fuerte en su estado» suena explicativo y menos natural que una formulación más directa. La nota actual está bien encaminada, pero el texto principal debería reflejar mejor la economía y concreción del hebreo. Una redacción como «que vive y está bien» mantiene la naturalidad española sin absorber la expansión griega.
  glossary_alignment: 'No hay términos del glosario principal especialmente disputados aquí, pero sí un principio metodológico importante: conservar la concreción de בבשרו como «carne» en vez de generalizar a «cuerpo», y no trasladar al texto principal la expansión griega de salud/fuerza. El masculino singular representativo («hombre pobre / hombre rico») está bien preservado.'
  issues:
  - severity: high
    issue: El texto principal incorpora la expansión griega «sano y fuerte»
    rationale: El hebreo dice «vivo en sí mismo» de forma breve; el inglés auditado permitió «alive and well», pero no justificó importar también «strong in constitution». Eso debe quedar en nota, no en el texto principal.
  - severity: medium
    issue: «En su estado» no refleja bien בעצמו
    rationale: La expresión resulta algo artificial y abstracta. El inglés revisado resolvió la idiomaticidad con «alive and well»; en español conviene una equivalencia natural como «vive y está bien», dejando la literalidad para la nota.
  - severity: medium
    issue: «Azotado en su cuerpo» se inclina al griego frente al hebreo
    rationale: El hebreo habla de ser afectado/herido «en su carne»; «azotado en su cuerpo» corresponde mejor al paralelo griego. Dado que la nota ya preserva el griego, el texto principal debe volver a una formulación más cercana al hebreo.
  revised_spanish_text: Mejor es un hombre pobre que vive y está bien, que un hombre rico afligido en su carne[a].
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «Mejor es un pobre, sano y fuerte en su constitución, que un rico azotado en su cuerpo». El testimonio hebreo es más breve y dice literalmente «vivo en sí mismo» y «herido en su carne».'
    reason: alternative_reading
  revision_rationale: La revisión devuelve el texto principal al anclaje hebreo documentado, pero conserva la solución idiomática del POB inglés para בעצמו mediante «vive y está bien». También restaura la concreción de «carne» para בבשרו y traslada al pie de página los detalles expansivos del griego («fuerte», «azotado en su cuerpo»).
