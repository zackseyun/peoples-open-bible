    rationale: La nota [a] debería anclarse a «hijos del aceite», no a «Y dijo»; la nota [b] debería anclarse a la frase «están junto al Señor…», no a «aceite». Tal como está, el lector recibe explicaciones sobre palabras distintas de las marcadas.
  - severity: medium
