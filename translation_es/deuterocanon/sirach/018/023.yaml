translation:
  language: es
  text: Antes de orar[a], prepárate, y no seas como un hombre que pone a prueba al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tentar al Señor». El verbo griego puede significar tanto «probar» como «tentar», pero aquí probablemente se refiere a someter al Señor a prueba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes que
  - Previo a
  lexicon: LSJ
  rationale: Marca prioridad temporal de forma natural en español y conserva la relación de anterioridad exigida por el griego.
- source_word: εὔξασθαι
  english_pob_choice: you pray
  chosen_spanish: orar
  alternatives_spanish:
  - practicar la oración
  - dirigir una oración
  lexicon: BDAG
  rationale: En este contexto sapiencial, el sentido más natural y reverente es la oración dirigida a Dios; 'orar' evita una perífrasis artificial y mantiene el valor devocional del infinitivo.
- source_word: ἑτοίμασον
  english_pob_choice: prepare
  chosen_spanish: prepárate
  alternatives_spanish:
  - ponte listo
  - dispónte
  lexicon: LSJ
  rationale: El imperativo pide una disposición consciente y personal; el reflexivo español expresa bien la acción sobre uno mismo.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  - a ti
  lexicon: LSJ
  rationale: El objeto reflexivo está ya incorporado en 'prepárate'; no hace falta duplicarlo en la línea principal.
- source_word: μὴ γίνου
  english_pob_choice: do not be
  chosen_spanish: no seas
  alternatives_spanish:
  - no te hagas
  - no llegues a ser
  lexicon: BDAG
  rationale: Aunque γίνομαι puede sugerir 'llegar a ser', en español 'no seas' comunica con naturalidad la prohibición de asumir esa postura sin forzar la sintaxis.
- source_word: ὡς ἄνθρωπος
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como una persona
  - como alguien
  lexicon: LSJ
  rationale: Se conserva el singular masculino del griego, siguiendo la preferencia del proyecto por reflejar el género gramatical cuando el texto fuente lo usa y el sentido sigue siendo comprensible en contexto sapiencial.
- source_word: πειράζων
  english_pob_choice: testing
  chosen_spanish: que pone a prueba
  alternatives_spanish:
  - que tienta
  - que prueba
  lexicon: BDAG
  rationale: Con 'al Señor' como objeto, el valor más adecuado es el de poner a prueba, evitando la lectura de incitación al mal que suele asociarse con 'tentar'.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  lexicon: BDAG
  rationale: Se mantiene el tratamiento habitual de κύριος como 'Señor', aquí referido a Dios dentro del marco judío sapiencial.
theological_decisions:
- issue: Sentido de πειράζων τὸν κύριον
  english_pob_reading: testing the Lord
  chosen_spanish_reading: poner a prueba al Señor
  alternative_spanish_readings:
  - tentar al Señor
  rationale: La combinación con 'Señor' favorece en español la idea de poner a prueba, preservando la advertencia bíblica sin suavizarla ni confundirla con la tentación al mal.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; κύριος se traduce ''Señor'' cuando el contexto apunta a Dios.'
- issue: Valor de μὴ γίνου
  english_pob_reading: do not be
  chosen_spanish_reading: no seas
  alternative_spanish_readings:
  - no te conviertas en
  rationale: La versión española busca naturalidad sin perder la fuerza prohibitiva del griego; 'no seas' expresa el estado/postura que se prohíbe, mientras que 'no te conviertas en' suena más pesado y menos idiomático.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima con respeto a la fuerza verbal.'
translation_notes:
  revision_awareness: Se tomó como base el texto griego de Swete 1909 y el rastro de auditoría en inglés. La redacción española sigue la revisión inglesa más natural ('do not be') sin perder la fuerza de γίνομαι, y conserva la alternativa lexical documentada para πειράζω en una nota breve.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto para el nombre divino, pero aquí el griego κύριος en un contexto sapiencial judío se traduce 'Señor' conforme al expediente auditado y a la fórmula establecida para esta clase de pasajes.
  - Se mantiene un español moderno y digno, evitando calcos como 'antes de que ores' o 'hazte listo' por no ser necesarias para la fidelidad del texto.
  - La nota al pie conserva la tensión semántica entre 'probar' y 'tentar' sin resolverla unilateralmente.
