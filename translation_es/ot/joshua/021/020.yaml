- from: Y para las familias de los hijos de Coat[a], los levitas que habían quedado de los hijos de Coat, las ciudades de su suerte fueron de la tribu de Efraín.
  to: Y para las familias de los hijos de Coat[a], los levitas que quedaban de los hijos de Coat, las ciudades que les tocaron por sorteo fueron de la tribu de Efraín.
  rationale: Se revisa principalmente עָרֵי גוֹרָלָם para evitar un calco poco natural en español («las ciudades de su suerte») y expresar con claridad el sentido de asignación por lote/sorteo. Se mantiene una nota con una alternativa más cercana a la forma hebrea («de su lote»). También se ajusta הַנּוֹתָרִים a «que quedaban», que reproduce mejor el participio sin añadir una anterioridad innecesaria. El resto del verso se conserva por ser fiel y natural.
