translation:
  language: es
  text: ¡Ay de los de corazón cobarde y de las manos flojas, y del pecador de caminos torcidos[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «del impío/pecador de caminos torcidos» o «de sendas torcidas»; el paralelo griego dice «el pecador que anda por dos caminos», probablemente con la idea de conducta dividida o doble.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹי / οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay del que...!
  lexicon: HALOT; LXX οὐαί
  rationale: En español, «¡Ay de!» conserva bien el valor de lamento y amenaza profética/wisdom, sin volverlo demasiado litúrgico ni suavizarlo a simple exclamación.
- source_word: לְרַכֵּי לֵב / καρδίαις δειλαῖς
  english_pob_choice: to the faint of heart
  chosen_spanish: de los de corazón cobarde
  alternatives_spanish:
  - de los de corazón débil
  - de los de corazón tímido
  - de los de corazón flojo
  lexicon: HALOT; δειλαῖς
  rationale: «Corazón cobarde» mantiene la fuerza moral negativa del hebreo y del griego (timidez/temor), y resulta más directo en español que «faint of heart», que sonaría menos natural.
- source_word: וּרְפֵה יָדָיִם / χερσὶν παρειμέναις
  english_pob_choice: and the slack hands
  chosen_spanish: de las manos flojas
  alternatives_spanish:
  - de las manos débiles
  - de las manos caídas
  - de las manos sin vigor
  lexicon: HALOT; παρειμέναις
  rationale: «Manos flojas» preserva la imagen concreta de manos aflojadas o debilitadas y funciona bien junto a «corazón cobarde» como paralelismo.
- source_word: וְלָרָשָׁע / ἁμαρτωλῷ
  english_pob_choice: and to the sinner
  chosen_spanish: y del pecador
  alternatives_spanish:
  - y del impío
  - y del malvado
  - y del culpable
  lexicon: HALOT; ἁμαρτωλῷ
  rationale: La lectura griega apoya «pecador», y en español evita sobrecargar el término con una condena genérica que podría ir más allá del contraste del verso.
- source_word: עִקֵּשׁ דְּרָכַיִם / ἐπιβαίνοντι ἐπὶ δύο τρίβους
  english_pob_choice: of crooked ways
  chosen_spanish: de caminos torcidos
  alternatives_spanish:
  - de sendas torcidas
  - de vías torcidas
  - que anda por dos caminos
  lexicon: HALOT; τρίβους
  rationale: Se mantiene la imagen hebrea de caminos torcidos, porque el texto hebreo es la forma transmitida principal y la revisión más reciente prefirió ajustar hacia ese sentido. En español, «caminos torcidos» es claro y fiel sin forzar el asunto de «dos caminos» como lectura principal.
theological_decisions:
- issue: Relación entre el hebreo transmitido y el paralelo griego al final del verso
  english_pob_reading: The English POB had used the Greek-parallel sense in the main text and retained the Hebrew-based alternative in a footnote; a later revision shifted the main text back toward the Hebrew's 'crooked ways'.
  chosen_spanish_reading: Mantener en el texto principal «caminos torcidos» y dejar constancia de la posible lectura griega de «dos caminos» en nota.
  alternative_spanish_readings:
  - el pecador que anda por dos caminos
  - el pecador de sendas torcidas
  - el malvado de caminos torcidos
  rationale: La revisión más reciente del audit trail prioriza el hebreo transmitido, mientras que el griego sirve como apoyo interpretativo. Por eso el texto principal español sigue la imagen hebrea, pero la nota preserva la variante griega para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using Greek parallel as actual input; preserve ambiguity rather than over-resolve.'
translation_notes:
  revision_awareness: El audit trail muestra una ida y vuelta entre la lectura del hebreo («caminos torcidos») y la clarificación del paralelo griego («dos caminos»). La revisión más reciente favorece el hebreo transmitido, así que el texto principal sigue esa decisión y la nota conserva la alternativa griega sin eliminar la tensión textual.
  spanish_consistency_notes:
  - «Ay de» conserva el registro de advertencia sapiencial/profética.
  - Se eligieron sustantivos concretos («corazón», «manos», «caminos») para reflejar el paralelismo del verso.
  - «Pecador» sigue la lectura griega sin sustituirla por «malvado» como término más interpretativo.
  - Se evitó «Señor» o lenguaje litúrgico ajeno al verso; no hay nombre divino en este pasaje.
