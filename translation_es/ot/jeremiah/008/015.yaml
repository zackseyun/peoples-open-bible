translation:
  language: es
  text: Esperábamos paz[a], pero no vino nada bueno[b]; esperábamos un tiempo de curación, pero he aquí terror[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Paz» traduce שָׁלוֹם, que también puede abarcar bienestar o plenitud, no solo ausencia de conflicto.
    reason: lexical_alternative
  - marker: b
    text: O «no hubo bien». La expresión hebrea también puede comunicarse como ausencia de algo bueno o beneficioso.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «espanto» o «pavor».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַוֵּה
  english_pob_choice: We hoped
  chosen_spanish: Esperábamos
  alternatives_spanish:
  - Esperamos
  - Estábamos esperando
  - Teníamos esperanza
  lexicon: HALOT
  rationale: La forma hebrea admite la idea de esperar, aguardar o esperar con esperanza. En español, «Esperábamos» conserva la lectura comunitaria y el matiz de expectativa lamentosa que el contexto exige, sin volverlo una orden o un deseo aislado.
- source_word: לְשָׁלוֹם
  english_pob_choice: for peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - shalom
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más natural y fiel aquí. Mantiene la fuerza profética del contraste con el desastre posterior, aunque el trasfondo de שָׁלוֹם incluye bienestar y plenitud.
- source_word: וְאֵין טוֹב
  english_pob_choice: but there was no good
  chosen_spanish: pero no había bien
  alternatives_spanish:
  - y no había bien
  - pero no vino nada bueno
  - pero no hubo bien
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y no hay bien». En español, «pero no había bien» comunica la negación de forma fluida en un lamento retrospectivo y conserva la dureza del contraste sin suavizarla.
- source_word: לְעֵת מַרְפֵּה
  english_pob_choice: for a time of healing
  chosen_spanish: tiempo de sanidad
  alternatives_spanish:
  - tiempo de curación
  - tiempo de alivio
  - tiempo de recuperación
  lexicon: HALOT
  rationale: מַרְפֵּה puede abarcar sanidad, remedio o restauración. «Sanidad» mantiene esa amplitud y suena natural en registro bíblico español; omitir el artículo con «tiempo de» reproduce bien la estructura nominal del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: but behold
  chosen_spanish: pero he aquí
  alternatives_spanish:
  - y he aquí
  - pero mirad
  - y he aquí, sin embargo
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza deíctica y el giro brusco de sorpresa. Se añade «pero» para reflejar el movimiento adversativo ya presente en la secuencia del versículo, en línea con la audacia retórica del hebreo.
- source_word: בְעָתָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - espanto
  - pánico
  - dismay
  lexicon: HALOT
  rationale: El sustantivo expresa terror súbito, espanto o pavor. «Terror» es breve, intenso y corresponde bien al impacto final del verso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del texto hebreo y la auditoría inglesa, manteniendo las dos parejas paralelas del versículo y la reversión abrupta al final. Se conserva la tensión léxica de שָׁלוֹם, טוֹב, מַרְפֵּה y בְעָתָה sin resolverla por paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «paz» para שָׁלוֹם y se anota su posible amplitud semántica.
  - Se usa «sanidad» para מַרְפֵּה por su adecuación bíblica y su amplitud entre curación y restauración.
  - Se conserva la cadencia lamentosa con pasado imperfecto en la primera cláusula y negación fuerte en la segunda.
  - La puntuación busca reflejar el paralelismo hebreo con una pausa marcada antes del golpe final.
