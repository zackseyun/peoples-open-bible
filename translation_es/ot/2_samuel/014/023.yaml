translation:
  language: es
  text: Así que Joab se levantó y fue a Gesur[a], y trajo a Absalón a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trajo de vuelta a Absalón a Jerusalén». El contexto sugiere el regreso desde el exilio, aunque la idea de «de vuelta» no está expresada de manera explícita por el verbo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּ֥קָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: El hebreo marca la transición narrativa de Joab a la acción. En español, «se levantó» comunica el gesto básico de ponerse de pie para actuar sin sonar forzado ni demasiado arcaico; conserva bien el avance secuencial del wayyiqtol.
- source_word: וַיֵּ֣לֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  lexicon: HALOT
  rationale: El verbo הלך en narrativa simple expresa movimiento sin añadir matices. «Fue» es la equivalencia española más directa y natural.
- source_word: גְּשׁ֑וּרָ/ה
  english_pob_choice: to Geshur
  chosen_spanish: a Gesur
  alternatives_spanish:
  - hacia Gesur
  lexicon: HALOT
  rationale: El texto hebreo indica dirección hacia Guesur/Gesur. «A Gesur» reproduce esa relación de destino de forma natural en español. Se prefiere «Gesur» como forma castellanizada breve y clara.
- source_word: וַיָּבֵ֥א
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - lo llevó
  - lo hizo venir
  lexicon: HALOT
  rationale: ביא en hifil significa «hacer venir, traer». «Trajo» es la opción más directa y no añade explícitamente la idea de retorno, que el hebreo no expresa con el verbo mismo.
- source_word: אַבְשָׁל֖וֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio, ampliamente reconocible y fiel a la identidad del personaje.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - a la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo no marca una preposición separada antes del topónimo, el castellano requiere expresar el destino con «a». «Jerusalén» es la forma establecida en español.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: La waw consecutiva enlaza las acciones en secuencia. «Así que» da un flujo narrativo natural en español y conserva la continuidad del relato sin sobrerrepresentar la conjunción como causal.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la auditoría inglesa: no se introduce «de vuelta» en el texto principal porque el hebreo no lo dice explícitamente, aunque el contexto narrativo sí apunta a un regreso desde el destierro.'
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio en forma española estándar: Joab, Absalón, Gesur, Jerusalén.'
  - La secuencia verbal conserva el tono narrativo breve del hebreo sin añadir explicaciones interpretativas al cuerpo principal.
  - La nota al pie preserva la tensión léxica documentada entre «trajo» y «trajo de vuelta».
