base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/002/007.yaml
  text: And the coastland shall belong to the remnant of the house of Judah[a]; on it they shall pasture. In the houses of Ashkelon they shall lie down in the evening[b], for Yahweh their God will attend to them and restore their fortunes.
  footnotes:
  - marker: a
    text: Or 'will visit them' / 'will care for them.' The Hebrew verb can denote attentive intervention, whether for blessing or judgment; here the context favors gracious restoration.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring back their captives.' The Hebrew idiom often means to restore a people's former condition or fortunes.
    reason: alternative_reading
