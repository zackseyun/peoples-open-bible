  category: mistranslation
  tier: 2
  from: whoever hopes in you will not be sparing in giving.
  to: whoever hopes in you will not be treated sparingly in a gift.
  rationale: The draft makes the person hoping in God the subject of the active giving ('will not be sparing in giving'). However, the context (vv. 13–15) is about the poor and needy hoping in God because God's giving is abundant, in contrast to man's sparing kindness. The hoper is the recipient, not the giver. The verb φείσεται (future middle) should either be read as passive ('will not be treated sparingly') with the hoper as the subject, or as active with God as the subject ('He will not be sparing'). Making the needy hoper the generous giver destroys the author's contrast.
