  text: אָכְל֬וּ וַ/יִּֽשְׁתַּחֲוּ֨וּ כָּֽל דִּשְׁנֵי אֶ֗רֶץ לְ/פָנָ֣י/ו יִ֭כְרְעוּ כָּל יוֹרְדֵ֣י עָפָ֑ר וְ֝/נַפְשׁ֗/וֹ לֹ֣א חִיָּֽה׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/022/030.yaml
  text: All the prosperous of the earth will eat and bow down[c][b][a]; before him all who go down to the dust will kneel—even he who could not keep himself alive.
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the fat ones of the earth.' The phrase likely means the prosperous or well-fed.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who descend to the dust.' 'Dust' is a Hebrew image for mortality and death.
    reason: lexical_alternative
  - marker: c
    text: 'The final Hebrew clause is difficult: literally, ''and his life/soul he did not keep alive,'' often understood as ''even the one who could not keep himself alive.'''
    reason: alternative_reading
