translation:
  language: es
  text: Dios nuestro, ¿no los juzgarás? Porque no hay en nosotros fuerza delante de esta gran multitud que viene contra nosotros. No sabemos qué hacer, pero nuestros ojos están puestos en ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más formalmente: «porque nuestros ojos están puestos en ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵינוּ
  english_pob_choice: Our God
  chosen_spanish: Dios nuestro
  alternatives_spanish:
  - Oh Dios nuestro
  - nuestro Dios
  lexicon: HALOT
  rationale: Es una vocación directa en oración. En español, «Dios nuestro» suena natural y reverente, y conserva el vínculo de pertenencia sin añadir una interjección no exigida por el hebreo.
- source_word: הֲלֹא תִשְׁפָּט בָּם
  english_pob_choice: will you not judge them?
  chosen_spanish: ¿no juzgarás a estos?
  alternatives_spanish:
  - ¿no ejecutarás juicio contra ellos?
  - ¿no los juzgarás?
  lexicon: HALOT
  rationale: שׁפט aquí expresa una acción judicial de Dios contra enemigos. «Juzgarás» mantiene el verbo central sin sobrecargar el texto; «a estos» traduce el referente inmediato con un demostrativo natural en español y evita la repetición excesiva de pronombre.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base de la súplica. «Porque» conserva la relación causal explicativa de manera clara en español.
- source_word: אֵין בָּנוּ כֹּחַ
  english_pob_choice: we have no power
  chosen_spanish: no hay en nosotros fuerza
  alternatives_spanish:
  - no tenemos fuerza
  - no hay poder en nosotros
  lexicon: HALOT
  rationale: כֹּחַ puede ser fuerza, poder o capacidad. «No hay en nosotros fuerza» reproduce la estructura hebrea con buena naturalidad y conserva el matiz de insuficiencia real ante la crisis.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» mantiene la imagen espacial del hebreo y funciona bien con el cuadro militar sin convertir la frase en una interpretación más libre.
- source_word: הֶהָמוֹן הָרָב הַזֶּה
  english_pob_choice: this great multitude
  chosen_spanish: esta gran multitud
  alternatives_spanish:
  - este gran ejército
  - esta inmensa multitud
  lexicon: HALOT
  rationale: הָמוֹן designa una multitud numerosa; «multitud» preserva el término sin especificar más de lo que el hebreo dice. «Gran» traduce הָרָב con sencillez y claridad.
- source_word: הַבָּא עָלֵינוּ
  english_pob_choice: that is coming against us
  chosen_spanish: que viene contra nosotros
  alternatives_spanish:
  - que viene sobre nosotros
  - que avanza contra nosotros
  lexicon: HALOT
  rationale: La preposición עַל aquí tiene valor hostil. «Contra nosotros» expresa bien la amenaza y es idiomático en español.
- source_word: וַאֲנַחְנוּ לֹא נֵדַע מַה נַּעֲשֶׂה
  english_pob_choice: We do not know what to do
  chosen_spanish: No sabemos qué hacer
  alternatives_spanish:
  - Y no sabemos qué hemos de hacer
  - No sabemos qué debemos hacer
  lexicon: HALOT
  rationale: Es una confesión breve de impotencia. La forma concisa en español conserva la urgencia y la sencillez del hebreo.
- source_word: כִּי עָלֶיךָ עֵינֵינוּ
  english_pob_choice: but our eyes are on you
  chosen_spanish: pero nuestros ojos están puestos en ti[a]
  alternatives_spanish:
  - porque nuestros ojos están sobre ti
  - pues nuestros ojos están sobre ti
  lexicon: HALOT
  rationale: El hebreo dice literalmente que los ojos están «sobre ti / hacia ti», un idiomatismo de dependencia y expectativa. Se eligió una formulación española natural que conserva la metáfora. Se mantiene la fuerza de contraste del contexto con «pero», como hace la POB en inglés.
theological_decisions:
- issue: Valor final de כִּי y su relación con la confesión previa de incapacidad
  english_pob_reading: 'Translate idiomatically as a contrast: ''but our eyes are on you'''
  chosen_spanish_reading: «pero nuestros ojos están puestos en ti»
  alternative_spanish_readings:
  - «porque nuestros ojos están puestos en ti»
  - «pues nuestros ojos están sobre ti»
  rationale: Aunque כִּי suele ser causal, aquí el movimiento retórico culmina en dependencia confiada después de la confesión de incapacidad. El «pero» explicita el contraste implícito sin negar el valor idiomático de la cláusula final ni su contenido teológico de भरो? dependencia expectante.
  doctrine_reference: Translation philosophy §6; §3
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin revisiones aplicadas; el texto español sigue la lectura estable de la POB con un ajuste idiomático equivalente en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en oración directa.
  - Se traduce הָמוֹן como «multitud», evitando sobreespecificar «ejército».
  - Se conserva la tensión entre causalidad de כִּי y el contraste retórico final mediante una nota de alternativa más formal.
  - El registro es reverente y moderno, sin arcaísmos innecesarios.
