translation:
  language: es
  text: Entonces Menahem atacó a Tiphsah[a], y a todos los que estaban en ella, y su territorio desde Tirzah, porque no le había abierto; y les abrió el vientre a[c] todas sus mujeres embarazadas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que había en ella». La frase hebrea puede leerse de manera amplia, aunque en este contexto probablemente incluye a los habitantes de la ciudad.
    reason: alternative_reading
  - marker: b
    text: «Abrir» se refiere a abrir la ciudad a Menahem; es decir, negarse a rendirse o a admitirlo.
    reason: cultural_note
  - marker: c
    text: O «rasgó» o «abrió de un tajo». El verbo hebreo indica una apertura violenta por la fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la sucesión narrativa inmediata. «Entonces» conserva el valor temporal sin sonar forzado en español.
- source_word: יַכֶּה / וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - atacó
  - apaleó
  lexicon: HALOT
  rationale: El verbo נכה puede abarcar golpear o atacar. «Golpeó» mantiene la violencia concreta del hebreo y funciona bien en la narración española; se repite de modo coherente para ambas formas verbales.
- source_word: תִּפְסַח
  english_pob_choice: Tiphsah
  chosen_spanish: Tiphsah
  alternatives_spanish:
  - Tifsa
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera para conservar la forma histórica del topónimo.
- source_word: כָּל אֲשֶׁר בָּהּ
  english_pob_choice: all who were in it
  chosen_spanish: todos los que estaban en ella
  alternatives_spanish:
  - todo lo que había en ella
  - todo lo que estaba en ella
  lexicon: HALOT
  rationale: La frase hebrea puede leerse ampliamente, pero en este contexto de saqueo y violencia la referencia natural son las personas dentro de la ciudad. «Los que estaban en ella» preserva esa lectura sin excluir la amplitud posible.
- source_word: גְּבוּלֶיהָ
  english_pob_choice: its territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - sus confines
  - su frontera
  lexicon: HALOT
  rationale: גְּבוּל puede significar borde, límite o territorio. Aquí, con la mención de Tirzah, la idea es el ámbito territorial asociado a la ciudad, no solo una línea fronteriza.
- source_word: מִתִּרְצָה
  english_pob_choice: from Tirzah
  chosen_spanish: desde Tirzah
  alternatives_spanish:
  - de Tirzah
  lexicon: HALOT
  rationale: La preposición מִן permite un punto de partida. «Desde Tirzah» conserva mejor el matiz de procedencia o arranque espacial que «de».
- source_word: כִּי לֹא פָתַח
  english_pob_choice: because it had not opened to him
  chosen_spanish: porque no le había abierto
  alternatives_spanish:
  - porque no se había abierto a él
  - porque no le abrió
  lexicon: HALOT
  rationale: En este contexto, «abrir» alude a abrir las puertas de la ciudad, es decir, rendirse o admitir al atacante. El español puede omitir «la ciudad» por estar implícita, manteniendo la concisión del hebreo.
- source_word: הֶהָרוֹתֶיהָ
  english_pob_choice: its pregnant women
  chosen_spanish: sus mujeres embarazadas
  alternatives_spanish:
  - las mujeres embarazadas de ella
  - las embarazadas de la ciudad
  lexicon: HALOT
  rationale: El hebreo designa a las mujeres como embarazadas. «Mujeres embarazadas» es natural en español y preserva la referencia explícita al estado de embarazo.
- source_word: בִּקֵּעַ
  english_pob_choice: ripping open
  chosen_spanish: abriendo con violencia el vientre
  alternatives_spanish:
  - rasgando
  - abriendo de un tajo
  - rajando
  lexicon: HALOT
  rationale: בקע expresa una apertura violenta. En español, «abriendo con violencia» comunica el acto brutal sin añadir más de lo que el hebreo exige; «vientre» explicita el objeto implícito en el contexto de las mujeres embarazadas.
theological_decisions:
- issue: 'Violencia extrema contra mujeres embarazadas: cómo decirlo sin suavizarlo ni añadir más allá del hebreo'
  english_pob_reading: ripping open all its pregnant women
  chosen_spanish_reading: abriendo con violencia el vientre de todas sus mujeres embarazadas
  alternative_spanish_readings:
  - rasgando el vientre de todas sus mujeres embarazadas
  - abriéndolas con violencia
  rationale: El texto hebreo describe una violencia extrema y no debe atenuarse. La formulación elegida conserva la crudeza del hecho, pero evita una recreación más gráfica de la necesaria para la fidelidad textual.
  doctrine_reference: Principio de fidelidad textual y de no eufemizar el contenido narrativo
- issue: Sujeto implícito y referencia colectiva de la ciudad
  english_pob_reading: because it had not opened to him
  chosen_spanish_reading: porque no le había abierto
  alternative_spanish_readings:
  - porque ella no le había abierto
  - porque no se había abierto a él
  rationale: El hebreo trata a la ciudad como sujeto colectivo singular. En español, la forma impersonal/implícita mantiene esa referencia y evita forzar una personificación innecesaria.
  doctrine_reference: Lectura gramatical y contextual del sujeto colectivo
- issue: Sentido de גְּבוּלֶיהָ como extensión territorial
  english_pob_reading: its territory
  chosen_spanish_reading: su territorio
  alternative_spanish_readings:
  - sus límites
  - su frontera
  rationale: La expresión no se reduce a una línea divisoria; en contexto militar y geográfico, designa el ámbito territorial afectado por la incursión.
  doctrine_reference: Semántica contextual del término territorial
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del auditor inglés y no requiere revisión adicional según el registro más reciente; se han conservado las decisiones principales y las pequeñas tensiones semánticas del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Tiphsah» como transliteración del topónimo, coherente con el tratamiento de nombres propios.
  - Se conserva la repetición del verbo de violencia con un equivalente consistente («golpeó» / «la golpeó») para reflejar la estructura hebrea.
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - La frase final evita suavizar la violencia y a la vez no añade elementos inexistentes en el hebreo.
  - Las notas se anclan en el texto con marcadores únicos y en el mismo orden en que aparecen.
