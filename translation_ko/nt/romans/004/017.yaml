  - 열방
  lexicon: BDAG
  rationale: 창 17:5 인용 문맥에서는 「이방인」보다 「민족」이 더 적합하다.
- source_word: ζῳοποιοῦντος τοὺς νεκρούς
  english_pob_choice: gives life to the dead
  chosen_korean: 죽은 자들에게 생명을 주시며
  alternatives_korean:
  - 죽은 자들을 살리시며
  lexicon: BDAG
  rationale: 동사의 강도를 「생명을 주시다」로 옮긴다.
- source_word: καλοῦντος τὰ μὴ ὄντα ὡς ὄντα
  english_pob_choice: calls the things that are not as though they were
  chosen_korean: 없는 것들을 있는 것 같이 부르시는
  alternatives_korean:
  - 존재하지 않는 것들을 존재하는 것처럼 부르시는
  - 무에서 유를 부르시는
  lexicon: BDAG
  rationale: 창조 능력의 함의를 직역으로 보존한다.
