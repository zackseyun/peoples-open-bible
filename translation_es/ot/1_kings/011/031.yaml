  yaml_path: translation/ot/1_kings/011/031.yaml
  text: 'And he said to Jeroboam[a], “Take for yourself ten pieces, for thus says Yahweh, the God of Israel: ‘Behold, I am tearing the kingdom out of the hand of Solomon, and I will give you ten tribes.’”'
  footnotes:
