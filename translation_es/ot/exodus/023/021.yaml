  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparece Yahvé en el texto del versículo salvo en la explicación teológica. Se preserva «transgresión» para פשע y no se resuelve indebidamente la identidad del mensajero. La revisión propuesta mantiene la decisión inglesa de no sobreinterpretar שְׁמִי בְּקִרְבּוֹ.
