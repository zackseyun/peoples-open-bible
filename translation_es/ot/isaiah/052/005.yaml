revisions:
- from: Y ahora[a], ¿qué tengo yo aquí? —declara Yahvé—. Porque mi pueblo ha sido llevado por nada; los que gobiernan sobre ellos[a] se lamentan —declara Yahvé—, y continuamente, todo el día[b], mi nombre es despreciado.
  to: Y ahora, ¿qué tengo yo aquí? —declara Yahvé—. Porque mi pueblo ha sido llevado por nada; los que gobiernan sobre ellos[a] gimen —declara Yahvé—, y continuamente, todo el día[b], mi nombre es despreciado.
  rationale: Se corrigió el anclaje de la nota [a] para que aparezca en la frase pertinente y se reemplazó «se lamentan» por «gimen» para reflejar mejor la fuerza de יְהֵילִילוּ sin sobreinterpretar con «aúllan». Se mantuvo el resto, que ya preservaba bien el sentido fuente y la terminología del proyecto.
