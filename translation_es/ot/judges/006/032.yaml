translation:
  language: es
  text: 'Así que aquel día lo llamó Jerubaal[a], diciendo: «Que Baal contienda contra él[b], porque derribó su altar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Jerubaal suena como un nombre relacionado con el verbo hebreo «contender»; la explicación es: «Que Baal contienda contra él».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Que Baal litigue contra él». El verbo hebreo también puede entenderse como un deseo jussivo: «Que Baal contienda contra él»; algunos lo toman como indicativo: «Baal contenderá contra él».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא לוֹ
  english_pob_choice: he called him
  chosen_spanish: lo llamó
  alternatives_spanish:
  - lo nombró
  - lo llamó por nombre
  lexicon: HALOT
  rationale: קרא con ל + sufijo puede expresar llamar o nombrar. «Lo llamó» conserva el movimiento narrativo breve del hebreo y funciona bien antes del nombre propio.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese mismo día
  lexicon: HALOT
  rationale: El hebreo usa una expresión temporal definida; «aquel día» es natural en español y mantiene la referencia específica al momento narrado.
- source_word: יְרֻבַּעַל
  english_pob_choice: Jerubbaal
  chosen_spanish: Jerubaal
  alternatives_spanish:
  - Yerubaal
  - Jerub-baal
  lexicon: N/A (transliteración de nombre propio)
  rationale: Se conserva el nombre propio con transliteración estándar del proyecto. La forma castellana evita una transliteración excesivamente técnica y mantiene el juego verbal con ריב explicado en la nota.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Introducción quotativa normal. «Diciendo» mantiene el enlace inmediato con la explicación del nombre sin añadir contenido.
- source_word: יָרֶב בּוֹ הַבַּעַל
  english_pob_choice: Let Baal contend against him
  chosen_spanish: Que Baal litigue contra él
  alternatives_spanish:
  - Que Baal contienda contra él
  - Que Baal pleitee contra él
  - Que Baal dispute con él
  lexicon: HALOT
  rationale: ריב tiene el sentido de contender, disputar o pleitear. «Litigue» preserva el matiz forense y adversarial del verbo, aunque «contienda» es una alternativa más directa; se eligió una forma que conserva el eco de una disputa formal y el juego etimológico con Jerubaal.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la denominación. «Porque» es la equivalencia causal más clara y natural en español.
- source_word: נָתַץ
  english_pob_choice: he tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - derrumbó
  - destruyó
  - demolió
  lexicon: HALOT
  rationale: נתץ se usa para derribar o desmantelar una estructura. «Derribó» es breve, natural y adecuado para un altar; evita sobrecargar con un verbo demasiado técnico.
- source_word: אֶת מִזְבְּחוֹ
  english_pob_choice: his altar
  chosen_spanish: su altar
  alternatives_spanish:
  - el altar de él
  - el altar de Baal
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se traduce con «su», conservando la referencia inmediata del hebreo. En el contexto, el antecedente más probable es Baal, pero el español permite mantener la ambigüedad del original sin resolverla de forma interpretativa.
theological_decisions:
- issue: Nombre del dios cananeo בעל en contexto polémico
  english_pob_reading: Baal
  chosen_spanish_reading: Baal
  alternative_spanish_readings:
  - el señor
  - el ídolo Baal
  rationale: Aquí בעל es el nombre propio del dios cananeo, no un sustantivo común. Mantener «Baal» preserva la polémica del pasaje y evita confundirlo con un título genérico.
  doctrine_reference: Idolatría y exclusividad de Yahvé en Jueces 6
- issue: Valor modal del verbo יָרֶב
  english_pob_reading: Let Baal contend against him
  chosen_spanish_reading: Que Baal litigue contra él
  alternative_spanish_readings:
  - Que Baal contienda contra él
  - Baal contenderá contra él
  rationale: El hebreo puede leerse como deseo/jussivo o como afirmación. La traducción principal mantiene el sentido volitivo e irónico del apodo, sin cerrar por completo la tensión modal del original.
  doctrine_reference: Lectura aspectual/modal del hebreo bíblico
translation_notes:
  revision_awareness: 'Se verificó el pasaje contra el hebreo consonántico y la auditoría inglesa: se conservó el nombre propio, el juego verbal con ריב y la explicación causal del apodo sin añadir información ajena al texto. No hubo revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se usó «Baal» como nombre propio, no como sustantivo común.
  - Se prefirió un español sobrio y bíblico, pero no arcaizante.
  - El pronombre posesivo «su» mantiene la ambigüedad del hebreo en «su altar».
  - La puntuación y las comillas siguen el uso editorial estándar en español.
