id: 1SA.2.31
reference: 1 Samuel 2:31
source:
  edition: WLC
  text: הִנֵּה֙ יָמִ֣ים בָּאִ֔ים וְ/גָֽדַעְתִּי֙ אֶת זְרֹ֣עֲ/ךָ֔ וְ/אֶת זְרֹ֖עַ בֵּ֣ית אָבִ֑י/ךָ מִֽ/הְי֥וֹת זָקֵ֖ן בְּ/בֵיתֶֽ/ךָ־־׃
translation:
  text: Look[a], days are coming when I will cut off your strength and the strength of your father's house, so that there will not be an old man in your house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'your arm ... the arm of your father's house.' Here 'arm' is a Hebrew metaphor for strength or power.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces a solemn prophetic announcement. 'Look' preserves the deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are about to come
  lexicon: HALOT
  rationale: A standard Hebrew prophetic formula announcing impending judgment. 'Days are coming' is natural English and preserves the forward-looking force.
- source_word: גָּדַעְתִּי
  chosen: I will cut off
  alternatives:
  - I will cut down
  - I will sever
  lexicon: HALOT
  rationale: The verb denotes cutting down or off. In this judgment context, 'cut off' best conveys decisive removal and matches the idiomatic sense of ending power or lineage.
- source_word: זְרֹעֲךָ
  chosen: your strength
  alternatives:
  - your arm
  lexicon: HALOT
  rationale: Although literally 'your arm,' in this context the arm is a metaphor for power or strength. Rendering it as 'strength' communicates the intended sense in contemporary English while preserving the judgment against Eli's power.
- source_word: זְרֹעַ בֵּית אָבִיךָ
  chosen: the strength of your father's house
  alternatives:
  - the arm of your father's house
  lexicon: HALOT
  rationale: Parallel to 'your strength,' this refers metaphorically to the power and continuance of Eli's ancestral line. 'Strength' keeps the metaphor's meaning clear in English.
- source_word: בֵּית אָבִיךָ
  chosen: your father's house
  alternatives:
  - your ancestral house
  - your father's family
  lexicon: HALOT
  rationale: A standard kinship expression for the broader family line or household. 'Your father's house' is both accurate and idiomatic enough in English.
- source_word: מֵהְיוֹת זָקֵן בְּבֵיתֶךָ
  chosen: so that there will not be an old man in your house
  alternatives:
  - from there being an old man in your house
  - with no old man remaining in your house
  lexicon: HALOT
  rationale: 'The infinitive construction expresses result: the cutting off of strength will mean the family line will not reach old age. This rendering makes the result explicit and natural in English.'
- source_word: זָקֵן
  chosen: old man
  alternatives:
  - elder
  - aged man
  lexicon: HALOT
  rationale: Here the term refers to advanced age, not an office. 'Old man' best fits the context of shortened lifespan within the household.
