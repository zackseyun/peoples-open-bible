id: 1TI.3.16
reference: 1 Timothy 3:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'καὶ ὁμολογουμένως μέγα ἐστὶν τὸ τῆς εὐσεβείας μυστήριον· ⸀Ὃς ἐφανερώθη ἐν σαρκί, ἐδικαιώθη ἐν πνεύματι, ὤφθη ἀγγέλοις, ἐκηρύχθη ἐν ἔθνεσιν, ἐπιστεύθη ἐν κόσμῳ, ἀνελήμφθη ἐν δόξῃ.'
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/016.yaml
  text: "And undeniably[a], great is the mystery of godliness:\nHe was revealed in flesh,\nwas vindicated in spirit,\nwas seen by angels,\nwas proclaimed among the nations,\nwas believed on in the world[d][c][b],\nwas taken up in glory."
  footnotes:
  - marker: a
    text: Some manuscripts read 'God was revealed in flesh' instead of 'He was revealed in flesh.' The critical Greek text reads 'who/he,' which is reflected here.
    reason: textual_variant
  - marker: b
    text: Or 'was vindicated by the Spirit' or 'was vindicated in the Spirit.' The Greek phrase is concise and may refer either to the Holy Spirit's agency or to the sphere of spiritual life.
    reason: alternative_reading
  - marker: c
    text: Or 'was proclaimed among the Gentiles.'
    reason: lexical_alternative
  - marker: d
    text: Or 'was taken up into glory.'
    reason: lexical_alternative
translation:
  language: ko
  text: "참으로 경건의 비밀은 위대합니다[a]:\n그분께서 육체로 나타나셨고,\n영으로 의롭다 함을 받으셨으며[b],\n천사들에게 보이셨고,\n이방인들[c] 가운데 선포되셨으며,\n세상에서 믿어지셨고,\n영광 중에 들리어 올라가셨습니다[d]."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「하나님께서 육체로 나타나셨다」로 읽으나(θεὸς ἐφανερώθη), 비평 본문은 「누구께서/그분께서」(ὅς)로 읽으며, 본 번역은 이를 따른다.
    reason: textual_variant
  - marker: b
    text: 또는 「성령으로 의롭다 함을 받으셨으며」 「성령 안에서 의롭다 함을 받으셨으며」. 헬라어 표현은 압축되어 있어 성령의 행위 또는 영적 영역을 가리킬 수 있다.
    reason: alternative_reading
  - marker: c
    text: 또는 「민족들 가운데」.
    reason: lexical_alternative
  - marker: d
    text: 또는 「영광 속으로 들리어 올라가셨습니다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογουμένως μέγα
  english_pob_choice: undeniably great
  chosen_korean: 참으로 ~ 위대합니다
  alternatives_korean:
  - 누구나 인정하듯 위대합니다
  - 의심할 바 없이 위대합니다
  lexicon: BDAG
  rationale: ὁμολογουμένως는 「누구나 동의하듯」. 「참으로」가 송영적 어조에 자연스럽다.
- source_word: τὸ τῆς εὐσεβείας μυστήριον
  english_pob_choice: the mystery of godliness
  chosen_korean: 경건의 비밀
  alternatives_korean:
  - 경건의 신비
  lexicon: BDAG
  rationale: εὐσέβεια 표준 「경건」 + μυστήριον 표준 「비밀」.
- source_word: Ὃς ἐφανερώθη ἐν σαρκί
  english_pob_choice: He was revealed in flesh
  chosen_korean: 그분께서 육체로 나타나셨고
  alternatives_korean:
  - 그분은 육신으로 나타나셨고
  - 그가 육체 안에서 드러나셨고
  lexicon: BDAG
  rationale: σάρξ는 본 번역 표준 「육체」. 「육신」도 가능하나, 본 번역은 어휘 일관성을 위해 「육체」.
- source_word: ἐδικαιώθη ἐν πνεύματι
  english_pob_choice: was vindicated in spirit
  chosen_korean: 영으로 의롭다 함을 받으셨으며
  alternatives_korean:
  - 성령으로 의롭다 함을 받으셨으며
  - 영 안에서 옳다 함을 받으셨으며
  lexicon: BDAG
  rationale: δικαιόω의 「의롭다 인정함」을 한국 신학 어휘 「의롭다 함을 받다」로 옮긴다. πνεῦμα는 본 절에서 성령인지 영적 영역인지 모호. 본 번역의 글로서리(πνεῦμα 분별)에 따라 자동 대문자화를 피하고 「영」을 본문에 두며, 「성령」 해석은 각주.
- source_word: ὤφθη ἀγγέλοις
  english_pob_choice: was seen by angels
  chosen_korean: 천사들에게 보이셨고
  alternatives_korean:
  - 천사들이 보았고
  lexicon: BDAG
  rationale: ὤφθη + 여격은 「~에게 나타나 보이셨다」의 정형.
- source_word: ἐκηρύχθη ἐν ἔθνεσιν
  english_pob_choice: was proclaimed among the nations
  chosen_korean: 이방인들 가운데 선포되셨으며
  alternatives_korean:
  - 민족들 가운데 전파되셨으며
  lexicon: BDAG
  rationale: 2:7과 일관 「이방인」.
- source_word: ἐπιστεύθη ἐν κόσμῳ
  english_pob_choice: was believed on in the world
  chosen_korean: 세상에서 믿어지셨고
  alternatives_korean:
  - 세상 가운데 믿음을 받으셨고
  lexicon: BDAG
  rationale: 수동태 「믿어지셨다」.
- source_word: ἀνελήμφθη ἐν δόξῃ
  english_pob_choice: was taken up in glory
  chosen_korean: 영광 중에 들리어 올라가셨습니다
  alternatives_korean:
  - 영광 가운데 올려지셨습니다
  - 영광 속으로 들리어 올라가셨습니다
  lexicon: BDAG
  rationale: ἀναλαμβάνω의 승천 어휘 「들리어 올라가셨습니다」.
theological_decisions:
- issue: '3:16 - 본문 변형 ὅς vs θεός 및 초대 교회 찬송 형식'
  chosen_reading: 「그분께서 육체로 나타나셨고…」(ὅς 채택, 6행 찬송 형식 보존)
  alternative_readings:
  - 「하나님께서 육체로 나타나셨고…」(θεός 채택; 후대 사본에서 확산)
  - 「누구께서 육체로 나타나셨고…」(직역적 관계대명사)
  rationale: 본 절은 초대 교회의 찬송적 신앙 고백으로, 본 번역은 (1) SBLGNT 비평 본문 ὅς(「누구께서/그분께서」)를 따른다 — θεός는 후대 사본의 확산으로 보이며 본문 비평에서 약하다. 본문 변형은 각주에 기록한다. (2) 6행 평행 구조(수동태 + ἐν + 여격 / 여격)를 한국어 종결 구조 「~셨고/~으며」로 일관되게 보존하여 찬송 형식의 운율을 살린다. (3) ἐν πνεύματι의 모호함(성령/영적 영역)을 한 가지로 좁히지 않고 본문은 「영」, 「성령」 해석은 각주에 둔다.
  doctrine_reference: 'DOCTRINE.md: textual decisions follow SBLGNT critical text; preserve theological tension; document variants'
