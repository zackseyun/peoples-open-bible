translation:
  language: es
  text: 'Cuando los habitantes de la tierra, los cananeos, vieron el duelo en la era de Atad, dijeron: «Este es un duelo muy grave para los egipcios». Por eso aquel lugar se llamó Abel-mizraim[a][b], el cual está al otro lado del Jordán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abel-mizraim suena como «duelo de Egipto», reflejando la descripción que hicieron los cananeos del acontecimiento.
    reason: lexical_alternative
  - marker: b
    text: O «más allá del Jordán»; la expresión depende del punto de vista geográfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב הָאָרֶץ הַכְּנַעֲנִי
  english_pob_choice: the inhabitants of the land, the Canaanites
  chosen_spanish: los habitantes de la tierra, los cananeos
  alternatives_spanish:
  - los cananeos, habitantes de la tierra
  - los habitantes cananeos de la tierra
  lexicon: HALOT
  rationale: La forma hebrea usa un participio singular con valor colectivo y una aposición identificadora. En español, «los habitantes de la tierra, los cananeos» conserva ambos elementos sin forzar una paráfrasis y mantiene la identificación étnica explícita.
- source_word: הָאֵבֶל
  english_pob_choice: the mourning
  chosen_spanish: el duelo
  alternatives_spanish:
  - el luto
  - el llanto funerario
  lexicon: HALOT
  rationale: אֵבֶל se refiere al lamento/mourning funerario. «Duelo» es una opción natural en español bíblico actual y comunica el evento de luto sin perder el carácter funerario.
- source_word: בְּגֹרֶן הָאָטָד
  english_pob_choice: at the threshing floor of Atad
  chosen_spanish: en la era de Atad
  alternatives_spanish:
  - en el lugar de trillado de Atad
  - junto a la era de Atad
  lexicon: HALOT
  rationale: גֹּרֶן designa una era o sitio de trilla. «Era» es el equivalente español más natural y transparente, y la preposición «en» refleja ubicación sin cambiar el sentido.
- source_word: אֵבֶל כָּבֵד
  english_pob_choice: a grievous mourning
  chosen_spanish: un duelo muy grave
  alternatives_spanish:
  - un duelo muy intenso
  - un duelo muy grande
  - un duelo grievoso
  lexicon: HALOT
  rationale: כָּבֵד literalmente es «pesado», pero en español «grave» comunica mejor la intensidad del duelo. Añadir «muy» refuerza el valor intensivo que la POB inglesa expresa con «grievous».
- source_word: לְמִצְרָיִם
  english_pob_choice: for the Egyptians
  chosen_spanish: para los egipcios
  alternatives_spanish:
  - de parte de los egipcios
  - para Egipto
  lexicon: HALOT
  rationale: El complemento indica la asociación del duelo con la delegación/pueblo egipcio presente. «Para los egipcios» sigue de cerca el valor contextual que la POB inglesa resalta como referente humano.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por consiguiente
  - Así que
  lexicon: HALOT
  rationale: Es una fórmula inferencial estándar. «Por eso» es natural, breve y fiel al valor conclusivo del hebreo.
- source_word: קָרָא שְׁמָהּ
  english_pob_choice: it was named
  chosen_spanish: se llamó
  alternatives_spanish:
  - fue llamado
  - recibió el nombre de
  lexicon: HALOT
  rationale: La pasiva hebrea de nombrar se expresa con naturalidad en español mediante «se llamó», que evita añadir un sujeto no explícito y mantiene la estructura del texto.
- source_word: אָבֵל מִצְרַיִם
  english_pob_choice: Abel-mizraim
  chosen_spanish: Abel-mizraim
  alternatives_spanish:
  - Abel-Mizraim
  - Abel de Egipto
  lexicon: HALOT
  rationale: Es un nombre propio formado por juego de palabras con אֵבֶל («duelo») y מִצְרַיִם («Egipto»). Se translitera en el texto principal y se preserva el matiz semántico en nota.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión es perspectival. «Al otro lado del Jordán» es idiomático y conserva la relatividad geográfica sin imponer una dirección específica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el ajuste más reciente del POB inglés hacia una formulación más literal de la aposición («the inhabitants of the land, the Canaanites»), la preferencia final por «it was named» y la elección de «grievous» para כָבֵד. La redacción española conserva esas decisiones: aposición explícita, pasiva impersonal de nombrar y un intensificador natural («muy grave») para el matiz de peso/intensidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando no aparece el tetragrámaton en este versículo.
  - «Abel-mizraim» se conserva como nombre propio transliterado para no borrar el juego de palabras hebreo.
  - La preposición «al otro lado de» se usa para reflejar la perspectiva geográfica sin fijarla unilateralmente.
