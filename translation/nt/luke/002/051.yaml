id: LUK.2.51
reference: Luke 2:51
source:
  edition: SBLGNT
  text: καὶ κατέβη μετ’ αὐτῶν καὶ ἦλθεν εἰς Ναζαρέθ, καὶ ἦν ὑποτασσόμενος αὐτοῖς. καὶ ἡ μήτηρ αὐτοῦ διετήρει πάντα τὰ ῥήματα ⸀ταῦτα ἐν τῇ καρδίᾳ αὐτῆς.
translation:
  text: And he went down with them and came to Nazareth[a], and he was subject to them[b]. And his mother kept all these things in her heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was subject to them.' The Greek expression denotes ongoing submission or obedience.
    reason: lexical_alternative
  - marker: b
    text: Or 'all these things' or 'all these sayings.' Greek ῥήματα can refer to spoken words, sayings, or matters reported.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  chosen: went down
  alternatives:
  - went back down
  - descended
  lexicon: BDAG
  rationale: Aorist of καταβαίνω is most naturally rendered 'went down.' This preserves the geographical/topographical sense without overformal 'descended.'
- source_word: μετ’ αὐτῶν
  chosen: with them
  lexicon: BDAG
  rationale: Simple accompaniment; no reason to expand beyond the Greek.
- source_word: ἦλθεν εἰς Ναζαρέθ
  chosen: came to Nazareth
  alternatives:
  - went to Nazareth
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come/go' depending on English viewpoint. 'Came to Nazareth' is idiomatic and keeps the narrative movement clear.
- source_word: ἦν ὑποτασσόμενος αὐτοῖς
  chosen: was submitting himself to them
  alternatives:
  - was subject to them
  - continued in submission to them
  lexicon: BDAG
  rationale: The periphrastic imperfect with present participle conveys ongoing disposition/action. 'Was submitting himself to them' preserves the verbal force of ὑποτάσσω and avoids the slightly static feel of 'was subject to them,' while still expressing filial obedience.
- source_word: διετήρει
  chosen: kept
  alternatives:
  - treasured
  - carefully kept
  - preserved
  lexicon: BDAG
  rationale: διατηρέω means to keep/preserve carefully. 'Kept' is the most direct rendering here; the nuance of careful retention is supported by the context and the phrase 'in her heart' without importing a more interpretive 'treasured' into the main text.
- source_word: πάντα τὰ ῥήματα ταῦτα
  chosen: all these words
  alternatives:
  - all these things
  - all these sayings
  lexicon: BDAG
  rationale: ῥήματα often means 'words' or 'sayings.' Since the term refers to matters spoken and remembered, 'words' is the most transparent choice. 'Things' is broader and less precise, though common in some translations.
- source_word: ἐν τῇ καρδίᾳ αὐτῆς
  chosen: in her heart
  alternatives:
  - within her heart
  lexicon: BDAG
  rationale: Standard biblical idiom for inward reflection and remembrance; should be preserved rather than paraphrased.
