    rationale: El POB inglés conserva explícitamente la posibilidad de 'gores'. En español conviene reflejar esa opción con una nota como 'acornea', especialmente en este contexto de un buey.
  - severity: medium
    issue: '''Dividirán el muerto'' es poco natural en español'
    rationale: Aunque reproduce de cerca el hebreo, en español suena elíptico y áspero de manera innecesaria. 'Dividirán el animal muerto' comunica el sentido claramente y la nota puede preservar la literalidad hebrea 'el muerto'.
  - severity: low
