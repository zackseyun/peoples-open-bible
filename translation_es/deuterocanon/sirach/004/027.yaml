translation:
  language: es
  text: No te rebajes ante un necio[a], y no muestres parcialidad ante los gobernantes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no extiendas/coloques tu ser»; el paralelo griego aclara el modismo como humillarte o rebajarte ante una persona necia.'
    reason: lexical_alternative
  - marker: b
    text: La segunda línea del hebreo es menos transparente por sí sola; el griego paralelo puede entenderse como «no aceptes el rostro de un gobernante», es decir, no muestres favoritismo ni parcialidad.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּצַּע
  english_pob_choice: Do not abase yourself
  chosen_spanish: No te rebajes
  alternatives_spanish:
  - No te humilles
  - No te pongas por debajo
  - No te abatares
  lexicon: HALOT
  rationale: El hebreo sugiere la imagen de ‘extender/poner’ algo abajo; el paralelo griego ὑποστρώσῃς σεαυτόν refuerza la idea de ponerse uno mismo como base o tapete delante de otro. En español, ‘rebajarse’ comunica bien la humillación voluntaria sin perder del todo la fuerza idiomática.
- source_word: לְנָבָל
  english_pob_choice: before a fool
  chosen_spanish: ante un necio
  alternatives_spanish:
  - ante un insensato
  - ante un fatuo
  - ante un hombre ruin
  lexicon: HALOT
  rationale: נָבָל designa al necio en sentido moral, no solo intelectual. ‘Ante’ conserva el valor relacional/presencial del proverbio, y ‘necio’ es un término claro y bíblicamente reconocible en español.
- source_word: נַפְשֶׁךָ
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - tu alma
  - tu vida
  - tu persona
  lexicon: HALOT
  rationale: El hebreo usa נֶפֶשׁ con valor reflexivo de la persona completa; el griego σεαυτόν confirma ese sentido. En español, el reflexivo verbal expresa mejor la idea que una traducción literal de ‘alma’.
- source_word: וְאַל תַּאֲמֵן
  english_pob_choice: do not show partiality
  chosen_spanish: no favorezcas
  alternatives_spanish:
  - no muestres parcialidad
  - no aceptes el rostro
  - no te inclines a favor
  lexicon: HALOT
  rationale: La forma hebrea es menos transparente aisladamente, pero el paralelo griego μὴ λάβῃς πρόσωπον apunta al modismo de ‘aceptar el rostro’ = favorecer a alguien por su persona. En español, ‘favorecer’ transmite la idea con naturalidad; se mantiene en nota la alternativa más literal relacionada con parcialidad.
- source_word: לִפְּנֵי מוֹשְׁלִים
  english_pob_choice: before rulers
  chosen_spanish: a los poderosos
  alternatives_spanish:
  - ante los gobernantes
  - delante de los rulers
  - ante los príncipes
  lexicon: HALOT
  rationale: מוֹשְׁלִים son quienes gobiernan o ejercen dominio; ‘poderosos’ es una forma amplia y natural en español que conserva la fuerza social del término. Se evita una palabra demasiado estrecha si el contexto alude a personas con autoridad en general.
- source_word: πρόσωπον δυνάστου
  english_pob_choice: show partiality before rulers
  chosen_spanish: favorezcas a los poderosos
  alternatives_spanish:
  - mires el rostro del poderoso
  - aceptes el rostro del poderoso
  - hagas acepción de personas
  lexicon: NA/lexical inference from Greek parallel
  rationale: El griego añade la expresión ‘tomar/aceptar el rostro’ de un δυναστής, que confirma el sentido de mostrar favoritismo. En español se traduce el efecto idiomático, no la metáfora desnuda, para que el proverbio sea claro y fiel.
theological_decisions:
- issue: Relación entre el hebreo menos transparente y el paralelo griego en la segunda línea
  english_pob_reading: do not show partiality before rulers
  chosen_spanish_reading: no favorezcas a los poderosos
  alternative_spanish_readings:
  - no muestres parcialidad ante los gobernantes
  - no aceptes el rostro del poderoso
  - no hagas acepción de personas ante los que gobiernan
  rationale: El hebreo de esta línea puede leerse de varias maneras, pero el paralelo griego suministra un apoyo fuerte para el modismo de favoritismo/acepción. La traducción española preserva ese sentido sin ocultar la tensión textual; la nota permite ver que la base literal está en la imagen de ‘aceptar el rostro’.
  doctrine_reference: 'Principio POB: primacía de la fuente original con consulta explícita del paralelo; honestidad frente a ambigüedad textual.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que no introdujo cambios adicionales; el borrador mantiene la lectura apoyada por el hebreo con clarificación del paralelo griego donde el hebreo es menos transparente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece.
  - Se traduce el valor moral de נָבָל como ‘necio’, no como simple falta de inteligencia.
  - Se evita ‘SEÑOR’ y se conserva el sentido social del proverbio con un español natural y bíblicamente sobrio.
  - ‘Poderosos’ se usa como equivalente amplio de מוֹשְׁלִים / δυνάστου, sin estrecharlo indebidamente a una sola clase política.
