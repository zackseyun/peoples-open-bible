  language: en
  yaml_path: translation/ot/deuteronomy/019/015.yaml
  text: A single witness shall not stand against a man for any iniquity or for any sin[a], in connection with any sin that he commits[c][b]; on the testimony of two witnesses or on the testimony of three witnesses a matter shall stand.
  footnotes:
