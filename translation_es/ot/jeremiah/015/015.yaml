review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: invocación a Yahvé, doble ruego ''acuérdate... atiéndeme'', petición de venganza/vindicación contra los perseguidores, súplica de no ser quitado durante la paciencia divina, y afirmación de que el profeta soporta reproche por causa de Dios. Sin embargo, hay desajustes importantes en las notas y una formulación española poco idiomática en la cláusula de venganza.'
  spanish_quality_summary: La mayor parte del verso es clara y de registro adecuado. 'Acuérdate de mí', 'atiéndeme', 'En tu paciencia no me quites' y 'por tu causa llevo reproche' son legibles y dignos. Pero 'haz venganza por mí de mis perseguidores' suena antinatural en español bíblico moderno; 'véngame de mis perseguidores' o 'toma venganza por mí contra mis perseguidores' expresa mejor el valor judicial sin calco extraño. Además, la nota [a] mezcla indebidamente alternativas de dos expresiones distintas y no corresponde al anclaje textual.
  glossary_alignment: Se respeta correctamente el nombre divino como 'Yahvé'. No hay conflicto con otros términos del glosario del proyecto. La decisión sobre נקם debe conservar fuerza judicial; en español conviene hacerlo con 'véngame' para fidelidad y naturalidad. 'Perseguidores', 'paciencia' y 'reproche' están bien alineados con el expediente inglés.
  issues:
  - severity: high
    issue: La nota [a] no corresponde al texto anclado y combina alternativas de dos lexemas distintos.
    rationale: El anclaje [a] está en 'Tú lo sabes', que refleja אַתָּה יָדַעְתָּ, pero la nota incluye alternativas para וּפָקְדֵנִי ('visítame', 'tenme presente', 'cuida de mí'). Esto rompe la trazabilidad de la auditoría y confunde al lector.
  - severity: medium
    issue: '''haz venganza por mí de mis perseguidores'' es poco idiomático en español.'
    rationale: Aunque intenta preservar la fuerza de נקם, la construcción resulta forzada. 'Véngame de mis perseguidores' mantiene la petición directa a Dios y suena natural en español eclesial moderno.
  - severity: medium
    issue: La nota [b] no preserva la alternativa principal del expediente inglés.
    rationale: El inglés da como alternativa 'avenge me against my pursuers'. La nota española ofrece solo 'hazme justicia contra mis perseguidores', que atenúa el campo léxico de venganza/vindicación documentado por el POB.
  - severity: low
    issue: '''por causa de ti'' es comprensible, pero ''por tu causa'' es más natural en español general.'
    rationale: Ambas son fieles a עָלֶיךָ, pero 'por tu causa' suena menos rígido y coincide mejor con la nota alternativa ya documentada.
