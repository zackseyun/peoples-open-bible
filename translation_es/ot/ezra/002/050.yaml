lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia de
  lexicon: HALOT
  rationale: En listas genealógicas o de clanes, בְּנֵי funciona de manera corporativa. En español, "los hijos de" conserva la estructura formal del listado y es natural en este contexto; "los descendientes de" aclararía la referencia colectiva, pero suaviza la forma del texto base.
- source_word: אַסְנָה
  english_pob_choice: Asnah
  chosen_spanish: Asnah
  alternatives_spanish:
  - Asna
  lexicon: transliteración propia
  rationale: Nombre propio de clan o antepasado. Se translitera para preservar la forma del hebreo; se mantiene la vocalización cercana al inglés POB y al consonantismo del texto fuente.
- source_word: מעינים
  english_pob_choice: Meunim
  chosen_spanish: Meunim
  alternatives_spanish:
  - Maonim
  lexicon: HALOT
  rationale: Nombre de grupo étnico o clánico. Se conserva la transliteración principal del POB inglés; la alternativa tradicional en algunas versiones españolas o inglesas es posible, pero no se adopta en el texto principal sin una base textual más fuerte.
- source_word: נפיסים
  english_pob_choice: Nephisim
  chosen_spanish: Nefisim
  alternatives_spanish:
  - Nefusim
  lexicon: HALOT
  rationale: Nombre propio de grupo. En español se ajusta la grafía para reflejar la pronunciación esperable y evitar la secuencia inglesa 'ph'; la alternativa con 'u' queda como posibilidad transliteratoria, pero el texto principal sigue de cerca la forma consonántica masorética.
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con el texto fuente es alto; por eso se mantiene una solución sobria y directa, sin expandir ni armonizar más allá del registro genealógico del versículo.
  spanish_consistency_notes:
  - Se conserva el paralelismo repetido de בְּנֵי con la misma fórmula en cada segmento.
  - Se transliteran los nombres propios sin añadir artículos o glosas interpretativas en el cuerpo principal.
  - Se evita sustituir el patronímico por una traducción explicativa como "familias" porque el texto fuente presenta una lista nominal breve y formal.
