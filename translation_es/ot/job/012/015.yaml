  rationale: Se reemplaza «Mira» por «He aquí» para conservar la fuerza enfática de הֵן en un registro más digno y menos coloquial. Se corrige la nota al pie para que presente una alternativa real a «la tierra», en línea con la evidencia léxica de אָרֶץ y el rastro de auditoría inglés.
