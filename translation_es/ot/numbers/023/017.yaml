translation:
  language: es
  text: 'Vino a él, y he aquí que estaba de pie junto a su holocausto, y los príncipes[a] de Moab estaban con él. Y Balac le dijo: «¿Qué ha dicho Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los oficiales de Moab» para «los príncipes de Moab».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֵלָיו
  english_pob_choice: He came to him
  chosen_spanish: Vino a él
  alternatives_spanish:
  - Llegó a él
  - Fue hacia él
  lexicon: HALOT
  rationale: El verbo בוא aquí expresa movimiento hacia una persona; en español, «vino a él» conserva la direccionalidad simple del hebreo sin introducir la interpretación de «regresó» que el texto no explicita.
- source_word: וְהִנּוֹ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y he aquí que
  - y mira
  lexicon: HALOT
  rationale: «Y he aquí» reproduce el golpe discursivo y la atención repentina del hebreo וְהִנּוֹ mejor que una formulación más explicativa.
- source_word: נִצָּב
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - permanecía de pie
  lexicon: HALOT
  rationale: El participio indica una postura en curso; «estaba de pie» comunica bien ese valor durativo en español y suena natural en el contexto narrativo.
- source_word: עַל עֹלָתוֹ
  english_pob_choice: by his burnt offering
  chosen_spanish: junto a su holocausto
  alternatives_spanish:
  - junto a su ofrenda quemada
  - al lado de su holocausto
  - junto a su sacrificio quemado
  lexicon: HALOT
  rationale: Se eligió «junto a» para reflejar el valor espacial de עַל en este contexto, siguiendo la revisión inglesa que prefirió una preposición más natural. «Holocausto» conserva el término sacrificial tradicional para עֹלָה sin perder precisión.
- source_word: עֹלָתוֹ
  english_pob_choice: his burnt offering
  chosen_spanish: su holocausto
  alternatives_spanish:
  - su ofrenda quemada
  - su sacrificio quemado
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente español establecido para עֹלָה en sentido sacrificial, y mantiene la referencia técnica del texto.
- source_word: וְשָׂרֵי מוֹאָב
  english_pob_choice: the princes of Moab
  chosen_spanish: los príncipes de Moab
  alternatives_spanish:
  - los oficiales de Moab
  - los jefes de Moab
  - los gobernantes de Moab
  lexicon: HALOT
  rationale: שָׂרִים admite varias opciones; se conserva «príncipes» porque reproduce la dignidad del grupo y coincide con la decisión inglesa auditada, aunque «oficiales» también sería posible.
- source_word: וַיֹּאמֶר לוֹ בָּלָק
  english_pob_choice: And Balak said to him
  chosen_spanish: Y Balac le dijo
  alternatives_spanish:
  - Entonces Balac le dijo
  - Y dijo Balac
  lexicon: HALOT
  rationale: 'La forma narrativa consecutiva se vierte con una coordinación simple: «Y Balac le dijo». «Le» expresa el dativo pronominal a לוֹ sin recargar la frase.'
- source_word: מַה דִּבֶּר
  english_pob_choice: What has ... spoken?
  chosen_spanish: ¿Qué ha hablado?
  alternatives_spanish:
  - ¿Qué dijo?
  - ¿Qué palabra ha hablado?
  - ¿Qué ha dicho?
  lexicon: HALOT
  rationale: «Hablar» mantiene mejor la conexión con el habla divina que un simple «decir», y «¿Qué ha hablado?» preserva el tono interrogativo directo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto, יְהוָה se traduce como «Yahvé» en el texto principal para preservar el nombre divino, no como una sustitución titulada.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. En español, el estándar del proyecto pide «Yahvé», que conserva el nombre propio del Dios de Israel sin sustituirlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor espacial de עַל en עַל עֹלָתוֹ
  english_pob_reading: by his burnt offering
  chosen_spanish_reading: junto a su holocausto
  alternative_spanish_readings:
  - al lado de su holocausto
  - junto a su ofrenda quemada
  - sobre su holocausto
  rationale: El contexto exige una relación espacial, no de contacto literal. «Junto a» evita la idea de estar encima del sacrificio y conserva la naturalidad del español.
  doctrine_reference: Doctrina de equivalencia óptima aplicada a preposiciones de relación espacial
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente al preferir una preposición espacial natural para עַל en este contexto y al mantener sin cambios sustantivos las demás decisiones auditadas: movimiento simple con בוא, énfasis discursivo de וְהִנּוֹ, postura durativa de נִצָּב, y el nombre divino traducido con el estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «holocausto» para עֹלָה en coherencia con la terminología sacrificial del corpus.
  - Se conserva «príncipes de Moab» por consistencia con la decisión inglesa auditada, con nota alternativa.
  - La puntuación y el orden verbal buscan un español bíblico moderno, claro y publicable sin calcos innecesarios.
