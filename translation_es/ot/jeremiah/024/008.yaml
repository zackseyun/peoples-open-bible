revisions:
- from: 'Pero como las higas[a] malas, que no pueden comerse por ser tan malas, así dice Yahvé: así entregaré a Sedequías, rey de Judá, a sus oficiales, al remanente de Jerusalén que quedó en esta tierra, y a los que habitan en la tierra de Egipto.'
  to: 'Pero como los higos malos, que no pueden comerse por ser tan malos[a], así dice Yahvé: así haré con Sedequías, rey de Judá, con sus oficiales, con el remanente de Jerusalén, con los que permanecen en esta tierra, y con los que habitan en la tierra de Egipto.'
  rationale: Se reemplaza 'higas' por 'higos' para mejorar la naturalidad y legibilidad sin pérdida semántica; se elimina la nota innecesaria sobre ese término. Se ajusta כֵּן אֶתֵּן a 'así haré con' para reflejar mejor la decisión auditada y el valor contextual del hebreo, conservando en nota la alternativa más literal con 'daré'. Se explicita el plural personal de הַנִּשְׁאָרִים con 'los que permanecen en esta tierra'. También se repite 'con' para que la cadena de objetos suene natural en español y preserve claramente el alcance del verbo.
