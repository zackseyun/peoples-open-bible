theological_decisions:
- issue: Contrast between Israel and the Egyptians
  chosen_reading: 'Render the verse as a sharp antithesis: God''s people experienced an extraordinary journey, while the others met a strange death.'
  alternative_readings:
  - Render both adjectives with the same English root, e.g. 'strange journey' / 'strange death'
  rationale: The Greek contrasts παράδοξον and ξένον. Using 'extraordinary' for the former and 'strange' for the latter preserves both the lexical distinction and the positive-versus-ominous contrast in context.
