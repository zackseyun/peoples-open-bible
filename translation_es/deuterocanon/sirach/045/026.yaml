    rationale: Aunque reproduce la forma sustantivada, en español suena rígida e incluso coloquial. «el que es bueno» mantiene el sentido aposicional/predicativo y mejora la legibilidad sin sobreinterpretar.
  revised_spanish_text: Y ahora, por favor, bendigan a Yahvé, el que es bueno.[a]
