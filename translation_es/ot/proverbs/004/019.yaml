translation:
  language: es
  text: El camino de los malvados es como tinieblas densas[a]; no saben en qué tropiezan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como oscuridad profunda» o «como oscuridad espesa». El término hebreo denota una oscuridad especialmente densa.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea también puede entenderse como «sobre qué tropiezan» o «qué los hace tropezar».
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - דרך
  - sendero
  - ruta
  lexicon: HALOT
  rationale: En proverbios, דֶּרֶךְ puede referirse al curso de vida o conducta. «Camino» conserva la metáfora de manera natural en español y comunica el sentido proverbial sin explicarlo de más.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: El plural sustantivado describe personas moralmente culpables. «Los malvados» es claro, natural y bíblicamente comprensible en español, manteniendo el tono ético del hebreo.
- source_word: כָּאֲפֵלָה
  english_pob_choice: like deep darkness
  chosen_spanish: como oscuridad profunda
  alternatives_spanish:
  - como tinieblas densas
  - como oscuridad espesa
  - como penumbra
  lexicon: HALOT
  rationale: כָּ indica comparación y אֲפֵלָה señala oscuridad intensa, más fuerte que «oscuridad» simple. «Oscuridad profunda» comunica esa densidad sin sonar artificioso; se conserva la imagen comparativa.
- source_word: לֹא יָדְעוּ
  english_pob_choice: they do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no entienden
  - no advierten
  lexicon: HALOT
  rationale: ידע aquí expresa falta de conocimiento o discernimiento. «No saben» es directo y amplio, y deja abierta la doble idea de ignorancia y falta de percepción.
- source_word: בַּמֶּה
  english_pob_choice: over what
  chosen_spanish: sobre qué
  alternatives_spanish:
  - por qué
  - en qué
  - ante qué
  lexicon: HALOT
  rationale: La preposición con interrogativo admite una relación instrumental o locativa. La revisión inglesa prefirió «over what» para reflejar más de cerca la forma hebrea; en español, «sobre qué» conserva esa relación sin añadir causalidad.
- source_word: יִכָּשֵׁלוּ
  english_pob_choice: they stumble
  chosen_spanish: tropiezan
  alternatives_spanish:
  - caen
  - se tambalean
  - dan tropiezo
  lexicon: HALOT
  rationale: El nifal de כשל expresa tropezar o ser hecho tropezar. «Tropiezan» mantiene la imagen concreta y funciona bien con «sobre qué» en español.
theological_decisions:
- issue: Imagen moral del camino en la sabiduría proverbial
  english_pob_reading: The way of the wicked is like deep darkness; they do not know over what they stumble.
  chosen_spanish_reading: El camino de los malvados es como oscuridad profunda; no saben sobre qué tropiezan.
  alternative_spanish_readings:
  - El camino de los malvados es como tinieblas densas; no saben sobre qué tropiezan.
  - El camino de los malvados es como una oscuridad espesa; no saben en qué tropiezan.
  rationale: 'No hay una afirmación doctrinal adicional, pero sí una imagen moral fuerte: la conducta de los malvados carece de visibilidad y discernimiento. Se preserva la comparación sin suavizarla ni convertirla en una explicación abstracta.'
  doctrine_reference: Sabiduría bíblica / imagen proverbial; cf. Proverbios 4:18-19
- issue: Valor de בַּמֶּה en la última cláusula
  english_pob_reading: they do not know over what they stumble
  chosen_spanish_reading: no saben sobre qué tropiezan
  alternative_spanish_readings:
  - no saben qué los hace tropezar
  - no saben en qué tropiezan
  - no saben por qué tropiezan
  rationale: La revisión inglesa evitó introducir una causa explícita y prefirió una relación más literal con el hebreo. «Sobre qué» conserva la ambigüedad entre objeto y soporte del tropiezo, sin desplazar el texto hacia una lectura causal.
  doctrine_reference: Precisión semántica del hebreo; Proverbios 4:19
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés, que prefirió «over what they stumble» para reflejar más directamente בַּמֶּה sin añadir una causalidad no explícita. En español, «sobre qué tropiezan» mantiene esa misma decisión y evita convertir el verbo en una explicación causal.
  spanish_consistency_notes:
  - Se mantuvo «camino» para דֶּרֶךְ, coherente con el uso proverbial de la sabiduría bíblica.
  - Se usó «malvados» para רְשָׁעִים por naturalidad y registro bíblico amplio; no se sustituyó por «impíos» sin necesidad contextual.
  - «Oscuridad profunda» preserva la intensificación de אֲפֵלָה sin caer en una paráfrasis.
  - «Sobre qué tropiezan» conserva la ambigüedad del hebreo y armoniza con la revisión auditada del texto inglés.
