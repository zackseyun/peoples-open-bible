base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/034.yaml
  text: But the pastureland of their cities must not be sold[b][a], for it is their permanent possession.
  footnotes:
  - marker: a
    text: Or 'common land' or 'open land' for 'pastureland' (מִגְרָשׁ), referring to the land around Levitical cities.
    reason: lexical_alternative
  - marker: b
    text: Or 'everlasting possession.' The Hebrew עוֹלָם can denote enduring permanence; here it refers to the land's non-transferable status.
    reason: alternative_reading
