translation:
  language: es
  text: Acuérdate[a], Señor, del oprobio de tus siervos, que llevo en mi pecho[b] de muchos pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Llevo en mi pecho el oprobio de todos los muchos pueblos». La sintaxis hebrea después de «en mi pecho» es condensada y puede entenderse ya sea como la fuente del oprobio («de muchos pueblos») o como el contenido o alcance de lo que se lleva («de todos los muchos pueblos»).'
    reason: alternative_reading
  - marker: b
    text: 'O: «en mi seno». El hebreo בְּחֵיקִי es un modismo para cargar algo de manera personal e íntima, no solo física.'
    reason: cultural_note
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: El hebreo es un imperativo directo en oración. «Acuérdate» reproduce bien el tono de súplica y es natural en español bíblico contemporáneo sin sonar mecánico.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: En este salmo la forma funciona como dirección a la deidad de Israel. Siguiendo la norma del proyecto para יהוה/YHWH, se traduce como «Yahvé»; «Señor» ocultaría el nombre divino y no refleja la convención del POB español.
- source_word: חֶרְפַּת
  english_pob_choice: the reproach
  chosen_spanish: el oprobio
  alternatives_spanish:
  - la afrenta
  - el reproche
  - la vergüenza
  lexicon: HALOT
  rationale: חֶרְפָּה puede abarcar reproche, afrenta o deshonra. «Oprobio» conserva con fuerza el peso de humillación pública y el registro de lamento, más que una simple burla.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: Aunque עבד puede tener fuerza de esclavo, en la oración del salmo la relación de pertenencia y servicio a Dios se expresa con naturalidad y fidelidad mediante «siervos». La elección evita una dureza innecesaria que el contexto no subraya.
- source_word: שְׂאֵתִי
  english_pob_choice: which I bear
  chosen_spanish: de cómo llevo
  alternatives_spanish:
  - que llevo
  - que soporto
  - que cargo
  lexicon: HALOT
  rationale: El verbo נשׂא aquí expresa cargar o llevar algo doloroso. «De cómo llevo» mantiene la relación sintáctica con la cláusula siguiente y deja visible el acto personal de cargar el oprobio.
- source_word: בְּחֵיקִי
  english_pob_choice: in my bosom
  chosen_spanish: en mi pecho
  alternatives_spanish:
  - en mi seno
  - junto a mi pecho
  - en mi regazo
  lexicon: HALOT
  rationale: 'La imagen hebrea es idiomática: llevar algo muy cerca del cuerpo, de manera íntima y personal. «En mi pecho» comunica esa cercanía en español moderno con un registro digno; «en mi seno» sería posible, pero hoy suena más marcado o ambiguo.'
- source_word: כָּל רַבִּים עַמִּים
  english_pob_choice: from many peoples
  chosen_spanish: de muchos pueblos
  alternatives_spanish:
  - de todos los muchos pueblos
  - de la multitud de pueblos
  - de todos los pueblos
  lexicon: HALOT
  rationale: El hebreo es comprimido y admite más de una relación sintáctica. La lectura del POB inglés entiende la procedencia del oprobio; en español, «de muchos pueblos» expresa naturalmente esa fuente. «Pueblos» conserva el plural étnico/nacional de עמים mejor que «gente».
theological_decisions:
- issue: Tratamiento del nombre/título divino en el vocativo
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - mi Señor
  rationale: El hebreo contiene אֲדֹנָי en dirección a Dios. Como el proyecto español no enmascara el nombre divino, se usa «Yahvé». Esto mantiene la transparencia del texto fuente y evita perder la diferenciación entre el nombre divino y un título genérico.
  doctrine_reference: Project default for יהוה / YHWH -> Yahvé
translation_notes:
  revision_awareness: La versión inglesa POB entiende la frase final como origen del oprobio («from many peoples»), pero reconoce una ambigüedad sintáctica en el hebreo que también puede leerse como el contenido de lo llevado («el oprobio de todos los muchos pueblos»). La redacción española sigue la lectura principal del POB y conserva el matiz idiomático de בְּחֵיקִי mediante «en mi pecho», con nota alternativa breve.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por coherencia con el estándar español del proyecto para el nombre divino.
  - «Oprobio» conserva el registro de lamento y la dureza semántica de חֶרְפָּה.
  - «Siervos» se eligió por naturalidad devocional en español y por el contexto de pertenencia a Dios.
  - La cláusula «de cómo llevo en mi pecho» refleja la compresión hebrea sin forzar una paráfrasis amplia.
