review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura enumerativa del hebreo y refleja de forma general las decisiones del POB en cuanto a 'pan del arreglo', 'flor de harina', la preparación en plancha y 'bien mezclado'. Sin embargo, 'las tortas del pan sin levadura' no preserva con suficiente precisión el valor de רְקִיקֵי como piezas delgadas tipo oblea/hojuela, y además suena menos natural en español. También conviene pulir la nota para que la alternativa principal española mantenga la cercanía al hebreo sin depender de 'arreglo' como única opción.
  spanish_quality_summary: El español es claro y digno, pero tiene un punto mejorable de naturalidad técnica-cultual. 'Pan del arreglo' es aceptable, aunque 'pan de la disposición' suena algo más idiomático; aun así puede conservarse por fidelidad al rastro inglés. La principal debilidad es 'tortas del pan sin levadura', que resulta pesada y poco precisa. 'Obleas sin levadura' o 'obleas de pan sin levadura' lee mejor y representa mejor el hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones cultuales son coherentes con el POB inglés. Se mantiene correctamente 'ofrenda vegetal' para מִנְחָה en contexto sacrificial. No aparecen términos del glosario mayor como Yahvé/Mesías/espíritu que requieran intervención.
  issues:
  - severity: medium
    issue: '''las tortas del pan sin levadura'' es una representación poco precisa de רְקִיקֵי הַמַּצּוֹת'
    rationale: רְקִיקִים son tortas muy delgadas/obleas. 'Tortas' en español puede sugerir piezas gruesas y la secuencia 'tortas del pan sin levadura' suena forzada. 'Las obleas sin levadura' preserva mejor el matiz y es más natural.
  - severity: low
    issue: La nota de 'pan del arreglo' podría beneficiarse de una alternativa española más transparente
    rationale: Aunque 'arreglo' reproduce el inglés auditado, en español bíblico 'disposición' comunica mejor el sentido de ordenamiento sin caer en un tecnicismo eclesiástico fijo. No obliga a cambiar el texto principal, pero sí conviene una nota bien formulada.
  revised_spanish_text: y para el pan del arreglo[a], y para la flor de harina para la ofrenda vegetal, y para las obleas sin levadura, y para lo que se cocina en la plancha, y para lo que está bien mezclado, y para toda medida y tamaño,
  revised_footnotes:
  - marker: a
    text: O 'el pan de la disposición', 'el pan de la Presencia' o 'el pan de la proposición'. El hebreo dice literalmente 'el pan del arreglo'.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y casi todas las decisiones del borrador, pero se corrige רְקִיקֵי הַמַּצּוֹת a 'las obleas sin levadura' para reflejar mejor piezas delgadas tipo wafer y mejorar la naturalidad del español. Se mantiene 'pan del arreglo' por continuidad con el POB inglés, pero se mejora la nota con una alternativa española más transparente y las alternativas cultuales tradicionales ya documentadas.
