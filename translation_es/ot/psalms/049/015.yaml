  - severity: medium
    issue: Uso de 'Sheol' en vez de 'Seol'
    rationale: Aunque el razonamiento teológico es correcto, 'Seol' es la forma más natural y extendida en español bíblico; mejora la legibilidad sin alterar el concepto.
