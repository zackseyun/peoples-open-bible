translation:
  language: es
  text: Por lo tanto, habiendo reconocido que esta nación sola está continuamente puesta en oposición a todo pueblo[a], introduciendo un modo de vida ajeno al alterar las leyes, y estando mal dispuesta hacia nuestros asuntos, provocando los peores males, de modo que el reino no llegue a tener estabilidad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos». El griego dice «a todo hombre» con fuerza genérica.
    reason: lexical_alternative
  - marker: b
    text: La formulación sobre las «leyes» y el «modo de vida» es retóricamente comprimida y hostil; presenta a esa nación como practicante de costumbres extrañas al imperio.
    reason: cultural_note
lexical_decisions:
- source_word: διειληφότες
  english_pob_choice: having recognized
  chosen_spanish: habiendo reconocido
  alternatives_spanish:
  - habiendo comprendido
  - habiendo concluido
  - habiendo determinado
  lexicon: LSJ
  rationale: El participio introduce la base de la acusación real. «Habiendo reconocido» comunica una percepción ya asentada sin convertirla indebidamente en decreto formal.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - raza
  lexicon: LSJ
  rationale: En este contexto político hostil, «nación» conserva mejor el sentido de colectividad étnico-política. «Pueblo» sería posible, pero menos preciso; «raza» es demasiado cargado para el español actual.
- source_word: μονώτατον
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - única
  - solamente ella
  - la única
  lexicon: LSJ
  rationale: El superlativo destaca un aislamiento singular. «Sola» refleja bien esa idea en español dentro de la frase.
- source_word: ἐν ἀντιπαραγωγῇ ... κείμενον
  english_pob_choice: stands in opposition
  chosen_spanish: está continuamente puesta en oposición
  alternatives_spanish:
  - está en conflicto
  - está puesta contra
  - se halla en oposición
  lexicon: LSJ
  rationale: La frase expresa una postura adversarial continua. «Está continuamente puesta en oposición» preserva el valor durativo y el tono formal sin sonar demasiado literal.
- source_word: παντὶ ... ἀνθρώπῳ
  english_pob_choice: every people
  chosen_spanish: todo pueblo
  alternatives_spanish:
  - toda persona
  - cada hombre
  - todas las personas
  lexicon: LSJ
  rationale: Aunque el griego usa ἀνθρώπῳ en singular genérico, el contexto revisado del POB inglés lo entendió con fuerza colectiva. En español, «todo pueblo» conserva esa amplitud y evita una lectura marcadamente masculina que aquí no es el punto principal.
- source_word: διαγωγὴν νόμων ξενίζουσαν παραλλάσσον
  english_pob_choice: introducing an alien manner of life by altering the laws
  chosen_spanish: introduciendo un modo de vida ajeno al alterar las leyes
  alternatives_spanish:
  - alterando las leyes para imponer un modo de vida extraño
  - cambiando sus leyes por un estilo de vida ajeno
  - introduciendo una manera de vivir extraña mediante las leyes
  lexicon: LSJ
  rationale: La expresión es comprimida y hostil. «Modo de vida ajeno» conserva la dimensión cultural; «al alterar las leyes» mantiene el vínculo con νόμων sin perder la relación causal o instrumental.
- source_word: δυσονοοῦν
  english_pob_choice: being ill-disposed toward
  chosen_spanish: siendo mal dispuesta para con
  alternatives_spanish:
  - mostrándose hostil a
  - teniendo mala disposición hacia
  - estando enemiga de
  lexicon: LSJ
  rationale: El participio expresa una actitud desfavorable o hostil. «Siendo mal dispuesta para con» conserva el registro formal y la evaluación negativa.
- source_word: τοῖς ἡμετέροις πράγμασιν
  english_pob_choice: our affairs
  chosen_spanish: nuestros asuntos
  alternatives_spanish:
  - nuestros intereses
  - nuestros negocios
  - nuestras cuestiones
  lexicon: LSJ
  rationale: La frase abarca las preocupaciones del reino. «Nuestros asuntos» es suficientemente amplio y natural en español.
- source_word: τὰ χείριστα συντελοῦν κακὰ
  english_pob_choice: bringing about the worst evils
  chosen_spanish: realizando los peores males
  alternatives_spanish:
  - produciendo los peores males
  - provocando los peores males
  - causando los peores males
  lexicon: LSJ
  rationale: El griego es intensamente acusatorio. «Realizando los peores males» mantiene la fuerza retórica y la idea de llevar a cabo esos daños.
- source_word: πρὸς τὸ μὴ τὴν βασιλείαν εὐσταθείας τυγχάνειν
  english_pob_choice: so that the kingdom does not attain stability
  chosen_spanish: de modo que el reino no llegue a tener estabilidad
  alternatives_spanish:
  - para que el reino no obtenga estabilidad
  - con el fin de que el reino no llegue a estabilidad
  - de manera que el reino no alcance firmeza
  lexicon: LSJ
  rationale: La cláusula expresa el supuesto resultado de la conducta descrita. «No llegue a tener estabilidad» reproduce bien el sentido de εὐστάθεια en un español natural y formal.
theological_decisions:
- issue: Caracterización hostil del pueblo judío en la carta real
  english_pob_reading: The translation retains the royal accusation as accusation, without softening or endorsing it.
  chosen_spanish_reading: Se conserva la acusación real como acusación, sin suavizarla ni presentarla como juicio narrativo neutral.
  alternative_spanish_readings:
  - Una paráfrasis más interpretativa que distancie al traductor del hablante
  - Una formulación que atenúe el tono ofensivo
  rationale: El pasaje forma parte de una carta real y transmite una perspectiva hostil. Mantener el tono acusatorio respeta el testimonio del texto fuente y evita resolver la tensión retórica.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión histórica y literaria; no neutralizar el discurso hostil del hablante.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó ἀνθρώπῳ hacia una fuerza colectiva («every people») y refinó κείμενον y la cláusula de νόμων ξενίζουσαν παραλλάσσον. La versión española sigue esas precisiones, evitando una traducción mecánica desde una redacción inglesa previa.
  spanish_consistency_notes:
  - Se mantiene «nación» para ἔθνος por coherencia con el criterio POB y por el contexto político del pasaje.
  - Se usa «Yahvé» cuando corresponda al proyecto, pero este versículo no contiene el tetragrámaton ni cita divina explícita.
  - «Español» se ha formulado en registro neutral latinoamericano, con puntuación y sintaxis publicables.
  - La nota a conserva la ambigüedad causal/conclusiva del griego sin sobreinterpretarla.
  - La nota b preserva la carga cultural y hostil del original sin convertirla en comentario doctrinal.
