base_translation:
  language: en
  yaml_path: translation/ot/esther/007/007.yaml
  text: Then the king rose in his wrath from the wine banquet and went into the palace garden[a], but Haman remained to beg Queen Esther for his life[c][b], for he saw that the evil against him had been determined by the king.
  footnotes:
  - marker: a
    text: Or 'stood to seek his life from Esther the queen.' The Hebrew is more literally 'stood to seek for his life from Esther the queen.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for he saw that the disaster against him was finished/decided from the king.' The Hebrew expression conveys that the king's judgment against Haman was now fixed.
    reason: lexical_alternative
  - marker: c
    text: '''Palace garden'' translates a phrase that could also be rendered ''garden of the pavilion'' or ''garden of the palace complex.'''
    reason: cultural_note
