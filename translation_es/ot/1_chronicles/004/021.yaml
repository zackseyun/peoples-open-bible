review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura genealógica del hebreo: «Los hijos de Sela, hijo de Judá», «Er, padre de Lecá», «Laada, padre de Maresá» y la cláusula final sobre «los clanes de la casa de los trabajadores del lino de la casa de Asbea». También preserva adecuadamente el valor transparente de אֲבִי como «padre de», con nota para «fundador/antepasado». Sin embargo, la nota al pie no sigue del todo la revisión inglesa auditada: conserva «Bet-Asbea» como alternativa, cuando la revisión final del POB favorece entender לְבֵית אַשְׁבֵּעַ como «de la casa de Ashbea/Asbea», no como topónimo locativo. Conviene ajustar esa alternativa para alinear mejor el español con la decisión auditada.'
  spanish_quality_summary: 'El español es claro y legible. La sintaxis general funciona bien en un registro bíblico moderno y digno. El único problema notable es de consistencia terminológica y de nota: la forma alternativa «de Bet-Asbea» reintroduce una lectura que la auditoría inglesa corrigió. Además, es preferible mantener la forma del nombre propio final como «Asbea» también en la nota para coherencia interna.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres propios están castellanizados de forma razonable. «Clanes», «casa de» y «padre de» están bien alineados con las decisiones léxicas del POB. La corrección necesaria es en la nota léxica de לְבֵית אַשְׁבֵּעַ, para reflejar «de la casa de Asbea» en vez de «de Bet-Asbea».
  issues:
  - severity: medium
    issue: La nota al pie conserva la alternativa «de Bet-Asbea».
    rationale: La revisión auditada del POB cambió explícitamente la lectura final de una asociación locativa/toponímica («at Beth-ashbea») a una designación de casa/linaje («of the house of Ashbea»). Mantener «Bet-Asbea» como alternativa principal en español desalinearía la nota con esa decisión documentada.
  - severity: low
    issue: Inconsistencia onomástica entre «Asbea» en el texto y «Bet-Asbea» en la nota.
    rationale: Aunque puede presentarse una alternativa, la nota debería mantener coherencia con la forma española adoptada y con la explicación de que se trata probablemente de una casa/linaje, no simplemente de un lugar.
  revised_spanish_text: 'Los hijos de Sela, hijo de Judá: Er, padre de Lecá[a], y Laada, padre de Maresá, y los clanes de la casa de los trabajadores del lino de la casa de Asbea.'
  revised_footnotes:
  - marker: a
    text: 'O: «de la casa de quienes trabajaban el lino fino, de la casa de Asbea». La expresión hebrea está muy comprimida, y la fórmula anterior «padre de» también puede implicar «fundador de» o «antepasado de».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que ya es fiel y natural, pero se corrige la nota al pie para alinearla con la decisión auditada del POB sobre לְבֵית אַשְׁבֵּעַ como designación de casa/linaje («de la casa de Asbea») en lugar de una lectura locativa/toponímica («Bet-Asbea»).
