translation:
  language: es
  text: 'Nabucodonosor, rey de Babilonia, dio órdenes acerca de Jeremías por medio de Nabuzaradán[a], el capitán de la guardia, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefe de los verdugos»; literalmente, «jefe de los carniceros» o «de los degolladores».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: HALOT
  rationale: צוה expresa la acción de dar una orden o mandato. En español, «dio órdenes» reproduce bien el valor verbal y conserva el tono narrativo introductorio antes del discurso citado.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrezzar
  lexicon: uso tradicional del nombre propio
  rationale: Se adopta la forma española tradicional y reconocible del nombre real, sin alterar la identificación del personaje.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey sobre Babilonia
  lexicon: HALOT
  rationale: El constructo hebreo identifica título y reino de forma directa; «rey de Babilonia» es la equivalencia natural y fiel en español.
- source_word: עַל יִרְמְיָהוּ
  english_pob_choice: concerning Jeremiah
  chosen_spanish: acerca de Jeremías
  alternatives_spanish:
  - sobre Jeremías
  - respecto de Jeremías
  lexicon: HALOT
  rationale: Con צוה, עַל puede introducir el asunto o la persona sobre quien recae la orden. «Acerca de Jeremías» conserva ese valor de asunto/objeto de la instrucción, sin sugerir todavía que se le esté hablando directamente.
- source_word: בְּיַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: La locución hebrea indica mediación o agencia indirecta. «Por medio de» expresa con claridad esa mediación en español y mantiene el sentido del original.
- source_word: נְבוּזַרְאֲדָן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nabuzaradán
  alternatives_spanish:
  - Nebuzaradán
  lexicon: transliteración española convencional
  rationale: Se usa la transliteración adaptada al español, coherente con el nombre propio y legible para lectores bíblicos en español.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el jefe de los matadores
  lexicon: HALOT
  rationale: Aunque la expresión literalmente remite a «jefe de los matadores/carniceros», en contexto real funciona como título oficial. «Capitán de la guardia» conserva la referencia funcional sin perder la base semántica del cargo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: El infinitivo quotativo introduce el contenido de la orden. «Diciendo» es la correspondencia natural y sobria en español.
translation_notes:
  revision_awareness: La versión inglesa revisada quedó sin cambios; el español sigue de cerca la estructura y decisiones léxicas auditadas, conservando el nombre propio del rey en forma española tradicional y manteniendo el título oficial con una nota léxica para la alternativa más literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Capitán de la guardia» se conserva como equivalente funcional del cargo, con nota para la alternativa literal.
  - La puntuación reproduce el carácter introductorio de la cláusula y prepara la cita del versículo siguiente.
