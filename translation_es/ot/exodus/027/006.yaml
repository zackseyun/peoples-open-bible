translation:
  language: es
  text: Harás varas para el altar, varas de madera de acacia, y las recubrirás de bronce[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cobre' por 'bronce'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás tú
  lexicon: HALOT
  rationale: La forma verbal en contexto instruccional expresa mandato. En español, el futuro simple transmite bien ese valor normativo sin añadir una perífrasis más pesada.
- source_word: בַדִּים / בַּדֵּי
  english_pob_choice: poles
  chosen_spanish: varas
  alternatives_spanish:
  - poles
  - bastones
  - estacas
  lexicon: HALOT
  rationale: El término designa piezas largas para transportar o sostener. 'Varas' es natural en español bíblico y comunica mejor la función que 'poles', sin perder la imagen material. 'Bastones' sugiere un objeto de mano y 'estacas' una fijación al suelo.
- source_word: לַמִּזְבֵּחַ
  english_pob_choice: for the altar
  chosen_spanish: para el altar
  alternatives_spanish:
  - para el altar del holocausto
  - para el altar de holocausto
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'para el altar'. Se mantiene esa amplitud y no se importa una identificación más específica que no está en el verso.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: acacia wood
  chosen_spanish: madera de acacia
  alternatives_spanish:
  - madera de shittim
  - madera de acacias
  lexicon: HALOT
  rationale: La construcción de material se expresa de forma natural como 'madera de acacia'. Conserva la referencia botánica y evita el trasliterado 'shittim', que sería opaco para el lector general.
- source_word: וְצִפִּיתָ
  english_pob_choice: and you shall overlay
  chosen_spanish: y las recubrirás
  alternatives_spanish:
  - y las cubrirás
  - y las revestirás
  lexicon: HALOT
  rationale: En contexto de objetos del tabernáculo, el verbo indica recubrir con metal. 'Recubrir' comunica esa acción de manera clara y fiel, sin forzar un tecnicismo de metalurgia.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las varas
  - ellos
  lexicon: HALOT
  rationale: El pronombre retoma 'varas' y en español concuerda mejor en femenino plural con 'varas'. La referencia implícita se entiende sin necesidad de repetir el antecedente.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el contexto de los muebles del tabernáculo, la tradición de traducción y el valor material probable favorecen 'bronce'. Se conserva la alternativa 'cobre' como posibilidad léxica.
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el audit trail inglés: se mantiene la estructura directiva, el objeto ''altar'', el material ''madera de acacia'' y el recubrimiento metálico. La única decisión principal de estilo fue usar ''varas'' en lugar de un calco como ''poles'', para lograr un español bíblico natural sin perder la función de transporte/soporte.'
  spanish_consistency_notes:
  - Se mantiene el tono legal/instruccional del hebreo con futuro simple.
  - '''Bronce'' se conserva como término estándar de tabernáculo, con ''cobre'' como alternativa léxica.'
  - No se añade especificación ('del holocausto') porque el verso hebreo no la contiene.
  - El pronombre objeto se ajusta a la concordancia natural del español con 'varas'.
