translation:
  text: |-
    For eighteen years my father made peace with his brother Esau, and his sons were with us after we came from Mesopotamia, from Laban.
    
    2 And when the eighteen years were fulfilled, Esau, my father's brother, came against us with a heavy and powerful people.
    
    3 And Jacob struck Esau with a bow, and he fell, slain by Jacob's bow, dead on Mount Seir.
    
    4 And we pursued the sons of Esau, and they also had a fortified city, and we were not able to enter it. But sitting down around it, we besieged it.
    
    5 And because they did not open to us after twenty days, while they were watching, I brought up a ladder; and placing my shield over my head, and receiving the stones, I went up and killed four of their mighty men.
    
    6 And Reuben and Gad killed another six. Then they entered in succession.
    
    7 Then they asked from us terms of peace, and after counsel had been taken with our father, we accepted them.
    
    8 And they were giving us five hundred cors of wheat, and five hundred measures of oil, and five hundred measures of wine, until the famine, when we went down into Egypt.
