    text: O «bondad y verdad», o «misericordia y fidelidad». La pareja hebrea חֶסֶד וֶאֱמֶת a menudo denota amor leal junto con fiabilidad o verdad.
    reason: lexical_alternative
  revision_rationale: 'Se revisa la pareja clave חֶסֶד וֶאֱמֶת para alinearla con la evidencia léxica y la rationale auditada de la POB inglesa: ''amor leal y fidelidad'' preserva mejor el sentido relacional que ''misericordia y verdad''. También se cambia ''maquinan'' por ''planean'' en ambas colas para mantener el paralelismo del hebreo con un español más natural y sin connotación negativa impropia en ''el bien''.'
