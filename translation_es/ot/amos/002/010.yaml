translation:
  language: es
  text: Pero yo los hice subir de la tierra de Egipto, y los guié en el desierto cuarenta años, para tomar posesión de la tierra de los amorreos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tierra del amorreo». El hebreo usa el singular «amorreo» como término colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנֹכִי
  english_pob_choice: Yet I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: La combinación del conjuntivo con el pronombre independiente es enfática y contrastiva; en español, «Pero yo» conserva mejor la oposición retórica frente a las acusaciones del contexto que un simple «Y yo».
- source_word: הֶעֱלֵיתִי
  english_pob_choice: brought you up
  chosen_spanish: los hice subir
  alternatives_spanish:
  - los saqué
  - los traje arriba
  lexicon: HALOT
  rationale: El verbo hifil de עלה expresa hacer subir/conducir hacia arriba, con eco del éxodo. «Los hice subir» preserva la imagen y el valor direccional sin volverlo rígido.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente «tierra», así que se mantiene. «Tierra» reproduce con fidelidad el sustantivo הארץ/אֶרֶץ y suena natural en español bíblico contemporáneo.
- source_word: וָאוֹלֵךְ
  english_pob_choice: I led
  chosen_spanish: los guié
  alternatives_spanish:
  - los conduje
  - los hice andar
  lexicon: HALOT
  rationale: El hifil de הלך con objeto directo significa hacer ir/dirigir. «Guié» expresa la conducción divina de modo idiomático y fiel.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - a través del desierto
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es «en», en español «los guié por el desierto» comunica con naturalidad el tránsito a lo largo del período del éxodo. Se mantiene el referente «desierto» para מִדְבָּר.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: Expresión numérica directa y estable; no requiere ajuste.
- source_word: לָרֶשֶׁת
  english_pob_choice: to take possession of
  chosen_spanish: para tomar posesión de
  alternatives_spanish:
  - para poseer
  - para heredar
  lexicon: HALOT
  rationale: ירשׁ aquí tiene sentido de apropiación/ocupación de la tierra. «Tomar posesión de» conserva el matiz activo sin cargar el término con una lectura hereditaria más específica de lo que exige el contexto.
- source_word: אֶרֶץ הָאֱמֹרִי
  english_pob_choice: the land of the Amorites
  chosen_spanish: la tierra de los amorreos
  alternatives_spanish:
  - la tierra del amorreo
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo, pero en español «amorreos» es la forma más natural y transparente para el lector actual, y además refleja el valor colectivo reconocido en el audit trail inglés.
theological_decisions:
- issue: Tratamiento del nombre divino implícito en el contexto profético
  english_pob_reading: The verse is framed as Yahvé recounting his saving acts; no masking as 'LORD' in the English audit trail is used here.
  chosen_spanish_reading: Se mantiene la primera persona divina implícita en «yo», sin introducir un rótulo litúrgico como «SEÑOR».
  alternative_spanish_readings:
  - «Pero Yahvé los hizo subir…»
  - «Y yo los hice subir…»
  rationale: El hebreo presenta al hablante divino con el pronombre independiente; en este versículo no aparece el tetragrámaton. Conservar solo el «yo» respeta el texto y evita añadir una designación no presente en el verso.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El audit trail inglés revisó la expresión final para pasar de «the Amorite» a «the Amorites» por claridad natural, sin cambiar el trasfondo colectivo. En español se refleja ese mismo trasfondo con «amorreos», que es natural y comunica la colectividad sin perder fidelidad al hebreo singular.
  spanish_consistency_notes:
  - Se conserva «tierra» en paralelo con el hebreo, aunque en español podría omitirse; aquí la inclusión sirve a la precisión formal.
  - Se eligió «por el desierto» por fluidez narrativa, aunque «en el desierto» sería una alternativa más literal.
  - «Tomar posesión de» mantiene el valor activo de ירשׁ sin introducir teología hereditaria extra.
  - Se usa «amorreos» como colectivo natural en español, coherente con el sentido singular colectivo del hebreo.
