translation:
  language: es
  text: 'Entonces el dueño de la casa vendrá y dirá al sacerdote[a]: «Algo parecido a una plaga me ha parecido ver en la casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como una plaga». El dueño informa solo una condición aparente, no un diagnóstico definitivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: then ... shall come
  chosen_spanish: Entonces ... se acercará
  alternatives_spanish:
  - Y vendrá
  - Luego vendrá
  lexicon: HALOT
  rationale: En contexto legal-procedimental, el verbo marca secuencia de acción; «Entonces» comunica esa progresión y «se acercará» suena natural en español sin perder la idea de desplazamiento hacia la autoridad.
- source_word: אֲשֶׁר לוֹ הַבַּיִת
  english_pob_choice: the owner of the house
  chosen_spanish: el dueño de la casa
  alternatives_spanish:
  - el que tiene la casa
  - el propietario de la casa
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión; «dueño» transmite con claridad la relación de pertenencia en español moderno y conserva el sentido jurídico-práctico del pasaje.
- source_word: וְהִגִּיד לַכֹּהֵן
  english_pob_choice: tell the priest
  chosen_spanish: dirá al sacerdote
  alternatives_spanish:
  - informará al sacerdote
  - se lo reportará al sacerdote
  lexicon: HALOT
  rationale: El verbo הִגִּיד es ‘dar a conocer’ o ‘informar’. En español, «dirá al sacerdote» mantiene la sencillez del acto formal de comunicación, sin introducir un tecnicismo innecesario.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: dicendo
  alternatives_spanish:
  - diciendo
  - y dirá
  lexicon: HALOT
  rationale: Se expresa con el giro natural de cita directa en español. Aquí se integra con dos puntos y comillas, conservando la función introductoria del hebreo.
- source_word: כְּנֶגַע
  english_pob_choice: something like a plague
  chosen_spanish: algo parecido a una plaga
  alternatives_spanish:
  - algo como una plaga
  - algo semejante a una plaga
  - una especie de plaga
  lexicon: HALOT
  rationale: 'La partícula כ indica aproximación: el hablante no hace un diagnóstico definitivo. «Algo parecido a una plaga» preserva esa cautela y mantiene el registro formal de la revisión inglesa.'
- source_word: נִרְאָה לִי
  english_pob_choice: has appeared to me
  chosen_spanish: se me ha aparecido
  alternatives_spanish:
  - me ha parecido
  - se ha visto a mí
  lexicon: HALOT
  rationale: El nifal de ראה aquí comunica algo que se ha presentado a la vista del hablante. «Se me ha aparecido» conserva el valor perceptivo y la limitación de su observación, sin convertirlo en diagnóstico.
- source_word: בַּבָּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  lexicon: HALOT
  rationale: La preposición ב se entiende normalmente como ubicación dentro del edificio afectado; «en la casa» es la forma más natural y fiel en español.
theological_decisions:
- issue: Naturaleza tentativa de la observación del dueño
  english_pob_reading: Something like a plague has appeared to me in the house.
  chosen_spanish_reading: Algo parecido a una plaga se me ha aparecido en la casa.
  alternative_spanish_readings:
  - Parece una plaga en la casa
  - He visto una plaga en la casa
  rationale: El hebreo con כ- y el inglés auditado insisten en que el hablante describe una apariencia, no un veredicto. La versión española mantiene esa cautela para no borrar la diferencia entre sospecha y diagnóstico.
  doctrine_reference: Levítico 14:35; coherencia con la distinción bíblica entre observación y juicio ritual.
translation_notes:
  revision_awareness: La versión sigue la revisión más reciente del POB inglés, que sustituyó «infection» por «plague» para reflejar mejor נגע y mantener un registro más formal. La formulación española conserva esa preferencia y la cautela semántica de כְּנֶגַע.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - Se mantiene «plaga» para נגע en consonancia con el audit trail inglés; no se reemplaza por «infección».
  - Se conserva el matiz aproximativo de כ mediante «algo parecido a».
  - «Dueño de la casa» evita una paráfrasis excesiva y es idiomático en español bíblico contemporáneo.
