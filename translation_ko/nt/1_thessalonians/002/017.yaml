id: 1TH.2.17
reference: 1 Thessalonians 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἡμεῖς δέ, ἀδελφοί, ἀπορφανισθέντες ἀφ’ ὑμῶν πρὸς καιρὸν ὥρας, προσώπῳ οὐ καρδίᾳ, περισσοτέρως ἐσπουδάσαμεν τὸ πρόσωπον ὑμῶν ἰδεῖν ἐν πολλῇ ἐπιθυμίᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/017.yaml
  text: But we[a], brothers, having been torn away from you for a short time—in person, not in heart—were all the more eager, with great longing[b], to see your face.
  footnotes:
  - marker: a
    text: Or more literally, 'having been orphaned from you'; the Greek uses a vivid image of bereavement to describe the separation.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' is Paul''s form of address; in context it likely refers to the whole believing community, including women.'
    reason: cultural_note
translation:
  language: ko
  text: 그러나 형제[b] 여러분, 우리는 잠시 동안 여러분에게서 떨어져 나와[a] —얼굴은 떠나 있었으나 마음은 그렇지 않았기에— 더욱더 큰 그리움으로 여러분의 얼굴을 보기를 간절히 힘썼습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「여러분에게서 고아처럼 떨어져」. 헬라어는 사별의 생생한 이미지를 빌려 분리를 묘사한다.
    reason: lexical_alternative
  - marker: b
    text: 「형제」는 바울의 호칭으로, 본 문맥에서는 여성을 포함한 신앙 공동체 전체를 가리킬 가능성이 크다.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπορφανισθέντες ἀφ’ ὑμῶν
  english_pob_choice: having been torn away from you
  chosen_korean: 여러분에게서 떨어져 나와
  alternatives_korean:
  - 여러분에게서 고아처럼 떨어져
  - 여러분과 헤어져
  lexicon: BDAG
  rationale: ἀπορφανίζομαι의 「고아됨」 비유. 본문에 두면 어색하므로 「떨어져 나오다」로 옮기고 비유는 각주에 살린다.
- source_word: πρὸς καιρὸν ὥρας
  english_pob_choice: for a short time
  chosen_korean: 잠시 동안
  alternatives_korean:
  - 짧은 시간 동안
  - 한 때 잠깐
  lexicon: BDAG
  rationale: 「한 시간의 때 동안」을 자연스러운 한국어 「잠시」로 옮긴다.
- source_word: προσώπῳ οὐ καρδίᾳ
  english_pob_choice: in person, not in heart
  chosen_korean: 얼굴은 떠나 있었으나 마음은 그렇지 않았기에
  alternatives_korean:
  - 얼굴로는, 마음으로는 아니지만
  - 모습으로는 떠났지만 마음으로는 떠나지 않았기에
  lexicon: BDAG
  rationale: 헬라어 압축 구문을 한국어 자연 어순으로 풀어낸다. 의미 손실 없이 본문의 대조를 분명히 한다.
- source_word: περισσοτέρως ἐσπουδάσαμεν
  english_pob_choice: were all the more eager
  chosen_korean: 더욱더 ... 간절히 힘썼습니다
  alternatives_korean:
  - 한층 더 열심을 내었습니다
  - 더욱 간절히 노력하였습니다
  lexicon: BDAG
  rationale: 비교급 부사와 σπουδάζω의 「힘쓰다·간절히 하다」를 자연스럽게 결합한다.
- source_word: ἐν πολλῇ ἐπιθυμίᾳ
  english_pob_choice: with great longing
  chosen_korean: 큰 그리움으로
  alternatives_korean:
  - 큰 갈망으로
  - 깊은 사모함으로
  lexicon: BDAG
  rationale: ἐπιθυμία는 본 문맥에서 긍정적 갈망. 「그리움」이 인격적 관계 정황에 가장 잘 어울린다.
