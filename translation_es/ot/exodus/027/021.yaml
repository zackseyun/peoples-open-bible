base_translation:
  language: en
  yaml_path: translation/ot/exodus/027/021.yaml
  text: In the tent of meeting[a], outside the veil that is before the testimony, Aaron and his sons shall arrange it before Yahweh from evening until morning[c][b]. It shall be a perpetual statute throughout their generations from the Israelites.
  footnotes:
  - marker: a
    text: Or 'shall set it in order' for 'shall arrange it.' The Hebrew verb can denote arranging or ordering the lamp service.
    reason: lexical_alternative
  - marker: b
    text: Or 'outside the curtain.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the testimony' likely refers to the covenant tablets housed in the ark; thus 'before the testimony' describes the veil's position relative to the ark.
    reason: cultural_note
