theological_decisions:
- issue: Whether to harmonize the Hebrew to the better-known Elijah wording from 2 Kings 2:11 and the fuller Greek Sirach reading
  chosen_reading: 'Retain the Hebrew witness''s less explicit imagery in the main text: ''into the heavens ... in ranks of fire,'' with the Greek fuller reading preserved in a footnote.'
  alternative_readings:
  - '''who was taken up in a whirlwind of fire, in a chariot with fiery horses'''
  - '''who was taken up in a storm, in a chariot of fiery horses'''
  rationale: The project prioritizes the surviving Hebrew of Sirach where extant. The Greek parallel is genuine translation input and clarifies the Elijah allusion, but the Hebrew does not explicitly contain 'chariot' or 'horses.' Preserving the Greek fuller form in a footnote maintains transparency without overruling the primary witness.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve tension rather than resolve it.'
