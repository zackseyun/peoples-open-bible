translation:
  language: es
  text: 'Si le parece bien al rey[a], salga de delante de él un decreto real y sea escrito entre las leyes de Persia y de Media, para que no sea revocado[b]: que Vasti no entre ante el rey Asuero, y que el rey dé su condición de reina[c] a otra mujer mejor que ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si le agrada al rey».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no sea alterado» o «para que no sea transgredido». El modismo hebreo expresa la fuerza legal fija del decreto.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «su realeza» o «su dignidad/condición real».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  english_pob_choice: If it seems good to the king
  chosen_spanish: Si le parece bien al rey
  alternatives_spanish:
  - Si agrada al rey
  - Si es bueno a los ojos del rey
  lexicon: HALOT
  rationale: El hebreo expresa una fórmula cortés de aprobación real; en español, «le parece bien» comunica esa deferencia de modo natural sin perder el valor de טוב en este contexto.
- source_word: יֵצֵא דְבַר מַלְכוּת מִלְּפָנָיו
  english_pob_choice: let a royal decree go out from before him
  chosen_spanish: salga de delante de él un decreto real
  alternatives_spanish:
  - salga un edicto real de su presencia
  - salga de su presencia un decreto real
  lexicon: HALOT
  rationale: «Decreto real» transmite la fuerza administrativa de דְבַר מַלְכוּת; «de delante de él» conserva la idea de procedencia desde la presencia/autoridad del rey mejor que un simple «de él».
- source_word: וְיִכָּתֵב בְּדָתֵי פָרַס וּמָדַי
  english_pob_choice: and be written among the laws of Persia and Media
  chosen_spanish: y sea escrito entre las leyes de Persia y de Media
  alternatives_spanish:
  - y sea escrito en las leyes de Persia y de Media
  - y sea inscrito entre las leyes de Persia y de Media
  lexicon: HALOT
  rationale: «Entre las leyes» refleja la incorporación del decreto al cuerpo legal vigente; «Persia y de Media» sigue el orden hebreo y mantiene la referencia política.
- source_word: וְלֹא יַעֲבוֹר
  english_pob_choice: so that it may not be revoked
  chosen_spanish: para que no sea revocado
  alternatives_spanish:
  - para que no sea alterado
  - para que no sea transgredido
  lexicon: HALOT
  rationale: En este contexto jurídico, el verbo expresa que el decreto no pueda ser anulado o dejado sin efecto; «revocado» es la equivalencia legal más clara en español contemporáneo.
- source_word: אֲשֶׁר לֹא תָבוֹא וַשְׁתִּי לִפְנֵי הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: that Vashti is not to come before King Ahasuerus
  chosen_spanish: que Vasti no entre ante el rey Asuero
  alternatives_spanish:
  - que Vasti no venga ante el rey Asuero
  - que Vasti no comparezca ante el rey Asuero
  lexicon: HALOT
  rationale: «Entrar ante» en español comunica la comparecencia cortesana requerida por el hebreo; se omite «otra vez» porque no está explicitado en el texto fuente.
- source_word: וּמַלְכוּתָהּ
  english_pob_choice: her royal position
  chosen_spanish: su posición real
  alternatives_spanish:
  - su realeza
  - su reinado/condición de reina
  - su queenship
  lexicon: HALOT
  rationale: El término designa el cargo o estatus real de Vasti, no un territorio; «posición real» preserva ese sentido sin introducir un término poco natural como «realeza» en este contexto narrativo.
- source_word: לִרְעוּתָהּ הַטּוֹבָה מִמֶּנָּה
  english_pob_choice: to another woman better than she
  chosen_spanish: a otra mujer mejor que ella
  alternatives_spanish:
  - a otra compañera mejor que ella
  - a otra mujer más digna que ella
  lexicon: HALOT
  rationale: רְעוּתָהּ se entiende aquí como otra mujer en relación con ella; «otra mujer» mantiene la claridad narrativa sin especificar más de lo que el hebreo da.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del audit trail: conserva «de delante de él» para מִלְּפָנָיו y omite cualquier añadido como «otra vez» que no está en el hebreo. También mantiene la lectura jurídica de וְלֹא יַעֲבוֹר como «no sea revocado», coherente con la decisión inglesa revisada y con el contexto legal del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «rey Asuero» como forma natural y consistente con el nombre propio en español bíblico.
  - «Decreto real» y «leyes de Persia y de Media» conservan el registro jurídico del hebreo.
  - Se evita «reina» para וּמַלְכוּתָהּ porque el término hebreo enfatiza estatus/posición real, no un título distinto.
