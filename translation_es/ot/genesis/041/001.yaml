    rationale: Si se conserva una nota alternativa, debe ir en «Nilo» para reflejar la alternativa léxica de הַיְאֹר, no en «he aquí».
  revised_spanish_text: Al cabo de dos años completos[a], el faraón soñó, y he aquí que estaba de pie junto al Nilo[b].
