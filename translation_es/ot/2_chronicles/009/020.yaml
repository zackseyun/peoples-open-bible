translation:
  language: es
  text: Todos los vasos para beber del rey Salomón eran de oro, y todos los vasos de la Casa del Bosque del Líbano[a] eran de oro puro[b]. La plata no se consideraba cosa alguna[c] en los días de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el palacio del Bosque del Líbano», un edificio real con nombre propio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «oro cerrado»; modismo que suele entenderse como «oro puro» o «oro refinado».'
    reason: lexical_alternative
  - marker: c
    text: O «la plata no se consideraba de ningún valor en los días de Salomón».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי מַשְׁקֵה
  english_pob_choice: drinking vessels
  chosen_spanish: vasos para beber
  alternatives_spanish:
  - vasos de beber
  - utensilios para beber
  - copas
  lexicon: HALOT
  rationale: כְּלֵי es un término amplio para recipientes/objetos, y מַשְׁקֵה especifica el uso para beber. «Vasos para beber» conserva la concreción sin estrechar indebidamente el sentido a solo «copas».
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro puro
  - dorados
  lexicon: HALOT
  rationale: Es el material literal del texto. Se mantiene «oro» en ambas ocurrencias para conservar el énfasis repetido del hebreo.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  english_pob_choice: the House of the Forest of Lebanon
  chosen_spanish: la Casa del Bosque del Líbano
  alternatives_spanish:
  - el palacio del Bosque del Líbano
  - la casa real del Bosque del Líbano
  lexicon: HALOT
  rationale: «Casa» refleja directamente בֵּית y preserva el carácter de nombre propio del edificio; «palacio» sería una interpretación posible, pero el POB en inglés la dejó como alternativa, así que se mantiene la forma más literal y auditables en español.
- source_word: זָהָב סָגוּר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro cerrado
  lexicon: HALOT
  rationale: סָגוּר con oro es un modismo de metal fino/refinado. «Oro puro» comunica el sentido idiomático con naturalidad en español y evita la opacidad de una traducción demasiado literal.
- source_word: אֵין כֶּסֶף נֶחְשָׁב ... לִמְאוּמָה
  english_pob_choice: Silver was not considered anything
  chosen_spanish: La plata no era considerada nada
  alternatives_spanish:
  - La plata no era considerada de ningún valor
  - La plata no era tenida por nada
  - La plata no se consideraba cosa alguna
  lexicon: HALOT
  rationale: La cláusula expresa la insignificancia de la plata en tiempos de Salomón. «No era considerada nada» conserva cercanía al hebreo y su fuerza retórica sin añadir una explicación interpretativa innecesaria.
- source_word: בִּימֵי שְׁלֹמֹה
  english_pob_choice: in the days of Solomon
  chosen_spanish: en los días de Salomón
  alternatives_spanish:
  - durante el reinado de Salomón
  lexicon: HALOT
  rationale: Se preserva el modismo temporal hebreo. «En los días de Salomón» es natural en español bíblico contemporáneo y mantiene el marco histórico del texto.
translation_notes:
  revision_awareness: 'El pasaje coincide con el control de revisión más reciente: no se registraron cambios necesarios y el cotejo final quedó en alta concordancia con el texto fuente y la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «Casa del Bosque del Líbano» y no se sustituye por «palacio», siguiendo la decisión auditada del POB en inglés.
  - «Oro puro» traduce el modismo de סָגוּר sin perder la referencia material ni la calidad del metal.
  - «La plata no era considerada nada» reproduce la valoración negativa del hebreo sin ampliar el sentido más allá del texto.
