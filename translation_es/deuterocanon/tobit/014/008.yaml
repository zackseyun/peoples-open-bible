translation:
  language: es
  text: Y ahora,[a] hijo, sal de Nínive, porque sin duda sucederá lo que el profeta Jonás dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «niño» para τέκνον; es un término filial de trato y puede rendirse de ambas maneras según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo
  lexicon: BDAG
  rationale: τέκνον es un término filial de trato. En español, «niño» comunica el tono afectuoso y directo de la apelación sin añadir explícitamente la relación masculina que no exige el griego. «Hijo» sería posible en un registro más familiar, pero estrecha demasiado el sentido.
- source_word: ἄπελθε
  english_pob_choice: depart
  chosen_spanish: sal
  alternatives_spanish:
  - vete
  - aléjate
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una salida inmediata. «Sal» es natural en español y conserva el mandato breve y solemne; «vete» sería más coloquial, y «aléjate» introduce una matiz no requerido por el verbo.
- source_word: ἀπὸ Νινευή
  english_pob_choice: from Nineveh
  chosen_spanish: de Nínive
  alternatives_spanish:
  - fuera de Nínive
  - lejos de Nínive
  lexicon: BDAG
  rationale: La preposición ἀπό señala separación. «De Nínive» es la forma más directa y idiomática en español; las otras opciones refuerzan la idea de alejamiento pero añaden más de lo que el griego dice.
- source_word: πάντως
  english_pob_choice: will surely
  chosen_spanish: sin duda
  alternatives_spanish:
  - ciertamente
  - seguramente
  lexicon: BDAG
  rationale: πάντως intensifica la certeza. «Sin duda» transmite bien esa fuerza enfática en español natural, sin volver la frase artificial.
- source_word: ἔσται
  english_pob_choice: happen
  chosen_spanish: sucederá
  alternatives_spanish:
  - será
  - acontecerá
  - se cumplirá
  lexicon: BDAG
  rationale: Aunque literalmente sería «será», en este contexto profético el español exige un verbo de acontecimiento. «Sucederá» expresa bien el cumplimiento futuro sin interpretar más allá del texto.
- source_word: ἃ ἐλάλησεν
  english_pob_choice: what ... spoke
  chosen_spanish: lo que ... habló
  alternatives_spanish:
  - lo que ... dijo
  - las cosas que ... habló
  lexicon: BDAG
  rationale: La construcción relativa remite al contenido de la proclamación profética. «Lo que ... habló» mantiene la cercanía al griego y conserva el matiz profético de ἐλάλησεν; «dijo» sería posible, pero menos marcado.
- source_word: ὁ προφήτης Ἰωνᾶς
  english_pob_choice: the prophet Jonah
  chosen_spanish: el profeta Jonás
  alternatives_spanish:
  - Jonás el profeta
  lexicon: BDAG
  rationale: Se conserva el título directo y la forma habitual del nombre en español bíblico. «El profeta Jonás» es natural y claro; la inversión «Jonás el profeta» también es fiel, pero menos fluida en español.
theological_decisions:
- issue: Certidumbre profética sobre Nínive
  english_pob_reading: 'Render the statement as an emphatic prediction: ''what the prophet Jonah spoke will surely happen.'''
  chosen_spanish_reading: 'La frase se traduce como una predicción enfática: «sin duda sucederá lo que el profeta Jonás habló».'
  alternative_spanish_readings:
  - «ciertamente se cumplirá lo que el profeta Jonás dijo»
  - «lo que el profeta Jonás habló acontecerá sin falta»
  rationale: El texto presenta la seguridad de la profecía de Jonás respecto a Nínive. La traducción debe conservar esa certeza enfática sin añadir detalles sobre el modo o el momento del cumplimiento. «Sucederá» mantiene el carácter de acontecimiento futuro; «se cumplirá» sería válido si se quisiera enfatizar más explícitamente el cumplimiento profético.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia y no requieren una revisión sustantiva. Se preservó la fuerza enfática de πάντως, el valor de ἔσται como futuro de acontecimiento, y el carácter filial de τέκνον con una nota alternativa en español. No se introdujeron ampliaciones interpretativas ni se suavizó la referencia profética.
  spanish_consistency_notes:
  - Se mantiene «Nínive» con tilde según el uso español bíblico estándar.
  - Se usa «Jonás» para el nombre propio conforme a la tradición bíblica en español.
  - La puntuación conserva el tono exhortativo y profético de la frase breve del griego.
  - El marcador de nota [a] aparece en el lugar exacto del término con alternativa léxica.
