translation:
  language: es
  text: Recubrirás de oro los marcos[a], harás sus anillos de oro como soportes para las barras[b], y recubrirás de oro las barras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tablas’. El hebreo se refiere a las piezas estructurales del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, ‘casas para las barras’, es decir, receptáculos o soportes para las barras.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְּרָשִׁים
  english_pob_choice: the frames
  chosen_spanish: los marcos
  alternatives_spanish:
  - las tablas
  - los tableros
  - las placas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, קֶרֶשׁ designa las piezas estructurales que forman el armazón. ‘Marcos’ comunica mejor su función constructiva en español que ‘tablas’ o ‘tableros’, y mantiene la idea de una estructura ensamblada.
- source_word: תְּצַפֶּה / וְצִפִּיתָ
  english_pob_choice: you shall overlay
  chosen_spanish: cubrirás de oro
  alternatives_spanish:
  - recubrirás de oro
  - forrarás de oro
  - plaque arás con oro
  lexicon: HALOT
  rationale: צפה en este pasaje implica un revestimiento con metal precioso. ‘Cubrirás de oro’ es natural en español y refleja el sentido de recubrimiento, aunque ‘recubrirás de oro’ también sería viable. Evito ‘forrar’ por sonar menos digno y ‘plaquear’ por ser más técnico/menos transparente.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: ‘Oro’ es el término directo y claro para el material mencionado; la repetición en hebreo se conserva con la misma repetición en español para mantener énfasis y ritmo técnico.
- source_word: טַבְּעֹתֵיהֶם
  english_pob_choice: their rings
  chosen_spanish: sus anillos
  alternatives_spanish:
  - sus anillas
  - sus argollas
  - sus aros
  lexicon: HALOT
  rationale: טַבַּעַת puede referirse a anillos o aros metálicos. En este montaje, ‘anillos’ es comprensible y cercano al término básico; ‘anillas’ o ‘argollas’ sonarían más especializados pero menos neutros.
- source_word: בָּתִּים לַבְּרִיחִם
  english_pob_choice: as holders for the bars
  chosen_spanish: como soportes para las barras
  alternatives_spanish:
  - como alojamientos para las barras
  - como receptáculos para las barras
  - como casas para las barras
  lexicon: HALOT
  rationale: La expresión literal ‘casas para las barras’ es demasiado extraña en español. ‘Soportes’ conserva la función de sostener/recibir las barras sin perder el valor técnico. ‘Alojamientos’ o ‘receptáculos’ son más literales, pero menos naturales en una frase de fabricación.
- source_word: הַבְּרִיחִם
  english_pob_choice: the bars
  chosen_spanish: las barras
  alternatives_spanish:
  - los travesaños
  - las varas
  - los barrotes
  lexicon: HALOT
  rationale: בְּרִיחַ denota las barras que unen y aseguran la estructura. ‘Barras’ es la correspondencia más directa y amplia; ‘travesaños’ interpreta más específicamente su orientación, y ‘barrotes’ sugiere una imagen incorrecta.
translation_notes:
  revision_awareness: El texto inglés del POB permanece sin cambios en la última revisión; el presente borrador sigue esa lectura de alta concordancia y traslada sus decisiones léxicas al español con ajuste idiomático mínimo.
  spanish_consistency_notes:
  - Se mantiene la repetición de ‘oro’ tres veces, como en el hebreo y en el audit trail inglés, para preservar énfasis y estructura.
  - Se evita ‘SEÑOR’ u otras convenciones teológicas no pertinentes aquí; el verso es puramente técnico-descriptivo.
  - ‘Marcos’ y ‘barras’ conservan la terminología constructiva del tabernáculo sin introducir una lectura doctrinal o litúrgica ajena.
