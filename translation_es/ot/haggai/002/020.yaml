revisions:
- from: Y aconteció la palabra de Yahvé por segunda vez a Hageo, el día veinticuatro del mes, diciendo,
  to: Y la palabra de Yahvé vino por segunda vez a Hageo, el día veinticuatro del mes, diciendo,
  rationale: Se sustituye 'Y aconteció la palabra de Yahvé' por 'Y la palabra de Yahvé vino' para representar con mayor fidelidad e idiomaticidad la fórmula profética hebrea וַיְהִי דְבַר־יְהוָה, en coherencia con el audit trail inglés ('came'). No se requieren notas al pie nuevas.
