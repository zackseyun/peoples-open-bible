revisions:
- from: Pero él salva al necesitado de la espada de su boca[a], y de la mano del fuerte.
  to: Pero él salva al necesitado de la espada de la boca de ellos[a], y de la mano del fuerte.
  rationale: Se ajusta la frase para reflejar con más claridad el plural hebreo («de ellos») sin perder la metáfora central. También se mejora la nota para que exprese la alternativa interpretativa de forma más natural en español.
