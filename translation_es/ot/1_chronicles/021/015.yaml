base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/021/015.yaml
  text: And God sent an angel to Jerusalem to destroy it[a], but as he was destroying it, Yahweh saw and relented concerning the calamity, and he said to the destroying angel, “Enough[b]; now withdraw your hand.” And the angel of Yahweh was standing by the threshing floor of Ornan the Jebusite.
  footnotes:
