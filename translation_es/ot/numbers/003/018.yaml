  - Libní
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado; se mantiene la forma breve sin añadir acento no atestiguado en la fuente.
- source_word: וְשִׁמְעִי
  english_pob_choice: and Shimei
  chosen_spanish: y Shimei
  alternatives_spanish:
  - y Siméi
  - y Simeí
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado; se conserva la forma del audit trail inglés para evitar introducir una variante no respaldada por el paquete fuente.
