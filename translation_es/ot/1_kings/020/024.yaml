revisions:
- from: 'Y haz esto: quita a los reyes, a cada uno de su puesto, y pon gobernadores[a] en su lugar.'
  to: 'Y haz esto: quita a los reyes, a cada uno de su puesto, y pon gobernadores[a] en lugar de ellos.'
  rationale: Se conserva casi todo el borrador, pero se cambia «en su lugar» por «en lugar de ellos» para reflejar con más claridad el plural de תַּחְתֵּיהֶם y evitar ambigüedad referencial en español. Luego se simplifica la nota para que preserve la alternativa léxica principal sobre פַּחוֹת sin duplicar un matiz ya incorporado al texto.
