revisions:
- from: Así Josué envió mensajeros[a], y ellos corrieron hacia la tienda; y he aquí, estaba escondido en su tienda, con la plata debajo de ella.
  to: Así Josué envió mensajeros[a], y corrieron a la tienda; y he aquí que estaba escondido en su tienda, con la plata debajo de ella.
  rationale: Se ajusta «hacia la tienda» a «a la tienda» para reflejar mejor la fuerza direccional del hebreo en contexto. Se suaviza levemente la transición con «y he aquí que» para mejorar la naturalidad del español sin perder la viveza narrativa. Se corrige la nota al pie eliminando la comilla inicial sobrante.
