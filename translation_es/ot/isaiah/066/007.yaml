translation:
  language: es
  text: Antes de que estuviera de parto[a], dio a luz; antes de que le sobreviniera el dolor[b], dio a luz un varón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que vinieran sobre ella los dolores del parto»'
    reason: lexical_alternative
  - marker: b
    text: La referencia femenina apunta a Sion/Jerusalén en el contexto circundante.
    reason: cross_reference
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de que
  alternatives_spanish:
  - Antes
  - Previo a que
  lexicon: HALOT
  rationale: La partícula temporal expresa anterioridad estricta. «Antes de que» conserva con naturalidad en español la repetición enfática del hebreo y encaja mejor con una subordinada temporal que un simple «antes».
- source_word: תָּחִיל
  english_pob_choice: she was in labor
  chosen_spanish: vinieran los dolores
  alternatives_spanish:
  - estuviera de parto
  - estuviera en labor
  - aparecieran los dolores del parto
  lexicon: HALOT
  rationale: El verbo alude al comienzo de los dolores de parto o a la contracción/labor. En español, «vinieran los dolores» mantiene el sentido de inicio del trabajo de parto sin sonar arcaico; además preserva el matiz de movimiento hacia la mujer que el inglés expresó con una construcción idiomática.
- source_word: יָלָדָה
  english_pob_choice: she gave birth
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - tuvo al hijo
  - dio nacimiento
  lexicon: HALOT
  rationale: Es el equivalente natural y preciso en español para el acto de dar a luz. Evita un calco y conserva el valor verbal completo del hebreo.
- source_word: יָבֹא חֵבֶל לָהּ
  english_pob_choice: pain came upon her
  chosen_spanish: le sobreviniera el dolor
  alternatives_spanish:
  - le viniera el dolor
  - le llegaran los dolores
  - la alcanzara el dolor
  lexicon: HALOT
  rationale: La combinación verbal-sustantiva comunica que el dolor llega a ella. «Le sobreviniera el dolor» mantiene la dirección hacia la mujer y deja abierta la posibilidad de dolor de parto, como en el hebreo.
- source_word: חֵבֶל
  english_pob_choice: pain
  chosen_spanish: el dolor
  alternatives_spanish:
  - los dolores del parto
  - el dolor de parto
  - el trabajo de parto
  lexicon: HALOT
  rationale: En este contexto חֵבֶל se refiere al dolor asociado con el parto. Elegir «el dolor» sigue la decisión inglesa de no repetir necesariamente «parto» y conserva la ambigüedad controlada entre dolor genérico y dolor de parto, mientras el primer hemistiquio ya orienta el lector.
- source_word: וְהִמְלִיטָה
  english_pob_choice: she delivered
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - dio a luz un hijo
  - sacó a luz
  lexicon: HALOT
  rationale: El hiphil de מלט aquí funciona idiomáticamente como traer al mundo. Para el español, repetir «dio a luz» produce una línea fluida y fiel; aunque el inglés varía con «delivered», el hebreo permite esta repetición sin pérdida de sentido.
- source_word: זָכָר
  english_pob_choice: a son
  chosen_spanish: un varón
  alternatives_spanish:
  - un hijo varón
  - un niño varón
  - un hijo
  lexicon: HALOT
  rationale: El término significa literalmente «macho/varón». «Un varón» conserva la especificidad sexual del hebreo sin neutralizarla; en español bíblico es claro y suficientemente natural.
theological_decisions:
- issue: Referente femenino implícito
  english_pob_reading: Kept as an untranslated feminine singular pronoun ('she') without specifying Zion/Jerusalem in the main text.
  chosen_spanish_reading: Mantuve la referencia femenina implícita con el pronombre verbal y sin nombrar a Sion/Jerusalén en el texto principal.
  alternative_spanish_readings:
  - Sion
  - Jerusalén
  - el pueblo de Dios
  rationale: El contexto inmediato apunta a Sion/Jerusalén, pero el versículo en sí solo presenta una secuencia femenina singular. Traducirla sin glosa mantiene la imagen y evita imponer una identificación interpretativa en el cuerpo del texto.
  doctrine_reference: Preservar la tensión interpretativa del pasaje en lugar de resolverla en la traducción.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés de POB y el hebreo masorético: conserva la repetición de la anterioridad («Antes de que... antes de que...»), el paralelismo del parto y la referencia femenina implícita. Se evitaron soluciones más interpretativas como explicitar «los dolores del parto» en el cuerpo principal o nombrar a Sion/Jerusalén dentro del versículo.'
  spanish_consistency_notes:
  - Se mantuvo un registro verbal uniforme con «dio a luz» para una lectura natural y fiel.
  - «Varón» conserva la fuerza léxica de זָכָר sin introducir un término eclesiástico más cargado.
  - Las notas usan una alternancia léxica y una nota de referente para reflejar las decisiones del original inglés.
