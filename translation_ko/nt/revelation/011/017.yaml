id: REV.11.17
reference: 'Revelation 11:17'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λέγοντες· Εὐχαριστοῦμέν σοι, κύριε, ὁ θεός, ὁ παντοκράτωρ, ὁ ὢν καὶ ὁ ἦν, ὅτι εἴληφας τὴν δύναμίν σου τὴν μεγάλην καὶ ἐβασίλευσας.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/017.yaml
  text: 'saying[a], “We give thanks to you, Lord God Almighty, who is and who was[b], because you have taken your great power and begun to reign.”'
  footnotes:
  - marker: a
    text: Or 'the one who is and who was.' Some manuscripts and translations elsewhere in Revelation include 'and who is to come,' but the Greek text here omits that phrase.
    reason: textual_variant
  - marker: b
    text: Or 'have reigned' or 'have become king.' The Greek verb can emphasize the onset or exercise of royal rule; here it likely highlights the public manifestation of God's reign.
    reason: lexical_alternative
translation:
  language: ko
  text: '이르되, 「주 하나님 전능하신 분, 이제도 계시고 전에도 계신 분[a]이여, 주께 감사하나이다. 이는 주께서 큰 권능을 잡으시고 다스리기 시작하셨음이니이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「계시고 계셨던 분」. 헬라어 본문은 본 절에서 「장차 오실」 어구를 생략하며, 이미 다스리기 시작하신 종말론적 현실을 가리킨다.'
    reason: textual_variant
theological_decisions:
- issue: '11:17의 신적 칭호에서 「장차 오실」 어구 생략(SBLGNT)'
  chosen_reading: '「이제도 계시고 전에도 계신 분」'
  alternative_readings:
  - 이제도 계시고 전에도 계셨으며 장차 오실 분
  rationale: '본 절의 SBLGNT 본문은 1:4·1:8·4:8과 달리 「장차 오실」 어구를 명시적으로 생략한다. 일곱째 나팔이 이미 그분의 다스리심을 선포하는 종말론적 시점이기 때문이다. 한국어 번역도 본문의 어구 생략을 그대로 보존한다.'
  doctrine_reference: 'DOCTRINE.md: divine names/titles 보존 + 본문 형식 보존'
