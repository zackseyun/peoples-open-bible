    text: 'O: «Yahvé no ha hablado por mí»; es decir, «por medio de mí».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «pueblos» en plural, un llamado profético de alcance más amplio que «pueblo» en singular.
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar mejor el énfasis condicional del hebreo («Si de veras vuelves»), se corrige la nota [a] para que presente una alternativa real documentada por el rastro inglés, y se mejora la naturalidad del vocativo plural final sin perder el sentido de «all you peoples».
