translation:
  language: es
  text: Estos son los hijos de Sem[a], según sus clanes, según sus lenguas, en sus tierras, según sus naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «según sus clanes ... según sus lenguas ... según sus naciones». El hebreo usa preposiciones repetidas para marcar clasificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: La cláusula nominal hebrea introduce un resumen genealógico; en español se expresa con naturalidad como «Estos son», suprimiendo un verbo implícito que el español requiere.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos de
  lexicon: HALOT
  rationale: En este contexto genealógico, «hijos de» reproduce bien la construcción hebrea y mantiene la formulación tradicional de listas de linaje sin ampliar innecesariamente a «descendientes».
- source_word: שֵׁם
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: convención bíblica española
  rationale: Se usa la forma española habitual «Sem», transparente para el lector de Biblia en español y equivalente al nombre propio del texto fuente.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus clanes
  - según sus familias
  lexicon: HALOT
  rationale: La preposición repetida לְ funciona aquí como marcador de clasificación; «según» preserva mejor el valor distributivo que una traducción causal como «por». «Clanes» refleja el ámbito genealógico de מִשְׁפָּחָה.
- source_word: לִלְשֹׁנֹתָם
  english_pob_choice: by their languages
  chosen_spanish: según sus lenguas
  alternatives_spanish:
  - según sus idiomas
  - por sus lenguas
  lexicon: HALOT
  rationale: «Lenguas» conserva la imagen hebrea y es más cercana al paralelismo de la lista que «idiomas», aunque ambas serían posibles en español moderno.
- source_word: בְּאַרְצֹתָם
  english_pob_choice: in their lands
  chosen_spanish: en sus tierras
  alternatives_spanish:
  - en sus países
  - en sus territorios
  lexicon: HALOT
  rationale: «Tierras» traduce bien אֶרֶץ en plural sin introducir la noción moderna de «países», que sería más específica de lo que el hebreo exige.
- source_word: לְגוֹיֵהֶם
  english_pob_choice: by their nations
  chosen_spanish: según sus naciones
  alternatives_spanish:
  - según sus pueblos
  - por sus naciones
  lexicon: HALOT
  rationale: «Naciones» mantiene el valor de גּוֹי en la enumeración de pueblos. La repetición de לְ se vierte de manera uniforme como «según» para reflejar la lógica clasificatoria del versículo.
theological_decisions:
- issue: Valor clasificatorio de las preposiciones repetidas en la enumeración
  english_pob_reading: Or 'according to their clans ... according to their languages ... according to their nations.' The Hebrew uses repeated prepositions to mark classification.
  chosen_spanish_reading: Según sus clanes ... según sus lenguas ... según sus naciones.
  alternative_spanish_readings:
  - por sus clanes ... por sus lenguas ... por sus naciones.
  - de acuerdo con sus clanes ... de acuerdo con sus lenguas ... de acuerdo con sus naciones.
  rationale: Se conserva el matiz de clasificación/distribución señalado en el audit trail. «Según» es el equivalente español más natural y suficientemente preciso para el valor repetido del לְ hebreo.
  doctrine_reference: Ninguna; decisión de estructura textual y semántica
translation_notes:
  revision_awareness: El examen comparativo del texto fuente hebreo y el contexto auditado en inglés muestra acuerdo alto y sin revisiones aplicadas; por eso la redacción española sigue de cerca la estructura clasificatoria del versículo sin cambios interpretativos adicionales.
  spanish_consistency_notes:
  - 'Se mantiene una terminología consistente: «hijos», «clanes», «lenguas», «tierras» y «naciones».'
  - La nota [a] se ancla en la primera ocurrencia de la fórmula para reflejar la alternativa clasificatoria sin duplicar notas.
  - No se usa «SEÑOR» ni vocabulario teológico no presente en el versículo.
  - «Sem» sigue la forma española estándar de nombre propio bíblico.
