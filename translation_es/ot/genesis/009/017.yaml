translation:
  language: es
  text: 'Y Dios dijo a Noé: «Esta es la señal del pacto que he establecido entre mí y toda carne[a] que está sobre la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “todos los seres vivientes” o “todas las criaturas vivientes”. Hebreo “toda carne”, una expresión amplia para la vida animada sobre la tierra en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo usa אֱלֹהִים, el contexto de Génesis 9 remite al Dios del pacto que habla a Noé. En español POB se prefiere 'Yahvé' cuando el texto hebreo refiere al nombre divino en un marco narrativo-covenantal, para no ocultar el nombre propio tras un título genérico.
- source_word: אֶל נֹחַ
  english_pob_choice: to Noah
  chosen_spanish: a Noé
  alternatives_spanish:
  - a Noach
  lexicon: HALOT
  rationale: La preposición indica destinatario. 'Noé' es la forma española estándar y readable para el nombre propio.
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Ésta es
  lexicon: HALOT
  rationale: El demostrativo introduce una cláusula identificativa; en español natural se expresa como 'Esta es'. Mantiene el valor de señalización del hebreo sin forzar calco.
- source_word: אוֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - marca
  lexicon: HALOT
  rationale: '''Señal'' es el equivalente bíblico natural en español y preserva la idea de un indicador visible y pactal. ''Signo'' sería posible, pero ''señal'' suena más idiomático y sigue la claridad del contexto del pacto.'
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el pacto solemne
  - la alianza
  lexicon: HALOT
  rationale: En español bíblico, 'pacto' comunica bien בְּרִית sin arrastrar automáticamente matices eclesiásticos de 'alianza'. Se conserva la terminología del acuerdo formal que Dios establece.
- source_word: הֲקִמֹתִי
  english_pob_choice: I have established
  chosen_spanish: he establecido
  alternatives_spanish:
  - he confirmado
  - establecí
  lexicon: HALOT
  rationale: El verbo con בְּרִית expresa fundar/establecer formalmente el pacto. El perfecto español 'he establecido' refleja acción completada con vigencia presente, como en el inglés auditado.
- source_word: בֵּינִי וּבֵין
  english_pob_choice: between me and
  chosen_spanish: entre mí y
  alternatives_spanish:
  - entre yo y
  - entre mí mismo y
  lexicon: HALOT
  rationale: La fórmula relacional de pacto se expresa de modo directo y natural en español con 'entre mí y'. Mantiene el paralelismo bilateral del hebreo.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda carne
  - todo ser de carne
  - toda criatura viviente
  lexicon: HALOT
  rationale: Aunque la expresión hebrea es literalmente 'toda carne', en español 'todo ser viviente' comunica la amplitud contextual del pacto noético sin sonar ambiguo o reductivo. Se evita 'humanidad', que sería demasiado estrecho, y 'toda carne', que puede sonar duro o menos claro para lectores modernos.
- source_word: אֲשֶׁר עַל הָאָרֶץ
  english_pob_choice: that is on the earth
  chosen_spanish: que está sobre la tierra
  alternatives_spanish:
  - que está en la tierra
  - que está sobre la faz de la tierra
  lexicon: HALOT
  rationale: '''Sobre la tierra'' reproduce la relación espacial del hebreo עַל הָאָרֶץ de manera natural en español y mantiene el alcance universal del pasaje.'
theological_decisions:
- issue: Naturaleza del destinatario divino en el discurso
  english_pob_reading: God said to Noah
  chosen_spanish_reading: Yahvé dijo a Noé
  alternative_spanish_readings:
  - Dios dijo a Noé
  rationale: La sección pertenece al relato del pacto noético. Nombrar a Dios como 'Yahvé' en el texto español preserva la referencia personal del hablante divino sin enmascararla con un título genérico; el contexto no depende de una substitución litúrgica.
  doctrine_reference: Translation philosophy §1, §2
- issue: Extensión de כָּל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: todo ser viviente
  alternative_spanish_readings:
  - toda carne
  - toda criatura viviente
  - toda humanidad
  rationale: El hebreo y la nota inglesa dejan claro que la frase abarca la vida animal y humana en este contexto. El español 'todo ser viviente' conserva la amplitud semántica sin crear una lectura demasiado literal que pudiera oscurecer el sentido contextual.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a la frase correspondiente. La redacción también ajusta el término para כָּל בָּשָׂר con una equivalencia idiomática que conserva la amplitud contextual señalada por el audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como nombre divino principal, coherente con las pautas del proyecto para el Tetragrámaton en texto español.
  - '''Pacto'' se mantuvo para בְּרִית como término bíblico-formal estable.'
  - La nota al pie está anclada correctamente en 'ser viviente[a]' y no queda ninguna nota sin marca en el texto.
