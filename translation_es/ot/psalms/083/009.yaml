translation:
  language: es
  text: Aun Asiria se unió con ellos; llegaron a ser un brazo[a] para los hijos de Lot[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron fuerza» o «fueron ayuda» para los hijos de Lot. El hebreo dice literalmente «fueron un brazo para los hijos de Lot», conservando la metáfora de apoyo militar.
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Lot» probablemente alude a los pueblos descendientes de Lot, especialmente Moab y Amón.
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: También
  alternatives_spanish:
  - Aun
  - Incluso
  lexicon: HALOT
  rationale: El hebreo גַּם aquí añade énfasis a la inclusión de Asiria en la coalición. En español, «También» comunica esa adición con naturalidad; «Aun» o «Incluso» también podrían servir, pero «También» suena menos forzado en la estructura de la línea poética.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: HALOT
  rationale: En este contexto psalmico se trata de la potencia geopolítica conocida en español como «Asiria». «Asur» sería una transliteración más cercana al hebreo, pero menos natural para el lector hispanohablante.
- source_word: נִלְוָה
  english_pob_choice: joined
  chosen_spanish: se unió
  alternatives_spanish:
  - se juntó
  - se alió
  lexicon: HALOT
  rationale: El nifal de לוה expresa la idea de ser unido o adherido. «Se unió» preserva bien la noción de alianza sin añadir demasiada interpretación; «se alió» explicita más la dimensión militar, pero va un poco más allá del verbo mismo.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: Es la traducción directa y natural de la preposición con sufijo plural. Mantiene la referencia a las naciones mencionadas anteriormente.
- source_word: הָיוּ
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron
  - se volvieron
  lexicon: HALOT
  rationale: 'Aunque היה puede traducirse «eran» o «fueron», aquí funciona mejor como desarrollo predicativo: Asiria pasó a desempeñar ese papel. «Llegaron a ser» conserva ese matiz dinámico sin perder fidelidad.'
- source_word: זְרוֹעַ
  english_pob_choice: an arm
  chosen_spanish: un brazo
  alternatives_spanish:
  - fuerza
  - ayuda
  lexicon: HALOT
  rationale: Se preserva la metáfora corporal del hebreo. En español «brazo» mantiene el valor figurado de poder o apoyo militar. Las alternativas «fuerza» y «ayuda» son interpretativas y se reservan para notas.
- source_word: לִבְנֵי לוֹט
  english_pob_choice: for the sons of Lot
  chosen_spanish: para los hijos de Lot
  alternatives_spanish:
  - para los descendientes de Lot
  - para los hijos de Lot
  lexicon: HALOT
  rationale: «Hijos de Lot» reproduce la expresión hebrea de manera directa y conserva su valor colectivo. En este contexto se refiere probablemente a los pueblos descendientes de Lot, pero el texto mismo usa el parentesco como designación.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera porque su función exacta sigue siendo incierta. Traducirlo sugeriría una certeza que el hebreo no ofrece.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el análisis auditado del texto hebreo y del POB inglés: conserva la fuerza enfática de גַּם, la metáfora de זְרוֹעַ y la referencia colectiva de לִבְנֵי־לוֹט. Se optó por un español natural pero suficientemente literal para mantener el paralelismo poético y la ambigüedad controlada del original.'
  spanish_consistency_notes:
  - Se mantiene «Selah» como transliteración estándar por incertidumbre semántica.
  - Se usa «Asiria» como nombre histórico-geopolítico coherente con el contexto.
  - Se preserva la metáfora «brazo» en el texto principal y se explicita su posible valor de «fuerza/ayuda» en nota.
  - «Hijos de Lot» se conserva en el cuerpo del texto para respetar el idioma hebreo y la posible referencia colectiva.
