revisions:
- from: 'Y tenía hermanos[a], los hijos de Josafat: Azarías, Jehiel, Zacarías, Azaríasu[b], Micael y Sefatías. Todos هؤلاء eran los hijos de Josafat, rey de Israel.'
  to: 'Y él tenía hermanos, los hijos de Josafat: Azarías, Jehiel, Zacarías, Azariahu[b], Micael y Sefatías. Todos estos eran los hijos de Josafat, rey de Israel[a].'
  rationale: Se corrige un error material grave de idioma, se reubica la nota sobre «rey de Israel» al lugar pertinente, se corrige la redacción de la nota del nombre diferenciado, y se ajusta «Azaríasu» a «Azariahu» para preservar de forma más fiel y natural en español la distinción entre las dos grafías hebreas.
