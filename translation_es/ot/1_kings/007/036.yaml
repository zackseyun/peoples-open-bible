review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: describe grabados en los paneles/soportes y marcos, con querubines, leones, palmeras y un adorno circundante. También refleja adecuadamente la dificultad de כְּמַעַר אִישׁ con una nota. Sin embargo, hay dos desajustes menores: la nota [a] no ofrece una alternativa real y además repite la misma forma; y el texto principal omite el matiz enfático de סָבִיב como ''todo alrededor'' o ''por todos lados'', quedando un poco más débil que el original y el inglés auditado.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Paneles'', ''soportes'', ''marcos'', ''grabó'' y ''guirnaldas'' funcionan bien en registro bíblico moderno. La frase ''según el espacio disponible para cada uno'' es una buena solución para el hebreo difícil. La principal reparación necesaria es estilística y de aparato crítico: fortalecer ''alrededor'' a ''por todo alrededor'' / ''todo alrededor'' y corregir la nota [a] para que no sea una pseudoalternativa inútil.'
  glossary_alignment: 'La terminología está alineada con el proyecto: no hay nombres divinos ni títulos mesiánicos en juego; כְּרוּבִים se vierte correctamente como ''querubines''; el resto del léxico técnico se maneja de forma consistente con el razonamiento documentado. ''Guirnaldas'' como equivalente de לֹיֹת está bien, aunque conviene conservar la alternativa ''festone[s]'' o ''guirnaldas'' en nota en lugar de una nota defectuosa sobre ''querubines''.'
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa válida
    rationale: Dice 'O «querubines»', repitiendo exactamente la misma palabra del texto principal. Eso no cumple la función de nota léxica alternativa ni añade claridad al lector.
  - severity: low
    issue: '''alrededor'' queda algo débil para סָבִיב'
    rationale: El hebreo y el POB inglés expresan una disposición envolvente clara ('all around'). En español, 'con guirnaldas alrededor' se entiende, pero 'por todo alrededor' o 'todo alrededor' refleja mejor el valor distributivo/circundante.
  revised_spanish_text: En los paneles de sus soportes y en sus marcos grabó querubines, leones y palmeras, según el espacio disponible para cada uno[a], con guirnaldas por todo alrededor[b].
  revised_footnotes:
  - marker: a
    text: O «donde hubiera espacio para cada figura». La frase hebrea es difícil y probablemente describe la disposición de las tallas según el espacio disponible.
    reason: alternative_reading
  - marker: b
    text: O «festone[s]». El término hebreo probablemente se refiere a adornos ornamentales que rodeaban las figuras.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota defectuosa sobre 'querubines', porque no ofrecía una alternativa real. Se conserva la nota necesaria sobre la frase hebrea difícil כְּמַעַר אִישׁ. Además, se añade una nota léxica útil para לֹיֹת y se fortalece 'alrededor' a 'por todo alrededor' para reflejar mejor סָבִיב y el audit trail inglés.
