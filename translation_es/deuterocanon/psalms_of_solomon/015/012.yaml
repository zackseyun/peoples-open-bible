review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: κληρονομία = «herencia»; οὐχ εὑρεθήσεται conserva el futuro pasivo; y τοῖς τέκνοις αὐτῶν mantiene la relación con los hijos. Sin embargo, «por sus hijos» en español suena marcadamente agentivo («hallada por») y puede inducir una lectura de búsqueda realizada por ellos, mientras que el dativo griego aquí es más naturalmente relacional/destinativo. La nota inglesa preserva precisamente esa amplitud con alternativas «among/to».'
  spanish_quality_summary: «Su herencia no será hallada por sus hijos» es gramatical, pero poco natural y potencialmente equívoco en español bíblico actual. Una formulación más fiel y legible es «Su herencia no será hallada entre sus hijos», que además se alinea con la nota alternativa ya documentada. La nota puede conservar la otra posibilidad «para/a sus hijos» explicando el sentido de no transmisión.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Herencia» es la mejor opción para κληρονομία. No hay términos teológicos sensibles aquí. El problema es de ajuste semántico y naturalidad en español para el dativo τοῖς τέκνοις αὐτῶν.
  issues:
  - severity: medium
    issue: «por sus hijos» traduce el dativo de manera poco natural en español
    rationale: Aunque el inglés auditado adoptó «by their children», en español «hallada por sus hijos» activa con fuerza una lectura agentiva instrumental. El griego no exige eso; la nota auditada muestra que el sentido puede ser «entre/a sus hijos», es decir, que no se hallará en ellos o para ellos como herederos.
  - severity: low
    issue: La nota al pie no recoge toda la amplitud útil para el español
    rationale: La nota actual solo ofrece «entre sus hijos». Dado que el texto principal revisado usará esa opción, conviene que la nota preserve la alternativa «para sus hijos» o «a sus hijos» y la explicación de transmisión hereditaria.
  revised_spanish_text: Su herencia no será hallada entre sus hijos[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Su herencia no será hallada para sus hijos»; es decir, no pasará a sus descendientes.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «por sus hijos» por «entre sus hijos» porque comunica mejor en español la relación amplia del dativo griego sin imponer una lectura agentiva artificial. La nota conserva una alternativa cercana al valor dativo («para sus hijos») y explicita el sentido contextual de que la herencia no pasará a los descendientes.
