revisions:
- from: Entonces nos partimos de Horeb y atravesamos todo aquel desierto grande y temible[a] que ustedes vieron, por el camino a la región montañosa de los amorreos, tal como Yahvé nuestro Dios nos lo mandó; y llegamos hasta Cades-barnea.
  to: Entonces partimos de Horeb y atravesamos todo aquel desierto grande y temible[a] que ustedes vieron, por el camino a la región montañosa de los amorreos, tal como Yahvé nuestro Dios nos lo mandó, y llegamos hasta Cades-barnea.
  rationale: Se corrige la expresión antinatural «nos partimos» por «partimos», que transmite fiel y claramente el sentido de וַנִּסַּע. También se suaviza la puntuación para una lectura más natural en español sin cambiar el sentido. No se requieren cambios en la nota léxica ni en la terminología principal.
