  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀπειθήσασίν ποτε ὅτε ἀπεξεδέχετο ἡ τοῦ θεοῦ μακροθυμία ἐν ἡμέραις Νῶε κατασκευαζομένης κιβωτοῦ εἰς ἣν ὀλίγοι, τοῦτ’ ἔστιν ὀκτὼ ψυχαί, διεσώθησαν δι’ ὕδατος.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/020.yaml
  text: 'who formerly were disobedient, when the patience of God was waiting in the days of Noah while the ark was being prepared, into which a few—that is, eight persons—were brought safely through water.'
translation:
  language: ko
  text: '그 영들은 곧 노아의 때, 곧 방주가 지어지는 동안 하나님의 오래 참으심이 기다리실 때에 순종하지 아니한 자들입니다. 그 방주에 적은 사람들, 곧 여덟 사람만이 물을 통하여 구원받았습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπειθήσασιν
  english_pob_choice: were disobedient
  chosen_korean: 순종하지 아니한 자들
  alternatives_korean:
  - 불순종한 자들
  lexicon: BDAG
  rationale: 2:8·3:1과 어휘 일관성 유지.
- source_word: ἀπεξεδέχετο ἡ τοῦ θεοῦ μακροθυμία
  english_pob_choice: the patience of God was waiting
  chosen_korean: 하나님의 오래 참으심이 기다리실 때
  alternatives_korean:
  - 하나님의 인내가 기다리고 있을 때
  lexicon: BDAG
  rationale: μακροθυμία를 「오래 참으심」으로 옮기는 한국 성서 전통 유지. 미완료 ἀπεξεδέχετο의 지속적 기다림을 살린다.
- source_word: διεσώθησαν δι’ ὕδατος
  english_pob_choice: were brought safely through water
  chosen_korean: 물을 통하여 구원받았습니다
  alternatives_korean:
  - 물로 말미암아 살아남았습니다
  - 물을 거쳐 안전히 건짐을 받았습니다
  lexicon: BDAG
  rationale: διά는 「통하여 (수단)」와 「거쳐 (장소)」 둘 다 가능. 3:21의 βάπτισμα와 연결되므로 「통하여」로 옮겨 양 의미를 모두 함의.
