translation:
  language: es
  text: 'Y Dios dijo a Abraham: «En cuanto a ti, guardarás mi pacto, tú y tu descendencia[a] después de ti, a lo largo de sus generaciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu simiente», una traducción más literal del término hebreo singular colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y habló
  alternatives_spanish:
  - Y dijo
  - Entonces habló
  lexicon: HALOT
  rationale: El waw narrativo avanza la acción; en español, 'Y habló' conserva el movimiento discursivo sin perder solemnidad. 'Dijo' también es posible, pero 'habló' refleja bien una fórmula de discurso directo más marcada.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el referente es el Dios del pacto que habla con Abraham; 'Dios' es la equivalencia directa y natural en español.
- source_word: אֶל אַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: HALOT
  rationale: La preposición hebrea indica dirección del habla; 'a Abraham' es la forma natural y fiel en español.
- source_word: וְאַתָּה
  english_pob_choice: As for you
  chosen_spanish: En cuanto a ti
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: El pronombre frontal es enfático y contrasta con la promesa divina anterior; 'En cuanto a ti' comunica mejor la focalización discursiva que un simple 'y tú'.
- source_word: אֶת־בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: '''בְּרִית'' corresponde a ''pacto'' en el registro bíblico-covenantal del español. ''Pacto'' conserva la fuerza relacional y jurídica sin desplazarla hacia un lenguaje eclesiástico más tardío.'
- source_word: תִשְׁמֹר
  english_pob_choice: you shall keep
  chosen_spanish: guardarás
  alternatives_spanish:
  - observarás
  - cumplirás
  lexicon: HALOT
  rationale: שׁמר tiene el sentido de guardar, observar, custodiar; en contexto de pacto, 'guardarás' mantiene la obligación sin introducir matices excesivamente normativos o sacramentales.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular colectivo que literalmente puede ser 'semilla', en español 'descendencia' transmite con claridad el valor colectivo y genealógico. Se evita 'semilla' por su rareza en este contexto y por posible ambigüedad.
- source_word: אַחֲרֶיךָ
  english_pob_choice: after you
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras ti
  - siguiéndote
  lexicon: HALOT
  rationale: La expresión indica sucesión en la línea familiar; 'después de ti' es la equivalencia más natural y precisa.
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por todas sus generaciones
  lexicon: HALOT
  rationale: El hebreo expresa continuidad a lo largo de múltiples generaciones. 'Por sus generaciones' mantiene la fórmula breve y clásica sin perder la referencia a la duración sucesiva.
theological_decisions:
- issue: El mandato del pacto y el valor de 'guardar' frente a lecturas legalistas o sacramentales
  english_pob_reading: you shall keep my covenant
  chosen_spanish_reading: guardarás mi pacto
  alternative_spanish_readings:
  - observarás mi pacto
  - cumplirás mi pacto
  rationale: '''Guardar'' conserva la obligación pactal del hebreo שׁמר y evita cargar el texto con una interpretación doctrinal adicional. No se introduce un sentido sacramental ni meramente administrativo; el énfasis permanece en la fidelidad al pacto divino.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: El colectivo singular de זרע y su efecto teológico sobre la promesa familiar
  english_pob_reading: your offspring
  chosen_spanish_reading: tu descendencia[a]
  alternative_spanish_readings:
  - tu simiente
  - tus descendientes
  rationale: La forma hebrea es singular colectiva y puede referir tanto a la línea familiar como, por extensión, a la posteridad. 'Descendencia' mantiene esa amplitud sin atomizar el colectivo; la nota preserva la tensión lexical.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final inglesa, incluyendo la puntuación más natural del enunciado principal. El texto español evita un guion innecesario y mantiene el paralelismo entre Abraham y su descendencia con una construcción fluida de registro bíblico-formal.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, no 'SEÑOR', porque el hebreo aquí nombra directamente a Dios como hablante del pacto.
  - Se usa 'pacto' para בְּרִית por coherencia con el registro bíblico-covenantal del español.
  - Se conserva la segunda persona singular en 'guardarás' y 'tu', en concordancia con el hebreo singular dirigido a Abraham y extendido a su descendencia.
  - '''Por sus generaciones'' preserva la continuidad genealógica sin sobreexplicar la fórmula hebrea.'
  - La nota [a] está anclada en el texto para evitar una glosa suelta y cumplir la trazabilidad requerida.
