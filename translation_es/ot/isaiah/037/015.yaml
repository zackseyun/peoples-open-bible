lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró
  - hizo oración
  lexicon: HALOT
  rationale: El hitpael de פלל aquí expresa la acción de orar. En español, «oró» comunica de forma natural y reverente el acto de dirigirse a Dios en oración, sin añadir matices no presentes en el hebreo.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Convención onomástica bíblica en español
  rationale: El nombre propio se adapta a la forma bíblica usual en español, que es clara y reconocible para el lector. No se translitera mecánicamente desde el inglés.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario de la oración. En español, «a» es la forma idiomática para indicar dirección o destinatario en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La evidencia fuente usa el Tetragrámaton directamente. Siguiendo la política del POB en español, se conserva el nombre divino como «Yahvé», en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La construcción introduce el contenido del discurso. «Diciendo» mantiene la conexión formal con la cita que sigue y refleja bien el valor del infinitivo empleado en hebreo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, no un título. En español, «Yahvé» preserva el nombre personal del Dios del pacto y evita la sustitución devocional por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado: la versión inglesa ya establecía «prayed» para וַיִּתְפַּלֵּל, «to» para אֶל, «Yahweh» para יהוה y «saying» para לֵאמֹר; no se documentan revisiones posteriores. La propuesta española sigue esa misma lectura con equivalentes naturales en español.'
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple del hebreo: sujeto + verbo + complemento preposicional + participio de cita.'
  - «Yahvé» se usa de forma consistente con la política del proyecto para יהוה.
  - «oró» evita la sobretraducción explicativa y conserva el sentido directo del verbo hebreo.
  - La nota al pie marca explícitamente la decisión léxica sobre el nombre divino, como exige el audit trail.
