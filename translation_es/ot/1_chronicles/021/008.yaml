translation:
  language: es
  text: 'Entonces David dijo a Dios: «He pecado gravemente al hacer esto. Pero ahora, te ruego, aparta la culpa[a] de tu siervo, porque he actuado con mucha insensatez».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quita la iniquidad de tu siervo». El término hebreo puede significar «iniquidad», «culpa» o la responsabilidad derivada de la culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa consecutiva introduce avance en la historia; «Entonces» conserva esa secuencia con naturalidad en español.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - ante Dios
  lexicon: HALOT
  rationale: En el contexto de dirección a la deidad de Israel, «Dios» es la forma idiomática y fiel; no hace falta marcar «el Dios» en español.
- source_word: חָטָאתִי מְאֹד
  english_pob_choice: I have sinned greatly
  chosen_spanish: He pecado muchísimo
  alternatives_spanish:
  - He pecado gravemente
  - He pecado muy mucho
  lexicon: HALOT
  rationale: El perfecto expresa la confesión del hecho; «muchísimo» transmite con fuerza el intensificador מְאֹד sin sonar arcaico.
- source_word: אֲשֶׁר עָשִׂיתִי אֶת הַדָּבָר הַזֶּה
  english_pob_choice: in doing this thing
  chosen_spanish: al hacer esto
  alternatives_spanish:
  - por haber hecho esto
  - cuando hice esto
  lexicon: HALOT
  rationale: «Al hacer esto» mantiene la relación entre el pecado confesado y el acto concreto señalado por el hebreo, sin añadir causalidad no explicitada.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: El giro retórico de confesión a petición se refleja mejor con «Pero ahora».
- source_word: הַעֲבֶר נָא
  english_pob_choice: please take away
  chosen_spanish: aparta, te ruego
  alternatives_spanish:
  - quita, te ruego
  - por favor, aparta
  lexicon: HALOT
  rationale: El hiphil de עבר en este uso pide remover o apartar; «aparta» es natural en español y conserva el matiz de petición de נָא mediante «te ruego».
- source_word: עֲוֹן
  english_pob_choice: the guilt
  chosen_spanish: la culpa
  alternatives_spanish:
  - la iniquidad
  - la culpa de la iniquidad
  - la responsabilidad
  lexicon: HALOT
  rationale: En una súplica de perdón, «culpa» comunica bien la carga moral que David pide que sea apartada. Mantiene la amplitud semántica de עָוֹן sin cerrarla solo en «iniquidad».
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: Aquí la autodenominación deferente ante Dios se expresa de manera natural con «siervo», siguiendo el contexto devocional y el uso reverencial del español bíblico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica; «porque» es claro y directo en español.
- source_word: נִסְכַּלְתִּי מְאֹד
  english_pob_choice: I have acted very foolishly
  chosen_spanish: he actuado con mucha insensatez
  alternatives_spanish:
  - he sido muy insensato
  - he obrado muy neciamente
  lexicon: HALOT
  rationale: El verbo expresa actuar con necedad/insensatez, no solo poseer una cualidad; «he actuado con mucha insensatez» preserva esa fuerza verbal y el intensificador.
theological_decisions:
- issue: Sentido de עֲוֹן en la petición de David
  english_pob_reading: Rendered as 'guilt' rather than 'iniquity' or 'punishment'
  chosen_spanish_reading: «la culpa» en lugar de «la iniquidad» o «el castigo»
  alternative_spanish_readings:
  - la iniquidad
  - el castigo por la iniquidad
  - la responsabilidad de culpa
  rationale: La escena es una confesión y una súplica de misericordia; «culpa» comunica la carga moral que David pide que sea apartada, sin restringir el término a la acción pecaminosa en sí ni a una pena específica.
  doctrine_reference: Lexical/theological note on עָוֹן in penitential contexts
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada en inglés: mantiene la progresión narrativa, la confesión enfática, la súplica de remoción de culpa y la evaluación de la acción como insensatez. No se detectaron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלֹהִים en dirección directa.
  - Se usa «siervo» para עַבְדְּךָ por el contexto devocional; no se emplea «esclavo» aquí.
  - «muchísimo / mucha insensatez» refleja el intensificador מְאֹד en ambas cláusulas.
  - El pie de nota marca la alternativa léxica principal para עֲוֹן, coherente con el audit trail en inglés.
