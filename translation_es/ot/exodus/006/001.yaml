translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Ahora verás lo que haré a Faraón, porque con mano fuerte[a] los dejará ir, y con mano fuerte[a] los expulsará de su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «bajo compulsión los dejará ir, y bajo compulsión los expulsará». La repetición de «con mano fuerte» puede implicar que Faraón actúa debido a una fuerza abrumadora, en última instancia el poder de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: transliterar el nombre divino como ''Yahvé'', preservando el nombre personal del Dios del pacto en lugar de sustituirlo por un título.'
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Yahvé dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. 'Entonces' conserva bien el progreso temporal en español sin volver la frase forzada.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: HALOT
  rationale: '''Ahora'' transmite de forma natural el valor temporal y enfático con que se introduce la acción divina inminente.'
- source_word: תִרְאֶה
  english_pob_choice: you will see
  chosen_spanish: verás
  alternatives_spanish:
  - vas a ver
  - has de ver
  lexicon: HALOT
  rationale: El futuro simple expresa con claridad la expectativa inmediata del texto sin añadir matices innecesarios.
- source_word: אֲשֶׁר אֶעֱשֶׂה
  english_pob_choice: what I will do
  chosen_spanish: lo que haré
  alternatives_spanish:
  - lo que voy a hacer
  - aquello que haré
  lexicon: HALOT
  rationale: '''Lo que haré'' reproduce la fuerza del relativo y el futuro, de manera directa y natural en español.'
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - contra Faraón
  - para Faraón
  lexicon: HALOT
  rationale: Con 'hacer' en español, el complemento 'a Faraón' comunica bien la relación del acto divino con Faraón sin forzar una lectura adversativa en la línea principal.
- source_word: בְיָד חֲזָקָה
  english_pob_choice: by a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - por mano fuerte
  - bajo mano fuerte
  lexicon: HALOT
  rationale: La expresión se mantiene idiomática y repetida en ambas ocurrencias. 'Con mano fuerte' suena natural en español y conserva la imagen de fuerza/compulsión sin resolver la ambigüedad interpretativa.
- source_word: יְשַׁלְּחֵם
  english_pob_choice: he will let them go
  chosen_spanish: los dejará ir
  alternatives_spanish:
  - los soltará
  - los enviará
  lexicon: HALOT
  rationale: En el contexto del Éxodo, שלח con objeto humano expresa liberarlos. 'Los dejará ir' es idiomático y fiel al sentido contextual de permitir su partida.
- source_word: יְגָרְשֵׁם
  english_pob_choice: he will drive them out
  chosen_spanish: los expulsará
  alternatives_spanish:
  - los echará
  - los arrojará fuera
  lexicon: HALOT
  rationale: גרש implica expulsión enérgica; 'los expulsará' preserva mejor la fuerza semántica que una simple salida voluntaria.
- source_word: מֵאַרְצוֹ
  english_pob_choice: from his land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de su país
  - de su territorio
  lexicon: HALOT
  rationale: '''Tierra'' mantiene el valor bíblico amplio de אֶרֶץ y funciona mejor que ''país'' en un contexto de promesa, dominio y salida.'
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se preserva el nombre propio divino según la convención del proyecto, evitando la sustitución por un título y manteniendo la referencia del pacto con Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La frase repetida 'con mano fuerte' y su posible sujeto implícito
  english_pob_reading: Retain the idiom 'by a strong hand' without making the subject of the force explicit in the main text
  chosen_spanish_reading: Conservar 'con mano fuerte' sin explicitar en el texto principal si la fuerza se ejerce sobre Faraón o por Yahvé
  alternative_spanish_readings:
  - bajo compulsión
  - por una mano poderosa
  rationale: 'La construcción hebrea deja una tensión interpretativa: la frase está vinculada a las acciones de Faraón, pero puede implicar la fuerza de Dios. Mantener el modismo evita resolver prematuramente esa ambigüedad.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3 — Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio adicional; el pasaje se mantiene en concordancia alta con el texto hebreo y con la decisión inglesa auditada. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva la repetición de 'con mano fuerte' para reflejar la paralelismo hebreo.
  - '''Faraón'' se usa en español bíblico estándar para el nombre/título egipcio.'
  - '''Tierra'' se reserva para אֶרֶץ por su amplitud semántica y resonancia bíblica.'
