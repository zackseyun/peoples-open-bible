translation:
  language: es
  text: Pero de los más pobres del país, el capitán[a] de la guardia dejó a algunos para ser viñadores y agricultores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «jefe/capitán de los matadores». En este contexto, el título se refiere al capitán babilonio de la guardia.
    reason: lexical_alternative
  - marker: b
    text: O «labradores» / «trabajadores del campo». El término hebreo probablemente se refiere en sentido amplio a trabajadores agrícolas que cultivaban la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/דַּלַּת
  english_pob_choice: But from the poorest
  chosen_spanish: Pero de los más pobres
  alternatives_spanish:
  - Y de los pobres
  - Pero de los más bajos
  lexicon: HALOT
  rationale: El hebreo expresa un partitivo con valor de contraste respecto a los deportados anteriores. «Más pobres» conserva el matiz de escasez extrema que la POB inglesa quiso comunicar con «the poorest», sin volverlo artificiosamente superlativo absoluto.
- source_word: הָ/אָרֶץ
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la tierra del país
  lexicon: HALOT
  rationale: En este contexto histórico, אֶרֶץ se refiere al territorio de Judá. «Tierra» es natural en español bíblico y suficientemente preciso aquí.
- source_word: הִשְׁאִיר
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó a algunos
  - permitió que quedaran
  - dejó atrás
  lexicon: HALOT
  rationale: El verbo causativo comunica que el capitán hizo quedar a un grupo. «Dejó» es idiomático en español y mantiene la concisión del hebreo y de la POB inglesa, donde el objeto implícito se explicita con «a algunos».
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de la guardia
  - el comandante de la guardia
  - el capitán de los verdugos
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «jefe de los matadores/carniceros», el sentido contextual es el cargo militar de Nabuzaradán. «Capitán de la guardia» reproduce la decisión contextual de la POB inglesa y evita una traducción engañosamente literal.
- source_word: לְ/כֹֽרְמִ֖ים
  english_pob_choice: to be vinedressers
  chosen_spanish: para ser viñadores
  alternatives_spanish:
  - para ser cultivadores de viñas
  - como viñadores
  lexicon: HALOT
  rationale: El término denota trabajadores de viñas. «Viñadores» es un equivalente tradicional y claro en español, y conserva el oficio específico señalado por el hebreo.
- source_word: וּ/לְ/יֹגְבִֽים
  english_pob_choice: and farmers
  chosen_spanish: y agricultores
  alternatives_spanish:
  - y labradores
  - y campesinos
  - y trabajadores del campo
  lexicon: HALOT
  rationale: La POB inglesa revisó el término hacia «farmers» para hacerlo más directo y formal. En español, «agricultores» es el equivalente más sobrio y general para un labor agrícola amplia, sin restringirlo indebidamente a una sola tarea como «labradores» o «aradores».
translation_notes:
  revision_awareness: La versión inglesa base pasó de «field workers» a «farmers» en la revisión final. La presente redacción sigue esa revisión con «agricultores», manteniendo la amplitud semántica del hebreo y evitando añadir notas innecesarias, dado que el título «capitán de la guardia» ya refleja la decisión contextual establecida por la POB.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se conserva un registro bíblico contemporáneo y sobrio, con equivalentes léxicos que reflejan la lista ocupacional del hebreo.
  - No se usaron notas al pie porque la redacción española puede expresar las decisiones sin crear ambigüedad adicional.
