base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/003.yaml
  text: For I am Yahweh your God[a], the Holy One of Israel, your Savior; I have given Egypt as your ransom[b], Cush and Seba in exchange for you.
  footnotes:
  - marker: a
    text: Or 'instead of you.' The Hebrew phrase at the end of the verse expresses substitution or exchange.
    reason: lexical_alternative
  - marker: b
    text: Cush is the ancient region south of Egypt, often associated with Nubia/Ethiopia.
    reason: cultural_note
