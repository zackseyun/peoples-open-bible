review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite bien la prohibición de responder al necio y conserva la tensión deliberada de «conforme a su necedad». Sin embargo, no refleja plenamente el énfasis de גַם אָתָּה («también/tú también») en el texto principal, ya que termina simplemente con «como él».
  spanish_quality_summary: 'El español es claro y legible, pero conviene un pequeño ajuste. «No respondas al necio conforme a su necedad» funciona bien. «Para que no llegues a ser como él» es comprensible, pero para reflejar mejor el hebreo y el POB inglés debe decir «para que no tú también llegues a ser como él» o una formulación equivalente. Además, la nota a usa «en un modo necio», que suena poco natural; «de manera necia» es mejor español. La nota b está anclada en un lugar menos adecuado: la referencia cruzada corresponde mejor a la frase «conforme a su necedad», como en el inglés.'
  glossary_alignment: No hay términos del glosario mayor en juego. «Necio/necedad» alinea bien con כְּסִיל / אִוֶּלֶת. La preservación de «conforme a su necedad» mantiene correctamente la tensión sapiencial con el v. 5. Se recomienda conservar «responder» y añadir explícitamente «tú también» para גַם אָתָּה.
  issues:
  - severity: medium
    issue: Falta en el texto principal el equivalente explícito de גַם אָתָּה
    rationale: El hebreo y el inglés POB incluyen «you also». «Como él» no expresa por sí solo el matiz de «tú también».
  - severity: low
    issue: La nota léxica usa una formulación poco idiomática en español
    rationale: «En un modo necio» suena calcado; «de manera necia» comunica mejor la alternativa sin perder precisión.
  - severity: low
    issue: La nota de referencia cruzada está anclada al final en vez de a la frase relevante
    rationale: En el POB inglés ambas notas se asocian a «according to his folly». En español, anclar la referencia cruzada allí mejora la correspondencia editorial.
  - severity: low
    issue: 'Error tipográfico en la rationale del borrador: «Nececio»'
    rationale: Debe ser «necio». No afecta el texto bíblico, pero sí la calidad del expediente.
  revised_spanish_text: No respondas al necio conforme a su necedad[a][b], para que no tú también llegues a ser como él.
