translation:
  language: es
  text: 'Jesús dijo: «La astilla que está en el ojo de tu hermano, tú la ves; pero la viga que está en tu propio ojo, no la ves. Cuando saques la viga de tu propio ojo, entonces verás claramente cómo sacar la astilla del ojo de tu hermano».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ⲡϫⲏ
  english_pob_choice: splinter
  chosen_spanish: astilla
  alternatives_spanish:
  - esquirla
  - astilla pequeña
  - viruta
  lexicon: Crum, s.v. ϫⲏ
  rationale: ‘Astilla’ conserva la imagen de una pequeña pieza de madera y funciona bien en contraste con ‘viga’. En español suena natural y no desplaza la metáfora hacia algo abstracto.
- source_word: ⲡⲥⲟⲓ
  english_pob_choice: beam
  chosen_spanish: viga
  alternatives_spanish:
  - madero
  - tronco
  - tabla
  lexicon: Crum, s.v. ⲥⲟⲓ
  rationale: ‘Viga’ refleja el sentido estructural señalado por el léxico y mantiene el contraste de tamaño con ‘astilla’. ‘Madero’ o ‘tronco’ cambiarían el campo imagético.
- source_word: ⲛⲟⲩϫⲉ
  english_pob_choice: take out
  chosen_spanish: sacar
  alternatives_spanish:
  - quitar
  - retirar
  - expulsar
  lexicon: Crum, s.v. ⲛⲟⲩϫⲉ
  rationale: En el contexto del ojo, ‘sacar’ es la forma más natural y concreta para el acto de remover algo. ‘Expulsar’ sería demasiado fuerte y ‘quitar’ menos visual.
- source_word: ⲛⲁⲩ ⲉⲃⲟⲗ
  english_pob_choice: see clearly
  chosen_spanish: ver claramente
  alternatives_spanish:
  - ver bien
  - ver fuera
  - ver con claridad
  lexicon: Layton, Coptic Grammar (ⲉⲃⲟⲗ with perception verbs)
  rationale: La expresión coptica equivale a una visión despejada o completa; ‘ver claramente’ transmite bien el valor idiomático sin sonar forzado en español.
- source_word: ⲥⲟⲛ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - compañero
  - prójimo
  - fellow disciple
  lexicon: Crum, s.v. ⲥⲟⲛ
  rationale: ‘Hermano’ sigue la equivalencia léxica básica y preserva el lenguaje familiar del dicho. En contexto puede leerse inclusivamente como un compañero discípulo.
- source_word: ϩⲟⲧⲁⲛ ⲉⲣϣⲁⲛ_
  english_pob_choice: when (you) take
  chosen_spanish: cuando saques
  alternatives_spanish:
  - cuando tomes
  - cuando hayas sacado
  - cuando retires
  lexicon: Layton, Coptic Grammar (future/conditional temporal clause)
  rationale: La construcción temporal-condicional admite una traducción futura sencilla; ‘cuando saques’ mantiene la secuencia del dicho y la transición a la consecuencia.
- source_word: ⲃⲁⲗ
  english_pob_choice: eye
  chosen_spanish: ojo
  lexicon: Crum, s.v. ⲃⲁⲗ
  rationale: Término anatómico estándar; no requiere matiz adicional.
theological_decisions:
- issue: Referencia a ‘hermano’ en un dicho de instrucción comunitaria
  english_pob_reading: ‘Brother’ translates ⲥⲟⲛ; in context it can be understood inclusively as a fellow disciple.
  chosen_spanish_reading: ‘Hermano’ se mantiene en el texto principal, con lectura abierta a un hermano o compañero discípulo.
  alternative_spanish_readings:
  - compañero discípulo
  - prójimo
  - hermana/hermano como lectura inclusiva
  rationale: El coptico usa un término de parentesco masculino, y la traducción debe conservar esa forma. La nota contextual permite una comprensión inclusiva sin borrar la literalidad del término.
  doctrine_reference: Uso comunitario del lenguaje fraternal en los evangelios y dichos de instrucción
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que eliminó marcadores editoriales y prefirió una puntuación más limpia en el discurso directo. La versión española mantiene esa directividad sin añadir notas innecesarias, y conserva la estructura topicalizada del original: primero la astilla, luego la viga, después la acción de sacar y finalmente la visión clara.'
  spanish_consistency_notes:
  - Se mantuvo ‘Jesús’ para ⲓⲏⲥⲟⲩⲥ.
  - Se evitó ‘Cristo’ porque el dicho no contiene Χριστός.
  - Se usó ‘astilla’ y ‘viga’ para sostener el contraste material y visual del original.
  - Se evitó ‘SEÑOR’ u otras expansiones no presentes en el texto fuente.
  - La frase final ‘verás claramente’ conserva el valor idiomático de ⲛⲁⲩ ⲉⲃⲟⲗ sin calco.
