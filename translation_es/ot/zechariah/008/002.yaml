revisions:
- from: 'Así dice Yahvé de los ejércitos: Yo siento gran celo por Sion[a], y con gran ira la siento por ella.'
  to: 'Así dice Yahvé de los ejércitos: Estoy celoso por Sion con gran celo[a], y con gran ira estoy celoso por ella.'
  rationale: Se revisa para restaurar la repetición de la raíz קנא en ambas cláusulas, seguir la decisión teológica auditada de conservar el lenguaje de «jealous/celoso», y producir un español claro y natural. «Estoy celoso por Sion con gran celo» suena más fiel al hebreo que «siento gran celo», y «con gran ira estoy celoso por ella» corrige la cláusula defectuosa del borrador. La nota mantiene la alternativa de «celo/zeal» sin relegar la fuerza principal del texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:39:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica, el nombre divino «Yahvé», el título «de los ejércitos», «Sion» y «gran ira». Sin embargo, no preserva fielmente la repetición verbal de קִנֵּאתִי en la segunda cláusula: «la siento por ella» omite el mismo verbo de celo/celos/jealousy y además suena gramaticalmente extraño en español. El hebreo enfatiza dos veces la misma raíz קנא, con el sustantivo cognado en medio; la traducción debe reflejar mejor esa reiteración e intensidad.'
  spanish_quality_summary: 'La frase «Yo siento gran celo por Sion, y con gran ira la siento por ella» no es idiomática ni clara en español. «La siento por ella» resulta incorrecta o muy opaca. Además, «Yo» es innecesario. Conviene una redacción natural y digna que mantenga la fuerza del original: «Estoy celoso por Sion con gran celo, y con gran ira estoy celoso por ella». Aunque «celoso» puede requerir apoyo de nota, aquí preserva mejor la decisión teológica documentada de no suavizar el lenguaje.'
  glossary_alignment: 'Alineación parcial. «Yahvé» cumple la pauta del proyecto. «De los ejércitos» es aceptable para צְבָאוֹת. El principal desajuste está en קִנֵּאתִי / קִנְאָה: el borrador pasa a «siento gran celo», lo que suaviza la explicitud de la decisión inglesa («I am jealous») y luego pierde totalmente la repetición léxica en la segunda mitad. La nota alternativa debe conservar la opción «Estoy celoso... / con gran celo» o «Estoy lleno de celo...», pero el texto principal debería mantener el lenguaje de «celoso».'
  issues:
  - severity: high
    issue: La segunda cláusula no traduce fielmente קִנֵּאתִי
    rationale: «Y con gran ira la siento por ella» no representa «con gran ira estoy celoso por ella» y borra la repetición deliberada del verbo hebreo.
  - severity: high
    issue: La redacción española es poco natural y confusa
    rationale: «La siento por ella» no es una construcción idiomática en este contexto y dificulta la comprensión pública y litúrgica del versículo.
  - severity: medium
    issue: El borrador suaviza el lenguaje de celos divinos documentado en la auditoría inglesa
    rationale: La decisión teológica del POB fue retener «jealous» en el texto principal. «Siento gran celo» desplaza el énfasis desde «celoso» a «celo», y la nota no compensa del todo esa pérdida en el texto base.
  - severity: low
    issue: Falta la nota alternativa sobre el nombre divino presente en el inglés
    rationale: El inglés incluye una nota de alternativa de lectura para «The LORD». En español no es indispensable reproducirla si no hay ambigüedad, pero conviene evaluar consistencia editorial. No impide una revisión local.
