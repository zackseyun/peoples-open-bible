    rationale: 'Debe decirse de manera limpia: ''O “ha puesto allí su nombre”...'' sin comillas simples envolventes ni barra inicial extraña.'
  - severity: low
    issue: La cláusula principal puede sonar más idiomática como 'ha hecho que su nombre more allí'.
    rationale: Mantiene mejor la fuerza causativa del arameo en español natural que 'ha hecho morar allí su nombre', aunque esta última no es incorrecta.
