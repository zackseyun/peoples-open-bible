translation:
  language: es
  text: Cuando el rey cananeo de Arad, que vivía en el Neguev, oyó que Israel venía por el camino de Atarim[a], peleó contra Israel y tomó cautivos a algunos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por el camino de Atarim». El término «Atarim» es incierto; algunos lo entienden como nombre de lugar, mientras que otros, influidos por antiguas versiones, lo toman como «los espías» o «los exploradores».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: שׁמע en narración expresa recepción de noticias; «oyó» conserva la secuencia causal del relato con naturalidad en español.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanite
  chosen_spanish: el cananeo
  alternatives_spanish:
  - un cananeo
  lexicon: HALOT
  rationale: 'El artículo hebreo identifica al personaje como un grupo étnico/político específico: «el cananeo», no un cananeo cualquiera.'
- source_word: מֶלֶךְ עֲרָד
  english_pob_choice: the king of Arad
  chosen_spanish: rey de Arad
  alternatives_spanish:
  - el rey de Arad
  lexicon: HALOT
  rationale: La relación constructa se expresa de forma natural en español como título + topónimo; puede llevar artículo en español, pero aquí se omite para un flujo más directo sin perder el sentido.
- source_word: יֹשֵׁב הַנֶּגֶב
  english_pob_choice: who lived in the Negev
  chosen_spanish: que habitaba en el Neguev
  alternatives_spanish:
  - que vivía en el Neguev
  - habitante del Neguev
  - que vivía en el sur
  lexicon: HALOT
  rationale: El participio denota residencia. Se conserva el nombre geográfico «Neguev» para no generalizar indebidamente a «el sur».
- source_word: כִּי בָּא יִשְׂרָאֵל
  english_pob_choice: that Israel was coming
  chosen_spanish: que Israel venía
  alternatives_spanish:
  - que Israel había venido
  - que Israel llegó
  lexicon: HALOT
  rationale: Después de «oyó», כִּי introduce el contenido del informe. El imperfecto narrativo se vierte bien como «venía» en español para expresar la llegada/aproximación en curso.
- source_word: דֶּרֶךְ הָאֲתָרִים
  english_pob_choice: by the way of Atharim
  chosen_spanish: por el camino de Atarim
  alternatives_spanish:
  - por la ruta de Atarim
  - por el camino de los espías
  - por el camino de Atarim[a]
  lexicon: HALOT
  rationale: Se mantiene conservadoramente el término oscuro como topónimo transliterado. «Camino» refleja דֶּרֶךְ con propiedad y naturalidad.
- source_word: וַיִּלָּחֶם בְּיִשְׂרָאֵל
  english_pob_choice: he fought against Israel
  chosen_spanish: peleó contra Israel
  alternatives_spanish:
  - luchó contra Israel
  - hizo guerra contra Israel
  lexicon: HALOT
  rationale: El verbo de combate se traduce con una expresión clara y directa. «Peleó contra» mantiene el sentido hostil sin sobrerrepresentar la escala militar.
- source_word: וַיִּשְׁבְּ
  english_pob_choice: took captive
  chosen_spanish: tomó cautivos
  alternatives_spanish:
  - capturó
  - hizo cautivos
  lexicon: HALOT
  rationale: שׁבה implica tomar prisioneros/cautivos. «Tomó cautivos» conserva la fuerza de capturar en guerra y permite una formulación natural en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: some of them
  chosen_spanish: a algunos de ellos
  alternatives_spanish:
  - de entre ellos
  - a algunos israelitas
  lexicon: HALOT
  rationale: El sufijo puede verse como singular morfológico, pero el contexto colectivo exige un sentido partitivo. «A algunos de ellos» hace explícita la idea sin añadir más de lo necesario.
- source_word: שֶׁבִי
  english_pob_choice: captive
  chosen_spanish: cautivos
  alternatives_spanish:
  - prisioneros
  - cautiverio
  lexicon: HALOT
  rationale: El sustantivo refuerza el resultado del verbo anterior. En español, «tomó cautivos» comunica de forma idiomática la captura de personas en guerra.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que mantuvo «the Canaanite king of Arad» sin comas innecesarias; en español se conserva esa misma relación compacta. También se mantiene la solución prudente para «Atharim/Atarim» como término incierto, con nota de alternativa interpretativa.
  spanish_consistency_notes:
  - Se prefirió «Neguev» como topónimo estable, no «el sur», para conservar la especificidad geográfica.
  - Se usó «cananeo» como sustantivo étnico definido por el artículo hebreo.
  - «Tomó cautivos» se eligió para reflejar el binomio verbal-sustantivo de שׁבה/שֶׁבִי sin redundancia excesiva.
  - No se introdujeron mayúsculas teológicas innecesarias; «espíritu/Espíritu» no aplica en este versículo.
