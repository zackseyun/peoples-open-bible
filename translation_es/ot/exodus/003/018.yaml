translation:
  language: es
  text: 'Y ellos escucharán tu voz, y tú y los ancianos de Israel irán al rey de Egipto y le dirán: «Yahvé, el Dios de los hebreos, se ha encontrado con nosotros[a]. Y ahora, por favor, permítenos ir un viaje de tres días al desierto, para que podamos sacrificar a Yahvé nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos ha salido al encuentro». La frase hebrea puede denotar que Yahvé se ha encontrado con ellos o ha venido a su encuentro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְעוּ
  english_pob_choice: they will listen
  chosen_spanish: escucharán
  alternatives_spanish:
  - oirán
  - obedecerán
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar u obedecer según el contexto. Aquí, con el objeto «tu voz», «escucharán» conserva la idea de atender y prestar oído sin volver demasiado explícita la obediencia.
- source_word: לְקֹלֶךָ
  english_pob_choice: to your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - a ti
  - tu mensaje
  lexicon: HALOT
  rationale: La expresión literal «tu voz» mantiene el giro hebreo y funciona bien en español bíblico; evita reducirlo a una mera referencia personal o a «mensaje», que ya interpretaría demasiado.
- source_word: וּבָאתָ אַתָּה וְזִקְנֵי יִשְׂרָאֵל
  english_pob_choice: you and the elders of Israel will go
  chosen_spanish: tú y los ancianos de Israel irán
  alternatives_spanish:
  - tú y los ancianos de Israel irán
  - tú, con los ancianos de Israel, irás
  lexicon: HALOT
  rationale: 'El hebreo combina un verbo singular con sujeto coordinado explícito. En español, la forma natural es concordar con el sujeto plural expreso. «Irán» expresa el desplazamiento hacia el faraón sin el calco rígido de «vendrás». '
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  - el soberano de Egipto
  lexicon: HALOT
  rationale: Es la equivalencia estándar y más clara del constructo hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: «Yahvé» como transliteración del nombre divino, en lugar de sustituirlo por un título como «el Señor».'
- source_word: אֱלֹהֵי הָעִבְרִיִּים
  english_pob_choice: the God of the Hebrews
  chosen_spanish: el Dios de los hebreos
  alternatives_spanish:
  - el Dios de los hebreos
  - el Dios de los hebreos, el pueblo hebreo
  lexicon: HALOT
  rationale: «Dios» reproduce fielmente אֱלֹהֵי, y «los hebreos» conserva la designación étnica del texto sin añadir explicaciones.
- source_word: נִקְרָה עָלֵינוּ
  english_pob_choice: has met with us
  chosen_spanish: se ha encontrado con nosotros
  alternatives_spanish:
  - nos ha encontrado
  - se nos ha aparecido
  - ha ocurrido sobre nosotros
  lexicon: HALOT
  rationale: El nifal de קרא con עַל puede denotar encuentro/ir al encuentro. «Se ha encontrado con nosotros» suena natural en español y preserva el sentido de encuentro divino sin forzar una fórmula más específica.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y bien, ahora
  lexicon: HALOT
  rationale: Marca la transición a la petición; «Y ahora» mantiene el hilo discursivo del hebreo.
- source_word: נֵלֲכָה נָּא
  english_pob_choice: please let us go
  chosen_spanish: por favor, déjanos ir
  alternatives_spanish:
  - por favor, vayamos
  - por favor, permítenos ir
  lexicon: HALOT
  rationale: El cohortativo con נָא expresa ruego cortés. En español, «por favor, déjanos ir» transmite la súplica dirigida al faraón con naturalidad y sin perder el valor pragmático.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: a journey of three days
  chosen_spanish: por un camino de tres días
  alternatives_spanish:
  - por una jornada de tres días
  - por un viaje de tres días
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática. «Por un camino de tres días» conserva el sustantivo «camino» y sugiere duración/distancia de viaje sin añadir una paráfrasis demasiado interpretativa.
- source_word: בַּמִּדְבָּר
  english_pob_choice: into the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - hacia el desierto
  - en la soledad
  lexicon: HALOT
  rationale: Con el verbo de movimiento, el sentido puede ser direccional; sin embargo, en español «en el desierto» resulta más natural aquí y sigue siendo fiel al ámbito geográfico bíblico. Se prefiere «desierto» como equivalente habitual de מִדְבָּר.
- source_word: וְנִזְבְּחָה
  english_pob_choice: so that we may sacrifice
  chosen_spanish: para que podamos sacrificar
  alternatives_spanish:
  - y sacrifiquemos
  - para sacrificar
  lexicon: HALOT
  rationale: El cohortativo expresa finalidad después de la petición de salida. «Para que podamos sacrificar» mantiene la relación de propósito en español claro y reverente.
- source_word: לַיהוָה אֱלֹהֵינוּ
  english_pob_choice: to Yahweh our God
  chosen_spanish: a Yahvé nuestro Dios
  alternatives_spanish:
  - a Yahvé, nuestro Dios
  - a Yahvé, el Dios nuestro
  lexicon: HALOT
  rationale: Se conserva el nombre divino y el posesivo inclusivo. La preposición «a» es la natural con sacrificar en español bíblico y moderno.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el Señor
  rationale: Se sigue la norma del proyecto para evitar la sustitución por un título y preservar el nombre propio del pacto. «Yahvé» es la forma establecida para el español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נִקְרָה עָלֵינוּ en un contexto de encuentro divino
  english_pob_reading: has met with us
  chosen_spanish_reading: se ha encontrado con nosotros
  alternative_spanish_readings:
  - nos ha encontrado
  - se nos ha aparecido
  - ha ocurrido sobre nosotros
  rationale: La frase debe indicar un encuentro real con el Dios de los hebreos sin imponer una lectura más fuerte que el texto no exige. «Se ha encontrado con nosotros» conserva el matiz de encuentro y mantiene abierta la tensión lexical entre 'encuentro' y 'aparición'.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés sin calcarlo mecánicamente. Se mantuvieron las decisiones ya aprobadas: escucha/heedo de שׁמע, conservación del nombre divino como Yahvé, y lectura de נִקְרָה עָלֵינוּ como encuentro divino. No se detectaron revisiones pendientes en la fuente inglesa final.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «los hebreos» en minúscula por ser designación étnica.
  - «Desierto» traduce מִדְבָּר en un registro bíblico claro y natural.
  - «Por favor» refleja נָא como partícula de ruego cortés.
