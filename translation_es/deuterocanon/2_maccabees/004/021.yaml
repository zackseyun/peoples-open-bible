translation:
  language: es
  text: Cuando Apolonio, hijo de Menesteo, fue enviado a Egipto para las fiestas de la subida al trono del rey Filométor[a], Antíoco, al darse cuenta de que esto era ajeno a sus propios intereses, se preocupó por su propia seguridad. Por eso, después de llegar a Jope, continuó hasta Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al enterarse de que él había quedado alejado de sus propios asuntos». El griego es compacto y puede aludir de manera más amplia a la desventaja política de Antíoco en sus propios asuntos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποσταλέντος
  english_pob_choice: had been sent
  chosen_spanish: fue enviado
  alternatives_spanish:
  - había sido enviado
  - siendo enviado
  lexicon: LSJ
  rationale: El participio aoristo pasivo introduce la circunstancia previa. En español, 'fue enviado' comunica con naturalidad la acción previa sin forzar un pluscuamperfecto innecesario.
- source_word: διὰ τὰ προτοκλήρια
  english_pob_choice: for the accession festivities
  chosen_spanish: para las fiestas de la subida al trono
  alternatives_spanish:
  - para las festividades de la entronización
  - para las celebraciones de acceso al poder
  lexicon: LSJ
  rationale: La expresión rara apunta a celebraciones vinculadas con la asunción del reino. 'Subida al trono' es claro y fiel al referente histórico, sin oscurecer el sentido ritual-festivo.
- source_word: τοῦ φιλομήτορος βασιλέως
  english_pob_choice: of King Philometor
  chosen_spanish: del rey Filométor
  alternatives_spanish:
  - del rey Philometor
  - del rey amante de su madre
  lexicon: LSJ
  rationale: Filométor funciona como epíteto real propio; conservarlo transliterado respeta el referente histórico. Se mantiene 'rey' para que el título quede explícito en español.
- source_word: μεταλαβὼν
  english_pob_choice: perceiving / learning
  chosen_spanish: al darse cuenta de
  alternatives_spanish:
  - al percibir
  - al saber
  lexicon: LSJ
  rationale: El participio expresa la toma de conciencia de Antíoco. 'Al darse cuenta de' evita atribuir la información a Apolonio y refleja mejor la referencia contextual del griego.
- source_word: ἀλλότριον αὐτὸν τῶν αὐτοῦ γεγονότων πραγμάτων
  english_pob_choice: this was foreign to his own interests
  chosen_spanish: que esto era ajeno a sus propios intereses
  alternatives_spanish:
  - que esto le era extraño en sus propios asuntos
  - que estaba desligado de sus propios intereses
  lexicon: LSJ
  rationale: La frase griega es comprimida y alude a una desventaja o desconexión respecto de sus asuntos. 'Ajeno a sus propios intereses' conserva la tensión semántica entre extrañeza, desventaja y alejamiento sin exagerar la interpretación.
- source_word: τῆς καθʼ αὑτὸν ἀσφαλίας ἐφρόντιζεν
  english_pob_choice: took thought for his own security
  chosen_spanish: se preocupó por su propia seguridad
  alternatives_spanish:
  - pensó en su propia seguridad
  - veló por su propia seguridad
  lexicon: LSJ
  rationale: ἐφρόντιζεν indica una preocupación activa; 'se preocupó por' es natural en español y conserva el matiz de atención deliberada por la seguridad personal o política.
- source_word: παραγενόμενος
  english_pob_choice: after arriving
  chosen_spanish: después de llegar
  alternatives_spanish:
  - cuando llegó
  - tras llegar
  lexicon: LSJ
  rationale: El participio señala acción anterior al verbo principal. 'Después de llegar' mantiene la secuencia temporal con claridad.
- source_word: κατήντησεν
  english_pob_choice: he went on to
  chosen_spanish: avanzó hasta
  alternatives_spanish:
  - llegó a
  - continuó hasta
  lexicon: LSJ
  rationale: Como ya se mencionó la llegada a Jope, 'avanzó hasta Jerusalén' evita repetir 'llegó' y refleja el movimiento ulterior hacia la ciudad final.
theological_decisions:
- issue: Epíteto histórico Φιλομήτωρ
  english_pob_reading: treated as a proper royal title/name, 'Philometor'
  chosen_spanish_reading: tratado como epíteto real propio, 'Filométor'
  alternative_spanish_readings:
  - traducirlo literalmente como 'amante de su madre'
  rationale: 'No hay una carga doctrinal aquí, pero sí una decisión histórica y lexical: el epíteto identifica al rey ptolemaico. En español, transliterarlo preserva la referencia y evita una traducción literal engañosa.'
  doctrine_reference: Nombres y títulos históricos deben distinguirse de adjetivos comunes cuando el contexto los fija como apelativo propio.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente en el punto crítico de μεταλαβών, evitando atribuir a Apolonio una alienación que el griego no dice. También conserva el nombre/título real como epíteto histórico y no como traducción literal. Se optó por una sintaxis española natural que preserve la secuencia narrativa: envío a Egipto, toma de conciencia de Antíoco, preocupación por su seguridad y desplazamiento a Jerusalén.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto cuando aparezca el nombre divino; no aplica en este versículo.
  - Se translitera 'Filométor' por tratarse de un epíteto real fijo, no de un adjetivo descriptivo.
  - Se traduce el movimiento final con 'avanzó hasta Jerusalén' para evitar redundancia con la llegada previa a Jope.
  - La nota al pie conserva una alternativa interpretativa real del griego comprimido sin desplazar la lectura principal.
