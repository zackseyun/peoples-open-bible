    rationale: El hebreo participial בָּאֵי הַשַּׁבָּת describe a los que entran/llegan para el turno del sábado. En español, «los que entran el sábado» expresa mejor el valor habitual/descriptivo y evita un subjuntivo que puede sonar prospectivo más que identificador.
