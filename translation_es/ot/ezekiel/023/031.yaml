  rationale: Se ajusta la frase inicial para un español más idiomático y digno, manteniendo el modismo de conducta del hebreo. Se reemplaza «así que» por «por eso» para expresar la consecuencia con mejor registro. La metáfora de «su copa» y la nota explicativa se conservan intactas.
