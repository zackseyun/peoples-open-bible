    rationale: Al cambiar el texto principal a una opción más amplia, conviene preservar en nota las alternativas «injusticia» o «mal obrar» para reflejar el rango semántico documentado.
  revised_spanish_text: Vuelve[a][c] al Altísimo y apártate de la maldad[b], y odia intensamente lo abominable.
