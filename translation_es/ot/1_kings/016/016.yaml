  text: וַ/יִּשְׁמַ֤ע הָ/עָם֙ הַ/חֹנִ֣ים לֵ/אמֹ֔ר קָשַׁ֣ר זִמְרִ֔י וְ/גַ֖ם הִכָּ֣ה אֶת הַ/מֶּ֑לֶךְ וַ/יַּמְלִ֣כוּ כָֽל יִ֠שְׂרָאֵל אֶת עָמְרִ֨י שַׂר צָבָ֧א עַל יִשְׂרָאֵ֛ל בַּ/יּ֥וֹם הַ/ה֖וּא בַּֽ/מַּחֲנֶֽה־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/016/016.yaml
  text: And the people who were encamped heard it said[a], “Zimri has conspired and has also struck down the king.” So all Israel made Omri, the commander of the army[c][b], king over Israel that day in the camp.
  footnotes:
  - marker: a
    text: Or, more explicitly, “the troops who were encamped.” The Hebrew says “the people who were camped,” referring to those in the military camp.
    reason: lexical_alternative
  - marker: b
    text: “Struck down” renders a Hebrew verb meaning “struck”; in context it implies that Zimri killed the king.
    reason: lexical_alternative
  - marker: c
    text: Or “the commander of Israel’s army.”
    reason: lexical_alternative
