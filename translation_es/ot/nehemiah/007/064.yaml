    text: O «su documento genealógico»; el hebreo se refiere a un escrito oficial que acreditaba el linaje.
    reason: lexical_alternative
  - marker: b
    text: O «fueron descalificados del sacerdocio». El verbo hebreo indica exclusión de la condición sacerdotal porque no pudo verificarse la ascendencia.
    reason: lexical_alternative
