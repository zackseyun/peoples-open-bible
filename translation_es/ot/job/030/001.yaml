translation:
  language: es
  text: Pero ahora se ríen de mí[a] los que son más jóvenes que yo, cuyos padres rehusé poner con los perros de mi rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se burlan de mí». El hebreo puede expresar risa con tono de desprecio; la traducción principal conserva la imagen literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: El valor adversativo se conserva mejor en español con 'Pero ahora', reflejando el contraste marcado en el contexto sin perder naturalidad.
- source_word: שָׂחֲקוּ עָלַי
  english_pob_choice: laugh at me
  chosen_spanish: se ríen de mí
  alternatives_spanish:
  - se burlan de mí
  - me ridiculizan
  lexicon: HALOT
  rationale: El verbo hebreo expresa risa dirigida con desprecio; 'se ríen de mí' mantiene la imagen concreta y el matiz de escarnio sin exagerar más allá de la construcción.
- source_word: צְעִירִים מִמֶּנִּי
  english_pob_choice: those younger than I
  chosen_spanish: los más jóvenes que yo
  alternatives_spanish:
  - los que son más jóvenes que yo
  - los jóvenes menores que yo
  lexicon: HALOT
  rationale: En español, 'los más jóvenes que yo' comunica con claridad la comparación de edad sin añadir 'hombres' como contenido no explícito en el hebreo.
- source_word: אֲשֶׁר מָאַסְתִּי
  english_pob_choice: whose fathers I refused
  chosen_spanish: cuyos padres yo me negué
  alternatives_spanish:
  - cuyos padres yo rechacé
  - a cuyos padres yo me negué
  lexicon: HALOT
  rationale: '''מָאַס'' puede ser ''rechazar'' o ''despreciar''; aquí la idea se completa con el infinitivo siguiente, por lo que ''me negué'' reproduce bien la fuerza de rechazo ligada a la acción posterior.'
- source_word: לָשִׁית
  english_pob_choice: to set
  chosen_spanish: poner
  alternatives_spanish:
  - colocar
  - ponerlos
  lexicon: HALOT
  rationale: '''Poner'' funciona de manera natural con la expresión ''con los perros de mi rebaño'' y conserva el sentido básico de colocar/asignar.'
- source_word: עִם כַּלְבֵי צֹאנִי
  english_pob_choice: with the dogs of my flock
  chosen_spanish: con los perros de mi rebaño
  alternatives_spanish:
  - con los perros de mi ganado
  - con mis perros pastores
  lexicon: HALOT
  rationale: 'La forma hebrea es literal: ''los perros de mi rebaño''. Se mantiene así en el texto principal para preservar la expresión y la posible carga social; no se adelanta la identificación funcional a ''perros pastores'' en la línea principal.'
translation_notes:
  revision_awareness: La redacción refleja el ajuste más reciente del POB inglés que pasó de 'younger men than I' a una formulación más directa ('those younger than I'); por eso en español se evita añadir 'hombres' y se mantiene la comparación de edad de forma simple y literal.
  spanish_consistency_notes:
  - Se mantiene 'rebaño' para צֹאן, de acuerdo con el valor genérico del término y con la traducción inglesa literal 'flock'.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
  - 'La estructura conserva el paralelismo del hebreo: contraste temporal, burla de los jóvenes y referencia a los padres y a los perros del rebaño.'
