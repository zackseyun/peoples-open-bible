id: 2CO.8.9
reference: '2 Corinthians 8:9'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: γινώσκετε γὰρ τὴν χάριν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὅτι δι’ ὑμᾶς ἐπτώχευσεν πλούσιος ὤν, ἵνα ὑμεῖς τῇ ἐκείνου πτωχείᾳ πλουτήσητε.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/009.yaml
  text: For you know the grace of our Lord Jesus Christ[a], that though he was rich, yet for your sake he became poor[b], so that you by his poverty might become rich.
translation:
  language: ko
  text: 여러분은 우리 주 메시아 예수의 은혜[a]를 압니다. 곧 그가 부요하셨으나 여러분을 위하여 가난하게 되신 것은, 여러분이 그의 가난으로 말미암아 부요하게 되도록 하시기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 곧 그리스도의 자기 비움의 은혜. 여기서 「은혜」는 그리스도의 성육신과 자기 낮추심으로 드러난 구원의 은혜를 가리키며, 동시에 헌금 문맥에서 신자의 베풂을 위한 신학적 근거가 된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: our Lord Jesus Christ
  chosen_korean: 우리 주 메시아 예수
  lexicon: BDAG
  rationale: Χριστός를 칭호로 보존하는 정책에 따라 「메시아」로 옮기되, 한국어 어순상 자연스러운 「메시아 예수」로 배치한다. κύριος는 바울적 「주」.
  alternatives_korean:
  - 우리 주 그리스도 예수
- source_word: ἐπτώχευσεν
  english_pob_choice: became poor
  chosen_korean: 가난하게 되신
  lexicon: BDAG
  rationale: 동사 πτωχεύω는 「가난하게 되다」. 그리스도의 자기 비움(케노시스)을 가리키는 핵심 표현으로 의미를 약화하지 않는다.
  alternatives_korean:
  - 빈궁하게 되신
- source_word: πλούσιος ὤν
  english_pob_choice: though he was rich
  chosen_korean: 부요하셨으나
  lexicon: BDAG
  rationale: 분사 구문을 양보 의미로 옮긴다. 「부요」가 신학적 어휘로 정착되어 있다.
  alternatives_korean:
  - 부유하셨으나
theological_decisions:
- issue: 8장 헌금 권면의 신학적 근거로서의 그리스도의 가난
  chosen_reading: 그리스도의 자기 비움이 신자의 베풂의 근거가 됨을 드러내는 강한 어조 유지
  alternative_readings:
  - 은유적 약화
  - 추상화
  rationale: 본문은 그리스도의 부요와 가난을 구체적이고 강한 어조로 대조한다. 한국어에서도 그 대조를 흐리지 않고 그대로 옮겨 본문의 신학적 힘을 보존한다.
  doctrine_reference: 'DOCTRINE.md §1: original-language primacy; preserve theological force'
