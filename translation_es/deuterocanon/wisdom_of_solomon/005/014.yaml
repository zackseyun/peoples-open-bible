review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura de los cuatro símiles del griego y conserva adecuadamente ἐλπὶς = «esperanza», ἀσεβοῦς = «impío», πάχνη = «escarcha fina», καπνός = «humo» y μνεία = «recuerdo». Sin embargo, hay dos problemas de alineación: (1) la nota [a] está anclada a «borra», pero el contenido de la nota corresponde a la cláusula final («huésped/viajero», «recuerdo/mención»), por lo que el anclaje es incorrecto; (2) «empujada por la tormenta» debilita διωχθεῖσα («ahuyentada/arrastrada/expulsada»), que en este contexto meteorológico se acerca más a «barrida» o «arrastrada».'
  spanish_quality_summary: El español es legible y digno, pero «borra» puede sonar menos transparente que «pelusa» para un público amplio; aun así, es defendible si se busca cercanía a «down». La principal falla de calidad es la nota mal ubicada. Además, «dispersado» suena algo pesado; «disipado» o «dispersado» ambos sirven, pero no exige cambio. La frase final mejora si la nota se ancla en «huésped de un día[a]».
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Impío» refleja bien ἀσεβοῦς y preserva la orientación teológica documentada. No aparecen términos del glosario mayor que requieran ajuste. La decisión sobre καταλύτου como «huésped» concuerda con el expediente inglés, siempre que la alternativa «viajero que se quedó solo un día» quede en nota correctamente anclada.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «borra», pero explica καταλύτου y μνεία de la cláusula final.
    rationale: 'Esto rompe la correspondencia entre texto y aparato crítico exigida por el proyecto: el marcador debe aparecer exactamente en la palabra o frase relevante.'
  - severity: medium
    issue: «Empujada por la tormenta» no refleja con suficiente fuerza διωχθεῖσα.
    rationale: El participio pasivo sugiere ser barrida o ahuyentada por la tormenta, no solo empujada; «arrastrada» o «barrida» conserva mejor la imagen de expulsión forzada.
  - severity: low
    issue: «Borra» puede resultar menos natural que «pelusa» en español general.
    rationale: No es incorrecto, pero para legibilidad panhispánica «pelusa» sería más transparente. Como «borra» sigue siendo posible y más cercano a la idea de plumón/fluff, no es un error grave.
  revised_spanish_text: Porque la esperanza del impío es como la borra llevada por el viento, y como la escarcha fina arrastrada por la tormenta, y como el humo dispersado por el viento, y pasa como el recuerdo de un huésped de un día[a].
  revised_footnotes:
  - marker: a
    text: O «como el recuerdo de un viajero que se quedó solo un día». El griego καταλύτου se refiere a alguien que se aloja temporalmente, y μνεία puede significar «recuerdo» o «mención».
    reason: alternative_reading
  revision_rationale: Se reubicó la nota al segmento que realmente comenta, para cumplir con la disciplina de anclaje de notas. También se cambió «empujada» por «arrastrada» para reflejar mejor διωχθεῖσα en la imagen de la escarcha barrida por la tormenta. Se mantuvo «borra» como opción defendible para χνοῦς, aunque menos común que «pelusa».
