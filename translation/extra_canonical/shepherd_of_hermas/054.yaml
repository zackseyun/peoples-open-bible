translation:
  text: |-
    While I was sitting in my house and glorifying the Lord for all the things I had seen, and pondering the commandments—that they are good and powerful and gladdening and glorious and able to save a person’s soul—I said within myself: “Blessed shall I be if I walk in these commandments, and whoever walks in these will be blessed.”
    
    As I was saying these things within myself, I suddenly see him seated beside me and saying this: “Why are you double-minded about the commandments that I commanded you? They are good. Do not be double-minded at all, but clothe yourself with faith in the Lord, and you will walk in them; for I will strengthen you in them.
    
    “These commandments are beneficial for those who are about to repent; for if they do not walk in them, their repentance is in vain.
    
    “You who are repenting, therefore, throw off the evils of this age that wear you down; and having put on every virtue of righteousness, you will be able to keep these commandments and no longer add to your sins. If, therefore, you add nothing further, you will be separated from your former sins. Walk, therefore, in these my commandments, and you will live to God. These things [all] have been spoken to you by me.”
    
    And after he had spoken these things with me, he says to me, “Let us go into a field, and I will show you the shepherds of the sheep.” “Let us go, sir,” I say. And we came to a certain plain, and he shows me a shepherd, a young man, clothed in a suit of garments, saffron in color.
    
    He was pasturing very many sheep, and the sheep were as if living in luxury and very self-indulgent, and they were cheerful, skipping here and there. And the shepherd himself was very cheerful over his flock; and the very appearance of the shepherd was exceedingly cheerful, and he ran around among the sheep.
