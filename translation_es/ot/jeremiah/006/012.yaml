translation:
  language: es
  text: Sus casas serán entregadas a otros, junto con sus campos y sus esposas[a]; porque extenderé mi mano contra los habitantes del país[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres». El hebreo נָשִׁים puede significar «mujeres» o «esposas»; en este contexto de pérdida de casa y bienes, «esposas» parece más probable.
    reason: lexical_alternative
  - marker: b
    text: O «los habitantes de la tierra». El hebreo הָאָרֶץ puede significar «país» o «tierra»; aquí el sentido local parece más probable por el contexto de juicio sobre Judá.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָסַבּוּ
  english_pob_choice: will be turned over
  chosen_spanish: serán entregadas
  alternatives_spanish:
  - serán transferidas
  - pasarán a
  lexicon: HALOT
  rationale: El niphal de סבב expresa aquí un cambio pasivo de posesión. En español, «serán entregadas» comunica con naturalidad la pérdida de propiedad sin forzar un giro demasiado literal.
- source_word: בָתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  lexicon: HALOT
  rationale: «Casas» mantiene el sentido concreto de propiedad material en el contexto de despojo; «hogares» suaviza demasiado la imagen jurídica y patrimonial.
- source_word: לַאֲחֵרִים
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otras personas
  - a extraños
  lexicon: HALOT
  rationale: אחרים significa simplemente «otros». «A otros» conserva la neutralidad del hebreo sin añadir la idea de extraños.
- source_word: שָׂדוֹת
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos de cultivo
  - tierras
  lexicon: HALOT
  rationale: Aunque «campos» y «tierras» pueden funcionar, aquí «campos» suena natural en español y conserva el valor agrícola y patrimonial del término.
- source_word: וְנָשִׁים
  english_pob_choice: wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus mujeres y esposas
  lexicon: HALOT
  rationale: El hebreo puede significar «mujeres» o «esposas». Dado que el español «mujeres» mantiene la ambigüedad documentada y evita fijar por adelantado una lectura más específica, se conserva esa forma en el texto principal.
- source_word: יַחְדָּו
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - juntamente con
  - al mismo tiempo
  lexicon: HALOT
  rationale: La relación coordinada de pérdidas queda clara con «junto con», una fórmula natural y fiel a la acumulación del juicio.
- source_word: אַטֶּה
  english_pob_choice: will stretch out
  chosen_spanish: extenderé
  alternatives_spanish:
  - alargaré
  - tenderé
  lexicon: HALOT
  rationale: El hebreo usa la imagen de extender la mano en juicio. «Extenderé» preserva el gesto idiomático de manera sobria y reconocible en español.
- source_word: אֶת יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi brazo
  lexicon: HALOT
  rationale: La expresión es idiomática y se traduce de forma directa para mantener la fuerza de la intervención divina en juicio.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - sobre en contra de
  lexicon: HALOT
  rationale: Con la metáfora de la mano extendida, «contra» expresa mejor la acción hostil o judicial que «sobre».
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los habitantes del país
  - los que habitan en la tierra
  lexicon: HALOT
  rationale: Aunque el contexto inmediato apunta a Judá, הָאָרֶץ puede abarcar «tierra» o «país». Se conserva «tierra» para no estrechar innecesariamente el alcance del hebreo; la nota puede aclarar la opción local si se desea.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética final se vierte de modo sobrio y solemne. Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide transliterar el Tetragrámaton con una forma audible y no con un sustituto reverencial. En español, «Yahvé» es la forma establecida en la tradición de este proyecto y mantiene la referencia directa al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Extensión de הָאָרֶץ en יֹשְׁבֵי הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/país
  rationale: En Jeremías, el contexto inmediato es el juicio sobre la población del territorio, por lo que «la tierra» en español conserva la amplitud posible del hebreo y no introduce innecesariamente una lectura universalizada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue la línea revisada más reciente del inglés POB sin cambios sustantivos. Se mantuvo la decisión central sobre el nombre divino y la lectura local de הָאָרֶץ, pero en español se optó por «la tierra» como equivalente amplio y natural, con nota para la posibilidad contextual de «país».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se preserva la ambigüedad de וְנָשִׁים con «mujeres», dejando abierta la posible lectura «esposas».
  - 'La secuencia de juicio se mantiene concreta y acumulativa: casas, campos y mujeres, seguida por la mano extendida de Yahvé.'
  - No se emplea «SEÑOR» como sustituto del nombre divino.
