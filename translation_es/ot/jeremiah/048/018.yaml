translation:
  language: es
  text: Desciende de tu gloria y siéntate sedienta[a], oh moradora[b], hija de Dibón, porque el devastador de Moab ha subido contra ti; ha destruido tus fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siéntate en un lugar sediento» / «habita en tierra reseca». La expresión hebrea puede describir la sed misma o la condición/lugar seco al que Dibón es reducida.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hija de Dibón», una personificación profética común de una ciudad y su población como una mujer.
    reason: cultural_note
lexical_decisions:
- source_word: רְדִי
  english_pob_choice: Come down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ven abajo
  lexicon: HALOT
  rationale: El imperativo femenino singular pide un movimiento hacia abajo dirigido a la ciudad personificada. «Desciende» conserva con claridad ese descenso y su tono profético.
- source_word: מִכָּבוֹד
  english_pob_choice: from your glory
  chosen_spanish: de tu gloria
  alternatives_spanish:
  - de tu honor
  - de tu esplendor
  lexicon: HALOT
  rationale: כָּבוֹד puede ser gloria, honor o esplendor. «Tu gloria» mantiene el matiz de estado elevado o próspero de Dibón y conserva el contraste de humillación.
- source_word: ישבי
  english_pob_choice: inhabitant
  chosen_spanish: oh habitante
  alternatives_spanish:
  - tú que habitas
  - moradora
  lexicon: HALOT
  rationale: En contexto funciona como vocativo singular para la ciudad personificada. «Oh habitante» refleja ese llamado directo sin forzar una paráfrasis.
- source_word: בַצָּמָא
  english_pob_choice: in thirst
  chosen_spanish: en la sed
  alternatives_spanish:
  - en sed
  - en tierra sedienta
  - en un lugar reseco
  lexicon: HALOT
  rationale: La frase puede expresar la condición de sed/sequedad o el lugar seco al que ha sido reducida la ciudad. «En la sed» conserva la ambigüedad y el golpe poético del hebreo.
- source_word: יֹשֶׁבֶת בַּת דִּיבוֹן
  english_pob_choice: daughter of Dibon
  chosen_spanish: hija de Dibón
  alternatives_spanish:
  - hija de Dibón, la que habita
  - moradora de Dibón
  lexicon: HALOT
  rationale: La expresión personifica la ciudad y su población como una mujer. «Hija de Dibón» conserva el giro profético tradicional sin perder el valor figurado.
- source_word: שֹׁדֵד
  english_pob_choice: the destroyer
  chosen_spanish: el devastador
  alternatives_spanish:
  - el destructor
  - el saqueador
  lexicon: HALOT
  rationale: El participio denota al agente que arrasa o saquea. «Devastador» comunica bien la fuerza militar de juicio y evita repetir «destruir» de inmediato.
- source_word: עָלָה בָךְ
  english_pob_choice: has come up against you
  chosen_spanish: ha subido contra ti
  alternatives_spanish:
  - ha venido contra ti
  - ha avanzado contra ti
  lexicon: HALOT
  rationale: עלה con ב expresa el avance hostil de un atacante. «Ha subido contra ti» sigue de cerca la imagen direccional del hebreo.
- source_word: שִׁחֵת
  english_pob_choice: has destroyed
  chosen_spanish: ha destruido
  alternatives_spanish:
  - ha arruinado
  - ha asolado
  lexicon: HALOT
  rationale: El verbo significa destruir, arruinar, corromper. «Ha destruido» corresponde de manera directa a la lectura inglesa revisada y al paralelo militar inmediato.
- source_word: מִבְצָרָיִךְ
  english_pob_choice: your fortresses
  chosen_spanish: tus fortalezas
  alternatives_spanish:
  - tus baluartes
  - tus plazas fuertes
  lexicon: HALOT
  rationale: מִבְצָר designa un lugar fortificado o fortaleza. «Fortalezas» es natural en español y conserva el sentido militar del término.
theological_decisions:
- issue: Personificación profética de la ciudad
  english_pob_reading: O inhabitant, daughter of Dibon
  chosen_spanish_reading: oh habitante, hija de Dibón
  alternative_spanish_readings:
  - moradora de Dibón
  - oh hija de Dibón
  rationale: El hebreo presenta a la ciudad como mujer y habla a su población/representación como a una persona. La traducción mantiene esa personificación sin reducirla a un simple topónimo.
  doctrine_reference: Retórica profética y personificación de ciudades en los profetas; cf. uso similar en lamentaciones sobre ciudades.
- issue: Sequedad como estado o lugar
  english_pob_reading: in thirst
  chosen_spanish_reading: en la sed
  alternative_spanish_readings:
  - en un lugar sediento
  - en tierra reseca
  rationale: El texto puede describir la condición de sed o un espacio reseco. Se preserva la ambigüedad porque el hebreo admite ambas posibilidades y el contexto de juicio no obliga a elegir una sola.
  doctrine_reference: Principio de mantener ambigüedad léxica cuando el original la permite y el sentido teológico no depende de fijarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente al mantener el vocativo explícito y traducir שִׁחֵת con un verbo directo de destrucción. También conserva la ambigüedad reconocida en el inglés para בַצָּמָא mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «Dibón» con tilde para la adaptación española del topónimo.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al texto.
  - Se prefirió «fortalezas» frente a «baluartes» por claridad moderna sin perder el registro bíblico.
