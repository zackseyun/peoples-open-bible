- from: Faraón envió[a], y he aquí que no había muerto ni uno de los animales de Israel. Pero el corazón de Faraón se endureció[b], y no dejó ir al pueblo.
  to: Faraón envió[a], y he aquí que no había muerto ni uno del ganado de Israel. Pero el corazón de Faraón se puso pesado[b], y no dejó ir al pueblo.
