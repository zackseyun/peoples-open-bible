translation:
  language: es
  text: 'Y los hijos de Javan: Elishá[a], Tarshish, Kitim y Rodanim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Génesis 10:4 lee «Dodanim» en lugar de «Rodanim», reflejando una variante textual del nombre.
