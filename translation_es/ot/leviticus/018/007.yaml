translation:
  language: es
  text: No descubrirás la desnudez de tu padre[a], es decir, la desnudez de tu madre. Ella es tu madre; no descubrirás su desnudez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No descubrirás la desnudez de tu padre y la desnudez de tu madre». El versículo lo explica refiriéndolo a tu madre: «Ella es tu madre».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la vergüenza de
  - los genitales de
  lexicon: HALOT
  rationale: Conserva el eufemismo legal fijo de Levítico 18 sin volverlo demasiado explícito ni perder el registro jurídico. En español, «desnudez» mantiene la imagen básica de manera natural y fiel.
- source_word: תְגַלֵּה / תְגַלֶּה
  english_pob_choice: you shall not uncover
  chosen_spanish: no descubrirás
  alternatives_spanish:
  - no deberás descubrir
  - no tendrás relaciones sexuales con
  lexicon: HALOT
  rationale: «Descubrir» reproduce de forma directa el verbo ritual/jurídico del hebreo y conserva la fórmula prohibitiva repetida en el capítulo. Se evita una paráfrasis sexual explícita que borraría la formulación tradicional del texto.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  lexicon: HALOT
  rationale: Traducción literal del parentesco con sufijo de segunda persona masculina singular.
- source_word: וְעֶרְוַת אִמְּךָ
  english_pob_choice: that is, the nakedness of your mother
  chosen_spanish: es decir, la desnudez de tu madre
  alternatives_spanish:
  - y la desnudez de tu madre
  lexicon: HALOT
  rationale: El contexto muestra que la segunda expresión explica la primera; «es decir» hace visible la relación explicativa sin añadir contenido nuevo. Se preserva la lógica legal de que la ofensa contra la madre se cuenta como contra el padre.
- source_word: הִוא
  english_pob_choice: She is
  chosen_spanish: Ella es
  alternatives_spanish:
  - Es ella
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere a la madre; mantenerlo explícito ayuda a conservar la fuerza aclaratoria del hebreo.
- source_word: עֶרְוָתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - la desnudez de ella
  lexicon: HALOT
  rationale: Se mantiene el mismo eufemismo consistente con la primera mitad del versículo y con la fórmula legal del capítulo.
theological_decisions:
- issue: Interpretación de «la desnudez de tu padre»
  english_pob_reading: 'Rendered as an explanatory apposition: ''the nakedness of your father, that is, the nakedness of your mother.'''
  chosen_spanish_reading: 'Se traduce como una apposición explicativa: «la desnudez de tu padre, es decir, la desnudez de tu madre».'
  alternative_spanish_readings:
  - la desnudez de tu padre y la desnudez de tu madre
  rationale: El hebreo, confirmado por la cláusula «Ella es tu madre», explica que la violación de la madre cuenta como una afrenta a la desnudez del padre. La versión española mantiene esa tensión interpretativa sin ocultarla.
  doctrine_reference: Levítico 18:7; lógica legal/familiar del parentesco y la honra en la Torá
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada de la POB en inglés: mantiene la fórmula legal de «descubrir la desnudez», hace explícita la aclaración appositiva y preserva la interpretación del segundo miembro como explicación del primero. No se registraron cambios en la última revisión.'
  spanish_consistency_notes:
  - Se mantiene «desnudez» para conservar el eufemismo legal de Levítico 18 en toda la sección.
  - Se usa «descubrir» de manera uniforme para el hebreo גלה con ערוה, evitando alternar con formulaciones más interpretativas.
  - «Es decir» refleja la relación explicativa ya presente en la auditable POB inglesa.
  - La nota al pie preserva la alternativa más literal sin borrar la lectura contextual preferida.
