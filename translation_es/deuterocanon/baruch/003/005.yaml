translation:
  language: es
  text: No recuerdes las malas acciones de nuestros padres[a], sino recuerda tu mano[b] y tu nombre en este momento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los actos injustos» o «las injusticias de nuestros padres».'
    reason: lexical_alternative
  - marker: b
    text: «Tu mano» es un modismo bíblico que puede implicar tu poder o tu acción poderosa.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ μνησθῇς
  english_pob_choice: Do not remember
  chosen_spanish: No recuerdes
  alternatives_spanish:
  - No traigas a la memoria
  - No tengas presentes
  lexicon: BDAG
  rationale: La forma imperativa negativa conserva la súplica directa y el contraste retórico con μνήσθητι. «Recordar» mantiene el giro bíblico sin volver la frase demasiado explicativa.
- source_word: ἀδικιῶν
  english_pob_choice: the unrighteous acts
  chosen_spanish: las injusticias
  alternatives_spanish:
  - los actos de injusticia
  - las maldades
  - los agravios
  lexicon: BDAG
  rationale: «Injusticias» expresa bien el peso moral de ἀδικία en español y suena natural en una súplica litúrgica. Mantiene la idea de conducta contraria a la justicia sin reducirla sólo a una categoría social.
- source_word: πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  lexicon: BDAG
  rationale: El griego es explícitamente masculino plural, y «padres» conserva esa referencia genealógica. «Antepasados» neutraliza el matiz del original; por eso no se prefiere en el texto principal.
- source_word: μνήσθητι
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presente
  - trae a la memoria
  lexicon: BDAG
  rationale: 'Usar el mismo verbo básico que en la primera cláusula conserva el contraste: no recordar sus injusticias, sino recordar lo que pertenece a Dios.'
- source_word: χειρός σου
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu fuerza
  - tu acción poderosa
  lexicon: LSJ
  rationale: «Mano» traduce literalmente χείρ y preserva la imagen bíblica. En español, la metáfora puede entenderse como poder o acción sin necesidad de sustituirla en el texto principal.
- source_word: ὀνόματός σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu honor
  lexicon: BDAG
  rationale: «Nombre» es la forma bíblica más directa y mantiene la carga de identidad, reputación y honor divinos. Evita explicar demasiado lo que el griego deja implícito.
- source_word: ἐν τῷ καιρῷ τούτῳ
  english_pob_choice: at this time
  chosen_spanish: en este tiempo
  alternatives_spanish:
  - ahora
  - en esta ocasión
  lexicon: BDAG
  rationale: «En este tiempo» conserva el valor situacional de καιρός y suena natural en español. No se reduce a un simple «ahora», para no perder el matiz de coyuntura.
theological_decisions:
- issue: Sentido de «tu mano» como metáfora
  english_pob_reading: A biblical idiom that can imply your power or mighty action.
  chosen_spanish_reading: Una imagen bíblica que puede implicar tu poder o tu acción poderosa.
  alternative_spanish_readings:
  - Tu mano se entiende literalmente sin implicación metafórica.
  - Tu mano equivale simplemente a tu capacidad.
  rationale: La frase se mantiene literal en el texto para respetar la imagen, pero la nota aclara su posible sentido idiomático. Así no se aplana la tensión entre lo literal y lo figurado.
  doctrine_reference: Preservar la metáfora bíblica sin resolverla prematuramente.
- issue: Relación entre el olvido de las culpas pasadas y el recuerdo de la identidad de Dios
  english_pob_reading: A plea for God to act in accordance with his known power and covenantal identity/honor.
  chosen_spanish_reading: Una súplica para que Dios actúe conforme a su poder conocido y a su identidad/honor divinos.
  alternative_spanish_readings:
  - Una petición para que Dios sólo tome nota de su poder y su nombre.
  - Una apelación sin matiz de alianza o pacto.
  rationale: El hebraísmo de «mano» y «nombre» se conserva sin sobrerinterpretar, pero la decisión española permite percibir la dimensión de poder e identidad divina que el contexto sugiere. Se mantiene la tensión teológica sin reducirla a una explicación exhaustiva.
  doctrine_reference: Preservar tensión teológica y lectura canónica sin paráfrasis excesiva.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete y coincide con la lectura auditada en inglés: negativa inicial con contraste positivo, mantenimiento de «mano» y «nombre» como imágenes bíblicas, y conservación del referente masculino plural «padres». No se detectaron cambios de revisión en el expediente inglés; por eso no se introdujeron ajustes adicionales.'
  spanish_consistency_notes:
  - Se usó «No recuerdes» y «recuerda» para conservar la repetición intencional del verbo.
  - Se prefirió «padres» sobre «antepasados» por fidelidad al masculino plural del griego.
  - Se mantuvo «mano» de forma literal y se aclaró su posible valor idiomático en nota.
  - «Nombre» se conservó sin reemplazarlo por «reputación» para no perder la formulación bíblica.
  - «En este tiempo» refleja la coyuntura de καιρός con un español natural y solemne.
