  spanish_quality_summary: 'El español es generalmente claro, pero hay dos problemas de calidad: 1) la colocación del marcador [a] rompe la fluidez; 2) «en el hombre» resulta innecesariamente rígido en un registro bíblico contemporáneo ampliamente legible. También «estará continuamente presente» es fiel pero algo pesado; «persistirá» expresa mejor el valor durativo en español sin perder sentido.'
  glossary_alignment: 'No hay conflicto con la terminología teológica del proyecto. «Indisciplinados» encaja bien para ἀπαίδευτων. La principal cuestión léxica es ἐν ἀνθρώπῳ: aunque el genérico masculino es defendible, en español de destino «en una persona» preserva mejor el sentido genérico con mayor naturalidad, y además coincide con la revisión inglesa auditada.'
  issues:
