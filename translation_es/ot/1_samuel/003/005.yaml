translation:
  language: es
  text: 'Corrió a Elí y le dijo: «Aquí estoy, porque me llamaste». Pero él dijo: «No te llamé. Vuelve[a]; acuéstate». Y se fue y se acostó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Regresa; acuéstate».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָץ
  english_pob_choice: He ran
  chosen_spanish: Corrió
  alternatives_spanish:
  - Se apresuró
  - Fue corriendo
  lexicon: HALOT
  rationale: רץ denota correr; «corrió» mantiene la acción directa y la rapidez de la respuesta de Samuel sin añadir matices no presentes.
- source_word: אֶל עֵלִי
  english_pob_choice: to Eli
  chosen_spanish: a Elí
  alternatives_spanish:
  - hacia Elí
  - para Elí
  lexicon: HALOT
  rationale: אֶל expresa movimiento hacia una persona; en español natural, «a Elí» comunica correctamente la dirección del movimiento.
- source_word: הִנְנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Aquí me tienes
  lexicon: HALOT
  rationale: La fórmula de autodenuncia/respuesta se expresa de manera natural con «Aquí estoy»; conserva el sentido de disponibilidad y presencia sin sonar forzada.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce la razón por la que Samuel vino a Elí; «porque» hace explícita la relación causal de forma clara y fiel.
- source_word: קָרָאתָ לִּי
  english_pob_choice: you called me
  chosen_spanish: me llamaste
  alternatives_spanish:
  - me has llamado
  - me convocaste
  lexicon: HALOT
  rationale: קרא con ל indica llamar a alguien; «me llamaste» es la equivalencia directa y natural en español.
- source_word: לֹא קָרָאתִי
  english_pob_choice: I did not call
  chosen_spanish: No te llamé
  alternatives_spanish:
  - No llamé
  - Yo no te llamé
  lexicon: HALOT
  rationale: Aunque el hebreo omite el objeto, el contexto lo recupera con claridad; en español, «No te llamé» evita ambigüedad y reproduce el contraste de la escena.
- source_word: שׁוּב
  english_pob_choice: Go back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Retorna
  lexicon: HALOT
  rationale: שׁוּב significa volver/retornar; «vuelve» es breve, natural e imperativo, y conserva la dirección de regreso al lugar anterior.
- source_word: שְׁכָב
  english_pob_choice: lie down
  chosen_spanish: acuéstate
  alternatives_spanish:
  - vuelve a acostarte
  - tiéndete
  lexicon: HALOT
  rationale: שׁכב significa acostarse o echarse; «acuéstate» es la forma imperativa natural en español y refleja la orden sin exceso de explicación.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went
  chosen_spanish: Y se fue
  alternatives_spanish:
  - Entonces fue
  - Y volvió
  lexicon: HALOT
  rationale: הלך es simplemente irse/ir; «y se fue» mantiene la progresión narrativa sin añadir información ausente.
- source_word: וַיִּשְׁכָּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se echó
  - volvió a acostarse
  lexicon: HALOT
  rationale: La forma narrativa de שׁכב se expresa naturalmente como «se acostó», que comunica la acción concluida con precisión.
theological_decisions:
- issue: Fórmula de disponibilidad personal
  english_pob_reading: Here I am
  chosen_spanish_reading: Aquí estoy
  alternative_spanish_readings:
  - Heme aquí
  - Aquí me tienes
  rationale: No hay carga doctrinal especial; se trata de una fórmula de respuesta. «Aquí estoy» conserva la función discursiva sin convertirla en un giro marcadamente bíblico o arcaico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audit trail inglés: se prefirió una causal explícita para כִּי y no se añadieron elementos no sustentados por el hebreo. La nota alternativa se ancla únicamente en la orden שׁוּב + שְׁכָב, como en el POB inglés.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Elí» con acento español estándar.
  - 'Se conservó la secuencia narrativa simple del hebreo: correr, hablar, responder, mandar, irse y acostarse.'
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo.
  - El discurso directo se puntuó con comillas angulares españolas para legibilidad editorial.
