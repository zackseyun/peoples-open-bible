  to: Y Judas supo[a] que había venido contra él con engaño; y se alarmó por causa de él, y ya no quiso ver su rostro.
  rationale: Se reemplaza la apertura por una formulación española más natural, sin perder el sentido del griego. «Judas supo» comunica claramente el resultado de ἐγνώσθη, mientras la nota conserva la alternativa más cercana al pasivo impersonal y al valor de ὁ λόγος como noticia/asunto. También se ajusta «no quiso ya» a «ya no quiso», que suena más natural en español contemporáneo.
