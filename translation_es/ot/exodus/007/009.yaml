translation:
  language: es
  text: 'Cuando el faraón les hable, diciendo: «Produzcan una señal para ustedes mismos», entonces dirás a Aarón: «Toma tu vara y arrójala delante del faraón; que se convierta en una serpiente[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dragón»; el hebreo tannin puede referirse más ampliamente a una serpiente, criatura marina o criatura similar a un dragón, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי / when
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Porque
  - Pues cuando
  lexicon: HALOT
  rationale: La partícula introduce aquí una circunstancia temporal anticipada, no una causa. «Cuando» reproduce bien el valor condicional-temporal del hebreo en español natural.
- source_word: יְדַבֵּר
  english_pob_choice: speaks
  chosen_spanish: les hable
  alternatives_spanish:
  - les hablará
  - les habla
  lexicon: HALOT
  rationale: 'En una cláusula temporal futura, el español prefiere subjuntivo: «Cuando el faraón les hable». Conserva la dirección al grupo destinatario sin forzar un futuro perifrástico innecesario.'
- source_word: מוֹפֵת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - prodigio
  - portento
  - milagro
  lexicon: HALOT
  rationale: El término designa una señal demostrativa o prodigiosa. «Señal» es claro en español moderno y mantiene el carácter de acto visible que pide Faraón.
- source_word: תְּנוּ לָכֶם
  english_pob_choice: Produce a sign for yourselves
  chosen_spanish: Preséntenles una señal para ustedes mismos
  alternatives_spanish:
  - Denles una señal para ustedes
  - Produzcan una señal para ustedes mismos
  - Muestren una señal para ustedes mismos
  lexicon: HALOT
  rationale: Literalmente sería «den para ustedes», pero el sentido idiomático es exigir la producción de una señal. Mantengo el matiz reflexivo con «para ustedes mismos» y el plural indirecto del destinatario con «les».
- source_word: וְאָמַרְתָּ אֶל אַהֲרֹן
  english_pob_choice: then you shall say to Aaron
  chosen_spanish: entonces dirás a Aarón
  alternatives_spanish:
  - y dirás a Aarón
  - luego dirás a Aarón
  lexicon: HALOT
  rationale: La waw consecutiva avanza la instrucción. «Entonces dirás» refleja mejor el orden procedural que un simple «y».
- source_word: מַטְּךָ
  english_pob_choice: your staff
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu cayado
  - tu vara de mando
  lexicon: HALOT
  rationale: «מַטֶּה» puede ser «vara» o «bastón». Opto por «vara» por ser natural en español bíblico moderno y flexible para el objeto usado en la señal.
- source_word: וְהַשְׁלֵךְ
  english_pob_choice: throw it down
  chosen_spanish: arrójala
  alternatives_spanish:
  - lánzala
  - échala
  - tírala
  lexicon: HALOT
  rationale: El verbo pide una acción de arrojar/soltar con fuerza. «Arrójala» conserva el imperativo y la dirección del movimiento. El objeto implícito («la») remite a la vara.
- source_word: לִפְנֵי פַרְעֹה
  english_pob_choice: before Pharaoh
  chosen_spanish: delante del faraón
  alternatives_spanish:
  - en presencia del faraón
  - ante el faraón
  lexicon: HALOT
  rationale: «Delante de» reproduce con naturalidad la escena física y solemne del gesto público.
- source_word: יְהִי
  english_pob_choice: let it become
  chosen_spanish: que se convierta
  alternatives_spanish:
  - que llegue a ser
  - que sea
  - que se haga
  lexicon: HALOT
  rationale: El jussivo expresa resultado deseado o permitido. «Que se convierta» comunica bien el cambio de estado sin imponer un futuro plano.
- source_word: תַנִּין
  english_pob_choice: serpent
  chosen_spanish: un monstruo marino
  alternatives_spanish:
  - una serpiente
  - un dragón
  - un gran reptil
  lexicon: HALOT
  rationale: El término hebreo tiene un rango amplio y no se limita a «serpiente». Dado que la POB inglesa preserva una nota sobre «dragon» y reconoce la amplitud semántica, en español dejo una alternativa que no aplana el término. «Monstruo marino» conserva la fuerza de la palabra hebrea como criatura monstruosa/primordial, aunque el contexto narrativo permite también «serpiente».
theological_decisions:
- issue: Alcance semántico de תַנִּין en la señal ante el faraón
  english_pob_reading: serpent, with footnote preserving the broader possibility of dragon-like creature
  chosen_spanish_reading: un monstruo marino
  alternative_spanish_readings:
  - una serpiente
  - un dragón
  - un gran reptil
  rationale: 'La auditable tensión lexical se mantiene: el hebreo תַנִּין puede abarcar más que una serpiente común. En español no conviene fijarlo sin más a «serpiente» si se quiere preservar la amplitud reconocida por la POB inglesa. «Monstruo marino» funciona como equivalente amplio y deja abierta la posibilidad de una criatura serpentiforme o monstruosa.'
  doctrine_reference: Preservar la tensión lexical documentada; evitar resolver artificialmente el término amplio.
translation_notes:
  revision_awareness: La POB inglesa reciente mantiene la misma lectura general y no introdujo cambios en esta unidad. Esta versión española sigue el audit trail existente, pero adapta la sintaxis al español natural y conserva la amplitud semántica documentada para תַנִּין en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Aarón» y «faraón» con minúscula inicial común en contexto narrativo, conforme a uso editorial en español.
  - «Vara» se eligió como equivalente estable para מַטֶּה; si en contextos cercanos se prefiere «bastón» o «cayado», deberá documentarse por motivo contextual.
  - Se preservó la tensión lexical de תַנִּין mediante la nota, en vez de cerrar la interpretación solo a «serpiente».
