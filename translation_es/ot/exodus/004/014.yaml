translation:
  language: es
  text: 'Entonces se encendió el enojo de Yahvé contra Moisés, y dijo: «¿No está tu hermano Aarón, el levita? Yo sé que él sí sabe hablar[a]. Y además, mira, él sale a recibirte; cuando te vea, se alegrará en su corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habla con soltura»; lit.: «hablando hablará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the LORD’s anger burned
  chosen_spanish: se encendió el enojo
  alternatives_spanish:
  - ardió la ira
  - se encendió la ira
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y usa una imagen de fuego/ardor. En español, «se encendió el enojo» conserva la metáfora sin sonar forzado; «enojo» es natural y comunica el afecto de manera clara.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio, no como sustitución titular. «Yahvé» es la forma estándar del proyecto para יְהוָה y preserva la referencia al nombre del pacto.
- source_word: הֲלֹא
  english_pob_choice: Is there not
  chosen_spanish: ¿No está... ?
  alternatives_spanish:
  - ¿Acaso no está... ?
  - ¿No es que... ?
  lexicon: HALOT
  rationale: La pregunta retórica espera respuesta afirmativa. «¿No está...?» reproduce bien el valor interrogativo y resulta idiomático en español.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano mayor
  - tu pariente
  lexicon: HALOT
  rationale: El término de parentesco es directo; no requiere ampliación. «Tu hermano» conserva la relación familiar sin añadir información no explícita.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el descendiente de Leví
  - el de Leví
  lexicon: HALOT
  rationale: «El levita» es el etnónimo natural y fiel al hebreo. Aquí probablemente identifica a Aarón por su filiación tribal, no por una función cultual posterior.
- source_word: יָדַעְתִּי כִּי דַבֵּר יְדַבֵּר הוּא
  english_pob_choice: I know that he can indeed speak
  chosen_spanish: Yo sé que él, de hecho, habla
  alternatives_spanish:
  - Yo sé que él habla con soltura
  - Yo sé que él ciertamente hablará
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la afirmación. En español, «de hecho» transmite esa fuerza enfática sin introducir «bien» o «con soltura», que irían más allá de lo que el hebreo exige.
- source_word: וְגַם הִנֵּה
  english_pob_choice: And also, behold
  chosen_spanish: Y además, mira
  alternatives_spanish:
  - Y además, he aquí
  - Y también, mira
  lexicon: HALOT
  rationale: La combinación añade énfasis y atención a lo siguiente. «Y además, mira» conserva el valor deíctico de הִנֵּה con un registro claro y natural; «he aquí» sería más solemne pero menos corriente.
- source_word: יֹצֵא לִקְרָאתֶךָ
  english_pob_choice: he is coming out to meet you
  chosen_spanish: él sale a recibirte
  alternatives_spanish:
  - él está saliendo a recibirte
  - él va a salir a tu encuentro
  lexicon: HALOT
  rationale: El participio indica acción inminente/progresiva. «Sale a recibirte» es fluido en español y conserva la idea de encuentro sin sobrecargarla con perífrasis.
- source_word: וְרָאֲךָ
  english_pob_choice: when he sees you
  chosen_spanish: cuando te vea
  alternatives_spanish:
  - y te verá
  - al verte
  lexicon: HALOT
  rationale: El hebreo presenta la visión como circunstancia previa al resultado siguiente. «Cuando te vea» expresa bien ese valor temporal en español.
- source_word: וְשָׂמַח בְּלִבּוֹ
  english_pob_choice: he will rejoice in his heart
  chosen_spanish: se alegrará en su corazón
  alternatives_spanish:
  - su corazón se alegrará
  - se gozará interiormente
  lexicon: HALOT
  rationale: Se mantiene la dimensión interna explícita del hebreo con «en su corazón». «Alegrarse» comunica bien la reacción afectiva y evita una formulación demasiado literal o extraña.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y el proyecto español debe preservar el nombre divino en vez de ocultarlo bajo un título. «Yahvé» sigue la convención del POB en español y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del infinitivo absoluto דַבֵּר יְדַבֵּר
  english_pob_reading: he can indeed speak
  chosen_spanish_reading: él, de hecho, habla
  alternative_spanish_readings:
  - él habla con soltura
  - él ciertamente hablará
  rationale: El hebreo enfatiza la capacidad/realidad del habla. En español, «de hecho» reproduce el énfasis sin introducir una evaluación adicional como «con soltura», que podría sonar interpretativa.
  doctrine_reference: HALOT / sintaxis hebrea del infinitivo absoluto intensivo
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al reflejar el hebreo enfático de דַבֵּר יְדַבֵּר con una expresión española no adverbializante como «de hecho», y al usar un equivalente formal de הִנֵּה. También se tomó en cuenta el ajuste posterior en inglés que evitó «well», por lo que no se introdujo una valoración de habilidad no explicitada por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «levita» como etnónimo, no como cargo.
  - Se conserva la imagen interna de בְּלִבּוֹ con «en su corazón».
  - No se sustituye «Moisés» por una forma abreviada ni se añade información narrativa ausente.
