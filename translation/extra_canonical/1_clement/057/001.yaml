id: 1CLEM.57.1
reference: 1 Clement 57:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ὑμεῖς οὖν οἱ τὴν καταβολὴν τῆς στάσεως ποιήσαντες ὑποτάγητε τοῖς πρεσβυτέροις καὶ παιδεύθητε εἰς μετάνοιαν, κάμψαντες τὰ γόνατα τῆς καρδίας ὑμῶν. 2. μάθετε ὑποτάσσεσθαι, ἀποθέμενοι τὴν ἀλαζόνα καὶ ὑπερήφανον τῆς γλώσσης ὑμῶν αὐθάδειαν· ἄμεινον γάρ ἐστιν ὑμῖν, ἐν τῷ ποιμνίῳ τοῦ Χριστοῦ μικροὺς καὶ ἐλλογίμους εὑρεθῆναι, ἢ καθ' ὑπεροχὴν δοκοῦντας ἐκβληθῆναι ἐκ τῆς ἐλπίδος αὐτοῦ. 3. οὕτω γὰρ λέγει ἡ πανάρετος σοφία· Ἰδοὺ, προΐομαι ὑμῖν ἐμῆς πνοῆς ῥῆσιν, διδάξω δὲ ὑμᾶς τὸν ἐμὸν λόγον. 4. ἐπειδὴ ἐκάλουν καὶ οὐχ ὑπηκούσατε, καὶ ἐξέτεινον λόγους καὶ οὐ προσεἴχετε, ἀλλὰ ἀκύρους ἐποιεῖτε τὰς ἐμὰς βουλάς, τοῖς δὲ ἐμοῖς ἐλέγχοις ἠπειθήσατε· τοιγαροῦν κἀγὼ τῇ ὑμετέρᾳ ἀπωλείᾳ ἐπιγελάσομαι, καταχαροῦμαι δέ, ἥνικα ἂν ἔρχηται ὑμῖν ὄλεθρος καὶ ὡς ἂν ἀφίκηται ὑμῖν ἄφνω θόρυβος, ἡ δὲ καταστροφή ὁμοία καταιγὶδι παρῇ, ἢ ὅταν ἔρχηται ὑμῖν θλῖψις καὶ πολιορκία. 5. ἔσται γάρ, ὅταν ἐπικαλέσησθέ με, ἐγὼ δὲ οὐκ εἰσακούσομαι ὑμῶν· ζητήσουσί με κακοὶ καὶ οὐχ εὑρήσουσιν. ἐμίσησαν γὰρ σοφίαν, τὸν δὲ φόβον τοῦ κυρίου οὐ προείλαντο, οὐδὲ ἤθελον ἐμαῖς προσέχειν βουλαῖς· ἐμυκτήριζον δὲ ἐμοὺς ἐλέγχους. 6. τοιγαροῦν ἔδονται τῆς ἑαυτῶν ὁδοῦ τοὺς καρποὺς καὶ τῆς ἑαυτῶν ἀσεβείας πλησθήσονται. 7. ἀνθ' ὧν γὰρ ἠδίκουν νηπίους φονευθήσονται, καὶ ἐξέτασμος ἀσεβεῖς ὀλεῖ· ὁ δὲ ἐμοῦ ἀκούων κατασκηνώσει ἐπ' ἐλπίδι πεποιθὼς καὶ ἡσυχάσει ἀφόβως ἀπὸ παντὸς κακοῦ.
  language: Greek
