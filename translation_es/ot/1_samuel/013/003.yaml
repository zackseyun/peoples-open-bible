translation:
  language: es
  text: 'Jonatán abatió la guarnición[a] de los filisteos que estaba en Geba, y los filisteos lo oyeron. Entonces Saúl tocó el cuerno[b] por todo el territorio, diciendo: «¡Que oigan los hebreos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el prefecto filisteo» o «el gobernador filisteo»; el hebreo puede referirse tanto a un funcionario como a un puesto militar establecido. En este contexto, «guarnición» encaja mejor con la escena bélica.
    reason: lexical_alternative
  - marker: b
    text: O «tocó la trompeta»; shofar designa específicamente un cuerno, tradicionalmente de carnero.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - hirió
  - derribó de golpe
  - venció
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o abatir con fuerza decisiva. En español, «derribó» comunica bien el carácter contundente de la acción militar sin obligar a decidir aquí si el blanco fue una persona, un puesto o una fuerza.
- source_word: נְצִיב פְּלִשְׁתִּים
  english_pob_choice: the Philistine garrison
  chosen_spanish: la guarnición
  alternatives_spanish:
  - el prefecto filisteo
  - el gobernador filisteo
  - el puesto filisteo
  lexicon: HALOT
  rationale: El término hebreo puede designar una autoridad colocada o una posición militar establecida. Dado el contexto bélico, «guarnición» mantiene la opción militar adoptada por el inglés y suena natural en español.
- source_word: בְּגֶבַע
  english_pob_choice: at Geba
  chosen_spanish: en Geba
  alternatives_spanish:
  - en la ciudad de Geba
  - junto a Geba
  lexicon: HALOT
  rationale: El topónimo se conserva sin adaptación. «En» es la preposición más natural en español para la localización del hecho, sin precisar más de lo que el hebreo indica.
- source_word: וַיִּשְׁמְעוּ פְּלִשְׁתִּים
  english_pob_choice: the Philistines heard of it
  chosen_spanish: los filisteos lo oyeron
  alternatives_spanish:
  - los filisteos oyeron de ello
  - los filisteos se enteraron
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «los filisteos oyeron». En español, el objeto implícito puede mantenerse con «lo» para reflejar la referencia contextual sin añadir una interpretación más fuerte.
- source_word: תָּקַע בַּשּׁוֹפָר
  english_pob_choice: blew the ram's horn
  chosen_spanish: tocó el cuerno
  alternatives_spanish:
  - tocó el shofar
  - tocó el cuerno de carnero
  - hizo sonar el cuerno
  lexicon: HALOT
  rationale: שׁוֹפָר es específicamente un cuerno, tradicionalmente de carnero. «Tocó el cuerno» es claro y digno en español; la precisión cultural se conserva en la nota, como en el inglés POB.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: throughout all the land
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - por todo el país
  - por todo el territorio
  lexicon: HALOT
  rationale: Aquí הָאָרֶץ se refiere al ámbito territorial, no al planeta. «Por toda la tierra» reproduce con naturalidad la amplitud de la proclamación y permite la resonancia bíblica del término sin forzar una lectura moderna.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - proclamando
  - con estas palabras
  lexicon: HALOT
  rationale: Es la fórmula normal que introduce el discurso directo. «Diciendo» es transparente y fiel al hebreo.
- source_word: יִשְׁמְעוּ הָעִבְרִים
  english_pob_choice: Let the Hebrews hear!
  chosen_spanish: ¡Que lo oigan los hebreos!
  alternatives_spanish:
  - ¡Que oigan los hebreos!
  - ¡Los hebreos deben oírlo!
  - ¡Oigan los hebreos!
  lexicon: HALOT
  rationale: El imperfecto funciona aquí como exhortación/jussivo en un anuncio público. «¡Que lo oigan los hebreos!» conserva el valor de mandato o convocatoria, y mantiene «hebreos» como traducción del término fuente, igual que el inglés POB.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura del POB inglés con alta concordancia y sin cambios revisionales necesarios; se preserva la tensión lexical en נְצִיב y la concreción cultural de שׁוֹפָר.
  spanish_consistency_notes:
  - Se mantiene «hebreos» para הָעִבְרִים, como en el inglés POB, en lugar de sustituirlo por «israelitas».
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni un sustituto de κύριος.
  - Se usa «cuerno» como equivalente principal de shofar, con nota para la alternativa cultural específica.
  - «Guarnición» refleja la decisión militar principal y evita sobredeterminación del oficio o cargo.
