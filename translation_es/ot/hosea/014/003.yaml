review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: llevar palabras, volver a Yahvé, pedir que quite la iniquidad, recibir lo bueno y responder con una ofrenda verbal. Sin embargo, no preserva de forma consistente la decisión léxica/theológica documentada para פָרִים שְׂפָתֵינוּ. La evidencia fuente y las decisiones auditadas en inglés dejan claro que el texto masorético dice literalmente «los toros de nuestros labios», manteniendo la metáfora sacrificial en el texto principal y reservando «fruto de nuestros labios» como alternativa en nota. El borrador invierte esa relación.'
  spanish_quality_summary: El español es claro y legible, pero mezcla voseo peninsular («tomad», «volved», «decidle», «vosotros») con una meta declarada como español neutro latinoamericano/broadly church-readable. Conviene regularizar al registro neutral con «lleven», «vuelvan», «díganle», «ustedes». También «pagaremos con...» suena algo menos natural aquí que «ofreceremos...» o «pagaremos...»; pero dado el valor de שלם, puede mantenerse «pagaremos/ofreceremos» con cuidado. La reparación principal es restaurar la metáfora «toros de nuestros labios» en el texto principal.
  glossary_alignment: Alinea bien «Yahvé» para יהוה y conserva «iniquidad». La principal desviación es פָרִים שְׂפָתֵינוּ, donde el borrador adopta la lectura interpretativa «fruto de nuestros labios» en el texto principal pese a que la justificación léxica documentada favorece retener la imagen «toros de nuestros labios» y relegar «fruto...» a nota. Además, por estilo de proyecto en español neutro, es preferible evitar «vosotros».
  issues:
  - severity: high
    issue: El texto principal traduce פָרִים שְׂפָתֵינוּ como «el fruto de nuestros labios»
    rationale: La documentación léxica y teológica del pasaje afirma que el MT conserva la metáfora sacrificial «los toros de nuestros labios» en el texto principal, con «fruto de nuestros labios» como alternativa explicativa en nota. El borrador no preserva esa decisión fuente-cercana.
  - severity: medium
    issue: Registro pronominal no neutro latinoamericano
    rationale: «Tomad», «volved», «decidle», «vosotros» suenan peninsulares y desentonan con el objetivo de español neutral latinoamericano/broadly church-readable. Una forma con «ustedes» mejora la adecuación sin alterar el sentido.
  - severity: low
    issue: La nota [b] está bien planteada, pero ya no corresponde al anclaje ideal si se corrige el texto principal
    rationale: Si el texto principal vuelve a «los toros de nuestros labios», la nota debe presentar «el fruto de nuestros labios» como alternativa interpretativa, no al revés.
  revised_spanish_text: 'Lleven palabras con ustedes y vuelvan a Yahvé. Díganle: «Quita toda iniquidad[a] y recibe lo bueno, y pagaremos con los toros de nuestros labios[b]».'
  revised_footnotes:
