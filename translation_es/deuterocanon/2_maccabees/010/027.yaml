review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: introducción a una carta dirigida al colectivo judío, seguida del encabezado epistolar «Rey Antíoco ... saludos». Sin embargo, ἔθνος está auditado como «nation» por su matiz corporativo-político, y «pueblo» debilita ese valor. Además, el encabezado citado suena más natural y fiel en español sin el artículo en «Rey Antíoco».'
  spanish_quality_summary: 'El español es claro, pero hay pequeños ajustes de naturalidad y registro: «a la nación» preserva mejor el sentido del original que «al pueblo»; «era como sigue» o «era así» son posibles, pero «era como sigue» encaja mejor con una introducción formal a correspondencia; y «saludos» suena más idiomático en español actual que el singular «salud» en este contexto, sin perder la función epistolar de χαίρειν.'
  glossary_alignment: No hay términos teológicos del glosario principal en este versículo. La decisión «consejo de ancianos» para γερουσία está bien alineada con la auditoría inglesa. La nota léxica sobre «los demás judíos» debe mantenerse. El anclaje de la nota cultural debe moverse a «consejo de ancianos», no a «judíos», para corresponder exactamente al término γερουσία.
  issues:
  - severity: medium
    issue: ἔθνος se traduce como «pueblo» en vez de «nación».
    rationale: La auditoría inglesa documenta explícitamente «nation» para preservar el sentido político-corporativo. «Pueblo» es posible, pero reduce ese matiz y se aparta innecesariamente de la decisión fuente.
  - severity: medium
    issue: La nota [b] sobre γερουσία está anclada en «judíos» en lugar de «consejo de ancianos».
    rationale: Las notas deben aparecer en el lugar relevante del texto. La nota cultural explica γερουσία, por lo que el marcador debe ir junto a «consejo de ancianos».
  - severity: low
    issue: «El rey Antíoco» suena menos idiomático que «Rey Antíoco» en un encabezado epistolar.
    rationale: El griego funciona como título encabezando la carta. En español, omitir el artículo reproduce mejor la fórmula de encabezamiento.
  - severity: low
    issue: «salud» es menos natural que «saludos» para χαίρειν en español contemporáneo eclesial general.
    rationale: Aunque «salud» tiene tradición epistolar, «saludos» comunica mejor la fórmula convencional sin arcaísmo innecesario.
  revised_spanish_text: 'Y a la nación, la carta del rey era como sigue: «Rey Antíoco, al consejo de ancianos[b] de los judíos y a los demás judíos[a], saludos».'
