translation:
  language: es
  text: La mujer tierna y delicada que está entre ustedes, que no se ha atrevido a poner la planta de su pie sobre el suelo por delicadeza y ternura, tendrá el ojo malo[a] contra el esposo de su abrazo[b], contra su hijo y contra su hija—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «tener el ojo malo contra» significa mirar con hostilidad, resentimiento o mezquindad egoísta.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el hombre de su seno»; expresión íntima para su marido.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרַכָּה
  english_pob_choice: tender
  chosen_spanish: tierna
  alternatives_spanish:
  - suave
  - delicada
  lexicon: HALOT
  rationale: רך en femenino describe suavidad, ternura o extrema delicadeza. «Tierna» comunica bien esa fragilidad física o de crianza en español natural y mantiene el paralelo con «delicada».
- source_word: וְהָעֲנֻגָּה
  english_pob_choice: delicate
  chosen_spanish: delicada
  alternatives_spanish:
  - consentida
  - refinada
  lexicon: HALOT
  rationale: ענג aquí expresa una condición mimada o refinada. «Delicada» preserva la idea de una mujer muy resguardada, sin cargar el texto con un matiz más interpretativo como «consentida».
- source_word: אֲשֶׁר לֹא נִסְּתָה כַף רַגְלָהּ הַצֵּג עַל הָאָרֶץ
  english_pob_choice: who has not ventured to set the sole of her foot on the ground
  chosen_spanish: que no ha probado a poner la planta de su pie sobre la tierra
  alternatives_spanish:
  - que no se ha atrevido a poner la planta de su pie sobre la tierra
  - que no ha llegado a poner la planta de su pie sobre el suelo
  lexicon: HALOT
  rationale: 'El hebreo describe una delicadeza extrema: ni siquiera ha intentado apoyar el pie en el suelo. «No ha probado a poner» conserva el matiz de intento/no experiencia con español natural; «planta de su pie» refleja כף רגל sin sonar forzado.'
- source_word: מֵהִתְעַנֵּג וּמֵרֹךְ
  english_pob_choice: because of delicacy and tenderness
  chosen_spanish: por delicadeza y ternura
  alternatives_spanish:
  - a causa de la delicadeza y la ternura
  - por refinamiento y suavidad
  lexicon: HALOT
  rationale: Las dos frases preposicionales explican la razón de su extrema fragilidad. «Por delicadeza y ternura» reproduce la causalidad y mantiene el paralelismo de los términos anteriores sin sobrerreinterpretar.
- source_word: תֵּרַע עֵינָהּ
  english_pob_choice: her eye will be evil toward
  chosen_spanish: tendrá el ojo malo contra
  alternatives_spanish:
  - mirará con hostilidad a
  - les tendrá mala voluntad a
  lexicon: HALOT
  rationale: La idiomática hebrea «el ojo será malo» expresa hostilidad, resentimiento o mezquindad. Se conserva la expresión en español para no borrar el giro figurado; «contra» mantiene el valor hostil del hebreo y la lectura auditada del POB.
- source_word: בְּאִישׁ חֵיקָהּ
  english_pob_choice: the husband of her embrace
  chosen_spanish: el hombre de su seno
  alternatives_spanish:
  - el marido de su abrazo
  - el hombre que ella abraza
  lexicon: HALOT
  rationale: חֵיק es «seno/pecho/regazo» y la expresión es íntima. «El hombre de su seno» es más literal y transparente que una equivalencia idiomática más interpretada; el POB inglés preservó la tensión entre literalidad y sentido marital íntimo.
- source_word: וּבִבְנָהּ וּבְבִתָּהּ
  english_pob_choice: and toward her son and her daughter
  chosen_spanish: contra su hijo y contra su hija
  alternatives_spanish:
  - contra su hijo y su hija
  - contra sus hijos
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente al hijo y a la hija por separado. Se conserva esa especificidad, evitando generalizar a «sus hijos».
theological_decisions:
- issue: Sentido del modismo del ojo malo
  english_pob_reading: 'Hebrew idiom: her eye will be evil toward, meaning she will look on them with hostility or begrudging selfishness.'
  chosen_spanish_reading: Tendrá el ojo malo contra ellos, es decir, los mirará con hostilidad o resentimiento mezquino.
  alternative_spanish_readings:
  - los mirará con mala voluntad
  - los envidiará
  rationale: No se suaviza el modismo a una simple antipatía. El hebreo conserva una imagen fuerte que puede implicar hostilidad, avaricia o rencor; el español mantiene esa tensión con una explicación de lectura en nota.
  doctrine_reference: Deuteronomio 15:9; Proverbios 23:6; Mateo 20:15
- issue: Expresión íntima para el marido
  english_pob_reading: Literally, 'the man of her bosom' or 'the husband of her embrace,' an intimate expression for her husband.
  chosen_spanish_reading: El hombre de su seno conserva la imagen íntima y no reduce de inmediato la frase a «su marido».
  alternative_spanish_readings:
  - su marido
  - el esposo de su abrazo
  rationale: La frase hebrea es más concreta y afectiva que un simple término legal de matrimonio. El español retenido deja visible la imagen corporal/familiar del original.
  doctrine_reference: Génesis 16:5; Deuteronomio 13:6
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés, sin cambios sustanciales respecto del pase revisado más reciente. La versión española conserva los dos puntos de tensión relevantes: el modismo «ojo malo» y la expresión íntima «hombre de su seno».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el paralelismo «hijo / hija» en lugar de generalizar a «hijos».
  - «Tierra» traduce aquí el ámbito del suelo/ground de forma natural en español, sin alterar el sentido.
  - La puntuación final con raya larga reproduce el corte de la unidad versicular.
