    issue: La nota [a] no es una alternativa real
    rationale: El texto principal usa «todo pensamiento», y la nota [a] dice «O “todo pensamiento”», lo cual invalida la función de la nota y contradice el expediente inglés, donde «every thought» es alternativa a «every mind».
  - severity: medium
