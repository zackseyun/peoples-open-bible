    reason: lexical_alternative
  - marker: c
    text: Hebrew 'her husband's brother'; traditionally this is the duty later called levirate marriage.
    reason: cultural_note
  - marker: d
    text: '''Go in to her'' is a Hebrew idiom for marital sexual union.'
    reason: lexical_alternative
