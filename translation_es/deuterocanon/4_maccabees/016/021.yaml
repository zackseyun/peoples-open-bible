translation:
  language: es
  text: Y Daniel, el justo, fue arrojado a los leones[a]; y Ananías[b], Azarías y Misael fueron lanzados a un horno de fuego[c], y soportaron por causa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega dice literalmente «a los leones». Se evita añadir «foso» o «cueva», porque no aparecen en el texto.
    reason: lexical_alternative
  - marker: b
    text: Estos son los nombres hebreos de los tres jóvenes, más comúnmente conocidos como Sadrac, Mesac y Abednego.
    reason: alternative_reading
  - marker: c
    text: El griego dice «a un horno de fuego», más literalmente que la forma tradicional «horno ardiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  lexicon: LSJ
  rationale: El artículo con el adjetivo funciona aquí como epíteto sustantivado de Daniel. En español, «el justo» conserva la caracterización moral y suena natural sin añadir palabras que el griego no exige.
- source_word: εἰς λέοντας
  english_pob_choice: to the lions
  chosen_spanish: a los leones
  alternatives_spanish:
  - entre los leones
  - dentro de los leones
  lexicon: LSJ
  rationale: Con ἐβλήθη, la imagen es la de ser echado a los leones. En español, «a los leones» transmite el sentido hostil de manera idiomática y evita añadir «foso» o «cueva», que no están en el texto griego.
- source_word: ἐβλήθη
  english_pob_choice: was thrown
  chosen_spanish: fue arrojado
  alternatives_spanish:
  - fue echado
  - fue lanzado
  lexicon: LSJ
  rationale: El aoristo pasivo de βάλλω pide un verbo fuerte. «Fue arrojado» conserva la fuerza del acto y resulta claro en español moderno.
- source_word: ἀπεσφενδονήθησαν
  english_pob_choice: were hurled
  chosen_spanish: fueron lanzados
  alternatives_spanish:
  - fueron arrojados
  - fueron despedidos
  lexicon: LSJ
  rationale: El verbo es más vívido que un simple «fueron echados». «Fueron lanzados» preserva la violencia de la acción y distingue este segundo movimiento del de Daniel.
- source_word: εἰς κάμινον πυρὸς
  english_pob_choice: into a furnace of fire
  chosen_spanish: a un horno de fuego
  alternatives_spanish:
  - a un horno ardiente
  - a un horno ígneo
  lexicon: LSJ
  rationale: «Horno de fuego» sigue de cerca la estructura griega κάμινον πυρός y mantiene el valor literal que el audit trail conserva frente a la frase más tradicional «horno ardiente».
- source_word: ὑπέμειναν
  english_pob_choice: they endured
  chosen_spanish: perseveraron
  alternatives_spanish:
  - soportaron
  - resistieron con firmeza
  lexicon: LSJ
  rationale: Aquí el verbo subraya constancia bajo prueba. «Perseveraron» comunica esa resistencia fiel en un español natural; aunque «soportaron» es posible, suena más pasivo.
- source_word: διὰ τὸν θεόν
  english_pob_choice: because of God
  chosen_spanish: por causa de Dios
  alternatives_spanish:
  - a causa de Dios
  - por Dios
  lexicon: LSJ
  rationale: La preposición con acusativo indica motivo o causa. «Por causa de Dios» preserva esa relación causal sin reducirla a una expresión coloquial o devocionalmente ambigua.
- source_word: Ἀνανίας καὶ Ἀζαρίας καὶ Μισαὴλ
  english_pob_choice: Hananiah and Azariah and Mishael
  chosen_spanish: Ananías, Azarías y Misael
  alternatives_spanish:
  - Sadrac, Mesac y Abednego
  lexicon: LSJ
  rationale: El griego usa los nombres hebreos, no los babilónicos tradicionales. Mantenerlos en español respeta la primacía del texto fuente y evita importar sustituciones no presentes en el original.
theological_decisions:
- issue: Uso de los nombres hebreos de los tres jóvenes en lugar de los nombres babilónicos tradicionales
  english_pob_reading: Hananiah and Azariah and Mishael
  chosen_spanish_reading: Ananías, Azarías y Misael
  alternative_spanish_readings:
  - Sadrac, Mesac y Abednego
  rationale: La decisión sigue el griego, que nombra a los tres por sus nombres hebreos. Así se conserva la referencia histórica y textual sin normalizarla a la forma más conocida en la tradición litúrgica.
  doctrine_reference: Translation philosophy §1, §2
- issue: Valor moral de δίκαιος aplicado a Daniel
  english_pob_reading: the righteous
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el recto
  - el hombre justo
  rationale: En este contexto narrativo, δίκαιος no se reduce a una categoría abstracta de justicia; funciona como epíteto religioso y moral. «El justo» retiene esa carga sin perder naturalidad en español.
  doctrine_reference: DOCTRINE.md Contested terms (δικαιοσύνη) by semantic extension
translation_notes:
  revision_awareness: 'El texto coincide con el pase de revisión más reciente: no hubo cambios necesarios y el nivel de acuerdo fue alto. Se mantuvieron las decisiones de la auditoría inglesa sobre el valor literal de εἰς κάμινον πυρός, la fuerza verbal de ἀπεσφενδονήθησαν y el uso de los nombres hebreos de los tres jóvenes.'
  spanish_consistency_notes:
  - Se conserva «Y Daniel» al inicio para reflejar el encadenamiento del griego con καὶ, evitando suavizar la coordinación.
  - «El justo» mantiene el artículo sustantivado, en paralelo con la función del griego ὁ δίκαιος.
  - «Por causa de Dios» expresa la causalidad de διὰ τὸν θεόν sin introducir una interpretación adicional.
  - Las comas internas siguen la coordinación de nombres propios en español y la pausa fuerte entre las dos escenas de martirio.
