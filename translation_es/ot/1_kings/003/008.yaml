translation:
  language: es
  text: Y tu siervo está en medio de tu pueblo que has escogido, un pueblo numeroso[a], tan numeroso que no puede ser contado ni enumerado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un pueblo grande».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que no puede ser contado ni enumerado por su multitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַבְדְּךָ
  english_pob_choice: and your servant
  chosen_spanish: y tu siervo
  alternatives_spanish:
  - y tu esclavo
  lexicon: HALOT
  rationale: עֶבֶד puede significar 'siervo' o 'esclavo'. En el contexto de una súplica real dirigida a Dios, 'siervo' comunica la relación de subordinación de modo natural en español y evita una dureza innecesaria.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: HALOT
  rationale: La expresión indica ubicación dentro del pueblo; 'en medio de' preserva bien el valor locativo y suena natural en español.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: Aquí עַם señala al pueblo de pacto perteneciente a Dios. 'Tu pueblo' mantiene ese sentido bíblico y eclesial sin perder claridad.
- source_word: אֲשֶׁר בָּחָרְתָּ
  english_pob_choice: whom you have chosen
  chosen_spanish: al que has elegido
  alternatives_spanish:
  - que has elegido
  - el cual has elegido
  lexicon: HALOT
  rationale: El relativo se refiere al pueblo escogido por Dios. 'Al que has elegido' conserva la referencia personal/colectiva y el énfasis de elección.
- source_word: עַם רָב
  english_pob_choice: a great people
  chosen_spanish: un pueblo grande
  alternatives_spanish:
  - un pueblo numeroso
  - un pueblo vasto
  lexicon: HALOT
  rationale: רָב denota grandeza en cantidad. 'Pueblo grande' mantiene la fuerza del término y permite que la siguiente cláusula explicite la multitud.
- source_word: לֹא יִמָּנֶה
  english_pob_choice: too numerous to be counted
  chosen_spanish: demasiado numeroso para ser contado
  alternatives_spanish:
  - que no puede ser contado
  - incapaz de ser contado
  lexicon: HALOT
  rationale: El nifal de מנה expresa imposibilidad de conteo; 'demasiado numeroso para ser contado' recoge con naturalidad la fuerza práctica del hebreo.
- source_word: וְלֹא יִסָּפֵר
  english_pob_choice: or numbered
  chosen_spanish: ni enumerado
  alternatives_spanish:
  - ni contado
  - ni registrado
  lexicon: HALOT
  rationale: ספר en nifal se superpone con מנה en el campo de la enumeración. 'Ni enumerado' preserva el paralelismo y evita una repetición innecesaria en español.
- source_word: מֵרֹב
  english_pob_choice: because of multitude
  chosen_spanish: por su multitud
  alternatives_spanish:
  - a causa de su multitud
  - por la abundancia
  lexicon: HALOT
  rationale: La preposición con רֹב expresa la causa de la imposibilidad de contar; 'por su multitud' integra esa causalidad de forma fluida y fiel.
theological_decisions:
- issue: Israel como pueblo elegido de Yahvé
  english_pob_reading: your people whom you have chosen
  chosen_spanish_reading: tu pueblo, al que has elegido
  alternative_spanish_readings:
  - tu pueblo que has elegido
  - tu pueblo escogido
  rationale: El hebreo identifica explícitamente a Israel como el pueblo elegido por Dios. La formulación conserva esa elección sin ampliar el texto hacia formulaciones doctrinales posteriores.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que suprimió el guion y la coma innecesaria para lograr mayor fluidez. En español se reflejó esa misma fluidez con una sola secuencia coordinada y sin incisos tipográficos.
  spanish_consistency_notes:
  - Se mantuvo 'siervo' para עֶבֶד por la deferencia del hablante ante Dios y por coherencia con el uso POB.
  - Se prefirió 'Yahvé' no porque aparezca en este versículo, sino como terminología base del proyecto cuando corresponda.
  - '''Enumerado'' se usó para mantener el paralelismo con ''contado'' sin sobrecargar la frase.'
  - Las notas [a] y [b] están ancladas explícitamente en el texto y corresponden a alternativas léxicas documentadas.
