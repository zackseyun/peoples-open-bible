    issue: «por esclavos» no sigue la decisión contextual auditada para לַעֲבָדִים
    rationale: El inglés POB eligió «as servants» y explicó que el énfasis está en subordinación dentro del marco doméstico/familiar, no en especificar esclavitud plena. En español, «siervos» preserva mejor ese matiz, con nota alternativa «esclavos».
  - severity: low
    issue: Faltan notas que preserven alternativas léxicas ya documentadas
    rationale: El POB inglés conserva alternativas para סמך, עֲבָדִים y el giro discursivo; al menos las de «siervos/esclavos» y «sostenido/sustentado» son útiles en español.
  - severity: low
    issue: Algunas formulaciones son poco naturales en español
    rationale: «lo he puesto por señor sobre ti» y «¿Qué, pues, haré por ti?» son comprensibles, pero una redacción más idiomática puede conservar mejor el sentido sin perder dignidad.
