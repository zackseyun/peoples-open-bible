  - severity: low
    issue: «sobre los cielos» es aceptable, pero «por encima de los cielos» suena más natural en español contemporáneo para expresar מֵעַל.
    rationale: Ambas opciones son fieles; el cambio es estilístico para mayor claridad y fluidez.
