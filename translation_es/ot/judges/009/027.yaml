translation:
  language: es
  text: Y salieron al campo, recogieron las uvas de sus viñas, las pisaron y celebraron una fiesta[a]. Luego fueron a la casa de su dios[b], comieron, bebieron y maldijeron a Abimelec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «celebraron fiestas de cosecha» o «festejaron». El término hebreo se refiere a una celebración festiva, probablemente vinculada con la vendimia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la casa de sus dioses». La forma hebrea puede leerse en plural, aunque aquí probablemente tenga sentido singular, refiriéndose a la deidad venerada en ese santuario.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצְאוּ הַשָּׂדֶה
  english_pob_choice: they went out into the field
  chosen_spanish: salieron al campo
  alternatives_spanish:
  - salieron al campo abierto
  - salieron al campo de labor
  lexicon: HALOT
  rationale: El hebreo expresa salida hacia el espacio abierto del campo; en español, «salieron al campo» conserva el movimiento y suena natural sin perder la escena rural.
- source_word: וַיִּבְצְרוּ אֶת כַּרְמֵיהֶם
  english_pob_choice: gathered the grapes from their vineyards
  chosen_spanish: recogieron las uvas de sus viñas
  alternatives_spanish:
  - vendimiaron sus viñas
  - cosecharon sus viñas
  lexicon: HALOT
  rationale: בצר en contexto de viña se refiere a la vendimia, es decir, a recoger uvas. «Recogieron las uvas de sus viñas» explicita el objeto que el verbo implica y evita entenderlo como una cosecha genérica.
- source_word: וַיִּדְרְכ֔וּ
  english_pob_choice: trod them
  chosen_spanish: las pisaron
  alternatives_spanish:
  - las prensaron
  - las aplastaron
  lexicon: HALOT
  rationale: El verbo alude al pisado de las uvas. «Las pisaron» reproduce la imagen concreta del lagar mejor que una traducción más explicativa.
- source_word: וַֽיַּעֲשׂ֖וּ הִלּוּלִ֑ים
  english_pob_choice: they held a festival
  chosen_spanish: celebraron una fiesta
  alternatives_spanish:
  - hicieron fiesta
  - celebraron la vendimia
  - se regocijaron
  lexicon: HALOT
  rationale: הִלּוּלִים señala una celebración festiva asociada con la vendimia. «Celebraron una fiesta» conserva el valor festivo general sin imponer detalles rituales no explícitos en el texto.
- source_word: בֵּית אֱלֹהֵיהֶם
  english_pob_choice: the house of their god
  chosen_spanish: la casa de su dios
  alternatives_spanish:
  - la casa de sus dioses
  - el templo de su dios
  lexicon: HALOT
  rationale: Aunque la forma puede leerse pluralmente, el contexto narrativo apunta a un santuario concreto. «La casa de su dios» mantiene la ambigüedad morfológica del hebreo sin pasar a un plural innecesario en español.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  english_pob_choice: ate and drank
  chosen_spanish: comieron, bebieron
  alternatives_spanish:
  - comieron y bebieron
  - banquetearon y bebieron
  lexicon: HALOT
  rationale: La secuencia verbal simple del hebreo se refleja con dos verbos directos en español. La coma ayuda a mantener el ritmo acumulativo del original.
- source_word: וַיְקַלְלוּ אֶת אֲבִימֶלֶךְ
  english_pob_choice: cursed Abimelek
  chosen_spanish: maldijeron a Abimelec
  alternatives_spanish:
  - pronunciaron maldiciones contra Abimelec
  - lo maldijeron a Abimelec
  lexicon: HALOT
  rationale: קלל en piel expresa maldecir, no solo insultar. «Maldijeron a Abimelec» comunica la fuerza directa del acto y sigue la costumbre POB de nombrar al personaje como Abimelec.
theological_decisions:
- issue: Singular o plural para אֱלֹהֵיהֶם en contexto pagano
  english_pob_reading: their god
  chosen_spanish_reading: su dios
  alternative_spanish_readings:
  - sus dioses
  rationale: Aunque la forma hebrea puede leerse pluralmente, el contexto inmediato sugiere el santuario de una deidad concreta. El singular en español preserva esa lectura probable sin negar la forma textual.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del auditor inglés: movimiento al campo, vendimia de las uvas, pisado literal, celebración festiva, santuario de una deidad en singular probable y maldición directa contra Abimelec. No se introdujeron explicaciones que el hebreo no exija.'
  spanish_consistency_notes:
  - Se preservó «Abimelec» como forma estable del nombre propio en español.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino de Israel; el sintagma es un contexto pagano con אֱלֹהִים.
  - Se prefirió «dios» en singular por coherencia con la lectura contextual del original, sin ocultar en nota la posibilidad plural.
  - «Pisaron» mantiene la imagen del lagar y evita una paráfrasis más abstracta como «prensaron» en el texto principal.
