translation:
  language: es
  text: Él me sacó a un lugar espacioso[a]; me rescató, porque se complació en mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a un lugar abierto/espacioso”. La imagen hebrea contrasta la libertad y el alivio con el encierro o la angustia.
    reason: lexical_alternative
  - marker: b
    text: O “estuvo complacido conmigo” / “tuvo placer en mí”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  english_pob_choice: He brought me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me trajo fuera
  - me hizo salir
  lexicon: HALOT
  rationale: 'El hifil de יצא expresa acción causativa: “hacer salir / sacar”. En español, “me sacó” transmite con naturalidad la idea de liberación sin perder el movimiento de salida.'
- source_word: לַמֶּרְחָב
  english_pob_choice: into a broad place
  chosen_spanish: a un lugar espacioso
  alternatives_spanish:
  - a un lugar abierto
  - a un lugar ancho
  lexicon: HALOT
  rationale: מֶרְחָב describe un espacio amplio o abierto. “Lugar espacioso” conserva la imagen de amplitud y resulta idiomático en español; “abierto” es una alternativa válida si se quiere enfatizar el contraste con encierro o angustia.
- source_word: יְחַלְּצֵנִי
  english_pob_choice: he rescued me
  chosen_spanish: me rescató
  alternatives_spanish:
  - me libró
  - me salvó
  lexicon: HALOT
  rationale: El verbo חלץ en piel tiene el sentido de sacar, librar, rescatar. “Me rescató” comunica bien la acción de liberación y mantiene la fuerza verbal del hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la liberación. “Porque” es la opción más clara y directa en español moderno.
- source_word: חָפֵץ בִּי
  english_pob_choice: he delighted in me
  chosen_spanish: se complació en mí
  alternatives_spanish:
  - se deleitó en mí
  - tuvo agrado en mí
  lexicon: HALOT
  rationale: חפץ con ב expresa complacencia, deleite o agrado personal. “Se complació en mí” refleja bien esa relación favorable sin suavizarla excesivamente; “se deleitó en mí” es una alternativa más afectiva.
theological_decisions:
- issue: Motivo de la liberación divina
  english_pob_reading: because he delighted in me
  chosen_spanish_reading: porque se complació en mí
  alternative_spanish_readings:
  - porque se deleitó en mí
  - porque tuvo agrado en mí
  rationale: La frase fundamenta la rescate/liberación en la complacencia favorable de Dios hacia el hablante. La traducción conserva esa relación sin añadir una explicación doctrinal sobre mérito o causa secundaria que el texto no desarrolla.
  doctrine_reference: Preservar la tensión teológica del texto; no inferir más de lo que afirma la frase.
translation_notes:
  revision_awareness: Pasaje en alto acuerdo con el control inglés; no se identificaron revisiones textuales recientes que exijan ajuste adicional. La decisión principal sigue siendo mantener la imagen espacial de amplitud y la afirmación relacional de complacencia divina.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma editorial para el nombre divino; en este versículo no aparece de forma explícita.
  - Se conserva el paralelismo verbal entre la acción de sacar y la de rescatar, sin fusionarlas en una sola idea abstracta.
  - “Lugar espacioso” evita el calco duro de “broad place” pero retiene la imagen hebrea de amplitud y liberación.
