translation:
  language: es
  text: Cuando terminó el duelo[a], David envió y mandó traerla a su casa, y ella llegó a ser su esposa y le dio a luz un hijo. Pero lo que David había hecho fue malo a los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando terminó el período de duelo». El hebreo alude al duelo por la muerte de Urías; en español, «duelo» conserva bien ese sentido temporal.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָאֵבֶל
  english_pob_choice: the mourning
  chosen_spanish: el duelo
  alternatives_spanish:
  - el luto
  - el tiempo de duelo
  - el periodo de duelo
  lexicon: HALOT
  rationale: El hebreo se refiere al periodo ritual/social de luto por la muerte de Urías. En español, "duelo" comunica ese marco con naturalidad y dignidad; "luto" también es posible, pero puede sonar más a signo externo que al proceso mismo.
- source_word: וַיַּעֲבֹר
  english_pob_choice: was over
  chosen_spanish: terminó
  alternatives_spanish:
  - pasó
  - llegó a su fin
  lexicon: HALOT
  rationale: Aunque el verbo básico es "pasar", con un complemento temporal en español lo más natural es indicar conclusión. "Terminó" preserva la secuencia narrativa sin calco forzado.
- source_word: וַיִּשְׁלַח ... וַיַּאַסְפָהּ אֶל בֵּיתוֹ
  english_pob_choice: sent and brought her into his house
  chosen_spanish: envió y la hizo entrar en su casa
  alternatives_spanish:
  - envió y la llevó a su casa
  - envió y la introdujo en su casa
  lexicon: HALOT
  rationale: אָסַף en este contexto expresa traer/recoger a alguien dentro del propio ámbito doméstico. "La hizo entrar" conserva la acción de mandarla traer sin sonar excesivamente literal ni ambiguamente voluntario.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  english_pob_choice: she became his wife
  chosen_spanish: llegó a ser su esposa
  alternatives_spanish:
  - se hizo su esposa
  - pasó a ser su esposa
  - fue su esposa
  lexicon: HALOT
  rationale: La construcción marca un cambio de estado. "Llegó a ser" preserva ese valor resultativo mejor que una simple copulativa, y "esposa" es una forma natural y sobria en español bíblico contemporáneo.
- source_word: וַתֵּלֶד לוֹ בֵּן
  english_pob_choice: bore him a son
  chosen_spanish: le dio un hijo
  alternatives_spanish:
  - le dio a luz un hijo
  - le dio a luz un varón
  - dio a luz para él un hijo
  lexicon: HALOT
  rationale: El verbo ילד con dativo puede expresarse de forma idiomática en español como "dar un hijo". Esta opción es más fluida que un calco como "dio a luz para él", y mantiene el resultado del parto.
- source_word: וַיֵּרַע
  english_pob_choice: was evil
  chosen_spanish: fue mala
  alternatives_spanish:
  - fue malvada
  - fue mal
  - fue perversa
  lexicon: HALOT
  rationale: El hebreo afirma una valoración moral fuerte. "Fue mala" conserva la condena sin suavizarla; en español, "mala" puede requerir apoyo del contexto, que aquí está claramente dado por la evaluación divina.
- source_word: הַדָּבָר אֲשֶׁר עָשָׂה דָוִד
  english_pob_choice: the thing that David had done
  chosen_spanish: la cosa que David había hecho
  alternatives_spanish:
  - el asunto que David había hecho
  - lo que David había hecho
  - la acción que David había hecho
  lexicon: HALOT
  rationale: דָּבָר abarca "cosa", "asunto", "hecho". En español, "la cosa que David había hecho" mantiene la concreción del hebreo y coincide con la formulación auditada en inglés; "lo que" sería más idiomático pero menos cercano a la forma del original.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - ante Yahvé
  - en la vista de Yahvé
  lexicon: HALOT
  rationale: El giro idiomático hebreo se conserva con "a los ojos de". Se mantiene "Yahvé" según el estándar del proyecto para יְהוָה, en vez de sustituirlo por un título cubierto.
theological_decisions:
- issue: Fuerza de la evaluación moral del narrador sobre la acción de David
  english_pob_reading: 'Explicit moral condemnation: ''was evil in the eyes of Yahweh'''
  chosen_spanish_reading: 'Condena moral explícita: ''fue mala a los ojos de Yahvé'''
  alternative_spanish_readings:
  - fue desagradable a los ojos de Yahvé
  - fue mala ante Yahvé
  - fue perversa a los ojos de Yahvé
  rationale: El hebreo no describe solo una impresión subjetiva, sino una valoración moral negativa. "Mala" conserva esa censura directa sin diluirla en "desagradable", y el marco "a los ojos de Yahvé" mantiene la evaluación divina como medida del acto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'Se aplica el defecto del proyecto para el Tetragrámaton: transliteración reverente y legible en español como "Yahvé". Esto preserva el nombre personal de Dios en vez de sustituirlo por un título.'
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión auditada más reciente indicó que no se requieren cambios; esta versión sigue el acuerdo alto entre revisión y base fuente, manteniendo la condena moral explícita y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה en consonancia con el estándar del proyecto.
  - Se conserva el valor de cambio de estado en "llegó a ser su esposa".
  - Se evita suavizar la censura moral de la cláusula final.
  - '"Duelo" se usa como equivalente natural del período de luto contextual, no como mera emoción interna.'
