translation:
  language: es
  text: para que las naciones vengan desde el extremo de la tierra a ver su gloria, trayendo a sus hijos debilitados como dones[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trayendo como dones a sus hijos que habían sido debilitados / estaban agotados»; o «trayendo como dones a sus hijos debilitados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - pueblos
  lexicon: BDAG
  rationale: Mantengo el valor amplio de los pueblos no israelitas con «naciones», que suena natural en español y evita introducir una oposición técnica judíos/gentiles que el contexto no exige.
- source_word: ἀπ’ ἄκρου τῆς γῆς
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde los extremos de la tierra
  - desde la parte más lejana de la tierra
  lexicon: BDAG
  rationale: «Extremo» conserva bien la imagen espacial singular del griego y resulta idiomático en español para expresar distancia remota.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: a ver
  alternatives_spanish:
  - a contemplar
  - a mirar
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa de manera natural en español con «a ver», sin elevar innecesariamente el registro.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: «Gloria» es la equivalencia más estable y teológicamente cargada para δόξα, y corresponde al uso de la POB en inglés.
- source_word: φέροντες δῶρα
  english_pob_choice: bringing her weakened sons as gifts
  chosen_spanish: trayendo como ofrenda a sus hijos debilitados
  alternatives_spanish:
  - trayendo a sus hijos debilitados como regalo
  - llevando como dones a sus hijos debilitados
  lexicon: BDAG
  rationale: El griego sugiere que los hijos son presentados en calidad de dones/ofrendas; «como ofrenda» comunica esa apposición sin sonar forzado en español.
- source_word: τοὺς ἐξησθενηκότας
  english_pob_choice: who had been weakened
  chosen_spanish: debilitados
  alternatives_spanish:
  - enfermados
  - agotados
  - que habían sido debilitados
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante; «debilitados» es compacto y fiel, y evita restringir el sentido a cansancio físico בלבד.
- source_word: υἱοὺς αὐτῆς
  english_pob_choice: her sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «sus hijos varones», en español «sus hijos» transmite el mismo referente masculino plural en una lectura fluida y natural dentro de la frase.
theological_decisions:
- issue: Relación sintáctica de ἔρχεσθαι con el contexto inmediato
  english_pob_reading: for nations to come ... to see his glory ...
  chosen_spanish_reading: para que naciones vengan ... a ver su gloria ...
  alternative_spanish_readings:
  - naciones vendrán ... a ver su gloria ...
  - para venir ... a ver su gloria ...
  rationale: Como el griego usa infinitivos de propósito/resultativo, la traducción española debe preservar esa dependencia sintáctica y no convertirla en una afirmación independiente en futuro.
  doctrine_reference: Syntaxis del texto griego; coherencia con la línea interpretativa de POB en la revisión auditada.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una formulación en futuro independiente a una construcción de infinitivo de propósito, y después reordenó 'as gifts' para que modifique más naturalmente el acto de traer. La versión española sigue esa decisión sintáctica y conserva el valor de 'gifts/ofrendas' sin perder la relación con 'hijos debilitados'.
  spanish_consistency_notes:
  - Se mantiene «gloria» para δόξα y «naciones» para ἔθνη, en línea con el registro de la POB.
  - Se preserva la estructura de finalidad con «para que ... vengan ... a ver», evitando un futuro que rompería la dependencia del griego.
  - «Debilitados» reproduce el estado resultante del participio perfecto sin añadir una interpretación médica específica.
  - El posesivo se vierte de modo natural en español como «sus hijos»; el referente masculino plural queda claro por el contexto.
