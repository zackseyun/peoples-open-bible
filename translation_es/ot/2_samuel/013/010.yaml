translation:
  language: es
  text: 'Entonces Amnón dijo a Tamar: «Trae la comida[a] al aposento[b], para que yo coma de tu mano». Y Tamar tomó los pastelillos[c] que había hecho y los llevó al aposento[b] a Amnón, su hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Comida» traduce aquí הַבִּרְיָה en sentido amplio; también puede entenderse como «alimento» o «comida preparada».
    reason: lexical_alternative
  - marker: b
    text: O «la cámara» o simplemente «el cuarto». El hebreo חֶדֶר se refiere a una habitación interior; «aposento» procura reflejar el carácter apartado del lugar.
    reason: lexical_alternative
  - marker: c
    text: «Pastelillos» traduce לְבִבוֹת, unas tortas o piezas de masa preparadas por Tamar; también puede traducirse «tortas» o «panecillos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאִי
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Lleva
  - Trae acá
  lexicon: HALOT
  rationale: La forma es un imperativo femenino singular con valor de llevar algo a otro lugar. «Trae» es natural en español y conserva la dirección de la acción hacia Amnón.
- source_word: הַבִּרְיָה
  english_pob_choice: the food
  chosen_spanish: la comida
  alternatives_spanish:
  - el alimento
  - la comida preparada
  lexicon: HALOT
  rationale: El término designa alimento preparado para comer. «La comida» es amplio, natural y no especifica más de lo que el hebreo permite.
- source_word: הַחֶדֶר / הֶחָדְרָה
  english_pob_choice: the chamber
  chosen_spanish: el aposento
  alternatives_spanish:
  - la cámara
  - el cuarto
  lexicon: HALOT
  rationale: חֶדֶר es una habitación interior, un espacio apartado. «Aposento» conserva el registro digno y el sentido de recinto interior, sin imponer una terminología eclesiástica ajena.
- source_word: וְאֶבְרֶה
  english_pob_choice: so that I may eat
  chosen_spanish: para que yo coma
  alternatives_spanish:
  - para comer
  - y comeré
  lexicon: HALOT
  rationale: El valor cohortativo expresa intención de comer; «para que yo coma» lo comunica con claridad en español y mantiene la dependencia del propósito.
- source_word: מִיָּדֵךְ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu propia mano
  - de tu mano misma
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática literal, importante para reflejar la cercanía manipuladora de la petición.
- source_word: הַלְּבִבוֹת
  english_pob_choice: the cakes
  chosen_spanish: las empanadillas
  alternatives_spanish:
  - los pastelillos
  - los panecillos
  lexicon: HALOT
  rationale: El término alude a la preparación especial hecha por Tamar en el contexto inmediato. «Empanadillas» intenta reflejar una pieza de masa/horneado pequeña y comestible sin exagerar la especificidad, aunque admite equivalentes más generales como «pastelillos».
- source_word: אָחִיהָ
  english_pob_choice: her brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de ella
  lexicon: HALOT
  rationale: La relación de parentesco se expresa de forma directa al final de la cláusula, preservando la fuerza narrativa y moral del relato.
theological_decisions:
- issue: La terminología del lugar interior (חֶדֶר) y su valor narrativo de aislamiento
  english_pob_reading: the chamber / inner room
  chosen_spanish_reading: el aposento
  alternative_spanish_readings:
  - la cámara
  - el cuarto
  rationale: 'No hay decisión doctrinal, pero sí una tensión lexical: el espacio interior subraya la reclusión que enmarca la escena. «Aposento» mantiene esa atmósfera sin convertir el texto en una paráfrasis.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB pasó de «inner room» a «chamber» en la revisión más reciente para hacer más directo y natural el término חֶדֶר. En español se siguió esa revisión con «aposento», que mantiene un registro formal y la idea de recinto interior. También se conservó la equivalencia funcional de «food» como «comida», y de los cakes como una preparación pequeña y horneada, sin añadir detalles no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de «aposento» para ambas apariciones de חֶדֶר/הֶחָדְרָה.
  - Se preservó el pronombre de segunda persona singular («tu»), coherente con el hebreo.
  - Se evitó «SEÑOR» u otro término teológico, pues el versículo no contiene el nombre divino.
  - 'Se conservó el orden narrativo: mandato de Amnón, obediencia de Tamar, traslado de la comida al aposento.'
