translation:
  language: es
  text: Si un hombre sabio entra en disputa con un hombre necio[a], ya sea que se enfurezca o se ría[b], no hay sosiego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si un hombre sabio contiende con un necio». El hebreo no identifica explícitamente si el que se enfurece o se ríe es el sabio o el necio; el contexto favorece al necio para muchos intérpretes.'
    reason: alternative_reading
  - marker: b
    text: «Se ría» puede llevar el sentido de risa burlona o de escarnio en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio
  alternatives_spanish:
  - una persona sabia
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino איש con el adjetivo חכם; 'hombre sabio' conserva esa forma y el paralelismo con 'hombre necio'. En español, 'hombre' aquí es el equivalente más directo del valor masculino explícito del מקור, sin perder el sentido representativo del proverbio.
- source_word: נִשְׁפָּט
  english_pob_choice: has a dispute
  chosen_spanish: entra en disputa
  alternatives_spanish:
  - contiende
  - litiga
  - tiene una disputa
  lexicon: HALOT
  rationale: El nifal de שפט aquí sugiere una situación de controversia o litigio. 'Entra en disputa' mantiene el valor adversativo sin forzar un escenario judicial técnico, y suena natural en español actual.
- source_word: אֶת אִישׁ אֱוִיל
  english_pob_choice: with a foolish man
  chosen_spanish: con un hombre necio
  alternatives_spanish:
  - con un necio
  - contra un necio
  lexicon: HALOT
  rationale: La construcción con את introduce a la contraparte del conflicto. 'Hombre necio' preserva el paralelo con 'hombre sabio' y mantiene la fuerza del sustantivo/atributo sin suavizar 'necio' a un término menos preciso.
- source_word: וְרָגַז
  english_pob_choice: he rages
  chosen_spanish: se enfurezca
  alternatives_spanish:
  - se irrite
  - se enfurezca
  - rage
  lexicon: HALOT
  rationale: רגז expresa agitación, enojo o furor. Como el hebreo deja ambigua la referencia del sujeto, 'se enfurezca' conserva la posibilidad de que la reacción pertenezca a cualquiera de los dos contendientes, sin resolverla artificialmente.
- source_word: וְשָׂחַק
  english_pob_choice: or laughs
  chosen_spanish: o se ría
  alternatives_spanish:
  - o se burle
  - o se ría con desprecio
  - o se mofe
  lexicon: HALOT
  rationale: שׂחק normalmente significa 'reír', pero en contexto puede implicar risa de burla. 'Se ría' preserva el sentido básico y deja abierta la ironía implícita, que el contexto puede cargar.
- source_word: וְאֵין נָחַת
  english_pob_choice: there is no rest
  chosen_spanish: no hay descanso
  alternatives_spanish:
  - no hay paz
  - no hay quietud
  - no hay reposo
  lexicon: HALOT
  rationale: נחת denota descanso, quietud o calma. 'Descanso' es una opción clara y natural en español, y comunica bien la ausencia de alivio o resolución que concluye el proverbio.
translation_notes:
  revision_awareness: El texto hebreo presenta ambigüedad sintáctica en los verbos finales; la redacción española conserva esa ambigüedad en la cláusula «sea que se enfurezca o se ría», siguiendo el criterio auditado del POB inglés y sin decidir prematuramente el sujeto de la acción.
  spanish_consistency_notes:
  - Se mantuvo «hombre sabio / hombre necio» para conservar el paralelismo masculino explícito del hebreo.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino.
  - «Descanso» se eligió como equivalente amplio de נחת, sin estrecharlo a «paz» o «quietud» exclusivamente.
