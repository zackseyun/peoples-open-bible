    issue: La nota [a] no preserva bien la alternativa léxica del inglés para בַּגְלוֹתוֹ.
    rationale: La nota inglesa ofrece 'when he carried into exile'. El español 'cuando lo llevó en exilio' añade 'lo', que no está en el hebreo, y 'en exilio' suena poco idiomático frente a 'al exilio'.
  - severity: medium
    issue: '''Cuando llevó en cautiverio'' es comprensible pero algo forzado en español moderno.'
    rationale: Para גלה en contexto de deportación regia, 'deportó' o 'llevó al exilio' suenan más naturales y mantienen el sentido histórico-político mejor que la perífrasis actual.
