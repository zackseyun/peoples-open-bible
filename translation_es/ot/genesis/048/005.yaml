translation:
  language: es
  text: Y ahora[a], tus dos hijos, que te nacieron en la tierra de Egipto antes de que yo llegara a ti en Egipto, son míos; Efraín y Manasés serán míos[b][c], como Rubén y Simeón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que yo llegara a ti en Egipto». La expresión hebrea puede verterse también de manera más formal así; en contexto señala que se trata de los hijos nacidos antes de la llegada de Jacob.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Efraín y Manasés quedan contados como hijos propios de Jacob, con un estatus comparable al de Rubén y Simeón.
    reason: cultural_note
  - marker: c
    text: O «antes de mi llegada a ti en Egipto».
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La expresión introduce un giro enfático en el discurso de Jacob. «Y ahora» conserva la conexión discursiva y suena natural en español bíblico moderno.
- source_word: שְׁנֵי בָנֶיךָ
  english_pob_choice: your two sons
  chosen_spanish: tus dos hijos
  alternatives_spanish:
  - los dos hijos tuyos
  - los dos hijos que tienes
  lexicon: HALOT
  rationale: «Hijos» comunica con naturalidad la relación filial en español y corresponde al sentido del hebreo, manteniendo tanto el número como la posesión.
- source_word: הַנּוֹלָדִים לְךָ
  english_pob_choice: who were born to you
  chosen_spanish: los que te nacieron
  alternatives_spanish:
  - los que han nacido para ti
  - los nacidos para ti
  lexicon: HALOT
  rationale: El participio pasivo describe a los hijos como los nacidos de Jacob. «Los que te nacieron» es idiomático y preserva la relación filial sin sobreexplicar.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva explícitamente «tierra» porque el hebreo lo dice de forma directa; esto mantiene la concreción del lugar y evita aplanar la expresión.
- source_word: עַד בֹּאִי אֵלֶיךָ מִצְרַיְמָה
  english_pob_choice: before I came to you in Egypt
  chosen_spanish: antes de que yo llegara a ti en Egipto
  alternatives_spanish:
  - hasta que yo llegué a ti en Egipto
  - antes de mi llegada a ti en Egipto
  lexicon: HALOT
  rationale: En contexto, la frase delimita a los hijos nacidos antes de la llegada de Jacob. «Antes de que yo llegara a ti en Egipto» expresa con claridad la relación temporal sin añadir contenido no presente.
- source_word: לִי הֵם
  english_pob_choice: are mine
  chosen_spanish: son míos
  alternatives_spanish:
  - me pertenecen
  - son para mí
  lexicon: HALOT
  rationale: La afirmación es directa y de tono de incorporación familiar. «Son míos» reproduce con sobriedad la reclamación de Jacob sin introducir el término técnico de adopción.
- source_word: אֶפְרַיִם וּמְנַשֶּׁה
  english_pob_choice: Ephraim and Manasseh
  chosen_spanish: Efraín y Manasés
  lexicon: HALOT
  rationale: Se usan los nombres propios en su forma usual en español bíblico, manteniendo claridad y reconocimiento lector.
- source_word: כִּרְאוּבֵן וְשִׁמְעֹן
  english_pob_choice: like Reuben and Simeon
  chosen_spanish: como Rubén y Simeón
  alternatives_spanish:
  - igual que Rubén y Simeón
  lexicon: HALOT
  rationale: La partícula comparativa כ se vierte naturalmente con «como». Indica estatus comparable, no identidad absoluta, de Efraín y Manasés respecto de esos hijos de Jacob.
- source_word: יִהְיוּ לִי
  english_pob_choice: shall be mine
  chosen_spanish: serán míos
  alternatives_spanish:
  - me pertenecerán
  - serán para mí
  lexicon: HALOT
  rationale: El futuro expresa la ratificación de su nuevo estatus dentro de la línea de Jacob. «Serán míos» conserva la fuerza solemne y la continuidad con «son míos».
theological_decisions:
- issue: Estatus de Efraín y Manasés en la familia de Jacob
  english_pob_reading: Render the statement straightforwardly as a claim of filial/adoptive status without importing later doctrinal or legal terminology into the main text.
  chosen_spanish_reading: 'Traducir la afirmación como una incorporación filial directa: «son míos… serán míos», sin añadir en el texto principal vocabulario técnico de adopción.'
  alternative_spanish_readings:
  - los adopto como hijos míos
  - los considero adoptados
  rationale: El hebreo dice simplemente «son míos» y «serán míos, como Rubén y Simeón». La versión española mantiene esa fuerza de pertenencia e inclusión en la línea patriarcal sin ir más allá de lo que el texto afirma explícitamente.
  doctrine_reference: Génesis 48:5; filosofía de traducción POB sobre precisión lexical sin sobreinterpretación
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, pero adapta la sintaxis a un español natural. Se conservó la repetición explícita de «Egipto» porque el hebreo la repite; por ello no se usó una equivalencia con «aquí» aunque sea más fluida en inglés, ya que en español la forma explícita resulta clara y fiel.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - 'Se tradujeron los nombres propios en sus formas usuales en español bíblico: Efraín, Manasés, Rubén, Simeón.'
  - Se conservó el matiz comparativo de כ con «como», evitando una lectura identitaria o excesivamente interpretativa.
