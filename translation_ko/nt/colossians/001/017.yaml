id: COL.1.17
reference: Colossians 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ αὐτός ἐστιν πρὸ πάντων καὶ τὰ πάντα ἐν αὐτῷ συνέστηκεν,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/017.yaml
  text: And he is before all things, and in him all things hold together.
translation:
  language: ko
  text: 그분은 만물보다 먼저 계시고[a], 만물은 그분 안에서 함께 서 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「만물보다 먼저」는 시간적 선재(先在)를 우선으로 가리키며, 동시에 만물에 대한 우위를 함의한다.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτός ἐστιν
  english_pob_choice: he is
  chosen_korean: 그분은 ... 계시고
  alternatives_korean:
  - 그분 자신이 ... 계시며
  lexicon: BDAG
  rationale: 강조 위치의 αὐτός를 한국어에서는 「그분」으로 자연스럽게 옮긴다. 합쇼체 격조의 「계시고」를 사용한다.
- source_word: πρὸ πάντων
  english_pob_choice: before all things
  chosen_korean: 만물보다 먼저
  alternatives_korean:
  - 모든 것보다 앞서
  - 만물 위에
  lexicon: BDAG
  rationale: πρό + 속격은 시간적 우선을 가리킨다. 「만물보다 먼저」는 아들의 선재를 자연스럽게 표현한다.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_korean: 만물
  alternatives_korean:
  - 모든 것
  - 모든 만물
  lexicon: BDAG
  rationale: 16절과의 어휘적 일관성을 위해 「만물」을 사용한다.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분 안에서
  alternatives_korean:
  - 그분에 의해
  - 그분으로 인하여
  lexicon: BDAG
  rationale: ἐν의 처소·영역적 의미를 보존한다.
- source_word: συνέστηκεν
  english_pob_choice: hold together
  chosen_korean: 함께 서 있습니다
  alternatives_korean:
  - 결속되어 있습니다
  - 유지되고 있습니다
  lexicon: BDAG
  rationale: 완료 능동 「선 채로 있음」. συν-과 ἵστημι의 합성으로 「함께 서서 유지됨」을 가리킨다. 「함께 서 있습니다」는 어원적 무게를 보존하면서 한국어로 자연스럽다.
theological_decisions:
- issue: συνέστηκεν의 우주론적 함의
  chosen_reading: 만물의 우주적 결속·유지
  alternative_readings:
  - 만물의 존재론적 구성
  rationale: 본 절은 아들이 만물을 결속하고 유지하시는 분이심을 선포한다. 「함께 서 있습니다」는 신학적 무게를 가독적인 한국어로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Affirmations on Christ as cosmic sustainer'
