translation:
  language: es
  text: Comenzaron a obstaculizar a los que estaban construyendo, y la construcción del templo[a] en Jerusalén quedó detenida[b] hasta el segundo año del reinado de Darío, rey de los persas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego ἱερόν: aquí se refiere al templo en su conjunto, no solo a un recinto o santuario interior.'
    reason: lexical_alternative
  - marker: b
    text: O «cesó» o «quedó inactiva»; el verbo griego indica que la obra del templo llegó a detenerse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  english_pob_choice: They began
  chosen_spanish: Comenzaron
  alternatives_spanish:
  - Empezaron
  - Se pusieron a
  lexicon: BDAG
  rationale: El aoristo de inicio indica comienzo de una acción. «Comenzaron» conserva ese valor inceptivo con un español natural y digno.
- source_word: κωλύειν
  english_pob_choice: to hinder
  chosen_spanish: obstaculizar
  alternatives_spanish:
  - impedir
  - estorbar
  - hacer frente a
  lexicon: BDAG
  rationale: El verbo expresa oposición activa a la obra. «Obstaculizar» recoge bien la idea de poner dificultad o freno sin forzar todavía el matiz de detención total.
- source_word: τοὺς οἰκοδομοῦντας
  english_pob_choice: those who were building
  chosen_spanish: los que estaban construyendo
  alternatives_spanish:
  - los constructores
  - los que edificaban
  lexicon: BDAG
  rationale: El participio presente destaca a personas en plena actividad. «Los que estaban construyendo» conserva mejor ese valor verbal que una nominalización.
- source_word: ἤργει
  english_pob_choice: was stopped
  chosen_spanish: quedó detenida
  alternatives_spanish:
  - cesó
  - quedó inactiva
  - se detuvo
  lexicon: BDAG
  rationale: El contexto señala que la obra llegó a estar inactiva. «Quedó detenida» comunica el resultado práctico de manera clara y no meramente técnica.
- source_word: ἡ οἰκοδομὴ
  english_pob_choice: the building
  chosen_spanish: la construcción
  alternatives_spanish:
  - la edificación
  - la obra
  lexicon: BDAG
  rationale: Aquí el sustantivo apunta al proceso/proyecto de construir. «La construcción» es el equivalente más natural en español actual.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del recinto sagrado
  lexicon: BDAG
  rationale: ἱερόν designa el templo en este contexto restaurador. «Templo» es la correspondencia más clara y precisa para el lector hispano.
- source_word: τῆς βασιλείας Δαρείου
  english_pob_choice: of the reign of Darius
  chosen_spanish: del reinado de Darío
  alternatives_spanish:
  - del reino de Darío
  - de la realeza de Darío
  lexicon: BDAG
  rationale: βασιλεία aquí se refiere al ejercicio del poder real, no al territorio. «Reinado» refleja mejor ese sentido.
- source_word: τοῦ Περσῶν βασιλέως
  english_pob_choice: king of the Persians
  chosen_spanish: rey de los persas
  alternatives_spanish:
  - rey persa
  - rey de Persia
  lexicon: BDAG
  rationale: La construcción genitiva se mantiene de forma idiomática en español. «Rey de los persas» preserva el contenido y el orden relacional del griego.
translation_notes:
  revision_awareness: Se siguió el ancla griega primaria y el auditorio inglés como apoyo; no hubo revisiones posteriores que alteraran la lectura base. La decisión española mantiene la distinción entre el inicio de la oposición, la detención efectiva de la obra y la datación persa final.
  spanish_consistency_notes:
  - Se conserva «Darío» sin añadir especificaciones cronológicas no presentes en el verso.
  - «Templo» se usa de manera consistente para ἱερόν en este contexto.
  - «Reinado» se eligió para βασιλεία por coherencia con el sentido de gobierno efectivo.
  - La nota textual en a recoge la alternativa de detención porque el griego admite el matiz de cesar/quedar inactivo.
