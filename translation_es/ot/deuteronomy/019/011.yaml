review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia legal del hebreo: condición contrastiva, odio, acecho, levantarse contra la víctima, golpearla y luego huir a una de las ciudades. Sin embargo, omite una alternativa léxica importante que el rastro POB inglés preservó en nota para la expresión idiomática וְהִכָּהוּ נֶפֶשׁ / וָמֵת. Además, «de modo que muere» puede sonar ligeramente menos directo que el inglés auditado y que el hebreo consecutivo.'
  spanish_quality_summary: El español es claro, natural y digno. «Pero si hay un hombre», «se levanta contra él» y «huye a una de estas ciudades» funcionan bien. «Aborrece a su prójimo» es fiel, aunque algo más elevado; sigue siendo legible en registro bíblico. La mejora principal es hacer la cláusula letal un poco más directa y añadir la nota aclaratoria requerida.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto en este versículo. «Prójimo» para רֵעַ es defendible en contexto legal. No aparecen términos como Yahvé, Mesías, Espíritu, etc. La decisión sobre la expresión idiomática de golpe letal debe alinearse con la nota lexical de la POB inglesa.
  issues:
  - severity: medium
    issue: Falta la nota léxica para la expresión idiomática hebrea de golpe letal.
    rationale: La POB inglesa conservó explícitamente una nota para וְהִכָּהוּ נֶפֶשׁ, con alternativas como «strikes him mortally» y explicación del hebraísmo literal. El encargo pide preservar alternativas significativas cuando la POB inglesa las preservó.
  - severity: low
    issue: «lo hiere de modo que muere» es comprensible, pero puede mejorarse a una formulación más directa.
    rationale: «Lo hiere de modo que muere» no es incorrecto, pero «lo golpea de modo que muere» o «lo hiere de manera que muere» refleja mejor la cadena de acción y resultado. «Golpea» mantiene más de cerca el verbo básico נכה sin introducir tecnicismo.
  revised_spanish_text: Pero si hay un hombre que aborrece a su prójimo, y le acecha, y se levanta contra él, y lo golpea[a] de modo que muere, y huye a una de estas ciudades,
  revised_footnotes:
  - marker: a
    text: O «lo hiere mortalmente» o «lo golpea de modo que muere». La expresión hebrea es literalmente «lo golpea [en] vida/alma», un modismo para dar un golpe letal.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura jurídica y la progresión del hebreo, pero se añade la nota léxica exigida por el rastro POB inglés para el modismo de golpe letal. También se ajusta «hiere» a «golpea» para reflejar más directamente נכה, manteniendo el resultado explícito «de modo que muere». No se requiere adjudicación adicional.
