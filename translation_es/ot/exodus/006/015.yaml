translation:
  language: es
  text: 'Y los hijos de Simeón: Jemuel, y Jamín, y Ohad, y Jakin, y Zohar, y Shaul[a], hijo de la mujer cananea. Estos son los clanes de Simeón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Shaul» corresponde al hebreo שָׁאוּל. Tradicionalmente se ha escrito «Saúl».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos
  - Y los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי se vierte de manera natural como «hijos de». «Y» conserva la conjunción inicial del hebreo y mantiene el flujo de la genealogía.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: HALOT
  rationale: Para el nombre tribal/personal, «Simeón» es la forma bíblica estable en español y evita confusión con «Simón», que puede sugerir otro nombre bíblico distinto.
- source_word: יְמוּאֵל
  english_pob_choice: Jemuel
  chosen_spanish: Jemuel
  alternatives_spanish:
  - Yemuel
  lexicon: HALOT
  rationale: Se conserva la transliteración bíblica convencional en español, alineada con la forma inglesa tradicional y con el nombre hebreo propio.
- source_word: וְיָמִין
  english_pob_choice: and Jamin
  chosen_spanish: y Jamín
  alternatives_spanish:
  - y Jamin
  - y Yamin
  lexicon: HALOT
  rationale: «Jamín» refleja la forma bíblica usual en español y mantiene la articulación nominal propia de la lista. La conjunción se traduce con «y».
- source_word: וְאֹהַד
  english_pob_choice: and Ohad
  chosen_spanish: y Ohad
  alternatives_spanish:
  - y Ohad
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente; la grafía «Ohad» es clara y reconocible en español bíblico.
- source_word: וְיָכִין
  english_pob_choice: and Jakin
  chosen_spanish: y Jakin
  alternatives_spanish:
  - y Yakin
  lexicon: HALOT
  rationale: Se mantiene la transliteración bíblica convencional «Jakin», acorde con el uso estable en español.
- source_word: וְצֹחַר
  english_pob_choice: and Zohar
  chosen_spanish: y Zójar
  alternatives_spanish:
  - y Zohar
  - y Zojar
  lexicon: HALOT
  rationale: Se prefiere una transliteración cercana al hebreo con adaptación ortográfica al español. «Zójar» evita la lectura con /h/ de la forma inglesa y conserva la consonante final guttural aproximada mediante «j».
- source_word: וְשָׁאוּל
  english_pob_choice: and Shaul
  chosen_spanish: y Saúl
  alternatives_spanish:
  - y Shaul
  lexicon: HALOT
  rationale: El hebreo שָׁאוּל corresponde al nombre bíblico español tradicional «Saúl». Aquí se sigue esa forma por ser la de uso consolidado en español, aunque la POB inglesa documenta la transliteración directa «Shaul».
- source_word: בֶּן הַכְּנַעֲנִית
  english_pob_choice: the son of the Canaanite woman
  chosen_spanish: hijo de la mujer cananea
  alternatives_spanish:
  - hijo de la cananea
  - hijo de la mujer de Canaán
  lexicon: HALOT
  rationale: La forma femenina singular indica claramente a una mujer cananea; «mujer cananea» es natural en español y conserva la explicitación de género que la POB inglesa hizo necesaria. «Cananea» funciona aquí como adjetivo nominal con valor étnico.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estos son
  - Éstas son
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se vierte con copulativa explícita en español. El plural femenino concuerda con «familias» al final del versículo, aunque el referente inmediato incluye una lista mixta de nombres.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans of
  chosen_spanish: las familias de
  alternatives_spanish:
  - los clanes de
  - las tribus de
  lexicon: HALOT
  rationale: Aunque «clanes» refleja con más precisión la estructura tribal, en español bíblico «familias» es comprensible y evita una carga sociológica extraña. La tensión entre precisión etnológica y naturalidad queda así conservada de manera legible.
theological_decisions:
- issue: 'Designación del antepasado final: nombre directo versus forma tradicional'
  english_pob_reading: Shaul is preserved as a Hebrew transliteration rather than normalized to Saul.
  chosen_spanish_reading: Saúl se usa como forma bíblica española tradicional, con nota implícita de que el hebreo es שָׁאוּל.
  alternative_spanish_readings:
  - Shaul
  - Saúl
  rationale: En español, «Saúl» es la forma estable y ampliamente reconocible del nombre bíblico; mantenerla facilita la lectura sin alterar el contenido. La POB inglesa documenta la forma hebrea directa, pero en español la forma tradicional no introduce una distorsión doctrinal ni narrativa.
  doctrine_reference: Nombres propios bíblicos y tradición de uso en español
- issue: 'Unidad social final: familias o clanes'
  english_pob_reading: the clans of Simeon
  chosen_spanish_reading: las familias de Simeón
  alternative_spanish_readings:
  - los clanes de Simeón
  - las familias/clanes de Simeón
  rationale: «מִשְׁפְּחֹת» puede referirse a unidades de parentesco dentro de la tribu; «clanes» es más técnico, pero «familias» sigue siendo fiel y más transparente para la lectura eclesial. Se conserva la idea de agrupación tribal sin imponer un tecnicismo innecesario.
  doctrine_reference: Estructura tribal/parental en Israel (término de parentesco)
- issue: Forma del etnónimo femenino
  english_pob_reading: the Canaanite woman
  chosen_spanish_reading: la mujer cananea
  alternative_spanish_readings:
  - la cananea
  - la mujer de Canaán
  rationale: El hebreo señala una mujer cananea, y la POB inglesa hace explícita la feminidad. «Mujer cananea» transmite esa información con naturalidad y evita una forma arcaica como «canaanita» o «canaanitess».
  doctrine_reference: Lectura gramatical del participio/etnónimo femenino
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo masorético (WLC) y del audit trail inglés. No se introdujeron cambios textuales sustantivos respecto al sentido del original; la principal adaptación fue ajustar nombres propios y el término de parentesco final a un español bíblico natural, conservando la distinción entre el nombre hebreo y la forma tradicional española cuando esta última es de uso consolidado.
  spanish_consistency_notes:
  - Se mantuvo «Simeón» para el nombre tribal, consistente con el uso bíblico estándar en español.
  - Se tradujeron las conjunciones coordinantes de la lista con «y» para reflejar el waw repetido del hebreo.
  - Se preservó la explicitación de género en «la mujer cananea», como exige el hebreo y la nota inglesa.
  - Se optó por «familias» en lugar de «clanes» por legibilidad, aunque la nota de decisión reconoce la alternativa más técnica.
  - La nota al pie marca solo la alternativa de transliteración documentada para Jemuel, sin duplicar marcadores.
