translation:
  language: es
  text: Y tu amor está sobre la descendencia de Abraham, los hijos de Israel. Tu disciplina está sobre nosotros como sobre un primogénito, un hijo único,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγάπη σου
  english_pob_choice: your love
  chosen_spanish: tu amor
  alternatives_spanish:
  - tu afecto
  lexicon: LSJ
  rationale: «ἀγάπη» se vierte de forma natural y fiel como «amor». En español, «afecto» debilitaría el peso relacional y pactal del texto y no reflejaría bien la elección auditada en inglés.
- source_word: σπέρμα Ἀβραάμ
  english_pob_choice: the offspring of Abraham
  chosen_spanish: la descendencia de Abraham
  alternatives_spanish:
  - la simiente de Abraham
  - los descendientes de Abraham
  lexicon: LSJ
  rationale: Aunque σπέρμα es singular colectivo, en español «descendencia» conserva mejor ese valor colectivo que un calco como «simiente». Mantiene el vínculo abrahámico sin perder naturalidad.
- source_word: υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: LSJ
  rationale: Se conserva «hijos» para reflejar el griego explícito «sons» y mantener el eco con el «hijo» singular posterior. «Israelitas» sería más idiomático, pero suaviza la imagen lexical.
- source_word: ἡ παιδία σου
  english_pob_choice: your discipline
  chosen_spanish: tu disciplina
  alternatives_spanish:
  - tu instrucción
  - tu corrección
  - tu formación
  lexicon: LSJ
  rationale: En este contexto παιδία expresa formación correctiva más que castigo desnudo. «Disciplina» reproduce bien esa doble fuerza formativa y correctiva, coherente con la lectura auditada en inglés.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: is upon us
  chosen_spanish: está sobre nosotros
  alternatives_spanish:
  - recae sobre nosotros
  - está encima de nosotros
  lexicon: LSJ
  rationale: «Está sobre nosotros» conserva la imagen de ἐπί sin volverla abstracta. Mantiene el paralelismo con las demás frases de localización/sobrecarga del verso.
- source_word: ὡς υἱὸν πρωτότοκον μονογενῆ
  english_pob_choice: as upon a firstborn, an only son
  chosen_spanish: como sobre un primogénito, un hijo único
  alternatives_spanish:
  - como sobre un hijo primogénito, único
  - como sobre un primogénito, hijo unigénito
  lexicon: LSJ
  rationale: Se preservan ambos adjetivos, πρωτότοκος y μονογενής, sin fusionarlos. «Hijo único» comunica mejor la singularidad de μονογενής en español moderno que «unigénito», mientras «primogénito» conserva el orden de nacimiento/categoría familiar.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego de Swete 1909 y mantiene la equivalencia con el audit trail inglés POB, sin cambios respecto a la revisión más reciente señalada como sin modificaciones.
  spanish_consistency_notes:
  - Se usa «amor» para ἀγάπη, en coherencia con el uso bíblico habitual y con la decisión auditada en inglés.
  - Se usa «disciplina» para παιδία, evitando reducir el término a mera punición y preservando su sentido formativo-correctivo.
  - Se conserva el paralelo poético con repeticiones de «sobre» para reflejar la sintaxis del griego.
