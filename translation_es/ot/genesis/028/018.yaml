    text: O 'piedra erguida'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'sobre su cabeza'.
    reason: lexical_alternative
  revision_rationale: La revisión elimina la adición no atestiguada 'de su cama', alinea מַצֵּבָה con la decisión del POB inglés mediante 'pilar' en el texto principal y conserva la alternativa 'piedra erguida' en nota. También ajusta el verbo a 'erigió' para reflejar mejor la acción de establecer la piedra como objeto vertical. Se mantiene 'sobre su parte superior' por claridad idiomática en español, con nota literal 'sobre su cabeza'.
