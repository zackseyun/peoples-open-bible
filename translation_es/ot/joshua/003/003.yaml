review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mandato al pueblo, condición temporal al ver el arca del pacto de Yahvé, identificación de los sacerdotes levitas como quienes la llevan, y la orden de partir y seguirla. Sin embargo, hay dos problemas de fidelidad/forma: el texto español usa «Y les ordenaron» aunque el hebreo solo tiene objeto directo «al pueblo» y no requiere ese pronombre dativo; además, la nota [a] no preserva una alternativa real del inglés ni del hebreo, porque el texto principal ya dice «al pueblo».'
  spanish_quality_summary: La redacción es mayormente clara y natural, con buen registro bíblico moderno. «Sacerdotes levitas» y «Yahvé» están bien. No obstante, «Y les ordenaron al pueblo» suena redundante o no estándar en buena prosa escrita; «Y ordenaron al pueblo» o «Y mandaron al pueblo» es mejor. «Seguirán detrás de ella» es inteligible, pero «irán tras ella» suena más natural y mantiene la imagen espacial sin pesadez.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; אֲרוֹן בְּרִית → «arca del pacto» aceptable; הַכֹּהֲנִים הַלְוִיִּם → «los sacerdotes levitas» bien, con nota alternativa adecuada. No hay conflicto doctrinal. La nota [a] debe eliminarse por no corresponder a una alternativa léxica significativa.'
  issues:
  - severity: medium
    issue: Uso de «les» en «Y les ordenaron al pueblo»
    rationale: El hebreo וַיְצַוּוּ אֶת הָעָם expresa simplemente «ordenaron al pueblo»/«mandaron al pueblo». El pronombre dativo «les» no está motivado por el original y vuelve la frase redundante o poco natural en español estándar.
  - severity: medium
    issue: 'Nota [a] espuria: «O “el pueblo”»'
    rationale: No preserva ninguna alternativa real del inglés POB ni resuelve una ambigüedad del hebreo; el texto principal ya dice «al pueblo». Debe eliminarse.
  - severity: low
    issue: «Seguirán detrás de ella» es algo pesado
    rationale: Aunque fiel, suena menos natural que «irán tras ella» o «la seguirán». Dado que el inglés auditado privilegia la imagen espacial de «go after it», «irán tras ella» mantiene mejor ese matiz en español fluido.
  revised_spanish_text: 'Y ordenaron al pueblo, diciendo: «Cuando vean el arca del pacto de Yahvé, su Dios, y a los sacerdotes levitas[a] llevándola, entonces partirán de su lugar e irán tras ella».

    '
