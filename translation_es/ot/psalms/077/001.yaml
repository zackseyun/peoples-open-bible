translation:
  language: es
  text: Para el director del coro:[a] según Jedutún[b]. Un salmo de Asaf[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para el director musical' o 'para el maestro del coro'.
    reason: lexical_alternative
  - marker: b
    text: '''Según Jedutún'' puede indicar un estilo musical, una melodía, un conjunto o la agrupación asociada con Jedutún.'
    reason: cultural_note
  - marker: c
    text: O 'para Asaf'; la preposición hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de canto
  - Para el maestro del coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, el participio indica a quien dirige o supervisa la ejecución musical. 'Director del coro' comunica bien esa función en español moderno sin volverlo arcaico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con arreglo a
  - de acuerdo con
  lexicon: HALOT
  rationale: En encabezados musicales, la preposición puede introducir una indicación de estilo, melodía o agrupación. 'Según' reproduce esa relación sin precisar indebidamente si se trata de tono, modalidad o asociación.
- source_word: ידיתון
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutún
  - Jedutón
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. Se conserva la forma habitual en español bíblico, con acento gráfico para acomodarla a la ortografía española.
- source_word: לְאָסָף
  english_pob_choice: A psalm of Asaph
  chosen_spanish: Salmo de Asaf
  alternatives_spanish:
  - Salmo para Asaf
  - Salmo de/para Asaf
  - Salmo perteneciente a Asaf
  lexicon: HALOT
  rationale: El lamed puede señalar autoría, asociación o dedicación. 'De Asaf' mantiene esa ambigüedad de manera natural en español y coincide con la lectura sintáctica unificada del hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: Es el término genérico establecido para este género literario. 'Salmo' preserva la clasificación textual sin sobreinterpretar el contenido.
theological_decisions:
- issue: 'Ambigüedad de לְ en לְאָסָף: autoría, asociación o dedicación'
  english_pob_reading: The Hebrew preposition can indicate authorship, association, or dedication.
  chosen_spanish_reading: '''De Asaf'' conserva la ambigüedad entre autor, pertenencia o dedicación.'
  alternative_spanish_readings:
  - '''Para Asaf'''
  - '''Perteneciente a Asaf'''
  rationale: El español debe evitar cerrar el sentido donde el hebreo permite varias relaciones. 'De' es la forma más breve y natural que mantiene abierta la cuestión.
  doctrine_reference: Principio de fidelidad semántica y cautela exegética en encabezados poéticos
translation_notes:
  revision_awareness: El inglés auditado muestra que la redacción final unificó 'A psalm of Asaph' para evitar una separación artificial. En español, por la sintaxis natural del encabezado, 'Salmo de Asaf' ya integra esa unidad sin dividirla en dos oraciones.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Salmo'' se conserva como término de género literario; no se sustituye por ''cántico''.'
  - '''Jedutún'' se translitera y se acentúa según uso español.'
  - La puntuación del encabezado busca reflejar el carácter de superscripción poética sin introducir contenido ajeno.
