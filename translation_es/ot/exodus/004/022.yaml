review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: mandato a Moisés, fórmula mensajera, nombre divino Yahvé, e identificación de Israel como hijo/primogénito de Yahvé. Sin embargo, la nota al pie no preserva de verdad la alternativa inglesa, porque repite exactamente el texto principal en vez de ofrecer el orden más formal del hebreo.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Entonces dirás a Faraón: “Así dice Yahvé…”» fluye bien. La cláusula «Israel es mi hijo, mi primogénito» es plenamente fiel y muy legible. El único problema real es de consistencia editorial en la nota, no de redacción principal.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה como «Yahvé», no «SEÑOR»; בְּנִי como «mi hijo»; בְכֹרִי como «mi primogénito». La decisión de mantener la apposición «mi hijo, mi primogénito» en español también encaja con la racionalidad documentada.'
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en lugar de dar una alternativa real.
    rationale: La auditoría inglesa conserva como alternativa el orden más formal «Israel is my son, my firstborn». En español, el texto principal ya dice «Israel es mi hijo, mi primogénito», de modo que la nota actual no añade información ni preserva la distinción documentada.
  revised_spanish_text: 'Entonces dirás a Faraón[a]: «Así dice Yahvé: Israel es mi hijo, mi primogénito.»'
  revised_footnotes:
