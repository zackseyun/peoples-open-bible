base_translation:
  language: en
  yaml_path: translation/ot/isaiah/008/023.yaml
  text: For there will be no gloom for her who was in anguish[a]. In the former time he brought contempt on the land of Zebulun and the land of Naphtali, but in the latter time he will make glorious the way of the sea, beyond the Jordan[c][b], Galilee of the nations.
  footnotes:
  - marker: a
    text: Or 'Galilee of the Gentiles.' The Hebrew literally says 'Galilee of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult at the start of the verse; 'gloom' may also be understood as 'darkness' or 'dimness.'
    reason: lexical_alternative
  - marker: c
    text: Matthew 4:15-16 cites this region in connection with the beginning of Jesus' public ministry.
    reason: cross_reference
