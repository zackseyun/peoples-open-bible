translation:
  language: es
  text: Así devolvió la plata a su madre[a], y su madre tomó doscientas piezas de plata y se las dio al platero, y él lo hizo una imagen tallada y una imagen fundida[b][c], y quedó en la casa de Miqueas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «doscientos siclos de plata»; el hebreo dice simplemente «doscientos plata», sin expresar la unidad en este versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una imagen grabada y una imagen de fundición».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa un verbo singular después de «una imagen tallada y una imagen fundida», probablemente tratando el objeto hecho, o el conjunto, como una unidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: returned
  chosen_spanish: devolvió
  alternatives_spanish:
  - regresó
  - volvió a entregar
  lexicon: HALOT
  rationale: El verbo hebreo en forma causativa expresa que el dinero volvió a su dueño anterior. En español, «devolvió» comunica bien la restitución y suena natural en narrativa.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - la plata acuñada
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «la plata», en este contexto el énfasis narrativo recae en el valor monetario entregado y devuelto. «El dinero» evita una repetición extraña en español y mantiene la función narrativa; la materia plata queda explícita en el versículo siguiente con «doscientos de plata».
- source_word: לְאִמּוֹ / אִמּוֹ
  english_pob_choice: to his mother / his mother
  chosen_spanish: a su madre / su madre
  alternatives_spanish:
  - a la madre de él / la madre de él
  lexicon: HALOT
  rationale: La relación posesiva es directa y debe conservarse sin ambigüedad. El posesivo «su» es el equivalente natural en español.
- source_word: מָאתַיִם כֶּסֶף
  english_pob_choice: two hundred pieces of silver
  chosen_spanish: doscientos de plata
  alternatives_spanish:
  - doscientos siclos de plata
  - doscientas piezas de plata
  lexicon: HALOT
  rationale: El hebreo no explicita la unidad. Por eso se evita añadir «siclos» como si estuviera dicha en el verso. «Doscientos de plata» conserva la omisión del original, aunque en español suene algo elíptico; es una forma fiel y transparente.
- source_word: לַצּוֹרֵף
  english_pob_choice: to the silversmith
  chosen_spanish: al platero
  alternatives_spanish:
  - al orfebre
  - al metalista
  - al refinador
  lexicon: HALOT
  rationale: צֹרֵף designa un trabajador de metales, y aquí el contexto del plata hace natural «platero». Es una opción clara y comprensible en español, aunque algo más general que «orfebre».
- source_word: וַיַּעֲשֵׂהוּ
  english_pob_choice: he made it into
  chosen_spanish: él lo hizo
  alternatives_spanish:
  - él lo convirtió en
  - él lo fabricó
  lexicon: HALOT
  rationale: El hebreo permite entender una transformación del material en un objeto. En español, la frase «lo hizo» deja abierta esa relación y, unida a los sustantivos siguientes, comunica el resultado sin sobreexplicar.
- source_word: פֶּסֶל
  english_pob_choice: a carved image
  chosen_spanish: un ídolo tallado
  alternatives_spanish:
  - una imagen tallada
  - una figura tallada
  lexicon: HALOT
  rationale: El sustantivo designa una imagen esculpida, normalmente en contexto idolátrico. «Ídolo tallado» conserva la fuerza cultual del contexto sin volver el texto más interpretativo de lo que exige el hebreo.
- source_word: וּמַסֵּכָה
  english_pob_choice: and a cast image
  chosen_spanish: una imagen fundida
  alternatives_spanish:
  - una imagen vaciada
  - una imagen de metal fundido
  lexicon: HALOT
  rationale: La palabra alude a una imagen hecha por fundición. «Imagen fundida» es la equivalencia más directa y reconocible en español bíblico contemporáneo.
- source_word: וַיְהִי בְּבֵית מִיכָיְהוּ
  english_pob_choice: and it was in the house of Micah
  chosen_spanish: y quedó en la casa de Micaía
  alternatives_spanish:
  - y estaba en la casa de Micaía
  - y estuvo en la casa de Micaía
  lexicon: HALOT
  rationale: El hebreo usa un verbo singular después de los dos sustantivos, lo que permite una referencia resumida al objeto fabricado o al conjunto resultante. «Quedó» transmite la permanencia en la casa sin introducir un sujeto plural explícito.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micah
  chosen_spanish: Micaía
  alternatives_spanish:
  - Miqueas
  - Micah
  lexicon: HALOT
  rationale: En castellano bíblico pueden circular varias formas para nombres relacionados. Aquí se elige «Micaía» para reflejar más de cerca la forma hebrea del nombre, aunque en otras tradiciones aparece «Miqueas».
theological_decisions:
- issue: Si traducir פֶּסֶל וּמַסֵּכָה con lenguaje interpretativo condenatorio o mantener los nombres de los objetos
  english_pob_reading: a carved image and a cast image
  chosen_spanish_reading: un ídolo tallado y una imagen fundida
  alternative_spanish_readings:
  - un ídolo y un ídolo fundido
  - imágenes idolátricas
  rationale: 'El verso narra la fabricación de objetos de culto problemáticos, pero el hebreo nombra los objetos sin añadir una glosa explicativa. La traducción conserva esa tensión: deja ver el carácter idolátrico por el contexto y por «ídolo», sin ampliar el texto más allá de lo dicho.'
  doctrine_reference: 'Principio de fidelidad textual: no resolver en traducción una valoración teológica que el verso deja implícita en la narración.'
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo sustancialmente sin cambios en la revisión más reciente; el ajuste principal aquí es la adaptación española con preservación de las ambigüedades documentadas en el audit trail.
  spanish_consistency_notes:
  - Se mantiene el referente posesivo explícito («su madre») para conservar la claridad narrativa del hebreo.
  - Se preserva la omisión de la unidad de medida en «doscientos de plata», con nota alternativa para la lectura contextual de «siclos».
  - Se evita el calco mecánico de «silversmith» y se opta por «platero» por claridad en español.
  - La secuencia de imágenes cultuales se traduce de forma transparente sin suavizar el trasfondo idolátrico del contexto.
