translation:
  language: es
  text: Hazme oír gozo y alegría[a]; que se alegren los huesos[b] que tú has aplastado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haz que oiga».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los huesos»; el contexto implica los huesos del salmista.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los huesos que tú has quebrado».'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּשְׁמִיעֵנִי
  english_pob_choice: Let me hear
  chosen_spanish: Hazme oír
  alternatives_spanish:
  - Déjame oír
  - Haz que oiga
  lexicon: HALOT
  rationale: 'El hifil con sufijo de 1ª persona expresa causación: ''hacer oír''. ''Hazme oír'' conserva la fuerza peticional y suena natural en español, sin perder el matiz causativo.'
- source_word: שָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: El término expresa alegría intensa, júbilo o gozo. 'Gozo' funciona bien en poesía bíblica en español y permite distinguirlo del término siguiente.
- source_word: וְשִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: Como par poético de שָׂשׂוֹן, 'alegría' conserva la cercanía semántica sin repetir exactamente el primer sustantivo.
- source_word: תָּגֵלְנָה
  english_pob_choice: let ... rejoice
  chosen_spanish: que se alegren
  alternatives_spanish:
  - que exulten
  - que se regocijen
  lexicon: HALOT
  rationale: El imperfecto plural puede funcionar con valor volitivo en el paralelo poético. 'Que se alegren' preserva ese sentido desiderativo en español.
- source_word: עֲצָמוֹת
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - mis huesos
  - los huesos míos
  lexicon: HALOT
  rationale: Hebreo dice literalmente 'los huesos' sin sufijo posesivo. El contexto hace claro que son los del salmista, pero el texto español mantiene la forma hebrea sin añadir posesión explícita.
- source_word: דִּכִּיתָ
  english_pob_choice: you have crushed
  chosen_spanish: has aplastado
  alternatives_spanish:
  - has quebrantado
  - has triturado
  lexicon: HALOT
  rationale: El verbo denota aplastar, quebrar o abatir con fuerza. 'Has aplastado' conserva la imagen fuerte y mantiene la atribución directa a Dios presente en el hebreo.
theological_decisions:
- issue: Atribución directa a Dios del sufrimiento
  english_pob_reading: the bones you have crushed
  chosen_spanish_reading: los huesos que tú has aplastado
  alternative_spanish_readings:
  - los huesos aplastados
  - los huesos que han sido aplastados
  - los huesos que tú has quebrantado
  rationale: El perfecto de segunda persona masculino singular dirige la acción a Dios de manera explícita. La traducción conserva esa tensión teológica en vez de suavizarla con una pasiva impersonal o una formulación menos directa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto al último pase auditado; la versión inglesa final también quedó estable tras revisión alta y acuerdo total entre verificadores.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en el contexto sin introducir 'Señor', conforme al texto hebreo.
  - Se conservó la tensión de agencia divina directa en el segundo hemistiquio.
  - La duplicación poética gozo/alegría refleja el par hebreo שָׂשׂוֹן / שִׂמְחָה sin nivelar ambos términos en una sola palabra.
