review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Gideón propone la señal del vellón, contrasta rocío en el vellón con sequedad en el entorno, y concluye que así sabrá que Dios salvará a Israel por su mano. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría inglesa: (1) la nota [a] está anclada en ‘Mira’ cuando en realidad documenta la alternativa léxica de הָאָרֶץ (‘suelo/tierra’); y (2) ‘toda la tierra’ en el texto principal no sigue la decisión contextual del POB inglés, que prefirió ‘ground’ por el escenario local de la señal.'
  spanish_quality_summary: El español es mayormente claro, natural y digno. ‘Un vellón de lana sobre la era’ y ‘por mi mano’ son buenas elecciones. No obstante, ‘Si hubiera rocío…’ suena un poco menos directo que ‘Si hay…’ o ‘Si hay rocío…’ en esta petición de señal, y la colocación de la nota crea confusión de lectura. También conviene ajustar ‘toda la tierra’ a ‘todo el suelo’ para mayor precisión contextual y mejor coherencia con la nota.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas clave están en general bien orientadas: גִּזַּת הַצֶּמֶר = ‘un vellón de lana’, גֹּרֶן = ‘la era’, בְּיָדִי = ‘por mi mano’. La principal divergencia es הָאָרֶץ, donde el español debe alinearse con la lectura contextual ‘suelo’/‘terreno’ más que ‘tierra’ en el texto principal, dejando ‘tierra’ y ‘toda la tierra’ como alternativas de nota.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en ‘Mira’ en lugar de en ‘suelo/tierra’.
    rationale: La nota explica alternativas para הָאָרֶץ, no para הִנֵּה. Según las instrucciones, el marcador debe aparecer exactamente en la palabra o frase pertinente del texto.
  - severity: medium
    issue: ‘Toda la tierra’ no sigue la decisión contextual documentada por el POB inglés.
    rationale: La auditoría inglesa prefirió ‘ground’ por el marco físico inmediato de la señal. En español, ‘todo el suelo’ o ‘todo el terreno’ preserva mejor ese alcance local sin sobregeneralizar.
  - severity: low
    issue: ‘Si hubiera rocío’ es aceptable, pero menos directo que una formulación presente más simple.
    rationale: El hebreo expresa una condición sencilla (‘si hay rocío’). En español bíblico natural, ‘Si hay rocío…’ comunica con más inmediatez la prueba que Gideón propone.
  revised_spanish_text: Mira, estoy poniendo un vellón de lana sobre la era. Si hay rocío sobre el vellón solo, y sequedad sobre todo el suelo[a], entonces sabré que salvarás a Israel por mi mano, como has hablado.
  revised_footnotes:
  - marker: a
    text: O ‘toda la tierra’ o ‘todo el terreno’; el hebreo puede referirse al suelo inmediato o a la tierra en sentido más amplio. En este contexto, probablemente alude al suelo circundante de la señal.
    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación menor para alinear el español con la evidencia fuente y la auditoría POB: mover la nota al término que realmente comenta, y ajustar הָאָרֶץ a ‘suelo’ en el texto principal por el contexto local de la señal. También se simplifica ‘Si hubiera rocío’ a ‘Si hay rocío’ para una lectura más natural y directa sin perder fidelidad. No hace falta adjudicación adicional.'
