translation:
  language: es
  text: 'Como la perdiz[a] que empolla lo que no incubó, así es el que hace riquezas[b] injustamente[c]: en la mitad de sus días[d] lo dejará[e], y en su fin[f] será un necio[g].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Como la perdiz que se sienta sobre huevos que no puso». La conducta exacta del ave detrás del proverbio es incierta, pero el sentido es que lo que no es legítimamente propio no permanece.
    reason: lexical_alternative
  - marker: b
    text: «Hace riquezas» refleja más de cerca la construcción verbal hebrea que una forma más suave como «se enriquece».
    reason: lexical_alternative
  - marker: c
    text: «Injustamente» traduce el valor ético de מִשְׁפָּט aquí, es decir, no conforme a lo justo o recto.
    reason: lexical_alternative
  - marker: d
    text: La expresión conserva el hebraísmo de «en la mitad de sus días», es decir, antes de completar la vida esperada.
    reason: spanish_style_note
  - marker: e
    text: El sujeto implícito es la riqueza obtenida injustamente; el texto habla de su desaparición o retiro, no de una acción voluntaria del hombre.
    reason: theological_note
  - marker: f
    text: «En su fin» mantiene el sufijo personal del hebreo y señala el desenlace de la vida del individuo.
    reason: spanish_style_note
  - marker: g
    text: «Necio» comunica la carga sapiencial y moral de נָבָל mejor que un simple «tonto».
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵא
  english_pob_choice: partridge
  chosen_spanish: la perdiz
  alternatives_spanish:
  - la codorniz
  - el ave llamada perdiz
  lexicon: HALOT
  rationale: El contexto proverbial trata de un ave concreta asociada con huevos/polluelos; en español, «perdiz» es la equivalencia natural y tradicional para este zoologismo en una imagen breve y reconocible.
- source_word: דָגַר
  english_pob_choice: gathers a brood
  chosen_spanish: empolla
  alternatives_spanish:
  - cubre con su cuerpo
  - incuba
  - reúne una nidada
  lexicon: HALOT
  rationale: La imagen hebrea es aviar y el español requiere un verbo natural para huevos o cría. «Empolla» conserva el acto de incubar sin forzar una interpretación biológica más específica que la admitida por el texto.
- source_word: וְלֹא יָלָד
  english_pob_choice: it did not hatch
  chosen_spanish: lo que no puso
  alternatives_spanish:
  - que no salió de sus huevos
  - que no incubó
  - que no nació de ella
  lexicon: HALOT
  rationale: El original presenta una tensión zoológica difícil; el inglés opta por «did not hatch» y deja abierta la imagen. En español, «lo que no puso» mantiene la idea de posesión no legítima y evita afirmar de manera demasiado cerrada un detalle naturalístico incierto.
- source_word: עֹשֶׂה עֹשֶׁר
  english_pob_choice: one who makes wealth
  chosen_spanish: el que hace riquezas
  alternatives_spanish:
  - el que acumula riqueza
  - el que obtiene riquezas
  - el que se enriquece
  lexicon: HALOT
  rationale: La estructura hebrea es verbal y activa; «hace riquezas» conserva esa fuerza. Se prefirió no suavizarlo a un mero resultado («se enriquece») para no perder el matiz de producción/acumulación deliberada.
- source_word: וְלֹא בְמִשְׁפָּט
  english_pob_choice: unjustly
  chosen_spanish: injustamente
  alternatives_spanish:
  - sin justicia
  - no con justicia
  - de modo injusto
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene valor ético-jurídico. «Injustamente» expresa de forma clara y natural en español que la riqueza no fue obtenida conforme a lo justo.
- source_word: בַּחֲצִי יָמָיו
  english_pob_choice: in the middle of his days
  chosen_spanish: en la mitad de sus días
  alternatives_spanish:
  - a mitad de su vida
  - en medio de su vida
  - a mitad de sus años
  lexicon: HALOT
  rationale: La frase apunta a una vida truncada antes del término esperado. «En la mitad de sus días» sigue de cerca la construcción hebrea y mantiene el tono proverbial.
- source_word: יַעַזְבֶנּוּ
  english_pob_choice: it will leave him
  chosen_spanish: lo dejará
  alternatives_spanish:
  - lo abandonará
  - lo dejará atrás
  - lo abandonará a él
  lexicon: HALOT
  rationale: El sujeto implícito del verbo es la riqueza adquirida injustamente, como en el inglés auditado. En español, «lo dejará» conserva esa idea de abandono/retirada sin introducir un sujeto explícito innecesario.
- source_word: וּבְאַחֲרִיתוֹ
  english_pob_choice: in his end
  chosen_spanish: en su fin
  alternatives_spanish:
  - al final de su vida
  - en su final
  - en su postrimería
  lexicon: HALOT
  rationale: Se conserva el sufijo personal del hebreo; «en su fin» es breve y fiel, y en este contexto proverbial significa el desenlace personal del hombre.
- source_word: נָבָל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un hombre necio
  - un estúpido
  lexicon: HALOT
  rationale: En poesía sapiencial, נָבָל tiene carga moral y espiritual más que meramente intelectual. «Necio» reproduce bien esa densidad en español bíblico actual sin depender de un registro excesivamente arcaico.
theological_decisions:
- issue: Imagen del ave y su relación con la posesión ilegítima
  english_pob_reading: The image describes a bird possessing or brooding over young/eggs that are not truly its own, illustrating ill-gotten wealth that does not remain.
  chosen_spanish_reading: La imagen presenta a un ave que incuba o cubre algo que no le pertenece, para ilustrar que la riqueza obtenida injustamente no permanece.
  alternative_spanish_readings:
  - El ave roba huevos y los empolla sin éxito.
  - El ave reúne crías que no salió de sus propios huevos.
  rationale: 'El hebreo permite una imagen proverbial algo oscura; la traducción debe conservar la tensión sin resolverla artificialmente. El español mantiene el sentido general: lo poseído sin derecho no perdura.'
  doctrine_reference: Sabiduría proverbial sobre la caducidad de las ganancias injustas; cf. principio ético de justicia distributiva en el Antiguo Testamento.
translation_notes:
  revision_awareness: Revisé el texto inglés auditado y el hebreo masorético; no se introdujeron cambios de sentido respecto del tramo revisado más reciente. Se preservó la ambigüedad zoológica del primer hemistiquio y el sujeto implícito de «lo dejará» sigue siendo la riqueza injustamente adquirida.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el proyecto general como norma, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» porque el pasaje no es mesiánico nominal.
  - Se usó «necio» para נָבָל por coherencia con el registro sapiencial bíblico del POB.
  - Se conservó el paralelismo proverbial y la sintaxis breve del hebreo, evitando una paráfrasis explicativa en el cuerpo del verso.
