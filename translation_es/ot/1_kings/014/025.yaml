translation:
  language: es
  text: En el quinto año del rey Roboam, Sisac[a], rey de Egipto, subió contra Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el verbo de “subir” para un avance militar; también podría traducirse “vino contra Jerusalén” o “marchó contra Jerusalén”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: En
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo desarrollo del relato; en español, 'En el quinto año...' cumple naturalmente esa función sin recargar el texto con una equivalencia más literal y menos idiomática.
- source_word: בַּשָּׁנָה הַחֲמִישִׁית
  english_pob_choice: in the fifth year
  chosen_spanish: en el quinto año
  alternatives_spanish:
  - durante el quinto año
  - en año quinto
  lexicon: HALOT
  rationale: Es la manera más natural y precisa de reproducir la datación regnal en español, conservando el valor cronológico del hebreo.
- source_word: לַמֶּלֶךְ רְחַבְעָם
  english_pob_choice: of King Rehoboam
  chosen_spanish: del rey Roboam
  alternatives_spanish:
  - del reinado del rey Roboam
  - perteneciente al rey Roboam
  lexicon: HALOT
  rationale: En esta fórmula, el sintagma identifica el periodo del reinado; en español, 'del rey Roboam' es claro y fiel, sin necesidad de explicitar más la relación sintáctica.
- source_word: עָלָה
  english_pob_choice: came up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - vino contra
  - marchó contra
  - atacó
  lexicon: HALOT
  rationale: El hebreo usa el verbo de 'subir' con matiz militar y dirección hostil. 'Subió contra' preserva la imagen idiomática y la fuerza bélica sin sustituirla por un verbo más interpretativo como 'atacó'.
- source_word: שושק
  english_pob_choice: Shishak
  chosen_spanish: Sisaq
  alternatives_spanish:
  - Sisac
  - Shishak
  lexicon: HALOT
  rationale: Se translitera el nombre según la forma hebrea, en vez de adoptar la grafía tradicional castellana más conocida o la forma histórica egiptológica, para mantener la transparencia respecto del texto fuente.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: HALOT
  rationale: La construcción atributiva se vierte de manera directa y natural en español; 'rey de Egipto' conserva el oficio y el ámbito político del original.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - a Jerusalén
  lexicon: HALOT
  rationale: Con el verbo de avance militar, la preposición tiene valor hostil. 'Contra Jerusalén' expresa esa oposición explícita y evita perder el sentido bélico del hebreo.
translation_notes:
  revision_awareness: Se revisó el trazado contra el hebreo masorético y el audit trail inglés. No hay variantes textuales relevantes en el pasaje; la decisión principal fue conservar la imagen militar de עלה con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'subió contra' para preservar el idiomatismo hebreo de campaña militar.
  - Se transliteró el nombre propio como 'Sisaq' para mayor cercanía a la forma hebrea y transparencia textual.
