translation:
  text: Until he receives it[a], he will kiss his neighbor's hand, and for his neighbor’s money he will lower his voice; but at the time of repayment he will delay[b], and he will repay with words of indifference and blame the timing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he will humble [his] voice,' an idiom for speaking in a lowered, submissive tone.
    reason: lexical_alternative
  - marker: b
    text: 'The verb ''repay'' is used ironically here: instead of returning the money, he returns only excuses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως οὗ λάβῃ
  chosen: Until he receives it
  alternatives:
  - Until he gets it
  - Until he has received
  lexicon: LSJ
  rationale: The clause sets the borrower’s flattering behavior before obtaining the loan. 'Receives' is slightly more formal and fits the context of receiving money from another.
- source_word: καταφιλήσει χεῖρα αὐτοῦ
  chosen: he will kiss his neighbor’s hand
  alternatives:
  - he will warmly kiss his hand
  - he will fawn over his hand
  lexicon: LSJ
  rationale: καταφιλέω intensifies φιλέω, suggesting repeated or eager kissing. In English, 'kiss his hand' preserves the concrete image of exaggerated deference without over-paraphrasing. 'His neighbor’s' is supplied from the broader context of the verse and following phrase to avoid ambiguity in English.
- source_word: ἐπὶ τῶν χρημάτων τοῦ πλησίον
  chosen: for his neighbor’s money
  alternatives:
  - because of his neighbor’s money
  - over his neighbor’s money
  - with regard to his neighbor’s money
  lexicon: LSJ
  rationale: 'The phrase expresses the motive or occasion for the borrower’s humble speech: in relation to obtaining the neighbor’s money. ''For'' is idiomatic and concise in English.'
- source_word: ταπεινώσει φωνήν
  chosen: he will lower his voice
  alternatives:
  - he will humble his voice
  - he will speak submissively
  lexicon: LSJ
  rationale: Literally 'he will humble [his] voice.' 'Lower his voice' preserves the metaphor in natural English and conveys deferential speech.
- source_word: ἐν καιρῷ ἀποδόσεως
  chosen: at the time of repayment
  alternatives:
  - when it is time to repay
  - at the appointed time of repayment
  lexicon: LSJ
  rationale: ἀπόδοσις here refers to paying back a debt. 'Repayment' is the clearest financial term in context.
- source_word: παρελκύσει χρόνον
  chosen: he will drag out the time
  alternatives:
  - he will delay
  - he will prolong the matter
  lexicon: LSJ
  rationale: The idiom indicates stalling or procrastinating. 'Drag out the time' keeps the vividness of the Greek while remaining understandable.
- source_word: ἀποδώσει λόγους ἀκηδίας
  lemma: ἀποδώσει
  chosen: he will repay with words of indifference
  alternatives:
  - he will answer with careless words
  - he will give excuses of negligence
  - he will repay with apathetic words
  lexicon: LSJ
  rationale: 'The verb ἀποδώσει is used ironically: instead of repaying money, he ''repays'' with words. ἀκηδία denotes lack of care, negligence, or indifference. ''Words of indifference'' captures the dismissive excuse-making tone without over-specifying.'
- source_word: τὸν καιρὸν αἰτιάσεται
  chosen: blame the timing
  alternatives:
  - make excuses about the time
  - blame the occasion
  - complain about the time
  lexicon: LSJ
  rationale: The borrower shifts blame onto circumstances or timing. 'Blame the timing' is concise, idiomatic, and preserves the sense of excuse-making.
