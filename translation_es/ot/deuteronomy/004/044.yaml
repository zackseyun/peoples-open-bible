revisions:
- from: Y esta es la ley[a] que Moisés puso delante de los hijos de Israel.
  to: Y esta es la ley que Moisés puso ante los hijos de Israel.[a]
  rationale: 'Se corrige la ubicación y el contenido de la nota al pie para que coincida con la evidencia fuente y el rastro de auditoría en inglés: la alternativa léxica corresponde a בְּנֵי יִשְׂרָאֵל, no a הַתּוֹרָה. Además, se ajusta «delante de» a «ante» por mayor naturalidad y dignidad estilística en español, manteniendo el mismo sentido.'
