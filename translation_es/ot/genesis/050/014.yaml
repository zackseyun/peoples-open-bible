translation:
  language: es
  text: Entonces José volvió a Egipto, él y sus hermanos y todos los que habían subido[a] con él para enterrar a su padre[b], después de haber enterrado a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «todos los que subían con él», usando el modismo bíblico común de «subir» para el viaje de Egipto a Canaán.
    reason: cultural_note
  - marker: b
    text: 'O: «para enterrar a su padre, después de haber enterrado a su padre».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT / שוב
  rationale: El verbo de acción completada expresa retorno narrativo. En español, «volvió» comunica de manera natural y digna el regreso de José sin sonar arcaico; mantiene el valor de movimiento de regreso que el inglés POB resuelve con «returned».
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - de regreso a Egipto
  lexicon: HALOT / מצרים
  rationale: La terminación direccional indica movimiento hacia Egipto. Después de «volvió», «a Egipto» es la forma más natural en español y conserva la dirección explícita del hebreo.
- source_word: הוּא וְאֶחָיו
  english_pob_choice: he and his brothers
  chosen_spanish: él y sus hermanos
  alternatives_spanish:
  - él con sus hermanos
  - él y los hermanos de él
  lexicon: HALOT / אח
  rationale: El pronombre enfático se expresa bien con «él» en aposición al sujeto principal. «Sus hermanos» corresponde directamente a אֶחָיו y evita una paráfrasis innecesaria.
- source_word: וְכָל הָעֹלִים אִתּוֹ
  english_pob_choice: and all who had gone up with him
  chosen_spanish: y todos los que habían subido con él
  alternatives_spanish:
  - y todos los que subieron con él
  - y todos los que iban con él
  lexicon: HALOT / עלה
  rationale: Se conserva el verbo ascensional «subido» para reflejar el hebraísmo de «ir/subir» desde Egipto hacia Canaán. El perfecto compuesto en español transmite bien la referencia retrospectiva a una acción ya cumplida en la narrativa.
- source_word: לִקְבֹּר אֶת אָבִיו
  english_pob_choice: to bury his father
  chosen_spanish: para enterrar a su padre
  alternatives_spanish:
  - para sepultar a su padre
  - a fin de enterrar a su padre
  lexicon: HALOT / קבר
  rationale: El infinitivo constructo de propósito se expresa naturalmente con «para». «Enterrar» es la opción más directa y clara; «sepultar» sería posible, pero «enterrar» mantiene mayor transparencia léxica en español bíblico moderno.
- source_word: אַחֲרֵי קָבְרוֹ אֶת אָבִיו
  english_pob_choice: after he had buried his father
  chosen_spanish: después de haber enterrado a su padre
  alternatives_spanish:
  - después de enterrar a su padre
  - luego de haber enterrado a su padre
  lexicon: HALOT / קבר
  rationale: אַחֲרֵי señala posterioridad temporal. El infinitivo con sufijo retoma a José; en español, «después de haber enterrado a su padre» comunica la secuencia sin forzar una repetición innecesaria. El objeto directo se mantiene explícito para corresponder al hebreo.
theological_decisions:
- issue: Verbo de movimiento ascensional aplicado al viaje Egipto–Canaán
  english_pob_reading: '''all who had gone up with him'' preserves the Hebrew idiom of ''going up'' while clarifying the retrospective sense.'
  chosen_spanish_reading: «todos los que habían subido con él» mantiene el hebraísmo de ascenso y deja visible la dirección cultural del viaje.
  alternative_spanish_readings:
  - «todos los que fueron con él»
  - «todos los que habían ido con él»
  rationale: El texto no describe solo acompañantes neutros, sino participantes en un viaje expresado con la convención bíblica de «subir». Mantener «subido» conserva la tensión idiomática y la conexión con el original, en vez de neutralizarla completamente.
  doctrine_reference: No doctrinal issue; source idiom and narrative geography.
- issue: Repetición de «su padre» al final de la cláusula
  english_pob_reading: The English audit trail restored 'his father' for fuller correspondence to the Hebrew repetition.
  chosen_spanish_reading: 'Se conserva la repetición: «a su padre ... a su padre».'
  alternative_spanish_readings:
  - «... después de haberlo enterrado»
  - «... después de haber enterrado a él»
  rationale: El hebreo repite explícitamente אָבִיו. Mantener esa repetición en español respeta mejor la forma del texto y evita suavizar un rasgo visible del original. La redundancia es estilística en la narración semítica y no requiere corrección.
  doctrine_reference: No doctrinal issue; textual fidelity to Hebrew repetition.
translation_notes:
  revision_awareness: He seguido el estado de revisión más reciente del inglés POB, conservando la repetición final de «su padre» que fue restaurada por claridad y correspondencia con el hebreo. También he mantenido la idiomaticidad del viaje ascendente en español sin perder el hebraísmo subyacente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando el texto lo exija; este versículo no contiene el tetragrámaton.
  - Se prefirió «subido» para reflejar el hebraísmo de עלה, en coherencia con el criterio POB de preservar idiomática y transparentemente la metáfora.
  - Se evitó «siervo» u otro vocabulario teológicamente marcado, porque no aplica al versículo.
