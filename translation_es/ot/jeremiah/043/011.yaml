translation:
  language: es
  text: 'Él vendrá y herirá la tierra de Egipto: los destinados a muerte[a], a muerte; los destinados a cautiverio, a cautiverio; y los destinados a la espada, a la espada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien esté destinado a muerte, a muerte; quien esté destinado a cautiverio, a cautiverio; y quien esté destinado a la espada, a la espada». El hebreo emplea una fórmula judicial breve y repetida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאָה
  english_pob_choice: He will come
  chosen_spanish: él vendrá
  alternatives_spanish:
  - vendrá
  - y él vendrá
  lexicon: HALOT
  rationale: El verbo en contexto profético es futuro y el sujeto singular masculino se conserva con un pronombre explícito para reflejar la referencia contextual al rey de Babilonia sin introducir su nombre en el texto.
- source_word: וְהִכָּה
  english_pob_choice: and strike
  chosen_spanish: y herirá
  alternatives_spanish:
  - y golpeará
  - y dará golpe contra
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o herir de muerte; 'herirá' mantiene la fuerza judicial y violenta del término sin sobreespecificar el modo de ataque.
- source_word: אֶת־אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - Egipto
  lexicon: HALOT
  rationale: Se conserva אֶרֶץ como 'tierra' para no reducir la expresión a un simple nombre geográfico. 'Tierra de Egipto' suena natural en español y mantiene el objeto del juicio.
- source_word: אֲשֶׁר לַמָּוֶת לַמָּוֶת
  english_pob_choice: those for death, to death
  chosen_spanish: los destinados a muerte, a muerte
  alternatives_spanish:
  - los que son para muerte, a muerte
  - quienes están para muerte, a muerte
  - los destinados a morir, a morir
  lexicon: HALOT
  rationale: La fórmula hebrea es breve y repetitiva. 'Destinados a muerte' comunica la cualidad judicial sin diluir la repetición retórica del original; se mantiene el eco 'a muerte, a muerte'.
- source_word: וַאֲשֶׁר לַשְּׁבִי לַשֶּׁבִי
  english_pob_choice: those for captivity, to captivity
  chosen_spanish: los destinados a cautiverio, a cautiverio
  alternatives_spanish:
  - los destinados a cautividad, a cautividad
  - los que van al cautiverio, al cautiverio
  - los destinados a exilio, a exilio
  lexicon: HALOT
  rationale: שְׁבִי denota cautiverio/captividad. 'Cautiverio' es claro en español bíblico y conserva el paralelismo con las demás frases de sentencia.
- source_word: וַאֲשֶׁר לַחֶרֶב לֶחָרֶב
  english_pob_choice: those for the sword, to the sword
  chosen_spanish: los destinados a espada, a espada
  alternatives_spanish:
  - los destinados a la espada, a la espada
  - los que son para la espada, a la espada
  lexicon: HALOT
  rationale: חֶרֶב es literalmente 'espada' y funciona metonímicamente para muerte violenta en guerra. En español, omitir el artículo en la segunda ocurrencia preserva la concisión proverbial del hebreo.
theological_decisions:
- issue: Referente del sujeto singular
  english_pob_reading: The subject is rendered as 'He,' referring in context to the king of Babylon as the agent of divine judgment.
  chosen_spanish_reading: Se conserva 'él' como sujeto implícitamente referido al rey de Babilonia, agente del juicio divino en el contexto inmediato.
  alternative_spanish_readings:
  - vendrá y herirá la tierra de Egipto
  - Nebucadnezar vendrá y herirá la tierra de Egipto
  rationale: El hebreo usa formas singulares masculinas. El español mantiene el pronombre para respetar la referencia contextual sin introducir un nombre propio que el verso no dice.
  doctrine_reference: Jeremías 43:10-11
translation_notes:
  revision_awareness: El texto español corrige la validación anterior asegurando que el marcador [a] aparece exactamente en la traducción donde corresponde y que no quedan notas huérfanas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - '''Cautiverio'' se eligió por paralelismo y claridad; ''cautividad'' queda como alternativa válida.'
  - La secuencia repetitiva 'a muerte, a muerte / a cautiverio, a cautiverio / a espada, a espada' preserva la tersa fórmula hebrea.
