translation:
  language: es
  text: Entonces Noemí tomó al niño y lo puso en su regazo, y llegó a ser su nodriza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madre de crianza» o «cuidadora»; el término hebreo se refiere a una mujer que amamanta, cría o cuida a un niño, no a una enfermera en sentido médico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  lexicon: HALOT
  rationale: לקח en la secuencia narrativa con waw consecutivo expresa una acción simple y física; en español, «tomó» comunica esa acción de manera natural y fiel.
- source_word: הַיֶּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el niño pequeño
  - el hijo
  lexicon: HALOT
  rationale: יֶלֶד puede significar «niño» o «hijo». Aquí el contexto de cuidado infantil favorece «el niño», que es natural en español y conserva la referencia al infante.
- source_word: וַתְּשִׁתֵהוּ
  english_pob_choice: laid him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo acostó
  lexicon: HALOT
  rationale: El verbo שׂים/שׁית indica poner o colocar. «Lo puso» es directo y fiel; «lo acostó» introduciría una postura específica que el hebreo no obliga.
- source_word: בְחֵיקָהּ
  english_pob_choice: in her lap
  chosen_spanish: en su regazo
  alternatives_spanish:
  - en su seno
  - en su pecho
  lexicon: HALOT
  rationale: חֵיק se refiere al área del seno/regazo. «Regazo» es una equivalencia natural en español para una postura afectuosa y cercana, sin sonar marcadamente médica o arcaizante.
- source_word: וַתְּהִי לוֹ
  english_pob_choice: she became his
  chosen_spanish: llegó a ser su
  alternatives_spanish:
  - fue su
  - se volvió su
  lexicon: HALOT
  rationale: La construcción היה + ל marca resultado o relación. «Llegó a ser su» conserva el sentido de paso a un nuevo rol sin forzar una interpretación más fuerte que el hebreo.
- source_word: לְאֹמֶנֶת
  english_pob_choice: nurse
  chosen_spanish: nodriza
  alternatives_spanish:
  - nodriza y cuidadora
  - criadora
  lexicon: HALOT
  rationale: אֹמֶנֶת designa a una mujer que cría, cuida y alimenta a un niño; «nodriza» refleja ese valor histórico de manera más precisa que la enfermera moderna. En español bíblico es comprensible y evita el sentido médico contemporáneo.
translation_notes:
  revision_awareness: El inglés POB eligió «lap» para בְחֵיקָהּ y añadió una nota para evitar el sentido moderno de «nurse»; la revisión actual mantiene la misma lectura general y solo ajusta el español para una publicación más natural y fiel al matiz del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Noemí» como forma estable del nombre propio.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton ni una cita directa de κύριος.
  - «Nodriza» se usa en su sentido histórico de mujer que cría o alimenta a un niño, no en sentido médico.
  - La puntuación reproduce una narración simple y continua acorde con la secuencia verbal hebrea.
