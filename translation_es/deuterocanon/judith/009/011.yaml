revisions:
- from: Porque tu poder no está en una multitud[a], ni tu dominio entre los fuertes; más bien, tú eres Dios de los humildes, ayudador de los menores, sostenedor de los débiles, refugio de los desamparados[b], salvador de los que no tienen esperanza.
