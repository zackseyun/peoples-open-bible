translation:
  language: es
  text: Y en el quinto año del rey Roboam[a], subió Sisac, rey de Egipto, contra Jerusalén, porque habían sido infieles a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habían actuado con infidelidad contra Yahvé» o «habían transgredido contra Yahvé». El verbo hebreo expresa ruptura de fidelidad, incluso infidelidad pactal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa introduce el relato; en español, «Y» conserva la fluidez discursiva sin cargar innecesariamente el texto con una perífrasis más larga.
- source_word: בַּשָּׁנָה הַחֲמִישִׁית
  english_pob_choice: in the fifth year
  chosen_spanish: en el quinto año
  alternatives_spanish:
  - en año cinco
  - en el año quinto
  lexicon: HALOT
  rationale: Es la expresión regnal natural en español y corresponde bien al valor cronológico del hebreo.
- source_word: לַמֶּלֶךְ רְחַבְעָם
  english_pob_choice: of King Rehoboam
  chosen_spanish: del rey Roboam
  alternatives_spanish:
  - del reinado del rey Roboam
  - del rey Rehoboam
  lexicon: HALOT
  rationale: El hebreo relaciona el año con la realeza de Roboam; en español, «del rey Roboam» expresa con claridad esa relación cronológica.
- source_word: עָלָה
  english_pob_choice: came up against
  chosen_spanish: subió ... contra
  alternatives_spanish:
  - marchó ... contra
  - vino ... contra
  - atacó
  lexicon: HALOT
  rationale: «Subió ... contra» preserva el modismo militar hebreo sin sobreespecificar la acción como «atacó».
- source_word: שִׁישַׁק
  english_pob_choice: Shishak
  chosen_spanish: Sisac
  alternatives_spanish:
  - Shishak
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma castellana habitual «Sisac», manteniendo identificación histórica clara para el lector hispanohablante.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: HALOT
  rationale: La cadena constructa se vierte de modo directo y idiomático en español.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: Con el verbo de movimiento militar, «contra» comunica mejor la hostilidad implícita que una mera dirección espacial.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa teológica e histórica de la invasión; «porque» es la forma más clara y natural en español.
- source_word: מָעֲלוּ
  english_pob_choice: had acted unfaithfully
  chosen_spanish: habían actuado con infidelidad
  alternatives_spanish:
  - habían sido infieles
  - habían obrado con traición
  - habían faltado a su pacto
  lexicon: HALOT
  rationale: El verbo מעל expresa quiebra de fidelidad, con fuerte carga relacional y pactal. «Actuado con infidelidad» conserva esa fuerza sin reducirlo a un simple error moral.
- source_word: בַּיהוָה
  english_pob_choice: against the LORD
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra el SEÑOR
  - respecto de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la pauta del proyecto. Con מעל, la relación es de ofensa/infidelidad dirigida contra Dios, por eso «contra Yahvé».
theological_decisions:
- issue: Causa teológica de la invasión de Sisac
  english_pob_reading: because they had acted unfaithfully against Yahweh
  chosen_spanish_reading: porque habían actuado con infidelidad contra Yahvé
  alternative_spanish_readings:
  - porque habían sido infieles a Yahvé
  - porque habían transgredido contra Yahvé
  rationale: La frase del cronista presenta el hecho político como juicio ligado a la ruptura de fidelidad del pueblo. La traducción conserva esa causalidad y la tensión pactal de מעל con ב.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] exactamente en el texto principal, anclado en «Roboam[a]», para que la nota alternativa quede correctamente asociada. No hubo cambios de sentido respecto del último pase revisado; solo se ajustó la anotación.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en coherencia con la terminología del proyecto.
  - Se usa «contra» tanto para el movimiento hostil como para la ofensa verbalizada por מעל + ב, manteniendo la relación agresiva/pactual del hebreo.
  - «Sisac» sigue la forma castellana tradicional del nombre propio, sin afectar la identificación con Shishak.
