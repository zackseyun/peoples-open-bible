    rationale: Aunque es aceptable y fiel al POB, «el fruto del trabajo» sería más explícito respecto de יְגִיעַ. Sin embargo, no es necesario cambiarlo porque el inglés auditado eligió «the labor» y el contexto enumera el producto de ese esfuerzo.
  revised_spanish_text: 'Pero la vergüenza[a] ha devorado el trabajo de nuestros padres desde nuestra juventud: sus rebaños y sus hatos, sus hijos y sus hijas.'
