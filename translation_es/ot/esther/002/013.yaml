    text: Or 'all that she asked for' / 'everything she requested.' The Hebrew literally says 'all that she said,' but in context it refers to what she requested to take with her.
    reason: lexical_alternative
  - marker: b
    text: '''House of the women'' is a formal rendering of the Hebrew expression; it refers to the women’s quarters.'
    reason: cultural_note
