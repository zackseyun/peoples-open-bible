lexical_decisions:
- source_word: παρέδωκεν
  english_pob_choice: gave them over
  chosen_korean: 내버려 두셔서
  alternatives_korean:
  - 넘겨주셔서
  - 방임하셔서
  lexicon: BDAG
  rationale: 심판적 「넘겨줌」의 함의를 「내버려 두다」로 옮긴다. 단순 방치가 아니라 의도적 넘김이다.
