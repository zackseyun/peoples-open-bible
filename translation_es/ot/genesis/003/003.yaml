revisions:
- from: 'Pero del fruto del árbol que está en medio del jardín[a], Dios dijo: «No comerán de él, ni lo tocarán, para que no mueran».'
  to: 'Pero del fruto del árbol que está en medio del jardín[a], Dios dijo: «No comerán de él ni lo tocarán, no sea que mueran».'
  rationale: Se corrige el matiz de פֶּן con «no sea que», que en español expresa mejor la consecuencia temida que «para que no». Se reemplaza la nota al pie por una alternativa genuina para אֲשֶׁר בְּתוֹךְ הַגָּן, en línea con la auditoría inglesa. También se pule la puntuación interna de la cita para mayor naturalidad sin alterar el sentido. El resto del versículo se mantiene porque preserva correctamente la tensión narrativa y la prohibición añadida en boca de Eva.
