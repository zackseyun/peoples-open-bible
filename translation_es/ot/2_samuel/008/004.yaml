  to: David le capturó[a] 1.700 jinetes[b] y 20.000 hombres de a pie. Entonces David desjarretó[c] todos los caballos de los carros[d], pero dejó suficientes para 100 carros[e].
  rationale: 'Se revisa para alinear el español con el sentido hebreo y con la auditoría léxica inglesa: el objeto de «desjarretó» debe ser los caballos del cuerpo de carros, no los carros mismos. También se añade la nota textual sobre la variante de 1 Crónicas 18:4 y se mejora la naturalidad de la referencia singular con «le capturó».'
