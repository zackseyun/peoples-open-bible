review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido global del griego: una prohibición de compartir la locura de los hermanos, seguida por el llamado a dejarse persuadir por el rey y salvar la vida. Sin embargo, «con la misma locura que tus hermanos» no refleja con suficiente precisión la relación comparativa de τοῖς ἀδελφοῖς σου; en español suena más natural y más fiel «como tus hermanos» o «igual que tus hermanos».'
  spanish_quality_summary: El español es claro y digno, pero la combinación «volverse también loco con la misma locura que tus hermanos» resulta algo trabada por mezclar asociación («con») y comparación («que»). Una leve reparación mejora la fluidez y la fidelidad sin perder la fuerza retórica del cognado loco/locura.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Persuadido por el rey» y «sálvate» están bien alineados con las decisiones auditadas. La principal corrección es sintáctico-lexical en la comparación con los hermanos.
  issues:
  - severity: medium
    issue: «con la misma locura que tus hermanos» representa de manera imprecisa τοῖς ἀδελφοῖς σου
    rationale: 'El dativo aquí es comparativo/asociativo: el sentido es que no comparta la misma locura que sus hermanos, es decir, ‘como tus hermanos’, no ‘con tus hermanos’. En español, «con» sugiere compañía más que conformidad de conducta.'
  - severity: low
    issue: La nota al pie sobre «loco» no es necesaria
    rationale: El giro «no te vuelvas loco ... con la misma locura» ya es suficientemente claro en español y no crea una ambigüedad nueva que requiera nota. El proyecto pide conservar notas cuando el inglés las preserve o cuando el español necesite aclaración; aquí no hace falta.
  revised_spanish_text: No te vuelvas también loco como tus hermanos, con la misma locura, sino, persuadido por el rey, sálvate.
  revision_rationale: 'Se sustituye la relación impropia «con ... que tus hermanos» por una construcción comparativa fiel y natural en español: «como tus hermanos». Se mantiene la repetición «loco / locura» para reflejar μανῇς / μανίαν y se conserva «persuadido por el rey» por cercanía al participio pasivo griego.'
