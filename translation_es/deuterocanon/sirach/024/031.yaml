review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y la progresión de la imagen griega: riego del jardín, intensificación en la segunda cláusula, y aumento desde una διῶρυξ hasta río y mar. Sin embargo, «huerto» para πρασιάν no preserva con suficiente precisión la relación parte-todo del original ni la decisión léxica auditada de ''garden bed''; πρασιά es un bancal o parcela dentro del jardín, no otro terreno equivalente al jardín completo. También la nota [a] no aporta una alternativa real útil, ya que repite esencialmente «Yo dije».'
  spanish_quality_summary: El español es claro y digno, pero «jardín ... huerto» suena como dos espacios distintos más que como un jardín y su bancal. «Canal» es aceptable, aunque «acequia» habría sido una alternativa más agrícola; no obstante, «canal» sigue siendo legible y fiel. Conviene simplificar las notas para que respalden mejor las decisiones reales del texto.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La principal cuestión de glosario es πρασιά, donde el proyecto en inglés documentó 'garden bed'; en español conviene reflejarlo con «bancal», acompañado de nota opcional con «cama de cultivo» como alternativa explicativa. El resto («regaré», «empaparé», «he aquí», «canal», «río», «mar») está alineado con la evidencia y la filosofía del POB.
  issues:
  - severity: medium
    issue: «huerto» para πρασιάν debilita la precisión de la imagen
    rationale: πρασιά designa un bancal/lecho de cultivo. «Huerto» sugiere un espacio de cultivo completo, casi paralelo a «jardín», y pierde la idea de una sección cultivada dentro del jardín.
  - severity: low
    issue: La nota [a] es redundante y poco informativa
    rationale: Dice «O “Yo dije”», que no ofrece una alternativa léxica sustancial ni ayuda a resolver una ambigüedad real del griego.
  - severity: low
    issue: Las notas deben ajustarse exactamente al texto revisado
    rationale: Si se cambia πρασιάν a «bancal», la nota correspondiente debe explicar esa elección y sus alternativas sin mantener un apoyo para «huerto».
  revised_spanish_text: 'Yo dije: «Regaré mi jardín y empaparé mi bancal[a]». Y he aquí, mi canal se convirtió en río[b], y mi río se convirtió en mar.'
