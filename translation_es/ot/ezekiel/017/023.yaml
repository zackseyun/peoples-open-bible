base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/023.yaml
  text: On the high mountain of Israel I will plant it[a], and it will put forth boughs and bear fruit and become a majestic cedar. Under it every bird of every kind will dwell[b]; in the shade of its branches they will dwell.
  footnotes:
  - marker: a
    text: Or 'I will transplant it.' The Hebrew verb can emphasize setting out a shoot in a new place.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'every bird, every wing'—a poetic way of saying birds of every kind.
    reason: lexical_alternative
