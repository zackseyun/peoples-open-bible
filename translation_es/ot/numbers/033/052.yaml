translation:
  language: es
  text: y expulsarán a todos los habitantes de la tierra de delante de ustedes, y destruirán todas sus piedras labradas[a], y todos sus ídolos de metal fundido los destruirán[b], y todos sus lugares altos los demolerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus imágenes talladas'. El hebreo מַשְׂכִּיּוֹת se refiere a representaciones figuradas, y la forma o el material exactos son debatidos.
    reason: lexical_alternative
  - marker: b
    text: O 'sus imágenes de fundición'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרַשְׁתֶּם
  english_pob_choice: you shall drive out
  chosen_spanish: expulsarán
  alternatives_spanish:
  - despojarán
  - arrojarán fuera
  lexicon: HALOT
  rationale: El hebreo en hifil expresa quitar a otros de la posesión o del lugar ocupado. En español, 'expulsarán' comunica con naturalidad la acción de remover a los habitantes, sin suavizar la fuerza del mandato.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los que habitan la tierra
  - los residentes de la tierra
  lexicon: HALOT
  rationale: El participio hebreo señala a quienes viven en esa tierra. 'Habitantes' mantiene esa referencia de manera clara y fiel.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. 'De delante de ustedes' conserva la imagen espacial sin sonar artificial en español.
- source_word: וְאִבַּדְתֶּם
  english_pob_choice: you shall destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - harán perecer
  - aniquilarán
  lexicon: HALOT
  rationale: El verbo en piel aplica aquí a objetos de culto; 'destruirán' es directo y adecuado, y conserva la fuerza del mandato.
- source_word: מַשְׂכִּיֹּתָם
  english_pob_choice: their figured stones
  chosen_spanish: sus piedras labradas
  alternatives_spanish:
  - sus piedras esculpidas
  - sus piedras figuradas
  lexicon: HALOT
  rationale: El término hebreo refiere a representaciones trabajadas, probablemente en piedra, aunque la forma exacta es debatida. 'Piedras labradas' mantiene la materialidad y evita afirmar más de lo que el hebreo garantiza.
- source_word: צַלְמֵי מַסֵּכֹתָם
  english_pob_choice: their cast-metal images
  chosen_spanish: sus ídolos de metal fundido
  alternatives_spanish:
  - sus imágenes de fundición
  - sus ídolos moldeados
  lexicon: HALOT
  rationale: צֶלֶם es 'ídolo/imagen' y מַסֵּכָה alude a algo fundido o vaciado en metal. 'Ídolos de metal fundido' expresa bien ambos elementos en español bíblico comprensible.
- source_word: תְּאַבֵּדוּ
  english_pob_choice: you shall destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - harán perecer
  - anularán
  lexicon: HALOT
  rationale: La repetición del verbo de destrucción conserva el paralelismo hebreo y la insistencia retórica del pasaje.
- source_word: בָּמֹתָם
  english_pob_choice: their high places
  chosen_spanish: sus lugares altos
  alternatives_spanish:
  - sus altos
  - sus santuarios en las alturas
  lexicon: HALOT
  rationale: '''Lugares altos'' es la equivalencia tradicional y precisa para los sitios de culto elevados.'
- source_word: תַּשְׁמִידוּ
  english_pob_choice: you shall demolish
  chosen_spanish: demolerán
  alternatives_spanish:
  - destruirán
  - derribarán
  lexicon: HALOT
  rationale: Aplicado a lugares de culto, el verbo apunta a su eliminación material. 'Demolerán' comunica esa destrucción concreta mejor que un genérico 'destruirán'.
theological_decisions:
- issue: Mandato de expulsar a los habitantes y destruir los objetos de culto cananeos
  english_pob_reading: The verse is translated straightforwardly as commands to remove the inhabitants and eradicate their idolatrous cult objects/sites, without softening either element.
  chosen_spanish_reading: El versículo se traduce como un mandato directo de expulsar a los habitantes y destruir sus objetos y lugares de culto idolátrico, sin suavizar ninguno de los dos elementos.
  alternative_spanish_readings:
  - Interpretar el primer verbo solo como una idea territorial débil, sin expulsión concreta
  - Generalizar los términos cultuales a una referencia vaga a 'prácticas paganas'
  rationale: El hebreo nombra tanto la remoción de los habitantes como la destrucción de objetos y lugares de culto concretos. La traducción no debe atenuar esa fuerza ni ampliar el sentido más allá de lo que el texto dice.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y la lectura hebrea: se mantiene el paralelismo de tres mandatos de destrucción, se preserva la distinción entre piedras labradas e ídolos de metal fundido, y se evita suavizar el primer verbo o generalizar los términos cultuales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Expulsarán'' y ''de delante de ustedes'' conservan el matiz espacial del hebreo מִפְּנֵיכֶם.'
  - '''Piedras labradas'' mantiene la ambigüedad lexical de מַשְׂכִּיֹּתָם sin forzar una identificación material más precisa de la que ofrece el texto.'
  - '''Ídolos de metal fundido'' y ''lugares altos'' siguen la terminología bíblica estable y son comprensibles en registro eclesial contemporáneo.'
