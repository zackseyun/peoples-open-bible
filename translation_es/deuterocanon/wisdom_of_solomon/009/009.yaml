revisions:
- from: Y contigo está la sabiduría[a], que conoce tus obras, y estaba presente cuando hiciste el mundo, y entiende lo que es agradable a tus ojos y lo que es recto según tus mandamientos.
  to: Y contigo está la sabiduría[a], que conoce tus obras, y estuvo presente cuando hacías el mundo, y entiende lo que es agradable ante tus ojos y lo que es recto según tus mandamientos.
  rationale: 'La revisión mantiene intacto el sentido del griego y del POB inglés, pero mejora la naturalidad del español: se afina la secuencia temporal con ''estuvo presente cuando hacías'', se cambia ''a tus ojos'' por ''ante tus ojos'' por mejor idiomaticidad, y se conserva la nota léxica sobre κόσμος sin cambios. No se requiere adjudicación adicional porque los ajustes son estilísticos y de matiz aspectual, no doctrinales ni textualmente inciertos.'
  reviewer_model: gpt-5.4
