revisions:
- from: Como la obra de un grabador en piedra[a], como las grabaduras de un sello, grabarás las dos piedras con los nombres de los hijos de Israel[b]; las harás rodeadas en engastes de oro.
  to: Como la obra de un grabador en piedra, como las grabaduras de un sello[a], grabarás las dos piedras con los nombres de los hijos de Israel[b]; las harás encerradas en engastes de oro.
  rationale: Se corrigió la ubicación de la nota [a] para que corresponda a la frase que realmente glosa en el rastro inglés y se mejoró «rodeadas en engastes de oro» a «encerradas en engastes de oro» para reflejar mejor el sentido de piedras montadas/circundadas en una montura de oro con español más natural. No se requirió cambio doctrinal ni de terminología base.
