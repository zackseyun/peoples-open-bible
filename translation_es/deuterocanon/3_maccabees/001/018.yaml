  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. La principal cuestión terminológica es mantener el matiz de παράνομοι como ‘transgresores’ o equivalente, en línea con la decisión inglesa documentada. El resto de las elecciones (‘ira’, ‘arrogancia’, ‘lengua’) concuerdan con el análisis fuente y con un español bíblico legible.
