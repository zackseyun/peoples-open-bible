  text: כֶּ֣סֶף נִ֭בְחָר לְשׁ֣וֹן צַדִּ֑יק לֵ֖ב רְשָׁעִ֣ים כִּ/מְעָֽט׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/010/020.yaml
  text: The tongue of the righteous is choice silver[a]; the heart of the wicked is of little worth.
  footnotes:
  - marker: a
    text: Or 'is of little value,' 'is little,' or 'is as nothing.' The Hebrew כִּמְעָט is concise and can express slight worth or near-nothingness.
    reason: lexical_alternative
