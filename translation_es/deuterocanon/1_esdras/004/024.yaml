translation:
  language: es
  text: 'Y el segundo, el que había hablado acerca de la fuerza del rey, comenzó a hablar: «Hombres, ¿no prevalecen[a] los hombres, dominando la tierra y el mar y todo lo que hay en ellos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «¿No prevalecen los hombres...?» La pregunta es retórica y espera la respuesta «sí».'
    reason: Preservar la nota léxica/pragmática del English POB sobre οὐχ y la fuerza retórica de la pregunta.
lexical_decisions:
- source_word: ἤρξατο ... λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a hablar
  - comenzó a decir
  lexicon: BDAG
  rationale: La fórmula ἤρξατο + infinitivo se vierte naturalmente con «comenzó a hablar», manteniendo el valor inceptivo sin recargar el estilo.
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hombre
  - el segundo orador
  lexicon: BDAG
  rationale: El ordinal simple reproduce la referencia al segundo participante del diálogo sin añadir información no presente en el griego.
- source_word: ὁ εἴπας περὶ τῆς ἰσχύος τοῦ βασιλέως
  english_pob_choice: the one who had spoken about the king’s strength
  chosen_spanish: el que había hablado acerca de la fuerza del rey
  alternatives_spanish:
  - el que había hablado sobre el poder del rey
  - el que habló acerca de la fuerza del rey
  lexicon: BDAG
  rationale: ἰσχύς puede significar fuerza o poder; aquí «fuerza» conserva el matiz concreto elegido en la base inglesa, y el participio aoristo se expresa con pluscuamperfecto para señalar que esa intervención es anterior a la presente.
- source_word: Ὦ ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Oh hombres
  - Señores
  lexicon: BDAG
  rationale: «Hombres» reproduce el vocativo plural de forma directa y sobria, sin suavizar el tono retórico.
- source_word: οὐχ ὑπερισχύουσιν
  english_pob_choice: do not ... prevail
  chosen_spanish: ¿no prevalecen
  alternatives_spanish:
  - ¿no son más fuertes
  - ¿no dominan
  lexicon: BDAG
  rationale: «Prevalecer» conserva bien la idea de superar o imponerse; en la pregunta retórica del texto, la forma interrogativa anticipa una respuesta afirmativa.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: En este contexto de discurso sobre dominio humano, «los hombres» sigue la opción lexical de la traducción inglesa y mantiene la correspondencia con el vocativo previo.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν κατακρατοῦντες
  english_pob_choice: ruling over the land and the sea
  chosen_spanish: gobernando sobre la tierra y el mar
  alternatives_spanish:
  - dominando la tierra y el mar
  - teniendo dominio sobre la tierra y el mar
  lexicon: BDAG
  rationale: κατακρατέω expresa ejercer dominio o control; «gobernando sobre» ofrece una equivalencia idiomática en español y preserva la imagen de soberanía sobre ambos ámbitos.
- source_word: πάντα τὰ ἐν αὐτοῖς
  english_pob_choice: everything in them
  chosen_spanish: todo lo que hay en ellos
  alternatives_spanish:
  - todo lo que está en ellos
  - todas las cosas en ellos
  lexicon: BDAG
  rationale: La frase abarca de manera total lo contenido en la tierra y el mar; «todo lo que hay en ellos» es natural en español y conserva la amplitud del alcance.
theological_decisions:
- issue: La pregunta retórica espera afirmación implícita, no negación
  english_pob_reading: The question is rhetorical and expects the answer 'Yes.'
  chosen_spanish_reading: La pregunta es retórica y presupone una respuesta afirmativa.
  alternative_spanish_readings:
  - La pregunta espera un sí.
  - Es una pregunta retórica con respuesta afirmativa implícita.
  rationale: La puntuación interrogativa y la forma οὐχ en griego marcan una pregunta que presupone respuesta afirmativa; el español debe conservar esa fuerza pragmática sin explicitarla en el texto principal.
  doctrine_reference: Retórica bíblica; pragmática del interrogativo griego.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una apposición innecesaria y ajustó el participio para reflejar mejor la construcción griega. El español sigue ese ajuste con «el que había hablado» y con un gerundio final que reproduce el participio κατακρατοῦντες sin añadir causalidad explícita.
  spanish_consistency_notes:
  - Se mantiene «fuerza» para ἰσχύς, coherente con la decisión inglesa y con el tono del debate.
  - «Hombres»/«los hombres» conserva la correspondencia de género marcada en el griego, sin introducir una neutralización no sustentada por el contexto inmediato.
  - Se evita «SEÑOR» o equivalentes de máscara, ya que el pasaje no contiene el Tetragrámaton ni una cita directa del nombre divino.
