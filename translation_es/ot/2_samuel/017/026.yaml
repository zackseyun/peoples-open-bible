translation:
  language: es
  text: Israel y Absalón acamparon en la tierra de Galaad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּחַן
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acampó
  - establecieron campamento
  lexicon: HALOT
  rationale: El verbo חנה en esta forma narrativa expresa el acto de acampar o establecer el campamento. «Acamparon» es natural en español y conserva el sentido militar y de movimiento del contexto sin sonar arcaico.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Aquí el nombre nacional funciona de modo colectivo para el grupo alineado con Absalón. Mantener «Israel» preserva la formulación del texto fuente y su valor político-colectivo.
- source_word: וְאַבְשָׁלֹם
  english_pob_choice: and Absalom
  chosen_spanish: y Absalón
  alternatives_spanish:
  - junto con Absalón
  lexicon: HALOT
  rationale: El nombre propio se translitera como «Absalón» para la lectura bíblica en español. La conjunción se conserva para reflejar la construcción hebrea con sujeto colectivo.
- source_word: אֶרֶץ הַגִּלְעָד
  english_pob_choice: the land of Gilead
  chosen_spanish: la tierra de Galaad
  alternatives_spanish:
  - el territorio de Galaad
  - Galaad
  lexicon: HALOT
  rationale: אֶרֶץ con un nombre geográfico suele significar «tierra» o «territorio de». «La tierra de Galaad» es transparente y fiel, y «Galaad» mantiene la forma tradicional española del topónimo.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran plena concordancia con la lectura literal del versículo; no se documentaron revisiones aplicadas ni tensiones léxicas que exigieran nota textual o alternativa obligatoria.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece ningún tetragrámaton ni sustituto divino en este versículo.
  - Se usa la forma española tradicional «Galaad» para el topónimo, en coherencia con el uso bíblico en español y sin alterar el sentido geográfico.
  - 'La sintaxis mantiene el sujeto colectivo singular/plural implícito del hebreo con un verbo plural natural en español: «acamparon».'
