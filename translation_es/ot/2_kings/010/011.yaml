translation:
  language: es
  text: Así Jehú mató a todos los que habían quedado de la casa de Acab en Jezreel, y a todos sus principales[a], sus allegados[b] y sus sacerdotes, hasta no dejarle ningún sobreviviente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus nobles» para «sus principales».
    reason: lexical_alternative
  - marker: b
    text: O «sus conocidos cercanos» o «sus íntimos» para «sus allegados».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «hasta no dejarle ningún sobreviviente», con «le» referido a Acab o a la casa de Acab.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - mató
  - hirió de muerte
  - golpeó
  lexicon: HALOT
  rationale: En este contexto narrativo de violencia letal, el hebreo נכה indica una acción mortal. «Derribó» comunica la fuerza del acto con naturalidad en español y evita el arcaísmo de «hirió» o la ambigüedad de «golpeó».
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who remained
  chosen_spanish: los que habían quedado
  alternatives_spanish:
  - los sobrevivientes
  - los que quedaron
  lexicon: HALOT
  rationale: El participio remite a quienes todavía quedaban con vida de la casa de Acab. «Los que habían quedado» conserva la idea de remanente sin forzar un término más interpretativo como «sobrevivientes».
- source_word: לְבֵית אַחְאָב
  english_pob_choice: of the house of Ahab
  chosen_spanish: de la casa de Acab
  alternatives_spanish:
  - pertenecientes a la casa de Acab
  - de la dinastía de Acab
  lexicon: HALOT
  rationale: La expresión identifica una pertenencia dinástica. «Casa de Acab» es la forma clara y fiel en español para este uso bíblico.
- source_word: בְּיִזְרְעֶאל
  english_pob_choice: in Jezreel
  chosen_spanish: en Jezreel
  alternatives_spanish:
  - en Yizreel
  - en Jezrael
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico tradicional en su forma usual en español, con la preposición locativa normal «en».
- source_word: גְּדֹלָיו
  english_pob_choice: his great men
  chosen_spanish: sus grandes[a]
  alternatives_spanish:
  - sus nobles
  - sus principales
  lexicon: HALOT
  rationale: El hebreo habla literalmente de los «grandes» de alguien, es decir, figuras prominentes. Se mantiene esa fuerza semiliteral en español; la nota aclara la alternativa más idiomática «nobles».
- source_word: מְיֻדָּעָיו
  english_pob_choice: his close associates
  chosen_spanish: sus íntimos[b]
  alternatives_spanish:
  - sus allegados
  - sus conocidos cercanos
  - sus asociados cercanos
  lexicon: HALOT
  rationale: El término deriva de ידע y designa a quienes eran conocidos de cerca, probablemente asociados próximos. «Íntimos» conserva la cercanía relacional y política sin convertirse en una paráfrasis excesiva.
- source_word: כֹהֲנָיו
  english_pob_choice: his priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes oficiales
  - sus ministros sacerdotales
  lexicon: HALOT
  rationale: El sentido directo del plural es «sacerdotes»; no hay motivo para restringirlo más en el texto principal.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ שָׂרִיד
  english_pob_choice: until he left him no survivor
  chosen_spanish: hasta no dejarle ningún sobreviviente[c]
  alternatives_spanish:
  - hasta no dejarle ninguno
  - hasta no dejar sobreviviente alguno a él
  lexicon: HALOT
  rationale: La frase idiomática expresa exterminio total. «No dejarle ningún sobreviviente» es español natural y mantiene la relación pronominal del hebreo, aunque de forma menos pesada que una construcción literal.
theological_decisions:
- issue: Referent del pronombre final לוֹ
  english_pob_reading: Rendered literally as 'him,' referring to Ahab/the house of Ahab
  chosen_spanish_reading: Se conserva el vínculo pronominal en «no dejarle» sin explicitar el referente en el texto principal.
  alternative_spanish_readings:
  - «no dejar a la casa de Acab ningún sobreviviente»
  - «no dejar a Acab ningún sobreviviente»
  rationale: El hebreo usa un sufijo singular comprimido que puede referirse a Acab o a su casa. El español principal mantiene la ambigüedad controlada mediante el dativo «le», sin resolverla de manera interpretativa.
  doctrine_reference: No doctrinal; decisión de referencia y estilo hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el resultado revisado del texto inglés auditado, sin cambios sustanciales en el sentido: conserva la violencia verbal de וַיַּךְ, la idea de remanente para הַנִּשְׁאָרִים, y la ambigüedad del pronombre final לוֹ. Se ajustó el español para hacerlo publicable y natural, manteniendo la trazabilidad lexicográfica.'
  spanish_consistency_notes:
  - Se usa «Acab» como forma española estándar del nombre propio.
  - Se preserva «casa de Acab» como fórmula dinástica.
  - Se mantiene «Jezreel» para el topónimo, coherente con el uso bíblico en español.
  - Se evita «Señor» o sustitutos no presentes en el hebreo; no hay teónimos en este versículo.
  - «Íntimos» funciona aquí como equivalente de proximidad relacional; si se desea un registro más histórico, puede leerse como «allegados» en nota.
