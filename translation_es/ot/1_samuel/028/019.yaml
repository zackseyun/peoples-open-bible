    issue: Las notas al pie están ancladas a las frases equivocadas.
    rationale: La nota [a] explica ‘conmigo’/Seol, no ‘los filisteos’; la nota [b] explica ‘campamento’/‘ejército’, no ‘conmigo’. Esto distorsiona la relación entre texto y nota.
  - severity: medium
    issue: ‘En mano de los filisteos’ es poco natural en español.
    rationale: Aunque busca conservar el singular hebreo ‘hand’, en español la locución establecida y clara es ‘en manos de’. Preserva la imagen bíblica sin sonar torpe.
  - severity: low
    issue: ‘Hijos’ para וּבָנֶיךָ es aceptable pero menos específico que ‘hijos varones’ o ‘hijos/sons’.
