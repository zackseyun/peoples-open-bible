translation:
  language: es
  text: Porque para el día de la calamidad el malvado queda reservado[a]; para el día de la ira serán llevados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es apartado», «es retenido» o «es preservado». El verbo hebreo puede expresar ser reservado para un momento futuro.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán sacados» o «serán conducidos». El verbo final puede entenderse como ser llevados o presentados a ese día.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. 'Porque' conserva la relación argumentativa de manera natural en español.
- source_word: לְיוֹם אֵיד
  english_pob_choice: for the day of disaster
  chosen_spanish: para el día de la calamidad
  alternatives_spanish:
  - para el día del desastre
  - hasta el día de la ruina
  lexicon: HALOT
  rationale: La preposición con יום señala referencia temporal futura. 'Calamidad' mantiene el sentido de אֵיד sin endurecerlo innecesariamente; 'para el día de la calamidad' conserva la orientación al momento señalado.
- source_word: יֵחָשֶׂךְ
  english_pob_choice: is spared
  chosen_spanish: es reservado
  alternatives_spanish:
  - es apartado
  - es retenido
  - es preservado
  lexicon: HALOT
  rationale: El nifal de חשׂך puede expresar ser apartado, retenido o reservado. 'Es reservado' conserva la idea de quedar apartado para un momento futuro y deja visible la tensión entre 'perdonado' y 'retenido' que el inglés POB también mantiene con sus notas.
- source_word: רָע
  english_pob_choice: the evil man
  chosen_spanish: el malvado
  alternatives_spanish:
  - el hombre malvado
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente para una persona moralmente mala. 'El malvado' es natural en español y preserva el valor sustantivado del hebreo.
- source_word: לְיוֹם עֲבָרוֹת
  english_pob_choice: for the day of wrath
  chosen_spanish: para el día de la ira
  alternatives_spanish:
  - para el día de las iras
  - para el día de los arrebatos de ira
  - para el día del furor
  lexicon: HALOT
  rationale: עֲבָרוֹת puede expresar arrebatos, irrupciones o ira intensificada. El plural hebreo tiene fuerza intensiva; en español, 'ira' transmite el sentido judicial y mantiene fluidez. La alternativa plural se deja abierta en la nota.
- source_word: יוּבָלוּ
  english_pob_choice: they are led away
  chosen_spanish: serán llevados
  alternatives_spanish:
  - son llevados
  - serán conducidos
  - serán traídos
  lexicon: HALOT
  rationale: El hophil de יבל significa ser llevado, conducido o traído. Se traduce en plural para conservar el cambio de número del hebreo respecto al singular anterior, sin fijar más de lo que exige el texto.
theological_decisions:
- issue: Sentido de la reserva del malvado para el juicio futuro
  english_pob_reading: The verse states that the wicked are spared from immediate disaster and reserved for a future day of wrath.
  chosen_spanish_reading: El versículo afirma que el malvado no recibe el desastre de inmediato, sino que queda reservado para un día futuro de ira.
  alternative_spanish_readings:
  - El malvado es apartado para no experimentar el desastre
  - El malvado es llevado directamente al día de la ira
  rationale: Las dos frases temporales con לְיוֹם y la combinación verbal de 'reservado' y 'serán llevados' favorecen la idea de aplazamiento o reserva para juicio posterior. La formulación española conserva esa tensión sin resolverla de forma interpretativa excesiva.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Plural final y posible referencia colectiva
  english_pob_reading: The final verb may be understood as being led or brought to that day.
  chosen_spanish_reading: El verbo final se expresa en plural como en el hebreo, permitiendo una referencia colectiva a los malvados o a ese tipo de persona.
  alternative_spanish_readings:
  - se refiere a un grupo de malvados
  - puede entenderse de manera genérica
  rationale: El hebreo pasa del singular al plural; mantener el plural en español conserva la señal textual y evita homogeneizar el sujeto. Esto también deja abierta la lectura colectiva que el inglés POB preserva con su nota.
  doctrine_reference: Tratamiento formal de concordancia y fuerza colectiva del singular sustantivado
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustantivos. La presente redacción sigue la lectura del POB inglés y conserva la tensión léxica entre ser 'reservado' y ser 'llevado' para un día futuro de juicio.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Malvado'' traduce el sustantivo adjetival hebreo de forma natural y conserva el tono moral del pasaje.'
  - Se mantiene el paralelismo temporal con 'para el día...' en ambas mitades del verso.
  - Se conserva el plural final 'serán llevados' para reflejar el cambio de número del hebreo.
