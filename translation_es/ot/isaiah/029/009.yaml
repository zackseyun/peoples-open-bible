translation:
  language: es
  text: Queden atónitos y queden asombrados[a]; cieguense[b] y queden ciegos. Están ebrios, pero no de vino; tambalean, pero no de bebida embriagante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tarden y queden maravillados». El primer par de imperativos también puede comunicar vacilación perpleja además de estupor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Sean cegados y cieguense». Los verbos hebreos de esta pareja son raros y difíciles; transmiten aturdimiento o ceguera.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְמַהְמְהוּ
  english_pob_choice: Be stunned
  chosen_spanish: Queden atónitos
  alternatives_spanish:
  - Tárdense en el estupor
  - Queden pasmados
  lexicon: HALOT
  rationale: El hebreo puede expresar hesitación perpleja o estupor. En español, 'queden atónitos' conserva la idea de quedar sobrecogidos y paralizados sin reducirla solo a demora temporal.
- source_word: וּתְמָהוּ
  english_pob_choice: and be astonished
  chosen_spanish: y asombrados
  alternatives_spanish:
  - y sean asombrados
  - y queden maravillados
  lexicon: HALOT
  rationale: El paralelo exige una segunda expresión de desconcierto intenso. 'Asombrados' mantiene el peso retórico y la coordinación con la primera forma verbal.
- source_word: הִשְׁתַּעַשְׁעוּ
  english_pob_choice: blind yourselves
  chosen_spanish: cieguense
  alternatives_spanish:
  - cegáos
  - queden cegados
  lexicon: HALOT
  rationale: La tradición POB entiende aquí una raíz rara en el campo semántico de ceguera/aturdimiento. En español, el imperativo reflexivo 'ciegense' comunica la fuerza del mandato y la ambigüedad entre causarse ceguera o quedar cegados.
- source_word: וָשֹׁעוּ
  english_pob_choice: and be blind
  chosen_spanish: y queden ciegos
  alternatives_spanish:
  - y sean ciegos
  - y estén ciegos
  lexicon: HALOT
  rationale: La segunda pareja refuerza la ceguera como estado resultante. 'Queden ciegos' conserva el paralelismo y la idea de devenir en esa condición.
- source_word: שָׁכְרוּ
  english_pob_choice: They are drunk
  chosen_spanish: Están ebrios
  alternatives_spanish:
  - Se embriagan
  - Están borrachos
  lexicon: HALOT
  rationale: El perfecto funciona descriptivamente. 'Están ebrios' es más digno y preciso que 'borrachos', y comunica el estado sin convertirlo en una acción puntual.
- source_word: וְלֹא יַיִן
  english_pob_choice: but not with wine
  chosen_spanish: pero no de vino
  alternatives_spanish:
  - pero no con vino
  - pero no por vino
  lexicon: HALOT
  rationale: La frase niega la causa literal del estado. 'No de vino' preserva la construcción causal implícita de manera natural en español.
- source_word: נָעוּ
  english_pob_choice: they stagger
  chosen_spanish: tambalean
  alternatives_spanish:
  - reelan
  - vacilan
  lexicon: HALOT
  rationale: '''Tambalean'' reproduce bien el movimiento inestable asociado al lenguaje de embriaguez y es idiomático en español actual.'
- source_word: וְלֹא שֵׁכָר
  english_pob_choice: but not from strong drink
  chosen_spanish: pero no de licor fuerte
  alternatives_spanish:
  - pero no de bebida fuerte
  - pero no de bebida embriagante
  lexicon: HALOT
  rationale: '''Licor fuerte'' mantiene la distinción lexical de שֵׁכָר frente a יַיִן y evita anacronismos innecesarios, con claridad para lectores contemporáneos.'
theological_decisions:
- issue: Ceguera/estupor como imagen profética
  english_pob_reading: Metaphorical spiritual stupor and blindness are expressed without making the metaphor more explicit than the Hebrew does.
  chosen_spanish_reading: Estupor y ceguera metafóricos se expresan sin convertirlos en una explicación doctrinal añadida dentro del versículo.
  alternative_spanish_readings:
  - endurecimiento judicial
  - ceguera espiritual explícita
  rationale: El hebreo presenta imágenes intensas de estupor, ceguera y embriaguez figurada. La versión española conserva esa imaginería sin sobreinterpretarla, dejando que el contexto profético determine su alcance teológico.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió de cerca el juicio léxico del POB en inglés, especialmente la lectura de los verbos raros como expresiones de estupor/ceguera y la metáfora de embriaguez no literal. No hubo revisiones aplicadas en el audit trail más reciente; la redacción española mantiene esa decisión y la hace natural en español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo 'ebrios' / 'vino' / 'licor fuerte' para conservar la distinción hebrea entre יַיִן y שֵׁכָר.
  - Se preservó la tensión lexical de los imperativos raros mediante un par reflexivo y un par de estado resultante.
  - La puntuación y el ritmo intentan reflejar el paralelismo poético del hebreo sin añadir paráfrasis doctrinal.
