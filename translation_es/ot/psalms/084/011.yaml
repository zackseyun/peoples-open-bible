  - severity: low
    issue: «Estar a la entrada» es menos preciso que «estar en el umbral»
    rationale: El POB inglés eligió «stand at the threshold» para evitar el oficio de portero y mantener la imagen humilde y concreta del umbral. «Umbral» refleja mejor esa decisión léxica que la formulación más amplia «entrada».
  - severity: low
