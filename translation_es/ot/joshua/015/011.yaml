translation:
  language: es
  text: Y el límite salió hacia el hombro de Ecrón hacia el norte[a], y el límite se desvió hacia Shiquerón[b], y pasó sobre el monte Baalá, y salió a Jabneel; y los extremos del límite estaban junto al mar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el lado norte de Ecrón»; el hebreo une «hombro de Ecrón» con una forma direccional.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se volvió hacia Shiquerón»; el verbo describe el cambio de dirección de la línea fronteriza.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «las salidas del límite estaban hacia el mar / junto al mar»; probablemente indica que el límite terminaba en el Mediterráneo al oeste.'
    reason: source_note
lexical_decisions:
- source_word: וְיָצָא / יָצָא
  english_pob_choice: went out
  chosen_spanish: se extendió / salió
  alternatives_spanish:
  - fue
  - avanzó
  lexicon: HALOT
  rationale: En descripciones de fronteras, el hebreo usa יָצָא para señalar que la línea llega o avanza hasta el siguiente punto. En español, alterno 'se extendió' al inicio para evitar monotonía y 'salió' al final para mantener el patrón direccional sin perder naturalidad.
- source_word: הַגְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - confín
  lexicon: HALOT
  rationale: '''Límite'' es claro y natural en español para una demarcación territorial. Conserva el valor geográfico de ''border'' sin sonar demasiado moderno o técnico como ''frontera''.'
- source_word: כֶּתֶף
  english_pob_choice: shoulder
  chosen_spanish: hombro
  alternatives_spanish:
  - lado
  - ladera
  - flanco
  lexicon: HALOT
  rationale: El hebreo conserva una imagen corporal concreta. 'Hombro' reproduce esa metáfora topográfica con fidelidad; 'lado' suavizaría demasiado la imagen.
- source_word: עֶקְרוֹן צָפוֹנָה
  english_pob_choice: Ekron northward
  chosen_spanish: Ecrón hacia el norte
  alternatives_spanish:
  - el lado norte de Ecrón
  - al norte de Ecrón
  lexicon: HALOT
  rationale: La forma direccional hebrea indica orientación hacia el norte. 'Hacia el norte' conserva la direccionalidad sin forzar una explicación más larga; en nota se preserva la alternativa de lado norte.
- source_word: תָּאַר
  english_pob_choice: bent toward
  chosen_spanish: se desvió hacia
  alternatives_spanish:
  - giró hacia
  - se volvió hacia
  - se trazó hacia
  lexicon: HALOT
  rationale: En fórmulas de frontera, el verbo expresa un cambio de dirección de la línea. 'Se desvió hacia' comunica ese giro topográfico con claridad y sin introducir una interpretación excesiva.
- source_word: שִׁכְּרוֹנָה
  english_pob_choice: Shikkeron
  chosen_spanish: Sicerón
  alternatives_spanish:
  - Shikkerón
  - Sicrón
  lexicon: HALOT
  rationale: Como topónimo, se translitera. 'Sicerón' mantiene una forma española legible y cercana a la transliteración consonántica, evitando una latinización innecesaria.
- source_word: וְעָבַר
  english_pob_choice: passed over
  chosen_spanish: pasó sobre
  alternatives_spanish:
  - cruzó
  - atravesó
  lexicon: HALOT
  rationale: '''Pasó sobre'' refleja el movimiento de la línea fronteriza sobre una elevación y sigue de cerca el valor espacial del verbo.'
- source_word: הַר הַבַּעֲלָה
  english_pob_choice: Mount Baalah
  chosen_spanish: el monte Baalá
  alternatives_spanish:
  - el monte de Baalá
  - el monte Baala
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio. 'Monte' reproduce el valor topográfico de הַר y 'Baalá' da una forma española clara para el nombre.
- source_word: יַבְנְאֵל
  english_pob_choice: Jabneel
  chosen_spanish: Jabneel
  alternatives_spanish:
  - Yabneel
  lexicon: HALOT
  rationale: Nombre propio transliterado; se mantiene la forma bíblica estándar en español cuando es reconocible y legible.
- source_word: תֹּצְאוֹת
  english_pob_choice: ends
  chosen_spanish: extremos
  alternatives_spanish:
  - salidas
  - terminaciones
  - confines
  lexicon: HALOT
  rationale: El plural señala los puntos terminales del límite. 'Extremos' preserva esa idea geográfica sin usar un arcaísmo.
- source_word: יָמָּה
  english_pob_choice: at the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - hacia el mar
  - al mar
  - mar adentro
  lexicon: HALOT
  rationale: Aunque la forma puede tener sentido direccional, aquí la referencia territorial termina en el mar. 'Junto al mar' expresa bien el punto final del límite en español natural.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audit trail inglés: se mantuvo la estructura de fórmula de frontera, la orientación direccional y la transliteración de los topónimos, con ajustes mínimos para que el español suene natural y publicable.'
  spanish_consistency_notes:
  - Se prefirió 'límite' a 'frontera' para mantener uniformidad en pasajes de demarcación territorial.
  - Se conservaron nombres propios en transliteración española reconocible, sin sustituirlos por equivalentes interpretativos.
  - Se mantuvo la ambigüedad de תֹּצְאוֹת en una nota, como en el inglés POB, para no perder la posible idea de terminación occidental hacia el mar.
