  yaml_path: translation/ot/genesis/028/013.yaml
  text: And behold[a], Yahweh was standing above it, and he said, “I am Yahweh, the God of Abraham your father and the God of Isaac[b]. The land on which you are lying I will give to you and to your offspring.”
