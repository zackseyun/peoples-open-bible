translation:
  language: es
  text: En cuanto a la plata que tu hermano Jonatán debía al tesoro real por las necesidades que tenía[a], lo hemos hecho responsable de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por los asuntos u obligaciones que tenía». El griego puede referirse más ampliamente a necesidades, asuntos, obligaciones o funciones; aquí se conserva «necesidades» por seguir más de cerca el texto base.'
    reason: lexical_alternative
  - marker: b
    text: 'El verbo griego literalmente puede significar «sujetar», «retener» o «restringir». Aquí se entiende en relación con la deuda: Jonatán sigue obligado por ella, no liberado de ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ
  english_pob_choice: As for
  chosen_spanish: En cuanto a
  alternatives_spanish:
  - Respecto de
  - Acerca de
  lexicon: LSJ
  rationale: Marca el cambio de tema de manera natural en español sin perder el sentido introductorio del griego.
- source_word: ἀργυρίου
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata en dinero
  lexicon: LSJ
  rationale: ἀργύριον puede referirse a plata o dinero; aquí se conserva 'plata' para mantener la cercanía al término griego y el contexto financiero.
- source_word: ὤφειλεν
  english_pob_choice: owed
  chosen_spanish: debía
  alternatives_spanish:
  - estaba en deuda con
  - adeudaba
  lexicon: LSJ
  rationale: Expresa obligación financiera de forma natural en español y conserva la noción de deuda.
- source_word: εἰς τὸ βασιλικόν
  english_pob_choice: to the royal treasury
  chosen_spanish: al tesoro real
  alternatives_spanish:
  - al tesoro del rey
  - a la administración real
  lexicon: LSJ
  rationale: El griego indica una pertenencia o destino para el ámbito real; 'tesoro real' comunica adecuadamente la esfera fiscal sin añadir más de lo necesario.
- source_word: διʼ ἃς εἶχεν χρείας
  english_pob_choice: because of the needs he had
  chosen_spanish: por las necesidades que tenía
  alternatives_spanish:
  - por las obligaciones que tenía
  - por los asuntos que tenía
  lexicon: LSJ
  rationale: χρεία abarca necesidad, necesidad práctica o requerimiento; en este contexto la versión POB inglesa decidió por 'needs', y el español sigue esa lectura sin forzar una interpretación más técnica.
- source_word: συνέχομεν
  english_pob_choice: we have held him liable for it
  chosen_spanish: lo hemos retenido
  alternatives_spanish:
  - lo hemos hecho responsable de ello
  - lo hemos mantenido sujeto a ello
  lexicon: LSJ
  rationale: Conservar una forma más cercana a 'constrain/hold' evita suavizar indebidamente el verbo. Dado el contexto de deuda real, 'retener' deja abierta la posibilidad de que siga sujeto a la obligación.
theological_decisions:
- issue: Tratamiento de la deuda real y del verbo συνέχομεν
  english_pob_reading: we have held him liable for it
  chosen_spanish_reading: lo hemos retenido
  alternative_spanish_readings:
  - lo hemos hecho responsable de ello
  - lo hemos liberado de ello
  rationale: El contexto inmediato no describe liberación sino una retención o sujeción ligada a una deuda. La traducción española evita resolver demasiado el matiz, pero mantiene la tensión semántica del verbo griego y del intercambio diplomático.
  doctrine_reference: No doctrinal issue; lexical/contextual decision.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió una lectura anterior de 'oficios que tenía' a 'necesidades que tenía' para reflejar χρείας, y también corrigió la idea de liberación por una de sujeción/retención. La versión española sigue esa revisión y evita introducir una remisión de la deuda que el griego no exige.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica en este versículo.
  - '''plata'' conserva la imagen monetaria del griego y evita reducirlo a ''dinero'' sin necesidad.'
  - '''tesoro real'' se usa como equivalente natural de la esfera βασιλικόν.'
  - No se usa 'siervo' ni vocabulario eclesiástico ajeno al texto.
  - Se prefirió 'retenido' para no resolver de forma indebida el alcance de συνέχομεν.
