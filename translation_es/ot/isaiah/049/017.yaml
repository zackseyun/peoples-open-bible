translation:
  language: es
  text: Tus hijos se apresuran a volver[a]; los que te derribaron y te devastaron saldrán de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tus constructores se apresuran». Algunos testigos antiguos reflejan «constructores» en lugar de «hijos».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִהֲרוּ
  english_pob_choice: hurry back
  chosen_spanish: se apresuran a volver
  alternatives_spanish:
  - se apresuran
  - vuelven apresuradamente
  - se dan prisa en regresar
  lexicon: HALOT
  rationale: El verbo מהר expresa apresurarse. En contexto, ligado a «tus hijos» y en contraste con la salida de los destructores, el sentido no es solo rapidez abstracta sino un regreso/restauración. «Se apresuran a volver» conserva ese movimiento de retorno sin añadir más de lo que el hebreo sugiere.
- source_word: בָּנָיִךְ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos y descendientes
  - tus niños
  - tus constructores
  lexicon: HALOT
  rationale: La consonancia masorética apunta a בן con sufijo de 2ª fem. sing., es decir, «tus hijos». En español, «hijos» mantiene mejor la referencia directa y la personificación de Sion que una paráfrasis más amplia. Se conserva la alternativa de «constructores» solo como variante textual, no como lectura principal.
- source_word: מְהָרְסַיִךְ
  english_pob_choice: those who tore you down
  chosen_spanish: los que te derribaron
  alternatives_spanish:
  - los que te demolieron
  - tus derribadores
  - los que te destruyeron
  lexicon: HALOT
  rationale: El participio de הרס denota derribar o demoler. «Los que te derribaron» reproduce la imagen de ruina edilicia que encaja con Sion/Jerusalén personificada, y mantiene el valor participial en forma relativa.
- source_word: וּמַחֲרִבַיִךְ
  english_pob_choice: and devastated you
  chosen_spanish: y te devastaron
  alternatives_spanish:
  - y te arrasaron
  - y te dejaron en ruinas
  - y te desolaron
  lexicon: HALOT
  rationale: 'חרב en este contexto tiene fuerza destructiva: volver desolado, arruinar. «Devastaron» comunica bien esa intensificación del daño en español moderno, sin perder la severidad del término hebreo.'
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de en medio de ti
  - desde ti
  - fuera de ti
  lexicon: HALOT
  rationale: La preposición separativa con sufijo femenino singular se vierte naturalmente como «de ti». Esta opción es breve y directa, y conserva la relación de salida respecto de Sion.
- source_word: יֵצֵאוּ
  english_pob_choice: will depart
  chosen_spanish: saldrán
  alternatives_spanish:
  - se irán
  - partirán
  - saldrán de ti
  lexicon: HALOT
  rationale: יצא significa salir, irse, partir. Aquí la idea de expulsión o alejamiento de los destructores se expresa de forma clara con «saldrán», que preserva el verbo de salida y armoniza con el hebreo.
theological_decisions:
- issue: 'Variante de lectura en בָּנָיִךְ: hijos o constructores'
  english_pob_reading: your children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus constructores
  - tus edificadores
  rationale: 'El texto consonántico recibido apoya «hijos». Aunque algunos testigos antiguos reflejan «constructores», la lectura principal conserva la forma masorética y el tema de restauración: los hijos de Sion regresan mientras sus destructores se van. La alternativa queda reconocida sin alterar el texto base.'
  doctrine_reference: Filología textual; filosofía de traducción del POB §1 y §3
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético y el criterio ya auditado en el POB inglés: mantener «hijos» en el cuerpo del texto y señalar en nota la variante antigua «constructores». No hubo revisiones aplicadas en el registro inglés más reciente, por lo que la versión española se alinea con ese estado estable.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Hijos» se usa en sentido de descendencia/integrantes de Sion personificada, no como masculinización exclusiva.
  - «Devastaron» y «derribaron» preservan el paralelismo intensivo de los dos participios hebreos.
  - La nota al pie marca explícitamente la variante textual sin desplazar la lectura principal del texto masorético.
