revisions:
- from: El camino de los malvados es como oscuridad profunda[a]; no saben sobre qué tropiezan[b].
  to: El camino de los malvados es como tinieblas densas[a]; no saben en qué tropiezan[b].
  rationale: Se ajusta el texto para mejorar la naturalidad y dignidad del español sin apartarse del hebreo ni del rastro de auditoría inglés. «Tinieblas densas» comunica mejor la fuerza de אֲפֵלָה, y «en qué tropiezan» expresa de manera idiomática la idea de בַּמֶּה, dejando las alternativas más literales o causales en nota.
