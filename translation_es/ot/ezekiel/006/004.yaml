translation:
  language: es
  text: Y serán asolados vuestros altares, y serán quebrados vuestros altares de incienso[b]; y haré caer vuestros caídos delante de vuestros ídolos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término fuertemente despectivo para los ídolos; también puede entenderse como «ídolos inmundos» o incluso «ídolos de estiércol».
    reason: lexical_alternative
  - marker: b
    text: O «vuestras columnas solares»; el término hebreo חַמָּנִים se refiere a objetos cultuales asociados con la adoración ilícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשַׁמּוּ / נָשַׁם
  english_pob_choice: will be desolated
  chosen_spanish: serán asolados
  alternatives_spanish:
  - quedarán desolados
  - serán devastados
  lexicon: HALOT
  rationale: El nifal expresa un estado resultante de ruina o desolación. «Serán asolados» conserva el tono de juicio y la pasividad/resultatividad sin sonar demasiado técnico en español.
- source_word: מִזְבְּחוֹתֵיכֶם
  english_pob_choice: your altars
  chosen_spanish: vuestros altares
  alternatives_spanish:
  - sus altares
  - vuestros lugares de sacrificio
  lexicon: HALOT
  rationale: La forma hebrea es el plural posesivo estándar de «altar». No hay razón contextual para restringirlo; se mantiene el término general y directo.
- source_word: וְנִשְׁבְּרוּ / שׁבר
  english_pob_choice: will be broken
  chosen_spanish: serán quebrados
  alternatives_spanish:
  - serán rotos
  - serán destruidos
  - serán partidos
  lexicon: HALOT
  rationale: El pasivo de שׁבר pide una idea de fractura o rompimiento. «Quebrados» es natural en español bíblico y conserva mejor la imagen que «destruidos», que sería más amplio.
- source_word: חַמָּנֵיכֶם
  english_pob_choice: your incense altars
  chosen_spanish: vuestros altares de incienso
  alternatives_spanish:
  - vuestras columnas solares
  - vuestros incensarios
  - vuestros altares solares
  lexicon: HALOT
  rationale: Sigo la decisión auditada de entender חַמָּנִים como objetos cultuales ligados al culto ilícito, con posible relación solar o de incienso. «Altares de incienso» es claro para el lector español y mantiene el carácter de instalación cúltica; se preserva la alternativa más literal en la nota.
- source_word: וְהִפַּלְתִּי
  english_pob_choice: I will cast down
  chosen_spanish: haré caer
  alternatives_spanish:
  - arrojaré
  - derribaré
  - tumbaré
  lexicon: HALOT
  rationale: 'El hiphil de נפל es causativo: «hacer caer». «Haré caer» refleja con precisión la causalidad divina y evita añadir una imagen más fuerte de la que el verbo exige.'
- source_word: חַלְלֵיכֶם
  english_pob_choice: your slain
  chosen_spanish: vuestros muertos
  alternatives_spanish:
  - vuestros caídos
  - vuestros degollados
  - vuestros cadáveres
  lexicon: HALOT
  rationale: חָלָל refiere a los caídos en combate o por violencia. «Muertos» es comprensible y natural en español; «caídos» podría sonar demasiado genérico y «cadáveres» desplaza el énfasis hacia el cuerpo más que hacia la condición de víctima.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la imagen espacial concreta y funciona bien con el verbo «hacer caer».
- source_word: גִּלּוּלֵיכֶם
  english_pob_choice: your idols
  chosen_spanish: vuestros ídolos
  alternatives_spanish:
  - vuestras asquerosas imágenes
  - vuestros ídolos inmundos
  - vuestros ídolos de estiércol
  lexicon: HALOT
  rationale: El término es deliberadamente despreciativo en hebreo. En el texto principal, «ídolos» es la forma más clara y publicable; la dureza semántica se preserva en nota para no perder la tensión lexical.
theological_decisions:
- issue: Tono despectivo de גִּלּוּלִים aplicado a los ídolos
  english_pob_reading: Render גִּלּוּלִים as 'idols' in the main text, with a footnote preserving the contemptuous nuance.
  chosen_spanish_reading: Traducir «ídolos» en el texto principal, con nota que explicita la carga peyorativa del hebreo.
  alternative_spanish_readings:
  - ídolos inmundos
  - ídolos asquerosos
  - ídolos de estiércol
  rationale: El pasaje es un oráculo de juicio contra la idolatría. En español, el registro más sobrio y publicable es «ídolos», pero la nota evita suavizar la intención insultante del hebreo.
  doctrine_reference: PoB Translation Philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la voz pasiva/resultativa de ‘will be desolated’ y ‘will be broken’, conserva la referencia cultual específica de חַמָּנִים con una opción alternativa en nota, y preserva la dureza despectiva de גִּלּוּלִים sin trasladar al texto principal una paráfrasis más fuerte que el español estándar no sostendría con naturalidad. No se detectan revisiones posteriores que alteren la solución auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton esté explícito; este verso no lo contiene.
  - «Ídolos» mantiene el término general, mientras la nota conserva la carga peyorativa documentada.
  - Se prefieren formas verbales naturales en español («serán asolados», «serán quebrados», «haré caer») que retienen la fuerza del hebreo sin calco rígido.
  - «Altares de incienso» sigue la decisión auditada del inglés para חַמָּנִים, con nota de alternativa literal.
  - La puntuación coordina las cláusulas con el ritmo del hebreo y con la publicación bíblica en español.
