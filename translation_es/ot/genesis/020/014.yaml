translation:
  language: es
  text: Entonces Abimelec tomó ovejas y ganado[a], y esclavos[b] y esclavas, y se los dio a Abraham; y le devolvió a Sara, su esposa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'rebaños' o, de manera más amplia, 'ganado menor'; צֹאן es un término colectivo para ganado pequeño.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'esclavos varones y esclavas'. Algunas traducciones prefieren 'siervos', pero el contexto de entrega junto con bienes sugiere la fuerza de 'esclavos'.
    reason: lexical_alternative
  - marker: c
    text: O 'y le restituyó a Sara, su esposa'. El hebreo puede entenderse como devolución o restauración de Sara a Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - llevó
  lexicon: HALOT
  rationale: El hebreo וַיִּקַּח expresa la acción narrativa simple de 'tomar'. 'Tomó' conserva la secuencia directa sin añadir matices inexistentes.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaños
  - ganado menor
  lexicon: HALOT
  rationale: צֹאן puede abarcar de forma colectiva ganado menor. En español, 'ovejas' es breve y natural en una lista con 'ganado'; 'rebaños' sería más general pero menos concreto.
- source_word: בָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - bovinos
  - reses
  lexicon: HALOT
  rationale: בָקָר designa ganado vacuno o bovino. 'Ganado' funciona bien en español junto con 'ovejas' y mantiene el sentido colectivo.
- source_word: עֲבָדִים
  english_pob_choice: male slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: El contexto de entrega junto con animales y otras personas favorece la noción de propiedad/bondaje. Se usa 'esclavos' para preservar la fuerza lexical del hebreo y evitar suavizarla.
- source_word: שְׁפָחוֹת
  english_pob_choice: female slaves
  chosen_spanish: esclavas
  alternatives_spanish:
  - siervas
  - criada
  lexicon: HALOT
  rationale: El paralelismo con עֲבָדִים pide una pareja de género. 'Esclavas' mantiene la distinción sexual y la misma fuerza semántica que 'esclavos'.
- source_word: וַיִּתֵּן
  english_pob_choice: gave them
  chosen_spanish: se los dio
  alternatives_spanish:
  - los dio
  - se los entregó
  lexicon: HALOT
  rationale: El hebreo simplemente dice 'dio'. En español, 'se los dio' expresa con claridad el objeto múltiple sin perder naturalidad.
- source_word: וַיָּשֶׁב
  english_pob_choice: returned
  chosen_spanish: le devolvió
  alternatives_spanish:
  - lo restituyó
  - lo regresó
  lexicon: HALOT
  rationale: La forma causativa de שוב implica 'hacer volver' o 'devolver/restaurar'. 'Le devolvió' es idiomático en español y refleja la acción sobre Sara como algo restaurado a Abraham.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa, que era su mujer
  lexicon: HALOT
  rationale: '''Esposa'' es más formal y directo que ''mujer'' en este registro. El posesivo queda claro por el contexto y por el dativo ''le'' anterior.'
theological_decisions:
- issue: ¿Mantener o suavizar la idea de esclavitud en עבדים ושפחות?
  english_pob_reading: The context of transfer as property favors 'slaves.'
  chosen_spanish_reading: El contexto de entrega como parte de un obsequio refuerza 'esclavos/esclavas' sin atenuación.
  alternative_spanish_readings:
  - siervos y siervas
  - criados y criadas
  rationale: La etiqueta social de servidumbre no captura bien el valor de intercambio de propiedad que el texto subraya. Para no borrar esa tensión, se conserva 'esclavos/esclavas'.
  doctrine_reference: DOCTRINE.md lexical policy on δοῦλος / slavery terminology
- issue: ¿Traducir וַיָּשֶׁב como 'devolvió' o 'restauró'?
  english_pob_reading: Or 'restored Sarah, his wife, to him.'
  chosen_spanish_reading: '''Le devolvió a Sara su esposa'' mantiene la lectura principal, con la idea de restitución implícita.'
  alternative_spanish_readings:
  - le restituyó a Sara, su esposa
  - restauró a Sara, su esposa, para él
  rationale: '''Devolver'' expresa bien el movimiento relacional y jurídico del verbo hebreo. ''Restauró'' sería posible, pero en español puede sonar más interpretativo; por eso se deja como alternativa implícita sin sobrecargar el verso.'
  doctrine_reference: HALOT on שוב in Hiphil
- issue: ¿Nombrar a Yahvé en un versículo sin el tetragrámaton?
  english_pob_reading: No explicit divine name in this verse.
  chosen_spanish_reading: No se introduce 'Yahvé' porque el hebreo del versículo no lo contiene.
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: Se evita añadir vocabulario teológico ausente del texto. El versículo se mantiene estrictamente narrativo.
  doctrine_reference: Project-level terminology defaults
translation_notes:
  revision_awareness: La historia de revisiones en inglés alternó entre 'servants' y 'slaves' para עבדים/שפחות; la corrección posterior restauró 'slaves' por fidelidad al valor lexical y al contexto de transferencia como propiedad. Esta versión española sigue esa decisión y conserva también la posibilidad de 'restauró/restituyó' para וַיָּשֶׁב sin imponerla en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'Abimelec' como forma castellana habitual del nombre propio.
  - Se usa 'Sara' en lugar de 'Sarah' para la forma española estándar del nombre.
  - 'Se conserva el paralelismo de dos parejas: ''ovejas y ganado'' / ''esclavos y esclavas''.'
  - El clítico 'se los dio' refleja con naturalidad el plural de los objetos entregados.
  - No se introduce puntuación arcaizante; el registro es bíblico moderno y publicable.
