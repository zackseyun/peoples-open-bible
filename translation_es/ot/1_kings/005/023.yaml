review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia general del hebreo: descenso de la madera desde el Líbano al mar, formación de balsas, traslado al lugar indicado, desarme allí, retiro por parte de Salomón, y compensación con alimento para la casa de Hiram. Sin embargo, hay dos puntos de alineación mejorables: «recogerás» debilita תִשָּׂא, que en contexto es más bien ‘llevar/cargar/transportar’, y «hasta el lugar» suena menos preciso que «al lugar» dado el ajuste ya documentado en la auditoría inglesa. También «sobre el mar» es comprensible, pero «por el mar» o «en el mar» suena más natural en español sin perder la imagen.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y precisión logística. «Los recogerás» suena demasiado débil o preliminar para la acción posterior al desarme de las balsas. «Al proveer alimento» es aceptable, aunque «dando alimento» fluye mejor en español bíblico moderno. El resto es legible y ampliamente eclesial.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «Mis siervos» es aceptable en este contexto administrativo. «Balsas» para דֹּבְרוֹת coincide bien con la decisión POB, con nota alternativa «balsas de troncos». La nota sobre «pan para mi casa» está bien preservada.
  issues:
  - severity: medium
    issue: «los recogerás» para תִשָּׂא
    rationale: נשא aquí sigue al desarme de las balsas y describe llevarse/cargar la madera, no simplemente recogerla. «Te los llevarás» o «los transportarás» preserva mejor la fuerza logística del hebreo y del POB inglés («carry them away»).
  - severity: low
    issue: «hasta el lugar» en vez de «al lugar»
    rationale: La auditoría inglesa ya ajustó «as far as» a «to the place» por naturalidad y precisión. En español, «al lugar que tú me indiques» refleja mejor un destino concreto que «hasta el lugar».
  - severity: low
    issue: «sobre el mar» suena algo calcado
    rationale: Aunque es defendible literalmente, en español la expresión más natural para transporte flotante es «por el mar» o «en el mar». «Por el mar» comunica bien el medio trayecto de las balsas.
  revised_spanish_text: Mis siervos los bajarán desde el Líbano hasta el mar[a], y yo los convertiré en balsas por el mar hasta el lugar que tú me indiques, y allí las desharé; y tú te los llevarás[b]. Y tú harás lo que yo deseo, dando alimento para mi casa.
  revised_footnotes:
