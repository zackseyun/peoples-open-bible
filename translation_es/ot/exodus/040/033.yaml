translation:
  language: es
  text: Entonces levantó el atrio alrededor del tabernáculo y del altar, y puso la cortina[a] de la entrada del atrio. Así Moisés terminó la obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse ‘pantalla’ o ‘colgadura’ para מָסַךְ, refiriéndose a la cobertura textil de la entrada del atrio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - erigió
  - armó
  - instaló
  lexicon: HALOT
  rationale: En este contexto de construcción del santuario, קום en causativo expresa poner en pie o levantar una estructura. ‘Levantó’ conserva esa imagen y funciona con naturalidad en español sin perder el sentido técnico de instalación.
- source_word: הֶחָצֵר
  english_pob_choice: the courtyard
  chosen_spanish: el atrio
  alternatives_spanish:
  - el patio
  - el recinto
  lexicon: HALOT
  rationale: Para הֶחָצֵר, ‘atrio’ es el término bíblico y cultual más establecido en español para el recinto cercado del tabernáculo. ‘Patio’ sería más cotidiano, pero menos preciso en este contexto ritual.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: ‘Alrededor’ expresa de forma clara y idiomática la idea de circundar el tabernáculo y el altar.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del encuentro
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico del santuario portátil; ‘tabernáculo’ preserva ese valor cultual mejor que una traducción descriptiva más libre.
- source_word: וְלַמִּזְבֵּחַ
  english_pob_choice: and the altar
  chosen_spanish: y del altar
  alternatives_spanish:
  - y el altar
  lexicon: HALOT
  rationale: El hebreo coordina ‘tabernáculo’ y ‘altar’ como los dos referentes rodeados por el atrio. En español, ‘del altar’ mantiene la relación sintáctica fluida con ‘alrededor’.
- source_word: וַיִּתֵּן
  english_pob_choice: put up
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - instaló
  - puso en su lugar
  lexicon: HALOT
  rationale: Aunque literalmente es ‘dio/colocó’, aquí describe instalar una pieza textil de entrada. ‘Puso’ es breve y natural, y deja abierto que se trata de una colocación funcional.
- source_word: מָסַךְ
  english_pob_choice: the screen
  chosen_spanish: el velo
  alternatives_spanish:
  - la pantalla
  - la cortina
  - el paño
  lexicon: HALOT
  rationale: מָסַךְ puede referirse a un tejido de cobertura o separación. En español, ‘velo’ comunica bien una pieza textil de entrada, aunque se mantiene la nota para reconocer alternativas como ‘cortina’ o ‘paño’.
- source_word: שַׁעַר הֶחָצֵר
  english_pob_choice: the gate of the courtyard
  chosen_spanish: de la entrada del atrio
  alternatives_spanish:
  - de la puerta del atrio
  - de la puerta de entrada del atrio
  lexicon: HALOT
  rationale: La construcción apunta al acceso del atrio. ‘Entrada del atrio’ evita un ‘gate’ demasiado literal en español y refleja con claridad la función del lugar de paso cubierta por el tejido.
- source_word: וַיְכַל
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - completó
  - dio fin a
  lexicon: HALOT
  rationale: כלה marca la conclusión de la tarea. ‘Terminó’ es idiomático y conserva el cierre narrativo sin añadir énfasis innecesario.
- source_word: הַמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  - la tarea
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, מְלָאכָה no es solo trabajo general sino obra de construcción artesanal. ‘Obra’ comunica mejor ese carácter técnico y solemne que ‘trabajo’.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas; se preserva la secuencia narrativa y la terminología cultual principal, con ajuste español natural para ‘atrio’ y ‘velo’ en la pieza de entrada.
  spanish_consistency_notes:
  - Se mantiene ‘tabernáculo’ para מִשְׁכָּן, en línea con la terminología técnica del santuario.
  - Se usa ‘atrio’ como equivalente cultual de הֶחָצֵר, evitando ‘patio’ por menor precisión ritual.
  - La coordinación final ‘terminó la obra’ conserva el cierre completo del versículo sin expandir el sentido.
