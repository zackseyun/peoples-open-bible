review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite el sentido básico del hebreo: Moisés, como ''el hombre de Dios'', y la inclusión de sus hijos dentro de la tribu de Leví. Sin embargo, ''Y también Moisés'' sobreactúa la waw discursiva, y la nota b no preserva la alternativa inglesa real. Además, ''entre la tribu'' en la nota a es menos natural que ''en/entre los levitas'' o ''como parte de la tribu''.'
  spanish_quality_summary: La frase principal es comprensible y digna, pero 'Y también Moisés' suena algo forzado en español bíblico-natural. 'Y en cuanto a Moisés' o simplemente 'Y Moisés' representa mejor el cambio de tema. El resto es legible, aunque la puntuación mejora con una aposición más fluida. La nota b actual es redundante, porque repite exactamente el texto principal en vez de reflejar la alternativa documentada.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''Dios'', ''Leví'', y el título ''el hombre de Dios'' están bien. No hay conflicto con Yahvé/Mesías/etc. La decisión ''sus hijos'' es aceptable en español para בָּנָיו en este contexto. La principal corrección necesaria está en la naturalidad discursiva y en las notas, no en el glosario central.'
  issues:
  - severity: medium
    issue: '''Y también Moisés'' no refleja de la mejor manera la función discursiva de וּ/מֹשֶׁה.'
    rationale: La waw introduce un nuevo elemento/listado, pero 'también' añade un matiz aditivo más fuerte de lo necesario. 'Y en cuanto a Moisés' comunica mejor el cambio de foco y coincide con el audit trail inglés ('And as for Moses').
  - severity: medium
    issue: La nota b es incorrecta/redundante.
    rationale: La nota inglesa b documenta una alternativa para la construcción verbal/preposicional ('were called among'), no para 'the man of God'. La nota española actual repite exactamente 'el hombre de Dios', por lo que no aporta información y desaline­a el historial de auditoría.
  - severity: low
    issue: La nota a usa 'entre la tribu de Leví', expresión poco idiomática.
    rationale: En español suena más natural 'como parte de la tribu de Leví' o 'entre los levitas'. Esto preserva mejor la idea administrativa/genealógica de inclusión.
  revised_spanish_text: Y en cuanto a Moisés, el hombre de Dios, sus hijos fueron llamados[a] a la tribu de Leví[b].
  revised_footnotes:
  - marker: a
    text: 'O: «fueron contados como parte de la tribu de Leví». El verbo hebreo puede expresar ser designados o registrados dentro de un grupo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fueron llamados entre la tribu de Leví».'
    reason: previous_rendering
  revision_rationale: 'Se ajusta la apertura a un español más natural y más fiel a la función discursiva de la waw (''Y en cuanto a Moisés''). Se corrigen las notas para que reflejen el audit trail inglés real: una alternativa léxica de inclusión/registro y la formulación previa de la construcción verbal. No se altera el sentido principal del versículo.'
