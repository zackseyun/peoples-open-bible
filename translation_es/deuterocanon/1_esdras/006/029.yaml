translation:
  language: es
  text: Asimismo, trigo, sal, vino y aceite, continuamente, año tras año, según indiquen los sacerdotes que están en Jerusalén, han de consumirse día tras día, sin falta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἀναμφισβητήτως puede entenderse también como “sin disputa” o “sin objeción”; aquí se adopta “sin falta” por el sentido de cumplimiento seguro en el contexto administrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυρὸν
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: LSJ
  rationale: El griego πυρός suele designar trigo de manera concreta; 'trigo' conserva esa precisión mejor que un genérico como 'grano'.
- source_word: ἅλα
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal común
  lexicon: LSJ
  rationale: Es el equivalente directo y natural en español para el insumo cultual de la lista.
- source_word: οἶνον
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: LSJ
  rationale: '''Vino'' reproduce el valor normal del término en listas sacrificiales y administrativos bíblicos.'
- source_word: ἔλαιον
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: LSJ
  rationale: Aunque se trata de aceite de oliva, 'aceite' es la forma española natural y suficiente en este contexto de provisiones.
- source_word: ἐνδελεχῶς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - regularmente
  - sin interrupción
  lexicon: LSJ
  rationale: '''Continuamente'' comunica la provisión sostenida y encaja con el tono administrativo de la orden.'
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - anualmente
  - cada año
  lexicon: LSJ
  rationale: La expresión distributiva se conserva bien en español con 'año tras año', que mantiene la idea de repetición anual.
- source_word: ὑπαγορεύσωσιν
  english_pob_choice: may direct
  chosen_spanish: según indiquen
  alternatives_spanish:
  - según prescriban
  - según especifiquen
  lexicon: LSJ
  rationale: El verbo expresa instrucción/especificación por parte de los sacerdotes; 'según indiquen' suena natural y mantiene su función directiva.
- source_word: ἀναλίσκεσθαι
  english_pob_choice: are to be consumed
  chosen_spanish: han de consumirse
  alternatives_spanish:
  - han de gastarse
  - han de usarse
  lexicon: LSJ
  rationale: '''Consumirse'' conserva el matiz de ser empleadas/agotadas las provisiones en el uso previsto, con registro elevado acorde al texto.'
- source_word: καθʼ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - diariamente
  lexicon: LSJ
  rationale: La frase distributiva expresa mejor la continuidad cotidiana que un adverbio más compacto.
- source_word: ἀναμφισβητήτως
  english_pob_choice: without fail
  chosen_spanish: sin falta
  alternatives_spanish:
  - sin disputa
  - sin objeción
  lexicon: LSJ
  rationale: En este contexto administrativo la idea es cumplimiento seguro y sin omisión; 'sin falta' refleja bien esa fuerza, y evita cargar el adverbio con una disputa explícita que el contexto no exige.
translation_notes:
  revision_awareness: La redacción sigue el texto griego como ancla primaria y toma en cuenta la revisión inglesa que prefirió una fórmula más formal para ἀναλίσκεσθαι y leyó ἀναμφισβητήτως en clave de cumplimiento sin omisión. Se evita depender mecánicamente del inglés, conservando la lista concreta de provisiones y la relación directiva de los sacerdotes en Jerusalén.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el pasaje lo requiera; aquí no aparece el nombre divino.
  - Se usa 'trigo' en vez de 'grano' por precisión léxica del sustantivo griego.
  - '''Consumirse'' conserva el valor pasivo/medio de la provisión destinada al uso cultual o administrativo.'
  - La puntuación separa la lista de suministros de la cláusula de dirección sacerdotal para mayor claridad en español.
