  rationale: 'Standard idiom: ϣⲟⲟⲡ ‘be, happen’ + ⲛ̄ⲙⲙⲁⲉⲓ ‘with me’ = “are with me.”'
- source_word: ⲛⲓϩⲓⲟⲙⲉ
  chosen: the women
  alternatives:
