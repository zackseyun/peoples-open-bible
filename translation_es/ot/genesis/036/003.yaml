lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y [marcando además el objeto directo con una preposición explícita]
  lexicon: HALOT
  rationale: En esta lista genealógica, וְ añade otro elemento; אֵת funciona como marcador del objeto directo y no se traduce de forma visible. En español, 'y' conserva el valor aditivo de manera natural y fiel.
- source_word: בָּשְׂמַת
  english_pob_choice: Basemath
  chosen_spanish: Basemat
  alternatives_spanish:
  - Basemat
  - Basemath
  lexicon: HALOT
  rationale: Nombre propio transliterado. 'Basemat' sigue la adaptación española más directa y mantiene el vínculo con la forma hebrea; se conserva la identificación personal sin traducir el nombre.
- source_word: בַּת
  english_pob_choice: the daughter of
  chosen_spanish: la hija de
  alternatives_spanish:
  - hija de
  lexicon: HALOT
  rationale: La relación de constructo indica filiación. En español, 'la hija de' reproduce la función apposicional con claridad y naturalidad.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ismael
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma española ya asentada. 'Ismael' es la forma estándar y más inteligible para lectura eclesial en español.
- source_word: אֲח֥וֹת
  english_pob_choice: the sister of
  chosen_spanish: la hermana de
  alternatives_spanish:
  - hermana de
  lexicon: HALOT
  rationale: Como con 'la hija de', el constructo expresa parentesco. 'La hermana de' mantiene el paralelismo genealógico del hebreo y suena natural en español.
- source_word: נְבָיֽוֹת
  english_pob_choice: Nebaioth
  chosen_spanish: Nebaiot
  alternatives_spanish:
  - Nebaiot
  - Nebaioth
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se elige 'Nebaiot' como forma española transparente; la vocal final se adapta a la ortografía española sin alterar la identificación del personaje.
