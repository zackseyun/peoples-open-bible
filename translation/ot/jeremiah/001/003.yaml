id: JER.1.3
reference: Jeremiah 1:3
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/ימֵ֨י יְהוֹיָקִ֤ים בֶּן יֹאשִׁיָּ֨הוּ֙ מֶ֣לֶךְ יְהוּדָ֔ה עַד תֹּם֙ עַשְׁתֵּ֣י עֶשְׂרֵ֣ה שָׁנָ֔ה לְ/צִדְקִיָּ֥הוּ בֶן יֹאשִׁיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה עַד גְּל֥וֹת יְרוּשָׁלִַ֖ם בַּ/חֹ֥דֶשׁ הַ/חֲמִישִֽׁי־־־־׃ס
translation:
  text: And it continued in the days of Jehoiakim son of Josiah[a], king of Judah, until the completion of the eleventh year of Zedekiah son of Josiah, king of Judah[b], until the exile of Jerusalem in the fifth month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the end of the eleventh year of Zedekiah son of Josiah, king of Judah.'
    reason: lexical_alternative
  - marker: b
    text: That is, the deportation of Jerusalem's people when the city fell.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it continued
  alternatives:
  - And it was
  - And it happened
  lexicon: HALOT
  rationale: In context, this resumes the subject from v. 2 ('the word of the LORD came') and indicates continuation across a span of time rather than a mere existential 'was' or eventive 'happened.' 'Continued' best captures the discourse function in smooth English while remaining close to the Hebrew.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reign of
  lexicon: HALOT
  rationale: A standard temporal expression meaning 'in the days of.' 'During the reign of' is interpretive; the more literal phrase preserves the Hebrew idiom while remaining natural.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  lexicon: HALOT
  rationale: Straightforward filial designation; retained formally.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard royal title; direct rendering.
- source_word: עַד תֹּם
  chosen: until the completion of
  alternatives:
  - until the end of
  - until the full end of
  lexicon: HALOT
  rationale: The infinitive/nominal expression marks the reaching of a terminus. 'Completion' is slightly more precise to תֹּם than the more idiomatic 'end,' though both are viable. This keeps the temporal progression explicit.
- source_word: עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: the eleventh year
  alternatives:
  - eleven years
  lexicon: HALOT
  rationale: 'In regnal dating context, the singular ''year'' is idiomatic in English: ''the eleventh year.'' This reflects the Hebrew numeral construction without woodenly reproducing ''eleven year.'''
- source_word: לְצִדְקִיָּהוּ
  chosen: of Zedekiah
  alternatives:
  - belonging to Zedekiah
  lexicon: HALOT
  rationale: The prefixed ל marks the regnal reference ('of Zedekiah,' i.e., of his reign). English idiom requires 'of Zedekiah' in this dating formula.
- source_word: גְּלוֹת
  chosen: the exile
  alternatives:
  - the captivity
  - the carrying away
  lexicon: HALOT
  rationale: The infinitive construct of גלה here denotes the event of deportation/exile. 'Exile' is the clearest modern English rendering and fits Jeremiah's historical context.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English form of the place name.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  chosen: in the fifth month
  alternatives:
  - during the fifth month
  lexicon: HALOT
  rationale: Direct temporal phrase. 'In the fifth month' is natural and sufficiently formal.
