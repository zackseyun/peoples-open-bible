translation:
  language: es
  text: Y antes de morir[a], oyó hablar de la destrucción de Nínive, que Nabucodonosor y Asuero habían tomado cautiva; antes de morir, se alegró por Nínive. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «que Nabucodonosor y Asuero habían tomado cautiva». Se conserva la redacción del texto fuente, aunque los intérpretes discuten la identificación histórica de estos reyes en relación con la caída de Nínive.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: he heard of
  chosen_spanish: oyó
  alternatives_spanish:
  - oyó de
  - se enteró de
  lexicon: LSJ
  rationale: 'En español, «oyó» basta para reproducir el verbo griego sin añadir más interpretación de la necesaria. El contexto ya aporta el contenido de lo oído: la destrucción de Nínive.'
- source_word: πρὶν ἢ ἀποθανεῖν αὐτόν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  - antes de su muerte
  lexicon: LSJ
  rationale: La construcción temporal se expresa con naturalidad en español con «antes de morir», manteniendo el orden de los hechos y la sobriedad del griego.
- source_word: ἀπωλίαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - desolación
  - caída
  lexicon: LSJ
  rationale: Aquí el sustantivo se refiere al derribo o destrucción histórica de Nínive; «destrucción» es la opción más clara y directa en español.
- source_word: ᾐχμαλώτισεν
  english_pob_choice: had taken captive
  chosen_spanish: habían cautivado
  alternatives_spanish:
  - habían tomado cautiva
  - habían llevado cautiva
  - habían capturado
  lexicon: LSJ
  rationale: El verbo griego expresa tomar en cautiverio. En español, «cautivado» conserva mejor esa fuerza que un simple «capturado», y permite mantener el valor colectivo aplicado a Nínive por metonimia.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezar
  lexicon: Standard biblical transliteration
  rationale: Se usa la transliteración bíblica española más reconocible y estable, acorde con la práctica de nombres propios en castellano.
- source_word: Ἀσύηρος
  english_pob_choice: Ahasuerus
  chosen_spanish: Asuero
  alternatives_spanish:
  - Ahasuero
  lexicon: Standard biblical transliteration
  rationale: «Asuero» es la forma tradicional y comprensible en español bíblico para el nombre griego.
- source_word: ἐχάρη
  english_pob_choice: he rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de gozo
  lexicon: LSJ
  rationale: «Se alegró» reproduce bien el valor de júbilo del verbo y suena natural y digno en español moderno.
- source_word: ἐπὶ Νινευή
  english_pob_choice: over Nineveh
  chosen_spanish: por Nínive
  alternatives_spanish:
  - sobre Nínive
  - a causa de Nínive
  - por la caída de Nínive
  lexicon: LSJ
  rationale: La preposición griega con verbos de alegría puede indicar ocasión u objeto. En español, «por Nínive» conserva esa amplitud sin forzar una explicitación que el griego no da de modo cerrado.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: LSJ
  rationale: Se preserva el término litúrgico reconocido en español como cierre textual del versículo.
theological_decisions:
- issue: Identificación histórica de Nabucodonosor y Asuero en relación con la caída de Nínive
  english_pob_reading: Retain the source text's wording 'Nebuchadnezzar and Ahasuerus' in the main text without harmonizing to later historical reconstructions.
  chosen_spanish_reading: Mantener «Nabucodonosor y Asuero» en el texto principal, sin armonizar los nombres con reconstrucciones históricas posteriores.
  alternative_spanish_readings:
  - Sustituirlos por otros reyes más esperables históricamente
  - Reformular el pasaje para suavizar la tensión histórica
  rationale: La traducción debe representar fielmente el testimonio griego tal como está, conservando la tensión histórica documentada en lugar de resolverla por cuenta propia.
  doctrine_reference: Primacía del original sobre la armonización; preservar la tensión histórica y textual para la interpretación.
translation_notes:
