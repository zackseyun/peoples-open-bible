translation:
  language: es
  text: ¿No tenemos todos un solo Padre? ¿No nos creó un solo Dios? ¿Por qué, entonces, somos infieles[a], cada uno hacia[b] su hermano, profanando el pacto de nuestros padres?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obramos con traición», «somos desleales» o «traicionamos». El verbo hebreo puede expresar actuar con infidelidad o traición en una relación de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para con». La preposición hebrea puede expresar aquí una relación dirigida hacia el hermano en contexto de deslealtad, sin exigir el sentido más fuerte de «contra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Do we not / Has not
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es cierto que…?
  lexicon: HALOT
  rationale: En español, la forma interrogativa retórica con «¿No…?» reproduce bien la expectativa de respuesta afirmativa y conserva el tono de reproche del hebreo sin añadir explicación.
- source_word: אָב אֶחָד
  english_pob_choice: one Father
  chosen_spanish: un solo Padre
  alternatives_spanish:
  - un Padre
  - un único Padre
  - un solo progenitor
  lexicon: HALOT
  rationale: «Un solo Padre» preserva la unicidad enfática del hebreo y permite dejar abierta la tensión documentada entre paternidad divina y posible lectura más amplia, sin resolverla en paráfrasis.
- source_word: לְכֻלָּנוּ
  english_pob_choice: we all
  chosen_spanish: todos
  alternatives_spanish:
  - todos nosotros
  - para todos nosotros
  lexicon: HALOT
  rationale: En la primera pregunta, «¿No tenemos todos…?» expresa de modo natural el valor distributivo de לְכֻלָּנוּ y mantiene la fluidez del español.
- source_word: אֵל אֶחָד
  english_pob_choice: one God
  chosen_spanish: un solo Dios
  alternatives_spanish:
  - un Dios único
  - un solo Dios todopoderoso
  lexicon: HALOT
  rationale: «Un solo Dios» conserva el paralelismo con «un solo Padre» y el énfasis monoteísta del texto sin introducir matices no presentes en el hebreo.
- source_word: בְּרָאָנוּ
  english_pob_choice: created us
  chosen_spanish: nos creó
  alternatives_spanish:
  - nos ha creado
  - nos hizo
  lexicon: HALOT
  rationale: El verbo ברא se rinde con «crear» por su peso teológico; el pretérito «nos creó» funciona naturalmente en la pregunta retórica y mantiene el acto divino como causa de la comunidad.
- source_word: נִבְגַּד
  english_pob_choice: are we faithless
  chosen_spanish: somos infieles
  alternatives_spanish:
  - obramos con traición
  - somos desleales
  - traicionamos
  lexicon: HALOT
  rationale: «Infieles» conserva el sentido de quebranto de lealtad/covenio que el audit trail inglés destaca para בגד. «Somos infieles» evita añadir una hostilidad que el hebreo no exige y conserva el valor relacional del término.
- source_word: אִישׁ בְּאָחִיו
  english_pob_choice: each man to his brother
  chosen_spanish: cada uno con su hermano
  alternatives_spanish:
  - cada hombre con su hermano
  - uno con otro
  - cada uno contra su hermano
  lexicon: HALOT
  rationale: Se mantiene la singularidad distributiva de אִישׁ y el sustantivo de parentesco אָחִיו. «Con» sigue la revisión auditada del inglés, que evitó intensificar el hebreo a «against»; en español sugiere adecuadamente la relación interpersonal de la ofensa.
- source_word: לְחַלֵּל
  english_pob_choice: profaning
  chosen_spanish: profanando
  alternatives_spanish:
  - para profanar
  - vulnerando
  - contaminando
  lexicon: HALOT
  rationale: El infinitivo/resultado se traduce con el gerundio «profanando», que conserva la fuerza sacrílega del término sin volverlo más jurídico o más débil de lo que permite el hebreo.
- source_word: בְּרִית אֲבֹתֵינוּ
  english_pob_choice: the covenant of our fathers
  chosen_spanish: el pacto de nuestros padres
  alternatives_spanish:
  - el pacto de nuestros antepasados
  - el pacto con nuestros padres
  - la alianza de nuestros padres
  lexicon: HALOT
  rationale: «Pacto» corresponde al campo léxico de בְּרִית en una traducción de tono bíblico, y «nuestros padres» conserva la continuidad ancestral explícita del texto. Se evita «alianza» por ser menos estable en el registro de este proyecto.
theological_decisions:
- issue: Identidad de «un solo Padre»
  english_pob_reading: Rendered as 'one Father' without specifying further in the text, while allowing the parallel with 'one God' to suggest divine fatherhood.
  chosen_spanish_reading: «un solo Padre» se mantiene sin identificarlo de forma explícita dentro del versículo, aunque el paralelo con «un solo Dios» apunta fuertemente a una referencia divina.
  alternative_spanish_readings:
  - «un solo antepasado»
  - «nuestro Padre Dios»
  rationale: El hebreo conserva la expresión abierta y el audit trail inglés decide no cerrarla interpretativamente. La traducción española preserva esa tensión y deja que el paralelismo interno haga su trabajo hermenéutico.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Sentido de נִבְגַּד en relación de pacto
  english_pob_reading: are we faithless
  chosen_spanish_reading: somos infieles
  alternative_spanish_readings:
  - obramos con traición
  - nos comportamos deslealmente
  - traicionamos
  rationale: «Infieles» comunica la ruptura de lealtad del verbo בגד en un contexto de pacto; además evita forzar una violencia interpersonal que el hebreo, en la revisión final inglesa, no quiso intensificar. Se preserva así el tono covenantal de la denuncia.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Relación entre los hermanos y la preposición בְּ
  english_pob_reading: each man to his brother
  chosen_spanish_reading: cada uno con su hermano
  alternative_spanish_readings:
  - cada uno hacia su hermano
  - cada hombre a su hermano
  - cada uno contra su hermano
  rationale: La preposición hebrea permite una relación interpersonal amplia; el inglés auditado corrigió una opción más hostil para reflejar mejor el texto. En español, «con» resulta natural y no añade el matiz adversativo de «contra».
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada del inglés que ajustó la relación fraterna de «against» a «to» para no añadir hostilidad no explícita al hebreo. La traducción española sigue esa última decisión y conserva «infieles» para נִבְגַּד, manteniendo el foco en la deslealtad de pacto. También se preservó la tensión interpretativa de «un solo Padre» sin explicitarla.
  spanish_consistency_notes:
  - Se mantuvo «Padre» con mayúscula por tratarse de una posible referencia divina en el paralelismo con «un solo Dios».
  - Se usó «pacto» de manera consistente para בְּרִית, conforme al registro bíblico del proyecto.
  - Se evitó «SEÑOR» porque en este versículo el hebreo dice אֵל, no יהוה.
  - Se conservó el paralelismo retórico con dos preguntas iniciales seguidas de la pregunta de reprensión, sin suavizar la acusación.
  - La formulación «cada uno con su hermano» sigue la última revisión inglesa y no introduce una oposición más fuerte que la del hebreo.
