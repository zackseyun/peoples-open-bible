    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda cláusula para reflejar mejor el campo semántico de יַבְאִישׁ (“volverse odioso/repugnante”) y mantener dos verbos paralelos en español. “Cae en vergüenza” expresa naturalmente יַחְפִּיר sin cerrar del todo la ambigüedad, que queda preservada en la nota. La primera cláusula se conserva porque es fiel al hebreo y natural en español bíblico.
