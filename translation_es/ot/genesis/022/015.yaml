translation:
  language: es
  text: Y el ángel de Yahvé[a] llamó a Abraham por segunda vez desde el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - proclamó
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada simple; en este contexto de خطاب/direct address, «llamó» comunica naturalmente la acción de convocar o dirigir la palabra, sin cargar el verbo con un matiz más ruidoso o solemne del que exige el hebreo.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  lexicon: HALOT
  rationale: «מַלְאַךְ» puede ser «mensajero» o «ángel», pero en esta fórmula narrativa de Génesis la opción más natural en español es «ángel». Se conserva «Yahvé» por el criterio doctrinal del proyecto para el Nombre divino, evitando la sustitución por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se traslada el Nombre divino con la forma española establecida por el proyecto, «Yahvé», como transliteración del Tetragrámaton, en lugar de reemplazarlo por una designación genérica.
- source_word: אֶל אַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - hacia Abraham
  - para Abraham
  lexicon: HALOT
  rationale: La preposición marca al destinatario del llamado; «a Abraham» es la equivalencia idiomática y directa en español. Se conserva el nombre propio sin traducir.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: «שֵׁנִית» expresa con claridad el valor ordinal de «segunda»; «por segunda vez» preserva mejor esa precisión que un simple «otra vez».
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma plural, en español bíblico actual «desde el cielo» es la forma más natural y fiel al sentido idiomático del pasaje. «Cielos» suena posible, pero puede sonar menos natural aquí.
theological_decisions:
- issue: Cómo renderizar מַלְאַךְ יְהוָה sin resolver la cuestión teológica de su identidad
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: La traducción mantiene la designación narrativa sin imponer una interpretación doctrinal sobre si se trata de un mensajero creado o de una manifestación divina especial. Así se conserva la tensión teológica presente en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
translation_notes:
  revision_awareness: El registro inglés más reciente quedó sin cambios tras revisión; el consenso de auditoría fue de alta concordancia, por lo que no se incorporan variantes textuales adicionales. La presente redacción sigue de cerca el hebreo y la decisión léxica auditada en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Nombre divino.
  - Se conserva «ángel» como equivalente principal de מַלְאָךְ en esta fórmula narrativa.
  - Se evita «SEÑOR» para no ocultar el Tetragrámaton.
  - «Desde el cielo» mantiene el registro bíblico sin sobretraducción.
