review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: circunstancia temporal (''Cuando''), culminación de la acción de diezmar, referencia al tercer año como año del diezmo, lista concreta de beneficiarios, y resultado de comer y saciarse dentro de la comunidad local. Sin embargo, contiene errores de forma y una elección poco natural que afectan la fidelidad práctica: ''produceo'' es un error claro; ''daráslo'' es español incorrecto/arcaizante y debe ser ''se lo darás''; además, el español documentado en las decisiones léxicas favorece ''tu cosecha'' frente a ''tu produceo''.'
  spanish_quality_summary: La legibilidad actual es deficiente por errores mecánicos y una construcción verbal no natural. El resto del versículo suena mayormente claro y digno. 'Dentro de tus puertas' es una literalidad aceptable con nota aclaratoria. 'Forastero' es defendible, aunque algo menos preciso que 'extranjero residente'; no exige cambio obligatorio aquí. La puntuación con punto y coma antes de la cláusula final funciona bien.
  glossary_alignment: No hay conflicto con las directrices principales del glosario del proyecto. 'Diezmo', 'levita', 'viuda' y el mantenimiento de las categorías sociales concretas están alineados. No aparecen términos sensibles como Yahvé/Mesías. La decisión de conservar la imagen literal de 'puertas' con nota también concuerda con la auditoría inglesa.
  issues:
  - severity: high
    issue: 'Error léxico/mecánico: ''produceo'''
    rationale: No es una palabra española válida en este contexto. Debe reemplazarse por una opción natural y fiel como 'cosecha', que además coincide con las decisiones léxicas documentadas para תְּבוּאָתְךָ.
  - severity: high
    issue: 'Construcción verbal incorrecta: ''daráslo'''
    rationale: En español actual y estándar no se usa así; además suena artificialmente arcaico. La forma natural y fiel es 'se lo darás', que expresa correctamente el objeto implícito ('el diezmo').
  - severity: low
    issue: Ligera tensión entre texto y decisiones léxicas respecto a תְּבוּאָתְךָ
    rationale: Las decisiones léxicas justifican 'tu cosecha', pero el texto puso otra forma. Conviene armonizar texto y documentación para consistencia editorial.
  revised_spanish_text: Cuando hayas terminado de diezmar todo el diezmo de tu cosecha en el tercer año, el año del diezmo, se lo darás al levita, al forastero, al huérfano y a la viuda; y comerán dentro de tus puertas[a] y se saciarán.
  revised_footnotes:
  - marker: a
    text: 'O: «en tus ciudades»; literalmente, «dentro de tus puertas».'
    reason: lexical_alternative
  revision_rationale: Se corrigen dos problemas importantes de español ('produceo' y 'daráslo') y se armoniza la traducción con la decisión léxica documentada usando 'cosecha' para תְּבוּאָתְךָ. Se mantiene la literalidad 'dentro de tus puertas' con nota, en línea con la auditoría inglesa y el objetivo de conservar la textura jurídica del original.
