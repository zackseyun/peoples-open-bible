theological_decisions:
- issue: Rendering γεννάω language for divine begetting/new birth
  chosen_reading: Use 'born of God' / 'the one born of him' in the main text, while rendering τὸν γεννήσαντα as 'the one who fathered him' to preserve the begetter/begotten contrast.
  alternative_readings:
  - Use 'begotten' consistently throughout
  - Use 'Father' and 'child' for smoother English
  rationale: The verse hinges on a relational analogy between God as begetter and believers as those born from him. 'Born of God' is established and intelligible Johannine idiom, but the second half benefits from a more explicit rendering of the active participle to avoid obscuring the contrast. This preserves theological tension without importing a denominational reading about regeneration order beyond what the Greek states.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Messianic title of Jesus
  chosen_reading: Translate ὁ χριστός as 'the Messiah'
  alternative_readings:
  - the Christ
  rationale: 'The phrase is confessional and titular: belief that Jesus is the promised anointed one. Per doctrine, title usage should be translated rather than merely transliterated.'
  doctrine_reference: 'Contested terms table: Χριστός'
