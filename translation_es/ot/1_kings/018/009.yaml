translation:
  language: es
  text: 'Y dijo[a]: «¿En qué he pecado, para que tú entregues a tu siervo en manos de Acab, para darme muerte?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para matarme».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte naturalmente con una coordinación simple en español. «Y dijo» conserva el flujo narrativo sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: מֶה
  english_pob_choice: What
  chosen_spanish: Qué
  alternatives_spanish:
  - Cómo
  lexicon: HALOT
  rationale: El interrogativo reproduce mejor la apertura de la queja. En español, «¿Qué he pecado?» mantiene la forma del hebreo sin convertirla en una paráfrasis interpretativa.
- source_word: חָטָאתִי
  english_pob_choice: have I sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he hecho mal
  - he errado
  lexicon: HALOT
  rationale: «Pecado» conserva la fuerza moral y religiosa del verbo חטא. La perífrasis perfecta en español expresa bien el acto pasado con relevancia presente en la pregunta.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: 'En esta construcción española, «para que» comunica mejor la relación de resultado/intención implícita: «¿Qué he pecado, para que...?» Evita un «que» demasiado rígido y refleja la lógica de la queja.'
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: Aquí el tratamiento deferente a un superior funciona de modo natural con «siervo» en español. Aunque el término hebreo puede significar esclavo, el contexto no exige resaltar el estatus servil rígido.
- source_word: בְּיַד
  english_pob_choice: into Ahab’s hand
  chosen_spanish: en mano de Ahab
  alternatives_spanish:
  - en poder de Ahab
  - en la mano de Ahab
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de la mano como metáfora de poder/control, tal como lo hace la lectura inglesa. «En mano de Ahab» mantiene la imagen sin sobre-explicarla.
- source_word: לַהֲמִיתֵנִי
  english_pob_choice: to put me to death
  chosen_spanish: para matarme
  alternatives_spanish:
  - para darme muerte
  lexicon: HALOT
  rationale: El infinitivo causativo expresa finalidad de matar. En español, «para matarme» es claro, natural y suficientemente fiel; la alternativa más formal («darme muerte») es posible, pero menos directa.
translation_notes:
  revision_awareness: Se tomó como base el hebreo de 1 Reyes 18:9 y la auditoría inglesa, confirmando que no hacía falta introducir cambios de sentido mayores. La única variación relevante es la naturalización española de כִּי como «para que» y de לַהֲמִיתֵנִי como «para matarme», manteniendo la queja y la metáfora de la «mano» sin diluirla.
  spanish_consistency_notes:
  - Se mantuvo «Ahab» para el nombre propio, siguiendo el texto fuente y la forma habitual en español bíblico técnico.
  - Se conservó la metáfora «en mano de» para no perder el idioma hebreo del poder/control.
  - No se usó «Señor» ni términos eclesiásticos no presentes en el versículo.
  - El tono de deferencia de עַבְדְּךָ se expresó con «tu siervo», coherente con el contexto de súplica o apelación a un superior.
