    rationale: La nota explica alternativas para מִן הַבָּא בְיָדוֹ («de lo que tenía consigo» / «de lo que tenía a la mano»), no para שָׁם («allí»). El anclaje actual induce a confusión y no cumple la disciplina de notas.
  - severity: low
    issue: «Dádiva» es comprensible, pero menos natural que «presente» en este contexto.
    rationale: מִנְחָה aquí se refiere a un obsequio para apaciguar/honrar a Esaú. «Presente» suena más idiomático y preciso en narrativa bíblica contemporánea, sin sugerir uso cultual.
  revised_spanish_text: 'Así pasó aquella noche allí, y tomó de lo que le vino a la mano[a] un presente para Esaú, su hermano:'
