translation:
  language: es
  text: 'Entonces llegaron y le informaron a Josafat, diciendo: «Una gran multitud viene contra ti desde más allá del mar[a], desde Aram[b]; y he aquí que están en Hazazón-tamar, esto es, En-guedí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el otro lado del mar».
    reason: lexical_alternative
  - marker: b
    text: Aram es el nombre hebreo del lugar que a menudo se traduce «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y vinieron
  - Entonces vinieron
  lexicon: HALOT
  rationale: La forma narrativa consecutiva introduce el siguiente hecho en secuencia. «Entonces llegaron» conserva el avance temporal con un español natural y digno.
- source_word: וַיַּגִּידוּ
  english_pob_choice: reported
  chosen_spanish: le informaron
  alternatives_spanish:
  - le reportaron
  - le dieron informe
  lexicon: HALOT
  rationale: El hifil de נגד expresa dar a conocer o informar. «Le informaron» comunica bien el acto formal de traer noticias al rey sin sonar forzado en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: La construcción quotativa se refleja de manera directa con «diciendo», manteniendo el encadenamiento del discurso hebreo.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - ha venido
  - está viniendo
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, el contexto de amenaza inminente funciona en español con un presente actual. «Viene» preserva la proximidad y urgencia del anuncio.
- source_word: הָמוֹן רָב
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud grande
  - una gran muchedumbre
  - una gran horda
  lexicon: HALOT
  rationale: הָמוֹן designa una masa o multitud; con רָב se intensifica el tamaño. «Gran multitud» mantiene amplitud semántica y evita especificar de más como si solo fuera un ejército formal.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - hacia ti
  lexicon: HALOT
  rationale: En contexto militar hostil, עַל se expresa mejor como «contra» en español, conservando el matiz de agresión.
- source_word: מֵעֵבֶר לַיָּם
  english_pob_choice: from beyond the sea
  chosen_spanish: desde más allá del mar
  alternatives_spanish:
  - desde el otro lado del mar
  - desde al otro lado del mar
  lexicon: HALOT
  rationale: La frase indica procedencia al otro lado del mar. «Desde más allá del mar» es natural y conserva la imagen espacial sin reducirla a una mera fórmula geográfica.
- source_word: מֵאֲרָם
  english_pob_choice: from Aram
  chosen_spanish: desde Aram
  alternatives_spanish:
  - desde Siria
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo propio «Aram» según la convención del proyecto, en vez de sustituirlo por el equivalente tradicional posterior «Siria».
- source_word: וְהִנָּם
  english_pob_choice: and behold, they are
  chosen_spanish: y he aquí que están
  alternatives_spanish:
  - y he aquí, están
  - y miren, allí están
  lexicon: HALOT
  rationale: La partícula deíctica agrega vividez e inmediatez. «Y he aquí que están» reproduce esa fuerza de mostración con un español bíblico claro.
- source_word: בְּחַצְצוֹן תָּמָר
  english_pob_choice: in Hazazon-tamar
  chosen_spanish: en Hazazón-tamar
  alternatives_spanish:
  - en Hazazón Tamar
  - en Hazazón Tamar
  lexicon: HALOT
  rationale: Se translitera el topónimo con acentuación española para facilitar la lectura, manteniendo el nombre propio bíblico.
- source_word: הִיא עֵין גֶּדִי
  english_pob_choice: that is, En-gedi
  chosen_spanish: esto es, En-guedí
  alternatives_spanish:
  - es decir, En-guedí
  - o sea, En-guedí
  lexicon: HALOT
  rationale: La cláusula explicativa identifica Hazazón-tamar con En-gedi. «Esto es» conserva la función appositiva; «En-guedí» sigue una transliteración hispana transparente del nombre.
theological_decisions:
- issue: Uso del nombre divino o títulos divinos
  english_pob_reading: No aparece el Tetragrámaton ni un título divino en este versículo.
  chosen_spanish_reading: No se introduce ningún título divino en el texto.
  alternative_spanish_readings:
  - —
  rationale: No hay decisión teológica adicional necesaria en este versículo, porque el contenido es narrativo y geográfico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el ajuste de la frase direccional hebrea a un español idiomático. La versión inglesa ya había preferido una lectura espacial («beyond the sea») y la traducción española conserva esa elección sin convertirla en una localización interpretativa más precisa de lo que permite el texto. También se mantuvo el nombre propio «Aram» conforme al criterio del proyecto, con nota para la alternativa tradicional.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantuvo «Aram» como nombre propio y «En-guedí» como transliteración española legible.
  - Se preservó la fuerza deíctica de וְהִנָּם con una fórmula natural en español.
  - «Gran multitud» evita sobreinterpretar el término como un ejército técnico explícito.
