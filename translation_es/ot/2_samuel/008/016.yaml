translation:
  language: es
  text: Y Joab hijo de Sarvia estaba al mando del ejército[a], y Josafat hijo de Ahilud era cronista[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaba sobre el ejército».'
    reason: lexical_alternative
  - marker: b
    text: «Cronista» aquí se refiere a un funcionario real encargado de registrar y reportar asuntos al rey; alternativamente, «secretario».
    reason: cultural_note
lexical_decisions:
- source_word: עַל הַצָּבָא
  english_pob_choice: was over the army
  chosen_spanish: estaba sobre el ejército
  alternatives_spanish:
  - estaba al mando del ejército
  - era el encargado del ejército
  lexicon: HALOT
  rationale: La preposición עַל con una lista de oficios indica supervisión o autoridad. «Estaba sobre el ejército» conserva esa relación administrativa con una formulación natural en español. Se evita ampliar a una paráfrasis más interpretativa que el hebreo no exige.
- source_word: מַזְכִּיר
  english_pob_choice: recorder
  chosen_spanish: escriba
  alternatives_spanish:
  - secretario
  - cronista
  lexicon: HALOT
  rationale: El término designa un cargo cortesano oficial. «Escriba» comunica en español una función administrativa de registro y reporte sin reducirla a un sentido moderno de oficina. «Secretario» puede sonar demasiado contemporáneo; «cronista» puede sugerir un autor histórico más que un oficial real.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una lista formal de cargos y filiación, בֶּן se rinde de manera directa como «hijo de». Mantiene el estilo genealógico y cortesano del hebreo.
- source_word: וְ / וִ
  english_pob_choice: and
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  lexicon: HALOT
  rationale: La conjunción enlaza dos oficiales en una lista simple. «Y» reproduce la parataxis hebrea de manera sobria y publicable en español.
- source_word: יוֹאָב / צְרוּיָה / יְהוֹשָׁפָט / אֲחִילוּד
  english_pob_choice: Joab / Zeruiah / Jehoshaphat / Ahilud
  chosen_spanish: Joab / Sarvia / Josafat / Ahilud
  alternatives_spanish:
  - Joab / Zeruía / Josafat / Ahilud
  lexicon: HALOT
  rationale: Se usan las formas habituales en español para los nombres propios bíblicos. «Sarvia» sigue la tradición hispana de Zeruiah, mientras que «Josafat» y «Ahilud» preservan la identificación personal sin transliteración innecesaria.
theological_decisions:
- issue: Término de cargo cortesano מַזְכִּיר
  english_pob_reading: Recorder refers to a royal official responsible for keeping records and reporting matters to the king; alternatively, secretary or chronicler.
  chosen_spanish_reading: escriba como funcionario cortesano de registro y reporte
  alternative_spanish_readings:
  - secretario
  - cronista
  rationale: No se trata de un «escriba» en sentido meramente escolar o religioso, sino de un cargo real encargado de registrar y comunicar asuntos al rey. La equivalencia elegida busca conservar la función administrativa sin cargarla con un término demasiado moderno o connotaciones ajenas al contexto.
  doctrine_reference: Ninguna; decisión de traducción administrativa e histórica.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directo de WLC y el audit trail inglés sin cambios textuales relevantes; la única tensión importante es el cargo מַזְכִּיר, cuya función cortesana admite varias opciones en español. No se documentan revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantuvo el estilo de lista oficial con nombres propios y filiación breve, acorde al hebreo.
  - Se prefirió «ejército» para הַצָּבָא por claridad natural en español, sin perder el sentido de cuerpo militar.
  - Se conservó la conjunción inicial «Y» para reflejar la coordinación simple del original.
