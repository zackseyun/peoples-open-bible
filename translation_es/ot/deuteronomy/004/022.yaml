revisions:
- from: Porque yo estoy muriendo en esta tierra[a]; yo no estoy cruzando el Jordán[b], pero ustedes están cruzando y tomarán posesión de esta buena tierra.
  to: Porque yo voy a morir en esta tierra[a]; no voy a cruzar el Jordán, pero ustedes sí cruzarán y tomarán posesión de esta buena tierra[b].
  rationale: La revisión conserva el sentido del hebreo y de la POB inglesa, pero sustituye progresivos poco idiomáticos por una formulación española más natural y clara. 'Voy a morir' comunica bien la inminencia de מֵת en este contexto; 'no voy a cruzar' evita un calco duro del participio negativo; 'ustedes sí cruzarán' resalta el contraste que el inglés explicitó con 'but'. Se mantiene 'tomarán posesión de' para ירשׁ y se ajustan las notas para que correspondan exactamente a los puntos donde hay alternativas relevantes.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:15:51Z'
