translation:
  language: es
  text: 'Y Yahvé dijo[a]: «¿Quién inducirá a Ahab, rey de Israel, para que suba y caiga en Ramot de Galaad?». Y uno dijo esto, y otro dijo aquello.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «engañará» o «persuadirá» para el verbo traducido aquí como «inducirá».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal con la forma española establecida por el proyecto, en lugar de sustituirlo por un título. Esto sigue el valor de transliteración del audit trail inglés.
- source_word: יְפַתֶּה
  english_pob_choice: will entice
  chosen_spanish: induzca
  alternatives_spanish:
  - seduzca
  - engañe
  - persuada
  lexicon: HALOT
  rationale: El verbo hebreo admite el matiz de inducir, persuadir o engañar. En español, «induzca» expresa la acción de llevar a alguien a actuar sin cerrar el sentido a una engañosa influencia; así se preserva la tensión moral del contexto sin resolverla en la paráfrasis.
- source_word: אַחְאָב מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Ahab king of Israel
  chosen_spanish: Ahab, rey de Israel
  alternatives_spanish:
  - Ahab rey de Israel
  - Ahab, el rey de Israel
  lexicon: HALOT
  rationale: Se mantiene la aposición real de manera natural en español. La coma ayuda a leer el nombre propio seguido del título sin añadir una glosa innecesaria.
- source_word: וְיַעַל
  english_pob_choice: so that he may go up
  chosen_spanish: para que suba
  alternatives_spanish:
  - y suba
  - para que vaya
  lexicon: HALOT
  rationale: El valor de finalidad/resultados se expresa de forma natural con «para que», y «suba» conserva el movimiento ascendente del hebreo sin sobreexplicar.
- source_word: וְיִפֹּל
  english_pob_choice: and fall
  chosen_spanish: caiga
  alternatives_spanish:
  - y caiga
  - y muera
  - y sea derrotado
  lexicon: HALOT
  rationale: «Caiga» reproduce la imagen hebrea de נפל y permite que el contexto bélico lleve la implicación de derrota o muerte, como en la elección inglesa de mantener «fall».
- source_word: בְּרָמוֹת גִּלְעָד
  english_pob_choice: at Ramoth-gilead
  chosen_spanish: en Ramot de Galaad
  alternatives_spanish:
  - en Ramot-galaad
  - en Ramot de Galaad
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma comprensible para el lector hispano. «En» reproduce de manera natural la localización del hebreo en contexto narrativo.
- source_word: זֶה אֹמֵר כָּכָה וְזֶה אֹמֵר כָּכָה
  english_pob_choice: And one said this, and another said that
  chosen_spanish: Y uno decía esto, y otro decía aquello
  alternatives_spanish:
  - Y uno dijo esto, y otro dijo aquello
  - Y uno decía una cosa, y otro otra
  lexicon: HALOT
  rationale: La construcción distributiva se vuelve en español con el paralelismo «uno... y otro...». «Esto/aquello» reproduce el contraste hebreo de manera idiomática y mantiene la alternancia de propuestas en la escena del consejo celestial.
theological_decisions:
- issue: Grado de agencia divina en la caída de Ahab
  english_pob_reading: Retain the text's direct depiction of the LORD asking who will entice Ahab, without softening the causative force.
  chosen_spanish_reading: Mantener a Yahvé como iniciador directo de la pregunta sobre quién inducirá a Ahab, sin atenuar su agencia.
  alternative_spanish_readings:
  - ¿Quién permitirá que Ahab sea inducido?
  - ¿Quién influirá en Ahab?
  rationale: El hebreo presenta la deliberación divina de manera directa. La versión española conserva esa franqueza y no reemplaza la fuerza causativa por una fórmula más débil que suavice la tensión teológica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Nuance moral de פתה
  english_pob_reading: Use 'entice' in the main text.
  chosen_spanish_reading: Usar «inducir» en el texto principal, dejando abierta la posibilidad de engaño o persuasión.
  alternative_spanish_readings:
  - seducir
  - engañar
  - persuadir
  rationale: En español, «inducir» sirve para abarcar el campo semántico sin convertir de entrada el verbo en un engaño explícito ni en una simple persuasión neutral. Así se preserva la tensión que el audit trail inglés quiso mantener con «entice».
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail inglés, que prefirió el paralelismo simple «and one said this, and another said that» en lugar de una coordinación contrastiva más interpretativa. La versión española mantiene ese paralelismo con «Y uno decía esto, y otro decía aquello».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al criterio del proyecto.
  - Se conserva la imagen verbal de «caer» en vez de explicar el resultado bélico con «ser derrotado» o «morir».
  - La fórmula «uno... y otro...» reproduce el paralelismo distributivo del hebreo sin añadir sujetos colectivos.
  - «Ramot de Galaad» sigue una transliteración sobria y legible para español bíblico.
