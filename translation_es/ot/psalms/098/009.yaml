translation:
  language: es
  text: Delante de Yahvé[a], porque viene a juzgar la tierra; juzgará el mundo con justicia[e][d][c][b], y a los pueblos, con equidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en presencia de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: YHWH; se vierte como «Yahvé» conforme al criterio del proyecto para el nombre divino.'
    reason: alternative_reading
  - marker: c
    text: 'O: «él viene a juzgar la tierra» o «está viniendo a juzgar la tierra». La forma hebrea puede expresar una acción inminente o segura en contexto poético.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «el mundo habitado».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «con rectitud» o «rectamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en la presencia de
  lexicon: HALOT
  rationale: El modismo con פָּנִים puede significar “antes de” o “en la presencia de”. En español, “delante de” conserva la relación espacial/personal y suena natural en un contexto litúrgico/poético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino transliterado. “Yahvé” es la forma establecida en el texto español del POB, evitando la sustitución por un título.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del llamado previo; “porque” comunica con claridad la relación causal sin perder el valor explicativo del hebreo.
- source_word: בָא
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ha venido
  lexicon: HALOT
  rationale: El qatal poético puede expresar acción inminente o cierta. “Viene” preserva esa viveza presente sin fijarla indebidamente como pasado o futuro.
- source_word: לִשְׁפֹּט
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - gobernar
  - vindicar
  lexicon: HALOT
  rationale: “Juzgar” es la correspondencia directa y mantiene el alcance judicial del verbo en este marco de juicio justo sobre la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  lexicon: HALOT
  rationale: En paralelo con “mundo” y “pueblos”, el alcance es universal; “la tierra” reproduce bien esa amplitud en español.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  lexicon: HALOT
  rationale: Aunque el término puede aludir al “mundo habitado”, “el mundo” es el equivalente idiomático natural y suficiente en el cuerpo del verso.
- source_word: בְּצֶדֶק
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - con rectitud
  - en justicia
  lexicon: HALOT
  rationale: En contexto judicial, צֶדֶק puede expresarse como “justicia” en español sin perder su valor moral y forense. Se conserva la correspondencia con el juicio recto de Dios.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: “Los pueblos” mantiene el sentido distributivo de grupos humanos distintos y corresponde bien al paralelismo poético.
- source_word: בְּמֵישָׁרִים
  english_pob_choice: with equity
  chosen_spanish: con equidad
  alternatives_spanish:
  - con rectitud
  - con justicia
  lexicon: HALOT
  rationale: El término denota rectitud/equidad en el ejercicio del juicio; “con equidad” es la opción más clara y natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino, no un sustituto titulado. Esto mantiene la transparencia del texto y la continuidad con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance del juicio divino en שׁפט
  english_pob_reading: judge
  chosen_spanish_reading: juzgar
  alternative_spanish_readings:
  - gobernar
  - vindicar
  rationale: El verso combina venida y juicio sobre toda la creación. “Juzgar” conserva la tensión teológica entre rendición de cuentas y orden recto, sin reducirla a mera condena ni a simple administración.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del audit trail inglés y no requiere revisión adicional: se conservan el nombre divino, el valor poético de בָא como presencia inminente/cierta y el paralelismo entre justicia y equidad.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para יְהוָה.
  - Se conserva el paralelismo poético con “la tierra / el mundo / los pueblos”.
  - Se mantiene “juzgar” como verbo principal para שׁפט.
  - Se prefiere “justicia” y “equidad” para reflejar צֶדֶק y מֵישָׁרִים sin colapsar ambos términos.
