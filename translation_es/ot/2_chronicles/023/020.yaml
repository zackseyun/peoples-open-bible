review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y preserva puntos clave como «Yahvé», «casa de Yahvé», «puerta superior» y «trono del reino». Sin embargo, introduce dos desajustes importantes con el sujeto y las notas auditadas: el hebreo tiene sujeto singular en וַיּוֹרֶד («hizo bajar / bajó» = él, Jehoiadá), pero el español dice «bajaron», y la nota [a] quedó anclada en «capitanes de cientos» aunque el contenido de la nota corresponde a הָאַדִּירִים («los nobles»), no a שָׂרֵי הַמֵּאוֹת.'
  spanish_quality_summary: El texto es legible y digno, pero «capitanes de cientos» suena algo menos natural que «comandantes de centenas». Además, para una narración fluida conviene corregir la concordancia verbal a singular y reubicar la nota lexical donde realmente corresponde. «Todo el pueblo de la tierra» es defendible si se conserva con nota cultural, aunque suena algo literal; aquí puede mantenerse por fidelidad al giro técnico.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» está correctamente aplicado; בֵּית יְהוָה -> «casa de Yahvé» preserva la formulación fuente; no hay conflictos mayores de glosario. La única desviación relevante es de exactitud sintáctica y de anclaje de nota, no de terminología doctrinal.'
  issues:
  - severity: high
    issue: Cambio indebido de sujeto verbal en «y bajaron al rey»
    rationale: 'El hebreo וַיּוֹרֶד es 3ms singular, no plural. El sujeto sigue siendo Jehoiadá: «entonces tomó... e hizo bajar/bajó al rey». Cambiarlo a plural altera el flujo narrativo y la referencia del agente.'
  - severity: high
    issue: La nota [a] está anclada en el término equivocado
    rationale: La nota dice «O «los dignatarios»; el hebreo puede referirse a personas prominentes o poderosas», lo cual explica הָאַדִּירִים, no שָׂרֵי הַמֵּאוֹת. Debe ir sobre «nobles» o eliminarse.
  - severity: medium
    issue: «Capitanes de cientos» es comprensible, pero menos natural que una opción como «comandantes de centenas»
    rationale: La traducción actual no es infiel, pero suena algo rígida en español general. «Comandantes de centenas» conserva mejor el título militar formal y la estructura semítica sin sonar romano como «centuriones».
  - severity: low
    issue: Falta una nota lexical opcional para «la casa del rey» = «el palacio real»
    rationale: El English POB preserva la alternativa «the royal palace» para בֵּית הַמֶּלֶךְ. En español no es estrictamente obligatoria, pero puede mantenerse para continuidad del rastro de auditoría.
  revised_spanish_text: Entonces tomó a los comandantes de centenas, a los nobles[a], a los gobernantes del pueblo y a todo el pueblo de la tierra[b], e hizo bajar al rey de la casa de Yahvé. Entraron por la puerta superior de la casa del rey[c] y sentaron al rey sobre el trono del reino.
  revised_footnotes:
