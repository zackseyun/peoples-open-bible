translation:
  language: es
  text: Y ahora[a], hijos, vean lo que hace la limosna y cómo la rectitud[b] libra. Y mientras decía estas cosas, su alma partió[c] en el lecho. Tenía ciento cincuenta y ocho años[d], y lo sepultó honorablemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘consideren’. El imperativo griego puede implicar ver con atención o reflexionar.
    reason: lexical_alternative
  - marker: b
    text: O ‘justicia’. El griego δικαιοσύνη puede significar justicia o rectitud según el contexto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘su alma faltó/se fue’. Es un modismo griego de muerte.
    reason: lexical_alternative
  - marker: d
    text: 'Algunos lectores podrían esperar ‘lo sepultaron honorablemente’, pero el testigo griego aquí tiene verbo singular: ‘lo sepultó honorablemente’.'
    reason: textual_variant
lexical_decisions:
- source_word: παιδία
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos míos
  lexicon: LSJ
  rationale: El vocativo plural se dirige a los descendientes o a los oyentes más jóvenes. En español, 'hijos' conserva el tono familiar y exhortativo sin introducir una edad literal infantil que el contexto no exige.
- source_word: ἴδετε
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - consideren
  lexicon: LSJ
  rationale: El imperativo plural pide atender con la vista o la comprensión. 'Vean' es natural en español y mantiene la fuerza exhortativa.
- source_word: ἐλεημοσύνη
  english_pob_choice: almsgiving
  chosen_spanish: la limosna
  alternatives_spanish:
  - la caridad
  - la misericordia
  lexicon: LSJ
  rationale: En Tobit el término se refiere al dar concreto a los necesitados. 'Limosna' preserva mejor ese sentido práctico que 'caridad', que en español puede sonar más abstracto.
- source_word: ποιεῖ
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  lexicon: LSJ
  rationale: Verbo simple y directo. 'Hace' mantiene la apertura del complemento, como en el griego.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  lexicon: LSJ
  rationale: El POB inglés conservó 'righteousness' como lectura principal pero dejó abierta 'justice'. En español, 'justicia' es la opción más natural y también puede abarcar el sentido de conducta recta en este contexto sapiencial; por eso se usa con nota alternativa.
- source_word: ῥύεται
  english_pob_choice: delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  lexicon: LSJ
  rationale: El verbo puede denotar librar, rescatar o salvar. 'Libra' expresa bien la acción de sacar de peligro o de una condición adversa sin estrechar el sentido.
- source_word: ἐξέλιπεν αὐτοῦ ἡ ψυχὴ
  english_pob_choice: his soul departed
  chosen_spanish: su alma salió
  alternatives_spanish:
  - su alma partió
  - expiró
  lexicon: LSJ
  rationale: Se conserva la imagen de la 'alma' que sale, cercana al griego y a la revisión inglesa, pero en una forma natural en español. Evita forzar una explicación antropológica y mantiene la tensión textual sobre la muerte.
- source_word: ἐπὶ τῆς κλίνης
  english_pob_choice: on the bed
  chosen_spanish: en la cama
  alternatives_spanish:
  - sobre la cama
  - en el lecho
  lexicon: LSJ
  rationale: '''Cama'' es claro y contemporáneo; ''lecho'' sería más elevado pero menos transparente para lectura pública.'
- source_word: ἐτῶν ἑκατὸν πεντήκοντα ὀκτώ
  english_pob_choice: a hundred fifty-eight years old
  chosen_spanish: ciento cincuenta y ocho años
  alternatives_spanish:
  - de ciento cincuenta y ocho años
  - a la edad de ciento cincuenta y ocho años
  lexicon: LSJ
  rationale: Reproducción directa y natural de la edad.
- source_word: ἔθαψεν αὐτὸν ἐνδόξως
  english_pob_choice: he buried him honorably
  chosen_spanish: lo sepultó honorablemente
  alternatives_spanish:
  - lo enterró honorablemente
  - lo sepultó con honor
  lexicon: LSJ
  rationale: '''Sepultó'' conserva un registro digno y bíblico sin depender de un término eclesiástico fijo. ''Honorablemente'' reproduce bien el adverbio griego ἐνδόξως.'
theological_decisions:
- issue: Renderización de δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: El proyecto inglés optó por 'righteousness' como lectura principal, pero reconoció 'justice' como alternativa legítima. En español, 'justicia' es una traducción transparente y fiel al rango semántico del término, especialmente en un dicho sapiencial sobre la eficacia moral ante Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice preserved where relevant'
- issue: Idiom de muerte ἐξέλιπεν αὐτοῦ ἡ ψυχὴ
  english_pob_reading: his soul departed
  chosen_spanish_reading: su alma salió
  alternative_spanish_readings:
  - su alma partió
  - expiró
  rationale: La frase griega es un modismo de muerte. 'Su alma salió' conserva el lenguaje figurado sin resolverlo en una paráfrasis que borre el término 'alma' ni en una explicación que cambie el registro narrativo.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Número gramatical del último verbo
  english_pob_reading: he buried him honorably
  chosen_spanish_reading: lo sepultó honorablemente
  alternative_spanish_readings:
  - lo enterró honorablemente
  - lo sepultaron honorablemente
  rationale: El testigo griego de Swete tiene verbo singular. La traducción española sigue ese dato y evita la lectura plural que algunas tradiciones pueden sugerir.
  doctrine_reference: Textual variant noted in English audit trail
translation_notes:
  revision_awareness: Seguí la revisión más reciente del inglés auditado, que volvió ἐξέλιπεν αὐτοῦ ἡ ψυχὴ a una formulación más literal. Por eso la versión española conserva la imagen del alma que sale, en lugar de suavizarla a una expresión como 'murió' o 'exhaló el último aliento'. También mantuve el verbo singular final conforme al testigo griego de Swete.
  spanish_consistency_notes:
  - Usé 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Conservé 'justicia' para δικαιοσύνη, pero la nota deja abierta 'rectitud' según el rango semántico del término.
  - Elegí 'limosna' por el valor concreto de ἐλεημοσύνη en Tobit, en lugar de un equivalente más abstracto.
  - 'Mantuve el sujeto singular del último verbo: ''lo sepultó''.'
