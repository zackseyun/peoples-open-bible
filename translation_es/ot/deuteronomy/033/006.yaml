translation:
  language: es
  text: Viva Rubén, y no muera[a], y sean pocos sus hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y que sus hombres sean contados». El hebreo de la cláusula final es difícil y también se ha entendido como una oración para que Rubén no llegue a ser insignificante ni quede excluido del conteo tribal.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְחִי
  english_pob_choice: May ... live
  chosen_spanish: Viva
  alternatives_spanish:
  - Que viva
  - Viva por siempre
  lexicon: HALOT
  rationale: El jussivo expresa un deseo o bendición. En español, el imperativo desiderativo "Viva" transmite esa fuerza volitiva de forma natural y concisa.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reuben
  lexicon: convención bíblica española
  rationale: Se usa la forma habitual en español bíblico para el nombre propio, manteniendo identificable la tribu y la persona.
- source_word: וְ/אַל יָמֹת
  english_pob_choice: and not die
  chosen_spanish: y no muera
  alternatives_spanish:
  - y que no muera
  - y no perezca
  lexicon: HALOT
  rationale: אַל con jussivo expresa prohibición o deseo negativo. "No muera" conserva el valor volitivo y el verbo básico de מות sin desplazar el matiz a una paráfrasis.
- source_word: וִ/יהִי
  english_pob_choice: and may ... be
  chosen_spanish: y sean
  alternatives_spanish:
  - y sea
  - y que sean
  lexicon: HALOT
  rationale: El segundo jussivo pide otra bendición. En español plural concuerda con el sujeto implícito "sus hombres" y mantiene la paralelismo de petición.
- source_word: מְתָי/ו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - su gente
  - sus varones
  lexicon: HALOT
  rationale: El sustantivo es difícil y la tradición de traducción lo entiende aquí como los miembros varoniles o la gente del clan. "Sus hombres" conserva la literalidad relativa y la ambigüedad mejor que una glosa más interpretativa.
- source_word: מִסְפָּר
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - numerados
  - contados
  - un pequeño número
  lexicon: HALOT
  rationale: Aunque literalmente significa "número", en esta construcción la idea probable es escasez o pequeñez cuantitativa. "Pocos" ofrece el sentido más natural en español sin borrar la dificultad del hebreo.
theological_decisions:
- issue: Interpretación de la última cláusula מְתָיו מִסְפָּר
  english_pob_reading: 'A modestly negative/realistic blessing: ''may his men be few,'' i.e., may Reuben survive though small in number.'
  chosen_spanish_reading: 'Una bendición sobria y realista: ''que sean pocos sus hombres'', es decir, que Rubén subsista aunque reducido en número.'
  alternative_spanish_readings:
  - que sus hombres sean contados
  - que sus hombres no sean excluidos del censo
  - aunque sus hombres sean pocos
  rationale: El hebreo masorético es breve y difícil. La traducción principal mantiene la lectura más directa de la secuencia con מִסְפָּר como indicio de escasez, sin resolver en exceso la ambigüedad. La nota conserva la lectura alternativa de 'ser contados' y la posibilidad de una bendición de preservación tribal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el texto masorético tal como está, sin enmendarlo, y se conservó la tensión interpretativa documentada en el audit trail inglés. No hubo cambios respecto de la última revisión registrada.
  spanish_consistency_notes:
  - Se mantuvo "Rubén" como nombre bíblico estándar en español.
  - Se usó "hombres" para מְתָיו por la tradición exegética reflejada en el audit trail, evitando una glosa interpretativa que cerrara la ambigüedad.
  - Se eligió "pocos" para מִסְפָּר porque en español comunica con naturalidad la idea de escasez numérica presente en la lectura principal.
  - El tono general sigue una bendición breve y poética, acorde con la forma hebrea del versículo.
