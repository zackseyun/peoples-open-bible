translation:
  language: es
  text: He perfumado mi cama con mirra, áloes[a] y canela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madera de áloe»; el término hebreo se refiere a una madera fragante usada en perfumes, no a la planta moderna de aloe en el sentido usual.
