  revision_awareness: 'El pasaje coincide con la revisión inglesa más reciente: no hubo cambios textuales ni decisiones nuevas que alteren el sentido. La versión española sigue la misma lectura de fondo y conserva el eufemismo señalado en la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «concubina» para preservar la categoría legal/social del hebreo.
  - 'Se traduce el nombre con grafía española usual: «Rizpa» y «Aías».'
  - Se conserva el eufemismo de «entrar a» en el texto principal y se explica en nota.
  - Se usa «Abner» e «Is-bóset» conforme a la forma española habitual de los nombres propios bíblicos.
