id: ISA.47.14
reference: Isaiah 47:14
source:
  edition: WLC
  text: הִנֵּ֨ה הָי֤וּ כְ/קַשׁ֙ אֵ֣שׁ שְׂרָפָ֔תַ/ם לֹֽא יַצִּ֥ילוּ אֶת נַפְשָׁ֖/ם מִ/יַּ֣ד לֶֽהָבָ֑ה אֵין גַּחֶ֣לֶת לַ/חְמָ֔ם א֖וּר לָ/שֶׁ֥בֶת נֶגְדּֽ/וֹ־־־׃
translation:
  text: Look[a], they have become like stubble; fire burns them up. They cannot rescue themselves from the power of the flame. This is no coal for warming oneself, no fire to sit before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There is no ember to warm by.' The Hebrew in this clause is difficult; the sense is that this fire is not a small, useful hearth-coal but a consuming blaze.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic deictic statement. 'Look' preserves the force in natural modern English better than the more archaic 'Behold.'
- source_word: הָיוּ
  chosen: have become
  alternatives:
  - are
  - became
  lexicon: HALOT
  rationale: 'The perfect here marks a resultant state: the subjects are now reduced to stubble. ''Have become'' captures both the completed action and present condition.'
- source_word: כְקַשׁ
  chosen: like stubble
  alternatives:
  - as chaff
  - like straw
  lexicon: HALOT
  rationale: קַשׁ commonly denotes stubble/straw left for burning. 'Stubble' fits the image of dry, easily consumed remains and is a standard prophetic rendering.
- source_word: אֵשׁ שְׂרָפָתַם
  chosen: fire burns them up
  alternatives:
  - fire has burned them
  - a fire burns them
  lexicon: HALOT
  rationale: The clause is terse and vivid. The Hebrew verb from שׂרף means 'to burn/consume.' 'Burns them up' conveys destructive consumption in idiomatic English.
- source_word: לֹא יַצִּילוּ אֶת נַפְשָׁם
  chosen: They cannot rescue themselves
  alternatives:
  - They will not deliver their lives
  - They cannot save themselves
  lexicon: HALOT
  rationale: נצל in Hiphil means 'deliver, rescue.' נֶפֶשׁ here refers to their own lives/persons. 'Rescue themselves' is clear and faithful without importing soteriological overtones.
- source_word: מִיַּד לֶהָבָה
  chosen: from the power of the flame
  alternatives:
  - from the hand of the flame
  - from the flame
  lexicon: HALOT
  rationale: The idiom 'from the hand of' denotes power or grasp. Rendering 'power of the flame' preserves the idiomatic sense in natural English while retaining the singular 'flame' for vividness.
- source_word: אֵין גַּחֶלֶת לַחְמָם
  chosen: This is no coal for warming oneself
  alternatives:
  - There is no ember to warm by
  - It is not a coal for their bread
  lexicon: HALOT
  rationale: The difficult infinitive לַחְמָם is best taken in the sense 'for warming' (from חָמַם), not 'their bread.' The line contrasts a destructive blaze with a useful domestic coal. 'Warming oneself' expresses the impersonal/generic sense naturally.
- source_word: אוּר לָשֶׁבֶת נֶגְדּוֹ
  chosen: no fire to sit before
  alternatives:
  - nor a fire to sit in front of
  - nor light to sit before
  lexicon: HALOT
  rationale: אוּר here is 'fire,' not merely 'light.' The phrase describes a hearth-fire before which one sits. 'To sit before' is concise and idiomatic.
