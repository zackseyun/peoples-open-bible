translation:
  language: es
  text: Enterraron los huesos de Saúl y de Jonatán su hijo en la tierra de Benjamín,[a] en Zela, en el sepulcro de Quis, su padre. Hicieron todo lo que el rey había mandado, y después de eso Dios atendió a la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Dios fue atendido por la tierra'', ''Dios respondió favorablemente por la tierra'' o ''Dios escuchó la súplica por la tierra''. El verbo hebreo sugiere una respuesta favorable a la intercesión, aunque la súplica no se menciona explícitamente en este versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: They buried
  chosen_spanish: Enterraron
  alternatives_spanish:
  - Y enterraron
  - Sepultaron
  lexicon: HALOT
  rationale: El verbo narrativo simple de קבר se rinde de forma directa con pasado perfecto simple en español. 'Enterraron' conserva la acción concreta y fluida en estilo narrativo.
- source_word: עַצְמוֹת
  english_pob_choice: the bones of
  chosen_spanish: los huesos de
  alternatives_spanish:
  - los restos de
  lexicon: HALOT
  rationale: עצמות significa literalmente 'huesos'. Mantener 'huesos' preserva la concreción del hebreo mejor que una paráfrasis general como 'restos'.
- source_word: שָׁאוּל וִיהוֹנָתָן בְּנוֹ
  english_pob_choice: Saul and of Jonathan his son
  chosen_spanish: Saúl y de Jonatán, su hijo
  alternatives_spanish:
  - Saúl y Jonatán, su hijo
  - Saúl y su hijo Jonatán
  lexicon: HALOT
  rationale: La relación posesiva de בנו se expresa con claridad en español como 'su hijo'. Se mantiene la identificación de Jonatán como hijo de Saúl sin forzar una estructura demasiado inglesa.
- source_word: בְּאֶרֶץ בִּנְיָמִן
  english_pob_choice: in the land of Benjamin
  chosen_spanish: en la tierra de Benjamín
  alternatives_spanish:
  - en el territorio de Benjamín
  - en Benjamín
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'en la tierra de Benjamín', por lo que 'tierra' conserva el matiz territorial del original mejor que una forma más breve.
- source_word: בְּצֵלָע
  english_pob_choice: in Zela
  chosen_spanish: en Zela
  alternatives_spanish:
  - en Sela
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera de manera directa como en la tradición de la POB.
- source_word: בְּקֶבֶר קִישׁ אָבִיו
  english_pob_choice: in the tomb of Kish his father
  chosen_spanish: en el sepulcro de Quis, su padre
  alternatives_spanish:
  - en la tumba de Quis, su padre
  - en el sepulcro de Quis, el padre de él
  lexicon: HALOT
  rationale: קבר puede significar 'sepulcro' o 'tumba'. 'Sepulcro' funciona bien para un lugar de entierro familiar y es natural en español culto. Se conserva la referencia a Quis como padre de Saúl.
- source_word: וַיַּעֲשׂוּ כֹּל אֲשֶׁר צִוָּה הַמֶּלֶךְ
  english_pob_choice: They did all that the king had commanded
  chosen_spanish: Hicieron todo lo que el rey había mandado
  alternatives_spanish:
  - Hicieron todo cuanto el rey había mandado
  - Cumplieron todo lo que el rey había mandado
  lexicon: HALOT
  rationale: La construcción relativa se conserva de manera bastante literal pero natural. 'Había mandado' refleja bien la anterioridad del mandato frente a la acción.
- source_word: וַיֵּעָתֵר אֱלֹהִים
  english_pob_choice: God responded to the land
  chosen_spanish: Dios respondió a la tierra
  alternatives_spanish:
  - Dios escuchó a la tierra
  - Dios respondió favorablemente a la tierra
  lexicon: HALOT
  rationale: El nifal de עתר sugiere una respuesta favorable a la súplica, pero el hebreo no explicita aquí la oración. 'Respondió a la tierra' sigue de cerca la lectura inglesa revisada y conserva la tensión interpretativa sin añadir un objeto no expresado.
- source_word: לָאָרֶץ
  english_pob_choice: for the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - por la tierra
  - en favor de la tierra
  lexicon: HALOT
  rationale: El complemento preposicional se vierte de forma cercana con 'a la tierra', coherente con la construcción verbal española 'responder a'.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: after that
  chosen_spanish: después de eso
  alternatives_spanish:
  - después
  - luego
  lexicon: HALOT
  rationale: Expresión temporal estándar que marca la secuencia posterior sin añadir contenido interpretativo.
theological_decisions:
- issue: Sentido de וַיֵּעָתֵר אֱלֹהִים לָאָרֶץ
  english_pob_reading: God responded to the land
  chosen_spanish_reading: Dios respondió a la tierra
  alternative_spanish_readings:
  - Dios respondió favorablemente a la tierra
  - Dios escuchó la súplica por la tierra
  - Dios fue propicio a la tierra
  rationale: El verbo hebreo implica una respuesta favorable a la intercesión, pero esta cláusula no menciona explícitamente la plegaria. La traducción española mantiene la forma sobria y el mismo grado de reserva que la revisión inglesa más reciente, sin resolver la ambigüedad.
  doctrine_reference: Preservar la tensión lexical del hebreo y evitar expansión interpretativa no expresada en el texto
- issue: Uso de 'tierra' para לָאָרֶץ
  english_pob_reading: for the land
  chosen_spanish_reading: a la tierra
  alternative_spanish_readings:
  - por la tierra
  - en favor de la tierra
  rationale: '''Tierra'' reproduce el objeto directo/indirecto idiomático del verbo en esta construcción sin sustituirlo por ''país'' o ''territorio'', que harían más explícito de lo que el texto dice.'
  doctrine_reference: Fidelidad semántica al sustantivo הארץ en contexto de juicio/favor territorial
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que sustituyó una paráfrasis explícita de oración por la forma más cercana 'responded to the land'. Se mantuvo la misma cautela interpretativa en español y se evitó añadir un sujeto de súplica no expresado en el versículo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponde; en este versículo aparece 'Dios' (אֱלֹהִים).
  - Se prefirió 'tierra' para לָאָרֶץ siguiendo la construcción auditada y el contexto territorial de la sequía/calamidad implícita.
  - '''Sepulcro'' se eligió por naturalidad reverente en español y por adecuarse a un entierro familiar.'
  - '''Jonatán, su hijo'' conserva la relación filial sin sobrecargar la sintaxis.'
  - La nota a pie de página marca la ambigüedad verbal sin alterar el texto principal.
