translation:
  language: es
  text: 'Y al pueblo, la carta del rey era como sigue: «El rey Antíoco al consejo de ancianos[a] de los judíos y a los demás judíos, saludos[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego γερουσία se refiere a un cuerpo oficial de ancianos; también podría traducirse «gerusía» o, en sentido más institucional, «senado».
    reason: cultural_note
  - marker: b
    text: El griego usa la fórmula epistolar χαίρειν, literalmente «alegrarse / regocijarse», aquí como saludo convencional; también puede traducirse «salud».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸς δὲ τὸ ἔθνος
  english_pob_choice: And to the nation
  chosen_spanish: Y al pueblo
  alternatives_spanish:
  - Y a la nación
  - Y para el pueblo
  lexicon: LSJ
  rationale: ἔθνος puede referirse a un colectivo nacional o al pueblo como cuerpo; en español, «pueblo» comunica con naturalidad el destinatario colectivo sin forzar una abstracción política que «nación» podría introducir aquí.
- source_word: ἡ τοῦ βασιλέως ἐπιστολή
  english_pob_choice: the king’s letter
  chosen_spanish: la carta del rey
  alternatives_spanish:
  - la carta real
  - la carta del rey
  lexicon: LSJ
  rationale: El genitivo es posesivo; «la carta del rey» es directo, natural y fiel al griego, sin añadir solemnidad innecesaria.
- source_word: τοιαύδε ἦν
  english_pob_choice: was as follows
  chosen_spanish: era como sigue
  alternatives_spanish:
  - era así
  - era del tenor siguiente
  lexicon: LSJ
  rationale: La fórmula introduce el contenido de una carta; «era como sigue» conserva ese valor epistolar en español actual y readable.
- source_word: Βασιλεὺς Ἀντίοχος
  english_pob_choice: King Antiochus
  chosen_spanish: El rey Antíoco
  alternatives_spanish:
  - Antíoco el rey
  lexicon: LSJ
  rationale: El título se mantiene antepuesto como en el griego y la forma española estándar es «Antíoco».
- source_word: τῇ γερουσίᾳ τῶν Ἰουδαίων
  english_pob_choice: to the council of elders of the Jews
  chosen_spanish: a la gerusía de los judíos
  alternatives_spanish:
  - al consejo de ancianos de los judíos
  - al senado de los judíos
  lexicon: LSJ
  rationale: Se conserva «gerusía» porque el POB inglés documenta el término institucional griego con nota explicativa; en español, transliterarlo permite mantener la referencia histórica precisa, mientras la nota aclara su sentido de cuerpo de ancianos. Se evita «senado» por sus connotaciones modernas y «consejo de ancianos» como texto principal para no perder el nombre institucional cuando el original parece aludir a un organismo reconocido.
- source_word: τοῖς ἄλλοις Ἰουδαίοις
  english_pob_choice: to the other Jews
  chosen_spanish: a los demás judíos
  alternatives_spanish:
  - y a los otros judíos
  - a los restantes judíos
  lexicon: LSJ
  rationale: «Demás» reproduce bien la distinción entre este grupo amplio y la gerusía mencionada aparte, manteniendo la oposición del griego.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - greetings
  lexicon: LSJ
  rationale: En la fórmula epistolar griega, χαίρειν funciona como saludo convencional; «salud» es una equivalencia breve y clásica en español que conserva el tono formular.
translation_notes:
  revision_awareness: 'Coincide con el texto griego disponible y con la línea de traducción inglesa auditada: encabezado epistolar, destinatarios en dos grupos y saludo formular. No se registran revisiones posteriores que alteren la elección lexical.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «gerusía» por continuidad con el término técnico griego; la nota ofrece la equivalencia funcional en español.
  - Se conserva la estructura documental de carta para reflejar el género epistolar del pasaje.
