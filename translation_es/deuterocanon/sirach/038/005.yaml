base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/005.yaml
  text: Was not water made sweet by wood[c][b][a], in order to make his power known to every person?
  footnotes:
  - marker: a
    text: Or 'its power,' taking the pronoun to refer to the wood; the Hebrew and Greek allow this, though the context favors God's power displayed through the means used.
    reason: alternative_reading
  - marker: b
    text: Likely alludes to the episode in which bitter water was made sweet by means of wood (Exod 15:25).
    reason: cross_reference
  - marker: c
    text: Hebrew 'every man' uses a masculine singular term for humanity in general.
    reason: cultural_note
