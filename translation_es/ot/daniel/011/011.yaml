translation:
  language: es
  text: Entonces el rey del Sur se enfurecerá[a] y saldrá y peleará con él[b], con el rey del Norte; y levantará una gran multitud, pero la multitud será entregada en su poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se agitará» / «se amargará». El verbo hebreo comunica una agitación interior intensa que conduce a la acción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «peleará con él, con el rey del Norte»; es decir, entablará batalla contra él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתְמַרְמַר
  english_pob_choice: will become enraged
  chosen_spanish: se enfurecerá
  alternatives_spanish:
  - se agitará
  - se amargará
  - se irritará
  lexicon: HALOT
  rationale: El hitpael comunica agitación interior intensa que conduce a acción. «Se enfurecerá» expresa bien esa fuerza emotiva en español natural sin perder el matiz reflexivo/cursivo del hebreo.
- source_word: מֶלֶךְ הַנֶּגֶב
  english_pob_choice: the king of the South
  chosen_spanish: el rey del Sur
  alternatives_spanish:
  - el rey meridional
  lexicon: HALOT
  rationale: Es el título geopolítico estable de Daniel 11. «Del Sur» conserva la forma tradicional de designación direccional y es más natural en español bíblico.
- source_word: וְיָצָא
  english_pob_choice: he will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - marchará
  - saldrá a campaña
  lexicon: HALOT
  rationale: El verbo literalmente significa «salir». En contexto militar, «saldrá» es fiel y claro; «marchará» añadiría un matiz no explícito del hebreo.
- source_word: וְנִלְחַם עִמּוֹ
  english_pob_choice: fight with him
  chosen_spanish: peleará con él
  alternatives_spanish:
  - combatirá contra él
  - hará guerra con él
  lexicon: HALOT
  rationale: El verbo expresa entablar combate. «Peleará con él» sigue de cerca la estructura y mantiene la relación directa con el pronombre del verso.
- source_word: עִם מֶלֶךְ הַצָּפוֹן
  english_pob_choice: with the king of the North
  chosen_spanish: con el rey del Norte
  alternatives_spanish:
  - contra el rey del Norte
  lexicon: HALOT
  rationale: El hebreo usa עִם («con»), y la POB inglesa conserva esa forma por fidelidad sintáctica. En español también se mantiene la construcción, aunque el contexto bélico deja claro el sentido hostil.
- source_word: וְהֶעֱמִיד
  english_pob_choice: he will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - reunirá
  - musterizará
  lexicon: HALOT
  rationale: El hifil de עמד puede significar poner en pie, levantar o reunir. «Levantará» conserva la imagen verbal y funciona bien con «multitud» en español.
- source_word: הָמוֹן רָב
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - un gran ejército
  - una gran muchedumbre
  lexicon: HALOT
  rationale: הָמוֹן denota una masa o multitud; «multitud» reproduce mejor esa amplitud que «ejército», que sería más interpretativo. «Gran» mantiene el énfasis cuantitativo del adjetivo.
- source_word: וְנִתַּן הֶהָמוֹן בְּיָדוֹ
  english_pob_choice: but the multitude will be given into his hand
  chosen_spanish: pero la multitud será entregada en su mano
  alternatives_spanish:
  - y la multitud será entregada en su mano
  - pero la multitud caerá en su poder
  lexicon: HALOT
  rationale: El nifal de נתן expresa ser entregado. Se preserva el hebraísmo «en su mano» por su valor idiomático de dominio/poder, y se mantiene el contraste adversativo del contexto con «pero».
theological_decisions:
- issue: El idiomático «en su mano»
  english_pob_reading: '''Into his hand'' is a Hebrew idiom meaning ''into his power.'''
  chosen_spanish_reading: «en su mano» se conserva como modismo hebreo que implica dominio o control
  alternative_spanish_readings:
  - «en su poder»
  - «a su dominio»
  rationale: La POB inglesa preserva la imagen y explica su sentido. En español, «en su mano» es igualmente comprensible dentro del registro bíblico y conserva la metáfora de autoridad sin despojarla de su fuerza idiomática.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una repetición de 'he will' por fluidez, sin cambiar el sentido. La versión española sigue ese mismo ajuste estilístico con una sola coordinación verbal fluida («saldrá y peleará», «levantará»), sin introducir cambios sustantivos de contenido.
  spanish_consistency_notes:
  - Se mantiene «rey del Sur» / «rey del Norte» como títulos direccionales estables en Daniel 11.
  - Se conserva «en su mano» para reflejar el hebraísmo y su sentido de poder o dominio.
  - Se traduce el tono adversativo con «pero» para reproducir el contraste implícito del hebreo y de la POB inglesa.
