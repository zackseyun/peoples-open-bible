translation:
  language: es
  text: y para el altar del incienso, oro refinado por peso; y para el modelo del carro[a], los querubines de oro con las alas extendidas y cubriendo[b] el arca del pacto de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el plan del carro'; la frase hebrea es difícil y puede referirse a la estructura de trono-carro de los querubines asociada con el arca.
    reason: alternative_reading
  - marker: b
    text: Hebreo 'cubriendo' o 'haciendo sombra sobre'; la imagen es la de los querubines con las alas extendidas sobre el arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: el altar del incienso
  alternatives_spanish:
  - el altar de incienso
  - el altar para el incienso
  lexicon: HALOT
  rationale: Conserva la relación constructa y el objeto cultual específico sin volverla demasiado interpretativa. 'Del incienso' es natural en español y mantiene la referencia técnica.
- source_word: זָהָב מְזֻקָּק
  english_pob_choice: refined gold
  chosen_spanish: oro refinado
  alternatives_spanish:
  - oro puro
  - oro purificado
  lexicon: HALOT
  rationale: '''Refinado'' reproduce bien la idea de metal depurado/purificado y evita añadir una noción absoluta de pureza que es ligeramente más interpretativa.'
- source_word: בַּמִּשְׁקָל
  english_pob_choice: by weight
  chosen_spanish: por peso
  alternatives_spanish:
  - según el peso
  - a peso
  lexicon: HALOT
  rationale: '''Por peso'' es breve y fiel al valor de asignación medida de la expresión hebrea.'
- source_word: תַבְנִית
  english_pob_choice: the pattern
  chosen_spanish: la figura
  alternatives_spanish:
  - el patrón
  - el modelo
  lexicon: HALOT
  rationale: En este contexto difícil, 'figura' permite aludir a la configuración visual del objeto sin cerrar prematuramente la ambigüedad de diseño/representación. Mantiene apertura para la conexión con la estructura querúbica.
- source_word: הַמֶּרְכָּבָה
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carruaje
  - el carro-throno
  lexicon: HALOT
  rationale: '''Carro'' es el equivalente español más directo y transparente para el sustantivo, conservando la dificultad del pasaje sin resolverla de forma excesivamente explicativa.'
- source_word: הַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubes
  lexicon: HALOT
  rationale: '''Querubines'' es la forma técnica usual en español para el plural bíblico y preserva el término especializado.'
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro fino
  lexicon: HALOT
  rationale: La construcción 'de oro' expresa de forma natural el material de los querubines, sin añadir matiz ornamental no explicitado.
- source_word: לְפֹרְשִׂים
  english_pob_choice: spreading out their wings
  chosen_spanish: con las alas extendidas
  alternatives_spanish:
  - extendiendo sus alas
  - abriendo las alas
  lexicon: HALOT
  rationale: El participio de פרשׂ significa 'extender/poner en ancho'. En español, la mención de alas es contextual pero necesaria para claridad cultual, y 'extendidas' preserva la imagen sin sobreexplicarla.
- source_word: וְסֹכְכִים
  english_pob_choice: and overshadowing
  chosen_spanish: y cubriendo
  alternatives_spanish:
  - y cubriendo por encima
  - y resguardando
  lexicon: HALOT
  rationale: '''Cubriendo'' comunica el movimiento de סכך de manera fiel y clara en español. Mantiene la imagen de los querubines sobre el arca sin forzar una formulación más devocional.'
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahweh
  - el arca del convenio de Yahvé
  lexicon: HALOT
  rationale: '''Pacto'' es el término bíblico más asentado en español para בְּרִית y conserva la fuerza covenantal. ''Yahvé'' sigue el criterio del proyecto para el nombre divino.'
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se adopta 'Yahvé' como forma española estable del nombre divino, en coherencia con la pauta del proyecto de no enmascarar el Tetragrámaton. 'Yahweh' se reserva como transliteración inglesa, y 'el SEÑOR' se evita por el principio de transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Ambigüedad de תַבְנִית הַמֶּרְכָּבָה
  english_pob_reading: the pattern of the chariot
  chosen_spanish_reading: la figura del carro
  alternative_spanish_readings:
  - el patrón del carro
  - el modelo del carro
  - la figura del carro-throno
  rationale: El hebreo es difícil y admite una referencia al armazón/estructura querúbica asociada al arca. 'Figura del carro' conserva la ambigüedad sin resolverla dogmáticamente, y deja abierta la posibilidad de una imagen de trono-carro.
  doctrine_reference: POB lexical note on the cherubim-throne structure associated with the ark
- issue: Imagen de לְפֹרְשִׂים וְסֹכְכִים
  english_pob_reading: spreading out their wings ... overshadowing
  chosen_spanish_reading: con las alas extendidas y cubriendo
  alternative_spanish_readings:
  - extendiendo sus alas y cubriendo
  - con las alas desplegadas y cubriendo
  rationale: La escena cultual requiere explicitar en español que la acción se realiza con alas; 'extendidas' y 'cubriendo' conservan la visualidad del texto y no atenúan el sentido de cobertura sobre el arca.
  doctrine_reference: HALOT; imagery of cherubic wings over the ark
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés revisado: mantiene el orden cultual, conserva la ambigüedad de תַבְנִית הַמֶּרְכָּבָה mediante una formulación breve, y refleja la imagen final de los querubines sobre el arca del pacto de Yahvé sin añadir elementos no atestiguados.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene 'pacto' para בְּרִית por coherencia bíblica y claridad eclesial.
  - '''Querubines'' conserva el término técnico estable en español.'
  - La sintaxis reproduce la coordinación del hebreo sin calco excesivo.
