    rationale: La nota describe una lectura alternativa de una cláusula difícil posterior («Terrores a causa de la espada...»), pero en el borrador está anclada a «Clama». Debe anclarse cerca de «Son entregados a la espada» o de esa cláusula para reflejar fielmente la evidencia y evitar confusión.
  revised_spanish_text: Clama y lamenta, hijo de hombre, porque ha venido sobre mi pueblo; está sobre todos los príncipes de Israel. Son entregados[a] a la espada junto con mi pueblo; por tanto, golpea tu muslo.
  revised_footnotes:
