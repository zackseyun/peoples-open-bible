revisions:
- from: Él fundió cuatro anillos en las cuatro esquinas de la rejilla de bronce, como soportes para las varas[a][b].
  to: Él fundió cuatro anillos en las cuatro esquinas de la rejilla de bronce, como alojamientos para las varas[a][b].
  rationale: Se reemplaza «soportes» por «alojamientos» para reflejar con mayor precisión el valor contextual de בָּתִּים como receptáculos para insertar las varas. También se corrige la nota b para eliminar el anglicismo «fittings» y mantener un español natural y fiel al aparato léxico inglés.
