lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  - se dio cuenta de
  lexicon: HALOT
  rationale: El verbo ראה en narrativa con waw consecutiva expresa el acto básico de ver. En español, «vio» conserva la brevedad y la simetría del hebreo, sin añadir una interpretación más amplia que ya será sugerida por la segunda cláusula.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios de Israel
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere al Dios de Israel; «Dios» es la forma natural y reverente en español. Se mantiene la repetición del sujeto para reflejar el énfasis y el ritmo del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente «hijos de Israel». En español, «hijos de Israel» reproduce con fidelidad la construcción de parentesco y evita aplanarla a un etnónimo menos transparente.
- source_word: וַיֵּדַע
  english_pob_choice: took notice / knew
  chosen_spanish: se dio por enterado
  alternatives_spanish:
  - conoció
  - supo
  - tomó nota
  lexicon: HALOT
  rationale: ידע es literalmente «conocer/saber», pero en este contexto la audit trail inglés subraya el valor idiomático de atención efectiva o toma de nota. «Se dio por enterado» comunica esa respuesta consciente sin convertir el verbo en una explicación más fuerte que el hebreo.
theological_decisions:
- issue: 'El sentido del segundo verbo: ידע sin objeto explícito'
  english_pob_reading: and God took notice / God knew
  chosen_spanish_reading: y Dios se dio por enterado
  alternative_spanish_readings:
  - y Dios supo
  - y Dios conoció
  - y Dios tomó nota
  rationale: El hebreo es breve y deja el objeto implícito. La redacción española mantiene esa tensión con una expresión idiomática que sugiere atención divina sin explicitar demasiado el contenido del «conocer». Así se conserva el peso teológico del texto sin resolverlo de forma interpretativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La base inglesa revisó la última cláusula de «God knew» a «God took notice» para captar con más naturalidad el valor idiomático de וידע. La versión española sigue esa revisión, pero opta por una formulación que conserve tanto la atención divina como la tersura del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al uso POB y a la claridad en español.
  - Se preserva la repetición de «Dios» en ambas cláusulas para reflejar el paralelismo del hebreo.
  - «Hijos de Israel» sigue el patrón literal de la frase hebrea y evita una sustitución etnónima que borre la imagen filial.
  - La segunda cláusula se traduce de forma idiomática pero sobria, sin añadir emociones como «se preocupó» que el texto no expresa explícitamente.
