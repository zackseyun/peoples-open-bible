translation:
  language: es
  text: ¡Presta oído[a], oh Dios, a mi oración, y no te ocultes a mi súplica!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no ignores mi súplica». El verbo hebreo dice literalmente «ocultarse» o «esconderse»; expresa la idea de hacerse inaccesible o de no atender la oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינָה
  english_pob_choice: Give ear
  chosen_spanish: Inclina tu oído
  alternatives_spanish:
  - Escucha
  - Préstame oído
  lexicon: HALOT
  rationale: El hebreo es un imperativo idiomático de atención cuidadosa. «Inclina tu oído» conserva la imagen corporal y el tono orante mejor que un simple «escucha», que en español puede sonar más plano.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Es vocativo directo al Dios de Israel sin el nombre de pacto. En español, «Dios» expresa con naturalidad la dirección del ruego.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: HALOT
  rationale: תְּפִלָּה es el término general para oración. «Oración» es el equivalente natural y digno en español; «plegaria» también sería posible, pero puede sonar algo más marcado estilísticamente.
- source_word: וְאַל
  english_pob_choice: and do not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  lexicon: HALOT
  rationale: La partícula coordinada une la segunda petición a la primera. «Y no» reproduce de forma directa esa coordinación hebrea.
- source_word: תִּתְעַלַּם
  english_pob_choice: hide yourself
  chosen_spanish: te escondas
  alternatives_spanish:
  - te ocultes
  - te apartes
  lexicon: HALOT
  rationale: El verbo reflexivo comunica la idea de hacerse inaccesible u ocultarse. En español, «te escondas» transmite mejor la fuerza relacional que una paráfrasis como «ignores».
- source_word: מִתְּחִנָּתִי
  english_pob_choice: from my supplication
  chosen_spanish: de mi súplica
  alternatives_spanish:
  - de mi ruego
  - de mi petición insistente
  lexicon: HALOT
  rationale: תְּחִנָּה denota una súplica ferviente por favor o misericordia. «Súplica» mantiene el registro formal y la intensidad devocional que la revisión inglesa también buscó preservar.
theological_decisions:
- issue: Si traducir תִּתְעַלַּם como «ignorar» o mantener la imagen de ocultamiento
  english_pob_reading: The Hebrew verb literally means 'hide yourself,' expressing refusal to attend to the prayer.
  chosen_spanish_reading: «No te escondas» conserva la metáfora de inaccesibilidad y deja implícita la idea de no prestar atención.
  alternative_spanish_readings:
  - no ignores
  - no te apartes de
  rationale: El texto hebreo usa una imagen concreta de ocultarse. Traducirla literalmente en español evita aplanar la tensión emocional del salmo; el sentido de desatención queda incluido sin eliminar la figura original.
  doctrine_reference: Salmos 55:2; HALOT sobre עלם en reflexivo
- issue: Cómo reflejar el carácter formal de תְּחִנָּה
  english_pob_reading: '''supplication'' was chosen to more closely reflect תְּחִנָּה and maintain a more formal translation register.'
  chosen_spanish_reading: «súplica»
  alternative_spanish_readings:
  - ruego
  - plegaria
  rationale: «Súplica» conserva mejor el tono elevado y la urgencia reverente del término hebreo, sin introducir un matiz excesivamente coloquial.
  doctrine_reference: Salmos 55:2; uso léxico de תְּחִנָּה
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «plea» por «supplication» para acercarse más a תְּחִנָּה y mantener un registro más formal. Esta propuesta española sigue esa misma decisión al usar «súplica». También preserva la imagen verbal de תִּתְעַלַּם mediante «no te escondas», en continuidad con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en vocativo sin añadir «el» para conservar naturalidad y precisión.
  - Se eligió «oración» para תְּפִלָּתִי y «súplica» para תְּחִנָּתִי, distinguiendo el término general del más intenso.
  - Se evitó «SEÑOR» porque el hebreo aquí usa אֱלֹהִים, no el nombre del pacto.
  - La puntuación refleja dos peticiones coordinadas por «y», como en el hebreo.
