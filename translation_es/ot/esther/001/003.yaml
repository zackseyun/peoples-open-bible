    text: O «una fiesta»; el término hebreo puede designar un banquete caracterizado por bebida y celebración.
    reason: lexical_alternative
  - marker: b
    text: O «los nobles de Persia y Media».
    reason: lexical_alternative
  - marker: c
    text: Es decir, delante de él.
    reason: lexical_alternative
