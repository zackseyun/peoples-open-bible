translation:
  language: es
  text: La violencia ha surgido como vara de maldad; no queda ninguno de ellos[a], ni de su multitud, ni de su riqueza[b], y no hay eminencia entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente pero con menos claridad: «no de ellos, y no de su multitud, y no de su abundancia o tumulto». El hebreo de estas cláusulas es elíptico y difícil.'
    reason: alternative_reading
  - marker: b
    text: Los términos hebreos en las dos últimas cláusulas son inciertos; «riqueza» también puede entenderse como «abundancia» o «tumulto», y «eminencia» puede rendirse también como «preeminencia», y algunos entienden la frase de otra manera.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָמָס
  english_pob_choice: Violence
  chosen_spanish: la violencia
  alternatives_spanish:
  - violencia
  - la violencia injusta
  - el daño violento
  lexicon: HALOT
  rationale: חָמָס nombra violencia, injusticia violenta o agravio. «La violencia» conserva el sustantivo fuerte del hebreo y su tono personificado al inicio de la cláusula, sin suavizarlo con un giro explicativo.
- source_word: קָם
  english_pob_choice: has arisen
  chosen_spanish: ha surgido
  alternatives_spanish:
  - ha surgido
  - se ha levantado
  - ha aparecido
  lexicon: HALOT
  rationale: El perfecto qal de קום expresa aquí irrupción o alzamiento. «Ha surgido» es natural en español y mantiene la imagen de algo que aparece y toma prominencia.
- source_word: לְמַטֵּה
  english_pob_choice: into a rod
  chosen_spanish: en vara
  alternatives_spanish:
  - en vara
  - como vara
  - para vara
  lexicon: HALOT
  rationale: El prefijo ל en este contexto se entiende de modo direccional o resultativo. «En vara» refleja de cerca la imagen de transformación/metáfora sin forzar una paráfrasis demasiado libre. «Vara» comunica el instrumento de disciplina o dominio.
- source_word: רֶשַׁע
  english_pob_choice: of wickedness
  chosen_spanish: de maldad
  alternatives_spanish:
  - de maldad
  - de impiedad
  - de perversidad
  lexicon: HALOT
  rationale: רֶשַׁע denota maldad o impiedad moral. «De maldad» conserva la fuerza ética del constructo y es claro para lector moderno.
- source_word: לֹא מֵהֶם
  english_pob_choice: none of them remains
  chosen_spanish: no queda ninguno de ellos
  alternatives_spanish:
  - nada de ellos
  - ninguno de ellos
  - no procede de ellos
  lexicon: HALOT
  rationale: El hebreo es elíptico y difícil, con frases preposicionales negadas. En contexto de juicio, el sentido es que nada de ellos subsiste. «No queda ninguno de ellos» hace inteligible la elipsis sin perder la idea de desaparición.
- source_word: וְלֹא מֵהֲמוֹנָם
  english_pob_choice: none of their multitude
  chosen_spanish: ni de su multitud
  alternatives_spanish:
  - ni de su multitud
  - ni de su abundancia
  - ni de su gentío
  lexicon: HALOT
  rationale: הָמוֹן puede significar multitud, abundancia o gentío tumultuoso. «Multitud» sigue de cerca la lectura del POB en inglés y mantiene el progreso del listado hacia la pérdida total.
- source_word: וְלֹא מֶהֱמֵהֶם
  english_pob_choice: none of their wealth
  chosen_spanish: ni de su abundancia
  alternatives_spanish:
  - ni de su riqueza
  - ni de su abundancia
  - ni de su tumulto
  lexicon: HALOT
  rationale: La forma es oscura y admite varias propuestas. «Abundancia» conserva la amplitud semántica sugerida por el hebreo y evita concretar indebidamente como «riqueza» cuando el texto puede abarcar más que posesiones monetarias.
- source_word: וְלֹא נֹהַּ בָּהֶם
  english_pob_choice: and there is no eminence among them
  chosen_spanish: y no hay eminencia entre ellos
  alternatives_spanish:
  - y no hay preeminencia entre ellos
  - y no hay belleza entre ellos
  - y no hay lamento entre ellos
  lexicon: HALOT
  rationale: נֹהַּ es un término raro y discutido. «Eminencia» conserva la lectura contextual de algo elevado o distinguido que no permanece. Se mantiene la ambigüedad con el mínimo necesario para la lectura en español.
theological_decisions:
- issue: Cómo reflejar una serie hebrea elíptica y oscura en un oráculo de juicio
  english_pob_reading: Render the verse as a declaration that violence has become the instrument of wickedness and that nothing of the people, their multitude, their wealth, or their eminence will remain.
  chosen_spanish_reading: 'La violencia se presenta como instrumento de maldad, y bajo el juicio no permanece nada de ellos: ni su número, ni su abundancia, ni lo que los distinguía.'
  alternative_spanish_readings:
  - 'Mantener una versión más literal y opaca: «no de ellos, y no de su multitud, y no de su abundancia, y no ... en ellos»'
  - Entender las frases como énfasis en tumulto social más que en desaparición total
  rationale: 'El texto hebreo es muy difícil y la traducción debe ser inteligible sin inventar contenido doctrinal. La opción elegida sigue la línea del POB en inglés: hace comprensible la elipsis y preserva el peso del juicio total, sin resolver de manera artificial cada término oscuro.'
  doctrine_reference: Principios de traducción POB §§1, 3, 5
- issue: Valor de לְמַטֵּה en la imagen judicial
  english_pob_reading: into a rod of wickedness
  chosen_spanish_reading: en vara de maldad
  alternative_spanish_readings:
  - en vara de maldad
  - como vara de maldad
  - para vara de maldad
  rationale: No se introduce una noción ajena; se conserva la metáfora de instrumento de disciplina/dominio. «En vara» sigue la dirección de la imagen con naturalidad española y evita diluir la relación entre violencia y castigo.
  doctrine_reference: Principios de traducción POB §§2, 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés que ajustó la preposición para reflejar mejor el matiz de לְמַטֵּה como movimiento/resultativo («into a rod»). En español se optó por «en vara», que mantiene la relación metafórica sin perder naturalidad. También se preservó la incertidumbre léxica de las cláusulas finales con una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «maldad» para רֶשַׁע y «violencia» para חָמָס, evitando mezclar con vocablos más eclesiásticos como «iniquidad» salvo necesidad contextual.
  - «Abundancia» se eligió para conservar la amplitud semántica y armonizar con la ambigüedad reconocida en el audit trail.
  - La puntuación sigue el castellano moderno con punto y coma para articular la serie y comas internas para la cadencia profética.
