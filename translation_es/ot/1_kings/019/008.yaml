translation:
  language: es
  text: Entonces se levantó, comió y bebió[a], y fue con la fuerza de aquel alimento cuarenta días y cuarenta noches hasta Horeb, el monte de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con la fuerza de aquella comida». La expresión hebrea se refiere al sustento que recibió de lo que había comido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: So he arose
  chosen_spanish: Entonces se levantó
  alternatives_spanish:
  - Y se levantó
  - Así que se levantó
  lexicon: HALOT
  rationale: El verbo narrativo de קום se expresa naturalmente en español con «se levantó». «Entonces» refleja la secuencia del waw consecutivo sin forzar un calco.
- source_word: וַיֹּאכַל
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - y comió
  lexicon: HALOT
  rationale: אכל se traduce de forma directa y natural como «comió» en español moderno.
- source_word: וַיִּשְׁתֶּה
  english_pob_choice: drank
  chosen_spanish: bebió
  alternatives_spanish:
  - y bebió
  lexicon: HALOT
  rationale: שׁתה corresponde con claridad a «bebió»; mantiene la sencillez narrativa del hebreo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: caminó
  alternatives_spanish:
  - fue
  - anduvo
  - viajó
  lexicon: HALOT
  rationale: Aunque הלך puede ser simplemente «ir», aquí el complemento de duración y el destino favorecen «caminó» para comunicar el desplazamiento prolongado de manera natural en español. No se añade más que lo que el contexto ya implica.
- source_word: בְּכֹחַ
  english_pob_choice: in the strength
  chosen_spanish: con la fuerza
  alternatives_spanish:
  - en la fuerza
  - con el vigor
  lexicon: HALOT
  rationale: El hebreo usa ב con כֹחַ para expresar apoyo o sostén; en español, «con la fuerza» comunica bien la idea de estar sostenido por esa energía/nutrición.
- source_word: הָאֲכִילָה הַהִיא
  english_pob_choice: of that food
  chosen_spanish: de aquel alimento
  alternatives_spanish:
  - de aquella comida
  - de aquel sustento
  lexicon: HALOT
  rationale: אֲכִילָה alude al acto de comer, pero en este contexto el sentido es el alimento/nutrición recibida. «Alimento» preserva esa fuerza sin reducirlo a una comida formal; «aquel» ayuda a mantener la referencia demostrativa del hebreo.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  lexicon: HALOT
  rationale: La fórmula temporal hebrea tiene equivalente directo y tradicional en español; no requiere ajuste interpretativo.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Con un destino, עַד se expresa naturalmente como «hasta», que marca el punto de llegada del viaje.
- source_word: הַר הָאֱלֹהִים
  english_pob_choice: the mountain of God
  chosen_spanish: el monte de Dios
  alternatives_spanish:
  - la montaña de Dios
  lexicon: HALOT
  rationale: Se conserva la construcción genitiva hebrea con «monte de Dios», una fórmula bíblica solemne y clara en español. «Monte» es la opción más usual en este contexto bíblico.
- source_word: חֹרֵב
  english_pob_choice: Horeb
  chosen_spanish: Horeb
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso estándar en español bíblico.
theological_decisions:
- issue: Sentido de הָאֲכִילָה הַהִיא en la expresión de sostén para el viaje
  english_pob_reading: The Hebrew expression refers to the nourishment he received from what he had eaten.
  chosen_spanish_reading: La expresión se entiende como el sustento/nutrición recibidos de lo que había comido.
  alternative_spanish_readings:
  - la comida de la que se alimentó
  - el alimento que recibió
  rationale: La frase no describe solo una acción pasada de comer, sino el efecto nutritivo de esa ingesta sobre el profeta. Traducir «alimento» permite conservar la tensión entre el acto de comer y la fuerza derivada de ese alimento.
  doctrine_reference: Ninguna; decisión lexicográfica y contextual, no doctrinal.
translation_notes:
  revision_awareness: 'Se siguió el consenso del audit trail inglés: mantener el tono narrativo simple, conservar la fórmula idiomática de duración y reflejar el matiz de sostén en בְּכֹחַ הָאֲכִילָה הַהִיא sin sobreinterpretarlo. No se detectaron revisiones textuales relevantes en el expediente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se prefirió «monte de Dios» por la construcción bíblica estable y por correspondencia con el análisis inglés.
  - Se mantuvo «Horeb» como nombre propio sin adaptación.
  - La nota al pie conserva la alternativa léxica importante para la frase de sostén, de acuerdo con el precedente inglés.
