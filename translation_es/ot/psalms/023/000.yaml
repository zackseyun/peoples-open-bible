  text: מִזְמ֥וֹר לְ/דָוִ֑ד יְהוָ֥ה רֹ֝עִ֗/י לֹ֣א אֶחְסָֽר׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/023/000.yaml
  text: A psalm of David[a]. Yahweh is my shepherd[c][b]; I will lack nothing.
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription לְדָוִד can indicate authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD' in English translations.
    reason: lexical_alternative
  - marker: c
    text: Or 'I shall not want'; here 'want' means 'lack,' not 'desire.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:17Z'
    unchanged: false
    changes_summary: 'Completed the verse by adding the omitted main clause: ''Yahweh is my shepherd; I will lack nothing.'' Also rendered יְהוָה as ''Yahweh'' per policy.'
translation:
  language: es
  text: Salmo de David[a]. Yahvé es mi pastor[b]; nada me faltará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el hebreo לְדָוִד puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: Hebreo YHWH; tradicionalmente se traduce «el SEÑOR» en muchas versiones españolas.
    reason: lexical_alternative
  - marker: c
    text: O «no careceré de nada»; aquí la idea expresa carencia, no deseo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Salmo de alabanza
  lexicon: N/A
  rationale: מִזְמוֹר designa un salmo/canto poético para uso litúrgico o devocional; «Salmo» es el equivalente español más natural y transparente.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: N/A
  rationale: La preposición לְ puede indicar autoría, dedicación o asociación; «de David» conserva la ambigüedad documentada sin forzar una sola lectura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: N/A
  rationale: Se sigue la política del proyecto para el nombre divino en español. «Yahvé» mantiene el valor del tetragrámaton sin ocultarlo bajo una sustitución tradicional.
- source_word: רֹעִי
  english_pob_choice: my shepherd
  chosen_spanish: mi pastor
  alternatives_spanish:
  - mi pastor-guía
  - mi pastor que cuida de mí
  lexicon: N/A
  rationale: רֹעֶה/רֹעִי es el pastor literal y figurado que apacienta y cuida; «pastor» conserva la metáfora bíblica directa y es idiomático en español.
- source_word: לֹא אֶחְסָר
  english_pob_choice: I will lack nothing
  chosen_spanish: no me faltará
  alternatives_spanish:
  - nada me faltará
  - no careceré de nada
  lexicon: N/A
  rationale: El sentido de חָסֵר aquí es de carencia, no de deseo. «No me faltará» es breve, natural y conserva la fuerza de suficiencia; la nota explica el matiz lexical.
theological_decisions:
- issue: Nombre divino en el salmo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: Se preserva la referencia explícita al nombre de pacto, evitando la convención de ocultarlo con un título genérico. Esto sigue la decisión editorial del POB en inglés y la política española del proyecto.
  doctrine_reference: Éxodo 3:15; Salmo 23:1
- issue: Suficiencia expresada por חָסֵר
  english_pob_reading: I will lack nothing
  chosen_spanish_reading: no me faltará
  alternative_spanish_readings:
  - no careceré de nada
  - nada me faltará
  rationale: La cláusula expresa confianza en la provisión de Yahvé. «No me faltará» mantiene la idea de ausencia de carencia sin convertirla en una formulación más interpretativa que el hebreo.
  doctrine_reference: Salmo 23:1; Filipenses 4:19
translation_notes:
  revision_awareness: La revisión reciente completó el enunciado del salmo añadiendo la cláusula principal sobre el pastor y la suficiencia; la presente versión sigue ese texto completo y mantiene la traducción explícita de YHWH como nombre propio.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se evita «SEÑOR» para no enmascarar el nombre divino.
  - «Pastor» conserva la metáfora sin explicación intrusiva en el texto principal.
  - La nota sobre לְדָוִד conserva la ambigüedad de autoría/dedicación/ asociación.
  - La nota sobre «faltará» preserva el sentido de carencia documentado en el audit trail.
