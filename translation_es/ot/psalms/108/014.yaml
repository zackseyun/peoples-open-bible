translation:
  language: es
  text: Con Dios actuaremos con valentía[a], y él pisoteará a nuestros enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por Dios haremos hechos poderosos»; el modismo hebreo puede enfatizar fuerza, valor o acción victoriosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  english_pob_choice: With God
  chosen_spanish: Con Dios
  alternatives_spanish:
  - Por Dios
  - En Dios
  lexicon: HALOT
  rationale: La preposición ב aquí expresa acompañamiento o medio de acción. «Con Dios» comunica bien la dependencia y la asociación sin forzar una lectura demasiado técnica como «por medio de Dios».
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - haremos obra
  - actuaremos
  lexicon: HALOT
  rationale: El imperfecto qal de עשה expresa aquí acción futura o de compromiso. «Haremos» es natural en español y conserva la acción del sujeto colectivo.
- source_word: חָיִל
  english_pob_choice: valiantly
  chosen_spanish: proezas
  alternatives_spanish:
  - hazañas
  - acto de valor
  - valerosamente
  lexicon: HALOT
  rationale: El hebreo puede aludir a fuerza, valor o hazañas victoriosas. En español, «proezas» transmite mejor una acción de bravura o victoria que un adverbio mecánico como «valientemente», y mantiene el matiz militar del contexto. La nota de la POB en inglés preserva esta ambigüedad semántica.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - pero él
  - y él mismo
  lexicon: HALOT
  rationale: Se conserva la coordinación simple y el cambio de sujeto desde la acción comunitaria hacia la acción decisiva de Dios.
- source_word: יָבוּס
  english_pob_choice: will trample
  chosen_spanish: pisoteará
  alternatives_spanish:
  - derribará
  - aplastará
  - hollará
  lexicon: HALOT
  rationale: בוס significa pisotear o hollar. «Pisoteará» es directo, vívido y fiel al campo semántico de derrota militar.
- source_word: צָרֵינוּ
  english_pob_choice: our foes
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - nuestros adversarios
  - nuestros foes
  lexicon: HALOT
  rationale: El sustantivo designa a los hostiles. «Enemigos» es el equivalente más claro y natural en español bíblico contemporáneo; «adversarios» sería más formal pero un poco menos enfático.
theological_decisions:
- issue: Agencia humana y divina en la victoria
  english_pob_reading: The verse presents both human action ('we will do valiantly') and divine action ('he will trample our foes') without collapsing one into the other.
  chosen_spanish_reading: El texto mantiene tanto la acción valiente del pueblo («haremos proezas») como la acción decisiva de Dios («él pisoteará a nuestros enemigos») sin confundirlas.
  alternative_spanish_readings:
  - Una formulación que atribuya toda la victoria solo a Dios
  - Una formulación que reduzca a Dios a mero apoyo humano
  rationale: 'El hebreo presenta una tensión intencional: el pueblo actúa con valentía en dependencia de Dios, y Dios mismo consumará la derrota del enemigo. La traducción conserva ambas afirmaciones en paralelo.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantuvo sin cambios y recibió acuerdo alto en la revisión cruzada; no se documentaron revisiones aplicadas. La presente redacción española sigue esa lectura estable y conserva la alternativa semántica de חָיִל mediante una nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים según la convención del proyecto.
  - Se conserva la distinción entre la acción del pueblo y la acción de Dios.
  - «Enemigos» mantiene el tono bíblico claro y no introduce una reinterpretación más abstracta.
  - La nota al pie en español refleja la alternativa inglesa «Through God we will do mighty deeds» sin convertirla en paráfrasis doctrinal.
