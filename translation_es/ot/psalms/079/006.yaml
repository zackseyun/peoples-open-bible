review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo en la mayor parte: ''Derrama tu ira'' corresponde fielmente a שְׁפֹךְ חֲמָתְךָ; ''las naciones'' y ''los reinos'' preservan el paralelismo de הַגּוֹיִם / מַמְלָכוֹת; ''que no te conocen'' mantiene adecuadamente el valor abierto y relacional de יָדַע. La principal desviación está en la segunda cláusula: el hebreo dice literalmente ''no llamaron/llaman en tu nombre'' dentro del modismo קרא בשם, y el English POB fijó ''call on your name'' como texto principal, con ''invoke'' solo como alternativa. El español principal ''no invocan tu nombre'' comunica bien el sentido cultual, pero mueve al texto principal una interpretación que en el rastro auditado quedó como alternativa. Conviene acercarlo más al modismo base en español: ''no llaman a tu nombre'' sería torpe, pero ''no claman a tu nombre'' o mejor ''no claman a tu nombre'' no es idéntico al idiom. La solución más fiel y natural es ''no claman a ti por tu nombre'' no suena bien.
    En español bíblico natural, ''no invocan tu nombre'' es idiomático; por eso la revisión será mínima y se centrará en las notas, aclarando el modismo y evitando una nota redundante idéntica al texto principal.'
  spanish_quality_summary: El español es claro, digno y legible. 'Derrama tu ira sobre las naciones' fluye bien. La frase 'que no invocan tu nombre' es buena español bíblico contemporáneo. Sin embargo, la nota [b] es problemática porque ofrece como alternativa exactamente la misma redacción que ya aparece en el texto principal, lo cual invalida la función de la nota. Además, la explicación 'llamar sobre el nombre' suena poco natural en español; conviene explicar el modismo como 'llamar al nombre' o mejor 'invocar el nombre', con referencia a oración o adoración.
  glossary_alignment: 'No hay conflicto con la terminología de proyecto. No aparece Yahvé ni Mesías. Las elecciones ''ira'', ''naciones'', ''reinos'' y ''conocen'' se alinean bien con las decisiones léxicas documentadas. La única tensión es metodológica: el English POB privilegió mantener el modismo ''call on your name'' en el texto principal, mientras el español lo resolvió como ''invocan tu nombre''. Dado que esa resolución es idiomáticamente superior en español, puede mantenerse, pero la nota debe ajustarse para preservar la alternativa significativa en vez de repetir el texto.'
  issues:
  - severity: medium
    issue: La nota [b] repite exactamente el texto principal.
    rationale: Una nota de alternativa léxica no debe ofrecer la misma formulación que ya está en el cuerpo del texto; así se pierde información y no se preserva la alternativa auditada.
  - severity: low
    issue: 'La explicación de la nota [b] usa una formulación poco natural: ''llamar sobre el nombre''.'
    rationale: Aunque intenta reflejar el modismo hebreo, en español esa explicación resulta extraña. Conviene explicarlo con lenguaje más natural sin perder el sentido de oración/invocación.
  revised_spanish_text: Derrama tu ira sobre las naciones[a] que no te conocen, y sobre los reinos que no invocan tu nombre[b].
  revised_footnotes:
  - marker: a
    text: O 'que no te reconocen'. El hebreo 'conocer' puede implicar reconocimiento relacional, no solo conocimiento intelectual.
    reason: lexical_alternative
  - marker: b
    text: O 'que no llaman a tu nombre'. El modismo hebreo se refiere a invocarlo en oración o adoración.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, porque es fiel, claro y natural en español, pero se corrige la nota [b] para que ofrezca una alternativa real y explique el modismo de manera idiomática. No se requiere cambiar la redacción principal.
