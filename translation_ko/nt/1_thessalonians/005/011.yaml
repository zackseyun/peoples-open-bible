  - 한 사람 한 사람을 세워 주십시오
  lexicon: BDAG
  rationale: 「한 사람씩 다른 한 사람을」 구조를 「한 사람씩 서로를」로 옮겨 일대일 격려의 어감을 살린다. οἰκοδομέω의 「세움」 비유 보존.
