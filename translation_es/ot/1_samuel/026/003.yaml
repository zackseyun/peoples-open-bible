revisions:
- from: Y Saúl acampó en el collado de Hachilá[a], que está frente a Jesimón, junto al camino. Pero David permanecía en el desierto, y vio que Saúl había venido tras él al desierto.
  to: Y Saúl acampó en la colina de Hachilá[a], que está frente a Jesimón, junto al camino. Y David estaba en el desierto, y vio que Saúl había venido tras él al desierto.
  rationale: 'Se ajusta el texto para un español más natural y más cercano al valor narrativo del hebreo: «colina» mejora la claridad, se elimina el contraste excesivo de «Pero», y «estaba» refleja mejor יֹשֵׁב en contexto locativo. Se conserva la nota sobre la posible lectura genérica de Jesimón, conforme a la auditoría inglesa.'
