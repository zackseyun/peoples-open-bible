    text: O, «tu cadáver no entrará en la tumba de tus padres». El hebreo dice literalmente «no llegará a la tumba de tus padres».
    reason: lexical_alternative
  revision_rationale: Se ajusta una construcción española torpe («acerca del cual él te dijo») a una forma más natural y fiel («respecto al cual él te dijo»), sin alterar el sentido auditado. También se reubica correctamente la nota al verbo final que sí está en discusión léxica.
