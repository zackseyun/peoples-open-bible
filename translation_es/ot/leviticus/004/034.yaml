translation:
  language: es
  text: Entonces el sacerdote tomará algo de la sangre de la ofrenda por el pecado[a] con su dedo, y la pondrá sobre los cuernos del altar del holocausto, y derramará toda su sangre al pie del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por la purificación». El término hebreo puede designar la ofrenda ofrecida en relación con el pecado y la purificación ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - y ... tomará
  - y tomó
  lexicon: HALOT
  rationale: El waw con qatal continúa la secuencia ritual instructiva; «Entonces ... tomará» conserva el valor procedimental y suena natural en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el cura
  lexicon: HALOT
  rationale: «Sacerdote» es la equivalencia directa y clara para el oficiante cultual; «cura» no corresponde al registro bíblico y eclesial neutro buscado.
- source_word: מִדַּם
  english_pob_choice: some of the blood
  chosen_spanish: algo de la sangre
  alternatives_spanish:
  - parte de la sangre
  - de la sangre
  lexicon: HALOT
  rationale: La preposición מִן es partitiva aquí; en español «algo de» expresa de manera natural que se toma solo una porción de la sangre.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  - la ofrenda por el pecado / purificación
  lexicon: HALOT
  rationale: Se mantiene la lectura sacrificial establecida en la POB inglesa. «Ofrenda por el pecado» es idiomática y fiel; no se impone «purificación» en el texto principal, pero se preserva la tensión léxica mediante la nota.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - con el dedo
  - por medio de su dedo
  lexicon: HALOT
  rationale: La bet instrumental se traduce de forma directa y natural con «con su dedo».
- source_word: וְנָתַן
  english_pob_choice: and put it
  chosen_spanish: y la pondrá
  alternatives_spanish:
  - y la aplicará
  - y la colocará
  lexicon: HALOT
  rationale: En este contexto ritual, נתן se expresa bien como «poner»; el objeto femenino concuerda con «la sangre».
- source_word: עַל קַרְנֹת מִזְבַּח הָעֹלָה
  english_pob_choice: on the horns of the altar of burnt offering
  chosen_spanish: sobre los cuernos del altar del holocausto
  alternatives_spanish:
  - sobre los cuernos del altar para holocausto
  - sobre los cuernos del altar del holocausto
  lexicon: HALOT
  rationale: Se conserva la imagen cultual de los «cuernos» y se traduce הָעֹלָה con el término bíblico tradicional «holocausto», que en español eclesial expresa el altar asociado al sacrificio entero quemado.
- source_word: וְאֶת כָּל דָּמָהּ
  english_pob_choice: and all its blood
  chosen_spanish: y toda su sangre
  alternatives_spanish:
  - y toda la sangre de ella
  - y la sangre completa
  lexicon: HALOT
  rationale: El hebreo indica totalidad; en español, «toda su sangre» reproduce bien la referencia al sacrificio sin necesidad de explicitar en el texto principal la sangre restante.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: he shall pour out
  chosen_spanish: derramará
  alternatives_spanish:
  - verterá
  - echará
  lexicon: HALOT
  rationale: «Derramar» es la opción natural y cultual para שפך en este pasaje, evitando un matiz demasiado técnico o accidental.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  english_pob_choice: at the base of the altar
  chosen_spanish: al pie del altar
  alternatives_spanish:
  - en la base del altar
  - junto a la base del altar
  lexicon: HALOT
  rationale: יְסוֹד significa base/fundamento; «al pie del altar» es una formulación clara y tradicional en español, equivalente a la idea de la base.
theological_decisions:
- issue: חַטָּאת como nombre de la ofrenda
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  - ofrenda por el pecado/purificación
  rationale: La POB inglesa conserva «sin offering» en el texto y anota la alternativa «purification offering». En español, «ofrenda por el pecado» mantiene la lectura principal y la nota preserva la alternativa contextual sin borrar la tensión léxica del término.
  doctrine_reference: Levitical sacrificial terminology; translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La comparación con la POB inglesa y el control cruzado indican alta concordancia, sin cambios editoriales necesarios respecto del contenido base: se mantiene la secuencia ritual, la referencia a los cuernos del altar, y la ambigüedad léxica de חַטָּאת queda registrada en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponde al tetragrámaton; este versículo no lo contiene.
  - Se mantiene «ofrenda por el pecado» en el texto principal por coherencia con el uso sacrificial de la POB inglesa, con nota para la alternativa «purificación».
  - «Holocausto» se emplea como término cultual tradicional en español para הָעֹלָה, equivalente al altar del burnt offering de la POB inglesa.
  - La puntuación y el orden siguen una forma bíblica clara y publicable en español, sin calco rígido del inglés.
