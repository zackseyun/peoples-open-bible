review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y la progresión moral del hebreo: seducción interior del corazón seguida de acecho deliberado a la puerta del רֵעַ. Sin embargo, «ha sido seducido» desplaza ligeramente el matiz de נפתה hacia una seducción más sexualizada y agentiva que el inglés auditado quiso evitar; «ha sido atraído» o «ha sido tentado» sería más cercano, pero para conservar el campo léxico documentado y la nota alternativa, la mejor reparación es «ha sido atraído». Además, «he estado al acecho a la puerta» suena menos idiomático que «he estado al acecho junto a la puerta» o mejor «he acechado a la puerta».'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos detalles mejorables: 1) «seducido por una mujer» puede sonar a acción directa de la mujer, algo que la justificación auditada procuró no enfatizar; 2) «al acecho a la puerta» resulta algo trabado. «Si mi corazón ha sido atraído por una mujer[a], y he acechado a la puerta de mi prójimo[b],» mejora naturalidad y precisión.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. «Corazón» preserva bien לִבִּי; «prójimo» es defendible para רֵעִי en este contexto ético, aunque «vecino» también sería posible. La reparación principal concierne a נִפְתָּה y al giro verbal para אָרָבְתִּי.
  issues:
  - severity: medium
    issue: «ha sido seducido» sobreinterpreta נִפְתָּה
    rationale: El audit trail inglés eligió «has been enticed» para evitar tanto «deceived» como una formulación que atribuya demasiada agencia sexual a la mujer. «Seducido» en español tiende a intensificar ese matiz.
  - severity: low
    issue: «he estado al acecho a la puerta» es poco idiomático
    rationale: Aunque inteligible, la secuencia preposicional suena forzada en español. «He acechado a la puerta» o «he estado al acecho junto a la puerta» fluye mejor y conserva el sentido de ארב.
  - severity: low
    issue: La nota a carece de alternativa equivalente a «has been enticed»
    rationale: La nota actual enumera «engañado», «persuadido» y «seducido», pero omite una opción española que recoja el valor elegido en inglés. Conviene incluir «atraído» para reflejar mejor la decisión léxica principal.
  revised_spanish_text: Si mi corazón ha sido atraído por una mujer[a], y he acechado a la puerta de mi prójimo[b],
  revised_footnotes:
