translation:
  language: es
  text: ¡Alaben a Yah[a]! Alaben el nombre de Yahvé; alaben, ustedes siervos[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¡Alaben a Yah!». Se conserva la forma breve del nombre divino, distinta de «Yahvé» más adelante en el versículo.'
    reason: source_note
  - marker: b
    text: O «esclavos», si se quiere reflejar con más fuerza el valor léxico básico de עבד; aquí se eligió «siervos» por el tono litúrgico del llamado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben! / alaben
  alternatives_spanish:
  - ¡Alaben!
  - ¡Den alabanza!
  - ¡Alaben ustedes!
  lexicon: HALOT
  rationale: El imperativo plural piel de הלל convoca a la alabanza directa. En español, «alaben» conserva el mandato plural y el valor de alabanza sin añadir material ajeno al texto.
- source_word: יָ֨הּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Aquí aparece la forma breve poética del nombre divino, distinta del tetragrámaton que sigue después. Mantener «Yah» preserva esa diferencia y el eco litúrgico de «¡Aleluya!».
- source_word: אֶת שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahvé
  - el nombre de Yahvéh
  lexicon: HALOT
  rationale: La construcción hebrea señala el nombre divino como objeto directo de la alabanza. «El nombre de Yahvé» reproduce de manera transparente esa relación y conserva el valor del nombre propio revelado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio de la obra para el tetragrámaton: transliteración del nombre divino en lugar de la sustitución por un título. En español, «Yahvé» es la forma preferida por la línea terminológica del proyecto y resulta legible para el público eclesial.'
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - sirvientes
  - siervos
  lexicon: HALOT
  rationale: Aunque el término puede abarcar esclavitud, aquí funciona como vocativo honorífico dentro de una exhortación litúrgica. En español, «siervos» conserva esa relación de pertenencia y servicio sin sonar tan chocante como «esclavos» en un llamado coral.
theological_decisions:
- issue: Diferencia entre la forma breve divina יָהּ y el tetragrámaton יְהוָה en el mismo verso
  english_pob_reading: Render יָהּ as 'Yah' and יְהוָה as 'Yahweh'
  chosen_spanish_reading: Renderizar יָהּ como «Yah» y יְהוָה como «Yahvé»
  alternative_spanish_readings:
  - Renderizar ambos como «el SEÑOR»
  - Renderizar ambos como «Yahvé»
  rationale: El hebreo distingue dos formas relacionadas pero no idénticas. La traducción española debe dejar visible esa distinción porque afecta tanto al sentido poético como a la observación del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5; Contested terms table for יְהוָה YHWH'
- issue: Valor de עַבְדֵי en un contexto de alabanza
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - esclavos
  - servidores
  rationale: El vocativo no enfatiza condición servil degradada, sino pertenencia y lealtad al Dios de Israel. «Siervos» preserva esa tensión sin borrar la fuerza relacional del término.
  doctrine_reference: 'DOCTRINE.md: lexical force of δοῦλος/עבד in context-sensitive renderings'
translation_notes:
  revision_awareness: La revisión en inglés eliminó el objeto añadido «him» después del tercer «praise» porque no está en el hebreo. La versión española evita también cualquier objeto implícito añadido y conserva los tres llamados imperativos del verso, con la dirección explícita a los siervos de Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yah» para יָהּ y «Yahvé» para יְהוָה, siguiendo la distinción del hebreo y la política del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino en el texto principal.
  - «Siervos» se usa aquí por el contexto de exhortación litúrgica; no se impone como equivalente universal de עבד.
  - La puntuación con punto y coma reproduce la estructura de dos hemistiquios y una nueva exhortación final.
