  language: en
  yaml_path: translation/ot/numbers/020/014.yaml
  text: 'Then Moses sent messengers from Kadesh to the king of Edom: “Thus says your brother Israel: You know all the hardship that has come upon us.”[a][b][c]'
  footnotes:
  - marker: a
    text: Or “your kinsman Israel.” The Hebrew uses familial language, “your brother Israel,” invoking the ancestral relationship between Edom and Israel.
    reason: lexical_alternative
  - marker: b
    text: Or “all the trouble” or “all the distress.”
    reason: lexical_alternative
  - marker: c
    text: Literally “that found us”; that is, “that has come upon us” or “that has befallen us.”
    reason: lexical_alternative
