    rationale: דְּבַר יוֹם בְּיוֹמוֹ, según la auditoría inglesa, apunta a lo requerido para cada día. 'Correspondía' puede sonar más descriptivo que prescriptivo. 'Como requería cada día' preserva mejor el matiz.
