translation:
  language: es
  text: con tres hileras de piedra rodada[a] y una hilera de madera nueva, y que el gasto[b] sea cubierto con fondos de la casa del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra tallada».
    reason: lexical_alternative
  - marker: b
    text: «La casa del rey» probablemente se refiere al tesoro real o a los fondos del rey.
    reason: cultural_note
lexical_decisions:
- source_word: נִדְבָּכִין
  english_pob_choice: layers
  chosen_spanish: hileras
  alternatives_spanish:
  - cursos
  - capas
  lexicon: HALOT
  rationale: El término se refiere a filas o estratos de mampostería en una construcción. 'Hileras' comunica bien la imagen arquitectónica en español sin sonar tan técnico como 'cursos'; 'capas' sería posible, pero menos preciso para albañilería.
- source_word: אֶבֶן גְּלָל
  english_pob_choice: rolled stone
  chosen_spanish: piedra rodada
  alternatives_spanish:
  - piedra labrada
  - piedra tallada
  - piedra hewn
  lexicon: HALOT
  rationale: La evidencia auditada del inglés mantiene la literalidad de 'rolled stone'. En español, 'piedra rodada' conserva esa base léxica sin introducir una interpretación constructiva más fuerte de la necesaria; 'piedra labrada/tallada' sería más interpretativa.
- source_word: תְּלָתָא
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - '3'
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: וְנִדְבָּךְ
  english_pob_choice: one layer
  chosen_spanish: una hilera
  alternatives_spanish:
  - un curso
  - una capa
  lexicon: HALOT
  rationale: Se mantiene la misma terminología constructiva que en la primera cláusula para reflejar la repetición singular del sustantivo.
- source_word: אָע חֲדַת
  english_pob_choice: new timber
  chosen_spanish: madera nueva
  alternatives_spanish:
  - madera fresca
  - madera nueva de construcción
  - maderos nuevos
  lexicon: HALOT
  rationale: אָע denota madera/timber. En español, 'madera nueva' es natural y fiel; 'timber' no es idiomático para la mayoría de lectores, y 'maderos' añadiría matiz no requerido.
- source_word: נִפְקְתָא
  english_pob_choice: the expense
  chosen_spanish: el gasto
  alternatives_spanish:
  - la expense
  - el costo
  - la erogación
  lexicon: HALOT
  rationale: El sustantivo alude a desembolso o gasto. 'Gasto' es claro y formal en castellano administrativo; 'costo' también sería posible, pero 'gasto' encaja mejor con la idea de desembolso a cargo del tesoro real.
- source_word: מִן בֵּית מַלְכָּא
  english_pob_choice: from the king’s house
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del tesoro del rey
  - del palacio del rey
  - de la hacienda del rey
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'casa del rey' como en el inglés auditado, evitando sustituirla por una identificación interpretativa ('tesoro') en el texto principal.
- source_word: תִּתְיְהִב
  english_pob_choice: let ... be given
  chosen_spanish: sea pagado
  alternatives_spanish:
  - sea dado
  - sea provisto
  - debe pagarse
  lexicon: HALOT
  rationale: En este decreto administrativo, el sentido es que el gasto sea sufragado. 'Sea pagado' expresa bien la obligación práctica en español y corresponde al ajuste inglés reciente hacia 'expense be paid'.
theological_decisions:
- issue: Sentido de 'la casa del rey'
  english_pob_reading: Likely refers to the royal treasury or royal funds, while preserving the literal expression.
  chosen_spanish_reading: Se conserva 'la casa del rey' en el texto principal, sin convertirla en 'tesoro' o 'hacienda'.
  alternative_spanish_readings:
  - el tesoro del rey
  - los fondos reales
  - la hacienda del rey
  rationale: La expresión aramea es literal y el audit trail inglés decide mantenerla abierta, con nota cultural. En español conviene igualmente preservar la forma literal en el versículo, dejando la posible referencia económica en nota para no borrar la tensión entre expresión e implicación administrativa.
  doctrine_reference: Principio de transparencia textual y prudencia exegética en términos administrativos del AT
translation_notes:
  revision_awareness: El inglés auditado pasó de 'dressed stone' a 'rolled stone' para mayor cercanía léxica y de 'cost be given' a 'expense be paid' por naturalidad. La versión española sigue esa revisión reciente, pero evita sobreinterpretar 'rolled' como piedra labrada y conserva 'casa del rey' con nota cultural, tal como el inglés auditado. No se incorpora ninguna decisión doctrinal adicional no sustentada por el texto.
  spanish_consistency_notes:
  - Se usa 'gasto' para נִפְקְתָא, manteniendo el registro administrativo del decreto.
  - Se usa 'madera' y no 'maderos' o 'leña', porque el contexto es de construcción.
  - Se preserva la literalidad de 'casa del rey' en el texto principal para respetar el paralelismo con el audit trail inglés.
  - El artículo y la sintaxis española se ajustan para sonar naturales sin expandir el contenido del hebreo/aramaico.
