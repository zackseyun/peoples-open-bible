  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלוֹהַ -> «Dios», מֵעֹשֵׂהוּ -> «su Hacedor», יִטְהַר -> «ser puro». No aparece ningún término sensible del glosario general que requiera excepción. La decisión de mantener «justo» para יִצְדָּק es aceptable en español en este contexto, aunque con matiz forense implícito.'
