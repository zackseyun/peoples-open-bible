translation:
  language: es
  text: Den gracias a Yahvé[a]; invoquen su nombre; den a conocer entre los pueblos sus hazañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El texto principal sigue la norma del proyecto de renderizar el nombre divino como «Yahvé», no como un título sustituto.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Confiesen
  - Den alabanza
  lexicon: HALOT
  rationale: En contextos de salmo y acción de gracias, el imperativo hifil de ידה expresa dar gracias o alabar. «Den gracias» conserva el valor de agradecimiento sin perder el matiz cultual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo nombra directamente a יהוה. La política española del proyecto usa «Yahvé» como forma transparente del nombre divino, evitando la sustitución por un título.
- source_word: קִרְאוּ בִּשְׁמוֹ
  english_pob_choice: call on his name
  chosen_spanish: invoquen su nombre
  alternatives_spanish:
  - llamen su nombre
  - llamen en su nombre
  - clamen a su nombre
  lexicon: HALOT
  rationale: Con קרא + בְּשֵׁם, el sentido es invocar o llamar en acto de adoración. «Invoquen su nombre» mantiene el valor devocional y es natural en español.
- source_word: הוֹדִיעוּ
  english_pob_choice: make known
  chosen_spanish: den a conocer
  alternatives_spanish:
  - hagan saber
  - proclamen
  - publiquen
  lexicon: HALOT
  rationale: 'El hifil de ידע conserva fuerza causativa: hacer saber. «Den a conocer» expresa bien esa causatividad en español contemporáneo.'
- source_word: בָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - a los pueblos
  lexicon: HALOT
  rationale: עַמִּים puede referirse a pueblos o naciones. «Entre los pueblos» refleja la preposición ב y mantiene el alcance internacional del mandato.
- source_word: עֲלִילוֹתָיו
  english_pob_choice: his deeds
  chosen_spanish: sus hazañas
  alternatives_spanish:
  - sus hechos
  - sus obras
  - sus actos
  lexicon: HALOT
  rationale: El sustantivo denota acciones realizadas, a menudo notables. «Hazañas» comunica el carácter sobresaliente de las obras de Dios en un registro bíblico natural, sin forzar «mighty acts» que no está explícito en la forma hebrea.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El hebreo usa el Tetragrámaton directamente; el proyecto español sigue la convención transparente «Yahvé» para preservar el nombre pactual de Dios sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés mostró alta concordancia y no requirió revisiones sustanciales; la presente versión mantiene la misma estructura imperativa y la misma secuencia semántica del hebreo, ajustando solo el registro natural del español y la terminología del nombre divino.
  spanish_consistency_notes:
  - Se mantuvo la serie de tres imperativos, paralela al hebreo.
  - «Entre los pueblos» conserva el matiz internacional de בָּעַמִּים sin estrecharlo a un solo referente político.
  - «Hazañas» se eligió por naturalidad bíblica en español, aunque «hechos» o «obras» siguen siendo alternativas posibles.
