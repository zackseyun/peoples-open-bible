    issue: בְּרֹאשׁ se tradujo como 'Al comienzo de'
    rationale: 'En español esto se oye principalmente temporal o secuencial. El hebreo aquí es locativo: el punto principal, cabecera o parte más destacada del espacio público.'
  - severity: medium
    issue: הֹמִיּוֹת se tradujo como 'lugares tumultuosos'
    rationale: Aunque posible, suena abstracto y menos urbano. La auditoría inglesa documenta que el contexto favorece el sentido de calles o zonas bulliciosas de la ciudad.
  - severity: low
    issue: '''a las entradas de las puertas de la ciudad'' es poco idiomático'
    rationale: Es comprensible, pero en español bíblico-natural funciona mejor 'en las entradas de las puertas de la ciudad' o 'a la entrada de las puertas de la ciudad'. Además preserva mejor el valor locativo.
  - severity: low
    issue: La nota c usa 'dice sus dichos'
    rationale: Es aceptable como alternativa literalizante, pero en español suena menos natural que 'dice sus palabras', que además refleja mejor la nota inglesa sobre el hebreo literal.
