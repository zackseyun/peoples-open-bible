translation:
  language: es
  text: 'Entonces ella tomó la sartén y vertió el contenido delante de él[a], pero él se negó a comer. Y Amnón dijo: «Saquen de junto a mí a todos[c]». Así que todos salieron de junto a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo puso delante de él» o «se lo sirvió»; el hebreo dice literalmente «vertió/derramó», usado aquí en el contexto de presentar comida.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «todo hombre». Aquí la expresión funciona colectivamente para todos los presentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂרֵת
  english_pob_choice: the pan
  chosen_spanish: la sartén
  alternatives_spanish:
  - la bandeja
  - el recipiente de servicio
  - la vasija
  lexicon: HALOT
  rationale: El término designa un recipiente para preparar o servir la comida. «Sartén» es una equivalencia breve y natural en español que conserva la concreción del objeto; alternativas como «bandeja» o «recipiente de servicio» son posibles, pero menos precisas o menos idiomáticas en este contexto narrativo.
- source_word: וַתִּצֹק לְפָנָיו
  english_pob_choice: poured them out before him
  chosen_spanish: la derramó delante de él
  alternatives_spanish:
  - la puso delante de él
  - la sirvió delante de él
  - la vació delante de él
  lexicon: HALOT
  rationale: El hebreo usa el verbo «verter/derramar», y el auditorio inglés POB corrigió a una forma más concreta para no perder esa imagen. En español, «la derramó delante de él» conserva el valor verbal directo y evita suavizarlo demasiado con «sirvió». El singular concuerda con el objeto de comida entendido por el contexto.
- source_word: וַיְמָאֵן לֶאֱכֹל
  english_pob_choice: he refused to eat
  chosen_spanish: se negó a comer
  alternatives_spanish:
  - rehusó comer
  - no quiso comer
  lexicon: HALOT
  rationale: מָאֵן expresa negativa deliberada. «Se negó a comer» transmite mejor la voluntad de rechazo que una simple falta de apetito. «Rehusó comer» es posible, pero menos natural en español actual.
- source_word: הוֹצִיאוּ כָל אִישׁ מֵעָלַי
  english_pob_choice: Send everyone out from me
  chosen_spanish: Saquen de junto a mí a todos
  alternatives_spanish:
  - Saquen a todos de mi presencia
  - Hagan salir de mi lado a todos
  - Saquen de mi presencia a todos
  lexicon: HALOT
  rationale: El imperativo causativo de יצא pide una acción de hacer salir. «Saquen de junto a mí» conserva la relación espacial del hebreo «de sobre/junto a mí» sin caer en una literalidad extraña; además mantiene la fuerza de mando. «A todos» refleja el valor colectivo de «todo hombre».
- source_word: כָל אִישׁ
  english_pob_choice: everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - todos los hombres
  - cada hombre
  - toda persona
  lexicon: HALOT
  rationale: Aunque la expresión es literalmente «todo hombre», aquí funciona de manera colectiva para los presentes. «A todos» comunica el sentido inclusivo y directo del mandato sin perder el alcance total indicado por el hebreo.
- source_word: מֵעָלַי / מֵעָלָיו
  english_pob_choice: from me / from him
  chosen_spanish: de junto a mí / de junto a él
  alternatives_spanish:
  - de mí / de él
  - de mi presencia / de su presencia
  - lejos de mí / lejos de él
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «de sobre mí/él», un modismo de alejamiento o retirada. «De junto a mí» y «de junto a él» conservan mejor la imagen relacional del original que un simple «de mí/él», y suenan naturales en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada de la POB inglesa, que corrigió «served them before him» a «poured them out before him» para reflejar con más precisión el verbo hebreo. La versión española sigue esa revisión y conserva la concreción del acto de verter, manteniendo además la nota sobre la posibilidad de un sentido idiomático de servicio.
  spanish_consistency_notes:
  - Se mantiene «Amnón» para el nombre propio conforme al español bíblico estándar.
  - Se eligió un registro claro y digno, evitando arcaísmos innecesarios.
  - La fórmula «de junto a mí / de junto a él» se usó de manera consistente para reproducir el modismo hebreo de alejamiento.
  - No se introdujo terminología eclesiástica ajena al contexto narrativo.
