review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y la mayor parte del sentido del hebreo: «Porque yo sé los planes... declara Yahvé... para darles un futuro y una esperanza». Conserva correctamente Yahvé, «planes», «paz», «futuro» y «esperanza». Sin embargo, hay dos problemas de fidelidad formal y de notas: (1) la nota [a] está anclada en «tengo», pero su contenido explica שָׁלוֹם, por lo que el anclaje es incorrecto; (2) «no de mal» no refleja tan bien el valor contextual de רָעָה como «no para daño», que además alinea mejor con el audit trail inglés («not for harm»).'
  spanish_quality_summary: El español es claro y digno, pero «planes de paz y no de mal» suena algo forzado en español moderno; «planes de paz y no para daño» o «no para calamidad» resulta más natural. También conviene corregir la ubicación de la nota sobre שָׁלוֹם para evitar confusión del lector.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; שָׁלוֹם → «paz» en el texto principal con alternativa en nota, adecuado; אַחֲרִית → «futuro» y תִקְוָה → «esperanza», correctos. La principal desalineación está en רָעָה, donde el inglés auditado eligió «harm»; en español «daño» preserva mejor ese matiz no moral que «mal».'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «tengo», pero explica el término hebreo שָׁלוֹם.
    rationale: Las notas deben aparecer en la palabra o frase pertinente. Tal como está, el lector asociará erróneamente la nota con «tengo»/חֹשֵׁב en vez de con «paz».
  - severity: medium
    issue: «no de mal» es poco natural y no representa tan bien el matiz contextual de רָעָה.
    rationale: En este contexto de contraste con שָׁלוֹם, el sentido es perjuicio/daño/calamidad más que mal moral. «No para daño» alinea mejor con la evidencia y suena más idiomático en español.
  - severity: low
    issue: La razón léxica documentada para רָעָה en el borrador privilegia «mal», pero el audit trail inglés ya resolvió a favor de «harm».
    rationale: No es un conflicto doctrinal, pero conviene que el español siga la decisión auditada salvo razón fuerte en contra, la cual aquí no existe.
  revised_spanish_text: Porque yo sé los planes que tengo para ustedes —declara Yahvé—, planes de paz[a] y no para daño[b], para darles un futuro y una esperanza.
