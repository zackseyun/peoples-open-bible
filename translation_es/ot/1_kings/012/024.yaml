translation:
  language: es
  text: 'Así dice Yahvé: «No suban ni peleen[a] contra sus hermanos, los hijos de Israel. Vuelvan, cada uno a su casa[c], porque este asunto[b] es de mí». Y escucharon la palabra de Yahvé, y se volvieron para irse conforme a la palabra de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «con sus hermanos»; con el verbo de combate, la expresión significa actuar contra ellos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque esta cosa es de mí». El hebreo puede entenderse como origen o procedencia divina de la situación.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sus hermanos». El lenguaje de parentesco subraya que esto sería guerra contra miembros del mismo pueblo del pacto.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética pide una correspondencia formal y reconocible; «Así dice» conserva el valor de mensajero del hebreo sin volverlo más explicativo de lo que el texto permite. Se mantiene «Yahvé» según el criterio español del proyecto para יְהוָה.
- source_word: לֹא תַעֲלוּ
  english_pob_choice: Do not go up
  chosen_spanish: No suban
  alternatives_spanish:
  - No vayan a subir
  - No asciendan
  lexicon: HALOT
  rationale: עלה en este contexto militar se entiende naturalmente como desplazamiento de ataque; «suban» conserva la imagen hebrea y es idiomático en español bíblico sin forzar una paráfrasis.
- source_word: וְלֹא תִלָּחֲמוּן
  english_pob_choice: or fight
  chosen_spanish: ni peleen
  alternatives_spanish:
  - ni hagan guerra
  - ni combatan
  lexicon: HALOT
  rationale: El hebreo prohíbe el combate; en español «pelear» comunica el acto bélico de forma clara y directa. Se eligió «ni» para mantener la coordinación prohibitiva natural con la primera orden.
- source_word: עִם אֲחֵיכֶם בְּנֵי יִשְׂרָאֵל
  english_pob_choice: against your brothers, the sons of Israel
  chosen_spanish: contra sus hermanos, los hijos de Israel
  alternatives_spanish:
  - contra sus hermanos, los israelitas
  - contra sus parientes, los hijos de Israel
  lexicon: HALOT
  rationale: Aunque עִם es literalmente «con», con לָחַם implica hostilidad contra ellos; por eso en español corresponde «contra». Se conserva «hermanos» para la carga de parentesco y «los hijos de Israel» para reflejar la apposición hebrea.
- source_word: שׁוּבוּ אִישׁ לְבֵיתוֹ
  english_pob_choice: Return, each man to his house
  chosen_spanish: Vuélvase cada uno a su casa
  alternatives_spanish:
  - Regrese cada uno a su casa
  - Vuelva cada hombre a su casa
  lexicon: HALOT
  rationale: שׁוּבוּ exige una orden de regreso; en español, la forma distributiva singular «cada uno» transmite bien אִישׁ. «Casa» mantiene la concreción del hebreo mejor que «hogar».
- source_word: כִּי מֵאִתִּי נִהְיָה הַדָּבָר הַזֶּה
  english_pob_choice: for this thing is from me
  chosen_spanish: porque esta cosa viene de mí
  alternatives_spanish:
  - porque este asunto procede de mí
  - pues este hecho es de mí
  lexicon: HALOT
  rationale: נִהְיָה expresa origen o procedencia en este contexto; «viene de mí» conserva la idea de procedencia divina sin cargar de antemano una explicación causal más amplia. «Cosa» traduce de manera sobria הַדָּבָר הַזֶּה y deja abierta la referencia política concreta.
- source_word: וַיִּשְׁמְעוּ אֶת דְּבַר יְהוָה
  english_pob_choice: So they listened to the word of Yahweh
  chosen_spanish: Y escucharon la palabra de Yahvé
  alternatives_spanish:
  - Y obedecieron la palabra de Yahvé
  - Y oyeron la palabra de Yahvé
  lexicon: HALOT
  rationale: שׁמע puede ser «oír» o «escuchar/obedecer»; aquí el contexto posterior muestra respuesta efectiva, así que «escucharon» preserva la audición y deja emerger la obediencia por el contexto, sin sobretraducir.
- source_word: וַיָּשֻׁבוּ לָלֶכֶת
  english_pob_choice: and turned back to go
  chosen_spanish: y volvieron para ir
  alternatives_spanish:
  - y regresaron para partir
  - y dieron la vuelta para irse
  lexicon: HALOT
  rationale: La combinación verbal hebrea es más completa que un simple «regresaron»; «volvieron para ir» conserva el movimiento de retorno con intención de marcha, manteniendo cercanía al original en español natural.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: «Conforme a» reproduce adecuadamente la relación de conformidad normativa del hebreo y suena natural en registro bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el estándar español del proyecto es «Yahvé». Se evita la sustitución por «SEÑOR» para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la orden negativa doble con מלחם/עלה
  english_pob_reading: Do not go up or fight
  chosen_spanish_reading: No suban ni peleen
  alternative_spanish_readings:
  - No suban ni combatan
  - No asciendan ni hagan guerra
  rationale: La primera prohibición conserva la imagen direccional de עלה; la segunda expresa el acto bélico sin introducir una intensificación no presente en el hebreo.
  doctrine_reference: HALOT; contexto narrativo de guerra civil entre israelitas
- issue: 'Frase de procedencia divina: מֵאִתִּי נִהְיָה הַדָּבָר הַזֶּה'
  english_pob_reading: for this thing is from me
  chosen_spanish_reading: porque esta cosa viene de mí
  alternative_spanish_readings:
  - porque este asunto procede de mí
  - pues este hecho es de mí
  rationale: La traducción mantiene la atribución directa a Dios de la situación política sin reformularla como permiso, causalidad secundaria o providencia explicada; preserva la tensión teológica de que la división pertenece al designio divino.
  doctrine_reference: 1 Reyes 12:24; providencia y juicio divino
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión del audit trail inglés, que ajustó la cláusula final a una formulación más directa de procedencia («is from me»). En español se conservó ese valor con «viene de mí», sin ampliar la explicación causal. También se respetó la decisión de mantener la imaginería de עלה y la fuerza kinship de אֲחֵיכֶם.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «escucharon» sobre «oyeron» para permitir la implicación de obediencia sin perder el matiz auditivo.
  - «Hijos de Israel» se mantuvo para reflejar la apposición hebrea; «hermanos» conserva la tensión fraterna del pasaje.
  - La última cláusula se tradujo con una equivalencia de procedencia («viene de mí») para no diluir la afirmación teológica del texto.
