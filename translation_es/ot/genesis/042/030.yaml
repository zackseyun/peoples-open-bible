  to: El hombre[a], el señor de la tierra, nos habló duramente y nos trató como espías del país[b].
  rationale: Se ajusta «espías de la tierra» a «espías del país» en el texto principal para lograr un español más natural y claro, mientras la nota preserva la formulación más literal y explica el modismo hebreo. El resto del versículo es fiel al hebreo y al razonamiento del POB inglés.
