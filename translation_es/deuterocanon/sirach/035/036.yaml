translation:
  language: es
  text: Ponlo a trabajar, para que no esté ocioso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔμβαλε
  english_pob_choice: Put
  chosen_spanish: Ponlo
  alternatives_spanish:
  - Asígnalo
  - Mételo
  - Colócalo
  lexicon: LSJ
  rationale: El imperativo aoristo de ἐμβάλλω aquí tiene sentido idiomático de poner o asignar a una tarea. «Ponlo» conserva la fuerza imperativa y suena natural en español sin volverlo literal de manera extraña.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a él
  lexicon: Gramática griega
  rationale: El pronombre acusativo masculino se refiere a una persona masculina; en español, el objeto directo natural en esta construcción es «lo».
- source_word: εἰς ἐργασίαν
  english_pob_choice: to work
  chosen_spanish: a trabajar
  alternatives_spanish:
  - al trabajo
  - a laborar
  - a una tarea
  lexicon: LSJ
  rationale: La construcción con ἐργασία expresa trabajo o labor. En español, «a trabajar» transmite con claridad la idea de asignarlo al trabajo, de manera idiomática y fiel al sentido.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: Gramática griega
  rationale: ἵνα introduce finalidad. «Para que» conserva esa relación de propósito en español moderno.
- source_word: μὴ ἀργῇ
  english_pob_choice: he may not be idle
  chosen_spanish: no esté ocioso
  alternatives_spanish:
  - no esté inactivo
  - no sea perezoso
  - no permanezca sin hacer nada
  lexicon: LSJ
  rationale: ἀργέω significa estar ocioso, inactivo o sin trabajo. «Ocioso» refleja bien el estado de inactividad sin intensificar innecesariamente el juicio moral de «perezoso».
translation_notes:
  revision_awareness: Coincide con el pasaje griego de Sirácides 35:36 y con la decisión inglesa de priorizar el sentido idiomático (asignar a trabajo) sobre una traducción demasiado literal de ἐμβάλλω.
  spanish_consistency_notes:
  - Se mantiene «trabajar» como equivalente natural de ἐργασία en este contexto.
  - Se evita «perezoso» para no cargar el griego con una valoración moral más fuerte de la que exige ἀργῇ.
  - La redacción conserva un tono bíblico claro y contemporáneo, apto para lectura pública.
