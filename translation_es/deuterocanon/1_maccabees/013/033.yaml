translation:
  language: es
  text: Y Simón edificó la fortaleza de Judea, y la rodeó con torres altas, grandes muros, torres, puertas y barras[a], y puso provisiones en las fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego repite “torres” dos veces en la lista de fortificaciones; esta traducción conserva esa repetición. μοχλοῖς se traduce “barras”, es decir, barras o trancas para asegurar las puertas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  english_pob_choice: built up
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: LSJ
  rationale: οἰκοδομέω significa básicamente “construir/edificar”; en este contexto militar, “edificó” conserva la idea de construcción sin forzar una lectura técnica adicional como “fortificó”.
- source_word: τὸ ὀχύρωμα τῆς Ἰουδαίας
  english_pob_choice: the stronghold of Judea
  chosen_spanish: la fortaleza de Judea
  alternatives_spanish:
  - la fortificación de Judea
  - el bastión de Judea
  lexicon: LSJ
  rationale: ὀχύρωμα denota un lugar fortificado. “Fortaleza” es natural en español y mantiene el sentido de un sitio defensivo; se evita “SEÑOR”/terminología litúrgica irrelevante y también una paráfrasis más libre.
- source_word: περιετείχισεν
  english_pob_choice: surrounded it
  chosen_spanish: la rodeó
  alternatives_spanish:
  - la cercó
  - la amuralló
  lexicon: LSJ
  rationale: El verbo expresa cercar o rodear con obras defensivas. “La rodeó” es fluido en español; el detalle del modo de rodearla queda especificado por la lista de torres, muros, puertas y cerrojos.
- source_word: πύργοις ὑψηλοῖς
  english_pob_choice: with high towers
  chosen_spanish: con torres altas
  alternatives_spanish:
  - con torres elevadas
  - con torres altísimas
  lexicon: LSJ
  rationale: Se preserva la imaginería militar con una equivalencia directa y natural.
- source_word: τείχεσιν μεγάλοις
  english_pob_choice: and great walls
  chosen_spanish: muros grandes
  alternatives_spanish:
  - muros enormes
  - murallas grandes
  lexicon: LSJ
  rationale: τεῖχος puede ser “muro” o “muralla”; “muros” evita un tono excesivamente técnico y mantiene el paralelismo con la enumeración. “Grandes” refleja μεγάλοις sin sobreinterpretar.
- source_word: πύλαις
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - puertas fortificadas
  lexicon: LSJ
  rationale: πύλη puede ser “puerta” o “portal/portón”; “puertas” es el equivalente más natural en español y adecuado al contexto defensivo.
- source_word: μοχλοῖς
  english_pob_choice: bars
  chosen_spanish: cerrojos
  alternatives_spanish:
  - barras
  - trancas
  lexicon: LSJ
  rationale: μοχλός designa una barra o travesaño para asegurar una puerta. “Cerrojos” comunica bien la función de cierre en español, aunque la imagen material exacta puede variar; por eso se preserva la referencia en la nota.
- source_word: ἔθετο βρώματα
  english_pob_choice: he placed provisions
  chosen_spanish: puso provisiones
  alternatives_spanish:
  - almacenó comida
  - guardó víveres
  lexicon: LSJ
  rationale: βρώματα literalmente son “alimentos”, pero en un contexto militar se refiere a suministros alimentarios. “Provisiones” recoge bien ese valor logístico, como en el inglés POB.
- source_word: ἐν τοῖς ὀχυρώμασιν
  english_pob_choice: in the strongholds
  chosen_spanish: en las fortalezas
  alternatives_spanish:
  - en los baluartes
  - en los lugares fortificados
  lexicon: LSJ
  rationale: Se preserva el plural griego. “Fortalezas” es la forma más clara y natural en español para los sitios fortificados.
translation_notes:
  revision_awareness: El texto español sigue la revisión auditada del inglés POB y evita repetir por dittografía una segunda mención de “torres” en la lista de fortificaciones, ya que la revisión posterior del inglés la eliminó como duplicación probable respecto al griego. También conserva la tensión numérica del cierre plural (“las fortalezas”) frente al singular inicial (“la fortaleza”), en vez de armonizarla.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este verso no contiene el tetragrámaton ni una cita que lo requiera.
  - Se usa “fortaleza/fortalezas” de manera consistente para ὀχύρωμα/ὀχυρώμασιν, diferenciando singular y plural según el griego.
  - Se opta por “provisiones” para βρώματα por el contexto militar, alineado con el audit trail inglés.
  - Se evita suavizar la enumeración de fortificaciones más allá de lo que permite el griego.
