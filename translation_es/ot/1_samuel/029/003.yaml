  to: 'Entonces los jefes filisteos dijeron: «¿Quiénes son estos hebreos?». Y Aquís dijo a los jefes filisteos: «¿No es este David, el siervo de Saúl, rey de Israel, que ha estado conmigo estos días o estos años? Y no he hallado en él nada[a], desde el día en que se pasó a mí hasta este mismo día»'
