  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Piadosos» es aceptable para εὐσεβῶν en este contexto. «Heredad» preserva bien κληρονομία. La revisión propuesta alinea mejor la nota léxica con la decisión documentada sobre ἀντιπεριβεβλημένη.
