    issue: Cambio inconsistente entre 2.ª persona explícita ('ustedes') y forma verbal española interpretable como 3.ª persona ('huirán').
    rationale: El hebreo תְּנוּסוּן es 2mp. En español, 'huirán' puede entenderse como 3.ª persona plural si no se repone el sujeto. Dado que el texto ya eligió 'ustedes', conviene mantener explícitamente 'ustedes huirán' para preservar la referencia.
  - severity: low
    issue: La nota al pie repite como alternativa exacta una expresión ya usada en el texto principal.
    rationale: Si el texto principal dice 'caballos veloces', la nota no debería ofrecer otra vez 'caballos veloces' como alternativa. Debe señalar la literalidad hebrea ('veloces') y/o una alternativa real como 'monturas veloces'.
  revised_spanish_text: 'Pero ustedes dijeron: “No, porque huiremos en caballos”; por tanto, ustedes huirán. Y: “Montaremos en caballos veloces”[a]; por tanto, sus perseguidores serán veloces.'
