id: OBA.1.11
reference: Obadiah 1:11
source:
  edition: WLC
  text: בְּ/יוֹם֙ עֲמָֽדְ/ךָ֣ מִ/נֶּ֔גֶד בְּ/י֛וֹם שְׁב֥וֹת זָרִ֖ים חֵיל֑/וֹ וְ/נָכְרִ֞ים בָּ֣אוּ שער/ו וְ/עַל יְרוּשָׁלִַ֨ם֙ יַדּ֣וּ גוֹרָ֔ל גַּם אַתָּ֖ה כְּ/אַחַ֥ד מֵ/הֶֽם־־׃
translation:
  text: On the day when you stood aloof[a], on the day strangers carried off his wealth, and foreigners entered his gates and cast lots over Jerusalem[c][b], you too were like one of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you stood aloof' or 'you stood at a distance.' The Hebrew idiom literally speaks of standing opposite/from a distance.
    reason: lexical_alternative
  - marker: b
    text: Or 'his army' or 'his strength' for 'his wealth'; the Hebrew חֵיל can denote military force, strength, or resources/wealth.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his gate,' likely referring to Jerusalem or Judah personified; some English translations render idiomatically 'his gates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמָדְךָ מִנֶּגֶד
  chosen: you stood aside
  alternatives:
  - you stood opposite
  - you stood aloof
  - you stood at a distance
  lexicon: HALOT
  rationale: The idiom combines עמד ('stand') with מנגד ('opposite/from a distance'). In context it conveys detached non-intervention rather than mere physical location. 'Stood aside' captures the moral force in natural English while remaining close to the Hebrew.
- source_word: שְׁבוֹת
  lemma: שׁבה
  chosen: carried off
  alternatives:
  - took captive
  - captured
  lexicon: HALOT
  rationale: The verb שׁבה often refers to taking captive. Here the object is חילו ('his wealth/force'), not persons, so 'carried off' fits the sense of seizure/plunder better than the more person-oriented 'took captive'.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - outsiders
  lexicon: HALOT
  rationale: זרים denotes those who are alien to the people. 'Strangers' preserves the first term's distinction from the following נָכְרִים, where a different English term is used to reflect the Hebrew variation.
- source_word: חֵילוֹ
  chosen: his wealth
  alternatives:
  - his army
  - his strength
  - his goods
  lexicon: HALOT
  rationale: חיל can mean strength, army, or wealth. In a context of invasion, entry through gates, and lot-casting over Jerusalem, the sense of possessions/resources being seized is most likely. The singular suffix refers to Jerusalem/Judah personified.
- source_word: נָכְרִים
  chosen: foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: HALOT
  rationale: נכרים refers to foreigners or those recognized as foreign. Rendering it 'foreigners' differentiates it from זרים while preserving the parallelism.
- source_word: בָּאוּ שַׁעֲרוֹ
  chosen: entered his gate
  alternatives:
  - came into his gate
  - entered his gates
  lexicon: HALOT
  rationale: The ketiv-like consonantal form is singular with suffix, literally 'his gate.' In context this likely personifies the city/nation. 'Entered his gate' preserves the Hebrew form; English keeps the singular though plural 'gates' would be idiomatic.
- source_word: יַדּוּ גוֹרָל
  chosen: cast lots
  alternatives:
  - threw lots
  - cast the lot
  lexicon: HALOT
  rationale: This is the standard idiom for distributing spoil or deciding possession by lot. 'Cast lots' is the clearest established English equivalent.
- source_word: גַּם אַתָּה
  chosen: you too
  alternatives:
  - even you
  - you also
  lexicon: HALOT
  rationale: The phrase marks Edom's inclusion in the guilt of the attackers. 'You too' is concise and natural.
- source_word: כְּאַחַד מֵהֶם
  chosen: were like one of them
  alternatives:
  - were as one of them
  - became one of them
  lexicon: HALOT
  rationale: The comparison indicts Edom as morally equivalent to the invaders. 'Were like one of them' preserves the comparative force without overstating identity.
