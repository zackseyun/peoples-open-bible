translation:
  language: es
  text: '«hijo de hombre[a], ¿qué es este proverbio que tienen en la tierra de Israel, que dice: “Los días se prolongan, y toda visión se desvanece”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los días se prolongan, y toda visión falla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva la fórmula profética recurrente de Ezequiel y el paralelismo con la traducción inglesa auditada, sin introducir una interpretación doctrinal ajena al contexto.
- source_word: מָה הַמָּשָׁל הַזֶּה
  english_pob_choice: what is this proverb
  chosen_spanish: ¿qué es este proverbio?
  alternatives_spanish:
  - ¿qué es este dicho?
  - ¿qué es esta parábola?
  lexicon: HALOT
  rationale: מָשָׁל aquí designa un dicho proverbial o lema popular; 'proverbio' refleja mejor ese matiz que 'parábola'.
- source_word: לָכֶם
  english_pob_choice: that you have
  chosen_spanish: que ustedes tienen
  alternatives_spanish:
  - que tienen entre ustedes
  - que les pertenece
  lexicon: HALOT
  rationale: En español, la idea idiomática de un proverbio vigente entre el pueblo se expresa con naturalidad como algo que 'tienen'.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: in the land of Israel
  chosen_spanish: en la tierra de Israel
  alternatives_spanish:
  - sobre el suelo de Israel
  - en la tierra israelita
  lexicon: HALOT
  rationale: אַדְמָה literalmente es 'suelo/tierra', pero en esta construcción apunta al territorio de Israel; 'tierra de Israel' es fiel y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - 'así:'
  lexicon: HALOT
  rationale: Función quotativa estándar; 'diciendo' introduce la cita de manera directa y transparente.
- source_word: יַאַרְכוּ הַיָּמִים
  english_pob_choice: The days drag on
  chosen_spanish: Se prolongan los días
  alternatives_spanish:
  - Los días se hacen largos
  - Los días se alargan
  lexicon: HALOT
  rationale: El verbo significa 'ser largos/prolongarse'; en español, 'se prolongan los días' conserva el sentido básico sin perder la nota de demora.
- source_word: וְאָבַד כָּל חָזוֹן
  english_pob_choice: and every vision comes to nothing
  chosen_spanish: y toda visión llega a nada
  alternatives_spanish:
  - y toda visión perece
  - y toda visión fracasa
  lexicon: HALOT
  rationale: אָבַד expresa perderse, perecer o quedar arruinado. 'Llega a nada' preserva la fuerza de inutilidad/fracaso profético sin volverla excesivamente interpretativa.
theological_decisions:
- issue: Tono y valor de la fórmula 'Hijo de hombre' en la vocación profética de Ezequiel
  english_pob_reading: Son of man preserves Ezekiel’s recurring divine address formula without importing later christological claims.
  chosen_spanish_reading: Hijo de hombre preserva la fórmula profética recurrente sin trasladarla a una lectura cristológica aquí.
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: La expresión funciona como vocativo literario-teológico característico de Ezequiel. Mantenerla evita perder la cohesión interna del libro y no añade una interpretación que el verso no exige.
  doctrine_reference: 'DOCTRINE.md: אָדָם default ''man / humankind (context)''; gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios y el consenso de cotejo fue de alta concordancia con observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene 'tierra de Israel' para אַדְמַת יִשְׂרָאֵל, en línea con el valor territorial del hebreo.
  - '''Visión'' traduce חָזוֹן con el sentido profético de revelación, no de simple vista.'
  - La cita interna se conserva con comillas españolas y puntuación natural para lectura pública.
