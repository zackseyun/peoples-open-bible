translation:
  language: es
  text: 'Para el director del coro: según Jedutún[a][b][c][d]. Salmo de Asaf.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el director musical» o «Para el maestro de coro».
    reason: lexical_alternative
  - marker: b
    text: «Según Jedutún» puede indicar un estilo musical, una melodía, un conjunto o el gremio asociado con Jedutún.
    reason: cultural_note
  - marker: c
    text: O «para Asaf»; la preposición hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: d
    text: O «De Asaf. Salmo».
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de coro
  - Para el director de la música
  lexicon: HALOT
  rationale: En encabezamientos de salmos, la forma señala al responsable de la ejecución musical. «Director del coro» comunica bien la función en español moderno y conserva el sentido operativo sin volverlo arcaico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con
  lexicon: HALOT
  rationale: En títulos musicales, la preposición introduce una indicación de estilo, melodía o asociación. «Según» reproduce de forma natural esa relación directiva sin fijarla excesivamente.
- source_word: יְדוּתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutún
  lexicon: HALOT
  rationale: Se translitera el nombre propio. En español bíblico, «Jedutún» mantiene la forma reconocible y evita una traducción impropia.
- source_word: לְאָסָף
  english_pob_choice: Of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - asociado con Asaf
  lexicon: HALOT
  rationale: La preposición puede indicar autoría, asociación o dedicación. «De Asaf» preserva esa ambigüedad con una formulación natural en español, sin cerrar indebidamente el sentido.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: El término de género estándar en español bíblico es «salmo». Como encabezamiento, funciona como etiqueta literaria breve y fiel.
translation_notes:
  revision_awareness: La versión inglesa revisada unificó «A psalm of Asaph» para respetar la unidad sintáctica de לְאָסָף מִזְמוֹר. La redacción española sigue esa misma unidad con «Salmo de Asaf», evitando separar artificialmente el encabezamiento en dos frases.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Jedutún» y «Asaf» se transliteran con ortografía española habitual.
  - Se evita «SEÑOR» como sustituto editorial porque no corresponde al hebreo de este encabezamiento.
  - La puntuación conserva la estructura de superscripción poética y litúrgica del hebreo.
