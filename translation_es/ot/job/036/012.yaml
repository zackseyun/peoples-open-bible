review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el sentido general del hebreo: rechazo a escuchar, destrucción violenta y muerte en falta de conocimiento. Sin embargo, «pasarán por la espada» no reproduce bien el valor idiomático de בְּשֶׁלַח יַעֲבֹרוּ; en español suena como atravesar físicamente la espada, no perecer por ella. También «sin conocimiento» es posible, pero en español bíblico-natural «sin entendimiento» comunica mejor el estado final sin sonar técnico; la alternativa causal puede mantenerse en nota.'
  spanish_quality_summary: El texto es mayormente claro, pero «pasarán por la espada» resulta poco idiomático y potencialmente confuso. «Sin conocimiento» suena abstracto y algo acartonado en este contexto; «sin entendimiento» es más natural y ampliamente comprensible en español eclesial general. La puntuación y el tono son adecuados.
  glossary_alignment: No hay términos de glosario mayor implicados. La decisión «escuchan» para שׁמע está bien alineada con el audit trail. La revisión propuesta conserva el matiz de «listen» sin forzar «obedecen».
  issues:
  - severity: high
    issue: «pasarán por la espada» calca de forma poco natural el inglés/hebreo
    rationale: Aunque יַעֲבֹרוּ retiene imaginería de ‘pasar’, en español «pasar por la espada» no es una formulación transparente aquí y puede entenderse erróneamente. El sentido contextual es perecer por la espada; «perecerán por la espada» expresa fielmente el resultado de juicio.
  - severity: medium
    issue: «sin conocimiento» suena técnico y menos idiomático
    rationale: כִּבְלִי דָעַת puede traducirse literalmente, pero en español actual «sin entendimiento» comunica mejor la idea de carencia de discernimiento. La alternativa causal documentada debe conservarse en nota.
  - severity: low
    issue: La nota al pie debe seguir anclada al segmento final revisado
    rationale: Si se ajusta la frase final, la nota debe permanecer con marcador único en el lugar correspondiente del texto.
  revised_spanish_text: Pero si no escuchan, perecerán por la espada y morirán sin entendimiento[a].
  revised_footnotes:
