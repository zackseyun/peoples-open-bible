    issue: «lejos de la heredad de Dios» añade un matiz espacial no explícito
    rationale: מִנַּחֲלַת אֱלֹהִים significa «de/desde la heredad de Dios». El añadido «lejos de» interpreta la exclusión y va más allá del texto fuente y del POB inglés.
  - severity: low
