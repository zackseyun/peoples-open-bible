review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Josías quemó los huesos de los sacerdotes sobre los altares asociados con ellos y luego limpió/purificó Judá y Jerusalén de la contaminación idolátrica. También conserva correctamente la nota sobre la forma hebrea inusual de מזבחותים. Sin embargo, para alinearse mejor con la elección inglesa documentada y con la dimensión cultual-moral de טהר sin sonar demasiado técnico, conviene ajustar ''purificó'' a ''limpió de impurezas'' o, mejor, ''limpió''. Pero dado el audit trail inglés, ''purificó'' no es infiel; el problema principal real está en la redacción de la nota al pie, que es poco natural en español por la puntuación y comillas.'
  spanish_quality_summary: 'La oración principal es clara y legible. ''Quemó los huesos de los sacerdotes sobre sus altares'' suena natural y fiel. ''Purificó Judá y Jerusalén'' es comprensible, aunque ''purificó'' puede sonar algo más técnico o litúrgico de lo necesario; aun así, es aceptable. La nota al pie sí necesita reparación: la apertura con comillas y ''O:'' está mal puntuada y poco idiomática. Debe normalizarse a un español limpio y editorialmente consistente.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé ni otras entradas sensibles del glosario. 'Sacerdotes', 'huesos', 'altares', 'Judá' y 'Jerusalén' están bien. La elección 'purificó' para טהר es defendible en contexto reformador, aunque 'limpió' o 'dejó limpia' podrían sonar más naturales; no es una desviación suficiente para rechazo.
  issues:
  - severity: medium
    issue: Nota al pie mal formulada en español
    rationale: 'La nota comienza con "''O: ''''los altares''''"; esa puntuación y comillado son poco naturales y parecen un calco técnico del registro inglés. Debe reescribirse con formato idiomático: "O: ''los altares''..." o equivalente.'
  revised_spanish_text: Quemó los huesos de los sacerdotes sobre sus altares[a], y purificó Judá y Jerusalén.
  revised_footnotes:
  - marker: a
    text: 'O: "los altares". La forma hebrea aquí es inusual; el sentido es que Josías quemó los huesos de los sacerdotes sobre los altares asociados con ellos.'
    reason: textual_variant
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al audit trail inglés. Solo se corrige la nota al pie para que el español sea claro, natural y editorialmente limpio, sin cambiar el contenido exegético documentado.
