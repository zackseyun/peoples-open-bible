review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: fórmula de juramento, tag profético, triple imaginería instrumental de poder/juicio, y afirmación final de realeza sobre el pueblo. Sin embargo, la secuencia אֲדֹנָי יְהוִה no quedó del todo bien resuelta en español con «el Señor Yahvé», porque suena algo híbrida y menos natural que una solución más directa que preserve el nombre divino. Además, la nota inglesa sobre la fuerza real de אֶמְלֹךְ no se preservó en español, aunque sí sería útil aquí.'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste pequeño para mayor naturalidad y fidelidad terminológica. «Como vivo» funciona, aunque «¡Vivo yo!» sería más abrupto; puede mantenerse. La frase «declara el Señor Yahvé» resulta menos idiomática en español bíblico actual que «declara el Señor Dios, Yahvé» o una solución equivalente. También conviene restaurar en nota la alternativa «gobernaré/seré rey» para reflejar la decisión lexical auditada sobre מלך.
  glossary_alignment: Hay alineación parcial con el glosario del proyecto. El borrador sí evita enmascarar יהוה y usa «Yahvé», lo cual es correcto a nivel doctrinal. No obstante, en esta construcción compuesta אֲדֹנָי יְהוִה la realización «Señor Yahvé» no es la opción española más clara. «Señor Dios, Yahvé» preserva tanto el título como el nombre sin caer en una combinación extraña. «Reinaré» para אֶמְלֹךְ está bien y debe conservarse.
  issues:
  - severity: medium
    issue: La secuencia «declara el Señor Yahvé» suena poco natural para אֲדֹנָי יְהוִה.
    rationale: Aunque preserva «Yahvé», la combinación «Señor Yahvé» no refleja con suficiente claridad el título compuesto en español eclesial amplio. «El Señor Dios, Yahvé» mantiene el nombre divino y hace más inteligible la relación entre אֲדֹנָי y יהוה.
  - severity: low
    issue: Falta en español la nota lexical sobre la amplitud de «reinaré».
    rationale: El inglés auditado añadió una nota para preservar alternativas como «gobernaré» o «seré rey» y explicar la fuerza real del verbo מלך. Dado que «reinaré» puede sonar menos transparente para algunos lectores, conviene retener esa nota.
  revised_spanish_text: Como vivo[a], declara el Señor Dios, Yahvé, ciertamente con mano fuerte, con brazo extendido y con furor derramado, reinaré[b] sobre ustedes.
  revised_footnotes:
  - marker: a
    text: O «Tan ciertamente como vivo». La fórmula funciona como juramento solemne.
    reason: lexical_alternative
  - marker: b
    text: O «gobernaré sobre ustedes» o «seré rey sobre ustedes». El verbo hebreo tiene fuerza real.
    reason: lexical_alternative
  revision_rationale: Se ajusta la representación de אֲדֹנָי יְהוִה para lograr un español más natural y a la vez preservar explícitamente «Yahvé» conforme al proyecto. Se mantiene el resto de la sintaxis e imaginería del borrador, y se añade la nota sobre «reinaré» para reflejar mejor la decisión lexical documentada en el audit trail inglés.
