revisions:
- from: Lo que ha sido, eso será[a]; y lo que ha sido hecho, eso será hecho; y no hay nada nuevo[b] bajo el sol.
  to: Lo que ha sido, eso será[a]; y lo que se ha hecho, eso se hará; y no hay nada nuevo bajo el sol.
  rationale: Se conserva la estructura proverbial y el sentido del hebreo, pero se mejora la naturalidad del español sustituyendo dos pasivas rígidas por formas más idiomáticas que aún preservan el valor resultativo/pasivo en contexto. También se elimina una nota no necesaria, dejando solo la alternativa léxica ya documentada por el POB inglés.
