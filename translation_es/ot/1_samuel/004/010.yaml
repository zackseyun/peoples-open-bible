translation:
  language: es
  text: Así que los filisteos combatieron[a], e Israel fue derrotado, y cada hombre huyó a su tienda. La matanza fue muy grande[b], y de Israel cayeron treinta mil soldados de a pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada hombre huyó a su casa». El hebreo dice literalmente «a su tienda», una expresión que puede funcionar idiomáticamente para el lugar donde uno vive.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la derrota fue muy severa». El hebreo dice literalmente «el golpe/la matanza fue muy grande».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלָּחֲמוּ
  english_pob_choice: fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - lucharon
  - entablaron combate
  lexicon: HALOT
  rationale: El verbo indica acción militar directa; en español, 'pelearon' es natural y conserva el avance narrativo sin volverlo más explicativo de lo que permite el hebreo.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico; el artículo definido hace la referencia natural en la narrativa.
- source_word: וַיִּנָּגֶף יִשְׂרָאֵל
  english_pob_choice: Israel was defeated
  chosen_spanish: Israel fue derrotado
  alternatives_spanish:
  - Israel fue vencido
  - Israel fue abatido
  lexicon: HALOT
  rationale: נָגַף en contexto bélico expresa derrota ante el enemigo. 'Fue derrotado' transmite bien el resultado militar sin exagerar más allá del texto.
- source_word: וַיָּנֻסוּ אִישׁ לְאֹהָלָיו
  english_pob_choice: each man fled to his tent
  chosen_spanish: cada hombre huyó a su tienda
  alternatives_spanish:
  - cada uno huyó a su tienda
  - cada hombre huyó a su casa
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'tienda', como en el hebreo, y el distributivo con 'cada hombre'. 'Casa' es una alternativa idiomática, pero atenúa el lenguaje campamental del original.
- source_word: וַתְּהִי הַמַּכָּה גְּדוֹלָה מְאֹד
  english_pob_choice: The slaughter was very great
  chosen_spanish: La matanza fue muy grande
  alternatives_spanish:
  - el golpe fue muy grande
  - la derrota fue muy severa
  lexicon: HALOT
  rationale: מַכָּה aquí funciona como golpe mortal o devastación en batalla; 'matanza' recoge mejor el resultado letal que 'golpe' en español, y mantiene la fuerza del hebreo. Se conserva 'muy grande' para reflejar מְאֹד.
- source_word: וַיִּפֹּל מִיִּשְׂרָאֵל
  english_pob_choice: from Israel fell
  chosen_spanish: de Israel cayeron
  alternatives_spanish:
  - cayeron de Israel
  - cayeron entre los israelitas
  lexicon: HALOT
  rationale: En lenguaje bélico, נפל se traduce naturalmente como 'cayeron' para expresar muerte en combate. La preposición 'de Israel' conserva la relación partitiva del hebreo.
- source_word: שְׁלֹשִׁים אֶלֶף
  english_pob_choice: thirty thousand
  chosen_spanish: treinta mil
  alternatives_spanish:
  - '30.000'
  lexicon: HALOT
  rationale: Equivalencia numérica directa; se mantiene la forma escrita por ser más adecuada al registro bíblico.
- source_word: רַגְלִי
  english_pob_choice: foot soldiers
  chosen_spanish: soldados de infantería
  alternatives_spanish:
  - infantería
  - soldados a pie
  lexicon: HALOT
  rationale: El hebreo designa tropas de a pie, en contraste con fuerzas montadas. 'Soldados de infantería' comunica con claridad ese sentido militar en español contemporáneo y evita ambigüedad.
theological_decisions:
- issue: Valor de מַכָּה en un contexto bélico
  english_pob_reading: the slaughter was very great
  chosen_spanish_reading: la matanza fue muy grande
  alternative_spanish_readings:
  - el golpe fue muy grande
  - la derrota fue muy severa
  rationale: No hay una referencia a plaga o castigo extraordinario fuera del marco militar inmediato; por eso se mantiene una lectura de devastación mortal. 'Matanza' preserva la tensión entre 'golpe' literal y resultado sangriento, sin suavizarla.
  doctrine_reference: 1 Samuel 4:10; uso contextual de מַכָּה en narrativa de guerra
- issue: Relación entre 'cayeron' y muerte en combate
  english_pob_reading: from Israel fell
  chosen_spanish_reading: de Israel cayeron
  alternative_spanish_readings:
  - cayeron de Israel
  - de Israel murieron
  rationale: La forma hebrea mantiene el registro idiomático de caída en batalla. 'Cayeron' conserva esa ambigüedad tradicional de muerte/derrota sin forzar una glosa interpretativa.
  doctrine_reference: lenguaje bélico idiomático en el Tanaj
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se identificaron cambios necesarios; la traducción sigue el mismo sentido general del audit trail inglés y del hebreo, con ajuste español para ''matanza'' y ''soldados de infantería'' para mayor transparencia.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera del versículo porque aquí no aparece el tetragrámaton ni un sustituto directo.
  - '''Filisteos'' conserva el etnónimo estándar en español.'
  - Se eligió 'tienda' para respetar el concreto campamental del hebreo, con nota alternativa para la lectura idiomática.
  - '''Soldados de infantería'' traduce el matiz de tropas a pie; ''infantería'' sola sería más abstracto, pero también válido en contexto militar.'
