revisions:
- from: Y después de [a] haberles excitado el ánimo, les exhortó[b], al mismo tiempo mostrando la impiedad de las naciones y la violación de los juramentos.
  to: Y después de haberles avivado el ánimo[a], les exhortó[b], al mismo tiempo señalando la impiedad de las naciones y la violación de los juramentos.
  rationale: Se hace una reparación menor para mejorar la dignidad y naturalidad del español sin apartarse del griego ni del expediente inglés. «Avivado el ánimo» conserva bien el campo semántico de θυμός en contexto militar, evita la ambigüedad moderna de «excitado», y «señalando» expresa mejor el valor explicativo de παρειδείκνυς que «mostrando».
