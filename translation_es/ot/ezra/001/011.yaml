revisions:
- from: Todos los artículos de oro y de plata fueron cinco mil cuatrocientos en total[a][b][c]. Sesbasar los trajo[a] con los exiliados, cuando fueron traídos[b] de Babilonia a Jerusalén.
  to: Todos los artículos[a] de oro y de plata sumaron cinco mil cuatrocientos en total. Sesbasar los subió[b] con los exiliados[c], cuando fueron subidos[b] de Babilonia a Jerusalén.
  rationale: La revisión conserva mejor la evidencia hebrea y la decisión auditada del POB inglés al mantener 'subió / fueron subidos' en el texto principal, en vez de aplanarlo a 'trajo'. También mejora la naturalidad del español con 'sumaron ... en total' y reorganiza las notas para que cada marcador esté anclado en la palabra o frase pertinente. Se preservan las alternativas léxicas documentadas para כֵּלִים y הַגּוֹלָה.
