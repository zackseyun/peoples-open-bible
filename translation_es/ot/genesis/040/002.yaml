translation:
  language: es
  text: Y Faraón se enojó contra sus dos oficiales[a], contra el jefe de los coperos y contra el jefe de los panaderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus dos oficiales de corte”; el término hebreo también puede significar “sus dos eunucos” en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצֹף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - se enfureció
  - estuvo airado
  lexicon: HALOT
  rationale: El verbo expresa enojo o ira. En español, 'se enojó' comunica bien la acción narrativa sin intensificarla más de lo que exige el hebreo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Faraón
  lexicon: Nombre propio / título histórico
  rationale: En este versículo el sujeto del verbo es פַּרְעֹה, por lo que el nombre correcto es 'Faraón'. Sin embargo, el texto proporcionado exige una salida fuente-auditable; como el contenido del versículo es claro y no hay otras entidades, se conserva la referencia al soberano como 'Faraón' en la estructura del versículo. Si se requiere alineación estricta al nombre del original, 'Faraón' es la forma natural en español.
- source_word: שְׁנֵי סָרִיסָיו
  english_pob_choice: his two officials
  chosen_spanish: sus dos oficiales
  alternatives_spanish:
  - sus dos cortesanos
  - sus dos eunucos
  lexicon: HALOT
  rationale: סָרִיס puede significar 'oficial de corte' y, en algunos contextos, 'eunuco'. Como aquí se nombran funciones de la corte real, 'oficiales' preserva el sentido contextual sin afirmar más de lo que el texto exige.
- source_word: שַׂר הַמַּשְׁקִים
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el copero principal
  - el jefe de los servidores del vino
  lexicon: HALOT
  rationale: שַׂר indica un jefe o alto funcionario, y הַמַּשְׁקִים alude a quienes sirven bebida. 'Jefe de los coperos' mantiene el título funcional y es claro para el lector español.
- source_word: שַׂר הָאֹפִים
  english_pob_choice: the chief baker
  chosen_spanish: el jefe de los panaderos
  alternatives_spanish:
  - el panadero principal
  - el jefe de los horneros
  lexicon: HALOT
  rationale: El título paralelo requiere una traducción funcional equivalente. 'Jefe de los panaderos' conserva el paralelismo con 'jefe de los coperos' y expresa con naturalidad el cargo.
- source_word: עַל ... עַל ... וְעַל
  english_pob_choice: with ... with ... and with
  chosen_spanish: contra ... contra ... y contra
  alternatives_spanish:
  - con ... con ... y con
  - sobre ... sobre ... y sobre
  lexicon: HALOT
  rationale: Tras un verbo de enojo, עַל marca el objeto del enojo; en español, 'contra' preserva la fuerza relacional y la repetición del hebreo sin sonar forzado.
theological_decisions:
- issue: Tratamiento del nombre divino y forma del sujeto
  english_pob_reading: And Pharaoh was angry...
  chosen_spanish_reading: Faraón se enojó...
  alternative_spanish_readings:
  - Yahvé se enojó...
  rationale: El hebreo nombra a פַּרְעֹה, no a Yahvé. La lectura correcta del sujeto debe mantenerse para no alterar el texto. Se evita introducir el nombre divino donde no aparece.
  doctrine_reference: Fidelidad textual / no adición al original
translation_notes:
  revision_awareness: 'El audit trail inglés mostró una oscilación entre repetir o no la preposición equivalente a עַל. En español se preserva la repetición de ''contra'' para reflejar la estructura hebrea y mantener visible el paralelismo: sujeto general (''sus dos oficiales'') seguido por las dos especificaciones tituladas. También se siguió la decisión inglesa de no forzar ''eunucos'' como sentido principal, aunque se mantiene como alternativa en nota.'
  spanish_consistency_notes:
  - Se usa 'Faraón' como equivalente estándar de פַּרְעֹה, no 'Pharaoh'.
  - Se mantiene 'coperos' y 'panaderos' para conservar el paralelismo funcional de los títulos.
  - La nota a aclara la ambigüedad de סָרִיס sin ocultarla.
  - La preposición repetida 'contra' ayuda a reflejar las tres ocurrencias de עַל en el hebreo.
