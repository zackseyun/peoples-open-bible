translation:
  language: es
  text: Junto a las puertas, a la boca[a] de la ciudad, en la entrada de las entradas, clama.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la abertura de la ciudad». El hebreo dice literalmente «a la boca de la ciudad».
    reason: lexical_alternative
  - marker: b
    text: O «llama en voz alta».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְיַד
  english_pob_choice: Beside
  chosen_spanish: Junto a
  alternatives_spanish:
  - Al lado de
  - Beside
  lexicon: HALOT
  rationale: La construcción idiomática expresa ubicación adyacente. «Junto a» suena natural en español y conserva la relación espacial sin perder la proximidad del hebreo.
- source_word: שְׁעָרִים
  english_pob_choice: the gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - las puertas de la ciudad
  - los portones
  lexicon: HALOT
  rationale: En el contexto urbano del versículo, el término apunta a los accesos de la ciudad. «Puertas» es claro y bíblicamente inteligible en español; «puertas de la ciudad» queda implícito por el contexto inmediato.
- source_word: לְפִי
  english_pob_choice: at the mouth of
  chosen_spanish: a la boca de
  alternatives_spanish:
  - en la abertura de
  - a la entrada de
  lexicon: HALOT
  rationale: Se conserva la imagen corporal de «boca» presente en el hebreo. Esta opción mantiene la metáfora espacial y evita suavizarla prematuramente a «abertura» o «entrada».
- source_word: קָרֶת
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la villa
  - el poblado
  lexicon: HALOT
  rationale: El sustantivo designa una población/city. «Ciudad» es el equivalente más natural y coherente con el marco de las puertas públicas.
- source_word: מְבוֹא
  english_pob_choice: entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - la llegada
  lexicon: HALOT
  rationale: El término señala un punto de ingreso. «Entrada» comunica con claridad la idea de acceso al espacio urbano sin añadir matices ajenos.
- source_word: פְתָחִים
  english_pob_choice: the doorways
  chosen_spanish: los portales
  alternatives_spanish:
  - las puertas
  - los umbrales
  lexicon: HALOT
  rationale: El plural describe aperturas o accesos. «Portales» conserva un valor arquitectónico plural y evita repetir «puertas» en exceso dentro del mismo verso.
- source_word: תָּרֹנָּה
  english_pob_choice: she cries out
  chosen_spanish: ella clama
  alternatives_spanish:
  - ella grita
  - ella llama en voz alta
  lexicon: HALOT
  rationale: El verbo denota una proclamación sonora en público. «Clama» preserva la intensidad y el carácter verbal de anuncio sin cargarlo de emoción no explicitada.
theological_decisions:
- issue: Personificación de la Sabiduría que habla en público
  english_pob_reading: she cries out
  chosen_spanish_reading: ella clama
  alternative_spanish_readings:
  - la Sabiduría clama
  - ella proclama
  rationale: El texto mantiene la personificación femenina de la Sabiduría como hablante pública. «Ella clama» conserva la referencia pronominal del hebreo y la continuidad con el contexto inmediato.
  doctrine_reference: Proverbios 8:1-3; personificación literaria de la Sabiduría
translation_notes:
  revision_awareness: El audit trail inglés se mantiene en acuerdo alto y sin revisiones aplicadas; esta versión española conserva la misma estructura locativa en tres miembros paralelos y la imagen verbal de proclamación pública.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» cuando corresponde a este proyecto; aquí no aparece el Tetragrámaton.
  - Se evitó sustituir el lenguaje espacial hebreo por una paráfrasis más explicativa, para preservar el paralelismo y la metáfora de acceso urbano.
  - «Clama» fue preferido sobre opciones más interpretativas para conservar la fuerza pública del verbo sin añadir un matiz emocional no atestiguado.
