    issue: Nota [a] anclada en la frase equivocada
    rationale: La auditoría inglesa usa la primera nota para la alternativa léxica de עֶבֶד ('servant/slave'). En el borrador, [a] está anclada en 'director del coro', creando desalineación con la evidencia y con la razón lexical documentada.
  - severity: medium
    issue: Nota [b] anclada en la palabra equivocada
    rationale: La nota cultural sobre 'de la mano de' debe ir anclada en la expresión idiomática correspondiente, no en 'Yahvé'. Tal como está, la referencia de la nota no coincide con el contenido explicado.
  - severity: low
