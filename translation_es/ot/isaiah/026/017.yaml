  to: Como la mujer encinta que está por dar a luz se retuerce y grita en sus dolores de parto[a], así estábamos nosotros delante de ti, oh Yahvé.
  rationale: Se ajusta el verbo principal a 'estábamos' para expresar con mejor naturalidad española la condición comparada del pueblo ante Yahvé. Se mantiene 'delante de ti' para preservar la tensión semántica de מִפָּנֶיךָ. La nota al pie se conserva sustancialmente igual, pero se corrige su puntuación y estilo editorial.
