  yaml_path: translation/deuterocanon/4_maccabees/014/030.yaml
  text: But even so[a], although so many impulses of motherly love were drawing the mother toward sympathy[b], the all-varied tortures were not able by any one of them to turn aside her reason.
  footnotes:
  - marker: a
    text: Or 'so many impulses of maternal affection.' The Greek phrase refers to the powerful pull of a mother's love for her children.
    reason: lexical_alternative
  - marker: b
    text: '''Her reason'' could also be rendered ''her resolve'' or ''her rational judgment.'' The book regularly uses this term for reason''s rule over emotion.'
    reason: lexical_alternative
