translation:
  language: es
  text: hasta que yo venga y me los lleve[a] a una tierra como su propia tierra, tierra de grano y de vino nuevo[b], tierra de pan y de viñedos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y los tome». El verbo hebreo simplemente significa «tomar»; «y me los lleve» hace explícita, por el contexto, la idea de traslado forzado.'
    reason: lexical_alternative
  - marker: b
    text: «Vino nuevo» traduce el hebreo תירוש, un término que a menudo se distingue de la palabra más general para «vino»; también puede traducirse «mosto».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el momento en que
  lexicon: HALOT
  rationale: Marca el límite temporal de la acción; en español, 'hasta que' comunica de manera natural la idea de espera condicionada por una llegada futura.
- source_word: בֹּאִי
  english_pob_choice: I come
  chosen_spanish: yo venga
  alternatives_spanish:
  - yo llegue
  - yo venga
  lexicon: HALOT
  rationale: El hebreo expresa venir/llegar en primera persona; 'venga' conserva el valor de venida futura en un registro natural en español con 'hasta que'.
- source_word: וְלָקַחְתִּי
  english_pob_choice: and take you away
  chosen_spanish: y los lleve[a]
  alternatives_spanish:
  - y los tome
  - y los saque de allí
  - y los lleve fuera
  lexicon: HALOT
  rationale: לקח significa 'tomar/llevar'. En este contexto de traslado forzado, 'llevar' comunica la reubicación implícita sin añadir una paráfrasis demasiado libre; la nota a aclara la alternativa más literal.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: HALOT
  rationale: El objeto directo plural queda integrado en el clítico 'los'; el referente se entiende por el contexto. Se evita repetir 'a ustedes' para no cargar la frase.
- source_word: אֶל אֶרֶץ
  english_pob_choice: to a land
  chosen_spanish: a una tierra
  alternatives_spanish:
  - a una tierra
  - hacia una tierra
  lexicon: HALOT
  rationale: אֶל indica movimiento hacia un destino; 'a una tierra' es la forma más natural y precisa en español.
- source_word: כְּאַרְצְכֶם
  english_pob_choice: like your own land
  chosen_spanish: como la de ustedes
  alternatives_spanish:
  - como su propia tierra
  - igual a la suya
  lexicon: HALOT
  rationale: כְ expresa comparación. 'Como la de ustedes' mantiene la relación comparativa sin forzar una equivalencia absoluta, y evita una repetición pesada de 'tierra'.
- source_word: אֶרֶץ דָּגָן וְתִירוֹשׁ
  english_pob_choice: a land of grain and new wine
  chosen_spanish: tierra de grano y de mosto[b]
  alternatives_spanish:
  - tierra de grano y vino nuevo
  - tierra de cereal y de mosto
  lexicon: HALOT
  rationale: דָגָן se refleja bien con 'grano'. תִירוֹשׁ designa mosto/vino nuevo; 'mosto' conserva la distinción léxica destacada por la POB inglesa entre este término y el vino general.
- source_word: אֶרֶץ לֶחֶם וּכְרָמִים
  english_pob_choice: a land of bread and vineyards
  chosen_spanish: tierra de pan y de viñedos
  alternatives_spanish:
  - tierra de pan y viñedos
  - tierra de alimento y viñedos
  lexicon: HALOT
  rationale: לֶחֶם se traduce literalmente como 'pan' en este paralelismo de abundancia; 'viñedos' mantiene כרמים con fidelidad léxica y claridad natural en español.
theological_decisions:
- issue: Posible sentido de deportación en וְלָקַחְתִּי
  english_pob_reading: and take you away
  chosen_spanish_reading: y los lleve
  alternative_spanish_readings:
  - y los tome
  - y los saque de allí
  rationale: El hebreo básico es 'tomar', pero el contexto narrativo de amenaza imperial sugiere traslado forzado. La forma española principal conserva la ambigüedad del verbo con una lectura contextual de desplazamiento, y la nota a documenta la alternativa más literal.
  doctrine_reference: Contexto histórico-literario de Isaías 36:17; cf. uso contextual de verbos de traslado forzado en relatos de conquista/exilio.
- issue: Distinción entre תִירוֹשׁ y vino general
  english_pob_reading: new wine
  chosen_spanish_reading: mosto
  alternative_spanish_readings:
  - vino nuevo
  - mosto
  rationale: El término hebreo no es simplemente 'vino' en sentido general. 'Mosto' preserva mejor la especificidad léxica y mantiene la nota de abundancia agrícola del pasaje.
  doctrine_reference: Léxico agrícola del AT; distinción semántica בין יין y תירושׁ en contextos de cosecha.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés y la revisión más reciente, que no introdujo cambios. La redacción española sigue la misma lectura óptima: mantiene la comparación de la tierra, explicita solo lo necesario del traslado y preserva la distinción léxica de תירוש con una nota.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' según las reglas del proyecto solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se prefirió 'tierra' de manera consistente para ארץ, evitando alternar con 'país' o 'territorio' para no debilitar la imagen agrícola del pasaje.
  - '''Pan'' se conservó literalmente para לֶחֶם, en línea con el paralelismo de abundancia y sin generalizarlo a ''alimento''.'
