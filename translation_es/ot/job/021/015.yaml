translation:
  language: es
  text: ¿Qué es el Todopoderoso, para que le sirvamos? ¿Y qué ganaríamos[a] si le suplicáramos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué provecho sacaríamos si le suplicáramos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What is
  chosen_spanish: ¿Qué es...
  alternatives_spanish:
  - ¿Quién es...
  - ¿Qué...
  lexicon: HALOT
  rationale: 'La pregunta retórica en español funciona mejor como valoración de importancia o valía: «¿Qué es el Todopoderoso...?» conserva el tono despectivo del hebreo sin volverla una pregunta de identidad personal.'
- source_word: שַׁדַּ֥י
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: El título divino se traduce para preservar su sentido para el lector español, igual que en el audit trail inglés. «Todopoderoso» mantiene la fuerza del título sin transliteración innecesaria.
- source_word: נַעַבְדֶנּוּ
  english_pob_choice: we should serve him
  chosen_spanish: le sirvamos
  alternatives_spanish:
  - le sirvamos como esclavos
  - le rindamos servicio
  lexicon: HALOT
  rationale: עבד con referencia a Dios expresa servicio/lealtad religiosa. En español, «servirle» reproduce ese campo semántico de manera natural y evita limitarlo solo a culto litúrgico.
- source_word: נּוֹעִיל
  english_pob_choice: would we gain
  chosen_spanish: ¿qué ganaríamos?
  alternatives_spanish:
  - ¿qué provecho sacaríamos?
  - ¿qué nos aprovecharía?
  lexicon: HALOT
  rationale: El verbo apunta a utilidad o beneficio. «¿Qué ganaríamos?» comunica con naturalidad la perspectiva utilitaria de los impíos, sin perder el matiz de provecho.
- source_word: נִפְגַּע בּוֹ
  english_pob_choice: we entreat him
  chosen_spanish: le suplicáramos
  alternatives_spanish:
  - le rogáramos
  - le entendiéramos
  lexicon: HALOT
  rationale: פגע con ב puede significar suplicar o interceder. «Suplicáramos» conserva el sentido de petición insistente y formal que el registro español requiere aquí, sin dejar de reflejar la relación de oración.
theological_decisions:
- issue: Título divino שַׁדַּי en Job
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: No se conserva la transliteración porque el proyecto traduce títulos divinos para hacer explícito su valor semántico. No hay tensión doctrinal; sí una decisión de claridad y reverencia textual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: 'El draft sigue la lectura revisada del audit trail inglés, que cambió la segunda cláusula de una formulación más interpretativa a «entreat him»; por eso se usó «suplicáramos», más cercano a la petición formal/urgente del hebreo פגע con ב. También se mantiene el paralelismo retórico del verso: primera pregunta sobre el valor de servir a Dios y segunda sobre el provecho de suplicarlo.'
  spanish_consistency_notes:
  - Se mantiene «el Todopoderoso» para שַׁדַּי, en línea con el criterio del proyecto para títulos divinos.
  - «Servirle» conserva el sentido amplio de servicio/lealtad a Dios sin reducirlo a adoración litúrgica.
  - «Suplicáramos» refleja el matiz de ruego/intercesión y permite una alternativa de lectura en nota.
  - El orden y la puntuación buscan reproducir el paralelismo poético del hebreo con naturalidad en español.
