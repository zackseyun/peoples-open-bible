base_translation:
  language: en
  yaml_path: translation/ot/leviticus/019/009.yaml
  text: When you reap the harvest of your land[a], you shall not completely reap the edge of your field, and you shall not gather the gleanings of your harvest.
  footnotes:
  - marker: a
    text: Or 'the corner of your field.' The Hebrew term can denote an edge, side, or corner; here it refers to the outer part of the field that must be left unreaped.
    reason: lexical_alternative
