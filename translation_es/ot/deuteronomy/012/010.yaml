translation:
  language: es
  text: Pero cuando crucen el Jordán y habiten en la tierra que Yahvé su Dios les da para que la hereden, y él les dé descanso de todos sus enemigos alrededor de ustedes, entonces vivirán seguros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habitarán con seguridad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַרְתֶּם
  english_pob_choice: when you cross
  chosen_spanish: cuando crucen
  alternatives_spanish:
  - y crucen
  - después que crucen
  lexicon: HALOT
  rationale: El verbo con waw consecutiva mira al futuro dentro de la secuencia; en español, «cuando crucen» expresa mejor esa temporalidad que una coordinación más literal.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Es el nombre propio geográfico estándar en español; el sustantivo «río» está implícito y no es necesario para la claridad.
- source_word: וִישַׁבְתֶּם
  english_pob_choice: live
  chosen_spanish: habiten
  alternatives_spanish:
  - vivan
  - se asienten
  lexicon: HALOT
  rationale: ישב aquí comunica residencia estable en la tierra. «Habiten» conserva ese sentido asentado sin sonar forzado.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  lexicon: HALOT
  rationale: «Tierra» preserva la resonancia de herencia pactal y territorial que tiene el hebreo en este contexto.
- source_word: יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé, su Dios
  alternatives_spanish:
  - Yahvé su Dios
  - el SEÑOR, su Dios
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino como «Yahvé» según la política del proyecto. «Su Dios» refleja el posesivo plural del hebreo y mantiene el tono de pacto.
- source_word: מַנְחִיל אֶתְכֶם
  english_pob_choice: is giving you to inherit
  chosen_spanish: les da para heredar
  alternatives_spanish:
  - les hace heredar
  - les da en herencia
  lexicon: HALOT
  rationale: El hifil de נחל implica causar a heredar/poseer. «Les da para heredar» mantiene la agencia divina y la idea de herencia sin volverla poco natural en español.
- source_word: וְהֵנִיחַ לָכֶם
  english_pob_choice: and he gives you rest
  chosen_spanish: y les dé descanso
  alternatives_spanish:
  - y les conceda descanso
  - y les dé reposo
  lexicon: HALOT
  rationale: נוח en hifil expresa conceder descanso o alivio. «Les dé descanso» es idiomático y preserva el motivo teológico del descanso en la tierra.
- source_word: מִכָּל אֹיְבֵיכֶם מִסָּבִיב
  english_pob_choice: from all your enemies around you
  chosen_spanish: de todos sus enemigos alrededor de ustedes
  alternatives_spanish:
  - de todos sus enemigos que los rodean
  - de todos sus enemigos por todos lados
  lexicon: HALOT
  rationale: Se conserva el alcance total de la amenaza y el matiz espacial de סביב; «alrededor de ustedes» es fiel y natural.
- source_word: וִישַׁבְתֶּם בֶּטַח
  english_pob_choice: you will live in safety
  chosen_spanish: vivirán seguros
  alternatives_spanish:
  - habitarán con seguridad
  - vivirán en seguridad
  lexicon: HALOT
  rationale: בטח expresa seguridad/seguro estado. «Vivirán seguros» comunica bien la idea de residencia protegida sin sobrecargar la frase.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; la norma del proyecto pide rendirlo como «Yahvé». Esto conserva la identidad del nombre del pacto sin la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Motivo de herencia en מַנְחִיל
  english_pob_reading: is giving you to inherit
  chosen_spanish_reading: les da para heredar
  alternative_spanish_readings:
  - les hace heredar
  - les da en herencia
  rationale: La forma causativa señala que Yahvé hace que el pueblo reciba la posesión. «Les da para heredar» conserva esa causalidad y el valor de herencia sin convertirlo en una paráfrasis interpretativa.
  doctrine_reference: Deuteronomio 12:10; motivo de la tierra prometida como herencia
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al reflejar directamente la idea de «dar para heredar» en lugar de una expansión más explicativa. También conserva el cierre con seguridad estable, equivalente al inglés revisado «live in safety».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se usa «tierra» en sentido pactal, no como mero terreno genérico.
  - «Heredar» se conserva para reflejar el hifil de נחל sin perder naturalidad en español.
  - 'El plural de segunda persona se mantiene coherente: «ustedes / les / su».'
