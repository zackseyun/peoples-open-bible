  yaml_path: translation/ot/2_chronicles/003/011.yaml
  text: 'The wings of the cherubim were twenty cubits long: one wing was five cubits[a], reaching to the wall of the house, and the other wing was five cubits[b], reaching to the wing of the other cherub.'
  footnotes:
