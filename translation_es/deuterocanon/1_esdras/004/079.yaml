translation:
  language: es
  text: Y devolvió todos los vasos que Ciro había apartado de Babilonia; y todo lo que Ciro había dicho que se hiciera[a], él mismo también ordenó que se hiciera y que fuera enviado a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había separado de Babilonia». El verbo griego puede significar separar, apartar o remover; aquí se refiere a los vasos del templo destinados a ser devueltos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent back
  chosen_spanish: envió de vuelta
  alternatives_spanish:
  - devolvió
  - remitió de vuelta
  lexicon: BDAG
  rationale: En el contexto de utensilios del templo que salen de Babilonia y regresan a Jerusalén, «envió de vuelta» conserva la dirección del retorno mejor que un simple «envió», y evita perder la idea narrativa de restitución.
- source_word: τὰ σκεύη
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los vasos sagrados
  - los objetos
  lexicon: BDAG
  rationale: Para español, «utensilios» comunica el conjunto de objetos del templo sin forzar una imagen de recipientes únicamente. Mantiene el sentido de artículos cultuales con naturalidad lectora.
- source_word: ἃ ἐχώρισεν
  english_pob_choice: had set apart
  chosen_spanish: había apartado
  alternatives_spanish:
  - había separado
  - había reservado
  lexicon: BDAG
  rationale: «Apartado» conserva la idea de separar designando algo para un uso o destino específico, y en español suena natural tanto para una decisión administrativa como para una selección de objetos.
- source_word: ἀπὸ Βαβυλῶνος
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  lexicon: BDAG
  rationale: La preposición simple «de» expresa con claridad el origen o procedencia en español y coincide con el valor contextual del griego.
- source_word: πάντα ὅσα εἶπεν Κῦρος ποιῆσαι
  english_pob_choice: everything that Cyrus had said should be done
  chosen_spanish: todo lo que Ciro había dicho que se hiciera
  alternatives_spanish:
  - todo lo que Ciro había mandado hacer
  - todo lo que Ciro había dicho que debía hacerse
  lexicon: BDAG
  rationale: El griego conserva el contenido de una orden previa; la pasiva impersonal «que se hiciera» mantiene esa referencia sin añadir explícitamente un sujeto que el texto no formula aquí.
- source_word: ἐπέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: BDAG
  rationale: «Ordenó» es el equivalente administrativo más directo y reproduce bien el carácter decretal del contexto persa.
- source_word: ἐξαποστεῖλαι εἰς Ἰερουσαλήμ
  english_pob_choice: to be sent to Jerusalem
  chosen_spanish: que fuera enviado a Jerusalén
  alternatives_spanish:
  - que se enviara a Jerusalén
  - para ser enviado a Jerusalén
  lexicon: BDAG
  rationale: La pasiva «fuera enviado» conserva el foco en los objetos y no en un agente explícito, siguiendo el sentido del infinitivo dependiente del mandato real.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere cambios sustanciales; la principal decisión de revisión fue mantener la tensión semántica de ἐχώρισεν con una forma española natural («había apartado») y una nota alternativa que preserve la posibilidad de «había separado».
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Ciro» y «Jerusalén» de forma consistente con el marco bíblico español.
  - Se eligió «Y envió de vuelta» para conservar la dirección de retorno indicada por el contexto de restitución.
  - Se evitó «SEÑOR» u այլ terminología eclesiástica no pertinente porque no aparecen en el texto fuente.
  - La pasiva impersonal «que se hiciera» y «que fuera enviado» preserva la estructura de mandato sin sobreinterpretarla.
