base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/025.yaml
  text: For he has gone down today and sacrificed oxen[a], fattened calves, and sheep in abundance, and he has invited all the king’s sons, the commanders of the army, and Abiathar the priest. And look, they are eating and drinking before him, and they are saying[b], ‘Long live King Adonijah!’
  footnotes:
