    text: Or 'touching to the wall of the house ... touching the wing of the other cherub.' The Hebrew participles can emphasize actual contact as well as extension.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to the temple building.'
    reason: cultural_note
