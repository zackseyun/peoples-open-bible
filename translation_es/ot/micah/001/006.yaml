review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: juicio futuro sobre Samaria, reducción a ruina, piedras precipitadas al valle y cimientos expuestos. Sin embargo, hay dos desajustes relevantes con la evidencia y el rastro POB en las notas: la nota [b] fue aplicada al sintagma equivocado (debería preservar la alternativa del verbo «derramaré/arrojaré» y no de «lugar para plantar viñedos»), y la nota [a] no reproduce con claridad la alternativa auditada «montón de ruinas en el campo». Además, en el texto principal falta expresar «campo abierto»/«campo», que sí corresponde a הַשָּׂדֶה y al POB inglés.'
  spanish_quality_summary: El español es claro y digno, pero el texto principal omite «el campo abierto» después de «un montón de ruinas», con lo que se pierde parte de la imagen contrastiva del original. «Así convertiré» y «derramaré» son naturales; «descubriré sus cimientos» es comprensible, aunque «dejaré al descubierto» suena un poco más idiomático. La redacción general es buena con un ajuste menor.
  glossary_alignment: No hay conflictos con los términos de proyecto. No aparecen Yahvé, Mesías, etc. La decisión de no forzar «de ella» para la personificación femenina es aceptable en español. El principal problema no es terminológico sino de alineación de notas y de una omisión textual de הַשָּׂדֶה.
  issues:
  - severity: high
    issue: Falta en el texto principal el equivalente de הַשָּׂדֶה
    rationale: El hebreo dice literalmente que Samaria será hecha «un montón de ruinas en el campo / en campo abierto». El borrador pone solo «un montón de ruinas», omitiendo un elemento explícito del original y del POB inglés («in the open country»).
  - severity: high
    issue: La nota [b] está anclada y formulada incorrectamente
    rationale: En el audit trail inglés, la nota b corresponde a la alternativa de וְהִגַּרְתִּי («I will hurl her stones...»), no a «a place for planting vineyards». La nota española actual altera el contenido documentado y desplaza la nota a otra frase.
  - severity: medium
    issue: La nota [a] no refleja con suficiente precisión la alternativa conservada
    rationale: La alternativa documentada es «a ruin heap in the field». La nota actual («un montón ruinoso en el campo») suena menos natural y menos fiel que «un montón de ruinas en el campo» o «un montón de escombros en el campo».
  - severity: low
    issue: «Descubriré sus cimientos» es entendible pero menos idiomático que «dejaré al descubierto sus cimientos»
    rationale: No es un error de fidelidad grave, pero la imagen de גלה queda más natural en español con una expresión verbal compuesta.
  revised_spanish_text: Así convertiré a Samaria en un montón de ruinas en el campo abierto[a], en lugar para plantar viñas; derramaré sus piedras en el valle[b] y dejaré al descubierto sus cimientos.
  revised_footnotes:
