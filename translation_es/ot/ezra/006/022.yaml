translation:
  language: es
  text: Y celebraron la Fiesta de los Panes sin Levadura por siete días, con alegría, porque Yahvé los había alegrado[a] y había vuelto el corazón del rey de Asiria[b] hacia ellos[c], para fortalecer sus manos en la obra de la casa de Dios, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘los había hecho alegrarse’. El hebreo usa un verbo causativo: Yahvé provocó su alegría.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘el rey de Asiria’. Aunque el gobernante en tiempos de Esdras era persa, el texto usa la designación imperial más antigua, probablemente refiriéndose al dominio que incluía el antiguo territorio asirio.'
    reason: cultural_note
  - marker: c
    text: 'O: ‘había inclinado el corazón del rey de Asiria hacia ellos’. La expresión puede referirse a orientar su disposición interior hacia ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: they kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - guardaron
  - observaron
  - hicieron
  lexicon: HALOT
  rationale: En español, con una fiesta concreta, ‘celebraron’ expresa de manera natural el sentido idiomático de עשה con objeto festivo, sin perder el valor de observancia del acto.
- source_word: חַג מַצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la fiesta de los panes sin levadura
  alternatives_spanish:
  - la Fiesta de los Panes sin Levadura
  - la festividad de los panes sin levadura
  lexicon: HALOT
  rationale: Se conserva el nombre de la celebración bíblica con una formulación clara en español. Se evita ‘Pascua’ porque el hebreo aquí nombra específicamente la fiesta de los panes sin levadura.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: ‘Por siete días’ reproduce de modo natural la duración expresada por el hebreo y funciona bien en español contemporáneo.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegremente
  - en alegría
  lexicon: HALOT
  rationale: ‘Con alegría’ mantiene el sustantivo y expresa bien la frase preposicional. ‘Gozo’ sería posible, pero ‘alegría’ es más transparente para un registro amplio en español.
- source_word: שִׂמְּחָם
  english_pob_choice: had made them joyful
  chosen_spanish: los había alegrado
  alternatives_spanish:
  - los había hecho alegrarse
  - les había dado alegría
  - los había hecho gozosos
  lexicon: HALOT
  rationale: 'El piel con sufijo tiene fuerza causativa: Yahvé causó su alegría. ‘Los había alegrado’ conserva esa causalidad de manera breve y natural, sin convertirlo en mera emoción espontánea.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ‘Yahvé’, como nombre propio divino, en vez de sustituirlo por un título.'
- source_word: וְהֵסֵב לֵב
  english_pob_choice: and had turned the heart
  chosen_spanish: había inclinado el corazón
  alternatives_spanish:
  - había vuelto el corazón
  - había cambiado el corazón
  - había dirigido el corazón
  lexicon: HALOT
  rationale: Aunque ‘volvió’ es posible, ‘había inclinado el corazón’ conserva mejor la imagen semítica de orientar la disposición interior hacia alguien, y suena natural en español bíblico contemporáneo.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  - el monarca de Asiria
  lexicon: HALOT
  rationale: Se mantiene la designación explícita del hebreo. Aunque históricamente el gobernante sea persa, la traducción no corrige el texto; preserva el nombre imperial que el hebreo usa.
- source_word: עֲלֵיהֶם
  english_pob_choice: toward them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - contra ellos
  - para ellos
  - en su favor
  lexicon: HALOT
  rationale: Con ‘inclinar el corazón’, la preposición apunta a dirección hacia ellos. ‘Hacia ellos’ es fiel y no añade la interpretación más fuerte de ‘en su favor’ al texto principal.
- source_word: לְחַזֵּק יְדֵיהֶם
  english_pob_choice: to strengthen their hands
  chosen_spanish: para fortalecer sus manos
  alternatives_spanish:
  - para animarlos
  - para darles fuerzas
  - para sostener su obra
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de ‘manos’ como imagen de capacidad y vigor para la tarea. Así se mantiene la tensión lexical sin eliminar el simbolismo.
- source_word: בִּמְלֶאכֶת
  english_pob_choice: in the work of
  chosen_spanish: en la obra de
  alternatives_spanish:
  - en el trabajo de
  - en la labor de
  - para la obra de
  lexicon: HALOT
  rationale: ‘Obra’ funciona bien para la actividad de reconstrucción/servicio y resulta más idiomático que ‘trabajo’ en este contexto.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: Se traduce literalmente la expresión hebrea ‘casa de Dios’, que es transparente y conserva la formulación del original mejor que ‘templo’.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Es la equivalencia normal y precisa del constructo hebreo, manteniendo el vínculo de pacto e identidad nacional-teológica.
theological_decisions:
- issue: Representación del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La edición española sigue la convención del proyecto para יְהוָה como nombre propio divino, preservando la referencia personal del pacto en vez de ocultarla tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Designación histórica 'rey de Asiria' en contexto persa
  english_pob_reading: the king of Assyria
  chosen_spanish_reading: el rey de Asiria
  alternative_spanish_readings:
  - el rey persa
  - el rey sobre Asiria
  rationale: Se conserva la lectura del hebreo aunque el referente histórico sea problemático. La traducción no armoniza ni corrige la designación; deja la tensión textual intacta.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never import claims the text does not make.'
translation_notes:
  revision_awareness: 'Se revisó el precedente del inglés POB y su aparato crítico. No se incorporaron cambios ulteriores: la lectura se mantiene estable, con la tensión histórica de ‘rey de Asiria’ preservada en el texto principal y aclarada solo en nota.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene ‘casa de Dios’ en lugar de ‘templo de Dios’ para seguir la literalidad del hebreo.
  - ‘Manos’ se conserva en la metáfora idiomática para no neutralizar la imagen del original.
  - La nota sobre ‘rey de Asiria’ evita corregir el texto y respeta la decisión del POB inglés.
