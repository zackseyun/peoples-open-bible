translation:
  language: es
  text: 'Cuando José vio a Benjamín con ellos, le dijo al que estaba a cargo de su casa[a]: «Trae a los hombres a la casa, sacrifica un animal[b] y prepáralo, porque los hombres comerán conmigo al mediodía[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al mayordomo de su casa». El hebreo literalmente dice «al que estaba sobre su casa».
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: literalmente, «sacrifica un sacrificio», es decir, mata y prepara un animal para la comida.'
    reason: cultural_note
  - marker: c
    text: O «a mediodía».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - advirtió
  lexicon: HALOT
  rationale: El verbo de percepción describe que José se dio cuenta de la presencia de Benjamín; «vio» es la equivalencia natural y fiel en español.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  lexicon: HALOT
  rationale: La preposición indica compañía; «con ellos» reproduce de manera directa la relación de Benjamín con los hermanos.
- source_word: לַאֲשֶׁר עַל בֵּיתוֹ
  english_pob_choice: to the one over his household
  chosen_spanish: al que estaba sobre su casa
  alternatives_spanish:
  - al mayordomo de su casa
  - al encargado de su casa
  lexicon: HALOT
  rationale: La frase hebrea describe funcionalmente a la persona encargada de la casa. «El que estaba sobre su casa» conserva la estructura y evita imponer un término interpretativo fijo.
- source_word: הָבֵא ... הַבָּיְתָה
  english_pob_choice: Bring the men into the house
  chosen_spanish: Trae a los hombres a la casa
  alternatives_spanish:
  - Trae a los hombres dentro de la casa
  - Lleva a los hombres a la casa
  lexicon: HALOT
  rationale: El movimiento hacia el interior está claro por la forma direccional. «A la casa» es natural en español; «dentro de la casa» sería más explícito pero algo más pesado.
- source_word: וּטְבֹחַ טֶבַח
  english_pob_choice: slaughter an animal
  chosen_spanish: sacrifica un animal
  alternatives_spanish:
  - mata y prepáralo para comer
  - sacrifica para el banquete
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para faenar una res para comida. En español, «sacrifica un animal» preserva la fuerza del mandato y evita especificar indebidamente la especie.
- source_word: וְהָכֵן
  english_pob_choice: prepare it
  chosen_spanish: prepáralo
  alternatives_spanish:
  - hazlo listo
  - prepárale
  lexicon: HALOT
  rationale: El verbo hifil de כון comunica preparar o poner listo; el pronombre lo enlaza naturalmente con el animal sacrificado.
- source_word: כִּי אִתִּי יֹאכְלוּ הָאֲנָשִׁים
  english_pob_choice: because the men will eat with me
  chosen_spanish: porque los hombres comerán conmigo
  alternatives_spanish:
  - pues los hombres comerán conmigo
  - porque esos hombres comerán conmigo
  lexicon: HALOT
  rationale: La causalidad de כִּי se expresa con «porque». «Conmigo» conserva la compañía personal de la mesa sin añadir matiz inexistente.
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - a la hora del mediodía
  lexicon: HALOT
  rationale: El término denota el tiempo del mediodía; «al mediodía» es la forma española más natural y precisa.
translation_notes:
  revision_awareness: Alineado con el texto hebreo masorético y con la auditoría inglesa POB; no se registran revisiones textuales relevantes ni cambios doctrinales para este versículo.
  spanish_consistency_notes:
  - Se mantiene «José» para יוֹסֵף y «Benjamín» para בִּנְיָמִין.
  - Se evita «SEÑOR» o «Cristo», pues no aparecen en este versículo.
  - «Casa» traduce בַּיִת con valor concreto de residencia/edificio; «su casa» conserva el posesivo del hebreo.
  - El mandato se conserva en estilo directo con puntuación española estándar y comillas angulares.
  - Las notas [a], [b] y [c] están ancladas exactamente en el texto principal.
