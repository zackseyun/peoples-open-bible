revisions:
- from: Así Josué vino sobre ellos[a][b] de repente, subiendo toda la noche desde Gilgal.
  to: Así, Josué llegó hasta ellos de repente[a], después de subir[b] desde Gilgal toda la noche.
  rationale: Se reemplaza 'vino sobre ellos' por 'llegó hasta ellos' para evitar un calco duro y mantener el sentido de aproximación súbita. Se cambia 'subiendo' por 'después de subir' para expresar mejor la circunstancia previa de la marcha nocturna desde Gilgal, conservando la nota literal sobre 'subió'. También se ajusta la colocación de las notas para que correspondan con mayor precisión a sus expresiones.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Josué llega inesperadamente al enemigo tras subir desde Gilgal durante toda la noche. Sin embargo, dos elecciones españolas debilitan la fidelidad idiomática y sintáctica: ''vino sobre ellos'' suena poco natural en español bíblico moderno, y ''subiendo toda la noche'' presenta la subida como simultánea de manera menos precisa que el hebreo/POB, que la trata como circunstancia previa (''habiendo subido'' / ''después de subir'').'
  spanish_quality_summary: 'El texto es comprensible, pero ''vino sobre ellos'' resulta calcado y torpe; en español natural y digno, ''cayó sobre ellos'' sería demasiado interpretativo, mientras que ''llegó a ellos de repente'' o ''vino contra ellos de repente'' cambian el matiz. La mejor solución es conservar el verbo básico con una construcción más natural: ''llegó hasta ellos de repente'' o ''vino sobre ellos de repente'' no es ideal. Además, conviene reordenar la frase final a ''después de subir desde Gilgal toda la noche'' para claridad.'
  glossary_alignment: No hay términos teológicos sensibles aquí. 'Josué' y 'Gilgal' están bien. La revisión se centra en equivalencia léxica y naturalidad española, no en terminología doctrinal.
  issues:
  - severity: medium
    issue: '''vino sobre ellos'' es un calco poco natural en español'
    rationale: Aunque intenta reflejar 'came upon them', en español moderno suena forzado. El hebreo dice literalmente 'vino a/hacia ellos', y el contexto militar permite una formulación más idiomática sin perder la sorpresa táctica.
  - severity: medium
    issue: '''subiendo toda la noche'' no expresa bien la relación circunstancial previa de עָלָה'
    rationale: El hebreo perfecto verbal después de la cláusula principal describe la marcha nocturna como antecedente o circunstancia completada. 'Subiendo' sugiere acción en progreso simultánea; 'después de subir' o 'habiendo subido' comunica mejor el valor narrativo.
  - severity: low
    issue: Anclaje de notas mejorable
    rationale: La nota sobre 'subió desde Gilgal toda la noche' debe anclarse en la frase de subida, no en 'ellos'; así el lector identifica con más claridad qué expresión comenta cada nota.
  revised_spanish_text: Así, Josué llegó hasta ellos de repente[a], después de subir[b] desde Gilgal toda la noche.
  revised_footnotes:
  - marker: a
    text: O ‘vino a ellos de repente’; el verbo hebreo dice literalmente ‘vino’, y el contexto militar sugiere una llegada súbita sobre el enemigo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘subió desde Gilgal toda la noche’.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'vino sobre ellos' por 'llegó hasta ellos' para evitar un calco duro y mantener el sentido de aproximación súbita. Se cambia 'subiendo' por 'después de subir' para expresar mejor la circunstancia previa de la marcha nocturna desde Gilgal, conservando la nota literal sobre 'subió'. También se ajusta la colocación de las notas para que correspondan con mayor precisión a sus expresiones.
