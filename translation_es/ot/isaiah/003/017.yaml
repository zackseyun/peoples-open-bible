- from: Por tanto, el Señor herirá la coronilla de las hijas de Sion con tiña[a], y Yahvé descubrirá sus partes íntimas.
  to: Por tanto, el Señor herirá la coronilla de las hijas de Sion con llagas, y Yahvé descubrirá sus partes íntimas[a].
  rationale: Se reemplaza 'con tiña' por 'con llagas' para reflejar mejor el sentido punitivo de una afección cutánea visible sin imponer un diagnóstico demasiado específico. La nota se ancla sobre la frase disputada y se corrige su gramática para un español natural y fiel al expediente léxico inglés. No se requiere adjudicación adicional, porque la dificultad léxica de פָּתְהֵן ya queda debidamente preservada en nota y la revisión es de estilo/precisión, no de doctrina.
