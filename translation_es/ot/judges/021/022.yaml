translation:
  language: es
  text: 'Y sucederá que, cuando sus padres o sus hermanos vengan a quejarse[a] ante nosotros, les diremos: «Concédannoslas[b] como favor, porque no tomamos para cada hombre a su esposa[c] en la batalla; pues ustedes no se las dieron[d]; de otro modo, ahora serían culpables[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vengan a contender con nosotros» o «vengan a presentar una demanda contra nosotros».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mostradnos gracia respecto de ellos»; la súplica pide benevolencia hacia los hablantes en relación con las mujeres.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo es breve: «no tomamos para cada hombre su esposa en la batalla»; probablemente significa que no se habían obtenido suficientes esposas para los hombres de Benjamín.'
    reason: cultural_note
  - marker: d
    text: O «ustedes no les dieron las mujeres»; el hebreo repite pronombres de manera compacta.
    reason: lexical_alternative
  - marker: e
    text: La cláusula final en hebreo es difícil. El sentido es que, como las mujeres no les fueron dadas formalmente por sus familias, las familias no serían tenidas por culpables.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרִיב
  english_pob_choice: come to complain to us
  chosen_spanish: venir a quejarse ante nosotros
  alternatives_spanish:
  - venir a contender con nosotros
  - venir a presentar una demanda contra nosotros
  lexicon: HALOT
  rationale: El verbo ריב en este contexto admite la idea de disputa, reclamo o queja. «Quejarse» preserva el matiz de agravio sin volver demasiado jurídico el texto; «ante nosotros» refleja bien el movimiento hacia los hablantes.
- source_word: חָנּוּנוּ אֹתָם
  english_pob_choice: Grant them to us as a favor
  chosen_spanish: Concedédnoslos como favor
  alternatives_spanish:
  - Sednos favorables respecto de ellos
  - Hacednos gracia con respecto a ellos
  lexicon: HALOT
  rationale: La forma con חנן y sufijo de 1cp expresa una súplica de gracia o favor. En español, «Concedédnoslos como favor» mantiene la petición y el objeto directo implícito en «ellos»; «como favor» intenta reproducir la lógica pragmática del ruego sin perder la conexión con las mujeres.
- source_word: לֹא לָקַחְנוּ אִישׁ אִשְׁתּוֹ בַּמִּלְחָמָה
  english_pob_choice: we did not take for each man his wife in the battle
  chosen_spanish: no tomamos para cada hombre a su esposa en la batalla
  alternatives_spanish:
  - no tomamos una esposa para cada hombre en la batalla
  - no arrebatamos a cada hombre su esposa en la batalla
  lexicon: HALOT
  rationale: El hebreo es comprimido y algo abrupto. «Para cada hombre a su esposa» conserva la estructura relacional de אִישׁ אִשְׁתּוֹ y hace explícito el sentido de provisión matrimonial que el contexto requiere.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en la guerra
  - por la guerra
  lexicon: HALOT
  rationale: La referencia concreta al conflicto reciente se conserva mejor con «en la batalla», expresión natural en español y fiel al escenario histórico.
- source_word: לֹא אַתֶּם נְתַתֶּם לָהֶם
  english_pob_choice: you did not give them to them
  chosen_spanish: ustedes no se las dieron
  alternatives_spanish:
  - ustedes no las dieron a ellos
  - ustedes no se las entregaron
  lexicon: HALOT
  rationale: El hebreo repite pronombres de manera compacta. «Se las dieron» mantiene la relación entre las mujeres y los hombres de Benjamín, y el uso de «ustedes» hace visible el sujeto plural sin recargar la frase.
- source_word: כָּעֵת תֶּאְשָׁמוּ
  english_pob_choice: otherwise you would now be guilty
  chosen_spanish: y ahora incurrirían en culpa
  alternatives_spanish:
  - y ahora serían culpables
  - de otro modo, quedarían culpables ahora
  lexicon: HALOT
  rationale: El cierre hebreo es difícil. En contexto, el argumento es que, al no haber dado formalmente a las mujeres, los padres no quedarían comprometidos con culpa. «Incurrirían en culpa» conserva el valor de אשׁם como carga de culpa, y «ahora» refleja כעת.
theological_decisions:
- issue: Responsabilidad moral ligada a la entrega formal de las mujeres
  english_pob_reading: because the women were not formally given by their families, the families would not be held guilty
  chosen_spanish_reading: porque ustedes no se las dieron, y ahora incurrirían en culpa
  alternative_spanish_readings:
  - porque ustedes no se las dieron, así que no habría culpa para ustedes
  - porque no fue una entrega formal, por lo cual ustedes no serían culpables
  rationale: El cierre del versículo es interpretativamente difícil. La redacción española conserva la lógica de responsabilidad y culpa sin resolver de manera indebida la ambigüedad del hebreo; el texto deja visible que la culpa depende del acto de dar formalmente las mujeres.
  doctrine_reference: Responsabilidad moral y culpa legal en el contexto del pacto y de la familia
- issue: Petición de favor/gracia en lugar de una simple demanda
  english_pob_reading: Grant them to us as a favor
  chosen_spanish_reading: Concedédnoslos como favor
  alternative_spanish_readings:
  - Hacednos gracia respecto de ellos
  - Mostradnos favor con respecto a ellos
  rationale: La petición no es solo administrativa; pide indulgencia o benevolencia. «Como favor» conserva la tonalidad de ruego y la relación interpersonal implícita en חנן, sin sustituirla por terminología eclesiástica ajena al contexto.
  doctrine_reference: Gracia/favor como actitud benevolente en relaciones humanas
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión importante en el tramo medio y final: cambió ''come to contend with us'' por ''come to complain to us'', reemplazó la paráfrasis ''Show us favor concerning them'' por ''Grant them to us as a favor'', y simplificó el final a ''otherwise you would now be guilty''. La presente redacción española sigue esa última intención, pero recupera la densidad del ruego de gracia con una formulación que mantenga la literalidad relacional del hebreo. También se respetó la tensión del cierre difícil sin forzar una resolución dogmática.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto hebreo lo exige; aquí no aparece.
  - Se mantiene «culpa» para אשׁם, evitando sustituirlo por un equivalente moral más débil.
  - Se conserva el paralelismo entre «sus padres o sus hermanos» y la respuesta directa de los hablantes.
  - La frase «para cada hombre a su esposa» sigue de cerca la estructura hebrea y evita alisar demasiado la sintaxis.
  - Los marcadores de nota aparecen solo donde hay alternativas útiles para el lector español.
