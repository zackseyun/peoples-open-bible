  - severity: medium
    issue: «recibir el dinero como una dote mayor» no refleja de forma idiomática εἰς φερνῆς λόγον
    rationale: La construcción griega indica dinero recibido en calidad o concepto de dote. «Como una dote mayor» en español suena torpe y puede confundir el dinero con la dote misma. «por concepto de una dote mayor» comunica mejor el valor semántico.
