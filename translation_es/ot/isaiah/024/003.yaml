translation:
  language: es
  text: La tierra quedará completamente vaciada y completamente saqueada[a], porque Yahvé ha hablado esta palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país quedará completamente vaciado y completamente saqueado». El hebreo אֶרֶץ puede significar «tierra» o «país»; el contexto más amplio aquí favorece el sentido global de «la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבּוֹק תִּבּוֹק
  english_pob_choice: will be utterly emptied
  chosen_spanish: será completamente vaciada
  alternatives_spanish:
  - será totalmente vaciada
  - será del todo vaciada
  - será completamente desolada
  lexicon: HALOT
  rationale: El hebreo combina infinitivo absoluto y verbo finito para intensificar la idea de quedar vacía o arrasada. En español, "completamente vaciada" conserva el pasivo/resultativo y la fuerza enfática sin sonar forzado.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: אֶרֶץ puede significar "tierra" o "tierra/país". Dado que el contexto amplio de Isaías 24 es cósmico, "la tierra" funciona en español como equivalente natural de "the earth" y deja abierta la amplitud global del texto.
- source_word: וְהִבּוֹז תִּבּוֹז
  english_pob_choice: and utterly plundered
  chosen_spanish: y completamente saqueada
  alternatives_spanish:
  - y completamente despojada
  - y totalmente pillada
  - y enteramente saqueada
  lexicon: HALOT
  rationale: El verbo בזז expresa despojo o saqueo. "Saqueada" comunica bien el sentido resultativo pasivo en español, y "completamente" reproduce el paralelismo enfático del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la base o razón del juicio anunciado. "Porque" es natural en español y conserva la relación causal del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: "Yahvé". Se evita la sustitución por un título y se preserva el nombre propio divino revelado a Israel.'
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - habló
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la declaración como ya establecida. "Ha hablado" conserva esa solemnidad profética mejor que un simple "dijo".
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - este dicho
  - este asunto
  lexicon: HALOT
  rationale: En fórmula profética, דָּבָר suele referirse a una palabra o pronunciamiento divino. "Palabra" mantiene esa fuerza y evita diluirla en "asunto".
theological_decisions:
- issue: 'La amplitud de אֶרֶץ: "tierra" versus "mundo" o "país"'
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - el país
  - la tierra habitada
  rationale: El inglés POB opta por "the earth" porque el contexto de Isaías 24 es universal. En español, "la tierra" preserva esa amplitud sin imponer una glosa interpretativa más específica que el hebreo inmediato no exige.
  doctrine_reference: 'DOCTRINE.md: lexical context and scope in prophetic judgment'
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene la transliteración del Nombre divino en lugar de sustituirlo por un título. Esto sigue la convención doctrinal del proyecto y conserva la identidad personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el resultado estable del audit trail en inglés: mantiene la intensificación doble del hebreo mediante dos adverbios equivalentes, conserva el alcance cósmico de אֶרֶץ como "la tierra" y preserva el nombre divino Yahvé según la convención del proyecto. No se detectan revisiones pendientes en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - Se mantiene "palabra" para דָּבָר en fórmula profética.
  - '"Completamente" reproduce la repetición enfática del hebreo en ambos miembros paralelos.'
  - Se evita el calco rígido de "vaciada"/"saqueada" sin perder el pasivo resultativo del original.
