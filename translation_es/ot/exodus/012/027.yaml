translation:
  language: es
  text: 'Dirán: «Es el sacrificio de la Pascua para Yahvé, quien pasó de largo[b] las casas de los hijos de Israel[a] en Egipto, cuando hirió a Egipto y libró[c] nuestras casas». Y el pueblo se inclinó y adoró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «las casas de los israelitas» o «las casas de los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo detrás de «pasó de largo» es el mismo del que procede «Pascua»; también puede implicar dejar a salvo o proteger.
    reason: lexical_alternative
  - marker: c
    text: O «libró nuestras casas» / «rescató nuestras casas».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח פֶּסַח
  english_pob_choice: the Passover sacrifice
  chosen_spanish: el sacrificio de la Pascua
  alternatives_spanish:
  - un sacrificio de Pascua
  - el sacrificio pascual
  lexicon: HALOT
  rationale: La cadena constructa expresa un sacrificio vinculado a la Pascua. En español, «el sacrificio de la Pascua» conserva el sentido cultual y la relación nominal sin volverlo abstracto ni litúrgicamente desviado.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: El dativo ל en este contexto de sacrificio señala dedicación/pertenencia. «Para Yahvé» es natural en español bíblico y mantiene el nombre divino según la política del proyecto.
- source_word: פָּסַח
  english_pob_choice: passed over
  chosen_spanish: pasó por alto
  alternatives_spanish:
  - pasó sobre
  - saltó por encima de
  - perdonó
  lexicon: HALOT
  rationale: En el pasaje, el verbo debe conservar el enlace con «Pascua» y al mismo tiempo reflejar el resguardo de las casas. «Pasó por alto» comunica ese movimiento y evita borrar la relación etimológica del término.
- source_word: בָּתֵּי בְנֵי יִשְׂרָאֵל
  english_pob_choice: the houses of the sons of Israel
  chosen_spanish: las casas de los hijos de Israel
  alternatives_spanish:
  - las casas de los israelitas
  - las casas de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica masculina plural del hebreo, transparente al texto fuente y acorde con la política de mantener la forma idiomática cuando no hay impedimento claro en español.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  lexicon: HALOT
  rationale: La referencia locativa es directa y no plantea dificultad semántica.
- source_word: בְּנָגְפּוֹ אֶת מִצְרַיִם
  english_pob_choice: when he struck Egypt
  chosen_spanish: cuando hirió a Egipto
  alternatives_spanish:
  - cuando golpeó a Egipto
  - al herir a Egipto
  lexicon: HALOT
  rationale: 'El infinitivo con ב expresa circunstancia temporal: «cuando». Para נגע/נגף aquí, «hirió» mantiene el juicio divino sin exagerar ni suavizar el impacto del verbo.'
- source_word: הִצִּיל
  english_pob_choice: delivered our houses
  chosen_spanish: libró nuestras casas
  alternatives_spanish:
  - salvó nuestras casas
  - rescató nuestras casas
  - liberó nuestras casas
  lexicon: HALOT
  rationale: En contraste con la acción de herir a Egipto, הִצִּיל describe la acción protectora/salvadora sobre las casas. «Libró» conserva fuerza verbal y un matiz de rescate muy natural en español bíblico.
- source_word: וַיִּקֹּד
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se inclinó profundamente
  - se dobló
  lexicon: HALOT
  rationale: El verbo expresa una inclinación reverente. «Se inclinó» reproduce el gesto físico de manera sobria y evita confundirlo con la postración explícita del verbo siguiente.
- source_word: וַיִּשְׁתַּחֲוּוּ
  english_pob_choice: worshiped
  chosen_spanish: adoró
  alternatives_spanish:
  - se postró en adoración
  - rindió culto
  - se inclinó para adorar
  lexicon: HALOT
  rationale: Este verbo suele denotar postración en acto de adoración. «Adoró» comunica la reverencia cultual y mantiene la distinción con el verbo previo, como en el audit trail inglés.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme al criterio del proyecto, se preserva el nombre propio divino en lugar de enmascararlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Expresión de pertenencia/dedicación con לַיהוָה
  english_pob_reading: to Yahweh
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - a Yahvé
  - de Yahvé
  rationale: En lenguaje sacrificial, la preposición marca dedicación o pertenencia. «Para Yahvé» mantiene ese valor sin introducir una construcción menos natural en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación entre pasar de largo y salvar las casas
  english_pob_reading: passed over ... and delivered our houses
  chosen_spanish_reading: pasó por alto ... y libró nuestras casas
  alternative_spanish_readings:
  - pasó sobre ... y salvó nuestras casas
  - pasó de largo ... y rescató nuestras casas
  rationale: El hebreo une el verbo de la Pascua con una acción protectora posterior. La traducción conserva ambas ideas sin fusionarlas, para no borrar la tensión lexical entre pasar por alto y librar/proteger.
  doctrine_reference: Exodus 12:27 lexical note on פָּסַח / הִצִּיל
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail: mantiene la coordinación entre el verbo de pasar por alto y la acción protectora sobre las casas, y conserva el doble gesto final con dos verbos distintos (inclinación reverente y adoración) para reflejar la secuencia hebrea.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se conserva «hijos de Israel» para transparentar בְנֵי יִשְׂרָאֵל sin neutralización.
  - Se distingue entre el gesto físico «se inclinó» y el acto cultual «adoró».
  - La nota de pie [b] preserva la conexión etimológica con «Pascua» y su posible matiz de protección.
