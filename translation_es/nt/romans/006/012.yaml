translation:
  language: es
  text: Por tanto[a], no dejen que el pecado reine en su cuerpo mortal, de modo que obedezcan sus deseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: “de modo que obedezcan los deseos del pecado”.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Conserva claramente la inferencia lógica del argumento previo sin sonar demasiado coloquial. En español bíblico actual, 'Por tanto' mantiene bien el enlace discursivo.
- source_word: βασιλευέτω
  english_pob_choice: do not let ... reign
  chosen_spanish: no dejen que ... reine
  alternatives_spanish:
  - no permitan que ... gobierne
  - no dejen reinar a ...
  lexicon: BDAG
  rationale: La forma imperativa negativa transmite la prohibición continua. 'Reine' conserva la metáfora real de Pablo, y 'no dejen que' expresa el matiz exhortativo de manera natural en español.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado como poder
  - el pecado
  lexicon: BDAG
  rationale: Se mantiene 'el pecado' como sustantivo simple para no diluir la personificación paulina. El verbo 'reine' ya comunica la idea de pecado como poder dominante sin añadir glosa al texto principal.
- source_word: θνητῷ
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - sujeto a la muerte
  lexicon: BDAG
  rationale: '''Mortal'' es el equivalente natural y conciso en español, y conserva el contraste entre la condición corporal presente y la vida nueva del contexto.'
- source_word: σώματι
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: '''Cuerpo'' es la traducción directa y formal más clara. No se amplía innecesariamente, porque el contexto no exige una paráfrasis como ''cuerpo físico''.'
- source_word: εἰς τὸ ὑπακούειν
  english_pob_choice: so that you obey
  chosen_spanish: de modo que obedezcan
  alternatives_spanish:
  - para obedecer
  - con el resultado de que obedezcan
  lexicon: BDAG
  rationale: La construcción expresa finalidad o resultado. 'De modo que' es idiomático y claro en español, y mantiene la relación con la prohibición anterior.
- source_word: ἐπιθυμίαις
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - pasiones
  - apetitos
  lexicon: BDAG
  rationale: '''Deseos'' refleja adecuadamente el campo semántico amplio de ἐπιθυμία sin estrecharlo a ''lujurias''. En el contexto paulino conserva el peso moral sin sobrerregular el término.'
- source_word: αὐτοῦ
  english_pob_choice: its
  chosen_spanish: sus
  alternatives_spanish:
  - sus deseos del pecado
  - los deseos de él
  lexicon: BDAG
  rationale: El pronombre se deja relacionalmente abierto, como en el griego y en la POB inglesa, porque puede entenderse con el antecedente inmediato 'cuerpo' o, conceptualmente, con 'pecado'. 'Sus' permite esa ambigüedad sin forzar el referente.
theological_decisions:
- issue: Personificación de sin como poder reinante
  english_pob_reading: The main text preserves the personification of sin as a reigning power by retaining 'let sin reign'.
  chosen_spanish_reading: El texto principal conserva la personificación del pecado como poder dominante al decir 'no dejen que el pecado reine'.
  alternative_spanish_readings:
  - No permitan que el pecado gobierne
  - No dejen reinar al pecado
  rationale: Pablo usa un verbo real y personalizador. Mantener 'reine' en español conserva esa tensión teológica sin añadir explicación doctrinal en el cuerpo del versículo.
  doctrine_reference: Romanos 6:12; cf. Romanos 5:21; 6:14
- issue: Antecedente de αὐτοῦ ('its')
  english_pob_reading: Read 'its desires' as referring to the mortal body.
  chosen_spanish_reading: La redacción principal deja 'sus deseos' con referencia abierta, compatible con el cuerpo mortal como antecedente inmediato.
  alternative_spanish_readings:
  - '''sus deseos'' entendido como los deseos del cuerpo'
  - '''sus deseos'' entendido como los deseos del pecado'
  rationale: El griego permite que el pronombre se relacione naturalmente con el sustantivo neutro singular más cercano, 'cuerpo', pero el contexto también admite una asociación conceptual con el pecado. El español 'sus' preserva esa ambigüedad sin cerrarla de antemano.
  doctrine_reference: Romanos 6:12; auditable with the English POB footnote alternative
- issue: Valor aspectual de la exhortación negativa
  english_pob_reading: do not let sin reign
  chosen_spanish_reading: no dejen que el pecado reine
  alternative_spanish_readings:
  - no dejen que el pecado siga reinando
  - no permitan el reinado del pecado
  rationale: La exhortación apunta a una prohibición continua. El presente de subjuntivo en español sostiene bien ese aspecto exhortativo y evita sonar como una orden puntual aislada.
  doctrine_reference: Romanos 6:12; cf. Romanos 6:13-14
translation_notes:
  revision_awareness: Se observó la revisión más reciente del testimonio inglés, que añadió una coma antes de la cláusula de propósito/resultado. La puntuación española refleja esa relación con 'de modo que' y mantiene la claridad sintáctica. También se tuvo en cuenta la nota auditada sobre el antecedente de αὐτοῦ, preservando en español una ambigüedad controlada con 'sus'.
  spanish_consistency_notes:
  - Se usó 'pecado' en vez de una paráfrasis moralizante para conservar la personificación paulina.
  - Se prefirió 'cuerpo' y no 'cuerpo físico' porque el griego solo dice σώματι y el contexto ya delimita el sentido.
  - '''Mortal'' se mantuvo como adjetivo simple para conservar la antítesis con la vida nueva en Romanos 6.'
  - La cláusula final se tradujo con 'de modo que' para sostener la relación de finalidad o resultado sin sobreinterpretarla.
