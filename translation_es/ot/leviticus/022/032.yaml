translation:
  language: es
  text: No profanen mi santo nombre; y yo seré santificado[a] en medio de los hijos de Israel. Yo soy Yahvé[b], que los santifica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seré mostrado como santo» o «seré tratado como santo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel», expresión estándar para el pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְחַלְּלוּ
  english_pob_choice: profane
  chosen_spanish: profanarán
  alternatives_spanish:
  - tratarán como común
  - contaminarán
  - deshonrarán
  lexicon: HALOT
  rationale: El verbo piel de חלל en este contexto cultual expresa tratar como común o rebajar lo santo. «Profanarán» conserva bien la fuerza teológica y ceremonial del mandato sin suavizarla.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi nombre santo
  - mi sagrado nombre
  lexicon: HALOT
  rationale: «Santo» es el equivalente más natural y fiel de קָדוֹשׁ en español bíblico. Se mantiene «nombre» para reproducir la construcción hebrea y su peso revelatorio.
- source_word: וְנִקְדַּשְׁתִּי
  english_pob_choice: I will be sanctified
  chosen_spanish: seré santificado
  alternatives_spanish:
  - seré mostrado como santo
  - seré tratado como santo
  - seré hallowado
  lexicon: HALOT
  rationale: La pasiva/reflexiva del nifal de קדשׁ expresa que Yahvé debe ser reconocido y tratado como santo. «Seré santificado» conserva el vínculo léxico con el final del versículo y la terminología de santidad.
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el seno de
  - en medio de ellos
  lexicon: HALOT
  rationale: «En medio de» reproduce con claridad el valor locativo relacional y sugiere la presencia pública de Yahvé dentro de la comunidad.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo con «hijos de Israel», como en el texto fuente, sin neutralizarla en «pueblo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como transliteración reverente y reconocible en español, evitando la sustitución por un título.'
- source_word: מְקַדִּשְׁכֶם
  english_pob_choice: who sanctifies you
  chosen_spanish: que los santifico
  alternatives_spanish:
  - que los hace santos
  - que los consagra
  - que os santifico
  lexicon: HALOT
  rationale: El participio expresa acción divina continua. «Los santifico» mantiene la conexión con קדשׁ y el tratamiento en plural de segunda persona; en español bíblico resulta más fluido que una perífrasis explicativa.
theological_decisions:
- issue: Forma verbal de וְנִקְדַּשְׁתִּי
  english_pob_reading: I will be sanctified / be shown holy / be treated as holy
  chosen_spanish_reading: seré santificado
  alternative_spanish_readings:
  - seré mostrado como santo
  - seré tratado como santo
  - seré considerado santo
  rationale: La expresión puede entenderse pasivamente o con matiz de reconocimiento público. Se conserva «seré santificado» porque refleja la raíz hebrea y deja abierta la tensión semántica que el inglés POB también documenta.
  doctrine_reference: 'DOCTRINE.md Contested terms: קדשׁ / santidad'
- issue: Preservación del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. Traducirlo como «Yahvé» mantiene el nombre personal de Dios y evita el reemplazo por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia comunitaria de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  rationale: Aunque el referente es todo el pueblo, el hebreo es literalmente masculino plural. Se conserva la forma fuente para no borrar el dato morfológico que el POB inglés también retiene.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa reemplazó «but» por «and» para reflejar con mayor precisión la conjunción hebrea וְ. En español se reflejó con «y», manteniendo la coordinación simple del original sin introducir contraste. También se eliminó cualquier puntuación final extra y se preservó la estructura de dos miembros con cierre identificatorio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - Se prefirió «santo/santificado» para conservar la raíz קדשׁ en ambos miembros del versículo.
  - Se conservó la forma masculina plural «hijos de Israel» por transparencia morfológica.
  - La coordinación entre cláusulas quedó con «y», sin adversativa, en línea con el hebreo y la revisión auditada.
