translation:
  language: es
  text: Entonces la joven corrió y le contó a la familia de su madre[a] estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a la casa de su madre”. La expresión hebrea puede referirse tanto a la casa física como al conjunto doméstico o familiar asociado con su madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - fue corriendo
  - se apresuró
  lexicon: HALOT
  rationale: רוץ expresa movimiento rápido en narrativa. ‘Corrió’ es el equivalente natural y directo en español, manteniendo la secuencia narrativa sin añadir matiz no indicado por el hebreo.
- source_word: הַנַּעֲרָ
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  - la doncella
  lexicon: HALOT
  rationale: נַעֲרָ designa a una mujer joven. ‘La joven’ conserva claridad y dignidad en español moderno, evitando ‘muchacha’ si suena más coloquial y ‘doncella’ por ser más arcaico.
- source_word: וַתַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo contó
  alternatives_spanish:
  - lo relató
  - lo informó
  lexicon: HALOT
  rationale: נגד en Hifil significa dar a conocer o contar. En español, ‘se lo contó’ refleja el acto de comunicar el relato de manera natural en contexto narrativo, sin sobrerregularizarlo como ‘informó’.
- source_word: לְבֵית אִמָּהּ
  english_pob_choice: her mother's household
  chosen_spanish: a la familia de su madre
  alternatives_spanish:
  - a la casa de su madre
  - al hogar de su madre
  - a la casa de su madre y su gente
  lexicon: HALOT
  rationale: בַּיִת puede referirse tanto a la casa física como al grupo doméstico. ‘Familia de su madre’ comunica bien la unidad de personas asociada al ámbito materno en español; se evita limitar el sentido a un edificio y también evitar una traducción demasiado idiomática sin anclaje claro.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: about these things
  chosen_spanish: conforme a estas cosas
  alternatives_spanish:
  - acerca de estas cosas
  - según estas palabras
  - sobre estos asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede ser ‘palabras’, ‘cosas’ o ‘asuntos’. El hebreo aquí introduce el contenido de lo que contó. ‘Conforme a estas cosas’ conserva el enlace con el hebreo sin forzar una paráfrasis excesiva; reconoce también la posibilidad de que el giro funcione como referencia al contenido del relato.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la traducción inglesa auditada; no se documentan revisiones textuales o de sentido que requieran un cambio sustantivo. Se mantiene la tensión léxica de בַּיִת mediante nota, como en el antecedente inglés.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita ‘SEÑOR’ y otras sustituciones no requeridas por el texto fuente.
  - ‘Joven’ mantiene un registro neutral y readable para Rebeca en contexto narrativo.
  - La nota [a] preserva la ambigüedad de בית sin cerrar indebidamente el sentido a solo ‘casa’ o solo ‘familia’.
