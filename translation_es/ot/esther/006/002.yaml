translation:
  language: es
  text: Y se halló escrito que Mardoqueo había informado acerca de Bigtana y Tares[a], dos de los eunucos[b] del rey, entre los que guardaban el umbral, que habían buscado poner las manos sobre el rey Asuero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea de este versículo es «Bigtana»; en otras apariciones del nombre se encuentra «Bigtán».
    reason: alternative_reading
  - marker: b
    text: 'O: «dos de los oficiales de la corte del rey»; el término hebreo puede denotar eunucos específicamente o, en sentido más amplio, funcionarios reales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּצֵא כָתוּב
  english_pob_choice: it was found written
  chosen_spanish: se halló escrito
  alternatives_spanish:
  - se encontró escrito
  - se halló en escrito
  lexicon: HALOT
  rationale: La construcción pasiva e impersonal del hebreo se conserva naturalmente con «se halló escrito», que comunica el hallazgo de un registro escrito sin añadir contenido interpretativo.
- source_word: הִגִּיד
  english_pob_choice: had reported
  chosen_spanish: había informado
  alternatives_spanish:
  - había dicho
  - había dado a conocer
  lexicon: HALOT
  rationale: En un contexto de archivo o expediente de corte, «informado» refleja mejor una comunicación formal y deliberada que el más general «dicho».
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: Aquí la preposición introduce el asunto del informe. «Acerca de» mantiene el valor temático sin forzar la relación hacia «contra», que el hebreo no expresa de manera primaria en esta posición.
- source_word: בִּגְתָנָא וָתֶרֶשׁ
  english_pob_choice: Bigthana and Teresh
  chosen_spanish: Bigtana y Tares
  alternatives_spanish:
  - Bigtana y Teres
  - Bigthan y Tares
  lexicon: HALOT
  rationale: Se sigue la forma consonántica de este versículo para el primer nombre, y se adapta el segundo a una transliteración española fluida. Se evita unificar sin más con otras apariciones del nombre, porque el propio texto hebreo muestra variación onomástica.
- source_word: שְׁנֵי סָרִיסֵי הַמֶּלֶךְ
  english_pob_choice: two of the king’s eunuchs
  chosen_spanish: dos de los eunucos del rey
  alternatives_spanish:
  - dos de los oficiales del rey
  - dos de los funcionarios de la corte del rey
  lexicon: HALOT
  rationale: En el entorno cortesano persa, סָרִיס puede significar específicamente «eunuco», aunque también puede ampliarse a «oficial». Se conserva el sentido más concreto, tal como lo hace la POB inglesa, sin eliminar la tensión lexical.
- source_word: מִשֹּׁמְרֵי הַסַּף
  english_pob_choice: among those who guarded the threshold
  chosen_spanish: entre los que guardaban el umbral
  alternatives_spanish:
  - entre los guardianes del umbral
  - entre los que custodiaban la puerta
  lexicon: HALOT
  rationale: «Umbral» mantiene la literalidad de סַף y respeta la imagen del acceso palaciego. «Entre los que guardaban» refleja mejor el valor de pertenencia/grupo del מן, siguiendo la revisión inglesa que corrigió una lectura demasiado partititiva o separativa.
- source_word: בִּקְשׁוּ
  english_pob_choice: had sought
  chosen_spanish: habían buscado
  alternatives_spanish:
  - habían intentado
  - habían procurado
  lexicon: HALOT
  rationale: «Buscar» conserva el verbo hebreo sin convertirlo prematuramente en «intentar» o «planear». En el contexto de la conjura, el sentido de propósito hostil queda suficientemente claro por la frase siguiente.
- source_word: לִשְׁלֹחַ יָד
  english_pob_choice: to lay a hand on
  chosen_spanish: echar mano
  alternatives_spanish:
  - poner la mano sobre
  - levantar la mano contra
  lexicon: HALOT
  rationale: La locución española «echar mano» funciona como equivalente idiomático para la expresión hebrea de extender la mano con intención hostil. Se evita «levantar la mano contra» porque añade una especificación más física de la que el hebreo exige.
- source_word: בַּמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: on King Ahasuerus
  chosen_spanish: al rey Asuero
  alternatives_spanish:
  - contra el rey Asuero
  - sobre el rey Asuero
  lexicon: HALOT
  rationale: En español, la combinación con el modismo precedente se expresa con naturalidad como «echar mano al rey», manteniendo el sentido hostil sin recargarlo con una preposición marcada de agresión que no aparece de forma explícita en el hebreo.
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés y refleja su revisión más reciente al preservar la relación de grupo en «entre los que guardaban el umbral»; también mantiene la tensión lexical de סָרִיס con «eunucos», dejando la alternativa más amplia en nota.
  spanish_consistency_notes:
  - Se usa «Asuero» para el nombre propio siguiendo la forma española establecida en contextos bíblicos.
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - Se prefieren verbos y giros naturales del español bíblico moderno sin caer en paráfrasis.
  - Los nombres propios se transliteran de modo consistente dentro de este versículo, con nota para la variación onomástica documentada.
