translation:
  language: es
  text: Nos persiguen hasta el cuello[a]; estamos agotados[b]; no se nos concede descanso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sobre nuestros cuellos somos perseguidos». El hebreo conserva una imagen vívida de enemigos que los acosan de muy cerca, con presión directa.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final también puede traducirse «no se nos da descanso» o «no se nos otorga descanso».
    reason: alternative_reading
lexical_decisions:
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: con el
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: En español, la imagen de persecución «at our necks» se comunica de modo natural con «con el cuello», que conserva la idea de presión muy cercana y agresiva sin volver la frase extraña. «Sobre» podría sonar más rígido y «en» diluye la imagen.
- source_word: צַוָּארֵינוּ
  english_pob_choice: our necks
  chosen_spanish: cuello
  alternatives_spanish:
  - nuestros cuellos
  - garganta
  lexicon: HALOT
  rationale: El hebreo nombra literalmente el cuello. En español, para una expresión idiomática de persecución, «cuello» mantiene la imagen concreta. El posesivo se sobreentiende en el pronombre «nos»; por eso la construcción no necesita repetir «nuestros». «Garganta» sería más interpretativa.
- source_word: נִרְדָּפְנוּ
  english_pob_choice: we are pursued
  chosen_spanish: nos persiguieron
  alternatives_spanish:
  - somos perseguidos
  - nos persiguen
  lexicon: HALOT
  rationale: 'El hebreo presenta una voz pasiva/resultativa; en español, el perfecto simple reproduce con naturalidad la experiencia histórica del lamento: una persecución sufrida. «Somos perseguidos» conserva más la pasividad, pero suena menos fluido en este contexto poético. «Nos persiguen» enfatiza actualidad, no el estado narrado.'
- source_word: יָגַעְנוּ
  english_pob_choice: we are weary
  chosen_spanish: nos agotamos
  alternatives_spanish:
  - estamos cansados
  - estamos agotados
  lexicon: HALOT
  rationale: El verbo puede expresar desgaste o cansancio producido por la opresión continua. «Nos agotamos» transmite mejor la fuerza resultativa del verso que un simple «estamos cansados», sin exagerar más allá del lamento. «Estamos agotados» también es posible, pero el pretérito encaja con la secuencia poética.
- source_word: הוּנַח
  english_pob_choice: is given
  chosen_spanish: se nos concede
  alternatives_spanish:
  - se nos da
  - se nos otorga
  - se nos permite
  lexicon: HALOT
  rationale: El hebreo pasivo-causativo indica que el descanso no llega como algo concedido. «Se nos concede» preserva bien la idea de otorgamiento implícita en el pasivo y suena solemne en español. «Se nos da» es más simple, pero pierde algo de matiz; «se nos permite» se aparta del sentido de descanso otorgado.
- source_word: לָנוּ
  english_pob_choice: to us
  chosen_spanish: se nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: HALOT
  rationale: El complemento indirecto se integra naturalmente con la pasiva impersonal española «se nos concede». Esto reproduce la relación del hebreo sin pesadez sintáctica. «A nosotros» sería posible, pero menos idiomático aquí.
theological_decisions:
- issue: Imagen corporal de la persecución y del cansancio
  english_pob_reading: The Hebrew preserves a vivid image of enemies pressing hard upon them.
  chosen_spanish_reading: La imagen se conserva con «con el cuello nos persiguieron», manteniendo la presión hostil y corporal del hebreo.
  alternative_spanish_readings:
  - «nos persiguieron» sin la referencia al cuello
  - «nos acosaron»
  rationale: La versión española debe retener la intensidad imagética del hebreo. Suprimir el cuello perdería una tensión textual significativa; reemplazarlo por un verbo más abstracto como «acosaron» suavizaría la escena.
  doctrine_reference: Poética bíblica del lamento; fidelidad imagética al texto hebreo
- issue: Negación del descanso como don no concedido
  english_pob_reading: The final clause could also be rendered 'we are given no rest' or 'rest is not granted to us.'
  chosen_spanish_reading: «no se nos concede descanso» mantiene la negación y el matiz de un descanso que no es otorgado.
  alternative_spanish_readings:
  - «no se nos da descanso»
  - «no se nos permite descansar»
  rationale: El español admite varias opciones. «Conceder» preserva mejor el tono pasivo-formal del hebreo y la idea de un bien negado. «Dar» es válido, pero más neutro; «permitir» desplaza el foco hacia autorización en vez de otorgamiento.
  doctrine_reference: Sufrimiento del pueblo en el lamento; pasividad del sujeto ante la opresión
translation_notes:
  revision_awareness: Se ha seguido el sentido del hebreo WLC y el audit trail inglés sin copiar mecánicamente la formulación inglesa. Se conservó la tensión imagética del hebreo (cuello/presión) y el matiz pasivo de la última cláusula, ajustando la sintaxis para que el resultado sea natural en español.
  spanish_consistency_notes:
  - Se emplea un español bíblico moderno, sobrio y publicable.
  - Se preserva la imagen concreta del cuello como lugar de persecución, en lugar de una abstracción como «persecución» sin soporte corporal.
  - El pasivo impersonal «se nos concede» reproduce el carácter receptivo del hebreo en la cláusula final.
  - La elección verbal en pasado («nos persiguieron», «nos agotamos») hace fluida la secuencia poética en español sin alterar el contenido básico.
