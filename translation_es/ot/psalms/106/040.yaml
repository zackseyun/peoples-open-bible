    rationale: La auditoría inglesa preservó una alternativa significativa para el sustantivo final. Debe mantenerse también en español, especialmente porque 'heredad' puede requerir apoyo para lectores modernos.
  revised_spanish_text: Así, la ira de Yahvé ardió[a] contra su pueblo, y aborreció su heredad[b].
