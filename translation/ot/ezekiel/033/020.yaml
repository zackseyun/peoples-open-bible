theological_decisions:
- issue: Rendering the people's accusation against divine judgment
  chosen_reading: The way of the Lord is not just
  alternative_readings:
  - The way of the Lord is not fair
  - The way of the Lord is not right
  rationale: The context is explicitly judicial and concerns whether God's judgments are equitable. 'Just' preserves the moral-forensic dimension without over-paraphrasing. Alternatives are viable and worth preserving because English readers may hear 'fair' more idiomatically.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Individual accountability within corporate address
  chosen_reading: I will judge each man of you according to his ways, O house of Israel
  alternative_readings:
  - I will judge each of you according to your ways, O house of Israel
  rationale: The Hebrew combines a corporate addressee ('house of Israel') with distributive singular terms ('man,' 'his ways'). The translation preserves this tension rather than flattening it into purely plural language.
  doctrine_reference: Translation philosophy §§3, 4, 5
