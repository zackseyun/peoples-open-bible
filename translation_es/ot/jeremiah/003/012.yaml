revisions:
- from: 'Ve y proclama estas palabras hacia el norte[a], y di: «Vuélvete, Israel rebelde, declara Yahvé. No pondré mi rostro contra ustedes, porque soy benigno[b], declara Yahvé; no guardaré enojo para siempre».'
  to: 'Ve y proclama estas palabras hacia el norte[a], y di: «Vuelve, Israel infiel, declara Yahvé. No pondré mi rostro contra ustedes, porque soy misericordioso[b], declara Yahvé; no guardaré enojo para siempre».'
  rationale: Se ajusta «rebelde» a «infiel» para reflejar mejor la deslealtad de pacto de מְשֻׁבָה; se cambia «benigno» a «misericordioso» para alinearse con la revisión auditada del POB inglés y con un español más natural; y se suaviza «Vuélvete» a «Vuelve» por legibilidad sin perder el sentido del llamado a regresar.
