translation:
  language: es
  text: Así Josué tomó toda la tierra[a], conforme a todo lo que Yahvé había dicho a Moisés; y Josué la dio a Israel como herencia, según sus divisiones, según sus tribus. Y la tierra tuvo descanso de la guerra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la tierra entera’. La expresión resume la conquista de la tierra que está en discusión.
    reason: lexical_alternative
  - marker: b
    text: O ‘quedó en calma tras la guerra’. La expresión hebrea denota reposo o tranquilidad después del conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: לקח en este resumen narrativo significa básicamente ‘tomar’. ‘Tomó’ conserva la brevedad y no añade una idea militar más fuerte de la que el hebreo exige.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra de manera absoluta
  - toda la región
  lexicon: HALOT
  rationale: אָרֶץ aquí se refiere a la tierra en discusión, no al planeta. ‘Toda la tierra’ sigue de cerca el hebreo y mantiene el alcance del resumen de conquista.
- source_word: כְּכֹל אֲשֶׁר דִּבֶּר
  english_pob_choice: according to all that ... had spoken
  chosen_spanish: conforme a todo lo que ... había dicho
  alternatives_spanish:
  - según todo lo que ... había hablado
  - tal como ... había dicho
  lexicon: HALOT
  rationale: La relación de conformidad se expresa naturalmente con ‘conforme a’. El pluscuamperfecto ‘había dicho’ preserva la referencia a una palabra previa de Yahvé a Moisés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en español como ‘Yahvé’, conforme a la práctica del proyecto y para no sustituirlo por un título.
- source_word: וַיִּתְּנָהּ
  english_pob_choice: gave it
  chosen_spanish: la dio
  alternatives_spanish:
  - la asignó
  - la repartió
  lexicon: HALOT
  rationale: נתן con sufijo femenino singular remite a ‘la tierra’. ‘La dio’ conserva el verbo base; la noción de reparto queda explícita en la frase siguiente.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - por herencia
  - como posesión heredada
  lexicon: HALOT
  rationale: נחלה denota herencia patrimonial y de pacto. ‘Como herencia’ es la opción más clara y natural en español, sin perder esa carga legal y teológica.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: La preposición ל marca destinatario; ‘a Israel’ es la formulación más directa con ‘dio’.
- source_word: כְּמַחְלְקֹתָם
  english_pob_choice: according to their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - conforme a sus repartos
  - según sus reparticiones
  lexicon: HALOT
  rationale: מחלקות habla de divisiones o reparticiones. ‘Según sus divisiones’ sigue de cerca el hebreo y funciona bien en español.
- source_word: לְשִׁבְטֵיהֶם
  english_pob_choice: by their tribes
  chosen_spanish: por sus tribus
  alternatives_spanish:
  - según sus tribus
  - para sus tribus
  lexicon: HALOT
  rationale: La frase especifica el criterio tribal del reparto. ‘Por sus tribus’ es breve y natural en español, y conserva la idea organizadora del hebreo.
- source_word: שָׁקְטָה מִמִּלְחָמָה
  english_pob_choice: had rest from war
  chosen_spanish: tuvo descanso de la guerra
  alternatives_spanish:
  - estuvo quieta de la guerra
  - descansó de la guerra
  - gozó de paz tras la guerra
  lexicon: HALOT
  rationale: שקט expresa reposo/quietud tras el conflicto. ‘Tuvo descanso de la guerra’ preserva el sentido de cese de combate sin forzar una paz total o finalizada en sentido absoluto.
theological_decisions:
- issue: Alcance de ‘toda la tierra’ en un resumen de conquista
  english_pob_reading: A summary statement of Joshua's successful taking of the land in fulfillment of the LORD's word, without requiring the translation to resolve broader interpretive questions about the completeness of conquest narratives.
  chosen_spanish_reading: Una declaración resumida del cumplimiento de la palabra de Yahvé, sin que la traducción resuelva las tensiones más amplias sobre la totalidad de la conquista.
  alternative_spanish_readings:
  - Una afirmación absoluta de que toda la tierra fue ocupada inmediatamente
  - Una hipérbole victoriosa sin valor histórico directo
  rationale: El hebreo presenta un resumen narrativo. Conviene conservar ‘toda la tierra’ y no introducir en el texto principal una armonización interpretativa que borre la tensión bíblica con otros pasajes.
  doctrine_reference: Conservar la tensión teológica y narrativa del texto.
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado del audit trail inglés: ‘to Israel as an inheritance’ fue naturalizado como ‘a Israel como herencia’, manteniendo el orden español más fluido. También se conservó la fórmula resumida ‘all the land’ sin intensificarla ni atenuarla.'
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - Se traduce נחלה como ‘herencia’, no ‘posesión’, para mantener la resonancia de reparto pactal.
  - ‘Descanso de la guerra’ se preserva como fórmula narrativa, evitando ‘paz’ que podría resultar más concluyente de lo que el hebreo dice.
