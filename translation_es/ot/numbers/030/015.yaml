revisions:
- from: Pero si su marido se mantiene en silencio de día en día[a], entonces confirma todos sus votos o todas sus obligaciones que están sobre ella; los ha confirmado, porque guardó silencio el día que lo oyó.
  to: Pero si su marido se mantiene en silencio de día en día, entonces confirma todos sus votos o todas sus obligaciones[a] que recaen sobre ella; las ha confirmado, porque guardó silencio el día en que oyó.
  rationale: Se reubicó la nota al término correcto («obligaciones»), se mejoró «que están sobre ella» a «que recaen sobre ella» para conservar el sentido legal con español natural, y se evitó el pronombre añadido en la cláusula final. También se ajustó «los ha confirmado» a «las ha confirmado» para concordar con el antecedente femenino más cercano («obligaciones») dentro de la coordinación española; el sentido global sigue siendo que ha confirmado ambos tipos de compromisos.
