    text: '«Estuvo ante» traduce el valor temporal de בְּעָמְדוֹ con לִפְנֵי en contexto cortesano: señala el momento en que José compareció ante el rey. También podría expresarse como «cuando compareció ante».'
    reason: lexical_alternative
  - marker: b
    text: «Pasó por» conserva mejor la idea de desplazamiento a través del territorio en וַיַּעְבֹר בְּכָל; también podría decirse «anduvo por toda la tierra de Egipto».
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor: acerca בְּעָמְדוֹ a su valor temporal y preserva mejor la construcción de movimiento de וַיַּעְבֹר בְּכָל, sin perder naturalidad en español.'
