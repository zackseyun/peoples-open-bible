base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/027/025.yaml
  text: Over the king’s treasuries was Azmaveth son of Adiel[a], and over the treasuries in the countryside, in the cities, in the villages, and in the towers[b], was Jehonathan son of Uzziah.
  footnotes:
  - marker: a
    text: Or 'in the field'; the Hebrew singular likely has a collective sense here, referring to rural areas as distinct from cities, villages, and towers.
    reason: lexical_alternative
  - marker: b
    text: '''Jehonathan'' reflects the fuller Hebrew name form here; some English versions shorten it to ''Jonathan.'''
    reason: lexical_alternative
