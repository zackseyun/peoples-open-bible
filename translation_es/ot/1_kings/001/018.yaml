translation:
  language: es
  text: Y ahora[a], mira, Adonías ha llegado a ser rey, y ahora, mi señor el rey, no lo sabes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Adonías ha reinado» o «Adonías es rey». El verbo hebreo puede denotar el ingreso al reinado o el ejercicio de la realeza; en este contexto señala que Adonías ha asumido la condición real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el marcador discursivo urgente y la repetición retórica del hebreo. En español, «y ahora» mantiene mejor la concatenación enfática que omitir la conjunción.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - mira bien
  - he aquí
  lexicon: HALOT
  rationale: Es una partícula de atención; «mira» comunica la fuerza deíctica en un español actual y digno. «He aquí» sería más tradicional pero más marcado estilísticamente.
- source_word: אֲדֹנִיָּה
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  lexicon: convención onomástica
  rationale: Se translitera al castellano según uso bíblico estándar, adaptando la terminación a la forma española habitual del nombre.
- source_word: מָלָךְ
  english_pob_choice: has become king
  chosen_spanish: ha llegado a ser rey
  alternatives_spanish:
  - ha reinado
  - se ha hecho rey
  - es rey
  lexicon: HALOT
  rationale: El qal perfecto aquí expresa la asunción del reinado/estatus real. «Ha llegado a ser rey» preserva el valor de llegada al cargo sin añadir reflexividad no explicitada por el verbo.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor y rey
  lexicon: HALOT
  rationale: Es un tratamiento cortesano dirigido al rey. «Mi señor» reproduce la relación de deferencia sin confundirlo con el uso divino del título.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: 'Mantiene la aposición que identifica al destinatario: «mi señor el rey». «Rey» es la equivalencia natural en español para el título político.'
- source_word: לֹא יָדָעְתָּ
  english_pob_choice: you do not know it
  chosen_spanish: no lo sabes
  alternatives_spanish:
  - no lo has sabido
  - no estás enterado
  lexicon: HALOT
  rationale: El sentido contextual es falta de conocimiento/conciencia del hecho presente. «No lo sabes» es natural en español y conserva la acusación de desconocimiento actual sin sobreinterpretar el tiempo verbal.
translation_notes:
  revision_awareness: 'La versión española sigue la lectura final del audit trail inglés, pero ajusta el registro para sonar natural en español: «mira» por הִנֵּה, y «ha llegado a ser rey» para reflejar la idea de acceso/asunción del reinado que el inglés final expresó con «has become king». Se conserva la repetición de «y ahora» para reproducir la urgencia retórica del hebreo.'
  spanish_consistency_notes:
  - Se usa «rey» para הַמֶּלֶךְ y «mi señor» para אֲדֹנִי en un marco de corte, sin capitalización devocional.
  - Se conserva la tensión semántica de מָלָךְ mediante una nota alternativa, porque el hebreo permite tanto la idea de «reinar» como la de «llegar a ser rey» en el contexto.
  - «No lo sabes» se entiende como desconocimiento actual del hecho, no como ignorancia general.
