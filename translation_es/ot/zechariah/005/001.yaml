translation:
  language: es
  text: Entonces me volví[b], alcé mis ojos y vi, y he aquí, un rollo volador[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un rollo que volaba».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «me volví» también puede entenderse como «me volví otra vez», introduciendo la siguiente escena de visión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשׁוּב
  english_pob_choice: Then I turned
  chosen_spanish: Entonces me volví
  alternatives_spanish:
  - Y me volví
  - Entonces giré
  - Entonces volví
  lexicon: HALOT
  rationale: שוב en este contexto visionario expresa el cambio de atención o de escena. «Me volví» conserva la imagen de giro/retorno mejor que una simple paráfrasis, y «Entonces» reproduce bien la progresión narrativa del waw sin repetir un «y» mecánico.
- source_word: וָאֶשָּׂא עֵינַי
  english_pob_choice: lifted my eyes
  chosen_spanish: alcé mis ojos
  alternatives_spanish:
  - levanté mis ojos
  - miré hacia arriba
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo estable para levantar la vista. «Alcé mis ojos» mantiene la imagen corporal del original y resulta natural en español bíblico contemporáneo.
- source_word: וָאֶרְאֶה
  english_pob_choice: saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: HALOT
  rationale: Aquí ראה introduce la percepción visionaria. «Vi» es la correspondencia más directa y no añade matices ausentes en el hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «Y he aquí» conserva la fuerza de presentación vívida de הִנֵּה y es un equivalente bíblico claro en español. Se mantiene el carácter enfático sin modernizar en exceso el registro.
- source_word: מְגִלָּה
  english_pob_choice: scroll
  chosen_spanish: un rollo
  alternatives_spanish:
  - un pergamino
  - un libro en rollo
  lexicon: HALOT
  rationale: מְגִלָּה designa un rollo escrito. «Rollo» es transparente y fiel; «pergamino» podría sugerir material en vez de formato, por lo que se evita como opción principal.
- source_word: עָפָה
  english_pob_choice: flying
  chosen_spanish: volador
  alternatives_spanish:
  - que volaba
  - volando
  lexicon: HALOT
  rationale: El participio femenino singular describe al rollo como en estado de vuelo. «Volador» reproduce la función adjetival concisamente en español; la alternativa perifrástica queda reflejada en nota para conservar la ambigüedad del hebreo entre adjetivo y relativo.
theological_decisions:
- issue: La frase inicial puede leerse como simple giro narrativo o como reanudación de una nueva escena de visión.
  english_pob_reading: Hebrew 'I turned' may also be understood as 'I turned again,' introducing the next vision scene.
  chosen_spanish_reading: «Me volví» permite tanto el giro físico/atencional como la transición a una nueva escena de visión, sin forzar explícitamente «otra vez».
  alternative_spanish_readings:
  - me volví otra vez
  - volví a mirar
  rationale: El hebreo שוב en la secuencia wayyiqtol admite la lectura de retorno o de nuevo giro. En español, «me volví» preserva esa ambigüedad con naturalidad. Se evita fijar demasiado la relación con la visión anterior para no exceder el texto.
  doctrine_reference: Narrativa profética y continuidad de visiones en Zacarías
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del inglés POB, que se mantuvo sin cambios. Se conserva la equivalencia óptima del audit trail: «Then I turned», «lifted my eyes», «saw», «behold», «a flying scroll».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «rollo» para מְגִלָּה, coherente con el español bíblico y con la decisión inglesa de no usar un término más técnico o eclesiástico.
  - Se conserva la ambigüedad de עָפָה con una nota alternativa, ya que el participio puede leerse como adjetivo («volador») o como cláusula relativa («que volaba»).
