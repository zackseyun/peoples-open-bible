translation:
  language: es
  text: Y para los sacerdotes levíticos[a], no será cortado de delante de mí ningún hombre que ofrezca un holocausto, que queme una ofrenda de cereal y que haga un sacrificio todos los días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no faltará de delante de mí ningún hombre''. El hebreo usa literalmente el idiomismo ''ser cortado''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''todos los días'', es decir, de modo continuo o perpetuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: And for the Levitical priests
  chosen_spanish: Y para los sacerdotes levíticos
  alternatives_spanish:
  - Y para los levitas sacerdotes
  - Y para los sacerdotes, los levitas
  lexicon: HALOT
  rationale: La construcción hebrea identifica a los sacerdotes como levitas. 'Sacerdotes levíticos' conserva esa relación de manera idiomática en español sin borrar la apposición del original.
- source_word: לֹא יִכָּרֵת אִישׁ
  english_pob_choice: a man shall not be cut off
  chosen_spanish: no será cortado de delante de mí ningún hombre
  alternatives_spanish:
  - no faltará ningún hombre delante de mí
  - ningún hombre será eliminado de delante de mí
  lexicon: HALOT
  rationale: Se conserva el idiomismo de כרת con 'ser cortado', porque mantiene la fuerza pactual y dinástica del hebreo. 'De delante de mí' refleja מִלְּפָנַי con naturalidad y precisión.
- source_word: מִלְּפָנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - delante de mí
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente espacial y relacional. 'De delante de mí' mantiene el sentido de estar ante Yahvé para servicio sacerdotal.
- source_word: מַעֲלֶה עוֹלָה
  english_pob_choice: who offers up a burnt offering
  chosen_spanish: que ofrezca una ofrenda quemada
  alternatives_spanish:
  - que presente una ofrenda quemada
  - que ofrezca un holocausto
  lexicon: HALOT
  rationale: Se traduce con un verbo relativo que corresponde al participio hebreo. 'Ofrenda quemada' comunica עוֹלָה de forma transparente en español, aunque 'holocausto' es una alternativa tradicional.
- source_word: וּמַקְטִיר מִנְחָה
  english_pob_choice: who burns a grain offering
  chosen_spanish: que queme una ofrenda de cereal
  alternatives_spanish:
  - que haga arder una ofrenda de cereal
  - que queme una ofrenda vegetal
  lexicon: HALOT
  rationale: Se conserva el valor sacrificial de הקטיר como 'quemar/hacer subir humo'. 'Ofrenda de cereal' es claro y evita el calco menos transparente de 'ofrenda de grano' o el tecnicismo ambiguo de 'ofrenda vegetal'.
- source_word: וְעֹשֶׂה זֶּבַח
  english_pob_choice: who makes a sacrifice
  chosen_spanish: que haga un sacrificio
  alternatives_spanish:
  - que ofrezca un sacrificio
  - que realice un sacrificio
  lexicon: HALOT
  rationale: '''Hacer un sacrificio'' sigue de cerca el hebreo עשה זבח y mantiene la distinción entre este término general y las ofrendas específicas anteriores.'
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - perpetuamente
  - continuamente
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'todos los días'. En español, 'todos los días' conserva la continuidad sin forzar una interpretación adverbial más abstracta.
theological_decisions:
- issue: Cómo preservar el valor pactual de לֹא יִכָּרֵת sin suavizarlo a mera ausencia
  english_pob_reading: a man shall not be cut off
  chosen_spanish_reading: no será cortado de delante de mí ningún hombre
  alternative_spanish_readings:
  - no faltará ningún hombre delante de mí
  - ningún hombre dejará de estar delante de mí
  rationale: La forma literal 'ser cortado' conserva la resonancia covenantal y genealógica del verbo, en paralelo con la promesa anterior sobre la permanencia de la línea davídica. La versión alternativa 'faltará' sería más suave, pero borraría esa tensión textual.
  doctrine_reference: Translation philosophy §3, §4, §5
- issue: Cómo verter el grupo sacerdotal הַכֹּהֲנִים הַלְוִיִּם sin convertirlo en una etiqueta denominacional ajena
  english_pob_reading: the Levitical priests
  chosen_spanish_reading: los sacerdotes levíticos
  alternative_spanish_readings:
  - los sacerdotes, los levitas
  - el sacerdocio levítico
  rationale: La forma elegida comunica la identidad sacerdotal ligada a Leví, sin introducir una categoría más abstracta ni una reconstrucción eclesiástica moderna. Mantiene el foco en la continuidad de una línea de servicio.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del original inglés que ajustó las participiales hebreas a cláusulas relativas descriptivas ('who offers...'). Por eso el español usa cláusulas con 'que...' para reflejar mejor la función participial. También se atendió la preferencia final del inglés por 'a sacrifice' con artículo, reflejándola como 'un sacrificio'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando el contexto lo requiera en esta unidad; aquí no aparece explícito en el versículo, pero 'de delante de mí' preserva la referencia a la presencia divina.
  - Se evita 'SEÑOR' como sustituto del nombre divino, conforme al criterio del proyecto.
  - '''Ofrenda quemada'' y ''ofrenda de cereal'' siguen el uso transparente del proyecto; se evita depender de términos eclesiásticos opacos si no son necesarios.'
  - Las cláusulas relativas con 'que...' reflejan la función descriptiva de los participios hebreos y mantienen el paralelismo de la lista sacrificial.
