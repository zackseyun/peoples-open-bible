translation:
  language: es
  text: Partieron del desierto de Sin[a] y acamparon en Dofca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sin» es aquí el nombre de una región desértica y no tiene relación con la palabra española «pecado».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: נסע en la fórmula itineraria del desierto expresa la acción de levantar campamento y avanzar al siguiente lugar. «Partieron» comunica ese movimiento narrativo de forma natural en español sin perder la secuencia del itinerario.
- source_word: מִמִּדְבַּר
  english_pob_choice: from the wilderness of
  chosen_spanish: del desierto de
  alternatives_spanish:
  - del desierto de
  - de la región desértica de
  lexicon: HALOT
  rationale: מִדְבָּר puede referirse a desierto o región agreste. «Desierto» es claro y estable en español bíblico para este tipo de topónimo itinerante; no hace falta forzar una perífrasis más explicativa.
- source_word: סִין
  english_pob_choice: Sin
  chosen_spanish: Sin
  alternatives_spanish:
  - Sín
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y debe transliterarse. Se mantiene «Sin» porque el contexto ya la identifica como región geográfica; en español conviene conservar la forma breve y reconocible.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y establecieron campamento
  lexicon: HALOT
  rationale: חנה en estas listas de estaciones significa establecer campamento. «Acamparon» reproduce bien ese valor y suena natural en español contemporáneo, sin añadir matices ajenos al texto.
- source_word: בְּדָפְקָה
  english_pob_choice: at Dophkah
  chosen_spanish: en Dofca
  alternatives_spanish:
  - en Dofcá
  - en Dofkah
  lexicon: HALOT
  rationale: La preposición בְּ marca localización; en español el equivalente más natural es «en». El nombre se translitera como topónimo. Se prefiere «Dofca» por adaptación fonética habitual al español y para mantener legibilidad.
translation_notes:
  revision_awareness: 'El texto base en inglés se mantuvo sin cambios sustantivos: solo se ajustó la sintaxis al español natural y se conservó el valor itinerario de los verbos hebreos. No se detectaron revisiones textuales ni tensiones exegéticas adicionales en este versículo.'
  spanish_consistency_notes:
  - Se conserva el patrón narrativo breve de la lista de estaciones del desierto.
  - Se mantiene la transliteración de nombres propios y la terminología geográfica sencilla para uniformidad con otros pasajes del itinerario.
  - La nota de pie distingue el topónimo «Sin» del sustantivo español «sin», siguiendo el precedente auditado en inglés.
