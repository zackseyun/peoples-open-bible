translation:
  language: es
  text: Ustedes mismos han visto lo que hice a Egipto[a], y cómo los llevé sobre alas de águilas[b][c] y los traje a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que hice a los egipcios». El hebreo puede entenderse como referencia al pueblo de Egipto en sentido colectivo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sobre las alas de águilas». La expresión hebrea es una metáfora vívida de liberación poderosa y protectora.'
    reason: lexical_alternative
  - marker: c
    text: El término hebreo traducido «águilas» también puede referirse de manera más amplia a grandes aves de rapiña.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתֶּם
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - vosotros mismos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «ustedes mismos» conserva esa prominencia en un español natural y neutral.
- source_word: רְאִיתֶם
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  - han presenciado
  lexicon: HALOT
  rationale: El perfecto compuesto expresa bien la experiencia ya cumplida con relevancia presente en el discurso.
- source_word: אֲשֶׁר עָשִׂיתִי לְמִצְרָיִם
  english_pob_choice: what I did to Egypt
  chosen_spanish: lo que hice a Egipto
  alternatives_spanish:
  - lo que hice con Egipto
  - lo que hice para Egipto
  lexicon: HALOT
  rationale: La preposición ל con Egipto funciona aquí como objeto afectado por las acciones divinas; «a Egipto» reproduce ese valor idiomático sin suavizar la referencia nacional.
- source_word: וָאֶשָּׂא אֶתְכֶם
  english_pob_choice: I carried you
  chosen_spanish: los llevé
  alternatives_spanish:
  - los cargué
  - los llevé en brazos
  lexicon: HALOT
  rationale: נשא expresa llevar/cargar; en español, «los llevé» comunica de manera natural la acción de traslado protector sin perder la metáfora.
- source_word: עַל כַּנְפֵי נְשָׁרִים
  english_pob_choice: on eagles’ wings
  chosen_spanish: sobre alas de águilas
  alternatives_spanish:
  - sobre las alas de águilas
  - sobre alas de aves de rapiña
  lexicon: HALOT
  rationale: Se conserva la imagen poética hebrea de transporte poderoso y protector. «Águilas» sigue la lectura contextual usual; el genitivo plural en español suena mejor como «alas de águilas».
- source_word: וָאָבִא אֶתְכֶם אֵלָי
  english_pob_choice: and brought you to myself
  chosen_spanish: y los traje a mí
  alternatives_spanish:
  - y los traje hacia mí
  - y los llevé a mí
  lexicon: HALOT
  rationale: אֵלַי significa literalmente «a mí». En español, «a mí» mantiene la fuerza relacional sin añadir formulación reflexiva no explícita en el hebreo.
theological_decisions:
- issue: Relación entre rescate y alianza
  english_pob_reading: brought you to myself
  chosen_spanish_reading: los traje a mí
  alternative_spanish_readings:
  - los traje hacia mí
  - los traje para estar conmigo
  rationale: La frase final no solo describe salida de Egipto sino movimiento hacia la presencia y relación pactal de Yahvé. «A mí» preserva esa dirección relacional sin sobreexplicarla.
  doctrine_reference: Éxodo 19:4; traducción relacional del acto redentor
- issue: Imagen metafórica de transporte protector
  english_pob_reading: on eagles’ wings
  chosen_spanish_reading: sobre alas de águilas
  alternative_spanish_readings:
  - sobre las alas de águilas
  - sobre alas de aves rapaces
  rationale: La metáfora debe mantenerse como imagen viva de liberación poderosa y protectora. No se debe desmetaforizar ni convertirla en mera descripción prosaica.
  doctrine_reference: Poética bíblica; metáfora exódica
translation_notes:
  revision_awareness: El texto base en inglés fue de alta concordancia y no mostró revisiones sustantivas; la versión española sigue el mismo trazado semántico, ajustando solo la expresión natural del énfasis pronominal, la metáfora y la dirección relacional final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino conforme a la política general del proyecto, aunque en este versículo no aparece explícitamente.
  - «Águilas» conserva la elección contextual del audit trail; la nota aclara la amplitud posible del término hebreo.
  - Se evitó una paráfrasis catequética en la clausula final para respetar la tensión entre traslado físico y relación pactal.
