translation:
  language: es
  text: No comerán nada de su carne[a], ni tocarán sus cuerpos muertos; son inmundos para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus carroñas'. El término hebreo se refiere al cuerpo muerto de un animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּשָׂרָם
  english_pob_choice: any of their flesh
  chosen_spanish: nada de su carne
  alternatives_spanish:
  - de su carne
  - alguna de su carne
  - parte de su carne
  lexicon: HALOT
  rationale: El prefijo partitivo מִן con 'carne' exige en español una prohibición sobre cualquier porción. 'Carne' conserva el sentido corporal del hebreo y evita sustituirlo por 'carne' en sentido alimentario moderno ('carne' = meat) sin base contextual.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No comeréis
  - No deben comer
  - No deberán comer
  lexicon: HALOT
  rationale: La forma legal hebrea se expresa con una prohibición directa y solemne. 'No comerán' mantiene el registro normativo sin depender de un futuro arcaizante excesivo.
- source_word: וּבְנִבְלָתָם
  english_pob_choice: their carcasses
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus carroñas
  - sus cuerpos muertos
  - sus carcazas
  lexicon: HALOT
  rationale: נְבֵלָה designa el cuerpo muerto de un animal, en el contexto de pureza ritual. 'Cadáveres' comunica bien la realidad de un cuerpo muerto y evita una palabra demasiado técnica o poco natural en español bíblico; se mantiene la referencia a animales por el contexto.
- source_word: לֹא תִגָּעוּ
  english_pob_choice: you shall not touch
  chosen_spanish: ni tocarán
  alternatives_spanish:
  - no tocarán
  - ni entrarán en contacto con
  - ni tocarán siquiera
  lexicon: HALOT
  rationale: '''Tocar'' es la equivalencia directa de נגע. La coordinación con ''ni'' conserva el paralelismo prohibitivo del hebreo y la continuidad sintáctica de la frase.'
- source_word: טְמֵאִים
  english_pob_choice: unclean
  chosen_spanish: impuros
  alternatives_spanish:
  - inmundos
  - ritualmente impuros
  - contaminados
  lexicon: HALOT
  rationale: En español, 'impuros' comunica la categoría ritual sin repetir mecánicamente 'unclean' y sin introducir una lectura moral ajena al contexto. Se preserva la tensión entre estado ritual y valoración ética sin resolverla.
- source_word: הֵם לָכֶם
  english_pob_choice: they are unclean to you
  chosen_spanish: son impuros para ustedes
  alternatives_spanish:
  - son impuros a ustedes
  - son impuros respecto de ustedes
  - son impuros en relación con ustedes
  lexicon: HALOT
  rationale: La expresión relacional לָכֶם se traduce naturalmente como 'para ustedes', conservando el ámbito de validez de la impureza dentro de Israel. 'Para ustedes' es idiomático y mantiene el valor de la norma sin sobreinterpretación.
theological_decisions:
- issue: Estado ritual de impureza en la ley de alimentos
  english_pob_reading: Rendered as ritual category ('unclean') without importing later theological conclusions about moral evil or ongoing covenant application.
  chosen_spanish_reading: Expresado como categoría ritual ('impuros') sin convertirlo en juicio moral ni resolver su aplicación teológica posterior.
  alternative_spanish_readings:
  - ritualmente impuros
  - inmundos
  - contaminados
  rationale: El versículo pertenece a la legislación de santidad y pureza de Israel. La traducción conserva esa categoría de manera transparente y evita añadir conclusiones doctrinales no presentes en el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene el paralelismo prohibitivo (''comer'' / ''tocar''), el carácter partitivo de ''מִבְּשָׂרָם'', y la categoría ritual de טְמֵאִים. La nota conserva la alternativa lexical documentada para נְבֵלָה.'
  spanish_consistency_notes:
  - Se usa 'impuros' para טְמֵאִים, conforme a la terminología de pureza ritual.
  - '''Carne'' se conserva para בשר en sentido corporal, no como ''carne'' alimentaria moderna.'
  - '''Cadáveres'' funciona como equivalente natural de נְבֵלָה en este contexto y no como referencia a cuerpos humanos.'
  - La coordinación 'No... ni...' reproduce la estructura prohibitiva del hebreo con claridad en español.
