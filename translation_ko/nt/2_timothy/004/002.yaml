id: 2TI.4.2
reference: 2 Timothy 4:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κήρυξον τὸν λόγον, ἐπίστηθι εὐκαίρως ἀκαίρως, ἔλεγξον, ἐπιτίμησον, παρακάλεσον, ἐν πάσῃ μακροθυμίᾳ καὶ διδαχῇ.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/002.yaml
  text: Preach the word; be ready in season and out of season; reprove, rebuke, exhort, with all patience and teaching.
translation:
  language: ko
  text: 말씀을 전파하십시오. 때를 얻든 못 얻든 항상 힘쓰십시오.[a] 오래 참음과 가르침을 다하여 책망하고 꾸짖고 권면하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「때가 좋든 좋지 않든 (그 자리에) 서 있으십시오」. 헬라어 ἐπίστηθι는 「곁에 섬·임함·임전 태세」를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κήρυξον τὸν λόγον
  english_pob_choice: Preach the word
  chosen_korean: 말씀을 전파하십시오
  alternatives_korean:
  - 말씀을 선포하십시오
  - 말씀을 외치십시오
  lexicon: BDAG
  rationale: 1:11의 「전파하는 자」(κῆρυξ)와 어휘 통일. 「말씀을 전파하다」가 한국 성서 전통에서 익숙하다.
- source_word: ἐπίστηθι εὐκαίρως ἀκαίρως
  english_pob_choice: be ready in season and out of season
  chosen_korean: 때를 얻든 못 얻든 항상 힘쓰십시오
  alternatives_korean:
  - 시기에 맞든 맞지 않든 그 자리에 서십시오
  - 형편이 좋든 나쁘든 임전 태세를 갖추십시오
  lexicon: BDAG
  rationale: ἐφίστημι는 「곁에 서다·임하다」를 본의로 하며, 비유적으로 「준비된 자세로 임함」을 가리킨다. 한국어 「힘쓰다」는 부지런함과 임전 태세를 함께 담는다.
- source_word: ἔλεγξον, ἐπιτίμησον, παρακάλεσον
  english_pob_choice: reprove, rebuke, exhort
  chosen_korean: 책망하고 꾸짖고 권면하십시오
  alternatives_korean:
  - 잘못을 지적하고 꾸짖고 격려하십시오
  - 견책하고 책망하고 권하십시오
  lexicon: BDAG
  rationale: 세 명령의 미세한 차이(증거로 잘못을 드러냄·강하게 꾸짖음·돕고 격려함)를 「책망·꾸짖다·권면」으로 옮긴다. 한국 성서 전통의 자연스러운 짝.
- source_word: ἐν πάσῃ μακροθυμίᾳ καὶ διδαχῇ
  english_pob_choice: with all patience and teaching
  chosen_korean: 오래 참음과 가르침을 다하여
  alternatives_korean:
  - 모든 오래 참음과 가르침으로
  - 온갖 오래 참음과 교훈을 가지고
  lexicon: BDAG
  rationale: πᾶς + 추상명사의 「모든 ~」을 「~을 다하여」로 한국어 흐름에 맞게 옮긴다. 3:10의 「오래 참음」(μακροθυμία)과 어휘 통일.
