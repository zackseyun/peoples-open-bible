  yaml_path: translation/ot/genesis/027/030.yaml
  text: And it happened that as soon as Isaac had finished blessing Jacob[a], and Jacob had just gone out from the presence of Isaac his father[b], Esau his brother came in from his hunting.
  footnotes:
  - marker: a
    text: Or, 'had just gone out.' The Hebrew uses an infinitive absolute with the finite verb ('going out had gone out') to intensify the immediacy of Jacob's departure.
    reason: lexical_alternative
