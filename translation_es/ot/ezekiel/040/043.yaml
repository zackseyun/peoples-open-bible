translation:
  language: es
  text: Y salientes[a], de un palmo de ancho, estaban preparados dentro de la casa, todo alrededor; y sobre las mesas estaba la carne de la ofrenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es incierto aquí. El término también puede referirse a repisas, ganchos u otra pieza fija asociada al área de sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁפַתַּיִם
  english_pob_choice: ledges
  chosen_spanish: soportes
  alternatives_spanish:
  - salientes
  - repisas
  - ganchos
  lexicon: HALOT, BDB
  rationale: El término hebreo es raro y su sentido exacto es incierto en este contexto cultual. Como el audit trail inglés pasó de 'hooks' a 'ledges' para reflejar mejor la ambigüedad, en español 'soportes' conserva la función estructural sin fijar indebidamente una pieza específica.
- source_word: טֹפַח אֶחָד
  english_pob_choice: one handbreadth wide
  chosen_spanish: de un codo de ancho
  alternatives_spanish:
  - de un palmo de ancho
  - de un palmo de medida
  - de una anchura de un palmo
  lexicon: HALOT, BDB
  rationale: טֹפַח corresponde a una medida pequeña, normalmente 'palmo'. Aunque el inglés POB usa 'handbreadth', en español 'un palmo' es el equivalente natural y tradicionalmente comprensible; se mantiene la idea de medida breve y concreta.
- source_word: מוּכָנִים
  english_pob_choice: were prepared
  chosen_spanish: estaban dispuestos
  alternatives_spanish:
  - estaban preparados
  - estaban fijados
  - estaban colocados
  lexicon: HALOT, BDB
  rationale: El participio pasivo de כון expresa algo establecido o dispuesto en su sitio. 'Estaban dispuestos' comunica bien esa condición sin obligar a una idea mecánica de sujeción que el hebreo no exige necesariamente.
- source_word: בַּבַּיִת
  english_pob_choice: inside the house
  chosen_spanish: dentro de la casa
  alternatives_spanish:
  - en la casa
  - dentro del templo
  - en el edificio
  lexicon: HALOT, BDB
  rationale: Aquí 'casa' remite al edificio del templo. 'Dentro de la casa' mantiene la correspondencia directa con el hebreo y preserva la referencia arquitectónica sin sobre-explicar.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo en derredor
  alternatives_spanish:
  - alrededor
  - por todas partes
  - en derredor
  lexicon: HALOT, BDB
  rationale: La duplicación intensifica la circunferencia. 'Todo en derredor' conserva esa repetición y su énfasis, en un registro algo más literario acorde con el texto profético.
- source_word: וְאֶל הַשֻּׁלְחָנוֹת
  english_pob_choice: and on the tables
  chosen_spanish: y sobre las mesas
  alternatives_spanish:
  - y en las mesas
  - y junto a las mesas
  - y hacia las mesas
  lexicon: HALOT, BDB
  rationale: En este contexto descriptivo, la relación locativa es la más natural en español. 'Sobre las mesas' expresa el uso o disposición de la carne en la superficie de trabajo/sacrificio.
- source_word: בְּשַׂר הַקָּרְבָן
  english_pob_choice: the flesh of the offering
  chosen_spanish: la carne de la ofrenda
  alternatives_spanish:
  - la carne del sacrificio
  - la carne de la ofrenda sacrificial
  - la carne de la oblación
  lexicon: HALOT, BDB
  rationale: בשר puede ser 'carne' o 'flesh'; en español 'carne' es claro y conserva el registro material. קָרְבָן se traduce 'ofrenda' para evitar fijar de antemano una equivalencia doctrinal estrecha, aunque el contexto es sacrificial.
theological_decisions:
- issue: Naturaleza cultual de קָרְבָן
  english_pob_reading: the offering
  chosen_spanish_reading: la ofrenda
  alternative_spanish_readings:
  - el sacrificio
  - la oblación
  rationale: El término hebreo es amplio y designa algo llevado/traído para presentarlo. 'Ofrenda' es suficientemente inclusivo en español y mantiene el marco cultual sin cerrar el sentido a un solo tipo de acto.
  doctrine_reference: Levítico 1–7; Ezequiel 40–48
- issue: Ubicación y función de los objetos en el templo
  english_pob_reading: inside the house ... on the tables
  chosen_spanish_reading: dentro de la casa ... sobre las mesas
  alternative_spanish_readings:
  - en el templo ... en las mesas
  - dentro del edificio ... sobre las mesas
  rationale: La lectura no introduce simbolismo adicional; describe instalaciones para el manejo de la ofrenda. Mantener el lenguaje espacial simple evita sobreinterpretar el pasaje.
  doctrine_reference: Ezequiel 40:39–43
translation_notes:
  revision_awareness: He tomado en cuenta la revisión del inglés POB que movió 'hooks' a 'ledges', cambió 'long' por 'wide' para la medida y prefirió 'were prepared' sobre 'were fastened'. En español, la solución adoptada sigue esa orientación de mayor cautela léxica y evita concretar indebidamente la pieza arquitectónica.
  spanish_consistency_notes:
  - He usado 'Y' inicial para mantener el arranque narrativo del versículo.
  - '''Casa'' se conserva para el edificio del templo, coherente con el hebreo בַּיִת en este contexto.'
  - '''Ofrenda'' mantiene el registro cultual y evita introducir ''sacrificio'' donde el hebreo permite una designación más amplia.'
  - La medida se expresó como 'un palmo' en español por equivalencia natural de טֹפַח; sin embargo, la formulación final quedó ajustada al ritmo del versículo en forma breve y legible.
