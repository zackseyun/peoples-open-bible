translation:
  language: es
  text: A lo largo del río, en su orilla, de este lado y del otro[a], crecerá todo árbol para alimento. Su hoja no se marchitará, ni faltará su fruto; cada mes dará fruto fresco[b], porque sus aguas salen del santuario. Su fruto será para alimento, y su hoja para curación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a ambos lados». El hebreo dice literalmente «de este lado y de aquel lado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fruto nuevo» o «fruto de primera maduración»; el hebreo de este verbo sugiere producir temprano o primero.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para remedio» o «para medicina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הַנַּחַל
  english_pob_choice: Along the river
  chosen_spanish: Junto al río
  alternatives_spanish:
  - A lo largo del río
  - Sobre el río
  lexicon: HALOT
  rationale: La preposición hebrea indica ubicación adyacente a lo largo del curso del río. En español, 'Junto al río' comunica la relación espacial sin sonar forzado, y evita una calca innecesaria.
- source_word: שְׂפָתוֹ
  english_pob_choice: its bank
  chosen_spanish: su orilla
  alternatives_spanish:
  - su borde
  - su margen
  lexicon: HALOT
  rationale: El sentido literal es 'labio/borde', pero en contexto fluvial la equivalencia natural en español es 'orilla'. Mantiene la imagen geográfica sin introducir tecnicismos.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that side
  chosen_spanish: de este lado y del otro lado
  alternatives_spanish:
  - a ambos lados
  - de un lado y del otro
  lexicon: HALOT
  rationale: La expresión hebrea conserva la vívida duplicación espacial. 'De este lado y del otro lado' reproduce esa estructura con claridad, sin perder la fuerza distributiva.
- source_word: כָּל עֵץ מַאֲכָל
  english_pob_choice: every kind of tree for food
  chosen_spanish: todo árbol para alimento
  alternatives_spanish:
  - todo árbol frutal
  - cada tipo de árbol para comer
  lexicon: HALOT
  rationale: La construcción indica árboles cuyos productos sirven de alimento. 'Para alimento' preserva la finalidad del hebreo sin reducirlo a una categoría botánica más estrecha de la que el texto exige.
- source_word: לֹא יִבּוֹל עָלֵהוּ
  english_pob_choice: Its leaf will not wither
  chosen_spanish: Su hoja no se marchitará
  alternatives_spanish:
  - Su hoja no se secará
  - Su follaje no se marchitará
  lexicon: HALOT
  rationale: נבל en este contexto describe vegetación que se seca o pierde vigor. 'Marchitarse' es la equivalencia española más natural y conserva la imagen de vida sostenida.
- source_word: וְלֹא יִתֹּם פִּרְיוֹ
  english_pob_choice: its fruit will not fail
  chosen_spanish: ni faltará su fruto
  alternatives_spanish:
  - ni se agotará su fruto
  - ni cesará su fruto
  lexicon: HALOT
  rationale: El verbo comunica quedar terminado, acabarse. 'No faltará su fruto' refleja bien la continuidad de la producción y suena natural en español bíblico contemporáneo.
- source_word: לָחֳדָשָׁיו יְבַכֵּר
  english_pob_choice: every month it will bear fresh fruit
  chosen_spanish: cada mes dará fruto fresco
  alternatives_spanish:
  - cada mes dará fruto nuevo
  - cada mes dará primicias
  lexicon: HALOT
  rationale: El hebreo asocia la producción mensual con el brotar temprano o de primera maduración. Dado el ajuste revisado del POB inglés a 'fresh fruit', 'fruto fresco' comunica bien la idea de fruto continuamente nuevo y disponible.
- source_word: מֵימָיו
  english_pob_choice: its waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - sus aguas corrientes
  - su agua
  lexicon: HALOT
  rationale: El plural hebreo de 'aguas' se conserva en español, lo cual mantiene el matiz formal del original y la imagen de flujo vivificante.
- source_word: מִן הַמִּקְדָּשׁ
  english_pob_choice: from the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - del lugar santo
  - del templo
  lexicon: HALOT
  rationale: מקדש refiere al santuario dentro de la visión del templo. 'Santuario' es la correspondencia más directa y evita la ambigüedad de 'templo' como edificio general.
- source_word: לְמַאֲכָל
  english_pob_choice: for food
  chosen_spanish: para alimento
  alternatives_spanish:
  - para comer
  - como alimento
  lexicon: HALOT
  rationale: La función del fruto es alimentar. 'Para alimento' mantiene la intención y es más elegante que una perífrasis demasiado coloquial.
- source_word: לִתְרוּפָה
  english_pob_choice: for healing
  chosen_spanish: para curación
  alternatives_spanish:
  - para sanidad
  - para remedio
  lexicon: HALOT
  rationale: El sustantivo puede abarcar sanación, remedio o uso medicinal. 'Curación' conserva el sentido restaurador sin restringirlo a un registro técnico farmacéutico.
theological_decisions:
- issue: Imagen del río vivificante procedente del santuario
  english_pob_reading: 'Render the imagery straightforwardly without allegorical expansion: the trees'' fruit is for food and their leaves for healing because the waters come from the sanctuary.'
  chosen_spanish_reading: 'Traducir la imagen de manera directa, sin expansión alegórica: el fruto es para alimento y la hoja para curación porque las aguas salen del santuario.'
  alternative_spanish_readings:
  - Interpretar simbólicamente el río dentro del texto principal
  - Hacer explícita una lectura escatológica en la redacción
  rationale: La visión de Ezequiel es teológicamente rica, pero la traducción no debe imponer lecturas posteriores al texto base. El español mantiene la causalidad y la imaginería original, dejando la síntesis interpretativa al lector y a las notas.
  doctrine_reference: Principios de traducción POB sobre fidelidad textual y sobriedad interpretativa
- issue: Valor semántico de יְבַכֵּר
  english_pob_reading: Preserve the lexical nuance of early/first-ripe produce in the main text.
  chosen_spanish_reading: Conservar la idea de fruto nuevo/fresco en la línea principal, sin convertirla en una interpretación libre.
  alternative_spanish_readings:
  - dar primicias
  - dar fruto temprano
  - dar fruto primero
  rationale: Aunque el hebreo apunta al brotar temprano o primero, el ajuste revisado del POB inglés prefirió 'fresh fruit' por fluidez y adecuación al contexto mensual. 'Fruto fresco' en español conserva esa idea de novedad continua sin perder naturalidad.
  doctrine_reference: Principios de traducción POB sobre equivalencia óptima y tensión lexical preservada
translation_notes:
  revision_awareness: El inglés POB revisó la frase de יְבַכֵּר de «first-ripe fruit» a «fresh fruit» para mayor naturalidad y mejor ajuste al contexto de producción continua. El español sigue ese ajuste con «fruto fresco», mientras conserva en nota la posibilidad lexical de fruto nuevo/temprano. También se mantiene la decisión estable de traducir מִן הַמִּקְדָּשׁ como 'del santuario' y לִתְרוּפָה como un término de curación/remedio.
  spanish_consistency_notes:
  - Se usa 'santuario' de forma consistente para מקדש en este pasaje.
  - Se mantiene 'aguas' en plural para מֵימָיו.
  - Se preserva la doble localización espacial 'de este lado y del otro lado' para reflejar מִזֶּה וּמִזֶּה.
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton en este versículo.
  - '''Curación'' se emplea como término amplio y digno, compatible con el campo semántico de remedio/medicina.'
