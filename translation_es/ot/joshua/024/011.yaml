  to: Entonces cruzaron el Jordán y llegaron a Jericó[a], y los hombres de Jericó combatieron contra ustedes —los amorreos, los perizitas, los cananeos, los hititas, los girgaseos, los heveos y los jebuseos— y yo los entregué en manos de ustedes.
