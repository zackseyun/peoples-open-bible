id: TOB.12.6
reference: Tobit 12:6
source:
  edition: lxx-swete-1909
  text: καὶ καλέσας τοὺς δύο κρυπτῶς εἶπεν αὐτοῖς Εὐλογεῖτε τὸν θεὸν καὶ αὐτῷ ἐξομολογεῖσθε, μεγαλωσύνην δίδοτε αὐτῷ, καὶ ἐξομολογεῖσθε αὐτῷ ἐνώπιον πάντων τῶν ζώντων περὶ ὧν ἐποίησεν μεθʼ ὑμῶν. ἀγαθὸν τὸ εὐλογεῖν τὸν θεὸν καὶ ὑψοῦν τὸ ὄνομα αὐτοῦ, τοὺς λόγους τῶν ἔργων τοῦ θεοῦ ἐντίμως ὑποδεικνύντες· καὶ μὴ
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: And calling the two of them privately[a], he said to them, “Bless God and give thanks to him; give him greatness, and give thanks to him before all the living for what he has done with you. It is good to bless God and to exalt his name, showing forth with honor the words of the works of God[c][b]; and do not be reluctant
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'give him greatness'; the sense is to ascribe greatness or honor to God.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'for what he has done with you'; this may also be understood as 'for what he has done for you.'
    reason: lexical_alternative
  - marker: c
    text: The Greek witness provided is incomplete at the end of the verse, ending with 'and do not ...'; the prohibition continues in the following verse.
    reason: textual_variant
lexical_decisions:
- source_word: καλέσας
  chosen: calling
  alternatives:
  - having called
  - summoning
  lexicon: BDAG
  rationale: A participial form introducing Raphael's speech. 'Calling' keeps the narrative flow in natural English without overformal stiffness.
- source_word: τοὺς δύο
  chosen: the two of them
  alternatives:
  - the two
  - both of them
  lexicon: BDAG
  rationale: The phrase refers specifically to the two persons addressed. 'The two of them' is idiomatic and explicit in English.
- source_word: κρυπτῶς
  chosen: privately
  alternatives:
  - secretly
  - in private
  lexicon: BDAG
  rationale: The adverb indicates that he spoke apart from others. 'Privately' is natural modern English and avoids the potentially furtive nuance of 'secretly'.
- source_word: Εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: The imperative εὐλογεῖν commonly means 'bless' in God-directed speech in biblical diction. 'Bless God' preserves the source wording and traditional theological register better than flattening to 'praise'.
- source_word: ἐξομολογεῖσθε
  chosen: give thanks
  alternatives:
  - confess
  - praise
  lexicon: BDAG
  rationale: In this context of public acknowledgment of God's deeds, the sense is thankful praise rather than confession of sins. 'Give thanks' best fits the immediate context and repeated exhortation.
- source_word: μεγαλωσύνην δίδοτε αὐτῷ
  chosen: give him greatness
  alternatives:
  - ascribe greatness to him
  - give glory to him
  lexicon: BDAG
  rationale: The Greek is literally 'give greatness to him.' 'Give him greatness' preserves the concrete wording, though the idiomatic sense is close to 'ascribe greatness.' I retain the literal image for transparency.
- source_word: ἐνώπιον πάντων τῶν ζώντων
  chosen: before all the living
  alternatives:
  - in the presence of all who live
  - before everyone alive
  lexicon: BDAG
  rationale: A formal but clear rendering that preserves the broad public scope of the phrase.
- source_word: περὶ ὧν ἐποίησεν μεθʼ ὑμῶν
  chosen: for what he has done with you
  alternatives:
  - for what he has done for you
  - concerning what he did with you
  lexicon: BDAG
  rationale: The preposition μετά with ὑμῶν is literally 'with you.' In context it refers to God's actions in their lives. 'With you' preserves the Greek wording, though 'for you' is a plausible interpretive alternative.
- source_word: ἀγαθὸν
  chosen: It is good
  alternatives:
  - It is right
  - It is fitting
  lexicon: BDAG
  rationale: The adjective introduces a general moral evaluation. 'It is good' is straightforward and faithful.
- source_word: ὑψοῦν τὸ ὄνομα αὐτοῦ
  chosen: to exalt his name
  alternatives:
  - to lift up his name
  - to glorify his name
  lexicon: BDAG
  rationale: A standard biblical idiom meaning to honor God publicly. 'Exalt' is both accurate and readable.
- source_word: τοὺς λόγους τῶν ἔργων τοῦ θεοῦ
  chosen: the words of the works of God
  alternatives:
  - the account of God's works
  - the matters concerning the works of God
  lexicon: BDAG
  rationale: The Greek expression is somewhat compressed. I preserve its wording rather than over-resolving it, while allowing the following participle to clarify the sense of declaring God's deeds.
- source_word: ἐντίμως ὑποδεικνύντες
  chosen: showing forth with honor
  alternatives:
  - declaring honorably
  - making known with due honor
  lexicon: BDAG
  rationale: The participle describes the manner of speaking about God's works. 'Showing forth with honor' keeps both the revelatory and reverential elements.
- source_word: καὶ μὴ
  chosen: and do not be reluctant
  alternatives:
  - and do not hesitate
  - and do not be ashamed
  lexicon: BDAG
  rationale: The verse is textually incomplete in the supplied witness at this point, but the phrase naturally introduces a prohibition continued in the next verse. 'Do not be reluctant' fits the exhortational context without pretending the sentence is complete here.
