  text: לָ/כֵן֩ אִ֨ישׁ כִּ/דְרָכָ֜י/ו אֶשְׁפֹּ֤ט אֶתְ/כֶם֙ בֵּ֣ית יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה שׁ֤וּבוּ וְ/הָשִׁ֨יבוּ֙ מִ/כָּל פִּשְׁעֵי/כֶ֔ם וְ/לֹֽא יִהְיֶ֥ה לָ/כֶ֛ם לְ/מִכְשׁ֖וֹל עָוֺֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/030.yaml
  text: Therefore I will judge each man according to his ways[a], O house of Israel, declares the Lord GOD. Repent and turn away from all your transgressions, so that iniquity may not become a stumbling block to you.
  footnotes:
