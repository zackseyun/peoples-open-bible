translation:
  language: es
  text: De Dios el médico se hace sabio[a][b], y del rey recibe un regalo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Porque la curación viene del Altísimo». El hebreo lee «de Dios» y contiene una forma difícil donde el griego apoya claramente «curación».'
    reason: alternative_reading
  - marker: b
    text: La línea hebrea también incluye «médico» en una construcción difícil; el paralelo griego, en cambio, da un sentido más fluido centrado en la curación misma.
    reason: textual_variant
  - marker: c
    text: 'O: «recibe una paga». La expresión hebrea es idiomática y difícil, mientras que el griego lee «recibirá un regalo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מאת אל / παρὰ Ὑψίστου
  english_pob_choice: from God / from the Most High
  chosen_spanish: de Dios
  alternatives_spanish:
  - del Altísimo
  - del Dios Altísimo
  lexicon: HALOT; LXX Ὑψίστου
  rationale: El hebreo transmitido lee אל ('Dios') y el griego paralelo dice Ὑψίστου ('del Altísimo'). En español, 'de Dios' conserva el testimonio hebreo principal sin perder el sentido reverente que aporta el paralelo griego.
- source_word: יחכם רופא / ἴασις
  english_pob_choice: the physician becomes wise / healing
  chosen_spanish: la curación
  alternatives_spanish:
  - el médico se hace sabio
  - la sanidad
  - la curación viene
  lexicon: HALOT; LXX ἴασις
  rationale: La tradición hebrea es difícil y la revisión inglesa osciló entre 'healing' y 'the physician becomes wise'. Para un español publicable y fiel al paralelo griego, 'la curación' expresa el núcleo semántico sin forzar una reconstrucción dudosa del verbo y del sustantivo hebreos.
- source_word: מאת מלך / παρὰ βασιλέως
  english_pob_choice: from the king
  chosen_spanish: del rey
  alternatives_spanish:
  - de un rey
  - del rey
  lexicon: HALOT
  rationale: '''Del rey'' reproduce bien la relación de procedencia y concuerda con el griego. El artículo definido en español es natural y no exige identificar a un monarca específico más allá del contexto.'
- source_word: ישא משאות / λήμψεται δόμα
  english_pob_choice: he receives a gift
  chosen_spanish: recibirá un regalo
  alternatives_spanish:
  - recibirá un don
  - recibirá una paga
  - recibirá un obsequio
  lexicon: HALOT; LXX λήμψεται δόμα
  rationale: La forma hebrea es idiomática y difícil, pero el griego aclara el sentido de remuneración o presente. 'Recibirá un regalo' es transparente en español y mantiene la amplitud de 'gift' sin añadir precisión no atestiguada.
theological_decisions:
- issue: Referencia a Dios en paralelo con 'el Altísimo'
  english_pob_reading: from God / from the Most High
  chosen_spanish_reading: de Dios
  alternative_spanish_readings:
  - del Altísimo
  - de Dios, el Altísimo
  rationale: No se enmascara el nombre divino ni se sustituye por una fórmula tradicional. Dado que el hebreo lee 'Dios' y el griego usa 'Altísimo', la traducción principal mantiene 'Dios' y conserva la tensión en la nota textual.
  doctrine_reference: Sabiduría/Sirácida 38:2; relación hebreo-griego en testigos textuales
- issue: 'Sentido de la primera cola: curación versus sabiduría del médico'
  english_pob_reading: the physician becomes wise / healing
  chosen_spanish_reading: la curación
  alternative_spanish_readings:
  - el médico se hace sabio
  - la sanidad viene
  rationale: La revisión inglesa muestra que el hebreo es incierto y que el griego apoya claramente 'curación'. En español, una reconstrucción como 'el médico se hace sabio' sería demasiado interpretativa para el texto principal; se reserva la tensión para la nota.
  doctrine_reference: Crítica textual de Sirácida 38:2; LXX ἴασις
translation_notes:
  revision_awareness: 'La versión inglesa pasó de ''For healing is from God'' a ''From God the physician becomes wise'' para reflejar mejor יחכם רופא, pero la revisión cruzada siguió marcando problemas mayores. En español se opta por un texto sobrio y legible que preserva la tensión textual mediante nota: la primera cola sigue el sentido confirmado por el griego (''la curación''), mientras la segunda se mantiene en la línea de remuneración/regalo para el rey.'
  spanish_consistency_notes:
  - Se usa 'Dios' en el texto principal, conforme al hebreo, y 'Altísimo' solo en nota por apoyo griego.
  - Se evita 'Cristo' o lenguaje eclesiástico no presente en el original.
  - '''Curación'' se elige por el griego ἴασις y por la inestabilidad del hebreo en la primera cola.'
  - '''Regalo'' mantiene el valor amplio de δόμα sin fijar indebidamente una interpretación económica.'
  - La puntuación y el orden mantienen el paralelismo hebreo-griego en un español natural.
