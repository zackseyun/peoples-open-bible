translation:
  language: es
  text: Yahvé dio sabiduría a Salomón, tal como le había dicho[a]. Y hubo paz entre Hiram y Salomón, y los dos hicieron un pacto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''como le había prometido''. El verbo hebreo dice literalmente ''habló'', pero en contexto se refiere a la palabra previa de Yahvé a Salomón.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: ''cortaron un pacto'', un modismo que significa hacer un pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino personal, no con una sustitución titulada. 'Yahvé' conserva la decisión auditada del POB inglés y se ajusta al estándar del proyecto en español.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - concedió
  - otorgó
  lexicon: HALOT
  rationale: El verbo básico expresa una acción directa de dar. 'Dio' preserva la fuerza simple del hebreo sin añadir matices interpretativos.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: HALOT
  rationale: Es el equivalente natural y estándar para חָכְמָה en este contexto real y práctico.
- source_word: כַּאֲשֶׁר דִּבֶּר ל֑וֹ
  english_pob_choice: just as he had spoken to him
  chosen_spanish: como le había hablado
  alternatives_spanish:
  - tal como le había dicho
  - como le había prometido
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'habló', y el POB inglés preserva esa forma, aunque reconoce la posibilidad contextual de 'prometido'. En español, 'le había hablado' mantiene la huella verbal sin forzar una paráfrasis.
- source_word: וַיְהִי שָׁלוֹם
  english_pob_choice: there was peace
  chosen_spanish: hubo paz
  alternatives_spanish:
  - reinó la paz
  - había paz
  lexicon: HALOT
  rationale: La construcción idiomática se expresa de manera natural en español con 'hubo paz', conservando el sentido de un estado de relaciones pacíficas.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... e
  lexicon: HALOT
  rationale: Es la correspondencia normal de la construcción relacional hebrea, sin añadir matiz alguno.
- source_word: וַיִּכְרְתוּ בְרִית
  english_pob_choice: made a covenant
  chosen_spanish: hicieron un pacto
  alternatives_spanish:
  - cortaron un pacto
  - concertaron un tratado
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'cortaron un pacto'. En español, 'hicieron un pacto' conserva la idea de acuerdo solemne y es más natural que una calca. Se evita 'tratado' porque el término hebreo es בְרִית y la decisión auditada del POB inglés preserva 'covenant'.
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: HALOT
  rationale: La forma enfatiza la participación mutua de ambas partes. 'Los dos' es claro y conciso en español.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto de transliterar el nombre divino, preservando la referencia personal del texto hebreo y evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza de בְרִית en un contexto diplomático
  english_pob_reading: made a covenant
  chosen_spanish_reading: hicieron un pacto
  alternative_spanish_readings:
  - hicieron un tratado
  - concertaron una alianza
  rationale: Aunque el contexto es político, el hebreo emplea el término de pacto. 'Pacto' mantiene la transparencia léxica y evita desplazar el término bíblico por una formulación meramente diplomática.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios respecto al pasaje fuente ni a la decisión inglesa, y la versión española mantiene las mismas tensiones léxicas documentadas (habló/prometió; cortaron/hicieron pacto) de manera transparente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto para יהוה.
  - Se conserva 'pacto' para בְרִית y se explicita en nota el modismo hebreo literal.
  - La nota b preserva la alternativa semántica 'prometido' sin borrar el valor literal de 'habló'.
  - El orden de las cláusulas sigue de cerca la sintaxis hebrea y el trazado auditado en inglés.
