review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del hebreo: entrada de Abram en Egipto, percepción de los egipcios y descripción de la mujer como muy hermosa. Sin embargo, introduce un matiz causal con ''porque'' para כִּי, cuando en el audit trail inglés y en el hebreo aquí funciona mejor como complementizador de percepción: ''vieron que...''. Además, ''Y sucedió que, cuando'' es más pesado de lo necesario frente al valor narrativo de וַיְהִי, que en español se resuelve mejor con ''Y cuando''.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos problemas de naturalidad/fidelidad: ''Y sucedió que, cuando'' suena innecesariamente calco y recargado, y ''vieron a la mujer, porque era muy hermosa'' puede sugerir una relación causal más explícita que la del original. Una redacción más limpia y fiel es: ''Y cuando Abram entró en Egipto, los egipcios vieron que la mujer[a] era muy hermosa.'''
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Abram', 'Egipto', 'los egipcios' y 'mujer' están bien. La nota léxica sobre אִשָּׁה debe conservarse, pero el anclaje conviene moverlo a 'mujer' y no al final de la oración para mayor precisión.
  issues:
  - severity: medium
    issue: Uso de 'porque' para כִּי
    rationale: Aquí כִּי introduce el contenido de lo percibido ('vieron que...'), no principalmente una causa. 'Porque' altera levemente la relación sintáctica y semántica del original.
  - severity: low
    issue: '''Y sucedió que, cuando'' es demasiado pesado'
    rationale: Aunque no es falso, resulta más calco y menos natural que el equivalente narrativo español más idiomático 'Y cuando', que además refleja mejor la decisión inglesa documentada.
  - severity: low
    issue: Ubicación imprecisa de la nota léxica
    rationale: La nota sobre אִשָּׁה explica 'mujer/esposa', así que el marcador debe ir junto a 'mujer' en vez de quedar al final del versículo.
  revised_spanish_text: Y cuando Abram entró en Egipto, los egipcios vieron que la mujer[a] era muy hermosa.
  revised_footnotes:
  - marker: a
    text: O 'la esposa'. El hebreo אִשָּׁה puede significar 'mujer' o 'esposa'; aquí la traducción conserva el término más general de la cláusula.
    reason: lexical_alternative
  revision_rationale: Se ajusta וַיְהִי a un inicio narrativo español más natural ('Y cuando'), se corrige כִּי a 'que' para reflejar contenido percibido en vez de causa, y se reubica la nota en 'mujer' para corresponder exactamente al punto léxico en discusión. No se requiere adjudicación adicional.
