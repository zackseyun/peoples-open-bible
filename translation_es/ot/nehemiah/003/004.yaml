review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura repetitiva de la lista y el modismo espacial וְעַל יָדָם como «junto a ellos», que refleja correctamente la adyacencia en la secuencia de reconstrucción. Sin embargo, el verbo הֶחֱזִיק en Nehemías 3 no significa simplemente «trabajó», sino específicamente que una persona reparó o hizo reparaciones en su sección. Además, el rastro de auditoría inglés preserva notas léxicas sobre ese verbo y sobre el modismo «junto a ellos», y la nota de variante para Baana/Baanah fue omitida y además mal anclada en el inglés. La traducción española debe reflejar el sentido de reparación y conservar las alternativas relevantes con anclaje claro.
  spanish_quality_summary: 'El español es legible y natural, pero «trabajó» debilita demasiado el sentido concreto del texto. «Hizo reparaciones» o «reparó» es más fiel y sigue siendo idiomático. Los nombres propios están en general bien castellanizados para un registro bíblico en español: «Urías», «Berequías», «Sadoc» son adecuados. «Meremot» y «Mesulam» son aceptables, aunque podrían variar según convención editorial; no requieren cambio forzoso aquí. Falta una nota para el modismo «junto a ellos» y conviene añadir la variante de «Baana».'
  glossary_alignment: 'No hay términos teológicos del glosario principal implicados. En decisiones léxicas, el proyecto exige preservar la racionalidad documentada del inglés POB: aquí eso requiere mantener el valor de reparación de הֶחֱזִיק y reflejar el modismo espacial de וְעַל יָדָם en una nota cuando se preservó en la auditoría inglesa. Los nombres propios pueden adaptarse al español de forma natural mientras sigan cercanos al hebreo.'
  issues:
  - severity: high
    issue: «trabajó» para הֶחֱזִיק
    rationale: En Nehemías 3 el verbo formula la acción de reparar una sección del muro. «Trabajó» es demasiado general y pierde el contenido de reparación documentado en la evidencia fuente y en la auditoría inglesa.
  - severity: medium
    issue: Falta nota para el modismo וְעַל יָדָם
    rationale: La auditoría inglesa preserva la alternativa literal «junto a su mano»/«and next to their hand» como nota léxica. El español puede mantener «junto a ellos» en texto principal, pero debe conservar la explicación del modismo.
  - severity: medium
    issue: Falta la variante onomástica de Baana
    rationale: La auditoría inglesa incluye la variante «Baanah». En español conviene conservarla como nota de lectura alternativa, anclada en «Baana».
