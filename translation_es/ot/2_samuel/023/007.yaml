revisions:
- from: Pero el hombre que los toca debe armarse con hierro y el asta de una lanza[a][b][c], y serán quemados por completo con fuego en su lugar.
  to: Pero el hombre que los toca debe armarse con hierro y el asta de una lanza[a][b][c], y serán quemados por completo con fuego allí mismo.
  rationale: Se hizo una reparación menor para mejorar la claridad del español y reflejar mejor el valor adverbial local de בַּשָּׁבֶת. 'Allí mismo' evita la ambigüedad de 'en su lugar'. También se pulió la nota contextual para que sea más natural en español, sin cambiar el contenido exegético.
