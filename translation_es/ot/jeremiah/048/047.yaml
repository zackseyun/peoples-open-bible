translation:
  language: es
  text: Pero restauraré la suerte de Moab en los postreros días[a], declara Yahvé. Hasta aquí el juicio de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haré volver la cautividad de Moab»; el hebreo puede denotar la restauración desde el cautiverio o, en sentido más amplio, la restauración de la suerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתִּי
  english_pob_choice: Yet I will restore
  chosen_spanish: Sin embargo, restauraré
  alternatives_spanish:
  - Y restauraré
  - Pero restauraré
  - Y haré volver
  lexicon: HALOT
  rationale: El hebreo introduce una reversión tras el juicio; en español, «Sin embargo» comunica mejor la fuerza adversativa que «Y» en este contexto. «Restauraré» preserva el sentido idiomático de la expresión sin forzar una traducción demasiado literal.
- source_word: שְׁבוּת
  english_pob_choice: the fortunes
  chosen_spanish: la suerte
  alternatives_spanish:
  - la cautividad
  - los cautivos
  - el estado de cautividad
  - la fortuna
  lexicon: HALOT
  rationale: La construcción שוב־שבות puede significar tanto «volver la cautividad» como, más ampliamente, «restaurar la suerte/fortuna». En español, «la suerte» reproduce bien el valor idiomático y evita limitar el sentido a una liberación literal de exilio.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: Transliteración estándar
  rationale: Nombre propio nacional; se conserva la transliteración usual.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los postreros días
  alternatives_spanish:
  - en los días venideros
  - al final de los días
  - en los últimos días
  lexicon: HALOT
  rationale: «Postreros días» mantiene el peso profético y la resonancia bíblica de la expresión hebrea, sin convertirla en una paráfrasis más plana.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto. «Declara» reproduce la fórmula profética solemne de נְאֻם.
- source_word: עַד הֵנָּה
  english_pob_choice: Thus far
  chosen_spanish: Hasta aquí
  alternatives_spanish:
  - Hasta este punto
  - Así queda
  - Hasta ahora
  lexicon: HALOT
  rationale: La locución marca el cierre del oráculo. «Hasta aquí» es natural en español y conserva el valor conclusivo del hebreo.
- source_word: מִשְׁפַּט
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la sentencia
  - la justicia
  - el decreto
  lexicon: HALOT
  rationale: Aquí מִשְׁפַּט alude al pronunciamiento judicial/oracular contra Moab. «Juicio» mantiene esa fuerza forense y profética mejor que «justicia».
theological_decisions:
- issue: Alcance de la restauración prometida para Moab
  english_pob_reading: Render the text as a genuine future restoration oracle without specifying the mechanism or theological implications beyond the verse.
  chosen_spanish_reading: Presentar el texto como una promesa real de restauración futura para Moab, sin definir si es restauración nacional, retorno del exilio o un alcance escatológico más amplio.
  alternative_spanish_readings:
  - Una simple inversión política del destino de Moab
  - Una inclusión escatológica de las naciones en la misericordia divina
  rationale: El hebreo promete restauración futura, pero el versículo no precisa el mecanismo ni la extensión teológica. La traducción conserva la promesa y la temporalidad profética sin resolver la tensión interpretativa.
  doctrine_reference: Conservar la tensión teológica sin cerrarla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; este borrador mantiene la línea del audit trail inglés y adapta sus decisiones léxicas al español de forma auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al criterio del proyecto.
  - «Juicio» se usa en sentido oracular/judicial, no como simple condena moral.
  - «Restauraré la suerte» conserva la ambigüedad idiomática de שוב־שבות, respaldada por la nota alternativa.
  - La nota a pie preserva la alternativa de «cautividad» sin imponerla como lectura principal.
