translation:
  language: es
  text: Como valles se extienden, como jardines junto a un río, como aloes[a] que Yahvé ha plantado, como cedros junto a las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madera de áloe»; el hebreo se refiere a árboles fragantes, no a tiendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/נְחָלִים נִטָּיוּ
  english_pob_choice: Like valleys they spread out
  chosen_spanish: Como valles se extienden
  alternatives_spanish:
  - Como valles se despliegan
  - Como valles se ensanchan
  lexicon: HALOT
  rationale: נחל puede referirse a cauces, torrentes o valles asociados con agua. En este símil, «valles» conserva la imagen de amplitud y fertilidad; «se extienden» expresa bien la idea de estar desplegados en el espacio sin volver la frase pesada.
- source_word: כְּ/גַנֹּת
  english_pob_choice: like gardens
  chosen_spanish: como jardines
  alternatives_spanish:
  - como huertos
  - como vergeles
  lexicon: HALOT
  rationale: «Jardines» es la equivalencia natural y clara del plural hebreo, manteniendo la imagen cultivada y fértil. «Huertos» o «vergeles» serían posibles, pero cambian el tono o la imagen.
- source_word: עֲלֵי נָהָר
  english_pob_choice: beside a river
  chosen_spanish: junto a un río
  alternatives_spanish:
  - al lado de un río
  - a la orilla de un río
  lexicon: HALOT
  rationale: El hebreo permite el sentido de proximidad/adyacencia. «Junto a un río» es idiomático en español y conserva la idea de estar cerca de una fuente de vida y riego.
- source_word: כַּ/אֲהָלִים
  english_pob_choice: like aloes
  chosen_spanish: como aloes
  alternatives_spanish:
  - como madera de aloe
  - como lign áloes
  lexicon: HALOT
  rationale: La tradición léxica aquí no habla de tiendas, sino de árboles o madera aromática. «Aloes» reproduce la forma breve elegida por la POB en inglés y mantiene el sentido botánico/poético.
- source_word: נָטַע יְהוָה
  english_pob_choice: Yahweh has planted
  chosen_spanish: Yahvé ha plantado
  alternatives_spanish:
  - Yahvé plantó
  - Yahvé lo ha plantado
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al criterio del proyecto. El perfecto hebreo se refleja bien con el pretérito perfecto compuesto, que destaca el resultado vigente de la acción divina.
- source_word: כַּ/אֲרָזִים
  english_pob_choice: like cedars
  chosen_spanish: como cedros
  alternatives_spanish:
  - como cedros del Líbano
  - como cedros altos
  lexicon: HALOT
  rationale: «Cedros» es la equivalencia estándar y suficiente. El valor simbólico de fuerza, altura y permanencia queda preservado sin añadir elementos que el hebreo no explicita.
- source_word: עֲלֵי מָיִם
  english_pob_choice: beside the waters
  chosen_spanish: junto a las aguas
  alternatives_spanish:
  - al lado de las aguas
  - a la orilla de las aguas
  lexicon: HALOT
  rationale: Se conserva el plural «aguas» para reflejar el hebreo y su resonancia poética. «Junto a» comunica adecuadamente la relación espacial.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. La política del proyecto pide «Yahvé» en el texto principal español para no ocultar el Tetragrámaton detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en acuerdo alto y sin observaciones pendientes. La traducción española sigue ese mismo estado estable, conservando las decisiones léxicas y el valor poético del símil.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para el nombre divino.
  - Se conservó el plural poético «aguas» para reflejar מָיִם.
  - Se prefirió un español sobrio y bíblico, sin sustituir el símil por una paráfrasis interpretativa.
  - El pie de nota aclara la alternativa léxica necesaria para אֲהָלִים sin introducir la lectura errónea de «tiendas».
