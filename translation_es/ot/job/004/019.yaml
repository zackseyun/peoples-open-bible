review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo y sigue de cerca el POB en la mayoría de las decisiones: אַף como intensificación inferencial, שֹׁכְנֵי como participio habitual, בָּתֵּי חֹמֶר como imagen de fragilidad, בֶּעָפָר/יְסוֹדָם con resonancia de mortalidad, y יְדַכְּאוּם en pasiva implícita. Sin embargo, la frase final no preserva bien la ambigüedad idiomática de לִפְנֵי עָשׁ. «Delante de la polilla» en español suena principalmente locativo y poco natural; conviene una forma más literal pero idiomática que permita también la nota alternativa de rapidez/facilidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay detalles mejorables. La exclamación inicial funciona, aunque sin el verbo implícito puede sentirse algo abrupta; aun así es aceptable por paralelismo con el inglés. El principal problema de legibilidad es «delante de la polilla», que suena poco natural en español bíblico moderno. Además, la nota d está formulada de manera torpe («O “la polilla” conserva...»), y la nota b introduce una alternativa que no corresponde al enfoque principal del POB tanto como la alternativa inglesa.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Casas de barro» es aceptable para בָּתֵּי חֹמֶר, aunque «casas de arcilla» sería más literal; aquí «barro» mantiene bien la imagen. «Polvo» para עָפָר es correcto. No hay términos teológicos mayores en juego.
  issues:
  - severity: medium
    issue: «delante de la polilla» no reproduce de manera natural la ambigüedad de לִפְנֵי עָשׁ
    rationale: La preposición hebrea significa literalmente «delante de/antes de», pero en esta expresión poética probablemente sugiere rapidez o facilidad comparativa. En español, «delante de la polilla» se oye casi solo como ubicación física. «Antes que la polilla» conserva mejor la literalidad y deja abierta la lectura comparativa.
  - severity: medium
    issue: La nota d está mal formulada y no expresa bien la alternativa documentada en el POB inglés
    rationale: Debe explicar que la expresión puede significar «antes que la polilla», «más pronto que una polilla» o «más fácilmente que una polilla», en vez de la redacción actual, que es poco clara y repetitiva.
  - severity: low
    issue: La nota b se aparta de la alternativa auditada en inglés
    rationale: El POB inglés no enfatiza aquí una lectura metafórica adicional sino la formulación alternativa «su fundamento está en el polvo». Conviene ajustar la nota para reflejar eso con mayor precisión.
  revised_spanish_text: ¡Cuánto más[a] los que habitan en casas de barro, cuyo fundamento está en el polvo[b], son aplastados[c] antes que la polilla[d]!
