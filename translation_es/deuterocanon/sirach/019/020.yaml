translation:
  language: es
  text: Mejor es el que carece, con entendimiento y temor[a], que el que abunda en prudencia y transgrede la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reverente»; quizá implica temor de Yahvé, pero el griego no especifica el objeto del temor.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείττων
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Superior es
  - Es mejor
  lexicon: LSJ
  rationale: El comparativo introduce una sentencia sapiencial; 'Mejor es' conserva la forma proverbial natural en español y la comparación evaluativa del griego.
- source_word: ἡττώμενος
  english_pob_choice: one who is lacking
  chosen_spanish: el que está falto
  alternatives_spanish:
  - el que es inferior
  - el que está disminuido
  - el que es pobre
  lexicon: LSJ
  rationale: El participio admite la idea de estar en desventaja, ser inferior o carecer. 'Está falto' expresa carencia sin restringir indebidamente a pobreza material o inferioridad social.
- source_word: ἐν συνέσει
  english_pob_choice: with understanding
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - en entendimiento
  - con discernimiento
  - en discernimiento
  lexicon: LSJ
  rationale: σύννεσις denota entendimiento o discernimiento práctico. 'Con entendimiento' suena natural en español y conserva el sentido instrumental de la frase.
- source_word: ἔμφοβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - reverente
  - temeroso
  - con temor
  lexicon: LSJ
  rationale: El griego no especifica el objeto del temor. 'Temor' preserva la amplitud léxica y deja abierta la posible lectura reverencial sin añadir 'de Yahvé' ni 'del Señor'.
- source_word: περισσεύων
  english_pob_choice: one who abounds
  chosen_spanish: el que abunda
  alternatives_spanish:
  - el que tiene en abundancia
  - el que sobreabunda
  - el que está lleno
  lexicon: LSJ
  rationale: '''Abunda'' reproduce la idea de exceso o abundancia en contraste con ''falto'', sin limitarla a riqueza material.'
- source_word: ἐν φρονήσει
  english_pob_choice: in prudence
  chosen_spanish: en prudencia
  alternatives_spanish:
  - en sabiduría
  - en entendimiento
  - en buen juicio
  lexicon: LSJ
  rationale: φρόνησις corresponde a prudencia o sensatez práctica. 'Prudencia' mantiene la distinción respecto de σύνεσις, que se traduce con 'entendimiento'.
- source_word: παραβαίνων νόμον
  english_pob_choice: transgresses the law
  chosen_spanish: traspasa la ley
  alternatives_spanish:
  - quebranta la ley
  - infringe la ley
  - viola la ley
  lexicon: LSJ
  rationale: παραβαίνω puede expresar ir más allá o sobrepasar un límite, de donde 'traspasar'. Esta opción conserva el tono formal y la fuerza legal-moral del original; 'la ley' traduce νόμον de manera directa.
theological_decisions:
- issue: Si ἔμφοβος debe explicitarse como temor de Dios/Yahvé
  english_pob_reading: fear; the Greek does not state the object of fear
  chosen_spanish_reading: temor
  alternative_spanish_readings:
  - temor de Yahvé
  - temor del Señor
  - reverencia
  rationale: La frase griega no nombra el objeto del temor. Dado el contexto sapiencial de Sirácida, la lectura reverente es plausible, pero el texto no la explicita; por eso el español conserva la ambigüedad.
  doctrine_reference: Preservar la tensión lexical sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'He seguido la última revisión del inglés: la estructura se entiende mejor con una pausa tras «falto» y con la coordinación «con entendimiento y temor», que refleja con naturalidad ἐν συνέσει ἔμφοβος sin añadir contenido explícito al griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto del nombre divino, pero aquí no se introduce porque el verso no lo nombra.
  - Se traduce νόμον por «la ley» con sentido jurídico-moral, sin convertirlo en una referencia distinta.
  - No se expande ἔμφοβος a «temor del Señor», para respetar la ambigüedad documentada en el audit trail inglés.
