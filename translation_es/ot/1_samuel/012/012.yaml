translation:
  language: es
  text: 'Cuando vieron que Nahas, rey de los amonitas, venía contra ustedes, me dijeron: «No, sino que un rey reinará sobre nosotros»—aunque Yahvé su Dios era[a] su rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es su rey». La cláusula hebrea no tiene verbo explícito, de modo que, según el contexto, puede suplirse en pasado o en presente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּרְאוּ
  english_pob_choice: When you saw
  chosen_spanish: Cuando vieron
  alternatives_spanish:
  - Y vieron
  - Al ver
  lexicon: HALOT
  rationale: La forma con waw-consecutiva introduce la circunstancia temporal de la reprensión de Samuel; en español, «Cuando vieron» reproduce bien ese marco y conserva el sentido de percepción directa.
- source_word: נָחָשׁ
  english_pob_choice: Nahash
  chosen_spanish: Nahas
  alternatives_spanish:
  - Nahash
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español con ajuste ortográfico habitual («Nahas») para lectura natural, manteniendo la identidad del personaje.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: king of the Ammonites
  chosen_spanish: rey de los amonitas
  alternatives_spanish:
  - rey de los hijos de Amón
  - rey del pueblo de Amón
  lexicon: HALOT
  rationale: La cadena constructa describe un título étnico-político. «Amonitas» es el equivalente español natural y fiel, sin perder el referente nacional.
- source_word: בָּא עֲלֵיכֶם
  english_pob_choice: was coming against you
  chosen_spanish: venía contra ustedes
  alternatives_spanish:
  - venía sobre ustedes
  - vino contra ustedes
  lexicon: HALOT
  rationale: En contexto militar, בוא + עַל expresa hostilidad y ataque. «Venía contra ustedes» preserva la direccionalidad agresiva y el carácter inminente de la amenaza.
- source_word: וַתֹּאמְרוּ לִי
  english_pob_choice: you said to me
  chosen_spanish: me dijeron
  alternatives_spanish:
  - me dijeron a mí
  - me hablaron
  lexicon: HALOT
  rationale: El sujeto implícito es Israel y la respuesta va dirigida a Samuel; en español «me dijeron» es natural y directo en discurso citado.
- source_word: לֹא כִּי
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - No, sino
  - No; más bien
  lexicon: HALOT
  rationale: El giro idiomático rechaza la alternativa implícita y la reemplaza por otra petición. «No, sino que» conserva la corrección enfática y resulta idiomático en español bíblico contemporáneo.
- source_word: מֶלֶךְ יִמְלֹךְ עָלֵינוּ
  english_pob_choice: a king shall reign over us
  chosen_spanish: reinará un rey sobre nosotros
  alternatives_spanish:
  - un rey reinará sobre nosotros
  - que reine un rey sobre nosotros
  lexicon: HALOT
  rationale: El hebreo expresa la insistencia del pueblo en la monarquía. En español, invertir a «reinará un rey» evita rigidez y mantiene la fuerza declarativa del pedido.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte como «Yahvé» en el texto principal, no como una sustitución reverencial.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - Dios de ustedes
  lexicon: HALOT
  rationale: En español, el posesivo de tercera persona plural concordando con el sujeto implícito y el discurso citado se lee naturalmente como «su Dios».
- source_word: מַלְכְּכֶם
  english_pob_choice: was your king
  chosen_spanish: era su rey
  alternatives_spanish:
  - es su rey
  - fue su rey
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal sin verbo explícito. En el contexto retrospectivo de la reprensión de Samuel, «era» ajusta bien al marco narrativo; se deja abierta la lectura presente en nota.
theological_decisions:
- issue: Cláusula nominal con יהוה ... מַלְכְּכֶם
  english_pob_reading: though Yahweh your God was your king
  chosen_spanish_reading: aunque Yahvé, su Dios, era su rey
  alternative_spanish_readings:
  - aunque Yahvé, su Dios, es su rey
  - aunque Yahvé, su Dios, era vuestro rey
  rationale: El hebreo no expresa verbo copulativo; el inglés POB eligió pasado en el cuerpo y preservó la lectura presente en nota. En español, «era» encaja con la reprensión histórica de Samuel, mientras que la nota mantiene la posibilidad de «es» como verdad continua.
  doctrine_reference: Preservar la tensión hermenéutica entre lectura histórica y afirmación teológica continua.
translation_notes:
  revision_awareness: El inglés POB revisó «even though» a «though» por un registro más conciso y formal. En español se siguió esa misma sobriedad con «aunque», manteniendo la relación concesiva sin añadir explicación innecesaria.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton, conforme a la política del proyecto.
  - Se prefirió «amonitas» como etnónimo idiomático en español.
  - Se mantuvo «su rey» en la nota porque la cláusula hebrea carece de verbo explícito y la referencia puede ser temporalmente abierta.
