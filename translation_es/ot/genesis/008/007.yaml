  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cuervo», «aguas» y «tierra» están bien. La decisión de conservar la iteración con «saliendo y regresando» es consistente con la auditoría inglesa y con la prioridad de preservar la forma significativa del hebreo.
