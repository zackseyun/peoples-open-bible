review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y preserva correctamente «Yahvé» y el topónimo «Baal-perazim». Sin embargo, debilita dos puntos importantes del sentido fuente/auditoría inglesa: וַיַּכֵּם se suaviza a «los derrotó» en vez de reflejar mejor la fuerza de «los hirió/derribó», y «ha abierto paso entre mis enemigos» no representa bien אֶת אֹיְבַי לְפָנַי, que significa que Yahvé irrumpió contra/sobre sus enemigos delante de David, no que abrió paso entre ellos. Además, «como una ruptura de aguas» es comprensible pero menos natural que una formulación que conserve la imagen de irrupción o desborde.'
  spanish_quality_summary: El español es claro y digno, pero hay giros mejorables. «Llamó al lugar con el nombre de» suena pesado frente a «llamó el nombre de aquel lugar» o «le puso por nombre». También conviene ajustar el verbo principal de la cita de David para que el juego verbal con «Baal-perazim» sea más perceptible y más fiel al hebreo. La nota a explica bien el topónimo, pero su eco con «abrió paso» es menos exacto que con «irrumpió» o «abrió brecha».
  glossary_alignment: Alineado con el glosario en «Yahvé». No hay otros términos doctrinales conflictivos. El principal ajuste léxico necesario es preservar mejor פָּרַץ / פֶּרֶץ con «irrumpir» / «irrupción» o «abrir brecha» / «brecha», y representar נכה con mayor fuerza militar que «derrotó».
  issues:
  - severity: medium
    issue: «los derrotó» suaviza וַיַּכֵּם
    rationale: La auditoría inglesa eligió «struck them down» para conservar la fuerza marcial de נכה. En español, «los derrotó» comunica resultado, pero no la acción de golpear/abatir del verbo.
  - severity: high
    issue: «Yahvé ha abierto paso entre mis enemigos delante de mí» no refleja bien la sintaxis hebrea
    rationale: אֶת אֹיְבַי לְפָנַי expresa que Yahvé irrumpió contra los enemigos delante de David, no que abrió un camino entre ellos. «Entre mis enemigos» introduce una idea no presente.
  - severity: medium
    issue: El juego de palabras con Baal-perazim queda parcialmente debilitado
    rationale: «Ha abierto paso» y «ruptura de aguas» conservan algo del campo semántico, pero menos claramente que una pareja como «irrumpió» / «irrupción» o «abrió brecha» / «brecha», que se acerca más a פָּרַץ / פֶּרֶץ.
  - severity: low
    issue: «llamó al lugar con el nombre de» resulta poco natural
    rationale: Aunque entendible, suena forzado en español. Puede mantenerse la cercanía al hebreo con una formulación más idiomática, como «llamó el nombre de aquel lugar» o «le puso por nombre».
  revised_spanish_text: 'Entonces David llegó a Baal-perazim[a], y allí David los derribó. Dijo[b]: «Yahvé irrumpió contra mis enemigos delante de mí, como una irrupción de aguas». Por eso llamó el nombre de aquel lugar Baal-perazim.'
  revised_footnotes:
