review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: contraste temporal-condicional, comparativo sustantivado sin añadir ''hombre'', llegada/embate del más fuerte, derrota, desarme, confianza previa en la armadura y reparto del botín. Sin embargo, la nota c está anclada a ''despojos'' cuando en la auditoría inglesa la alternativa léxica se relaciona con ''plunder/spoils'', y en español conviene presentar la alternativa principal singular ''su botín'' antes de un plural menos natural aquí.'
  spanish_quality_summary: El español es claro y natural. 'Uno más fuerte que él', 'lo vence', 'armadura completa' y 'reparte' funcionan bien. 'Viene sobre él' es aceptable aunque algo calcado; no exige cambio. La frase completa fluye correctamente y mantiene dignidad moderna.
  glossary_alignment: 'No hay términos del glosario principal en juego. Las decisiones léxicas concuerdan con la racionalidad documentada del POB: no añade ''hombre'', conserva la totalidad de πανοπλία con ''armadura completa'', y transmite σκῦλα con un término bélico adecuado. Se ajusta bien a la filosofía de equivalencia óptima.'
  issues:
  - severity: low
    issue: La nota al pie c ofrece primero 'sus botines', que suena menos natural en este contexto que 'su botín'.
    rationale: σκῦλα puede representarse en español de modo idiomático como 'botín' o 'despojos'. 'Sus botines' es posible, pero es menos natural y menos elegante en español bíblico corriente; conviene alinear mejor la nota con la alternativa inglesa principal 'his spoils'/'his plunder'.
  revised_spanish_text: Pero cuando uno más fuerte que él viene sobre él y lo vence[a], le quita su armadura completa[b], en la cual había confiado, y reparte sus despojos[c].
  revised_footnotes:
  - marker: a
    text: 'O: «lo derrota» o «lo conquista».'
    reason: lexical_alternative
  - marker: b
    text: «Armadura completa» traduce un término para un conjunto completo de armamento.
    reason: lexical_alternative
  - marker: c
    text: 'O: «su botín» o «sus botines».'
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y natural; solo conviene ajustar la nota c para ofrecer una alternativa española más idiomática y mejor alineada con la documentación léxica del inglés.
