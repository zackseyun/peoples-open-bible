translation:
  language: es
  text: Yahvé es exaltado sobre todas las naciones; su gloria está sobre los cielos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: רָם
  english_pob_choice: is high
  chosen_spanish: es alto
  alternatives_spanish:
  - está exaltado
  - está levantado
  lexicon: HALOT
  rationale: El adjetivo predicativo hebreo expresa altura/superioridad. «Es alto» conserva la imagen vertical de manera natural en español y evita sobrecargar el verso con una paráfrasis interpretativa.
- source_word: עַל כָּל גּוֹיִם
  english_pob_choice: above all nations
  chosen_spanish: sobre todas las naciones
  alternatives_spanish:
  - por encima de todas las naciones
  - sobre todos los pueblos
  lexicon: HALOT
  rationale: «עַל» aquí comunica superioridad/altura, no solo dominio. «Sobre todas las naciones» mantiene el paralelismo con la segunda cola y conserva la imagen poética del texto hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino propio. En español del POB se preserva como «Yahvé», evitando la sustitución por un título y manteniendo la distinción auditables del Tetragrámaton.
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: above the heavens
  chosen_spanish: sobre los cielos
  alternatives_spanish:
  - por encima de los cielos
  - sobre el cielo
  lexicon: HALOT
  rationale: «שָׁמַיִם» en poesía bíblica suele referirse a los cielos. «Sobre los cielos» reproduce la elevación y el paralelismo del original sin reducirlo a un solo cielo físico.
- source_word: כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su majestad
  lexicon: HALOT
  rationale: «כָּבוֹד» en este contexto de alabanza se rinde de forma estándar como «gloria». Es la opción más fiel y transparente para una doxología poética.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo contiene el Tetragrámaton. La política del POB es conservar el nombre divino en transliteración; en español, «Yahvé» es la forma adoptada para reflejar el nombre personal del Dios de Israel sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura hebrea y el audit trail inglés: mantiene el paralelismo ''sobre...; ... sobre...'' y conserva el nombre divino como transliteración. No se introdujeron notas porque el verso no presenta variantes textuales o tensiones lexicológicas que requieran marcar una alternativa en esta línea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para יְהוָה.
  - Se conserva «gloria» para כָּבוֹד en contexto de exaltación divina.
  - La preposición «sobre» se repite para reflejar el paralelismo poético hebreo.
  - «cielos» se usa en plural por la forma hebrea שָׁמַיִם y por el tono bíblico-poético.
