review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura básica del hebreo, pero altera dos decisiones léxicas clave documentadas en el POB inglés: הַיַּעְרָה se volvió «al monte» en vez de «al bosque/la zona boscosa», y הַר אֶפְרָיִם se volvió «el monte de Efraín» en vez de una referencia territorial como «la región montañosa/la serranía/la tierra montañosa de Efraín». Además, la nota [a] no corresponde a una alternativa real del inglés ni del hebreo; el hebreo sí dice «a ellos», no «o les dijo».'
  spanish_quality_summary: 'El español es legible, pero «sube al monte» y «el monte de Efraín» producen una confusión interna: el primer sintagma desplaza el foco del bosque, y el segundo sugiere un monte singular cuando el contexto territorial pide región montañosa. «para ti» mantiene el singular colectivo del hebreo y es aceptable, aunque en español puede sonar más natural mantener la colectividad con «para ustedes» solo si se rehace más ampliamente; no es necesario para una reparación mínima.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Los etnónimos «perizitas» y «refaítas» son aceptables. La principal desalineación es con las decisiones léxicas auditadas: הַיַּעְרָה debe reflejar «bosque/zona arbolada», y הַר אֶפְרָיִם debe reflejar territorio montañoso, no un pico singular.'
  issues:
  - severity: high
    issue: הַיַּעְרָה traducido como «al monte»
    rationale: El sustantivo hebreo significa «bosque/forest». Aunque subir implica elevación, reemplazar el referente por «monte» borra la idea esencial de la zona arbolada, que además enlaza con «despejar terreno».
  - severity: high
    issue: הַר אֶפְרָיִם traducido como «el monte de Efraín»
    rationale: En contexto territorial de Josué, הַר se refiere a región montañosa/serranía/hill country. «Monte de Efraín» sugiere un monte singular y no preserva bien el sentido geográfico documentado en el POB.
  - severity: medium
    issue: La nota [a] introduce una alternativa impropia
    rationale: La nota «O “les dijo”» no aporta una alternativa textual real; el texto principal ya dice «les dijo» y el hebreo אֲלֵיהֶם simplemente significa «a ellos». La nota debe eliminarse.
  revised_spanish_text: 'Josué les dijo: «Si eres un pueblo numeroso, sube al bosque[a] y despeja allí terreno para ti, en la tierra de los perizitas y de los refaítas; porque la región montañosa de Efraín[b] es demasiado estrecha para ti».'
