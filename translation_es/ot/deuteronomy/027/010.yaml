translation:
  language: es
  text: Por tanto, escucharás la voz de Yahvé tu Dios y harás sus mandamientos y sus estatutos, que yo te mando hoy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedecerás la voz de Yahvé tu Dios». El hebreo «escuchar la voz» suele incluir el sentido de obedecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: So you shall listen
  chosen_spanish: escucharás
  alternatives_spanish:
  - oirás
  - obedecerás
  lexicon: HALOT
  rationale: 'שׁמע con בְּקוֹל suele implicar atender a una voz con obediencia implícita. En español, «escucharás» conserva el valor de oír atentamente sin cerrar de entrada el matiz obediente, que queda reforzado por la cláusula siguiente: «y harás».'
- source_word: בְּקוֹל
  english_pob_choice: to the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - lo que dice
  lexicon: HALOT
  rationale: La expresión hebrea se mantiene de forma natural como «la voz», preservando el giro idiomático y su resonancia de alianza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la convención del proyecto para preservar el nombre divino propio, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Construcción posesiva directa y normal en español para el Dios de pacto de Israel.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and do
  chosen_spanish: y harás
  alternatives_spanish:
  - y cumplirás
  - y guardarás
  lexicon: HALOT
  rationale: עָשָׂה aquí significa realizar/cumplir. «Harás» es fiel y se coordina de forma natural con mandamientos y estatutos.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus preceptos
  - sus órdenes
  lexicon: HALOT
  rationale: «Mandamientos» conserva el matiz formal, legal y covenantal de מִצְוָה, mejor que alternativas más generales.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» corresponde bien a חֻקִּים en contexto legal y distingue esta serie de «mandamientos» sin perder claridad para el lector español.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ
  english_pob_choice: that I am commanding you
  chosen_spanish: que yo te mando
  alternatives_spanish:
  - que yo te estoy mandando
  - que yo te ordeno
  lexicon: HALOT
  rationale: El participio expresa una acción en curso en la situación discursiva. «Te mando» suena natural en español y preserva la inmediatez de la exhortación de Moisés sin sobrerreflejar el aspecto progresivo.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y mantiene el énfasis de Deuteronomio en el momento presente del pacto.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio divino, no una sustitución por título, siguiendo la convención del proyecto y la lectura del hebreo directo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el trazado inglés de alta concordancia: se preserva el nombre divino, el giro idiomático «escuchar la voz» y la distinción entre mandamientos y estatutos sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - «Yahvé» se usa consistentemente para יְהוָה.
  - «Mandamientos» y «estatutos» conservan la distinción legal del hebreo.
  - La nota al pie recoge la alternativa semántica de obediencia sin reemplazar el texto principal.
