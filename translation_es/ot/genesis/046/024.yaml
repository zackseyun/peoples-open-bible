  text: 'Y los hijos de Neftalí: Jahzeel[a], Guni, Jezer y Shillem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La grafía de estos nombres hebreos varía según la tradición de transliteración: «Jahzeel» también puede aparecer como «Jahziel» o «Jachzeel», y «Jezer» también puede aparecer como «Jezer».'
