    rationale: בקש en este contexto administrativo, según el expediente POB, se entiende mejor como reclamar/exigir/demandar una asignación legítima, no meramente pedirla.
  - severity: low
    issue: '''La carga del trabajo era pesada sobre este pueblo'' es comprensible pero poco idiomática.'
    rationale: Puede expresarse con más naturalidad en español manteniendo la imagen de peso, por ejemplo 'la carga de trabajo pesaba sobre este pueblo'.
