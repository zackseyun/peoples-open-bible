revisions:
- from: Y la batalla se intensificó[a] aquel día, y el rey permanecía[b] de pie en el carro, frente a Aram; y murió por la tarde, y la sangre de la herida fluyó[c] hasta el fondo del carro.
  to: Y la batalla se intensificó[a] aquel día, y el rey permaneció[b] de pie en el carro, frente a Aram; y murió por la tarde, y la sangre de la herida fluyó[c] hasta el fondo del carro.
  rationale: Se cambió «permanecía» por «permaneció» para ajustar mejor el tiempo narrativo español al hebreo y al English POB revisado. Se mejoró la nota [a] para conservar una alternativa idiomática útil («creció») junto con la opción más literal («subió»). El resto del texto es fiel, claro y terminológicamente sólido.
