translation:
  language: es
  text: Recuerden para siempre[a] su pacto, la palabra que él mandó para mil generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la promesa».
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerden!
  - Acuérdense
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural masculino dirigido a la comunidad. «Recuerden» conserva el llamado directo y suena natural en español bíblico contemporáneo; «Acuérdense» es posible, pero se aparta un poco más del imperativo explícito.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión comunica duración continua o indefinida. «Para siempre» es la forma más natural y clara en español, y preserva bien el valor temporal sin sobrecargarlo.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su pacto
  lexicon: HALOT
  rationale: En español, «pacto» comunica de forma fiel la fuerza relacional y vinculante de בְּרִית. «Alianza» puede funcionar, pero en contexto bíblico suele sonar más técnico o menos directo; aquí se mantiene la terminología pactal sin importar un tecnicismo eclesiástico.
- source_word: דָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la promesa
  - el asunto
  lexicon: HALOT
  rationale: Se conserva el lexema amplio «palabra», como en el audit trail inglés. «Promesa» sería interpretativo y resolvería la tensión semántica del hebreo, mientras que «palabra» deja abierta la relación entre mandato, declaración y promesa.
- source_word: צִוָּה
  english_pob_choice: he commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó
  lexicon: HALOT
  rationale: El verbo צוה tiene el sentido básico de mandar/ordenar. «Mandó» es breve, bíblicamente natural y fiel al valor verbal sin añadir solemnidad interpretativa.
- source_word: לְאֶלֶף דּוֹר
  english_pob_choice: for a thousand generations
  chosen_spanish: para mil generaciones
  alternatives_spanish:
  - por mil generaciones
  - durante mil generaciones
  lexicon: HALOT
  rationale: La frase expresa duración a lo largo de generaciones. «Para mil generaciones» reproduce bien el alcance temporal y mantiene la posible naturaleza idiomática del número sin convertirlo en una paráfrasis.
theological_decisions:
- issue: Cómo traducir דָּבָר en paralelo con «pacto» sin cerrar la ambigüedad semántica
  english_pob_reading: 'the word; footnote alternative: the promise'
  chosen_spanish_reading: la palabra
  alternative_spanish_readings:
  - la promesa
  rationale: Se mantiene «la palabra» para respetar la primacía del hebreo y la decisión del POB inglés. La nota ofrece «la promesa» como alternativa legítima para lectores que perciban el matiz pactal, pero la línea principal no resuelve la tensión semántica.
  doctrine_reference: 'Translation philosophy: preserve lexical range and theological tension rather than collapsing it into a single interpretive gloss.'
translation_notes:
  revision_awareness: El pasaje coincide con el último pase de revisión y no requiere cambios adicionales; se conserva la decisión de mantener דָּבָר como «la palabra» con alternativa en nota.
  spanish_consistency_notes:
  - Se usa «pacto» en lugar de «covenant» o «alianza» para mantener consistencia con terminología bíblica precisa y comprensible en español.
  - «Para siempre» y «para mil generaciones» conservan el carácter temporal amplio sin volverlo más enfático que el hebreo.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton ni una sustitución por κύριος en este punto.
