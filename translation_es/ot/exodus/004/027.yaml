    issue: «para encontrarte con Moisés» suena algo forzado tras «Ve al desierto»
    rationale: Aunque transmite el propósito, en español bíblico-natural la secuencia «Ve al desierto a encontrarte con Moisés» fluye mejor y preserva el valor de propósito de לִקְרַאת sin rigidez.
  - severity: low
