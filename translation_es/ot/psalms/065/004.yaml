translation:
  language: es
  text: Los asuntos de iniquidad han prevalecido contra mí[a]; nuestras transgresiones, tú las expiarás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las palabras de iniquidad han prevalecido contra mí». La apertura hebrea es condensada y puede expresarse de manera más idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tú harás expiación por ellas», «tú las cubrirás» o «tú las purgarás». El verbo hebreo expresa hacer expiación por el pecado; el contexto determina el matiz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: Words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los asuntos de
  - Las materias de
  lexicon: HALOT
  rationale: דִּבְרֵי es el constructo plural de דָּבָר. En español, «palabras de» conserva la forma compacta y la abertura sintáctica del hebreo, y permite entender la frase como una designación de cosas dichas o cargadas de significado respecto del pecado.
- source_word: עֲוֺנֹת
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecados
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o la carga derivada de la culpa. «Iniquidad» mantiene el peso moral del término sin reducirlo solo a un acto aislado ni a una simple condición subjetiva.
- source_word: גָּבְרוּ
  english_pob_choice: have prevailed
  chosen_spanish: han prevalecido
  alternatives_spanish:
  - han sido demasiado fuertes
  - han sobrepasado
  lexicon: HALOT
  rationale: La raíz גבר expresa ser fuerte, imponerse o prevalecer. «Han prevalecido» conserva la idea de superioridad/triunfo de esas palabras sobre el hablante, de manera natural en español.
- source_word: מֶנִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - frente a mí
  lexicon: HALOT
  rationale: Después de גבר, מן con sufijo puede expresar superioridad o el sentido adversativo de estar por encima de alguien. «Contra mí» comunica bien la oposición implícita en el contexto.
- source_word: פְּשָׁעֵינוּ
  english_pob_choice: our transgressions
  chosen_spanish: nuestras transgresiones
  alternatives_spanish:
  - nuestros pecados de rebelión
  - nuestras rebeldías
  lexicon: HALOT
  rationale: פֶּשַׁע denota transgresión, rebelión o delito de pacto. «Transgresiones» es un equivalente claro y digno, y conserva la dimensión moral y relacional del término.
- source_word: תְכַפְּרֵם
  english_pob_choice: you will atone for them
  chosen_spanish: tú las expiarás
  alternatives_spanish:
  - tú harás expiación por ellas
  - tú las cubrirás
  lexicon: HALOT
  rationale: El piel de כפר, con sufijo de 3 mp, expresa hacer expiación por/remover la ofensa. «Expiar» comunica el acto sacrificial y purificador con concisión, sin diluirse en un mero «cubrir».
theological_decisions:
- issue: Rendering of כפר in a sin-removal context
  english_pob_reading: you will atone for them
  chosen_spanish_reading: tú las expiarás
  alternative_spanish_readings:
  - tú harás expiación por ellas
  - tú las cubrirás
  rationale: La lectura inglesa preserva el peso expiatorio de כפר sin fijar una teoría doctrinal estrecha. En español, «expiar» mantiene ese contenido sacrificial y de remoción del pecado, y evita la ambigüedad de «cubrir», que podría sonar meramente encubridor.
  doctrine_reference: Translation philosophy §6; preservar el peso teológico con claridad accesible
translation_notes:
  revision_awareness: 'El contexto auditado en inglés fue revisado para preferir una lectura más natural del primer hemistiquio («Words of iniquity») y conservar la fuerza expiatoria de כפר. La versión española sigue esa línea: mantiene el singular colectivo «iniquidad» y traduce כפר con un verbo de expiación explícita, sin ampliar el sentido más allá del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - '«Iniquidad» y «transgresiones» distinguen dos matices distintos del hebreo: עָוֹן y פֶּשַׁע.'
  - La puntuación con punto y coma refleja la cesura poética y separa las dos mitades del versículo.
  - El pronombre enfático «tú» se conserva para reproducir la fuerza del hebreo אַתָּה.
