translation:
  language: es
  text: Tu ombligo es un cuenco redondeado[a]; nunca le falte vino mezclado[b]. Tu vientre es un montón de trigo[c], rodeado de lirios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, 'tu vulva es un cuenco redondeado'. El término hebreo tradicionalmente traducido 'ombligo' es debatido en este contexto poético erótico.
    reason: lexical_alternative
  - marker: b
    text: O 'vino especiado'. El hebreo se refiere a vino mezclado, probablemente con agua o especias.
    reason: lexical_alternative
  - marker: c
    text: O 'tu matriz es un montón de trigo' si el término se toma en un sentido interno más que externo, aunque 'vientre' es más probable en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרְרֵךְ
  english_pob_choice: your navel
  chosen_spanish: tu ombligo
  alternatives_spanish:
  - tu vulva
  - tu vientre
  lexicon: HALOT, BDB
  rationale: El término hebreo admite debate en este contexto poético erótico, pero la lectura principal de la POB en inglés mantiene 'navel' como la opción más defendible y estable. En español, 'ombligo' conserva esa base léxica sin añadir una interpretación más específica que el texto no obliga a tomar.
- source_word: אַגַּן
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - cuenco
  - vasija
  lexicon: HALOT, BDB
  rationale: El sustantivo designa un recipiente. 'Copa' funciona bien en español poético, aunque no es estrictamente una copa para beber; sin embargo, el contexto de líquido y abundancia permite esta elección como imagen elegante. Se evita una forma demasiado técnica como 'vasija'.
- source_word: הַסַּהַר
  english_pob_choice: rounded
  chosen_spanish: redondeada
  alternatives_spanish:
  - redonda
  - de forma lunar
  lexicon: HALOT, BDB
  rationale: La idea central es la redondez/circularidad. 'Redondeada' preserva la imagen sin comprometerse con una lectura específicamente lunar, igual que la POB en inglés usa 'rounded'.
- source_word: אַל יֶחְסַר
  english_pob_choice: may it never lack
  chosen_spanish: nunca le falte
  alternatives_spanish:
  - que no le falte
  - no le faltará
  lexicon: HALOT, BDB
  rationale: El jussivo expresa deseo o bendición. 'Nunca le falte' reproduce bien ese valor optativo en español, manteniendo la fuerza poética de la petición.
- source_word: הַמָּזֶג
  english_pob_choice: mixed wine
  chosen_spanish: vino mezclado
  alternatives_spanish:
  - vino especiado
  - vino sazonado
  - vino rebajado
  lexicon: HALOT, BDB
  rationale: La POB opta por una traducción transparente del hebreo. 'Vino mezclado' conserva la literalidad y deja abierta la posible mezcla con agua o especias, sin fijar un matiz no explicitado por el texto.
- source_word: בִּטְנֵךְ
  english_pob_choice: your belly
  chosen_spanish: tu vientre
  alternatives_spanish:
  - tu abdomen
  - tu seno
  lexicon: HALOT, BDB
  rationale: La POB en inglés considera 'belly' como el sentido más probable en el contexto externo del blazón corporal, aunque admite 'womb' como alternativa. En español, 'vientre' comunica bien el sentido corporal sin sonar tosco, y permite conservar la ambigüedad poética entre exterior e interior.
- source_word: עֲרֵמַת חִטִּים
  english_pob_choice: a heap of wheat
  chosen_spanish: un montón de trigo
  alternatives_spanish:
  - una gavilla de trigo
  - un montón de espigas
  lexicon: HALOT, BDB
  rationale: La construcción nominal es directa. 'Un montón de trigo' preserva la imagen agrícola de acumulación y resulta natural en español, equivalente al inglés de la POB.
- source_word: סוּגָה
  english_pob_choice: encircled
  chosen_spanish: rodeado de
  alternatives_spanish:
  - cercado de
  - ceñido de
  - circundado de
  lexicon: HALOT, BDB
  rationale: La forma pasiva/participial expresa estar rodeado o cercado. 'Rodeado de' es la opción más clara y natural en español para mantener la imagen sin forzar una expresión arcaizante.
- source_word: בַּשּׁוֹשַׁנִּים
  english_pob_choice: with lilies
  chosen_spanish: de lirios
  alternatives_spanish:
  - entre lirios
  - con lirios
  lexicon: HALOT, BDB
  rationale: El complemento preposicional puede indicar compañía o entorno. En español, 'rodeado de lirios' integra bien la relación espacial y poética; 'de lirios' evita una repetición pesada de preposición y sigue siendo idiomático.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la revisión inglesa más reciente, que no introdujo cambios sustantivos, y conserva sus mismas decisiones principales: ''navel/ombligo'' en el texto principal, ''mixed wine/vino mezclado'', y la alternativa semántica para ''belly'' mediante nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto cuando no aparece en este versículo.
  - Se evita 'Cristo' o terminología cristológica no pertinente al pasaje.
  - Se conserva un registro poético y digno, con sintaxis natural para español moderno.
  - Las notas preservan la ambigüedad léxica documentada sin sobrerresolver el blazón corporal.
