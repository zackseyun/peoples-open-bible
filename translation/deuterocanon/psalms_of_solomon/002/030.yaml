id: PSS.2.30
reference: Psalms of Solomon 2:30
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἐχρόνισα ἕως ἔδειξέ μοι ὁ θεὸς τὴν ὕβριν αὐτοῦ, ἐκκενεκεντημένον ἐπὶ τῶν ὀρέων Αἰγύπτου, ὑπὲρ ἐλάχιστον ἐξουδενωμένον ἐπὶ γῆς καὶ θαλάσσης·
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: And I did not delay until God showed me his insolence[a], pierced through on the mountains of Egypt[d][c][b], utterly despised on land and sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his insolence' or 'his outrage' for 'his arrogance' (τὴν ὕβριν αὐτοῦ).
    reason: lexical_alternative
  - marker: b
    text: Literally 'pierced through on the mountains of Egypt'; the line vividly depicts the oppressor's violent downfall.
    reason: lexical_alternative
  - marker: c
    text: 'The Greek is compressed: ''made more despised than the least on land and sea.'' ''Person'' is supplied in English for clarity.'
    reason: lexical_alternative
  - marker: d
    text: Or 'And I did not have to wait long until God showed me his arrogance, pierced through on the mountains of Egypt, made more despised than the least person on land and sea.'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐκ ἐχρόνισα
  chosen: I did not have to wait long
  alternatives:
  - I did not delay
  - I did not tarry
  lexicon: LSJ
  rationale: In context this follows the plea that God not delay; idiomatic English here points to the speaker not waiting long before seeing God's answer, rather than to the speaker himself choosing not to delay.
- source_word: ὕβριν
  chosen: arrogance
  alternatives:
  - insolence
  - outrage
  - hubris
  lexicon: LSJ
  rationale: The noun denotes overweening pride expressed in abusive conduct. 'Arrogance' is clear modern English and fits the downfall-of-the-proud context; 'hubris' is possible but too specialized for the main text.
- source_word: ἐκκενεκεντημένον
  chosen: pierced through
  alternatives:
  - stabbed
  - run through
  lexicon: LSJ
  rationale: The participle conveys violent piercing. 'Pierced through' preserves the concrete, judicially ironic image without narrowing the instrument or over-colloquializing the line.
- source_word: ἐπὶ τῶν ὀρέων Αἰγύπτου
  chosen: on the mountains of Egypt
  alternatives:
  - in the hill country of Egypt
  - upon Egypt's mountains
  lexicon: LSJ
  rationale: A fairly direct rendering best preserves the source wording. 'Mountains' may sound unexpected, but it is the transparent translation of ὄρη and should not be smoothed away.
- source_word: ὑπὲρ ἐλάχιστον
  chosen: more than the least person
  alternatives:
  - beyond the least
  - lower than the least
  lexicon: LSJ
  rationale: The phrase is elliptical in Greek. Supplying 'person' makes the comparison intelligible in English while preserving the sense of extreme abasement.
- source_word: ἐξουδενωμένον
  chosen: made more despised
  alternatives:
  - treated as nothing
  - utterly scorned
  - brought into contempt
  lexicon: LSJ
  rationale: The participle denotes being reduced to nothing or treated with contempt. 'Made more despised' fits the comparative force of the preceding phrase and keeps the humiliation theme vivid.
