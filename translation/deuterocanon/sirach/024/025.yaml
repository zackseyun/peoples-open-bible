  from: It fills with wisdom like the Pishon, and like the Tigris in the days of firstfruits.
  to: It fills with wisdom like the Pishon, and like the Tigris in the days of the new harvest.
  rationale: The existing draft's use of 'firstfruits' introduces a specific cultic concept that is not present in the Greek word νέων, which broadly refers to the new crops of the spring season. The blind draft's 'the new harvest' is a more precise and natural rendering of the agricultural context. The phrase 'It fills with wisdom' is retained as a functional English rendering of the active participle with an accusative of content/object, maintaining the river metaphor.
