source:
  edition: SBLGNT
  text: ὥστε ⸂τὸν ὄχλον⸃ θαυμάσαι βλέποντας κωφοὺς λαλοῦντας ⸂κυλλοὺς ὑγιεῖς⸃ ⸀καὶ χωλοὺς περιπατοῦντας καὶ τυφλοὺς βλέποντας· καὶ ἐδόξασαν τὸν θεὸν Ἰσραήλ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/031.yaml
  text: so that the crowd marveled as they saw the mute speaking[a], the crippled healthy, the lame walking, and the blind seeing[b]; and they glorified the God of Israel.
  footnotes:
  - marker: a
    text: Or 'the deaf speaking.' The Greek word can refer to those who are deaf or mute; here 'mute' is preferred because the immediate emphasis is on speaking.
    reason: lexical_alternative
  - marker: b
    text: Or 'the maimed restored' / 'the maimed whole.' The Greek describes those with disabled or maimed limbs being healed.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
