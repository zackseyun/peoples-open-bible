translation:
  language: es
  text: Y Judas y la fuerza volvieron atrás y dejaron de perseguirlos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron
  - regresaron
  - se dieron la vuelta
  lexicon: BDAG
  rationale: El aoristo de ἐπιστρέφω aquí expresa un cambio de dirección en la acción militar. En español, 'se volvieron' comunica ese giro concreto con naturalidad y sin perder el matiz de retirada; 'regresaron' suena más a retorno a un lugar de origen, y 'se dieron la vuelta' es demasiado coloquial.
- source_word: ἡ δύναμις
  english_pob_choice: the force
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el ejército
  - las tropas
  - la hueste
  lexicon: LSJ
  rationale: En contexto militar, δύναμις puede designar un cuerpo armado. 'La fuerza' sigue de cerca el valor griego y evita una especificación más interpretativa como 'el ejército'. En español, el singular colectivo suena natural y mantiene la amplitud semántica del término.
- source_word: ἀπὸ τοῦ διώκειν
  english_pob_choice: from pursuing
  chosen_spanish: de perseguirlos
  alternatives_spanish:
  - de la persecución
  - de seguir persiguiéndolos
  - de continuar persiguiéndolos
  lexicon: BDAG
  rationale: La construcción ἀπό + infinitivo articular expresa cesación o alejamiento de una actividad. 'De perseguirlos' reproduce ese valor de manera compacta y fiel. Añadir 'seguir' o 'continuar' introduciría un matiz no explícito en el griego.
- source_word: ὀπίσθεν αὐτῶν
  english_pob_choice: after them
  chosen_spanish: '-'
  alternatives_spanish:
  - tras ellos
  - detrás de ellos
  lexicon: LSJ
  rationale: En esta frase, la idea de ὀπίσθεν ya queda absorbida por el complemento verbal 'de perseguirlos' en español. Traducirla de nuevo como 'tras ellos' o 'detrás de ellos' resultaría redundante, como mostró la revisión inglesa al eliminar el equivalente sobrante.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó la redundancia de ''after'' para conservar el sentido de ὀπίσθεν αὐτῶν sin repetirlo. Por eso el español evita un segundo elemento espacial y prefiere una construcción verbal directa: ''se volvieron de perseguirlos''.'
  spanish_consistency_notes:
  - Se mantiene 'Judas' como nombre propio y 'la fuerza' como equivalente de δύναμις, siguiendo la opción auditada del inglés POB.
  - Se evita 'Cristo', 'SEÑOR' u otra terminología no presente en el griego.
  - El pronombre enclítico 'perseguirlos' conserva la referencia objeto plural del texto griego.
