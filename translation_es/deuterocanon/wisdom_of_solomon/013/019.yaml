translation:
  language: es
  text: Pero en cuanto al sustento, al trabajo y al éxito de sus manos[b], pide fuerza a lo más inerte[a] con sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo completamente incapaz de actuar'. El superlativo griego recalca la absoluta incapacidad del ídolo para obrar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'éxito de manos', es decir, éxito en lo que uno hace o produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορισμοῦ
  english_pob_choice: provision
  chosen_spanish: sustento
  alternatives_spanish:
  - provisión
  - ganancia
  - medios de vida
  lexicon: LSJ
  rationale: El griego apunta a la obtención de recursos o medios de mantenimiento. En español, 'sustento' comunica bien la idea de provisión para vivir sin restringirla solo a 'ganancia'.
- source_word: ἐργασίας
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - obra
  - actividad
  lexicon: LSJ
  rationale: Es un término amplio de trabajo o actividad. 'Trabajo' es natural y mantiene la relación con el sustento y el éxito de la acción humana.
- source_word: χειρῶν ἐπιτυχίας
  english_pob_choice: success of hands
  chosen_spanish: éxito de sus manos
  alternatives_spanish:
  - éxito en lo que hace
  - éxito de la obra de sus manos
  - prosperidad de sus manos
  lexicon: LSJ
  rationale: La expresión es casi literal y conserva el énfasis en la eficacia de lo que las manos hacen. Se mantiene la posesiva implícita y el matiz de resultado práctico.
- source_word: τὸ ἀδρανέστατον
  english_pob_choice: that thing most inactive
  chosen_spanish: aquello que es lo más inactivo
  alternatives_spanish:
  - lo más lifeless
  - aquello que es completamente inerte
  - el objeto más inactivo
  lexicon: LSJ
  rationale: El superlativo neutro describe al ídolo como objeto incapaz de actuar. 'Lo más inactivo' preserva la ironía sin añadir una interpretación más fuerte que el texto.
- source_word: ταῖς χερσὶν
  english_pob_choice: with his hands
  chosen_spanish: con sus manos
  alternatives_spanish:
  - con las manos
  - por medio de sus manos
  lexicon: LSJ
  rationale: El dativo se entiende naturalmente como referencia a las propias manos del adorador o artesano. 'Con sus manos' suena natural en español y conserva la referencia posesiva implícita.
- source_word: εὐδράνειαν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - eficacia
  - capacidad de actuar
  lexicon: LSJ
  rationale: El sustantivo raro expresa eficacia activa o capacidad operativa. 'Fuerza' funciona como equivalente digno y sobrio en español, manteniendo el contraste con la inactividad del ídolo.
- source_word: αἰτεῖται
  english_pob_choice: he asks
  chosen_spanish: pide
  alternatives_spanish:
  - solicita
  - demanda
  - ruega
  lexicon: LSJ
  rationale: La forma media se entiende como 'pedir/solicitar para sí'. 'Pide' es directo, claro y acorde con el tono de la frase.
theological_decisions:
- issue: Referente del superlativo neutro aplicado al objeto de culto
  english_pob_reading: The phrase refers to the idol as an inert object from which the worshiper seeks practical success.
  chosen_spanish_reading: La frase se refiere al ídolo como objeto inerte del cual el adorador busca éxito práctico.
  alternative_spanish_readings:
  - Una referencia más general a una imagen de culto inactiva sin subrayar la inercia física
  - Una forma menos concreta que alude solo a la inutilidad del ídolo
  rationale: El contexto inmediato de Sabiduría 13 critica la fabricación y adoración de ídolos. El superlativo y la ironía de pedirle eficacia refuerzan que el objeto mismo es el foco de la denuncia; conviene conservar esa tensión sin suavizarla.
  doctrine_reference: Mantener la primacía del sentido original y la ironía anti-idolátrica del texto; no resolver la tensión por tradición devocional.
translation_notes:
  revision_awareness: La traducción española sigue el texto griego de Swete 1909 y el archivo de auditoría en inglés, respetando la estructura de la tríada 'sustento / trabajo / éxito de sus manos' y conservando la ironía central del pedido hecho a un objeto absolutamente inactivo. Se tuvo en cuenta la revisión inglesa que cambió 'vigor' por 'strength'; en español se optó por 'fuerza' por ser el equivalente más natural y sobrio.
  spanish_consistency_notes:
  - Se mantuvo un registro moderno y reverente, sin forzar giros arcaizantes.
  - '''Ídolo'' se entiende por el contexto del capítulo, aunque no aparezca explícito en el versículo.'
  - Se conservó la ambigüedad productiva de 'éxito de sus manos' mediante nota, en lugar de explicitarla dentro del texto principal.
