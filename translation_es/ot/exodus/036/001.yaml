translation:
  language: es
  text: Y Bezalel, Oholiab[a], y todo hombre hábil, en quienes[b] Yahvé ha puesto sabiduría y entendimiento para saber hacer toda la obra del servicio del santuario[c], harán conforme a todo lo que Yahvé ha mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo hombre sabio de corazón»; la expresión puede funcionar de manera genérica para todo obrero experto.'
    reason: lexical_alternative
  - marker: b
    text: O «a quienes Yahvé ha dado sabiduría y entendimiento»; el hebreo tiene una expresión plural, «en ellos», que se refiere colectivamente a Bezalel, Oholiab y todo hombre hábil.
    reason: lexical_alternative
  - marker: c
    text: O «toda la obra para el servicio del santuario».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: shall do
  chosen_spanish: harán
  alternatives_spanish:
  - hará
  - deberán hacer
  lexicon: HALOT
  rationale: El verbo en contexto continúa una instrucción normativa con valor de futuro/resultativo. "Harán" conserva ese valor de mandato/resultado sin cargar el español con un calco artificioso. Se evita "hacer" desnudo porque suena menos natural en una cláusula completa de instrucción.
- source_word: בְצַלְאֵל
  english_pob_choice: Bezalel
  chosen_spanish: Bezalel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa y reconocible en español.
- source_word: וְאָהֳלִיאָב
  english_pob_choice: Oholiab
  chosen_spanish: Oholiab
  alternatives_spanish:
  - Aholiab
  lexicon: HALOT
  rationale: Se conserva la transliteración usada en el expediente inglés. "Aholiab" es una variante tradicional posible, pero aquí se mantiene Oholiab por continuidad auditiva y documental.
- source_word: וְכֹל אִישׁ חֲכַם לֵב
  english_pob_choice: every skillful man / every wise-hearted man
  chosen_spanish: todo hombre hábil
  alternatives_spanish:
  - todo hombre sabio de corazón
  - todo hombre entendido
  lexicon: HALOT
  rationale: El hebreo dice literalmente "todo hombre sabio de corazón", pero el contexto de Ex 36:1 es artesanal. "Hábil" comunica con naturalidad la competencia práctica que el inglés POB finalmente subrayó con "skillful", sin borrar por completo la idea de sabiduría interior, que se preserva en la nota textual.
- source_word: אֲשֶׁר נָתַן יְהוָה חָכְמָה וּתְבוּנָה בָּהֵמָּה
  english_pob_choice: in whom Yahweh has put wisdom and understanding
  chosen_spanish: en quien Yahvé ha puesto sabiduría y entendimiento
  alternatives_spanish:
  - a quienes Yahvé ha dado sabiduría y entendimiento
  - en ellos Yahvé ha puesto sabiduría y entendimiento
  lexicon: HALOT
  rationale: El hebreo usa una forma plural colectiva ('en ellos'), referida al conjunto de Bezalel, Oholiab y todo hombre hábil. En español, "en quien" puede funcionar distributivamente y suena más fluido, pero se deja constancia de la pluralidad en una nota para no borrar la tensión gramatical del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: "Yahvé". La forma mantiene el nombre del pacto sin sustituirlo por una convención de máscara litúrgica.'
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - habilidad
  - pericia
  lexicon: HALOT
  rationale: Aunque el contexto es de trabajo manual, el término hebreo es más amplio que "habilidad". "Sabiduría" preserva el alcance del don divino; la destreza artesanal queda implícita por el contexto y por la cercanía con "hombre hábil".
- source_word: וּתְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: HALOT
  rationale: '"Entendimiento" es la pareja natural de "sabiduría" en español bíblico y comunica bien la capacidad de comprender y aplicar. "Discernimiento" sería posible, pero estrecha demasiado el campo semántico.'
- source_word: לָדַעַת
  english_pob_choice: to know how
  chosen_spanish: para saber
  alternatives_spanish:
  - para saber cómo
  - para conocer
  lexicon: HALOT
  rationale: El infinitivo expresa capacidad práctica. En español, "para saber hacer" reproduce con naturalidad el sentido funcional de "to know how to do" sin redundancia excesiva.
- source_word: לַעֲשֹׂת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - realizar
  - ejecutar
  lexicon: HALOT
  rationale: Se mantiene el valor amplio de עשה, que puede abarcar hacer, fabricar y realizar. "Hacer" es el equivalente más sobrio y cubre el trabajo de construcción del versículo.
- source_word: כָּל מְלֶאכֶת עֲבֹדַת הַקֹּדֶשׁ
  english_pob_choice: all the work for the service of the sanctuary
  chosen_spanish: toda la obra del servicio del santuario
  alternatives_spanish:
  - todo el trabajo del servicio del lugar santo
  - toda la labor del servicio del santuario
  lexicon: HALOT
  rationale: '"Obra" traduce bien מְלָאכָה en un registro elevado, mientras que "servicio del santuario" conserva la relación interna entre עבודה y הקֹדֶשׁ. Se evita diluir "santuario" en una paráfrasis más general porque el contexto cultual es específico.'
- source_word: לְכֹל אֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: according to all that Yahweh has commanded
  chosen_spanish: conforme a todo lo que Yahvé ha mandado
  alternatives_spanish:
  - según todo lo que Yahvé ha mandado
  - de acuerdo con todo lo que Yahvé ha mandado
  lexicon: HALOT
  rationale: '"Conforme a" expresa adecuación normativa y conserva el sentido del prefijo לְ como conformidad/resulto. "Ha mandado" mantiene el perfecto con valor vigente, acorde con la instrucción divina del contexto.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo usa directamente el Tetragrámaton. El texto español mantiene el nombre divino como "Yahvé", siguiendo el criterio del proyecto y evitando la sustitución por una designación genérica o enmascarada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La expresión colectiva/plural en בָּהֵמָּה
  english_pob_reading: in whom ... in them (collectively)
  chosen_spanish_reading: en quien ... (con nota sobre el plural colectivo)
  alternative_spanish_readings:
  - en ellos
  - en quienes
  rationale: El hebreo es plural y refiere colectivamente a Bezalel, Oholiab y todo hombre hábil. En español se eligió una forma natural en singular distributivo para la línea principal, pero se preserva la observación del plural en una nota para no borrar la tensión gramatical y semántica del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Source transparency and auditable tensions'
- issue: אִישׁ חֲכַם לֵב en contexto artesanal
  english_pob_reading: every skillful man / every wise-hearted man
  chosen_spanish_reading: todo hombre hábil
  alternative_spanish_readings:
  - todo hombre sabio de corazón
  - todo trabajador hábil
  rationale: El inglés auditado movió la traducción hacia "skillful man" por naturalidad contextual. En español, "hombre hábil" comunica esa destreza práctica sin perder la conexión con el hebreo literal "sabio de corazón"; la alternativa más literal se reserva para nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión reciente que prefirió "skillful man" sobre "wise-hearted man" por naturalidad en contexto artesanal. La versión española refleja esa misma decisión contextual con "hombre hábil", pero conserva en nota la lectura más literal del hebreo y la observación sobre el plural colectivo de בָּהֵמָּה.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se usa "santuario" para הַקֹּדֶשׁ, en paralelo con la decisión inglesa de evitar una paráfrasis demasiado general.
  - '"Sabiduría y entendimiento" se conserva como pareja fija, sin reducirla a mera habilidad técnica.'
  - Las notas a/b/c corresponden exactamente a los anclajes del texto principal y preservan alternativas reales del original.
