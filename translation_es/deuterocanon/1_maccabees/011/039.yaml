    issue: Forma onomástica 'Antioquio'
    rationale: La forma española estándar y reconocible para Ἀντίοχον/Antiochus es 'Antíoco', no 'Antioquio'. La forma actual perjudica fidelidad idiomática y reconocimiento histórico.
  - severity: medium
    issue: Capitalización de 'árabe' en aposición étnica
    rationale: En este contexto funciona como designación étnica/título ('Símacues el Árabe'); la mayúscula mejora la presentación editorial y armoniza con el modelo inglés 'the Arab'.
