translation:
  language: es
  text: Porque si Kain es para ser quemado,[a] ¿hasta cuándo te llevará cautivo Asur?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kain probablemente alude aquí a los ceneos, más que al Caín individual.
    reason: lexical_alternative
  - marker: b
    text: Asur puede significar «Asiria» o «el asirio» en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Ya que si
  - Pero si
  lexicon: HALOT
  rationale: La secuencia introduce una relación explicativa-condicional; «Porque si» mantiene el enlace con el contexto previo y suena natural en español sin borrar la condición.
- source_word: יִהְיֶה לְבָעֵר
  english_pob_choice: is for burning
  chosen_spanish: es para quemarse
  alternatives_spanish:
  - está para ser quemado
  - es para destrucción
  - está destinado a ser quemado
  lexicon: HALOT
  rationale: La construcción hebrea se conserva de manera cercana con una forma natural en español. «Para quemarse» refleja el matiz de destino/resultado sin introducir una interpretación más fuerte que el hebreo.
- source_word: קָיִן
  english_pob_choice: Kain
  chosen_spanish: Kain
  alternatives_spanish:
  - Caín
  - el ceneo
  lexicon: HALOT
  rationale: Se conserva la transliteración del texto POB. En el contexto del oráculo, el referente probable es el grupo de los ceneos, pero el hebreo presenta una forma de nombre propio que conviene mantener en el texto principal.
- source_word: עַד מָה
  english_pob_choice: how long before
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿por cuánto tiempo antes de que?
  - ¿hasta qué punto?
  lexicon: HALOT
  rationale: El giro idiomático hebreo se expresa de forma natural con «¿hasta cuándo?». El complemento «te llevará cautivo» completa el sentido temporal implícito de la pregunta.
- source_word: אַשּׁוּר
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asiria
  - el asirio
  lexicon: HALOT
  rationale: Se translitera el nombre propio en el cuerpo principal, siguiendo la estrategia del POB inglés. La ambigüedad entre el país y la potencia imperial se conserva para anotación.
- source_word: תִּשְׁבֶּךָּ
  english_pob_choice: carries you away captive
  chosen_spanish: te llevará cautivo
  alternatives_spanish:
  - te capturará
  - te llevará en cautiverio
  - te hará cautivo
  lexicon: HALOT
  rationale: El verbo שׁבה comunica la idea de tomar cautivo; «te llevará cautivo» es fluido en español y mantiene la fuerza de exilio/cautiverio sin exagerar el detalle.
theological_decisions:
- issue: Identidad de Kain
  english_pob_reading: Kain likely refers here to the Kenites rather than to the individual Cain.
  chosen_spanish_reading: Kain probablemente alude aquí a los ceneos, no al Caín individual.
  alternative_spanish_readings:
  - Kain se refiere al Caín bíblico.
  - Kain es simplemente un nombre propio sin matiz étnico.
  rationale: El texto hebreo por sí solo permite la forma de nombre propio, pero el contexto oracular favorece una referencia colectiva/étnica. La nota mantiene esa tensión sin resolverla dogmáticamente.
  doctrine_reference: Números 24:21–22; nota lexical del POB inglés
- issue: Sentido de אַשּׁוּר
  english_pob_reading: Asshur can mean 'Assyria' or 'the Assyrian' in context.
  chosen_spanish_reading: Asur puede significar «Asiria» o «el asirio» según el contexto.
  alternative_spanish_readings:
  - Asur = Asiria.
  - Asur = el asirio.
  rationale: La forma hebrea permite tanto el nombre del reino como una personificación imperial. Se conserva el nombre transliterado en el texto y se explicita la ambigüedad en nota.
  doctrine_reference: Números 24:22; nota lexical del POB inglés
translation_notes:
  revision_awareness: La base inglesa revisada cambió de «is destined for burning» a «is for burning» para ajustarse más de cerca al hebreo. La versión española sigue esa decisión con «es para quemarse», evitando añadir una formulación más interpretativa como «está destinado a»; también conserva la ambigüedad de Kain y de Asur documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Kain» en el texto principal para reflejar la transliteración del POB y no imponer de entrada la identificación étnica.
  - Se usa «Asur» en lugar de «Asiria» en el texto principal, con nota explicativa, para preservar la ambigüedad del hebreo.
  - «Para quemarse» intenta reproducir la relación de destino/resultado del hebreo sin convertirla en una interpretación más explícita.
  - La puntuación interrogativa sigue el español moderno y no altera el orden de las cláusulas del original.
