translation:
  language: es
  text: Yahvé[a], has oído el deseo de los humildes; prepararás su corazón[b]; tu oído atenderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los afligidos» o «los mansos» para עֲנָוִים.
    reason: lexical_alternative
  - marker: b
    text: O «establecerás» o «afirmarás» su corazón.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּאֲוַת
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - querer
  lexicon: HALOT
  rationale: En este contexto poético, «deseo» reproduce bien la idea de anhelo o inclinación interna sin añadir intensidad que el hebreo no obliga a expresar. Conserva el paralelismo con el resto del versículo.
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los afligidos
  - los mansos
  lexicon: HALOT
  rationale: «Humildes» preserva el valor léxico principal de עֲנָוִים y mantiene la tensión documentada con el contexto de los oprimidos sin resolverla unilateralmente hacia «afligidos».
- source_word: שָׁמַעְתָּ
  english_pob_choice: you have heard
  chosen_spanish: has oído
  alternatives_spanish:
  - oíste
  - has escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa naturalmente en español con pretérito perfecto compuesto para una acción ya realizada con relevancia presente en la oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no un título de sustitución.'
- source_word: תָּכִין
  english_pob_choice: you will prepare
  chosen_spanish: prepararás
  alternatives_spanish:
  - afirmarás
  - establecerás
  lexicon: HALOT
  rationale: La raíz כון admite preparar, establecer o afirmar. Dado el contexto del corazón, «prepararás» sigue de cerca la decisión revisada del POB inglés y permite el sentido de disponer internamente sin sobreinterpretar.
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: Se conserva «corazón» como término antropológico bíblico central. En español, el singular colectivo «su corazón» comunica naturalmente el hebreo plural poseído en referencia al grupo.
- source_word: תַּקְשִׁיב
  english_pob_choice: will listen
  chosen_spanish: escuchará
  alternatives_spanish:
  - prestará atención
  - oirá
  lexicon: HALOT
  rationale: «Escuchará» reproduce la idea de atención activa mejor que un simple «oirá», y mantiene la imagen de la siguiente cláusula sobre el oído.
- source_word: אָזְנֶךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu oído atento
  lexicon: HALOT
  rationale: Se conserva la imagen corporal hebrea con «oído», más natural y bíblico en español que «oreja» en este registro, sin eliminar la antropomorfía.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se mantiene el nombre divino como transliteración reverente en lugar de sustituirlo por un título. El vocativo «Oh» conserva el tono oracional del original y del POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עֲנָוִים en el contexto del salmo
  english_pob_reading: the humble
  chosen_spanish_reading: los humildes
  alternative_spanish_readings:
  - los afligidos
  - los mansos
  rationale: 'Se preserva la tensión teológica y lexical: el término puede abarcar humildes, mansos o afligidos, pero el texto hebreo no obliga a reducirlo a una sola categoría social. «Los humildes» mantiene la lectura principal del audit trail.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al preferir «preparar» para תָּכִין en lugar de «fortalecer» o «establecer», y conserva la decisión de usar «Yahvé/Yahweh» para יְהוָה. También mantiene la elección principal «los humildes» con nota de alternativas, sin borrar la ambigüedad contextual documentada.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto para el nombre divino: Yahvé.'
  - «Corazón» se conserva de forma literal y antropológica, evitando «mente» o «interior» como paráfrasis.
  - 'El paralelismo poético se conserva en tres miembros: oír / preparar el corazón / escuchar el oído.'
  - Se usa puntuación española y el vocativo «Oh» para reflejar la entonación del hebreo y del inglés POB.
