translation:
  language: es
  text: Tampoco yo reprimiré mi boca[a]; hablaré en la angustia de mi espíritu[b]; me quejaré[c] en la amargura de mi alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no retendré mi boca». El hebreo usa un modismo que literalmente habla de no contener o restringir la boca.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la aflicción de mi espíritu».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lamentaré» o «hablaré». El verbo hebreo puede expresar hablar reflexivo o quejoso según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: גַּם expresa adición/enfasis. «También» conserva el valor aditivo sin introducir una relación causal que el hebreo no exige aquí.
- source_word: לֹא אֶחֱשָׂךְ פִּי
  english_pob_choice: I will not restrain my mouth
  chosen_spanish: no reprimiré mi boca
  alternatives_spanish:
  - no frenaré mi boca
  - no guardaré mi boca
  - no retendré mi boca
  lexicon: HALOT
  rationale: El hebreo usa el idiomático «retener/reprimir la boca» para no contener el habla. «No reprimiré mi boca» preserva la imagen y suena natural en español bíblico moderno.
- source_word: אֲדַבְּרָה
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - he de hablar
  - voy a hablar
  lexicon: HALOT
  rationale: La forma expresa resolución/intención. «Hablaré» refleja el futuro volitivo de manera directa y fluida.
- source_word: בְּצַר רוּחִי
  english_pob_choice: in the distress of my spirit
  chosen_spanish: en la angustia de mi espíritu
  alternatives_spanish:
  - en la aflicción de mi espíritu
  - en el apremio de mi espíritu
  lexicon: HALOT
  rationale: צַר denota estrechez, angustia o aflicción. «Angustia» comunica bien el peso emocional. Se mantiene «mi espíritu» para conservar la distinción con נֶפֶשׁ en el paralelismo.
- source_word: אָשִׂיחָה
  english_pob_choice: I will complain
  chosen_spanish: me quejaré
  alternatives_spanish:
  - lamentaré
  - hablaré
  - meditaré
  lexicon: HALOT
  rationale: שִׂיחַ puede significar meditar, hablar o lamentarse según el contexto. Aquí, por el paralelismo con el sufrimiento y la «amargura de mi alma», «me quejaré» capta mejor la fuerza de lamento sin cerrar del todo la gama semántica.
- source_word: בְּמַר נַפְשִׁי
  english_pob_choice: in the bitterness of my soul
  chosen_spanish: en la amargura de mi alma
  alternatives_spanish:
  - en la amargura de mi vida
  - desde la amargura de mi alma
  lexicon: HALOT
  rationale: מַר es «amargo/amargura» y נֶפֶשׁ aquí conserva el sentido poético de persona interior, vida o alma. «Alma» mantiene la textura antropológica del hebreo y el paralelismo con «mi espíritu».
theological_decisions:
- issue: Distinción poética entre רוּחַ y נֶפֶשׁ
  english_pob_reading: Render distinctly as 'spirit' and 'soul' without collapsing them into a single term
  chosen_spanish_reading: Traducir distintamente como «espíritu» y «alma»
  alternative_spanish_readings:
  - «ser interior» para ambos
  - «mente» y «corazón»
  rationale: El verso usa dos términos hebreos diferentes en paralelismo poético. Mantener «espíritu» y «alma» preserva la textura retórica y la intensidad del lamento de Job, sin resolver innecesariamente la antropología bíblica.
  doctrine_reference: Preservar la tensión teológica, no armonizarla artificialmente.
translation_notes:
  revision_awareness: La revisión en inglés eliminó «Therefore» porque גַּם aporta adición o énfasis, no una relación causal. La versión española sigue ese ajuste con «también» y evita cualquier conector causal. También se mantuvo la distinción antropológica entre רוּחַ y נֶפֶשׁ conforme al audit trail.
  spanish_consistency_notes:
  - Se eligió «alma» para נֶפֶשׁ porque el contexto poético de Job permite conservar el paralelismo tradicional con «espíritu» sin perder el matiz de interioridad.
  - Se prefirió «me quejaré» por su fuerza de lamento, coherente con el tono de Job y con la amplitud semántica que el audit trail documenta para אָשִׂיחָה.
  - «También» evita introducir una causalidad inexistente; refleja mejor גַּם en este verso.
  - Se mantuvo el registro bíblico moderno y digno, evitando fórmulas excesivamente arcaicas o litúrgicas.
