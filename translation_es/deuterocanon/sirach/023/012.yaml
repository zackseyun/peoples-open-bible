  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés: conserva el singular de λέξις, la imagen de ἀντιπεριβεβλημένη θανάτῳ, el matiz yusivo de μὴ εὑρεθήτω, la expresión pactual «la heredad de Jacob», el plural «todas estas cosas», y la imagen fuerte de ἐγκυλισθήσονται. Sin embargo, la nota al pie actual está mal anclada y mal enfocada: el inglés documenta la alternativa léxica para la imagen «clothed with death / surrounded by death», no para εὐσεβῶν. Además, en español «vestida de muerte» suena algo menos natural que «vestida con muerte» o, mejor aún, «envuelta en muerte», y conviene reflejar la alternativa documentada en nota.'
