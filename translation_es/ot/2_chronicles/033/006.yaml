base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/033/006.yaml
  text: He made his sons pass through the fire in the Valley of the Son of Hinnom[a], practiced soothsaying and divination and sorcery, and dealt with mediums and spiritists. He did much evil in the eyes of Yahweh[b], provoking him to anger.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'sacrificed his sons in the fire.' The Hebrew idiom is literally 'made his sons pass through the fire.'
    reason: lexical_alternative
  - marker: b
    text: '''Mediums and spiritists'' renders Hebrew terms for practitioners associated with consulting the dead or spirits.'
    reason: cultural_note
