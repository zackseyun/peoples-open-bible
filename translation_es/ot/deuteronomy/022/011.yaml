translation:
  language: es
  text: No vestirás ropa[a] tejida con lana y lino juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «shaatnez, lana y lino juntos». El término raro «shaatnez» se refiere a una tela hecha con esta combinación mixta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La negación legal se expresa de forma directa y estándar en español con «no».
- source_word: תִלְבַּשׁ
  english_pob_choice: you shall wear
  chosen_spanish: vestirás
  alternatives_spanish:
  - llevarás
  - usarás
  lexicon: HALOT
  rationale: En un mandato legal sobre prendas, «vestir» comunica de manera natural la acción de ponerse o llevar una prenda; mantiene el valor prohibitivo sin sonar forzado.
- source_word: שַׁעַטְנֵז
  english_pob_choice: cloth made of wool and linen
  chosen_spanish: tela
  alternatives_spanish:
  - tejido
  - paño
  - shaatnez
  lexicon: HALOT
  rationale: El hebreo nombra un material textil raro y luego lo define por la mezcla de lana y lino. En español, «tela» funciona como término general y se deja la aclaración inmediatamente después; transliterar «shaatnez» oscurecería el sentido sin necesidad en el texto principal.
- source_word: צֶמֶר
  english_pob_choice: wool
  chosen_spanish: lana
  alternatives_spanish:
  - lana de oveja
  lexicon: HALOT
  rationale: El término normal para este material en español es «lana».
- source_word: וּפִשְׁתִּים
  english_pob_choice: and linen
  chosen_spanish: y lino
  alternatives_spanish:
  - y lino fino
  - y fibra de lino
  lexicon: HALOT
  rationale: En contexto textil, «lino» comunica mejor que «lino/flax» al lector moderno y conserva la referencia al material usado en la vestimenta.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - mezclados
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio expresa combinación en una sola prenda; «juntos» es natural en español y preserva la idea de mezcla sin añadir interpretación.
translation_notes:
  revision_awareness: 'El inglés POB optó por explicitar el sentido de שַׁעַטְנֵז como «cloth made of wool and linen» y añadió una nota sobre el término raro. La versión española sigue esa decisión interpretativa: no translitera en el texto principal, pero sí preserva la aclaración del significado mediante la nota.'
  spanish_consistency_notes:
  - Se mantiene el tono jurídico-prohibitivo del hebreo con una formulación breve y directa.
  - «Lana» y «lino» siguen el contexto textil y evitan el calco «flax» en español.
  - La nota conserva la tensión entre el término raro hebreo y su explicación contextual, sin eliminarla.
