  source_alignment_summary: El borrador acierta en «Yahvé» y en reflejar לִפְנֵיכֶם como «delante de ustedes», con nota alternativa adecuada. Sin embargo, «actuarán contra ellos» sobreinterpreta וַעֲשִׂיתֶם לָהֶם, que es más literalmente «harán con/a ellos» o «harán con ellos / les harán», y «ordenanza» no refleja tan bien הַמִּצְוָה como singular colectivo de «mandamiento» indicado por la auditoría inglesa.
  spanish_quality_summary: El español es claro, pero «actuarán contra ellos» introduce un matiz hostil no explicitado por el verbo hebreo, y «toda la ordenanza» suena menos natural y menos alineado con la terminología bíblica esperable aquí que «todo el mandamiento». Una redacción más fiel y fluida sería «harán con ellos conforme a todo el mandamiento…».
  glossary_alignment: «Yahvé» está correctamente alineado con la política del proyecto. No hay otros términos doctrinales sensibles. Conviene alinear הַמִּצְוָה con «mandamiento» en lugar de «ordenanza», ya que el propio rastro inglés documenta el singular colectivo de «the commandment».
  issues:
  - severity: medium
    issue: «actuarán contra ellos» sobretraduce וַעֲשִׂיתֶם לָהֶם
    rationale: El hebreo usa עשה + ל con sentido general «hacer a/con ellos»; «contra» añade hostilidad explícita que el texto no lexicaliza, aunque el contexto sea bélico.
  - severity: medium
    issue: «ordenanza» debilita la correspondencia con הַמִּצְוָה
    rationale: La auditoría inglesa destaca el singular colectivo de «the commandment». En español bíblico y claro, «mandamiento» conserva mejor esa base léxica y el valor singular.
  - severity: low
    issue: La nota [a] usa «en sus manos» mientras el texto base inglés privilegia «los entregará delante de ustedes» con alternativa de entrega
    rationale: No es errónea, pero la alternativa más cercana al expediente inglés sería «los entregará a ustedes» o similar. Puede mantenerse una nota que preserve la literalidad y la alternativa idiomática.
  revised_spanish_text: Y Yahvé los entregará delante de ustedes[a], y ustedes harán con ellos conforme a todo el mandamiento[b] que yo les he mandado.
