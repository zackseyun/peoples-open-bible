translation:
  language: es
  text: Ah[a], Yahvé, porque yo soy tu siervo; yo soy tu siervo, hijo de tu sierva[b]. Tú has desatado mis ataduras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé, por favor». La partícula hebrea expresa una súplica directa e insistente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hijo de tu sierva». También puede expresarse con el giro más tradicional «hijo de tu criada» o, de manera más interpretativa, «nacido de tu sierva».
    reason: lexical_alternative
  - marker: c
    text: O «me has liberado», de manera más interpretativa; más literalmente, «has desatado mis ataduras».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנָּה
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Ah
  - Oh, por favor
  lexicon: HALOT
  rationale: La partícula expresa una súplica insistente. «Por favor» transmite esa petición con naturalidad en español contemporáneo sin cargar el verso con un tono demasiado arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrama directamente; por la política terminológica del proyecto se conserva el nombre divino como «Yahvé» en vez de sustituirlo por un título.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la base o explicación de la súplica: el hablante pide así porque pertenece a Yahvé como siervo.'
- source_word: עַבְדֶּךָ / עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En este salmo el término expresa pertenencia y devoción pactal; «siervo» comunica mejor el uso reverente en español que «esclavo», aunque se mantiene la relación de servicio implícita.
- source_word: בֶּן אֲמָתֶךָ
  english_pob_choice: the son of your maidservant
  chosen_spanish: hijo de tu sierva
  alternatives_spanish:
  - hijo de tu criada
  - hijo de tu esclava
  lexicon: HALOT
  rationale: La expresión es literal y genealógica. «Sierva» conserva el registro bíblico y evita la ambigüedad de «criada», mientras que «esclava» sería demasiado fuerte para el contexto español aquí.
- source_word: פִּתַּחְתָּ
  english_pob_choice: have loosed
  chosen_spanish: has soltado
  alternatives_spanish:
  - has desatado
  - has liberado
  lexicon: HALOT
  rationale: El verbo, unido a «ataduras», comunica la idea de aflojar o liberar. «Has soltado» conserva la imagen de desatar sin volverlo demasiado interpretativo.
- source_word: לְמוֹסֵרָי
  english_pob_choice: my bonds
  chosen_spanish: mis ataduras
  alternatives_spanish:
  - mis cadenas
  - mis ligaduras
  lexicon: HALOT
  rationale: «Ataduras» es idiomático en español y conserva la imagen de restricción física o figurada. Encaja bien con «has soltado» y mantiene la metáfora del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El POB en inglés preserva el nombre propio divino; en español se sigue el mismo principio con «Yahvé», manteniendo la distinción entre el nombre y un título sustituto.
  doctrine_reference: DOCTRINE.md Contested terms table for יְהוָה YHWH
- issue: Valor de עבד ante Dios
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  rationale: El hablante se presenta como perteneciente a Yahvé y en relación de servicio fiel. En español, «siervo» comunica esa devoción sin borrar del todo la fuerza de dependencia que el hebreo puede tener en otros contextos.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested terms table for δοῦλος/servant-slave context-dependence
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la súplica inicial, el nombre divino, la repetición enfática de «tu siervo», la relación heredada («hijo de tu sierva») y la imagen concreta de las ataduras soltadas. También recoge las alternativas documentadas en el POB inglés sin imponer una paráfrasis más amplia que la sustentada por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה según la terminología base del proyecto.
  - Se usa «siervo» para עבד en este contexto devocional, reservando «esclavo» como alternativa documentada.
  - Se traduce la imagen final con un verbo concreto («has soltado») y un sustantivo físico («ataduras») para preservar la metáfora.
  - Las notas al pie reflejan alternativas reales del POB inglés y quedan ancladas en el texto con los marcadores correspondientes.
