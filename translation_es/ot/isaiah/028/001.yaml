source:
  edition: WLC
  text: ה֗וֹי עֲטֶ֤רֶת גֵּאוּת֙ שִׁכֹּרֵ֣י אֶפְרַ֔יִם וְ/צִ֥יץ נֹבֵ֖ל צְבִ֣י תִפְאַרְתּ֑/וֹ אֲשֶׁ֛ר עַל רֹ֥אשׁ גֵּֽיא שְׁמָנִ֖ים הֲל֥וּמֵי יָֽיִן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/028/001.yaml
  text: Woe to the proud crown of the drunkards of Ephraim[a], and to the fading flower of his glorious beauty, which is on the head of the fertile valley[c][b], those overcome by wine.
  footnotes:
  - marker: a
    text: Or 'the crown of pride ... and the withering blossom of its glorious beauty.' The Hebrew poetry allows slightly different ways of expressing the metaphors while referring to the same object.
    reason: lexical_alternative
  - marker: b
    text: '''Fertile valley'' is literally ''valley of fatnesses,'' an idiom for rich, luxuriant land.'
    reason: cultural_note
  - marker: c
    text: Or 'those overcome by wine.' The Hebrew expression is more vivid, literally suggesting people beaten or struck down by wine.
    reason: lexical_alternative
