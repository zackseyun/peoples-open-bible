revisions:
- from: Todo el que se acerque[a], el que se acerque al tabernáculo de Yahvé, morirá. ¿Vamos a perecer todos?
  to: Todo el que se acerque, el que se acerque al tabernáculo de Yahvé, morirá. ¿Acaso todos vamos a perecer?[a]
  rationale: Se mantiene la repetición enfática del hebreo y la terminología del proyecto, pero se ajusta la pregunta final para reflejar mejor su tono retórico y se traslada la nota al lugar donde el expediente inglés preserva una diferencia léxica importante entre los dos verbos de morir/perecer. Esto mejora fidelidad al source packet y claridad de la justificación léxica en español.
