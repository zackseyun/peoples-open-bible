    text: «Fue purificada» también puede entenderse como «fue limpiada», con posibles matices morales, rituales o de restauración nacional.
    reason: alternative_reading
  revision_rationale: Se movió la nota léxica para que ancle correctamente en «patria» y se ajustó el participio aoristo νικήσαντες a «habiendo vencido», que conserva mejor la secuencia del original. También se afinó la nota [a] para que la alternativa española corresponda al contenido real de la nota, en vez de repetir «patria» como alternativa de sí misma.
