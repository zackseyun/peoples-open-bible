translation:
  language: es
  text: Y como prisioneros, eran arrastrados públicamente por la fuerza hasta que eran subidos al barco[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que eran introducidos en el barco». El griego alude literalmente a ser llevados o metidos en la nave.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσμιοι
  english_pob_choice: as prisoners
  chosen_spanish: como prisioneros
  alternatives_spanish:
  - encadenados
  - en cautiverio
  - como presos
  lexicon: LSJ
  rationale: δέσμιοι expresa condición de estar preso o atado. «Como prisioneros» conserva el valor predicativo/adverbial del griego al inicio de la cláusula y es natural en español. «Presos» sería posible, pero «prisioneros» comunica mejor el estado legal y social.
- source_word: δημοσίᾳ
  english_pob_choice: publicly
  chosen_spanish: públicamente
  alternatives_spanish:
  - en público
  - abiertamente
  lexicon: LSJ
  rationale: El adverbio indica que la violencia se ejercía a la vista de todos. «Públicamente» reproduce bien la función adverbial y conserva el matiz de exposición abierta.
- source_word: εἵλκοντο
  english_pob_choice: they were dragged
  chosen_spanish: eran arrastrados
  alternatives_spanish:
  - eran llevados a rastras
  - eran halados
  lexicon: LSJ
  rationale: El imperfecto pasivo sugiere acción continua. «Eran arrastrados» expresa mejor la coerción física y la violencia implícita que una forma más neutra como «eran llevados».
- source_word: μετὰ βίας
  english_pob_choice: by force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - violentamente
  - con violencia
  - forzadamente
  lexicon: LSJ
  rationale: La expresión marca coerción violenta. «Por la fuerza» es idiomática en español y mantiene el sentido sin intensificar más allá del texto.
- source_word: μέχρι τῆς εἰς τὸ πλοῖον ἐμβολῆς
  english_pob_choice: until they were put on the ship
  chosen_spanish: hasta que eran puestos en el barco
  alternatives_spanish:
  - hasta su embarque en el barco
  - hasta que los metían en el barco
  - hasta que eran subidos al barco
  lexicon: LSJ
  rationale: ἐμβολή aquí describe el acto de introducirlos en la nave; la nota inglesa advierte que el griego literalmente alude a ser llevados o introducidos en el barco. «Eran puestos en el barco» refleja esa acción de manera directa e idiomática, sin sobrerinterpretar «embarque» como un proceso voluntario.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir una solución más directa e idiomática para δημοσίᾳ y para la cláusula final, evitando el calco «embarque» como si fuera una acción voluntaria. Se conservó la violencia del pasivo imperfecto y la exposición pública del maltrato.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» cuando corresponda en este proyecto, pero no aparece en este versículo.
  - Se evitó «esclavos/siervos» porque δέσμιοι aquí se refiere a prisioneros detenidos y transportados bajo custodia, no a δοῦλοι.
  - «Barco» se usa por ser natural en español; la nota aclara que el griego dice literalmente la introducción a la nave.
