id: ACT.21.4
reference: Acts 21:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂ἀνευρόντες δὲ τοὺς⸃ μαθητὰς ἐπεμείναμεν αὐτοῦ ἡμέρας ἑπτά, οἵτινες τῷ Παύλῳ ἔλεγον διὰ τοῦ πνεύματος μὴ ⸀ἐπιβαίνειν εἰς ⸀Ἱεροσόλυμα.
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/004.yaml
  text: After finding the disciples[a], we stayed there seven days. They kept telling Paul through the Spirit not to go up to Jerusalem.
  footnotes:
  - marker: a
    text: Or 'by the Spirit.' The phrase may indicate that the Spirit revealed Paul's coming suffering, from which the disciples drew the conclusion that he should not go on to Jerusalem.
    reason: alternative_reading
translation:
  language: ko
  text: 제자들을 찾아내어 그곳에서 이레를 머물렀습니다. 그들은 성령을 통하여 바울에게 예루살렘으로 올라가지 말라고 말하였습니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 21:4 「성령을 통하여 (διὰ τοῦ πνεύματος) 예루살렘에 올라가지 말라」 — 성령의 명령인가, 성령으로 받은 정보에 대한 인간적 권면인가
  chosen_reading: 제자들이 성령으로부터 받은 통찰(다가올 환난)에 근거하여 바울을 만류한 것으로 읽음
  alternative_readings:
  - 성령께서 친히 바울에게 예루살렘 행을 금하셨다고 봄
  rationale: 20:22, 23에서 바울은 자신이 「영에 매여」 가며, 성령께서 도시마다 결박을 증언하신다고 말한다. 또한 21:11-14에서 아가보의 예언 후에도 바울은 결심을 거두지 않고 모두가 「주의 뜻이 이루어지이다」 하고 잠잠해진다. 따라서 본 절은 성령이 미래의 환난을 알려주신 것에 근거하여 제자들이 인간적으로 만류한 것으로 읽는 것이 본문 흐름에 부합한다. 본 번역은 「성령을 통하여 ~ 말라고 말하였다」로 옮겨 본문의 외적 표현을 보존하되, 신학적 해석은 위와 같이 정리한다.
  doctrine_reference: 'DOCTRINE.md: prophetic speech in Acts'
