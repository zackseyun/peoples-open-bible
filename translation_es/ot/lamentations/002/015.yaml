    text: Or 'whistle'; the Hebrew verb can denote a sharp sound of derision, whether rendered 'hiss' or 'whistle.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter Jerusalem,' a poetic personification of the city.
    reason: cultural_note
  - marker: c
    text: Or 'perfect in beauty.'
    reason: lexical_alternative
