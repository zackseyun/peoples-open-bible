translation:
  language: es
  text: Puesto que muchas veces habían surgido guerras en la tierra, Simón, hijo de Matatías, uno de los hijos de Jojarib, y sus hermanos se expusieron al peligro y se opusieron a los adversarios de su nación, para que su santuario[a] y la ley permanecieran, y glorificaron a su nación con gran gloria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su lugar santo» o «sus cosas santas». El griego usa un plural que puede referirse colectivamente al santuario o a las realidades sagradas vinculadas a él.
    reason: lexical_alternative
  - marker: b
    text: 'O «le dieron gran honra a su nación». El griego dice literalmente: «glorificaron a su nación con gran gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: Since
  chosen_spanish: Puesto que
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: LSJ
  rationale: Introduce la base causal de la afirmación honorífica. «Puesto que» suena natural en español y conserva el valor explicativo sin volverlo meramente temporal.
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - frecuentemente
  - a menudo
  lexicon: LSJ
  rationale: Reproduce la repetición insistente del griego de forma idiomática y clara.
- source_word: ἐγενήθησαν πόλεμοι
  english_pob_choice: wars had often arisen
  chosen_spanish: habían surgido guerras
  alternatives_spanish:
  - habían ocurrido guerras
  - había guerras
  lexicon: LSJ
  rationale: «Surgir» preserva la idea de brotar/levantarse de las guerras, cercana al sentido del verbo griego, sin sonar forzado en español.
- source_word: ἐν τῇ χώρᾳ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: LSJ
  rationale: «Tierra» mantiene el registro bíblico y el sentido territorial amplio de χώρα en este contexto histórico.
- source_word: ἔδωκαν ἑαυτοὺς τῷ κινδύνῳ
  english_pob_choice: gave themselves to danger
  chosen_spanish: se expusieron al peligro
  alternatives_spanish:
  - se arriesgaron
  - se entregaron al peligro
  lexicon: LSJ
  rationale: La expresión griega es idiomática y voluntaria; «se expusieron al peligro» conserva la autoexposición al riesgo con naturalidad en español.
- source_word: ἀντέστησαν
  english_pob_choice: stood against
  chosen_spanish: se opusieron
  alternatives_spanish:
  - resistieron
  - se mantuvieron contra
  lexicon: LSJ
  rationale: «Se opusieron» expresa resistencia activa y es más natural que un calco de la metáfora inglesa sin perder la fuerza del verbo griego.
- source_word: τοῖς ὑπεναντίοις
  english_pob_choice: the adversaries
  chosen_spanish: los adversarios
  alternatives_spanish:
  - los opositores
  - los enemigos
  lexicon: LSJ
  rationale: «Adversarios» refleja oposición hostil sin intensificar necesariamente hasta «enemigos».
- source_word: τοῦ ἔθνους αὐτῶν
  english_pob_choice: of their nation
  chosen_spanish: de su nación
  alternatives_spanish:
  - de su pueblo
  - de su pueblo-nación
  lexicon: LSJ
  rationale: En 1 Macabeos, ἔθνος suele designar al colectivo nacional judío; «nación» preserva esa fuerza pública y política.
- source_word: ὅπως σταθῇ
  english_pob_choice: so that ... might stand
  chosen_spanish: para que ... permanecieran
  alternatives_spanish:
  - para que ... se mantuvieran
  - para que ... estuvieran firmes
  lexicon: LSJ
  rationale: El verbo griego sugiere quedar en pie/ser mantenido. En español, «permanecieran» transmite la idea de subsistencia estable de modo fluido junto con los dos objetos coordinados.
- source_word: τὰ ἅγια αὐτῶν
  english_pob_choice: their sanctuary
  chosen_spanish: sus santidades
  alternatives_spanish:
  - su santuario
  - sus cosas santas
  lexicon: LSJ
  rationale: El griego usa plural neutro. Se conserva la pluralidad con «sus santidades», que resulta más cercano al original que reducirlo directamente a un singular interpretativo, aunque suene menos usual.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la Torá
  lexicon: LSJ
  rationale: «La ley» es una traducción directa y comprensible; el mayúsculo no es necesario en español salvo convención editorial.
- source_word: δόξῃ μεγάλῃ ἐδόξασαν
  english_pob_choice: they glorified ... with great glory
  chosen_spanish: glorificaron ... con gran gloria
  alternatives_spanish:
  - dieron gran honra a
  - honraron grandemente a
  lexicon: LSJ
  rationale: La construcción cognada se mantiene en español para conservar el énfasis retórico del griego. «Glorificaron» y «gloria» reproducen la repetición enfática.
theological_decisions:
- issue: ἔθνος como colectivo identitario judío
  english_pob_reading: nation
  chosen_spanish_reading: nación
  alternative_spanish_readings:
  - pueblo
  - pueblo judío
  rationale: El contexto de Macabeos es histórico-público y nacional; «nación» conserva esa dimensión sin diluirla en un sentido meramente étnico o devocional.
  doctrine_reference: Translation philosophy §5 consistency of key terms, or documented exception.
- issue: τὰ ἅγια αὐτῶν como plural sagrado
  english_pob_reading: their sanctuary
  chosen_spanish_reading: sus santidades
  alternative_spanish_readings:
  - su santuario
  - sus cosas santas
  rationale: El plural griego puede referir al conjunto de realidades sagradas o al recinto santuario. Aquí se preserva la tensión del plural en español, evitando resolverlo demasiado pronto en un singular.
  doctrine_reference: Translation philosophy §1 original-language primacy over translation tradition.
translation_notes:
  revision_awareness: Se siguió la lectura revisada del audit trail para reflejar a Simón como «uno de los hijos de Jojarib» en el trasfondo genealógico, pero en esta cláusula el griego solo exige la filiación general. También se mantuvo el énfasis cognado de «glorificaron ... con gran gloria» conforme al texto griego y a la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma de proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «nación» para ἔθνος siguiendo la consistencia del libro de 1 Macabeos.
  - Se evitó «siervo»/«esclavo» porque no aparece δοῦλος en el pasaje.
  - Se mantuvo una dicción pública e ისტორical, sin suavizar la intensidad militar ni la dignidad cultual del texto.
