id: 2TI.2.10
reference: 2 Timothy 2:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο πάντα ὑπομένω διὰ τοὺς ἐκλεκτούς, ἵνα καὶ αὐτοὶ σωτηρίας τύχωσιν τῆς ἐν Χριστῷ Ἰησοῦ μετὰ δόξης αἰωνίου.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/010.yaml
  text: For this reason I endure everything for the sake of the elect, so that they also may obtain the salvation that is in Messiah Jesus with eternal glory.
translation:
  language: ko
  text: 그러므로 나는 택하신 자들을 위하여 모든 것을 견뎌 냅니다. 그들도 메시아 예수 안에 있는 구원을 영원한 영광과 함께 얻게 하려 함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντα ὑπομένω
  english_pob_choice: I endure everything
  chosen_korean: 모든 것을 견뎌 냅니다
  alternatives_korean:
  - 모든 것을 참아 냅니다
  - 모든 일을 인내합니다
  lexicon: BDAG
  rationale: ὑπομένω는 「인내하여 견딤」을 뜻하며, 한국어 「견뎌 내다」가 그 적극적 인내의 의미를 살린다.
- source_word: τοὺς ἐκλεκτούς
  english_pob_choice: the elect
  chosen_korean: 택하신 자들
  alternatives_korean:
  - 택함받은 자들
  - 선택된 자들
  lexicon: BDAG
  rationale: ἐκλεκτός의 신학적 「하나님이 택하신 자들」을 한국 성서 전통대로 「택하신 자들」로 옮긴다. 신적 행위자성이 함의된다.
- source_word: σωτηρίας τύχωσιν
  english_pob_choice: may obtain the salvation
  chosen_korean: 구원을 얻게
  alternatives_korean:
  - 구원에 이르게
  - 구원을 받게
  lexicon: BDAG
  rationale: τυγχάνω + 속격은 「~을 얻다」를 뜻한다. 「얻게」가 한국어로 자연스럽다.
- source_word: μετὰ δόξης αἰωνίου
  english_pob_choice: with eternal glory
  chosen_korean: 영원한 영광과 함께
  alternatives_korean:
  - 영원한 영광으로
  - 영원한 영광 가운데
  lexicon: BDAG
  rationale: μετά + 속격은 「~과 함께·~을 동반하여」를 가리킨다. 구원과 영광이 함께 임함을 살린다.
