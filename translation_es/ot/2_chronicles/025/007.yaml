translation:
  language: es
  text: 'Pero un hombre de Dios vino a él, diciendo: «Oh, rey, no dejes que el ejército de Israel vaya contigo, porque Yahvé no está con Israel, con todos los hijos de Efraín[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los efrainitas»; el hebreo dice literalmente «todos los hijos de Efraín».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - el hombre de Dios
  lexicon: HALOT
  rationale: La expresión funciona como título idiomático de un mensajero comisionado por Dios. El indefinido español refleja bien el hebreo aquí y conserva el valor de aparición narrativa.
- source_word: בָּא אֵלָיו
  english_pob_choice: came to him
  chosen_spanish: vino a él
  alternatives_spanish:
  - se acercó a él
  - fue a él
  lexicon: HALOT
  rationale: El movimiento hacia una persona se expresa naturalmente en español con 'vino a él'; mantiene la dirección del hebreo sin sobrecargar la frase.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción de discurso; 'diciendo' conserva la estructura sin sonar artificial.
- source_word: הַמֶּלֶךְ
  english_pob_choice: O king
  chosen_spanish: Oh rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: En vocativo, el español requiere una apelación directa. 'Oh rey' comunica el tono de address solemne mejor que el artículo definido literal.
- source_word: אַל יָבֹא עִמְּךָ
  english_pob_choice: do not let ... go with you
  chosen_spanish: no dejes que ... vaya contigo
  alternatives_spanish:
  - no permitas que ... vaya contigo
  - no dejes que ... venga contigo
  lexicon: HALOT
  rationale: El valor de prohibición del imperfecto con אַל se expresa de forma natural con 'no dejes que'. Aunque el hebreo dice 'venga', en español 'vaya contigo' suena más idiomático para una expedición militar.
- source_word: צְבָא יִשְׂרָאֵל
  english_pob_choice: the army of Israel
  chosen_spanish: el ejército de Israel
  alternatives_spanish:
  - el ejército israelita
  - las tropas de Israel
  lexicon: HALOT
  rationale: צָבָא designa aquí una fuerza militar; 'ejército' es el equivalente formal y claro en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino en español como 'Yahvé', conforme al criterio del proyecto para יְהוָה, en vez de ocultarlo con 'SEÑOR'.
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: with Israel
  chosen_spanish: con Israel
  alternatives_spanish:
  - junto a Israel
  lexicon: HALOT
  rationale: La preposición expresa compañía o apoyo; 'con Israel' conserva la sencillez del hebreo y el sentido relacional.
- source_word: כֹּל בְּנֵי אֶפְרָיִם
  english_pob_choice: all the sons of Ephraim
  chosen_spanish: con todos los hijos de Efraín
  alternatives_spanish:
  - con todos los efrainitas
  - con todos los hijos de Efraím
  lexicon: HALOT
  rationale: Se conserva la concreción filial del hebreo ('hijos de Efraín') y la repetición de la preposición al final, tal como muestra el ajuste auditado del texto inglés. El español admite esta repetición sin perder claridad.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh is not with Israel
  chosen_spanish_reading: Yahvé no está con Israel
  alternative_spanish_readings:
  - Yahvé no está con el Israel
  - Yahvé no está junto a Israel
  rationale: La lectura auditada del POB usa el nombre propio divino y no una máscara litúrgica. En español, 'Yahvé' comunica el Tetragrámaton de manera transparente y consistente con el marco del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación final entre Israel y los hijos de Efraín
  english_pob_reading: for Yahweh is not with Israel, with all the sons of Ephraim
  chosen_spanish_reading: porque Yahvé no está con Israel, con todos los hijos de Efraín
  alternative_spanish_readings:
  - porque Yahvé no está con Israel, todos los hijos de Efraín
  - 'porque Yahvé no está con Israel: todos los hijos de Efraín'
  rationale: Se conserva la repetición preposicional marcada por la revisión auditada, evitando fundirla en una aposición más interpretativa. Esto mantiene la tensión textual entre 'Israel' y la mención específica de Efraín.
  doctrine_reference: source_payload revision audit
translation_notes:
  revision_awareness: He seguido la revisión auditada que añadió la repetición final de la preposición ('with all the sons of Ephraim'), por lo que el español también conserva 'con todos los hijos de Efraín' en lugar de una aposición más compacta. También he alineado el nombre divino con el criterio del proyecto en español, usando 'Yahvé'.
  spanish_consistency_notes:
  - Se mantiene la estructura narrativa breve y directa del hebreo.
  - '''Hijos de Efraín'' conserva el valor literal del hebreo; no se reduce a ''efraimitas'' en el texto principal.'
  - La coma antes de la cláusula final refleja la pausa interpretativa del inglés auditado y permite conservar la repetición de 'con'.
  - El registro es bíblico y publicable, pero evita arcaísmos innecesarios.
