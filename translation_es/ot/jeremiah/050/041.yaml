revisions:
- from: ¡Miren![a] Un pueblo viene del norte[b], y una nación grande y muchos reyes serán despertados desde las partes más remotas de la tierra.
  to: He aquí[a], viene un pueblo del norte, y una gran nación y muchos reyes serán movilizados[b] desde las partes más remotas de la tierra.
  rationale: Se revisa para elevar el registro de apertura conforme a הִנֵּה, mejorar la naturalidad española, reflejar mejor el matiz de movilización de יֵעֹרוּ y corregir el anclaje de la nota alternativa al segmento correcto. Se conservan las distinciones fuente entre «pueblo» y «nación» y la lejanía extrema de מִיַּרְכְּתֵי אָרֶץ.
