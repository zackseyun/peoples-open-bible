revisions:
- from: Ni siquiera cuando un tercero estaba exhalando su último aliento, ¿no lloraste al ver los ojos de cada uno, toros[b], mirando los suplicios y el mismo tormento, y sus narices anunciando la muerte[c]?
  to: Ni siquiera cuando un tercer hijo estaba exhalando su último aliento lloraste, al ver los ojos de cada uno, como toros[b], mirando los suplicios y el mismo tormento, y sus fosas nasales anunciando la muerte[c].
  rationale: Se corrige la sintaxis para un español natural y claro, se explicita «hijo» conforme a la elipsis contextual ya documentada en el audit trail inglés, se reemplaza «toros» por «como toros» para reflejar fielmente ταυρηδόν, y se afina «narices» a «fosas nasales» para corresponder mejor a μυκτῆρας.
