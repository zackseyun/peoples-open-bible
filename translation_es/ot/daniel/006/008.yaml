  to: 'Todos los altos funcionarios del reino, los prefectos y los sátrapas, los consejeros y los gobernadores, se pusieron de acuerdo[b] para establecer un estatuto real[c] y para hacer vinculante una prohibición: que cualquiera que hiciera una petición a cualquier dios o a cualquier hombre[a] durante treinta días, excepto a ti, oh rey, será arrojado al foso de los leones.'
