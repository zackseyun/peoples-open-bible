translation:
  language: es
  text: 'Y estos fueron los hijos de Oholibama[a], esposa de Esaú: jefe Jeús, jefe Jalam, jefe Corá. Estos fueron los jefes de Oholibama, hija de Aná, esposa de Esaú.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «jefes de clan». El término hebreo se usa para los líderes de grupos o clanes edomitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - varones de
  lexicon: HALOT
  rationale: En español, 'hijos de' conserva la relación genealógica directa sin sonar tan restringido como 'varones', y es la forma más natural para este contexto de genealogía formal. 'Descendientes de' sería más amplio de lo que el hebreo expresa aquí en el sintagma inicial.
- source_word: אֵשֶׁת עֵשָׂו
  english_pob_choice: Esau’s wife
  chosen_spanish: esposa de Esaú
  alternatives_spanish:
  - la mujer de Esaú
  - la esposa de Esaú
  lexicon: HALOT
  rationale: '''Esposa de Esaú'' mantiene la relación posesiva de modo claro y digno en español. ''Mujer de Esaú'' suena más coloquial o ambiguo; ''la esposa de Esaú'' es igualmente viable, pero ''esposa de Esaú'' resulta más compacto en esta nota genealógica.'
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - clan jefe
  - líder
  lexicon: HALOT
  rationale: En Génesis 36 el término designa a un jefe de clan edomita. 'Jefe' comunica bien el oficio sin introducir un matiz feudal o militar ajeno; 'caudillo' sería más fuerte y menos neutral, y 'clan jefe' suena artificial en español.
- source_word: יְעוּשׁ
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jeús
  - Yeús
  lexicon: transliteration
  rationale: Se adopta la transliteración habitual al español con acento gráfico para reflejar la pronunciación y acomodarla a la ortografía del idioma. No se moderniza el nombre más allá de una adaptación mínima.
- source_word: יַעְלָם
  english_pob_choice: Jalam
  chosen_spanish: Jalam
  alternatives_spanish:
  - Yalam
  - Jaalam
  lexicon: transliteration
  rationale: Se conserva la transliteración española breve y reconocible. 'Jaalam' reflejaría otra tradición transliterada, pero no es necesaria aquí.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  - Coraj
  lexicon: transliteration
  rationale: Se usa 'Coré', forma tradicional y plenamente inteligible en español bíblico. Aunque el hebreo permite otras transliteraciones, esta es la más asentada en el uso castellano.
- source_word: אֵלֶּה אַלּוּפֵי
  english_pob_choice: These were the chiefs of
  chosen_spanish: Estos fueron los jefes de
  alternatives_spanish:
  - Estos fueron los jefes de
  - Estos eran los jefes de
  lexicon: HALOT
  rationale: El hebreo resume la lista con una fórmula genealógica. 'Estos fueron' reproduce bien el tono de cierre del registro, y 'jefes' conserva la fuerza semántica de אַלּוּף sin expandirlo a una explicación interpretativa en el texto principal.
- source_word: בַּת עֲנָה
  english_pob_choice: daughter of Anah
  chosen_spanish: hija de Aná
  alternatives_spanish:
  - hija de Anah
  - Aná, hija de
  lexicon: HALOT
  rationale: Se mantiene la construcción genealógica directa. 'Aná' es la forma española usual del nombre, con tilde para adecuación gráfica.
theological_decisions:
- issue: Título de liderazgo edomita אַלּוּף
  english_pob_reading: chief; the Hebrew term denotes leaders of Edomite groups or clans
  chosen_spanish_reading: jefe
  alternative_spanish_readings:
  - caudillo
  - clan jefe
  - líder de clan
  rationale: No se vuelve a un término eclesiástico tradicional ni se borra el matiz de liderazgo tribal. 'Jefe' permite conservar la ambigüedad controlada del hebreo, mientras que una glosa como 'líder de clan' sería explicativa y demasiado expansiva para el texto principal.
  doctrine_reference: Ninguna; decisión lexical y sociolingüística sobre un título tribal
- issue: Relación final repetida con Oholibama, hija de Aná, esposa de Esaú
  english_pob_reading: These were the chiefs of Oholibamah daughter of Anah, Esau’s wife.
  chosen_spanish_reading: Estos fueron los jefes de Oholibama, hija de Aná, esposa de Esaú.
  alternative_spanish_readings:
  - Estos fueron los jefes descendientes de Oholibama, hija de Aná, esposa de Esaú.
  - Estos fueron los jefes de Oholibama, hija de Aná, la esposa de Esaú.
  rationale: Se evita introducir 'descendientes de', porque el hebreo no lo dice explícitamente en esta cláusula final. La repetición de 'esposa de Esaú' se mantiene para reflejar la estructura del verso y su carácter genealógico.
  doctrine_reference: Ninguna; fidelidad a la estructura genealógica del hebreo
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final de 'descended from' a 'of' para ajustarse más de cerca al hebreo; la presente versión española sigue esa revisión y evita añadir una relación de descendencia no expresada. También conserva la equivalencia funcional de אַלּוּף como título de liderazgo, sin traducirlo por un término eclesiástico o nobiliario ajeno al contexto edomita.
  spanish_consistency_notes:
  - Se usa 'Esaú' de forma consistente para el nombre propio.
  - Se mantiene 'Oholibama' sin adaptación adicional, siguiendo la transliteración estándar de este nombre bíblico.
  - '''Jefe'' traduce אַלּוּף de manera uniforme en la lista, con nota explicativa en la primera aparición.'
  - Se prefieren formas genealógicas naturales ('hijos de', 'hija de') sin sobreexplicar la relación familiar.
