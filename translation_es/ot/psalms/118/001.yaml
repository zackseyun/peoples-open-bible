    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y el sentido del hebreo, pero se mejora la naturalidad y fidelidad de la cláusula final usando «permanece para siempre», que expresa mejor la permanencia implícita en לְעוֹלָם חַסְדּוֹ. Se elimina la nota innecesaria sobre «bueno» y se añade una nota léxica pertinente en «amor fiel» para reflejar la documentación inglesa sobre חֶסֶד.
