  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: imperativo de permanencia con David, prohibición de temer, paralelismo de «buscar la vida», y cierre con la idea de protección/custodia. Sin embargo, las notas al pie están desancladas o invertidas respecto del contenido que explican: la nota [a] no corresponde a «Quédate conmigo» sino a la cláusula final, y la nota [b] explica la frase final pero está anclada en «tu vida». Además, la nota literal «con una guarda/protección» no representa bien עִמָּדִי, que es «conmigo», ni suena natural en español.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: «Quédate conmigo; no tengas miedo...» funciona bien en registro bíblico moderno. «Bajo mi protección» comunica bien מִשְׁמֶרֶת en contexto. El problema principal es de aparato crítico y legibilidad de notas, no de la línea principal. Conviene reubicar la nota literal al segmento final y formularla con un español más preciso.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Vida» para נֶפֶשׁ es correcto; «protección» para מִשְׁמֶרֶת está bien justificado contextualmente. No hay nombres divinos ni términos doctrinales problemáticos en este versículo.
  issues:
  - severity: medium
    issue: Marcadores de notas al pie mal ubicados
    rationale: La nota [a] está puesta tras «conmigo», pero su contenido habla de una alternativa/literalidad de la cláusula final. La nota [b] está puesta tras «tu vida», aunque explica «bajo mi protección». Esto rompe la trazabilidad del audit trail y puede confundir al lector.
  - severity: medium
    issue: Redacción inexacta de la nota literal final
    rationale: «porque tú estás con una guarda/protección» no refleja adecuadamente כִּי מִשְׁמֶרֶת אַתָּה עִמָּדִי. La relación literal es más bien «porque eres una custodia/protección conmigo» o, mejor explicado en español, «porque estás conmigo para resguardo/protección». La nota debe reconocer el literal hebreo sin producir una frase española errónea.
  revised_spanish_text: Quédate conmigo; no tengas miedo, porque el que busca mi vida busca también tu vida, porque estás bajo mi protección[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «porque una custodia/protección eres conmigo», es decir, «porque estás conmigo bajo resguardo».
    reason: lexical_alternative
