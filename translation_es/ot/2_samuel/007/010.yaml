review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo: Yahvé asigna un lugar a Israel, lo planta, le da estabilidad y promete el fin de la opresión de los malvados. Sin embargo, dos decisiones reducen la fidelidad al flujo del original y al rastro POB en inglés: (1) falta el segundo verbo coordinado explícito (''y plantaré''), que el inglés auditado reforzó con ''will plant them''; y (2) el uso de una nota sobre singular/plural en ''plantaré'' desplaza innecesariamente la nota que el POB inglés puso sobre ''sons of wickedness''. Además, ''más'' tras negación suena menos natural aquí que ''ya no''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero puede mejorarse para mayor naturalidad y paralelismo: ''y plantaré'' debe expresarse de forma plena; ''ya no sea perturbado'' suena mejor que ''no sea perturbado más''. El singular colectivo (''lo'', ''habite'', ''afligirlo'') es aceptable en español y conserva bien el hebreo, aunque el v. inglés optó por plural por naturalidad inglesa. La frase ''los hijos de maldad'' es comprensible y adecuada para preservar el idiomatismo semítico.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''Israel'', ''maldad'', ''afligir'' y la preservación de la metáfora ''plantar'' están alineados. La principal desalineación es de política editorial: la nota al pie debería acompañar ''hijos de maldad'' para preservar la alternativa idiomática documentada en el POB inglés, no ''plantaré'', donde la variación singular/colectivo puede resolverse en el texto sin nota.'
  issues:
  - severity: medium
    issue: Falta el verbo coordinado explícito 'y plantaré'
    rationale: El hebreo tiene una secuencia verbal clara ('pondré... y plantaré'). El borrador dice 'y lo plantaré', pero omite el auxiliar/plena repetición equivalente al ajuste auditado del inglés, debilitando el paralelismo prometido.
  - severity: medium
    issue: La nota al pie está anclada en 'plantaré' en vez de en 'hijos de maldad'
    rationale: El POB inglés preserva la literalidad de בְנֵי עַוְלָה en el texto principal y documenta alternativas idiomáticas en nota. La nota española actual trata una cuestión secundaria de singular/plural que no requiere nota, mientras deja sin documentar la alternativa idiomática más significativa.
  - severity: low
    issue: '''no sea perturbado más'' es menos idiomático que ''ya no sea perturbado'''
    rationale: Ambas opciones son entendibles, pero 'ya no' expresa con más naturalidad en español la cesación futura de עוֹד con negación.
  revised_spanish_text: Y pondré un lugar para mi pueblo Israel, y lo plantaré, para que habite en su propio lugar y ya no sea perturbado. Los hijos de maldad[a] no volverán a afligirlo, como antes.
  revised_footnotes:
  - marker: a
    text: 'O: «los malvados» o «los hombres malvados». Hebreo: «hijos de maldad».'
    reason: lexical_alternative
  revision_rationale: Se restauró el paralelismo verbal explícito del hebreo y del ajuste auditado en inglés ('y lo plantaré'), se mejoró la naturalidad de la negación temporal con 'ya no', y se reubicó la nota al pie para reflejar la decisión léxica significativa documentada por el POB sobre 'hijos de maldad'. Se mantuvo el singular colectivo en español, que es defendible y legible.
