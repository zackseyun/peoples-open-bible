translation:
  language: es
  text: Porque el no haber podido persuadir a nuestra razón, ni forzarnos a comer alimento impuro[a], ¿no es tu derrota?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más contextualmente, «a comer carne prohibida». El término griego es literalmente «comer carne», pero aquí se refiere a alimento prohibido según la ley judía.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δυνηθῆναί
  english_pob_choice: not being able
  chosen_spanish: el no haber podido
  alternatives_spanish:
  - el no poder
  - la incapacidad de
  lexicon: BDAG
  rationale: La construcción infinitiva sustantivada se conserva de manera natural en español con «el no haber podido», manteniendo la idea de incapacidad más que de simple fracaso.
- source_word: μεταπεῖσαι
  english_pob_choice: to persuade
  chosen_spanish: persuadir
  alternatives_spanish:
  - convencer
  - ganar para
  lexicon: BDAG
  rationale: «Persuadir» reproduce con precisión la acción de inducir un cambio de juicio o asentimiento; evita una paráfrasis excesiva y mantiene el paralelismo retórico.
- source_word: τὸν λογισμὸν ἡμῶν
  english_pob_choice: our reason
  chosen_spanish: nuestro razonamiento
  alternatives_spanish:
  - nuestra razón
  - nuestro juicio racional
  lexicon: BDAG
  rationale: En 4 Macabeos λογισμός es un término técnico para el razonamiento moral frente a las pasiones. «Razonamiento» comunica mejor el proceso activo de deliberación que «razón», aunque esta sigue siendo una alternativa posible.
- source_word: βιάσασθαι
  english_pob_choice: to compel
  chosen_spanish: forzarnos
  alternatives_spanish:
  - obligarnos
  - coaccionarnos
  lexicon: BDAG
  rationale: El verbo implica uso de fuerza contra los hablantes. «Forzarnos» suena natural en español y preserva el contraste con «persuadir» sin suavizar el sentido.
- source_word: πρὸς τὴν μεμοφαγίαν
  english_pob_choice: to eat defiled food
  chosen_spanish: a comer alimento impuro
  alternatives_spanish:
  - a comer carne prohibida
  - a comer comida contaminada
  lexicon: LSJ
  rationale: El griego es literalmente un término de «carne/comer carne», pero en este contexto alude a alimento ritualmente prohibido. «Alimento impuro» mantiene la referencia contextual sin estrecharla solo a «carne»; el matiz literal queda reflejado en la nota.
- source_word: οὐ κατάλυσίς ἐστιν σου;
  english_pob_choice: is that not your defeat?
  chosen_spanish: ¿no es tu derrota?
  alternatives_spanish:
  - ¿no es tu ruina?
  - ¿no es tu derrumbe?
  lexicon: BDAG
  rationale: «Derrota» expresa de forma clara la burla retórica de κατάλυσις en un registro actual y fiel al efecto del griego, sin exagerar el alcance semántico.
theological_decisions:
- issue: Cómo traducir λογισμός en un contexto filosófico-moral
  english_pob_reading: our reason
  chosen_spanish_reading: nuestro razonamiento
  alternative_spanish_readings:
  - nuestra razón
  - nuestro juicio racional
  rationale: La obra subraya la primacía del razonamiento piadoso sobre las pasiones. «Razonamiento» conserva ese campo conceptual y sugiere una facultad activa, no solo una capacidad abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Cómo presentar μεμοφαγία sin borrar su referencia contextual a comida prohibida
  english_pob_reading: to eat defiled food
  chosen_spanish_reading: comer alimento impuro
  alternative_spanish_readings:
  - comer carne prohibida
  - comer comida contaminada
  rationale: La frase española comunica la condición ritual de la comida sin reducir indebidamente el griego a una sola especie de alimento. La nota preserva el valor más literal de «meat-eating».
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se revisó el equivalente inglés de 2026-04-23, que pasó de «meat-eating» a «eat defiled food» para reflejar mejor μεμοφαγίαν. La versión española sigue esa decisión contextual con «alimento impuro», pero conserva en nota la alternativa más literal «carne prohibida» para no borrar la tensión léxica del griego.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre persuadir/forzar para reflejar el contraste retórico del griego.
  - «Y tu derrota» se expresó en segunda persona singular, como en el inglés POB, sin suavizar el tono desafiante.
  - La puntuación con coma y pregunta final reproduce el efecto argumentativo de la cláusula griega.
  - Se prefirió «alimento impuro» por claridad pastoral; la nota preserva la literalidad de μεμοφαγία.
