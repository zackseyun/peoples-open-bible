translation:
  language: es
  text: Y quitará toda su grasa, como se quita la grasa del sacrificio de las ofrendas de paz[a]; y el sacerdote la quemará sobre el altar, como aroma grato[b] para Yahvé. Y el sacerdote hará expiación por él, y será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''del sacrificio de las ofrendas de comunión''.'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión sacrificial fija: literalmente, ''para aroma agradable''. Indica aceptación cultual ante Yahvé, no solo un olor físico.'
    reason: cultural_note
lexical_decisions:
- source_word: חֶלְבָּהּ / חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - la grasa
  - la porción grasa
  - el sebo
  lexicon: HALOT
  rationale: En español, 'grasa' comunica de manera clara y natural el contenido sacrificial del hebreo. 'Sebo' suena demasiado técnico o estrecho; 'porción grasa' añade interpretación que el hebreo aquí no explicita.
- source_word: יָסִיר
  english_pob_choice: shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - removerá
  - apartará
  - deberá quitar
  lexicon: HALOT
  rationale: '''Quitar'' expresa bien la acción de retirar algo en registro legal y culto. Mantiene la fuerza procedimental sin sonar rígido en español moderno.'
- source_word: כַּאֲשֶׁר הוּסַר
  english_pob_choice: just as ... is removed
  chosen_spanish: como se quita
  alternatives_spanish:
  - tal como se quita
  - así como se quita
  - de la misma manera que se quita
  lexicon: HALOT
  rationale: La comparación del texto hebreo apunta al procedimiento ya establecido para la ofrenda. 'Como se quita' conserva la relación comparativa de forma natural en español.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: la víctima de los sacrificios de paz
  alternatives_spanish:
  - el sacrificio de paz
  - la ofrenda de paz
  - la víctima de comunión
  lexicon: HALOT
  rationale: '''Sacrificios de paz'' preserva la categoría tradicional y reconocible del hebreo שְׁלָמִים sin sustituirla por una paráfrasis doctrinal. ''Víctima'' ayuda a reflejar el animal sacrificial implícito en el contexto.'
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn it
  chosen_spanish: la quemará
  alternatives_spanish:
  - la ofrecerá en humo
  - la hará subir en humo
  - la quemará en el altar
  lexicon: HALOT
  rationale: En el contexto sacrificial, 'quemará' comunica la acción de quemar sobre el altar de manera clara. Las opciones con 'humo' son más literales, pero menos naturales para el lector español general.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: '''Sobre el altar'' refleja el movimiento hacia la superficie del altar y suena natural en español bíblico contemporáneo.'
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma grato
  alternatives_spanish:
  - como aroma agradable
  - como olor grato
  - como suave aroma
  lexicon: HALOT
  rationale: '''Aroma grato'' conserva la imagen sacrificial sin imponer una explicación adicional. Es una equivalencia natural de la expresión fija hebrea y mantiene la idea de aceptación cultual.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' conforme al criterio del proyecto para el Tetragrámaton. 'Para' expresa adecuadamente la relación del aroma/ofrenda con Yahvé en el contexto sacrificial.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: the priest shall make atonement for him
  chosen_spanish: el sacerdote hará expiación por él
  alternatives_spanish:
  - el sacerdote hará atonación por él
  - el sacerdote hará expiación sobre él
  lexicon: HALOT
  rationale: '''Hará expiación'' preserva el lenguaje cultual de כפר sin reemplazarlo por una explicación doctrinal. En español, ''atonación'' no es idiomático; ''expiación'' es la opción más clara y auditable.'
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he will be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y obtendrá perdón
  lexicon: HALOT
  rationale: La pasiva refleja o impersonal 'le será perdonado' conserva el pasivo hebreo y suena natural en español bíblico. Evita convertir la frase en una explicación teológica añadida.
theological_decisions:
- issue: Relación entre la expiación sacerdotal y el perdón final
  english_pob_reading: And the priest shall make atonement for him, and he will be forgiven.
  chosen_spanish_reading: Y el sacerdote hará expiación por él, y le será perdonado.
  alternative_spanish_readings:
  - Y el sacerdote hará expiación por él, y será perdonado
  - Y el sacerdote hará expiación en su favor, y se le perdonará
  rationale: 'La línea hebrea mantiene una relación cultual directa entre el acto sacerdotal y el perdón recibido, sin desarrollar el mecanismo teológico. La traducción conserva esa tensión: expiación y perdón aparecen relacionados, pero no explicados más allá del texto.'
  doctrine_reference: Preservar la formulación cultual del Pentateuco sin resolverla en categorías posteriores; mantener la relación expiación-perdón como en el hebreo.
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que reemplazó una inferencia ('Thus') por la simple conjunción coordinante ('And'). Por eso el español usa 'Y' al inicio de la segunda cláusula, sin introducir conclusión o consecuencia no explicitada. También se respetó la decisión del inglés de conservar el lenguaje cultual de expiación y perdón sin paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto para יהוה.
  - '''Sacrificios de paz'' conserva la categoría tradicional de שְׁלָמִים sin sustituirla por ''comunión'' o ''fellowship''.'
  - '''Expiación'' se usa de forma consistente para כפר en contexto sacerdotal.'
  - 'La estructura de cláusulas sigue el paralelismo del hebreo: retiro de la grasa, quema en el altar, aroma grato, expiación y perdón.'
