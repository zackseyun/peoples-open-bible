translation:
  language: es
  text: Pero una neblina[a] subía de la tierra y regaba toda la superficie del suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «flujo» o «corriente»; el término hebreo es raro y puede referirse al agua que brota de la tierra más bien que a una neblina en el aire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵד
  english_pob_choice: But a mist
  chosen_spanish: una neblina
  alternatives_spanish:
  - un mist
  - una bruma
  - un flujo
  - una corriente
  lexicon: HALOT, BDB
  rationale: El hebreo אֵד es raro y semánticamente debatido. En español, «neblina» comunica mejor una humedad visible o vapor ligero que «mist» transliterado, y conserva la imagen de algo que asciende desde la tierra sin cerrar la discusión léxica.
- source_word: יַֽעֲלֶ֣ה
  english_pob_choice: would rise
  chosen_spanish: subía
  alternatives_spanish:
  - subió
  - subiría
  - solía subir
  lexicon: HALOT, BDB
  rationale: El imperfecto hebreo describe una acción característica o continua en un trasfondo narrativo. «Subía» mantiene el aspecto descriptivo mejor que un pasado puntual.
- source_word: מִן הָ/אָ֑רֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra/land
  - del suelo
  lexicon: HALOT, BDB
  rationale: Aquí אֶרֶץ se traduce de forma natural como «tierra», en contraste con אֲדָמָה al final del versículo, que conviene distinguir como «suelo».
- source_word: וְ/הִשְׁקָ֖ה
  english_pob_choice: and water
  chosen_spanish: y regaba
  alternatives_spanish:
  - y daba de beber
  - y irrigaba
  - y mojaba
  lexicon: HALOT, BDB
  rationale: El hiphil de שקה significa dar de beber o regar. «Regaba» conserva el sentido causal y la imagen agrícola sin sonar técnico ni forzado.
- source_word: אֶֽת כָּל פְּנֵֽי
  english_pob_choice: the whole surface of
  chosen_spanish: toda la superficie de
  alternatives_spanish:
  - el rostro completo de
  - toda la faz de
  - toda la superficie
  lexicon: HALOT, BDB
  rationale: La expresión idiomática «toda la faz de» es posible, pero «toda la superficie de» resulta más natural en español moderno y preserva la extensión espacial del hebreo.
- source_word: הָֽ/אֲדָמָֽה
  english_pob_choice: the ground
  chosen_spanish: suelo
  alternatives_spanish:
  - tierra
  - suelo agrícola
  - terreno
  lexicon: HALOT, BDB
  rationale: אֲדָמָה suele denotar suelo o tierra arable. «Suelo» mantiene la distinción frente a «tierra» (אֶרֶץ) en la primera mitad del versículo.
theological_decisions:
- issue: Sentido de אֵד
  english_pob_reading: mist
  chosen_spanish_reading: neblina
  alternative_spanish_readings:
  - flujo
  - corriente
  - vapor
  rationale: La POB inglesa preserva la tensión lexical con una nota que admite «stream» o «flow». En español, «neblina» funciona como equivalente natural de una presencia húmeda y ascendente, pero no pretende resolver definitivamente si el término apunta a vapor o a un flujo subterráneo.
  doctrine_reference: Translation philosophy §3, preservar la tensión léxica cuando el hebreo es incierto
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés: mantiene la conjetura principal «mist/neblina», conserva el imperfecto descriptivo del verbo, y distingue entre אֶרֶץ y אֲדָמָה con dos sustantivos distintos en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exigiera; este versículo no contiene el nombre divino.
  - Se distinguió «tierra» para אֶרֶץ y «suelo» para אֲדָמָה a fin de no borrar la diferencia léxica.
  - «Regaba» reproduce el valor verbal sin convertir la cláusula en una explicación interpretativa.
  - La nota al pie mantiene la alternativa hidrológica documentada por la POB inglesa sin sobrecargar el texto principal.
