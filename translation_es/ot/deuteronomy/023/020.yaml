revisions:
- from: No impondrás interés a tu hermano[a], interés sobre dinero[b], interés sobre comida, ni interés sobre cosa alguna que se preste con interés.
  to: 'No cobrarás interés a tu hermano[a]: interés por dinero[c], interés por alimentos[b], ni interés por cualquier cosa que se preste con interés.'
  rationale: La revisión mantiene íntegramente el sentido del hebreo y de la auditoría inglesa, pero mejora la naturalidad del español con 'cobrarás interés' y 'interés por...'. También sustituye 'comida' por 'alimentos' para un registro legal más claro y añade la nota sobre 'usura' que el English POB preservó como aclaración lexical importante.
  reviewer_model: gpt-5.4
