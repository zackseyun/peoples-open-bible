translation:
  language: es
  text: Sean para ti[a] solo, y no para extraños contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean tuyos solo, y no compartidos con extraños». El versículo continúa la metáfora de las aguas/surtidores del contexto anterior y subraya la fidelidad matrimonial exclusiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  english_pob_choice: Let them be
  chosen_spanish: Sean
  alternatives_spanish:
  - Que sean
  - Estén
  lexicon: HALOT
  rationale: El imperfecto qal funciona aquí con fuerza jussiva/exhortativa. En español, el subjuntivo exhortativo "Sean" comunica mejor esa fuerza que un futuro simple.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para vosotros
  - te
  lexicon: HALOT
  rationale: La preposición ל con sufijo pronominal expresa pertenencia o beneficio. "Para ti" conserva esa relación de forma natural en español.
- source_word: לְבַדֶּךָ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente para ti
  - para ti solo
  lexicon: HALOT
  rationale: La expresión indica exclusividad. "Solo" transmite esa idea de manera breve e idiomática, sin perder el énfasis en exclusión.
- source_word: וְאֵין
  english_pob_choice: and not
  chosen_spanish: y no
  alternatives_spanish:
  - y que no haya
  - ni
  lexicon: HALOT
  rationale: La partícula existencial negativa introduce el contraste con la primera cláusula. "Y no" reproduce bien ese valor negativo en español.
- source_word: לְזָרִים
  english_pob_choice: for strangers
  chosen_spanish: para los extraños
  alternatives_spanish:
  - para los forasteros
  - para los ajenos
  lexicon: HALOT
  rationale: En este contexto sapiencial, זָרִים alude a quienes están fuera del vínculo matrimonial. "Extraños" mantiene la literalidad y el sentido relacional, sin restringirlo a una sola categoría social.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - a tu lado
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal expresa compañía o asociación. "Contigo" es la forma natural en español y preserva la idea de compartición excluida.
theological_decisions:
- issue: Fidelidad matrimonial exclusiva en la metáfora de las aguas/surtidores
  english_pob_reading: The verse continues the metaphor of springs/streams from the previous context and stresses exclusive marital fidelity.
  chosen_spanish_reading: El versículo continúa la metáfora de las aguas/surtidores del contexto anterior y subraya la fidelidad matrimonial exclusiva.
  alternative_spanish_readings:
  - El versículo se refiere solo a la posesión individual sin implicación matrimonial.
  - El versículo podría leerse como una simple exclusividad genérica.
  rationale: La forma hebrea y el audit trail inglés señalan que la exclusividad no es meramente posesiva sino marital y metafórica dentro del discurso sapiencial. La redacción española mantiene esa tensión sin ampliarla indebidamente.
  doctrine_reference: Proverbios 5:15-18; fidelidad matrimonial y exclusividad del pacto conyugal
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; el veredicto de cotejo fue de alta concordancia (1.0). Esta versión española sigue de cerca el hebreo y mantiene la lectura figurada y exclusiva documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó "extraños" para זָרִים por consistencia con el valor relacional del contexto sapiencial, no como referencia étnica.
  - Se optó por "solo" y "contigo" para mantener el paralelismo conciso del hebreo en un español natural.
  - La nota al pie conserva la alternativa de pertenencia compartida que el inglés documenta, pero la principal se formula con prioridad de claridad y fidelidad al original.
