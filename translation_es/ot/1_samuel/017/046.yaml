revisions:
- from: Hoy Yahvé te entregará[a] en mi mano, y yo te heriré y quitaré tu cabeza de sobre ti. Y hoy daré los cadáveres del campamento de los filisteos a las aves del cielo y a las bestias de la tierra, para que toda la tierra sepa que hay un Dios para Israel.
  to: Hoy Yahvé te entregará[a] en mi mano, y yo te heriré y te quitaré la cabeza. Y hoy daré los cadáveres del campamento de los filisteos a las aves del cielo y a los animales salvajes de la tierra, para que toda la tierra sepa que hay un Dios para Israel.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni del razonamiento auditado del POB inglés: se reemplazó la calca rígida ''quitaré tu cabeza de sobre ti'' por ''te quitaré la cabeza'', y ''bestias de la tierra'' por ''animales salvajes de la tierra'' para reflejar mejor חַיַּת הָאָרֶץ en español moderno. Se conserva la nota teológica sobre ''para Israel''/''en Israel''.'
