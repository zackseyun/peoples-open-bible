translation:
  language: es
  text: Y el hijo de Jehonatán fue Merib-baal[a], y Merib-baal engendró a Mica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pasaje paralelo de 2 Samuel 9:12 también da este nombre como «Mica». La POB inglesa señala que aquí 1 Crónicas refleja la forma hebrea transliterada «Micah».
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בֶן
  english_pob_choice: And the son of
  chosen_spanish: Y el hijo de
  alternatives_spanish:
  - Ahora bien, el hijo de
  - El hijo de
  lexicon: HALOT
  rationale: La construcción genealógica hebrea con ו + בֵּן introduce una relación de descendencia de manera simple. En español, 'Y el hijo de' conserva ese enlace narrativo y genealógico sin añadir matices ajenos.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jehonathan
  chosen_spanish: Jehonatán
  alternatives_spanish:
  - Jonathan
  lexicon: HALOT
  rationale: Se conserva la forma del nombre que refleja la grafía hebrea del pasaje. No se normaliza a 'Jonathan' porque la POB inglesa opta por reflejar la forma fuente específica.
- source_word: מְרִיב בָּעַל / מְרִיב בַּעַל
  english_pob_choice: Merib-baal
  chosen_spanish: Merib-baal
  alternatives_spanish:
  - Meribbaal
  - Merib Baal
  lexicon: HALOT
  rationale: Se mantiene el nombre compuesto con guion para señalar que funciona como un solo nombre propio, en línea con la decisión inglesa. Esto preserva la transparencia de la forma hebrea y evita reinterpretarlo como dos elementos separados en español.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró a
  alternatives_spanish:
  - fue padre de
  - hizo nacer a
  lexicon: HALOT
  rationale: En genealogías, הוֹלִיד en causativo expresa paternidad directa. 'Engendró a' es una equivalencia natural y precisa en español, y conserva el valor genealógico sin suavizarlo a una perífrasis más débil.
- source_word: אֶת מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Micá
  alternatives_spanish:
  - Mica
  - Miqueas
  lexicon: HALOT
  rationale: El nombre hebreo מִיכָה se transcribe aquí como 'Micá' para reflejar la forma breve del nombre en español y distinguirlo de 'Miqueas' (profeta) o de una adaptación inglesa. La nota cruzada explica la variante paralela en 2 Samuel 9:12.
theological_decisions:
- issue: Variante onomástica paralela entre 1 Crónicas 8:34 y 2 Samuel 9:12
  english_pob_reading: The parallel genealogy in 2 Samuel 9:12 names this figure 'Mica,' while 1 Chronicles here has 'Micah.'
  chosen_spanish_reading: La nota señala que el paralelo de 2 Samuel 9:12 nombra a esta persona 'Mica', mientras que aquí 1 Crónicas tiene 'Micá'.
  alternative_spanish_readings:
  - El paralelo en 2 Samuel 9:12 lo llama 'Mica', mientras que 1 Crónicas aquí dice 'Micá'.
  - 2 Samuel 9:12 presenta la forma 'Mica', y 1 Crónicas esta forma 'Micá'.
  rationale: No hay una diferencia doctrinal, sino una variante textual/onomástica. Se conserva la observación para no armonizar artificialmente los nombres y para reflejar el testimonio de ambos pasajes.
  doctrine_reference: 2 Samuel 9:12; 1 Crónicas 8:34
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios de revisión; la versión española sigue de cerca la estructura genealógica y conserva la nota cruzada sobre la variante onomástica paralela.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reproducir la continuidad genealógica del hebreo.
  - Se conserva el nombre compuesto 'Merib-baal' con guion, como nombre propio único.
  - Se usa 'engendró a' por ser la equivalencia genealógica natural de הוֹלִיד.
  - La forma 'Micá' refleja la transcripción breve del hebreo מִיכָה y se distingue de 'Miqueas'.
