    rationale: El English POB eligió ‘favor’ específicamente para evitar una carga teológica innecesaria y reflejar mejor la commendación social del término. En español, ‘gracia’ es posible, pero ‘favor’ preserva mejor esa decisión documentada; ‘gracia’ puede quedar como alternativa en nota.
