translation:
  language: es
  text: 'Y tú[a], hijo de hombre, los hijos de tu pueblo que hablan de ti junto a los muros y en las entradas de las casas, cada uno hablando con otro, cada hombre con su hermano, diciendo: «Vengan ahora y oigan cuál es la palabra que sale de Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hablan contigo»; sin embargo, el contexto indica más probablemente que hablaban de Ezequiel entre ellos.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «que sale de Yahvé»; esto es, la palabra profética que procede de él. También puede expresarse más suavemente en español como «que viene de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conservo el valor idiomático y el tono profético del vocativo de Ezequiel. «Hijo de hombre» es la forma más transparente y tradicionalmente reconocible en español, sin suavizar el hebreo.
- source_word: בְּנֵי עַמְּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - tu pueblo
  - la gente de tu nación
  lexicon: HALOT
  rationale: Mantiene la forma masculina plural del hebreo y reproduce con claridad la expresión sin borrar el matiz formal del original.
- source_word: הַנִּדְבָּרִים בְּךָ
  english_pob_choice: who speak about you
  chosen_spanish: que hablan de ti
  alternatives_spanish:
  - que hablan contigo
  - que hablan de ti entre sí
  lexicon: HALOT
  rationale: Aquí el contexto favorece hablar acerca de Ezequiel, no con él. En español, «hablan de ti» comunica de manera natural esa relación preposicional sin añadir interpretación indebida.
- source_word: אֵצֶל הַקִּירוֹת
  english_pob_choice: beside the walls
  chosen_spanish: junto a las paredes
  alternatives_spanish:
  - junto a los muros
  - al lado de las paredes
  lexicon: HALOT
  rationale: «Junto a» refleja proximidad; «paredes» es una opción natural en español para este entorno doméstico, aunque «muros» también es posible.
- source_word: וּבְפִתְחֵי הַבָּתִּים
  english_pob_choice: and in the doorways of the houses
  chosen_spanish: y en las entradas de las casas
  alternatives_spanish:
  - y en los umbrales de las casas
  - y en los portales de las casas
  lexicon: HALOT
  rationale: «Entradas» es claro y natural para פתחים en este contexto. Evita un tecnicismo innecesario y conserva el escenario de reunión.
- source_word: וְדִבֶּר חַד אֶת אַחַד
  english_pob_choice: each one speaking with another
  chosen_spanish: cada uno hablando con otro
  alternatives_spanish:
  - uno hablando con otro
  - uno con otro hablando
  lexicon: HALOT
  rationale: La construcción distributiva queda bien reflejada en español con una formulación natural y continua dentro de la frase.
- source_word: אִישׁ אֶת אָחִיו
  english_pob_choice: each man with his brother
  chosen_spanish: cada hombre con su hermano
  alternatives_spanish:
  - cada uno con su hermano
  - cada uno con su compañero
  lexicon: HALOT
  rationale: Conservo «hermano» para reflejar el lenguaje concreto y relacional del hebreo. «Cada hombre» mantiene el paralelismo con el distributivo anterior.
- source_word: בֹּאוּ נָא
  english_pob_choice: Come now
  chosen_spanish: Vengan ahora
  alternatives_spanish:
  - Vengan, por favor
  - Vamos, vengan
  lexicon: HALOT
  rationale: En español, el valor de invitación apremiante de נָא se expresa de manera natural con «ahora». Se preserva el tono de invitación sin forzar una fórmula demasiado coloquial.
- source_word: וְשִׁמְעוּ
  english_pob_choice: and hear
  chosen_spanish: y oigan
  alternatives_spanish:
  - y escuchen
  - y oíd
  lexicon: HALOT
  rationale: «Oigan» mantiene el registro bíblico y la fuerza imperativa de שמע sin sonar arcaico en exceso.
- source_word: מָה הַדָּבָר
  english_pob_choice: what the word is
  chosen_spanish: cuál es la palabra
  alternatives_spanish:
  - qué es la palabra
  - cuál es el mensaje
  lexicon: HALOT
  rationale: «Palabra» preserva el registro profético de דבר. La formulación «cuál es» fluye mejor en español que una traducción más rígida.
- source_word: הַיּוֹצֵא מֵאֵת יְהוָה
  english_pob_choice: that comes from Yahweh
  chosen_spanish: que sale de Yahvé
  alternatives_spanish:
  - que viene de Yahvé
  - que procede de Yahvé
  lexicon: HALOT
  rationale: Sigo el movimiento literal de יצא con «sale», porque el hebreo conserva la imagen de una palabra que emerge de Dios. Se mantiene «Yahvé» según la norma del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa la forma española establecida por el proyecto para el nombre divino, en lugar de sustituirlo por un título.
theological_decisions:
- issue: El nombre divino יְהוָה en un dicho profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton. Conforme a la norma del proyecto, se traduce con el nombre propio divino y no con una sustitución por título, preservando la referencia covenantal del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de הַנִּדְבָּרִים בְּךָ
  english_pob_reading: who speak about you
  chosen_spanish_reading: que hablan de ti
  alternative_spanish_readings:
  - que hablan contigo
  - que hablan acerca de ti
  rationale: El contexto inmediato de hablar junto a paredes y en entradas, seguido de conversación mutua, favorece que el grupo esté hablando de Ezequiel entre sí. La traducción española conserva esa decisión sin exagerarla.
  doctrine_reference: Contexto sintáctico y discursivo de Ez 33:30
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que cambió la formulación inglesa de ''talk about you'' a ''speak about you'' y de ''comes out from the LORD'' a ''comes from the LORD''. En español se optó por una forma natural y formal equivalente: «hablan de ti» y «sale de Yahvé», preservando la imagen verbal del hebreo y el registro profético.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el paralelismo distributivo con «cada uno... cada hombre...».
  - Se usa «palabra» para דבר en sentido profético, no «mensaje», para mantener transparencia textual.
  - El español evita arcaísmos innecesarios sin perder el tono bíblico solemnemente narrativo.
