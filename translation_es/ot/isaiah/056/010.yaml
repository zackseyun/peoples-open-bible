  to: Sus atalayas son ciegos, todos ellos; no saben nada. Todos ellos son perros mudos, incapaces de ladrar, soñadores,[a] echados, amantes de dormitar.
  rationale: 'Se hizo una reparación menor: ''atalayas'' reemplaza a ''vigilantes'' para reflejar con mayor precisión la imaginería profética de watchmen/sentinels y evitar una resonancia demasiado contemporánea. No se requieren más cambios, porque el resto del verso y la nota léxica preservan adecuadamente el sentido fuente y la decisión auditada del POB inglés.'
