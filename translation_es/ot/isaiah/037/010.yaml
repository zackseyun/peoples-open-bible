translation:
  language: es
  text: 'Así les dirán a Ezequías, rey de Judá: «No dejes que tu Dios, en quien confías, te engañe[a], diciendo: “Jerusalén no será entregada en manos del rey de Asiria”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te desvíe». El verbo hebreo puede significar «engañar» o «extraviar».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esa manera
  lexicon: HALOT
  rationale: Introduce la fórmula de mensajero de manera natural en español, conservando el valor deíctico del hebreo sin volverla explicativa.
- source_word: תֹאמְרוּן
  english_pob_choice: you shall say
  chosen_spanish: dirán
  alternatives_spanish:
  - diréis
  - deberán decir
  lexicon: HALOT
  rationale: El plural con fuerza directiva se expresa con futuro exhortativo en español; 'dirán' mantiene el tono formal del encargo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - contra
  lexicon: HALOT
  rationale: Preposición natural de destinatario en español.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jizquías
  lexicon: HALOT
  rationale: Forma española usual del nombre propio bíblico.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: Mantiene la aposición real de forma idiomática y fiel al hebreo.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No permitas
  - No dejes
  lexicon: HALOT
  rationale: La prohibición se reproduce en español con una negación directa, necesaria para el imperativo negativo.
- source_word: יַשִּׁאֲךָ
  english_pob_choice: let ... deceive you
  chosen_spanish: te engañe
  alternatives_spanish:
  - te mienta
  - te desvíe
  lexicon: HALOT
  rationale: El verbo hifil de נשׁא puede significar engañar o extraviar; 'engañe' conserva la fuerza de la acusación hostil en el discurso asirio.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: Se conserva el sufijo singular de segunda persona, dirigido personalmente a Ezequías.
- source_word: אֲשֶׁר אַתָּה בּוֹטֵחַ בּוֹ
  english_pob_choice: in whom you trust
  chosen_spanish: en quien confías
  alternatives_spanish:
  - en quien te apoyas
  - en quien pones tu confianza
  lexicon: HALOT
  rationale: '''Confiar'' reproduce de forma directa בטח y evita sobrecargar el texto; la relativa queda natural en español.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: Se mantiene la relación participial del hebreo con una construcción española transparente.
- source_word: לֹא תִנָּתֵן
  english_pob_choice: will not be given
  chosen_spanish: no será entregada
  alternatives_spanish:
  - no será dada
  - no caerá
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'ser dada', en español bíblico actual 'ser entregada' comunica mejor la idea de quedar a merced de un poder enemigo sin perder el pasivo del original.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: HALOT
  rationale: Forma estándar y ampliamente reconocible en español.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: Se preserva el idiomatismo hebreo con una equivalencia natural en español; 'en manos de' comunica dominio y entrega forzosa.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Se mantiene la designación histórico-política en forma clara y tradicionalmente comprensible.
theological_decisions:
- issue: Retención del tono de burla/blasfemia en la voz asiria
  english_pob_reading: Do not let your God ... deceive you
  chosen_spanish_reading: No dejes que tu Dios ... te engañe
  alternative_spanish_readings:
  - No permitas que tu Dios ... te engañe
  - No dejes que tu Dios ... te extravíe
  rationale: El hebreo pone en boca de Asiria una acusación blasfema contra Dios; 'te engañe' conserva la violencia retórica sin suavizarla ni validar su contenido.
  doctrine_reference: Narrative voice and hostile speech in Isaiah 37; cf. preservation of source discourse without endorsement.
- issue: Tratamiento del pasivo en la clausula final
  english_pob_reading: Jerusalem will not be given into the hand of the king of Assyria
  chosen_spanish_reading: Jerusalén no será entregada en manos del rey de Asiria
  alternative_spanish_readings:
  - Jerusalén no será dada en manos del rey de Asiria
  - Jerusalén no caerá en manos del rey de Asiria
  rationale: '''Entregada'' preserva el sentido pasivo del hebreo y sugiere cesión/control, sin añadir interpretación excesiva; la imagen de ''en manos de'' mantiene el idiomatismo.'
  doctrine_reference: Hebrew passive idiom and narrative context of siege/assault.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que afinó la relación entre el verbo de engaño y el infinitivo de decir ('deceive you, saying'), por lo que en español se mantuvo una estructura equivalente con gerundio ('te engañe, diciendo') para reflejar la construcción participial sin forzar un calco. También se optó por 'ser entregada en manos de' para conservar el pasivo y el idiomatismo hebreo con naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים según el estándar del proyecto.
  - Se usa 'Asiria' en lugar de 'Asur' para el nombre del imperio y su rey, conforme al uso español bíblico común.
  - Se conserva la metáfora de 'manos' como idiomatismo de poder, sin sustituirla por una explicación explícita en el texto principal.
  - El tono del mandato indirecto se expresa con futuro exhortativo ('dirán') para corresponder al hebreo y sonar natural en español.
  - La nota [a] se ancla en 'engañe' porque ahí aparece la ambigüedad léxica relevante del verbo hebreo.
