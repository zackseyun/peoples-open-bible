translation:
  language: es
  text: Allí suben las tribus, las tribus de Yah, como testimonio[a] para Israel, para dar gracias al nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como estatuto para Israel» o «como decreto para Israel». El hebreo עֵדוּת puede denotar testimonio/testigo o una ordenanza pactal establecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁ/שָּׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio deíctico apunta al lugar mencionado en el contexto; «Allí» conserva la referencia espacial y suena natural en español bíblico contemporáneo.
- source_word: עָלוּ
  english_pob_choice: go up
  chosen_spanish: suben
  alternatives_spanish:
  - subieron
  - ascienden
  lexicon: HALOT
  rationale: El hebreo perfecto en poesía puede tener valor actual/vivencial; «suben» conserva la imagen de ascenso a Jerusalén y el sentido cultual sin volverlo rígidamente pasado.
- source_word: שְׁבָטִים
  english_pob_choice: the tribes
  chosen_spanish: las tribus
  alternatives_spanish:
  - tribus
  lexicon: HALOT
  rationale: Se refiere a los grupos tribales de Israel; el artículo en español es natural y preciso.
- source_word: שִׁבְטֵי יָהּ
  english_pob_choice: the tribes of Yah
  chosen_spanish: las tribus de Yah
  alternatives_spanish:
  - las tribus del Yahvé
  - las tribus del Señor
  lexicon: HALOT
  rationale: Se mantiene «Yah» para distinguir la forma poética קצרה del nombre divino y no nivelarla con יְהוָה, que en este verso aparece aparte.
- source_word: עֵדוּת
  english_pob_choice: as a testimony for Israel
  chosen_spanish: como testimonio para Israel
  alternatives_spanish:
  - como estatuto para Israel
  - como decreto para Israel
  - como ordenanza para Israel
  lexicon: HALOT
  rationale: «Testimonio» conserva el núcleo léxico y deja abierta la tensión entre testimonio y norma pactal que el inglés POB también preserva.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - con respecto a Israel
  lexicon: HALOT
  rationale: La preposición permite una relación de destino/pertenencia; «para Israel» funciona bien en español y evita precisar en exceso.
- source_word: לְהֹדוֹת
  english_pob_choice: to give thanks
  chosen_spanish: para dar gracias
  alternatives_spanish:
  - para alabar
  - para confesar
  lexicon: HALOT
  rationale: En contexto de culto, la forma causativa de ידה expresa agradecimiento; «dar gracias» es la equivalencia más clara y reverente.
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: to the name of Yahweh
  chosen_spanish: al nombre de Yahvé
  alternatives_spanish:
  - al nombre de Yahweh
  - al nombre del Señor
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: «Yahvé» para יְהוָה. «Al nombre de» refleja el valor direccional/litúrgico del hebreo.'
theological_decisions:
- issue: Diferenciación entre יָהּ y יְהוָה en el mismo versículo
  english_pob_reading: Differentiate them as 'Yah' and 'Yahweh' respectively
  chosen_spanish_reading: Diferenciarlos como «Yah» y «Yahvé», respectivamente
  alternative_spanish_readings:
  - renderir ambos como «Yahvé»
  - renderir ambos como transliteraciones sin distinción
  rationale: El texto hebreo distingue la forma poética קצרה יָהּ del Tetragrámaton יְהוָה. Mantener esa distinción en español preserva la evidencia del original y evita borrar una tensión textual intencional.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; contested terms table for יְהוָה'
- issue: Sentido de עֵדוּת לְיִשְׂרָאֵל
  english_pob_reading: as a testimony for Israel
  chosen_spanish_reading: como testimonio para Israel
  alternative_spanish_readings:
  - como estatuto para Israel
  - como decreto para Israel
  - como ordenanza para Israel
  rationale: «Testimonio» conserva la ambigüedad entre testimonio/witness y disposición establecida sin imponer una lectura jurídica más estrecha de la que el contexto exige.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que cambió «went up» por «go up» para reflejar mejor el valor contextual del perfecto hebreo en poesía. También conserva la distinción auditada entre יָהּ y יְהוָה, y mantiene la ambigüedad de עֵדוּת.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה según el estándar del proyecto, y «Yah» para יָהּ para no perder la distinción del texto hebreo.
  - «Dar gracias» reproduce mejor לְהֹדוֹת en contexto de culto que «alabar» o «confesar».
  - Se evitó traducir עֵדוּת como solo «estatuto» o solo «decreto» para no cerrar indebidamente su rango semántico.
  - La frase «al nombre de Yahvé» mantiene la orientación litúrgica del hebreo sin convertirla en una glosa explicativa.
