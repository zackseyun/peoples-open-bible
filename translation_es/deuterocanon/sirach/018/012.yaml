translation:
  language: es
  text: Vio y reconoció que su destrucción era mala[a]; por tanto, multiplicó su expiación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ruina» o «su fin» para καταστροφή.
    reason: lexical_alternative
  - marker: b
    text: O «aumentó su expiación». El griego usa una palabra de expiación/atonamiento (ἐξιλασμός).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἶδεν
  english_pob_choice: He saw
  chosen_spanish: Vio
  alternatives_spanish:
  - Miró y vio
  - Percibió
  lexicon: LSJ
  rationale: ἶδεν es aoristo de ὁράω y expresa visión directa; «Vio» conserva la fuerza simple y natural del verbo.
- source_word: ἐπέγνω
  english_pob_choice: recognized
  chosen_spanish: reconoció
  alternatives_spanish:
  - comprendió
  - llegó a entender
  - advirtió
  lexicon: LSJ
  rationale: El compuesto sugiere reconocimiento pleno o toma de conciencia; «reconoció» mantiene ese paso desde ver a entender.
- source_word: τὴν καταστροφὴν αὐτῶν
  english_pob_choice: their destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - su caída
  - su fin
  lexicon: LSJ
  rationale: καταστροφή puede significar ruina, destrucción o derribo. «Destrucción» sigue de cerca la opción inglesa revisada y refleja bien el sentido de desastre consumado.
- source_word: ὅτι πονηρά
  english_pob_choice: that their destruction was evil
  chosen_spanish: que su destrucción era mala
  alternatives_spanish:
  - que era funesta
  - que era miserable
  - que era perversa
  lexicon: LSJ
  rationale: πονηρά aquí califica la condición o desenlace como dañino, desastroso o malo. «Mala» evita cargar de más una valoración moral específica y conserva la amplitud semántica.
- source_word: διὰ τοῦτο
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - por esta razón
  lexicon: LSJ
  rationale: Es una inferencia causal estándar; «por tanto» es claro y solemne sin ser arcaico.
- source_word: ἐπλήθυνεν
  english_pob_choice: multiplied
  chosen_spanish: multiplicó
  alternatives_spanish:
  - aumentó
  - hizo abundar
  lexicon: LSJ
  rationale: El verbo significa hacer muchos o aumentar en cantidad; «multiplicó» conserva la imagen verbal fuerte del griego.
- source_word: τὸν ἐξιλασμὸν αὐτοῦ
  english_pob_choice: his atonement
  chosen_spanish: su expiación
  alternatives_spanish:
  - su atonación
  - su reconciliación
  - su atonamiento
  lexicon: LSJ
  rationale: ἐξιλασμός designa expiación/atonación. En español «expiación» es más preciso y natural para el campo sacrificial que «mercy» o una paráfrasis más débil.
theological_decisions:
- issue: Valor de ἐξιλασμός
  english_pob_reading: atonement / expiation
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - atonación
  - atonamiento
  - reconciliación
  rationale: Se preserva el peso sacrificial y reparador del término sin diluirlo en «misericordia». «Expiación» comunica bien la remoción de culpa/ofensa y es reconocible en español bíblico.
  doctrine_reference: 'DOCTRINE.md: evitar perder el contenido sacrificial o de reparación cuando el texto lo expresa explícitamente'
- issue: Relación entre la visión y la evaluación moral del desenlace
  english_pob_reading: He saw and recognized that their destruction was evil
  chosen_spanish_reading: Vio y reconoció que su destrucción era mala
  alternative_spanish_readings:
  - Vio y reconoció que su destrucción era funesta
  - Vio y reconoció que su destrucción era miserable
  rationale: La construcción española conserva la secuencia percepción→discernimiento y mantiene abierta la fuerza de πονηρά como condición mala/desastrosa, sin estrecharla indebidamente a una sola valoración moral.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones semánticas cuando el original las deja abiertas'
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente del expediente inglés: se mantuvo la cercanía a καταστροφή con «destrucción» y se evitó añadir un complemento explícito inexistente en el griego para ἐξιλασμός. A la vez, se corrigió el problema de validación asegurando que cada marca de nota aparezca anclada en el texto español.'
  spanish_consistency_notes:
  - 'Se preserva la progresión verbal del griego: vio → reconoció → por tanto → multiplicó.'
  - «Expiación» se usa con valor sacrificial coherente con ἐξιλασμός.
  - Se evita la máscara litúrgica «SEÑOR» y no hay vocabulario dependiente de tradición eclesiástica específica.
  - La puntuación conserva el paralelismo y separa claramente la cláusula causal-final.
