review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Judas/Macabeo, reducido a un grupo de alrededor de diez, retirado a los montes, viviendo como animal salvaje con sus acompañantes y alimentándose de plantas para evitar la contaminación/defilement. También preserva adecuadamente la nota sobre la frase comprimida δέκατός που γενηθεὶς. Sin embargo, hay pequeños puntos de fidelidad y naturalidad en español que conviene ajustar.'
  spanish_quality_summary: 'El español es claro y generalmente digno, pero tiene algunas formulaciones algo mecánicas: «era llamado» suena menos natural que «llamado» o «también llamado»; «vegetación» como alimento resulta poco idiomático en este contexto; y «contaminación» puede sonar demasiado física/ambiental donde el contexto pide una fuerza religiosa más clara. Una leve revisión mejora la legibilidad sin perder precisión.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Macabeo» es aceptable para Μακκαβαῖος. El punto léxico más sensible es μολυσμός: conviene «impureza» aquí para sonar más naturalmente religioso en español, manteniendo la amplitud cultual/moral explicada en la nota teológica. No hay términos como Yahvé, Mesías, Cristo, etc., implicados en este versículo.'
  issues:
  - severity: medium
    issue: «vegetación» como comida suena poco natural en español bíblico corriente
    rationale: τὴν χορτώδη τροφὴν alude a alimento vegetal/herbáceo. «Vegetación» en español suele referirse al conjunto de plantas de un lugar más que a lo que alguien come. «alimento vegetal» o «comida vegetal» comunica mejor el sentido.
  - severity: medium
    issue: «contaminación» debilita el matiz religioso de μολυσμός en este contexto
    rationale: Aunque semánticamente posible, «contaminación» en español moderno tiende a oírse material o ambiental. En 2 Macabeos, el sentido de defilement/uncleanness por prácticas impías o alimentos prohibidos se expresa con más naturalidad como «impureza», sin eliminar la dimensión moral.
  - severity: low
    issue: «que también era llamado» es algo rígido
    rationale: La estructura reproduce el sentido, pero «también llamado» es más idiomático y suficientemente fiel a ὁ καὶ.
