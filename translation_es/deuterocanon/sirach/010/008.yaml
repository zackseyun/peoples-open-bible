translation:
  language: es
  text: El reinado pasa de nación en nación por causa de la violencia y la arrogancia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradición griega: «El reino es trasladado de nación en nación por causa de la injusticia, los ultrajes y el dinero».'
    reason: textual_variant
lexical_decisions:
- source_word: מַלְכוּת / βασιλεία
  english_pob_choice: Kingship
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - la soberanía
  lexicon: HALOT; LSJ
  rationale: En español, «reino» comunica de manera natural la realidad política de un poder real que cambia de manos. Aunque «kingship» en inglés subraya el ejercicio del poder más que el territorio, «el reino» es la forma más idiomática y comprensible para esta sentencia sapiencial, sin perder la idea de dominio real.
- source_word: מִגּוֹי אֶל גּוֹי / ἀπὸ ἔθνους εἰς ἔθνος
  english_pob_choice: from nation to nation
  chosen_spanish: de nación en nación
  alternatives_spanish:
  - de un pueblo a otro
  - de nación a nación
  lexicon: HALOT; LSJ
  rationale: La expresión reproduce bien el movimiento proverbial de traslado entre entidades políticas. «De nación en nación» conserva la concisión y el paralelismo del original, y resulta natural en español.
- source_word: תִּסֹּב / μετάγεται
  english_pob_choice: passes
  chosen_spanish: pasa
  alternatives_spanish:
  - se traslada
  - se transfiere
  - cambia
  lexicon: HALOT; LSJ
  rationale: El verbo describe el cambio o traslado del poder de un pueblo a otro. «Pasa» es una solución breve y idiomática que conserva el sentido de transición sin introducir una explicación interpretativa excesiva.
- source_word: בִּגְלַל / διὰ
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT; LSJ
  rationale: La preposición causal se vierte con una fórmula transparente y sobria. «Por causa de» mantiene la relación causal explícita del hebreo y del griego.
- source_word: חֲמַס / ἀδικίας
  english_pob_choice: violence
  chosen_spanish: la violencia
  alternatives_spanish:
  - la injusticia
  - la opresión
  - el abuso
  lexicon: HALOT; LSJ
  rationale: El hebreo חמס suele denotar violencia o injusticia violenta. «La violencia» sigue de cerca el valor semántico del hebreo y, a la vez, encaja bien con la segunda cualidad moral del verso.
- source_word: גַּאֲוָה / ὕβρεις
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - el orgullo
  - la soberbia
  - la altivez
  lexicon: HALOT; LSJ
  rationale: «Arrogancia» expresa con claridad el vicio de la soberbia altanera señalado por el hebreo. Es una opción moderna y digna, y evita la posible ambigüedad de «orgullo», que en español puede ser positivo o neutro.
theological_decisions:
- issue: Diferencia entre la lista causal hebrea y la tradición griega ampliada
  english_pob_reading: 'Main text follows the Hebrew’s two causes, with a footnote preserving the Greek tradition’s expanded list: injustice, outrages/insults, and money.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «por causa de la violencia y la arrogancia», con una nota que preserva la tradición griega: «por causa de la injusticia, los ultrajes y el dinero».'
  alternative_spanish_readings:
  - por causa de la injusticia, los ultrajes y el dinero
  - por causa de la injusticia, las insolencias y las riquezas
  rationale: Sirach se traduce aquí desde el hebreo conservado, que es de alta confianza, mientras que el griego queda como control textual y tradición paralela. Para no borrar la tensión textual documentada, la nota conserva la expansión griega sin hacerla sustituir al texto base.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el griego como control y variante textual significativa'
translation_notes:
  revision_awareness: 'Se respetó la decisión de la revisión más reciente de no modificar el sentido base: el hebreo gobierna el texto principal, y la tradición griega se conserva como variante textual en nota.'
  spanish_consistency_notes:
  - Se mantuvo «reino» para מַלְכוּת/βασιλεία por naturalidad en español, sin recurrir a un calco artificial.
  - Se tradujo el causal como «por causa de» para reflejar con claridad la relación explicativa del original.
  - Se evitó «SEÑOR» u სხვა terminología no pertinente; el versículo no contiene el Nombre divino.
  - La nota distingue con claridad la lectura hebrea breve de la tradición griega más amplia, preservando la tensión textual documentada.
