translation:
  language: es
  text: Entonces Israel extendió su mano derecha y la puso sobre la cabeza de Efraín[a], aunque él era el menor, y su mano izquierda sobre la cabeza de Manasés, cruzando sus manos, porque Manasés era el primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guiando sus manos deliberadamente». La expresión hebrea puede destacar una colocación intencional y diestra de las manos; el contexto indica que esto implicó cruzarlas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - alargó
  lexicon: HALOT
  rationale: En este contexto gestual, el verbo describe el movimiento de la mano. «Extendió» comunica la acción de manera natural en español y conserva el gesto físico sin sugerir una misión o envío literal.
- source_word: יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su derecha
  - la mano derecha
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «mano» para reflejar el hebreo y hacer claro el paralelismo con «mano izquierda».
- source_word: וַיָּשֶׁת
  english_pob_choice: placed
  chosen_spanish: la puso
  alternatives_spanish:
  - la colocó
  - la puso encima
  lexicon: HALOT
  rationale: El verbo expresa una acción deliberada de poner la mano sobre la cabeza. «La puso» es directo y fiel al gesto narrado.
- source_word: עַל רֹאשׁ
  english_pob_choice: on ... head
  chosen_spanish: sobre la cabeza
  alternatives_spanish:
  - encima de la cabeza
  - en la cabeza
  lexicon: HALOT
  rationale: «Sobre la cabeza» reproduce el valor idiomático de la preposición hebrea en este gesto de bendición.
- source_word: וְהוּא הַצָּעִיר
  english_pob_choice: though he was the younger
  chosen_spanish: aunque él era el menor
  alternatives_spanish:
  - aunque era el más joven
  - siendo él el menor
  lexicon: HALOT
  rationale: 'La cláusula tiene fuerza concesiva en el relato. «Aunque» conserva esa tensión narrativa: la mano derecha fue puesta sobre Efraín aun siendo el menor.'
- source_word: שְׂמֹאלוֹ
  english_pob_choice: his left hand
  chosen_spanish: su mano izquierda
  alternatives_spanish:
  - su izquierda
  - la mano izquierda
  lexicon: HALOT
  rationale: Se explicita «mano» para mantener el paralelismo con «mano derecha» y evitar ambigüedad en español.
- source_word: שִׂכֵּל אֶת יָדָיו
  english_pob_choice: crossing his hands
  chosen_spanish: cruzando sus manos
  alternatives_spanish:
  - guiando sus manos deliberadamente
  - intercambiando sus manos
  lexicon: HALOT
  rationale: La forma piel de שכל aquí apunta a la disposición intencional de las manos, en el sentido que el POB inglés documenta como cruce deliberado. «Cruzando sus manos» preserva la decisión narrativa sin sobrerinterpretar.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la disposición de las manos. «Porque» es la forma más natural en español para esta relación causal.
- source_word: הַבְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el mayor
  lexicon: HALOT
  rationale: «Primogénito» conserva el valor lexical y familiar de prioridad de nacimiento, que es relevante en el contexto de la bendición.
theological_decisions:
- issue: Sentido de שִׂכֵּל אֶת יָדָיו
  english_pob_reading: Jacob intentionally crossed his hands when blessing Ephraim and Manasseh.
  chosen_spanish_reading: Jacob cruzó intencionalmente sus manos al bendecir a Efraín y a Manasés.
  alternative_spanish_readings:
  - Jacob guio sus manos con destreza al bendecir a Efraín y a Manasés
  - Jacob dispuso sus manos de manera deliberada
  rationale: 'El contexto inmediato explica la colocación invertida de las manos: la derecha sobre el menor y la izquierda sobre el primogénito. Por eso el español debe expresar el cruce intencional, manteniendo la tensión narrativa sin eliminar la rareza del gesto.'
  doctrine_reference: Preservar la prioridad del texto fuente y la tensión narrativa sobre la primogenitura; no armonizar en exceso con fórmulas tradicionales.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del POB inglés, que añadió «hand» después de «left» para mantener el paralelismo. En español se reflejó ese paralelismo con «su mano izquierda».
  spanish_consistency_notes:
  - Se conservó «Israel» como nombre propio del sujeto, siguiendo el texto hebreo y el POB inglés.
  - Se usó «Efraín» y «Manasés» con acentuación española estándar y forma bíblica usual.
  - 'Se mantuvo la secuencia narrativa: mano derecha, menor, mano izquierda, primogénito, para preservar el contraste del pasaje.'
  - No se usó «SEÑOR» ni otros términos de sustitución, porque este versículo no contiene el tetragrámaton ni un equivalente directo.
