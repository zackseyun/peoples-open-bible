revisions:
- from: Pero las criaturas del desierto se echarán allí[a], y sus casas estarán llenas de búhos; las hijas del avestruz habitarán allí, y los machos cabríos[b] saltarán allí.
  to: Pero las criaturas del desierto se echarán allí, y sus casas estarán llenas de búhos[a]; los avestruces habitarán allí, y los machos cabríos[b] danzarán allí.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «búhos», que es el término incierto. Se reemplaza «las hijas del avestruz» por «los avestruces» para seguir la decisión documentada de tratar בְּנוֹת יַעֲנָה como nombre idiomático de especie en español natural. Se cambia «saltarán» por «danzarán» para conservar mejor la fuerza poética de יְרַקְּדוּ según el POB inglés.
