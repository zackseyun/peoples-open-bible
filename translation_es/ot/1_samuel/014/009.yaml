    issue: «Deténganse» no expresa tan bien como el hebreo la idea de permanecer en el lugar
    rationale: דֹּמּוּ puede significar estar quietos, callar o esperar; en este contexto la fuerza práctica es ‘quédense ahí / permanezcan’, no solo ‘paren’.
  - severity: medium
    issue: Las notas [a][b] están ancladas después de «así» en lugar de sus expresiones relevantes
    rationale: La nota a corresponde al imperativo «Quédense ahí» y la nota b al modismo «en nuestro lugar»; el anclaje actual puede confundir al lector.
  - severity: low
