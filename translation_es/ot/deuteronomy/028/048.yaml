review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: servicio forzado a los enemigos enviados por Yahvé, la serie de privaciones, y la imagen del yugo de hierro hasta la destrucción. También preserva correctamente ‘Yahvé’ para יהוה y ‘contra ti’ para el valor hostil de בָּךְ. Sin embargo, hay dos problemas de alineación con la evidencia y el rastro auditado: (1) las notas al pie están invertidas respecto a su contenido; en el inglés, la nota de alternativa léxica pertenece a ‘an iron yoke’, no a ‘your enemies’; y la nota sobre el sujeto alternativo pertenece a la cláusula final, no a ‘falta de todo’; (2) ‘hasta destruirte’ pierde un poco la explicitud verbal de ‘hasta que él te haya destruido / destruya’, que ayuda a conservar mejor el sujeto discutido en la nota.'
  spanish_quality_summary: El español es mayormente claro, natural y digno. ‘Y servirás… en hambre y en sed…’ suena bíblico pero inteligible. No obstante, la colocación de las notas en lugares equivocados confunde al lector, y conviene explicitar mejor la cláusula final para que la nota sobre el sujeto tenga un anclaje más claro en español. ‘Sobre tu cuello’ es aceptable; ‘en tu cuello’ también sería natural, pero no es necesario cambiarlo.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> ‘Yahvé’; no hay términos doctrinales conflictivos adicionales. ‘Yugo de hierro’ concuerda con la decisión léxica documentada. No hay conflicto con los defaults del glosario.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a frases incorrectas.
    rationale: La nota [a] en el audit trail inglés corresponde a ‘an iron yoke / a yoke of iron’, pero en el borrador está colocada sobre ‘enemigos’. La nota [b] sobre el sujeto alternativo de ‘pondrá’ y ‘destruirá’ debe anclarse en la cláusula verbal final, no en ‘falta de todo’. Esto induce a error sobre qué elemento está siendo aclarado.
  - severity: medium
    issue: La cláusula final ‘hasta destruirte’ deja implícito el sujeto de una manera que debilita la nota explicativa.
    rationale: El hebreo permite debate sobre si Yahvé o el enemigo es el sujeto de וְנָתַן... הִשְׁמִידוֹ. En español, ‘hasta que te haya destruido’ o ‘hasta que te destruya’ conserva mejor la estructura verbal y permite que la nota [b] tenga un referente más claro.
  - severity: low
    issue: La nota [a] está redactada con comillas y formato poco naturales.
    rationale: 'En español editorial bíblico suena mejor ‘O: “un yugo de hierro”.’ anclado al sintagma relevante, o incluso omitirla si el texto principal ya usa esa forma. Pero dado el rastro auditado, debe preservarse como alternativa formalmente equivalente.'
  revised_spanish_text: Y servirás a tus enemigos, a quienes Yahvé enviará contra ti, en hambre y en sed y en desnudez y en falta de todo; y pondrá sobre tu cuello un yugo de hierro[a] hasta que te haya destruido[b].
  revised_footnotes:
