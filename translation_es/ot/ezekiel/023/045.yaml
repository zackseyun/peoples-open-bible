translation:
  language: es
  text: Pero hombres justos los juzgarán con el juicio de adúlteras y con el juicio de mujeres que derraman sangre[a], porque son adúlteras, y sangre hay en sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según el juicio para adúlteras y para mujeres que derraman sangre».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «sangre en sus manos»; la expresión comunica culpabilidad por derramamiento de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲנָשִׁים
  english_pob_choice: But ... men
  chosen_spanish: Pero ... hombres
  alternatives_spanish:
  - Y ... hombres
  - Mas ... hombres
  - Pero ... personas
  lexicon: HALOT
  rationale: El hebreo presenta un plural masculino explícito; por eso se conserva «hombres». El ו inicial puede ser adversativo en este contexto de anuncio judicial, así que «pero» reproduce bien el giro del discurso.
- source_word: צַדִּיקִם
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - righteous
  lexicon: HALOT
  rationale: צַדִּיקִים abarca la idea de rectitud/justicia moral y judicial. En español, «justos» comunica con naturalidad ese valor sin perder el matiz forense.
- source_word: יִשְׁפְּטוּ
  english_pob_choice: will judge
  chosen_spanish: los juzgarán
  alternatives_spanish:
  - los juzgará[n]
  - los sentenciarán
  lexicon: HALOT
  rationale: El verbo judicial se vierte con «juzgarán». Se añade el objeto clítico «los» por la construcción española exigida por el contexto.
- source_word: מִשְׁפַּט נֹאֲפוֹת
  english_pob_choice: with the judgment of adulteresses
  chosen_spanish: con el juicio de adúlteras
  alternatives_spanish:
  - según el juicio para adúlteras
  - con la sentencia de adúlteras
  lexicon: HALOT
  rationale: Se conserva la construcción legal «juicio de...», que mantiene la fuerza forense del hebreo. «Adúlteras» refleja el participio sustantivado femenino sin suavizarlo.
- source_word: וּמִשְׁפַּט שֹׁפְכוֹת דָּם
  english_pob_choice: and with the judgment of women who shed blood
  chosen_spanish: y con el juicio de mujeres que derraman sangre
  alternatives_spanish:
  - y con el juicio de derramadoras de sangre
  - y con la sentencia de mujeres que derraman sangre
  lexicon: HALOT
  rationale: La expresión participial femenina se traduce de forma transparente como «mujeres que derraman sangre». Esto preserva el paralelismo con «adúlteras» y el sentido penal del pasaje.
- source_word: נֹאֲפֹת הֵנָּה
  english_pob_choice: because they are adulteresses
  chosen_spanish: porque son adúlteras
  alternatives_spanish:
  - porque ellas son adúlteras
  - porque son mujeres adúlteras
  lexicon: HALOT
  rationale: La predicación nominal femenina plural se expresa con «son adúlteras», forma natural y precisa en español. «Adúlteras» mantiene el mismo campo semántico que el término previo.
- source_word: וְדָם בִּידֵיהֶן
  english_pob_choice: and blood is on their hands
  chosen_spanish: y sangre hay en sus manos
  alternatives_spanish:
  - y sangre está en sus manos
  - y tienen sangre en sus manos
  lexicon: HALOT
  rationale: El hebreo dice literalmente que la sangre está «en sus manos». En español, «sangre hay en sus manos» conserva la imagen directa sin imponer de entrada la idiomatización de culpabilidad, aunque esa implicación queda clara por el contexto.
theological_decisions:
- issue: Agentes del juicio
  english_pob_reading: righteous men refers to human judicial agents invoked in the prophetic image, not a direct identification of God as the judge in this clause
  chosen_spanish_reading: «hombres justos» se entiende como agentes humanos de juicio en la imagen profética, sin convertirlos en una referencia directa a Dios como juez en esta cláusula
  alternative_spanish_readings:
  - podrían ser agentes celestiales o idealizados del juicio divino
  - podría leerse como una descripción más explícitamente teológica del juicio de Dios
  rationale: El hebreo nombra a «hombres justos»; la traducción debe mantener esa imagen humana y judicial. No se debe resolver la tensión interpretativa ampliando el sujeto a una referencia más específica que el texto no expresa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo de WLC y el audit trail inglés, sin cambios respecto del consenso alto del control cruzado. Se mantiene el paralelismo forense entre adulterio y derramamiento de sangre, y la imagen final de la sangre en las manos.
  spanish_consistency_notes:
  - Se conserva el tono legal-profético del pasaje con «juicio» en ambos miembros.
  - «Adúlteras» se usa de manera consistente para נֹאֲפוֹת.
  - No se sustituye la imagen de sangre en las manos por una explicación interpretativa dentro del texto principal.
  - El sujeto masculino plural «hombres justos» se mantiene para reflejar el hebreo explícito.
