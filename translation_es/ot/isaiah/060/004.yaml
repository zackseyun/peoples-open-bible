translation:
  language: es
  text: Alza tus ojos alrededor y mira; todos se han reunido; vienen a ti. Tus hijos varones vendrán de lejos, y tus hijas serán llevadas en la cadera[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al costado»; la expresión hebrea puede denotar que alguien es llevado a un lado del cuerpo, comúnmente entendido como en la cadera.
    reason: lexical_alternative
  - marker: b
    text: O «serán cuidadas» o «serán sostenidas»; el verbo puede llevar un matiz de atención o cuidado, aunque «serán llevadas» encaja mejor con la imagen inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאִי
  english_pob_choice: Lift up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Alza
  - Levanta en alto
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a Sion/Jerusalén personificada. «Levanta» es natural en español y conserva la acción de elevar la mirada sin volverla rebuscada.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todas partes
  lexicon: HALOT
  rationale: Expresa la idea distributiva de mirar en todas direcciones con una forma clara y actual en español.
- source_word: עֵינַיִךְ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus miradas
  lexicon: HALOT
  rationale: Mantiene el referente literal de los ojos en plural/dual con sufijo de segunda persona femenina singular.
- source_word: וּרְאִי
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y observa
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «see», en español «mira» funciona mejor con «levanta tus ojos» y preserva la secuencia imperativa sin sonar forzado.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos juntos
  lexicon: HALOT
  rationale: Conserva el énfasis total del pronombre explícito hebreo. En español puede expresarse de forma natural con «todos» sin perder el alcance universal.
- source_word: נִקְבְּצוּ
  english_pob_choice: gather together
  chosen_spanish: se han reunido
  alternatives_spanish:
  - se reúnen
  - están reunidos
  lexicon: HALOT
  rationale: El perfecto niphal puede leerse con valor profético de escena ya realizada. «Se han reunido» mantiene la imagen de congregación sin suavizarla a una simple descripción.
- source_word: בָּאוּ לָךְ
  english_pob_choice: they come to you
  chosen_spanish: vienen a ti
  alternatives_spanish:
  - han venido a ti
  - llegan a ti
  lexicon: HALOT
  rationale: Refleja el movimiento hacia Sion con un presente vivo, compatible con el uso profético del perfecto hebreo y la lectura auditada del POB.
- source_word: בָּנַיִךְ
  english_pob_choice: Your sons
  chosen_spanish: Tus hijos
  alternatives_spanish:
  - Tus hijos varones
  - Tus hijos, los varones
  lexicon: HALOT
  rationale: En español «hijos» puede abarcar varones e hijos en general, pero aquí conviene destacar el par masculino/femenino del verso. Aun así, la formulación «Tus hijos» deja abierto el valor de descendencia masculina sin sonar artificial.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - de muy lejos
  lexicon: HALOT
  rationale: Más idiomático en español para distancias lejanas; conserva la idea de retorno desde una gran distancia.
- source_word: יָבֹאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán a ti
  - llegarán
  lexicon: HALOT
  rationale: El imperfecto apunta al futuro de la promesa profética; «vendrán» comunica claramente esa expectativa.
- source_word: וּבְנֹתַיִךְ
  english_pob_choice: and your daughters
  chosen_spanish: y tus hijas
  alternatives_spanish:
  - y tus hijas mujeres
  lexicon: HALOT
  rationale: Mantiene el paralelo explícito entre varones y mujeres, sin neutralizar el género que el hebreo marca de forma intencional.
- source_word: עַל צַד
  english_pob_choice: on the hip
  chosen_spanish: al costado
  alternatives_spanish:
  - a un lado
  - sobre la cadera
  lexicon: HALOT
  rationale: El hebreo puede indicar llevar a alguien al lado del cuerpo; «al costado» conserva esa imagen sin imponer una sola localización anatómica cuando el español puede sonar demasiado técnico o estrecho. Se deja abierta la posibilidad de la lectura más concreta que el inglés POB anotó.
- source_word: תֵּאָמַנָה
  english_pob_choice: will be carried
  chosen_spanish: serán llevadas
  alternatives_spanish:
  - serán cuidadas
  - serán sostenidas
  lexicon: HALOT
  rationale: En este contexto el verbo transmite la idea de ser llevadas/cargadas o cuidadas. «Serán llevadas» conserva la imagen física y permite la ambigüedad documentada por el POB.
theological_decisions:
- issue: Pareja de género en la restauración de Sion
  english_pob_reading: Preserve 'sons' and 'daughters' rather than neutralizing to 'children.'
  chosen_spanish_reading: Conservar «hijos» y «hijas» como pareja explícita.
  alternative_spanish_readings:
  - «niños y niñas»
  - «descendencia»
  rationale: El hebreo nombra intencionalmente la descendencia masculina y femenina en paralelo. El español debe conservar esa especificidad para no diluir la imagen de restauración completa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Aspecto verbal profético
  english_pob_reading: Render the opening perfects with vivid present ('gather together; they come') and the later imperfects with future ('will come; will be carried').
  chosen_spanish_reading: Usar un perfecto/resultativo en «se han reunido» y presente dinámico en «vienen», con futuro en «vendrán» y «serán llevadas».
  alternative_spanish_readings:
  - Poner todo en futuro
  - Poner todo en pasado
  rationale: Esta combinación preserva la inmediatez profética del cuadro inicial y la orientación futura de la segunda mitad, sin aplanar los matices aspectuales del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado mínimamente: se sustituyó el colon tras «see» por punto y coma para paralelismo formal. La solución española sigue esa lectura global: mantiene la secuencia imperativa inicial, la escena de reunión y llegada en presente, y el movimiento futuro de hijos e hijas. También conserva la tensión lexical de עַל צַד תֵּאָמַנָה con una traducción principal concreta («al costado» / «serán llevadas») y una nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Sion/Jerusalén en segunda persona singular femenina.
  - Se conserva la pareja «hijos / hijas» para reflejar el paralelismo hebreo.
  - «Yahvé» no aparece en este versículo, por lo que no hay decisión onomástica que aplicar.
  - La puntuación con punto y coma reproduce la segmentación auditada del inglés POB.
  - Las notas a y b están ancladas en las expresiones correspondientes y no se reutilizan.
