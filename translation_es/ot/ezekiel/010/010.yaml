translation:
  language: es
  text: En cuanto a su apariencia[a], los cuatro tenían una misma semejanza, como cuando una rueda está dentro de otra rueda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su aspecto»; el hebreo puede referirse a la apariencia visible o a la forma observada.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como cuando la rueda está dentro de la rueda». En español se usa «una rueda ... otra rueda» para expresar el símil con naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַרְאֵיהֶם
  english_pob_choice: As for their appearance
  chosen_spanish: En cuanto a su apariencia
  alternatives_spanish:
  - Y su apariencia
  - Su apariencia
  lexicon: HALOT
  rationale: מַרְאֶה puede significar ‘apariencia’ o ‘forma visible’. El prefijo conjuntivo se vierte aquí con una expresión topicalizadora natural en español, ‘En cuanto a’, para introducir la descripción sin perder la función discursiva del hebreo.
- source_word: דְּמוּת אֶחָד
  english_pob_choice: one likeness
  chosen_spanish: una misma semejanza
  alternatives_spanish:
  - una sola semejanza
  - la misma semejanza
  - una forma única
  lexicon: HALOT
  rationale: דְּמוּת expresa semejanza, forma o apariencia. Unido a אֶחָד, el sentido es que las cuatro compartían una misma configuración; ‘una misma semejanza’ conserva la uniformidad y evita estrecharlo prematuramente a ‘forma’.
- source_word: לְאַרְבַּעְתָּם
  english_pob_choice: the four of them
  chosen_spanish: las cuatro
  alternatives_spanish:
  - para las cuatro
  - de las cuatro
  lexicon: HALOT
  rationale: La frase distribuye la única semejanza entre los cuatro seres. En español, ‘las cuatro’ comunica con naturalidad el sujeto colectivo y mantiene el sentido distributivo.
- source_word: כַּאֲשֶׁר יִהְיֶה
  english_pob_choice: as when ... is
  chosen_spanish: como cuando ... está
  alternatives_spanish:
  - como cuando ... es
  - así como ... está
  lexicon: HALOT
  rationale: El comparativo introduce una analogía visual. ‘Como cuando ... está’ suena natural en español y preserva la imagen presente del pasaje, sin forzar una literalidad torpe.
- source_word: הָאוֹפַן
  english_pob_choice: a wheel
  chosen_spanish: una rueda
  alternatives_spanish:
  - la rueda
  lexicon: HALOT
  rationale: Aunque el hebreo tiene artículo, en una comparación del español es más natural el indefinido. ‘Una rueda’ mantiene la imagen de la visión sin cargarla de artículo innecesario.
- source_word: בְּתוֹךְ הָאוֹפָן
  english_pob_choice: within a wheel
  chosen_spanish: dentro de otra rueda
  alternatives_spanish:
  - dentro de una rueda
  - en medio de una rueda
  lexicon: HALOT
  rationale: בְּתוֹךְ significa ‘dentro’ o ‘en medio de’. En español, ‘dentro de otra rueda’ reproduce el efecto idiomático de la comparación inglesa y comunica con claridad la imagen de rueda dentro de rueda.
translation_notes:
  revision_awareness: El texto base en inglés ya refleja una lectura consensuada y la revisión más reciente no introdujo cambios. La única tensión principal es cómo verter דְּמוּת אֶחָד y la comparación de la rueda dentro de la rueda; se conserva la fuerza visual del hebreo con un español natural y auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se evita «Cristo» porque no aparece terminología mesiánica en este versículo.
  - Se usa «semejanza» para דְּמוּת, manteniendo la distinción frente a otros términos como ‘forma’ o ‘aspecto’.
  - La comparación final conserva la imagen repetida de rueda dentro de rueda sin añadir interpretación simbólica.
