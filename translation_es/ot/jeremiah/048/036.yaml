  text: עַל כֵּ֞ן לִבִּ֤/י לְ/מוֹאָב֙ כַּ/חֲלִלִ֣ים יֶהֱמֶ֔ה וְ/לִבִּ/י֙ אֶל אַנְשֵׁ֣י קִֽיר חֶ֔רֶשׂ כַּ/חֲלִילִ֖ים יֶהֱמֶ֑ה עַל כֵּ֛ן יִתְרַ֥ת עָשָׂ֖ה אָבָֽדוּ־־־־׃
base_translation:
