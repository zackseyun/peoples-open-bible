  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios. 'Joás' está bien para יוֹאָשׁ. El principal desajuste terminológico es יְהוֹאָחָז, que no debe renderizarse como 'Jehúaz'. La nota actual también justifica una forma incorrecta y debe corregirse.
