  to: 'Pero su padre y su madre le dijeron: «¿No hay mujer entre las hijas de tus hermanos[a] o entre todo mi pueblo, para que vayas a tomar mujer de los filisteos incircuncisos?» Pero Sansón dijo a su padre: «Tómala para mí, porque ella es recta a mis ojos[b]».'
