translation:
  language: es
  text: Y los hijos de Israel no se acordaron de Yahvé, su Dios[a], que los había librado de la mano de todos sus enemigos que los rodeaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: And ... did not
  chosen_spanish: Y ... no
  alternatives_spanish:
  - Pero ... no
  - Y ... no se
  lexicon: HALOT
  rationale: La conjunción continúa el flujo narrativo del relato; en español, «Y» conserva la secuencia, y la negación con «no» reproduce el valor simple de la partícula negativa.
- source_word: זָכְרוּ
  english_pob_choice: remember
  chosen_spanish: se acordaron
  alternatives_spanish:
  - recordaron
  - tuvieron presente
  lexicon: HALOT
  rationale: El verbo hebreo implica no solo memoria mental sino también una respuesta relacional o pactal; «se acordaron» comunica bien esa idea en español sin perder naturalidad.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma literal y masculina plural del hebreo. «Hijos de Israel» es transparente en español y mantiene la marcación léxica que el POB inglés preserva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: se usa la transliteración castellana «Yahvé» en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - su Dios y Señor
  lexicon: HALOT
  rationale: Con YHWH como referente, la forma plural hebrea funciona como título singular de pacto; «su Dios» expresa la relación posesiva sin introducir un cambio de sentido.
- source_word: הַמַּצִּיל
  english_pob_choice: who had delivered
  chosen_spanish: que los había librado
  alternatives_spanish:
  - que los había salvado
  - que los libraba
  lexicon: HALOT
  rationale: El participio con artículo identifica a Yahvé por su acción salvadora. «Había librado» reproduce la idea bíblica de liberación y se ajusta bien al perfecto anterior a la ingratitud descrita.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la «mano» como poder o control, fiel al hebreo y natural en español bíblico contemporáneo.
- source_word: כָּל אֹיְבֵיהֶם
  english_pob_choice: all their enemies
  chosen_spanish: de todos sus enemigos
  alternatives_spanish:
  - de todos sus adversarios
  - de todos sus enemigos
  lexicon: HALOT
  rationale: La expresión totalizante se traduce de manera directa y clara; «enemigos» corresponde de forma precisa al sustantivo hebreo.
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: «Alrededor» comunica la idea espacial de rodear sin caer en un giro arcaico; en español actual preserva el sentido de encierro por enemigos circundantes.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo nombra directamente al Tetragrámaton. Se mantiene la decisión doctrinal del POB de no sustituir el nombre divino por un título, usando la forma española establecida «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor covenantal de «recordar»
  english_pob_reading: remember
  chosen_spanish_reading: se acordaron
  alternative_spanish_readings:
  - recordaron
  - tuvieron presente
  rationale: Aquí «recordar» no es mera memoria intelectual, sino fidelidad al Dios que había actuado por ellos. «Se acordaron» conserva la tensión teológica de una omisión relacional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: lexical/theological tension should not be erased'
- issue: Designación corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina plural del hebreo, en línea con la política de precisión de género del proyecto. La alternativa más idiomática queda implícita en la comprensión, no en la traducción principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El contexto inglés ya estaba en alta concordancia y no requería revisiones materiales; esta versión española sigue el mismo perfil de equivalencia óptima, preservando el nombre divino, la imagen de la mano y la designación masculina plural del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «hijos de Israel» para reflejar la forma hebrea masculina plural y su valor textual.
  - «Se acordaron» y «había librado» preservan la carga relacional y salvífica del verbo זכר y del participio הַמַּצִּיל.
