    rationale: Aunque intenta reflejar la idea de repetición cesada en יָסַף עוֹד לְהֵרָאֹה, en español estándar «aparecer» no suele usarse aquí con el clítico «se». «No volvió a aparecer» transmite el mismo valor con mejor legibilidad y dignidad.
  revised_spanish_text: Y el ángel de Yahvé[a] no volvió a aparecer a Manoa y a su esposa. Entonces Manoa supo que él era el ángel de Yahvé.
  revised_footnotes:
