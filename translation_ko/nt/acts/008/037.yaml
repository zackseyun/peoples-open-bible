base_translation:
  language: en
  yaml_path: translation/nt/acts/008/037.yaml
  text: And Philip[a] said, “If you believe with all your heart, you may.” And he answered and said, “I believe that Jesus is the Messiah, the Son of God.”
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 3rd-century papyri and the 4th-century Sinaiticus and Vaticanus) and early Coptic translations. It is present in the Byzantine majority tradition and the Latin tradition, and was cited by early church fathers like Irenaeus and Cyprian in the late 2nd century. It is often described by scholars as an early baptismal liturgical formula that was later incorporated into the narrative text of Acts.
    reason: textual_critical
