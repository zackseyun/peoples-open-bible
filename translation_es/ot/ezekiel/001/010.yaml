translation:
  language: es
  text: 'En cuanto a la semejanza de sus rostros: cada uno tenía rostro humano; los cuatro tenían rostro de león a la derecha, los cuatro tenían rostro de buey a la izquierda, y los cuatro tenían rostro de águila[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "buitre" para "águila"; el hebreo nesher puede referirse en sentido más amplio a un ave grande de rapiña.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  english_pob_choice: As for the likeness of
  chosen_spanish: En cuanto a la semejanza de
  alternatives_spanish:
  - Y la semejanza de
  - En cuanto al aspecto de
  lexicon: HALOT
  rationale: דְּמוּת expresa semejanza o apariencia. En español, "En cuanto a la semejanza de" conserva el valor introductorio descriptivo sin añadir interpretación.
- source_word: פְּנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  lexicon: HALOT
  rationale: פָּנִים se refiere aquí a los rasgos/rostros visibles. "Rostros" es digno y natural en un contexto visionario.
- source_word: פְּנֵי אָדָם
  english_pob_choice: a human face
  chosen_spanish: rostro humano
  alternatives_spanish:
  - rostro de hombre
  - cara humana
  lexicon: HALOT
  rationale: אָדָם puede significar hombre o humanidad según el contexto. Aquí la contraposición es entre rostro humano y rostros animales; "rostro humano" preserva esa fuerza sin imponer especificidad masculina.
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: león
  lexicon: HALOT
  rationale: El sentido léxico normal es "león". En español, el sustantivo en constructo se expresa de forma natural como "rostro de león".
- source_word: אֶל הַיָּמִין
  english_pob_choice: on the right side
  chosen_spanish: a la derecha
  alternatives_spanish:
  - hacia la derecha
  - del lado derecho
  lexicon: HALOT
  rationale: La frase sitúa ese rostro en el lado derecho. "A la derecha" es idiomático y claro en español.
- source_word: לְאַרְבַּעְתָּם / לְאַרְבַּעְתָּן
  english_pob_choice: the four had
  chosen_spanish: los cuatro tenían
  alternatives_spanish:
  - para los cuatro
  - de los cuatro
  lexicon: HALOT
  rationale: La expresión distributiva indica que la descripción vale para los cuatro seres. "Los cuatro tenían" es la forma más natural y fiel en español.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - ox
  lexicon: HALOT
  rationale: שׁוֹר designa un bovino de trabajo; en español bíblico, "buey" comunica bien esa referencia y suena natural en una lista visionaria.
- source_word: מֵהַשְּׂמֹאול
  english_pob_choice: on the left side
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - del lado izquierdo
  - hacia la izquierda
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente "de/desde", aquí tiene valor locativo. "A la izquierda" comunica la posición con claridad.
- source_word: נֶשֶׁר
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - buitre
  lexicon: HALOT
  rationale: נֶשֶׁר suele traducirse "águila" en textos proféticos y visionarios. Se mantiene como término principal por ser el más convencional y adecuado al contexto.
theological_decisions:
- issue: ָאָדָם en una descripción de criaturas visionarias
  english_pob_reading: human face
  chosen_spanish_reading: rostro humano
  alternative_spanish_readings:
  - rostro de hombre
  - cara humana
  rationale: Se evita una lectura masculinizada innecesaria. El contraste del texto es entre lo humano y lo animal, no entre varón y animal; "rostro humano" preserva esa distinción.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)''.'
- issue: נֶשֶׁר como 'águila' con posible sentido más amplio de ave de rapiña
  english_pob_reading: eagle with footnote noting vulture as alternative
  chosen_spanish_reading: águila con nota sobre 'buitre' como alternativa posible
  alternative_spanish_readings:
  - buitre
  rationale: Se conserva "águila" como traducción principal, pero se documenta la posibilidad léxica de un ave de rapiña más amplia, tal como lo hace el registro inglés.
  doctrine_reference: HALOT; nota léxica sobre el alcance semántico de נֶשֶׁר.
translation_notes:
  revision_awareness: El registro inglés revisado quedó sin cambios en el pase más reciente; se siguió la lectura estable de alta concordancia, manteniendo la nota lexical sobre נֶשֶׁר y la distinción antropológica de אָדָם.
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando el hebreo fuente lo requiriera explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se prefirió "rostro" por coherencia con la imaginería corporal del texto y con el plural distributivo de פְּנֵי.
  - Se evitó "Señor" o lenguaje eclesiástico añadido, porque no hay base textual para ello en este versículo.
