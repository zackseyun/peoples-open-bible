review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: los egipcios presionan a Israel para que salga rápidamente de la tierra, y la razón es su percepción de muerte generalizada. Sin embargo, hay dos puntos de alineación mejorables: «echarlos» es más brusco y expulsivo que שׁלח en este contexto, donde «hacerlos salir» o «enviarlos fuera» conserva mejor el matiz de despachar/sacar; y «decían» diluye innecesariamente el qatal narrativo אָמְרוּ, que aquí funciona mejor como «dijeron».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse en dignidad y precisión. «Urgían al pueblo» suena algo calcado; «apremiaban al pueblo» o «urgían al pueblo a salir» sería más idiomático. Además, «Todos nosotros somos hombres muertos» es comprensible pero pesado y poco natural; «Todos somos hombres muertos» conserva el giro idiomático con mejor fluidez.
  glossary_alignment: No hay términos teológicos de proyecto implicados. La terminología principal está mayormente bien. La excepción es «echarlos», que se aparta de la rationale auditada para לְשַׁלְּחָם («send them out») y conviene acercarla a «hacerlos salir».
  issues:
  - severity: medium
    issue: «a echarlos de la tierra» sobrerrefuerza expulsión
    rationale: שׁלח aquí se auditó como «send them out», no necesariamente «echar»/«expulsar». En español bíblico neutral, «hacerlos salir de la tierra» preserva mejor el valor direccional sin añadir aspereza semántica.
  - severity: medium
    issue: «decían» debilita la secuencia narrativa
    rationale: El hebreo אָמְרוּ es qatal simple en una cláusula causal narrativa. «Dijeron» refleja mejor el evento puntual que motiva la urgencia.
  - severity: low
    issue: «Todos nosotros somos hombres muertos» suena pesado
    rationale: Aunque fiel en componentes, el orden es menos idiomático en español. «Todos somos hombres muertos» mantiene el sentido y mejora la legibilidad.
  revised_spanish_text: 'Y los egipcios apremiaban al pueblo[a], apresurándose a hacerlos salir de la tierra, porque dijeron: «Todos somos hombres muertos».'
  revised_footnotes:
  - marker: a
    text: O «apremiando al pueblo para hacerlos salir de la tierra». El hebreo usa dos infinitivos seguidos para expresar una prisa intensa.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a un español más natural para presión urgente («apremiaban»), se reemplaza «echarlos» por «hacerlos salir» para alinearlo mejor con שׁלח y con la rationale del POB, se cambia «decían» por «dijeron» para reflejar mejor el hebreo narrativo, y se aligera la frase final a «Todos somos hombres muertos» sin perder el giro idiomático.
