translation:
  language: es
  text: Y los extranjeros que estaban en las fortalezas que había construido Báquides huyeron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron huyendo
  - escaparon
  lexicon: BDAG
  rationale: El aoristo de φεύγω expresa huida; «huyeron» reproduce bien el movimiento de retirada sin añadir matices de escape técnico o prolongado.
- source_word: ἀλλογενεῖς
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - gentiles
  - de otra raza
  - alógenos
  lexicon: LSJ
  rationale: En este contexto militar-histórico, el término señala a personas de otro pueblo. «Extranjeros» conserva la idea de alteridad étnica/política sin introducir el matiz teológico que a veces tiene «gentiles».
- source_word: ὀχυρώμασιν
  english_pob_choice: strongholds
  chosen_spanish: baluartes
  alternatives_spanish:
  - fortalezas
  - plazas fortificadas
  lexicon: LSJ
  rationale: ὀχύρωμα se refiere a una posición fortificada. «Baluartes» es un término natural en español para una obra defensiva y conserva el tono militar del pasaje.
- source_word: οἷς οἰκοδόμησεν
  english_pob_choice: that Bacchides had built
  chosen_spanish: que Bacquides había construido
  alternatives_spanish:
  - que Bacquides construyó
  lexicon: BDAG
  rationale: El pluscuamperfecto en español refleja bien que la construcción precede a la huida dentro de la secuencia narrativa. «Construido» mantiene el sentido de οἰκοδομέω sin sobreinterpretarlo como una obra específica.
- source_word: Βακχίδης
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Báquides
  lexicon: Proyecto de transliteración
  rationale: Se conserva la transliteración de nombre propio conforme a la política del proyecto. «Bacquides» es la forma más reconocible y estable en español bíblico.
