translation:
  language: es
  text: ¿Por qué nos azotas? Si ellos han muerto[a], ¡vete con ellos! ¡Que nunca veamos de ti un hijo o una hija por siempre!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente por implicación: «vete a morir con ellos». El griego dice solo «vete con ellos», pero aquí están en vista los maridos muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαστιγοῖς
  english_pob_choice: flog
  chosen_spanish: azotas
  alternatives_spanish:
  - golpeas
  - flagelas
  - azotas con látigo
  lexicon: LSJ
  rationale: El verbo griego expresa golpear con látigo o escarmentar con violencia. «Azotar» comunica bien el trato abusivo en español actual sin sonar demasiado técnico; conserva la fuerza insultante del reproche.
- source_word: βάδιζε μετʼ αὐτῶν
  english_pob_choice: go with them
  chosen_spanish: vete con ellos
  alternatives_spanish:
  - anda con ellos
  - ve con ellos
  - váyete con ellos
  lexicon: LSJ
  rationale: El imperativo pide ir con ellos, y en el contexto la frase alude de manera implícita a unirse a los esposos muertos. «Vete con ellos» es natural en español y conserva la ambigüedad contextual sin explicitar más de lo que dice el griego.
- source_word: μὴ ἴδωμέν
  english_pob_choice: May we never see
  chosen_spanish: ¡Que nunca veamos!
  alternatives_spanish:
  - No veamos jamás
  - Ojalá no veamos nunca
  - Que no veamos
  lexicon: LSJ
  rationale: La construcción con μή y subjuntivo tiene fuerza de deseo o imprecación. «¡Que nunca veamos!» reproduce ese tono de maldición/anátema mejor que una mera negación descriptiva.
- source_word: σου υἱὸν ἢ θυγατέρα
  english_pob_choice: from you a son or daughter
  chosen_spanish: de ti un hijo o una hija
  alternatives_spanish:
  - tu hijo o tu hija
  - un hijo o una hija tuyos
  - de tu parte un hijo o una hija
  lexicon: LSJ
  rationale: El genitivo σου puede sonar posesivo en español, pero aquí el sentido es el de descendencia procedente de ella. «De ti» mantiene esa relación de procedencia que el audit trail inglés quiso preservar con «from you».
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por la eternidad
  - jamás
  lexicon: LSJ
  rationale: En este contexto imprecatorio, «por siempre» conserva la duración absoluta del giro griego y suena más solemne que «jamás» al unirlo con la maldición previa.
theological_decisions:
- issue: Alusión implícita a la muerte en «vete con ellos»
  english_pob_reading: The line is rendered as a hostile wish that Sarah join her dead husbands in death, without making the implication more explicit in the main text.
  chosen_spanish_reading: La traducción mantiene «vete con ellos» sin añadir «muérete con ellos» ni otra explicitación, dejando que el contexto de los maridos fallecidos sostenga la implicación.
  alternative_spanish_readings:
  - ¡ve a morir con ellos!
  - ¡vete a morir con ellos!
  rationale: El griego solo dice «ve con ellos». Explicitar la muerte en el cuerpo principal añadiría material no presente en el texto fuente. La ambigüedad hostil debe permanecer auditable.
  doctrine_reference: 'Principio POB: no paraphrase beyond what the source text warrants; preserve tensions and implicatures in translation.'
- issue: Fuerza imprecatoria del subjuntivo con μή
  english_pob_reading: May we never see a son or daughter from you forever.
  chosen_spanish_reading: «¡Que nunca veamos de ti un hijo o una hija por siempre!» conserva la forma de deseo negativo o maldición.
  alternative_spanish_readings:
  - No queremos ver jamás de ti un hijo o una hija.
  - Que no veamos nunca de ti un hijo o una hija.
  rationale: El griego expresa una maldición, no solo una afirmación sobre el futuro. El español debe sonar como imprecación y no diluirse en una simple negación proposicional.
  doctrine_reference: Principio POB sobre el mantenimiento de la fuerza retórica y teológica del original.
translation_notes:
  revision_awareness: Se sigue de cerca el pasaje griego de Tobit 3:9 y el audit trail inglés. Se conservó la secuencia interrogación + imperativo + imprecación, se mantuvo la alusión implícita a la muerte sin añadirla al texto principal, y se reflejó el valor durativo de εἰς τὸν αἰῶνα con una expresión española solemne. La nota reproduce la alternativa explícita documentada por el POB inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología general del proyecto, aunque este versículo no contiene el tetragrámaton ni un título divino.
  - Se prefirió «azotas» para μαστιγοῖς por su naturalidad y fuerza, manteniendo el tono insultante.
  - «Vete con ellos» conserva la ambigüedad contextual; la explicación queda en la nota, no en el cuerpo del verso.
  - «De ti» intenta reflejar la procedencia de la descendencia, en línea con la decisión inglesa de conservar el matiz relacional de σου.
