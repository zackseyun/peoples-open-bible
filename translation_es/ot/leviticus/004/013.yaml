    changes_summary: Added the missing subject 'they' before 'do' for grammatical completeness, and revised 'one of the things' to 'one of all the things' to more closely reflect the source phrase מִכָּל מִצְוֺת while keeping formal natural English.
translation:
  language: es
  text: Y si toda la congregación de Israel peca involuntariamente[a], y el asunto queda oculto[b] a los ojos de la asamblea, y hacen una de todas las cosas que Yahvé ha mandado que no se hagan, y se hacen culpables,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘toda la comunidad de Israel’. El verbo hebreo aquí se refiere a pecado cometido involuntariamente o por error, no a rebeldía deliberada.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘y el asunto queda oculto de los ojos de la asamblea’, un giro idiomático que indica que el hecho pasó inadvertido para la comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדַת יִשְׂרָאֵל
  english_pob_choice: the whole congregation of Israel
  chosen_spanish: toda la congregación de Israel
  alternatives_spanish:
  - toda la comunidad de Israel
  - toda la asamblea de Israel
  lexicon: HALOT
  rationale: ‘Congregación’ conserva bien el sentido cultual y colectivo de עֲדָה en este marco legal; ‘toda’ refleja כָּל. Se evita sustituirlo por un término más eclesiástico que no sea tan cercano al valor comunitario del hebreo.
- source_word: יִשְׁגּוּ
  english_pob_choice: sins unintentionally
  chosen_spanish: yerra
  alternatives_spanish:
  - peca involuntariamente
  - se desvía
  lexicon: HALOT
  rationale: El hebreo שׁגה en este contexto legal habla de error o desvío no deliberado. En español, ‘yerra’ mantiene esa idea de equivocación sin introducir todavía una explicación interpretativa en el texto principal.
- source_word: וְנֶעְלַם דָּבָר
  english_pob_choice: the matter is hidden
  chosen_spanish: el asunto queda oculto
  alternatives_spanish:
  - la cosa queda oculta
  - el asunto pasa inadvertido
  lexicon: HALOT
  rationale: ‘Asunto’ hace natural el hebreo דָּבָר en este contexto y ‘queda oculto’ preserva la pasividad del giro. La elección evita sonar demasiado literaria sin perder el paralelismo legal.
- source_word: מֵעֵינֵי הַקָּהָל
  english_pob_choice: from the eyes of the assembly
  chosen_spanish: a los ojos de la asamblea
  alternatives_spanish:
  - de los ojos de la asamblea
  - a la vista de la asamblea
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de ‘ojos’ como percepción, siguiendo la solución auditada en inglés. En español, ‘a los ojos de’ suena más natural que un calco rígido y mantiene la idea de que el hecho no llegó al conocimiento de la comunidad.
- source_word: וְעָשׂוּ אַחַת מִכָּל מִצְוֺת יְהוָה
  english_pob_choice: they do one of all the things that Yahweh has commanded not to be done
  chosen_spanish: hacen una de todas las cosas que Yahvé ha mandado que no se hagan
  alternatives_spanish:
  - hacen una de las cosas que Yahvé ha mandado que no se hagan
  - cometen una de todas las cosas que Yahvé ha mandado no hacer
  lexicon: HALOT
  rationale: La construcción hebrea expresa realizar uno de los actos prohibidos dentro del conjunto de mandamientos. ‘Una de todas las cosas’ sigue de cerca el valor de מִכָּל, y ‘que no se hagan’ conserva la prohibición pasiva del hebreo sin forzar una formulación más abstracta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’. Esta forma es reconocible en español bíblico moderno y preserva el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  english_pob_choice: that should not be done
  chosen_spanish: que no se hagan
  alternatives_spanish:
  - que no deben hacerse
  - que no han de hacerse
  lexicon: HALOT
  rationale: El pasivo prohibitivo hebreo se traduce con una forma impersonal natural en español. ‘Que no se hagan’ evita una perícasis más dura y mantiene la fuerza normativa.
- source_word: וְאָשֵׁמוּ
  english_pob_choice: they become guilty
  chosen_spanish: quedan culpables
  alternatives_spanish:
  - se hacen culpables
  - incurren en culpa
  lexicon: HALOT
  rationale: אָשֵׁם expresa quedar en estado de culpa o responsabilidad. ‘Quedan culpables’ transmite el resultado jurídico del acto sin adelantar la terminología de expiación ni suavizar la carga legal del verbo.
theological_decisions:
- issue: La falta descrita por שׁגה en el contexto sacrificial
  english_pob_reading: unintentional sin
  chosen_spanish_reading: error no deliberado implícito en ‘yerra’
  alternative_spanish_readings:
  - pecado involuntario
  - error
  rationale: En Levítico 4 la categoría es la del pecado cometido por error, no la rebelión abierta. En el texto español se deja la carga semántica en ‘yerra’, mientras que la nota textual permite explicitar el matiz de inadvertencia sin sobretraducir el versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto conforme a la norma del proyecto y al texto hebreo directo. No se reemplaza por un título, porque el versículo nombra explícitamente a YHWH en la legislación sacrificial.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que completó la estructura de ‘they do’ y afinó ‘one of all the things’. En español se reflejó esa relación partitiva con ‘una de todas las cosas’ y se mantuvo la claridad gramatical del sujeto explícito ‘hacen’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma uniforme del nombre divino.
  - ‘Congregación’ y ‘asamblea’ distinguen de modo consistente עֲדָה y הַקָּהָל.
  - Se preserva la distinción entre el error inadvertido del verbo שׁגה y la culpa resultante de אָשֵׁם.
  - El texto evita lenguaje eclesiástico tradicional que oscurezca el marco legal levítico.
