lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Construyó
  lexicon: HALOT
  rationale: El wayyiqtol de עשה expresa acción narrativa simple. En español, «hizo» conserva la forma verbal breve y natural sin añadir una conjunción innecesaria que el estilo castellano puede omitir.
- source_word: לַבָּיִת
  english_pob_choice: for the house
  chosen_spanish: para la casa
  alternatives_spanish:
  - en la casa
  - para el templo
  lexicon: HALOT
  rationale: 'El hebreo usa בית en contexto del templo, pero «casa» preserva el término de base y su sentido arquitectónico. La preposición ל con עשה se entiende mejor aquí como finalidad: algo hecho para la casa.'
- source_word: חַלּוֹנֵי
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - aberturas de ventana
  lexicon: HALOT
  rationale: La forma constructa plural de חלון se refiere a ventanas; «ventanas» es la equivalencia natural y clara en español.
- source_word: שְׁקֻפִים
  english_pob_choice: with recessed frames
  chosen_spanish: con marcos hundidos
  alternatives_spanish:
  - con marcos rehundidos
  - con marcos biselados
  - con marcos estrechados
  lexicon: HALOT
  rationale: El término arquitectónico es raro y de sentido incierto. «Marcos hundidos» comunica una forma reentrante o retranqueada sin sobreprecisar una reconstrucción técnica que el hebreo no permite asegurar.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que eliminó una predicación adicional sobre «cerradas» porque el hebreo probablemente describe las ventanas mismas con un rasgo arquitectónico, no añade una frase verbal aparte. Por eso el español evita toda referencia secundaria a que estuvieran «cerradas» o «selladas».
  spanish_consistency_notes:
  - Se mantiene «casa» en lugar de «templo» para conservar la imagen y el término hebreo de base, aunque el contexto sea el santuario.
  - Se eligió una solución adjetival/frasal breve («con marcos hundidos») para reflejar la rareza lexical sin introducir tecnicismos no demostrados.
