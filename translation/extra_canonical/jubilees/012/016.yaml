  text: two weeks of years[a]. And in the sixth week, in its fifth year, Abram sat up through the night at the beginning of the seventh month to observe the stars from evening until dawn, to see what would be the character of the year with respect to the rains. And he was there alone, sitting and observing, and a word came into his heart, and he said[a], “All the signs of the stars and their signs...
