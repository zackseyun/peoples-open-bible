translation:
  language: es
  text: pero ustedes ignoraron todo mi consejo[a], y no quisieron aceptar mi reprensión[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Consejo» traduce עֲצָה con el sentido de guía sabia; también podría entenderse como «orientación» o «plan», pero el contexto sapiencial favorece «consejo».
    reason: lexical_alternative
  - marker: b
    text: «Reprensión» conserva la fuerza correctiva de תוֹכַחַת; otras opciones posibles son «corrección», «amonestación» o «reproche».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְרְעוּ
  english_pob_choice: you ignored
  chosen_spanish: ignoraron
  alternatives_spanish:
  - descuidaron
  - dejaron de lado
  - rechazaron
  lexicon: HALOT
  rationale: פרע en este contexto expresa dejar de lado o no atender algo, no un acto físico. «Ignoraron» comunica con naturalidad y claridad el desprecio deliberado por el consejo, alineado con la decisión inglesa de evitar una lectura demasiado fuerte como «rechazaron».
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - todas las
  lexicon: HALOT
  rationale: El cuantificador total se refleja de forma natural con «todo» antes de un sustantivo singular colectivo como «consejo».
- source_word: עֲצָתִי
  english_pob_choice: my counsel
  chosen_spanish: mi consejo
  alternatives_spanish:
  - mi consejo sabio
  - mi orientación
  - mi plan
  lexicon: HALOT
  rationale: עֵצָה suele significar consejo u orientación sabia. «Consejo» conserva el registro sapiencial y es más natural en español que «consejo» en sentido más jurídico o «plan», que sería demasiado específico.
- source_word: וְתוֹכַחְתִּי
  english_pob_choice: my reproof
  chosen_spanish: mi reprensión
  alternatives_spanish:
  - mi corrección
  - mi reproche
  - mi amonestación
  lexicon: HALOT
  rationale: תוֹכַחַת en Proverbios suele ser reprensión correctiva. «Reprensión» preserva esa fuerza disciplinaria y se mantiene cerca del tono del término hebreo sin suavizarlo demasiado.
- source_word: לֹא אֲבִיתֶם
  english_pob_choice: you were unwilling to accept
  chosen_spanish: no quisieron aceptar
  alternatives_spanish:
  - no estaban dispuestos a aceptar
  - se negaron a aceptar
  - no quisieron recibir
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o disposición. En forma negativa, el sentido es no estar dispuesto / no querer. «No quisieron aceptar» conserva el componente volitivo y suena fluido en español, sin perder la idea de resistencia interna.
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente, que añadió «but» al inicio para reflejar mejor el valor adversativo del וַ inicial; por eso se traduce con «pero».
  spanish_consistency_notes:
  - Se conserva el paralelismo de dos miembros con una pausa fuerte antes del guion largo final.
  - Se prefiere «mi consejo» frente a «mi sabio consejo» para evitar redundancia en español y mantener la concisión sapiencial.
  - No se introduce «SEÑOR» ni otros equivalentes teológicos porque el versículo no contiene el nombre divino.
