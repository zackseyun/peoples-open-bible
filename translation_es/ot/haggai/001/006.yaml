base_translation:
  language: en
  yaml_path: translation/ot/haggai/001/006.yaml
  text: You have sown much[a], but brought in little. You eat, but there is not enough to be satisfied; you drink, but there is not enough to be filled; you clothe yourselves, but no one is warm[c][b]; and the one who earns wages earns them for a bag with holes.
  footnotes:
  - marker: a
    text: Or 'but harvested little.' The Hebrew is literally 'but brought in little,' an idiom for meager agricultural return.
    reason: lexical_alternative
  - marker: b
    text: Or 'you drink, but not to drunkenness.' The Hebrew specifically refers to becoming intoxicated, not merely to thirst being quenched.
    reason: lexical_alternative
  - marker: c
    text: Literally 'but there is no warmth for him.' The singular pronoun has a generic sense.
    reason: lexical_alternative
