translation:
  language: es
  text: Y toda carne[a] sabrá que yo, Yahvé, he sacado mi espada de su vaina; ya no volverá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda la humanidad' o 'todas las personas'; literalmente, 'toda carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָֽדְעוּ / וְיָדְעוּ
  english_pob_choice: And ... will know
  chosen_spanish: sabrá
  alternatives_spanish:
  - conocerá
  - llegará a saber
  lexicon: HALOT
  rationale: En el hebreo profético, la forma con וְ suele expresar resultado futuro; en español, el futuro simple comunica naturalmente esa certeza. Elegí el singular impersonal concordando con el sujeto colectivo 'todo ser humano'.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: todo ser humano
  alternatives_spanish:
  - toda carne
  - toda la humanidad
  - todas las personas
  lexicon: HALOT
  rationale: Mantuve el valor idiomático universal sin volverlo una traducción rígida. 'Todo ser humano' conserva la amplitud de 'all flesh' y su fuerza inclusiva en español, evitando una expresión que hoy puede sonar demasiado literal o extraña en lectura pública.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton es 'Yahvé' en el texto principal español. Conserva el nombre divino personal y evita la sustitución por un título.
- source_word: הוֹצֵאתִי
  english_pob_choice: have drawn
  chosen_spanish: he sacado
  alternatives_spanish:
  - he desenvainado
  - he extraído
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'he hecho salir'; en este contexto, con 'espada' y 'vaina', 'he sacado' reproduce la imagen con naturalidad. 'Desenvainado' sería muy preciso, pero 'sacado' sigue más de cerca el verbo base del hebreo.
- source_word: חַרְבִּי
  english_pob_choice: my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - mi arma
  - mi espada de guerra
  lexicon: HALOT
  rationale: Correspondencia directa y transparente; 'espada' es el equivalente normal y conserva el objeto concreto del juicio.
- source_word: מִתַּעְרָהּ
  english_pob_choice: from its sheath
  chosen_spanish: de su vaina
  alternatives_spanish:
  - de su funda
  - de su estuche
  lexicon: HALOT
  rationale: '''Vaina'' es el término natural en español para la cubierta de una espada. Mantiene el paralelismo con la imagen bélica del hebreo.'
- source_word: לֹא תָשׁוּב עוֹד
  english_pob_choice: it will not return again
  chosen_spanish: no volverá nunca más
  alternatives_spanish:
  - no volverá de nuevo
  - ya no volverá
  lexicon: HALOT
  rationale: El hebreo niega el retorno con énfasis de permanencia. 'Nunca más' transmite bien לֹא ... עוֹד sin exagerar más allá de la fuerza idiomática del original.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre personal de Dios según la decisión doctrinal del proyecto. En español, 'Yahvé' es la forma principal adoptada para el texto bíblico, manteniendo la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de כָּל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: todo ser humano
  alternative_spanish_readings:
  - toda carne
  - toda la humanidad
  - todas las personas
  rationale: No se borra la universalidad del hebreo, pero se evita una fórmula que en español puede sonar excesivamente literal. La lectura elegida comunica el alcance total del juicio a cualquier lector.
  doctrine_reference: HALOT; uso idiomático de 'בָּשָׂר' en contextos universales
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios. Este borrador mantiene la misma lectura fuente-centrada: nombre divino transparente, idiomática universal de כָּל בָּשָׂר, y la imagen concreta de la espada sacada de la vaina, sin suavizar el cierre enfático de לֹא תָשׁוּב עוֹד.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar español del proyecto para יְהוָה.
  - Se prefirió 'todo ser humano' como equivalencia idiomática de 'all flesh', con nota para conservar la alternativa literal.
  - '''Vaina'' mantiene la metáfora bélica de ''sheath'' de forma natural en español.'
  - '''Nunca más'' refleja el énfasis de עוֹד con un cierre fluido y apto para lectura pública.'
