translation:
  language: es
  text: ¡Ah[a], tierra de alas zumbantes, que más allá de los ríos de Cus[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ay!» o «¡Ah, tierra de alas zumbantes!». El hebreo es difícil y puede evocar el sonido de alas, insectos o algo alado en movimiento.
    reason: lexical_alternative
  - marker: b
    text: Cus se refiere a la región al sur de Egipto, a menudo asociada con Nubia o con la antigua Etiopía.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ti!
  - ¡Ay, tierra!
  lexicon: HALOT
  rationale: El hebreo הוֹי funciona como interjección de exclamación, lamentación o anuncio; aquí el tono es de llamada profética, no todavía una condena explícita. «¡Ah!» conserva esa apertura exclamativa sin cargar el verso con un «¡Ay de…!» más interpretativo.
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  - land
  lexicon: HALOT
  rationale: En este contexto geográfico, «tierra» comunica naturalmente una región o territorio. «País» sería más moderno pero puede sonar demasiado estatal; «territorio» es válido pero menos idiomático en la apertura poética del verso.
- source_word: צִלְצַל
  english_pob_choice: whirring
  chosen_spanish: zumbantes
  alternatives_spanish:
  - zumbadoras
  - siseantes
  - rumorosas
  lexicon: HALOT
  rationale: La raíz sugiere un sonido repetido, vibrante o zumbante. En español, «zumbantes» mantiene el rasgo auditivo sin decidir si la imagen concreta remite a alas, insectos o metal.
- source_word: כְּנָפָיִם
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - alas aladas
  - alas de vuelo
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «alas». En español, «alas zumbantes» respeta la imagen concreta y la relación con el sonido del término anterior.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - el cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la descripción de la tierra. «Que» es la forma natural y más sobria en español para este enlace.
- source_word: מֵעֵבֶר
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - al otro lado de
  - del otro lado de
  - más allá
  lexicon: HALOT
  rationale: La expresión indica ubicación al otro lado o en la región remota respecto de un punto de referencia. «Más allá de» es conciso y fiel a la relación espacial.
- source_word: לְנַהֲרֵי
  english_pob_choice: the rivers of
  chosen_spanish: los ríos de
  alternatives_spanish:
  - los ríos de
  - las corrientes de
  lexicon: HALOT
  rationale: נָהָר denota normalmente «río». El plural con ל en la locución fija se traduce de manera idiomática como «los ríos de».
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  - Nubia
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico como «Cus», transliteración habitual en español bíblico y coherente con la decisión de no modernizarlo geopolíticamente. «Etiopía» podría sugerir una identificación moderna más estrecha de la que el texto exige.
theological_decisions:
- issue: Identificación de כּוּשׁ
  english_pob_reading: Render as the place name 'Cush' without specifying a modern nation-state.
  chosen_spanish_reading: Mantener «Cus» como nombre del lugar, sin precisar un Estado moderno.
  alternative_spanish_readings:
  - Etiopía
  - Nubia
  rationale: El texto hebreo nombra una región histórica conocida en la Biblia. La transliteración preserva la referencia antigua sin imponer una equivalencia moderna no explicitada por el verso.
  doctrine_reference: 'Principio de traducción: transliterar nombres propios geográficos cuando el texto no los define de otro modo.'
translation_notes:
  revision_awareness: 'La versión española sigue el mismo juicio de la auditoría inglesa: mantener הוֹי como interjección abierta («Ah»), conservar la imagen sonora difícil de צִלְצַל כְּנָפָיִם con un adjetivo auditivo natural en español («zumbantes»), y transliterar כּוּשׁ como nombre geográfico antiguo sin modernizarlo. No se aplicaron revisiones posteriores al paquete de fuente porque la concordancia auditada fue alta y sin cambios.'
  spanish_consistency_notes:
  - Se mantiene el registro poético y profético, con puntuación exclamativa al inicio.
  - «Cus» se usa de forma consistente como transliteración del topónimo bíblico.
  - No se introduce «SEÑOR» ni otro masking del nombre divino, pues este versículo no contiene el Tetragrámaton.
  - La frase «más allá de los ríos de Cus» preserva la relación espacial del hebreo sin añadir especificaciones geopolíticas modernas.
