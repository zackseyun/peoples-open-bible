translation:
  language: es
  text: Entonces el sacerdote tomará agua santa[a] en un vaso de barro[b], y el sacerdote tomará algo del polvo que está en el piso del tabernáculo[c] y lo pondrá en el agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «agua sagrada». El hebreo indica agua apartada para uso ritual.
    reason: lexical_alternative
  - marker: b
    text: O «en un recipiente de barro» o «en un vaso de arcilla». El término hebreo apunta a un recipiente de material terroso o de barro cocido.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse «del suelo del tabernáculo». El término hebreo puede significar «suelo» o «piso»; aquí «piso» encaja bien con el contexto del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם קְדֹשִׁים
  english_pob_choice: holy water
  chosen_spanish: agua santa
  alternatives_spanish:
  - agua sagrada
  lexicon: HALOT
  rationale: קְדֹשִׁים significa aquí agua apartada para uso ritual. «Agua santa» comunica de forma natural esa consagración sin introducir una lectura cristiana ajena al contexto.
- source_word: בִּכְלִי חָרֶשׂ
  english_pob_choice: in an earthen vessel
  chosen_spanish: en un vaso de barro
  alternatives_spanish:
  - en un vaso de arcilla
  - en un recipiente de barro
  - en un vaso de cerámica
  lexicon: HALOT
  rationale: כְּלִי es un recipiente/vaso y חָרֶשׂ señala material terroso o de barro cocido. «Vaso de barro» es claro y mantiene el registro ritual sin sonar demasiado técnico.
- source_word: הֶעָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - la tierra suelta
  - el polvo de tierra
  - el polvo de suelo
  lexicon: HALOT
  rationale: עָפָר puede ser polvo, tierra seca o suelo suelto. «Polvo» reproduce bien la imagen ritual y se entiende con naturalidad en español.
- source_word: בְּקַרְקַע הַמִּשְׁכָּן
  english_pob_choice: on the floor of the tabernacle
  chosen_spanish: en el piso del tabernáculo
  alternatives_spanish:
  - en el suelo del tabernáculo
  - en el piso del santuario
  lexicon: HALOT
  rationale: קַרְקַע es la superficie de piso/suelo. En este contexto del מִשְׁכָּן, «piso» comunica bien el interior del tabernáculo y sigue la decisión inglesa de evitar una formulación demasiado abstracta.
- source_word: מִן הֶעָפָר
  english_pob_choice: some of the dust
  chosen_spanish: algo del polvo
  alternatives_spanish:
  - parte del polvo
  - un poco del polvo
  - tomará algo del polvo
  lexicon: HALOT
  rationale: 'מִן aquí es partitivo: no todo el polvo, sino una porción. «Algo del polvo» expresa esa selección parcial con sencillez idiomática.'
- source_word: וְלָקַח ... יִקַּח ... וְנָתַן
  english_pob_choice: shall take ... shall take ... and put
  chosen_spanish: tomará ... tomará ... y lo pondrá
  alternatives_spanish:
  - tomará ... tomará ... y lo echará
  - tomará ... tomará ... y lo añadirá
  lexicon: HALOT
  rationale: Los verbos siguen una secuencia ritual de instrucciones. El futuro simple español transmite adecuadamente el valor prescriptivo, y «poner» funciona bien con אֶל en este contexto.
- source_word: הַמָּיִם
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - esa agua
  - el mismo agua
  lexicon: HALOT
  rationale: El hebreo retoma el agua ya mencionada; en español, el anafórico natural es «el agua». Aquí no hace falta repetir «agua santa».
translation_notes:
  revision_awareness: La base inglesa revisada permanece sin cambios en la última pasada, con acuerdo alto del revisor; no se registran cambios aplicados. La versión española sigue la misma lectura y conserva las mismas alternativas léxicas principales donde el hebreo permite más de una opción.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» donde no aparece en este versículo porque el texto no contiene el tetragrámaton ni una alusión directa.
  - «Tabernáculo» se conserva para מִשְׁכָּן por coherencia cultual en toda la obra.
  - Se evitó «SEÑOR» como sustituto divino porque no corresponde a este versículo y el proyecto pide transparencia terminológica.
  - La secuencia verbal en futuro simple mantiene el tono normativo/ritual del hebreo y del inglés auditado.
