review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: dos participios iniciales, dos cláusulas con ὅτι, Χριστός como título en ambas ocurrencias, y la necesidad de sufrir y resucitar. Sin embargo, en la cláusula final introduce una desviación semántica al traducir ὃν ἐγὼ καταγγέλλω ὑμῖν como «a quien yo anuncio entre ustedes». El dativo ὑμῖν es destinatario («a ustedes»), no ubicación/socialización («entre ustedes»). Además, la nota b del inglés POB no apoya un contraste anuncio/proclamo, sino la alternativa verbal de ἀναστῆναι: «rise» vs «be raised».'
  spanish_quality_summary: El español es claro y digno, pero «anuncio entre ustedes» suena menos natural y menos preciso que «les proclamo» o «proclamo a ustedes». También conviene alinear la nota b con el punto léxico realmente documentado en el expediente inglés. El resto del verso suena bien y mantiene buena legibilidad eclesial.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Mesías» para Χριστός en uso titular, «Jesús» para Ἰησοῦς, y manejo correcto de la necesidad expresada por ἔδει. «Resucitar de entre los muertos» es aceptable para el infinitivo activo, pero la nota asociada debe conservar la alternativa «ser resucitado»/«ser levantado» tal como la auditoría inglesa preserva el matiz. No hay conflicto con otras entradas del glosario.'
  issues:
  - severity: high
    issue: Mala representación de ὑμῖν como «entre ustedes»
    rationale: El griego expresa el destinatario de la proclamación, no el ámbito donde ocurre. «A ustedes» o «les» preserva mejor el dativo con καταγγέλλω.
  - severity: high
    issue: La nota b está anclada al lugar correcto pero explica el verbo equivocado
    rationale: En el expediente inglés, la nota b corresponde a la alternativa de ἀναστῆναι («rise» / «be raised»), no a καταγγέλλω. La nota española actual altera la base auditada.
  - severity: medium
    issue: «Anuncio» es posible, pero «proclamo» alinea mejor con καταγγέλλω y con el POB inglés
    rationale: Aunque «anuncio» no es imposible, «proclamo» conserva mejor el matiz de anuncio público/heráldico y evita una formulación más débil.
  revised_spanish_text: explicando y demostrando que el Mesías tenía que sufrir y resucitar[a] de entre los muertos, y que este Jesús, a quien yo les proclamo, es el Mesías.
  revised_footnotes:
  - marker: a
    text: O «Cristo» en ambas ocurrencias de «Mesías».
    reason: alternative_reading
  revision_rationale: 'Se corrige el destinatario de καταγγέλλω ὑμῖν con «les proclamo» en vez de «anuncio entre ustedes», para ajustarse al dativo griego y al matiz de proclamación pública. Se elimina la nota [b] que no tenía anclaje en el texto; la nota sobre ἀναστῆναι queda pendiente de reanclaje en futura pasada. Se mantiene «Mesías» en ambas ocurrencias por tratarse de uso titular.'
