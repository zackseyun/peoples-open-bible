review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura casuística del hebreo y el sentido judicial de reciprocidad proporcional. Sin embargo, omite la alternativa literal importante de יִתֵּן מוּם ('causar/dar un defecto o lesión') en las notas, mientras que sí conserva una nota para עָמִית. Además, 'prójimo' es aceptable pero introduce un matiz más cargado religiosamente que el comunitario-legal de עָמִית; 'semejante' o 'compañero' sería más cercano al valor fuente.
  spanish_quality_summary: El español es claro y natural. No obstante, 'hiere' puede sonar algo más puntual o violento que el concepto más amplio de 'causar una lesión/defecto físico', y la nota actual está anclada en 'prójimo' sin preservar la literalidad principal que el inglés POB documentó para מוּם. Una leve revisión mejora fidelidad y consistencia sin perder legibilidad.
  glossary_alignment: No hay términos de glosario mayor en conflicto. La decisión sobre עָמִית conviene alinearla mejor con el matiz de 'fellow' comunitario; 'semejante' funciona bien en español neutro. Se mantiene el tono jurídico impersonal de כֵּן יֵעָשֶׂה לּוֹ con 'se le hará'.
  issues:
  - severity: medium
    issue: Falta la nota léxica principal sobre יִתֵּן מוּם
    rationale: El English POB preserva explícitamente la literalidad 'gives a blemish/defect to his fellow'. El borrador español no conserva esa alternativa documentada, aunque sí añade una nota para עָמִית.
  - severity: low
    issue: '''Prójimo'' puede sobreinterpretar עָמִית'
    rationale: Aunque comprensible y tradicional, 'prójimo' lleva asociaciones ético-religiosas más amplias; aquí el hebreo apunta al miembro asociado de la comunidad en registro legal.
  - severity: low
    issue: '''Hiere'' estrecha un poco el campo semántico de מוּם'
    rationale: La idea fuente es causar una lesión/defecto corporal. 'Cause una lesión' comunica mejor el sentido legal amplio y sigue siendo natural en español.
  revised_spanish_text: Y si un hombre causa una lesión a su semejante[a], tal como hizo, así se le hará a él.[b]
  revised_footnotes:
