review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el sentido del griego: conserva la doble fórmula narrativa «respondió ... dijo», explicita correctamente αὐτῇ con «le», traduce Πᾶς ὁ πίνων de forma genérica e inclusiva con «Todo el que bebe», y comunica bien la repetición de πάλιν con «volverá a tener sed». No hay desviaciones semánticas relevantes respecto de la fuente ni del English POB.'
  spanish_quality_summary: 'El español es claro, natural y digno. La única falla importante está en la nota al pie: repite exactamente la redacción del texto principal («volverá a tener sed») en vez de ofrecer la alternativa documentada equivalente a «will thirst again». Conviene reemplazarla por una alternativa española real, como «volverá a sed» no es idiomático; la opción natural y formal es «tendrá sed otra vez» o mejor «sentirá sed de nuevo» / «tendrá sed de nuevo».'
  glossary_alignment: No hay términos del glosario mayor implicados aquí aparte de «Jesús», correctamente usado. La decisión de mantener ambos verbos narrativos y el giro inclusivo está alineada con la filosofía del proyecto. La perífrasis «volverá a tener sed» es una buena solución española para διψήσει ... πάλιν.
  issues:
  - severity: medium
    issue: La nota al pie lexical_alternative no ofrece una alternativa real
    rationale: 'El texto de la nota («O, más formalmente: “volverá a tener sed”») repite la misma redacción del texto principal y no corresponde a la alternativa inglesa documentada («will thirst again»). Debe sustituirse por una formulación española distinta que preserve el matiz más formal o más literal.'
  revised_spanish_text: 'Jesús respondió y le dijo: «Todo el que bebe de esta agua volverá a tener sed[a]».'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «tendrá sed de nuevo».'
    reason: lexical_alternative
