translation:
  language: es
  text: Dije en mi corazón, acerca de los hijos del hombre[a], que Dios los prueba[b], para mostrarles que ellos mismos son bestias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seres humanos» para «los hijos del hombre»; el hebreo usa una expresión masculina con fuerza representativa.
    reason: lexical_alternative
  - marker: b
    text: Lit. «y para ver»; la cláusula también puede entenderse como «y para hacerles ver», o como «y para ver que ellos mismos son bestias».
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתִּי אֲנִי בְּלִבִּי
  english_pob_choice: I said in my heart
  chosen_spanish: Yo dije en mi corazón
  alternatives_spanish:
  - Yo me dije en mi corazón
  - Dije para mis adentros
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para reflexión interior. En español, «en mi corazón» conserva la imagen del texto fuente y es natural y solemne; el pronombre explícito «Yo» mantiene el énfasis del hebreo.
- source_word: עַל דִּבְרַת
  english_pob_choice: concerning
  chosen_spanish: respecto de
  alternatives_spanish:
  - acerca de
  - sobre
  - con respecto a
  lexicon: HALOT
  rationale: La frase introduce el asunto de la meditación. «Respecto de» comunica ese valor relacional sin añadir causalidad ni interpretación innecesaria.
- source_word: בְּנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los hijos de los hombres
  - seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: Se preserva la forma masculina y representativa del hebreo. «Hijos del hombre» es la manera más directa de reflejar la construcción original sin neutralizarla; «seres humanos» queda como alternativa explicativa, no como sustitución del texto.
- source_word: לְבָרָם
  english_pob_choice: is testing them
  chosen_spanish: los está probando
  alternatives_spanish:
  - los está examinando
  - los está refinando
  - los está probando y afinando
  lexicon: HALOT
  rationale: El verbo ברר puede abarcar probar, examinar o refinar. «Probar» es el equivalente más claro y sobrio en español para esta sección, manteniendo el sentido de evaluación divina sin sobrecargarlo con matices no requeridos por el contexto inmediato.
- source_word: וְלִרְאוֹת
  english_pob_choice: to show them
  chosen_spanish: para mostrarles
  alternatives_spanish:
  - y para hacerles ver
  - para que vean
  - para dejarles ver
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «y para ver», el contexto admite un valor resultativo o causativo. «Para mostrarles» hace explícita esa relación, siguiendo la lectura auditada en inglés sin perder la tensión del hebreo.
- source_word: שְׁהֶם בְּהֵמָה הֵמָּה לָהֶם
  english_pob_choice: that they themselves are beasts
  chosen_spanish: que ellos mismos son bestias
  alternatives_spanish:
  - que son bestias
  - que son como bestias
  - que ellos mismos son animales
  lexicon: HALOT
  rationale: La predicación es directa, no comparativa; por eso se mantiene «son bestias» y no «como bestias». «Ellos mismos» refleja el pronombre enfático hebreo. «Bestias» conserva la fuerza cruda del término frente a «animales», que sería más neutral.
theological_decisions:
- issue: Fuerza antropológica de la comparación entre humanos y bestias
  english_pob_reading: that humans, in the context of mortality and earthly condition, are described directly as beasts rather than merely 'like beasts'
  chosen_spanish_reading: que los seres humanos, en el contexto de la mortalidad y la condición terrenal, son descritos directamente como bestias y no solo como parecidos a bestias
  alternative_spanish_readings:
  - que son como bestias
  - que actúan como bestias
  rationale: 'La traducción conserva la afirmación directa del predicado hebreo. Esto preserva la tensión teológica de Eclesiastés sin resolverla artificialmente: el texto subraya la criatura humana en su fragilidad y mortalidad, no una negación de la distinción bíblica general entre humanidad y animalidad.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Expresión masculina en בְּנֵי הָאָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - los seres humanos
  - los hijos de la humanidad
  rationale: Se mantiene la forma masculina representativa del hebreo en el texto principal. La opción inclusiva se deja como alternativa, pero no sustituye la estructura fuente.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral); Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'El auditorio en inglés mantuvo la lectura directa del predicado («they themselves are beasts») y revisó solo la unión sintáctica antes de «to show them», sin cambiar el valor semántico. La versión española sigue esa decisión: conserva la afirmación directa, respeta la imagen hebrea y hace explícita la finalidad/resultante con «para mostrarles».'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, conforme al criterio del proyecto.
  - Se conserva «bestias» y no «animales» para mantener la dureza léxica del hebreo.
  - Se mantiene el paralelismo «ellos mismos» para reflejar el énfasis del pronombre hebreo.
  - La puntuación sigue el ritmo reflexivo del versículo y permite leer la cláusula final como propósito o resultado.
