theological_decisions:
- issue: Meaning of וּפָסַחְתִּי עֲלֵכֶם in the Passover institution
  chosen_reading: I will pass over you
  alternative_readings:
  - I will spare you
  - I will protect you
  rationale: The main text preserves the lexical and canonical connection to Passover while not over-resolving the debated nuance of the verb. Alternatives express the effect of the action and are worth preserving in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether לְמַשְׁחִית refers to an impersonal destruction or a personal destroyer
  chosen_reading: to destroy
  alternative_readings:
  - for the destroyer
  - as a destroyer
  rationale: The Hebrew form can be understood substantivally, but the verse does not require explicit personification in English. Rendering it verbally avoids importing a more specific agent than the syntax demands, while preserving the destructive result.
  doctrine_reference: Do not import doctrinal claims the text does not make.
