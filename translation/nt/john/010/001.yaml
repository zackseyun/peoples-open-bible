id: JHN.10.1
reference: John 10:1
source:
  edition: SBLGNT
  text: Ἀμὴν ἀμὴν λέγω ὑμῖν, ὁ μὴ εἰσερχόμενος διὰ τῆς θύρας εἰς τὴν αὐλὴν τῶν προβάτων ἀλλὰ ἀναβαίνων ἀλλαχόθεν ἐκεῖνος κλέπτης ἐστὶν καὶ λῃστής·
translation:
  text: Truly[a], truly, I say to you, the one who does not enter through the door into the sheepfold[c][b], but climbs up from somewhere else—that man is a thief and a robber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the gate.' The Greek θύρα can mean 'door' or 'gate' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the sheep pen' or 'into the courtyard of the sheep.' The Greek αὐλή denotes an enclosed court or fold.
    reason: lexical_alternative
  - marker: c
    text: The Greek distinguishes between a 'thief' (κλέπτης) and a 'robber' (λῃστής), the latter often suggesting a more forceful or violent kind of stealing.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula while expressing its force in natural English. 'Truly, truly' is clear and preserves the solemn introductory weight better for modern readers than leaving 'Amen' untranslated.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A relatively formal rendering that preserves the direct speech formula without unnecessary paraphrase.
- source_word: ὁ μὴ εἰσερχόμενος
  chosen: the one who does not enter
  alternatives:
  - he who does not enter
  - whoever does not enter
  lexicon: BDAG
  rationale: Renders the substantival participle in clear English while avoiding archaic diction. This preserves the generic singular force of the Greek.
- source_word: διὰ τῆς θύρας
  chosen: through the door
  alternatives:
  - by the door
  - through the gate
  lexicon: BDAG
  rationale: θύρα commonly means 'door' or 'gate.' 'Door' is chosen because it is the direct lexical equivalent and fits the immediate metaphor; 'gate' remains a viable contextual alternative.
- source_word: εἰς τὴν αὐλὴν τῶν προβάτων
  chosen: into the sheepfold
  alternatives:
  - into the courtyard of the sheep
  - into the sheep pen
  lexicon: BDAG
  rationale: αὐλή can denote a courtyard or enclosed area. In this pastoral context, 'sheepfold' best captures the intended enclosure for sheep in idiomatic English.
- source_word: ἀλλὰ ἀναβαίνων ἀλλαχόθεν
  chosen: but climbs up from somewhere else
  alternatives:
  - but comes up from another place
  - but climbs in another way
  lexicon: BDAG
  rationale: ἀναβαίνω here suggests scaling or climbing rather than ordinary entry, and ἀλλαχόθεν indicates entry from another place/direction. 'Climbs up from somewhere else' preserves both the physical image and the contrast with entering through the door.
- source_word: ἐκεῖνος
  chosen: that man
  alternatives:
  - that one
  - he
  lexicon: BDAG
  rationale: The demonstrative is emphatic. 'That man' brings out the identifying and somewhat distancing force in natural English better than the flatter 'he' or the less idiomatic 'that one.'
- source_word: κλέπτης
  chosen: thief
  lexicon: BDAG
  rationale: Standard lexical rendering for one who steals covertly.
- source_word: καὶ λῃστής
  chosen: and a robber
  alternatives:
  - and a bandit
  lexicon: BDAG
  rationale: λῃστής is distinct from κλέπτης and often implies a more forceful or violent kind of stealing. 'Robber' preserves the distinction in accessible English; 'bandit' is possible but less natural here.
