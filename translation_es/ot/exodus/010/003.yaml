  to: 'Entonces Moisés y Aarón fueron ante el faraón y le dijeron: «Así dice Yahvé, el Dios de los hebreos: ¿Hasta cuándo te negarás a humillarte[a] delante de mí? Deja ir a mi pueblo[b], para que me sirvan[c]».'
  rationale: Se corrige «para que me sirva» a «para que me sirvan» para ajustarlo al verbo plural hebreo y a la sintaxis española. Se elimina la nota [a] del verbo de habla porque la alternativa propuesta no era una variante léxica útil ni natural. Se conservan las notas léxicas relevantes sobre humillarse, dejar ir y servir/adorar.
