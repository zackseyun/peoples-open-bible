translation:
  language: es
  text: 'Entonces la ira de Balac se encendió contra Balaam, y golpeó sus palmas una contra otra. Y Balac dijo a Balaam: «Te llamé para maldecir a mis enemigos, pero mira: en verdad los has bendecido[a] estas tres veces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «has bendecido, bendecido», una construcción enfática que expresa bendición repetida o intensificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: anger burned
  chosen_spanish: la ira se encendió
  alternatives_spanish:
  - se encendió su enojo
  - ardió su ira
  lexicon: HALOT
  rationale: La locución hebrea conserva la imagen de un enojo que arde. «Se encendió» comunica bien la fuerza idiomática en español sin volverla plana.
- source_word: וַיִּחַר אַף בָּלָק אֶל בִּלְעָם
  english_pob_choice: Balak’s anger burned against Balaam
  chosen_spanish: la ira de Balac se encendió contra Balaam
  alternatives_spanish:
  - Balac se enojó con Balaam
  - Balac se enfureció contra Balaam
  lexicon: HALOT
  rationale: «Contra» refleja el valor hostil de אֶל en este contexto. «Ira de Balac» hace natural la frase en español y preserva el sentido relacional del hebreo.
- source_word: וַיִּסְפֹּק אֶת כַּפָּיו
  english_pob_choice: he struck his hands together
  chosen_spanish: batió sus manos
  alternatives_spanish:
  - aplaudió
  - golpeó sus palmas
  lexicon: HALOT
  rationale: El gesto es de golpear o chocar las manos. «Batió sus manos» evita la posible lectura positiva de «aplaudió» y mantiene el movimiento corporal de irritación.
- source_word: לָקֹב
  english_pob_choice: to curse
  chosen_spanish: maldecir
  alternatives_spanish:
  - pronunciar una maldición contra
  - proferir una maldición sobre
  lexicon: HALOT
  rationale: En este contexto la finalidad del llamado es maldecir; «maldecir» es la equivalencia directa y clara en español.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: a mis enemigos
  alternatives_spanish:
  - a quienes me son hostiles
  lexicon: HALOT
  rationale: Se conserva el posesivo directo y el plural natural en español.
- source_word: קְרָאתִיךָ
  english_pob_choice: I called you
  chosen_spanish: te llamé
  alternatives_spanish:
  - te convoqué
  - te llamé / te cité
  lexicon: HALOT
  rationale: «Llamé» reproduce el verbo de convocatoria de forma simple; el contexto ya deja claro que no era una llamada casual.
- source_word: וְהִנֵּה
  english_pob_choice: but look
  chosen_spanish: pero mira
  alternatives_spanish:
  - y he aquí
  - pero he aquí
  lexicon: HALOT
  rationale: La partícula introduce contraste y señalamiento. «Pero mira» es natural en español y conserva el giro enfático.
- source_word: בֵּרַכְתָּ בָרֵךְ
  english_pob_choice: you have indeed blessed them
  chosen_spanish: en verdad los has bendecido[a]
  alternatives_spanish:
  - los has bendecido de veras
  - ciertamente los has bendecido
  lexicon: HALOT
  rationale: La construcción hebrea con verbo finito más infinitivo absoluto intensifica la acción. «En verdad» refleja la afirmación enfática sin añadir una negación no presente en el hebreo; el verbo se mantiene en pasado compuesto por naturalidad española.
- source_word: זֶה שָׁלֹשׁ פְּעָמִים
  english_pob_choice: these three times
  chosen_spanish: estas tres veces
  alternatives_spanish:
  - ya tres veces
  - las tres veces
  lexicon: HALOT
  rationale: El demostrativo señala las repeticiones ya ocurridas. «Estas tres veces» conserva esa deíxis y suena natural en español.
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final de una formulación más expansiva a «have indeed blessed them» para ceñirse mejor al énfasis hebreo. La redacción española sigue esa revisión y evita añadir interpretaciones como «nada más que», manteniendo el paralelo enfático de בֵּרַכְתָּ בָרֵךְ.
  spanish_consistency_notes:
  - Se mantiene «Balac» y «Balaam» de forma consistente con la tradición del proyecto.
  - Se usa «maldecir» para לָקֹב en línea con el valor lexical documentado, sin sustituirlo por un término litúrgico más general.
  - «Batió sus manos» conserva la gestualidad de la escena sin introducir una lectura de aplauso.
  - «Yahvé» no aparece en este versículo, por lo que no requiere decisión terminológica aquí.
