translation:
  language: es
  text: Y los sacerdotes y los levitas que habían recibido la plata y el oro y los vasos los llevaron al templo del Señor en Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo dice: «para llevar[los] a Jerusalén, a la casa de nuestro Dios». El griego de 1 Esdras dice, en cambio, «los llevaron ... al templo del Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: παραλαβόντες
  english_pob_choice: who had received
  chosen_spanish: que habían recibido
  alternatives_spanish:
  - habiendo recibido
  - que recibieron
  - que habían tomado a su cargo
  lexicon: BDAG
  rationale: El participio aoristo describe a los sacerdotes y levitas como los que primero recibieron los objetos en custodia y luego los transportaron. «Que habían recibido» conserva bien esa secuencia en español natural y sigue el valor de «received» del POB inglés.
- source_word: οἱ ἱερεῖς καὶ οἱ Λευεῖται
  english_pob_choice: the priests and the Levites
  chosen_spanish: los sacerdotes y los levitas
  alternatives_spanish:
  - los sacerdotes y levitas
  lexicon: BDAG
  rationale: Se mantiene la coordinación explícita de dos grupos reconocibles del servicio del templo. En español, el artículo repetido es natural y conserva la estructura del griego.
- source_word: τὸ ἀργύριον καὶ τὸ χρυσίον
  english_pob_choice: the silver and the gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - la plata y el oro precioso
  - el dinero y el oro
  lexicon: BDAG
  rationale: El griego nombra los metales directamente; «plata» y «oro» evita interpretar la referencia como dinero en efectivo. Coincide con el paralelo hebreo citado en la auditoría.
- source_word: τὰ σκεύη
  english_pob_choice: the vessels
  chosen_spanish: los vasos
  alternatives_spanish:
  - los utensilios
  - los objetos
  lexicon: BDAG
  rationale: En contexto cultual, «vasos» preserva el valor de recipientes u objetos sagrados y suena natural en español bíblico contemporáneo. «Utensilios» sería más general y menos litúrgico.
- source_word: ἤνεγκαν
  english_pob_choice: brought
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los trajeron
  - los transportaron
  lexicon: BDAG
  rationale: El verbo de movimiento hacia el santuario se expresa de forma clara con «llevaron»; el pronombre retoma los objetos mencionados. «Trajeron» también sería posible, pero «llevaron» sigue mejor el énfasis en el traslado hacia el templo.
- source_word: εἰς τὸ ἱερὸν τοῦ κυρίου
  english_pob_choice: into the temple of the Lord
  chosen_spanish: al templo de Yahvé
  alternatives_spanish:
  - al santuario de Yahvé
  - al templo del Señor
  lexicon: BDAG
  rationale: El griego usa ἱερόν, que aquí designa el complejo del templo; «templo» es la equivalencia más clara. Para κύριος, el proyecto pide «Yahvé» cuando el trasfondo es el nombre divino; aquí se preserva el título divino en forma transparente en español.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem / to Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: BDAG
  rationale: Aunque el inglés auditado resolvió la relación espacial como destino, el griego sitúa la frase con ἐν Ἰερουσαλήμ. En español, «en Jerusalén» permite integrar naturalmente el complemento final sin forzar una preposición de destino no explícita en el texto griego.
theological_decisions:
- issue: Traducción de κύριος en la clausura del versículo
  english_pob_reading: the temple of the Lord
  chosen_spanish_reading: el templo de Yahvé
  alternative_spanish_readings:
  - el templo del Señor
  - el templo de Dios
  rationale: La política del proyecto pide «Yahvé» para יהוה y para el uso de κύριος que alude al nombre divino en el contexto del templo. «Señor» ocultaría esa transparencia. El paralelo hebreo citado en la auditoría usa la casa de nuestro Dios, pero el griego primario conserva el título divino; por eso se mantiene una traducción transparente en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Yahvé para el nombre divino; primacía de la fuente original con preservación transparente de lecturas paralelas'
- issue: 'Relación espacial final: templo y Jerusalén'
  english_pob_reading: brought them into the temple of the Lord in Jerusalem
  chosen_spanish_reading: los llevaron al templo de Yahvé en Jerusalén
  alternative_spanish_readings:
  - los llevaron a Jerusalén, al templo de Yahvé
  - los llevaron al templo de Yahvé, en Jerusalén
  rationale: La revisión inglesa buscó reflejar mejor el griego colocando Jerusalén como marco locativo del templo. En español, la formulación elegida mantiene el movimiento hacia el templo y deja a Jerusalén como ubicación del complejo sagrado, sin añadir una secuencia artificial.
  doctrine_reference: 'DOCTRINE.md: priorizar el flujo del texto fuente y conservar las alternativas relevantes cuando el paralelo hebreo difiere'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del POB inglés al colocar Jerusalén como marco final del templo, pero ajusta la preposición y el orden para que el griego ἐν Ἰερουσαλήμ suene natural en español. También incorpora de forma explícita la tensión textual entre el griego de 1 Esdras y el paralelo hebreo, preservándola en nota en vez de armonizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el título divino en lugar de «Señor», conforme a la política del proyecto.
  - «Sacerdotes», «levitas», «plata», «oro» y «vasos» conservan el registro cultual y la transparencia léxica.
  - La frase final evita sobretraducción; no se añade contenido como «casa de nuestro Dios» al texto principal, porque eso pertenece al paralelo hebreo y se documenta solo en la nota.
