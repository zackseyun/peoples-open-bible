  to: Y hornearon la masa que habían sacado de Egipto en tortas sin levadura[a], porque no había fermentado[b]; pues habían sido expulsados de Egipto y no podían demorarse[c], y tampoco habían preparado provisiones para ellos mismos.
  rationale: Se ajusta 'cocieron' a 'hornearon' para reflejar con más precisión el verbo hebreo אפה y la decisión léxica auditada en inglés. Se cambia 'para sí' por 'para ellos mismos' para mayor naturalidad y claridad en español. También se pulen levemente las notas para mejor estilo editorial y coherencia con el texto revisado.
