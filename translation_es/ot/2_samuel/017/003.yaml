translation:
  language: es
  text: y haré volver a todo el pueblo a ti;[a] cuando todos vuelvan, el hombre que tú buscas habrá desaparecido, y todo el pueblo estará en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea es difícil y elíptica; literalmente, «como el retorno de todo, el hombre que tú buscas». El sentido aquí es que, una vez eliminado el hombre buscado, todo el pueblo volverá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָשִׁיבָה
  english_pob_choice: and I will bring back
  chosen_spanish: haré volver
  alternatives_spanish:
  - restauraré
  - traeré de vuelta
  lexicon: HALOT
  rationale: El hifil de שוב es causativo; en español, «haré volver» conserva la idea de causar el retorno del pueblo. «Restauraré» es posible, pero es menos concreto en este contexto político-militar.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el ejército
  - toda la gente
  lexicon: HALOT
  rationale: עָם significa normalmente «pueblo». «Todo el pueblo» sigue de cerca el hebreo sin especificar innecesariamente «ejército».
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de forma natural en español con «a ti».
- source_word: כְּשׁוּב הַכֹּל
  english_pob_choice: as when all return
  chosen_spanish: como cuando todos vuelvan
  alternatives_spanish:
  - como el retorno de todos
  - cuando todos regresen
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica y difícil. «Como cuando todos vuelvan» conserva la relación comparativa y el sentido de retorno colectivo sin forzar una paráfrasis excesiva.
- source_word: הָאִישׁ אֲשֶׁר אַתָּה מְבַקֵּשׁ
  english_pob_choice: the man whom you seek
  chosen_spanish: el hombre que tú buscas
  alternatives_spanish:
  - el hombre a quien buscas
  - el que tú buscas
  lexicon: HALOT
  rationale: «Hombre» traduce bien האיש en singular, refiriéndose al objetivo concreto. «Que tú buscas» conserva el matiz directo del verbo en presente.
- source_word: יִהְיֶה שָׁלוֹם
  english_pob_choice: will be at peace
  chosen_spanish: estará en paz
  alternatives_spanish:
  - habrá paz
  - quedará en paz
  lexicon: HALOT
  rationale: שָׁלוֹם aquí describe un estado de paz/bienestar después del conflicto. «Estará en paz» es idiomático y mantiene el sentido social y político.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo, incorporando la lectura revisada del tramo central: no se entiende como una simple dependencia causal abstracta, sino como una comparación elíptica que implica el retorno general una vez apartado el hombre buscado.'
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para עָם de manera consistente con el uso bíblico general y con la redacción inglesa auditada.
  - Se evitó «SEÑOR» o «Cristo» porque el versículo no contiene ni alude directamente a esos términos.
  - Se optó por una sintaxis española fluida pero cercana al orden y al contenido del hebreo, sin convertir la nota textual en una paráfrasis libre.
