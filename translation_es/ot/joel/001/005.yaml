  rationale: 'Se hicieron ajustes menores para alinear mejor el español con el hebreo y con el rastro léxico del POB: «Despierten» evita un matiz reflexivo no expresado en el original; «por el vino dulce» representa mejor el motivo de lamentación introducido por עַל; y «ha sido cortado» preserva la imagen concreta de נִכְרַת que el borrador suavizaba como «quitado». La nota sobre עָסִיס se mantiene con redacción más natural.'
