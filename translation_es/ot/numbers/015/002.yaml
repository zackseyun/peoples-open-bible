revisions:
- from: 'Habla a los hijos de Israel y diles[a]: «Cuando entren en la tierra de sus moradas[b], que yo les doy»'
  to: 'Habla a los hijos de Israel y diles[a]: «Cuando entren en la tierra donde habitarán[b], que yo les doy»'
  rationale: Se corrige la expresión de מוֹשְׁבֹתֵיכֶם para evitar la discordancia de persona y mejorar la naturalidad en español, usando una alternativa ya contemplada por el rastro inglés («donde habitarán»), mientras la formulación más literal queda preservada en nota. También se repara la nota [a] para que ofrezca alternativas genuinas y no repita la misma frase. No se requiere adjudicación especial.
