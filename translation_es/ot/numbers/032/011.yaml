  text: אִם יִרְא֨וּ הָ/אֲנָשִׁ֜ים הָ/עֹלִ֣ים מִ/מִּצְרַ֗יִם מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה אֵ֚ת הָ/אֲדָמָ֔ה אֲשֶׁ֥ר נִשְׁבַּ֛עְתִּי לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק וּֽ/לְ/יַעֲקֹ֑ב כִּ֥י לֹא מִלְא֖וּ אַחֲרָֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/032/011.yaml
  text: Surely none of the men who came up from Egypt[a], from twenty years old and upward, shall see the land that I swore to Abraham, to Isaac, and to Jacob[b], because they have not fully followed me.
  footnotes:
  - marker: a
    text: 'Hebrew literally uses an oath formula with ''if'': ''if the men ... shall see the land,'' implying a strong negation: ''surely none ... shall see.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'they have not followed after me completely.'
    reason: lexical_alternative
  ai_draft:
