translation:
  language: es
  text: Yobab[a] murió, y Husham de la tierra de los temanitas[b] reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «Jobab» para el hebreo «Yobab».
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «de la tierra de Temán» o «de la tierra del temanita».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - falleció
  lexicon: HALOT
  rationale: El hebreo es una secuencia narrativa simple de wayyiqtol; en español, «murió» transmite el hecho de manera natural y directa sin añadir énfasis no presente en el texto.
- source_word: יוֹבָב
  english_pob_choice: Yobab
  chosen_spanish: Yobab
  alternatives_spanish:
  - Jobab
  lexicon: HALOT
  rationale: Se conserva la transliteración más transparente del hebreo, siguiendo la decisión auditada de la POB inglesa frente a la forma tradicionalizada «Jobab».
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a ser rey
  lexicon: HALOT
  rationale: En la fórmula sucesoria de listas reales, מלך se expresa naturalmente como «reinó», manteniendo el sentido de asunción y ejercicio del reinado sin expandirlo más de lo necesario.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: La expresión de sustitución/sucesión se vierte idiomáticamente como «en su lugar», que conserva la relación de reemplazo sin sonar forzada en español.
- source_word: חוּשָׁם
  english_pob_choice: Husham
  chosen_spanish: Husham
  alternatives_spanish:
  - Jusham
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente desde el hebreo, preservando la forma auditada por la POB inglesa.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the land of
  chosen_spanish: del país de
  alternatives_spanish:
  - de la tierra de
  - del territorio de
  lexicon: HALOT
  rationale: «País» funciona aquí como equivalente natural de אֶרֶץ en una indicación geográfica, sin perder el valor territorial de la construcción hebrea.
- source_word: הַתֵּימָנִי
  english_pob_choice: the Temanites
  chosen_spanish: los temanitas
  alternatives_spanish:
  - Temán
  - el temanita
  lexicon: HALOT
  rationale: En este contexto gentílico, el plural «los temanitas» refleja bien la designación de procedencia/pueblo que la POB inglesa entendió en la frase «land of the Temanites».
translation_notes:
  revision_awareness: El cotejo inglés existente reporta alta concordancia y sin cambios de revisión; esta propuesta sigue la línea auditada, conservando la transliteración transparente de los nombres y la ambigüedad geográfica indicada en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de nombres propios para coherencia con el criterio POB de transparencia.
  - «País» se usa como equivalente geográfico de אֶרֶץ en un contexto de procedencia regional.
