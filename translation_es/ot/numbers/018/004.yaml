revisions:
- from: Se unirán a ti y guardarán la responsabilidad[a] del tabernáculo de reunión para todo el servicio del tabernáculo; pero ningún extraño se acercará a ustedes.
  to: Se unirán a ti y guardarán el encargo[a] del tabernáculo de reunión para todo el servicio del tabernáculo; pero ninguna persona ajena[b] se acercará a ustedes.
  rationale: Se cambia 'responsabilidad' por 'encargo' para reflejar mejor el sentido cultual de מִשְׁמֶרֶת y mejorar la naturalidad de 'guardarán el encargo'. Se sustituye 'ningún extraño' por 'ninguna persona ajena' y se añade nota para conservar explícitamente la decisión léxica del POB sobre זָר como exclusión por autorización cultual, no por nacionalidad. El resto del texto se mantiene por ser fiel y claro.
