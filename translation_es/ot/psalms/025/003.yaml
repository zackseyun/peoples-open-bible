revisions:
- from: Ciertamente, ninguno[a] de los que te esperan será avergonzado[b]; serán avergonzados los que traicionan sin causa.
  to: Ciertamente, ninguno[a] de los que te esperan quedará avergonzado; quedarán avergonzados los que traicionan sin causa[b].
  rationale: Se corrige la expresión española para evitar la discordancia y hacer más natural el resultado de בוש con «quedará avergonzado». También se reancla la nota sobre רֵיקָם a la segunda cola, donde realmente pertenece. El contenido léxico y poético del versículo se conserva.
