review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: mantiene la reciprocidad poética, el paralelismo léxico y la tensión teológica de ''puro/puro'' y ''torcido/torcido''. Sin embargo, en español ''te muestras torcido'' suena algo más ontológico y menos relacional que el inglés, y la nota actual con ''desbaratas al torcido'' se aleja del matiz de astucia/contragiro documentado.'
  spanish_quality_summary: El texto es claro y legible, pero puede ganar naturalidad y precisión teológica con 'te muestras sagaz' en la nota como alternativa mejor documentada. El cuerpo del versículo puede conservarse casi intacto. 'Con el torcido' es comprensible, aunque 'con el perverso' sería más moralizante; no es necesario cambiarlo porque el juego verbal con 'torcido' funciona bien en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones 'puro', 'te muestras puro', 'torcido' y el mantenimiento de la tensión antropomórfica son coherentes con el expediente inglés. La única mejora necesaria es afinar la nota para reflejar mejor las alternativas auditadas ('shrewd/outwit') sin introducir una opción demasiado libre.
  issues:
  - severity: medium
    issue: La nota al pie usa 'desbaratas al torcido' como alternativa.
    rationale: El expediente inglés documenta 'you outwit the crooked' y 'you show yourself shrewd'. 'Desbaratas' expresa resultado, pero pierde el matiz de respuesta astuta/retorcida que explica el juego de palabras hebreo.
  - severity: low
    issue: La explicación de la nota dice 'la revierte'.
    rationale: La idea es correcta, pero suena algo torpe en español. Una formulación como 'y la vuelve contra él' o 'y la deshace' comunica mejor la reciprocidad judicial.
  revised_spanish_text: Con el puro te muestras puro[a], y con el torcido te muestras torcido.
  revised_footnotes:
  - marker: a
    text: 'O: «te muestras sagaz» o «vences con astucia al torcido». El hebreo usa un juego recíproco de palabras: Dios trata con el torcido de una manera que corresponde a su torcedura y la vuelve contra él, no que él mismo sea moralmente torcido.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque refleja fielmente el hebreo y la decisión teológica del POB. Solo se ajusta la nota para alinearla mejor con las alternativas inglesas auditadas y con un español más natural y preciso.
