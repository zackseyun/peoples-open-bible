revisions:
- from: 'Y dije[a]: «¿Quién me dará alas como de paloma? Me iría volando y habitaría».'
  to: 'Y dije[a]: «¿Quién me dará alas como las de una paloma? Me iría volando y habitaría»'
  rationale: Se revisa únicamente la comparación con la paloma para que el español exprese con naturalidad el valor comparativo de כַּיּוֹנָה. Se mantiene el resto del versículo, incluida la opción más formal «habitaría», en línea con la revisión inglesa que prefirió un equivalente más cercano a שכן. También se ajusta la nota para consistencia estilística.
