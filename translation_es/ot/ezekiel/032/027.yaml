  text: וְ/לֹ֤א יִשְׁכְּבוּ֙ אֶת גִּבּוֹרִ֔ים נֹפְלִ֖ים מֵ/עֲרֵלִ֑ים אֲשֶׁ֣ר יָרְדֽוּ שְׁא֣וֹל בִּ/כְלֵֽי מִלְחַמְתָּ/ם֩ וַ/יִּתְּנ֨וּ אֶת חַרְבוֹתָ֜/ם תַּ֣חַת רָאשֵׁי/הֶ֗ם וַ/תְּהִ֤י עֲוֺֽנֹתָ/ם֙ עַל עַצְמוֹתָ֔/ם כִּֽי חִתִּ֥ית גִּבּוֹרִ֖ים בְּ/אֶ֥רֶץ חַיִּֽים־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/027.yaml
  text: And they do not lie with the mighty fallen from among the uncircumcised[a], who went down to Sheol with their weapons of war, and they placed their swords under their heads, and their iniquities were upon their bones[e][d][c][b]; for they were the terror of the mighty in the land of the living.
  footnotes:
  - marker: a
    text: Or 'And they shall not lie with the mighty'—the Hebrew verb may be understood with a future nuance in this lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the fallen mighty from among the uncircumcised.' The Hebrew construction is difficult, and some take 'mighty' and 'fallen' more closely together.
    reason: alternative_reading
  - marker: c
    text: Sheol is the realm of the dead; alternatively, 'the grave' or 'the underworld.'
    reason: lexical_alternative
  - marker: d
    text: '''Iniquities'' may also be understood as ''guilt'' or ''the punishment for their iniquity.'''
    reason: lexical_alternative
  - marker: e
    text: The Hebrew of the final clause is difficult; alternatively, 'for they spread terror as mighty men in the land of the living.'
    reason: alternative_reading
