revisions:
- from: para que inspeccionen[a] Judea y Jerusalén, conforme a la ley del Señor[b].
  to: para que inspeccionen[a] Judea y Jerusalén, conforme a la ley del Señor que está en tu mano[b].
  rationale: Se restituye la cláusula ‘que está en tu mano’, omitida en el borrador pese a estar documentada en el audit trail inglés y apoyada por el paralelo hebreo. Se ajustan las notas para reflejar las alternativas léxicas y la explicación intertextual preservadas por el POB. Se mantiene ‘el Señor’ porque aquí el griego usa Κυρίου y no exige forzar ‘Yahvé’ en el texto principal.
  reviewer_model: gpt-5.4
