  yaml_path: translation/ot/nehemiah/006/011.yaml
  text: But I said[a], “Should a man like me flee? And who is like me, who could go into the temple and live? I will not go in.”
  footnotes:
  - marker: a
    text: Or 'the sanctuary.' The point is likely not merely hiding indoors but entering a restricted temple area in a way that would be improper for Nehemiah, which explains the force of 'and live.'
