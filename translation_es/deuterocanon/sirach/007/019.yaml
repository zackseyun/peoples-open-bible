translation:
  language: es
  text: No desprecies a una esposa inteligente[a][b], y el favor lleno de gracia es mejor que las perlas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No te apartes de una mujer sabia y buena, pues su gracia está por encima del oro». El hebreo dice «perlas» (o alguna otra joya preciosa) donde el griego tiene «oro».'
    reason: alternative_reading
  - marker: b
    text: 'También: «esposa prudente» o «esposa sabia». El término hebreo destaca la comprensión o el buen juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּמְאַס
  english_pob_choice: Do not despise
  chosen_spanish: No desprecies
  alternatives_spanish:
  - No rechaces
  - No desprecies con desdén
  lexicon: HALOT
  rationale: מָאַס expresa rechazo con matiz de desprecio o menosprecio; en español, «desprecies» conserva mejor la fuerza admonitiva que un simple «rechaces».
- source_word: אִשָּׁה מַשְׁכֶּלֶת
  english_pob_choice: an intelligent wife
  chosen_spanish: a una esposa inteligente
  alternatives_spanish:
  - a una mujer inteligente
  - a una esposa prudente
  - a una esposa sabia
  lexicon: HALOT
  rationale: La forma hebrea apunta a entendimiento, juicio e inteligencia práctica. «Esposa» refleja el valor contextual de la relación conyugal, y «inteligente» preserva el énfasis cognitivo sin borrar la amplitud de sentidos de משכלת.
- source_word: וְטוֹבַת חֵן
  english_pob_choice: gracious favor
  chosen_spanish: el favor gracioso de ella
  alternatives_spanish:
  - su gracia
  - su favor gracioso
  - su benigno favor
  lexicon: HALOT
  rationale: La expresión hebrea es comprimida y el audit trail inglés evita hacer demasiado explícita la posesión. En español, «el favor gracioso de ella» mantiene la cualidad de חֵן sin reducirla a simple belleza o encanto físico; «gracioso» aquí sigue el valor de gracia/favor, no de comicidad.
- source_word: מִפְּנִינִים
  english_pob_choice: than pearls
  chosen_spanish: que las perlas
  alternatives_spanish:
  - que los rubíes
  - que las piedras preciosas
  - que el oro
  lexicon: HALOT
  rationale: פְּנִינִים suele designar una joya preciosa; «perlas» es una equivalencia natural y tradicional en español que conserva el contraste sapiencial. El testimonio griego paralelo usa «oro», por eso se documenta la alternativa textual.
theological_decisions:
- issue: Valoración sapiencial de la esposa en un proverbio de consejo
  english_pob_reading: Do not despise an intelligent wife
  chosen_spanish_reading: No desprecies a una esposa inteligente
  alternative_spanish_readings:
  - No desprecies a una mujer inteligente
  - No rechaces a una esposa prudente
  rationale: Se conserva el sujeto como «esposa» porque el contexto relacional y doméstico es más específico que «mujer». Esta elección no impone una doctrina, pero sí fija con mayor precisión el alcance del consejo sapiencial.
  doctrine_reference: Gender-accurate over gender-neutral; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés, que corrigió la formulación para reflejar más de cerca la sintaxis hebrea: se mantuvo la simple conjunción equivalente a «y» en la segunda cola y se evitó introducir una posesión más fuerte de la que exige el hebreo. También se preservó la tensión textual entre el hebreo («perlas») y el griego («oro») mediante nota.'
  spanish_consistency_notes:
  - Se prefirió «esposa» sobre «mujer» siguiendo la lectura contextual del hebreo y la decisión auditada en inglés.
  - «Favor gracioso» intenta conservar חֵן sin volverlo una mera cualidad estética; si en revisión editorial se prefiere mayor naturalidad, podría valorarse «gracia» o «favor».
  - El contraste de preciosidad se mantuvo con «perlas», porque esa es la lectura hebrea sustentada por el testimonio base; la variante griega queda registrada en nota.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el Tetragrámaton ni una referencia directa al nombre divino en este versículo.
