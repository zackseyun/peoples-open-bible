revisions:
- from: Lo estableció con una bendición[a], y le dio su herencia; lo colocó entre las tribus, para dividirlas en doce partes.
  to: Lo estableció con una bendición[a], y le dio su herencia; lo colocó entre las tribus, para dividirlas en doce porciones.
  rationale: Se hace una reparación menor para alinear mejor el español con el valor distributivo del hebreo y del griego paralelo, y con la revisión inglesa auditada. «Porciones» comunica mejor que «partes» la idea de reparto tribal/hereditario sin volver la frase rígida. La nota se ajusta para reflejar con más precisión la compresión del hebreo y el apoyo del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:59Z'
