translation:
  language: es
  text: Desde allí se trasladó a la región montañosa al oriente de Betel y levantó su tienda, con Betel al occidente y Hai al oriente. Allí edificó un altar a Yahvé[a] e invocó[b] el nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «YHWH»; tradicionalmente se traduce «el SEÑOR».
    reason: lexical_alternative
  - marker: b
    text: O «proclamó el nombre de Yahvé». La expresión hebrea puede referirse a invocar a Yahvé en adoración o a declarar públicamente su nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעְתֵּק
  english_pob_choice: he moved
  chosen_spanish: se trasladó
  alternatives_spanish:
  - se movió
  - avanzó
  - se fue
  lexicon: HALOT
  rationale: El verbo expresa un cambio de lugar. «Se trasladó» conserva el movimiento narrativo sin sonar mecánico en español.
- source_word: הָהָרָה
  english_pob_choice: to the hill country
  chosen_spanish: a la región montañosa
  alternatives_spanish:
  - a la montaña
  - a la serranía
  - hacia la región montañosa
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia la zona montañosa; «región montañosa» comunica mejor que el singular «montaña».
- source_word: מִקֶּדֶם לְבֵית אֵל
  english_pob_choice: east of Bethel
  chosen_spanish: al oriente de Betel
  alternatives_spanish:
  - al este de Betel
  - a oriente de Betel
  lexicon: HALOT
  rationale: La relación espacial se expresa naturalmente con «al oriente de». Mantiene el dato geográfico del hebreo.
- source_word: וַיֵּט אָהֳלֹה
  english_pob_choice: and pitched his tent
  chosen_spanish: y levantó su tienda
  alternatives_spanish:
  - y plantó su tienda
  - y puso su tienda
  - y acampó
  lexicon: HALOT
  rationale: La expresión idiomática hebrea refiere a instalar la tienda. «Levantó su tienda» conserva la imagen de campamento y es idiomática en español bíblico actual.
- source_word: מִיָּם
  english_pob_choice: on the west
  chosen_spanish: al occidente
  alternatives_spanish:
  - al oeste
  - del lado del mar
  lexicon: HALOT
  rationale: En este contexto orientacional, יָם funciona como marcador de dirección occidental. «Occidente» preserva la orientación bíblica tradicional y es claro en español.
- source_word: וְהָעַי מִקֶּדֶם
  english_pob_choice: and Ai on the east
  chosen_spanish: y Hai al oriente
  alternatives_spanish:
  - y Hai al este
  - y Hai hacia el oriente
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con Betel/occidente. «Hai» refleja la forma castellana usual del topónimo bíblico.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un sacrificatorio
  lexicon: HALOT
  rationale: Término estándar y fiel para la estructura de culto/sacrificio.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé» en el texto principal, sin reemplazarlo por una convención de ocultamiento.'
- source_word: וַיִּקְרָא בְּשֵׁם יְהוָה
  english_pob_choice: and called on the name of Yahweh
  chosen_spanish: y llamó invocando el nombre de Yahvé
  alternatives_spanish:
  - y proclamó el nombre de Yahvé
  - e invocó el nombre de Yahvé
  lexicon: HALOT
  rationale: La frase hebrea admite tanto invocación como proclamación. Se conserva esa tensión con una traducción que deja abierta la dimensión cultual y pública del gesto.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se adopta «Yahvé» conforme al criterio del proyecto para preservar el nombre propio del pacto y evitar la convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וַיִּקְרָא בְּשֵׁם יְהוָה
  english_pob_reading: called on the name of Yahweh
  chosen_spanish_reading: llamó invocando el nombre de Yahvé
  alternative_spanish_readings:
  - proclamó el nombre de Yahvé
  - invocó el nombre de Yahvé
  rationale: La expresión puede señalar oración invocadora y/o proclamación pública. Se mantiene esa ambigüedad sin resolverla de manera reductiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el expediente inglés; el pasaje presenta alto acuerdo entre la traducción base y la revisión final, sin cambios pendientes relevantes.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה en el texto principal, conforme al criterio del proyecto.
  - Se mantiene el topónimo «Betel» y la forma castellana «Hai» para evitar oscilaciones innecesarias.
  - «Al oriente / al occidente» conserva el registro bíblico-geográfico del original y armoniza con el paralelismo del verso.
