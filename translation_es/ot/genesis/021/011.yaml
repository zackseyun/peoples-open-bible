revisions:
- from: La cosa fue muy desagradable a los ojos de Abraham[a], a causa de su hijo.
  to: El asunto fue muy desagradable a los ojos de Abraham[a], a causa de su hijo.
  rationale: Se reemplaza «la cosa» por «el asunto» para reflejar mejor הַדָּבָר en español natural y digno, sin perder la amplitud contextual del original. Se conserva «muy desagradable», «a los ojos de Abraham» y «a causa de su hijo» por su buena fidelidad al hebreo y al rastro de auditoría inglés. También se pule la nota alternativa para que suene natural en español y mantenga la opción léxica documentada.
