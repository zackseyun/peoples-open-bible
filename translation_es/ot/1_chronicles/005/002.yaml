translation:
  language: es
  text: Pues Judá prevaleció sobre sus hermanos, y de él salió el gobernante[a]; pero la primogenitura pertenecía a José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder» o «príncipe» para «gobernante».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la explicación causal o inferencial del contexto previo. «Porque» es la opción más natural en español para un conector explicativo sin perder la relación lógica del hebreo.
- source_word: גָּבַר
  english_pob_choice: prevailed
  chosen_spanish: prevaleció
  alternatives_spanish:
  - fue más fuerte
  - se impuso
  - resultó superior
  lexicon: HALOT
  rationale: El verbo expresa superioridad o predominio. «Prevaleció» conserva la idea de imponerse o superar a los demás sin añadir matices bélicos que el contexto no exige.
- source_word: בְּאֶחָיו
  english_pob_choice: over his brothers
  chosen_spanish: sobre sus hermanos
  alternatives_spanish:
  - entre sus hermanos
  - contra sus hermanos
  lexicon: HALOT
  rationale: Con גָּבַר, la preposición marca superioridad respecto de los hermanos. «Sobre sus hermanos» refleja bien esa relación jerárquica en español.
- source_word: וּלְנָגִיד
  english_pob_choice: and ... came the ruler
  chosen_spanish: y de él salió el gobernante
  alternatives_spanish:
  - y para gobernante
  - y como líder
  - y de él provino el príncipe
  lexicon: HALOT
  rationale: נָגִיד puede ser líder, gobernante o príncipe. «Gobernante» conserva el valor de autoridad/mandato y «de él salió» reproduce la idea de procedencia desde Judá.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de Judá
  - de entre ellos
  lexicon: HALOT
  rationale: El sufijo pronominal singular remite a Judá. «De él» mantiene la referencia inmediata y la concisión del hebreo.
- source_word: וְהַבְּכֹרָה
  english_pob_choice: though the birthright belonged to
  chosen_spanish: pero la primogenitura pertenecía a
  alternatives_spanish:
  - aunque la primogenitura era de
  - y la primogenitura pertenecía a
  - sin embargo, la primogenitura era de
  lexicon: HALOT
  rationale: בְּכֹרָה denota el derecho/estatus de primogénito. «Primogenitura» es el término español más establecido y preciso; «pero» marca la tensión contrastiva preservada por el inglés POB.
- source_word: לְיוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  - a José
  - de José
  lexicon: HALOT
  rationale: Nombre propio bíblico normalizado en español. El contexto de posesión ya queda expresado por «pertenecía a».
theological_decisions:
- issue: Tensión entre la supremacía de Judá y el derecho de primogenitura de José
  english_pob_reading: The verse distinguishes tribal supremacy/rulership for Judah from the legal firstborn status assigned to Joseph.
  chosen_spanish_reading: El versículo distingue la supremacía y el gobierno asociados con Judá de la primogenitura atribuida a José.
  alternative_spanish_readings:
  - Judá fue el más fuerte, mientras que la primogenitura quedó con José.
  - De Judá vino el jefe, aunque la primogenitura era de José.
  rationale: La traducción mantiene separados ambos privilegios en vez de fusionarlos. «Gobernante» para נָגִיד y «primogenitura» para הַבְּכֹרָה preservan la tensión histórica y jurídica del texto.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del testimonio inglés: no se requieren cambios por el alto grado de acuerdo y no hay revisiones aplicadas en el expediente auditado.'
  spanish_consistency_notes:
  - Se usa «Judá» y «José» como nombres propios bíblicos estándar en español.
  - Se conserva la distinción entre autoridad/rango («gobernante») y derecho de primogenitura («primogenitura»).
  - La nota al pie refleja la alternativa léxica documentada en el POB inglés para נָגִיד.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque el texto no contiene el Tetragrámaton como objeto de traducción contextual aquí.
