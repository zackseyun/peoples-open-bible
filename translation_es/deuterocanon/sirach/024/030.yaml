translation:
  language: es
  text: Y yo, como un canal de un río, y como una acequia, salí a un jardín[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paraíso». La palabra griega puede denotar jardín, parque o paraíso; aquí la imagen inmediata es la de agua que entra en un espacio cultivado.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγώ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo también
  - Así que yo
  - Y yo asimismo
  lexicon: LSJ
  rationale: κἀγώ introduce el cambio de foco hacia el hablante. «Y yo» reproduce ese giro de manera natural en español sin añadir énfasis innecesario como «yo también».
- source_word: διῶρυξ
  english_pob_choice: canal
  chosen_spanish: canal
  alternatives_spanish:
  - acequia
  - canal de riego
  - zanja
  lexicon: LSJ
  rationale: διῶρυξ designa un conducto artificial de agua. «Canal» mantiene esa idea de obra construida y conserva la imagen del flujo derivado de un río.
- source_word: ἀπὸ ποταμοῦ
  english_pob_choice: from a river
  chosen_spanish: desde un río
  alternatives_spanish:
  - de un río
  - a partir de un río
  lexicon: LSJ
  rationale: La preposición ἀπό con genitivo expresa origen o procedencia. «Desde un río» suena natural en español y conserva la imagen de salida desde la fuente.
- source_word: ὑδραγωγός
  english_pob_choice: watercourse
  chosen_spanish: acequia
  alternatives_spanish:
  - canal de agua
  - conducto de agua
  - curso de agua
  lexicon: LSJ
  rationale: ὑδραγωγός apunta a un conducto artificial para llevar agua. En español, «acequia» comunica bien esa función de riego y el carácter construido mejor que un genérico «curso de agua».
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salí
  alternatives_spanish:
  - salió
  - salí hacia fuera
  - emané
  lexicon: LSJ
  rationale: El verbo de movimiento se vierte en primera persona singular como «salí», que en español fluye mejor que un calco más literal y conserva la imagen de salida/proyección.
- source_word: παράδεισον
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - paraíso
  - parque
  - huerto
  lexicon: LSJ
  rationale: En este contexto de irrigación, παράδεισον funciona como un espacio cultivado. «Jardín» preserva la imagen concreta; «paraíso» queda como alternativa léxica porque el término griego también puede significar eso en otros contextos.
theological_decisions:
- issue: Valor de παράδεισον en un símil de irrigación
  english_pob_reading: garden
  chosen_spanish_reading: jardín
  alternative_spanish_readings:
  - paraíso
  rationale: El contexto inmediato es agrícola e imagístico, no una afirmación escatológica explícita. Traducir «jardín» mantiene la escena concreta y evita cargar el verso con una asociación teológica no exigida por el texto.
  doctrine_reference: Principio de primacía del idioma original y preservación de la tensión léxica cuando el contexto no obliga a una sola lectura.
translation_notes:
  revision_awareness: La revisión auditada del inglés confirma la preferencia por una imagen de canal/curso artificial y por «garden» en παράδεισον. En español, se optó por «acequia» para conservar la artificialidad del conducto y por «jardín» para mantener el sentido concreto del símil, con una nota que preserva la alternativa «paraíso».
  spanish_consistency_notes:
  - Se mantuvo el flujo paralelo «como... y como...» para reproducir la estructura comparativa del griego.
  - Se evitó «SEÑOR» u otros términos no pertinentes; el verso no contiene el nombre divino.
  - «Acequia» se eligió por su claridad en un contexto de riego y por comunicar mejor la obra artificial que un simple «curso de agua».
