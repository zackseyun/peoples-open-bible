revisions:
- from: Se han portado corruptamente contra él[a]; no son sus hijos, por su defecto[b]. Son una generación torcida y perversa.
  to: Han actuado corruptamente hacia él[a]; no son sus hijos, a causa de su defecto. Son una generación torcida y retorcida[b].
  rationale: Se ajusta «contra él» a «hacia él» para respetar la ambigüedad relacional de לוֹ documentada por el POB inglés; se cambia «se han portado corruptamente» por «han actuado corruptamente» para mejor registro y correspondencia verbal; y se revisa «torcida y perversa» a «torcida y retorcida» para conservar la doble imaginería de distorsión moral del hebreo, dejando la alternativa ética en nota como ya hacía el audit trail.
