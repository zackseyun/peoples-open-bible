  text: וְ/הִנֵּ֥ה שְׁתוּלָ֖ה הֲ/תִצְלָ֑ח הֲ/לוֹא֩ כְ/גַ֨עַת בָּ֜/הּ ר֤וּחַ הַ/קָּדִים֙ תִּיבַ֣שׁ יָבֹ֔שׁ עַל עֲרֻגֹ֥ת צִמְחָ֖/הּ תִּיבָֽשׁ־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/010.yaml
  text: And behold[a], though it is planted[c][b], will it prosper? Will it not utterly wither when the east wind touches it? It will wither on the beds where it grew.
  footnotes:
  - marker: a
    text: Or 'will surely dry up' / 'will utterly dry up'; the Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''East wind'' refers to the hot, destructive wind from the eastern desert, a common image of withering judgment.'
    reason: cultural_note
  - marker: c
    text: Or 'on the garden beds of its growth'; the Hebrew phrase refers to the cultivated plots where the plant had grown.
    reason: lexical_alternative
