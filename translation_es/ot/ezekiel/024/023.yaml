    text: '''In your iniquities'' may also be understood as ''because of your iniquities'' or, by extension of the Hebrew term, ''in your guilt.'''
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''each man to his brother.'''
    reason: lexical_alternative
