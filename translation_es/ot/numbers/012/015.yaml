translation:
  language: es
  text: Entonces Miriam quedó confinada[a] fuera del campamento durante siete días, y el pueblo no se puso en marcha hasta que Miriam fue readmitida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «quedó encerrada» o «quedó recluida»; el hebreo expresa que Miriam quedó bajo exclusión fuera del campamento.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «fue reunida». El verbo hebreo usa «reunir/recoger», aquí con referencia a su readmisión al campamento después de su período de exclusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּסָּגֵר
  english_pob_choice: was confined
  chosen_spanish: quedó confinada
  alternatives_spanish:
  - fue encerrada
  - quedó aislada
  - fue excluida
  lexicon: HALOT
  rationale: El verbo nifal de סגר expresa quedar bajo una restricción impuesta. «Quedó confinada» comunica bien la condición pasiva y la exclusión sin sonar demasiado técnico o judicial.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - al exterior del campamento
  - fuera del campamento
  lexicon: HALOT
  rationale: La expresión espacial es directa; «campamento» es el equivalente natural en el contexto del desierto y preserva la referencia comunitaria e Israelita.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - por espacio de siete días
  lexicon: HALOT
  rationale: La frase de duración se expresa con naturalidad en español con «durante». Mantiene el valor temporal sin añadir matices no presentes en el hebreo.
- source_word: לֹא נָסַע
  english_pob_choice: did not set out
  chosen_spanish: no se puso en marcha
  alternatives_spanish:
  - no partió
  - no emprendió la marcha
  - no se trasladó
  lexicon: HALOT
  rationale: נסע en narrativa del desierto apunta al inicio del viaje o al levantamiento del campamento. «No se puso en marcha» conserva ese sentido técnico mejor que un simple «no partió».
- source_word: עַד הֵאָסֵף מִרְיָם
  english_pob_choice: until Miriam was brought in
  chosen_spanish: hasta que Miriam fue introducida
  alternatives_spanish:
  - hasta que Miriam fue reunida
  - hasta que Miriam fue recibida de nuevo
  lexicon: HALOT
  rationale: El verbo אסף aquí conserva la idea de ser recogida/reintegrada al campamento. «Fue introducida» mantiene una forma pasiva sobria y cercana al hebreo, sin explicitar «de nuevo», que el texto hebreo no dice.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la revisión inglesa más reciente, evitando añadir el matiz explícito de «de nuevo»; asimismo conserva la ambigüedad del verbo final con una nota alternativa en lugar de interpretarlo expansivamente.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma general del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Campamento» se mantuvo por coherencia con el marco narrativo del desierto y la terminología del proyecto.
  - «Miriam» se conserva sin adaptación, conforme al nombre propio bíblico estándar en español.
