translation:
  language: es
  text: Si este pueblo sube[a] para ofrecer sacrificios en la casa de Yahvé en Jerusalén[b], entonces el corazón de este pueblo volverá a su señor[c], a Roboam rey de Judá, y me matarán y volverán a Roboam rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cuando este pueblo sube…». La partícula condicional hebrea puede acercarse en algunos contextos a un sentido temporal, pero aquí se entiende mejor como la condición temida por Jeroboam.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la casa de Yahvé»; es decir, el templo en Jerusalén.
    reason: cultural_note
  - marker: c
    text: O «a su amo». El término hebreo puede significar «señor» o «amo»; aquí se refiere a Roboam, como lo aclara la aposición que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula condicional introduce el temor hipotético de Jeroboam; en español, «Si» conserva mejor esa fuerza condicional que una lectura temporal.
- source_word: יַעֲלֶה
  english_pob_choice: goes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - va
  lexicon: HALOT
  rationale: עלה conserva en español la imagen de subir a Jerusalén para peregrinar; «sube» mantiene el valor espacial y cultual sin sonar forzado.
- source_word: לַעֲשׂוֹת זְבָחִים
  english_pob_choice: to offer sacrifices
  chosen_spanish: para ofrecer sacrificios
  alternatives_spanish:
  - para hacer sacrificios
  - para realizar sacrificios
  lexicon: HALOT
  rationale: El hebreo usa literalmente «hacer sacrificios»; en español «ofrecer sacrificios» transmite con naturalidad el acto cultual sin perder el sentido.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea «casa de Yahvé» para reflejar בית יְהוָה, siguiendo el uso del nombre divino del proyecto. «Templo» aclara, pero suaviza la forma hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La decisión doctrinal del proyecto para יְהוָה es «Yahvé»; se mantiene el nombre propio del pacto en vez de una sustitución por «SEÑOR».
- source_word: וְשָׁב לֵב הָעָם הַזֶּה
  english_pob_choice: then the heart of this people will return
  chosen_spanish: entonces el corazón de este pueblo volverá
  alternatives_spanish:
  - y el corazón de este pueblo volverá
  - entonces el corazón de este pueblo se volverá
  lexicon: HALOT
  rationale: שׁוּב con «corazón» expresa giro de lealtad; «volverá» preserva la repetición con el verbo posterior y mantiene la metáfora bíblica del corazón.
- source_word: אֶל אֲדֹנֵיהֶם
  english_pob_choice: to their lord
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su amo
  - a su dueño
  lexicon: HALOT
  rationale: Aunque la forma hebrea admite matices de «señor» o «amo», aquí el referente inmediato es Roboam; «señor» conserva dignidad y evita una traducción excesivamente dura sin borrar la tensión léxica.
- source_word: רְחַבְעָם מֶלֶךְ יְהוּדָה
  english_pob_choice: Rehoboam king of Judah
  chosen_spanish: Roboam rey de Judá
  alternatives_spanish:
  - Roboam, rey de Judá
  lexicon: HALOT
  rationale: 'Se conserva la aposición simple del original: nombre propio + título real + territorio. En español, la forma sin coma resulta natural y fiel.'
- source_word: וַהֲרָגֻנִי
  english_pob_choice: and they will kill me
  chosen_spanish: y me matarán
  alternatives_spanish:
  - y me asesinarán
  - y me darán muerte
  lexicon: HALOT
  rationale: הרג significa matar; «matarán» es claro y suficiente en español, sin añadir una connotación penal o ceremonial.
- source_word: וְשָׁבוּ
  english_pob_choice: and return
  chosen_spanish: y volverán
  alternatives_spanish:
  - y regresarán
  - y retornarán
  lexicon: HALOT
  rationale: Se mantiene la repetición semántica de שׁוּב con «volverán», como en la primera mitad del versículo, para reflejar la simetría del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el proyecto pide traducirlo como «Yahvé», preservando el nombre del pacto y evitando la convención de ocultarlo con mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide en alta medida con el audit trail inglés; no se requieren revisiones sustantivas. Se preservan la estructura condicional, la repetición de שׁוּב («volverá / volverán»), y la tensión léxica de אֲדֹנֵיהֶם como «señor», con la apposición explicativa a Roboam.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Roboam» como forma española estándar del nombre propio.
  - Se conserva «volverá / volverán» para reflejar la repetición de שׁוּב en el hebreo.
  - La nota sobre la casa de Yahvé aclara el valor cultural de la expresión sin sustituirla por una paráfrasis interpretativa.
