translation:
  language: es
  text: Pero tú[a], Yahvé, sabes todos sus consejos contra mí, para matarme. No cubras su iniquidad[b], y no borres su pecado de delante de ti. Que tropiecen[c] delante de ti; en el tiempo de tu ira, actúa contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra mí para muerte' / 'para mi muerte'. El hebreo literalmente dice 'contra mí para muerte'.
    reason: lexical_alternative
  - marker: b
    text: O 'perdones su iniquidad'. El verbo hebreo también puede llevar el sentido de hacer expiación o cubrir la culpa; aquí se conserva la metáfora más literal.
    reason: lexical_alternative
  - marker: c
    text: O 'Que sean hechos tropezar delante de ti'. El hebreo permite un matiz pasivo/causativo, aunque en español 'tropiecen' suena más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español, siguiendo el criterio del proyecto de no enmascarar YHWH con una convención de mayúsculas. 'Yahvé' es la forma directriz del proyecto y mantiene la referencia explícita al nombre del pacto.
- source_word: עֲצָתָם
  english_pob_choice: their counsel
  chosen_spanish: sus consejos
  alternatives_spanish:
  - su consejo
  - sus planes
  - sus designios
  lexicon: HALOT
  rationale: '''Consejos'' conserva el valor formal de עֵצָה como consejo, plan o propósito. En español, el plural refleja bien la multiplicidad de complots implícitos en el contexto hostil, sin perder el sustantivo de peso semántico.'
- source_word: עָלַי לַמָּוֶת
  english_pob_choice: against me to death
  chosen_spanish: contra mí para muerte
  alternatives_spanish:
  - contra mí para matarme
  - contra mí hasta la muerte
  - contra mí de muerte
  lexicon: HALOT
  rationale: Se mantiene la concisión del hebreo y su orientación literal 'contra mí para muerte'. 'Para muerte' preserva la frase nominal compacta y la finalidad letal sin expandir innecesariamente a un verbo interpretativo.
- source_word: תְּכַפֵּר עַל עֲוֺנָם
  english_pob_choice: cover over their iniquity
  chosen_spanish: cubras su iniquidad
  alternatives_spanish:
  - encubras su iniquidad
  - hagas expiación por su iniquidad
  - perdones su iniquidad
  lexicon: HALOT
  rationale: En una súplica imprecatoria con negación, el verbo כפר conserva una tensión entre cubrir y expiar. Aquí se opta por 'cubras' en negativo para mantener el campo metafórico sin introducir 'perdonar' como glosa suavizada en el texto principal.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  - su pecado
  lexicon: HALOT
  rationale: '''Iniquidad'' preserva el matiz de culpa moral y coincide bien con el paralelo ''pecado'' del verso, manteniendo la distinción hebrea entre los dos términos.'
- source_word: חַטָּאתָם
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su pecado cometido
  - su ofensa
  - su falta
  lexicon: HALOT
  rationale: '''Pecado'' es la equivalencia natural de חַטָּאת en español bíblico moderno y conserva el paralelismo con ''iniquidad'' sin aplanar el contraste lexical.'
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de ante ti
  - de tu vista
  lexicon: HALOT
  rationale: '''De delante de ti'' reproduce con fidelidad el modismo espacial/judicial del hebreo y sugiere la imagen de algo retirado del ámbito de juicio de Dios.'
- source_word: וְהָיוּ מֻכְשָׁלִים לְפָנֶיךָ
  english_pob_choice: Let them stumble before you
  chosen_spanish: Hagan tropezar ante ti
  alternatives_spanish:
  - Tropiecen ante ti
  - Sean hechos tropezar ante ti
  - Queden tropiezo ante ti
  lexicon: HALOT
  rationale: El hebreo lleva fuerza jussiva. Se opta por una forma que exprese el deseo/petición de caída ante Dios. 'Tropezar' preserva el sentido básico de כשל y funciona de modo natural en español, aunque la voz exacta del hebreo permite una pasiva/causativa más densa.
- source_word: בְּעֵת אַפְּךָ
  english_pob_choice: in the time of your anger
  chosen_spanish: en el tiempo de tu ira
  alternatives_spanish:
  - en la hora de tu ira
  - en el tiempo de tu enojo
  - cuando arde tu ira
  lexicon: HALOT
  rationale: '''Ira'' es la forma más natural y solemne en español bíblico para אַף en este contexto. ''En el tiempo de'' conserva el marco temporal exacto del hebreo.'
- source_word: עֲשֵׂה בָהֶם
  english_pob_choice: act against them
  chosen_spanish: actúa contra ellos
  alternatives_spanish:
  - haz con ellos
  - obra contra ellos
  - dispón de ellos
  lexicon: HALOT
  rationale: El hebreo es breve y judicial. 'Actúa contra ellos' expresa con claridad la intención adversativa sin añadir contenido específico que el texto no dé.
theological_decisions:
- issue: Mantener el tono imprecatorio sin suavizar la petición de juicio
  english_pob_reading: The verse is translated as a direct plea for God not to forgive/remove the enemies' guilt and to judge them in anger.
  chosen_spanish_reading: El verso queda como una súplica directa para que Dios no cubra su culpa, no borre su pecado y actúe contra ellos en su ira.
  alternative_spanish_readings:
  - Convertirlo en una observación descriptiva
  - Traducir כפר simplemente como 'perdones' en el texto principal
  - Atenuar el imperativo/jusivo final
  rationale: El hebreo presenta una oración intensa e imprecatoria. La traducción conserva esa tensión en vez de resolverla teológicamente. A la vez, se mantiene la metáfora concreta de 'cubrir' para no ocultar el trasfondo sacrificial/judicial de כפר.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se prefirió una forma más literal para la frase hebrea compacta final y una expresión natural para el valor jussivo de la clausula de tropiezo. En español se mantuvo la misma línea: literalidad sobria, sin expandir innecesariamente ni suavizar la fuerza imprecatoria.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se preservó la distinción lexical entre 'iniquidad' y 'pecado'.
  - No se añadieron notas al pie porque no había marcadores anclados en el texto español.
  - La frase 'contra mí para muerte' conserva la concisión del hebreo y evita una expansión interpretativa.
  - La cláusula final se vertió con verbo en imperativo/jussivo español para reflejar el peso petitionario del hebreo.
