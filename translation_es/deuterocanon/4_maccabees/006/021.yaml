revisions:
- from: y ¿seremos despreciados por el tirano como[a] afeminados, y no defenderemos nuestra ley divina hasta la muerte?
  to: y ¿seremos despreciados por el tirano como hombres sin valor[a], y no defenderemos nuestra ley divina hasta la muerte?
  rationale: Se reemplaza «afeminados» por «hombres sin valor» para conservar el carácter genderizado del insulto sin introducir una idea de feminización ajena al griego. También se mejora la nota para explicar con más precisión el matiz léxico y ofrecer la alternativa semántica más idiomática.
