revisions:
- from: Sus flecheros me rodean[a]; me abre las entrañas[b] y no tiene compasión; derrama mi hiel[c] sobre la tierra.
  to: Sus flecheros me rodean[a]; él hiende mis riñones[b] y no perdona; derrama mi hiel[c] sobre la tierra.
  rationale: La revisión restaura la decisión fuente-primaria de conservar el término anatómico concreto 'mis riñones' y fortalece el verbo a 'hiende' para reflejar mejor יְפַלַּח. También se alinea mejor con el expediente inglés al mantener la imaginería visceral sin paráfrasis interpretativa, mientras conserva un español digno y claro. 'No perdona' se ajusta mejor que 'no tiene compasión' al valor de 'does not spare' en un contexto de ataque.
