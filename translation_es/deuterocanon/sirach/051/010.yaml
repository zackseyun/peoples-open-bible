revisions:
- from: 'Y te exaltaré: Yahvé[a], tú eres mi Padre, porque tú eres el poderoso de mi salvación. No me dejes debilitar[b] en el día de la angustia, en el día de ruina y desolación.'
  to: 'Y te ensalzaré: Yahvé[a], tú eres mi Padre, porque tú eres el poderoso de mi salvación. No me dejes flaquear[b] en el día de la angustia, en el día de ruina y desolación.'
  rationale: Se revisa el borrador por dos problemas de español natural. «Te ensalzaré» expresa mejor el valor elevado de וַאֲרוֹמֵם en un registro bíblico legible. «No me dejes flaquear» refleja con naturalidad la imagen hebrea de רפה sin armonizar con el griego «abandonar». Se mantienen la prioridad del hebreo, la nota sobre la variante griega y la terminología «Yahvé».
  reviewer_model: gpt-5.4
