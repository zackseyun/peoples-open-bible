translation:
  language: es
  text: En sus días, Nabucodonosor, rey de Babilonia, subió[a]; y Joacim llegó a ser su siervo por tres años[b]. Luego se volvió[c] y se rebeló contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘subió contra [él]’. El hebreo dice literalmente ‘subió’, una forma que en contexto puede implicar avance o campaña contra un territorio, pero sin expresarlo de manera explícita en el verbo mismo.
    reason: lexical_alternative
  - marker: b
    text: O ‘llegó a ser su vasallo por tres años’. El hebreo dice literalmente ‘llegó a ser para él un siervo’, una fórmula de sujeción política a un soberano superior.
    reason: lexical_alternative
  - marker: c
    text: O ‘se volvió atrás’. El verbo puede señalar una reversión de lealtad antes de la rebelión.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante sus días
  - En su tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo temporal que sitúa el hecho en el período del rey mencionado antes. ‘En sus días’ preserva la fórmula bíblica y su valor cronológico sin explicarla de más.
- source_word: עָלָה
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - subió contra
  - avanzó
  - marchó
  lexicon: HALOT
  rationale: עלה conserva el sentido básico de ‘subir’. En contexto político-militar, el español ‘subió’ permite la misma ambigüedad controlada que el hebreo, sin decidir de antemano el matiz militar.
- source_word: נְבֻכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebucadrezar
  lexicon: Uso bíblico hispano tradicional / transliteración convencional
  rationale: Se adopta la forma hispana reconocible ‘Nabucodonosor’, estándar en español bíblico y adecuada para lectura pública.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: HALOT
  rationale: La construcción en hebreo es de relación posesiva/titulativa y se rinde de manera directa y natural en español con ‘rey de Babilonia’.
- source_word: וַיְהִי לוֹ ... עֶבֶד
  english_pob_choice: Jehoiakim became his servant
  chosen_spanish: Joacim llegó a ser su esclavo
  alternatives_spanish:
  - Joacim fue su siervo
  - Joacim llegó a ser su servidor
  - Joacim quedó sometido a él
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ‘llegó a ser para él un עֶבֶד’. Dado el valor político de sujeción, ‘esclavo’ preserva la fuerza lexical de עֶבֶד y evita suavizarla con ‘siervo’. ‘Llegó a ser’ refleja la transición narrativa del verbo.
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  - vasallo
  lexicon: HALOT
  rationale: Aunque el POB inglés optó por ‘servant’ por transparencia contextual, el sustantivo hebreo עֶבֶד mantiene su fuerza de subordinación. En español, ‘esclavo’ comunica con mayor precisión la dependencia política marcada por el texto; ‘vasallo’ introduciría un marco feudal ajeno al hebreo.
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: for three years
  chosen_spanish: por tres años
  alternatives_spanish:
  - durante tres años
  - tres años
  lexicon: HALOT
  rationale: La duración se expresa con una preposición temporal natural en español. ‘Por tres años’ conserva la duración sin recargar el verso.
- source_word: וַיָּשָׁב
  english_pob_choice: Then he turned
  chosen_spanish: Luego se volvió
  alternatives_spanish:
  - Entonces se volvió
  - Luego volvió
  - Y después regresó
  lexicon: HALOT
  rationale: שוב conserva el sentido de ‘volver/volver atrás/volverse’. Aquí se mantiene la idea de reversión de conducta o lealtad, en paralelo con la nota inglesa sobre el cambio de alineación.
- source_word: וַיִּמְרָד בּוֹ
  english_pob_choice: rebelled against him
  chosen_spanish: se rebeló contra él
  alternatives_spanish:
  - se levantó contra él
  - se sublevó contra él
  lexicon: HALOT
  rationale: מרד con ב indica rebelión contra un superior. ‘Se rebeló contra él’ es la correspondencia más clara y natural en español.
theological_decisions:
- issue: Naturaleza política de ‘עֶבֶד’ aplicado a un rey
  english_pob_reading: Jehoiakim became his servant ... a political expression for subjection to an overlord.
  chosen_spanish_reading: Joacim llegó a ser su esclavo ... como expresión política de sujeción a un soberano superior.
  alternative_spanish_readings:
  - Joacim llegó a ser su vasallo
  - Joacim quedó sometido a él
  rationale: Se conserva la tensión entre el valor léxico fuerte de עֶבֶד y su uso político en el contexto. ‘Esclavo’ mantiene la fuerza del término, mientras la cláusula completa evita una lectura meramente doméstica.
  doctrine_reference: 1 Reyes 4:21; 2 Reyes 17:3; uso político de subordinación imperial en literatura bíblica
- issue: Valor de ‘subió’ en contexto de campaña imperial
  english_pob_reading: came up
  chosen_spanish_reading: subió
  alternative_spanish_readings:
  - subió contra
  - marchó
  rationale: No se fuerza explícitamente un matiz militar que el hebreo no marca de manera obligatoria en la forma verbal sola. El contexto histórico permite la lectura de avance imperial, pero el español conserva la misma amplitud semántica.
  doctrine_reference: Uso narrativo estándar de עָלָה en contextos de movimiento y campaña
