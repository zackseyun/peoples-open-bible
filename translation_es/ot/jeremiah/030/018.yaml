revisions:
- from: 'Así dice Yahvé: He aquí[a], yo restauro la fortuna de las tiendas de Jacob, y tendré compasión de sus moradas. La ciudad será reedificada sobre su collado, y el palacio estará en su lugar debido.'
  to: 'Así dice Yahvé: Miren[a], estoy restaurando las fortunas de las tiendas de Jacob, y tendré compasión de sus moradas. La ciudad será reedificada sobre su montículo, y el palacio estará en su lugar apropiado.'
  rationale: 'Se ajusta el español para reflejar con mayor fidelidad y naturalidad las decisiones documentadas del POB: se expresa הִנְנִי + participio como «Miren, estoy...», se usa «las fortunas» para el modismo שָׁב שְׁבוּת, se corrige תִּלָּהּ a «montículo» y se suaviza la cláusula final a un español más natural sin perder la idea de orden restaurado.'
  reviewer_model: gpt-5.4
