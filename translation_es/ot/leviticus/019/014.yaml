translation:
  language: es
  text: 'No maldecirás a un sordo[a], y delante de un ciego no pondrás obstáculo; pero temerás a tu Dios: yo soy Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sordo» y «el ciego». El hebreo usa formas masculinas singulares como ejemplos legales representativos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְקַלֵּל
  english_pob_choice: curse
  chosen_spanish: maldecirás
  alternatives_spanish:
  - proferirás maldición contra
  - insultarás con maldición a
  lexicon: HALOT
  rationale: קלל en piel expresa maldecir o tratar con desprecio. En español, «maldecir» conserva la fuerza verbal y jurídica mejor que una perífrasis más débil.
- source_word: חֵרֵשׁ
  english_pob_choice: a deaf man
  chosen_spanish: un sordo
  alternatives_spanish:
  - el sordo
  - una persona sorda
  lexicon: HALOT
  rationale: El hebreo usa un masculino singular representativo. «Un sordo» mantiene esa forma legal concreta sin neutralizarla, y funciona naturalmente en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la imagen espacial y suena natural en español bíblico actual.
- source_word: עִוֵּר
  english_pob_choice: a blind man
  chosen_spanish: un ciego
  alternatives_spanish:
  - el ciego
  - una persona ciega
  lexicon: HALOT
  rationale: Como con חֵרֵשׁ, el singular masculino es representativo. «Un ciego» conserva la concreción del caso legal.
- source_word: תִתֵּן
  english_pob_choice: put
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - echarás
  lexicon: HALOT
  rationale: Con מִכְשׁוֹל, el español idiomático es «poner tropiezo». «Pondrás» reproduce bien el mandato negativo.
- source_word: מִכְשֹׁל
  english_pob_choice: a stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - obstáculo
  lexicon: HALOT
  rationale: «Tropiezo» mantiene la metáfora bíblica y es claro en español; «piedra de tropiezo» sería más expansivo y menos fiel al sustantivo simple.
- source_word: וְיָרֵאתָ
  english_pob_choice: but you shall fear
  chosen_spanish: pero temerás
  alternatives_spanish:
  - y temerás
  - más bien, temerás
  lexicon: HALOT
  rationale: El waw introduce la motivación ética-teológica del mandato. «Pero» comunica bien el contraste discursivo sin salir del sentido del hebreo.
- source_word: מֵאֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: a tu Dios
  alternatives_spanish:
  - de tu Dios
  - a Dios
  lexicon: HALOT
  rationale: 'Con ירא, el español requiere el complemento directo con «a»: «temerás a tu Dios». Esto mantiene la relación reverencial del hebreo idiomático.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, siguiendo la convención del proyecto en español.
theological_decisions:
- issue: Formas masculinas singulares representativas en la ley
  english_pob_reading: Retain masculine singular examples ('a deaf man,' 'a blind man') as gender-accurate representative cases
  chosen_spanish_reading: Mantener el singular masculino representativo ('un sordo', 'un ciego')
  alternative_spanish_readings:
  - el sordo / el ciego
  - una persona sorda / una persona ciega
  rationale: El hebreo presenta casos legales concretos en masculino singular. La traducción española conserva esa forma para no diluir la concreción jurídica del texto, aunque su alcance sea general.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Función de la cláusula final de motivación
  english_pob_reading: Render the clause as grounding the command in reverence before God ('but you shall fear your God')
  chosen_spanish_reading: Traducirla como fundamento reverencial del mandato ('pero temerás a tu Dios')
  alternative_spanish_readings:
  - y temerás a tu Dios
  - más bien temerás a tu Dios
  rationale: La cláusula final vincula la protección del vulnerable con la responsabilidad ante Dios. «Pero» ayuda a mostrar esa transición de prohibición a motivación ética.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: se mantiene la estructura prohibitiva, el paralelismo entre el sordo y el ciego, la imagen de tropiezo y el cierre teológico con el nombre divino Yahvé. No se requirieron revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, en coherencia con los defaults del proyecto.
  - Se usa «tropiezo» para conservar la metáfora legal y ética de מִכְשׁוֹל.
  - Se conserva el singular masculino representativo por fidelidad al hebreo legal.
  - Se evita «SEÑOR» como sustituto del nombre divino.
