translation:
  language: es
  text: 'Así dice Ciro, rey de Persia: Yahvé, el Dios del cielo, me ha dado todos los reinos de la tierra, y él me ha encargado[a] que le edifique una casa[b] en Jerusalén, que está en Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me ha comisionado' que le edifique una casa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo de Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética/de decreto se expresa de manera natural en español con 'Así dice', conservando el tono solemne y proclamativo sin volverlo innecesariamente arcaico.
- source_word: כֹּרֶשׁ
  english_pob_choice: Cyrus
  chosen_spanish: Ciro
  alternatives_spanish:
  - Ciro
  lexicon: HALOT
  rationale: Nombre propio con la forma española estándar y reconocible.
- source_word: מֶלֶךְ פָּרַס
  english_pob_choice: king of Persia
  chosen_spanish: rey de Persia
  alternatives_spanish:
  - el rey de Persia
  lexicon: HALOT
  rationale: Mantiene la relación constructa y el oficio real de Ciro con español natural.
- source_word: כֹּל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: all the kingdoms of the earth
  chosen_spanish: todos los reinos de la tierra
  alternatives_spanish:
  - todos los reinos del mundo
  - todas las naciones de la tierra
  lexicon: HALOT
  rationale: '''מַמְלְכוֹת'' es plural y se conserva como ''reinos''; ''הָאָרֶץ'' se entiende aquí en sentido amplio, imperial/universal, por lo que ''la tierra'' comunica bien la amplitud del dominio.'
- source_word: נָתַן לִי
  english_pob_choice: has given me
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  lexicon: HALOT
  rationale: El perfecto español transmite una acción pasada con resultado vigente en el discurso de Ciro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrama, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios de los cielos
  lexicon: HALOT
  rationale: La expresión es una fórmula estable en Esdras; 'cielo' en singular suena natural en español y respeta el modismo hebreo.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - y él mismo
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito y el cambio de sujeto, sin sobrerreforzarlo.
- source_word: פָקַד עָלַי
  english_pob_choice: has appointed me
  chosen_spanish: me ha encargado
  alternatives_spanish:
  - me ha comisionado
  - me ha designado
  lexicon: HALOT
  rationale: En este contexto פָקַד expresa encomienda/mandato para una tarea concreta; 'encargado' preserva esa fuerza mejor que un verbo más débil.
- source_word: לִבְנוֹת לוֹ בַיִת
  english_pob_choice: to build a house for him
  chosen_spanish: que le edifique una casa
  alternatives_spanish:
  - que le construya una casa
  - que le edifique un templo
  lexicon: HALOT
  rationale: Se mantiene 'casa' como valor literal de בַיִת, sin sustituirlo por 'templo' en el cuerpo principal; el dativo 'le' reproduce 'para él' de forma idiomática en español.
- source_word: בִּירוּשָׁלִַם אֲשֶׁר בִּיהוּדָה
  english_pob_choice: in Jerusalem, which is in Judah
  chosen_spanish: en Jerusalén, que está en Judá
  alternatives_spanish:
  - en Jerusalén, la cual está en Judá
  - en Jerusalén, en Judá
  lexicon: HALOT
  rationale: Se conserva la cláusula relativa y la especificación geográfica, con sintaxis natural en español.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama; el proyecto pide no enmascararlo con 'SEÑOR'. 'Yahvé' es la forma española establecida para preservar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Value of בַיִת in this context
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: Se mantiene el valor léxico básico 'casa' en el texto principal. Aunque el referente es el templo, trasladar 'templo' al cuerpo principal introduciría una interpretación que el hebreo no explicita aquí.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'El borrador español sigue de cerca el texto hebreo y el audit trail inglés: conserva la fórmula de proclamación, el nombre propio Ciro, la amplitud de ''todos los reinos de la tierra'', el Tetragrama como Yahvé, y el valor literal de בַיִת como ''casa''. No se introdujeron revisiones adicionales respecto del acuerdo de alta coincidencia del contexto inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Casa'' se mantiene en el texto principal; ''templo'' aparece solo como aclaración contextual en nota.'
  - La cláusula relativa 'que está en Judá' conserva la especificación geográfica sin perder naturalidad en español.
  - El orden y la puntuación buscan un registro bíblico formal pero fluido en español latinoamericano.
