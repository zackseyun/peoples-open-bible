translation:
  language: es
  text: Y el límite oriental era el Mar Salado[a], hasta el extremo del Jordán. Y el límite del lado norte era desde la lengua del mar[b], desde el extremo del Jordán[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘Mar Muerto’. Hebreo: ‘Mar Salado’.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘lengua del mar’, expresión topográfica para una extensión o saliente con forma de lengua.'
    reason: cultural_note
  - marker: c
    text: O ‘fin del Jordán’; aquí se refiere al punto donde el Jordán entra en el mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En una descripción territorial, גְּבוּל designa la línea o extensión que delimita una heredad. ‘Límite’ comunica bien esa función en español bíblico moderno y evita la posible rigidez de ‘frontera’.
- source_word: קֵדְמָה
  english_pob_choice: eastern
  chosen_spanish: oriental
  alternatives_spanish:
  - del oriente
  - este
  lexicon: HALOT
  rationale: El término marca el lado oriental del territorio. ‘Oriental’ mantiene el valor direccional con un tono digno y natural en español bíblico.
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: Mar Salado
  alternatives_spanish:
  - Mar Muerto
  - Mar de la Sal
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente ‘Mar Salado’. Se conserva esa expresión como texto principal por primacía del original, dejando la designación geográfica convencional como alternativa implícita en nota.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como
  - a
  lexicon: HALOT
  rationale: En fórmulas de lindes, עַד señala la extensión de la línea. ‘Hasta’ expresa con naturalidad ese alcance terminal en español.
- source_word: קְצֵה
  english_pob_choice: end
  chosen_spanish: extremo
  alternatives_spanish:
  - fin
  - boca
  lexicon: HALOT
  rationale: Aunque el término puede designar ‘fin’ o ‘extremidad’, aquí describe el punto terminal del Jordán en relación con el mar. ‘Extremo’ conserva la idea de terminus sin introducir el matiz específico de ‘boca’ que no está explicitado en el hebreo.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: El nombre propio es suficientemente claro en español como ‘el Jordán’. Se mantiene la forma tradicional y directa.
- source_word: לִפְאַת צָפוֹנָה
  english_pob_choice: on the north side
  chosen_spanish: del lado norte
  alternatives_spanish:
  - en el lado norte
  - hacia el norte
  lexicon: HALOT
  rationale: La frase especifica el segmento del límite correspondiente al lado norte. ‘Del lado norte’ reproduce la relación espacial de manera natural y precisa.
- source_word: לָשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - saliente
  - promontorio
  lexicon: HALOT
  rationale: 'El hebreo usa una imagen topográfica literal: una ‘lengua’ de tierra o agua. ‘Lengua’ preserva esa metáfora mejor que una explicación interpretativa como ‘saliente’.'
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el lago
  - esa agua
  lexicon: HALOT
  rationale: El sustantivo es simplemente ‘mar’ en la expresión topográfica. En español se conserva la referencia directa y se evita repetir ‘Salado’ donde el hebreo no lo repite.
theological_decisions:
- issue: Topónimo tradicional frente a traducción literal de הַמֶּלַח
  english_pob_reading: the Salt Sea
  chosen_spanish_reading: Mar Salado
  alternative_spanish_readings:
  - Mar Muerto
  rationale: El texto hebreo nombra el lugar como ‘Mar Salado’. La traducción principal conserva la forma fuente en vez del nombre geográfico posterior, siguiendo el principio de transparencia del proyecto. No se añade una glosa en el texto porque no hay tensión doctrinal, sino una decisión léxica-toponímica.
  doctrine_reference: No aplica; decisión toponímica y de transparencia textual.
- issue: قְצֵה como extremo territorial, no ‘boca’ interpretativa
  english_pob_reading: end of the Jordan
  chosen_spanish_reading: extremo del Jordán
  alternative_spanish_readings:
  - boca del Jordán
  - fin del Jordán
  rationale: El hebreo dice ‘extremo/fin’ y el contexto sí permite entender el lugar donde el Jordán llega al mar, pero la traducción principal no debe sobreinterpretar con ‘boca’. ‘Extremo’ mantiene el alcance abierto y auditable.
  doctrine_reference: No aplica; precisión geográfica y semántica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir ‘end/extremo’ para קְצֵה en ambos casos, en lugar de ‘mouth/boca’. También se mantuvo la distinción entre la referencia al ‘Mar Salado’ en la primera mitad y ‘el mar’ en la segunda, conforme al hebreo y al control inglés revisado.
  spanish_consistency_notes:
  - 'Se mantuvo un vocabulario territorial consistente: ‘límite’ para גְּבוּל, ‘extremo’ para קְצֵה y ‘lengua’ para לָשׁוֹן.'
  - Se evitó ‘SEÑOR’ u otra convención de ocultamiento porque el versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se conservó el tono bíblico digno, pero con sintaxis española natural y publicable.
  - Las notas a pie distinguen entre alternativa lexical y nota cultural para no mezclar el dato topográfico con la glosa interpretativa.
