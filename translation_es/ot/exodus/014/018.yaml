review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: sujeto «los egipcios», fórmula de reconocimiento «que yo soy Yahvé» y la cadena referente a Faraón, sus carros y sus jinetes. Sin embargo, no refleja de la mejor manera el valor instrumental/esférico repetido de ב en בְּפַרְעֹה / בְּרִכְבּוֹ / וּבְפָרָשָׁיו, porque «en Faraón, en sus carros y en sus jinetes» suena locativo en español y puede distorsionar el sentido. Además, las notas al pie están invertidas: [a] aparece anclado a «Yahvé» pero contiene la alternativa sobre «sea glorificado», mientras [b] aparece anclado a «sea glorificado» pero comenta el nombre divino.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «cuando sea glorificado en Faraón» resulta menos natural y menos preciso que «cuando yo obtenga gloria por medio de Faraón» o «cuando sea glorificado por medio de Faraón». También conviene alinear las notas con sus anclas correctas. El resto del verso es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: 'Alinea correctamente יְהוָה como «Yahvé», conforme al glosario del proyecto. «Jinetes» para פָרָשָׁיו es aceptable. El principal desajuste terminológico es preposicional: el inglés auditado y la evidencia hebrea favorecen una formulación instrumental como «por medio de» en lugar de «en».'
  issues:
  - severity: high
    issue: Las notas al pie están asignadas a los marcadores equivocados.
    rationale: En el texto, [a] sigue a «Yahvé», pero su contenido da una alternativa para בְּהִכָּבְדִי; [b] sigue a «sea glorificado», pero su contenido explica el Tetragrama. Esto rompe la trazabilidad del audit trail y confunde al lector.
  - severity: high
    issue: «En Faraón, en sus carros y en sus jinetes» comunica un sentido locativo poco fiel.
    rationale: La cadena hebrea con ב tras בְּהִכָּבְדִי expresa el medio/esfera por la cual Yahvé manifiesta su gloria. En español, «en» sugiere ubicación; «por medio de» o «mediante» transmite mejor el valor contextual documentado en el POB inglés.
  - severity: medium
    issue: La elección principal «cuando sea glorificado» es posible, pero el texto principal queda menos natural que la opción activa/resultativa.
    rationale: El audit trail inglés prioriza «when I gain glory» y conserva «when I am glorified» como alternativa. En español bíblico natural, «cuando yo obtenga gloria» comunica bien el sentido sin perder la nota alternativa pasiva.
  revised_spanish_text: Y los egipcios sabrán que yo soy Yahvé[a], cuando yo obtenga gloria por medio de Faraón, por medio de sus carros y de sus jinetes[b].
