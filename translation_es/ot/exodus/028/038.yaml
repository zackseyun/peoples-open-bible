base_translation:
  language: en
  yaml_path: translation/ot/exodus/028/038.yaml
  text: It shall be on Aaron’s forehead[a], and Aaron shall bear the iniquity of the holy things that the sons of Israel consecrate, for all the gifts of their holy things. It shall always be on his forehead[c][b], for acceptance for them before Yahweh.
  footnotes:
  - marker: a
    text: Or 'carry the guilt.' The Hebrew idiom 'bear the iniquity' can denote bearing liability for guilt associated with the holy offerings.
    reason: lexical_alternative
  - marker: b
    text: Or 'for favor for them' or 'so that they may be accepted before the LORD.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the sons of Israel,' a standard covenantal designation for the people of Israel.
    reason: cultural_note
