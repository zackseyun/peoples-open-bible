revisions:
- from: ¿Dejarás que tus ojos[a] vuelen hacia eso, y ya no esté? Porque ciertamente se hace alas para sí; como águila, vuela a los cielos.
  to: ¿Dejarás que tus ojos vuelen hacia eso, y ya no está? Porque ciertamente se hace alas; como águila[a], vuela a los cielos.
  rationale: Se corrige el anclaje de la nota para que corresponda al término fuente נשר (‘águila’/‘buitre’). Se cambia ‘y ya no esté’ por ‘y ya no está’ para un español más natural y fiel al sentido de desaparición súbita. Se aligera ‘se hace alas para sí’ a ‘se hace alas’, porque el reflexivo ya está expresado idiomáticamente en español sin pérdida del valor de לּוֹ.
