review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la mayor parte del sentido del hebreo: destruye los lugares altos, derriba los objetos cultuales, pone los cadáveres sobre los de los ídolos y conserva la expresión antropopática «mi alma». También mantiene adecuadamente las notas sobre בָּמוֹת y la repetición de פגרים. Sin embargo, la cláusula final no es fiel en español: «mi alma se aborrecerá de ustedes» cambia el sujeto/objeto y suena como si el alma se aborreciera a sí misma, no que Yahvé los aborrece a ellos.'
  spanish_quality_summary: 'El español es en general claro y digno, con buena legibilidad eclesial. «Lugares altos», «altares de incienso» y «cadáveres» funcionan bien. El problema principal es idiomático y semántico en «se aborrecerá de ustedes», que no es español natural para este sentido y distorsiona la referencia. También conviene unificar el tratamiento de segunda persona: el texto usa «tus» pero termina con «ustedes»; «los/ustedes» puede hacerse consistente manteniendo el plural referencial del hebreo.'
  glossary_alignment: No hay términos del glosario mayor en conflicto. La decisión de conservar «mi alma» está alineada con la justificación teológica documentada. «Ídolos» para גִּלּוּלִים y «lugares altos» para בָּמוֹת también concuerdan con el expediente. La reparación necesaria es gramatical, no terminológica.
  issues:
  - severity: high
    issue: La frase final «mi alma se aborrecerá de ustedes» no traduce correctamente גָעֲלָה נַפְשִׁי אֶתְכֶם.
    rationale: El hebreo significa que «mi alma los aborrecerá / sentirá repulsión por ustedes». La forma pronominal «se aborrecerá de» en español es antinatural aquí y puede sugerir autorrechazo, alterando el sentido.
  - severity: medium
    issue: Inconsistencia de tratamiento entre «tus» y «ustedes».
    rationale: El verso se dirige al plural en hebreo. En español puede mantenerse «tus ... los» como plural colectivo reverencial, pero cerrar con «ustedes» después de varios posesivos singulares suena mezclado. «los» resuelve el problema sin perder el referente plural.
  revised_spanish_text: Y destruiré tus lugares altos[a], y derribaré tus altares de incienso, y pondré tus cadáveres sobre los cadáveres de tus ídolos[b]; y mi alma los aborrecerá.
  revised_footnotes:
  - marker: a
    text: O «tus pilares solares». El término hebreo se refiere a objetos de culto asociados con la adoración ilícita; su forma exacta es debatida.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite una palabra para «cadáveres» tanto para el pueblo como para sus ídolos, enfatizando la condición inerte y la vergüenza de los ídolos.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula final para expresar fielmente el objeto directo del verbo hebreo y producir un español natural: «mi alma los aborrecerá». Se conservan las decisiones léxicas principales y las notas, con un pequeño ajuste estilístico en la nota b para reflejar mejor la inercia/lifelessness de los ídolos.'
