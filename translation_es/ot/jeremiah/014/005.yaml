translation:
  language: es
  text: Porque aun la cierva en el campo da a luz y abandona a su cría[a], porque no hay pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y la deja»; el hebreo no explicita el objeto, pero el sentido es que la cierva abandona a su cría recién nacida porque no hay pasto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del lamento precedente; «Porque» conserva la relación causal/discursiva que el inglés expresa con «For».
- source_word: גַם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: 'Expresa el énfasis retórico: no solo sufren personas y ganado, sino también un animal salvaje. «Aun» mantiene ese realce sin sonar demasiado enfático.'
- source_word: אַיֶּלֶת
  english_pob_choice: the doe
  chosen_spanish: la cierva
  alternatives_spanish:
  - la venada
  - la hembra del venado
  lexicon: HALOT
  rationale: El hebreo nombra específicamente a una hembra de ciervo. «Cierva» es natural, preciso y digno en español bíblico moderno.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en la llanura
  - en el campo abierto
  lexicon: HALOT
  rationale: «Campo» preserva la imagen concreta y funciona bien en español; comunica el entorno abierto sin sobreexplicar.
- source_word: יָלְדָה
  english_pob_choice: gives birth
  chosen_spanish: da a luz
  alternatives_spanish:
  - pare
  - alumbra
  lexicon: HALOT
  rationale: Verbo natural y claro para el parto animal en español; conserva la acción viva del texto poético.
- source_word: וְעָזוֹב
  english_pob_choice: and abandons her young
  chosen_spanish: y abandona[a]
  alternatives_spanish:
  - y deja al recién nacido
  - y lo deja
  lexicon: HALOT
  rationale: El hebreo no expresa el objeto de manera explícita; el sentido contextual es que la cierva abandona a su cría por la falta de pasto. Dejar el complemento implícito en el cuerpo, con nota, preserva la tensión lexical sin forzar una paráfrasis cerrada.
- source_word: דֶּשֶׁא
  english_pob_choice: grass
  chosen_spanish: pasto
  alternatives_spanish:
  - hierba
  - vegetación tierna
  - hierba fresca
  lexicon: HALOT
  rationale: En este contexto de sequía, «pasto» comunica bien la comida vegetal de la cierva y el motivo del abandono. Mantiene la idea de vegetación disponible para alimentarse.
translation_notes:
  revision_awareness: La versión inglesa reciente permanece sin cambios; el español sigue su lectura auditada de alta concordancia con el hebreo, especialmente en el valor enfático de גַם y en el objeto implícito de וְעָזוֹב.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Cierva» mantiene la especificidad zoológica de אַיֶּלֶת sin recurrir a un término arcaizante.
  - «Pasto» se eligió por claridad contextual en una escena de sequía, sin introducir un matiz distinto al de דֶּשֶׁא.
  - Se conserva el verbo en presente para reflejar la vividez poética del hebreo, en línea con la decisión inglesa de usar presente descriptivo.
