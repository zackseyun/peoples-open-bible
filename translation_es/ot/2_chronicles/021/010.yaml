revisions:
- from: Así Edom se rebeló contra la mano de Judá hasta hoy[a]. Entonces Libna también se rebeló en ese tiempo contra su mano, porque había abandonado a Yahvé[c][b], el Dios de sus padres.
  to: Así Edom se rebeló y dejó de estar bajo el dominio de Judá hasta hoy[a]. En aquel tiempo, Libna también se rebeló y dejó de estar bajo su dominio[b], porque había abandonado a Yahvé[c], el Dios de sus padres.
  rationale: Se corrige el modismo hebreo principal para reflejar liberación del dominio, no oposición ‘contra la mano’. También se suaviza la expresión temporal para un español más natural, manteniendo la estructura y la ambigüedad causal documentada por el audit trail inglés. Se conservan Yahvé y las demás decisiones léxicas principales del proyecto.
  reviewer_model: gpt-5.4
