    rationale: Aunque comprensible, «Traedme» es marcadamente peninsular. Dado el objetivo de español neutral latinoamericano, conviene «Tráiganme» o «Preséntenme».
  - severity: low
    issue: Puede afinarse el matiz cultual de הַגִּשׁוּ אֵלַי
    rationale: El hebreo expresa ‘acercar/presentar’. «Tráiganme» es aceptable y natural; «Preséntenme» sería más explícito cultualmente, pero no es indispensable.
