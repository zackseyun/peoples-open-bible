translation:
  language: es
  text: 'Y será, cuando te digan: «¿Por qué estás gimiendo?», que responderás: «A causa de la noticia[a], porque viene». Entonces se derretirá todo corazón, se debilitarán todas las manos, desfallecerá todo espíritu, y todas las rodillas correrán con agua[b]. Mira, viene y sucederá, declara el Señor Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del informe» para «de la noticia».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todas las rodillas correrán con agua», un modismo vívido de terror y derrumbe; algunos lo entienden como rodillas que se aflojan como agua, otros como pérdida de control corporal por miedo.'
    reason: cultural_note
lexical_decisions:
- source_word: נֶאֱנָח
  english_pob_choice: groaning
  chosen_spanish: gimiendo
  alternatives_spanish:
  - suspirando
  - lamentándote
  lexicon: HALOT
  rationale: El participio nifal expresa lamento audible o quejido. «Gimiendo» conserva mejor la fuerza física y emocional que «suspirando», y evita suavizar la escena.
- source_word: שְׁמוּעָה
  english_pob_choice: the news
  chosen_spanish: la noticia
  alternatives_spanish:
  - el informe
  - las nuevas
  lexicon: HALOT
  rationale: En el contexto se trata del anuncio temible de calamidad. «La noticia» suena natural en español moderno y conserva la idea de un mensaje recibido; «el informe» sería más técnico.
- source_word: בָאָה
  english_pob_choice: it is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está llegando
  - está por venir
  lexicon: HALOT
  rationale: Aunque el verbo hebreo concuerda con «noticia» en femenino, el español lo expresa de manera impersonal con «viene». Es breve, claro y mantiene la inminencia.
- source_word: וְנָמֵס כָּל לֵב
  english_pob_choice: every heart will melt
  chosen_spanish: se derretirá todo corazón
  alternatives_spanish:
  - se derretirá cada corazón
  - se derretirá todo ánimo
  lexicon: HALOT
  rationale: «Derretirse» reproduce la imagen hebrea de deshacerse por el terror. Se conserva «corazón» en vez de convertirlo en «ánimo» para no perder la metáfora corporal.
- source_word: וְרָפוּ כָל יָדַיִם
  english_pob_choice: all hands will grow weak
  chosen_spanish: se debilitarán todas las manos
  alternatives_spanish:
  - se aflojarán todas las manos
  - se volverán débiles todas las manos
  lexicon: HALOT
  rationale: La expresión idiomática señala pérdida de fuerza para actuar. «Se debilitarán» comunica bien el sentido y conserva el paralelismo con el hebreo.
- source_word: וְכִהֲתָה כָל רוּחַ
  english_pob_choice: every spirit will faint
  chosen_spanish: desfallecerá todo espíritu
  alternatives_spanish:
  - se apagará todo espíritu
  - se debilitará todo espíritu
  lexicon: HALOT
  rationale: Aquí רוּחַ es el espíritu interior, el valor o aliento vital. «Desfallecerá» transmite mejor el colapso de ánimo que una traducción más literal como «se apagará».
- source_word: וְכָל בִּרְכַּיִם תֵּלַכְנָה מַּיִם
  english_pob_choice: all knees will run with water
  chosen_spanish: todas las rodillas correrán con agua
  alternatives_spanish:
  - todas las rodillas se volverán agua
  - todas las rodillas temblarán
  lexicon: HALOT
  rationale: Se mantiene la imagen vívida del hebreo sin interpretarla en exceso. La frase expresa terror extremo y posible pérdida de control corporal; por eso se conserva la metáfora en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: «Mira» es un equivalente natural y urgente en español moderno. Evita el tono arcaico de «he aquí» sin perder la deíxis.
- source_word: וְנִהְיָתָה
  english_pob_choice: it will happen
  chosen_spanish: sucederá
  alternatives_spanish:
  - ocurrirá
  - se cumplirá
  lexicon: HALOT
  rationale: El verbo refuerza la certeza del cumplimiento de lo anunciado. «Sucederá» es directo y natural; «se cumplirá» introduciría un matiz menos neutro.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el criterio del proyecto para YHWH: «Yahvé» en el texto principal. «Señor» traduce אֲדֹנָי y conserva la combinación reverente del hebreo compuesto.'
theological_decisions:
- issue: Renderización del Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El hebreo usa el Tetragrámaton directamente; conforme al criterio del proyecto, se debe conservar como «Yahvé» y no ocultarlo tras «SEÑOR». Como אֲדֹנָי antecede al Nombre, «Señor Yahvé» comunica la forma compuesta sin duplicar títulos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de רוּחַ en la serie de colapso interno
  english_pob_reading: every spirit will faint
  chosen_spanish_reading: desfallecerá todo espíritu
  alternative_spanish_readings:
  - desfallecerá todo aliento
  - se apagará todo espíritu
  rationale: En este paralelismo, רוּחַ no es viento ni simple aliento físico, sino el vigor interior/coraje. «Espíritu» mantiene el paralelismo semántico con «corazón» y «manos», sin borrar la tensión léxica.
  doctrine_reference: HALOT; paralelismo poético en Ezequiel 21:12
translation_notes:
  revision_awareness: Se revisó el paso más reciente y se mantuvo la lectura alta de concordancia; no hubo cambios aplicados en la fuente inglesa, así que la versión española sigue de cerca el texto hebreo y la auditoría POB sin introducir glosas innecesarias.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה según el criterio del proyecto, y «Señor» para אֲדֹנָי.
  - Se preserva el paralelismo hebreo de corazón / manos / espíritu / rodillas sin reinterpretarlo en términos abstractos.
  - La metáfora de las rodillas con agua se conserva en el texto y se aclara solo en nota.
  - Se mantiene un español moderno y digno, evitando arcaísmos salvo donde el registro del pasaje lo exigiera.
