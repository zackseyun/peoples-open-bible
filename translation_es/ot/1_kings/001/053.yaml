translation:
  language: es
  text: 'Entonces el rey Salomón mandó[a], y lo hicieron bajar del altar. Él vino y se postró ante el rey Salomón, y Salomón le dijo: «Ve a tu casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo llevaron hacia abajo desde sobre el altar». El hebreo, de forma más literal, dice «lo hicieron bajar de encima del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: mandó
  alternatives_spanish:
  - envió
  - mandó a decir
  lexicon: HALOT
  rationale: El hebreo שׁלח aquí expresa el acto real de dar la orden de hacer venir/bajar; en español, 'mandó' comunica bien la iniciativa regia sin añadir un objeto no presente en el texto.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - rey Salomón
  - el rey, Salomón
  lexicon: HALOT
  rationale: Conservo el título y el nombre como apposición natural en español; 'el rey Salomón' mantiene la referencia directa y la dignidad narrativa.
- source_word: וַיֹּרִדֻהוּ
  english_pob_choice: they brought him down
  chosen_spanish: lo hicieron bajar
  alternatives_spanish:
  - lo bajaron
  - lo llevaron hacia abajo
  lexicon: HALOT
  rationale: El hifil/pasivo causativo de ירד requiere una idea de causación. 'Lo hicieron bajar' refleja mejor el valor causativo que un simple 'lo bajaron', y evita perder el matiz de que otros lo forzaron a descender.
- source_word: מֵעַל הַמִּזְבֵּחַ
  english_pob_choice: from the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - de encima del altar
  - desde sobre el altar
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'de encima de'. En español, 'del altar' es conciso y natural; el contexto anterior deja claro que estaba aferrado al altar.
- source_word: וַיָּבֹא
  english_pob_choice: he came
  chosen_spanish: Él llegó
  alternatives_spanish:
  - vino
  - entró
  lexicon: HALOT
  rationale: '''Llegó'' transmite la secuencia narrativa sin especificar demasiado la dirección. En este contexto, evita una repetición seca de ''vino'' y conserva el movimiento hacia la presencia del rey.'
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - se arrodilló
  lexicon: HALOT
  rationale: שׁחה en esta forma suele implicar reverencia profunda o postración. 'Se postró' conserva mejor la fuerza gestual que un mero 'se inclinó'.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: ante el rey Salomón
  alternatives_spanish:
  - al rey Salomón
  - delante del rey Salomón
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es ל, en español la fórmula de homenaje 'ante' expresa con claridad la acción de postrarse en presencia de alguien de autoridad.
- source_word: וַיֹּאמֶר לוֹ שְׁלֹמֹה
  english_pob_choice: and Solomon said to him
  chosen_spanish: Salomón le dijo
  alternatives_spanish:
  - y Salomón le dijo
  - entonces Salomón le dijo
  lexicon: HALOT
  rationale: La repetición del nombre propio mantiene la claridad del hebreo. El clítico 'le' expresa el destinatario de la orden de manera natural en español.
- source_word: לֵךְ לְבֵיתֶךָ
  english_pob_choice: Go to your house
  chosen_spanish: Vete a tu casa
  alternatives_spanish:
  - Ve a tu casa
  - Ve a tu casa misma
  lexicon: HALOT
  rationale: El imperativo con destino puede sonar más natural como despedida formal en español con 'Vete a tu casa'. Mantiene la fuerza de un despido real sin suavizarla en exceso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el expediente inglés; se conserva la causalidad de וַיֹּרִדֻהוּ y la secuencia narrativa sin añadir elementos doctrinales ni suavizar el acto de sumisión final.
  spanish_consistency_notes:
  - Se usa 'rey Salomón' de forma consistente para el título real.
  - '''Se postró'' preserva el gesto de homenaje/reverencia con la fuerza adecuada.'
  - '''Vete a tu casa'' funciona como despedida regia equivalente al inglés POB sin introducir una paráfrasis excesiva.'
