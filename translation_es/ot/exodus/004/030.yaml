translation:
  language: es
  text: Aarón habló todas las palabras que Yahvé había hablado a Moisés, y realizó las señales ante los ojos del pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la vista del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: דבר en piel suele equivaler a 'hablar'. En español, 'habló' conserva la acción de pronunciar un discurso/encargo y resulta natural en el flujo narrativo.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todo lo dicho
  - todas las cosas
  lexicon: HALOT
  rationale: '''Palabras'' preserva la concreción del hebreo y evita diluir el contenido en un ''todo'' más genérico. El plural concuerda con el hebreo y con el estilo del registro.'
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה
  english_pob_choice: that Yahweh had spoken to Moses
  chosen_spanish: que Yahvé había hablado a Moisés
  alternatives_spanish:
  - que Yahvé le había hablado a Moisés
  - que el habla Yahvé a Moisés
  lexicon: HALOT
  rationale: El relativo se vierte de modo natural con pretérito pluscuamperfecto para señalar una acción previa en la narración. Se mantiene 'había hablado' para reflejar el valor perfectivo anterior del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', siguiendo el criterio terminológico del proyecto para el Tetragrámaton y evitando la sustitución por un título.
- source_word: וַיַּעַשׂ
  english_pob_choice: performed
  chosen_spanish: realizó
  alternatives_spanish:
  - hizo
  - efectuó
  lexicon: HALOT
  rationale: Con 'las señales' el verbo adquiere un sentido de ejecución pública y verificable; 'realizó' comunica ese acto sin volverlo demasiado técnico ni perder la fuerza narrativa.
- source_word: הָאֹתֹת
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - las maravillas
  lexicon: HALOT
  rationale: '''Señales'' expresa bien la función acreditadora de אֹת en este contexto. ''Signos'' también sería posible, pero ''señales'' es más claro y natural en español bíblico contemporáneo.'
- source_word: לְעֵינֵי הָעָם
  english_pob_choice: before the eyes of the people
  chosen_spanish: delante de los ojos del pueblo
  alternatives_spanish:
  - a la vista del pueblo
  - en presencia del pueblo
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de forma transparente. 'Delante de los ojos del pueblo' mantiene el matiz visual del original sin perder legibilidad en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; el español debe conservar el nombre propio de Dios y no sustituirlo por un título. 'Yahvé' es la forma de proyecto para esa decisión.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene un equilibrio entre literalidad y fluidez: ''spoken''/''performed'' y la imagen idiomática ''before the eyes of the people''. La propuesta española conserva esa estructura, ajustando el orden y la concordancia para que el texto sea publicable sin perder el paralelismo hebreo. No se detectan revisiones textuales adicionales en el expediente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se usa 'señales' para אֹת, en coherencia con el contexto de autenticación milagrosa.
  - La relación temporal del relativo se expresa con pluscuamperfecto ('había hablado') para reflejar el orden narrativo.
  - La frase visual se conserva con 'delante de los ojos del pueblo', cercana al hebreo y todavía natural en español.
