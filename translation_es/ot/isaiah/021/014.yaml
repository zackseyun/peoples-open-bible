- from: Trae agua para salir al encuentro del sediento[a]; oh habitantes de la tierra de Tema[b], salid al encuentro del fugitivo con pan.
  to: Traigan agua para salir al encuentro del sediento[a]; habitantes de la tierra de Tema[b], salgan al encuentro del fugitivo con pan.
  rationale: Se corrigió la persona y número de los imperativos para reflejar el hebreo plural y para mantener consistencia interna en español. Se ajustó el registro a un español neutral latinoamericano ('traigan', 'salgan al encuentro') y se simplificó el vocativo. La nota [a] se alineó mejor con el audit trail inglés, que ubica la alternativa en la segunda cola y explica la ambigüedad de בְּלַחְמוֹ. La nota [b] se pulió estilísticamente sin cambiar su contenido.
