review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Dios es el sujeto singular de אֱלֹהִים con verbos singulares, y los verbos gnómicos se expresan bien en presente. También conserva la referencia de los sufijos femeninos a la sabiduría implícita del contexto. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el inglés: en español el texto principal ya dice «su camino ... su lugar», de modo que la nota «O «su camino ... su lugar»» no ofrece una alternativa real ni explica claramente la opción femenina correspondiente al hebreo.'
  spanish_quality_summary: El español es claro, natural y digno. «Dios entiende su camino, y él conoce su lugar» es legible y fiel. No obstante, la nota necesita corrección para evitar redundancia y confusión. Conviene hacer explícita la alternativa femenina española («su camino ... su lugar» = de ella / «el camino de ella ... el lugar de ella») o, más naturalmente, explicar que también puede entenderse «el camino de ella ... su lugar», reflejando el femenino gramatical de «sabiduría».
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «Dios» para אֱלֹהִים es correcto; no aparece Yahvé ni otros términos sensibles. La elección de «entiende» y «conoce» es adecuada. La conservación de un posesivo no marcado en español para un antecedente femenino personificado es una solución válida, pero la nota debe documentar correctamente la alternativa femenina del hebreo.'
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de dar una alternativa real.
    rationale: El inglés preserva la alternativa «her way ... her place». En español, «su camino ... su lugar» ya aparece en el texto principal, así que la nota actual no añade información útil ni refleja la decisión léxica documentada.
  - severity: low
    issue: La formulación de la nota puede aclarar mejor que el femenino es gramatical y se refiere a «sabiduría».
    rationale: Dado que «su» en español no marca género, la nota debe explicar explícitamente la referencia femenina para conservar la justificación del POB audit trail.
  revised_spanish_text: Dios entiende su camino[a], y él conoce su lugar.
  revised_footnotes:
  - marker: a
    text: O «el camino de ella ... el lugar de ella», reflejando la forma gramatical femenina de «sabiduría» en hebreo.
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse porque es fiel, natural y refleja bien el hebreo en español. La única reparación necesaria es la nota al pie: debe preservar una alternativa femenina real, no repetir el mismo texto del cuerpo principal. La nueva nota documenta con claridad la referencia femenina de los sufijos hebreos sin forzar una redacción menos natural en el texto principal.'
