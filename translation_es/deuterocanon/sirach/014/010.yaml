translation:
  language: es
  text: Un ojo malo[a] es avaro con el pan, y hay mezquindad[b] en su mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Un ojo malo» conserva el modismo bíblico, que en este contexto significa una disposición avara, envidiosa o mezquina, no un fenómeno mágico.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de esta cláusula es algo difícil; el paralelo griego favorece el sentido de mezquindad o escasez en la mesa.
    reason: alternative_reading
lexical_decisions:
- source_word: עַיִן רַע / ὀφθαλμὸς πονηρός
  english_pob_choice: an evil eye
  chosen_spanish: Ojo mal
  alternatives_spanish:
  - un ojo malo
  - ojo maligno
  - ojo envidioso
  lexicon: HALOT; BDAG
  rationale: La frase conserva la imagen idiomática básica del hebreo y del griego, pero en español 'ojo malo' suena más natural que un calco rígido. 'Mal' mantiene el valor moral/actitudinal del idiomismo sin sustituirlo por una paráfrasis distante.
- source_word: תָּעִיט / φθονερὸς
  english_pob_choice: is stingy
  chosen_spanish: es avaro
  alternatives_spanish:
  - es tacaño
  - es mezquino
  - es envidioso
  lexicon: HALOT; BDAG
  rationale: El contexto habla de una disposición que restringe el pan y se refleja en la mesa; 'avaro' comunica bien la actitud de retener y escatimar. 'Tacaño' es posible, pero 'avaro' mantiene mejor el tono bíblico y la fuerza ética del dicho.
- source_word: לָחֶם / ἄρτος
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - el sustento
  lexicon: HALOT; BDAG
  rationale: Se conserva la concreción de 'bread/pan' en ambas lenguas fuente. En español, 'pan' es la equivalencia natural y bíblica para este alimento básico.
- source_word: מְהוּמָה / ἐνλεπής
  english_pob_choice: meanness
  chosen_spanish: mezquindad
  alternatives_spanish:
  - miseria
  - miserabilidad
  - tacañería
  lexicon: HALOT; BDAG
  rationale: La segunda cláusula es difícil en hebreo, y el paralelo griego apunta a una cualidad de escasez o mezquindad en la mesa. 'Mezquindad' conserva el matiz social y moral sin volver el verso demasiado interpretativo.
- source_word: שֻׁלְחָנוֹ / τράπεζα αὐτοῦ
  english_pob_choice: his table
  chosen_spanish: su mesa
  alternatives_spanish:
  - su mesa de comer
  - su mesa de banquete
  lexicon: HALOT; BDAG
  rationale: '''Mesa'' reproduce la imagen compartida por el hebreo y el griego y resulta natural en español. El posesivo singular mantiene la referencia al ámbito doméstico de provisión e hospitalidad.'
theological_decisions:
- issue: Sentido del idiomismo 'ojo malo' como disposición moral, no daño mágico
  english_pob_reading: Hebrew 'evil eye' is an idiom for a grudging, stingy, or envious disposition. The Greek parallel likewise supports this sense.
  chosen_spanish_reading: '''Ojo mal'' se entiende como una actitud avara o mezquina, no como un poder mágico o una maldición.'
  alternative_spanish_readings:
  - ojo malo en sentido supersticioso
  - ojo envidioso como mera expresión física
  rationale: El hebreo y el griego describen una disposición ética de avaricia o rencor frente al pan, no un fenómeno ocultista. La traducción debe preservar la imagen idiomática y, al mismo tiempo, orientar al lector hacia su sentido moral.
  doctrine_reference: Sabiduría bíblica; uso idiomático semítico de 'ojo malo'
translation_notes:
  revision_awareness: El texto inglés POB y sus notas se revisaron sin cambios sustanciales; la principal atención fue trasladar al español el idiomismo de 'evil eye' y la cláusula difícil sobre la mesa, manteniendo el paralelo hebreo-griego y su tensión interpretativa.
  spanish_consistency_notes:
  - Se usa 'pan' para לָחֶם/ἄρτος por su concreción bíblica y naturalidad en español.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; el versículo no contiene el tetragrámaton ni cristología.
  - Se conserva la tensión lexical de la segunda cláusula con una solución moderadamente interpretativa ('mezquindad') respaldada por el griego.
  - La puntuación y el estilo buscan una lectura pública clara y digna, sin depender de giros arcaizantes.
