translation:
  language: es
  text: Y tu descendencia será como el polvo de la tierra, y te extenderás hacia el oeste y hacia el este, hacia el norte y hacia el sur; y en ti y en tu descendencia serán bendecidas[a] todas las familias de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las familias de la tierra se bendecirán a sí mismas en ti y en tu descendencia». El verbo hebreo puede entenderse también con sentido reflexivo o medio.'
    reason: alternative_reading
lexical_decisions:
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu posteridad
  - tus descendientes
  lexicon: HALOT
  rationale: זֶרַע puede referirse a descendencia colectiva. En español, «descendencia» conserva ese valor colectivo singular con naturalidad y dignidad; «simiente» sería más marcado y «tus descendientes» desplaza el singular colectivo al plural.
- source_word: כַּעֲפַר הָאָרֶץ
  english_pob_choice: like the dust of the earth
  chosen_spanish: como el polvo de la tierra
  alternatives_spanish:
  - como el polvo del suelo
  - como el polvo de la tierra
  lexicon: HALOT
  rationale: La imagen compara la multitud con el polvo de la tierra. «Polvo de la tierra» reproduce bien la metáfora bíblica y es idiomático en español; «suelo» sería posible, pero menos natural aquí.
- source_word: וּפָרַצְתָּ
  english_pob_choice: you will spread out
  chosen_spanish: te extenderás
  alternatives_spanish:
  - te abrirás paso
  - romperás hacia fuera
  - te multiplicarás
  lexicon: HALOT
  rationale: El verbo hebreo sugiere expansión y desbordamiento territorial. «Te extenderás» comunica esa expansión de modo claro y natural en español, sin perder por completo la fuerza de ruptura implícita.
- source_word: יָמָּה וָקֵדְמָה וְצָפֹנָה וָנֶגְבָּה
  english_pob_choice: to the west and to the east and to the north and to the south
  chosen_spanish: al oeste y al este, al norte y al sur
  alternatives_spanish:
  - hacia el oeste y hacia el este, hacia el norte y hacia el sur
  - al mar y al oriente, al norte y al sur
  lexicon: HALOT
  rationale: Las direcciones se expresan de forma natural con los puntos cardinales en español. Se evita «mar/oriente» porque el contexto aquí es una serie direccional general, no una referencia idiomática fija.
- source_word: וְנִבְרֲכ֥וּ
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - serán benditos
  - se bendecirán
  - se bendecirán a sí mismas
  lexicon: HALOT
  rationale: El nifal de ברך admite debate entre pasivo y matiz reflexivo/medio. Se mantiene el pasivo en la línea principal, en forma femenina plural para concordar con «familias», preservando la lectura más directa del pacto.
- source_word: בְךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - por medio de ti
  - en ti mismo
  lexicon: HALOT
  rationale: Se conserva la preposición «en» para reflejar la fórmula hebrea de bendición. «Por medio de ti» explicita demasiado la mediación y va más allá del texto base.
- source_word: כָּל מִשְׁפְּחֹת הָאֲדָמָה
  english_pob_choice: all the families of the earth
  chosen_spanish: todas las familias de la tierra
  alternatives_spanish:
  - todas las familias de la tierra
  - todas las familias del suelo
  - todos los clanes de la tierra
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת se traduce naturalmente como «familias»; «tierra» conserva el alcance universal del hebreo אֲדָמָה en esta fórmula patriarcal.
- source_word: וּבְזַרְעֶךָ
  english_pob_choice: and in your offspring
  chosen_spanish: y en tu descendencia
  alternatives_spanish:
  - y en tu simiente
  - y por tu descendencia
  - y en tu linaje
  lexicon: HALOT
  rationale: Se repite el mismo sustantivo colectivo para mantener la cohesión semántica con el inicio del versículo y dejar abierta la continuidad genealógica y teológica del término.
theological_decisions:
- issue: Sentido de נִבְרֲכוּ en la fórmula patriarcal de bendición
  english_pob_reading: 'Passive: ''all the families of the earth will be blessed'''
  chosen_spanish_reading: 'Pasivo: «serán bendecidas todas las familias de la tierra»'
  alternative_spanish_readings:
  - 'Reflexivo/medio: «se bendecirán a sí mismas todas las familias de la tierra»'
  - 'Reflexivo idiomático: «hallarán bendición»'
  rationale: La forma hebrea permite discusión, pero el pasivo es la lectura más directa y transparente en este contexto de promesa. Se preserva la tensión textual en la nota, sin resolverla de forma dogmática en el texto principal.
  doctrine_reference: Mantener la ambigüedad relevante de la fórmula de Abraham/Jacob; no forzar una resolución donde el hebreo admite más de una lectura.
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente sin cambios sustantivos: mantiene el valor colectivo de זֶרַע, la imagen de innumerabilidad con «polvo de la tierra», la expansión direccional y la ambigüedad reconocida de נִבְרֲכוּ en la fórmula de bendición patriarcal.'
  spanish_consistency_notes:
  - Se mantiene «descendencia» de forma consistente para זֶרַע, evitando alternar con «simiente» o «descendientes» en el mismo versículo.
  - Se conserva «en ti» y «en tu descendencia» para reflejar la repetición preposicional del hebreo.
  - La concordancia femenina plural en «serán bendecidas» responde a «familias» y suena natural en español bíblico actual.
