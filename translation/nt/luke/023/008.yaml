id: LUK.23.8
reference: Luke 23:8
source:
  edition: SBLGNT
  text: ὁ δὲ Ἡρῴδης ἰδὼν τὸν Ἰησοῦν ἐχάρη λίαν, ἦν γὰρ ⸂ἐξ ἱκανῶν χρόνων θέλων⸃ ἰδεῖν αὐτὸν διὰ τὸ ⸀ἀκούειν περὶ αὐτοῦ, καὶ ἤλπιζέν τι σημεῖον ἰδεῖν ὑπ’ αὐτοῦ γινόμενον.
translation:
  text: Now when Herod saw Jesus[a], he rejoiced greatly, for he had for a long time wanted to see him because he had heard about him[b], and he was hoping to see some sign done by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he had heard about him.' The Greek can be rendered more simply, but the present infinitive suggests repeated or ongoing reports.
    reason: lexical_alternative
  - marker: b
    text: Or 'some miracle.' The Greek says 'some sign' (σημεῖον), which can refer to a miraculous act viewed as a significant sign.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχάρη λίαν
  chosen: he rejoiced greatly
  alternatives:
  - he was very glad
  - he rejoiced exceedingly
  lexicon: BDAG
  rationale: The aorist passive-form verb χαίρω here is deponent in sense, meaning 'rejoice/be glad.' 'Rejoiced greatly' preserves the verbal force and the intensifier λίαν without sounding archaic.
- source_word: ἐξ ἱκανῶν χρόνων
  chosen: for a long time
  alternatives:
  - for quite some time
  - for many years
  lexicon: BDAG
  rationale: The idiom literally means 'from sufficient/many times' and denotes an extended duration. 'For a long time' is natural English and avoids over-specifying 'years,' which the Greek does not require.
- source_word: θέλων ἰδεῖν αὐτόν
  chosen: wanted to see him
  alternatives:
  - wishing to see him
  - desiring to see him
  lexicon: BDAG
  rationale: θέλω commonly means 'want, wish, desire.' 'Wanted to see him' is straightforward modern English and fits the ongoing sense created by ἦν + participle.
- source_word: διὰ τὸ ἀκούειν περὶ αὐτοῦ
  chosen: because he had been hearing about him
  alternatives:
  - because he had heard about him
  - because of hearing about him
  lexicon: BDAG
  rationale: The articular infinitive with διά expresses cause. The present infinitive ἀκούειν suggests ongoing/repeated hearing rather than a single report, so 'had been hearing' best captures the aspect in idiomatic English.
- source_word: ἤλπιζέν τι σημεῖον ἰδεῖν
  chosen: he was hoping to see some sign
  alternatives:
  - he hoped to see some miracle
  - he was expecting to see some sign
  lexicon: BDAG
  rationale: ἐλπίζω here conveys hope/expectation. σημεῖον is rendered 'sign' rather than 'miracle' to preserve the Greek term's broader sense of a significant attesting act, even though a miraculous deed is in view.
- source_word: ὑπ’ αὐτοῦ γινόμενον
  chosen: being done by him
  alternatives:
  - performed by him
  - happening through him
  lexicon: BDAG
  rationale: The present participle γινόμενον modifies σημεῖον and presents the sign as an act coming to pass. 'Being done by him' preserves the participial form and the agency marked by ὑπό, though 'performed by him' is a smoother alternative.
- source_word: ὁ δὲ Ἡρῴδης
  chosen: Now when Herod
  alternatives:
  - And Herod
  - Now Herod
  lexicon: BDAG
  rationale: δέ marks narrative development. Rendering with 'Now' gives natural English scene progression. The temporal nuance is then completed by linking ἰδών with 'when Herod saw Jesus.'
- source_word: ἰδὼν τὸν Ἰησοῦν
  chosen: when Herod saw Jesus
  alternatives:
  - seeing Jesus
  - after he saw Jesus
  lexicon: BDAG
  rationale: The aorist participle is most naturally temporal here, preceding the main verb ἐχάρη. 'When Herod saw Jesus' makes the relation explicit in idiomatic English.
