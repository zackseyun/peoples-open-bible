  text: 'Y Efrón respondió a Abraham, diciéndole:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El verbo narrativo de respuesta en diálogo admite en español tanto «respondió» como «contestó». Aquí se elige «respondió» porque conserva bien la secuencia narrativa sin sonar coloquial y refleja directamente la acción de dar respuesta.
- source_word: עֶפְרוֹן
  english_pob_choice: Ephron
  chosen_spanish: Ephrón
  alternatives_spanish:
  - Efrón
  - Ephron
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio de forma estándar en español bíblico. «Ephrón» mantiene la identificación clara con el nombre hebreo y la pronunciación hispanizable.
- source_word: אֶת אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - a Abraham
  lexicon: Función sintáctica del objeto/destinatario
  rationale: En hebreo, אֶת marca aquí al interlocutor afectado por la respuesta, pero en español no se traduce como partícula. Se mantiene «Abraham» sin expansión, porque el sentido de destinatario queda claro por el verbo de habla y por el contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: HALOT
  rationale: El infinitivo de habla funciona como introducción discursiva. «Diciendo» conserva la estructura hebrea de manera natural en español, igual que el inglés POB usa «saying».
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - le
  - a Abraham
  lexicon: HALOT
  rationale: El sufijo pronominal vuelve sobre Abraham. En español, «a él» es una opción explícita y transparente; se prefiere aquí porque la frase está aislada y evita ambigüedad de referencia, aunque en contexto narrativo también sería posible omitirlo o usar «le».
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético base y con la traducción inglesa auditada; no hay revisiones aplicadas ni variantes textuales indicadas en el paquete fuente.
  spanish_consistency_notes:
  - 'Se preservó el orden narrativo básico del hebreo: respuesta + nombre propio + destinatario + introducción de habla.'
  - No se añadió contenido explicativo ausente del מקור; la frase queda abierta para continuar con el discurso en el versículo siguiente.
  - Se usó puntuación española normal con coma antes de la cita introducida por «diciendo».
