translation:
  language: es
  text: el que te sacia con lo bueno[a], de modo que tu juventud se renueva como la del águila[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu adorno». La frase es difícil; muchos entienden el sentido como «el que te sacia con lo bueno mientras vives» o, según otra tradición interpretativa, «el que sacia tu boca con lo bueno».'
    reason: alternative_reading
  - marker: b
    text: O «como un águila». El hebreo nombra un ave rapaz grande, tradicionalmente traducida «águila».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂבִּיעַ
  english_pob_choice: who satisfies
  chosen_spanish: el que te sacia
  alternatives_spanish:
  - el que te satisface
  - el que te llena
  lexicon: HALOT
  rationale: 'El participio causativo se expresa mejor en español con una relativa: «el que te sacia». «Sacia» conserva la idea de dar plena satisfacción sin perder el matiz intenso del hebreo.'
- source_word: בַּטּוֹב
  english_pob_choice: with good
  chosen_spanish: de bien
  alternatives_spanish:
  - con bien
  - con lo bueno
  - con cosas buenas
  lexicon: HALOT
  rationale: El sustantivo-adjetivo טוב funciona aquí de manera sustantiva. «De bien» mantiene concisión y permite que el verso fluya de forma natural en español, sin añadir un objeto que el hebreo no explicita.
- source_word: עֶדְיֵךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - tu adorno
  - tu boca
  - tu deseo
  lexicon: HALOT
  rationale: 'Sigo la decisión POB de no forzar una lectura literal oscura en el cuerpo del texto. El hebreo es difícil y ha recibido interpretaciones diversas; en español, la lectura más clara y contextual es tomar a la persona como objeto del verbo: «te sacia».'
- source_word: תִּתְחַדֵּשׁ
  english_pob_choice: is renewed
  chosen_spanish: se renueva
  alternatives_spanish:
  - es renovada
  - se hace nueva
  lexicon: HALOT
  rationale: El hitpael de חדש admite valor pasivo-reflexivo. «Se renueva» es natural en español y conserva la idea de renovación sufrida por el sujeto.
- source_word: כַּנֶּשֶׁר
  english_pob_choice: like the eagle’s
  chosen_spanish: como la del águila
  alternatives_spanish:
  - como el águila
  - como la de un águila
  lexicon: HALOT
  rationale: Se mantiene la imagen tradicional de «águila», coherente con la decisión inglesa y con el uso bíblico recibido, sin introducir una identificación zoológica más técnica en el texto principal.
- source_word: נְעוּרָיִכִי
  english_pob_choice: your youth
  chosen_spanish: tu juventud
  alternatives_spanish:
  - tu vigor juvenil
  - tu mocedad
  lexicon: HALOT
  rationale: «Juventud» transmite de forma idiomática el sentido de la abstracción hebrea y deja implícita la fuerza renovada que el contexto sugiere.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el sentido auditor de la POB inglesa: se evita una traducción mecánica del sintagma difícil עֶדְיֵךְ y se conserva la imagen poética del águila con una formulación natural en español. No se introdujeron cambios respecto al estado revisado del texto fuente.'
  spanish_consistency_notes:
  - Se usa «águila» para כַּנֶּשֶׁר, en línea con la terminología POB y la tradición bíblica amplia.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton; el referente implícito sigue siendo el sujeto del contexto salmódico.
  - «Sacia» y «se renueva» preservan el paralelismo poético sin sobre-explicar el hebreo difícil.
