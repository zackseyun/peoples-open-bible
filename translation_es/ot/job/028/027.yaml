translation:
  language: es
  text: Entonces la vio, la declaró; la estableció[a], y también la investigó a fondo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contarla», «recontarla» o «exponerla». El verbo hebreo puede tener sentidos de contar o declarar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca una secuencia temporal en el verso poético. «Entonces» reproduce bien ese avance narrativo sin volver la línea pesada.
- source_word: רָאָהּ
  english_pob_choice: he saw it
  chosen_spanish: lo vio
  alternatives_spanish:
  - lo percibió
  - lo contempló
  lexicon: HALOT
  rationale: ראה expresa ver con alcance perceptivo; el objeto femenino hebreo se vierte como «lo» para mantener la referencia al sustantivo implícito del contexto sin recargar la frase.
- source_word: וַיְסַפְּרָהּ
  english_pob_choice: declared it
  chosen_spanish: lo declaró
  alternatives_spanish:
  - lo contó
  - lo narró
  - lo dio a conocer
  lexicon: HALOT
  rationale: ספר puede significar contar, relatar o declarar. En este contexto, «declaró» conserva la idea de expresar o dar a conocer, como en la decisión inglesa, sin reducir el verbo a una simple aritmética.
- source_word: הֱכִינָהּ
  english_pob_choice: he established it
  chosen_spanish: lo estableció
  alternatives_spanish:
  - lo fijó
  - lo puso en su lugar
  - lo preparó
  lexicon: HALOT
  rationale: כון en hiphil tiene el sentido de establecer, afirmar o poner firmemente. «Estableció» es fiel y natural en español para la acción de fijar algo con firmeza.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - y aun
  lexicon: HALOT
  rationale: Expresa adición enfática. «Y también» reproduce el valor acumulativo y enlazante del hebreo.
- source_word: חֲקָרָהּ
  english_pob_choice: searched it out
  chosen_spanish: lo investigó a fondo
  alternatives_spanish:
  - lo examinó
  - lo exploró
  - lo averiguó
  lexicon: HALOT
  rationale: חקר implica inquirir, investigar o sondear con profundidad. «Investigó a fondo» transmite bien esa intensidad de búsqueda y evita suavizar el matiz exploratorio del verbo.
theological_decisions:
- issue: Referente de los sufijos femeninos
  english_pob_reading: All feminine suffixes refer to 'wisdom' from the immediate context.
  chosen_spanish_reading: Todos los sufijos remiten a la sabiduría del contexto inmediato.
  alternative_spanish_readings:
  - Podrían entenderse de modo más abstracto como referencia a su medida u ordenamiento.
  rationale: El verso personifica la sabiduría en el contexto cercano y la presenta como objeto de la acción divina. En español se conserva esa referencia implícita mediante pronombres neutros de objeto, sin explicitar innecesariamente el antecedente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y literaria cuando el texto la mantiene'
translation_notes:
  revision_awareness: 'Coincide con el último repaso: no se requieren cambios adicionales respecto al sentido del hebreo ni al audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el sujeto verbal según el contexto amplio de Job 28, sin introducirlo en el verso para no sobreespecificar.
  - El uso de pronombres de objeto («lo») sigue la práctica del texto español para representar el sufijo hebreo femenino cuando el referente contextual es abstracto y conocido.
  - «Investigó a fondo» conserva el cierre intensivo de וְגַם חֲקָרָהּ sin añadir información ajena al hebreo.
