  text: רְתֹ֧ם הַ/מֶּרְכָּבָ֛ה לָ/רֶ֖כֶשׁ יוֹשֶׁ֣בֶת לָכִ֑ישׁ רֵאשִׁ֨ית חַטָּ֥את הִיא֙ לְ/בַת צִיּ֔וֹן כִּי בָ֥/ךְ נִמְצְא֖וּ פִּשְׁעֵ֥י יִשְׂרָאֵֽל־־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/001/013.yaml
  text: Harness the chariot to the swift horse[a], inhabitant of Lachish; she was the beginning of sin to daughter Zion[d][c][b], for in you were found the transgressions of Israel.
  footnotes:
  - marker: a
    text: Or 'O inhabitress of Lachish' or 'you who dwell in Lachish'; the Hebrew uses a feminine singular form addressing the city as a woman.
    reason: lexical_alternative
  - marker: b
    text: Or 'she was the first cause of sin for daughter Zion.' The phrase may indicate that Lachish was an originating point from which Judah adopted Israel's rebellion.
    reason: alternative_reading
  - marker: c
    text: '''Daughter Zion'' is a Hebrew poetic personification of Zion/Jerusalem.'
    reason: cultural_note
  - marker: d
    text: Or 'the rebellions of Israel'; the Hebrew word can emphasize willful revolt, not merely wrongdoing in general.
    reason: lexical_alternative
