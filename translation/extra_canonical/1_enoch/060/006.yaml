translation:
  text: 'And when the day and the power and the punishment and the judgment come, which the Lord of Spirits has prepared for those who do not bow down to the righteous law, and for those who deny the righteous judgment, and for those who take his name in vain—that day has been prepared for the chosen as a covenant, and for sinners as an inquiry.'
