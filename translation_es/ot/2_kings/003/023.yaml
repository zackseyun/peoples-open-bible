translation:
  language: es
  text: 'Y dijeron[a]: «¡Esto es sangre! Los reyes sin duda han peleado entre sí y se han abatido unos a otros. Ahora, Moab[b], ¡al botín!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los reyes se han destruido por completo unos a otros». El hebreo usa una forma enfática del verbo «destruir/devastar»; en el contexto se refiere a que los reyes aparentemente se volvieron unos contra otros.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Moabitas, ¡al botín!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּם זֶה
  english_pob_choice: This is blood!
  chosen_spanish: ¡Esto es sangre!
  alternatives_spanish:
  - ¡Sangre!
  - ¡Esto es sangre.
  lexicon: HALOT
  rationale: La frase hebrea es una exclamación con demostrativo. En español, «Esto es sangre» conserva el valor deíctico de זֶה y el tono de reconocimiento repentino; el signo de exclamación transmite la intensidad del hallazgo.
- source_word: הָחֳרֵב נֶחֶרְבוּ
  english_pob_choice: have surely fought one another
  chosen_spanish: se han batido ciertamente unos contra otros
  alternatives_spanish:
  - se han destruido por completo unos a otros
  - se han arruinado totalmente unos a otros
  - han peleado unos con otros
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto + verbo para énfasis. La POB inglesa tomó el valor contextual de combate recíproco, no una traducción literal de «destrucción». «Se han batido» mantiene el sentido militar y el énfasis de acción intensa; «ciertamente» intenta reflejar la fuerza enfática del hebreo sin suavizarla.
- source_word: הַמְּלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los monarcas
  lexicon: HALOT
  rationale: Se refiere a los reyes del conflicto ya mencionados. «Los reyes» es directo y adecuado en español, sin añadir matiz interpretativo.
- source_word: וַיַּכּוּ אִישׁ אֶת רֵעֵהוּ
  english_pob_choice: and struck down one another
  chosen_spanish: y se han herido unos a otros
  alternatives_spanish:
  - y cada uno hirió a su compañero
  - y se han golpeado unos a otros
  - y se han matado unos a otros
  lexicon: HALOT
  rationale: La expresión recíproca de איש את־רעהו pide un equivalente natural. Opté por «se han herido unos a otros» para conservar reciprocidad y evitar afirmar muerte explícita donde el hebreo solo dice que se golpearon/hirieron; «struck down» en la POB inglesa deja abierta la gravedad, pero el contexto sugiere conflicto recíproco sin exigir una glosa más fuerte.
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora,
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  - Pues ahora
  lexicon: HALOT
  rationale: «Ahora» funciona como transición exhortativa natural en español. No se añadió un equivalente de «then» porque el tono imperativo queda claro por el contexto inmediato y por la exclamación siguiente.
- source_word: לַשָּׁלָל
  english_pob_choice: to the spoil
  chosen_spanish: ¡al botín!
  alternatives_spanish:
  - ¡al saqueo!
  - ¡al despojo!
  - ¡al pillaje!
  lexicon: HALOT
  rationale: Para un grito de guerra, «al botín» es breve, idiomático y fiel al valor direccional de ל. «Saqueo» o «pillaje» describen la acción, pero «botín» conserva mejor el resultado buscado por la arenga.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moabitas
  lexicon: HALOT
  rationale: La POB inglesa conserva el nombre nacional como vocativo exclamativo. En español, «Moab» mantiene la misma aspereza y brevedad del grito de combate. En la lectura alternativa, «moabitas» explicita el destinatario colectivo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al mantener una formulación recíproca uniforme («unos contra otros» / «unos a otros») y evita una lectura mecánica de חרב como simple pasivo de destrucción. Se preserva el valor exclamativo y militar del verso.
  spanish_consistency_notes:
  - Se mantuvo «botín» para לַשָּׁלָל, en línea con un registro bíblico claro y sobrio.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no pertinentes, porque el versículo no contiene el nombre divino.
  - Se conservó la referencia nacional «Moab» como vocativo de combate, conforme al audit trail inglés.
  - La reciprocidad hebrea se expresó con dos miembros paralelos para preservar el ritmo del texto fuente.
