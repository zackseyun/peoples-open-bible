review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca el audit trail inglés: mantiene la adversativa, el modismo de extender la mano, «toca» para נגע, la expresión concreta «hueso y carne», el valor enfático de אִם לֹא y el eufemismo de ברך como «maldecir» con nota literal. Sin embargo, una nota introduce una alternativa no documentada como lectura literal («envía/ extiende tu mano») cuando la evidencia inglesa solo pidió nota para el eufemismo de ברך; además, «en tu misma cara» suena más coloquial y menos digno que una opción más natural y fiel como «en tu cara» o «en tu propia cara».'
  spanish_quality_summary: El español es claro y mayormente natural, pero requiere pulido menor para tono y disciplina editorial. «Te ruego» funciona para נָא, aunque entre comas puede sentirse algo pesado; «por favor» sería posible, pero no necesario. El problema principal de estilo es «en tu misma cara», que suena enfático de manera algo vulgar para un registro bíblico digno. También conviene eliminar la nota [a], porque no preserva una alternativa necesaria y añade ruido auditivo sin apoyo en el POB inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La decisión clave documentada, ברך → «maldecirá» con nota literal «bendecirá», está correctamente alineada con la racionalidad teológica y lexical del POB.
  issues:
  - severity: medium
    issue: La nota [a] añade una alternativa literal/idiomática innecesaria para שְׁלַח ... יָדְךָ.
    rationale: El audit trail inglés solo conserva nota para el eufemismo de ברך. La nota española mezcla «envía/extiende» como si ambas fueran lecturas literales equivalentes y no aporta una ambigüedad real que deba preservarse en nota.
  - severity: medium
    issue: «En tu misma cara» resulta demasiado coloquial para el registro deseado.
    rationale: Aunque comunica confrontación directa, en español bíblico legible y digno suena más natural «en tu cara» o «en tu propia cara». Esto conserva el sentido de אֶל פָּנֶיךָ sin rebajar el tono.
  revised_spanish_text: Pero extiende tu mano, te ruego, y toca su hueso y su carne; y él seguramente te maldecirá[a] en tu cara.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente «te bendecirá»; en este pasaje el verbo se entiende como un eufemismo por «maldecir».
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al hebreo y al POB inglés, pero se elimina una nota superflua no requerida por la evidencia y se mejora el registro de «en tu misma cara» a «en tu cara», que sigue siendo directo, natural y digno. La nota esencial sobre el eufemismo de «bendecirá» se mantiene con su anclaje correcto.
