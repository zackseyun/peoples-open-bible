translation:
  language: es
  text: se reunieron para combatir contra Josué y contra Israel[a], de común acuerdo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una sola boca»; el hebreo usa un modismo que expresa unidad plena de propósito o acuerdo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  english_pob_choice: they gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El verbo qal/waw-consecutivo de קבץ expresa la acción de juntarse como grupo. En español, «se reunieron» comunica bien la reunión colectiva sin añadir matices ajenos.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - unidos
  lexicon: HALOT
  rationale: El adverbio refuerza la acción unificada. «Juntos» es natural en español y mantiene la idea de actuación coordinada.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para pelear
  alternatives_spanish:
  - para combatir
  - para hacer guerra
  lexicon: HALOT
  rationale: El infinitivo de לחם denota entrar en combate. «Pelear» es claro y directo en español; «combatir» sería una alternativa más formal, pero menos inmediata.
- source_word: עִם יְהוֹשֻׁעַ
  english_pob_choice: against Joshua
  chosen_spanish: contra Josué
  alternatives_spanish:
  - frente a Josué
  - en oposición a Josué
  lexicon: HALOT
  rationale: Aunque עִם normalmente significa «con», en contexto bélico toma fuerza adversativa, como refleja la POB inglesa con «against». En español, «contra» expresa esa oposición de modo natural.
- source_word: וְעִם יִשְׂרָאֵל
  english_pob_choice: and against Israel
  chosen_spanish: y contra Israel
  alternatives_spanish:
  - y frente a Israel
  - e Israel
  lexicon: HALOT
  rationale: Se conserva la repetición del segundo עִם con sentido adversativo para reflejar la estructura hebrea y la oposición militar explícita.
- source_word: פֶּה אֶחָד
  english_pob_choice: with one accord
  chosen_spanish: con una sola voz
  alternatives_spanish:
  - de común acuerdo
  - como uno solo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «una boca». La POB inglesa opta por una equivalencia idiomática que comunica unanimidad. En español, «con una sola voz» conserva la imagen y transmite unidad de decisión; «de común acuerdo» sería más explicativo, pero perdería la metáfora.
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada de la POB inglesa: no se introducen cambios textuales, y se mantiene la doble construcción adversativa («contra Josué» / «contra Israel») junto con la expresión idiomática final para «פֶּה אֶחָד».'
  spanish_consistency_notes:
  - Se prefiere «Josué» como transliteración estándar del nombre propio.
  - Se mantiene «Israel» sin artículo para respetar el nombre colectivo hebreo.
  - «Con una sola voz» preserva el valor idiomático de פֶּה אֶחָד sin volverlo excesivamente interpretativo.
