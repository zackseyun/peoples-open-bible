  text: וְֽ/הָ֨יְתָ֜ה צִיצַ֤ת נֹבֵל֙ צְבִ֣י תִפְאַרְתּ֔/וֹ אֲשֶׁ֥ר עַל רֹ֖אשׁ גֵּ֣יא שְׁמָנִ֑ים כְּ/בִכּוּרָהּ֙ בְּ/טֶ֣רֶם קַ֔יִץ אֲשֶׁ֨ר יִרְאֶ֤ה הָֽ/רֹאֶה֙ אוֹתָ֔/הּ בְּ/עוֹדָ֥/הּ בְּ/כַפּ֖/וֹ יִבְלָעֶֽ/נָּה־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/028/004.yaml
  text: 'And the fading flower of his glorious beauty[a], which is on the head of the fertile valley, will be like an early fig before summer: whoever sees it, while it is still in his palm[b], swallows it down.'
  footnotes:
  - marker: a
    text: Or 'like a first-ripe fig before summer.' The Hebrew בִּכּוּרָה can denote first-ripe fruit more generally, though in this context the image is commonly understood as an early fig.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the valley of fatnesses,' an idiom for a rich or fertile valley.
    reason: cultural_note
