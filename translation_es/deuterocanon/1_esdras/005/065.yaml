translation:
  language: es
  text: 'Y acercándose a Zorobabel, a Jesúa y a los jefes de las casas paternas, les dijeron: «Nosotros construiremos con ustedes[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nosotros construiremos junto con ustedes». El verbo griego expresa edificar juntamente con alguien, no solo ofrecer apoyo general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: coming to
  chosen_spanish: acercándose a
  alternatives_spanish:
  - habiendo llegado a
  - yendo hacia
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa al discurso. «Acercándose a» conserva el movimiento hacia los destinatarios con un español natural y reverente.
- source_word: τῷ Ζοροβαβὲλ καὶ Ἰησοῦ
  english_pob_choice: to Zerubbabel and Jeshua
  chosen_spanish: a Zorobabel, a Jesúa
  alternatives_spanish:
  - a Zorobabel y a Jesús
  - a Zorobabel y a Jesúa
  lexicon: Lexham Analytical Lexicon / formas estándar de la LXX
  rationale: Se transliteran los nombres propios. En este contexto histórico posexílico, «Jesúa» evita la asociación cristológica que tendría «Jesús» en español, siguiendo la decisión auditada del POB en inglés.
- source_word: τοῖς ἡγουμένοις
  english_pob_choice: the heads
  chosen_spanish: a los jefes
  alternatives_spanish:
  - a los líderes
  - a los que dirigían
  lexicon: BDAG
  rationale: El sustantivo participial señala a quienes ejercían dirección. «Jefes» conserva la concreción del cargo y encaja con la estructura de linajes del contexto.
- source_word: τῶν πατριῶν
  english_pob_choice: of the fathers’ houses
  chosen_spanish: de las casas paternas
  alternatives_spanish:
  - de las casas de los padres
  - de los clanes familiares
  lexicon: LSJ
  rationale: Πατριά designa un grupo de linaje o casa paternal. «Casas paternas» preserva el giro familiar-tribal del texto fuente sin sustituirlo por una explicación más libre.
- source_word: Συνοικοδομήσομεν
  english_pob_choice: We will build with you
  chosen_spanish: Nosotros construiremos con ustedes
  alternatives_spanish:
  - Construiremos junto con ustedes
  - Nos uniremos a construir con ustedes
  lexicon: LSJ
  rationale: El compuesto con συν- expresa edificar junto con otros. «Construiremos con ustedes» mantiene esa idea sin sobrecargar la frase; en español, el matiz conjunto ya queda suficientemente comunicado.
theological_decisions:
- issue: Forma del nombre Ἰησοῦ en contexto posexílico
  english_pob_reading: Jeshua
  chosen_spanish_reading: Jesúa
  alternative_spanish_readings:
  - Jesús
  - Josué
  rationale: Aunque la forma griega coincide con el nombre del NT, aquí refiere al sumo sacerdote/restaurador posexílico. «Jesúa» comunica mejor el referente histórico y evita resonancias cristológicas no presentes en el pasaje.
  doctrine_reference: Transliterar nombres según el contexto histórico; distinguir referentes homónimos.
translation_notes:
  revision_awareness: La redacción sigue de cerca la decisión revisada del POB en inglés de hacer más natural el verbo compuesto de συνοικοδομέω como «build with you», evitando duplicar innecesariamente la idea de simultaneidad. También conserva la elección contextual de «Jeshua» en inglés, trasladada aquí como «Jesúa» para mantener la distinción histórica en español.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y directo del discurso.
  - Se preserva la transliteración de nombres propios del período posexílico.
  - «Casas paternas» conserva el lenguaje genealógico de Esdras sin modernizarlo a una categoría sociológica más general.
  - Se evita el uso de «SEÑOR» o «Cristo», que no pertenecen a este versículo.
