translation:
  language: es
  text: Su límite meridional era desde el extremo del Mar de la Sal[a][b], desde la lengua que da hacia el sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «desde la lengua», término topográfico para una bahía o entrante con forma de lengua.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el Mar Muerto.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי לָהֶם
  english_pob_choice: Their ... was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - les correspondía
  lexicon: HALOT
  rationale: La forma hebrea introduce una descripción de límite territorial; en español, el imperfecto 'era' comunica bien esa delimitación establecida sin forzar una construcción demasiado literal.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En contexto de repartición territorial, 'límite' expresa con naturalidad la línea que delimita la posesión. 'Frontera' puede sonar más político; 'borde' es menos preciso.
- source_word: נֶגֶב
  english_pob_choice: southern
  chosen_spanish: meridional
  alternatives_spanish:
  - del sur
  - sureño
  lexicon: HALOT
  rationale: Aquí el término funciona direccionalmente con גְּבוּל. 'Meridional' conserva el valor geográfico con registro digno; evita confundirlo con el nombre propio 'Néguev'.
- source_word: מִקְצֵה
  english_pob_choice: from the end of
  chosen_spanish: desde el extremo de
  alternatives_spanish:
  - desde el fin de
  - desde la punta de
  lexicon: HALOT
  rationale: '''Extremo'' transmite el sentido espacial de punto terminal. ''Desde el extremo de'' sigue de cerca la imagen hebrea sin sonar forzado.'
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: el Mar de la Sal
  alternatives_spanish:
  - el Mar Salado
  - el Mar Muerto
  lexicon: HALOT
  rationale: Se conserva la designación hebrea literal en español, en línea con la prioridad del texto fuente. Se evita sustituirla por el nombre tradicional posterior 'Mar Muerto' en el cuerpo del texto.
- source_word: מִן הַלָּשׁוֹן
  english_pob_choice: from the tongue
  chosen_spanish: desde la lengua
  alternatives_spanish:
  - desde el saliente
  - desde la península
  lexicon: HALOT
  rationale: '''Lengua'' reproduce la metáfora topográfica literal que el inglés audit trail decidió mantener en la revisión. Aunque puede referir una formación geográfica como ensenada o saliente, el término básico se preserva aquí y se aclara en nota.'
- source_word: הַפֹּנֶה נֶגְבָּה
  english_pob_choice: that faces southward
  chosen_spanish: que se dirige hacia el sur
  alternatives_spanish:
  - que mira al sur
  - que da hacia el sur
  lexicon: HALOT
  rationale: El participio comunica orientación. 'Se dirige hacia el sur' mantiene la fuerza direccional de manera natural en español y evita introducir una imagen más antropomórfica de 'mirar'.
theological_decisions:
- issue: Topónimo tradicional vs. denominación literal
  english_pob_reading: the Salt Sea
  chosen_spanish_reading: Mar de la Sal
  alternative_spanish_readings:
  - Mar Muerto
  rationale: La política textual del POB privilegia la designación del hebreo. En un pasaje geográfico como este, mantener el nombre literal preserva la transparencia respecto del original y deja la equivalencia convencional para una nota.
  doctrine_reference: Principio de transparencia y primacía del texto fuente; no doctrinal, sino traductológico.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se privilegió la literalidad de ''tongue'' frente a una equivalencia más interpretativa, y se mantuvo el nombre fuente ''Salt Sea'' en el cuerpo principal con aclaración marginal.'
  spanish_consistency_notes:
  - Se usó 'Mar de la Sal' para reflejar el hebreo יָם הַמֶּלַח de forma transparente, en coherencia con la preferencia del POB por el nombre fuente.
  - '''Límite meridional'' conserva el valor direccional de נֶגֶב sin convertirlo en el nombre del desierto/Néguev.'
  - La nota [a] sostiene la tensión entre la metáfora literal 'lengua' y su sentido topográfico; no se resuelve por paráfrasis en el texto principal.
