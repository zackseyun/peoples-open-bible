translation:
  language: es
  text: un toro del ganado, un carnero, un cordero macho de un año, para holocausto;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: פַּר designa un bovino macho para sacrificio. En español, «toro» comunica con naturalidad el animal sacrificial sin perder la fuerza léxica; «novillo» podría sugerir inmadurez, y «buey» sería menos preciso.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: de la manada
  alternatives_spanish:
  - de ganado
  - de res
  lexicon: HALOT
  rationale: El hebreo literalmente expresa pertenencia al ganado/bovino. Como ya se dijo «toro», «de la manada» conserva la clasificación del animal en un español natural y evita una repetición torpe del idiomatismo literal.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  lexicon: HALOT
  rationale: «Carnero» es el equivalente español claro y estándar para el macho adulto de la oveja en contexto sacrificial.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente el sexo del animal. «Cordero macho» preserva esa distinción mejor que «cordero» solo.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La expresión idiomática indica la edad del animal. «De un año» es la forma más natural en español y mantiene la precisión requerida.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para un holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el término bíblico tradicional en español para עֹלָה, que denota la ofrenda completamente quemada. «Para holocausto» preserva la función sacrificial y la forma del inventario.
theological_decisions:
- issue: Terminología sacrificial de עֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - para una ofrenda quemada
  - como ofrenda totalmente quemada
  rationale: La POB en inglés opta por la equivalencia sacrificial tradicional. En español, «holocausto» es el término litúrgico e histórico más directo para עֹלָה y mantiene el sentido técnico del rito.
  doctrine_reference: Levítico 1; Números 28–29
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas ni variantes textuales; la presente línea sigue de cerca la estructura enumerativa hebrea y conserva el término sacrificial estándar sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene la enumeración con artículo indefinido implícito, como en el hebreo y en la traducción inglesa auditada.
  - Se conserva la distinción sexual del cordero mediante «macho».
  - Se usa «holocausto» como término técnico consistente con la serie sacrificial del Pentateuco.
