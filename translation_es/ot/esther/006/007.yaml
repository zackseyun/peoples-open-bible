translation:
  language: es
  text: 'Entonces Amán dijo al rey[a]: «El hombre a quien el rey se complace en honrar—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Un hombre a quien el rey se complace en honrar». El hebreo אִישׁ es singular masculino y puede leerse de forma indefinida, pero en este contexto el español suele preferir «el hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Entonces» conserva el movimiento narrativo con naturalidad y dignidad, sin volverla más interpretativa de lo que exige el hebreo.
- source_word: הָמָן
  english_pob_choice: Haman
  chosen_spanish: Haman
  alternatives_spanish:
  - Amán
  lexicon: Transliteración propia del nombre
  rationale: Se conserva el nombre propio con la forma habitual de transliteración en español bíblico; «Amán» sería una adaptación posible, pero «Haman» mantiene uniformidad con el expediente inglés y la forma de origen.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - a
  - para
  lexicon: HALOT
  rationale: La preposición de dirección/objeto indirecto se expresa de modo natural con «al» en este contexto de habla dirigida al rey.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - al rey
  lexicon: HALOT
  rationale: El título definido se traduce directamente como «el rey». En la secuencia verbal española, el complemento de destinatario queda bien integrado con «dijo al rey».
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Un hombre
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse de modo indefinido, el contexto ya perfila a una persona específica sin nombrarla. En español, «El hombre» reproduce con claridad esa referencia anticipada y evita una vaguedad innecesaria.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: El relativo introduce a la persona objeto del favor del rey. «A quien» conserva mejor el enlace con el verbo «honrar» y el valor personal del antecedente.
- source_word: חָפֵץ
  english_pob_choice: delights
  chosen_spanish: desea
  alternatives_spanish:
  - se complace en
  - quiere
  lexicon: HALOT
  rationale: El hebreo expresa inclinación o complacencia; en español, «desea» comunica una voluntad afectiva y cortesana sin endurecer el matiz. «Se complace en» es posible, pero aquí suena más pesado.
- source_word: בִּיקָרוֹ
  english_pob_choice: to honor
  chosen_spanish: honrar
  alternatives_spanish:
  - mostrarle honor
  - glorificarlo
  - darle honra
  lexicon: HALOT
  rationale: El sustantivo יְקָר tiene el sentido de honor, estima o distinción; la formulación verbal «honrar» refleja de forma idiomática esa idea en español. «Glorificar» sería demasiado elevado para el registro cortesano del pasaje.
translation_notes:
  revision_awareness: El expediente inglés quedó sin cambios en la última revisión (high_agreement, 1.0). La versión española mantiene esa lectura, conservando la tensión entre la forma indefinida posible de אִישׁ y la referencia específica sugerida por el contexto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un alusión directa al nombre divino.
  - Se mantiene «honrar» para יְקָר conforme al valor semántico del sustantivo y al registro cortesano del pasaje.
  - La puntuación con raya final reproduce la suspensión del enunciado en el hebreo y en el flujo narrativo del contexto inmediato.
