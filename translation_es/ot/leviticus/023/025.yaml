translation:
  language: es
  text: No haréis ningún trabajo laborioso, y presentaréis una ofrenda de alimento[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “una ofrenda por fuego” o “una ofrenda de fuego”.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: laborious work
  chosen_spanish: ningún trabajo laborioso
  alternatives_spanish:
  - todo trabajo
  - trabajo servil
  - trabajo ordinario
  lexicon: HALOT
  rationale: La construcción totalizadora con לֹא pide en español una negación natural; “ningún” comunica mejor el alcance prohibitivo que un calco como “todo... no”. “Trabajo laborioso” conserva la idea de labor ordinaria/restrictiva sin imponer un tecnicismo eclesiástico no atestiguado por el hebreo.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: You shall do no
  chosen_spanish: No haréis
  alternatives_spanish:
  - No debéis hacer
  - No harán
  - No hagan
  lexicon: HALOT
  rationale: El hebreo legal en segunda persona plural se refleja con futuro de mandato/prohibición en español bíblico y legible. “No haréis” mantiene el valor directivo y el número plural sin sobrecargar la frase.
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: presentaréis
  alternatives_spanish:
  - ofreceréis
  - traeréis
  - acercaréis
  lexicon: HALOT
  rationale: En contexto sacrificial, el Hiphil de קרב expresa la acción cultual de presentar una ofrenda. “Presentaréis” es claro y evita la repetición semántica con el sustantivo sacrificial siguiente.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda de fuego
  - una ofrenda hecha por fuego
  - una ofrenda alimenticia
  lexicon: HALOT
  rationale: Para el español del POB, “ofrenda encendida” conserva el vínculo etimológico y cultual de la expresión sin depender de la formulación tradicional “hecha por fuego”. Se evita “ofrenda alimenticia”, que sería más interpretativa y menos transparente al trasfondo sacrificial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: La guía del proyecto pide Yahvé para יהוה. La preposición española “a” expresa adecuadamente la dirección/dedicación cultual de la ofrenda al nombre divino.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en forma transliterada según la política del proyecto en español. Esto evita el ocultamiento por sustitución litúrgica y mantiene la transparencia respecto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אִשֶּׁה en el lenguaje sacrificial
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda de fuego
  rationale: La expresión hebrea pertenece al registro cultual y puede sonar opaca en español moderno si se traduce literalmente. “Ofrenda encendida” mantiene la referencia al fuego sin borrar el carácter técnico sacrificial; la alternativa más tradicional se conserva en nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; readable modern Spanish'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la revisión más reciente del registro inglés auditado; no se observan revisiones aplicadas que requieran ajuste adicional en el español.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - “Presentaréis” conserva el tono cultual y legal del hebreo sin convertirlo en paráfrasis.
  - “Ofrenda encendida” busca equilibrio entre transparencia lexical y fluidez en español; la nota preserva la alternativa tradicional.
  - La negación plural legal se expresa de forma natural en español con “No haréis ningún...”.
