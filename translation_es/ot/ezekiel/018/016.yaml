base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/016.yaml
  text: He has not oppressed anyone[a], has not taken a pledge, and has not robbed[b]; he has given his bread to the hungry and covered the naked with a garment.
  footnotes:
  - marker: a
    text: Or 'has not seized collateral' or 'has not taken a debtor’s pledge.' The Hebrew refers to taking a pledge from a debtor, often with the implication of abusive or unjust practice.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his bread.'
    reason: lexical_alternative
