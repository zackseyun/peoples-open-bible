translation:
  language: es
  text: Arabia y todos los príncipes de Quedar[a]—ellos eran tus comerciantes[b]; con corderos, carneros y machos cabríos comerciaban contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Arab” / “los árabes”. El nombre hebreo puede designar la región arábiga o a su población.
    reason: alternative_reading
  - marker: b
    text: Literalmente, “mercaderes de tu mano”, una expresión idiomática para quienes comerciaban contigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲרַב
  english_pob_choice: Arabia
  chosen_spanish: Arabia
  alternatives_spanish:
  - Arab
  - los árabes
  lexicon: HALOT
  rationale: El hebreo puede nombrar la región o a sus habitantes. En español, 'Arabia' comunica de forma natural la referencia geográfica y mantiene abierta la alusión al pueblo implicado en el comercio.
- source_word: נְשִׂיאֵי
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - jefes
  - líderes
  lexicon: HALOT
  rationale: נָשִׂיא puede referirse a gobernantes tribales o caudillos. 'Príncipes' conserva el matiz elevado y jerárquico, como en la decisión inglesa.
- source_word: קֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Cedar
  alternatives_spanish:
  - Quedar
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en forma transliterada tradicional. 'Cedar' es la forma usual en español bíblico y corresponde al Kedar del hebreo.
- source_word: סֹחֲרֵי יָדֵךְ
  english_pob_choice: your traders
  chosen_spanish: tus comerciantes
  alternatives_spanish:
  - los que comercian contigo
  - tus mercaderes
  lexicon: HALOT
  rationale: La expresión literal 'mercaderes de tu mano' es idiomática. 'Tus comerciantes' conserva la relación comercial sin perder naturalidad en español, siguiendo la opción inglesa más directa y evitando una calca oscura.
- source_word: כָרִים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - lambs no es español
  - ovejas jóvenes
  lexicon: HALOT
  rationale: El término designa ovejas jóvenes o corderos. 'Corderos' es el equivalente natural en español y preserva la distinción frente a 'carneros'.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - morruecos
  - rams no es español
  lexicon: HALOT
  rationale: '''Carneros'' es el término usual y preciso para rams, manteniendo el contraste zoológico del verso.'
- source_word: עַתּוּדִים
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - chivos
  - cabritos machos
  lexicon: HALOT
  rationale: Se trata específicamente de machos de cabra. 'Machos cabríos' es claro, digno y equivalente al 'male goats' inglés, conservando la precisión sexual del hebreo.
- source_word: בָּם
  english_pob_choice: in these
  chosen_spanish: en estos
  alternatives_spanish:
  - con estos
  - por medio de estos
  lexicon: HALOT
  rationale: La preposición señala los bienes mencionados como esfera o medio del comercio. 'En estos' sigue de cerca el hebreo y enlaza con la enumeración anterior.
- source_word: סֹחֲרָיִךְ
  english_pob_choice: they traded with you
  chosen_spanish: comerciaban contigo
  alternatives_spanish:
  - eran tus mercaderes
  - hacían negocio contigo
  lexicon: HALOT
  rationale: El sustantivo de 'comerciantes' se expresa verbalmente para evitar redundancia pesada en español. 'Comerciaban contigo' refleja bien la relación de intercambio y la segunda persona femenina singular dirigida a Tiro.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: No aparece el Tetragrámaton ni un título divino en este verso.
  chosen_spanish_reading: No se introduce ninguna equivalencia teológica especial.
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El verso es un inventario comercial y no contiene referencia directa a Dios. Por tanto, no corresponde añadir un nombre divino ni una máscara editorial.
  doctrine_reference: Ninguna necesaria para este versículo.
translation_notes:
  revision_awareness: La base inglesa revisada cambió de 'trading partners' a 'traders' para ajustarse más directamente al término de mercadería del hebreo. En español se siguió esa dirección con 'comerciantes' y se evitó una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, aunque este versículo no lo requiera.
  - Se translitera 'Cedar' en forma española estable y reconocible dentro de la Biblia.
  - Se conserva la segunda persona singular femenina ('tu', 'contigo') porque el hebreo se dirige a Tiro.
  - La lista de animales conserva la distinción de especies y sexos indicada por el hebreo.
  - '''Comerciaban contigo'' evita repetir ''comerciantes'' de modo pesado y conserva el valor verbal del segundo miembro.'
