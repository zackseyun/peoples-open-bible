translation:
  language: es
  text: Pero si vuelve a aparecer en la prenda[a], o en la urdimbre, o en la trama, o en cualquier objeto de cuero, es una erupción que se extiende; quemarás en el fuego aquello que tenga la lesión[b] en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tejido' para la prenda, si se subraya el material más que el artículo de vestir.
    reason: lexical_alternative
  - marker: b
    text: Hebreo negaʿ, término técnico en Levítico para una lesión o mancha impura; tradicionalmente 'plaga' o 'marca de enfermedad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּרָאֶה
  english_pob_choice: it appears
  chosen_spanish: vuelve a aparecer
  alternatives_spanish:
  - aparece
  - se hace visible de nuevo
  lexicon: HALOT
  rationale: El nifal aquí expresa que la mancha/lesión vuelve a hacerse visible; 'vuelve a aparecer' conserva bien el valor de recurrencia y suena natural en español.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - aún
  lexicon: HALOT
  rationale: En este contexto procedimental indica recurrencia tras la inspección previa. 'De nuevo' mantiene esa idea sin añadir matices no requeridos.
- source_word: בֶּגֶד
  english_pob_choice: garment
  chosen_spanish: prenda
  alternatives_spanish:
  - vestidura
  - ropa
  lexicon: HALOT
  rationale: '''Prenda'' es amplio y natural en español, y cubre la referencia a un artículo textil sin limitarlo excesivamente.'
- source_word: שְׁתִי
  english_pob_choice: warp
  chosen_spanish: urdimbre
  alternatives_spanish:
  - hilos de urdimbre
  - urdido
  lexicon: HALOT
  rationale: En terminología textil, 'urdimbre' es el equivalente más preciso para los hilos longitudinales.
- source_word: עֵרֶב
  english_pob_choice: woof
  chosen_spanish: trama
  alternatives_spanish:
  - tisú
  - hilos de trama
  lexicon: HALOT
  rationale: '''Trama'' es el término técnico normal para el entrecruzamiento transversal en tejido y corresponde bien al par con ''urdimbre''.'
- source_word: כְּלִי עוֹר
  english_pob_choice: article of leather
  chosen_spanish: objeto de cuero
  alternatives_spanish:
  - artículo de cuero
  - utensilio de cuero
  - objeto de piel
  lexicon: HALOT
  rationale: '''Objeto de cuero'' comunica de manera natural la amplitud del hebreo כְּלִי עוֹר, sin restringirlo a un utensilio específico.'
- source_word: פֹּרַחַת
  english_pob_choice: a spreading outbreak
  chosen_spanish: una erupción que se extiende
  alternatives_spanish:
  - un brote que se extiende
  - una lesión que se extiende
  lexicon: HALOT
  rationale: El participio derivado de פרח conserva la imagen de algo que brota/crece. 'Erupción que se extiende' reproduce el valor visible y expansivo de la lesión sin medicalizar de más.
- source_word: בָּאֵשׁ תִּשְׂרְפֶנּוּ
  english_pob_choice: you shall burn in the fire
  chosen_spanish: la quemarás en el fuego
  alternatives_spanish:
  - la quemarás con fuego
  - deberás quemarla en el fuego
  lexicon: HALOT
  rationale: La forma verbal es una instrucción directa en segunda persona. En español, 'la quemarás en el fuego' preserva el tono legal y el objeto implícito de forma idiomática.
- source_word: הַנָּגַע
  english_pob_choice: the infection
  chosen_spanish: la lesión
  alternatives_spanish:
  - la afección
  - la mancha
  - el mal
  lexicon: HALOT
  rationale: En Levítico 13 נגע es un término técnico para la marca/afección impura. 'Lesión' evita la carga moderna de 'infección' y mantiene el campo semántico de una afección visible.
theological_decisions:
- issue: Naturaleza técnica del נגע en Levítico 13
  english_pob_reading: Hebrew negaʿ, a technical term in Leviticus for an afflicted or contaminated spot; traditionally 'plague' or 'diseased mark.'
  chosen_spanish_reading: término técnico para una lesión/afección impura
  alternative_spanish_readings:
  - plaga
  - marca enferma
  - mancha impura
  rationale: No conviene sustituir el término técnico por una palabra tradicional demasiado general. 'Lesión' conserva la referencia concreta y evita sugerir necesariamente una enfermedad en sentido moderno.
  doctrine_reference: Levítico 13:2-3; 13:57
- issue: Correspondencia de la imagen vegetal de פֹּרַחַת
  english_pob_reading: a spreading outbreak
  chosen_spanish_reading: una erupción que se extiende
  alternative_spanish_readings:
  - un brote que se extiende
  - una lesión floreciente
  rationale: El hebreo usa una imagen de brotar/florecer para describir la propagación de la afección. En español, 'erupción que se extiende' mantiene la idea de expansión visible sin perder claridad.
  doctrine_reference: Levítico 13:12-17; 13:57
translation_notes:
  revision_awareness: 'Se mantuvo el acuerdo alto del paso previo: no hubo cambios de contenido doctrinal. La revisión inglesa reciente no introdujo modificaciones, así que la propuesta española conserva la misma estructura semántica y solo ajusta la elección de equivalentes para sonar natural en español y respetar la terminología técnica de Levítico.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo enumerativo de los materiales: prenda, urdimbre, trama y objeto de cuero.'
  - Se evita 'SEÑOR' o términos de sustitución teológica porque el versículo no contiene el nombre divino.
  - Se mantiene el registro legal-directivo con futuro exhortativo en español.
  - La nota lexical de נגע se ancla en una sola aparición para evitar ambigüedad terminológica repetida.
