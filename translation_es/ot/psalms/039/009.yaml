translation:
  language: es
  text: Líbrame de todas mis transgresiones; no me hagas el oprobio[a] de un necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la deshonra de un necio». El hebreo puede entenderse tanto como llegar a ser objeto del reproche de un necio como como quedar asociado con una deshonra vinculada a la necedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל
  english_pob_choice: from all
  chosen_spanish: de todas
  alternatives_spanish:
  - de cada una de
  lexicon: HALOT
  rationale: La combinación מִן + כָּל expresa separación respecto de la totalidad; en español, «de todas» comunica con naturalidad que la liberación abarque el conjunto completo de las transgresiones.
- source_word: פְּשָׁעַי
  english_pob_choice: my transgressions
  chosen_spanish: mis transgresiones
  alternatives_spanish:
  - mis rebeliones
  - mis ofensas
  lexicon: HALOT
  rationale: פֶּשַׁע denota transgresión contra la autoridad debida; «transgresiones» conserva ese peso moral y jurídico sin añadir una paráfrasis excesiva.
- source_word: הַצִּילֵנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sálvame
  lexicon: HALOT
  rationale: El Hifil de נצל implica arrancar o liberar de una situación. «Líbrame» funciona bien en español bíblico contemporáneo y mantiene el tono de súplica del salmo.
- source_word: חֶרְפַּת
  english_pob_choice: the reproach
  chosen_spanish: el oprobio
  alternatives_spanish:
  - el reproche
  - la vergüenza
  - la deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה abarca vergüenza pública, deshonra y reproche. «Oprobio» conserva el matiz de deshonra visible y funciona de forma digna en español formal.
- source_word: נָבָל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un impío necio
  lexicon: HALOT
  rationale: En los Salmos, נָבָל no es solo falta de inteligencia, sino torpeza moral y falta de reverencia. «Necio» es breve y bíblico en español; aquí conserva la carga moral sin explicitar más de lo que el texto exige.
- source_word: אַל תְּשִׂימֵנִי
  english_pob_choice: do not make me
  chosen_spanish: no me pongas
  alternatives_spanish:
  - no me hagas
  - no me establezcas
  - no me coloques
  lexicon: HALOT
  rationale: שׂים con objeto personal puede significar poner/colocar o hacer que alguien llegue a ser algo. «No me pongas» refleja bien el valor causativo sin sonar menos natural que una calca más rígida.
theological_decisions:
- issue: Relación entre חֶרְפַּת נָבָל y el sujeto de la reprensión
  english_pob_reading: The speaker asks God not to let him become an object of reproach in the eyes or speech of a morally foolish person.
  chosen_spanish_reading: El salmista pide que Yahvé no lo ponga en la posición de quedar como objeto de oprobio ante un necio.
  alternative_spanish_readings:
  - No permitas que un necio me avergüence
  - No me conviertas en la deshonra propia de un necio
  rationale: La construcción puede leerse como «el oprobio de un necio», es decir, el oprobio relacionado con o procedente de un necio, sin afirmar que el salmista sea él mismo necio. «No me pongas como» conserva el carácter de convertirse en objeto de deshonra y evita exagerar el sentido.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Uso implícito del nombre divino
  english_pob_reading: The English text uses a direct imperative prayer without masking the divine name in this verse.
  chosen_spanish_reading: El verso se dirige implícitamente a Yahvé en la súplica, sin necesidad de sustituir el nombre por un título genérico.
  alternative_spanish_readings:
  - Señor
  - Dios
  rationale: Aunque el hebreo no contiene el tetragrámaton aquí, el contexto inmediato del salmo es una oración dirigida a Yahvé. Mantener una formulación directa en español respeta el estilo del verso sin introducir un vocativo no presente en el texto.
  doctrine_reference: Project-level terminology defaults
translation_notes:
  revision_awareness: El pasaje presenta un alto acuerdo con el audit trail inglés y no requiere revisión textual. La principal decisión en español fue elegir entre «reproche/oprobio» y entre una formulación más literal de «poner» o una más idiomática de «hacer»; se optó por una lectura natural que conserva la tensión honor-deshonra del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto cuando el contexto oracional lo presupone, aunque aquí el verso no explicita el tetragrámaton.
  - Se usó «transgresiones» para פְּשָׁעַי siguiendo el valor moral-jurídico documentado.
  - «Necio» preserva el matiz ético de נָבָל sin convertirlo en una explicación interpretativa extensa.
  - La nota al pie marca la ambigüedad léxica principal en torno a חֶרְפַּת נָבָל y ofrece una alternativa española equivalente.
