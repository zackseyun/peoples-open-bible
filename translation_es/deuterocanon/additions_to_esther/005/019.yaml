lexical_decisions:
- source_word: ἀντίγραφον
  english_pob_choice: a copy
  chosen_spanish: una copia
  alternatives_spanish:
  - el duplicado
  - una transcripción
  lexicon: LSJ
  rationale: ἀντίγραφον designa un documento copiado o duplicado. «Una copia» transmite bien el sentido administrativo del texto y suena natural en español.
- source_word: ἐπιστολῆς
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - escrito
  - decreto escrito
  lexicon: LSJ
  rationale: ἐπιστολή significa normalmente «carta». En este contexto se trata de una comunicación oficial, pero «carta» conserva el término básico del griego sin sobreinterpretarlo.
- source_word: ἐκθέντες
  english_pob_choice: after posting
  chosen_spanish: después de publicar
  alternatives_spanish:
  - después de exponer
  - después de exhibir
  - habiendo publicado
  lexicon: LSJ
  rationale: El participio expresa la acción de poner el documento en circulación pública. «Después de publicar» comunica esa acción administrativa de modo idiomático en español.
- source_word: ἐν παντὶ τόπῳ
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - en todas partes
  lexicon: LSJ
  rationale: La frase distributiva se conserva de forma directa. «En todo lugar» es una equivalencia natural y suficientemente literal.
- source_word: μετὰ παρρησίας
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  - con franqueza
  - con libertad
  lexicon: LSJ
  rationale: παρρησία aquí alude a la publicidad y apertura con que se presenta el documento. «Abiertamente» preserva ese matiz sin introducir innecesariamente la idea de valentía.
- source_word: ἐᾶν
  english_pob_choice: to permit
  chosen_spanish: permitir
  alternatives_spanish:
  - dejar
  - autorizar
  lexicon: LSJ
  rationale: En este uso infinitival de tono administrativo, ἐᾶν significa «permitir». «Permitir» encaja bien con el registro formal del decreto.
- source_word: χρῆσθαι
  english_pob_choice: to make use of
  chosen_spanish: hacer uso de
  alternatives_spanish:
  - usar
  - valerse de
  lexicon: LSJ
  rationale: χράομαι significa «usar» o «hacer uso de». «Hacer uso de» mantiene la cercanía al griego y suena natural en español.
- source_word: τοῖς ἑαυτῶν νομίμοις
  english_pob_choice: their own laws
  chosen_spanish: sus propias leyes
  alternatives_spanish:
  - sus propias costumbres
  - sus propios preceptos legales
  - sus propias normas
  lexicon: LSJ
  rationale: νόμιμα puede significar leyes, costumbres o prácticas establecidas. Dado el contexto judío y el uso del POB en inglés, «sus propias leyes» es una traducción formal y clara, mientras que la alternativa «costumbres» queda como matiz posible.
translation_notes:
  revision_awareness: 'Se mantiene sin cambios respecto al pasaje base: el texto griego presenta una instrucción administrativa de difusión pública de la copia de la carta y autorización para que los judíos usen sus propias leyes. No se detectaron revisiones auditadas que exigieran modificar la lectura de base.'
  spanish_consistency_notes:
  - Se preserva el tono administrativo y formal del griego.
  - Se eligió «Y después de publicar» para reflejar el participio aoristo con valor temporal.
  - «Sus propias leyes» sigue el criterio del POB inglés y deja implícito el posible matiz de costumbres mediante nota.
  - El marcador de nota [a] aparece junto a «abiertamente» y la nota ofrece la alternativa «públicamente» sin duplicar marcadores.
