review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: nacimiento/paternidad (''le nacieron''), tres hijos y una hija, el nombre Tamar, y la descripción de su belleza. Sin embargo, la nota al pie está anclada en ''Tamar[a]'' cuando el contenido de la nota explica la expresión final יְפַת מַרְאֶה; el marcador debe ir en la frase de belleza, no en el nombre. Además, ''hermosa de apariencia'' es comprensible pero menos natural que una formulación que preserve mejor el sentido literal y la dignidad del español.'
  spanish_quality_summary: El texto es mayormente claro y legible. 'A Absalón le nacieron' suena natural en español. 'Su nombre era Tamar' y 'Ella era una mujer...' son correctos. La principal mejora de estilo es sustituir 'hermosa de apariencia' por 'hermosa en apariencia', que conserva de cerca el hebreo y suena mejor en español eclesial general.
  glossary_alignment: No hay términos del glosario de proyecto en disputa aquí. Los nombres propios y el léxico básico están alineados. La decisión 'hijos' para בָנִים es aceptable en este contexto, especialmente al contrastarse con 'una hija'.
  issues:
  - severity: medium
    issue: Marcador de nota al pie colocado en 'Tamar' en vez de en la descripción de belleza
    rationale: La nota explica la alternativa idiomática para יְפַת מַרְאֶה ('una mujer hermosa en apariencia' / 'muy hermosa'), no el nombre propio Tamar. Debe anclarse en la frase correspondiente para fidelidad editorial y claridad.
  - severity: low
    issue: '''Hermosa de apariencia'' suena algo forzado en español'
    rationale: Aunque intenta conservar la forma hebrea, 'hermosa en apariencia' comunica mejor el mismo sentido literal y resulta más natural que 'de apariencia', que puede sugerir superficialidad o mera impresión.
  revised_spanish_text: A Absalón le nacieron tres hijos y una hija, y su nombre era Tamar. Ella era una mujer hermosa en apariencia[a].
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: "Ella era muy hermosa". El hebreo dice literalmente: "una mujer hermosa en apariencia".'
    reason: lexical_alternative
  revision_rationale: Se corrige el lugar del marcador de nota para que corresponda a la expresión hebrea explicada, y se mejora ligeramente la naturalidad del español manteniendo la cercanía formal al original.
