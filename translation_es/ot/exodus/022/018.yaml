translation:
  language: es
  text: Cualquiera que se acueste con un animal ciertamente será condenado a muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «ciertamente morirá». La fórmula legal hebrea expresa con claridad una pena judicial de muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Whoever
  chosen_spanish: Cualquiera que
  alternatives_spanish:
  - Todo el que
  - Quienquiera que
  lexicon: HALOT
  rationale: כָּל con participio introduce una generalización indefinida. En español, 'Cualquiera que' reproduce bien el valor de sujeto general sin sonar calcado o demasiado arcaico.
- source_word: שֹׁכֵב
  english_pob_choice: lies with
  chosen_spanish: se acueste con
  alternatives_spanish:
  - tenga relaciones sexuales con
  - duerma con
  lexicon: HALOT
  rationale: El participio de שׁכב con עִם funciona como eufemismo sexual. 'Se acueste con' conserva el giro idiomático y la gravedad del hebreo mejor que una formulación clínica.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: La preposición es directa y no requiere matiz adicional en español.
- source_word: בְּהֵמָה
  english_pob_choice: an animal
  chosen_spanish: un animal
  alternatives_spanish:
  - una bestia
  - un animal doméstico
  lexicon: HALOT
  rationale: בְּהֵמָה designa un animal o bestia. 'Un animal' es claro y natural en español actual; 'bestia' suena más cargado o arcaizante.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: será muerto sin falta
  alternatives_spanish:
  - morirá ciertamente
  - será ejecutado
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto expresa certeza de pena capital. 'Será muerto sin falta' mantiene el valor jurídico y la intensidad, sin reinterpretar la forma como una simple muerte inevitable.
theological_decisions:
- issue: Fórmula legal de pena capital
  english_pob_reading: shall surely be put to death
  chosen_spanish_reading: será muerto sin falta
  alternative_spanish_readings:
  - morirá ciertamente
  - será ejecutado
  rationale: El hebreo presenta una fórmula legal de sentencia capital, no meramente una descripción de mortalidad. 'Será muerto sin falta' deja visible la fuerza judicial y la certeza del castigo, evitando suavizar el texto.
  doctrine_reference: Ley penal del pacto; formulación judicial del hebreo legal
- issue: Eufemismo sexual del participio hebreo
  english_pob_reading: lies with
  chosen_spanish_reading: se acueste con
  alternative_spanish_readings:
  - tenga relaciones sexuales con
  - duerma con
  rationale: La frase hebrea es un eufemismo reconocible; en español conviene conservarlo para no volver el texto innecesariamente explícito ni perder el tono legal sobrio del original.
  doctrine_reference: Lectura lexical del hebreo bíblico (uso eufemístico de שׁכב)
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se conservó el indefinido generalizante, el eufemismo sexual y la fórmula legal de muerte cierta. La principal adaptación fue elegir una sintaxis española natural (''Cualquiera que...'') mientras se mantiene el registro jurídico del hebreo.'
  spanish_consistency_notes:
  - Se empleó 'animal' como equivalente claro de בְּהֵמָה, no 'bestia', para evitar un tono innecesariamente arcaico o peyorativo.
  - '''Será muerto sin falta'' preserva la pasiva/jurídica del hebreo; no se sustituyó por ''será ejecutado'' para no añadir especificación no expresa en el texto fuente.'
  - Se mantuvo el eufemismo 'se acueste con' por coherencia con el valor idiomático del participio hebreo con עִם.
