translation:
  language: es
  text: 'Y Abimelec dijo[a]: «¿Qué es esto que nos has hecho? Por poco, uno del pueblo habría yacido con tu esposa, y habrías traído culpa sobre nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «casi»: «Uno del pueblo casi habría yacido con tu esposa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲבִימֶלֶךְ
  english_pob_choice: And Abimelech said
  chosen_spanish: Y Abimelec dijo
  alternatives_spanish:
  - Entonces Abimelec dijo
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa del wayyiqtol con una coordinación simple en español. «Abimelec» se translitera de forma natural para el lector hispanohablante.
- source_word: מַה זֹּאת עָשִׂיתָ לָּנוּ
  english_pob_choice: What is this you have done to us?
  chosen_spanish: ¿Qué es esto que has hecho con nosotros?
  alternatives_spanish:
  - ¿Qué has hecho con nosotros?
  - ¿Qué es lo que has hecho con nosotros?
  lexicon: HALOT
  rationale: La exclamación hebrea se refleja con una construcción natural en español que mantiene el énfasis de «¿qué es esto?». «Con nosotros» preserva el objeto comunitario de לָּנוּ.
- source_word: כִּמְעַט
  english_pob_choice: might easily have
  chosen_spanish: Por poco habría
  alternatives_spanish:
  - Casi habría
  - A punto estuvo de
  lexicon: HALOT
  rationale: Se traduce el valor de cercanía y peligro inminente sin reducirlo a un simple adverbio mecánico. «Por poco» comunica bien la idea de un hecho a punto de ocurrir.
- source_word: שָׁכַב ... אֶת אִשְׁתֶּךָ
  english_pob_choice: have lain with your wife
  chosen_spanish: habría dormido con tu esposa
  alternatives_spanish:
  - habría yacido con tu esposa
  - habría tenido relaciones con tu esposa
  lexicon: HALOT
  rationale: En español, «dormir con» expresa de manera natural el idiomático hebreo de relaciones sexuales. Se mantiene un registro digno y claro, sin volverlo excesivamente clínico.
- source_word: אַחַד הָעָם
  english_pob_choice: one of the people
  chosen_spanish: uno del pueblo
  alternatives_spanish:
  - uno entre el pueblo
  - alguien del pueblo
  lexicon: HALOT
  rationale: Se conserva la singularidad indefinida del hebreo y el sustantivo colectivo «pueblo» sin restringirlo a «hombres», ya que el hebreo dice literalmente «uno del pueblo».
- source_word: וְהֵבֵאתָ עָלֵינוּ אָשָׁם
  english_pob_choice: and you would have brought guilt upon us
  chosen_spanish: y habrías traído culpa sobre nosotros
  alternatives_spanish:
  - y habrías traído culpa sobre nosotros
  - y habrías hecho caer culpa sobre nosotros
  - y nos habrías hecho culpables
  lexicon: HALOT
  rationale: «אָשָׁם» se vierte como «culpa» para preservar la fuerza moral y relacional del término en este contexto. «Sobre nosotros» conserva la dirección del daño expresada por עָלֵינוּ.
theological_decisions:
- issue: Valor de אָשָׁם en este contexto
  english_pob_reading: guilt
  chosen_spanish_reading: culpa
  alternative_spanish_readings:
  - culpabilidad
  - ofensa
  - responsabilidad
  rationale: Aquí el término señala una carga objetiva de culpa que recaería sobre la casa o el pueblo de Abimelec si el acto hubiera ocurrido. «Culpa» transmite esa responsabilidad moral sin introducir de entrada el sentido sacrificial de אָשָׁם.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tensión del near-miss en כִּמְעַט
  english_pob_reading: might easily have / almost
  chosen_spanish_reading: Por poco habría
  alternative_spanish_readings:
  - Casi habría
  - A punto estuvo de
  rationale: Se conserva la tensión textual de un hecho evitado por muy poco. La frase española debe sonar natural y a la vez mantener la advertencia implícita del hebreo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto. La redacción mantiene el sentido del hebreo y del audit trail inglés, especialmente en כִּמְעַט y אָשָׁם.
  spanish_consistency_notes:
  - Se usa «Abimelec» como forma castellana consistente del nombre propio.
  - Se prefirió «culpa» a «guilt»/«culpabilidad» para un español más natural y equivalente al peso moral del hebreo.
  - «Esposa» se usa en vez de «mujer» para claridad lectora en español, sin alterar el referente del hebreo.
  - La nota [a] queda vinculada explícitamente a la frase de near-miss para conservar la alternativa documentada.
