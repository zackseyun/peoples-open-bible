review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: condición inicial, invitación a unirse, acecho violento, víctima inocente y ausencia de causa. Sin embargo, hay dos ajustes importantes de fidelidad y estilo. Primero, «acecharemos» y «tenderemos» cambian los cohortativos hebreos («let us…») a futuro indicativo; conviene mantener el matiz exhortativo de la banda. Segundo, la nota [a] está anclada en «dicen», pero la nota inglesa relevante no trata אִם sino נִצְפְּנָה; falta preservar esa alternativa lexical sobre «ocultarnos / escondernos».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para reflejar mejor el tono de exhortación criminal del discurso directo. «Acechemos» y «tendamos una emboscada» suenan naturales y más fieles que los futuros. «Sin causa» es aceptable y digno; «para derramar sangre» comunica bien el sentido de לדם, aunque se aleja de la tersura hebrea, lo cual queda compensado con nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Inocente» para לְנָקִי y «sangre» para דם están bien encaminados. La principal cuestión no es de glosario sino de modo verbal y de preservación de la nota lexical documentada para נִצְפְּנָה.
  issues:
  - severity: medium
    issue: Los verbos exhortativos se han convertido en futuros indicativos
    rationale: נֶאֶרְבָה y נִצְפְּנָה son cohortativos de primera persona plural en el discurso citado. «Acecharemos» y «tenderemos» atenúan el matiz de invitación conspirativa; «acechemos» y «tendamos una emboscada» lo conservan mejor.
  - severity: medium
    issue: La nota [a] no corresponde a la nota lexical auditada y omite la alternativa relevante
    rationale: 'La auditoría inglesa pone la alternativa en נִצְפְּנָה: «let us hide ourselves for the innocent without cause». El borrador crea en cambio una nota sobre «Si/Cuando», que no es la nota preservada por el POB y deja sin documentar la decisión contextual sobre «emboscada» frente a «ocultarnos».'
  - severity: low
    issue: «Para derramar sangre» explicita correctamente el sentido, pero pierde algo de la tersura hebrea
    rationale: לדם es literalmente «para sangre / por sangre». La expansión es defendible en español, especialmente con nota, pero conviene reconocer que es una explicitación interpretativa.
  revised_spanish_text: 'Si dicen: «Ven con nosotros; acechemos para derramar sangre[a]; tendamos una emboscada al inocente sin causa[b]»,'
