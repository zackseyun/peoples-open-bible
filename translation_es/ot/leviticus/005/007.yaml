  to: 'Pero si sus medios no alcanzan para un cordero, entonces traerá a Yahvé, como su ofrenda por la culpa por el pecado que cometió, dos tórtolas o dos pichones: uno para una ofrenda por el pecado[a] y otro para un holocausto.'
