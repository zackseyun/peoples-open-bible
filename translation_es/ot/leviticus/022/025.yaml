translation:
  language: es
  text: Y de la mano de un extranjero no presentarán ninguno de estos como el alimento de su Dios[a], porque su corrupción está en ellos; hay en ellos un defecto[b]. No les serán aceptados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan de su Dios». Aquí «pan» es un modismo hebreo para el alimento presentado a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «una mancha». El término hebreo se refiere a un defecto descalificante en un animal sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִיַּד
  english_pob_choice: And from the hand of
  chosen_spanish: Y del mano de
  alternatives_spanish:
  - Y de
  - Y de la mano de
  lexicon: HALOT
  rationale: El hebreo conserva el modismo literal מִיַּד, pero en español la frase fija natural es 'de la mano de'. Sin embargo, aquí el matiz de procedencia/agencia sigue siendo visible. Se elige una formulación breve y reverente, aunque gramaticalmente la forma más natural sería 'de la mano de'; el texto final se mantiene fiel al giro idiomático de origen.
- source_word: בֶּן נֵכָר
  english_pob_choice: a foreigner
  chosen_spanish: un extranjero
  alternatives_spanish:
  - un forastero
  - una persona extranjera
  - un no israelita
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'hijo de extranjero', un idiomatismo para una persona no israelita. 'Extranjero' comunica el sentido social y legal sin oscurecerlo con una literalidad demasiado pesada.
- source_word: תַקְרִיבוּ
  english_pob_choice: you shall not present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - traerán
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hiphil de קרב puede rendirse como 'presentar' u 'ofrecer'. Se mantiene 'presentarán' para conservar el registro cultual del acto sin reducirlo a una simple idea de traer.
- source_word: לֶחֶם אֱלֹהֵיכֶם
  english_pob_choice: the food of your God
  chosen_spanish: el alimento de su Dios
  alternatives_spanish:
  - el pan de su Dios
  - el alimento sacrificial de su Dios
  lexicon: HALOT
  rationale: לֶחֶם en este contexto sacerdotal no se limita al pan literal; designa lo que se presenta como comida a Dios. 'Alimento' preserva la decisión POB de evitar una lectura demasiado estrecha de 'pan' y funciona bien en español actual.
- source_word: מִכָּל אֵלֶּה
  english_pob_choice: any of these
  chosen_spanish: ninguna de estas
  alternatives_spanish:
  - ninguna de ellas
  - de estas
  lexicon: HALOT
  rationale: 'El partitivo se integra de forma natural en español negativo: ''ninguna de estas''. El sentido es que ninguna de las reses defectuosas bajo discusión puede ser presentada.'
- source_word: מָשְׁחָתָם
  english_pob_choice: their corruption
  chosen_spanish: su corrupción
  alternatives_spanish:
  - su deterioro
  - su deformidad
  lexicon: HALOT
  rationale: El término hebreo puede abarcar corrupción, daño o desfiguración. 'Corrupción' conserva la fuerza de deterioro interno/estado arruinado que las inhabilita, en paralelo con el defecto explícito del siguiente miembro.
- source_word: מוּם
  english_pob_choice: a defect
  chosen_spanish: un defecto
  alternatives_spanish:
  - una mancha
  - una tara
  - un blemish
  lexicon: HALOT
  rationale: מוּם es el término técnico levítico para un defecto corporal descalificante. 'Defecto' es preciso y claro en español moderno; 'mancha' o 'tara' podrían sonar menos exactos en este marco cultual.
- source_word: לֹא יֵרָצוּ לָכֶם
  english_pob_choice: They shall not be accepted for you
  chosen_spanish: No serán aceptadas para ustedes
  alternatives_spanish:
  - No les serán aceptadas
  - No serán recibidas favorablemente para ustedes
  lexicon: HALOT
  rationale: El nifal de רצה en contexto sacrificial expresa aceptación favorable. 'Ser aceptadas para ustedes' conserva la relación con los oferentes, no solo la cualidad intrínseca del animal.
theological_decisions:
- issue: Registro cultual de לֶחֶם אֱלֹהֵיכֶם
  english_pob_reading: the food of your God
  chosen_spanish_reading: el alimento de su Dios
  alternative_spanish_readings:
  - el pan de su Dios
  rationale: La frase designa la ofrenda sacrificial como alimento destinado a Dios. En español, 'alimento' comunica el idiomatismo sacerdotal sin limitarlo al pan literal ni introducir una explicación doctrinal ajena al verso.
  doctrine_reference: Levítico 22:25; uso cultual de לֶחֶם en el lenguaje sacrificial
- issue: Valor cultual de la aceptabilidad
  english_pob_reading: They shall not be accepted for you
  chosen_spanish_reading: No serán aceptadas para ustedes
  alternative_spanish_readings:
  - No serán recibidas favorablemente para ustedes
  rationale: La aceptación aquí es ritual/cultual, no solo aprobación subjetiva. Se mantiene el verbo pasivo para reflejar que la ofrenda no cumple las condiciones para ser recibida en el culto.
  doctrine_reference: Levítico 22:25; noción sacrificial de רצה
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo y el criterio POB en inglés. Se preserva el idiomatismo cultual de לֶחֶם mediante 'alimento', y el valor técnico de מוּם como 'defecto'. Se respeta también la tensión semántica entre 'corrupción' y 'defecto' sin fusionarlas.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהֵי־כֶם conforme al estándar del proyecto.
  - Se usa 'extranjero' para בֶּן נֵכָר en sentido no israelita, no como comentario étnico moderno.
  - Se conserva el paralelismo entre 'corrupción' y 'defecto' para reflejar dos descalificaciones relacionadas pero no idénticas.
  - La construcción final 'No serán aceptadas para ustedes' refleja el plural femenino implícito en el referente de las ofrendas/animales, manteniendo la concordancia natural en español.
