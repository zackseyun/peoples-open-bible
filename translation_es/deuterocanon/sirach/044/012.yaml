translation:
  language: es
  text: Con su descendencia[a] se mantiene su prosperidad, y su herencia es para los hijos de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Su descendencia permaneció en las alianzas, y sus hijos por causa de ellos». El testimonio hebreo más antiguo también refleja una lectura centrada en la alianza, en lugar de «su bien ... y su herencia».'
    reason: alternative_reading
lexical_decisions:
- source_word: עם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - entre
  lexicon: HALOT
  rationale: La preposición hebrea enlaza el bien/estado de los antepasados con su descendencia. «Con» reproduce de manera natural esa relación compacta sin añadir una idea causal que el hebreo no exige.
- source_word: זרעם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - su prole
  - su simiente
  lexicon: HALOT
  rationale: זרע puede referirse a descendencia en sentido amplio. «Descendencia» conserva el alcance genealógico del término y evita la dureza de «simiente» en español.
- source_word: נאמן
  english_pob_choice: endures faithfully
  chosen_spanish: se mantiene
  alternatives_spanish:
  - permanece firme
  - permanece seguro
  - se sostiene fielmente
  lexicon: HALOT
  rationale: En este contexto el hebreo expresa firmeza/estabilidad. «Se mantiene» comunica continuidad y estabilidad en español sin forzar una personificación de la fidelidad que el sintagma no pide explícitamente.
- source_word: טובם
  english_pob_choice: their prosperity
  chosen_spanish: su prosperidad
  alternatives_spanish:
  - su bien
  - su bondad
  - su bienestar
  lexicon: HALOT
  rationale: טוב puede abarcar bien, bienestar o prosperidad. La opción «prosperidad» sigue la revisión inglesa más reciente y sugiere un estado de bien continuado, adecuado al contexto de legado familiar.
- source_word: ונחלתם
  english_pob_choice: and their inheritance
  chosen_spanish: y su herencia
  alternatives_spanish:
  - y su heredad
  - y su posesión
  - y su patrimonio
  lexicon: HALOT
  rationale: נחלה es herencia/posesión heredada. «Herencia» es la equivalencia más transparente y natural en español para el vínculo intergeneracional del versículo.
- source_word: לבני בניהם
  english_pob_choice: for their children's children
  chosen_spanish: para los hijos de sus hijos
  alternatives_spanish:
  - para sus nietos
  - para los hijos de sus hijos varones
  lexicon: HALOT
  rationale: El hebreo literalmente dice «para los hijos de sus hijos». «Hijos de sus hijos» conserva la fórmula bíblica y el énfasis multigeneracional sin restringir el sentido a varones como podría sugerir una paráfrasis literalista.
theological_decisions:
- issue: Base hebrea vs. paralelo griego con lenguaje de pacto
  english_pob_reading: 'The main English text follows the Hebrew line about offspring, prosperity, and inheritance, while the footnote preserves the Greek alternative: ''Their offspring stood in the covenants, and their children because of them.'''
  chosen_spanish_reading: El texto principal sigue la línea hebrea sobre descendencia, prosperidad y herencia; la nota preserva la alternativa griega de «pactos» y «permanecieron en pie».
  alternative_spanish_readings:
  - «Su descendencia permaneció en los pactos, y sus hijos por causa de ellos»
  - «Su descendencia se mantuvo en los pactos, y sus hijos a causa de ellos»
  rationale: Sirácida transmite aquí dos tradiciones relacionadas pero no idénticas. Dado que el hebreo conservado es la base principal y de alta confianza, el texto español principal traduce esa línea. La nota recoge la formulación griega para no borrar la tensión textual/documental entre herencia/prosperidad y pacto.
  doctrine_reference: 'PHILOSOPHY.md: prioridad al testimonio hebreo cuando está conservado; el griego se preserva como testigo alternativo sin desplazamiento del texto principal.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés («prosperity remains») y mantiene la estructura paralela del hemistiquio, pero la formula con un español natural. Se preserva en nota la tensión entre el hebreo conservado y el paralelo griego, sin armonizarlos artificialmente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton.
  - Se prefirió «descendencia» sobre «simiente» por claridad y registro bíblico contemporáneo.
  - «Herencia» mantiene el valor intergeneracional de נחלה sin introducir explicaciones ajenas al verso.
  - La nota usa «pactos» para reflejar διαθήκαις y conservar la lectura alternativa griega sin desplazar la base hebrea.
