translation:
  language: es
  text: Entonces Abraham reprendió a Abimelec[a] acerca del pozo de agua[b] que los siervos de Abimelec habían arrebatado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘le reclamó’ o ‘le hizo frente’; el verbo hebreo puede expresar reproche, confrontación o presentación de una queja.
    reason: lexical_alternative
  - marker: b
    text: O, de manera más libre, ‘del pozo’. El hebreo dice literalmente ‘pozo de agua’.
    reason: lexical_alternative
  - marker: c
    text: O ‘se habían apoderado de’, ‘habían tomado por la fuerza’ o ‘habían robado’. El verbo hebreo implica despojo injusto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הוֹכִ֥יחַ
  english_pob_choice: reproved
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprochó
  - confrontó
  - le hizo una reclamación
  lexicon: HALOT
  rationale: El verbo hifil de יכח puede expresar reprensión, exposición de culpa o presentación de una queja. 'Reprendió' conserva la fuerza correctiva y de confrontación del contexto narrativo sin convertirlo en un tecnicismo jurídico.
- source_word: עַל אֹדוֹת
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  - concerniente a
  lexicon: HALOT
  rationale: La expresión introduce el asunto del reproche. 'Acerca de' es natural en español y mantiene el valor temático de la preposición sin sobredeterminarlo.
- source_word: בְּאֵר הַמַּיִם
  english_pob_choice: the well of water
  chosen_spanish: el pozo de agua
  alternatives_spanish:
  - el pozo del agua
  - el pozo
  lexicon: HALOT
  rationale: El hebreo menciona literalmente un 'pozo de agua'. En español, 'pozo de agua' conserva la concreción del original y suena más natural que una calca como 'pozo del agua'.
- source_word: גָּזְלוּ
  english_pob_choice: had seized
  chosen_spanish: habían tomado por fuerza
  alternatives_spanish:
  - habían arrebatado
  - habían robado
  - habían tomado
  lexicon: HALOT
  rationale: גזל denota tomar injustamente, a menudo con violencia o despojo. 'Tomado por fuerza' preserva esa carga de abuso sin reducirlo solo a robo clandestino.
- source_word: עַבְדֵי אֲבִימֶלֶךְ
  english_pob_choice: Abimelech’s servants
  chosen_spanish: los siervos de Abimelec
  alternatives_spanish:
  - los servidores de Abimelec
  - los esclavos de Abimelec
  lexicon: HALOT
  rationale: Aquí עבד describe a los miembros de la casa o del séquito real que actuaron en nombre de Abimelec. 'Siervos' comunica bien ese papel contextual sin imponer 'esclavos', que sería más fuerte de lo que exige el pasaje.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'concerning' en lugar de 'about' para un registro algo más formal. En español se reflejó con 'acerca de', manteniendo el nivel de formalidad sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'Abimelec' como forma española breve y estable del nombre propio.
  - Se evitó 'SEÑOR' u otra sustitución porque no aparece un tetragrámaton en este versículo.
  - '''Siervos'' se eligió por función narrativa; no se fuerza el matiz de esclavitud donde el texto no lo enfatiza.'
  - La frase verbal 'tomado por fuerza' conserva la idea de despojo sin añadir detalles no presentes en el hebreo.
