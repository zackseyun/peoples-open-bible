    rationale: לִקְרָאתוֹ expresa movimiento para encontrarlo; 'vino a su encuentro' encaja mejor con el contexto narrativo de aparición ante David, aunque 'salió' no altera gravemente el sentido.
  revised_spanish_text: Cuando David llegó a la cima[a], donde adoró a Dios, he aquí[b], Husai el arquita vino a su encuentro con su túnica rasgada y tierra sobre su cabeza.
