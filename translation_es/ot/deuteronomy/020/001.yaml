translation:
  language: es
  text: Cuando salgas a la batalla contra tus enemigos y veas caballos y carros[a], un pueblo más numeroso que tú[b], no les tengas miedo; porque Yahvé tu Dios está contigo, el que te hizo subir de la tierra de Egipto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballo y carro»; los singulares hebreos probablemente funcionan de manera colectiva para las fuerzas militares.
    reason: lexical_alternative
  - marker: b
    text: O «un pueblo mayor que tú». La frase probablemente subraya que el enemigo es mayor en número.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el que te hizo subir de la tierra de Egipto», en eco del éxodo como fundamento de la confianza de Israel.'
    reason: cross_reference
lexical_decisions:
- source_word: תֵצֵא לַמִּלְחָמָה
  english_pob_choice: you go out to battle
  chosen_spanish: salgas a la batalla
  alternatives_spanish:
  - salgas a la guerra
  - salgas al combate
  lexicon: HALOT
  rationale: El hebreo expresa la salida a un enfrentamiento militar; «batalla» mantiene la naturalidad del español y sigue la revisión inglesa que prefirió 'battle' sobre 'war' para reflejar mejor la expresión hebrea.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los enemigos de ti
  - tus adversarios
  lexicon: HALOT
  rationale: «Enemigos» reproduce de forma directa el sustantivo hostil del hebreo y conserva el tono militar del contexto.
- source_word: סוּס וָרֶכֶב
  english_pob_choice: horses and chariots
  chosen_spanish: caballos y carros
  alternatives_spanish:
  - caballo y carro
  - cabalgaduras y carros
  lexicon: HALOT
  rationale: Aunque el hebreo usa singulares, el sentido colectivo es militar; en español el plural comunica naturalmente las fuerzas de caballería y carros de guerra. Se conserva la alternativa singular en nota.
- source_word: עַם רַב מִמְּךָ
  english_pob_choice: a people more numerous than you
  chosen_spanish: un pueblo más numeroso que tú
  alternatives_spanish:
  - un pueblo mayor que tú
  - un pueblo más grande que tú
  lexicon: HALOT
  rationale: «Numeroso» preserva la comparación cuantitativa del hebreo sin desplazar el énfasis hacia poder militar abstracto.
- source_word: לֹא תִירָא מֵהֶם
  english_pob_choice: do not fear them
  chosen_spanish: no les tengas miedo
  alternatives_spanish:
  - no temas a causa de ellos
  - no temas
  lexicon: HALOT
  rationale: La prohibición se expresa de manera idiomática en español con «no les tengas miedo», que transmite con claridad el mandato sin endurecerlo innecesariamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», manteniendo el nombre divino y evitando la sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios,
  - tu Dios es
  lexicon: HALOT
  rationale: «Dios» es el equivalente directo y reverente de אֱלֹהֶיךָ en este contexto de alianza y presencia protectora.
- source_word: עִמָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está a tu lado
  - va contigo
  lexicon: HALOT
  rationale: «Está contigo» conserva la presencia covenantal del hebreo y suena natural en español.
- source_word: הַמַּעַלְךָ
  english_pob_choice: who brought you up
  chosen_spanish: el que te hizo subir
  alternatives_spanish:
  - el que te sacó
  - el que te subió
  lexicon: HALOT
  rationale: El participio hebreo remite al éxodo como acción de ascenso/salida. «Te hizo subir» conserva más de cerca la imagen verbal del hebreo que «te sacó», aunque ambas opciones son posibles.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: «De la tierra de Egipto» sigue de cerca la expresión de origen geográfico del hebreo y mantiene un registro bíblico claro.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto requiere preservar el nombre propio divino en español; por eso se emplea «Yahvé» en vez de una sustitución titulística.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor militar de סוּס וָרֶכֶב
  english_pob_reading: horses and chariots
  chosen_spanish_reading: caballos y carros
  alternative_spanish_readings:
  - caballo y carro
  - caballos y carros de guerra
  rationale: El hebreo usa singulares con sentido colectivo para fuerzas militares. En español, el plural es más claro y no altera el valor del original; se mantiene la tensión lexical en nota.
  doctrine_reference: HALOT; English POB footnote a
- issue: Fuerza de עַם רַב מִמְּךָ
  english_pob_reading: a people more numerous than you
  chosen_spanish_reading: un pueblo más numeroso que tú
  alternative_spanish_readings:
  - un pueblo mayor que tú
  - un ejército más grande que el tuyo
  rationale: Se conserva el énfasis del texto en la superioridad numérica, no en una formulación militar reinterpretada.
  doctrine_reference: HALOT; English POB footnote b
- issue: Motivo exódico final
  english_pob_reading: who brought you up from the land of Egypt
  chosen_spanish_reading: el que te hizo subir de la tierra de Egipto
  alternative_spanish_readings:
  - el que te sacó de la tierra de Egipto
  - el que te hizo salir de la tierra de Egipto
  rationale: La forma participial hebrea funciona como apposición identificadora de Yahvé. «Te hizo subir» conserva la imagen del ascenso exódico y refleja con fidelidad la base hebrea.
  doctrine_reference: HALOT; English POB footnote c
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'war' por 'battle' para reflejar con mayor precisión la expresión hebrea y mantener un estilo formal natural. La redacción española sigue esa decisión con «batalla». También se retuvo la lógica de las notas inglesas sobre el carácter colectivo de 'horses and chariots', la superioridad numérica del enemigo y el eco del éxodo en la cláusula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «el SEÑOR» para no ocultar el nombre divino.
  - «Batalla» se eligió como equivalente natural de la expresión militar hebrea y en continuidad con la revisión inglesa.
  - Se mantuvo un registro bíblico sobrio y publicable, sin añadir matices no sustentados por el hebreo.
