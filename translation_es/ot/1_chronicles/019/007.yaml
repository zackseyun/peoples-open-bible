translation:
  language: es
  text: Contrataron para sí treinta y dos mil carros[b], y al rey de Maacá con su gente. Vinieron y acamparon delante de Medeba, y los hijos de Amón[a] se reunieron de sus ciudades y fueron a la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los amonitas". El hebreo dice literalmente "los hijos de Amón", una designación étnica habitual.
    reason: lexical_alternative
  - marker: b
    text: '"Carros" también puede denotar una fuerza de carros o cuerpo de carros colectivamente, no solo un número de vehículos individuales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂכְּרוּ
  english_pob_choice: they hired
  chosen_spanish: contrataron
  alternatives_spanish:
  - alquilaron
  - tomaron a sueldo
  lexicon: HALOT
  rationale: El verbo expresa obtener mediante pago. En español, "contrataron" comunica bien la acción sin introducir explícitamente "mercenarios", que el hebreo no dice de forma directa.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos
  - para ellos mismos
  lexicon: HALOT
  rationale: El dativo marca beneficio/reflexividad. "Para sí" conserva ese matiz de manera natural en español.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף
  english_pob_choice: thirty-two thousand
  chosen_spanish: treinta y dos mil
  alternatives_spanish:
  - treinta y dos mil exactos
  - dos y treinta mil
  lexicon: HALOT
  rationale: Se conserva el valor numérico exacto en el orden natural del español.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: Aunque puede abarcar una fuerza de carros, en español "carros" mantiene la referencia concreta y evita forzar una glosa interpretativa. Se deja la posibilidad militar en el contexto.
- source_word: מֶלֶךְ מַעֲכָה
  english_pob_choice: the king of Maacah
  chosen_spanish: al rey de Maacá
  alternatives_spanish:
  - al rey de Maacah
  - al rey de Maaca
  lexicon: HALOT
  rationale: Se conserva la relación de gobierno sobre el topónimo. "Maacá" sigue una transliteración española clara y estable.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su gente
  alternatives_spanish:
  - su pueblo
  - sus tropas
  lexicon: HALOT
  rationale: En contexto militar, "su gente" mantiene la amplitud del hebreo עַם sin estrecharlo indebidamente a "tropas".
- source_word: וַיָּבֹאוּ
  english_pob_choice: They came
  chosen_spanish: Vinieron
  alternatives_spanish:
  - Llegaron
  - Fueron
  lexicon: HALOT
  rationale: El wayyiqtol de בוא se expresa bien con un pasado simple natural en español. "Vinieron" conserva la secuencia narrativa.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - levantaron el campamento
  lexicon: HALOT
  rationale: '"Acamparon" comunica el sentido militar de asentarse en campamento sin sonar arcaico.'
- source_word: לִפְנֵי מֵידְבָא
  english_pob_choice: before Medeba
  chosen_spanish: delante de Medeba
  alternatives_spanish:
  - frente a Medeba
  - ante Medeba
  lexicon: HALOT
  rationale: '"Delante de" reproduce la relación espacial de לִפְנֵי de modo claro e idiomático en español.'
- source_word: מֵידְבָא
  english_pob_choice: Medeba
  chosen_spanish: Medeba
  alternatives_spanish:
  - Meidba
  lexicon: HALOT
  rationale: Se mantiene la forma tradicional de transliteración del topónimo en español.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la forma literal y transparente del hebreo, siguiendo la preferencia por el designativo genealógico cuando el texto lo usa.
- source_word: נֶאֶסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  lexicon: HALOT
  rationale: El nifal expresa reunión/aglomeración. "Se reunieron" es natural en español y mantiene el carácter colectivo del movimiento.
- source_word: מֵעָרֵיהֶם
  english_pob_choice: from their cities
  chosen_spanish: desde sus ciudades
  alternatives_spanish:
  - de sus ciudades
  - de entre sus ciudades
  lexicon: HALOT
  rationale: '"Desde" refleja bien el origen/movimiento de procedencia y suena natural en el flujo narrativo.'
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - para la batalla
  - a pelear
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto con artículo, como en el hebreo, sin sustituirlo por una expresión más abstracta.
translation_notes:
  revision_awareness: El texto inglés revisado del audit trail cambió solo 'came to the battle' por 'came to battle' para una formulación más natural; la versión española adopta igualmente una expresión natural ('vinieron a la batalla') sin perder el sustantivo concreto del hebreo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la transparencia genealógica de "los hijos de Amón" frente a una normalización por etnónimo.
  - Se evita "SEÑOR" o equivalentes de sustitución porque no hay aquí un caso de tetragrámaton.
  - '"Maacá" y "Medeba" se presentan con transliteración española consistente y legible.'
