translation:
  text: But that thrice-accursed man asked whether there is in heaven a sovereign who commanded the keeping of the sabbath day[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether the Sovereign is in heaven, the one who commanded the keeping of the sabbath day.' The Greek can be understood either as an indefinite description ('is there in heaven a sovereign...?') or as a more definite reference to Israel's God.
    reason: alternative_reading
lexical_decisions:
- source_word: τρισαλιτήριος
  chosen: thrice-accursed
  alternatives:
  - thrice-wretched
  - most defiled
  - thrice-polluted
  lexicon: LSJ
  rationale: A rare, strongly pejorative epithet built with the intensive prefix τρις-. 'Thrice-accursed' preserves both the rhetorical force and the curse-like denunciation better than flatter options such as 'very wicked.'
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - inquired
  - questioned
  lexicon: BDAG
  rationale: The verb here introduces a hostile question. 'Asked' is natural English and sufficient; the adversarial tone is carried by context and the surrounding insult.
- source_word: δυνάστης
  chosen: sovereign
  alternatives:
  - ruler
  - potentate
  - lord
  lexicon: LSJ
  rationale: The term denotes one who holds power or dominion. 'Sovereign' conveys elevated authority without importing the covenantal/title associations that 'Lord' might suggest.
- source_word: προστατάξας
  chosen: commanded
  alternatives:
  - ordered
  - decreed
  - appointed
  lexicon: LSJ
  rationale: The participle refers to issuing an authoritative directive. 'Commanded' best matches the force of the compound verb in context.
- source_word: ἄγειν
  chosen: the keeping of
  alternatives:
  - to observe
  - to celebrate
  - to keep
  lexicon: LSJ
  rationale: With ἡμέραν, the idiom means to keep or observe a day. Rendering it as 'the keeping of' fits the infinitival construction after 'commanded' while remaining idiomatic in English.
- source_word: τὴν τῶν σαββάτων ἡμέραν
  chosen: the sabbath day
  alternatives:
  - the day of the sabbaths
  - the Sabbath
  lexicon: LSJ
  rationale: Although literally more complex, the phrase refers to the weekly Sabbath. 'The sabbath day' is clear, accurate, and avoids an awkwardly literal plural form in English.
