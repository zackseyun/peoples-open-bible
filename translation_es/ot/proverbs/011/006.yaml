  text: צִדְקַ֣ת יְ֭שָׁרִים תַּצִּילֵ֑/ם וּ֝/בְ/הַוַּ֗ת בֹּגְדִ֥ים יִלָּכֵֽדוּ׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/011/006.yaml
  text: The righteousness of the upright rescues them[a], but the treacherous are caught by their own desire.
  footnotes:
  - marker: a
    text: Or 'but the treacherous are caught in their ruin' or 'by their destruction.' The Hebrew noun can denote either destructive desire/craving or calamity/ruin; the main text takes it as the inner craving that ensnares them.
    reason: lexical_alternative
