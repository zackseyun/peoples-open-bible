translation:
  language: es
  text: Por eso, yo entregaré sus esposas a otros, sus campos a los que los poseerán[a]; porque desde el menor hasta el mayor, cada uno codicia ganancias injustas[b]; desde el profeta hasta el sacerdote, cada uno practica la falsedad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a herederos'. El hebreo puede significar 'heredar' o 'tomar posesión', y aquí probablemente incluye la idea de despojo por nuevos poseedores.
    reason: lexical_alternative
  - marker: b
    text: O 'codicia ganancias'. La expresión hebrea puede denotar codicia de ganancia en general, pero en contextos proféticos suele implicar lucro deshonesto o injusto.
    reason: lexical_alternative
  - marker: c
    text: O 'obra engaño' o 'actúa engañosamente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  - Así que
  lexicon: HALOT
  rationale: Marca la consecuencia lógica del reproche previo. 'Por eso' conserva el valor inferencial en un español natural y digno, sin perder el tono judicial.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: yo entregaré
  alternatives_spanish:
  - daré
  - yo daré
  - entregaré
  lexicon: HALOT
  rationale: En este contexto profético de juicio, 'entregaré' comunica mejor la acción soberana de poner algo en manos de אחרים/otros, no solo 'dar' en sentido neutro. El pronombre explícito refuerza que Yahvé es el sujeto.
- source_word: נְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus mujeres
  lexicon: HALOT
  rationale: '''אשה'' puede significar ''mujer'' o ''esposa''. Dado que el POB en inglés optó por ''wives'' y el contexto de juicio nacional no exige precisar el estado civil, ''sus mujeres'' preserva la amplitud semántica y evita un tecnicismo innecesario.'
- source_word: לַאֲחֵרִים
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otros hombres
  - a extraños
  lexicon: HALOT
  rationale: Es la correspondencia más directa y neutra para el plural sustantivado. No se añade 'hombres' porque el hebreo no lo explicita.
- source_word: שְׂדֽוֹתֵיהֶם
  english_pob_choice: their fields
  chosen_spanish: sus campos
  alternatives_spanish:
  - sus tierras
  - sus heredades
  lexicon: HALOT
  rationale: '''Campos'' es una traducción concreta y clara del bien agrícola mencionado. ''Tierras'' sería más amplio y menos preciso; ''heredades'' introduciría un matiz no necesario aquí.'
- source_word: לְיוֹרְשִׁים
  english_pob_choice: to those who will possess them
  chosen_spanish: a los que los poseerán
  alternatives_spanish:
  - a los herederos
  - a los que los heredarán
  - a los poseedores
  lexicon: HALOT
  rationale: El verbo ירשׁ admite 'heredar' y 'poseer', y en este pasaje el sentido incluye la toma efectiva de posesión. 'Los poseerán' conserva la fuerza de apropiación señalada en el audit trail inglés sin volverla demasiado interpretativa.
- source_word: כִּי מִ/קָּטֹן וְ/עַד גָּדֹל
  english_pob_choice: for from the least even to the greatest
  chosen_spanish: porque desde el más pequeño hasta el más grande
  alternatives_spanish:
  - porque desde el menor hasta el mayor
  - pues desde el más pequeño hasta el más grande
  lexicon: HALOT
  rationale: Merismo de totalidad social. 'Más pequeño / más grande' es natural en español y mantiene el alcance total indicado por el texto.
- source_word: כֻּלֹּה
  english_pob_choice: every one of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - cada uno de ellos
  - todos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo, el sentido distributivo es colectivo. 'Todos ellos' es idiomático y suficientemente abarcador en español.
- source_word: בֹּצֵעַ בָּצַע
  english_pob_choice: is greedy for unjust gain
  chosen_spanish: son codiciosos de ganancia injusta
  alternatives_spanish:
  - codician ganancia injusta
  - son ávidos de lucro injusto
  - son codiciosos de ganancia
  lexicon: HALOT
  rationale: La construcción participio + sustantivo expresa una inclinación activa y repetida hacia el lucro ilícito. 'Ganancia injusta' sigue el juicio ético del POB inglés ('unjust gain') y conserva la tensión moral del hebreo.
- source_word: מִנָּבִיא וְעַד כֹּהֵן
  english_pob_choice: from prophet even to priest
  chosen_spanish: desde el profeta hasta el sacerdote
  alternatives_spanish:
  - del profeta al sacerdote
  - desde profeta hasta sacerdote
  lexicon: HALOT
  rationale: Otro merismo, ahora de liderazgo religioso. 'Profeta' y 'sacerdote' se mantienen como títulos directos y comprensibles.
- source_word: עֹשֶׂה שָּׁקֶר
  english_pob_choice: practices falsehood
  chosen_spanish: practican la falsedad
  alternatives_spanish:
  - actúan con falsedad
  - hacen falsedad
  - obran engaño
  lexicon: HALOT
  rationale: עָשָׂה + שֶׁקֶר no apunta solo a una mentira aislada sino a un patrón de conducta. 'Practican la falsedad' reproduce el valor habitual y moral del giro con buen español.
theological_decisions:
- issue: Judgment oracle as divine act, not mere social description
  english_pob_reading: A divine judgment oracle in which the LORD hands over family and property to others as covenantal punishment.
  chosen_spanish_reading: Un oráculo de juicio en el que Yahvé entrega a otros las mujeres y los campos como castigo pactual.
  alternative_spanish_readings:
  - Una simple descripción de pérdidas por guerra
  - Un anuncio meramente sociológico del despojo
  rationale: El verbo en primera persona y el encadenamiento causal hacen de la pérdida una acción judicial divina. La traducción mantiene ese carácter sin añadir detalles ajenos al hebreo.
  doctrine_reference: Jeremías 8:10; juicio pactual en la teología profética de Israel
translation_notes:
  revision_awareness: El inglés POB revisó 'take possession of them' a 'possess them' para reflejar más directamente ירשׁ. La versión española sigue esa decisión con 'los poseerán', manteniendo el matiz de apropiación sin sobreexplicar. También conserva el paralelo merístico 'from ... to ...' con estructuras naturales en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el texto base del proyecto, pero este versículo no contiene el nombre divino explícito; por eso no se introduce en la línea principal.
  - '''Falsedad'' se prefirió a ''mentira'' para reflejar el sustantivo שקר como estado/conducta, no solo un acto aislado de mentir.'
  - '''Ganancia injusta'' conserva la evaluación moral del POB inglés y evita neutralizar el hebreo con un simple ''ganancia''.'
