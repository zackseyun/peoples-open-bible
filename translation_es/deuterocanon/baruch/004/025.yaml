translation:
  language: es
  text: Hijos, soporten con paciencia la ira que ha venido sobre ustedes de parte de Dios. El enemigo los persiguió, pero pronto verán[a] su destrucción, y pisarán sus cuellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego pasa de singular a plural al referirse al enemigo: «su destrucción ... sus cuellos». Esto probablemente presenta al enemigo tanto como adversario singular como fuerza colectiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: Children
  chosen_spanish: Hijos
  alternatives_spanish:
  - Niños
  - Hijos míos
  lexicon: BDAG
  rationale: El vocativo plural expresa una apelación tierna y familiar. En español, «Hijos» comunica esa cercanía con naturalidad; se evita «Hijos míos» porque el griego no añade el posesivo.
- source_word: μακροθυμήσατε
  english_pob_choice: endure patiently
  chosen_spanish: soporten con paciencia
  alternatives_spanish:
  - sean pacientes
  - aguanten con paciencia
  lexicon: BDAG
  rationale: El imperativo pide resistencia paciente ante la aflicción. «Soporten con paciencia» conserva la idea de aguante perseverante mejor que un simple «sean pacientes».
- source_word: ὀργήν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  lexicon: BDAG
  rationale: En este contexto la referencia es a la respuesta judicial de Dios; «ira» comunica mejor ese peso que «enojo», que suena más ordinario en español.
- source_word: ἐπελθοῦσαν
  english_pob_choice: that has come upon you
  chosen_spanish: que ha venido sobre ustedes
  alternatives_spanish:
  - que les ha sobrevenido
  - que cayó sobre ustedes
  lexicon: BDAG
  rationale: El participio describe una ira ya llegada al pueblo. «Ha venido sobre ustedes» mantiene el sentido resultativo y la imagen de algo que irrumpe sobre ellos.
- source_word: κατεδίωξέν
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - acosó
  - dio caza a
  lexicon: BDAG
  rationale: El verbo expresa persecución hostil; «persiguió» es una equivalencia directa y suficientemente amplia para fuerza militar o agresión enemiga.
- source_word: ὄψει
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - verás
  lexicon: BDAG
  rationale: Se conserva el futuro de percepción visual en plural, acorde con el vocativo colectivo «Hijos».
- source_word: ἀπώλειαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» reproduce con fuerza la idea del derrumbe del enemigo sin suavizarla.
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - en breve
  - rápidamente
  lexicon: BDAG
  rationale: La expresión idiomática indica inminencia; «pronto» es la opción más natural y clara en español.
- source_word: ἐπὶ τραχήλους αὐτῶν ἐπιβήσῃ
  english_pob_choice: you will step upon their necks
  chosen_spanish: pisarán sus cuellos
  alternatives_spanish:
  - pisarán sus cervices
  - pondrán el pie sobre sus cuellos
  lexicon: BDAG
  rationale: Se conserva la imagen corporal de victoria sobre enemigos vencidos. En español, «pisarán sus cuellos» mantiene la fuerza figurativa del griego sin suavizarla.
theological_decisions:
- issue: Atribución explícita de la ira a Dios
  english_pob_reading: the wrath that has come upon you from God
  chosen_spanish_reading: la ira que ha venido sobre ustedes de parte de Dios
  alternative_spanish_readings:
  - la ira que les ha sobrevenido
  - el castigo que ha venido sobre ustedes de parte de Dios
  rationale: El griego atribuye la ira explícitamente a Dios; la traducción mantiene esa referencia sin convertirla en una mera consecuencia impersonal ni sustituirla por «castigo».
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Cambio de singular a plural en el enemigo
  english_pob_reading: his destruction ... their necks
  chosen_spanish_reading: su destrucción ... sus cuellos
  alternative_spanish_readings:
  - su destrucción ... el cuello de ellos
  - su destrucción ... su cuello
  rationale: El texto griego alterna entre singular y plural al referirse al enemigo. En español, «su destrucción ... sus cuellos» preserva esa tensión de manera natural sin borrar la oscilación referencial.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto griego de Swete coincide con el packet fuente adjudicado y la auditoría inglesa POB indica sin cambios respecto de la última pasada; por eso no se introducen ajustes de revisión adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» en lugar de una glosa litúrgica para preservar la atribución explícita del texto.
  - Se conserva el registro solemne pero accesible, propio de una Biblia pública contemporánea.
  - La imagen corporal de victoria se mantiene sin paráfrasis explicativa para no perder la fuerza del original.
