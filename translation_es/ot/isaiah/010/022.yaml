review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura concesiva («Porque aunque»), la imagen «como la arena del mar», el motivo del remanente y la idea de destrucción decretada. Sin embargo, no preserva plenamente la decisión auditada del POB para צְדָקָה, que en el texto principal debe quedar como «justicia/rectitud» según contexto pero aquí el rastro inglés privilegia «righteousness» en el texto principal y deja «justice» como alternativa. Además, «de él» para בּוֹ suena menos natural en español que una formulación partitiva clara, y «que se desborda en justicia» es menos idiomático que una construcción adjetival o participial más cercana al hebreo.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos roces de naturalidad: «un remanente de él volverá» suena forzado para un referente colectivo, y «que se desborda en justicia» resulta algo pesado y menos natural que «rebosante de rectitud» o «desbordante de justicia». También conviene alinear la nota b con la elección principal, no invertirla.'
  glossary_alignment: 'No hay conflictos con los términos globales principales del proyecto en este versículo. El punto clave es mantener la decisión léxica documentada para צְדָקָה: texto principal con «rectitud» o equivalente que preserve righteousness, y nota con «justicia» como alternativa contextual. «Remanente» está bien alineado.'
  issues:
  - severity: high
    issue: La cláusula final invierte la decisión principal del POB para צְדָקָה.
    rationale: La auditoría inglesa pone «righteousness» en el texto principal y «justice» en nota. El borrador español eligió «justicia» en el texto principal y relegó «rectitud» a nota, alterando una decisión semántica/theológica documentada.
  - severity: medium
    issue: «de él» para בּוֹ es poco natural en español.
    rationale: Aunque el hebreo usa pronombre singular con valor colectivo, el español bíblico actual suena más claro con una expresión como «de ellos» en el texto y una nota que explique la singularidad hebrea, o bien con una reformulación partitiva más natural.
  - severity: medium
    issue: «que se desborda en justicia» no suena tan natural ni tan cercano al valor predicativo del hebreo.
    rationale: La combinación «shotef tsedaqah» funciona mejor en español como «desbordante de rectitud» o similar, que conserva la metáfora de desborde sin una relativa innecesaria.
  revised_spanish_text: Porque aunque tu pueblo, Israel, sea como la arena del mar, solo un remanente de ellos[a] volverá. Una destrucción decretada,[b] desbordante de rectitud.
  revised_footnotes:
