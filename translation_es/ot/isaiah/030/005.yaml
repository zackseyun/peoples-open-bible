translation:
  language: es
  text: Todos quedan avergonzados[a] por un pueblo que no les puede aprovechar, que no es para ayuda ni para provecho, sino para vergüenza y también para oprobio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo הבאיש es difícil. Puede llevar la idea de hacerse odioso o de oler mal, pero en este contexto de alianza fallida y por el paralelismo con «vergüenza» y «oprobio», aquí se prefiere el sentido de quedar avergonzado o ser puesto en vergüenza.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: Everyone
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos ellos
  - Cada uno
  lexicon: HALOT
  rationale: El hebreo usa un valor distributivo que abarca al conjunto; «Todos» conserva la amplitud sin introducir un sujeto más específico que el texto no da.
- source_word: הבאיש
  english_pob_choice: is put to shame
  chosen_spanish: se avergüenzan
  alternatives_spanish:
  - son avergonzados
  - quedan en vergüenza
  - se han hecho odiosos
  lexicon: HALOT
  rationale: El término es difícil y puede sugerir hacerse odioso o maloliente, pero el paralelismo con «vergüenza» y «oprobio» favorece una lectura de deshonra. En español, «se avergüenzan» comunica esa idea sin forzar una calca extraña.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por causa de
  lexicon: HALOT
  rationale: Aquí introduce causa u ocasión; «por» es natural en español y mantiene la relación causal del hebreo.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: El singular colectivo hebreo se vierte bien con «un pueblo», que conserva la referencia nacional sin especificar más de lo que el verso dice.
- source_word: לֹא יוֹעִילוּ לָמוֹ
  english_pob_choice: cannot profit them
  chosen_spanish: no les puede aprovechar
  alternatives_spanish:
  - no les puede beneficiar
  - no les sirve
  - no les aprovecha
  lexicon: HALOT
  rationale: El verbo יעל tiene el sentido de ser útil o producir beneficio. «Aprovechar» conserva ese campo semántico y suena natural en español; el singular impersonal encaja con el colectivo.
- source_word: לְעֵזֶר
  english_pob_choice: for help
  chosen_spanish: para ayuda
  alternatives_spanish:
  - como ayuda
  - para auxilio
  lexicon: HALOT
  rationale: Se mantiene la construcción nominal y el paralelismo con «para provecho».
- source_word: לְהוֹעִיל
  english_pob_choice: for profit
  chosen_spanish: para provecho
  alternatives_spanish:
  - para beneficio
  - para utilidad
  lexicon: HALOT
  rationale: «Provecho» preserva la idea de utilidad/beneficio y ayuda a reflejar la relación interna con יוֹעִילוּ / הוֹעִיל.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: HALOT
  rationale: 'Aquí el valor es adversativo: no ayudan ni aprovechan, sino que resultan en vergüenza y oprobio. «Sino» expresa bien ese contraste en español.'
- source_word: לְבֹשֶׁת
  english_pob_choice: for shame
  chosen_spanish: para vergüenza
  alternatives_spanish:
  - para deshonra
  - para humillación
  lexicon: HALOT
  rationale: «Vergüenza» es la correspondencia directa y mantiene el campo semántico activado por el verbo inicial.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - y aun
  lexicon: HALOT
  rationale: Conserva el valor aditivo y la naturalidad del español contemporáneo.
- source_word: לְחֶרְפָּה
  english_pob_choice: for reproach
  chosen_spanish: para oprobio
  alternatives_spanish:
  - para reproche
  - para afrenta
  - para escarnio
  lexicon: HALOT
  rationale: «Oprobio» transmite la deshonra pública e insultante de חרפה con un registro bíblico claro en español; «reproche» sería posible, pero suena menos fuerte aquí.
theological_decisions:
- issue: Sentido de la cláusula inicial con הבאיש
  english_pob_reading: Everyone is ashamed
  chosen_spanish_reading: Todos se avergüenzan
  alternative_spanish_readings:
  - Todos quedan avergonzados
  - Todos son puestos en vergüenza
  rationale: No se convirtió en una calca del posible matiz de «maloliente/odioso» porque el contexto y la paralela cadena de deshonra favorecen la lectura de vergüenza pública. Se deja abierta la dificultad mediante la nota textual/lexical.
  doctrine_reference: Isaías 30:5; cf. el paralelismo poético interno del versículo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió «is put to shame» por «is ashamed» y simplificó la cláusula relativa. En español se optó por una formulación igualmente directa y fluida, sin perder el paralelismo semántico de utilidad/provecho y vergüenza/oprobio.
  spanish_consistency_notes:
  - Se mantiene «pueblo» para עַם, en línea con un colectivo nacional indefinido.
  - Se conserva el contraste «para ayuda / para provecho» para reflejar la repetición conceptual del hebreo.
  - «Vergüenza» y «oprobio» se usaron como pares cercanos, con distinto grado de deshonra pública.
  - No se introdujo «SEÑOR» ni otras convenciones de sustitución nominal, porque este versículo no contiene el Tetragrámaton.
