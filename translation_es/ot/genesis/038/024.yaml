translation:
  language: es
  text: 'Y sucedió que, unos tres meses después, se le informó a Judá: «Tamar, tu nuera, ha actuado como prostituta[a], y además está embarazada por prostitución[b]». Entonces Judá dijo: «Sáquenla, y sea quemada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha hecho de prostituta»; más ampliamente, «ha cometido inmoralidad sexual».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «está embarazada a causa de prostitución», o «por actos de prostitución».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo episodio. «Aconteció» conserva el valor discursivo de wayyiqtol sin caer en una versión demasiado coloquial o mecánica.
- source_word: כְּמִשְׁלֹשׁ חֳדָשִׁים
  english_pob_choice: about three months later
  chosen_spanish: como de tres meses
  alternatives_spanish:
  - aproximadamente tres meses después
  - cuando habían pasado como tres meses
  lexicon: HALOT
  rationale: La construcción con כ indica aproximación temporal. En español, «como de tres meses» mantiene esa idea con una forma natural y breve; la idea de posterioridad ya queda implícita por el contexto narrativo.
- source_word: וַיֻּגַּד לִיהוּדָה לֵאמֹר
  english_pob_choice: that Judah was told
  chosen_spanish: fue dicho a Judá
  alternatives_spanish:
  - le fue informado a Judá
  - le avisaron a Judá
  lexicon: HALOT
  rationale: El pasivo hebreo presenta un informe que llega a Judá. «Fue dicho a Judá» mantiene la pasividad del original; en español puede sonar más literal que «le fue informado», pero conserva mejor la huella sintáctica del hebreo.
- source_word: זָנְתָה
  english_pob_choice: has acted as a prostitute
  chosen_spanish: ha actuado como prostituta
  alternatives_spanish:
  - se ha prostituido
  - ha hecho de prostituta
  - ha cometido inmoralidad sexual
  lexicon: HALOT
  rationale: El verbo זנה lleva el campo semántico de prostitución/fornicación. «Ha actuado como prostituta» reproduce ese peso léxico sin suavizarlo hacia una categoría más amplia. Se evita «inmoralidad sexual» porque borra la imagen concreta preservada por el texto.
- source_word: כַלָּתֶךָ
  english_pob_choice: your daughter-in-law
  chosen_spanish: tu nuera
  alternatives_spanish:
  - tu hija política
  lexicon: HALOT
  rationale: Término de parentesco directo y claro en español; «nuera» es la equivalencia normal y precisa.
- source_word: וְגַם הִנֵּה
  english_pob_choice: and behold, she is also
  chosen_spanish: y, además, he aquí que
  alternatives_spanish:
  - y, además, mira que
  - y, además, he aquí
  lexicon: HALOT
  rationale: La combinación añade énfasis e introduce la acusación adicional. «He aquí que» mantiene el valor discursivo de הִנֵּה y «además» refleja וְגַם.
- source_word: הָרָה
  english_pob_choice: pregnant
  chosen_spanish: está encinta
  alternatives_spanish:
  - está embarazada
  - está preñada
  lexicon: HALOT
  rationale: «Encinta» es una equivalencia digna y bíblicamente transparente para «pregnant». Se evita «embarazada» no por ser incorrecta, sino porque «encinta» conserva mejor el registro narrativo tradicional sin volverse arcaizante.
- source_word: לִזְנוּנִים
  english_pob_choice: by prostitution
  chosen_spanish: por prostitución
  alternatives_spanish:
  - a causa de prostitución
  - de actos de prostitución
  - por actos de prostitución
  lexicon: HALOT
  rationale: El sustantivo plural abstracto liga el embarazo con actos de prostitución/fornicación. «Por prostitución» conserva la relación causal y mantiene el vínculo lexical con זָנְתָה.
- source_word: הוֹצִיאוּהָ
  english_pob_choice: Bring her out
  chosen_spanish: Sáquenla
  alternatives_spanish:
  - Tráiganla afuera
  - Pónganla fuera
  lexicon: HALOT
  rationale: El imperativo plural con sufijo femenino pide acción inmediata por parte de varios. «Sáquenla» es natural en español y preserva el tono directo del mandato.
- source_word: וְתִשָּׂרֵף
  english_pob_choice: and let her be burned
  chosen_spanish: y sea quemada
  alternatives_spanish:
  - y que sea quemada
  - y será quemada
  lexicon: HALOT
  rationale: La forma verbal expresa una orden/prescripción pasiva. «Sea quemada» reproduce bien ese valor jussivo en español sin convertirlo en una voz activa ni añadir agencia no especificada.
theological_decisions:
- issue: Campo léxico de la acusación sexual
  english_pob_reading: Use prostitution language rather than the broader sexual immorality.
  chosen_spanish_reading: 'Conservar el lenguaje de prostitución: «ha actuado como prostituta» / «por prostitución».'
  alternative_spanish_readings:
  - ha cometido inmoralidad sexual
  - ha pecado sexualmente
  rationale: El hebreo usa formas de זנה y זנונים, que cargan una imagen específica de prostitución/harlotry. Mantener ese campo léxico preserva la fuerza acusatoria del relato y evita diluirla en una categoría moral más general.
  doctrine_reference: Principio de equivalencia semántica y preservación de la textura léxica del texto; cf. HALOT sobre זנה/זנונים.
- issue: Severidad de la sentencia de Judá
  english_pob_reading: Translate as a command for execution by burning.
  chosen_spanish_reading: 'Traducir como una orden de ejecución: «Sáquenla, y sea quemada».'
  alternative_spanish_readings:
  - Sáquenla para quemarla
  - Tráiganla afuera y quémenla
  rationale: El hebreo presenta una orden inmediata y pasiva. La solución elegida mantiene la severidad del mandato y la pasividad de la forma verbal, sin especificar indebidamente quién ejecuta la acción.
  doctrine_reference: Lectura gramatical del jussivo/pasivo hebreo en contexto narrativo-legal; cf. HALOT y el análisis morfológico.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene el valor narrativo de wayyiqtol, conserva el léxico específico de prostitución frente a una generalización moral, y refleja la orden pasiva de ejecución. No se reportan revisiones aplicadas en la fuente, y la concordancia entre auditorías es alta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Judá» y «Tamar» se conservan como nombres propios sin adaptación.
  - Se usa «nuera» para כַלָּתֶךָ por ser el equivalente natural y preciso en español.
  - Se evita «SEÑOR» u otros reemplazos devocionales que no corresponden al texto hebreo aquí.
  - Se conserva la distinción entre la acusación de prostitución y una categoría más amplia de inmoralidad sexual, porque el hebreo la documenta léxicamente.
