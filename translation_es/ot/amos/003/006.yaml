translation:
  language: es
  text: Si se toca la trompeta en una ciudad, ¿no tiembla el pueblo? Si ocurre una calamidad[a] en una ciudad, ¿no la ha hecho Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desgracia». El hebreo también puede traducirse «mal», pero aquí se refiere a calamidad o juicio, no a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתָּקַע שׁוֹפָר
  english_pob_choice: a trumpet is blown
  chosen_spanish: se toca la trompeta
  alternatives_spanish:
  - se toca un cuerno
  - se hace sonar el shofar
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno usado como señal de alarma; en español, «trompeta» comunica naturalmente esa señal pública sin perder la función de advertencia. «Se toca» reproduce bien la voz pasiva/impersonal del hebreo.
- source_word: בְּעִיר
  english_pob_choice: in a city
  chosen_spanish: en una ciudad
  alternatives_spanish:
  - en la ciudad
  - en un pueblo
  lexicon: HALOT
  rationale: עִיר es el término común para ciudad o poblado; «ciudad» mantiene el paralelismo repetido y la escena cívica.
- source_word: וְעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los habitantes
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, el español idiomático pide un referente definido en esta pregunta retórica. «El pueblo» conserva el sentido colectivo de los habitantes de la ciudad.
- source_word: יֶחֱרָדוּ
  english_pob_choice: tremble
  chosen_spanish: se estremecerá
  alternatives_spanish:
  - temblará
  - se espantará
  - se conmoverá
  lexicon: HALOT
  rationale: חרד expresa temblor por alarma o temor. «Se estremecerá» conserva el movimiento físico y la reacción emocional con un español natural y solemne.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - desastre
  - mal
  lexicon: HALOT
  rationale: En este contexto רָעָה no apunta al mal moral sino a una calamidad/jucio. «Calamidad» preserva esa tensión sin sugerir que Yahvé comete maldad ética.
- source_word: תִּהְיֶה
  english_pob_choice: happens
  chosen_spanish: ocurre
  alternatives_spanish:
  - sucede
  - llega
  - se presenta
  lexicon: HALOT
  rationale: Con רָעָה en contexto, el verbo expresa la llegada efectiva de la calamidad a la ciudad. «Ocurre» es una forma clara y natural en español.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: El proyecto pide mantener el nombre divino como «Yahvé» en el texto principal. Esto evita el ocultamiento reverencial y hace visible la correspondencia con el hebreo.
- source_word: עָשָׂה
  english_pob_choice: done it
  chosen_spanish: la ha hecho
  alternatives_spanish:
  - la ha causado
  - la ha traído
  - la ha producido
  lexicon: HALOT
  rationale: עָשָׂה es amplio («hacer, causar»). «La ha hecho» conserva la fuerza directa del hebreo y, en español, retoma naturalmente la calamidad implícita del contexto.
theological_decisions:
- issue: Sentido de רָעָה respecto a la acción de Yahvé
  english_pob_reading: Rendered as 'disaster' rather than 'evil'
  chosen_spanish_reading: «calamidad» en vez de «mal»
  alternative_spanish_readings:
  - mal
  - maldad
  - desgracia
  rationale: El hebreo puede significar mal, daño o calamidad según el contexto. Aquí el paralelismo con la alarma en la ciudad y el marco profético favorecen calamidad/jucio, no maldad moral. «Calamidad» preserva la tensión bíblica sin atribuir a Yahvé mal moral.
  doctrine_reference: Preservar el sentido de juicio soberano sin resolver la tensión teológica mediante una paráfrasis moralizante.
- issue: Agencia divina en la segunda cláusula
  english_pob_reading: has not Yahweh done it?
  chosen_spanish_reading: «¿no la ha hecho Yahvé?»
  alternative_spanish_readings:
  - ¿no la ha causado Yahvé?
  - ¿no la ha traído Yahvé?
  - ¿no la ha producido Yahvé?
  rationale: El hebreo atribuye directamente a Yahvé la calamidad de la ciudad como acto de juicio soberano. La traducción debe conservar esa afirmación fuerte; «la ha hecho» mantiene la dureza del texto sin suavizarla.
  doctrine_reference: Afirmaciones; traducción que conserva la soberanía divina y la tensión del original.
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió revisiones sustantivas; se mantuvo la equivalencia óptima y la lectura de רָעָה como calamidad/jucio, con el nombre divino explicitado como Yahvé en conformidad con las directrices del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino conforme a la terminología base del proyecto.
  - Se eligió «trompeta» por la función de alarma pública del שׁוֹפָר en este contexto.
  - Se usó «calamidad» para רָעָה a fin de evitar una lectura de mal moral.
  - Se conservó la estructura retórica de dos preguntas condicionales con paralelismo claro.
  - Se prefirió un español moderno y digno, sin recurrir a formulaciones arcaizantes.
