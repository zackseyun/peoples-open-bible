  to: Ahora Jeroboam hijo de Nabat, un efraimita[a] de Zeredá—su madre se llamaba Zerúa, una viuda[b]—era siervo de Salomón, y levantó su mano contra el rey[c].
  rationale: Se reubica la nota [a] al término correcto ('efraimita'), que es donde pertenece la alternativa léxica de אֶפְרָתִי. Además, se mejora levemente la naturalidad del español con 'su madre se llamaba' sin cambiar el sentido ni la estructura esencial del versículo. Se conservan las demás decisiones del borrador porque están bien alineadas con el hebreo y con el audit trail inglés.
