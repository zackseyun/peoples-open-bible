  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca el audit trail inglés: conserva la invocación doble a Dios, la expresión «los espíritus de toda carne», el masculino singular «un solo hombre» y la pregunta sobre la ira contra toda la congregación. Sin embargo, «se postraron sobre sus rostros» suena poco natural en español y no preserva tan bien la imagen idiomática como «cayeron rostro en tierra» o «cayeron sobre sus rostros». También la nota a usa «respiración», que en español es menos bíblico y menos natural que «aliento».'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero tiene dos tropiezos de estilo: «sobre sus rostros» después de «se postraron» resulta forzado, y «¡Oh Dios!» introduce un matiz más arcaizante de lo necesario. «Dios» como vocativo simple funciona mejor en español eclesial moderno. El resto es legible y fiel; «te enojarás con toda la congregación» es natural y adecuado.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios», «espíritus», «carne» y «congregación» están bien alineados. No aparece el nombre divino ni otros términos sensibles del glosario. La elección de «hombre» preserva correctamente la decisión de género del POB.
  issues:
  - severity: medium
    issue: «se postraron sobre sus rostros» es una combinación poco natural en español
    rationale: «Postrarse» ya implica echarse por tierra; añadir «sobre sus rostros» suena torpe. Una formulación como «cayeron rostro en tierra» conserva mejor la imagen hebrea y fluye con naturalidad.
  - severity: low
    issue: El vocativo «¡Oh Dios!» es más arcaizante de lo necesario
    rationale: El hebreo solo tiene vocativo directo. En español moderno y digno, «Dios» con dos puntos y comillas transmite bien la apelación sin añadir color arcaizante no exigido por la fuente.
  - severity: low
    issue: La nota alternativa «respiración» no es la mejor opción léxica en español
    rationale: Para רוּחוֹת como alternativa a «espíritus», «aliento» expresa mejor el campo semántico bíblico y suena más natural que «respiración».
  revised_spanish_text: 'Entonces cayeron rostro en tierra y dijeron: «Dios, Dios de los espíritus de toda carne[a], ¿un solo hombre pecará[b], y te enojarás con toda la congregación?»'
  revised_footnotes:
