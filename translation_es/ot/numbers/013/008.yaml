lexical_decisions:
- source_word: לְ/מַטֶּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - para la tribu de
  - perteneciente a la tribu de
  lexicon: HALOT
  rationale: En esta lista de representantes tribales, la preposición לְ con מַטֶּה expresa adscripción u origen dentro de la tribu. En español, 'de la tribu de' reproduce de manera natural esa pertenencia sin volver la frase rígida.
- source_word: אֶפְרָיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Nombre propio tribal; 'Efraín' es la forma castellana habitual y clara. Mantiene la referencia al linaje/tribu sin añadir explicación al cuerpo del texto.
- source_word: הוֹשֵׁעַ
  english_pob_choice: Hoshea
  chosen_spanish: Oseas
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: El nombre hebreo הוֹשֵׁעַ corresponde al mismo personaje que más tarde recibe el nombre Josué. En español, 'Oseas' conserva la transliteración tradicional del nombre antiguo y ayuda a distinguirlo del personaje llamado Josué en su forma posterior; se documenta la relación en nota.
- source_word: בִּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Construcción genealógica directa y natural en español. 'Hijo de' mantiene la concisión del listado hebreo.
- source_word: נוּן
  english_pob_choice: Nun
  chosen_spanish: Nun
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español.
theological_decisions:
- issue: Identificación de Oseas con el posterior Josué
  english_pob_reading: Hoshea is the earlier name of the man later called Joshua.
  chosen_spanish_reading: Oseas es el nombre anterior del hombre que más tarde es llamado Josué.
  alternative_spanish_readings:
  - Oseas, luego llamado Josué.
  - Josué, antes llamado Oseas.
  rationale: El contexto auditado indica que este versículo nombra al personaje antes de su cambio de nombre. Se conserva el nombre aquí tal como aparece en el hebreo y se preserva la continuidad con el relato posterior mediante la nota.
  doctrine_reference: Numbers 13:16
- issue: Distinción entre el nombre propio y la forma española tradicional
  english_pob_reading: '''Hoshea'' is used here to distinguish this figure from the prophet Hosea.'
  chosen_spanish_reading: Se usa 'Oseas' aquí para mantener la forma histórica del nombre y distinguir a este personaje del profeta Oseas, con la relación explicada en nota.
  alternative_spanish_readings:
  - '''Josué'' para evitar toda confusión.'
  - '''Oseas'' solo como variante de Hosea.'
  rationale: En español, 'Oseas' es la forma establecida del nombre semítico relacionado con Hoshea/Hosea. Dado que el versículo no identifica al profeta, la nota evita confusión sin alterar el texto base.
  doctrine_reference: Numbers 13:8; Numbers 13:16
translation_notes:
  revision_awareness: La fuente y el audio-trail en inglés muestran acuerdo alto y no requieren revisiones textuales. La única adaptación principal es la equivalencia española de la fórmula tribal y la elección del nombre propio para mantener claridad y distinción histórica.
  spanish_consistency_notes:
  - Se mantiene 'Efraín' como nombre tribal estándar en español.
  - Se evita 'SEÑOR' u otra sustitución, porque no aparece el Tetragrámaton en este versículo.
  - La frase es apta para una lista genealógica/tribal y conserva el orden breve del hebreo.
  - La nota b usa una distinción de nombres en español alineada con la preocupación del inglés por evitar confusión con el profeta Oseas.
