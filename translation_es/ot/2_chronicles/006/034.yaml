base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/006/034.yaml
  text: If your people go out to battle against their enemies by the way that you send them[a], and they pray to you toward this city that you have chosen and the house that I have built for your name[b],
  footnotes:
