translation:
  language: es
  text: Porque has ocultado su corazón[a] del entendimiento; por eso no los exaltarás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mente» o «su interior»; en hebreo, «corazón» suele referirse a la sede del pensamiento y del discernimiento, no solo a la emoción.
    reason: lexical_alternative
  - marker: b
    text: O «no los levantarás» o «no los harás triunfar».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base lógica de la afirmación siguiente. En español, «Porque» conserva bien el valor explicativo/causal del hebreo y encaja naturalmente en el discurso poético.
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: El hebreo «corazón» puede designar la sede del pensamiento y del discernimiento, no solo la emoción. En español, «corazón» mantiene la imagen y la amplitud semántica; el posesivo singular concuerda de forma natural con el hebreo con sufijo plural.
- source_word: צָפַנְתָּ
  english_pob_choice: you have hidden
  chosen_spanish: has escondido
  alternatives_spanish:
  - has ocultado
  - has guardado
  lexicon: HALOT
  rationale: El verbo comunica una acción divina de esconder o poner fuera de alcance. «Has escondido» es idiomático en español y conserva el sentido perfecto del hebreo.
- source_word: מִּ/שָּׂכֶל
  english_pob_choice: from understanding
  chosen_spanish: de la comprensión
  alternatives_spanish:
  - del entendimiento
  - de la prudencia
  - de la inteligencia
  lexicon: HALOT
  rationale: 'La preposición marca separación: el corazón queda apartado de la capacidad de entender. «Comprensión» expresa bien esa facultad de discernimiento en un español claro y reverente.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: Conecta la causa con la consecuencia de manera natural en español poético y conserva la fuerza inferencial del hebreo.
- source_word: לֹא תְרֹמֵם
  english_pob_choice: you will not exalt them
  chosen_spanish: no los exaltarás
  alternatives_spanish:
  - no los levantarás
  - no los harás triunfar
  lexicon: HALOT
  rationale: «Exaltar» preserva la imagen verbal de elevar y encaja con el paralelo de la cláusula final. La forma negativa futura mantiene el valor prospectivo del hebreo.
theological_decisions:
- issue: A quién se refiere el sufijo plural en «su corazón» y el pronombre «los»
  english_pob_reading: Job se dirige a Dios y habla de sus adversarios u otros que quedan privados de entendimiento; la traducción mantiene la referencia sin especificarla.
  chosen_spanish_reading: 'El texto deja la referencia en plural indefinido: «su corazón» / «los», sin identificar más al grupo.'
  alternative_spanish_readings:
  - sus corazones
  - a ellos
  - a tus adversarios
  rationale: El hebreo conserva un plural pronominal sin precisar el grupo. En español, mantener la indeterminación evita introducir una identificación no exigida por el texto.
  doctrine_reference: Respeto al alcance referencial del pronombre en poesía hebrea; no expansión interpretativa.
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto en el contexto auditado; no se registraron revisiones sustantivas en la fuente inglesa. La traducción española sigue la lectura principal y preserva las alternativas léxicas documentadas donde el hebreo permite varias opciones.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב/לֵבָב con la amplitud semántica bíblica habitual.
  - Se evita convertir el verbo final en una explicación interpretativa; se conserva la imagen de exaltar/elevar.
  - La referencia pronominal permanece abierta, en línea con el audit trail inglés.
  - La puntuación refleja el paralelismo poético y la relación causal del verso.
