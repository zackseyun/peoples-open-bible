review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: marco temporal prolongado, reposo dado por Yahvé, y descripción de la vejez de Josué. Conserva correctamente «Yahvé» para יְהוָה y refleja el modismo final con nota. Sin embargo, dos elecciones españolas no son las más fieles ni naturales: «alrededor de ellos» suena calcado y poco idiomático en español bíblico natural, y «estaba viejo» resulta tosco y menos adecuado que «era viejo» o «ya era anciano» para זָקֵן en este contexto.'
  spanish_quality_summary: La redacción es en general clara, pero necesita pulido para sonar natural y digna en español eclesial amplio. «De todos sus enemigos de alrededor» o «de todos sus enemigos que los rodeaban» expresa mejor מִסָּבִיב que «alrededor de ellos». Además, «era viejo» es más idiomático y respetuoso que «estaba viejo», especialmente junto a «avanzado en años».
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה → «Yahvé» está correcto; no hay conflictos relevantes con otros términos doctrinales. «Reposo» para הֵנִיחַ es aceptable y concorde con la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «alrededor de ellos» es un calco poco natural para מִסָּבִיב
    rationale: El hebreo expresa enemigos circundantes/on every side. En español, «de todos sus enemigos de alrededor» o «que los rodeaban» comunica mejor la idea sin sonar literalista.
  - severity: medium
    issue: «estaba viejo» suena tosco y menos apropiado para זָקֵן
    rationale: En este contexto narrativo de edad avanzada, «era viejo» o «ya era anciano» es más natural y digno. Como además sigue «avanzado en años», conviene evitar una formulación áspera.
  - severity: low
    issue: La nota [b] podría reflejar con más precisión el modismo completo
    rationale: El inglés auditado aclara «advanced in years» literalmente «come into days». La nota española actual «venido en días» es comprensible, pero «había entrado en días» o «había venido a días» podría sonar más idiomática. No es un error grave.
  revised_spanish_text: Y aconteció[a], después de muchos días, después de que Yahvé hubiera dado reposo a Israel de todos sus enemigos de alrededor, que Josué era viejo[b], avanzado en años.
  revised_footnotes:
  - marker: a
    text: O «después de un largo tiempo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: literalmente, «venido en días».'
    reason: cultural_note
  revision_rationale: 'Se ajusta la redacción para mejorar fidelidad idiomática al hebreo y naturalidad en español: «de alrededor» comunica mejor la idea de enemigos circundantes, y «era viejo» expresa la condición de edad de Josué con tono más natural y digno que «estaba viejo». Se conservan la estructura, el nombre divino «Yahvé» y las notas ya justificadas en la auditoría.'
