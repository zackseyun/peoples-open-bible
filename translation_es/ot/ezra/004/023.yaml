translation:
  language: es
  text: Entonces, tan pronto como se leyó ante Rehum, Simsai el escriba y sus asociados la copia de la carta del rey Artajerjes, fueron de prisa a Jerusalén, a los judíos[a], y los hicieron detenerse por la fuerza y el poder[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra los judíos»; la preposición aramea puede llevar un sentido hostil, reflejado por la acción siguiente de hacer cesar la obra.
    reason: lexical_alternative
  - marker: b
    text: O «los hicieron detenerse con fuerza y poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  lexicon: HALOT
  rationale: Marca el avance narrativo. «Entonces» es natural en español y conserva la secuencia temporal sin añadir interpretación.
- source_word: פַּרְשֶׁגֶן נִשְׁתְּוָנָא
  english_pob_choice: the copy of the letter
  chosen_spanish: la copia de la carta
  alternatives_spanish:
  - la copia del documento
  - el texto de la carta
  lexicon: HALOT
  rationale: פַּרְשֶׁגֶן expresa una copia o transcript; נִשְׁתְּוָנָא es una comunicación escrita oficial. «La copia de la carta» conserva el valor documental sin volverlo más técnico de lo que exige el hebreo/aramaico.
- source_word: קֱרִי קֳדָם
  english_pob_choice: was read before
  chosen_spanish: se leyó delante de
  alternatives_spanish:
  - fue leída en presencia de
  - se leyó ante
  lexicon: HALOT
  rationale: «Delante de» reproduce bien el sentido espacial de קֳדָם en un registro idiomático. El impersonal refleja la pasiva del contexto sin forzar el sujeto.
- source_word: רְחוּם וְשִׁמְשַׁי סָפְרָא וּכְנָוָתְהוֹן
  english_pob_choice: Rehum and Shimshai the scribe and their associates
  chosen_spanish: Rehum y de Simsai, el escriba, y de sus asociados
  alternatives_spanish:
  - Rehum y Simsai, el secretario, y sus compañeros
  - Rehum y Simsai, el escriba, y sus compañeros
  lexicon: HALOT
  rationale: Se conservan los nombres propios transliterados. «Simsai» sigue la forma española usual del nombre; «escriba» mantiene la función del oficio. «Asociados» traduce כְנָוָתְהוֹן con un término claro y neutro.
- source_word: אֲזַלוּ בִבְהִילוּ
  english_pob_choice: they went in haste
  chosen_spanish: fueron de prisa
  alternatives_spanish:
  - se apresuraron
  - fueron rápidamente
  lexicon: HALOT
  rationale: La combinación verbal con el sustantivo de urgencia pide un giro natural. «Fueron de prisa» conserva movimiento y prisa sin perder sobriedad.
- source_word: עַל יְהוּדָיֵא
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - contra los judíos
  - sobre los judíos
  lexicon: HALOT
  rationale: Aunque עַל puede tener matiz hostil, en español la hostilidad queda clara por la acción siguiente. «A los judíos» evita sobrecargar la preposición y deja que el contexto aporte el matiz adversativo.
- source_word: וּבַטִּלוּ הִמּוֹ
  english_pob_choice: made them stop
  chosen_spanish: los hicieron cesar
  alternatives_spanish:
  - los detuvieron
  - los obligaron a parar
  lexicon: HALOT
  rationale: El causativo exige un verbo que exprese que otros provocaron la cesación. «Hicieron cesar» conserva la fuerza causal y el tono bíblico sin sonar arcaico.
- source_word: בְּאֶדְרָע וְחָיִל
  english_pob_choice: by force and power
  chosen_spanish: por la fuerza y el poder
  alternatives_spanish:
  - con fuerza y poder
  - mediante fuerza y poder
  lexicon: HALOT
  rationale: "La expresión señala compulsi\0f3n coercitiva. «Por la fuerza y el poder» comunica bien el medio y la coerción; «poder» mantiene el segundo miembro del par léxico."
theological_decisions:
- issue: Matiz hostil de עַל יְהוּדָיֵא
  english_pob_reading: to the Jews, with hostile force implied by the following action
  chosen_spanish_reading: a los judíos, con hostilidad implícita en la acción de hacerlos cesar
  alternative_spanish_readings:
  - contra los judíos
  - sobre los judíos
  rationale: La preposición aramea puede ser hostil, pero el sentido se completa por el verbo siguiente. Mantener «a los judíos» evita fijar prematuramente una relación preposicional que en español puede sonar menos natural, sin borrar la tensión del contexto narrativo.
  doctrine_reference: Narrative context and lexical force of Aramaic preposition; no doctrinal issue.
- issue: Fuerza del causativo וּבַטִּלוּ הִמּוֹ
  english_pob_reading: made them stop
  chosen_spanish_reading: los hicieron cesar
  alternative_spanish_readings:
  - los detuvieron
  - causaron que cesaran
  rationale: El texto no describe mera interrupción espontánea sino imposición externa. «Los hicieron cesar» conserva la causalidad y evita suavizar la coerción.
  doctrine_reference: Lexical causative force in the Aramaic verb; no doctrinal issue.
translation_notes:
  revision_awareness: 'La versión actual coincide con la evaluación de alta concordancia: se mantuvo la estructura narrativa y las decisiones léxicas principales del registro inglés auditado, sin revisiones pendientes.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «escriba» para סָפְרָא, en consonancia con el expediente inglés y con el registro bíblico español.
  - Se tradujo el par coercitivo final con una construcción que preserve la fuerza legal y narrativa del hebreo/aramaico.
  - 'La puntuación y el orden siguen el flujo del original: adverbio temporal, lectura del documento, desplazamiento urgente, acción coercitiva final.'
