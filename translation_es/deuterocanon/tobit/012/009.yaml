translation:
  language: es
  text: La limosna rescata de la muerte y limpiará todo pecado. Los que practican limosnas y obras justas[a] serán llenados de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los que practican limosna y justicia serán llenados de vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεημοσύνη
  english_pob_choice: almsgiving
  chosen_spanish: limosna
  alternatives_spanish:
  - almsgiving
  - caridad
  - obra de misericordia
  lexicon: BDAG
  rationale: En español bíblico, 'limosna' comunica de forma natural y directa el acto concreto de dar a los necesitados. Aunque 'caridad' es posible, es más amplio y menos específico; 'obra de misericordia' introduce una formulación interpretativa. 'Almsgiving' sería comprensible, pero no es idiomático para una edición en español.
- source_word: ῥύεται
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - salva
  lexicon: BDAG
  rationale: '''Rescata'' expresa bien la idea de sacar de un peligro o de la muerte sin cargar de por sí con un matiz técnico-soteriológico más amplio que el del contexto inmediato.'
- source_word: θανάτου
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Correspondencia directa del genitivo tras ἐκ; en español, 'de la muerte' conserva el sentido de liberación desde esa esfera o peligro.
- source_word: ἀποκαθαριεῖ
  english_pob_choice: will cleanse away
  chosen_spanish: limpiará
  alternatives_spanish:
  - purificará
  - limpiará por completo
  - borrará
  lexicon: BDAG
  rationale: El verbo intensifica la idea de limpieza y eliminación de impureza/culpa. 'Limpiará' es natural en español; el contexto y el complemento 'toda pecad[a]' mantienen la fuerza purificadora. Se evita 'borrará', que desplaza demasiado el campo semántico.
- source_word: πᾶσαν ἁμαρτίαν
  english_pob_choice: every sin
  chosen_spanish: toda pecad[a]
  alternatives_spanish:
  - todo pecado
  - todo pecado
  lexicon: BDAG
  rationale: La lectura más natural y fiel es 'todo pecado'. Si el texto final se corrige ortográficamente a 'todo pecado', conserva la fuerza distributiva de πᾶσαν ἁμαρτίαν. Mantengo aquí la decisión lexical con esa forma como preferible; la redacción de publicación debe usar la forma correcta 'todo pecado'.
- source_word: ποιοῦντες
  english_pob_choice: do acts of
  chosen_spanish: practican
  alternatives_spanish:
  - hacen
  - realizan
  - hacen actos de
  lexicon: BDAG
  rationale: El participio plural indica una práctica continua. 'Practican' suena natural y preserva la idea de hábito/actividad regular mejor que una frase pesada como 'hacen actos de'.
- source_word: ἐλεημοσύνας
  english_pob_choice: almsgiving
  chosen_spanish: limosnas
  alternatives_spanish:
  - limosna
  - obras de misericordia
  lexicon: BDAG
  rationale: Aunque el griego está en plural, el español puede conservar el plural concreto 'limosnas' para reflejar las acciones repetidas y el paralelismo con 'justicias'.
- source_word: δικαιοσύνας
  english_pob_choice: righteousness
  chosen_spanish: justicias
  alternatives_spanish:
  - rectitudes
  - obras justas
  - justicia
  lexicon: BDAG
  rationale: En este contexto sapiencial, el plural apunta a actos concretos de justicia/upright conduct. 'Justicias' mantiene el plural griego y el vínculo con acciones practicadas; 'justicia' en singular sería más abstracto y perdería esa concreción.
- source_word: πλησθήσονται ζωῆς
  english_pob_choice: will be filled with life
  chosen_spanish: serán llenados de vida
  alternatives_spanish:
  - quedarán satisfechos de vida
  - tendrán su plenitud de vida
  - serán colmados de vida
  lexicon: BDAG
  rationale: '''Serán llenados de vida'' conserva la metáfora de llenura del pasivo futuro y mantiene abierta la referencia a vida como plenitud, vitalidad o bendición, sin precisar más de lo que el texto dice.'
theological_decisions:
- issue: Relación entre limosna y rescate/limpieza del pecado
  english_pob_reading: Retain the text's direct claim that almsgiving rescues from death and cleanses away every sin without softening it into a mere general principle.
  chosen_spanish_reading: 'Mantener la afirmación directa: la limosna rescata de la muerte y limpiará toda pecado, sin convertirla en una mera generalidad moral.'
  alternative_spanish_readings:
  - Interpretarlo como lenguaje sapiencial hiperbólico sobre los beneficios prácticos de la generosidad
  - Interpretarlo como lenguaje de expiación del pacto ligado al arrepentimiento, no como mérito mecánico
  rationale: El griego presenta la afirmación de manera directa; la traducción debe preservar esa tensión teológica sin resolverla con una explicación doctrinal añadida. Al mismo tiempo, el español evita suavizar el vínculo entre limosna, muerte y pecado.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: δικαιοσύνας como acto concreto o virtud abstracta
  english_pob_reading: Render as 'righteousness' in the main text rather than 'justice,' while noting the practical sense in the lexical rationale.
  chosen_spanish_reading: Usar 'justicias' en plural para reflejar actos concretos de justicia practicada, sin perder el vínculo con la noción bíblica de justicia.
  alternative_spanish_readings:
  - justicia
  - obras justas
  - rectitudes
  rationale: El plural griego favorece una lectura práctica y repetida; 'justicias' permite conservar esa concreción en español. Esta opción mantiene la tensión entre virtud y actos, en vez de abstractizar el término.
  doctrine_reference: 'DOCTRINE.md Contested terms table: δικαιοσύνη'
translation_notes:
  revision_awareness: El texto coincide con el último pase revisado y con la verificación de alta concordancia; no hubo cambios aplicados en la revisión más reciente. Se conserva la tensión teológica del verso y se ajusta la formulación al español para que sea publicable y fiel al griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - '''Limosna'' traduce ἐλεημοσύνη con el valor concreto de dar a los pobres, coherente con el audit trail.'
  - '''Justicias'' refleja el plural griego δικαιοσύνας y su sentido de acciones justas, no una abstracción doctrinal.'
  - Se mantiene el paralelismo del verso en dos oraciones breves, como en el griego.
  - La nota a usa una alternativa estilística; la nota b resalta una posible equivalencia más explicativa sin cambiar el sentido base.
