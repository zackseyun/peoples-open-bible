review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del griego: apertura de la puerta oculta, lanzamiento de piedras, caída violenta del ἡγεμών, desmembramiento y lanzamiento de las cabezas a los de afuera. También preserva correctamente la incertidumbre léxica de φατίνωμα mediante nota. Sin embargo, la nota [b] está anclada en la frase equivocada: la dificultad léxica documentada en la auditoría inglesa pertenece a συνεκεραύνωσαν (''derribaron/fulminaron''), no a μέλη ποιήσαντες (''hacerlo pedazos'').'
  spanish_quality_summary: El español es claro y legible, pero requiere un ajuste menor para alinear notas y mejorar el registro. «Cámara de humo» funciona. «A los de afuera» es entendible, aunque «a los que estaban afuera» suena un poco más natural y digno. «Jefe» es comprensible, pero «líder» encaja mejor con el valor amplio de ἡγεμών y evita un matiz demasiado coloquial. La sintaxis general está bien.
  glossary_alignment: No hay términos teológicos del glosario mayor en juego aquí. La decisión sobre συνεκεραύνωσαν debe conservar la tensión léxica sin afirmar un rayo literal; eso se logra mejor manteniendo «derribaron» en el texto y trasladando la observación de imaginería de rayo a una nota sobre ese verbo. El plural «las cabezas» se preserva correctamente.
  issues:
  - severity: high
    issue: La nota [b] está aplicada a «después de hacerlo pedazos» en vez de al verbo «derribaron».
    rationale: La auditoría inglesa documenta la dificultad léxica y la imaginería de trueno/rayo para συνεκεραύνωσαν, no para μέλη ποιήσαντες. La nota actual altera la justificación léxica y desinforma sobre qué elemento del griego es incierto o marcado.
  - severity: medium
    issue: «al jefe» suena más coloquial y menos preciso que «al líder».
    rationale: ἡγεμών aquí se dejó deliberadamente amplio en la auditoría inglesa como 'leader'. «Jefe» puede funcionar, pero en español bíblico legible «líder» preserva mejor la amplitud sin matiz administrativo ni tono demasiado informal.
  - severity: low
    issue: «a los de afuera» es correcto, pero algo menos natural que «a los que estaban afuera».
    rationale: El dativo personal τοῖς ἔξω se comunica con más claridad en español mediante una relativa personal, manteniendo que se trata de personas y no solo de ubicación.
  revised_spanish_text: Después de abrir la puerta oculta de la cámara de humo[a], arrojaron piedras y derribaron[b] al líder; y, después de hacerlo pedazos, lanzaron las cabezas a los que estaban afuera.
