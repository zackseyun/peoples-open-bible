translation:
  language: es
  text: además de sus esclavos y esclavas[a], de los cuales había 7.337; y tenían 245 cantores, hombres y mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos y siervas». El hebreo puede traducirse de forma más general, pero en este contexto censal probablemente se refiere a esclavos y esclavas vinculados a los hogares.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además
  lexicon: HALOT
  rationale: La construcción introduce una suma o adición respecto del total anterior. «Además de» reproduce de forma natural ese valor aditivo en español, sin perder el matiz de excepción/añadidura.
- source_word: עַבְדֵיהֶם
  english_pob_choice: their male slaves
  chosen_spanish: sus esclavos varones
  alternatives_spanish:
  - sus siervos varones
  - sus servidores varones
  lexicon: HALOT
  rationale: En este contexto censal y en pareja con el femenino explícito, «esclavos» refleja mejor la condición social y jurídica que «siervos». «Varones» conserva la distinción de género que el español necesita explicitar para no perder la correspondencia con el término femenino siguiente.
- source_word: אַמְהֹתֵיהֶם
  english_pob_choice: their female slaves
  chosen_spanish: sus esclavas
  alternatives_spanish:
  - sus siervas
  - sus criadas
  lexicon: HALOT
  rationale: אָמָה puede abarcar «esclava» / «criada», pero aquí el paralelismo con עַבְדֵיהֶם y el recuento patrimonial favorecen «esclavas». El español no necesita añadir «mujeres» porque el femenino plural ya marca el género.
- source_word: אֵלֶּה
  english_pob_choice: of whom there were
  chosen_spanish: que eran
  alternatives_spanish:
  - de los cuales había
  - estos eran
  lexicon: HALOT
  rationale: El hebreo usa un demostrativo que introduce la cifra. «Que eran» funciona de modo natural en un listado numérico español y mantiene la relación explicativa con el total sin sobreinterpretar el sintagma.
- source_word: שִׁבְעַת אֲלָפִים שְׁלֹשׁ מֵאוֹת שְׁלֹשִׁים וְשִׁבְעָה
  english_pob_choice: 7,337
  chosen_spanish: '7.337'
  alternatives_spanish:
  - siete mil trescientos treinta y siete
  lexicon: HALOT
  rationale: Se conserva la cifra exacta en formato numérico propio del español (separador de miles con punto).
- source_word: וְלָהֶם
  english_pob_choice: and they had
  chosen_spanish: y tenían
  alternatives_spanish:
  - y les pertenecían
  - y había para ellos
  lexicon: HALOT
  rationale: La posesión se expresa de manera idiomática con «tenían», que en español suena natural en un inventario. Mantiene la idea de pertenencia sin forzar una estructura demasiado literal.
- source_word: מְשֹׁרֲרִים וּמְשֹׁרֲרוֹת
  english_pob_choice: male and female singers
  chosen_spanish: cantores y cantoras
  alternatives_spanish:
  - cantores y mujeres que cantaban
  - cantantes varones y cantantes mujeres
  lexicon: HALOT
  rationale: «Cantores y cantoras» preserva la distinción masculina/femenina del participio hebreo y resulta claro y digno en español bíblico contemporáneo. Se evita «cantantes» por su asociación más general y menos marcada de género.
- source_word: מָאתַיִם וְאַרְבָּעִים וַחֲמִשָּׁה
  english_pob_choice: '245'
  chosen_spanish: '245'
  alternatives_spanish:
  - doscientos cuarenta y cinco
  lexicon: HALOT
  rationale: Se mantiene la cifra en formato numeral, como en el registro censal, sin alterar el valor.
theological_decisions:
- issue: Estatuto social de עַבְדֵיהֶם / אַמְהֹתֵיהֶם
  english_pob_reading: male and female slaves
  chosen_spanish_reading: esclavos varones y esclavas
  alternative_spanish_readings:
  - siervos y siervas
  - sirvientes y sirvientas
  rationale: La POB inglesa eligió «slaves» por el contexto de inventario/censo y por el paralelismo con el femenino. En español, «esclavos» transmite con más precisión la relación de dependencia que «siervos», que suavizaría indebidamente el término.
  doctrine_reference: Lexical/theological note on slavery terminology in biblical census contexts
- issue: Función de la lista numérica en el versículo
  english_pob_reading: of whom there were ... and they had ...
  chosen_spanish_reading: que eran ... y tenían ...
  alternative_spanish_readings:
  - de los cuales había ... y había para ellos ...
  - estos eran ... y para ellos había ...
  rationale: El versículo es un registro censal, no una afirmación doctrinal. La formulación española debe conservar su carácter contable y no convertir la lista en una paráfrasis interpretativa.
  doctrine_reference: Narrative/census register genre fidelity
