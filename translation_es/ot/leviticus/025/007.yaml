translation:
  language: es
  text: Y para tu ganado[a], y para los animales salvajes que están en tu tierra, todo su producto será para alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo su producto será para comer». Más literalmente, «todo su producto será para alimento/comer»; el hebreo expresa que todo su producto es para ser comido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְהֶמְתְּךָ
  english_pob_choice: for your livestock
  chosen_spanish: para tu ganado
  alternatives_spanish:
  - para tus animales domésticos
  - para tu ganado mayor
  lexicon: HALOT
  rationale: בְּהֵמָה designa aquí animales domesticados y poseídos por el destinatario. «Ganado» es natural en español bíblico y moderno, y mantiene el contraste con los animales salvajes mejor que una forma más general como «animales».
- source_word: לַחַיָּה
  english_pob_choice: for the wild animals
  chosen_spanish: para los animales salvajes
  alternatives_spanish:
  - para las fieras
  - para la fauna silvestre
  lexicon: HALOT
  rationale: חַיָּה se contrasta con el ganado doméstico y refiere animales no domesticados. «Animales salvajes» es claro, concreto y evita el tono arcaico de «fieras».
- source_word: אֲשֶׁר בְּאַרְצֶךָ
  english_pob_choice: that are in your land
  chosen_spanish: que están en tu tierra
  alternatives_spanish:
  - que están en tu país
  - que están en tu suelo
  lexicon: HALOT
  rationale: «Tierra» conserva el valor concreto y agrícola de אֶרֶץ y encaja mejor con el contexto de la legislación sabática que «país».
- source_word: תִּהְיֶה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - habrá de ser
  - quedará
  lexicon: HALOT
  rationale: En este marco legal, el verbo expresa disposición o destino del producto. «Será» transmite esa asignación de forma natural en español.
- source_word: כָל תְּבוּאָתָהּ
  english_pob_choice: all its produce
  chosen_spanish: todo su producto
  alternatives_spanish:
  - toda su producción
  - todo su rendimiento
  lexicon: HALOT
  rationale: תְּבוּאָה alude al fruto o rendimiento de la tierra. «Producto» reproduce bien la idea de producción agrícola sin estrecharla demasiado.
- source_word: לֶאֱכֹל
  english_pob_choice: for food
  chosen_spanish: para comer
  alternatives_spanish:
  - para alimento
  - como alimento
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para comer» conserva la literalidad del hebreo y deja visible la conexión con la nota léxica sobre el uso alimentario del producto.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la lectura auditada en inglés (alta concordancia, sin revisiones aplicadas). La redacción española sigue el mismo sentido: asignación del producto de la tierra al consumo de ganado y animales salvajes dentro del contexto sabático.'
  spanish_consistency_notes:
  - Se mantiene «tierra» para אֶרֶץ por coherencia con el registro bíblico-agrolegal.
  - Se evita «SEÑOR» o equivalentes porque no aparece el Tetragrámaton en este versículo.
  - «Ganado» y «animales salvajes» conservan la oposición doméstico/no domesticado documentada en el audit trail.
  - La nota [a] preserva la tensión entre una traducción natural («para comer») y la literalidad del hebreo («para comer/para ser comido» en sentido funcional).
