translation:
  language: es
  text: Para el director del coro[a]. Salmo de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al director del coro».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de David»; esto puede indicar autoría, asociación o dedicación, y también podría traducirse «por David» o «para David».'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de canto
  lexicon: HALOT
  rationale: La forma hebrea introduce una indicación superscriptiva dirigida al responsable musical. En español, «director del coro» comunica bien la función sin sonar excesivamente técnico ni arcaico. «Para» conserva el valor de dedicación o dirección implícito en la ל prefijada, como en la decisión inglesa de mantener «For».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: El término es el rótulo genérico estándar del encabezado. En español, «Salmo» es la forma más natural y reconocible; el artículo indefinido puede omitirse en encabezamientos para un estilo bíblico fluido.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: 'El ל con nombre propio en los encabezados salmódicos admite varias relaciones: autoría, asociación o dedicación. «De David» preserva esa amplitud sin decidir de más, siguiendo la misma cautela que la POB inglesa al usar «of David».'
theological_decisions:
- issue: Relación exacta de David con el salmo en el encabezado
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a una sola interpretación. Mantener «de David» conserva la tensión/ambigüedad entre autoría, pertenencia o dedicación, en lugar de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La auditoría inglesa indica una corrección reciente: la nota sobre «of David» debe ir al final de la cláusula correspondiente, no unida a «choirmaster». La disposición española sigue ese criterio colocando [b] en «David».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el hebreo no contiene el nombre divino en este versículo.
  - «Salmo» se mantiene como rótulo de género, no como verbo o sustantivo libre.
  - El encabezado se formula de manera breve y publicable, acorde con el estilo de las superscripciones bíblicas.
