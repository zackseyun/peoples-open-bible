revisions:
- from: Entonces el sacerdote tomará madera de cedro[a], hisopo y escarlata, y los echará dentro del fuego del becerro.[b]
  to: Entonces el sacerdote tomará madera de cedro, hisopo e hilo escarlata, y los echará en medio de la quema de la vaca.[a]
  rationale: Se corrige el referente animal a femenino («vaca») para reflejar פָּרָה y alinearse con la decisión inglesa principal; se preserva la alternativa tradicional en una nota. Se reemplaza «el fuego» por «la quema» para mantener el sustantivo de proceso שְׂרֵפָה. Se explicita וּשְׁנִי תוֹלָעַת como «hilo escarlata», más preciso y natural en español. También se recoloca la nota en el punto textual relevante.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:29:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador no preserva fielmente varios elementos clave del hebreo ni del rastro de auditoría en inglés. עֵץ אֶרֶז y אֵזוֹב están bien como «madera de cedro» e «hisopo», pero וּשְׁנִי תוֹלָעַת queda demasiado reducido en «escarlata», perdiendo el sentido de material/hilo. Además, שְׂרֵפַת הַפָּרָה significa «la quema / combustión de la vaca», no «el fuego del becerro»; aquí se alteran tanto el proceso nominal («quema», no solo «fuego») como el sexo del animal (פָּרָה es hembra, no «becerro»).
  spanish_quality_summary: 'El español es fluido, pero contiene decisiones léxicas inexactas y una colocación de notas defectuosa: la nota [a] está anclada en «cedro» aunque habla de פָּרָה / «heifer», por lo que el anclaje no corresponde. «Escarlata» sin sustantivo suena elíptico y menos claro en una enumeración de objetos rituales; «hilo escarlata» o similar mejora la legibilidad y la precisión.'
  glossary_alignment: 'No hay conflicto con los términos troncales del glosario, pero sí con la racionalidad documentada: el inglés POB eligió «cow» con nota sobre «heifer», por lo que en español debe mantenerse un femenino bovino claro, idealmente «vaca» con nota sobre «becerra/novilla», no un masculino como «becerro». También debe conservarse la fuerza de שְׂרֵפָה como proceso de quema.'
  issues:
  - severity: high
    issue: «becerro» traduce incorrectamente פָּרָה
    rationale: El sustantivo hebreo es femenino (‘vaca/hembra bovina’, tradicionalmente ‘becerra/novilla’), mientras que «becerro» es masculino y cambia el referente.
  - severity: high
    issue: «el fuego del becerro» no refleja שְׂרֵפַת הַפָּרָה
    rationale: שְׂרֵפָה es ‘quema/combustión/burning’, no meramente ‘fuego’. La traducción actual reduce el proceso al fuego y además arrastra el error de sexo del animal.
  - severity: medium
    issue: «escarlata» solo es insuficiente para וּשְׁנִי תוֹלָעַת
    rationale: La expresión denota material teñido de escarlata; en español una forma desnuda como «escarlata» queda ambigua en una lista de objetos. «Hilo escarlata» conserva mejor el valor ritual y la inteligibilidad.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota trata sobre la alternativa de פָּרָה (‘heifer’), pero aparece sobre «cedro». Debe anclarse donde aparece «vaca» o la frase correspondiente.
  revised_spanish_text: Entonces el sacerdote tomará madera de cedro, hisopo e hilo escarlata, y los echará en medio de la quema de la vaca.[a]
  revised_footnotes:
  - marker: a
    text: O «la quema de la becerra». La tradición inglesa suele traducir פָּרָה aquí como «heifer».
    reason: alternative_reading
  revision_rationale: Se corrige el referente animal a femenino («vaca») para reflejar פָּרָה y alinearse con la decisión inglesa principal; se preserva la alternativa tradicional en una nota. Se reemplaza «el fuego» por «la quema» para mantener el sustantivo de proceso שְׂרֵפָה. Se explicita וּשְׁנִי תוֹלָעַת como «hilo escarlata», más preciso y natural en español. También se recoloca la nota en el punto textual relevante.
