translation:
  language: es
  text: 'Moisés dijo: «Esto es lo que Yahvé ha mandado: “Que se guarde un omer completo[a] de ello por todas sus generaciones, a fin de que vean el pan con que los alimenté en el desierto, cuando los saqué de la tierra de Egipto”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “un omer completo”; es decir, una medida llena de un omer.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה
  english_pob_choice: And Moses said
  chosen_spanish: Moisés dijo
  alternatives_spanish:
  - Entonces Moisés dijo
  - Y Moisés dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo introduce discurso directo; en español, “Moisés dijo” fluye con naturalidad y conserva la función narrativa sin añadir una conjunción innecesaria.
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the thing
  chosen_spanish: Esta es la palabra
  alternatives_spanish:
  - Esta es la cosa
  - Esta es la cosa/materia
  lexicon: HALOT
  rationale: דָּבָר puede ser “palabra”, “asunto” o “cosa”. Aquí introduce una instrucción verbal concreta; “palabra” comunica bien el contenido mandado y es más natural en español bíblico que “cosa”. Se conserva la referencia a una declaración específica sin volverla abstracta.
- source_word: אֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: that Yahweh has commanded
  chosen_spanish: que Yahvé ha mandado
  alternatives_spanish:
  - que Yahvé mandó
  - que Yahvé ordenó
  lexicon: HALOT
  rationale: Se mantiene el nombre divino “Yahvé” según la norma del proyecto. “Ha mandado” refleja bien el valor de un mandato vigente; “mandó” y “ordenó” son posibles, pero el presente perfecto conserva mejor la fuerza continua del encargo.
- source_word: מְלֹא הָעֹמֶר
  english_pob_choice: a full omer
  chosen_spanish: un omer completo
  alternatives_spanish:
  - una medida completa de un omer
  - un omer lleno
  lexicon: HALOT
  rationale: מְלֹא expresa plenitud/cantidad completa. Se conserva la unidad antigua “omer” y se añade “completo” para evitar una equivalencia mecánica. No se convierte la medida a unidades modernas porque el texto mantiene el término cultural original.
- source_word: מִמֶּנּוּ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  - de ella
  lexicon: HALOT
  rationale: El antecedente es el maná mencionado en contexto. “De ello” evita marcar género innecesario y funciona bien en español neutral; “de eso” también sería posible, pero “de ello” suena más sobrio y bíblico.
- source_word: לְ/מִשְׁמֶרֶת
  english_pob_choice: be kept
  chosen_spanish: que se guarde
  alternatives_spanish:
  - que se conserve
  - para ser guardado
  lexicon: HALOT
  rationale: El término denota algo preservado/puesto bajo custodia. En español, una construcción impersonal verbal expresa mejor el mandato que un sustantivo abstracto. “Guardar” comunica preservación con suficiente fuerza sin añadir interpretación.
- source_word: לְ/דֹרֹתֵי/כֶם
  english_pob_choice: throughout your generations
  chosen_spanish: para vuestras generaciones
  alternatives_spanish:
  - por vuestras generaciones
  - a lo largo de vuestras generaciones
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo de continuidad generacional. “Para vuestras generaciones” es natural, claro y suficientemente cercano al original; “a lo largo de” suena más pesado sin aportar precisión adicional.
- source_word: לְמַעַן יִרְאוּ
  english_pob_choice: so that they may see
  chosen_spanish: a fin de que vean
  alternatives_spanish:
  - para que vean
  - de modo que vean
  lexicon: HALOT
  rationale: Se mantiene la cláusula de propósito. “A fin de que” da un tono digno y preciso; el sujeto implícito queda igual que en inglés y hebreo, referido a las generaciones futuras.
- source_word: הַלֶּחֶם
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - la comida
  lexicon: HALOT
  rationale: Aunque alude al maná, לֶחֶם es literalmente “pan”. “Pan” preserva el vocabulario del texto y su resonancia bíblica mejor que una generalización a “alimento”.
- source_word: אֲשֶׁר הֶאֱכַלְתִּי אֶתְכֶם
  english_pob_choice: with which I fed you
  chosen_spanish: con que los alimenté
  alternatives_spanish:
  - con el que los alimenté
  - que les di de comer
  lexicon: HALOT
  rationale: 'El hiphil de אכל tiene fuerza causativa: “hacer comer / alimentar”. “Alimenté” expresa bien la acción divina de provisión. Se eligió “los” para concordar con el destino del discurso en español, sin cambiar el referente colectivo.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/arenal
  - en la región desierta
  lexicon: HALOT
  rationale: Aunque “wilderness” suele corresponder a מִדְבָּר, en español “desierto” es la traducción más natural y clara. Se conserva el contexto del éxodo sin forzar un hebraísmo innecesario.
- source_word: בְּהוֹצִיאִי אֶתְכֶם
  english_pob_choice: when I brought you out
  chosen_spanish: cuando los saqué
  alternatives_spanish:
  - cuando los hice salir
  - al sacarlos
  lexicon: HALOT
  rationale: El infinitivo con ב marca circunstancia temporal. “Cuando los saqué” transmite con naturalidad la acción de liberación/extracción; “saqué” respeta el movimiento del hebreo mejor que una formulación más perifrástica.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva la fórmula completa “tierra de Egipto”, frecuente en Éxodo y cargada de valor histórico-teológico. “De Egipto” sería más breve, pero perdería la forma estable del original.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: Se sigue la norma del proyecto de no ocultar el Tetragrámaton bajo un título. “Yahvé” es la forma castellana elegida para preservar el nombre del pacto y mantener la trazabilidad con el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujeto implícito de la finalidad generacional
  english_pob_reading: so that they may see
  chosen_spanish_reading: a fin de que vean
  alternative_spanish_readings:
  - para que vean
  - a fin de que sus generaciones vean
  rationale: El hebreo remite a las generaciones futuras mediante el contexto inmediato. Se mantiene esa referencia implícita sin explicitarla en exceso, para no sobrecargar el verso ni introducir una glosa no presente en el texto.
  doctrine_reference: Cohesión contextual del discurso en Éxodo 16
- issue: Valor teológico de “el pan” como memoria de provisión divina
  english_pob_reading: the bread with which I fed you
  chosen_spanish_reading: el pan con que los alimenté
  alternative_spanish_readings:
  - el pan con que los sustenté
  - el pan con que los di
  rationale: “Pan” conserva el símbolo de provisión en el desierto. “Alimenté” expresa la acción divina de cuidado sin diluir la concreción del alimento recordado para las generaciones futuras.
  doctrine_reference: Memoria del maná y provisión de Yahvé en el desierto
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que sustituyó “an omerful” por “a full omer” para reflejar más directamente מְלֹא הָעֹמֶר. La presente versión española sigue esa decisión con “un omer completo”, manteniendo la medida antigua y su plenitud sin modernizarla. También se ajustó la cadencia para que el mandato y la finalidad queden claros en español sin depender de calcos del inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme a la terminología del proyecto.
  - Se conserva “omer” sin convertir la medida a unidades modernas.
  - Se emplea “pan” para לֶחֶם y “desierto” para בַּמִּדְבָּר por claridad natural en español.
  - No se introdujo lenguaje eclesiástico tradicional que altere el valor léxico del hebreo.
