translation:
  language: es
  text: Y lo fijaré como una estaca en un lugar seguro[a], y llegará a ser un trono de honor[b] para la casa de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo fijaré como una estaca en un lugar firme».
    reason: lexical_alternative
  - marker: b
    text: «Trono de honor» también puede rendirse «trono glorioso» o «asiento de honor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְקַעְתִּיו
  english_pob_choice: I will drive him like a peg
  chosen_spanish: clavaré a él como una estaca
  alternatives_spanish:
  - lo fijaré como una estaca
  - lo hincaré como una estaca
  lexicon: HALOT
  rationale: El verbo תקע, aplicado a יָתֵד, expresa la acción concreta de hincar o clavar para fijar algo. «Clavaré» mantiene la imagen física con naturalidad en español; «hincaré» también sería posible, pero suena más marcado y menos común en este contexto.
- source_word: יָתֵד
  english_pob_choice: peg
  chosen_spanish: estaca
  alternatives_spanish:
  - clavo
  - poste
  lexicon: HALOT
  rationale: «Estaca» conserva mejor en español la imagen de algo que se introduce firmemente para sostener peso. «Clavo» puede sonar demasiado pequeño o doméstico; «poste» desplaza la figura hacia un elemento estructural mayor que el hebreo sugiere aquí.
- source_word: בְּמָקוֹם נֶאֱמָן
  english_pob_choice: into a secure place
  chosen_spanish: en un lugar seguro
  alternatives_spanish:
  - en un lugar firme
  - en un lugar fiel
  lexicon: HALOT
  rationale: נֶאֱמָן describe firmeza, confiabilidad o seguridad. «Lugar seguro» comunica de modo idiomático esa estabilidad sin perder el matiz de solidez. «Lugar fiel» sería demasiado literal y poco natural en español.
- source_word: וְהָיָה
  english_pob_choice: he will become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - se volverá
  lexicon: HALOT
  rationale: En español, «será» comunica bien el resultado futuro sin forzar una distinción entre «ser» y «llegar a ser». «Llegará a ser» sería más explícito, pero introduce un énfasis mayor que el hebreo no exige necesariamente.
- source_word: לְכִסֵּא כָבוֹד
  english_pob_choice: a throne of honor
  chosen_spanish: un trono de honor
  alternatives_spanish:
  - un trono glorioso
  - un asiento de honor
  lexicon: HALOT
  rationale: «Trono» conserva la metáfora real o de dignidad; «honor» mantiene el valor de כָבוֹד sin reducirlo a mera reputación. «Trono glorioso» desplaza el foco hacia la gloria como cualidad, mientras que «asiento de honor» suaviza la fuerza de כִּסֵּא.
- source_word: לְבֵית אָבִיו
  english_pob_choice: to his father's house
  chosen_spanish: para la casa de su padre
  alternatives_spanish:
  - a la casa de su padre
  - para su casa paterna
  lexicon: HALOT
  rationale: La construcción con לְ puede expresar relación o beneficio; aquí «para» comunica bien el efecto respecto del linaje/hogar ancestral. «Casa de su padre» preserva la forma semítica y evita sustituir el vínculo familiar por una expresión más interpretativa.
theological_decisions:
- issue: Mantenimiento de la imagen metafórica de fijación y trono
  english_pob_reading: Retain the concrete imagery of a peg and a throne rather than interpretively paraphrasing it as political stability or honor.
  chosen_spanish_reading: Conservar la imagen concreta de la estaca y el trono, sin convertirla en una paráfrasis de estabilidad política o prestigio familiar.
  alternative_spanish_readings:
  - Parafrasear como un líder firme que dará honra a su familia
  rationale: El versículo funciona con metáforas encadenadas. Preservarlas en español respeta la textura literaria y evita cerrar prematuramente el sentido profético. La traducción mantiene la tensión entre apoyo estructural y dignidad conferida.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción inglesa revisada eliminó un «in» innecesario para hacer más natural la imagen. En español se siguió esa línea de naturalidad sin perder la concreción del verbo y del objeto metafórico.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; en este versículo no aparece el nombre divino explícito.
  - Se prefirió «estaca» en lugar de «peg»/«clavo» para mantener una imagen comprensible y consistente con el valor de יָתֵד.
  - Se mantuvo «trono de honor» como traducción principal, preservando la metáfora sin aplanarla a una simple referencia a autoridad.
