translation:
  language: es
  text: 'Entonces Samuel dijo a toda la casa de Israel[a]: «Si ustedes están volviendo a Yahvé con todo su corazón, quiten los dioses extranjeros y las Astartés[b] de en medio de ustedes, y dirijan su corazón a Yahvé[c], y sírvanle solo a él, y él los librará de la mano de los filisteos[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si ustedes se están volviendo a Yahvé con todo su corazón».'
    reason: lexical_alternative
  - marker: b
    text: El plural hebreo «Astartés» probablemente se refiere a manifestaciones, imágenes o formas cultuales asociadas con la diosa Astoret/Astarté.
    reason: cultural_note
  - marker: c
    text: 'O: «preparen su corazón para Yahvé».'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «de la mano de los filisteos», un modismo para hablar de ser librados de su poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Samuel said
  chosen_spanish: Entonces Samuel dijo
  alternatives_spanish:
  - Y Samuel dijo
  - Luego Samuel dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» comunica secuencia de manera natural en español sin perder el valor discursivo del hebreo.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo Israel
  - toda la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen corporativa de «casa» en lugar de reducirla a «Israel» sin más, porque el hebreo enfatiza la comunidad reunida.
- source_word: אִם בְּכָל לְבַבְכֶם אַתֶּם שָׁבִים אֶל יְהוָה
  english_pob_choice: If you are returning to Yahweh with all your heart
  chosen_spanish: Si ustedes se están volviendo a Yahvé con todo su corazón
  alternatives_spanish:
  - Si ustedes vuelven a Yahvé con todo su corazón
  - Si ustedes se están volviendo a Yahvé con todo su corazón
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar; «se están volviendo» mantiene el matiz verbal de proceso y la idea de retorno de lealtad del pacto. «Con todo su corazón» preserva la totalidad de la entrega.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, evitando el sustituto «SEÑOR» y manteniendo la forma «Yahvé» en el texto principal.
- source_word: הָסִירוּ אֶת אֱלֹהֵי הַנֵּכָר מִתּוֹכְכֶם
  english_pob_choice: remove the foreign gods ... from among you
  chosen_spanish: quiten de en medio de ustedes los dioses extranjeros
  alternatives_spanish:
  - saquen de en medio de ustedes los dioses extranjeros
  - remuevan de en medio de ustedes los dioses extranjeros
  lexicon: HALOT
  rationale: הסירו pide acción de quitar/eliminar; «quiten de en medio de ustedes» es natural y mantiene el sentido comunitario de separación de la idolatría.
- source_word: אֱלֹהֵי הַנֵּכָר
  english_pob_choice: the foreign gods
  chosen_spanish: los dioses extranjeros
  alternatives_spanish:
  - los dioses ajenos
  - los dioses extraños
  lexicon: HALOT
  rationale: «Extranjeros» refleja היטב la idea de deidades ajenas al pacto y evita el posible matiz engañoso de «extraños» en español.
- source_word: וְהָעַשְׁתָּרֹת
  english_pob_choice: the Ashtaroths
  chosen_spanish: las Astartés[b]
  alternatives_spanish:
  - las Astartés
  - las Astoret
  - las imágenes de Astarté
  lexicon: HALOT
  rationale: El plural hebreo apunta a formas, manifestaciones o imágenes asociadas con la diosa; se conserva la transliteración tradicionalizable «Astartés» para no diluir la referencia cultual.
- source_word: וְהָכִינוּ לְבַבְכֶם אֶל יְהוָה
  english_pob_choice: and direct your heart to Yahweh
  chosen_spanish: y preparen su corazón para Yahvé[c]
  alternatives_spanish:
  - y dispongan su corazón hacia Yahvé
  - y preparen su corazón para Yahvé
  lexicon: HALOT
  rationale: כּוּן con «corazón» puede significar preparar, disponer o afirmar; «preparen su corazón para Yahvé» sigue de cerca la metáfora sin volverla rígida.
- source_word: וְעִבְדֻהוּ לְבַדּוֹ
  english_pob_choice: and serve him alone
  chosen_spanish: y sírvanle solo a él
  alternatives_spanish:
  - y sírvanle solo a él
  - y sirvan solamente a él
  lexicon: HALOT
  rationale: עבד abarca servicio y lealtad cultual; «sírvanle solo a él» conserva la exclusividad del mandato sin restringirlo a mera adoración ritual.
- source_word: וְיַצֵּל אֶתְכֶם מִיַּד פְּלִשְׁתִּים
  english_pob_choice: and he will deliver you from the hand of the Philistines
  chosen_spanish: y él los librará de la mano de los filisteos[d]
  alternatives_spanish:
  - y él los librará de la mano de los filisteos
  - y él los rescatará de la mano de los filisteos
  lexicon: HALOT
  rationale: נצל en hifil significa librar/rescatar; se mantiene el modismo «de la mano de» porque expresa la idea concreta de poder opresor y coincide con la observación auditada del inglés.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El texto hebreo usa el Tetragrámaton directamente; la política del proyecto pide «Yahvé» en el texto principal, preservando el nombre del pacto en vez de enmascararlo como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of Israel's response in שָׁבִים
  english_pob_reading: returning to Yahweh
  chosen_spanish_reading: se están volviendo a Yahvé
  alternative_spanish_readings:
  - vuelven a Yahvé
  - están regresando a Yahvé
  rationale: La idea no es solo movimiento físico sino retorno de fidelidad; el giro reflexivo en español comunica el sentido de volver al Señor del pacto sin añadir categorías ajenas al hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Meaning of עבד in this context
  english_pob_reading: serve him alone
  chosen_spanish_reading: sírvanle solo a él
  alternative_spanish_readings:
  - sirvan solamente a él
  - adórenlo solo a él
  rationale: El mandato implica servicio exclusivo del pacto, que incluye obediencia y culto. «Sírvanle» es más amplio y evita reducir el verbo a «adorar».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas para que cada marcador aparezca exactamente en el texto español. También se mantuvo la estructura del hebreo más de cerca al mover la referencia a «de en medio de ustedes» con el bloque de los dioses extranjeros, y se evitó el sustituto litúrgico «SEÑOR» para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en todo el versículo.
  - «Casa de Israel» conserva la imagen corporativa del hebreo.
  - «Sírvanle» se usa con sentido de lealtad/servicio exclusivo, no solo de culto ritual.
  - Las notas [b], [c] y [d] están ancladas directamente en el texto español.
