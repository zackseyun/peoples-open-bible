base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/012/012.yaml
  text: And the prince who is among them will lift his baggage onto his shoulder in the dark and go out[a]. They will dig through the wall to bring him out through it[c][b]. He will cover his face so that he may not see the land with his eyes.
  footnotes:
  - marker: a
    text: Or, 'in the twilight' for 'in the dark.' The Hebrew term can denote gloom or dim light, with the broader sense of concealment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'will lift onto the shoulder.' 'His baggage' is supplied from the immediate context of the exile sign-act in the surrounding verses.
    reason: cross_reference
  - marker: c
    text: Or, 'because he will not see the land with his eyes.' The Hebrew conjunction may be understood as causal rather than purposive/resultative.
    reason: alternative_reading
