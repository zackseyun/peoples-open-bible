translation:
  language: es
  text: Dales según su obra, y según la maldad de sus hechos; según la obra de sus manos, dales; retribúyeles la retribución que merecen[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «retribúyeles su retribución».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּן
  english_pob_choice: Give
  chosen_spanish: Dales
  alternatives_spanish:
  - Da a ellos
  - Entrégales
  - Concédeles
  lexicon: HALOT
  rationale: 'El imperativo dirigido a Dios se expresa de forma natural en español con un dativo ético: ''Dales''. Conserva la fuerza de súplica judicial sin sonar mecánico.'
- source_word: כְּפָעֳלָם
  english_pob_choice: according to their work
  chosen_spanish: según su obra
  alternatives_spanish:
  - según su trabajo
  - conforme a su obra
  - de acuerdo con lo que han hecho
  lexicon: HALOT
  rationale: פָּעַל puede abarcar trabajo, obra o hecho. 'Obra' mantiene la correspondencia singular-colectiva y el paralelismo del versículo.
- source_word: וּכְרֹעַ
  english_pob_choice: and according to the evil of
  chosen_spanish: y según la maldad de
  alternatives_spanish:
  - y según el mal de
  - y según la perversidad de
  - y conforme a la maldad de
  lexicon: HALOT
  rationale: רֹעַ expresa maldad/evil/badness. 'Maldad' es una opción natural en español para conservar el matiz moral fuerte del contexto imprecatorio.
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus acciones
  - sus obras hechas
  lexicon: HALOT
  rationale: מַעַלְלִים son actos o hechos, a menudo con carga moral. 'Hechos' funciona bien en el paralelismo con 'obra' y evita repetición innecesaria.
- source_word: כְּמַעֲשֵׂה יְדֵיהֶם
  english_pob_choice: according to the work of their hands
  chosen_spanish: según la obra de sus manos
  alternatives_spanish:
  - según el trabajo de sus manos
  - según lo que hicieron sus manos
  - conforme a la obra de sus manos
  lexicon: HALOT
  rationale: La imagen hebrea se conserva mejor con 'obra de sus manos', que mantiene la metáfora de producción/acción humana.
- source_word: הָשֵׁב
  english_pob_choice: repay
  chosen_spanish: retribúyeles
  alternatives_spanish:
  - repágales
  - devuélveles
  - págales
  lexicon: HALOT
  rationale: El hiphil de שוב tiene aquí sentido de hacer volver sobre ellos lo debido. 'Retribúyeles' comunica el valor retributivo y judicial con registro digno.
- source_word: גְּמוּלָם
  english_pob_choice: their due
  chosen_spanish: su debido
  alternatives_spanish:
  - su retribución
  - su recompensa
  - lo que les corresponde
  lexicon: HALOT
  rationale: גְּמוּל puede significar pago, retribución o debido. 'Su debido' preserva el registro formal y la correspondencia semántica con la revisión inglesa final.
theological_decisions:
- issue: Lenguaje imprecatorio y retribución divina
  english_pob_reading: The verse is rendered as a petition that God repay the wicked in proportion to their deeds.
  chosen_spanish_reading: El versículo se vierte como una petición para que Dios retribuya a los impíos en proporción a sus obras.
  alternative_spanish_readings:
  - Lectura meramente descriptiva, como si solo afirmara un principio general
  - Lectura suavizada que elimine el tono de petición
  rationale: Los imperativos repetidos ('Dales... dales... retribúyeles') muestran que no es una observación neutral, sino una súplica judicial. El español conserva ese tono sin intensificarlo más allá del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés, que afinó el cierre de 'what they deserve' a 'their due'. Por eso el español usa 'su debido' y no una paráfrasis más libre. También se preservó el paralelismo de tres miembros con dos imperativos iniciales y un imperativo final de retribución.
  spanish_consistency_notes:
  - Se mantuvo 'obra' para פעל/מעשה y 'hechos' para מעללים, conservando la variación del hebreo sin uniformarla.
  - '''Maldad'' traduce רֹעַ con el peso moral requerido por el contexto.'
  - '''Retribúyeles'' y ''su debido'' reflejan el sentido judicial de הָשֵׁב גְּמוּלָם sin sustituirlo por una fórmula eclesiástica más tradicional.'
