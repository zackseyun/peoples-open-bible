translation:
  language: es
  text: ¡Qué sabio fuiste en tu juventud[a], y la instrucción desbordó como el Nilo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece una lectura sustancialmente distinta: «Tu alma cubrió la tierra, y la llenaste con parábolas de enigmas». Probablemente refleja otra forma hebrea subyacente o una tradición textual divergente.'
    reason: alternative_reading
lexical_decisions:
- source_word: מה
  english_pob_choice: How
  chosen_spanish: ¡Qué...!
  alternatives_spanish:
  - ¡Cuán...!
  - ¡Qué grande...!
  lexicon: HALOT
  rationale: El hebreo exclamativo introduce admiración, no una pregunta. En español, «¡Qué...!» reproduce de forma natural ese tono laudatorio.
- source_word: חכמת
  english_pob_choice: wise you were
  chosen_spanish: sabio fuiste
  alternatives_spanish:
  - tu sabiduría fue grande
  - llegaste a ser sabio
  lexicon: HALOT
  rationale: Sigo el sentido estativo/exclamativo del hebreo con una predicación natural en español. «Sabio fuiste» mantiene el elogio directo sin volverlo pesado.
- source_word: בנעוריך
  english_pob_choice: in your youth
  chosen_spanish: en tu juventud
  alternatives_spanish:
  - cuando eras joven
  - en tus días jóvenes
  lexicon: HALOT
  rationale: «En tu juventud» es una equivalencia directa, clara y digna para el valor temporal del hebreo.
- source_word: ותצף
  english_pob_choice: overflowed
  chosen_spanish: desbordó
  alternatives_spanish:
  - se derramó
  - fluyó en abundancia
  - subió como una crecida
  lexicon: HALOT
  rationale: El verbo expresa abundancia/irrupción de algo que rebasa su cauce. «Desbordó» conserva esa imagen y suena natural en español.
- source_word: כיאר
  english_pob_choice: like the Nile
  chosen_spanish: como el Nilo
  alternatives_spanish:
  - como un río
  - como el Río
  lexicon: HALOT
  rationale: «Nilo» preserva el referente específico que el inglés POB documenta, en vez de suavizarlo a un río genérico.
- source_word: מוסר
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la enseñanza
  lexicon: HALOT
  rationale: En este contexto de alabanza sapiencial, «instrucción» comunica bien el sentido formativo del término sin cargarlo de una noción exclusivamente punitiva.
theological_decisions:
- issue: Elección del texto hebreo como base frente al paralelo griego divergente
  english_pob_reading: The Hebrew main line is translated as the base text, with the Greek preserved in a footnote as a major alternative ancient reading.
  chosen_spanish_reading: La línea principal sigue el hebreo conservado; el griego queda señalado como una lectura alternativa antigua de gran peso.
  alternative_spanish_readings:
  - Traducir la imagen griega como texto principal
  - fusionar ambos testimonios en una sola paráfrasis
  rationale: La política del proyecto da primacía al hebreo conservado de Sirácida cuando está disponible. El griego aquí parece reflejar una tradición textual distinta, por lo que no debe desplazar al testimonio hebreo en el texto base.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input without displacing the Hebrew witness.'
translation_notes:
  revision_awareness: 'Se mantuvo el enfoque del último pase revisado sin cambios: el hebreo sirve de base y el griego se conserva como alternativa importante en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponde al tetragrámaton; aquí no aparece.
  - «Instrucción» preserva el matiz sapiencial del hebreo מוסר sin imponer un equivalente eclesiástico fijo.
  - La puntuación exclamativa refleja el valor admirativo del hebreo מה.
