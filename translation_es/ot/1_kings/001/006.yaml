translation:
  language: es
  text: 'Su padre nunca lo había contrariado[a] en ningún momento de su vida[b], al decirle: «¿Por qué has hecho así?». Además, él era de muy buen aspecto, y su madre lo había dado a luz después de Absalón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo había entristecido” o “lo había reprendido”. El verbo hebreo puede denotar causar dolor, molestia o reprimenda; en este contexto alude al fracaso de David para corregir o confrontar a Adonías.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “desde sus días”, un modismo que significa “en ningún momento de su vida”.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצָבוֹ
  english_pob_choice: displeased him
  chosen_spanish: lo había contrariado
  alternatives_spanish:
  - lo había agraviado
  - lo había entristecido
  - lo había reprendido
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar causar dolor, molestia o pesadumbre. En este contexto parental, el sentido no es simplemente sentimental sino de no haberlo corregido o frenado; "contrariado" comunica bien esa falta de corrección sin forzar en la misma frase una reprimenda explícita.
- source_word: מִיָּמָיו
  english_pob_choice: at any time
  chosen_spanish: en ningún momento de su vida
  alternatives_spanish:
  - desde sus días
  - en todos sus días
  - jamás
  lexicon: HALOT
  rationale: La expresión es idiomática y literalmente dice "desde sus días". En español, "en ningún momento de su vida" expresa con naturalidad el valor totalizador de nunca en toda su vida.
- source_word: לֵאמֹר
  english_pob_choice: by saying
  chosen_spanish: al decirle
  alternatives_spanish:
  - diciéndole
  - al decir
  - al hablarle
  lexicon: HALOT
  rationale: El giro introduce la frase correctiva del padre. "Al decirle" conserva la relación sintáctica y hace claro que la reprensión iba dirigida a él.
- source_word: מַדּוּעַ כָּכָה עָשִׂיתָ
  english_pob_choice: Why have you done thus?
  chosen_spanish: ¿Por qué has hecho así?
  alternatives_spanish:
  - ¿Por qué has hecho de ese modo?
  - ¿Por qué hiciste esto?
  - ¿Por qué has obrado así?
  lexicon: HALOT
  rationale: La forma hebrea tiene un tono de corrección directa. "Así" preserva la correspondencia con ככה sin perder naturalidad en español; "de ese modo" sería más explicativo, pero menos directo.
- source_word: טוֹב תֹּאַר מְאֹד
  english_pob_choice: very handsome
  chosen_spanish: de muy buen aspecto
  alternatives_spanish:
  - muy hermoso
  - muy apuesto
  - muy atractivo
  lexicon: HALOT
  rationale: La expresión hebrea describe la apariencia física de un varón. "De muy buen aspecto" evita una equivalencia demasiado moderna o subjetiva y mantiene la referencia general a la buena presencia física.
- source_word: וְאֹתוֹ יָלְדָה
  english_pob_choice: his mother had borne him
  chosen_spanish: su madre lo había dado a luz
  alternatives_spanish:
  - ella lo había dado a luz
  - su madre lo había parido
  lexicon: HALOT
  rationale: El hebreo omite el sujeto explícito del verbo; el contexto exige la madre. "Dar a luz" es claro y digno en español bíblico contemporáneo, sin introducir una lectura más técnica de la que el texto pide.
- source_word: אַחֲרֵי אַבְשָׁלוֹם
  english_pob_choice: after Absalom
  chosen_spanish: después de Absalón
  alternatives_spanish:
  - tras Absalón
  - a continuación de Absalón
  lexicon: HALOT
  rationale: La expresión indica orden de nacimiento. "Después de Absalón" es la manera más natural y fiel en español para conservar esa relación temporal/genealógica.
theological_decisions:
- issue: ¿Debe traducirse עֲצָבוֹ como "lo había contrariado" o como una reprensión explícita?
  english_pob_reading: The POB keeps the main text general and notes the possibility of 'grieved' or 'rebuked,' with the context pointing to David's failure to check or confront Adonijah.
  chosen_spanish_reading: '"Lo había contrariado" en el texto principal, sin convertirlo en una reprensión explícita.'
  alternative_spanish_readings:
  - '"lo había reprendido"'
  - '"lo había corregido"'
  - '"lo había entristecido"'
  rationale: 'La lectura principal debe conservar la tensión del hebreo: la palabra puede abarcar dolor, molestia o reprensión, pero el texto no obliga a especificar una reprimenda verbal. "Contrariado" mantiene la amplitud semántica y deja abierta la nota contextual de que David no lo frenó.'
  doctrine_reference: Principio de fidelidad lexical y prudencia exegética; no añadir más precisión que la que el hebreo exige.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de su superficie: se conservó la ambigüedad lexical de עֲצָבוֹ, se mantuvo la frase idiomática de מִיָּמָיו en español natural, y se explicitó el sujeto implícito de יָלְדָה solo donde el español lo requiere. No se registraron revisiones aplicadas en el paquete fuente, y el veredicto de concordancia fue de desacuerdo menor, por lo que la formulación principal se mantiene estable y conservadora.'
  spanish_consistency_notes:
  - Se usa "Dios" y no aplica aquí terminología divina específica.
  - No aparece יהוה en este versículo.
  - Se evita la calca "desde sus días" en el cuerpo para no oscurecer el sentido idiomático; esa literalidad queda reservada para la nota.
  - El orden de las cláusulas sigue el hebreo en lo esencial, pero con sintaxis española fluida.
  - '"Absalón" conserva la forma tradicional en español para el nombre propio bíblico.'
