  text: רַ֭בִּים יְחַלּ֣וּ פְנֵֽי נָדִ֑יב וְ/כָל הָ֝/רֵ֗עַ לְ/אִ֣ישׁ מַתָּֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/006.yaml
  text: Many seek the favor of a noble man[b][a], and everyone is a friend to a man who gives gifts.
  footnotes:
  - marker: a
    text: Or 'Many entreat the face of a nobleman.' The Hebrew נָדִיב can mean 'nobleman' or 'prince,' but here 'generous man' fits the proverb's focus on gift-giving and social favor.
    reason: lexical_alternative
  - marker: b
    text: Literally 'everyone is a friend to a man of gifts.'
    reason: lexical_alternative
