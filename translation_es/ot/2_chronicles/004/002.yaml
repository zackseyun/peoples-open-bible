translation:
  language: es
  text: Hizo el Mar de metal fundido[a], de diez codos de borde a borde, redondo todo alrededor; su altura era de cinco codos, y un cordel de treinta codos[b] lo rodeaba todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Mar fundido». El hebreo usa «Mar» como nombre del gran recipiente entre los utensilios del templo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un cordel de treinta codos». La frase describe la circunferencia del recipiente según la manera convencional antigua de medir.'
    reason: cultural_note
lexical_decisions:
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - la fuente
  - el estanque
  - el Mar
  lexicon: HALOT
  rationale: En el contexto del mobiliario del templo, el hebreo usa un nombre propio del gran recipiente. En español, ‘Mar’ conserva ese carácter nominal y la mayúscula ayuda a distinguirlo de un mar común. Se evita ‘fuente’ o ‘estanque’ porque reducen o alteran el referente.
- source_word: מוּצָק
  english_pob_choice: of cast metal
  chosen_spanish: de metal fundido
  alternatives_spanish:
  - de metal vaciado
  - fundido
  - moldeado en metal
  lexicon: HALOT
  rationale: La forma indica fabricación por vaciado/colado en metal. ‘De metal fundido’ mantiene el sentido material y técnico sin forzar un calco rígido; además, en español suena natural y compatible con la imagen de un objeto fundido para su confección.
- source_word: עֶשֶׂר בָּאַמָּה
  english_pob_choice: ten cubits
  chosen_spanish: de diez codos
  alternatives_spanish:
  - de diez codos de ancho
  - de diez codos de diámetro
  lexicon: HALOT
  rationale: Se conserva la unidad antigua ‘codos’ por fidelidad al dato métrico del texto. No se convierte a medidas modernas. ‘De diez codos de borde a borde’ expresa la medida sin imponer un término técnico que el hebreo no usa aquí.
- source_word: מִשְּׂפָתוֹ אֶל שְׂפָתוֹ
  english_pob_choice: from brim to brim
  chosen_spanish: de borde a borde
  alternatives_spanish:
  - de borde a borde
  - de labio a labio
  - de orilla a orilla
  lexicon: HALOT
  rationale: Para un recipiente, ‘borde’ comunica con claridad la referencia a la parte superior del vaso. ‘Labio’ sería más literal pero menos natural en español actual. ‘Orilla’ suena demasiado terrestre y menos apto para un objeto metálico.
- source_word: עָגוֹל סָבִיב
  english_pob_choice: round all around
  chosen_spanish: redondo por todo alrededor
  alternatives_spanish:
  - redondo alrededor
  - circular por todo alrededor
  lexicon: HALOT
  rationale: Se conservan tanto la forma (‘redondo’) como la idea de contorno completo (‘por todo alrededor’). ‘Circular’ sería correcto, pero ‘redondo’ es más idiomático y cercano a la descripción concreta del objeto.
- source_word: וְחָמֵשׁ בָּאַמָּה קֽוֹמָת֔וֹ
  english_pob_choice: its height was five cubits
  chosen_spanish: su altura era de cinco codos
  alternatives_spanish:
  - y su altura era de cinco codos
  - medía cinco codos de altura
  lexicon: HALOT
  rationale: Se explicita la relación posesiva con una construcción fluida en español. ‘Altura’ reproduce קומה con naturalidad y mantiene el valor dimensional del texto.
- source_word: וְקָו
  english_pob_choice: and a line
  chosen_spanish: y un cordel
  alternatives_spanish:
  - y una línea
  - y una cuerda de medir
  - y un hilo
  lexicon: HALOT
  rationale: ‘Cordel’ conserva la materialidad concreta de קָו como cuerda o línea de medida. En español bíblico actual, ‘cordel’ comunica mejor la imagen de medición que ‘línea’, que puede sonar más abstracta.
- source_word: שְׁלֹשִׁים בָּאַמָּה
  english_pob_choice: thirty cubits
  chosen_spanish: de treinta codos
  alternatives_spanish:
  - treinta codos
  - de treinta codos de largo
  lexicon: HALOT
  rationale: Se conserva la unidad y la estructura cuantitativa del hebreo. El contexto ya indica que el ‘cordel’ corresponde a la medida total alrededor del objeto.
- source_word: יָסֹב אֹתוֹ סָבִיב
  english_pob_choice: encircled it all around
  chosen_spanish: lo rodeaba por todo alrededor
  alternatives_spanish:
  - lo circundaba por todo alrededor
  - lo rodeaba alrededor
  - lo rodeaba
  lexicon: HALOT
  rationale: ‘Rodeaba’ preserva el movimiento/circunferencia del verbo hebreo sin sonar técnico. La adición ‘por todo alrededor’ refleja el intensificador סָבִיב y mantiene la imagen de una vuelta completa.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran una concordancia alta; se mantuvieron las unidades antiguas, el nombre propio del gran recipiente y la imagen de medición circular. La principal decisión de estilo fue traducir מוּצָק como ‘de metal fundido’ y קָו como ‘cordel’ para lograr español natural sin perder precisión semántica.
  spanish_consistency_notes:
  - Se mantuvo ‘codos’ como unidad de medida para conservar la referencia histórica del texto.
  - ‘Mar’ se escribe con mayúscula porque funciona como nombre del objeto del templo, no como sustantivo común.
  - Se evitó ‘SEÑOR’ u otras sustituciones porque el versículo no contiene el nombre divino.
  - La formulación busca equilibrio entre fidelidad literal y lectura pública clara en español.
