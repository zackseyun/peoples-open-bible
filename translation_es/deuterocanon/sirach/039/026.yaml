review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo apoyado por el griego: una lista de elementos primordiales para la vida humana. Mantiene correctamente agua, fuego, hierro, sal, harina de trigo, leche, miel, sangre de la uva, aceite y ropa. Sin embargo, los marcadores de notas están invertidos respecto de su anclaje: [a] aparece en ''agua'' pero la nota a trata sobre ''la sangre de la uva''; [b] aparece en ''harina de trigo'' y corresponde a la dificultad textual de esa expresión. Esto requiere corrección para preservar la trazabilidad del aparato.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Las cosas esenciales para la vida humana'' es fiel, aunque algo más fluido resulta ''Lo esencial para la vida humana''. ''La ropa'' es idiomático y adecuado para בגד como colectivo. La principal falla es técnica y de legibilidad editorial: las notas al pie no están ancladas donde corresponde.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales concuerdan con el rastro inglés: ''vida humana'', ''harina de trigo'', ''la sangre de la uva'', ''aceite'' y ''ropa''.'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están anclados a palabras incorrectas.
    rationale: La nota a explica 'la sangre de la uva' pero está colocada en 'agua'; la nota b sobre la dificultad textual de 'harina de trigo' sí corresponde temáticamente, pero el sistema exige que cada marcador aparezca exactamente en la frase pertinente. Así como está, el aparato induce a error y no preserva fielmente la auditoría POB.
  - severity: low
    issue: La apertura 'Las cosas esenciales' suena un poco más pesada de lo necesario.
    rationale: No es infiel, pero 'Lo esencial para la vida humana' suena más natural y mantiene mejor la fuerza idiomática de ראש / ἀρχή como lo fundamental.
  revised_spanish_text: Lo esencial para la vida humana es el agua, el fuego, el hierro y la sal; la harina de trigo[a], la leche y la miel; la sangre de la uva[b], el aceite y la ropa.
  revised_footnotes:
  - marker: a
    text: El hebreo de esta expresión es difícil en la tradición de Cairó; el paralelo griego apoya el sentido de harina fina de trigo.
    reason: textual_variant
  - marker: b
    text: El hebreo dice literalmente «la sangre de la uva»; puede referirse en sentido amplio a una bebida de uva, incluso vino, pero la traducción conserva la imagen del original.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que coincidan con las expresiones que explican y se aligera levemente la frase inicial para una lectura más natural en español sin cambiar el sentido. No se requieren cambios léxicos sustantivos adicionales.
