translation:
  language: es
  text: Cuando llegaron al campamento de Israel, Israel se levantó y golpeó a Moab, y huyeron ante ellos. Entonces entraron en la tierra[a], golpeando a Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entraron en ella»; o «avanzaron en Moab». El hebreo dice «entraron en ella», y el sufijo femenino probablemente se refiere a la tierra o al territorio más que al pueblo directamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campo
  - campamento militar
  lexicon: HALOT
  rationale: El contexto narrativo es militar, y “campamento” comunica de manera natural el lugar de reunión de las tropas. “Campo” sería más ambiguo en español.
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: La forma marca una acción decisiva e inmediata en combate. “Se levantó” conserva ese impulso narrativo sin añadir un matiz interpretativo excesivo.
- source_word: וַיַּכּוּ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - derrotó
  - atacó
  lexicon: HALOT
  rationale: El verbo base es golpear/abatir. “Golpeó” mantiene la fuerza concreta del hebreo sin traducir demasiado pronto el resultado como “derrotó”.
- source_word: וַיָּנֻסוּ מִפְּנֵיהֶם
  english_pob_choice: they fled before them
  chosen_spanish: huyeron de delante de ellos
  alternatives_spanish:
  - huyeron ante ellos
  - huyeron de ellos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a huir desde la presencia del enemigo. “De delante de ellos” conserva el valor espacial y la imagen de desbandada.
- source_word: וַיָּבֹאוּ בָהּ
  english_pob_choice: they went into it
  chosen_spanish: entraron en la tierra[a]
  alternatives_spanish:
  - entraron en ella
  - avanzaron en Moab
  - fueron contra ella
  lexicon: HALOT
  rationale: El sufijo femenino singular apunta probablemente a la tierra/territorio, pero el antecedente queda comprimido en hebreo. “La tierra” refleja la solución probable sin borrar la ambigüedad; la nota preserva las alternativas reconocidas por el POB en inglés.
- source_word: וְהַכּוֹת
  english_pob_choice: kept striking / striking
  chosen_spanish: golpeando
  alternatives_spanish:
  - y golpeando
  - mientras golpeaban
  - siguiendo con los golpes
  lexicon: HALOT
  rationale: El infinitivo constructo con waw indica acción concomitante o continuada. “Golpeando” reproduce esa continuidad de forma natural en español.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - los moabitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio como en el hebreo. En este contexto puede incluir al pueblo y al territorio; el texto español mantiene esa amplitud.
theological_decisions:
- issue: El referente de בָהּ y el alcance de la entrada final
  english_pob_reading: they went into it, with the feminine suffix likely referring to the land/territory rather than the people directly
  chosen_spanish_reading: entraron en la tierra
  alternative_spanish_readings:
  - entraron en ella
  - entraron en Moab
  - avanzaron en el territorio
  rationale: No conviene fijar de manera innecesaria el antecedente del pronombre cuando el hebreo lo deja comprimido. “La tierra” expresa la referencia más probable en español y mantiene la tensión textual señalada por el POB inglés.
  doctrine_reference: Transparencia textual y prudencia exegética; no añadir precisión no garantizada por el hebreo.
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente al entender la cláusula final como un avance hacia la tierra/territorio mientras continúan golpeando a Moab, en lugar de traducirla de manera más literal pero menos natural. La nota conserva la ambigüedad reconocida en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se prefirió «Moab» como nombre colectivo/territorial, coherente con el hebreo y con el POB inglés.
  - Se evitó intensificar «golpeó» a «derrotó» para no añadir un resultado no explicitado en el verbo hebreo.
  - La nota al pie está anclada en la frase final porque allí se concentra la ambigüedad del referente femenino singular.
