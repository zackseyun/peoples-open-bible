  to: Había una cámara con su entrada junto a los postes de las puertas[a]; allí lavaban la ofrenda quemada.
  rationale: 'Se mantiene la arquitectura de la frase y la nota léxica sobre אֵילִים, pero se ajusta el predicado y el objeto sacrificial para un español más natural y una correspondencia más estrecha con el sentido del hebreo y la decisión inglesa documentada: «lavaban» comunica mejor la acción ritual habitual de יָדִיחוּ, y «la ofrenda quemada» evita la ambigüedad moderna de «holocausto» mientras preserva el significado de עֹלָה.'
