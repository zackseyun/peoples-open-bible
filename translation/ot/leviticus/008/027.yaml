id: LEV.8.27
reference: Leviticus 8:27
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן אֶת הַ/כֹּ֔ל עַ֚ל כַּפֵּ֣י אַהֲרֹ֔ן וְ/עַ֖ל כַּפֵּ֣י בָנָ֑י/ו וַ/יָּ֧נֶף אֹתָ֛/ם תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: He put all of it into the palms of Aaron and into the palms of his sons[a], and he waved them as a wave offering before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the palms of Aaron and on the palms of his sons.' The Hebrew preposition is literally 'on/upon,' though in English the sense is that the portions were placed in their cupped hands.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He put
  alternatives:
  - he gave
  - he placed
  lexicon: HALOT
  rationale: נתן has a broad range including 'give, put, place.' In this ritual action context, 'put' best fits the physical placement of the portions onto their hands without implying transfer of ownership as strongly as 'gave.'
- source_word: אֶת־הַכֹּל
  chosen: all of it
  alternatives:
  - the whole
  - all
  lexicon: HALOT
  rationale: The phrase refers back to the collected portions from the preceding verse. 'All of it' is natural English and preserves the comprehensiveness of the Hebrew.
- source_word: עַל כַּפֵּי
  chosen: into the palms of
  alternatives:
  - on the palms of
  - upon the hands of
  lexicon: HALOT
  rationale: כַּף here denotes the palm/hand. Although עַל is literally 'on/upon,' idiomatic English for placing items in someone's cupped hands is 'into the palms of,' which conveys the ritual posture more clearly.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: וְעַל כַּפֵּי בָנָיו
  chosen: and into the palms of his sons
  alternatives:
  - and on the palms of his sons
  - and into the hands of his sons
  lexicon: HALOT
  rationale: Maintains the repeated structure of the Hebrew and preserves the familial term 'sons' rather than neutralizing it, in keeping with gender-accurate translation.
- source_word: וַיָּנֶף
  chosen: and he waved
  alternatives:
  - and he presented by waving
  - and he elevated
  lexicon: HALOT
  rationale: The Hiphil of נוף in sacrificial contexts refers to the ritual act of waving/presenting. 'Waved' is the standard and clearest rendering in English.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The pronoun refers to the items placed on their palms, not to Aaron and his sons. 'Them' preserves that antecedent.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - as a presentation offering
  - as a waved offering
  lexicon: HALOT
  rationale: תְּנוּפָה is the technical sacrificial term for an offering presented by waving. 'Wave offering' is established, accurate cultic terminology and matches the verbal idea from וַיָּנֶף.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is the standard covenantal phrase for ritual action performed in Yahweh's presence. Per doctrine, יְהוָה is rendered 'the LORD.'
