translation:
  language: es
  text: 'Yahvé dijo[a]: «He aquí, hay un lugar junto a mí, y estarás de pie sobre la roca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conmigo» o «cerca de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción siguiente en la narración. En español, 'dijo' con la puntuación narrativa conserva el avance del relato sin forzar un calco innecesario del 'and' inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto en español, evitando sustituirlo por un título como 'Señor'.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - He aquí
  lexicon: HALOT
  rationale: '''הִנֵּה'' es una partícula deíctica que llama la atención. ''Mira'' comunica esa fuerza demostrativa en un español moderno y digno; ''He aquí'' se reserva como alternativa más formal/arcaizante.'
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un lugar
  lexicon: HALOT
  rationale: '''מָקוֹם'' denota un lugar o ubicación. ''Un lugar'' es natural en español y conserva la referencia espacial concreta del texto.'
- source_word: אִתִּי
  english_pob_choice: by me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - conmigo
  - cerca de mí
  lexicon: HALOT
  rationale: El valor de la preposición con sufijo puede ser relacional ('conmigo') o espacial ('junto/near me'). Aquí el contexto dirige a Moisés a una ubicación física; 'junto a mí' conserva la proximidad espacial sin excluir el matiz de compañía, y evita la ambigüedad más estrecha de 'conmigo'.
- source_word: וְנִצַּבְתָּ
  english_pob_choice: and you shall stand
  chosen_spanish: y te pondrás
  alternatives_spanish:
  - y te pararás
  - y permanecerás de pie
  lexicon: HALOT
  rationale: El verbo נצב expresa ponerse de pie o tomar posición. 'Te pondrás' transmite la instrucción de colocarse en posición, con un tono natural en español; 'estarás de pie' sería más descriptivo que directivo.
- source_word: עַל הַצּוּר
  english_pob_choice: on the rock
  chosen_spanish: sobre la roca
  alternatives_spanish:
  - en la roca
  - sobre el peñasco
  lexicon: HALOT
  rationale: '''צוּר'' suele significar roca o peñasco rocoso. ''Sobre la roca'' conserva la imagen sin estrechar indebidamente la referencia geológica.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La línea editorial del proyecto en español pide reproducir el nombre personal divino. 'Yahvé' mantiene esa intención y evita la sustitución por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz espacial de אִתִּי
  english_pob_reading: by me / with me / near me
  chosen_spanish_reading: junto a mí
  alternative_spanish_readings:
  - conmigo
  - cerca de mí
  rationale: No se borra la tensión entre cercanía relacional y ubicación física. 'Junto a mí' permite ambas lecturas en español, coherente con el contexto de una posición concreta junto a Yahvé.
  doctrine_reference: HALOT; audit trail lexical note on spatial proximity
translation_notes:
  revision_awareness: El inglés auditado pasó de 'Look' a 'Behold' por ajuste de registro, pero el sentido deíctico permanece. El español adopta 'Mira' por claridad contemporánea sin perder la solemnidad del mandato divino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva la proximidad de אִתִּי con 'junto a mí' y una nota para alternativas legítimas.
  - '''Roca'' se mantiene como término base para צוּר; no se amplía a ''peñasco'' en el texto principal para evitar restringir la imagen.'
