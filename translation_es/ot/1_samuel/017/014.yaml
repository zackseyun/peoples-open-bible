translation:
  language: es
  text: David era el menor[a], y los tres mayores habían ido tras Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el más joven». El hebreo puede traducirse literalmente como «el pequeño/el joven», pero aquí el contraste con «los tres mayores» muestra que el sentido es el de menor edad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/דָוִד
  english_pob_choice: Now David
  chosen_spanish: David
  alternatives_spanish:
  - Y David
  - Ahora David
  lexicon: WLC/HALOT
  rationale: El ו inicial marca enlace narrativo o de continuación; en español, aquí puede quedar implícito sin añadir un adverbio como «ahora», que sería más interpretativo que el hebreo. Mantener el nombre al inicio conserva la estructura del enunciado.
- source_word: הוּא
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - él era
  - fue
  lexicon: WLC/HALOT
  rationale: El pronombre independiente aporta énfasis en hebreo, pero en español normalmente basta con la cópula. «Era» reproduce el estado/descripcion en contexto narrativo mejor que un perfecto puntual.
- source_word: הַ/קָּטָן
  english_pob_choice: the youngest
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el pequeño
  - el menor de todos
  lexicon: WLC/HALOT
  rationale: En contraste fraternal, el sentido es de rango por edad. «El menor» es natural y fiel al valor comparativo; evita sugerir solo tamaño físico. La nota textual mantiene abierta la equivalencia idiomática con «el más joven».
- source_word: וּ/שְׁלֹשָׁה
  english_pob_choice: and the three
  chosen_spanish: y los tres
  alternatives_spanish:
  - y tres
  - mientras los tres
  lexicon: WLC/HALOT
  rationale: Se conserva la relación coordinada del hebreo. En español, el artículo es necesario para que la frase sea fluida y entendible.
- source_word: הַ/גְּדֹלִים
  english_pob_choice: oldest
  chosen_spanish: mayores
  alternatives_spanish:
  - más grandes
  - más viejos
  - mayores de edad
  lexicon: WLC/HALOT
  rationale: En un contexto de hermanos, גדול puede señalar edad o rango. «Mayores» preserva esa relación sin forzar «viejos», que suena más marcado y menos neutral en español.
- source_word: הָלְכ֖וּ אַחֲרֵ֥י
  english_pob_choice: had gone after
  chosen_spanish: habían ido tras
  alternatives_spanish:
  - habían seguido a
  - fueron detrás de
  - iban tras
  lexicon: WLC/HALOT
  rationale: La construcción hebrea literalmente significa «ir detrás de»; en este contexto de adhesión/acompañamiento se expresa bien con «ir tras». El pluscuamperfecto refleja el trasfondo narrativo anterior a la escena principal, como en la auditoría inglesa.
- source_word: שָׁאֽוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Transliteración estándar
  rationale: Se usa la forma española corriente del nombre propio bíblico.
translation_notes:
  revision_awareness: La revisión inglesa pasó de «had followed Saul» a «had gone after Saul» para acercarse más a הָלְכוּ אַחֲרֵי sin perder naturalidad. La versión española refleja esa misma cercanía con «habían ido tras», manteniendo el matiz de movimiento/seguimiento del hebreo y el valor de trasfondo narrativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un término equivalente.
  - «Saúl» sigue la ortografía española habitual de nombres bíblicos.
  - La combinación «era el menor» / «los tres mayores» conserva el paralelismo de contraste edad-rango del hebreo sin añadir información no presente en el texto.
