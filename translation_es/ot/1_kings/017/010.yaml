  to: 'Así que se levantó y fue a Sarepta. Cuando llegó a la entrada de la ciudad[a], allí había una viuda recogiendo palos. La llamó y le dijo: «Por favor, tráeme un poco de agua en un recipiente, para que beba».'
  rationale: 'La revisión conserva el sentido del hebreo y la decisión inglesa documentada, pero mejora la naturalidad del español y corrige dos puntos léxicos importantes: כְּלִי debe mantenerse genérico («recipiente») y מְקֹשֶׁשֶׁת עֵצִים se refleja mejor como «recogiendo palos». También se aligera la sintaxis de וְהִנֵּה para un español moderno y digno.'
