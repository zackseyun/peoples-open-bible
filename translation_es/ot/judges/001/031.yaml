translation:
  language: es
  text: Aser no expulsó a los habitantes de Acó[a][b], ni a los habitantes de Sidón, ni a Ahlab, ni a Aczib, ni a Helbah, ni a Afec, ni a Rehob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no desposeyó' o 'no desalojó'. El verbo hebreo se refiere a quitar a los ocupantes anteriores de la posesión de la tierra.
    reason: lexical_alternative
  - marker: b
    text: Acó es una ciudad costera antigua, conocida más tarde como Acre.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹרִישׁ
  english_pob_choice: did not drive out
  chosen_spanish: no expulsó
  alternatives_spanish:
  - no desalojó
  - no desposeyó
  lexicon: HALOT
  rationale: En contextos de conquista, el verbo puede implicar quitar a un pueblo de su posesión. En español, 'expulsó' comunica bien ese acto de remover a los habitantes y evita una formulación pesada; 'desposeyó' conserva más literalmente la idea de posesión, pero suena menos natural aquí.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los moradores de
  - los residentes de
  lexicon: HALOT
  rationale: El participio señala a quienes viven en un lugar. 'Los habitantes de' es idiomático en español y mantiene el sentido colectivo del hebreo.
- source_word: עַכּוֹ
  english_pob_choice: Acco
  chosen_spanish: Acó
  alternatives_spanish:
  - Aco
  - Acco
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio. 'Acó' sigue de cerca la forma hebrea y evita la actualización histórica de 'Acre', que sería anacrónica en este contexto bíblico.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidon
  lexicon: HALOT
  rationale: Nombre propio geográfico de uso establecido en español bíblico.
- source_word: אַחְלָב
  english_pob_choice: Ahlab
  chosen_spanish: Ahlab
  alternatives_spanish:
  - Ajlab
  lexicon: HALOT
  rationale: Topónimo transliterado. Se conserva la forma del hebreo sin intentar identificarlo ni traducirlo.
- source_word: אַכְזִיב
  english_pob_choice: Achzib
  chosen_spanish: Aksib
  alternatives_spanish:
  - Aczib
  - Aksib
  lexicon: HALOT
  rationale: Topónimo transliterado directamente desde el hebreo; 'Aksib' refleja mejor la secuencia consonántica que una forma más tradicionalizada.
- source_word: חֶלְבָּה
  english_pob_choice: Helbah
  chosen_spanish: Helba
  alternatives_spanish:
  - Helbah
  - Jelba
  lexicon: HALOT
  rationale: El hebreo consonántico y la terminación breve permiten una adaptación española sencilla. Se elige 'Helba' por claridad y eufonía, aunque la tradición inglesa refleje 'Helbah'.
- source_word: אֲפִיק
  english_pob_choice: Aphek
  chosen_spanish: Afec
  alternatives_spanish:
  - Aphek
  - Afeq
  lexicon: HALOT
  rationale: Topónimo transliterado con adaptación ortográfica al español. 'Afec' evita una grafía inglesa innecesaria y conserva la pronunciación aproximada.
- source_word: רְחֹב
  english_pob_choice: Rehob
  chosen_spanish: Rehob
  alternatives_spanish:
  - Rejob
  - Rehób
  lexicon: HALOT
  rationale: Nombre propio conservado como transliteración breve y reconocible en español bíblico.
- source_word: וְ/אֶת ... וְ/אֶת ...
  english_pob_choice: or ... or ... or
  chosen_spanish: ni ... ni ... ni ...
  alternatives_spanish:
  - y ... y ... y ...
  - o ... o ... o ...
  lexicon: Hebrew syntax / BDB
  rationale: Tras la negación, la lista distributiva se expresa de forma natural en español con 'ni'. Así se evita sugerir coordinación afirmativa y se conserva la acumulación de lugares no expulsados.
theological_decisions:
- issue: Valor del verbo de conquista
  english_pob_reading: '''did not drive out'' preserves the force of removing prior occupants from possession of the land.'
  chosen_spanish_reading: '''no expulsó'' preserva la idea de quitar a los habitantes de su lugar/posesión'
  alternative_spanish_readings:
  - no desposeyó
  - no desalojó
  rationale: El verso describe un fracaso en la conquista; no es solo cambio de residencia, sino incapacidad de remover a los pobladores anteriores. 'Expulsó' mantiene la tensión narrativa y el sentido de conquista sin cargar con una terminología demasiado técnica.
  doctrine_reference: Joshua-Judges conquest theology; land possession motif
- issue: Lista de pueblos y ciudades bajo negación
  english_pob_reading: the repeated 'or' reflects the distributive listing after a negated verb
  chosen_spanish_reading: la repetición de 'ni' refleja la lista distributiva bajo la negación
  alternative_spanish_readings:
  - ni... ni... ni
  - o... o... o
  rationale: En español, 'ni' es la forma más clara para enumerar elementos negados. Mantiene el valor distributivo del hebreo sin ambigüedad lógica.
  doctrine_reference: Hebrew negation and distributive syntax
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el hebreo de Jueces 1:31 y el audit trail inglés, sin cambios de revisión relevantes: el sentido verbal de conquista se conserva con ''expulsó'', y la lista final se expresa distributivamente con ''ni'' para reflejar la negación hebrea.'
  spanish_consistency_notes:
  - Se mantiene el criterio POB de transliterar topónimos y no sustituirlos por equivalentes modernos salvo nota cultural.
  - '''Yahvé'' no aparece en este verso; no se requiere decisión sobre el nombre divino.'
  - La puntuación y la coordinación siguen la sintaxis española natural sin alterar la enumeración del hebreo.
