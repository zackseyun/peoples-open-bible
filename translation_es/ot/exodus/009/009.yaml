review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: doble resultado con וְהָיָה, dispersión como polvo fino por toda Egipto, y afección sobre humanos y animales en todo el territorio. Sin embargo, «úlceras supurantes» no refleja tan fielmente שְׁחִין como el campo semántico de «sarna/forúnculos/hervores/llagas» eruptivos; además, omite el matiz de פֹּרֵחַ אֲבַעְבֻּעֹת (''que brota/erupciona con ampollas'').'
  spanish_quality_summary: El español es claro y digno, pero «úlceras supurantes» suena más clínico y menos natural para una plaga cutánea eruptiva. «Sobre el hombre» es defendible por el contraste hombre/bestia, aunque en español actual puede sentirse algo rígido; no requiere cambio si se conserva la nota. Una reparación menor mejora fidelidad y legibilidad.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión sobre אָדָם como «el hombre» con nota alternativa es aceptable. El problema principal es léxico-médico en לִשְׁחִין פֹּרֵחַ אֲבַעְבֻּעֹת: conviene una formulación española que preserve mejor ''llagas/hervores que brotan con ampollas'' sin caer en arcaísmo excesivo.'
  issues:
  - severity: medium
    issue: «úlceras supurantes» debilita la imagen de שְׁחִין פֹּרֵחַ אֲבַעְבֻּעֹת
    rationale: שְׁחִין no se corresponde de manera natural con «úlceras», y la versión española pierde el componente eruptivo/ampolloso explícito en פֹּרֵחַ אֲבַעְבֻּעֹת. Una expresión como «llagas que brotan con ampollas» refleja mejor el hebreo y sigue siendo idiomática.
  - severity: low
    issue: Falta una nota para la alternativa tradicional del sintagma de las llagas
    rationale: El inglés POB conservó una nota con la tradición 'boils breaking out with blains'. Dado que la revisión española recupera más de cerca ese contenido semántico, conviene preservar una nota que señale la formulación tradicional española relacionada.
  revised_spanish_text: Y se convertirá en polvo fino sobre toda la tierra de Egipto,[b] y se convertirá en llagas que brotan con ampollas sobre el hombre[a] y sobre la bestia por toda la tierra de Egipto.
  revised_footnotes:
