  verdict: revise
  source_alignment_summary: 'El borrador español sigue el hebreo principal adoptado en el expediente, no el griego alterno. Sin embargo, no reproduce bien el valor exhortativo del inglés POB "do not incur guilt", porque cambió a futuro indicativo "no incurrirás". Además, la nota al pie documenta mal la relación de testigos: el inglés POB conserva como nota la línea hebrea divergente frente al texto principal, mientras que aquí el texto principal ya es hebreo y la nota pasa al griego; eso puede aceptarse como adaptación española del expediente, pero debe explicarse con mayor precisión y sin afirmar implícitamente que el griego es simplemente "conservado" sin aclarar que es lectura alternativa.'
  spanish_quality_summary: El español es claro y natural en general. "Y si te acercas" funciona. "Para no perder tu vida" suena más final que precautorio; "no sea que pierdas tu vida" refleja mejor פן. "No incurrirás en culpa" es gramatical, pero menos fiel que un imperativo/ exhortación como "no incurras en culpa".
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas son en su mayor parte adecuadas: "culpa" para אשם y "vida" para נשמה son defendibles. El principal ajuste es sintáctico-semántico: mantener la prohibición/exhortación y la advertencia de "lest".'
  issues:
  - severity: high
    issue: Modo verbal incorrecto en "no incurrirás en culpa"
    rationale: 'El inglés POB auditado tiene valor exhortativo: "do not incur guilt". El español en futuro indicativo vuelve la frase descriptiva/predictiva, no exhortativa. "No incurras en culpa" o "no te hagas culpable" preserva mejor la fuerza imperativa.'
  - severity: medium
    issue: '"para no perder tu vida" debilita el matiz de advertencia'
    rationale: 'El hebreo פן introduce prevención/temor: "no sea que" o "para que no" según contexto. Aquí "para no" suena teleológico y puede sugerir intención del sujeto, no riesgo advertido.'
  - severity: medium
    issue: La nota al pie necesita mayor precisión textual
    rationale: La nota actual solo cita el griego divergente. Dado el historial auditado contradictorio, conviene explicitar que el griego preserva una línea sustancialmente distinta, para transparencia y para no parecer una simple variante menor.
  revised_spanish_text: Y si te acercas[a], no incurras en culpa, no sea que pierdas tu vida.
