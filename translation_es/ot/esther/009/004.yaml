translation:
  language: es
  text: Porque Mardoqueo era grande en la casa del rey, y la noticia acerca de él[a] se iba extendiendo por todas las provincias, porque el hombre Mardoqueo iba creciendo cada vez más[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su fama». Literalmente, «su noticia/reporte», es decir, la noticia acerca de él.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el hombre Mardoqueo iba y se hacía grande», un modismo hebreo para un aumento continuo de prominencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: El hebreo introduce una explicación causal o justificativa. «Porque» preserva esa relación de causa sin forzar un matiz más fuerte que el del texto.
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - importante
  - poderoso
  - de gran importancia
  lexicon: HALOT
  rationale: En este contexto describe prominencia o alta consideración en la corte. «Grande» conserva el alcance amplio del término sin reducirlo solo a poder político.
- source_word: בְּבֵית הַמֶּלֶךְ
  english_pob_choice: in the king’s house
  chosen_spanish: en la casa del rey
  alternatives_spanish:
  - en el palacio real
  - en la corte del rey
  lexicon: HALOT
  rationale: «Casa del rey» sigue de cerca la imagen hebrea y mantiene la referencia al ámbito real sin sobreinterpretarla como palacio o corte, aunque esas ideas puedan estar implícitas.
- source_word: שָׁמְעוֹ
  english_pob_choice: the report about him
  chosen_spanish: su fama
  alternatives_spanish:
  - la noticia acerca de él
  - el informe sobre él
  - su reputación
  lexicon: HALOT
  rationale: La forma puede expresar noticia, reporte o fama. «Su fama» comunica de manera natural la idea de renombre creciente que circula por las provincias, sin perder el valor de notoriedad pública.
- source_word: הוֹלֵךְ
  english_pob_choice: was spreading
  chosen_spanish: iba extendiéndose
  alternatives_spanish:
  - se iba difundiendo
  - iba corriendo
  - seguía avanzando
  lexicon: HALOT
  rationale: Con «su fama» como sujeto, el participio expresa movimiento continuo y expansión. «Iba extendiéndose» refleja el proceso progresivo con fluidez natural en español.
- source_word: בְּכָל הַמְּדִינוֹת
  english_pob_choice: through all the provinces
  chosen_spanish: por todas las provincias
  alternatives_spanish:
  - en todas las provincias
  - a través de todas las provincias
  - por todo el territorio
  lexicon: HALOT
  rationale: «Provincias» es el equivalente contextual habitual en Ester para la división administrativa persa. «Por todas» expresa bien la difusión distribuida del rumor o fama.
- source_word: הָאִישׁ מָרְדֳּכַי
  english_pob_choice: the man Mordecai
  chosen_spanish: el hombre Mardoqueo
  alternatives_spanish:
  - este hombre Mardoqueo
  - Mardoqueo mismo
  lexicon: HALOT
  rationale: El artículo con «hombre» conserva el énfasis del hebreo. «El hombre Mardoqueo» mantiene el tono formal y enfático del original.
- source_word: הוֹלֵךְ וְגָדוֹל
  english_pob_choice: was becoming greater and greater
  chosen_spanish: iba creciendo cada vez más
  alternatives_spanish:
  - seguía creciendo en importancia
  - iba haciéndose cada vez más grande
  - crecía y crecía
  lexicon: HALOT
  rationale: El hebreo es un modismo de incremento continuo. «Iba creciendo cada vez más» transmite el sentido progresivo y repetitivo sin sonar mecánico.
translation_notes:
  revision_awareness: 'Se siguió el sentido del texto hebreo y el audit trail inglés sin cambios sustanciales respecto de la lectura base: se mantuvo la estructura causal, el ámbito real, la expansión de la fama/noticia y el modismo de crecimiento progresivo. No se detectaron revisiones aplicadas en el material de referencia.'
  spanish_consistency_notes:
  - Se usó «Mardoqueo» para el nombre propio de manera consistente con la tradición bíblica en español.
  - Se conservó «provincias» para מדינות, acorde con el contexto administrativo persa de Ester.
  - Se prefirió «fama» en el texto principal porque en español comunica con naturalidad la difusión pública implícita en שָׁמְעוֹ; la nota conserva la alternativa más literal.
  - Se mantuvo el paralelismo causal de los dos כִּי del hebreo con dos oraciones introducidas por «porque».
