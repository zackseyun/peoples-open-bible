    text: 'Hebreo literalmente: "cortaron un pacto".'
    reason: lexical_alternative
  - marker: b
    text: O "en Horesh"; el hebreo puede entenderse como un nombre de lugar o como "la zona boscosa" / "el bosque".
    reason: alternative_reading
  revision_rationale: La revisión es menor. Se cambia 'en el bosque' por 'en la zona boscosa' para reflejar mejor el hebreo חֹרְשָׁה y la elección auditada en inglés ('the wooded area'), manteniendo en nota la posibilidad de topónimo. También se pule la redacción de las notas para un español más natural y consistente.
