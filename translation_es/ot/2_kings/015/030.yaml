  glossary_alignment: No hay conflictos con los términos doctrinales del proyecto. Los nombres Oseas, Peka, Jotam y Uzías son aceptables en español eclesial. La elección «conspiró contra» concuerda con la revisión inglesa auditada. La omisión relevante está en la nota cronológica preservada por el POB inglés, que debe mantenerse también en español.
