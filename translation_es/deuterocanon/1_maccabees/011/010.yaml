    issue: «me arrepiento» para μεταμεμέλημαι
    rationale: Aunque posible, en español bíblico y eclesial «arrepentirse» suele evocar cambio moral ante el pecado. Aquí el contexto es de pesar político/personal; «lamento» o «me pesa» preserva mejor el matiz de regret documentado por la POB inglesa.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa distinta
    rationale: El texto principal dice «procuró matarme», pero la nota también cita «procuró matarme» como supuesta alternativa. Debe reflejar la otra posibilidad semántica del griego, p. ej. «intentó matarme».
  revised_spanish_text: Pues lamento haberle dado mi hija[a], porque procuró matarme.
