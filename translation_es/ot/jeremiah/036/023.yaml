  rationale: 'Se hicieron ajustes menores de español y referencia pronominal sin cambiar el sentido: ''leía'' expresa mejor la iteración narrativa; ''la cortaba / la arrojaba'' concuerda mejor con el objeto femenino implícito en hebreo; y ''se consumió'' es más idiomático que ''fue consumido'' en este contexto.'
