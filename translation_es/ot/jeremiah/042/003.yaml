translation:
  language: es
  text: para que Yahvé, tu Dios, nos indique el camino por el que hemos de andar[a], y lo que hemos de hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el asunto que hemos de hacer»; también, «la cosa que hemos de hacer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַגֶּד
  english_pob_choice: may tell
  chosen_spanish: nos indique
  alternatives_spanish:
  - nos diga
  - nos declare
  - nos haga saber
  lexicon: HALOT
  rationale: El hebreo es un jussivo/petición en contexto de ruego. «Nos indique» comunica bien la solicitud de guía sin convertirla en un futuro simple ni endurecerla como una proclamación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton, conforme al criterio de la POB en español. «Yahvé» es la forma establecida en este proyecto para evitar la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: El sufijo de segunda masculina singular exige «tu». «Dios» mantiene la referencia al Dios de Israel; la minúscula «dios» alteraría indebidamente el referente teológico.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: Aunque «camino» no calca el hebreo de forma rígida, en español es la metáfora más natural para curso de conducta y armoniza con «andar».
- source_word: אֲשֶׁר נֵלֶךְ בָּהּ
  english_pob_choice: in which we should walk
  chosen_spanish: por donde hemos de andar
  alternatives_spanish:
  - en el cual hemos de andar
  - por donde debemos andar
  lexicon: HALOT
  rationale: El hebreo usa la imagen de andar por un camino. «Por donde hemos de andar» conserva la metáfora y el matiz de dirección solicitada; «andar» suena más natural que «caminar» en este giro idiomático.
- source_word: הַדָּבָר
  english_pob_choice: the thing
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la materia
  lexicon: HALOT
  rationale: La POB inglesa eligió un término amplio para evitar restringir el hebreo a «palabra». En español, «la cosa» mantiene esa amplitud y refleja el paralelismo con «el camino», aunque «el asunto» también sería posible.
- source_word: אֲשֶׁר נַעֲשֶׂה
  english_pob_choice: that we should do
  chosen_spanish: que hemos de hacer
  alternatives_spanish:
  - que debemos hacer
  - que debemos realizar
  lexicon: HALOT
  rationale: «Hemos de hacer» conserva la orientación volitiva/peticionaria del contexto sin forzar una obligación absoluta. Mantiene también la correspondencia con el verbo simple עשה.
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo nombra explícitamente a YHWH. Se evita la sustitución litúrgica por «el SEÑOR» porque la política de la POB en español preserva el nombre divino, no un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de petición frente a simple futuro en la guía divina
  english_pob_reading: may tell ... should walk ... should do
  chosen_spanish_reading: nos indique ... hemos de andar ... hemos de hacer
  alternative_spanish_readings:
  - nos dirá ... andaremos ... haremos
  - nos diga ... debemos andar ... debemos hacer
  rationale: El contexto es una súplica para recibir dirección, no una predicción. «Nos indique» y «hemos de» conservan esa orientación rogativa y el carácter de dependencia de Yahvé.
  doctrine_reference: Jeremías 42:3, contexto de consulta a Yahvé
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto inglés como sin cambios y con alto acuerdo entre revisores. Este borrador sigue ese valor estable y conserva la alternativa léxica principal de הַדָּבָר en nota, como hizo la POB inglesa con «thing/matter».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Dios» con mayúscula para reflejar el referente divino.
  - Se conserva la metáfora de camino/andar sin reemplazarla por una paráfrasis abstracta.
  - «La cosa» reproduce el alcance amplio de הַדָּבָר, con nota de alternativa más idiomática si se prefiere «asunto».
