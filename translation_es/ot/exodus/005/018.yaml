translation:
  language: es
  text: Ahora bien[a], vayan, trabajen; pero no se les dará paja; sin embargo, ustedes deben entregar la cantidad exigida de ladrillos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la cuota de ladrillos'. El hebreo תֹכֶן se refiere a una cantidad fija o medida exigida a los trabajadores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Conserva el valor transicional y enfático de la expresión al inicio del mandato. 'Así que ahora' reproduce bien la conclusión discursiva sin sonar mecánico en español.
- source_word: לְכוּ
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan de una vez
  - anden
  lexicon: HALOT
  rationale: El imperativo plural en contexto funciona como una orden directa. 'Vayan' es natural, claro y suficientemente fuerte en español.
- source_word: עִבְדוּ
  english_pob_choice: work
  chosen_spanish: trabajen
  alternatives_spanish:
  - laboren
  - sirvan
  lexicon: HALOT
  rationale: En este contexto se trata de trabajo forzado, no de servicio cultual. 'Trabajen' comunica la orden de labor de manera natural; 'sirvan' sería demasiado ambiguo en español.
- source_word: וְתֶבֶן
  english_pob_choice: but straw
  chosen_spanish: pero no se les dará paja
  alternatives_spanish:
  - y paja
  - pero paja
  lexicon: HALOT
  rationale: El hebreo presenta contraste con la orden anterior. En español conviene explicitar el valor adversativo con 'pero' para reflejar la fuerza del contexto.
- source_word: יִנָּתֵן לָכֶם
  english_pob_choice: will not be given to you
  chosen_spanish: no se les dará
  alternatives_spanish:
  - no les será dada
  - no se les suministrará
  lexicon: HALOT
  rationale: La pasiva de נתן se vierte de forma directa con 'se les dará'. Es una forma natural y fiel, sin introducir el matiz interpretativo de 'suministrar'.
- source_word: תֹכֶן
  english_pob_choice: the required number
  chosen_spanish: la cantidad requerida
  alternatives_spanish:
  - el cupo requerido
  - la cuota
  lexicon: HALOT
  rationale: 'Sigue la lectura auditada del inglés POB: se trata de una medida fija o exigida. ''Cantidad requerida'' conserva la idea de medida obligatoria de manera clara en español.'
- source_word: לְבֵנִים
  english_pob_choice: of bricks
  chosen_spanish: de ladrillos
  alternatives_spanish:
  - de adobes
  - de bloques
  lexicon: HALOT
  rationale: El término español común y bíblicamente inteligible es 'ladrillos'. Aunque el material exacto puede variar, esta elección comunica bien el objeto requerido.
- source_word: תִּתֵּנּוּ
  english_pob_choice: you must deliver
  chosen_spanish: ustedes deben entregar
  alternatives_spanish:
  - ustedes deben producir
  - ustedes deben dar
  lexicon: HALOT
  rationale: En contexto, el verbo no pide simplemente 'dar' sino cumplir la cuota exigida de producción. 'Entregar' expresa bien la obligación de presentar el número requerido.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura aprobada del inglés POB sin cambios sustanciales: el versículo conserva el mandato enfático, la negación de suministro de paja y la exigencia de una cantidad fija de ladrillos. La nota de pie preserva la alternativa léxica documentada para תֹכֶן.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en lugar de SEÑOR según la norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Paja'' corresponde a straw y mantiene el contraste material con los ladrillos.'
  - '''Cantidad requerida'' evita una paráfrasis excesiva y conserva la noción de cuota o medida fija.'
  - Se prefirió 'ladrillos' como término natural y ampliamente comprensible en español bíblico.
