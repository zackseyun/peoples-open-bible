  yaml_path: translation/ot/1_samuel/012/006.yaml
  text: Then Samuel said to the people[b][a], “Yahweh is the one who appointed Moses and Aaron and who brought your fathers up from the land of Egypt.”
  footnotes:
  - marker: a
    text: Or, more literally, 'the LORD who made Moses and Aaron.' The Hebrew verb can be rendered 'made,' but here likely refers to the LORD's appointing or establishing them in their roles.
    reason: lexical_alternative
  - marker: b
    text: '''Your fathers'' may also be understood more broadly as ''your ancestors.'''
    reason: lexical_alternative
