review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: preserva «nombre», expresa la preferencia comparativa de נבחר y mantiene el paralelo con «favor» frente a bienes materiales. Sin embargo, «a grandes riquezas» suena menos natural que «más que las grandes riquezas» o «antes que grandes riquezas», y la nota de alternativa para נבחר no refleja bien la opción inglesa auditada «is to be chosen».'
  spanish_quality_summary: 'El texto es claro y digno, pero requiere un pequeño ajuste de naturalidad y precisión idiomática. «Un nombre» puede mantenerse, aunque en proverbios españoles suena más idiomático sin artículo indefinido: «El nombre». No obstante, para conservar el matiz no genérico del hebreo y la decisión inglesa de evitar «good name», la mejor solución es mantener «Un nombre» y mejorar la comparación: «más que las grandes riquezas».'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Favor» para חֵן está bien justificado, con «gracia» como alternativa en nota. «Nombre» conserva adecuadamente la imagen hebrea con nota explicativa sobre reputación/honor.
  issues:
  - severity: medium
    issue: La frase «es preferible a grandes riquezas» es menos natural en español bíblico-literario contemporáneo.
    rationale: Aunque comprensible, en este proverbio la comparación se expresa con más fluidez y fuerza proverbial como «más que las grandes riquezas» o «antes que grandes riquezas», reflejando mejor el מִן comparativo.
  - severity: low
    issue: La nota [b] no preserva la alternativa principal documentada en el POB inglés.
    rationale: La auditoría inglesa da como principal alternancia «is to be chosen» / «more desirable». En español conviene reflejar primero «debe ser escogido» o «ha de escogerse», no solo «más deseable».
  revised_spanish_text: Un nombre[a] es preferible[b] más que las grandes riquezas, y el favor[c] es mejor que la plata y el oro.
  revised_footnotes:
  - marker: a
    text: «Nombre» conserva la imagen hebrea y, en este contexto sapiencial, implica reputación u honor.
    reason: cultural_note
  - marker: b
    text: 'O: «debe ser escogido» o «es más deseable». El hebreo expresa una preferencia de valor, no solo una elección puntual.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «gracia». Aquí חֵן denota favor o aceptación favorable; no se usa en sentido técnico-teológico.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la comparación para reflejar mejor la fuerza proverbial de preferencia y se corrige la nota lexical para alinearla con las alternativas auditadas en inglés. Sin embargo, la redacción principal propuesta sigue siendo muy cercana al borrador original y no requiere adjudicación compleja.
