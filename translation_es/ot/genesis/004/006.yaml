translation:
  language: es
  text: 'Entonces Yahvé dijo a Caín[a]: «¿Por qué te has enojado, y por qué ha decaído tu rostro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «¿Por qué está abatido tu semblante?». El hebreo literalmente dice: «¿Por qué ha decaído tu rostro?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» da fluidez natural en español y conserva la secuencia del relato mejor que un simple «Y».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrama en una forma usada en español bíblico académico y eclesial. No se sustituye por un título como «SEÑOR», para mantener la decisión auditada de traducir el nombre personal de Dios.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Preposición direccional normal en español para introducir el destinatario del habla.
- source_word: קָיִן
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - Cain
  lexicon: convención onomástica estándar
  rationale: Nombre propio transliterado según la convención habitual del español bíblico.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  lexicon: HALOT
  rationale: Interrogativo causal directo y natural en español.
- source_word: חָרָה לָךְ
  english_pob_choice: are you angry
  chosen_spanish: te has enojado
  alternatives_spanish:
  - estás airado
  - ardes de ira
  lexicon: HALOT
  rationale: El hebreo usa un modismo de «arder» para expresar ira; en español, «te has enojado» comunica con claridad el sentido contextual sin perder el valor afectivo del reclamo divino. Se mantiene la tensión idiomática implícita sin forzar una calca literal poco natural.
- source_word: וְלָמָּה
  english_pob_choice: and why
  chosen_spanish: y por qué
  alternatives_spanish:
  - y para qué razón
  lexicon: HALOT
  rationale: Conjunción coordinante más interrogativo equivalente al valor del hebreo.
- source_word: נָפְלוּ פָנֶיךָ
  english_pob_choice: has your face fallen
  chosen_spanish: ha caído tu rostro
  alternatives_spanish:
  - está tu rostro decaído
  - está tu semblante abatido
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de manera auditable, siguiendo la elección inglesa de mantener el literalismo idiomático. «Tu rostro» refleja el hebreo; «ha caído» reproduce la imagen de abatimiento. Se deja abierta la lectura figurada sin reemplazarla por una glosa interpretativa.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. En la línea de la decisión auditada del POB inglés de conservar el nombre propio de Dios, se elige «Yahvé» como forma española reconocible y reverente, evitando el sustituto litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión entre modismo e imagen literal en «חָרָה לָךְ»
  english_pob_reading: are you angry
  chosen_spanish_reading: te has enojado
  alternative_spanish_readings:
  - ardes de ira
  - te irritas
  rationale: La forma hebrea literalmente evoca calor/ardor, pero el sentido contextual es la ira. En español, una traducción natural debe comunicar la emoción; por eso se usa «te has enojado», sin negar la imagen subyacente del hebreo que el inglés POB también resolvió como sentido contextual.
  doctrine_reference: Principios de equivalencia óptima y fidelidad semántica
translation_notes:
  revision_awareness: 'Alineado con la última pasada del audit trail: sin cambios requeridos en el inglés base, y con la misma decisión de preservar la metáfora de «rostro caído» frente a una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política del proyecto para יְהוָה.
  - Se prefiere «Caín» con tilde, según la ortografía española.
  - «Rostro» mantiene el paralelismo con el hebreo; no se sustituye por «semblante» en el texto principal.
  - La puntuación interrogativa y las comillas angulares siguen el uso editorial en español.
