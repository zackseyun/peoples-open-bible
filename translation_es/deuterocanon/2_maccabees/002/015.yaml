translation:
  language: es
  text: 'Y la oración tenía esta forma: «Yahvé Dios[a], creador de todas las cosas, el temible[b] y poderoso y justo y misericordioso, el único rey y el bueno[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí se vierte el vocativo Κύριε ὁ θεός como «Yahvé Dios» por la convención del proyecto de explicitar el nombre divino al dirigirse al Dios de Israel, en lugar de usar «Señor» como sustituto general, aunque la fuente griega dice κύριε.
    reason: theological_note
  - marker: b
    text: '«Temible» traduce el sentido de ὁ φοβερὸς: no significa «malo», sino digno de temor reverente o de asombro. También puede entenderse «imponente» o «majestuoso», pero «temible» conserva mejor la fuerza del griego.'
    reason: lexical_alternative
  - marker: c
    text: O «bondadoso» o «benigno» para χρηστός. Se mantiene «el bueno» para reflejar el cierre nominal del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ ἡ προσευχὴ τὸν τρόπον ἔχουσα τοῦτον
  english_pob_choice: And the prayer had this form
  chosen_spanish: Y la oración tenía esta forma
  alternatives_spanish:
  - Y la oración era de esta manera
  - Y la oración era así
  lexicon: LSJ
  rationale: La construcción griega introduce el contenido de la oración con un giro idiomático. «Tenía esta forma» conserva la estructura y suena natural en español.
- source_word: Κύριε ὁ θεός
  english_pob_choice: Lord God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Señor Dios
  - Oh Yahvé, Dios
  lexicon: LSJ
  rationale: El contexto es una invocación directa al Dios de Israel. En este proyecto, el nombre divino se rinde normalmente como «Yahvé»; «Dios» conserva ὁ θεός como título explícito. Se evita «Señor» como sustituto opaco del nombre divino cuando la evidencia apunta a una dirección vocativa divina.
- source_word: ὁ πάντων κτίστης
  english_pob_choice: creator of all things
  chosen_spanish: creador de todas las cosas
  alternatives_spanish:
  - hacedor de todo
  - creador de todo
  lexicon: LSJ
  rationale: κτίστης expresa claramente «creador». «De todas las cosas» reproduce πάντων de modo natural y completo en español.
- source_word: ὁ φοβερὸς
  english_pob_choice: fearful
  chosen_spanish: el temible
  alternatives_spanish:
  - el que inspira temor
  - el temible, el imponente
  - el impresionante
  lexicon: LSJ
  rationale: El griego indica uno que inspira temor o reverencia. «Temible» conserva esa fuerza semántica con un registro digno; en español moderno puede sonar duro, pero aquí es apropiado para una cadena de atributos divinos.
- source_word: ὁ ἰσχυρὸς
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: LSJ
  rationale: «Poderoso» comunica bien la fuerza divina en una serie litúrgica de atributos y es idiomático en español.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto en justicia
  lexicon: LSJ
  rationale: En español, «justo» preserva el valor moral y jurídico de δίκαιος sin forzar una fórmula menos natural. Se mantiene la tensión entre justicia y rectitud sin convertirla en un término técnico ajeno al pasaje.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - misericorde
  - compasivo
  lexicon: LSJ
  rationale: «Misericordioso» es el equivalente más claro y litúrgicamente inteligible en español para la disposición compasiva de Dios.
- source_word: ὁ μόνος βασιλεὺς
  english_pob_choice: the only king
  chosen_spanish: el único rey
  alternatives_spanish:
  - el solo rey
  - el único soberano
  lexicon: LSJ
  rationale: «El único rey» conserva la exclusividad de μόνος y el título regio de βασιλεύς sin ampliar indebidamente el sentido.
- source_word: χρηστός
  english_pob_choice: good one
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - amable
  lexicon: LSJ
  rationale: Aquí χρηστός funciona como predicado/título final. «Bueno» es el equivalente más directo y mantiene la brevedad coordinada del griego; «bondadoso» o «benigno» explicitan matices, pero añaden más interpretación que el texto no exige.
theological_decisions:
- issue: Nombre divino en la invocación
  english_pob_reading: Lord God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - Señor Dios
  - Dios
  rationale: La POB en inglés usa «Lord» por su convención general; en español, la norma de este proyecto favorece explicitar el nombre divino como «Yahvé» cuando el contexto es una invocación directa al Dios de Israel. Mantener «Dios» traduce ὁ θεός y evita perder la referencia explícita al título divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
- issue: Serie de atributos divinos con artículos definidos
  english_pob_reading: the fearful and mighty and righteous and merciful one
  chosen_spanish_reading: el temible y poderoso y justo y misericordioso
  alternative_spanish_readings:
  - el temible, poderoso, justo y misericordioso
  - el que inspira temor y es poderoso y justo y misericordioso
  rationale: El griego presenta una serie de adjetivos con artículo, con valor casi sustantivado. El español puede expresar esa forma de manera natural sin añadir «uno» repetido, pero conservando el valor predicativo/nominal de la lista. Se mantiene la tensión estilística del original sin sacrificar legibilidad.
  doctrine_reference: 'DOCTRINE.md Contested terms: attributive adjectives in divine doxology'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que añadió el valor sustantivado («the ... one») a la serie de atributos. En español se optó por una construcción equivalente y más natural en la doxología, sin perder la fuerza de la serie definida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se traduce δοῦλος no aplica en este versículo; no se introduce terminología ajena.
  - Se conserva una sintaxis solemne y litúrgica sin copiar mecánicamente el inglés.
  - «Justo» se usa para δίκαιος, dejando implícita la posible lectura «recto» sin ocultarla.
  - La puntuación con comillas angulares y la cadencia respetan el tono de oración del pasaje.
