base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/028/005.yaml
  text: And from among all my sons—for Yahweh has given me many sons—he chose Solomon my son to sit on the throne of the kingdom of Yahweh over Israel[a][b].
  footnotes:
