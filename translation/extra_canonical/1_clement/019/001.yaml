id: 1CLEM.19.1
reference: 1 Clement 19:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Τὴν τοσούτων οὖν καὶ τοιούτων οὕτως μεμαρτυρημένων τε ταπεινοφρόνων καὶ τὸ ὑποδεὲς διὰ τῆς ὑπακοῆς οὐ μόνον ἡμᾶς, ἀλλὰ καὶ τὰς πρὸ ἡμῶν γενεὰς βελτίους ἐποίησεν, τούς τε καταδεξαμένους τὰ λόγια αὐτοῦ ἐν ὁσίῳ καὶ ἀληθείᾳ. 2. πολλῶν οὖν καὶ μεγάλων καὶ ἐνδόξων μετασχόντες πράξεων ἐκτελέσωμεν ἐπὶ τὸν ἐξ ἀρχῆς παραδεδομένον ἡμῖν τῆς εἰρήνης σκοπόν, καὶ ἀτενίσωμεν εἰς τὸν πατέρα καὶ κτίστην τοῦ σύμπαντος κόσμου καὶ ταῖς μεγαλοπρεπέσι καὶ ὑπερβαλλούσαις αὐτοῦ δωρεαῖς τῆς εἰρήνης εὐεργεσίαις τε κολληθῶμεν. 3. ἴδωμεν αὐτὸν κατὰ διάνοῶν καὶ ἐμβλέψωμεν τοῖς ὄμμασιν τῆς ψυχῆς εἰς τὸ μακρόθυμον αὐτοῦ βούλημα· νοήσωμεν, πῶς ἀόργητος ὑπάρχει πρὸς πᾶσαν τὴν κτίσιν αὐτοῦ.
  language: Greek
  pages:
  - 287
  - 289
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: Therefore, the humility and submissiveness of so many and such great people, so well attested, through obedience has made not only us better, but also the generations before us—those who received his oracles in holiness and truth.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: ταπεινοφρόνων
  chosen: humility
  alternatives:
  - lowliness
  - humble-mindedness
  lexicon: LSJ
  rationale: Abstract rendering fits the paired virtues in context and preserves the paraenetic emphasis on a disposition of humble self-estimation rather than mere social lowliness.
- source_word: τὸ ὑποδεές
  chosen: submissiveness
  alternatives:
  - deference
  - lowliness
  - yielding spirit
  lexicon: LSJ
  rationale: The phrase denotes a humble, yielding posture linked with obedience. 'Submissiveness' best captures the ethical sense without reducing it to poverty or inferiority.
- source_word: ὑπακοῆς
  chosen: obedience
  alternatives:
  - compliance
  - attentive submission
  lexicon: BDAG
  rationale: A key ecclesial and moral term; 'obedience' preserves both the hearing and responsive action implied by the Greek and matches the chapter's exhortational force.
- source_word: καταδεξαμένους
  chosen: received
  alternatives:
  - welcomed
  - accepted
  lexicon: LSJ
  rationale: Used for those who took in God's words. 'Received' is idiomatic in biblical English and preserves the reverent posture toward divine speech.
- source_word: τὰ λόγια αὐτοῦ
  chosen: his oracles
  alternatives:
  - his words
  - his utterances
  lexicon: BDAG
  rationale: λόγια often denotes divine utterances rather than ordinary speech. 'Oracles' preserves the sacred register and scriptural cadence.
- source_word: ἐν ὁσίῳ καὶ ἀληθείᾳ
  chosen: in holiness and truth
  alternatives:
  - with piety and truth
  - in a holy and true manner
  lexicon: LSJ
  rationale: This pair carries moral-religious weight. 'Holiness and truth' keeps the elevated style and likely ethical-cultic resonance.
- source_word: μετασχόντες πράξεων
  chosen: have shared in ... deeds
  alternatives:
  - have taken part in ... actions
  - have participated in ... works
  lexicon: LSJ
  rationale: The participle points to participation in notable realities or examples. 'Shared in ... deeds' is natural English while retaining the sense of participation in exemplary acts.
- source_word: ἐκτελέσωμεν
  chosen: let us press on
  alternatives:
  - let us accomplish
  - let us carry through
  lexicon: LSJ
  rationale: In this hortatory context, the verb moves the audience toward active pursuit of the stated goal. 'Press on' conveys exhortational momentum better than the more wooden 'accomplish.'
- source_word: σκοπόν
  chosen: goal
  alternatives:
  - mark
  - aim
  lexicon: BDAG
  rationale: The image is directional and teleological. 'Goal' is clear modern English and preserves the metaphor of directed striving.
- source_word: κολληθῶμεν
  chosen: cling
  alternatives:
  - be joined
  - cleave
  - hold fast
  lexicon: LSJ
  rationale: The verb is strong and relational. 'Cling' preserves the vivid attachment implied by the Greek and suits the devotional tone.
- source_word: δωρεαῖς τῆς εἰρήνης εὐεργεσίαις
  chosen: gifts of peace and acts of kindness
  alternatives:
  - peaceful gifts and benefactions
  - gifts and benefactions of peace
  lexicon: LSJ
  rationale: The construction likely piles up near-synonymous beneficent terms. This rendering preserves both nouns distinctly while keeping readable English.
- source_word: κατὰ διάνοιαν
  chosen: in our mind
  alternatives:
  - with the mind
  - in understanding
  lexicon: LSJ
  rationale: The phrase calls for inward contemplation. 'In our mind' is concise and pairs well with the following 'eyes of the soul.'
- source_word: τοῖς ὄμμασιν τῆς ψυχῆς
  chosen: with the eyes of the soul
  alternatives:
  - with the soul's eyes
  - with inward eyes
  lexicon: LSJ
  rationale: The metaphor is rhetorically important and should be preserved rather than flattened into abstract language.
- source_word: μακρόθυμον ... βούλημα
  chosen: patient purpose
  alternatives:
  - longsuffering will
  - forbearing intention
  lexicon: LSJ
  rationale: μακρόθυμος conveys patient restraint; βούλημα is purpose or will. 'Patient purpose' is readable while retaining theological depth.
- source_word: ἀόργητος
  chosen: free from anger
  alternatives:
  - without wrath
  - unangered
  lexicon: LSJ
  rationale: The term emphasizes God's non-irascibility toward creation in this context. 'Free from anger' is natural English and avoids archaic phrasing while preserving the attribute.
- source_word: κτίσιν
  chosen: creation
  alternatives:
  - creaturely order
  - what he has made
  lexicon: BDAG
  rationale: The collective sense is intended here, referring to the whole created order under God's patient governance.
theological_decisions:
- issue: Reference of αὐτοῦ / 'his' in 'those who received his oracles'
  chosen_reading: God is the referent
  alternative_readings:
  - A more immediate antecedent within the chain of exemplars
  rationale: The phrase τὰ λόγια αὐτοῦ in this paraenetic context most naturally refers to God's utterances, especially given the subsequent focus on the Father and Creator.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological coherence without over-resolving ambiguity.
- issue: Force of ἀόργητος with respect to God
  chosen_reading: A statement of God's patient restraint toward creation, not a denial of all divine judgment
  alternative_readings:
  - Absolute impassibility phrased as incapacity for anger
  - 'Milder sense: slow to anger'
  rationale: 'Within the immediate context of contemplation of God''s μακρόθυμον βούλημα, the emphasis is pastoral and paraenetic: God is patient and not quick to anger toward all he has made. The rendering avoids importing later metaphysical debates while preserving the text''s theological force.'
  doctrine_reference: Preserve theological tension rather than resolve it.
