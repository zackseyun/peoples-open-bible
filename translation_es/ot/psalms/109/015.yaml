translation:
  language: es
  text: Que estén delante de Yahvé continuamente, y que él corte su memoria de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del país»; el hebreo אֶרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  english_pob_choice: May they be
  chosen_spanish: Que estén
  alternatives_spanish:
  - Que sean
  - Ojalá estén
  lexicon: HALOT
  rationale: El imperfecto qal en este contexto imprecatorio expresa deseo o ruego. «Que estén» transmite bien la fuerza optativa en español sin volverlo una simple afirmación futura.
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» comunica de manera natural la idea espacial y relacional de estar expuestos ante la presencia de alguien.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración en español según la convención del proyecto, evitando la sustitución por un título.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: HALOT
  rationale: «Continuamente» conserva la idea de duración ininterrumpida con un registro digno y claro en español bíblico contemporáneo.
- source_word: וְיַכְרֵת
  english_pob_choice: and may he cut off
  chosen_spanish: y que él corte
  alternatives_spanish:
  - y que él destruya
  - y que él elimine
  lexicon: HALOT
  rationale: El verbo כרת conserva la imagen concreta de cortar y, por extensión, de suprimir o exterminar. «Corte» mantiene esa fuerza verbal sin suavizarla.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra y el suelo
  - del país
  lexicon: HALOT
  rationale: En este versículo, la alternativa inglesa reconoce la ambigüedad de אֶרֶץ. «Tierra» es la opción más amplia y natural en español para el paralelismo con borrar la memoria.
- source_word: זִכְרָם
  english_pob_choice: their memory
  chosen_spanish: su memoria
  alternatives_spanish:
  - su recuerdo
  - la memoria de ellos
  lexicon: HALOT
  rationale: La expresión hebrea alude a la memoria o recuerdo perdurable de una persona. «Su memoria» reproduce ese valor idiomático en español.
theological_decisions:
- issue: Fuerza jussiva/imprecatoria de los verbos
  english_pob_reading: Render both verbs as wishes/prayers rather than simple future statements.
  chosen_spanish_reading: «Que estén… y que él corte…» como ruego imprecatorio.
  alternative_spanish_readings:
  - Estarán… y él cortará…
  - Estén… y corte…
  rationale: El contexto del salmo exige preservar el carácter de súplica/imprecación. La forma elegida evita convertir el verso en una predicción neutral o en mera narración.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase revisado del inglés POB, que no introdujo cambios adicionales, y mantiene la lectura de alta concordancia del revisor. Se conserva la ambigüedad de אֶרֶץ en nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para el Tetragrama.
  - Se conserva la estructura paralela del verso con dos peticiones coordinadas.
  - «Tierra» se mantiene en el texto principal y la alternativa «país» queda documentada en la nota.
  - El registro es bíblico formal, pero con sintaxis española natural y publicable.
