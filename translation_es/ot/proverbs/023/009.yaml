  - marker: b
    text: 'O: «el buen juicio»; el término hebreo puede abarcar sabiduría, discernimiento o sensatez.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el primer segmento para reflejar mejor el modismo hebreo בְּאָזְנֵי y la decisión inglesa «in the hearing of» sin introducir la connotación española de susurro de «al oído de». Se conservan «necio» y «sabiduría» por su fidelidad al registro sapiencial y al audit trail.
