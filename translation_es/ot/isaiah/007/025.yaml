translation:
  language: es
  text: Y en cuanto a todos los montes que antes se cavaban con la azada[a], no irás allá[b] por miedo de espinos y zarzas; y serán lugar para soltar bueyes[c] y para el pisoteo de ovejas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se trabajaban/labraban con la azada». El hebreo usa un sustantivo y un verbo cognados para la labor con azada.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo puede entenderse de manera genérica: «no irá allí nadie».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un lugar donde se sueltan los bueyes»; también, de manera más interpretativa, «pasto para bueyes».'
    reason: lexical_alternative
  - marker: d
    text: «Ovejas» traduce שֶׂה, que también puede referirse de manera más amplia al ganado menor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And as for all
  chosen_spanish: Y en cuanto a todos
  alternatives_spanish:
  - Y todos
  - Y respecto de todos
  lexicon: HALOT
  rationale: El hebreo introduce un nuevo tramo descriptivo con un matiz topical. «En cuanto a» reproduce bien ese desplazamiento sin sonar forzado en español.
- source_word: הֶהָרִים
  english_pob_choice: the hills
  chosen_spanish: los montes
  alternatives_spanish:
  - las colinas
  - los cerros
  lexicon: HALOT
  rationale: הַר puede ser «montaña» o «monte»; en este contexto agrícola y de relieve trabajado, «montes» suena natural y mantiene dignidad bíblica sin perder claridad.
- source_word: אֲשֶׁר בַּמַּעְדֵּר יֵעָדֵרוּן
  english_pob_choice: that used to be hoed with a hoe
  chosen_spanish: que antes se desyerbaban con la azada
  alternatives_spanish:
  - que se cavaban con la azada
  - que se trabajaban con azada
  lexicon: HALOT
  rationale: El hebreo usa un juego cognado entre el sustantivo y el verbo para la acción de trabajar la tierra. «Desyerbar con la azada» comunica la labor agrícola y el contraste con la desolación posterior; se conserva la idea de terreno antes cultivado. El matiz de «antes» refleja el estado previo implícito en el contexto.
- source_word: לֹא תָבוֹא שָׁמָּה
  english_pob_choice: you will not go there
  chosen_spanish: no irás allá
  alternatives_spanish:
  - no entrarás allí
  - no pasarás por allí
  lexicon: HALOT
  rationale: El verbo en 2ms puede funcionar genéricamente; el español con «irás» mantiene la impersonalidad retórica en una forma natural. «Allá» conserva la distancia espacial del lugar evitado.
- source_word: יִרְאַת שָׁמִיר וָשָׁיִת
  english_pob_choice: for fear of briers and thorns
  chosen_spanish: por miedo de espinos y zarzas
  alternatives_spanish:
  - por temor a espinos y zarzas
  - por miedo a brieres y espinos
  lexicon: HALOT
  rationale: La pareja hebrea denota maleza espinosa de desolación. «Espinos y zarzas» es claro y bíblicamente reconocible en español; se evita una expresión más técnica que oscurezca la imagen.
- source_word: וְהָיָה
  english_pob_choice: they will become
  chosen_spanish: y vendrán a ser
  alternatives_spanish:
  - y serán
  - y se convertirán en
  lexicon: HALOT
  rationale: Aunque el verbo es singular en hebreo, retoma colectivamente los montes. «Vendrán a ser» mantiene esa referencia plural implícita y suena natural en español.
- source_word: לְמִשְׁלַח שׁוֹר
  english_pob_choice: a place for the sending out of oxen
  chosen_spanish: para soltar bueyes
  alternatives_spanish:
  - para dejar salir bueyes
  - como sitio para soltar bueyes
  lexicon: HALOT
  rationale: מִשְׁלַח conserva la idea concreta de «enviar/soltar» animales. «Soltar bueyes» preserva esa imagen sin convertirla demasiado pronto en una glosa como «pastura».
- source_word: וּלְמִרְמַס שֶׂה
  english_pob_choice: for the trampling of sheep
  chosen_spanish: y para el pisoteo de ovejas
  alternatives_spanish:
  - y para el paso de ovejas
  - y para ser pisoteado por ovejas
  lexicon: HALOT
  rationale: מִרְמַס expresa el acto de pisotear. «Pisoteo de ovejas» conserva la concreción del sustantivo de acción y el paralelismo con la primera cola.
translation_notes:
  revision_awareness: 'La revisión más reciente del expediente inglés no introdujo cambios: se mantiene la lectura óptima-equivalente ya aprobada, con acuerdo alto y solo observaciones menores. Esta versión española sigue de cerca el reparto semántico del hebreo y conserva las alternativas léxicas relevantes.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió un registro bíblico claro y actual, sin sustituir la imagen agrícola por una paráfrasis excesiva.
  - «Bueyes» se usó para שׁוֹר siguiendo el valor lexical básico del animal de tiro, en paralelo con el uso agrícola del verso.
  - «Espinos y zarzas» reproduce la imagen de desolación con un par español idiomático y no doctrinalmente cargado.
