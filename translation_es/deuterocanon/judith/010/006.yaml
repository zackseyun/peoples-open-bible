translation:
  language: es
  text: Y salieron a la puerta de la ciudad de Betulia[a], y hallaron a Ozías de pie allí, y a Cabris y Carmis, los ancianos de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «hallaron a Ozías estando sobre/ante ella», es decir, sobre la puerta o junto a ella; se traduce de manera idiomática como «de pie allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - salieron afuera
  lexicon: LSJ
  rationale: El aoristo de ἐξέρχομαι indica movimiento hacia afuera; en español, «salieron» transmite el sentido de salida sin añadir coloración innecesaria.
- source_word: ἐπὶ τὴν πύλην
  english_pob_choice: to the gate
  chosen_spanish: a la puerta
  alternatives_spanish:
  - hacia la puerta
  - sobre la puerta
  lexicon: LSJ
  rationale: Con verbo de movimiento, ἐπί + acusativo expresa dirección. En español, «a la puerta» conserva ese valor de movimiento de manera natural.
- source_word: τῆς πόλεως Βαιτυλουά
  english_pob_choice: of the city of Bethulia
  chosen_spanish: de la ciudad de Betulia
  alternatives_spanish:
  - de Betulia, la ciudad
  - de la villa de Betulia
  lexicon: LSJ
  rationale: πόλις se rinde normalmente como «ciudad». El nombre se translitera como «Betulia» para seguir la política del proyecto con nombres propios.
- source_word: εὗρον
  english_pob_choice: found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - se toparon con
  lexicon: LSJ
  rationale: «Hallaron» conserva el valor lexical de εὗρον y suena natural en registro bíblico sin forzar el matiz de simple percepción visual.
- source_word: ἐφεστῶτα
  english_pob_choice: standing there
  chosen_spanish: de pie allí
  alternatives_spanish:
  - allí presente
  - apostado allí
  lexicon: LSJ
  rationale: El participio perfecto de ἐφίστημι describe presencia inmediata junto a la puerta. «De pie allí» preserva la idea de estar situado en ese lugar sin introducir un matiz militar o administrativo.
- source_word: ἐπʼ αὐτῇ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - sobre ella
  - en ella
  lexicon: LSJ
  rationale: El pronombre retoma la puerta. En español, «allí» comunica la ubicación de manera idiomática, como en el inglés POB «standing there».
- source_word: Ὀζίαν
  english_pob_choice: Uzziah
  chosen_spanish: Uzzías
  alternatives_spanish:
  - Ozías
  lexicon: LSJ
  rationale: Se prefiere la forma bíblica usual en español, «Uzzías», por claridad y reconocimiento; evita una transliteración más griega como «Ozías».
- source_word: τοὺς πρεσβυτέρους τῆς πόλεως
  english_pob_choice: the elders of the city
  chosen_spanish: los ancianos de la ciudad
  alternatives_spanish:
  - los presbíteros de la ciudad
  - los ancianos ciudadanos
  lexicon: LSJ
  rationale: πρεσβύτεροι aquí se refiere a los líderes civiles de la ciudad. «Ancianos» conserva el término social y resulta más idiomático que «presbíteros» en este contexto.
- source_word: Χάβρειν καὶ Χάρμειν
  english_pob_choice: Chabris and Charmis
  chosen_spanish: Cabris y Carmis
  alternatives_spanish:
  - Chabris y Charmis
  - Cabrín y Carmín
  lexicon: LSJ
  rationale: Se transliteran los nombres personales a una forma más legible en español. La adaptación con C- inicial refleja la grafía griega y evita una apariencia excesivamente inglesa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el trazo del POB inglés, manteniendo la coordinación simple de los nombres y evitando añadir expresiones como «junto con», que el paso revisado del inglés ya retiró por mayor correspondencia con el griego.
  spanish_consistency_notes:
  - Se mantiene «Betulia» como transliteración del topónimo, en línea con la política del proyecto para nombres propios.
  - 'Se conserva el orden de los elementos del griego: salida, llegada a la puerta, hallazgo de Uzzías, y mención de los ancianos.'
  - «Ancianos» se usa aquí como equivalente funcional de πρεσβύτεροι, sin cargarlo con una denominación eclesiástica posterior.
