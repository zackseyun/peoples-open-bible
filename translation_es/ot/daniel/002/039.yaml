translation:
  language: es
  text: Y después de ti se levantará otro reino[a], inferior al tuyo; y luego un tercer reino, de bronce[b], que gobernará sobre toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más bajo que tú». La expresión aramea es difícil; el sentido es que el siguiente reino es menor que el de Nabucodonosor en rango o esplendor.
    reason: lexical_alternative
  - marker: b
    text: O «sobre toda la tierra» o «sobre todo el país». El término puede significar «tierra» o «país», pero aquí probablemente se refiere a un dominio imperial amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָתְרָךְ
  english_pob_choice: And after you
  chosen_spanish: Y después de ti
  alternatives_spanish:
  - Después de ti
  - Y tras de ti
  lexicon: HALOT
  rationale: La secuencia temporal y de sucesión se expresa naturalmente en español con «después de ti». Se conserva la conexión discursiva con «Y» como en el audit trail inglés.
- source_word: תְּקוּם
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: HALOT
  rationale: En contexto de reinos sucesivos, «se levantará» comunica bien la emergencia de un reino sin perder la imagen verbal de ponerse en pie o surgir.
- source_word: מַלְכ֥וּ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio real
  - reinado
  lexicon: HALOT
  rationale: Aquí el sustantivo designa una entidad política. «Reino» es la forma clara y fiel en español para este contexto visionario.
- source_word: אָחֳרִ֖י
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - posterior
  - subsiguiente
  lexicon: HALOT
  rationale: El adjetivo señala continuidad sucesiva con distinción. «Otro» es idiomático y suficientemente preciso en español.
- source_word: ארעא מִנָּךְ
  english_pob_choice: inferior to yours
  chosen_spanish: inferior al tuyo
  alternatives_spanish:
  - más bajo que el tuyo
  - menos que el tuyo
  lexicon: HALOT
  rationale: Sigo la interpretación auditada de comparación de rango o esplendor. «Inferior al tuyo» deja explícita la comparación con el reino de Nabucodonosor, no con la persona en abstracto.
- source_word: וּמַלְכוּ תליתיא
  english_pob_choice: and yet a third kingdom
  chosen_spanish: y luego un tercer reino
  alternatives_spanish:
  - y aun un tercer reino
  - y después un tercer reino
  lexicon: HALOT
  rationale: «Y luego» mantiene la secuencia de los reinos sin añadir énfasis excesivo. «Tercer reino» conserva el orden y la estructura del original.
- source_word: דִּי נְחָשָׁא
  english_pob_choice: of bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  - hecho de bronce
  lexicon: HALOT
  rationale: «De bronce» reproduce la identificación material ligada a la estatua del capítulo. Es la opción más natural y estable en español bíblico contemporáneo.
- source_word: דִּי תִשְׁלַט
  english_pob_choice: which will rule
  chosen_spanish: que dominará
  alternatives_spanish:
  - que gobernará
  - que regirá
  lexicon: HALOT
  rationale: El verbo expresa ejercicio de dominio. «Dominará» captura mejor la fuerza política del término que un simple «gobernará».
- source_word: בְּכָל אַרְעָא
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra habitada
  - sobre toda la tierra/país
  lexicon: HALOT
  rationale: Sigo la lectura universalizante del audit trail inglés. «Tierra» mantiene la amplitud imperial del contexto, aunque el arameo también puede admitir «país» o «tierra/land».
theological_decisions:
- issue: Sentido de ארעא מִנָּךְ (comparación de inferioridad)
  english_pob_reading: inferior to yours
  chosen_spanish_reading: inferior al tuyo
  alternative_spanish_readings:
  - más bajo que el tuyo
  - menos que el tuyo
  rationale: La frase aramea es difícil, pero el contexto de la visión de la estatua pide una comparación de menor rango o esplendor. «Inferior al tuyo» refleja esa decisión sin forzar una identificación histórica posterior.
  doctrine_reference: Daniel 2:39; comparación simbólica de los reinos en la visión de Nabucodonosor
- issue: Alcance de אַרְעָא
  english_pob_reading: over all the earth
  chosen_spanish_reading: sobre toda la tierra
  alternative_spanish_readings:
  - sobre toda la tierra/país
  - sobre todo el mundo
  rationale: La expresión puede referirse a «tierra» o «país», pero en el marco imperial del pasaje la amplitud universal es la lectura más fuerte. «Toda la tierra» conserva esa ambición retórica sin exagerar más allá del texto.
  doctrine_reference: Daniel 2:39; lenguaje de dominio imperial
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el acuerdo alto del audit trail inglés y mantiene las dos tensiones documentadas: la comparación difícil de «inferior al tuyo» y la amplitud posible de «tierra/país». No se introdujeron revisiones adicionales respecto del último pase, que permaneció sin cambios.'
  spanish_consistency_notes:
  - Se usa «reino» para מַלְכוּ, en consonancia con el contexto de sucesión política de Daniel 2.
  - Se conserva «bronce» para נְחָשָׁא, siguiendo la correspondencia material de la estatua.
  - «Dominará» se eligió para תִשְׁלַט por la fuerza de dominio implícita en el verbo arameo.
  - «Toda la tierra» mantiene la amplitud imperial de la frase, aunque la nota deja abierta la alternativa «tierra/país».
  - La comparación «inferior al tuyo» evita suavizar la dificultad del arameo y refleja la lectura auditada.
