translation:
  language: es
  text: Pero en cuanto a ustedes[a], cuídense de las cosas dedicadas a la destrucción[b], no sea que ustedes mismos lleguen a ser dedicados a la destrucción[c] y tomen de las cosas dedicadas a la destrucción, y hagan que el campamento de Israel quede dedicado a la destrucción[c], y le causen calamidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo comienza con una partícula restrictiva y contrastiva: «pero / solamente». Aquí se traduce de forma que conserve el énfasis directo sobre los destinatarios.'
    reason: source_note
  - marker: b
    text: Hebreo חֵרֶם (cherem), tradicionalmente «el anatema» o «la cosa maldita»; aquí se refiere a personas o cosas irrevocablemente apartadas para Dios, en este contexto para destrucción.
    reason: lexical_alternative
  - marker: c
    text: La misma raíz hebrea comunica aquí tanto las cosas prohibidas como el estado judicial resultante de quedar bajo esa misma dedicación a destrucción. Se mantiene la repetición para no ocultar esa relación.
    reason: theological_note
lexical_decisions:
- source_word: וְרַק
  english_pob_choice: But as for
  chosen_spanish: Pero en cuanto a
  alternatives_spanish:
  - Solo
  - Pero solamente
  lexicon: HALOT
  rationale: La partícula introduce restricción y contraste. «Pero en cuanto a» conserva el giro adversativo y la focalización directa sobre los destinatarios sin sonar rígido en español.
- source_word: שִׁמְרוּ מִן הַחֵרֶם
  english_pob_choice: keep yourselves from the things devoted to destruction
  chosen_spanish: cuídense de lo dedicado a destrucción
  alternatives_spanish:
  - guárdense de lo dedicado a destrucción
  - aléjense de lo dedicado a destrucción
  lexicon: HALOT
  rationale: שׁמר con מִן expresa mantenerse apartado/guardarse de algo. «Cuídense de» comunica la advertencia reflexiva de manera natural y mantiene el valor de prevención.
- source_word: חֵרֶם
  english_pob_choice: devoted to destruction
  chosen_spanish: lo dedicado a destrucción
  alternatives_spanish:
  - lo puesto bajo anatema
  - la cosa dedicada
  lexicon: HALOT
  rationale: Se conserva el núcleo semántico de dedicación irrevocable con destrucción en este contexto. «Lo dedicado a destrucción» evita el tradicional pero opaco «anatema» y mantiene la gravedad teológica.
- source_word: תַּחֲרִימוּ
  english_pob_choice: you yourselves become devoted to destruction
  chosen_spanish: lleguen a ser dedicados a destrucción
  alternatives_spanish:
  - sean puestos bajo anatema
  - se dediquen a destrucción
  lexicon: HALOT
  rationale: El Hifil de חרם aquí expresa la consecuencia de caer bajo la misma condición/jucio. «Lleguen a ser» ayuda a reflejar el resultado, no solo una acción voluntaria.
- source_word: וּלְקַחְתֶּם מִן הַחֵרֶם
  english_pob_choice: and take some of the things devoted to destruction
  chosen_spanish: y tomen de lo dedicado a destrucción
  alternatives_spanish:
  - y tomen algo de lo dedicado a destrucción
  - y tomen de las cosas dedicadas a destrucción
  lexicon: HALOT
  rationale: El hebreo usa un colectivo; en español, «de lo dedicado a destrucción» es más compacto y fiel que forzar un plural. Mantiene la prohibición sin añadir precisión no requerida.
- source_word: וְשַׂמְתֶּם אֶת מַחֲנֵה יִשְׂרָאֵל לְחֵרֶם
  english_pob_choice: and make the camp of Israel devoted to destruction
  chosen_spanish: y pongan el campamento de Israel dedicado a destrucción
  alternatives_spanish:
  - y hagan del campamento de Israel algo dedicado a destrucción
  - y pongan al campamento de Israel bajo anatema
  lexicon: HALOT
  rationale: שׂים + objeto + complemento predicativo expresa el resultado causado. «Pongan el campamento de Israel dedicado a destrucción» conserva la estructura y evita una paráfrasis excesiva.
- source_word: וַעֲכַרְתֶּם אוֹתוֹ
  english_pob_choice: and bring trouble on it
  chosen_spanish: y atraigan sobre él la desgracia
  alternatives_spanish:
  - y le causen trouble
  - y le traigan problema
  lexicon: HALOT
  rationale: עכר en contextos de juicio covenantal implica traer perturbación/desgracia. «Atraigan sobre él la desgracia» transmite mejor la carga solemne que un simple «problema».
theological_decisions:
- issue: Conservar el término חֵרֶם sin reemplazarlo por vocabulario eclesial tradicional
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: dedicado a destrucción
  alternative_spanish_readings:
  - bajo anatema
  - maldito
  rationale: La POB inglesa evita «the ban» y «accursed thing» por ser opacos o teológicamente cargados en formas no transparentes. En español, «dedicado a destrucción» mantiene la fuerza cultual y judicial sin introducir tradición interpretativa adicional.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Entender תַּחֲרִימוּ como resultado de incurrir en la misma condición
  english_pob_reading: you yourselves become devoted to destruction
  chosen_spanish_reading: lleguen a ser dedicados a destrucción
  alternative_spanish_readings:
  - sean destruidos
  - se pongan bajo anatema
  rationale: El contexto no solo prohíbe tomar objetos, sino que advierte del estado resultante para la comunidad. La formulación elegida mantiene ese efecto judicial sin convertirlo en una simple orden de acción.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener el eco narrativo de la consecuencia comunitaria
  english_pob_reading: bring trouble on it
  chosen_spanish_reading: atraigan sobre él la desgracia
  alternative_spanish_readings:
  - traigan trouble sobre él
  - causen perturbación sobre él
  rationale: El verbo עכר apunta a una perturbación o desastre que recae sobre el campamento. «Desgracia» comunica el peso narrativo y la conexión con el juicio subsiguiente en la historia de Acán.
  doctrine_reference: Josh 7:1, 25
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del texto inglés, que ajustó el primer miembro de חֵרֶם a un colectivo plural en inglés («the things devoted to destruction») por naturalidad. En español, se optó por una construcción colectiva neutra («lo dedicado a destrucción») que preserva esa misma naturalidad sin perder la referencia al conjunto de objetos/personas bajo חֵרֶם.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el Tetragrámaton en este texto.
  - Se evitó «Señor» y «anatema» como términos principales para no introducir convenciones eclesiales que el audit trail inglés no usa como base.
  - Se conservó la repetición de la expresión de חֵרֶם en tres lugares para reflejar el énfasis retórico del hebreo.
  - Se usó «campamento de Israel» en lugar de una forma posesiva para seguir la cadena constructa hebrea de manera transparente.
