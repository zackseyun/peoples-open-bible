translation:
  language: es
  text: Si, mientras te jactas vanamente acerca de la verdad, incluso a mí me desprecias, a costa de tu propio castigo[a], ¿no despertarás de la filosofía insensata[b] de ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para tu propio castigo' o 'trayéndote castigo sobre ti'. La frase griega puede expresarse de manera más literal, pero el sentido es que tal desprecio resulta en castigo para quien lo ejerce.
    reason: lexical_alternative
  - marker: b
    text: O 'charlatana' o 'palabrera'. El adjetivo griego detrás de 'insensata' puede implicar discurso vacío, necio o parlanchín.
    reason: lexical_alternative
lexical_decisions:
- source_word: κενοδοξῶν
  english_pob_choice: vainly boasting
  chosen_spanish: te jactas vanamente
  alternatives_spanish:
  - presumes vanamente
  - te glorías en vano
  - te jactas vacíamente
  lexicon: LSJ
  rationale: κενόδοξος / κενοδοξῶν expresa jactancia vacía o sin fundamento. 'Te jactas vanamente' conserva el verbo de jactancia y el matiz de vacío sin sonar demasiado técnico.
- source_word: περὶ τὸ ἀληθές
  english_pob_choice: about the truth
  chosen_spanish: acerca de la verdad
  alternatives_spanish:
  - respecto de la verdad
  - sobre la verdad
  - con referencia a la verdad
  lexicon: LSJ
  rationale: La preposición con el artículo neutro puede expresar el objeto de la jactancia. 'Acerca de la verdad' es natural en español y mantiene el referente explícito.
- source_word: κἀμοῦ
  english_pob_choice: even me
  chosen_spanish: todavía me
  alternatives_spanish:
  - incluso me
  - aún me
  - hasta a mí
  lexicon: LSJ
  rationale: 'El crasis añade énfasis inclusivo: no solo la verdad, sino también el hablante mismo queda menospreciado. ''Todavía me'' vincula el énfasis con la continuación de la ofensa; no obstante, el sentido de ''incluso'' queda implícito en el contexto.'
- source_word: καταφρονήσεις
  english_pob_choice: despise
  chosen_spanish: desprecias
  alternatives_spanish:
  - menosprecias
  - desoyes con desprecio
  - miras con desprecio
  lexicon: LSJ
  rationale: El verbo denota tratar con desprecio. 'Desprecias' es directo, fuerte y bien asentado en español bíblico contemporáneo.
- source_word: ἐπὶ τῇ ἰδίᾳ τιμωρίᾳ
  english_pob_choice: at the cost of your own punishment
  chosen_spanish: para tu propia punición
  alternatives_spanish:
  - para tu propio castigo
  - con tu propio castigo
  - a costa de tu propio castigo
  lexicon: LSJ
  rationale: La frase expresa consecuencia que recae sobre el propio oyente. 'Punición' evita imponer una sola paráfrasis y mantiene el matiz retributivo del griego; en español también podría decirse 'castigo', pero se optó por una forma menos interpretativa en el cuerpo del texto.
- source_word: οὐκ ἐξυπνώσεις
  english_pob_choice: will you not wake up
  chosen_spanish: ¿no despertarás
  alternatives_spanish:
  - ¿no entrarás en razón
  - ¿no te despertarás
  - ¿no volverás en ti
  lexicon: LSJ
  rationale: El verbo imagina salir del sopor o del engaño. 'Despertarás' conserva la metáfora y su fuerza exhortativa sin agregar un giro demasiado idiomático.
- source_word: φλυάρου φιλοσοφίας
  english_pob_choice: foolish philosophy
  chosen_spanish: filosofía insensata
  alternatives_spanish:
  - filosofía necia
  - filosofía charlatana
  - filosofía vana
  lexicon: LSJ
  rationale: φλύαρος puede implicar charla vacía, necedad o palabrería. 'Insensata' transmite la valoración despectiva con dignidad estilística; 'charlatana' sería más explícita pero más áspera en español.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - su
  - de ustedes
  - vuestro
  lexicon: LSJ
  rationale: Aunque el griego es plural, el discurso se dirige a un interlocutor principal en forma retórica. Se eligió 'tu' para fluidez en español, manteniendo el plural implícito en el contexto de la polémica.
theological_decisions:
- issue: Tono de reprensión y consecuencia retributiva
  english_pob_reading: The verse is rendered as a sharp moral challenge without importing later technical philosophical or theological categories.
  chosen_spanish_reading: El versículo se vierte como una reprensión aguda que vincula el desprecio con el castigo propio, sin convertir el pasaje en una categoría filosófica moderna.
  alternative_spanish_readings:
  - 'una exhortación más moralizada: ''¿no entrarás en razón, dejando tu filosofía absurda?'''
  - 'una formulación más literal: ''¿no despertarás de tu filosofía palabrera?'''
  rationale: La fuerza del texto está en la ironía punitiva y en el desprecio por la filosofía vacía. La redacción española conserva esa tensión sin suavizarla ni expandirla más allá del griego.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando las notas al texto español mediante los marcadores [a] y [b]. También se ajustó la cláusula final para mantener la metáfora de 'despertar' y se revisó el posesivo para reflejar la tensión entre el singular retórico y el plural griego.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera del versículo porque no aparece en el texto.
  - Se usó un español neutral y eclesialmente legible, evitando calcos duros.
  - Se conservó la ironía del griego en la relación entre desprecio y castigo propio.
  - Los marcadores de nota aparecen exactamente en el cuerpo del texto y no se reutilizan.
