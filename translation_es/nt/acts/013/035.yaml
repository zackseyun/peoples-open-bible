translation:
  language: es
  text: Por eso también dice en otro salmo[a], «No permitirás que tu Santo[b] vea corrupción[c]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en otro lugar» o «en otro pasaje»; el griego dice simplemente «en otro».
    reason: lexical_alternative
  - marker: b
    text: O «tu fiel».
    reason: lexical_alternative
  - marker: c
    text: O «descomposición».
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: BDAG
  rationale: En español, «Por eso» expresa bien la función inferencial de διότι en este contexto, manteniendo el enlace lógico con lo anterior sin volverlo mecánico.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: BDAG
  rationale: καὶ añade otro testimonio escritural al argumento; «también» conserva la fuerza aditiva de manera natural en español.
- source_word: ἐν ἑτέρῳ
  english_pob_choice: in another psalm
  chosen_spanish: en otro salmo
  alternatives_spanish:
  - en otro lugar
  - en otro pasaje
  lexicon: BDAG
  rationale: El griego dice literalmente «en otro», con el sustantivo implícito. Como el contexto inmediato es una cita de los Salmos, «salmo» hace explícita la elipsis de forma fiel y clara.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - él dice
  - está diciendo
  lexicon: BDAG
  rationale: En español bíblico, «dice» reproduce naturalmente la fórmula de cita en presente y evita añadir un sujeto innecesario.
- source_word: Οὐ δώσεις
  english_pob_choice: You will not let
  chosen_spanish: No permitirás
  alternatives_spanish:
  - No darás
  - No dejarás
  lexicon: BDAG
  rationale: Aunque δίδωμι significa literalmente «dar», aquí la construcción funciona con sentido permisivo. «No permitirás» expresa mejor ese valor idiomático en español.
- source_word: τὸν ὅσιόν σου
  english_pob_choice: your Holy One
  chosen_spanish: tu Santo
  alternatives_spanish:
  - tu santo
  - tu fiel
  lexicon: BDAG
  rationale: ὅσιος puede referirse a lo santo, piadoso o fiel. En una cita mesiánica, «tu Santo» conserva la referencia reverente y el peso cristológico, sin forzar una paráfrasis.
- source_word: ἰδεῖν
  english_pob_choice: see
  chosen_spanish: vea
  alternatives_spanish:
  - ver
  - contemplar
  lexicon: BDAG
  rationale: 'El infinitivo de ὁράω se expresa naturalmente con subjuntivo en la construcción española tras «permitir»: «no permitirás que… vea».'
- source_word: διαφθοράν
  english_pob_choice: decay
  chosen_spanish: corrupción
  alternatives_spanish:
  - descomposición
  - podredumbre
  lexicon: BDAG
  rationale: «Corrupción» refleja la opción tradicional y también deja abierta la amplitud semántica de διαφθορά; en español bíblico, además, suena más natural que «decadencia» para el cuerpo en descomposición.
theological_decisions:
- issue: Referencia mesiánica de «tu Santo»
  english_pob_reading: Render τὸν ὅσιόν σου as 'your Holy One' with capitalization in context
  chosen_spanish_reading: Traducir como «tu Santo» con mayúscula inicial en sentido referencial
  alternative_spanish_readings:
  - tu santo
  - tu fiel
  rationale: En Hechos 13, Pablo aplica esta cita a Jesús y a su resurrección; la mayúscula ayuda a señalar el referente sin alterar el sentido léxico de ὅσιος.
  doctrine_reference: Acts 13:35 context; Translation philosophy §1 and §3
- issue: Elipsis de ἐν ἑτέρῳ
  english_pob_reading: Specify 'psalm' in the main text
  chosen_spanish_reading: Explicitar «salmo» en el texto principal
  alternative_spanish_readings:
  - en otro lugar
  - en otro pasaje
  rationale: El contexto inmediato es una cadena de citas escriturarias, y la referencia concreta proviene de un salmo. Explicitarlo mejora la inteligibilidad sin añadir contenido ajeno al pasaje.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés; no se registran revisiones posteriores que alteren la decisión principal. Se conserva la inferencia de διότι, la elipsis de ἐν ἑτέρῳ y la fuerza semántica de ὅσιος y διαφθορά.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según el criterio general del proyecto; aquí no aparece ninguna de esas formas.
  - Se usa «salmo» para explicitar la elipsis, coherente con el contexto de cita escritural.
  - «Santo» con mayúscula sigue la decisión cristológica contextual, equivalente funcional de la capitalización inglesa.
  - «corrupción» preserva la alternativa tradicional sin perder la referencia a la descomposición corporal.
