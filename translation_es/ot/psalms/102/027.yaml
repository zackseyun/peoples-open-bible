  text: הֵ֤מָּה יֹאבֵדוּ֮ וְ/אַתָּ֪ה תַ֫עֲמֹ֥ד וְ֭/כֻלָּ/ם כַּ/בֶּ֣גֶד יִבְל֑וּ כַּ/לְּב֖וּשׁ תַּחֲלִיפֵ֣/ם וְֽ/יַחֲלֹֽפוּ׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/102/027.yaml
  text: They will perish[a], but you will remain; all of them will wear out like a garment. Like clothing you will change them[b], and they will pass away.
  footnotes:
  - marker: a
    text: Or 'you will stand.' The Hebrew verb is literally 'stand,' here expressing enduring permanence in contrast to creation's perishing.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will replace them.' The Hebrew can suggest changing or replacing them, continuing the clothing metaphor.
    reason: lexical_alternative
