translation:
  language: es
  text: Cuando los justos aumentan[a], el pueblo se alegra; pero cuando gobierna un malvado, el pueblo gime.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando los justos son muchos». La construcción hebrea con el infinitivo puede enfatizar tanto el aumento como la multiplicidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְבוֹת
  english_pob_choice: when the righteous increase
  chosen_spanish: Cuando los justos aumentan
  alternatives_spanish:
  - cuando los justos son muchos
  - al multiplicarse los justos
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo constructo expresa un valor temporal; en español, «cuando» reproduce bien ese matiz. «Aumentan» conserva la idea de incremento dinámico que el audit trail inglés eligió, sin perder la alternativa de multiplicidad estática.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: HALOT
  rationale: El plural adjetival funciona sustantivado. «Los justos» es natural, breve y mantiene la categoría colectiva sin forzar un sustantivo adicional.
- source_word: יִשְׂמַח
  english_pob_choice: rejoice
  chosen_spanish: se alegra
  alternatives_spanish:
  - se regocija
  - se goza
  lexicon: HALOT
  rationale: En español, «se alegra» suena más natural que un «reivindicar» calcado de tono formal y sigue expresando la alegría comunitaria del proverbio. Aunque «regocija» sería más elevado, «se alegra» mantiene claridad y dignidad.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: «עָם» designa al conjunto del pueblo. «El pueblo» preserva el referente colectivo y el paralelismo con el segundo hemistiquio.
- source_word: וּבִמְשֹׁל
  english_pob_choice: but when ... rules
  chosen_spanish: pero cuando gobierna
  alternatives_spanish:
  - y cuando gobierna
  - pero al reinar
  lexicon: HALOT
  rationale: El valor temporal del infinitivo constructo se expresa con «cuando». En español, «gobierna» transmite el ejercicio efectivo del dominio, y «pero» refleja la antítesis del paralelismo hebreo, como hacía la versión inglesa con «but when».
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un malvado
  alternatives_spanish:
  - un impío
  - un hombre malvado
  lexicon: HALOT
  rationale: El singular sustantivado apunta a un gobernante individual. «Un malvado» conserva la referencia personal y el contraste moral; se evita «el impío» porque puede sonar más técnico o religioso en español, y «hombre» no es necesario para la claridad.
- source_word: יֵאָנַח
  english_pob_choice: groan
  chosen_spanish: gime
  alternatives_spanish:
  - suspira
  - se lamenta
  lexicon: HALOT
  rationale: El nifal de אנח expresa gemido o suspiro de aflicción. «Gime» comunica con fuerza el sufrimiento público implícito en el gobierno inicuo y encaja bien con el paralelismo antitético.
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo llano
  lexicon: HALOT
  rationale: Se repite «el pueblo» para mantener el balance poético y la referencia colectiva única del versículo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el juicio auditado en inglés: mantiene el valor temporal de las dos construcciones con ב + infinitivo, conserva el contraste entre justos y malvado, y reproduce el segundo hemistiquio con una intensidad verbal equivalente a «groan». No se registraron revisiones posteriores en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «justos» como sustantivo plural para צַדִּיקִים, en consonancia con el estilo POB.
  - «El pueblo» se repite en ambos hemistiquios para conservar el paralelismo y evitar variación innecesaria.
  - «Malvado» se eligió por naturalidad y por la referencia singular a un gobernante individual.
