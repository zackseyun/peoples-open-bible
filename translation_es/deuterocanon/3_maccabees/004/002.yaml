translation:
  language: es
  text: Pero para los judíos había un duelo indecible y un clamor[a] entre lágrimas de total lamentación, mientras su corazón, inflamado por todas partes con gemidos, lamentaba la destrucción repentina e inesperadamente decretada contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un duelo indecible y un grito enteramente lamentoso con lágrimas». El griego es altamente retórico y comprimido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλεκτον
  english_pob_choice: unspeakable
  chosen_spanish: inexpresable
  alternatives_spanish:
  - indecible
  - inefable
  lexicon: LSJ
  rationale: El griego expresa algo que no puede decirse plenamente. «Inexpresable» conserva esa fuerza retórica y funciona con naturalidad en español; «indecible» o «inefable» son posibles, pero «inefable» puede sonar más literario que el contexto exige.
- source_word: πένθος
  english_pob_choice: grief
  chosen_spanish: duelo
  alternatives_spanish:
  - dolor
  - luto
  - pena
  lexicon: LSJ
  rationale: Aquí el término apunta al lamento profundo por una calamidad. «Duelo» mantiene la densidad emocional y el matiz de aflicción/mournful sorrow mejor que «dolor» o «pena».
- source_word: πανόδυρτος
  english_pob_choice: tearful cry of utter lamentation
  chosen_spanish: grito lloroso de lamentación
  alternatives_spanish:
  - grito completamente lamentoso
  - clamor de total lamentación
  - grito de llanto y lamentación
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de lamento completo. «Grito lloroso de lamentación» reproduce el carácter acumulativo sin sonar forzado en español; se evita una paráfrasis que borre la intensidad del compuesto.
- source_word: βοή
  english_pob_choice: cry
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - grito de angustia
  - voces
  lexicon: LSJ
  rationale: En este contexto la palabra designa un grito audible de angustia. «Grito» es directo y suficientemente fuerte; «clamor» también sería posible, pero «grito» conserva mejor el golpe sonoro del verso.
- source_word: στεναγμοῖς
  english_pob_choice: with groanings
  chosen_spanish: con gemidos
  alternatives_spanish:
  - con suspiros
  - entre gemidos
  - por gemidos
  lexicon: LSJ
  rationale: La imagen es de dolor audible y contenido. «Con gemidos» refleja el acompañamiento instrumental/acompañante del dativo y es el equivalente más natural en español.
- source_word: πεπυρωμένης
  english_pob_choice: inflamed
  chosen_spanish: inflamado
  alternatives_spanish:
  - ardiendo
  - encendido
  - abrasado
  lexicon: LSJ
  rationale: El participio perfecto metáforico describe el corazón como puesto en fuego por el dolor. «Inflamado» conserva esa metáfora sin sobrecargarla, en línea con la opción inglesa.
- source_word: πάντοθεν
  english_pob_choice: on every side
  chosen_spanish: por todas partes
  alternatives_spanish:
  - de todos lados
  - en todo aspecto
  - completamente
  lexicon: LSJ
  rationale: El adverbio indica una presión envolvente y total. «Por todas partes» mantiene el valor espacial-metafórico aplicado al corazón.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - alma
  - interior
  - mente
  lexicon: LSJ
  rationale: El griego usa «corazón» como sede de la emoción. En español es la equivalencia más clara y conserva el antropomorfismo bíblico.
- source_word: ὀλοφυρομένων
  english_pob_choice: bewailed
  chosen_spanish: deploraba
  alternatives_spanish:
  - lamentaba
  - lloraba
  - se dolía de
  lexicon: LSJ
  rationale: El participio expresa lamento activo y angustiado ante la calamidad. «Deploraba» conserva un tono elevado y evita que el verbo se vuelva demasiado general.
- source_word: ἀπροσδόκητον
  english_pob_choice: unexpectedly
  chosen_spanish: inesperadamente
  alternatives_spanish:
  - inopinadamente
  - sin esperarlo
  - no previsto
  lexicon: LSJ
  rationale: Aunque en el texto griego modifica el carácter de la desgracia, en español «inesperadamente» comunica con naturalidad la falta de previsión y conserva el matiz de sorpresa.
- source_word: ἐξαίφνης
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - de pronto
  - repentinamente
  lexicon: LSJ
  rationale: La duplicación con el término anterior pide mantener ambos valores. «De repente» expresa bien la irrupción súbita sin colapsar los dos adverbios en uno solo.
- source_word: ἐπικριθεῖσαν
  english_pob_choice: decreed against
  chosen_spanish: decretada contra
  alternatives_spanish:
  - pronunciada contra
  - impuesta contra
  - sentenciada contra
  lexicon: LSJ
  rationale: El participio tiene un trasfondo judicial o de decisión formal. «Decretada contra» sigue esa fuerza oficial y hostil, y reproduce el sentido relacional del griego.
- source_word: ὀλεθρίαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - calamidad destructora
  - perdición
  lexicon: LSJ
  rationale: El sustantivo señala ruina devastadora. «Destrucción» es el equivalente más directo y mantiene la severidad del término sin introducir connotaciones ajenas.
theological_decisions:
- issue: La designación del pueblo judío en medio de una lamentación colectiva
  english_pob_reading: But for the Jews...
  chosen_spanish_reading: Pero para los judíos...
  alternative_spanish_readings:
  - Y para los judíos...
  - Mas para los judíos...
  rationale: No hay problema doctrinal aquí; se conserva la referencia étnico-histórica directa del griego y del audit trail inglés. «Pero» mantiene la contraposición narrativa sin cargarla de matiz adversativo excesivo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Seguí la revisión inglesa que afinó la relación entre los elementos retóricos: mantuve la acumulación de lamento, el paralelismo entre el duelo y el grito, y la doble marca temporal/situacional de ἀπροσδόκητον y ἐξαίφνης como dos matices distintos («inesperadamente» / «de repente»). También respeté la imagen del corazón «inflamado» y el tono judicial de ἐπικριθεῖσαν.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Mantuve «judíos» como этnónimo histórico sin sustitución por un término eclesial.
  - Conservé la intensidad retórica del griego con una sintaxis española fluida pero no expansiva.
  - Apliqué «corazón» para καρδία por ser la equivalencia bíblica natural en español y no requerir explicación adicional en este contexto.
