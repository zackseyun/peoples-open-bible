translation:
  language: es
  text: Sus jueces han sido arrojados a los lados de la peña[a], y han oído mis palabras[b], porque son agradables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por los lados del risco» o «por las laderas del peñasco». El hebreo es difícil; también se ha entendido más literalmente como «en las manos de la peña».'
    reason: alternative_reading
  - marker: b
    text: 'O: «dulces» o «deleitosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁמְטוּ
  english_pob_choice: have been thrown down
  chosen_spanish: han sido arrojados
  alternatives_spanish:
  - han sido derribados
  - han sido lanzados abajo
  - han sido abatidos
  lexicon: HALOT
  rationale: El nifal de שׁמט expresa caída o ser echado hacia abajo. En español, 'han sido arrojados' conserva la fuerza pasiva y violenta del contexto poético sin sonar demasiado mecánico.
- source_word: בִידֵי
  english_pob_choice: by the sides of
  chosen_spanish: por los lados de
  alternatives_spanish:
  - junto a
  - a los lados de
  - por las paredes de
  lexicon: HALOT
  rationale: La construcción con 'mano(s) de' sería extraña con 'peña' en español. Siguiendo la decisión auditada del inglés, se mantiene el sentido espacial de borde o costado de la roca.
- source_word: סֶלַע
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  - el risco
  lexicon: HALOT
  rationale: '''Peña'' comunica mejor en español la imagen de una masa rocosa escarpada o pared rocosa, preservando el matiz topográfico del hebreo sin perder legibilidad.'
- source_word: שֹׁפְטֵיהֶם
  english_pob_choice: their judges
  chosen_spanish: sus jueces
  alternatives_spanish:
  - sus gobernantes
  - sus magistrados
  lexicon: HALOT
  rationale: '''Jueces'' es la correspondencia directa del participio de שׁפט y mantiene la referencia personal y judicial del texto.'
- source_word: וְשָׁמְעוּ
  english_pob_choice: and they have heard
  chosen_spanish: y han oído
  alternatives_spanish:
  - y oyen
  - y oyeron
  - y escucharon
  lexicon: HALOT
  rationale: Se adopta el perfecto español para reflejar el valor completivo que el POB inglés actualizó en la revisión ('have heard'), manteniendo la secuencia poética sin forzar un futuro o presente artificial.
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis expresiones
  - lo que digo
  lexicon: HALOT
  rationale: El plural constructo con sufijo se vierte de forma natural como 'mis palabras', un equivalente claro y suficientemente formal para el registro bíblico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: En este verso introduce la razón por la cual han oído las palabras; 'porque' expresa con claridad esa relación causal en español.
- source_word: נָעֵמוּ
  english_pob_choice: they are pleasant
  chosen_spanish: son agradables
  alternatives_spanish:
  - son dulces
  - son deleitosas
  - son suaves
  lexicon: HALOT
  rationale: נעם expresa agrado, suavidad o placer. 'Agradables' conserva la evaluación positiva sin cargar el verso con un tono excesivamente sentimental.
theological_decisions:
- issue: Interpretación de בִידֵי סֶלַע
  english_pob_reading: 'spatial: ''by the sides of the rock'''
  chosen_spanish_reading: 'espacial: ''por los lados de la peña'''
  alternative_spanish_readings:
  - 'instrumental/judicial: ''en las manos de la peña'''
  - 'más idiomático topográfico: ''por las laderas del risco'''
  rationale: Se preserva la imagen espacial probable sin resolver de manera dogmática la dificultad sintáctica. Así se respeta la tensión documentada en el texto fuente y en el audit trail inglés.
  doctrine_reference: Preservar la ambigüedad textual legítima
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'hear' por 'have heard' para reflejar mejor el perfecto/consecutivo. La redacción española sigue esa actualización con 'han oído', manteniendo la imagen poética y la decisión espacial de 'by the sides of the rock'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este verso no contiene el tetragrámaton.
  - '''Peña'' se eligió por su naturalidad poética en español; la nota conserva alternativas cercanas para no ocultar el matiz topográfico.'
  - '''Han oído'' refleja la revisión auditada del inglés y evita una lectura meramente presente que debilitaría la secuencia del verso.'
