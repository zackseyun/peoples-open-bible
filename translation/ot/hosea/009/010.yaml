theological_decisions:
- issue: Interpretation of לַבֹּשֶׁת in an idolatry context
  chosen_reading: Rendered as 'shame' with implicit reference to the idol/Baal rather than explicitly naming the idol in the main text.
  alternative_readings:
  - '''to the shameful thing'''
  - '''to Shame'' as a contemptuous substitute name for Baal'
  rationale: The Hebrew uses a polemical term rather than repeating the deity's name. Preserving 'shame' retains the prophetic rhetoric and avoids importing a more explicit identification than the text states, while the footnote can clarify the likely idol-reference.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of אֲבוֹתֵיכֶם
  chosen_reading: '''your fathers'''
  alternative_readings:
  - '''your ancestors'''
  rationale: The Hebrew is explicitly masculine plural and refers to forefathers. Per the gender-accurate principle, the main text keeps 'fathers'; an alternative can be noted for readers who may understand it representationally.
  doctrine_reference: Gender-accurate over gender-neutral.
