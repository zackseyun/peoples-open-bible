revisions:
- from: Ni rey ni tirano podrá mirarte a la cara[a] respecto de aquellos a quienes castigaste.
  to: Ni rey ni tirano podrá mirarte a la cara[a] por aquellos a quienes castigaste.
  rationale: Se mantiene la traducción principal del verbo de confrontación y la nota léxica, pero se sustituye «respecto de» por «por» para lograr un español más natural y expresar mejor la idea de confrontar a Dios en relación con aquellos que él castigó.
  reviewer_model: gpt-5.4
