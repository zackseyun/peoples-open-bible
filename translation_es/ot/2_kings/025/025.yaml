translation:
  language: es
  text: Y sucedió en el séptimo mes que Ismael hijo de Netanías, hijo de Elisama, de la descendencia real, vino con diez hombres, y golpearon a Gedalías de modo que murió[a], y también a los judeanos y a los caldeos que estaban con él en Mizpa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «golpearon a Gedalías, y murió». El hebreo presenta primero la acción violenta y luego la muerte como resultado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «babilonios». El hebreo dice literalmente «caldeos», y esa forma se conserva aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: Mantiene la función narrativa de introducción de un nuevo episodio sin caer en un arcaísmo innecesario. 'Sucedió' suena natural y conserva el valor discursivo del hebreo.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: HALOT
  rationale: Es la equivalencia temporal más directa y clara en español.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - entró
  lexicon: HALOT
  rationale: '''Vino'' reproduce el verbo de movimiento de manera simple y narrativa, manteniendo cercanía al original.'
- source_word: מִזֶּרַע הַמְּלוּכָה
  english_pob_choice: of the royal seed
  chosen_spanish: de la descendencia real
  alternatives_spanish:
  - de linaje real
  - de estirpe real
  - de la simiente real
  lexicon: HALOT
  rationale: '''Descendencia real'' expresa la idea dinástica del hebreo y evita una expresión demasiado literal como ''simiente'', que en español podría sonar poco natural o demasiado cargada.'
- source_word: וַעֲשָׂרָה אֲנָשִׁים אִתּוֹ
  english_pob_choice: with ten men
  chosen_spanish: con diez hombres con él
  alternatives_spanish:
  - y diez hombres con él
  - con diez hombres
  lexicon: HALOT
  rationale: El hebreo une el grupo acompañante de forma enfática; se conserva esa estructura con una formulación española natural, sin perder la referencia explícita a su compañía.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: golpearon
  alternatives_spanish:
  - hirieron
  - mataron
  - atacaron
  lexicon: HALOT
  rationale: '''Golpearon'' refleja el verbo básico ''herir/golpear'' sin borrar el hecho de que el resultado fue mortal, que el versículo mismo explicita enseguida.'
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: hasta que murió
  alternatives_spanish:
  - y murió
  - de modo que murió
  lexicon: HALOT
  rationale: La traducción mantiene la secuencia causal resultante del hebreo y refleja la revisión inglesa que hizo explícita la relación entre el golpe y la muerte.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  lexicon: HALOT
  rationale: Se conserva el matiz etnogeográfico de la etapa monárquico-exílica. 'Judeanos' evita el posible anacronismo de 'judíos' en este contexto.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: '''Caldeos'' sigue de cerca el etnónimo hebreo y coincide con la elección inglesa. ''Babilonios'' queda como alternativa contextual, pero aquí se mantiene la forma más cercana al texto.'
- source_word: בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mispá
  - en Mizpah
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio tradicional en español bíblico, con ortografía transparente y reconocible.
theological_decisions:
- issue: Identificación histórica-etnográfica de הַיְּהוּדִים
  english_pob_reading: the Judeans
  chosen_spanish_reading: los judeanos
  alternative_spanish_readings:
  - los judíos
  rationale: La lectura 'judeanos' mantiene la referencia histórica a los habitantes de Judá en un marco exílico, sin trasladar automáticamente el término a la identidad religiosa posterior implícita en 'judíos'.
  doctrine_reference: Precisión histórico-literaria; evita anacronismo terminológico.
- issue: Relación entre el golpe y la muerte de Gedalías
  english_pob_reading: they struck down Gedaliah so that he died
  chosen_spanish_reading: golpearon a Gedalías hasta que murió
  alternative_spanish_readings:
  - golpearon a Gedalías, y murió
  - hirieron a Gedalías de modo que murió
  rationale: El hebreo expresa acción violenta seguida de muerte; el español elegido conserva la relación resultativa sin convertirla en una simplificación excesiva ni perder la secuencia narrativa.
  doctrine_reference: Fidelidad discursiva al resultado explícito del texto.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que aclaró la relación entre 'they struck down Gedaliah' y 'he died', y ajustó la coordinación final para distinguir a Gedalías de los demás grupos. La versión española refleja esa misma lectura resultativa y la coordinación separada de los objetos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando aparece en el texto; aquí no aparece.
  - Se conserva 'Mesías'/'Cristo' sin relevancia en este versículo.
  - '''Judeanos'' se mantiene como término histórico-etnográfico consistente con la política terminológica del proyecto.'
  - '''Caldeos'' se conserva por cercanía al hebreo, con nota alternativa para ''babilonios''.'
