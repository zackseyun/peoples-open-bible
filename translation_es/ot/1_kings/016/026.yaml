translation:
  language: es
  text: Porque él anduvo en todo el camino de Jeroboam hijo de Nebat[a], y en sus pecados con los cuales hizo pecar a Israel, provocando a Yahvé, el Dios de Israel, con sus ídolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con sus vanidades» o «con sus cosas inútiles»; el término es una palabra polémica común para los ídolos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: he walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - anduvo en conducta
  lexicon: HALOT
  rationale: En este contexto הלך expresa conducta o manera de vivir, no solo desplazamiento físico. «Anduvo» conserva la metáfora bíblica de conducta y suena natural en español.
- source_word: בְּכָל דֶּרֶךְ
  english_pob_choice: in all the way
  chosen_spanish: en todo el camino
  alternatives_spanish:
  - en toda la manera
  - en todas las sendas
  lexicon: HALOT
  rationale: El singular con «todo» funciona como modismo de conformidad completa con un patrón. «En todo el camino» mantiene esa idea de totalidad y la imagen de conducta.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nebat
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran de forma estándar. «Hijo de» reproduce la relación genealógica directa del hebreo.
- source_word: וּבְחַטֹּאתָיו
  english_pob_choice: and in his sins
  chosen_spanish: y en sus pecados
  alternatives_spanish:
  - y en las culpas de él
  - y en sus actos pecaminosos
  lexicon: HALOT
  rationale: El plural con sufijo 3ms se refiere a los pecados de Jeroboam. «Pecados» es la equivalencia directa y clara en español.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: by which he caused Israel to sin
  chosen_spanish: con los que hizo pecar a Israel
  alternatives_spanish:
  - por los que hizo pecar a Israel
  - mediante los cuales hizo pecar a Israel
  - con los que indujo a Israel al pecado
  lexicon: HALOT
  rationale: El hiphil de חטא es causativo. «Hizo pecar» conserva la fuerza causativa sin perder naturalidad en español. Se prefiere «con los que» para reflejar la relación instrumental del relativo.
- source_word: לְהַכְעִיס
  english_pob_choice: provoking
  chosen_spanish: provocando
  alternatives_spanish:
  - para provocar
  - a fin de provocar
  lexicon: HALOT
  rationale: El infinitivo expresa resultado o propósito respecto de la conducta anterior. «Provocando» fluye bien en español y conserva la idea de irritar o provocar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Siguiendo el estándar del proyecto para el Tetragrámaton, se usa «Yahvé» en el texto español. Mantiene el nombre divino personal en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en genitivo se traduce de manera directa. «El Dios de Israel» conserva la identificación pactal y es idiomático en español.
- source_word: בְּהַבְלֵיהֶם
  english_pob_choice: with their idols
  chosen_spanish: con sus ídolos
  alternatives_spanish:
  - con sus vanidades
  - con sus cosas inútiles
  lexicon: HALOT
  rationale: Aunque הבל literalmente comunica vacío, vanidad o nulidad, en este contexto polémico designa ídolos. «Ídolos» expresa el referente contextual con claridad, sin perder la nota depreciativa que se explica en la nota.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre divino directo. El proyecto pide preservarlo en español como «Yahvé» para no ocultar el nombre propio de Dios bajo un sustituto titular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido polémico de בְּהַבְלֵיהֶם
  english_pob_reading: with their idols
  chosen_spanish_reading: con sus ídolos
  alternative_spanish_readings:
  - con sus vanidades
  - con sus cosas vanas
  rationale: La equivalencia contextual apunta a objetos de idolatría. «Ídolos» es la lectura comunicativa principal; «vanidades» conserva la metáfora hebrea de vaciedad y se documenta en nota.
  doctrine_reference: HALOT / uso polemico de הבל en contexto idolátrico
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo el valor idiomático de הלך como conducta, el hiphil causativo de חטא como «hizo pecar», y el sentido polémico de הבל como referencia a ídolos. No se aplicaron revisiones posteriores; el estado de revisión del inglés figura como sin cambios.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del proyecto para יְהוָה.
  - «Hijo de» mantiene la relación patronímica sin añadir puntuación innecesaria.
  - El relativo «con los que» refleja la instrumentalidad del hebreo sin sonar forzado.
  - La nota[a] se ancla en «ídolos» porque allí surge la alternativa léxica documentada.
