translation:
  language: es
  text: 'Samuel se levantó de madrugada para salir al encuentro de Saúl, y se le informó a Samuel, diciendo: «Saúl llegó a Carmelo, y he aquí que levantó un monumento[a] para sí; luego se volvió, pasó y descendió a Gilgal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «una mano». Aquí «mano» funciona como un giro idiomático para un marcador conmemorativo o monumento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó de madrugada
  alternatives_spanish:
  - se levantó temprano
  - se alzó de madrugada
  lexicon: HALOT
  rationale: El hebreo expresa levantarse muy temprano con fuerza narrativa. «De madrugada» conserva la idea temporal y suena natural en español bíblico actual.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para salir al encuentro de
  alternatives_spanish:
  - para encontrarse con
  - para ir a recibir a
  lexicon: HALOT
  rationale: La construcción indica propósito. «Salir al encuentro de» reproduce bien el sentido intencional y evita la vaguedad de un simple «para encontrar».
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - en la mañana
  - por la mañana
  lexicon: HALOT
  rationale: Aunque el inglés distingue «in the morning», el conjunto verbal sugiere un levantarse muy temprano; «de madrugada» preserva ese énfasis temporal.
- source_word: וַיֻּגַּד לִשְׁמוּאֵל לֵאמֹר
  english_pob_choice: and it was reported to Samuel, saying
  chosen_spanish: y se informó a Samuel, diciendo
  alternatives_spanish:
  - y se le dijo a Samuel, diciendo
  - y le fue comunicado a Samuel, diciendo
  lexicon: HALOT
  rationale: El pasivo hebreo deja al agente sin especificar. «Se informó a Samuel» mantiene esa impersonalidad sin añadir un sujeto no presente en el texto.
- source_word: בָּא שָׁאוּל הַכַּרְמֶלָה
  english_pob_choice: Saul came to Carmel
  chosen_spanish: Saúl llegó a Carmel
  alternatives_spanish:
  - Saúl vino a Carmel
  - Saúl fue a Carmel
  lexicon: HALOT
  rationale: El movimiento hacia Carmel se expresa de forma natural con «llegó a», sin perder el valor direccional del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce algo llamativo. «He aquí que» conserva el tono bíblico y la fuerza de sorpresa o enfoque.
- source_word: מַצִּיב
  english_pob_choice: has set up
  chosen_spanish: se ha erigido
  alternatives_spanish:
  - ha levantado
  - ha puesto
  lexicon: HALOT
  rationale: El participio presenta la acción como visible o en curso. «Se ha erigido» comunica el estado resultante de un monumento ya levantado.
- source_word: יָד
  english_pob_choice: a monument
  chosen_spanish: un monumento
  alternatives_spanish:
  - un memorial
  - una mano
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mano», pero en este contexto la referencia idiomática es a una marca memorial. «Monumento» es la equivalencia española más clara y publicable; se conserva la nota para la literalidad.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para sí mismo
  lexicon: HALOT
  rationale: El dativo señala beneficio o dedicación a la propia persona de Saúl. «Para sí» expresa el valor reflexivo de manera concisa.
- source_word: וַיִּסֹּב
  english_pob_choice: then he turned
  chosen_spanish: luego se volvió
  alternatives_spanish:
  - entonces volvió
  - después giró
  lexicon: HALOT
  rationale: La serie de verbos de movimiento requiere una transición simple. «Se volvió» refleja el cambio de dirección sin sobreexplicar.
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed on
  chosen_spanish: pasó
  alternatives_spanish:
  - siguió adelante
  - continuó
  lexicon: HALOT
  rationale: En esta cadena narrativa, «pasó» transmite continuidad del desplazamiento con máxima economía y naturalidad.
- source_word: וַיֵּרֶד הַגִּלְגָּל
  english_pob_choice: went down to Gilgal
  chosen_spanish: descendió a Gilgal
  alternatives_spanish:
  - bajó a Gilgal
  - fue a Gilgal
  lexicon: HALOT
  rationale: ירד suele conservar su sentido topográfico. «Descendió» mantiene el matiz de bajada y corresponde a la secuencia geográfica del texto.
theological_decisions:
- issue: El lugar del monumento erigido por Saúl y la posible autoexaltación implícita
  english_pob_reading: he set up a monument for himself
  chosen_spanish_reading: se ha erigido un monumento para sí
  alternative_spanish_readings:
  - levantó un monumento para sí
  - se levantó un monumento para sí
  rationale: El hebreo y la lectura inglesa apuntan a un acto con énfasis en el propio honor de Saúl. La forma española conserva ese matiz reflexivo sin suavizarlo ni moralizarlo más de lo que el texto exige.
  doctrine_reference: 1 Samuel 15:12; contexto narrativo de la desobediencia de Saúl en 1 Samuel 15
- issue: La expresión «he aquí» como partícula deíctica y no meramente ornamental
  english_pob_reading: behold
  chosen_spanish_reading: y he aquí que
  alternative_spanish_readings:
  - y mira
  - y he aquí
  rationale: La partícula introduce un hecho destacado. Se mantiene en español para no perder la focalización narrativa ni diluir la sorpresa del informe.
  doctrine_reference: Uso narrativo de הִנֵּה en la Biblia hebrea
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión del texto inglés POB, que prefirió una sintaxis más natural, ‘behold’ para la partícula deíctica y tiempos narrativos simples (‘came’, ‘set up’). La versión española sigue esa orientación, pero adapta «in the morning» y el inicio verbal a un español más fluido sin perder el énfasis temporal ni la secuencia de movimiento.
  spanish_consistency_notes:
  - Se usa «Saúl» y «Samuel» de forma estable.
  - Se conserva «Gilgal» como transliteración estándar del lugar.
  - Se emplea «he aquí que» para reflejar la partícula hebrea de focalización.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - Se mantiene el monumento como acto reflexivo («para sí») para preservar la tensión del texto.
