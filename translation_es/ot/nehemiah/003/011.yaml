translation:
  language: es
  text: Malquías hijo de Jarim y Jasub hijo de Pahat-Moab repararon otro tramo[a], y también la Torre de los Hornos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un segundo tramo'. La expresión hebrea también puede traducirse de manera más formal así; aquí se refiere a una porción adicional asignada para reparación.
    reason: lexical_alternative
  - marker: b
    text: O 'la Torre de los Hornos de Fundición'. El término hebreo puede referirse a hornos o a hornos de fundición.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדָּה שֵׁנִית
  english_pob_choice: another section
  chosen_spanish: otro tramo
  alternatives_spanish:
  - un segundo tramo
  - otro sector
  - una segunda porción
  lexicon: HALOT
  rationale: En el contexto de Nehemías 3, la expresión señala una porción adicional del muro asignada para reparación. 'Tramo' comunica bien la idea de una sección lineal de obra sin sonar forzado en español, y 'otro' conserva el valor aditivo de la frase.
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: repararon
  alternatives_spanish:
  - fortalecieron
  - hicieron reparaciones
  - restauraron
  lexicon: HALOT
  rationale: El verbo en este contexto de reconstrucción del muro implica efectuar trabajos de reparación. En español, 'repararon' mantiene la acción concreta y la relación con la obra del muro.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malchijah
  chosen_spanish: Malquías
  alternatives_spanish:
  - Malquiyá
  - Malquías
  lexicon: Transliteración del nombre hebreo
  rationale: Se adapta el nombre al español bíblico reconocible, preservando la referencia personal. 'Malquías' evita una transliteración excesivamente técnica y sigue siendo transparente para el lector.
- source_word: בֶן חָרִם
  english_pob_choice: son of Harim
  chosen_spanish: hijo de Jarim
  alternatives_spanish:
  - hijo de Harim
  lexicon: Construcción filiativa hebrea
  rationale: Se conserva la filiación explícita. 'Jarim' refleja la adaptación fonética al español de forma legible, sin alterar la identidad del nombre.
- source_word: וְחַשּׁוּב
  english_pob_choice: and Hasshub
  chosen_spanish: y Jasub
  alternatives_spanish:
  - y Hassub
  lexicon: Transliteración del nombre hebreo
  rationale: El nombre se vierte en una forma natural en español. La grafía 'Jasub' mantiene la pronunciación aproximada y la claridad lectora.
- source_word: בֶּן פַּחַת מוֹאָב
  english_pob_choice: son of Pahath-moab
  chosen_spanish: hijo de Pahat-moab
  alternatives_spanish:
  - hijo de Pahat-Moab
  lexicon: Nombre propio compuesto
  rationale: Se mantiene el nombre compuesto como designación familiar/clánica. 'Pahat-moab' conserva la estructura del original y la lectura fluida en español.
- source_word: וְאֵת
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - y
  lexicon: HALOT
  rationale: La partícula añade otro objeto de reparación. 'Y también' expresa con naturalidad ese valor aditivo sin perder la función coordinante.
- source_word: מִגְדַּל הַתַּנּוּרִים
  english_pob_choice: the Tower of the Ovens
  chosen_spanish: la Torre de los Hornos
  alternatives_spanish:
  - la Torre de los Hornos
  - la Torre de las Hornillas
  - la Torre de los Hornos/Fogones
  lexicon: HALOT
  rationale: El término puede referirse a hornos u hornos de cocción/fundición. 'Hornos' recoge el campo semántico documentado y evita fijar indebidamente una sola función industrial.
translation_notes:
  revision_awareness: Se siguió de cerca el sentido contextual del hebreo y el audit trail inglés, manteniendo la estructura aditiva del versículo y una traducción idiomática para el lenguaje de reconstrucción del muro. No se detectaron revisiones textuales sustantivas en el paquete de referencia.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se preservó el estilo de lista genealógica con nombres transliterados/adaptados de forma coherente al español bíblico.
  - Se evitó 'SEÑOR' y 'Cristo' por no ser pertinentes en este pasaje.
  - La traducción mantiene el valor concreto de la obra material sin añadir interpretaciones históricas no explicitadas por el hebreo.
