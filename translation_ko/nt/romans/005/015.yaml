id: ROM.5.15
reference: Romans 5:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀλλ’ οὐχ ὡς τὸ παράπτωμα, οὕτως καὶ τὸ χάρισμα· εἰ γὰρ τῷ τοῦ ἑνὸς παραπτώματι οἱ πολλοὶ ἀπέθανον, πολλῷ μᾶλλον ἡ χάρις τοῦ θεοῦ καὶ ἡ δωρεὰ ἐν χάριτι τῇ τοῦ ἑνὸς ἀνθρώπου Ἰησοῦ Χριστοῦ εἰς τοὺς πολλοὺς ἐπερίσσευσεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/015.yaml
  text: But the gift is not like the trespass[a]. For if by the trespass of the one man the many died, much more the grace of God and the gift by the grace of the one man, Jesus Messiah[b], overflowed to the many.
  footnotes:
  - marker: a
    text: Or 'the gift in grace' / 'the gift that came by grace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus Christ.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 그 은사는 그 범죄와 같지 않습니다. 한 사람의 범죄로 많은 사람이 죽었다면, 한 사람 메시아 예수의 은혜를 통한 하나님의 은혜와 그 선물이 많은 사람에게 넘쳐난 것은 훨씬 더 그러합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παράπτωμα
  english_pob_choice: trespass
  chosen_korean: 범죄
  alternatives_korean:
  - 허물
  - 과실
  lexicon: BDAG
  rationale: 아담의 잘못된 행위. 5:14의 παράβασις와 결을 맞춰 「범죄」.
- source_word: χάρισμα
  english_pob_choice: gift
  chosen_korean: 은사
  alternatives_korean:
  - 선물
  lexicon: BDAG
  rationale: 은혜에서 기원한 선물. 5:16의 δώρημα/χάρισμα 구분을 위해 「은사」.
- source_word: οἱ πολλοί / τοὺς πολλούς
  english_pob_choice: the many
  chosen_korean: 많은 사람
  lexicon: BDAG
  rationale: 바울의 일대다 대조 보존. 「모두」로 해석적 확장하지 않음.
- source_word: ἡ χάρις τοῦ θεοῦ
  english_pob_choice: the grace of God
  chosen_korean: 하나님의 은혜
  lexicon: BDAG
  rationale: 속격 표준.
- source_word: ἡ δωρεὰ
  english_pob_choice: the gift
  chosen_korean: 선물
  lexicon: BDAG
  rationale: χάρισμα와 구분하여 「선물」.
- source_word: ἐν χάριτι
  english_pob_choice: by the grace
  chosen_korean: 은혜를 통한
  lexicon: BDAG
  rationale: 수단적 ἐν.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 메시아 예수
  lexicon: BDAG
  rationale: 칭호. 한국어 어순상 「메시아 예수」가 자연스러움.
- source_word: ἐπερίσσευσεν
  english_pob_choice: overflowed
  chosen_korean: 넘쳐난
  lexicon: BDAG
  rationale: 풍성한 잉여를 드러내는 동사.
theological_decisions:
- issue: οἱ πολλοί의 번역 범위
  chosen_reading: 「많은 사람」 유지, 「모두」로 좁히거나 넓히지 않음
  alternative_readings:
  - 「모두」로 표현
  rationale: 바울의 일대다 수사를 보존하여 본문의 신학적 긴장을 그대로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
