translation:
  language: es
  text: Mejor es un hombre pobre que anda en su integridad que uno torcido en sus caminos[a], aunque sea rico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Mejor es un hombre pobre que anda en su integridad que uno torcido en caminos, y es rico». El hebreo de la cláusula final dice literalmente «y él es rico», refiriéndose a la persona torcida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Mejor
  lexicon: HALOT
  rationale: En un proverbio comparativo, טוב abre la sentencia con valor de comparación. «Mejor es» preserva la estructura aforística natural en español y mantiene el contraste explícito.
- source_word: רָשׁ
  english_pob_choice: a poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - el pobre
  - una persona pobre
  lexicon: HALOT
  rationale: רָשׁ designa a una persona pobre o empobrecida. «Un pobre» refleja bien el singular representativo del proverbio y evita una neutralización innecesaria.
- source_word: הוֹלֵךְ
  english_pob_choice: who walks
  chosen_spanish: que anda
  alternatives_spanish:
  - que camina
  - que vive
  lexicon: HALOT
  rationale: הלך conserva la imagen de andar/caminar y, en literatura sapiencial, suele referirse al modo de conducta. «Que anda» es natural en español y mantiene la metáfora del comportamiento.
- source_word: בְּתֻמּוֹ
  english_pob_choice: in his integrity
  chosen_spanish: en su integridad
  alternatives_spanish:
  - en su blamelessness
  - con integridad
  lexicon: HALOT
  rationale: תֹּם/תֻּם expresa integridad, plenitud moral o ausencia de culpa. «En su integridad» es idiomático en español y conserva el matiz ético sin exagerar hacia «sin pecado».
- source_word: מֵעִקֵּשׁ
  english_pob_choice: than one who is crooked
  chosen_spanish: que uno torcido
  alternatives_spanish:
  - que uno perverso
  - que el torcido
  lexicon: HALOT
  rationale: La comparación con מן introduce el segundo término del proverbio. «Torcido» reproduce bien el contraste sapiencial con «integridad» y evita una carga interpretativa mayor que «perverso».
- source_word: דְּרָכַיִם
  english_pob_choice: in his ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - en su conducta
  - en sus senderos
  lexicon: HALOT
  rationale: El plural/doble דְּרָכַיִם funciona idiomáticamente como «conducta» o «modo de vida». «Caminos» conserva la imagen hebrea y encaja con «anda».
- source_word: וְהוּא עָשִׁיר
  english_pob_choice: though he is rich
  chosen_spanish: aunque él sea rico
  alternatives_spanish:
  - y él es rico
  - mientras él es rico
  lexicon: HALOT
  rationale: El hebreo final literalmente dice «y él es rico», refiriéndose al hombre torcido. En español, «aunque él sea rico» hace explícita la fuerza concesiva que la sentencia transmite por contraste, sin cambiar el referente.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés. Se mantiene la estructura comparativa proverbial, el contraste integridad/torcedura y la observación sobre la cláusula final, que en hebreo es literalmente coordinada («y él es rico»).
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «integridad» para תֹּם/תֻּם, en línea con el valor moral del término en la literatura sapiencial.
  - «Caminos» mantiene la metáfora hebrea de conducta y evita una abstracción excesiva.
  - La nota a pie de página preserva la alternativa formal documentada por el audit trail inglés.
