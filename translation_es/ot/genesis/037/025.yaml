translation:
  language: es
  text: Entonces se sentaron a comer pan[a], y alzaron sus ojos y miraron; y he aquí, una caravana de ismaelitas venía de Galaad, con sus camellos cargados de goma aromática, bálsamo y ládano[b], y ellos iban a llevarlo a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''a comer pan'', es decir, a tomar una comida.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo לֹט designa una resina aromática; su identificación precisa es incierta. También puede traducirse 'mirra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: Then they sat down
  chosen_spanish: Entonces se sentaron
  alternatives_spanish:
  - Y se sentaron
  - Luego se sentaron
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo; en español, 'Entonces' conserva la secuencia sin volver rígida la frase. 'Sentarse' es la equivalencia natural y fiel.
- source_word: לֶאֱכָל לֶחֶם
  english_pob_choice: to eat bread
  chosen_spanish: a comer pan
  alternatives_spanish:
  - a comer una comida
  - a comer
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto 'comer pan', que en español sigue siendo inteligible y refleja el modismo de tomar una comida. No se aplana a 'una comida' en el texto principal.
- source_word: וַיִּשְׂא֤וּ עֵֽינֵי/הֶם
  english_pob_choice: they lifted up their eyes
  chosen_spanish: alzaron sus ojos
  alternatives_spanish:
  - levantaron sus ojos
  - miraron hacia arriba
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de elevar los ojos. 'Alzaron' suena natural en español bíblico sin caer en una fórmula arcaizante demasiado rígida.
- source_word: וַיִּרְא֔וּ
  english_pob_choice: and looked
  chosen_spanish: y miraron
  alternatives_spanish:
  - y vieron
  - y observaron
  lexicon: HALOT
  rationale: Con 'y he aquí' después, 'miraron' comunica bien el acto perceptivo sin repetir innecesariamente 'vieron'. La combinación conserva el ritmo narrativo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y de pronto
  - y he aquí que
  lexicon: HALOT
  rationale: '''Y he aquí'' preserva la fuerza de presentación vívida del hebreo y mantiene un registro bíblico claro en español.'
- source_word: אֹרְחַת יִשְׁמְעֵאלִים
  english_pob_choice: a caravan of Ishmaelites
  chosen_spanish: una caravana de ismaelitas
  alternatives_spanish:
  - un grupo de ismaelitas
  - una compañía de ismaelitas
  lexicon: HALOT
  rationale: '''Caravana'' corresponde bien al contexto comercial y a los camellos mencionados. ''Ismaelitas'' conserva la identidad étnica del texto.'
- source_word: בָּאָה מִגִּלְעָד
  english_pob_choice: was coming from Gilead
  chosen_spanish: venía de Galaad
  alternatives_spanish:
  - iba llegando de Galaad
  - venía desde Galaad
  lexicon: HALOT
  rationale: El imperfecto descriptivo se expresa naturalmente con 'venía'. 'Galaad' es la forma española común del topónimo.
- source_word: וּגְמַלֵּיהֶם נֹשְׂאִים
  english_pob_choice: with their camels carrying
  chosen_spanish: y sus camellos llevaban
  alternatives_spanish:
  - con sus camellos llevando
  - y sus camellos transportaban
  lexicon: HALOT
  rationale: El hebreo describe a los camellos como portadores del cargamento; 'llevaban' suena fluido en español y mantiene la imagen concreta. Se evita una construcción pesada con gerundio.
- source_word: נְכֹאת
  english_pob_choice: gum
  chosen_spanish: estoraque
  alternatives_spanish:
  - goma aromática
  - resina aromática
  lexicon: HALOT
  rationale: El término hebreo designa una resina o aroma comercial; en español, 'estoraque' es una equivalencia tradicional y lexicamente plausible para esta sustancia aromática.
- source_word: צְרִי
  english_pob_choice: balm
  chosen_spanish: bálsamo
  alternatives_spanish:
  - resina
  - ungüento
  lexicon: HALOT
  rationale: '''Bálsamo'' es la correspondencia estándar y transparente para צְרִי, manteniendo la asociación con una resina/ungüento aromático de Galaad.'
- source_word: לֹט
  english_pob_choice: ladanum
  chosen_spanish: ládano
  alternatives_spanish:
  - ládano resinoso
  - cistus
  lexicon: HALOT
  rationale: La revisión auditada de la POB inglesa favorece 'ladanum' por precisión; en español, 'ládano' preserva esa identificación de resina aromática sin imponer 'mirra' donde el texto no la garantiza.
- source_word: הוֹלְכִים לְהוֹרִיד מִצְרָיְמָה
  english_pob_choice: going to take it down to Egypt
  chosen_spanish: yendo a llevarlo a Egipto
  alternatives_spanish:
  - para llevarlo a Egipto
  - de camino a llevarlo a Egipto
  lexicon: HALOT
  rationale: 'Se conserva el movimiento direccional del participio y del infinitivo: ''yendo a llevarlo''. El pronombre singular ''lo'' puede abarcar la carga colectiva en español natural, como hace la revisión inglesa con ''it''.'
theological_decisions:
- issue: Topónimo y dirección del movimiento a Egipto
  english_pob_reading: going to take it down to Egypt
  chosen_spanish_reading: yendo a llevarlo a Egipto
  alternative_spanish_readings:
  - para llevarlo a Egipto
  - bajando a Egipto para llevarlo
  rationale: 'No hay carga doctrinal especial, pero sí una decisión de fidelidad aspectual: se conserva la orientación de movimiento y el descenso implícito sin redundancia innecesaria en español.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó 'myrrh' por 'ladanum' para לֹט y aclaró la progresión narrativa de 'going to take it down to Egypt'. La versión española refleja esa preferencia con 'ládano' y conserva el movimiento direccional en una formulación natural.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantuvo el hebraísmo 'comer pan' en el texto principal por su valor idiomático y se explicó en nota.
  - 'Se eligieron formas españolas comunes para nombres propios: ''Galaad'' y ''Egipto''.'
  - Se evitó 'Cristo', 'Señor' y otros términos no pertinentes al pasaje.
  - '''Ismaelitas'' se conserva como etnónimo del texto base, sin reinterpretación.'
