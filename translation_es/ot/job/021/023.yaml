translation:
  language: es
  text: Uno muere en la plenitud de su vigor[a], completamente tranquilo y seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este muere en su plena fuerza, completamente tranquilo y sin perturbación».'
    reason: alternative_reading
lexical_decisions:
- source_word: זֶה
  english_pob_choice: One
  chosen_spanish: Uno
  alternatives_spanish:
  - Este
  - Este hombre
  lexicon: HALOT
  rationale: El demostrativo introduce un caso representativo en el contraste de Job; en español, «uno» conserva bien el valor genérico-singular sin volver la frase demasiado señalada o torpemente literal.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  lexicon: HALOT
  rationale: El imperfecto tiene valor gnómico/generalizante en el dicho de Job; el presente «muere» suena natural en español y refleja esa observación general.
- source_word: בְּעֶצֶם
  english_pob_choice: in the fullness of
  chosen_spanish: en la plenitud de
  alternatives_spanish:
  - en la misma fuerza de
  - en la sustancia de
  lexicon: HALOT
  rationale: עֶצֶם aquí no debe tomarse de manera literal como «hueso», sino como intensidad/estado pleno. «La plenitud de» transmite el valor idiomático de manera clara y digna.
- source_word: תֻּמּוֹ
  english_pob_choice: his vigor
  chosen_spanish: su vigor
  alternatives_spanish:
  - su plenitud
  - su integridad
  - su plena fuerza
  lexicon: HALOT
  rationale: En este contexto no se trata de integridad moral, sino de condición intacta o vigor no disminuido. «Vigor» recoge esa fuerza vital que el inglés POB también privilegia.
- source_word: כֻּלּוֹ
  english_pob_choice: wholly
  chosen_spanish: todo él
  alternatives_spanish:
  - enteramente
  - por completo
  lexicon: HALOT
  rationale: El término intensifica la afirmación siguiente. «Todo él» conserva la fuerza del hebreo y evita perder el énfasis corporal/global que la frase subraya.
- source_word: שַׁלְאֲנַן
  english_pob_choice: at ease
  chosen_spanish: tranquilo
  alternatives_spanish:
  - en calma
  - a gusto
  - sin inquietud
  lexicon: HALOT
  rationale: El adjetivo expresa quietud y ausencia de perturbación. En español, «tranquilo» comunica ese estado con naturalidad y sin cargarlo innecesariamente hacia prosperidad material.
- source_word: וְשָׁלֵיו
  english_pob_choice: secure
  chosen_spanish: seguro
  alternatives_spanish:
  - sin sobresalto
  - en paz
  - sereno
  lexicon: HALOT
  rationale: El segundo término refuerza la calma con matiz de estabilidad o seguridad. «Seguro» mantiene el paralelismo con «tranquilo» y evita diluir la repetición enfática del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el análisis del POB en inglés y no introduce cambios respecto del último pase revisado; se mantiene la equivalencia óptima para una frase gnómica con paralelismo léxico.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «señor» o formas eclesiásticas tradicionales no motivadas por el hebreo.
  - La duplicación semántica de שַׁלְאֲנַן / שָׁלֵיו se refleja con «tranquilo y seguro», manteniendo el paralelismo sin sobreexplicarlo.
