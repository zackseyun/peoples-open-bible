  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Dios» para אֱלֹהִים, «Altísimo» para עֶלְיוֹן, y «testimonios» para עֵדוֹתָיו están bien. La principal mejora es idiomática y de preservación de notas, no de glosario.'
