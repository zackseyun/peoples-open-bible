- from: Y la tierra estuvo en paz todos los días de Simón, y él buscó el bien de su nación; y su autoridad y su gloria les agradaron todos sus días.
  to: Y la tierra estuvo en calma todos los días de Simón, y él buscó el bien para su nación; y su autoridad y su gloria les agradaron todos sus días.
  rationale: Se ajusta «estuvo en paz» a «estuvo en calma» para seguir mejor el matiz de ἡσύχασεν/‘was at rest’ sin sobreinterpretar la situación como paz formal. Se corrige «de su nación» a «para su nación» para reflejar el dativo de beneficio τῷ ἔθνει αὐτοῦ. No se requieren notas.
