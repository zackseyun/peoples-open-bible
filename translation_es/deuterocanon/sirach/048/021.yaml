translation:
  language: es
  text: Hirió el campamento de Asiria[a], y lo sumió en confusión con una plaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Hirió el campamento de los asirios, y su ángel los destruyó».'
    reason: alternative_reading
lexical_decisions:
- source_word: ויך
  english_pob_choice: He struck
  chosen_spanish: Él hirió
  alternatives_spanish:
  - Él golpeó
  - Él golpeó con fuerza
  - Él hirió de muerte
  lexicon: HALOT
  rationale: El hebreo ויך expresa una acción de golpear/herir con fuerza. En español, 'hirió' mantiene la contundencia sin sonar demasiado arcaico, y puede abarcar tanto un golpe literal como una acción punitiva más amplia.
- source_word: מחנה אשור
  english_pob_choice: the camp of Assyria
  chosen_spanish: el campamento de Asiria
  alternatives_spanish:
  - el campamento asirio
  - el campamento de los asirios
  lexicon: HALOT
  rationale: La construcción hebrea apunta literalmente al campamento asociado con Asiria. 'Campamento de Asiria' conserva la estructura y resulta natural en español, sin perder el referente nacional/geográfico del original.
- source_word: ויהמם
  english_pob_choice: threw it into confusion
  chosen_spanish: lo llenó de confusión
  alternatives_spanish:
  - lo confundió
  - lo sembró de pánico
  - lo desordenó
  lexicon: HALOT
  rationale: El verbo המם expresa causar confusión, pánico o desorden. 'Lo llenó de confusión' reproduce bien el efecto causativo y suena idiomático en español. Se evita resolverlo como 'destruyó', porque esa es la lectura griega alternativa, no la hebrea principal.
- source_word: במגפה
  english_pob_choice: with a plague
  chosen_spanish: con una plaga
  alternatives_spanish:
  - por medio de una plaga
  - con pestilencia
  - mediante una plaga
  lexicon: HALOT
  rationale: מגפה significa 'plaga' o 'pestilencia'. 'Con una plaga' conserva el valor instrumental de la preposición hebrea ב y mantiene el lenguaje bíblico claro en español.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en la segunda cláusula
  english_pob_reading: 'Follow the Hebrew: ''threw it into confusion with a plague'''
  chosen_spanish_reading: 'Seguir el hebreo: ''lo llenó de confusión con una plaga'''
  alternative_spanish_readings:
  - 'Seguir el griego: ''su ángel los destruyó'''
  - '''su ángel los aniquiló'''
  rationale: La tradición del proyecto prioriza el hebreo conservado cuando es de alta confianza. Aquí el hebreo habla de confusión causada por una plaga, mientras que el griego atribuye la destrucción al ángel de Dios. Se conserva la lectura hebrea en el texto principal y se documenta la variante griega para no borrar la tensión textual y teológica.
  doctrine_reference: Primacía de la fuente original disponible; preservar variantes textuales y su peso interpretativo
- issue: Referencia al ángel en la tradición griega
  english_pob_reading: 'Greek footnote: ''his angel destroyed them'''
  chosen_spanish_reading: '''su ángel los destruyó'' como lectura alternativa en nota'
  alternative_spanish_readings:
  - '''el ángel de Yahvé los destruyó'''
  - '''su mensajero los destruyó'''
  rationale: El griego usa ὁ ἄγγελος αὐτοῦ, 'su ángel'. En español, 'ángel' es la traducción directa y transparente. No se introduce 'Yahvé' en la nota porque el griego no lo explicita aquí; se mantiene la formulación austera del testimonio griego.
  doctrine_reference: Respeto a la lectura griega sin expandirla más allá de su formulación
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios; el estado final se mantiene sin modificaciones respecto del pase anterior, con alta concordancia entre testimonios y una única divergencia relevante entre hebreo y griego en la clausula final.
  spanish_consistency_notes:
  - Se mantiene 'Asiria' para el referente nacional/geográfico, coherente con el hebreo אשור y la tradición de nombres propios en el proyecto.
  - Se evita 'SEÑOR' como sustituto; no aparece el Tetragrámaton en este versículo.
  - '''Plaga'' se conserva como término bíblico claro y consistente con el hebreo מגפה.'
  - La nota al pie marca explícitamente la lectura griega alternativa para no perder el contraste textual.
