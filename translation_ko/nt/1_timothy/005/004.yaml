id: 1TI.5.4
reference: 1 Timothy 5:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ δέ τις χήρα τέκνα ἢ ἔκγονα ἔχει, μανθανέτωσαν πρῶτον τὸν ἴδιον οἶκον εὐσεβεῖν καὶ ἀμοιβὰς ἀποδιδόναι τοῖς προγόνοις, τοῦτο γάρ ἐστιν ἀπόδεκτον ἐνώπιον τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/004.yaml
  text: But if any widow has children or grandchildren[a], let them first learn to show godliness to their own household and to repay their forebears[c][b], for this is acceptable before God.
  footnotes:
  - marker: a
    text: Or 'children or descendants.' The Greek ἔκγονα can be broader than 'grandchildren,' but here likely refers to the next generation within the family.
    reason: lexical_alternative
  - marker: b
    text: Or 'to practice piety toward their own household.' The Greek links family care with godliness.
    reason: lexical_alternative
  - marker: c
    text: Or 'their parents' or 'their ancestors.' The Greek literally means 'forebears.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 어떤 과부에게 자녀나 손주들[a]이 있다면, 그들이 먼저 자기 집안에서 경건을 행하고[b] 부모[c]에게 보답하는 법을 배우게 하십시오. 이것이 하나님 앞에서 기쁘게 받으실 만한 일이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자손들」. 헬라어 ἔκγονα는 「손주」보다 폭이 넓을 수 있으나, 본 문맥에서는 다음 세대 가족을 가리키는 것으로 보인다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자기 집안에 대해 경건을 실천하고」. 헬라어는 가족 돌봄을 경건과 연결한다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「부모들」 「조상들」. 헬라어는 직역하면 「선조들」.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ τις χήρα ... ἔχει
  english_pob_choice: if any widow has
  chosen_korean: 어떤 과부에게 ~ 이 있다면
  alternatives_korean:
  - 만일 어떤 과부가 ~ 을 두고 있다면
  lexicon: BDAG
  rationale: 자연스러운 한국어 가정문.
- source_word: ἔκγονα
  english_pob_choice: grandchildren
  chosen_korean: 손주들
  alternatives_korean:
  - 자손들
  - 후손들
  lexicon: BDAG
  rationale: 「손주」가 본 문맥에 자연스럽다.
- source_word: τὸν ἴδιον οἶκον εὐσεβεῖν
  english_pob_choice: show godliness to their own household
  chosen_korean: 자기 집안에서 경건을 행하고
  alternatives_korean:
  - 자기 가정에 경건을 실천하고
  - 자기 식구에 대해 경건히 행하고
  lexicon: BDAG
  rationale: εὐσεβέω + 대격의 「~에 대해 경건히 행함」을 「~에서 경건을 행하고」로 옮긴다.
- source_word: ἀμοιβὰς ἀποδιδόναι τοῖς προγόνοις
  english_pob_choice: repay their forebears
  chosen_korean: 부모에게 보답하는 법
  alternatives_korean:
  - 선조들에게 갚는 법
  - 조상들에게 보답하는 일
  lexicon: BDAG
  rationale: πρόγονοι는 직역상 「선조」이나 본 문맥(과부 부모 봉양)에서는 「부모」가 가장 명확. 「선조」 해석은 각주.
- source_word: ἀπόδεκτον ἐνώπιον τοῦ θεοῦ
  english_pob_choice: acceptable before God
  chosen_korean: 하나님 앞에서 기쁘게 받으실 만한 일
  alternatives_korean:
  - 하나님 앞에 합당한 일
  lexicon: BDAG
  rationale: 2:3과 일관.
