theological_decisions:
- issue: Whether መንፈስ should be rendered 'Spirit' or 'spirit'
  chosen_reading: the spirit
  alternative_readings:
  - the Spirit
  rationale: The line describes an overpowering force affecting Mikael, but the Ge'ez wording alone does not require explicit identification with the Holy Spirit. Lowercase preserves the ambiguity rather than resolving it dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ዕፁቡ refers to judgment itself or to a terrible report heard by the ear
  chosen_reading: the severity of the judgment concerning these hidden things
  alternative_readings:
  - the terrible matter heard by the ear concerning these hidden things
  - the harsh sentence about these secret things
  rationale: The OCR text is difficult and appears to contain repeated ለእዝኒ phrases. The most coherent reading in context is that Mikael is overwhelmed by the severe judgment connected with hidden matters. This keeps close to the extant wording while acknowledging uncertainty.
