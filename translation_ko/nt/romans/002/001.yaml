id: ROM.2.1
reference: Romans 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὸ ἀναπολόγητος εἶ, ὦ ἄνθρωπε πᾶς ὁ κρίνων· ἐν ᾧ γὰρ κρίνεις τὸν ἕτερον, σεαυτὸν κατακρίνεις, τὰ γὰρ αὐτὰ πράσσεις ὁ κρίνων·
base_translation:
  language: en
  yaml_path: translation/nt/romans/002/001.yaml
  text: Therefore you are without excuse[a], O man, every one who judges. For in passing judgment on another, you condemn yourself, because you who judge practice the same things.
  footnotes:
  - marker: a
    text: Or 'O person' / 'O human being.' Greek 'man' is masculine singular but representative in force.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로, 판단하는 자, 사람아, 너는 누구든지 변명할 수 없다. 이는 네가 다른 사람을 판단하는 그 일로 자신을 정죄하기 때문이니, 판단하는 네가 같은 일을 행하고 있다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναπολόγητος
  english_pob_choice: without excuse
  chosen_korean: 변명할 수 없다
  alternatives_korean:
  - 핑계할 수 없다
  lexicon: BDAG
  rationale: 1:20과 동일 어휘이므로 일관되게 「변명할 수 없다」로 옮긴다.
- source_word: ἄνθρωπε
  english_pob_choice: O man
  chosen_korean: 사람아
  alternatives_korean:
  - 인생아
  - 사람이여
  lexicon: BDAG
  rationale: 바울의 수사적 호격을 한국어의 직접적 「사람아」로 옮긴다. 합쇼체 본문이라도 호격의 강도를 살리기 위해 평어를 유지한다.
- source_word: κατακρίνεις
  english_pob_choice: condemn
  chosen_korean: 정죄하기
  alternatives_korean:
  - 단죄하기
  lexicon: BDAG
  rationale: 강조 κατα-의 함의를 「정죄」로 보존한다.
theological_decisions:
- issue: 2장의 직설적 호격(ὦ ἄνθρωπε) — 합쇼체 본문 내에서 처리
  chosen_reading: 평어 「~다」 + 「사람아」 호격
  alternative_readings:
  - 합쇼체 일관 — 「당신은 ...입니다, 사람이여」
  rationale: 바울의 수사가 가상의 대화 상대를 거세게 몰아붙이는 디아트리브 형식이다. 합쇼체로 옮기면 그 강도가 사라지므로, 2:1-29의 호격 단락에서는 평어를 사용해 본문의 격렬한 음조를 보존한다.
  doctrine_reference: DOCTRINE.md §1 — author's powerful meaning
