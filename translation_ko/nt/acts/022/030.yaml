  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'Τῇ δὲ ἐπαύριον βουλόμενος γνῶναι τὸ ἀσφαλὲς τὸ τί κατηγορεῖται ⸀ὑπὸ τῶν Ἰουδαίων ἔλυσεν ⸀αὐτόν, καὶ ἐκέλευσεν ⸀συνελθεῖν τοὺς ἀρχιερεῖς καὶ ⸀πᾶν τὸ ⸀συνέδριον, καὶ καταγαγὼν τὸν Παῦλον ἔστησεν εἰς αὐτούς.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/022/030.yaml
  text: But on the next day[a], wanting to know for certain what he was being accused of by the Jews, he released him and ordered the chief priests and the whole council to assemble; and bringing Paul down[b], he set him before them.
  footnotes:
  - marker: a
    text: "Or 'by the Jewish leaders' or 'by the Judeans.' The Greek reads 'by the Jews'; in context it refers to Paul's accusers, not to every Jewish person without distinction."
    reason: lexical_alternative
  - marker: b
    text: "'Council' refers to the Sanhedrin, the Jewish ruling body in Jerusalem."
    reason: cultural_note
translation:
  language: ko
  text: 다음 날 천부장은 바울이 유대인들에게서 무엇으로 고발당하는지 확실히 알기 원하여, 그를 풀어 주고 대제사장들과 온 공의회를[b] 모이라고 명했습니다. 그리고 바울을 데려와 그들 앞에 세웠습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「유대 지도자들에게서」 또는 「유다 사람들에게서」. 본문은 「유대인들」이라고 하지만 문맥상 바울의 고발자들을 가리키며, 모든 유대인 일반을 가리키지 않는다.
    reason: lexical_alternative
  - marker: b
    text: 「공의회」는 예루살렘의 유대 지도 기관 산헤드린을 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: συνέδριον
  english_pob_choice: council
  chosen_korean: 공의회
  alternatives_korean:
