review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del arameo y la trayectoria de auditoría inglesa: introduce a Tatnai/Tatanai, nombra a Setar-Boznai, identifica a los asociados ubicados en la jurisdicción de «Más Allá del Río» y comunica la orden de mantenerse lejos. Sin embargo, hay dos desajustes relevantes con el texto fuente y la POB inglesa: (1) וּכְנָוָתְהוֹן lleva sufijo de segunda persona plural, por lo que debe reflejarse como «tus/vuestros asociados», no «sus asociados»; y (2) la nota [a] está anclada al nombre propio en vez de anclarse a la orden final, donde pertenece la alternativa literal «estén lejos de allí».'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse en precisión y naturalidad. «Aléjense de allí» funciona, aunque «manténganse lejos de allí» refleja mejor la fuerza continua de la orden y armoniza con la nota literal. «Más Allá del Río» es comprensible como título administrativo, aunque conviene mantener la capitalización interna de forma consistente. La colocación de notas necesita corrección para cumplir el formato del proyecto.
  glossary_alignment: No hay términos teológicos mayores en juego. La transliteración de nombres propios es aceptable en español. La decisión de traducir אֲפַרְסְכָיֵא por «funcionarios» y conservar la alternativa transliterada en nota concuerda con la justificación de la POB. La principal desviación léxica es el pronombre posesivo en וּכְנָוָתְהוֹן, que debe quedar en segunda persona plural.
  issues:
  - severity: high
    issue: «sus asociados» no refleja el sufijo de segunda persona plural de וּכְנָוָתְהוֹן
    rationale: La POB inglesa documenta correctamente «your associates». En español, «sus» introduce ambigüedad y puede leerse como tercera persona; debe decir «tus asociados» o equivalente que preserve la apelación directa del decreto.
  - severity: high
    issue: La nota [a] está colocada sobre «Tatanai» en vez de sobre la orden verbal final
    rationale: La nota explica la alternativa literal de רַחִיקִין הֲוֹו מִן תַּמָּה («estén lejos de allí»), no el nombre propio. Esto incumple el requisito de anclar cada nota en la frase pertinente.
  - severity: medium
    issue: «aléjense de allí» es correcto pero menos preciso que una formulación de permanencia/distancia
    rationale: El arameo es literalmente «estén/sean lejos de allí», y la POB inglesa optó por «keep far away». «Manténganse lejos de allí» reproduce mejor ese matiz continuativo y la nota literal asociada.
  - severity: low
    issue: La nota cultural [b] habla de «la provincia» cuando la revisión inglesa quitó «province» del texto principal
    rationale: La nota puede mantenerse porque explica la designación administrativa persa, pero una formulación más neutra como «la región al oeste del Éufrates» evita sobreespecificar más de lo necesario.
  revised_spanish_text: Ahora, Tatanai, gobernador de Más Allá del Río[b], Setar-Boznai, y tus asociados, los funcionarios que están más allá del Río[c], manténganse lejos de allí[a].
  revised_footnotes:
