translation:
  language: es
  text: Así que decidí tomarla[a] para que viva conmigo, sabiendo que sería consejera de cosas buenas para mí, y un consuelo en las preocupaciones y la tristeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casarme con ella» / «tomarla como esposa»; el griego dice más literalmente «tomarla para vivir juntos», con lenguaje de Sabiduría personificada sin un término matrimonial explícito en este versículo.
    reason: alternative_reading
  - marker: b
    text: O «una exhortación» o «una consolación» en las preocupaciones y la tristeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκρινα
  english_pob_choice: I decided
  chosen_spanish: decidí
  alternatives_spanish:
  - juzgué
  - resolví
  lexicon: BDAG / LSJ
  rationale: El aoristo expresa una determinación ya formada. «Decidí» conserva el sentido deliberativo con naturalidad en español sin sobrerrevestirlo de formalidad.
- source_word: τοίνυν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: LSJ
  rationale: La partícula enlaza con la conclusión anterior. «Así que» mantiene el valor inferencial en español actual con un tono fluido.
- source_word: ταύτην
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - esta
  - ella
  lexicon: LSJ
  rationale: El referente es Sabiduría personificada en femenino. En español, el objeto directo femenino «la» es natural y conserva la referencia pronominal sin añadir un demostrativo innecesario.
- source_word: ἀγαγέσθαι πρὸς συμβίωσιν
  english_pob_choice: to take her to live with me
  chosen_spanish: llevarla conmigo para vivir juntos
  alternatives_spanish:
  - tomarla para convivencia
  - llevarla para compartir la vida
  lexicon: LSJ
  rationale: La expresión apunta a convivencia o vida compartida, no a un término matrimonial explícito. «Llevarla conmigo para vivir juntos» preserva esa fuerza doméstica y relacional sin sobreespecificar matrimonio.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabía
  - ya que sabía
  lexicon: BDAG
  rationale: El participio explica la razón de la decisión. «Sabiendo» conserva la relación causal en una estructura natural en español.
- source_word: σύμβουλος ἀγαθῶν
  english_pob_choice: a counselor of good things for me
  chosen_spanish: consejera de cosas buenas para mí
  alternatives_spanish:
  - consejera de bienes
  - consejera para el bien
  lexicon: LSJ
  rationale: σύμβουλος puede ser «consejero/consejera». «De cosas buenas» conserva la amplitud de ἀγαθῶν, que no se limita aquí a bondad moral sino a lo beneficioso o bueno en general.
- source_word: παραίνεσις
  english_pob_choice: a comfort
  chosen_spanish: un consuelo
  alternatives_spanish:
  - una exhortación
  - una consolación
  - un alivio
  lexicon: LSJ
  rationale: En este contexto, junto a «preocupaciones y tristeza», el valor de apoyo consolador predomina. «Consuelo» refleja mejor ese matiz que una exhortación más directa.
- source_word: φροντίδων
  english_pob_choice: cares
  chosen_spanish: las preocupaciones
  alternatives_spanish:
  - las inquietudes
  - los cuidados
  - las ansiedades
  lexicon: LSJ
  rationale: El plural expresa cargas mentales o aflicciones del cuidado. «Preocupaciones» comunica bien esa tensión en español contemporáneo.
- source_word: λύπης
  english_pob_choice: grief
  chosen_spanish: la tristeza
  alternatives_spanish:
  - el dolor
  - la aflicción
  - el pesar
  lexicon: LSJ
  rationale: λύπη cubre tristeza, dolor y pesar. «Tristeza» es clara y amplia, y en paralelo con «preocupaciones» mantiene una lectura accesible sin perder el tono afectivo.
theological_decisions:
- issue: Si la frase debe volverse explícitamente matrimonial en español
  english_pob_reading: to take her to live with me, without an explicit marriage term
  chosen_spanish_reading: llevarla conmigo para vivir juntos
  alternative_spanish_readings:
  - casarme con ella
  - tomarla como esposa
  rationale: El griego dice literalmente convivencia o vida compartida y no usa el término normal de matrimonio. Mantener la convivencia evita importar una afirmación más fuerte que la del texto, aunque el contexto personifique a Sabiduría con lenguaje afín al de esposa.
  doctrine_reference: Primacía del texto original; preservar la tensión entre imagen personificada y formulación no explícitamente matrimonial.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «a comfort» para παραίνεσις en el contexto de «cares and grief». En español, «un consuelo» recoge esa actualización y evita un término más activo como «exhortación», que aquí sonaría menos congruente con la pareja semántica del versículo.
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» implícita por el femenino de los pronombres, sin introducir el nombre en el texto porque el griego del versículo solo usa pronombres.
  - «Así que» se eligió para reflejar el valor inferencial de τοίνυν sin sobrerrepresentarlo con un conector más pesado.
  - «de cosas buenas» conserva la amplitud del genitivo ἀγαθῶν mejor que una paráfrasis más estrecha.
