    rationale: No es infiel, pero 'cortaré de la faz de la tierra' o 'eliminaré de la faz de la tierra' suena más bíblico y menos técnico. Aun así, no es error grave.
  - severity: low
    issue: '''De delante de mi rostro'' es muy literal y algo tieso'
    rationale: Es defendible por fidelidad al hebreo, pero 'de delante de mí' fluye mejor en español principal, dejando 'de mi presencia' como alternativa en nota.
