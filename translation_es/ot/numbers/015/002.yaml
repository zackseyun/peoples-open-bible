translation:
  language: es
  text: 'Habla a los hijos de Israel y diles[a]: «Cuando entren en la tierra donde habitarán[b], que yo les doy»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo es literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra de sus moradas» o «la tierra de sus asentamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla a
  lexicon: HALOT
  rationale: El imperativo da la instrucción solemne de comunicar un mandato divino. «Habla» conserva ese registro formal en español y evita la dureza de un calco innecesario.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos varones de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial y masculina en forma. «Hijos de Israel» mantiene esa forma sin perder inteligibilidad en español; «israelitas» suavizaría la explicitud del original.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y diles a ellos
  - y di a ellos
  - y diles
  lexicon: HALOT
  rationale: En español, «diles» expresa de manera natural el mandato directo con pronombre enclítico. Mantiene el valor de la fórmula hebrea sin sobrecargar la frase.
- source_word: כִּי תָבֹאוּ
  english_pob_choice: When you come
  chosen_spanish: Cuando entren
  alternatives_spanish:
  - Cuando lleguen
  - Cuando ustedes entren
  - Si/Cuando entren
  lexicon: HALOT
  rationale: «Cuando» comunica mejor la circunstancia prevista por la ley. Se usa «entren» para un español natural y respetuoso del sentido de entrada a la tierra.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En este contexto pactal, «tierra» conserva la carga teológica habitual del Pentateuco. «País» sería menos adecuado aquí.
- source_word: מוֹשְׁבֹתֵיכֶם
  english_pob_choice: your dwellings
  chosen_spanish: de sus moradas
  alternatives_spanish:
  - de sus asentamientos
  - donde habitarán
  - de sus viviendas
  lexicon: HALOT
  rationale: La construcción hebrea es literal y algo inusual. «Moradas» preserva el campo semántico de lugar de habitación sin sonar tan técnico como «asentamientos».
- source_word: אֲשֶׁר אֲנִי נֹתֵן לָכֶם
  english_pob_choice: which I am giving to you
  chosen_spanish: que yo les doy
  alternatives_spanish:
  - que yo les estoy dando
  - que yo les daré
  - que les doy
  lexicon: HALOT
  rationale: El participio hebreo expresa acción divina en curso o inminente. En español, «les doy» comunica la entrega prometida con naturalidad y sin introducir una futura más fuerte de la que exige el hebreo.
theological_decisions:
- issue: Forma masculina plural en «בְּנֵי יִשְׂרָאֵל»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se preserva la forma masculina plural del hebreo, conforme a la política de no neutralizar sin razón el término original. El referente sigue siendo la comunidad del pacto, pero la forma se mantiene visible en la traducción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Aspecto del don divino en נֹתֵן
  english_pob_reading: which I am giving to you
  chosen_spanish_reading: que yo les doy
  alternative_spanish_readings:
  - que yo les estoy dando
  - que yo les daré
  rationale: El hebreo participial indica acción divina continua o inmediata. «Les doy» conserva la certeza y proximidad del don sin convertirlo en un futuro simple que podría exagerar el matiz temporal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se observó una alta coincidencia en la revisión más reciente; no se requirieron cambios sustanciales. La redacción española busca ser publicable, manteniendo la fuerza formal del imperativo, la forma filial de «hijos de Israel» y el valor participial del don divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «hijos de Israel» para reflejar la forma del hebreo, en coherencia con la política de precisión de género gramatical.
  - «La tierra» se usa en sentido pactal, no meramente geográfico.
  - «Les doy» preserva la cercanía del participio hebreo sin sobretraducir el tiempo verbal.
