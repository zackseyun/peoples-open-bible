translation:
  language: es
  text: Según su inmundicia y según sus transgresiones[a] traté con ellos, y escondí mi rostro de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según su impureza y según sus rebeliones traté con ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּטֻמְאָתָם
  english_pob_choice: According to their uncleanness
  chosen_spanish: Conforme a su impureza
  alternatives_spanish:
  - En conformidad con su impureza
  - De acuerdo con su impureza
  lexicon: HALOT
  rationale: El prefijo כ expresa medida o conformidad; en español, «conforme a» reproduce bien ese valor sin sonar forzado. «Impureza» mantiene el campo semántico bíblico de טֻמְאָה y es más natural en español que «inmundicia» o una paráfrasis moralizante.
- source_word: וּכְפִשְׁעֵיהֶם
  english_pob_choice: and according to their transgressions
  chosen_spanish: y conforme a sus transgresiones
  alternatives_spanish:
  - y en conformidad con sus rebeliones
  - y de acuerdo con sus ofensas
  lexicon: HALOT
  rationale: פֶּשַׁע puede implicar transgresión o rebelión contra Dios. «Transgresiones» conserva el peso moral y judicial del término sin estrecharlo a una sola lectura de rebelión abierta.
- source_word: עָשִׂיתִי אֹתָם
  english_pob_choice: I dealt with them
  chosen_spanish: actué con ellos
  alternatives_spanish:
  - traté con ellos
  - me conduje hacia ellos
  lexicon: HALOT
  rationale: El hebreo עשה + objeto aquí es idiomático y no significa «hacerlos». En español, «actué con ellos» conserva la idea de cómo Dios procedió respecto de ellos, sin añadir un matiz demasiado interpretativo ni sonar mecánico.
- source_word: וָאַסְתִּר פָּנַי מֵהֶם
  english_pob_choice: and I hid my face from them
  chosen_spanish: y oculté mi rostro de ellos
  alternatives_spanish:
  - y escondí mi rostro de ellos
  - y aparté mi rostro de ellos
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de «ocultar/esconder el rostro», importante teológicamente en el contexto profético. «Rostro» es más natural en español bíblico que «cara» y mantiene la metáfora de retiro de presencia/favor.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  lexicon: HALOT
  rationale: «Rostro» comunica mejor el registro bíblico en español y conserva la metonimia de presencia/favor sin banalizar la imagen.
theological_decisions:
- issue: Si expresar explícitamente la retirada de favor divino en vez de conservar la metáfora de esconder el rostro
  english_pob_reading: Retain the idiom 'I hid my face from them' in the main text
  chosen_spanish_reading: 'Conservar la metáfora: «oculté mi rostro de ellos»'
  alternative_spanish_readings:
  - aparté mi rostro de ellos
  - retiré mi favor de ellos
  rationale: La metáfora hebrea es parte del peso profético del juicio. Mantenerla en español preserva la tensión entre imagen y significado teológico, en lugar de resolverla con una glosa explicativa.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it'
- issue: Valor de טֻמְאָה en contexto profético
  english_pob_reading: Render as 'uncleanness'
  chosen_spanish_reading: Render como «impureza»
  alternative_spanish_readings:
  - inmundicia
  - contaminación ritual
  rationale: En español contemporáneo, «impureza» comunica de manera clara el ámbito ritual y moral de טֻמְאָה. «Inmundicia» puede sonar más arcaica o restringida, y «contaminación ritual» explicita demasiado una sola dimensión del término.
  doctrine_reference: 'Translation philosophy #1, original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones posteriores; el pasaje quedó estable en la última pasada y el cotejo externo reportó alto acuerdo. La redacción española sigue esa lectura estable, con ajustes idiomáticos propios del español bíblico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino en este proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva la imagen de «oculté mi rostro» para no diluir el paralelismo hebreo con el juicio precedente.
  - «Conforme a» replica mejor el valor del כ prefijado que una paráfrasis más amplia como «a causa de» o «según».
