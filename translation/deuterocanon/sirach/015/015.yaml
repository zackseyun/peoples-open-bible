theological_decisions:
- issue: Text-critical tension between the Hebrew second colon and the Greek parallel
  chosen_reading: The main text follows the Hebrew as primary but allows the Greek to clarify the difficult middle clause, yielding 'and to act faithfully is a matter of your good pleasure.'
  alternative_readings:
  - and understanding to do his will
  - and to act faithfully according to his good pleasure
  - and fidelity consists in doing what pleases him
  rationale: The Hebrew line וְתָבִינָה לַעֲשׂוֹת רְצוֹנוֹ is awkward as transmitted, while the Greek reads καὶ πίστιν ποιῆσαι εὐδοκίας. Since Sirach in Hebrew is primary where extant, the translation does not abandon it; however, the Greek is explicitly provided as a translation input and helps avoid a misleadingly confident rendering of a difficult clause. The result preserves the verse's emphasis on human willing and responsible obedience without overstating textual certainty.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input; preserve source uncertainty honestly.'
- issue: Human freedom and obedience
  chosen_reading: The verse is rendered conditionally and volitionally without importing stronger doctrinal claims about autonomous free will.
  alternative_readings:
  - If you choose, you can keep the commandments
  - If you are willing, you shall keep his commandments
  rationale: Ben Sira emphasizes human responsibility, but the translation should not sharpen the statement into a philosophical thesis beyond the wording of the text. 'If you desire, you will keep...' preserves the moral-volitional emphasis while staying close to the source.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
