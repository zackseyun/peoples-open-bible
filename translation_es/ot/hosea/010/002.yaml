translation:
  language: es
  text: Su corazón está dividido[a]; ahora cargarán con su culpa[b]. Él mismo derribará sus altares; devastará sus estelas sagradas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su corazón es suave/insincero». El verbo hebreo puede sugerir suavidad o deslizamiento, y por eso también puede entenderse como falta de integridad; aquí se traduce «dividido» porque el contexto recalca la lealtad partida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán hallados culpables» o «sufrirán por su culpa».'
    reason: lexical_alternative
  - marker: c
    text: «Estelas sagradas» se refiere a piedras de culto erguidas usadas en la adoración idolátrica.
    reason: cultural_note
lexical_decisions:
- source_word: חָלַק
  english_pob_choice: is divided
  chosen_spanish: Dividido está
  alternatives_spanish:
  - Está dividido
  - Su corazón está dividido
  - Su corazón es dividido
  lexicon: HALOT
  rationale: El hebreo puede sugerir literalidad de «suave/sinsincero» o la idea metafórica de división. En español, «dividido está» conserva el juicio profético de doble lealtad y mantiene la ambigüedad léxica sin perder naturalidad.
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - sus corazones
  lexicon: HALOT
  rationale: «Corazón» conserva el idioma bíblico para el centro de la voluntad, pensamiento y lealtad. El singular colectivo español funciona bien con el sustantivo hebreo en sentido corporativo.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - entonces
  - por eso ahora
  - en este momento
  lexicon: HALOT
  rationale: '«Ahora» reproduce el giro temporal-adversativo del texto: de la acusación a la sentencia inmediata.'
- source_word: יֶאְשָׁמוּ
  english_pob_choice: they will bear guilt
  chosen_spanish: serán hallados culpables
  alternatives_spanish:
  - llevarán su culpa
  - pagarán por su culpa
  - serán culpables
  lexicon: HALOT
  rationale: El verbo puede expresar incurrir en culpa, ser declarado culpable o sufrir las consecuencias de la culpa. «Serán hallados culpables» preserva el matiz forense sin añadir una posesión inexistente de la culpa.
- source_word: הוּא
  english_pob_choice: He himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - Él
  - él
  lexicon: HALOT
  rationale: El pronombre explícito es enfático. «Él mismo» mantiene ese énfasis y deja claro que la acción destructora se atribuye al sujeto singular del verso, sin introducir un referente que el texto no nombre.
- source_word: יַעֲרֹף
  english_pob_choice: will tear down
  chosen_spanish: derribará
  alternatives_spanish:
  - destruirá
  - derrumbará
  - arrancará
  lexicon: HALOT
  rationale: Aunque el verbo hebreo tiene el sentido básico de quebrar/desencajar, aplicado a altares requiere una equivalencia idiomática. «Derribará» comunica destrucción enérgica y es natural en español.
- source_word: מִזְבְּחוֹתָם
  english_pob_choice: their altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus altares de culto
  - sus lugares de sacrificio
  lexicon: HALOT
  rationale: «Altares» es el equivalente directo y conserva la referencia cultual del contexto.
- source_word: יְשֹׁדֵד
  english_pob_choice: he will devastate
  chosen_spanish: devastará
  alternatives_spanish:
  - asolará
  - destruirá
  - arruinará
  lexicon: HALOT
  rationale: La forma expresa acción destructiva intensa. «Devastará» mantiene el paralelismo con «derribará» y el tono de juicio.
- source_word: מַצֵּבוֹתָם
  english_pob_choice: their sacred pillars
  chosen_spanish: sus piedras sagradas
  alternatives_spanish:
  - sus pilares sagrados
  - sus estelas sagradas
  - sus piedras rituales
  lexicon: HALOT
  rationale: En este contexto, el término alude a piedras o estelas de culto. «Piedras sagradas» transmite la función cultual sin cargar con una terminología demasiado técnica para el lector general. Se preserva la tensión entre la denominación descriptiva y la referencia a objetos de culto prohibido.
theological_decisions:
- issue: Referente del sujeto enfático en la segunda mitad del verso
  english_pob_reading: 'God is the implied subject of the acts of judgment: ''He himself will tear down... he will devastate...'''
  chosen_spanish_reading: 'Se mantiene la lectura de que el sujeto implícito es Dios actuando en juicio: «Él mismo derribará... devastará...».'
  alternative_spanish_readings:
  - Un enemigo o agente humano no nombrado derribará... devastará...
  rationale: El contexto profético presenta a Dios como ejecutor último del juicio, aunque pueda obrar por medio de instrumentos. La traducción conserva el pronombre enfático sin añadir «Yahvé» al verso, para no resolver más de lo que el hebreo explicita en la superficie.
  doctrine_reference: Conservar la tensión teológica del texto profético sin sobreexplicarla; juicio divino directo o mediado por agente permanece posible, pero la lectura más probable es divina.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó ''their'' antes de ''guilt'' para reflejar mejor la idea de ''ser hallados culpables / llevar culpa''. En español se adoptó directamente una fórmula sin posesivo: ''serán hallados culpables''.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal del nombre divino en el proyecto, pero este verso no lo exige explícitamente y la frase de juicio se mantiene sin insertarlo.
  - Se conserva «corazón» por ser el equivalente bíblico más natural para לֵב en este contexto moral y relacional.
  - Se prefirió «piedras sagradas» sobre una terminología más técnica para mantener claridad pública sin perder el sentido cultual.
  - El pronombre enfático «Él mismo» preserva la fuerza del hebreo הוּא sin sobrecargar el verso.
