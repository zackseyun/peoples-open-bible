    text: Or 'I will set it in order before your eyes.' The Hebrew verb can mean 'arrange' or 'lay out,' and the object is implied rather than stated.
    reason: lexical_alternative
  - marker: b
    text: Or 'you imagined that I would be like you.' The Hebrew construction allows slightly different ways of expressing the mistaken assumption.
    reason: lexical_alternative
