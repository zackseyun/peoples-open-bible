    text: La forma de este nombre varía en la tradición; también puede aparecer como «Avvá».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula final para reflejar con precisión el hebreo: Samaria es el objeto directo de ''librar'', no el lugar del que alguien es librado. Se mantiene el tono de desafío retórico con ''¿Acaso...?'' y el idiomatismo ''de mi mano''. La nota se simplifica para ajustarse mejor al uso español y a la variante tradicional relevante.'
