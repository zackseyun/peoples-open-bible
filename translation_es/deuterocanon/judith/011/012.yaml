translation:
  language: es
  text: Porque cuando se les acabó el alimento y toda el agua se volvió escasa, decidieron recurrir a su ganado[a], y resolvieron consumir todo lo que Dios les había mandado en sus leyes que no comieran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echar mano de su ganado». El giro griego literalmente dice «caer sobre su ganado», una expresión idiomática que aquí comunica la idea de recurrir a sus animales como alimento en la necesidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλειπεν
  english_pob_choice: had run out
  chosen_spanish: les faltó
  alternatives_spanish:
  - se les agotó
  - se les acabó
  - había terminado
  lexicon: LSJ
  rationale: En español, la idea de carencia se expresa de modo natural con una construcción impersonal o dativa de desposesión. «Les faltó» comunica bien el agotamiento del suministro sin volver la frase rígida.
- source_word: τὰ βρώματα
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - los víveres
  - los alimentos
  lexicon: LSJ
  rationale: El plural griego abarca provisiones comestibles en general. «El alimento» conserva amplitud semántica y suena sobrio en registro bíblico.
- source_word: ἐσπανίσθη
  english_pob_choice: had become scarce
  chosen_spanish: escaseó
  alternatives_spanish:
  - se volvió escaso
  - se hizo escaso
  - estuvo escaso
  lexicon: LSJ
  rationale: El pasivo griego indica escasez, no necesariamente desaparición total. «Escaseó» es la equivalencia más natural y mantiene esa nuance.
- source_word: πᾶν ὕδωρ
  english_pob_choice: all water
  chosen_spanish: toda el agua
  alternatives_spanish:
  - toda agua
  - todo el agua
  - cada suministro de agua
  lexicon: LSJ
  rationale: «Toda el agua» reproduce la generalidad del griego y es idiomática en español, preservando la amplitud de la carencia.
- source_word: ἐβουλεύσαντο
  english_pob_choice: they decided
  chosen_spanish: decidieron
  alternatives_spanish:
  - tomaron consejo
  - resolvieron
  - deliberaron
  lexicon: LSJ
  rationale: El verbo expresa deliberación que culmina en decisión. «Decidieron» conserva esa fuerza con claridad moderna.
- source_word: ἐπιβαλεῖν τοῖς κτήνεσιν αὐτῶν
  english_pob_choice: to use their livestock
  chosen_spanish: recurrir a su ganado
  alternatives_spanish:
  - echar mano de su ganado
  - apelar a su ganado
  - usar su ganado
  lexicon: LSJ
  rationale: El giro griego es idiomático y sugiere volverse a los animales como recurso en la desesperación. «Recurrir a su ganado» preserva el sentido sin sonar duro ni ambiguo en español.
- source_word: κτήνεσιν
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - ganados
  - bestias
  - animales domésticos
  lexicon: LSJ
  rationale: En este contexto, el término designa animales de propiedad criados para uso humano. «Ganado» es claro y suficientemente amplio para el español bíblico.
- source_word: διεστείλατο
  english_pob_choice: had commanded
  chosen_spanish: les había mandado
  alternatives_spanish:
  - les había ordenado
  - les había instruido
  - les había prescrito
  lexicon: LSJ
  rationale: La referencia es a una prohibición divina con autoridad normativa. «Había mandado» conserva el peso de mandato sin sobrecargar el registro.
- source_word: τοῖς νόμοις αὐτοῦ
  english_pob_choice: by his laws
  chosen_spanish: por medio de sus leyes
  alternatives_spanish:
  - por sus leyes
  - en sus leyes
  - mediante sus leyes
  lexicon: LSJ
  rationale: El dativo puede expresar el medio o marco normativo. «Por medio de sus leyes» deja claro que la prohibición está mediada por legislación divina, sin forzar una fórmula más rígida.
- source_word: μὴ φαγεῖν
  english_pob_choice: not to eat
  chosen_spanish: no comer
  alternatives_spanish:
  - que no comieran
  - abstenerse de comer
  - no debían comer
  lexicon: LSJ
  rationale: El infinitivo de prohibición se vierte de forma directa. «No comer» conserva la sencillez y evita añadir sujeto o modalidad que el griego no explicita.
- source_word: διέγνωσαν δαπανῆσαι
  english_pob_choice: they determined to consume
  chosen_spanish: resolvieron consumir
  alternatives_spanish:
  - determinaron consumir
  - decidieron devorar
  - se propusieron consumir
  lexicon: LSJ
  rationale: La combinación subraya una resolución firme respecto de aquello prohibido. «Resolvieron consumir» retiene el matiz volitivo y la idea de consumo total sin exagerar a «devorar».
theological_decisions:
- issue: Prohibición divina general sin citar pasaje específico
  english_pob_reading: everything that God had commanded them by his laws not to eat
  chosen_spanish_reading: todo lo que Dios les había mandado, por medio de sus leyes, no comer
  alternative_spanish_readings:
  - todo lo que Dios les había prohibido comer en sus leyes
  - todo lo que Dios había prescrito en sus leyes que no comieran
  rationale: El griego atribuye la prohibición a Dios mediante sus leyes, sin nombrar una perícopa concreta. La redacción española mantiene esa base legal-teológica sin desplazar el texto hacia una formulación más interpretativa.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se siguió el último estado revisado del audit trail inglés, donde la expresión idiomática fue ajustada de «fall upon their livestock» a «use their livestock» por naturalidad y cercanía de sentido. La versión española adopta una solución igualmente idiomática («recurrir a su ganado») que preserva la idea de buscar en los animales un recurso extremo, sin perder el trasfondo del giro griego.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός, conforme al criterio del proyecto.
  - Se usa «ganado» como equivalente contextual de κτήνεσιν, manteniendo la referencia a animales de propiedad sin precisar especies.
  - «Consumir» se mantiene para δαπανῆσαι, porque el contexto trata de alimento prohibido y el verbo indica uso/desgaste total.
  - La nota a pie de página marca la alternativa idiomática del griego sin introducir una interpretación ajena al texto.
