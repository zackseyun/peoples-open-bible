translation:
  language: es
  text: Tomarás del carnero la grosura, la cola grasa, la grosura que cubre las entrañas, el lóbulo del hígado, los dos riñones, la grosura que está sobre ellos, y el muslo derecho; porque es un carnero de investidura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un carnero de consagración» o «un carnero de instalación». La expresión hebrea se refiere al carnero usado en el rito que instala a los sacerdotes en su cargo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: And you shall take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - Y tomarás
  - Entonces tomarás
  lexicon: BHS/WLC; HALOT 3947
  rationale: El verbo en secuencia instructiva se vierte naturalmente con futuro de mandato en español. Se omite la conjunción inicial para lograr fluidez, sin perder el valor imperativo del encargo ritual.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - ram
  - ovejo
  lexicon: HALOT 352
  rationale: '"Carnero" es el equivalente español natural y preciso para el animal sacrificial; evita el anglicismo y mantiene la referencia zoológica concreta.'
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grosura
  alternatives_spanish:
  - grasa
  - sebo
  lexicon: HALOT 2459
  rationale: En contexto sacrificial, el término apunta a la porción grasa reservada para la ofrenda. "Grosura" conserva mejor el valor técnico y algo arcaizante del reparto sacrificial que "grasa", que en español puede sonar demasiado general.
- source_word: אַלְיָה
  english_pob_choice: fat tail
  chosen_spanish: cola gorda
  alternatives_spanish:
  - cola grasa
  - rabadilla grasa
  lexicon: HALOT 451
  rationale: La forma designa la cola adiposa propia del animal sacrificial. "Cola gorda" comunica de manera directa la pieza anatómica especial sin introducir un tecnicismo poco transparente.
- source_word: הַמְכַסֶּה אֶת־הַקֶּרֶב
  english_pob_choice: that covers the entrails
  chosen_spanish: que cubre las entrañas
  alternatives_spanish:
  - que cubre los intestinos
  - que cubre los órganos internos
  lexicon: HALOT 3680 / 7130
  rationale: '"Entrañas" reproduce bien el campo semántico de las vísceras internas en español bíblico y moderno, con la concreción ritual necesaria. Mantiene la imagen de cobertura sin modernizarla en exceso.'
- source_word: יֹתֶרֶת הַכָּבֵד
  english_pob_choice: the lobe of the liver
  chosen_spanish: el lóbulo del hígado
  alternatives_spanish:
  - el apéndice del hígado
  - la porción del hígado
  lexicon: HALOT 3508 / 3516
  rationale: La anatomía exacta es debatida, pero el español debe ser inteligible y suficientemente preciso. "Lóbulo del hígado" sigue la decisión inglesa convencional sin sobredeterminar la estructura más de lo que permite el hebreo.
- source_word: כְּלָיֹת
  english_pob_choice: kidneys
  chosen_spanish: riñones
  alternatives_spanish:
  - vejigas
  - riñoncillos
  lexicon: HALOT 3629
  rationale: El término denota directamente los riñones; no hay razón contextual para una paráfrasis. Se usa el plural anatómico común en español.
- source_word: הַחֵלֶב אֲשֶׁר עֲלֵיהֶן
  english_pob_choice: the fat that is on them
  chosen_spanish: la grosura que está sobre ellos
  alternatives_spanish:
  - la grasa sobre ellos
  - el sebo que está sobre ellos
  lexicon: HALOT 2459
  rationale: Se conserva la repetición técnica de "grosura" para el mismo término hebreo, manteniendo la consistencia sacrificial del texto y evitando alternar con un sinónimo que debilite la unidad léxica.
- source_word: שׁוֹק הַיָּמִין
  english_pob_choice: the right thigh
  chosen_spanish: el muslo derecho
  alternatives_spanish:
  - la pierna derecha
  - la pata derecha
  lexicon: HALOT 7785 / 3225
  rationale: '"Muslo" es la pieza de carne sacrificada más natural en español para la porción posterior del animal. Aunque el inglés eligió "thigh", se evita "pierna" por ser más amplio y menos exacto en este contexto.'
- source_word: אֵיל מִלֻּאִים
  english_pob_choice: a ram of ordination
  chosen_spanish: un carnero de investidura
  alternatives_spanish:
  - un carnero de ordenación
  - un carnero de consagración
  lexicon: HALOT 4394
  rationale: El sustantivo se refiere al rito de instalar a los sacerdotes en su cargo. "Investidura" comunica mejor en español la idea de instalación en oficio que "ordenación", que puede sonar más ligada a usos eclesiásticos posteriores. Se evita también "consagración" como término demasiado general.
theological_decisions:
- issue: Sentido ritual de אֵיל מִלֻּאִים
  english_pob_reading: a ram of ordination
  chosen_spanish_reading: un carnero de investidura
  alternative_spanish_readings:
  - un carnero de ordenación
  - un carnero de consagración
  - un carnero de instalación
  rationale: El verso describe la ofrenda usada en el rito que instala a Aarón y a sus hijos en el ministerio sacerdotal. "Investidura" mantiene la dimensión de colocación en cargo sin importar categorías eclesiásticas posteriores; aun así, se preservan alternativas porque el hebreo alude literalmente a un rito de 'llenar' las manos, con varias formas legítimas de expresarlo.
  doctrine_reference: Éxodo 29; principio POB de transparencia léxica y ausencia de eufemismo doctrinal
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto mantiene el consenso alto de la auditoría. La redacción española sigue de cerca las decisiones léxicas del POB en inglés, pero adapta con naturalidad el vocabulario sacrificial para que suene claro en español sin perder precisión técnica.
  spanish_consistency_notes:
  - Se mantiene una sola traducción para חֵלֶב como «grosura» en todo el versículo para conservar consistencia técnica.
  - Se usa terminología sacrificial concreta («carnero», «muslo», «entrañas», «riñones») sin suavizarla a expresiones más abstractas.
  - La nota textual se ancla en «investidura» para reflejar la alternativa semántica documentada en la auditoría inglesa.
