    rationale: 'No es incorrecto, pero en español bíblico fluido suele leerse mejor sin comas: «Jeremías el profeta» / «Hananías el profeta». Esto evita una pausa innecesaria y sigue de cerca la aposición identificadora del hebreo.'
  - severity: low
    issue: Formato de la nota b
    rationale: La redacción actual incluye comillas externas innecesarias al inicio y final. Conviene normalizarla para mayor limpieza editorial.
