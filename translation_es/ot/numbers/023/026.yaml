translation:
  language: es
  text: 'Balaam respondió y dijo a Balac[a]: «¿No te hablé, diciendo: “Todo lo que Yahvé hable, eso haré”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Todo lo que Yahvé hable, eso haré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, 'respondió' conserva la fórmula narrativa de réplica directa y suena natural en diálogo formal, sin perder la función de introducir la contestación de Balaam.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: El hebreo combina dos verbos de habla; en español, 'respondió y dijo' reproduce esa fórmula de manera natural y transparente.
- source_word: הֲלֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No te he hablado...?
  alternatives_spanish:
  - ¿Acaso no te he hablado...?
  - ¿No te hablé...?
  lexicon: HALOT
  rationale: La pregunta retórica en contexto mira a una afirmación previa y a una interpelación directa; en español, el perfecto compuesto 'te he hablado' mantiene mejor el enlace con lo ya dicho que un simple pasado, y conserva el tono de reproche o insistencia.
- source_word: דִּבַּרְתִּי אֵלֶיךָ
  english_pob_choice: speak to you
  chosen_spanish: te he hablado
  alternatives_spanish:
  - te hablé
  - te he dicho
  lexicon: HALOT
  rationale: El verbo דבר con אֶל significa hablar con/alguien. 'Te he hablado' preserva el acto de comunicación sin convertirlo en 'decir', que sería una interpretación algo más específica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: '''Diciendo'' mantiene el valor quotativo del infinitivo y enlaza la cita de forma clara en español.'
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: All that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo cuanto
  - Todo aquello que
  lexicon: HALOT
  rationale: '''Todo lo que'' es el equivalente español más natural y conserva la amplitud de la expresión hebrea.'
- source_word: יְדַבֵּר יְהוָה
  english_pob_choice: the LORD speaks
  chosen_spanish: Yahvé hable
  alternatives_spanish:
  - Yahvé hable
  - Yahvé diga
  - Yahvé habla
  lexicon: HALOT
  rationale: El hebreo usa imperfecto en una cláusula general; en español, el subjuntivo presente en una subordinada relativa/condicional expresada tras 'todo lo que' comunica adecuadamente la idea de cualquier cosa que Yahvé pronuncie. Se preserva 'Yahvé' por la norma del proyecto.
- source_word: אֹתוֹ אֶעֱשֶׂה
  english_pob_choice: that I will do
  chosen_spanish: eso haré
  alternatives_spanish:
  - lo haré
  - eso haré
  - eso mismo haré
  lexicon: HALOT
  rationale: El sufijo pronominal retoma la totalidad de lo dicho por Yahvé. 'Eso haré' conserva el carácter resumptivo y suena más natural en español que una traducción excesivamente literal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme a la política terminológica del proyecto, se traduce como 'Yahvé' y no se enmascara como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Fidelidad a la fórmula de obediencia de Balaam
  english_pob_reading: that I will do
  chosen_spanish_reading: eso haré
  alternative_spanish_readings:
  - lo haré
  - eso mismo haré
  - haré eso
  rationale: 'La frase final no expresa una obediencia general abstracta, sino la reiteración de un compromiso concreto: Balaam hará lo que Yahvé diga. ''Eso haré'' preserva la dependencia del mandato divino y la relación anafórica con lo precedente.'
  doctrine_reference: No doctrinal dispute; lexical-theological nuance in narrative speech
translation_notes:
  revision_awareness: El audit trail inglés no requiere cambios sustanciales; la revisión más reciente indicó que el versículo quedó sin cambios. Se conservó la estructura narrativa y la equivalencia del compromiso final, ajustando únicamente el español para mayor naturalidad sin perder la referencia auditada al nombre divino y al paralelismo de habla/respuesta.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para la coherencia con la política del proyecto.
  - Se usa un registro formal y bíblico, pero con sintaxis española natural.
  - La nota al pie conserva la alternativa lexical documentada por el POB inglés sin introducir una lectura distinta.
