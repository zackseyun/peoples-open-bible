base_translation:
  language: en
  yaml_path: translation/ot/isaiah/019/017.yaml
  text: And the land of Judah will become a terror to Egypt[c][b][a]; everyone to whom it is mentioned will fear because of the plan of Yahweh of Armies that he is planning against it.
  footnotes:
  - marker: a
    text: Or 'a dread,' 'a horror,' or according to another interpretive tradition, 'reeling.' The Hebrew term is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'everyone to whom it is mentioned'; the wording means that any mention of Judah will make an Egyptian afraid.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
