review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro del POB inglés: mantiene el sentido cultual de כפר, entiende חטאתו como ''su pecado'' (no ''ofrenda por el pecado''), conserva el pasivo teológico de ונסלח לו, y expresa correctamente la asignación sacerdotal de la porción final. La única desviación relevante es la formulación española de ונסלח לו como ''le será perdonado'', que en español normal sugiere que lo perdonado es el pecado, mientras que el hebreo y el POB inglés enfocan al ofensor: ''será perdonado'' / ''se le perdonará''. También conviene afinar ''en cualquiera de estas cosas'' a ''en cualquiera de estas cosas/casos'' por claridad, aunque no es un error grave.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'y le será perdonado' suena algo poco natural y semánticamente impreciso en español porque deja el objeto elidido de manera ambigua. 'Y se le perdonará' o 'y será perdonado' es más idiomático y fiel. 'Ofrenda vegetal' es aceptable en registro bíblico, aunque 'ofrenda de grano' sería más transparente; no hace falta cambiarlo si se mantiene la terminología del proyecto. La nota al pie necesita ajustarse para corresponder a la nueva redacción principal y al inglés auditado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Sacerdote', 'pecado' y la preservación del pasivo de perdón están bien. 'Hará expiación' es defendible para כפר en este contexto sacerdotal. 'Ofrenda vegetal' para מִנְחָה es aceptable, aunque menos transparente que 'ofrenda de grano'; no requiere adjudicación.
  issues:
  - severity: medium
    issue: La frase 'y le será perdonado' no refleja bien el enfoque sintáctico del hebreo/POB y suena ambigua en español.
    rationale: 'וְנִסְלַח לוֹ es una construcción pasiva cuyo resultado recae sobre la persona: ''será perdonado'' / ''se le perdonará''. En español, ''le será perdonado'' normalmente deja implícito un objeto (''pecado'', ''ofensa''), no a la persona misma. Eso desplaza levemente el sentido.'
  - severity: low
    issue: La nota al pie actual duplica la redacción principal en vez de ofrecer una alternativa real si se corrige la cláusula de perdón.
    rationale: 'Si el texto principal se corrige a ''se le perdonará'' o ''será perdonado'', la nota puede preservar la alternativa ''o: "le será perdonado"'' o mejor la alternativa más literal auditada: ''o: "y le será perdonado" / "y será perdonado"'', explicando el pasivo.'
  revised_spanish_text: Así, el sacerdote hará expiación por él, por su pecado que cometió en cualquiera de estas cosas[a], y se le perdonará[b]. Y pertenecerá al sacerdote, como la ofrenda vegetal.
  revised_footnotes:
  - marker: a
    text: 'O: «en cualquiera de estos casos». La expresión hebrea remite a cualquiera de los asuntos mencionados antes.'
    reason: alternative_reading
  - marker: b
    text: 'O: «y será perdonado». El hebreo está en pasivo y no nombra explícitamente a quien perdona.'
    reason: alternative_reading
  revision_rationale: Se corrige la cláusula de perdón para reflejar mejor el pasivo hebreo aplicado al ofensor y para sonar más natural en español. También se añaden comas para mejorar la fluidez y se ajustan las notas para que ofrezcan alternativas reales y útiles. El resto del texto puede mantenerse.
