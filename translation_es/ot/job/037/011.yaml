translation:
  language: es
  text: Ciertamente[a], él carga la nube espesa con humedad[b]; dispersa su nube de luz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «También» o «sin duda». La partícula hebrea añade énfasis o continuidad; «Ciertamente» expresa bien ese valor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con lluvia», «con agua» o, menos probablemente, «con brillo». El término hebreo es incierto; el contexto favorece una referencia al contenido acuoso de la nube.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la nube de su luz». En contexto de tormenta, también puede entenderse como una referencia a una nube asociada con su relámpago; «luz» es la traducción más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - También
  - Seguro
  - Incluso
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática o aditiva. «Ciertamente» reproduce bien el valor asseverativo natural en español sin sobrecargar el verso.
- source_word: בְּרִי
  english_pob_choice: with moisture
  chosen_spanish: con humedad
  alternatives_spanish:
  - con lluvia
  - con agua
  - con brillo
  lexicon: HALOT
  rationale: El sustantivo es incierto. En el contexto de nubes y carga meteorológica, «humedad» conserva la idea de contenido acuoso sin decidir indebidamente entre lluvia, agua o brillo.
- source_word: יַטְרִיחַ
  english_pob_choice: loads
  chosen_spanish: carga
  alternatives_spanish:
  - agobia
  - pone sobre
  - llena
  lexicon: HALOT
  rationale: El hiphil de טרח expresa imponer una carga. «Carga» mantiene la imagen concreta de una nube llevada con peso o contenido, y funciona con naturalidad en español.
- source_word: עָב
  english_pob_choice: the thick cloud
  chosen_spanish: la nube espesa
  alternatives_spanish:
  - la nube densa
  - la masa de nubes
  - la nube oscura
  lexicon: HALOT
  rationale: עָב denota una nube densa o espesa. «Nube espesa» conserva la imagen meteorológica concreta del hebreo.
- source_word: יָפִיץ
  english_pob_choice: he scatters
  chosen_spanish: dispersa
  alternatives_spanish:
  - esparce
  - disemina
  - separa
  lexicon: HALOT
  rationale: El hiphil de פוץ indica dispersar o esparcir. «Dispersa» es claro y corresponde al paralelismo poético.
- source_word: עֲנַן
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nube de tormenta
  - nubarrón
  lexicon: HALOT
  rationale: Término común para nube. Se mantiene el sustantivo simple para respetar el paralelismo y la imagen básica del texto.
- source_word: אוֹרוֹ
  english_pob_choice: his cloud of light
  chosen_spanish: su nube de luz
  alternatives_spanish:
  - su luz
  - su nube de resplandor
  - su nube relámpago
  lexicon: HALOT
  rationale: 'La construcción es ambigua: puede entenderse como «luz» o como un lenguaje de tormenta vinculado al relámpago. «Nube de luz» refleja de cerca la expresión hebrea y evita ampliar más allá del texto; se conserva la posibilidad interpretativa en la nota.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que prefirió «cloud of light» frente a una expansión interpretativa como «lightning cloud». También conserva la decisión de mantener «moisture» como solución prudente ante la incertidumbre léxica de בְּרִי.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene el tetragrámaton ni una cita directa de κύριος; el pasaje describe la acción divina en lenguaje meteorológico.
  - Se prefirió «nube de luz» en lugar de una paráfrasis con relámpago para respetar la cautela del audit trail inglés.
  - Se mantuvo «humedad» para preservar la ambigüedad del término hebreo y no cerrar el sentido más allá de la evidencia.
