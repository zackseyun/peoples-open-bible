translation:
  language: es
  text: 'Habla a los hijos de Israel, diciendo: En el séptimo mes, el primer día del mes habrá para ustedes un reposo solemne, un memorial[a] de toques de trompeta, una convocación santa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un memorial de sonidos fuertes'; el término hebreo puede referirse de manera más amplia a una señal sonora intensa, incluidos gritos o toques de cuerno/trompeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar masculina del hebreo, que en este contexto funciona corporativamente para el pueblo del pacto, sin aplanarla a una formulación más general.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: In the seventh month
  chosen_spanish: En el séptimo mes
  alternatives_spanish:
  - en el mes séptimo
  lexicon: HALOT
  rationale: La frase temporal es directa; 'en' expresa bien el valor calendárico de la preposición hebrea.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - el primero del mes
  - el día uno del mes
  lexicon: HALOT
  rationale: La construcción hebrea es un idiomatismo calendárico que naturalmente significa el primer día del mes; en español conviene decirlo de forma clara y estándar.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: there shall be for you
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - será para ustedes
  - ustedes tendrán
  lexicon: HALOT
  rationale: '''Habrá para ustedes'' conserva con naturalidad el sentido existencial/futuro del hebreo sin convertirlo en una paráfrasis más libre.'
- source_word: שַׁבָּתוֹן
  english_pob_choice: a solemn rest
  chosen_spanish: un reposo solemne
  alternatives_spanish:
  - un reposo completo
  - un descanso solemne
  - un sábado de reposo
  lexicon: HALOT
  rationale: Se evita equiparar sin más שַׁבָּתוֹן con שַׁבָּת. 'Reposo solemne' mantiene la idea de cese especial de labores con tono litúrgico adecuado.
- source_word: זִכְרוֹן
  english_pob_choice: a memorial
  chosen_spanish: un memorial
  alternatives_spanish:
  - un recuerdo
  - una conmemoración
  lexicon: HALOT
  rationale: '''Memorial'' es breve y apto para lenguaje cultual o festivo; preserva la función de acto/objeto que sirve como recordatorio ritual.'
- source_word: תְּרוּעָה
  english_pob_choice: of trumpet blasts
  chosen_spanish: de toques de trompeta
  alternatives_spanish:
  - de sonidos de trompeta
  - de alarmas sonoras
  - de gritos
  lexicon: HALOT
  rationale: En este contexto festivo-calendárico, la fuerza probable de תְּרוּעָה es la de señales sonoras de trompeta. 'Toques de trompeta' transmite bien la idea sin imponer una especificación más estrecha de la que permite el término hebreo.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una asamblea santa
  - una reunión sagrada
  lexicon: HALOT
  rationale: Se mantiene la fórmula cultual tradicional 'convocación', que refleja una reunión llamada/convocada con carácter santo, en continuidad con el registro técnico del texto.
theological_decisions:
- issue: Alcance de תְּרוּעָה en la designación festiva
  english_pob_reading: rendered as trumpet blasts rather than a more generic shouting/alarm
  chosen_spanish_reading: se traduce como toques de trompeta, no como un mero grito o alarma genérica
  alternative_spanish_readings:
  - gritos
  - clamores
  - toques de cuerno
  - sonidos fuertes
  rationale: La palabra hebrea tiene un rango semántico más amplio que 'trompeta' estrictamente, pero en este marco litúrgico la lectura de señales sonoras festivas es la más probable. Se conserva esa concreción en el texto, mientras la amplitud del término queda implícita en la nota.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto español sigue de cerca la última revisión inglesa, que ajustó 'a memorial proclaimed with trumpet blasts' a 'a memorial of trumpet blasts' para alinearse mejor con זִכְרוֹן תְּרוּעָה y evitar introducir la idea de proclamación. La versión española conserva esa relación estrecha entre 'memorial' y 'toques de trompeta'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como convención general del proyecto; aquí no hay una forma del Tetragrámaton en el texto.
  - Se optó por 'hijos de Israel' para conservar la expresión hebrea sin neutralizarla, coherente con la política del proyecto.
  - '''Santa convocación'' mantiene el registro técnico cultual; no se reemplazó por una formulación más explicativa como ''asamblea sagrada''.'
  - '''Reposo solemne'' evita confundir שַׁבָּתוֹן con el sábado semanal ordinario.'
