translation:
  language: es
  text: Y al final de su reino, cuando los transgresores hayan llegado a su plena medida, se levantará un rey, feroz de semblante y entendido en enigmas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y entendido en enigmas»; o «y entendido en dichos oscuros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאַחֲרִית
  english_pob_choice: And at the latter end of
  chosen_spanish: Y al final de
  alternatives_spanish:
  - Y en la parte final de
  - Y en el último tramo de
  lexicon: HALOT
  rationale: אַחֲרִית expresa la parte final o el término de un periodo. «Al final de» conserva con naturalidad esa referencia temporal en español y mantiene el tono elevado sin volverse rígido.
- source_word: מַלְכוּתָם
  english_pob_choice: their kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reinado
  - su realeza
  - sus reinos
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo de tercera persona plural apunta al reino/dominio asociado colectivamente con los gobernantes previos. «Su reino» preserva esa referencia colectiva sin forzar un plural inexistente en el hebreo.
- source_word: כְּהָתֵם
  english_pob_choice: when the transgressors have reached their full measure
  chosen_spanish: cuando los transgresores hayan llegado a su plena medida
  alternatives_spanish:
  - cuando los transgresores se hayan consumado
  - cuando los transgresores hayan terminado
  - cuando la transgresión haya llegado a su colmo
  lexicon: HALOT
  rationale: La forma de תמם comunica completitud o plenitud. En este contexto, el sentido no es que los transgresores desaparezcan, sino que su rebelión llega a su colmo. «Hayan llegado a su plena medida» preserva esa idea de plenitud moral.
- source_word: הַפֹּשְׁעִים
  english_pob_choice: the transgressors
  chosen_spanish: los transgresores
  alternatives_spanish:
  - los rebeldes
  - los pecadores
  lexicon: HALOT
  rationale: פָּשַׁע suele implicar transgresión o rebelión, con matiz de ruptura del pacto. «Transgresores» mantiene ese peso moral y jurídico mejor que «pecadores», que sería más amplio.
- source_word: יַעֲמֹד
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - aparecerá
  - surgirá
  - se alzará
  lexicon: HALOT
  rationale: En contextos políticos y reales, עמד puede significar surgir o presentarse en escena. «Se levantará» es idiomático en español y conserva la idea de la irrupción de un gobernante.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - un monarca
  - un gobernante
  lexicon: HALOT
  rationale: La equivalencia directa y precisa es «rey». «Gobernante» sería más dinámico, pero menos exacto al sustantivo hebreo.
- source_word: עַז פָּנִים
  english_pob_choice: fierce of countenance
  chosen_spanish: feroz de semblante
  alternatives_spanish:
  - duro de semblante
  - severo de rostro
  - audaz de semblante
  lexicon: HALOT
  rationale: Literalmente, la expresión es «fuerte/duro de rostro». El giro comunica dureza, audacia y severidad. «Feroz de semblante» conserva el impacto visual y el tono amenazante sin apartarse del hebreo.
- source_word: וּמֵבִין חִידוֹת
  english_pob_choice: understanding riddles
  chosen_spanish: entendido en enigmas
  alternatives_spanish:
  - entendedor de acertijos
  - entendido en dichos oscuros
  - hábil en intrigas
  lexicon: HALOT
  rationale: בין + חידות puede significar entender acertijos, dichos oscuros o asuntos enigmáticos. Dado que la POB inglesa preserva la lectura más literal y deja alternativas, «entendido en enigmas» mantiene esa literalidad en español sin expandirla interpretativamente.
theological_decisions:
- issue: Alcance de וּמֵבִין חִידוֹת
  english_pob_reading: The phrase is rendered as 'understanding riddles' rather than as a broader political cunning reading.
  chosen_spanish_reading: «entendido en enigmas» conserva la lectura literal y abierta del hebreo.
  alternative_spanish_readings:
  - «hábil en intrigas»
  - «entendido en dichos oscuros»
  rationale: El contexto describe el perfil de un rey hostil, pero el hebreo permite una lectura más directa de comprensión de enigmas o dichos oscuros. Dado que la POB inglesa revisó hacia la literalidad, el español debe conservar esa tensión sin resolverla hacia una interpretación más amplia.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y no resolverla prematuramente.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del expediente inglés, que desplazó la paráfrasis interpretativa de «hábil en intrigas» hacia la forma más literal «understanding riddles». También refleja el ajuste de «fierce in countenance» a una construcción más cercana al hebreo. Por eso se prefirieron soluciones españolas literales pero idiomáticas: «feroz de semblante» y «entendido en enigmas».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto base lo requiera; este versículo no lo contiene.
  - «Reino» se usa para מַלְכוּתָם, evitando pluralizar sin base textual.
  - «Transgresores» conserva el matiz moral-jurídico de פֹּשְׁעִים.
  - La nota al pie preserva la alternativa literal del hebreo sin introducir una expansión interpretativa.
  - El estilo general es bíblico contemporáneo, con sintaxis natural para lectura pública.
