review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la estructura y el contenido del hebreo: identifica al hijo de la mujer israelita, mantiene dos verbos para la ofensa, conserva la referencia reverencial a «el Nombre», el plural indefinido «lo llevaron», y la nota genealógica/tribal final. Sin embargo, la combinación «blasfemó el Nombre y maldijo» suena redundante en español y reduce la distinción que la evidencia léxica y la nota intentan preservar entre נקב y קלל.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Ahora el nombre de su madre era» suena algo calcado; «Su madre se llamaba» es más natural en español bíblico moderno. También conviene evitar la coma en aposición simple antes de «hija de Dibri».
  glossary_alignment: '«el Nombre» está bien y respeta la racionalidad reverencial. No hay términos del glosario mayor problemáticos. La principal tensión está en נקב: el rastro POB está internamente dividido entre la decisión léxica/teológica original («pronounced») y una revisión posterior inglesa («blasphemed»). En español, por fidelidad a la doble verbalidad hebrea y a la nota alternativa, conviene volver a una formulación de pronunciación explícita.'
  issues:
  - severity: medium
    issue: «blasfemó[a] el Nombre y maldijo» debilita la distinción entre los dos verbos hebreos
    rationale: El hebreo usa נקב seguido de קלל. Traducir el primero como «blasfemó» y el segundo como «maldijo» produce en español una cercanía semántica que casi duplica la idea. La evidencia léxica documentada favorece que נקב conserve el matiz de pronunciar/expresar distintamente el Nombre, con nota sobre la lectura blasfémica.
  - severity: low
    issue: «Ahora el nombre de su madre era» suena poco natural en español
    rationale: Aunque sigue de cerca el inglés, en español eclesial moderno «Su madre se llamaba» comunica la misma información con mejor fluidez sin perder contenido.
  - severity: low
    issue: Puntuación y apposición de nombres
    rationale: '«Selomit, hija de Dibri» es aceptable, pero sin coma se integra mejor como identificación continua: «Selomit hija de Dibri».'
  revised_spanish_text: El hijo de la mujer israelita pronunció distintamente[a] el Nombre y maldijo, y lo llevaron a Moisés. Su madre se llamaba Selomit hija de Dibri, de la tribu de Dan.
  revised_footnotes:
