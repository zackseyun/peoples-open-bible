revisions:
- from: 'Entonces toma el frasco[a] de aceite, derrámalo sobre su cabeza y dile: «Así dice Yahvé: Yo te he ungido rey sobre Israel». Luego abre la puerta y huye; no te quedes.'
  to: 'Entonces toma el frasco de aceite, derrámalo sobre su cabeza y dile: «Así dice Yahvé: Yo te he ungido rey sobre Israel[a]». Luego abre la puerta y huye; no esperes.'
  rationale: Se corrige la nota para que refleje la decisión léxica auditada sobre אֶל יִשְׂרָאֵל y se reemplaza «no te quedes» por «no esperes», que corresponde más directamente al hebreo תְחַכֶּה. No se requieren cambios doctrinales ni estructurales adicionales.
