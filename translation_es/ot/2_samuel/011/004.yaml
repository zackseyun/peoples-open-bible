translation:
  language: es
  text: Así que David envió mensajeros y la tomó[a]. Entonces ella vino a él, y él se acostó con ella. Ella se estaba purificando de su impureza. Después regresó a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ella se había purificado de su impureza». El hebreo puede entenderse como una nota de trasfondo sobre la purificación ritual después de la menstruación.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo de envío en narrativa se expresa de forma natural y directa con «envió», conservando el movimiento deliberado del hebreo sin añadir matiz administrativo excesivo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - agentes
  - emisarios
  lexicon: HALOT
  rationale: «Mensajeros» reproduce el sentido concreto y habitual de מַלְאָכִים sin interpretar más de la cuenta su función.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - la hizo venir
  - la llevó
  lexicon: HALOT
  rationale: «Tomó» es la correspondencia más cercana al valor básico de לקח y mantiene la concisión grave del hebreo. En español, «la tomó» conserva mejor la dureza narrativa que opciones más explicativas.
- source_word: וַתָּבֹוא אֵלָיו
  english_pob_choice: she came to him
  chosen_spanish: ella vino a él
  alternatives_spanish:
  - ella fue a él
  - entró donde él
  lexicon: HALOT
  rationale: La combinación de verbo de movimiento y preposición se vierte de manera sobria con «vino a él», sin introducir un giro idiomático que no esté en el texto.
- source_word: וַיִּשְׁכַּב עִמָּהּ
  english_pob_choice: he lay with her
  chosen_spanish: él se acostó con ella
  alternatives_spanish:
  - durmió con ella
  - yació con ella
  lexicon: HALOT
  rationale: «Se acostó con ella» es un equivalente idiomático y comprensible en español para la relación sexual implícita en el hebreo, evitando tanto el eufemismo excesivo como una formulación demasiado arcaica.
- source_word: וְהִיא מִתְקַדֶּשֶׁת מִטֻּמְאָתָהּ
  english_pob_choice: Now she was purifying herself from her uncleanness
  chosen_spanish: Ahora ella se estaba purificando de su impureza ritual
  alternatives_spanish:
  - y ella se estaba santificando de su impureza
  - mientras se estaba purificando de su impureza
  lexicon: HALOT
  rationale: El hitpael de קדשׁ aquí se entiende como purificación ritual, no como santificación moral. «Impureza ritual» preserva el campo cultual de טֻמְאָה y aclara en español que no se trata de suciedad moral. El presente progresivo refleja adecuadamente el participio con valor de trasfondo.
- source_word: וַתָּשָׁב אֶל בֵּיתָהּ
  english_pob_choice: Then she returned to her house
  chosen_spanish: Después regresó a su casa
  alternatives_spanish:
  - Entonces volvió a su casa
  - y regresó a su casa
  lexicon: HALOT
  rationale: «Regresó a su casa» transmite el cierre narrativo con naturalidad. «Casa» mantiene el valor literal de בַּיִת en el marco narrativo.
theological_decisions:
- issue: Función de la cláusula de purificación ritual
  english_pob_reading: The Hebrew can be understood as a background note about ritual cleansing after menstruation.
  chosen_spanish_reading: La cláusula se entiende como una nota de trasfondo sobre purificación ritual, probablemente después de la menstruación.
  alternative_spanish_readings:
  - 'Puede leerse como acción previa completa: «había sido purificada de su impureza»'
  - 'Puede traducirse con tono cultual fuerte: «se estaba santificando de su impureza»'
  rationale: El participio hebreo admite valor de trasfondo, y la traducción debe conservar esa posibilidad sin convertirla en una afirmación doctrinal adicional. «Impureza ritual» ayuda a mantener el sentido levítico y evita moralizar el pasaje. La redacción no intenta resolver más de lo que el hebreo y el audit trail permiten.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio adicional; el consenso de auditoría es alto y coincide plenamente con la lectura propuesta.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto, aunque este versículo no contiene el nombre divino.
  - Se mantiene una distinción entre «impureza ritual» y categorías morales, para no borrar la tensión cultual del hebreo.
  - La secuencia narrativa conserva el tono sobrio y conciso del original, sin suavizar la carga ética del relato.
  - La nota al pie refleja la alternativa de lectura documentada en el POB inglés y la adapta a español sin ampliar indebidamente el alcance del texto.
