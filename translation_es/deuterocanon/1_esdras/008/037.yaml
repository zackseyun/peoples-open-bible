translation:
  language: es
  text: 'De los hijos de Baer: Zacarías, hijo de Bemaías[a], y con él veintiocho hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este versículo difiere de manera notable del paralelo hebreo aproximado (Esdras 8:9), que lee «de los hijos de Joab, Obadías hijo de Jehiel, y con él doscientos dieciocho varones». Como 1 Esdras se traduce aquí desde el testimonio griego, se sigue el nombre y el número griegos en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν Βαήρ
  english_pob_choice: From the sons of Baer
  chosen_spanish: De los hijos de Baer
  alternatives_spanish:
  - De Baer
  - De la familia de Baer
  lexicon: LSJ
  rationale: El griego introduce la lista con una procedencia/clan. En español, «hijos de» conserva bien el valor genealógico y de grupo familiar que la POB inglesa explicitó para claridad.
- source_word: Ζαχαρίαι
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacharías
  lexicon: LSJ
  rationale: Se usa la forma bíblica habitual en español para el nombre griego del personaje, manteniendo reconocimiento lector y fidelidad onomástica.
- source_word: Βημαί
  english_pob_choice: son of Bemaiah
  chosen_spanish: hijo de Bemaías
  alternatives_spanish:
  - de Bemaí
  - hijo de Bema
  lexicon: LSJ
  rationale: La forma griega es un nombre aislado dentro de una lista genealógica; la lectura inglesa lo entendió como relación patronímica. En español, «hijo de Bemaías» conserva esa relación explícita sin ocultar el nombre propio.
- source_word: καὶ μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y acompañándolo
  - junto con él
  lexicon: LSJ
  rationale: Es la equivalencia más directa y natural en un contexto de enumeración/censo.
- source_word: ἄνδρες εἴκοσι ὀκτώ
  english_pob_choice: twenty-eight men
  chosen_spanish: veintiocho hombres
  alternatives_spanish:
  - veintiocho varones
  - veintiocho personas
  lexicon: LSJ
  rationale: «Hombres» reproduce el valor masculino específico de ἄνδρες en este recuento. «Varones» sería más formal, pero menos natural; «personas» perdería la especificidad.
theological_decisions:
- issue: Nombre de clan/familia frente a lectura puramente topográfica
  english_pob_reading: From the sons of Baer
  chosen_spanish_reading: De los hijos de Baer
  alternative_spanish_readings:
  - De Baer
  - De la familia de Baer
  rationale: 'No hay un problema doctrinal, pero sí una decisión de lectura: el griego funciona como encabezado de grupo genealógico en una lista. La formulación escogida preserva ese matiz sin añadir interpretación innecesaria.'
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'El testimonio base sigue siendo el griego de Swete (1909), con el paralelo hebreo como verificación auxiliar. La versión inglesa auditada no requirió cambios, y la presente redacción española sigue sus decisiones principales: clan/familia en la apertura, nombre propio transliterado y lectura patronímica explícita, además del número veintiocho.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se mantiene un registro sobrio y genealógico, acorde con una lista de retornados.
  - «Hijos de» se usa como equivalente de pertenencia de grupo, no como afirmación biológica estricta.
