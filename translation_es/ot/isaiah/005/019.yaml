translation:
  language: es
  text: 'los que dicen: «Que se apresure; que apresure su obra, para que la veamos; que se acerque y venga el plan[a] del Santo de Israel, para que lo conozcamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el consejo del Santo de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמְרִים
  english_pob_choice: who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - quienes dicen
  - los que están diciendo
  lexicon: HALOT
  rationale: El participio hebreo mantiene una caracterización continua; en español, «los que dicen» suena natural y conserva esa función descriptiva sin añadir tiempo verbal innecesario.
- source_word: יְמַהֵר יָחִישָׁה
  english_pob_choice: let him hurry; let him hasten
  chosen_spanish: que se apresure, que dé prisa
  alternatives_spanish:
  - que corra, que se apresure
  - que se apure, que dé prisa
  lexicon: HALOT
  rationale: Se conservan los dos verbos como doblete enfático. «Apresurarse / dar prisa» comunica bien el valor volitivo y burlón del hebreo sin volverlo mecánico.
- source_word: מַעֲשֵׂהוּ
  english_pob_choice: his work
  chosen_spanish: a su obra
  alternatives_spanish:
  - a su trabajo
  - a su hecho
  lexicon: HALOT
  rationale: «Obra» es más natural que «trabajo» para una acción divina y preserva la amplitud semántica de deed/work/action. El posesivo se mantiene porque el sufijo hebreo apunta a esa relación.
- source_word: לְמַעַן נִרְאֶה
  english_pob_choice: so that we may see it
  chosen_spanish: para que la veamos
  alternatives_spanish:
  - para que la veamos nosotros
  - a fin de verla
  lexicon: HALOT
  rationale: El propósito se expresa con una cláusula final natural en español. El objeto implícito se recupera con «la» porque remite a «su obra».
- source_word: וְתִקְרַב וְתָבוֹאָה
  english_pob_choice: let the plan of the Holy One of Israel draw near and come
  chosen_spanish: que se acerque y venga
  alternatives_spanish:
  - que se aproxime y llegue
  - que venga y se acerque
  lexicon: HALOT
  rationale: Se conserva la duplicación verbal y el tono de desafío. «Acercarse» y «venir» reproducen bien la progresión intensiva del hebreo.
- source_word: עֲצַת
  english_pob_choice: the plan
  chosen_spanish: el plan
  alternatives_spanish:
  - el consejo
  - el propósito
  lexicon: HALOT
  rationale: «Plan» coincide con la decisión léxica inglesa y es claro en español moderno. Mantiene el sentido de intención divina sin cargar de tecnicismo a la frase.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo, el de Israel
  lexicon: HALOT
  rationale: Se conserva el título profético tradicional y perfectamente inteligible en español. «Santo» funciona como sustantivo teológico, no como adjetivo suelto.
- source_word: וְנֵדָעָה
  english_pob_choice: so that we may know it
  chosen_spanish: para que lo conozcamos
  alternatives_spanish:
  - para que sepamos esto
  - a fin de conocerlo
  lexicon: HALOT
  rationale: El plural cohortativo se traduce de modo natural con «lo conozcamos», manteniendo el referente implícito de la obra/plan y el valor de desafío colectivo.
theological_decisions:
- issue: Referencia del verbo y del sufijo posesivo en la burla
  english_pob_reading: The speakers are mockingly challenging God to act quickly.
  chosen_spanish_reading: Los hablantes desafían burlonamente a Dios a que actúe con rapidez.
  alternative_spanish_readings:
  - Los hablantes desafían burlonamente a un sujeto implícito.
  - Los hablantes se burlan pidiendo una acción rápida sin nombrar a Dios.
  rationale: En el contexto de Isaías, el desafío apunta a la acción de Yahvé. El español mantiene la distancia retórica de la cita sin sustituirla por una explicación explícita dentro del texto principal.
  doctrine_reference: Isaías 5:18–19; filosofía de traducción §1, §3
- issue: עֲצַת como 'plan' frente a 'consejo'
  english_pob_reading: the plan of the Holy One of Israel
  chosen_spanish_reading: el plan del Santo de Israel
  alternative_spanish_readings:
  - el consejo del Santo de Israel
  - el propósito del Santo de Israel
  rationale: «Plan» conserva la claridad moderna y refleja la intención divina sin imponer una terminología más técnica. La alternativa «consejo» se reconoce como posible, pero en español suena más abstracta y menos directa en este verso.
  doctrine_reference: Isaías 5:19; filosofía de traducción §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el contexto auditado en inglés: mantiene el doblete verbal, conserva el objeto implícito de «verlo/conocerlo» y reproduce la ambigüedad válida de עֲצַת con la decisión principal «plan», dejando la alternativa léxica en nota. También se refleja la revisión inglesa que separó las dos acciones con puntuación más clara, aquí con coma y punto y coma implícito dentro de la cita para mantener fluidez española.'
  spanish_consistency_notes:
  - Se usa «Santo de Israel» como equivalente estable del título profético.
  - Se usa «plan» para עֲצַת, con «consejo» reservado como alternativa anotada.
  - Se mantiene el tono de desafío/burla con imperativos en subjuntivo de exhortación («que se apresure»).
  - El objeto pronominal («la / lo») se ajusta al antecedente implícito, sin añadir contenido no sustentado por el texto.
