  to: He aquí mi siervo, a quien sostengo; mi escogido, en quien se deleita mi alma[a]. He puesto mi Espíritu[c] sobre él; él sacará justicia[b] a las naciones.
  rationale: Se ajusta el registro de הֵן a «He aquí» para preservar el tono profético documentado; se corrigen los anclajes de notas para que correspondan exactamente a las expresiones que explican; y se cambia «para las naciones» por «a las naciones» para alinearse mejor con el rastro inglés «to the nations» y con la direccionalidad del hebreo.
