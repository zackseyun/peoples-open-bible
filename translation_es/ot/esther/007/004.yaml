translation:
  language: es
  text: Porque hemos sido vendidos, yo y mi pueblo, para ser destruidos, para ser muertos y para perecer. Pero si hubiéramos sido vendidos como esclavos y esclavas, me habría callado, porque el adversario no compensaría el perjuicio al rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la pérdida del rey». La expresión hebrea puede denotar daño, perjuicio o pérdida financiera para el rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְכַּרְנוּ
  english_pob_choice: have been sold
  chosen_spanish: hemos sido vendidos
  alternatives_spanish:
  - hemos sido entregados
  - hemos sido vendidos al mercado
  lexicon: HALOT
  rationale: La pasiva de מכר expresa venta; en español, «hemos sido vendidos» conserva con claridad la metáfora comercial y la fuerza retórica del lamento de Ester.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: עַם designa al grupo étnico o nacional. «Mi pueblo» es la opción española más natural y mantiene la identificación de Ester con el grupo amenazado.
- source_word: לְהַשְׁמִיד לַהֲרֹג וּלְאַבֵּד
  english_pob_choice: to be destroyed, to be killed, and to perish
  chosen_spanish: para ser destruidos, asesinados y aniquilados
  alternatives_spanish:
  - para ser exterminados, muertos y borrados
  - para ser destruidos, matados y perecer
  lexicon: HALOT
  rationale: El hebreo acumula tres infinitivos con fuerza retórica. «Destruidos, asesinados y aniquilados» conserva la escalada y el tono totalizador sin suavizar el impacto.
- source_word: וְאִלּוּ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Aunque si
  lexicon: HALOT
  rationale: Introduce un contraste hipotético. «Pero si» marca bien el giro desde la amenaza real hacia el caso menor imaginario.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  english_pob_choice: as male slaves and female slaves
  chosen_spanish: como esclavos varones y esclavas
  alternatives_spanish:
  - como esclavos y esclavas
  - como siervos y siervas
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente masculino y femenino. «Esclavos varones y esclavas» preserva el valor léxico de δοῦλος/עבד y la distinción de género sin usar un término más débil como «siervos».
- source_word: הֶחֱרַשְׁתִּי
  english_pob_choice: I would have kept silent
  chosen_spanish: me habría callado
  alternatives_spanish:
  - habría guardado silencio
  - me habría quedado callada
  lexicon: HALOT
  rationale: La apódosis condicional en hebreo pide una forma contrafactual en español. «Me habría callado» es natural y conserva el sentido idiomático de silencio voluntario.
- source_word: הַצָּר
  english_pob_choice: the adversary
  chosen_spanish: el adversario
  alternatives_spanish:
  - el enemigo
  - el opresor
  lexicon: HALOT
  rationale: El término señala a quien hostiga o causa angustia. «Adversario» mantiene un registro sobrio y no estrecha innecesariamente el sentido, aunque el referente narrativo sea Haman.
- source_word: שֹׁוֶה
  english_pob_choice: is not worth
  chosen_spanish: no vale
  alternatives_spanish:
  - no equivale a
  - no compensa
  lexicon: HALOT
  rationale: El participio indica equivalencia o valor comparativo. En este contexto, la expresión española más natural es «no vale», que comunica la idea pragmática de no merecer la molestia.
- source_word: בְּנֵזֶק הַמֶּלֶךְ
  english_pob_choice: the damage to the king
  chosen_spanish: el daño del rey
  alternatives_spanish:
  - el daño al rey
  - la pérdida del rey
  lexicon: HALOT
  rationale: נזק puede significar daño, perjuicio o pérdida. «El daño del rey» sigue de cerca el hebreo y deja abierta la amplitud semántica; en español, la construcción puede entenderse como daño que afecta al rey.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el último pass auditado: se mantiene la equivalencia óptima, la tríada intensiva, el contraste hipotético y la nota léxica sobre נזק. La única adaptación principal es una formulación española más fluida de la clausula final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva «esclavos varones y esclavas» para reflejar la distinción explícita del hebreo y evitar «siervos».
  - Se mantiene «adversario» para הַצָּר, en línea con el audit trail inglés.
  - La nota sobre נזק se preserva como alternativa léxica; el español «el daño del rey» no pretende restringir el hebreo a un solo matiz.
