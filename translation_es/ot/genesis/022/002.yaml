  source_alignment_summary: 'El borrador refleja bien el hebreo y la línea del POB en casi todos los puntos: «Por favor» para נָא, «a quien amas», «la tierra de Moriah», «ofrécelo» y «que yo te diré» son fieles. También preserva correctamente la tensión de יְחִידְךָ con una nota alternativa. Sin embargo, la nota [a] sobre «Y dijo» no está justificada por el inglés auditado ni por una ambigüedad relevante del hebreo; introduce ruido en vez de aclarar el texto.'
  spanish_quality_summary: El español es claro y digno. No obstante, «tu único» suena algo elíptico en español y puede percibirse más áspero que el inglés «your only one». Una mejora mínima y más natural es «tu único ser», que conserva la tensión sin forzar una lectura biológica. Además, «como holocausto» suena algo más natural que «en holocausto» en este contexto predicativo.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. No aparece Yahvé en este versículo. «Holocausto» es aceptable para עֹלָה en este contexto. La principal cuestión léxica es יְחִידְךָ: conviene mantener una formulación española natural que preserve la singularidad relacional sin resolverla como «único hijo» en el texto principal.'
  issues:
  - severity: medium
    issue: La nota [a] sobre «Y dijo» es innecesaria y no responde a una alternativa significativa del hebreo.
    rationale: וַיֹּאמֶר aquí se traduce simplemente «Y dijo». La nota no preserva una variante relevante ni aclara una ambigüedad; solo repite la traducción principal y añade una explicación superflua.
  - severity: medium
    issue: «tu único» es demasiado elíptico y suena menos natural en español que en inglés.
    rationale: Aunque busca reflejar «your only one», en español «tu único» puede sentirse incompleto. «tu único ser» conserva mejor la singularidad afectiva/relacional sin colapsarla a «tu único hijo».
  - severity: low
    issue: «en holocausto» es menos idiomático que «como holocausto» para לְעֹלָה.
    rationale: Ambas opciones son defendibles, pero «como holocausto» expresa con mayor naturalidad el valor predicativo de לְעֹלָה en español bíblico moderno.
