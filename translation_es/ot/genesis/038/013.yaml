  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones «Mira», «suegro», «Timnat», «esquilar» y «ovejas» son compatibles con la evidencia fuente y con la racionalidad documentada en el rastro inglés.
