translation:
  language: es
  text: Y sus oficiales contribuyeron con una ofrenda voluntaria para el pueblo, para los sacerdotes y para los levitas. Hilcías, Zacarías y Jehiel, los líderes de la casa de Dios, dieron a los sacerdotes 2.600 ofrendas de Pascua[a] y 300 cabezas de ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios de Pascua». El plural hebreo puede referirse a los animales usados para la celebración de la Pascua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרָיו
  english_pob_choice: and his officials
  chosen_spanish: y sus oficiales
  alternatives_spanish:
  - y sus príncipes
  - y sus líderes
  lexicon: HALOT
  rationale: שָׂרִים puede significar oficiales, gobernantes o príncipes. En este contexto administrativo y cultual, «oficiales» conserva el sentido de personas con cargo sin introducir una connotación aristocrática que no exige el hebreo.
- source_word: לִנְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: una ofrenda voluntaria
  alternatives_spanish:
  - una ofrenda de libre voluntad
  - voluntariamente
  lexicon: HALOT
  rationale: נְדָבָה es un sustantivo concreto, no solo un adverbio de modo. «Ofrenda voluntaria» mantiene la forma nominal y comunica bien el valor de don espontáneo.
- source_word: לָעָם לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: for the people, for the priests, and for the Levites
  chosen_spanish: para el pueblo, para los sacerdotes y para los levitas
  alternatives_spanish:
  - para el pueblo, a los sacerdotes y a los levitas
  - en favor del pueblo, de los sacerdotes y de los levitas
  lexicon: HALOT
  rationale: Los lamedes marcan beneficio o provisión. «Para» conserva la función relacional en español y suena natural en un contexto de distribución cultual.
- source_word: הֵרִימוּ
  english_pob_choice: contributed
  chosen_spanish: llevaron
  alternatives_spanish:
  - contribuyeron
  - presentaron
  - ofrecieron
  lexicon: HALOT
  rationale: En esta frase el verbo expresa la entrega de una contribución/ofrenda. En español, «llevaron» con el objeto explícito «una ofrenda voluntaria» evita una repetición pesada y conserva el acto de aportar; aun así, «ofrecieron» sería una alternativa posible si se quisiera enfatizar más el gesto cultual.
- source_word: נְגִידֵי בֵּית הָאֱלֹהִים
  english_pob_choice: the leaders of the house of God
  chosen_spanish: los líderes de la casa de Dios
  alternatives_spanish:
  - los jefes de la casa de Dios
  - los administradores de la casa de Dios
  - los gobernantes de la casa de Dios
  lexicon: HALOT
  rationale: נָגִיד puede referirse a líder, jefe o gobernante. «Líderes» es claro y amplio, y «casa de Dios» reproduce la designación del templo sin sobreexplicarla.
- source_word: נָתְנוּ
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - donaron
  - proveyeron
  lexicon: HALOT
  rationale: El verbo נתן se traduce de manera directa con «dieron». El contexto ya hace evidente que se trata de una entrega para el culto.
- source_word: לַפְּסָחִים
  english_pob_choice: for the Passover offerings
  chosen_spanish: ofrendas de Pascua
  alternatives_spanish:
  - sacrificios de Pascua
  - animales de Pascua
  - ofrendas pascuales
  lexicon: HALOT
  rationale: El plural hebreo puede aludir a las víctimas/animales del rito pascual. «Ofrendas de Pascua» conserva la ambigüedad útil entre ofrenda y víctima, sin fijarla excesivamente.
- source_word: אַלְפַּיִם וְשֵׁשׁ מֵאוֹת
  english_pob_choice: 2,600
  chosen_spanish: '2.600'
  alternatives_spanish:
  - dos mil seiscientos
  lexicon: Project numeral style
  rationale: En español se usa el punto como separador de miles. Se mantiene el valor numérico exacto sin alterar el contenido.
- source_word: וּבָקָר שְׁלֹשׁ מֵאוֹת
  english_pob_choice: and 300 cattle
  chosen_spanish: y 300 cabezas de ganado
  alternatives_spanish:
  - y 300 reses
  - y 300 vacas y bueyes
  - y 300 bovinos
  lexicon: HALOT
  rationale: בָּקָר es un colectivo para ganado vacuno o reses. «Cabezas de ganado» es una solución clara en español y evita restringirlo indebidamente a una sola especie.
theological_decisions:
- issue: La expresión plural לַפְּסָחִים puede leerse como ofrendas/animales pascuales, no necesariamente como varias fiestas de Pascua.
  english_pob_reading: Or "for the Passover sacrifices." The Hebrew plural may refer to the animals used for the Passover observance.
  chosen_spanish_reading: ofrendas de Pascua
  alternative_spanish_readings:
  - sacrificios de Pascua
  - animales de Pascua
  rationale: La forma plural hebrea no debe borrarse. «Ofrendas de Pascua» mantiene abierta la posibilidad de que se trate de las víctimas sacrificiales del rito, en línea con la nota inglesa, sin volverlo una referencia a múltiples celebraciones.
  doctrine_reference: Éxodo 12; 2 Crónicas 35:7-9
translation_notes:
  revision_awareness: Se siguió la revisión auditada que simplificó la sintaxis inglesa eliminando un 'as' redundante y clarificando el objeto de 2,600. En español se optó por una construcción igualmente natural sin añadir notas innecesarias; se mantuvo el valor cultual y numérico del hebreo y se evitó mecanicismo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el tetragrámaton en otros pasajes del proyecto, pero aquí no aparece.
  - Se usó «casa de Dios» como equivalente fijo de בֵּית הָאֱלֹהִים, coherente con el audit trail inglés.
  - Se mantuvo la ambigüedad cultual de לַפְּסָחִים dentro de una frase fluida y publicable en español.
