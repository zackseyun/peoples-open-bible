translation:
  language: es
  text: Los pondrás en una sola canasta[a], y los acercarás en la canasta[b], junto con el toro y los dos carneros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una canasta». La preposición hebrea es literalmente «sobre», pero en este contexto de recipiente el sentido es que los elementos se ponen dentro de una sola canasta.
    reason: lexical_alternative
  - marker: b
    text: O «los presentarás» o «los ofrecerás». El verbo hebreo es el término sacrificial estándar de «acercar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  english_pob_choice: you shall put
  chosen_spanish: lo pondrás
  alternatives_spanish:
  - lo colocarás
  - y pondrás
  lexicon: HALOT
  rationale: נתן aquí expresa la acción de colocar o poner los elementos de la ofrenda. En español, «poner» es natural y fiel al procedimiento; el futuro exhortativo conserva el tono instruccional del hebreo.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - las
  lexicon: HALOT
  rationale: El pronombre retoma los elementos de pan u ofrendas mencionados en el versículo anterior. En español, el referente colectivo puede expresarse con un singular neutro («lo») para evitar forzar género y mantener la referencia al conjunto.
- source_word: עַל סַל אֶחָד
  english_pob_choice: into one basket
  chosen_spanish: en una sola canasta
  alternatives_spanish:
  - sobre una canasta
  - en una canasta
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre/upon», en este contexto de recipiente el sentido es de colocación dentro o en un contenedor. «Una sola canasta» conserva אֶחָד y hace explícita la unidad del recipiente.
- source_word: וְהִקְרַבְתָּ
  english_pob_choice: you shall bring them near
  chosen_spanish: lo llevarás
  alternatives_spanish:
  - lo presentarás
  - lo ofrecerás
  lexicon: HALOT
  rationale: הקריב es el verbo técnico cultual de «acercar/traer cerca». En español, «llevarás» comunica el movimiento ritual sin cerrar prematuramente la acción en «ofrecer», que puede ser una interpretación más específica.
- source_word: בַּסָּל
  english_pob_choice: in the basket
  chosen_spanish: en la canasta
  alternatives_spanish:
  - con la canasta
  - dentro de la canasta
  lexicon: HALOT
  rationale: La preposición ב indica ubicación o acompañamiento. Aquí el sentido natural es que lo que se lleva va en la canasta, por eso «en la canasta» mantiene la imagen del recipiente.
- source_word: וְאֶת הַפָּר וְאֵת שְׁנֵי הָאֵילִם
  english_pob_choice: along with the bull and the two rams
  chosen_spanish: junto con el becerro y los dos carneros
  alternatives_spanish:
  - y el becerro y los dos carneros
  - además del becerro y de los dos carneros
  lexicon: HALOT
  rationale: Los marcadores de objeto añaden otros elementos que deben ser llevados cerca. «Junto con» expresa bien esa coordinación. «Becerro» es una opción contextual en español para פַּר en un rito sacrificial; «carneros» traduce literalmente אֵילִם.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el becerro
  alternatives_spanish:
  - el toro
  - el novillo
  lexicon: HALOT
  rationale: פַּר designa un bovino joven para sacrificio en este contexto. «Becerro» es una opción española clara y religiosa que comunica la edad/función sacrificial mejor que «toro».
- source_word: שְׁנֵי הָאֵילִם
  english_pob_choice: the two rams
  chosen_spanish: los dos carneros
  alternatives_spanish:
  - los dos arietes
  - los dos machos carneros
  lexicon: HALOT
  rationale: אֵילִם son machos ovinos adultos, normalmente traducidos como «carneros». El numeral plural se expresa naturalmente como «los dos carneros».
theological_decisions:
- issue: Verb of cultic approach (הקריב) without over-specifying the ritual act
  english_pob_reading: you shall bring them near
  chosen_spanish_reading: lo llevarás
  alternative_spanish_readings:
  - lo presentarás
  - lo ofrecerás
  rationale: El hebreo conserva la amplitud del verbo sacrificial de acercar. La versión española evita fijar demasiado pronto el acto como «ofrecer», manteniendo la cercanía ritual y la posibilidad de que el contexto litúrgico determine el matiz.
  doctrine_reference: Cultic language in sacrificial instructions; lexical range of הקריב
- issue: Rendering of the container preposition עַל with a basket
  english_pob_reading: into one basket
  chosen_spanish_reading: en una sola canasta
  alternative_spanish_readings:
  - sobre una sola canasta
  - dentro de una sola canasta
  rationale: La preposición hebrea puede ser literal («sobre») pero en este contexto de recipiente la equivalencia funcional es mejor. «En» preserva el sentido práctico sin borrar la tensión lexical del hebreo.
  doctrine_reference: Hebrew preposition עַל in container contexts
- issue: Choice of sacrificial animal term for פַּר
  english_pob_reading: the bull
  chosen_spanish_reading: el becerro
  alternative_spanish_readings:
  - el toro
  - el novillo
  rationale: En una instrucción ritual, el español necesita una palabra que sugiera un animal sacrificial más que un toro genérico de trabajo. «Becerro» comunica adecuadamente el valor cultual y la edad del animal, aunque el término exacto puede variar según contexto.
  doctrine_reference: Sacrificial terminology in Pentateuchal law
translation_notes:
  revision_awareness: Se siguió el contexto hebreo de Éxodo 29:3 y el audito inglés existente. No hubo revisiones aplicadas en el registro inglés; la draft española conserva la tensión entre la preposición literal עַל y su sentido contextual, y entre el verbo cultual הקריב y una formulación española natural.
  spanish_consistency_notes:
  - Se mantuvo «canasta» para el recipiente, coherente con un registro bíblico claro y moderno.
  - Se evitó «SEÑOR» o equivalentes de sustitución porque este versículo no contiene el nombre divino.
  - Se optó por un español culto pero accesible, con futuro exhortativo para reflejar la instrucción hebrea.
  - 'Se preservó la coordinación de los tres grupos de elementos: pan en la canasta, el animal sacrificial y los dos carneros.'
