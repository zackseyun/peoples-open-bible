translation:
  language: es
  text: Yo visto a los cielos de oscuridad[a], y pongo saco[b] como su cobertura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «negrura» o «lobreguez» por «oscuridad».
    reason: lexical_alternative
  - marker: b
    text: El saco era una tela áspera asociada con el duelo y la lamentación.
    reason: cultural_note
lexical_decisions:
- source_word: אַלְבִּישׁ
  english_pob_choice: I clothe
  chosen_spanish: Yo visto
  alternatives_spanish:
  - Yo cubro con ropa
  - Yo revisto
  lexicon: HALOT
  rationale: El verbo hebreo es causativo de לבשׁ, ‘poner vestido / vestir’. En español, «visto» conserva de forma natural la idea de causar que algo quede cubierto, sin perder el matiz poético de la imagen.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: «Los cielos» preserva el plural hebreo y el registro poético elevado. «El cielo» sería más singular y menos acorde con la forma hebrea.
- source_word: קַדְר֑וּת
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - negrura
  - oscuridad
  lexicon: HALOT
  rationale: El sustantivo admite la idea de oscuridad, sombra o luto sombrío. «Oscuridad» es claro y bíblicamente natural en español; además deja abierta la alternativa de ‘negrura’ o ‘luto sombrío’ sin resolver demasiado el campo semántico.
- source_word: וְשַׂק
  english_pob_choice: and sackcloth
  chosen_spanish: del saco
  alternatives_spanish:
  - de saco
  - de cilicio
  lexicon: HALOT
  rationale: El hebreo nombra el material/vestidura de duelo. «Saco» mantiene la referencia lexical y evita sustituirlo por «cilicio», que en español puede sonar más tradicional pero también más interpretativo. La construcción «del saco» permite que funcione como material de la cobertura.
- source_word: אָשִׂים
  english_pob_choice: I make
  chosen_spanish: hago
  alternatives_spanish:
  - pongo
  - coloco
  - hago
  lexicon: HALOT
  rationale: 'שׂים puede significar poner, colocar o hacer. Aquí, con «cobertura», «hago» expresa bien la relación predicativa: convierto el saco en cobertura. Es una opción idiomática en español y mantiene la flexibilidad del verbo hebreo.'
- source_word: כְּסוּתָם
  english_pob_choice: their covering
  chosen_spanish: su cobertura
  alternatives_spanish:
  - su cobertura
  - su cubierta
  - su manto
  lexicon: HALOT
  rationale: «Cobertura» reproduce el sustantivo de cubrir sin introducir un objeto más específico que el hebreo. El singular posesivo refleja el sentido colectivo de «los cielos» en español natural.
theological_decisions:
- issue: Imaginario cósmico de juicio / luto
  english_pob_reading: Render the verse as a divine declaration of power to darken the heavens and cover them with sackcloth, preserving the poetic imagery without over-interpreting it as exclusively literal or metaphorical.
  chosen_spanish_reading: El versículo se traduce como una declaración divina de poder para vestir de oscuridad a los cielos y cubrirlos con saco, preservando la imaginería poética sin resolverla solo como fenómeno cósmico literal o solo como metáfora de duelo.
  alternative_spanish_readings:
  - Primariamente un oscurecimiento cósmico literal
  - Primariamente un lenguaje metafórico de duelo o juicio
  rationale: 'El hebreo permite oír a la vez la imagen de oscurecimiento y la de luto. La redacción española conserva esa tensión: no reduce la frase a un dato astronómico ni la encierra únicamente en una alegoría.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requirieron cambios en la última revisión; el pase más reciente indicó alta concordancia y ningún ajuste pendiente.
  spanish_consistency_notes:
  - Se mantiene Yahvé cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton.
  - «Cielos» conserva el plural hebreo y la elevación poética típica de Isaías.
  - «Saco» se usa aquí como equivalente transparente de sackcloth; si el contexto local exige mayor explicitud cultural, la nota aclara su asociación con duelo.
