translation:
  language: es
  text: Han derramado su sangre como agua alrededor de Jerusalén[a], y no hay quien los sepulte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han derramado su sangre como agua».'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁפְכוּ
  english_pob_choice: have poured out
  chosen_spanish: han derramado
  alternatives_spanish:
  - han vertido
  - han derramado fuera
  lexicon: HALOT
  rationale: El qal perfecto plural indica una acción consumada; «han derramado» conserva esa completitud y en español funciona bien con sangre. «Verter» sería posible, pero aquí «derramar» comunica con más naturalidad la imagen violenta sin perder la relación con el símil siguiente.
- source_word: דָמָם
  english_pob_choice: their blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - su sangre vital
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo es literalmente «su sangre». En español, «su sangre» es directo y fiel; el posesivo singular/plural queda resuelto por el contexto de las víctimas. No se añade «vital» porque sería interpretativo.
- source_word: כַּמַּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - igual que agua
  - cual agua
  lexicon: HALOT
  rationale: La partícula comparativa exige un símil. «Como agua» es la forma natural en español y preserva la fuerza imagética del hebreo sin elevar el registro innecesariamente.
- source_word: סְבִיבוֹת יְרוּשָׁלִָם
  english_pob_choice: all around Jerusalem
  chosen_spanish: alrededor de Jerusalén
  alternatives_spanish:
  - en derredor de Jerusalén
  - rodeando Jerusalén
  lexicon: HALOT
  rationale: «סביב» expresa el entorno o perímetro de algo. «Alrededor de Jerusalén» transmite bien la distribución espacial del derramamiento; no hace falta intensificar con «todo» en el texto principal.
- source_word: וְאֵין
  english_pob_choice: there is no one
  chosen_spanish: no hay quien
  alternatives_spanish:
  - y no había quien
  - no existe quien
  lexicon: HALOT
  rationale: El negativo existencial es más natural en español con «no hay quien». Mantiene la idea de ausencia total de una persona capaz de actuar, que es la función del hebreo aquí.
- source_word: קוֹבֵר
  english_pob_choice: to bury them
  chosen_spanish: los sepulte
  alternatives_spanish:
  - los entierre
  - para sepultarlos
  lexicon: HALOT
  rationale: El participio sustantivado implica «uno que entierre/sepulte»; en español, «no hay quien los sepulte» comunica la ausencia de sepulturero con claridad y sin agregar contenido. «Sepultar» conserva un matiz más formal y funerario que «enterrar».
translation_notes:
  revision_awareness: El texto inglés ya muestra un estado estable sin revisiones aplicadas y con alta concordancia de auditoría; por ello la versión española sigue de cerca la imagen hebrea sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo el símil directo «como agua» para reflejar la comparación explícita del hebreo.
  - Se prefirió «sepulte» sobre una perífrasis más explicativa para conservar la concisión poética.
  - El pronombre objeto plural «los» se usa por referencia contextual a las víctimas implícitas en el versículo.
