translation:
  language: es
  text: Y los magos no pudieron estar de pie delante de Moisés a causa de los forúnculos,[a] porque los forúnculos estaban sobre los magos y sobre todos los egipcios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente, «en todo Egipto». La traducción expresa el sentido personal implícito en el contexto: los forúnculos estaban sobre la gente por todo Egipto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחַרְטֻמִּים
  english_pob_choice: the magicians
  chosen_spanish: los magos
  alternatives_spanish:
  - los hechiceros
  - los magos de la corte
  lexicon: HALOT
  rationale: En Éxodo, חַרְטֻמִּים nombra a los especialistas rituales de Faraón que se oponen a Moisés; en español, 'magos' comunica de forma natural esa función narrativa sin introducir un tecnicismo incierto como 'hechiceros' ni una especificación histórica no explicitada en el verso.
- source_word: לַעֲמֹד לִפְנֵי מֹשֶׁה
  english_pob_choice: to stand before Moses
  chosen_spanish: mantenerse en pie delante de Moisés
  alternatives_spanish:
  - presentarse delante de Moisés
  - ponerse de pie delante de Moisés
  lexicon: HALOT
  rationale: La expresión conserva el valor idiomático de 'estar en presencia de' y el matiz físico de no poder permanecer de pie debido a la aflicción. 'Mantenerse en pie' suena natural en español y retiene la fuerza verbal del hebreo.
- source_word: מִפְּנֵי הַשְּׁחִין
  english_pob_choice: because of the boils
  chosen_spanish: a causa de los forúnculos
  alternatives_spanish:
  - por los forúnculos
  - debido a los forúnculos
  lexicon: HALOT
  rationale: מִפְּנֵי expresa causa. 'Forúnculos' refleja con precisión la erupción inflamatoria de שְׁחִין en un español médico comprensible; el plural responde al sentido colectivo de la plaga, como en la traducción inglesa.
- source_word: הַשְּׁחִין
  english_pob_choice: the boils
  chosen_spanish: los forúnculos
  alternatives_spanish:
  - la llaga
  - la inflamación
  lexicon: HALOT
  rationale: Se mantiene la consistencia del término dentro del versículo. 'Forúnculos' es más específico que 'llagas' o 'inflamación' y preserva la referencia a lesiones cutáneas purulentas sin suavizarla.
- source_word: בַּחֲרְטֻמִּם
  english_pob_choice: on the magicians
  chosen_spanish: en los magos
  alternatives_spanish:
  - sobre los magos
  - entre los magos
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, el contexto de una aflicción corporal favorece una lectura localizada en el cuerpo. En español, 'en los magos' reproduce con naturalidad esa localización interna/afectiva y evita un calco demasiado físico si se leyera solo como 'sobre'.
- source_word: וּבְכָל מִצְרָיִם
  english_pob_choice: and on all the Egyptians
  chosen_spanish: y en todo Egipto
  alternatives_spanish:
  - y sobre todos los egipcios
  - y en todos los egipcios
  lexicon: HALOT
  rationale: El inglés POB señala que el hebreo dice literalmente 'en todo Egipto' y entiende el sentido personal implícito. En español se conserva esa literalidad en el texto principal, sin eliminar la tensión semántica entre lugar y personas.
theological_decisions:
- issue: Referencia de la aflicción a personas o al país
  english_pob_reading: 'The translation renders the implied personal sense from the context: the boils were on the people throughout Egypt.'
  chosen_spanish_reading: El texto principal conserva 'en todo Egipto' para reflejar la forma hebrea, dejando implícito que la plaga afectaba a la gente en todo el país.
  alternative_spanish_readings:
  - y en todos los egipcios
  - y sobre todos los egipcios
  rationale: 'La decisión sigue la observación del POB inglés: la frase hebrea es literalmente locativa, pero el contexto humano la orienta hacia las personas. Mantener la literalidad evita borrar esa tensión; el lector español puede inferir el alcance personal del castigo.'
  doctrine_reference: Éxodo 9:11; nota lexicográfica del POB inglés
- issue: Intensidad corporal de שְׁחִין
  english_pob_reading: boils
  chosen_spanish_reading: forúnculos
  alternative_spanish_readings:
  - llagas
  - granos inflamados
  rationale: No hay una cuestión doctrinal, sino de precisión descriptiva. 'Forúnculos' preserva el carácter visible, doloroso y corporal de la plaga mejor que términos más vagos o eufemísticos.
  doctrine_reference: Éxodo 9:11; uso léxico contextual
- issue: Relación entre presencia y movilidad ante Moisés
  english_pob_reading: were not able to stand before Moses
  chosen_spanish_reading: no pudieron mantenerse en pie delante de Moisés
  alternative_spanish_readings:
  - no pudieron presentarse delante de Moisés
  - no pudieron estar de pie delante de Moisés
  rationale: La formulación española mantiene la idea de comparecer ante Moisés y, al mismo tiempo, la incapacidad física provocada por la plaga. No introduce una interpretación adicional; solo hace explícito el aspecto corporal que el hebreo y el contexto narrativo exigen.
  doctrine_reference: Éxodo 9:11
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustantivos, en concordancia con el pasaje inglés ya aprobado y el acuerdo alto del control cruzado. No se detectaron revisiones aplicadas que obliguen a alterar la línea española principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en el contexto inmediato, según la convención del proyecto.
  - Se mantiene 'Moisés' como forma estándar y 'magos' para חַרְטֻמִּים, siguiendo el valor narrativo del POB inglés.
  - '''Forúnculos'' se elige como equivalente consistente de ''boils'' dentro de esta unidad, evitando alternar con ''llagas'' para no diluir la imagen clínica.'
  - La nota al pie conserva la tensión entre la literalidad locativa y el sentido personal implícito, tal como lo hace el audit trail inglés.
