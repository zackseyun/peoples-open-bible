translation:
  language: es
  text: 'Comerán la carne de valientes[a], y beberán la sangre de los príncipes de la tierra: carneros, corderos, machos cabríos y toros[b], todos ellos cebados de Basán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los términos animales de la lista siguiente son imágenes sacrificiales y metafóricas para los gobernantes y guerreros muertos.
    reason: cultural_note
  - marker: b
    text: O «engordados de Basán». Basán era conocido por sus pastos abundantes y su ganado bien alimentado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne humana
  - sazón
  lexicon: HALOT
  rationale: El hebreo designa carne en sentido corporal literal. En español, «carne» conserva la dureza de la imagen sacrificial y evita suavizarla con un equivalente más general.
- source_word: גִּבּוֹרִים
  english_pob_choice: mighty men
  chosen_spanish: valientes
  alternatives_spanish:
  - guerreros
  - hombres poderosos
  - héroes
  lexicon: HALOT
  rationale: En este contexto de derrota militar, el término apunta a hombres fuertes y combatientes. «Valientes» mantiene el matiz de fuerza militar con un español natural y sobrio.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you will eat
  chosen_spanish: Comerán
  alternatives_spanish:
  - comerán ustedes
  - comeréis
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como anuncio profético. «Comerán» da el valor futuro sin cargar el verso con una forma más pesada.
- source_word: דַם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: HALOT
  rationale: Se trata de sangre literal dentro de la imagen grotesca de banquete sacrificial; no hay motivo para atenuarla.
- source_word: נְשִׂיאֵי הָאָרֶץ
  english_pob_choice: the princes of the earth
  chosen_spanish: los príncipes de la tierra
  alternatives_spanish:
  - los jefes de la tierra
  - los líderes de la tierra
  lexicon: HALOT
  rationale: «Príncipes» conserva el registro elevado del sustantivo hebreo y refleja bien la construcción. Se mantiene «de la tierra» siguiendo el alcance amplio que el contexto sugiere, no restringido a una sola región.
- source_word: תִּשְׁתּוּ
  english_pob_choice: you will drink
  chosen_spanish: beberán
  alternatives_spanish:
  - beberán ustedes
  lexicon: HALOT
  rationale: Como con el verbo anterior, el imperfecto se vierte como futuro profético en español.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - rams
  - machos carneros
  lexicon: HALOT
  rationale: Es el sentido animal literal en una lista de víctimas sacrificiales. «Carneros» es el equivalente español más claro y natural.
- source_word: כָּרִים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos jóvenes
  - crías de oveja
  lexicon: HALOT
  rationale: El término refiere a ovejas jóvenes o cebadas; «corderos» es el animal correspondiente más idiomático en español.
- source_word: עַתּוּדִים
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - chivos machos
  - he-goats
  lexicon: HALOT
  rationale: El hebreo especifica machos cabríos. «Machos cabríos» conserva la precisión zoológica y la fuerza de la lista.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: «Toros» es una traducción directa y natural para el bovino adulto fuerte que encaja en la imaginería sacrificial.
- source_word: מְרִיאֵי בָשָׁן
  english_pob_choice: fattened ones of Bashan
  chosen_spanish: engordados de Basán
  alternatives_spanish:
  - los engordados de Basán
  - fatlings de Basán
  - cebados de Basán
  lexicon: HALOT
  rationale: La expresión alude a animales bien alimentados por los pastos de Basán. «Engordados de Basán» conserva la idea de gordura/cebamiento sin perder la referencia geográfica.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos juntos
  lexicon: HALOT
  rationale: Resume la lista anterior de animales de forma directa e idiomática.
theological_decisions:
- issue: Si la lista de animales debe explicarse como metáfora o mantenerse literal en el texto principal
  english_pob_reading: Render the animal terms literally in the main text while preserving their metaphorical function through punctuation and context.
  chosen_spanish_reading: Mantener en el texto principal los nombres de los animales, dejando que el contexto y la puntuación muestren su función metafórica.
  alternative_spanish_readings:
  - Parafrasear la lista como títulos de gobernantes derrotados
  - Añadir una glosa explicativa dentro del verso
  rationale: El hebreo presenta una lista literal de animales usada como imagen sacrificial para los caídos humanos. Conservar los animales en español respeta la tensión del texto sin aplanarla en explicación.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo reflejar el doble nivel humano/animal de la frase sin oscurecerla
  english_pob_reading: The animal list is metaphorical sacrificial imagery for the slain rulers and warriors.
  chosen_spanish_reading: El texto deja la imagen animal en primer plano, mientras el destinatario humano se entiende por el encabezado de ‘valientes’ y ‘príncipes de la tierra’.
  alternative_spanish_readings:
  - Reformular toda la línea como metáfora explícita de dirigentes
  - Trasladar la metáfora solo a una nota
  rationale: La imagen es deliberadamente cruda y no conviene neutralizarla. La solución mantiene la lectura auditable y permite ver el paralelismo entre los combatientes humanos y los animales sacrificiales.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se identificaron cambios necesarios tras la pasada más reciente; el borrador mantiene la solución estable y de alta concordancia.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa un registro sobrio y bíblico sin caer en calcos rígidos.
  - La puntuación con dos puntos y coma refuerza la relación entre la imagen humana inicial y la lista sacrificial final.
  - Se evita «SEÑOR» o traducción eclesiástica tradicional donde no es requerida por el texto fuente.
