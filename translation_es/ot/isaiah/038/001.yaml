translation:
  language: es
  text: 'En aquellos días, Ezequías enfermó y estuvo al borde de la muerte[a], e Isaías el profeta, hijo de Amoz, vino a él y le dijo: «Así dice Yahvé: Pon en orden tu casa, porque vas a morir; no vivirás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «porque estás muriendo» o «porque estás muerto»; la expresión hebrea anuncia una muerte cierta e inminente.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - Por aquellos días
  lexicon: HALOT
  rationale: La expresión hebrea es un idiótismo temporal narrativo. «En aquellos días» conserva el enlace narrativo y la fórmula tradicional sin perder naturalidad en español.
- source_word: חָלָה
  english_pob_choice: became sick
  chosen_spanish: enfermó
  alternatives_spanish:
  - se enfermó
  - cayó enfermo
  lexicon: HALOT
  rationale: El verbo indica el inicio o la ocurrencia de la enfermedad. «Enfermó» es breve, natural y refleja el cambio de estado sin añadir matices no presentes.
- source_word: לָמוּת
  english_pob_choice: was near death
  chosen_spanish: estuvo al borde de la muerte
  alternatives_spanish:
  - estuvo cerca de morir
  - estaba para morir
  lexicon: HALOT
  rationale: La construcción con ל expresa resultado o alcance mortal. «Al borde de la muerte» comunica bien la proximidad a la muerte y evita la dureza o ambigüedad de fórmulas más literales.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ הַנָּבִיא
  english_pob_choice: Isaiah the prophet, the son of Amoz
  chosen_spanish: el profeta Isaías, hijo de Amoz
  alternatives_spanish:
  - Isaías, hijo de Amoz, el profeta
  - Isaías, el profeta, hijo de Amoz
  lexicon: HALOT
  rationale: 'Se conserva el orden natural del español mientras se mantienen los elementos appositivos del hebreo: nombre, filiación y oficio profético.'
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así ha dicho Yahvé
  alternatives_spanish:
  - Así dice Yahvé
  - Así dice el Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se reproduce con el tiempo perfecto castellano habitual en estilo bíblico. Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
- source_word: צַו לְבֵיתֶךָ
  english_pob_choice: Set your house in order
  chosen_spanish: Pon en orden tu casa
  alternatives_spanish:
  - Ordena tu casa
  - Arregla tu casa
  lexicon: HALOT
  rationale: La orden hebrea es idiomática y apunta a poner en regla los asuntos previos a la muerte. «Pon en orden tu casa» conserva la imagen y el valor idiomático sin sobreexplicar.
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  - casa y asuntos
  lexicon: HALOT
  rationale: En este contexto, el español «casa» mantiene la metáfora base y puede abarcar hogar, administración y asuntos familiares, como en el modismo hebreo.
- source_word: כִּי מֵת אַתָּה
  english_pob_choice: you shall die
  chosen_spanish: porque vas a morir
  alternatives_spanish:
  - porque morirás
  - porque has de morir
  lexicon: HALOT
  rationale: El hebreo anuncia una muerte cierta e inminente. «Vas a morir» comunica esa certeza profética de modo directo y natural, sin forzar un presente imposible.
- source_word: וְלֹא תִחְיֶה
  english_pob_choice: you will not live
  chosen_spanish: no vivirás
  alternatives_spanish:
  - no seguirás viviendo
  - no recuperarás la vida
  lexicon: HALOT
  rationale: La cláusula afirma que no continuará con vida. «No vivirás» es la forma más directa y fiel al hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se conserva el nombre divino en forma transparente «Yahvé» en vez de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the death announcement כִּי מֵת אַתָּה וְלֹא תִחְיֶה
  english_pob_reading: an announcement of impending death
  chosen_spanish_reading: un anuncio de muerte segura e inminente
  alternative_spanish_readings:
  - una afirmación de que ya está muerto
  - un anuncio de que está por morir y no se recuperará
  rationale: El hebreo usa una forma que, si se tradujera de manera rígida, sonaría como si Ezequías ya hubiera muerto. La redacción española conserva la certeza profética y la inminencia sin introducir una lectura médica más específica de la que permite el texto.
  doctrine_reference: 'DOCTRINE.md: Source-anchored prophetic speech and tense handling'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una formulación más interpretativa («to the point of death» / «you are about to die») a otra más cercana al hebreo («was near death» / «you shall die»). La traducción española sigue esa revisión al usar una expresión idiomática para la cercanía de la muerte y una promesa/amenaza directa en futuro para la sentencia final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva «profeta» y la apposición filial en orden natural del español.
  - «Casa» reproduce el modismo hebreo sin sustituirlo por «familia» o «asuntos» en el texto principal.
  - La nota al pie preserva la tensión lexical entre una traducción idiomática y una más literal de מֵת אַתָּה.
