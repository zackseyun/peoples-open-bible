lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: La forma constructa introduce a cada soberano de la lista. En español, la construcción natural y fiel es «el rey de», que conserva el valor relacional sin volverla rígida o poco idiomática.
- source_word: חָרְמָה
  english_pob_choice: Hormah
  chosen_spanish: Horma
  alternatives_spanish:
  - Horma
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. En español bíblico puede aparecer transliterado como «Horma»; se mantiene como nombre propio sin traducir su sentido léxico.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno solo
  lexicon: HALOT
  rationale: El numeral funciona de manera elíptica en esta lista de reyes derrotados. «Uno» preserva la cadencia breve del hebreo y evita añadir información no expresada por el texto.
- source_word: עֲרָד
  english_pob_choice: Arad
  chosen_spanish: Arad
  alternatives_spanish:
  - Arad
  lexicon: HALOT
  rationale: Nombre propio de lugar; la forma española usual coincide con la transliteración básica y se conserva sin traducción.
translation_notes:
