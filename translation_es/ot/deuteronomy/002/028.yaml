revisions:
- from: Tú venderás comida por plata[a], para que yo coma, y me darás agua por plata, para que yo beba; sólo déjame pasar a pie[b].
  to: Me venderás comida por plata[a], para que yo coma, y me darás agua por plata, para que yo beba; solo déjame pasar a pie[b].
  rationale: Se corrigió 'Tú venderás comida' a 'Me venderás comida' para reflejar el sufijo pronominal de primera persona en תַּשְׁבִּרֵנִי y mejorar la naturalidad del español. Se mantuvo 'por plata' por fidelidad al término concreto del hebreo. Se conservó 'a pie' como español idiomático, con una nota literal ajustada. También se eliminó el pronombre explícito 'Tú', innecesario en español y algo torpe en este contexto.
  reviewer_model: gpt-5.4
