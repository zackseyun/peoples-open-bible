translation:
  language: es
  text: 'David dijo a Mical: «Fue ante Yahvé, quien me escogió en lugar de tu padre y en lugar de toda su casa, para designarme gobernante sobre el pueblo de Yahvé, sobre Israel; y dancé[a] ante Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «celebré» o «jugué». El verbo hebreo שׂחק es más amplio que un término técnico para «danzar», aunque aquí el contexto apunta a una expresión pública y gozosa ante Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh / before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión es relacional y espacial; en español, «delante de» conserva bien la repetición enfática del hebreo y su valor de actuar ante la presencia de Dios. Se mantiene «Yahvé» por la política terminológica del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» para preservar el nombre personal revelado, no una sustitución titulativa. Esta decisión sigue el estándar del proyecto y evita la máscara tradicional en mayúsculas.
- source_word: אֲשֶׁר בָּחַר בִּי
  english_pob_choice: who chose me
  chosen_spanish: quien me escogió
  alternatives_spanish:
  - quien me eligió
  - que me escogió
  lexicon: HALOT
  rationale: בחר expresa elección/escogimiento; «escogió» es natural y fiel al contexto de designación real. «Escogió» mantiene el matiz de selección soberana sin cargarlo con categorías posteriores no explicitadas en el versículo.
- source_word: מֵאָבִיךְ וּמִכָּל בֵּיתוֹ
  english_pob_choice: rather than your father and rather than all his house
  chosen_spanish: en lugar de tu padre y en lugar de toda su casa
  alternatives_spanish:
  - más que tu padre y más que toda su casa
  - en vez de tu padre y de toda su casa
  lexicon: HALOT
  rationale: El מן comparativo tras בחר expresa contraste/separación. «En lugar de» comunica con claridad la idea de preferencia comparativa en español y evita la artificialidad de un «por encima de» demasiado literal. «Casa» conserva el sentido dinástico y familiar de בֵיתוֹ.
- source_word: לְצַוֹּת אֹתִי
  english_pob_choice: to appoint me
  chosen_spanish: para designarme
  alternatives_spanish:
  - para nombrarme
  - para comisionarme
  lexicon: HALOT
  rationale: En esta construcción con cargo, צוה tiene fuerza de instalación/nombramiento más que de mero mandato. «Designarme» expresa la asignación a una función concreta y suena natural en español contemporáneo.
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  - regente
  lexicon: HALOT
  rationale: נָגִיד denota a alguien puesto en autoridad. «Gobernante» comunica bien la autoridad política del contexto real sin la posible ambigüedad de «príncipe»; «líder» sería demasiado general.
- source_word: עַל עַם יְהוָה עַל יִשְׂרָאֵל
  english_pob_choice: over the people of Yahweh, over Israel
  chosen_spanish: sobre el pueblo de Yahvé, sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Yahvé, sobre Israel
  - sobre el pueblo de Yahvé, es decir, sobre Israel
  lexicon: HALOT
  rationale: Se conserva la duplicación de עַל para mantener el énfasis del hebreo. «Pueblo de Yahvé» retiene el valor pactual de la expresión, y «sobre Israel» permanece como aposición explicativa sin fundirla en una sola frase.
- source_word: וְשִׂחַקְתִּי
  english_pob_choice: I danced / I celebrated
  chosen_spanish: danzaré
  alternatives_spanish:
  - celebraré
  - me alegraré
  - bailaré
  lexicon: HALOT
  rationale: El POB inglés documenta la tensión entre un sentido amplio de acción gozosa y la lectura más específica de «danced» en la revisión más reciente. En español, «danzaré» mantiene la conexión inmediata con el contexto de danza pública sin perder del todo el matiz de celebración. Se preserva la tensión lexical mediante nota.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto de transliterar el Nombre divino como «Yahvé», preservando su identidad propia en lugar de sustituirlo por un título. Esto es especialmente relevante en un versículo que repite el Nombre y enfatiza la presencia ante él.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: El sentido de וְשִׂחַקְתִּי en el cierre
  english_pob_reading: I danced before Yahweh
  chosen_spanish_reading: y danzaré delante de Yahvé
  alternative_spanish_readings:
  - y celebrará delante de Yahvé
  - y jugaré delante de Yahvé
  rationale: El hebreo שׂחק es más amplio que un verbo técnico de danza, pero en este contexto responde a la acusación sobre la conducta exuberante de David. La revisión inglesa más reciente prefirió «danced»; por eso la traducción española adopta un verbo concreto que no borra el gesto corporal, pero se documenta la alternativa más amplia en nota para no eliminar la tensión semántica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve tension rather than over-resolve'
- issue: Comparación con el padre y la casa de Saúl
  english_pob_reading: rather than your father and rather than all his house
  chosen_spanish_reading: en lugar de tu padre y en lugar de toda su casa
  alternative_spanish_readings:
  - más que tu padre y más que toda su casa
  - por encima de tu padre y por encima de toda su casa
  rationale: El hebreo usa מן con valor comparativo/separativo después de בחר. «En lugar de» expresa con naturalidad la preferencia de la elección divina sin introducir una metáfora de superioridad que podría sonar más interpretativa. Se mantiene la referencia dinástica a «su casa».
  doctrine_reference: HALOT on בחר + מן comparative use
translation_notes:
  revision_awareness: 'El inglés audit trail muestra una revisión importante en la cláusula final: primero se optó por un sentido amplio («I celebrated») para no sobrearmonizar con el verbo anterior, y luego la revisión más reciente corrigió a «I danced» para reflejar mejor el contexto inmediato. La versión española adopta «danzaré» como solución principal, pero documenta en nota la amplitud semántica de שׂחק y conserva el carácter auditable de la decisión. También se conserva la comparación con «en lugar de» como equivalente natural del valor comparativo de מן, en lugar de una calca más pesada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en toda la cita para coherencia con el tratamiento del Tetragrámaton.
  - Se conserva la doble preposición comparativa («en lugar de... y en lugar de...») para reflejar la repetición enfática del hebreo.
  - «Gobernante» traduce נָגִיד de modo consistente con la autoridad real, sin recurrir a un término eclesial.
  - La nota de la cláusula final preserva la tensión entre celebración amplia y danza específica, evitando borrar la ambigüedad documentada.
