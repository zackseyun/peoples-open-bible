translation:
  language: es
  text: 'Así dice toda la congregación de Yahvé: «¿Qué es esta infidelidad[a] que han cometido contra el Dios de Israel, al apartarse hoy de seguir a Yahvé, al edificar para ustedes un altar, para rebelarse hoy contra Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «traición» o «deslealtad» para «infidelidad». El término hebreo denota una ruptura de lealtad pactual o cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמְרוּ
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - De esta manera ha dicho
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una declaración solemne. «Así ha dicho» conserva el tono de anuncio formal sin forzar un calco del inglés ni perder la fuerza discursiva del hebreo.
- source_word: כֹּל עֲדַת יְהוָה
  english_pob_choice: the whole congregation of Yahweh
  chosen_spanish: toda la congregación de Yahvé
  alternatives_spanish:
  - toda la asamblea de Yahvé
  - toda la comunidad de Yahvé
  lexicon: HALOT
  rationale: ‘עֲדָה’ nombra al cuerpo reunido del pueblo. «Congregación» es natural en español bíblico y conserva el sentido colectivo y cultual del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», en lugar de sustituirlo por un título.'
- source_word: מָה הַמַּעַל הַזֶּה
  english_pob_choice: What is this breach of faith
  chosen_spanish: ¿Qué es esta infidelidad[a]?
  alternatives_spanish:
  - ¿Qué es esta traición?
  - ¿Qué es esta deslealtad?
  lexicon: HALOT
  rationale: ‘מַעַל’ denota deslealtad grave, especialmente en contexto pactual o cultual. «Infidelidad» comunica bien la ruptura de lealtad y permite conservar la tensión teológica sin endurecerlo artificialmente con un calco técnico.
- source_word: מְעַלְתֶּם
  english_pob_choice: you have committed
  chosen_spanish: habéis cometido
  alternatives_spanish:
  - habéis actuado infielmente
  - habéis sido infieles
  lexicon: HALOT
  rationale: En español, el verbo «cometer» funciona naturalmente con el sustantivo precedente y mantiene la estructura acusatoria del hebreo sin añadir explicación interpretativa.
- source_word: בֵּאלֹהֵי יִשְׂרָאֵל
  english_pob_choice: against the God of Israel
  chosen_spanish: contra el Dios de Israel
  alternatives_spanish:
  - respecto del Dios de Israel
  - frente al Dios de Israel
  lexicon: HALOT
  rationale: La construcción con ב y מעל expresa ofensa contra Dios; «contra» transmite mejor la dirección del agravio que «con» o «hacia».
- source_word: לָשׁוּב ... מֵאַחֲרֵי יְהוָה
  english_pob_choice: turning away ... from following Yahweh
  chosen_spanish: al volver hoy de seguir a Yahvé
  alternatives_spanish:
  - al apartaros hoy de seguir a Yahvé
  - al apartaros hoy de Yahvé
  lexicon: HALOT
  rationale: Se conserva el giro semita de ‘volver de detrás de’ con una solución idiomática española. «De seguir a Yahvé» mantiene la idea de lealtad y seguimiento, sin borrar la imagen subyacente.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la opción natural en español moderno y preserva la repetición retórica del hebreo.
- source_word: בִּבְנוֹתְכֶם לָכֶם מִזְבֵּחַ
  english_pob_choice: by building for yourselves an altar
  chosen_spanish: al edificar para vosotros un altar
  alternatives_spanish:
  - al construir para vosotros un altar
  - cuando edificáis para vosotros un altar
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia o medio; «al edificar» comunica con claridad la relación causal/circunstancial en español.
- source_word: לִמְרָדְכֶם
  english_pob_choice: rebelling
  chosen_spanish: rebelándoos
  alternatives_spanish:
  - al rebelaros
  - en vuestra rebelión
  lexicon: HALOT
  rationale: El valor verbal del infinitivo con ל se conserva con una forma española participial que suena natural y mantiene el sentido de acción en curso o acto deliberado.
- source_word: בַּיהוָה
  english_pob_choice: against the LORD
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - frente a Yahvé
  - contra el SEÑOR
  lexicon: HALOT
  rationale: Se preserva la coherencia con la traducción del Nombre divino en todo el pasaje. «Contra» refleja adecuadamente el objeto de la rebelión.
theological_decisions:
- issue: Cómo traducir מַעַל en un contexto de pacto y culto
  english_pob_reading: breach of faith
  chosen_spanish_reading: infidelidad
  alternative_spanish_readings:
  - traición
  - deslealtad
  rationale: El contexto acusa una ruptura pactual y cultual, no solo un error moral genérico. «Infidelidad» conserva la gravedad relacional del término y es suficientemente amplia para el marco del pasaje.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El proyecto exige transliterar el Tetragrámaton en el texto principal. «Yahvé» mantiene el nombre personal del Dios de Israel y evita la sustitución por un título.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión coincide con el sentido principal del texto fuente y con la auditoría inglesa. Se mantuvieron la fórmula solemne inicial, la acusación de infidelidad pactual, la imagen de apartarse de seguir a Yahvé y la repetición retórica de ‘hoy’, sin suavizar la carga acusatoria.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה, según la norma del proyecto.
  - Se prefirió «congregación» por su equilibrio entre fidelidad semántica y naturalidad en español.
  - La nota textual/lexical se ancla en «infidelidad» porque el español requiere explicitar la alternativa semántica que el inglés POB también preservó.
