translation:
  language: es
  text: Y desde el tiempo en que se quite la ofrenda regular[a] y se establezca la abominación que desola[b], habrá 1.290 días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el sacrificio diario». El hebreo תָּמִיד es una abreviatura cultual de la ofrenda continua o regular del templo.
    reason: lexical_alternative
  - marker: b
    text: O, «la abominación de desolación» o «la abominación desoladora».
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מֵ/עֵת
  english_pob_choice: And from the time
  chosen_spanish: Y desde el tiempo
  alternatives_spanish:
  - Y desde el momento
  - Desde el tiempo
  lexicon: HALOT
  rationale: La preposición temporal מִן / מֵ con עֵת introduce el punto de partida del cómputo. En español, «Y desde el tiempo» conserva la conexión con el contexto anterior y la fuerza temporal sin sonar forzado.
- source_word: הוּסַר
  english_pob_choice: is removed
  chosen_spanish: se quite
  alternatives_spanish:
  - es removido
  - es quitado
  - ha sido quitado
  lexicon: HALOT
  rationale: El hophal de סור expresa una remoción pasiva. «Se quite» funciona bien en la cláusula temporal y mantiene una referencia futura/profética en español natural.
- source_word: הַתָּמִיד
  english_pob_choice: the regular offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - la ofrenda regular
  - el sacrificio diario
  - el holocausto diario
  lexicon: HALOT
  rationale: El término תָּמִיד es una abreviatura cultual del rito continuo del templo. «Holocausto regular» conserva ese referente sacrificial y evita la ambigüedad de «ofrenda» en un contexto donde el rito específico está implícito. Se mantiene la nota alternativa porque la tradición bíblica también usa «sacrificio diario».
- source_word: וְ/לָ/תֵת
  english_pob_choice: and ... is set up
  chosen_spanish: y se establezca
  alternatives_spanish:
  - y para poner
  - y para establecer
  - y sea puesto
  lexicon: HALOT
  rationale: La construcción con לָתֵת introduce el establecimiento/colocación de lo que sigue. En español, «se establezca» transmite el valor resultativo e impersonal de la frase mejor que una traducción literal demasiado rígida.
- source_word: שִׁקּוּץ
  english_pob_choice: the abomination
  chosen_spanish: la abominación
  alternatives_spanish:
  - la cosa detestable
  - la repugnancia
  lexicon: HALOT
  rationale: «Abominación» preserva el registro bíblico tradicional y la fuerza semántica de שִׁקּוּץ en un contexto de profanación idolátrica.
- source_word: שֹׁמֵם
  english_pob_choice: that desolates
  chosen_spanish: que desola
  alternatives_spanish:
  - desoladora
  - que causa desolación
  lexicon: HALOT
  rationale: El participio modifica a שִׁקּוּץ y expresa su efecto desolador. «Que desola» es directo, claro y conserva la acción verbal activa del hebreo.
- source_word: יָמִים אֶלֶף מָאתַיִם וְתִשְׁעִים
  english_pob_choice: there will be 1,290 days
  chosen_spanish: habrá 1.290 días
  alternatives_spanish:
  - serán 1.290 días
  - durará 1.290 días
  - 1.290 días
  lexicon: HALOT
  rationale: El hebreo formula la duración de manera concisa. «Habrá 1.290 días» mantiene la sencillez de la cláusula y su valor cuantitativo sin añadir más interpretación de la necesaria.
theological_decisions:
- issue: Referencia cultual de הַתָּמִיד
  english_pob_reading: the regular offering
  chosen_spanish_reading: el holocausto regular
  alternative_spanish_readings:
  - la ofrenda regular
  - el sacrificio diario
  - el holocausto diario
  rationale: La expresión hebrea es cultual y abreviada. En español, «holocausto regular» comunica con más precisión el trasfondo sacrificial del templo. Se conserva la tensión interpretativa mediante alternativas, porque la tradición exegética suele decir «sacrificio diario», pero el hebreo no lo explicita por completo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Naturaleza de שִׁקּוּץ שֹׁמֵם
  english_pob_reading: the abomination that desolates
  chosen_spanish_reading: la abominación que desola
  alternative_spanish_readings:
  - la abominación de desolación
  - la abominación desoladora
  rationale: La construcción participial permite más de una salida idiomática. «Que desola» sigue de cerca la fuerza activa del participio y conserva la resonancia daniélica, mientras que la forma tradicional se mantiene como alternativa por su peso intertextual.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el pasaje fue confirmado por el control cruzado con acuerdo alto; por tanto, este borrador sigue de cerca el texto hebreo y las decisiones auditadas en inglés, sin ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se conserva el tono profético y apocalíptico sin suavizar la fuerza de «abominación» ni del efecto desolador.
  - 'Se mantiene la cifra con punto de miles según convención española: 1.290.'
  - La puntuación y la sintaxis buscan una lectura pública clara, sin depender de una paráfrasis excesiva.
