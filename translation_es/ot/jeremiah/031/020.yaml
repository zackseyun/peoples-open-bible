base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/020.yaml
  text: Is Ephraim a precious son to me[a], a child of delight? For as often as I speak of him, I still surely remember him. Therefore my inward parts are stirred for him; I will surely have compassion on him[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'For whenever I speak of him.' The Hebrew preposition can be read more neutrally ('of/concerning him'), but in context 'against him' fits the contrast with God's continuing remembrance after words of judgment.
    reason: alternative_reading
  - marker: b
    text: Literally 'my inward parts are stirred for him,' a Hebrew idiom for deep compassion; compare 'my heart yearns for him.'
    reason: lexical_alternative
