translation:
  language: es
  text: ojo por ojo[a], diente por diente, mano por mano, pie por pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ojo en lugar de ojo, diente en lugar de diente, mano en lugar de mano, pie en lugar de pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - un ojo
  lexicon: HALOT
  rationale: El término hebreo designa el ojo físico. En español, «ojo» es la forma natural y directa para conservar la fórmula legal breve sin añadir artículo innecesario.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - en vez de
  - para
  lexicon: HALOT
  rationale: En este contexto jurídico, תַּחַת expresa correspondencia o retribución proporcional. «Por» reproduce bien esa relación en español legal y mantiene la concisión del hebreo.
- source_word: שֵׁן
  english_pob_choice: tooth
  chosen_spanish: diente
  alternatives_spanish:
  - un diente
  lexicon: HALOT
  rationale: El sentido es el diente físico. «Diente» conserva el paralelismo nominal y la sobriedad de la fórmula.
- source_word: יָד
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - una mano
  lexicon: HALOT
  rationale: El término se refiere a la mano física. «Mano» es la equivalencia más natural y precisa en español.
- source_word: רֶגֶל
  english_pob_choice: foot
  chosen_spanish: pie
  alternatives_spanish:
  - pierna
  - un pie
  lexicon: HALOT
  rationale: Aunque רֶגֶל puede abarcar la extremidad inferior en algunos contextos, aquí la fórmula fija y el paralelismo con las demás partes del cuerpo favorecen «pie» como equivalente más exacto y tradicionalmente entendido.
theological_decisions:
- issue: Forma de la fórmula legal de retribución proporcional
  english_pob_reading: '''eye for eye ... foot for foot.'''
  chosen_spanish_reading: '''ojo por ojo ... pie por pie.'''
  alternative_spanish_readings:
  - '''ojo en lugar de ojo, diente en lugar de diente, mano en lugar de mano, pie en lugar de pie'''
  - '''la pena debe corresponder al daño'''
  rationale: El hebreo presenta una fórmula compacta de pares sustantivos con תַּחַת. La traducción principal debe preservar esa estructura sin convertirla en una paráfrasis explicativa. La nota alternativa mantiene el valor lexical de תַּחַת como sustitución/correspondencia, pero la línea principal conserva la tersura jurídica del original.
  doctrine_reference: Principio de primacía de la fuente original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; se conserva la fórmula concisa del texto fuente y la decisión inglesa establecida para תַּחַת.
  spanish_consistency_notes:
  - Se mantuvo una traducción literal-idiomática de la fórmula jurídica para reflejar la estructura hebrea.
  - Se evitó introducir términos explicativos como «pena» o «daño» en el texto principal, porque no aparecen en el versículo.
  - Se prefirió «pie» sobre «pierna» siguiendo el criterio auditado del inglés POB para רֶגֶל en esta fórmula fija.
