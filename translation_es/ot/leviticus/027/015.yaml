revisions:
- from: Y si el que lo consagró[a] redime su casa, añadirá una quinta parte del plata[b] de tu valuación sobre ella, y será suya.
  to: Y si el que la consagró[a] redime su casa, añadirá una quinta parte de la plata de tu valuación a ella[b], y será suya.
  rationale: La revisión corrige un error gramatical serio («del plata»), mejora la naturalidad de la expresión aditiva («a ella») y ajusta los pronombres al referente femenino explícito «casa» para mayor fluidez en español. También afina la nota cultural para reflejar mejor la explicación del POB inglés sobre la tasación sacerdotal, sin apartarse del hebreo.
