translation:
  language: es
  text: 'Y aconteció al día siguiente, el segundo día de la luna nueva, que el lugar de David quedó vacío. Entonces Saúl dijo a Jonatán, su hijo: “¿Por qué no ha venido el hijo de Isaí, ni ayer ni hoy, a la comida[a]?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al pan», una forma común de referirse a la comida o al banquete compartido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי / וַיֹּאמֶר
  english_pob_choice: And it happened ... So Saul said
  chosen_spanish: Y aconteció ... Entonces Saúl dijo
  alternatives_spanish:
  - Y sucedió ... Entonces Saúl dijo
  - Y fue que ... Entonces Saúl dijo
  lexicon: WLC; uso narrativo bíblico común
  rationale: Mantiene el giro narrativo hebreo sin sonar artificial en español, y conserva la secuencia de eventos marcada por el waw consecutivo.
- source_word: מִמָּחֳרַת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al otro día
  lexicon: HALOT
  rationale: Expresa de forma natural en español la relación temporal de posterioridad inmediata.
- source_word: הַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: the second day of the new moon
  chosen_spanish: el segundo día de la luna nueva
  alternatives_spanish:
  - el segundo día de la nueva luna
  - el segundo día del novilunio
  lexicon: HALOT
  rationale: En este contexto cultual y de banquete real, חֹדֶשׁ apunta a la observancia de la luna nueva; 'luna nueva' es claro y fiel en español.
- source_word: וַיִּפָּקֵד מְקוֹם דָּוִד
  english_pob_choice: David’s place was empty
  chosen_spanish: el lugar de David quedó vacío
  alternatives_spanish:
  - faltó el lugar de David
  - el puesto de David quedó vacío
  - se echó de menos el lugar de David
  lexicon: HALOT
  rationale: Niphal de פקד comunica ausencia detectada; 'quedó vacío' preserva el sentido de mesa/lugar asignado sin forzar una paráfrasis interpretativa.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  lexicon: HALOT
  rationale: La relación filial es directa y precisa; en español el posesivo basta para identificar a Jonatán como hijo de Saúl.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿A qué se debe?
  lexicon: HALOT
  rationale: Interrogativo causal normal y claro en español, fiel al valor de la partícula.
- source_word: בֶן יִשַׁי
  english_pob_choice: the son of Jesse
  chosen_spanish: el hijo de Isaí
  alternatives_spanish:
  - David
  - el benjamín de Isaí
  lexicon: HALOT
  rationale: Se conserva el patronímico, que en el texto tiene distancia retórica y posiblemente tono despectivo; no se nivela a 'David'.
- source_word: גַּם תְּמוֹל גַּם הַיּוֹם
  english_pob_choice: either yesterday or today
  chosen_spanish: ni ayer ni hoy
  alternatives_spanish:
  - tanto ayer como hoy
  - ayer y hoy
  lexicon: HALOT
  rationale: En una pregunta negativa del español, 'ni ayer ni hoy' reproduce con naturalidad la doble referencia temporal del hebreo y su fuerza acusatoria.
- source_word: אֶל הַלָּחֶם
  english_pob_choice: to the meal
  chosen_spanish: a la comida
  alternatives_spanish:
  - al pan
  - a la mesa
  lexicon: HALOT
  rationale: לֶחֶם se usa metonímicamente para el banquete/comida. 'A la comida' comunica el sentido práctico con fidelidad y buen español. La referencia a 'pan' se evita porque en este contexto sería demasiado literal.
theological_decisions:
- issue: Referencia a Yahvé en un versículo sin el nombre divino explícito
  english_pob_reading: No explicit divine name occurs in the verse
  chosen_spanish_reading: No se introduce ninguna mención a Yahvé en el texto principal
  alternative_spanish_readings:
  - Añadir una nota sobre la observancia de la luna nueva como práctica del pacto
  - Mencionar a Yahvé por implicación ritual
  rationale: El versículo describe una escena narrativa de la corte; no contiene el Tetragrámaton ni una cita directa de discurso divino. Por fidelidad al hebreo, no se inserta lenguaje teológico ajeno al texto.
  doctrine_reference: Transparencia textual / no ampliación inferencial
translation_notes:
  revision_awareness: El inglés POB mantiene 'on the next day' y una nota sobre 'to the bread' como metonimia de la comida. No hubo revisiones aplicadas en el audit trail; la presente versión sigue esa decisión, pero adapta la expresión temporal y la negativa temporal al uso natural del español.
  spanish_consistency_notes:
  - Se usa 'Isaí' de manera uniforme para בֶן יִשַׁי.
  - Se emplea 'luna nueva' en vez de 'mes' por el contexto del relato de la mesa real.
  - Se conserva el tono retórico del patronímico 'el hijo de Isaí' en lugar de suavizarlo a 'David'.
  - La nota al pie se ancla en 'a la comida' para preservar la alternativa literal 'al pan'.
