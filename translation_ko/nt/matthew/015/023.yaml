id: MAT.15.23
reference: Matthew 15:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ οὐκ ἀπεκρίθη αὐτῇ λόγον. καὶ προσελθόντες οἱ μαθηταὶ αὐτοῦ ⸀ἠρώτουν αὐτὸν λέγοντες· Ἀπόλυσον αὐτήν, ὅτι κράζει ὄπισθεν ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/023.yaml
  text: 'But he did not answer her a word[a]. And his disciples came and kept asking him, saying, "Send her away[b], because she is crying out behind us."'
translation:
  language: ko
  text: '그러나 그는 그 여자에게 한마디도 대답하지 않으셨습니다. 그러자 그의 제자들이 다가와서 그에게 청하여 말합니다. 「그 여자를 보내십시오, 우리 뒤에서 외치고 있습니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그 여자의 청을 들어 보내 주십시오」. 제자들의 말은 「청을 들어주고 보내라」인지 단순히 「우리에게서 쫓아내라」인지 본문상 분명하지 않다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「우리를 따라오면서」. 헬라어는 위치(「뒤에」)와 추적(「뒤를 쫓아」)을 모두 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀπεκρίθη αὐτῇ λόγον
  english_pob_choice: did not answer her a word
  chosen_korean: 한마디도 대답하지 않으셨습니다
  lexicon: BDAG
  rationale: 「말 한마디도 ... 않다」는 한국어의 자연스러운 부정 강조 표현.
- source_word: Ἀπόλυσον
  english_pob_choice: Send her away
  chosen_korean: 보내십시오
  alternatives_korean:
  - 돌려보내십시오
  lexicon: BDAG
  rationale: 의미의 모호성(쫓아내라 vs 청을 들어주고 보내라)을 그대로 보존하기 위해 중립적인 「보내십시오」를 택한다.
