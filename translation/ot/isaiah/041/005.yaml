id: ISA.41.5
reference: Isaiah 41:5
source:
  edition: WLC
  text: רָא֤וּ אִיִּים֙ וְ/יִירָ֔אוּ קְצ֥וֹת הָ/אָ֖רֶץ יֶחֱרָ֑דוּ קָרְב֖וּ וַ/יֶּאֱתָיֽוּ/ן׃
translation:
  text: The coastlands have seen and fear[a]; the ends of the earth tremble[b]. They draw near and come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands' or 'the distant shores.'
    reason: lexical_alternative
  - marker: b
    text: 'The final two verbs are closely parallel in Hebrew, emphasizing movement: ''They draw near and come.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the distant shores
  lexicon: HALOT
  rationale: In Isaiah, אִיִּים often refers broadly to maritime lands or distant coastal regions, not strictly literal islands. 'The coastlands' is a standard, contextually natural rendering that preserves the prophetic scope of distant nations.
- source_word: וְיִירָאוּ
  chosen: and are afraid
  alternatives:
  - and fear
  - and are in awe
  lexicon: HALOT
  rationale: From ירא in the simple stem, the sense here is fear in response to YHWH's acts, not reverential worship. 'Are afraid' communicates the emotional reaction more clearly in modern English than the bare 'fear.'
- source_word: קְצוֹת הָאָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the farthest parts of the earth
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for the remotest regions of the world. 'The ends of the earth' is both accurate and idiomatic in English.
- source_word: יֶחֱרָדוּ
  chosen: tremble
  alternatives:
  - quake
  - are terrified
  lexicon: HALOT
  rationale: חרד denotes trembling with fear or agitation. 'Tremble' preserves the physical and emotional force without overinterpreting.
- source_word: קָרְבוּ
  chosen: They draw near
  alternatives:
  - They come near
  - They approach
  lexicon: HALOT
  rationale: The verb marks movement toward a point. 'Draw near' fits the elevated prophetic style and pairs well with the following verb.
- source_word: וַיֶּאֱתָיוּן
  chosen: and come
  alternatives:
  - and arrive
  - and gather together
  lexicon: HALOT
  rationale: From אתה/אתי, a poetic verb meaning 'to come.' The sequence with קָרְבוּ is somewhat repetitive in Hebrew for emphasis; 'and come' preserves that compact parallelism without unnecessary expansion.
- source_word: רָאוּ
  chosen: have seen
  alternatives:
  - saw
  - see
  lexicon: HALOT
  rationale: 'The perfect can be rendered as a completed action with present relevance in English. ''Have seen'' fits the sequence: they have seen, and now they are afraid.'
