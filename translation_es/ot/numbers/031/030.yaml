translation:
  language: es
  text: Y de la mitad de los hijos de Israel tomarás uno de cada cincuenta[a], de los hombres, de los bovinos, de los asnos, de los rebaños[b], de todo tipo de ganado; y los darás a los levitas, que están a cargo del cuidado del tabernáculo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «una porción de cada cincuenta».'
    reason: lexical_alternative
  - marker: b
    text: «Rebaños» traduce un término colectivo que puede incluir ovejas y cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמַּחֲצִת
  english_pob_choice: from the half belonging to
  chosen_spanish: de la mitad de
  alternatives_spanish:
  - de la mitad perteneciente a
  - de la mitad de la porción
  lexicon: HALOT
  rationale: מַחֲצִית expresa 'mitad' o 'media porción'. En español, 'de la mitad de' conserva la relación partitiva sin añadir más determinación de la que exige el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva el giro hebreo tradicional e inteligible en español bíblico. 'Hijos de Israel' refleja con fidelidad la expresión del original y evita reemplazarla por un etnónimo más interpretativo.
- source_word: תִּקַּח
  english_pob_choice: you shall take
  chosen_spanish: tomarás
  alternatives_spanish:
  - has de tomar
  - deberás tomar
  lexicon: HALOT
  rationale: El imperfecto funciona aquí como instrucción. 'Tomarás' mantiene el tono legal-prescriptivo sin necesidad de un auxiliar adicional.
- source_word: אֶחָד אָחֻז מִן הַחֲמִשִּׁים
  english_pob_choice: one portion out of every fifty
  chosen_spanish: uno de cada cincuenta
  alternatives_spanish:
  - una porción de cada cincuenta
  - uno tomado de cada cincuenta
  lexicon: HALOT
  rationale: La expresión denota una proporción de 1:50. 'Uno de cada cincuenta' es la forma natural en español y conserva el sentido distributivo; la idea de 'tomado' queda implícita en el contexto de la orden.
- source_word: מִן הָאָדָם
  english_pob_choice: from the people
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de la gente
  - de los seres humanos
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular colectivo ('del hombre'), en español la lista de categorías queda más natural en plural distributivo. Se mantiene el referente humano sin perder el valor colectivo.
- source_word: מִן הַבָּקָר
  english_pob_choice: from the cattle
  chosen_spanish: de los bovinos
  alternatives_spanish:
  - del ganado vacuno
  - de las reses
  lexicon: HALOT
  rationale: בָּקָר se refiere al ganado vacuno. 'Bovinos' es preciso, moderno y adecuado en una enumeración técnica de ganado.
- source_word: מִן הַחֲמֹרִים
  english_pob_choice: from the donkeys
  chosen_spanish: de los asnos
  alternatives_spanish:
  - de los burros
  - de los pollinos
  lexicon: HALOT
  rationale: Se prefiere 'asnos' por su registro bíblico y su precisión para el animal nombrado en el original.
- source_word: וּמִן הַצֹּאן
  english_pob_choice: and from the flock
  chosen_spanish: de los rebaños
  alternatives_spanish:
  - de las ovejas y las cabras
  - de la majada
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ovinos/caprinos. 'Rebaños' comunica bien el colectivo en español y preserva la amplitud del término; la alternativa más explícita queda como posibilidad léxica.
- source_word: מִכָּל הַבְּהֵמָה
  english_pob_choice: from every kind of livestock
  chosen_spanish: de todo tipo de ganado
  alternatives_spanish:
  - de todo animal doméstico
  - de toda clase de bestias
  lexicon: HALOT
  rationale: בְּהֵמָה aquí funciona como categoría general de animales domésticos/ganado. 'Ganado' mantiene el ámbito económico-zoológico del contexto y evita 'animales', que sería demasiado amplio.
- source_word: וְנָתַתָּה אֹתָם
  english_pob_choice: and you shall give them
  chosen_spanish: y los darás
  alternatives_spanish:
  - y se los darás
  - y los entregarás
  lexicon: HALOT
  rationale: Se conserva la secuencia verbal simple del hebreo. 'Darás' es suficiente en este contexto legal; 'entregarás' sería más explicativo pero no necesario.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: Designación tribal estándar; 'a los levitas' mantiene la relación dativa directa del verbo de dar.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  english_pob_choice: who keep charge
  chosen_spanish: los que guardan la custodia
  alternatives_spanish:
  - los que tienen a su cargo
  - los que cumplen la guardia
  lexicon: HALOT
  rationale: La construcción cognada enfatiza la custodia/guardia de una responsabilidad asignada. 'Guardan la custodia' reproduce el énfasis de vigilancia sin sonar artificial.
- source_word: מִשְׁכַּן יְהוָה
  english_pob_choice: the tabernacle of Yahweh
  chosen_spanish: del tabernáculo de Yahvé
  alternatives_spanish:
  - de la morada de Yahvé
  - del santuario de Yahvé
  lexicon: HALOT
  rationale: מִשְׁכָּן en contexto pentateucal es 'tabernáculo'. Se usa 'Yahvé' para el Tetragrámaton, conforme al criterio del proyecto y al hebreo directo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo contiene el nombre propio del pacto y no un sustituto. 'Yahvé' preserva ese valor nominal en español y evita la sustitución por una convención de máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor colectivo de הָאָדָם en una lista de botín ganado
  english_pob_reading: from the people
  chosen_spanish_reading: de los hombres
  alternative_spanish_readings:
  - de la gente
  - de los seres humanos
  rationale: Aunque el hebreo emplea un singular colectivo, el contexto de inventario de bienes hace natural explicitar el colectivo en plural en español. No se convierte en un término más abstracto para no perder la referencia humana concreta.
  doctrine_reference: HALOT / contexto de lista distributiva
- issue: Función de שֹׁמְרֵי מִשְׁמֶרֶת
  english_pob_reading: who keep charge
  chosen_spanish_reading: los que guardan la custodia
  alternative_spanish_readings:
  - los que tienen a su cargo
  - los guardianes de
  rationale: La expresión combina guardar y responsabilidad oficial. 'Custodia' recoge el matiz de encargo sagrado sin reducirlo a mera vigilancia física.
  doctrine_reference: Núm. 3:7-8; 18:3-5 (custodia levítica)
translation_notes:
  revision_awareness: La redacción inglesa más reciente sustituyó una formulación más literal por otra más idiomática en la cláusula de la proporción, y cambió un singular colectivo por una forma más natural. La versión española sigue esa misma tendencia de claridad sin perder la estructura distributiva del hebreo, pero conserva el nombre divino Yahvé y el carácter técnico de la lista de ganado.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה en todo el texto.
  - Se conserva un registro legal y cultual, sin modernizar en exceso el léxico.
  - Los términos de ganado se distribuyen por categorías naturales en español, respetando la enumeración hebrea.
  - La cláusula final mantiene el vínculo entre los levitas y la custodia del tabernáculo.
