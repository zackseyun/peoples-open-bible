    reason: lexical_alternative
  - marker: b
    text: 'O: «el asunto» o «la cosa»; el hebreo דָּבָר puede referirse tanto a la palabra hablada como al hecho anunciado. También: «no se cumpla».'
    reason: lexical_alternative
  - marker: c
    text: «Con presunción» comunica la idea de atrevimiento arrogante y voluntarioso implícita en זָדוֹן.
    reason: cultural_note
  revision_rationale: 'La revisión conserva el sentido y la estructura del hebreo y del audit trail inglés, pero corrige tres problemas del borrador: sustituye «la cosa» por «la palabra» en un contexto profético más natural en español, arregla la construcción no idiomática «la ha hablado» por «la ha dicho», y limpia la nota corrupta. Además, la nota sobre דָּבָר preserva la amplitud semántica del término hebreo.'
