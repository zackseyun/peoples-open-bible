translation:
  language: es
  text: Porque era necesario que les sobreviniera una privación inevitable[a] a los que tiranizaban[b], pero que solo a estos se les mostrara cómo sus enemigos eran atormentados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carencia inevitable» para «privación inevitable».
    reason: lexical_alternative
  - marker: b
    text: O «los tiranos»; el griego usa una forma verbal que subraya su acción opresiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδει
  english_pob_choice: it was necessary
  chosen_spanish: era necesario
  alternatives_spanish:
  - tenía que ser
  - era menester
  lexicon: LSJ
  rationale: ἔδει expresa necesidad impersonal; «era necesario» conserva esa fuerza sin cargar el verso con una interpretación moral distinta.
- source_word: ἀπαραίτητον
  english_pob_choice: unavoidable
  chosen_spanish: inevitable
  alternatives_spanish:
  - ineludible
  - inescapable
  lexicon: LSJ
  rationale: El adjetivo modifica ἔνδειαν y señala una falta que no podía evitarse. «Inevitable» es natural en español y mantiene la idea de inescapabilidad.
- source_word: ἔνδειαν
  english_pob_choice: want
  chosen_spanish: necesidad
  alternatives_spanish:
  - falta
  - privación
  lexicon: LSJ
  rationale: En este contexto de juicio y castigo, el término apunta a una carencia severa. «Necesidad» comunica bien la falta apremiante en español, aunque también permite oír el matiz de privación.
- source_word: ἐπελθεῖν
  english_pob_choice: should come upon
  chosen_spanish: sobreviniera
  alternatives_spanish:
  - viniera sobre
  - cayera sobre
  lexicon: LSJ
  rationale: El infinitivo con ἔδει expresa lo que debía acontecer. «Sobreviniera» conserva el sentido de un mal que alcanza a alguien.
- source_word: τυραννοῦσιν
  english_pob_choice: those who tyrannized
  chosen_spanish: los que tiranizaban
  alternatives_spanish:
  - los tiranos
  - los opresores
  - los que actuaban como tiranos
  lexicon: LSJ
  rationale: La forma verbal del griego tiene fuerza de acción; por eso «los que tiranizaban» preserva mejor el carácter dinámico que un simple sustantivo.
- source_word: τούτοις δὲ μόνον
  english_pob_choice: but to these only
  chosen_spanish: pero a estos solo
  alternatives_spanish:
  - pero solo a estos
  - pero para estos únicamente
  lexicon: LSJ
  rationale: La construcción marca contraste y restricción. «A estos solo» mantiene la dative-construction implícita y el valor de μόνον.
- source_word: δειχθῆναι
  english_pob_choice: that it should be shown
  chosen_spanish: que se les mostrara
  alternatives_spanish:
  - que fuera mostrado
  - que vieran
  lexicon: LSJ
  rationale: El pasivo subraya una demostración hecha a ellos. «Que se les mostrara» conserva la pasiva y la intención didáctica.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - en qué forma
  lexicon: LSJ
  rationale: Introduce el contenido de lo mostrado. «Cómo» es la equivalencia más directa y natural.
- source_word: ἐβασανίζοντο
  english_pob_choice: were being tormented
  chosen_spanish: eran atormentados
  alternatives_spanish:
  - eran torturados
  - sufrían tormento
  lexicon: LSJ
  rationale: βασανίζω puede expresar tormento intenso; «eran atormentados» conserva la intensidad sin forzar una imagen moderna demasiado estrecha de tortura judicial.
theological_decisions:
- issue: Contraste en el juicio divino entre opresores y pueblo de Dios
  english_pob_reading: The verse states that severe deprivation necessarily came upon the tyrannizing enemies, whereas God's people were only shown the punishment of their enemies.
  chosen_spanish_reading: El versículo presenta que una necesidad inevitable vino sobre los que tiranizaban, mientras que a los otros solo se les mostró el tormento de sus enemigos.
  alternative_spanish_readings:
  - '...mientras que a estos solo se les hizo ver cómo eran atormentados sus enemigos.'
  - '...mientras que a estos únicamente se les mostró de qué manera eran castigados sus enemigos.'
  rationale: 'El griego contrapone ἐκείνοις y τούτοις δὲ μόνον, con pasivo en la segunda mitad. La redacción española conserva esa asimetría: unos sufren directamente, los otros reciben la demostración del castigo. No se suaviza ni se amplifica la tensión teológica.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
- issue: Valor de ἔνδεια en contexto de juicio
  english_pob_reading: Or 'inescapable deprivation' for 'unavoidable want.'
  chosen_spanish_reading: «Necesidad inevitable» mantiene la idea de falta apremiante sin reducirla a un solo ámbito material.
  alternative_spanish_readings:
  - «privación inevitable»
  - «carencia inevitable»
  rationale: La elección deja abierta la amplitud semántica del término griego, que puede abarcar privación, falta o necesidad severa.
  doctrine_reference: Mantener la amplitud lexical del original
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el audit trail inglés POB, que prefiere una estructura impersonal y una traducción verbal para τυραννοῦσιν. La versión española conserva la oposición entre el castigo directo de unos y la simple demostración dada a otros, sin armonizarla ni interpretarla más allá del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva «atormentados» para βασανίζω, en línea con el registro fuerte del POB inglés.
  - La sintaxis española busca reflejar la pasiva de δειχθῆναι sin sonar forzada.
