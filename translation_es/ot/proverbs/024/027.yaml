translation:
  language: es
  text: Prepara tu trabajo fuera[a]; tenlo listo para ti en el campo; después, edifica tu casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Establece tu trabajo fuera; déjalo listo para ti en el campo; después, edifica tu casa».
    reason: lexical_alternative
  - marker: b
    text: «Casa» puede abarcar en la sabiduría bíblica un sentido más amplio de hogar o casa/linaje, pero el contraste inmediato con «fuera» y «campo» favorece aquí el sentido concreto de vivienda.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכֵן
  english_pob_choice: Prepare
  chosen_spanish: Prepara
  alternatives_spanish:
  - Establece
  - Pon en orden
  - Dispón
  lexicon: HALOT
  rationale: El imperativo de כון aquí pide poner algo en condición adecuada o lista. «Prepara» es natural en español y conserva el sentido de alistar antes de emprender la siguiente acción.
- source_word: בַּחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en lo exterior
  - al aire libre
  lexicon: HALOT
  rationale: El término señala el espacio exterior, en contraste con «casa» al final del verso. «Afuera» preserva bien ese contraste espacial en español moderno.
- source_word: מְלַאכְתֶּךָ
  english_pob_choice: your work
  chosen_spanish: tu trabajo
  alternatives_spanish:
  - tu obra
  - tu labor
  - tu tarea
  lexicon: HALOT
  rationale: מְלָאכָה abarca trabajo, labor u oficio. «Trabajo» es la opción más clara y amplia en español, sin restringir indebidamente la idea a una sola tarea.
- source_word: וְעַתְּדָהּ
  english_pob_choice: make it ready
  chosen_spanish: dispónlo
  alternatives_spanish:
  - prepáralo
  - ponlo listo
  - arréglalo
  lexicon: HALOT
  rationale: עתד expresa dejar algo listo o preparado. «Dispónlo» conserva una formalidad acorde con el tono sapiencial y puede referirse al trabajo como algo que debe ordenarse o prepararse para su uso.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo de labor
  - en el terreno
  - en la parcela
  lexicon: HALOT
  rationale: «Campo» comunica de manera natural el ámbito agrícola concreto del término y mantiene la contraposición con «afuera» y «casa».
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para tu propio bien
  - para ti mismo
  lexicon: HALOT
  rationale: El pronombre marca beneficio o interés personal. «Para ti» suena natural en español y conserva esa orientación sin sobrecargar el verso.
- source_word: אַחַר
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - más tarde
  - entonces
  lexicon: HALOT
  rationale: 'La partícula marca secuencia temporal: primero alistar el trabajo, luego construir la casa. «Después» reproduce esa progresión de forma directa.'
- source_word: וּבָנִיתָ בֵיתֶךָ
  english_pob_choice: build your house
  chosen_spanish: edifica tu casa
  alternatives_spanish:
  - construye tu casa
  - levanta tu casa
  - edifica tu hogar
  lexicon: HALOT
  rationale: «Casa» mantiene la imagen concreta del hebreo y el contraste inmediato con «afuera» y «campo». Se prefiere «edifica» por su registro algo más solemne y sapiencial, acorde con el tono del proverbio.
theological_decisions:
- issue: Valor concreto de «casa» frente a un sentido ampliado de hogar/familia
  english_pob_reading: '''House'' may carry a broader sense of home or household in wisdom literature, but the immediate contrast with ''outside'' and ''field'' supports the concrete sense here.'
  chosen_spanish_reading: «Casa» se mantiene en sentido concreto de vivienda, con posible aplicación más amplia no expresada directamente en la traducción.
  alternative_spanish_readings:
  - hogar
  - familia
  - casa/hogar
  rationale: El contraste con «afuera» y «campo» apunta al sentido literal de vivienda. No se introduce «hogar» porque ampliaría la imagen más allá de lo que el verso inmediato exige.
  doctrine_reference: Sabiduría proverbial; semántica contextual de בית
- issue: Orden de prioridades implícito en el proverbio
  english_pob_reading: first prepare productive work, then build the house.
  chosen_spanish_reading: primero el trabajo, luego la casa, respetando la secuencia temporal del verso.
  alternative_spanish_readings:
  - prioriza primero la casa
  - edifica la casa antes
  rationale: El texto presenta una secuencia práctica de preparación antes de construcción. La traducción debe conservar ese orden sin suavizarlo ni invertirlo.
  doctrine_reference: Lectura sapiencial de prioridades y prudencia
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el audit trail inglés: mantiene el imperativo inicial de preparación, conserva el contraste espacial entre afuera/campo/casa y refleja la secuencia temporal del proverbio con un registro español moderno y digno.'
  spanish_consistency_notes:
  - Se usa «afuera» para mantener un contraste claro con «casa», no como adverbio meramente estilístico.
  - Se prefiere «trabajo» como equivalente amplio de מְלָאכָה, evitando restringirlo a una sola tarea.
  - «Edifica» eleva ligeramente el registro sin alterar el sentido básico de בנה.
  - Las notas al pie preservan la alternativa léxica documentada para el primer miembro y la posible extensión semántica de «casa» sin imponerla en el texto principal.
