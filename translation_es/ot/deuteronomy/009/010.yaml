- from: Yahvé me dio las dos tablas de piedra[a], escritas con el dedo de Dios[b], y sobre ellas estaban todas las palabras que Yahvé había hablado con ustedes en el monte, de en medio del fuego, el día de la asamblea.
  to: Yahvé me dio las dos tablas de piedra, escritas con el dedo de Dios[a], y sobre ellas estaban todas las palabras que Yahvé les había hablado a ustedes[b] en el monte, de en medio del fuego, el día de la asamblea.
  rationale: Se corrige la cláusula verbal para alinearla con la revisión inglesa auditada ('to you') y con un español más natural en contexto, mientras se conserva en nota la alternativa más literal del hebreo 'con ustedes'. Se elimina la nota redundante sobre 'las dos tablas de piedra' y se mantiene la alternativa instrumental de 'por el dedo de Dios'.
