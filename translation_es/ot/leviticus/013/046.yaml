translation:
  language: es
  text: Todos los días que la enfermedad esté en él[a], será impuro. Él es impuro. Vivirá solo[b]; su morada estará fuera del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la aflicción» o «la plaga» para «la enfermedad». El término hebreo es amplio y aquí se refiere a la condición diagnosticada descrita en este capítulo.
    reason: lexical_alternative
  - marker: b
    text: «Impuro» aquí se refiere al estado de impureza levítica en el contexto de la ley, no necesariamente a culpa moral.
    reason: cultural_note
lexical_decisions:
- source_word: הַנֶּגַע
  english_pob_choice: the disease
  chosen_spanish: la afección
  alternatives_spanish:
  - la enfermedad
  - la llaga
  - la plaga
  lexicon: HALOT
  rationale: נֶגַע es un término amplio para una marca, golpe, aflicción o condición dañada. En Levítico 13 se trata de una condición diagnosticada con consecuencias rituales; en español, «afección» conserva esa amplitud mejor que «enfermedad», que puede sonar demasiado clínica, o «plaga», que puede sugerir otra cosa.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en su cuerpo
  lexicon: HALOT
  rationale: El hebreo permite la idea de «en/sobre él». «En él» sigue bien la relación espacial del texto y funciona con naturalidad en español, sin añadir precisión anatómica que el hebreo no exige.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - estará impuro
  lexicon: HALOT
  rationale: Para טמא en contexto levítico, «impuro» expresa el estado legal de impureza ritual. «Será» conserva el valor normativo/prospectivo de la forma verbal hebrea y evita introducir explicaciones que el texto no dice explícitamente.
- source_word: טָמֵא הוּא
  english_pob_choice: He is unclean
  chosen_spanish: Impuro es él
  alternatives_spanish:
  - Él es impuro
  - Está impuro
  lexicon: HALOT
  rationale: La cláusula hebrea es enfática y separada; «Impuro es él» conserva ese énfasis y mantiene el orden marcado del original. «Está impuro» sería más idiomático, pero suaviza la forma enfática del hebreo.
- source_word: בָּדָד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - en soledad
  - aislado
  lexicon: HALOT
  rationale: בָּדָד significa estar separado o solo. «Solo» es breve, claro y fiel; «aislado» puede sonar más interpretativo o psicológico.
- source_word: יֵשֵׁב
  english_pob_choice: shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - habitará
  - permanecerá
  lexicon: HALOT
  rationale: En este marco legal, ישב expresa residencia o permanencia. «Vivirá» comunica con naturalidad la idea de morar de manera continua, mejor que una traducción demasiado literal como «se sentará».
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del encampamento
  lexicon: HALOT
  rationale: La expresión señala exclusión del espacio comunitario del campamento. «Fuera del campamento» es la formulación más clara y estable en español bíblico moderno.
- source_word: מוֹשָׁבוֹ
  english_pob_choice: his dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su lugar de morada
  - su residencia
  lexicon: HALOT
  rationale: מוֹשָׁב designa lugar de residencia o asentamiento. «Morada» es sobria, bíblica en buen español y mantiene el sentido concreto de lugar donde habita, sin sobreexplicar.
theological_decisions:
- issue: Estado de impureza levítica
  english_pob_reading: Render טמא as 'unclean' without adding 'ceremonially' or 'morally' in the main text.
  chosen_spanish_reading: Traducir טמא como «impuro» sin añadir «ritualmente» o «moralmente» en el texto principal.
  alternative_spanish_readings:
  - ritualmente impuro
  - ceremonialmente impuro
  rationale: El pasaje trata del estado levítico de impureza, no de culpa moral. «Impuro» preserva la categoría bíblica sin restringirla interpretativamente. Si se añadiera «ritualmente», se aclararía el contexto, pero el hebreo no lo explicita y conviene mantener la tensión documental.
  doctrine_reference: Conservar la categoría de impureza levítica sin convertirla en juicio moral; mantener la distinción entre estado legal y culpa ética.
translation_notes:
  revision_awareness: El texto español sigue el sentido y la estructura del hebreo consonante/masorético, en armonía con la decisión inglesa de mantener el término amplio para נגע y de conservar טמא como categoría de impureza sin ampliación doctrinal. No se registran revisiones textuales relevantes en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «impuro» de manera consistente para טמא, evitando alternar con «inmundo» o con glosas interpretativas.
  - «Campamento» se conserva como término técnico del contexto del desierto y la organización comunitaria.
  - La cláusula enfática «Impuro es él» reproduce la repetición del hebreo sin convertirla en una paráfrasis explicativa.
