revisions:
- from: Y aconteció que, a la medianoche, Yahvé hirió[a] a todo primogénito en la tierra de Egipto, desde el primogénito de Faraón, que se sentaba sobre su trono, hasta el primogénito del cautivo, que estaba en la casa del pozo[b], y a todo primogénito del ganado.
  to: Y a la medianoche, Yahvé derribó[a] a todo primogénito en la tierra de Egipto, desde el primogénito de Faraón, que estaba sentado en su trono, hasta el primogénito del cautivo, que estaba en el foso de la prisión[b], y a todo primogénito del ganado.
  rationale: La revisión fortalece la fidelidad al hebreo y a la auditoría inglesa sin exceder el sentido fuente. 'Derribó' refleja mejor el valor letal de הִכָּה en contexto, mientras que 'foso de la prisión' conserva la imaginería concreta de בור con español claro. También se suaviza el arranque narrativo y se mejora la fluidez de la relativa sobre Faraón.
  reviewer_model: gpt-5.4
