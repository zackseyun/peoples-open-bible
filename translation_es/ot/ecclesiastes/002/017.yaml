  text: וְ/שָׂנֵ֨אתִי֙ אֶת הַ֣/חַיִּ֔ים כִּ֣י רַ֤ע עָלַ/י֙ הַֽ/מַּעֲשֶׂ֔ה שֶׁ/נַּעֲשָׂ֖ה תַּ֣חַת הַ/שָּׁ֑מֶשׁ כִּֽי הַ/כֹּ֥ל הֶ֖בֶל וּ/רְע֥וּת רֽוּחַ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/002/017.yaml
  text: So I hated life[a], because the work that is done under the sun was grievous to me[b]; for all is vapor and a striving after wind.
  footnotes:
