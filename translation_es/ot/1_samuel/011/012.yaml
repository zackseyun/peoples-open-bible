base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/011/012.yaml
  text: Then the people said to Samuel[a], “Who is it that said, ‘Shall Saul reign over us?’ Hand over the men, and we will put them to death.”
  footnotes:
  - marker: a
    text: 'Or, “Will Saul reign over us?” The Hebrew imperfect can be rendered either as a future-like question or, less likely here, as a statement: “Saul shall reign over us.”'
