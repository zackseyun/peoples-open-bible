  text: בֵּ֠/אדַיִן מַלְכָּ֤/א נְבֽוּכַדְנֶצַּר֙ נְפַ֣ל עַל אַנְפּ֔וֹ/הִי וּ/לְ/דָנִיֵּ֖אל סְגִ֑ד וּ/מִנְחָה֙ וְ/נִ֣יחֹחִ֔ין אֲמַ֖ר לְ/נַסָּ֥כָה לֵֽ/הּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/046.yaml
  text: Then King Nebuchadnezzar fell on his face and paid homage to Daniel[c][b][a], and he commanded that an offering and incense be offered to him.
  footnotes:
  - marker: a
    text: Or 'worshiped Daniel' or 'bowed down before Daniel.' The Aramaic verb can denote prostration or reverential homage; here 'paid homage' avoids overstating the act as divine worship while preserving the king's extreme reverence.
    reason: alternative_reading
  - marker: b
    text: The verb behind 'be presented' more specifically suggests pouring out a libation for him.
    reason: lexical_alternative
  - marker: c
    text: Or 'pleasing aromas'/'sweet odors.'
    reason: lexical_alternative
