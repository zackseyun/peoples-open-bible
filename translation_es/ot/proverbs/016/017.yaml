translation:
  language: es
  text: La calzada de los rectos se aparta del mal[a]; el que guarda su vida[b] preserva su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «La calzada de los rectos es apartarse del mal». El hebreo admite una expresión más nominal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su alma»; aquí נֶפֶשׁ probablemente significa «su vida» o «a sí mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְסִלַּת
  english_pob_choice: highway
  chosen_spanish: calzada
  alternatives_spanish:
  - camino
  - ruta
  - carretera
  lexicon: HALOT
  rationale: מְסִלָּה sugiere una vía construida o elevada, más marcada que un simple sendero. «Calzada» comunica bien esa imagen en español sin sonar demasiado técnica o moderna. «Camino» sería más general; «carretera» es demasiado contemporánea.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los rectos de corazón
  - los íntegros
  lexicon: HALOT
  rationale: El término describe personas moralmente rectas. «Los rectos» mantiene la imagen ética y sigue de cerca el paralelo sapiencial. «Los justos» podría acercarlo demasiado a un vocabulario jurídico-teológico más amplio que el hebreo aquí no exige.
- source_word: סוּר מֵרָע
  english_pob_choice: turns away from evil
  chosen_spanish: se aparta del mal
  alternatives_spanish:
  - se desvía del mal
  - se aleja del mal
  - apartarse del mal
  lexicon: HALOT
  rationale: El infinitivo funciona de modo predicativo/aposicional y describe en qué consiste la senda de los rectos. «Se aparta del mal» conserva el movimiento verbal y resulta natural en español. El valor moral de רָע se expresa mejor con «mal» que con «daño» en este contexto.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - lo malo
  lexicon: HALOT
  rationale: En Proverbios, רָע suele tener fuerza moral. «Mal» es la forma más natural y amplia en español para ese contraste ético.
- source_word: שֹׁמֵר נַפְשׁוֹ
  english_pob_choice: he who guards his life
  chosen_spanish: el que guarda su vida
  alternatives_spanish:
  - el que guarda su alma
  - el que preserva su ser
  - el que cuida su vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida o al yo de la persona, no necesariamente a «alma» en sentido técnico. «Vida» evita importar una dicotomía cuerpo-alma ajena al proverbio y refleja bien el sentido práctico del texto.
- source_word: נֹצֵר דַּרְכּוֹ
  english_pob_choice: preserves his way
  chosen_spanish: preserva su camino
  alternatives_spanish:
  - guarda su camino
  - vigila su camino
  - conserva su camino
  lexicon: HALOT
  rationale: נֹצֵר implica custodiar con atención. «Preserva su camino» sigue de cerca la revisión inglesa y mantiene el paralelismo con «guarda su vida», evitando repetir exactamente el mismo verbo. «Camino» conserva la metáfora sapiencial de conducta.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en contexto sapiencial
  english_pob_reading: life/self rather than 'soul' as a technical anthropological term
  chosen_spanish_reading: vida/uno mismo, no «alma» en sentido técnico
  alternative_spanish_readings:
  - alma
  - ser
  - yo
  rationale: El proverbio trata de conducta prudente y preservación concreta. Traducir por «vida» evita proyectar una antropología posterior que el hebreo no necesita aquí, sin perder la referencia a la persona entera.
  doctrine_reference: Principio de primacía del texto original; no introducir categorías doctrinales no requeridas por el hebreo.
- issue: Relación entre la senda de los rectos y el apartarse del mal
  english_pob_reading: The highway of the upright turns away from evil
  chosen_spanish_reading: La calzada de los rectos se aparta del mal
  alternative_spanish_readings:
  - La calzada de los rectos es apartarse del mal
  - La calzada de los rectos se desvía del mal
  rationale: El hebreo permite una construcción nominal/predicativa que puede sonar en español como descripción de la propia senda. «Se aparta» conserva ese valor verbal y no fuerza una formulación abstracta que diluya la imagen.
  doctrine_reference: 'Sabiduría hebrea: mantener la metáfora y la fuerza proverbial sin sobreinterpretar la sintaxis.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al reflejar la cláusula nominal con una forma más natural en español («se aparta del mal») y al distinguir el segundo miembro con «preserva su camino», evitando repetir exactamente el verbo del primer cola.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto exija el nombre divino; no aplica en este versículo.
  - «Camino» se mantiene como metáfora sapiencial coherente con el resto de Proverbios.
  - «Vida» para נֶפֶשׁ se usa de manera consistente con el criterio POB de evitar un «alma» técnico cuando el contexto es práctico/sapiencial.
  - Se prefiere una sintaxis breve y proverbial, apta para lectura pública.
