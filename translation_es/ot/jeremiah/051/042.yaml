review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: el mar metafórico sube contra Babilonia y ella queda cubierta por sus olas. Mantiene adecuadamente la metáfora de הַיָּם y la personificación femenina implícita en נִכְסָתָה. Sin embargo, «ha subido contra Babilonia» suena poco idiomático en español para un mar que arremete; «ha subido sobre Babilonia» refleja mejor el movimiento de irrupción/embate sin perder la imagen. Además, la nota b introduce una alternativa poco precisa («de la muchedumbre») que no corresponde bien a la construcción española.'
  spanish_quality_summary: El texto es claro y comprensible, pero «ha subido contra Babilonia» resulta algo calcado y menos natural en español bíblico actual que «ha subido sobre Babilonia» o «ha venido contra Babilonia». También «cubierta de la multitud de sus olas» es aceptable, aunque «por la multitud de sus olas» fluye más naturalmente con el pasivo/resultativo. Las notas son legibles, pero la nota b puede mejorarse para reflejar mejor la alternativa léxica («con el tumulto de sus olas» / «con el estruendo de sus olas»).
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Babilonia», «mar» y «olas» están bien. No hay nombres divinos ni términos teológicos sensibles aquí. La preservación de la metáfora concuerda con el razonamiento documentado en el rastro inglés.
  issues:
  - severity: medium
    issue: «ha subido contra Babilonia» suena poco idiomático en español
    rationale: Aunque formalmente posible, con «el mar» como sujeto la combinación «subir contra» se percibe rígida y calcada. El hebreo עלה על en contexto de invasión admite una solución más natural en español como «ha subido sobre Babilonia», que conserva la imaginería de avance y cobertura.
  - severity: low
    issue: La preposición en «está cubierta de la multitud de sus olas» puede mejorarse
    rationale: «Cubierta de» no es incorrecto, pero «cubierta por la multitud de sus olas» expresa con más claridad el agente/medio de cobertura y suena más natural en español contemporáneo.
  - severity: low
    issue: La nota b ofrece una alternativa española mal formulada
    rationale: «O “de la muchedumbre”» no funciona bien como alternativa contextual dentro de la frase. La ambigüedad de הֲמוֹן se representa mejor con una alternativa como «con el tumulto de sus olas».
  revised_spanish_text: El mar[a] ha subido sobre Babilonia; ella está cubierta por la multitud[b] de sus olas.
  revised_footnotes:
  - marker: a
    text: La imagen de «el mar» es metafórica para la fuerza abrumadora que avanza contra Babilonia; se conserva la metáfora en vez de reemplazarla por una interpretación.
    reason: cultural_note
  - marker: b
    text: O «con el tumulto de sus olas». El sustantivo hebreo puede expresar tanto multitud abundante como tumulto; aquí se opta por «multitud» para conservar la imagen de masa abrumadora.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para un español más natural y fiel a la imagen profética: «ha subido sobre Babilonia» encaja mejor con el mar que irrumpe y cubre, y «cubierta por la multitud de sus olas» mejora la sintaxis. También se corrige la nota léxica para que la alternativa sea una frase española viable y refleje con más precisión la ambigüedad de הֲמוֹן.'
