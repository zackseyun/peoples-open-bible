translation:
  language: es
  text: Soy intachable; no me conozco[a]; desprecio mi vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no conozco mi alma/mi ser", conservando el sentido más amplio del hebreo nephesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּם
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - sin culpa
  - íntegro
  - inocente
  lexicon: HALOT
  rationale: תָּם en Job expresa integridad/completitud moral en la autodescripción de Job. 'Intachable' comunica bien esa idea en español sin afirmar perfección sin defecto en sentido absoluto; mantiene el valor evaluativo del hebreo y su uso contextual en Job.
- source_word: אָ֭נִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: grammatical pronoun
  rationale: El pronombre explícito refuerza el contraste y la fuerza enfática del hebreo; en español puede mantenerse de forma natural con 'yo', aunque la elipsis también sería posible.
- source_word: לֹא אֵדַ֥ע
  english_pob_choice: I do not know
  chosen_spanish: no me conozco
  alternatives_spanish:
  - no sé quién soy
  - no reconozco mi ser
  - no conozco mi alma/yo
  lexicon: HALOT
  rationale: El hebreo con נַפְשִׁי sugiere una relación de extrañamiento/reflexión sobre sí mismo más que simple información. En español, 'no me conozco' preserva la ambigüedad y la fuerza existencial sin sonar torpe, y evita cerrar demasiado el sentido a una sola paráfrasis.
- source_word: נַפְשִׁי
  english_pob_choice: myself
  chosen_spanish: me
  alternatives_spanish:
  - mi alma
  - mi yo
  - mi vida
  lexicon: HALOT
  rationale: נֶפֶשׁ abarca alma, ser, vida, yo mismo. Como el español 'me conozco' ya lleva la referencia reflexiva, no hace falta forzar un sustantivo; la decisión preserva el sentido amplio de נַפְשִׁי sin sobretraducir.
- source_word: אֶמְאַ֥ס
  english_pob_choice: I despise
  chosen_spanish: desprecio
  alternatives_spanish:
  - rechazo
  - aborrezco
  - me repugna
  lexicon: HALOT
  rationale: מָאַס expresa rechazo/desprecio. 'Desprecio' reproduce la fuerza afectiva directa del verbo y funciona con 'mi vida' de manera natural en español.
- source_word: חַיָּֽי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi existencia
  - mis días
  - mi vivir
  lexicon: HALOT
  rationale: חַיִּים con sufijo posesivo se refiere a la vida/existencia de Job. 'Mi vida' es claro, idiomático y conserva el referente concreto del hebreo.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin traducir mecánicamente. Se mantuvo la tensión de nephesh como término amplio, pero en español se optó por una construcción reflexiva natural ('no me conozco') para evitar una frase rígida o ambigua en exceso; la nota conserva la alternativa lexical del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general solo cuando el texto lo requiera; aquí no aparece.
  - '''Intachable'' se eligió para תָּם por ser más natural que ''blameless'' calcado y porque conserva la evaluación moral sin exagerarla.'
  - La primera persona se conservó explícita para reflejar la acumulación enfática del hebreo.
  - No se introdujo vocabulario doctrinal ajeno al verso.
