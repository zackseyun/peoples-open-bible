translation:
  language: es
  text: 'Entonces el Rabsaqué se puso de pie y clamó a gran voz en judeano[a], y dijo: «Oigan las palabras del gran rey, el rey de Asiria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en hebreo». El término hebreo designa con más precisión la lengua de Judá/Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - estuvo de pie
  - se paró
  lexicon: HALOT
  rationale: El verbo narrativo expresa que asumió la posición de pie. En español, «se puso de pie» comunica bien la acción simple y conserva el movimiento del relato sin exagerarlo.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el Rabshakeh
  - el copero mayor
  lexicon: HALOT
  rationale: Se preserva el título/nombre-forma asirio como transliteración tradicional en español, sin reducirlo a una función genérica que perdería la designación histórica del texto.
- source_word: וַיִּקְרָא
  english_pob_choice: called out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - proclamó
  lexicon: HALOT
  rationale: El contexto de voz elevada y anuncio público favorece «clamó», que conserva la fuerza audible del verbo sin sonar demasiado coloquial.
- source_word: בְקוֹל גָּדֹול
  english_pob_choice: with a loud voice
  chosen_spanish: a gran voz
  alternatives_spanish:
  - con voz fuerte
  - en voz alta
  lexicon: HALOT
  rationale: La expresión hebrea es literal y solemne; «a gran voz» es una equivalencia natural en español bíblico que mantiene el matiz de proclamación pública.
- source_word: יְהוּדִית
  english_pob_choice: in Judean
  chosen_spanish: en judío
  alternatives_spanish:
  - en judeano
  - en hebreo
  - en la lengua de Judá
  lexicon: HALOT
  rationale: Se conserva la referencia etnolingüística específica de la forma hebrea. «En judío» es breve y refleja el término del original; «en hebreo» sería más tradicional, pero menos preciso según el análisis del POB en inglés.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oíd
  lexicon: HALOT
  rationale: El imperativo plural en español actual suena más natural y directo como convocatoria pública con «Oigan»; mantiene el llamado enfático sin arcaísmo excesivo.
- source_word: דִּבְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras dichas
  - el mensaje
  lexicon: HALOT
  rationale: «Palabras» reproduce de manera directa el sustantivo plural y evita convertirlo en un resumen interpretativo como «mensaje».
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  english_pob_choice: the great king
  chosen_spanish: el gran rey
  alternatives_spanish:
  - el rey grande
  - el poderoso rey
  lexicon: HALOT
  rationale: Se traduce el título real asirio de modo directo y transparente. En español, «gran rey» conserva la fórmula titulary y el énfasis de prestigio del original.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  - el monarca de Asiria
  lexicon: HALOT
  rationale: La construcción posesiva se rinde naturalmente como «el rey de Asiria», manteniendo la apposición enfática del hebreo con el título anterior.
theological_decisions:
- issue: Término lingüístico יְהוּדִית
  english_pob_reading: 'in Judean; footnote: Or ''in Hebrew.'' The Hebrew term more specifically denotes the language of Judah/Jerusalem.'
  chosen_spanish_reading: en judío[a]
  alternative_spanish_readings:
  - en hebreo
  - en la lengua de Judá/Jerusalén
  rationale: 'Se preserva la tensión documental: el término designa propiamente la lengua de Judá/Jerusalén, aunque la tradición receptora suele decir «hebreo». La nota aclara esa alternativa sin borrar la precisión del original.'
  doctrine_reference: Ninguno; decisión filológica/lexical.
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «loudly» a «with a loud voice» para reflejar mejor la expresión hebrea. La redacción española sigue ese ajuste con «a gran voz», que conserva tanto la literalidad como la naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto solo cuando aparezca el tetragrámaton; aquí no aparece.
  - «Rabsaqué» se usa como transliteración estable del título/nombre-forma asirio.
  - La puntuación reproduce el discurso directo con comillas angulares, acorde con el estilo bíblico en español.
