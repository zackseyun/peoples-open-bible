lexical_decisions:
- source_word: אֱלִיפֶלֶט
  english_pob_choice: Eliphelet
  chosen_spanish: Elifelet
  alternatives_spanish:
  - Eliphelet
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio hebreo; en español, 'Elifelet' conserva mejor la forma sonora y la adaptación ortográfica habitual que 'Eliphelet'.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una lista genealógica, בֶּן indica filiación inmediata; 'hijo de' es la equivalencia más directa y natural en español.
- source_word: אֲחַסְבַּי
  english_pob_choice: Ahasbai
  chosen_spanish: Ahasbai
  lexicon: transliteración de nombre propio
  rationale: Nombre propio conservado por transliteración directa.
- source_word: הַמַּעֲכָתִי
  english_pob_choice: the Maacathite
  chosen_spanish: el maacatita
  alternatives_spanish:
  - el maacateo
  - de Maacá
  lexicon: HALOT
  rationale: El gentilicio hebreo se vierte como un adjetivo étnico/geográfico en español; 'maacatita' mantiene el valor identificador del original sin convertirlo en paráfrasis.
- source_word: אֱלִיעָם
  english_pob_choice: Eliam
  chosen_spanish: Eliam
  lexicon: transliteración de nombre propio
  rationale: Nombre propio conservado por transliteración directa.
- source_word: אֲחִיתֹפֶל
  english_pob_choice: Ahithophel
  chosen_spanish: Ahitofel
  alternatives_spanish:
  - Ahitófel
  lexicon: transliteración de nombre propio
  rationale: Se adapta a la ortografía española usual de nombres bíblicos, manteniendo la identidad del nombre hebreo.
- source_word: הַגִּלֹנִי
  english_pob_choice: the Gilonite
  chosen_spanish: el gilonita
  alternatives_spanish:
  - de Giloh
  lexicon: HALOT
  rationale: Se preserva el gentilicio como identidad étnico-geográfica, siguiendo la lectura más formal del hebreo.
translation_notes:
  revision_awareness: El texto español sigue la revisión final del POB inglés, que eliminó el punto y coma dentro del primer bloque genealógico para mantener más natural la secuencia appositiva sin perder elementos del מקור. La nota española conserva esa misma ambigüedad sintáctica documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios sin traducirlos.
  - Se usa 'hijo de' para el valor genealógico de בֶּן.
  - Se conserva el gentilicio como adjetivo étnico ('maacatita', 'gilonita').
  - La puntuación reproduce la relación appositiva más natural en español y deja la variante en nota.
