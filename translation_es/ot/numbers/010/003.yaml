translation:
  language: es
  text: Cuando las toquen, toda la congregación se reunirá[a] delante de ti, a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y las tocarán, y toda la congregación se reunirá contigo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְתָקְעוּ
  english_pob_choice: When they blow
  chosen_spanish: Cuando las toquen
  alternatives_spanish:
  - Y las tocarán
  - Y cuando las toquen
  lexicon: HALOT
  rationale: El verbo תקע con trompetas significa tocar o hacer sonar. En español, para trompetas, 'tocarlas' es natural y comunica la acción sin perder el valor instrumental del hebreo. La forma temporal 'Cuando' sigue el valor procedimental del contexto, como en el POB inglés.
- source_word: בָּהֵן
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - en ellas
  - con ellas
  lexicon: HALOT
  rationale: El pronombre femenino plural remite a las dos trompetas de plata del versículo anterior. En español, con 'tocar' la referencia directa 'las' resulta idiomática y mantiene la relación con el objeto tocado.
- source_word: וְנוֹעֲדוּ
  english_pob_choice: shall assemble
  chosen_spanish: se reunirá
  alternatives_spanish:
  - se congregará
  - se juntará
  lexicon: HALOT
  rationale: El nifal de יעד expresa reunirse por cita o convocatoria. 'Se reunirá' comunica bien el resultado colectivo de la señal de trompeta, y conserva el matiz de asamblea convocada.
- source_word: אֵלֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - a ti
  lexicon: HALOT
  rationale: Aunque literalmente es 'a ti', el contexto es la congregación presentándose en la presencia de Moisés. 'Delante de ti' expresa esa presencia de manera natural en español.
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: עֵדָה designa la comunidad reunida del pacto. 'Congregación' es la equivalencia estable y clara en este contexto, y 'toda' mantiene el alcance total del hebreo.
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la puerta
  - el acceso
  lexicon: HALOT
  rationale: פֶּתַח es el punto de entrada. 'La entrada' es el sustantivo natural en español para una abertura o acceso de una tienda.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de cita
  lexicon: HALOT
  rationale: Para Spanish readability, 'tienda de reunión' mantiene el sentido funcional del término técnico sin imponer una forma más litúrgica que no esté exigida por el hebreo. Conserva el carácter de lugar designado para reunión/encuentro.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y el tramo auditado en inglés POB: se conserva la relación temporal/condicional de וְתָקְעוּ, el valor convocatorio de וְנוֹעֲדוּ y la localización en la entrada de la tienda de reunión. La versión española evita depender mecánicamente del inglés, pero mantiene su decisión óptima de sentido natural en contexto.'
  spanish_consistency_notes:
  - Se usó 'congregación' para עֵדָה, consistente con el uso bíblico estándar y con el inglés POB.
  - Se tradujo אֹהֶל מוֹעֵד como 'tienda de reunión' para mantener el término técnico sin introducir una formulación eclesiástica ajena al hebreo.
  - La nota al pie preserva la alternativa más formal que el POB inglés documentó, adaptada al español.
