translation:
  language: es
  text: Tras él[a], repararon Hananías hijo de Selenías y Hanún, el sexto hijo de Zalaf, otra sección[b]. Después de él, reparó Mesulán hijo de Berequías frente a su cámara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La primera expresión se entiende tradicionalmente, por el contexto, como ‘tras él’, en consonancia con la fórmula repetida del capítulo.
    reason: textual_variant
  - marker: b
    text: 'Hebreo literalmente: ‘una segunda medida’; en Nehemías 3, esta expresión idiomática se refiere a un tramo adicional asignado para reparar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרַי/ו
  english_pob_choice: After him
  chosen_spanish: Tras él / Después de él
  alternatives_spanish:
  - Luego de él
  - Tras él
  lexicon: HALOT
  rationale: En la lista narrativa de Nehemías 3, la fórmula marca secuencia respecto del trabajador anterior. ‘Tras él’ conserva la relación espacial-temporal; ‘Después de él’ refuerza la continuidad del listado. Evito una calca inadecuada de la forma morfológica aislada y sigo el sentido contextual auditado en inglés.
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: repararon / reparó
  alternatives_spanish:
  - fortalecieron
  - hicieron reparaciones
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo se usa de manera consistente para la obra de restauración del muro. ‘Repararon’ es la forma natural y precisa en español, preservando la acción constructiva sin diluirla en ‘fortalecieron’.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth son
  chosen_spanish: el sexto
  alternatives_spanish:
  - el sexto hijo
  - el sexto descendiente
  lexicon: HALOT
  rationale: El hebreo es elíptico. En español, ‘el sexto’ mantiene la concisión del original y permite entender a Hanún como el sexto en la línea familiar de Zalaf, sin añadir ‘hijo’ donde el texto no lo expresa explícitamente en esa posición.
- source_word: מִדָּה שֵׁנִי
  english_pob_choice: another section
  chosen_spanish: otra sección
  alternatives_spanish:
  - una segunda sección
  - otro tramo
  lexicon: HALOT
  rationale: La expresión en este capítulo funciona como idiomático de un tramo adicional asignado para reparar. ‘Otra sección’ comunica el valor de conjunto sin forzar la literalidad ‘segunda medida’, que sería poco natural en español.
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: El preposición indica ubicación directamente delante o al otro lado de un punto de referencia. ‘Frente a’ resulta claro y idiomático en español para una descripción topográfica.
- source_word: נִשְׁכָּתוֹ
  english_pob_choice: his chamber
  chosen_spanish: su cámara
  alternatives_spanish:
  - su cámara
  - su aposento
  - su habitación
  lexicon: HALOT
  rationale: ‘Cámara’ conserva el matiz algo formal/arquitectónico de ‘chamber’ mejor que ‘habitación’. En español eclesiástico y bíblico moderno sigue siendo comprensible, y evita sobreespecificar la función del recinto.
- source_word: חֲנַנְיָה / שֶׁלֶמְיָה / חָנוּן / צָלָף / מְשֻׁלָּם / בֶּרֶכְיָה
  english_pob_choice: Hananiah / Shelemiah / Hanun / Zalaph / Meshullam / Berechiah
  chosen_spanish: Hananías / Selenías / Hanún / Zalaf / Mesulán / Berequías
  alternatives_spanish:
  - Hananía / Selemías / Janún / Salaf / Mesulam / Berequías
  lexicon: Transliteración onomástica tradicional adaptada al español
  rationale: Los nombres propios se transliteran al español con formas ampliamente legibles. ‘Selenías’ y ‘Mesulán’ siguen la adaptación fonética habitual en castellano bíblico sin convertir los nombres en traducciones interpretativas.
theological_decisions:
- issue: La fórmula narrativa ‘tras él’ en la lista de reconstrucción
  english_pob_reading: After him preserves sequence and the chapter’s recurring work-list formula.
  chosen_spanish_reading: ‘Tras él’ / ‘Después de él’ preserva la secuencia narrativa y evita una lectura literal desorientadora de la forma verbal aislada.
  alternative_spanish_readings:
  - ‘Después de él’
  - ‘Luego de él’
  rationale: 'No hay tensión doctrinal, pero sí una decisión hermenéutica de fluidez contextual: el marcador organiza turnos de trabajo en la reconstrucción del muro, no indica una acción teológica especial.'
  doctrine_reference: Ninguna; decisión de discurso narrativo.
- issue: ‘otra sección’ frente a una posible traducción literal de ‘segunda medida’
  english_pob_reading: Hebrew literally has 'a second measure'; in Nehemiah 3 this idiom refers to an additional section assigned for repair.
  chosen_spanish_reading: ‘otra sección’ comunica el sentido idiomático del capítulo sin imponer una imagen métrica extraña al lector.
  alternative_spanish_readings:
  - ‘una segunda sección’
  - ‘otro tramo’
  rationale: La preferencia evita una literalidad que oscurecería el referente topográfico y mantiene la función del pasaje como registro de trabajo comunitario.
  doctrine_reference: Ninguna; decisión semántica contextual.
translation_notes:
  revision_awareness: Sin cambios respecto del pase más reciente; se mantiene la lectura de alta concordancia y el contenido auditado coincide con la versión fuente/inglesa.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el tetragrámaton, aunque este versículo no lo contiene.
  - Se conserva ‘Mesulán’ y no ‘Mesullam’ para una adaptación española más legible y coherente con transliteración bíblica usual.
  - ‘Cámara’ se usa con sentido arquitectónico/formal y no como ‘cuarto’ para preservar el registro bíblico sin arcaizar en exceso.
