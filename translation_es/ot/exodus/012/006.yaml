translation:
  language: es
  text: Y será guardado por ustedes hasta el día catorce de este mes, y toda la asamblea de la congregación de Israel lo sacrificarán entre las dos tardes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las dos tardes», un giro idiomático que suele entenderse como el tiempo alrededor del anochecer o del crepúsculo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y estará
  - Y quedará
  lexicon: HALOT
  rationale: El hebreo continúa la instrucción con valor futurativo. «Será» conserva el tono normativo sin forzar un giro demasiado literal en español.
- source_word: לָכֶם לְמִשְׁמֶרֶת
  english_pob_choice: kept by you
  chosen_spanish: guardado por ustedes
  alternatives_spanish:
  - guardado para ustedes
  - bajo su custodia
  lexicon: HALOT
  rationale: La idea es de custodia y resguardo hasta el momento señalado. «Por ustedes» expresa la responsabilidad de conservarlo, de modo natural en español.
- source_word: עַד אַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ הַזֶּה
  english_pob_choice: until the fourteenth day of this month
  chosen_spanish: hasta el día catorce de este mes
  alternatives_spanish:
  - hasta el decimocuarto día de este mes
  - hasta el día catorce de este mes
  lexicon: HALOT
  rationale: Se mantiene la referencia calendárica de forma clara y directa. «Día catorce» es idiomático en español y fiel al valor temporal del hebreo.
- source_word: וְשָׁחֲטוּ
  english_pob_choice: shall slaughter
  chosen_spanish: lo sacrificará
  alternatives_spanish:
  - lo degollará
  - lo matará
  lexicon: HALOT
  rationale: El verbo hebreo refiere al sacrificio ritual del animal. «Sacrificará» preserva mejor el matiz cultual que «matará» y suena más natural para un texto bíblico en español.
- source_word: כֹּל קְהַל עֲדַת יִשְׂרָאֵל
  english_pob_choice: the whole assembly of the congregation of Israel
  chosen_spanish: toda la asamblea de la congregación de Israel
  alternatives_spanish:
  - toda la asamblea de Israel
  - toda la congregación de Israel
  lexicon: HALOT
  rationale: Se conserva la doble expresión colectiva del hebreo en lugar de simplificarla. Esto mantiene la fuerza corporativa del sujeto y su estructura retórica.
- source_word: בֵּין הָעַרְבָּיִם
  english_pob_choice: between the evenings
  chosen_spanish: entre las dos tardes
  alternatives_spanish:
  - entre las tardes
  - al anochecer
  lexicon: HALOT
  rationale: El hebreo es un giro idiomático debatido; la traducción literal «entre las dos tardes» preserva la tensión léxica documentada por la POB inglesa. En español también se puede entender como el tiempo entre el atardecer y la noche, sin cerrar prematuramente la ambigüedad.
theological_decisions:
- issue: Sujeto colectivo en el mandato de sacrificar
  english_pob_reading: the whole assembly of the congregation of Israel shall slaughter it
  chosen_spanish_reading: toda la asamblea de la congregación de Israel lo sacrificará
  alternative_spanish_readings:
  - cada casa lo sacrificará
  - cada familia lo sacrificará
  rationale: Se mantiene el sujeto colectivo del hebreo, como hace la POB inglesa, en vez de resolverlo en una paráfrasis por hogares. Así se conserva la tensión entre el lenguaje corporativo y la práctica distribuida del contexto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente de la POB inglesa al conservar la frase idiomática temporal del hebreo en vez de reemplazarla por una equivalencia interpretativa más libre. También mantiene el sujeto colectivo y el registro legal-instruccional del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando corresponda; este versículo no lo requiere.
  - «Sacrificará» conserva el valor ritual de שׁחט mejor que un verbo genérico como «matará».
  - La duplicación colectiva «asamblea de la congregación» se conserva por fidelidad estructural, aunque suene enfática en español.
  - La nota [a] se ancla en la frase temporal para preservar la ambigüedad del hebreo sin sobreinterpretarla.
