  source_alignment_summary: 'El hebreo contiene solo tres nombres propios coordinados en serie: מִיכָא, רְחוֹב, חֲשַׁבְיָה. El borrador español añade una conjunción (''y'') no presente en la forma seriada del original ni en el POB inglés, y adapta el tercer nombre a ''Hashabías'', lo cual se aparta innecesariamente de la transliteración base documentada (''Hashabiah'').'
