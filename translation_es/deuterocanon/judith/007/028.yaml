revisions:
- from: Llamamos a testificar contra ustedes al cielo y a la tierra, y a nuestro Dios y Señor de nuestros padres[a], que nos venga según nuestros pecados y según los pecados de nuestros padres[b], para que hoy no actúe conforme a estas palabras.
  to: Invocamos como testigos contra ustedes[a] al cielo y a la tierra, y a nuestro Dios y Señor de nuestros antepasados, que nos castiga por nuestros pecados y por los pecados de nuestros antepasados[b], para que hoy no actúe conforme a estas palabras.
  rationale: Se ajusta la formulación forense inicial a un español más natural y más cercano a la nota lexical del expediente inglés ('Invocamos como testigos'). Se reemplaza 'nos venga' por 'nos castiga' para evitar ambigüedad y reflejar mejor la fuerza punitiva de ἐκδικεῖ en este contexto. Se cambia 'nuestros padres' a 'nuestros antepasados' por claridad y naturalidad en español eclesial amplio, conservando el referente patriarcal.
