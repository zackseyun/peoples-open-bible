base_translation:
  language: en
  yaml_path: translation/ot/isaiah/016/014.yaml
  text: But now Yahweh has spoken[a], saying, “Within three years, like the years of a hired worker, the glory of Moab will be brought low, with all its great multitude; and the remnant will be few, very small[c][b], not mighty.”
  footnotes:
  - marker: a
    text: Or “in three years, as the years of a hired worker,” emphasizing a fixed and exact term.
    reason: lexical_alternative
  - marker: b
    text: Or “the glory of Moab will be dishonored,” with the sense that Moab’s prestige will be humiliated.
    reason: lexical_alternative
  - marker: c
    text: Or “the remnant will be few, very small, not great/strong.”
    reason: lexical_alternative
