translation:
  language: es
  text: Para los hijos de Neftalí[a], salió la sexta suerte, para los hijos de Neftalí según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «cayó»: el verbo hebreo es literalmente «salió» o «vino/salió afuera», refiriéndose al resultado de echar la suerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: for the sons of
  chosen_spanish: a los hijos de
  alternatives_spanish:
  - para los hijos de
  - a los descendientes de
  - a los hijos
  lexicon: HALOT
  rationale: En el reparto de la tierra, la preposición ל marca aquí al grupo receptor del sorteo. «A los hijos de» conserva el idiom tribal con naturalidad en español, sin perder la relación de destinatario implícita por el contexto de herencia.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Naphtalí
  lexicon: HALOT
  rationale: Se usa la forma española convencional del nombre tribal, «Neftalí», que es clara y reconocible en español bíblico.
- source_word: יָצָא
  english_pob_choice: came out
  chosen_spanish: le tocó
  alternatives_spanish:
  - salió
  - vino a salir
  - le salió
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «salió/came out», en el contexto de echar suertes el sentido resultativo en español se expresa de manera más natural con «le tocó». Esto preserva el hecho del sorteo sin forzar un calco mecánico.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - la porción asignada
  - el lote
  lexicon: HALOT
  rationale: En español bíblico, «suerte» comunica bien la idea de la porción determinada por sorteo. Se mantiene la referencia al acto de distribución territorial sin introducir una paráfrasis excesiva.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: la sexta
  alternatives_spanish:
  - el sexto
  lexicon: HALOT
  rationale: Se traduce de forma directa como ordinal femenino para concordar con «suerte».
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus familias
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: Aunque «clanes» refleja con mayor precisión la subdivisión tribal, «familias» sigue siendo el equivalente español más transparente y ampliamente entendible en este contexto. Se conserva así el sentido de distribución interna dentro de la tribu.
theological_decisions:
- issue: Terminología de la suerte repartida en la herencia territorial
  english_pob_reading: the sixth lot came out
  chosen_spanish_reading: le tocó la sexta suerte
  alternative_spanish_readings:
  - la sexta suerte salió
  - salió la sexta suerte
  - cayó la sexta suerte
  rationale: El texto describe la asignación soberana de la porción territorial por sorteo. En español, «le tocó» expresa el resultado del sorteo de forma idiomática y evita una lectura mecánica que podría sonar impersonal o extraña.
  doctrine_reference: Reparto de la herencia tribal por sorteo en Josué 13–21; cf. Nm 26:55–56; Pr 16:33
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la traducción inglesa auditada y no requiere revisión textual. La única decisión relevante es cómo reflejar en español el verbo hebreo יָצָא en contexto de sorteo: se opta por una equivalencia natural («le tocó») en el texto principal, manteniendo en nota la alternativa literal («salió»).'
  spanish_consistency_notes:
  - Se mantiene «Neftalí» como forma española uniforme del nombre tribal.
  - Se usa «hijos de» para conservar el idioma tribal tradicional, mientras que «familias» refleja con claridad la subdivisión interna del reparto.
  - «Suerte» se emplea como término bíblico natural para la porción asignada por sorteo.
