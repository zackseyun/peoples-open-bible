review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la secuencia ritual básica del hebreo: lavar las partes internas y las patas, y luego ofrecer el animal completo sobre el altar como עֹלָה. También preserva correctamente Yahvé para לַיהוָה y mantiene la fórmula רֵיחַ נִיחוֹחַ con una nota adecuada. Sin embargo, hay varios desajustes frente al texto fuente y al rastro léxico auditado: (1) וּכְרָעָיו se refiere a las patas/miembros inferiores del animal; «piernas» suena antropomórfico y menos natural en contexto sacrificial. (2) «como holocausto» debilita la aposición nominal del hebreo, que enumera la identidad de la ofrenda, no una mera comparación. (3) אִשֵּׁה en este proyecto fue decidido como «food offering»; «ofrenda encendida» se aparta de esa decisión y reintroduce una interpretación alternativa como texto principal. (4) La puntuación con punto y coma antes de «y el sacerdote» es menos fiel que una coordinación continua.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero algunos giros pueden mejorarse para sonar más naturales y más precisos en registro bíblico: «sus patas» encaja mejor con un animal sacrificial; «hará subir todo en humo» o «hará subir todo ello en humo» funciona, pero la aposición posterior debe fluir sin «como». «Ofrenda de alimento» es algo inusual en español bíblico, pero aquí conviene por fidelidad al expediente léxico inglés, y puede sostenerse con nota alternativa. También conviene mantener la serie appositiva con comas, no con una comparación introducida por «como».'
  glossary_alignment: 'Alineación parcial. Correcto: «Yahvé» para יהוה; «entrañas» para קִרְבּוֹ; «aroma agradable» para רֵיחַ נִיחוֹחַ. Necesita ajuste: el proyecto inglés documenta אִשֵּׁה como «food offering», por lo que el español principal debe reflejar «ofrenda de alimento» o equivalente cercano, dejando «ofrenda por fuego/hecha por fuego» en nota. Además, עֹלָה debe mantenerse como término sacrificial nominal «holocausto», no comparativo «como holocausto».'
  issues:
  - severity: medium
    issue: «sus piernas» para וּכְרָעָיו
    rationale: En animales sacrificiales, «patas» es más natural y preciso que «piernas», que suena humano y algo forzado.
  - severity: medium
    issue: «como holocausto» debilita la aposición nominal
    rationale: 'El hebreo presenta una cadena nominal: «holocausto, ofrenda..., aroma agradable para Yahvé», no una comparación. «Como» altera levemente la sintaxis y la fuerza identificativa.'
  - severity: high
    issue: «una ofrenda encendida» se aparta de la decisión léxica auditada para אִשֵּׁה
    rationale: El rastro inglés escogió «a food offering» como principal, con «offering by fire / fire offering» como alternativas en nota. El borrador pone en el texto principal una alternativa no principal.
  - severity: low
    issue: Puntuación con punto y coma antes de «y el sacerdote»
    rationale: La coordinación continua con comas refleja mejor el flujo del original y la revisión inglesa.
  revised_spanish_text: Pero lavará con agua sus entrañas y sus patas, y el sacerdote hará subir todo ello en humo sobre el altar, holocausto, ofrenda de alimento[a], aroma agradable[b] para Yahvé[c].
  revised_footnotes:
  - marker: a
    text: O «una ofrenda hecha por fuego» o «una ofrenda por fuego» para «ofrenda de alimento».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un aroma agradable»; es una fórmula sacrificial fija que indica que la ofrenda resulta aceptable para Yahvé.'
    reason: theological_note
  - marker: c
    text: O «a Yahvé». El texto principal sigue el estándar del proyecto con «para Yahvé».
    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto para reflejar más fielmente el hebreo y el expediente auditado: «patas» por contexto animal; eliminación de «como» para conservar la serie appositiva; restitución de la decisión principal del proyecto para אִשֵּׁה como «ofrenda de alimento», dejando las opciones relacionadas con fuego en nota; y puntuación más natural y cercana al original.'
