base_translation:
  language: en
  yaml_path: translation/ot/zechariah/003/004.yaml
  text: And he answered and said to those standing before him[a], “Remove the filthy garments from upon him.” Then he said to him, “See, I have taken your iniquity away from upon you[b], and I will clothe you with fine garments.”
  footnotes:
  - marker: a
    text: Or “festal robes” / “fine garments.” The Hebrew term denotes rich or stately clothing.
    reason: lexical_alternative
  - marker: b
    text: “Those standing before him” likely refers to heavenly attendants, but the Hebrew is left descriptive.
    reason: alternative_reading
