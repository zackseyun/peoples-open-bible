  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πάντες ⸀γὰρ ὑμεῖς υἱοὶ φωτός ἐστε καὶ υἱοὶ ἡμέρας. οὐκ ἐσμὲν νυκτὸς οὐδὲ σκότους·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/005.yaml
  text: For you are all sons of light and sons of day[a]. We are not of night or of darkness.
  footnotes:
  - marker: a
    text: Or 'children of light and children of day.' The Greek literally says 'sons,' an idiom for those characterized by or belonging to light and day.
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분은 모두 빛의 아들이며 낮의 아들[a]이기 때문입니다. 우리는 밤에 속하지도 않고 어둠에 속하지도 않습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「빛의 자녀, 낮의 자녀」. 헬라어는 「아들」이며, 빛과 낮의 본성을 지니거나 그것에 속한 자들을 가리키는 관용 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ φωτός ... υἱοὶ ἡμέρας
  english_pob_choice: sons of light ... sons of day
  chosen_korean: 빛의 아들 ... 낮의 아들
  alternatives_korean:
  - 빛의 자녀 ... 낮의 자녀
  - 빛에 속한 사람 ... 낮에 속한 사람
  lexicon: BDAG
  rationale: 셈어식 관용 표현 「~의 아들」을 직역으로 보존하되, 포괄적 「자녀」 가능성을 각주로 둔다.
- source_word: οὐκ ἐσμὲν νυκτὸς οὐδὲ σκότους
  english_pob_choice: We are not of night or of darkness
  chosen_korean: 우리는 밤에 속하지도 않고 어둠에 속하지도 않습니다
  alternatives_korean:
  - 우리는 밤의 사람도 어둠의 사람도 아닙니다
  - 우리는 밤도 어둠도 우리의 것이 아닙니다
  lexicon: BDAG
  rationale: 속격의 「속함」 의미를 한국어 「~에 속하다」로 분명히 한다.
