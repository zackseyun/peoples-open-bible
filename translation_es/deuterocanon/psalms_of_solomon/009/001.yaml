revisions:
- from: Cuando Israel fue llevado cautivo[a] a un país extranjero, cuando se apartaron del Señor, quien los había redimido,
  to: Cuando Israel fue llevado al exilio a una tierra extranjera, cuando se apartaron[a] de Yahvé, quien los había redimido,
  rationale: Se corrige el anclaje de la nota para que corresponda a ἀποστῆναι; se restituye «exilio» para reflejar ἀποικεσίᾳ; se ajusta «tierra» a γῆν; y se adopta «Yahvé» conforme a la terminología base del proyecto para el nombre divino. No se requiere adjudicación adicional porque la revisión es directa y apoyada por la evidencia fuente y las pautas del proyecto.
