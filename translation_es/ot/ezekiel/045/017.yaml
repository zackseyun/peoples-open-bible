revisions:
- from: Y sobre el príncipe estarán los holocaustos[a], la ofrenda vegetal, y la ofrenda de libación, en las fiestas, en las lunas nuevas y en los sábados, en todos los tiempos señalados de la casa de Israel; él ofrecerá la ofrenda por el pecado, la ofrenda vegetal, el holocausto y los sacrificios de paz[b], para hacer expiación por la casa de Israel.
  to: Y los holocaustos[a], la ofrenda vegetal, y la libación, en las fiestas, en las lunas nuevas y en los sábados, en todos los tiempos señalados de la casa de Israel, serán responsabilidad del príncipe. Él proveerá la ofrenda por el pecado[b], la ofrenda vegetal, el holocausto y los sacrificios de paz[c], para hacer expiación por la casa de Israel.
  rationale: La revisión aplica la decisión fuente principal de que la obligación recae sobre el príncipe («serán responsabilidad del príncipe») y alinea הוּא יַעֲשֶׂה con «proveerá», preservando la tensión teológica documentada sin sugerir indebidamente una función sacerdotal manual. También simplifica «ofrenda de libación» a «libación» para mayor naturalidad y añade la nota léxica faltante sobre הַחַטָּאת.
  reviewer_model: gpt-5.4
