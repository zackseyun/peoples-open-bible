translation:
  language: es
  text: Pero Yahvé los tomó y los sacó del horno de hierro[a], de Egipto, para ser para él un pueblo de herencia, como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para ser su propio pueblo' o 'para ser un pueblo para su posesión'. El hebreo dice literalmente 'para ser para él un pueblo de herencia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre divino del proyecto en español. 'Yahvé' conserva el valor del nombre propio del pacto y evita la sustitución por un título genérico.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - escogió
  - agarró
  lexicon: HALOT
  rationale: '''Tomó'' reproduce el sentido simple del verbo sin introducir una interpretación más explícita como ''escogió''. En el contexto, implica la acción de Dios al apropiarse de Israel.'
- source_word: וַיּוֹצִא
  english_pob_choice: brought ... out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los llevó fuera
  - los hizo salir
  lexicon: HALOT
  rationale: '''Sacó'' expresa bien el causativo del hebreo en un registro natural en español y mantiene la imagen del éxodo.'
- source_word: מִכּוּר הַבַּרְזֶל
  english_pob_choice: the iron furnace
  chosen_spanish: el horno de hierro
  alternatives_spanish:
  - el horno de fundición de hierro
  - el horno del hierro
  lexicon: HALOT
  rationale: '''Horno de hierro'' conserva la metáfora del hebreo de manera directa y comprensible. ''Furnace'' no se usa normalmente en español bíblico actual, y ''horno'' comunica la imagen de aflicción y opresión.'
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: El español ya incorpora el movimiento con 'sacó'; por eso 'de Egipto' evita redundancia excesiva y sigue el origen indicado por el hebreo.
- source_word: לִהְיוֹת לוֹ לְעַם נַחֲלָה
  english_pob_choice: to be for him a people of inheritance
  chosen_spanish: para que fueran para él un pueblo de herencia
  alternatives_spanish:
  - para ser para él un pueblo de herencia
  - para ser su pueblo de herencia
  - para que fueran su pueblo propio
  lexicon: HALOT
  rationale: Se preserva la estructura 'para él' del לו y el sintagma 'pueblo de herencia' para reflejar con precisión לעם נחלה. Se evita sustituirlo por formulaciones más interpretativas como 'pueblo propio' o 'posesión'.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta hoy
  - como sucede hoy
  lexicon: HALOT
  rationale: '''Como en este día'' reproduce la fórmula idiomática del hebreo con un tono bíblico natural en español y señala la vigencia presente del hecho.'
theological_decisions:
- issue: Lenguaje de pertenencia pactal en לְעַם נַחֲלָה
  english_pob_reading: a people of inheritance
  chosen_spanish_reading: un pueblo de herencia
  alternative_spanish_readings:
  - su pueblo propio
  - un pueblo para su posesión
  - su pueblo de herencia
  rationale: '''Pueblo de herencia'' conserva el peso teológico de pertenencia y heredad sin desplazar el hebreo hacia una explicación más libre. Se mantiene la tensión entre herencia, posesión y elección implícita.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del texto inglés de la POB, que añadió 'for him' para reflejar לו y afinó 'a people of inheritance' para acercarse más a לְעַם נַחֲלָה sin perder el registro formal. La versión española conserva ese mismo equilibrio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal para el nombre divino.
  - Se traduce el movimiento del éxodo con 'sacó' en lugar de 'llevó' para respetar el causativo hebreo.
  - Se conserva 'pueblo de herencia' para no diluir el valor covenantal de נחלה.
  - La fórmula final 'como en este día' sigue el hebreo sin modernizarla en exceso.
