id: EZK.18.21
reference: Ezekiel 18:21
source:
  edition: WLC
  text: וְ/הָ/רָשָׁ֗ע כִּ֤י יָשׁוּב֙ מִ/כָּל חטאת/ו אֲשֶׁ֣ר עָשָׂ֔ה וְ/שָׁמַר֙ אֶת כָּל חֻקּוֹתַ֔/י וְ/עָשָׂ֥ה מִשְׁפָּ֖ט וּ/צְדָקָ֑ה חָיֹ֥ה יִחְיֶ֖ה לֹ֥א יָמֽוּת־־־׃
translation:
  text: But if the wicked man turns back from all his sins that he has committed[a], and keeps all my statutes, and does justice and righteousness, he shall surely live; he shall not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'repents' for 'turns back'; the Hebrew verb literally means 'turn/return' and here describes turning away from sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked person
  - the wicked one
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular and refers to an individual characterized as wicked. 'Man' preserves the gender-accurate singular force per project philosophy, while 'wicked' functions substantivally in Hebrew. 'Person' would be more gender-neutral than the source.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - but if
  lexicon: HALOT
  rationale: In this conditional setting introducing a hypothetical or general case, 'if' best captures the sense. The initial conjunction on the previous word is represented by 'But,' yielding 'But if' in English.
- source_word: יָשׁוּב
  chosen: turns back
  alternatives:
  - turns
  - repents
  - returns
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn/return.' Here, with מן plus sins, it denotes turning away from prior sinful conduct. 'Turns back' preserves the concrete verbal imagery without importing the fuller theological term 'repents' beyond the lexical data.
- source_word: מִכָּל חטאתו
  chosen: from all his sins
  alternatives:
  - from all his sin
  - from all his offenses
  lexicon: HALOT
  rationale: 'The phrase is distributive and naturally rendered plural in English: ''all his sins.'' This reflects the concrete acts in view, reinforced by the following relative clause ''that he has committed.'''
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has committed
  alternatives:
  - which he did
  - that he has done
  lexicon: HALOT
  rationale: Although עשה is literally 'did/made,' with 'sins' English idiom prefers 'committed.' The perfect is well represented by 'has committed' in relation to present turning.
- source_word: וְשָׁמַר
  chosen: and keeps
  alternatives:
  - and observes
  - and guards
  lexicon: HALOT
  rationale: שׁמר with statutes commonly means to keep/observe. 'Keeps' is both natural and sufficiently formal.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard rendering for חֻקִּים and distinguishes it from other legal terms. It preserves covenantal-legal nuance.'
- source_word: וְעָשָׂה מִשְׁפָּט וּצְדָקָה
  chosen: and does justice and righteousness
  alternatives:
  - and practices justice and righteousness
  - and does what is just and right
  lexicon: HALOT
  rationale: The Hebrew pairs two weighty ethical nouns. 'Does justice and righteousness' stays close to the source and preserves both terms distinctly. 'What is just and right' is smoother but less transparent to the lexical pairing.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this ethical context, 'justice' better communicates the sense of right legal/moral practice than the more archaic or potentially misleading 'judgment.'
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - rightness
  - justice
  lexicon: HALOT
  rationale: '''Righteousness'' is the standard and theologically weighty rendering. Although ''justice'' can overlap semantically, here retaining both ''justice'' and ''righteousness'' preserves the Hebrew distinction.'
- source_word: חָיֹה יִחְיֶה
  chosen: he shall surely live
  alternatives:
  - he will certainly live
  - he shall indeed live
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Shall surely live' is a clear English equivalent that preserves the emphatic force.
- source_word: לֹא יָמוּת
  chosen: he shall not die
  alternatives:
  - he will not die
  lexicon: HALOT
  rationale: A straightforward negated imperfect. 'Shall not die' matches the solemn legal-prophetic register and balances the preceding 'shall surely live.'
- source_word: וְ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: At the verse opening, the conjunction marks contrast with the preceding case. 'But' makes the discourse relation explicit in natural English.
