translation:
  language: es
  text: Dios los saca de Egipto; él tiene los cuernos[a] de un toro salvaje[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tiene la fuerza de un toro salvaje’. El hebreo es difícil; esta traducción conserva la imagen animal en vez de reducirla a una cualidad abstracta.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente ‘unicornio’; es más probable que se trate de un toro salvaje o un aurochs.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios es
  - Poderoso Dios
  lexicon: HALOT
  rationale: En este contexto poético, אֵל funciona como sujeto nominal. ‘Dios’ reproduce de manera natural y fiel la referencia al sujeto divino sin añadir copulativo ni intensificar innecesariamente con ‘Poderoso’.
- source_word: מוֹצִיאָם
  english_pob_choice: brings them out
  chosen_spanish: los saca
  alternatives_spanish:
  - los está sacando
  - los sacó
  lexicon: HALOT
  rationale: El participio hifil conserva una fuerza verbal viva y característica. En español, ‘los saca’ comunica esa acción continua o característica mejor que un pretérito cerrado, a la vez que mantiene la escena del éxodo.
- source_word: מִמִּצְרָיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con un verbo de movimiento en español, ‘de Egipto’ resulta idiomático y suficiente para expresar la salida. ‘Fuera de Egipto’ sería más explícito, pero menos natural aquí.
- source_word: כְּתוֹעֲפֹת
  english_pob_choice: has for him the horns of
  chosen_spanish: tiene los cuernos de
  alternatives_spanish:
  - tiene la fuerza de
  - tiene los cuernos elevados de
  lexicon: HALOT
  rationale: La frase hebrea es difícil. La POB inglesa preserva la imagen concreta de los cuernos frente a una abstracción como ‘fuerza’. En español, ‘tiene los cuernos de’ mantiene la metáfora animal y no la reduce a una cualidad abstracta.
- source_word: רְאֵם
  english_pob_choice: wild ox
  chosen_spanish: toro salvaje
  alternatives_spanish:
  - buey salvaje
  - aurochs
  lexicon: HALOT
  rationale: El referente probable es un gran bovino salvaje. ‘Toro salvaje’ es claro y natural en español; evita ‘unicornio’, que reflejaría una tradición de traducción antigua más que el sentido léxico probable.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para ellos
  - su
  lexicon: HALOT
  rationale: El sufijo es singular masculino. ‘Para él’ conserva la forma gramatical del hebreo sin suavizarla. Aunque el referente puede ser corporativo o más complejo, el español mantiene aquí la singularidad formal del texto.
theological_decisions:
- issue: Imagen de רְאֵם y rechazo de ‘unicornio’
  english_pob_reading: wild ox; older tradition ‘unicorn’ rejected in main text
  chosen_spanish_reading: toro salvaje
  alternative_spanish_readings:
  - aurochs
  - unicornio
  rationale: La opción principal conserva la lectura zoológica y la fuerza imagística del pasaje. ‘Unicornio’ se omite en el texto principal porque no responde al sentido hebreo probable; ‘aurochs’ es más preciso científicamente, pero menos accesible para lectura eclesial general.
  doctrine_reference: Principio de primacía del texto original y de inteligibilidad pública; no depender de la tradición traductoria cuando contradice el sentido probable del hebreo.
translation_notes:
  revision_awareness: El pasaje fue revisado sin cambios en el pase más reciente del texto inglés; la redacción española sigue la misma decisión auditada de mantener la imagen de los cuernos del animal y de evitar la lectura tradicional de ‘unicornio’.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֵל según el uso nominal en el contexto.
  - Se conserva el presente aspectual ‘saca’ para reflejar la fuerza del participio hebreo.
  - ‘Toro salvaje’ se usa como equivalente claro y público de רְאֵם, coherente con la decisión inglesa de ‘wild ox’.
  - La preposición ‘para él’ preserva el sufijo singular de לוֹ, aun cuando el referente exacto pueda discutirse en comentario.
