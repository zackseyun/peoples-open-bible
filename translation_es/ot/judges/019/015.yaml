  to: Se apartaron allí para entrar y pasar la noche en Gabaa. Él entró y se sentó en la plaza de la ciudad[a], y no había nadie[b] que los acogiera a su casa para pasar la noche.
  rationale: Se corrigieron los anclajes de las notas para que coincidan con las palabras relevantes del texto. También se mejoró la naturalidad de «plaza abierta» a «plaza de la ciudad» sin perder la alternativa léxica en nota, y se ajustó «recibiera en su casa» a «acogiera a su casa» para reflejar mejor el matiz hospitalario y direccional de מְאַסֵּף ... הַבַּיְתָה.
