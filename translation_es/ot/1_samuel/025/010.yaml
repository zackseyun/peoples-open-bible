translation:
  language: es
  text: 'Nabal respondió a los siervos de David y dijo: «¿Quién es David? ¿Y quién es el hijo de Isaí? Hoy en día muchos siervos[a] se apartan, cada uno de su amo[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se han multiplicado los siervos»; también, «esclavos».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante de su amo/señor»; es un modismo hebreo para apartarse de su superior.
    reason: idiomatic_clarification
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en este diálogo narrativo funciona como fórmula de respuesta; en español, «respondió» conserva la naturalidad y la relación directa con el discurso previo sin añadir matiz extra.
- source_word: עַבְדֵי דָוִד
  english_pob_choice: David’s servants
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los hombres de David
  lexicon: HALOT
  rationale: עבד puede ser «siervo» o «esclavo» según contexto. Aquí el relato presenta a los mensajeros/retén de David, y «siervos» conserva la transparencia lexical que el POB inglés evita perder con «men».
- source_word: מִי דָוִד וּמִי בֶן־יִשָׁי
  english_pob_choice: Who is David? And who is the son of Jesse?
  chosen_spanish: ¿Quién es David? ¿Y quién es el hijo de Isaí?
  alternatives_spanish:
  - ¿Quién es David? ¿Y quién es el hijo de Jesé?
  lexicon: HALOT
  rationale: Se conserva la repetición despectiva del hebreo. «Hijo de Isaí» mantiene la expresión hebrea; «Isaí» es la forma española bíblica habitual y no borra la referencia genealógica.
- source_word: הַיּוֹם
  english_pob_choice: Nowadays
  chosen_spanish: Hoy en día
  alternatives_spanish:
  - hoy
  - actualmente
  - en estos días
  lexicon: HALOT
  rationale: Aunque literalmente es «hoy», aquí introduce una observación generalizante; «Hoy en día» transmite el valor idiomático y social de la queja de Nabal.
- source_word: רַבּוּ
  english_pob_choice: many
  chosen_spanish: se han multiplicado
  alternatives_spanish:
  - son muchos
  - han aumentado
  lexicon: HALOT
  rationale: רבה expresa aumento/multiplicación. En español, «se han multiplicado» conserva mejor la fuerza verbal del hebreo que un simple adjetivo, y armoniza con la nota inglesa sobre la posibilidad de leer el verbo de manera más plena.
- source_word: עֲבָדִים
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: HALOT
  rationale: Se mantiene la misma familia léxica de עבד en forma natural para español bíblico. «Esclavos» sería demasiado fuerte en este contexto; «siervos» preserva dependencia sin sobrecargar la escena.
- source_word: הַמִּתְפָּרְצִים
  english_pob_choice: are breaking away
  chosen_spanish: que se apartan
  alternatives_spanish:
  - que se escapan
  - que se desprenden
  - que se rebelan
  lexicon: HALOT
  rationale: El hitpael de פרץ sugiere una salida impetuosa o ruptura. «Que se apartan» refleja el alejamiento de los amos sin convertirlo en rebelión abierta ni en una imagen demasiado mecánica.
- source_word: אִישׁ מִפְּנֵי אֲדֹנָיו
  english_pob_choice: each man from before his master
  chosen_spanish: cada uno de delante de su señor
  alternatives_spanish:
  - cada uno de su señor
  - cada hombre de la presencia de su señor
  lexicon: HALOT
  rationale: Se conserva la idiomaticidad de מִפְּנֵי con «de delante de», lo que mantiene el sabor hebreo y la imagen de retirada. «Señor» aquí traduce אדון en sentido humano, no teológico.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: HALOT
  rationale: En este marco social, אדון puede ser superior humano. «Señor» es más adecuado que «amo» para el registro bíblico castellano y evita una dureza innecesaria sin perder la relación de autoridad.
theological_decisions:
- issue: Valor social de עבד / עֲבָדִים
  english_pob_reading: servants rather than slaves, because the context foregrounds retainers/messengers and not bondage as the point of the insult
  chosen_spanish_reading: siervos, no esclavos
  alternative_spanish_readings:
  - esclavos
  - servidores
  rationale: En esta escena la cuestión no es la esclavitud como institución, sino la descalificación de hombres que se separan de su superior. «Siervos» sigue el POB inglés y evita introducir una carga social más fuerte que la del pasaje.
  doctrine_reference: Lexical/theological sensitivity to social-status terms in narrative
- issue: מִפְּנֵי אֲדֹנָיו como fórmula idiomática
  english_pob_reading: from before his master, but revised in English to the more natural 'from his master'
  chosen_spanish_reading: de delante de su señor
  alternative_spanish_readings:
  - de su señor
  - de la presencia de su señor
  rationale: El español puede conservar la imagen idiomática hebrea con naturalidad relativa mediante «de delante de», sin perder inteligibilidad. Dado que el POB inglés revisó a una forma más idiomática, aquí se mantiene el equilibrio entre fidelidad y fluidez.
  doctrine_reference: Idiomatic Hebrew phrase and discourse style
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde una forma más literal (''from before his master'') a una más idiomática (''from his master''). Para el español se optó por un punto medio: conservar la imagen de separación con «de delante de» y, a la vez, mantener una lectura natural y publicable. También se reflejó la preferencia revisada de «Nowadays» con «Hoy en día», y la expresión cuantitativa de רבה con una forma verbal de aumento («se han multiplicado»).'
  spanish_consistency_notes:
  - Se mantiene la terminología POB para עבד/עבדים como «siervo(s)» en lugar de «esclavo(s)», salvo que el contexto obligue a otra opción.
  - «Señor» traduce aquí אדון en sentido humano y no sustituye el nombre divino.
  - La puntuación con comillas angulares se usa para claridad editorial en español bíblico moderno.
