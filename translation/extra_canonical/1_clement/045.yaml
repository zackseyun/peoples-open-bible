translation:
  text: |-
    You are contentious, brothers, and zealous about the things that pertain to salvation. You have bent down to look into the holy Scriptures, the true Scriptures, those given through the Holy Spirit. You know that nothing unjust or falsified has been written in them; you will not find righteous people cast off by holy men. The righteous were persecuted, but by the lawless; they were imprisoned, but by the unholy; they were stoned by the lawbreakers; they were killed by those who were defiled and unjust, through intolerable jealousy. While suffering these things, they endured nobly.
    
    For what shall we say, brothers? Was Daniel thrown into a den of lions by those who feared God? Or were Hananiah and Azariah and Mishael brought down into a furnace of fire by those who practiced the magnificent and glorious religion of the Most High? May this never be! Who then were the ones who did these things? Those who were hateful and full of every evil were stirred up to such a pitch of wrath that they subjected to abuse those who served God in a holy and blameless purpose, not knowing that the Most High is champion and defender of those who worship his all-virtuous name with a pure conscience—to whom be the glory forever and ever. Amen.
    
    But those who endured in confidence inherited glory and honor, and were exalted; and they became enrolled by God in their memorial forever and ever. Amen.
