translation:
  language: es
  text: para que cuentes a oídos de tu hijo y de tu nieto[a] cómo hice escarnio de los egipcios[b], y mis señales que puse entre ellos, para que sepan[c] que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «tu hijo y el hijo de tu hijo».
    reason: source_note
  - marker: b
    text: O, «cómo hice escarnio de Egipto». El verbo hebreo puede enfatizar tanto la humillación de Egipto como el trato severo en su contra.
    reason: lexical_alternative
  - marker: c
    text: O, «y sabrán que yo soy Yahvé». El hebreo también puede leerse con matiz de resultado, no solo de finalidad.
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: La construcción expresa finalidad. «Para que» es natural en español y conserva el valor purposivo sin endurecer el estilo.
- source_word: תְּסַפֵּר
  english_pob_choice: you may tell
  chosen_spanish: cuentes
  alternatives_spanish:
  - relates
  - narres
  lexicon: HALOT
  rationale: El piel aquí pide un acto de narrar o contar a generaciones futuras. «Cuentes» mantiene el mandato/propósito y funciona bien con la frase siguiente.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: al oído de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «en los oídos de». «Al oído de» conserva esa imagen y sugiere el hablar de modo que alguien escuche.
- source_word: בִנְךָ וּבֶן בִּנְךָ
  english_pob_choice: your son and your grandson
  chosen_spanish: tu hijo y del hijo de tu hijo
  alternatives_spanish:
  - tu hijo y tu nieto
  - tu hijo y el hijo de tu hijo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente generacional. «Tu hijo y del hijo de tu hijo» mantiene la repetición semítica y la cadena genealógica; se evita suavizarla demasiado en la línea principal.
- source_word: הִתְעַלַּלְתִּי
  english_pob_choice: I made a mockery of / I dealt harshly with
  chosen_spanish: me burlé de
  alternatives_spanish:
  - traté con dureza a
  - hice escarnio de
  lexicon: HALOT
  rationale: El verbo admite la tensión entre humillar/burlarse y actuar con severidad. En español, «me burlé de» preserva el matiz de humillación señalado en el audit trail, sin perder que se trata de una acción judicial dentro de las plagas.
- source_word: בְּמִצְרַיִם
  english_pob_choice: of the Egyptians / with Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - contra Egipto
  - en Egipto
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, el contexto apunta al territorio/pueblo de Egipto como objeto de la acción divina. «De Egipto» es la forma más natural y abarca la referencia colectiva del texto.
- source_word: אֹתֹתַי
  english_pob_choice: my signs
  chosen_spanish: mis señales
  alternatives_spanish:
  - mis signos
  - mis portentos
  lexicon: HALOT
  rationale: אות significa «signo/señal». «Señales» suena natural en español bíblico contemporáneo y evita cargar el término con interpretaciones adicionales como «portentos».
- source_word: שַׂמְתִּי בָם
  english_pob_choice: I placed among them
  chosen_spanish: puse entre ellos
  alternatives_spanish:
  - coloqué entre ellos
  - puse en medio de ellos
  lexicon: HALOT
  rationale: «Puse entre ellos» conserva la concreción del verbo poner/colocar y mantiene el sentido de presencia en medio del pueblo/territorio egipcio.
- source_word: וִידַעְתֶּם
  english_pob_choice: and so that you may know
  chosen_spanish: y para que sepan
  alternatives_spanish:
  - y así sabrán
  - y conocerán
  lexicon: HALOT
  rationale: El hebreo permite lectura de propósito y de resultado. Dado el flujo de לְמַעַן, la línea principal conserva el propósito con un verbo natural en plural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto: el Tetragrámaton se vierte como el nombre divino propio «Yahvé», no como una sustitución titulativa.'
theological_decisions:
- issue: Sentido de הִתְעַלַּלְתִּי frente a las plagas sobre Egipto
  english_pob_reading: how I made a mockery of the Egyptians / how I dealt harshly with Egypt
  chosen_spanish_reading: cómo me burlé de Egipto
  alternative_spanish_readings:
  - cómo traté con dureza a Egipto
  - cómo hice escarnio de Egipto
  rationale: La palabra hebrea conserva una tensión entre humillación y juicio severo. «Me burlé» mantiene el aspecto de humillación resaltado en el audit trail, sin borrar que la burla ocurre mediante actos reales de juicio.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Lectura de וִידַעְתֶּם como finalidad o resultado
  english_pob_reading: so that you may know
  chosen_spanish_reading: para que sepan
  alternative_spanish_readings:
  - y sabrán
  - y así conocerán
  rationale: La sintaxis favorece la finalidad, pero el efecto consecuente sigue siendo posible. Se conserva la lectura purposiva en español, dejando abierta la consecuencia implícita.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El texto sigue de cerca el último estado auditado en inglés, pero re-ancora las decisiones al hebreo: conserva la finalidad inicial con לְמַעַן, la imagen idiomática de בְּאָזְנֵי, la ambigüedad de הִתְעַלַּלְתִּי como humillación/juicio, y el nombre divino como Yahvé. También incorpora la expansión generacional literal de בִנְךָ וּבֶן בִּנְךָ mediante nota breve en vez de normalizarla por completo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton según la terminología del proyecto.
  - «Señales» traduce אֹתֹתַי de forma directa y consistente con el uso bíblico de אות.
  - Se evitó «SEÑOR» como sustitución del nombre divino, conforme a la política del POB.
  - La línea principal preserva el paralelismo de propósito de la cláusula final con «para que».
