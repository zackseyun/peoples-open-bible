translation:
  language: es
  text: Un salmo de Asaf[a]. Dios está de pie en la asamblea divina; en medio de los dioses juzga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los seres divinos». Algunos entienden aquí «los dioses» como jueces o gobernantes humanos.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: Es el término habitual de superscripción para este género; «salmo» es la equivalencia más natural y fiel en español.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: En las superscripciones, ל puede indicar atribución o asociación. «De Asaf» conserva esa ambigüedad sin precisar más de lo que el hebreo permite.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: La primera aparición lleva participio singular (נִצָּב), por lo que se refiere al Dios de Israel en singular; «Dios» lo expresa claramente en español.
- source_word: נִצָּב
  english_pob_choice: stands
  chosen_spanish: está
  alternatives_spanish:
  - se pone de pie
  - se yergue
  - está de pie
  lexicon: HALOT
  rationale: El participio describe a Dios en una escena judicial. En español, «está» comunica la posición presente sin forzar una imagen corporal innecesaria; «está de pie» sería más literal, pero menos natural.
- source_word: בַּעֲדַת
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en el consejo
  - en la congregación
  lexicon: HALOT
  rationale: עֵדָה designa un grupo reunido. «Asamblea» es la opción amplia y natural; mantiene el marco solemne del pasaje.
- source_word: אֵל
  english_pob_choice: divine
  chosen_spanish: divina
  alternatives_spanish:
  - de Dios
  - mighty
  lexicon: HALOT
  rationale: En la construcción עֲדַת־אֵל, el sentido adjetival funciona mejor en español como «asamblea divina», preservando el matiz de ámbito celeste o sobrenatural.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: HALOT
  rationale: La locución indica posición dentro de un grupo. «En medio de» reproduce bien la imagen espacial y el tono formal.
- source_word: אֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - los seres divinos
  - los jueces
  lexicon: HALOT
  rationale: La segunda aparición es plural en sentido por el grupo entre el que Dios se sitúa y al que juzga. «Los dioses» conserva la fuerza léxica directa; «seres divinos» queda como alternativa menos susceptible de malentendido.
- source_word: יִשְׁפֹּט
  english_pob_choice: he judges
  chosen_spanish: juzga
  alternatives_spanish:
  - imparte juicio
  - dicta sentencia
  - juzgará
  lexicon: HALOT
  rationale: El verbo שפט es judicial. En español, el presente «juzga» mantiene la escena solemne y la acción continuada/presente del hebreo poético.
theological_decisions:
- issue: Referencia del segundo אֱלֹהִים en Salmo 82:1
  english_pob_reading: Rendered as 'the gods' in the main text, referring to members of a divine/heavenly council under God's judgment.
  chosen_spanish_reading: Traducido como «los dioses» en el texto principal, entendidos como miembros de un consejo divino/celestial sometidos al juicio de Dios.
  alternative_spanish_readings:
  - «seres divinos»
  - «jueces» (gobernantes humanos)
  rationale: El versículo distingue la primera aparición de אֱלֹהִים, singular y referente a Dios, de un segundo grupo plural entre el cual él está y al cual juzga. La construcción «asamblea divina» favorece una escena de consejo celestial. Para no borrar la tensión del original, se mantiene «los dioses» y se deja abierta la alternativa interpretativa de «seres divinos»; la lectura de gobernantes humanos también existe, pero no se impone aquí.
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa; no resolver prematuramente una lectura debatida.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del testigo inglés: no se registran cambios aplicados y la concordancia general del control de calidad fue alta.'
  spanish_consistency_notes:
  - Se usa «Dios» para la primera aparición de אֱלֹהִים por su concordancia singular con נִצָּב.
  - Se mantiene «los dioses» para la segunda aparición para preservar la distinción léxica del hebreo y la tensión interpretativa del pasaje.
  - «Asamblea divina» reproduce el valor adjetival de אֵל en la construcción hebrea sin convertirla en una frase más explicativa de lo que permite el texto.
