revisions:
- from: Y cuando yo me vaya de junto de ti, el Espíritu de Yahvé[a] te llevará donde yo no sé; y cuando vaya a informarle a Acab, y no te encuentre, me matará; aunque tu siervo ha temido a Yahvé desde su juventud.
  to: Y cuando yo me separe de ti, el Espíritu de Yahvé[a] te llevará a donde yo no sepa; entonces, cuando vaya a informarle a Acab y no te encuentre, me matará, aunque tu siervo ha temido a Yahvé desde mi juventud.
  rationale: 'Se corrige un error de sentido en la persona gramatical («mi juventud», no «su juventud») y se ajustan dos giros para un español más natural y fiel al hebreo: «me separe de ti» por claridad idiomática y «a donde yo no sepa» para expresar destino desconocido sin la formulación extraña «donde yo no sé».'
