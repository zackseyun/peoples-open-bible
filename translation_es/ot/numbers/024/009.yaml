translation:
  language: es
  text: Se agazapó, se acostó como un león, y como una leona[a]—¿quién lo despertará? Los que te bendicen son bendecidos[b], y los que te maldicen son malditos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y como un gran león". El término hebreo puede denotar un león fuerte o maduro; "leona" preserva la distinción léxica respecto de la palabra anterior para "león".'
    reason: lexical_alternative
  - marker: b
    text: Esta fórmula de bendición y maldición evoca Génesis 12:3 y Génesis 27:29.
    reason: cross_reference
lexical_decisions:
- source_word: כָּרַע
  english_pob_choice: he crouched
  chosen_spanish: se encogió
  alternatives_spanish:
  - se agachó
  - se inclinó
  - se arrodilló
  lexicon: HALOT
  rationale: El verbo expresa doblarse o ponerse en postura baja; en el contexto de la imagen animal, 'se encogió' comunica mejor la postura de reposo del león que una acción de culto o sumisión humana.
- source_word: שָׁכַב
  english_pob_choice: he lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se echó
  - yacía
  - se reclinó
  lexicon: HALOT
  rationale: Es el verbo común de yacer o acostarse. 'Se acostó' mantiene la secuencia verbal natural en español y conserva la escena del animal que se posa para descansar.
- source_word: כַּאֲרִי
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como león
  lexicon: HALOT
  rationale: La comparación con אֲרִי es directa y el español normal requiere el artículo para una construcción fluida sin alterar la imagen.
- source_word: וּכְלָבִיא
  english_pob_choice: and like a lioness
  chosen_spanish: y como una leona
  alternatives_spanish:
  - y como un león grande
  - y como un león maduro
  lexicon: HALOT
  rationale: El término puede referir a un león fuerte o maduro, pero el paralelismo léxico distingue el segundo felino del primero. 'Leona' preserva esa distinción de forma natural en español.
- source_word: מִי יְקִימֶנּוּ
  english_pob_choice: who will rouse him?
  chosen_spanish: ¿quién lo despertará?
  alternatives_spanish:
  - ¿quién lo hará levantarse?
  - ¿quién lo despertará de su sueño?
  lexicon: HALOT
  rationale: En el contexto del animal en reposo, el causativo de קום puede expresar despertar o hacer levantarse. 'Despertará' es idiomático en español y conserva la fuerza de nadie se atreverá a perturbarlo.
- source_word: מְבָרֲכֶיךָ
  english_pob_choice: those who bless you
  chosen_spanish: los que te bendicen
  alternatives_spanish:
  - los que te bendigan
  - tus bendicentes
  lexicon: HALOT
  rationale: El participio con sufijo se vierte mejor como una subordinada nominal en español. 'Los que te bendicen' conserva la referencia personal y el tono proverbial.
- source_word: בָרוּךְ
  english_pob_choice: are blessed
  chosen_spanish: son benditos
  alternatives_spanish:
  - están benditos
  - quedan bendecidos
  lexicon: HALOT
  rationale: El adjetivo/predicado verbal se traduce aquí con un valor resultativo. 'Benditos' refleja el paralelismo con la fórmula de bendición y mantiene una resonancia bíblica sin ocultar el sentido activo de la bendición recibida.
- source_word: וְאֹרְרֶיךָ
  english_pob_choice: and those who curse you
  chosen_spanish: y los que te maldicen
  alternatives_spanish:
  - y tus maldicentes
  - y los que te echan maldición
  lexicon: HALOT
  rationale: El participio sustantivado se expresa de manera natural como 'los que te maldicen', conservando el contraste simétrico con 'los que te bendicen'.
- source_word: אָרוּר
  english_pob_choice: are cursed
  chosen_spanish: son malditos
  alternatives_spanish:
  - quedan malditos
  - están malditos
  lexicon: HALOT
  rationale: El predicado final mantiene el paralelismo con 'benditos' y conserva la fuerza de la fórmula de maldición en español bíblico contemporáneo.
theological_decisions:
- issue: Fórmula de bendición y maldición con eco patriarcal
  english_pob_reading: Retained as a direct blessing/curse declaration without importing later doctrinal claims
  chosen_spanish_reading: Se mantiene como declaración directa de bendición y maldición, sin ampliar el texto con interpretaciones posteriores
  alternative_spanish_readings:
  - Se explicita el eco de Génesis dentro del texto principal
  - Se parafrasea como una promesa de pacto más desarrollada
  rationale: El hebreo evoca con claridad la fórmula de Génesis 12:3 y 27:29, pero la traducción debe preservar la formulación propia del versículo. La nota permite señalar el eco sin convertirlo en paráfrasis.
  doctrine_reference: Prioridad del texto original y preservación de la alusión intertextual
- issue: Referente del singular 'te/lo' en el discurso
  english_pob_reading: Addressed to Israel/Jacob as represented in Balaam's oracle
  chosen_spanish_reading: Dirigido a Israel/Jacob de manera representativa y corporativa
  alternative_spanish_readings:
  - Dirigido específicamente al rey de Israel
  - Dirigido solo al pueblo sin foco representativo
  rationale: El singular hebreo se conserva en español para respetar la forma del oráculo. El contexto sugiere a Israel/Jacob como sujeto corporativo representado, sin cerrar indebidamente el referente.
  doctrine_reference: Mantener la tensión representativa-corporativa del texto bíblico
translation_notes:
  revision_awareness: Coincide con la revisión más reciente del texto fuente inglés; no hay cambios aplicados en la pasarela final y el acuerdo del control cruzado fue alto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino por defecto, pero este versículo no lo contiene.
  - Se mantiene la distinción léxica entre el primer felino ('león') y el segundo término ('leona') para no aplanar el paralelismo.
  - Se conserva el singular pronominal del hebreo ('te/lo') para reflejar el valor representativo-corporativo del oráculo.
  - '''Benditos/malditos'' se eligen por su fuerza proverbial y su simetría con el hebreo predicativo.'
