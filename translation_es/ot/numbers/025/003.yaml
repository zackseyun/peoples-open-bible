review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Israel se adhiere a Baal de Peor y la ira de Yahvé se vuelve contra Israel. Conserva correctamente «Yahvé» para יְהוָה y «contra Israel» para בְּיִשְׂרָאֵל con חרה אף. Sin embargo, la nota al pie no preserva bien la alternativa inglesa documentada para וַיִּצָּמֶד: repite prácticamente la lectura principal en vez de reflejar la opción más fuerte «se unció/alió bajo yugo» o equivalente a «yoked itself».'
  spanish_quality_summary: El español es claro, natural y digno. «Así Israel se unió a Baal de Peor» suena bien en contexto narrativo. «El furor de Yahvé se encendió» es comprensible, pero «la ira de Yahvé se encendió» o «ardió» se alinea un poco mejor con el uso bíblico común y con la metáfora hebrea sin añadir intensidad innecesaria. La principal reparación necesaria está en la nota.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé», nombre propio conservado; בעל פעור → «Baal de Peor»; ישראל → «Israel». No hay conflicto doctrinal. Ajuste menor: para וַיִּחַר אַף, «ira» es una opción más estándar y suficientemente fiel que «furor».'
  issues:
  - severity: medium
    issue: La nota al pie a no preserva correctamente las alternativas léxicas auditadas para וַיִּצָּמֶד.
    rationale: La nota inglesa ofrece «joined itself to Baal-peor» o «yoked itself to Baal of Peor». La nota española actual («O “a Baal-peor” o “a Baal de Peor”») omite la alternativa verbal significativa y solo repite variantes nominales casi equivalentes.
  - severity: low
    issue: «Furor» puede sobre-intensificar ligeramente וַיִּחַר אַף frente a una opción más estándar como «ira».
    rationale: El hebreo expresa la ira encendida/ardiente de Yahvé. «Furor» es posible, pero «ira» conserva mejor el registro bíblico común y evita añadir una fuerza léxica no exigida por el original.
  revised_spanish_text: Así Israel se unió a Baal de Peor[a], y la ira de Yahvé se encendió contra Israel.
  revised_footnotes:
  - marker: a
    text: O «se unió a Baal-peor» o «se puso bajo yugo con Baal de Peor».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para reflejar de verdad las alternativas documentadas para וַיִּצָּמֶד, incluyendo la imagen más fuerte de «yoked itself». También se ajusta «furor» a «ira» para una correspondencia más sobria y estándar con וַיִּחַר אַף en español bíblico natural.
