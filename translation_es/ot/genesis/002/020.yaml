    text: 'O: «Adán puso nombres ... pero para Adán no se halló una ayuda que le correspondiera».'
    reason: alternative_reading
  - marker: b
    text: 'O: «una ayuda adecuada para él».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «no halló»; también puede verterse de modo activo: «pero el hombre no halló una ayuda que le correspondiera».'
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación de la nota [b] para que explique la frase «que le correspondiera», que traduce כְּנֶגְדּוֹ. El resto del texto se mantiene porque representa fielmente el hebreo y las decisiones auditadas.
