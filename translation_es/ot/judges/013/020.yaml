  language: en
  yaml_path: translation/ot/judges/013/020.yaml
  text: And when the flame went up from the altar toward heaven[a], the angel of Yahweh went up in the flame of the altar, while Manoah and his wife were watching[b]; and they fell on their faces to the ground.
