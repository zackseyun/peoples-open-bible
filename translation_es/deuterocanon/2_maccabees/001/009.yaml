revisions:
- from: Y ahora, celebren los días de la Fiesta de las Cabañas[a] en el mes de Quisleu[b].
  to: Y ahora[a], celebren los días de la Fiesta de las Enramadas[b] en el mes de Kislev[c].
  rationale: Se revisa el texto para usar «Fiesta de las Enramadas», que expresa mejor σκηνοπηγία en español natural y bíblico, manteniendo la alternativa tradicional «Tabernáculos» en nota. También se sustituye «Quisleu» por «Kislev» por mayor reconocimiento y claridad. Además, se reubica la nota cultural para anclarla directamente al mes; se elimina el anclaje innecesario en «Y ahora».
