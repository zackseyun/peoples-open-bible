translation:
  language: es
  text: El octavo día tendrán una asamblea solemne[a]; no harán ningún trabajo laborioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asamblea de cierre». El hebreo עֲצֶרֶת puede designar una asamblea festiva conclusiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: On the eighth day
  chosen_spanish: En el octavo día
  alternatives_spanish:
  - El octavo día
  - En el día octavo
  - En el octavo día de la fiesta
  lexicon: HALOT
  rationale: La frase temporal marca cuándo aplica la instrucción. «En el octavo día» conserva el orden natural del español y el sentido ordinal definido del hebreo sin añadir precisión no explícita en el texto.
- source_word: עֲצֶרֶת
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea
  - una asamblea de cierre
  - una congregación solemne
  lexicon: HALOT
  rationale: עֲצֶרֶת denota una reunión sagrada o convocación festiva. «Asamblea solemne» preserva el carácter cultual y formal del término sin importar una identificación litúrgica posterior. Se mantiene la ambigüedad entre reunión sagrada y asamblea de clausura.
- source_word: תִּהְיֶה לָכֶם
  english_pob_choice: you shall have
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - les corresponderá
  - será para ustedes
  - ustedes tendrán
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «será para ustedes». «Habrá para ustedes» comunica con naturalidad el valor existencial/posesivo de la frase sin alejarse del original.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: laborious work
  chosen_spanish: ningún trabajo laborioso
  alternatives_spanish:
  - ninguna labor servil
  - ningún trabajo ordinario
  - ningún trabajo de servicio
  lexicon: HALOT
  rationale: La expresión apunta a trabajo común o de servicio prohibido en día festivo. «Trabajo laborioso» conserva la fuerza restrictiva de la frase y sigue de cerca la decisión inglesa revisada, evitando tanto «trabajo ordinario» como una lectura demasiado técnica o arcaica de «servil».
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán
  alternatives_spanish:
  - no harán ustedes
  - no deben hacer
  - no realizarán
  lexicon: HALOT
  rationale: La negación legal en segunda persona plural se expresa de forma directa y formal en español con «no harán», que encaja con el estilo legislativo del pasaje.
theological_decisions:
- issue: Sentido festivo de עֲצֶרֶת
  english_pob_reading: Rendered as 'solemn assembly' without importing later doctrinal or liturgical identification into the main text.
  chosen_spanish_reading: Se traduce como «asamblea solemne» sin añadir una identificación posterior del rito o del día.
  alternative_spanish_readings:
  - asamblea de cierre
  - convocación solemne
  rationale: El hebreo señala una reunión sagrada del día octavo, pero el versículo no exige explicar su función completa. La traducción conserva el término ceremonial y deja abierta la posibilidad de entenderlo como asamblea conclusiva sin imponerla en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de מְלֶאכֶת עֲבֹדָה
  english_pob_reading: Revised to 'laborious work' to more closely reflect 'work of service'.
  chosen_spanish_reading: «Trabajo laborioso» refleja la restricción de trabajo propio de un día festivo, sin convertir la frase en un tecnicismo litúrgico.
  alternative_spanish_readings:
  - trabajo ordinario
  - trabajo de servicio
  - labor servil
  rationale: La expresión hebrea no prohíbe toda actividad en abstracto, sino el trabajo común/ocupacional característico. Se eligió una formulación española que conserve la tensión entre la prohibición amplia y la referencia concreta al trabajo de servicio.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «regular work» a «laborious work» para reflejar mejor מְלֶאכֶת עֲבֹדָה. La redacción española sigue esa revisión mediante «trabajo laborioso», manteniendo la equivalencia con la lectura final más cercana al hebreo y conservando la alternativa de cierre festivo en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Asamblea solemne» mantiene el registro cultual y no se sustituye por «congregación» para no debilitar la referencia festiva.
  - Se mantiene el pronombre plural de trato formal «ustedes» para reflejar la segunda persona plural del hebreo.
  - La negación se formula en futuro legislativo («no harán») para conservar el tono jurídico del mandato.
