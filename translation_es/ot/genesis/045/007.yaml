translation:
  language: es
  text: Y Dios me envió delante de ustedes para preservarles un remanente en la tierra[a], y para mantenerlos con vida mediante una gran liberación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para preservarles sobrevivientes en la tierra». El hebreo שְׁאֵרִית puede denotar «remanente», «sobrevivientes» o «posteridad».
    reason: lexical_alternative
  - marker: b
    text: O «mediante un gran escape» o «mediante muchos sobrevivientes». La expresión hebrea לִפְלֵיטָה גְּדֹלָה puede subrayar el acto de liberación o el resultado de personas preservadas con vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֵנִי
  english_pob_choice: sent me
  chosen_spanish: me envió
  alternatives_spanish:
  - me ha enviado
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada en secuencia. En español, el pretérito simple “me envió” comunica bien el avance narrativo sin perder la referencia a la acción divina.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: El contexto muestra que se trata del Dios único interpretando la historia de José, por lo que “Dios” mantiene la referencia singular y natural en español.
- source_word: לִפְנֵיכֶם
  english_pob_choice: ahead of you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - antes que ustedes
  - en frente de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “ante ustedes”; “delante de ustedes” conserva la idea espacial y también puede sugerir prioridad temporal en un español claro y reverente.
- source_word: לָשׂוּם לָכֶם שְׁאֵרִית
  english_pob_choice: to preserve for you a remnant
  chosen_spanish: para preservar para ustedes un remanente
  alternatives_spanish:
  - para poner para ustedes un remanente
  - para establecer para ustedes un remanente
  - para conservar para ustedes un remanente
  lexicon: HALOT
  rationale: שׂוּם tiene el sentido básico de “poner/colocar”, pero en este contexto la frase expresa el propósito de asegurar la supervivencia. “Preservar” captura bien ese valor final sin borrar la raíz de conservación presente en el conjunto.
- source_word: שְׁאֵרִית
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - unos sobrevivientes
  - una posteridad
  lexicon: HALOT
  rationale: “Remanente” conserva el término bíblico tradicional y el eco lexical del hebreo, mientras que el resto de la cláusula aclara que se trata de personas preservadas con vida.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar “tierra” o “país”, el contexto de la promesa y de la preservación permite “en la tierra” como una opción amplia y fiel al hebreo. Se evita restringir el alcance sin necesidad.
- source_word: וּלְהַחֲיוֹת לָכֶם
  english_pob_choice: and to keep you alive
  chosen_spanish: y para mantenerlos con vida
  alternatives_spanish:
  - y para conservarles la vida
  - y para hacerlos vivir
  lexicon: HALOT
  rationale: El hiphil de חיה expresa causar o mantener la vida. “Mantenerlos con vida” es natural en español y transmite la acción preservadora de Dios.
- source_word: לִפְלֵיטָה גְּדֹלָה
  english_pob_choice: by a great deliverance
  chosen_spanish: mediante una gran liberación
  alternatives_spanish:
  - por una gran liberación
  - con una gran salvación
  - mediante un gran rescate
  lexicon: HALOT
  rationale: La revisión inglesa destacó el valor instrumental de la frase. “Mediante” refleja bien ese matiz, y “gran liberación” comunica el resultado salvador sin reducir פְּלֵיטָה solo a una escapatoria física.
theological_decisions:
- issue: Cómo traducir שְׁאֵרִית sin perder la carga bíblica de “remanente” ni obscurecer el contexto inmediato de supervivencia familiar
  english_pob_reading: a remnant
  chosen_spanish_reading: un remanente
  alternative_spanish_readings:
  - unos sobrevivientes
  - una posteridad
  rationale: “Remanente” conserva el término con resonancia bíblica y teológica, mientras la cláusula siguiente aclara que ese remanente consiste en quienes son preservados en la hambruna. Así se mantiene la tensión entre término tradicional y sentido contextual.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Cómo expresar לִפְלֵיטָה גְּדֹלָה con valor de resultado/instrumento sin perder su sentido de rescate
  english_pob_reading: by a great deliverance
  chosen_spanish_reading: mediante una gran liberación
  alternative_spanish_readings:
  - por una gran liberación
  - para una gran liberación
  - con una gran salvación
  rationale: “Mediante” sigue el ajuste revisado del inglés y hace explícito el valor instrumental. “Liberación” mantiene el campo semántico de rescate/salvación sin imponer una interpretación más estrecha como “escape”.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail inglés, que ajustó la relación de לִפְלֵיטָה גְּדֹלָה desde una lectura final hacia una instrumental (“by a great deliverance”). Por eso se eligió “mediante una gran liberación” en lugar de una formulación finalista. También se mantuvo la decisión estable de traducir שְׁאֵרִית como “remanente”, dejando la alternativa contextual en nota.
  spanish_consistency_notes:
  - Se usa “Dios” para אֱלֹהִים, en singular y sin artículo, como referencia al Dios único.
  - “Delante de ustedes” conserva la idea de prioridad espacial y temporal de לִפְנֵיכֶם.
  - Se mantiene “remanente” como término bíblico consistente, sin sustituirlo por una paráfrasis más interpretativa.
  - “Liberación” se prefirió a “escape” para no estrechar פְּלֵיטָה.
  - No se usó “SEÑOR” ni “Cristo”, porque este versículo no los contiene ni depende de ellos.
