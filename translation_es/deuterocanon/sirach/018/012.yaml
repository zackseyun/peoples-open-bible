  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: ἶδεν / ἐπέγνω → «vio y reconoció», τὴν καταστροφὴν αὐτῶν → «su destrucción», διὰ τοῦτο → «por tanto», ἐπλήθυνεν → «multiplicó». También respeta la revisión inglesa al no añadir «por ellos». Sin embargo, la nota para ἐξιλασμός es defectuosa porque ofrece «atonación» y «atonamiento», formas no naturales ni recomendables en español, y omite la alternativa más sólida y documentada frente a «expiación», que es «atonamiento/atonación» solo en inglés conceptual, pero no como español eclesial normal. Conviene además ofrecer una nota alineada con el audit trail inglés: «O “aumentó su expiación”» o bien la alternativa principal «atonamiento» no es adecuada; en español la pareja natural es «expiación/atonamiento» no funciona, así que la alternativa debe reformularse.'
