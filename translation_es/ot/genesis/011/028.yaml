translation:
  language: es
  text: Y murió Harán en presencia de Taré, su padre[a], en la tierra de su nacimiento, en Ur de los caldeos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de Taré, su padre», es decir, mientras su padre aún vivía. El hebreo usa literalmente el modismo «sobre la faz de».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - se murió
  lexicon: HALOT
  rationale: El wayyiqtol de מות narra una acción pasada simple. En español, «murió» comunica de forma natural y sobria el hecho narrado sin añadir matices no presentes en el hebreo.
- source_word: עַל־פְּנֵי
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - antes de
  - ante la vista de
  - mientras aún vivía
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático literal 'sobre el rostro de'. «En presencia de» conserva la imagen relacional sin reducir prematuramente el sentido a un mero dato temporal.
- source_word: תֶּרַח אָבִיו
  english_pob_choice: Terah his father
  chosen_spanish: Taré, su padre
  alternatives_spanish:
  - Taré su padre
  - su padre Taré
  lexicon: HALOT
  rationale: El constructo identifica a Taré como padre de Harán. En español, la coma ayuda a hacer fluido el parentesco sin perder la relación posesiva.
- source_word: בְּאֶרֶץ מוֹלַדְתּוֹ
  english_pob_choice: in the land of his birth
  chosen_spanish: en la tierra de su nacimiento
  alternatives_spanish:
  - en su tierra natal
  - en la tierra donde nació
  lexicon: HALOT
  rationale: מּוֹלֶדֶת apunta al lugar de nacimiento/origen. «Tierra de su nacimiento» conserva la relación nominal del hebreo de manera clara y cercana al texto fuente.
- source_word: בְּאוּר כַּשְׂדִּים
  english_pob_choice: in Ur of the Chaldeans
  chosen_spanish: en Ur de los caldeos
  alternatives_spanish:
  - en Ur de los caldeos
  - en Ur de Caldea
  lexicon: HALOT
  rationale: אוּר es un nombre propio transliterado y כַּשְׂדִּים designa a los caldeos. «Ur de los caldeos» sigue el patrón estándar y mantiene el referente geográfico-ethnónimo con naturalidad en español.
translation_notes:
  revision_awareness: La versión inglesa revisada mantuvo el mismo sentido global sin cambios; el español conserva esa lectura estable y refleja el modismo hebreo con una nota explicativa, no una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se prefirió «murió» como equivalente narrativo directo del wayyiqtol.
  - «Ur de los caldeos» se mantuvo como nombre propio geográfico tradicional y transparente, sin sustituciones litúrgicas.
