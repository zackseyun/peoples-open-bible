translation:
  language: es
  text: La ropa que llevabas puesta[a] no se gastó, ni tu pie se hinchó[b], estos cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu prenda de vestir no se gastó».'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden el verbo de manera más específica como «no se ampolló».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְלָתְךָ
  english_pob_choice: your clothing
  chosen_spanish: tu ropa
  alternatives_spanish:
  - tu vestido
  - tu vestimenta
  - tu prenda de vestir
  lexicon: HALOT
  rationale: שִׂמְלָה designa una prenda o ropa, a menudo de cobertura exterior. En español, «ropa» comunica bien el conjunto de prendas sin estrechar indebidamente a una sola pieza, y mantiene naturalidad moderna.
- source_word: בָּלְתָה
  english_pob_choice: did not wear out
  chosen_spanish: no se gastó
  alternatives_spanish:
  - no se desgastó
  - no se envejeció
  - no se deterioró
  lexicon: HALOT
  rationale: El verbo apunta a desgaste o llegar a estar gastado. «No se gastó» es claro y fiel en español; conserva la imagen de uso prolongado sin introducir matices ajenos.
- source_word: מֵעָלֶיךָ
  english_pob_choice: on you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - de sobre ti
  - encima de ti
  - puesto sobre ti
  lexicon: HALOT
  rationale: La expresión literalmente sugiere 'de sobre ti', pero en castellano «sobre ti» comunica de forma natural que la ropa estaba puesta en la persona, sin volver la frase torpe.
- source_word: וְרַגְלְךָ
  english_pob_choice: and your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tus pies
  - tu pierna
  - tu planta del pie
  lexicon: HALOT
  rationale: El hebreo es singular. Mantener «tu pie» preserva la forma del texto fuente y evita pluralizar sin necesidad.
- source_word: בָצֵקָה
  english_pob_choice: did not swell
  chosen_spanish: no se hinchó
  alternatives_spanish:
  - no se infló
  - no se irritó
  - no se ampolló
  lexicon: HALOT
  rationale: El verbo se entiende tradicionalmente como hincharse o inflamarse; en algunos enfoques puede implicar ampollarse. «No se hinchó» conserva la lectura principal y deja abierta la alternativa interpretativa.
- source_word: זֶה אַרְבָּעִים שָׁנָה
  english_pob_choice: these forty years
  chosen_spanish: estos cuarenta años
  alternatives_spanish:
  - durante estos cuarenta años
  - por estos cuarenta años
  - estos cuarenta años
  lexicon: HALOT
  rationale: El hebreo conserva el demostrativo con la expresión temporal. «Estos cuarenta años» refleja ese rasgo de manera transparente en español, mejor que reducirlo sin más a una mera duración.
translation_notes:
  revision_awareness: Se siguió el alto grado de acuerdo del control cruzado y no hubo revisiones aplicadas en el pasaje base. La formulación española busca mantener la transparencia del hebreo sin adoptar un registro arcaizante.
  spanish_consistency_notes:
  - Se preservó el singular hebreo en «tu pie».
  - Se mantuvo el demostrativo temporal de זֶה con «estos».
  - «Ropa» funciona aquí como colectivo natural para שִׂמְלָה, mientras que la nota conserva la alternativa más literal «prenda de vestir».
  - El verbo בָצֵקָה se dejó con la lectura principal de hinchazón, con nota que retiene la alternativa de ampollarse dada la tensión lexical documentada.
