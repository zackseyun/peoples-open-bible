  text: וַ/יַּעֲנ֨וּ אֶת יְהוֹשֻׁ֜עַ וַ/יֹּאמְר֗וּ כִּי֩ הֻגֵּ֨ד הֻגַּ֤ד לַ/עֲבָדֶ֨י/ךָ֙ אֵת֩ אֲשֶׁ֨ר צִוָּ֜ה יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אֶת מֹשֶׁ֣ה עַבְדּ֔/וֹ לָ/תֵ֤ת לָ/כֶם֙ אֶת כָּל הָ/אָ֔רֶץ וּ/לְ/הַשְׁמִ֛יד אֶת כָּל יֹשְׁבֵ֥י הָ/אָ֖רֶץ מִ/פְּנֵי/כֶ֑ם וַ/נִּירָ֨א מְאֹ֤ד לְ/נַפְשֹׁתֵ֨י/נוּ֙ מִ/פְּנֵי/כֶ֔ם וַֽ/נַּעֲשֵׂ֖ה אֶת הַ/דָּבָ֥ר הַ/זֶּֽה־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/009/024.yaml
  text: 'They answered Joshua and said[a], “Because it was clearly told to your servants what Yahweh your God had commanded his servant Moses: to give you all the land and to destroy all the inhabitants of the land before you. So we greatly feared for our lives because of you, and we did this thing.”'
  footnotes:
