translation:
  language: es
  text: Pues Yahvé es el gran Dios[a], y el gran rey sobre todos los dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por encima de todos los seres divinos». El hebreo אֱלֹהִים puede referirse a dioses, seres divinos o seres celestiales según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la convocatoria anterior al culto; «Porque» preserva bien el valor causal y suena natural en español bíblico contemporáneo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - Ser poderoso
  lexicon: HALOT
  rationale: Aquí אֵל predica la deidad de Yahvé. En español, «Dios» con mayúscula comunica claramente al Dios de Israel y mantiene la fuerza confesional del hebreo.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - m عظioso
  - poderoso
  lexicon: HALOT
  rationale: «Grande» reproduce el valor de excelencia/exaltación y conserva el paralelismo con el segundo miembro del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el criterio del proyecto, preservando el nombre personal divino en vez de sustituirlo por un título.
- source_word: וּמֶלֶךְ
  english_pob_choice: and a great King
  chosen_spanish: y un gran Rey
  alternatives_spanish:
  - y un rey
  - y Rey grande
  lexicon: HALOT
  rationale: Se mantiene la coordinación y el paralelismo con la primera cola. «Rey» en mayúscula es natural cuando se refiere a Yahvé como soberano supremo.
- source_word: עַל כָּל אֱלֹהִים
  english_pob_choice: above all gods
  chosen_spanish: sobre todos los dioses
  alternatives_spanish:
  - por encima de todos los dioses
  - sobre todos los seres divinos
  lexicon: HALOT
  rationale: «Sobre» expresa supremacía. «Dioses» conserva la tensión del hebreo אֱלֹהִים sin resolver si se trata de ídolos, seres celestiales o poderes espirituales.
theological_decisions:
- issue: Cómo renderizar יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. «Yahvé» preserva ese nombre revelado y evita la sustitución por una designación genérica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֱלֹהִים en «sobre todos los dioses»
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - seres divinos
  - seres celestiales
  rationale: Se mantiene la ambigüedad productiva del hebreo. «Dioses» conserva el tono polémico y la tensión teológica sin decidir en traducción qué clase de entidades están en vista.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo base y con la revisión inglesa más reciente; no se observan cambios textuales adicionales que requieran ajuste en español.
  spanish_consistency_notes:
  - 'Se conserva la secuencia paralela del verso: afirmación de Yahvé como Dios grande, seguida por su realeza universal.'
  - Se usa «Yahvé» de manera consistente con el criterio del proyecto para el Nombre divino.
  - Se mantiene «dioses» en minúscula dentro de la nota como sustantivo común, mientras el texto principal usa mayúscula en «Dios» para el Dios de Israel.
