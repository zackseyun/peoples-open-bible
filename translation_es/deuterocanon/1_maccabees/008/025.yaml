translation:
  language: es
  text: La nación de los judíos será aliada[a], según la ocasión les indique, con un corazón pleno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de todo corazón». El griego dice literalmente: «con un corazón pleno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμμαχήσει
  english_pob_choice: shall be an ally
  chosen_spanish: será aliada
  alternatives_spanish:
  - se aliará
  - combatirá al lado de
  - hará causa común con
  lexicon: LSJ
  rationale: El futuro de συμμαχέω expresa entrar o actuar en alianza. En español, «ser aliada» preserva el sentido de alianza política/corporativa sin añadir más contenido militar del que el griego exige.
- source_word: τὸ ἔθνος τῶν Ἰουδαίων
  english_pob_choice: the nation of the Jews
  chosen_spanish: la nación de los judíos
  alternatives_spanish:
  - la nación judía
  - el pueblo de los judíos
  lexicon: LSJ
  rationale: ἔθνος se refiere aquí al cuerpo político o colectivo nacional. «Nación» conserva ese sentido; «de los judíos» refleja el genitivo de forma transparente.
- source_word: ὡς ἂν ὁ καιρὸς ὑπογράφῃ αὐτοῖς
  english_pob_choice: as the occasion may indicate for them
  chosen_spanish: conforme la ocasión se lo indique
  alternatives_spanish:
  - según la ocasión les indique
  - como la ocasión les señale
  - cuando la circunstancia lo requiera para ellos
  lexicon: LSJ
  rationale: ὡς ἄν con subjuntivo marca una relación indefinida o circunstancial; «conforme» comunica bien esa dependencia de la ocasión. ὑπογράφῃ puede significar «indicar» o «prescribir»; aquí «se lo indique» evita una formulación demasiado técnica y sigue la revisión inglesa más reciente.
- source_word: καρδίᾳ πλήρει
  english_pob_choice: with a full heart
  chosen_spanish: con corazón pleno
  alternatives_spanish:
  - de todo corazón
  - con un corazón entero
  - con corazón íntegro
  lexicon: LSJ
  rationale: La frase dativa es idiomática para sinceridad o entrega total. «Corazón pleno» conserva la imagen griega de forma más cercana que una paráfrasis como «de todo corazón», sin perder inteligibilidad.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que ajustó ὡς ἂν a «as» y ὑπογράφῃ a «indicate». Por eso evitó un español excesivamente interpretativo como «cuando» o «prescriba», y elegí una construcción condicional/circunstancial natural en español.
  spanish_consistency_notes:
  - Se mantiene «judíos» para τῶν Ἰουδαίων en coherencia con el valor étnico-político del genitivo.
  - Se usa «aliada» como traducción relacional de συμμαχήσει, sin forzar una imagen bélica explícita.
  - «Corazón pleno» conserva el paralelismo con el griego y la nota aclara la alternativa idiomática «de todo corazón».
