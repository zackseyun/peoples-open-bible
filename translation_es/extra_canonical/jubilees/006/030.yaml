base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/030.yaml
  text: And all the days of the commandments are fifty-two weeks of days, and all of them make a complete year. Thus it is inscribed and ordained on the heavenly tablets, and there is no neglecting a single year, from year to year.
  footnotes:
  - marker: a
    text: Or 'commandment'.
    reason: previous_rendering
  - marker: b
    text: Or 'ordained and inscribed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:50Z'
    unchanged: false
    changes_summary: Changed 'command' to 'commandment' for lexical accuracy; reversed 'engraved and ordained' to 'ordained and inscribed' to better reflect the source order and more natural formal English; changed 'transgressing' to 'neglecting' to better fit the sense here.
translation:
  language: es
  text: Y todos los días de los mandamientos son cincuenta y dos semanas de días, y todos ellos forman un año completo. Así está inscrito y ordenado en las tablas celestiales, y no se descuida un solo año, de año en año.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ትእዛዛት
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandato(s)
  - precepto(s)
  - orden(es)
  lexicon: Mandamientos
  rationale: El ge’ez es plural; por eso uso un plural en español. "Mandamientos" conserva el valor normativo y coincide con la revisión inglesa que corrigió la forma singular. "Mandatos" o "preceptos" serían posibles, pero aquí suenan menos directos para una lista de disposiciones divinas.
- source_word: ተቈርፀ፡ ወተሠርዐ
  english_pob_choice: ordained and inscribed
  chosen_spanish: inscrito y ordenado
  alternatives_spanish:
  - ordenado e inscrito
  - decretado e inscrito
  - grabado y ordenado
  lexicon: Inscribir / ordenar
  rationale: La audit trail inglesa pasó de "engraved and ordained" a "ordained and inscribed" para reflejar mejor el orden del ge’ez; en español mantengo ese orden semántico con "inscrito y ordenado". "Inscrito" recoge la imagen de escribir/grabar en las tablas; "ordenado" expresa la institución o fijación normativa.
- source_word: ውስተ፡ ጽላት፡ ሰማይ፡
  english_pob_choice: the heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablas celestiales
  lexicon: Tablas celestiales
  rationale: '"Tablas celestiales" es una traducción transparente y ya conocida en español bíblico-académico para el motivo apocalíptico de las tabletas del cielo. Evita una expansión interpretativa mayor que "tablas del cielo" y conserva el sustantivo plural del original.'
- source_word: አልቦ ተዐድዎ አሐተ ዓመተ ወዓመ፡ እምዓም፡
  english_pob_choice: there is no neglecting a single year, from year to year
  chosen_spanish: no se descuida un solo año, de año en año
  alternatives_spanish:
  - no se omite un solo año, de año en año
  - no se deja pasar un solo año, de año en año
  - no se negligencia un solo año, de año en año
  lexicon: Neglect / neglecting
  rationale: La revisión inglesa cambió "transgressing" por "neglecting" por ser más fiel al sentido. En español, "se descuida" expresa bien la idea de omitir o dejar sin atender, sin introducir un tono jurídico más fuerte que el que sugiere este contexto calendárico.
theological_decisions:
- issue: Naturaleza de las "tablas celestiales" como registro divino
  english_pob_reading: ordained and inscribed on the heavenly tablets
  chosen_spanish_reading: inscrito y ordenado en las tablas celestiales
  alternative_spanish_readings:
  - escrito y ordenado en las tablas celestiales
  - grabado y ordenado en las tablas celestiales
  rationale: Mantengo el lenguaje de registro divino sin aclararlo más allá de lo que exige el texto. "Inscrito" deja abierta la imagen de inscripción literal o decretal; "ordenado" conserva el carácter normativo de la disposición.
  doctrine_reference: Motivo apocalíptico de los registros celestiales; cf. tradición de las tablas celestiales en Jubileos.
- issue: Correspondencia entre la pluralidad del mandato y la forma española
  english_pob_reading: the commandments are fifty-two weeks of days
  chosen_spanish_reading: los mandamientos son cincuenta y dos semanas de días
  alternative_spanish_readings:
  - los mandatos son cincuenta y dos semanas de días
  - los preceptos son cincuenta y dos semanas de días
  rationale: La forma plural se preserva para no borrar la evidencia morfológica del ge’ez. Esto evita una lectura excesivamente simplificada de una única orden y respeta el carácter acumulativo de las disposiciones calendáricas.
  doctrine_reference: Precisión textual y respeto a la pluralidad léxica del original ge’ez.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el pasaje corrigió "command" a "commandment/commandments" por precisión morfológica, y ajustó el par verbal a "ordained and inscribed". En español se reflejó esa precisión con un plural explícito y con el orden semántico "inscrito y ordenado", manteniendo el sentido de registro y decreto. También se recogió el cambio de "transgressing" a "neglecting" mediante "se descuida".'
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando el texto lo requiera; aquí no aparece.
  - Se evitó "Señor" como sustituto ocultador porque no hay un divino directo en este verso.
  - '"Tablas celestiales" mantiene la terminología de Jubileos de forma consistente y reconocible.'
  - '"Mandamientos" respeta el plural del ge’ez y la revisión crítica reciente.'
  - El tono es formal y bíblico, pero sin arcaísmos innecesarios.
