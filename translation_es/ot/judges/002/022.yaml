translation:
  language: es
  text: para poner a prueba a Israel por medio de ellos[a], si guardarían el camino de Yahvé, andando en él, como lo guardaron sus padres, o no.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "por ellos" para "por medio de ellos". El pronombre hebreo remite a las naciones dejadas en la tierra (véase el contexto anterior).
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - con el fin de
  lexicon: HALOT
  rationale: La partícula expresa finalidad. En español, "para" comunica de manera natural y fiel el propósito del texto sin sobrecargarlo.
- source_word: נַסּוֹת
  english_pob_choice: to test
  chosen_spanish: poner a prueba
  alternatives_spanish:
  - probar
  - examinar
  lexicon: HALOT
  rationale: El infinitivo de נסה aquí implica una prueba o examen de fidelidad. "Poner a prueba" conserva el sentido de examen divino con buena naturalidad en español.
- source_word: בָּם
  english_pob_choice: by them
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - por ellos
  - a través de ellos
  lexicon: HALOT
  rationale: El pronombre remite a las naciones dejadas en la tierra; la construcción instrumental puede expresarse en español con "por medio de ellos". Se mantiene la relación de instrumento sin perder claridad.
- source_word: הֲשֹׁמְרִים
  english_pob_choice: whether they would keep
  chosen_spanish: para ver si guardarían
  alternatives_spanish:
  - si guardaban
  - si guardarían
  lexicon: HALOT
  rationale: La forma interrogativa con participio expresa el contenido de la prueba. En español, la expectativa futura se expresa bien con "para ver si guardarían".
- source_word: דֶּרֶךְ יְהוָה
  english_pob_choice: the way of Yahweh
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - el camino de Yahweh
  - el camino del Yahvé
  lexicon: HALOT
  rationale: '"Camino" reproduce el idioma bíblico de conducta o manera de vivir. Se conserva "Yahvé" conforme al criterio del proyecto para el Tetragrama.'
- source_word: לָלֶכֶת בָּם
  english_pob_choice: by walking in it
  chosen_spanish: andando en él
  alternatives_spanish:
  - para andar en él
  - al andar en él
  lexicon: HALOT
  rationale: El hebreo dice literalmente "caminar en él" referido al camino. "Andando en él" mantiene la imagen y suena natural en español. El singular se conserva por referencia a "el camino".
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce comparación con la conducta de los padres. "Como" es el equivalente más directo y sobrio.
- source_word: שָׁמְרוּ אֲבוֹתָם
  english_pob_choice: their fathers kept it
  chosen_spanish: lo guardaron sus padres
  alternatives_spanish:
  - lo observaron sus padres
  - lo guardaron sus antepasados
  lexicon: HALOT
  rationale: Se conserva el verbo repetido שׁמר con el valor de guardar/observar. "Sus padres" traduce de forma género-precisa el plural masculino del hebreo.
- source_word: אִם לֹא
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - si no
  - o bien no
  lexicon: HALOT
  rationale: En esta construcción interrogativa, la conclusión idiomática en español es "o no". Mantiene el contraste final del hebreo sin convertirlo en condicional.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo la terminología española del proyecto, se usa "Yahvé" para preservar el nombre divino y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia masculina en אֲבוֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus progenitores
  rationale: El hebreo es masculino plural y la referencia histórica es a los padres/fundadores de Israel. Se conserva el término masculino sin neutralizarlo, conforme a la política de precisión de género.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el criterio POB en inglés; no se detectaron revisiones pendientes en el tramo auditado, y el punto principal de decisión fue la conservación del valor instrumental de בָּם y del nombre divino Yahvé en español.
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal entre "poner a prueba", "guardar" y "andando" para reflejar la estructura del hebreo.
  - '"Yahvé" se mantiene como forma estable del Tetragrama en el texto principal.'
  - '"Padres" se usa en sentido genealógico e histórico, sin sustituirlo por un neutralizador.'
  - La nota al pie marca la alternativa instrumental de בָּם sin alterar el flujo de lectura principal.
