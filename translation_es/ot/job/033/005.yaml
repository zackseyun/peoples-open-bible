translation:
  language: es
  text: Si eres capaz[a], respóndeme; ordena tu causa[b] ante mí; toma tu posición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si puedes». El hebreo expresa capacidad; la redacción española mantiene el matiz de aptitud en un desafío retórico.
    reason: lexical_alternative
  - marker: b
    text: O «ordena tus palabras ante mí». El verbo hebreo significa «poner en orden» y puede referirse a la argumentación de Job o, más ampliamente, a su respuesta preparada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si en verdad
  - Si acaso
  lexicon: HALOT
  rationale: Condicional directo de desafío retórico; en español, «Si» conserva la apertura hipotética sin añadir énfasis ajeno al hebreo.
- source_word: תּוּכַל
  english_pob_choice: you are able
  chosen_spanish: eres capaz
  alternatives_spanish:
  - puedes
  - tienes capacidad
  lexicon: HALOT
  rationale: Expresa capacidad, no solo posibilidad. «Eres capaz» mantiene el tono formal y la confrontación del pasaje.
- source_word: הֲשִׁיבֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - réplicame
  lexicon: HALOT
  rationale: El hiphil de שוב funciona aquí como «responder». «Respóndeme» es natural y directo en español, sin perder el valor dialógico.
- source_word: עֶרְכָה
  english_pob_choice: set your case in order
  chosen_spanish: ordena tu causa
  alternatives_spanish:
  - ordena tus palabras
  - presenta tu causa en orden
  - dispón tu argumento
  lexicon: HALOT
  rationale: El verbo ערך significa ordenar, disponer. En contexto forense/disputativo, «causa» comunica mejor el sentido de argumentación o pleito que «palabras» solamente, y «ordena» conserva la idea de poner en orden.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: «Delante de mí» preserva la escena de confrontación personal y es claro en español contemporáneo.
- source_word: הִתְיַצָּבָה
  english_pob_choice: take your stand
  chosen_spanish: ponte en pie
  alternatives_spanish:
  - preséntate firme
  - toma tu lugar
  - ponte de pie
  lexicon: HALOT
  rationale: El hitpael de יצב sugiere colocarse de pie, mantenerse firme. «Ponte en pie» conserva la imagen corporal y el tono retador; en este contexto también sugiere estar listo para el debate.
translation_notes:
  revision_awareness: Coincide con el contexto hebreo y con la lectura auditada en inglés; no se requiere ajuste textual respecto del recorrido de revisión más reciente.
  spanish_consistency_notes:
  - Se preserva el registro forense y retórico del verso.
  - «Causa» se usa en sentido jurídico/disputativo, no como «cause» causal.
  - 'La secuencia verbal mantiene paralelismo: capacidad → respuesta → orden del argumento → postura firme.'
