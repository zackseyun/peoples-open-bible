translation:
  language: es
  text: Y los tres se abrieron paso en el campamento de los filisteos, y sacaron agua del pozo de Belén que estaba junto a la puerta, y la cargaron y la llevaron a David. Pero David no quiso beberla; más bien, la derramó a Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «la derramó como ofrenda de libación a Yahvé». El verbo hebreo puede llevar fuerza de libación/sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְקְעוּ
  english_pob_choice: broke through
  chosen_spanish: abrieron paso
  alternatives_spanish:
  - rompieron el cerco
  - se abrieron paso
  lexicon: HALOT
  rationale: En contexto militar, el verbo expresa penetrar con fuerza en líneas enemigas. «Abriron paso» conserva la idea de ruptura/penetración sin sonar forzado en español.
- source_word: הַשְּׁלֹשָׁה
  english_pob_choice: the three
  chosen_spanish: los tres
  alternatives_spanish:
  - los tres guerreros
  - los tres valientes
  lexicon: HALOT
  rationale: El hebreo dice simplemente «los tres». Se mantiene la referencia breve sin añadir un sustantivo no presente en el verso.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: into the camp of the Philistines
  chosen_spanish: entre el campamento de los filisteos
  alternatives_spanish:
  - en el campamento de los filisteos
  - hacia el campamento de los filisteos
  lexicon: HALOT
  rationale: Con «abrieron paso», «entre» comunica el ingreso intrusivo dentro del campamento enemigo. «Campamento de los filisteos» refleja el constructo hebreo con naturalidad.
- source_word: וַיִּשְׁאֲבוּ מַיִם
  english_pob_choice: drew water
  chosen_spanish: sacaron agua
  alternatives_spanish:
  - extrajeron agua
  - cogieron agua
  lexicon: HALOT
  rationale: «Sacar agua» es un equivalente idiomático y claro para el acto de extraer agua de un pozo en español. Mantiene la concreción del verbo hebreo sin sobreexplicarlo.
- source_word: מִבּוֹר בֵּית לֶחֶם אֲשֶׁר בַּשַּׁעַר
  english_pob_choice: from the well of Bethlehem that was by the gate
  chosen_spanish: del pozo de Belén que estaba junto a la puerta
  alternatives_spanish:
  - de la cisterna de Belén que estaba junto a la puerta
  - del pozo/cisterna de Belén que estaba a la puerta
  lexicon: HALOT
  rationale: בּוֹר puede ser pozo, cisterna o foso; aquí el contexto de sacar agua favorece «pozo». «Junto a la puerta» refleja בַּשַּׁעַר con precisión espacial y una formulación natural en español.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried it
  chosen_spanish: la llevaron
  alternatives_spanish:
  - la transportaron
  - la cargaron
  lexicon: HALOT
  rationale: En el flujo narrativo, el sentido es transportar el agua. El pronombre femenino singular concuerda con «agua» en español, aunque el hebreo use sufijo plural/massivo.
- source_word: וַיָּבִאוּ אֶל דָּוִיד
  english_pob_choice: brought it to David
  chosen_spanish: la llevaron a David
  alternatives_spanish:
  - la trajeron a David
  - la llevaron de vuelta a David
  lexicon: HALOT
  rationale: La secuencia narrativa ya implica el traslado hacia David. «La llevaron a David» mantiene simplicidad y evita añadir «de vuelta», que no está explícito.
- source_word: וְלֹא אָבָה דָוִיד לִשְׁתּוֹתָם
  english_pob_choice: David was not willing to drink it
  chosen_spanish: David no quiso beberla
  alternatives_spanish:
  - David no estaba dispuesto a beberla
  - David se negó a beberla
  lexicon: HALOT
  rationale: אָבָה expresa voluntad/consentimiento; «no quiso» es una forma natural y fiel. Se usa femenino singular para concordar con «agua» en español.
- source_word: וַיְנַסֵּךְ אֹתָם לַיהוָה
  english_pob_choice: he poured it out to Yahweh
  chosen_spanish: la derramó a Yahvé
  alternatives_spanish:
  - la derramó como ofrenda de libación a Yahvé
  - la ofreció en libación a Yahvé
  lexicon: HALOT
  rationale: Se conserva la acción concreta de derramar, que es lo narrativamente visible. El complemento cultual se mantiene con Yahvé, y la posible fuerza sacrificial se reserva para la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
theological_decisions:
- issue: Sentido cultual de la acción de David
  english_pob_reading: he poured it out to Yahweh, with the libation/drink-offering sense preserved in a footnote
  chosen_spanish_reading: la derramó a Yahvé, con la posible fuerza de ofrenda de libación aclarada en nota
  alternative_spanish_readings:
  - la ofreció como ofrenda de libación a Yahvé
  - la derramó como sacrificio a Yahvé
  rationale: El verbo hebreo admite un matiz ritual de libación, pero el relato presenta ante todo el acto físico de derramar el agua. La solución principal conserva la imagen y la nota preserva la tensión semántica sin borrarla.
  doctrine_reference: Translation philosophy §§1, 3, 6; entrada terminológica de יְהוָה
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo entre las verificaciones; por eso se mantiene la solución concreta con la nota de libación, sin modificaciones adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - «Pozo» se elige por el contexto de sacar agua, aunque בּוֹר también podría ser «cisterna»; la nota léxica deja constancia de la alternativa.
  - El objeto implícito del hebreo se vuelve femenino singular en español («la») por la concordancia natural con «agua».
  - Se evita «ofreció» en el texto principal para no borrar la acción narrativa concreta de derramar.
  - «Los filisteos» y «David» siguen la forma usual española sin introducir terminología eclesiástica ajena al hebreo.
