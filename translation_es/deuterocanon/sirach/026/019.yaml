review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la línea del POB en casi todos los puntos: «pilares», «de oro», «base de plata», «pies hermosos» y la lectura sustantivada de εὐσταθοῦς como «uno que se mantiene firme». También preserva correctamente la nota sobre la imagen comprimida de la frase griega.'
  spanish_quality_summary: La principal dificultad está en «los pechos», que en español actual suena marcadamente sexualizado o anatómicamente femenino y puede distraer del sentido de στέρνοις como zona del pecho/tórax. El propio rastro inglés prefirió singular colectivo («the breast») por idiomaticidad. En español, «el pecho» conserva la imagen corporal y mejora mucho la legibilidad sin alejarse del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas son en general adecuadas. Conviene ajustar στέρνοις de «los pechos» a «el pecho» por claridad idiomática en español, manteniendo la nota explicativa del plural griego.
  issues:
  - severity: medium
    issue: «los pechos» resulta poco idiomático y potencialmente equívoco en español actual
    rationale: Aunque στέρνοις es plural en griego, en español bíblico y general «el pecho» funciona mejor como singular colectivo para la zona torácica. «Los pechos» introduce una connotación corporal innecesaria que no refleja bien el sentido proverbial del pasaje.
  - severity: low
    issue: La nota al pie dice «El griego es comprimido»
    rationale: En español suena más natural «La imagen griega es condensada/comprimida» o «El griego presenta una imagen condensada». Es un ajuste de estilo menor, pero mejora la dignidad y claridad.
  revised_spanish_text: Pilares de oro sobre una base de plata[a], y pies hermosos sobre el pecho de uno que se mantiene firme.
  revised_footnotes:
  - marker: a
    text: 'La imagen griega es condensada y algo difícil: literalmente, «pies hermosos sobre pechos de uno firme/estable». La traducción toma εὐσταθοῦς de manera sustantiva («uno que se mantiene firme») y στέρνοις como la zona del pecho.'
    reason: lexical_alternative
