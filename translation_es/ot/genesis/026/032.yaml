  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/ה֗וּא וַ/יָּבֹ֨אוּ֙ עַבְדֵ֣י יִצְחָ֔ק וַ/יַּגִּ֣דוּ ל֔/וֹ עַל אֹד֥וֹת הַ/בְּאֵ֖ר אֲשֶׁ֣ר חָפָ֑רוּ וַ/יֹּ֥אמְרוּ ל֖/וֹ מָצָ֥אנוּ מָֽיִם׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/026/032.yaml
  text: And it happened on that day that Isaac’s servants came and told him about the well that they had dug[a], and they said to him[b], “We have found water.”
  footnotes:
  - marker: a
    text: Or “on the same day,” emphasizing that the report came on the very day of the preceding covenant events.
    reason: lexical_alternative
  - marker: b
    text: “Servants” could also be rendered “slaves,” since the Hebrew term can denote bonded household laborers; here the context does not foreground that social nuance.
    reason: lexical_alternative
