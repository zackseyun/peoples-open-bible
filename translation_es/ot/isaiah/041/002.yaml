review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: mantiene la figura sin identificar, conserva «oriente», «justicia», la imaginería de polvo/rastrojo, y refleja la dificultad sintáctica con notas. Sin embargo, hay un problema de anclaje de nota y una mejora léxica importante: «levantó» para הֵעִיר es menos fiel que «suscitó»/«despertó», porque el verbo es ‘hacer levantar/despertar/poner en acción’, no simplemente ‘levantar’. Además, la nota [a] está anclada al verbo equivocado; la alternativa documentada corresponde a «en justicia», no a «levantó».'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «¿Quién levantó desde el oriente al que llama en justicia a sus pies?» suena algo trabado; «suscitó del oriente» mejora la naturalidad y la precisión. El resto del verso es legible. «Rastrojo arrastrado» es aceptable, aunque algo pesado; se puede mantener por fidelidad a la imagen. La corrección principal es mover la nota [a] a «justicia» y ajustar el verbo inicial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justicia» para צֶדֶק y «subyuga» para la cláusula difícil encajan con el expediente inglés. No aparecen términos sensibles como Yahvé/Mesías. La única decisión léxica desalineada parcialmente es הֵעִיר -> «levantó», mejor como «suscitó».
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «levantó» en lugar de a «justicia».
    rationale: La nota explica la ambigüedad de צֶדֶק («en justicia / victoria / justicia vindicadora»), no del verbo הֵעִיר. Debe aparecer junto a «justicia» para reflejar correctamente el expediente léxico del POB.
  - severity: medium
    issue: «levantó» no refleja tan bien como «suscitó» el valor causativo de הֵעִיר.
    rationale: En este contexto, עור en hifil apunta a despertar/suscitar/poner en acción a una persona. «Levantar» puede entenderse como simplemente alzar, mientras que «suscitar» preserva mejor la idea de hacer surgir para una misión.
  - severity: low
    issue: La apertura del verso suena algo forzada en español.
    rationale: «¿Quién levantó desde el oriente al que llama en justicia a sus pies?» es entendible, pero «¿Quién suscitó del oriente a uno, llamándolo en justicia[a] a sus pies?» o formulación equivalente fluye mejor sin apartarse del hebreo.
  revised_spanish_text: ¿Quién suscitó del oriente a uno, llamándolo en justicia[a] a sus pies? Entrega naciones delante de él y subyuga reyes; los entrega como polvo a su espada[b], como rastrojo arrastrado a su arco.
  revised_footnotes:
