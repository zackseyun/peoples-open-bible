translation:
  language: es
  text: Entonces Josué volvió, y todo Israel con él, al campamento en Guilgal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «al campamento, a Guilgal». El hebreo usa una terminación direccional en «Guilgal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: El verbo narrativo de שוב se expresa de modo natural en español con «volver» en pasado simple. «Regresó» también es posible, pero «volvió» conserva concisión y fluidez sin perder el sentido de retorno.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se adapta a la forma española estándar «Josué».
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todos los israelitas
  lexicon: HALOT
  rationale: Se conserva la formulación corporativa del hebreo. «Todo Israel» mantiene mejor la referencia colectiva que una explicitación interpretativa como «todos los israelitas».
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  lexicon: HALOT
  rationale: Equivale de forma directa a la preposición con sufijo pronominal de tercera persona masculina singular.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la tienda del campamento
  lexicon: HALOT
  rationale: En este contexto de guerra, מַחֲנֶה designa un campamento de tropas; «campamento» es la opción natural en español y preserva el matiz militar sin sobrecargarlo.
- source_word: הַגִּלְגָּלָה
  english_pob_choice: at Gilgal
  chosen_spanish: en Guilgal
  alternatives_spanish:
  - a Guilgal
  lexicon: HALOT
  rationale: El he direccional del topónimo señala movimiento hacia el lugar. En español, tras «al campamento», la preposición «en» resulta la manera más natural de expresar la ubicación del campamento en Guilgal sin duplicar innecesariamente la idea de destino.
theological_decisions:
- issue: Valor del término corporativo «todo Israel»
  english_pob_reading: and all Israel
  chosen_spanish_reading: y todo Israel
  alternative_spanish_readings:
  - y todos los israelitas
  rationale: 'Se conserva la ambigüedad útil del hebreo: puede referirse al conjunto representado por el ejército y no exige una explicitación que estreche el alcance del texto.'
  doctrine_reference: Lectura corporativa del pueblo de Israel en el relato histórico
- issue: Tratamiento del topónimo con terminación direccional
  english_pob_reading: to the camp at Gilgal
  chosen_spanish_reading: al campamento en Guilgal
  alternative_spanish_readings:
  - al campamento a Guilgal
  rationale: La decisión sigue el sentido direccional del hebreo sin forzar una repetición extraña en español. No introduce contenido doctrinal, pero sí preserva con fidelidad el rasgo morfológico del texto.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'El contexto inglés no requirió cambios de revisión: la lectura fue mantenida como en la fuente auditada, y la nota conserva la alternativa literal sobre el topónimo con terminación direccional.'
  spanish_consistency_notes:
  - Se mantiene «Josué» para el nombre propio y «Guilgal» para el topónimo, conforme a la ortografía bíblica usual en español.
  - Se usa «campamento» en vez de «campa» o «campo» para conservar el matiz militar de מַחֲנֶה.
  - La nota de pie de página marca la alternativa literal del hebreo direccional sin alterar el texto principal.
