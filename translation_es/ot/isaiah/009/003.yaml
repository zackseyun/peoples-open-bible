translation:
  language: es
  text: Porque el yugo de su carga[a], y la vara sobre su hombro, la vara de su opresor, los has quebrantado[b] como en el día de Madián[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el yugo de su peso» o «el yugo de su opresión».
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene un verbo perfecto, «has quebrantado», una manera profética de hablar de la victoria de Dios como cierta; algunas traducciones lo traducen «quebrantarás».
    reason: alternative_reading
  - marker: c
    text: «El día de Madián» probablemente recuerda la derrota de Madián por Yahvé en tiempos de Gedeón (Jue 7).
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la base o razón del anuncio precedente; «Porque» conserva bien la relación discursiva y suena natural en español bíblico contemporáneo.
- source_word: עֹל סֻבֳּלוֹ
  english_pob_choice: the yoke of his burden
  chosen_spanish: el yugo de su carga
  alternatives_spanish:
  - el yugo de su peso
  - el yugo de su opresión
  lexicon: HALOT
  rationale: «עֹל» es literalmente «yugo», y «סֻבֳּל» expresa carga o peso llevado. «De su carga» mantiene la imagen concreta sin convertirla en abstracción, y en español conserva la tensión entre yugo e imposición.
- source_word: מַטֵּה שִׁכְמוֹ
  english_pob_choice: the staff on his shoulder
  chosen_spanish: la vara sobre su hombro
  alternatives_spanish:
  - el bastón sobre su hombro
  - el palo sobre su hombro
  lexicon: HALOT
  rationale: «מַטֶּה» puede ser vara, bastón o palo; «vara» comunica mejor el instrumento de imposición y evita confusión con «cetro». «Sobre su hombro» sigue de cerca la imagen del instrumento que carga o presiona.
- source_word: שֵׁבֶט הַנֹּגֵשׂ בּוֹ
  english_pob_choice: the rod of his oppressor
  chosen_spanish: el cetro de su opresor
  alternatives_spanish:
  - la vara de su opresor
  - el látigo de su opresor
  - la vara del que lo oprime
  lexicon: HALOT
  rationale: «שֵׁבֶט» puede significar vara, cetro o bastón; en este contexto de dominación, «cetro» transmite con fuerza el poder coercitivo y la figura del dominador. «Opresor» traduce bien «נֹגֵשׂ» como quien impone trabajo o presión.
- source_word: הַחִתֹּתָ
  english_pob_choice: you have shattered them
  chosen_spanish: los has quebrantado
  alternatives_spanish:
  - los has roto
  - los has pulverizado
  - los has destrozado
  lexicon: HALOT
  rationale: El verbo expresa quebrar o hacer pedazos. «Has quebrantado» conserva el valor de ruptura y mantiene un registro bíblico claro en español sin exagerar el grado de destrucción.
- source_word: כְּיוֹם מִדְיָן
  english_pob_choice: as on the day of Midian
  chosen_spanish: como en el día de Madián
  alternatives_spanish:
  - como en el tiempo de Madián
  - como el día de Madián
  lexicon: HALOT
  rationale: La comparación alude al triunfo de Yahvé sobre Madián. «Madián» es la forma usual del topónimo en español bíblico; «como en el día de Madián» conserva la referencia histórica de modo sobrio y comprensible.
theological_decisions:
- issue: Prophetic perfect and divine agency
  english_pob_reading: 'Render the perfect verb as a completed act addressed to God: ''you have shattered them.'''
  chosen_spanish_reading: 'Traducir el perfecto como acción consumada: «los has quebrantado».'
  alternative_spanish_readings:
  - los quebrantarás
  - los quebrantaste
  rationale: El hebreo profético usa con frecuencia el perfecto para presentar como cierto un acto futuro de liberación. El presente español perfecto compuesto («has quebrantado») conserva mejor ese valor de certeza cumplida en el discurso que un simple futuro, sin perder la fuerza profética.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Historical allusion to Midian
  english_pob_reading: '''The day of Midian'' likely recalls the LORD''s defeat of Midian in the days of Gideon (Judg 7).'
  chosen_spanish_reading: Mantener la alusión histórica con «el día de Madián».
  alternative_spanish_readings:
  - el día en que derrotaste a Madián
  - como en los días de Gedeón
  rationale: La frase breve conserva la alusión intertextual sin explicitarla dentro del texto principal. El referente de Jueces 7 queda disponible para nota, respetando la economía del original.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en alto acuerdo con el audit trail y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto para el nombre divino en notas cuando el contexto lo exige; aquí no era necesario en el texto principal.
  - Se tradujo «opresor» para נֹגֵשׂ según el valor coercitivo indicado por el audit trail, evitando «señor» o «amo» por ser menos precisos en este contexto.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque el versículo no contiene יהוה explícito en la línea hebrea dada.
  - Se preservó la triple imagen de yugo, vara sobre el hombro y cetro/opresor sin fusionar los miembros, para no borrar la acumulación retórica del hebreo.
