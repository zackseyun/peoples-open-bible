translation:
  language: es
  text: Porque las costumbres de los pueblos son vanidad,[a] porque del bosque se corta un árbol, obra de las manos de un artesano con un hacha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una azuela»; el término hebreo se refiere a una herramienta para cortar o dar forma a la madera, y el instrumento exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקּוֹת
  english_pob_choice: customs
  chosen_spanish: usos
  alternatives_spanish:
  - costumbres
  - prácticas
  - estatutos
  lexicon: HALOT
  rationale: En este contexto polémico sobre la idolatría, el término no apunta a leyes formales sino a prácticas acostumbradas. «Usos» conserva esa idea de conducta establecida sin cargar demasiado el término jurídico de «estatutos».
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: «Los pueblos» mantiene el matiz colectivo-étnico del plural hebreo y suena natural en español. Evita convertir el término en una categoría político-geográfica más moderna.
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vaciedad
  - futilidad
  - un soplo
  lexicon: HALOT
  rationale: «Vanidad» reproduce la carga tradicional de emptiness/futility que el contexto anti-idolátrico reclama, sin suavizar la fuerza evaluativa del hebreo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - ya que
  - de hecho
  lexicon: HALOT
  rationale: El repetido כִּי introduce la razón de la afirmación anterior. «Porque» reproduce con naturalidad esa relación causal y respeta la repetición sintáctica.
- source_word: עֵץ
  english_pob_choice: a tree
  chosen_spanish: un árbol
  alternatives_spanish:
  - madera
  lexicon: HALOT
  rationale: Aquí el hebreo presenta el objeto concreto tomado del bosque antes de ser trabajado. «Un árbol» conserva la imagen viva; «madera» sería más abstracto.
- source_word: מִיַּעַר
  english_pob_choice: from the forest
  chosen_spanish: del bosque
  alternatives_spanish:
  - de la selva
  lexicon: HALOT
  rationale: «Del bosque» es la equivalencia natural de la preposición más el sustantivo, y mantiene el origen del material.
- source_word: כְּרָתוֹ
  english_pob_choice: is cut
  chosen_spanish: es cortado
  alternatives_spanish:
  - lo cortan
  - se corta
  lexicon: HALOT
  rationale: La forma verbal se refiere al árbol/objeto cortado. «Es cortado» conserva el foco pasivo sobre la pieza de madera, sin introducir un sujeto explícito ausente en el hebreo.
- source_word: מַעֲשֵׂה יְדֵי חָרָשׁ
  english_pob_choice: the work of the hands of a craftsman
  chosen_spanish: obra de las manos de un artesano
  alternatives_spanish:
  - obra artesanal
  - trabajo de las manos de un artesano
  lexicon: HALOT
  rationale: 'La cadena constructa subraya fabricación humana. «Obra de las manos de un artesano» preserva la imagen y la polémica: el ídolo es producido por manos humanas.'
- source_word: חָרָשׁ
  english_pob_choice: craftsman
  chosen_spanish: artesano
  alternatives_spanish:
  - oficial
  - artífice
  - trabajador experto
  lexicon: HALOT
  rationale: «Artesano» es amplio y natural en español para un experto en trabajo manual, sin restringir indebidamente a un oficio específico.
- source_word: בַּמַּעֲצָד
  english_pob_choice: with an axe
  chosen_spanish: con un hacha
  alternatives_spanish:
  - con un adze
  - con una herramienta
  lexicon: HALOT
  rationale: El implemento exacto es incierto; el contexto de cortar madera favorece una herramienta de corte clara para el lector. «Hacha» comunica bien el acto, mientras que el término preciso puede variar.
theological_decisions:
- issue: Formulación de la condena a la idolatría sin introducir terminología doctrinal ajena al verso
  english_pob_reading: For the customs of the peoples are vanity
  chosen_spanish_reading: Porque los usos de los pueblos son vanidad
  alternative_spanish_readings:
  - Porque las costumbres de los pueblos son vacías
  - Porque las prácticas de los pueblos son vanidad
  rationale: El verso denuncia la vaciedad de los cultos e imágenes hechos por humanos, pero el hebreo no usa vocabulario técnico posterior. «Vanidad» mantiene la fuerza profética y la crítica a lo inútil/insustancial sin sobreexplicar.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación causal marcada por el segundo כִּי
  english_pob_reading: for a tree is cut from the forest
  chosen_spanish_reading: porque un árbol es cortado del bosque
  alternative_spanish_readings:
  - ya que un árbol es cortado del bosque
  - pues un árbol es cortado del bosque
  rationale: 'La repetición de «porque» refleja el doble כִּי del hebreo y mantiene la progresión argumentativa del versículo: la vanidad de los cultos queda evidenciada por su origen material y humano.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se mantuvo la doble relación causal con «porque» para reflejar el repetido כִּי, y se preservó la estructura formal «obra de las manos de un artesano» ajustada al español natural. También se mantuvo la nota sobre la incertidumbre del instrumento de corte.'
  spanish_consistency_notes:
  - Se conservó el paralelismo causal del hebreo con dos «porque», en línea con la revisión inglesa reciente.
  - «Los pueblos» y «usos» mantienen el registro neutral y evitan un calco rígido de términos jurídicos.
  - La nota al pie marca la incertidumbre léxica del implemento, equivalente a la observación inglesa sobre «axe/adze».
