translation:
  language: es
  text: 'Y él presentará su ofrenda a Yahvé: un cordero macho de un año sin defecto para holocausto, y una cordera de un año sin defecto para ofrenda por el pecado[a], y un carnero sin defecto para ofrendas de paz[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación» para «ofrenda por el pecado». El hebreo חַטָּאת puede referirse tanto al pecado como a la ofrenda asociada con la purificación de la impureza o la culpa.
    reason: alternative_reading
  - marker: b
    text: O «ofrendas de bienestar» o «ofrendas de comunión» para «ofrendas de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: and he shall present
  chosen_spanish: y él presentará
  alternatives_spanish:
  - y él ofrecerá
  - y él acercará
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב significa presentar/acercar una ofrenda. "Presentará" conserva el sentido ritual con español natural y formal.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su regalo
  - su sacrificio
  lexicon: HALOT
  rationale: קרבן es la ofrenda traída al culto; "ofrenda" es el equivalente claro y directo en español bíblico contemporáneo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el nombre divino: "Yahvé". La preposición aquí marca destino/dedicación de la ofrenda, por lo que "a Yahvé" es natural en español.'
- source_word: כֶּבֶשׂ ... בֶּן שְׁנָתוֹ
  english_pob_choice: one male lamb a year old
  chosen_spanish: un cordero macho de un año
  alternatives_spanish:
  - un cordero macho de un año de edad
  - un cordero macho en su primer año
  lexicon: HALOT
  rationale: Se conserva la distinción de sexo y edad. "Cordero macho" refleja כֶּבֶשׂ en este contexto; "de un año" reproduce el idiomatismo hebreo de la edad.
- source_word: תָמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  lexicon: HALOT
  rationale: En legislación sacrificial, תמים denota animal apto, sin defecto físico. "Sin defecto" es claro, culto y preciso en español.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda completamente consumida por fuego. "Holocausto" es el término tradicional y comprensible en español bíblico para este género sacrificial.
- source_word: וְכַבְשָׂה ... בַּת שְׁנָתָהּ
  english_pob_choice: and one ewe lamb a year old
  chosen_spanish: y una cordera de un año
  alternatives_spanish:
  - y una oveja joven hembra de un año
  - y una cordera en su primer año
  lexicon: HALOT
  rationale: כַבְשָׂה es la hembra de la especie; "cordera" preserva la distinción sexual y suena natural en español. Se mantiene la edad con "de un año".
- source_word: תְּמִימָה
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  lexicon: HALOT
  rationale: La forma femenina repite el mismo valor cultual. Se mantiene la traducción consistente con el masculino.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - para ofrenda por el pecado
  - para ofrenda de purificación
  lexicon: HALOT
  rationale: Se preserva la tensión semántica de חטאת sin forzar una sola equivalencia. Aquí "expiación" comunica el valor ritual del sacrificio y permite conservar la alternativa interpretativa en nota.
- source_word: וְאַיִל אֶחָד
  english_pob_choice: and one ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho cabrío
  lexicon: HALOT
  rationale: אַיִל es un carnero, no un término genérico. Se mantiene la sencillez numérica y zoológica del hebreo.
- source_word: לִשְׁלָמִים
  english_pob_choice: for peace offerings
  chosen_spanish: para ofrendas de paz
  alternatives_spanish:
  - para ofrendas de comunión
  - para ofrendas de bienestar
  lexicon: HALOT
  rationale: Se evita reemplazar automáticamente el término por una sola glosa tradicional. "Ofrendas de paz" preserva la categoría sacrificial y deja abierta la amplitud semántica de שְׁלָמִים.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El sistema del proyecto exige transliterar el nombre del pacto como "Yahvé" en el texto principal, evitando el reemplazo por una máscara como "SEÑOR". Se conserva así la referencia explícita al Nombre divino del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: La POB inglesa mantuvo "sin offering" en el texto y reservó en nota la posibilidad de "purification offering". En español, "expiación" permite no decidir prematuramente entre pecado y purificación, preservando la tensión léxica documentada.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Categoría sacrificial לִשְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de bienestar
  - ofrendas de comunión
  rationale: Se conserva una traducción amplia y tradicional sin reducir el término a una sola interpretación devocional. Esto mantiene la categoría ritual con suficiente apertura semántica.
  doctrine_reference: HALOT; consistency with sacrificial taxonomy
translation_notes:
  revision_awareness: 'El inglés POB revisó el orden para reflejar con más naturalidad el hebreo: "one male lamb a year old" y "one ewe lamb a year old". La versión española sigue ese mismo ajuste, conservando además la distinción sexual y la edad. También se mantuvo la decisión auditada de preservar la tensión de חטאת mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene la distinción léxica entre "cordero macho", "cordera" y "carnero" para reflejar las tres ofrendas distintas.
  - '"Sin defecto" se usa de manera uniforme para תָמִים / תְּמִימָה.'
  - La categoría sacrificial de שְׁלָמִים queda como "ofrendas de paz", con nota para las alternativas semánticas.
  - Se evita el calco rígido de "burnt offering"; "holocausto" es el equivalente bíblico asentado en español.
