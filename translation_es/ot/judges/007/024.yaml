    rationale: 'El hebreo coordina objetos directos: «las aguas ... y el Jordán». En español bíblico natural, «y el Jordán» mantiene mejor la estructura y evita una construcción algo trabada.'
  - severity: low
    issue: La colocación «fue llamado todo hombre de Efraín» es menos natural
    rationale: «Todo hombre de Efraín fue llamado» suena más natural en español sin alterar el sentido pasivo/colectivo que el POB quiso preservar.
