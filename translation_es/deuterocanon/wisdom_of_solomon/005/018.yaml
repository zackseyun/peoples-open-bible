translation:
  language: es
  text: Se vestirá de rectitud como coraza[a], y se pondrá un casco de juicio imparcial[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia como coraza». δικαιοσύνη puede significar tanto «rectitud» como «justicia»; aquí se ha preferido «rectitud» para reflejar la cualidad moral del término en esta metáfora de armadura.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «juicio sin hipocresía», es decir, un juicio genuino e imparcial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσεται
  english_pob_choice: will put on
  chosen_spanish: se vestirá
  alternatives_spanish:
  - se pondrá
  - se revestirá
  lexicon: BDAG / uso bíblico de ἐνδύω
  rationale: El griego expresa la acción deliberada de ponerse una prenda o armadura. «Se vestirá» conserva la imagen de ponerse armadura y suena natural en español para una metáfora militar.
- source_word: θώρακα
  english_pob_choice: breastplate
  chosen_spanish: coraza
  alternatives_spanish:
  - pechera
  - armadura de pecho
  lexicon: LSJ
  rationale: θώρακα nombra la pieza de armadura para el torso. En español, «coraza» es claro, sobrio y fiel al campo bélico del texto.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: BDAG / DOCTRINE.md contested terms
  rationale: Aunque el inglés POB optó por «righteousness», el proyecto reconoce que δικαιοσύνη puede abarcar «justice». En español, «justicia» conserva mejor la ambigüedad bíblica y el paralelo con el segundo miembro de la línea; «rectitud» queda como alternativa contextual.
- source_word: περιθήσεται
  english_pob_choice: will wear
  chosen_spanish: se pondrá
  alternatives_spanish:
  - se colocará
  - se ceñirá
  lexicon: LSJ
  rationale: El verbo implica poner alrededor o sobre la cabeza. «Se pondrá» es la forma más natural para un casco y mantiene la acción intencional de equiparse.
- source_word: κόρυθα
  english_pob_choice: helmet
  chosen_spanish: casco
  alternatives_spanish:
  - yelmo
  - helmeta
  lexicon: LSJ
  rationale: El término designa un casco militar. «Casco» es el equivalente moderno más claro y ampliamente inteligible; «yelmo» sería más arcaizante.
- source_word: κρίσιν
  english_pob_choice: impartial judgment
  chosen_spanish: juicio imparcial
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: BDAG
  rationale: κρίσις aquí refiere al ejercicio de juzgar, no solo al acto de emitir sentencia. «Juicio imparcial» comunica la función judicial con la cualidad de no tener parcialidad.
- source_word: ἀνυπόκριτον
  english_pob_choice: impartial
  chosen_spanish: imparcial
  alternatives_spanish:
  - sincero
  - sin hipocresía
  - genuino
  lexicon: BDAG
  rationale: El adjetivo significa literalmente «sin hipocresía» y puede traducirse como auténtico o genuino. Aquí «imparcial» sigue la revisión inglesa y expresa bien la ausencia de favoritismo en el juicio.
theological_decisions:
- issue: δικαιοσύνη en metáfora de armadura
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: La tradición del proyecto deja δικαιοσύνη como «righteousness» por defecto, pero en español «justicia» resulta más natural y conserva el paralelismo conceptual con «juicio imparcial». No se usa una paráfrasis moralizante; se mantiene la imagen de armadura.
  doctrine_reference: 'DOCTRINE.md: contested terms table, δικαιοσύνη → righteousness / justice as context permits'
- issue: κρίσις ἀνυπόκριτον como cualidad del juicio
  english_pob_reading: impartial judgment
  chosen_spanish_reading: juicio imparcial
  alternative_spanish_readings:
  - juicio sincero
  - juicio sin hipocresía
  - sentencia imparcial
  rationale: La combinación no describe solo un veredicto, sino el ejercicio de juzgar sin parcialidad. «Juicio imparcial» preserva la tensión entre acto judicial y cualidad ética del juez.
  doctrine_reference: BDAG κρίσις; BDAG ἀνυπόκριτος
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y toma en cuenta la revisión inglesa más reciente, especialmente la actualización de «sincere judgment» a «impartial judgment». También se respeta la decisión auditada de mantener el lenguaje bélico y la tensión léxica de δικαιοσύνη y κρίσις ἀνυπόκριτον sin suavizarlos.
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico moderno y sobrio, con vocabulario comprensible en toda Hispanoamérica.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino ni una cita directa del tetragrámaton.
  - «Justicia» se usa aquí como equivalente contextual de δικαιοσύνη; no se fuerza «rectitud» donde el paralelismo con el segundo hemistiquio favorece «justicia».
  - «Juicio imparcial» busca conservar tanto κρίσις como ἀνυπόκριτον sin caer en una traducción puramente interpretativa.
