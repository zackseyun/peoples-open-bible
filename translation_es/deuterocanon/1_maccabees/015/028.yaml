    rationale: La nota justifica una transliteración defectuosa y apela al inglés; no preserva una alternativa fuente relevante y debe eliminarse.
  - severity: low
    issue: 'Error ortográfico en nota b): «citadela»'
    rationale: La forma correcta en español es «ciudadela».
