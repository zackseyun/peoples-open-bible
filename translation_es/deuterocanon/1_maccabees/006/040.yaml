  to: Y parte del campamento del rey se extendió sobre los montes altos[a], y otra parte por las tierras bajas; y avanzaban con seguridad y en formación.
  rationale: Se reemplaza «algunos» por «otra parte» para reflejar mejor la distribución de la fuerza militar, no de individuos sueltos. También se ajusta «sobre las tierras bajas» a «por las tierras bajas» para una expresión española más natural del despliegue sobre el terreno. El resto del versículo es fiel al griego y al razonamiento léxico documentado.
