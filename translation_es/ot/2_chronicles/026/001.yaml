translation:
  language: es
  text: Entonces todo el pueblo de Judá tomó[a] a Uzías, que tenía dieciséis años[b], y lo hizo rey en lugar de su padre Amasías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «escogió a Uzías». El verbo hebreo es literalmente «tomó», pero en este contexto se refiere a la acción del pueblo al elevarlo al trono.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y él tenía dieciséis años». La conjunción hebrea puede entenderse de modo simplemente conectivo; aquí se vierte con una cláusula relativa más natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - escogió
  - recibió
  lexicon: HALOT
  rationale: לקח significa literalmente “tomar”. En este contexto de entronización, “tomó” conserva la fuerza del hebreo sin añadir una acción que el texto no expresa. En español, el singular colectivo “todo el pueblo” permite la concordancia natural con el verbo en singular.
- source_word: כָּל עַם יְהוּדָה
  english_pob_choice: all the people of Judah
  chosen_spanish: todo el pueblo de Judá
  alternatives_spanish:
  - todo Judá
  - todo el pueblo judío
  lexicon: HALOT
  rationale: La expresión es literalmente “todo el pueblo de Judá”. Se conserva la referencia al colectivo humano (עַם) y al territorio/pueblo de Judá, evitando la compresión de “todo Judá” que pierde esa precisión.
- source_word: עֻזִּיָּהוּ
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Azarías
  lexicon: Nombre propio hebreo
  rationale: El nombre del versículo es עֻזִּיָּהוּ, normalmente transcrito al español como “Uzías”. Se mantiene esta forma porque es la correspondiente al nombre presente en este pasaje; “Azarías” es una forma alterna en otros textos, no aquí.
- source_word: וְהוּא בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: who was sixteen years old
  chosen_spanish: que tenía dieciséis años
  alternatives_spanish:
  - y tenía dieciséis años
  - siendo de dieciséis años
  lexicon: HALOT
  rationale: La construcción hebrea equivale idiomáticamente a “tener dieciséis años”. “Que tenía dieciséis años” reproduce la función explicativa de la cláusula sin introducir una lectura concesiva que no está en el texto.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  english_pob_choice: made him king
  chosen_spanish: lo hicieron rey
  alternatives_spanish:
  - lo coronaron rey
  - lo constituyeron rey
  lexicon: HALOT
  rationale: El hifil de מלך significa “hacer rey” o “hacer que reine”. “Lo hicieron rey” es fiel y natural en español. “Coronaron” añade un rito no explicitado; “constituyeron” es más formal pero menos directo.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: En contextos sucesorios, תַּחַת significa “en lugar de”. Se elige la forma española más clara y común para expresar reemplazo real.
- source_word: אָבִיו אֲמַצְיָהוּ
  english_pob_choice: his father Amaziah
  chosen_spanish: su padre Amasías
  alternatives_spanish:
  - su padre Amazías
  lexicon: Nombre propio hebreo
  rationale: Se traduce el vínculo filial de manera directa y se usa “Amasías”, forma española estable del nombre אֲמַצְיָהוּ.
translation_notes:
  revision_awareness: La decisión sigue la revisión más reciente del contexto en inglés, que neutralizó la lectura concesiva de la conjunción hebrea y dejó la cláusula de edad como un relativo simple (“who was sixteen years old”). La versión española evita tanto la concesión como la literalidad dura, manteniendo el mismo ajuste de sentido.
  spanish_consistency_notes:
  - Se conserva la nomenclatura POB para el nombre divino solo cuando corresponde; este versículo no contiene יהוה explícito.
  - Se mantiene “pueblo de Judá” en vez de “Judá” sin sustantivo, para reflejar עַם.
  - Se evita “coronó” para no introducir ceremonial no presente en el hebreo.
