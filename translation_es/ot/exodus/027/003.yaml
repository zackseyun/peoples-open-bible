review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y la mayoría de los implementos del altar, incluyendo la función de סִּירֹתָיו לְדַשְּׁנוֹ como recipientes para retirar las cenizas, y mantiene correctamente נְחֹשֶׁת como bronce. Sin embargo, varias elecciones léxicas se apartan innecesariamente del sentido auditado: ''tazones'' debilita el matiz cultual de מִזְרְקֹתָיו mejor captado por ''tazones'' o preferiblemente ''vasijas/cuencos'' para aspersión, pero sobre todo ''braseros'' para מַחְתֹּתָיו sugiere el objeto doméstico o calefactor en español y no un recipiente portátil para brasas; ''cazos para brasas'' o ''braserillos'' sería más exacto, pero ''braseros'' no es ideal. Además, la nota [a] no preserva la alternativa literal inglesa ''fat ashes''/''cenizas grasosas'', sino que repite casi el texto principal.'
  spanish_quality_summary: El español es legible y digno, pero algunos términos suenan demasiado domésticos o ambiguos para mobiliario cultual. 'Ollas' funciona, aunque 'vasijas' también sería posible; 'palas' está bien. 'Tazones' es entendible pero algo casero; 'garfios' puede sonar más a ganchos que a utensilios de varias púas, mientras que 'tenedores' sería demasiado doméstico; 'garfios' es aceptable pero no óptimo. El principal problema de naturalidad/precisión es 'braseros', que en español general suele evocar un recipiente para calentar o un brasero doméstico, no una pala o recipiente cultual para carbones. La puntuación y sintaxis están bien.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la consistencia con נְחֹשֶׁת -> 'bronce', que el borrador mantiene correctamente. La revisión propuesta también conserva la decisión del POB de dejar 'pots' como base nominal y expresar la función aparte, y mejora la preservación de la nota léxica sobre las 'cenizas grasosas'.
  issues:
  - severity: medium
    issue: La nota [a] no conserva la alternativa literal documentada en el POB inglés.
    rationale: La nota inglesa explica literalmente 'for removing its fat ashes'. La nota española actual repite 'para quitar sus cenizas' y omite el elemento 'grasosas', que es precisamente la alternativa léxica preservada.
  - severity: medium
    issue: '''Braseros'' para מַחְתֹּתָיו es impreciso en español.'
    rationale: Aunque relacionado con brasas, 'brasero' suele designar un recipiente para calefacción o fuego estacionario. El hebreo aquí apunta a recipientes/palas para llevar brasas o fuego; 'braserillos' o 'cazos para brasas' comunica mejor el utensilio cultual.
  - severity: low
    issue: '''Tazones'' para מִזְרְקֹתָיו puede sonar demasiado doméstico.'
    rationale: El inglés auditado eligió 'basins' por su uso cultual para líquidos/sangre. En español, 'tazones' es comprensible, pero 'vasijas' o 'cuencos' puede ajustarse mejor al registro ritual sin sonar hogareño.
  revised_spanish_text: Harás sus ollas[a] para quitar sus cenizas, y sus palas, y sus vasijas, y sus garfios, y sus cazos para brasas[b]; harás todos sus utensilios de bronce.
  revised_footnotes:
