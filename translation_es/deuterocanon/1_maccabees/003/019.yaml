translation:
  language: es
  text: porque la victoria en la guerra no está en una multitud de fuerza[a], sino que la fuerza viene del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero la fuerza» o «el poder viene del cielo». El griego contrapone la fuerza humana acumulada con la fuerza concedida desde la esfera divina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήθει
  english_pob_choice: a multitude of
  chosen_spanish: multitud de
  alternatives_spanish:
  - abundancia de
  - gran número de
  lexicon: LSJ
  rationale: πλῆθος expresa una gran cantidad o multitud. En español, «multitud de» reproduce con naturalidad la idea de una cantidad acumulada, sin reducirla solo a número de soldados.
- source_word: δυνάμεως
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - potencia
  - fortaleza
  lexicon: LSJ
  rationale: δύναμις puede significar fuerza, poder o capacidad. Aquí, en contraste con la ayuda venida «de los cielos», «fuerza» conserva el alcance militar y general del término sin volverlo demasiado técnico.
- source_word: νίκη πολέμου
  english_pob_choice: victory in war
  chosen_spanish: la victoria en la guerra
  alternatives_spanish:
  - la victoria de la batalla
  - la victoria en combate
  lexicon: LSJ
  rationale: El genitivo πολέμου califica el ámbito de la victoria. «En la guerra» es la opción más natural en español y preserva el contexto bélico.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - del cielo arriba
  lexicon: LSJ
  rationale: En uso judío-griego, «cielo(s)» puede funcionar como circunloquio reverente de la fuente divina. «De los cielos» mantiene ese matiz y la relación con la procedencia divina sin resolverlo explícitamente como «de Dios».
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - la fortaleza
  - la potencia
  lexicon: LSJ
  rationale: ἰσχύς denota fuerza o vigor efectivo. Repetir «fuerza» en español conserva el paralelo con δύναμις y la antítesis entre fuerza humana acumulada y fuerza que proviene de lo alto.
theological_decisions:
- issue: Circunloquio reverente de origen divino en ἐκ τοῦ οὐρανοῦ
  english_pob_reading: from heaven
  chosen_spanish_reading: de los cielos
  alternative_spanish_readings:
  - de Dios
  - del cielo
  rationale: El griego dice literalmente «de los cielos», una manera reverente de hablar del origen de la ayuda sin nombrar directamente a Dios. La redacción española conserva esa formulación en vez de explicitar el referente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa más reciente suavizó «the victory of war» a «victory in war» para sonar más natural; la presente redacción española sigue esa misma intención de naturalidad sin perder el sentido bélico del genitivo. También conserva la contraposición entre la fuerza humana acumulada y la fuerza que procede de lo alto.
  spanish_consistency_notes:
  - Se mantuvo «fuerza» para δυνάμεως e ἰσχύς, reproduciendo la repetición y el contraste del griego.
  - Se prefirió «de los cielos» para ἐκ τοῦ οὐρανοῦ por su tono reverente y su ambigüedad teológica controlada.
  - «Victoria en la guerra» evita un calco rígido y sigue siendo fiel al ámbito bélico del texto.
