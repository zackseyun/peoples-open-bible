revisions:
- from: Todos nosotros [a] gruñimos como osos, y como palomas gemimos continuamente; esperamos justicia, y no hay ninguna; por salvación [b], pero está lejos de nosotros.
  to: Todos nosotros gruñimos como osos, y como palomas gemimos continuamente; esperamos[a] justicia, pero no la hay; esperamos salvación[b], pero está lejos de nosotros.
  rationale: Se reubicó la nota [a] para que corresponda al verbo נְקַוֶּה, se mejoró el contraste con «pero no la hay», y se sustituyó «por salvación» por «esperamos salvación» para producir un español natural sin perder la elipsis y el sentido del hebreo.
