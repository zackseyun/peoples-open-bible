translation:
  language: es
  text: Ahora, no endurezcan su cerviz como sus padres hicieron. Den la mano a Yahvé[a], y entren en su santuario, que él ha consagrado para siempre, y sirvan a Yahvé su Dios, para que su ardiente ira se aparte de ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «Den la mano a Yahvé»: un hebraísmo que puede significar entrega, sumisión o compromiso leal.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «y su ardiente ira se apartará de ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּקְשׁוּ עָרְפְּכֶם
  english_pob_choice: stiffen your neck
  chosen_spanish: endurezcan su cerviz
  alternatives_spanish:
  - endurezcan el cuello
  - sean cerviz dura
  - pongan rígida su cerviz
  lexicon: HALOT
  rationale: La imagen hebrea habla de hacer dura la nuca/cerviz como señal de terquedad. En español, 'endurecer la cerviz' conserva la metáfora bíblica y comunica resistencia obstinada sin sonar forzado.
- source_word: כַּאֲבוֹתֵיכֶם
  english_pob_choice: as your fathers did
  chosen_spanish: como sus padres
  alternatives_spanish:
  - como sus antepasados
  - igual que sus padres
  lexicon: HALOT
  rationale: '''Padres'' reproduce con precisión el referente del texto y mantiene el paralelismo generacional del original. Se omite ''did'' porque en español la comparación ya queda clara por el contexto.'
- source_word: תְּנוּ יָד לַיהוָה
  english_pob_choice: Give your hand to Yahweh
  chosen_spanish: Den la mano a Yahvé
  alternatives_spanish:
  - Entréguense a Yahvé
  - Sométanse a Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta de 'dar la mano', que en hebreo expresa rendición, compromiso o sumisión. 'Yahvé' se usa conforme al criterio base del proyecto para יהוה.
- source_word: לַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino יהוה. Según la norma del proyecto, se traduce 'Yahvé' para no ocultar el nombre detrás de un título genérico.
- source_word: מִקְדָּשׁוֹ
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su lugar santo
  - su templo
  lexicon: HALOT
  rationale: '''Santuario'' refleja bien מִקְדָּשׁ sin restringir de antemano la referencia a un edificio específico. En español es natural y conserva el sentido sagrado del lugar.'
- source_word: הִקְדִּישׁ לְעוֹלָם
  english_pob_choice: has consecrated forever
  chosen_spanish: ha consagrado para siempre
  alternatives_spanish:
  - ha santificado para siempre
  - ha dedicado para siempre
  lexicon: HALOT
  rationale: '''Consagrado'' expresa adecuadamente el valor cultual de קדשׁ y suena natural en español bíblico actual. ''Para siempre'' refleja לְעוֹלָם de manera directa y clara.'
- source_word: וְעִבְדוּ
  english_pob_choice: serve
  chosen_spanish: sirvan
  alternatives_spanish:
  - adoren
  - sirvan en adoración
  lexicon: HALOT
  rationale: עבד aplicado a Dios implica servicio obediente y culto. 'Sirvan' es la equivalencia más directa y mantiene la amplitud del verbo sin reducirlo solo a adoración litúrgica.
- source_word: וְיָשֹׁב מִכֶּם
  english_pob_choice: may turn away from you
  chosen_spanish: se aparte de ustedes
  alternatives_spanish:
  - se aleje de ustedes
  - vuelva atrás de ustedes
  lexicon: HALOT
  rationale: La forma verbal expresa resultado deseado dentro de la exhortación. 'Se aparte' comunica bien el alejamiento de la ira y evita convertir el matiz voluntativo en una simple predicción rígida.
- source_word: חֲרוֹן אַפּוֹ
  english_pob_choice: his burning anger
  chosen_spanish: su ardiente ira
  alternatives_spanish:
  - su ira ardiente
  - su furor ardiente
  - su furia ardiente
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de ira intensa y encendida. 'Ardiente ira' preserva la fuerza imagística y suena idiomático en español moderno.
theological_decisions:
- issue: La expresión idiomática תְּנוּ יָד לַיהוָה
  english_pob_reading: Give your hand to Yahweh
  chosen_spanish_reading: Den la mano a Yahvé
  alternative_spanish_readings:
  - Entréguense a Yahvé
  - Sométanse a Yahvé
  rationale: La decisión principal conserva la imagen corporal del hebreo, que puede denotar sometimiento, entrega de lealtad o pacto. Se evita sustituirla por una explicación directa en el texto principal para no borrar la tensión entre imagen y sentido.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor exhortativo de וְיָשֹׁב מִכֶּם
  english_pob_reading: so that his burning anger may turn away from you
  chosen_spanish_reading: para que su ardiente ira se aparte de ustedes
  alternative_spanish_readings:
  - y su ardiente ira se apartará de ustedes
  - para que su ardiente ira pueda apartarse de ustedes
  rationale: En el contexto, la cláusula expresa el resultado buscado por la exhortación, no una promesa automática desligada de la respuesta humana. 'Para que' en español conserva bien el matiz de finalidad/resulto esperado sin sobrecargar la modalidad.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la imagen idiomática de 'dar la mano', el valor cultual de 'consagró' y el modismo de 'ira ardiente'. No se detectaron revisiones posteriores que alteren la lectura base; el pass más reciente indica estabilidad textual.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se conservó 'cerviz' para mantener la imagen idiomática bíblica del hebreo.
  - '''Santuario'' se eligió como equivalente amplio y natural de מִקְדָּשׁ.'
  - '''Sirvan'' refleja el verbo עבד sin reducirlo a mero culto litúrgico.'
  - Se mantuvo la estructura exhortativa con 'para que' para expresar el resultado esperado de la obediencia.
