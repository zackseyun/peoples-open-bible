  text: אֵ֤לֶּה אֶזְכְּרָ֨ה וְ/אֶשְׁפְּכָ֬ה עָלַ֨/י נַפְשִׁ֗/י כִּ֤י אֶֽעֱבֹ֨ר בַּ/סָּךְ֮ אֶדַּדֵּ֗/ם עַד בֵּ֥ית אֱלֹ֫הִ֥ים בְּ/קוֹל רִנָּ֥ה וְ/תוֹדָ֗ה הָמ֥וֹן חוֹגֵֽג׀׀׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/042/005.yaml
  text: 'These things I remember[a], and I pour out my soul within me: how I used to go with the throng and lead them in procession to the house of God, with the voice of joyful shouting and thanksgiving[b], a festal multitude.'
  footnotes:
  - marker: a
    text: Or 'in the procession' for 'with the throng'; the Hebrew noun בַּסָּךְ is difficult and may refer to the gathered festival crowd or the processional company itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'guiding them' / 'going with them' for 'leading them'; the Hebrew verb אֶדַּדֵּם is rare and its precise nuance is uncertain, though the context clearly involves movement with others toward the house of God.
    reason: lexical_alternative
