revisions:
- from: Y sobre la mesa de la Presencia[a] extenderán un paño de color azul[b]; y pondrán sobre ella los platos, las copas, los tazones y las jarras para la libación; y el pan regular estará sobre ella.
  to: Y sobre la mesa de la Presencia[a] extenderán un paño azul, y pondrán sobre ella los platos, las copas, los tazones y las jarras para la libación; y el pan continuo[b] estará sobre ella.
  rationale: Se elimina la nota no necesaria sobre 'paño azul' y se restaura la nota léxica requerida para לֶחֶם הַתָּמִיד. Además, se mejora el texto principal a 'pan continuo', que suena más natural en español bíblico y refleja mejor la alternativa cultual documentada, manteniendo la opción 'pan regular' en nota. No se requieren cambios doctrinales ni adjudicación adicional.
