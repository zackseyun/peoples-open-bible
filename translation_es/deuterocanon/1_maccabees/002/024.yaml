translation:
  language: es
  text: Y Matatías lo vio y tuvo celo; y sus entrañas[a] temblaron, y sacó ira conforme al juicio[b], y corriendo hacia él lo degolló sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘sus riñones temblaron’; es un hebraísmo para una agitación interior profunda.
    reason: cultural_note
  - marker: b
    text: O ‘según lo que exigía el juicio’ / ‘conforme a la ordenanza’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήλωσεν
  english_pob_choice: was zealous
  chosen_spanish: tuvo celo
  alternatives_spanish:
  - fue celoso
  - ardió de celo
  lexicon: LSJ
  rationale: El griego expresa un celo intenso, con matiz de indignación santa. ‘Tuvo celo’ conserva la fuerza verbal y el vínculo con el motivo bíblico del celo, sin convertirlo en mera emoción pasajera.
- source_word: οἱ νεφροὶ αὐτοῦ
  english_pob_choice: his inward parts
  chosen_spanish: sus entrañas
  alternatives_spanish:
  - sus riñones
  - su interior
  lexicon: LSJ
  rationale: La imagen literal son ‘los riñones’, pero en español bíblico ‘entrañas’ comunica mejor la agitación interior sin perder el carácter corporal de la expresión idiomática.
- source_word: ἀνήνεγκεν θυμὸν
  english_pob_choice: he brought forth wrath
  chosen_spanish: sacó ira
  alternatives_spanish:
  - desató ira
  - hizo subir ira
  lexicon: LSJ
  rationale: La construcción es idiomática y no debe suavizarse. ‘Sacó ira’ mantiene la idea de dar salida a la indignación, con un español natural y sin borrar la imagen de acción hacia afuera.
- source_word: κατὰ τὸ κρίμα
  english_pob_choice: according to the judgment
  chosen_spanish: conforme al juicio
  alternatives_spanish:
  - según el juicio
  - según la sentencia
  - conforme al decreto
  lexicon: LSJ
  rationale: ‘Juicio’ conserva la ambigüedad judicial/normativa del κρίμα griego. ‘Conforme al juicio’ deja abierta la referencia exacta, como en el audit trail inglés.
- source_word: δραμὼν
  english_pob_choice: running up
  chosen_spanish: corriendo subió
  alternatives_spanish:
  - corrió hacia allá
  - corriendo
  lexicon: LSJ
  rationale: El participio indica rapidez y movimiento hacia un punto elevado o hacia el altar. ‘Corriendo subió’ refleja la dirección implícita y suena natural en español narrativo.
- source_word: ἔσφαξεν
  english_pob_choice: slaughtered
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo sacrificó
  - lo mató
  - lo degolló sacrificialmente
  lexicon: LSJ
  rationale: σφάζω implica matar con violencia y con frecuencia degollar. En este contexto, ‘degolló’ conserva la crudeza del acto mejor que ‘mató’, y evita una lectura litúrgica excesiva que el griego no explicita.
- source_word: ἐπὶ τὸν βωμόν
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: LSJ
  rationale: ‘Sobre el altar’ transmite la posición física del acto con el mismo impacto narrativo que el griego, sin necesidad de calcar la preposición de forma rígida.
theological_decisions:
- issue: Conservar el motivo de celo santo y juicio sin resolverlo interpretivamente
  english_pob_reading: Retain the language of zeal, judgment, and slaughter without softening or expanding it.
  chosen_spanish_reading: Conservar el lenguaje de celo, juicio e ira, sin convertirlo en ‘enojo’ o ‘ejecución legal’ explícita.
  alternative_spanish_readings:
  - tuvo indignación
  - ejecutó conforme a la ley
  - se enfureció
  rationale: 'El versículo presenta el acto con carga teológica y narrativa fuerte. La versión española mantiene esa tensión: celo, juicio e ira, sin suavizar la violencia ni cerrar el sentido del κρίμα a una sola interpretación.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete y el audit trail inglés: mantiene el celo, la agitación interior expresada corporalmente, la salida de la ira ‘conforme al juicio’ y la violencia inmediata del acto. Se conserva la tensión teológica sin ampliarla ni suavizarla.'
  spanish_consistency_notes:
  - Se usó ‘Y’ inicial para reproducir la coordinación narrativa del griego.
  - ‘Matatías’ sigue la forma hispana usual del nombre.
  - ‘Entrañas’ se eligió como equivalente idiomático de ‘riñones’ para una audiencia bíblica contemporánea.
  - ‘Juicio’ se mantuvo deliberadamente ambiguo para respetar κρίμα.
  - ‘Sobre el altar’ conserva el impacto espacial y narrativo del acto.
