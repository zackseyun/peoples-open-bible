review_pass:
  verdict: revise
  source_alignment_summary: 'La base del versículo está bien captada: vino, libación, media medida de hin, aroma agradable, y el nombre divino Yahvé. Sin embargo, la traducción de אִשֵּׁה como ''una ofrenda encendida'' no preserva con suficiente fidelidad el valor sacrificial específico ''ofrenda hecha por fuego'' / ''ofrenda de fuego'' documentado en la auditoría inglesa y en la revisión aplicada.'
  spanish_quality_summary: El español es claro y natural en general. 'Libación' y 'la mitad de un hin' funcionan bien. No obstante, 'ofrenda encendida' suena imprecisa y algo interpretativa; en español bíblico legible es preferible una formulación más transparente como 'una ofrenda hecha por fuego'. También conviene anclar la nota al término relevante, no a 'libación', porque la nota documenta alternativas de אִשֵּׁה, no de נֶסֶךְ.
  glossary_alignment: 'Se respeta correctamente Yahvé para יהוה. ''Libación'' es una opción aceptable para נֶסֶךְ. El principal desajuste terminológico está en אִשֵּׁה: la auditoría inglesa terminó en ''an offering made by fire'' y conservó ''fire offering'' como alternativa; el español debe reflejar esa decisión más directamente.'
  issues:
  - severity: high
    issue: '''una ofrenda encendida'' para אִשֵּׁה'
    rationale: La expresión no corresponde con suficiente precisión al término sacrificial hebreo ni a la revisión inglesa final. 'Encendida' puede sugerir solo que está ardiendo, pero no expresa claramente la categoría técnica de una ofrenda hecha por fuego.
  - severity: high
    issue: La nota al pie está anclada en 'libación' pero trata sobre אִשֵּׁה
    rationale: El contenido de la nota ofrece alternativas para 'ofrenda hecha por fuego' / 'ofrenda de fuego', no para נֶסֶךְ. Esto rompe la trazabilidad entre texto, nota y decisión léxica.
  - severity: low
    issue: Inconsistencia interna entre texto y nota
    rationale: El texto principal usa 'ofrenda encendida', pero la nota ofrece alternativas que en realidad serían mejores como texto principal. Esto debilita la coherencia editorial.
  revised_spanish_text: Y presentarás vino para la libación, la mitad de un hin, una ofrenda hecha por fuego[a], aroma agradable para Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O también: «una ofrenda de fuego».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'una ofrenda encendida' por 'una ofrenda hecha por fuego' para reflejar fielmente אִשֵּׁה y la revisión inglesa final. Se mueve la nota al término correcto y se simplifica para conservar solo la alternativa significativa restante en español.
