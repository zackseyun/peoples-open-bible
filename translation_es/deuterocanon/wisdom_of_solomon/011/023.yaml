translation:
  language: es
  text: Pero tienes misericordia de todos[a], porque puedes hacer todas las cosas, y pasas por alto[b] los pecados de los hombres para arrepentimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» o «seres humanos»; aquí el griego usa un plural genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: «Pasas por alto» significa que dejas el pecado sin castigo inmediato por misericordia, con miras al arrepentimiento, no que lo consideres sin importancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεεῖς
  english_pob_choice: have mercy on
  chosen_spanish: tienes misericordia de
  alternatives_spanish:
  - muestras misericordia a
  - te compadeces de
  lexicon: BDAG
  rationale: El verbo expresa compasión misericordiosa activa hacia otros. «Tienes misericordia de» es natural en español y conserva el peso teológico mejor que una opción más débil como «te compadeces de».
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los hombres
  - todas las personas
  - todos los seres humanos
  lexicon: BDAG
  rationale: El alcance es universal y no restringido. «Todos» mantiene la amplitud del griego con una forma breve y publicable en español.
- source_word: πάντα δύνασαι
  english_pob_choice: you are able to do all things
  chosen_spanish: puedes hacerlo todo
  alternatives_spanish:
  - eres capaz de hacer todas las cosas
  - puedes hacer todas las cosas
  lexicon: BDAG
  rationale: La frase afirma capacidad total. «Puedes hacerlo todo» transmite la idea de poder/aptitud completa en un español más natural que una construcción demasiado literal, sin perder la amplitud del original.
- source_word: παρορᾷς
  english_pob_choice: you overlook
  chosen_spanish: pasas por alto
  alternatives_spanish:
  - toleras por un tiempo
  - dejas pasar
  lexicon: BDAG
  rationale: Aquí el verbo no sugiere ignorancia ni aprobación del pecado, sino una forbearancia deliberada orientada al arrepentimiento. «Pasas por alto» conserva esa tensión mejor que «ignoras» o «disimulas».
- source_word: ἁμαρτήματα
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las transgresiones
  - las ofensas
  lexicon: BDAG
  rationale: «Pecados» es el equivalente más claro y teológicamente adecuado en español para este contexto.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de los seres humanos
  - de la humanidad
  lexicon: BDAG
  rationale: Aunque el griego es genérico para la humanidad, el proyecto permite preservar el masculino representativo cuando refleja la forma del original. «De los hombres» mantiene esa correspondencia; la nota puede explicitar el valor genérico.
- source_word: εἰς μετάνοιαν
  english_pob_choice: for repentance
  chosen_spanish: para arrepentimiento
  alternatives_spanish:
  - con miras al arrepentimiento
  - hacia el arrepentimiento
  lexicon: BDAG
  rationale: La preposición expresa finalidad o resultado. «Para arrepentimiento» refleja con mayor fidelidad la revisión inglesa reciente («for repentance») y evita añadir una cláusula verbal inexistente en el griego.
theological_decisions:
- issue: Alcance de la misericordia divina en ἐλεεῖς δὲ πάντας
  english_pob_reading: God has mercy on all.
  chosen_spanish_reading: Dios tiene misericordia de todos.
  alternative_spanish_readings:
  - Dios tiene misericordia de todas las personas
  - Dios muestra misericordia a todos
  rationale: La frase griega presenta un alcance universal. «Todos» preserva esa amplitud sin restringirla innecesariamente; la nota puede aclarar el valor genérico humano del sustantivo.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
- issue: Sentido de παρορᾷς ἁμαρτήματα ἀνθρώπων
  english_pob_reading: You overlook the sins of men for repentance.
  chosen_spanish_reading: pasas por alto los pecados de los hombres para arrepentimiento
  alternative_spanish_readings:
  - perdonas los pecados de los hombres
  - ignoras los pecados de los hombres
  rationale: El contexto une el verbo con εἰς μετάνοιαν; por eso debe entenderse como una paciencia misericordiosa orientada al arrepentimiento, no como indiferencia ante el pecado ni como absolución inmediata. «Pasas por alto» conserva esa tensión doctrinal.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Valor de εἰς μετάνοιαν
  english_pob_reading: for repentance
  chosen_spanish_reading: para arrepentimiento
  alternative_spanish_readings:
  - con miras al arrepentimiento
  - para que se arrepientan
  rationale: 'La revisión inglesa evita explicitar un verbo que el griego no tiene. El español debe hacer lo mismo: una frase nominal final que preserve la finalidad sin sobreinterpretar.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés al preferir una frase final nominal («para arrepentimiento») en lugar de una subordinada verbalizada. También conserva la tensión teológica entre misericordia y juicio en παρορᾷς, evitando traducirlo como ignorancia, indiferencia o perdón pleno en esa cláusula.
  spanish_consistency_notes:
  - Se mantiene «misericordia» para ἐλεεῖς, coherente con el uso teológico estándar y con el matiz de compasión activa.
  - Se conserva «todos» para el alcance universal, y la nota aclara el valor genérico humano del plural.
  - Se usa «hombres» como masculino representativo por fidelidad al griego; la nota ofrece equivalentes inclusivos posibles sin imponerlos en el texto.
  - «Para arrepentimiento» reproduce la estructura final breve del griego y evita expandir el sentido más allá de la evidencia textual.
