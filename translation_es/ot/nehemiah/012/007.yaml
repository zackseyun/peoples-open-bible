review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura básica del hebreo: lista de nombres, demostrativo plural, función de liderazgo entre los sacerdotes, ''sus hermanos'', y el marco temporal ''en los días de Jesúa/Jeshúa''. Sin embargo, el aparato de notas no sigue fielmente la auditoría inglesa: las notas a y b fueron desplazadas a variantes de nombres que no están motivadas por la evidencia fuente, y falta la nota léxica sobre ''jefes/cabezas'' y la alternativa contextual para ''sus hermanos''.'
  spanish_quality_summary: El español es claro y legible. 'Jefes de los sacerdotes' es natural, aunque conviene conservar la alternativa 'líderes de los sacerdotes' en nota porque el inglés auditado preserva la imagen hebrea de 'cabezas'. Los nombres adaptados al español son en general defendibles; no obstante, 'Salu' como forma principal es menos reconocible que 'Sallú', y la nota de variante no aporta valor. También conviene ordenar las notas para que anclen donde realmente hay ambigüedad semántica, no en nombres propios sin necesidad.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. El tratamiento de ''sacerdotes'', ''hermanos'' y el nombre ''Jesúa'' es compatible con la racionalidad documentada. La principal desalineación es metodológica: deben preservarse en español las alternativas semánticas relevantes del inglés POB, especialmente para רָאשֵׁי y וַאֲחֵיהֶם, mientras que no hace falta crear notas para variantes ortográficas de nombres sin respaldo necesario.'
  issues:
  - severity: medium
    issue: Las notas a y b del borrador no reflejan las notas significativas de la auditoría inglesa.
    rationale: El inglés POB documenta alternativas léxicas para 'heads of the priests' y 'their brothers', no variantes ortográficas de 'Sallu' o 'Hilkiah'. En español deben priorizarse esas decisiones semánticas.
  - severity: low
    issue: La nota cultural sobre Jesúa está anclada a 'Jedaías' en lugar de al nombre pertinente.
    rationale: La información sobre el nombre postexílico relacionado con 'Josué' corresponde a יֵשׁוּעַ, no a יְדַעְיָה.
  - severity: low
    issue: La forma principal 'Salu' es posible pero menos transparente que 'Sallú' para una transliteración española directa.
    rationale: Dado que el hebreo tiene consonante geminada y el inglés auditado usa Sallu, 'Sallú' representa mejor el nombre en español y evita depender de una nota de variante innecesaria.
