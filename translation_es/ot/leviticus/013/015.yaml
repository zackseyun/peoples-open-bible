translation:
  language: es
  text: Cuando el sacerdote vea la carne viva[a], lo declarará inmundo[b]. La carne viva es inmunda; es una afección de la piel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «carne viva»; tradicionalmente se traduce «carne cruda».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo declarará impuro». El sacerdote emite un dictamen ritual oficial de impureza.'
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente «lepra», pero el término hebreo se refiere más ampliamente a una afección cutánea o condición de la piel, no específicamente a la lepra moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: When the priest sees
  chosen_spanish: Cuando el sacerdote vea
  alternatives_spanish:
  - Y el sacerdote vea
  - Si el sacerdote ve
  lexicon: HALOT
  rationale: En la legislación sacerdotal, la secuencia con waw + qatal marca un paso procedimental; en español jurídico-litúrgico natural se expresa mejor con una cláusula temporal introducida por «Cuando». El subjuntivo futuro en español preserva el valor de procedimiento y condición ritual del hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el priest
  - el ministro sacerdotal
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente natural y tradicional en español para כֹּהֵן en Levítico, y comunica correctamente al funcionario que realiza la inspección ritual.
- source_word: הַבָּשָׂר הַחַי
  english_pob_choice: the raw flesh
  chosen_spanish: la carne viva
  alternatives_spanish:
  - la carne cruda
  - la carne expuesta
  lexicon: HALOT
  rationale: El hebreo dice literalmente «carne viva». A diferencia de la opción inglesa «raw flesh», en español «carne viva» conserva mejor la imagen lexical sin añadir una paráfrasis médica. Mantiene la tensión entre literalidad y claridad, y deja visible el carácter anómalo del tejido expuesto.
- source_word: וְטִמְּאוֹ
  english_pob_choice: he shall pronounce him unclean
  chosen_spanish: la declarará inmunda
  alternatives_spanish:
  - la declarará impura
  - la pronunciará inmunda
  lexicon: HALOT
  rationale: El piel de טמא con objeto personal en contextos de pureza suele expresar una declaración oficial, no la producción de impureza. En español, «declarará inmunda» refleja mejor la función forense del sacerdote que «la hará inmunda». Se usa el femenino porque el antecedente inmediato en español es «la carne». La referencia a la persona afectada queda implícita por el contexto legal, como en el hebreo.
- source_word: טָמֵא הוּא
  english_pob_choice: is unclean
  chosen_spanish: es inmunda
  alternatives_spanish:
  - es impura
  - está inmunda
  lexicon: HALOT
  rationale: «Inmunda» conserva el término ritual de Levítico y mantiene la categoría de pureza/impureza sin suavizarla con «impura». El español bíblico y legal admite este uso con suficiente claridad.
- source_word: צָרַעַת
  english_pob_choice: a skin disease
  chosen_spanish: una afección de la piel
  alternatives_spanish:
  - una enfermedad de la piel
  - lepra
  lexicon: HALOT
  rationale: El hebreo צָרַעַת no equivale de manera precisa a la lepra moderna. Siguiendo el criterio auditado de la POB en inglés, «afección de la piel» evita una identificación médica anacrónica y conserva el sentido amplio de condición cutánea bajo diagnóstico sacerdotal.
theological_decisions:
- issue: Naturaleza de la declaración sacerdotal de impureza
  english_pob_reading: he shall pronounce him unclean
  chosen_spanish_reading: la declarará inmunda
  alternative_spanish_readings:
  - lo declarará inmundo
  - la hará inmunda
  rationale: La legislación de pureza trata aquí de un dictamen ritual, no de una contaminación física causada por el sacerdote. La formulación española mantiene la autoridad declarativa del oficio sacerdotal y evita confundir la función legal con una acción causal.
  doctrine_reference: Levítico 13:3-8; 13:15; pureza ritual sacerdotal
- issue: Alcance de צָרַעַת
  english_pob_reading: skin disease
  chosen_spanish_reading: afección de la piel
  alternative_spanish_readings:
  - lepra
  - enfermedad de la piel
  rationale: «Afección de la piel» preserva la amplitud semántica del término hebreo y evita importar el diagnóstico moderno de lepra. La traducción mantiene la categoría ritual y no exige una equivalencia médica exacta.
  doctrine_reference: Levítico 13; normativa de pureza levítica
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto hebreo masorético y el criterio auditado de la POB en inglés, preservando el valor procedimental de la cláusula legal, la declaración sacerdotal de pureza/impureza y la amplitud semántica de צָרַעַת sin medicalizarlo como lepra moderna.
  spanish_consistency_notes:
  - Se conserva el término ritual «inmunda» para טמא, coherente con el vocabulario levítico de pureza.
  - Se usa «sacerdote» para הַכֹּהֵן en lugar de un calco más técnico, por ser el término español estándar y claro.
  - La nota de «afección de la piel» evita introducir una equivalencia médica cerrada y mantiene la lectura auditable de la POB.
  - 'Aunque el antecedente en español es femenino («la carne»), el sentido legal subyacente sigue siendo el mismo que en el inglés POB: el sacerdote emite una declaración ritual respecto de la condición inspectada.'
