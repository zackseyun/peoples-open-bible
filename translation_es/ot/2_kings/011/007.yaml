translation:
  language: es
  text: Y las dos divisiones entre ustedes[a], todos los que salen de turno el sábado[b], harán guardia en la casa de Yahvé para el rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «las dos manos entre ustedes»; aquí probablemente significa «las dos divisiones» o «las dos compañías».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los que salen el sábado». En el contexto, probablemente se refiere a los que salen de turno al cambio de guardia del sábado.'
    reason: alternative_reading
  - marker: c
    text: 'O: «guardarán la guardia de la casa de Yahvé hacia/para el rey». La preposición hebrea es difícil; el sentido parece ser custodiar la casa de Yahvé con miras a proteger al rey.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁתֵּי הַיָּדוֹת
  english_pob_choice: the two divisions
  chosen_spanish: las dos divisiones
  alternatives_spanish:
  - las dos compañías
  - las dos partes
  - las dos manos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘las dos manos’, en este contexto militar/organizativo יָד puede designar un sector o unidad. ‘Divisiones’ comunica con naturalidad dos grupos de guardia sin perder el sentido funcional.
- source_word: בָּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de ustedes
  - entre vosotros
  - de entre ustedes
  lexicon: HALOT
  rationale: La preposición con el pronombre de segunda persona plural indica que estas divisiones salen del grupo al que se dirige el texto. ‘Entre ustedes’ conserva la idea de pertenencia o ubicación dentro del conjunto.
- source_word: כֹּל יֹצְאֵי הַשַּׁבָּת
  english_pob_choice: all who go off duty on the Sabbath
  chosen_spanish: todos los que salen de turno en el sábado
  alternatives_spanish:
  - todos los que salen en el sábado
  - todos los que van a salir el sábado
  - todos los que salen de servicio en sábado
  lexicon: HALOT
  rationale: יֹצְאֵי literalmente es ‘los que salen’; en este marco de guardia, el sentido es el de quienes terminan su turno al llegar el sábado. ‘Salen de turno’ explicita la situación sin añadir más de lo que el contexto permite.
- source_word: וְשָׁמְרוּ
  english_pob_choice: shall keep watch
  chosen_spanish: guardarán la vigilancia
  alternatives_spanish:
  - harán guardia
  - velarán
  - mantendrán la guardia
  lexicon: HALOT
  rationale: שׁמר aquí expresa la acción de custodiar o vigilar. ‘Guardarán la vigilancia’ preserva el valor de guardia y evita confundirlo con un sentido más general de obedecer.
- source_word: אֶת מִשְׁמֶרֶת
  english_pob_choice: watch over
  chosen_spanish: la vigilancia de
  alternatives_spanish:
  - la guardia de
  - el encargo de
  - el cuidado de
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת es ‘vigilancia/guardia/turno de guardia’. Como en español ‘guardar la vigilancia de’ suena más pesado, se mantiene la relación verbal-nominal con una expresión clara y fiel al campo semántico.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva ‘casa’ para seguir de cerca el hebreo בֵּית, y se traduce el nombre divino como ‘Yahvé’ según el estándar doctrinal del proyecto. ‘Templo’ sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como ‘Yahvé’ en el texto principal, siguiendo la convención del proyecto para preservar el nombre personal del Dios de Israel sin sustituirlo por un título.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - hacia el rey
  - por el rey
  - en favor del rey
  lexicon: HALOT
  rationale: La preposición es difícil; en contexto la vigilancia del recinto tiene relación con la protección del rey. ‘Para el rey’ refleja la finalidad/relación práctica que el inglés POB destaca, sin cerrar indebidamente todas las posibilidades.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre propio. En español se adopta ‘Yahvé’ conforme al estándar del proyecto, manteniendo visible la identidad covenantal de Dios y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión auditada, que indicó concordancia alta y sin cambios necesarios. Se conserva la solución semántica de ‘divisiones’ para וּשְׁתֵּי הַיָּדוֹת, el matiz de turno de guardia para יֹצְאֵי הַשַּׁבָּת, y la ambigüedad controlada de אֶל הַמֶּלֶךְ.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se mantiene ‘casa’ y no ‘templo’ para בֵּית.
  - ‘Salen de turno’ busca reflejar el contexto militar de relevo y no una salida general.
  - Las notas al pie preservan las alternativas relevantes sin sobrecargar el texto principal.
