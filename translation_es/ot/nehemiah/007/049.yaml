lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia de
  lexicon: HALOT
  rationale: En listas genealógicas, el constructo plural de בֵּן puede señalar un grupo familiar o descendencia, no solo hijos inmediatos. En español, «los hijos de» conserva la forma del listado y es natural; «los descendientes de» explicita el valor corporativo, pero pierde la repetición formal del hebreo.
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Hanan
  alternatives_spanish:
  - Janan
  lexicon: nombre propio (transliteración)
  rationale: Es un nombre propio; se translitera sin traducir. Se conserva la forma conocida en español bíblico y académicamente legible.
- source_word: גִדֵּל
  english_pob_choice: Giddel
  chosen_spanish: Gidel
  alternatives_spanish:
  - Giddel
  lexicon: nombre propio (transliteración)
  rationale: Se translitera el nombre propio de manera directa. En español, «Gidel» evita una secuencia consonántica menos natural y sigue de cerca la forma hebrea, manteniendo la identificación del nombre.
- source_word: גָחַר
  english_pob_choice: Gahar
  chosen_spanish: Gahar
  alternatives_spanish:
  - Gajhar
  - Gajar
  lexicon: nombre propio (transliteración)
  rationale: Nombre propio transliterado. Se conserva la vocalización tradicional reflejada en la auditoría inglesa y una forma inteligible en español.
translation_notes:
  revision_awareness: La auditoría inglesa indica alto acuerdo, sin revisiones aplicadas y sin cambios necesarios; por eso el español sigue de cerca la estructura enumerativa del hebreo con transliteración de nombres propios.
  spanish_consistency_notes:
  - Se mantiene la secuencia genealógica breve y paralelística del texto fuente.
  - No se introduce terminología eclesiástica ni expansiones interpretativas.
  - La nota [a] queda anclada en el primer grupo nominal para evitar redundancia y reflejar la fórmula repetida del hebreo.
