translation:
  language: es
  text: Entonces Caín salió de delante de Yahvé y se estableció en la tierra de Nod[a], al oriente de Edén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nod suena al término hebreo para «vagar», en eco con el juicio anunciado antes en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  - salió afuera
  lexicon: HALOT
  rationale: El verbo de movimiento expresa salida concreta; «salió» conserva la sencillez narrativa y el sentido de desplazamiento hacia afuera sin añadir matices interpretativos.
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - lejos de delante de
  lexicon: HALOT
  rationale: «De delante de» reproduce el valor idiomático espacial-relacional del hebreo y mantiene la tensión narrativa de alejamiento sin explicitar «presencia» como si fuera una glosa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado por el Tetragrámaton, conforme al principio del proyecto de no ocultarlo tras una sustitución titulativa.
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - se asentó
  - vivió
  lexicon: HALOT
  rationale: En contexto narrativo, el verbo comunica tomar residencia fija; «se estableció» transmite ese asentamiento de manera natural en español contemporáneo.
- source_word: בְּאֶרֶץ נוֹד
  english_pob_choice: in the land of Nod
  chosen_spanish: en la tierra de Nod
  alternatives_spanish:
  - en Nod
  - en la tierra de Vagabundeo
  lexicon: HALOT
  rationale: Nod se trata como nombre propio transliterado. Se evita traducirlo en el texto principal para no perder su función toponímica, dejando el posible juego de palabras para la nota.
- source_word: קִדְמַת עֵדֶן
  english_pob_choice: east of Eden
  chosen_spanish: al oriente de Edén
  alternatives_spanish:
  - al este de Edén
  - al oriente de la región de Edén
  lexicon: HALOT
  rationale: «Al oriente de» es una forma española clara y digna para la orientación geográfica. Conserva la relación direccional del hebreo sin sobreexplicarla.
- source_word: עֵדֶן
  english_pob_choice: Eden
  chosen_spanish: Edén
  alternatives_spanish:
  - Eden
  lexicon: HALOT
  rationale: Nombre propio bíblico normalizado en español como «Edén».
theological_decisions:
- issue: Cómo reflejar la separación de Caín respecto de Yahvé
  english_pob_reading: Then Cain went out from before Yahweh
  chosen_spanish_reading: Entonces Caín salió de delante de Yahvé
  alternative_spanish_readings:
  - Entonces Caín salió de la presencia de Yahvé
  - Entonces Caín se alejó de Yahvé
  rationale: «De delante de Yahvé» conserva la imagen hebrea sin resolverla en una formulación más interpretativa como «de la presencia». Así se preserva la tensión teológica de expulsión/alejamiento implícita en el relato.
  doctrine_reference: Preservar la tensión narrativa y teológica del texto, sin suavizar el alejamiento de Caín respecto de Dios.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada en inglés, con ajuste natural de sintaxis al español y sin cambiar el valor teológico central del alejamiento de Caín. No se requieren revisiones documentadas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el nombre divino.
  - «Edén» y «Nod» se conservan como nombres propios transliterados.
  - La nota al pie marca el juego de palabras con Nod sin incorporarlo al texto principal, para no sustituir el topónimo por una traducción interpretativa.
