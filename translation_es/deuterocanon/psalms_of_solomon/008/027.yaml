translation:
  language: es
  text: Dios fue vindicado en sus juicios entre las naciones de la tierra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios fue justificado en sus juicios entre las naciones de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδικαίωθη
  english_pob_choice: was vindicated
  chosen_spanish: fue vindicado
  alternatives_spanish:
  - fue justificado
  - quedó demostrado justo
  lexicon: BDAG
  rationale: El pasivo de δικαιόω aquí expresa que Dios quedó públicamente demostrado como en lo correcto por medio de lo que hizo. «Fue vindicado» conserva esa fuerza demostrativa sin cargar el verbo «justificar» con un matiz técnico que en español puede sonar ambiguo al referirse a Dios.
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - decretos
  - actos de juicio
  lexicon: BDAG
  rationale: κρίμα puede referirse a decisiones judiciales o juicios. «Juicios» mantiene el sentido legal-moral y encaja con la idea de que Dios es vindicado mediante sus actos de juicio.
- source_word: ἔθνεσι
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: BDAG
  rationale: 'Aquí el referente es amplio: los pueblos/naciones de la tierra. «Naciones» es la opción más natural en español y evita introducir una oposición étnico-religiosa no presente en este contexto.'
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la tierra habitada
  lexicon: BDAG
  rationale: Con «naciones» la expresión se entiende de manera universal. «De la tierra» reproduce bien la amplitud del griego y sigue la decisión inglesa de tomar γῆ en sentido global.
theological_decisions:
- issue: Cómo traducir δικαιόω aplicado a Dios sin sugerir que Dios llega a ser justo o que necesita ser perdonado
  english_pob_reading: was vindicated
  chosen_spanish_reading: fue vindicado
  alternative_spanish_readings:
  - fue justificado
  - quedó demostrado justo
  rationale: El sentido es que la justicia de Dios quedó públicamente confirmada por sus juicios. «Fue vindicado» preserva esa tensión teológica sin resolverla en términos más técnicos o más estrechos de lo que permite el texto.
  doctrine_reference: Mantener la demostración pública de la rectitud de Dios, no una declaración de que Dios se vuelve justo.
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece estable: la revisión más reciente no introdujo cambios y el control cruzado indicó alta concordancia. La versión española conserva esa decisión base, reproduciendo el valor demostrativo de δικαιόω con «fue vindicado» y la amplitud universal de «las naciones de la tierra».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto griego dice explícitamente ὁ θεός, «Dios».
  - Se usa «juicios» para κρίμασιν, manteniendo el campo judicial-moral.
  - «Naciones» refleja ἔθνεσι sin cargarlo innecesariamente con el contraste técnico «gentiles».
  - La nota alternativa conserva «justificado» como posibilidad léxica, pero la línea principal prefiere la claridad moderna de «vindicado».
