  to: Y toda disputa que venga ante ustedes de sus hermanos que habitan en sus ciudades—sea entre sangre y sangre[a], entre ley y mandamiento, estatutos y juicios—ustedes los amonestarán, para que no incurran en culpa delante de Yahvé; de lo contrario, vendrá ira sobre ustedes y sobre sus hermanos. Hagan esto, y no incurrirán en culpa.
