- from: Galaad es una ciudad de malhechores[a], rastreada con sangre.
  to: Galaad es una ciudad de malhechores[a], marcada con sangre.
  rationale: Se reemplaza 'rastreada con sangre' por 'marcada con sangre' para conservar el sentido fuente de señales o huellas sangrientas en un español natural y digno. También se ajusta la nota para ofrecer alternativas comprensibles en español sin calcarlas de forma torpe.
  reviewer_model: gpt-5.4
