revisions:
- from: Efraín se convertirá en una desolación en el día de reprensión[a][b]; entre las tribus de Israel he dado a conocer lo seguro[c].
  to: Efraín se convertirá en una desolación[a] en el día de reprensión[b]; entre las tribus de Israel he dado a conocer lo que es seguro[c].
  rationale: 'Se hizo una reparación menor: se mantuvo la estructura y el sentido del borrador, pero se cambió «lo seguro» por «lo que es seguro» para una lectura más natural en español y se corrigió la nota c para que presente una alternativa genuina en vez de repetir el texto principal. Se conservaron las demás decisiones por su fidelidad suficiente al hebreo y al expediente del POB.'
