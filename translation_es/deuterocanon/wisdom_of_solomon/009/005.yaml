    text: 'O: «tu criada». παιδίσκη puede referirse a una esclava joven o a una criada; aquí se opta por «esclava» para conservar el paralelismo de estatus con δοῦλος.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con menos entendimiento del juicio y de las leyes», es decir, con comprensión insuficiente para juzgar y gobernar conforme a las leyes.'
    reason: alternative_reading
  revision_rationale: Se ajusta «de poca duración» a «de vida breve» por naturalidad y precisión semántica para una persona. Se sustituye «con menos entendimiento para juzgar y para las leyes» por «falto de entendimiento del juicio y de las leyes» para reflejar mejor la sintaxis nominal del griego, mantener el campo semántico jurídico de κρίσις y producir un español más claro. También se armoniza la nota b con «juicio» en vez de «justicia».
