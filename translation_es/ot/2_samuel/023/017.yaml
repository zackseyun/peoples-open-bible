base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/017.yaml
  text: And he said[a], “Far be it from me, O Yahweh, that I should do this! Is it not the blood of the men who went at the risk of their lives?” So he was not willing to drink it[b]. These things the three mighty men did.
  footnotes:
  - marker: a
    text: Or, more literally, “with their lives”; the phrase means they went in mortal danger.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “Is this not the blood of the men...?” David treats the water as if it were their blood because they obtained it at the risk of death.'
    reason: alternative_reading
