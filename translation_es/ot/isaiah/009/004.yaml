revisions:
- from: Porque todo calzado del que pisa con estruendo en el tumulto[a], y toda vestidura enrollada en sangre, será para ser quemada, combustible para el fuego.
  to: Porque toda bota del guerrero que avanza en el tumulto[a], y toda vestidura enrollada en sangre, serán para la quema, combustible para el fuego.
  rationale: Se ajusta «calzado» a «bota» para reflejar mejor la decisión léxica documentada del POB y la imagen militar concreta. Se reemplaza «será para ser quemada» por «serán para la quema», que preserva el sentido de destino para quemarse de לִשְׂרֵפָה con español natural. Se suaviza la frase participial a «del guerrero que avanza en el tumulto», que comunica la acción militar sin sobrecargar el texto, y se mantiene la nota de alternativa por la dificultad del hebreo.
  reviewer_model: gpt-5.4
