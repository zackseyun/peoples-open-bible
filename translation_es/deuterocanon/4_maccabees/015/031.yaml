lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - justamente como
  - tal como
  lexicon: LSJ
  rationale: Introduce la comparación con naturalidad en español y conserva el valor correlativo de la partícula comparativa griega.
- source_word: Νῶε
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: LSJ
  rationale: Nombre bíblico estándar en español, equivalente directo del transliterado inglés.
- source_word: κιβωτός
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca
  - caja
  - cofre
  lexicon: LSJ
  rationale: En el contexto de Noé, 'arca' es la designación bíblica establecida y más fiel al referente.
- source_word: κοσμοπληθεῖ
  english_pob_choice: world-filling
  chosen_spanish: que llenó el mundo
  alternatives_spanish:
  - que llenó el mundo
  - que cubrió el mundo
  - mundialmente lleno
  lexicon: LSJ
  rationale: El compuesto intensifica la amplitud del diluvio; 'que llenó el mundo' conserva la idea de plenitud/extensión sin un calco poco natural.
- source_word: κατακλυσμῷ
  english_pob_choice: flood
  chosen_spanish: diluvio
  alternatives_spanish:
  - diluvio
  - inundación
  - cataclismo
  lexicon: LSJ
  rationale: '''Diluvio'' comunica de forma bíblica y clara la referencia al relato de Noé, manteniendo el vínculo intertextual.'
- source_word: κοσμοφορουμένη
  english_pob_choice: being borne along
  chosen_spanish: siendo llevada
  alternatives_spanish:
  - siendo llevada
  - siendo transportada
  - siendo arrastrada
  lexicon: LSJ
  rationale: La pasiva participial describe el movimiento del arca dentro del diluvio; 'siendo llevada' preserva el sentido sin sobredeterminar la imagen.
- source_word: καρτερῶς
  english_pob_choice: steadfastly
  chosen_spanish: con firmeza
  alternatives_spanish:
  - con firmeza
  - con perseverancia
  - tenazmente
  lexicon: LSJ
  rationale: Expresa una resistencia resuelta y sobria, adecuada al énfasis de 4 Macabeos en la constancia.
- source_word: ὑπήνεγκεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - soportó
  - padeció
  - resistió
  lexicon: LSJ
  rationale: '''Soportó'' transmite la idea de cargar bajo presión; combinado con el adverbio, preserva el matiz de resistencia perseverante.'
- source_word: κλύδωνας
  english_pob_choice: the waves
  chosen_spanish: las olas
  alternatives_spanish:
  - las olas
  - las ondas
  - las borrascas
  lexicon: LSJ
  rationale: Término claro y natural para las aguas turbulentas, sin perder el sentido de agitación violenta.
theological_decisions:
- issue: La función tipológica del arca de Noé como comparación de resistencia
  english_pob_reading: Retained the simile straightforwardly without expanding its theological implication beyond the text.
  chosen_spanish_reading: Se conservó la comparación sin añadir una interpretación tipológica ampliada que el griego no explicita en esta cláusula.
  alternative_spanish_readings:
  - Interpretar el arca como símbolo desarrollado del martirio
  - Ampliar la imagen hacia una alegoría doctrinal
  rationale: El griego presenta una comparación directa; la traducción debe mantenerla transparente sin cargarla con simbolismos no expresados en el verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de ''being carried along'' a ''being borne along'' y de ''world-engulfing'' a ''world-filling''. En español se optó por una solución natural y más bíblica: ''siendo llevada'' y ''que llenó el mundo'', manteniendo la literalidad suficiente sin calco pesado.'
  spanish_consistency_notes:
  - Se mantiene 'arca' para κιβωτός en el contexto de Noé.
  - Se evita 'Cristo' u otras terminologías no pertinentes; no hay lenguaje cristológico en el verso.
  - '''Con firmeza'' y ''soportó'' conservan el énfasis en resistencia perseverante característico de 4 Macabeos.'
  - La nota a pie de página recoge la alternativa de orden y matiz del participio y del compuesto del diluvio.
