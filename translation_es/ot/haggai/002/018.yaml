revisions:
- from: Presten atención[a] desde este día en adelante, desde el día veinticuatro del noveno mes, desde el día en que fue fundada la casa de Yahvé; presten atención.
  to: Consideren bien desde este día en adelante, desde el día veinticuatro del mes noveno, desde el día en que fue fundado[a] el templo de Yahvé; considérenlo.
  rationale: Se reemplaza «Presten atención» por «Consideren bien» para reflejar mejor el modismo hebreo de reflexión deliberada; se cambia «la casa de Yahvé» por «el templo de Yahvé» para ajustarse a הֵיכַל y al rastro léxico auditado; y se añade una nota que preserva la alternativa documentada sobre «fundado / se puso el cimiento».
