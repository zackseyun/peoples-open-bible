translation:
  language: es
  text: Sin embargo[a], los sacerdotes de los lugares altos no subieron al altar de Yahvé en Jerusalén[c], sino que comían panes sin levadura[b] entre sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sin embargo» refleja el valor adversativo del hebreo אַךְ; también podría leerse «No obstante» o «Solo», según el matiz contextual.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre sus hermanos», probablemente sus compañeros sacerdotes o sus parientes sacerdotales.'
    reason: cultural_note
  - marker: c
    text: El nombre divino en hebreo es YHWH; por eso se traduce «Yahvé» y no se sustituye por «SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: El hebreo introduce una restricción o contraste con lo anterior; «Sin embargo» conserva ese giro adversativo con naturalidad en español.
- source_word: יַעֲלוּ
  english_pob_choice: did not go up
  chosen_spanish: no subían
  alternatives_spanish:
  - no subieron
  - no ascendían
  lexicon: HALOT
  rationale: עלה en este contexto cultual mantiene la imagen de «subir»; el imperfecto negativo en español da bien la idea de una acción no realizada de modo habitual o contextual.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  english_pob_choice: the priests of the high places
  chosen_spanish: los sacerdotes de los lugares altos
  alternatives_spanish:
  - los sacerdotes de las alturas
  - los sacerdotes de los santuarios altos
  lexicon: HALOT
  rationale: «Lugares altos» es el equivalente consagrado para bamot; se evita una paráfrasis explicativa que atenúe el término técnico.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahvé
  - el altar de Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el criterio del proyecto para יְהוָה, y la relación de posesión se expresa de forma directa y natural en español.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - excepto que
  lexicon: HALOT
  rationale: La secuencia contrasta lo que no hicieron con lo que sí hicieron; «sino que» reproduce mejor la corrección adversativa del hebreo que un simple «pero».
- source_word: אָכְלוּ מַצּוֹת
  english_pob_choice: they ate unleavened bread
  chosen_spanish: comían panes sin levadura
  alternatives_spanish:
  - comían pan sin levadura
  - comían matzot
  lexicon: HALOT
  rationale: מַצּוֹת designa panes sin levadura; el plural «panes» refleja el plural hebreo sin sonar forzado, y conserva el referente alimentario ritual.
- source_word: בְּתוֹךְ אֲחֵיהֶם
  english_pob_choice: among their brothers
  chosen_spanish: entre sus hermanos
  alternatives_spanish:
  - en medio de sus hermanos
  - junto a sus hermanos
  - entre sus parientes
  lexicon: HALOT
  rationale: '«Entre» reproduce bien בְּתוֹךְ y mantiene la ambigüedad controlada del hebreo: se trata de sus hermanos, probablemente sus compañeros o parientes sacerdotales, sin añadir más de lo que el texto dice.'
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino, no un título; por eso se conserva como «Yahvé» en lugar de sustituirlo por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֲחֵיהֶם
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus hermanos y compañeros sacerdotes
  - sus parientes
  rationale: El hebreo es masculino plural y el contexto apunta a un grupo masculino relacionado con el sacerdocio; se evita neutralizar o explicitar más de lo que el texto afirma.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La traducción sigue el consenso alto del auditorio inglés: se mantiene la distinción entre la exclusión del servicio en el altar de Jerusalén y la participación de estos sacerdotes en el alimento permitido. No hubo revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en conformidad con el criterio del proyecto.
  - «Lugares altos» conserva el término técnico bamot sin reinterpretarlo.
  - «Panes sin levadura» conserva el sentido ritual de מַצּוֹת sin recurrir al hebraísmo transliterado.
  - «Entre sus hermanos» preserva la ambigüedad referencial del hebreo sin añadir especificaciones no presentes en el texto.
