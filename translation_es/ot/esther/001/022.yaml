    rationale: El hebreo כִּכְתָבָהּ ... כִּלְשׁוֹנוֹ se traduce bien, pero en español bíblico moderno-administrativo 'en su propia escritura ... en su propia lengua' preserva mejor el paralelismo y mejora la fluidez sin perder sentido.
  - severity: low
    issue: Las razones de notas y estilo pueden alinearse mejor con el audit trail inglés.
    rationale: La nota [b] corresponde más exactamente a una nota cultural/explicativa que a 'source_note', y conviene mantener una redacción española más limpia y directa.
