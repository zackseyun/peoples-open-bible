revisions:
- from: Y reuniré a todas las naciones contra Jerusalén para la guerra[a]; la ciudad será capturada, las casas saqueadas, y las mujeres violadas; la mitad de la ciudad saldrá al exilio[b], pero el resto del pueblo no será cortado de la ciudad.
  to: Y reuniré a todas las naciones contra Jerusalén para la guerra; la ciudad será capturada, las casas saqueadas y las mujeres violadas[a]; la mitad de la ciudad saldrá al exilio[b], pero el resto del pueblo no será separado de la ciudad.
  rationale: La revisión corrige el anclaje obligatorio de la nota [a], mejora la naturalidad española de la cláusula final sin perder la ambigüedad del hebreo, y aligera la puntuación. «Separado de la ciudad» funciona mejor que «cortado de la ciudad» como equivalente formal legible para לֹא יִכָּרֵת מִן הָעִיר, mientras la nota [b] conserva la lectura alternativa de destrucción/exterminio presente en la auditoría inglesa.
