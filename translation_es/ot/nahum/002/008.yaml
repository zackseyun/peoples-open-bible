    text: O «será descubierta» o «será exiliada»; el hebreo es difícil y puede combinar humillación e imagen de deportación.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «sobre sus corazones»; la frase puede referirse idiomáticamente a golpearse el pecho en duelo.
    reason: lexical_alternative
  revision_rationale: La revisión elimina una nota innecesaria, vuelve a la literalidad documentada por el POB en «sobre sus corazones», y evita la interpretación añadida de «gimiendo». También simplifica «conducidas» a «llevadas» para reflejar mejor el movimiento forzado y la coherencia del hemistiquio.
