translation:
  language: es
  text: y sus hermanos[a], jefes de casas paternas, 242[b]; y Amashsai[c], hijo de Azarel, hijo de Ahzai, hijo de Meshillemoth, hijo de Immer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''sus parientes''. El hebreo también puede referirse a asociados o miembros del mismo grupo familiar o sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''doscientos cuarenta y dos''.'
    reason: lexical_alternative
  - marker: c
    text: También puede transliterarse 'Amasai'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: La relación posesiva y plural se conserva de forma directa. En este contexto administrativo-genealógico, 'hermanos' reproduce con fidelidad el término base אָח sin suavizarlo a una noción más amplia como 'parientes'.
- source_word: רָאשִׁים לְאָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: jefes de casas paternas
  alternatives_spanish:
  - cabezas de casas paternas
  - jefes de familias
  - jefes de casas ancestrales
  lexicon: HALOT
  rationale: '''Casas paternas'' conserva la estructura social hebrea subyacente a לְאָבוֹת y evita reemplazarla por una simplificación interpretativa. ''Jefes'' comunica el sentido de רָאשִׁים con naturalidad en español, manteniendo el carácter de liderazgo clanil.'
- source_word: מָאתַיִם אַרְבָּעִים וּשְׁנָיִם
  english_pob_choice: '242'
  chosen_spanish: '242'
  alternatives_spanish:
  - doscientos cuarenta y dos
  lexicon: HALOT
  rationale: El número se expresa en cifras por claridad en una lista censal/genealógica. El sentido del cardinal hebreo se mantiene sin cambio semántico.
- source_word: וַעֲמַשְׁסַי
  english_pob_choice: and Amashsai
  chosen_spanish: Amashsai
  alternatives_spanish:
  - Amasai
  lexicon: HALOT
  rationale: Se conserva la transliteración que refleja más de cerca la forma consonántica masorética de este versículo. La variante más conocida 'Amasai' queda como alternativa posible, pero no se adopta en el texto principal.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una genealogía, בן se traduce de manera literal como 'hijo de'. En español resulta claro y mantiene la cadena genealógica sin ampliar indebidamente a 'descendiente'.
- source_word: עֲזַרְאֵל
  english_pob_choice: Azarel
  chosen_spanish: Azarel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: אַחְזַי
  english_pob_choice: Ahzai
  chosen_spanish: Ahzai
  alternatives_spanish:
  - Ahasai
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente desde la forma hebrea del versículo.
- source_word: מְשִׁלֵּמוֹת
  english_pob_choice: Meshillemoth
  chosen_spanish: Meshillemoth
  alternatives_spanish:
  - Meshillemith
  lexicon: HALOT
  rationale: Se conserva la transliteración habitual del nombre propio, evitando homogeneizarlo con otras grafías posibles.
- source_word: אִמֵּר
  english_pob_choice: Immer
  chosen_spanish: Immer
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente; mantiene la identificación genealógica sin interpretarlo como título o función.
theological_decisions:
- issue: Sentido social de 'heads of fathers’ houses'
  english_pob_reading: heads of fathers’ houses
  chosen_spanish_reading: jefes de casas paternas
  alternative_spanish_readings:
  - jefes de familias
  - cabezas de casas ancestrales
  rationale: No hay una cuestión doctrinal, pero sí una decisión social-exegética. 'Casas paternas' conserva la unidad clanil del hebreo y evita borrar la estructura de casas/familias del texto.
  doctrine_reference: N/A
translation_notes:
