translation:
  language: es
  text: La ira de Yahvé no volverá atrás[a] hasta que lo haya hecho, y hasta que haya establecido los propósitos[b] de su corazón. En los últimos días[c] lo entenderán claramente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no volverá"; la imagen hebrea es que la ira de Yahvé no se retirará hasta que su propósito se complete.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "planes" de su corazón.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "en días venideros"; hebreo: "en los últimos días".'
    reason: alternative_reading
lexical_decisions:
- source_word: אַף יְהוָה
  english_pob_choice: the anger of Yahweh
  chosen_spanish: La ira de Yahvé
  alternatives_spanish:
  - El furor de Yahvé
  - La ira del Yahvé
  lexicon: HALOT
  rationale: אַף en este contexto expresa ira/enojo divino, no el sentido literal de 'nariz'. Se mantiene Yahvé para el Nombre divino según la convención del proyecto. 'Ira' es natural y fiel; 'furor' es posible pero más intenso y menos neutro.
- source_word: לֹא יָשׁוּב
  english_pob_choice: will not turn back
  chosen_spanish: no volverá atrás
  alternatives_spanish:
  - no retornará
  - no se retirará
  lexicon: HALOT
  rationale: שׁוּב conserva la imagen de retroceder o volver. 'Volverá atrás' reproduce bien esa imagen en español sin convertirla en una paráfrasis interpretativa como 'se retirará' o 'se arrepentirá'.
- source_word: עַד עֲשֹׂתוֹ
  english_pob_choice: until he has done it
  chosen_spanish: hasta que haya hecho esto
  alternatives_spanish:
  - hasta que lo haya hecho
  - hasta que haya actuado
  lexicon: HALOT
  rationale: El sufijo pronominal permite un referente implícito; 'esto' mantiene la referencia abierta, como en el hebreo, sin añadir un objeto más específico de lo que el texto exige.
- source_word: וְעַד הֲקִימוֹ
  english_pob_choice: and until he has established
  chosen_spanish: y hasta que haya establecido
  alternatives_spanish:
  - y hasta que haya cumplido
  - y hasta que haya confirmado
  lexicon: HALOT
  rationale: הקים puede significar establecer, levantar o hacer firme. 'Establecido' funciona bien con 'propósitos' y conserva la idea de llevar a efecto algo decidido.
- source_word: מְזִמּוֹת לִבּוֹ
  english_pob_choice: the purposes of his heart
  chosen_spanish: los propósitos de su corazón
  alternatives_spanish:
  - los planes de su corazón
  - las intenciones de su corazón
  - los designios de su corazón
  lexicon: HALOT
  rationale: מְזִמּוֹת puede tener matiz de 'planes', 'intenciones' o incluso 'designios'. Aquí el contexto es el propósito deliberado de Yahvé, no un 'plan' humano cualquiera; 'propósitos' preserva esa intención decidida sin sugerir malicia.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: In the latter days
  chosen_spanish: En los últimos días
  alternatives_spanish:
  - En días venideros
  - En el fin de los días
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo profético de futuro con posible carga escatológica. 'En los últimos días' conserva esa resonancia en español; 'en días venideros' debilita el peso profético, y 'en el fin de los días' suena menos natural.
- source_word: תִּתְבּוֹנְנוּ בָהּ בִּינָה
  english_pob_choice: you will understand it clearly
  chosen_spanish: lo entenderán claramente
  alternatives_spanish:
  - lo comprenderán con claridad
  - lo discernirán claramente
  - lo entenderán con entendimiento
  lexicon: HALOT
  rationale: El verbo comporta la idea de observar con discernimiento, y el sustantivo בינה intensifica la comprensión. 'Entenderán claramente' expresa bien el énfasis sin forzar una repetición pesada en español.
theological_decisions:
- issue: Si la frase final debe leerse como futura cercana o con tensión escatológica abierta
  english_pob_reading: In the latter days
  chosen_spanish_reading: En los últimos días
  alternative_spanish_readings:
  - En días venideros
  - En el fin de los días
  rationale: La expresión admite un futuro general, pero en la literatura profética suele conservar peso escatológico. 'En los últimos días' mantiene esa tensión sin resolverla hacia un esquema doctrinal más técnico de lo que el hebreo exige.
  doctrine_reference: Preservar la tensión profética/escatológica sin cerrarla prematuramente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés de POB. Mantiene la imagen idiomática de שׁוּב ('volver atrás') y la tensión de בְּאַחֲרִית הַיָּמִים, sin suavizar el carácter profético del pasaje. No se registran revisiones previas aplicadas en el paquete inglés.
  spanish_consistency_notes:
  - Se conserva Yahvé para יְהוָה conforme a la terminología base del proyecto.
  - '''Ira'' traduce אַף en su sentido idiomático y no se sustituye por un eufemismo.'
  - '''Corazón'' mantiene el centro semítico de intención y voluntad.'
  - La puntuación y el orden siguen una sintaxis natural en español sin perder el paralelismo del hebreo.
