translation:
  language: es
  text: Un solo hombre de entre ustedes perseguirá a mil[a], porque Yahvé[b] su Dios es el que pelea por ustedes, tal como les habló[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perseguirá a un millar».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «YHWH», el nombre divino; tradicionalmente se ha representado como «el SEÑOR».
    reason: lexical_alternative
  - marker: c
    text: O «tal como les prometió»; el hebreo, más literalmente, dice «tal como les habló».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶחָד
  english_pob_choice: One man
  chosen_spanish: Un solo hombre
  alternatives_spanish:
  - Un hombre
  - Una sola persona
  lexicon: HALOT
  rationale: El hebreo usa singular masculino con valor representativo. «Un solo hombre» mantiene esa fuerza y evita neutralizar el género sin necesidad, a la vez que suena natural en español.
- source_word: מִכֶּם
  english_pob_choice: from among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de ustedes
  - de entre vosotros
  lexicon: HALOT
  rationale: La partícula con sufijo expresa sentido partitivo; «de entre ustedes» comunica mejor que un simple «de ustedes» que el sujeto sale de un grupo mayor.
- source_word: יִרְדָּף
  english_pob_choice: will chase
  chosen_spanish: perseguirá
  alternatives_spanish:
  - correrá tras
  - cazará
  lexicon: HALOT
  rationale: «Perseguir» conserva el rango semántico de רדף y en español funciona con naturalidad en un contexto militar. La forma futura corresponde al valor verbal del hebreo.
- source_word: אָלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil hombres
  lexicon: HALOT
  rationale: Se mantiene el numeral de manera literal para conservar la fuerza hiperbólica o militar de la promesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el tetragrámaton: «Yahvé» preserva el nombre divino revelado, sin sustituirlo por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - Dios de ustedes
  lexicon: HALOT
  rationale: El posesivo de segunda persona plural en español se expresa de forma natural con «su» en este contexto; el referente plural se entiende por la forma verbal y el pronombre de objeto posterior.
- source_word: הַנִּלְחָם לָכֶם
  english_pob_choice: fights for you
  chosen_spanish: es el que pelea por ustedes
  alternatives_spanish:
  - pelea por ustedes
  - combate por ustedes
  - lucha por ustedes
  lexicon: HALOT
  rationale: El participio con artículo expresa acción característica. «Es el que pelea por ustedes» reproduce bien la estructura enfática del hebreo y el sentido de acción continua/habitual.
- source_word: כַּאֲשֶׁר דִּבֶּר לָכֶם
  english_pob_choice: just as he spoke to you
  chosen_spanish: tal como les habló
  alternatives_spanish:
  - tal como les prometió
  - tal como les dijo
  lexicon: HALOT
  rationale: «Habló» es la equivalencia más cercana al verbo דִּבֶּר. «Tal como» preserva la comparación, y se deja abierta la fuerza promissoria que el contexto implica sin añadirla como traducción principal.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton de forma directa. La forma «Yahvé» mantiene el nombre propio y evita la sustitución por un título, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Fuerza enfática del pronombre y participio en «הוּא הַנִּלְחָם לָכֶם»
  english_pob_reading: is the one who fights for you
  chosen_spanish_reading: es el que pelea por ustedes
  alternative_spanish_readings:
  - es quien pelea por ustedes
  - es el que está peleando por ustedes
  rationale: La estructura hebrea enfatiza que Yahvé mismo es el combatiente de Israel. «Es el que pelea por ustedes» conserva esa insistencia sin sobrecargar el español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Revisado a la luz del paquete fuente y del audit trail en inglés. No se requerían cambios sustanciales respecto de la lectura principal: se mantuvo la literalidad controlada de «habló» frente a una posible explicitación de «prometió», y se preservó el nombre divino como Yahvé. La traducción sigue la versión inglesa en sus puntos clave, pero se ajusta al español natural con «de entre ustedes» y «es el que pelea por ustedes».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva el valor representativo del singular masculino «un solo hombre».
  - Se mantiene el numeral «mil» sin explicitar «hombres» en el texto principal.
  - La comparación final queda marcada con «tal como», evitando añadir más promesa de la que el hebreo expresa literalmente.
