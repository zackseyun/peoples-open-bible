translation:
  language: es
  text: Hemos oído la noticia de esto[a]; nuestras manos han perdido fuerza[b]. La angustia se ha apoderado de nosotros, dolor[c] como de una mujer que da a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la noticia acerca de él' / 'su noticia'; el hebreo puede denotar tanto la noticia referente al enemigo como, menos probablemente en el contexto, su propia noticia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'nuestras manos se han aflojado' o 'han quedado sin fuerza', un modismo para perder vigor o valor.
    reason: lexical_alternative
  - marker: c
    text: O 'dolor como de una mujer en labor de parto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  english_pob_choice: We have heard
  chosen_spanish: Hemos oído
  alternatives_spanish:
  - Oímos
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya ocurrida con efecto vigente; en español, el perfecto compuesto comunica bien esa vigencia sin forzar una traducción mecánica.
- source_word: אֶת שָׁמְעוֹ
  english_pob_choice: the report of it
  chosen_spanish: la noticia de ello
  alternatives_spanish:
  - el informe de ello
  - la noticia sobre ello
  - su noticia
  lexicon: HALOT
  rationale: שֵׁמַע/שֶׁמַע puede significar noticia, rumor o reporte. Dado el contexto de una amenaza inminente, 'noticia de ello' comunica el contenido informativo sin decidir innecesariamente si se trata de 'reporte sobre él' o 'de él'.
- source_word: רָפוּ יָדֵינוּ
  english_pob_choice: our hands hang limp
  chosen_spanish: nuestras manos desfallecen
  alternatives_spanish:
  - nuestras manos caen flácidas
  - nuestras manos se debilitan
  - nuestras manos cuelgan sin fuerza
  lexicon: HALOT
  rationale: 'La expresión es idiomática: perder fuerza o ánimo. ''Desfallecen'' preserva el sentido de debilidad y el efecto emocional, aunque no reproduce de modo literal la imagen corporal.'
- source_word: צָרָה
  english_pob_choice: Distress
  chosen_spanish: la angustia
  alternatives_spanish:
  - la tribulación
  - el apuro
  - el afán
  lexicon: HALOT
  rationale: צָרָה denota presión, aflicción o angustia. 'Angustia' es natural en español y mantiene el peso emocional del término.
- source_word: הֶחֱזִיקַתְנוּ
  english_pob_choice: has seized us
  chosen_spanish: nos ha agarrado
  alternatives_spanish:
  - nos ha tomado
  - nos ha asido
  - nos ha aprehendido
  lexicon: HALOT
  rationale: El verbo puede significar agarrar, sujetar, apoderarse. 'Nos ha agarrado' conserva la imagen de aprehensión; es más directo que 'tomado' y menos técnico que 'asido'.
- source_word: חִיל
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - retorcimiento
  - angustia
  - temblor
  lexicon: HALOT
  rationale: חִיל puede referirse a dolor de parto, retorcimiento o angustia. 'Dolor' mantiene la amplitud semántica y prepara la comparación inmediata con el parto.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman giving birth
  chosen_spanish: como de una mujer que da a luz
  alternatives_spanish:
  - como de una mujer en parto
  - como de una mujer en labor de parto
  - como de una parturienta
  lexicon: HALOT
  rationale: La comparación apunta a la experiencia del parto. 'Da a luz' es una expresión clara y digna en español; 'parturienta' sería más técnica y menos natural aquí.
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'him' por 'it' para reflejar con más naturalidad el sufijo hebreo. La versión española sigue esa decisión con 'ello' y mantiene la ambigüedad contextual del sustantivo שָׁמְעוֹ sin masculinizarlo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el Tetragrámaton aparece, pero este versículo no lo contiene.
  - Se evita 'SEÑOR' y 'Cristo' porque no corresponden al texto.
  - Se conserva el paralelismo de dos miembros breves antes de la comparación final.
  - '''Angustia'' y ''dolor'' se distinguen para reflejar dos términos hebreos cercanos pero no idénticos.'
