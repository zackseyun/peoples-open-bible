revisions:
- from: 'Toda bestia[a], todo animal que se arrastra, y toda ave: todo lo que se mueve sobre la tierra, según sus familias, salió del arca.'
  to: Toda bestia[a], todo animal que se arrastra, y toda ave —todo lo que se mueve sobre la tierra—, según sus familias, salieron del arca.
  rationale: La revisión corrige la concordancia verbal para reflejar el plural hebreo, mejora la puntuación de la cláusula recapituladora para que suene natural y fiel, y ajusta la nota al pie para que ofrezca una alternativa real coherente con la auditoría inglesa. No hace falta una reescritura mayor, porque el resto de las decisiones léxicas son sólidas.
