translation:
  language: es
  text: Y no robarás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en algunos contextos de גנב, «secuestrar» o «robar a una persona»; aquí el mandamiento se enuncia de forma general: «robar».'
