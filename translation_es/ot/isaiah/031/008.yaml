revisions:
- from: Y Asiria caerá por una espada no de hombre[a], y una espada no de ser humano la devorará; y él huirá de delante de la espada[b][c][d], y sus jóvenes serán forzados a trabajos serviles.
  to: Y Asiria caerá por una espada no de hombre[a], y una espada no de ser humano lo devorará; y él huirá de delante de la espada[b], y sus jóvenes[c] serán sometidos a trabajo forzado[d].
  rationale: La revisión corrige un error semántico grave ('la devorará' → 'lo devorará'), alinea mejor מַס con 'trabajo forzado', y recoloca las notas en los segmentos correctos para reflejar fielmente el expediente inglés y el hebreo subyacente. Se mantiene la doble distinción 'hombre' / 'ser humano' y la tensión teológica de una espada no humana sin especificar el mecanismo.
  reviewer_model: gpt-5.4
