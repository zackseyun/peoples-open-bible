translation:
  language: es
  text: Porque sería vergonzoso si siguiéramos viviendo por un poco más de tiempo, y aun ese tiempo mientras todos se burlan de nosotros por cobardía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἰσχρόν
  english_pob_choice: shameful
  chosen_spanish: vergonzoso
  alternatives_spanish:
  - vergüenza
  - deshonroso
  - afrentoso
  lexicon: LSJ
  rationale: αἰσχρόν expresa lo vergonzoso o deshonroso en clave de honor público. "Vergonzoso" comunica bien esa idea en español moderno y conserva el tono moral sin volver la frase artificial.
- source_word: ἐπιβιώσομεν
  english_pob_choice: we should live on
  chosen_spanish: siguiéramos viviendo
  alternatives_spanish:
  - sobreviviéramos
  - continuáramos viviendo
  - permaneciéramos con vida
  lexicon: LSJ
  rationale: El verbo compuesto apunta a seguir con vida más allá del peligro presente. "Siguiéramos viviendo" mantiene la noción de continuar viviendo, con un ritmo natural en español.
- source_word: ὀλίγον χρόνον
  english_pob_choice: for a little while
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por un corto tiempo
  - por breve tiempo
  - por un momento
  lexicon: LSJ
  rationale: La frase marca duración breve. "Por un poco de tiempo" es transparente y conserva la brevedad sin sobretraducir.
- source_word: καταγελώμενοι
  english_pob_choice: being mocked
  chosen_spanish: siendo burlados
  alternatives_spanish:
  - siendo ridiculizados
  - siendo objeto de burla
  - siendo escarnecidos
  lexicon: LSJ
  rationale: El participio pasivo indica burla pública continua. "Siendo burlados" mantiene la fuerza social de la deshonra y es idiomático en español; "ridiculizados" sería posible, pero algo más moderno y menos cargado de vergüenza pública.
- source_word: πρὸς ἀπάντων
  english_pob_choice: by everyone
  chosen_spanish: por todos
  alternatives_spanish:
  - por todos los demás
  - por todos en público
  - ante todos
  lexicon: LSJ
  rationale: La expresión señala la amplitud universal del oprobio. "Por todos" es breve y fiel al alcance colectivo del texto.
- source_word: ἐπὶ δειλίᾳ
  english_pob_choice: for cowardice
  chosen_spanish: a causa de cobardía
  alternatives_spanish:
  - por cobardía
  - a causa de timidez
  - por falta de valentía
  lexicon: LSJ
  rationale: ἐπὶ con dativo expresa motivo o causa. "A causa de cobardía" conserva esa relación causal y reproduce la fuerza moral negativa de δειλία mejor que opciones suavizadas.
translation_notes:
  revision_awareness: El inglés auditado pasó de incluir 'even that while' a la forma final sin 'even'; la versión española sigue esa lectura más cercana al griego, evitando añadir refuerzo no presente.
  spanish_consistency_notes:
  - Se mantuvo el tono martirial y de honor público del pasaje.
  - No se introdujeron términos eclesiásticos ajenos al griego; la elección principal es léxica y estilística.
  - La causalidad de ἐπὶ δειλίᾳ se expresó explícitamente con "a causa de" para no diluir el sentido.
