translation:
  language: es
  text: Y rociaré sobre ustedes agua limpia, y serán limpios; de todas sus impurezas y de todos sus ídolos[a] los limpiaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de todos sus ídolos de estiércol»; Ezequiel usa con frecuencia un término deliberadamente despectivo para los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרַקְתִּי
  english_pob_choice: And I will sprinkle
  chosen_spanish: Y rociaré
  alternatives_spanish:
  - y esparciré
  - y arrojaré
  lexicon: HALOT
  rationale: En un contexto ritual de purificación, זָרַק expresa la acción de salpicar o rociar líquido. «Rociaré» conserva el valor ceremonial sin sonar áspero como «arrojaré».
- source_word: עֲלֵיכֶם
  english_pob_choice: on you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre vosotros
  - encima de ustedes
  lexicon: HALOT
  rationale: La preposición sobre reproduce bien el movimiento del rociado. «Ustedes» mantiene un registro neutral y ampliamente usable en español latinoamericano.
- source_word: מַיִם טְהוֹרִים
  english_pob_choice: clean water
  chosen_spanish: agua limpia
  alternatives_spanish:
  - agua pura
  - agua ritualmente limpia
  lexicon: HALOT
  rationale: «Limpia» comunica la idea de purificación en español natural y mantiene el vínculo con el campo semántico de טהר. «Pura» es posible, pero menos directa aquí.
- source_word: וּטְהַרְתֶּם
  english_pob_choice: and you will be clean
  chosen_spanish: y serán limpios
  alternatives_spanish:
  - y estarán limpios
  - y serán purificados
  lexicon: HALOT
  rationale: La forma verbal describe el estado resultante. «Serán limpios» preserva ese resultado sin convertirlo en un proceso demasiado técnico.
- source_word: מִכֹּל טֻמְאוֹתֵיכֶם
  english_pob_choice: from all your uncleannesses
  chosen_spanish: de todas sus impurezas
  alternatives_spanish:
  - de todas sus inmundicias
  - de todas sus contaminaciones
  lexicon: HALOT
  rationale: «Impurezas» conserva la relación con lo limpio/limpio de la frase anterior y suena natural en español. «Inmundicias» sería más fuerte, pero menos neutra.
- source_word: וּמִכָּל גִּלּוּלֵיכֶם
  english_pob_choice: and from all your idols
  chosen_spanish: y de todos sus ídolos
  alternatives_spanish:
  - y de todos sus ídolos-desechos
  - y de todas sus imágenes de ídolos
  lexicon: HALOT
  rationale: El término hebreo es despectivo, pero el texto principal en español se mantiene en «ídolos» por claridad y legibilidad; el matiz peyorativo queda señalado en la nota.
- source_word: אֲטַהֵר אֶתְכֶם
  english_pob_choice: I will cleanse you
  chosen_spanish: los limpiaré
  alternatives_spanish:
  - los purificaré
  - los dejaré limpios
  lexicon: HALOT
  rationale: «Limpiaré» mantiene el juego verbal con «limpios» y «agua limpia», y sigue de cerca el valor del verbo hebreo en este contexto de purificación.
theological_decisions:
- issue: Cleansing imagery and possible baptismal overreading
  english_pob_reading: Retain the language of ritual/moral cleansing without specifying sacramental mechanism.
  chosen_spanish_reading: Mantener el lenguaje de limpieza ritual y moral sin precisar un mecanismo sacramental.
  alternative_spanish_readings:
  - Leerlo principalmente como restauración nacional metafórica
  - Leerlo como referencia sacramental directa en el texto principal
  rationale: El hebreo presenta una imagen de purificación vinculada con la restauración del pueblo y con la remoción de impureza e idolatría. La traducción conserva esa apertura interpretativa sin resolverla hacia una lectura sacramental concreta.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el dictamen de alta concordancia se mantiene, por lo que este borrador sigue de cerca la solución auditada en inglés y ajusta solo la formulación al español natural.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia de limpieza: rociar con agua limpia, quedar limpios, ser limpiados.'
  - Se conserva el paralelismo entre limpio/impurezas/limpiar para reflejar el juego léxico de טהר.
  - Se usa un registro neutral de español latinoamericano apto para lectura eclesial amplia.
  - La nota conserva el matiz despectivo de גִּלּוּלִים sin volverlo excesivamente interpretativo en el texto principal.
