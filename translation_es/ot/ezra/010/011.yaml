    rationale: No es un error de fidelidad, pero una leve mejora estilística da mayor naturalidad y dignidad sin cambiar el sentido.
  revised_spanish_text: Ahora, pues, den alabanza[a] a Yahvé, el Dios de sus padres, y hagan su voluntad. Sepárense de los pueblos de la tierra y de las mujeres extranjeras[b].
