    issue: צֹאן fue traducido como 'la oveja' en lugar de un colectivo.
    rationale: El hebreo צֹאן es un sustantivo colectivo ('rebaño/flock', incluyendo ovejas y cabras). 'La oveja' cambia el número y estrecha indebidamente el referente.
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado y no refleja la justificación léxica del POB inglés.
    rationale: La nota inglesa [b] explica el modismo 'literalmente, la obra/producto del olivo prueba falsa', no 'no haya ganado en los establos'. Debe acompañar la cláusula del olivo.
  - severity: low
