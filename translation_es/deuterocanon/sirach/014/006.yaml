translation:
  language: es
  text: El que es malo para sí mismo[a], no hay ninguno más malo que él; y esta es la retribución de su mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el que se envidia a sí mismo» o «el que es avaro consigo mismo», lo que hace explícito el sentido de una mezquindad dirigida a uno mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַע לְנַפְשׁוֹ
  english_pob_choice: one who is evil to himself
  chosen_spanish: el que es malo para sí mismo
  alternatives_spanish:
  - el que es malo para su propia alma
  - el que se hace daño a sí mismo
  - el que se niega a sí mismo
  lexicon: HALOT; BDAG
  rationale: 'La frase hebrea es literal y moralmente amplia: ‘malo para sí mismo / para su alma’. En español, ‘malo para sí mismo’ conserva esa construcción y evita reducir prematuramente el sentido. La nota preserva la matización griega de alguien que se niega o escatima aun para sí.'
- source_word: אֵין רַע מִמֶּנּוּ
  english_pob_choice: there is none more evil than he
  chosen_spanish: no hay ninguno más malo que él
  alternatives_spanish:
  - no hay nadie peor que él
  - nadie es más perverso que él
  lexicon: HALOT
  rationale: La comparación hebrea es directa y repite la raíz רע. ‘Más malo’ mantiene la repetición léxica de forma natural en español y conserva el tono sentencioso del proverbio.
- source_word: תּשְלוּמַת
  english_pob_choice: repayment
  chosen_spanish: retribución
  alternatives_spanish:
  - pago
  - recompensa
  - retribución justa
  lexicon: HALOT
  rationale: El sustantivo indica pago devuelto, compensación o retribución. ‘Retribución’ comunica bien la idea de consecuencia moral sin añadir justicia explícita que el texto no formula aquí.
- source_word: רָעָתוֹ
  english_pob_choice: his evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su perversidad
  - su malicia
  lexicon: HALOT
  rationale: El hebreo repite la misma raíz רע. ‘Maldad’ mantiene la repetición temática en un español natural; ‘mal’ sería más cercano pero menos enfático. La alternativa ‘maldad’ permite que la frase final suene idiomática sin borrar el eco del original.
- source_word: τοῦ βασκαίνοντος ἑαυτόν
  english_pob_choice: one who is evil to himself
  chosen_spanish: el que es malo para sí mismo
  alternatives_spanish:
  - el que se envidia a sí mismo
  - el que se escatima a sí mismo
  - el que es avaro consigo mismo
  lexicon: BDAG
  rationale: La versión griega sugiere a alguien que ‘se mira con mala voluntad’ o que es mezquino aun consigo mismo. Como el hebreo es la base principal y es más general, se sigue su sentido en el texto principal; la nota recoge la alternativa griega para no perder esa tensión lexical.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió ‘for his evil’ a ‘of his evil’ para seguir más de cerca el hebreo. El español adopta una construcción equivalente (‘retribución de su maldad’) y conserva el paralelismo y la repetición de רע mediante ‘malo/maldad’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, aunque este versículo no lo contiene.
  - Se evita ‘SEÑOR’ y vocabulario eclesiástico añadido, porque el texto no lo exige.
  - Se conserva una dicción sobria y bíblica, pero en español natural, sin calcos innecesarios.
