translation:
  language: es
  text: Y tendrás un lugar fuera del campamento[a], y saldrás allí, fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo yād, literalmente 'mano'; aquí probablemente es un uso idiomático para un lugar o sitio designado. Algunas traducciones lo concretan más como una estaca o implemento a la luz del versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - mano
  - estaca
  - implemento
  lexicon: HALOT
  rationale: El hebreo literal 'mano' no encaja bien en la sintaxis ni en el contexto inmediato de las normas de limpieza fuera del campamento. Como en el audit trail en inglés, se entiende idiomáticamente como un sitio designado; 'lugar' comunica con naturalidad esa función en español.
- source_word: תִּהְיֶה לְךָ
  english_pob_choice: you shall have
  chosen_spanish: tendrás
  alternatives_spanish:
  - habrá para ti
  - te pertenecerá
  lexicon: HALOT
  rationale: La construcción hebrea con היה + לְ expresa disponibilidad o asignación. 'Tendrás' transmite esa provisión de manera natural en español y conserva el tono directivo.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - más allá del campamento
  lexicon: HALOT
  rationale: '''Fuera del campamento'' reproduce con claridad la ubicación externa indicada por מִחוּץ y conserva el referente del campamento como perímetro comunitario.'
- source_word: וְיָצָאתָ
  english_pob_choice: and you shall go out
  chosen_spanish: y saldrás
  alternatives_spanish:
  - y irás afuera
  - y saldrás fuera
  lexicon: HALOT
  rationale: יצא en qal significa 'salir' o 'ir afuera'. 'Saldrás' es natural y fiel al movimiento mandado.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - a ese lugar
  lexicon: HALOT
  rationale: El adverbio direccional apunta al sitio ya mencionado. 'Allí' es la forma más directa y elegante en español.
- source_word: חוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - externamente
  lexicon: HALOT
  rationale: El hebreo final refuerza la idea de exterioridad. Mantener 'afuera' conserva esa repetición enfática sin volver la frase forzada.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores en el audit trail; se conserva la solución idiomática de 'lugar' para יָד y la repetición enfática de 'afuera' para חוץ.
  spanish_consistency_notes:
  - Se mantiene 'campamento' para מַחֲנֶה, coherente con el registro legal del pasaje.
  - Se evita 'SEÑOR' u otras sustituciones, porque el versículo no contiene el nombre divino ni una alusión directa al tetragrámaton.
  - La duplicación de 'fuera/afuera' refleja la redundancia enfática del hebreo, como en el inglés auditado.
