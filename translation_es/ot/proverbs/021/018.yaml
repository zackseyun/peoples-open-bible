review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido sustitutivo del hebreo: כֹּפֶר como «rescate», לַצַּדִּיק como «para el justo», y תַחַת como «en lugar de». También conserva adecuadamente el paralelismo entre רָשָׁע / בּוֹגֵד y צַדִּיק / יְשָׁרִים. Sin embargo, «El perverso es rescate» suena poco natural en español sin artículo indefinido.'
  spanish_quality_summary: 'La redacción es clara y fiel, pero requiere un ajuste menor de naturalidad idiomática: en español bíblico legible, «es un rescate» suena mucho mejor que «es rescate». El resto del verso es bien legible y mantiene el tono sapiencial. «Traicionero» y «los rectos» son opciones aceptables y dignas.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave están bien alineados: «justo», «rectos», «rescate». «Perverso» para רָשָׁע es posible, aunque «malvado» o «impío» también serían válidos; no exige cambio porque preserva bien la categoría moral. La nota alternativa está bien fundada y debe conservarse.'
  issues:
  - severity: medium
    issue: Falta el artículo indefinido en «es rescate»
    rationale: Aunque el hebreo nominal puede omitir artículo, en español la predicación nominal aquí requiere naturalmente «un rescate». Sin él, la frase resulta forzada y menos idiomática.
  revised_spanish_text: El perverso es un rescate[a] para el justo, y el traicionero en lugar de los rectos.
  revised_footnotes:
  - marker: a
    text: O «El perverso sirve como sustituto para el justo, y el traicionero para los rectos».
    reason: lexical_alternative
  revision_rationale: Se añade «un» para producir un español natural y plenamente inteligible sin alterar el sentido metafórico y sustitutivo de כֹּפֶר. No se requieren más cambios.
