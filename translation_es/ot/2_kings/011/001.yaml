revisions:
- from: Entonces Atalía[a], la madre de Ocozías, vio que su hijo había muerto, y se levantó y destruyó a toda la descendencia real.
  to: Y Atalía[a], la madre de Ocozías, vio que su hijo había muerto, así que se levantó y destruyó a toda la descendencia real.
  rationale: 'La revisión hace dos ajustes menores: sustituye «Entonces» por «Y» para reflejar de manera más sobria el waw narrativo inicial, y cambia «y se levantó» por «así que se levantó» para conservar la relación consecutiva destacada en la auditoría inglesa. También se simplifica la nota para que la glosa literal sea la verdadera alternativa preservada, mientras el texto principal mantiene el español natural «descendencia real».'
