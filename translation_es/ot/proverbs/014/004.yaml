translation:
  language: es
  text: Donde no hay bueyes, el pesebre[a] está limpio; pero hay abundante cosecha[b] por la fuerza de un buey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comedero» para «pesebre».
    reason: lexical_alternative
  - marker: b
    text: O «producto», «cosechas» o «rendimiento» para «cosecha».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  english_pob_choice: Where there are no
  chosen_spanish: Donde no hay
  alternatives_spanish:
  - En ausencia de
  - Cuando no hay
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia proverbial. «Donde no hay» expresa de manera natural en español la relación condicional/situacional sin añadir interpretación extra.
- source_word: אֲלָפִים
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - ganado
  - toros
  lexicon: HALOT
  rationale: Aunque el plural puede abarcar bovinos en general, el contexto agrícola y la mención paralela de שׁוֹר favorecen animales de labor. «Bueyes» preserva mejor la idea de fuerza de trabajo que «ganado» y suena más proverbial que «toros».
- source_word: אֵבוּס
  english_pob_choice: manger
  chosen_spanish: pesebre
  alternatives_spanish:
  - comedero
  - hondonada de alimento
  lexicon: HALOT
  rationale: El término designa el lugar donde se alimenta al animal. «Pesebre» es el equivalente español tradicional y claro; «comedero» también sería posible, pero «pesebre» mantiene la imagen proverbial con buena inteligibilidad.
- source_word: בָּר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - limpio de grano
  - vacío
  - puro
  lexicon: HALOT
  rationale: Aquí describe el pesebre libre del desorden asociado con tener bueyes. «Limpio» comunica bien el sentido práctico; «puro» sería demasiado abstracto, y «vacío» desplaza el foco del estado de limpieza.
- source_word: תְּבוּאוֹת
  english_pob_choice: crops
  chosen_spanish: cosechas
  alternatives_spanish:
  - producción
  - frutos
  - rendimiento
  lexicon: HALOT
  rationale: El sustantivo se refiere al producto agrícola. «Cosechas» conserva la imagen campesina concreta; «producción» o «rendimiento» serían más abstractos.
- source_word: בְּכֹחַ
  english_pob_choice: by the strength of
  chosen_spanish: por la fuerza de
  alternatives_spanish:
  - mediante la fuerza de
  - gracias a la fuerza de
  - por el trabajo de
  lexicon: HALOT
  rationale: La preposición expresa medio/instrumento. «Por la fuerza de» mantiene la relación causal y la conexión con la capacidad de trabajo del animal sin suavizarla.
- source_word: שׁוֹר
  english_pob_choice: an ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - un bovino
  lexicon: HALOT
  rationale: El singular funciona genéricamente y en español «buey» comunica mejor el animal de labor que «toro». Mantiene además la coherencia con «bueyes» al inicio del proverbio.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una lectura agrícola directa y no muestra revisiones textuales o teológicas. La traducción española sigue esa misma línea con equivalencia óptima, conservando el contraste entre orden doméstico y productividad.
  spanish_consistency_notes:
  - Se traduce YHWH como «Yahvé» en el proyecto, pero este verso no contiene el nombre divino.
  - Se prefirió «bueyes» y «un buey» por cohesión léxica y por la fuerza proverbial del español.
  - No se introdujeron notas teológicas porque el versículo es sapiential/agropecuario y el expediente inglés no registra tensiones doctrinales.
