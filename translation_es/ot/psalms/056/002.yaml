translation:
  language: es
  text: Sé clemente conmigo, oh Dios, porque el hombre jadea tras de mí[a]; todo el día, luchando, me oprime.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me pisotea», «me hostiga jadeando» o «quiere tragarme»; el verbo hebreo transmite un jadeo hostil o una persecución ansiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Sé benevolente conmigo
  alternatives_spanish:
  - Muéstrate favorable conmigo
  - Ten gracia conmigo
  - Ten misericordia de mí
  lexicon: HALOT
  rationale: El verbo pide la concesión de favor divino. En español, «sé benevolente conmigo» conserva la idea de gracia/favor sin cargar de forma penitencial la expresión, y evita la lectura más intensa de «misericordia» cuando el contexto es una súplica de auxilio.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Se trata de vocativo directo en oración; «oh Dios» reproduce de manera natural la apelación al destinatario.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base de la petición. «Porque» es claro en español y mantiene la relación causal.
- source_word: שְׁאָפַנִי
  english_pob_choice: pants after me
  chosen_spanish: jadea tras de mí
  alternatives_spanish:
  - me persigue con ansia
  - me acosa con avidez
  - me traga
  lexicon: HALOT
  rationale: El hebreo puede sugerir respiración ansiosa, persecución hostil o deseo de devorar. «Jadea tras de mí» preserva la imagen vívida del impulso hostil sin fijarla de manera demasiado interpretativa en una sola de las posibles extensiones.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un mortal
  - la humanidad
  lexicon: HALOT
  rationale: En el contexto, el enemigo es un individuo concreto; «el hombre» conserva el singular masculino del hebreo y la oposición entre la fragilidad humana y la ayuda divina.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día largo
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática normal en español para expresar continuidad constante.
- source_word: לֹחֵם
  english_pob_choice: fighting
  chosen_spanish: luchando
  alternatives_spanish:
  - combatiendo
  - peleando
  lexicon: HALOT
  rationale: El participio describe una acción continua y hostil. «Luchando» mantiene ese valor circunstancial en un español fluido.
- source_word: יִלְחָצֵנִי
  english_pob_choice: he oppresses me
  chosen_spanish: me oprime
  alternatives_spanish:
  - me presiona
  - me aflige
  - me hostiga
  lexicon: HALOT
  rationale: לחץ abarca presionar, apremiar y oprimir. «Me oprime» comunica bien la presión hostil y conserva la fuerza del verbo con naturalidad en español.
theological_decisions:
- issue: Valor de אֱנוֹשׁ en referencia al enemigo
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un mortal
  - la humanidad
  rationale: Se mantiene el singular masculino porque el salmo presenta a un opositor humano concreto, no a la humanidad en abstracto. Esto preserva la tensión teológica entre la oposición humana y la solicitud de favor divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con el control textual y con el auditoria inglesa: no se registran revisiones aplicadas; se mantiene la lectura de una amenaza humana continua y la súplica por favor divino.'
  spanish_consistency_notes:
  - Se usa «Dios» en vocativo, no «SEÑOR», porque el hebreo tiene אֱלֹהִים.
  - Se preserva la tensión del hebreo שְׁאָפַנִי con una imagen hostil dinámica, sin cerrarla en una sola paráfrasis tradicional.
  - «El hombre» mantiene el singular personal del hebreo אֱנוֹשׁ y evita una generalización impersonal.
  - Se evita «misericordia» como opción principal porque el audit trail inglés favorece gracia/favor más que penitencia.
