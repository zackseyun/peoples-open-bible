translation:
  language: es
  text: Y todo primogénito de asno lo redimirás con un cordero[a]; y si no lo redimes, le quebrarás el cuello. Y todo primogénito humano entre tus hijos varones lo redimirás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה es un término más amplio para una res menor del rebaño, a menudo oveja o cabra; aquí ‘cordero’ es una traducción natural por el contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּטֶר חֲמוֹר
  english_pob_choice: firstborn of a donkey
  chosen_spanish: primer nacido de asno
  alternatives_spanish:
  - primogénito de asno
  - el que abre el vientre de un asno
  lexicon: HALOT
  rationale: פֶּטֶר expresa lo que ‘abre’ el vientre, pero en español legal y ritual ‘primer nacido’ comunica con claridad la idea de primogenitura animal sin perder el sentido de apertura del nacimiento. ‘Asno’ conserva el registro bíblico y la referencia animal precisa.
- source_word: תִּפְדֶּה
  english_pob_choice: you shall redeem
  chosen_spanish: lo redimirás
  alternatives_spanish:
  - lo rescatarás
  - lo comprarás de nuevo
  lexicon: HALOT
  rationale: פדה tiene sentido cultual y jurídico de redención por sustitución o pago. ‘Redimir’ es el equivalente español más fiel y conserva ese matiz mejor que ‘rescatar’ o ‘comprar de nuevo’.
- source_word: בְּשֶׂה
  english_pob_choice: with a lamb
  chosen_spanish: con un cordero
  alternatives_spanish:
  - con una oveja
  - con una cabeza de ganado menor
  lexicon: HALOT
  rationale: שֶׂה es más amplio que ‘cordero’, pero en este contexto sacrificial el español natural y reverente es ‘cordero’. Se mantiene la decisión contextual del POB inglés, con una alternativa preservada en nota.
- source_word: וַעֲרַפְתּוֹ
  english_pob_choice: you shall break its neck
  chosen_spanish: le quebrarás el cuello
  alternatives_spanish:
  - le romperás el cuello
  - le desnucarás
  lexicon: HALOT
  rationale: ערף refiere a quebrar el cuello desde la nuca, no a un degüello ordinario. ‘Quebrarás el cuello’ es la forma española más clara y directa sin añadir interpretación extra.
- source_word: בְּכוֹר אָדָם
  english_pob_choice: firstborn of man
  chosen_spanish: primer nacido de hombre
  alternatives_spanish:
  - primogénito humano
  - primer nacido de la humanidad
  lexicon: HALOT
  rationale: אָדָם aquí contrasta con el asno y designa a la humanidad como clase. ‘Hombre’ conserva ese contraste y refleja la elección inglesa de mantener el valor de clase, sin convertirlo en un término genérico ambiguo.
- source_word: בְּבָנֶיךָ
  english_pob_choice: among your sons
  chosen_spanish: entre tus hijos
  alternatives_spanish:
  - entre tus hijos varones
  - entre tus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘entre tus hijos/varones’, en español ‘hijos’ es el término natural dentro de una ley de primogénitos y evita una dureza innecesaria. Mantiene la referencia familiar, mientras la nota léxica preserva la observación del hebreo explícito.
theological_decisions:
- issue: Valor de אָדָם como término de clase humana
  english_pob_reading: ‘firstborn of man’ retains man in the class sense, contrasted with donkey offspring
  chosen_spanish_reading: ‘primer nacido de hombre’ conserva el contraste entre humano y asno
  alternative_spanish_readings:
  - ‘primogénito humano’
  - ‘primer nacido de la humanidad’
  rationale: El hebreo contrapone dos clases de criaturas, no el sexo masculino frente al animal. ‘De hombre’ mantiene el paralelismo y la precisión de clase, dejando claro que se trata de seres humanos.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (אָדָם); Translation philosophy §4'
- issue: Tratamiento de בְּבָנֶיךָ en una ley de primogenitura
  english_pob_reading: ‘among your sons’ because the Hebrew explicitly says sons
  chosen_spanish_reading: ‘entre tus hijos’ como referencia familiar natural y legible
  alternative_spanish_readings:
  - ‘entre tus hijos varones’
  - ‘entre tus hijos’
  rationale: El hebreo es explícito y masculino, pero en español de lectura pública ‘hijos’ comunica adecuadamente el grupo de descendientes varones en esta ley. No se amplía a ‘hijos e hijas’ porque eso debilitaría la especificidad del texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; gender-accurate rendering policy'
translation_notes:
  revision_awareness: Se siguió el último pase revisado, que no introdujo cambios y fue confirmado con alta concordancia. La redacción española mantiene la estructura legal del hebreo, conserva la tensión lexical de שֶׂה mediante una nota, y refleja la distinción entre redención del asno y del primogénito humano.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - ‘Redimir’ se usó de manera uniforme para פדה.
  - ‘Asno’ y ‘cordero’ conservan el registro bíblico y la claridad pública.
  - ‘Primer nacido’ reproduce el valor legal de פֶּטֶר sin forzar una paráfrasis más interpretativa.
