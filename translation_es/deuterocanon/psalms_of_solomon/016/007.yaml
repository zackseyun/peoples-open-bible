lexical_decisions:
- source_word: ἐπικράτησόν μου
  english_pob_choice: Restrain me
  chosen_spanish: Contiéndeme
  alternatives_spanish:
  - Restringe mi conducta
  - Refrena mi vida
  - Tenme bajo tu dominio
  lexicon: LSJ
  rationale: ἐπικρατέω expresa ejercer control, dominio o poder sobre alguien. En este ruego, el sentido auditado en inglés es el de pedir a Dios que lo frene o lo contenga para apartarlo del mal. «Contiéndeme» conserva la fuerza de restricción y suena natural en español devocional.
- source_word: ἀπό ἁμαρτίας πονηρᾶς
  english_pob_choice: from evil sin
  chosen_spanish: del pecado malo
  alternatives_spanish:
  - del pecado perverso
  - del pecado maligno
  - del pecado inicuo
  lexicon: LSJ
  rationale: 'ἀπό indica separación: ser mantenido lejos de. πονηρᾶς añade cualidad moral negativa. Se conserva «pecado» con el calificativo «malo» para reflejar la tensión literal del griego y la lectura auditada en inglés, sin suavizar el doble énfasis.'
- source_word: καὶ ἀπὸ πάσης γυναικὸς πονηρᾶς
  english_pob_choice: and from every evil woman
  chosen_spanish: y de toda mujer mala
  alternatives_spanish:
  - y de toda mujer perversa
  - y de cualquier mujer mala
  - y de toda mujer malvada
  lexicon: LSJ
  rationale: 'πάσης con el singular tiene valor comprehensivo: «toda». Se mantiene «mujer» en singular y el calificativo moral negativo. «Mala» es menos intensamente interpretativa que «perversa» o «malvada», pero refleja el paralelo con πονηρᾶς y preserva la continuidad semántica del texto.'
- source_word: σκανδαλιζούσης
  english_pob_choice: who causes ... to stumble
  chosen_spanish: que hace tropezar
  alternatives_spanish:
  - que hace caer
  - que escandaliza
  - que lleva a caer
  lexicon: LSJ
  rationale: σκανδαλίζω conserva la imagen de hacer tropezar o caer en tropiezo. «Hace tropezar» reproduce esa metáfora de forma clara y bíblica en español, sin reducirla a una abstracción.
- source_word: ἄφρονα
  english_pob_choice: a foolish man
  chosen_spanish: a un hombre insensato
  alternatives_spanish:
  - a un hombre necio
  - a un insensato
  - a una persona insensata
  lexicon: LSJ
  rationale: ἄφρων designa a alguien sin sensatez o juicio. El griego es masculino singular; por eso se mantiene «hombre» en el texto principal. «Insensato» preserva el tono sapiencial y la fuerza moral de la palabra.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió la idea de «take charge of me» a «restrain me», entendiendo ἐπικράτησόν μου con ἀπό como una petición de ser contenido o refrenado, no simplemente administrado. La elección española sigue esa corrección y mantiene el matiz de separación frente al pecado y la mujer descrita.
  spanish_consistency_notes:
  - Se usó «Dios» para ὁ θεός conforme al estándar del proyecto.
  - Se mantuvo la metáfora de tropiezo para σκανδαλιζούσης, evitando neutralizarla.
  - Se conservó el masculino singular de ἄφρονα como «hombre» por fidelidad al griego y a la práctica de precisión de género del proyecto.
  - El adjetivo moral se expresó con «malo» para reflejar πονηρᾶς de manera consistente en ambos miembros del versículo.
  - La puntuación sigue un tono oracional breve y directo, adecuado para lectura pública.
