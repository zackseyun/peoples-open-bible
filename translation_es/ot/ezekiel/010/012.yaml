translation:
  language: es
  text: 'Y todos sus cuerpos[a], sus espaldas, sus manos, sus alas[b], y las ruedas estaban llenas de ojos alrededor: las ruedas de los cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «su carne».
    reason: lexical_alternative
  - marker: b
    text: La cláusula final también puede expresarse de manera más compacta como «sus cuatro ruedas» o «las ruedas de los cuatro de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשָׂרָם
  english_pob_choice: their bodies
  chosen_spanish: su carne
  alternatives_spanish:
  - sus cuerpos
  lexicon: HALOT
  rationale: El hebreo בָּשָׂר literalmente es «carne». La POB en inglés optó por «their bodies» para comunicar con naturalidad la totalidad física en una lista anatómica; en español, «su carne» conserva mejor la fuerza léxica concreta sin perder la referencia colectiva. «Sus cuerpos» sería más idiomático, pero atenúa el eco literal del hebreo.
- source_word: גַבֵּיהֶם
  english_pob_choice: their backs
  chosen_spanish: sus espaldas
  alternatives_spanish:
  - sus lomos
  - sus dorsos
  lexicon: HALOT
  rationale: El contexto es una enumeración de partes corporales, así que el sentido anatómico de גַּבֵּיהֶם encaja mejor como «sus espaldas». «Lomos» o «dorsos» son posibles, pero menos directos o más marcados en español.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  lexicon: HALOT
  rationale: יָד normalmente significa «mano». La POB inglesa también prefirió «hands»; en español, «manos» mantiene la correspondencia más natural y precisa. «Brazos» amplía innecesariamente el campo semántico.
- source_word: כַנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus plumas
  lexicon: HALOT
  rationale: En lenguaje visionario de criaturas celestiales, כָּנָף se traduce con claridad como «ala». «Alas» es el equivalente directo y más idiomático en español.
- source_word: הָאוֹפַנִּים
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - los carros
  - los aros
  lexicon: HALOT
  rationale: אוֹפַן designa una rueda. La imagen de Ezequiel debe conservarse como «ruedas», no parafrasearse. La POB en inglés también mantuvo «the wheels».
- source_word: מְלֵאִים עֵינַיִם
  english_pob_choice: were full of eyes
  chosen_spanish: estaban llenas de ojos
  alternatives_spanish:
  - estaban cubiertas de ojos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «llenos de ojos». «Llenas de ojos» preserva la imagen y sigue de cerca el texto; «cubiertas de ojos» es más interpretativo. En español, el plural femenino concuerda con «ruedas».
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todas partes
  lexicon: HALOT
  rationale: «Alrededor» expresa de manera natural el valor adverbial de סָבִיב y conserva la imagen circular. La POB inglesa eligió «all around» por la misma razón.
- source_word: לְאַרְבַּעְתָּם
  english_pob_choice: of the four of them
  chosen_spanish: de los cuatro
  alternatives_spanish:
  - de los cuatro seres
  - para los cuatro
  lexicon: HALOT
  rationale: El hebreo aclara que las ruedas pertenecen o están asociadas con los cuatro seres vivientes. En español, «de los cuatro» reproduce esa relación de pertenencia/asociación con concisión y sin imponer una explicación adicional.
- source_word: אוֹפַנֵּיהֶם
  english_pob_choice: the wheels of the four of them
  chosen_spanish: las ruedas de los cuatro
  alternatives_spanish:
  - sus ruedas
  lexicon: HALOT
  rationale: La frase final retoma y especifica las ruedas vinculadas a los cuatro. «Las ruedas de los cuatro» refleja la relación sin ambigüedad; «sus ruedas» sería más breve, pero puede sonar menos explícito respecto del antecedente.
theological_decisions:
- issue: La referencia corporal de בָּשָׂר en una visión profética
  english_pob_reading: their bodies / more literally, their flesh
  chosen_spanish_reading: su carne, con posible lectura más literal de «su carne» frente a una paráfrasis corporal
  alternative_spanish_readings:
  - sus cuerpos
  - su carne
  rationale: No hay motivo textual para suavizar el término. La POB señaló la tensión entre el sentido literal «flesh» y la comunicación natural «bodies». En español conviene mantener «carne» en el texto para no perder la fuerza del hebreo, dejando abierta la lectura de totalidad física sin borrar la literalidad.
  doctrine_reference: Ezequiel 10:12; halitos de visión profética y lenguaje corpóreo
- issue: La relación final de las ruedas con «los cuatro»
  english_pob_reading: the wheels of the four of them
  chosen_spanish_reading: las ruedas de los cuatro
  alternative_spanish_readings:
  - sus ruedas
  - las ruedas pertenecientes a los cuatro
  rationale: La POB revisó la clausula final para conservar con naturalidad la relación de pertenencia/asociación. En español, «de los cuatro» mantiene la misma relación sin añadir doctrina ni interpretar más allá del hebreo.
  doctrine_reference: Ezequiel 10:12; estructura descriptiva de la visión
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «of the four of them» por ser más natural y formal que una formulación explicativa. En español se reflejó esa misma decisión con «de los cuatro», manteniendo el paralelismo con la estructura hebrea y la enumeración anatómica sin expandir innecesariamente el final del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se usó «carne» en el texto principal para preservar la tensión léxica documentada entre lectura literal y naturalidad comunicativa.
  - Se preservó la imagen concreta de «ruedas» y no se sustituyó por una explicación interpretativa.
  - La concordancia femenina de «llenas» sigue a «las ruedas».
