translation:
  language: es
  text: Entonces los tres jóvenes[a], los guardias del cuerpo, los que custodiaban la persona del rey, se dijeron unos a otros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los guardias del cuerpo, los que custodiaban el cuerpo del rey». Aquí «la persona del rey» refleja el sentido cortesano de custodiar al propio rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: LSJ
  rationale: Marca la secuencia narrativa inmediata con un conector natural en español; conserva el valor temporal de transición sin añadir matices no presentes en el griego.
- source_word: οἱ τρεῖς νεανίσκοι
  english_pob_choice: the three young men
  chosen_spanish: los tres jóvenes
  alternatives_spanish:
  - los tres muchachos
  - los tres varones jóvenes
  lexicon: LSJ
  rationale: νεανίσκοι designa a hombres jóvenes; «jóvenes» es natural y mantiene la referencia a la edad sin volverla demasiado coloquial.
- source_word: οἱ σωματοφύλακες
  english_pob_choice: the bodyguards
  chosen_spanish: los guardias del cuerpo
  alternatives_spanish:
  - los guardias de la persona real
  - los guardaespaldas
  lexicon: LSJ
  rationale: Se conserva el valor literal del compuesto («guardias del cuerpo») para no borrar la imagen del original; en español suena comprensible y deja visible la relación con la expresión siguiente.
- source_word: οἱ φυλάσσοντες
  english_pob_choice: who were guarding
  chosen_spanish: los que custodiaban
  alternatives_spanish:
  - los que estaban guardando
  - que guardaban
  lexicon: LSJ
  rationale: El participio presente indica una acción/función en curso; «custodiaban» comunica bien la vigilancia continua en un registro digno y natural.
- source_word: τὸ σῶμα τοῦ βασιλέως
  english_pob_choice: the king’s person
  chosen_spanish: la persona del rey
  alternatives_spanish:
  - el cuerpo del rey
  - el rey mismo
  lexicon: LSJ
  rationale: En este contexto cortesano y de seguridad, σῶμα no se refiere solo al cuerpo físico sino al rey como persona protegida; «la persona del rey» evita una lectura material demasiado cruda y refleja la función idiomática, como en la nota inglesa.
- source_word: εἶπαν ἕτερος πρὸς τὸν ἕτερον
  english_pob_choice: said to one another
  chosen_spanish: se dijeron unos a otros
  alternatives_spanish:
  - se dijeron el uno al otro
  - hablaron entre sí
  lexicon: LSJ
  rationale: La expresión recíproca se vuelve a una forma idiomática natural en español, manteniendo el intercambio mutuo sin enfatizar de más la literalidad.
translation_notes:
  revision_awareness: El texto griego coincide con el testimonio auditado de Swete LXX 1909 y el contexto inglés muestra alta concordancia; no se aplicaron revisiones textuales ni cambios de sentido. La nota inglesa sobre σῶμα se reflejó en español para preservar la tensión entre el valor literal («cuerpo») y el sentido cortesano («persona»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton cuando aparezca, pero este versículo no lo contiene.
  - Se usa un español neutral y reverente, evitando calcos ingleses innecesarios.
  - Se conservó la ambigüedad funcional de σῶμα con una nota explicativa, como en el audit trail inglés.
