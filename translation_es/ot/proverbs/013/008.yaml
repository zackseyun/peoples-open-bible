translation:
  language: es
  text: La riqueza del hombre es el rescate de su vida, pero el pobre no oye una reprensión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “amenaza” o “reprensión”. La línea probablemente significa que al pobre no se le dirige una exigencia de extorsión o rescate, porque no tiene con qué pagar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּפֶר
  english_pob_choice: ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - precio de rescate
  - rescate pagado
  - compensación
  - soborno
  lexicon: HALOT
  rationale: כֹּפֶר nombra un pago que libera, cubre o evita una pena; en español, “rescate” comunica con naturalidad esa idea concreta de pago sustitutivo. “Precio de rescate” sería más explicativo, pero menos fluido. Se evita “soborno” porque el contexto sapiencial aquí favorece el valor de liberación/compensación, no el de corrupción.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  - vida de la persona
  lexicon: HALOT
  rationale: En este proverbio נֶפֶשׁ apunta a la vida concreta de la persona, no primariamente al alma en sentido teológico posterior. “Vida” preserva esa referencia práctica y el paralelo con el rescate.
- source_word: אִישׁ
  english_pob_choice: man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de la persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y proverbial. “Del hombre” conserva la forma general y el tono sentencioso sin introducir una paráfrasis inclusiva que altere la estructura del dicho.
- source_word: עָשְׁרוֹ
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  - abundancia
  lexicon: HALOT
  rationale: עָשֶׁר denota riqueza o bienes poseídos. “Riqueza” es el equivalente más natural en español y mantiene el contraste con “el pobre”.
- source_word: רָשׁ
  english_pob_choice: poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - pobre hombre
  - persona pobre
  - el necesitado
  lexicon: HALOT
  rationale: Como sustantivo/adjetivo en paralelo antitético, רָשׁ designa al pobre o indigente. “El pobre” es la forma más idiomática en español y conserva la brevedad proverbial.
- source_word: לֹא שָׁמַע
  english_pob_choice: does not hear
  chosen_spanish: no oye
  alternatives_spanish:
  - no escucha
  - no llega a oír
  - no recibe
  lexicon: HALOT
  rationale: שׁמע significa literalmente “oír”, aunque puede implicar atender. “No oye” reproduce la imagen hebrea de modo directo; la implicación social queda sugerida por el contexto y por la nota.
- source_word: גְּעָרָה
  english_pob_choice: a rebuke
  chosen_spanish: una reprensión
  alternatives_spanish:
  - un reproche
  - una reprensión severa
  - una amenaza
  lexicon: HALOT
  rationale: גְּעָרָה puede ser reprensión, reproche o incluso una advertencia amenazante. “Reprensión” es un equivalente sobrio y amplio. La posibilidad de una amenaza o exigencia coercitiva se preserva en la nota, siguiendo el audit trail en inglés.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se conserva la imagen económica/legal de כֹּפֶר y el paralelismo antitético entre el hombre rico y el pobre. La única decisión principal fue elegir “rescate” y “reprensión” en español para mantener claridad y naturalidad sin perder la ambigüedad social señalada por la nota inglesa.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve y sentencioso propio del proverbio.
  - Se evitó “SEÑOR” o terminología teológica no pertinente, dado que el verso no contiene nombre divino.
  - “El pobre” conserva el uso sustantivo de רָשׁ y la antítesis con “el hombre”.
  - La nota conserva la tensión entre “reprensión” y la posible lectura socioeconómica de amenaza/exigencia.
