    issue: Falta una nota al pie para la alternativa de בִּמְחֹקֵק
    rationale: El audit trail inglés conserva explícitamente la lectura alternativa personal ('with the lawgiver'). Las instrucciones requieren preservar alternativas significativas en notas cuando el inglés POB las preservó.
  - severity: low
    issue: '"Ahondaron" es menos idiomático que una opción más directa en este contexto'
    rationale: Aunque no es incorrecto, "ahondaron" con "pozo" puede sonar algo forzado. "Excavaron" conserva la distinción con "cavaron" y resulta más natural en español general.
  - severity: low
    issue: '"Bastón del gobernante" puede debilitar el matiz de insignia de autoridad'
    rationale: Dado el campo semántico de מְחֹקֵק y el razonamiento del POB inglés, "cetro del gobernante" expresa mejor un implemento de mando, sin perder la lectura instrumental.
  revised_spanish_text: El pozo que cavaron los príncipes, que los nobles del pueblo excavaron con el cetro[a] del gobernante, con sus bastones. Y desde el desierto fueron a Matana.[b]
  revised_footnotes:
