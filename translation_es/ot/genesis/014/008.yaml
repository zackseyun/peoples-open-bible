translation:
  language: es
  text: Entonces salieron el rey de Sodoma, el rey de Gomorra, el rey de Adma, el rey de Zeboyim y el rey de Bela (es decir, Zoar), y se dispusieron para la batalla[a] contra ellos en el valle de Sidim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con ellos en batalla'; la expresión hebrea es literalmente 'con ellos batalla', y algunas traducciones expresan el sentido de manera más explícita como 'contra ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: Then ... went out
  chosen_spanish: Entonces ... salieron
  alternatives_spanish:
  - Y ... salieron
  - Luego ... salieron
  - Salió
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, 'Entonces' conserva la progresión. Aunque el verbo está en singular en hebreo, el sujeto compuesto se expresa naturalmente en plural en español.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: Título estándar y natural en español; reproduce la repetición formal del hebreo para mantener el ritmo de la lista.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodom
  lexicon: HALOT
  rationale: Transliteración castellana usual del topónimo bíblico.
- source_word: עֲמֹרָה
  english_pob_choice: Gomorrah
  chosen_spanish: Gomorra
  alternatives_spanish:
  - Gomorrah
  lexicon: HALOT
  rationale: Forma castellana usual del topónimo bíblico.
- source_word: אַדְמָה
  english_pob_choice: Admah
  chosen_spanish: Adma
  alternatives_spanish:
  - Admah
  lexicon: HALOT
  rationale: Se translitera al español de forma breve y reconocible, sin añadir vocalización no presente en la tradición castellana.
- source_word: צביים
  english_pob_choice: Zeboiim
  chosen_spanish: Zeboyim
  alternatives_spanish:
  - Zeboím
  - Zeboiim
  lexicon: HALOT
  rationale: Se busca reflejar más de cerca la vocalización hebrea, manteniendo una forma legible en español. Se evita una adaptación excesivamente tradicional que oscurezca la relación con el hebreo.
- source_word: בֶּלַע הִוא צֹעַר
  english_pob_choice: Bela (that is, Zoar)
  chosen_spanish: Bela, que es Zoar
  alternatives_spanish:
  - Bela (es decir, Zoar)
  - Bela, esto es, Zoar
  lexicon: HALOT
  rationale: El hebreo contiene una apposición explicativa de identificación. En español, 'que es' comunica la equivalencia de manera clara y fiel sin sobreinterpretar.
- source_word: וַיַּעַרְכוּ
  english_pob_choice: they arrayed themselves for battle
  chosen_spanish: se alinearon para la guerra
  alternatives_spanish:
  - se dispusieron para la batalla
  - se ordenaron para la guerra
  - se formaron para combatir
  lexicon: HALOT
  rationale: ערך en contexto militar expresa ordenar/poner en formación. 'Se alinearon' conserva la idea de formación; 'para la guerra' traduce el marco bélico de la frase. 'Batalla' también es posible, pero 'guerra' mantiene la amplitud del sustantivo hebreo.
- source_word: אִתָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - con ellos
  lexicon: HALOT
  rationale: Aunque la preposición básica puede ser 'con', el contexto de combate y la decisión auditada en inglés favorecen el sentido adversarial explícito en español.
- source_word: מִלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - a la guerra
  lexicon: HALOT
  rationale: El sustantivo puede ser 'guerra' o 'batalla'. Aquí 'guerra' respeta el término amplio del hebreo y combina con la expresión militar precedente.
- source_word: בְּעֵמֶק הַשִּׂדִּים
  english_pob_choice: in the Valley of Siddim
  chosen_spanish: en el valle de Sidim
  alternatives_spanish:
  - en el valle de los Sidim
  - en el valle de Siddim
  lexicon: HALOT
  rationale: עֵמֶק se traduce naturalmente como 'valle'. 'Sidim' conserva el nombre propio en una forma española fluida; 'Siddim' quedaría más pegado a la transliteración inglesa que al uso castellano.
translation_notes:
  revision_awareness: 'La auditoría inglesa mantuvo el progreso narrativo con ''Then'' y ajustó la frase militar desde una formulación más literal a otra más precisa: ''arrayed themselves for battle against them''. La presente versión sigue esa revisión, pero en español opta por una construcción natural que conserve la formación militar (''se alinearon'') y explicite el carácter hostil (''contra ellos''), sin perder el sustantivo bélico del hebreo (''guerra'').'
  spanish_consistency_notes:
  - Se usa 'rey' de forma uniforme para cada gobernante, siguiendo la repetición del hebreo.
  - Se conserva la identificación explicativa de Bela con Zoar sin introducir glosa doctrinal.
  - '''Sodoma'', ''Gomorra'', ''Adma'', ''Zeboyim'' y ''Sidim'' se presentan en formas españolas legibles y consistentes con el estilo bíblico.'
  - No se introduce capitalización innecesaria en términos comunes como 'valle' o 'guerra'.
