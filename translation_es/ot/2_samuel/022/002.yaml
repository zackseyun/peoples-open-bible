translation:
  language: es
  text: 'Y dijo: «Yahvé es mi roca, mi fortaleza y mi libertador».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi libertador»; el hebreo hace explícito el pronombre final «para mí» y subraya la apropiación personal, aunque en español la serie posesiva ya comunica ese énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y él dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Y dijo» preserva la secuencia hebrea con naturalidad y sin añadir una implicación temporal que el contexto no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» para conservar el nombre divino personal, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: סַלְעִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peñasco
  - mi peña
  lexicon: HALOT
  rationale: סלע expresa una roca prominente, a menudo con matiz de refugio. «Mi roca» mantiene la metáfora protectora con buena idiomaticidad en español.
- source_word: וּמְצֻדָתִי
  english_pob_choice: and my fortress
  chosen_spanish: mi fortaleza
  alternatives_spanish:
  - mi bastión
  - mi fortín
  - mi plaza fuerte
  lexicon: HALOT
  rationale: El sustantivo designa una plaza fortificada o lugar defensivo. «Mi fortaleza» reproduce bien la imagen militar/protectora y es más natural que un calco técnico.
- source_word: וּמְפַלְטִי
  english_pob_choice: and my deliverer
  chosen_spanish: mi libertador
  alternatives_spanish:
  - mi salvador
  - el que me libra
  - mi rescatador
  lexicon: HALOT
  rationale: 'La forma participial funciona como sustantivo: el que rescata/libra. «Libertador» comunica esa función personal y continua en español, aunque «salvador» o «rescatador» son posibles según el matiz.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se conserva el nombre propio divino en español como «Yahvé» para reflejar la identidad personal del Dios de Israel, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del último pronombre לִי
  english_pob_reading: The final phrase “for me” is explicit in Hebrew and adds personal emphasis.
  chosen_spanish_reading: Se refleja de manera natural en la serie posesiva «mi roca, mi fortaleza y mi libertador» sin añadir una locución redundante.
  alternative_spanish_readings:
  - para mí
  - por mí
  rationale: En español, repetir una frase equivalente a «para mí» resultaría redundante y menos natural. La posesión repetida ya transmite la apropiación personal que subraya el hebreo.
  doctrine_reference: HALOT; revisión auditada sobre la explicitud del pronombre final
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente que eliminó el añadido final “for me” por naturalidad en inglés, aunque reconoce que el pronombre final está explícito en hebreo. La presente versión española sigue esa misma lógica: mantiene la explicitud semántica mediante la serie posesiva, sin introducir una frase final redundante.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se usa la secuencia posesiva «mi roca, mi fortaleza y mi libertador» para reflejar la acumulación hebrea y evitar sobretraducción del pronombre final.
  - El estilo es bíblico y sobrio, pero con sintaxis española actual y publicable.
