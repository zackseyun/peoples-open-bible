translation:
  language: es
  text: 'Creando el fruto de los labios[a]: Paz, paz[b] para el que está lejos[c] y para el que está cerca, dice Yahvé, y yo lo sanaré.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el producto de los labios»; la frase se refiere a lo que los labios producen, probablemente habla de alabanza o de confesión.
    reason: lexical_alternative
  - marker: b
    text: La repetición «Paz, paz» conserva el énfasis del hebreo.
    reason: lexical_alternative
  - marker: c
    text: La expresión «el que está lejos y el que está cerca» puede referirse de manera inmediata a miembros dispersos y cercanos del pueblo de Dios; más adelante, otras Escrituras retoman esta idea en un sentido más amplio.
    reason: cross_reference
lexical_decisions:
- source_word: בּוֹרֵ֖א
  english_pob_choice: Creating
  chosen_spanish: Creando
  alternatives_spanish:
  - Yo creo
  - el que crea
  lexicon: HALOT
  rationale: El participio qal funciona de manera predicativa y mantiene el tono de declaración continua. «Creando» conserva la forma participial del hebreo mejor que convertirlo en un verbo finito.
- source_word: נוב שְׂפָתָ֑יִם
  english_pob_choice: the fruit of the lips
  chosen_spanish: el fruto de los labios
  alternatives_spanish:
  - el producto de los labios
  - alabanza de los labios
  lexicon: HALOT
  rationale: La imagen hebrea alude a lo que los labios producen. «Fruto de los labios» sigue de cerca la metáfora y permanece más abierto que «alabanza», que sería demasiado interpretativo.
- source_word: שָׁל֨וֹם שָׁל֜וֹם
  english_pob_choice: Peace, peace
  chosen_spanish: Paz, paz
  alternatives_spanish:
  - paz completa
  - bienestar, bienestar
  lexicon: HALOT
  rationale: La repetición enfática debe conservarse en español. «Paz» es la equivalencia natural de shalom y mantiene su amplitud semántica sin reducirlo a calma interior.
- source_word: לָ/רָח֧וֹק וְ/לַ/קָּר֛וֹב
  english_pob_choice: to the one far off and to the one near
  chosen_spanish: para el que está lejos y para el que está cerca
  alternatives_spanish:
  - para el lejano y el cercano
  - al distante y al cercano
  lexicon: HALOT
  rationale: El ל marca destinatarios del anuncio. En español, «para el que está lejos / cerca» suena natural y conserva los adjetivos sustantivados sin precisar más de lo que el texto dice.
- source_word: אָמַ֥ר יְהוָ֖ה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dijo Yahvé
  - declara Yahvé
  lexicon: HALOT
  rationale: El hebreo usa una fórmula profética con valor presente. «Dice Yahvé» reproduce ese force context y aplica el criterio doctrinal del nombre divino como transliteración, no como sustitución por un título.
- source_word: וּ/רְפָאתִֽי/ו
  english_pob_choice: and I will heal him
  chosen_spanish: y yo lo sanaré
  alternatives_spanish:
  - y lo sanaré
  - y yo lo curaré
  lexicon: HALOT
  rationale: «Sanar» comunica bien רפא en un contexto de restauración divina y mantiene la resonancia física y reparadora. El futuro español refleja el valor resultativo/promisorio del hebreo en este contexto.
theological_decisions:
- issue: Identidad de «el que está lejos y el que está cerca»
  english_pob_reading: Retained as a general description of recipients without specifying whether this refers to exiled Israelites only or more broadly to all who are distant and near.
  chosen_spanish_reading: Se conserva como una descripción abierta de los destinatarios, sin precisar si se trata solo de israelitas dispersos y cercanos o de un alcance más amplio.
  alternative_spanish_readings:
  - desterrados y cercanos
  - judíos y gentiles
  - exiliados y locales
  rationale: El contexto inmediato favorece restauración para el pueblo de Dios, pero el hebreo no define explícitamente los grupos. La traducción preserva esa apertura sin resolverla teológicamente en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa en vez de cerrarla en la traducción.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje se mantiene en alta concordancia con el texto fuente y con el audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el criterio del proyecto para יְהוָה.
  - Se conserva la repetición enfática «Paz, paz» sin neutralizarla.
  - «Sanaré» se eligió para reflejar tanto curación como restauración.
  - No se añadió una nota de alcance para «lejos / cerca» en el texto principal, porque el inglés POB ya preserva esa apertura sin cerrar la identificación.
