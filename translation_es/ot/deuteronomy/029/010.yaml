translation:
  language: es
  text: tus pequeños[a], tus esposas, y el extranjero residente[b] que está en medio de tu campamento, desde el que corta tu leña hasta el que saca tu agua,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus hijos». El hebreo טַף se refiere especialmente a niños pequeños o dependientes.
    reason: lexical_alternative
  - marker: b
    text: O «el forastero». El hebreo גֵּר designa a un extranjero residente que vive dentro de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: tus pequeños
  alternatives_spanish:
  - tus hijos
  - tus dependientes
  lexicon: HALOT
  rationale: טַף designa especialmente a niños pequeños o dependientes, no solo a la descendencia en general. «Pequeños» conserva la referencia concreta y permite el matiz de edad/fragilidad que la nota inglesa preserva con ‘little ones’.
- source_word: נְשֵׁיכֶם
  english_pob_choice: your wives
  chosen_spanish: tus esposas
  alternatives_spanish:
  - tus mujeres
  lexicon: HALOT
  rationale: En este contexto de pacto y asamblea, el sentido relacional normal de נָשִׁים con posesivo de segunda persona es «esposas». Es claro y natural en español, y evita una lectura genérica de «mujeres» que sería menos precisa.
- source_word: וְגֵרְךָ
  english_pob_choice: and the sojourner
  chosen_spanish: y el extranjero residente
  alternatives_spanish:
  - y el forastero residente
  - y el forastero
  - y el extranjero
  lexicon: HALOT
  rationale: גֵּר es un residente extranjero integrado en la comunidad, no un simple transeúnte. «Extranjero residente» explicita esa fuerza social y legal en español; la POB inglesa también conserva esa distinción con ‘sojourner’ y su nota alternativa.
- source_word: אֲשֶׁר בְּקֶרֶב מַחֲנֶיךָ
  english_pob_choice: who is in the midst of your camp
  chosen_spanish: que está en medio de tu campamento
  alternatives_spanish:
  - que está en tu campamento
  - que está dentro de tu campamento
  lexicon: HALOT
  rationale: «En medio de tu campamento» reproduce la imagen espacial de בְּקֶרֶב y mantiene el tono de inclusión comunitaria. «Que está» representa de forma natural el relativo אֲשֶׁר.
- source_word: מֵחֹטֵב עֵצֶיךָ
  english_pob_choice: from the one who chops your wood
  chosen_spanish: desde el que corta tu leña
  alternatives_spanish:
  - desde el leñador de tu leña
  - desde el que parte tu madera
  lexicon: HALOT
  rationale: El participio expresa una ocupación/acción menial; «el que corta» conserva esa fuerza verbal. «Leña» es una equivalencia idiomática adecuada en español para עֵץ en este contexto de combustible/labor doméstica.
- source_word: עַד שֹׁאֵב מֵימֶיךָ
  english_pob_choice: to the one who draws your water
  chosen_spanish: hasta el que saca tu agua
  alternatives_spanish:
  - hasta el que trae tu agua
  - hasta el aguador
  lexicon: HALOT
  rationale: «Saca tu agua» mantiene el paralelismo verbal con «corta tu leña» y refleja el participio de acción. «Hasta» reproduce la fuerza de rango de עַד, como en la POB inglesa con ‘from ... to ...’.
theological_decisions:
- issue: Alcance social de la asamblea del pacto
  english_pob_reading: The verse explicitly includes all strata of the community, including resident foreigners and low-status laborers, without narrowing the scope to ethnic Israelites alone.
  chosen_spanish_reading: El versículo incluye explícitamente a todos los niveles de la comunidad, incluyendo al extranjero residente y a los trabajadores de baja condición, sin reducir el alcance a los israelitas étnicos solamente.
  alternative_spanish_readings:
  - El versículo enumera solo a israelitas propiamente dichos
  - Las categorías de trabajo son meramente metafóricas
  rationale: El hebreo enumera de manera abierta a quienes están presentes en la asamblea del pacto. La traducción española debe preservar esa amplitud social y no restringir el texto a un grupo étnico más estrecho. Esto es una observación textual y social, no una imposición doctrinal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente «who is» para representar mejor אֲשֶׁר en la cláusula del extranjero residente. En español se refleja naturalmente con «que está», sin necesidad de marcar un cambio adicional. No hubo otros cambios sustanciales en el contenido textual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se prefirió «extranjero residente» sobre «forastero» o «forastero residente» para conservar la fuerza social-legal de גֵּר.
  - Se usó «leña» como equivalente idiomático de עֵץ en este contexto de labor doméstica, sin perder la referencia a cortar madera.
  - La estructura de rango «desde ... hasta ...» sigue la progresión del hebreo y el patrón de la POB inglesa.
