review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido legal del hebreo: נֵדֶר = «voto», אַלְמָנָה = «viuda», גְרוּשָׁה = «mujer divorciada», y la idea de validez obligatoria de יָקוּם עָלֶיהָ. También preserva el alcance amplio de כֹּל אֲשֶׁר. Sin embargo, «todo aquello con que se haya obligado» omite en el texto el matiz reflexivo explícito de עַל נַפְשָׁהּ, documentado en las decisiones léxicas.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para alinear mejor la naturalidad con el detalle semántico. «Todo aquello con que se haya obligado» suena aceptable, pero «por lo que se haya obligado a sí misma» expresa con más claridad el reflexivo sin volverse rígido. La nota al pie actual usa «obligante», que resulta poco natural en español bíblico general; «será vinculante para ella» o «quedará como obligación sobre ella» sería más idiomático.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Voto» es correcto para נדר. No aparecen términos sensibles del glosario mayor. La revisión propuesta mantiene la decisión documentada de conservar el matiz legal de «shall stand» con una formulación española natural.
  issues:
  - severity: medium
    issue: El texto principal no expresa con suficiente claridad el reflexivo de עַל נַפְשָׁהּ.
    rationale: El hebreo indica literalmente que ella ató la obligación «sobre sí misma». «Se haya obligado» comunica autoimposición, pero al haberse documentado «ella misma» en las decisiones léxicas, conviene reflejarlo de forma más explícita en el texto.
  - severity: low
    issue: 'La nota al pie usa una formulación poco natural: «obligante sobre ella».'
    rationale: Aunque intenta conservar la alternativa léxica, «obligante» no es la opción más clara ni eclesialmente legible en español general. «Vinculante para ella» transmite mejor la fuerza legal de la alternativa inglesa «binding on her».
  revised_spanish_text: Y el voto de una viuda o de una mujer divorciada—todo aquello por lo que se haya obligado a sí misma—quedará en firme contra ella[a].
  revised_footnotes:
  - marker: a
    text: O «será vinculante para ella» para «quedará en firme contra ella».
    reason: lexical_alternative
  revision_rationale: La revisión hace explícito el sentido reflexivo de עַל נַפְשָׁהּ («a sí misma») y mejora la naturalidad de la nota alternativa, manteniendo el tono legal y la fidelidad a las decisiones del POB inglés.
