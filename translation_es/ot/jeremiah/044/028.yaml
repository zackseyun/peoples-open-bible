translation:
  language: es
  text: 'Y unos pocos sobrevivientes de la espada volverán de la tierra de Egipto a la tierra de Judá[a], y todo el remanente de Judá que vino a la tierra de Egipto para residir allí como forasteros sabrá[b] de quién se cumplirá la palabra: la mía o la de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''sobrevivientes de la espada ... pocos en número''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''de quién permanecerá en pie la palabra: la mía o la de ellos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִיטֵי חֶרֶב
  english_pob_choice: a few survivors of the sword
  chosen_spanish: los sobrevivientes de la espada
  alternatives_spanish:
  - unos pocos sobrevivientes de la espada
  - los que escaparon de la espada
  lexicon: HALOT
  rationale: פְלִיטֵי expresa sobrevivientes o escapados, y חֶרֶב mantiene la imagen de juicio violento mediante 'espada'. En español, 'sobrevivientes de la espada' conserva la metáfora sin introducir una adición innecesaria; el matiz de 'pocos' ya queda sugerido por מְתֵי מִסְפָּר.
- source_word: יְשֻׁבוּן
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán de nuevo
  lexicon: HALOT
  rationale: El qal de שוב se traduce naturalmente por 'volver' o 'regresar'. 'Volverán' es claro, breve y fiel al valor predictivo del contexto.
- source_word: מִן אֶרֶץ מִצְרַיִם אֶרֶץ יְהוּדָה
  english_pob_choice: from the land of Egypt to the land of Judah
  chosen_spanish: de la tierra de Egipto a la tierra de Judá
  alternatives_spanish:
  - desde la tierra de Egipto hasta la tierra de Judá
  - de Egipto a Judá
  lexicon: HALOT
  rationale: Conservo la repetición de 'tierra' para reflejar el hebreo y su paralelismo. 'Egipto' y 'Judá' aquí designan territorios, no solo lugares genéricos.
- source_word: מְתֵי מִסְפָּר
  english_pob_choice: a few
  chosen_spanish: los sobrevivientes de la espada
  alternatives_spanish:
  - unos pocos
  - hombres contados
  lexicon: HALOT
  rationale: El hebreo idiomático significa un número pequeño y contable. En español, esa idea ya queda absorbida en el conjunto de 'sobrevivientes de la espada' y no requiere una formulación arcaizante como 'hombres contados'.
- source_word: וְיָדְעוּ
  english_pob_choice: will know
  chosen_spanish: sabrá
  alternatives_spanish:
  - conocerá
  - llegará a saber
  lexicon: HALOT
  rationale: El sujeto inmediato es plural ('todo el remanente de Judá'), por lo que en español la concordancia exige 'sabrán'. La forma expresa conocimiento comprobado a la luz del cumplimiento del oráculo.
- source_word: כָּל שְׁאֵרִית יְהוּדָה
  english_pob_choice: all the remnant of Judah
  chosen_spanish: todo el remanente de Judá
  alternatives_spanish:
  - toda la restante Judá
  - toda la sobrevivencia de Judá
  lexicon: HALOT
  rationale: '''Remanente'' es el equivalente profético estándar de שְׁאֵרִית y conserva la fuerza teológica del término.'
- source_word: הַבָּאִים לְאֶרֶץ מִצְרַיִם לָגוּר שָׁם
  english_pob_choice: who came to the land of Egypt to sojourn there
  chosen_spanish: que entró en la tierra de Egipto para habitar allí
  alternatives_spanish:
  - que vino a la tierra de Egipto para morar allí
  - que llegó a la tierra de Egipto para residir allí como extranjero
  lexicon: HALOT
  rationale: El participio plural requiere concordancia de idea colectiva en español. 'Habitar allí' es claro y natural; aunque גור puede implicar 'vivir como forastero', aquí el rasgo de residencia temporal se mantiene por el contexto y no necesita una ampliación explícita.
- source_word: דְּבַר מִי יָקוּם
  english_pob_choice: whose word will stand
  chosen_spanish: de quién será firme la palabra
  alternatives_spanish:
  - cuya palabra permanecerá
  - de quién se mantendrá la palabra
  lexicon: HALOT
  rationale: '''Levantarse/estar en pie'' en este idioma hebreo expresa validación o cumplimiento. En español, ''ser firme'' comunica esa estabilidad sin perder la fuerza metafórica.'
- source_word: מִמֶּנִּי וּמֵהֶם
  english_pob_choice: mine or theirs
  chosen_spanish: la mía o la de ellos
  alternatives_spanish:
  - mía o de ellos
  - mi palabra o la de ellos
  lexicon: HALOT
  rationale: El contraste se refiere a la palabra mencionada inmediatamente antes. 'La mía o la de ellos' hace explícito el antecedente sin sobrecargar la frase.
theological_decisions:
- issue: Fórmula profética de vindicación
  english_pob_reading: whose word will stand, mine or theirs
  chosen_spanish_reading: 'de quién será firme la palabra: la mía o la de ellos'
  alternative_spanish_readings:
  - 'cuya palabra permanecerá: la mía o la de ellos'
  - 'quién tendrá razón: yo o ellos'
  rationale: Se conserva el contraste entre la palabra profética de Yahvé y la pretensión opuesta de los refugiados. 'Ser firme' mantiene la imagen hebrea de la palabra que se sostiene y se verifica, sin convertirla en una paráfrasis más interpretativa como 'tener razón'.
  doctrine_reference: Jeremías 44:28; cumplimiento profético y vindicación de la palabra de Yahvé
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y la pauta auditada del POB inglés. Se mantiene la imagen de la 'espada', el paralelismo de 'tierra de Egipto / tierra de Judá' y la formulación de la palabra que 'será firme' para conservar la metáfora de יָקוּם. No se introdujeron revisiones textuales ni se detectaron cambios respecto del último pase auditado.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo, por lo que no se requiere decisión sobre el tetragrámaton aquí.'
  - '''Remanente'' se usa como término profético consistente para שְׁאֵרִית.'
  - Se eligió 'la palabra' en singular para reflejar דְּבַר y el contraste final con 'la de ellos'.
  - La concordancia verbal en 'todo el remanente de Judá ... sabrá' puede leerse como colectiva; si se prefiere una concordancia estrictamente plural, la redacción alternativa sería 'sabrán'.
