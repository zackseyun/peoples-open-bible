id: HEB.2.9
reference: Hebrews 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸν δὲ βραχύ τι παρ’ ἀγγέλους ἠλαττωμένον βλέπομεν Ἰησοῦν διὰ τὸ πάθημα τοῦ θανάτου δόξῃ καὶ τιμῇ ἐστεφανωμένον, ὅπως χωρὶς θεοῦ ὑπὲρ παντὸς γεύσηται θανάτου.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/002/009.yaml
  text: But we see Jesus, who was made lower than the angels for a little while, crowned with glory and honor because of the suffering of death, so that by the grace of God he might taste death for everyone.
translation:
  language: ko
  text: 그러나 우리는 천사들보다 잠시 낮아지셨던 예수께서 죽음의 고난을 인하여 영광과 존귀의 관을 쓰신 것을 봅니다. 이는 하나님의 은혜로[a] 그가 모든 사람을 위하여 죽음을 맛보시려 함이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '본문상의 큰 이문(異文): 다수 사본은 χάριτι θεοῦ(「하나님의 은혜로」), 일부 사본(예: 0121b, 424c, 1739mg, 오리겐 일부)은 χωρὶς θεοῦ(「하나님을 떠나/하나님 없이」)로 읽는다. SBLGNT 본문은 χωρὶς θεοῦ를 채택하나, 압도적 사본 증거와 문맥은 「하나님의 은혜로」를 지지하므로 본 번역은 「은혜로」를 본문에 두고 이문을 각주에 둔다. 대안 독법: 「하나님을 떠나서 모든 자를 위하여 죽음을 맛보시려 함이었습니다」.'
    reason: textual_variant
theological_decisions:
- issue: 2:9의 χάριτι θεοῦ vs. χωρὶς θεοῦ 본문 이문
  chosen_reading: 하나님의 은혜로 (χάριτι θεοῦ)
  alternative_readings:
  - 하나님을 떠나 / 하나님 없이 (χωρὶς θεοῦ)
  rationale: SBLGNT 본문은 χωρὶς θεοῦ를 채택하나, 거의 모든 주요 대문자 사본(א, A, B, C, D 등)과 압도적 다수 사본은 χάριτι θεοῦ를 읽는다. 문맥상 그리스도 죽음의 신학적 동인을 가리키는 「은혜」가 자연스러우며, 한국 교회 전통 번역의 일치된 결정도 「은혜」다. 본문에 「은혜로」를 두고 χωρὶς θεοῦ 독법은 각주로 남긴다.
  doctrine_reference: 'DOCTRINE.md: textual decisions; METHODOLOGY.md: critical apparatus weighting'
