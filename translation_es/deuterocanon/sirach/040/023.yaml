    issue: La nota b no coincide con la nota léxica auditada sobre אשה = «woman/wife».
    rationale: 'El English POB conserva una nota específica: el hebreo dice «woman» y el griego orienta hacia sentido marital, de ahí «wife». El borrador español omite esa decisión y la reemplaza por otra nota no equivalente.'
  - severity: medium
    issue: La nota b afirma inexactamente que el griego añade una «matización de utilidad temporal».
    rationale: El paralelo griego apoya el elemento temporal por εἰς καιρόν, pero no añade específicamente la idea de «utilidad»; esa formulación procede de la revisión del inglés para naturalidad. La nota actual puede confundir al lector sobre la evidencia fuente.
  - severity: low
    issue: El orden y contenido de las notas no reflejan el expediente inglés.
    rationale: No es obligatorio calcar el orden, pero sí preservar las decisiones significativas. Reordenar a y b para que la nota temporal y la nota sobre «esposa» queden claras mejora la trazabilidad.
  revised_spanish_text: Un compañero y un amigo son útiles por un tiempo[a], pero mejor que ambos es una esposa[b] inteligente.
