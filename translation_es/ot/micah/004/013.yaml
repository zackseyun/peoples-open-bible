translation:
  language: es
  text: ¡Levántate y trilla, hija de Sion, porque haré tu cuerno de hierro y tus pezuñas[a] de bronce; aplastarás muchos pueblos, y dedicaré[b] a Yahvé su ganancia, y su riqueza al Señor de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cascos»; el hebreo se refiere literalmente a las extremidades de un animal que trilla.
    reason: lexical_alternative
  - marker: b
    text: O «pondré bajo anatema»; el verbo hebreo puede denotar consagrar algo a Dios, a menudo con el sentido de ponerlo bajo destrucción ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֧וּמִי
  english_pob_choice: Rise
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Alzate!
  - ¡Ponte en pie!
  lexicon: HALOT
  rationale: El imperativo femenino singular exige una llamada directa y natural. «Levántate» conserva la fuerza exhortativa sin arcaísmo excesivo.
- source_word: וָד֣וֹשִׁי
  english_pob_choice: and thresh
  chosen_spanish: y trilla
  alternatives_spanish:
  - y pisa
  - y tritures
  lexicon: HALOT
  rationale: דושׁ alude a trillar mediante el pisoteo del grano; «trilla» mantiene la metáfora agrícola y sugiere el acto de aplastar con los pies mejor que un verbo más genérico.
- source_word: בַת צִיּ֗וֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija de Sion
  alternatives_spanish:
  - hija Sion
  - hija de Jerusalén
  lexicon: HALOT
  rationale: La expresión profética personifica a Sion/Jerusalén. «Hija de Sion» sería posible, pero «hija de Sion» en español requiere la preposición para sonar natural y fiel al vocativo.
- source_word: קַרְנֵ֞/ךְ
  english_pob_choice: your horn
  chosen_spanish: tu cuerno
  alternatives_spanish:
  - tu fuerza
  - tu asta
  lexicon: HALOT
  rationale: Se conserva la imagen literal de poder y fuerza ofensiva. «Cuerno» es el equivalente transparente en español bíblico y evita interpretar la metáfora.
- source_word: וּפַרְסֹתַ֨יִ/ךְ
  english_pob_choice: your hooves
  chosen_spanish: tus pezuñas
  alternatives_spanish:
  - tus cascos
  - tus patas
  lexicon: HALOT
  rationale: El plural/dual apunta a las extremidades de un animal que trilla. «Pezuñas» mantiene la imagen de pisoteo y corresponde al paralelismo con «cuerno».
- source_word: נְחוּשָׁ֔ה
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En este contexto marcial, «bronce» es el término estándar y más probable para el metal endurecido que complementa la imagen de fuerza.
- source_word: וַ/הֲדִקּ֖וֹת
  english_pob_choice: you will crush
  chosen_spanish: aplastarás
  alternatives_spanish:
  - desmenuzarás
  - quebrarás
  lexicon: HALOT
  rationale: El verbo expresa golpeo y trituración. «Aplastarás» comunica bien el efecto del pisoteo/trilla y encaja con el castellano natural.
- source_word: עַמִּ֣ים רַבִּ֑ים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos y naciones
  lexicon: HALOT
  rationale: עַמִּים se refiere más literalmente a «pueblos» que a «naciones». «Muchos pueblos» preserva el matiz colectivo sin añadir un término no presente.
- source_word: וְ/הַחֲרַמְתִּ֤י
  english_pob_choice: I will devote
  chosen_spanish: dedicaré
  alternatives_spanish:
  - consagraré
  - pondré bajo anatema
  lexicon: HALOT
  rationale: El verbo חרם puede abarcar consagración con destrucción, pero aquí el objeto es la ganancia/riqueza. «Dedicaré» conserva la idea de destinar algo a Yahvé sin sobrecargar el verso con tecnicismo.
- source_word: בִּצְעָ֔/ם
  english_pob_choice: their gain
  chosen_spanish: su ganancia
  alternatives_spanish:
  - su provecho
  - su botín
  - su lucro
  lexicon: HALOT
  rationale: El hebreo designa ganancia/provecho sin calificación adicional en esta revisión. «Ganancia» es fiel y no introduce una valoración moral que el texto no explicita aquí.
- source_word: וְ/חֵילָ֖/ם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - sus recursos
  - su poder
  lexicon: HALOT
  rationale: חֵיל puede referirse a riqueza, recursos o fuerza. En este paralelismo con «ganancia», «riqueza» mantiene la lectura económica más probable en la traducción de POB.
- source_word: לַֽ/יהוָה֙
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: Se sigue la terminología POB para el nombre divino. En español, la preposición «a» expresa bien el destino/ofrenda de lo dedicado.
- source_word: לַ/אֲד֥וֹן כָּל הָ/אָֽרֶץ
  english_pob_choice: to the Lord of all the earth
  chosen_spanish: al Señor de toda la tierra
  alternatives_spanish:
  - al Dueño de toda la tierra
  - al Señor de toda la tierra y del mundo
  lexicon: HALOT
  rationale: אדון aquí funciona como título divino. «Señor de toda la tierra» conserva el alcance universal y es idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Rendición de חרם en contexto de botín/ganancia
  english_pob_reading: I will devote their gain to Yahweh, and their wealth to the Lord of all the earth.
  chosen_spanish_reading: dedicaré a Yahvé su ganancia, y su riqueza al Señor de toda la tierra
  alternative_spanish_readings:
  - pondré su ganancia bajo anatema
  - consagraré su ganancia a Yahvé
  rationale: La sintaxis del hebreo aplica חרם a los objetos del botín/ganancia, no a los pueblos mismos. «Dedicaré» preserva el sentido de destinar algo a Dios y deja abierta la tensión con el trasfondo de destrucción ritual sin exagerarlo.
  doctrine_reference: Translation philosophy §3, §5
- issue: Imagen de guerra y trilla aplicada a Sion
  english_pob_reading: Rise and thresh... you will crush many peoples
  chosen_spanish_reading: ¡Levántate y trilla... aplastarás muchos pueblos
  alternative_spanish_readings:
  - ¡Levántate y pisa... destruirás muchos pueblos
  - ¡Levántate y trilla... harás pedazos a muchos pueblos
  rationale: El texto mantiene la metáfora agrícola-militar. «Trilla» y «aplastarás» preservan esa tensión figurada sin convertir la imagen en una explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que eliminó el adjetivo interpretativo equivalente a «injusta/o» delante de «ganancia» porque el hebreo dice simplemente «su ganancia/provecho». También conserva la solución revisada de «devote» para חרם, evitando una sobrerrepresentación destructiva en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en coherencia con el estándar del proyecto.
  - Se usa «Señor» para אֲדֹן como título divino distinto del nombre propio.
  - «Pueblos» traduce עַמִּים para conservar el matiz colectivo del hebreo.
  - La metáfora de trilla se conserva con «trilla» y «aplastarás», sin sustituirla por una paráfrasis general.
  - No se añade calificación moral a «ganancia», en consonancia con la revisión final del audit trail.
