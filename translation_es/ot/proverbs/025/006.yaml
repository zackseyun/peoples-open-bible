translation:
  language: es
  text: No te engrías delante de un rey, ni te pongas de pie en el lugar[a] de los grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el lugar de los grandes» o «entre personas importantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְהַדַּר
  english_pob_choice: exalt yourself
  chosen_spanish: engrás
  alternatives_spanish:
  - te honres a ti mismo
  - te muestres espléndido
  - te pongas por encima de ti mismo
  lexicon: HALOT
  rationale: El hitpael de הדר tiene un matiz reflexivo de darse a sí mismo apariencia de honor o gloria. En español, 'engreírse' comunica bien la idea de autoexaltación presuntuosa en un contexto cortesano, con un tono natural y admonitorio. No se opta por una paráfrasis más amplia para no debilitar la advertencia.
- source_word: לִפְנֵי מֶלֶךְ
  english_pob_choice: before a king
  chosen_spanish: delante de un rey
  alternatives_spanish:
  - en presencia de un rey
  - ante un rey
  lexicon: HALOT
  rationale: '''לִפְנֵי'' expresa ''delante de'' o ''en presencia de''. ''Delante de un rey'' mantiene la sencillez y el escenario de corte, con un español claro y sobrio.'
- source_word: בִּמְקוֹם גְּדֹלִים
  english_pob_choice: in the place of great men
  chosen_spanish: en el lugar de los grandes
  alternatives_spanish:
  - en el lugar de los grandes hombres
  - entre personas importantes
  - en el puesto de los nobles
  lexicon: HALOT
  rationale: '''מָקוֹם'' es literalmente ''lugar'' y ''גְּדֹלִים'' designa personas de alto estatus o importancia. ''Los grandes'' conserva la forma breve y el sentido social. Se evita ''nobles'' porque sería más específico de lo que el hebreo exige.'
- source_word: תַּעֲמֹד
  english_pob_choice: stand
  chosen_spanish: ponerte
  alternatives_spanish:
  - estar de pie
  - tomar tu lugar
  - presentarte
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'estar de pie / ponerse en pie', en este contexto la idea es ocupar un sitio o presentarse entre los prominentes. 'Ponerte en el lugar' comunica la acción de situarse allí de modo natural en español, sin perder el trasfondo literal de 'estar'.
theological_decisions:
- issue: 'Alcance de גְּדֹלִים: masculino plural y valor social'
  english_pob_reading: great men
  chosen_spanish_reading: los grandes
  alternative_spanish_readings:
  - los grandes hombres
  - personas importantes
  - los importantes
  rationale: El hebreo usa un plural masculino que, en este proverbio, apunta a personas socialmente destacadas. 'Los grandes' preserva la referencia al estatus sin introducir una titulación más fuerte que el texto no requiere. Se deja abierta la posibilidad inclusiva en alternativas, pero la línea principal mantiene la fuerza del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto fuente y la traducción inglesa coinciden en la advertencia contra la autoexaltación y en el paralelismo con el segundo cola. No se requiere revisión textual; la elección española sigue el sentido hebreo directo con una formulación natural.
  spanish_consistency_notes:
  - Se conserva el paralelismo negativo con 'No... ni...'.
  - '''Rey'' se mantiene sin sustitución por un término más genérico para respetar el marco cortesano.'
  - '''Los grandes'' refleja el plural hebreo sin forzar una terminología eclesiástica o nobiliaria.'
