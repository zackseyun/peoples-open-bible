translation:
  language: es
  text: Y tomaron todo el botín y todo el despojo[a], tanto personas[b] como ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «botín». El hebreo usa dos términos relacionados para las ganancias de guerra: «botín» y «despojo» (o «botín»).'
    reason: lexical_alternative
  - marker: b
    text: «Personas» aquí significa seres humanos en conjunto, no solo varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: And they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - capturaron
  lexicon: HALOT
  rationale: La forma narrativa וַיִּקְחוּ se expresa de manera natural con el pretérito perfecto simple 'tomaron'. Mantiene el sentido básico de 'take' sin añadir matices no presentes en el contexto.
- source_word: כָּל הַשָּׁלָל
  english_pob_choice: all the spoil
  chosen_spanish: todo el botín
  alternatives_spanish:
  - todo el despojo
  - todo el saqueo
  lexicon: HALOT
  rationale: שָׁלָל designa el botín de guerra. 'Botín' conserva claramente el valor militar y es idiomático en español. Se evita 'saqueo' porque enfatiza el acto de asaltar más que el resultado.
- source_word: כָּל הַמַּלְקוֹחַ
  english_pob_choice: all the plunder
  chosen_spanish: todo el despojo
  alternatives_spanish:
  - todo lo tomado
  - todo el botín
  lexicon: HALOT
  rationale: מַלְקוֹחַ se refiere a lo tomado, especialmente bienes capturados. 'Despojo' preserva la cercanía semántica con 'botín' sin borrar la distinción de los dos términos hebreos relacionados.
- source_word: בָּאָדָם
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - humanos
  - gente
  lexicon: HALOT
  rationale: Aquí אָדָם es colectivo y no masculino exclusivo. 'Personas' expresa bien el referente humano y evita una lectura restringida a varones, a la vez que conserva la oposición con los animales.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales
  - bestias
  lexicon: HALOT
  rationale: בְּהֵמָה puede referirse a animales domésticos o de carga en este contexto de guerra. 'Ganado' comunica adecuadamente el sentido colectivo y concreto en español, más claro que 'bestias'.
theological_decisions:
- issue: Lectura colectiva de אָדָם en contraste con animales
  english_pob_reading: people
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - humanos
  - gente
  rationale: Se mantiene el sentido colectivo de אָדָם sin forzar un masculino genérico que en español podría sonar a varones solamente. El contraste humano/animal del texto queda claro con 'personas' y 'ganado'.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; contested terms table for אָדָם'
- issue: Distinción entre שני términos de botín
  english_pob_reading: spoil / plunder
  chosen_spanish_reading: botín / despojo
  alternative_spanish_readings:
  - botín / botín
  - despojo / botín
  rationale: El hebreo usa dos términos emparentados pero no idénticos. Conviene reflejar la distinción léxica en español, aunque el matiz entre ambos no sea enorme, para no borrar una tensión lexical documentada.
  doctrine_reference: HALOT; English POB lexical note on related war-gains terms
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de «man and beast» a «people and livestock» para reflejar mejor el sentido colectivo. La versión española sigue esa revisión, pero conserva la distinción léxica entre los dos sustantivos de botín mediante «botín» y «despojo».
  spanish_consistency_notes:
  - Se usa 'botín' para שָׁלָל y 'despojo' para מַלְקוֹחַ, manteniendo una distinción visible entre dos términos próximos.
  - '''Personas'' evita un masculino potencialmente ambiguo y conserva el valor colectivo de אָדָם.'
  - '''Ganado'' traduce בְּהֵמָה en un español natural y acorde con el contexto de capturas de guerra.'
  - La puntuación y el orden siguen un estilo bíblico sobrio y legible en español moderno.
