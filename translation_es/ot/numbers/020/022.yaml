translation:
  language: es
  text: Y partieron de Cades[a], y toda la congregación de los hijos de Israel llegó al monte Hor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cades» corresponde al hebreo Kadesh; no se amplía aquí a «Cades-barnea» porque el texto hebreo de este versículo solo dice Cades.
    reason: source_note
  - marker: b
    text: 'Hebreo: «Hor el monte», usado como nombre propio de lugar; por eso se traduce «monte Hor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en camino
  - salieron
  - emprendieron la marcha
  lexicon: HALOT
  rationale: נסע en narración suele indicar levantar el campamento y continuar el viaje. «Partieron» comunica bien la acción de salir de un lugar y avanzar, sin sonar forzado en español.
- source_word: מִקָּדֵשׁ
  english_pob_choice: from Kadesh
  chosen_spanish: de Cades
  alternatives_spanish:
  - desde Cades
  - de Cades-barnea
  lexicon: HALOT
  rationale: El hebreo dice simplemente «Cades». Mantengo el topónimo breve sin importar una forma ampliada que el versículo no expresa.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  - entraron
  lexicon: HALOT
  rationale: בוא con destino local funciona naturalmente como «llegar» en español. «Entraron» sería menos preciso con un monte como destino.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el giro familiar/corporativo del hebreo. «Hijos de Israel» es transparente y fiel al idiomatismo del original.
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la comunidad
  - toda la asamblea
  - toda la congregación
  lexicon: HALOT
  rationale: עֵדָה refiere a la comunidad reunida del pacto. «Congregación» mantiene el valor colectivo y cultual que la POB inglesa quiso preservar.
- source_word: הֹר הָהָר
  english_pob_choice: Mount Hor
  chosen_spanish: al monte Hor
  alternatives_spanish:
  - al monte Hor, es decir, Hor el monte
  - al Hor, el monte
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar, no de una descripción libre. «Monte Hor» es la forma española idiomática y fiel al topónimo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; por tanto, este borrador sigue de cerca el texto hebreo y la auditoría inglesa, sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Cades» sin añadir «Barnea», en concordancia con el hebreo.
  - Se conserva «hijos de Israel» por transparencia idiomática.
  - «Congregación» se usa para עֵדָה siguiendo la decisión POB inglesa y el uso pentateucal.
  - «Monte Hor» se trata como topónimo estable, no como descripción literal.
  - No se añadieron decisiones teológicas porque el versículo es narrativo y no presenta una tensión doctrinal explícita.
