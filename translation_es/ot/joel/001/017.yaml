translation:
  language: es
  text: Las semillas[a] se han agostado bajo sus terrones[b]; los almacenes están desolados, los graneros han sido derribados, porque el grano se ha secado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo raro e incierto; probablemente se refiere a semillas o granos sembrados. Otras versiones lo precisan como «granos» o «granos de semilla».
    reason: lexical_alternative
  - marker: b
    text: Hebreo raro y debatido; la lectura «terrones» sigue la imagen agrícola del texto, pero también se ha propuesto «surcos» o incluso «herramientas de labranza».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבְשׁוּ
  english_pob_choice: have shriveled
  chosen_spanish: se han agostado
  alternatives_spanish:
  - se han secado
  - se han marchitado
  lexicon: HALOT
  rationale: El verbo expresa el secarse/arrugarse de algo por pérdida de humedad. En español, «agostarse» conserva bien la idea agrícola de secarse o perder vigor, con un tono natural y digno.
- source_word: פְרֻד֗וֹת
  english_pob_choice: seeds
  chosen_spanish: las semillas
  alternatives_spanish:
  - los granos
  - los granillos
  lexicon: HALOT
  rationale: El término es raro y dudoso, pero el contexto agrícola favorece una referencia a semillas o granos sembrados. «Semillas» es claro y no sobreespecifica más de lo que permite la fuente.
- source_word: תַּ֚חַת
  english_pob_choice: beneath
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo de
  lexicon: HALOT
  rationale: La preposición espacial se vierte de forma natural con «bajo», que funciona bien con la imagen de semillas cubiertas por terrones.
- source_word: מֶגְרְפֹ֣תֵי/הֶ֔ם
  english_pob_choice: their clods
  chosen_spanish: sus terrones
  alternatives_spanish:
  - sus surcos
  - sus azadones
  lexicon: HALOT
  rationale: La POB inglesa opta por una lectura agrícola de la tierra que cubre la semilla. «Terrones» preserva esa imagen de suelo apelmazado sin imponer una solución más discutida como «surcos» o una lectura instrumental.
- source_word: נָשַׁ֨מּוּ֙
  english_pob_choice: are desolate
  chosen_spanish: están desolados
  alternatives_spanish:
  - están devastados
  - están arrasados
  lexicon: HALOT
  rationale: Aplicado a almacenes, el sentido resultativo de ruina o desolación se expresa bien con «están desolados», que es natural en español y mantiene el estado de abandono.
- source_word: אֹֽצָר֔וֹת
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - depósitos
  - reservas
  lexicon: HALOT
  rationale: En este contexto agrario, el término no apunta a tesoros monetarios, sino a lugares donde se guarda la cosecha. «Almacenes» comunica esa función con claridad.
- source_word: נֶהֶרְס֖וּ
  english_pob_choice: are torn down
  chosen_spanish: han sido derribados
  alternatives_spanish:
  - han sido destruidos
  - han sido demolidos
  lexicon: HALOT
  rationale: El verbo puede indicar derribo o demolición. «Han sido derribados» conserva la imagen concreta de estructuras echadas abajo, cercana al matiz elegido por la POB inglesa.
- source_word: מַמְּגֻר֑וֹת
  english_pob_choice: granaries
  chosen_spanish: graneros
  alternatives_spanish:
  - granarios
  - depósitos de grano
  lexicon: HALOT
  rationale: Se trata de construcciones para almacenar grano. «Graneros» es el equivalente más natural en español y mantiene la especificidad agrícola.
- source_word: כִּ֥י
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La relación causal del texto se expresa de forma directa con «porque», que introduce la razón de la desolación de los almacenes y graneros.
- source_word: הֹבִ֖ישׁ
  english_pob_choice: has dried up
  chosen_spanish: se ha secado
  alternatives_spanish:
  - se ha agostado
  - ha fallado
  lexicon: HALOT
  rationale: El hiphil comunica el resultado de secarse o quedar sin vigor. «Se ha secado» reproduce de manera clara el desastre agrícola indicado por la POB inglesa.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el cereal
  - la cosecha
  lexicon: HALOT
  rationale: Es un término genérico para el producto cerealero. «El grano» es la opción más natural y ampliamente inteligible en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca la POB inglesa y conserva sus dos puntos léxicos inciertos con notas alternativas. No se introdujeron cambios doctrinales ni revisiones textuales adicionales respecto al último pase auditado, que se mantuvo estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino por norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa lenguaje agrícola concreto y moderno, evitando tanto arcaismos innecesarios como paráfrasis libres.
  - Las dos incertidumbres léxicas principales se conservan con notas para no borrar la tensión del hebreo.
  - «Graneros» y «almacenes» distinguen dos tipos de estructuras de almacenamiento, siguiendo el paralelismo del original.
