translation:
  language: es
  text: los dos pilares, y los dos tazones[a] y los dos capiteles sobre la parte superior de los pilares, y los dos enrejados[b] para cubrir los dos tazones de los capiteles que estaban sobre la parte superior de los pilares;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «globos» o «formas redondeadas» para גֻּלּוֹת; la forma arquitectónica exacta denotada por el hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «redes» para «enrejados».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדִים
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el término designa los soportes del templo. «Pilares» conserva el sentido estructural y coincide con la decisión inglesa de no suavizarlo a un término más general.
- source_word: גֻּלּוֹת
  english_pob_choice: bowls
  chosen_spanish: tazones
  alternatives_spanish:
  - globos
  - formas redondeadas
  lexicon: HALOT
  rationale: La forma exacta es incierta, pero el sentido probable es un objeto redondeado y cóncavo. «Tazones» es una opción natural en español para esa forma, aunque la nota conserva la incertidumbre lexical.
- source_word: כֹּתָרוֹת
  english_pob_choice: capitals
  chosen_spanish: capiteles
  alternatives_spanish:
  - coronas
  - chapiteles
  lexicon: HALOT
  rationale: En arquitectura, el equivalente directo en español es «capiteles», la parte superior ornamental de un pilar. Mantiene precisión técnica sin perder inteligibilidad.
- source_word: רֹאשׁ
  english_pob_choice: top
  chosen_spanish: cabeza
  alternatives_spanish:
  - parte superior
  - tope
  lexicon: HALOT
  rationale: Aunque en español moderno «sobre la cabeza de» puede sonar menos técnico que «sobre la parte superior de», reproduce bien la imagen del hebreo y la repetición del texto. Se conserva la metáfora espacial del original.
- source_word: שְּׂבָכוֹת
  english_pob_choice: latticeworks
  chosen_spanish: enrejados
  alternatives_spanish:
  - tramas
  - rejillas
  lexicon: HALOT
  rationale: El término sugiere una estructura entretejida o de red. «Enrejados» comunica de manera clara el sentido ornamental y permite una forma natural en español.
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - para tapar
  - para recubrir
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Para cubrir» preserva la función de los enrejados y corresponde bien al valor del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: that were
  chosen_spanish: que estaban
  alternatives_spanish:
  - que eran
  - los cuales estaban
  lexicon: HALOT
  rationale: La cláusula relativa remite a los tazones/capiteles situados sobre los pilares. «Que estaban» es la forma más natural en español para una relación locativa continuada.
- source_word: שְׁנַיִם / שְׁתַּיִם / שְׁתֵּי
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  - los dos
  lexicon: HALOT
  rationale: Se mantiene la repetición numérica del hebreo, que enumera cuidadosamente las piezas del mobiliario del templo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador español sigue de cerca la evidencia hebrea y la decisión auditada en inglés sin introducir ajustes de contenido.
  spanish_consistency_notes:
  - Se mantiene la serie numérica repetida («dos... y dos... y dos...») para reflejar el inventario detallado del hebreo.
  - Se conserva la relación locativa «sobre la cabeza de los pilares» para respetar la imagen arquitectónica del original.
  - El registro es sobrio y apto para publicación, sin traducir mecánicamente el inglés cuando el español exige una sintaxis más natural.
