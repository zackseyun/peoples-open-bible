translation:
  language: es
  text: Pero, como no era necio[a], sino que consideraba la derrota que le había sobrevenido y había comprendido que los hebreos no podían ser vencidos, porque el Dios poderoso estaba combatiendo junto a ellos, envió por delante
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «insensato». El griego ἀνόους puede expresar falta de juicio o sensatez, no solo necedad moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀνόους ... ὑπάρχων
  english_pob_choice: since he was not foolish
  chosen_spanish: como no era necio
  alternatives_spanish:
  - como no era insensato
  - puesto que no era necio
  lexicon: LSJ
  rationale: ἀνόους expresa falta de juicio o sensatez; en español, 'necio' comunica bien esa valoración sin sonar técnico. Mantengo el matiz causal de ὑπάρχων con 'como', que fluye naturalmente en la frase.
- source_word: πρὸς ἑαυτὸν ἀντιβάλλων
  english_pob_choice: was considering
  chosen_spanish: consideraba
  alternatives_spanish:
  - se decía a sí mismo
  - ponderaba en su interior
  lexicon: LSJ
  rationale: Aunque el inglés auditable eligió 'was considering', el griego sugiere reflexión interior. 'Consideraba' conserva la idea de ponderar el hecho sin introducir una imagen demasiado literal o extraña en español.
- source_word: τὸ γεγονὸς περὶ αὐτὸν ἐλάττωμα
  english_pob_choice: the defeat that had happened to him
  chosen_spanish: la derrota que le había sobrevenido
  alternatives_spanish:
  - la derrota que le había ocurrido
  - el revés que le había sobrevenido
  lexicon: LSJ
  rationale: ἐλάττωμα en este contexto militar apunta a un revés o derrota. 'Derrota' sigue el ajuste revisado del audit trail y 'le había sobrevenido' expresa el valor resultativo de γεγονός con περὶ αὐτόν.
- source_word: συννοήσας
  english_pob_choice: had realized
  chosen_spanish: había comprendido
  alternatives_spanish:
  - había entendido
  - se había dado cuenta
  lexicon: LSJ
  rationale: El aoristo participial marca una comprensión ya lograda antes de la acción principal. 'Había comprendido' mantiene esa secuencia y suena natural en español bíblico contemporáneo.
- source_word: ἀνικήτους εἶναι τοὺς Ἑβραίους
  english_pob_choice: that the Hebrews were unconquerable
  chosen_spanish: que los hebreos eran invencibles
  alternatives_spanish:
  - que los hebreos eran inconquistables
  - que los hebreos no podían ser vencidos
  lexicon: LSJ
  rationale: ἀνίκητους denota imposibilidad de ser vencidos. 'Invencibles' es la equivalencia española más directa y fuerte; 'inconquistables' es posible, pero menos natural aquí.
- source_word: τοῦ δυναμένου θεοῦ
  english_pob_choice: the mighty God
  chosen_spanish: el Dios poderoso
  alternatives_spanish:
  - el Dios fuerte
  - el Dios todopoderoso
  lexicon: LSJ
  rationale: El participio δυναμένου subraya poder/aptitud efectiva. 'Dios poderoso' conserva esa fuerza sin imponer una fórmula litúrgica más cargada que el griego.
- source_word: συμμαχοῦντος αὐτοῖς
  english_pob_choice: was fighting alongside them
  chosen_spanish: estaba combatiendo junto a ellos
  alternatives_spanish:
  - estaba luchando junto a ellos
  - era aliado de ellos en la batalla
  lexicon: LSJ
  rationale: συμμαχέω tiene un matiz militar de actuar como aliado. 'Combatiendo junto a ellos' preserva el sentido bélico y la idea de apoyo activo. Por eso se traduce en forma verbal, no solo como estado relacional.
- source_word: προαποστείλας
  english_pob_choice: he sent ahead
  chosen_spanish: envió por delante
  alternatives_spanish:
  - envió antes
  - mandó por delante
  lexicon: LSJ
  rationale: El participio indica una acción previa de envío. 'Envió por delante' es una expresión idiomática española que conserva el valor direccional/preparatorio del término.
theological_decisions:
- issue: Atribución de la victoria o invencibilidad al auxilio divino en contexto militar
  english_pob_reading: because the mighty God was fighting alongside them
  chosen_spanish_reading: porque el Dios poderoso estaba combatiendo junto a ellos
  alternative_spanish_readings:
  - porque el Dios poderoso era su aliado
  - porque Dios, el Poderoso, luchaba con ellos
  rationale: El griego presenta la invencibilidad de los hebreos como efecto del apoyo activo de Dios. La traducción mantiene el carácter militar y evita suavizarlo a una ayuda genérica o meramente providencial.
  doctrine_reference: Mantener la agencia divina explícita sin resolver la tensión narrativa; primacía del texto fuente sobre fórmulas tradicionales.
translation_notes:
  revision_awareness: He seguido el ajuste del audit trail que favorece una lectura más natural del segmento cognitivo (equivalente a 'was considering') y la fuerza militar de ἐλάττωμα como 'derrota'. También he conservado la relación causal y la secuencia participial sin forzar una sintaxis demasiado literal en español.
  spanish_consistency_notes:
  - He usado 'hebreos' para Ἑβραίους, coherente con el texto griego y con el registro histórico del pasaje.
  - He elegido 'Dios poderoso' para τοῦ δυναμένου θεοῦ, manteniendo la idea de poder eficaz sin introducir un título no atestiguado en el griego.
  - He rendido συμμαχοῦντος con un verbo de combate ('combatiendo') para conservar el matiz bélico del aliado divino.
