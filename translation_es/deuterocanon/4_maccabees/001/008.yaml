translation:
  language: es
  text: Pero podría demostrar esto mucho más por el valor de Eleazar, de los siete hermanos y de su madre, que murieron por causa de la virtud.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολὺ δὲ πλέον
  english_pob_choice: much more
  chosen_spanish: mucho más
  alternatives_spanish:
  - bastante más
  - con mucha mayor razón
  - muchísimo más
  lexicon: LSJ
  rationale: La comparación intensiva se vierte de manera natural con «mucho más», que conserva el énfasis de πλέον sin volver rígida la sintaxis española.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este punto
  - esta cuestión
  lexicon: LSJ
  rationale: El pronombre retoma el argumento anterior; «esto» mantiene la concisión del griego y resulta claro en español.
- source_word: ἀποδείξαιμι
  english_pob_choice: I could prove
  chosen_spanish: podría demostrar
  alternatives_spanish:
  - podría probar
  - yo demostraría
  lexicon: LSJ
  rationale: El optativo expresa posibilidad o afirmación moderada; «podría demostrar» reproduce bien ese matiz en español actual.
- source_word: ἀνδραγαθείας
  english_pob_choice: bravery
  chosen_spanish: valor
  alternatives_spanish:
  - bravura
  - heroísmo
  - coraje
  lexicon: LSJ
  rationale: ἀνδραγαθία denota valentía heroica. «Valor» es el equivalente español más sobrio y natural, y preserva el sentido de excelencia valiente sin cargarlo con un tono excesivamente moderno o retórico.
- source_word: τῶν ὑπὲρ ἀρετῆς ἀποθανόντων
  english_pob_choice: who died for the sake of virtue
  chosen_spanish: que murieron por causa de la virtud
  alternatives_spanish:
  - que murieron por la virtud
  - que murieron en favor de la virtud
  - que murieron por amor a la virtud
  lexicon: LSJ
  rationale: 'ὑπέρ con el genitivo expresa causa o finalidad: murieron en defensa de / por causa de la virtud. «Por causa de la virtud» conserva el razonamiento ético del texto y evita reducir ἀρετή a una mera cualidad abstracta sin contexto.'
- source_word: Ἐλεαζάρου
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: transliteration
  rationale: Se conserva la transliteración habitual del nombre propio, sin intentar traducirlo.
- source_word: ἑπτὰ ἀδελφῶν
  english_pob_choice: the seven brothers
  chosen_spanish: los siete hermanos
  alternatives_spanish:
  - siete hermanos
  lexicon: LSJ
  rationale: El artículo definido es natural en español para un grupo ya identificable por el relato; se mantiene la referencia concreta del conjunto narrativo.
- source_word: τῆς τούτων μητρός
  english_pob_choice: their mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de ellos
  - la madre de estos
  lexicon: LSJ
  rationale: τούτων remite a los hermanos mencionados; «su madre» es la solución más natural y clara en español.
theological_decisions:
- issue: Rendering of ἀρετή in a martyrdom context
  english_pob_reading: virtue
  chosen_spanish_reading: virtud
  alternative_spanish_readings:
  - excelencia
  - rectitud
  rationale: En 4 Macabeos, ἀρετή tiene fuerte peso ético-filosófico. «Virtud» conserva ese campo semántico y deja visible que la muerte de los mártires se presenta como testimonio a favor de la excelencia moral, no como una categoría doctrinal posterior.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el sentido del griego y la lectura inglesa auditada: se mantuvo la comparación intensiva de πλέον, el valor posible del optativo ἀποδείξαιμι, el matiz causal de ὑπέρ y el contenido ético-filosófico de ἀρετή. Se optó por un español natural sin borrar la densidad conceptual del original.'
  spanish_consistency_notes:
  - Se conserva «valor» para ἀνδραγαθία y «virtud» para ἀρετή, distinguiendo el coraje heroico de la excelencia moral.
  - «Por causa de» refleja mejor el vínculo causal de ὑπέρ con genitivo que un simple «por» en este contexto formal.
  - Los nombres propios permanecen transliterados según la política del proyecto.
