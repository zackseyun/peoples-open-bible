  yaml_path: translation/nt/acts/016/003.yaml
  text: Paul wanted him to go out with him[a], and after taking him, he circumcised him because of the Jews who were in those places[c][b], for they all knew that his father was a Greek.
  footnotes:
  - marker: a
    text: Or 'to travel with him.' The Greek literally says 'to go out with him,' an idiom that can refer to setting out on a journey.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the sake of the Jews' / 'on account of the Jews.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'a Greek'; in this context this likely marks Timothy's father as non-Jewish.
    reason: cultural_note
