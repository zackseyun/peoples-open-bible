translation:
  language: es
  text: 'Y Jesús les respondió: «Los que están sanos no tienen necesidad de médico, sino los que están enfermos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que están mal de salud». La expresión griega, literalmente, significa «los que están yendo mal»; es un modismo para estar enfermos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς ... εἶπεν πρὸς αὐτούς
  english_pob_choice: answered them
  chosen_spanish: les respondió
  alternatives_spanish:
  - respondió a ellos
  - contestó
  lexicon: BDAG
  rationale: La construcción participial + verbo de decir funciona como fórmula narrativa idiomática. En español, «les respondió» conserva la fuerza responsiva sin sobrecargar el texto con un calco como «respondiendo, Jesús dijo».
- source_word: Οὐ χρείαν ἔχουσιν
  english_pob_choice: have no need
  chosen_spanish: no tienen necesidad
  alternatives_spanish:
  - no necesitan
  - carecen de necesidad
  lexicon: BDAG
  rationale: χρεία + ἔχω expresa literalmente ‘tener necesidad’. «No tienen necesidad» mantiene la estructura conceptual del griego y su tono proverbial, con español natural.
- source_word: οἱ ὑγιαίνοντες
  english_pob_choice: those who are healthy
  chosen_spanish: los que están sanos
  alternatives_spanish:
  - los sanos
  - los que están saludables
  lexicon: BDAG
  rationale: El participio sustantivado describe a personas en condición de salud. «Los que están sanos» es claro y fiel; «sanos» solo sería posible, pero aquí el verbo ayuda a conservar el aspecto descriptivo del participio.
- source_word: ἰατροῦ
  english_pob_choice: a physician
  chosen_spanish: médico
  alternatives_spanish:
  - doctor
  - facultativo
  lexicon: BDAG
  rationale: ἰατρός puede traducirse como ‘médico’ o ‘doctor’. «Médico» es la opción más natural y digna en español actual, y conserva la imagen proverbial sin sesgo confesional.
- source_word: οἱ κακῶς ἔχοντες
  english_pob_choice: those who are sick
  chosen_spanish: los que están enfermos
  alternatives_spanish:
  - los que están mal
  - los que están mal de salud
  - los enfermos
  lexicon: BDAG
  rationale: La expresión idiomática κακῶς ἔχειν significa ‘estar enfermo’. «Los que están enfermos» comunica el sentido idiomático sin perder la relación semántica con el griego, cuya literalidad sería oscura en español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios en la base inglesa; por eso la redacción española sigue de cerca la lectura auditada y mantiene la alternancia proverbial entre sanos/enfermos sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se usó «Jesús» y no una transliteración alternativa, conforme al estándar del proyecto.
  - Se mantuvo el paralelismo «los que están sanos / los que están enfermos» para reflejar la antítesis del griego.
  - Se prefirió «médico» por claridad y registro, evitando una paráfrasis más explicativa que altere el tono proverbial.
