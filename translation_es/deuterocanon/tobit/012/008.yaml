translation:
  language: es
  text: La oración con ayuno, limosna y justicia[a] es buena; un poco con justicia es mejor que mucho con injusticia[b]. Es bueno dar limosna antes que atesorar oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud». El griego también puede entenderse como «justicia» en sentido ético.
    reason: lexical_alternative
  - marker: b
    text: O «iniquidad». El contraste sigue la pareja «justicia / injusticia» o «rectitud / iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθὸν
  english_pob_choice: is good
  chosen_spanish: es buena / es bueno
  alternatives_spanish:
  - es beneficiosa
  - es mejor
  lexicon: LSJ
  rationale: El adjetivo predicativo introduce una valoración general. En español, 'es buena' fluye de manera natural con 'la oración' y mantiene el juicio positivo sin intensificarlo indebidamente. En la cláusula final, 'es bueno' conserva el mismo campo evaluativo que el griego.
- source_word: προσευχὴ
  english_pob_choice: Prayer
  chosen_spanish: La oración
  alternatives_spanish:
  - Oración
  - la plegaria
  lexicon: LSJ
  rationale: '''Oración'' es el término religioso estándar en español y refleja bien προσευχὴ. Se mantiene en sentido general, sin cargarlo con matices litúrgicos adicionales.'
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - acompañada de
  - junto con
  lexicon: LSJ
  rationale: '''Con'' reproduce la coordinación entre oración y las prácticas asociadas, sin convertir la relación en instrumento o causa.'
- source_word: νηστείας
  english_pob_choice: fasting
  chosen_spanish: ayuno
  alternatives_spanish:
  - el ayuno
  - abstinencia
  lexicon: LSJ
  rationale: '''Ayuno'' es el equivalente natural y directo en español. Conserva el sentido ascético-religioso del sustantivo griego.'
- source_word: ἐλεημοσύνης
  english_pob_choice: almsgiving
  chosen_spanish: limosna
  alternatives_spanish:
  - dar limosna
  - caridad
  - misericordia
  lexicon: LSJ
  rationale: En este contexto judío-griego, la palabra se refiere a dar a los necesitados. 'Limosna' conserva esa referencia concreta y permite enlazar bien con el verbo final 'hacer limosna', manteniendo la repetición léxica del original.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: LSJ
  rationale: Aunque la POB inglesa usa 'righteousness' como lectura principal, en español 'justicia' expresa de manera más natural la fuerza ética del término y conserva la alternativa documentada por el audit trail ('justice'). En un contexto sapiencial como Tobit, la noción puede abarcar conducta recta y justicia práctica.
- source_word: τὸ ὀλίγον
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - poco
  - una pequeña cantidad
  lexicon: LSJ
  rationale: La expresión sustantivada se vierte de forma idiomática con 'un poco', que preserva el contraste proverbial con 'mucho'.
- source_word: πολὺ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran cantidad
  - abundante
  lexicon: LSJ
  rationale: '''Mucho'' mantiene el contraste directo con ''un poco'' y reproduce la estructura comparativa del dicho.'
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia moral
  - iniquidad
  lexicon: LSJ
  rationale: La oposición con δικαιοσύνη queda más clara en español con 'injusticia'. Esto conserva la alternativa inglesa documentada ('justice / injustice') y evita una traducción más abstracta que debilitaría el contraste.
- source_word: ποιῆσαι ἐλεημοσύνην
  english_pob_choice: to do almsgiving
  chosen_spanish: hacer limosna
  alternatives_spanish:
  - dar limosna
  - practicar la limosna
  lexicon: LSJ
  rationale: El griego dice literalmente 'hacer limosna'. 'Hacer limosna' conserva ese giro, aunque suene menos idiomático que 'dar limosna'. Se mantiene así el vínculo verbal con ἐλεημοσύνη, como en el texto fuente.
- source_word: θησαυρίσαι
  english_pob_choice: to store up
  chosen_spanish: atesorar
  alternatives_spanish:
  - guardar
  - acumular
  - reservar
  lexicon: LSJ
  rationale: '''Atesorar'' expresa bien la idea de acumular tesoros y reproduce el matiz de ''store up'' sin añadir una connotación excesivamente negativa.'
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro acuñado
  - oro en riquezas
  lexicon: LSJ
  rationale: '''Oro'' es la forma más natural en español y conserva la imagen concreta del metal precioso. En este contexto, funciona como objeto de acumulación en contraste con la limosna.'
theological_decisions:
- issue: δικαιοσύνη / ἀδικία en un contexto sapiencial de Tobit
  english_pob_reading: righteousness / unrighteousness
  chosen_spanish_reading: justicia / injusticia
  alternative_spanish_readings:
  - rectitud / injusticia
  - justicia / iniquidad
  rationale: La POB inglesa documenta la alternativa 'justice / injustice' junto a 'righteousness / unrighteousness'. En español, 'justicia / injusticia' preserva con mayor transparencia la antítesis moral y la fuerza proverbial del pasaje, sin perder el sentido de vida recta implicado en el contexto de Tobit.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que ajustó la segunda cláusula para reflejar con más precisión la relación comparativa del griego: ''un poco con justicia es mejor que mucho con injusticia''. También se conservó el paralelismo final entre hacer limosna y atesorar oro.'
  spanish_consistency_notes:
  - Se mantuvo 'limosna' en lugar de 'caridad' o 'misericordia' para conservar la precisión lexical de ἐλεημοσύνη y su repetición interna.
  - Se usó 'justicia/injusticia' como pareja principal porque en español comunica con claridad la antítesis ética del proverbio; la alternativa 'rectitud' queda documentada en nota.
  - La estructura general sigue el tono proverbial y evaluativo del griego, sin expandir el texto con interpretaciones devocionales.
  - '''Hacer limosna'' se conserva por fidelidad a ποιῆσαι ἐλεημοσύνην, aun cuando en español ''dar limosna'' sería más idiomático.'
