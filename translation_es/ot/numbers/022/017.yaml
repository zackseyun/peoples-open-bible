translation:
  language: es
  text: Porque te honraré mucho[a], y haré todo lo que me digas. Así que, por favor, ven, maldice a este pueblo por mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «te honraré ciertamente mucho» o «te recompensaré con abundancia». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o motivación de la petición de Balac. «Porque» expresa bien la relación discursiva sin endurecer el tono.
- source_word: כַבֵּד אֲכַבֶּדְךָ
  english_pob_choice: I will greatly honor you
  chosen_spanish: te honraré mucho
  alternatives_spanish:
  - te honraré grandemente
  - te daré mucho honor
  - te honraré ciertamente
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto con verbo finito para intensificar. Mantengo el verbo de honor como núcleo semántico y traslado la intensificación a «mucho», que suena natural en español.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  - excesivamente
  lexicon: HALOT
  rationale: Adverbio de intensificación. «Mucho» conserva la fuerza enfática en un castellano fluido y digno.
- source_word: וְכֹל אֲשֶׁר תֹּאמַר אֵלַי אֶעֱשֶׂה
  english_pob_choice: and I will do whatever you say to me
  chosen_spanish: haré todo lo que me digas
  alternatives_spanish:
  - y haré todo cuanto me digas
  - y haré lo que me digas
  - y cumpliré todo lo que me digas
  lexicon: HALOT
  rationale: «Todo lo que me digas» preserva la amplitud de כֹל אֲשֶׁר y la relación verbal directa con «decir»/«hablar», sin alejarse hacia una paráfrasis más libre.
- source_word: וּלְכָה נָּא
  english_pob_choice: So please come
  chosen_spanish: Así que, por favor, ven
  alternatives_spanish:
  - Y ahora, por favor, ven
  - Ven ahora, por favor
  - Vamos, por favor, ven
  lexicon: HALOT
  rationale: La partícula de movimiento con apelación cortés se expresa de forma idiomática con «por favor» y un conector discursivo que retoma lo anterior.
- source_word: קָבָה
  english_pob_choice: curse
  chosen_spanish: maldice
  alternatives_spanish:
  - maldice con maldición
  - pronuncia una maldición sobre
  - anatema
  lexicon: HALOT
  rationale: En este contexto el verbo se refiere a invocar maldición contra el pueblo. «Maldice» comunica con claridad el acto solicitado sin añadir explicación.
- source_word: אֵת הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a este pueblo de aquí
  - a esta gente
  - a esta nación
  lexicon: HALOT
  rationale: Conserva el singular colectivo de עָם y el demostrativo cercano. «Pueblo» es más fiel al registro bíblico que «gente» y mantiene la referencia colectiva.
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente coinciden plenamente; no se observan cambios aplicados ni tensiones textuales pendientes. La versión española sigue esa lectura estable, conservando la intensificación del hebreo y el valor colectivo de «este pueblo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se usa «maldice» para קָבָה por ser el sentido contextual directo y no una perífrasis más larga.
  - «Pueblo» reproduce el singular colectivo de הָעָם.
  - La nota al pie marca la alternativa de intensidad y posible valor de recompensa implícita en la construcción hebrea.
