  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «Padre», «pacto» y «profanando» están alineados. La decisión sobre נבגד como «somos infieles» es defendible y coincide con la rationale inglesa. El punto a ajustar es puramente relacional/sintáctico en בְּאָחִיו.
