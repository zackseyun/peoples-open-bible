translation:
  language: es
  text: 'Ahora bien, cuando llegaba el turno de cada joven[a] para entrar ante el rey Asuero, después de haber estado bajo la regulación[b] para las mujeres durante doce meses —porque así se cumplían los días de sus preparativos de belleza[c]: seis meses con aceite de mirra, y seis meses con aromas[d] y cosméticos femeninos—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchacha». El hebreo נַעֲרָה puede referirse a una joven mujer o muchacha, sin implicar por sí solo «virgen».
    reason: lexical_alternative
  - marker: b
    text: O «según la ley» o «según la costumbre» para las mujeres. El hebreo דָּת puede denotar una regulación oficial, ley o norma establecida.
    reason: lexical_alternative
  - marker: c
    text: O «los días de su tratamiento cosmético» o, menos probablemente aquí, «los días de su purificación».
    reason: lexical_alternative
  - marker: d
    text: O «especias». Aquí el hebreo בְּשָׂמִים se refiere a sustancias aromáticas usadas en el arreglo corporal, no necesariamente a especias culinarias.
    reason: cultural_note
lexical_decisions:
- source_word: תֹּר
  english_pob_choice: turn
  chosen_spanish: turno
  alternatives_spanish:
  - turno asignado
  - orden
  - turno señalado
  lexicon: HALOT
  rationale: Aquí תֹּר expresa la sucesión o asignación de acceso al rey. «Turno» conserva el sentido procedimental y suena natural en español.
- source_word: נַעֲרָה
  english_pob_choice: young woman
  chosen_spanish: joven
  alternatives_spanish:
  - muchacha
  - doncella
  - muchacha joven
  lexicon: HALOT
  rationale: El término puede referirse a una muchacha o joven mujer. «Joven» evita introducir «virgen» y mantiene el valor básico del sustantivo en este contexto.
- source_word: לָבוֹא אֶל־הַמֶּלֶךְ
  english_pob_choice: to go in to the king
  chosen_spanish: para entrar a ver al rey
  alternatives_spanish:
  - para entrar donde el rey
  - para presentarse ante el rey
  - para ir a ver al rey
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula de acceso a la presencia real y aquí también conserva una posible carga de intimidad/corte. «Entrar a ver al rey» comunica el acceso sin ser innecesariamente literal en español.
- source_word: מִקֵּץ הֱיוֹת לָהּ
  english_pob_choice: after she had been
  chosen_spanish: después de haber estado
  alternatives_spanish:
  - al término de haber estado
  - después de que había estado
  - cuando se había completado
  lexicon: HALOT
  rationale: La construcción marca la conclusión de un período previo. «Después de haber estado» reproduce esa relación temporal de forma idiomática.
- source_word: כְּדָת הַנָּשִׁים
  english_pob_choice: under the regulation for the women
  chosen_spanish: bajo la regulación para las mujeres
  alternatives_spanish:
  - según la regulación para las mujeres
  - conforme a la ley para las mujeres
  - según la costumbre de las mujeres
  lexicon: HALOT
  rationale: דָּת en este marco persa apunta a una regulación o norma establecida. «Regulación» preserva el matiz administrativo mejor que «ley» o «costumbre».
- source_word: שְׁנֵים עָשָׂר חֹדֶשׁ
  english_pob_choice: twelve months
  chosen_spanish: doce meses
  alternatives_spanish:
  - un período de doce meses
  - doce meses completos
  lexicon: HALOT
  rationale: La duración es directa; «doce meses» es la forma más clara y fiel.
- source_word: כִּי כֵּן יִמְלְאוּ
  english_pob_choice: for in this way ... were completed
  chosen_spanish: porque así se cumplían
  alternatives_spanish:
  - pues así se completaban
  - porque de ese modo se llenaban
  - ya que así se terminaban
  lexicon: HALOT
  rationale: La frase explica por qué existía el período de doce meses. «Se cumplían» conserva la idea de plenitud/completación del verbo sin volverlo demasiado técnico.
- source_word: יְמֵי מְרוּקֵיהֶן
  english_pob_choice: the days of their beauty treatments
  chosen_spanish: los días de sus preparativos de belleza
  alternatives_spanish:
  - los días de sus tratamientos de belleza
  - los días de su adorno
  - los días de su purificación
  lexicon: HALOT
  rationale: מְרוּקִים alude a frotamientos, ungimientos y preparación cosmética. «Preparativos de belleza» preserva la idea de arreglo corporal sin fijarla demasiado en una sola técnica.
- source_word: שֶׁמֶן הַמֹּר
  english_pob_choice: oil of myrrh
  chosen_spanish: aceite de mirra
  alternatives_spanish:
  - ungüento de mirra
  - óleo de mirra
  lexicon: HALOT
  rationale: Es una traducción transparente de la sustancia empleada durante los primeros seis meses.
- source_word: בְּשָׂמִים
  english_pob_choice: spices
  chosen_spanish: aromas
  alternatives_spanish:
  - especias
  - perfumes
  - sustancias aromáticas
  lexicon: HALOT
  rationale: En este contexto cosmético, בְּשָׂמִים no apunta primariamente a cocina sino a sustancias aromáticas. «Aromas» comunica bien ese valor en español sin restringirlo innecesariamente.
- source_word: תַמְרוּקֵי הַנָּשִׁים
  english_pob_choice: women's cosmetics
  chosen_spanish: cosméticos de las mujeres
  alternatives_spanish:
  - cosméticos para las mujeres
  - productos de belleza de las mujeres
  - tocador de las mujeres
  lexicon: HALOT
  rationale: תַמְרוּקִים son preparados cosméticos o de aseo. «Cosméticos de las mujeres» mantiene la referencia al arreglo femenino y sigue de cerca el campo semántico del texto.
theological_decisions:
- issue: Lectura de דָּת en un contexto persa
  english_pob_reading: under the regulation for the women
  chosen_spanish_reading: bajo la regulación para las mujeres
  alternative_spanish_readings:
  - según la ley para las mujeres
  - según la costumbre para las mujeres
  rationale: La evidencia contextual favorece una norma o reglamento oficial más que una simple costumbre. Se evita traducirlo de modo que borre el trasfondo administrativo del relato.
  doctrine_reference: Ninguna; decisión lexical-contextual
- issue: Sentido de los meses de preparación
  english_pob_reading: the days of their beauty treatments
  chosen_spanish_reading: los días de sus preparativos de belleza
  alternative_spanish_readings:
  - los días de sus tratamientos de belleza
  - los días de su purificación
  rationale: El texto enumera sustancias para embellecimiento y arreglo personal. La opción elegida conserva la función preparatoria sin imponer una lectura de purificación que el contexto inmediato no exige.
  doctrine_reference: Ninguna; decisión lexical-contextual
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que sustituyó una redacción más pesada por la forma más natural «women''s cosmetics». En español se optó por una equivalencia igualmente concisa: «cosméticos de las mujeres», manteniendo el vínculo con el contexto de preparación corporal. También se conservó el valor administrativo de דָּת como «regulación», coherente con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Asuero» para el nombre propio, conforme al uso español estándar y al Hebrew Ahasuerus.
  - Se usa «Yahvé» como default del proyecto solo cuando aparece el tetragrámaton; aquí no aplica.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden al versículo.
  - Se preserva la secuencia temporal del hebreo con una sola oración larga, como en el inglés auditado, pero con puntuación española fluida.
  - «Aromas» se eligió para no reducir בְּשָׂמִים a una noción culinaria de «especias» y para mantener la coherencia con el contexto cosmético.
