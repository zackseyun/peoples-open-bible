id: 1TI.6.10
reference: 1 Timothy 6:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ῥίζα γὰρ πάντων τῶν κακῶν ἐστιν ἡ φιλαργυρία, ἧς τινες ὀρεγόμενοι ἀπεπλανήθησαν ἀπὸ τῆς πίστεως καὶ ἑαυτοὺς περιέπειραν ὀδύναις πολλαῖς.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/010.yaml
  text: For the love of money is a root of all kinds of evils[a]; by craving it[c][b], some have wandered away from the faith and pierced themselves with many pains.
  footnotes:
  - marker: a
    text: Or, traditionally, 'For the love of money is the root of all evil.' The Greek more naturally allows 'a root of all kinds of evils,' which avoids implying that every evil has a single cause.
    reason: alternative_reading
  - marker: b
    text: Or 'have strayed from faith.' Here 'the faith' likely refers to the Christian faith as an objective body of belief.
    reason: lexical_alternative
  - marker: c
    text: Or 'pierced themselves with many griefs' or 'many sorrows.'
    reason: lexical_alternative
translation:
  language: ko
  text: 돈을 사랑함은 온갖 악의 한 뿌리이기[a] 때문입니다. 어떤 사람들은 그것을 갈망하여 믿음에서 떠나 헤매고[b], 자기 자신을 많은 고통[c]으로 찌르고 말았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 전통적으로 「돈을 사랑함은 일만 악의 뿌리이기」. 그러나 헬라어 「πάντων τῶν κακῶν」은 「모든 악이 단 하나의 원인에서 나온다」고 함의하기보다 「온갖 종류의 악」으로 자연스럽게 읽히며, 「ῥίζα」 앞에 정관사가 없으므로 「유일한 뿌리」가 아니라 「한 뿌리」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「믿음에서 빗나가」. 본 절의 「믿음」은 객관적 신앙의 내용으로서의 그리스도교 신앙을 가리키는 것으로 보인다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「많은 슬픔」 「많은 비통」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίζα ... πάντων τῶν κακῶν
  english_pob_choice: a root of all kinds of evils
  chosen_korean: 온갖 악의 한 뿌리
  alternatives_korean:
  - 모든 종류의 악의 한 뿌리
  - 모든 악의 뿌리
  - 일만 악의 뿌리
  lexicon: BDAG
  rationale: 헬라어 ῥίζα에 정관사가 없고, πάντων τῶν κακῶν은 분포적·종류적 「온갖 악」으로 더 자연스럽게 읽힌다. 「모든 악의 단일 뿌리」로 좁히지 않기 위해 「한 뿌리」를 본문에 두며, 전통적 「일만 악의 뿌리」 해석은 각주에 보존한다.
- source_word: ἡ φιλαργυρία
  english_pob_choice: the love of money
  chosen_korean: 돈을 사랑함
  alternatives_korean:
  - 돈 사랑
  - 탐욕
  lexicon: BDAG
  rationale: 3:3 ἀφιλάργυρος와 어휘 호응을 위해 「돈을 사랑함」.
- source_word: ὀρεγόμενοι
  english_pob_choice: by craving it
  chosen_korean: 그것을 갈망하여
  alternatives_korean:
  - 그것을 사모하여
  lexicon: BDAG
  rationale: 3:1 ὀρέγω와 동일 어휘이나, 본 절은 부정적 갈망이므로 「갈망」(부정 어감)으로 옮긴다.
- source_word: ἀπεπλανήθησαν ἀπὸ τῆς πίστεως
  english_pob_choice: have wandered away from the faith
  chosen_korean: 믿음에서 떠나 헤매고
  alternatives_korean:
  - 그 믿음에서 빗나가고
  - 신앙에서 떠돌게 되고
  lexicon: BDAG
  rationale: ἀποπλανάω의 「길에서 떠나 헤매다」 비유를 살린다.
- source_word: ἑαυτοὺς περιέπειραν ὀδύναις πολλαῖς
  english_pob_choice: pierced themselves with many pains
  chosen_korean: 자기 자신을 많은 고통으로 찌르고 말았습니다
  alternatives_korean:
  - 자신을 수많은 슬픔으로 꿰찌르고 말았습니다
  lexicon: BDAG
  rationale: περιπείρω의 「꿰뚫다·꿰찌르다」를 「찌르다」로.
theological_decisions:
- issue: '6:10 - πάντων τῶν κακῶν을 「온갖 악」 vs. 「모든 악」'
  chosen_reading: 「돈을 사랑함은 온갖 악의 한 뿌리이기 때문입니다.」
  alternative_readings:
  - 「돈을 사랑함은 일만 악의 뿌리이기 때문입니다.」(전통적)
  - 「돈을 사랑함은 모든 악의 뿌리이기 때문입니다.」
  rationale: 헬라어 본문은 두 가지 미세한 특징을 가진다. (1) ῥίζα 앞에 정관사가 없다 → 「유일한 뿌리」가 아니라 「한 뿌리(어떤 뿌리)」가 더 자연스럽다. (2) πάντων τῶν κακῶν은 「모든 (단일한) 악」보다 「모든 종류의 악·온갖 악」으로 분포적·종류적 의미로 읽는 것이 더 정확하다 — 즉 「존재하는 모든 단일 악이 돈 사랑에서 나온다」는 강한 주장이 아니라 「많은 종류의 악들이 돈 사랑에 그 한 뿌리를 둔다」는 의미이다. 본 번역은 「온갖 악의 한 뿌리」로 옮겨 본문이 실제 말하는 것을 보존하며, 전통적 「일만 악의 뿌리」 해석은 각주에 두어 어감 폭을 잃지 않게 한다.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; do not import claims the text does not make'
