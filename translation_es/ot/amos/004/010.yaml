translation:
  language: es
  text: Envié entre ustedes una plaga al modo de Egipto[a]; maté a sus jóvenes con la espada, junto con sus caballos capturados[b], e hice subir el hedor de sus campamentos hasta sus narices; pero no volvieron a mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como en Egipto»; la frase probablemente alude a las plagas y juicios asociados con Egipto, más que a una ruta literal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «junto con el cautiverio de sus caballos»; la expresión probablemente se refiere a una derrota militar en la que sus caballos fueron capturados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁלַּחְתִּי
  english_pob_choice: I sent
  chosen_spanish: yo envié
  alternatives_spanish:
  - yo mandé
  - yo despaché
  lexicon: HALOT
  rationale: El verbo enviar conserva la acción directa del hebreo שׁלח y funciona con naturalidad en español profético. Se mantiene el sujeto enfático en primera persona para reflejar el juicio divino.
- source_word: בָכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - contra ustedes
  lexicon: HALOT
  rationale: Con una calamidad enviada, la preposición expresa presencia/alcance dentro del pueblo. 'Entre ustedes' preserva la idea distributiva sin añadir una hostilidad explícita que el hebreo no requiere por sí sola.
- source_word: דֶּבֶר
  english_pob_choice: a plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - pestilencia
  - epidemia de juicio
  lexicon: HALOT
  rationale: '''Plaga'' comunica de manera clara y digna una aflicción mortal de juicio. ''Pestilencia'' es posible, pero menos natural para el lector moderno.'
- source_word: בְּדֶרֶךְ מִצְרַיִם
  english_pob_choice: in the manner of Egypt
  chosen_spanish: en el modo de Egipto
  alternatives_spanish:
  - al modo de Egipto
  - como en Egipto
  - después del modo de Egipto
  lexicon: HALOT
  rationale: La construcción apunta probablemente a una alusión a los juicios/plagas de Egipto, no a una ruta literal. 'En el modo de Egipto' preserva esa lectura alusiva con español sobrio; la nota explica la alternativa de sentido.
- source_word: הָרַגְתִּי
  english_pob_choice: I killed
  chosen_spanish: maté
  alternatives_spanish:
  - dí muerte
  - derribé
  lexicon: HALOT
  rationale: '''Matar'' es el equivalente directo y claro de הרג en este contexto de sentencia. ''Maté'' mantiene la fuerza del juicio sin atenuarlo.'
- source_word: בַחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: HALOT
  rationale: En español, 'a espada' sería muy idiomático, pero 'con la espada' conserva de forma transparente el instrumento del hebreo y el paralelo con la estructura del versículo.
- source_word: בַּחוּרֵיכֶם
  english_pob_choice: your young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachos
  - sus hombres jóvenes
  - sus guerreros jóvenes
  lexicon: HALOT
  rationale: El hebreo refiere a jóvenes en la plenitud de fuerza; en el contexto bélico, 'sus jóvenes' conserva amplitud semántica sin restringirlo sólo a combatientes.
- source_word: עִם שְׁבִי סוּסֵיכֶם
  english_pob_choice: along with your captured horses
  chosen_spanish: junto con el cautiverio de sus caballos
  alternatives_spanish:
  - junto con sus caballos cautivos
  - con el cautiverio de sus caballos
  - junto con la captura de sus caballos
  lexicon: HALOT
  rationale: שבי puede expresar cautiverio/estado de captura. Se conserva la forma compacta y potencialmente dura del hebreo, aunque suene menos fluida; la nota explica la alternativa interpretativa de caballos capturados.
- source_word: וָאַעֲלֶה
  english_pob_choice: and I made ... rise
  chosen_spanish: e hice subir
  alternatives_spanish:
  - y levanté
  - y hice ascender
  lexicon: HALOT
  rationale: La causatividad de עלה se expresa naturalmente con 'hacer subir' en español. Esta opción conserva la imagen del hedor ascendiendo.
- source_word: בְּאֹשׁ
  english_pob_choice: the stench
  chosen_spanish: el hedor
  alternatives_spanish:
  - la pestilencia
  - el tufo
  - el mal olor
  lexicon: HALOT
  rationale: '''Hedor'' es un término fuerte y digno para el mal olor del juicio; corresponde bien al matiz de אֹשׁ.'
- source_word: מַחֲנֵיכֶם
  english_pob_choice: of your camps
  chosen_spanish: de sus campamentos
  alternatives_spanish:
  - de sus campamentos militares
  - de sus campamentos
  lexicon: HALOT
  rationale: El plural hebreo se refleja con 'campamentos'. En español se evita el posesivo de segunda persona por armonía con el resto de la línea en tono directo; el referente sigue siendo el mismo grupo interpelado.
- source_word: וּבְאַפְּכֶם
  english_pob_choice: even into your nostrils
  chosen_spanish: hasta sus narices
  alternatives_spanish:
  - en sus narices
  - hasta sus fosas nasales
  - incluso en sus narices
  lexicon: HALOT
  rationale: אַף puede ser nariz/nariz con valor físico. 'Hasta sus narices' mantiene la imagen corporal y la fuerza retórica del texto; 'narices' evita una explicación más técnica que debilitaría el efecto.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  english_pob_choice: yet you did not return to me
  chosen_spanish: pero no volvieron a mí
  alternatives_spanish:
  - pero no se volvieron a mí
  - pero no regresaron a mí
  - pero no se arrepintieron y volvieron a mí
  lexicon: HALOT
  rationale: שוב conserva el sentido de volver/retornar, con eco de arrepentimiento sin explicitarlo en el texto principal. 'No volvieron a mí' es fiel y deja intacta la tensión profética.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde conforme al estándar del proyecto como 'Yahvé'. 'Declara' reproduce la fórmula profética solemne de נאם.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto, no una sustitución enmascaradora. 'Yahvé' es la forma estándar del proyecto en español y conserva la identidad del hablante divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura de וְלֹא שַׁבְתֶּם עָדַי
  english_pob_reading: you did not return to me
  chosen_spanish_reading: no volvieron a mí
  alternative_spanish_readings:
  - no se arrepintieron y volvieron a mí
  - no retornaron a mí
  - no se volvieron a mí
  rationale: Se preserva el verbo de retorno sin convertirlo en una paráfrasis doctrinalmente más explícita. La fuerza profética incluye arrepentimiento, pero el hebreo literal es 'volver' y conviene conservar esa tensión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y la base hebrea. Se decidió conservar la alusión a Egipto, la imagen cruda del hedor y la tensión de שוב como 'volver' sin explicitar 'arrepentirse' en el texto principal. No hubo revisiones pendientes en el registro inglés, por lo que el español refleja esa estabilidad textual.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con el estándar del proyecto.
  - '''Entre ustedes'' y ''sus'' mantienen la referencia al mismo colectivo interpelado, aunque la segunda línea conserve el posesivo impersonal por fluidez.'
  - Se preservó el tono oracular con 'declara' al final.
  - Se evitó reemplazar 'volver' por un término exclusivamente doctrinal, para no borrar la tensión lexical del hebreo.
