translation:
  language: es
  text: Y en el documento sellado[a] estaban Nehemías, el gobernador[b], hijo de Hacalías, y Sedequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los sellados»; el hebreo probablemente se refiere a quienes estaban representados por sus nombres en el documento del pacto sellado.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Tirshatá», un título administrativo de la época persa, tradicionalmente transliterado en lugar de traducido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And on
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y en
  - Y acerca de
  lexicon: HALOT
  rationale: La preposición עַל en este contexto de registro/lista se entiende como relación de pertenencia o asociación con el documento sellado. 'Sobre' conserva esa relación sin forzar una construcción más explicativa.
- source_word: הַחֲתוּמִים
  english_pob_choice: the sealed document
  chosen_spanish: los sellados
  alternatives_spanish:
  - el documento sellado
  - los que sellaron
  - los signatarios
  lexicon: HALOT
  rationale: El hebreo es un participio pasivo plural, literalmente 'los sellados'. En el contexto, la frase introduce a los que aparecen vinculados con el documento sellado. Se mantiene la forma más cercana al hebreo en el texto principal, dejando la opción interpretativa del documento en la nota.
- source_word: נְחֶמְיָה
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  alternatives_spanish:
  - Nehemia
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio con forma española establecida y ampliamente reconocible.
- source_word: הַתִּרְשָׁתָא
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el Tirshata
  lexicon: HALOT
  rationale: El título persa indica una función administrativa. 'Gobernador' comunica el cargo de manera clara en español. La forma transliterada queda reflejada en la nota como alternativa tradicional.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Equivalente genealógico directo y natural en español.
- source_word: חֲכַלְיָה
  english_pob_choice: Hacaliah
  chosen_spanish: Hacalías
  alternatives_spanish:
  - Hacalía
  - Jacalías
  lexicon: Transliteración bíblica estándar
  rationale: Se adopta una transliteración española consistente para el nombre propio, preservando su forma tradicional en castellano bíblico.
- source_word: וְצִדְקִיָּה
  english_pob_choice: and Zedekiah
  chosen_spanish: y Sedequías
  alternatives_spanish:
  - y Zedequías
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio en forma española asentada. 'Sedequías' es ampliamente reconocible y fiel a la transliteración tradicional.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo directo y se conservó la observación del audit trail inglés: הַחֲתוּמִים puede leerse de manera más literal como ''los sellados'', aunque en contexto apunta al documento del pacto sellado y a quienes figuran en él. También se mantuvo la decisión documentada de traducir el título persa הַתִּרְשָׁתָא como ''el gobernador''.'
  spanish_consistency_notes:
  - Se prefirió 'Y sobre' para reflejar la relación textual con עַל sin introducir una formulación demasiado interpretativa.
  - Se evitó 'SEÑOR' u otras convenciones no pertinentes porque el versículo no contiene el nombre divino.
  - Los nombres propios se adaptaron a formas bíblicas españolas estándar para coherencia editorial.
