review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo primario en la estructura principal: vocativo filial, exhortación a la firmeza en el honor al padre, y prohibición de abandonarlo durante toda la vida del hijo. También preserva adecuadamente la lectura griega significativa en nota. Sin embargo, la frase española «todos los días de tu vida» suena más distributiva que idiomática en este contexto y no refleja tan bien el valor durativo de כָּל יְמֵי חַיֶּיךָ como «todos los días de la vida» en inglés; en español bíblico-natural conviene «durante toda tu vida» o «mientras vivas».'
  spanish_quality_summary: 'El español es claro y digno. «Hijo mío» y «no lo abandones» están bien logrados. «Esfuérzate en honrar» es aceptable, aunque algo más dinámico que «sé fuerte»; no distorsiona el sentido. La mejora necesaria es idiomática: «no lo abandones todos los días de tu vida» puede sonar extraña o incluso ambigua; «no lo abandones durante toda tu vida» fluye mejor y preserva el sentido continuo.'
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. Las decisiones léxicas principales son fieles: בְּנִי → «Hijo mío», הִתְחַזֵּק → «esfuérzate», עזב → «abandonar». La nota griega está bien formulada y marcada correctamente.'
  issues:
  - severity: medium
    issue: 'Expresión temporal poco natural en español: «todos los días de tu vida»'
    rationale: Aunque formalmente cercana al hebreo, en español esta construcción suena distributiva y menos idiomática en un mandato de cuidado continuo. «Durante toda tu vida» comunica mejor el valor durativo de כָּל יְמֵי חַיֶּיךָ sin perder fidelidad.
  revised_spanish_text: Hijo mío[a], esfuérzate en honrar a tu padre, y no lo abandones durante toda tu vida.
  revised_footnotes:
  - marker: a
    text: 'Griego: «sostén a tu padre en su vejez, y no lo entristezcas durante su vida».'
    reason: alternative_reading
  revision_rationale: Se conserva la traducción principal basada en el hebreo y la nota de variante griega. Solo se ajusta el modismo temporal para un español más natural y fiel al sentido continuo del original.
