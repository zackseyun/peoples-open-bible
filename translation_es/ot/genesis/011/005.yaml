translation:
  language: es
  text: Entonces Yahvé bajó para ver la ciudad y la torre que habían construido los hijos del hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «los hijos de la humanidad»; la expresión hebrea se refiere colectivamente a los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - vino abajo
  lexicon: HALOT
  rationale: El hebreo ירד expresa literalmente ‘bajar/descender’. En español, ‘bajó’ conserva el movimiento concreto y la narración antropomórfica sin sonar forzado. ‘Descendió’ sería más formal, pero menos natural en este contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como transliteración reverente del Tetragrámaton. ‘Yahvé’ sigue el criterio del proyecto y evita la sustitución por un título. ‘Jehová’ y ‘el SEÑOR’ no reflejan con la misma transparencia el texto fuente.
- source_word: לִרְאֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para mirar
  - para inspeccionar
  lexicon: HALOT
  rationale: ראיה es simplemente ‘ver’. ‘Para ver’ reproduce con claridad el propósito narrativo sin añadir la idea técnica de inspección, que sería una interpretación más específica de la que exige el hebreo.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Correspondencia directa y natural con עִיר.
- source_word: הַמִּגְדָּל
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - el torreón
  lexicon: HALOT
  rationale: Correspondencia directa y natural con מִגְדָּל. En el contexto de Babel, ‘torre’ es la forma más clara y fiel.
- source_word: בָּנוּ
  english_pob_choice: had built
  chosen_spanish: habían construido
  alternatives_spanish:
  - construyeron
  - habían edificado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español expresa bien que la construcción estaba ya hecha o en curso antes de la bajada de Yahvé en la escena. ‘Construyeron’ también sería posible, pero ‘habían construido’ reproduce mejor la relación temporal del relativo.
- source_word: בְּנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los hijos de la humanidad
  - la humanidad
  lexicon: HALOT
  rationale: Se mantiene la forma masculina y representativa del hebreo, evitando borrar la tensión lexical del sintagma. ‘Los hijos del hombre’ es más cercano a la estructura original que una solución abstracta como ‘la humanidad’. En nota se puede aclarar el sentido colectivo humano.
theological_decisions:
- issue: Descripción antropomórfica de Yahvé bajando
  english_pob_reading: Retain the concrete wording 'came down' without paraphrasing.
  chosen_spanish_reading: Mantener ‘bajó’ sin suavizarlo a una formulación abstracta.
  alternative_spanish_readings:
  - miró desde arriba
  - prestó atención desde el cielo
  rationale: El hebreo presenta a Yahvé en lenguaje narrativo concreto. La traducción conserva ese rasgo literario-teológico sin convertirlo en una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido colectivo de בְּנֵי הָאָדָם
  english_pob_reading: Use 'the sons of man' in the main text.
  chosen_spanish_reading: Usar ‘los hijos del hombre’ en el texto principal.
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  - las personas
  rationale: La expresión hebrea es masculina en forma y colectiva en referencia. Se conserva la forma fuente en el texto principal, dejando la aclaración de sentido para nota si hace falta.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם *adam*'
translation_notes:
  revision_awareness: El veredicto de revisión más reciente indica ‘unchanged’ y el control cruzado muestra alta concordancia; por ello no se introducen cambios sustantivos respecto al sentido auditado del inglés POB y del hebreo WLC.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente con el criterio del proyecto para יְהוָה.
  - Se mantiene el paralelismo ‘la ciudad y la torre’ sin insertar explicaciones ajenas al texto.
  - ‘Los hijos del hombre’ preserva la forma del hebreo; la nota aclara su referencia colectiva sin reemplazarla en el cuerpo.
  - La puntuación y el orden oracional siguen el flujo narrativo natural del español contemporáneo.
