lexical_decisions:
- source_word: יְדִיעֲאֵל
  english_pob_choice: Jediael
  chosen_spanish: Jediael
  alternatives_spanish:
  - Yediael
  lexicon: HALOT
  rationale: Nombre propio; se translitera en español para mantener la forma del original y la coherencia con el registro genealógico.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En esta lista genealógica, בן expresa la relación filial inmediata de manera natural en español como 'hijo de'.
- source_word: שִׁמְרִי
  english_pob_choice: Shimri
  chosen_spanish: Shimri
  alternatives_spanish:
  - Shimeri
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma breve y directa que corresponde al hebreo consonántico.
- source_word: וְ/יֹחָ֥א
  english_pob_choice: and Joha
  chosen_spanish: y Joha
  alternatives_spanish:
  - y Joha
  lexicon: HALOT
  rationale: La conjunción וְ se traduce naturalmente como 'y', y el nombre propio se translitera como Joha, siguiendo el valor más directo de la forma hebrea.
- source_word: אָחִ֖י/ו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su pariente
  lexicon: HALOT
  rationale: אָח normalmente significa 'hermano'; en este contexto de lista genealógica la lectura literal es la más transparente y fiel.
- source_word: הַ/תִּיצִֽי
  english_pob_choice: the Tizite
  chosen_spanish: el tizita
  alternatives_spanish:
  - el tizita
  - el zizita
  - el de Tiz
  lexicon: HALOT
  rationale: Se conserva el gentilicidio con artículo como una designación étnica o territorial. 'Tizita' refleja el valor del original sin fijar indebidamente la localización exacta; se mantiene la ambigüedad documentada entre 'Tizite' y la posible vocalización alternativa 'Zizite'.
translation_notes:
  revision_awareness: El texto sigue el manuscrito hebreo consonántico con el estado de revisión más reciente sin cambios sustantivos; se conserva la misma división de nombres y el mismo problema lexical del gentilicio final documentado en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa 'Jediael' sin adaptación adicional para mantener uniformidad con nombres propios bíblicos transliterados.
  - '''hijo de'' se reserva para el valor genealógico directo de בֶּן en contextos roster/genealogía.'
  - '''tizita'' mantiene una solución neutra; la nota conserva la alternativa textual/lexical sin resolverla de forma dogmática.'
  - Se evita 'Señor' o equivalentes no pertinentes, ya que este versículo solo contiene nombres propios y un gentilicio.
