  yaml_path: translation/nt/1_peter/001/024.yaml
  text: 'because all flesh is like grass, and all its glory is like the flower of grass; the grass withered, and the flower fell off.'
translation:
  language: ko
  text: '이는 「모든 육체는 풀과 같고, 그 모든 영광은 풀의 꽃과 같으니, 풀은 마르고 꽃은 떨어지나,[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 40:6-8 인용. 1:24-25 전체가 한 문장의 인용이며, 1:25에서 마무리된다.
    reason: ot_citation
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_korean: 이는
  alternatives_korean:
  - 왜냐하면
  - 까닭은
  lexicon: BDAG
  rationale: 1:23의 거듭남의 근거를 1:24-25 인용으로 제시하는 구조이므로 「이는」으로 자연스럽게 연결한다.
- source_word: σὰρξ
  english_pob_choice: flesh
  chosen_korean: 육체
  alternatives_korean:
