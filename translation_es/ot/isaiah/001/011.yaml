- from: ¿Para qué me sirve la abundancia de sus sacrificios, dice Yahvé[a]? Estoy harto de holocaustos de carneros y de la grasa de animales engordados[b]; y en la sangre de toros, corderos y machos cabríos no me complazco.
  to: ¿De qué me sirven sus muchos sacrificios?, dice Yahvé[a]. Estoy harto de holocaustos de carneros y de la grasa de animales engordados; y en la sangre de toros, corderos y machos cabríos[b] no me complazco.
  rationale: Se corrigió la apertura para que el español suene natural y preserve mejor la fuerza retórica del hebreo y del audit trail inglés. También se reubicó la nota b al término correcto ('machos cabríos'), que es donde pertenece la observación léxica sobre 'male goats/he-goats'. No se requieren cambios doctrinales ni una relectura compleja del original.
