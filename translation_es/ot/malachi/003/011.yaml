review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Yahvé reprende al devorador, protege el fruto de la tierra y asegura que la vid no sufra pérdida de fruto. Sin embargo, la cláusula sobre תְשַׁכֵּל no está bien representada por «les dé fruto defectuoso», porque el hebreo apunta a pérdida/malogramiento del fruto, no a calidad defectuosa del fruto producido. También la nota a no corresponde, ya que presenta como alternativa exactamente la misma expresión del texto.'
  spanish_quality_summary: El español es claro y digno, pero «les dé fruto defectuoso» suena interpretativo y desvía el sentido agrícola. «No perderá su fruto» o una formulación equivalente es más natural y más fiel. La frase revisada mejora la legibilidad sin sacrificar la imagen concreta. Conviene además normalizar «de los ejércitos» en minúscula por convención española general, aunque el sentido actual no es erróneo.
  glossary_alignment: El borrador acierta con «Yahvé» para יְהוָה y con «la vid», «el devorador», «el fruto de la tierra». «De los ejércitos» refleja adecuadamente צְבָאוֹת. La principal desviación terminológica está en תְשַׁכֵּל, donde el español escogido no sigue bien la justificación lexical documentada de pérdida del fruto antes de madurar.
  issues:
  - severity: high
    issue: «les dé fruto defectuoso» no refleja bien תְשַׁכֵּל
    rationale: El verbo שׁכל aplicado a la vid comunica pérdida, aborto o malogramiento del fruto, no fruto de mala calidad. La redacción actual cambia el sentido.
  - severity: medium
    issue: La nota [a] es inválida como alternativa
    rationale: La nota dice «O, “el devorador”», que repite exactamente el texto principal y no aporta una alternativa real ni la opción inglesa relevante sobre el título divino.
  - severity: low
    issue: Mayúscula en «Ejércitos» es innecesaria
    rationale: 'En español general, los sustantivos comunes de títulos traducidos suelen ir en minúscula: «Yahvé de los ejércitos».'
  revised_spanish_text: Y reprenderé al devorador por ustedes, para que no destruya para ustedes el fruto de la tierra, ni la vid en el campo[a] pierda su fruto para ustedes, dice Yahvé de los ejércitos.
  revised_footnotes:
  - marker: a
    text: Lit., «la vid en el campo no les abortará/malogrará el fruto». La imagen es de pérdida del fruto antes de madurar.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula de תְשַׁכֵּל para expresar pérdida del fruto, no fruto defectuoso; se elimina la nota defectuosa [a] del borrador y se conserva una sola nota útil sobre la imagen literal. También se ajusta la capitalización de «ejércitos» al uso natural del español.
