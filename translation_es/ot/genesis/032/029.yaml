    rationale: En la fórmula hebrea de cambio de nombre, el pasivo de אמר expresa cómo alguien será llamado/nombrado. «Se dirá» en español sugiere simplemente el acto de decir, no el estado de ser llamado por ese nombre, y debilita la precisión semántica del renombramiento.
