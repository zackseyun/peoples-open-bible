    text: Or 'give thanks to Yah.' The Hebrew verb can denote thanksgiving or praise depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'gates of justice.' The Hebrew noun can carry the sense of righteousness or justice.
    reason: lexical_alternative
