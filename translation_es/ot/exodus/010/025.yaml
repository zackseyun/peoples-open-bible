  to: 'Pero Moisés dijo: «Tú también debes poner en nuestras manos sacrificios y holocaustos, y los ofreceremos a Yahvé[a] nuestro Dios».'
  rationale: Se cambia «dar en nuestras manos» por «poner en nuestras manos» para lograr un español natural sin perder la imagen concreta de בְּיָדֵנוּ. Se reubica la nota al término «Yahvé» porque allí pertenece semánticamente.
