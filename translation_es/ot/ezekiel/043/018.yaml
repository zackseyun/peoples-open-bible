translation:
  language: es
  text: 'Y me dijo: «Hijo de hombre, así dice el Señor Yahvé: Estos son los estatutos del altar el día en que sea hecho[a], para ofrecer sobre él holocaustos[b] y para rociar sangre sobre él[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el día de su ser hecho»; la expresión también puede entenderse más generalmente como «cuando sea hecho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un holocausto»; el singular hebreo puede funcionar aquí en sentido colectivo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «arrojar sangre sobre él»; el verbo hebreo puede denotar una aplicación ritual de la sangre más enérgica de lo que «rociar» a veces sugiere.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - hijo humano
  lexicon: HALOT
  rationale: Se conserva el apelativo fijo y repetido de Ezequiel con una forma natural en español; 'Hijo de hombre' mantiene la fuerza literaria del tratamiento y su vínculo intertextual, sin explicarlo como paráfrasis.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Adonay Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - Adonay el Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יהוה → 'Yahvé' y se preserva la combinación de títulos del hebreo. 'Adonay' mantiene el componente de dirección reverente de אֲדֹנָי sin reemplazarlo por una convención de ocultamiento.
- source_word: חֻקּוֹת
  english_pob_choice: statutes
  chosen_spanish: normas
  alternatives_spanish:
  - estatutos
  - ordenanzas
  - prescripciones
  lexicon: HALOT
  rationale: En este contexto cultual-jurídico, 'normas' comunica bien el carácter prescriptivo y resulta más natural en español actual. 'Estatutos' sería más formal, pero puede sonar más técnico o eclesiástico sin aportar mayor precisión aquí.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Traducción directa y estable del término para el altar sacrificial.
- source_word: בְּיוֹם הֵעָשׂוֹתוֹ
  english_pob_choice: on the day it is made
  chosen_spanish: el día en que se haga
  alternatives_spanish:
  - cuando se haga
  - el día de su hacerse
  lexicon: HALOT
  rationale: La construcción hebrea expresa tiempo de realización; en español, 'el día en que se haga' conserva el sentido temporal sin sonar forzado. Se mantiene la ambigüedad del inglés POB entre un día concreto y el momento de su fabricación mediante la nota textual.
- source_word: לְהַעֲלוֹת
  english_pob_choice: for offering
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para ofrecer en holocausto
  - para hacer subir
  lexicon: HALOT
  rationale: El verbo hiphil en contexto sacrificial se expresa naturalmente como 'ofrecer'; el complemento siguiente especifica el tipo de ofrenda.
- source_word: עוֹלָה
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas de holocausto
  lexicon: HALOT
  rationale: '''Holocausto'' es el término tradicional y preciso para la ofrenda quemada total; evita una paráfrasis más larga y preserva el género cultual del pasaje.'
- source_word: וְלִזְרֹק ... דָּם
  english_pob_choice: and for sprinkling blood
  chosen_spanish: para derramar sangre
  alternatives_spanish:
  - para rociar sangre
  - para esparcir sangre
  - para lanzar sangre
  lexicon: HALOT
  rationale: Se opta por 'derramar' siguiendo la fuerza más amplia del verbo hebreo en el uso ritual y la nota del inglés POB sobre una acción más enérgica que 'sprinkling'. 'Rociar' sería más litúrgico, pero puede suavizar demasiado la imagen.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre ella
  lexicon: HALOT
  rationale: Se retoma el referente masculino 'el altar' en español y se mantiene la repetición preposicional del hebreo.
theological_decisions:
- issue: Cómo traducir el nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / Lord Yahweh as a doctrinally aware rendering of the compound title
  chosen_spanish_reading: Adonay Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El paquete fuente y la política del proyecto piden renderizar יהוה como 'Yahvé'. Para no borrar la tensión del compuesto אֲדֹנָי יְהוִה, se conserva 'Adonay' y se usa el nombre divino en forma plena. Esta opción hace auditable la combinación de título y nombre sin disimularla bajo una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de עוֹלָה en un contexto legal-cultual
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrenda quemada
  rationale: Aunque la forma es singular, el contexto enumerativo y generaliza la instrucción. 'Holocaustos' conserva el valor técnico tradicional en español para la ofrenda totalmente consumida por el fuego, sin perder la pluralidad funcional del pasaje.
  doctrine_reference: Sacrificial terminology — cultic instruction in Ezekiel's temple vision
- issue: Fuerza ritual de זָרַק con sangre
  english_pob_reading: sprinkling blood
  chosen_spanish_reading: derramar sangre
  alternative_spanish_readings:
  - rociar sangre
  - esparcir sangre
  rationale: La observación auditada del inglés POB reconoce que el verbo puede denotar una aplicación ritual más enérgica que 'sprinkling'. En español, 'derramar' mantiene esa fuerza amplia sin fijar innecesariamente un gesto técnico más débil.
  doctrine_reference: Ritual action language in sacrificial texts
translation_notes:
  revision_awareness: 'El borrador sigue el alto acuerdo del pasaje base y conserva las tres tensiones auditadas del inglés POB: la fórmula fija de Ezequiel para «Hijo de hombre», el compuesto divino אֲדֹנָי יְהוִה y la fuerza ritual de זרק con sangre. Se ajustó la presentación española para hacer explícita la política del proyecto sobre Yahvé y para evitar un calco excesivo en la cláusula temporal.'
  spanish_consistency_notes:
  - Se mantiene la terminología del proyecto para יהוה como 'Yahvé'.
  - Se conservó 'Hijo de hombre' como apelativo profético fijo y no como paráfrasis.
  - '''Holocaustos'' se usa como término cultual técnico coherente con español bíblico formal.'
  - La puntuación y las comillas siguen el uso tipográfico español.
  - Los marcadores de nota se colocan solo donde hay alternativa textual real en el español o el hebreo auditado.
