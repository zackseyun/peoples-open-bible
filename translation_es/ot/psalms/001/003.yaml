translation:
  language: es
  text: Será como un árbol plantado junto a corrientes de agua, que da su fruto a su tiempo; su hoja no se marchita, y en todo lo que hace, prospera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que hace prospera». El hebreo también puede entenderse como si «todo lo que hace» fuera el sujeto del verbo final.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: He will be
  chosen_spanish: Será
  alternatives_spanish:
  - Y será
  - Estará
  lexicon: WLC/HALOT
  rationale: En este contexto poético, el hebreo introduce una comparación futura o resultativa. «Será» es natural en español y conserva la idea de destino/resultado sin forzar una estructura más literal que suene menos idiomática.
- source_word: כְּעֵץ
  english_pob_choice: like a tree
  chosen_spanish: como un árbol
  alternatives_spanish:
  - cual árbol
  - como árbol
  lexicon: WLC/HALOT
  rationale: La partícula comparativa pide una equivalencia de semejanza. «Como un árbol» es la formulación más clara y fiel en español contemporáneo.
- source_word: שָׁתוּל
  english_pob_choice: planted
  chosen_spanish: plantado
  alternatives_spanish:
  - trasplantado
  - establecido
  lexicon: WLC/HALOT
  rationale: El participio pasivo describe un árbol colocado deliberadamente en un lugar. «Plantado» conserva la imagen directa; «trasplantado» sería posible pero introduce una precisión no exigida por el texto.
- source_word: עַל פַּלְגֵי מָיִם
  english_pob_choice: by streams of water
  chosen_spanish: junto a corrientes de agua
  alternatives_spanish:
  - junto a arroyos de agua
  - al lado de canales de agua
  - junto a corrientes de aguas
  lexicon: WLC/HALOT
  rationale: פַלְגֵי מָיִם apunta a canales/divisiones/corrientes de agua. «Corrientes de agua» mantiene la imagen de abastecimiento constante; «junto a» expresa bien la relación espacial sin calco extraño de la preposición hebrea.
- source_word: פִּרְיוֹ יִתֵּן
  english_pob_choice: yields its fruit
  chosen_spanish: da su fruto
  alternatives_spanish:
  - produce su fruto
  - rinde su fruto
  - lleva su fruto
  lexicon: WLC/HALOT
  rationale: El hebreo dice literalmente «da su fruto». «Da su fruto» es fiel, claro y suficientemente idiomático en español para la imagen agrícola.
- source_word: בְּעִתּוֹ
  english_pob_choice: in its season
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - en su estación
  - en su tiempo
  lexicon: WLC/HALOT
  rationale: La frase expresa momento oportuno o asignado. «A su tiempo» es una equivalencia natural que conserva la idea de oportunidad/estacionalidad sin rigidez.
- source_word: וְעָלֵהוּ
  english_pob_choice: and its leaf
  chosen_spanish: su hoja
  alternatives_spanish:
  - y su hoja
  - su follaje
  lexicon: WLC/HALOT
  rationale: El singular hebreo funciona de modo colectivo para la vegetación. «Su hoja» preserva la imagen concreta y suena natural en español.
- source_word: לֹא יִבּוֹל
  english_pob_choice: does not wither
  chosen_spanish: no se marchita
  alternatives_spanish:
  - no se seca
  - no se mustia
  - no se desvanece
  lexicon: WLC/HALOT
  rationale: El verbo hebreo describe el marchitamiento de la vegetación. «No se marchita» comunica bien esa pérdida de vitalidad en español y mantiene el campo semántico botánico.
- source_word: וְכֹל אֲשֶׁר יַעֲשֶׂה
  english_pob_choice: in all that he does
  chosen_spanish: en todo lo que hace
  alternatives_spanish:
  - y todo lo que hace
  - todo lo que hace
  lexicon: WLC/HALOT
  rationale: El hebreo puede leerse como marco general de actividad. «En todo lo que hace» reproduce la amplitud total y prepara de manera fluida la cláusula final.
- source_word: יַצְלִיחַ
  english_pob_choice: he prospers
  chosen_spanish: prospera
  alternatives_spanish:
  - tiene éxito
  - sale bien
  - le va bien
  lexicon: WLC/HALOT
  rationale: El verbo en hifil expresa éxito/prosperidad. «Prospera» conserva la fuerza bíblica y la amplitud del término sin reducirlo a mera eficiencia o buen resultado.
theological_decisions:
- issue: Sujeto de la cláusula final יַצְלִיחַ
  english_pob_reading: 'The prosperous outcome is predicated of the man: ''in all that he does, he prospers.'''
  chosen_spanish_reading: 'El resultado próspero se atribuye al hombre justo: «en todo lo que hace prospera».'
  alternative_spanish_readings:
  - «todo lo que hace prospera»
  - «en todo lo que hace, prospera él»
  rationale: El hebreo permite entender un sujeto personal retomado del hombre bienaventurado del salmo, o bien tomar «todo lo que hace» como sujeto. Se conserva la lectura personal principal porque mantiene el foco en la persona justa, sin excluir la posibilidad de que sus obras sean el sujeto implícito.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés sin cambios revisionales adicionales; la única tensión interpretativa relevante se conserva en la nota sobre el sujeto de la cláusula final.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando el texto lo requiriera; aquí no aparece el nombre divino.
  - Se prefirió «prospera» para mantener el valor léxico de הצליח sin reducirlo a una noción meramente económica.
  - La imagen arbórea se mantuvo concreta y directa, sin expandirla a paráfrasis devocional.
