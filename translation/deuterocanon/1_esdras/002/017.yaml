theological_decisions:
- issue: Rendering κύριος for a human king rather than as a divine title
  chosen_reading: my lord the king
  alternative_readings:
  - the lord king
  - the king my lord
  rationale: The doctrine default 'Lord' for κύριος applies especially to divine/covenantal or christological usage. Here the term is plainly a courtly address to Artaxerxes, so idiomatic English should reflect human royal protocol rather than suggest divinity.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; κύριος default applies contextually.'
