revisions:
- from: Pero si el buey era acostumbrado a cornear desde ayer y anteayer, y su dueño había sido advertido, pero no lo guardó, y mata a un hombre o a una mujer, el buey será apedreado, y también su dueño será muerto.
  to: Pero si el buey acostumbraba a cornear desde ayer y anteayer[a], y su dueño había sido advertido pero no lo mantuvo encerrado, y mata a un hombre o a una mujer, el buey será apedreado, y también su dueño será puesto a muerte.
  rationale: Se ajustó el español para reflejar mejor el sentido habitual de נַגָּח, el matiz práctico de control en וְלֹא יִשְׁמְרֶנּוּ, y la fuerza jurídica de יוּמָת, evitando calcos poco naturales. Se añadió una nota para conservar y explicar el modismo temporal hebreo documentado en la auditoría inglesa.
