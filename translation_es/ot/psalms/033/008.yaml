translation:
  language: es
  text: Que toda la tierra tema a Yahvé[a]; que todos los habitantes del mundo queden sobrecogidos[b] ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tenga temor de Yahvé»; el hebreo expresa temor reverente, no mera deferencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estén llenos de temor ante él» o «tiemblen ante él»; el verbo hebreo puede expresar temor, pavor reverente o temblor ante él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִֽירְא֣וּ
  english_pob_choice: Let all the earth fear Yahweh
  chosen_spanish: tema
  alternatives_spanish:
  - tema
  - reverencie
  - tenga temor de
  lexicon: HALOT
  rationale: El qal imperfecto plural aquí funciona con fuerza exhortativa/jussiva. En español, 'que ... tema' transmite esa llamada colectiva mejor que una forma más explicativa. 'Temor' conserva el peso reverente y no lo reduce a mera deferencia.
- source_word: מֵ֭/יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: La política del proyecto para יְהוָה es usar 'Yahvé' en el texto principal, preservando el nombre divino y evitando el encubrimiento por un título. 'Yahvé' es la forma establecida en este encargo para el Tetragrámaton.
- source_word: כָּל הָ/אָ֑רֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la tierra habitada
  - todo el mundo
  lexicon: HALOT
  rationale: אֶרֶץ aquí tiene alcance universal y no territorial. 'Tierra' en español mantiene el paralelismo con 'los habitantes del mundo' y suena natural sin perder amplitud.
- source_word: מִמֶּ֥/נּוּ
  english_pob_choice: of him
  chosen_spanish: ante él
  alternatives_spanish:
  - de él
  - ante él
  - por él
  lexicon: HALOT
  rationale: Aunque la forma puede reflejar relación con 'de él', en este contexto con גור el sentido idiomático es el de presentarse con temor ante la presencia divina. En español, 'ante él' expresa mejor la orientación del miedo reverente sin introducir una imagen espacial más extraña.
- source_word: יָ֝ג֗וּרוּ
  english_pob_choice: stand in awe
  chosen_spanish: se estremezcan
  alternatives_spanish:
  - se estremezcan
  - tiemblen
  - sientan temor reverente
  lexicon: HALOT
  rationale: גור abarca temor, estremecimiento y reverencia temerosa. Para no duplicar mecánicamente 'tema' y conservar el paralelismo poético, 'se estremezcan' comunica la respuesta afectiva intensa; la nota mantiene la alternativa de 'temor reverente' para la amplitud semántica.
- source_word: כָּל יֹשְׁבֵ֥י תֵבֵֽל
  english_pob_choice: all the inhabitants of the world
  chosen_spanish: todos los habitantes del mundo
  alternatives_spanish:
  - todos los habitantes del mundo
  - todos los que habitan el mundo
  - todos los moradores del mundo
  lexicon: HALOT
  rationale: La construcción participial con תֵבֵל apunta a los moradores de la tierra habitada. 'Habitantes del mundo' es natural en español moderno y conserva la universalidad del paralelismo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  - el Señor
  rationale: Se mantiene el nombre propio divino en español según la directriz del proyecto, porque el texto hebreo contiene explícitamente el Tetragrámaton y el paralelismo poético apoya su presencia visible en la traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de ירא/גור en poesía sapiencial
  english_pob_reading: fear ... stand in awe
  chosen_spanish_reading: tema ... se estremezcan
  alternative_spanish_readings:
  - tema ... teman reverencia
  - tengan temor ... tiemblen
  - reverencien ... se llenen de temor
  rationale: 'La combinación busca conservar el doble matiz: temor reverente y reacción corporal de estremecimiento ante Dios. No se suaviza a mera ''reverencia'', porque el hebreo mantiene una carga de temor real.'
  doctrine_reference: HALOT, ירא; HALOT, גור
translation_notes:
  revision_awareness: 'La redacción sigue el estado de revisión sin cambios del contexto inglés: se conserva el paralelismo poético, el valor exhortativo de los imperfectos y la decisión doctrinal de explicitar el nombre divino. No se introducen ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con la directriz del proyecto para יְהוָה.
  - Se evita 'SEÑOR' como sustituto litúrgico para no ocultar el nombre propio del hebreo.
  - '''Tierra'' y ''mundo'' distinguen bien los dos hemistiquios: totalidad de la tierra / habitantes del mundo.'
  - El segundo hemistiquio varía léxicamente para preservar el paralelismo sin perder el campo semántico de temor reverente.
