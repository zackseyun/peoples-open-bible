translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: No escuchen las palabras de los profetas que les profetizan; ellos los engañan[a]. Hablan una visión de su propio corazón, no de la boca de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «los hacen vanos». El verbo hebreo lleva la idea de causar vacío o vanidad; por extensión, de engañar con algo vacío.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Conserva el nombre divino como 'Yahvé' y vierte צְבָאוֹת con el sentido tradicional y transparente de 'los ejércitos', manteniendo la amplitud del título sin forzar una especificación más estrecha.
- source_word: אַֽל תִּשְׁמְע֞וּ עַל
  english_pob_choice: Do not listen to
  chosen_spanish: No escuchen
  alternatives_spanish:
  - No oigan
  - No hagan caso de
  lexicon: HALOT
  rationale: En este contexto profético, 'escuchar' en español comunica bien la idea de prestar atención obediente o crédula a las palabras de los falsos profetas, sin añadir una paráfrasis excesiva.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - las declaraciones de
  lexicon: HALOT
  rationale: Se conserva el plural y el valor directo del sustantivo hebreo sin reducirlo a una sola noción interpretativa como 'mensaje'.
- source_word: הַנְּבִאִים הַנִּבְּאִים לָכֶם
  english_pob_choice: the prophets who prophesy to you
  chosen_spanish: los profetas que profetizan para ustedes
  alternatives_spanish:
  - los profetas que profetizan a ustedes
  - los profetas que están profetizando para ustedes
  lexicon: HALOT
  rationale: 'Se mantiene el juego de palabras profetas/profetizan y se traduce לָכֶם con un dativo natural en español: ''para ustedes'', que aquí expresa destinatario y beneficio aparente del mensaje.'
- source_word: מַהְבִּלִים
  english_pob_choice: they are deluding you
  chosen_spanish: los están engañando
  alternatives_spanish:
  - los están deludiendo
  - les están dando falsas esperanzas
  - los están llevando a la vanidad
  lexicon: HALOT
  rationale: El verbo hebreo expresa hacer vano, vacío o ilusorio. 'Engañar' comunica de manera clara el efecto de inducir a error en el contexto profético, sin ampliar el sentido más allá de lo sustentado por el texto.
- source_word: חֲזוֹן לִבָּם
  english_pob_choice: a vision of their own heart
  chosen_spanish: una visión de su propio corazón
  alternatives_spanish:
  - una visión de su propio corazón/mente
  - la visión de su propio corazón
  lexicon: HALOT
  rationale: Se preserva la imagen antropológica de 'corazón' como sede interior de pensamiento y voluntad, tal como en el hebreo, en vez de sustituirla por 'mente'.
- source_word: יְדַבֵּרוּ
  english_pob_choice: They speak
  chosen_spanish: Hablan
  alternatives_spanish:
  - Ellos hablan
  - Están hablando
  lexicon: HALOT
  rationale: El presente simple transmite la afirmación general del profeta sobre su actividad habitual.
- source_word: לֹא מִפִּי יְהוָה
  english_pob_choice: not from the mouth of Yahweh
  chosen_spanish: no de la boca de Yahvé
  alternatives_spanish:
  - no de la boca de Yahweh
  - no de parte de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la 'boca' como fuente de la palabra divina, y se mantiene el nombre divino coherente con el resto del versículo.
theological_decisions:
- issue: Tono de la acusación contra los profetas falsos
  english_pob_reading: they are deluding you
  chosen_spanish_reading: ellos los están engañando
  alternative_spanish_readings:
  - ellos los están deludiendo
  - les están dando falsas esperanzas
  rationale: '''Engañar'' capta el sentido polemico y pastoral del texto: los profetas inducen al pueblo a una percepción falsa. Se evita suavizarlo como mera ''ilusión'' o expandirlo a ''falsas esperanzas'', que añade una interpretación no explícita en el hebreo.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de לֵב/לֵבָב en la expresión 'corazón'
  english_pob_reading: their own heart
  chosen_spanish_reading: su propio corazón
  alternative_spanish_readings:
  - su propia mente
  - su interior
  rationale: En la antropología bíblica, 'corazón' incluye pensamiento, deseo y voluntad. Mantener 'corazón' conserva el contraste entre revelación autocreada y palabra procedente de Yahvé.
  doctrine_reference: Translation philosophy §1, §6
- issue: Representación del nombre divino en boca profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue el criterio del proyecto para el nombre divino, sin ocultarlo bajo 'SEÑOR' y manteniendo la transparencia auditiva del texto fuente.
  doctrine_reference: DOCTRINE.md
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del contexto inglés, que sustituyó una paráfrasis más expansiva por 'they are deluding you' para reflejar con más precisión מַהְבִּלִים. En español se optó por 'los están engañando' como equivalente natural y fiel, preservando el contraste con la 'visión de su propio corazón' y la negación final 'no de la boca de Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se conservó 'profetas que profetizan' para reproducir el juego verbal del hebreo.
  - '''Corazón'' se dejó sin reemplazar por ''mente'' para no perder la antropología semítica del texto.'
  - La cláusula final 'no de la boca de Yahvé' preserva la imagen concreta del original y evita abstraer la fuente del discurso.
