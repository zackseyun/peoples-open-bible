translation:
  language: es
  text: Y no hemos obedecido los mandamientos de tu ley, ni los hemos guardado, ni hemos hecho conforme a lo que nos mandaste, para que nos vaya bien[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «nos vaya bien» traduce la idea idiomática del griego ἵνα εὖ ἡμῖν γένηται, que expresa un resultado favorable o bienestar, no necesariamente una fórmula técnica de recompensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολῶν
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: BDAG
  rationale: ἐντολή puede abarcar un mandato autoritativo; en este contexto penitencial, «mandamientos» conserva el registro bíblico y refleja la decisión inglesa revisada para una correspondencia más cercana y formal.
- source_word: νόμου
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: BDAG
  rationale: νόμος aquí designa la ley de Dios como cuerpo normativo. «Ley» es la equivalencia más directa y transparente en español.
- source_word: οὐχ ὑπηκούσαμεν
  english_pob_choice: have not obeyed
  chosen_spanish: no hemos obedecido
  alternatives_spanish:
  - no hemos escuchado
  - no hemos atendido
  lexicon: BDAG
  rationale: ὑπακούω significa obedecer/atender. En una confesión de culpa, «obedecido» expresa mejor la sumisión práctica requerida por el contexto.
- source_word: συνετηρήσαμεν
  english_pob_choice: kept
  chosen_spanish: hemos guardado
  alternatives_spanish:
  - hemos observado
  - hemos conservado
  lexicon: BDAG
  rationale: El verbo compuesto puede significar guardar u observar. «Guardar» mantiene un uso bíblico natural en español y conserva el sentido de fidelidad a mandamientos.
- source_word: ἐποιήσαμεν
  english_pob_choice: done
  chosen_spanish: hemos hecho
  alternatives_spanish:
  - hemos actuado
  - hemos cumplido
  lexicon: BDAG
  rationale: El verbo es amplio. «Hemos hecho» sigue de cerca la forma simple del griego y encaja con la serie confesional del versículo.
- source_word: καθὼς ἐνετείλω ἡμῖν
  english_pob_choice: as you commanded us
  chosen_spanish: conforme a lo que nos mandaste
  alternatives_spanish:
  - como nos mandaste
  - según nos mandaste
  lexicon: BDAG
  rationale: La cláusula compara nuestras acciones con la orden divina. «Conforme a lo que nos mandaste» es idiomático en español y conserva la referencia directa al mandato.
- source_word: ἵνα εὖ ἡμῖν γένηται
  english_pob_choice: so that it might go well with us
  chosen_spanish: para que nos vaya bien
  alternatives_spanish:
  - para que nos fuera bien
  - a fin de que nos vaya bien
  lexicon: BDAG
  rationale: La expresión griega es idiomática y denota resultado benéfico. «Para que nos vaya bien» transmite con naturalidad ese sentido sin exagerar el aspecto causal.
theological_decisions:
- issue: Relación entre obediencia y bienestar/bendición
  english_pob_reading: The final clause states the beneficial purpose/result attached to God's commands without importing a mechanistic theology of merit.
  chosen_spanish_reading: 'La última cláusula se traduce como finalidad/resultado benéfico: «para que nos vaya bien».'
  alternative_spanish_readings:
  - «para que nos fuera bien»
  - «a fin de que nos vaya bien»
  rationale: El griego ἵνα marca propósito o resultado. La traducción conserva la lógica de alianza del texto, sin convertirla en una teoría mecánica de mérito.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La base inglesa pasó de «commands» a «commandments» para ἐντολῶν, buscando una correspondencia más formal; el español adopta «mandamientos» por la misma razón. No se requieren otras expansiones ni notas textuales, pues el resto del versículo mantiene una alineación alta con el griego.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμου y no se sustituye por «instrucción», siguiendo el contexto legal/covenantal.
  - Se usa una secuencia verbal paralela en perfecto compuesto («hemos obedecido... hemos guardado... hemos hecho») para reflejar la confesión comunitaria en primera persona plural.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton; el posesivo «tu» basta para la referencia divina en el contexto.
  - «Mandamientos» y «guardado» conservan un registro bíblico claro sin recurrir a arcaísmos innecesarios.
