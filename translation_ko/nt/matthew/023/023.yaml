  language: ko
  text: 너희에게 화가 있으리니, 서기관들과 바리새인들, 위선자들아! 너희가 박하와 회향과 근채의 십일조는 드리면서, 율법의 더 중한 것들 — 정의와 자비와 믿음 — 은 등한히 합니다. 이것들도 행하면서 저것들도 등한히 하지 않아야 마땅합니다.
  philosophy: optimal-equivalence
