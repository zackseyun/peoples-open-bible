    rationale: Aunque intenta conservar la imagen de salinidad, en español «salina» suele referirse a una explotación salinera o paraje de sal, no necesariamente a un terreno vuelto estéril. El hebreo describe el resultado de transformación hacia una condición salada y yerma; «en un salitral» comunica mejor esa idea.
  - severity: low
    issue: La nota al pie puede conservarse, pero conviene alinearla con un término principal más idiomático
    rationale: La nota actual ya refleja bien las alternativas léxicas documentadas en inglés; solo requiere mantenerse anclada a una traducción principal más clara.
