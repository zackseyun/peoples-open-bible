review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido básico del hebreo: inventario de asnos, total de 30.500, y la porción apartada para Yahvé de 61. También preserva bien el nombre divino Yahvé. Sin embargo, la nota léxica introduce un error grave al ofrecer ''levadura'' como alternativa para מִכְסָם, cuando el sentido es ''tributo'', ''gravamen'' o ''cuota/porción exigida''. Además, en español suena más preciso ''a Yahvé'' que ''para Yahvé'' para el dativo de destino/entrega en esta fórmula.'
  spanish_quality_summary: El texto principal es claro y legible. 'Los asnos' mantiene un registro bíblico sobrio y entendible. '30.500' y '61' encajan con el estilo inventarial. La única mejora estilística recomendada en el texto principal es cambiar 'para Yahvé' por 'a Yahvé', que suena más natural y directo en español para una entrega o tributo. La nota al pie actual debe corregirse porque contiene una alternativa absurda en contexto.
  glossary_alignment: Hay buena alineación con la terminología del proyecto en 'Yahvé'. 'Tributo' es una buena elección para מִכְסָם, con 'leva' o 'gravamen' como alternativas posibles; 'levadura' contradice tanto la evidencia fuente como la justificación léxica documentada. No hay conflicto teológico adicional.
  issues:
  - severity: high
    issue: La nota al pie ofrece 'su levadura' como alternativa para מִכְסָם.
    rationale: מִכְסָם en este contexto se refiere a una porción exigida del botín, no a 'levadura'. La nota desinforma y contradice la evidencia hebrea y la auditoría inglesa, que propone 'their levy'.
  - severity: medium
    issue: '''para Yahvé'' es menos natural que ''a Yahvé'' en esta construcción.'
    rationale: El ל de לַיהוָה marca destinatario/pertenencia de la porción. En español, 'su tributo a Yahvé' expresa mejor la entrega debida que 'para Yahvé', sin perder sentido.
  revised_spanish_text: Los asnos fueron 30.500[a], y su tributo a Yahvé fue 61.
  revised_footnotes:
  - marker: a
    text: O 'su leva'. El término hebreo se refiere a la porción tasada del botín apartada para Yahvé.
    reason: lexical_alternative
  revision_rationale: Se corrige una nota al pie gravemente errónea ('levadura' → 'leva') para alinearla con el hebreo מִכְסָם y con la auditoría inglesa ('levy'). También se ajusta 'para Yahvé' a 'a Yahvé' por mayor naturalidad y precisión en español al expresar el destinatario del tributo. El resto del versículo puede mantenerse.
