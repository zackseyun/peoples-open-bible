translation:
  language: es
  text: Y no desmaye su corazón[b], ni tengan miedo de la noticia[a] que se oye en la tierra; vendrá una noticia en un año, y después, en el año siguiente, otra noticia, y violencia en la tierra, gobernante contra gobernante[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rumor» o «informe» para «noticia» (שְׁמוּעָה). El término hebreo puede referirse a cualquier información que circula, esté o no confirmada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no sea que su corazón se vuelva blando». La expresión significa perder ánimo o desmayar.
    reason: lexical_alternative
  - marker: c
    text: O «gobernante sobre gobernante». La frase puede describir conflicto entre gobernantes o una rápida sucesión de poder.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפֶן
  english_pob_choice: And do not
  chosen_spanish: Y no
  alternatives_spanish:
  - no sea que
  - y no suceda que
  lexicon: HALOT
  rationale: La partícula פן introduce una advertencia negativa. En español, el imperativo prohibitivo 'y no' comunica con naturalidad la fuerza exhortativa del hebreo sin volver la frase pesada.
- source_word: יֵרַךְ לְבַבְכֶם
  english_pob_choice: your heart grow faint
  chosen_spanish: se ablande vuestro corazón
  alternatives_spanish:
  - vuestro corazón desfallezca
  - vuestro corazón se vuelva débil
  lexicon: HALOT
  rationale: El verbo רך transmite la idea de volverse blando o débil. 'Se ablande' conserva la metáfora corporal y el matiz de perder ánimo, sin imponer una interpretación demasiado interpretativa.
- source_word: וְתִירְאוּ
  english_pob_choice: and do not fear
  chosen_spanish: ni temáis
  alternatives_spanish:
  - ni tengáis miedo
  - ni os aterroricéis
  lexicon: HALOT
  rationale: ירא en este contexto expresa temor ante una noticia alarmante. 'Temáis' es directo, bíblicamente transparente y adecuado para español formal.
- source_word: בַּשְּׁמוּעָה הַנִּשְׁמַעַת בָּאָרֶץ
  english_pob_choice: the report heard in the land
  chosen_spanish: el informe oído en la tierra
  alternatives_spanish:
  - la noticia oída en la tierra
  - el reporte oído en la tierra
  - el rumor oído en la tierra
  lexicon: HALOT
  rationale: שְׁמוּעָה puede ser informe, noticia o rumor. 'Informe' es amplio y no presupone falsedad; 'oído en la tierra' mantiene el pasivo/participial hebreo de forma natural en español.
- source_word: וּבָא בַשָּׁנָה הַשְּׁמוּעָה
  english_pob_choice: a report will come in one year
  chosen_spanish: vendrá un informe en un año
  alternatives_spanish:
  - llegará un informe en un año
  - vendrá la noticia en un año
  lexicon: HALOT
  rationale: El hebreo anuncia la llegada de noticias alarmantes en el transcurso del tiempo. 'Vendrá' reproduce bien la idea de irrupción y continuidad del anuncio.
- source_word: וְאַחֲרָיו בַּשָּׁנָה הַשְּׁמוּעָה
  english_pob_choice: and after it in the next year another report
  chosen_spanish: y después de él, en el año siguiente, otro informe
  alternatives_spanish:
  - y después de eso, en el año siguiente, otro informe
  - y tras ello, en el siguiente año, otro informe
  lexicon: HALOT
  rationale: אַחֲרָיו remite al informe anterior. 'Después de él' preserva el pronombre; 'en el año siguiente' explicita la secuencia temporal que el hebreo deja implícita.
- source_word: וְחָמָס בָּאָרֶץ
  english_pob_choice: and violence in the land
  chosen_spanish: y violencia en la tierra
  alternatives_spanish:
  - y violencia en el país
  - y opresión en la tierra
  lexicon: HALOT
  rationale: חָמָס suele designar violencia, injusticia o brutalidad. 'Violencia' es la opción más directa y coherente con el contexto profético de juicio.
- source_word: וּמֹשֵׁל עַל מֹשֵׁל
  english_pob_choice: ruler against ruler
  chosen_spanish: gobernante contra gobernante
  alternatives_spanish:
  - gobernante sobre gobernante
  - un gobernante contra otro gobernante
  lexicon: HALOT
  rationale: עַל puede sugerir 'contra' en un contexto de conflicto o sucesión turbulenta. 'Gobernante contra gobernante' preserva la tensión política que la frase transmite.
theological_decisions:
- issue: El valor de שְׁמוּעָה como noticia/informe/rumor
  english_pob_reading: report; the Hebrew term can denote any circulated tidings, whether confirmed or not.
  chosen_spanish_reading: informe
  alternative_spanish_readings:
  - noticia
  - rumor
  rationale: '''Informe'' mantiene amplitud semántica sin cargar el texto con una connotación de falsedad. En una nota se preserva la posibilidad de ''noticia'' o ''rumor'' para no cerrar el sentido hebreo.'
  doctrine_reference: Lexical/theological note on prophetic tidings
- issue: La imagen idiomática de 'heart grow faint'
  english_pob_reading: Literally 'lest your heart become soft.' The expression means to lose courage or grow fainthearted.
  chosen_spanish_reading: se ablande vuestro corazón
  alternative_spanish_readings:
  - vuestro corazón desfallezca
  - vuestro corazón se vuelva débil
  rationale: La traducción conserva la imagen de 'ablandarse' como metáfora de perder ánimo o coraje. Esto evita sustituirla por una paráfrasis que borre la tensión lexical del hebreo.
  doctrine_reference: Anthropological idiom in Hebrew poetry
- issue: La relación entre 'ruler against ruler' y la posible lectura 'ruler over ruler'
  english_pob_reading: ruler against ruler; the phrase may describe either conflict between rulers or rapid political turnover.
  chosen_spanish_reading: gobernante contra gobernante
  alternative_spanish_readings:
  - gobernante sobre gobernante
  - un gobernante contra otro gobernante
  rationale: '''Contra'' expresa mejor el contexto de conflicto y turbulencia política, pero la nota permite la alternativa ''sobre'' para no eliminar la ambigüedad del hebreo.'
  doctrine_reference: Political upheaval in prophetic judgment
- issue: La forma negativa exhortativa introducida por פן
  english_pob_reading: And do not let your heart grow faint, and do not fear
  chosen_spanish_reading: Y no se ablande vuestro corazón, ni temáis
  alternative_spanish_readings:
  - No sea que se ablande vuestro corazón, ni temáis
  rationale: La forma elegida es idiomática y conserva el tono de advertencia. La alternativa se deja implícita como posibilidad sintáctica, pero el cuerpo principal fluye mejor en español sin perder el valor preventivo.
  doctrine_reference: Hebrew warning construction
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura inglesa revisada por el pase final: mantiene el par de advertencias negativas, la secuencia de dos ‘informes’ sucesivos, y la clausula final de violencia y oposición entre gobernantes. En español se ajustó el orden para lograr fluidez natural sin perder las repeticiones enfáticas del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - '''Informe'' se mantuvo de forma consistente para שְׁמוּעָה, con nota de alternativas semánticas.'
  - '''Gobernante'' se eligió en vez de ''rey'' para no introducir un rango no explicitado por el hebreo.'
