translation:
  language: es
  text: Y Bagoas entró y tocó la cortina de la tienda[a], pues suponía que estaba durmiendo con Judit[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entró y golpeó la colgadura de la tienda». El griego usa términos que también pueden traducirse de manera más formal como «golpeó» y «colgadura de la tienda», pero el texto principal emplea una formulación española más natural para la escena.
    reason: lexical_alternative
  - marker: b
    text: La frase «pues suponía que estaba durmiendo con Judit» refleja la inferencia de Bagoas acerca de Holofernes; el griego no afirma explícitamente más que esa suposición.
    reason: cultural_note
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue dentro
  - ingresó
  lexicon: LSJ
  rationale: El aoristo de εἰσέρχομαι indica entrada al interior; en español, «entró» es natural y fiel, sin añadir matices innecesarios.
- source_word: ἔκρουσε
  english_pob_choice: knocked on
  chosen_spanish: golpeó
  alternatives_spanish:
  - llamó
  - tocó
  lexicon: LSJ
  rationale: El verbo puede significar golpear o tocar para anunciarse. Dado que el inglés POB preservó la amplitud del gesto y el contexto de la cortina, «golpeó» mantiene con claridad la acción física sin forzar una lectura de puerta.
- source_word: αὐλαίαν
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - cortinaje
  - colgadura
  lexicon: LSJ
  rationale: En un contexto de tienda, αὐλαία significa una cortina o colgadura. «Cortina» es la opción más clara y natural en español; evita un tecnicismo que no aporta más precisión aquí.
- source_word: σκηνῆς
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - toldo
  lexicon: LSJ
  rationale: El escenario narrativo es la tienda de Holofernes. «Tienda» conserva el sentido básico del griego y es idiomático en español bíblico; «tienda de campaña» sería más explícito pero algo más largo.
- source_word: ὑπενόειτο
  english_pob_choice: he assumed
  chosen_spanish: suponía
  alternatives_spanish:
  - pensaba
  - infería
  lexicon: LSJ
  rationale: El imperfecto expresa una suposición en curso. «Suponía» reproduce bien ese valor y evita cargar el texto con una certeza que el griego no da.
- source_word: καθεύδειν
  english_pob_choice: was sleeping
  chosen_spanish: estaba durmiendo
  alternatives_spanish:
  - dormía
  - estaba dormido
  lexicon: LSJ
  rationale: En la construcción de discurso indirecto, «estaba durmiendo» suena natural en español y refleja la acción continua de dormir sin reinterpretar el verbo como estado fijo.
- source_word: μετὰ Ἰουδείθ
  english_pob_choice: with Judith
  chosen_spanish: con Judit
  alternatives_spanish:
  - junto con Judit
  - en compañía de Judit
  lexicon: LSJ
  rationale: μετά con genitivo expresa compañía. «Con Judit» conserva la ambigüedad prudente del griego y, como en el inglés POB, deja la inferencia de la situación sin explicitar más de lo que el texto dice.
- source_word: Βαγώας
  english_pob_choice: Bagoas
  chosen_spanish: Bagoas
  alternatives_spanish:
  - Bagoa
  lexicon: Transliteration policy
  rationale: Nombre propio transliterado para mantener la forma histórica y la consistencia del proyecto.
theological_decisions:
- issue: La inferencia de Bagoas sobre Holofernes no está expresada explícitamente como hecho.
  english_pob_reading: The clause 'for he assumed that he was sleeping with Judith' reflects Bagoas's inference about Holofernes; the Greek does not explicitly state more than that assumption.
  chosen_spanish_reading: «pues suponía que estaba durmiendo con Judit» presenta la suposición de Bagoas sin convertirla en afirmación factual.
  alternative_spanish_readings:
  - «pues creía que dormía con Judit»
  - «pues pensaba que estaba con Judit»
  rationale: El texto griego limita la afirmación al plano de la inferencia. La traducción debe conservar esa reserva, evitando hacer explícito algo que el original solo deja supuesto.
  doctrine_reference: Principio de restricción al alcance del texto; fidelidad semántica al valor inferencial de ὑπενόειτο.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el análisis crítico disponible; no se registran revisiones aplicadas ni divergencias relevantes entre el griego de base y la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «Judit» como forma castellana del nombre del personaje.
  - Se evita «SEÑOR» u այլ terminología de sustitución porque el texto no contiene el tetragrámaton ni κύριος.
  - Se usa «tienda» para σκηνή en sentido narrativo, no «tabernáculo».
  - Se preserva la distinción entre el hecho narrado y la inferencia de Bagoas.
