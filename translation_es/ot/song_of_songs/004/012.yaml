review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y las imágenes del hebreo: mantiene la repetición de נָעוּל con ‘cerrado’, conserva ‘mi hermana’ para אֲחֹתִי, distingue ‘manantial’ y ‘fuente’, y traduce חָתוּם como ‘sellada’. Sin embargo, כַלָּה significa ‘novia/esposa desposada/bride’; en este contexto poético y según el rastro inglés, ‘novia’ es menos fiel que ‘esposa’ o mejor ‘amada/esposa’, pero el POB inglés fijó ‘my bride’, por lo que en español la opción más alineada es ‘mi esposa’ o ‘mi prometida’ según contexto. Aquí ‘mi esposa’ suena digna pero puede sugerir estado ya consumado; ‘mi novia’ suena demasiado moderna y menos cultual. ‘Mi prometida’ tampoco encaja del todo. La mejor correspondencia literaria y eclesial es ‘mi novia’ no; se requiere ajuste a ‘mi esposa’ o una formulación equivalente de ‘bride’.'
  spanish_quality_summary: La redacción es clara y poética, pero ‘mi novia’ rebaja el registro y puede sonar demasiado contemporáneo para Cantar. Además, la nota [a] es algo redundante porque ‘cerrado’ ya aparece como principal; conviene formular la alternativa en torno a ‘cerrado con llave’ o ‘atrancado’, manteniendo la relación con ‘locked/shut’. El resto del español es natural y legible.
  glossary_alignment: 'No hay conflictos con los términos globales del proyecto. La principal cuestión léxica es כַלָּה: el borrador usa ‘mi novia’, pero el rastro inglés documenta específicamente ‘my bride’. Para un español bíblico digno y fiel, conviene ‘mi esposa’ como la opción más natural disponible, aunque no sea perfecta; mejora la alineación con el valor nupcial del hebreo mejor que ‘novia’.'
  issues:
  - severity: medium
    issue: כַלָּה se tradujo como ‘mi novia’.
    rationale: El hebreo significa ‘bride’. ‘Novia’ en español actual suele indicar una relación no matrimonial y suena más coloquial; no preserva tan bien el matiz nupcial solemne del original ni la decisión documentada del inglés POB.
  - severity: low
    issue: La nota [a] puede formularse con más precisión.
    rationale: La alternativa principal documentada en inglés es ‘shut’ frente a ‘locked’. En español conviene explicarlo como ‘cerrado con llave’ o simplemente ‘cerrado’ para ambos usos, evitando redundancia confusa.
