translation:
  language: es
  text: Cuando el pecador actuó con arrogancia[a], derribó muros fortificados con arietes[b], y no lo detuviste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras el pecador se ensoberbecía». La construcción griega puede expresarse con valor temporal como «mientras ...», pero en este contexto el español fluye mejor con «cuando ... actuó con arrogancia».'
    reason: alternative_reading
  - marker: b
    text: 'O: «carneros». El griego κριοί puede significar literalmente «carneros», pero aquí el contexto de derribar muros favorece el sentido de «arietes», es decir, máquinas de asedio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῷ ὑπερηφανεύεσθαι
  english_pob_choice: When the sinner acted arrogantly
  chosen_spanish: Cuando el pecador actuó con arrogancia
  alternatives_spanish:
  - Mientras el pecador se ensoberbecía
  - En la soberbia del pecador
  lexicon: LSJ
  rationale: La construcción temporal ἐν τῷ + infinitivo se expresa naturalmente con "cuando" o "mientras". "Actuó con arrogancia" comunica el sentido moral de ὑπερηφανεύεσθαι sin volverlo demasiado interpretativo.
- source_word: τὸν ἁμαρτωλόν
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el impío
  - el hombre pecador
  - el malvado
  lexicon: LSJ
  rationale: El singular se conserva. "Pecador" es el equivalente más directo y mantiene la referencia individual del texto sin añadir matices no explicitados.
- source_word: ἐν κριοῖς
  english_pob_choice: with battering rams
  chosen_spanish: con arietes
  alternatives_spanish:
  - con carneros
  - con máquinas de asedio
  lexicon: LSJ
  rationale: En contexto de asedio, κριοί alude con claridad a arietes. "Arietes" es el término español claro y fiel; se evita "carneros" porque oscurecería el contexto militar.
- source_word: κατέβαλλε
  english_pob_choice: he was tearing down / he tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - iba derribando
  - estaba derribando
  - echó abajo
  lexicon: LSJ
  rationale: El imperfecto griego sugiere acción en curso, pero en español "derribó" funciona bien en un relato breve y preserva la fuerza del verbo sin sonar forzado. Se evita una perífrasis demasiado pesada.
- source_word: τείχη ὀχυρά
  english_pob_choice: fortified walls
  chosen_spanish: muros fortificados
  alternatives_spanish:
  - murallas fortificadas
  - muros fuertes
  - murallas fuertes
  lexicon: LSJ
  rationale: '"Muros fortificados" refleja el valor de ὀχυρά como "fortificados" y mantiene un registro sobrio y bíblico; "murallas" sería posible, pero "muros" sigue de cerca la imagen sin sobreespecificar.'
- source_word: οὐκ ἐκώλυας
  english_pob_choice: you did not stop him
  chosen_spanish: no lo detuviste
  alternatives_spanish:
  - no lo impediste
  - no lo restringiste
  - no lo estorbaste
  lexicon: LSJ
  rationale: '"Detuviste" reproduce bien la idea de impedir o frenar la acción y es idiomático en español. Se evita una formulación más abstracta que debilitaría la inmediatez del reproche.'
translation_notes:
  revision_awareness: El texto griego sitúa ἐν κριοῖς con el verbo principal κατέβαλλε, no con ὑπερηφανεύεσθαι; por eso la nota y la sintaxis españolas colocan «con arietes» junto a «derribó muros fortificados», siguiendo la revisión más reciente del audit trail.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o equivalentes de máscara porque el versículo no contiene el nombre divino.
  - Se conserva el singular de «el pecador» para reflejar la individualización del griego.
  - Se opta por «arietes» como término técnico claro; la nota conserva la alternativa literal «carneros» por fidelidad léxica.
  - No se traduce el imperfecto con perífrasis pesada; se prioriza fluidez sin perder la acción narrativa.
