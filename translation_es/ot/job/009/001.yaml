lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: HALOT
  rationale: ענה funciona aquí como fórmula narrativa de respuesta verbal. En español, «respondió» comunica de manera natural la secuencia dialogal sin forzar un calco de «answered» ni añadir matices ajenos.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  lexicon: convención onomástica bíblica
  rationale: Se conserva el nombre propio por transliteración estándar en español bíblico.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אמר es el verbo básico de habla; en la fórmula «respondió y dijo», «dijo» mantiene el paralelismo hebreo y suena natural en español.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: HALOT
  rationale: La waw conversiva marca continuidad narrativa. «Entonces» conserva el avance de la escena con un español más idiomático que «Y» al inicio de esta respuesta.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden plenamente; no se registran revisiones aplicadas ni cambios de última pasada que afecten esta línea.
  spanish_consistency_notes:
  - Se prefiere «respondió» para ענה en fórmulas de diálogo narrativo.
  - Se mantiene «dijo» para אמר en la expresión fija «respondió y dijo».
  - «Entonces» traduce el valor secuencial de la waw inicial sin perder naturalidad en español.
  - No hay tensión teológica ni variantes textuales relevantes en este versículo.
