review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en casi todos los elementos: קֻרְבַּן como «ofrenda», בְּעִתִּים מְזֻמָּנוֹת como «en tiempos señalados», בִּכּוּרִים como «primicias», y la petición final «acuérdate de mí, Dios mío, para bien». Sin embargo, la nota al pie no preserva la alternativa inglesa «the wood offering», porque repite la misma frase ya usada en el texto en vez de dar una alternativa real. Además, en español suena más natural y preciso «ofrenda de leña» que «ofrenda de la madera» para el suministro cultual destinado al altar/templo.'
  spanish_quality_summary: El español es claro, digno y legible. La única aspereza importante es «la ofrenda de la madera», que resulta algo rígida y menos idiomática que «la ofrenda de leña». También conviene ajustar la nota para que ofrezca una verdadera alternativa lexical y no repita el texto base. El resto del versículo está bien puntuado y suena natural en español bíblico moderno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «primicias» están bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta mantiene la decisión cultual documentada y mejora su naturalidad en español sin apartarse del hebreo ni del audit trail inglés.
  issues:
  - severity: medium
    issue: La expresión «la ofrenda de la madera» es poco idiomática en español.
    rationale: Aunque es comprensible y bastante literal, en contexto cultual español «ofrenda de leña» comunica mejor el suministro programado para el altar/templo, preservando el sentido de הָעֵצִים sin sonar forzado.
  - severity: medium
    issue: La nota al pie no presenta una alternativa real.
    rationale: La nota dice «O “la ofrenda de la madera”», exactamente igual que el texto principal. El audit trail inglés conserva una alternativa léxica real («the wood offering»), y la versión española debe reflejar una alternativa distinta y útil.
  revised_spanish_text: 'Y para la ofrenda de leña[a], en tiempos señalados, y para las primicias: acuérdate de mí, Dios mío, para bien.'
  revised_footnotes:
  - marker: a
    text: O «la ofrenda de madera». El hebreo se refiere al suministro programado de madera para uso del templo.
    reason: lexical_alternative
