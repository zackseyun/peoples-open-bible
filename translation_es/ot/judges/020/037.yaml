review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: la fuerza emboscada actúa con rapidez, se lanza contra la ciudad, avanza y golpea a toda la ciudad con una expresión idiomática de muerte por espada. Sin embargo, hay dos desajustes relevantes: la nota [a] está anclada en el topónimo ''Gabaa'' cuando en realidad corresponde al verbo וַיִּמְשֹׁךְ (''avanzó/dio un paso al frente''), y ''hirió'' debilita el sentido letal del conjunto ''golpeó ... a filo de espada''.'
  spanish_quality_summary: El español es generalmente claro y natural, pero 'los hombres de la emboscada' suena algo rígido; 'los hombres que estaban en emboscada' o similar fluye mejor. Además, 'a filo de espada' es comprensible, pero la formulación más estándar y fiel al inglés auditado y al hebraísmo es 'a filo de la espada'. El topónimo 'Gabaa' es aceptable en tradición bíblica española.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son adecuadas, salvo que conviene fortalecer וַיַּךְ dentro del modismo letal y recolocar la nota lexical_alternative al verbo 'avanzó[a]' en vez del nombre de lugar.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre 'Gabaa' pero explica el verbo וַיִּמְשֹׁךְ.
    rationale: El anclaje de nota debe corresponder exactamente al elemento textual explicado. Tal como está, induce a pensar que la nota trata del topónimo y no del verbo 'avanzó'.
  - severity: medium
    issue: '''Hirió a toda la ciudad'' atenúa el sentido del ataque letal expresado por ''struck ... with the edge of the sword'' / לְפִי חָרֶב.'
    rationale: Aunque וַיַּךְ puede ser amplio, en esta construcción con 'a filo de la espada' el contexto es de matanza, no mera lesión. 'Golpeó' o 'hirió de muerte' preserva mejor el valor sin sobreinterpretar.
  - severity: low
    issue: '''A filo de espada'' suena menos completo que ''a filo de la espada''.'
    rationale: La versión con artículo es más idiomática en registro bíblico-formal y refleja mejor la expresión fijada en la auditoría inglesa ('with the edge of the sword').
  - severity: low
    issue: '''Los hombres de la emboscada'' es algo torpe en español.'
    rationale: Aunque comprensible, una formulación más natural como 'los hombres que estaban en emboscada' conserva el sentido personal-colectivo con mejor fluidez.
  revised_spanish_text: Entonces los hombres que estaban en emboscada se apresuraron y arremetieron contra Gabaa, y la emboscada avanzó[a] y golpeó a toda la ciudad a filo de la espada.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, 'la emboscada se extendió' o 'tiró hacia adelante'; el verbo puede sugerir que la fuerza emboscada se proyectó hacia adelante o que siguió avanzando dentro de la ciudad.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que explique el verbo relevante, se fortaleció 'hirió' a 'golpeó' para concordar mejor con el modismo letal posterior, se ajustó la locución a 'a filo de la espada' por naturalidad y fidelidad, y se mejoró la fluidez de la referencia colectiva a la fuerza emboscada.
