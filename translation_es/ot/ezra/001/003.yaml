translation:
  language: es
  text: Cualquiera de entre todo su pueblo que esté entre ustedes[a], que su Dios esté con él, y suba a Jerusalén, que está en Judá, y reconstruya la casa de Yahvé, el Dios de Israel; él es el Dios[b] que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, '¿Quién entre ustedes es de entre todo su pueblo?'. El hebreo usa מִי con valor indefinido en una proclamación abierta; en español se expresa con mayor naturalidad como 'Cualquiera de entre... que esté entre ustedes'.
    reason: lexical_alternative
  - marker: b
    text: O, 'él es Dios que está en Jerusalén'. El hebreo puede traducirse de manera más tersa, pero el artículo en הָאֱלֹהִים favorece 'el Dios'.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי בָכֶם מִכָּל עַמּוֹ
  english_pob_choice: Whoever among all his people is among you
  chosen_spanish: ¿Quién de entre todo su pueblo está entre ustedes?
  alternatives_spanish:
  - ¿Quién entre ustedes de entre todo su pueblo?
  - Cualquiera de ustedes de entre todo su pueblo
  lexicon: HALOT
  rationale: מִי funciona aquí como una invitación indefinida, no como una pregunta de información. En español, '¿Quién de entre...?' conserva ese valor abierto. 'Su pueblo' mantiene el sufijo de 3ms del hebreo y evita añadir una identificación explícita no expresada en el texto.
- source_word: יְהִי אֱלֹהָיו עִמּוֹ
  english_pob_choice: may his God be with him
  chosen_spanish: Que su Dios esté con él
  alternatives_spanish:
  - Que su Dios sea con él
  - Su Dios esté con él
  lexicon: HALOT
  rationale: El jussivo hebreo pide un valor optativo o desiderativo. 'Que ... esté' expresa bien la bendición o deseo en español natural y digno.
- source_word: וְיַעַל
  english_pob_choice: let him go up
  chosen_spanish: y suba
  alternatives_spanish:
  - y que suba
  - y ascienda
  lexicon: HALOT
  rationale: עלה es el verbo usual para subir a Jerusalén; 'suba' preserva esa imagen geográfica y cultual sin endurecer el español.
- source_word: לִירוּשָׁלַם אֲשֶׁר בִּיהוּדָה
  english_pob_choice: to Jerusalem, which is in Judah
  chosen_spanish: a Jerusalén, que está en Judá
  alternatives_spanish:
  - a Jerusalén, la cual está en Judá
  - a Jerusalén, ubicada en Judá
  lexicon: HALOT
  rationale: La cláusula relativa identifica la Jerusalén de referencia. 'Que está en Judá' es natural en español y mantiene la precisión geográfica.
- source_word: וְיִבֶן
  english_pob_choice: and rebuild
  chosen_spanish: y reconstruya
  alternatives_spanish:
  - y edifique de nuevo
  - y construya otra vez
  lexicon: HALOT
  rationale: Aunque el verbo base significa 'construir', el contexto de retorno del exilio hace explícita la restauración. 'Reconstruya' comunica esa fuerza sin perder la relación con 'construir'.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea 'casa de Yahvé' conforme al criterio del proyecto para el nombre divino. 'Templo' sería posible, pero 'casa' es más literal y coincide con la formulación del texto.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Traducción directa del constructo; mantiene la identificación pactual sin expandir el referente.
- source_word: הוּא הָאֱלֹהִים
  english_pob_choice: he is the God
  chosen_spanish: él es el Dios
  alternatives_spanish:
  - él es Dios
  lexicon: HALOT
  rationale: El artículo en אֱלֹהִים favorece 'el Dios' como opción más formal y precisa, reteniendo la identificación enfática del decreto.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  english_pob_choice: who is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se halla en Jerusalén
  - que vive en Jerusalén
  lexicon: HALOT
  rationale: La cláusula locativa se conserva sin suavizarla. 'Que está en Jerusalén' reproduce de modo claro la formulación antigua centrada en la presencia del Dios del templo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se translitera como 'Yahvé' en vez de enmascararlo como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cláusula locativa final 'él es el Dios que está en Jerusalén'
  english_pob_reading: Retained as written without harmonizing to a broader theological formulation
  chosen_spanish_reading: él es el Dios que está en Jerusalén
  alternative_spanish_readings:
  - él es Dios, que está en Jerusalén
  - él es el Dios—que está en Jerusalén
  rationale: Se mantiene la localización histórica y cultual del enunciado, sin suavizarla ni rearmonizarla. Esto preserva la forma del decreto persa y la tensión teológica documentada en el auditorio inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: la apertura ajustada para reflejar mejor el orden hebreo y la inclusión de ambos elementos (''entre todo su pueblo'' y ''entre ustedes''). La versión española busca conservar esa doble relación sin calcar de modo torpe la sintaxis hebrea. También mantengo la elección del nombre divino como ''Yahvé'' y la cláusula locativa final sin suavizarla.'
  spanish_consistency_notes:
  - Uso 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Conservo 'casa' para בֵּית יְהוָה, no 'templo', porque la metáfora de casa pertenece al texto base.
  - Mantengo 'el Dios' con artículo para הָאֱלֹהִים, siguiendo la precisión formal del audit trail.
  - '''Reconstruya'' expresa el sentido restaurativo sin abandonar el verbo de edificación.'
  - La puntuación con punto y coma separa con claridad el cierre identificador final, en armonía con el ritmo del hebreo.
