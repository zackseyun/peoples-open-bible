lexical_decisions:
- source_word: קֶדֶשׁ
  english_pob_choice: Kedesh
  chosen_spanish: Cedes
  alternatives_spanish:
  - Qedesh
  - Kedés
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista geográfica; en español conviene transliterarlo en una forma legible y estable. «Cedes» refleja la convención española más natural para Kedesh, sin convertir el topónimo en un término común.
- source_word: אֶדְרֶעִי
  english_pob_choice: Edrei
  chosen_spanish: Edrei
  alternatives_spanish:
  - Edreí
  - Edre'i
  lexicon: HALOT
  rationale: También es un nombre propio de lugar. Se conserva la forma breve y reconocible «Edrei», que funciona bien en español y mantiene la transparencia del topónimo.
- source_word: עֵין חָצוֹר
  english_pob_choice: En-hazor
  chosen_spanish: En-Hazor
  alternatives_spanish:
  - Ain Hazor
  - Fuente de Hazor
  - Spring of Hazor
  lexicon: HALOT
  rationale: El hebreo forma un topónimo compuesto. En una lista de ciudades/lugares, mantener el elemento onomástico con «En-» preserva su función de nombre propio; «Hazor» se conserva sin traducir para no perder la identificación geográfica.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: hebrew conjunction waw
  rationale: La conjunción hebrea enlaza cada elemento de la lista. En español, «y» refleja de manera directa esa coordinación repetida.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo y con la auditoría inglesa: una lista breve de tres topónimos coordinados. No hubo revisiones aplicadas en el inglés, y el español conserva esa misma estructura sin añadir interpretación.'
  spanish_consistency_notes:
  - Se mantiene el estilo de lista simple con coordinación repetida por «y», acorde al hebreo.
  - Los nombres propios se transliteran con una grafía española legible, evitando traducirlos como si fueran nombres comunes.
  - La nota conserva la alternativa toponímica y la posibilidad etimológica documentadas en el POB inglés.
