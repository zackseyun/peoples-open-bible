translation:
  language: es
  text: Su abundante cosecha va a los reyes que tú has puesto sobre nosotros por causa de nuestros pecados[a]. Ellos gobiernan sobre nuestros cuerpos y sobre nuestro ganado, como quieren[b], y estamos en gran angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su rendimiento» o «su fruto»; el sufijo se refiere a la tierra mencionada en el versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «nuestras personas»; hebreo «nuestros cuerpos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְבוּאָתָהּ
  english_pob_choice: Its abundant produce
  chosen_spanish: Su abundante fruto
  alternatives_spanish:
  - su rendimiento abundante
  - su cosecha abundante
  - su producción abundante
  lexicon: HALOT
  rationale: תְּבוּאָה se refiere al fruto o producción de la tierra. En español, «fruto» comunica bien el rendimiento de la tierra y suena natural junto con «abundante», sin perder la referencia al producto agrícola del terreno mencionado en el versículo anterior.
- source_word: מַרְבָּה
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - muy grande
  - copioso
  - que crece mucho
  lexicon: HALOT
  rationale: La forma expresa aumento o abundancia. «Abundante» conserva esa idea de plenitud de la cosecha y funciona de manera clara como adjetivo de «fruto».
- source_word: לַמְּלָכִים
  english_pob_choice: to the kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - para los reyes
  - para los gobernantes
  lexicon: HALOT
  rationale: La preposición ל indica dirección o destino. «A los reyes» reproduce bien el movimiento del fruto hacia los reyes y mantiene la imagen de tributación o entrega.
- source_word: אֲשֶׁר נָתַתָּה עָלֵינוּ
  english_pob_choice: whom you have set over us
  chosen_spanish: que tú has puesto sobre nosotros
  alternatives_spanish:
  - que tú has establecido sobre nosotros
  - que tú has colocado sobre nosotros
  - que tú has dado sobre nosotros
  lexicon: HALOT
  rationale: נתן con עַל puede significar designar o poner a alguien sobre otros. «Has puesto sobre nosotros» es natural en español y conserva la agencia divina sin volver opaca la relación de subordinación.
- source_word: בְּחַטֹּאותֵינוּ
  english_pob_choice: because of our sins
  chosen_spanish: por causa de nuestros pecados
  alternatives_spanish:
  - a causa de nuestros pecados
  - por nuestros pecados
  - debido a nuestros pecados
  lexicon: HALOT
  rationale: El valor causal del ב aquí está claro en el contexto. «Por causa de» comunica de modo directo que la sujeción ocurre como juicio por el pecado comunitario.
- source_word: גְּוִיֹּתֵינוּ
  english_pob_choice: our bodies
  chosen_spanish: nuestros cuerpos
  alternatives_spanish:
  - nuestras personas
  - nuestras vidas
  - nuestros cuerpos físicos
  lexicon: HALOT
  rationale: גְּוִיָּה puede significar cuerpo. En este contexto de dominio opresivo junto con el ganado, «nuestros cuerpos» preserva la referencia física, sin convertirla en «cadáveres» ni diluirla en una abstracción.
- source_word: מֹשְׁלִים
  english_pob_choice: They rule
  chosen_spanish: Ellos gobiernan
  alternatives_spanish:
  - Ellos dominan
  - Ellos mandan
  - Ellos gobiernan sobre
  lexicon: HALOT
  rationale: El participio expresa una acción continua de dominio. «Gobiernan» es claro y sobrio en español; en este contexto, con el complemento «sobre nuestros cuerpos», transmite la idea de autoridad ejercida de forma opresiva.
- source_word: וּבִבְהֶמְתֵּינוּ
  english_pob_choice: over our livestock
  chosen_spanish: sobre nuestro ganado
  alternatives_spanish:
  - sobre nuestros animales
  - sobre nuestro ganado y animales
  - sobre nuestras bestias
  lexicon: HALOT
  rationale: בְּהֵמָה aquí designa animales domésticos o ganado. «Ganado» es la opción española más natural y suficientemente amplia para el contexto económico-rural del texto.
- source_word: כִּרְצוֹנָם
  english_pob_choice: as they please
  chosen_spanish: según su voluntad
  alternatives_spanish:
  - como les place
  - a su antojo
  - según su deseo
  lexicon: HALOT
  rationale: La expresión indica ejercicio arbitrario del poder conforme al querer de los gobernantes. «Según su voluntad» conserva ese sentido y mantiene el tono formal del lamento comunitario.
- source_word: וּבְצָרָה גְדוֹלָה אֲנָחְנוּ
  english_pob_choice: we are in great distress
  chosen_spanish: y nosotros estamos en gran angustia
  alternatives_spanish:
  - y nosotros estamos en gran aflicción
  - y estamos en gran angustia
  - y nosotros padecemos gran angustia
  lexicon: HALOT
  rationale: צָרָה denota aflicción, angustia o calamidad. «Gran angustia» mantiene la gravedad del lamento; la forma con «nosotros» conserva el énfasis pronominal del hebreo.
theological_decisions:
- issue: Agencia divina en la dominación extranjera
  english_pob_reading: The verse states that God has set these kings over the people because of their sins, without implying moral approval of the kings' oppression.
  chosen_spanish_reading: El versículo atribuye a Dios haber puesto a esos reyes sobre el pueblo a causa de sus pecados, sin implicar aprobación moral de la opresión que ejercen.
  alternative_spanish_readings:
  - Dios solo permitió que esos reyes gobernaran
  - El texto aprueba todo lo que hacen esos reyes
  rationale: La sintaxis hebrea atribuye la sujeción a la acción judicial de Dios mediante נָתַתָּה עָלֵינוּ. La traducción conserva esa agencia divina y, al mismo tiempo, no añade una aprobación moral de los abusos de los reyes.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el texto fuente y la decisión inglesa quedaron confirmados con alta concordancia, sin observaciones pendientes. Esta versión española sigue esa lectura estable sin introducir ajustes no motivados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece el nombre divino, por lo que no se introduce.
  - Se preserva la distinción entre «cuerpos» y «ganado» para reflejar el paralelismo del hebreo.
  - «Gran angustia» traduce la idea de צָרָה sin suavizar el tono lamentatorio del contexto.
  - La nota [a] se coloca en «fruto» para reflejar la alternativa lexical de תְבוּאָה; la nota [b] se coloca en «cuerpos» para conservar la ambigüedad entre «cuerpos» y «personas».
