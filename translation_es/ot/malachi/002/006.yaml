translation:
  language: es
  text: La ley de la verdad estaba en su boca[a], y no se halló injusticia[b] en sus labios. Caminó conmigo en paz y rectitud, y hizo volver a muchos de la iniquidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la instrucción verdadera estaba en su boca».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ningún mal» o «ninguna injusticia» se halló en sus labios.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hizo que muchos volvieran de su pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת אֱמֶת
  english_pob_choice: the law of truth
  chosen_spanish: la ley de la verdad
  alternatives_spanish:
  - la instrucción verdadera
  - la instrucción de la verdad
  lexicon: HALOT
  rationale: תּוֹרָה puede significar ley, instrucción o enseñanza. Sigo la elección inglesa de conservar el campo semántico de "ley" para mantener el peso pactal y sacerdotal del término, mientras que "de la verdad" preserva el genitivo del hebreo sin volverlo paráfrasis.
- source_word: בְּפִיהוּ
  english_pob_choice: in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - sobre su lengua
  - en su hablar
  lexicon: HALOT
  rationale: La imagen hebrea se conserva de modo directo en español. "En su boca" mantiene el valor idiomático para palabras y enseñanza, sin explicitar más de lo que el texto dice.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - deshonestidad
  - injusticia o injusto proceder
  lexicon: HALOT
  rationale: El término abarca injusticia, mal o falta de rectitud; "injusticia" encaja bien con el contraste ético del versículo y corresponde a la decisión inglesa, sin reducirlo a mera falsedad.
- source_word: נִמְצָא
  english_pob_choice: was found
  chosen_spanish: se halló
  alternatives_spanish:
  - fue encontrada
  - se encontró
  lexicon: HALOT
  rationale: El pasivo resulta natural en español con "se halló", que conserva la idea de hallazgo/resultativo sin sonar forzado. Mantiene la pasiva de la forma niphal.
- source_word: בִשְׂפָתָיו
  english_pob_choice: on his lips
  chosen_spanish: en sus labios
  alternatives_spanish:
  - en su boca
  - en su hablar
  lexicon: HALOT
  rationale: '"Labios" reproduce el idiomatismo hebreo de palabras pronunciadas. Prefiero "en" en vez de "sobre" para un español más natural, sin perder el paralelismo con "boca".'
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: '"Paz" conserva el sentido relacional y de bienestar integral del hebreo, y es la formulación más natural en español para el paralelismo de conducta.'
- source_word: וּבְמִישׁוֹר
  english_pob_choice: and uprightness
  chosen_spanish: y rectitud
  alternatives_spanish:
  - y equidad
  - y lo recto
  - y justicia
  lexicon: HALOT
  rationale: מִישׁוֹר connota rectitud, llaneza, nivelidad y también equidad moral. "Rectitud" comunica bien la conducta moral sin perder el paralelo con "paz".
- source_word: הָלַךְ אִתִּי
  english_pob_choice: he walked with me
  chosen_spanish: caminó conmigo
  alternatives_spanish:
  - anduvo conmigo
  - vivió conmigo
  - anduvo en comunión conmigo
  lexicon: HALOT
  rationale: Conservo el idiomatismo de "caminar con" como expresión de relación y fidelidad pactal. "Caminó conmigo" es natural en español y mantiene la textura teológica del hebreo.
- source_word: וְרַבִּים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - a multitudes
  lexicon: HALOT
  rationale: El hebreo usa un plural simple; el objeto directo en español requiere la preposición personal implícita en este contexto? No; aquí el "a" se añade por régimen del verbo con objeto humano en español, para sonar natural y gramatical.
- source_word: הֵשִׁיב
  english_pob_choice: he turned many back
  chosen_spanish: apartó a muchos
  alternatives_spanish:
  - hizo volver a muchos
  - volvió a muchos
  - hizo que muchos se volvieran
  lexicon: HALOT
  rationale: El hifil de שוב es causativo. "Apartó a muchos" expresa la idea de causar un retorno o separación del mal de manera fluida en español, aunque también deja abierta la noción de "hacer volver" presente en la traducción inglesa.
- source_word: מֵעָוֺן
  english_pob_choice: from iniquity
  chosen_spanish: de la iniquidad
  alternatives_spanish:
  - del pecado
  - de la culpa
  - de la maldad
  lexicon: HALOT
  rationale: עָוֹן puede significar iniquidad, culpa o el castigo de la culpa. Aquí mantiene mejor su fuerza moral como origen del que se aparta a otros; por eso conservo "iniquidad".
theological_decisions:
- issue: Sentido de תּוֹרַת אֱמֶת en contexto sacerdotal
  english_pob_reading: the law of truth, with an allowed alternative of true instruction
  chosen_spanish_reading: la ley de la verdad
  alternative_spanish_readings:
  - la instrucción verdadera
  - la instrucción de la verdad
  rationale: El contexto describe el ideal del sacerdote/Leví como maestro fiel. Sin borrar ese trasfondo, la forma principal mantiene el vínculo con torah y con el peso normativo del texto. La alternativa instrucional se conserva implícitamente, como en el inglés POB.
  doctrine_reference: Translation philosophy §1, §5
- issue: Idiomatismo pactal de "caminar conmigo"
  english_pob_reading: kept 'he walked with me' in the main text
  chosen_spanish_reading: caminó conmigo
  alternative_spanish_readings:
  - anduvo conmigo
  - vivió en comunión conmigo
  - se condujo conmigo
  rationale: La expresión hebrea tiene peso relacional y covenantal. Mantenerla evita reemplazarla por una explicación que diluya su resonancia bíblica; "caminó conmigo" es la forma española más directa y auditable.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y sin cambios necesarios; esta redacción sigue la línea estable del POB inglés, conservando la tensión entre 'ley' e 'instrucción', el idiomatismo de 'caminar conmigo' y el causativo de 'hacer volver' sin añadir interpretación excesiva.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió 'ley' en el cuerpo principal para sostener el valor de torah, con nota alternativa para el matiz de enseñanza.
  - Se usó 'rectitud' para מִישׁוֹר por coherencia con el paralelo poético y para evitar una traducción demasiado abstracta.
  - Los corchetes de notas siguen el orden de aparición requerido y cada marca corresponde a una sola nota.
