revisions:
- from: Líbrame de la sangre[a], oh Dios, Dios de mi salvación[b], y mi lengua cantará con júbilo tu justicia.
  to: Líbrame de la culpa de sangre[a], oh, Dios, Dios de mi salvación, y mi lengua cantará con júbilo tu rectitud[b].
  rationale: Se corrige מִדָּמִים a «culpa de sangre» para seguir la decisión contextual del POB inglés y del hebreo en un salmo penitencial. Se cambia צִדְקָתֶךָ a «tu rectitud» en el texto principal para reflejar la prioridad de «righteousness», dejando «tu justicia» como alternativa en nota. También se ajusta levemente la puntuación del vocativo para un español más natural.
  reviewer_model: gpt-5.4
