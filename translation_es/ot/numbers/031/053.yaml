translation:
  language: es
  text: Los hombres del ejército habían tomado botín, cada uno para sí mismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Los hombres del ejército habían saqueado, cada uno para sí mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - los soldados de
  - la gente de
  lexicon: HALOT
  rationale: El hebreo es un constructo plural de אִישׁ; aquí designa a los varones integrantes de la fuerza militar. «Los hombres de» conserva la relación de constructo y el matiz personal mejor que una paráfrasis más libre.
- source_word: הַצָּבָא
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - la tropa
  - la host de guerra
  lexicon: HALOT
  rationale: צָבָא en contexto narrativo militar puede rendirse como «ejército» en español moderno con plena naturalidad y sin perder el sentido de fuerza militar organizada.
- source_word: בָּזְזוּ
  english_pob_choice: had taken plunder
  chosen_spanish: habían tomado botín
  alternatives_spanish:
  - habían saqueado
  - habían tomado despojo
  lexicon: HALOT
  rationale: El verbo expresa la acción de saquear o tomar botín. «Habían tomado botín» mantiene el valor resultativo y evita una frase más interpretativa que ocultaría el sustantivo implícito.
- source_word: אִישׁ לּוֹ
  english_pob_choice: each ... for himself
  chosen_spanish: cada uno para sí
  alternatives_spanish:
  - cada hombre para sí
  - cada uno individualmente
  lexicon: HALOT
  rationale: La expresión distributiva señala que cada soldado tomó para su propia cuenta. «Cada uno para sí» conserva la fuerza distributiva de modo natural en español.
translation_notes:
  revision_awareness: El inglés POB entiende el hebreo como una afirmación distributiva de apropiación individual de botín. La redacción española sigue esa lectura, conservando el sentido resultativo de בָּזְזוּ y la distribución de אִישׁ לוֹ sin introducir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra terminología teológica no pertinente; el versículo es puramente narrativo-militar.
  - Se prefirió «ejército» a «hueste» por mayor naturalidad en español contemporáneo, sin alterar el referente militar.
  - «Botín» refleja el campo semántico de ביזּוז/saqueo con buena inteligibilidad en español bíblico moderno.
