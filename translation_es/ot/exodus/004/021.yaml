revisions:
- from: 'Entonces Yahvé[a] dijo a Moisés: «Cuando vayas a volver a Egipto, mira todos los prodigios[b] que he puesto en tu mano, y hazlos delante de Faraón. Pero yo endureceré su corazón[c], y no dejará ir al pueblo»'
  to: 'Entonces Yahvé dijo a Moisés: «Cuando vuelvas a Egipto, asegúrate de hacer delante de Faraón todos los prodigios[a] que he puesto en tu mano. Pero yo endureceré su corazón[b], y no dejará ir al pueblo»'
  rationale: Se corrige la cláusula exhortativa para reflejar con fidelidad el valor de רְאֵה y se mejora la naturalidad de la expresión temporal en español. Se conservan las decisiones teológicas y léxicas centrales del borrador, pero se elimina una posible mala lectura en la que Moisés parecería solo 'mirar' los prodigios en vez de asegurarse de realizarlos ante Faraón.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:41:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en gran medida el sentido del hebreo: Yahvé habla a Moisés, le encarga realizar todos los prodigios ante Faraón, y anuncia que endurecerá el corazón de Faraón para que no deje ir al pueblo. También mantiene bien la imagen de ''poner en tu mano'' y la tensión teológica de la acción divina sobre el corazón de Faraón. Sin embargo, hay una omisión significativa del valor exhortativo de רְאֵה con la cláusula siguiente: ''mira todos los prodigios'' suena como si Moisés debiera observarlos, cuando el sentido es ''asegúrate de hacer'' o ''mira que hagas'' todos los prodigios delante de Faraón.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta dos problemas de naturalidad y precisión: ''Cuando vayas a volver a Egipto'' es innecesariamente torpe en español; ''Cuando vuelvas a Egipto'' expresa mejor el hebreo. Además, ''mira todos los prodigios...'' resulta ambiguo y poco natural para el mandato exhortativo; conviene reformularlo como ''asegúrate de hacer delante de Faraón todos los prodigios...'' para reflejar mejor la sintaxis y evitar confusión.'
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: יהוה -> ''Yahvé'', מופתים -> ''prodigios'' con alternativas adecuadas, y el endurecimiento del corazón se mantiene como ''endureceré su corazón''. No hay conflictos de glosario mayores. La revisión propuesta solo ajusta la construcción verbal para mayor fidelidad y naturalidad.'
  issues:
  - severity: high
    issue: Traducción inexacta de רְאֵה
    rationale: El hebreo רְאֵה aquí no significa simplemente 'mira' como acto de ver, sino una exhortación del tipo 'mira que...' / 'asegúrate de...'. La redacción actual cambia el sentido del mandato.
  - severity: medium
    issue: Construcción poco natural 'Cuando vayas a volver a Egipto'
    rationale: Aunque intenta reflejar el movimiento de retorno, en español suena forzada. 'Cuando vuelvas a Egipto' o 'Cuando regreses a Egipto' comunica mejor el valor temporal y direccional sin pérdida semántica.
  - severity: low
    issue: Desajuste menor de marcadores respecto al audit trail inglés
    rationale: Las notas a y b/c contienen el contenido correcto, pero el anclaje español no necesita nota sobre 'Yahvé' en este versículo si no hay ambigüedad local. No es un error grave, pero simplificar las notas mejora el enfoque en las decisiones léxicas realmente debatibles del versículo.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés: «Cuando vuelvas a Egipto, asegúrate de hacer delante de Faraón todos los prodigios[a] que he puesto en tu mano. Pero yo endureceré su corazón[b], y no dejará ir al pueblo»'
  revised_footnotes:
