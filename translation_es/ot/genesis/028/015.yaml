translation:
  language: es
  text: Y he aquí[a], yo estoy contigo, y te guardaré en todo lugar adonde vayas, y te haré volver a esta tierra[c][b]. Porque no te dejaré hasta que haya hecho lo que te he dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira» o «Mira bien».
    reason: alternative_reading
  - marker: b
    text: O «no te abandonaré».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «lo que te he hablado»; algunas traducciones interpretan esto como «lo que te he prometido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Mira
  - Y mira
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva de la partícula hebrea y su tono enfático en el habla divina. «He aquí» es solemne pero natural en español bíblico actual.
- source_word: וּשְׁמַרְתִּיךָ
  english_pob_choice: I will keep you
  chosen_spanish: te guardaré
  alternatives_spanish:
  - te vigilaré
  - te protegeré
  lexicon: HALOT
  rationale: '«Guardar» reproduce bien el campo semántico de שׁמר: cuidar, vigilar y proteger. Mantiene el matiz de vigilancia fiel sin limitarlo solo a protección física.'
- source_word: בְּכֹל אֲשֶׁר תֵּלֵךְ
  english_pob_choice: wherever you go
  chosen_spanish: en todo lugar adonde vayas
  alternatives_spanish:
  - dondequiera que vayas
  - por donde vayas
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; esta solución conserva el alcance total de la promesa y suena natural en español. «Adonde» refleja el movimiento implícito del verbo.
- source_word: וַהֲשִׁבֹתִיךָ
  english_pob_choice: I will bring you back
  chosen_spanish: te haré volver
  alternatives_spanish:
  - te devolveré
  - te traeré de vuelta
  lexicon: HALOT
  rationale: El causativo de שוב exige una expresión causal. «Te haré volver» preserva esa fuerza y evita una formulación mecánica.
- source_word: אֶל הָאֲדָמָה הַזֹּאת
  english_pob_choice: to this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a este suelo
  - a esta tierra misma
  lexicon: HALOT
  rationale: Aunque אֲדָמָה puede ser «suelo/tierra», en este contexto patriarcal la referencia es geográfica y pactal. «Tierra» comunica mejor el sentido del pasaje.
- source_word: לֹא אֶעֱזָבְךָ
  english_pob_choice: I will not leave you
  chosen_spanish: no te dejaré
  alternatives_spanish:
  - no te abandonaré
  - no te forsakearé
  lexicon: HALOT
  rationale: «Dejar» es la opción más amplia y natural en español, y permite conservar la promesa de presencia sin estrecharla. En nota se mantiene la alternativa tradicional de «abandonar/forsake».
- source_word: עָשִׂיתִי
  english_pob_choice: I have done
  chosen_spanish: haya hecho
  alternatives_spanish:
  - haya cumplido
  - haya realizado
  lexicon: HALOT
  rationale: En español, la subordinada con «hasta que» suele pedir subjuntivo perfecto para la meta futura de la acción. Mantiene el valor completivo del perfecto hebreo en esta construcción.
- source_word: אֵת אֲשֶׁר דִּבַּרְתִּי לָךְ
  english_pob_choice: what I have spoken to you
  chosen_spanish: lo que te he hablado
  alternatives_spanish:
  - lo que te he dicho
  - lo que te he hablado/prometido
  lexicon: HALOT
  rationale: El hebreo dice «hablé», no «prometí». «He hablado» permanece más cerca del original, aunque en contexto se trata de una palabra de promesa.
theological_decisions:
- issue: Presencia, protección y fidelidad del pacto
  english_pob_reading: Render the promise in straightforward terms without heightening or narrowing its theological scope beyond the text.
  chosen_spanish_reading: Mantener la promesa en términos directos de presencia, custodia y retorno, sin ampliar ni suavizar su alcance.
  alternative_spanish_readings:
  - volveré contigo
  - te protegeré por completo
  - no te abandonaré jamás
  rationale: El texto presenta la cercanía divina, la custodia continua, el retorno a la tierra y la fidelidad de Dios a su palabra. La redacción española conserva esas notas sin introducir formulaciones doctrinales ajenas ni volver demasiado explícito lo que el hebreo deja implícito.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con el trazo auditado en inglés: conserva el marcado discursivo de וְהִנֵּה, el valor causativo de וַהֲשִׁבֹתִיךָ, la secuencia de promesa-presencia-retorno y la clausula final como «lo que te he hablado», sin pasar a «prometido» en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se elige «guardar» para שׁמר por coherencia con el léxico POB, manteniendo su matiz de cuidado vigilante.
  - «Tierra» traduce aquí אֲדָמָה por el contexto patriarcal y no por una equivalencia material de «suelo».
  - La subordinada con «hasta que» requiere en español una forma completiva en subjuntivo, de ahí «haya hecho».
