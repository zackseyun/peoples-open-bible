review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y las decisiones del audit trail en ἄρχοντες, ἐναντίον τοῦ λαοῦ, ἐκδώσειν τὴν πόλιν y la nota sobre ἐὰν μὴ ἐν αὐταῖς. Sin embargo, hay un problema importante de colocación de la nota: el marcador [a] está anclado en «ella», pero la nota explica «si no en ellas / en estos días», por lo que no corresponde al lugar relevante del texto. Además, «no es recta la palabra» es demasiado calcado y menos natural que «no es correcta» o «no es recto lo que dijeron», y «fueron hacia ella» suena menos natural que «vinieron a ella» o «fueron a verla».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene algunos giros poco naturales: «fueron hacia ella», «no es recta la palabra», y en menor medida «han establecido el juramento que hablaron». La oración larga puede mantenerse, pero conviene suavizarla con formulaciones más idiomáticas sin perder la cercanía al griego. La puntuación y el registro son adecuados.'
  glossary_alignment: 'Hay una desviación del valor por defecto del proyecto para κύριος: el borrador usa «el Señor». Dado que el proyecto pide Yahvé cuando el referente es el Dios de Israel en el texto principal, aquí debe revisarse a «Yahvé», aun cuando el término fuente sea κύριος, explicando que se trata del título griego referido a Dios. El resto del glosario principal está razonablemente alineado.'
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado en «ella» en lugar de la frase «si en estos días».
    rationale: La nota explica la ambigüedad de ἐὰν μὴ ἐν αὐταῖς, no el sintagma «a ella». Esto incumple la disciplina requerida de anclar la nota exactamente donde corresponde.
  - severity: medium
    issue: «el Señor» no sigue la preferencia terminológica del proyecto para el nombre/título divino en el texto principal.
    rationale: Aunque el griego tiene κύριος, la guía del proyecto pide «Yahvé» en el texto principal cuando se refiere al Dios de Israel, salvo excepción documentada; aquí no se documenta una excepción.
  - severity: medium
    issue: «no es recta la palabra que hablaron» suena forzado en español.
    rationale: Preserva demasiado literalmente εὐθύς. En español eclesial natural, «no es correcta la palabra» o «no es recto lo que dijeron» comunica mejor el sentido sin perder fidelidad.
  - severity: low
    issue: «fueron hacia ella» es menos natural que alternativas más idiomáticas.
    rationale: πρὸς αὐτήν aquí expresa movimiento hacia Judith, y en español narrativo bíblico suena mejor «vinieron a ella» o «fueron a verla».
