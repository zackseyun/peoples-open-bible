id: 1PE.3.3
reference: 1 Peter 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὧν ἔστω οὐχ ὁ ἔξωθεν ἐμπλοκῆς τριχῶν καὶ περιθέσεως χρυσίων ἢ ἐνδύσεως ἱματίων κόσμος,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/003.yaml
  text: 'Do not let your adornment be the outward one—braiding of hair, wearing of gold jewelry, or putting on of clothing—'
translation:
  language: ko
  text: '여러분의 단장은 머리를 땋고 금장식을 두르며 옷을 차려입는 외적인 것이 되지 말고,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἔξωθεν ... κόσμος
  english_pob_choice: the outward adornment
  chosen_korean: 외적인 ... 단장
  alternatives_korean:
  - 겉치레의 꾸밈
  - 외형적 장식
  lexicon: BDAG
  rationale: κόσμος는 여기서 「단장·치장」 의미 (3:5의 ἐκόσμουν과 어근 동일). 「단장」으로 옮긴다.
- source_word: ἐμπλοκῆς τριχῶν
  english_pob_choice: braiding of hair
  chosen_korean: 머리를 땋고
  alternatives_korean:
  - 머리 땋기
  - 머리채 엮기
  lexicon: BDAG
  rationale: 1세기 그레코-로만 여성들의 정교한 머리 장식 풍습을 가리킨다. 「머리를 땋다」로 평이하게 옮긴다.
- source_word: περιθέσεως χρυσίων
  english_pob_choice: wearing of gold jewelry
  chosen_korean: 금장식을 두르며
  alternatives_korean:
  - 금붙이를 차며
  - 금장신구를 두름
  lexicon: BDAG
  rationale: περιτίθημι의 「둘러 묶음」 동작을 「두르다」로 옮긴다.
- source_word: ἐνδύσεως ἱματίων
  english_pob_choice: putting on of clothing
  chosen_korean: 옷을 차려입는
  alternatives_korean:
  - 의복을 입는
  lexicon: BDAG
  rationale: 단순히 옷을 입는 것이 아니라 「꾸미는」 의미 (단장의 일부)이므로 「차려입다」로 옮긴다.
