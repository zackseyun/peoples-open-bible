revisions:
- from: Y toda hija que herede una heredad[a] de entre las tribus de los hijos de Israel, será esposa de uno[b] de la familia[c] de la tribu de su padre, para que los hijos de Israel hereden cada uno[d] la heredad de sus padres.
  to: Y toda hija que herede una heredad[a] de entre las tribus de los hijos de Israel será esposa de uno de la clan[c] de la tribu de su padre, para que los hijos de Israel hereden cada uno[d] la heredad de sus padres.
  rationale: Se corrige la nota mal anclada eliminando [b], se restituye la precisión estructural de מִשְׁפָּחָה con ‘clan’ en el texto principal, y se limpia la puntuación. No se requieren cambios doctrinales ni una relectura compleja del hebreo.
