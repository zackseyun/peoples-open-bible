translation:
  language: es
  text: 'Entonces todos los de la asamblea respondieron y dijeron en alta voz[a]: «Sí, conforme a tus palabras, así nos corresponde hacerlo».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En alta voz» conserva la imagen literal de «voz grande» y expresa la respuesta pública y unánime de la asamblea.
    reason: lexical_alternative
  - marker: b
    text: 'O, de manera más idiomática: «Como has dicho, así debemos hacerlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En este contexto narrativo, ענה introduce la réplica colectiva a la exhortación de Esdras. «Respondió» conserva la función discursiva sin añadir matices ajenos; «contestó» sería también posible, pero «respondió» suena más natural en español bíblico contemporáneo.
- source_word: כָל הַקָּהָל
  english_pob_choice: all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la congregación
  lexicon: HALOT
  rationale: קָהָל designa al cuerpo reunido. «Asamblea» conserva ese sentido corporativo y reunido sin desplazarlo hacia una terminología eclesiástica posterior. «Toda» refleja directamente כָל.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijeron
  lexicon: HALOT
  rationale: אָמַר es el verbo ordinario de decir. En español, después de «respondió» en singular colectivo, «dijo» mantiene la frase formulada como una sola respuesta unificada de la asamblea.
- source_word: קוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: en alta voz
  alternatives_spanish:
  - a gran voz
  - con voz fuerte
  lexicon: HALOT
  rationale: La imagen hebrea literalmente es «voz grande». «En alta voz» conserva el carácter idiomático y público de la expresión, con buena naturalidad en español. «A gran voz» también sería posible, pero «en alta voz» resulta más fluido.
- source_word: כֵּן
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Así es
  - Ciertamente
  lexicon: HALOT
  rationale: Aquí כֵּן funciona como asentimiento directo a la exhortación de Esdras. «Sí» expresa mejor esa afirmación inmediata en español que un «así» aislado.
- source_word: כִּדְבָרֶיךָ
  english_pob_choice: according to your words
  chosen_spanish: conforme a tus palabras
  alternatives_spanish:
  - según tus palabras
  - como has dicho
  lexicon: HALOT
  rationale: La forma constructa con sufijo de 2ms es literalmente «según/tomando como norma tus palabras». «Conforme a tus palabras» mantiene la cercanía al hebreo y su tono formal.
- source_word: עָלֵינוּ
  english_pob_choice: it is upon us
  chosen_spanish: nos corresponde
  alternatives_spanish:
  - recae sobre nosotros
  - nos incumbe
  lexicon: HALOT
  rationale: La preposición expresa carga u obligación que descansa sobre los hablantes. En español, «nos corresponde» comunica bien esa obligación sin perder la fuerza de responsabilidad que la imagen hebrea lleva implícita.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacerlo
  alternatives_spanish:
  - cumplirlo
  - llevarlo a cabo
  lexicon: HALOT
  rationale: עָשָׂה es amplio y aquí apunta al cumplimiento concreto de lo dicho. «Hacerlo» preserva la brevedad hebrea y vincula el verbo con lo ya mencionado en el contexto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo, pero ajusta la sintaxis al español para que la afirmación colectiva suene natural: se mantiene la secuencia «respondió y dijo», el asentimiento directo «Sí» y la obligación expresada como «nos corresponde». Se conserva también la imagen de la voz elevada mediante una nota lexical.'
  spanish_consistency_notes:
  - Se usa «asamblea» para קָהָל por coherencia con el sentido de comunidad reunida.
  - Se traduce el verbo de respuesta con «respondió» y no con un término eclesiástico como «replicó» para mantener claridad y sencillez.
  - Se mantiene una formulación sobria para la obligación («nos corresponde») que deja visible la relación con עָלֵינוּ.
  - La voz alta se expresa con «en alta voz», una equivalencia idiomática estándar y publicable en español.
