id: DEU.2.25
reference: Deuteronomy 2:25
source:
  edition: WLC
  text: הַ/יּ֣וֹם הַ/זֶּ֗ה אָחֵל֙ תֵּ֤ת פַּחְדְּ/ךָ֙ וְ/יִרְאָ֣תְ/ךָ֔ עַל פְּנֵי֙ הָֽ/עַמִּ֔ים תַּ֖חַת כָּל הַ/שָּׁמָ֑יִם אֲשֶׁ֤ר יִשְׁמְעוּ/ן֙ שִׁמְעֲ/ךָ֔ וְ/רָגְז֥וּ וְ/חָל֖וּ מִ/פָּנֶֽי/ךָ־־׃
translation:
  text: Today I will begin to put the dread and fear of you on the face of the peoples under all the heavens[b][a], who will hear the report about you and will tremble and writhe because of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who hear your fame' or 'who hear news of you.' The Hebrew expression can refer to a report that produces reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be in anguish' or 'will writhe like a woman in labor.' The Hebrew verb evokes intense bodily distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחֵל תֵּת
  chosen: I will begin to put
  alternatives:
  - I will begin to give
  - I begin to put
  lexicon: HALOT
  rationale: The Hiphil of חלל with the infinitive construct of נתן forms an idiom meaning 'begin to give/put.' 'Put' fits the English collocation with dread and fear falling upon peoples.
- source_word: פַּחְדְּךָ
  chosen: the dread of you
  alternatives:
  - your dread
  - terror of you
  lexicon: HALOT
  rationale: 'פחד denotes dread/terror. ''The dread of you'' preserves the objective sense: dread caused by Israel, not Israel''s own fear.'
- source_word: וְיִרְאָתְךָ
  chosen: and fear of you
  alternatives:
  - and the fear of you
  - and terror of you
  lexicon: HALOT
  rationale: יראה here parallels פחד. Rendering both terms distinctly as 'dread and fear' preserves the Hebrew pairing without collapsing them into one English word.
- source_word: עַל פְּנֵי הָעַמִּים
  chosen: on the face of the peoples
  alternatives:
  - before the peoples
  - upon the peoples
  lexicon: HALOT
  rationale: Literally 'on the face of the peoples.' This idiom can be smoothed as 'upon the peoples,' but retaining 'on the face of' preserves the Hebrew image while remaining intelligible.
- source_word: תַּחַת כָּל הַשָּׁמָיִם
  chosen: under all the heavens
  alternatives:
  - under the whole heaven
  - under all heaven
  lexicon: HALOT
  rationale: The plural 'heavens' reflects the Hebrew form and is a common biblical idiom for the whole world under heaven.
- source_word: אֲשֶׁר יִשְׁמְעוּן שִׁמְעֲךָ
  chosen: who will hear the report about you
  alternatives:
  - who hear your fame
  - who hear news of you
  lexicon: HALOT
  rationale: שֵׁמַע/שִׁמְעַ can denote report, news, or fame. 'Report about you' is broad enough to include reputation formed by what they hear, without importing a more interpretive 'fame' into the main text.
- source_word: וְרָגְזוּ
  chosen: and will tremble
  alternatives:
  - and will quake
  - and will be agitated
  lexicon: HALOT
  rationale: The verb conveys shaking, quaking, or agitation in fear. 'Tremble' is natural English in this context.
- source_word: וְחָלוּ
  chosen: and writhe
  alternatives:
  - and be in anguish
  - and be in labor pains
  lexicon: HALOT
  rationale: The verb can denote writhing, especially like labor pains, or being in anguish. 'Writhe' preserves the vivid bodily image without over-specifying childbirth in the main text.
- source_word: מִפָּנֶיךָ
  chosen: because of you
  alternatives:
  - before you
  - from before you
  lexicon: HALOT
  rationale: Literally 'from before your face/presence.' In context it expresses the cause of their terror. 'Because of you' gives the sense clearly in modern English.
