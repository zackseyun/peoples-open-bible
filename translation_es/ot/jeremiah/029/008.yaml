translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos[a], Dios de Israel: No permitan que sus profetas que están entre ustedes y sus adivinos los engañen, y no escuchen los sueños[b] que ustedes sueñan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo צְבָאוֹת puede abarcar huestes celestiales y ejércitos terrenales.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea es difícil y puede referirse a sueños que el pueblo mismo está soñando o a sueños que de algún modo está fomentando o provocando.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma española habitual en este proyecto, 'Yahvé', en vez de sustituirlo por un título. Esto sigue el valor covenantal del nombre en el hebreo original.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: '''צְבָאוֹת'' se refiere a huestes/ejércitos; en español, ''de los ejércitos'' es claro y natural, y evita el calco menos transparente ''de los hosts''.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la identificación de pacto sin sobrecargar la frase; en español, la aposición 'Dios de Israel' es idiomática y fiel al constructo hebreo.
- source_word: אַל יַשִּׁיאוּ לָכֶם
  english_pob_choice: Do not let your prophets... deceive you
  chosen_spanish: No permitan que... los engañen
  alternatives_spanish:
  - No dejen que... los engañen
  - No permitan que... los seduzcan
  lexicon: HALOT
  rationale: El hifil de נשׁא tiene fuerza causativa de engañar/desviar. 'Engañen' reproduce bien esa relación causal y resulta natural en español.
- source_word: נְבִיאֵיכֶם אֲשֶׁר בְּקִרְבְּכֶם
  english_pob_choice: your prophets who are among you
  chosen_spanish: sus profetas que están entre ustedes
  alternatives_spanish:
  - sus profetas que están en medio de ustedes
  - sus profetas en medio de ustedes
  lexicon: HALOT
  rationale: '''Entre ustedes'' expresa el sentido relacional de presencia dentro de la comunidad exílica sin sonar arcaico; conserva la tensión de que son profetas del propio grupo, no externos.'
- source_word: וְקֹסְמֵיכֶם
  english_pob_choice: your diviners
  chosen_spanish: sus adivinos
  alternatives_spanish:
  - sus adivinos
  - sus hechiceros
  lexicon: HALOT
  rationale: '''קֹסְמִים'' designa practicantes de adivinación. ''Adivinos'' es el equivalente directo y sobrio en español; ''hechiceros'' introduciría una connotación distinta.'
- source_word: וְאַל תִּשְׁמְעוּ אֶל
  english_pob_choice: and do not listen to
  chosen_spanish: y no escuchen
  alternatives_spanish:
  - y no hagan caso de
  - y no atiendan a
  lexicon: HALOT
  rationale: '''שׁמע אֶל'' puede ser ''escuchar/atender a''. ''No escuchen'' mantiene la forma breve y la prohibición en un español claro y bíblico.'
- source_word: חֲלֹמֹתֵיכֶם
  english_pob_choice: your dreams
  chosen_spanish: los sueños
  alternatives_spanish:
  - sus sueños
  - los sueños de ustedes
  lexicon: HALOT
  rationale: Se traduce el sustantivo de manera directa; el posesivo implícito ya queda reforzado por el contexto y por la cláusula siguiente.
- source_word: אֲשֶׁר אַתֶּם מַחְלְמִים
  english_pob_choice: the dreams that you dream
  chosen_spanish: que ustedes sueñan
  alternatives_spanish:
  - que ustedes están soñando
  - que ustedes mismos sueñan
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el audit trail inglés prefirió la lectura natural 'the dreams that you dream'. En español, 'que ustedes sueñan' conserva la relación semántica sin forzar una construcción extraña.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto y no se sustituye por una máscara litúrgica. 'Yahvé' es la forma estable del proyecto para el Tetragrámaton y corresponde al mismo principio doctrinal que el POB inglés con 'Yahweh'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El POB inglés revisó la clausula final desde una forma más literal y enrevesada ('the dreams that you are causing to be dreamed') hacia 'the dreams that you dream'. Esta traducción española sigue esa revisión y evita tanto el calco pesado como la simplificación excesiva, manteniendo la dificultad del hebreo solo en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al criterio general del proyecto.
  - Se prefiere 'adivinos' para קֹסְמִים en línea con el valor léxico de adivinación.
  - '''Entre ustedes'' conserva una lectura comunitaria natural de בְּקִרְבְּכֶם.'
  - Se mantiene la segunda persona plural de forma consistente en toda la advertencia.
  - La nota sobre los sueños preserva la ambigüedad documentada en el audit trail inglés.
