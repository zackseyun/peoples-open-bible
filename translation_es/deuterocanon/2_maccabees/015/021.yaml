translation:
  language: es
  text: Cuando Maccabeo vio la presencia de las multitudes, la variada disposición de las armas y la ferocidad de las bestias[a] colocadas en posición favorable, extendió las manos hacia el cielo e invocó al Señor obrador de prodigios[b], sabiendo que la victoria no se obtiene por las armas, sino que, cuando él lo juzga justo, la concede a los dignos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Las bestias» probablemente se refiere a elefantes de guerra en el contexto, aunque el griego aquí dice solo «bestias».
    reason: cultural_note
  - marker: b
    text: 'O: «Señor milagroso»; también, «Señor que hace prodigios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδών
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - observó
  - tomó nota de
  lexicon: BDAG
  rationale: El participio presenta la evaluación que hace Maccabeo del campo de batalla. «Vio» es natural en español y conserva la percepción inmediata del cuadro, sin perder la idea de comprensión implícita.
- source_word: παρουσίαν
  english_pob_choice: presence
  chosen_spanish: presencia
  alternatives_spanish:
  - llegada
  - venida
  - números
  lexicon: BDAG
  rationale: En este contexto se refiere a la presencia del ejército enemigo como masa reunida. «Presencia» sigue de cerca el griego y evita reducirlo solo a número o cantidad.
- source_word: πλήθων
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las masas
  - los muchedumbres
  - las fuerzas
  lexicon: BDAG
  rationale: El plural apunta a grupos reunidos en gran número. «Multitudes» expresa bien la magnitud del hostil contingente y su efecto intimidante.
- source_word: ποικίλην παρασκευήν
  english_pob_choice: the varied array
  chosen_spanish: la variada disposición
  alternatives_spanish:
  - el diverso equipo
  - la preparación variada
  - la preparación elaborada
  lexicon: BDAG
  rationale: La expresión puede abarcar preparación o equipo. «Variada disposición» conserva la idea de diversidad visible y de ordenamiento militar sin forzar una sola lectura técnica.
- source_word: τῶν ὅπλων
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - las armas de guerra
  - los armamentos
  lexicon: BDAG
  rationale: ὅπλα se refiere aquí al equipo bélico. «Armas» es el equivalente más directo y natural en español.
- source_word: θηρίων
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las bestias de guerra
  lexicon: BDAG
  rationale: El griego dice simplemente «bestias»; en contexto probablemente alude a elefantes de guerra, pero el texto no lo explicita. Se conserva el término general para no adelantar una identificación no expresada en el griego.
- source_word: ἐπὶ μέρος εὔκαιρον
  english_pob_choice: positioned advantageously
  chosen_spanish: colocadas en posición favorable
  alternatives_spanish:
  - puestas estratégicamente
  - situadas ventajosamente
  - desplegadas oportunamente
  lexicon: BDAG
  rationale: La frase indica una ubicación táctica adecuada. «En posición favorable» comunica la ventaja militar de manera clara y fiel.
- source_word: ἀγριότητα
  english_pob_choice: savagery
  chosen_spanish: ferocidad
  alternatives_spanish:
  - salvajismo
  - fiereza
  - ferocidad salvaje
  lexicon: BDAG
  rationale: El sustantivo enfatiza la brutalidad amenazante de las bestias. «Ferocidad» transmite bien ese matiz en un español digno y fluido.
- source_word: ἀνατείνας χεῖρας εἰς τὸν οὐρανόν
  english_pob_choice: he stretched out his hands to heaven
  chosen_spanish: extendió las manos hacia el cielo
  alternatives_spanish:
  - levantó las manos al cielo
  - alzó las manos hacia el cielo
  lexicon: BDAG
  rationale: Se trata de un gesto convencional de oración. «Extendió las manos hacia el cielo» mantiene la imagen corporal del griego y sugiere la súplica sin agregar elementos ajenos.
- source_word: τερατοποιὸν
  english_pob_choice: wonder-working
  chosen_spanish: obrador de prodigios
  alternatives_spanish:
  - milagroso
  - hacedor de maravillas
  - obrador de maravillas
  lexicon: LSJ
  rationale: El adjetivo describe al Señor como quien realiza hechos extraordinarios. «Obrador de prodigios» preserva el tono elevado y evita una paráfrasis demasiado libre.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino en una invocación. «Señor» es la forma española reverente y tradicionalmente inteligible para ese uso.
- source_word: περιποιεῖται τὴν νίκην
  english_pob_choice: he grants it
  chosen_spanish: la concede
  alternatives_spanish:
  - la otorga
  - la procura
  - asegura la victoria
  lexicon: BDAG
  rationale: El verbo expresa otorgar o procurar para alguien. «La concede» evita repetir «victoria» y mantiene la idea de don o concesión divina.
- source_word: τοῖς ἀξίοις
  english_pob_choice: to those who are worthy
  chosen_spanish: a los dignos
  alternatives_spanish:
  - a los que son dignos
  - a los merecedores
  - a los que son dignos de ella
  lexicon: BDAG
  rationale: El dativo plural señala a personas consideradas dignas. «A los dignos» es breve y natural, aunque se deja abierta la pregunta de en qué consiste esa dignidad.
- source_word: καθὼς δὲ ἐὰν αὐτῷ κριθῇ
  english_pob_choice: whenever it is judged right by him
  chosen_spanish: cuando él lo juzga justo
  alternatives_spanish:
  - según le parezca bien
  - si él así lo decide
  - como le sea juzgado
  lexicon: BDAG
  rationale: La construcción expresa la discreción soberana de Dios en conceder la victoria. «Cuando él lo juzga justo» conserva la referencia al juicio divino sin resolver la tensión entre justicia, voluntad y concesión.
theological_decisions:
- issue: Agencia divina en la victoria
  english_pob_reading: Victory is granted by the Lord according to his judgment, not secured by weapons alone.
  chosen_spanish_reading: La victoria no se obtiene por las armas, sino que depende de la concesión del Señor conforme a su juicio.
  alternative_spanish_readings:
  - La victoria viene solo por intervención milagrosa del Señor.
  - La victoria se logra por mérito de los dignos en un sentido mecánico.
  rationale: El griego contrasta las armas con la acción soberana del Señor. La traducción debe preservar que la victoria no procede del poder bélico, pero tampoco debe convertir la frase en una afirmación más rígida de lo que el texto dice sobre mérito o sobre exclusión absoluta de medios humanos.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla; κύριος → Señor'
- issue: Posible referencia a animales de guerra
  english_pob_reading: The beasts likely refers to war elephants in context, though the Greek here says only "beasts."
  chosen_spanish_reading: «Bestias» se conserva sin especificar elefantes, aunque el contexto probablemente alude a animales de guerra.
  alternative_spanish_readings:
  - elefantes de guerra
  - animales de guerra
  rationale: El griego no nombra elefantes; introducirlos en el texto principal iría más allá de la evidencia verbal. La ambigüedad contextual puede señalarse en nota sin alterar la lectura base.
  doctrine_reference: 'Principio POB: mantener la evidencia lexical del original y no sobreespecificar el referente contextual'
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; se conserva su lectura de victoria concedida por el Señor y la nota contextual sobre las bestias. La versión española sigue esa misma línea, sin introducir en el cuerpo del texto una identificación explícita de elefantes ni una idea mecanicista de mérito.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la invocación divina, coherente con el uso reverente del título.
  - «Armas» y «victoria» conservan el contraste bélico del original sin reforzarlo indebidamente.
  - «A los dignos» reproduce la brevedad del dativo plural y deja abierta la evaluación implícita del criterio divino.
  - La nota sobre «bestias» evita resolver en el texto principal una identificación contextual que el griego no explicita.
