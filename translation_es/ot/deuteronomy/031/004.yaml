revisions:
- from: Y Yahvé hará con ellos como hizo con Sihón y con Og[a], los reyes de los amorreos, y con su tierra, la cual destruyó.
  to: Y Yahvé les hará lo mismo que hizo con Sihón y con Og[a], los reyes de los amorreos, y con su tierra, que destruyó.
  rationale: Se mejora la naturalidad del español con 'les hará lo mismo que hizo', se conserva la fidelidad al hebreo y al audit trail inglés, y se corrige la nota para que preserve la alternativa sintáctica real documentada.
  reviewer_model: gpt-5.4
