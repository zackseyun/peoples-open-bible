theological_decisions:
- issue: Discipline imagery and whether to soften corporal language
  chosen_reading: Retain explicit disciplinary image as 'the whip'
  alternative_readings:
  - discipline
  - correction
  - punishment
  rationale: The Greek explicitly uses μάστιγες, an image of whipping/scourging. Softening to an abstract term would obscure the source text's severity. The translation preserves the text's moral tension without endorsing or expanding it.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic masculine proverb
  chosen_reading: Use 'He who loves his son'
  alternative_readings:
  - Whoever loves his son
  - The one who loves his son
  rationale: The Greek is masculine singular and refers specifically to a son. The translation keeps the gendered form rather than neutralizing it, consistent with the project's gender-accurate policy.
  doctrine_reference: Translation philosophy §4
