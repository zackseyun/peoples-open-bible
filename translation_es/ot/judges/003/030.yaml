revisions:
- from: Así Moab fue subyugado[a][b] aquel día, y la tierra tuvo reposo[c] durante ochenta años.
  to: Así Moab quedó sometido bajo la mano de Israel[a][b], aquel día; y la tierra tuvo reposo[c] durante ochenta años.
  rationale: La revisión restituye en el texto principal el modismo hebreo תַּחַת יַד יִשְׂרָאֵל, en línea con la decisión auditada en inglés y con la fidelidad al original. Se ajusta además la redacción a un español más natural ('quedó sometido') y se limpia la nota explicativa. Se mantienen las alternativas léxicas documentadas para 'aquel día' y 'tuvo reposo'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:52:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español comunica correctamente la estructura y el sentido básico del hebreo: Moab quedó sometido, esto ocurrió aquel día, y la tierra disfrutó de un período prolongado de calma. Sin embargo, omite en el texto principal la frase idiomática תַּחַת יַד יִשְׂרָאֵל (''bajo la mano de Israel''), que el English POB decidió conservar en el texto principal por su valor imagístico y semántico, explicándola además en nota. En español también puede preservarse con naturalidad suficiente.'
  spanish_quality_summary: El español es claro y legible. 'Fue subyugado' y 'tuvo reposo' son comprensibles y dignos. No obstante, la colocación actual desplaza al texto principal un elemento importante del original hacia una nota, y 'bajo la mano de Israel' es aceptable en español bíblico moderno si se acompaña de nota explicativa. También conviene quitar las comillas simples sobrantes en la nota b.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales son en general adecuadas: ''Moab'', ''aquel día'', ''la tierra'', ''durante ochenta años''. La principal desalineación es metodológica con la decisión auditada para תַּחַת יַד יִשְׂרָאֵל: debe mantenerse en el texto principal, no solo en nota. ''Subyugado'' es posible, pero ''sometido'' suena más natural con ''bajo la mano de Israel'' en español sin perder fuerza político-militar.'
  issues:
  - severity: medium
    issue: La frase 'bajo la mano de Israel' fue omitida del texto principal.
    rationale: El hebreo incluye explícitamente תַּחַת יַד יִשְׂרָאֵל, y el English POB la conserva en el cuerpo del versículo por su importancia idiomática. Dejarla solo en nota debilita la fidelidad formal y la imaginería del original.
  - severity: low
    issue: La nota b tiene puntuación/formatación poco natural.
    rationale: Empieza con una comilla simple innecesaria antes de 'Hebreo'. Debe normalizarse el estilo tipográfico en español.
  - severity: low
    issue: '''Subyugado'' es correcto pero algo menos natural que ''sometido'' en esta construcción.'
    rationale: Con la restauración de 'bajo la mano de Israel', 'fue sometido bajo la mano de Israel' o mejor 'quedó sometido bajo la mano de Israel' fluye mejor en español bíblico moderno y mantiene el sentido político-militar.
  revised_spanish_text: Así Moab quedó sometido bajo la mano de Israel[a][b], aquel día; y la tierra tuvo reposo[c] durante ochenta años.
  revised_footnotes:
  - marker: a
    text: O «en aquel día».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo la mano de Israel», un modismo para quedar bajo el poder de Israel.'
    reason: cultural_note
  - marker: c
    text: O «estuvo quieta» o «estuvo en paz».
    reason: lexical_alternative
  revision_rationale: La revisión restituye en el texto principal el modismo hebreo תַּחַת יַד יִשְׂרָאֵל, en línea con la decisión auditada en inglés y con la fidelidad al original. Se ajusta además la redacción a un español más natural ('quedó sometido') y se limpia la nota explicativa. Se mantienen las alternativas léxicas documentadas para 'aquel día' y 'tuvo reposo'.
