  text: וְ/רָאָה֩ הַ/כֹּהֵ֨ן אֶת הַ/נֶּ֜תֶק בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֗י וְ֠/הִנֵּה לֹא פָשָׂ֤ה הַ/נֶּ֨תֶק֙ בָּ/ע֔וֹר וּ/מַרְאֵ֕/הוּ אֵינֶ֥/נּוּ עָמֹ֖ק מִן הָ/ע֑וֹר וְ/טִהַ֤ר אֹת/וֹ֙ הַ/כֹּהֵ֔ן וְ/כִבֶּ֥ס בְּגָדָ֖י/ו וְ/טָהֵֽר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/034.yaml
  text: Then the priest shall examine the scaly infection on the seventh day[a], and if the scaly infection has not spread in the skin and its appearance is not deeper than the skin, the priest shall pronounce him clean[c][b]. He shall wash his clothes and be clean.
  footnotes:
  - marker: a
    text: Or 'itch' or the traditional 'scall' for the specific skin condition denoted by Hebrew neṭeq.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not deeper than the skin,' a standard priestly criterion indicating the affected area does not appear sunken below the surrounding skin.
    reason: cultural_note
  - marker: c
    text: Hebrew 'the priest shall make him clean' here means an official declaration of clean status, not that the priest medically cures the condition.
    reason: alternative_reading
