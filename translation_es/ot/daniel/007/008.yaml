translation:
  language: es
  text: Yo estaba observando los cuernos, y he aquí, otro cuerno, pequeño, se levantó entre ellos; y tres de los primeros cuernos fueron arrancados de delante de él. Y he aquí, en este cuerno había ojos como los ojos de un hombre[a], y una boca que hablaba grandes cosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ojos como ojos humanos».
    reason: lexical_alternative
  - marker: b
    text: O «una boca que hablaba jactancias» o «que profería grandes jactancias».
    reason: alternative_reading
lexical_decisions:
- source_word: מִשְׂתַּכַּל הֲוֵית
  english_pob_choice: I was considering
  chosen_spanish: Yo estaba observando
  alternatives_spanish:
  - Yo estaba considerando
  - Yo seguía mirando
  lexicon: HALOT
  rationale: El participio con la auxiliar expresa acción continua en el pasado. «Estaba observando» conserva esa continuidad y suena natural en español; «considerando» es posible, pero en español puede sonar más mental que visual, mientras que la escena es visionaria.
- source_word: בְּקַרְנַיָּא
  english_pob_choice: the horns
  chosen_spanish: los cuernos
  alternatives_spanish:
  - los cuernos determinados
  - esos cuernos
  lexicon: HALOT
  rationale: El plural determinado apunta a los cuernos ya presentes en la visión. «Los cuernos» es la forma natural y fiel en español.
- source_word: וַאֲלוּ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula introduce un giro vívido y solemne en la visión. «He aquí» preserva mejor el tono apocalíptico que una opción coloquial.
- source_word: קֶרֶן אָחֳרִי זְעֵירָה
  english_pob_choice: another horn, a little one
  chosen_spanish: otro cuerno, pequeño
  alternatives_spanish:
  - otro cuerno, un cuerno pequeño
  - otro cuerno, uno pequeño
  lexicon: HALOT
  rationale: «Otro» refleja אָחֳרִי y «pequeño» refleja זְעֵירָה. Mantengo la secuencia apposicional sin imponer todavía el rótulo técnico «cuerno pequeño» como título fijo en el cuerpo principal.
- source_word: סִלְקָת
  english_pob_choice: came up
  chosen_spanish: se levantó
  alternatives_spanish:
  - subió
  - apareció
  lexicon: HALOT
  rationale: En el contexto de cuernos que emergen, «se levantó» conserva la imagen y es idiomático en español bíblico sin sonar mecánico.
- source_word: ביניהון
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - entre medio de ellos
  lexicon: HALOT
  rationale: Con un antecedente plural, «entre ellos» es la equivalencia natural en español y mantiene la relación espacial de la visión.
- source_word: וּתְלָת מִן קַרְנַיָּא קַדְמָיָתָא
  english_pob_choice: three of the first horns
  chosen_spanish: tres de los primeros cuernos
  alternatives_spanish:
  - tres de los cuernos anteriores
  - tres de los cuernos de antes
  lexicon: HALOT
  rationale: «Primeros» traduce bien el valor secuencial de קַדְמָיָתָא. «Antiguos» sería demasiado interpretativo y «anteriores» es posible, pero menos compacto.
- source_word: אתעקרו
  english_pob_choice: were uprooted
  chosen_spanish: fueron arrancados
  alternatives_spanish:
  - fueron desarraigados
  - fueron arrancados de raíz
  lexicon: HALOT
  rationale: El verbo expresa remoción violenta. «Arrancados» transmite la fuerza del hebreo/arameo sin necesidad de alargarlo; «desarraigados» sería más explícito, pero menos directo en español actual.
- source_word: מִן קדמי/ה
  english_pob_choice: before it
  chosen_spanish: de delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: La frase puede expresar posición delante de algo. «De delante de él» conserva mejor la orientación espacial y la idea de desplazamiento respecto al cuerno.
- source_word: עַיְנִין כְּעַיְנֵי אֲנָשָׁא
  english_pob_choice: eyes like the eyes of a man
  chosen_spanish: ojos como ojos de hombre
  alternatives_spanish:
  - ojos como ojos humanos
  - ojos como los de un hombre
  lexicon: HALOT
  rationale: Conserva la comparación literal y la forma breve del original. «Hombre» mantiene el paralelismo con el texto fuente; la lectura más general «humanos» queda recogida en la nota.
- source_word: בְּקַרְנָא דָא
  english_pob_choice: in this horn were
  chosen_spanish: en este cuerno había
  alternatives_spanish:
  - en este cuerno estaban
  - este cuerno tenía
  lexicon: HALOT
  rationale: La construcción presenta los rasgos como presentes «en» el cuerno. «Había» mantiene la imaginería sin convertirla en mera posesión.
- source_word: וּפֻם מְמַלִּל רַבְרְבָן
  english_pob_choice: and a mouth speaking great things
  chosen_spanish: y una boca que hablaba grandes cosas
  alternatives_spanish:
  - y una boca que hablaba cosas grandes
  - y una boca hablando grandes cosas
  lexicon: HALOT
  rationale: «Grandes cosas» mantiene la literalidad del arameo y preserva la tensión entre grandeza y posible jactancia. No se resuelve interpretativamente en el cuerpo principal.
theological_decisions:
- issue: Si רַבְרְבָן debe interpretarse como habla arrogante o blasfema
  english_pob_reading: great things
  chosen_spanish_reading: grandes cosas
  alternative_spanish_readings:
  - cosas jactanciosas
  - grandes jactancias
  rationale: El arameo dice formalmente «grandes cosas». En este punto conviene mantener la expresión literal y dejar abierta la posibilidad contextual de arrogancia sin resolverla demasiado pronto.
  doctrine_reference: Preservar la tensión textual y contextual sin sobrerresolverla.
- issue: Si la imagen de «ojos como los de un hombre» debe generalizarse a «ojos humanos»
  english_pob_reading: eyes like the eyes of a man
  chosen_spanish_reading: ojos como ojos de hombre
  alternative_spanish_readings:
  - ojos como ojos humanos
  - ojos como los de un hombre
  rationale: La comparación es concreta y debe permanecer visible en el texto principal. La nota ofrece la alternativa idiomática sin borrar la forma más cercana al original.
  doctrine_reference: Mantener la imagen y la comparación explícita del texto apocalíptico.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto arameo y el audit trail inglés. Se mantuvo la secuencia visionaria y la tensión lexical de «grandes cosas» sin convertirla en una interpretación más fuerte de lo que el fuente exige. No se aplicaron revisiones adicionales respecto del pase más reciente, que coincidía plenamente con el análisis anterior.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Cuerno» se mantiene de manera literal por la imagen apocalíptica del pasaje.
  - «He aquí» refleja el marcador discursivo visionario sin rebajar el tono.
  - Las notas usan marcadores únicos y anclan solo donde hay ambigüedad real en español.
