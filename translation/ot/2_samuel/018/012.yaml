id: 2SA.18.12
reference: 2 Samuel 18:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הָ/אִישׁ֙ אֶל יוֹאָ֔ב ו/לא אָנֹכִ֜י שֹׁקֵ֤ל עַל כַּפַּ/י֙ אֶ֣לֶף כֶּ֔סֶף לֹֽא אֶשְׁלַ֥ח יָדִ֖/י אֶל בֶּן הַ/מֶּ֑לֶךְ כִּ֣י בְ/אָזְנֵ֜י/נוּ צִוָּ֣ה הַ/מֶּ֗לֶךְ אֹ֠תְ/ךָ וְ/אֶת אֲבִישַׁ֤י וְ/אֶת אִתַּי֙ לֵ/אמֹ֔ר שִׁמְרוּ מִ֕י בַּ/נַּ֖עַר בְּ/אַבְשָׁלֽוֹם־־־־־־־־׃
translation:
  text: But the man said to Joab[a], “Even if I were weighing out a thousand pieces of silver on my palms, I would not put out my hand against the king’s son; for in our hearing the king commanded you and Abishai and Ittai, saying[b], ‘Guard for me the young man Absalom.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''weighing a thousand silver on my palms/hands.'' The wording refers to receiving a large payment by weight.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew text at the end of the verse is difficult: literally, ''Guard מי the young man, Absalom.'' Many understand the sense from 18:5 as ''Guard for me the young man Absalom.'''
    reason: textual_variant
lexical_decisions:
- source_word: שֹׁקֵל עַל כַּפַּי אֶלֶף כֶּסֶף
  chosen: Even if I were weighing out a thousand pieces of silver into my hands
  alternatives:
  - Though I should receive a thousand pieces of silver in my hand
  - Even if a thousand shekels of silver were weighed on my palms
  lexicon: HALOT
  rationale: The participle שֹׁקֵל with עַל כַּפַּי evokes silver being weighed/placed into the speaker's hands as payment. 'Pieces of silver' is more idiomatic and cautious than specifying 'shekels,' since אֶלֶף modifies כֶּסֶף directly without the unit term stated. The conditional force is conveyed idiomatically by 'Even if I were...'.
- source_word: לֹא אֶשְׁלַח יָדִי אֶל
  chosen: I would not put out my hand against
  alternatives:
  - I would not stretch out my hand against
  - I would not lay a hand on
  lexicon: HALOT
  rationale: The idiom שׁלח יד אל commonly means to act violently against or strike. 'Put out my hand against' preserves the Hebrew imagery while remaining natural English. 'Lay a hand on' is possible but slightly more interpretive.
- source_word: בֶּן הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - the son of the king
  lexicon: HALOT
  rationale: Straightforward construct phrase; 'the king’s son' is natural modern English and preserves the royal relationship central to the argument.
- source_word: בְאָזְנֵינוּ
  chosen: in our hearing
  alternatives:
  - in our ears
  - while we were listening
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the ears but means that the command was heard directly by those present. 'In our hearing' preserves the idiomatic force with some formal correspondence.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - charged
  - ordered
  lexicon: HALOT
  rationale: צוה denotes authoritative instruction. 'Commanded' best matches the king's authority in context.
- source_word: שִׁמְרוּ
  chosen: Guard
  alternatives:
  - Protect
  - Watch over
  lexicon: HALOT
  rationale: שׁמר here means to keep safe or protect. 'Guard' preserves the imperative force and military context. Because the object is a person, an English expansion is needed for clarity in the following phrase.
- source_word: מִי בַּנַּעַר בְּאַבְשָׁלוֹם
  chosen: for me the young man Absalom
  alternatives:
  - the young man Absalom
  - who is with the young man Absalom
  lexicon: HALOT
  rationale: 'The Masoretic Text reads מִי, which is difficult. In context and in light of the parallel command in 18:5, the sense is protective concern for Absalom: ''Guard for me the young man Absalom.'' The preposition ב before Absalom is retained in sense rather than woodenly reproduced. The awkward MT form is best represented by a smooth main text with a footnote preserving the textual difficulty.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - a man
  lexicon: HALOT
  rationale: The article points to a specific man in the narrative, previously introduced by context, so 'the man' is preferable.
- source_word: וְלֹא אָנֹכִי
  chosen: Even if I were... I would not
  alternatives:
  - As for me, not...
  - I would never...
  lexicon: HALOT
  rationale: The conjunction plus pronoun heightens the speaker's emphatic refusal. English expresses this most naturally by carrying the emphasis into the concessive clause and the explicit refusal.
