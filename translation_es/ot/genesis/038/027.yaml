translation:
  language: es
  text: Ahora bien, cuando era tiempo de dar a luz, he aquí que había gemelos en su vientre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now when it was
  chosen_spanish: Ahora bien, cuando le llegó el tiempo
  alternatives_spanish:
  - Y aconteció que cuando llegó el tiempo
  - Entonces, cuando llegó el momento
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva introduce el siguiente episodio. «Ahora bien» conserva la transición discursiva sin forzar un calco arcaico, y «le llegó el tiempo» expresa de modo natural el valor temporal del sintagma.
- source_word: בְּעֵת
  english_pob_choice: time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - la hora
  lexicon: HALOT
  rationale: עֵת designa un tiempo o momento determinado. En este contexto de parto, «el tiempo» comunica bien la idea de que había llegado el momento esperado.
- source_word: לִדְתָּהּ
  english_pob_choice: for her to give birth
  chosen_spanish: de dar a luz
  alternatives_spanish:
  - para que diera a luz
  - para parir
  lexicon: HALOT
  rationale: El infinitivo constructo de ילד con sufijo femenino expresa el acto de alumbrar. «Dar a luz» es la equivalencia española más natural y fiel en este contexto de nacimiento.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - miren
  lexicon: HALOT
  rationale: הִנֵּה marca algo llamativo o sorprendente. «He aquí que» preserva esa fuerza de atención; se mantiene el matiz de sorpresa sin sonar excesivamente solemne.
- source_word: תְאוֹמִים
  english_pob_choice: twins
  chosen_spanish: gemelos
  alternatives_spanish:
  - mellizos
  - dos niños gemelos
  lexicon: HALOT
  rationale: El hebreo plural indica dos nacidos al mismo parto. «Gemelos» es la forma española más común y precisa; «mellizos» sugeriría una distinción que el texto no hace.
- source_word: בְּבִטְנָהּ
  english_pob_choice: in her womb
  chosen_spanish: en su vientre
  alternatives_spanish:
  - en su seno
  - en su matriz
  lexicon: HALOT
  rationale: בֶּטֶן puede significar «vientre» o «vientre materno» según el contexto. Aunque el inglés opta por «womb», en español «vientre» suena más natural y sigue expresando claramente el sentido obstétrico sin introducir un tecnicismo innecesario.
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones aplicadas; el texto hebreo y la traducción inglesa están en alta concordancia, por lo que la propuesta española sigue de cerca la estructura narrativa y la imaginería del original sin añadir aclaraciones interpretativas.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología teológica no pertinente, porque el versículo no contiene el nombre divino ni lenguaje doctrinal.
  - Se mantiene un registro bíblico sobrio y actual, con preferencia por formas naturales del español («dar a luz», «he aquí») en lugar de calcos rígidos.
