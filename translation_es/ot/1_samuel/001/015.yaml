translation:
  language: es
  text: 'Pero Ana respondió y dijo[a]: «No, mi señor. Soy una mujer afligida en espíritu. No he bebido ni vino ni bebida fuerte, sino que he derramado mi alma delante de Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una mujer de espíritu dolorido».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «delante de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּעַן חַנָּה וַתֹּאמֶר
  english_pob_choice: But Hannah answered and said
  chosen_spanish: Pero Ana respondió y dijo
  alternatives_spanish:
  - Entonces Ana respondió
  - Ana respondió y dijo
  lexicon: HALOT
  rationale: Conservo la doble fórmula narrativa del hebreo con un verbo de respuesta y otro de habla, y reflejo el valor adversativo con «Pero» según el contexto de la acusación de Elí.
- source_word: לֹא אֲדֹנִי
  english_pob_choice: No, my lord
  chosen_spanish: No, mi señor
  alternatives_spanish:
  - No, señor
  - No, mi señor mío
  lexicon: HALOT
  rationale: אֲדֹנִי es un trato respetuoso dirigido a Elí, no un título divino. «Mi señor» preserva la deferencia y la relación social sin volverlo excesivamente arcaico.
- source_word: אִשָּׁה קְשַׁת רוּחַ
  english_pob_choice: a woman troubled in spirit
  chosen_spanish: una mujer afligida en espíritu
  alternatives_spanish:
  - una mujer de espíritu dolorido
  - una mujer de espíritu angustiado
  - una mujer muy afligida
  lexicon: HALOT
  rationale: La expresión apunta a angustia interna; «afligida en espíritu» mantiene la metáfora hebrea de רוּחַ como el ámbito interior, sin forzar un giro demasiado interpretativo.
- source_word: וְיַיִן וְשֵׁכָר
  english_pob_choice: wine nor strong drink
  chosen_spanish: ni vino ni bebida fuerte
  alternatives_spanish:
  - ni vino ni licor fuerte
  - ni vino ni bebida fermentada
  lexicon: HALOT
  rationale: «Bebida fuerte» conserva la distinción entre יַיִן y שֵׁכָר sin precisar de más; es el equivalente español más cercano al valor amplio de una bebida intoxicante aparte del vino.
- source_word: לֹא שָׁתִיתִי
  english_pob_choice: I have drunk neither
  chosen_spanish: No he bebido
  alternatives_spanish:
  - No he bebido ni una gota
  - No he bebido
  lexicon: HALOT
  rationale: En español, la negación doble ya queda clara al unirla con los dos complementos coordinados. El perfecto «he bebido» reproduce bien el estado resultante en el discurso.
- source_word: וָאֶשְׁפֹּךְ אֶת נַפְשִׁי
  english_pob_choice: I have poured out my soul
  chosen_spanish: he derramado mi alma
  alternatives_spanish:
  - he derramado mi ser
  - he vertido mi alma
  lexicon: HALOT
  rationale: «Derramar» sigue de cerca el verbo hebreo y «alma» conserva נֶפֶשׁ como la vida/interioridad de la persona. Aunque «alma» puede sonar menos idiomático que «corazón», es más cercano al idioma bíblico del hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé», no una máscara como «SEÑOR». «Delante de» expresa bien la presencia cultual y orante del hebreo לִפְנֵי.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del SEÑOR
  - ante el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; por la norma del proyecto se vierte «Yahvé» de manera directa para preservar el nombre del pacto y evitar el reemplazo litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de קְשַׁת רוּחַ
  english_pob_reading: a woman troubled in spirit
  chosen_spanish_reading: una mujer afligida en espíritu
  alternative_spanish_readings:
  - una mujer de espíritu dolorido
  - una mujer angustiada
  rationale: Mantengo la tensión entre una descripción afectiva y la metáfora hebrea de רוּחַ. «Afligida en espíritu» es suficientemente literal y natural en español, sin perder la referencia al interior de la persona.
  doctrine_reference: HALOT / uso contextual de רוּחַ
translation_notes:
  revision_awareness: 'Se siguió el acceso de revisión más reciente: el análisis final indicó que no eran necesarios cambios sustanciales; por eso el español conserva la estructura y las decisiones léxicas principales del audit trail inglés, ajustadas a una redacción natural en español.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» conforme al criterio de terminología del proyecto para יְהוָה.
  - Se evitó «sierva» porque el hebreo y el audit trail inglés describen la condición emocional, no un rol servil.
  - «Alma» se mantuvo para נֶפֶשׁ por coherencia bíblica, aunque en español podría alternar con «ser»; aquí la forma conserva mejor el paralelismo con el hebreo.
  - La doble negación española («No he bebido ni vino ni bebida fuerte») expresa de forma natural la coordinación negativa del hebreo.
