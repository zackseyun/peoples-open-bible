translation:
  language: es
  text: Por la transgresión de una tierra, sus gobernantes son muchos; pero por un hombre[a] que entiende y sabe, esta perdura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombre» traduce אָדָם como término singular genérico aquí, representando a una persona con discernimiento y conocimiento, no necesariamente excluyente por sexo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «permanece largo tiempo». El hebreo de la segunda línea es difícil; el sentido es que el discernimiento y el conocimiento traen estabilidad duradera.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּפֶשַׁע
  english_pob_choice: Because of ... transgression
  chosen_spanish: Por ... la transgresión
  alternatives_spanish:
  - A causa de ... la transgresión
  - Por ... la rebelión
  lexicon: HALOT
  rationale: La preposición ב con פשע se entiende causalmente. «Transgresión» conserva el peso moral y jurídico del término hebreo mejor que opciones más generales como «rebeldía» o «culpa».
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - un país
  - la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra, país o territorio. «Una tierra» mantiene el valor proverbial genérico y es fiel al paralelo político del verso.
- source_word: רַבִּים שָׂרֶיהָ
  english_pob_choice: its rulers are many
  chosen_spanish: sus gobernantes son muchos
  alternatives_spanish:
  - sus príncipes son muchos
  - tiene muchos gobernantes
  lexicon: HALOT
  rationale: שָׂרִים designa líderes, príncipes o gobernantes. «Gobernantes» es claro en español moderno y preserva el referente político sin imponer un matiz cortesano innecesario.
- source_word: וּבְאָדָם
  english_pob_choice: but by a man
  chosen_spanish: pero por un hombre
  alternatives_spanish:
  - pero con un hombre
  - y por un hombre
  lexicon: HALOT
  rationale: La conjunción introduce contraste antitético. Se mantiene «hombre» para reflejar el singular genérico אָדָם y conservar la forma proverbial, con nota aclaratoria por su valor representativo.
- source_word: מֵבִין יֹדֵעַ
  english_pob_choice: of understanding and knowledge
  chosen_spanish: que entiende y sabe
  alternatives_spanish:
  - entendido y conocedor
  - discreto y entendido
  lexicon: HALOT
  rationale: Los participios dobles describen a una persona caracterizada por discernimiento y conocimiento. La traducción verbal conserva ambos verbos sin fundirlos en un solo adjetivo, lo que refleja mejor la doble designación hebrea.
- source_word: כֵּן
  english_pob_choice: it
  chosen_spanish: se
  alternatives_spanish:
  - así
  - eso
  lexicon: HALOT
  rationale: El hebreo es difícil aquí; el inglés POB optó por mantener un sujeto implícito más literal. En español, se expresa con el clítico «se» para sostener la pasiva/impersonalidad del efecto sin añadir una interpretación demasiado expansiva.
- source_word: יַאֲרִיךְ
  english_pob_choice: endures long
  chosen_spanish: se prolonga
  alternatives_spanish:
  - dura mucho
  - permanece largo tiempo
  lexicon: HALOT
  rationale: El hifil de ארך significa prolongar/hacer largo. «Se prolonga» es directo y suficientemente literal en español; evita sobreinterpretar el tipo exacto de duración que el proverbio deja algo abierto.
theological_decisions:
- issue: Valor representativo de אָדָם en un proverbio sapiencial
  english_pob_reading: ‘Man’ translates Hebrew adam, a singular generic term here referring representatively to a human leader or counselor, not necessarily excluding others by sex.
  chosen_spanish_reading: «Hombre» traduce אָדָם como término genérico singular, aquí representativo de una persona con discernimiento y conocimiento, sin excluir necesariamente a otras por sexo.
  alternative_spanish_readings:
  - persona
  - ser humano
  rationale: Se preserva la fuerza proverbial y la forma singular del hebreo. Aunque «persona» podría sonar más inclusivo, «hombre» corresponde mejor a la elección lexical documentada y al valor representativo señalado por la nota inglesa.
  doctrine_reference: Antropología bíblica y lenguaje genérico de אָדָם en contexto sapiencial.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al evitar una expansión interpretativa como «estabilidad» y conservar una forma más literal de יַאֲרִיךְ. También se mantuvo la dificultad de la segunda línea sin resolverla con una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «transgresión» para פשע por consistencia con el valor moral-jurídico del término.
  - Se tradujo אָדָם como «hombre» con nota, conforme al audit trail inglés y al uso genérico del hebreo.
  - Se eligió una construcción española que conserve el contraste proverbial entre la primera y la segunda línea.
  - Se evitó introducir «estabilidad» como sujeto explícito, siguiendo la revisión del POB inglés.
