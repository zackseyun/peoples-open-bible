translation:
  language: es
  text: El rey hizo de la madera de almug[a] soportes[b] para la casa de Yahvé y para la casa del rey, y cítaras y arpas para los cantores. Nunca antes había llegado madera de almug como esa, ni se ha visto ninguna hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “madera de algum”. El término relacionado aparece con una grafía variante en la tradición textual paralela.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido “soportes” es raro y también puede referirse a elementos arquitectónicos como escalones o barandales.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצֵי הָאַלְמֻגִּים
  english_pob_choice: the almug wood
  chosen_spanish: la madera de almug
  alternatives_spanish:
  - la madera de algum
  - los almugueros
  lexicon: HALOT
  rationale: El hebreo nombra una madera preciosa con un término raro y de identificación incierta. Mantener 'almug' translitera el nombre tradicional sin inventar una especie botánica. 'Madera' refleja mejor el sustantivo colectivo que un plural literal 'árboles' en este contexto.
- source_word: מִסְעָד
  english_pob_choice: supports
  chosen_spanish: soportes
  alternatives_spanish:
  - escalones
  - barandales
  - columnas
  lexicon: HALOT
  rationale: El sustantivo es raro y su sentido exacto es incierto. 'Soportes' conserva la amplitud semántica del inglés POB y evita precisar indebidamente si eran escalones, barandas u otro elemento arquitectónico.
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para el templo de Yahvé
  - para la casa de Yahweh
  lexicon: HALOT
  rationale: Se mantiene el idiomático 'casa' del hebreo בַּיִת, en lugar de sustituirlo por 'templo'. 'Yahvé' sigue el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre del pacto se vierte conforme al estándar del proyecto. No se enmascara con 'SEÑOR', y 'Yahvé' es la forma adoptada en español para reproducir el Tetragrámaton.
- source_word: וּלְבֵית הַמֶּלֶךְ
  english_pob_choice: and for the king’s house
  chosen_spanish: y para la casa del rey
  alternatives_spanish:
  - y para el palacio del rey
  - y para la casa real
  lexicon: HALOT
  rationale: Se conserva el paralelismo con 'casa de Yahvé' usando la misma estructura nominal. 'Casa del rey' es más literal que 'palacio' y respeta la forma hebrea.
- source_word: וְכִנֹּרוֹת
  english_pob_choice: lyres
  chosen_spanish: cítaras
  alternatives_spanish:
  - liras
  - arpa pequeña
  lexicon: HALOT
  rationale: El hebreo designa un instrumento de cuerdas cuyo equivalente exacto no es seguro. En español 'cítara' funciona como término instrumental amplio y distinguible del siguiente instrumento, aunque 'liras' también sería posible.
- source_word: וּנְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - liras
  - salterios
  lexicon: HALOT
  rationale: Se mantiene un instrumento de cuerda distinto del anterior. 'Arpas' es una traducción clara y natural en español, sin afirmar más precisión organológica de la que permite el hebreo.
- source_word: לַשָּׁרִים
  english_pob_choice: for the singers
  chosen_spanish: para los cantores
  alternatives_spanish:
  - para los cantantes
  - para los músicos
  lexicon: HALOT
  rationale: El participio hebreo apunta a quienes cantan. 'Cantores' suena natural en español bíblico y mantiene la especificidad mejor que el genérico 'músicos'.
- source_word: לֹא בָא כֵן
  english_pob_choice: Never before had such almug wood come
  chosen_spanish: Nunca antes había venido madera de almug así
  alternatives_spanish:
  - Nunca había llegado madera de almug como esa
  - No había venido así madera de almug
  lexicon: HALOT
  rationale: 'La expresión hebrea indica unicidad o precedencia: no se había importado/traído madera semejante. ''Nunca antes había venido'' conserva ese valor con un español natural y no demasiado interpretativo.'
- source_word: וְלֹא נִרְאָה עַד הַיּוֹם הַזֶּה
  english_pob_choice: nor has any been seen to this day
  chosen_spanish: ni se ha visto hasta hoy
  alternatives_spanish:
  - ni ha aparecido hasta hoy
  - ni se ha visto nada igual hasta hoy
  lexicon: HALOT
  rationale: El hebreo continúa la afirmación desde el punto de vista del narrador. 'Ni se ha visto hasta hoy' preserva la fuerza temporal sin agregar un 'nada igual' que el texto no explicita.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el Tetragrámaton de forma directa. El proyecto prescribe 'Yahvé' en español como equivalente principal, manteniendo visible el nombre del pacto y evitando la sustitución devocional por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incorporar [a] directamente en la frase 'madera de almug[a]' para que el marcador presente en las notas coincida exactamente con el texto español. La traducción mantiene la lectura del hebreo y la decisión del POB inglés, sin depender mecánicamente del inglés para la forma de la madera rara o del sintagma arquitectónico incierto.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en conformidad con el estándar del proyecto para יְהוָה.
  - Se preservó la metáfora hebrea 'casa' para בַּיִת en ambos miembros del paralelismo.
  - Se distinguieron dos instrumentos de cuerda con 'cítaras' y 'arpas' para no colapsar términos diferentes.
  - La construcción temporal negativa se volvió a un español idiomático sin perder la idea de precedencia absoluta.
