lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la vara de
  lexicon: HALOT
  rationale: En contextos de reparto tribal, מַטֶּה designa la tribu, no el objeto físico 'bastón' o 'vara'. El conector y la preposición se expresan de modo natural en español como 'Y para la tribu de' dentro de esta lista administrativa.
- source_word: בְנֵי זְבוּלֻן
  english_pob_choice: the sons of Zebulun
  chosen_spanish: los hijos de Zabulón
  alternatives_spanish:
  - los descendientes de Zabulón
  - la gente de Zabulón
  lexicon: HALOT
  rationale: בְנֵי significa literalmente 'hijos de'. En una designación tribal, 'los hijos de' conserva la forma hebrea y su fuerza genealógica; en español, 'hijos' es claro y más idiomático que calcar 'sons'.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  lexicon: HALOT
  rationale: נָשִׂיא se refiere a un jefe o representante reconocido. 'Líder' transmite bien la función administrativa y evita la posible carga aristocrática de 'príncipe'.
- source_word: אֱלִיצָפָן
  english_pob_choice: Elizaphan
  chosen_spanish: Elizafán
  alternatives_spanish:
  - Elizafán
  lexicon: transliteration policy
  rationale: Se translitera el nombre propio al español como 'Elizafán', ajustando la grafía a la pronunciación española y manteniendo el valor de nombre propio sin traducirlo.
- source_word: בֶּן פַּרְנָךְ
  english_pob_choice: son of Parnach
  chosen_spanish: hijo de Parnac
  alternatives_spanish:
  - hijo de Parnaj
  - el hijo de Parnac
  lexicon: HALOT
  rationale: בֶּן se rinde con 'hijo de' en la genealogía estándar. El nombre פַּרְנָךְ se translitera como 'Parnac', preservando la secuencia consonántica y adaptando la forma al español.
