lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque ahora
  lexicon: HALOT
  rationale: Introduce la cláusula con fuerza explicativa o causal; «Porque» preserva bien la relación con el contexto sin volverla más enfática de lo que el hebreo exige.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: HALOT
  rationale: Marca la situación presente con naturalidad en español y conserva el contraste implícito con la expectativa de Job.
- source_word: צְעָדַי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis pisadas
  - mis andanzas
  lexicon: HALOT
  rationale: צעד se refiere a pasos o pisadas; «mis pasos» es la equivalencia más directa y idiomática en español para la imagen de ser contados uno por uno.
- source_word: תִּסְפּוֹר
  english_pob_choice: you count
  chosen_spanish: tú cuentas
  alternatives_spanish:
  - cuentas
  - numeras
  lexicon: HALOT
  rationale: ספר en qal significa contar o numerar; «cuentas» mantiene la imagen concreta y es natural en español. Se mantiene el sujeto explícito para claridad y énfasis poético.
- source_word: לֹא
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no estás
  - 'no'
  lexicon: HALOT
  rationale: La negación simple se expresa de forma directa con «no», sin añadir auxiliares innecesarios.
- source_word: תִשְׁמֹר עַל
  english_pob_choice: keep watch over
  chosen_spanish: vigilas
  alternatives_spanish:
  - velas sobre
  - guardas sobre
  - observas
  lexicon: HALOT
  rationale: שׁמר con עַל puede implicar vigilar, guardar o mantener bajo observación. «Vigilas» reproduce la idea de atención vigilante sobre el pecado de Job sin sonar forzado en español. Evita cargar demasiado el matiz de custodia física que podría sonar extraño aquí.
- source_word: חַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi falta
  - mi culpa
  - mi ofensa
  lexicon: HALOT
  rationale: El sustantivo aquí denota pecado, no sacrificio por el pecado. «Mi pecado» conserva la abstracción singular del hebreo y la fuerza moral/teológica del término.
theological_decisions:
- issue: Tensión interpretativa del segundo hemistiquio (negación simple vs. lectura hipotética o atenuada)
  english_pob_reading: 'Render the clause straightforwardly as a present complaint: ''you do not keep watch over my sin.'''
  chosen_spanish_reading: «no vigilas mi pecado» como afirmación presente y directa de la queja de Job.
  alternative_spanish_readings:
  - «no estarías vigilando mi pecado»
  - «no vigilarías mi pecado»
  - «no vigilas por mi pecado»
  rationale: El hebreo presenta una forma verbal imperfecta con negación, que en contexto se traduce de manera más natural como una afirmación presente. La traducción conserva la tensión del pasaje en lugar de resolverla o armonizarla con versículos cercanos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparece exactamente en el texto español: [a] en «mis pasos[a]» y [b] en «mi pecado[b]». No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se preserva el paralelismo verbal entre contar y vigilar, manteniendo el contraste entre el escrutinio de los pasos y la falta de vigilancia sobre el pecado.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se conserva «pecado» en singular para reflejar el hebreo abstracto/singular sin forzar una pluralización interpretativa.
  - La puntuación con punto y coma reproduce bien la pausa poética del hebreo y la estructura de dos miembros del verso.
