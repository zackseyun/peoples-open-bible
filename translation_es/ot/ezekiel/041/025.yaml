translation:
  language: es
  text: Y sobre ellas fueron hechos[a] querubines y palmeras, en las puertas del salón del templo[b], tal como fueron hechos en los muros; y había un voladizo de madera[c] ante el frente del vestíbulo, por fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron tallados», para reflejar mejor la decoración ornamental del templo.
    reason: lexical_alternative
  - marker: b
    text: O «las puertas de la nave» o «del santuario»; aquí הֵיכָל se refiere al recinto principal del edificio del templo.
    reason: lexical_alternative
  - marker: c
    text: El término hebreo es incierto; puede referirse a un voladizo, saliente o proyección de madera en la parte delantera del vestíbulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשׂוּיָה אֲלֵיהֶן
  english_pob_choice: were made on them
  chosen_spanish: fueron hechos sobre ellos
  alternatives_spanish:
  - fueron tallados sobre ellos
  - fueron formados sobre ellos
  lexicon: HALOT
  rationale: El hebreo usa una pasiva amplia de עשה; en español, «fueron hechos» conserva esa amplitud. En contexto ornamental podría entenderse también como «tallados», pero eso especifica más de lo que el verbo por sí solo dice.
- source_word: דַּלְתוֹת הַהֵיכָל
  english_pob_choice: the doors of the nave
  chosen_spanish: las puertas del templo
  alternatives_spanish:
  - las puertas del salón del templo
  - las puertas del santuario
  lexicon: HALOT
  rationale: Aquí הֵיכָל designa el recinto principal del templo; en español, «templo» es claro y natural. «Nave» sería más técnico, pero menos transparente para un lector amplio.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubes
  lexicon: HALOT
  rationale: «Querubines» es la forma establecida en español para estos seres simbólicos del templo. Mantiene el término tradicional sin perder precisión.
- source_word: וְתִמֹרִים
  english_pob_choice: and palm trees
  chosen_spanish: y palmeras
  alternatives_spanish:
  - y motivos de palmera
  - y palmas
  lexicon: HALOT
  rationale: En un contexto decorativo, el plural puede referirse a figuras de palmera. «Palmeras» es la forma más directa y natural en español.
- source_word: כַּאֲשֶׁר עֲשׂוּיִם לַקִּירוֹת
  english_pob_choice: just as they were made on the walls
  chosen_spanish: tal como fueron hechos en los muros
  alternatives_spanish:
  - como fueron hechos en los muros
  - del mismo modo que en los muros
  lexicon: HALOT
  rationale: La cláusula comparativa enlaza la decoración de las puertas con la de los muros. «Tal como» conserva la comparación explícita y la referencia estructural.
- source_word: וְעָב עֵץ
  english_pob_choice: a wooden canopy
  chosen_spanish: una pieza de madera
  alternatives_spanish:
  - un voladizo de madera
  - un dosel de madera
  - un saliente de madera
  lexicon: HALOT
  rationale: עָב es un término arquitectónico difícil y no seguro. En español, «pieza de madera» evita sobreinterpretar la forma exacta; el contexto ya indica una proyección o elemento frontal, pero no obliga a precisar más.
- source_word: אֶל פְּנֵי הָאוּלָם
  english_pob_choice: before the front of the vestibule
  chosen_spanish: delante del frente del vestíbulo
  alternatives_spanish:
  - ante la fachada del vestíbulo
  - frente al vestíbulo
  lexicon: HALOT
  rationale: «אֶל־פְּנֵי» expresa orientación hacia la cara/frente de algo. «Delante del frente» suena algo redundante, pero reproduce con fidelidad la relación espacial sin suavizarla demasiado.
- source_word: מֵהַחוּץ
  english_pob_choice: outside
  chosen_spanish: por fuera
  alternatives_spanish:
  - desde afuera
  - al exterior
  lexicon: HALOT
  rationale: La frase final añade el contraste exterior. «Por fuera» es breve y natural en español, y conserva la oposición con el interior del vestíbulo.
translation_notes:
  revision_awareness: La revisión inglesa ajustó la última cláusula de «on the front of the vestibule outside» a «before the front of the vestibule outside» para reflejar mejor אֶל־פְּנֵי. La versión española sigue esa misma decisión con «delante del frente del vestíbulo, por fuera». También se mantuvo la cautela del audit trail respecto de עָב עֵץ, evitando concretar más allá de lo que el hebreo permite.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «querubines» como término tradicional consolidado en español.
  - Se evita «SEÑOR» como sustituto no presente en el hebreo de este versículo.
  - La elección de «templo» para הֵיכָל prioriza claridad para lectores hispanohablantes sin perder el referente arquitectónico principal.
