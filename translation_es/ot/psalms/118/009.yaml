translation:
  language: es
  text: Es mejor refugiarse en Yahvé que confiar en nobles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «príncipes». El hebreo נְדִיבִים puede referirse a nobles o a gobernantes prominentes; «príncipes» es la traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Es mejor
  alternatives_spanish:
  - Mejor
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa una comparación de ventaja; en español, la construcción natural requiere un sujeto impersonal explícito para dar fluidez sin perder el valor comparativo.
- source_word: לַחֲסוֹת
  english_pob_choice: to take refuge
  chosen_spanish: refugiarse
  alternatives_spanish:
  - buscar refugio
  - tomar refugio
  lexicon: HALOT
  rationale: El infinitivo de חסה comunica la idea de buscar o tomar refugio. 'Refugiarse' conserva la acción de amparo y suena natural en español bíblico contemporáneo.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé' conforme a la terminología del proyecto, preservando el nombre del pacto sin la máscara 'SEÑOR'.
- source_word: מִבְּטֹחַ
  english_pob_choice: than to trust
  chosen_spanish: que confiar
  alternatives_spanish:
  - que poner la confianza
  - que depositar la confianza
  lexicon: HALOT
  rationale: La comparación marcada por מן se vierte naturalmente con 'que' en español. 'Confiar' preserva el sentido de בטח sin añadir matices no exigidos por el hebreo.
- source_word: בִּנְדִיבִים
  english_pob_choice: in nobles
  chosen_spanish: en nobles
  alternatives_spanish:
  - en príncipes
  - en notables
  lexicon: HALOT
  rationale: נְדִיבִים designa nobles o personas prominentes. 'Nobles' es amplio y fiel; 'príncipes' es una alternativa tradicional pero más restringida.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo contiene el Tetragrámaton directamente. En español se adopta 'Yahvé', que corresponde al estándar del proyecto y preserva el nombre propio de Dios sin sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto en inglés del POB y la revisión más reciente coinciden en la decisión central: comparar el refugio en Yahweh/Yahvé con la confianza en la élite humana. No hubo revisiones aplicadas al versículo, y la versión española conserva esa estructura comparativa sin suavizar el contraste.'
  spanish_consistency_notes:
  - Se mantuvo la comparación breve y proverbial del hebreo.
  - Se conservó 'Yahvé' conforme a la terminología del proyecto.
  - '''Nobles'' refleja el valor semántico general de נְדִיבִים y deja abierta la alternativa tradicional ''príncipes''.'
