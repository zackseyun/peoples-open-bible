translation:
  language: es
  text: 'Porque así dice Yahvé a los hombres de Judá y a Jerusalén: labren para ustedes tierra no labrada[a], y no siembren entre espinos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierra en barbecho». El hebreo se refiere a un suelo que necesita ser labrado o roturado antes de sembrar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: terminología POB para el nombre divino
  rationale: El hebreo tiene el nombre propio del pacto; en español la pauta del proyecto es reproducirlo como «Yahvé», no velarlo con un título genérico. Mantiene la distinción auditada en el texto fuente y la coherencia terminológica del POB.
- source_word: לְאִישׁ יְהוּדָה
  english_pob_choice: to the men of Judah
  chosen_spanish: a los hombres de Judá
  alternatives_spanish:
  - al hombre de Judá
  - al pueblo de Judá
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, aquí funciona colectivamente, como en el audit trail inglés. «A los hombres de Judá» conserva el valor masculino/colectivo sin forzar un singular idiomático en español ni diluirlo en «pueblo».
- source_word: וְלִירוּשָׁלִַם
  english_pob_choice: and to Jerusalem
  chosen_spanish: y a Jerusalén
  alternatives_spanish:
  - y a los habitantes de Jerusalén
  lexicon: uso metonímico contextual
  rationale: El hebreo nombra la ciudad directamente; el español puede conservar esa metonimia sin expansión. «A Jerusalén» es más fiel al relieve formal del original que explicitar sus habitantes en el cuerpo del verso.
- source_word: נִירוּ
  english_pob_choice: Break up
  chosen_spanish: abran
  alternatives_spanish:
  - labren
  - rompan
  lexicon: HALOT
  rationale: El verbo pide una acción de preparar la tierra antes de sembrar. En español, «abran» funciona de modo natural con «terreno no labrado» y conserva la fuerza imperativa de la metáfora agrícola; «labren» también sería viable, pero aquí se prefirió un giro más directo y fluido.
- source_word: נִיר
  english_pob_choice: unplowed ground
  chosen_spanish: terreno no labrado
  alternatives_spanish:
  - tierra no arada
  - terreno en barbecho
  lexicon: HALOT
  rationale: El sustantivo refiere tierra que necesita ser abierta antes de sembrar. «Terreno no labrado» comunica bien el estado agrícola sin cargar con arcaísmo; preserva la imagen del suelo aún impropio para la siembra.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para ustedes mismos
  lexicon: pronombre dativo enfático
  rationale: El dativo añade énfasis reflexivo, pero en español «para ustedes» ya puede llevar la fuerza de beneficio/destinación sin sonar pesado. Se evita sobrerreforzar el reflexivo donde el contexto lo hace evidente.
- source_word: וְאַל תִּזְרְעוּ
  english_pob_choice: and do not sow
  chosen_spanish: y no siembren
  alternatives_spanish:
  - y no planten
  lexicon: HALOT
  rationale: זָרַע alude específicamente a sembrar semilla. «No siembren» mantiene con precisión la imagen agrícola y la prohibición directa.
- source_word: אֶל קוֹצִים
  english_pob_choice: among thorns
  chosen_spanish: entre espinos
  alternatives_spanish:
  - entre thorns
  - en medio de espinos
  - entre zarzas
  lexicon: HALOT
  rationale: Aunque אֶל puede implicar dirección hacia/entre, en este contexto el sentido idiomático es sembrar en terreno lleno de maleza espinosa. «Entre espinos» es natural en español y conserva la advertencia sin ampliar la imagen.
theological_decisions:
- issue: Alcance metafórico del mandato agrícola
  english_pob_reading: Retain the agricultural imagery directly without explicating repentance in the main text.
  chosen_spanish_reading: Conservar la metáfora agrícola sin explicitar en el cuerpo del verso una aplicación directa a arrepentimiento o renovación interior.
  alternative_spanish_readings:
  - «Preparen sus corazones y no siembren entre obstáculos pecaminosos»
  - «Arrepiéntanse y aparten el pecado»
  rationale: El hebreo presenta una imagen concreta de labranza y siembra; la interpretación espiritual pertenece al contexto más amplio, no al enunciado de este versículo. La traducción debe dejar visible la tensión metafórica, no resolverla con paráfrasis doctrinal.
  doctrine_reference: Translation philosophy 1 y 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el packet fuente y el audit trail inglés; no se detectaron revisiones textuales posteriores que alteren la elección léxica o teológica. La versión inglesa final fue marcada como sin cambios, y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la metáfora agrícola sin interpretarla explícitamente en el texto principal.
  - «Entre espinos» reproduce el valor idiomático de la preposición hebrea sin recargar la frase.
  - La nota[a] está anclada en «terreno no labrado» para reflejar la alternativa léxica documentada.
