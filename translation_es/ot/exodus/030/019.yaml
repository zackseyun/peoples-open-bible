translation:
  language: es
  text: Aarón y sus hijos lavarán[a] sus manos y sus pies con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: «con agua de ella», refiriéndose al lavatorio mencionado en el contexto cercano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחֲצוּ
  english_pob_choice: shall wash
  chosen_spanish: lavarán
  alternatives_spanish:
  - deberán lavar
  - han de lavar
  lexicon: HALOT
  rationale: El hebreo en contexto instructivo tiene fuerza directiva/futura. «Lavarán» conserva esa orientación normativa en español sin endurecerla con una perífrasis innecesaria.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus descendientes
  lexicon: HALOT
  rationale: En este contexto se refiere a los descendientes masculinos que ejercen el servicio sacerdotal; «hijos» mantiene la referencia genealógica directa y es natural en español. No se expande a «varones» porque el masculino ya está implícito en el referente cultual y el texto no añade un énfasis adicional.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: con ella
  alternatives_spanish:
  - de ella
  - con agua de ella
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «de ella», pero en español una frase como «lavar... de ella» resulta torpe. El sentido contextual es instrumental: el lavado se realiza usando el agua del recipiente mencionado antes. «Con ella» comunica esa relación sin introducir información ajena al pasaje; la explicitación «con agua de ella» queda como alternativa interpretativa.'
- source_word: אֶת יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: El objeto directo señala claramente la parte del cuerpo a lavar. «Sus manos» es idiomático y fiel.
- source_word: וְאֶת רַגְלֵיהֶם
  english_pob_choice: and their feet
  chosen_spanish: y sus pies
  alternatives_spanish:
  - y los pies de ellos
  lexicon: HALOT
  rationale: Se mantiene la coordinación simple del hebreo y el sentido corporal literal.
theological_decisions:
- issue: Valor instrumental de מִמֶּנּוּ frente a una traducción estrictamente preposicional
  english_pob_reading: from it
  chosen_spanish_reading: con ella
  alternative_spanish_readings:
  - de ella
  - con agua de ella
  rationale: La POB inglesa conserva «from it» y remite en nota a la idea más explícita de agua proveniente del lavatorio. En español, la preposición literal «de ella» suena incompleta para un acto de lavado. «Con ella» expresa el uso del recipiente/agua en la acción, sin borrar el referente del contexto. Se preserva así la tensión entre literalidad y claridad en una frase natural.
  doctrine_reference: Principio POB de equivalencia óptima y claridad sin sobreparáfrasis
translation_notes:
  revision_awareness: El texto inglés ya está marcado como sin cambios tras revisión y con concordancia alta entre auditoría y revisión. La draft española sigue esa lectura sin introducir variantes textuales ni notas críticas adicionales; solo adapta la relación preposicional de מִמֶּנוּ a una formulación española idiomática.
  spanish_consistency_notes:
  - Se mantiene «Aarón» como nombre propio estándar y no «Aaron».
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton.
  - Se conserva el plural posesivo masculino «sus hijos» para el linaje sacerdotal.
  - «Con ella» refiere al lavatorio/agua del contexto, no a un añadido interpretativo independiente.
