revisions:
- from: El temor de Yahvé es fuente de vida[a], para apartar[b] de los lazos de muerte.
  to: El temor de Yahvé es fuente[a] de vida, para apartar a uno[b] de los lazos de la muerte.
  rationale: Se añadió «a uno» para completar la construcción española y reflejar mejor la fuerza funcional del infinitivo hebreo, en línea con el inglés POB («to turn one away»). Se ajustó la nota léxica de «fuente» para que preserve una alternativa genuina en español («manantial»). También se añadió el artículo en «la muerte» para una expresión más natural en español bíblico.
