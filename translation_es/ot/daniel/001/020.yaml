translation:
  language: es
  text: Y en todo asunto de sabiduría y de entendimiento que el rey les pidió, los halló diez veces superiores[a] a todos los magos y encantadores[b] que había en todo su reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «diez manos arriba». El hebreo expresa una superioridad marcada mediante un modismo numérico; la traducción transmite el sentido comparativo sin perder la hipérbole.
    reason: lexical_alternative
  - marker: b
    text: O «astrólogos». El segundo término se refiere a una clase de sabios babilonios, pero su equivalente preciso en español es incierto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And in every
  chosen_spanish: Y en cualquier
  alternatives_spanish:
  - Y en todo
  - Y en cada
  lexicon: HALOT
  rationale: El hebreo introduce una nueva afirmación enlazada con la anterior; 'en cualquier' comunica bien la idea distributiva de 'every' aplicada a asuntos o casos concretos, con español natural y digno.
- source_word: דְּבַר
  english_pob_choice: matter
  chosen_spanish: asunto
  alternatives_spanish:
  - materia
  - cosa
  - tema
  lexicon: HALOT
  rationale: Aquí דָּבָר no significa 'palabra' sino un asunto o caso planteado para examen; 'asunto' expresa mejor ese valor contextual en español contemporáneo.
- source_word: חָכְמַת בִּינָה
  english_pob_choice: of wisdom and understanding
  chosen_spanish: de sabiduría y de entendimiento
  alternatives_spanish:
  - de sabiduría e inteligencia
  - de sabiduría y discernimiento
  lexicon: HALOT
  rationale: La cadena constructa conserva dos sustantivos distintos. 'Sabiduría' y 'entendimiento' mantienen la pareja léxica sin fusionarla ni moralizarla.
- source_word: אֲשֶׁר בִּקֵּשׁ מֵהֶם הַמֶּלֶךְ
  english_pob_choice: that the king asked of them
  chosen_spanish: que el rey les pidió
  alternatives_spanish:
  - que el rey les preguntó
  - que el rey les solicitó
  lexicon: HALOT
  rationale: בקש con מן puede expresar pedir o solicitar de alguien. 'Les pidió' es idiomático en español y preserva el matiz de requerimiento/examen sin volverlo demasiado técnico.
- source_word: וַיִּמְצָאֵם
  english_pob_choice: he found them
  chosen_spanish: los halló
  alternatives_spanish:
  - los encontró
  - los encontró resultando
  lexicon: HALOT
  rationale: '''Halló'' conserva el tono evaluativo y es más literario; reproduce la conclusión del rey sobre su superioridad.'
- source_word: עֶשֶׂר יָדוֹת
  english_pob_choice: ten times better
  chosen_spanish: diez veces superiores
  alternatives_spanish:
  - diez veces mejores
  - diez veces por encima
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'diez manos', un modismo de superioridad marcada. 'Diez veces superiores' comunica esa fuerza comparativa sin ocultar la hipérbole numérica; se mantiene la tensión idiomática documentada por el POB.
- source_word: עַל
  english_pob_choice: than
  chosen_spanish: a
  alternatives_spanish:
  - que
  - sobre
  lexicon: HALOT
  rationale: En comparativos, עַל marca superioridad sobre otros. En español, 'superiores a' resulta natural y fiel.
- source_word: הַחַרְטֻמִּים
  english_pob_choice: the magicians
  chosen_spanish: los magos
  alternatives_spanish:
  - los magos adivinos
  - los escribas mágicos
  lexicon: HALOT
  rationale: El término designa especialistas de corte en saberes ocultos; 'magos' es un equivalente breve y reconocible en español, sin forzar precisión técnica no segura.
- source_word: הָאַשָּׁפִים
  english_pob_choice: and enchanters
  chosen_spanish: y encantadores
  alternatives_spanish:
  - y hechiceros
  - y adivinos
  lexicon: HALOT
  rationale: El segundo término pertenece también al ámbito de especialistas babilónicos en prácticas ocultas; 'encantadores' distingue el grupo del anterior sin imponer una identificación más específica que la evidencia no asegura.
- source_word: אֲשֶׁר בְּכָל מַלְכוּתוֹ
  english_pob_choice: who were in all his kingdom
  chosen_spanish: que había en todo su reino
  alternatives_spanish:
  - que estaban en todo su reino
  - que estaban por todo su reino
  lexicon: HALOT
  rationale: La frase sitúa a estos especialistas en la extensión del reino. 'Había en todo su reino' fluye bien en español y mantiene el alcance territorial.
theological_decisions:
- issue: Términos de saber oculto en Babilonia sin suavizar el contraste con la sabiduría dada por Dios
  english_pob_reading: magicians and enchanters
  chosen_spanish_reading: magos y encantadores
  alternative_spanish_readings:
  - magos y astrólogos
  - hechiceros y encantadores
  rationale: El versículo compara la superioridad concedida a Daniel y sus compañeros frente a los sabios cortesanos de Babilonia. Se conserva un léxico de prácticas ocultas o cortesanas sin aclararlo en exceso, para no borrar el contraste histórico-teológico del pasaje.
  doctrine_reference: Transparencia léxica y conservación del trasfondo histórico-literario
- issue: Representación del modismo numérico de superioridad
  english_pob_reading: ten times better
  chosen_spanish_reading: diez veces superiores
  alternative_spanish_readings:
  - diez veces mejores
  - superiores en diez veces
  rationale: El hebreo usa un modismo intensivo ('diez manos'). La versión española mantiene la imagen de superioridad cuantificada sin reducirla a una mera comparación subjetiva.
  doctrine_reference: Respeto por idiomatismos hebreos y por la tensión expresiva del texto
- issue: Valor de בקש con מן en contexto de examen real
  english_pob_reading: that the king asked of them
  chosen_spanish_reading: que el rey les pidió
  alternative_spanish_readings:
  - que el rey les solicitó
  - que el rey les requirió
  rationale: En este contexto no es sólo 'preguntar' sino pedir/solicitar una respuesta o evaluación. 'Les pidió' refleja el acto de requerimiento sin introducir una categoría técnica ajena.
  doctrine_reference: Precisión contextual del verbo hebreo
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se conservó la lectura idiomática de עֶשֶׂר יָדוֹת como superioridad intensiva, y se mantuvo la distinción entre dos clases de sabios de corte sin precisar más allá de lo seguro. No hubo revisiones previas adicionales que afectaran esta decisión.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando aparezca el nombre divino; aquí no aplica.
  - Se evitó 'SEÑOR' por convención de máscara, conforme a la política del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Magos'' y ''encantadores'' conservan el registro de especialistas cortesanos sin trasladarlo a terminología eclesiástica tradicional.'
  - '''Halló'' y ''superiores'' mantienen el tono evaluativo del hebreo y de la traducción auditada en inglés.'
