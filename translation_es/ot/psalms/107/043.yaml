revisions:
- from: ¿Quién es sabio? Que guarde[a] estas cosas[b], y que ellos consideren[c] las misericordias de Yahvé.
  to: ¿Quién es sabio? Que guarde estas cosas[a], y que consideren[b] los actos de amor fiel[c] de Yahvé.
  rationale: 'Se revisa para alinear mejor חסד con la decisión léxica documentada en inglés («steadfast love») y con la teología del amor leal de pacto, evitando la reducción semántica de «misericordias». También se elimina el pronombre explícito «ellos» para un español más natural sin perder el cambio singular/plural del hebreo. Las notas se reordenan para reflejar mejor la auditoría: cambio de número, alternativa de formulación y plural hebreo de חַסְדֵי.'
