translation:
  language: es
  text: Desde los cielos Yahvé mira[a]; ve a todos los hijos del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad» o «todo el género humano»; el hebreo dice literalmente «todos los hijos del hombre», una expresión poética para los seres humanos en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁמַיִם
  english_pob_choice: From heaven
  chosen_spanish: Desde los cielos
  alternatives_spanish:
  - Desde el cielo
  - Desde el firmamento
  lexicon: HALOT
  rationale: El hebreo usa una expresión de origen con מִן y שָׁמַיִם en plural formal; en español, «desde los cielos» conserva mejor la imagen poética y la amplitud del plural hebreo que un singular más idiomático.
- source_word: הִבִּיט
  english_pob_choice: looks
  chosen_spanish: mira
  alternatives_spanish:
  - mira fijamente
  - observa
  - contempla
  lexicon: HALOT
  rationale: El verbo expresa una mirada dirigida. «Mira» mantiene la acción presente y la naturalidad en español, sin perder el sentido de atención intencional que el contexto poético requiere.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración castellana estándar del Tetragrámaton, conforme a la política del proyecto de no sustituirlo por un título como «SEÑOR».
- source_word: רָאָה
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - ve claramente
  - ve con atención
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía comunica una verdad general o continua; en español, el presente «ve» preserva ese valor gnómico mejor que un pasado.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: Con un complemento plural colectivo, «todos» comunica de forma natural el alcance total del verbo sin alterar el sentido inclusivo.
- source_word: בְּנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los hijos de Adán
  - la humanidad
  - los seres humanos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea masculina representativa del original. «Hijos del hombre» reproduce la estructura poética y la tensión lexical del hebreo, mientras el sentido colectivo queda claro por el contexto y por la nota.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que se mantiene el nombre propio divino. «Yahvé» sigue la convención española del proyecto y evita la sustitución por una designación genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor colectivo de בְּנֵי הָאָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos de Adán
  rationale: Aunque el giro es masculino, funciona como expresión colectiva para la humanidad. La traducción principal mantiene la forma del hebreo y la nota puede explicitar el alcance colectivo sin borrar la imagen original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam → man / humankind (context)'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión disponible: no se registraron cambios aplicados y el control de concordancia reporta acuerdo alto; por ello se conserva la lectura directa del hebreo sin ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política del proyecto para יהוה.
  - Se mantiene el masculino representativo de בְּנֵי הָאָדָם en el texto principal, con aclaración colectiva en nota.
  - La puntuación reproduce una pausa poética natural en español mediante punto y coma.
