translation:
  language: es
  text: Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo de habla en fórmula narrativa divina se expresa naturalmente en español con «habló». Mantiene el avance narrativo del waw consecutivo y conserva el carácter formal de la fórmula de introducción al discurso. «Dijo» es posible, pero aquí suena menos específico junto con לֵאמֹר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como transliteración en español, conforme al criterio del proyecto, en vez de sustituirlo por un título. «Yahvé» conserva la referencia al Tetragrámaton y la continuidad con el audit trail en inglés.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla. En español, «a» es la equivalencia más natural y precisa para marcar el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar, plenamente reconocible y fiel a la convención de traducción.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La construcción fija que introduce discurso directo se rinde de forma transparente con «diciendo», que preserva la estructura hebrea y prepara la cita siguiente. «Y dijo» añadiría un verbo no presente en el hebreo; «para decir» no encaja bien en español aquí.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, no un título. En español se adopta «Yahvé» para preservar el nombre revelado y evitar la sustitución tradicional por una perífrasis. Esto coincide con la decisión doctrinal del POB en inglés y con el principio de transparencia del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente indicada (sin cambios), y con el cotejo de alta concordancia: no se requieren ajustes textuales adicionales para esta unidad.'
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé», coherente con el criterio del proyecto para יְהוָה.
  - «Diciendo» mantiene la fórmula hebrea de introducción al discurso sin sobreinterpretarla.
  - La puntuación con coma final refleja que el versículo introduce el habla directa del siguiente versículo.
