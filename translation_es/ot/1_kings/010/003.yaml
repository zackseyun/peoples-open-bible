translation:
  language: es
  text: Y Salomón le explicó todas sus palabras[a]; no hubo nada oculto al rey que no le contara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «todas sus palabras» o «todos sus asuntos». El hebreo דְּבָרֶיהָ puede referirse a palabras o asuntos; en este contexto apunta a lo que la reina le planteó a Salomón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  english_pob_choice: told
  chosen_spanish: le contó
  alternatives_spanish:
  - le dijo
  - le declaró
  - le explicó
  lexicon: HALOT
  rationale: El verbo hebreo נגד puede abarcar 'contar', 'decir' o 'declarar'. En este contexto narrativo, con la reina presentando palabras/preguntas para probar a Salomón, 'le contó' comunica bien la acción de responder verbalmente sin forzar una paráfrasis demasiado interpretativa.
- source_word: דְּבָרֶיהָ
  english_pob_choice: her words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus asuntos
  - sus asuntos/preguntas
  - sus dichos
  lexicon: HALOT
  rationale: 'דבר tiene un campo semántico amplio: palabra, asunto, cosa. El inglés POB conservó ''her words'' para no estrechar demasiado el hebreo; en español ''sus palabras'' mantiene esa amplitud mejor que ''sus preguntas'', que sería más interpretativo.'
- source_word: לֹא הָיָה דָּבָר נֶעְלָם
  english_pob_choice: there was nothing hidden
  chosen_spanish: no hubo nada oculto
  alternatives_spanish:
  - no hubo cosa oculta
  - nada quedó oculto
  - no hubo nada escondido
  lexicon: HALOT
  rationale: La construcción hebrea expresa que no existió nada oculto. 'No hubo nada oculto' reproduce con naturalidad el sentido y conserva la imagen de ocultamiento, sin añadir una explicación ajena al texto.
- source_word: נֶעְלָם
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - encubierto
  lexicon: HALOT
  rationale: El participio nifal de עלם indica algo oculto o velado. 'Oculto' es una equivalencia natural en español y mantiene la idea de que nada quedó fuera del alcance del rey.
- source_word: מִן הַמֶּלֶךְ
  english_pob_choice: from the king
  chosen_spanish: al rey
  alternatives_spanish:
  - del rey
  - para el rey
  - ante el rey
  lexicon: HALOT
  rationale: Aunque el hebreo usa מן, el giro idiomático en español con el verbo 'ocultar' suele expresarse como 'oculto al rey'. Eso conserva la relación semántica del original sin sonar forzado.
- source_word: אֲשֶׁר לֹא הִגִּיד לָהּ
  english_pob_choice: that he did not tell her
  chosen_spanish: que no le contara
  alternatives_spanish:
  - que no le dijo
  - que no le declaró
  - que no le explicó
  lexicon: HALOT
  rationale: 'La cláusula relativa aclara el alcance de lo no oculto: no hubo asunto que el rey no le comunicara. ''No le contara'' mantiene la relación verbal del hebreo y la fluidez natural del español.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que prefirió 'told her all her words' frente a una lectura más interpretativa como 'answered all her questions'. Por eso el español conserva 'sus palabras' y evita estrechar el hebreo a 'preguntas'. También se mantuvo la cláusula final con un equivalente cercano al audit trail inglés, sin ampliar el sentido.
  spanish_consistency_notes:
  - Se mantiene 'Salomón' como nombre propio y 'rey' para el sustantivo מלך.
  - Se conservó una equivalencia amplia para דבר ('palabras'), en línea con la decisión auditada de no reducirlo a 'preguntas'.
  - La preposición hebrea מן se vertió de modo idiomático en español con 'al rey' dentro de la construcción 'oculto al rey'.
