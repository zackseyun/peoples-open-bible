lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el que
  lexicon: HALOT
  rationale: Introducción de una cláusula relativa que retoma al antecedente personal del v. 1; en español, 'que' resulta natural y suficientemente preciso sin añadir énfasis innecesario.
- source_word: נִשְׁבַּע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - prestó juramento
  - hizo juramento
  lexicon: HALOT
  rationale: El verbo denota prestar juramento; 'juró' conserva la fuerza solemne y el paralelismo con 'prometió' en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino conforme al estándar del proyecto. La preposición con el verbo de jurar en español se expresa naturalmente con 'a'.
- source_word: נָדַר
  english_pob_choice: vowed
  chosen_spanish: prometió
  alternatives_spanish:
  - votó
  - hizo voto
  lexicon: HALOT
  rationale: נדר expresa hacer un voto; 'prometió' comunica bien la intención vinculante en español moderno. 'Votó' puede sonar arcaico o ambiguo fuera de contexto litúrgico.
- source_word: לַאֲבִיר
  english_pob_choice: to the Mighty One
  chosen_spanish: al Poderoso
  alternatives_spanish:
  - al Fuerte
  - al Poderoso de
  lexicon: HALOT
  rationale: אֲבִיר es un título divino de fuerza/poder. 'Poderoso' preserva el tono elevado y evita una expansión innecesaria; la nota recoge la posibilidad de entender la expresión completa como título tradicional.
- source_word: יַעֲקֹב
  english_pob_choice: of Jacob
  chosen_spanish: de Jacob
  alternatives_spanish:
  - de Yaacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su forma usual en español bíblico; funciona como complemento del título divino 'el Poderoso de Jacob'.
theological_decisions:
- issue: Tratamiento del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo nombra directamente a יהוה; el proyecto pide reflejar el nombre divino en la línea principal. En español, 'Yahvé' es la forma estándar adoptada por el proyecto para preservar el nombre del pacto sin ocultarlo tras un sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado conserva el paralelismo verbal ('swore' / 'vowed') y elimina una coma innecesaria antes de 'and'; el español refleja ese mismo paralelismo con 'juró' / 'prometió' y mantiene una sintaxis fluida sin añadir puntuación que rompa la coordinación.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de una sustitución reverencial como «SEÑOR», conforme al estándar del proyecto.
  - «Poderoso de Jacob» conserva la estructura del título divino sin forzar una expansión interpretativa; la colocación del artículo queda implícita por la construcción española.
  - El relativo inicial «que» es suficientemente natural en español y preserva la relación con el antecedente personal del versículo anterior.
