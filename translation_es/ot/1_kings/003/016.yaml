translation:
  language: es
  text: Entonces llegaron al rey dos mujeres que eran prostitutas, y se pusieron delante de él.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «dos prostitutas llegaron al rey y se pusieron delante de él». El participio hebreo זֹנוֹת puede traducirse directamente como «prostitutas» o de manera más explícita como «mujeres que eran prostitutas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal y narrativa que enlaza este episodio con el anterior. «Entonces» conserva la secuencia natural en español sin añadir matices no presentes en el hebreo.
- source_word: תָּבֹאנָה
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia el rey; «llegaron» comunica bien ese arribo en español contemporáneo y mantiene el valor narrativo simple del perfecto en contexto pasado.
- source_word: שְׁתַּיִם נָשִׁים
  english_pob_choice: two women
  chosen_spanish: dos mujeres
  alternatives_spanish:
  - dos mujeres
  - dos señoras
  lexicon: HALOT
  rationale: Construcción numeral+sustantivo directa. «Mujeres» es la equivalencia natural y fiel; no se requiere inversión ni expansión.
- source_word: זֹנ֖וֹת
  english_pob_choice: who were prostitutes
  chosen_spanish: '[a]'
  alternatives_spanish:
  - prostitutas
  - mujeres que eran prostitutas
  lexicon: HALOT
  rationale: El participio describe la condición de las mujeres. En español, la opción más directa es «prostitutas», pero el texto puede ganar fluidez con una nota que preserve la alternativa más literal «mujeres que eran prostitutas», tal como lo hace el POB inglés al documentar ambas posibilidades.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - ante el rey
  lexicon: HALOT
  rationale: אֶל señala dirección; «al rey» conserva ese valor básico. La escena judicial se completa luego con la postura ante él, por lo que no es necesario trasladar aquí «ante» al cuerpo principal.
- source_word: וַתַּעֲמֹדְנָה
  english_pob_choice: and stood
  chosen_spanish: y se presentaron
  alternatives_spanish:
  - y estuvieron de pie
  - y se mantuvieron en pie
  lexicon: HALOT
  rationale: Aunque el verbo base es «estar de pie», en contexto de comparecencia ante una autoridad «se presentaron» comunica mejor la función pragmática del gesto sin negar el sentido del hebreo. Se evita sobrecargar con una imagen meramente física.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: Idiomático para comparecer ante un superior o juez. «Delante de él» es claro y neutral en español; «ante él» también sería posible, pero «delante de él» mantiene la sencillez del registro narrativo.
theological_decisions:
- issue: Tratamiento del término para la actividad sexual/comercial de las mujeres
  english_pob_reading: The Hebrew participle זֹנוֹת can be rendered directly as 'prostitutes' or more explicitly as 'women who were prostitutes.'
  chosen_spanish_reading: «prostitutas» en el texto, con posibilidad de glosa «mujeres que eran prostitutas»
  alternative_spanish_readings:
  - mujeres que eran prostitutas
  - rameras
  rationale: No hay necesidad de atenuar ni de moralizar el término. La forma española «prostitutas» transmite la fuerza léxica con suficiente claridad; la alternativa perifrástica conserva la misma tensión semántica que el POB inglés documenta.
  doctrine_reference: Lexical transparency; no doctrinal issue
- issue: Escena de comparecencia real/judicial
  english_pob_reading: and stood before him
  chosen_spanish_reading: y se presentaron delante de él
  alternative_spanish_readings:
  - y estuvieron delante de él
  - y comparecieron ante él
  rationale: En español, «se presentaron delante de él» comunica la comparecencia formal ante el rey sin añadir un matiz técnico no explicitado por el hebreo. Mantiene la escena narrativa y judicial implícita.
  doctrine_reference: Narrative pragmatics; no doctrinal issue
translation_notes:
  revision_awareness: Se siguió de cerca la lectura auditada del inglés POB, preservando la alternativa léxica documentada para זֹנוֹת y manteniendo la progresión narrativa del hebreo. No se detectaron revisiones posteriores que afectaran esta unidad; el estado de acuerdo alto sugiere que la formulación base es estable.
  spanish_consistency_notes:
  - Se usa «rey» para הַמֶּלֶךְ conforme al contexto narrativo sin mayúsculas honoríficas innecesarias.
  - «Entonces» mantiene la relación temporal con la escena previa sin introducir información adicional.
  - Se evita «harlots/rameras» por registro arcaico; «prostitutas» es claro y fiel en español contemporáneo.
