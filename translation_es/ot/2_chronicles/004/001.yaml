translation:
  language: es
  text: Hizo un altar de bronce[a], de veinte codos de largo, de veinte codos de ancho y de diez codos de alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un altar de latón». El hebreo נְחֹשֶׁת puede traducirse «bronce», «cobre» o, tradicionalmente, «latón»; se prefiere «bronce» en español moderno para el mobiliario del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción sucesiva en pasado. En español, «hizo» comunica con naturalidad la acción sin sobrecargar el texto con una conjunción innecesaria.
- source_word: מִזְבַּח
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - sacrificio
  - altar de sacrificio
  lexicon: HALOT
  rationale: El sustantivo designa el altar cultual; «altar» es el equivalente normal y fiel en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  - brass
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa en contexto de mobiliario del templo, «bronce» es la opción más precisa y natural en español moderno. «Latón» o «cobre» no expresan tan bien el uso cultual y material del término.
- source_word: עֶשְׂרִים אַמָּה
  english_pob_choice: twenty cubits
  chosen_spanish: de veinte codos
  alternatives_spanish:
  - veinte codos
  - veinte codos de largo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para mantener la correspondencia formal con el hebreo y con la tradición de medidas bíblicas.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: de largo
  alternatives_spanish:
  - su largo
  - en longitud
  lexicon: HALOT
  rationale: En español, después de la medida principal, «de largo» suena más natural que una frase nominal posesiva, aunque mantiene el sentido dimensional del hebreo.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: de ancho
  alternatives_spanish:
  - su ancho
  - en anchura
  lexicon: HALOT
  rationale: «De ancho» es el término arquitectónico más idiomático en español para la dimensión horizontal.
- source_word: קוֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: de alto
  alternatives_spanish:
  - su altura
  - en altura
  lexicon: HALOT
  rationale: En un objeto arquitectónico, «de alto» comunica la medida de manera más natural que «altura», sin perder el contenido del hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; se mantuvo el contenido y la decisión léxica de «bronze». La redacción española sigue esa misma línea, adaptando la sintaxis a un español natural sin alterar el sentido ni la medida.
  spanish_consistency_notes:
  - Se mantuvo «bronce» para נְחֹשֶׁת en coherencia con la preferencia del POB inglés y con el uso técnico moderno.
  - Se conservaron las unidades antiguas («codos») para evitar una conversión interpretativa.
  - La frase dimensional se reorganizó con preposiciones idiomáticas en español («de largo», «de ancho», «de alto») sin perder correspondencia con el hebreo.
