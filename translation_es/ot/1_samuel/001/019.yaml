  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; ידע conservado como «conoció» con nota explicativa; השתחוה expresado como gesto corporal («se postraron»). La principal falla no es terminológica sino de implementación de notas: se perdió la nota sobre זכר y se colocó una nota desalineada sobre «Yahvé».'
