  to: Oí, y mis entrañas temblaron; al sonido mis labios se estremecieron. La podredumbre entra en mis huesos, y debajo de mí tiemblo, mientras espero en silencio[a] el día de la angustia, ante la venida del pueblo que nos invadirá[b].
