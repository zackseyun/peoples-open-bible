translation:
  language: es
  text: 'También les decía a los discípulos: «Había un hombre rico que tenía un administrador[a], y este hombre fue acusado ante él[b] de derrochar sus bienes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mayordomo». οἰκονόμος nombra a una persona encargada de la administración de una casa o patrimonio.
    reason: lexical_alternative
  - marker: b
    text: O «se le informó» o «fue denunciado ante él». El verbo puede referirse a una acusación o a un informe adverso, no necesariamente a un cargo ya probado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: estaba hablando
  alternatives_spanish:
  - decía
  - seguía hablando
  lexicon: BDAG
  rationale: El imperfecto describe una acción en curso o de encuadre narrativo. «Estaba hablando» conserva ese valor progresivo sin sonar forzado en español.
- source_word: δὲ καὶ
  english_pob_choice: He was also saying
  chosen_spanish: Él también estaba hablando
  alternatives_spanish:
  - Y también estaba hablando
  - Entonces también estaba hablando
  lexicon: BDAG
  rationale: δὲ marca transición y καί añade «también». «Él también» mantiene la continuidad con el sujeto implícito del contexto y refleja ambos matices.
- source_word: πρὸς τοὺς μαθητάς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - para los discípulos
  - hacia los discípulos
  lexicon: BDAG
  rationale: La dirección relacional del dativo se expresa naturalmente con «a». No hay posesivo explícito en griego, por eso se evita añadir «sus».
- source_word: Ἄνθρωπός τις ἦν πλούσιος
  english_pob_choice: There was a certain rich man
  chosen_spanish: Había un hombre rico
  alternatives_spanish:
  - Había cierto hombre rico
  - Había un hombre adinerado
  lexicon: BDAG
  rationale: La fórmula narrativa introduce un personaje indefinido pero concreto. En español, «Había un hombre rico» reproduce bien esa función sin recargar con un calco de «cierto».
- source_word: οἰκονόμον
  english_pob_choice: manager
  chosen_spanish: administrador
  alternatives_spanish:
  - mayordomo
  - encargado de la hacienda
  lexicon: BDAG
  rationale: οἰκονόμος designa a quien administra una casa o patrimonio. «Administrador» es claro y fiel; «mayordomo» queda como alternativa tradicional más cargada culturalmente.
- source_word: οὗτος διεβλήθη αὐτῷ
  english_pob_choice: this man was accused to him
  chosen_spanish: este hombre fue acusado ante él
  alternatives_spanish:
  - este hombre fue denunciado ante él
  - le fue hecho un cargo a este hombre
  lexicon: BDAG
  rationale: El pasivo de διαβάλλω puede expresar acusación, denuncia o informe adverso. «Fue acusado ante él» preserva el sentido formal de una imputación sin decidir más de lo que el texto exige; «ante él» refleja el destinatario de la información.
- source_word: ὡς διασκορπίζων
  english_pob_choice: of squandering
  chosen_spanish: de derrochar
  alternatives_spanish:
  - de despilfarrar
  - de malgastar
  lexicon: BDAG
  rationale: Con ὡς + participio, la frase expresa el contenido o base de la acusación. «Derrochar» comunica bien el desperdicio de recursos en español contemporáneo y conserva la fuerza económica del término.
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  english_pob_choice: his possessions
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - su propiedad
  lexicon: BDAG
  rationale: τὰ ὑπάρχοντα se refiere a lo que posee alguien, en contexto patrimonial. «Bienes» es amplio y natural en español jurídico y narrativo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: conserva el imperfecto narrativo, la introducción parabólica del «hombre rico», el matiz de οἰκονόμος como administrador y la acusación indirecta de διαβάλλω sin intensificarla a una condena formal. Se evita añadir posesivos no presentes y se usa un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «discípulos» sin posesivo porque el griego dice simplemente τοὺς μαθητάς.
  - Se prefirió «administrador» por claridad contemporánea; la nota preserva «mayordomo» como alternativa tradicional.
  - «Fue acusado ante él» deja abierta la posibilidad de denuncia o informe adverso, en línea con el rango semántico del verbo griego.
  - «Derrochar» traduce el despilfarro de bienes en un registro natural, sin perder el sentido económico de διασκορπίζω.
