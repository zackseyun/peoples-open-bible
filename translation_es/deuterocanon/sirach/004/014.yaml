translation:
  language: es
  text: Los que le ministran, ministran al Santo[a], y Dios ama a los que aman su morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y el Señor ama a los que la aman». El hebreo aquí parece conservar una lectura más difícil relacionada con su morada/estancia.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְשָׁרְתֵי / מְשָׁרְתֶיהָ
  english_pob_choice: minister / minister to her
  chosen_spanish: ministran / ministrar a ella
  alternatives_spanish:
  - sirven / servirla
  - atienden / atenderla
  lexicon: HALOT
  rationale: שרת expresa servicio o asistencia de carácter oficial o sagrado. En español, «ministrar» conserva ese registro elevado y cultual mejor que «servir», y refleja el paralelo griego con λατρεύοντες / λειτουργήσουσιν.
- source_word: קֹדֶשׁ
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - la santidad
  - algo santo
  - el santuario
  lexicon: HALOT
  rationale: La expresión hebrea es breve y algo elíptica. En consonancia con el griego ἁγίῳ y con el matiz sacro del contexto, «el Santo» comunica de forma idiomática una referencia sagrada sin reducirla a un abstracto.
- source_word: וֵאלֹהִים
  english_pob_choice: and God
  chosen_spanish: y Dios
  alternatives_spanish:
  - y el Señor
  lexicon: HALOT
  rationale: El hebreo dice explícitamente אֱלֹהִים. Por eso se mantiene «Dios» en vez de «el Señor», aunque el paralelo griego tenga ὁ κύριος.
- source_word: בֵּית [מוֹשָׁבָהּ אָהֵב]
  english_pob_choice: loves those who love her dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - la casa de su morada
  - a los que aman a ella
  - su habitación
  lexicon: HALOT
  rationale: El testimonio hebreo transmitido parece conservar lenguaje de «casa/morada», aunque el pasaje es textualmente difícil. En español, «su morada» mantiene ese campo semántico de manera natural y breve, sin borrar la incertidumbre textual.
- source_word: אָהֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - quiere
  - tiene afecto por
  lexicon: HALOT
  rationale: אהב se traduce normalmente por «amar». Se conserva la repetición de amor para reflejar la simetría retórica del verso.
theological_decisions:
- issue: Título divino en el segundo miembro
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  rationale: El testimonio hebreo principal lee אֱלֹהִים; por eso la traducción sigue «Dios». Se preserva la alternativa «el Señor» solo como eco del griego, pero no como texto principal.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; términos controvertidos para κύριος y אֱלֹהִים'
- issue: Objeto del amor divino
  english_pob_reading: those who love her dwelling
  chosen_spanish_reading: los que aman su morada
  alternative_spanish_readings:
  - los que la aman
  - los que aman a ella
  rationale: El hebreo parece preservar una lectura más difícil con lenguaje de morada/casa, mientras que el griego ofrece una forma más lisa. Se mantiene la lectura más ardua en el texto principal para no borrar la evidencia hebrea.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones textuales; PHILOSOPHY.md sobre transparencia y incertidumbre de la fuente'
translation_notes:
  revision_awareness: Se siguió el borrador inglés auditado y la preferencia del hebreo principal para Sirácida, manteniendo la tensión textual entre el hebreo y el paralelo griego sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, en coherencia con la política de primacía del hebreo.
  - Se empleó «el Santo» para קֹדֶשׁ, siguiendo el valor sacro señalado por el paralelo griego.
  - Se conservó un registro elevado con «ministrar» para reflejar el servicio cultual.
  - La nota al pie recoge explícitamente la variante griega y la dificultad del hebreo.
