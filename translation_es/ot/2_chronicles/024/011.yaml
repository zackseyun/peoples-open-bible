revisions:
- from: Y siempre que los levitas llevaban el arca[a] al encargo del rey, y cuando veían que el dinero era mucho, el escriba del rey y el funcionario del sumo sacerdote entraban, vaciaban el arca, la llevaban y la devolvían a su lugar. Así hacían de día en día[b], y reunían dinero en abundancia.
  to: Y siempre que los levitas llevaban el cofre[a] a la supervisión del rey, y cuando veían que había mucho dinero, el escriba del rey y el funcionario del sumo sacerdote venían, vaciaban el cofre, lo llevaban y lo devolvían a su lugar. Así lo hacían día tras día[b], y reunían dinero en abundancia.
  rationale: Se cambió ‘arca’ por ‘cofre’ para reflejar la decisión contextual principal y evitar una confusión teológica innecesaria con el arca del pacto, conservando ‘arca’ como alternativa más literal en nota. Se sustituyó ‘al encargo del rey’ por ‘a la supervisión del rey’ para expresar mejor el sentido administrativo de פְּקֻדַּת הַמֶּלֶךְ. Se corrigió ‘entraban’ a ‘venían’ para ajustarse al verbo hebreo. También se pulió la fluidez con ‘día tras día’ y con pronombres más naturales (‘lo llevaban’).
