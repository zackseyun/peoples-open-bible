  text: וְ/גַם אֲנִ֞י נָתַ֧תִּי אֶתְ/כֶ֛ם נִבְזִ֥ים וּ/שְׁפָלִ֖ים לְ/כָל הָ/עָ֑ם כְּ/פִ֗י אֲשֶׁ֤ר אֵֽינְ/כֶם֙ שֹׁמְרִ֣ים אֶת דְּרָכַ֔/י וְ/נֹשְׂאִ֥ים פָּנִ֖ים בַּ/תּוֹרָֽה־־־׃פ
