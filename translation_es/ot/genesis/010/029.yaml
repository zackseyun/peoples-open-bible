  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי puede abarcar 'descendientes', pero aquí la lista inmediata de nombres propios favorece 'hijos de', que reproduce mejor la relación familiar directa del texto.
- source_word: יָקְטָן
  english_pob_choice: Joktan
