translation:
  language: es
  text: Y destacaron allí una fuerza para guardarlo[a], y fortificaron la ciudadela para guardar Bethsura[b], a fin de que el pueblo tuviera una fortaleza frente a Idumea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ordenaron que hubiera allí una fuerza para guardarlo». El verbo griego puede significar «ordenar» o «asignar», pero en este contexto militar probablemente implica destinar tropas a un puesto.
    reason: lexical_alternative
  - marker: b
    text: Bethsura era un sitio fortificado al sur de Jerusalén, estratégicamente situado hacia Idumea.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπέταξαν
  english_pob_choice: they stationed
  chosen_spanish: apostaron
  alternatives_spanish:
  - destacaron
  - establecieron
  - ordenaron
  lexicon: LSJ
  rationale: En este contexto militar, el griego con δύναμιν y τηρεῖν no suena a un simple ‘ordenar’ abstracto, sino a asignar tropas a un puesto. ‘Apostaron’ comunica en español la colocación de una fuerza en guardia y preserva el matiz militar.
- source_word: δύναμιν
  english_pob_choice: a force
  chosen_spanish: una fuerza
  alternatives_spanish:
  - tropas
  - una guarnición
  - una fuerza armada
  lexicon: LSJ
  rationale: El término puede referirse a una unidad militar o a una fuerza armada. ‘Una fuerza’ mantiene amplitud y concisión, sin añadir más precisión de la que exige el texto.
- source_word: τηρεῖν
  english_pob_choice: to guard
  chosen_spanish: guardar
  alternatives_spanish:
  - vigilar
  - custodiar
  - mantener
  lexicon: LSJ
  rationale: Aquí τηρεῖν tiene sentido de custodiar militarmente un lugar. ‘Guardar’ es fiel y natural en español, y funciona en ambas ocurrencias del versículo.
- source_word: ὠχύρωσαν
  english_pob_choice: they fortified
  chosen_spanish: lo fortificaron
  alternatives_spanish:
  - lo hicieron seguro
  - lo укрепaron
  - lo reforzaron
  lexicon: LSJ
  rationale: El verbo expresa hacer un lugar defensivamente fuerte. ‘Fortificaron’ conserva el valor militar y arquitectónico del griego.
- source_word: τὴν Βαιθσουρά
  english_pob_choice: Bethsura
  chosen_spanish: Bethsura
  alternatives_spanish:
  - Bet-zur
  - Bet Zur
  lexicon: LSJ
  rationale: Es un topónimo transliterado. Se conserva ‘Bethsura’ por cercanía a la forma griega Βαιθσουρά y por consistencia con el registro del POB en nombres propios.
- source_word: τοῦ ἔχειν
  english_pob_choice: so that ... might have
  chosen_spanish: a fin de que ... tuviera
  alternatives_spanish:
  - para que ... tuviera
  - para tener
  - con el fin de que ... tuviera
  lexicon: LSJ
  rationale: La construcción articular con infinitivo expresa finalidad. ‘A fin de que’ reproduce con claridad la intención del pasaje y mantiene el matiz de propósito.
- source_word: ὀχύρωμα
  english_pob_choice: a stronghold
  chosen_spanish: una fortaleza
  alternatives_spanish:
  - un baluarte
  - una plaza fuerte
  - un refugio fortificado
  lexicon: LSJ
  rationale: El sustantivo denota una obra defensiva o lugar fuerte. ‘Fortaleza’ es el equivalente más natural en español y conserva la idea de posición militar defensiva.
- source_word: κατὰ πρόσωπον τῆς Ἰδουμαίας
  english_pob_choice: facing Idumea
  chosen_spanish: frente a Idumea
  alternatives_spanish:
  - frente de Idumea
  - enfrente de Idumea
  - mirando a Idumea
  lexicon: LSJ
  rationale: La expresión idiomática indica posición opuesta o frente a esa región. ‘Frente a Idumea’ es idiomático en español y conserva la relación espacial sin forzar un calco.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de 1 Maccabees 4:61 y el rastro auditado en inglés, conservando la ambigüedad legítima de ἐπέταξαν mediante una nota alternativa, y manteniendo la referencia geográfica de Bethsura/Idumea sin ampliarla más allá de lo sustentado.
  spanish_consistency_notes:
  - Se usa ‘Bethsura’ para el topónimo, coherente con la transliteración griega.
  - Se mantiene ‘Idumea’ como nombre geográfico tradicional y estable en español.
  - ‘Fortaleza’ se emplea para ὀχύρωμα, mientras ‘fortificaron’ traduce el verbo ὠχύρωσαν, evitando confundir el sustantivo con la acción.
  - ‘Guardar’ traduce τηρεῖν en sentido militar, no ‘conservar’ ni ‘obedecer’.
