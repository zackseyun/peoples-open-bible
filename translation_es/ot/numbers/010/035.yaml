translation:
  language: es
  text: 'Cada vez que el arca partía[a], Moisés decía: «¡Levántate, Yahvé, y que se dispersen tus enemigos, y huyan ante ti los que te odian!»[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y sucedía cuando el arca partía»; el hebreo puede expresarse de forma más formal, pero aquí probablemente tiene el sentido de «cada vez que el arca partía».'
    reason: lexical_alternative
  - marker: b
    text: «Levántate» es una apelación para que Yahvé actúe con poder, no una sugerencia de que Dios estuviera literalmente inactivo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי בִּנְסֹעַ
  english_pob_choice: And whenever the ark set out
  chosen_spanish: Y cuando el arca se ponía en marcha[a]
  alternatives_spanish:
  - Y cuando el arca se ponía en camino
  - Y cada vez que el arca salía
  lexicon: HALOT
  rationale: El hebreo con waw + verbo de existencia + infinitivo construye una circunstancia recurrente; en español, «cuando» comunica bien el marco temporal, y «se ponía en marcha» conserva el sentido dinámico de salida/avance sin forzar un calco mecánico.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: El texto hebreo dice simplemente «el arca»; ampliar a «del pacto» añadiría un elemento no expresado aquí.
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Levántate, Yahvé!
  - ¡Surge!
  lexicon: HALOT
  rationale: Es una apelación imperativa dirigida a Yahvé para que actúe con poder. «Levántate» expresa el gesto idiomático de intervenir activamente sin sugerir que Dios estuviera literalmente inactivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme a la convención del POB en español, evitando la sustitución por un título.
- source_word: וְיָפֻצוּ
  english_pob_choice: let your enemies be scattered
  chosen_spanish: y sean dispersados tus enemigos
  alternatives_spanish:
  - y que tus enemigos sean dispersados
  - y dispérsense tus enemigos
  lexicon: HALOT
  rationale: 'El imperfecto con valor volitivo tras la petición se vierte mejor en pasiva exhortativa en español: «sean dispersados» preserva la fuerza jussiva sin añadir un sujeto agente.'
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los enemigos que tienes
  - los que te son enemigos
  lexicon: HALOT
  rationale: Traducción directa del sustantivo plural con sufijo de segunda persona singular.
- source_word: וְיָנֻסוּ
  english_pob_choice: let those who hate you flee
  chosen_spanish: y huyan de delante de ti
  alternatives_spanish:
  - y huyan ante ti
  - y escapen de tu presencia
  lexicon: HALOT
  rationale: El verbo expresa huida; «de delante de ti» reproduce con naturalidad el movimiento de retirada ante la presencia de Yahvé y mantiene el paralelismo del verso.
- source_word: מְשַׂנְאֶיךָ
  english_pob_choice: those who hate you
  chosen_spanish: los que te odian
  alternatives_spanish:
  - los que te aborrecen
  - tus enemigos
  lexicon: HALOT
  rationale: El participio marca a quienes se caracterizan por odiar; «los que te odian» es directo, natural y conserva la fuerza personal de la oposición.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - ante ti
  - de tu presencia
  lexicon: HALOT
  rationale: La expresión espacial del hebreo se mantiene con una fórmula natural en español que sugiere retirada física ante la presencia divina.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del POB de transliterar el Tetragrámaton como «Yahweh», adaptado al uso español como «Yahvé», preservando el nombre personal revelado y evitando una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado mostró alta concordancia (veredicto: agree). Esta redacción sigue ese estado sin introducir expansiones interpretativas nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - Se conserva la estructura volitiva del verso con imperativos/jussivos en español natural.
  - No se amplía «el arca» a «el arca del pacto», en fidelidad al hebreo explícito.
  - Se usa «de delante de ti» para reproducir la imagen espacial del original sin volverla más teológica de lo necesario.
