  to: Sin embargo, en este asunto no creyeron en Yahvé su Dios[a].
  rationale: Se cambia 'no creían' por 'no creyeron' para reflejar mejor el carácter narrativo del reproche en español natural y mantenerse más cerca de la decisión auditada de pasado simple, sin perder el sentido de incredulidad. Se actualiza la nota para concordancia verbal.
