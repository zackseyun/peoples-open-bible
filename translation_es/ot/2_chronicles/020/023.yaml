translation:
  language: es
  text: Entonces los amonitas y los moabitas se levantaron contra los habitantes del monte Seír para consagrarlos a la destrucción[a] y destruirlos; y cuando acabaron con los habitantes de Seír, se ayudaron unos a otros para destruirse mutuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ponerlos bajo proscripción», es decir, dedicarlos a destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  english_pob_choice: rose up against
  chosen_spanish: se levantaron contra
  alternatives_spanish:
  - se pusieron en contra de
  - tomaron posición contra
  lexicon: HALOT
  rationale: En contexto militar, עמד con עַל expresa oposición hostil. «Se levantaron contra» conserva la fuerza adversativa sin sonar rígido ni perder el matiz de acción hostil.
- source_word: בְּנֵי עַמּוֹן וּמוֹאָב
  english_pob_choice: the Ammonites and Moabites
  chosen_spanish: los amonitas y los moabitas
  alternatives_spanish:
  - los hijos de Amón y de Moab
  lexicon: HALOT
  rationale: El valor colectivo étnico se expresa de forma natural en español con gentilicios. «Hijos de Amón y Moab» es más literal, pero menos idiomático para lectura pública.
- source_word: יֹשְׁבֵי הַר שֵׂעִיר
  english_pob_choice: the inhabitants of Mount Seir
  chosen_spanish: los habitantes del monte Seír
  alternatives_spanish:
  - los que habitaban el monte Seír
  - los moradores del monte Seír
  lexicon: HALOT
  rationale: 'יֹשְׁבֵי es un sustantivo participial: «habitantes» comunica bien el sentido y mantiene la referencia geográfica estándar «monte Seír».'
- source_word: לְהַחֲרִים
  english_pob_choice: to devote them to destruction
  chosen_spanish: para entregarlos al anatema
  alternatives_spanish:
  - para consagrarlos a la destrucción
  - para destruirlos por completo
  lexicon: HALOT
  rationale: חרם tiene el trasfondo técnico de poner bajo anatema o ban. «Entregarlos al anatema» conserva ese peso cultual y bélico; se evita reducirlo solo a destrucción ordinaria.
- source_word: וּלְהַשְׁמִיד
  english_pob_choice: to wipe them out
  chosen_spanish: y destruirlos
  alternatives_spanish:
  - y aniquilarlos
  - y exterminarlos
  lexicon: HALOT
  rationale: שׁמד intensifica la acción previa. En español, «destruirlos» mantiene la violencia del verbo sin duplicar demasiado el matiz ya expresado por «anatema».
- source_word: וּכְכַלּוֹתָם
  english_pob_choice: and when they had finished
  chosen_spanish: y cuando acabaron
  alternatives_spanish:
  - y cuando terminaron
  - y al haber acabado
  lexicon: HALOT
  rationale: La construcción temporal con כ + infinitivo indica «cuando/as habían terminado». «Cuando acabaron» es natural y suficientemente preciso en el flujo narrativo.
- source_word: עָזְרוּ אִישׁ בְּרֵעֵהוּ
  english_pob_choice: they helped each other
  chosen_spanish: se ayudaron unos a otros
  alternatives_spanish:
  - cada uno ayudó a su compañero
  - se ayudaron mutuamente
  lexicon: HALOT
  rationale: La expresión distributiva hebrea se vuelve una reciprocidad natural en español. «Unos a otros» conserva el carácter mutuo sin introducir un estilo excesivamente formal.
- source_word: לְמַשְׁחִית
  english_pob_choice: destroy one another
  chosen_spanish: para destruirse mutuamente
  alternatives_spanish:
  - para causarse destrucción unos a otros
  - para destruirse entre sí
  lexicon: HALOT
  rationale: El infinitivo final expresa resultado/propósito dentro de la ayuda recíproca. «Mutuamente» hace explícita la reciprocidad que el hebreo ya insinúa.
theological_decisions:
- issue: Lenguaje de חרם en contexto de guerra santa
  english_pob_reading: to devote them to destruction
  chosen_spanish_reading: para entregarlos al anatema
  alternative_spanish_readings:
  - para consagrarlos a la destrucción
  - para destruirlos por completo
  rationale: La POB en inglés preserva la carga técnico-cultual de חרם. En español, «anatema» es el equivalente más transparente para ese trasfondo y evita rebajar el término a mera violencia militar.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Redundancia intencional de la secuencia destructiva
  english_pob_reading: to devote them to destruction and to wipe them out
  chosen_spanish_reading: para entregarlos al anatema y destruirlos
  alternative_spanish_readings:
  - para entregarlos al anatema y aniquilarlos
  - para destruirlos y aniquilarlos
  rationale: El hebreo acumula dos verbos de destrucción con fuerza distinta. El español conserva la progresión con «anatema» + «destruirlos», evitando una simplificación que borre la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para añadir «to» antes de «destroy one another» por fluidez, sin alterar el sentido. La redacción española ya refleja esa relación infinitiva final con «para destruirse mutuamente», manteniendo la secuencia verbal completa del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Anatema» se usa aquí como término técnico para חרם, coherente con la decisión auditable de la POB en inglés.
  - «Monte Seír» sigue la forma geográfica habitual y evita una paráfrasis como «región montañosa» que sería menos precisa.
