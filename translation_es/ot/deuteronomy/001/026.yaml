translation:
  language: es
  text: Pero ustedes no quisieron subir[a], y se rebelaron contra el mandato de Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «se rebelaron contra la boca de Yahvé su Dios», un modismo que significa resistir o desafiar su mandato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא / אֲבִיתֶם
  english_pob_choice: But you were not willing
  chosen_spanish: Pero no quisisteis
  alternatives_spanish:
  - Y no quisisteis
  - Pero no estuvisteis dispuestos
  lexicon: HALOT
  rationale: אבה expresa voluntad/consentimiento. En español, 'no quisisteis' conserva bien la negativa volitiva sin volverse pesado; 'pero' refleja el contraste narrativo del contexto.
- source_word: לַעֲלֹת
  english_pob_choice: to go up
  chosen_spanish: subir
  alternatives_spanish:
  - ascender
  - ir a subir
  lexicon: HALOT
  rationale: עלה aquí conserva el sentido direccional de 'subir'. 'Subir' es natural en español y mantiene la imagen del movimiento hacia la tierra/altura sin añadir explicación.
- source_word: וַתַּמְרוּ
  english_pob_choice: you rebelled
  chosen_spanish: os rebelasteis
  alternatives_spanish:
  - desafiastéis
  - fuisteis rebeldes
  lexicon: HALOT
  rationale: מרה indica rebelión o desafío contra autoridad. 'Os rebelasteis' es la correspondencia más directa y clara en español.
- source_word: אֶת פִּי
  english_pob_choice: against the command
  chosen_spanish: contra el mandato
  alternatives_spanish:
  - contra la boca
  - contra la palabra
  - contra la orden
  lexicon: HALOT
  rationale: La expresión literal 'la boca de' es idiomática en hebreo para un mandato hablado. En español, 'mandato' comunica esa autoridad sin perder el contenido del dicho divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre divino personal en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: vuestro Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona exige un posesivo plural en español. 'Vuestro' mantiene la referencia comunitaria del pacto.
theological_decisions:
- issue: Expresión idiomática 'rebelarse contra la boca de Yahvé'
  english_pob_reading: Hebrew literally, 'you rebelled against the mouth of the LORD your God,' an idiom meaning to resist or defy his command.
  chosen_spanish_reading: os rebelasteis contra el mandato de Yahvé vuestro Dios
  alternative_spanish_readings:
  - os rebelasteis contra la boca de Yahvé vuestro Dios
  - desobedecisteis a Yahvé vuestro Dios
  rationale: El hebreo usa un antropomorfismo idiomático ('la boca') para referirse a un mandato pronunciado. En el texto principal se expone el sentido idiomático con 'mandato', mientras que la nota conserva la literalidad para no borrar la tensión léxica.
  doctrine_reference: 'DOCTRINE.md: idioms and anthropomorphic expressions; contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción coincide sustancialmente con el último pase auditado: se mantiene la equivalencia óptima, el nombre divino Yahvé y la nota idiomática sobre ''la boca''. No se detectaron cambios necesarios respecto del paquete de revisión más reciente.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para יְהוָה conforme a la terminología del proyecto.
  - '''No quisisteis'' conserva la fuerza volitiva de אבה sin introducir una dureza excesiva.'
  - '''Mandato'' funciona como equivalente idiomático de פִי en este contexto, mientras la nota preserva la literalidad hebrea.'
  - El posesivo 'vuestro' refleja correctamente el sufijo plural de segunda persona.
