translation:
  language: es
  text: Allí, el Dios que vela sobre todos, el santo padre ancestral entre los santos[a], habiendo oído la súplica legítima, azotó al que estaba muy engreído por la insolencia y la audacia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el santo en los lugares santos», si ἐν ἁγίοις se toma de modo locativo y no como «entre los santos».'
    reason: alternative_reading
  - marker: b
    text: El título «padre ancestral» traduce el inusual griego προπάτωρ, que también puede expresarse como «antepasado» o «ancestro».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνταῦθα
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  - En ese lugar
  lexicon: LSJ
  rationale: Adverbio de lugar/transición narrativa; «Allí» conserva la escena sin forzar un valor temporal que el griego no exige.
- source_word: ὁ πάντων ἐπόπτης θεός
  english_pob_choice: the God who watches over all
  chosen_spanish: Dios, el que vela sobre todo
  alternatives_spanish:
  - Dios, el que vigila sobre todo
  - Dios, observador de todo
  lexicon: LSJ
  rationale: ἐπόπτης expresa vigilancia/inspección. «Vela sobre todo» mantiene la idea de cuidado vigilante en español natural y digno.
- source_word: προπάτωρ
  english_pob_choice: forefather
  chosen_spanish: antepasado
  alternatives_spanish:
  - antecesor
  - padre de nuestros padres
  lexicon: LSJ
  rationale: El término es raro y literalmente alude a un ancestro/antepasado. «Antepasado» preserva la relación genealógico-covenantal sin introducir una solemnidad artificial en español.
- source_word: ἅγιος ἐν ἁγίοις
  english_pob_choice: holy ... among the holy ones
  chosen_spanish: santo antepasado entre los santos
  alternatives_spanish:
  - santo entre los santos
  - santo en los santos lugares
  lexicon: LSJ
  rationale: La secuencia es comprimida y ambigua. Se mantiene la lectura personal «entre los santos» como en el POB inglés, evitando imponer un sentido locativo no seguro.
- source_word: εἰσακούσας
  english_pob_choice: heard
  chosen_spanish: habiendo oído
  alternatives_spanish:
  - habiendo escuchado
  - después de oír
  lexicon: LSJ
  rationale: El participio aoristo se vierte con una construcción participial española que refleja mejor la relación subordinada de la acción previa.
- source_word: τῆς ἐνθέσμου λιτανείας
  english_pob_choice: the lawful supplication
  chosen_spanish: la súplica legítima
  alternatives_spanish:
  - la súplica conforme a la ley
  - la petición ordenada
  lexicon: LSJ
  rationale: «Legítima» comunica el sentido de ἔνθεσμος/ἐνθέσμιος como lo establecido, permitido u ordenado, y evita el uso eclesiástico especializado de «letanía».
- source_word: ἐμάστιξεν
  english_pob_choice: scourged
  chosen_spanish: azotó
  alternatives_spanish:
  - flageló
  - castigó con azotes
  lexicon: LSJ
  rationale: El verbo es literalmente golpear con azote/flagelo. «Azotó» conserva la fuerza imagética y es natural en español bíblico contemporáneo.
- source_word: τὸν ὕβρει καὶ θράσει μεγάλως ἐπηρμένον
  english_pob_choice: him who had been greatly puffed up with insolence and boldness
  chosen_spanish: al que había sido grandemente enaltecido por la insolencia y la audacia
  alternatives_spanish:
  - al que había sido muy ensoberbecido con insolencia y osadía
  - al que estaba muy levantado por arrogancia y atrevimiento
  lexicon: LSJ
  rationale: ἐπηρμένον expresa estar «levantado» metafóricamente; en español «enaltecido» conserva la imagen de elevación, pero en contexto irónico de orgullo culpable. ὕβρις y θράσος se vierten como «insolencia» y «audacia» para mantener el par moral del griego.
theological_decisions:
- issue: Título divino raro προπάτωρ aplicado a Dios
  english_pob_reading: forefather / holy forefather among the holy ones
  chosen_spanish_reading: antepasado entre los santos
  alternative_spanish_readings:
  - antecesor entre los santos
  - padre de nuestros padres entre los santos
  rationale: El griego usa un título ancestral poco común para Dios. En español, «antepasado» transmite mejor la relación de origen/covenio sin sonar biológico o mitológico. Se conserva la rareza del título en vez de sustituirlo por una fórmula más tradicional que borraría la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Ambigüedad de ἅγιος ἐν ἁγίοις
  english_pob_reading: holy ... among the holy ones
  chosen_spanish_reading: santo ... entre los santos
  alternative_spanish_readings:
  - santo en los lugares santos
  - Santo en el santuario
  rationale: La frase admite lectura personal o locativa. Se mantiene la lectura personal porque encaja con la cadena de epítetos divinos y evita introducir ‘santuario’ sin apoyo inmediato explícito. La ambigüedad queda abierta en la documentación.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del POB inglés: se prefirió la equivalencia más cercana para προπάτωρ («forefather»), se mantuvo el participio previo a la acción principal con «habiendo oído», y se preservó la ambigüedad real de ἅγιος ἐν ἁγίοις mediante una nota alternativa. El español refleja esas decisiones sin suavizar la rareza del texto griego.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, sin máscara reverencial, conforme al estándar del proyecto.
  - Se evitó «Mesías» y otros títulos no presentes en el versículo.
  - «Súplica legítima» preserva el matiz de orden/legitimidad sin recurrir a «letanía», que en español suena demasiado litúrgico y puede desviar el sentido.
  - «Azotó» mantiene la violencia verbal del verbo griego sin diluirla en un «castigó» genérico.
