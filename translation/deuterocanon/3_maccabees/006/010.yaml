theological_decisions:
- issue: Address term δέσποτα versus more familiar 'Lord' language
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The Greek uses δέσποτα, not κύριος. To preserve lexical transparency and avoid importing covenant-title associations not present in the word itself, 'Master' is preferred here, while acknowledging that 'Sovereign' is also possible in elevated prayer language.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-language primacy; consistency of key terms or documented exception.'
- issue: Sense of ἀποικία in Jewish diasporic prayer
  chosen_reading: the place of our exile
  alternative_readings:
  - our colony
  - our settlement
  - our sojourn
  rationale: A strictly formal 'colony' could mislead modern readers into hearing Greco-Roman political colonization rather than displaced communal existence. The prayer's theological force concerns life away from the homeland under foreign power, so 'the place of our exile' best communicates the sense without undue paraphrase.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy over translation tradition.'
