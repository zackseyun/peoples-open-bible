    rationale: La frase española suena como un modo de trato humillante, mientras que el hebreo habla de no hacer con ellos una acción vergonzosa/indignante. La auditoría inglesa revisada también se inclinó por la idea de un acto vergonzoso, no simplemente un trato deshonroso.
