review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: mandato de acercarse al altar, ofrecer la ofrenda por el pecado y el holocausto, hacer expiación por Aarón y por el pueblo, luego ofrecer la ofrenda del pueblo y hacer expiación por ellos, conforme al mandato de Yahvé. También preserva correctamente el nombre divino como «Yahvé» y la nota léxica sobre חַטָּאת.'
  spanish_quality_summary: 'El español es claro y digno, pero «haz expiación» suena algo rígido y menos idiomático en registro bíblico español que «haz expiación por…» ya usa bien la construcción. La mejora principal es estilística y de fidelidad al matiz de כפר: «haz expiación» puede mantenerse, pero «realiza expiación» no mejora. Más importante, la nota al pie puede afinarse para conservar mejor la formulación del POB inglés: «ofrenda de purificación» es más natural que «ofrenda por la purificación» en español sacrificial. Además, el cierre «tal como Yahvé mandó» es aceptable, pero «tal como Yahvé lo mandó» sería innecesario; no hace falta cambiarlo.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה > «Yahvé», חַטָּאת > «ofrenda por el pecado» con alternativa en nota, עֹלָה > «holocausto». No hay conflicto con los glosarios principales. La única mejora recomendada es ajustar la alternativa de la nota a «ofrenda de purificación», que comunica mejor la opción lexical documentada.'
  issues:
  - severity: medium
    issue: La nota léxica usa «ofrenda por la purificación» como alternativa para חַטָּאת.
    rationale: Aunque comprensible, en español bíblico-sacrificial «ofrenda de purificación» suena más natural y corresponde mejor a la alternativa inglesa «purification offering», evitando una construcción menos idiomática.
  - severity: low
    issue: La formulación global es buena, pero la revisión debe reflejar la nota corregida en el texto final entregado.
    rationale: Como hay una nota anclada en el texto, cualquier ajuste requiere devolver el texto y el arreglo completo de notas de forma coherente.
  revised_spanish_text: 'Entonces Moisés dijo a Aarón: «Acércate al altar, y ofrece tu ofrenda por el pecado[a] y tu holocausto, y haz expiación por ti y por el pueblo. Después ofrece la ofrenda del pueblo, y haz expiación por ellos, tal como Yahvé mandó».'
  revised_footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo חַטָּאת puede referirse a la ofrenda por el pecado, y en algunos contextos enfatiza la purificación de la impureza.
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y natural; solo se ajusta la nota alternativa para que el español exprese con mayor naturalidad y precisión la opción léxica documentada para חַטָּאת.
