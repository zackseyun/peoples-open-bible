    rationale: Aunque no es incorrecta, una formulación como «lazos te rodean» o «hay lazos alrededor de ti» resulta más idiomática y mantiene el sentido de סְבִיבוֹתֶיךָ.
  revised_spanish_text: Por tanto, lazos[a] te rodean, y terror súbito te aterra.
