review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: fórmula profética, caída de los que sostienen a Egipto, humillación de su poder, alcance geográfico de Migdol a Siene, y juicio por la espada dentro de Egipto. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y naturalidad: «sostenedores» suena poco idiomático en español bíblico actual para סֹמְכֵי, y la cláusula final «declara el Señor Yahvé» es menos clara y menos natural que una formulación que preserve ambos elementos de אֲדֹנָי יְהוִה con mejor español.'
  spanish_quality_summary: El texto es comprensible, digno y cercano al original, pero presenta leves asperezas estilísticas. «Los sostenedores de Egipto» resulta forzado; «los que sostienen a Egipto» o «los que apoyan a Egipto» leen mejor. «Declara el Señor Yahvé» también suena algo rígido; «declara el Señor Dios, Yahvé» preserva la distinción y mejora la legibilidad. El resto del verso es natural y suficientemente solemne.
  glossary_alignment: 'Se cumple bien la política principal de usar «Yahvé» para יְהוָה. También se conserva adecuadamente «espada», «orgullo», y el valor locativo de בָהּ. La excepción propuesta está en la combinación אֲדֹנָי יְהוִה: en vez de «Señor Yahvé», conviene «Señor Dios, Yahvé» para representar ambos componentes con mayor claridad en español, sin ocultar el nombre divino.'
  issues:
  - severity: medium
    issue: «Los sostenedores de Egipto» suena poco natural para סֹמְכֵי מִצְרַיִם.
    rationale: Aunque léxicamente posible, «sostenedores» no es la opción más idiomática ni eclesialmente legible en español neutral. El hebreo participial se puede conservar fielmente con «los que sostienen a Egipto», que mantiene el sentido activo sin introducir una interpretación específica.
  - severity: medium
    issue: «Declara el Señor Yahvé» no representa de la manera más clara la combinación אֲדֹנָי יְהוִה.
    rationale: La combinación título + nombre divino puede sonar extraña en español si se traduce linealmente como «Señor Yahvé». «El Señor Dios, Yahvé» conserva ambos elementos, evita ocultar el nombre divino y suena más claro para lectores hispanohablantes.
  revised_spanish_text: 'Así dice Yahvé: Los que sostienen a Egipto caerán, y el orgullo de su fuerza descenderá. De Migdol hasta Siene caerán por la espada dentro de ella, declara el Señor Dios, Yahvé.'
  revision_rationale: Se reemplazó «sostenedores» por «los que sostienen» para una expresión más natural y fiel al participio hebreo. También se ajustó la fórmula final a «el Señor Dios, Yahvé» para representar con mayor claridad אֲדֹנָי יְהוִה en español, manteniendo la política del proyecto de no ocultar el nombre divino.
