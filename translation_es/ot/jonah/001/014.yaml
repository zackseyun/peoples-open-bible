translation:
  language: es
  text: 'Entonces clamaron a Yahvé y dijeron: «Por favor, Yahvé, no permitas que perezcamos a causa de la vida[a] de este hombre, y no pongas sobre nosotros sangre inocente[b], porque tú, Yahvé, has hecho como te agradó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la vida de este hombre»; la frase también puede entenderse como «a causa de este hombre» o «por tomar la vida de este hombre».'
    reason: lexical_alternative
  - marker: b
    text: O, «no nos hagas culpables de sangre inocente» o «no nos cargues con sangre inocente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ אֶל יְהוָה
  english_pob_choice: Then they cried out to Yahweh
  chosen_spanish: Entonces clamaron a Yahvé
  alternatives_spanish:
  - Entonces llamaron a Yahvé
  - Entonces oraron a Yahvé
  lexicon: HALOT
  rationale: קרא אל expresa aquí una apelación urgente dirigida a Dios. «Clamaron» conserva mejor la intensidad, la angustia y el carácter de súplica que «llamaron», y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», según la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: אָנָּה
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Ah
  - Te ruego
  lexicon: HALOT
  rationale: La partícula expresa una súplica urgente. «Por favor» comunica bien la petición en español actual sin perder el tono de ruego.
- source_word: אַל נָא נֹאבְדָה
  english_pob_choice: do not let us perish
  chosen_spanish: no permitas que perezcamos
  alternatives_spanish:
  - no nos dejes perecer
  - no hagas que perezcamos
  lexicon: HALOT
  rationale: La forma volitiva negativa pide que no lleguen a la ruina. «No permitas que perezcamos» es natural en español y conserva la fuerza de la súplica sin sobreespecificar la causalidad.
- source_word: בְּנֶפֶשׁ הָאִישׁ הַזֶּה
  english_pob_choice: on account of this man's life
  chosen_spanish: por la vida de este hombre
  alternatives_spanish:
  - a causa de la vida de este hombre
  - por causa de este hombre
  - por tomar la vida de este hombre
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se entiende como «vida». «Por la vida de este hombre» preserva el sentido básico y evita añadir una interpretación más explícita que el hebreo no exige en la formulación.
- source_word: וְאַל תִּתֵּן עָלֵינוּ דָּם נָקִיא
  english_pob_choice: and do not put innocent blood on us
  chosen_spanish: y no pongas sobre nosotros sangre inocente
  alternatives_spanish:
  - y no nos cargues con sangre inocente
  - y no nos hagas culpables de sangre inocente
  lexicon: HALOT
  rationale: Se mantiene el giro hebreo de «poner sobre» para conservar la imagen de culpa de sangre. «Sangre inocente» reproduce la expresión estable y transparente del original.
- source_word: דָּם נָקִיא
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre de un inocente
  - culpa de sangre inocente
  lexicon: HALOT
  rationale: Es una expresión legal-moral para la derramación injusta de sangre. «Sangre inocente» es la equivalencia directa y reconocible en español bíblico.
- source_word: כִּי אַתָּה יְהוָה
  english_pob_choice: for you, Yahweh
  chosen_spanish: porque tú, Yahvé
  alternatives_spanish:
  - pues tú, Yahvé
  - porque tú, Yahvé, eres
  lexicon: HALOT
  rationale: כִּי introduce el fundamento de la súplica. En español, «porque tú, Yahvé» mantiene la conexión causal y el tono vocativo sin añadir palabras innecesarias.
- source_word: כַאֲשֶׁר חָפַצְתָּ עָשִׂיתָ
  english_pob_choice: have done as you pleased
  chosen_spanish: has hecho como te agradó
  alternatives_spanish:
  - has hecho lo que quisiste
  - has actuado según tu voluntad
  - has hecho como quisiste
  lexicon: HALOT
  rationale: חָפֵץ expresa deseo o agrado, y עָשָׂה indica acción completada. «Como te agradó» conserva la libertad divina del hebreo y es una formulación digna y natural en español.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto usa directamente el Tetragrámaton. Se mantiene su transliteración tradicional del proyecto para preservar el nombre personal de Dios en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si explicitar la culpa de sangre en el texto principal
  english_pob_reading: retain the Hebrew idiom 'do not put innocent blood on us'
  chosen_spanish_reading: conservar el modismo 'no pongas sobre nosotros sangre inocente'
  alternative_spanish_readings:
  - no nos declares culpables de sangre inocente
  - no nos cargues con sangre inocente
  rationale: Se preserva el modismo hebreo para mantener la textura legal-moral del verso. Las versiones más explícitas son interpretativas y quedan mejor como alternativas, no como texto principal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense without unnecessary paraphrase'
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del inglés POB, que precisó בְּנֶפֶשׁ הָאִישׁ הַזֶּה como «on account of this man's life». En español se optó por «por la vida de este hombre», una forma fiel y natural que conserva el valor de נֶפֶשׁ como «vida» y evita sobredeterminar la causalidad. También se mantuvo el tratamiento del Tetragrámaton como nombre propio y el modismo de sangre inocente sin explicitarlo en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה.
  - Se mantuvo «sangre inocente» para דָּם נָקִיא, conservando el modismo legal-moral.
  - «Por favor» y «clamaron» preservan el tono de ruego urgente del hebreo.
  - La estructura de la segunda cláusula conserva el paralelismo de la súplica sin añadir interpretaciones doctrinales ajenas al texto.
