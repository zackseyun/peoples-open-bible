    text: Hebrew 'Benjamin turned behind him.' This may mean he turned back or turned to look behind him.
    reason: lexical_alternative
  - marker: c
    text: Or 'the whole city went up to heaven,' that is, in flames and smoke.
    reason: lexical_alternative
