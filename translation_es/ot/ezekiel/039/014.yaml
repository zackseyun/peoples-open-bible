review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura básica del hebreo y preserva la repetición difícil de עבר con apoyo en nota. También mantiene adecuadamente el sentido de limpieza de la tierra y la secuencia temporal de los siete meses. Sin embargo, hay un problema importante de fidelidad sintáctica y semántica en «que pasarán por la tierra enterrando a los que pasan», porque en español suena a personas vivas que van pasando, mientras que el hebreo, aunque difícil, está acotado por la aposición «los que quedaron sobre la superficie de la tierra», es decir, cadáveres expuestos. Conviene ajustar la formulación y la nota para conservar la dificultad sin producir una lectura engañosa o torpe en español.
  spanish_quality_summary: El texto es generalmente claro y digno, pero «hombres de continuo» resulta algo rígido y poco natural en español actual; además, «a los que pasan» sin complemento crea una ambigüedad demasiado abierta y menos legible que el original. «Harán una búsqueda» es aceptable, aunque «harán una búsqueda minuciosa» quedaría relegado a nota como alternativa. Una revisión menor mejora naturalidad y precisión sin perder el carácter formal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. «Limpiarla» está bien para לְטַהֲרָהּ, preservando la tensión entre limpieza ritual y práctica. «Apartarán» para יבדילו es adecuado. La principal cuestión es estilística/semántica en la repetición de עבר.
  issues:
  - severity: medium
    issue: «hombres de continuo» suena poco idiomático en español actual
    rationale: Aunque reproduce bien el valor de תָמִיד, en español neutral de lectura eclesial suena algo calcado. «hombres asignados continuamente» o «hombres de manera continua» sería más natural, pero puede mantenerse una solución breve si se conserva la nota.
  - severity: high
    issue: «enterrando a los que pasan» induce una lectura incorrecta o muy extraña en español
    rationale: El hebreo es difícil, pero la aposición siguiente identifica a los enterrados como los que quedaron sobre la superficie de la tierra. En español, «los que pasan» suena principalmente a transeúntes vivos. Hay que conservar la repetición léxica con una formulación menos engañosa y una nota revisada.
  - severity: low
    issue: La nota b cita «enterrando a los que pasan por la tierra», pero el texto principal dice solo «a los que pasan»
    rationale: La nota debería corresponder exactamente al anclaje y explicar la repetición de manera más precisa en español.
  revised_spanish_text: Y apartarán hombres de continuo[a], que pasarán por la tierra enterrando a los que pasan por ella[b], es decir, a los que quedaron sobre la superficie de la tierra, para limpiarla. Al cabo de siete meses harán una búsqueda[c].
  revised_footnotes:
