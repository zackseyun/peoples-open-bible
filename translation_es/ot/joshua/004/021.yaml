translation:
  language: es
  text: 'Y les dijo a los hijos de Israel[a]: «Cuando sus hijos[b] pregunten a sus padres en el futuro[c], diciendo: “¿Qué son estas piedras?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «los israelitas». El hebreo dice literalmente «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus hijos». Aquí la expresión puede referirse a la descendencia futura en general.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «mañana», usado idiomáticamente aquí para un tiempo futuro o una generación posterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo introduce la siguiente acción en secuencia. «Y les dijo» conserva el flujo hebreo y la relación verbal sin forzar un giro más interpretativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar y covenantal del hebreo. En español, «hijos de Israel» es más transparente al texto fuente que «israelitas».
- source_word: לֵאמֹר
  english_pob_choice: to introduce direct speech with quotation marks
  chosen_spanish: con comillas de discurso directo
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: En español, la función introductoria del infinitivo se comunica naturalmente con la puntuación de cita; no hace falta repetir «diciendo» en el primer nivel narrativo.
- source_word: אֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - que
  - el cual
  - siempre que
  lexicon: HALOT
  rationale: Aquí introduce una circunstancia futura ligada a la acción siguiente; «Cuando» comunica mejor ese valor temporal que una traducción relacional más literal.
- source_word: יִשְׁאָלוּן
  english_pob_choice: ask
  chosen_spanish: pregunten
  alternatives_spanish:
  - pidan
  - consulten
  lexicon: HALOT
  rationale: El verbo שאל es «preguntar/ask»; en español, «pregunten» expresa con naturalidad la acción de formular una pregunta dentro del contexto familiar.
- source_word: בְּנֵיכֶם
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos e hijas
  - sus niños
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque formalmente es «sus hijos», el contexto sugiere descendencia futura en un sentido familiar. «Sus hijos» preserva la forma y evita ampliar el alcance más de lo que el texto exige.
- source_word: מָחָר
  english_pob_choice: in time to come
  chosen_spanish: en el futuro
  alternatives_spanish:
  - mañana
  - más adelante
  - en tiempos venideros
  lexicon: HALOT
  rationale: El uso idiomático apunta a una generación posterior, no al día siguiente. «En el futuro» es natural en español y conserva la referencia a un tiempo posterior.
- source_word: אֶת אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres
  lexicon: HALOT
  rationale: En el marco inmediato son hijos que preguntan a sus padres; «padres» conserva la escena doméstica. Se evita generalizar a «antepasados» porque el hebreo es más concreto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - y dirán
  lexicon: HALOT
  rationale: El segundo introductorio sí necesita reflejarse explícitamente para marcar el contenido de la pregunta en el discurso citado.
- source_word: מָה הָאֲבָנִים הָאֵלֶּה
  english_pob_choice: What are these stones?
  chosen_spanish: ¿Qué son estas piedras?
  alternatives_spanish:
  - ¿Qué significan estas piedras?
  - ¿Qué son estas piedras para?
  lexicon: HALOT
  rationale: 'Se mantiene la identificación literal del hebreo: «¿Qué son estas piedras?». La lectura interpretativa sobre el significado queda como posibilidad contextual, pero no se impone en el texto principal.'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje sin cambios relevantes respecto del audit trail inglés: conserva la forma narrativa, la expresión «hijos de Israel», el valor idiomático de מחר como futuro y la pregunta literal sobre las piedras, sin adoptar la paráfrasis interpretativa «¿qué significan estas piedras?» como texto principal.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» por transparencia formal y consistencia con el patrón POB.
  - Se usa «padres» para אבותם porque el contexto inmediato es doméstico y relacional.
  - Se preserva el valor futuro de «mañana» mediante «en el futuro», evitando una lectura temporal literal incorrecta.
  - La pregunta queda en forma identificativa literal, con la lectura interpretativa solo en nota.
  - La puntuación española integra correctamente el discurso directo anidado.
