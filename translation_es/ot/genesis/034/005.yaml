review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: Jacob oye el reporte, sus hijos están ausentes con el ganado en el campo, y Jacob permanece en silencio hasta su llegada. Sin embargo, hay dos desajustes con el rastro auditado y con el hebreo: (1) טִמֵּא se aleja demasiado al traducirse «deshonrado», porque el POB inglés preserva deliberadamente el campo léxico de «defile/defiled» y la nota explica el matiz sexual; en español conviene conservar «había mancillado» o similar, no sustituirlo por una paráfrasis social. (2) עַד בֹּאָם significa «hasta que llegaron / hasta su llegada», no explícitamente «volvieron»; ese regreso puede inferirse por contexto, pero el audit trail rechaza introducirlo en el texto principal.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro narrativo y eclesialmente legible. «Oyó», «Pero sus hijos estaban con su ganado en el campo» y «Jacob guardó silencio» son idiomáticos y dignos. La reparación necesaria es pequeña: ajustar el verbo principal del agravio sexual para acercarlo al léxico fuente y reemplazar «volvieron» por «llegaron» para evitar sobreinterpretación contextual.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. La cuestión clave es de fidelidad léxica: טִמֵּא debe conservar más claramente la idea de mancillar/contaminar/volver impuro, con una nota que preserve «violado» como alternativa contextual. El resto del vocabulario está alineado.'
  issues:
  - severity: medium
    issue: «había deshonrado» debilita el valor léxico de טִמֵּא
    rationale: El hebreo y el POB inglés retienen deliberadamente la noción de «defile/make unclean» en contexto de agravio sexual. «Deshonrado» comunica ultraje, pero pierde la capa semántica de mancilla/impureza que el audit trail quiso preservar.
  - severity: medium
    issue: «hasta que ellos volvieron» sobreinterpreta עַד בֹּאָם
    rationale: El hebreo dice literalmente «hasta su venir / hasta que llegaron». «Volvieron» añade la idea de retorno, posible por contexto pero no expresada; el rastro inglés eligió explícitamente «until they came», no «returned».
  revised_spanish_text: Y Jacob oyó que había mancillado[a] a su hija Dina. Pero sus hijos estaban con su ganado en el campo, y Jacob guardó silencio hasta que ellos llegaron.
  revised_footnotes:
  - marker: a
    text: O «había violado a su hija Dina». El verbo hebreo significa literalmente «mancillar», «contaminar» o «hacer impuro»; en este contexto se refiere al ultraje sexual de Dina.
    reason: lexical_alternative
  revision_rationale: Se revisa «deshonrado» a «mancillado» para preservar mejor el valor léxico de טִמֵּא, manteniendo en nota la alternativa contextual «violado». Se cambia «volvieron» por «llegaron» para reflejar fielmente עַד בֹּאָם sin añadir un matiz de retorno no explícito. El resto del texto puede mantenerse.
