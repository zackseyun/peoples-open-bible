base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/003/018.yaml
  text: And I commanded you at that time[a], saying, ‘Yahweh your God has given you this land to possess. You shall cross over armed before your brothers[c][b], the sons of Israel—all the men of valor.’
  footnotes:
