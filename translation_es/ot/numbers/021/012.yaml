    rationale: La documentación inglesa privilegia «wadi» por el sentido de cauce/ravina estacional en contexto desértico. «Valle» es posible, pero en español orienta más hacia una depresión topográfica amplia que hacia el cauce mismo, y por eso no preserva tan bien la decisión fuente.
