translation:
  language: es
  text: y un macho cabrío como sacrificio por el pecado, además del holocausto continuo[a] y de su ofrenda vegetal y de su libación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘además del holocausto continuo’. El hebreo תָּמִיד también puede expresarse como ‘regular’.
    reason: lexical_alternative
  - marker: b
    text: ‘Libación’ también puede traducirse como ‘ofrenda de bebida’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  english_pob_choice: and one male goat
  chosen_spanish: y un macho cabrío
  alternatives_spanish:
  - y un cabro
  - y una cabra
  lexicon: HALOT
  rationale: שָׂעִיר designa un macho cabrío; en español, ‘macho cabrío’ comunica con precisión el sexo del animal sacrificial. El número uno queda implícito en el artículo indefinido, como en el hebreo y en el flujo de la lista ritual.
- source_word: חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como sacrificio por el pecado
  alternatives_spanish:
  - para expiación
  - como ofrenda por el pecado
  lexicon: HALOT
  rationale: En contexto cultual, חַטָּאת nombra la ofrenda sacrificial, no solo el concepto abstracto de ‘pecado’. ‘Sacrificio por el pecado’ conserva la categoría ritual con buen español, sin imponer una terminología eclesiástica más fija de lo que exige el hebreo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El numeral expresa cantidad; en español, el artículo indefinido ‘un’ transmite de forma natural esa especificación cuantitativa en una lista sacrificial.
- source_word: מִ/לְּ/בַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: La expresión indica adición respecto del holocausto continuo. ‘Además de’ es idiomático en español y conserva claramente el valor suplementario de la frase hebrea.
- source_word: עֹלַת
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: HALOT
  rationale: En español bíblico, ‘holocausto’ es el equivalente establecido para עֹלָה como sacrificio consumido por el fuego. Aquí mantiene la precisión cultual y la concisión del inventario ritual.
- source_word: הַ/תָּמִיד
  english_pob_choice: the regular
  chosen_spanish: continuo
  alternatives_spanish:
  - regular
  - permanente
  - diario
  lexicon: HALOT
  rationale: תָּמִיד comunica la idea de continuidad o regularidad prescrita. ‘Continuo’ reproduce mejor esa noción en español que ‘regular’, y evita restringir innecesariamente a la frecuencia diaria.
- source_word: וּ/מִנְחָתָ/הּ
  english_pob_choice: and its grain offering
  chosen_spanish: y de su ofrenda vegetal
  alternatives_spanish:
  - y de su ofrenda de cereal
  - y de su oblación
  lexicon: HALOT
  rationale: מִנְחָה en listas sacrificiales puede traducirse como ofrenda de cereal/vegetal. Se eligió ‘ofrenda vegetal’ por ser comprensible en español bíblico contemporáneo y por mantener el valor de ofrenda acompañante sin deslizarse a una lectura meramente alimentaria. El posesivo ‘su’ retoma el holocausto.
- source_word: וְ/נִסְכָּ/הּ
  english_pob_choice: and its drink offering
  chosen_spanish: y de su libación
  alternatives_spanish:
  - y de su ofrenda de bebida
  - y de su bebida derramada
  lexicon: HALOT
  rationale: נֶסֶךְ en contexto sacrificial corresponde a una libación. ‘Libación’ conserva el término técnico y evita una paráfrasis que podría oscurecer el gesto ritual. El posesivo ‘su’ continúa refiriéndose al holocausto.
theological_decisions:
- issue: Naturaleza de חַטָּאת en contexto sacrificial
  english_pob_reading: for a sin offering
  chosen_spanish_reading: como sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - sacrificio expiatorio
  rationale: No se debe leer חַטָּאת como mero ‘pecado’ abstracto aquí, sino como la ofrenda ritual correspondiente. ‘Sacrificio por el pecado’ mantiene la tensión entre la categoría cultual y el efecto expiatorio, sin borrar la relación con el pecado humano.
  doctrine_reference: Levítico 4; Levítico 16; Numbers sacrificial legislation
- issue: Sentido de הַתָּמִיד
  english_pob_reading: the regular burnt offering
  chosen_spanish_reading: el holocausto continuo
  alternative_spanish_readings:
  - el holocausto regular
  - el holocausto diario
  rationale: El hebreo enfatiza la continuidad prescrita del sacrificio base. ‘Continuo’ preserva la fuerza del término sin fijar indebidamente una cronología diaria cuando el texto dice ‘continuo/regular’.
  doctrine_reference: Exodus 29:38-42; Numbers 28-29
translation_notes:
  revision_awareness: El pasaje fue revisado en el seguimiento más reciente sin cambios sustantivos; el presente borrador mantiene la lectura acordada en el control comparativo de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el texto fuente lo exige explícitamente; aquí no aparece el tetragrámaton.
  - Se usa ‘holocausto’ para עֹלָה de manera consistente con el inventario sacrificial del Pentateuco.
  - Se evita ‘SEÑOR’ como sustituto, porque no corresponde al hebreo de este verso.
  - ‘Ofrenda vegetal’ sigue la opción POB de ‘grain offering’ sin imponer una terminología más técnica que oscurezca el español general.
  - Las preposiciones y posesivos (‘además de’, ‘de su’) se ajustan para que la relación entre el sacrificio principal y sus acompañamientos quede clara en español.
