translation:
  language: es
  text: 'Y Salomón dijo a Dios[a]: «Tú has mostrado gran amor leal a David, mi padre, y me has hecho rey en su lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has mostrado gran bondad a David, mi padre» o «has mostrado gran amor leal a David, mi padre». El hebreo חֶסֶד suele abarcar la idea de amor leal, fidelidad o bondad vinculada al pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Solomon said
  chosen_spanish: Y Salomón dijo
  alternatives_spanish:
  - Entonces Salomón dijo
  - Así Salomón dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, 'Y ... dijo' reproduce bien la secuencia sin sonar rígido.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios verdadero
  - a Dios mismo
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere claramente al único Dios; 'a Dios' es la forma natural y fiel en español.
- source_word: עָשִׂיתָ עִם ... חֶסֶד גָּדוֹל
  english_pob_choice: have shown great steadfast love to
  chosen_spanish: has mostrado gran amor leal a
  alternatives_spanish:
  - has mostrado gran bondad a
  - has tenido gran misericordia para con
  lexicon: HALOT
  rationale: חֶסֶד en este contexto expresa amor leal, con peso relacional y de pacto. 'Amor leal' conserva esa fuerza sin sobrecargar el texto con terminología técnica.
- source_word: דָּוִיד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  - a David, mi padre
  lexicon: HALOT
  rationale: Mantiene el orden hebreo de manera natural en español y deja claro que David es el padre de Salomón.
- source_word: וְהִמְלַכְתַּנִי
  english_pob_choice: have made me king
  chosen_spanish: me has hecho rey
  alternatives_spanish:
  - me has entronizado
  - me has puesto como rey
  lexicon: HALOT
  rationale: 'El hiphil de מלך es causativo: ''hacer rey'' comunica bien la idea de establecimiento real sin perder claridad.'
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: En contextos de sucesión, תחת significa 'en lugar de'. 'En su lugar' es idiomático y conserva el sentido dinástico.
theological_decisions:
- issue: Sentido de חֶסֶד en un contexto de pacto y fidelidad
  english_pob_reading: great steadfast love
  chosen_spanish_reading: gran amor leal
  alternative_spanish_readings:
  - gran bondad
  - gran misericordia
  rationale: La expresión no se reduce a 'bondad' genérica; en este marco evoca una lealtad amorosa vinculada a la promesa hecha a David. 'Amor leal' preserva esa tensión semántica en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Agencia divina en la sucesión real
  english_pob_reading: made me king in his place
  chosen_spanish_reading: me has hecho rey en su lugar
  alternative_spanish_readings:
  - me has hecho reinar en su lugar
  - me has entronizado en su lugar
  rationale: La formulación conserva que el acceso de Salomón al trono procede de Dios, sin añadir matices ajenos al texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió 'steadfast love' sobre 'covenant faithfulness' para evitar una especificidad interpretativa excesiva. En español, 'amor leal' busca conservar esa amplitud semántica con naturalidad y sin borrar la dimensión relacional del término.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלֹהִים, conforme al criterio del proyecto.
  - Se eligió 'rey' en vez de una forma más técnica como 'entronizado' para conservar la claridad narrativa.
  - '''Amor leal'' se usa aquí como equivalente funcional de חֶסֶד; no se normaliza a ''amor'' sin adjetivo para no perder el matiz de fidelidad.'
  - La nota al pie ofrece alternativas que reflejan la tensión léxica documentada en el audit trail en inglés.
