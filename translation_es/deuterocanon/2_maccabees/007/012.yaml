translation:
  language: es
  text: de modo que el mismo rey y los que estaban con él quedaron asombrados ante el valor[a] del joven, porque consideraba los sufrimientos como nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «alma»: el griego dice τὴν τοῦ νεανίου ψυχήν, que según el contexto puede significar alma, vida o disposición interior/ánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπλήσσεσθαι
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - quedaron maravillados
  - se llenaron de asombro
  lexicon: BDAG
  rationale: 'El infinitivo expresa el resultado del comportamiento del joven: el rey y su séquito llegaron a un estado de asombro. «Quedaron asombrados» suena natural en español moderno y conserva bien ese efecto resultante.'
- source_word: ψυχήν
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - ánimo
  - courage en préstamo no naturalizado
  - alma
  lexicon: BDAG
  rationale: En este contexto ψυχή se refiere a la disposición interior del joven frente al tormento, no a una afirmación doctrinal sobre el alma. «Valor» comunica de manera idiomática su firmeza y valentía. Se evita «alma» porque en español puede sonar más metafísico que narrativo aquí.
- source_word: νεανίου
  english_pob_choice: young man
  chosen_spanish: del joven
  alternatives_spanish:
  - del muchacho
  - del mozo
  lexicon: LSJ
  rationale: νεανίου designa a un varón joven. «Joven» es claro, actual y digno; encaja mejor con el tono de martirio que un término más coloquial.
- source_word: ἀλγηδόνας
  english_pob_choice: the sufferings
  chosen_spanish: los sufrimientos
  alternatives_spanish:
  - los dolores
  - los tormentos
  lexicon: LSJ
  rationale: El término abarca experiencias dolorosas infligidas. «Sufrimientos» mantiene amplitud semántica y funciona bien en un contexto de martirio.
- source_word: ἐτίθετο
  english_pob_choice: regarded
  chosen_spanish: consideraba
  alternatives_spanish:
  - estimaba
  - tenía por
  lexicon: BDAG
  rationale: La frase idiomática ἐνʼ οὐδενὶ ... ἐτίθετο expresa que los dolores eran tenidos por insignificantes. «Consideraba» reproduce ese juicio evaluativo en español de forma fluida.
- source_word: ὡς ἐνʼ οὐδενί
  english_pob_choice: as nothing
  chosen_spanish: como nada
  alternatives_spanish:
  - como de ningún valor
  - como nada en absoluto
  - como cosa ninguna
  lexicon: LSJ
  rationale: La expresión idiomática indica tratar algo como carente de importancia. «Como nada» es conciso, fiel y natural en español.
theological_decisions:
- issue: Alcance de ψυχή en 2 Maccabees 7:12
  english_pob_reading: Rendered as 'courage' to express the young man's inner courage and disposition under suffering.
  chosen_spanish_reading: Se vierte como «valor» para expresar la firmeza interior y la valentía del joven bajo tortura.
  alternative_spanish_readings:
  - alma
  - vida
  - ánimo
  rationale: El contexto subraya la resistencia valerosa ante el sufrimiento, no una definición técnica de la naturaleza del alma. «Valor» mantiene la fuerza narrativa y la dimensión interior sin introducir una lectura doctrinal ajena al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy and readable modern Spanish
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «spirit» a «courage» para reflejar mejor ψυχήν en el contexto de resistencia firme bajo tortura. Esta versión española sigue esa revisión y la expresa con «valor», manteniendo la misma decisión interpretativa auditable.
  spanish_consistency_notes:
  - Se mantiene «sufrimientos» para ἀλγηδόνας, en línea con la amplitud semántica del griego y con la decisión inglesa auditada.
  - Se evita «Señor» o terminología eclesiástica no presente en el texto; el pasaje no contiene vocabulario divino explícito.
  - La construcción «quedaron asombrados» conserva el matiz resultativo de ἐκπλήσσεσθαι sin sobrerretorizar el español.
  - El marcador [a] está anclado en «valor» porque allí se concentra la tensión léxica principal de ψυχήν en este contexto.
