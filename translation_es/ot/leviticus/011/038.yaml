translation:
  language: es
  text: Pero si se pone agua sobre la semilla, y cae sobre ella alguno de sus cadáveres animales[a], es impura para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alguna de sus carcasas» o «alguno de sus cuerpos muertos». El hebreo נְבֵלָה denota el cadáver de un animal; aquí «cadáveres animales» mantiene explícito ese sentido en el contexto de pureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción abre una cláusula condicional con matiz de contraste respecto al versículo anterior. «Pero si» conserva ese valor adversativo y suena natural en español jurídico-bíblico.
- source_word: יֻתַּן
  english_pob_choice: is put
  chosen_spanish: se ha puesto
  alternatives_spanish:
  - se pone
  - es puesto
  - se pone sobre
  lexicon: HALOT
  rationale: El hophal es pasivo; en español, una pasiva refleja expresa bien el hecho previo relevante para la condición. «Se ha puesto» mantiene la relación de anterioridad sin volver la frase artificial.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: La forma plural hebrea tiene sentido singular colectivo. «Agua» es la equivalencia directa y natural.
- source_word: עַל זֶרַע
  english_pob_choice: on the seed
  chosen_spanish: sobre la semilla
  alternatives_spanish:
  - sobre el grano
  - sobre la semilla para sembrar
  lexicon: HALOT
  rationale: En este contexto de pureza ritual, «semilla» comunica el sentido concreto de material para sembrar. «Sobre» reproduce la relación espacial de עַל.
- source_word: מִנִּבְלָתָם
  english_pob_choice: any of their carcasses
  chosen_spanish: cualquiera de sus cadáveres
  alternatives_spanish:
  - alguno de sus cadáveres
  - cualquiera de sus carroñas
  - cualquiera de sus cuerpos muertos
  lexicon: HALOT
  rationale: El hebreo נְבֵלָה se refiere al cadáver de un animal. En español, «cadáveres» es una opción válida y digna; aquí se conserva la referencia a muerte corporal, aunque «carcasa/cadáver de animal» también sería posible en notas. Se evita un término demasiado técnico en el texto principal.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - sobre eso
  - sobre la semilla
  lexicon: HALOT
  rationale: El antecedente es femenino en español («semilla»), por lo que «sobre ella» mantiene la referencia anafórica con claridad y naturalidad.
- source_word: טָמֵא הוּא לָכֶם
  english_pob_choice: it is unclean to you
  chosen_spanish: será impura para ustedes
  alternatives_spanish:
  - es impura para ustedes
  - les será impura
  - queda impura para ustedes
  lexicon: HALOT
  rationale: 'La fórmula de estado ritual se expresa de modo natural en español con futuro de valor declarativo: «será impura». Se conserva «impura» para el campo semántico de pureza ritual y la orientación comunitaria de לָכֶם con «para ustedes».'
theological_decisions:
- issue: Pureza ritual, no culpa moral
  english_pob_reading: ritual impurity ('unclean')
  chosen_spanish_reading: impura
  alternative_spanish_readings:
  - inmunda
  - contaminada
  - ritualmente impura
  rationale: El contexto levítico es de estado ritual. «Impura» comunica la categoría sin cargarla de connotaciones morales; «ritualmente impura» es una posible aclaración, pero el término breve basta en el texto principal.
  doctrine_reference: Levítico 11; distinción bíblica entre santidad/pureza ritual y culpabilidad moral
- issue: Función de la declaración final
  english_pob_reading: standard impurity declaration formula
  chosen_spanish_reading: será impura para ustedes
  alternative_spanish_readings:
  - es impura para ustedes
  - queda impura para ustedes
  rationale: La construcción futurativa en español puede reflejar una sentencia normativa o declarativa. Se eligió «será impura» por su tono legal y porque conserva bien la fuerza formularia del hebreo.
  doctrine_reference: Lenguaje legal-cultual de la Torá
translation_notes:
  revision_awareness: El audit trail inglés pasó de «has been put» a «is put» para hacer más natural la condicional; la versión española sigue esa decisión con una pasiva refleja de valor presente/relevante («se ha puesto»). También se mantuvo la tensión léxica de נְבֵלָה como cadáver animal, sin sustituirla por un término moralizante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Impura» se usa aquí en sentido ritual, consistente con el registro levítico del proyecto.
  - La referencia pronominal se adaptó al género gramatical español de «semilla» para evitar ambigüedad.
