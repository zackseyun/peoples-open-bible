revisions:
- from: David los derrotó[a] desde el crepúsculo hasta la tarde del día siguiente, y no escapó de ellos ni un hombre, excepto cuatrocientos jóvenes que montaban sobre los camellos y huyeron.
  to: David los abatió desde el crepúsculo[a] hasta la tarde del día siguiente, y no escapó ni un solo hombre de entre ellos, excepto cuatrocientos jóvenes que montaron en los camellos y huyeron.
  rationale: Se ajusta el verbo principal a «los abatió» para reflejar mejor la fuerza de וַיַּכֵּם; se mejora la naturalidad y claridad de la cláusula de escape con «ni un solo hombre de entre ellos»; y se cambia «montaban sobre los camellos» a «montaron en los camellos» para acomodar mejor la narración puntual en español sin perder el sentido del original.
