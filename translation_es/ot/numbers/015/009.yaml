translation:
  language: es
  text: Entonces presentará con el toro una ofrenda vegetal de flor de harina, de tres décimos de efa[a], mezclada con medio hin de aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tres décimos»; en este contexto sacrificial, la medida se entiende como tres décimos de un efa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: then he shall present
  chosen_spanish: Entonces presentará
  alternatives_spanish:
  - Y presentará
  - Entonces ofrecerá
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב expresa llevar/presentar una ofrenda. «Presentará» conserva la idea de acercar la ofrenda y suena natural en español ritual sin perder el valor procedural de la waw consecutiva con «Entonces».
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - para
  - sobre
  lexicon: HALOT
  rationale: Aquí la preposición indica acompañamiento de la ofrenda vegetal junto al animal, no posición espacial. «Con» reproduce esa relación de adición/acompañamiento.
- source_word: בֶּן הַבָּקָר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el toro de la manada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijo del ganado/vacuno», un giro idiomático para el animal sacrificial. «Toro» ofrece un equivalente breve y digno en español; «novillo» podría sugerir una edad específica que el texto aquí no explicita.
- source_word: מִנְחָה
  english_pob_choice: a grain offering
  chosen_spanish: una ofrenda vegetal
  alternatives_spanish:
  - una ofrenda de cereal
  - una ofrenda de grano
  lexicon: HALOT
  rationale: En la legislación sacerdotal, מִנְחָה es la ofrenda cereal/vegetal, no una ofrenda genérica. Se prefiere «vegetal» para evitar un calco demasiado moderno y mantener la categoría cultual; se conserva la especificidad sacrificial sin imponer una sola tradición terminológica.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: de flor de harina
  alternatives_spanish:
  - de harina refinada
  - de harina fina
  lexicon: HALOT
  rationale: La expresión tradicional «flor de harina» comunica bien la harina selecta y corresponde al valor de סֹלֶת. Es idiomática en español bíblico y no añade una paráfrasis ajena.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: three-tenths of an ephah
  chosen_spanish: de tres décimos
  alternatives_spanish:
  - de tres décimos de efa
  - de tres diezmos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tres décimos»; como el POB inglés preserva esa forma con una nota explicativa, en español se mantiene la cifra breve y se deja la nota para la medida implícita en el contexto cultual.
- source_word: בָּל֥וּל
  english_pob_choice: mixed
  chosen_spanish: mezclada
  alternatives_spanish:
  - mezclado
  - amasada con
  lexicon: HALOT
  rationale: El participio pasivo describe la harina combinada con aceite. «Mezclada» concuerda con «ofrenda vegetal» y es un equivalente directo y claro.
- source_word: בַּשֶּׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - en aceite
  - en el aceite
  lexicon: HALOT
  rationale: La preposición señala el medio o sustancia con la que se mezcla. «Con aceite» es la formulación natural en español y conserva la relación instrumental.
- source_word: חֲצִי הַהִין
  english_pob_choice: half a hin
  chosen_spanish: medio hin
  alternatives_spanish:
  - la mitad de un hin
  lexicon: HALOT
  rationale: Se conserva la medida antigua transliterada, como en el texto fuente, para no sustituirla por una conversión moderna no indicada por el pasaje.
translation_notes:
  revision_awareness: El texto inglés POB no tuvo cambios en su última revisión y mantiene acuerdo alto con el chequeo cruzado; la versión española sigue esa lectura estable, conservando la precisión cultual y la medida literal con nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ofrenda vegetal» para מִנְחָה siguiendo la especificidad cultual y la necesidad de un español claro; no se sustituye por «sacrificio» genérico.
  - Se conserva la medida antigua «hin» sin convertirla numéricamente.
  - Se evita «SEÑOR» como máscara del nombre divino porque no aparece en el versículo y porque el proyecto prefiere transparencia terminológica.
