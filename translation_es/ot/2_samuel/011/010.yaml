translation:
  language: es
  text: 'Le informaron a David[a], diciendo: «Urías no bajó a su casa». Entonces David le dijo a Urías[b]: «¿No has venido de un viaje? ¿Por qué no bajaste a tu casa?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «bajar a su casa», un modismo para ir a casa, probablemente desde una zona más alta o desde el recinto oficial.'
    reason: cultural_note
  - marker: b
    text: 'O: «del camino». La expresión hebrea significa «de un viaje» o «de haber estado viajando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: They told
  chosen_spanish: Les informaron
  alternatives_spanish:
  - Les dijeron
  - Les comunicaron
  lexicon: HALOT
  rationale: El verbo hebreo de Hiphil de נגד puede significar contar, informar o declarar. «Les informaron» conserva el valor narrativo de comunicar una noticia y suena natural en español, sin perder el tono sobrio del relato.
- source_word: לְדָוִד לֵאמֹר
  english_pob_choice: David, saying
  chosen_spanish: a David, diciendo
  alternatives_spanish:
  - 'a David:'
  - diciéndole a David
  lexicon: HALOT
  rationale: La construcción introduce discurso directo. En español, «a David, diciendo» mantiene visible la transición al habla reportada sin forzar una paráfrasis más libre.
- source_word: לֹא יָרַד אוּרִיָּה אֶל בֵּיתוֹ
  english_pob_choice: Uriah did not go down to his house
  chosen_spanish: Uría no había bajado a su casa
  alternatives_spanish:
  - Uría no bajó a su casa
  - Uría no había ido a su casa
  lexicon: HALOT
  rationale: Se conserva el hebraímo de ירד («bajar»), que el POB inglés preserva como «go down». El pluscuamperfecto en español transmite bien la noticia reportada antes del dicho de David.
- source_word: בֵּיתוֹ / בֵּיתֶךָ
  english_pob_choice: his house / your house
  chosen_spanish: su casa / tu casa
  alternatives_spanish:
  - su hogar / tu hogar
  - su casa / vuestra casa
  lexicon: HALOT
  rationale: בַּיִת aquí nombra la residencia concreta; «casa» preserva la repetición del hebreo y el contraste retórico entre la casa de Uría y la de David.
- source_word: וַיֹּאמֶר
  english_pob_choice: So David said
  chosen_spanish: Entonces David dijo
  alternatives_spanish:
  - Y David dijo
  - David dijo entonces
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narrativa. «Entonces» conserva la secuencia sin sobreactuar la causalidad.
- source_word: הֲלוֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No vienes
  alternatives_spanish:
  - ¿No has venido
  - ¿Acaso no vienes
  lexicon: HALOT
  rationale: La partícula retórica espera una respuesta afirmativa. En español, una pregunta retórica directa comunica mejor la fuerza pragmática que una reproducción rígida del auxiliar inglés.
- source_word: מִדֶּרֶךְ
  english_pob_choice: from a journey
  chosen_spanish: de un viaje
  alternatives_spanish:
  - del camino
  - de un trayecto
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «del camino», el valor idiomático es el de haber estado viajando. «De un viaje» preserva ese sentido natural, coherente con la nota auditada del POB inglés.
- source_word: בָא
  english_pob_choice: come
  chosen_spanish: vienes
  alternatives_spanish:
  - has venido
  - llegas
  lexicon: HALOT
  rationale: El verbo בוא indica venir/llegar. En el marco de la pregunta retórica, «vienes» mantiene la referencia al movimiento y funciona con fluidez en español.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué se debe que
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo estándar de causa; «¿Por qué» es el equivalente más natural y claro en español.
- source_word: לֹא יָרַדְתָּ אֶל בֵּיתֶךָ
  english_pob_choice: did you not go down to your house
  chosen_spanish: no has bajado a tu casa
  alternatives_spanish:
  - no bajaste a tu casa
  - no has ido a tu casa
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo «bajar» para reflejar el hebreo y el diseño retórico del pasaje. El presente perfecto encaja con la situación actual al momento del discurso.
theological_decisions:
- issue: Conservar el valor idiomático de «bajar a casa» sin reemplazarlo por «ir a casa»
  english_pob_reading: The Hebrew 'go down to his/your house' is a literal idiom for going home, likely from the higher elevation or official precincts to one's residence.
  chosen_spanish_reading: «Bajar a su/tu casa» se mantiene como giro idiomático visible en el texto principal, con su sentido natural de ir a casa.
  alternative_spanish_readings:
  - ir a su casa
  - volver a su casa
  rationale: La decisión conserva la tensión documental del hebreo y la repetición narrativa que el POB inglés protege. En español, el lector entiende el sentido sin que se borre la imagen espacial del original.
  doctrine_reference: Principios de fidelidad semántica y preservación de idiomatismos textuales
- issue: Mantener la fuerza retórica de la pregunta de David
  english_pob_reading: Have you not come from a journey? Why did you not go down to your house?
  chosen_spanish_reading: «¿No vienes de un viaje? ¿Por qué no has bajado a tu casa?» como preguntas retóricas que esperan afirmación implícita.
  alternative_spanish_readings:
  - ¿No has venido de un viaje? ¿Por qué no has ido a tu casa?
  - ¿Acaso no vienes de un viaje? ¿Por qué no bajas a tu casa?
  rationale: La formulación española conserva la expectativa retórica y el tono persuasivo del hebreo sin añadir interpretación doctrinal. La escena prepara el engaño de David mediante preguntas que presuponen la respuesta.
  doctrine_reference: Retórica narrativa y coherencia discursiva del texto bíblico
translation_notes:
  revision_awareness: 'Se respetó la lectura auditada del POB inglés: conservar el modismo de «go down to his/your house», mantener la alternancia narrativa de las dos noticias sobre Uría y reflejar la pregunta retórica con equivalentes naturales en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; aquí no interviene.
  - Se mantiene «casa» para conservar la repetición del hebreo y su contraste narrativo.
  - Se usa «Uría» y «David» como nombres propios estándar en español bíblico.
  - El nivel de formalidad es sobrio y publicable, evitando arcaísmos innecesarios.
