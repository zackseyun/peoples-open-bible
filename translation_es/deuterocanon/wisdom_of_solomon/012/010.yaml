translation:
  language: es
  text: Pero al juzgarlos poco a poco[a], les dabas lugar para el arrepentimiento, sin ignorar que su origen[b] era malo y que su maldad era innata, y que su manera de pensar no cambiaría jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les dabas una oportunidad de arrepentirse» o «les permitías tiempo para arrepentirse». El griego dice literalmente «dar lugar/espacio para el arrepentimiento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su generación era mala» o «su linaje era malo» para «su origen era malo». El griego γένεσις puede referirse al origen, al nacimiento o al linaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίνων
  english_pob_choice: in judging
  chosen_spanish: al juzgarlos
  alternatives_spanish:
  - mientras los juzgabas
  - cuando los juzgabas
  - al ir juzgándolos
  lexicon: BDAG
  rationale: El participio introduce la acción divina en relación con el juicio. En español, 'al juzgarlos' conserva esa relación circunstancial de manera natural y breve, sin fijar indebidamente si el matiz es temporal, causal o modal.
- source_word: κατὰ βραχύ
  english_pob_choice: little by little
  chosen_spanish: poco a poco
  alternatives_spanish:
  - gradualmente
  - por grados
  - paso a paso
  lexicon: LSJ
  rationale: '''Poco a poco'' transmite con claridad la idea de progresividad o incremento gradual y es idiomático en español bíblico moderno.'
- source_word: ἐδίδους τόπον μετανοίας
  english_pob_choice: you were giving room for repentance
  chosen_spanish: les dabas lugar para el arrepentimiento
  alternatives_spanish:
  - les dabas una oportunidad de arrepentirse
  - les concedías espacio para el arrepentimiento
  - les permitías tiempo para arrepentirse
  lexicon: BDAG
  rationale: '''Tópos'' expresa literalmente ''lugar/espacio''; ''dar lugar para el arrepentimiento'' conserva la metáfora sin forzarla. Añadí ''les'' para explicitar el objeto indirecto implícito en el contexto español.'
- source_word: οὐκ ἀγνοῶν
  english_pob_choice: not being unaware
  chosen_spanish: sin ignorar
  alternatives_spanish:
  - no siendo ajeno a
  - sabiendo bien
  - sin desconocer
  lexicon: BDAG
  rationale: La forma participial expresa plena conciencia. 'Sin ignorar' es fiel y más natural que la doble negación literal, manteniendo la fuerza de conocimiento pleno.
- source_word: πονηρὰ ἦ γένεσις αὐτῶν
  english_pob_choice: their origin was evil
  chosen_spanish: su origen era malo
  alternatives_spanish:
  - su origen era maligno
  - su nacimiento era malo
  - su linaje era malo
  lexicon: LSJ
  rationale: '''Origen'' preserva el rango semántico amplio de γένεσις (origen, nacimiento, linaje) sin decidir de antemano entre esas posibilidades. ''Malo'' refleja πονηρὰ de forma simple; en este contexto ''malo'' comunica bien la valoración negativa, aunque ''malvado'' sería posible en otro registro.'
- source_word: ἔμφυτος ἡ κακία αὐτῶν
  english_pob_choice: their wickedness innate
  chosen_spanish: su maldad era innata
  alternatives_spanish:
  - su maldad era inborn
  - su maldad estaba implantada en ellos
  - su maldad era natural
  lexicon: LSJ
  rationale: '''Innata'' reproduce el sentido de ἔμφυτος como ''nativa/inherente/de nacimiento''. ''Maldad'' expresa κακία con un término fuerte y natural en español bíblico.'
- source_word: ὁ λογισμὸς αὐτῶν
  english_pob_choice: their way of thinking
  chosen_spanish: su manera de pensar
  alternatives_spanish:
  - su razonamiento
  - su pensamiento
  - su mente
  lexicon: BDAG
  rationale: '''Manera de pensar'' comunica el sentido disposicional o mental de λογισμός mejor que un mero acto aislado de razonamiento. Es claro y no carga el texto con tecnicismos.'
- source_word: οὐ μὴ ἀλλαγῇ
  english_pob_choice: would never change
  chosen_spanish: no cambiaría jamás
  alternatives_spanish:
  - no cambiaría nunca
  - de ningún modo cambiaría
  - no llegaría a cambiar
  lexicon: BDAG
  rationale: La combinación enfática οὐ μή exige una negación fuerte. 'No cambiaría jamás' mantiene ese énfasis y funciona con el futuro de posibilidad implícito en el sentido.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: En español, 'jamás' integra naturalmente el valor intensificador y durativo de la expresión. Se eligió una sola negación enfática para evitar redundancia excesiva en la frase final.
theological_decisions:
- issue: Alcance de la afirmación sobre la condición moral de los destinatarios
  english_pob_reading: The translation preserves the text's strong statement about entrenched evil and an unchanging mindset without adding philosophical claims beyond the verse.
  chosen_spanish_reading: La traducción conserva la afirmación fuerte sobre la maldad arraigada y la imposibilidad de cambio, sin convertirla en una doctrina filosófica más amplia.
  alternative_spanish_readings:
  - 'una lectura más determinista: ''su naturaleza era mala desde el nacimiento'''
  - 'una lectura más suave: ''estaban inclinados al mal'''
  rationale: El griego afirma que su origen era malo, que la maldad era innata y que su manera de pensar no cambiaría; la versión española mantiene esa severidad, pero evita añadir categorías doctrinales no explicitadas por el versículo, como culpa heredada o necesidad metafísica.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que añadió «forever» para reflejar εἰς τὸν αἰῶνα. En español, ese valor se integró con «jamás», que preserva la negación enfática y la duratividad sin duplicar innecesariamente la idea.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se traduce μετανοία con 'arrepentimiento' por ser un contexto de cambio moral/volitivo, no meramente cognitivo.
  - No se suaviza la fuerza de οὐ μή; la negación resultante en español sigue siendo enfática.
  - Se evita traducir γένεσις de forma demasiado estrecha; 'origen' permite las alternativas documentadas en la nota.
