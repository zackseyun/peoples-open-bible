translation_notes:
  revision_awareness: El audit trail en inglés pasó de «He asked, saying» a «He asked and said» para corresponder más de cerca al hebreo. La versión española sigue esa misma decisión con «preguntó y dijo», manteniendo la coordinación verbal sin añadir explicación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Ramá» para el topónimo, con acentuación española estándar.
  - Se usa «Naiot» como adaptación gráfica del nombre propio, coherente con una transliteración hispanizada.
  - Se preserva la ambigüedad de בּוֹר mediante nota, sin fijar innecesariamente entre pozo/cisterna/foso en el cuerpo del texto.
  - La frase final conserva sujeto indefinido en la respuesta, como en el análisis auditado en inglés.
