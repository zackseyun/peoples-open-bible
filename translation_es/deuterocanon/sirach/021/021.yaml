translation:
  language: es
  text: La instrucción[a] es como un adorno de oro para un hombre prudente, y como un brazalete en su brazo derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “disciplina” o “formación” para παιδεία, ya que el término griego puede incluir tanto enseñanza como formación moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμος
  english_pob_choice: ornament
  chosen_spanish: adorno
  alternatives_spanish:
  - ornamento
  - joya
  - decoración
  lexicon: LSJ
  rationale: En este contexto κόσμος no significa “mundo”, sino un objeto de adorno; el paralelo con “de oro” y con “brazalete” en el brazo derecho confirma la imagen. “Adorno” es natural en español y conserva la idea de algo que embellece.
- source_word: χρυσοῦς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorado
  - de oro fino
  - oro
  lexicon: LSJ
  rationale: El adjetivo indica materia o valor precioso. “De oro” reproduce de manera clara y fiel la relación material con el adorno.
- source_word: φρονίμῳ
  english_pob_choice: to a prudent man
  chosen_spanish: para un hombre prudente
  alternatives_spanish:
  - para un hombre sabio
  - para una persona prudente
  - para un hombre sensato
  lexicon: LSJ
  rationale: El dativo expresa a quién le conviene o embellece la instrucción. “Prudente” conserva la idea de discernimiento práctico; “hombre” refleja el singular masculino del griego, sin neutralizar indebidamente la forma.
- source_word: παιδεία
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  - enseñanza
  lexicon: LSJ
  rationale: En literatura sapiencial παιδεία puede abarcar formación moral y disciplina, pero aquí la comparación la presenta como algo valioso y embellecedor. “Instrucción” conserva ese sentido amplio sin cargarla de un matiz correctivo que el contexto no exige.
- source_word: χλιδών
  english_pob_choice: bracelet
  chosen_spanish: brazalete
  alternatives_spanish:
  - pulsera
  - armilla
  - ornamento del brazo
  lexicon: LSJ
  rationale: Como está “sobre el brazo derecho”, el sustantivo apunta a un adorno del brazo. “Brazalete” es la equivalencia moderna más clara y mantiene la imagen ornamental.
- source_word: βραχίονι δεξιῷ
  english_pob_choice: on his right arm
  chosen_spanish: en su brazo derecho
  alternatives_spanish:
  - sobre su brazo derecho
  - en el brazo derecho
  - sobre el brazo derecho
  lexicon: LSJ
  rationale: La frase especifica la ubicación del adorno. “En su brazo derecho” fluye bien en español y refleja el poseedor implícito del símil.
theological_decisions:
- issue: Género gramatical de φρονίμῳ
  english_pob_reading: prudent man
  chosen_spanish_reading: hombre prudente
  alternative_spanish_readings:
  - persona prudente
  - ser prudente
  - persona sabia
  rationale: El griego usa masculino singular, y la sentencia sapiencial se formula acerca de un individuo representativo. Mantener “hombre” preserva esa marca gramatical sin necesidad de neutralizar el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se revisó el paquete fuente griego de Swete 1909 y el texto inglés auditado. La versión española sigue la misma lectura semántica general, preservando la imagen doble: instrucción como adorno de oro y como brazalete en el brazo derecho.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como terminología por defecto del proyecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - “Instrucción” se eligió como equivalente principal de παιδεία para no sobrecargar el verso con el matiz de castigo implícito en “disciplina”.
  - La comparación conserva el paralelismo poético de los dos miembros sin añadir elementos interpretativos ajenos al griego.
