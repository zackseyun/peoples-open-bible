translation:
  language: es
  text: Y les dije que fueran a Ladaeo[a], el líder en el lugar de la tesorería[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego nombra solo a Ladaeo aquí, mientras que el paralelo hebreo en Esdras 8:16 menciona varios enviados. 1 Esdras parece condensar o reconfigurar el relato en este punto.
    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse: «el líder en el lugar del tesoro», «el que estaba a cargo de la tesorería» o «el que estaba a cargo de la cámara del tesoro». La frase griega es breve y admite más de una relación sintáctica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπα
  english_pob_choice: I told
  chosen_spanish: les dije
  alternatives_spanish:
  - les hablé
  - les indiqué
  - les ordené
  lexicon: BDAG
  rationale: El aoristo de λέγω con infinitivo de mandato se vierte de forma natural como una orden o instrucción dicha en español. «Les dije» conserva la función de habla directiva sin forzar un verbo más fuerte que el griego no exige.
- source_word: ἐλθεῖν πρὸς
  english_pob_choice: to go to
  chosen_spanish: que fueran a
  alternatives_spanish:
  - que vinieran a
  - que se acercaran a
  - que fueran hacia
  lexicon: BDAG
  rationale: Desde la perspectiva del narrador y como instrucción reportada, en español es más natural «ir a» que «venir a». La subordinada con «que» expresa bien el mandato implícito del infinitivo.
- source_word: Λαδδαῖον
  english_pob_choice: Laddaeus
  chosen_spanish: Ladaeo
  alternatives_spanish:
  - Laddaeo
  - Ladaeus
  - Laddaeus
  lexicon: LSJ
  rationale: Es un nombre propio transliterado. Se adapta a una forma española legible y cercana a la forma griega acusativa, sin traducirlo ni identificarlo con otro nombre del paralelo hebreo.
- source_word: τὸν ἡγούμενον
  english_pob_choice: the leader
  chosen_spanish: el líder
  alternatives_spanish:
  - el jefe
  - el que estaba a cargo
  - el gobernador
  lexicon: BDAG
  rationale: ἡγούμενος designa a quien dirige o está a cargo. «Líder» mantiene la neutralidad del término y evita convertirlo innecesariamente en un cargo administrativo más preciso de lo que el griego permite.
- source_word: τὸν ἐν τῷ τόπῳ
  english_pob_choice: at the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - allí en el lugar
  - en aquel lugar
  - en ese lugar
  lexicon: BDAG
  rationale: La frase griega es compacta y puede leerse como ubicación o esfera de autoridad. «En el lugar» sigue de cerca el texto y suena natural en español.
- source_word: γαζοφυλακίου
  english_pob_choice: of the treasury
  chosen_spanish: del tesoro
  alternatives_spanish:
  - de la tesorería
  - del tesoro real
  - de la cámara del tesoro
  lexicon: BDAG
  rationale: γαζοφυλάκιον remite a un tesoro o cámara del tesoro. «Tesoro» es una traducción clara y sobria en español; «tesorería» o «cámara del tesoro» quedan como alternativas posibles, pero la forma breve preserva mejor la concisión del griego.
theological_decisions:
- issue: Nombre propio frente al paralelo hebreo con varios enviados
  english_pob_reading: The Greek names only Laddaeus here, whereas the Hebrew parallel in Ezra 8:16 lists several men sent for. 1 Esdras appears to compress or reshape the parallel account at this point.
  chosen_spanish_reading: El texto español conserva solo a Ladaeo, como hace el griego, sin armonizarlo con el paralelo hebreo.
  alternative_spanish_readings:
  - Añadir una nota de armonización con Esdras 8:16
  - Reemplazar el nombre por la lista hebrea de enviados
  rationale: El testimonio principal aquí es el griego de 1 Esdras. Mantener un solo nombre preserva la forma literaria propia del pasaje y evita borrar la compresión o reelaboración documentada respecto del paralelo hebreo.
  doctrine_reference: Principio de prioridad del testimonio fuente y respeto a las variantes literarias entre paralelos
- issue: Naturaleza de la función expresada por ἡγούμενον
  english_pob_reading: the leader
  chosen_spanish_reading: el líder
  alternative_spanish_readings:
  - el gobernador
  - el jefe
  - el que estaba a cargo
  rationale: No hay base suficiente para convertir ἡγούμενος en un cargo técnico de gobierno. «Líder» conserva la amplitud semántica y evita sobreinterpretar la estructura administrativa.
  doctrine_reference: BDAG; principio de no especificar más allá del alcance semántico del original
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «at the place of the treasury» por naturalidad. En español, «en el lugar del tesoro» / «en el lugar del tesoro» se expresa de forma más natural como «en el lugar del tesoro» o, aquí, «en el lugar del tesoro» condensado en «en el lugar del tesoro»; por eso se eligió «en el lugar del tesoro» no como calco rígido, sino como equivalente idiomático de la compacta frase griega y del ajuste revisado en inglés.
  spanish_consistency_notes:
  - Se usa «Ladaeo» como transliteración española uniforme del nombre griego.
  - Se mantiene «líder» para ἡγούμενος por neutralidad semántica.
  - «Tesoro» se emplea de manera consistente para γαζοφυλάκιον en esta cláusula.
  - La construcción «les dije que fueran» refleja la función directiva del infinitivo sin sobrecargar el tono.
