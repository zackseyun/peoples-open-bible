    rationale: 'Conviene conservar la alternativa del inglés, pero con español más claro: ''según las medidas de piedra labrada''.'
  - severity: low
    issue: '''había'' es una expansión innecesaria.'
    rationale: Aunque no falsea el sentido, el hebreo presenta una descripción nominal. 'Y arriba, piedras…' mantiene mejor la concisión del original y el estilo de inventario arquitectónico.
  revised_spanish_text: Y arriba, piedras costosas[a], labradas según las medidas, y cedro.
