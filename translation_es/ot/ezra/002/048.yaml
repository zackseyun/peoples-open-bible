lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En listas genealógicas o de clanes, el hebreo constructo plural de בֵּן suele funcionar como fórmula de pertenencia familiar o clánica. En español, "los hijos de" conserva mejor la forma del original que una paráfrasis como "los descendientes de", y sigue siendo natural y clara en este contexto.
- source_word: רְצִין
  english_pob_choice: Rezin
  chosen_spanish: Rezín
  alternatives_spanish:
  - Rezin
  lexicon: Nombre propio; transliteración
  rationale: Es un nombre propio. Se conserva por transliteración, con tilde para adaptación gráfica al español y para marcar el acento natural de lectura.
- source_word: נְקוֹדָא
  english_pob_choice: Nekoda
  chosen_spanish: Nékoda
  alternatives_spanish:
  - Nekoda
  - Nekodá
  lexicon: Nombre propio; transliteración
  rationale: El hebreo aquí refleja la forma consonántica que el POB inglés translitera como "Nekoda". En español se adapta como "Nékoda" para una lectura más fluida, sin introducir una forma distinta del nombre.
- source_word: גַזָּם
  english_pob_choice: Gazzam
  chosen_spanish: Gazam
  alternatives_spanish:
  - Gazam
  - Gazzam
  lexicon: Nombre propio; transliteración
  rationale: Se conserva el nombre propio con transliteración sencilla y legible en español. Aunque el inglés POB retiene la doble z para reflejar el dagesh, en español "Gazam" resulta más natural y transparente, sin cambiar el referente.
