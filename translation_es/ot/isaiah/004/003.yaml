base_translation:
  language: en
  yaml_path: translation/ot/isaiah/004/003.yaml
  text: And it shall be that he who remains in Zion and he who is left in Jerusalem will be called holy—everyone who is recorded for life in Jerusalem[a][b].
  footnotes:
  - marker: a
    text: Or 'everyone written among the living in Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'recorded for life' may refer to an official register of those spared to live, and it also echoes the broader biblical motif of people being written in God's book of life.
    reason: cross_reference
