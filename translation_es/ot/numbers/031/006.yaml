review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: Moisés envía mil de cada tribu, conserva la repetición enfática de אֹתָם, incluye a Finees, los objetos sagrados y las trompetas, y mantiene el singular de בְּיָדוֹ. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con el rastro de auditoría inglés: la nota [a] fue colocada sobre «a la guerra», pero en el POB inglés la alternativa léxica correspondiente pertenece a «los utensilios/vasos santos»; y la nota [b] fue usada para «a la guerra», cuando en el POB inglés la alternativa léxica correspondiente pertenece a «las trompetas ...». Además, «de la señal» debilita el matiz militar de תְּרוּעָה en este contexto.'
  spanish_quality_summary: El español es en general legible y digno, pero «a ellos» suena algo forzado en esa posición; puede mantenerse para reflejar la repetición hebrea, aunque conviene ordenar mejor la frase. «Vasos santos» es posible, pero «utensilios santos» o «objetos sagrados» resulta más natural para lectura eclesial amplia. «Trompetas para la señal de guerra» comunica mejor el contexto que «trompetas de la señal».
  glossary_alignment: No hay términos del glosario principal en conflicto directo. Los nombres propios están bien en español bíblico común («Moisés», «Finees», «Eleazar»). La revisión propuesta preserva la decisión POB sobre la repetición enfática, los objetos sagrados y las trompetas, y corrige la ubicación y contenido de las notas para alinearlas con el expediente inglés.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en palabras equivocadas
    rationale: En el expediente inglés, la nota a corresponde a וּכְלֵי הַקֹּדֶשׁ ('holy vessels') y la nota b a וַחֲצֹצְרוֹת הַתְּרוּעָה ('trumpets for the battle cry'). El borrador puso [a] y [b] sobre «a la guerra», alterando la documentación lexical.
  - severity: medium
    issue: «las trompetas de la señal» atenúa el sentido militar de תְּרוּעָה
    rationale: Aunque תְּרוּעָה puede significar señal o alarma, en este contexto bélico el POB documenta una función de grito/señal de batalla. En español conviene explicitar ese matiz.
  - severity: low
    issue: «vasos santos» es menos natural que otras opciones en español contemporáneo
    rationale: No es incorrecto, pero «utensilios santos» o «objetos sagrados» suena más claro para lectores modernos sin perder el sentido cultual.
  revised_spanish_text: 'Así Moisés los envió a la guerra, mil de cada tribu: a ellos, y a Finees hijo de Eleazar, el sacerdote, a la guerra, con los utensilios santos[a] y las trompetas para la señal de guerra[b] en su mano.'
  revised_footnotes:
