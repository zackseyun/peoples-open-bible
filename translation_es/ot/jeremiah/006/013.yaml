translation:
  language: es
  text: Porque desde el menor de ellos hasta el mayor[a], cada uno de ellos codicia ganancias injustas; y desde el profeta hasta el sacerdote, cada uno de ellos practica la falsedad[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el menor de ellos hasta el mayor de ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «codicia ganancia»; la expresión probablemente implica lucro deshonesto o injusto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «obra con engaño» o «actúa falsamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la acusación anterior. En español, «Porque» conserva mejor la relación causal/explanatoria sin sonar forzado.
- source_word: מִקְּטַנָּם וְעַד גְּדוֹלָם
  english_pob_choice: from their least to their greatest
  chosen_spanish: desde el menor de ellos hasta el mayor
  alternatives_spanish:
  - desde el más pequeño de ellos hasta el más grande
  - desde el menor hasta el mayor entre ellos
  lexicon: HALOT
  rationale: La frase funciona como merismo inclusivo. «Desde el menor de ellos hasta el mayor» reproduce el alcance total y mantiene el sufijo posesivo implícito en el contexto.
- source_word: כֻּלּוֹ
  english_pob_choice: every one of them
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de ellos
  - todos ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con valor colectivo-distributivo, en español «todos» transmite de manera natural que la acusación alcanza a cada integrante del grupo.
- source_word: בּוֹצֵעַ בָּצַע
  english_pob_choice: is greedy for unjust gain
  chosen_spanish: buscan ganancia injusta
  alternatives_spanish:
  - codician ganancia
  - buscan provecho deshonesto
  - son ávidos de ganancia
  lexicon: HALOT
  rationale: El hebreo expresa una avidez por ganancia con connotación moralmente negativa. «Ganancia injusta» conserva la tensión ética que la POB inglesa explicita como «unjust gain», sin reducirla a mera búsqueda de lucro.
- source_word: וּמִנָּבִיא וְעַד כֹּהֵן
  english_pob_choice: and from prophet to priest
  chosen_spanish: y desde el profeta hasta el sacerdote
  alternatives_spanish:
  - y del profeta al sacerdote
  - y desde profeta hasta sacerdote
  lexicon: HALOT
  rationale: Se mantiene el segundo merismo que abarca el liderazgo religioso completo. «Desde... hasta...» es la forma más clara y natural en español.
- source_word: עֹשֶׂה שָּׁקֶר
  english_pob_choice: practices falsehood
  chosen_spanish: practican la falsedad
  alternatives_spanish:
  - obran falsedad
  - actúan con engaño
  - hacen mentira
  lexicon: HALOT
  rationale: La construcción hebrea describe conducta habitual caracterizada por mentira/engaño. «Practican la falsedad» conserva el matiz de acción continuada, más que un dicho aislado.
theological_decisions:
- issue: Alcance total de la corrupción social y religiosa
  english_pob_reading: every one of them ... and every one of them ...
  chosen_spanish_reading: todos ... todos ...
  alternative_spanish_readings:
  - cada uno de ellos ... cada uno de ellos
  - todos ellos ... todos ellos
  rationale: La repetición distributiva subraya que la denuncia no se limita a algunos individuos sino que abarca a toda la gama social y al conjunto del clero/profecía. «Todos» mantiene esa amplitud sin perder fluidez.
  doctrine_reference: Jeremías 6:13; denuncia profética del pecado colectivo
- issue: Connotación moral de la ganancia
  english_pob_reading: greedy for unjust gain
  chosen_spanish_reading: ganancia injusta
  alternative_spanish_readings:
  - provecho deshonesto
  - ganancia ilícita
  - lucro injusto
  rationale: 'El hebreo no es neutral: la expresión sugiere lucro torcido o injusto. Se evita «ganancia» a secas porque suavizaría el juicio moral presente en el texto.'
  doctrine_reference: Jeremías 6:13; pecado de avaricia y corrupción
- issue: Falsedad como práctica habitual
  english_pob_reading: practices falsehood
  chosen_spanish_reading: practican la falsedad
  alternative_spanish_readings:
  - obran falsedad
  - hacen engaño
  - viven en mentira
  rationale: La frase hebrea caracteriza un modo de vida, no solo una mentira puntual. «Practican» deja visible esa habitualidad y encaja bien con la denuncia profética.
  doctrine_reference: Jeremías 6:13; mentira/engaño como conducta
translation_notes:
  revision_awareness: Coincide con el patrón de la revisión inglesa más reciente (sin cambios) y conserva el doble merismo del hebreo, la fuerza distributiva de כֻּלּוֹ y la tensión moral de בּוֹצֵעַ בָּצַע y עֹשֶׂה שָּׁקֶר.
  spanish_consistency_notes:
  - Se usó «profeta» y «sacerdote» de forma literal y consistente con la tradición profética del pasaje.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se prefirió «falsedad» frente a «mentira» para reflejar el carácter de práctica habitual, no un acto aislado.
  - La puntuación con punto y coma conserva la división de los dos hemistiquios del texto hebreo.
