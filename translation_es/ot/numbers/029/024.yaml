    rationale: Para מִשְׁפָּט en legislación sacrificial, «ordenanza» comunica mejor una prescripción cultual/procedimental ya establecida, en línea con el audit trail. «Estatuto» no es imposible, pero aquí suena más rígido y menos idiomático.
