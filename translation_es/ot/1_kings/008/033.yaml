translation:
  language: es
  text: Cuando tu pueblo Israel sea derrotado[a] delante de un enemigo por haber pecado contra ti, y vuelva a ti y confiese tu nombre y ore y te suplique en esta casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "derribado", "abatido". El hebreo puede expresar ser golpeado, vencido o derrotado en contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהִנָּגֵף
  english_pob_choice: are struck down
  chosen_spanish: sea derribado
  alternatives_spanish:
  - sea derrotado
  - sea golpeado
  lexicon: HALOT
  rationale: El niphal de נָגַף en contexto militar expresa ser abatido o vencido delante del enemigo. "Sea derribado" conserva la pasividad y la gravedad del golpe sin sonar arcaico; "derrotado" sería posible, pero pierde un poco la imagen de caída.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  lexicon: HALOT
  rationale: Mantiene el posesivo de pacto y la identificación apposicional del pueblo como Israel. Se omite la coma para fluidez natural en español, sin alterar el sentido.
- source_word: לִפְנֵי אוֹיֵב
  english_pob_choice: before an enemy
  chosen_spanish: delante de un enemigo
  alternatives_spanish:
  - ante un enemigo
  - frente a un enemigo
  lexicon: HALOT
  rationale: לִפְנֵי es literalmente "delante de" o "en presencia de". En una fórmula de derrota, "delante de un enemigo" preserva bien la imagen y el valor idiomático; el indefinido "un enemigo" respeta la ausencia del artículo.
- source_word: אֲשֶׁר יֶחֶטְאוּ לָךְ
  english_pob_choice: because they have sinned against you
  chosen_spanish: por haber pecado contra ti
  alternatives_spanish:
  - porque han pecado contra ti
  - cuando pequen contra ti
  lexicon: HALOT
  rationale: La cláusula relativa marca la causa de la derrota. En español, "por haber pecado contra ti" expresa claramente la relación causal y evita sobrecargar el ritmo con una subordinada más larga.
- source_word: וְשָׁבוּ אֵלֶיךָ
  english_pob_choice: and they turn back to you
  chosen_spanish: y vuelvan a ti
  alternatives_spanish:
  - y regresen a ti
  - y se vuelvan a ti
  lexicon: HALOT
  rationale: שׁוּב comunica retorno/restauración. "Vuelvan a ti" conserva el movimiento de regreso sin añadir de antemano la formulación doctrinal completa de "arrepentirse".
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  english_pob_choice: and confess your name
  chosen_spanish: y confiesen tu nombre
  alternatives_spanish:
  - y den gracias a tu nombre
  - y alaben tu nombre
  lexicon: HALOT
  rationale: ידָה puede significar confesar, alabar o dar gracias según el contexto. En este marco de pecado y retorno, "confiesen" preserva el valor de reconocimiento/afirmación solemne, sin excluir las otras posibilidades.
- source_word: וְהִתְפַּלְלוּ
  english_pob_choice: and pray
  chosen_spanish: y oren
  alternatives_spanish:
  - y rueguen
  lexicon: HALOT
  rationale: Es el equivalente natural y directo del hitpael de פלל. "Oren" es claro y fiel al verbo básico.
- source_word: וְהִתְחַנְּנוּ אֵלֶיךָ
  english_pob_choice: and plead with you
  chosen_spanish: y te supliquen
  alternatives_spanish:
  - y te imploren
  - y te pidan misericordia
  lexicon: HALOT
  rationale: חנן en hitpael expresa súplica intensa, con matiz de pedir gracia/favor. "Te supliquen" transmite bien la entreaty sin expandir el sentido más allá del hebreo; se evita una formulación interpretativa como "pedir favor".
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: in this house
  chosen_spanish: en esta casa
  alternatives_spanish:
  - en este templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente "en esta casa". Aunque el contexto es el templo, "casa" preserva la correspondencia directa con el texto fuente; "templo" sería interpretativo.
theological_decisions:
- issue: Alcance de שׁוּב en contexto de restauración pactual
  english_pob_reading: turn back to you
  chosen_spanish_reading: vuelvan a ti
  alternative_spanish_readings:
  - regresen a ti
  - se arrepientan y vuelvan a ti
  rationale: El verbo hebreo expresa retorno. Se mantiene la imagen de volver a Yahvé sin introducir la formulación más explícita de "arrepentirse" como contenido principal, aunque esa idea puede estar implícita en el contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Ambigüedad de ידה en una secuencia penitencial
  english_pob_reading: confess your name
  chosen_spanish_reading: confiesen tu nombre
  alternative_spanish_readings:
  - alaben tu nombre
  - den gracias a tu nombre
  rationale: En un contexto de pecado, derrota y retorno, el reconocimiento verbal del nombre de Yahvé se entiende bien como confesión. Se conserva la tensión semántica del verbo mediante las alternativas, sin reducirlo solo a alabanza o gratitud.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió "plead with you" en lugar de una expansión interpretativa. Por eso el español usa "te supliquen", más directo y menos explicativo que una frase con "favor". También se preservó la decisión auditada de traducir ידה en sentido de confesión en el contexto penitencial, dejando abiertas las alternativas semánticas en la nota.
  spanish_consistency_notes:
  - Se mantiene "tu" para el posesivo divino y se evita el reemplazo automático por "SEÑOR" o fórmulas de ocultamiento del nombre divino.
  - '"Yahvé" no aparece aquí porque el verso hebreo usa pronombres; se conserva la referencia implícita del discurso directo.'
  - '"Casa" se conserva para reflejar el hebreo בַּבַּיִת; no se sustituye por "templo" en el texto principal.'
  - El registro es bíblico y moderno, evitando arcaísmos como "si pecaren" o "se postraren" que no añaden precisión al hebreo.
