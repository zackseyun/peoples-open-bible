translation:
  language: es
  text: 'Cuando llegaron a la región[a] del Jordán, que está en la tierra de Canaán, los hijos de Rubén, los hijos de Gad y la media tribu de Manasés construyeron allí un altar junto al Jordán: un altar grande en apariencia[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «distritos» o «bordes» del Jordán.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «un altar grande para ver», es decir, un altar conspicuo en su apariencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ אֶל
  english_pob_choice: When they came to
  chosen_spanish: Cuando llegaron a
  alternatives_spanish:
  - Y llegaron a
  - Cuando vinieron a
  lexicon: HALOT
  rationale: La forma narrativa del verbo se expresa de manera natural en español con una subordinada temporal. «Cuando llegaron a» conserva el avance temporal sin sonar rígido.
- source_word: גְּלִילוֹת
  english_pob_choice: region
  chosen_spanish: región
  alternatives_spanish:
  - distritos
  - bordes
  - círculos
  lexicon: HALOT
  rationale: El sustantivo designa una zona o circunscripción. «Región» comunica bien el sentido geográfico y evita literalismos opacos.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנָעַן
  english_pob_choice: that is in the land of Canaan
  chosen_spanish: que está en la tierra de Canaán
  alternatives_spanish:
  - que está en la tierra de Canaán
  - en Canaán
  lexicon: HALOT
  rationale: La cláusula relativa aclara cuál región del Jordán se menciona. Mantenerla explícita conserva la precisión geográfica del hebreo.
- source_word: בְנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  lexicon: HALOT
  rationale: Se preserva la expresión filial-tribal del hebreo, que es más transparente al texto fuente que una etnónima resumida.
- source_word: בְנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los gaditas
  lexicon: HALOT
  rationale: Por coherencia con la construcción hebrea y con «los hijos de Rubén», se mantiene la fórmula filial.
- source_word: חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: Es la equivalencia española más estable y clara para la construcción de estado constructo, sin perder la idea de una subdivisión tribal.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: HALOT
  rationale: Es el término estándar para la estructura cultual del pasaje.
- source_word: עַל הַיַּרְדֵּן
  english_pob_choice: by the Jordan
  chosen_spanish: junto al Jordán
  alternatives_spanish:
  - al lado del Jordán
  - cerca del Jordán
  - sobre el Jordán
  lexicon: HALOT
  rationale: En un contexto geográfico, עַל expresa proximidad. «Junto al Jordán» es natural en español y conserva esa relación espacial.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - imponente
  - notable
  lexicon: HALOT
  rationale: Se eligió «grande» para reproducir la cualidad del hebreo de manera directa y dejar abierta la referencia a tamaño o prominencia visual.
- source_word: לְמַרְאֶה
  english_pob_choice: in appearance
  chosen_spanish: en apariencia
  alternatives_spanish:
  - a la vista
  - para verse
  lexicon: HALOT
  rationale: La expresión describe cómo se veía el altar. «En apariencia» es una fórmula fiel y idiomática en español, sin forzar una interpretación más específica.
theological_decisions:
- issue: Posible insinuación de un altar rival o ilícito
  english_pob_reading: 'Render descriptively without importing judgment: ''built there an altar by the Jordan—an altar great in appearance.'''
  chosen_spanish_reading: 'construyeron allí un altar junto al Jordán: un altar grande en apariencia'
  alternative_spanish_readings:
  - levantaron allí un altar imponente junto al Jordán
  - construyeron allí un gran altar junto al Jordán
  rationale: El versículo solo reporta la construcción y su aspecto visible; no explica todavía su función ni emite juicio. La traducción conserva esa tensión narrativa y evita cargar el texto con una valoración anticipada.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica cuando el pasaje aún no la resuelve.'
translation_notes:
  revision_awareness: Coincido con el audit trail inglés en mantener una traducción descriptiva y no interpretativa. No se introdujeron cambios de sentido; se adaptó la formulación al español natural, preservando la ambigüedad sobre la finalidad del altar y la nota geográfica de גְּלִילוֹת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva «hijos de» para reflejar el hebreo בני y la nomenclatura tribal del pasaje.
  - Se traduce עַל como proximidad espacial («junto a») en coherencia con el contexto geográfico.
  - «En apariencia» resguarda la ambigüedad de לְמַרְאֶה sin convertirla en interpretación devocional.
