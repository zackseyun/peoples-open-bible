  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. «Casa de Dios» preserva adecuadamente בֵּית הָאֱלֹהִים. La distinción entre «escudos» y «escudos grandes» sigue la decisión inglesa. La principal corrección terminológica es la forma del nombre propio: «Joiada» (o «Jehoyadá») se alinea mejor con el hebreo y el uso bíblico en español que «Joyaida».'
