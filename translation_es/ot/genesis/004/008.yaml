translation:
  language: es
  text: Y Caín dijo a Abel su hermano.[a] Entonces, mientras estaban en el campo, Caín se levantó contra Abel su hermano y lo mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto hebreo masorético dice solamente: «Y Caín dijo a Abel su hermano», sin las palabras «Vayamos al campo». La cláusula añadida cuenta con apoyo de testigos antiguos como la Septuaginta, el Pentateuco Samaritano y la Vulgata.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Cain said
  chosen_spanish: Y Caín dijo
  alternatives_spanish:
  - Y Caín habló
  lexicon: HALOT
  rationale: אָמַר normalmente significa ‘decir’. En español, ‘dijo’ reproduce de manera directa y natural la introducción narrativa, sin añadir contenido no presente en el hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: La preposición marca dirección hacia una persona; en español, ‘a Abel’ refleja mejor ese valor que una versión relacional más libre como ‘con’.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - hermano suyo
  lexicon: HALOT
  rationale: El sufijo pronominal se expresa con ‘su’. Mantiene el énfasis narrativo en la fraternidad y prepara el eco de fratricidio dentro del mismo versículo.
- source_word: וַיְהִי בִּהְיוֹתָם
  english_pob_choice: Then, while they were
  chosen_spanish: Luego, mientras estaban
  alternatives_spanish:
  - Y sucedió que, cuando estaban
  - Y ocurrió que, estando
  lexicon: HALOT
  rationale: La construcción temporal narrativa se rinde de forma fluida con ‘Luego, mientras estaban’, conservando el marco de simultaneidad sin forzar un calco extraño en español.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el campo
  lexicon: HALOT
  rationale: ‘שָׂדֶה’ puede abarcar ‘campo’ o ‘campo abierto’. ‘En el campo’ es la opción más natural y suficientemente amplia para el contexto narrativo.
- source_word: וַיָּקָם ... אֶל
  english_pob_choice: rose up against
  chosen_spanish: se levantó contra
  alternatives_spanish:
  - se alzó contra
  - atacó
  lexicon: HALOT
  rationale: La construcción idiomática hebrea conserva la imagen de levantarse en hostilidad. ‘Se levantó contra’ preserva esa imagen mejor que ‘atacó’, que interpreta más de lo que el verbo expresa.
- source_word: וַיַּהַרְגֵהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo asesinó
  - lo hirió de muerte
  lexicon: HALOT
  rationale: הרג significa ‘matar’ o ‘dar muerte’. ‘Lo mató’ es la equivalencia más directa y evita introducir una calificación legal/moral que el verbo por sí solo no explicita.
theological_decisions:
- issue: Ausencia de las palabras de Caín en el texto masorético de esta cláusula
  english_pob_reading: The English audit trail notes that the MT reads only ‘And Cain said to Abel his brother,’ without an added quotation, and that ancient witnesses preserve a longer clause.
  chosen_spanish_reading: 'Se mantiene el texto breve: ‘Y Caín dijo a Abel, su hermano.’'
  alternative_spanish_readings:
  - '‘Y Caín dijo a Abel, su hermano: “Vayamos al campo.”’'
  - ‘Y Caín dijo a Abel, su hermano, “Vayamos al campo.”’
  rationale: El paquete fuente dado para este encargo presenta únicamente el texto masorético hebreo, sin la cláusula expandida. Por transparencia textual, el español conserva la lectura breve y evita incorporar una expansión no atestiguada en el texto fuente provisto.
  doctrine_reference: Principio de primacía del idioma original y transparencia textual del proyecto POB
- issue: Alcance de la violencia en וַיַּהַרְגֵהוּ
  english_pob_reading: The English audit chooses ‘killed him’ rather than ‘murdered him’ to avoid importing a legal category not explicit in the verb itself.
  chosen_spanish_reading: ‘lo mató’
  alternative_spanish_readings:
  - ‘lo asesinó’
  - ‘lo dio muerte’
  rationale: ‘Mató’ reproduce de forma más fiel el valor léxico básico de הרג. ‘Asesinó’ puede ser moralmente exacto en el contexto narrativo, pero añade una calificación no codificada por el verbo.
  doctrine_reference: Lexical precisión y no sobreinterpretación del verbo hebreo
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión importante: se eliminó la cláusula añadida ‘Let us go out to the field’ porque no estaba presente en el texto fuente provisto. Por ello, el español se alinea con la lectura breve del hebreo masorético de este encargo y no introduce material de testigos antiguos que aquí no fue incorporado en la base textual.'
  spanish_consistency_notes:
  - Se mantuvo ‘Caín’ y ‘Abel’ como nombres propios estándar.
  - Se evitó ‘SEÑOR’ o máscaras equivalentes porque este versículo no contiene el nombre divino.
  - ‘Campo’ se usa de manera consistente para שָׂדֶה en este contexto narrativo.
  - La repetición de ‘su hermano’ se conserva para reflejar el énfasis del hebreo y el peso narrativo del fratricidio.
