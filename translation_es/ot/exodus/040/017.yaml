translation:
  language: es
  text: Y sucedió en el primer mes del segundo año, el primer día del mes[a], que el tabernáculo fue erigido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el primero del mes». La expresión hebrea dice literalmente «en uno del mes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fue levantado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y ocurrió
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un evento en secuencia. «Y ocurrió» conserva ese avance narrativo con español moderno y digno, sin caer en un giro arcaizante.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - en el mes primero
  - en el primer mes del año
  lexicon: HALOT
  rationale: En contexto calendárico, חֹדֶשׁ se refiere a «mes». «Primer mes» refleja con naturalidad la designación temporal del hebreo.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  english_pob_choice: of the second year
  chosen_spanish: del segundo año
  alternatives_spanish:
  - en el segundo año
  - en la segunda año
  lexicon: HALOT
  rationale: La relación genitiva del hebreo queda bien expresada en español con «del segundo año», manteniendo el encuadre cronológico de la fórmula.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - el primero del mes
  - el día primero del mes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude a «uno del mes». En español, «el primer día del mes» comunica esa fecha de manera clara y fiel.
- source_word: הוּקַם
  english_pob_choice: was set up
  chosen_spanish: fue levantado
  alternatives_spanish:
  - fue erigido
  - fue instalado
  lexicon: HALOT
  rationale: 'El hophal de קום tiene valor pasivo: «fue levantado» preserva la idea de alzar/poner en pie el santuario. «Fue erigido» es posible, pero «levantado» suena más cercano al gesto físico implícito en la construcción del tabernáculo.'
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: מִשְׁכָּן designa aquí el santuario portátil específico de Éxodo. «Tabernáculo» es el término español tradicional y preciso para esta realidad cultual.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el sentido del hebreo y con la auditoría inglesa: se mantiene la fórmula cronológica completa, se conserva la pasiva del verbo final y se explicita en nota la idiomaticidad de בְּאֶחָד לַחֹדֶשׁ.'
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para מִשְׁכָּן por precisión cultual y consistencia con la terminología bíblica en español.
  - Se evita «SEÑOR» u otra sustitución no pertinente porque este versículo no contiene el tetragrámaton.
  - La datación se formula con orden natural en español, sin perder la estructura temporal del hebreo.
