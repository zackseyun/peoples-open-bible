translation:
  language: es
  text: Han cruzado el paso[a]; Geba es nuestro lugar de alojamiento. Ramá tiembla; Guibeá de Saúl[b] ha huido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘El paso’ traduce aquí מַעְבָּרָה como un lugar de cruce o travesía; también podría entenderse ‘el cruce’ o, menos probablemente por el contexto, ‘el vado’.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘Guibeá de Saúl’; alternativamente, ‘la Guibeá de Saúl’.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבְרוּ
  english_pob_choice: They have crossed over
  chosen_spanish: Han cruzado
  alternatives_spanish:
  - Cruzaron
  - Han pasado
  lexicon: HALOT
  rationale: El perfecto hebreo narra una acción completada con resultado visible. En español, el pretérito perfecto compuesto mantiene ese valor de avance reciente y repercusión presente, y 'cruzado' conserva el sentido de movimiento físico.
- source_word: מַעְבָּרָה
  english_pob_choice: the pass
  chosen_spanish: el paso
  alternatives_spanish:
  - el cruce
  - el vado
  - el lugar de paso
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un lugar de cruce o paso. 'El paso' es natural en español y encaja con el contexto militar itinerante sin especificar indebidamente un vado acuático.
- source_word: גֶּבַע
  english_pob_choice: Geba
  chosen_spanish: Geba
  alternatives_spanish:
  - Gueba
  lexicon: HALOT
  rationale: Nombre propio geográfico. Se conserva la transliteración establecida por la POB en inglés, con ortografía española mínima y legible.
- source_word: מָלוֹן
  english_pob_choice: lodging place
  chosen_spanish: lugar de alojamiento
  alternatives_spanish:
  - alojamiento
  - posada
  - lugar para pasar la noche
  lexicon: HALOT
  rationale: '''Lugar de alojamiento'' comunica la función concreta del sustantivo sin volverlo más doméstico o eclesiástico de lo que permite el hebreo.'
- source_word: לָנוּ
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - para nosotros
  lexicon: HALOT
  rationale: En una cláusula nominal española, 'nuestro lugar de alojamiento' reproduce de manera idiomática el valor posesivo del sufijo pronominal.
- source_word: חָרְדָה
  english_pob_choice: trembles
  chosen_spanish: tiembla
  alternatives_spanish:
  - está aterrada
  - se estremece
  - tiembla de miedo
  lexicon: HALOT
  rationale: El verbo חרד expresa temblor asociado al terror. 'Tiembla' preserva la imagen física y deja implícito el temor sin añadir una glosa interpretativa excesiva.
- source_word: הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Ramah
  lexicon: HALOT
  rationale: Nombre propio. Se usa la forma española habitual 'Ramá' para facilitar la lectura, manteniendo la referencia geográfica.
- source_word: גִּבְעַת שָׁאוּל
  english_pob_choice: Gibeah of Saul
  chosen_spanish: la Guibeá de Saúl
  alternatives_spanish:
  - Guibeá de Saúl
  - la Gibeá de Saúl
  - Saúl's Gibeah
  lexicon: HALOT
  rationale: El hebreo presenta una construcción nominal asociada a Saúl. 'La Guibeá de Saúl' conserva la estructura y evita la reescritura posesiva; se prefiere 'Guibeá' para una lectura más fluida en español.
- source_word: נָסָה
  english_pob_choice: has fled
  chosen_spanish: ha huido
  alternatives_spanish:
  - ha escapado
  - huye
  - se ha puesto en fuga
  lexicon: HALOT
  rationale: El perfecto verbal indica fuga consumada. 'Ha huido' es natural en español y conserva el resultado de pánico y retirada rápida.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado de WLC y el audit trail inglés de la POB, manteniendo la secuencia geográfica y el tono poético; no se registraron revisiones textuales o doctrinales adicionales en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo el orden breve y paralelo del hebreo para preservar el efecto de avance militar en cadena.
  - Se usó 'Ramá' con tilde y 'Guibeá' como formas españolas legibles de los topónimos, coherentes dentro del versículo.
  - No se añadió puntuación interpretativa más allá de los dos puntos y punto y coma implícitos en la cadencia poética; la puntuación busca claridad sin alterar la sintaxis hebrea.
