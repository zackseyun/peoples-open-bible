translation:
  language: es
  text: Samuel había muerto[a], y todo Israel había guardado duelo por él y lo había sepultado en Ramá, en su propia ciudad. Y Saúl había expulsado de la tierra a los médiums y a los espiritistas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que tenían espíritus familiares y los hechiceros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵת
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - murió
  - estaba muerto
  lexicon: HALOT
  rationale: El hebreo presenta la muerte de Samuel como trasfondo previo a los hechos narrados; el pluscuamperfecto español reproduce bien ese valor de anterioridad.
- source_word: וַיִּסְפְּדוּ לּוֹ
  english_pob_choice: had mourned for him
  chosen_spanish: había hecho duelo por él
  alternatives_spanish:
  - lo habían lamentado
  - lo habían llorado
  lexicon: HALOT
  rationale: ספד expresa duelo fúnebre público; 'hacer duelo' conserva ese sentido más plenamente que un simple 'lamentar'.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo colectivo del hebreo sin expandirlo innecesariamente.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: buried him
  chosen_spanish: lo había sepultado
  alternatives_spanish:
  - lo había enterrado
  - lo sepultó
  lexicon: HALOT
  rationale: קבר es 'sepultar/enterrar'; 'sepultado' es natural y digno en español bíblico, y armoniza con el registro funerario del contexto.
- source_word: בָרָמָה
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en Rama
  lexicon: HALOT
  rationale: Se conserva el topónimo con la forma española usual en contexto bíblico.
- source_word: וּבְעִירוֹ
  english_pob_choice: in his own city
  chosen_spanish: en su propia ciudad
  alternatives_spanish:
  - en su ciudad
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa de modo natural con 'su propia ciudad', que refleja la relación sin perder claridad.
- source_word: הֵסִיר
  english_pob_choice: had removed
  chosen_spanish: había quitado
  alternatives_spanish:
  - había retirado
  - había eliminado
  lexicon: HALOT
  rationale: הסיר implica quitar/retirar; 'quitar' es directo y suficientemente amplio para cubrir la expulsión o supresión de estas prácticas.
- source_word: הָאֹבוֹת
  english_pob_choice: the mediums
  chosen_spanish: a los médiums
  alternatives_spanish:
  - a los que tenían espíritus familiares
  - a los necromantes
  lexicon: HALOT
  rationale: אובות designa practicantes asociados con consulta de los muertos o de espíritus. 'Médiums' comunica esa función en español moderno, aunque sin cargarlo de connotaciones ajenas al texto.
- source_word: הַיִּדְּעֹנִים
  english_pob_choice: the spiritists
  chosen_spanish: a los espiritistas
  alternatives_spanish:
  - a los adivinos
  - a los hechiceros
  lexicon: HALOT
  rationale: יִדְּעֹנִים se refiere a otro grupo de practicantes ocultistas; 'espiritistas' mantiene el paralelismo con 'médiums' y evita 'hechiceros', que sería más interpretativo.
- source_word: מֵהָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  lexicon: HALOT
  rationale: '''La tierra'' es la opción más directa y conserva el matiz bíblico nacional-territorial.'
theological_decisions:
- issue: Términos para practicantes ocultistas sin importar folklore posterior
  english_pob_reading: mediums and the spiritists
  chosen_spanish_reading: médiums y espiritistas
  alternative_spanish_readings:
  - los que tenían espíritus familiares y los adivinos
  - necromantes y adivinos
  rationale: El hebreo nombra categorías prohibidas, pero no exige las etiquetas folclóricas tradicionales. 'Médiums y espiritistas' preserva la distinción básica y resulta comprensible para el lector actual.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca la estructura del hebreo y el auditable inglés POB: Samuel muerto como trasfondo, duelo y sepultura, y el resumen de la expulsión de practicantes ocultistas por Saúl. No se detectaron cambios necesarios respecto al pasaje fuente.'
  spanish_consistency_notes:
  - Se conservó el pluscuamperfecto ('había muerto', 'había hecho duelo', 'había quitado') para reflejar el valor de antecedencia del hebreo y del inglés POB.
  - '''Ramá'' se mantuvo como topónimo bíblico estándar; ''su propia ciudad'' explicita el sufijo posesivo de forma natural.'
  - Se eligió 'médiums' / 'espiritistas' como solución contemporánea y transparente para los términos ocultistas, con nota alternativa para el eco tradicional.
  - '''tierra'' se emplea con artículo implícito en el flujo español, manteniendo el registro bíblico del original.'
