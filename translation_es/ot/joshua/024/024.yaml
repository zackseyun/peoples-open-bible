translation:
  language: es
  text: 'Y el pueblo dijo a Josué: «A Yahvé nuestro Dios serviremos[a], y a su voz obedeceremos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse «adoraremos»; el verbo hebreo puede abarcar servicio religioso, pero «serviremos» conserva mejor el compromiso de lealtad pactal.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «escucharemos su voz»; en este idioma hebreo, la idea implica obedecer lo que dice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: HALOT
  rationale: La forma narrativa introduce discurso directo; en español, «dijo» es la equivalencia natural y sobria para este contexto.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo reunido
  lexicon: HALOT
  rationale: Aquí se trata de la comunidad pactal reunida; «el pueblo» conserva ese valor colectivo mejor que una formulación más genérica.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección hacia Josué se expresa naturalmente con «a» en español.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Nombres propios bíblicos
  rationale: Se usa la forma española establecida del nombre propio bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: La guía del proyecto pide «Yahvé» en el texto principal para יהוה; se preserva el nombre del pacto sin máscara litúrgica.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona plural expresa pertenencia de pacto; «nuestro Dios» reproduce bien esa relación.
- source_word: נַעֲבֹד
  english_pob_choice: we will serve
  chosen_spanish: serviremos
  alternatives_spanish:
  - adoraremos
  - haremos servicio
  lexicon: HALOT
  rationale: «Servir» mantiene el sentido amplio de servicio leal y devoción del verbo עבד, sin reducirlo solo a culto litúrgico.
- source_word: וּבְקוֹלוֹ
  english_pob_choice: and ... his voice
  chosen_spanish: a su voz
  alternatives_spanish:
  - en su voz
  - escuchando su voz
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «voz», que tiene resonancia de autoridad y pacto; en español la preposición «a» hace natural la construcción con obediencia.
- source_word: נִשְׁמָע
  english_pob_choice: we will obey
  chosen_spanish: obedeceremos
  alternatives_spanish:
  - escucharemos
  - oiremos
  lexicon: HALOT
  rationale: En el giro idiomático «escuchar oír la voz de» el sentido es obediencia; «obedeceremos» comunica la fuerza sin perder el trasfondo de escucha.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton en español: «Yahvé», conservando la identidad del nombre del pacto en lugar de una sustitución funcional.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido pactal de עבד en este versículo
  english_pob_reading: serve
  chosen_spanish_reading: serviremos
  alternative_spanish_readings:
  - adoraremos
  - haremos culto
  rationale: El compromiso incluye lealtad y obediencia, no solo acto litúrgico. «Serviremos» mantiene la amplitud pactal que el audit trail destaca.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Idiomático «oír la voz» como obediencia
  english_pob_reading: we will obey his voice
  chosen_spanish_reading: a su voz obedeceremos
  alternative_spanish_readings:
  - escucharemos su voz
  - oiremos su voz
  rationale: La expresión hebrea preserva la relación entre escuchar y obedecer; la inversión sintáctica ayuda a sonar natural en español sin perder la imagen original.
  doctrine_reference: HALOT / idiom of שמע
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en «nuestro Dios[a]» y [b] en «obedeceremos[b]». La redacción mantiene el nombre divino como Yahvé según la norma del proyecto y conserva el paralelismo hebreo entre servicio y obediencia.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la terminología base del proyecto para יהוה.
  - Se mantuvo «serviremos» para preservar el valor amplio de עבד.
  - Se conservó la imagen de la voz como medio de obediencia, con una construcción española fluida.
  - La puntuación y las comillas siguen la convención española moderna.
