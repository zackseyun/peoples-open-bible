translation:
  language: es
  text: ¿Confiarías en él porque su fuerza es grande,[a] y le dejarías tu labor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu trabajo»; el término hebreo puede referirse tanto al trabajo mismo como a lo que ese trabajo produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִבְטַח
  english_pob_choice: Will you trust
  chosen_spanish: ¿Confiarías en él?
  alternatives_spanish:
  - ¿Depositarías tu confianza en él?
  - ¿Te fiarías de él?
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica en 2ms. En español, «confiarías» mantiene el valor interrogativo y reproduce bien la idea relacional de בטח sin volver la frase pesada o demasiado técnica.
- source_word: בּוֹ
  english_pob_choice: him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  - de él
  lexicon: HALOT
  rationale: Confiar normalmente rige «en» en español. El pronombre se mantiene con referencia al animal del contexto, y «en él» conserva la dependencia sintáctica natural del verbo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La causalidad del hebreo se expresa con claridad mediante «porque», que suena natural en una pregunta retórica en español.
- source_word: רַב כֹּחוֹ
  english_pob_choice: his strength is great
  chosen_spanish: su fuerza es grande
  alternatives_spanish:
  - su poder es grande
  - es muy fuerte
  lexicon: HALOT
  rationale: «Fuerza» traduce bien כֹּחַ en este contexto de resistencia y capacidad para trabajar. Se evita «poder» por su mayor abstracción. «Grande» conserva el calificativo rַב de forma directa y sobria.
- source_word: וְתַעֲזֹב
  english_pob_choice: and leave
  chosen_spanish: y dejarías
  alternatives_spanish:
  - y abandonarías
  - y confiarías
  lexicon: HALOT
  rationale: El verbo עזב significa literalmente «dejar, abandonar». En castellano, «dejarías» permite conservar la concreción del acto de poner una labor bajo la responsabilidad del animal, sin introducir una paráfrasis como «confiarías» en el segundo miembro.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - con él
  lexicon: HALOT
  rationale: La preposición אֶל se expresa de modo directo con «a». En combinación con «dejarías», «a él» mantiene la dirección del encargo sin forzar un giro idiomático adicional.
- source_word: יְגִיעֶךָ
  english_pob_choice: your labor
  chosen_spanish: tu labor
  alternatives_spanish:
  - tu toil
  - tu trabajo
  - el fruto de tu trabajo
  lexicon: HALOT
  rationale: יְגִיעַ puede referirse al trabajo mismo o a lo que produce ese trabajo. «Tu labor» conserva esa amplitud mejor que una sola opción más específica como «trabajo» o «fruto». Se evita un lenguaje demasiado técnico o arcaico.
translation_notes:
  revision_awareness: Se mantuvo el sentido retórico y causal del hebreo con una formulación española natural. La versión inglesa auditada no requirió cambios textuales, y la nota lexical sobre יְגִיעַ se reflejó en español como alternativa equivalente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se conserva la segunda persona singular para reflejar el hebreo 2ms.
  - «Confiar» y «fuerza» mantienen el registro bíblico sin recurrir a vocabulario eclesiástico más tradicional que el hebreo no exige.
