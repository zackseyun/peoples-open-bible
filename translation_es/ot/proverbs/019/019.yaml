translation:
  language: es
  text: El hombre iracundo carga con el castigo[a]; pues si lo libras, tendrás que hacerlo de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el poseedor de ira carga con un castigo»; el hebreo es compacto e idiomático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גרל
  english_pob_choice: A ... man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Uno
  - El que
  lexicon: HALOT
  rationale: El hebreo es un sintagma compacto y idiomático que describe a una persona caracterizada por lo que sigue. En español, la forma más natural y fiel es explicitar el referente personal con «el hombre», manteniendo el valor proverbial sin volverlo rígido o impersonal.
- source_word: חֵמָה
  english_pob_choice: hot-tempered
  chosen_spanish: de ira
  alternatives_spanish:
  - iracundo
  - colérico
  - de furia
  lexicon: HALOT
  rationale: El término puede significar calor, ira o furor. La POB inglesa lo interpretó como rasgo de temperamento; en español, «de ira» conserva la imagen nominal y permite leer el genitivo como caracterización del hombre, sin perder la tensión lexical entre ira y temperamento.
- source_word: נֹשֵׂא
  english_pob_choice: bears
  chosen_spanish: carga con
  alternatives_spanish:
  - lleva
  - soporta
  - debe soportar
  lexicon: HALOT
  rationale: El participio expresa la acción proverbial de llevar o soportar. «Carga con» transmite con claridad la idea de asumir una consecuencia en registro natural y mantiene el presente gnómico.
- source_word: עֹנֶשׁ
  english_pob_choice: the penalty
  chosen_spanish: la pena
  alternatives_spanish:
  - el castigo
  - la sanción
  - la penalidad
  lexicon: HALOT
  rationale: El sustantivo apunta a pena/punición o sanción. «La pena» conserva amplitud semántica y permite un tono proverbial breve; no se especifica como «castigo» o «multa» porque el hebreo permanece compacto y general.
- source_word: כִּי אִם
  english_pob_choice: for if
  chosen_spanish: porque, si
  alternatives_spanish:
  - pues si
  - ya que, si
  - porque si
  lexicon: HALOT
  rationale: La combinación introduce la razón y el giro condicional. En español, «porque, si» reproduce de forma natural la relación causal-condicional preservada por la traducción inglesa.
- source_word: תַּצִּיל
  english_pob_choice: you rescue him
  chosen_spanish: lo libras
  alternatives_spanish:
  - lo rescatas
  - lo salvas
  - lo liberas
  lexicon: HALOT
  rationale: La forma causativa expresa rescatar/deliberar. «Libras» encaja bien en español bíblico contemporáneo y conserva el sentido de intervenir para sacarlo de la situación.
- source_word: וְעוֹד
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  - una vez más
  lexicon: HALOT
  rationale: El adverbio señala repetición. «De nuevo» comunica con sobriedad la idea de otra intervención repetida, sin añadir matiz temporal innecesario.
- source_word: תּוֹסִף
  english_pob_choice: you will only have to do it
  chosen_spanish: tendrás que hacerlo
  alternatives_spanish:
  - volverás a hacerlo
  - solo tendrás que repetirlo
  - tendrás que añadirlo
  lexicon: HALOT
  rationale: El Hiphil de יסף expresa añadir o continuar. La POB inglesa resuelve la elipsis con una lectura idiomática de repetición; en español, «tendrás que hacerlo» conserva la fuerza de la advertencia, y «de nuevo» ya explicita la repetición.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa de la POB, pero prioriza el hebreo compacto y su fuerza proverbial. No se introducen cambios de sentido doctrinal; la principal decisión es cómo verter en español el sintagma idiomático inicial y la elipsis final de repetición.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se ha preferido «la pena» frente a «el castigo» para conservar la brevedad proverbial del hebreo.
  - La frase final «tendrás que hacerlo de nuevo» refleja la repetición implícita sin sobrecargar el verso.
