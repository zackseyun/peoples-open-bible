translation:
  language: es
  text: Honra a Dios y honra al sacerdote, y dales[a] su porción, como se te mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo tiene un sufijo plural: «su porción / la porción de ellos», probablemente refiriéndose colectivamente a los sacerdotes y a sus derechos. El paralelo griego lo suaviza a singular: «su porción», y añade una lista más amplia de ofrendas y derechos sacerdotales: «Teme al Señor y glorifica al sacerdote, y dale su porción, como te ha sido mandado desde el principio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבֵּד
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Da honor a
  - Glorifica
  lexicon: HALOT
  rationale: El imperativo piel de כבד pide dar el debido peso o honor. «Honra» es natural en español moderno y conserva el valor ético sin introducir una idea más cultual de la necesaria.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - el Dios Todopoderoso
  lexicon: HALOT
  rationale: El hebreo usa אֵל, un título divino general. Aquí se traduce simplemente «Dios», siguiendo la prioridad del hebreo sobre el paralelo griego, que tiene «el Señor».
- source_word: וַהֲדַר
  english_pob_choice: show honor
  chosen_spanish: honra
  alternatives_spanish:
  - muestra honor a
  - glorifica
  - da honra a
  lexicon: HALOT
  rationale: La forma vuelve a expresar honor o dignidad. En español, repetir «honra» mantiene la fuerza paralela del hebreo y evita una paráfrasis innecesaria.
- source_word: כֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiador
  - el presbítero
  lexicon: HALOT
  rationale: Aunque el término base es «sacerdote», no «priest» en el sentido técnico cristiano, el español bíblico normal distingue adecuadamente el oficio levítico con «sacerdote» y suena más natural que una glosa más larga.
- source_word: וְתֵן
  english_pob_choice: give
  chosen_spanish: dale
  alternatives_spanish:
  - da
  - entrega
  lexicon: HALOT
  rationale: El mandato se dirige al lector de manera directa; «dale» conserva el imperativo y el dativo implícito del objeto debido.
- source_word: חֶלְקָם
  english_pob_choice: their portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - la porción que les corresponde
  - su parte debida
  lexicon: HALOT
  rationale: El hebreo tiene sufijo plural, pero el español necesita concordancia idiomática con el destinatario colectivo/institucional. «Su porción» mantiene la idea de lo debido sin forzar una pluralidad marcada en el sintagma.
- source_word: כַּאֲשֶׁר צֻוֵּיתָה
  english_pob_choice: as you were commanded
  chosen_spanish: como se te mandó
  alternatives_spanish:
  - como se te ordenó
  - como se te había mandado
  lexicon: HALOT
  rationale: La pasiva hebrea expresa una instrucción ya recibida. «Como se te mandó» es breve, idiomática y suficientemente fiel; evita sobreespecificar el tiempo perfecto si el contexto no lo exige.
theological_decisions:
- issue: Título divino en la primera cláusula frente al paralelo griego
  english_pob_reading: Hebrew אֵל is rendered 'God' in the main text; the Greek parallel has κύριος ('Lord').
  chosen_spanish_reading: «Dios» en el texto principal; el griego se refleja solo en nota.
  alternative_spanish_readings:
  - «Señor»
  - «el Señor»
  rationale: El testimonio hebreo conservado es claro y primario para este verso. Mantener «Dios» evita importar al cuerpo principal una lectura del paralelo griego que el audit trail preserva como variante significativa.
  doctrine_reference: Translation philosophy §1; prioridad del original hebreo sobre la tradición de traducción
- issue: Número del posesivo en חֶלְקָם
  english_pob_reading: The Hebrew plural sense is kept as 'their portion'; the Greek smooths to singular.
  chosen_spanish_reading: «su porción»
  alternative_spanish_readings:
  - «su porción» con nota sobre plural hebreo
  - «la porción de ellos»
  - «su parte correspondiente»
  rationale: En español, el posesivo singular puede referirse naturalmente a un colectivo institucional, y evita una expresión forzada. La nota conserva la tensión entre el plural hebreo y el singular del griego sin perder claridad.
  doctrine_reference: Translation philosophy §5; consistencia de términos y conservación de tensiones textuales
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «show honor to the priest» a «honor the priest» para acercarse más al paralelismo del hebreo. La redacción española sigue esa decisión con un verbo repetido («honra... honra») para conservar la simetría y la sobriedad del verso.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, conforme a la prioridad del hebreo en Sirácides cuando el testimonio hebreo es seguro.
  - Se usa «sacerdote» para כֹּהֵן por ser el equivalente bíblico natural y más transparente para lectores hispanos.
  - No se introduce «Señor» en el cuerpo principal, pero se documenta la variante griega en nota.
  - La frase «su porción» resuelve idiomáticamente el posesivo plural hebreo sin perder la referencia a los derechos sacerdotales.
