base_translation:
  language: en
  yaml_path: translation/ot/genesis/009/005.yaml
  text: And surely I will require your blood for your lives[a]. From the hand of every beast I will require it[e][d][c][b], and from the hand of man—from the hand of each man's brother—I will require the life of the man.
  footnotes:
  - marker: a
    text: Or 'your blood, for your lives.' The Hebrew speaks literally of blood in relation to life; 'lifeblood' makes the sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will call it to account.' The repeated verb carries a judicial sense of demanding an accounting for bloodshed.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the hand of each man, his brother.' The expression stresses human accountability for the life of another human.
    reason: lexical_alternative
  - marker: d
    text: Or "and from the hand of man. From the hand of each man's brother I will require the life of the man.".
    reason: previous_rendering
  - marker: e
    text: Or 'your lifeblood for your lives'.
    reason: previous_rendering
