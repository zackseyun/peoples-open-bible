id: 1TH.5.23
reference: 1 Thessalonians 5:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ θεὸς τῆς εἰρήνης ἁγιάσαι ὑμᾶς ὁλοτελεῖς, καὶ ὁλόκληρον ὑμῶν τὸ πνεῦμα καὶ ἡ ψυχὴ καὶ τὸ σῶμα ἀμέμπτως ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ τηρηθείη.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/023.yaml
  text: Now may the God of peace himself sanctify you completely[b][a], and may your whole spirit and soul and body be kept blameless at the coming of our Lord Jesus Messiah.
  footnotes:
  - marker: a
    text: Or, traditionally, “at the coming of our Lord Jesus Christ.”
    reason: alternative_reading
  - marker: b
    text: Paul’s wording names “spirit and soul and body”; interpreters differ on whether this teaches a three-part view of human nature or simply emphasizes the whole person.
    reason: lexical_alternative
translation:
  language: ko
  text: 이제 평화의 하나님 친히 여러분을 온전히 거룩하게 하시고, 여러분의 영과 혼과 몸[b]을 온전한 채로 우리 주 예수 메시아[a]께서 재림하실 때에 흠 없이 보전해 주시기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 전통적으로 「우리 주 예수 그리스도의 강림 때에」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 바울은 「영과 혼과 몸」을 명시한다. 해석자들은 이것이 사람의 본성에 대한 삼분법을 가르치는지, 아니면 단지 사람 전체를 강조하는 것인지에 대하여 의견이 갈린다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_korean: 평화의 하나님
  alternatives_korean:
  - 평강의 하나님
  - 화평의 하나님
  lexicon: BDAG
  rationale: 한국 교회 전통의 「평강의 하나님」도 가능하지만, 본 절은 13절의 「평화를 누리며 사십시오」와 짝을 이루므로 「평화」로 일관성을 유지한다.
- source_word: ἁγιάσαι ὑμᾶς ὁλοτελεῖς
  english_pob_choice: sanctify you completely
  chosen_korean: 여러분을 온전히 거룩하게 하시고
  alternatives_korean:
  - 여러분을 완전히 거룩하게 하시고
  - 여러분을 전적으로 성화하시고
  lexicon: BDAG
  rationale: ὁλοτελής의 「전체적으로 완성된」 의미를 「온전히」로 옮긴다.
- source_word: ὁλόκληρον ὑμῶν τὸ πνεῦμα καὶ ἡ ψυχὴ καὶ τὸ σῶμα
  english_pob_choice: your whole spirit and soul and body
  chosen_korean: 여러분의 영과 혼과 몸을 온전한 채로
  alternatives_korean:
  - 여러분의 영혼과 몸 전부를
  - 여러분의 영·혼·몸 전체를
  lexicon: BDAG
  rationale: 본 번역은 본문 어휘 셋(πνεῦμα, ψυχή, σῶμα)을 「영·혼·몸」으로 각각 보존한다. 한국어 「영혼」으로 두 어휘를 합쳐 옮기지 않는다. ὁλόκληρον의 「온전·완전」을 「온전한 채로」로 살린다.
- source_word: ἀμέμπτως ... τηρηθείη
  english_pob_choice: be kept blameless
  chosen_korean: 흠 없이 보전해 주시기를
  alternatives_korean:
  - 흠 없이 지켜 주시기를
  - 책망 받을 일 없이 간직되시기를
  lexicon: BDAG
  rationale: τηρέω의 「보존·지킴」을 「보전」으로 옮긴다. 2:10·3:13과 일관된 「흠 없이」 어휘.
- source_word: ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: at the coming of our Lord Jesus Messiah
  chosen_korean: 우리 주 예수 메시아께서 재림하실 때에
  alternatives_korean:
  - 우리 주 예수 메시아의 임재 때에
  - 우리 주 예수 메시아의 강림 때에
  lexicon: BDAG
  rationale: 본 절은 종말론적 보전·심판 정황으로 강림이 본문의 일차적 의미이다. 본 번역의 παρουσία 정책에 따라 4:15와 본 5:23에서는 「재림」을 채택해 한국어 독자에게 종말론적 무게를 분명히 전달한다.
theological_decisions:
- issue: 「영과 혼과 몸」 삼분법의 신학적 함의
  chosen_reading: 본문 셋을 「영과 혼과 몸」으로 각각 보존
  alternative_readings:
  - 「영혼과 몸」으로 두 어휘를 합쳐 옮김
  - 「전인」으로 풀어 옮김
  rationale: 헬라어 본문은 πνεῦμα, ψυχή, σῶμα 세 어휘를 분명히 구분하여 나열한다. 본 번역은 이 셋을 한국어 「영·혼·몸」으로 각각 보존하여, (1) 본문이 실제로 사용하는 어휘를 그대로 들려주고, (2) 해석자들의 의견이 갈리는 인간학적 함의(삼분법 가르침인지 전인 강조인지)를 본문에서 미리 결정해 좁히지 않는다. 한국 전통의 「영혼」(영+혼 통합어)으로 두 어휘를 합치면 본문의 구분이 사라지므로 피한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension rather than resolve it'
- issue: παρουσία의 한국어 선택 — 본 절에서는 「재림」
  chosen_reading: 우리 주 예수 메시아께서 재림하실 때에
  alternative_readings:
  - 우리 주 예수 메시아의 임재 때에
  - 우리 주 예수 메시아의 강림 때에
  rationale: 본 절은 종말론적 보전·평가 정황으로 강림이 본문의 일차적 의미이다. 4:15·5:23에서는 「재림」을 채택해 한국어 독자에게 종말론적 무게를 분명히 들려준다. 2:19에서는 인격적 임재의 의미가 우선적이므로 「임재」를 보존한다.
  doctrine_reference: 'KOREAN_PIPELINE.md Glossary — παρουσία case-by-case'
