translation:
  language: es
  text: Y contigo he hecho pedazos caballo y jinete[a][b]; y contigo he hecho pedazos carro de guerra[c] y jinete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he quebrado», «he quebrantado» o «he destrozado»; el verbo hebreo expresa una ruptura violenta.
    reason: lexical_alternative
  - marker: b
    text: O «por medio de ti» o «por ti»; la preposición hebrea indica instrumentalidad.
    reason: lexical_alternative
  - marker: c
    text: «Carro de guerra» también puede entenderse en algunos contextos de manera más colectiva, como «fuerza de carros», pero aquí la construcción singular favorece «carro de guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפַּצְתִּי
  english_pob_choice: I shattered
  chosen_spanish: he hecho pedazos
  alternatives_spanish:
  - he quebrantado
  - he destrozado
  - he quebrado en pedazos
  lexicon: HALOT
  rationale: El verbo hebreo comunica una ruptura violenta y martillante. En español, «he hecho pedazos» conserva la fuerza imagística y resulta natural; «he quebrantado» suena más formal, pero menos concreto para la escena bélica.
- source_word: בְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - por medio de ti
  - por ti
  - con tú
  lexicon: HALOT
  rationale: La preposición marca instrumentabilidad. «Contigo» mantiene la relación directa y reproduce bien la idea de medio/instrumento sin forzar una paráfrasis más explicativa.
- source_word: סוּס
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - caballo de guerra
  - rocín
  lexicon: HALOT
  rationale: El hebreo dice simplemente «caballo». «Caballo» es el equivalente directo y evita añadir una especificación militar que el texto no expresa explícitamente.
- source_word: רֹכְבוֹ
  english_pob_choice: rider
  chosen_spanish: jinete
  alternatives_spanish:
  - cabalgador
  - su jinete
  - su montador
  lexicon: HALOT
  rationale: La forma designa a quien monta. «Jinete» es claro, idiomático y suficientemente amplio para el paralelismo del verso; «su jinete» sería más explícito, pero la repetición hebrea permite mantener la misma forma en ambos miembros.
- source_word: רֶכֶב
  english_pob_choice: chariot
  chosen_spanish: carro
  alternatives_spanish:
  - carro de guerra
  - carroza
  lexicon: HALOT
  rationale: En español bíblico y moderno, «carro» puede sonar más natural que «carro de guerra» y sigue siendo fiel al término básico. Dado el paralelo con «jinete», el texto no obliga a una expresión más colectiva como «caballería» o «carros de guerra».
- source_word: רֹכְבוֹ
  english_pob_choice: its rider
  chosen_spanish: jinete
  alternatives_spanish:
  - su jinete
  - auriga
  - el que lo monta
  lexicon: HALOT
  rationale: El hebreo repite la misma forma participial. En español, repetir «jinete» conserva el paralelismo formal del verso y evita añadir un posesivo que el hebreo no exige de manera explícita.
theological_decisions:
- issue: Instrumentalidad del destinatario en el juicio divino
  english_pob_reading: The verse is rendered to show that the addressee is the instrument used by God ('with you I shattered') rather than making the addressee the direct grammatical subject.
  chosen_spanish_reading: El verso presenta a Dios como sujeto de la acción («he hecho pedazos») y al destinatario como medio o instrumento («contigo»), no como sujeto gramatical directo.
  alternative_spanish_readings:
  - por medio de ti he hecho pedazos
  - por ti he hecho pedazos
  - he hecho pedazos contigo
  rationale: El hebreo repite formas en primera persona con una frase en segunda persona, lo que mantiene a Yahvé como agente principal. «Contigo» conserva esa tensión sin resolverla de forma interpretativa.
  doctrine_reference: Primacía del original; preservar la tensión teológica sin diluir la soberanía divina en juicio.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que mantuvo el paralelismo «horse and rider ... chariot and rider» y eliminó el posesivo explícito en el segundo miembro. En español se preserva ese paralelismo repitiendo «jinete» sin añadir un posesivo innecesario.
  spanish_consistency_notes:
  - Se mantiene el estilo de acción divina directa con primera persona («he hecho pedazos») para reflejar la voz del hebreo.
  - Se conserva «contigo» como solución instrumental idiomática y suficientemente cercana al hebreo.
  - Se evita introducir «carro de guerra» porque el singular hebreo y el audit trail favorecen «carro».
  - Se usa «jinete» en ambos miembros para sostener la simetría formal del verso.
