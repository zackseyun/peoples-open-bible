translation:
  language: es
  text: Sihón, rey de los amorreos, que habitaba en Hesbón, gobernando desde Aroer, que está a la orilla del valle del Arnón, y desde la mitad del valle, hasta la mitad de Galaad, hasta el valle del Jaboc, el límite de los hijos de Amón[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Amón»; es decir, los amonitas.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo נחל puede denotar valle, wadi o cauce de torrente; aquí se refiere al Arnón y al Jaboc como límites territoriales.
    reason: cultural_note
lexical_decisions:
- source_word: הַיּוֹשֵׁב
  english_pob_choice: who lived
  chosen_spanish: que habitaba
  alternatives_spanish:
  - que vivía
  - que residía
  - que moraba
  lexicon: HALOT
  rationale: El participio de ישב expresa residencia/habitación. «Habitaba» conserva el sentido de morar en un lugar y suena natural en español bíblico actual sin perder el matiz durativo.
- source_word: מֹשֵׁל
  english_pob_choice: ruling
  chosen_spanish: gobernando
  alternatives_spanish:
  - dominando
  - ejerciendo dominio
  - regía
  lexicon: HALOT
  rationale: Aquí el participio describe el ejercicio activo de autoridad territorial. «Gobernando» sigue la línea del inglés auditado y mantiene el valor político del verbo sin sobrerreligiosizarlo.
- source_word: מֵעֲרוֹעֵר
  english_pob_choice: from Aroer
  chosen_spanish: desde Aroer
  alternatives_spanish:
  - a partir de Aroer
  - desde Aroer mismo
  lexicon: HALOT
  rationale: La preposición marca punto de partida de la extensión territorial. «Desde» reproduce bien ese arranque geográfico en español.
- source_word: שְׂפַת נַחַל אַרְנוֹן
  english_pob_choice: the bank of the Arnon Valley
  chosen_spanish: la orilla del valle del Arnón
  alternatives_spanish:
  - la ribera del Arnón
  - el borde del valle del Arnón
  - la margen del Arnón
  lexicon: HALOT
  rationale: שׂפה tiene la idea de borde/orilla/margen. Conservé «valle» para נחל, siguiendo la nota inglesa que evita forzar una imagen de río permanente; «orilla» comunica el borde territorial de forma natural.
- source_word: וְתוֹךְ הַנַּחַל
  english_pob_choice: and from the middle of the valley
  chosen_spanish: y desde en medio del valle
  alternatives_spanish:
  - y en medio del valle
  - y desde el medio del valle
  - y dentro del valle
  lexicon: HALOT
  rationale: תוך es «medio/mitad/interior». Añadí «desde» por la misma razón territorial que en el inglés auditado, para que la secuencia describa extensión de dominio y no solo ubicación estática.
- source_word: וַחֲצִי הַגִּלְעָד
  english_pob_choice: and half of Gilead
  chosen_spanish: y la mitad de Galaad
  alternatives_spanish:
  - y medio Galaad
  - y la media parte de Galaad
  lexicon: HALOT
  rationale: חצי es literalmente «mitad». «La mitad de Galaad» mantiene la partición territorial de manera clara y fiel.
- source_word: וְעַד יַבֹּק הַנַּחַל
  english_pob_choice: as far as the Jabbok Valley
  chosen_spanish: hasta el valle del Jaboc
  alternatives_spanish:
  - hasta el Jaboc
  - hasta el wadi del Jaboc
  - hasta la ribera del Jaboc
  lexicon: HALOT
  rationale: עד indica límite final. Como en el inglés auditado, נחל aquí funciona como accidente territorial; «valle» ofrece una solución natural en español para el par Arnón/Jaboc.
- source_word: גְּבוּל בְּנֵי עַמּוֹן
  english_pob_choice: the border of the sons of Ammon
  chosen_spanish: el límite de los hijos de Amón
  alternatives_spanish:
  - la frontera de los hijos de Amón
  - el límite de los amonitas
  - la frontera de Amón
  lexicon: HALOT
  rationale: Conservé la construcción literal «hijos de Amón» porque el inglés auditado también preserva el hebraísmo, y porque el texto está definiendo un borde territorial.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular colectivo/atributivo ligado a «rey», el español idiomático exige plural para el pueblo. «Los amorreos» corresponde al uso bíblico habitual y al valor colectivo del término.
theological_decisions:
- issue: Topografía territorial con נחל
  english_pob_reading: נחל can denote a valley, wadi, or streambed; here it refers to the Arnon and Jabbok as territorial boundaries.
  chosen_spanish_reading: 'נחל se entiende aquí como un accidente territorial de frontera: «valle».'
  alternative_spanish_readings:
  - wadi
  - cauce
  - lecho del torrente
  rationale: 'No hay una carga doctrinal, pero sí una decisión exegética importante: el pasaje delimita dominio político. «Valle» evita una lectura hidrográfica demasiado estrecha y deja claro el carácter fronterizo del topónimo.'
  doctrine_reference: N/A
- issue: Construcción hebrea étnica בני עמון
  english_pob_reading: Hebrew 'sons of Ammon'; that is, the Ammonites.
  chosen_spanish_reading: «hijos de Amón» se mantiene como hebraísmo transparente, con sentido étnico/territorial.
  alternative_spanish_readings:
  - amonitas
  - pueblo de Amón
  rationale: La POB inglesa conserva la forma hebrea para no perder la estructura del original. En español también puede conservarse sin confusión; no obstante, el sentido etnónimo queda claro por el contexto del límite territorial.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca la versión inglesa auditada, sin cambios de fondo respecto del sentido territorial del versículo. Se conservan las dos decisiones clave del POB: el pueblo como «hijos de Amón» y נחל como límite geográfico, no como río perenne.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no lo contiene.
  - Se usó «amorreos» en plural para una etnización natural del singular hebreo en apposición.
  - «Galaad» y «Jaboc» siguen la forma hispánica común y consistente con el corpus.
  - La puntuación reproduce la enumeración territorial del original y del auditado inglés.
