translation:
  language: es
  text: Pero ellos se burlaron de sus mensajeros[a], y siempre que Yahvé hablaba, se burlaban de sus profetas, hasta que, en su ira contra su nación por causa de sus actos impíos[b], ordenó que los reyes de los caldeos subieran contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ángeles»; aquí el contexto probablemente se refiere a mensajeros humanos de Dios, en paralelo con «sus profetas».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «los reyes de los caldeos» (plural). El paralelo hebreo de 2 Crónicas 36 enfatiza al rey de Babilonia/Nabucodonosor. El texto principal sigue el testimonio griego de 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: ἐμυκτήρισαν
  english_pob_choice: mocked
  chosen_spanish: se burlaron de
  alternatives_spanish:
  - se mofaron de
  - despreciaron
  - se burlaron abiertamente de
  lexicon: LSJ
  rationale: El verbo griego expresa burla despectiva; en español, «se burlaron de» comunica bien la idea sin endurecer innecesariamente el registro.
- source_word: ἐν τοῖς ἀγγέλοις αὐτοῦ
  english_pob_choice: his messengers
  chosen_spanish: sus mensajeros
  alternatives_spanish:
  - sus ángeles
  - sus enviados
  lexicon: BDAG/LSJ
  rationale: En este contexto histórico-profético, el sentido más probable es el de mensajeros humanos enviados por Dios, en paralelo con «sus profetas». Se mantiene la alternativa literal «ángeles» en nota porque el griego la permite.
- source_word: ᾗ ἡμέρᾳ ἐλάλησεν Κύριος
  english_pob_choice: whenever the Lord spoke
  chosen_spanish: siempre que el Señor hablaba
  alternatives_spanish:
  - cuando el Señor hablaba
  - el día en que el Señor habló
  lexicon: LSJ
  rationale: La construcción temporal en el contexto funciona de modo repetido/general. «Siempre que el Señor hablaba» refleja mejor ese valor que una sola referencia puntual al día.
- source_word: ἐκπαίζοντες
  english_pob_choice: making sport of
  chosen_spanish: se entretenían escarneciendo a
  alternatives_spanish:
  - se burlaban de
  - se mofaban de
  - los ridiculizaban
  lexicon: LSJ
  rationale: La forma intensiva añade la idea de tratar a los profetas como objeto de diversión o escarnio. «Se entretenían escarneciendo» intenta conservar esa fuerza, aunque suene más elaborado que un simple «se burlaban».
- source_word: θυμῶντα αὐτὸν
  english_pob_choice: in his anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - cuando se encendió su ira
  - airado
  lexicon: LSJ
  rationale: La frase resume la participación causal del pasaje; «en su ira» conserva el valor directo del griego y funciona naturalmente en español.
- source_word: ἐπὶ τῷ ἔθνει αὐτοῦ
  english_pob_choice: his nation
  chosen_spanish: contra su nación
  alternatives_spanish:
  - contra su pueblo
  - contra su nación y pueblo
  lexicon: LSJ
  rationale: El griego usa ἐπί con sentido hostil/judicial. En español, «contra su nación» expresa mejor esa orientación que un mero posesivo neutro.
- source_word: διὰ τὰ δυσσεβήματα
  english_pob_choice: because of their ungodly deeds
  chosen_spanish: por causa de sus actos impíos
  alternatives_spanish:
  - por sus impiedades
  - por sus obras impías
  - a causa de sus actos impíos
  lexicon: LSJ
  rationale: «Actos impíos» mantiene el matiz religioso de δυσσεβήματα sin recurrir a un tecnicismo menos natural en español.
- source_word: προστάξαι ἀναβιβάσαι
  english_pob_choice: he commanded ... to come up
  chosen_spanish: ordenó hacer subir
  alternatives_spanish:
  - mandó subir
  - dio orden de traer
  lexicon: LSJ
  rationale: La construcción expresa una orden con movimiento ascendente o avance militar. «Hacer subir contra ellos» conserva la imagen de avance hostil del griego.
- source_word: τοὺς βασιλεῖς τῶν Χαλδαίων
  english_pob_choice: the kings of the Chaldeans
  chosen_spanish: a los reyes de los caldeos
  alternatives_spanish:
  - a los reyes caldeos
  - al rey de Babilonia
  lexicon: LSJ
  rationale: Se preserva el plural del testimonio griego. «Caldeos» es el equivalente español natural de Χαλδαίων; no se armoniza con el paralelo hebreo singular.
theological_decisions:
- issue: Sentido de ἄγγελοι en un contexto profético de juicio
  english_pob_reading: human messengers sent by God
  chosen_spanish_reading: mensajeros humanos enviados por Dios
  alternative_spanish_readings:
  - ángeles celestiales
  - enviados
  rationale: La proximidad inmediata de «sus profetas» inclina el sentido hacia mensajeros humanos, no seres celestiales. La nota preserva la alternativa literal posible del griego.
  doctrine_reference: Translation philosophy §1, §3
- issue: Retener el plural griego «reyes de los caldeos» frente al paralelo hebreo singular
  english_pob_reading: retain the Greek plural in the main text
  chosen_spanish_reading: mantener el plural griego en el texto principal
  alternative_spanish_readings:
  - el rey de los caldeos
  - Nabucodonosor, rey de Babilonia
  rationale: Como 1 Esdras se traduce aquí desde el testimonio griego, no se corrige el plural por armonización con el paralelo hebreo. La diferencia se conserva por fidelidad textual.
  doctrine_reference: Translation philosophy §1; primacía del griego en 1 Esdras con paralelos hebreos como control
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB que prefirió ''whenever the Lord spoke'' frente a ''on the day the Lord spoke'', además de la decisión estable de mantener ''his messengers'' y el plural ''kings of the Chaldeans'' sin armonización al paralelo hebreo. La traducción española refleja esas mismas prioridades: valor temporal repetido, posible sentido de mensajeros humanos, y preservación del plural griego.'
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριος en esta cláusula temporal, siguiendo el uso cristiano estándar del español y sin necesidad de explicitar aquí el nombre divino.
  - «Caldeos» se mantiene como etnónimo histórico habitual en español bíblico.
  - Se evita repetir «burlaron» y «escarneciendo» para conservar la intensificación del griego ἐκπαίζοντες.
  - La puntuación separa las dos acciones de desprecio y la cláusula causal final con una estructura fluida pero cercana al orden del original.
