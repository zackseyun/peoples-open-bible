translation:
  language: es
  text: Había un hombre que vivía en Babilonia, y su nombre era Joakim[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma tradicional en español suele darse como «Joaquín»; el griego aquí dice Ἰωακείμ, reflejado más directamente por «Joakim».
