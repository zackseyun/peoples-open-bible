translation:
  language: es
  text: 'Yo dije: «En medio[a] de mis días tendré que ir a las puertas del Seol[b]; he sido privado del resto de mis años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el corte de mis días» o «en la quietud de mis días». El hebreo es difícil; en contexto suele entenderse como la mitad o el punto culminante de la vida.'
