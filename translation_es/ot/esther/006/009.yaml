    issue: «el vestido» para הַלְּבוּשׁ
    rationale: Aunque posible, «vestido» en español contemporáneo suele evocar una prenda específica y puede sonar menos cortesano. El contexto apunta a una prenda de honor/real; «la vestidura» encaja mejor con el registro y el singular definido.
  - severity: medium
    issue: «plaza abierta» es poco idiomático
    rationale: La nota correctamente explica רְחוֹב como espacio público amplio, pero en español natural «plaza pública» expresa mejor el sentido sin sonar calcado.
  - severity: medium
    issue: La nota [b] está anclada en el lugar incorrecto
    rationale: La nota [b] explica רְחוֹב (‘plaza/espacio abierto’), por lo que debe marcar el sintagma correspondiente, no aparecer tras «abierta» de una forma que pueda asociarse ambiguamente; conviene reanclarla explícitamente a «plaza pública[b]».
  - severity: low
    issue: Desajuste entre «oficiales» en el texto y «dignatarios» en la nota
    rationale: No es un error grave, pero la armonización léxica mejora la fidelidad al rango de פַּרְתְּמִים y el registro cortesano.
