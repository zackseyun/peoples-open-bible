revisions:
- from: El injusto no escapará con el saqueo[a], y el deseo de los justos nunca fallará.
  to: El injusto no escapará con el botín[a], y el deseo de los justos nunca será frustrado.
  rationale: Se ajusta «saqueo» a «botín» para una expresión española más natural y más cercana a la idea de plunder/ganancia arrebatada. Se cambia «nunca fallará» por «nunca será frustrado» porque expresa con mayor claridad en español la fuerza del hebreo en la segunda cola y evita una ambigüedad innecesaria. La nota textual se conserva con el mismo marcador porque sigue documentando correctamente la variante griega significativa.
