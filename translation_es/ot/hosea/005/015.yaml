translation:
  language: es
  text: Yo iré, volveré a mi lugar hasta que reconozcan su culpa[a] y busquen mi rostro; en su angustia me buscarán con diligencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «hasta que lleven su culpa» o «hasta que sean hallados culpables». El verbo hebreo puede denotar culpa incurrida o culpa reconocida; el contexto de buscar a Yahvé favorece «reconozcan su culpa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me buscarán temprano». El modismo hebreo probablemente expresa una búsqueda diligente o intensa, no solo una búsqueda a temprana hora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֵךְ
  english_pob_choice: I will go
  chosen_spanish: Yo iré
  alternatives_spanish:
  - Me iré
  - Yo me iré
  lexicon: HALOT
  rationale: El verbo הלך en qal 1cs expresa movimiento simple; en español, «iré» reproduce esa acción sin añadir matices no presentes. El pronombre explícito ayuda a marcar la primera persona en un enunciado profético directo.
- source_word: אָשׁוּבָה
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - retornaré
  - me volveré
  lexicon: HALOT
  rationale: שוב significa «volver/retornar». «Volveré» es natural en español y conserva el paralelismo con el verbo anterior y con «mi lugar».
- source_word: מְקוֹמִי
  english_pob_choice: my place
  chosen_spanish: mi lugar
  alternatives_spanish:
  - mi morada
  - mi vivienda
  lexicon: HALOT
  rationale: מקום es literalmente «lugar». «Mi lugar» evita especificar más de lo que el hebreo dice y mantiene la imagen de retirada.
- source_word: יֶאְשְׁמ֖וּ
  english_pob_choice: they acknowledge their guilt
  chosen_spanish: reconozcan su culpa
  alternatives_spanish:
  - asuman su culpa
  - confiesen su culpa
  - se reconozcan culpables
  lexicon: HALOT
  rationale: El verbo אשם puede referir culpa incurrida o culpa reconocida. Dado el contexto de buscar a Yahvé, «reconozcan su culpa» comunica bien el sentido de tomar conciencia y asumirla sin reducirlo sólo a un estado jurídico.
- source_word: וּבִקְשׁ֣וּ פָנָ֑י
  english_pob_choice: and seek my face
  chosen_spanish: y busquen mi rostro
  alternatives_spanish:
  - y me busquen
  - y busquen mi presencia
  lexicon: HALOT
  rationale: בקש פנים es un modismo de buscar la presencia o el favor de alguien. «Buscar mi rostro» conserva la metáfora bíblica y la resonancia cultual, mientras sigue siendo comprensible en español.
- source_word: בַּצַּ֥ר לָהֶ֖ם
  english_pob_choice: in their distress
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su aflicción
  - cuando les llegue la angustia
  lexicon: HALOT
  rationale: La construcción idiomática expresa la circunstancia de angustia que les pertenece. «En su angustia» es idiomático en español y conserva el sentido temporal/circunstancial.
- source_word: יְשַׁחֲרֻנְנִי
  english_pob_choice: they will seek me earnestly
  chosen_spanish: me buscarán con diligencia
  alternatives_spanish:
  - me buscarán temprano
  - me buscarán ardientemente
  lexicon: HALOT
  rationale: שחר en piel puede aludir a buscar temprano, pero aquí el contexto favorece una búsqueda intensa y persistente. «Con diligencia» evita el posible malentendido temporal de «temprano» y retiene la fuerza del verbo.
theological_decisions:
- issue: Retirada divina y restauración relacional
  english_pob_reading: The verse is rendered as God withdrawing from his people until they repent, without specifying metaphysical absence beyond the relational/judicial imagery of the text.
  chosen_spanish_reading: El verso se traduce como una retirada divina en términos relacionales y judiciales, hasta que haya reconocimiento de culpa y búsqueda sincera de Yahvé, sin convertirlo en una explicación metafísica más amplia.
  alternative_spanish_readings:
  - Abandono total y definitivo
  - Cambio meramente subjetivo en la percepción humana
  rationale: Los verbos «iré, volveré a mi lugar» presentan una retirada real en el marco del pacto y del juicio, pero el texto no desarrolla una doctrina sistemática sobre la ausencia divina. La traducción preserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: Pasaje revisado con alta concordancia entre el texto hebreo y el audit trail inglés; no se registraron revisiones aplicadas en la versión más reciente, por lo que la redacción española sigue de cerca las decisiones estables del POB.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se conservó «buscar mi rostro» para reflejar el modismo hebreo y no sustituirlo por una paráfrasis menos transparente.
  - «Con diligencia» recoge la fuerza aspectual/intensiva de יְשַׁחֲרֻנְנִי sin imponer sólo el valor temporal de «temprano».
