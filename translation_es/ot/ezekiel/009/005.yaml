translation:
  language: es
  text: 'Y a los otros les dijo de modo que yo lo oyera[a]: «Pasen por la ciudad tras él y hieran; no perdone[b] su ojo, y no tengan piedad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en mis oídos»; modismo que indica que el profeta oyó directamente el mandato.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no perdone su ojo»; modismo vívido que significa no retener compasión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאֵלֶּה
  english_pob_choice: And to the others
  chosen_spanish: Y a los otros
  alternatives_spanish:
  - Y a estos
  - Y a aquellos
  lexicon: HALOT
  rationale: La forma hebrea retoma a los ejecutores restantes en contraste con el hombre vestido de lino del versículo anterior. «Los otros» expresa bien esa referencia contrastiva sin añadir contenido.
- source_word: אָמַר בְּאָזְנַי
  english_pob_choice: he said in my hearing
  chosen_spanish: les dijo en mi oído[a]
  alternatives_spanish:
  - les dijo en mi audición
  - les dijo para que yo oyera
  lexicon: HALOT
  rationale: El hebreo «en mis oídos» es un modismo de audibilidad directa. En español, «en mi oído» conserva la imagen corporal y la evidencia de que Ezequiel oyó el mandato; se marca con nota para aclarar el giro idiomático.
- source_word: עִבְרוּ
  english_pob_choice: Pass through
  chosen_spanish: Pasen por
  alternatives_spanish:
  - Atravesen
  - Vayan por
  lexicon: HALOT
  rationale: El imperativo exige movimiento a través de la ciudad. «Pasen por» es natural en español y mantiene el valor directivo del mandato.
- source_word: בָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: El referente contextual es Jerusalén. «La ciudad» es claro y sobrio, sin añadir identificación que el verso no explicita.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - después de él
  lexicon: HALOT
  rationale: El hebreo indica seguir al hombre marcado en la secuencia del juicio. «Detrás de él» preserva la imagen espacial más que «después de él».
- source_word: וְהַכּוּ
  english_pob_choice: and strike
  chosen_spanish: y golpeen
  alternatives_spanish:
  - y hieran
  - y den muerte
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir con violencia judicial. «Golpeen» conserva la amplitud semántica sin especificar de más el resultado, como hace el inglés POB.
- source_word: עַל תָּחֹס עֵינֵיכֶם
  english_pob_choice: do not let your eye spare
  chosen_spanish: no tenga compasión su ojo[b]
  alternatives_spanish:
  - no perdone su ojo
  - no se apiade su ojo
  lexicon: HALOT
  rationale: El hebreo usa un modismo vívido donde el «ojo» representa la mirada compasiva que se retiene. En español, una reproducción literal resultaría poco natural; «no tenga compasión su ojo» comunica la misma figura y el sentido de no contener misericordia. La nota explica la imagen original.
- source_word: וְאַל תַּחְמֹלוּ
  english_pob_choice: and do not show pity
  chosen_spanish: y no perdonen
  alternatives_spanish:
  - y no tengan piedad
  - y no tengan compasión
  lexicon: HALOT
  rationale: חמל añade una prohibición explícita de perdonar/mostrar piedad. «No perdonen» evita repetir exactamente la idea anterior y conserva el paralelo de intensificación.
theological_decisions:
- issue: Severidad del juicio ordenado
  english_pob_reading: The command is rendered as an uncompromising divine judgment without softening the violence or importing extra theological explanation.
  chosen_spanish_reading: El mandato se presenta como juicio divino directo e implacable, sin suavizar su violencia ni agregar explicación interpretativa.
  alternative_spanish_readings:
  - Una formulación más eufemística que atenúe la fuerza del mandato
  rationale: El hebreo ofrece una escena de juicio dura y explícita. La versión española debe preservar esa tensión teológica y retórica, no resolverla con lenguaje atenuado.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than smooth it away.'
translation_notes:
  revision_awareness: 'La redacción sigue el resultado de revisión más reciente del POB inglés en cuanto a la naturalidad de «the others», reflejada aquí como «los otros», y conserva el paralelismo entre dos prohibiciones distintas: la primera con la imagen del ojo que no se apiada, la segunda con el verbo explícito de no perdonar. También se mantiene la fuerza del imperativo plural y del mandato judicial sin mitigarlo.'
  spanish_consistency_notes:
  - Se usa «los otros» para el grupo restante en contraste con el hombre vestido de lino.
  - «Yahvé» no aparece en este versículo, por lo que no hay ajuste de tetragrámaton.
  - Se conserva la distinción entre la imagen idiomática del ojo y la prohibición explícita de perdonar.
  - El tono es formal, bíblico y legible en español latinoamericano, sin calcos innecesarios.
