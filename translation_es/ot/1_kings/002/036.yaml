translation:
  language: es
  text: 'Entonces el rey envió y llamó a Simei[a], y le dijo: «Constrúyete una casa en Jerusalén y vive allí, y no salgas de allí a ninguna parte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: literalmente, «aquí o allí»; es un modismo distributivo que significa «a ninguna parte» o «a ningún lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió a buscar
  lexicon: HALOT
  rationale: El hebreo usa una fórmula narrativa con שׁלח, y el audit trail inglés conserva 'sent' junto con el verbo siguiente. En español, 'envió' refleja bien la acción básica sin añadir matices que no están en el texto.
- source_word: וַיִּקְרָא לְשִׁמְעִי
  english_pob_choice: called for Shimei
  chosen_spanish: llamó a Simi
  alternatives_spanish:
  - convocó a Simi
  - llamó por Simi
  lexicon: HALOT
  rationale: 'קרא con ל expresa una llamada o convocatoria. ''Llamó a Simi'' es natural en español y conserva la doble secuencia de acciones: enviar y luego llamar. Se usa ''Simi'' como forma española estable del nombre hebreo שִׁמְעִי.'
- source_word: בְּנֵה לְךָ בַיִת
  english_pob_choice: Build yourself a house
  chosen_spanish: Edifícate una casa
  alternatives_spanish:
  - Construye una casa para ti
  - Edifica para ti una casa
  lexicon: HALOT
  rationale: El imperativo בְּנֵה exige un mandato directo. 'Edifícate' conserva el valor reflexivo de לְךָ ('para ti / para tu propio beneficio') sin perder naturalidad. 'Casa' mantiene el sentido físico de בַּיִת.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Es el equivalente locativo estándar del topónimo. No requiere expansión.
- source_word: וְיָשַׁבְתָּ שָׁם
  english_pob_choice: and live there
  chosen_spanish: y habita allí
  alternatives_spanish:
  - y vive allí
  - y mora allí
  lexicon: HALOT
  rationale: ישׁב puede significar sentarse, habitar o residir. En este mandato de residencia restringida, 'habita allí' conserva la fuerza de permanencia y suena digno en español bíblico contemporáneo.
- source_word: וְלֹא תֵצֵא מִשָּׁם
  english_pob_choice: and do not go out from there
  chosen_spanish: y no salgas de allí
  alternatives_spanish:
  - y no te vayas de allí
  - y no salgas de ese lugar
  lexicon: HALOT
  rationale: יצא es 'salir'. 'No salgas de allí' reproduce la prohibición con claridad y sin sobreinterpretar el verbo como 'irse', que sería más idiomático pero menos preciso.
- source_word: אָ֥נֶה וָ/אָֽנָה
  english_pob_choice: anywhere
  chosen_spanish: a ninguna parte
  alternatives_spanish:
  - aquí o allí
  - en ninguna dirección
  - a ningún lugar
  lexicon: HALOT
  rationale: El hebreo usa un modismo distributivo ('aquí y allí'), y la traducción inglesa lo resolvió como 'anywhere'. En español, 'a ninguna parte' comunica naturalmente la prohibición total de movimiento y preserva el alcance idiomático.
theological_decisions:
- issue: Valor del mandato real de residencia restringida
  english_pob_reading: Build yourself a house in Jerusalem and live there, and do not go out from there anywhere.
  chosen_spanish_reading: Edifícate una casa en Jerusalén, y habita allí; y no salgas de allí a ninguna parte.
  alternative_spanish_readings:
  - Constrúyete una casa en Jerusalén, y vive allí; y no te vayas de allí a ningún lugar.
  rationale: No hay una decisión doctrinal compleja, pero conviene conservar el carácter de mandato real y la restricción absoluta del movimiento. La formulación elegida mantiene el tono jurídico-narrativo del hebreo y del audit trail inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo consonante/vocalizado del WLC y coincide sustancialmente con la traducción auditada en inglés. No se detectan revisiones textuales relevantes en el paquete de trabajo; se mantiene el sentido idiomático de אָנֶה וָאָנָה con una solución española natural.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Simi'' se adopta como transliteración española de שִׁמְעִי, consistente con una forma breve y pronunciable.'
  - 'Se preserva la secuencia verbal del hebreo: envío, llamado, mandato, permanencia, y prohibición de salir.'
  - La nota [a] está anclada a 'a ninguna parte' porque allí se resuelve el modismo hebreo.
