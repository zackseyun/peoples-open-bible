lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» transmite con naturalidad la secuencia sin perder el valor progresivo. «Habló» conserva el matiz de discurso formal de דבר mejor que «dijo», mientras que לֵאמֹר queda reflejado con «diciendo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma editorial de la serie en español, «Yahvé», en lugar de sustituirlo por un título. Esto mantiene visible el nombre personal del pacto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición direccional que introduce al destinatario del habla se expresa de forma natural en español con «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en la forma usual del español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula de introducción de discurso se conserva de manera explícita con el gerundio «diciendo», que mantiene el patrón hebreo sin fundirlo con el verbo principal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; por coherencia con la política editorial del POB en español, se traslada como «Yahvé», preservando el nombre propio divino y no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; la presente redacción sigue el consenso alto del audit trail y adapta la sintaxis al español sin alterar el valor lexical ni teológico del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología base del proyecto en español.
  - La fórmula narrativa conserva el verbo de habla y el gerundio introductorio para reflejar la estructura hebrea sin sobreinterpretación.
  - Los nombres propios se presentan en sus formas castellanas habituales cuando existen.
