translation:
  language: es
  text: 'Así que oré a Yahvé y dije[a]: «Señor Yahvé, no destruyas a tu pueblo y tu heredad, a quienes redimiste por tu grandeza[b], a quienes sacaste de Egipto con mano fuerte.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé». El hebreo tiene אֲדֹנָי יְהוִה, título compuesto que une «Señor» con el nombre divino; se evita una repetición extraña como «Señor SEÑOR».'
    reason: lexical_alternative
  - marker: b
    text: O «con mano poderosa». El hebreo dice literalmente «por/con tu grandeza» en la frase anterior, y aquí «con mano fuerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְפַּלֵּל
  english_pob_choice: So I prayed
  chosen_spanish: Así que oré
  alternatives_spanish:
  - Y oré
  - Entonces oré
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; en español, «Así que» comunica bien la secuencia sin sonar rígido. «Oré» conserva el matiz de plegaria dirigido a Dios.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: «Yahvé». La preposición אֶל se rinde naturalmente con «a».'
- source_word: וָאֹמַר
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: HALOT
  rationale: La continuación narrativa simple en pasado es la forma más natural en español y preserva el valor del wayyiqtol.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios Yahvé
  - Señor Yahvé Dios
  lexicon: HALOT
  rationale: El hebreo combina el título אדני con el nombre divino. En español, «Señor Yahvé» conserva ambos elementos sin la redundancia extraña de «Señor SEÑOR» o la sustitución por un eufemismo tradicional.
- source_word: אַל תַּשְׁחֵת
  english_pob_choice: do not destroy
  chosen_spanish: no destruyas
  alternatives_spanish:
  - no arruines
  - no borres
  lexicon: HALOT
  rationale: El jussivo prohibitivo pide una negativa directa. «Destruyas» reproduce la fuerza de שׁחת en este contexto de juicio y preserva la gravedad de la súplica.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: «Pueblo» refleja el término del pacto con mayor precisión que «gente».
- source_word: וְנַחֲלָתְךָ
  english_pob_choice: and your inheritance
  chosen_spanish: y tu heredad
  alternatives_spanish:
  - y tu herencia
  - y tu posesión
  lexicon: HALOT
  rationale: «Heredad» transmite bien el valor covenantal de נַחֲלָה y resulta más natural en español bíblico que «herencia» en este contexto.
- source_word: אֲשֶׁר פָּדִיתָ
  english_pob_choice: whom you redeemed
  chosen_spanish: a quienes redimiste
  alternatives_spanish:
  - a quienes rescataste
  - a los que redimiste
  lexicon: HALOT
  rationale: «Redimiste» preserva el sentido de פדה en contexto exódico y de pacto. El relativo plural concordante evita ambigüedad en español.
- source_word: בְּגָדְלֶךָ
  english_pob_choice: by your greatness
  chosen_spanish: por tu grandeza
  alternatives_spanish:
  - con tu grandeza
  - por tu poder grande
  lexicon: HALOT
  rationale: «Grandeza» es el equivalente directo de גֹּדֶל. La preposición «por» expresa medio o motivo de forma natural en español.
- source_word: אֲשֶׁר הוֹצֵאתָ מִמִּצְרַיִם
  english_pob_choice: whom you brought out of Egypt
  chosen_spanish: a quienes sacaste de Egipto
  alternatives_spanish:
  - a quienes hiciste salir de Egipto
  - a los que sacaste de Egipto
  lexicon: HALOT
  rationale: «Sacar de Egipto» es el giro estable del éxodo y conserva היטב el valor histórico-covenantal de הוציא.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con brazo fuerte
  lexicon: HALOT
  rationale: «Mano fuerte» es una traducción transparente y fiel; «fuerte» reproduce חֲזָקָה sin forzar un calco menos natural. Se mantiene la nota de fuerza manifiesta en la liberación.
theological_decisions:
- issue: Representación de יְהוָה (el nombre divino)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. En el español del proyecto se adopta «Yahvé» como forma auditada y transparente, evitando la convención de ocultarlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Dios Yahvé
  rationale: El hebreo junta un título de soberanía con el nombre divino. «Señor Yahvé» preserva ambos componentes en español con mayor claridad que una duplicación artificial o una sustitución por «Dios» sola.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido pactual de נַחֲלָה
  english_pob_reading: inheritance
  chosen_spanish_reading: heredad
  alternative_spanish_readings:
  - herencia
  - posesión
  rationale: En este contexto no se trata solo de una herencia humana, sino del pueblo como porción asignada a Yahvé. «Heredad» conserva mejor ese matiz pactual.
  doctrine_reference: Lexical note based on HALOT נַחֲלָה in covenant/allotment contexts
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada en la versión inglesa; por eso la redacción española sigue de cerca el sentido hebreo sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «mano fuerte» en vez de «mano poderosa» para reflejar más directamente חֲזָקָה.
  - «Heredad» se usa de manera consistente para נַחֲלָה cuando el contexto es pactual y posesivo.
  - Los relativos pluralizados («a quienes») reflejan correctamente el referente colectivo en español.
