translation:
  language: es
  text: Y los egipcios sabrán que yo soy Yahvé cuando extienda mi mano contra Egipto y saque a los hijos de Israel de entre ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: En este contexto predictivo, el hebreo expresa una futura toma de conocimiento o reconocimiento. «Sabrán» es natural en español y conserva el valor revelador de la fórmula sin añadir matices ajenos.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: El verbo plural exige sujeto personal colectivo; aquí se refiere al pueblo egipcio, no simplemente al territorio. «Los egipcios» preserva ese sentido.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'Introduce el contenido de lo que sabrán: «que yo soy Yahvé». En español, «que» reproduce mejor la subordinación declarativa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre propio y no sustituyéndolo por un título.'
- source_word: בִּנְטֹתִי
  english_pob_choice: when I stretch out
  chosen_spanish: cuando extienda
  alternatives_spanish:
  - al extender
  - cuando alargue
  lexicon: HALOT
  rationale: La construcción con ב más infinitivo marca aquí valor temporal. «Cuando extienda» expresa con naturalidad el momento de la acción divina y mantiene la imagen idiomática de la mano extendida.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del hebreo. Aunque implica poder, el texto dice literalmente «mano», y en español esta imagen es clara.
- source_word: עַל מִצְרָיִם
  english_pob_choice: against Egypt
  chosen_spanish: contra Egipto
  alternatives_spanish:
  - sobre Egipto
  - sobre los egipcios
  lexicon: HALOT
  rationale: En contexto de juicio, עַל comunica hostilidad. «Contra Egipto» refleja esa relación de forma natural en español.
- source_word: וְהוֹצֵאתִי
  english_pob_choice: and bring
  chosen_spanish: saque
  alternatives_spanish:
  - y sacaré
  - y haré salir
  lexicon: HALOT
  rationale: El verbo hiphil expresa hacer salir. «Saque» encaja con la subordinación temporal iniciada por «cuando» y suena idiomático, sin perder la idea de extracción/liberación.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la construcción filial masculina del hebreo. «Hijos de Israel» es transparente en español y refleja la forma fuente con precisión.
- source_word: מִתּוֹכָם
  english_pob_choice: out from among them
  chosen_spanish: de en medio de ellos
  alternatives_spanish:
  - de entre ellos
  - del medio de ellos
  lexicon: HALOT
  rationale: La expresión hebrea indica separación desde su interior. «De en medio de ellos» transmite bien la salida desde el centro del grupo sin forzar una imagen más extraña.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre personal de Dios, no una sustitución litúrgica. Esto sigue el criterio doctrinal del proyecto y hace visible el Tetragrámaton del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia a Israel como בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los niños de Israel
  - el pueblo de Israel
  rationale: Se conserva la forma familiar masculina del original, en línea con la preferencia del proyecto por la precisión morfológica cuando no estorba la comprensión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el registro inglés; la traducción española sigue el texto fuente y el auditoría inglesa sin cambios textuales previos relevantes.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - 'Se eligió una estructura española natural con valor temporal: «cuando extienda... y saque».'
  - Se conservó la imagen concreta de «mano» y la expresión de separación «de en medio de ellos».
