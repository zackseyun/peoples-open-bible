translation:
  language: es
  text: 'Jacob dijo[a]: «Véndeme hoy tu primogenitura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Véndeme tu primogenitura a partir de hoy» o «este día», enfatizando una transacción inmediata y vinculante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El wayyiqtol hebreo avanza la narración; en español, el pretérito simple «dijo» comunica de forma natural ese avance sin añadir una coordinación que el estilo español no requiere.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: Convención onomástica bíblica
  rationale: El nombre propio se mantiene como «Jacob» en español por convención bíblica estándar y claridad lectora.
- source_word: מִכְרָה
  english_pob_choice: Sell
  chosen_spanish: Véndeme
  alternatives_spanish:
  - Vende me
  - Véndeme ahora
  lexicon: HALOT
  rationale: El imperativo de מכר se expresa de manera directa como «Véndeme». El clítico de objeto indirecto/beneficiario en español refleja correctamente la construcción «sell me your birthright» del contexto inglés auditado.
- source_word: כַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - como hoy
  - este día
  - hoy mismo
  lexicon: HALOT
  rationale: El valor temporal inmediato del hebreo se expresa de forma natural con «hoy». «Este día» o «hoy mismo» son posibles, pero «hoy» es más idiomático y mantiene la urgencia de la transacción.
- source_word: בְּכֹרָתְךָ
  english_pob_choice: your birthright
  chosen_spanish: tu primogenitura
  alternatives_spanish:
  - tu derecho de primogénito
  - tu derecho de primogenitura
  - tu condición de primogénito
  lexicon: HALOT
  rationale: «Primogenitura» comunica el conjunto de derechos y privilegios ligados al primogénito y corresponde al sentido de בְּכֹרָה. Es más preciso y bíblicamente reconocido que una simple paráfrasis de «derecho de primogénito».
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: Con el imperativo «Véndeme», el complemento breve «me» reproduce la relación indirecta de forma natural en español, sin perder la fuerza transaccional del hebreo.
translation_notes:
  revision_awareness: El pasaje fue revisado y se mantuvo sin cambios sustanciales en el audit trail más reciente; la redacción española conserva la misma lectura breve e inmediata del mandato.
  spanish_consistency_notes:
  - Se usa «Jacob» como nombre propio estándar y «primogenitura» para בְּכֹרָה, en continuidad con la terminología bíblica española de uso amplio.
  - Se preserva la urgencia de כַיּוֹם con «hoy», sin introducir un calco excesivo.
  - La nota conserva la alternativa semántica que enfatiza la inmediatez y vinculación de la transacción.
