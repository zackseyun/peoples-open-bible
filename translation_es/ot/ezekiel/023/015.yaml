  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Oficiales», «hijos de Babilonia», «caldeos» y «la tierra de su nacimiento» están alineados con el rastro léxico inglés y con el hebreo. La revisión propuesta mantiene esas decisiones y solo mejora precisión y español natural.
