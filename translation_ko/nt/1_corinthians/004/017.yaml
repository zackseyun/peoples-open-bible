  lexicon: BDAG
  rationale: 15절 부성 비유 연장.
- source_word: τὰς ὁδούς μου τὰς ἐν Χριστῷ
  english_pob_choice: my ways in Messiah
  chosen_korean: 메시아 안에서의 내 행보
  alternatives_korean:
  - 메시아 안에서 내가 사는 길
  lexicon: BDAG
  rationale: ὁδοί는 가르침·삶의 방식 전체.
- source_word: ἐν πάσῃ ἐκκλησίᾳ
  english_pob_choice: in every church
  chosen_korean: 모든 교회에서
  alternatives_korean:
