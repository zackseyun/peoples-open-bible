translation:
  language: es
  text: El león perece por falta de presa, y los cachorros del león[a] se dispersan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos del león» o «los cachorros del león fuerte». Los términos hebreos para «león» varían en matiz, y לָבִיא puede entenderse como «león» o «leona».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִשׁ
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - el león fuerte
  - el león viejo
  lexicon: HALOT
  rationale: לַיִשׁ designa un león, a menudo fuerte o maduro. En español, «el león» es la forma más natural y clara; añadir «fuerte» o «viejo» precisaría más de lo que exige el contexto inmediato.
- source_word: אֹבֵד
  english_pob_choice: perishes
  chosen_spanish: perece
  alternatives_spanish:
  - se pierde
  - muere
  lexicon: HALOT
  rationale: El participio de אבד expresa la idea de perecer o arruinarse. «Perece» conserva el tono proverbial y poético mejor que «muere».
- source_word: מִבְּלִי
  english_pob_choice: for lack of
  chosen_spanish: por falta de
  alternatives_spanish:
  - sin
  - porque no hay
  lexicon: HALOT
  rationale: La expresión preposicional indica privación o ausencia. «Por falta de» comunica con claridad la causa y suena idiomático en español.
- source_word: טָרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - alimento
  - presa desgarrada
  lexicon: HALOT
  rationale: טָרֶף se refiere a la presa tomada por un depredador, no a alimento genérico. «Presa» reproduce mejor la imagen predatoria.
- source_word: בְנֵי
  english_pob_choice: the cubs of
  chosen_spanish: los cachorros de
  alternatives_spanish:
  - los hijos de
  - los pequeños de
  lexicon: HALOT
  rationale: Aunque literalmente es «hijos de», en imaginería animal «cachorros de» es más natural en español y mantiene la relación filial implícita.
- source_word: לָבִיא
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - la leona
  - el león feroz
  lexicon: HALOT
  rationale: לָבִיא puede referirse a un león o leona, pero en esta construcción la referencia genérica a un león mantiene la correspondencia con el hebreo y evita introducir una distinción no obligatoria por el contexto.
- source_word: יִתְפָּרָדוּ
  english_pob_choice: are scattered
  chosen_spanish: se dispersan
  alternatives_spanish:
  - se esparcen
  - se separan
  lexicon: HALOT
  rationale: El verbo significa separarse o dispersarse. «Se dispersan» refleja bien el resultado poético de desintegración del grupo sin forzar una pasiva artificial.
translation_notes:
  revision_awareness: El antecedente inglés pasó por una revisión que prefirió «the lion» para לָבִיא en lugar de «lioness». La traducción española sigue esa decisión y evita especificar «leona», manteniendo la consistencia con el término hebreo y la ambigüedad controlada del original.
  spanish_consistency_notes:
  - Se mantuvo «león» para ambos miembros para no introducir una distinción de sexo no exigida por el hebreo.
  - «Presa» conserva el matiz depredatorio de טָרֶף.
  - La cadencia poética se preserva con paralelismo breve y directo.
  - Se evitó «SEÑOR» o terminología litúrgica ajena; el versículo no contiene el nombre divino.
