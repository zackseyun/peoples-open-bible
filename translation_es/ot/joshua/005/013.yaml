translation:
  language: es
  text: 'Y sucedió[a] que, cuando Josué estaba junto a Jericó, alzó los ojos y vio; y he aquí, un hombre estaba de pie frente a él, con su espada desenvainada en la mano. Josué fue hacia él y le dijo: «¿Estás de parte nuestra, o de nuestros enemigos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'en Jericó' o 'cerca de Jericó'. La preposición hebrea puede entenderse de manera más amplia que un punto preciso dentro de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: Como marcador narrativo de apertura, 'Y sucedió' conserva el arranque hebreo sin arcaísmo y suena natural en español bíblico moderno.
- source_word: בִּהְיוֹת
  english_pob_choice: when ... was
  chosen_spanish: cuando ... estaba
  alternatives_spanish:
  - mientras ... estaba
  - al estar ...
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal; 'cuando Josué estaba' mantiene esa relación sin forzar una construcción poco natural en español.
- source_word: בִּירִיחוֹ
  english_pob_choice: by Jericho
  chosen_spanish: cerca de Jericó
  alternatives_spanish:
  - en Jericó
  - junto a Jericó
  lexicon: HALOT
  rationale: La preposición hebrea admite un sentido locativo amplio. 'Cerca de Jericó' refleja mejor la amplitud que 'en Jericó' y preserva la lectura espacial del contexto.
- source_word: וַיִּשָּׂא עֵינָיו
  english_pob_choice: he lifted up his eyes
  chosen_spanish: alzó los ojos
  alternatives_spanish:
  - levantó los ojos
  - alzando la vista
  lexicon: HALOT
  rationale: La idiomática hebrea se reproduce con una expresión española natural y sobria; 'alzó los ojos' conserva el tono literario sin mecanicismo.
- source_word: וַיַּרְא
  english_pob_choice: and looked
  chosen_spanish: y vio
  alternatives_spanish:
  - y miró
  - y contempló
  lexicon: HALOT
  rationale: Aquí el segundo verbo completa la acción visual; 'y vio' es la correspondencia directa y mantiene la progresión narrativa.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: '''Y he aquí'' preserva la fuerza de presentación vívida del hebreo y es reconocible en estilo bíblico español.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - alguien
  lexicon: HALOT
  rationale: El texto dice simplemente 'un hombre'; no conviene especificar guerrero, ángel o mensajero en la traducción base.
- source_word: עֹמֵד לְנֶגְדּוֹ
  english_pob_choice: was standing opposite him
  chosen_spanish: estaba de pie frente a él
  alternatives_spanish:
  - estaba frente a él
  - estaba en oposición a él
  lexicon: HALOT
  rationale: '''Frente a él'' comunica el sentido espacial y potencialmente confrontativo de לְנֶגֶד sin sonar rígido; ''de pie'' explicita la postura del participio.'
- source_word: וְחַרְבּוֹ שְׁלוּפָה בְּיָדוֹ
  english_pob_choice: with his sword drawn in his hand
  chosen_spanish: con la espada desenvainada en su mano
  alternatives_spanish:
  - con su espada desenvainada en la mano
  - con la espada sacada en su mano
  lexicon: HALOT
  rationale: '''Desenvainada'' es la forma precisa y digna para שׁלופה; mantiene la imagen de amenaza sin añadir matices interpretativos.'
- source_word: וַיֵּלֶךְ ... אֵלָיו
  english_pob_choice: Joshua went to him
  chosen_spanish: Josué se le acercó
  alternatives_spanish:
  - Josué fue hacia él
  - Josué caminó hacia él
  lexicon: HALOT
  rationale: El movimiento hacia la figura se expresa de modo natural y más exacto que un simple 'fue'; 'se le acercó' recoge la proximidad progresiva.
- source_word: הֲלָנוּ אַתָּה אִם לְצָרֵינוּ
  english_pob_choice: Are you for us, or for our enemies?
  chosen_spanish: ¿Eres de los nuestros, o de nuestros enemigos?
  alternatives_spanish:
  - ¿Estás con nosotros, o con nuestros enemigos?
  - ¿Estás de parte nuestra, o de nuestros enemigos?
  lexicon: HALOT
  rationale: La construcción hebrea expresa lealtad/alineación. 'De los nuestros' es idiomático en español y conserva la pregunta de pertenencia/alineación sin suavizarla.
theological_decisions:
- issue: Identidad del hombre encontrado por Josué
  english_pob_reading: Render neutrally as 'a man' without specifying angel, the LORD, or a preincarnate appearance of Christ in the main text.
  chosen_spanish_reading: Traducir neutramente como 'un hombre' sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - un ángel
  - el ángel de Yahvé
  - una manifestación teofánica o cristofánica
  rationale: El hebreo del versículo nombra solo a 'un hombre'. La traducción debe conservar esa tensión interpretativa y no resolverla antes de tiempo, aunque el contexto posterior pueda influir en la exégesis.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente del inglés pasó de 'at Jericho' a 'by Jericho' para reflejar con más precisión la preposición hebrea; por eso la versión española adopta 'cerca de Jericó' como solución amplia y natural. Se mantiene la presentación neutral de 'un hombre' y la pregunta de alineación/lealtad sin identificar al personaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene 'Josué' como nombre propio estándar en español.
  - Se prefirió una construcción bíblica natural ('Y sucedió') sin arcaísmo excesivo.
  - '''Desenvainada'' conserva la fuerza de la espada al descubierto sin añadir una interpretación militar extra.'
