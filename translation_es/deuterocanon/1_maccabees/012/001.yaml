translation:
  language: es
  text: Y al ver Jonathan que el tiempo le era favorable[a], escogió hombres y los envió a Roma para establecer y renovar la amistad[b] con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la oportunidad le favorecía» o «el tiempo trabajaba a su favor». La expresión griega es idiomática y señala circunstancias ventajosas para Jonathan.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «amistad» probablemente alude a relaciones diplomáticas formales, no solo a afecto privado.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vio
  - viendo
  lexicon: LSJ
  rationale: El participio aoristo introduce la circunstancia de la acción principal; «al ver» conserva la relación temporal sin sonar pesado en español.
- source_word: ὁ καιρὸς
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la ocasión
  - el momento
  - la oportunidad
  lexicon: LSJ
  rationale: «καιρός» aquí alude a un momento oportuno. «El tiempo» mantiene cercanía al griego y funciona bien en la frase idiomática siguiente.
- source_word: συνεργεῖ
  english_pob_choice: was favorable to him
  chosen_spanish: le era favorable
  alternatives_spanish:
  - lo favorecía
  - trabajaba a su favor
  - le ayudaba
  lexicon: LSJ
  rationale: La expresión griega es idiomática y comunica circunstancias favorables. «Le era favorable» capta el sentido resultante con naturalidad en español sin perder la idea de apoyo circunstancial.
- source_word: ἐπέλεξεν ἄνδρας
  english_pob_choice: he chose men
  chosen_spanish: escogió hombres
  alternatives_spanish:
  - seleccionó hombres
  - eligió hombres
  lexicon: LSJ
  rationale: «Escogió» reproduce bien la selección deliberada; «hombres» conserva el valor masculino del sustantivo griego y sugiere enviados varones.
- source_word: ἀπέστειλεν εἰς Ῥώμην
  english_pob_choice: sent them to Rome
  chosen_spanish: los envió a Roma
  alternatives_spanish:
  - los despachó a Roma
  - los mandó a Roma
  lexicon: LSJ
  rationale: Verbo directo y natural para una misión diplomática; el pronombre «los» está implícito por el contexto de los hombres escogidos.
- source_word: στῆσαι
  english_pob_choice: to establish
  chosen_spanish: para establecer
  alternatives_spanish:
  - para confirmar
  - para afianzar
  lexicon: LSJ
  rationale: En contexto diplomático, el infinitivo expresa poner la relación sobre una base firme; «establecer» es fiel y claro.
- source_word: ἀνανεῶσαι
  english_pob_choice: renew
  chosen_spanish: renovar
  alternatives_spanish:
  - restaurar
  - hacer de nuevo
  lexicon: LSJ
  rationale: El verbo significa renovar o hacer nuevo otra vez. «Renovar» es el equivalente natural en español.
- source_word: τὴν πρὸς αὐτοὺς φιλίαν
  english_pob_choice: the friendship with them
  chosen_spanish: la amistad con ellos
  alternatives_spanish:
  - las amistosas relaciones con ellos
  - la alianza con ellos
  lexicon: LSJ
  rationale: «φιλία» puede referirse a amistad o a relación diplomática formal. «Amistad» conserva el término base; el contexto de Roma permite entenderlo como vínculo político sin imponer «alianza».
theological_decisions:
- issue: Naturaleza de φιλία en contexto diplomático
  english_pob_reading: '''Friendship'' here likely refers to formal diplomatic relations, not merely private affection.'
  chosen_spanish_reading: «Amistad» se entiende aquí como relación diplomática formal, no solo afecto privado.
  alternative_spanish_readings:
  - relaciones amistosas
  - alianza
  rationale: El griego usa φιλία, y el contexto con Roma apunta a un acuerdo político. En el texto principal se mantiene «amistad» por fidelidad léxica, dejando que el contexto precise su alcance.
  doctrine_reference: N/A
