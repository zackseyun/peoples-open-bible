translation:
  language: es
  text: Y cuando terminó de hablar, arrojó la quijada de su mano, y llamó a aquel lugar Ramat-lejí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ramat-lejí probablemente significa "Colina de la Quijada" o "Altura de la Quijada", conservando el juego de palabras con lejí, "quijada".
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכַלֹּתוֹ לְדַבֵּר
  english_pob_choice: when he had finished speaking
  chosen_spanish: cuando terminó de hablar
  alternatives_spanish:
  - cuando hubo terminado de hablar
  - al terminar de hablar
  - cuando acabó de hablar
  lexicon: HALOT
  rationale: La construcción temporal con כְּכַלֹּתוֹ más לְדַבֵּר expresa que la acción de hablar concluyó antes de la siguiente. En español, "cuando terminó de hablar" comunica con naturalidad esa secuencia sin añadir matices no presentes.
- source_word: וַיַּשְׁלֵךְ
  english_pob_choice: he threw
  chosen_spanish: arrojó
  alternatives_spanish:
  - tiró
  - echó
  - lanzó
  lexicon: HALOT
  rationale: El verbo indica una acción de echar o lanzar lejos el objeto. "Arrojó" conserva un tono digno y preciso, y evita tanto la informalidad de "tiró" como una fuerza excesiva de "lanzó".
- source_word: הַלְּחִי
  english_pob_choice: the jawbone
  chosen_spanish: la quijada
  alternatives_spanish:
  - la mandíbula
  - el hueso de la quijada
  - la quijada del asno
  lexicon: HALOT
  rationale: En este contexto se refiere al arma usada por Sansón. "Quijada" es un término natural en español bíblico para el hueso de la mandíbula y mantiene la imagen concreta del hebreo mejor que una paráfrasis explicativa.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de la mano
  - de entre sus manos
  lexicon: HALOT
  rationale: La preposición מן con יד conserva la idea simple de separación física. "De su mano" reproduce el sentido idiomático de manera fluida en español.
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - dio nombre
  lexicon: HALOT
  rationale: Con un topónimo, קרא puede significar llamar o nombrar. "Llamó" sigue de cerca el hebreo y mantiene la forma narrativa del texto; el objeto "a aquel lugar" deja claro el valor de nombrar.
- source_word: לַמָּקוֹם הַהוּא
  english_pob_choice: that place
  chosen_spanish: a aquel lugar
  alternatives_spanish:
  - a ese lugar
  - al lugar aquel
  lexicon: HALOT
  rationale: El demostrativo הַהוּא apunta a un lugar ya identificado. "A aquel lugar" conserva la deixis del hebreo y suena natural en español narrativo.
- source_word: רָמַת לֶחִי
  english_pob_choice: Ramath-lehi
  chosen_spanish: Ramat-lejí
  alternatives_spanish:
  - Ramá-lejí
  - Ramath-lejí
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración cercana al hebreo. "Lejí" preserva la vocalización española del topónimo y mantiene la palabra clave del juego de palabras con לֶחִי, "quijada".
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés concuerdan en la secuencia temporal, el gesto de arrojar el objeto y el valor de nombre propio del topónimo. No hubo revisiones posteriores que afectaran esta línea, así que la versión española sigue de cerca esa decisión estable.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto solo cuando el hebreo lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - '"Quijada" se eligió por su adecuación contextual y por sostener el juego de palabras del topónimo; en versículos cercanos debe mantenerse coherencia con esta decisión.'
  - '"Ramat-lejí" conserva el nombre propio transliterado, con nota explicativa para el sentido probable del topónimo.'
