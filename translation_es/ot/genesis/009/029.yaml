translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo de control reporta alta concordancia; por eso no se requirieron notas textuales ni ajustes por variantes.
  spanish_consistency_notes:
  - Se mantiene «Noé» como forma tradicional en español, correspondiente al nombre propio hebreo נֹחַ.
  - Se conserva el orden narrativo sencillo del hebreo con una apertura resumidora («Así,»), que en español ayuda a enlazar con el cierre genealógico precedente sin alterar el contenido.
