review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del hebreo: Raquel y Lea responden a Jacob y preguntan si todavía les queda participación patrimonial en la casa de su padre. Sin embargo, la formulación «y dijeron a él» es una calca innecesaria y poco natural en español. El pronombre dativo explícito del hebreo puede preservarse fielmente con «le dijeron», sin pérdida de información. También conviene alinear la nota cultural del inglés sobre «la casa de nuestro padre», que puede referirse al patrimonio familiar y no solo a la vivienda.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «dijeron a él» suena antinatural en español bíblico moderno. «Le respondieron y le dijeron» resulta natural y fiel. El resto de la redacción es buena; «parte o herencia» es inteligible, aunque «porción o herencia» también sería posible. La puntuación y el registro son adecuados.
  glossary_alignment: No hay términos del glosario maestro especialmente disputados en este versículo. Los nombres propios están bien en español. «Herencia» para נַחֲלָה está bien. «Parte» para חֵלֶק es aceptable, con «porción» como alternativa léxica útil en nota. No hay conflictos con Yahvé/Mesías u otros términos teológicos del proyecto.
  issues:
  - severity: medium
    issue: Calco poco natural en «y dijeron a él»
    rationale: Aunque el hebreo incluye explícitamente לוֹ, en español la forma idiomática y plenamente fiel es «le dijeron». Mantener «a él» dentro del texto principal produce una construcción torpe sin añadir precisión real.
  - severity: medium
    issue: Las notas no reflejan bien la mejor decisión textual en español
    rationale: 'La nota sobre «a él» defiende una opción inferior en el texto principal. Debe invertirse: usar «le dijeron» en el texto y, si se desea, explicar en nota que el hebreo explicita el destinatario.'
  - severity: low
    issue: Falta la nota cultural sobre «la casa de nuestro padre»
    rationale: El inglés POB conserva una nota útil indicando que «casa» puede abarcar el hogar, la hacienda o el patrimonio familiar. Esa información sigue siendo pertinente en español.
  revised_spanish_text: 'Entonces Raquel y Lea respondieron y le dijeron[a]: «¿Todavía tenemos alguna parte[b] o herencia en la casa de nuestro padre[c]?»'
  revised_footnotes:
