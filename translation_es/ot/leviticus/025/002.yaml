revisions:
- from: 'Habla a los hijos de Israel y diles[a]: ‘Cuando entren en la tierra que yo les doy[b][c], la tierra guardará un sábado para Yahvé.’'
  to: 'Habla a los hijos de Israel[a] y diles: «Cuando entren en la tierra que yo les doy, la tierra observará un sábado para Yahvé[c]».[b]'
