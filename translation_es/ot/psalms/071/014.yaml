translation:
  language: es
  text: Pero en cuanto a mí, siempre esperaré con esperanza[a], y añadiré[b] más alabanzas para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguiré esperando». El verbo hebreo puede enfatizar una expectativa continua además de la esperanza futura simple.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aumentaré tu alabanza» o «añadiré más a tu alabanza». El hebreo presenta la alabanza como algo que se añade o se incrementa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo, por mi parte
  alternatives_spanish:
  - Pero yo
  - Y yo
  lexicon: HALOT
  rationale: La construcción con conjunción y pronombre independiente marca contraste enfático. «Pero yo, por mi parte» conserva ese contraste y la focalización del sujeto sin sonar rígido en español.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: El adverbio expresa continuidad ininterrumpida. «Siempre» comunica bien la perseverancia en español natural, aunque «continuamente» también sería posible si se quisiera más literalidad.
- source_word: אֲיַחֵל
  english_pob_choice: I will ... hope
  chosen_spanish: esperaré[a]
  alternatives_spanish:
  - seguiré esperando
  - tendré esperanza
  lexicon: HALOT
  rationale: El verbo puede incluir la idea de esperar con esperanza. En español, «esperaré» mantiene el valor de expectativa continua y permite el matiz de esperanza en contexto poético; la nota conserva la alternativa semántica.
- source_word: וְהוֹסַפְתִּי
  english_pob_choice: and I will add
  chosen_spanish: y añadiré[b]
  alternatives_spanish:
  - y aumentaré
  - y seguiré añadiendo
  lexicon: HALOT
  rationale: יסף significa añadir o aumentar. «Añadiré» preserva la metáfora verbal de sumar alabanza sin interpretar de más; «aumentaré» es posible, pero menos cercano a la imagen del hebreo.
- source_word: עַל כָּל תְּהִלָּתֶךָ
  english_pob_choice: to all your praise
  chosen_spanish: a toda tu alabanza
  alternatives_spanish:
  - sobre toda tu alabanza
  - a toda la alabanza que te corresponde
  lexicon: HALOT
  rationale: La preposición עַל con יסף puede expresar adición a/upon. «A toda tu alabanza» mantiene la estructura y la imagen de añadir sobre o a la alabanza dirigida a Dios. «Alabanza» traduce תְּהִלָּה de forma natural y fiel.
translation_notes:
  revision_awareness: 'La redacción sigue el perfil más reciente del audit trail inglés: mantiene el contraste enfático del hebreo, la continuidad de תָּמִיד y la imagen de agregar a la alabanza, sin expandir interpretivamente el segundo hemistiquio más allá de lo que permite עַל כָּל תְּהִלָּתֶךָ.'
  spanish_consistency_notes:
  - Se usa «alabanza» para תְּהִלָּה de forma consistente con el sentido dirigido a Dios.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni un equivalente directo en el hebreo dado.
  - La perífrasis «por mi parte» ayuda a reflejar el valor contrastivo de וַאֲנִי sin añadir contenido ajeno.
