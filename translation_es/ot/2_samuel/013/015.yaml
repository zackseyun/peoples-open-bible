translation:
  language: es
  text: 'Entonces Amnón la odió con un odio muy grande,[a] porque el odio con que la había odiado era mayor que el amor con que la había amado. Y Amnón le dijo: «Levántate, ve».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite la misma familia léxica de «odiar/odio» para intensificar el contraste; la traducción procura conservar esa repetición.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Levántate, ve». El mandato de dos palabras es abrupto y despectivo; algunas versiones lo explicitan como «vete» o «vete de aquí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂנָאֶהָ
  english_pob_choice: Then Amnon hated her
  chosen_spanish: Entonces Amnón la aborreció
  alternatives_spanish:
  - Y Amnón la aborreció
  - Luego Amnón la odió
  lexicon: HALOT
  rationale: El verbo שׂנא expresa aquí un rechazo fuerte; en español, «aborrecer» conserva mejor la fuerza relacional y afectiva que un simple «odiar». El waw-consecutivo avanza la narración, bien reflejado por «Entonces».
- source_word: שִׂנְאָה גְּדוֹלָה מְאֹד
  english_pob_choice: with very great hatred
  chosen_spanish: con un odio muy grande
  alternatives_spanish:
  - con un odio sumamente grande
  - con un odio intensísimo
  - con un gran odio
  lexicon: HALOT
  rationale: La construcción intensifica el sustantivo con acumulación enfática. En español, «con un odio muy grande» mantiene la transparencia semántica sin sonar forzado; «odio» comunica la fuerza léxica mejor que suavizarlo como simple disgusto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal de la reacción de Amnón. «Porque» es la forma más directa y natural en español.
- source_word: גְדוֹלָה הַשִּׂנְאָה
  english_pob_choice: the hatred ... was greater
  chosen_spanish: el odio ... era mayor
  alternatives_spanish:
  - el odio ... era más grande
  - era mayor el odio
  lexicon: HALOT
  rationale: El hebreo expresa comparación de intensidad; en español, «era mayor» conserva mejor la relación comparativa que una mera repetición de «muy grande».
- source_word: אֲשֶׁר שְׂנֵאָהּ
  english_pob_choice: with which he hated her
  chosen_spanish: con que la había aborrecido
  alternatives_spanish:
  - con que la había odiado
  - que la había aborrecido
  lexicon: HALOT
  rationale: El relativo modifica a «el odio»; «con que» reproduce la construcción de manera natural. El pluscuamperfecto «había aborrecido» marca que ese odio era previo al rechazo presente.
- source_word: מֵאַהֲבָה
  english_pob_choice: than the love
  chosen_spanish: que el amor
  alternatives_spanish:
  - más que el amor
  - en comparación con el amor
  lexicon: HALOT
  rationale: El מִן comparativo se expresa de forma idiomática en español con «que» tras «mayor». Mantiene la comparación explícita y fluida.
- source_word: אֲשֶׁר אֲהֵבָהּ
  english_pob_choice: with which he had loved her
  chosen_spanish: con que la había amado
  alternatives_spanish:
  - que la había amado con
  - con que la amó
  lexicon: HALOT
  rationale: El perfecto hebreo referido a una acción anterior se vierte naturalmente con pluscuamperfecto en español, preservando la secuencia temporal.
- source_word: קוּמִי
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: HALOT
  rationale: Imperativo femenino singular; «Levántate» transmite el mandato abrupto con naturalidad en español.
- source_word: לֵכִי
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - márchate
  lexicon: HALOT
  rationale: El segundo imperativo es igualmente brusco y despectivo; «vete» reproduce mejor la expulsión tajante que un simple «ve».
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y el audit trail en inglés: conserva la intensificación por repetición, el comparativo explícito y el mandato final breve. Se prefirió un español natural sin perder la dureza del rechazo de Amnón.'
  spanish_consistency_notes:
  - Se usa «Amnón» como forma habitual del nombre propio.
  - Se eligió «aborreció» para mantener la fuerza de שׂנא sin diluirla en un simple «odió».
  - El comparativo «era mayor que» refleja fielmente el hebreo con מִן.
  - La secuencia verbal en pluscuamperfecto en las relativas («había aborrecido», «había amado») ayuda a marcar anterioridad relativa en español.
  - Se mantuvo la abrupta doble orden final sin expandirla en una paráfrasis más suave.
