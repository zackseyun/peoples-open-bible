translation:
  language: es
  text: Pero tú, oh, impío[a] y el más inmundo de todos los hombres, no te engrías vanamente, encendido por esperanzas inciertas, habiendo levantado tus manos contra los hijos del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos celestiales». El griego puede entenderse como una descripción de los propios hijos, o como «hijos del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόσιε
  english_pob_choice: unholy one
  chosen_spanish: impío
  alternatives_spanish:
  - irreverente
  - profano
  - sin piedad
  lexicon: LSJ
  rationale: El vocativo denuncia falta de reverencia y piedad. «Impío» conserva el tono religioso del insulto griego y suena natural en español bíblico sin diluir la acusación.
- source_word: μιαρώτατε
  english_pob_choice: most defiled
  chosen_spanish: el más inmundo
  alternatives_spanish:
  - el más contaminado
  - el más vil
  - el más abominable
  lexicon: LSJ
  rationale: El superlativo de μιαρός expresa impureza o mancha ritual/moral. «El más inmundo» mantiene esa fuerza de contaminación sin convertirlo en una simple evaluación moral general.
- source_word: μὴ μάτην μετεωρίζου
  english_pob_choice: do not be vainly puffed up
  chosen_spanish: no te engrías vanamente
  alternatives_spanish:
  - no te alces en vano
  - no te exaltes inútilmente
  - no te ensoberbezcas sin motivo
  lexicon: LSJ
  rationale: μετεωρίζου sugiere elevarse o alzarse con arrogancia; en este reproche, la idea de orgullo vano es central. «Engreírse» comunica ese autoensalzamiento de manera idiomática en español.
- source_word: φρυττόμενος
  english_pob_choice: inflamed
  chosen_spanish: encendido
  alternatives_spanish:
  - inflamado
  - ardiendo
  - excitado
  lexicon: LSJ
  rationale: El participio presenta una imagen de calentamiento o agitación. «Encendido» reproduce bien la metáfora sin sonar excesivamente clínica en español actual.
- source_word: ἀδήλοις ἐλπίσιν
  english_pob_choice: with uncertain hopes
  chosen_spanish: en esperanzas inciertas
  alternatives_spanish:
  - con esperanzas inciertas
  - con esperanzas dudosas
  - en expectativas inciertas
  lexicon: LSJ
  rationale: ἀδήλοις indica algo no claro, no seguro o incierto. «Esperanzas inciertas» preserva la ambigüedad del griego y encaja con la construcción española del participio («encendido en»).
- source_word: οὐρανίους παῖδας
  english_pob_choice: the children of heaven
  chosen_spanish: los hijos del cielo
  alternatives_spanish:
  - los niños celestiales
  - los hijos celestiales
  - los hijos del cielo
  lexicon: LSJ
  rationale: Se mantiene la posibilidad semántica del genitivo («del cielo») y el valor de παῖδας como «hijos/niños». «Hijos del cielo» es natural en español y conserva la elevación teológica sin resolver de más la expresión.
- source_word: ἐπαράμενος χεῖρας
  english_pob_choice: having raised your hands against
  chosen_spanish: habiendo levantado tus manos contra
  alternatives_spanish:
  - alzando tus manos contra
  - habiendo alzado tus manos contra
  - extendiendo tus manos contra
  lexicon: LSJ
  rationale: La construcción participial y la preposición de hostilidad se reflejan con «habiendo levantado tus manos contra». Mantiene la imagen corporal de violencia dirigida a las víctimas.
theological_decisions:
- issue: Sentido de οὐρανίους παῖδας
  english_pob_reading: the children of heaven
  chosen_spanish_reading: los hijos del cielo
  alternative_spanish_readings:
  - los hijos celestiales
  - los niños del cielo
  - los hijos del Dios celestial
  rationale: La expresión griega admite leer a los destinatarios como pertenecientes al cielo o como cualificados por él. Se conserva la tensión sin añadir un título divino explícito que el griego no nombra directamente.
  doctrine_reference: Preservar la tensión léxica sin sobreespecificar el referente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y toma como guía la solución inglesa auditada, pero ajusta la sintaxis para que el participio y el vocativo suenen naturales en español. Se conserva la ambigüedad de οὐρανίους παῖδας en una nota, como en el POB inglés, sin forzar una lectura explicativa adicional.
  spanish_consistency_notes:
  - Se mantiene «impío» para ἀνόσιε y «el más inmundo» para μιαρώτατε, preservando el doble ataque moral/ritual.
  - «Esperanzas inciertas» refleja ἀδήλοις sin convertirlo en engaño explícito; la incertidumbre queda en el propio adjetivo.
  - «Los hijos del cielo» conserva la ambigüedad teológica del original y del audit trail inglés.
  - La puntuación con vocativos en español sigue el tono de reproche directo del griego.
