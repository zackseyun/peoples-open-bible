id: 1PE.3.21
reference: 1 Peter 3:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃ καὶ ὑμᾶς ἀντίτυπον νῦν σῴζει βάπτισμα, οὐ σαρκὸς ἀπόθεσις ῥύπου ἀλλὰ συνειδήσεως ἀγαθῆς ἐπερώτημα εἰς θεόν, δι’ ἀναστάσεως Ἰησοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/021.yaml
  text: 'Corresponding to that, baptism now also saves you—not the removal of dirt from the flesh, but an appeal to God for a good conscience—through the resurrection of Jesus Messiah,'
translation:
  language: ko
  text: '그 일에 상응하는 것 곧 세례[a]가 이제 여러분도 구원합니다. 세례는 육체의 더러움을 벗기는 일이 아니라, 선한 양심으로 하나님께 드리는 답변[b]이며, 메시아 예수의 부활하심으로 말미암습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「상응하는 것」(ἀντίτυπον)은 노아의 방주·물의 사건이 세례의 「모형」(τύπος)이며 세례가 그 「대응형」임을 가리킨다.'
    reason: cross_reference
  - marker: b
    text: 또는 「선한 양심을 위한 간구」 또는 「선한 양심의 약속」. ἐπερώτημα는 「질문·요청·서약」 등 의미가 다층적이며, 1세기 법적 계약 어휘로 쓰일 때는 「엄숙한 서약」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίτυπον
  english_pob_choice: Corresponding
  chosen_korean: 그 일에 상응하는 것
  alternatives_korean:
  - 그 모형의 실체
  - 그것의 대응형
  lexicon: BDAG
  rationale: ἀντίτυπος는 「모형에 대응하는 실체」. 「상응하는 것」으로 평이하게 옮긴다.
- source_word: σῴζει βάπτισμα
  english_pob_choice: baptism ... saves
  chosen_korean: 세례가 ... 구원합니다
  alternatives_korean:
  - 침례가 구원합니다
  - 세례가 살립니다
  lexicon: BDAG
  rationale: βάπτισμα를 한국 성서 전통의 「세례」로 옮긴다 (「침례」도 가능). σῴζω의 「구원하다」 그대로.
- source_word: σαρκὸς ἀπόθεσις ῥύπου
  english_pob_choice: the removal of dirt from the flesh
  chosen_korean: 육체의 더러움을 벗기는 일
  alternatives_korean:
  - 육신의 때를 씻는 일
  - 살의 오물을 제거함
  lexicon: BDAG
  rationale: 1:1·2:1의 ἀποτίθημι(벗다) 어휘와 어근 같음. 「벗기는 일」로 옮긴다.
- source_word: συνειδήσεως ἀγαθῆς ἐπερώτημα εἰς θεόν
  english_pob_choice: an appeal to God for a good conscience
  chosen_korean: 선한 양심으로 하나님께 드리는 답변
  alternatives_korean:
  - 선한 양심을 위한 하나님께 드리는 간구
  - 선한 양심의 하나님을 향한 약속
  lexicon: BDAG
  rationale: ἐπερώτημα는 「질문·간구·서약」 모두 가능. 「답변」으로 옮기되 각주에 다른 옵션 명시. 속격 συνειδήσεως ἀγαθῆς는 주격(선한 양심이 답변함)/속성(선한 양심에서 나오는)/목적(선한 양심을 얻기 위한) 모두 가능.
theological_decisions:
- issue: 세례 구원론의 신중한 처리
  chosen_reading: '본문이 직설적으로 「세례가 구원한다」고 말하므로 그대로 옮기되, 단서 절(외적 의식이 아니라 양심의 응답)도 본문대로 보존'
  alternative_readings:
  - 「세례가 구원한다」를 「세례를 통해 구원받는다」로 약화
  - 「양심의 응답」을 강조하여 세례의 도구성을 약화
  rationale: 본문은 직접적으로 σῴζει βάπτισμα라 말한다. 신학적 부담이 있더라도 본문을 평이화하지 않는다. 이어지는 단서가 세례의 의미를 명확히 한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선; 본문의 강도 보존'
