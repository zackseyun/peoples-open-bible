translation:
  language: es
  text: Y guardarán la fiesta de los Panes sin Levadura[a], porque en este mismo día saqué a sus huestes[b] de la tierra de Egipto. Y guardarán este día a lo largo de sus generaciones, como estatuto perpetuo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los panes sin levadura». El hebreo literalmente dice «las cosas/panes sin levadura», que puede referirse al alimento o, por extensión, a la celebración.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sus compañías» o «sus divisiones». El hebreo צִבְאוֹתֵיכֶם presenta a Israel como un cuerpo ordenado que sale de Egipto.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «como estatuto permanente» o «como estatuto para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: you shall keep
  chosen_spanish: guardarás
  alternatives_spanish:
  - observarás
  - guardarás y observarás
  lexicon: HALOT 8104
  rationale: שׁמר abarca guardar, observar y custodiar. En un contexto ritual y repetido, «guardarás» conserva la idea de mantener/observar la práctica sin sonar forzado; además permite repetir el verbo en la segunda mitad del verso.
- source_word: הַמַּצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la Fiesta de los Panes sin Levadura
  alternatives_spanish:
  - los panes sin levadura
  - la fiesta de los panes sin levadura
  - el Pan sin Levadura
  lexicon: HALOT 4682
  rationale: El hebreo literalmente dice «los panes/sin levadura», pero el contexto festivo hace que el POB inglés lo entienda como la observancia. En español, «Fiesta de los Panes sin Levadura» transmite ese sentido sin ocultar la base léxica y evita una formulación extraña en singular.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT 3588
  rationale: Introduce la razón del mandato. «Porque» es la equivalencia causal más natural y clara en español.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en este día mismo
  - justamente en este día
  lexicon: HALOT 6106
  rationale: El modismo enfatiza exactitud y solemnidad. «En este mismo día» conserva ese énfasis de manera idiomática en español.
- source_word: הוֹצֵאתִי
  english_pob_choice: I brought out
  chosen_spanish: saqué
  alternatives_spanish:
  - hice salir
  - saqué fuera
  lexicon: HALOT 3318
  rationale: El hiphil de יצא expresa causar salir / sacar. «Saqué» es breve, natural y mantiene el movimiento de salida que el texto subraya.
- source_word: צִבְאוֹתֵיכֶם
  english_pob_choice: your hosts
  chosen_spanish: tus ejércitos
  alternatives_spanish:
  - tus huestes
  - tus compañías
  - tus multitudes organizadas
  lexicon: HALOT 6635
  rationale: צָבָא puede significar host, ejército o compañía ordenada. En español, «tus ejércitos» conserva la fuerza organizativa y militar del término; aunque en un sentido amplio alude al pueblo en orden de marcha, evita reducirlo a «multitudes».
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: out from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT 776; HALOT 4714
  rationale: El hebreo marca origen/salida desde Egipto. «De la tierra de Egipto» es la forma española más natural y conserva el punto de procedencia sin añadir palabras innecesarias.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - este mismo día
  - el día de hoy
  lexicon: HALOT 3117
  rationale: La segunda ocurrencia carece del intensificador עֶצֶם. «Este día» refleja esa forma más simple, aunque la repetición del mandato ya conserva el tono solemne.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas tus generaciones
  alternatives_spanish:
  - a través de todas tus generaciones
  - para todas tus generaciones
  - de generación en generación
  lexicon: HALOT 1755
  rationale: Expresa continuidad intergeneracional. «Por todas tus generaciones» comunica la extensión duradera del mandato con un giro natural en español.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - como estatuto para siempre
  - como ordenanza perpetua
  lexicon: HALOT 2708; HALOT 5769
  rationale: «חֻקָּה» es una disposición normativa; «עוֹלָם» indica duración continua dentro del marco pactal. «Estatuto perpetuo» conserva el valor jurídico y la permanencia sin depender de una fórmula eclesiástica fija.
theological_decisions:
- issue: Si הַמַּצּוֹת debe entenderse como el alimento o como la observancia festiva
  english_pob_reading: The English POB chose 'the Feast of Unleavened Bread' in the main text while acknowledging the literal Hebrew can denote the unleavened breads/things.
  chosen_spanish_reading: «la Fiesta de los Panes sin Levadura»
  alternative_spanish_readings:
  - los panes sin levadura
  - el pan sin levadura
  rationale: El contexto de Éxodo 12 es una orden ritual sobre la celebración asociada a los panes sin levadura, no solo sobre el alimento aislado. La forma elegida mantiene la referencia festiva sin perder la base léxica hebrea.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo expresar חֻקַּת עוֹלָם sin exagerar más allá del hebreo
  english_pob_reading: Rendered 'as a permanent statute.'
  chosen_spanish_reading: «como estatuto perpetuo»
  alternative_spanish_readings:
  - como estatuto para siempre
  - como ordenanza perpetua
  rationale: La expresión indica obligatoriedad duradera y de alcance generacional. «Perpetuo» comunica continuidad fuerte en español sin requerir una formulación más absolutizante que el propio contexto.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El audit trail inglés revisó 'the Unleavened Bread' a 'the Feast of Unleavened Bread' para reflejar mejor la observancia; por eso la versión española adopta explícitamente 'la Fiesta de los Panes sin Levadura' en la línea principal, manteniendo al mismo tiempo la base léxica hebrea y la repetición ritual del verbo 'guardar'.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantiene la secuencia verbal de mandato repetido con «guardarás» en ambas cláusulas para reflejar וּשְׁמַרְתֶּם / וּשְׁמַרְתֶּם.
  - «Tierra de Egipto» se conserva de forma literal y reverente, sin añadir matices interpretativos.
  - Se evita «SEÑOR» por coherencia con la política del proyecto cuando no corresponde a YHWH en este versículo.
  - «Estatuto perpetuo» se prefiere sobre «para siempre» en el texto principal para preservar el registro jurídico y bíblico del hebreo.
