translation:
  language: es
  text: 'Entonces Saúl envió a Isaí, diciendo: «Por favor, que David esté[a] delante de mí, porque ha hallado favor a mis ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por favor, que David permanezca delante de mí», con el sentido de continuar en el servicio de Saúl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then Saul sent
  chosen_spanish: Entonces Saúl envió a decir
  alternatives_spanish:
  - Y Saúl envió
  - Así que Saúl envió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «Entonces» conserva la secuencia. Se explicita «a decir» porque el hebreo introduce el discurso con לֵאמֹר, y así se evita una paráfrasis más libre que oculte la estructura del original.
- source_word: אֶל יִשַׁי
  english_pob_choice: to Jesse
  chosen_spanish: a Isaí
  alternatives_spanish:
  - para Isaí
  lexicon: HALOT
  rationale: La preposición direccional אֶל se rinde naturalmente con «a». Se mantiene el nombre propio «Isaí» por convención bíblica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: a decir
  alternatives_spanish:
  - diciendo
  - con este mensaje
  lexicon: HALOT
  rationale: La forma española «a decir» preserva la función introductoria del infinitivo de decir sin sonar tan pesada como una repetición mecánica de «diciendo».
- source_word: יַעֲמָד נָא דָוִד
  english_pob_choice: Please let David stand
  chosen_spanish: Por favor, deje David estar
  alternatives_spanish:
  - Por favor, haga que David permanezca
  - Por favor, permita que David se quede
  lexicon: HALOT
  rationale: El jussivo de עמד con נָא expresa una petición cortés. En español, «deje» mantiene el valor permisivo; «estar» conserva la imagen de permanencia ante el rey, aunque la construcción resulte algo formal, porque el texto habla de una presencia de servicio y no solo de ubicación física.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: «Delante de mí» conserva la imagen espacial del hebreo y sigue siendo comprensible en español. «En mi presencia» explicita mejor el sentido cortesano, pero suaviza la metáfora original.
- source_word: כִּי מָצָא חֵן
  english_pob_choice: for he has found favor
  chosen_spanish: porque ha hallado favor
  alternatives_spanish:
  - porque ha encontrado gracia
  - porque me ha agradado
  lexicon: HALOT
  rationale: Se conserva el idiomático «hallar favor», equivalente directo del hebreo. «Favor» mantiene el matiz de aprobación personal sin cargar el término con un sentido exclusivamente religioso.
- source_word: בְּעֵינַי
  english_pob_choice: in my eyes
  chosen_spanish: a mis ojos
  alternatives_spanish:
  - en mis ojos
  - en mi parecer
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de la valoración visual; «a mis ojos» la reproduce de modo natural en español y preserva la imagen del original.
theological_decisions:
- issue: Matiz cortesano de la petición de Saúl
  english_pob_reading: Please let David stand before me, for he has found favor in my eyes.
  chosen_spanish_reading: Por favor, deje David estar delante de mí, porque ha hallado favor a mis ojos.
  alternative_spanish_readings:
  - Por favor, permita que David permanezca en mi presencia
  - Por favor, deje que David siga sirviéndome
  rationale: El versículo no trata solo de ubicación física; en contexto real expresa acceso y servicio ante el rey. La redacción española conserva esa tensión entre presencia y servicio sin eliminarla. La nota de pie aclara la posibilidad de «permanecer» como servicio continuo.
  doctrine_reference: Cortesanía real y continuidad de servicio en contexto narrativo histórico; no implica doctrina específica.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la estructura hebrea y coincide con la decisión inglesa revisada: el ruego cortés y la idiomática ''hallar favor'' se mantienen sin ampliar el sentido más allá del contexto. No se detectaron revisiones que afecten este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se conserva «favor» como equivalente idiomático de חֵן y no se sustituye por «gracia» en un contexto cortesano.
  - «Delante de mí» reproduce la imagen espacial de לְפָנַי y deja visible la posible lectura de servicio continuo mediante la nota.
  - 'Los nombres propios se transliteran de forma estándar: Saúl, Isaí, David.'
