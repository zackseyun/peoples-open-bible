base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/053.yaml
  text: May the God of Abraham and the god of Nahor[a], the god of their father, judge between us[c][b]. And Jacob swore by the Fear of his father Isaac.
  footnotes:
