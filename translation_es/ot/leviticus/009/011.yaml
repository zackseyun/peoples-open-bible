translation:
  language: es
  text: Pero la carne y la piel[a] las quemó con fuego fuera del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y la carne y la piel las quemó en el fuego fuera del campamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  lexicon: HALOT
  rationale: La conjunción en el flujo narrativo contrasta con la acción previa del v. 10. En español, «Pero» conserva ese giro discursivo mejor que un simple «Y», sin atribuir sentido ajeno al hebreo.
- source_word: הַ/בָּשָׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne ofrecida
  - la carne del animal
  lexicon: HALOT
  rationale: בָּשָׂר denota carne/flesh. En español bíblico y contemporáneo, «carne» comunica el material sacrificial sin forzar «carne» como alimento ni introducir glosa innecesaria.
- source_word: הָ/ע֑וֹר
  english_pob_choice: the hide
  chosen_spanish: la piel
  alternatives_spanish:
  - el cuero
  - el pellejo
  lexicon: HALOT
  rationale: עוֹר puede referirse a piel/hide. «Piel» es más natural y clara en español; «cuero» sugiere material procesado, y «pellejo» sería menos digno para este registro. Se conserva la referencia concreta al revestimiento del animal sacrificado.
- source_word: שָׂרַ֣ף
  english_pob_choice: he burned
  chosen_spanish: la quemó
  alternatives_spanish:
  - la incendió
  - la quemó por completo
  lexicon: HALOT
  rationale: 'El verbo פשוט indica quemar. El objeto directo implícito en español puede retomarse con pronombre: «la quemó». No se añade «por completo» porque el texto ya especifica el lugar y el medio, y no requiere intensificación adicional.'
- source_word: בָּ/אֵ֔שׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en el fuego
  - por medio del fuego
  lexicon: HALOT
  rationale: La construcción instrumental se rinde de forma natural con «con fuego». «En el fuego» podría sonar más locativo que instrumental; «por medio del fuego» es más pesado de lo necesario.
- source_word: מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del encampamento
  lexicon: HALOT
  rationale: La expresión ritual estándar en español es «fuera del campamento». Conserva el valor geográfico y cultual del hebreo sin introducir una interpretación ulterior.
theological_decisions:
- issue: Disposición ritual de restos sacrificiales fuera del campamento
  english_pob_reading: Translate concretely as the burning of the flesh and hide outside the camp without importing later theological symbolism.
  chosen_spanish_reading: Traducir de manera concreta la quema de la carne y la piel fuera del campamento, sin añadir simbolismo teológico posterior.
  alternative_spanish_readings:
  - Una versión tipológica que destaque asociaciones bíblicas posteriores
  - Una formulación más interpretativa que explique el acto como purificación
  rationale: El versículo describe una acción sacerdotal dentro del sistema sacrificial. La traducción debe mantener el procedimiento visible y sobrio, dejando cualquier desarrollo tipológico para notas o referencias cruzadas, no para el texto mismo.
  doctrine_reference: Principio de primacía del texto מקור/original y preservación de la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios respecto del consenso alto entre el texto fuente y la traducción inglesa POB. Se mantiene el carácter descriptivo del rito, sin ampliación tipológica ni ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y natural para lectores de español latinoamericano.
  - «Carne» y «piel» conservan la concreción sacrificial del hebreo, sin sustituir términos por equivalentes más interpretativos.
  - «Fuera del campamento» preserva la fórmula cultual establecida en español y el contraste espacial del pasaje.
