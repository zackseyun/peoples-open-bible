  to: Apresten los caballos; monten, jinetes; tomen su puesto con los cascos puestos. Pulan las lanzas[a]; pónganse la armadura[b].
  rationale: Se ajustó «pónganse de pie» a «tomen su puesto» para reflejar mejor la orden militar de asumir posición. Se cambió «Abrillen» por «Pulan» por mayor naturalidad y claridad en español, conservando en nota la alternativa «bruñan». También se normalizó la nota sobre «siryonot» para estilo y precisión editorial.
