  text: לֵךְ֩ כְּנ֨וֹס אֶת כָּל הַ/יְּהוּדִ֜ים הַֽ/נִּמְצְאִ֣ים בְּ/שׁוּשָׁ֗ן וְ/צ֣וּמוּ עָ֠לַ/י וְ/אַל תֹּאכְל֨וּ וְ/אַל תִּשְׁתּ֜וּ שְׁלֹ֤שֶׁת יָמִים֙ לַ֣יְלָה וָ/י֔וֹם גַּם אֲנִ֥י וְ/נַעֲרֹתַ֖/י אָצ֣וּם כֵּ֑ן וּ/בְ/כֵ֞ן אָב֤וֹא אֶל הַ/מֶּ֨לֶךְ֙ אֲשֶׁ֣ר לֹֽא כַ/דָּ֔ת וְ/כַ/אֲשֶׁ֥ר אָבַ֖דְתִּי אָבָֽדְתִּי־־־־־־־׃
