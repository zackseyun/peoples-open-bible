theological_decisions:
- issue: Whether ἐκπέσητε implies loss of salvation/apostasy or a more general falling from firmness
  chosen_reading: Rendered neutrally as 'fall from your own stability' without specifying apostasy.
  alternative_readings:
  - fall away from your steadfastness
  - lose your secure standing in the faith
  rationale: The verse warns against being carried away by error and falling from one's firm position, but the Greek wording itself does not require a doctrinally specific conclusion about perseverance or apostasy. Per translation philosophy, the wording preserves the warning's force without resolving a denominational debate the text does not explicitly settle.
  doctrine_reference: Preserve theological tension rather than resolve it.
