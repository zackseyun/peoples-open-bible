revisions:
- from: Porque al sonido de Yahvé, Asiria será[ a ]?
  to: Porque a la voz de Yahvé, Asiria será quebrantada[a][b]; con una vara la golpeará.
  rationale: Se completa el versículo conforme al hebreo y al POB inglés, se corrige el marcador de nota, se conserva el nombre divino «Yahvé», se mejora la naturalidad de קול con «voz», y se añaden las dos notas necesarias para preservar la amplitud semántica de יֵחַת y la decisión sobre el sujeto implícito de יַכֶּה. «La golpeará» explicita en español que el objeto es Asiria, sin alterar el sentido auditado.
