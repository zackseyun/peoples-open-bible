theological_decisions:
- issue: Rendering of πίστις in a potentially nuanced context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: DOCTRINE.md lists πίστις with default rendering 'faith,' preserving alternatives in footnotes where contested. Here the phrase is not a major contested construction like pistis Christou; it refers to the patriarchs' persevering posture. 'Faith' remains the main-text rendering, with alternatives noted in lexical documentation rather than requiring a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Rendering figurative language for ἀσπασάμενοι with promises as object
  chosen_reading: welcomed them
  alternative_readings:
  - greeted them
  - embraced them
  rationale: The verse depicts the faithful responding positively to promises not yet received. 'Welcomed' preserves the figurative force without over-literal awkwardness or over-interpretive expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Rendering παρεπίδημοί in accessible modern English
  chosen_reading: temporary residents
  alternative_readings:
  - sojourners
  - resident foreigners
  rationale: The translation philosophy prefers readable modern English over archaic diction. 'Temporary residents' communicates the social status clearly while preserving the pilgrim theme.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic or academic'
