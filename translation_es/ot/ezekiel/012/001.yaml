translation:
  language: es
  text: Y vino la palabra de Yahvé a mí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR»; alternativamente, «Yahvé».
