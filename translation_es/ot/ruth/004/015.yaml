translation:
  language: es
  text: Y él será para ti un restaurador de vida[a] y un sustentador de tu vejez[b], porque tu nuera, que te ama[c], lo ha dado a luz, ella que es mejor para ti que siete hijos varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un restaurador de tu vida»; el hebreo puede leerse como «restaurador de vida/alma».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu vejez», literalmente «tus canas».'
    reason: lexical_alternative
  - marker: c
    text: «Siete hijos varones» usa un número que suele señalar plenitud o completitud; el punto es que Rut vale más para Noemí que la bendición idealizada de muchos hijos varones.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And he will be
  chosen_spanish: Y él será
  alternatives_spanish:
  - Y él será
  - Y él llegará a ser
  - Y él estará
  lexicon: HALOT
  rationale: El hebreo introduce una afirmación futura/resultativa; «será» comunica bien el valor predictivo en español y mantiene el tono de bendición.
- source_word: לְמֵשִׁיב נֶפֶשׁ
  english_pob_choice: a restorer of life
  chosen_spanish: un restaurador de la vida
  alternatives_spanish:
  - uno que restaura la vida
  - un revividor
  - un restaurador del alma
  lexicon: HALOT
  rationale: מֵשִׁיב expresa la idea de devolver/restaurar, y נֶפֶשׁ aquí apunta a la vida concreta, no a una categoría teológica abstracta. «Restaurador de la vida» conserva la imagen y suena natural en español.
- source_word: וּלְכַלְכֵּל
  english_pob_choice: and a sustainer
  chosen_spanish: y un sustentador
  alternatives_spanish:
  - y uno que sostiene
  - y un proveedor
  - y un alimentador
  lexicon: HALOT
  rationale: El verbo tiene sentido de sostener, mantener y proveer; «sustentador» preserva la función participial y el paralelismo con «restaurador».
- source_word: אֶת שֵׂיבָתֵךְ
  english_pob_choice: of your old age
  chosen_spanish: de tu vejez
  alternatives_spanish:
  - de tus canas
  - en tu vejez
  lexicon: HALOT
  rationale: שֵׂיבָה literalmente refiere a las canas/ancianidad. En español, «vejez» comunica el sentido idiomático con claridad y dignidad; la alternativa literal «canas» sería menos natural aquí.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la bendición anterior; «porque» mantiene bien la relación explicativa.
- source_word: כַלָּתֵךְ
  english_pob_choice: your daughter-in-law
  chosen_spanish: tu nuera
  alternatives_spanish:
  - tu hija política
  - tu pariente por matrimonio
  lexicon: HALOT
  rationale: Es el equivalente contextual normal en español para la relación de Rut con Noemí.
- source_word: אֲשֶׁר אֲהֵבַתֶךְ
  english_pob_choice: who loves you
  chosen_spanish: que te ama
  alternatives_spanish:
  - que te ha amado
  - que te quiere
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una realidad estable y comprobada; «te ama» transmite esa relación continua en español, sin perder fuerza afectiva.
- source_word: יְלָדַתּוּ
  english_pob_choice: has borne him
  chosen_spanish: le ha dado a luz
  alternatives_spanish:
  - lo ha dado a luz
  - ha parido un hijo para él
  lexicon: HALOT
  rationale: El sufijo de 3ms remite al niño recién mencionado. En español, «le ha dado a luz» conserva la referencia al nacimiento y evita añadir de forma explícita un objeto que el hebreo no formula aquí.
- source_word: אֲשֶׁר הִיא טוֹבָה לָךְ
  english_pob_choice: she who is better to you
  chosen_spanish: ella que es mejor para ti
  alternatives_spanish:
  - la que es mejor para ti
  - que es buena para ti
  lexicon: HALOT
  rationale: El comparativo con לָךְ expresa superioridad en valor/beneficio. «Mejor para ti» mantiene la comparación y el matiz relacional.
- source_word: מִשִּׁבְעָה בָּנִים
  english_pob_choice: than seven sons
  chosen_spanish: que siete hijos
  alternatives_spanish:
  - que siete hijos varones
  - que siete varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos/varones». En español, «hijos» preserva la referencia masculina y permite una lectura natural; no se neutraliza a «hijos» en sentido genérico sin perder el contraste cultural.
theological_decisions:
- issue: Sentido de נֶפֶשׁ
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  rationale: El contexto trata del sostén y la restauración familiar de Noemí, no de una afirmación antropológica sobre el alma inmortal. «Vida» evita cargar el texto con categorías posteriores y sigue el valor concreto del hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Comparación con siete hijos
  english_pob_reading: seven sons
  chosen_spanish_reading: siete hijos
  alternative_spanish_readings:
  - siete niños
  - siete descendientes
  rationale: El hebreo es explícitamente masculino, y el contraste refleja expectativas sociales antiguas sobre los hijos varones como sostén en la vejez. Se conserva el término marcado sin neutralización.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el audit trail inglés y no requiere revisiones sustantivas; se mantuvo la equivalencia óptima con decisiones léxicas justificadas desde el hebreo y la glosa inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención de proyecto cuando corresponda, pero este versículo no lo contiene.
  - 'Se preserva el paralelismo retórico: restauración de la vida + sustento de la vejez + razón introducida por «porque».'
  - Se eligió un español natural pero suficientemente cercano al hebreo, evitando tanto la calca rígida como la paráfrasis libre.
