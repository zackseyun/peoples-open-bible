translation:
  language: es
  text: Entonces Sansón agarró las dos columnas centrales[b] sobre las cuales se apoyaba la casa, y se apoyó contra ellas[a], una con su mano derecha y la otra con su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se recostó contra ellas». El verbo hebreo puede denotar apoyarse o sostenerse sobre algo; «se apoyó contra ellas» refleja mejor en este contexto la acción física intencional de Sansón.
    reason: lexical_alternative
  - marker: b
    text: O «las dos columnas del medio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְפֹּת
  english_pob_choice: grasped
  chosen_spanish: agarró
  alternatives_spanish:
  - asir
  - tomó con firmeza
  - aferró
  lexicon: HALOT
  rationale: El verbo hebreo expresa tomar o sujetar con firmeza. «Agarró» comunica contacto fuerte y decidido en un español natural, sin suavizar la acción ni volverla más formal de lo que el contexto exige.
- source_word: שְׁנֵי עַמּוּדֵי הַתָּוֶךְ
  english_pob_choice: the two middle pillars
  chosen_spanish: las dos columnas centrales
  alternatives_spanish:
  - las dos columnas del medio
  - las dos columnas intermedias
  lexicon: HALOT
  rationale: עַמּוּדֵי son «columnas/pilares»; הַתָּוֶךְ señala la zona media o central. «Centrales» preserva el sentido arquitectónico y es más natural en español que un calco como «del medio».
- source_word: אֲשֶׁר הַבַּיִת נָכוֹן עֲלֵיהֶם
  english_pob_choice: on which the house stood
  chosen_spanish: sobre las cuales se apoyaba la casa
  alternatives_spanish:
  - sobre las cuales estaba sostenida la casa
  - sobre las que descansaba la casa
  lexicon: HALOT
  rationale: נָכוֹן aquí comunica estar establecido o sostenido por algo. «Se apoyaba» conserva la relación estructural sin perder la imagen de soporte físico del edificio.
- source_word: וַיִּסָּמֵךְ עֲלֵיהֶם
  english_pob_choice: he braced himself against them
  chosen_spanish: se recostó contra ellas
  alternatives_spanish:
  - se apoyó contra ellas
  - se sostuvo contra ellas
  - se braceó contra ellas
  lexicon: HALOT
  rationale: El verbo סמך puede significar apoyarse o sostenerse sobre algo. La opción principal refleja el gesto corporal inmediato y mantiene la tensión del contexto. En español, «se recostó contra ellas» conserva esa idea de apoyo físico; no se elige «se apoyó» porque repetiría demasiado de cerca el sintagma anterior.
- source_word: אֶחָד בִּימִינוֹ וְאֶחָד בִּשְׂמֹאלוֹ
  english_pob_choice: one with his right hand and one with his left
  chosen_spanish: una con su mano derecha y la otra con su izquierda
  alternatives_spanish:
  - una en su mano derecha y la otra en su izquierda
  - una a su derecha y la otra a su izquierda
  lexicon: HALOT
  rationale: El hebreo distribuye un pilar para cada lado. «Con su mano derecha... con su izquierda» hace explícita la disposición corporal que el inglés POB también entendió, y suena natural en español.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el edificio
  - la sala
  lexicon: HALOT
  rationale: Aunque el contexto describe una estructura tipo templo o edificio, el hebreo dice literalmente «casa». En español, «casa» preserva la palabra fuente; «edificio» aclararía, pero se aparta más del léxico del original.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una solución de equivalencia óptima sin cambios en su revisión más reciente. La presente redacción española sigue esa misma lectura: dos columnas centrales, soporte estructural de la casa, y un gesto corporal de apoyo firme antes del colapso narrado en el versículo siguiente.'
  spanish_consistency_notes:
  - Se conservó «Sansón» como nombre propio usual en español.
  - Se evitó «SEÑOR» o cualquier máscara teológica porque el verso no contiene el nombre divino.
  - Se usó «casa» para mantener la literalidad del hebreo, aunque el contexto arquitectónico podría admitir «edificio».
  - Se prefirió una expresión corporal natural en español («se recostó contra ellas») para reflejar el verbo de apoyo sin introducir una lectura más interpretativa que la requerida.
