translation:
  language: es
  text: Porque mil años, ante tus ojos, son como ayer, cuando ya pasó[a], o como una guardia[b] en la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ha pasado». La cláusula hebrea puede expresarse con un matiz temporal ligeramente distinto.'
    reason: lexical_alternative
  - marker: b
    text: Una «guardia» era una división de la noche para hacer vigilancia.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o explicación del contraste anterior; «Porque» conserva con naturalidad el valor causal/explanatorio del hebreo y es idiomático en español.
- source_word: אֶלֶף שָׁנִים
  english_pob_choice: a thousand years
  chosen_spanish: mil años
  alternatives_spanish:
  - un millar de años
  - milenios
  lexicon: HALOT
  rationale: Mantiene la expresión numérica directa del hebreo y la comparación temporal sin añadir connotaciones no presentes en el texto.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your sight
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - a tu vista
  - en tu presencia
  - a tus ojos
  lexicon: HALOT
  rationale: La metáfora hebrea de perspectiva/evaluación se expresa de forma natural en español con «ante tus ojos», conservando la imagen antropomórfica sin endurecerla.
- source_word: כְּיוֹם אֶתְמוֹל
  english_pob_choice: are like yesterday
  chosen_spanish: como el día de ayer
  alternatives_spanish:
  - como ayer
  - como un ayer
  - como el día de ayer
  lexicon: HALOT
  rationale: El hebreo compara con un día reciente y fugaz; «como el día de ayer» mantiene la imagen temporal con un español claro y digno.
- source_word: כִּי יַעֲבֹר
  english_pob_choice: when it is past
  chosen_spanish: cuando ha pasado
  alternatives_spanish:
  - cuando pasa
  - cuando pasó
  - al haber pasado
  lexicon: HALOT
  rationale: La cláusula cualifica al «día de ayer» como ya concluido. «Cuando ha pasado» refleja mejor el matiz de completitud que una forma presente, y evita la ambigüedad temporal.
- source_word: וְאַשְׁמוּרָה
  english_pob_choice: or like a watch
  chosen_spanish: y como una vigilia
  alternatives_spanish:
  - o como una vigilia
  - y como una guardia
  - o como una guardia
  lexicon: HALOT
  rationale: En español, «vigilia» comunica la división nocturna usada para velar/guardar y puede llevar el valor de turno nocturno con dignidad literaria. Se conserva la comparación segunda sin forzar el idioma con una repetición artificial de «como» si la coordinación hebrea admite continuidad comparativa.
- source_word: בַּלָּיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - durante la noche
  - de noche
  lexicon: HALOT
  rationale: Completa el cuadro imagético de la «vigilia» con una locución natural en español; «en la noche» preserva la referencia temporal sin añadir énfasis interpretativo.
theological_decisions:
- issue: Antropomorfismo de la perspectiva divina sobre el tiempo
  english_pob_reading: Retain 'in your sight' and the temporal comparison without philosophical expansion.
  chosen_spanish_reading: Mantener la perspectiva divina con «ante tus ojos» y la comparación temporal sin expandirla filosóficamente.
  alternative_spanish_readings:
  - para ti mil años son como ayer
  - a tus ojos mil años son nada
  - mil años te parecen como un día
  rationale: El versículo es poético y contrasta la experiencia humana y divina del tiempo. «Ante tus ojos» conserva el antropomorfismo bíblico sin convertirlo en una afirmación metafísica más amplia que la del texto.
  doctrine_reference: Poética bíblica; lectura prudente del antropomorfismo
- issue: Valor de la conjunción entre las dos imágenes
  english_pob_reading: or like a watch in the night
  chosen_spanish_reading: y como una vigilia en la noche
  alternative_spanish_readings:
  - o como una vigilia en la noche
  - y como una guardia nocturna
  - o como una guardia en la noche
  rationale: La coordinación hebrea puede funcionar como continuación de la comparación. Dado que el español admite esta fluidez y el sentido general no exige exclusión lógica estricta, «y como» mantiene el paralelismo poético sin perder la segunda imagen.
  doctrine_reference: Paralelismo hebreo
- issue: Matiz temporal del verbo יַעֲבֹר
  english_pob_reading: when it is past
  chosen_spanish_reading: cuando ha pasado
  alternative_spanish_readings:
  - cuando pasa
  - cuando pasa ya
  - cuando está pasado
  rationale: La revisión inglesa privilegia la idea de pasado consumado. «Cuando ha pasado» expresa ese resultado y conserva la fugacidad evocada por el hebreo.
  doctrine_reference: Semántica verbal hebrea
translation_notes:
  revision_awareness: La revisión inglesa reciente desplazó la formulación desde una idea más dinámica de «passes by» hacia la más precisa «when it is past», porque la cláusula hebrea califica al «día de ayer» como algo ya concluido. La redacción española adopta ese matiz con «cuando ha pasado» para reflejar el estado completado sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto del proyecto cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton explícito.
  - Se evita «SEÑOR» como sustituto del nombre divino porque aquí no es necesario y la imagen poética no lo exige.
  - «Vigilia» se usa en sentido de turno nocturno/guardia, coherente con el hebreo אַשְׁמוּרָה.
  - La puntuación reproduce el paralelismo poético con una coma tras «ojos» y otra tras «pasado» para facilitar la lectura litúrgica.
