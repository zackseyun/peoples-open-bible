    rationale: Aunque reproduce de cerca el sustantivo abstracto griego διασπορά, en español bíblico corriente la frase resulta dura y ambigua. El propio historial inglés ya desplazó el texto principal hacia una forma más natural («our dispersed people»), dejando la literalidad en nota.
  - severity: low
