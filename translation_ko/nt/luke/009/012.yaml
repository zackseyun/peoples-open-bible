  yaml_path: translation/nt/luke/009/012.yaml
  text: 'Now the day began to decline[a], and the twelve came and said to him, “Send the crowd away, so that they may go into the surrounding villages and countryside, find lodging, and get provisions[b], because we are here in a desolate place.”'
  footnotes:
  - marker: a
    text: Or “a deserted place.” The Greek ἔρημος can denote an uninhabited or sparsely inhabited area.
    reason: lexical_alternative
  - marker: b
    text: Or “find food.” The Greek ἐπισιτισμός refers to provisions or food supplies.
    reason: lexical_alternative
