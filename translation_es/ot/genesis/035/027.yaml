- from: Y Jacob fue a Isaac, su padre, en Mamre[a], Kiriat-arba (es decir, Hebrón), donde Abraham e Isaac habían habitado como forasteros.
  to: Y Jacob vino a Isaac, su padre, en Mamre[a], Kiriat-arba (es decir, Hebrón), donde Abraham e Isaac habían vivido allí como forasteros.
