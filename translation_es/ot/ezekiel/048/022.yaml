translation:
  language: es
  text: Y de la propiedad de los levitas y de la propiedad de la ciudad, en medio de lo que le corresponde al príncipe[a], entre el límite de Judá y el límite de Benjamín[b], pertenecerá al príncipe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dentro de lo que será para el príncipe».'
    reason: alternative_reading
  - marker: b
    text: 'O: «entre el territorio de Judá y el territorio de Benjamín».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲחֻזַּת
  english_pob_choice: property
  chosen_spanish: propiedad
  alternatives_spanish:
  - posesión
  - tenencia
  - heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una tenencia o propiedad territorial. En español, «propiedad» comunica de manera natural la idea de una porción de tierra asignada, sin añadir matices técnicos innecesarios.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  - los hijos de Leví
  lexicon: HALOT
  rationale: El nombre tribal se expresa de forma estándar como «los levitas». Conserva la referencia grupal y resulta idiomático en español bíblico moderno.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad
  - la urbe
  lexicon: HALOT
  rationale: La referencia es directa al terreno de la ciudad en el reparto territorial. «La ciudad» es la opción más clara y fiel.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el interior de
  lexicon: HALOT
  rationale: La expresión marca ubicación dentro de una porción mayor. «En medio de» conserva la imagen espacial del hebreo y sigue siendo natural en español.
- source_word: אֲשֶׁר לַנָּשִׂיא יִהְיֶה
  english_pob_choice: what belongs to the prince
  chosen_spanish: lo que será para el príncipe
  alternatives_spanish:
  - lo que pertenecerá al príncipe
  - lo que será del príncipe
  lexicon: HALOT
  rationale: La cláusula relativa funciona como una identificación del territorio mayor asignado al príncipe. «Lo que será para el príncipe» mantiene la apertura del hebreo y evita cerrar demasiado la relación posesiva.
- source_word: נָשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - gobernante
  lexicon: HALOT
  rationale: En Ezequiel, נָשִׂיא es un título político específico. «Príncipe» preserva la terminología tradicional del pasaje y la distinción respecto de rey o mesías.
- source_word: בֵּין גְּבוּל יְהוּדָה וּבֵין גְּבוּל בִּנְיָמִן
  english_pob_choice: between the border of Judah and the border of Benjamin
  chosen_spanish: entre el límite de Judá y el límite de Benjamín
  alternatives_spanish:
  - entre la frontera de Judá y la frontera de Benjamín
  - entre el territorio de Judá y el territorio de Benjamín
  lexicon: HALOT
  rationale: גְּבוּל puede ser «límite», «frontera» o «territorio». Aquí el contexto es el trazado de una delimitación espacial; «límite» reproduce bien la imagen de la línea divisoria sin forzar una lectura administrativa.
- source_word: לַנָּשִׂיא יִהְיֶה
  english_pob_choice: it shall belong to the prince
  chosen_spanish: será para el príncipe
  alternatives_spanish:
  - pertenecerá al príncipe
  - será del príncipe
  lexicon: HALOT
  rationale: La repetición final refuerza la asignación del tramo al príncipe. «Será para el príncipe» preserva la fórmula asignativa del hebreo y es suficientemente natural en español.
theological_decisions:
- issue: Título נָשִׂיא en la visión de la tierra restaurada
  english_pob_reading: prince
  chosen_spanish_reading: príncipe
  alternative_spanish_readings:
  - líder
  - gobernante
  rationale: Se conserva «príncipe» como título político sin resolverlo hacia una interpretación mesiánica o monárquica más específica de la que el verso exige. Así se mantiene la tensión documental del texto.
  doctrine_reference: Preservar la ambigüedad funcional del cargo en Ezequiel 48.
- issue: Relación posesiva del territorio asignado
  english_pob_reading: in the midst of what belongs to the prince / it shall belong to the prince
  chosen_spanish_reading: en medio de lo que será para el príncipe / será para el príncipe
  alternative_spanish_readings:
  - dentro de lo que pertenecerá al príncipe
  - en lo que será del príncipe
  rationale: La hebra describe una porción situada dentro de otra mayor que está destinada al príncipe. La traducción mantiene esa superposición territorial sin convertirla en una explicación interpretativa más cerrada.
  doctrine_reference: Mantener la estructura del reparto territorial sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés existente: ''property'' se vierte como «propiedad»; נָשִׂיא como «príncipe»; גְּבוּל como «límite»; y la cláusula posesiva final se mantiene como asignación territorial. No hubo revisiones aplicadas en el registro inglés más reciente, por lo que esta versión conserva el mismo sentido base con formulación española natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Se conserva «príncipe» como término técnico de Ezequiel, no «rey» ni «gobernante», para respetar la distinción del pasaje.
  - «Límite» se usa de forma uniforme para גְּבוּל dentro del mismo verso.
  - La estructura repetida de posesión/adscripción se refleja con «para el príncipe» para evitar sobreinterpretar la relación jurídica exacta.
