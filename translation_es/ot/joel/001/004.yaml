    rationale: La evidencia fuente y la auditoría inglesa no buscan ocultar el sentido con transliteración, sino comunicar cuatro términos distintos con distinciones descriptivas y cautela zoológica. 'gázam/árbê/yélek/jasil' no son transparentes para lectores hispanohablantes y reducen fidelidad comunicativa.
