revisions:
- from: Entonces todo ser humano[a] temerá, y declararán la obra de Dios; entenderán lo que él ha hecho.
  to: Entonces toda la humanidad[a] temerá, y declarará la obra de Dios; entenderá lo que él ha hecho.
  rationale: Se revisa principalmente para corregir la concordancia y mejorar la naturalidad del español sin cambiar el sentido del hebreo ni la lógica de la auditoría inglesa. «Toda la humanidad» preserva mejor el valor colectivo de כָּל אָדָם y permite mantener los verbos en singular de forma fluida y digna.
