translation:
  language: es
  text: Pero ellos no sabían que José los entendía[a], porque el intérprete estaba entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «José estaba escuchando», con el sentido de que podía comprender lo que decían.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Ahora bien, ellos
  lexicon: HALOT
  rationale: La conjunción con el pronombre introduce contraste narrativo; «Pero ellos» conserva la oposición y mantiene el sujeto explícito en español.
- source_word: לֹא יָדְעוּ
  english_pob_choice: did not know
  chosen_spanish: no sabían
  alternatives_spanish:
  - no supieron
  - no se dieron cuenta
  lexicon: HALOT
  rationale: ידע en perfecto negativo expresa falta de conocimiento; «no sabían» es natural y fiel, sin introducir matiz puntual de descubrimiento.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Introduce el contenido de lo que no sabían; en español corresponde directamente con «que».
- source_word: שֹׁמֵעַ
  english_pob_choice: was listening
  chosen_spanish: estaba escuchando
  alternatives_spanish:
  - estaba oyendo
  - entendía
  lexicon: HALOT
  rationale: שׁמע literalmente es oír/escuchar. Aunque el contexto implica comprensión, el audit trail inglés prefirió «was listening» para preservar el valor léxico; «estaba escuchando» conserva esa base sin perder naturalidad. La opción «entendía» queda como alternativa contextual, pero no se adopta en el texto principal porque suaviza demasiado el verbo fuente.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - —
  lexicon: convención onomástica estándar
  rationale: Nombre propio bíblico en su forma española convencional y reconocible.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Segunda ocurrencia causal; «porque» expresa con claridad la razón dada por el narrador.
- source_word: הַמֵּלִיץ
  english_pob_choice: the interpreter
  chosen_spanish: el intérprete
  alternatives_spanish:
  - el mediador
  - el traductor
  - el portavoz
  lexicon: HALOT
  rationale: En este contexto narrativo, מֵלִיץ refiere al intermediario lingüístico; «intérprete» es la equivalencia más precisa y natural en español.
- source_word: בֵּינֹתָם
  english_pob_choice: between them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - entre ambos
  lexicon: HALOT
  rationale: La frase indica la posición mediadora del intérprete; «entre ellos» reproduce de forma clara y directa la relación espacial/interpersonal.
translation_notes:
  revision_awareness: La versión inglesa del POB revisó «understood» a «was listening» para reflejar con más precisión שׁמע y conservar la base léxica del hebreo. Esta versión española sigue esa revisión, manteniendo el verbo de percepción auditiva en el texto principal y reservando «entendía» como alternativa de sentido contextual en la nota.
  spanish_consistency_notes:
  - Se conserva «José» para el nombre propio, conforme al uso bíblico estándar en español.
  - «Intérprete» se mantiene de manera consistente con el valor contextual de מֵלִיץ en narraciones de mediación lingüística.
  - No se usa «SEÑOR» ni terminología teológica aquí, pues el versículo no contiene referencia divina explícita.
