translation:
  language: es
  text: 'La hija de Faraón le dijo: «Ve». Y la joven fue y llamó a la madre del niño.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּת פַּרְעֹה
  english_pob_choice: Pharaoh’s daughter
  chosen_spanish: la hija de Faraón
  alternatives_spanish:
  - la hija del Faraón
  lexicon: HALOT
  rationale: La construcción hebrea indica filiación respecto de Faraón; en español, «la hija de Faraón» conserva esa relación de manera natural y fiel, sin añadir matices ajenos.
- source_word: לֵכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: Es un imperativo femenino singular dirigido a Miriam. «Ve» reproduce la brevedad y fuerza del mandato con español claro y sobrio.
- source_word: הָעַלְמָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la doncella
  lexicon: HALOT
  rationale: עַלְמָה señala a una mujer joven en edad núbil; «la joven» mantiene ese sentido sin caer en un arcaísmo como «doncella» ni en una especificación innecesaria.
- source_word: וַתִּקְרָא אֶת אֵם הַיָּלֶד
  english_pob_choice: called the child’s mother
  chosen_spanish: llamó a la madre del niño
  alternatives_spanish:
  - llamó a la madre de la criatura
  - mandó llamar a la madre del niño
  lexicon: HALOT
  rationale: קרא con objeto directo puede significar llamar. En esta narración, «llamó a la madre del niño» sigue de cerca el hebreo y suena natural en español.
- source_word: הַיָּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - el bebé
  lexicon: HALOT
  rationale: En el contexto inmediato se trata de un recién nacido; «el niño» es la opción más natural y no sobrecarga el texto con una precisión que el hebreo no exige aquí.
translation_notes:
  revision_awareness: El contexto inglés presenta alta concordancia con el texto hebreo y no registra revisiones pendientes; por eso la versión española sigue de cerca la lectura narrativa simple, sin añadir notas de variante.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como transliteración estable del nombre propio en lugar de sustituirlo por una glosa.
  - Se usa «la joven»/«la hija de Faraón» con registro neutro y publicable, evitando arcaísmos.
  - No se introducen notas porque el versículo no presenta una tensión lexical o textual que el inglés POB haya destacado.
