review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: el rey de Asiria deporta/exilia a Israel a Asiria y los ubica en varias localidades. Conserva correctamente «Israel» como entidad corporativa y mantiene la nota cultural correspondiente. Sin embargo, hay un ajuste de fidelidad/claridad geográfica en español: «en el Habor, el río de Gozán» suena menos natural que una formulación locativa como «junto al río Habor, el río de Gozán» o, mejor aún, una reestructuración que preserve la aposición sin ambigüedad.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: «exilió» es comprensible aunque menos idiomático bíblicamente que «deportó» o «llevó al exilio»; y «en el Habor, el río de Gozán» resulta algo torpe en español. También «Halah» puede mantenerse por continuidad con el inglés auditado, aunque en español bíblico existen otras transliteraciones. El resto fluye bien.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. «Israel», «Asiria» y «los medos» están bien alineados con la evidencia y la nota explicativa. El principal ajuste recomendado es estilístico-lexical: preferir «deportó» sobre «exilió» por naturalidad en español, sin perder la fuerza de גלה.'
  issues:
  - severity: medium
    issue: «exilió» suena menos natural que «deportó» en este contexto histórico-político
    rationale: Aunque «exilió» es defendible y cercano al inglés «exiled», en español bíblico general «deportó» comunica con mayor naturalidad una remoción forzada por un poder imperial, y coincide con la alternativa ya documentada en la nota.
  - severity: medium
    issue: La frase «en el Habor, el río de Gozán» es poco idiomática y geográficamente rígida en español
