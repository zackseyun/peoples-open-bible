base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/002/035.yaml
  text: And then the Lord will reveal these things[a], and the glory of the Lord and the cloud will appear, as it was shown in the case of Moses, and as Solomon also asked[d][c][b], that the place might be greatly sanctified.
  footnotes:
  - marker: a
    text: Or 'will reveal these things.' The Greek verb can mean to disclose, reveal, or bring to light.
    reason: lexical_alternative
  - marker: b
    text: '''The cloud'' likely refers to the familiar cloud of divine presence associated with Moses and the sanctuary traditions.'
    reason: cross_reference
  - marker: c
    text: Or 'as it was made manifest with Moses.' The Greek phrase compares this future manifestation with the Mosaic precedent.
    reason: lexical_alternative
  - marker: d
    text: Or 'as Solomon also prayed, that the place might be consecrated greatly.'
    reason: lexical_alternative
