translation:
  language: es
  text: En el año cincuenta[a] de Azarías, rey de Judá, Pekahía, hijo de Menahem, comenzó a reinar sobre Israel en Samaria, y reinó dos años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Año cincuenta" mantiene la forma cardinal del hebreo; también podría expresarse como "quincuagésimo año". Se prefirió la forma más cercana al giro regnal original.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/שְׁנַת ... חֲמִשִּׁים שָׁנָה
  english_pob_choice: In the fiftieth year
  chosen_spanish: En el año cincuenta[a]
  alternatives_spanish:
  - En el quincuagésimo año
  - Al cumplirse cincuenta años
  lexicon: HALOT
  rationale: La fórmula hebrea de datación regnal expresa un punto temporal dentro del reinado de Azarías. En español, "en el año cincuenta" conserva la estructura breve y natural; se ancla con nota para señalar la opción ordinal posible.
- source_word: לַ/עֲזַרְיָה
  english_pob_choice: of Azariah
  chosen_spanish: de Azarías
  alternatives_spanish:
  - bajo Azarías
  - en tiempos de Azarías
  lexicon: HALOT
  rationale: El ל prefijal funciona como punto de referencia regnal. "De Azarías" reproduce de manera directa esa relación temporal sin introducir matices no explicitados por el texto.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Construcción posesiva normal en español para el cargo y el territorio del rey.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - llegó a ser rey
  - se hizo rey
  lexicon: HALOT
  rationale: En notices regios, מלך puede señalar la entronización o inicio del reinado. "Comenzó a reinar" preserva ese valor incoativo y evita repetir la idea de duración que aparece al final del versículo.
- source_word: פְּקַחְיָה
  english_pob_choice: Pekahiah
  chosen_spanish: Pekahía
  alternatives_spanish:
  - Pecajía
  - Pekajya
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio con transliteración española corriente, sin forzar una forma tradicional no documentada por el contexto inmediato.
- source_word: בֶן מְנַחֵם
  english_pob_choice: son of Menahem
  chosen_spanish: hijo de Menahem
  alternatives_spanish:
  - descendiente de Menahem
  lexicon: HALOT
  rationale: Identificación filial literal y formal, propia de la nota regnal.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - para Israel
  lexicon: HALOT
  rationale: La preposición עַל con מלך indica gobierno o autoridad sobre un pueblo. "Sobre Israel" conserva esa fuerza de dominio/regencia.
- source_word: בְּ/שֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - a Samaria
  lexicon: HALOT
  rationale: La locativa ב se traduce naturalmente con "en"; Samaria funciona como sede del reino en el contexto de la nota.
- source_word: שְׁנָתָיִם
  english_pob_choice: two years
  chosen_spanish: dos años
  alternatives_spanish:
  - un par de años
  lexicon: HALOT
  rationale: La dual hebrea expresa una duración precisa. "Dos años" es la equivalencia directa y clara en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior haciendo que el marcador de nota [a] aparezca explícitamente en el texto de traducción. El resto de la redacción sigue el testimonio hebreo y el rastro auditado en inglés sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como término por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se usa "comenzó a reinar" para reflejar el valor incoativo de מלך en una nota regnal.
  - Los nombres propios se transliteran de manera consistente y legible para lectoría eclesial en español.
