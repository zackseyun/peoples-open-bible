  - severity: medium
    issue: Forma léxica «nazareo» menos recomendable que «nazireo»
    rationale: Aunque «nazareo» puede entenderse, «nazireo» es la forma más extendida y reconocible en español bíblico para el término técnico de Números 6. Mejora fidelidad terminológica y legibilidad eclesial.
  revised_spanish_text: Todos los días de su voto de nazireo, no comerá nada que provenga de la vid, desde las semillas hasta la piel[a].
