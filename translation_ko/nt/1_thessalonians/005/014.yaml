id: 1TH.5.14
reference: 1 Thessalonians 5:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: παρακαλοῦμεν δὲ ὑμᾶς, ἀδελφοί, νουθετεῖτε τοὺς ἀτάκτους, παραμυθεῖσθε τοὺς ὀλιγοψύχους, ἀντέχεσθε τῶν ἀσθενῶν, μακροθυμεῖτε πρὸς πάντας.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/014.yaml
  text: And we urge you[a], brothers, admonish the disorderly, encourage the fainthearted, help the weak[d][c][b], be patient with everyone.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Paul is addressing the congregation as a whole.
    reason: alternative_reading
  - marker: b
    text: Or 'the idle' or 'the unruly' for 'the disorderly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'comfort the discouraged.'
    reason: lexical_alternative
  - marker: d
    text: Or 'support the weak.'
    reason: lexical_alternative
translation:
  language: ko
  text: 형제[a] 여러분, 우리는 여러분에게 권면합니다. 무질서한 자들[b]을 권고하고, 낙심한 자들[c]을 위로하며, 약한 자들[d]을 붙들어 주고, 모든 사람에게 오래 참으십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매」. 바울은 회중 전체를 호칭한다.
    reason: alternative_reading
  - marker: b
    text: 또는 「게으른 자들」, 「제멋대로 행하는 자들」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「낙심한 자들을 위로하라」.
    reason: lexical_alternative
  - marker: d
    text: 또는 「약한 자들을 지원하라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: νουθετεῖτε τοὺς ἀτάκτους
  english_pob_choice: admonish the disorderly
  chosen_korean: 무질서한 자들을 권고하고
  alternatives_korean:
  - 게으른 자들에게 경계의 말을 하고
  - 규율을 어기는 자들을 권면하고
  lexicon: BDAG
  rationale: ἄτακτος는 「대열을 벗어남·질서를 어김」. 한국어 「무질서한」이 본 어휘의 폭(게으름·반항·이탈)을 함께 담는다.
- source_word: παραμυθεῖσθε τοὺς ὀλιγοψύχους
  english_pob_choice: encourage the fainthearted
  chosen_korean: 낙심한 자들을 위로하며
  alternatives_korean:
  - 마음이 약한 자들을 다독이며
  - 낙심한 자들을 격려하며
  lexicon: BDAG
  rationale: παραμυθέομαι의 부드러운 위로. 2:12와 일관된 「위로」 어휘.
- source_word: ἀντέχεσθε τῶν ἀσθενῶν
  english_pob_choice: help the weak
  chosen_korean: 약한 자들을 붙들어 주고
  alternatives_korean:
  - 약한 자들을 도우며
  - 약한 자들을 지원하며
  lexicon: BDAG
  rationale: ἀντέχομαι의 「붙듦·매달림」 의미를 「붙들어 주다」로 옮긴다.
- source_word: μακροθυμεῖτε πρὸς πάντας
  english_pob_choice: be patient with everyone
  chosen_korean: 모든 사람에게 오래 참으십시오
  alternatives_korean:
  - 모든 이를 향해 인내하십시오
  - 모든 사람에게 너그러우십시오
  lexicon: BDAG
  rationale: μακροθυμέω의 「길게 참음」을 「오래 참다」로 직역. 한국 교회 전통의 정형 어휘.
