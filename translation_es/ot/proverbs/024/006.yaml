translation:
  language: es
  text: Porque con sabia estrategia[a] harás la guerra, y la victoria[b] está en la abundancia de consejeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con estrategia» o «con sabia guía»; el hebreo se refiere a dirección hábil y planeación táctica.
    reason: lexical_alternative
  - marker: b
    text: O «liberación»; en este contexto bélico, el hebreo apunta más específicamente a «victoria».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del proverbio anterior; «Porque» es natural en español y conserva el valor explicativo causal.
- source_word: בְתַחְבֻּלוֹת
  english_pob_choice: by wise guidance
  chosen_spanish: con prudentes estrategias
  alternatives_spanish:
  - con sabia guía
  - con estrategia
  - con buen consejo
  lexicon: HALOT
  rationale: El término hebreo apunta a guía táctica, planeación hábil y conducción estratégica; «prudentes estrategias» mantiene el matiz instrumental y la idea de destreza sin sonar técnico en exceso.
- source_word: תַּעֲשֶׂה לְּךָ מִלְחָמָה
  english_pob_choice: you will wage war
  chosen_spanish: harás guerra
  alternatives_spanish:
  - llevarás a cabo guerra
  - harás tu guerra
  - combatirás
  lexicon: HALOT
  rationale: La expresión idiomática significa «hacer/llevar guerra»; en español «harás guerra» conserva la construcción verbal y no añade posesivo inexistente en el hebreo.
- source_word: וּתְשׁוּעָה
  english_pob_choice: and victory
  chosen_spanish: y la victoria
  alternatives_spanish:
  - y la liberación
  - y el rescate
  - y la salvación
  lexicon: HALOT
  rationale: En este contexto bélico-proverbial, תְּשׁוּעָה señala el resultado exitoso del combate; «victoria» expresa mejor ese sentido específico que las alternativas más amplias.
- source_word: בְּרֹב יוֹעֵץ
  english_pob_choice: in an abundance of counselors
  chosen_spanish: está en la abundancia de consejeros
  alternatives_spanish:
  - está en muchos consejeros
  - está en la multitud de consejeros
  - se encuentra en abundancia de consejeros
  lexicon: HALOT
  rationale: 'La frase hebrea usa un sustantivo colectivo: el sentido es que el éxito/resultado favorable se halla mediante muchos consejeros; «abundancia de consejeros» preserva la fuerza colectiva mejor que una fórmula singular.'
theological_decisions:
- issue: Sentido de תְּשׁוּעָה en contexto militar
  english_pob_reading: victory rather than the broader deliverance/salvation
  chosen_spanish_reading: la victoria
  alternative_spanish_readings:
  - la liberación
  - la salvación
  rationale: El contexto de guerra orienta el término hacia el éxito en batalla; por eso se evita una traducción más amplia que podría diluir el matiz proverbial.
  doctrine_reference: Contexto inmediato y campo semántico de תְּשׁוּעָה en proverbio militar
- issue: Función de בְּרֹב יוֹעֵץ como colectivo
  english_pob_reading: an abundance of counselors
  chosen_spanish_reading: la abundancia de consejeros
  alternative_spanish_readings:
  - muchos consejeros
  - la multitud de consejeros
  rationale: Aunque יוֹעֵץ es formalmente singular, la construcción expresa multiplicidad de consejeros; el español debe reflejar ese valor colectivo sin forzar un singular artificial.
  doctrine_reference: Sintaxis hebrea y lógica proverbial
- issue: Relación entre estrategia y sabiduría
  english_pob_reading: wise guidance
  chosen_spanish_reading: prudentes estrategias
  alternative_spanish_readings:
  - sabia guía
  - buen consejo
  rationale: El hebreo enfatiza la planeación hábil y el consejo táctico; «estrategias» comunica mejor ese componente sin perder la cualidad de prudencia.
  doctrine_reference: HALOT sobre תַּחְבֻּלוֹת
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que eliminó el posesivo «your» antes de «war» por no estar explícito en el hebreo; por eso el español evita añadir cualquier posesivo y conserva una formulación directa. También se mantuvo el ajuste contextual de «victory» frente a «deliverance».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - «Consejeros» se usa en plural para reflejar el valor colectivo de רֹב יוֹעֵץ.
  - «Harás guerra» conserva el giro verbal hebreo sin introducir un posesivo no presente.
  - Se evita «salvación» por la carga más general que tendría en español frente al contexto militar.
  - La puntuación y el ritmo siguen un tono proverbial claro y publicable.
