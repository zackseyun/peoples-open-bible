translation:
  language: es
  text: Vuélvete hacia mí y muéstrame tu gracia, porque estoy solo[a] y afligido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'solitario' o 'solo y aislado'. El hebreo יָחִיד puede significar 'solo' o 'solitario', además de 'único'; aquí se conserva la idea de soledad personal sin cerrar otras posibilidades de matiz.
    reason: lexical_alternative
  - marker: b
    text: O 'pobre' u 'oprimido' para 'afligido'. El hebreo עָנִי puede denotar pobreza económica, opresión social o aflicción general, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵה
  english_pob_choice: Turn
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Vuelve tu rostro
  - Dirígete a mí
  lexicon: HALOT
  rationale: El imperativo de פנה, en una súplica dirigida a Dios, pide atención favorable. En español, 'vuélvete a mí' comunica esa orientación personal sin sonar mecánico ni perder el matiz relacional del hebreo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el hablante. 'A mí' es la forma más natural con 'vuélvete' y conserva la focalización de la petición.
- source_word: וְחָנֵּנִי
  english_pob_choice: and be gracious to me
  chosen_spanish: y concédeme tu gracia
  alternatives_spanish:
  - y muéstrame favor
  - y ten misericordia de mí
  lexicon: HALOT
  rationale: חנן expresa pedir favor/gracia. 'Concédeme tu gracia' mantiene el valor teológico de gracia/favor divino sin reducirlo al campo semántico de 'misericordia', que en español puede desplazar el matiz de benevolencia concedida.
- source_word: יָחִיד
  english_pob_choice: lonely
  chosen_spanish: solo
  alternatives_spanish:
  - solitario
  - abandonado
  - solo y aislado
  lexicon: HALOT
  rationale: Aunque el POB inglés eligió 'lonely' por el contexto de lamento, en español 'solo' comunica con naturalidad tanto la soledad social como la sensación de aislamiento. Conserva también la alternativa lexical de 'alone/solitary' señalada en el audit trail.
- source_word: וְעָנִי
  english_pob_choice: afflicted
  chosen_spanish: afligido
  alternatives_spanish:
  - pobre
  - oprimido
  - necesitado
  lexicon: HALOT
  rationale: עָנִי puede referirse a pobreza, opresión o aflicción. Aquí 'afligido' sigue la lectura contextual del lamento personal y evita restringir indebidamente el término a pobreza económica.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: estoy
  alternatives_spanish:
  - soy
  - yo soy
  lexicon: HALOT
  rationale: 'El pronombre independiente aporta énfasis. En español, con adjetivos de estado, ''estoy'' suena natural y mantiene la afirmación enfática del hablante: ''yo, por mi parte, estoy solo y afligido''.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el pasaje goza de alto acuerdo entre revisores; este borrador sigue esa estabilidad, manteniendo la lectura optimally-equivalent del inglés auditado y ajustándola al español natural.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el tetragrámaton ni una sustitución por κύριος; se trata de una súplica directa a Dios en el texto hebreo.
  - Se prefirió 'gracia' sobre 'misericordia' para conservar el valor de favor concedido que el POB inglés documenta en חנן.
  - '''Solo'' y ''afligido'' preservan el campo semántico abierto de יָחִיד y עָנִי sin introducir interpretaciones más específicas de las que exige el contexto.'
