id: 1MA.5.15
reference: 1 Maccabees 5:15
source:
  edition: lxx-swete-1909
  text: λέγοντες Ἐπισυνήχθη ἐπʼ αὐτοὺς ἐκ Πτολεμαΐδος καὶ Τύρου καὶ Σιδῶνος καὶ πάσης Γαλιλαίας ἀλλοφύλων, τοῦ ἐξαναλῶσαι ἡμᾶς.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
translation:
  text: saying[a], “A gathering has been assembled against them from Ptolemais and Tyre and Sidon and all Galilee of the foreigners, to wipe us out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all Galilee of the Gentiles.” The Greek says “all Galilee of the foreigners,” using a term for people of another nation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπισυνήχθη
  chosen: A gathering has been assembled
  alternatives:
  - They have assembled
  - A force has gathered
  - An army has been gathered together
  lexicon: LSJ
  rationale: Aorist passive of ἐπισυνάγω. The passive form is preserved in English with 'has been assembled,' while 'a gathering' makes explicit the implied collective subject. This avoids over-specifying 'army' where the Greek only states an assembled group.
- source_word: ἐπʼ αὐτούς
  chosen: against them
  alternatives:
  - upon them
  - to attack them
  lexicon: LSJ
  rationale: In military context ἐπί with accusative commonly conveys hostile direction. 'Against them' is idiomatic and preserves the adversative force without adding details not explicit in the text.
- source_word: ἐκ Πτολεμαΐδος καὶ Τύρου καὶ Σιδῶνος καὶ πάσης Γαλιλαίας ἀλλοφύλων
  chosen: from Ptolemais and Tyre and Sidon and all Galilee of the foreigners
  alternatives:
  - from Ptolemais, Tyre, Sidon, and all foreign Galilee
  - from Ptolemais and Tyre and Sidon and all Galilee of the Gentiles
  lexicon: LSJ
  rationale: The place names are transliterated per project policy. ἀλλόφυλοι literally denotes people of another stock/foreigners; the genitive most naturally qualifies Galilee here. 'Galilee of the foreigners' stays close to the Greek and avoids importing later technical terminology unless footnoted.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - Gentiles
  - aliens
  - people of another race
  lexicon: LSJ
  rationale: The term means those of another people. 'Foreigners' is the most natural modern English rendering in this historical setting. 'Gentiles' is possible but can sound overly theological in English; the verse is describing ethnic-political opposition.
- source_word: τοῦ ἐξαναλῶσαι
  chosen: to wipe us out
  alternatives:
  - to destroy us
  - to consume us utterly
  - to exterminate us
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. ἐξαναλίσκω/related form here carries the sense of destroying completely. 'Wipe us out' is forceful, natural English that conveys total destruction without sounding technical.
- source_word: ἡμᾶς
  chosen: us
  alternatives:
  - our people
  lexicon: LSJ
  rationale: First person plural is explicit and should remain so. Although the preceding phrase says 'against them,' the reported speech shifts to 'us'; the translation preserves that shift rather than harmonizing it away.
