    text: O «sus costillas eran heridas». πλευρά puede referirse de modo más específico a la zona de las costillas.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos puntos principales para ajustarse mejor al griego y al rastro POB: «chorreaba sangre» expresa mejor el fluir visible de sangre que «se desangraba», y «eran traspasados» conserva la fuerza de κατετιτρώσκετο mejor que «eran heridos». También se suaviza la frase inicial a un español más natural con «alzando los ojos hacia el cielo».'
