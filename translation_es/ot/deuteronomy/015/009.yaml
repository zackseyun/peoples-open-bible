base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/015/009.yaml
  text: Be careful lest there be in your heart a wicked thought[a], saying, ‘The seventh year, the year of release, is near,’ and your eye be evil toward your poor brother and you give him nothing; then he may cry out against you to Yahweh[c][b], and it will be sin in you.
  footnotes:
  - marker: a
    text: Literally, 'your eye be evil'—a Hebrew idiom for being stingy or begrudging toward someone in need.
    reason: lexical_alternative
  - marker: b
    text: Or 'the year of remission' or 'the year of cancellation.'
    reason: lexical_alternative
  - marker: c
    text: '''Brother'' here refers to a fellow member of the covenant community, not necessarily a biological sibling.'
    reason: cultural_note
