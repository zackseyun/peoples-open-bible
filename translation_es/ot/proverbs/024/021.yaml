translation:
  language: es
  text: Teme a Yahvé[a], mi hijo, y al rey; no te asocies con los que son dados a los cambios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no te mezcles con rebeldes»; el hebreo dice literalmente «los que cambian», probablemente personas inclinadas a la agitación o a la deslealtad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרָא
  english_pob_choice: Fear
  chosen_spanish: Teme
  alternatives_spanish:
  - Reverencia
  - Ten temor de
  lexicon: HALOT
  rationale: El imperativo de ירא en literatura sapiencial expresa temor reverente y obediencia leal. «Teme» conserva la fuerza exhortativa y la ambigüedad reverente del original mejor que una paráfrasis más suave.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino para reflejar el Tetragrámaton y no sustituirlo por un título. «Yahvé» es la forma española de uso amplio y coherente con la política terminológica del proyecto.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi niño
  - hijo mío
  lexicon: HALOT
  rationale: El hebreo es una apelación paternal directa en singular. «Mi hijo» conserva la relación literaria y la naturalidad del español moderno.
- source_word: וָמֶלֶךְ
  english_pob_choice: and the king
  chosen_spanish: y al rey
  alternatives_spanish:
  - y el rey
  - y un rey
  lexicon: HALOT
  rationale: 'El sustantivo singular con artículo implícito se entiende naturalmente como referencia al rey en general o al soberano vigente. El artículo español es necesario por gramática: «al rey».'
- source_word: עִם
  english_pob_choice: with / associate with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto con
  lexicon: HALOT
  rationale: En combinación con el hitpael de ערב, la preposición expresa la idea de mezclarse o vincularse con ciertas personas. En español, «con» mantiene esa relación de asociación sin recargar la frase.
- source_word: שׁוֹנִים
  english_pob_choice: those who are given to change
  chosen_spanish: los dados al cambio
  alternatives_spanish:
  - los que buscan cambios
  - los inestables
  - los rebeldes
  lexicon: HALOT
  rationale: Se conserva la raíz de «cambio» sin resolver demasiado la interpretación. «Dados al cambio» refleja bien el matiz de personas inclinadas a la alteración o a la agitación, como en la nota inglesa.
- source_word: אַל תִּתְעָרָב
  english_pob_choice: do not associate
  chosen_spanish: no te asocies
  alternatives_spanish:
  - no te mezcles
  - no te involucres
  - no te juntes
  lexicon: HALOT
  rationale: El hitpael aquí implica mezclarse o vincularse con esas personas. «No te asocies» es la equivalencia idiomática más clara en español y preserva la advertencia relacional.
theological_decisions:
- issue: Relación entre temer a Yahvé y al rey
  english_pob_reading: Render both objects under the single imperative without implying equal theological status.
  chosen_spanish_reading: Se mantienen ambos objetos del imperativo («a Yahvé... y al rey») sin equiparar su autoridad.
  alternative_spanish_readings:
  - Honra a Yahvé y al rey
  - Ten respeto por Yahvé y por el rey
  rationale: La sintaxis hebrea une a Yahvé y al rey como objetos del mismo mandato. El español conserva esa estructura y deja intacta la tensión teológica entre la autoridad divina y la autoridad derivada del rey, sin suavizar «teme» ni convertirlo en mera cortesía.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisión estable: el texto sigue de cerca el hebreo y conserva la decisión auditada de no resolver de antemano el matiz de שׁוֹנִים como «rebeldes» en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva el registro sapiencial directo con imperativos breves.
  - «Los dados al cambio» evita una equivalencia demasiado interpretativa y deja abierta la nota alternativa.
  - «No te asocies» mantiene el valor relacional de ערב + עִם en un español natural.
  - El artículo en «al rey» responde a la gramática española sin alterar el sentido del sustantivo hebreo.
