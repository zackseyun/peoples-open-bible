review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: Yahvé separa/protege la tierra de Gosén, allí no habrá עָרֹב, y el propósito es que Faraón sepa que Yahvé está en medio de la tierra/el país. Sin embargo, dos detalles requieren ajuste: (1) el anclaje de la nota [a] está colocado sobre «Gosén», pero la nota explica «tierra/región», así que debe anclarse en «tierra»; (2) falta en español la alternativa documentada en el POB inglés para בְּקֶרֶב הָאָרֶץ («en medio de la tierra» / «en medio de la tierra/país» frente a «de la tierra/earth»), por lo que conviene añadir una nota en ese sintagma.'
  spanish_quality_summary: El español es claro, digno y natural. «Apartaré», «a fin de que sepas» y «Yahvé» encajan bien con el estilo del proyecto. «Donde está mi pueblo» es comprensible, pero «donde habita mi pueblo» refleja mejor la idea de residencia estable de עֹמֵד עָלֶיהָ y suena más bíblico-natural en español. Además, la colocación de la nota [a] debe corregirse para no crear confusión semántica.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; עָרֹב se mantiene amplio como «enjambre» sin especificar «moscas»; la finalidad de לְמַעַן תֵּדַע se conserva bien. El único ajuste de documentación/glosario es preservar también en español la alternativa para בְּקֶרֶב הָאָרֶץ mediante nota, tal como el rastro de auditoría inglés conserva la lectura más amplia.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Gosén», pero explica el término «tierra/región».
    rationale: El lector entenderá erróneamente que la nota trata sobre el nombre propio «Gosén» en vez de אֶרֶץ. El marcador debe ir en «tierra» o en la frase «tierra de Gosén».
  - severity: medium
    issue: Falta una nota para la alternativa de בְּקֶרֶב הָאָרֶץ.
    rationale: El POB inglés conserva explícitamente la posibilidad «in the midst of the earth». En español debe preservarse esa alternativa significativa, especialmente porque «en medio de la tierra» puede sonar cosmológico o territorial según el contexto.
  - severity: low
    issue: «Donde está mi pueblo» es menos preciso que «donde habita mi pueblo».
    rationale: El hebreo expresa residencia/domicilio, no mera presencia. «Habita» comunica mejor el valor idiomático de עַמִּי עֹמֵד עָלֶיהָ sin volverse arcaico.
  revised_spanish_text: Pero en aquel día apartaré la tierra[a] de Gosén, donde habita mi pueblo, para que no haya allí ningún enjambre[b], a fin de que sepas que yo soy Yahvé en medio de la tierra[c].
  revised_footnotes:
  - marker: a
    text: O «región de Gosén». El hebreo אֶרֶץ puede significar tierra, territorio o región.
    reason: lexical_alternative
  - marker: b
    text: O «un enjambre de insectos». El hebreo עָרֹב puede referirse de manera más amplia a una masa de insectos, no solo a moscas.
    reason: lexical_alternative
  - marker: c
    text: O «en medio de la tierra». El hebreo puede entenderse de manera más amplia, aunque en este contexto probablemente se refiere a la tierra de Egipto.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota léxica sobre אֶרֶץ, se mejora ligeramente la precisión de residencia con «habita», y se añade la alternativa documentada para בְּקֶרֶב הָאָרֶץ a fin de reflejar fielmente la auditoría inglesa y la amplitud del hebreo.
