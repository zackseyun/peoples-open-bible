    issue: Marcador de nota al pie anclado a «Yahvé» en vez de a la frase oscura «al que está despierto y al que responde».
    rationale: La nota explica específicamente el hebreo עֵר וְעֹנֶה, no el nombre divino. Según las instrucciones, el marcador exacto debe aparecer en el lugar relevante dentro de `spanish_text`.
  - severity: low
