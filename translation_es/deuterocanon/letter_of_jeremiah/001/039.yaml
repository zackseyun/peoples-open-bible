translation:
  language: es
  text: ¿Cómo, pues, se les debe considerar o llamar dioses[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Cómo, pues, deben ser considerados o llamados dioses?»'
