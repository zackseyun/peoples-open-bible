translation:
  language: es
  text: Y tomará de ella[a] un puñado de la flor de harina de la ofrenda vegetal y algo de su aceite, con todo el franquincienso que está sobre la ofrenda vegetal, y quemará su porción memorial[b] sobre el altar, como aroma agradable a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «levantará de ella con su puñado». El verbo y el sustantivo juntos subrayan que se toma la porción designada de la ofrenda.'
    reason: lexical_alternative
  - marker: b
    text: «Porción memorial» traduce un término técnico sacrificial para la parte representativa de la ofrenda vegetal que se quema sobre el altar.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵרִים
  english_pob_choice: he shall take up
  chosen_spanish: y levantará
  alternatives_spanish:
  - y alzará
  - y tomará
  lexicon: HALOT
  rationale: El verbo hifil de רום expresa sacar o tomar en alto la porción designada. «Levantará» conserva la idea de elevación sin sonar forzado en español legal-sacrificial.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ella
  - de la ofrenda
  lexicon: HALOT
  rationale: El pronombre remite a la ofrenda vegetal mencionada antes. «De él» mantiene la referencia pronominal en español sin sobreespecificar el antecedente.
- source_word: בְּקֻמְצוֹ
  english_pob_choice: a handful
  chosen_spanish: un puñado
  alternatives_spanish:
  - un puño
  - un puñado tomado con la mano
  lexicon: HALOT
  rationale: El sustantivo indica la cantidad que cabe en la mano. «Un puñado» comunica naturalmente la medida sacrificial, y permite mantener el matiz de porción tomada.
- source_word: מִסֹּלֶת
  english_pob_choice: of the fine flour
  chosen_spanish: de la flor de harina
  alternatives_spanish:
  - de la harina fina
  - de la mejor harina
  lexicon: HALOT
  rationale: סֹלֶת es harina fina o selecta para el rito. «Flor de harina» es una forma bíblica comprensible en español y conserva la cualidad técnica del material.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de cereal
  - la ofrenda de grano
  lexicon: HALOT
  rationale: En la tradición del POB se ha preferido una expresión transparente para מִנְחָה en Levítico. «Ofrenda vegetal» evita reducir el sentido a grano solamente y refleja la ofrenda compuesta por producto vegetal.
- source_word: וּמִשַּׁמְנָהּ
  english_pob_choice: and some of its oil
  chosen_spanish: y algo de su aceite
  alternatives_spanish:
  - y parte de su aceite
  - y de su aceite
  lexicon: HALOT
  rationale: El prefijo partitivo sugiere una porción del aceite, no necesariamente todo. «Algo de su aceite» comunica la parcialidad de manera natural en español.
- source_word: וְאֵת כָּל הַלְּבֹנָה אֲשֶׁר עַל הַמִּנְחָה
  english_pob_choice: with all the frankincense that is on the grain offering
  chosen_spanish: con todo el incienso que está sobre la ofrenda vegetal
  alternatives_spanish:
  - con toda la resina aromática que está sobre la ofrenda vegetal
  - con todo el incienso que va sobre la ofrenda vegetal
  lexicon: HALOT
  rationale: לְבֹנָה designa específicamente incienso/franquincienso, pero en español «incienso» es suficientemente claro y litúrgicamente reconocible. «Con todo» refleja que aquí se incluye la totalidad de esa sustancia, a diferencia de la porción de harina y aceite.
- source_word: וְהִקְטִיר
  english_pob_choice: he shall burn
  chosen_spanish: y quemará
  alternatives_spanish:
  - y hará arder
  - y ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto sacrificial el verbo indica hacer subir humo por combustión ritual. «Quemará» es claro y transmite el acto cultual sin introducir perífrasis innecesaria.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La preposición sobre conserva la localización cultual del acto de quemar la porción memorial.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como olor agradable
  - como aroma apacible
  lexicon: HALOT
  rationale: La fórmula fija expresa aceptación y agrado ante Dios, no una imagen meramente sensorial. «Aroma agradable» preserva el valor idiomático con español natural.
- source_word: אַזְכָּרָתָהּ
  english_pob_choice: its memorial portion
  chosen_spanish: su porción memorial
  alternatives_spanish:
  - su porción para memoria
  - su porción de memorial
  lexicon: HALOT
  rationale: Es un término técnico sacrificial para la parte representativa que se quema. «Porción memorial» mantiene la función cultual y evita diluirla en una frase genérica.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para el nombre de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para יהוה: «Yahvé» en el texto principal, manteniendo el nombre del pacto divino de forma auditable y sin enmascararlo.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama, y el proyecto pide rendirlo como «Yahvé» en español. Esto preserva el nombre propio del pacto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula sacrificial רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: como aroma agradable
  alternative_spanish_readings:
  - como aroma placentero
  - como aroma apacible
  rationale: La frase se entiende como lenguaje cultual de aceptación, no como una descripción cruda del olor. «Aroma agradable» conserva la función teológica y la legibilidad en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: מִנְחָה en contexto levítico
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  rationale: En la línea terminológica del proyecto, la ofrenda de מִנְחָה se expresa en español con una formulación que refleje su carácter vegetal y ritual sin reducirla sólo a grano. «Ofrenda vegetal» mantiene la diferenciación frente a otros tipos de sacrificio.
  doctrine_reference: POB lexical policy for Leviticus cultic terms
translation_notes:
  revision_awareness: Se revisó el contexto inglés auditado y no hubo cambios de revisión pendientes; la versión final mantiene la lectura aprobada y traslada al español las decisiones léxicas y teológicas documentadas, especialmente el nombre divino, la fórmula sacrificial y el término técnico de la porción memorial.
  spanish_consistency_notes:
  - Se mantuvo «ofrenda vegetal» conforme a la terminología del proyecto para מִנְחָה.
  - Se usó «Yahvé» para יהוה, en coherencia con la política general del POB en español.
  - Se conservó la diferencia entre la porción parcial de harina y aceite y la totalidad del incienso.
  - La puntuación y el orden sintáctico siguen un registro bíblico moderno, sin calcos excesivos del inglés.
