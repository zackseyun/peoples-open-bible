  rationale: Se revisa «justicia» a «rectitud» para reflejar mejor la elección principal auditada «righteousness» en un contexto sapiencial de cualidad moral amplia, manteniendo «justicia» como alternativa en nota. También se corrigen los anclajes de notas para que cada una aparezca en la frase pertinente del texto.
