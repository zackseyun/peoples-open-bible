translation:
  language: es
  text: El que ignora la disciplina desprecia a sí mismo; pero el que escucha la reprensión adquiere entendimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «adquiere corazón», donde «corazón» se refiere al asiento interior del pensamiento y del discernimiento; es decir, entendimiento o sensatez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹרֵעַ
  english_pob_choice: ignores
  chosen_spanish: desecha
  alternatives_spanish:
  - ignora
  - rechaza
  - desprecia
  lexicon: HALOT
  rationale: El participio expresa soltar o apartar la disciplina, no solo no prestarle atención. «Desecha» comunica bien esa acción de apartar la corrección y mantiene el contraste sapiencial.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר incluye formación con corrección. «Disciplina» conserva ese campo semántico de enseñanza correctiva y es natural en español actual.
- source_word: מוֹאֵס
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - rechaza
  - menosprecia
  - desdeña
  lexicon: HALOT
  rationale: El verbo expresa rechazo con fuerte carga valorativa. «Desprecia» reproduce bien esa fuerza moral y funciona con el reflexivo implícito del proverbio.
- source_word: נַפְשׁוֹ
  english_pob_choice: himself
  chosen_spanish: su propia vida
  alternatives_spanish:
  - a sí mismo
  - su alma
  - su propia persona
  lexicon: HALOT
  rationale: 'נֶפֶשׁ puede significar vida, persona o ser interior. Aquí el énfasis es reflexivo y vital: el que rechaza disciplina se daña a sí mismo. «Su propia vida» mantiene la intensidad del hebreo sin perder claridad en español; el matiz reflexivo queda explícito en la construcción.'
- source_word: שׁוֹמֵעַ
  english_pob_choice: listens to
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende a
  - obedece
  lexicon: HALOT
  rationale: El verbo pide receptividad real frente a la reprensión. «Escucha» comunica esa disposición y evita cargar el verbo con una obediencia plena que el texto no exige explícitamente.
- source_word: תּוֹכַחַת
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - reprueba
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: El término denota corrección verbal o reprensión. «Reprensión» es una equivalencia precisa y digna para este contexto sapiencial.
- source_word: קֹנֶה
  english_pob_choice: acquires
  chosen_spanish: adquiere
  alternatives_spanish:
  - gana
  - obtiene
  - consigue
  lexicon: HALOT
  rationale: קנה conserva la idea de adquirir o obtener algo valioso. «Adquiere» sigue de cerca la imagen del hebreo y preserva la observación del audit trail inglés sobre el sentido de obtener corazón.
- source_word: לֵּב
  english_pob_choice: understanding
  chosen_spanish: corazón
  alternatives_spanish:
  - entendimiento
  - sensatez
  - mente
  lexicon: HALOT
  rationale: Aquí לֵב es el centro interior de pensamiento y discernimiento. Siguiendo la nota inglesa, se mantiene «corazón» en el texto principal para conservar la imagen hebrea; el valor de entendimiento queda implícito y se explicita en nota.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en el miembro negativo
  english_pob_reading: himself
  chosen_spanish_reading: su propia vida
  alternative_spanish_readings:
  - a sí mismo
  - su alma
  rationale: El proverbio afirma que quien desecha la disciplina se perjudica de manera radical. En español, «su propia vida» expresa con claridad el daño a la propia persona y conserva la fuerza de נֶפֶשׁ sin imponer una antropología más técnica de «alma».
  doctrine_reference: Proverbios / antropología bíblica sapiencial
- issue: Metáfora de לֵב
  english_pob_reading: understanding
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - entendimiento
  - sensatez
  rationale: La POB inglesa aclaró en nota que «heart» es el asiento interior del pensamiento y discernimiento. En español se conserva la metáfora «corazón» en el texto para no perder la imagen hebrea, y se explicita su sentido cognitivo en una nota de pie.
  doctrine_reference: Sabiduría bíblica / antropología del corazón
translation_notes:
  revision_awareness: Se siguió de cerca la revisión inglesa que cambió «gains understanding» por «acquires understanding» para reflejar mejor el hebreo «adquiere corazón». En español se optó por mantener la imagen hebrea de «corazón» en el texto principal y explicarla en nota, preservando a la vez la naturalidad sintáctica con «adquiere».
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantuvo la equivalencia sapiencial de disciplina/reprensión sin sustituirla por vocabulario eclesiástico tradicional.
  - Se preservó la metáfora hebrea de «corazón» en vez de sustituirla directamente por «entendimiento» en el texto principal, conforme al audit trail.
