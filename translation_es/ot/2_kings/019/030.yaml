translation:
  language: es
  text: Y el remanente de la casa de Judá que quedó[a] volverá a echar raíz hacia abajo y dará fruto hacia arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el remanente sobreviviente de la casa de Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָסְפָה
  english_pob_choice: will again
  chosen_spanish: volverá
  alternatives_spanish:
  - seguirá
  - añadirá
  lexicon: HALOT
  rationale: El hebreo יסף expresa aquí una acción renovada o continuada. En español, «volverá» comunica de manera natural la idea de reanudación que el POB inglés captó con «will again», sin volverla mecánica.
- source_word: פְּלֵיטַת
  english_pob_choice: the surviving remnant
  chosen_spanish: el remanente sobreviviente
  alternatives_spanish:
  - los sobrevivientes
  - el remanente
  - el resto que ha escapado
  lexicon: HALOT
  rationale: פְּלֵיטָה conserva la idea de escape/supervivencia. «Remanente sobreviviente» mantiene el motivo del remanente y la noción concreta de supervivencia, sin diluir el peso lexical.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: of the house of Judah
  chosen_spanish: de la casa de Judá
  alternatives_spanish:
  - de Judá
  lexicon: HALOT
  rationale: Se conserva la expresión de pacto e historia nacional «casa de Judá», porque el hebreo no la reduce simplemente a «Judá».
- source_word: הַנִּשְׁאָרָה
  english_pob_choice: surviving
  chosen_spanish: sobreviviente
  alternatives_spanish:
  - que permanece
  - que queda
  lexicon: HALOT
  rationale: El participio añade la cualidad de lo que ha quedado tras la devastación. «Sobreviviente» evita una repetición pesada y mantiene la relación con el remanente.
- source_word: שֹׁרֶשׁ
  english_pob_choice: take root
  chosen_spanish: echar raíz
  alternatives_spanish:
  - arraigarse
  - echar raíces
  lexicon: HALOT
  rationale: El sustantivo «raíz» funciona en español con el verbo idiomático «echar raíz». Así se conserva la imagen vegetal del original con naturalidad.
- source_word: לְמָטָּה
  english_pob_choice: downward
  chosen_spanish: hacia abajo
  alternatives_spanish:
  - abajo
  - debajo
  lexicon: HALOT
  rationale: Mantiene el contraste direccional con «hacia arriba» en la segunda cola poética.
- source_word: וְעָשָׂה
  english_pob_choice: and bear
  chosen_spanish: y dará
  alternatives_spanish:
  - y producirá
  - y hará
  lexicon: HALOT
  rationale: Con פְּרִי, el hebreo pide una formulación de fruto/producto. «Dará fruto» es la colocación española más clara y fiel.
- source_word: פְרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - produce
  lexicon: HALOT
  rationale: Se conserva la metáfora agrícola y su resonancia bíblica de restauración y prosperidad.
- source_word: לְמָעְלָה
  english_pob_choice: upward
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - arriba
  - por encima
  lexicon: HALOT
  rationale: Reproduce el paralelismo espacial con «hacia abajo» y mantiene el contraste poético del versículo.
theological_decisions:
- issue: Lenguaje de remanente en un oráculo de restauración
  english_pob_reading: the surviving remnant
  chosen_spanish_reading: el remanente sobreviviente
  alternative_spanish_readings:
  - los sobrevivientes
  - el resto que permanece
  rationale: La imagen no se suaviza a una idea genérica de «supervivientes»; se preserva el término cargado teológicamente «remanente» junto con la supervivencia real tras el juicio. Eso mantiene la tensión bíblica entre juicio y preservación.
  doctrine_reference: Preservar la tensión textual; no resolverla más allá del oráculo
- issue: Imagen agrícola vertical de restauración
  english_pob_reading: take root downward and bear fruit upward
  chosen_spanish_reading: echar raíz hacia abajo y dar fruto hacia arriba
  alternative_spanish_readings:
  - arraigarse abajo y fructificar arriba
  - echar raíces abajo y producir fruto arriba
  rationale: La traducción mantiene la imagen corporal y vegetal del hebreo sin espiritualizarla ni convertirla en una paráfrasis abstracta. La verticalidad expresa la restauración total del pueblo.
  doctrine_reference: Equivalencia óptima; preservar metáfora original
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con el análisis auditado del POB en inglés. No se requirieron revisiones del pasaje base; se ajustó la formulación española para conservar el valor idiomático de יסף, el motivo del remanente y el paralelismo vertical.
  spanish_consistency_notes:
  - Se usó «Judá» con tilde cuando funciona como nombre propio en español.
  - Se evitó «SEÑOR» para YHWH porque este versículo no contiene el nombre divino en forma explícita en la superficie española; la referencia queda implícita en la cita hebrea de fondo.
  - 'Se conservó la metáfora agrícola con un español natural: «echar raíz» / «dar fruto».'
  - «Remanente» se mantuvo por su peso bíblico; «sobreviviente» añade la nota de supervivencia sin borrar el término técnico.
