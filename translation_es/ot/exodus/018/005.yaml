translation:
  language: es
  text: Entonces vino Jetro[a], el suegro de Moisés, a Moisés, al desierto, donde él estaba acampado, en el monte de Dios[b], con sus hijos y su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y sus hijos y su esposa». La conjunción hebrea puede reflejarse más literalmente, aunque en español suele expresarse la compañía con «con».
    reason: lexical_alternative
  - marker: b
    text: Es decir, «el monte de Dios», una designación asociada con Sinaí/Horeb.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces llegó
  alternatives_spanish:
  - Y llegó
  - Luego llegó
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo. «Entonces» conserva la secuencia sin sonar forzado en español, y «llegó» expresa el movimiento de entrada con naturalidad.
- source_word: יִתְרוֹ
  english_pob_choice: Jethro
  chosen_spanish: Jetro
  alternatives_spanish:
  - Yitro
  lexicon: Transliteración propia del nombre
  rationale: Se conserva el nombre propio en forma española usual y readable, sin sustituirlo por una paráfrasis.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses' father-in-law
  chosen_spanish: el suegro de Moisés
  alternatives_spanish:
  - el padre de la esposa de Moisés
  - el padre político de Moisés
  lexicon: HALOT
  rationale: El hebreo expresa una relación de afinidad, y «suegro» es el equivalente preciso y natural en español.
- source_word: וּבָנָיו
  english_pob_choice: with his sons
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - y sus hijos
  lexicon: HALOT
  rationale: El sufijo posesivo se mantiene literalmente en español. «Con» refleja mejor la compañía al llegar, sin perder la referencia familiar del hebreo.
- source_word: וְאִשְׁתּוֹ
  english_pob_choice: and his wife
  chosen_spanish: y su esposa
  alternatives_spanish:
  - con su esposa
  lexicon: HALOT
  rationale: Se conserva la coordinación del hebreo y el posesivo. «Esposa» es claro y neutro en español contemporáneo.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - hacia Moisés
  lexicon: HALOT
  rationale: La preposición de dirección se traduce de modo breve y directo; «a Moisés» mantiene el impulso del movimiento sin añadir una finalidad no explícita.
- source_word: אֶל הַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - al desierto
  lexicon: HALOT
  rationale: En este contexto narrativo, «desierto» es el equivalente español habitual de הַמִּדְבָּר y comunica el lugar de residencia temporal de forma natural.
- source_word: אֲשֶׁר הוּא חֹנֶה שָׁם
  english_pob_choice: where he was camped
  chosen_spanish: donde estaba acampado
  alternatives_spanish:
  - donde acampaba
  - donde estaba instalado
  lexicon: HALOT
  rationale: El participio indica una acción en curso o estado resultante. «Estaba acampado» preserva ese matiz sin sonar artificial; «acampado» funciona bien como estado.
- source_word: הַר הָאֱלֹהִים
  english_pob_choice: the mountain of God
  chosen_spanish: el monte de Dios
  alternatives_spanish:
  - la montaña de Dios
  lexicon: HALOT
  rationale: Se conserva la construcción posesiva del hebreo. «Monte» es más natural que «montaña» en español bíblico actual y mantiene la referencia geográfica reverencial.
theological_decisions:
- issue: Referente de los sufijos en «sus hijos» y «su esposa»
  english_pob_reading: The suffixes refer to Moses, not Jethro.
  chosen_spanish_reading: Los sufijos se entienden como referidos a Moisés, no a Jetro.
  alternative_spanish_readings:
  - Podrían referirse a Jetro.
  rationale: El contexto inmediato de Éxodo 18:2-4 presenta a la esposa e hijos de Moisés bajo el cuidado de Jetro. Al mantener «sus hijos y su esposa», el español conserva la ambigüedad gramatical del hebreo sin resolverla indebidamente en el texto.
  doctrine_reference: Contexto narrativo inmediato; coherencia intratextual
- issue: Identificación de «el monte de Dios»
  english_pob_reading: Retain the descriptive title rather than substituting 'Sinai' or 'Horeb.'
  chosen_spanish_reading: Se mantiene el título descriptivo «el monte de Dios» en lugar de sustituirlo por «Sinaí» o «Horeb».
  alternative_spanish_readings:
  - el monte Sinaí
  - el Horeb
  rationale: El hebreo usa aquí un título descriptivo, no un nombre propio. Traducirlo literalmente preserva la forma del texto fuente y evita introducir una identificación que no aparece en este versículo.
  doctrine_reference: Éxodo 3; Éxodo 19; tradición geográfica del Sinaí/Horeb
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés: coloca «con sus hijos y su esposa» al final para evitar que la frase modifique erróneamente a «el desierto», y conserva el orden del resto de los complementos de manera más cercana al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros pasajes cuando corresponda al tetragrámaton; aquí no aparece.
  - «Monte de Dios» se mantiene como título descriptivo coherente con la decisión inglesa de no sustituirlo por un nombre propio.
  - La puntuación y el orden de incisos buscan una lectura natural en español sin perder la estructura de llegada + localización + compañía.
