translation:
  language: es
  text: 'Para el director del coro: según «La Paloma Silenciosa de lugares lejanos».[a] De David. Un miktam[b], cuando los filisteos lo capturaron en Gat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «La Paloma del silencio lejano», o posiblemente otro título de melodía; el sentido exacto de la expresión es incierto.'
    reason: alternative_reading
  - marker: b
    text: Miktam es un término técnico en los encabezados de los salmos; su significado preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director musical
  - Para el maestro de coro
  lexicon: HALOT
  rationale: La fórmula de encabezado indica a quien dirige la ejecución musical. «Director del coro» transmite la función con naturalidad en español moderno y conserva el valor funcional del hebreo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - sobre
  lexicon: HALOT
  rationale: En los encabezados de salmos, la preposición introduce con frecuencia un título o melodía. «Según» mantiene la relación de dependencia sin forzar una explicación interpretativa.
- source_word: יוֹנַת אֵלֶם רְחֹקִים
  english_pob_choice: “The Silent Dove of Distant Places”
  chosen_spanish: “La Paloma Silenciosa de Lugares Lejanos”
  alternatives_spanish:
  - “La Paloma del Silencio de Lugares Lejanos”
  - “La Paloma Silente de Lugares Lejanos”
  - “La Paloma Silenciosa de los Lejanos”
  lexicon: HALOT
  rationale: El sintagma es oscuro y probablemente funciona como título de melodía. «אֵלֶם» apunta a silencio/mudez y «רְחֹקִים» a lugares lejanos; por eso se conserva como título entre comillas, evitando una paráfrasis excesiva.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La fórmula de superscripción es ambigua respecto de autoría, dedicación o asociación. «De David» conserva esa ambigüedad de manera natural en español.
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Un miktam
  alternatives_spanish:
  - Un miktam [término técnico]
  - Un miktam (término técnico)
  lexicon: HALOT
  rationale: Es un término técnico de significado incierto en los encabezados de salmos. La transliteración evita inventar un sentido no sustentado por el texto.
- source_word: בֶּאֱחֹז אֹתוֹ
  english_pob_choice: when the Philistines seized him
  chosen_spanish: cuando los filisteos lo capturaron
  alternatives_spanish:
  - cuando los filisteos lo apresaron
  - cuando los filisteos lo tomaron
  lexicon: HALOT
  rationale: El infinitivo con ב marca la ocasión. «Capturaron» expresa bien la acción hostil y es claro en español contemporáneo.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Designación étnica estándar; no requiere ajuste.
- source_word: בְּגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en Gat
  lexicon: HALOT
  rationale: El nombre propio se mantiene en forma hispana breve y reconocible. La preposición locativa se vierte de modo directo y natural.
theological_decisions:
- issue: Inclusión del encabezado como parte del texto canónico
  english_pob_reading: Translate the heading as part of the canonical verse, preserving its musical and historical notices without converting uncertain technical terms into interpretive claims.
  chosen_spanish_reading: Traducir el encabezado como parte del versículo canónico, preservando sus avisos musicales e históricos sin convertir los términos técnicos inciertos en afirmaciones interpretativas.
  alternative_spanish_readings:
  - Tratar el encabezado como metadatos editoriales no traducidos
  - Traducir מִכְתָּם con un sentido conjetural como “salmo de oro”
  rationale: El hebreo presenta este material como superscripción del salmo. La traducción mantiene su lugar canónico y evita sobreafirmar el significado de elementos oscuros.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Manejo del título oscuro del encabezado
  english_pob_reading: Treat the line as a quoted tune/title; the exact meaning of the phrase is uncertain.
  chosen_spanish_reading: Tratar la línea como un título/cántico citado; el sentido exacto de la frase es incierto.
  alternative_spanish_readings:
  - Parafrasear el sintagma como una descripción literal segura
  - Eliminar las comillas y convertirlo en explicación
  rationale: Dado que la frase es ambigua y probablemente musical, las comillas y la conservación del giro previenen una falsa precisión doctrinal o histórica.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de “The Dove on Distant Oaks” a “The Silent Dove of Distant Places” para ajustar mejor אֵלֶם (“silencio/mudez”) y רְחֹקִים (“lugares lejanos”). La redacción española sigue esa revisión y evita la lectura errónea de “robles/encinas”.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «Mesías» solo cuando el hebreo lo requiera; aquí no aplica.
  - Se conserva «miktam» transliterado por tratarse de un tecnicismo no resuelto.
  - Se evita traducir el título oscuro con un equivalente especulativo; se lo presenta como cita entre comillas.
  - «Filisteos» y «Gat» se normalizan con ortografía española estándar.
