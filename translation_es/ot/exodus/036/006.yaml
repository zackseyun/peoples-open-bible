translation:
  language: es
  text: 'Entonces Moisés mandó[a], y se proclamó por todo el campamento, diciendo: «Ni hombre ni mujer hagan ya más trabajo para la ofrenda del santuario[b]». Y al pueblo se le impidió seguir trayendo más.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se hizo un anuncio en el campamento». El hebreo dice literalmente: «hicieron pasar una voz».'
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda del santuario» también puede traducirse «contribución del santuario», «contribución sagrada» u «ofrenda para el santuario».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato
  lexicon: HALOT
  rationale: צוה en narración con waw consecutiva expresa una orden autoritativa. «Mandó» mantiene esa fuerza en español con naturalidad; «ordenó» también es posible, pero puede sonar más administrativo.
- source_word: וַיַּעֲבִירוּ קוֹל
  english_pob_choice: they proclaimed
  chosen_spanish: se proclamó
  alternatives_spanish:
  - se hizo un anuncio
  - se dio a conocer la voz
  - se anunció
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal de «hacer pasar una voz», es decir, difundir públicamente un aviso. «Se proclamó» conserva el carácter público y evita una traducción demasiado mecánica; en nota se preserva la alternativa idiomática.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: through the camp
  chosen_spanish: por todo el campamento
  alternatives_spanish:
  - en el campamento
  - a través del campamento
  lexicon: HALOT
  rationale: Con el verbo de proclamación, el sentido es de difusión entre la gente del campamento. «Por todo el campamento» comunica mejor esa circulación que un «en» meramente locativo.
- source_word: אִישׁ וְאִשָּׁה
  english_pob_choice: neither man nor woman
  chosen_spanish: Ningún hombre ni mujer
  alternatives_spanish:
  - ni hombre ni mujer
  - ningún varón ni mujer
  lexicon: HALOT
  rationale: El par hebreo incluye explícitamente ambos sexos. «Ningún hombre ni mujer» mantiene esa inclusión y suena natural en español bajo la construcción prohibitiva.
- source_word: אַל יַעֲשׂוּ עוֹד מְלָאכָה
  english_pob_choice: do any more work
  chosen_spanish: haga ya más trabajo
  alternatives_spanish:
  - hagan más trabajo
  - haga más labor
  - trabaje más
  lexicon: HALOT
  rationale: מְלָאכָה puede referirse a trabajo, labor o tarea artesanal. «Haga ya más trabajo» conserva la idea de cesar la actividad sin forzar un término técnico; el singular impersonal en español refleja la prohibición general.
- source_word: לִתְרוּמַת הַקֹּדֶשׁ
  english_pob_choice: for the contribution of the sanctuary
  chosen_spanish: para la ofrenda del santuario
  alternatives_spanish:
  - para la contribución del santuario
  - para la ofrenda santa
  - para la contribución sagrada
  lexicon: HALOT
  rationale: תְּרוּמָה es una contribución/ofrenda apartada para uso sagrado. Dado que הַקֹּדֶשׁ aquí se entiende en el contexto del tabernáculo/santuario, «ofrenda del santuario» expresa bien la relación sin introducir una equivalencia demasiado interpretativa.
- source_word: וַיִּכָּלֵא
  english_pob_choice: were restrained
  chosen_spanish: quedó restringido
  alternatives_spanish:
  - fue restringido
  - quedó impedido
  - se les impidió
  lexicon: HALOT
  rationale: El nifal de כלא denota quedar impedido o contenido. «Quedó restringido» conserva la idea de limitación impuesta; el singular colectivo «el pueblo» en español admite este tipo de concordancia.
- source_word: מֵהָבִיא
  english_pob_choice: from bringing more
  chosen_spanish: de traer más
  alternatives_spanish:
  - de seguir trayendo
  - de seguir llevando
  - de aportar más
  lexicon: HALOT
  rationale: La preposición מן con el infinitivo marca prevención de la acción. «De traer más» reproduce de manera directa y clara que ya no se permitió seguir aportando.
theological_decisions:
- issue: Naturaleza del mandato y del cese de las ofrendas
  english_pob_reading: The people were restrained from bringing more.
  chosen_spanish_reading: El pueblo quedó restringido de traer más.
  alternative_spanish_readings:
  - el pueblo fue impedido de traer más
  - al pueblo se le impidió traer más
  rationale: 'No hay una decisión doctrinal especial, pero conviene preservar la pasividad del hebreo: no es el pueblo quien decide espontáneamente dejar de traer, sino que queda contenido/impedido porque ya no era necesario más. «Quedó restringido» mantiene esa tensión.'
  doctrine_reference: Ex 36:6; cf. Ex 35:21-29
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que prefirió «proclaimed throughout the camp» frente a una formulación más explicativa. Por eso el español usa un verbo público y directo («se proclamó») y evita una perífrasis más larga. También se mantuvo el cierre pasivo («quedó restringido») para reflejar el nifal hebreo y no suavizar la restricción del pueblo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se eligió «ofrenda» para תְּרוּמָה siguiendo el contexto del santuario, pero se dejó documentada la alternativa «contribución» porque el inglés POB preserva esa tensión léxica.
  - «Campamento» traduce מַחֲנֶה en un registro neutral y bíblico, sin recurrir a «ejército» o «campamento militar», porque el contexto es el del pueblo en el desierto.
  - La estructura española mantiene el paralelismo de sujeto inclusivo («hombre ni mujer») y el resultado final en voz pasiva/estativa («quedó restringido») para reflejar el hebreo sin añadir causalidad no explícita.
