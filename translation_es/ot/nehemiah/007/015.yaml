  text: Los hijos de Binuí, seiscientos cuarenta y ocho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos de
  lexicon: HALOT
  rationale: En este contexto censal y genealógico, la fórmula hebrea funciona como designación de linaje. En español, «los hijos de» conserva la forma breve y familiar del registro genealógico sin añadir interpretación. «Descendientes de» sería posible, pero suaviza la fórmula y pierde algo del paralelismo tradicional del listado.
- source_word: בִנּוּי
  english_pob_choice: Binnui
  chosen_spanish: Binuí
  alternatives_spanish:
  - Binnui
  lexicon: Nombre propio transliterado según el hebreo bíblico
  rationale: Es un nombre propio; se mantiene transliterado. Se usa acentuación gráfica en español para favorecer la lectura natural sin alterar la identidad del nombre. La adaptación «Binuí» refleja mejor la secuencia vocálica percibida en español que una grafía sin tilde.
- source_word: שֵׁשׁ מֵאוֹת אַרְבָּעִים וּשְׁמֹנָה
  english_pob_choice: six hundred forty-eight
  chosen_spanish: seiscientos cuarenta y ocho
  alternatives_spanish:
  - '648'
  - seiscientos y cuarenta y ocho
  lexicon: HALOT
  rationale: 'El hebreo presenta una cifra cardinal directa: 6 cientos + 40 + 8. En español bíblico moderno, escribirla con palabras mantiene la fluidez literaria y el tono de lista censal. Se omite «y» entre centenas y decenas porque no es necesario en el uso más sobrio y estándar del español.'
translation_notes:
  revision_awareness: El contexto de revisión muestra acuerdo alto y sin cambios necesarios; por eso la redacción española sigue de cerca la estructura simple del hebreo y coincide con la decisión inglesa de mantener un estilo formal-equivalente para un registro genealógico/censal.
  spanish_consistency_notes:
  - 'Se mantiene el orden retórico breve del hebreo: grupo familiar + nombre propio + cifra.'
  - Se evita «descendientes» para no expandir el alcance semántico más allá de la fórmula genealógica directa.
  - La cifra se escribe con palabras para conservar el tono bíblico y la legibilidad en publicación.
