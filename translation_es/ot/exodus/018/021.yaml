translation:
  language: es
  text: Pero tú escogerás de entre todo el pueblo hombres capaces[a], temerosos de Dios, hombres de verdad[b], que aborrezcan la ganancia injusta[c]; y los pondrás sobre ellos como jefes de miles, jefes de cientos, jefes de cincuenta y jefes de diez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hombres aptos’ o ‘hombres de valor’. La expresión hebrea puede denotar fuerza, competencia o valor, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘hombres confiables’ para ‘hombres de verdad’.
    reason: lexical_alternative
  - marker: c
    text: O ‘que aborrezcan la ganancia deshonesta’; la frase se refiere al rechazo de la ganancia corrupta.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶחֱזֶה
  english_pob_choice: shall select
  chosen_spanish: escogerás
  alternatives_spanish:
  - seleccionarás
  - elegirás
  - verás/escogerás
  lexicon: HALOT
  rationale: El verbo hebreo con sentido básico de ‘ver’ funciona aquí en el contexto administrativo de identificar personas calificadas; en español, ‘escogerás’ comunica esa acción de selección de modo natural y fiel, sin perder el vínculo semántico con la idea de discernimiento.
- source_word: מִכָּל־הָעָם
  english_pob_choice: from all the people
  chosen_spanish: de entre todo el pueblo
  alternatives_spanish:
  - de entre toda la gente
  - de todo el pueblo
  - entre todo el pueblo
  lexicon: HALOT
  rationale: La frase partitiva se expresa con claridad en español con ‘de entre’, que conserva el sentido de extracción desde el conjunto y evita una literalidad áspera.
- source_word: אַנְשֵׁי חַיִל
  english_pob_choice: able men
  chosen_spanish: hombres capaces
  alternatives_spanish:
  - hombres aptos
  - hombres de valor
  - hombres valerosos
  lexicon: HALOT
  rationale: En este contexto judicial-administrativo, חַיִל apunta más a competencia y capacidad probada que a valor militar. ‘Hombres capaces’ preserva la fuerza del término sin imponer una lectura bélica.
- source_word: יִרְאֵי אֱלֹהִים
  english_pob_choice: those who fear God
  chosen_spanish: temerosos de Dios
  alternatives_spanish:
  - los que temen a Dios
  - personas temerosas de Dios
  lexicon: HALOT
  rationale: La expresión hebrea describe reverencia obediente; ‘temerosos de Dios’ es una equivalencia natural y reverente en español, manteniendo el matiz moral de la calificación.
- source_word: אַנְשֵׁי אֱמֶת
  english_pob_choice: men of truth
  chosen_spanish: hombres de verdad
  alternatives_spanish:
  - hombres fieles
  - hombres confiables
  - hombres honestos
  lexicon: HALOT
  rationale: Se conserva la forma más cercana al hebreo ‘hombres de verdad’ para mantener la textura del original. En español, ‘verdad’ aquí incluye veracidad, fiabilidad y lealtad, como en el auditable inglés POB.
- source_word: שֹׂנְאֵי בָצַע
  english_pob_choice: hating dishonest gain
  chosen_spanish: que aborrezcan la ganancia injusta
  alternatives_spanish:
  - que aborrezcan la ganancia deshonesta
  - que odien el lucro injusto
  - que aborrezcan las ganancias corruptas
  lexicon: HALOT
  rationale: בָּצַע puede referirse a ganancia obtenida con injusticia o codicia. ‘Ganancia injusta’ conserva el alcance ético del término y evita restringirlo solo a soborno o solo a avaricia.
- source_word: וְשַׂמְתָּ עֲלֵהֶם
  english_pob_choice: you shall appoint them over them
  chosen_spanish: los pondrás sobre ellos
  alternatives_spanish:
  - los nombrarás sobre ellos
  - los establecerás sobre ellos
  - los pondrás como autoridades sobre ellos
  lexicon: HALOT
  rationale: La construcción hebrea expresa colocar o asignar a alguien sobre otros; ‘poner’ reproduce con transparencia la acción básica, mientras el contexto deja claro que se trata de un nombramiento oficial.
- source_word: שָׂרֵי
  english_pob_choice: chiefs of
  chosen_spanish: jefes de
  alternatives_spanish:
  - jefes sobre
  - mandos de
  - capitanes de
  lexicon: HALOT
  rationale: שַׂר denota un oficial o líder. ‘Jefes de’ conserva el carácter administrativo general sin cargar el texto con una connotación militar más fuerte que la del hebreo.
- source_word: אֲלָפִים / מֵאוֹת / חֲמִשִּׁים / עֲשָׂרֹת
  english_pob_choice: thousands ... hundreds ... fifties ... tens
  chosen_spanish: millares ... centenas ... cincuentas ... decenas
  alternatives_spanish:
  - miles ... centenas ... cincuentas ... decenas
  - grupos de mil ... grupos de cien ... grupos de cincuenta ... grupos de diez
  lexicon: HALOT
  rationale: Se traduce la estructura jerárquica con numerales que reflejan la organización del pueblo. ‘Millares/centenas/cincuentas/decenas’ es natural y fiel al patrón del hebreo, manteniendo la progresión escalonada.
theological_decisions:
- issue: Mantenimiento del masculino plural en las cualificaciones
  english_pob_reading: able men ... men of truth
  chosen_spanish_reading: hombres capaces ... hombres de verdad
  alternative_spanish_readings:
  - personas capaces ... personas de verdad
  - gente capaz ... gente de verdad
  rationale: El hebreo usa plurales masculinos marcados (אַנְשֵׁי חַיִל, אַנְשֵׁי אֱמֶת). Se conserva esa marca en español para respetar el texto fuente y la decisión del POB inglés de mantener el masculino gramatical.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido moral de בָּצַע
  english_pob_reading: hating dishonest gain
  chosen_spanish_reading: que aborrezcan la ganancia injusta
  alternative_spanish_readings:
  - que aborrezcan la ganancia deshonesta
  - que odien el lucro injusto
  rationale: La frase no se limita a soborno en sentido estrecho, sino a cualquier ganancia contaminada por la injusticia o la codicia. ‘Ganancia injusta’ preserva esa amplitud ética sin suavizar la denuncia.
  doctrine_reference: HALOT; POB lexical note on corrupt profit
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que prefirió ‘able men’ frente a ‘capable men’, y se evitó una equivalencia más débil como ‘personas’ para conservar el masculino del hebreo y la textura formal del verso. También se mantuvo la lista jerárquica sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - ‘Hombres de verdad’ se mantuvo literal para preservar la huella del hebreo y la decisión auditada del inglés POB.
  - ‘Jefes de millares/centenas/cincuentas/decenas’ sigue el patrón administrativo del original y evita militarizar el sentido.
  - La puntuación refleja una sola oración larga, como en el hebreo y en el inglés POB, con semicolones para marcar las unidades sintácticas.
