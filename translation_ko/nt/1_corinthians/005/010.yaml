  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀οὐ πάντως τοῖς πόρνοις τοῦ κόσμου τούτου ἢ τοῖς πλεονέκταις ⸀καὶ ἅρπαξιν ἢ εἰδωλολάτραις, ἐπεὶ ⸀ὠφείλετε ἄρα ἐκ τοῦ κόσμου ἐξελθεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/005/010.yaml
  text: not at all meaning the sexually immoral of this world[a], or the greedy and swindlers, or idolaters[b], since then you would have to go out of the world.
  footnotes:
  - marker: a
    text: 'Or ''robbers'' or ''extortioners'' for ''swindlers'' (ἅρπαξιν); the term can denote those who seize from others by force or exploitation.'
    reason: lexical_alternative
  - marker: b
    text: 'Paul is clarifying that he did not mean believers must avoid all immoral people outside the church; compare the application in 1 Corinthians 5:11.'
    reason: cross_reference
translation:
  language: ko
  text: 이것은 이 세상의 음행하는 자들이나 탐욕스러운 자들과 강탈자들이나 우상숭배자들을 일절 가리킨 것이 아닙니다. 그렇다면 여러분이 세상 밖으로 나가야 할 것입니다.
  philosophy: optimal-equivalence
