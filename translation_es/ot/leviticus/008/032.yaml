translation:
  language: es
  text: Y lo que quede de la carne y del pan lo quemaréis en el fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con fuego». El hebreo בָּאֵשׁ puede expresarse en español como esfera o medio; aquí «en el fuego» suena más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  english_pob_choice: And what remains
  chosen_spanish: Y lo que quede
  alternatives_spanish:
  - Y lo restante
  - Y lo que permanezca
  lexicon: HALOT
  rationale: El participio con valor sustantivo expresa aquello que queda. «Lo que quede» conserva la fuerza resultativa y suena natural en español legal/bíblico.
- source_word: בַּבָּשָׂר
  english_pob_choice: of the meat
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la carne sacrificial
  - de la carne ofrecida
  lexicon: HALOT
  rationale: בָּשָׂר significa literalmente «carne». Aunque el contexto sacrificial puede sugerir alimento, en español «carne» mantiene mejor el valor léxico del hebreo y la tensión documentada frente a «meat» en inglés.
- source_word: וּבַלָּחֶם
  english_pob_choice: and of the bread
  chosen_spanish: y del pan
  alternatives_spanish:
  - y del pan ofrecido
  - y del alimento
  lexicon: HALOT
  rationale: לֶחֶם es «pan» en sentido ordinario. Se conserva el paralelo con «carne» y el sustantivo común español que corresponde al hebreo.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en el fuego
  - por medio del fuego
  lexicon: HALOT
  rationale: La preposición hebrea בָּ aquí marca el medio o esfera. En español, «con fuego» refleja bien la instrucción idiomática y sigue de cerca la revisión inglesa que prefirió «with fire».
- source_word: תִּשְׂרֹפוּ
  english_pob_choice: you shall burn
  chosen_spanish: lo quemaréis
  alternatives_spanish:
  - lo quemaréis totalmente
  - lo quemarán
  lexicon: HALOT
  rationale: 'El imperfecto de segunda persona plural en contexto legal se vierte como futuro de mandato: «quemaréis». Se mantiene la forma directiva y el objeto implícito del hebreo se expresa por claridad.'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «in the fire» a «with fire» para reflejar más directamente el hebreo בָּאֵשׁ. La propuesta española sigue esa decisión y, al mismo tiempo, conserva la literalidad de los términos sacrificios «carne» y «pan» frente a posibles suavizaciones como «alimento».
  spanish_consistency_notes:
  - Se mantiene Yahvé/Dios no aplicable en este versículo.
  - Se evita «señor» u այլ sustituciones; no hay términos divinos en el texto.
  - La sintaxis reproduce el tono legal de instrucción con futuro de mandato.
  - «Carne» preserva la tensión léxica del hebreo בָּשָׂר sin domesticarla a «carne sacrificial».
