translation:
  language: es
  text: Adiós, y sus hijos. Y sus propios asuntos[a]—sus propios asuntos—sus propios asuntos estarán según su juicio. Teniendo mi esperanza en el cielo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego aquí usado repite «sus propios asuntos» tres veces. Algunos lectores pueden entenderlo como repetición enfática; otros pueden sospechar duplicación accidental en la transmisión.
    reason: textual_variant
lexical_decisions:
- source_word: ἐρρῶσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Paz!
  alternatives_spanish:
  - ¡Adiós!
  - ¡Salud!
  - ¡Que estés bien!
  lexicon: LSJ
  rationale: La forma funciona como despedida epistolar o fórmula de buen deseo. En español, "¡Paz!" comunica un cierre breve y digno sin sonar forzado, y conserva el matiz de bienestar/ánimo más que una orden literal.
- source_word: τὰ τέκνα
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus niños
  - los hijos
  lexicon: LSJ
  rationale: Después de una dirección en segunda persona, el sentido es posesivo. "Hijos" es natural en español para τέκνα en este contexto familiar, y mantiene la referencia amplia a la descendencia sin restringirla artificialmente.
- source_word: τὰ ἴδια
  english_pob_choice: your own affairs
  chosen_spanish: tus asuntos propios
  alternatives_spanish:
  - tus propias cosas
  - tus asuntos
  - tus intereses propios
  lexicon: LSJ
  rationale: El neutro plural idiomático alude a las cosas o asuntos que pertenecen a la persona. "Asuntos propios" refleja bien el ámbito práctico y personal que la POB inglesa captó con "affairs", sin volverlo demasiado abstracto.
- source_word: κατὰ γνώμην ὑμῶν
  english_pob_choice: according to your judgment
  chosen_spanish: según vuestro juicio
  alternatives_spanish:
  - según vuestra opinión
  - como juzguéis conveniente
  - a vuestro parecer
  lexicon: LSJ
  rationale: γνώμη puede ser juicio, parecer o intención. "Juicio" conserva el registro formal y la idea de decisión considerada, manteniendo la cercanía con la elección inglesa sin perder fluidez en español.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - será
  - ocurrirán
  lexicon: LSJ
  rationale: El futuro de εἰμί se expresa de manera directa. En español conviene concordar con el plural implícito de los "asuntos"; por eso "estarán" suena natural y sigue de cerca la estructura del griego.
- source_word: εἰς οὐρανὸν τὴν ἐλπίδα ἔχων
  english_pob_choice: Having my hope in heaven
  chosen_spanish: Teniendo mi esperanza en el cielo
  alternatives_spanish:
  - con mi esperanza en el cielo
  - poniendo mi esperanza en el cielo
  - teniendo mi esperanza en los cielos
  lexicon: LSJ
  rationale: La participial griega es comprimida; el español puede reproducirla de forma igualmente concisa. "En el cielo" sigue la dirección espacial/metafórica del griego y evita explicitar más de lo que el texto dice.
theological_decisions:
- issue: Repetición triple de τὰ ἴδια
  english_pob_reading: Preserved as emphatic repetition in English
  chosen_spanish_reading: 'Preservada como repetición enfática: "tus asuntos propios—tus asuntos propios—tus asuntos propios"'
  alternative_spanish_readings:
  - Reducir a una sola mención
  - Suavizarlo como "tus asuntos estarán según vuestro juicio"
  rationale: El testimonio griego presentado repite la frase tres veces y el contexto de auditoría pide transparencia. Aunque la repetición puede deberse a dittografía, no debe ocultarse en el texto principal; se conserva y se señala para el lector.
  doctrine_reference: 'PHILOSOPHY.md: primacía del texto fuente y transparencia ante la incertidumbre textual'
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete 1909 y el rastro de auditoría inglés; no se aplicaron revisiones posteriores. Se mantuvo la repetición triple del testimonio base por transparencia textual.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita del nombre divino.
  - Se prefirió un registro bíblico moderno y digno, evitando calcos excesivos y manteniendo la compresión participial del griego.
  - La despedida griega se trasladó con una fórmula breve de cierre, no con un saludo litúrgico más desarrollado.
