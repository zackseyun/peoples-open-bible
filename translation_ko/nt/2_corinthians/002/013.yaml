  text: οὐκ ἔσχηκα ἄνεσιν τῷ πνεύματί μου τῷ μὴ εὑρεῖν με Τίτον τὸν ἀδελφόν μου, ἀλλὰ ἀποταξάμενος αὐτοῖς ἐξῆλθον εἰς Μακεδονίαν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/002/013.yaml
  text: I had no rest in my spirit because I did not find Titus my brother, but after taking leave of them, I went on to Macedonia.
