translation:
  language: es
  text: Pero después de que habían pasado muchos años, cuando agradó a Dios, Nehemías, enviado por el rey de Persia, envió a los descendientes de los sacerdotes que lo habían ocultado para recuperar el fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sobre/para el fuego». El griego es breve; la traducción explicita que Nehemías envió a los descendientes de los sacerdotes con miras a recuperar el fuego oculto en el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθόντων δὲ ἐτῶν ἱκανῶν
  english_pob_choice: after many years had passed
  chosen_spanish: después de que hubieron pasado muchos años
  alternatives_spanish:
  - cuando habían pasado muchos años
  - después de un considerable número de años
  lexicon: LSJ
  rationale: El genitivo absoluto expresa un marco temporal previo. «Muchos años» conserva el valor de ἱκανῶν sin volverlo técnico ni demasiado literal, y el pretérito pluscuamperfecto encaja con el avance narrativo del griego.
- source_word: ὅτε ἔδοξεν τῷ θεῷ
  english_pob_choice: when it pleased God
  chosen_spanish: cuando agradó a Dios
  alternatives_spanish:
  - cuando le pareció bien a Dios
  - cuando Dios lo quiso
  lexicon: LSJ
  rationale: ἔδοξεν con dativo expresa que algo «pareció bien/agradó» a Dios. «Agradó a Dios» preserva la forma breve y directa del griego; «le pareció bien a Dios» sería más explícita pero más pesada en español.
- source_word: ἀποσταλεὶς Νεεμίας ἀπὸ τοῦ βασιλέως τῆς Περσίδος
  english_pob_choice: Nehemiah, having been sent by the king of Persia
  chosen_spanish: Nehemías, enviado por el rey de Persia
  alternatives_spanish:
  - Nehemías, habiendo sido enviado por el rey de Persia
  - Nehemías, mandado por el rey de Persia
  lexicon: LSJ
  rationale: El participio pasivo aoristo se entiende como acción anterior respecto al verbo principal. En español, el participio «enviado» funciona con naturalidad y conserva la pasividad sin sobrecargar la frase.
- source_word: τοὺς ἐκγόνους τῶν ἱερέων
  english_pob_choice: the descendants of the priests
  chosen_spanish: los descendientes de los sacerdotes
  alternatives_spanish:
  - los hijos de los sacerdotes
  - la descendencia de los sacerdotes
  lexicon: LSJ
  rationale: ἐκγόνοι designa descendientes u ऑफspring; «descendientes» evita restringir indebidamente a varones y sigue de cerca la amplitud semántica del griego.
- source_word: τῶν ἀποκρυψάντων
  english_pob_choice: who had hidden it
  chosen_spanish: que lo habían ocultado
  alternatives_spanish:
  - que lo habían escondido
  - que lo habían ocultado anteriormente
  lexicon: LSJ
  rationale: El participio remite a los sacerdotes mencionados en el contexto que ocultaron el fuego. «Ocultado» mantiene el registro más solemne; «escondido» sería posible pero algo más coloquial.
- source_word: ἔπεμψεν ἐπὶ τὸ πῦρ
  english_pob_choice: sent for the descendants of the priests who had hidden it, to get the fire
  chosen_spanish: envió a los descendientes de los sacerdotes que lo habían ocultado, para obtener el fuego
  alternatives_spanish:
  - los envió para recuperar el fuego
  - envió a los descendientes de los sacerdotes en relación con el fuego
  lexicon: LSJ
  rationale: 'El griego es comprimido y la relación exacta de ἐπὶ con τὸ πῦρ no queda totalmente explícita en español si se traduce de modo demasiado literal. «Para obtener el fuego» hace visible la finalidad narrativa: recuperar el fuego oculto en el contexto inmediato.'
theological_decisions:
- issue: Agencia divina en ὅτε ἔδοξεν τῷ θεῷ
  english_pob_reading: when it pleased God
  chosen_spanish_reading: cuando agradó a Dios
  alternative_spanish_readings:
  - cuando le pareció bien a Dios
  - cuando Dios lo dispuso
  rationale: La frase no introduce una controversia doctrinal, pero sí una formulación de la voluntad divina. «Agradó a Dios» conserva el juicio favorable implícito en ἔδοξεν sin intensificarlo hacia una emoción que el griego no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 and 3
- issue: Objeto implícito en ἔπεμψεν ἐπὶ τὸ πῦρ
  english_pob_reading: to get the fire
  chosen_spanish_reading: para obtener el fuego
  alternative_spanish_readings:
  - para recuperar el fuego
  - para ir por el fuego
  rationale: El objeto implícito no se deja sin aclarar porque el contexto ya identifica el fuego como el referente. Añadir «obtener» evita ambigüedad en español y mantiene la fuerza narrativa del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que prefirió «when it pleased God» sobre «when it seemed good to God» por mayor naturalidad. En español se siguió esa misma dirección con «cuando agradó a Dios», manteniendo también la claridad narrativa de la acción de Nehemías y el referente implícito del fuego.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός siguiendo el estándar del proyecto.
  - Se mantuvo «Nehemías» como forma española establecida.
  - Se evitó «SEÑOR» porque el texto griego dice θεῷ, no κύριος.
  - Se prefirió «descendientes» para preservar la amplitud de ἐκγόνοι sin sesgo masculino.
  - Se conservó un registro bíblico moderno, sin arcaísmos innecesarios.
