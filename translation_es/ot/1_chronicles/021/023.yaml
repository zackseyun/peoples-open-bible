    issue: Anclaje incorrecto de las notas al texto
    rationale: La nota a sobre el modismo hebreo debe ir junto a «lo que es bueno a sus ojos», no junto a «ofrenda vegetal». La nota d define «ofrenda vegetal», por lo que no puede ir anclada a «Todo lo he dado». Esto rompe la trazabilidad requerida entre texto y notas.
  - severity: medium
