review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en los puntos principales: יְהוָה → «Yahvé», נְטֵה יָדְךָ → «Extiende tu mano», עַל הַשָּׁמַיִם → «hacia el cielo», y se conserva «tierra de Egipto». También mantiene la nota sobre el verbo raro וְיָמֵשׁ. Sin embargo, la cláusula final «y la oscuridad sea sentida» suena poco idiomática en español y no preserva tan bien la fuerza palpable del hebreo como una formulación natural como «y se pueda sentir la oscuridad».'
  spanish_quality_summary: El español es claro en casi todo el versículo, pero «sea sentida» resulta forzado y poco natural en registro bíblico moderno. Además, «sobre la tierra de Egipto» puede mantenerse, pero «sobre la tierra de Egipto» funciona bien; no requiere cambio. La nota a sobre el nombre divino es aceptable, aunque no es necesaria desde la auditoría inglesa; puede conservarse sin problema. La mejora principal es hacer idiomática la última cláusula sin perder la rareza ni la ambigüedad documentada.
  glossary_alignment: 'La terminología del proyecto está bien alineada: «Yahvé» para יְהוָה, «Moisés», «cielo», «oscuridad». No hay conflicto teológico. La decisión revisada para וְיָמֵשׁ חֹשֶׁךְ debe favorecer una expresión española natural que siga el inglés auditado y el sentido léxico de oscuridad palpable.'
  issues:
  - severity: medium
    issue: La frase «y la oscuridad sea sentida» es poco idiomática en español.
    rationale: Aunque intenta reflejar literalmente la pasiva potencial del inglés auditado, en español suena artificial y reduce la legibilidad. «Y se pueda sentir la oscuridad» conserva el sentido y la ambigüedad mejor.
  - severity: low
    issue: La nota léxica b debe ajustarse al nuevo anclaje textual.
    rationale: Si se revisa la cláusula final, la nota debe seguir anclada exactamente al segmento correspondiente y mantener las alternativas sin duplicidad ni desajuste.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés[a]: «Extiende tu mano hacia el cielo, para que haya oscuridad sobre la tierra de Egipto, y se pueda sentir la oscuridad[b]».'
