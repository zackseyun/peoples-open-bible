translation:
  language: es
  text: Y Jonatán asumió el liderazgo en aquel tiempo, y se levantó en lugar de Judas, su hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεδέξατο
  english_pob_choice: took up
  chosen_spanish: asumió
  alternatives_spanish:
  - tomó
  - recibió
  - aceptó
  lexicon: LSJ
  rationale: El griego medio aquí expresa asumir o tomar sobre sí una función. «Asumió» comunica con naturalidad la idea de tomar a cargo una responsabilidad, conservando el sentido de aceptación del puesto sin volverlo mecánico.
- source_word: ἡγεσίαν
  english_pob_choice: the leadership
  chosen_spanish: el liderazgo
  alternatives_spanish:
  - el mando
  - el gobierno
  - la jefatura
  lexicon: LSJ
  rationale: ἡγεσία nombra la función de liderar o dirigir. «El liderazgo» es claro en español y evita sobrecargar el sentido con una idea de realeza o dominio que el contexto no exige.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: LSJ
  rationale: La expresión temporal se vierte de modo idiomático. «En aquel tiempo» mantiene el tono narrativo y corresponde bien al demostrativo griego.
- source_word: ἀνέστη
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - apareció
  - sur-gió
  lexicon: LSJ
  rationale: En contexto de sucesión, ἀνίστημι puede indicar surgir para ocupar un lugar. «Se levantó» conserva la imagen verbal y es comprensible en español, sin perder el matiz de entrar en funciones.
- source_word: ἀντί
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - como reemplazo de
  lexicon: LSJ
  rationale: ἀντί marca sustitución o sucesión. «En lugar de» expresa esa relación de reemplazo de manera directa y sin añadir contraste o intención adversativa.
- source_word: Ἰούδου
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: transliteración griega estándar
  rationale: La forma griega Ἰούδας corresponde aquí al nombre propio tradicional «Judas», que es el uso estable en el contexto narrativo de 1 Macabeos.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa de referencia coinciden plenamente en el sentido: Jonatán asume el liderazgo tras Judas. No se documentan variantes textuales ni decisiones revisadas que requieran nota adicional.'
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y bíblico, con vocabulario claro y contemporáneo.
  - Se evita «Cristo» o terminología no presente en el pasaje.
  - «Judas, su hermano» refleja fielmente la relación de parentesco indicada por τοῦ ἀδελφοῦ αὐτοῦ.
