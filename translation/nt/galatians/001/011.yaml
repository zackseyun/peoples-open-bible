- issue: Whether κατὰ ἄνθρωπον should be rendered as source ('of human origin') or norm ('according to human standards')
  chosen_reading: of human origin
  alternative_readings:
  - according to human standards
  rationale: In the immediate context Paul goes on to deny receiving or being taught the gospel from a human source (Gal 1:12), so the source-oriented rendering best fits the argument.
  doctrine_reference: Preserve theological tension rather than resolve it; choose the reading best supported by context and preserve significant alternatives in notes when helpful.
