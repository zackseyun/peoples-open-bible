translation:
  language: es
  text: Porque defenderé[a] esta ciudad para salvarla[b], por causa de mí mismo y por causa de David, mi siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «protegeré» o «escudaré».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «librarla» o «rescatarla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַנּוֹתִי
  english_pob_choice: I will defend
  chosen_spanish: defenderé
  alternatives_spanish:
  - protegeré
  - escudaré
  lexicon: HALOT
  rationale: El verbo גנן expresa la idea de cubrir/proteger; en este contexto militar, «defenderé» comunica de manera natural y fiel la acción protectora de Yahvé sobre Jerusalén. Mantiene el valor de resguardo sin sonar artificial en español.
- source_word: עַל הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - sobre esta ciudad
  - esta misma ciudad
  lexicon: HALOT
  rationale: Con גנן, la relación preposicional se entiende como protección dirigida a la ciudad. En español, «defenderé esta ciudad» expresa el sentido sin añadir una preposición innecesaria.
- source_word: לְהוֹשִׁיעָהּ
  english_pob_choice: to save it
  chosen_spanish: para salvarla
  alternatives_spanish:
  - para librarla
  - para rescatarla
  lexicon: HALOT
  rationale: El verbo ישׁע tiene el campo semántico de salvar/librar/rescatar. «Salvarla» conserva la conexión léxica y teológica; el pronombre femenino «-la» corresponde a «ciudad».
- source_word: לְמַעֲנִי
  english_pob_choice: for my own sake
  chosen_spanish: por amor de mí mismo
  alternatives_spanish:
  - por mi propia causa
  - por mi propio bien
  lexicon: HALOT
  rationale: La expresión marca motivo centrado en el propio honor y propósito de Dios. «Por amor de mí mismo» refleja bien el matiz reflexivo del hebreo sin perder dignidad bíblica en español.
- source_word: וּלְמַעַן דָּוִד עַבְדִּי
  english_pob_choice: and for the sake of David my servant
  chosen_spanish: y por amor de David, mi siervo
  alternatives_spanish:
  - y por causa de David, mi siervo
  - y por David, mi siervo
  lexicon: HALOT
  rationale: Se preserva el paralelismo motivacional con la frase anterior. «Mi siervo» reproduce el valor relacional/covenantal de עבד en referencia a David; «siervo» es más fiel al registro bíblico que «esclavo» aquí.
theological_decisions:
- issue: Motivación doble de la liberación de Jerusalén
  english_pob_reading: for my own sake and for the sake of David my servant
  chosen_spanish_reading: por amor de mí mismo y por amor de David, mi siervo
  alternative_spanish_readings:
  - por mi propio bien y por el bien de David, mi siervo
  - por mi causa y por la causa de David, mi siervo
  rationale: 'La traducción conserva ambas razones explícitas sin resolverlas en una sola explicación doctrinal. Se mantiene la tensión teológica: la preservación de la ciudad responde al honor/propósito de Yahvé y a su compromiso con David.'
  doctrine_reference: Preservar la tensión teológica explícita del texto; no expandir más allá de la motivación declarada.
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés no introdujo cambios sustantivos; la concordancia general es alta. La redacción española sigue de cerca la decisión auditada de «defend»/«save», pero ajusta la motivación con una fórmula idiomática y reverente en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino en coherencia con el proyecto, aunque este versículo en hebreo usa verbo en primera persona sin el Tetragrámaton explícito.
  - «Mi siervo» mantiene la elección POB de «servant» frente a «esclavo», dada la referencia davídica y pactal.
  - El orden de las dos cláusulas motivacionales se preserva para reflejar el paralelismo hebreo.
