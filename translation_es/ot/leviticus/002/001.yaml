translation:
  language: es
  text: Cuando una persona presente una ofrenda de cereal[a] a Yahvé, su ofrenda será de flor de harina[b], y derramará sobre ella aceite y pondrá sobre ella franquincienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de grano». Hebreo מִנְחָה designa aquí una ofrenda de cereal hecha con flor de harina.
    reason: lexical_alternative
  - marker: b
    text: O «harina fina». סֹלֶת se refiere a harina finamente molida usada en las ofrendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - cualquiera
  - un alma
  lexicon: HALOT
  rationale: En lenguaje legal y cultual, נֶפֶשׁ puede referirse a un individuo. «Una persona» conserva el singular representativo sin imponer el sentido metafísico de «alma».
- source_word: תַקְרִיב
  english_pob_choice: presents
  chosen_spanish: presente
  alternatives_spanish:
  - traiga
  - ofrezca
  lexicon: HALOT
  rationale: El hifil de קרב expresa traer o presentar una ofrenda ante Dios. «Presente» mantiene ese valor cultual de acercar la ofrenda.
- source_word: קָרְבַּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - oblación
  - don
  lexicon: HALOT
  rationale: Es un término sacrificial general para aquello que se presenta. «Ofrenda» es el equivalente español más claro y natural en este contexto.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - oblación de cereal
  lexicon: HALOT
  rationale: En el contexto levítico, מִנְחָה designa la ofrenda de cereal/grano, no un regalo genérico. «Ofrenda de cereal» comunica la categoría sacrificial con claridad en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino con la forma española establecida por el proyecto, no la convención de enmascarar el Tetragrámaton como «SEÑOR».
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת se refiere a harina finamente molida. «Flor de harina» es una expresión española tradicional y precisa, suficientemente transparente en estilo bíblico.
- source_word: יִהְיֶה קָרְבָּנוֹ
  english_pob_choice: his offering shall be
  chosen_spanish: su ofrenda será
  alternatives_spanish:
  - la ofrenda que presente será
  - su oblación será
  lexicon: HALOT
  rationale: La cláusula especifica de qué consistirá la ofrenda. En español, «será» reproduce de manera natural el valor normativo del hebreo, manteniendo el sufijo posesivo representativo.
- source_word: וְיָצַק עָלֶיהָ שֶׁמֶן
  english_pob_choice: and he shall pour oil on it
  chosen_spanish: y derramará sobre ella aceite
  alternatives_spanish:
  - y echará aceite sobre ella
  - y verterá aceite sobre ella
  lexicon: HALOT
  rationale: El verbo expresa verter o derramar. «Derramará» conserva el matiz material del gesto ritual y suena natural en español culto.
- source_word: וְנָתַן עָלֶיהָ לְבֹנָה
  english_pob_choice: and put frankincense on it
  chosen_spanish: y pondrá sobre ella incienso
  alternatives_spanish:
  - y colocará sobre ella incienso
  - y pondrá sobre ella olíbano
  lexicon: HALOT
  rationale: לְבֹנָה es el incienso aromático empleado en el culto. «Pondrá» refleja simplemente la acción de añadirlo sobre la ofrenda.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el estándar del proyecto, se conserva el nombre divino en español como «Yahvé» para no ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Singular representativo en la instrucción legal
  english_pob_reading: a person ... his offering ... he shall pour ... he shall put
  chosen_spanish_reading: una persona ... su ofrenda ... derramará ... pondrá
  alternative_spanish_readings:
  - quienquiera que ... su ofrenda ... derramará ... pondrá
  - alguien ... su ofrenda ... derramará ... pondrá
  rationale: El hebreo emplea formas singulares para una instrucción normativa representativa. En español se mantiene el singular sin forzar una marcación de género innecesaria en el sustantivo «persona» y conservando el valor legal del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo consonante/vocalizado del WLC y el auditorio inglés POB sin cambios de sentido; se conserva la equivalencia cultual específica de מִנְחָה y el nombre divino יהוה como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con el estándar proyectual para יהוה.
  - «Ofrenda de cereal» se usó para מִנְחָה según su sentido sacrificial específico, evitando la generalización a «don» o la sustitución por una formulación tradicional menos precisa.
  - El singular representativo se conservó en español con «una persona ... su ofrenda ... derramará ... pondrá», acorde al hebreo legal.
  - «Flor de harina» se eligió como equivalente idiomático claro para סֹלֶת, con nota alternativa para «harina fina».
