translation:
  language: es
  text: Si mi tierra clama contra mí, y sus surcos lloran[a] juntos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “claman”; el hebreo usa el verbo común de llorar o lamentarse, aplicado aquí poéticamente a los surcos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si en verdad
  - Si acaso
  lexicon: HALOT
  rationale: Introduce la cláusula condicional de manera natural en español; 'Si' conserva la estructura breve y solemne del hebreo sin añadir matiz no atestiguado.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  - por mí
  lexicon: HALOT
  rationale: Con זעק, la preposición tiene fuerza adversativa/forense; 'contra mí' reproduce mejor la idea de protesta o testimonio en mi contra que una lectura meramente espacial.
- source_word: אַדְמָתִי
  english_pob_choice: my land
  chosen_spanish: mi tierra
  alternatives_spanish:
  - mi suelo
  - mi campo
  - mi suelo de labor
  lexicon: HALOT
  rationale: אדמה puede designar tierra cultivable o suelo; 'mi tierra' es natural en español, mantiene la referencia agraria y evita tecnicismo excesivo.
- source_word: תִזְעָק
  english_pob_choice: cries out
  chosen_spanish: clama
  alternatives_spanish:
  - grita
  - clama en voz alta
  - da voces
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso, a menudo de aflicción o acusación. 'Clama' conserva el tono elevado y judicial-poético mejor que una opción demasiado cotidiana.
- source_word: וְיַחַד
  english_pob_choice: and together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  - al mismo tiempo
  lexicon: HALOT
  rationale: La idea de יחד es simultaneidad o acción conjunta. En español, colocar 'juntos' con los surcos suena natural y refleja la coordinación poética del verso.
- source_word: תְּלָמֶיהָ
  english_pob_choice: its furrows
  chosen_spanish: sus surcos
  alternatives_spanish:
  - sus hileras aradas
  - sus huellas de arado
  lexicon: HALOT
  rationale: תלם significa surco hecho por el arado. 'Surcos' es la equivalencia directa y clara en español para la imaginería agrícola.
- source_word: יִבְכָּיוּן
  english_pob_choice: weep
  chosen_spanish: lloran
  alternatives_spanish:
  - lloran de dolor
  - gimen
  - se lamentan
  lexicon: HALOT
  rationale: בכה es el verbo común de llorar/llanto. 'Lloran' preserva el paralelismo personificado con 'clama' sin exagerar el nivel retórico. La colocación con 'juntos' refleja el orden hebreo en la revisión inglesa.
translation_notes:
  revision_awareness: La revisión inglesa ajustó el orden final a 'its furrows weep together', reflejando más de cerca la secuencia hebrea. En español, se siguió esa misma preferencia colocando 'juntos' con 'lloran' para conservar la coordinación poética natural.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otro sustituto porque no aparece el nombre divino en este versículo.
  - Se mantuvo el contraste personificado entre la tierra que clama y los surcos que lloran, sin suavizarlo.
  - '''Mi tierra'' y ''sus surcos'' conservan el registro agrícola del hebreo y del audit trail inglés.'
