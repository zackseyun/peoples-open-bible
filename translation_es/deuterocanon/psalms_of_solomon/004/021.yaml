revisions:
- from: Que la carne de los complacientes con los hombres[a] sea dispersada por las fieras, y los huesos de los impíos queden delante del sol en deshonra.
  to: Que la carne de los que agradan a los hombres[a] sea dispersada por las fieras, y los huesos de los transgresores queden delante del sol en deshonor.
  rationale: Se ajusta παρανόμων a 'los transgresores' para preservar el matiz de actuar contra la ley. Se mejora la naturalidad de ἀνθρωπαρέσκων con 'los que agradan a los hombres', manteniendo una nota con la alternativa más compacta del borrador. Se normaliza 'deshonor' para alinearlo mejor con ἀτιμία y con la auditoría inglesa. El resto del verso es fiel y puede conservarse.
