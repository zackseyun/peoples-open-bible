translation:
  language: es
  text: Ahora había un hombre de Benjamín, y su nombre era Quis, hijo de Abiel, hijo de Zeror, hijo de Becorat, hijo de Afías, hijo de un benjaminita, un hombre de gran valor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un guerrero valiente», «un hombre prominente» o «un hombre rico e influyente»; la expresión hebrea puede sugerir matices militares, sociales o económicos según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Había
  lexicon: HALOT
  rationale: La forma narrativa introduce una nueva escena o unidad; «Ahora había» conserva ese valor de apertura y es natural en español sin volverse explicativa de más.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - alguien
  lexicon: HALOT
  rationale: Aquí designa a una persona masculina concreta. «Un hombre» es directo, formal y fiel al referente individual.
- source_word: מִבֶּן־יָמִין
  english_pob_choice: of Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - de la tribu de Benjamín
  - benjaminita
  lexicon: HALOT
  rationale: La frase identifica procedencia tribal. «De Benjamín» sigue de cerca el valor posesivo/originario del hebreo y mantiene una formulación breve.
- source_word: וּשְׁמוֹ
  english_pob_choice: and his name was
  chosen_spanish: y su nombre era
  alternatives_spanish:
  - y se llamaba
  - cuyo nombre era
  lexicon: HALOT
  rationale: Conserva la fórmula hebrea de introducción nominal con coordinación explícita, sin forzar una paráfrasis más libre.
- source_word: קִישׁ
  english_pob_choice: Kish
  chosen_spanish: Quis
  alternatives_spanish:
  - Kish
  lexicon: N/A
  rationale: Se adopta la forma española tradicional del nombre propio bíblico, más reconocible para lectores en español.
- source_word: בֶּן ... בֶּן ...
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La cadena genealógica se mantiene con la equivalencia convencional «hijo de», que reproduce con claridad la estructura del texto hebreo.
- source_word: אֲבִיאֵל / צְרוֹר / בְּכוֹרַת / אֲפִיחַ
  english_pob_choice: Abiel / Zeror / Becorath / Aphiah
  chosen_spanish: Abiel / Zeror / Becorat / Afías
  alternatives_spanish:
  - Abiel / Zeror / Becorath / Aphiah
  lexicon: N/A
  rationale: Los nombres propios se transliteran según uso bíblico en español, con ajustes ortográficos mínimos para lectura hispana sin alterar la identidad onomástica.
- source_word: בֶּן־אִישׁ יְמִינִי
  english_pob_choice: son of a Benjaminite
  chosen_spanish: hijo de un benjaminita
  alternatives_spanish:
  - hijo de un benjamita
  - hijo de un hombre de Benjamín
  lexicon: HALOT
  rationale: «Benjaminita» refleja de manera transparente el adjetivo gentilicio יְמִינִי y conserva el matiz de pertenencia tribal que cierra la genealogía.
- source_word: גִּבּוֹר חָיִל
  english_pob_choice: a mighty man of valor
  chosen_spanish: un hombre poderoso y valiente
  alternatives_spanish:
  - un guerrero valiente
  - un hombre de valor
  - un hombre poderoso, valiente
  lexicon: HALOT
  rationale: La expresión hebrea puede abarcar fuerza militar, prestigio social o capacidad/recursos. En español, «poderoso y valiente» preserva esa amplitud mejor que una reducción exclusivamente bélica o económica.
theological_decisions:
- issue: Alcance semántico de גִּבּוֹר חָיִל
  english_pob_reading: a mighty man of valor; the Hebrew expression can carry military, social, or economic overtones depending on context.
  chosen_spanish_reading: un hombre poderoso y valiente
  alternative_spanish_readings:
  - un guerrero valiente
  - un hombre de prestigio
  - un hombre rico e influyente
  rationale: No se debe estrechar indebidamente la frase a solo ‘guerrero’. En este contexto genealógico, la amplitud semántica es importante y conviene reflejarla con una formulación que permita varios matices sin imponer uno solo.
  doctrine_reference: Lexical/theological nuance in narrative characterization
- issue: Cierre genealógico con identidad tribal
  english_pob_reading: son of a Benjaminite
  chosen_spanish_reading: hijo de un benjaminita
  alternative_spanish_readings:
  - hijo de un benjamita
  - descendiente de un benjaminita
  rationale: La identificación final no es una repetición innecesaria, sino una forma hebrea de enfatizar la pertenencia tribal del linaje. La traducción conserva ese valor de remate genealógico.
  doctrine_reference: Biblical genealogy and tribal identity
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del texto inglés: se adoptó la equivalencia más cercana para מִבֶּן־יָמִין como pertenencia («de Benjamín») y se mantuvo la amplitud semántica de גִּבּוֹר חָיִל en una fórmula española igualmente amplia. No se detectaron tensiones textuales mayores en el versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton cuando aparezca en otros pasajes; aquí no hay ocurrencia.
  - Se mantuvo la cadena genealógica con «hijo de» por consistencia estructural.
  - Los nombres propios se adaptan a forma española reconocible sin perder transparencia con el hebreo.
  - La nota al pie [a] se ancla en «Benjamín» porque el POB inglés sitúa allí la alternativa semántica de la expresión final.
