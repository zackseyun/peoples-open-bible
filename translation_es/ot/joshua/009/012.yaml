base_translation:
  language: en
  yaml_path: translation/ot/joshua/009/012.yaml
  text: This bread of ours was warm when we took it as our provisions from our houses on the day we set out to come to you[a], but now, look, it is dry and has become moldy.
  footnotes:
  - marker: a
    text: Or 'has become moldy' or 'is spotted.' The Hebrew term refers to something marked with points or spots; in the context of old bread, the exact nuance may be crumbly, cracked, or mold-specked.
