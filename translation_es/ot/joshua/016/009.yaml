translation:
  language: es
  text: Y las ciudades apartadas para los hijos de Efraín, dentro de la heredad de los hijos de Manasés—todas las ciudades y sus aldeas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las ciudades separadas para los hijos de Efraín». El participio hebreo subraya que estas ciudades fueron distinguidas del territorio de Manasés para el uso de Efraín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los poblados
  - las poblaciones
  lexicon: HALOT
  rationale: עִיר designa aquí ciudades en una lista territorial. «Las ciudades» mantiene la forma del inventario geográfico y la correspondencia con el inglés auditado.
- source_word: הַמִּבְדָּלוֹת
  english_pob_choice: set apart
  chosen_spanish: apartadas
  alternatives_spanish:
  - separadas
  - distintas
  - designadas aparte
  lexicon: HALOT
  rationale: El participio de בדל expresa separación o distinción. En este contexto de repartición territorial, «apartadas» comunica que quedaron distinguidas para uso de Efraín sin añadir más de lo que el hebreo dice.
- source_word: לִבְנֵי אֶפְרַיִם
  english_pob_choice: for the sons of Ephraim
  chosen_spanish: para los hijos de Efraín
  alternatives_spanish:
  - para los descendientes de Efraín
  - para la gente de Efraín
  lexicon: HALOT
  rationale: Se conserva la formulación filial literal de בני por fidelidad al texto y a la terminología tribal del pasaje.
- source_word: בְּתוֹךְ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en medio de
  - en el interior de
  lexicon: HALOT
  rationale: «Dentro de» expresa de manera natural la ubicación en territorio ajeno sin perder la relación espacial del hebreo.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la heredad
  alternatives_spanish:
  - la herencia
  - la posesión heredada
  lexicon: HALOT
  rationale: En español bíblico, «heredad» comunica mejor que «herencia» la porción territorial asignada por sorteo. Mantiene el sentido de allotment covenantal del hebreo.
- source_word: בְּנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Manasseh
  chosen_spanish: los hijos de Manasés
  alternatives_spanish:
  - los descendientes de Manasés
  - la gente de Manasés
  lexicon: HALOT
  rationale: Se conserva la misma fórmula tribal literal que en la primera mitad del versículo.
- source_word: כָּל הֶעָרִים
  english_pob_choice: all the cities
  chosen_spanish: todas las ciudades
  alternatives_spanish:
  - todas esas ciudades
  lexicon: HALOT
  rationale: כָּל marca totalidad; «todas las ciudades» refleja con claridad la suma de los centros mencionados.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus poblados
  - y sus asentamientos
  lexicon: HALOT
  rationale: חָצֵר en listas territoriales puede referirse a aldeas o asentamientos dependientes. «Aldeas» es una equivalencia clara y natural en español, sin suavizar la distinción geográfica.
translation_notes:
  revision_awareness: Se corrigió la falta previa de anclaje al incluir el marcador [a] exactamente en el punto correspondiente de la traducción. No se añadieron notas sin ancla.
  spanish_consistency_notes:
  - Se mantiene la terminología tribal literal («hijos de Efraín», «hijos de Manasés») para conservar la fórmula del hebreo.
  - «Heredad» se usa de forma consistente con el valor territorial de נַחֲלָה en Josué.
  - La nota [a] ofrece la alternativa lexical documentada sin introducir una paráfrasis extensa.
