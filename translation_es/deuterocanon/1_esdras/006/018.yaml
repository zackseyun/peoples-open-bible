translation:
  language: es
  text: Y se le ordenó traer de vuelta todos estos vasos[a], para ponerlos en el templo en Jerusalén, y que el templo de Yahvé fuera construido en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevar de vuelta todos estos vasos ... y que el templo de Yahvé fuera reconstruido en su sitio». El griego permite opciones cercanas tanto para el verbo de retorno («traer»/«llevar») como para la frase final de ubicación («en su lugar»/«en su sitio»), y el contexto también permite «reconstruido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετάγη αὐτῷ
  english_pob_choice: he was commanded
  chosen_spanish: se le ordenó
  alternatives_spanish:
  - se le mandó
  - fue ordenado
  lexicon: BDAG
  rationale: El griego usa pasivo impersonal y dativo de destinatario; en español, «se le ordenó» conserva la impersonalidad sin añadir un sujeto no expresado y suena natural en registro bíblico contemporáneo.
- source_word: ἀπήνεγκεν
  english_pob_choice: bring back
  chosen_spanish: traer de vuelta
  alternatives_spanish:
  - llevar de vuelta
  - devolver
  lexicon: BDAG
  rationale: En el contexto de vasos/utensilios del templo, la idea incluye restitución al lugar de origen. «Traer de vuelta» conserva el movimiento de retorno y la noción de restauración sin volverlo demasiado paraprástico.
- source_word: πάντα τὰ σκεύη ταῦτα
  english_pob_choice: all these vessels
  chosen_spanish: todos estos utensilios
  alternatives_spanish:
  - todos estos vasos
  - todos estos objetos
  lexicon: BDAG
  rationale: Para implementos del templo, «utensilios» comunica con claridad el conjunto de objetos cultuales. «Vasos» sería posible, pero en español puede sonar más restringido o litúrgico de manera menos transparente.
- source_word: ἀποθεῖναι
  english_pob_choice: to put them
  chosen_spanish: para ponerlos
  alternatives_spanish:
  - para depositarlos
  - para colocarlos
  lexicon: BDAG
  rationale: El infinitivo expresa depositar/restaurar los utensilios en el templo. «Ponerlos» sigue de cerca la función del infinitivo con naturalidad en español; «colocarlos» es válido pero algo más formal y menos directo.
- source_word: ναῷ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es la equivalencia más clara y estable en español para este contexto jerusalemita. «Santuario» estrecharía o desplazaría el sentido hacia una zona interna, que el contexto no exige.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Siguiendo el estándar del proyecto para יהוה / YHWH, se usa «Yahvé». Aunque el griego tenga κύριος, aquí funciona como referencia al Dios de Israel en contexto del templo; por eso se explicita el nombre divino en lugar de una máscara reverencial.
- source_word: οἰκοδομηθῆναι
  english_pob_choice: should be built
  chosen_spanish: fuera construido
  alternatives_spanish:
  - debería ser construido
  - fuera edificado
  lexicon: BDAG
  rationale: El infinitivo pasivo en el mandato se expresa naturalmente en español como construcción/edificación. «Fuera construido» mantiene el valor pasivo sin introducir una modalidad exhortativa extra que el griego no exige.
- source_word: ἐπὶ τοῦ τόπου
  english_pob_choice: on its site
  chosen_spanish: en su lugar
  alternatives_spanish:
  - sobre su sitio
  - en ese lugar
  lexicon: BDAG
  rationale: La frase indica la ubicación correcta u original para la obra. «En su lugar» es idiomático y preserva la idea de emplazamiento correspondiente; también deja abierta la tensión entre «sitio» y «lugar» sin forzar una precisión inexistente.
theological_decisions:
- issue: κύριος en un contexto del templo en la LXX
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque la POB inglesa usa «the Lord», el estándar español del proyecto reserva «Yahvé» para יהוה/YHWH. En este contexto cultual la referencia es al Dios de Israel, por lo que la traducción directa del valor teológico subyacente es preferible a una máscara reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego como ancla principal y coincide con la auditoría inglesa en los tres núcleos semánticos: el mandato implícito, el retorno de los utensilios y la construcción del templo en su sitio. Se adopta el pasivo impersonal español para ἐπετάγη, se mantiene la ambigüedad razonable de ἀπήνεγκεν con un verbo de retorno/restauración, y se explicita «Yahvé» conforme a la terminología del proyecto para el nombre divino en vez de replicar la máscara inglesa «the Lord».'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - «Utensilios» se usa de manera consistente para σκεύη en contexto del templo.
  - «Yahvé» se emplea coherentemente para el nombre divino, conforme a la norma del proyecto.
  - La sintaxis conserva la coordinación del griego sin añadir sujetos o relaciones causales no expresadas.
