revisions:
- from: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Ustedes mismos han visto toda la desgracia que yo traje sobre Jerusalén y sobre todas las ciudades de Judá. Y he aquí, ellas son una ruina[b] hoy, y no hay en ellas habitante.'
  to: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Ustedes mismos han visto toda la desgracia que yo traje sobre Jerusalén y sobre todas las ciudades de Judá. Y he aquí, han quedado en ruinas[b] en este día, y no hay quien habite en ellas.'
  rationale: La revisión conserva el sentido fuente y las decisiones léxicas auditadas, pero mejora la naturalidad del español. 'Han quedado en ruinas' expresa bien el estado resultante de חָרְבָּה para un referente plural de ciudades, mientras la nota conserva la alternativa más literal. 'En este día' refleja con mayor fidelidad הַיּוֹם הַזֶּה. 'No hay quien habite en ellas' suena más idiomático que 'no hay en ellas habitante' sin perder el contenido.
