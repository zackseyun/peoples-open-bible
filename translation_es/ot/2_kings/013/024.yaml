- from: Entonces Hazael, rey de Aram[a], murió, y Ben-adad, su hijo, reinó en su lugar.
  to: Entonces murió Hazael, rey de Aram[a], y Ben-hadad, su hijo, llegó a ser rey en su lugar.
  rationale: Se revisa «reinó» a «llegó a ser rey» para reflejar con mayor precisión la fórmula hebrea de sucesión/entronización. Se normaliza el nombre a «Ben-hadad» por fidelidad al hebreo y por mejor continuidad con la convención bíblica. Se ajusta además el orden de la primera cláusula para una narrativa más natural en español, sin cambiar el sentido.
