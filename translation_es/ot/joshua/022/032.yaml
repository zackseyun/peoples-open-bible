revisions:
- from: Entonces Finees, hijo de Eleazar el sacerdote, y los líderes, regresaron de entre los hijos de Rubén y de entre los hijos de Gad, de la tierra de Galaad a la tierra de Canaán, a los hijos de Israel, y les llevaron noticia[a].
  to: Entonces Finees, hijo de Eleazar el sacerdote, y los líderes regresaron de los hijos de Rubén y de los hijos de Gad, de la tierra de Galaad a la tierra de Canaán, a los hijos de Israel, y les llevaron noticia[a].
  rationale: Se reemplazó 'de entre los hijos de…' por 'de los hijos de…' para reflejar mejor מֵאֵת en este contexto y mejorar la naturalidad del español sin perder la literalidad del hebreo ni la revisión inglesa. También se corrigió la puntuación inicial de la nota al pie.
