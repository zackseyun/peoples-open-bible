- from: Y cuando la hayas visto[a], tú también serás reunido con tu pueblo, así como Aarón, tu hermano, fue reunido.
  to: Y cuando la hayas visto[a], tú también serás reunido a tu pueblo, así como Aarón tu hermano fue reunido.
  rationale: Se ajusta la preposición a 'a tu pueblo' para reflejar más fielmente אֶל עַמֶּיךָ y la rationale documentada del POB, preservando el modismo funerario sin paraprasearlo. También se armoniza la nota con esa formulación y se simplifica la aposición final para mejorar la fluidez del español.
