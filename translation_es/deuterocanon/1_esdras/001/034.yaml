revisions:
- from: Y lo multó[a] con cien talentos de plata y un talento de oro.
  to: Y multó al pueblo con cien talentos de plata y un talento de oro.[a]
  rationale: Se reemplaza el pronombre «lo» por «al pueblo» para reflejar explícitamente τὸ ἔθνος y eliminar ambigüedad. Se mantiene «multó» porque comunica bien el sentido punitivo de ἐζημίωσεν, y la nota se ajusta al nuevo anclaje textual.
  reviewer_model: gpt-5.4
