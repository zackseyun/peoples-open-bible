translation:
  language: es
  text: He aquí, estoy contra ti, oh arrogante[a], declara el Señor Yahvé de los ejércitos, porque ha llegado tu día[b], el tiempo en que te castigaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oh orgulloso» o «oh insolente». El hebreo זָדוֹן nombra a Babilonia por su arrogancia.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el tiempo en que te visité»; aquí «visitar» lleva el sentido de llamar a cuentas en juicio, por eso se traduce «te castigaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: ¡Mira!, estoy
  alternatives_spanish:
  - He aquí, estoy
  - Mira, estoy
  lexicon: HALOT
  rationale: En español, «¡Mira!» conserva la fuerza de anuncio solemne y la inmediatez profética de הִנְנִי sin caer en una fórmula demasiado arcaica. La coma posterior mantiene el arranque discursivo enfático.
- source_word: אֵלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: En este contexto de juicio, la preposición expresa oposición hostil, no mera dirección. «Contra ti» comunica mejor la fuerza idiomática hebrea que un literal «a ti».
- source_word: זָדוֹן
  english_pob_choice: arrogant one
  chosen_spanish: arrogante
  alternatives_spanish:
  - orgulloso
  - insolente
  lexicon: HALOT
  rationale: El sustantivo funciona como vocativo y nombra a Babilonia por su soberbia culpable. En español, «arrogante» es claro y fiel; se omite «uno» porque el vocativo nominal ya funciona naturalmente como apelativo.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: «Declara» reproduce bien la fórmula profética autoritativa en un español digno y actual, sin la rigidez de «oráculo de».
- source_word: אֲדֹנָי יְהוִה צְבָאוֹת
  english_pob_choice: the Lord GOD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - el Señor Dios de los ejércitos
  - Yahvé, Dios de los ejércitos
  lexicon: HALOT
  rationale: Siguiendo la pauta del proyecto, יְהוָה se rinde como «Yahvé». En español, la combinación plena «Señor Yahvé» sería pesada y poco natural; además, el título compuesto ya transmite la majestad del nombre divino. «De los ejércitos» preserva צְבָאוֹת como expresión bíblica del poder soberano.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del anuncio de juicio, y «porque» expresa claramente la relación causal en español.
- source_word: בָּא יוֹמְךָ
  english_pob_choice: your day has come
  chosen_spanish: ha llegado tu día
  alternatives_spanish:
  - tu día ha venido
  - tu día ha llegado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta el día fijado como ya llegado con certeza profética. «Ha llegado tu día» mantiene esa consumación inminente y natural en español.
- source_word: עֵת
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - la hora
  lexicon: HALOT
  rationale: «El tiempo» sigue de cerca el valor del sustantivo y funciona bien como paralelo explicativo del día que ha llegado.
- source_word: פְּקַדְתִּיךָ
  english_pob_choice: when I will punish you
  chosen_spanish: en que te castigaré
  alternatives_spanish:
  - en que te visitaré
  - en que te llamaré a cuentas
  lexicon: HALOT
  rationale: En contextos judiciales, פקד implica intervenir para juzgar, visitar/castigar o llamar a cuentas. «Castigaré» expresa directamente el sentido de juicio que el POB inglés ya explicó en su nota.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה dentro del título compuesto אֲדֹנָי יְהוִה צְבָאוֹת
  english_pob_reading: the Lord GOD of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - el Señor Dios de los ejércitos
  - Yahvé, Dios de los ejércitos
  rationale: La política del proyecto pide traducir יְהוָה como «Yahvé». En este verso, la forma compuesta no necesita una máscara tradicional tipo «SEÑOR»; mantener el nombre propio divino hace visible el texto hebreo y conserva el carácter de fórmula de juicio. «De los ejércitos» traduce צְבָאוֹת sin transliteración.
  doctrine_reference: 'DOCTRINE.md: tratamiento de YHWH como Yahvé; política terminológica del proyecto para nombres divinos'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el análisis auditado del inglés POB y mantiene las dos tensiones léxicas principales del verso: זָדוֹן como vocativo de arrogancia y פָּקַד en sentido judicial. Se adoptó la actualización del proyecto para יְהוָה como «Yahvé», ajustando la fórmula compuesta al español natural.'
  spanish_consistency_notes:
  - Se conserva el registro profético solemne sin arcaísmos innecesarios.
  - «Arrogante» se usa como vocativo sustantivado, coherente con el hebreo personificado.
  - «Castigaré» comunica el sentido forense de פָּקַד sin perder la referencia al juicio divino.
  - La puntuación separa claramente anuncio, vocativo y causa, facilitando la lectura pública.
