lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי puede verterse naturalmente como 'hijos de'. En español, 'hijos de' conserva la relación filial y funciona con fluidez. 'Descendientes de' amplía más de lo que exige el hebreo inmediato.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  - Rubén
  lexicon: Convención bíblica española
  rationale: Es un nombre propio; la forma asentada en español bíblico es 'Rubén'. Mantiene identificación clara y lectura natural.
- source_word: בְּכֹר יִשְׂרָאֵל
  english_pob_choice: the firstborn of Israel
  chosen_spanish: el primogénito de Israel
  alternatives_spanish:
  - el primero nacido de Israel
  - el primer hijo de Israel
  lexicon: HALOT
  rationale: '''Primogénito'' es la equivalencia española más precisa y natural para el valor de בְּכֹר en este contexto genealógico. Conserva la apposición sobre Rubén sin añadir interpretación.'
- source_word: חֲנוֹךְ
  english_pob_choice: Hanoch
  chosen_spanish: Hanoj
  alternatives_spanish:
  - Hanoc
  - Hanoc
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado según uso español; 'Hanoj' refleja mejor la consonante final hebrea con grafía española común.
- source_word: פַלּוּא
  english_pob_choice: Pallu
  chosen_spanish: Palú
  alternatives_spanish:
  - Pallu
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado. 'Palú' sigue una adaptación española frecuente y mantiene la referencia inequívoca al nombre hebreo.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Jezrón
  - Hezrón
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado al español con acentuación llana acorde al uso bíblico. Conserva la forma reconocible del nombre.
- source_word: כַרְמִי
  english_pob_choice: Carmi
  chosen_spanish: Carmi
  alternatives_spanish:
  - Carmí
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado; la forma breve 'Carmi' es transparente y habitual en español bíblico.
