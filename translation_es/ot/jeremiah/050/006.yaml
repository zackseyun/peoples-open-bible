translation:
  language: es
  text: Mi pueblo ha sido ovejas perdidas[a]; sus pastores los extraviaron, apartándolos en los montes. De monte en collado[b] anduvieron; olvidaron su lugar de descanso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: ''sus pastores los extraviaron; los montes los volvieron errantes'', reflejando la dificultad del hebreo detrás de la expresión traducida aquí como ''apartándolos''.'
    reason: lexical_alternative
  - marker: b
    text: '''De monte en collado'' puede también evocar el desplazamiento de Israel entre los lugares altos, imagen común de apostasía en Jeremías.'
    reason: cross_reference
lexical_decisions:
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - ganado menor
  lexicon: HALOT
  rationale: El sustantivo colectivo apunta al campo pastoril de ovejas; en español, 'ovejas' conserva la imagen concreta mejor que 'rebaño', que sería más colectivo y menos visual.
- source_word: אֹבְדוֹת
  english_pob_choice: lost
  chosen_spanish: perdidas
  alternatives_spanish:
  - extraviadas
  - perecidas
  lexicon: HALOT
  rationale: En este contexto de pastor y ovejas, 'perdidas' comunica tanto la condición de estar fuera de rumbo como el matiz pactual de extravío, sin cargar innecesariamente la idea de destrucción final.
- source_word: רֹעֵיהֶם
  english_pob_choice: their shepherds
  chosen_spanish: sus pastores
  alternatives_spanish:
  - sus líderes
  - sus guías
  lexicon: HALOT
  rationale: Se mantiene el término pastoral literal para preservar la metáfora profética de Jeremías; 'líderes' aplanaría la imagen.
- source_word: הִתְעוּם
  english_pob_choice: have led them astray
  chosen_spanish: los hicieron extraviarse
  alternatives_spanish:
  - los desviaron
  - los hicieron andar errantes
  lexicon: HALOT
  rationale: 'El hifil de תעה es causativo: los pastores causaron el desvío. ''Hicieron extraviarse'' conserva la culpabilidad y suena natural en español.'
- source_word: שובבים
  english_pob_choice: turning them away
  chosen_spanish: apartándolos
  alternatives_spanish:
  - haciéndolos andar errantes
  - volviéndolos inconstantes
  lexicon: HALOT
  rationale: La forma hebrea es difícil. Dado el contexto, se entiende como un efecto de apartamiento/errancia causado por los pastores. 'Apartándolos' comunica esa acción sin forzar una glosa oscura en el cuerpo del texto.
- source_word: הָרִים
  english_pob_choice: on the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - sobre los montes
  - por los montes
  lexicon: HALOT
  rationale: El hebreo carece de preposición explícita; 'en los montes' mantiene una lectura locativa sobria y fluida en español.
- source_word: מֵהַר אֶל גִּבְעָה
  english_pob_choice: from mountain to hill
  chosen_spanish: de monte en collado
  alternatives_spanish:
  - de montaña en colina
  - de monte a collado
  lexicon: HALOT
  rationale: La fórmula idiomática 'de monte en collado' conserva el paralelismo y el movimiento repetitivo con un registro bíblico natural en español.
- source_word: הָלָכוּ
  english_pob_choice: they have wandered
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - fueron
  lexicon: HALOT
  rationale: Aunque literalmente es 'fueron/anduvieron', el verbo en este contexto expresa desplazamiento errante. 'Anduvieron' preserva la acción sin añadir más interpretación que la permitida por el paralelo.
- source_word: שָׁכְחוּ
  english_pob_choice: they have forgotten
  chosen_spanish: olvidaron
  alternatives_spanish:
  - han olvidado
  lexicon: HALOT
  rationale: Se traduce de manera directa y sobria; el perfecto hebreo puede leerse como acción con efecto vigente, pero en español el pretérito simple funciona bien en la acusación profética.
- source_word: רִבְצָם
  english_pob_choice: their resting place
  chosen_spanish: su lugar de descanso
  alternatives_spanish:
  - su redil
  - su lugar de reposo
  lexicon: HALOT
  rationale: Desde רבץ, el sentido es el lugar donde los animales se echan. 'Lugar de descanso' es claro en español y conserva la imagen pastoral sin restringirla demasiado como 'redil'.
theological_decisions:
- issue: Posible alusión a los lugares altos en 'montes' y 'collado'
  english_pob_reading: Retain the geographic/pastoral wording without making the idolatry implication explicit in the main text.
  chosen_spanish_reading: Mantener el lenguaje geográfico y pastoral sin explicitar en el cuerpo del texto la lectura de idolatría.
  alternative_spanish_readings:
  - Expresar abiertamente el trasfondo de altos idolátricos
  - Traducir de modo más interpretativo para subrayar la apostasía
  rationale: Jeremías suele asociar montes y collados con la apostasía, pero aquí la imagen inmediata es la de ovejas desviadas por sus pastores. La traducción principal conserva esa tensión y deja la posible alusión como trasfondo, no como explicación impuesta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretación de שובבים
  english_pob_reading: Understand it contextually as describing errant wandering caused by the shepherds, expressed in English as 'turning them away'.
  chosen_spanish_reading: Entenderlo contextualmente como apartamiento causado por los pastores, expresado en español como 'apartándolos'.
  alternative_spanish_readings:
  - '''haciéndolos andar errantes'''
  - '''montes rebeldes'''
  - '''montes desviados'''
  rationale: El hebreo es difícil si se toma de forma demasiado literal. La solución elegida comunica el efecto causal y evita una frase oscura o artificial en español, sin borrar la tensión textual documentada por el auditor inglés.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del contexto inglés: se mantiene el paralelismo de ovejas/pastores, se conserva el valor causal de הִתְעוּם, y se evita atribuir a los pastores el sujeto del movimiento en ''de monte en collado''. También se ha optado por una solución española más natural para שובבים, sin ocultar en nota la alternativa más formal y la dificultad lexical documentada.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preservó la metáfora pastoral con 'ovejas' y 'pastores' en lugar de generalizar a 'gente' o 'líderes'.
  - '''Montes'' y ''collado'' reproducen el paralelismo sin cargar explícitamente la referencia a altares, que queda en nota.'
  - '''Lugar de descanso'' evita tanto tecnicismos como un sentido demasiado estrecho de ''redil''.'
