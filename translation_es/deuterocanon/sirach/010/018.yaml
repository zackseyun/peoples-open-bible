translation:
  language: es
  text: La arrogancia y la insolencia no son apropiadas[a] para un ser humano, mucho menos para alguien nacido de mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «La arrogancia no fue creada para los seres humanos, ni la ira furiosa para los nacidos de mujer». El testimonio hebreo, en cambio, dice: «la arrogancia y la insolencia ... mucho menos para alguien nacido de mujer».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא נָאוֶה
  english_pob_choice: are not fitting
  chosen_spanish: no son propias
  alternatives_spanish:
  - no son convenientes
  - no son apropiadas
  - no son propias de
  lexicon: HALOT
  rationale: El hebreo expresa aquello que resulta decoroso o adecuado. «No son propias» conserva esa evaluación de conveniencia sin volver la frase pesada o demasiado abstracta en español.
- source_word: לֶאֱנוֹשׁ
  english_pob_choice: for a human being
  chosen_spanish: de un ser humano
  alternatives_spanish:
  - de un hombre
  - de una persona
  - del ser humano
  lexicon: HALOT
  rationale: אֱנוֹשׁ apunta al ser humano mortal en general. «Ser humano» preserva ese valor representativo sin reducirlo a varón y mantiene la comparación con «nacido de mujer».
- source_word: זָדוֹן
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - presunción
  - soberbia
  lexicon: HALOT
  rationale: El término denota autoexaltación presumida y actitud altiva. «Arrogancia» refleja bien ese rasgo interior y es la opción más natural en español aquí.
- source_word: וְעַזוּת
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - audacia
  - impudencia
  - descaro
  lexicon: HALOT
  rationale: La palabra sugiere una osadía descarada y moralmente negativa. «Insolencia» conserva ese matiz y distingue el segundo rasgo del primero.
- source_word: אַף
  english_pob_choice: much less
  chosen_spanish: mucho menos
  alternatives_spanish:
  - y menos aún
  - ni siquiera
  - cuánto menos
  lexicon: HALOT
  rationale: Aquí funciona como intensificador comparativo. «Mucho menos» reproduce con claridad el movimiento escalonado del proverbio.
- source_word: לִילוּד אִשָּׁה
  english_pob_choice: for one born of a woman
  chosen_spanish: de uno nacido de mujer
  alternatives_spanish:
  - de quien nace de mujer
  - de un nacido de mujer
  - de una criatura nacida de mujer
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y subraya la condición mortal y frágil del ser humano. La forma elegida es natural en español y conserva la alusión a la condición humana derivada del nacimiento.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego
  english_pob_reading: The Hebrew witness is primary; the Greek parallel is preserved in a footnote as an alternative reading with 'was not created for' and 'wrathful anger'.
  chosen_spanish_reading: El texto principal sigue el hebreo, y la nota conserva el paralelo griego como lectura alternativa significativa.
  alternative_spanish_readings:
  - La arrogancia no fue creada para los seres humanos, ni la ira furiosa para los nacidos de mujer.
  rationale: El hebreo está atestiguado y validado, por lo que debe gobernar la traducción principal. El griego aporta una variante relevante en el predicado y en el segundo término; no se debe borrar esa tensión, sino registrarla en nota.
  doctrine_reference: Primacía de la fuente original disponible; conservar lecturas paralelas relevantes sin resolver artificialmente la tensión textual.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés al preferir una expresión representativa de אֱנוֹשׁ («ser humano») y mantener la comparación con «nacido de mujer». También refleja la decisión auditada de dar primacía al hebreo frente al paralelo griego, preservando este último en nota.
  spanish_consistency_notes:
  - Se usa «arrogancia» para זָדוֹן y «insolencia» para וְעַזוּת, manteniendo dos matices distintos.
  - Se prefiere «ser humano» en lugar de «hombre» para respetar el valor representativo de אֱנוֹשׁ sin perder naturalidad en español.
  - La frase «nacido de mujer» conserva el giro idiomático y su fuerza antropológica.
  - La nota distingue con claridad el hebreo del paralelo griego y no mezcla ambos en el cuerpo principal.
