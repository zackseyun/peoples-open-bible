  to: Pero algunos[a], despreciando con descuido los bastiones de la piedad de la ciudad, se entregaron de buena gana, como si fueran a participar de alguna gran fama por la futura asociación[b] con el rey.
  rationale: Se ajustó «con ligereza» a «con descuido» para reflejar mejor ἐπιπολαίως; «fácilmente» a «de buena gana» para conservar el matiz volitivo de εὐχερῶς; y se movió la marca [b] a «asociación» porque la nota alternativa corresponde a la frase final, no al verbo «se entregaron».
