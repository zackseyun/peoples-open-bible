translation:
  language: es
  text: Después de esto, Simón envió a Numenio a Roma[a], llevando un escudo grande de oro que pesaba mil minas, para establecer con ellos la alianza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una mina era una antigua unidad de peso; la expresión indica un obsequio diplomático excepcionalmente pesado y valioso.
    reason: cultural_note
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego
  lexicon: LSJ
  rationale: Conserva la transición narrativa plural del griego y sigue de cerca la forma auditada del inglés sin sonar forzado en español.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: Envió reproduce el verbo de envío de manera natural y directa en español.
- source_word: Νουμήνιον
  english_pob_choice: Numenius
  chosen_spanish: Numenio
  alternatives_spanish:
  - Numenio
  lexicon: transliteration convention
  rationale: Se translitera el nombre propio al uso español, manteniendo la identificación del personaje.
- source_word: εἰς Ῥώμην
  english_pob_choice: to Rome
  chosen_spanish: a Roma
  alternatives_spanish:
  - hacia Roma
  - a la ciudad de Roma
  lexicon: LSJ
  rationale: Con un destino geográfico, a Roma es la equivalencia natural en español.
- source_word: ἔχοντα
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - portando
  - trayendo
  lexicon: LSJ
  rationale: Llevando expresa de forma idiomática que iba con el regalo y conserva el matiz de acompañamiento del participio.
- source_word: ἀσπίδα χρυσῆν μεγάλην
  english_pob_choice: a large gold shield
  chosen_spanish: un gran escudo de oro
  alternatives_spanish:
  - un gran escudo dorado
  - un escudo grande de oro
  lexicon: LSJ
  rationale: Escudo de oro deja claro el material valioso; gran transmite el tamaño físico de μεγάλην sin sobrecargar el estilo.
- source_word: ὁλκὴν μνῶν χιλίων
  english_pob_choice: weighing a thousand minas
  chosen_spanish: que pesaba mil minas
  alternatives_spanish:
  - de un peso de mil minas
  - que tenía el peso de mil minas
  lexicon: LSJ
  rationale: Pesaba mil minas expresa con claridad el dato de peso y conserva la idea de una ofrenda excepcionalmente costosa.
- source_word: εἰς τὸ στῆσαι
  english_pob_choice: to establish
  chosen_spanish: para establecer
  alternatives_spanish:
  - para confirmar
  - para asentar
  lexicon: LSJ
  rationale: Establecer reproduce bien el propósito del infinitivo articular en contexto diplomático, con naturalidad en español.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - ante ellos
  - hacia ellos
  lexicon: LSJ
  rationale: Con ellos sigue el sentido relacional del griego en el marco de la alianza con los romanos.
- source_word: τὴν συμμαχίαν
  english_pob_choice: the alliance
  chosen_spanish: la alianza
  alternatives_spanish:
  - el pacto
  - el tratado de alianza
  lexicon: LSJ
  rationale: Alianza es la traducción directa y adecuada de συμμαχία en este contexto político y militar.
theological_decisions:
- issue: Valor del presente diplomático y del peso como señal de prestigio, no como detalle meramente ornamental
  english_pob_reading: A large gold shield weighing a thousand minas, an exceptionally heavy and valuable diplomatic gift.
  chosen_spanish_reading: Un gran escudo de oro que pesaba mil minas, es decir, un obsequio diplomático excepcionalmente costoso y pesado.
  alternative_spanish_readings:
  - Un gran escudo de oro, sin explicitar su valor
  - Un escudo dorado de gran tamaño
  rationale: La formulación española conserva la fuerza material y simbólica del objeto, que forma parte del gesto político de alianza.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto principal junto a Roma, de modo que la nota cultural quede anclada en la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo la transliteración Numenio de forma consistente con el nombre propio griego.
  - Se evitó 'SEÑOR' o cualquier terminología no pertinente; el pasaje es histórico y diplomático.
  - '''Alianza'' conserva el valor político de συμμαχία sin imponer un matiz eclesiástico.'
  - El peso se expresó con 'mil minas' de manera clara y compatible con el estilo bíblico español moderno.
