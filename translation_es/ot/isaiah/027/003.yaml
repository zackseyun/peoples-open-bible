translation:
  language: es
  text: Yo[a], Yahvé, soy quien la guarda; la riego continuamente[b]. No sea que alguien la castigue[c], la guardo de noche y de día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la riego a cada momento' o 'de momento en momento'.
    reason: lexical_alternative
  - marker: b
    text: O 'continuamente' puede entenderse como 'a cada momento' o 'de momento en momento'.
    reason: lexical_alternative
  - marker: c
    text: O 'la ataque' o 'visite castigo sobre ella'. El verbo hebreo puede expresar intervención hostil o visitación punitiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la decisión POB de no sustituirlo por un título. En español bíblico, 'Yahvé' es la forma más reconocible y reverente; 'el SEÑOR' ocultaría el nombre revelado.
- source_word: נֹצְרָהּ
  english_pob_choice: am its keeper
  chosen_spanish: soy su guardián
  alternatives_spanish:
  - soy quien la guarda
  - soy su custodio
  - la vigilo
  lexicon: HALOT
  rationale: El participio de נצר expresa la función de guardar/proteger. En español, 'guardián' comunica bien la idea de vigilancia y custodia con una frase natural; 'guardián' evita repetir demasiado el verbo 'guardar' que aparece después en la oración.
- source_word: לִרְגָעִים
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - cada momento
  - de momento en momento
  - sin cesar
  lexicon: HALOT
  rationale: La expresión literalmente apunta a intervalos o momentos, con sentido de acción constante. 'Continuamente' es la forma más natural en español para preservar la duración ininterrumpida; la alternativa más literal se reserva en nota.
- source_word: אַשְׁקֶנָּה
  english_pob_choice: I water it
  chosen_spanish: lo riego
  alternatives_spanish:
  - le doy agua
  - lo irrigó
  - lo hago beber
  lexicon: HALOT
  rationale: El hifil de שקה significa dar de beber o regar. Dado el contexto de una vid, 'lo riego' es idiomático y preciso en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que nadie
  alternatives_spanish:
  - no sea que
  - lest
  - para que no
  lexicon: HALOT
  rationale: La partícula introduce prevención. En español, 'para que nadie' con subjuntivo transmite de forma clara la finalidad preventiva; 'no sea que' también sería posible, pero aquí la formulación resulta más fluida.
- source_word: יִפְקֹד עָלֶיהָ
  english_pob_choice: anyone punish it
  chosen_spanish: lo castigue
  alternatives_spanish:
  - lo ataque
  - lo visite con castigo
  - le haga daño
  lexicon: HALOT
  rationale: פקד con על puede implicar intervenir hostilmente o visitar con castigo. 'Castigue' conserva la carga punitiva observada por POB y funciona bien con el marco preventivo del versículo; el sujeto indefinido queda expresado por 'nadie'.
- source_word: לַיְלָה וָיוֹם
  english_pob_choice: night and day
  chosen_spanish: de noche y de día
  alternatives_spanish:
  - noche y día
  - by night and by day
  - día y noche
  lexicon: HALOT
  rationale: Es una merisma de duración continua. 'De noche y de día' es una fórmula española natural y solemne, sin perder la idea de vigilancia incesante.
- source_word: אֶצֳּרֶנָּה
  english_pob_choice: I guard it
  chosen_spanish: lo guardo
  alternatives_spanish:
  - lo cuido
  - lo vigilo
  - lo preservo
  lexicon: HALOT
  rationale: Se mantiene la raíz נצר con un verbo activo simple en español. 'Guardar' enlaza bien con 'guardián' y mantiene la continuidad léxica sin sonar forzado.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La decisión teológica y editorial es preservar el nombre propio divino en lugar de enmascararlo con un título. 'Yahvé' es la forma estándar más difundida en español para este propósito y sigue la política POB de transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sujeto indefinido de יִפְקֹד
  english_pob_reading: anyone
  chosen_spanish_reading: nadie
  alternative_spanish_readings:
  - alguien
  - uno
  - cualquiera
  rationale: 'El hebreo usa una forma verbal sin sujeto explícito. En español, ''nadie'' en un contexto de prevención comunica de manera natural la lectura indefinida negativa: que no se permita a ningún agente hostil actuar contra la viña. No fija indebidamente un enemigo concreto.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del hebreo y conserva la tensión léxica observada por el audit trail inglés: participio de función para נצר, duratividad de לִרְגָעִים, y el matiz punitivo/preventivo de פקד + עַל. No se aplicaron revisiones adicionales respecto del último pase, que permaneció sin cambios.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva una distinción natural entre 'guardián' y 'guardo' para reflejar el paralelismo entre נֹצְרָהּ y אֶצֳּרֶנָּה.
  - '''Continuamente'' y la nota ''de momento en momento'' preservan el rango semántico de לִרְגָעִים.'
  - '''Lo castigue'' mantiene la posibilidad punitiva de פקד sin cerrarla a una sola imagen.'
  - La merisma 'de noche y de día' es idiomática en español y reproduce la totalidad temporal del original.
