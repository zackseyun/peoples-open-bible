    reason: cultural_note
  revision_rationale: Se corrige נכה con ‘abatió’ para reflejar mejor la fuerza letal del combate; se mejora la naturalidad de עשה + תְּשׁוּעָה con ‘Yahvé dio una gran victoria’; y se reubica la nota b para que explique correctamente אַךְ לְפַשֵּׁט, conforme al audit trail inglés. Se conserva la nota a porque sí corresponde a la vividez de דבק.
