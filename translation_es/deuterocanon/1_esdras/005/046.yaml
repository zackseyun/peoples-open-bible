base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/046.yaml
  text: Now when the seventh month had come[a], and the sons of Israel were each in their own places[c][b], they gathered with one accord in the open area of the first gate on the east.
  footnotes:
  - marker: a
    text: Or, 'the Israelites.' The Greek reads 'the sons of Israel,' a covenantal familial expression.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the broad place' or 'the square.' The Greek denotes a spacious open area.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew parallel in Nehemiah emphasizes that Israel was settled in their towns; the Greek here similarly presents each person as being in his own place before the assembly.
    reason: cross_reference
