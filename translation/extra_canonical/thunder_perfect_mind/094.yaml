translation:
  text: You hear me in your calling of me[a], in a [...] that you utter. You did not
    hear[e][d][c][b]. I am the defense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic shows “ⲧⲉⲧⲛⲥⲱⲧⲙ ⲉⲣⲟⲓ ϩⲛ ⲛⲉⲧⲛ—”, but the object after “in your
      …” is truncated; the translation omits a specific object rather than guess.
    reason: alignment_note
  - marker: b
    text: “ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ” can mean “call me,” “call to me,” or “invoke me.” The following
      “ϩⲛ ⲟⲩⲡ—” is incomplete and may have specified manner (e.g., “with a [voice/boldness]”).
    reason: lexical_alternative
  - marker: c
    text: The conditional is reconstructed from “ⲉⲧⲉⲧⲛ—” and the negative relative
      “ⲙⲡⲉⲧⲛⲥⲱⲧⲙ.” Hence “if you have not listened.”
    reason: alignment_note
  - marker: d
    text: ⲧⲁⲡⲟⲗⲟⲅⲓⲁ is a Greek loanword (ἀπολογία), meaning “defense/answer.” Alternatives
      include “reply” or “plea.”
    reason: lexical_alternative
  - marker: e
    text: Or 'You—listen to me; call to me. If you have not listened, I am the defense.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲱⲧⲙ
  chosen: listen
  alternatives:
  - hear
  lexicon: Crum, Coptic Dictionary s.v. ⲥⲱⲧⲙ
  rationale: Imperative sense is better captured by “listen” as an engaged hearing;
    ⲥⲱⲧⲙ covers both hear/listen.
- source_word: ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ
  chosen: call to me
  alternatives:
  - call me
  - name me
  - invoke me
  lexicon: Crum s.v. ⲙⲟⲩⲧⲉ; Layton, Coptic Grammar §33 (verbs of naming/calling with
    ⲉⲣⲟ)
  rationale: ⲙⲟⲩⲧⲉ with ⲉⲣⲟⲓ regularly means call/invoke toward someone; “call to
    me” keeps the relational direction and avoids over-narrowing to mere naming.
- source_word: ⲉⲧⲉ … ⲙⲡⲉⲧⲛⲥⲱⲧⲙ
  chosen: if you have not listened
  alternatives:
  - if you did not hear
  lexicon: Layton, Coptic Grammar §121 (ⲉⲧⲉ introducing conditions); Crum s.v. ⲥⲱⲧⲙ
  rationale: The fragment suggests a conditional clause governing the negative perfect;
    rendering as present perfect in English keeps the live condition without fixing
    tense too rigidly.
- source_word: ⲁⲛⲟⲕ ⲡⲉ …
  chosen: I am
  alternatives: []
  lexicon: Standard Sahidic copular construction
  rationale: ⲁⲛⲟⲕ ⲡⲉ marks a simple identification; preserving the “I am” voice is
    crucial to Thunder’s cadence.
- source_word: ⲧⲁⲡⲟⲗⲟⲅⲓⲁ
  chosen: the defense
  alternatives:
  - the apologia
  - the reply
  - the plea
  lexicon: Greek loanword ἀπολογία, LSJ s.v.; Coptic loan usage attested with sense
    “defense/answer.”
  rationale: “Defense” best captures forensic/apologetic nuance while remaining natural
    in modern English; “apologia” is accurate but opaque; “reply/plea” are possible
    but less specific.
parallelism_check: This block preserves a two-fold imperative parallelism (“listen…;
  call…”) followed by a conditional antithesis and a first-person identification.
  While not a paradoxical dyad, it maintains the poem’s pattern of address → condition
  → self-naming. The cadence keeps the short hammer-blow clauses common in Thunder.
voice_check: The first-person epiphanic voice is retained in the climactic “I am…”
  assertion, and the second-person plural imperatives address the hearers directly.
  No smoothing of the “I am” structure was done.
alignment_risk_note: 'Alignment confidence is medium and the consult line (“I am lust…inside
  me self-control”) does not match the visible Coptic lexemes here (ⲥⲱⲧⲙ, ⲙⲟⲩⲧⲉ, ⲧⲁⲡⲟⲗⲟⲅⲓⲁ).
  The OCR is truncated at “ϩⲛ ⲛⲉⲧⲛ—” and “ϩⲛ ⲟⲩⲡ—”, obscuring internal complements.
  I therefore neutralized those prepositional phrases in English and confined the
  rendering to elements that are textually secure: ‘listen to me,’ ‘call to me,’ conditional
  ‘if you have not listened,’ and ‘I am the defense.’ Specifics like “in your [X]”
  or “with a [Y]” are left unspecified to avoid false precision.'
