translation:
  language: es
  text: 'Absalón dijo a Joab: «Mira, te mandé decir: “Ven acá, para que yo te envíe al rey y le diga: ‘¿Por qué vine de Guesur? Habría sido mejor para mí quedarme allí’[b].” Ahora, pues, déjame ver el rostro del rey[a]; y si hay en mí culpa, que me dé muerte.”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «déjame ver el rostro del rey», un modismo para comparecer ante el rey.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Me habría sido mejor permanecer allí». La cláusula hebrea es elíptica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  lexicon: HALOT
  rationale: Se usa un marcador discursivo natural en español que conserva la función de llamar la atención sobre la afirmación de Absalón.
- source_word: שָׁלַחְתִּי אֵלֶיךָ
  english_pob_choice: I sent word to you
  chosen_spanish: te he enviado a decir
  alternatives_spanish:
  - te envié un mensaje
  - te mandé decir
  lexicon: HALOT
  rationale: El hebreo expresa envío de mensaje o recado, no un envío físico de objeto; la fórmula española mantiene esa fuerza comunicativa sin sonar rígida.
- source_word: בֹּא הֵנָּה
  english_pob_choice: Come here
  chosen_spanish: Ven acá
  alternatives_spanish:
  - Ven aquí
  - Acércate
  lexicon: HALOT
  rationale: Imperativo directo con valor deíctico; 'Ven acá' es claro y natural en español para reproducir la orden inmediata.
- source_word: וְאֶשְׁלְחָה אֹתְךָ אֶל הַמֶּלֶךְ
  english_pob_choice: so that I may send you to the king
  chosen_spanish: para que yo te envíe al rey
  alternatives_spanish:
  - y te enviaré al rey
  - a fin de enviarte al rey
  lexicon: HALOT
  rationale: La cohortativa expresa propósito; 'para que yo te envíe' conserva mejor la intención que un simple futuro.
- source_word: לָמָּה בָּאתִי מִגְּשׁוּר
  english_pob_choice: Why did I come from Geshur?
  chosen_spanish: ¿Por qué vine de Guesur?
  alternatives_spanish:
  - ¿Por qué salí de Guesur?
  - ¿Por qué regresé de Guesur?
  lexicon: HALOT
  rationale: Se mantiene el verbo en primera persona singular y el sentido de procedencia desde Guesur, sin convertirlo en pasiva ni añadir una idea ajena al texto.
- source_word: טוֹב לִי עוֹד אֲנִי שָׁם
  english_pob_choice: It would have been better for me to remain there
  chosen_spanish: Me habría sido mejor permanecer allí
  alternatives_spanish:
  - Habría sido mejor para mí quedarme allí
  - Me habría convenido más seguir allí
  lexicon: HALOT
  rationale: La cláusula es elíptica; se explicita de forma idiomática en español el comparativo implícito de permanecer en Guesur.
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora entonces
  lexicon: HALOT
  rationale: Se conserva el giro transicional y exhortativo que marca el paso de la queja a la petición.
- source_word: אֶרְאֶה פְּנֵי הַמֶּלֶךְ
  english_pob_choice: let me see the king’s face
  chosen_spanish: que yo vea el rostro del rey
  alternatives_spanish:
  - que yo comparezca ante el rey
  - que pueda ver al rey
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de 'ver el rostro' como modismo de comparecer ante el rey, manteniendo a la vez comprensión en español.
- source_word: עָוֺן
  english_pob_choice: guilt
  chosen_spanish: culpa
  alternatives_spanish:
  - iniquidad
  - pecado
  lexicon: HALOT
  rationale: En este contexto judicial, 'culpa' comunica bien la carga de responsabilidad o falta que Absalón pone a consideración del rey.
- source_word: וֶהֱמִתָנִי
  english_pob_choice: let him put me to death
  chosen_spanish: que me dé muerte
  alternatives_spanish:
  - que me mate
  - que me ejecute
  lexicon: HALOT
  rationale: El causativo de מות se rinde con una fórmula solemne y natural; 'dar muerte' conserva la gravedad sin especificar más de lo que el hebreo dice.
theological_decisions:
- issue: Modismo de comparecer ante el rey
  english_pob_reading: let me see the king’s face
  chosen_spanish_reading: que yo vea el rostro del rey
  alternative_spanish_readings:
  - que comparezca ante el rey
  - que pueda ver al rey
  rationale: 'No hay tensión doctrinal, pero sí una decisión semántica: el hebreo usa un modismo cortesano. Se conserva la imagen literal y se hace comprensible en español mediante el contexto inmediato.'
  doctrine_reference: N/A
- issue: Posible ambigüedad en la cláusula elíptica sobre Guesur
  english_pob_reading: It would have been better for me to remain there
  chosen_spanish_reading: Me habría sido mejor permanecer allí
  alternative_spanish_readings:
  - Habría sido mejor para mí quedarme allí
  - Me habría convenido más seguir allí
  rationale: La frase hebrea es elíptica. La redacción española explicita el sentido comparativo sin resolver indebidamente la ambigüedad ni introducir un contenido teológico ajeno.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se ajustó la pregunta a pasado simple (“¿Por qué vine de Guesur?”) y la cláusula comparativa a una forma más natural (“Me habría sido mejor permanecer allí”). El español refleja esas correcciones y mantiene el giro transicional equivalente a “Now therefore”.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se mantiene 'Guesur' para el topónimo, siguiendo la transliteración hispánica habitual.
  - Se conserva la mayúscula en 'rey' solo según posición normal en español; no se introduce lenguaje eclesiástico no requerido.
  - Se prefiere 'culpa' por el contexto jurídico inmediato, sin borrar la posibilidad semántica más amplia de 'iniquidad'.
