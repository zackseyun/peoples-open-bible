id: JOS.7.11
reference: Joshua 7:11
source:
  edition: WLC
  text: חָטָא֙ יִשְׂרָאֵ֔ל וְ/גַם֙ עָבְר֣וּ אֶת בְּרִיתִ֔/י אֲשֶׁ֥ר צִוִּ֖יתִי אוֹתָ֑/ם וְ/גַ֤ם לָֽקְחוּ֙ מִן הַ/חֵ֔רֶם וְ/גַ֤ם גָּֽנְבוּ֙ וְ/גַ֣ם כִּֽחֲשׁ֔וּ וְ/גַ֖ם שָׂ֥מוּ בִ/כְלֵי/הֶֽם־־׃
translation:
  text: Israel has sinned[a]. They have also transgressed my covenant that I commanded them, and they have also taken some of what was devoted to destruction, and they have also stolen, and they have also deceived[c][b], and they have also put it among their own belongings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'have taken from the devoted things' or 'have taken from the ban.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have also deceived' / 'have also denied it.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'among their vessels/articles'; the phrase refers to hiding the items among their possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָא
  chosen: has sinned
  alternatives:
  - has offended
  - has done wrong
  lexicon: HALOT
  rationale: The verb plainly denotes sin/offense against God. 'Has sinned' is the standard, direct rendering and preserves the theological weight without paraphrase.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration. Although the immediate offender is Achan, the text speaks corporately of Israel, which should be preserved.
- source_word: עָבְרוּ אֶת־בְּרִיתִי
  chosen: have transgressed my covenant
  alternatives:
  - have violated my covenant
  - have broken my covenant
  lexicon: HALOT
  rationale: עבר with covenant language conveys crossing over/violating covenant boundaries. 'Transgressed' preserves the formal covenantal sense better than the more idiomatic 'broken,' while remaining readable.
- source_word: אֲשֶׁר צִוִּיתִי אוֹתָם
  chosen: that I commanded them
  alternatives:
  - which I commanded them to keep
  - that I charged them
  lexicon: HALOT
  rationale: The Hebrew states simply that God commanded them; 'to keep' is implied but not explicit, so it is not added to the main text.
- source_word: לָקְחוּ מִן־הַחֵרֶם
  chosen: have taken some of what was devoted to destruction
  alternatives:
  - have taken from the devoted things
  - have taken from the ban
  lexicon: HALOT
  rationale: חֵרֶם in this context refers to things placed under ban and devoted to destruction. 'What was devoted to destruction' communicates the sense clearly in modern English. A more formal alternative is preserved in a footnote.
- source_word: גָּנְבוּ
  chosen: have also stolen
  alternatives:
  - have stolen
  lexicon: HALOT
  rationale: The repeated וְגַם structure is rhetorically emphatic; retaining 'also' reflects the piling up of charges.
- source_word: כִּחֲשׁוּ
  chosen: also lied
  alternatives:
  - also deceived
  - also acted deceitfully
  - also denied it
  lexicon: HALOT
  rationale: The verb can carry senses of deception, denial, or falsehood. In this judicial-moral context, 'lied' is the clearest concise English rendering, while broader alternatives are noted.
- source_word: שָׂמוּ בִכְלֵיהֶם
  chosen: have also put it among their own belongings
  alternatives:
  - have put it among their vessels
  - have placed it in their baggage
  lexicon: HALOT
  rationale: כְּלִים is broad ('articles, vessels, equipment, belongings'). Here the sense is hiding the banned items among personal possessions. 'Belongings' is natural English and fits the context better than the narrower 'vessels.'
- source_word: וְגַם ... וְגַם ... וְגַם
  chosen: also ... also ... also
  alternatives:
  - and ... and ... and
  rationale: The repeated particle גַם intensifies the accumulation of offenses. Rendering it repeatedly as 'also' preserves the rhetorical force better than flattening it into simple coordination.
