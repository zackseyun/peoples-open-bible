review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del hebreo y conserva el marco jurídico del versículo: שָׁאוֹן como conmoción/estruendo, רִיב y נִשְׁפָּט como lenguaje forense, כָל־בָּשָׂר como «toda carne», y el nombre divino como «Yahvé». Sin embargo, hay dos ajustes de fidelidad: (1) la nota d introduce alternativas que no reflejan bien la documentación inglesa; el hebreo נתנם significa «los ha entregado / los ha dado» y no «ha entregado a ellos» ni idealmente «los ha puesto a la espada» como principal alternativa documentada; (2) «pleito» es posible, pero en registro bíblico amplio «causa» o «caso» transmite mejor la fuerza jurídica sin connotación demasiado coloquial en varios países.'
  spanish_quality_summary: El español es claro y legible, con buen tono eclesial contemporáneo. «Un estruendo ha llegado hasta el extremo de la tierra» suena natural. No obstante, «tiene un pleito» puede sentirse algo coloquial o doméstico en español panhispánico, y «con toda carne» funciona mejor tras una formulación jurídica menos coloquial. La revisión propuesta mejora naturalidad y registro sin perder precisión.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «toda carne» y la preservación del lenguaje judicial. No hay conflicto con glosario mayor. La principal divergencia a corregir está en la formulación y nota de נתנם לחרב, para ajustarla a «ha entregado ... a la espada / los ha entregado a la espada».
  issues:
  - severity: medium
    issue: «tiene un pleito» suena demasiado coloquial para רִיב en este contexto profético-jurídico.
    rationale: Aunque «pleito» puede ser forense, en español general también evoca riña o disputa cotidiana. «Tiene una causa contra las naciones» preserva mejor la solemnidad jurídica y armoniza con el inglés auditado «has a case against». Además, permite usar «contra» de forma natural.
  - severity: medium
    issue: La nota d no refleja con precisión las alternativas documentadas para נְתָנָם לַחֶרֶב.
    rationale: El rastro inglés documenta «has handed them over to the sword» como alternativa. La nota española «ha entregado a ellos a la espada» es antinatural, y «los ha puesto a la espada» cambia el matiz hacia ejecución directa más que entrega/consignación.
  - severity: low
    issue: El anclaje de la nota b sobre «pleito» quedaría mejor con una formulación más estable panhispánicamente.
    rationale: Si se revisa a «causa», la nota debe explicar que el término legal hebreo también puede traducirse «controversia» o «litigio», preservando la justificación léxica sin coloquialismo.
  revised_spanish_text: Un estruendo[a] ha llegado hasta el extremo de la tierra, porque Yahvé tiene una causa[b] contra las naciones; él entra en juicio con toda carne[c]. Ha entregado a los malvados a la espada[d], declara Yahvé.
  revised_footnotes:
