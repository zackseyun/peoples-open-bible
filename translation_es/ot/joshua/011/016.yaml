    reason: lexical_alternative
  - marker: b
    text: ‘Arabá’ es un término geográfico regional; algunas versiones lo interpretan más libremente como ‘el valle del Jordán’ o ‘la llanura desértica’.
    reason: lexical_alternative
  - marker: c
    text: ‘La tierra de Gosén’ aquí se refiere a una región en Canaán, no necesariamente al Gosén de Egipto.
    reason: cultural_note
  revision_rationale: Se corrige una confusión léxica seria entre הָהָר (‘región montañosa’) y הַשְּׁפֵלָה (‘tierra baja’ / ‘Sefela’). También se alinea el texto español con la decisión documentada de la POB de usar una traducción comprensible en el texto principal para שְׁפֵלָה, dejando la transliteración regional en nota. El resto del versículo puede mantenerse con cambios mínimos.
