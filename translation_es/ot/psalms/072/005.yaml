translation:
  language: es
  text: Que te teman[a] mientras exista el sol, y antes de la luna[b], de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te temerán»; la forma hebrea también puede leerse como una afirmación futura además de una petición.'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «con el sol y delante de la luna», un modismo que expresa duración continua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִירָאוּךָ
  english_pob_choice: May they fear you
  chosen_spanish: Que te teman
  alternatives_spanish:
  - Que te reverencien
  - Te temerán
  lexicon: HALOT
  rationale: El verbo ירא conserva la idea básica de temor/reverencia. En este contexto poético y real, «teman» mantiene la fuerza léxica y la ambigüedad reverencial mejor que una explicitación como «reverencien». El subjuntivo exhortativo reproduce bien el matiz jussivo/prayer-like del inglés POB.
- source_word: עִם שָׁמֶשׁ
  english_pob_choice: as long as the sun endures
  chosen_spanish: mientras exista el sol
  alternatives_spanish:
  - con el sol
  - mientras el sol dure
  lexicon: HALOT
  rationale: עִם aquí funciona idiomáticamente como duración contemporánea, no como simple «con». «Mientras exista el sol» expresa esa duración de manera natural en español y conserva el sentido temporal del hebreo.
- source_word: וְלִפְנֵי יָרֵחַ
  english_pob_choice: and before the moon
  chosen_spanish: y delante de la luna
  alternatives_spanish:
  - y antes de la luna
  - y en presencia de la luna
  lexicon: HALOT
  rationale: לִפְנֵי es literalmente «delante de / antes de». En paralelo poético con el sol, «delante de la luna» preserva la forma léxica visible del hebreo sin forzar un español poco natural.
- source_word: דּוֹר דּוֹרִים
  english_pob_choice: through all generations
  chosen_spanish: por todas las generaciones
  alternatives_spanish:
  - de generación en generación
  - por generación tras generación
  lexicon: HALOT
  rationale: La construcción singular + plural intensifica la duración a través de sucesivas edades. «Por todas las generaciones» comunica esa amplitud con claridad y dignidad en español, manteniendo el valor inclusivo del hebreo.
theological_decisions:
- issue: Referente de «te teman» en un salmo real
  english_pob_reading: Retain the direct address 'you' without specifying whether the referent is the king, the Davidic ruler ideally, or God mediated through the king.
  chosen_spanish_reading: Mantener el «te» directo sin precisar si el referente es el rey, el gobernante davídico ideal o Dios mediado por el rey.
  alternative_spanish_readings:
  - Que teman al rey
  - Que teman a Dios
  rationale: El hebreo se dirige directamente al interlocutor y el contexto del salmo admite más de un nivel de referencia. La traducción conserva esa tensión teológica en lugar de resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el último pase de revisión: se mantuvo la elección más literal de לִפְנֵי como «delante de la luna» en lugar de una paráfrasis como «la luna permanece», y se tradujo דּוֹר דּוֹרִים con una fórmula formal de duración continua. También se evitó el calco mecánico «con el sol» al expresar el valor idiomático temporal en español.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en este proyecto; aquí no aparece ninguno de esos términos.
  - Se preserva la ambigüedad del destinatario de «te teman», conforme al audit trail del inglés POB.
  - Se prefiere un español sobrio y poético, sin introducir léxico eclesiástico no respaldado por el hebreo.
