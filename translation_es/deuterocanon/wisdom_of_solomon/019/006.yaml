translation:
  language: es
  text: Pues toda la creación[a], en su propio orden, fue formada de nuevo desde el principio, sirviendo a tus mandatos, para que tus hijos fueran preservados ilesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue formada de nuevo desde arriba». El griego ἄνωθεν puede significar «desde arriba» o «desde el principio»; διετυποῦτο también puede sugerir «ser remodelada» o «ser reformada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅλη
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - la totalidad de la
  lexicon: LSJ
  rationale: Con ἡ κτίσις en singular colectivo, el sentido es de totalidad. 'Toda la creación' suena natural en español y conserva la amplitud del griego sin añadir matices ajenos.
- source_word: κτίσις
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - orden creado
  - criatura
  lexicon: LSJ
  rationale: Aquí designa el orden creado en conjunto, no una criatura individual. 'Creación' comunica mejor el alcance cósmico del pasaje.
- source_word: ἐν ἰδίῳ γένει
  english_pob_choice: in its own nature
  chosen_spanish: en su propia naturaleza
  alternatives_spanish:
  - en su propio género
  - en su propia clase
  lexicon: LSJ
  rationale: Aunque γένει puede ser 'clase' o 'género', el POB inglés optó por 'nature' tras revisión. En español, 'naturaleza' transmite con claridad esa opción auditada sin perder la idea de pertenencia propia.
- source_word: πάλιν ἄνωθεν
  english_pob_choice: was formed anew from the beginning
  chosen_spanish: fue formada de nuevo desde el principio
  alternatives_spanish:
  - fue formada de nuevo desde arriba
  - fue reformada de nuevo desde el principio
  - fue formada de nuevo otra vez
  lexicon: LSJ
  rationale: Sigo la revisión inglesa final que privilegia 'from the beginning' en este contexto. 'Desde el principio' es la forma española más natural y preserva la tensión semántica de ἄνωθεν sin forzar una lectura vertical que el texto aquí no exige de modo decisivo.
- source_word: διετυποῦτο
  english_pob_choice: was formed
  chosen_spanish: fue formada de nuevo
  alternatives_spanish:
  - fue refaccionada
  - fue remodelada
  - fue reformada
  lexicon: LSJ
  rationale: El imperfecto pasivo indica un proceso de ser configurada/ modelada. 'Fue formada de nuevo' refleja la acción pasiva y la idea de renovación sin añadir un tecnicismo innecesario.
- source_word: ὑπηρετοῦσα
  english_pob_choice: serving
  chosen_spanish: sirviendo a
  alternatives_spanish:
  - ministrando a
  - quedando sujeta a
  lexicon: LSJ
  rationale: El participio describe a la creación en actitud de servicio a los mandatos divinos. 'Sirviendo a' es directo, fiel e idiomático en español.
- source_word: ταῖς ἰδίαις ἐπιταγαῖς
  english_pob_choice: your commands
  chosen_spanish: tus mandatos
  alternatives_spanish:
  - tus órdenes
  - tus decretos
  - tus directivas
  lexicon: LSJ
  rationale: ἐπιταγαί son mandatos u órdenes con autoridad. 'Mandatos' mantiene la fuerza imperativa y es más natural que un calco rígido. El posesivo de segunda persona se conserva porque el contexto se dirige a Dios.
- source_word: οἱ σοὶ παῖδες
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus niños
  - tus siervos
  lexicon: LSJ
  rationale: En este contexto, παῖδες se refiere al pueblo perteneciente a Dios. 'Hijos' reproduce el lenguaje filial sin restringir el alcance a un grupo meramente masculino.
- source_word: φυλαχθῶσιν ἀβλαβεῖς
  english_pob_choice: might be kept unharmed
  chosen_spanish: fueran guardados sin daño
  alternatives_spanish:
  - fueran preservados sin daño
  - fueran mantenidos sin sufrir daño
  - fueran guardados ilesos
  lexicon: LSJ
  rationale: 'El pasivo subjuntivo expresa finalidad: ser protegidos de daño. ''Guardados sin daño'' conserva el sentido protector y la relación causal con la cláusula final.'
theological_decisions:
- issue: Sentido de ἄνωθεν en la renovación de la creación
  english_pob_reading: The revised English audit trail prefers 'from the beginning' in the main text, while acknowledging 'from above' as an alternative that preserves a possible vertical/divine nuance.
  chosen_spanish_reading: Desde el principio, con la alternativa 'desde arriba' preservada implícitamente en la nota textual.
  alternative_spanish_readings:
  - desde arriba
  - de nuevo desde lo alto
  - desde el comienzo
  rationale: El griego permite tanto un matiz temporal como uno de procedencia. La revisión inglesa final favorece 'from the beginning' en este contexto. En español, 'desde el principio' es la opción más clara y no borra la posibilidad semántica de una procedencia superior, que queda documentada en la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión inglesa final cambió la preferencia previa de 'from above' a 'from the beginning' para ἄνωθεν, y de 'in its own kind' a 'in its own nature' para γένει. Esta versión española sigue esa última decisión auditada, manteniendo documentadas las alternativas semánticas relevantes.
  spanish_consistency_notes:
  - Se mantiene 'creación' para κτίσις por el alcance cósmico del texto.
  - '''Mandatos'' traduce ἐπιταγαῖς con tono de autoridad sin volverlo litúrgico.'
  - '''Hijos'' conserva el lenguaje filial de παῖδες sin reducirlo a masculinidad literal.'
  - La nota a pie de página usa un solo marcador y recoge la alternativa principal de ἄνωθεν y διετυποῦτο.
