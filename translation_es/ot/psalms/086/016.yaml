  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Siervo/sierva» concuerda con la justificación contextual para עבד / אמה en este salmo. La corrección principal es ajustar חנן a «sé bondadoso conmigo» para reflejar mejor gracia/favor que «ten piedad».
