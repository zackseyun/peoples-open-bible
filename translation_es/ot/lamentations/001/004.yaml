revisions:
- from: Las calles de Sion[a] están de duelo, porque no hay quienes vengan a la fiesta señalada; todas sus puertas están desoladas, sus sacerdotes gimen, sus vírgenes están afligidas[b], y ella misma está amargada.
  to: Los caminos de Sion[a] están de duelo, porque nadie viene a la fiesta señalada; todas sus puertas están desoladas, sus sacerdotes gimen, sus vírgenes se entristecen[b], y ella misma está amargada.
  rationale: Se corrigió «calles» a «caminos» para reflejar con mayor fidelidad דַּרְכֵי en el contexto de rutas de peregrinación hacia Sion. También se ajustó «están afligidas» a «se entristecen» para acercarse mejor al matiz lamentativo del original y al paralelismo poético del versículo, sin perder naturalidad en español. Se simplificó «no hay quienes vengan» a «nadie viene» por claridad y fluidez, manteniendo el mismo sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:44:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva la personificación femenina de Sion/Jerusalén. Sin embargo, «calles» no refleja adecuadamente דַּרְכֵי en este contexto, donde la evidencia y la auditoría inglesa apuntan a rutas/caminos de acceso de peregrinos, no a calles urbanas. Además, «están afligidas» para נּוּגוֹת es aceptable, pero «se entristecen» o «se lamentan» se alinea mejor con el campo semántico y con el paralelismo del verso.
  spanish_quality_summary: El español es claro y digno, pero «Las calles de Sion» introduce una imagen urbana más estrecha que la del original. «Fiesta señalada» es comprensible, aunque «fiesta establecida» o «fiesta señalada» son ambas viables; la redacción actual puede mantenerse. El resto fluye bien y suena natural en español eclesial moderno.
  glossary_alignment: No hay conflicto con los términos teológicos por defecto del proyecto en este versículo. La personificación femenina se preserva correctamente. La nota sobre «doncellas» como alternativa para בְּתוּלֹתֶיהָ está bien. Conviene ajustar la nota de [a] para que acompañe la traducción principal corregida.
  issues:
  - severity: high
    issue: «calles» para דַּרְכֵי צִיּוֹן
    rationale: El hebreo plural de דֶּרֶךְ aquí se refiere a caminos/rutas hacia Sion, especialmente en relación con los peregrinos que ya no llegan a la fiesta. «Calles» desplaza la imagen a vías urbanas internas y debilita la escena cultual-peregrina documentada en la auditoría inglesa.
  - severity: medium
    issue: «están afligidas» para נּוּגוֹת
    rationale: No es incorrecto, pero resulta algo estático y menos cercano al tono lamentativo de la serie «mourn / groan / grieve». Una opción como «se entristecen» refleja mejor el matiz de duelo/pena en este contexto poético.
  revised_spanish_text: Los caminos de Sion[a] están de duelo, porque nadie viene a la fiesta señalada; todas sus puertas están desoladas, sus sacerdotes gimen, sus vírgenes se entristecen[b], y ella misma está amargada.
  revised_footnotes:
