id: 1PE.5.1
reference: 1 Peter 5:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πρεσβυτέρους οὖν ἐν ὑμῖν παρακαλῶ ὁ συμπρεσβύτερος καὶ μάρτυς τῶν τοῦ Χριστοῦ παθημάτων, ὁ καὶ τῆς μελλούσης ἀποκαλύπτεσθαι δόξης κοινωνός,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/001.yaml
  text: 'Therefore I exhort the elders among you, as a fellow elder and a witness of the sufferings of the Messiah, and also a sharer in the glory that is about to be revealed:'
translation:
  language: ko
  text: '그러므로 나는 여러분 가운데 있는 장로들에게, 동료 장로요 메시아의 고난들의 증인이며 장차 나타날 영광에 함께 참여할 자로서 권합니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρεσβυτέρους
  english_pob_choice: the elders
  chosen_korean: 장로들
  alternatives_korean:
  - 연장자들
  - 원로들
  lexicon: BDAG
  rationale: 5:1-4의 문맥은 명백히 교회 직책으로서의 장로. 한국 성서 전통의 「장로」 사용.
- source_word: παρακαλῶ
  english_pob_choice: I exhort
  chosen_korean: 권합니다
  alternatives_korean:
  - 권면합니다
  - 격려합니다
  lexicon: BDAG
  rationale: 2:11의 παρακαλῶ와 통일.
- source_word: συμπρεσβύτερος
  english_pob_choice: fellow elder
  chosen_korean: 동료 장로
  alternatives_korean:
  - 함께 된 장로
  - 동역 장로
  lexicon: BDAG
  rationale: σύν- 접두사의 「공동」을 「동료」로 옮긴다.
- source_word: μάρτυς τῶν τοῦ Χριστοῦ παθημάτων
  english_pob_choice: a witness of the sufferings of the Messiah
  chosen_korean: 메시아의 고난들의 증인
  alternatives_korean:
  - 그리스도 수난의 목격자
  - 메시아의 고난을 증언하는 자
  lexicon: BDAG
  rationale: μάρτυς의 「증인」을 평이하게. 「목격증인」으로도 「증언자」로도 읽을 수 있는 모호성을 「증인」으로 보존.
- source_word: τῆς μελλούσης ἀποκαλύπτεσθαι δόξης κοινωνός
  english_pob_choice: a sharer in the glory that is about to be revealed
  chosen_korean: 장차 나타날 영광에 함께 참여할 자
  alternatives_korean:
  - 곧 계시될 영광의 동참자
  lexicon: BDAG
  rationale: κοινωνός의 「공동 참여자」를 「함께 참여할 자」로, μέλλω + 부정사를 「장차」로 옮긴다.
theological_decisions:
- issue: 5:1-4 장로 단락의 직책 명시
  chosen_reading: 「장로」 (교회 직책으로 명시)
  alternative_readings:
  - 「연장자」 (일반 어휘)
  rationale: 5:2의 「양 무리를 치라」(목양 명령)와 5:3의 「양 무리에게 본이 되라」, 5:4의 「목자장」 호칭이 모두 교회 직책으로서의 장로를 분명히 가리킨다.
  doctrine_reference: 'DOCTRINE.md: 문맥 우선'
