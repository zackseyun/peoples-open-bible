translation:
  language: es
  text: 'Y dicen[a]: «Yah no ve, y el Dios de Jacob no entiende».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah», la forma poética breve del nombre divino; compárese con la forma más común del nombre de pacto, a menudo traducida como «el SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they say
  chosen_spanish: Y decían
  alternatives_spanish:
  - Y dijeron
  lexicon: HALOT
  rationale: El hebreo es una forma narrativa pasada que en poesía puede expresar una postura habitual o característica; en español, el imperfecto («decían») comunica mejor ese valor discursivo continuo que un pretérito puntual, sin perder la fuerza de la cita.
- source_word: לֹא יִרְאֶה
  english_pob_choice: does not see
  chosen_spanish: no ve
  alternatives_spanish:
  - no verá
  - no mira
  lexicon: HALOT
  rationale: ראה aquí expresa percepción/atención visual. «No ve» conserva la imagen concreta y la implicación moral de que Yah no observa la injusticia.
- source_word: יָּהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - el SEÑOR
  - Yahvé
  lexicon: HALOT
  rationale: Se mantiene la forma breve poética del nombre divino como «Yah», no se la aplana a la convención de YHWH. En español, «Yah» preserva la distinción textual entre esta forma corta y יְהוָה.
- source_word: וְלֹא יָבִין
  english_pob_choice: and ... does not understand
  chosen_spanish: y ... no entiende
  alternatives_spanish:
  - y ... no percibe
  - y ... no discierne
  lexicon: HALOT
  rationale: בין denota entender o discernir. «No entiende» es la equivalencia más directa y natural en español, y conserva el paralelismo con «no ve».
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - el Dios de Jacob
  - el Dios de Jacob
  lexicon: HALOT
  rationale: La construcción en genitivo es un título de alianza. «El Dios de Jacob» es la forma transparente y estándar en español, manteniendo el vínculo pactual con Jacob/Israel.
theological_decisions:
- issue: Forma breve del nombre divino יָּהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: El texto fuente usa la forma poética breve, no el tetragrámaton completo. Por fidelidad al dato original y para no borrar una distinción léxica real, se conserva «Yah» en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; término contestado para YHWH'
translation_notes:
  revision_awareness: El expediente inglés indica revisión final sin cambios y alta coincidencia (0,95); por eso la versión española sigue de cerca las decisiones léxicas ya auditadas, sin introducir variantes no sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se conserva «Yah» en lugar de normalizarlo a «Yahvé» o «el SEÑOR», para no perder la forma breve poética del texto hebreo.
  - «No ve» y «no entiende» mantienen el paralelismo del hebreo y la negación de la percepción/entendimiento divinos tal como aparece en el versículo.
  - El sujeto plural implícito se expresa naturalmente con «Y decían», adecuado para la cita poética.
