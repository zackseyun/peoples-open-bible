translation:
  language: es
  text: La palabra de Yahvé que vino a Joel, hijo de Petuel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el mensaje de Yahvé que vino a Joel, hijo de Petuel».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: יְהוָה (YHWH), el Nombre divino; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: HALOT
  rationale: En la fórmula profética, דְּבַר יְהוָה puede entenderse como "palabra" o "mensaje". En español, "palabra" conserva mejor el enlace formal con la construcción profética y mantiene la resonancia bíblica sin volver la frase innecesariamente interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La POB inglesa translitera el Nombre divino. En español, "Yahvé" es la forma preferida del proyecto para representar יְהוָה sin sustituirlo por un título. Mantiene el nombre del pacto y evita la convención tradicional de ocultarlo con "SEÑOR".
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que fue a
  - que sucedió a
  lexicon: HALOT
  rationale: El giro hebreo introduce recepción de revelación profética. "Vino a" comunica de manera natural la llegada de la palabra a Joel y reproduce el sentido idiomático de הָיָה אֶל sin calco rígido.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Marcador genealógico traducido de forma natural en español. Se omite el artículo porque no está en el hebreo.
- source_word: פְּתוּאֵל
  english_pob_choice: Pethuel
  chosen_spanish: Petoel
  alternatives_spanish:
  - Petuel
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con una adaptación ortográfica que favorece la pronunciación natural. Se conserva como nombre propio sin añadir ni interpretar su etimología.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura principal del texto es el Tetragrámaton explícito. En la tradición POB, el Nombre se vierte con una transliteración del nombre revelado, no con una sustitución titulada. En español, "Yahvé" cumple esa función con claridad y lectura eclesial amplia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto inglés auditado está en pass-through estable, sin cambios de revisión aplicados y con acuerdo alto entre revisores. La versión española sigue esa lectura estable y mantiene la misma distinción entre "palabra" y la alternativa "mensaje", así como la representación explícita del Nombre divino.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - Se evita la convención tradicional de ocultar el Nombre divino tras un título.
  - La transliteración de nombres propios sigue la práctica editorial del proyecto, con adaptación hispana cuando ayuda a la pronunciación.
