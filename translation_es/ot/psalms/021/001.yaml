translation:
  language: es
  text: Para el maestro de coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el superscrito hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Al maestro de coro
  - Para el director musical
  - Para el líder
  lexicon: HALOT
  rationale: El hebreo de los encabezados de salmos usa לַ con valor superscripcional/dedicatario. En español, «Para» conserva bien esa función sin decidir en exceso entre destinatario, dedicación o instrucción. «Maestro de coro» expresa de modo natural la función musical/litúrgica que la POB inglesa captó con «choirmaster».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  - Canción
  lexicon: HALOT
  rationale: En este contexto encabezado, מִזְמוֹר es el rótulo genérico del género y el equivalente español más claro y establecido es «Salmo». Mantiene el valor de título literario-musical sin sobreexplicar.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición לְ en los encabezados puede indicar autoría, dedicación o asociación. «De David» conserva esa amplitud en español, igual que la decisión inglesa de evitar una atribución más fuerte.
theological_decisions:
- issue: Ambigüedad del superscrito davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: No se debe cerrar la posibilidad de autoría, dedicación o asociación cuando el hebreo lo deja abierto. «De David» preserva la tensión documental del encabezado, en línea con la filosofía de no resolver más de lo que el texto sustenta.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la última pasada del texto fuente: no se registran revisiones aplicadas y la lectura auditada mantiene alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «David» como nombre propio sin adaptación adicional.
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton ni una cita directa que exija esa convención.
  - El tono es sobrio y litúrgico, apto para encabezado bíblico en español moderno.
