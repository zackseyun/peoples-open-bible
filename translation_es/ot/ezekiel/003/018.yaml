translation:
  language: es
  text: 'Cuando yo le diga al malvado[a]: «Ciertamente morirás», y tú no le hayas advertido, ni le hayas hablado para advertir al malvado de su camino malvado, para que viva, ese malvado morirá en su iniquidad[b]; pero yo exigiré su sangre de tu mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al impío». El hebreo רָשָׁע designa a una persona culpable o perversa; «malvado» mantiene el sentido moral y el singular individual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por su iniquidad» o «a causa de su pecado». El hebreo permite una relación de circunstancia, causa o estado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָמְרִי
  english_pob_choice: When I say
  chosen_spanish: Cuando yo le diga
  alternatives_spanish:
  - Cuando yo hable
  - Al decir yo
  lexicon: HALOT
  rationale: La construcción temporal introducida por ב con el infinitivo/forma verbal pide una cláusula temporal natural en español. «Cuando yo le diga» conserva el valor de inicio del anuncio divino sin volverla rígida.
- source_word: לָרָשָׁע
  english_pob_choice: to the wicked man
  chosen_spanish: al malvado
  alternatives_spanish:
  - al impío
  - al hombre malvado
  lexicon: HALOT
  rationale: רָשָׁע designa a una persona culpable o perversa. «Malvado» comunica bien la carga moral en español y evita una expresión excesivamente literal o arcaica; el singular individual se mantiene.
- source_word: מוֹת תָּמוּת
  english_pob_choice: You shall surely die
  chosen_spanish: Ciertamente morirás
  alternatives_spanish:
  - Morirás sin duda
  - De cierto morirás
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la certeza del verbo. «Ciertamente morirás» conserva esa solemnidad y la fuerza enfática sin calco mecánico.
- source_word: הִזְהַרְתּוֹ
  english_pob_choice: warn him
  chosen_spanish: le hayas advertido
  alternatives_spanish:
  - lo hayas advertido
  - le hayas dado advertencia
  lexicon: HALOT
  rationale: El verbo en hiphil de זהר expresa dar advertencia. «Advertir» es el equivalente español más directo y natural en este contexto profético.
- source_word: דִבַּרְתָּ לְהַזְהִיר
  english_pob_choice: you do not speak to warn
  chosen_spanish: ni hayas hablado para advertir
  alternatives_spanish:
  - ni le hayas hablado para prevenirlo
  - ni hayas hablado con el fin de advertir
  lexicon: HALOT
  rationale: La construcción enfatiza no solo el silencio sino la omisión de hablar con propósito de advertencia. «Hablado para advertir» preserva ese valor final.
- source_word: רָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el hombre malvado
  lexicon: HALOT
  rationale: Se mantiene la repetición retórica del sustantivo calificativo en español. «Malvado» funciona con naturalidad y conserva la insistencia del hebreo.
- source_word: מִדַּרְכּוֹ הָרְשָׁעָה
  english_pob_choice: from his wicked way
  chosen_spanish: de su camino malo
  alternatives_spanish:
  - de su camino perverso
  - de su mala conducta
  lexicon: HALOT
  rationale: דֶּרֶךְ se expresa idiomáticamente como «camino». «Malo» retiene la relación con רָשָׁע sin forzar un término más técnico que suene menos natural en español.
- source_word: לְחַיֹּתוֹ
  english_pob_choice: so that he may live
  chosen_spanish: para darle vida
  alternatives_spanish:
  - para que viva
  - a fin de que viva
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa propósito. «Para darle vida» conserva el sentido de finalidad y el matiz de rescate vital presente en el hebreo.
- source_word: הוּא רָשָׁע
  english_pob_choice: that wicked man
  chosen_spanish: ese malvado
  alternatives_spanish:
  - él, siendo malvado
  - aquel malvado
  lexicon: HALOT
  rationale: El pronombre resumptivo subraya al individuo ya mencionado. «Ese malvado» mantiene el énfasis retomado sin alargar la frase.
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su iniquidad
  - a causa de su pecado
  - en su culpa
  lexicon: HALOT
  rationale: El hebreo permite una relación de circunstancia o estado. «En su iniquidad» preserva el peso jurídico-moral del término עָוֹן sin reducirlo a simple consecuencia.
- source_word: דָּמוֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - su vida
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de sangre como idiomática jurídica y judicial. Traducirla como «vida» debilitaría la fuerza forense del hebreo.
- source_word: מִיָּדְךָ אֲבַקֵּשׁ
  english_pob_choice: I will require his blood from your hand
  chosen_spanish: yo exigiré su sangre de tu mano
  alternatives_spanish:
  - yo reclamaré su sangre de tu mano
  - te pediré cuenta de su sangre
  lexicon: HALOT
  rationale: בקשׁ con «de tu mano» es un giro judicial de responsabilidad. «Exigiré su sangre de tu mano» conserva el idioma legal y la solemnidad del acto de rendición de cuentas.
theological_decisions:
- issue: Alcance de la muerte y la vida anunciadas
  english_pob_reading: Render the terms straightforwardly as 'die' and 'live' without specifying physical-only or spiritual-only death/life.
  chosen_spanish_reading: Traducir «morir» y «darle vida» sin precisar si se trata solo de muerte física o espiritual.
  alternative_spanish_readings:
  - morirá físicamente / vivirá espiritualmente
  - será condenado / será salvo
  rationale: El versículo mantiene una tensión covenantal y moral que no conviene cerrar con una precisión no explicitada por el hebreo. La redacción española deja abierto el alcance tal como lo hace el texto fuente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor jurídico de exigir la sangre
  english_pob_reading: I will require his blood from your hand
  chosen_spanish_reading: «Exigiré su sangre de tu mano» como fórmula de responsabilidad judicial.
  alternative_spanish_readings:
  - te haré responsable de su sangre
  - pediré cuenta de su sangre
  rationale: El hebreo expresa una imagen forense de rendición de cuentas. La formulación española conserva la tensión judicial sin explicar en exceso la metáfora.
  doctrine_reference: 'Translation philosophy §5: Preserve judicial idioms when they carry theological force.'
- issue: Tratamiento del sujeto individual masculino
  english_pob_reading: Use 'wicked man' in the main text.
  chosen_spanish_reading: Usar un singular masculino individual («el malvado», «ese malvado»).
  alternative_spanish_readings:
  - la persona malvada
  - el impío
  rationale: El hebreo usa un singular masculino específico; mantenerlo conserva la precisión gramatical y retórica del pasaje.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora cada nota al pie está anclada explícitamente en el texto español con los marcadores [a] y [b]. Se mantuvo la lectura judicial de «exigiré su sangre de tu mano» y la tensión semántica de muerte/vida sin especificación añadida.'
  spanish_consistency_notes:
  - Se mantuvo «malvado» como equivalente consistente de רָשָׁע para conservar el tono moral del hebreo.
  - Se conservó la metáfora forense de «sangre» y «de tu mano» en lugar de parafrasearla.
  - «Advertir/advertencia» se usa de manera uniforme para הִזְהַרְתָּ / לְהַזְהִיר.
  - «Camino malo» preserva la imagen bíblica de conducta como camino.
  - La puntuación española separa la cita directa y conserva el paralelismo del versículo.
