translation:
  language: es
  text: Después de Ahitofel vinieron Jehoiada hijo de Benaía y Abiatar[a]; Joab fue comandante del ejército para el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Después de Ahitofel, Jehoiada hijo de Benaía y Abiatar». El hebreo deja el verbo implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  english_pob_choice: After ... came
  chosen_spanish: Después de ...
  alternatives_spanish:
  - Y después de ...
  - Tras ...
  lexicon: HALOT
  rationale: אַחֲרֵי indica sucesión temporal. En español, «Después de...» conserva ese valor sin añadir más contenido del que el hebreo exige. Se evita formular un verbo explícito como «vino» o «siguió» porque el texto hebreo deja el verbo implícito.
- source_word: אֲחִיתֹפֶל
  english_pob_choice: Ahithophel
  chosen_spanish: Ahitofel
  alternatives_spanish:
  - Ahitófel
  lexicon: Nombre propio
  rationale: Nombre propio hebreo transliterado con ortografía española natural. Se mantiene la forma reconocible y estable en español bíblico.
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Jehoiada
  alternatives_spanish:
  - Yehoyadá
  - Joiada
  lexicon: Nombre propio
  rationale: Nombre propio; se conserva una transliteración tradicional y clara para lectores de Biblia en español.
- source_word: בֶּן בְּנָיָהוּ
  english_pob_choice: son of Benaiah
  chosen_spanish: hijo de Benaía
  alternatives_spanish:
  - hijo de Benaías
  - el hijo de Benaía
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se vierte de manera natural como «hijo de». Se usa «Benaía» como forma española del nombre propio.
- source_word: וְ/אֶבְיָתָר
  english_pob_choice: and Abiathar
  chosen_spanish: y Abiatar
  alternatives_spanish:
  - y Abiathar
  lexicon: Nombre propio
  rationale: Conjunción simple más nombre propio. «Abiatar» es la forma española habitual y clara.
- source_word: וְ/שַׂר צָבָא
  english_pob_choice: and ... was commander of the army
  chosen_spanish: y era comandante del ejército
  alternatives_spanish:
  - y era jefe del ejército
  - y fue comandante del ejército
  lexicon: HALOT
  rationale: שַׂר צָבָא designa un cargo militar de mando. En español, «comandante del ejército» transmite bien la función sin desplazarla a términos más interpretativos como «general».
- source_word: לַ/מֶּלֶךְ
  english_pob_choice: for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - del rey
  - al rey
  lexicon: HALOT
  rationale: El ל prefijado expresa relación/servicio respecto del rey. «Para el rey» conserva esa relación funcional y coincide con el matiz del audit trail inglés.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Yoab
  lexicon: Nombre propio
  rationale: Nombre propio transliterado con la forma usual en español bíblico.
theological_decisions:
- issue: Verbo implícito en la lista administrativa
  english_pob_reading: The Hebrew leaves the verb implied.
  chosen_spanish_reading: El hebreo deja el verbo implícito; el español no añade un verbo de movimiento y solo explicita lo necesario en la cláusula final.
  alternative_spanish_readings:
  - Después de Ahitofel vino Jehoiada hijo de Benaía y Abiatar;
  - Tras Ahitofel siguieron Jehoiada hijo de Benaía y Abiatar;
  rationale: No hay tensión doctrinal, sino una decisión sintáctica. Se preserva la elipsis hebrea en la primera cláusula y se mantiene la claridad natural del español.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Se revisó el pasaje con el estado de revisión más reciente indicado como sin cambios y con alto acuerdo general; por eso no se introdujeron ajustes textuales adicionales respecto del sentido del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se prefieren nombres propios en formas españolas reconocibles: Ahitofel, Jehoiada, Benaía, Abiatar y Joab.'
  - Se conservó la elipsis del hebreo en la primera mitad del verso para no sobreinterpretar la estructura sintáctica.
