translation:
  language: es
  text: 'Y después de apartarlo, ordenó que trajeran al otro. Y le dijo: «Descendencia[a] de Canaán, y no de Judá, la belleza te engañó, y el deseo corrompió tu corazón[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Simiente de Canaán, y no de Judá». La frase es una denuncia aguda que contrapone una identidad cananea corrupta con Judá.
    reason: lexical_alternative
  - marker: b
    text: O «la lujuria pervirtió tu corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστήσας
  english_pob_choice: after removing him
  chosen_spanish: después de apartarlo
  alternatives_spanish:
  - después de retirarlo
  - después de moverlo aparte
  lexicon: LSJ
  rationale: El participio aoristo expresa que primero lo apartó antes de examinar al otro. «Apartarlo» conserva la acción procedimental sin añadir una localización no explícita.
- source_word: ἐκέλευσεν προσαγαγεῖν
  english_pob_choice: he ordered ... to be brought forward
  chosen_spanish: ordenó que trajeran ...
  alternatives_spanish:
  - mandó que lo presentaran
  - ordenó que lo presentaran
  lexicon: LSJ
  rationale: La construcción expresa una orden para presentar a la otra persona. «Que trajeran» suena natural en español y mantiene el sentido judicial de comparecer.
- source_word: τὸν ἕτερον
  english_pob_choice: the other one
  chosen_spanish: al otro
  alternatives_spanish:
  - al otro hombre
  - al segundo
  lexicon: LSJ
  rationale: ἕτερος señala al segundo de los dos ancianos. «Al otro» es fiel y no añade sustantivos ausentes en el griego.
- source_word: Σπέρμα Χανάαν
  english_pob_choice: Offspring/Seed of Canaan
  chosen_spanish: Simiente de Canaán
  alternatives_spanish:
  - Descendencia de Canaán
  - Simiente de Canaan
  lexicon: LSJ
  rationale: «Simiente» conserva la metáfora genealógica e insultante de σπέρμα. «Descendencia» sería más explicativa, pero menos incisiva; «simiente» mantiene mejor la dureza retórica del reproche.
- source_word: καὶ οὐκ Ἰούδα
  english_pob_choice: and not Judah
  chosen_spanish: y no de Judá
  alternatives_spanish:
  - y no Judá
  - sino no de Judá
  lexicon: LSJ
  rationale: El contraste es entre un origen corrupto y la pertenencia a Judá. En español, «de Judá» hace explícita la relación de linaje implícita en la frase griega, sin alterar su tersura.
- source_word: τὸ κάλλος
  english_pob_choice: beauty
  chosen_spanish: la belleza
  alternatives_spanish:
  - la hermosura
  - el encanto
  lexicon: LSJ
  rationale: κάλλος significa belleza o hermosura. «La belleza» es claro y suficiente; el contexto erótico ya señala el tipo de atracción implicado.
- source_word: ἐξηπάτησέν σε
  english_pob_choice: has deceived you
  chosen_spanish: te engañó
  alternatives_spanish:
  - te ha engañado
  - te extravió
  lexicon: LSJ
  rationale: El verbo intensifica el engaño, pero en español «engañó» transmite bien la idea de seducción y es más idiomático en esta recriminación directa.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - la concupiscencia
  - la lujuria
  lexicon: LSJ
  rationale: La elección base es más amplia que «lujuria». «El deseo» preserva el término de forma menos interpretativa, dejando que el contexto moral de la reprensión le dé su fuerza negativa.
- source_word: διέστρεψεν τὴν καρδίαν σου
  english_pob_choice: has corrupted your heart
  chosen_spanish: corrompió tu corazón
  alternatives_spanish:
  - pervirtió tu corazón
  - torció tu corazón
  lexicon: LSJ
  rationale: διαστρέφω expresa distorsión o perversión moral. «Corrompió» responde bien al contexto ético de la acusación y sigue la revisión inglesa más reciente, sin perder la noción de daño interior.
theological_decisions:
- issue: Insulto genealógico «Σπέρμα Χανάαν καὶ οὐκ Ἰούδα»
  english_pob_reading: Retain the genealogical/metaphorical insult literally rather than paraphrasing it as merely 'you act like a Canaanite.'
  chosen_spanish_reading: 'Mantener el insulto genealógico literalmente: «Simiente de Canaán, y no de Judá».'
  alternative_spanish_readings:
  - «Eres de Canaán, no de Judá»
  - «Te comportas como cananeo, no como judío»
  rationale: El griego formula una acusación directa mediante lenguaje de linaje. Traducirlo literalmente preserva la dureza retórica y la oposición de pertenencia/covenio sin suavizarla en una simple observación moral.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Fuerza moral de ἐπιθυμία
  english_pob_reading: Render as 'desire' in the main text rather than 'lust.'
  chosen_spanish_reading: Usar «deseo» en el texto principal, no «lujuria».
  alternative_spanish_readings:
  - «lujuria»
  - «concupiscencia»
  rationale: Aunque el contexto es sexual y culpable, el sustantivo griego es más amplio. «Deseo» mantiene la amplitud léxica y deja que la reprensión determine su carácter pecaminoso.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Doble finalidad del reproche en clave ética y judicial
  english_pob_reading: A judicial/interrogation context is preserved by 'brought forward' and a sharp denunciation is retained.
  chosen_spanish_reading: Conservar el marco de comparecencia judicial y el tono de denuncia mordaz.
  alternative_spanish_readings:
  - «presentaran al otro»
  - «trajeran al otro adelante»
  rationale: El texto no es una mera conversación privada, sino una escena de examen. La formulación española debe sonar procesal sin volverla artificiosa.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «Seed of Canaan» por «Offspring of Canaan» y «twisted your heart» por «corrupted your heart». En español se optó por conservar la metáfora genealógica fuerte de «simiente» y reflejar el resultado moral con «corrompió», siguiendo la dirección revisada del sentido sin perder la intensidad del original griego.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - «Simiente» se usa de forma consistente cuando la metáfora genealógica es parte del reproche y requiere dureza retórica.
  - «Deseo» se reserva aquí para preservar la amplitud del griego ἐπιθυμία; otras secciones pueden usar términos más específicos si el contexto lo exige.
