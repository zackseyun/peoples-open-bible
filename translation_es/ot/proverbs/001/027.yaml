translation:
  language: es
  text: cuando venga vuestro pavor como una tormenta[a], y vuestra calamidad llegue como un torbellino, cuando vengan sobre ustedes la aflicción y la angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como devastación»; el término hebreo puede enfatizar la ruina destructiva tanto como la fuerza de un temporal violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֹא
  english_pob_choice: when ... comes
  chosen_spanish: cuando venga / llegue / vengan
  alternatives_spanish:
  - al venir
  - en el venir de
  - cuando viene
  lexicon: HALOT
  rationale: La construcción preposicional con infinitivo expresa una cláusula temporal; en español, «cuando» reproduce con naturalidad ese valor sin endurecer la sintaxis. Se varía el verbo («venga», «llegue», «vengan») para mantener el paralelismo y el ritmo poético.
- source_word: כְשָׁאוָה
  english_pob_choice: like a storm
  chosen_spanish: como una tormenta[a]
  alternatives_spanish:
  - como devastación
  - como ruina
  - como un vendaval
  lexicon: HALOT
  rationale: El término hebreo puede señalar destrucción repentina o el golpe de una tempestad violenta. «Tormenta» conserva la imagen dinámica y aterradora que el audit trail inglés resolvió con «storm», sin perder la posibilidad semántica de devastación, que se anota aparte.
- source_word: פַּחְדְּכֶם
  english_pob_choice: your dread
  chosen_spanish: tu pavor
  alternatives_spanish:
  - tu miedo
  - lo que temes
  - tu terror
  lexicon: HALOT
  rationale: En este contexto la palabra no es solo emoción abstracta, sino el espanto anticipado ante el juicio. «Pavor» transmite mejor esa intensidad que «miedo» y mantiene el tono elevado del proverbio.
- source_word: וְאֵידְכֶם
  english_pob_choice: and your calamity
  chosen_spanish: y tu calamidad
  alternatives_spanish:
  - y tu desastre
  - y tu ruina
  - y tu desgracia
  lexicon: HALOT
  rationale: «Calamidad» corresponde de manera bastante directa a איד y conserva el registro formal. Otras opciones son posibles, pero esta mantiene bien la relación con la imagen de desastre que domina el verso.
- source_word: כְּסוּפָה
  english_pob_choice: like a whirlwind
  chosen_spanish: como un torbellino
  alternatives_spanish:
  - como un vendaval
  - como una tempestad
  - como un huracán
  lexicon: HALOT
  rationale: La comparación apunta a un viento violento y arremolinado; «torbellino» reproduce ese movimiento súbito y concentrado. Se evita «huracán» por anacronismo climatológico y «vendaval» por menor precisión del remolino.
- source_word: יֶאֱתֶה
  english_pob_choice: arrives
  chosen_spanish: llegue
  alternatives_spanish:
  - venga
  - arribe
  - se presente
  lexicon: HALOT
  rationale: El verbo expresa llegada o irrupción. «Llegue» resulta natural en español y mantiene la idea de que la calamidad se acerca y se hace presente de forma repentina.
- source_word: עֲלֵיכֶם
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - contra ustedes
  - encima de ustedes
  - sobre vosotros
  lexicon: HALOT
  rationale: «Sobre ustedes» conserva la imagen de peso o invasión adversa que sugiere על en este contexto. Se opta por el tratamiento de segunda persona plural neutral latinoamericano.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: la angustia
  alternatives_spanish:
  - la aflicción
  - la tribulación
  - el apuro
  lexicon: HALOT
  rationale: Para el segundo hemistiquio, «angustia» funciona bien como término de presión y aflicción, y permite emparejarse con צוּקָה sin repetir exactamente el mismo matiz de «calamidad».
- source_word: וְצוּקָה
  english_pob_choice: and anguish
  chosen_spanish: y la opresión
  alternatives_spanish:
  - y la angustia
  - y la aflicción
  - y la angustia apremiante
  lexicon: HALOT
  rationale: צוּקָה expresa estrechez, presión o constricción; «opresión» comunica esa sensación de encierro y peso. Se evita fundirla con צָרָה para respetar la distinción poética entre ambos términos.
theological_decisions:
- issue: Imagen de juicio inminente expresada por términos dobles de desastre
  english_pob_reading: 'The verse stacks two parallel disaster images: a storm/whirlwind and then distress/anguish coming upon the hearers.'
  chosen_spanish_reading: 'El verso acumula imágenes paralelas de desastre: tormenta/torbellino y luego angustia/opresión que sobrevienen a los oyentes.'
  alternative_spanish_readings:
  - Una sola imagen general de castigo sin distinguir los pares
  - Reducir los términos finales a un solo sinónimo
  rationale: No hay una doctrina controversial aquí, pero sí una tensión poética que conviene preservar. La duplicación de vocabulario intensifica la certeza y la cercanía del desastre; por eso la traducción mantiene dos pares semánticos y no los nivela.
  doctrine_reference: Poética sapiencial del juicio; paralelismo hebreo
translation_notes:
  revision_awareness: El audit trail inglés quedó en acuerdo alto y sin revisiones aplicadas; esta versión sigue de cerca sus decisiones léxicas, especialmente la lectura temporal de בְּבֹא, la comparación de שָׁאוָה con una imagen de tormenta/destrucción, y la distinción entre צָרָה y צוּקָה en el cierre del verso.
  spanish_consistency_notes:
  - Se usa tratamiento plural de segunda persona con 'ustedes' para coherencia latinoamericana.
  - 'Se preserva el paralelismo mediante verbos distintos pero equivalentes: ''venga'', ''llegue'', ''vengan''.'
  - La nota [a] se ancla en 'tormenta' para reflejar la alternativa lexical del hebreo.
