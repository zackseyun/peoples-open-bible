translation:
  language: es
  text: 'Y respondieron en voz alta, diciendo: «Tú eres nuestro líder en lugar de Judas y de Jonatán, tu hermano».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dijeron
  lexicon: BDAG
  rationale: El aoristo de ἀποκρίνομαι se expresa de forma natural en español con «respondieron». Conserva el valor narrativo directo sin volver la frase demasiado solemne o arcaica.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con voz alta
  lexicon: BDAG
  rationale: La expresión griega es idiomática para manera. «Con voz fuerte» mantiene la imagen concreta de la voz elevada; «en voz alta» sería más idiomático, pero menos literal.
- source_word: ἡγούμενος
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - gobernante
  - comandante
  lexicon: BDAG
  rationale: El contexto político-militar permite varias opciones. «Líder» reproduce bien la amplitud de ἡγούμενος sin cargar el término con un oficio más específico que el griego no exige.
- source_word: ἀντί
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - como sucesor de
  lexicon: BDAG
  rationale: ἀντί indica sustitución o sucesión. «En lugar de» es una correspondencia clara y digna en español, y preserva la idea de reemplazo establecida por el texto.
- source_word: Ἰούδου
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: Nombre propio griego
  rationale: En 1 Macabeos, el nombre personal se vierte como «Judas» para evitar confusión con «Judá» y conservar la forma tradicional del personaje Judas Macabeo.
- source_word: Ἰωνάθου
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Nombre propio griego
  rationale: Se usa «Jonatán», forma habitual y plenamente inteligible en español bíblico, en vez del calco inglés. Mantiene el nombre propio sin añadir interpretación.
- source_word: τοῦ ἀδελφοῦ σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - su hermano
  - el hermano tuyo
  lexicon: BDAG
  rationale: El genitivo apposicional identifica a Jonatán como hermano de Simón. «Tu hermano» conserva esa relación familiar de manera directa y natural en español.
theological_decisions:
- issue: Alcance del título ἡγούμενος aplicado a Simón
  english_pob_reading: leader
  chosen_spanish_reading: líder
  alternative_spanish_readings:
  - gobernante
  - comandante
  - jefe
  rationale: La escena reconoce a Simón como quien toma la dirección tras Judas y Jonatán, pero el griego no fuerza una investidura monárquica ni un cargo técnico cerrado. «Líder» mantiene la amplitud del término y evita importar una formulación institucional no explícita.
  doctrine_reference: 'Principio de equivalencia óptima: respetar el alcance semántico del texto sin ampliar su carga histórica o doctrinal.'
translation_notes:
  revision_awareness: El texto griego y la pauta inglesa muestran plena concordancia; no hay notas textuales ni revisiones previas que requieran reflejo especial en español. Se conserva la estructura simple del versículo y la relación de sucesión entre Judas, Jonatán y Simón.
  spanish_consistency_notes:
  - Se mantiene «líder» para ἡγούμενος, coherente con la pauta inglesa y con el contexto de sucesión política.
  - Se usa «Judas» para Ἰούδου y «Jonatán» para Ἰωνάθου, evitando mezclas entre formas hispanizadas e inglesas.
  - «Con voz fuerte» refleja la imagen concreta del griego y conserva un registro bíblico claro y contemporáneo.
