translation:
  language: es
  text: 'Recuerda su porción asignada[a], porque es tu porción asignada: su ayer[b], y tu hoy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su decreto» / «su suerte». El hebreo חק suele significar «estatuto» o «decreto», pero aquí probablemente se refiere a la porción o destino asignado a cada persona en la muerte.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego dice: «No entregues tu corazón al dolor; apártalo, recordando las cosas postreras». Esto apoya el enfoque del versículo en la mortalidad, aunque aquí la redacción hebrea es distinta.'
    reason: alternative_reading
lexical_decisions:
- source_word: זכור
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Recuerda bien
  lexicon: HALOT
  rationale: Imperativo de זכר; en español, «Recuerda» conserva el llamado directo a la memoria activa sin añadir explicación innecesaria.
- source_word: חקו
  english_pob_choice: his decree
  chosen_spanish: su decreto
  alternatives_spanish:
  - su estatuto
  - su lote
  - su porción asignada
  lexicon: HALOT
  rationale: El contexto funerario permite en español mantener el matiz de «decreto» como algo fijado para la condición humana. Aunque el audit trail también contempla el sentido de «lot/portion», la revisión más reciente favorece «decreto», y eso se refleja aquí.
- source_word: כי הוא חקך
  english_pob_choice: for it is your decree
  chosen_spanish: porque es tu decreto
  alternatives_spanish:
  - porque es tu lote
  - porque es tu porción asignada
  - porque es tu estatuto
  lexicon: HALOT
  rationale: La cláusula universaliza el destino del muerto hacia el oyente. «Porque es tu decreto» mantiene la relación semántica con חק y la simetría con la primera frase.
- source_word: לו אתמול ולך היום
  english_pob_choice: his yesterday, and your today
  chosen_spanish: su ayer, y tu hoy
  alternatives_spanish:
  - ayer para él, y hoy para ti
  - su ayer, y tu día de hoy
  lexicon: HALOT
  rationale: Se conserva la compresión poética del hebreo. «Su ayer, y tu hoy» comunica la antítesis temporal sin expandirla más allá de lo que el texto exige.
theological_decisions:
- issue: Sentido de חק en contexto de muerte y duelo
  english_pob_reading: appointed lot/shared human destiny
  chosen_spanish_reading: decreto fijado para la condición humana
  alternative_spanish_readings:
  - lote compartido
  - porción asignada
  - estatuto
  rationale: El contexto no es jurídico en sentido estricto sino meditativo sobre la mortalidad. «Decreto» conserva la idea de algo establecido; en español, el giro mantiene la tensión entre estatuto y destino sin convertirlo en mera fortuna.
  doctrine_reference: Translation philosophy §1, §5
- issue: Compresión final del paralelo hebreo
  english_pob_reading: retain the poetic ellipsis in English
  chosen_spanish_reading: mantener la elipsis poética en español
  alternative_spanish_readings:
  - 'explicar: «su ayer fue él, y tu hoy eres tú»'
  - 'expandir: «él murió ayer, y tú hoy»'
  rationale: La línea final es deliberadamente tersa. La versión española conserva esa tersura para no borrar el paralelismo ni sobrerinterpretar el hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación con la tradición textual griega
  english_pob_reading: The Greek parallel reads differently... This supports the verse's focus on mortality, though the Hebrew wording here is distinct.
  chosen_spanish_reading: El paralelo griego se registra como lectura alternativa que enfatiza la mortalidad.
  alternative_spanish_readings:
  - fusionar la lectura griega con el hebreo en el texto principal
  - omitir la referencia al griego
  rationale: 'La fuente hebrea es el texto base aquí, pero el paralelo griego aporta una tensión real: en lugar de una exhortación a no entristecer el corazón, el hebreo formula una sentencia sobre el decreto humano. La traducción principal sigue el hebreo y no borra esa diferencia.'
  doctrine_reference: Translation philosophy §3, §7
translation_notes:
  revision_awareness: El audit trail en inglés muestra una revisión relevante de «lot» a «decree» para חק, además de una nota que reconoce el paralelo griego con una lectura distinta orientada a la mortalidad. Por eso el español adopta «decreto» en el texto principal y conserva una nota de alternativa léxica para no perder la tensión entre destino asignado y decreto fijado.
  spanish_consistency_notes:
  - Se usa «decreto» para חק, coherente con la revisión más reciente del POB en inglés.
  - Se evita «SEÑOR» o lenguaje cultual no presente en el texto fuente.
  - 'La sintaxis conserva el paralelismo terso del hebreo: dos miembros breves y antitéticos.'
  - Se prefiere «Recuerda» frente a paráfrasis como «ten presente», por mayor cercanía al imperativo hebreo.
