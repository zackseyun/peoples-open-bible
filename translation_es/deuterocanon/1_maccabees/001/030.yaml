translation:
  language: es
  text: Y les habló palabras de paz[a] con engaño, y ellos confiaron en él; entonces cayó sobre la ciudad de repente, le asestó un gran golpe, y destruyó a muchos del pueblo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «palabras pacíficas». La expresión griega puede renderizarse más literalmente de ese modo; «palabras de paz» se eligió por ser más natural en español y por conservar la idea de habla conciliadora usada con engaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: BDAG / LEH
  rationale: El verbo narrativo básico exige un verbo simple y directo. «Habló» conserva el acto de comunicación sin añadir matices ajenos.
- source_word: λόγους εἰρηνικούς
  english_pob_choice: peaceable words
  chosen_spanish: palabras de paz
  alternatives_spanish:
  - palabras pacíficas
  - palabras de paz y conciliación
  lexicon: LEH
  rationale: La construcción griega es literalmente «palabras pacíficas/de paz». En español, «palabras de paz» es transparente y fiel, y mantiene la posibilidad de habla conciliadora usada como maniobra.
- source_word: ἐν δόλῳ
  english_pob_choice: deceitfully
  chosen_spanish: engañosamente
  alternatives_spanish:
  - con engaño
  - con deceit
  - con dolo
  lexicon: BDAG
  rationale: La frase expresa el modo del hablar. «Engañosamente» comunica el adverbio de manera natural en español; «con engaño» también sería posible, pero suena un poco más nominal.
- source_word: ἐπίστευσαν αὐτῷ
  english_pob_choice: they trusted him
  chosen_spanish: confiaron en él
  alternatives_spanish:
  - le creyeron
  - pusieron confianza en él
  lexicon: BDAG
  rationale: Aquí πιστεύω no es un uso doctrinal, sino la aceptación práctica de sus seguridades. «Confiaron en él» recoge bien el sentido narrativo de aceptar lo que decía.
- source_word: ἐπέπεσεν ἐπὶ τὴν πόλιν
  english_pob_choice: he fell upon the city
  chosen_spanish: cayó sobre la ciudad
  alternatives_spanish:
  - atacó la ciudad
  - se lanzó contra la ciudad
  lexicon: LEH
  rationale: La imagen literal de «caer sobre» conserva la viveza del griego. «Atacó» sería más interpretativo; aquí se prefiere mantener la metáfora bélica.
- source_word: ἐξαίφνα
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - de improviso
  - inesperadamente
  lexicon: BDAG
  rationale: Adverbio simple de súbita irrupción. «De repente» es la forma más natural y fiel en español.
- source_word: ἐπάταξεν αὐτὴν πληγὴν μεγάλην
  english_pob_choice: struck it a great blow
  chosen_spanish: la hirió con un gran golpe
  alternatives_spanish:
  - le asestó un gran golpe
  - la golpeó con fuerza
  lexicon: LEH
  rationale: El griego combina el verbo de golpear con el sustantivo πληγὴν. «La hirió con un gran golpe» conserva el valor violento sin forzar una concreción que el texto no explicita.
- source_word: ἀπώλεσεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - mató
  - arruinó
  - aniquiló
  lexicon: BDAG
  rationale: El verbo puede significar destruir o matar según contexto. Dado el objeto humano, «destruyó» mantiene amplitud y violencia sin estrechar indebidamente el sentido.
- source_word: λαὸν πολὺν
  english_pob_choice: many people
  chosen_spanish: mucho pueblo
  alternatives_spanish:
  - mucha gente
  - gran multitud de gente
  - muchas personas
  lexicon: LEH
  rationale: El griego habla de un gran número colectivo. «Mucho pueblo» conserva el sustantivo colectivo del texto y su tono histórico, aunque en español moderno puede sonar menos corriente que «muchas personas».
- source_word: ἐξ Ἰσραήλ
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - procedentes de Israel
  lexicon: BDAG
  rationale: El genitivo/preposición identifica a los destruidos como pertenecientes a Israel. «De Israel» es la forma natural y acorde con la revisión inglesa más reciente.
theological_decisions:
- issue: Uso de una frase engañosa para describir palabras de paz
  english_pob_reading: peaceable words to them deceitfully
  chosen_spanish_reading: palabras de paz engañosamente
  alternative_spanish_readings:
  - palabras de paz con engaño
  - palabras pacíficas de modo engañoso
  rationale: El texto muestra una tensión intencional entre el contenido conciliador y el propósito fraudulento. La traducción mantiene ambos elementos sin suavizar la ironía narrativa.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión semántica y el sentido contextual sin armonizarlo prematuramente.'
- issue: ἐπίστευσαν αὐτῷ en contexto narrativo no doctrinal
  english_pob_reading: they trusted him
  chosen_spanish_reading: confiaron en él
  alternative_spanish_readings:
  - le creyeron
  - pusieron su confianza en él
  rationale: Aunque πιστεύω puede tener peso teológico, aquí describe la respuesta práctica a sus promesas. «Confiaron en él» evita cargar el versículo con terminología doctrinal ajena al contexto.
  doctrine_reference: 'DOCTRINE.md: conservar el sentido de fuente según contexto, especialmente cuando un término común adquiere sentido técnico solo en ciertos pasajes.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para λόγους εἰρηνικούς ἐν δόλῳ y ajustó ἐξ Ἰσραήλ a «of Israel». El español sigue esa orientación, manteniendo la metáfora bélica y la ambigüedad entre la paz aparente y el engaño real.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma POB, pero este versículo no lo contiene.
  - «Confiaron en él» refleja πιστεύω en sentido narrativo, no doctrinal.
  - «Mucho pueblo de Israel» mantiene el tono colectivo del griego; no se reduce a «personas» para no perder la formulación bíblica.
  - La nota a pie marca la alternativa literal de λόγους εἰρηνικούς sin reescribir el texto principal.
