theological_decisions:
- issue: Divine causation of the enemies' mental state
  chosen_reading: God actively caused forgetfulness in the minds of those plotting harm
  alternative_readings:
  - God merely permitted them to forget
  - God providentially brought about confusion without direct causation
  rationale: The Greek explicitly attributes the action to 'the working of God' and uses the participle ἐντεθεικότος ('having implanted/put in'), which presents direct divine agency rather than mere permission. The translation preserves that tension without softening it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referent of αὐτῷ
  chosen_reading: rendered contextually as 'them' referring to the targeted Jewish people
  alternative_readings:
  - '''him'' if taken as a singular representative referent'
  - '''it'' if taken more abstractly'
  rationale: Although the form is singular, the narrative context concerns hostile plans against the Jewish community. English requires a clearer referent; 'them' communicates the collective object of the plotting without forcing an unnatural singular.
