    text: Ramá era una ciudad asociada con el territorio de Benjamín; Raquel es presentada poéticamente como la matriarca que llora por sus descendientes.
    reason: cultural_note
  revision_rationale: Se corrige el error semántico principal cambiando el tramo final para reflejar el sentido contextual y la nota del POB, y se reordenan las notas al pie para que coincidan con el audit trail inglés. Se mantiene el resto de la estructura del borrador, con un ajuste estilístico menor a 'llanto amargo' y una formulación más natural de la cláusula final.
