translation:
  language: es
  text: Y el sacerdote que ha sido ungido y cuya mano fue llenada[a] para servir como sacerdote en lugar de su padre hará expiación, y se pondrá las vestiduras de lino, las vestiduras santas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "cuya mano fue llenada", un modismo para ser ordenado o instalado en el servicio sacerdotal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará propiciación
  - realizará la expiación ritual
  lexicon: HALOT
  rationale: En contexto cultual, כפר expresa efectuar la expiación/atonación prescrita. 'Hará expiación' conserva el valor ritual y es natural en español bíblico contemporáneo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el sacerdote'. Aunque el contexto apunta al sucesor sacerdotal principal, se conserva la designación del texto sin añadir un título no dicho explícitamente.
- source_word: אֲשֶׁר יִמְשַׁח אֹתוֹ
  english_pob_choice: who is anointed
  chosen_spanish: que ha sido ungido
  alternatives_spanish:
  - que será ungido
  - a quien unge
  lexicon: HALOT
  rationale: La cláusula relativa identifica al sacerdote por su consagración. El pasivo en español comunica de modo natural el estado resultante de la unción.
- source_word: וַאֲשֶׁר יְמַלֵּא אֶת יָדוֹ
  english_pob_choice: and whose hand is filled
  chosen_spanish: y cuya mano ha sido llena
  alternatives_spanish:
  - y que ha sido ordenado
  - y que ha sido instalado
  lexicon: HALOT
  rationale: Se preserva el giro hebreo 'llenar la mano' para no borrar la imagen idiomática documentada. La nota a pie aclara su sentido de instalación/ordenación.
- source_word: לְכַהֵן
  english_pob_choice: to serve as priest
  chosen_spanish: para servir como sacerdote
  alternatives_spanish:
  - para ministrar como sacerdote
  - para ejercer como sacerdote
  lexicon: HALOT
  rationale: La forma infinitiva expresa función/servicio sacerdotal. 'Servir como sacerdote' es claro y fiel al oficio.
- source_word: תַּחַת אָבִיו
  english_pob_choice: in place of his father
  chosen_spanish: en lugar de su padre
  alternatives_spanish:
  - en vez de su padre
  - tras su padre
  lexicon: HALOT
  rationale: תחת marca sucesión o sustitución en el cargo. 'En lugar de' comunica esa continuidad hereditaria.
- source_word: וְלָבַשׁ
  english_pob_choice: and he shall put on
  chosen_spanish: y se pondrá
  alternatives_spanish:
  - y vestirá
  - y se colocará
  lexicon: HALOT
  rationale: El verbo denota ponerse una prenda. 'Se pondrá' mantiene la secuencia ritual en español natural.
- source_word: בִּגְדֵי הַבָּד
  english_pob_choice: the linen garments
  chosen_spanish: las vestiduras de lino
  alternatives_spanish:
  - las prendas de lino
  - los vestidos de lino
  lexicon: HALOT
  rationale: En contexto sacerdotal, בד refiere a lino. 'Vestiduras de lino' conserva el registro ceremonial sin sonar arcaico.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: las vestiduras santas
  alternatives_spanish:
  - las vestiduras sagradas
  - las prendas santas
  lexicon: HALOT
  rationale: El paralelo explicativo identifica las vestiduras de lino como consagradas. 'Santas' preserva la relación lexical con קדשׁ.
theological_decisions:
- issue: Si traducir הַכֹּהֵן como 'sumo sacerdote' o mantener 'el sacerdote'
  english_pob_reading: the priest
  chosen_spanish_reading: el sacerdote
  alternative_spanish_readings:
  - el sumo sacerdote
  - el sacerdote principal
  rationale: El texto hebreo no usa aquí el título técnico 'sumo sacerdote'; lo describe por unción, sucesión e investidura. Se mantiene la expresión del texto fuente para no sobreinterpretar.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo rendir el idiomático 'llenar la mano'
  english_pob_reading: whose hand is filled
  chosen_spanish_reading: cuya mano ha sido llena
  alternative_spanish_readings:
  - que ha sido ordenado
  - que ha sido instalado
  - cuya mano ha sido colmada
  rationale: Se conserva la imagen hebrea con suficiente literalidad para auditarla, en vez de reemplazarla por una paráfrasis que borre la tensión idiomática. La función sacerdotal queda aclarada por el contexto inmediato.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente restauró la literalidad de 'whose hand is filled' frente a una paráfrasis ('ordained'). La presente versión española sigue esa decisión auditada al conservar la imagen idiomática, mientras añade una nota explicativa para lectores modernos.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' cuando el hebreo muestra el nombre divino; aquí no aparece, por lo que no se introduce.
  - '''Sacerdote'' se mantiene sin elevarlo a ''sumo sacerdote'', siguiendo la fuente.'
  - Se conserva un registro litúrgico sobrio y moderno con 'vestiduras' y 'expiación'.
  - La nota [a] está anclada explícitamente en el texto para cumplir la trazabilidad solicitada.
