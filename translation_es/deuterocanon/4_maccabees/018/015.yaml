revisions:
- from: 'David, el compositor de himnos[a], cantó para nosotros[b]: «Muchas son las aflicciones de los justos».'
  to: 'David, el compositor de himnos[a], nos cantó, diciendo[b]: «Muchas son las aflicciones de los justos».'
  rationale: Se ajustó ἡμῖν a «nos» para reflejar mejor el dativo de destinatario, se añadió «diciendo» para representar τὸν λέγοντι y se movió la nota de referencia cruzada al punto pertinente de la cita. Se conservó «el compositor de himnos» como la mejor opción española para mantener la fuerza léxica de ὑμνογράφος sin caer en una glosa más interpretativa.
