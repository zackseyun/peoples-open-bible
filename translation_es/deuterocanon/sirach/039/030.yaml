base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/039/030.yaml
  text: The teeth of wild beasts[a], and scorpions and vipers, and a sword of vengeance to destroy the wicked— all these were created for their purpose[c][b], and they are kept in store until the time they are appointed.
  footnotes:
  - marker: a
    text: Or 'adders' or 'asps'; the Hebrew names a venomous snake, and the exact species is uncertain. The Greek parallel has a general term for viper/snake.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to destroy'; the verb can also carry the stronger sense 'to devote to destruction' or 'to exterminate.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they are in the storehouse, and at the appointed time they are summoned.' The final clause is somewhat compressed in Hebrew; the sense is that these forces are reserved until their time of deployment.
    reason: alternative_reading
