  yaml_path: translation/nt/luke/010/011.yaml
  text: 'Even the dust from your city that clung to our feet[a], we wipe off against you[d][c][b]. Nevertheless know this: the kingdom of God has come near.'
  footnotes:
  - marker: a
    text: 'Or ''from our feet''; the Greek wording is idiomatic and describes the dust from their city as adhering to the messengers'' feet.'
    reason: lexical_alternative
  - marker: b
    text: 'Many English translations render the verb as ''shake off,'' but the Greek verb here more specifically means ''wipe off.'''
    reason: lexical_alternative
  - marker: c
    text: 'Or ''has drawn near.'' The perfect tense indicates that God''s kingdom has come near with continuing significance.'
    reason: lexical_alternative
  - marker: d
    text: 'Or ''Even the dust that clung to us from your city, on our feet, we wipe off against you.''.'
    reason: previous_rendering
translation:
  language: ko
  text: 「「너희 성읍에서 우리 발에 묻은 먼지조차 우리가 너희에게 떨어 버린다. 그러나 이것은 알아 두라. 하나님의 나라가 가까이 왔다.」」
  philosophy: optimal-equivalence
