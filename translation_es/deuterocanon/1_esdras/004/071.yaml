base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/004/071.yaml
  text: And he wrote to all the Jews who were going up from the kingdom to Judea concerning their freedom[a], that no official, satrap, governor, or steward should come against their doors[b],
  footnotes:
  - marker: a
    text: Or 'for their exemption' or 'regarding their liberty.' The Greek uses the ordinary word for 'freedom,' but in this administrative context it may refer to a legal privilege or immunity.
    reason: lexical_alternative
  - marker: b
    text: Literally 'should not come against their doors,' likely meaning that officials were not to intrude on them at their homes or press claims against them there.
    reason: lexical_alternative
