translation:
  language: es
  text: Todas las cortinas del atrio alrededor eran de lino finamente torcido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todas las colgaduras del patio alrededor eran de lino torcido fino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  - Cada una de las
  lexicon: HALOT
  rationale: El cuantificador hebreo presenta la totalidad del conjunto. En español, «Todas» conserva de manera natural ese sentido colectivo sobre las cortinas/hangings del atrio.
- source_word: קַלְעֵי
  english_pob_choice: the hangings
  chosen_spanish: las cortinas
  alternatives_spanish:
  - las colgaduras
  - los tapices
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa las piezas textiles que forman el cerramiento del atrio. «Cortinas» es claro y bíblicamente inteligible en español; «colgaduras» sería más literal pero menos natural.
- source_word: הֶחָצֵר
  english_pob_choice: of the courtyard
  chosen_spanish: del atrio
  alternatives_spanish:
  - del patio
  - de la corte
  lexicon: HALOT
  rationale: En la descripción tabernacular, חָצֵר se refiere al recinto exterior sagrado. «Atrio» mantiene el valor técnico tradicional en español y comunica mejor ese espacio cultual que «patio».
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: El adverbio marca distribución perimetral. «Alrededor» reproduce con naturalidad el sentido de rodear todo el recinto.
- source_word: שֵׁשׁ
  english_pob_choice: linen
  chosen_spanish: lino
  alternatives_spanish:
  - lino fino
  - lino de calidad
  lexicon: HALOT
  rationale: En este contexto cultual, שֵׁשׁ denota la tela de lino. Se traduce por «lino» para no sobrecargar la frase; la cualificación de la textura ya viene dada por el participio siguiente.
- source_word: מָשְׁזָר
  english_pob_choice: finely twisted
  chosen_spanish: torcido fino
  alternatives_spanish:
  - finamente torcido
  - entorchado fino
  - trenzado fino
  lexicon: HALOT
  rationale: El término describe la elaboración del hilo o tejido mediante torsión. «Torcido fino» conserva la idea de tejido cuidadosamente trabajado sin introducir una paráfrasis excesiva; «finamente torcido» sería más explicativo, pero menos ágil en español.
translation_notes:
  revision_awareness: La revisión más reciente no realizó cambios sustanciales; el pasaje permanece con alta concordancia respecto del texto fuente y del criterio de traducción auditado.
  spanish_consistency_notes:
  - Se mantiene «atrio» para הֶחָצֵר, coherente con terminología bíblica cultual en español.
  - Se conserva «lino» sin añadir «fino» en el cuerpo principal, siguiendo la decisión auditada de no sobrecargar la frase.
  - Se usa «torcido fino» para reflejar מָשְׁזָר con una formulación natural en español, evitando calcos rígidos.
  - El orden oracional busca claridad sin alterar la relación entre totalidad, ubicación perimetral y material del texto hebreo.
