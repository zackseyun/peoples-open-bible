translation:
  language: es
  text: Y ahora, oh Soberano de los cielos, envía un buen ángel delante de nosotros para temor y temblor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «para temor y temblor». El griego no dice explícitamente de quién es el temor; el contexto sugiere a los enemigos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάστα
  english_pob_choice: Sovereign
  chosen_spanish: Soberano
  alternatives_spanish:
  - Señor
  - Soberano poderoso
  - Gobernante
  lexicon: LSJ
  rationale: El vocativo δυνάστα designa a quien posee poder o dominio. «Soberano» conserva la idea de autoridad regia y encaja bien en una oración directa sin reducirlo a un simple título devocional genérico.
- source_word: τῶν οὐρανῶν
  english_pob_choice: of the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos celestiales
  lexicon: LSJ
  rationale: El griego está en plural y la POB inglesa retuvo ese plural. «De los cielos» preserva la forma plural y el registro elevado; «del cielo» sería más idiomático pero menos transparente al plural del original.
- source_word: ἀπόστειλον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: LSJ
  rationale: El imperativo aoristo de ἀποστέλλω pide una acción directa. «Envía» es natural en español y mantiene la fuerza peticional sin cargar con matices innecesarios.
- source_word: ἄγγελον ἀγαθὸν
  english_pob_choice: a good angel
  chosen_spanish: un buen ángel
  alternatives_spanish:
  - un ángel benévolo
  - un mensajero bueno
  lexicon: LSJ
  rationale: Aquí ἄγγελος se entiende como ser angélico, no como simple mensajero humano. «Bueno» traduce ἀγαθός de forma directa; «benévolo» interpreta más de lo que exige el texto.
- source_word: ἔμπροσθεν ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - por delante de nosotros
  lexicon: LSJ
  rationale: La expresión indica ir delante, como guía o avanzada. «Delante de nosotros» reproduce bien la relación espacial y funcional en español.
- source_word: εἰς δέος καὶ τρόμον
  english_pob_choice: for fear and trembling
  chosen_spanish: para temor y temblor
  alternatives_spanish:
  - para miedo y temblor
  - a fin de producir temor y temblor
  lexicon: LSJ
  rationale: La preposición εἰς expresa resultado o finalidad. Siguiendo la auditoría inglesa, «para temor y temblor» conserva la ambigüedad controlada del griego sin añadir explícitamente un objeto que no aparece en el texto.
theological_decisions:
- issue: Referente de «temor y temblor»
  english_pob_reading: The requested angel is sent ahead so as to produce fear and trembling, presumably in the opposing forces.
  chosen_spanish_reading: El ángel pedido es enviado delante para producir temor y temblor, presumiblemente en las fuerzas enemigas.
  alternative_spanish_readings:
  - 'Mantener la fórmula más formal: «para temor y temblor» sin explicitar el efecto.'
  - Entenderlo como el estado emocional de quienes oran.
  rationale: El contexto militar y de súplica favorece leer εἰς como resultado sobre el enemigo, pero el griego no lo dice de manera explícita. La traducción principal conserva la frase tradicional y la nota mantiene abierta la tensión sin resolverla de forma excesiva.
  doctrine_reference: Preservar la tensión exegética; equivalencia óptima
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se prefirió una construcción de finalidad/resulto más sobria («para temor y temblor») en lugar de expandirla como «para producir temor y temblor», para no añadir un verbo que el griego no expresa explícitamente. La elección de «de los cielos» conserva el plural del original, y «Soberano» mantiene el tono de vocativo de autoridad.'
  spanish_consistency_notes:
  - Se mantiene el vocativo directo con «oh» para reflejar el tono orante del texto.
  - «Ángel» se conserva sin glosa porque el contexto hace claro que no se trata de un mensajero humano.
  - La fórmula «temor y temblor» se deja sin domesticar para respetar la pareja léxica δέος / τρόμος.
