base_translation:
  language: en
  yaml_path: translation/ot/genesis/027/019.yaml
  text: And Jacob said to his father[a], “I am Esau your firstborn. I have done as you told me. Please rise, sit, and eat from my game[b], so that your soul may bless me.”
  footnotes:
