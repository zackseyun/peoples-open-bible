    rationale: Aunque formalmente intenta reflejar el pasivo hebreo נִשְׁכַּח con זִכְרָם, en español «memoria olvidada» suena torpe. Una formulación como «su recuerdo ha caído en el olvido» o «su recuerdo es olvidado» comunica mejor el sentido de que ya no se les recuerda.
