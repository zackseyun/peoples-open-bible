  lexicon: PN/town-name
  rationale: Se trata de un nombre propio de lugar en una lista de pueblos; se translitera en español, conservando la forma breve del POB inglés por ser la convención más reconocible y auditada para este topónimo.
- source_word: וּ/שְׁמַע
  english_pob_choice: and Shema
  chosen_spanish: y Shema
  alternatives_spanish:
  - y Shemah
  lexicon: PN/town-name
  rationale: La consonante conjuntiva וּ se vierte como 'y'. El nombre propio se mantiene como transliteración 'Shema'; se evita 'Shemah' por ser una alternativa posible, pero menos usual en español y menos clara para lectura pública.
- source_word: וּ/מוֹלָדָה
  english_pob_choice: and Moladah
  chosen_spanish: y Moladá
  alternatives_spanish:
  - y Moladah
  lexicon: PN/town-name
  rationale: Se translitera el topónimo y se adapta la acentuación al español para orientar la pronunciación sin alterar el nombre. La forma 'Moladá' refleja la forma inglesa auditada 'Moladah' con ajuste mínimo de prosodia española.
translation_notes:
  revision_awareness: El texto fuente hebreo y el audit trail inglés concuerdan plenamente; no se registran revisiones ni variantes textuales relevantes. La única nota heredada del inglés es la alternativa transliterativa para Shema/Shemah, preservada como nota lexical.
  spanish_consistency_notes:
  - Se mantienen los tres nombres propios de lugar sin traducir, conforme al tratamiento del POB para topónimos.
  - Se usa la conjunción 'y' para el וּ inicial de los dos últimos elementos, con puntuación española normalizada.
  - La acentuación de 'Moladá' es una decisión de lectura en español, no una afirmación textual sobre la ortografía hebrea.
