translation:
  language: es
  text: También subió con ellos una multitud mezclada[a], y rebaños y manadas, muchísimo ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran compañía mezclada» o «una multitud mixta». La frase hebrea עֵרֶב רַב designa un grupo heterogéneo que acompañaba a Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: El hebreo añade información de manera simple y narrativa; «también» conserva ese valor aditivo con naturalidad en español.
- source_word: עֵרֶב רַב
  english_pob_choice: a mixed multitude
  chosen_spanish: una multitud mezclada
  alternatives_spanish:
  - una gran compañía mezclada
  - una multitud mixta
  - una turba mezclada
  lexicon: HALOT
  rationale: La expresión denota un grupo heterogéneo que acompaña a Israel. «Multitud mezclada» preserva el rasgo composicional sin forzar una explicación étnica que el hebreo no explicita aquí.
- source_word: עָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió con
  - ascendió
  - subieron
  lexicon: HALOT
  rationale: En el contexto del éxodo, עָלָה conserva su sentido narrativo de movimiento hacia arriba / salida de la tierra. «Subió» refleja bien el hebraísmo y funciona de modo natural en español.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural masculino se refiere al grupo de Israel mencionado en el contexto; «con ellos» es la equivalencia directa y clara.
- source_word: וְ/צֹאן וּ/בָקָר
  english_pob_choice: and flocks and herds
  chosen_spanish: y ovejas y vacas
  alternatives_spanish:
  - y rebaños y hatos
  - y ovejas y ganado vacuno
  - y flocks y herds
  lexicon: HALOT
  rationale: צֹאן y בָקָר distinguen pequeños animales de pastoreo y ganado mayor. «Ovejas y vacas» conserva la distinción de forma comprensible; aunque algo más específica que el colectivo, sigue siendo aceptable en español bíblico breve.
- source_word: מִקְנֶה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - ganado de cría
  - livestock
  - posesiones en ganado
  lexicon: HALOT
  rationale: מִקְנֶה es un término colectivo amplio para animales domésticos de valor económico. «Ganado» comunica esa idea de manera idiomática y concisa en español.
- source_word: כָּבֵד מְאֹד
  english_pob_choice: a very great amount of livestock
  chosen_spanish: muy grande
  alternatives_spanish:
  - en gran abundancia
  - muy abundante
  - en una cantidad muy grande
  lexicon: HALOT
  rationale: El hebreo literalmente significa «pesado», pero con מִקְנֶה expresa abundancia o gran cantidad. «Muy grande» mantiene la fuerza cuantitativa sin introducir una paráfrasis excesiva.
theological_decisions:
- issue: Cómo rendir עֵרֶב רַב sin borrar su ambigüedad histórica/social
  english_pob_reading: The Hebrew phrase denotes a heterogeneous group accompanying Israel.
  chosen_spanish_reading: una multitud mezclada
  alternative_spanish_readings:
  - una multitud mixta
  - una gran compañía mezclada
  rationale: No hay base suficiente para especificar más allá de la heterogeneidad del grupo. La traducción conserva la tensión entre descripción sociológica y fórmula fija, sin interpretar de más.
  doctrine_reference: Éxodo 12:38; nota lexical basada en HALOT y el audit trail en inglés
translation_notes:
  revision_awareness: El inglés revisado pasó de «along with» a «and» para reflejar con mayor directitud la coordinación hebrea, y de «very large» a «very great» para un tono más formal. En español, se mantuvo esa coordinación simple con «y», y la intensificación se reflejó con «muy grande».
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton solo cuando corresponda; en este versículo no aparece.
  - Se evitó «SEÑOR» por convención cuando el texto no lo requiere.
  - Se mantuvo un estilo bíblico sobrio, sin arcaísmos innecesarios.
  - No se usó «Cristo» ni terminología teológica ajena al versículo.
