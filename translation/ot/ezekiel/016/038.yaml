theological_decisions:
- issue: Rendering covenantal-marital jealousy language for divine judgment
  chosen_reading: and I will give you over to blood in wrath and jealousy
  alternative_readings:
  - and I will make you bloody in fury and jealousy
  - and I will hand you over to a bloody death in wrath and zeal
  rationale: The verse uses marital and judicial imagery together. Retaining 'jealousy' preserves the covenantal metaphor of YHWH as wronged husband without softening the severity of judgment. 'Give you over' avoids implying God personally commits evil while still expressing his judicial action.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
