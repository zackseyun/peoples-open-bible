review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la imagen marcial del griego: λήμψεται = «tomará», ἀσπίδα = «escudo», y ὁσιότητα = «santidad» como virtud personificada. «Invencible» para ἀκαταμάχητον es aceptable y natural en español, aunque el inglés auditado prefirió «unconquerable» por su matiz pasivo; no es un desvío grave de sentido.'
  spanish_quality_summary: 'La frase es clara, natural y digna en español eclesial contemporáneo. Sin embargo, la nota léxica no preserva fielmente las alternativas del rastro inglés: «devoción» estrecha demasiado el campo semántico y no corresponde bien a «godliness». Conviene ajustar la nota para reflejar mejor «piedad» / «vida piadosa» o una alternativa equivalente más cercana.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Santidad» encaja bien para ὁσιότητα en este contexto. «Tomará» y «escudo» están bien. El único ajuste recomendado es en la nota de alternativas léxicas para alinearla mejor con la documentación inglesa y la justificación teológica.
  issues:
  - severity: medium
    issue: La nota al pie usa «devoción» como alternativa de ὁσιότητα.
    rationale: El rastro inglés documenta «piety» y «godliness». «Devoción» en español puede reducir el término a una actitud devocional o práctica religiosa, mientras que ὁσιότης aquí tiene un alcance más amplio de santidad/piedad delante de Dios. La nota debe reflejar mejor esa amplitud.
  - severity: low
    issue: «Invencible» no reproduce tan de cerca el matiz pasivo de ἀκαταμάχητον como «inconquistable» o una perífrasis.
    rationale: Aun así, «invencible» es idiomático y plenamente comprensible en español, por lo que no exige cambio textual. Solo merece constar como diferencia menor respecto de la preferencia inglesa «unconquerable».
  revised_spanish_text: Tomará la santidad como un escudo invencible,[a]
  revised_footnotes:
  - marker: a
    text: O «piedad» o «vida piadosa».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrige la nota para ajustarla mejor a las alternativas léxicas documentadas en el POB inglés y evitar que «devoción» reduzca indebidamente el sentido de ὁσιότητα.
