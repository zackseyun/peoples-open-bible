  rationale: Se reemplaza el anglicismo «paramours» por «amantes», que comunica con naturalidad el sentido contextual de פִּלַגְשֵׁיהֶם y deja la literalidad «concubinas» en nota, conforme al audit trail. Se mueve el marcador [a] al sustantivo correcto. Se cambia «secreción» por «emisión» para reflejar mejor זִרְמָה y el registro eufemístico del inglés POB. El resto del texto se conserva por fidelidad al hebreo y buena legibilidad.
