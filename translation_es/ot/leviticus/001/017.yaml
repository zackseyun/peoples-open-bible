review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: rasgar/abrir el ave sin separarla del todo, quemarla en el altar sobre la leña sobre el fuego, y concluir con la fórmula sacrificial. También preserva correctamente Yahvé para יהוה. Sin embargo, dos elecciones debilitan la fidelidad fina: «Lo partirá» sugiere demasiado dividir en partes y choca con la cláusula siguiente «no lo dividirá»; y «ofrenda encendida» no representa bien אִשֵּׁה, para el cual el rastro POB pide conservar la alternativa «ofrenda por fuego/de fuego» en nota, mientras que «encendida» suena menos técnico y menos exacto.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico contemporáneo apropiado. Aun así, «Lo partirá por las alas» resulta algo torpe por la cercanía semántica con «no lo dividirá»; «lo abrirá por las alas» o «lo rasgará por las alas» fluye mejor y evita confusión. «Ofrenda encendida» no es una expresión natural ni estable en español bíblico; «ofrenda de alimento» sigue más de cerca el texto inglés auditado, con nota para «ofrenda por fuego / de fuego».
  glossary_alignment: 'Alineación buena en Yahvé, holocausto y aroma agradable. Ajuste necesario en אִשֵּׁה: el valor preferido del rastro POB es «food offering», y las alternativas documentadas son «offering by fire / fire offering». En español, «ofrenda de alimento» en texto con nota alternativa preserva mejor la decisión documentada que «ofrenda encendida».'
  issues:
  - severity: medium
    issue: «Lo partirá» para וְשִׁסַּע
    rationale: El verbo hebreo expresa rasgar o abrir el ave; «partir» en español se superpone demasiado con «dividir», justamente negado en la frase siguiente. «Lo abrirá» conserva mejor la acción sin implicar separación completa.
  - severity: medium
    issue: «Ofrenda encendida» para אִשֵּׁה
    rationale: No es una formulación española estable ni reproduce bien la decisión lexical auditada. «Ofrenda de alimento» es más fiel al English POB; las alternativas «ofrenda por fuego / de fuego» deben ir en nota.
  - severity: low
    issue: La nota [a] actual está anclada en «alas» pero la variación real afecta sobre todo al verbo
    rationale: La nota puede mantenerse en la frase, pero conviene que el anclaje acompañe la expresión verbal revisada para que la alternativa léxica sea más clara.
  revised_spanish_text: Lo abrirá[a] por las alas, pero no lo dividirá; y el sacerdote lo quemará sobre el altar, sobre la leña que está sobre el fuego. Es un holocausto, una ofrenda de alimento[b], aroma agradable para Yahvé.
  revised_footnotes:
