  language: en
  yaml_path: translation/ot/zechariah/010/003.yaml
  text: My anger burns against the shepherds[a], and I will punish the male goats; for Yahweh of Armies has attended to his flock, the house of Judah[b], and will make them like his majestic horse in battle.
  footnotes:
