review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: una propuesta de matrimonios recíprocos entre grupos, seguida por las dos acciones paralelas de dar y tomar hijas en matrimonio. También conserva adecuadamente las dos notas del rastro inglés sobre el sentido mutuo de וְהִתְחַתְּנוּ y sobre que ''dar'' y ''tomar'' están gobernados por el contexto matrimonial. Sin embargo, varias formulaciones españolas no son idiomáticas o suenan forzadas frente al hebreo y al objetivo de legibilidad.'
  spanish_quality_summary: La frase inicial 'Hacer alianzas matrimoniales con nosotros' no funciona bien como imperativo en español; suena nominal/incompleta. 'Den sus hijas a nosotros' es gramaticalmente poco natural; debe ser 'dénnos a sus hijas' o, mejor para claridad y registro, 'den a sus hijas en matrimonio a nosotros' o 'dennos a sus hijas en matrimonio'. Además, conviene evitar una construcción demasiado literal que opaque el sentido matrimonial ya documentado por la nota. Una redacción más natural y fiel sería 'Emparéntense con nosotros' o 'Cásense con nosotros', pero dado el matiz recíproco colectivo, 'Emparéntense con nosotros' preserva mejor la idea de alianza matrimonial mutua.
  glossary_alignment: 'No hay términos teológicos sensibles en juego. La decisión principal es léxica: para וְהִתְחַתְּנוּ אֹתָנוּ, ''Emparéntense con nosotros'' comunica de manera natural el entrar en parentesco por matrimonio, y la nota [a] conserva la alternativa más formal ''Hagan matrimonios con nosotros''. Las expresiones ''dennos a sus hijas'' y ''tomen a nuestras hijas para ustedes'' mantienen el paralelismo del hebreo; la nota [b] sigue explicando que ambos verbos se entienden en sentido matrimonial.'
  issues:
  - severity: medium
    issue: La frase inicial no está en forma imperativa idiomática.
    rationale: El hebreo usa una forma verbal exhortativa/imperativa plural. 'Hacer alianzas matrimoniales con nosotros' suena como infinitivo o rótulo, no como invitación directa en español.
  - severity: high
    issue: '''Den sus hijas a nosotros'' es español poco natural.'
    rationale: Aunque calca el orden del inglés, en español estándar esta construcción resulta torpe. Debe reformularse para respetar la legibilidad del proyecto sin perder el sentido.
  - severity: low
    issue: La elección 'alianzas matrimoniales' es comprensible pero algo pesada.
    rationale: El sentido mutuo de חתן puede expresarse más naturalmente con 'emparentarse', especialmente en un contexto de negociación familiar y matrimonio entre clanes.
  revised_spanish_text: 'Emparéntense con nosotros[a]: dennos a sus hijas[b], y tomen a nuestras hijas para ustedes[b].'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Hagan matrimonios con nosotros». El verbo hebreo expresa entrar mutuamente en alianzas matrimoniales.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, en matrimonio; el sentido matrimonial rige tanto «dennos a sus hijas» como «tomen a nuestras hijas para ustedes» en este versículo.
    reason: cultural_note
  revision_rationale: 'La revisión corrige dos problemas principales: convierte la apertura en un imperativo español natural y reemplaza la construcción no idiomática ''a nosotros'' por ''dennos''. También conserva el paralelismo recíproco del hebreo y la justificación del POB inglés mediante las mismas dos notas, ahora ancladas en lugares más naturales del texto español.'
