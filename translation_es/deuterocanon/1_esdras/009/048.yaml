review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego como una lista nominal rematada por «los levitas», y conserva acertadamente la nota de incertidumbre textual. Sin embargo, varias decisiones de transliteración se apartan innecesariamente del audit trail inglés y de formas más estables en español: especialmente «Jesúa» frente a la elección documentada Jeshua, y varias castellanizaciones no justificadas que reducen la trazabilidad al testimonio griego.'
  spanish_quality_summary: 'El texto es legible, pero algunas formas propias suenan inestables o poco consistentes entre sí: mezcla transliteración cercana al inglés/grecolatino con adaptaciones españolas ad hoc («Yadino», «Abteo», «Jarsubos», «Katetzabdos»). Para una lista de nombres textualmente inciertos, conviene mayor conservadurismo formal y consistencia gráfica. «Serebías» y «Azarías» son naturales; «los levitas» está bien.'
  glossary_alignment: 'No hay conflictos teológicos mayores ni con la terminología base del proyecto. El punto principal es onomástico: debe respetarse la decisión documentada de usar formas semíticas o griegas conservadoras según cada caso. Aquí conviene mantener «Jeshua» en vez de «Jesúa», y preferir transliteraciones más rastreables al audit trail: «Jadinus», «Jarsubus», «Abteus», «Autaias», «Katezabdus», «Annas», «Phalias».'
  issues:
  - severity: medium
    issue: «Jesúa» no preserva bien la decisión auditada «Jeshua».
    rationale: La decisión inglesa justifica explícitamente distinguir este nombre de «Jesús» y «Josué» mediante la forma histórica Jeshua. En español, «Jesúa» es menos estable y menos reconocible en estudios bíblicos que «Jeshua».
  - severity: medium
    issue: Varias formas de nombres fueron castellanizadas sin necesidad suficiente.
    rationale: En una lista de nombres inciertos, formas como «Yadino», «Jarsubos», «Abteo» y «Katetzabdos» disminuyen la correspondencia con el griego y con el audit trail. Es preferible una transliteración más conservadora y consistente.
  - severity: low
    issue: Inconsistencia gráfica en el tratamiento de nombres propios.
    rationale: El borrador mezcla adaptaciones españolas plenas («Anás», «Azarías») con transliteraciones casi directas («Maiannas», «Kelitas»). Esto puede tolerarse en algunos nombres tradicionales, pero aquí conviene un criterio más uniforme en los nombres inciertos.
  revised_spanish_text: Jeshua y Anniut y Serebías[a], Jadinus, Jarsubus, Abteus, Autaias, Maiannas y Kelitas, Azarías, Katezabdus, Annas, Phalias—los levitas—
  revised_footnotes:
