translation:
  language: es
  text: Y no solo eso, sino también por la nobleza[a] de sus hijos y por su obediencia a la ley, tuvo por ellos un afecto materno[b] aún mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nobleza» traduce el valor moral y la excelencia de carácter implicados en καλοκἀγαθίαν; también podría entenderse como «noble carácter».
    reason: lexical_alternative
  - marker: b
    text: El griego φιλοστοργίαν designa afecto familiar profundo; aquí se explicita como «materno» por el contexto de la madre y sus hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴν δέ
  english_pob_choice: And not only that
  chosen_spanish: Y no solo eso, sino que también
  alternatives_spanish:
  - Sin embargo
  - Pero además
  - Y además
  lexicon: LSJ
  rationale: La frase introduce una adición cumulativa más que una oposición fuerte. «Y no solo eso, sino que también» conserva ese avance del argumento con un español natural y solemne.
- source_word: καλοκἀγαθίαν
  english_pob_choice: nobility
  chosen_spanish: nobleza
  alternatives_spanish:
  - virtud
  - bondad
  - noble carácter
  lexicon: LSJ
  rationale: El término expresa excelencia moral y distinción de carácter. «Nobleza» recoge bien ese valor ético sin volverse demasiado abstracto en español.
- source_word: εὐπείθειαν
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - complacencia
  - docilidad
  - disposición a obedecer
  lexicon: LSJ
  rationale: En la construcción con πρός, el sentido es respuesta obediente o receptiva hacia la ley. «Obediencia» es la opción más clara y fiel en español.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: su ley
  alternatives_spanish:
  - la ley
  - la Ley
  lexicon: LSJ
  rationale: El contexto se refiere a la ley ancestral propia de ellos. «Su ley» conserva la referencia posesiva implícita en αὐτῶν y evita imponer una mayúscula interpretativa no marcada en el griego.
- source_word: μείζω
  english_pob_choice: even greater
  chosen_spanish: aún mayor
  alternatives_spanish:
  - mayor
  - todavía más grande
  lexicon: LSJ
  rationale: El comparativo intensifica la afección previa. «Aún mayor» reproduce bien ese matiz de aumento sin sonar rígido.
- source_word: φιλοστοργίαν
  english_pob_choice: motherly affection
  chosen_spanish: afección materna
  alternatives_spanish:
  - amor materno
  - afecto familiar
  - ternura materna
  lexicon: LSJ
  rationale: La palabra denota afecto familiar profundo; aquí el referente es la madre, por lo que en español conviene explicitar la relación maternal para hacer visible la fuerza del contexto sin añadir contenido ajeno.
theological_decisions:
- issue: Explicitar el matiz materno de φιλοστοργία
  english_pob_reading: motherly affection
  chosen_spanish_reading: afección materna
  alternative_spanish_readings:
  - afecto familiar
  - amor materno
  rationale: El sustantivo griego señala afecto familiar en general, pero aquí el sujeto y el contexto hacen inequívoca la referencia a la madre. La explicitación mejora la claridad en español sin cambiar el sentido doctrinal o narrativo.
  doctrine_reference: Principio de claridad contextual y equivalencia óptima; sin implicación doctrinal especial.
- issue: Determinar el valor de νόμον en un contexto judío
  english_pob_reading: the law
  chosen_spanish_reading: su ley
  alternative_spanish_readings:
  - la ley
  - la Ley
  rationale: La referencia es a la ley propia del grupo, y el posesivo «su» reproduce la relación del griego con αὐτῶν. Mantener minúscula evita una capitalización no exigida por el texto fuente.
  doctrine_reference: Principio de fidelidad al referente inmediato del texto sin sobreinterpretación ortográfica.
translation_notes:
