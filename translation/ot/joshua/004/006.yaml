- issue: Gendered language in בְּנֵיכֶם
  chosen_reading: your children
  alternative_readings:
  - your sons
  rationale: The Hebrew form is masculine plural ('your sons'), but in this memorial-setting context it refers representatively to the next generation who will ask about the stones. Rendering 'your children' communicates the intended referent in natural English without importing a male-only restriction. This follows the stated principle of gender-accurate translation according to source intent.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
