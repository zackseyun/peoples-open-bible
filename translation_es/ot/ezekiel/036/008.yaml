translation:
  language: es
  text: Pero ustedes, montes de Israel, darán sus ramas y darán su fruto para mi pueblo Israel, porque están por venir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su venida está cerca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: mountains of Israel
  chosen_spanish: montes de Israel
  alternatives_spanish:
  - montañas de Israel
  - sierras de Israel
  lexicon: HALOT
  rationale: La expresión hebrea designa las elevaciones de la tierra de Israel y en Ezequiel funciona como apelación profética al territorio personificado. 'Montes' conserva la imagen topográfica con naturalidad en español y evita una lectura excesivamente geográfica o abstracta.
- source_word: עַנְפְּכֶם
  english_pob_choice: your branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus renuevos
  - sus boughs
  lexicon: HALOT
  rationale: עָנָף denota rama o bough. 'Ramas' es el equivalente más claro y natural en español, y preserva la imagen agrícola.
- source_word: תִּתֵּנוּ
  english_pob_choice: shall put forth
  chosen_spanish: darán
  alternatives_spanish:
  - echarán
  - producirán
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'dar', en este contexto la idea es que los montes produzcan o saquen ramas. 'Darán' mantiene la relación léxica sin forzar una paráfrasis más larga; el complemento inmediato aclara el sentido.
- source_word: וּפֶרְיְכֶם
  english_pob_choice: your fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - sus frutos
  lexicon: HALOT
  rationale: פְּרִי puede ser fruto/produce; 'fruto' preserva el paralelismo con 'ramas' y la imagen de fertilidad de la tierra.
- source_word: תִּשְׂאוּ
  english_pob_choice: bear
  chosen_spanish: llevarán
  alternatives_spanish:
  - darán
  - producirán
  lexicon: HALOT
  rationale: El inglés POB usa 'bear' en el sentido idiomático de producir fruto. En español, 'llevarán' conserva la metáfora de carga/producción y encaja con 'fruto' sin resultar enrevesado.
- source_word: לְעַמִּי יִשְׂרָאֵל
  english_pob_choice: for my people Israel
  chosen_spanish: para mi pueblo Israel
  alternatives_spanish:
  - para mi pueblo, Israel
  - en favor de mi pueblo Israel
  lexicon: HALOT
  rationale: La preposición ל expresa beneficio o destino. 'Para mi pueblo Israel' conserva el matiz de propósito/beneficio y la posesión pactual 'mi pueblo'.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la fructificación prometida. 'Porque' es la equivalencia más natural y clara en español.
- source_word: קֵרְבוּ לָבוֹא
  english_pob_choice: they are about to come
  chosen_spanish: están por venir
  alternatives_spanish:
  - están a punto de venir
  - su venida está cerca
  lexicon: HALOT
  rationale: La construcción expresa inminencia con el infinitivo 'venir'. 'Están por venir' reproduce bien la idea idiomática y evita la rigidez de una traducción demasiado literal.
theological_decisions:
- issue: Referente de 'ellos' / sujeto implícito de la cláusula final
  english_pob_reading: '''They'' refers to ''my people Israel,'' i.e., the exiles are about to return.'
  chosen_spanish_reading: El sujeto implícito se entiende como 'mi pueblo Israel', es decir, el pueblo en el exilio que está por regresar.
  alternative_spanish_readings:
  - 'Lectura impersonal: ''está por venir su venida'''
  - Referente distante a otros pueblos
  rationale: La referencia inmediata más natural es 'mi pueblo Israel'. La promesa de fertilidad se fundamenta en el retorno cercano del pueblo, sin introducir un cambio doctrinal.
  doctrine_reference: Contexto profético del retorno de Israel; cf. Ezequiel 36:1-12
translation_notes:
  revision_awareness: Se integró la revisión del cierre idiomático del inglés auditado ('about to come') como 'están por venir', evitando una construcción rígida y manteniendo la inminencia del regreso. También se aseguró que el marcador de nota aparezca en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'Israel' en ambas ocurrencias para conservar la cohesión del nombre propio y del pueblo pactual.
  - Se prefirió 'montes' sobre 'montañas' por fluidez bíblica en español y por su asociación natural con el territorio personificado.
  - Se preservó la imagen agrícola (ramas/fruto) sin convertirla en explicación interpretativa.
  - La nota [a] está anclada explícitamente en el texto para cumplir la validación y conservar la alternativa lexical del cierre.
