revisions:
- from: 'Habla a todo el pueblo de la tierra y a los sacerdotes[a], diciendo: Cuando ayunaron y se lamentaron en el quinto mes y en el séptimo, durante estos setenta años, ¿ayunaron de veras para mí?'
  to: 'Habla a todo el pueblo de la tierra y a los sacerdotes,[a] diciendo: Cuando ayunaban y se lamentaban en el quinto mes y en el séptimo, durante estos setenta años, ¿de veras ayunaban para mí?'
  rationale: Se corrige la persona verbal para reflejar la segunda persona plural hebrea en una forma natural y ampliamente legible en español latinoamericano mediante el imperfecto plural sin pronombre expreso, que en este contexto conserva bien la interpelación general y el carácter habitual de la práctica descrita. También se ajusta la nota al pie para preservar la alternativa enfática documentada en el audit trail inglés.
  reviewer_model: gpt-5.4
