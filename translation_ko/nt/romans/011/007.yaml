  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τί οὖν; ὃ ἐπιζητεῖ Ἰσραήλ, τοῦτο οὐκ ἐπέτυχεν, ἡ δὲ ἐκλογὴ ἐπέτυχεν· οἱ δὲ λοιποὶ ἐπωρώθησαν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/007.yaml
  text: What then? Israel did not obtain what it seeks[a], but the elect obtained it, and the rest were hardened[b],
  footnotes:
  - marker: a
    text: Or 'the election obtained it.' The Greek ἐκλογή is literally 'election' or 'choice,' but here likely stands for the people chosen.
    reason: lexical_alternative
  - marker: b
    text: Or 'were made callous.' The verb can denote being hardened or rendered spiritually insensitive.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러면 어떻습니까? 이스라엘이 구하던 그것을 얻지 못하였고, 도리어 택하심을 받은 자들이 그것을 얻었으며, 그 나머지는 완악하게 되었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκλογὴ
  english_pob_choice: the elect
  chosen_korean: 택하심을 받은 자들
  alternatives_korean:
  - 택함받은 자들
  lexicon: BDAG
  rationale: 추상 명사 ἐκλογή가 환유적으로 「택함받은 자」를 가리키는 용법.
- source_word: ἐπωρώθησαν
  english_pob_choice: were hardened
