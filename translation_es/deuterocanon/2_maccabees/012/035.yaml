translation:
  language: es
  text: Pero cierto Dositeo, uno de los de Bacenor, hombre montado y fuerte, tenía sujeto a Gorgias; y, al tomar su capa, lo iba arrastrando con fuerza, queriendo tomar vivo a aquel maldito, cuando uno de los jinetes tracios se lanzó contra él y le dejó destrozado el hombro[a], y Gorgias escapó a Marisá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le inutilizó el hombro»; el griego describe un golpe grave en la zona del hombro, pero el resultado anatómico exacto puede entenderse de varias maneras.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δωσίθεος
  english_pob_choice: Dositheus
  chosen_spanish: Dositheo
  alternatives_spanish:
  - Dositeo
  - Dositéo
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio en forma española transparente. 'Dositheo' mantiene cercanía con la transliteración griega y evita una adaptación eclesiástica no atestiguada por la fuente.
- source_word: τῶν τοῦ Βακινόρος
  english_pob_choice: one of Bacenor’s men
  chosen_spanish: uno de los de Bacenor
  alternatives_spanish:
  - uno de los hombres de Bacenor
  - uno de Bacenor
  lexicon: LSJ
  rationale: La frase genitiva señala pertenencia al grupo de Bacenor. 'Uno de los de Bacenor' preserva la relación sin añadir rango militar que el griego no explicita.
- source_word: ἔφιππος ἀνήρ
  english_pob_choice: a mounted man
  chosen_spanish: hombre montado
  alternatives_spanish:
  - jinete
  - hombre a caballo
  lexicon: LSJ
  rationale: '''Hombre montado'' sigue de cerca el sentido literal y conserva el matiz militar de alguien combatiente a caballo.'
- source_word: καρτερός
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - valiente
  - resoluto
  - robusto
  lexicon: LSJ
  rationale: Aquí el adjetivo destaca vigor físico y resistencia en combate. 'Fuerte' es el equivalente más directo y natural en español.
- source_word: εἶχεν τοῦ Γοργίου
  english_pob_choice: had hold of Gorgias
  chosen_spanish: tenía sujeto a Gorgias
  alternatives_spanish:
  - tenía agarrado a Gorgias
  - lo tenía sujeto
  - había apresado a Gorgias
  lexicon: LSJ
  rationale: La expresión idiomática indica sujeción física de Gorgias. 'Tenía sujeto' expresa bien la captura corporal sin sobreinterpretar el grado exacto del agarre.
- source_word: λαβόμενος τῆς χλαμύδος
  english_pob_choice: seizing his cloak
  chosen_spanish: al tomar su capa
  alternatives_spanish:
  - al sujetar su manto
  - al asir su capa militar
  - tomando su capa
  lexicon: LSJ
  rationale: χλαμύς es una capa o manto, a menudo de uso militar. 'Capa' es comprensible y fiel; se evita 'manto' por sonar más litúrgico que contextual.
- source_word: ἦγεν αὐτὸν εὐρώστως
  english_pob_choice: he was dragging him along forcefully
  chosen_spanish: lo iba arrastrando con fuerza
  alternatives_spanish:
  - lo llevaba con vigor
  - lo arrastraba vigorosamente
  - lo iba llevando con fuerza
  lexicon: LSJ
  rationale: El contexto de combate exige una acción violenta; 'arrastrando con fuerza' reproduce la idea de llevarlo por la fuerza de modo natural en español.
- source_word: βουλόμενον ... λαβεῖν ζωγρείαν
  english_pob_choice: intending to take the accursed man alive
  chosen_spanish: queriendo tomar vivo a aquel maldito
  alternatives_spanish:
  - con intención de capturarlo vivo
  - queriendo prender vivo a aquel maldito
  - deseando tomar vivo a ese maldito
  lexicon: LSJ
  rationale: ζωγρείαν comunica captura con vida, no muerte. 'Tomar vivo' conserva la fuerza verbal del griego y el giro narrativo del POB inglés.
- source_word: τὸν κατάρατον
  english_pob_choice: the accursed man
  chosen_spanish: aquel maldito
  alternatives_spanish:
  - el maldito
  - el accursedo
  lexicon: LSJ
  rationale: El griego usa un epíteto hostil. 'Aquel maldito' reproduce la invectiva con naturalidad en español y mantiene el tono despectivo del texto.
- source_word: τῶν ἱππέων τινὸς Θρακῶν
  english_pob_choice: one of the Thracian horsemen
  chosen_spanish: uno de los jinetes tracios
  alternatives_spanish:
  - uno de los caballeros tracios
  - un jinete de Tracia
  lexicon: LSJ
  rationale: '''Jinetes tracios'' transmite el sentido militar y étnico de la frase sin ampliar indebidamente el cargo o la unidad.'
- source_word: ἐπενεχθέντος αὐτῷ
  english_pob_choice: rushed upon him
  chosen_spanish: se lanzó contra él
  alternatives_spanish:
  - arremetió contra él
  - cayó sobre él
  - corrió contra él
  lexicon: LSJ
  rationale: La participio aoristo expresa una agresión súbita. 'Se lanzó contra él' es dinámico y fiel al movimiento hostil.
- source_word: τὸν ὦμον καθελόντος
  english_pob_choice: struck off his shoulder
  chosen_spanish: le descargó un golpe en el hombro
  alternatives_spanish:
  - le derribó el hombro
  - le cortó el hombro
  - le dio un golpe que le inutilizó el hombro
  lexicon: LSJ
  rationale: El griego es gráfico, pero el resultado anatómico exacto es algo discutido. Se elige una formulación que conserva la violencia del impacto sin fijar de manera excesiva la lesión exacta.
- source_word: διέφυγεν Γοργίας εἰς Μαρισά
  english_pob_choice: Gorgias escaped to Marisa
  chosen_spanish: Gorgias escapó a Marisá
  alternatives_spanish:
  - Gorgias huyó a Marisá
  - Gorgias se escapó a Marisá
  lexicon: LSJ
  rationale: Se mantiene el verbo de escape y el topónimo transliterado. 'Marisá' sigue la forma española fluida del nombre del lugar.
theological_decisions:
- issue: Alcance de la violencia en τὸν ὦμον καθελόντος
  english_pob_reading: Or 'cut down his shoulder' / 'disabled his shoulder'; the Greek describes a severe blow to the shoulder area, and the exact anatomical result may be understood somewhat differently.
  chosen_spanish_reading: le descargó un golpe en el hombro
  alternative_spanish_readings:
  - le cortó el hombro
  - le inutilizó el hombro
  - le derribó el hombro
  rationale: La fuente griega permite entender un golpe severo al hombro, pero no obliga a una lesión anatómica específica. La redacción española conserva la violencia del acto y deja abierta la precisión exacta, como lo hace el POB inglés en su nota.
  doctrine_reference: N/A (decisión de alcance léxico y textual)
- issue: Carga invectiva de τὸν κατάρατον
  english_pob_reading: the accursed man
  chosen_spanish_reading: aquel maldito
  alternative_spanish_readings:
  - el maldito
  - el accursedo
  rationale: El texto presenta una maldición o insulto, no una designación técnica. 'Aquel maldito' comunica el tono hostil sin suavizarlo ni convertirlo en una etiqueta doctrinal.
  doctrine_reference: N/A (registro narrativo)
- issue: σωζωγρεία / captura con vida
  english_pob_reading: to take the accursed man alive
  chosen_spanish_reading: queriendo tomar vivo a aquel maldito
  alternative_spanish_readings:
  - queriendo prender vivo a aquel maldito
  - con intención de capturarlo vivo
  rationale: El griego apunta a capturarlo vivo, no simplemente vencerlo. La elección española mantiene esa intención explícita y evita neutralizar el matiz militar de la escena.
  doctrine_reference: N/A (escena narrativa militar)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la caracterización de ἔφιππος ἀνήρ καὶ καρτερός a ''mounted man and strong'' y cambió la lesión de ''cut off'' a ''struck off'' para reflejar mejor el griego. La versión española sigue esa línea al usar ''hombre montado y fuerte'' y una formulación menos anatómicamente cerrada: ''le descargó un golpe en el hombro''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aparece en el versículo.'
  - '''Espíritu/espíritu'', ''justicia'', ''gracia'' y ''esclavo/siervo'' no intervienen aquí.'
  - 'Se emplean topónimos transliterados de forma coherente: Bacenor, Marisá.'
  - Se conserva el tono narrativo militar sin añadir explicaciones interpretativas.
