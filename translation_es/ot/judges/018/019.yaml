  language: en
  yaml_path: translation/ot/judges/018/019.yaml
  text: They said to him[a], “Be quiet; put your hand over your mouth, and come with us, and be to us a father and a priest. Is it better for you to be priest to the house of one man[c][b], or to be priest to a tribe and a clan in Israel?”
  footnotes:
