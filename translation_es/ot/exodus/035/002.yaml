revisions:
- from: Seis días se podrá hacer trabajo[a], pero en el séptimo día habrá para ustedes santidad, un sábado de completo reposo[b] para Yahvé. Cualquiera que haga en él trabajo morirá ciertamente.
  to: Se podrá hacer trabajo durante seis días, pero en el séptimo día habrá para ustedes un sábado santo, un sábado de completo reposo[a] para Yahvé[b]. Cualquiera que haga trabajo en él será condenado a muerte.
  rationale: 'Se eliminó la nota innecesaria sobre «trabajo» y se restauraron las dos notas léxicas verdaderamente pertinentes del audit trail: la intensificación de שַׁבַּת שַׁבָּתוֹן y el valor de לַיהוָה. Se cambió «santidad» por «un sábado santo» para reflejar mejor קֹדֶשׁ en español natural. Se cambió «morirá ciertamente» por «será condenado a muerte» para preservar la voz pasiva y la fuerza jurídica de יוּמָת. También se suavizó la sintaxis para una lectura más natural sin apartarse del hebreo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:43:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: seis días de trabajo, santidad del séptimo día, dedicación a Yahvé y pena capital para quien trabaje en él. Sin embargo, falla en dos puntos importantes del sentido fuente. Primero, קֹדֶשׁ no se expresa bien con «santidad» en esta sintaxis; el hebreo predica que el día será «santo» para ustedes, no que habrá abstractamente «santidad». Segundo, יוּמָת es pasivo causativo legal («será condenado a muerte / será puesto a muerte»), no el activo/intransitivo «morirá ciertamente», que debilita la fórmula penal y desplaza el sentido jurídico.'
  spanish_quality_summary: El texto es generalmente legible, pero «habrá para ustedes santidad» suena poco natural y algo abstracto en español bíblico actual. También «haga en él trabajo» es menos idiomático que «haga trabajo en él» o mejor «trabaje en él». Conviene además mantener una expresión más natural para el predicado de santidad y una pena legal pasiva clara.
  glossary_alignment: Acierta al usar «Yahvé» para יהוה y «trabajo» para מְלָאכָה. «Sábado de completo reposo» es aceptable y refleja bien שַׁבַּת שַׁבָּתוֹן. La principal desalineación léxica está en קֹדֶשׁ -> «santidad», donde el español preferible es «santo», y en יוּמָת, donde el proyecto y la evidencia piden una formulación pasiva penal como «será condenado a muerte» o «será puesto a muerte».
  issues:
  - severity: high
    issue: «santidad» para קֹדֶשׁ en «habrá para ustedes santidad»
    rationale: 'El hebreo expresa predicación sobre el día: «será para ustedes santo / cosa santa». «Santidad» introduce un abstracto poco idiomático y no reproduce bien la función predicativa en español.'
  - severity: high
    issue: «morirá ciertamente» para יוּמָת
    rationale: 'יוּמָת es hofal pasivo: la persona no simplemente muere, sino que es puesta a muerte bajo sanción legal. La versión actual pierde ese matiz jurídico y cambia la voz.'
  - severity: medium
    issue: Nota [a] no corresponde al inglés auditado ni añade una alternativa significativa
    rationale: La nota [a] en inglés está anclada a «six days» y no a «work»; el borrador español crea una nota sobre «trabajo» que no responde a una ambigüedad importante del versículo.
  - severity: medium
    issue: «haga en él trabajo» es algo torpe
    rationale: Aunque comprensible, suena menos natural que «haga trabajo en él» o, más idiomáticamente, «trabaje en él», sin pérdida de sentido.
  revised_spanish_text: Se podrá hacer trabajo durante seis días, pero en el séptimo día habrá para ustedes un sábado santo, un sábado de completo reposo[a] para Yahvé[b]. Cualquiera que haga trabajo en él será condenado a muerte.
  revised_footnotes:
  - marker: a
    text: O «un sábado de solemne reposo». La expresión hebrea «sábado, sábado de reposo» intensifica la idea de cesación completa del trabajo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a Yahvé»; también puede entenderse como «para Yahvé» o «perteneciente a Yahvé».
    reason: lexical_alternative
  revision_rationale: 'Se eliminó la nota innecesaria sobre «trabajo» y se restauraron las dos notas léxicas verdaderamente pertinentes del audit trail: la intensificación de שַׁבַּת שַׁבָּתוֹן y el valor de לַיהוָה. Se cambió «santidad» por «un sábado santo» para reflejar mejor קֹדֶשׁ en español natural. Se cambió «morirá ciertamente» por «será condenado a muerte» para preservar la voz pasiva y la fuerza jurídica de יוּמָת. También se suavizó la sintaxis para una lectura más natural sin apartarse del hebreo.'
