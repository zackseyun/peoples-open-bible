    issue: «será encendido» suena poco natural en español para ἐκκαυθήσεται
    rationale: Aunque refleja el pasivo griego, en español bíblico y general la imagen se expresa mejor con «arderá», que mantiene la metáfora de combustión y evita una construcción rígida o mecánica.
  - severity: low
    issue: El pronombre «él» es innecesario en «él levantará su enojo»
    rationale: El español no requiere el pronombre sujeto aquí; su presencia hace la frase menos natural sin añadir claridad.
  - severity: low
    issue: La nota [b] ya usa «arderá», creando leve tensión con el texto principal «será encendido»
    rationale: Alinear el texto principal con una forma verbal más idiomática también armoniza mejor con la alternativa explicativa de la nota.
