    issue: «espías de la tierra» en el texto principal suena poco natural en español
    rationale: Aunque reproduce de cerca el hebreo y el inglés POB, en español moderno «espías del país» comunica mejor la idea de reconnaissance/espionaje sin pérdida semántica. La literalidad puede mantenerse en la nota.
  - severity: low
    issue: La nota b puede mejorarse para reflejar la nueva redacción principal
    rationale: Si el texto principal usa «espías del país», la nota debe conservar la alternativa más literal «espías de la tierra» y la explicación del idiomatismo hebreo.
