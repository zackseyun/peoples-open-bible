    rationale: 'Dice: "puede significar ''tierra'' o ''tierra/país''", lo cual repite ''tierra'' y no explica con precisión la alternativa. Debe distinguir mejor entre ''país/territorio'' y ''tierra'' en sentido más amplio.'
