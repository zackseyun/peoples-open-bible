  to: Pero extiende tu mano, te ruego, y toca su hueso y su carne; y él seguramente te maldecirá[a] en tu cara.
  rationale: Se conserva la fidelidad al hebreo y al POB inglés, pero se elimina una nota superflua no requerida por la evidencia y se mejora el registro de «en tu misma cara» a «en tu cara», que sigue siendo directo, natural y digno. La nota esencial sobre el eufemismo de «bendecirá» se mantiene con su anclaje correcto.
