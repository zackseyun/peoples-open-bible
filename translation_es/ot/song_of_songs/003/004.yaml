translation:
  language: es
  text: Apenas había pasado junto a ellos cuando encontré al que mi alma ama[a]. Me aferré a él y no lo solté, hasta que lo hube llevado a la casa de mi madre[b], y a la cámara de la que me concibió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «a quien ama mi alma».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la cámara de la que me concibió», un paralelo poético con «la casa de mi madre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְעַט
  english_pob_choice: I had scarcely
  chosen_spanish: Apenas había
  alternatives_spanish:
  - A duras penas había
  - Casi había
  lexicon: HALOT
  rationale: «כִּמְעַט» expresa proximidad temporal; en español, «Apenas había» reproduce con naturalidad la idea de que el hallazgo ocurrió casi de inmediato después de pasar.
- source_word: שֶׁעָבַרְתִּי מֵהֶם
  english_pob_choice: passed by them
  chosen_spanish: había pasado junto a ellos
  alternatives_spanish:
  - había pasado de ellos
  - había pasado más allá de ellos
  lexicon: HALOT
  rationale: «עבר מֵ» señala avanzar dejando atrás a los vigilantes mencionados; «junto a ellos» conserva el movimiento narrativo sin sonar artificial en español.
- source_word: עַד שֶׁמָּצָאתִי
  english_pob_choice: when I found
  chosen_spanish: cuando encontré
  alternatives_spanish:
  - hasta que encontré
  - al encontrar
  lexicon: HALOT
  rationale: Aunque la forma hebrea dice literalmente «hasta que», aquí la relación temporal se expresa mejor en español con «cuando encontré», manteniendo la inmediatez lograda por el inglés POB.
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  english_pob_choice: the one my soul loves
  chosen_spanish: al que ama mi alma
  alternatives_spanish:
  - al que ama mi alma con todo mi ser
  - a quien ama mi alma
  lexicon: HALOT
  rationale: Se conserva «alma» para reflejar נֶפֶשׁ sin reducirlo a mero afecto. «Al que ama mi alma» mantiene el tono poético y la recurrencia de la fórmula en Cantar.
- source_word: אֲחַזְתִּי/ו
  english_pob_choice: I held on to him
  chosen_spanish: Lo abracé
  alternatives_spanish:
  - Lo agarré
  - Lo sujeté
  lexicon: HALOT
  rationale: Aunque אחז puede ser «agarrar/sujetar», en este contexto amoroso «Lo abracé» comunica la firmeza afectiva sin introducir violencia ni aspereza innecesaria.
- source_word: וְלֹא אַרְפֶּנּוּ
  english_pob_choice: and would not let him go
  chosen_spanish: y no lo solté
  alternatives_spanish:
  - y no lo dejé ir
  - y no lo solté de mi mano
  lexicon: HALOT
  rationale: La idea de רפה en causativo es «dejar ir / soltar». «No lo solté» es la equivalencia española más natural y fiel al gesto de retenerlo.
- source_word: עַד שֶׁהֲבֵיאתִיו
  english_pob_choice: until I had brought him
  chosen_spanish: hasta que lo hube llevado
  alternatives_spanish:
  - hasta que lo llevé
  - hasta traerlo
  lexicon: HALOT
  rationale: El hebreo presenta una acción completada antes del destino; el pluscuamperfecto compuesto con «hube llevado» preserva mejor esa anterioridad que un simple pretérito.
- source_word: אֶל בֵּית אִמִּי
  english_pob_choice: into my mother's house
  chosen_spanish: a la casa de mi madre
  alternatives_spanish:
  - hacia la casa de mi madre
  - dentro de la casa de mi madre
  lexicon: HALOT
  rationale: El hebreo señala dirección hacia el interior; en español, «a la casa de mi madre» es la forma más natural y no pierde la idea de traslado al lugar.
- source_word: וְאֶל חֶדֶר הוֹרָתִי
  english_pob_choice: into the chamber of the one who conceived me
  chosen_spanish: y a la cámara de la que me concibió
  alternatives_spanish:
  - y al aposento de la que me concibió
  - y al cuarto de la que me concibió
  lexicon: HALOT
  rationale: «הוֹרָתִי» remite a la que me concibió, no simplemente a «mi madre»; se conserva la paralela poética con «cámara» y la referencia personal femenina del hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi vida
  lexicon: HALOT
  rationale: Se mantiene «alma» para reproducir el registro poético y la carga afectiva de נֶפֶשׁ, tal como lo hace el POB inglés con «soul».
theological_decisions:
- issue: Retener el paralelismo poético entre «casa de mi madre» y «la cámara de la que me concibió» sin nivelarlo a una sola expresión
  english_pob_reading: Hebrew 'the chamber of the one who conceived me,' a poetic parallel to 'my mother's house.'
  chosen_spanish_reading: «la casa de mi madre» / «la cámara de la que me concibió»
  alternative_spanish_readings:
  - «la casa de mi madre» / «la cámara de mi madre»
  - «la casa de mi madre» / «el aposento de mi madre»
  rationale: El hebreo preserva dos frases relacionadas pero no idénticas. La segunda no debe absorberse por completo en la primera, porque el texto mantiene un paralelismo poético con cierto desplazamiento de énfasis hacia la concepción. La versión española conserva esa tensión.
  doctrine_reference: Poética hebrea / paralelismo sin homogenización
- issue: Interpretación de «נַפְשִׁי» como centro afectivo y personal, no solo como «vida» o «ser»
  english_pob_reading: the one my soul loves
  chosen_spanish_reading: «al que ama mi alma»
  alternative_spanish_readings:
  - «al que amo con toda mi alma»
  - «al que ama mi vida»
  rationale: El hebreo y el inglés POB preservan el lenguaje de «alma» para mantener la textura literaria del Cantar. En español se evita diluirlo en «vida» o en una paráfrasis más explicativa.
  doctrine_reference: Antropología bíblica / lenguaje poético
translation_notes:
  revision_awareness: El borrador sigue de cerca el trazado revisado del inglés POB, manteniendo su equivalencia óptima y su par de notas para la alternativa más formal y para el paralelismo poético final. No se detectaron revisiones aplicadas en el historial más reciente, así que la redacción española se alinea con el estado estable del texto fuente.
  spanish_consistency_notes:
  - Se mantiene «alma» de manera consistente para נַפְשִׁי.
  - Se usa «cámara» en la nota y en el texto para conservar el tono poético, no «habitación» o «cuarto», que bajarían el registro.
  - La elección de «Lo abracé» traduce el gesto de sujetar con afecto y evita una resonancia violenta.
  - «Apenas había» conserva el matiz de proximidad temporal sin imitar mecánicamente el orden hebreo.
