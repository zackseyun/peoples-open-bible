translation:
  language: es
  text: 'Y en aquel día Tiro será olvidada por setenta años[a], como los días de un solo rey. Al cabo de setenta años[b], a Tiro le acontecerá como en el canto de la prostituta:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «durante la vida de un solo rey». El hebreo dice literalmente «como los días de un solo rey».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como en el canto de la prostituta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... acontecerá
  - Y ... sucederá
  lexicon: HALOT
  rationale: En español profético, la construcción con futuro simple comunica bien el valor prospectivo del hebreo. 'Será' conserva la entrada de un nuevo estado/circunstancia sin forzar una paráfrasis más interpretativa.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  lexicon: HALOT
  rationale: La fórmula profética queda natural en español como 'en aquel día', manteniendo su registro solemne y su referencia temporal convencional.
- source_word: וְנִשְׁכַּחַת
  english_pob_choice: will be forgotten
  chosen_spanish: será olvidada
  alternatives_spanish:
  - quedará olvidada
  - será dejada en el olvido
  lexicon: HALOT
  rationale: El niphal de שׁכח expresa pasividad/resultativo. 'Será olvidada' reproduce bien la idea de perder notoriedad o memoria pública, adecuada para Tiro.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  lexicon: HALOT
  rationale: Se usa la forma usual en español para la ciudad fenicia, sin transliteración inglesa.
- source_word: שִׁבְעִים שָׁנָה
  english_pob_choice: for seventy years
  chosen_spanish: por setenta años
  alternatives_spanish:
  - durante setenta años
  - setenta años
  lexicon: HALOT
  rationale: El valor de duración se expresa de forma natural con 'por' tras 'será olvidada', preservando el intervalo temporal sin añadir interpretación.
- source_word: כִּימֵי מֶלֶךְ אֶחָד
  english_pob_choice: like the days of one king
  chosen_spanish: como los días de un solo rey
  alternatives_spanish:
  - como la vida de un rey
  - como el tiempo de un rey
  lexicon: HALOT
  rationale: La comparación con כ y el plural 'días' se conserva de modo bastante literal. 'Un solo rey' refleja אֶחָד y mantiene la imagen sin convertirla en 'vida' de manera obligada.
- source_word: מִקֵּץ
  english_pob_choice: At the end of
  chosen_spanish: Al cabo de
  alternatives_spanish:
  - Al final de
  - Después de
  lexicon: HALOT
  rationale: '''Al cabo de'' expresa con naturalidad el cierre de un período temporal y conserva la fuerza de inicio de una nueva fase tras los setenta años.'
- source_word: יִהְיֶה לְצֹר
  english_pob_choice: it will happen to Tyre
  chosen_spanish: a Tiro le acontecerá
  alternatives_spanish:
  - le sucederá a Tiro
  - Tiro recibirá
  lexicon: HALOT
  rationale: El hebreo היה ל puede indicar que algo ocurre o resulta para alguien/algo. 'Le acontecerá' mantiene la construcción impersonal y la idea de incidencia sobre Tiro sin sobreexplicar.
- source_word: כְּשִׁירַת
  english_pob_choice: as in the song of
  chosen_spanish: como en el canto de
  alternatives_spanish:
  - como en la canción de
  - según el canto de
  lexicon: HALOT
  rationale: '''Canto'' funciona bien para el tono poético-profético y deja abierta la referencia al texto citado inmediatamente después.'
- source_word: הַזּוֹנָה
  english_pob_choice: the prostitute
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  - la ramera/prostituta
  lexicon: HALOT
  rationale: זונה denota una prostituta. Se conserva el término directo y contemporáneo para no suavizar la metáfora ni caer en arcaísmo.
theological_decisions:
- issue: Metáfora sexual aplicada a Tiro
  english_pob_reading: Retain the metaphor directly as 'the prostitute' without softening it.
  chosen_spanish_reading: Mantener la metáfora de 'la prostituta' sin suavizarla.
  alternative_spanish_readings:
  - la ramera
  - una mujer promiscua
  rationale: El texto profético usa un lenguaje sexualizado y comercial como recurso retórico. Mantenerlo ayuda a conservar la fuerza del juicio y la conexión con el canto citado en el contexto inmediato.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se revisó el antecedente inglés de la POB, que mantiene dos notas alternativas y traduce el hebreo con equivalencia óptima. No hay revisiones aplicadas en el registro inglés reciente, así que la propuesta española conserva el mismo sentido, la misma segmentación y las mismas dos alternativas clave, adaptadas a español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene 'Tiro' como nombre propio estándar en español.
  - Se conserva la fórmula profética 'en aquel día' para uniformidad con otros pasajes.
  - '''Prostituta'' se usa de forma consistente para זונה en este contexto, sin arcaizar ni suavizar.'
  - La nota [a] se ancla en 'por setenta años' y la nota [b] en 'Al cabo de setenta años'.
