revisions:
- from: En un pacto[b][a] estableciste con nuestros padres acerca de nosotros, y nosotros esperaremos en ti en el volver de nuestra alma.
  to: En un pacto[a][b] estableciste a nuestros padres acerca de nosotros, y nosotros esperaremos en ti en el retorno de nuestra alma.
  rationale: Se corrige el régimen de «estableciste» para reflejar mejor τοῖς πατράσιν ἡμῶν en español y se sustituye «volver» por «retorno» para una expresión más natural y digna, sin perder la literalidad ni la tensión teológica del original. Se conservan las dos notas, con marcadores válidos presentes en el texto.
