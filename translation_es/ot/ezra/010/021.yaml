translation:
  language: es
  text: 'Y de los hijos de Harim: Maasías[a], Elías, Semaías, Jehiel y Uzías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y de los hijos de Harim». La construcción hebrea presenta aquí otro subgrupo familiar dentro de la lista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de entre los hijos de
  - Y de los hijos de
  lexicon: HALOT
  rationale: La construcción con ו + מן + בְּנֵי introduce un subgrupo dentro de la lista. «Y de los hijos de» conserva de forma natural el valor partitivo y el enlace con la enumeración previa; «de entre» explicita más el matiz, pero suena menos directo aquí.
- source_word: חָרִם
  english_pob_choice: Harim
  chosen_spanish: Harim
  alternatives_spanish:
  - Jarim
  lexicon: Nombre propio transliterado
  rationale: Es un nombre propio de familia/persona; se conserva la transliteración usual. No hay base en el texto para traducirlo.
- source_word: מַעֲשֵׂיָה
  english_pob_choice: Maaseiah
  chosen_spanish: Maasías
  alternatives_spanish:
  - Maaseías
  - Maaseya
  lexicon: Nombre propio transliterado
  rationale: Se adapta al uso bíblico español más reconocible sin introducir una traducción del nombre. La forma «Maasías» mantiene la identificación del nombre propio con fluidez en español.
- source_word: וְ/אֵלִיָּה
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Eliyá
  - Eliyyah
  lexicon: Nombre propio transliterado
  rationale: El nombre propio tiene forma establecida en español bíblico. «Elías» es la equivalencia convencional y plenamente inteligible.
- source_word: וּֽ/שְׁמַֽעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemayá
  - Semaia
  lexicon: Nombre propio transliterado
  rationale: Se sigue la convención española bíblica habitual para este nombre, manteniendo la identidad del personaje/familia sin calcar la ortografía inglesa.
- source_word: וִ/יחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yehiel
  - Jehiél
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma bíblica ya establecida en español y en el audit trail inglés, evitando una transliteración más estricta que sería menos reconocible.
- source_word: וְ/עֻזִיָּה
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Uzzías
  - Uzziyá
  lexicon: Nombre propio transliterado
  rationale: «Uzías» es la forma tradicional y natural en español bíblico. Mantiene la identificación del nombre con una ortografía aceptada y clara.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y el trazado inglés, sin cambios de contenido respecto al último pase: solo se ajustó la forma española para la lectura pública y la convención onomástica bíblica en español.'
  spanish_consistency_notes:
  - Se conserva la partícula inicial «Y» para reflejar la continuidad de la lista.
  - Los nombres propios se presentan con formas bíblicas españolas reconocibles, sin añadir significado etimológico no explicitado en el texto.
  - La nota al pie reproduce la alternativa formal documentada en el audit trail inglés y la aplica a la sintaxis hebrea de pertenencia/subgrupo.
