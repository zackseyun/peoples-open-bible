    text: O «he aquí». El marcador discursivo hebreo llama enfáticamente la atención sobre la declaración que sigue.
    reason: lexical_alternative
  - marker: b
    text: O «han sido llevados en cautiverio». El hebreo dice literalmente «en cautiverio».
    reason: lexical_alternative
  revision_rationale: Se ajusta la enumeración familiar para preservar mejor la distinción del hebreo entre hijos varones y hijas sin introducir una expresión torpe. «Nuestros hijos, nuestras hijas y nuestras esposas» mantiene la lista diferenciada y mejora la claridad en español.
