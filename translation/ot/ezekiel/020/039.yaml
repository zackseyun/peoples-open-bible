theological_decisions:
- issue: Force of the opening imperatives
  chosen_reading: 'A judicial concession/ironic command: Israel is told to go serve idols if they refuse to listen, followed by a prohibition/declaration that they must no longer profane God''s holy name.'
  alternative_readings:
  - A simple command endorsing continued idol service
  - A purely sarcastic statement without imperative force
  rationale: In context, YHWH is not approving idolatry but exposing Israel's rebellion and announcing that such profanation cannot continue. The translation preserves the imperative form while making the conditional refusal to listen explicit.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Rendering the divine name in אֲדֹנָי יְהֹוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - Lord YHWH
  - the Lord Yahweh
  rationale: This follows the stated default for יְהוָה while handling the compound title idiomatically in English. It avoids importing a sectarian preference for pronouncing the Tetragrammaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
