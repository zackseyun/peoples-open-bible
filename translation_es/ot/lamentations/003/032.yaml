translation:
  language: es
  text: Porque si él causa dolor[a], también mostrará compasión conforme a la abundancia de su amor leal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque él cause dolor, aun así mostrará compasión conforme a la abundancia de su amor leal». El hebreo permite oír aquí un matiz concesivo en el contexto.'
    reason: alternative_reading
  - marker: b
    text: «Amor leal» traduce el hebreo hesed, término que también puede expresarse como «misericordia», «amor constante» o «amor fiel» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Aunque
  - Pero si
  - Y si
  lexicon: HALOT
  rationale: La combinación introduce una relación condicional vinculada al contexto previo. «Porque si» conserva el valor explicativo de כִּי y la condición de אִם sin forzar un giro adversativo más fuerte de lo que exige el hebreo.
- source_word: הוֹגָה
  english_pob_choice: he causes grief
  chosen_spanish: causa dolor
  alternatives_spanish:
  - aflige
  - causa tristeza
  - produce aflicción
  lexicon: HALOT
  rationale: 'El hifil tiene fuerza causativa: provocar dolor, aflicción o pena. «Causa dolor» suena natural en español y conserva el efecto emocional del contexto de lamentación sin perder la idea causal.'
- source_word: וְרִחַם
  english_pob_choice: he will also show compassion
  chosen_spanish: también mostrará compasión
  alternatives_spanish:
  - y tendrá compasión
  - pero tendrá compasión
  - y será compasivo
  lexicon: HALOT
  rationale: רִחַם expresa compasión/clemencia. «Mostrará compasión» comunica bien la acción benevolente; el adverbio «también» refleja el waw coordinante y el paralelismo con la primera cláusula.
- source_word: כְּרֹב
  english_pob_choice: according to the abundance of
  chosen_spanish: conforme a la abundancia de
  alternatives_spanish:
  - según la abundancia de
  - de acuerdo con la abundancia de
  - en proporción a la abundancia de
  lexicon: HALOT
  rationale: La preposición כ con רֹב marca medida o estándar. «Conforme a» transmite correspondencia y mantiene un registro natural y bíblico en español.
- source_word: חסד
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su amor fiel
  lexicon: HALOT
  rationale: חסד es un término de gran densidad teológica. Se evita «misericordia» para no confundirlo con רחם. «Amor leal» preserva la dimensión relacional, pactal y fiel del término sin depender de una fórmula demasiado técnica en español.
theological_decisions:
- issue: Distinguir חסד de רחם
  english_pob_reading: Differentiate רחם as 'show compassion' and חסד as 'steadfast love.'
  chosen_spanish_reading: Distinguir רִחַם como «mostrar compasión» y חסד como «amor leal».
  alternative_spanish_readings:
  - «tener misericordia» / «misericordia»
  - «tener compasión» / «amor fiel»
  rationale: 'El versículo une dos términos afines pero no idénticos. Mantenerlos distintos en español refleja mejor la textura del hebreo: la acción compasiva de Dios fluye de la amplitud de su חסד, no simplemente de un mismo concepto repetido.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Posible matiz concesivo de la primera cláusula
  english_pob_reading: Or 'Though he causes grief, yet he will have compassion according to the abundance of his steadfast love.'
  chosen_spanish_reading: «Porque si él causa dolor[a], también mostrará compasión…» con la nota de que el hebreo puede leerse también con matiz concesivo.
  alternative_spanish_readings:
  - «Aunque él cause dolor, aun así mostrará compasión…»
  - «Pero si él causa dolor, también mostrará compasión…»
  rationale: El hebreo permite oír una lectura condicional o concesiva en contexto. Se conserva la formulación principal más cercana al texto, sin borrar la alternativa atestiguada por el audit trail.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La versión inglesa final quedó sin cambios en la última pasada editorial; el acuerdo de revisión fue alto y no hubo observaciones que exigieran ajuste. La propuesta española mantiene esa lectura estable y solo explicita en nota el matiz concesivo ya documentado.
  spanish_consistency_notes:
  - Se mantiene la distinción terminológica entre רחם («compasión») y חסד («amor leal»).
  - Se evita traducir חסד por «misericordia» para no absorber el matiz de רחם.
  - «Porque si» conserva mejor la relación lógica del hebreo que una adversativa plenamente concesiva en el cuerpo principal.
  - La puntuación y el registro buscan un español bíblico moderno, claro y publicable.
