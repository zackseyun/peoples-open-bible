translation:
  language: es
  text: oro para las cosas de oro, y plata para las cosas de plata, y para toda clase de obra, por manos de artesanos. ¿Y quién se ofrece voluntariamente para hoy llenar su mano[a] para Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «llenar su mano». Este modismo hebreo puede referirse a la consagración o a presentar una ofrenda para el servicio sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַזָּהָב ... לַזָּהָב
  english_pob_choice: gold for the things of gold
  chosen_spanish: oro para las cosas de oro
  alternatives_spanish:
  - oro para oro
  - oro para la orfebrería
  lexicon: HALOT
  rationale: La repetición hebrea es elíptica y apunta a material destinado a objetos de oro. En español, 'las cosas de oro' conserva la elipsis y hace explícito el sentido sin sobreinterpretar.
- source_word: וְלַכֶּסֶף לַכֶּסֶף
  english_pob_choice: and silver for the things of silver
  chosen_spanish: plata para las cosas de plata
  alternatives_spanish:
  - plata para plata
  - plata para la platería
  lexicon: HALOT
  rationale: Mantiene el paralelismo con 'oro... oro' y refleja que la plata está destinada a objetos de plata, no solo al metal en abstracto.
- source_word: וּלְכָל מְלָאכָה
  english_pob_choice: and for every kind of work
  chosen_spanish: y para toda clase de obra
  alternatives_spanish:
  - y para toda obra
  - y para todo trabajo
  lexicon: HALOT
  rationale: מְלָאכָה puede abarcar labor, oficio u obra. 'Toda clase de obra' transmite amplitud y suena natural en español bíblico contemporáneo.
- source_word: בְּיַד חָרָשִׁים
  english_pob_choice: by the hands of craftsmen
  chosen_spanish: por mano de artesanos
  alternatives_spanish:
  - por las manos de artesanos
  - por los artesanos
  lexicon: HALOT
  rationale: La imagen de 'mano' se conserva de manera idiomática. 'Artesanos' corresponde al oficio manual implicado por חָרָשִׁים y evita un calco torpe.
- source_word: וּמִי מִתְנַדֵּב
  english_pob_choice: And who is willing
  chosen_spanish: ¿Y quién se ofrece voluntariamente?
  alternatives_spanish:
  - ¿Y quién quiere ofrecerse?
  - ¿Y quién está dispuesto?
  lexicon: HALOT
  rationale: El hitpael de נדב expresa disposición libre, voluntaria. 'Se ofrece voluntariamente' conserva ese matiz mejor que un simple 'quiere'.
- source_word: לְמַלֹּאות יָדוֹ
  english_pob_choice: to fill his hand
  chosen_spanish: para llenar hoy su mano
  alternatives_spanish:
  - para llenar su mano
  - para consagrar su mano
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea 'llenar la mano' porque el propio POB inglés revisó hacia una forma más literal y el texto fuente permite esa imagen cultual. Se evita expandirlo a 'consagrar' en el cuerpo principal.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal directo y claro en español.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahveh
  lexicon: HALOT
  rationale: Se sigue el término estándar del proyecto para el Tetragrámaton. 'Para Yahvé' preserva el nombre divino sin la máscara de 'SEÑOR'.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. En español del proyecto, se rinde como 'Yahvé' para conservar el nombre del pacto y evitar la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomático cultual לְמַלֹּאות יָדוֹ
  english_pob_reading: to fill his hand
  chosen_spanish_reading: llenar hoy su mano
  alternative_spanish_readings:
  - consagrar su mano
  - llenar su mano
  rationale: La frase conserva el idiomatismo hebreo y su posible fuerza de dedicación/servicio. El sentido exacto queda abierto como en el texto fuente, sin reemplazarlo por una explicación interpretativa en el cuerpo principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde una paráfrasis interpretativa (''to consecrate his hand'') hacia una formulación más literal (''to fill his hand''). La presente traducción sigue esa revisión, preservando la imagen hebrea y evitando cerrar el sentido cultual más de lo que permite el original. También se ajusta el nombre divino al criterio español del proyecto: Yahvé.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo oro/plata con estructura simétrica.
  - '''Artesanos'' traduce el oficio implícito en חָרָשִׁים sin introducir vocabulario técnico innecesario.'
  - '''Se ofrece voluntariamente'' conserva la voluntad libre de מִתְנַדֵּב.'
  - La nota a pie de página está anclada en '[a]' dentro del texto para cumplir la trazabilidad exigida.
