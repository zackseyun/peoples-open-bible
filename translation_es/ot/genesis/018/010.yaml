    text: 'O: «a la entrada de la tienda, y estaba detrás de él».'
    reason: previous_rendering
  revision_rationale: 'El texto principal solo requiere un ajuste estilístico menor («Sin duda volveré») y, sobre todo, una reparación del aparato de notas para que coincida con la evidencia fuente y la auditoría inglesa: la nota del modismo temporal debe ir en la frase temporal, y las dos notas sobre la cláusula final deben anclarse al segmento «detrás de él», no a «dijo» ni a «he aquí».'
