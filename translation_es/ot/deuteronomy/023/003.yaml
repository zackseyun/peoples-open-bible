translation:
  language: es
  text: Ninguno de nacimiento ilegítimo[a] podrá entrar en la asamblea de Yahvé; aun hasta la décima generación[b], ninguno de sus descendientes podrá entrar en la asamblea de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «bastardo». El hebreo מַמְזֵר designa a una persona de nacimiento ilegítimo o de estatus de nacimiento excluido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni aun en la décima generación». La expresión hebrea marca la duración o extensión de la exclusión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַמְזֵר
  english_pob_choice: one of illegitimate birth
  chosen_spanish: de nacimiento ilegítimo
  alternatives_spanish:
  - bastardo
  - persona de nacimiento ilegítimo
  - ilegítimo
  lexicon: HALOT
  rationale: El término hebreo designa a una persona con estatus de nacimiento ilegítimo o excluido. «De nacimiento ilegítimo» conserva la categoría jurídica/genealógica sin importar la carga vulgar o arcaica de «bastardo».
- source_word: יָבֹא
  english_pob_choice: may enter
  chosen_spanish: podrá entrar
  alternatives_spanish:
  - entrará
  - puede entrar
  - podrá ser admitido
  lexicon: HALOT
  rationale: En este contexto legal, el verbo indica admisión o acceso. «Podrá entrar» comunica con naturalidad la prohibición de ingreso y mantiene cercanía semántica al hebreo.
- source_word: בִּקְהַל יְהוָה
  english_pob_choice: the assembly of Yahweh
  chosen_spanish: la asamblea de Yahvé
  alternatives_spanish:
  - la congregación de Yahvé
  - la asamblea del SEÑOR
  lexicon: HALOT
  rationale: «Asamblea» refleja bien קהל como comunidad reunida en sentido covenantal. Se mantiene «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: גַּם דּוֹר עֲשִׂירִי
  english_pob_choice: even to the tenth generation
  chosen_spanish: ni aun en la décima generación
  alternatives_spanish:
  - hasta la décima generación
  - incluso en la décima generación
  lexicon: HALOT
  rationale: La fórmula expresa la extensión temporal de la exclusión. «Ni aun en la décima generación» preserva la fuerza legal del hebreo en español natural.
- source_word: לֹא יָבֹא ל֖וֹ
  english_pob_choice: none of his descendants may enter
  chosen_spanish: podrá entrar ninguno de sus descendientes
  alternatives_spanish:
  - ninguno de los suyos podrá entrar
  - no podrá entrar nadie de su descendencia
  lexicon: HALOT
  rationale: El pronombre לֹו en la repetición apunta a su línea o descendencia. «Ninguno de sus descendientes» explicita esa fuerza idiomática sin añadir contenido ajeno al texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto para español, se vierte «Yahvé» para preservar el nombre de pacto y evitar el reemplazo litúrgico de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura revisada del POB en inglés y conserva sus decisiones clave: מַמְזֵר como estatus de nacimiento ilegítimo, קהל como asamblea, la fórmula generacional de exclusión, y el nombre divino con transliteración reverente. No se detectaron cambios pendientes en la última pasada de revisión.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, en lugar de una sustitución por «SEÑOR».
  - «Asamblea» conserva el valor comunitario-jurídico de קהל en este contexto legal.
  - «De nacimiento ilegítimo» evita la dureza de «bastardo» sin perder el sentido técnico.
  - La repetición de «podrá entrar» reproduce la estructura prohibitiva del hebreo con claridad idiomática en español.
