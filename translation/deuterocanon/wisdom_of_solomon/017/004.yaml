translation:
  text: For not even the inner chamber that held them kept them free from fear[a], but sounds that troubled them rang around them[b], and gloomy apparitions with unsmiling faces appeared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'phantoms' or 'specters' for 'apparitions.' The Greek term denotes ghostly or uncanny appearances.
    reason: lexical_alternative
  - marker: b
    text: The rare verb rendered 'rang around them' suggests repeated surrounding noise or reverberation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μυχὸς
  chosen: inner chamber
  alternatives:
  - recess
  - hidden place
  - innermost room
  lexicon: LSJ
  rationale: μυχός denotes an inner recess or hidden interior space. 'Inner chamber' conveys an enclosed, interior place more naturally in English than the more abstract 'recess,' while preserving the sense that even their place of concealment gave no security.
- source_word: ὁ κατέχων αὐτούς
  chosen: that held them
  alternatives:
  - that confined them
  - that contained them
  - that kept them
  lexicon: BDAG
  rationale: The participle from κατέχω here describes the chamber as holding or enclosing them. 'Held them' is concise and natural; 'confined them' would heighten coercion beyond what the phrase itself requires.
- source_word: ἀφόβως
  chosen: unafraid
  alternatives:
  - securely
  - without fear
  - fearlessly
  lexicon: LSJ
  rationale: The adverb means 'without fear' or 'fearlessly.' In context the point is not that the chamber guarded them bravely, but that it failed to keep them free from fear. 'Kept them unafraid' captures the idiomatic force in English.
- source_word: διεφύλασσεν
  chosen: kept
  alternatives:
  - guarded
  - preserved
  - protected
  lexicon: LSJ
  rationale: The verb means to guard carefully or preserve. Because the object-complement construction with ἀφόβως is prominent, 'kept them unafraid' reads more naturally than 'guarded them fearlessly' and better reflects the sense of failed protection from terror.
- source_word: ἦχοι
  chosen: sounds
  alternatives:
  - noises
  - echoes
  lexicon: LSJ
  rationale: ἦχοι are sounds or noises. 'Sounds' is broad and fits the eerie atmosphere without over-specifying volume or source.
- source_word: ἐκταράσσοντες
  chosen: that disturbed
  alternatives:
  - that terrified
  - that threw into confusion
  - that agitated
  lexicon: LSJ
  rationale: The participle indicates causing agitation or disturbance. 'Disturbed' preserves the psychological unsettlement without overstating the term as outright terror, which is already supplied by the verse's broader context.
- source_word: ἐτρεκόμπουν
  chosen: rang around them
  alternatives:
  - resounded around them
  - clattered around them
  - echoed around them
  lexicon: LSJ
  rationale: This rare/imperfect verb conveys repeated noisy reverberation or din around them. 'Rang around them' gives the sense of surrounding auditory disturbance in readable English. Because the form is unusual, a more wooden rendering would risk obscurity.
- source_word: φάσματα
  chosen: apparitions
  alternatives:
  - phantoms
  - ghostly forms
  - specters
  lexicon: LSJ
  rationale: φάσματα refers to appearances, phantoms, or apparitions. 'Apparitions' preserves the supernatural and visual sense without implying a specific ontology such as literal ghosts.
- source_word: ἀμειδήτοις
  chosen: unsmiling
  alternatives:
  - grim
  - without a smile
  - sullen
  lexicon: LSJ
  rationale: The adjective literally means 'not smiling' or 'without a smile.' 'Unsmiling' is the closest natural equivalent and preserves the concrete imagery.
- source_word: κατηφῆ προσώποις
  chosen: gloomy faces
  alternatives:
  - downcast faces
  - sullen faces
  - gloom-stricken faces
  lexicon: LSJ
  rationale: κατηφής denotes downcast, gloomy, or dejected. 'Gloomy faces' is idiomatic and matches the ominous tone of the verse.
- source_word: ἐνεφανίζετο
  chosen: appeared
  alternatives:
  - were made visible
  - showed themselves
  - came into view
  lexicon: LSJ
  rationale: The verb means to appear or become visible. 'Appeared' is the clearest and most natural rendering in context.
