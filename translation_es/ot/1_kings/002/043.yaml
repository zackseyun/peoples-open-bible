translation:
  language: es
  text: ¿Por qué entonces no has guardado el juramento de Yahvé[a] y el mandamiento que te ordené[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el juramento a Yahvé», es decir, el juramento hecho en su nombre o bajo su autoridad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el mandamiento que te mandé». El hebreo dice literalmente: «el mandamiento que mandé sobre ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַדּוּעַ
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué
  lexicon: HALOT
  rationale: El adverbio interrogativo se traduce naturalmente con «por qué»; «entonces» comunica en español la conexión recriminatoria que el inglés POB expresa con «then», sin volver la frase artificial.
- source_word: לֹא שָׁמַרְתָּ
  english_pob_choice: have you not kept
  chosen_spanish: no has guardado
  alternatives_spanish:
  - no guardaste
  - no has observado
  lexicon: HALOT
  rationale: שׁמר puede significar «guardar», «observar» o «cumplir». «Guardar» preserva bien el sentido de obligación pactal respecto de un juramento y un mandamiento, y suena natural en español bíblico contemporáneo.
- source_word: שְׁבֻעַת יְהוָה
  english_pob_choice: the oath of Yahweh
  chosen_spanish: el juramento de Yahvé
  alternatives_spanish:
  - el juramento de Yahveh
  - el juramento ante Yahvé
  - el juramento a Yahvé
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» para יְהוָה según la política del proyecto. «Juramento de Yahvé» conserva la construcción del texto base; en el contexto puede referirse al juramento hecho bajo su nombre o autoridad, sin necesidad de explicitar más en el texto principal.
- source_word: הַמִּצְוָה
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - la orden
  - el precepto
  - el mandamiento
  lexicon: HALOT
  rationale: מִצְוָה admite «mandamiento», «mandato» o «precepto». Aquí «mandamiento» mantiene el paralelismo con el juramento y refleja bien la obligación impuesta por el rey.
- source_word: צִוִּיתִי
  english_pob_choice: that I commanded you
  chosen_spanish: que te ordené
  alternatives_spanish:
  - que te mandé
  - que te di
  lexicon: HALOT
  rationale: צוה significa «ordenar» o «mandar». «Ordené» es claro y formal; además, permite conservar la relación directa con el objeto del mandamiento en español sin añadir una imagen no presente en el texto.
- source_word: עָלֶיךָ
  english_pob_choice: on you
  chosen_spanish: '[implícito en la construcción española]'
  alternatives_spanish:
  - sobre ti
  - a ti
  lexicon: HALOT
  rationale: El hebreo literal «sobre ti» expresa la imposición de una obligación. En español, la frase «te ordené» ya incorpora ese valor sin necesidad de repetir una preposición que sonaría forzada en la oración principal.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue la convención del proyecto para reproducir el nombre propio divino en lugar de sustituirlo por un título. «Yahvé» es la forma española establecida en el marco POB y conserva la referencia personal del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Alcance de שָׁמַר respecto de juramento y mandamiento
  english_pob_reading: have you not kept
  chosen_spanish_reading: no has guardado
  alternative_spanish_readings:
  - no has cumplido
  - no has observado
  rationale: «Guardar» mantiene el campo semántico de custodiar, observar y cumplir; así conserva la tensión entre una obligación legal y una fidelidad pactal sin reducirla a mera obediencia externa.
  doctrine_reference: 'DOCTRINE.md: covenant obligation / obedience language'
- issue: Relación entre צִוִּיתִי y עָלֶיךָ
  english_pob_reading: that I commanded you
  chosen_spanish_reading: que te ordené
  alternative_spanish_readings:
  - que ordené sobre ti
  - que te mandé
  rationale: El español permite una formulación más natural que el hebreo literal «sobre ti». «Te ordené» preserva la autoridad del hablante y la imposición de la obligación, sin perder la fuerza del imperativo implícito.
  doctrine_reference: 'DOCTRINE.md: syntactic faithfulness vs. idiomatic clarity'
translation_notes:
  revision_awareness: El inglés POB pasó de una formulación más literal («laid on you») a «commanded you» para reflejar mejor צִוִּיתִי; por eso el español adopta «te ordené», que sigue la revisión más reciente y evita una calca innecesaria de «sobre ti» en la superficie del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se prefiere «mandamiento» para הַמִּצְוָה en este contexto por paralelismo y registro bíblico-natural.
  - La construcción «te ordené» conserva la idea de imposición personal sin sacrificar claridad en español.
  - «Juramento» se mantiene como equivalente de שְׁבֻעָה; si se desea una nota más explícita, la alternativa explica el matiz de juramento bajo autoridad divina.
