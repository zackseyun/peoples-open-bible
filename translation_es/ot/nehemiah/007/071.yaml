revisions:
- from: Y lo que dio el resto del pueblo fue veinte mil daricos[a] de oro, dos mil minas[b] de plata y sesenta y siete túnicas de sacerdotes.
  to: Y lo que dieron el resto del pueblo[a] fue veinte mil dáricos[b] de oro, dos mil minas[c] de plata y sesenta y siete túnicas para los sacerdotes.
  rationale: Se corrige la concordancia verbal al plural para reflejar mejor el hebreo y el español natural con sujeto colectivo; se añade la nota léxica sobre «remanente» que el POB inglés preservó; se separan correctamente las notas culturales; y se mejora ligeramente la naturalidad de la frase final con «túnicas para los sacerdotes».
