translation:
  language: es
  text: Y el nombre de su hermano fue Jubal; fue el padre[c] de todos los que tocan la lira[a] y la flauta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'manejan' o 'agarran'. El verbo hebreo es literalmente 'asir' o 'tomar en la mano', pero aquí se entiende como tocar instrumentos musicales.
    reason: lexical_alternative
  - marker: b
    text: '''Flauta'' también puede entenderse como ''flauta de caña'' o, de manera más general, como un instrumento de viento. El término hebreo עוּגָב no identifica con certeza el instrumento preciso.'
    reason: lexical_alternative
  - marker: c
    text: '''Padre de'' aquí probablemente significa antecesor, pionero o fundador de quienes tocan estos instrumentos, no necesariamente padre biológico inmediato de todos ellos.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: And the name
  chosen_spanish: Y el nombre
  alternatives_spanish:
  - Y el nombre de
  - Y el nombre de su hermano
  lexicon: HALOT
  rationale: Conserva la estructura nominal hebrea de introducción de personaje, pero en español suena natural con artículo definido. Se evita añadir innecesariamente la posesión en el sintagma principal, porque ya queda clara por el contexto inmediato y por el genitivo siguiente.
- source_word: אָחִיו
  english_pob_choice: of his brother
  chosen_spanish: de su hermano
  alternatives_spanish:
  - de su hermano
  - de su hermano
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina singular se refleja con 'su', manteniendo la relación familiar explícita sin forzar una estructura calcada.
- source_word: יוּבָל
  english_pob_choice: Jubal
  chosen_spanish: Jubal
  alternatives_spanish:
  - Jubal
  lexicon: Standard proper-name transliteration
  rationale: Nombre propio transliterado de manera estándar.
- source_word: תֹּפֵשׂ
  english_pob_choice: play
  chosen_spanish: tocan
  alternatives_spanish:
  - manejan
  - agarran
  lexicon: HALOT
  rationale: El participio hebreo significa literalmente 'agarrar/asir', pero aquí el contexto musical exige el sentido idiomático de tocar instrumentos. 'Tocan' comunica mejor la acción en español sin perder la fuerza contextual que el inglés POB ya documentó.
- source_word: כִּנּוֹר
  english_pob_choice: lyre
  chosen_spanish: arpa
  alternatives_spanish:
  - lira
  - arpa
  lexicon: HALOT
  rationale: Aunque 'lira' es más cercano a la clasificación organológica de כִּנּוֹר, 'arpa' sigue siendo la equivalencia tradicional y natural en español eclesial. Como el inglés POB optó por 'lyre' para precisión, aquí se conserva una decisión inteligible en español mediante 'arpa', sin afirmar más precisión de la que el uso español común permite.
- source_word: עוּגָב
  english_pob_choice: pipe
  chosen_spanish: flauta
  alternatives_spanish:
  - flauta
  - flauta de caña
  - instrumento de viento
  lexicon: HALOT
  rationale: El instrumento exacto es incierto; en español 'flauta' es la opción natural y amplia para un instrumento de viento. Se evita sobreespecificar más allá de la evidencia.
- source_word: הָיָה אֲבִי כָּל
  english_pob_choice: he was the father of all
  chosen_spanish: él fue padre de todos
  alternatives_spanish:
  - él fue padre de todos
  - él fue el progenitor de todos
  - él fue el fundador de todos
  lexicon: HALOT
  rationale: Se conserva el idiomático 'padre de' para reflejar el hebreo, con el sentido de antecesor, iniciador o pionero de una tradición. El español permite este uso sin requerir una paráfrasis explicativa en el texto principal.
theological_decisions:
- issue: Sentido de 'padre de' en un contexto de origen cultural, no biológico literal universal
  english_pob_reading: '''Father of'' here likely means progenitor, pioneer, or founder of those who play these instruments, not necessarily immediate biological father of every such musician.'
  chosen_spanish_reading: '''Padre de'' se mantiene con sentido de antecesor, iniciador o fundador de esa práctica musical, no como paternidad biológica literal de todos los músicos.'
  alternative_spanish_readings:
  - progenitor de
  - fundador de
  - antecesor de
  rationale: El hebreo genealogico usa con frecuencia 'padre de' para origen o representatividad. En español, mantener la expresión preserva la fuerza idiomática y la lectura histórica-cultural del verso, mientras que el contexto evita una interpretación biológica estricta.
  doctrine_reference: Hebreo bíblico de filiación y origen; cf. uso idiomático de paternidad en genealogías y relatos de origen cultural.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el acuerdo crítico fue alto; por eso la versión española sigue de cerca la lectura estable del texto fuente y del audit trail, sin ampliar el alcance semántico más allá de lo documentado.
  spanish_consistency_notes:
  - Se mantiene el nombre propio Jubal como transliteración estándar.
  - Se usa 'tocar' para el valor idiomático de תֹּפֵשׂ en contexto musical.
  - Se evita 'SEÑOR' u otra máscara teológica porque no aparece el tetragrámaton en este versículo.
  - Se conserva 'padre de' como solución idiomática para origen/fundación cultural.
  - Se elige 'flauta' como equivalente español amplio y natural para עוּגָב, con nota sobre la incertidumbre del instrumento.
