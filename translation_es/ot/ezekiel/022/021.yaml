translation:
  language: es
  text: Yo los reuniré[a], y soplaré sobre ustedes con el fuego de mi furor, y serán fundidos dentro de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de ella». El pronombre femenino puede referirse a la ciudad en el contexto amplio o al horno/crisol en la metáfora de fundición.
    reason: alternative_reading
lexical_decisions:
- source_word: כִנַּסְתִּי
  english_pob_choice: I will gather
  chosen_spanish: reuniré
  alternatives_spanish:
  - juntaré
  - agruparé
  - reuniré
  lexicon: HALOT
  rationale: En este contexto judicial y de imagen de fundición, כנס expresa traer al pueblo junto para el acto de juicio. «Reuniré» conserva la acción concreta y suena natural en español bíblico moderno.
- source_word: נָפַחְתִּי עֲלֵיכֶם
  english_pob_choice: I will blow on you
  chosen_spanish: soplaré sobre ustedes
  alternatives_spanish:
  - soplaré contra ustedes
  - soplaré sobre ustedes
  - echaré aliento sobre ustedes
  lexicon: HALOT
  rationale: נפח significa literalmente «soplar» o «exhalar». En la metáfora del horno/fundición, «soplaré sobre ustedes» conserva la imagen de avivar el fuego sin añadir demasiada interpretación.
- source_word: בְּאֵשׁ עֶבְרָתִי
  english_pob_choice: with the fire of my wrath
  chosen_spanish: con el fuego de mi furor
  alternatives_spanish:
  - con el fuego de mi ira
  - en el fuego de mi furor
  - con el fuego de mi indignación
  lexicon: HALOT
  rationale: אֵשׁ es «fuego» literal, y עֶבְרָה comunica ira desbordada/furor. «Furor» mantiene la intensidad del cuadro poético y la fuerza afectiva del hebreo; «ira» también es posible, pero algo más general.
- source_word: וְנִתַּכְתֶּם
  english_pob_choice: you will be melted
  chosen_spanish: serán fundidos
  alternatives_spanish:
  - serán derretidos
  - serán fundidos
  - serán refinados por fundición
  lexicon: HALOT
  rationale: En el marco metalúrgico, נתך apunta a fundirse/licuarse por el calor. «Serán fundidos» sugiere mejor la operación de metal bajo fuego que «derretidos», y evita el tecnicismo de «refinados por fundición».
- source_word: בְּתוֹכָהּ
  english_pob_choice: within it
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en medio de ella
  - dentro de él
  - dentro de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular puede referirse al horno/crisol o a la ciudad en la metáfora amplia. «Dentro de él» preserva la ambigüedad referencial de manera sobria; el antecedente en español queda deliberadamente no explicitado.
theological_decisions:
- issue: Referente del pronombre femenino singular en בְּתוֹכָהּ
  english_pob_reading: Render generically as 'within it' without specifying the antecedent.
  chosen_spanish_reading: Traducir «dentro de él» sin precisar si se trata de la ciudad o del horno/crisol.
  alternative_spanish_readings:
  - dentro de la ciudad
  - dentro del horno/crisol
  - en medio de ella
  rationale: La metáfora profética mezcla la imagen de Jerusalén con la del horno/fundición. Mantener la ambigüedad evita resolver prematuramente la tensión literaria y sigue la decisión del POB de no cerrar el referente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del texto base: no se requieren cambios adicionales; la traducción conserva la alta concordancia con el auditorial inglés y mantiene la ambigüedad del último segmento.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; aquí el hebreo no lo contiene, por lo que no aplica.
  - Se usa el tratamiento de segunda persona plural de reverencia neutral «ustedes» para coherencia bíblica moderna.
  - «Furor» se conserva en lugar de suavizar a «ira» para sostener el tono poético-jurídico del verso.
