    reason: lexical_alternative
translation:
  language: ko
  text: 야훼[a]께서 결코 죄를 따지지 않으실 사람은 복이 있도다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 절은 시편 32:2의 70인역 인용이며, 헬라어 κύριος는 히브리어 본문의 יהוה(YHWH)를 직접 옮긴 것이다. DOCTRINE.md의 칭호·이름 원칙에 따라 본 번역은 70인역 인용 시 κύριος가 분명히 YHWH를 가리키는 경우 「야훼」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_korean: 야훼
  alternatives_korean:
  - 주
  - 주님
  lexicon: BDAG
  rationale: 본 절은 시편 32:2(MT) = 31:2(LXX) 직접 인용이며, 헬라어 κύριος는 히브리어 본문의 יהוה(YHWH)를 옮긴 것이다. 본 번역의 일관 원칙(κύριος=YHWH 인용 시 「야훼」)을 따른다.
- source_word: λογίσηται
  english_pob_choice: will count
  chosen_korean: 따지지
  alternatives_korean:
  - 여기지
  - 간주하지
  lexicon: BDAG
  rationale: 4장의 λογίζομαι 반복 가운데 부정적 「죄를 ~으로 산정함」의 함의를 「따지다」로 자연스럽게 옮긴다.
theological_decisions:
- issue: 4:8 κύριος = YHWH (시 32:2 인용)
  chosen_reading: 야훼
  alternative_readings:
  - 주
  - 주님
  rationale: 본 절은 시편 32:2의 70인역 직접 인용이며, 헬라어 κύριος는 명백히 히브리어 본문의 יהוה(YHWH)를 옮긴 것이다. 본 번역의 일관 원칙(κύριος = YHWH 인용 시 「야훼」)을 적용한다. 「주」로 옮기면 신약의 기독론적 κύριος와 구약의 YHWH가 본문상 명시적으로 구별되지 않게 되므로, 학문적·신학적 정확성을 위해 「야훼」를 사용한다.
  doctrine_reference: DOCTRINE.md §1; glossary κύριος (=YHWH) → 야훼
