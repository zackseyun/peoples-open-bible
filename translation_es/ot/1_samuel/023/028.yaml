translation:
  language: es
  text: Así Saúl volvió de perseguir a David y fue al encuentro de los filisteos. Por eso a ese lugar lo llamaron la Roca de la División[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Roca de las Separaciones» o «la Roca de la Partida». El nombre del lugar probablemente alude a que Saúl interrumpió la persecución de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: En este contexto narrativo, שׁוּב expresa el giro de Saúl desde la persecución hacia otra acción. «Volvió» suena natural en español y conserva la idea de retirada de la persecución.
- source_word: מִרְדֹף אַחֲרֵי
  english_pob_choice: from pursuing
  chosen_spanish: de perseguir
  alternatives_spanish:
  - de seguir persiguiendo
  - de ir tras
  lexicon: HALOT
  rationale: La construcción indica cesación de la actividad de perseguir. «De perseguir» conserva la relación verbal sin añadir matices innecesarios.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para enfrentar
  - a encontrar
  lexicon: HALOT
  rationale: La expresión hebrea puede ser neutral o de confrontación. «Al encuentro de» mantiene esa amplitud y resulta idiomática en español.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: HALOT
  rationale: Nombre étnico/geográfico estándar en español bíblico; se mantiene en minúscula inicial por norma de uso común en el cuerpo del texto.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La fórmula introduce la explicación del topónimo. «Por eso» comunica claramente la relación causal sin sonar excesivamente formal.
- source_word: קָרְאוּ לַמָּקוֹם הַהוּא
  english_pob_choice: that place was called
  chosen_spanish: a aquel lugar le pusieron por nombre
  alternatives_spanish:
  - a aquel lugar lo llamaron
  - aquel lugar fue llamado
  lexicon: HALOT
  rationale: El hebreo usa un plural indefinido para agentes no especificados. La construcción pasiva/impersonal en español evita suplir sujetos y reproduce bien la función etiológica.
- source_word: סֶלַע
  english_pob_choice: Rock
  chosen_spanish: Roca
  alternatives_spanish:
  - Peñasco
  - Peña
  lexicon: HALOT
  rationale: En un nombre propio, «Roca» preserva la fuerza toponímica y la referencia a una formación rocosa.
- source_word: הַמַּחְלְקוֹת
  english_pob_choice: Division
  chosen_spanish: las Divisiones
  alternatives_spanish:
  - las Separaciones
  - las Particiones
  lexicon: HALOT
  rationale: La base léxica sugiere división o separación. Se conserva el plural para reflejar la forma del término hebreo y dejar abierta la gama semántica que el propio audit trail reconoce.
theological_decisions:
- issue: Sentido etiológico del nombre del lugar
  english_pob_reading: The place name likely refers to the breaking off of Saul's pursuit of David.
  chosen_spanish_reading: El nombre recuerda la interrupción de la persecución de David por parte de Saúl.
  alternative_spanish_readings:
  - El nombre alude a la separación entre Saúl y David.
  - El nombre recuerda el corte de la persecución de Saúl.
  rationale: El verso explica el origen del topónimo; no añade doctrina, pero sí preserva la relación interpretativa señalada por el POB inglés. «Interrupción de la persecución» comunica la idea sin fijar demasiado el matiz exacto de המחלקות.
  doctrine_reference: Toponimia explicativa / lectura etiológica del texto narrativo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada al inglés POB: el marcador de nota se coloca al final del enunciado del nombre del lugar, no junto a «filisteos». La nota española también se ancla en el nombre toponímico, donde reside la ambigüedad léxica.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto no aplicable aquí; no aparece el nombre divino en el verso.
  - Se preservó una solución etiológica clara y se mantuvo el plural de «las Divisiones» para reflejar la forma hebrea y la alternancia semántica documentada.
  - Se evitó traducir mecánicamente como «cruzó/partió»; el foco del hebreo está en cesar la persecución y dirigirse hacia los filisteos.
