translation:
  language: es
  text: Pero nosotros, sus esclavos, los abatiremos[a] como a un solo hombre, y no podrán resistir el poder de nuestros caballos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un solo hombre»; el giro griego puede enfatizar la acción unida contra ellos o la facilidad con que serán derrotados.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - vasallos
  lexicon: BDAG
  rationale: El contexto es de subordinación absoluta y lealtad posesiva a su señor; por eso 'esclavos' preserva mejor la fuerza de δοῦλοι que una opción suavizada como 'siervos'.
- source_word: πατάξομεν
  english_pob_choice: will strike them down
  chosen_spanish: los golpearemos
  alternatives_spanish:
  - los heriremos
  - los abatiremos
  - los atacaremos
  lexicon: LSJ
  rationale: El verbo expresa un golpe violento con valor bélico. 'Golpearemos' conserva la acción corporal y militar sin introducir un matiz interpretativo excesivo como 'abatiremos'.
- source_word: ὡς ἄνθρωπον ἕνα
  english_pob_choice: as one man
  chosen_spanish: como a un solo hombre
  alternatives_spanish:
  - como un solo hombre
  - como si fuera un solo hombre
  - como a un hombre único
  lexicon: LSJ
  rationale: La comparación idiomática puede sonar natural en español como 'como a un solo hombre', manteniendo la idea de unidad o de facilidad para vencer a uno solo, sin perder el paralelo con el griego.
- source_word: ὑποστήσονται
  english_pob_choice: will withstand
  chosen_spanish: podrán resistir
  alternatives_spanish:
  - podrán mantenerse firmes
  - podrán hacer frente
  - podrán soportar
  lexicon: LSJ
  rationale: En este contexto militar el sentido es resistir bajo presión. 'Podrán resistir' comunica bien la capacidad de oposición frente al avance enemigo.
- source_word: κράτος
  english_pob_choice: might
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  - el vigor
  lexicon: LSJ
  rationale: En combinación con los caballos, κράτος denota fuerza efectiva o poder manifestado; 'el poder' es comprensible y mantiene la idea de dominio bélico.
- source_word: ἵππων
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - corceles
  - monturas
  lexicon: LSJ
  rationale: El griego nombra literalmente 'caballos', no 'jinetes' ni 'caballería'. 'Caballos' conserva esa anclaje léxica y la imagen militar concreta.
theological_decisions:
- issue: Rendering of δοῦλοι in a military boast
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - vasallos
  rationale: 'La lectura del POB inglés sigue la política de términos controvertidos: cuando la subordinación ligada a propiedad y obediencia es saliente, se mantiene ''slave''. En español, ''esclavos'' reproduce esa misma tensión y evita suavizar el vínculo de pertenencia al señor.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Force of the cavalry phrase τὸ κράτος τῶν ἵππων ἡμῶν
  english_pob_reading: the might of our horses
  chosen_spanish_reading: el poder de nuestros caballos
  alternative_spanish_readings:
  - la fuerza de nuestros caballos
  - el poderío de nuestros caballos
  rationale: 'Se conserva la imagen literal del griego y la lectura del POB: no se convierte en ''caballería'' porque el texto dice ''caballos''. ''Poder'' mantiene el matiz de fuerza activa y amenazante en un marco bélico.'
  doctrine_reference: LSJ; source_payload Greek text
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una corrección relevante de δοῦλοι: una revisión intentó suavizarlo como ''servants'', pero la regresión fue revertida y el texto final restauró ''slaves''. La versión española sigue esa decisión restaurada y mantiene el término fuerte ''esclavos''.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico moderno y digno, sin recurrir a fórmulas eclesiásticas que oculten el sentido del griego.
  - Se mantiene la metáfora concreta de 'caballos' en vez de generalizar a 'caballería'.
  - El orden y la puntuación buscan sonar naturales en español, pero sin perder el paralelismo bélico del original.
