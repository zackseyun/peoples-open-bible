translation:
  language: es
  text: para que ofrezcan aromas agradables[a] al Dios del cielo y oren por la vida[b] del rey y de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aromas dulces» o «aromas suaves». El término arameo alude al aroma agradable de ofrendas aceptables.
    reason: lexical_alternative
  - marker: b
    text: O «por el bienestar del rey y de sus hijos». Literalmente, «por la vida del rey y de sus hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּי
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para
  lexicon: HALOT
  rationale: El arameo introduce un propósito; en español, «para que» expresa con naturalidad esa finalidad sin añadir contenido ajeno.
- source_word: לֶהֱוֺן
  english_pob_choice: they may
  chosen_spanish: ofrezcan
  alternatives_spanish:
  - puedan ofrecer
  - ofrecieran
  lexicon: HALOT
  rationale: La forma verbal funciona con sentido modal/purpose junto con los participios siguientes. En español, una subordinada final con verbo en subjuntivo transmite bien esa intención.
- source_word: מְהַקְרְבִין
  english_pob_choice: offer
  chosen_spanish: ofrezcan
  alternatives_spanish:
  - presenten
  - traigan
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo apunta a presentar ofrendas. «Ofrezcan» conserva el valor cultual y suena natural en español actual.
- source_word: נִיחוֹחִין
  english_pob_choice: pleasing aromas
  chosen_spanish: aromas agradables
  alternatives_spanish:
  - aromas suaves
  - aromas de grato olor
  - sacrificios de grato olor
  lexicon: HALOT
  rationale: El término alude al olor/aroma grato de ofrendas aceptables. «Aromas agradables» mantiene la imagen sacrificial sin reducirla a «sacrificios» ni sonar arcaico.
- source_word: לֶאֱלָהּ שְׁמַיָּא
  english_pob_choice: to the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios de los cielos
  - ante el Dios del cielo
  lexicon: HALOT
  rationale: La expresión fija de Esdras se preserva en español como título teológico claro y reverente. «Al» refleja bien la dirección de la ofrenda en el contexto.
- source_word: וּמְצַלַּיִן
  english_pob_choice: and pray
  chosen_spanish: y oren
  alternatives_spanish:
  - y recen
  - y hagan oración
  lexicon: HALOT
  rationale: El participio coordina con el propósito cultual; «oren» es la opción española más clara y digna para esta acción.
- source_word: לְחַיֵּי
  english_pob_choice: for the life of
  chosen_spanish: por la vida
  alternatives_spanish:
  - por el bienestar de
  - por la salud de
  lexicon: HALOT
  rationale: El hebreo/arameo dice literalmente «vida(s)». «Por la vida» conserva esa fuerza literal y deja abierta la implicación de preservación y bienestar que el contexto puede sugerir.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: del rey
  alternatives_spanish:
  - del monarca
  - del emperador
  lexicon: HALOT
  rationale: El sustantivo ordinario es «rey»; se mantiene el término de la fuente en español sin sustituirlo por una equivalencia histórica más interpretativa.
- source_word: וּבְנֹוהִי
  english_pob_choice: and his sons
  chosen_spanish: y de sus hijos
  alternatives_spanish:
  - y de sus hijos varones
  - y de sus hijos varones
  lexicon: HALOT
  rationale: Aunque la forma es específicamente masculina plural, en español «hijos» comunica de manera natural y fiel la referencia a la descendencia masculina en un contexto monárquico. Se evita una perífrasis excesivamente técnica.
theological_decisions:
- issue: מְהַקְרְבִין נִיחוֹחִין en un decreto real persa con lenguaje sacrificial
  english_pob_reading: Rendered as 'pleasing aromas' rather than reducing it to 'sacrifices' or importing later theological terminology.
  chosen_spanish_reading: «aromas agradables» conserva la imagen del aroma aceptable de una ofrenda y no la aplana en «sacrificios».
  alternative_spanish_readings:
  - «olor grato»
  - «sacrificios de grato olor»
  rationale: El texto describe el carácter agradable de las ofrendas, no solo el acto sacrificial. En español, una formulación de aroma/olor mantiene la metáfora cultual y respeta la tensión léxica del original.
  doctrine_reference: Filología bíblica y traducción cultual; equivalencia óptima con preservación de imagen sacrificial.
- issue: 'וּבְנֹוהִי: referencia filial masculina al rey'
  english_pob_reading: Rendered 'his sons.'
  chosen_spanish_reading: «sus hijos» mantiene el referente filial masculino sin forzar una expresión poco natural en español.
  alternative_spanish_readings:
  - «sus hijos varones»
  - «sus hijos»
  rationale: La fuente es masculina plural. «Hijos» es la forma española más idiomática que sigue siendo compatible con ese dato; una explicitación como «varones» sería más interpretativa y más pesada en este verso breve.
  doctrine_reference: Precisión semántica y respeto del dato gramatical del original.
translation_notes:
  revision_awareness: 'Coincide con el último repaso disponible: no se registraron cambios necesarios y el control cruzado señaló alto acuerdo. La redacción española conserva el sentido de propósito, el lenguaje sacrificial y la referencia masculina a los hijos del rey, siguiendo el trazo del original y la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Dios del cielo» como título fijo de Esdras.
  - Se usa «aromas agradables» para preservar la imagen cultual sin trasladarla a una paráfrasis doctrinal.
  - Se conserva «rey» y no una etiqueta histórica más específica, porque la fuente dice simplemente «rey».
  - Se refleja el valor literal de «vida» en la nota, mientras el texto principal sigue siendo natural en español.
  - La subordinación final con «para que» reproduce adecuadamente el propósito del arameo.
