translation:
  language: es
  text: En este desierto caerán sus cadáveres, todos los que fueron contados[a] según su número total, de veinte años en adelante, que han murmurado[b] contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'los contados de ustedes'; se refiere a los inscritos en el censo o recuento.
    reason: cultural_note
  - marker: b
    text: O 'han refunfuñado' o 'han protestado'. El hebreo también puede expresarse como 'han murmurado contra mí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמִּדְבָּר הַזֶּה
  english_pob_choice: In this wilderness
  chosen_spanish: En este desierto[a]
  alternatives_spanish:
  - En este desierto
  - En esta tierra desolada
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse como 'desierto' o 'wilderness'. En español, 'desierto' comunica con naturalidad el lugar árido y el marco narrativo del éxodo; la nota a explica que el término no suaviza el trasfondo de peregrinación y juicio.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - caerán muertos
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'caerán'. Mantener 'caerán' conserva la imagen solemne de muerte en el desierto sin convertirla en una simple paráfrasis explicativa.
- source_word: פִגְרֵיכֶם
  english_pob_choice: your dead bodies
  chosen_spanish: vuestros cadáveres
  alternatives_spanish:
  - vuestros cuerpos muertos
  - vuestros cadáveres
  lexicon: HALOT
  rationale: פגר designa un cadáver o cuerpo muerto. 'Cadáveres' preserva la concreción física y el peso judicial del texto; 'cuerpos muertos' sería más explicativo pero menos natural en español.
- source_word: וְכָל פְּקֻדֵיכֶם
  english_pob_choice: all of you who were counted
  chosen_spanish: todos los que fueron contados
  alternatives_spanish:
  - todos los contados
  - todos los que fueron registrados
  lexicon: HALOT
  rationale: פְּקֻדִים alude a los censados o pasados en recuento. 'Fueron contados' mantiene la referencia al censo/muster sin introducir vocabulario técnico innecesario.
- source_word: לְכָל מִסְפַּרְכֶם
  english_pob_choice: according to your whole number
  chosen_spanish: según el total de ustedes
  alternatives_spanish:
  - según todo su número
  - conforme al total de ustedes
  lexicon: HALOT
  rationale: La frase refuerza la totalidad del grupo censado. 'Según el total de ustedes' es claro en español y conserva la idea de la suma completa sin añadir matices interpretativos.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años en adelante
  alternatives_spanish:
  - desde los veinte años en adelante
  - de veinte años para arriba
  lexicon: HALOT
  rationale: Esta es la fórmula censal estándar. 'De veinte años en adelante' es idiomática en español y refleja bien el umbral etario del texto.
- source_word: אֲשֶׁר הֲלִינֹתֶם עָלָי
  english_pob_choice: who have grumbled against me
  chosen_spanish: que han murmurado contra mí
  alternatives_spanish:
  - que han refunfuñado contra mí
  - que se han quejado contra mí
  lexicon: HALOT
  rationale: El verbo en contexto de desierto expresa queja rebelde contra Dios; 'murmurado' conserva ese matiz tradicional y el registro del relato. 'Quejarse' sería demasiado débil.
theological_decisions:
- issue: Concreción del juicio corporal
  english_pob_reading: Retain the concrete wording 'your dead bodies will fall' rather than smoothing it to simply 'you will die.'
  chosen_spanish_reading: Mantener 'caerán vuestros cadáveres' en vez de reducirlo a 'morirán'.
  alternative_spanish_readings:
  - morirán en este desierto
  - sus cuerpos quedarán en el desierto
  rationale: El hebreo subraya la realidad corporal del juicio. Conservar la imagen de caída y cadáver evita suavizar la sentencia y preserva la fuerza del pasaje.
  doctrine_reference: Principio de primacía del texto original y preservación de su imagen retórica y judicial.
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca exactamente en el texto español. También se mantuvo la tensión lexical de מִדְבָּר con una nota, y se evitó añadir palabras no sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se preserva el registro solemne y judicial del versículo.
  - '''Cadáveres'' mantiene la concreción física de פגר sin suavizarla.'
  - '''Murmurado'' refleja el tono de queja rebelde en el desierto.'
  - Se evita el calco de 'wilderness' y se usa un español natural, pero fiel.
