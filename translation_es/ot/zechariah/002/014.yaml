review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido básico del hebreo: dos imperativos dirigidos a la hija de Sión, la razón introducida por כִּי, la inminencia de la venida divina, la promesa de habitar en medio de Sión y la fórmula profética final con Yahvé. También respeta la política del proyecto al usar «Yahvé». Sin embargo, hay un problema de puntuación/colocación de notas y una leve mejora de naturalidad y solemnidad en la secuencia deíctica.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «porque, mira, yo vengo» suena algo trabado; «porque he aquí, yo vengo» o «porque, he aquí, yo vengo» refleja mejor הִנְנִי en registro profético. Además, la nota cultural [b] debe anclarse en «hija de Sión», no en «en medio de tu». La puntuación final debe cerrar fuera del marcador de nota.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; שכן -> «habitaré» adecuado; בַּת צִיּוֹן -> «hija de Sión» es la opción española natural y fiel; הִנְנִי conviene mejor como «he aquí» en este contexto profético para preservar el tono documentado por el POB.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «hija de Sión» en el inglés, pero en el borrador el anclaje en el texto no corresponde claramente a esa frase.
    rationale: La nota cultural explica específicamente la personificación poética de «hija de Sión», por lo que el marcador debe aparecer sobre esa expresión en el texto español.
  - severity: medium
    issue: «mira» para הִנְנִי reduce el tono profético y, en combinación con «porque», suena menos natural que una fórmula deíctica más bíblica.
    rationale: Aunque «mira» puede funcionar, «he aquí» preserva mejor la solemnidad del original y del razonamiento léxico auditado sin caer en un arcaísmo ininteligible.
  - severity: low
    issue: La puntuación final con la nota [c] está colocada de forma poco cuidada.
    rationale: En español debe preferirse «Yahvé[c].» y no dejar el punto aparentemente absorbido por el marcador.
  revised_spanish_text: ¡Canta con alegría y regocíjate[a], hija de Sión[b], porque he aquí, yo vengo, y habitaré en medio de ti, declara Yahvé[c].
  revised_footnotes:
