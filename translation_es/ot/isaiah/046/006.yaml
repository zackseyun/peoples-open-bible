revisions:
- from: Los que derraman oro de la bolsa y pesan plata en la balanza[a] contratan a un orfebre, y él lo convierte en un dios; se postran, sí, se inclinan hasta el suelo.
  to: Los que derraman oro de la bolsa y pesan plata en la balanza[a] contratan a un orfebre, y él lo convierte en un dios; se inclinan, de hecho, se postran.
  rationale: 'Se mantiene casi todo el borrador porque refleja bien el hebreo y las decisiones auditadas. Solo se ajusta la cláusula final para preservar la intensificación entre los dos verbos de adoración: primero un gesto de inclinación, luego la postración enfática. Esto mejora tanto la fidelidad al texto fuente como la naturalidad del español.'
