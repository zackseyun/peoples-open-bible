  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: sacudir la tierra, partirla, pedir sanidad para sus rupturas y explicar que está inestable. Sin embargo, «la has partido» queda algo menos vívido que «la has abierto en grietas / resquebrajado», y la nota al pie sobre אֶרֶץ está defectuosa porque repite «la tierra» en ambas opciones y no preserva correctamente la alternativa documentada «la tierra / el país o la tierra» en español.'
  spanish_quality_summary: El español es generalmente natural y digno. «Tú has sacudido la tierra» y «Sana sus fracturas» funcionan bien. «Está tambaleándose» es comprensible, pero «se tambalea» suena más bíblico-natural y menos pesado. La nota necesita corrección para que sea inteligible en español.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. El manejo de אֶרֶץ como «tierra» es aceptable si la nota conserva la alternativa contextual «tierra/territorio».
  issues:
