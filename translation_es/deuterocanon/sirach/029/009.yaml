review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: motivación ética por «el mandamiento», ayuda activa al pobre, y prohibición de dejarlo ir sin ayuda según su necesidad. Sin embargo, la nota al pie introduce una expresión española poco natural («vacío de manos») que no preserva bien la alternativa inglesa idiomática «empty-handed».'
  spanish_quality_summary: El texto principal es claro, fiel y ampliamente legible en español eclesial moderno. «Por amor del mandamiento» suena algo más marcado que «por causa del mandamiento», pero sigue siendo inteligible y digno. El único problema real de calidad está en la nota, cuya formulación es antinatural en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mandamiento», «pobre» y «necesidad» están bien elegidos. La decisión principal a corregir es estilística/idiomática en la nota alternativa para μὴ ἀποστρέψῃς αὐτὸν κενόν.
  issues:
  - severity: medium
    issue: La nota «no lo despidas vacío de manos» es un calco poco natural en español.
    rationale: La alternativa inglesa «empty-handed» se expresa naturalmente como «con las manos vacías», no «vacío de manos». La nota debe conservar la alternativa léxica sin crear español torpe ni ambiguo.
  revised_spanish_text: Por amor del mandamiento[a], ayuda al pobre, y según su necesidad no lo despidas vacío.
  revised_footnotes:
  - marker: a
    text: 'O: «no lo despidas con las manos vacías».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Solo se corrige la nota alternativa para expresar idiomáticamente en español la idea de «empty-handed» / κενόν.
