revisions:
- from: Así que el rey Roboam hizo escudos de bronce en lugar de ellos y los puso al cuidado de los comandantes de los guardias[a], que vigilaban la entrada de la casa del rey[b].
  to: Entonces el rey Roboam hizo escudos de bronce en lugar de ellos[a] y los encomendó al cuidado de los comandantes de los guardias[b], que vigilaban la entrada de la casa del rey.
  rationale: Se corrigió la ubicación de las notas para que la referencia cruzada explique correctamente la sustitución indicada por תַּחְתֵּיהֶם, y la nota léxica quede anclada a «guardias». También se ajustó levemente la redacción a «Entonces» y «los encomendó al cuidado de» para una narración más fluida y un matiz de custodia más cercano al hebreo auditado.
