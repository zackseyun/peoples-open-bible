translation:
  language: es
  text: Así que los introduje en la tierra que había levantado mi mano para dársela[a], y vieron toda colina alta y todo árbol frondoso[b]; y allí sacrificaron sus sacrificios, y allí presentaron la provocación de su ofrenda[c], y allí pusieron sus aromas agradables, y allí derramaron sus libaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tierra que había jurado darles»; literalmente, «la tierra que había levantado mi mano para dársela».'
    reason: lexical_alternative
  - marker: b
    text: 'Lectura bíblica tradicional: «toda colina alta y todo árbol verde».'
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea dice literalmente «la provocación de su ofrenda», indicando que su ofrenda era ofensiva y provocadora para Dios.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֲבִיאֵם
  english_pob_choice: So I brought them
  chosen_spanish: Así que los introduje
  alternatives_spanish:
  - Y los introduje
  - Entonces los introduje
  lexicon: HALOT
  rationale: El verbo הִפְעִיל de בוא pide una acción de llevar/introducir. «Así que» conserva la continuación consecuente del relato sin sonar mecánico; «introduje» expresa mejor el movimiento hacia dentro de la tierra que «los llevé».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: «Tierra» mantiene el registro bíblico y la resonancia pactual del hebreo. «País» sería posible, pero aquí debilita el eco tradicional de la promesa.
- source_word: נָשָׂאתִי אֶת־יָדִי
  english_pob_choice: I had lifted up my hand
  chosen_spanish: había levantado mi mano
  alternatives_spanish:
  - había jurado
  - había alzado mi mano
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea para transparencia. El sentido de juramento queda implícito por el contexto; «había jurado» explicaría la idea pero perdería la forma original.
- source_word: לָתֵת אֹתָהּ לָהֶם
  english_pob_choice: to give to them
  chosen_spanish: para dársela
  alternatives_spanish:
  - para darla a ellos
  - para entregársela
  lexicon: HALOT
  rationale: El dativo pronominal se vuelve natural en español con «dársela». «Darla a ellos» es más analítico, pero menos fluido.
- source_word: כָל גִּבְעָה רָמָה
  english_pob_choice: every high hill
  chosen_spanish: toda colina alta
  alternatives_spanish:
  - todo monte alto
  - cada colina elevada
  lexicon: HALOT
  rationale: «Colina alta» conserva la imagen descriptiva del hebreo sin imponer el tecnicismo «lugar alto»; la decisión sigue la línea inglesa de mantener el lenguaje concreto del sitio de culto.
- source_word: וְכָל עֵץ עָבֹת
  english_pob_choice: every leafy tree
  chosen_spanish: todo árbol frondoso
  alternatives_spanish:
  - todo árbol frutal
  - todo árbol espeso
  lexicon: HALOT
  rationale: עָבֹת sugiere espesor/densidad. «Frondoso» es idiomático en español y comunica la idea de un árbol denso y apto para un marco cultual.
- source_word: וַיִּזְבְּחוּ שָׁם אֶת־זִבְחֵיהֶם
  english_pob_choice: there they sacrificed their sacrifices
  chosen_spanish: allí sacrificaron sus sacrificios
  alternatives_spanish:
  - allí ofrecieron sus sacrificios
  - allí inmolaron sus sacrificios
  lexicon: HALOT
  rationale: Se mantiene la repetición cognada hebrea para reflejar el énfasis del original. «Sacrificaron» es el equivalente más directo; «ofrecieron» suaviza demasiado el paralelismo.
- source_word: וַיִּתְּנוּ שָׁם כַּעַס קָרְבָּנָם
  english_pob_choice: there they presented the provocation of their offering
  chosen_spanish: allí presentaron la provocación de su ofrenda
  alternatives_spanish:
  - allí dieron la provocación de su ofrenda
  - allí presentaron su ofrenda provocadora
  lexicon: HALOT
  rationale: 'כַּעַס conserva el matiz de provocación/ofensa. «Provocación de su ofrenda» sigue de cerca la sintaxis hebrea y mantiene la tensión teológica: la ofrenda misma era ofensiva para Dios. «Ofrenda provocadora» sería más interpretativa.'
- source_word: וַיָּשִׂימוּ שָׁם רֵיחַ נִיחוֹחֵיהֶם
  english_pob_choice: there they set their pleasing aromas
  chosen_spanish: allí pusieron sus fragancias agradables
  alternatives_spanish:
  - allí colocaron su aroma agradable
  - allí ofrecieron su aroma grato
  lexicon: HALOT
  rationale: Se conserva el verbo «poner» del hebreo y la fórmula sacrificial de «aroma agradable». Como en español «fragancia» puede sonar menos ritual que «aroma», se mantiene una equivalencia natural sin perder el eco cultual.
- source_word: וַיַּסִּיכוּ שָׁם אֶת־נִסְכֵּיהֶם
  english_pob_choice: there they poured out their drink offerings
  chosen_spanish: allí derramaron sus libaciones
  alternatives_spanish:
  - allí derramaron sus ofrendas líquidas
  - allí vertieron sus libaciones
  lexicon: HALOT
  rationale: «Libaciones» expresa con precisión el rito de derramar líquidos en contexto cultual. En español bíblico es más exacto que «ofrendas líquidas» y más formal que «bebidas ofrendadas».
theological_decisions:
- issue: Idiom of divine oath in נָשָׂאתִי אֶת־יָדִי
  english_pob_reading: I had lifted up my hand
  chosen_spanish_reading: había levantado mi mano
  alternative_spanish_readings:
  - había jurado
  - había alzado mi mano
  rationale: Se preserva la imagen corporal del juramento divino, en vez de sustituirla por la interpretación. Esto mantiene la transparencia y evita borrar el lenguaje figurado del hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of cultic sites in the idolatry warning
  english_pob_reading: every high hill and every leafy tree
  chosen_spanish_reading: toda colina alta y todo árbol frondoso
  alternative_spanish_readings:
  - todo lugar alto y todo árbol verde
  - toda colina elevada y todo árbol espeso
  rationale: El hebreo aquí es descriptivo, no el término técnico habitual para «lugar alto». La traducción conserva la imaginería visible y deja intacta la asociación cultual sin imponer una glosa más interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Provocative offering phrase כַּעַס קָרְבָּנָם
  english_pob_reading: the provocation of their offering
  chosen_spanish_reading: la provocación de su ofrenda
  alternative_spanish_readings:
  - su ofrenda provocadora
  - la ofrenda que provocaba
  rationale: 'Se mantiene la tensión del hebreo: la ofrenda no es meramente desordenada, sino provocadora/ofensiva. No se añade explícitamente «a mí» porque el texto hebreo no lo dice en esta frase y la formulación debe conservar esa densidad.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el borrador sigue el pasaje con alta concordancia y sin cambios respecto de la última pasada auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se usa «tierra» y no «país» para conservar el marco pactual.
  - Se conserva la repetición de 'allí' para reflejar el hebreo וַי... שָׁם.
  - «Libaciones» se usa de manera consistente para נִסְכֵּיהֶם en contexto cultual.
