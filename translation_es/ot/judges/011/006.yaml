translation:
  language: es
  text: 'Y dijeron a Jefté[a]: «Ven y sé nuestro comandante, y luchemos contra los amonitas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Amón», designación étnica estándar equivalente a «los amonitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y le dijeron
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; «Y dijeron» conserva la secuencia sin añadir una interpretación temporal más fuerte que el hebreo.
- source_word: לְיִפְתָּח
  english_pob_choice: to Jephthah
  chosen_spanish: a Jefté
  alternatives_spanish:
  - a Jeftah
  lexicon: HALOT
  rationale: El nombre propio se translitera como forma habitual en español bíblico, manteniendo la referencia al personaje sin traducirlo.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven ahora
  - Anda
  lexicon: HALOT
  rationale: El imperativo idiomático funciona como una invitación o llamado; «Ven» es natural en español y preserva la fuerza del convite.
- source_word: וְהָיִיתָה לָּנוּ
  english_pob_choice: and be our
  chosen_spanish: y sé nuestro
  alternatives_spanish:
  - y seas para nosotros
  - y llegarás a ser nuestro
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «y serás para nosotros», pero en español la formulación más fiel y fluida en este contexto es «sé nuestro».
- source_word: לְקָצִין
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - jefe
  - líder
  - capitán
  lexicon: HALOT
  rationale: En el contexto inmediato de guerra, קָצִין denota un jefe o líder militar; «comandante» es la equivalencia más precisa y natural.
- source_word: וְנִלָּחֲמָה
  english_pob_choice: and let us fight
  chosen_spanish: y pelearemos
  alternatives_spanish:
  - y luchemos
  - y combatiremos
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención/decisión del grupo; «pelearemos» refleja la acción propuesta sin introducir una finalidad adicional.
- source_word: בִּבְנֵי עַמּוֹן
  english_pob_choice: against the Ammonites
  chosen_spanish: contra los amonitas
  alternatives_spanish:
  - contra los hijos de Amón
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hijos de Amón», pero como designación étnica estándar se expresa naturalmente como «los amonitas», manteniendo el valor referencial del etnónimo.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «so that we may fight» a «and let us fight» para reflejar con más directitud la secuencia cohortativa hebrea; la traducción española sigue esa lectura con «y pelearemos» sin añadir propósito explícito.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo directo y la estructura de mandato/súplica del hebreo.
  - «Jefté» se usa como forma española común para el nombre propio.
  - «Amonitas» conserva la designación étnica estándar equivalente al hebreo «hijos de Amón».
  - No se introduce una nota teológica porque el versículo no plantea una decisión doctrinal explícita.
