translation:
  language: es
  text: 'Y este fue su sueño: he aquí[a], voces y tumulto, truenos y terremoto, perturbación en la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sonidos y alboroto, truenos y terremoto, perturbación en la tierra». Los términos griegos pueden significar voces o ruidos, y γῆ puede significar «tierra» o «país».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνύπνιον
  english_pob_choice: dream
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño nocturno
  - visión de sueño
  lexicon: LSJ
  rationale: ἐνύπνιον designa aquí simplemente un sueño; «sueño» conserva la relación directa con el griego sin añadir una explicación interpretativa como «visión de sueño».
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: LSJ
  rationale: «He aquí» reproduce la fuerza presentativa e interjectiva de ἰδοὺ en un registro digno y bíblico, sin volverlo excesivamente moderno o conversacional.
- source_word: φωναὶ
  english_pob_choice: voices
  chosen_spanish: voces
  alternatives_spanish:
  - sonidos
  - gritos
  lexicon: LSJ
  rationale: φωνή puede significar voz, sonido o grito. «Voces» conserva la ambigüedad audible del término y sigue de cerca la elección inglesa, sin reducirlo a mera emisión de ruido.
- source_word: θόρυβος
  english_pob_choice: tumult
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - ruido
  - confusión
  lexicon: LSJ
  rationale: θόρυβος expresa desorden ruidoso o alboroto. «Tumulto» mantiene el tono elevado y el sentido de perturbación sonora y desordenada.
- source_word: βρονταὶ
  english_pob_choice: thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - trueno
  - estruendos
  lexicon: LSJ
  rationale: Aunque el griego está en plural, el español puede conservar el plural «truenos» en una enumeración para reflejar la serie de fenómenos del sueño.
- source_word: σεισμός
  english_pob_choice: earthquake
  chosen_spanish: terremoto
  alternatives_spanish:
  - sismo
  - temblor
  - un terremoto
  lexicon: LSJ
  rationale: σεισμός denota con frecuencia un terremoto o sacudida sísmica. «Terremoto» es claro y natural en español, y preserva el carácter impactante del suceso.
- source_word: τάραχος
  english_pob_choice: upheaval
  chosen_spanish: agitación
  alternatives_spanish:
  - disturbio
  - perturbación
  - alboroto
  lexicon: LSJ
  rationale: τάραχος sugiere agitación, trastorno o perturbación. «Agitación» funciona bien en español para mantener la amplitud del término sin forzarlo a una sola esfera semántica.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre el suelo
  lexicon: LSJ
  rationale: γῆ puede significar tierra, tierra/territorio o tierra como suelo. Aquí «sobre la tierra» preserva el sentido amplio y mantiene la imagen de alcance general sugerida por el conjunto del sueño.
theological_decisions:
- issue: Alcance de γῆ en un sueño de tono ominoso
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  - suelo
  rationale: El contexto de truenos, terremoto y agitación favorece una referencia amplia a la tierra como ámbito del fenómeno, sin convertir el pasaje en una afirmación cosmológica más allá del texto.
  doctrine_reference: Preservar la tensión lexical sin sobreinterpretar; no resolver de más el alcance semántico cuando el griego permite varias opciones.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto griego y toma como guía la auditoría inglesa, pero ajusta la lista para que suene natural en español: se prefieren plurales idiomáticos («truenos») y un equivalente claro de σεισμός («terremoto»). Se conserva la ambigüedad de φωναὶ y γῆ con una nota, como hizo la versión inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «He aquí» preserva el valor discursivo de ἰδοὺ sin añadir contenido.
  - Se conserva la secuencia enumerativa breve y abrupta del griego para reproducir el efecto del sueño.
