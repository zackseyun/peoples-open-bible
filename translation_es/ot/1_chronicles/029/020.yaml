    reason: alternative_reading
  revision_rationale: Se ajustan los dos verbos finales al plural («se inclinaron y se postraron») para reflejar mejor los verbos plurales del hebreo y producir un español más natural con un sujeto colectivo humano. Se conservan el resto del texto y las notas porque preservan bien el sentido, la terminología del proyecto y la tensión teológica documentada.
