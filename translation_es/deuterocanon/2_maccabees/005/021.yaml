base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/005/021.yaml
  text: So Antiochus[a], after carrying off from the temple eighteen hundred talents, quickly departed for Antioch, thinking in his arrogance to make the land navigable and the sea passable on foot[b], because of the exaltation of his heart.
  footnotes:
  - marker: a
    text: Or 'because of the arrogance of his heart.' The Greek expression literally speaks of the 'upliftedness' or 'exaltation' of the heart, describing haughty overconfidence.
    reason: lexical_alternative
  - marker: b
    text: 'The imagery is deliberately hyperbolic: Antiochus imagined himself capable of reversing the natural order, making land fit for sailing and sea fit for travel.'
    reason: cultural_note
