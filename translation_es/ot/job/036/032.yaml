translation:
  language: es
  text: Cubre sus manos con relámpago[a][b], y le ordena dar en el blanco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «luz»; en el contexto de la imaginería de la tormenta, probablemente «relámpago».
    reason: lexical_alternative
  - marker: b
    text: La frase final es hebreo difícil. Entre las alternativas están «contra el intercesor» o «al que es alcanzado».
    reason: alternative_reading
lexical_decisions:
- source_word: כַּפַּיִם
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus palmas
  lexicon: HALOT
  rationale: כַּף en dual puede referirse a las palmas o a las manos. En español, «manos» conserva la imagen corporal y suena más natural que una expresión más técnica.
- source_word: כִּסָּה
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - oculta
  - vela
  lexicon: HALOT
  rationale: El verbo כסה significa cubrir/ocultar. «Cubre» mantiene la acción concreta sin añadir una interpretación metafórica extra.
- source_word: אוֹר
  english_pob_choice: lightning
  chosen_spanish: la luz
  alternatives_spanish:
  - el relámpago
  - la luz del relámpago
  lexicon: HALOT
  rationale: El hebreo dice literalmente «luz». En el contexto de la tormenta del poema, esa luz probablemente alude al relámpago, pero en el texto principal conviene conservar el término base hebreo y dejar la lectura contextual en nota.
- source_word: וַיְצַו
  english_pob_choice: commands
  chosen_spanish: le ordena
  alternatives_spanish:
  - manda
  - comanda
  lexicon: HALOT
  rationale: צוה expresa mandar/ordenar. «Le ordena» preserva la agencia personal del sujeto y encaja bien con el giro español de complemento indirecto.
- source_word: עָלֶיהָ
  english_pob_choice: it
  chosen_spanish: le
  alternatives_spanish:
  - sobre ella
  - contra ella
  lexicon: HALOT
  rationale: El sufijo femenino es difícil de precisar en español; «le» mantiene la referencia abierta sin forzar una identificación que el hebreo no aclara del todo.
- source_word: בְמַפְגִּיעַ
  english_pob_choice: to strike the mark
  chosen_spanish: golpear el blanco
  alternatives_spanish:
  - contra el intercesor
  - al que es alcanzado
  - hacer impacto
  lexicon: HALOT
  rationale: La forma es difícil y admite varias lecturas. En el contexto de la tormenta, una expresión como «golpear el blanco» comunica una dirección precisa del rayo sin imponer de entrada una lectura teológica secundaria como «intercesor».
theological_decisions:
- issue: Sentido de אוֹר en el contexto poético de tormenta
  english_pob_reading: lightning
  chosen_spanish_reading: la luz, con lectura contextual de relámpago
  alternative_spanish_readings:
  - el relámpago
  - la luz del relámpago
  rationale: La audit trail inglesa reconoce que el hebreo dice «light» pero que el contexto favorece «lightning». En español, mantener «luz» respeta el término fuente y la nota explica la extensión contextual sin borrar la tensión lexical.
  doctrine_reference: poesía sapiencial / imaginería teofánica
- issue: Ambigüedad de בְמַפְגִּיעַ y posibles lecturas teológicas
  english_pob_reading: to strike the mark
  chosen_spanish_reading: golpear el blanco
  alternative_spanish_readings:
  - contra el intercesor
  - al que es alcanzado
  rationale: La forma es notoriamente difícil y el POB inglés evita fijar una lectura teológica como «intercessor». El español conserva la ambigüedad razonable con una solución de sentido en el marco de la tormenta.
  doctrine_reference: lexicografía de פגע / poesía hebrea
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y la auditoría inglesa. Se conserva la tensión de אוֹר como «luz» en el cuerpo principal, con nota contextual para la lectura de «relámpago», y se mantiene la dificultad de בְמַפְגִּיעַ sin resolverla mediante una glosa tradicional no documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Señor» como sustituto no solicitado; el sujeto está implícito en la sintaxis.
  - Se mantiene un registro poético y bíblico, pero en español moderno y claro.
  - Las notas siguen la ambigüedad documentada por el POB inglés sin sobreinterpretar el hebreo.
