translation:
  language: es
  text: Y he aquí, siete vacas subían del Nilo[a], hermosas en apariencia[b] y gordas de carne, y pastaban entre los juncos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el río»; en este contexto egipcio, el término hebreo suele referirse específicamente al Nilo.
    reason: lexical_alternative
  - marker: b
    text: O «hermosas de aspecto» o «bellas de aspecto».
    reason: lexical_alternative
  - marker: c
    text: O «en la hierba de los juncos» o «en la hierba pantanosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y de pronto
  lexicon: HALOT
  rationale: Conserva el marcador discursivo de sorpresa y atención del relato onírico. «He aquí» mantiene un tono digno en español y refleja bien la inmediatez de la escena sin volverla demasiado coloquial.
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En el contexto egipcio de Génesis, el término hebreo se refiere específicamente al Nilo. «El Nilo» es más preciso y natural en español que una traducción genérica como «el río».
- source_word: עֹלֹת
  english_pob_choice: were coming up
  chosen_spanish: subían
  alternatives_spanish:
  - venían subiendo
  - estaban subiendo
  lexicon: HALOT
  rationale: El participio expresa acción en desarrollo dentro de la visión. «Subían» comunica el movimiento ascendente de manera natural en español y conserva el valor progresivo del pasaje.
- source_word: פָּרוֹת
  english_pob_choice: cows
  chosen_spanish: vacas
  alternatives_spanish:
  - ganado
  - reses
  lexicon: HALOT
  rationale: El sustantivo designa bovinos hembras. «Vacas» es la forma directa y natural en español, mejor que términos más amplios o menos específicos.
- source_word: יְפוֹת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosas en apariencia
  alternatives_spanish:
  - bellas de aspecto
  - hermosas de aspecto
  lexicon: HALOT
  rationale: La frase describe el buen aspecto externo. «Hermosas en apariencia» reproduce bien el adjetivo y el sustantivo sin forzar una paráfrasis más libre.
- source_word: וּבְרִיאֹת בָּשָׂר
  english_pob_choice: fat in flesh
  chosen_spanish: gordas de carne
  alternatives_spanish:
  - bien alimentadas
  - rollizas
  - gordas de cuerpo
  lexicon: HALOT
  rationale: El hebreo enfatiza la plenitud corporal/fatness, no solo salud general. «Gordas de carne» preserva esa fuerza imagética de modo bastante literal; aunque suena marcado, evita diluir el contraste del sueño.
- source_word: בָּאָחוּ
  english_pob_choice: in the reed grass
  chosen_spanish: en la hierba de los juncos
  alternatives_spanish:
  - entre los juncos
  - en la hierba pantanosa
  - en el carrizal
  lexicon: HALOT
  rationale: El término se refiere a vegetación de pantano asociada al entorno del Nilo. «Hierba de los juncos» mantiene la imagen vegetal y el marco egipcio; se evita un término demasiado genérico como «pradera».
translation_notes:
  revision_awareness: La redacción española sigue el pasaje hebreo de forma directa y también toma en cuenta la revisión inglesa más reciente, que prefirió «beautiful in appearance» para יְפֹת מַרְאֶה. Se conservó el sentido de plenitud física en וּבְרִיאֹת בָּשָׂר mediante una formulación española igualmente concreta, sin suavizar el contraste narrativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «El Nilo» se usa por precisión contextual egipcia, coherente con el criterio auditado en inglés.
  - Se preserva la imagen corporal fuerte de «fat in flesh» con «gordas de carne», ya que el contraste es importante para el sueño.
  - Se opta por un español solemne pero claro, evitando una paráfrasis interpretativa del texto onírico.
