translation:
  language: es
  text: y cinco barras[a] para las tablas del segundo lado del tabernáculo, y cinco barras para las tablas del tabernáculo al lado posterior, hacia el oeste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «crucetas» para «barras».
    reason: lexical_alternative
  - marker: b
    text: O «a la parte posterior, hacia el oeste».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְרִיחִם
  english_pob_choice: bars
  chosen_spanish: barras
  alternatives_spanish:
  - travesaños
  - crucetas
  lexicon: HALOT
  rationale: En el contexto de la construcción del tabernáculo, בְּרִיחַ nombra las piezas horizontales que unen y sostienen la estructura. «Barras» conserva la concisión y la función arquitectónica del inglés POB sin introducir una paráfrasis excesiva.
- source_word: קַרְשֵׁי
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tableros
  - marcos
  lexicon: HALOT
  rationale: El término describe las unidades estructurales de madera del tabernáculo. «Tablas» es claro en español y mantiene la imagen material concreta; «marcos» sería más interpretativo.
- source_word: צֶלַע
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - flanco
  lexicon: HALOT
  rationale: Aquí צֶלַע designa el lado lateral de la estructura. «Lado» es la opción más natural y fiel en español contemporáneo.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el segundo», y el inglés POB preserva esa secuencia formal. En español, «el segundo» mantiene la correspondencia sin volverla idiomáticamente distinta.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: מִשְׁכָּן es el nombre establecido del santuario portátil en Éxodo. «Tabernáculo» es la designación tradicional y precisa para este contexto.
- source_word: לַיַּרְכָתַיִם
  english_pob_choice: on the rear side
  chosen_spanish: al lado posterior
  alternatives_spanish:
  - en la parte trasera
  - a la parte posterior
  lexicon: HALOT
  rationale: יַרְכָתַיִם apunta a la parte posterior o trasera de la estructura. «Al lado posterior» reproduce la localización arquitectónica sin añadir una explicación interpretativa extensa.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - al occidente
  - en dirección al oeste
  lexicon: HALOT
  rationale: En la orientación del tabernáculo, יָמָּה señala la dirección occidental. «Hacia el oeste» es idiomático y fiel al valor direccional.
- source_word: וַחֲמִשָּׁה ... וַחֲמִשָּׁה
  english_pob_choice: and five ... and five
  chosen_spanish: y cinco ... y cinco
  alternatives_spanish:
  - cinco ... y cinco
  lexicon: HALOT
  rationale: Se conserva la coordinación repetida del hebreo y del inglés POB, que refleja el estilo inventarial de la lista de materiales y piezas.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una formulación más libre («at the far rear on the west») a una más cercana al hebreo («on the rear side westward»). La redacción española sigue esa revisión, manteniendo la localización física y el orden de la enumeración, sin convertirla en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usó «tabernáculo» de manera uniforme para מִשְׁכָּן, conforme al uso establecido en Éxodo.
  - Se mantuvo el paralelismo «y cinco ... y cinco» para reflejar la coordinación hebrea repetida.
  - Se eligió «lado posterior» como equivalente funcional de לַיַּרְכָתַיִם, evitando sobreespecificar la orientación más allá de «hacia el oeste».
