translation:
  language: es
  text: No así mi siervo Moisés[a]; él es fiel en toda mi casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda mi casa de familia» o «en toda mi casa». El hebreo «casa» puede referirse al hogar, la familia o al ámbito de autoridad, no solo a un edificio físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן
  english_pob_choice: Not so
  chosen_spanish: No así
  alternatives_spanish:
  - No es así
  - No de esta manera
  lexicon: HALOT
  rationale: La expresión hebrea funciona como una negación enfática y correctiva frente a la afirmación anterior. «No así» conserva brevedad, fuerza contrastiva y naturalidad en español.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Aquí se mantiene la fuerza léxica de עֶבֶד como relación de sujeción personal. Aunque en este contexto es una designación honorífica respecto de Moisés, el marco de esta traducción favorece «esclavo» para no suavizar el término; el contexto de honor se deja visible por la afirmación divina y no por una eufemización del vocablo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la forma española estándar.
- source_word: בְּכָל בֵּיתִי
  english_pob_choice: in all my house
  chosen_spanish: en toda mi casa
  alternatives_spanish:
  - en toda mi casa de familia
  - en todo mi hogar
  lexicon: HALOT
  rationale: «Casa» conserva la metáfora hebrea de בית. «En toda mi casa» reproduce con naturalidad la combinación preposicional y el alcance total de בְּכָל. Se evita resolver el símil en «hogar» o «familia» en el texto principal.
- source_word: נֶאֱמָן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - confiable
  lexicon: HALOT
  rationale: «Fiel» es la forma más establecida en español bíblico para la idea de confiabilidad leal y constante que expresa נֶאֱמָן.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: 'El pronombre hebreo se integra de manera natural en una copula implícita en español: «es». La explicitación de «él» no es necesaria y haría la frase menos fluida.'
theological_decisions:
- issue: Sentido de «mi casa» como metáfora
  english_pob_reading: Retain the metaphor 'my house' rather than interpret it as 'household' or 'people' in the main text.
  chosen_spanish_reading: Conservar «mi casa» en el texto principal, sin explicitar «familia» o «pueblo».
  alternative_spanish_readings:
  - en toda mi familia
  - en todo mi pueblo
  - en todo mi casa, es decir, mi casa/ámbito
  rationale: El hebreo mantiene בית como metáfora sin resolverla. En español, «casa» preserva la imagen y deja abierta la lectura de dominio/ámbito, tal como exige el registro de la fuente y el audit trail en inglés.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de עַבְדִּי aplicado a Moisés
  english_pob_reading: The English POB reads 'my servant' as an honorific designation rather than emphasizing bonded status.
  chosen_spanish_reading: Se conserva la dureza potencial de עבד con «esclavo», aunque el contexto sea honorífico.
  alternative_spanish_readings:
  - mi siervo
  - mi servidor
  rationale: La tensión léxica del hebreo no debe desaparecer. Dado que el proyecto pide no suavizar sin fundamento la fuerza de δοῦλος/עבד, se opta por una forma que preserve la relación de sujeción, dejando que el contexto indique la dignidad de Moisés como designado por Dios.
  doctrine_reference: Lexical force policy; translation philosophy §2, §3
translation_notes:
  revision_awareness: Se siguió de cerca el texto fuente hebreo y el audit trail en inglés. No hay revisiones posteriores relevantes; el pasaje fue confirmado como estable en la última pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene «casa» para בית, sin reemplazarlo por «hogar» o «familia» en el texto principal.
  - Se usa «fiel» para נֶאֱמָן como equivalente bíblico natural en español.
  - Se conserva el contraste enfático inicial con «No así».
  - La nota al pie marca la ambigüedad de בית sin deshacer la metáfora en el cuerpo del texto.
