  source_alignment_summary: 'El borrador español sigue bien el griego en su estructura básica: una madre con dos realidades ante sí, εὐσέβεια frente a la preservación temporal de sus siete hijos según la promesa del tirano. Sin embargo, la anotación y anclaje de notas no corresponden correctamente a los términos griegos clave: la nota [a] está anclada en ''una madre'' pero explica εὐσέβεια, y la nota [b] está anclada en ''la piedad'' pero explica σωτηρίας προσκαίρου. Además, ''seguridad temporal'' es comprensible pero menos preciso que ''preservación temporal'' o ''salvación temporal'' como equivalente de σωτηρία; conviene una leve mejora estilística y semántica.'
  spanish_quality_summary: 'El español es legible y digno, pero ''con dos cosas puestas delante de ella'' suena algo calcado; ''teniendo ante sí dos cosas'' o ''con dos cosas ante sí'' es más natural. ''La piedad'' es aceptable para εὐσέβεια en registro eclesial amplio, aunque puede beneficiarse de nota aclaratoria. El problema principal de calidad es técnico-editorial: las notas al pie están mal ubicadas y crean confusión.'
  glossary_alignment: No hay conflicto con la glosaria principal del proyecto. 'Piedad' para εὐσέβεια entra dentro de las alternativas documentadas. Para σωτηρία, el audit trail inglés enfatiza preservación física temporal; en español 'preservación temporal' refleja mejor esa decisión que 'seguridad temporal'.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: La nota [a] aparece en 'una madre' pero explica εὐσέβεια; la nota [b] aparece en 'la piedad' pero explica σωτηρίας προσκαίρου. Esto distorsiona la correspondencia entre texto y justificación léxica.
  - severity: medium
    issue: '''Seguridad temporal'' es menos precisa que la decisión léxica documentada para σωτηρίας προσκαίρου.'
    rationale: El sentido es preservación breve de la vida bajo la oferta del tirano, no mera sensación o estado de seguridad. 'Preservación temporal' comunica mejor el matiz contextual.
  - severity: low
    issue: '''Con dos cosas puestas delante de ella'' suena algo rígido en español.'
    rationale: Aunque fiel a πρόκειμαι, una formulación más natural como 'teniendo ante sí dos cosas' conserva la imagen sin calco innecesario.
  revised_spanish_text: 'una madre, teniendo ante sí dos cosas: la piedad[a] y la preservación temporal[b] de sus siete hijos, conforme a la promesa del tirano;'
