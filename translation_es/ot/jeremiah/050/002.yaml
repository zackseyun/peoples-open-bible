  language: en
  yaml_path: translation/ot/jeremiah/050/002.yaml
  text: Declare among the nations and proclaim[a]; lift up a banner. Proclaim; do not conceal it. Say, “Babylon is captured; Bel is put to shame; Merodach is dismayed. Her images are put to shame[b]; her idols are dismayed.”
  footnotes:
  - marker: a
    text: Merodach is the Hebrew form of the Babylonian god more commonly known as Marduk.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term translated “idols” is strongly pejorative, carrying the sense of something filthy or contemptible.
    reason: lexical_alternative
