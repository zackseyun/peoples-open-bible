base_translation:
  language: en
  yaml_path: translation/ot/isaiah/027/011.yaml
  text: When its boughs dry up[a], they are broken; women come and make a fire with them. For this is not a people of understanding; therefore its Maker will not have compassion on it[b], and the one who formed it will show it no favor.
  footnotes:
  - marker: a
    text: Or 'its branches' or 'its boughs' for 'its harvest'; the Hebrew term normally means 'harvest,' but here likely refers to the vine's cut growth that dries out and is used as fuel.
    reason: lexical_alternative
  - marker: b
    text: Or 'women come and burn it' / 'set it alight.'
    reason: lexical_alternative
