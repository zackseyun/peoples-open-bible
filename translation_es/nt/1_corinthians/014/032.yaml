translation:
  language: es
  text: Y los espíritus de los profetas están sujetos a los profetas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los espíritus que pertenecen a los profetas están sujetos a los profetas"; la expresión puede referirse a impulsos proféticos o a la actividad espiritual asociada con los profetas, destacando el autocontrol en la profecía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - También
  lexicon: BDAG
  rationale: La conjunción coordinante introduce una afirmación adicional dentro del argumento de Pablo; 'Y' conserva la relación directa y natural en español.
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - impulsos espirituales
  - manifestaciones espirituales
  lexicon: BDAG
  rationale: El plural griego πνεύματα se mantiene con 'espíritus' porque esa es la correspondencia más cercana y auditable; el contexto permite entender una referencia a la actividad o impulso profético sin forzar una paráfrasis en el texto principal.
- source_word: προφητῶν
  english_pob_choice: of prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - pertenecientes a los profetas
  lexicon: BDAG
  rationale: 'El genitivo plural se vierte de manera posesiva simple para conservar la forma y la claridad: ''de los profetas''.'
- source_word: προφήταις
  english_pob_choice: to prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - por los profetas
  lexicon: BDAG
  rationale: El dativo con ὑποτάσσεται expresa subordinación/control; en español 'a los profetas' comunica esa relación de manera breve y fiel, sin cargar la frase con una explicación interpretativa.
- source_word: ὑποτάσσεται
  english_pob_choice: are subject
  chosen_spanish: están sujetos
  alternatives_spanish:
  - se someten
  - están subordinados
  lexicon: BDAG
  rationale: Aunque la forma verbal es singular con sujeto neutro plural, el sentido en español se expresa naturalmente con 'están sujetos'. Mantiene la idea de estar bajo control o autoridad sin resolver de antemano si se trata de impulsos proféticos, del espíritu humano o de la evaluación profética.
theological_decisions:
- issue: Sentido de 'los espíritus de los profetas' y control en la profecía
  english_pob_reading: The verse teaches that prophetic spiritual impulses are under the control of the prophets themselves.
  chosen_spanish_reading: El versículo presenta los impulsos o la actividad espiritual relacionada con los profetas como sujetos a su control, en el marco del orden en la profecía.
  alternative_spanish_readings:
  - Los espíritus humanos de los profetas están sujetos a otros profetas.
  - Los mensajes proféticos están sujetos a los profetas.
  rationale: El contexto inmediato de 1 Corintios 14:29–33 enfatiza orden y autocontrol en la reunión. La redacción española conserva la tensión lexical de πνεύματα sin reducirla a una sola explicación doctrinal, siguiendo la preferencia de la POB de no cerrar prematuramente la ambigüedad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: no se registraron cambios y el control de calidad informó alta concordancia con el texto fuente y la lectura inglesa auditada.'
  spanish_consistency_notes:
  - Se mantiene 'espíritus' para πνεύματα, en paralelo con la decisión inglesa, para no diluir la ambigüedad léxica.
  - '''Están sujetos'' reproduce de manera idiomática la subordinación implícita en ὑποτάσσεται.'
  - No se introduce vocabulario eclesiástico añadido; la línea conserva el tono sobrio y argumentativo del contexto inmediato.
