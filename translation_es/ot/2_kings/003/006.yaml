translation:
  language: es
  text: Entonces el rey Joram salió de Samaria aquel día y alistó[a] a todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contó a todo Israel» o «pasó revista a todo Israel». El verbo hebreo puede referirse a tomar un censo o a realizar una revista militar; aquí el contexto favorece el sentido militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se puso en camino
  - marchó
  lexicon: HALOT
  rationale: El verbo de movimiento en narrativa se expresa de forma natural en español con «salió». Conserva el sentido básico de desplazamiento sin añadir una dirección o matiz militar no explícito en el primer verbo.
- source_word: הַמֶּלֶךְ יְהוֹרָם
  english_pob_choice: King Jehoram
  chosen_spanish: el rey Joram
  alternatives_spanish:
  - el rey Jehoram
  - Rey Joram
  lexicon: HALOT
  rationale: «El rey» reproduce la construcción apposicional hebrea, y «Joram» sigue la forma castellana más establecida del nombre en contexto bíblico español. Se mantiene el título real sin reformularlo como nombre propio compuesto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - ese mismo día
  lexicon: HALOT
  rationale: «Aquel día» es la equivalencia natural de referencia temporal definida en español y conserva el sentido de inmediatez narrativa del hebreo.
- source_word: מִשֹּׁמְרוֹן
  english_pob_choice: from Samaria
  chosen_spanish: de Samaria
  alternatives_spanish:
  - desde Samaria
  - fuera de Samaria
  lexicon: HALOT
  rationale: La preposición hebrea marca origen; en español, «de Samaria» es la forma más idiomática y mantiene la relación de procedencia.
- source_word: וַיִּפְקֹד
  english_pob_choice: mustered
  chosen_spanish: movilizó
  alternatives_spanish:
  - revistó
  - contó
  - pasó revista a
  lexicon: HALOT
  rationale: En este contexto de preparación militar, el campo semántico de פקד incluye reunir y pasar lista/recensar tropas. «Movilizó» comunica de manera clara la acción de reunir fuerzas para una campaña, aunque en la nota se conserva la alternativa de conteo o revista porque el verbo hebreo es más amplio.
- source_word: אֶת כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a todos los israelitas
  lexicon: HALOT
  rationale: Se conserva el alcance corporativo de la expresión hebrea. En español, con el verbo de convocatoria/movilización, la preposición «a» resulta natural para el objeto directo personal/colectivo.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura aprobada del inglés POB, pero ajusta la elección verbal final a un español más natural sin perder la ambigüedad controlada del hebreo פקד, que el audit trail ya identifica como una tensión léxica relevante.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «Joram» como forma española estable del nombre, coherente con el uso bíblico en español y con la transliteración funcional del inglés POB.
  - La nota al pie mantiene abierta la alternativa de censo/revista militar, equivalente funcional de las opciones inglesas «numbered/reviewed».
