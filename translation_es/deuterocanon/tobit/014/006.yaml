revisions:
- from: Y todas las naciones se volverán verdaderamente a temer al Señor Dios[a]; enterrarán sus ídolos.
  to: Y todas las naciones verdaderamente se volverán para temer a Yahvé Dios[a]; enterrarán sus ídolos.
  rationale: Se reestructura la cláusula para que el español exprese naturalmente el valor de ἐπιστρέψουσιν + φοβεῖσθαι, conservando la metáfora de volverse/volver y el matiz de sinceridad de ἀληθινῶς. También se alinea el nombre divino con la política terminológica del proyecto usando «Yahvé» en el texto principal. No se requieren cambios teológicos adicionales.
