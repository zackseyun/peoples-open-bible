  rationale: Se mantiene el contenido del borrador, pero se corrige el nombre חֶצְרוֹן de 'Hezrón' a 'Hezron' para seguir más de cerca la forma fuente y la decisión auditada, evitando una acentuación española no sustentada por la evidencia proporcionada. El resto del verso y la nota son fieles y naturales.
