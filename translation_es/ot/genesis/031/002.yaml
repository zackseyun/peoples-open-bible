revisions:
- from: Y vio Jacob el rostro[a] de Labán, y he aquí[b], no estaba hacia él como antes.
  to: Y vio Jacob el rostro[a] de Labán, y he aquí[b], no era el mismo con él como antes.
  rationale: Se reemplaza «no estaba hacia él» por «no era el mismo con él» para expresar de manera natural en español el modismo hebreo sobre la disposición cambiante de Labán hacia Jacob, sin alejarse indebidamente del sentido fuente. Se conserva «rostro» y «he aquí» por fidelidad al hebreo y al registro bíblico. Además, se corrige el formato de la nota b.
