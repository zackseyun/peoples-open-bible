translation:
  language: es
  text: 'negar justicia a un hombre en su causa[a]: el Señor no ve[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «torcer a un hombre en su pleito», o «pervertir la causa de una persona».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no vio»; la frase también puede implicar «no aprueba».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְעַוֵּת
  english_pob_choice: to deny ... justice
  chosen_spanish: desviar
  alternatives_spanish:
  - pervertir
  - torcer
  - negar justicia a
  lexicon: HALOT
  rationale: El verbo en piel expresa torcer o desviar lo recto, con matiz forense en este contexto. En español, «desviar» conserva la idea de apartar de lo justo sin sonar tan técnico o pesado como «pervertir». Mantiene la fuerza legal del pasaje.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: HALOT
  rationale: El singular masculino del hebreo se refleja mejor con «un hombre». Es el equivalente más directo y conserva la referencia a un individuo concreto dentro de un caso legal.
- source_word: בְּרִיבוֹ
  english_pob_choice: in his case
  chosen_spanish: en su causa
  alternatives_spanish:
  - en su disputa
  - en su pleito
  - en su caso
  lexicon: HALOT
  rationale: ריב puede referirse a disputa, pleito o causa jurídica. «En su causa» suena natural en español bíblico y conserva el sentido judicial sin reducirlo a una mera discusión.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aunque el hebreo aquí es אֲדֹנָי, el POB español prioriza «Yahvé» para el nombre divino cuando el contexto apunta al referente de YHWH. En este versículo, la fórmula remite al Dios del pacto que juzga la injusticia.
- source_word: לֹא רָאָה
  english_pob_choice: does not approve / does not see
  chosen_spanish: no lo ha visto
  alternatives_spanish:
  - no lo aprueba
  - no lo ha aprobado
  - no lo ve
  lexicon: HALOT
  rationale: Se preserva la imagen verbal de «ver» para no resolver demasiado pronto la tensión semántica del hebreo. En español, «no lo ha visto» mantiene el idiomático valor de percepción/atención y deja abierta la implicación de desaprobación, que se puede explicar en nota.
theological_decisions:
- issue: Si רָאָה debe explicitarse como desaprobación o mantenerse como visión/percepción
  english_pob_reading: 'Retain the literal visual idiom: ''the Lord does not see.'' The more explicit interpretive sense is preserved in a footnote rather than imported into the main text.'
  chosen_spanish_reading: 'Mantener el modismo visual: «no lo ha visto».'
  alternative_spanish_readings:
  - no lo aprueba
  - no lo ve
  - no lo considera
  rationale: El hebreo dice literalmente «no vio». Dado que el contexto puede implicar rechazo o desaprobación, pero sin abandonar la forma verbal, conviene conservar la tensión entre percepción y evaluación. La nota puede registrar la lectura interpretativa sin sustituirla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla por paráfrasis.'
translation_notes:
  revision_awareness: La última revisión en inglés prefirió «does not approve» frente a «does not see», pero el expediente auditado conserva la observación de que el hebreo dice literalmente «no vio». Por eso el español mantiene la imagen verbal de ver y deja la interpretación de desaprobación en nota, para no borrar la tensión lexical-teológica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar español del proyecto para יהוה/ YHWH en el texto principal.
  - Se mantiene un registro bíblico sobrio y actual, evitando calcos rígidos.
  - La construcción «no lo ha visto» conserva el valor aspectual perfecto del hebreo y funciona con naturalidad en español.
  - La nota [b] recoge la alternativa interpretativa sin imponerla en el cuerpo principal.
