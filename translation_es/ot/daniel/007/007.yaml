translation:
  language: es
  text: Después de esto seguí mirando en las visiones de la noche[a], y he aquí, una cuarta bestia, aterradora y espantosa, y extraordinariamente fuerte. Tenía grandes dientes de hierro; devoraba y aplastaba, y pisoteaba el resto[b] con sus pies. Era diferente de todas las bestias que la precedieron, y tenía diez cuernos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las visiones nocturnas».
    reason: lexical_alternative
  - marker: b
    text: O «lo restante».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאתַר דְּנָה
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de aquello
  - Más tarde
  lexicon: HALOT
  rationale: Expresa bien la transición temporal del relato visionario sin introducir un matiz interpretativo adicional. En español, «Después de esto» conserva la secuencia y suena natural.
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept looking
  chosen_spanish: seguí mirando
  alternatives_spanish:
  - estaba mirando
  - continué mirando
  lexicon: HALOT
  rationale: La forma verbal sugiere una acción continua en el pasado. «Seguí mirando» preserva ese valor durativo mejor que un simple «vi».
- source_word: בְּחֶזְוֵי לֵילְיָא
  english_pob_choice: in the visions of the night
  chosen_spanish: en las visiones de la noche
  alternatives_spanish:
  - en las visiones nocturnas
  - en las visiones de la noche
  lexicon: HALOT
  rationale: Se mantiene el sustantivo plural «visiones» y el complemento temporal «de la noche», reflejando la ambientación visionaria sin suavizarla.
- source_word: חֵיוָה רביעיה
  english_pob_choice: a fourth beast
  chosen_spanish: una cuarta bestia
  alternatives_spanish:
  - un cuarto animal
  - una cuarta criatura
  lexicon: HALOT
  rationale: En Daniel 7, el contexto simbólico exige «bestia» para conservar la fuerza imagética y la carga apocalíptica del término.
- source_word: דְּחִילָה
  english_pob_choice: terrifying
  chosen_spanish: aterradora
  alternatives_spanish:
  - terrible
  - temible
  lexicon: HALOT
  rationale: El adjetivo comunica que provoca temor. «Aterradora» es natural en español y mantiene el efecto emocional.
- source_word: וְאֵימְתָנִי
  english_pob_choice: dreadful
  chosen_spanish: espantosa
  alternatives_spanish:
  - temible
  - pavorosa
  lexicon: HALOT
  rationale: La pareja de adjetivos intensifica la descripción. «Espantosa» conserva el registro fuerte sin repetir exactamente el primer adjetivo.
- source_word: וְתַקִּיפָא יַתִּירָא
  english_pob_choice: exceedingly strong
  chosen_spanish: extraordinariamente fuerte
  alternatives_spanish:
  - sumamente fuerte
  - extremadamente poderosa
  lexicon: HALOT
  rationale: «Extraordinariamente fuerte» transmite la intensificación sin perder la referencia directa a la fuerza. Se evita introducir «poderosa» porque el texto habla de fuerza, no de poder político explícito.
- source_word: וְשִׁנַּיִן דִּי פַרְזֶל לַהּ רַבְרְבָן
  english_pob_choice: It had large iron teeth
  chosen_spanish: Tenía grandes dientes de hierro
  alternatives_spanish:
  - Tenía dientes enormes de hierro
  - Poseía grandes dientes de hierro
  lexicon: HALOT
  rationale: La estructura posesiva se vuelve natural en español con «tenía». «Dientes de hierro» conserva el material literal y «grandes» refleja רַבְרְבָן sin exagerar más allá de la fuente.
- source_word: אָכְלָה
  english_pob_choice: it devoured
  chosen_spanish: devoraba
  alternatives_spanish:
  - devoró
  - comía
  lexicon: HALOT
  rationale: El imperfecto en español ayuda a mantener el carácter continuo de la acción descriptiva. «Devoraba» comunica violencia destructiva con registro adecuado.
- source_word: וּמַדֱּקָה
  english_pob_choice: and crushed
  chosen_spanish: y aplastaba
  alternatives_spanish:
  - y trituraba
  - y quebrantaba
  lexicon: HALOT
  rationale: El verbo describe destrucción violenta. «Aplastaba» es claro y enérgico, y evita una expresión demasiado técnica.
- source_word: וּשְׁאָרָא בְּרַגְלַיּה רָפְסָה
  english_pob_choice: and it trampled the remainder with its feet
  chosen_spanish: y lo restante lo pisoteaba con sus pies
  alternatives_spanish:
  - y el resto lo pisoteaba con sus pies
  - y pisoteaba lo que quedaba con sus pies
  lexicon: HALOT
  rationale: «Lo restante» refleja mejor el sustantivo arameo que una paráfrasis más libre. Se conserva también la imagen corporal de «con sus pies».
- source_word: וְהִיא מְשַׁנְּיָה מִן כָּל חֵיוָתָא דִּי קָדָמַיּהּ
  english_pob_choice: It was different from all the beasts that were before it
  chosen_spanish: Era diferente de todas las bestias que estaban delante de ella
  alternatives_spanish:
  - Era distinta de todas las bestias que la precedieron
  - Era diferente de todas las bestias anteriores
  lexicon: HALOT
  rationale: «Diferente de» preserva la idea de distinción sin forzar una noción de cambio ontológico. «Delante de ella» sigue de cerca el valor espacial-temporal de קָדָמַיּהּ, aunque en español suene más idiomático como referencia a las anteriores.
- source_word: וְקַרְנַיִן עֲשַׂר לַהּ
  english_pob_choice: and it had ten horns
  chosen_spanish: y tenía diez cuernos
  alternatives_spanish:
  - y le había diez cuernos
  - y poseía diez cuernos
  lexicon: HALOT
  rationale: La posesión se expresa naturalmente con «tenía». Se mantiene la imaginería simbólica sin explicarla en la traducción.
theological_decisions:
- issue: Identificación histórica o escatológica de la cuarta bestia
  english_pob_reading: Render the imagery straightforwardly as a symbolic beast without importing an identification of the kingdom into the translation.
  chosen_spanish_reading: Traducir la imagen de manera directa como una bestia simbólica, sin insertar una identificación histórica o escatológica dentro del texto.
  alternative_spanish_readings:
  - Introducir una identificación del imperio o reino
  - Aclarar en el texto que se trata de Roma o de un poder final
  rationale: El versículo describe la bestia, pero no la nombra. La traducción debe preservar esa tensión interpretativa y no resolverla anticipadamente.
  doctrine_reference: Preservar la tensión interpretativa; no añadir exégesis al texto.
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió una formulación más formal para שְׁאָרָא («the remainder») y quitó el guion largo tras «beast». La redacción española sigue ese ajuste con «lo restante» y una puntuación fluida, manteniendo todos los elementos de la imagen sin añadir explicación interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «bestia» por coherencia con Daniel 7 y con la imaginería apocalíptica.
  - Se usó «Dios/Yahvé/Cristo» según las reglas del proyecto, pero este versículo no contiene esas voces; no corresponde introducirlas.
  - Se conservó el tono solemne pero natural del español bíblico contemporáneo, evitando calcos innecesarios.
  - Se evitó traducir mecánicamente desde el inglés en puntos donde el español pide una estructura más idiomática, como la posesión con «tenía».
