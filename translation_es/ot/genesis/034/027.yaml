translation:
  language: es
  text: Los hijos de Jacob llegaron a los caídos[a] y saquearon la ciudad[b], porque su hermana había sido mancillada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vinieron contra los caídos». El hebreo puede sugerir movimiento sobre ellos o contra ellos, aunque ya estaban muertos.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la ciudad que habían mancillado a su hermana». La cláusula relativa hebrea es condensada; aquí se expresa su sentido causal para evitar ambigüedad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יַעֲקֹב
  english_pob_choice: The sons of Jacob
  chosen_spanish: Los hijos de Jacob
  alternatives_spanish:
  - Los hijos de Jacob
  - Los descendientes de Jacob
  lexicon: HALOT
  rationale: Conserva la estructura de parentesco explícita del hebreo y mantiene el énfasis narrativo en el grupo familiar de Jacob, sin convertirlo en un posesivo más fluido que borre la forma original.
- source_word: בָּאוּ עַל
  english_pob_choice: came upon
  chosen_spanish: vinieron sobre
  alternatives_spanish:
  - vinieron contra
  - cayeron sobre
  lexicon: HALOT
  rationale: En español, 'venir sobre' conserva la idea breve de movimiento hacia o encima de algo/alguien, dejando abierta la tensión semántica del hebreo entre acercarse sobre y actuar contra, sin volverlo excesivamente interpretativo.
- source_word: הַחֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos[a]
  alternatives_spanish:
  - los caídos
  - los muertos
  lexicon: HALOT
  rationale: El hebreo apunta a personas muertas en contexto violento; 'los muertos' es natural en español, pero para no perder el matiz de víctimas de matanza se ancla con nota alternativa al valor más preciso 'los muertos/los caídos' frente a un tecnicismo más duro.
- source_word: וַיָּבֹזּוּ
  english_pob_choice: plundered
  chosen_spanish: saquearon
  alternatives_spanish:
  - despojaron
  - saquearon
  lexicon: HALOT
  rationale: '''Saqueó/saquearon'' comunica bien el verbo de tomar botín después de violencia. Es más claro y sobrio en español bíblico actual que ''despojaron'', y evita un arcaísmo como ''botinaron''.'
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad
  - el pueblo
  lexicon: HALOT
  rationale: Se mantiene el sustantivo común y preciso 'la ciudad', que corresponde de forma directa al hebreo עִיר.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - la cual
  lexicon: HALOT
  rationale: Aunque el hebreo usa una relativa, el flujo narrativo expresa la razón de la acción; 'porque' hace explícita la fuerza causal sin depender de una relativa pesada en español.
- source_word: טִמְּאוּ
  english_pob_choice: had defiled
  chosen_spanish: habían deshonrado
  alternatives_spanish:
  - habían contaminado
  - habían profanado
  - habían deshonrado
  lexicon: HALOT
  rationale: '''Deshonrar'' expresa en español el agravio sexual y social que el contexto exige, sin reducir el verbo a una simple impureza ritual. Se preserva la tensión entre contaminación moral y ofensa a la honra familiar, que en español se comunica mejor que una traducción puramente cultual.'
- source_word: אֲחוֹתָם
  english_pob_choice: their sister
  chosen_spanish: a su hermana
  alternatives_spanish:
  - a su hermana
  - a su propia hermana
  lexicon: HALOT
  rationale: La frase española mantiene el referente posesivo con naturalidad. El objeto directo personal 'a' es necesario en español y no altera el sentido del hebreo.
theological_decisions:
- issue: Quién realizó la deshonra en la cláusula causal
  english_pob_reading: because they had defiled their sister
  chosen_spanish_reading: porque habían deshonrado a su hermana
  alternative_spanish_readings:
  - porque su hermana había sido deshonrada
  - porque ellos habían deshonrado a su hermana
  rationale: El hebreo permite, por la secuencia narrativa, entender que la deshonra fue hecha por los habitantes de la ciudad; el español directo evita atribuirla a los hijos de Jacob. Se preserva la causalidad del texto sin introducir un pasivo añadido que no está en la forma más directa del hebreo.
  doctrine_reference: Ninguna; decisión narrativa y sintáctica del texto hebreo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente: la cláusula causal debe mantenerse directa y sin añadir ''allí'' ni desplazar el sujeto. Por eso se evita cualquier formulación que haga pensar que los hijos de Jacob fueron los autores de la deshonra. También se respeta que el texto no añade expansiones locativas.'
  spanish_consistency_notes:
  - '''Yahvé'' no aplica en este versículo.'
  - Se conserva un registro bíblico sobrio y actual, evitando calcos innecesarios.
  - La causalidad se expresa con 'porque' para reflejar el flujo narrativo del hebreo.
  - Se evita una pasiva explícita para no introducir material no atestiguado en la forma final del verso.
