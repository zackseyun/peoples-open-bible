translation:
  language: es
  text: 'una beka por cabeza[a], es decir, medio siclo según el siclo del santuario, para todo el que pasó entre los contados[c][b], de veinte años de edad para arriba: 603.550.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una beka equivalía a medio siclo según el patrón del santuario.
    reason: cultural_note
  - marker: b
    text: Literalmente, «por cráneo», un modismo hebreo para contar a cada persona individualmente.
    reason: lexical_alternative
  - marker: c
    text: 'O: «para todo el que pasaba entre los numerados». El hebreo usa lenguaje de censo con la imagen de pasar a formar parte del registro.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּקַע
  english_pob_choice: beka
  chosen_spanish: beca
  alternatives_spanish:
  - media siclo
  - beká
  lexicon: HALOT
  rationale: El término designa una unidad técnica de peso/moneda; se mantiene la forma transliterada adaptada al español como 'beca' para conservar el valor técnico y dejar que la frase explicativa precise su equivalencia.
- source_word: לַגֻּלְגֹּלֶת
  english_pob_choice: per head
  chosen_spanish: por cabeza
  alternatives_spanish:
  - por cráneo
  - por persona
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente corporal, usada idiomáticamente para contar individuos. 'Por cabeza' conserva el registro idiomático en español sin endurecerlo con 'cráneo'.
- source_word: מַחֲצִית הַשֶּׁקֶל
  english_pob_choice: half a shekel
  chosen_spanish: medio siclo
  alternatives_spanish:
  - media siclo
  - mitad del siclo
  lexicon: HALOT
  rationale: Expresa la fracción y evita una construcción menos natural en español. 'Siclo' es el término monetario usual para shekel en español bíblico.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo sagrado
  lexicon: HALOT
  rationale: '''בְ'' aquí indica norma o estándar de medida. ''Siclo del santuario'' conserva la referencia cultual y evita la paráfrasis doctrinal de ''santo'' sin perder claridad.'
- source_word: לְכֹל הָעֹבֵר עַל הַפְּקֻדִים
  english_pob_choice: for everyone who passed over to those counted
  chosen_spanish: para todo el que pasaba entre los contados
  alternatives_spanish:
  - para todo el que pasaba entre los numerados
  - para todos los que pasaban entre los inscritos
  lexicon: HALOT
  rationale: Se mantiene la imagen censal de 'pasar entre' con una forma natural en español. 'Contados' conserva el participio pasivo y el contexto de censo sin borrar la metáfora del movimiento.
- source_word: הַפְּקֻדִים
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los numerados
  - los inscritos
  lexicon: HALOT
  rationale: Renderiza directamente el participio pasivo en contexto de censo. 'Los contados' es transparente y conserva el matiz administrativo.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años de edad para arriba
  alternatives_spanish:
  - desde los veinte años en adelante
  - de veinte años y más
  lexicon: HALOT
  rationale: Es una fórmula censal estándar; la versión elegida es idiomática y clara en español bíblico moderno.
- source_word: לְשֵׁשׁ מֵאוֹת אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וַחֲמֵשׁ מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: 603,550
  chosen_spanish: '603.550'
  alternatives_spanish:
  - seiscientos tres mil quinientos cincuenta
  lexicon: HALOT
  rationale: Se conserva la cifra total en formato de miles habitual en español para facilitar la lectura y mantener la exactitud numérica del texto.
theological_decisions:
- issue: Referencia al estándar cultual de medida
  english_pob_reading: by the sanctuary shekel
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según el siclo sagrado
  rationale: La frase no introduce una entidad doctrinal nueva sino un estándar de peso autorizado por el santuario. 'Del santuario' mantiene el anclaje cultual sin convertirlo en una simple etiqueta sacralizada.
  doctrine_reference: Éxodo 30:13; Levítico 27:25
- issue: Imagen censal de 'pasar sobre/entre los contados'
  english_pob_reading: who passed over to those counted
  chosen_spanish_reading: el que pasaba entre los contados
  alternative_spanish_readings:
  - el que pasaba entre los numerados
  - el que pasaba entre los inscritos
  rationale: Se preserva la tensión entre la imagen de movimiento y el resultado censal. 'Entre los contados' mantiene la metáfora sin sobreexplicarla, respetando el estilo auditado de la POB.
  doctrine_reference: Números 1:2-3; Éxodo 38:25-26
translation_notes:
  revision_awareness: 'El texto inglés auditado fue ajustado solo en puntuación, sin cambios de sentido; la versión española sigue esa lectura estable y conserva las tres precisiones del original: la unidad técnica (beka), el modismo censal (''por cabeza'') y el estándar del santuario. Se mantuvo la cifra final como total explícito.'
  spanish_consistency_notes:
  - Se prefirió 'siclo' en lugar de 'shekel' para la unidad monetaria porque es el término español bíblico establecido y no altera el valor técnico.
  - '''Los contados'' mantiene el participio pasivo y la dimensión censal; no se sustituyó por una reformulación más interpretativa.'
  - Se usó 'Yahvé' en otros contextos del proyecto, pero aquí no aparece el tetragrámaton.
  - La puntuación con coma y dos puntos sigue la separación auditada del inglés POB.
