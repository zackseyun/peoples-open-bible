base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/011.yaml
  text: And they slaughtered the Passover lamb[a], and the priests splashed the blood from their hands[c][b], while the Levites were skinning them.
  footnotes:
  - marker: a
    text: Or 'the Passover sacrifice.' The Hebrew refers to the Passover victim being slaughtered.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'splashed' is the standard sacrificial term for applying blood at the altar; it can also be rendered 'sprinkled' in English tradition.
    reason: lexical_alternative
  - marker: c
    text: That is, the Levites were removing the hides from the slaughtered sacrificial animals.
    reason: cultural_note
