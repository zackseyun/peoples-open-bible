translation:
  language: es
  text: Y toda la asamblea de los que habían vuelto de la cautividad hicieron cabañas y habitaron en las cabañas, porque desde los días de Jesúa hijo de Nun[a] los hijos de Israel no habían hecho así hasta aquel día. Y hubo un regocijo muy grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesúa hijo de Nun, es decir, Josué hijo de Nun.
    reason: alternative_reading
lexical_decisions:
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad
  lexicon: HALOT
  rationale: קָהָל designa al pueblo reunido. «Asamblea» conserva el sentido corporativo y de reunión sin imponer un registro eclesiástico más estrecho.
- source_word: הַשָּׁבִים מִן הַשְּׁבִי
  english_pob_choice: those who had returned from the captivity
  chosen_spanish: los que habían vuelto de la cautividad
  alternatives_spanish:
  - los que habían regresado del exilio
  - los exiliados que habían regresado
  lexicon: HALOT
  rationale: El participio con la frase preposicional identifica al grupo retornado. «Cautividad» sigue de cerca el hebreo y mantiene la relación con el retorno histórico.
- source_word: סֻכּוֹת
  english_pob_choice: booths
  chosen_spanish: cabañas
  alternatives_spanish:
  - bohíos
  - tabernáculos
  lexicon: HALOT
  rationale: El término remite a las construcciones temporales de la fiesta. «Cabañas» comunica bien en español moderno la idea de refugios temporales sin la posible ambigüedad de «tabernáculos».
- source_word: וַיֵּשְׁבוּ בַסֻּכּוֹת
  english_pob_choice: lived in the booths
  chosen_spanish: habitaron en las cabañas
  alternatives_spanish:
  - vivieron en las cabañas
  - moraron en las cabañas
  lexicon: HALOT
  rationale: יָשַׁב aquí expresa residencia/habitar. «Habitaron» conserva la fuerza de permanencia contextual sin sonar forzado; además reproduce bien el paralelismo con la construcción previa.
- source_word: כִּי לֹא עָשׂוּ ... כֵּן
  english_pob_choice: for ... had not done so
  chosen_spanish: porque ... no habían hecho así
  alternatives_spanish:
  - porque ... no lo habían hecho de ese modo
  - porque ... no habían celebrado esto de esta manera
  lexicon: HALOT
  rationale: El hebreo apunta a no haberlo hecho «así», es decir, de la manera descrita inmediatamente antes. «No habían hecho así» preserva esa referencia anafórica sin sobreinterpretar la negación.
- source_word: מִימֵי יֵשׁוּעַ בִּן נוּן
  english_pob_choice: from the days of Jeshua son of Nun
  chosen_spanish: desde los días de Jesúa hijo de Nun
  alternatives_spanish:
  - desde los días de Jesúa hijo de Nun
  - desde los días de Josué hijo de Nun
  lexicon: HALOT
  rationale: La forma hebrea es יֵשׁוּעַ, por lo que «Jesúa» refleja mejor la forma atestiguada en este versículo. Se mantiene la identificación tradicional con Josué en nota.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el giro masculino plural del hebreo, en línea con la política de precisión gramatical del proyecto y con su uso covenantal frecuente.
- source_word: וַתְּהִי שִׂמְחָה גְּדוֹלָה מְאֹד
  english_pob_choice: And there was very great rejoicing
  chosen_spanish: Y hubo un gran regocijo, muy grande
  alternatives_spanish:
  - Y hubo una alegría muy grande
  - Y hubo mucho regocijo
  lexicon: HALOT
  rationale: שִׂמְחָה puede expresarse como «alegría» o «regocijo». «Regocijo» conserva el matiz festivo y comunitario; la duplicación «gran ... muy grande» reproduce la intensificación hebrea גְּדוֹלָה מְאֹד sin suavizarla.
theological_decisions:
- issue: Identidad de יֵשׁוּעַ בִּן נוּן
  english_pob_reading: Jeshua son of Nun, that is, Joshua son of Nun.
  chosen_spanish_reading: Jesúa hijo de Nun, es decir, Josué hijo de Nun.
  alternative_spanish_readings:
  - Josué hijo de Nun
  - Jesúa hijo de Nun
  rationale: El hebreo consonántico de este versículo presenta la forma יֵשׁוּעַ. La forma principal «Jesúa» respeta esa atestiguación; la identificación tradicional con Josué se preserva explícitamente en la nota para no perder continuidad histórica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
- issue: Preservación de la expresión masculina colectiva בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva el valor gramatical masculino plural del hebreo, evitando neutralizar el término en la línea principal. Esto mantiene la forma covenantal del texto y su correspondencia formal con el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se verificó el paquete fuente completo, la traducción inglesa POB y sus decisiones léxicas/teológicas. No se detectaron revisiones aplicadas en la versión inglesa más reciente, y se mantuvo la misma lectura de identidad para יֵשׁוּעַ בִּן נוּן con nota aclaratoria.
  spanish_consistency_notes:
  - Se mantuvo «cautividad» para מִן הַשְּׁבִי en coherencia con el auditorio de POB y con el paralelismo con el retorno histórico.
  - «Cabañas» funciona mejor en español que «tabernáculos» para סֻכּוֹת, evitando una asociación litúrgica ajena al contexto.
  - La intensificación final se reprodujo con una duplicación adjetival natural en español para reflejar גְּדוֹלָה מְאֹד sin perder solemnidad.
  - Se evitó sustituir «Yahvé» porque el versículo no contiene el tetragrámaton ni un equivalente directo.
