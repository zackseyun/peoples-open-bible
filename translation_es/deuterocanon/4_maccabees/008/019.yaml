- from: ¿No temeremos[a] los tormentos, hermanos, y consideraremos las amenazas de los suplicios, y huiremos de esta gloria vacía y de esta arrogancia destructora?
  to: ¿No temeremos[a] los tormentos, hermanos, y tomaremos en cuenta las amenazas de los suplicios, y huiremos de esta gloria vacía y de esa arrogancia destructora?
