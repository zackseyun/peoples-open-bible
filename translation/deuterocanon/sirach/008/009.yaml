theological_decisions:
- issue: Death euphemism in נֶאֱסָפִים
  chosen_reading: Retain the metaphor with 'are being gathered in' rather than flattening to 'will die.'
  alternative_readings:
  - all of us will die
  - all of us are gathered to our people
  rationale: The Hebrew uses a conventional gathering metaphor for death. Rendering it too explicitly as 'will die' loses the literary and theological texture; rendering it as 'gathered to our people' imports words not present in the verse. The chosen wording keeps the metaphor visible while remaining understandable in English.
  doctrine_reference: Translation philosophy §§1, 3, 6
