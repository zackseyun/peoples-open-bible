translation:
  language: es
  text: Y Simón salió y pasó por la región[a] hasta Ascalón y las fortalezas cercanas, y se desvió a Jope y la tomó[b] de antemano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atravesó»; el griego indica tránsito por una región o ruta.
    reason: lexical_alternative
  - marker: b
    text: O «la ocupó de antemano» o «la capturó de antemano»; el verbo griego sugiere tomar control antes que otra parte.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ Σίμων ἐξῆλθεν
  english_pob_choice: And Simon went out
  chosen_spanish: Y Simón salió
  alternatives_spanish:
  - Y Simón fue afuera
  - Y Simón se fue
  lexicon: LSJ
  rationale: ἐξέρχομαι aquí expresa salida/movimiento inicial; «salió» es natural en español y conserva la sencillez narrativa sin añadir matices no presentes.
- source_word: διώδευσεν
  english_pob_choice: passed through
  chosen_spanish: pasó
  alternatives_spanish:
  - atravesó
  - pasó por
  lexicon: LSJ
  rationale: El verbo indica tránsito a través de una región; «pasó» transmite ese recorrido de forma fluida en español, y el contexto con el destino siguiente ya delimita el movimiento.
- source_word: ἕως Ἀσκάλωνος
  english_pob_choice: as far as Ashkelon
  chosen_spanish: hasta Ascalón
  alternatives_spanish:
  - así como Ascalón
  - a Ascalón
  lexicon: LSJ
  rationale: ἕως marca límite de alcance; «hasta» conserva con precisión el valor de extensión territorial mejor que una simple meta de llegada.
- source_word: τὰ πλησίον ὀχυρώματα
  english_pob_choice: the nearby strongholds
  chosen_spanish: las fortalezas cercanas
  alternatives_spanish:
  - los fuertes cercanos
  - las plazas fortificadas cercanas
  lexicon: LSJ
  rationale: ὀχυρώματα son lugares fortificados; «fortalezas» comunica bien la idea sin volverla demasiado técnica, y «cercanas» refleja πλησίον.
- source_word: ἐξέκλινεν εἰς Ἰόππην
  english_pob_choice: he turned aside to Joppa
  chosen_spanish: se desvió a Joppe
  alternatives_spanish:
  - giró hacia Joppe
  - se apartó hacia Joppe
  lexicon: LSJ
  rationale: ἐκκλίνω implica apartarse de la ruta; «se desvió» preserva ese cambio de dirección. Se usa «Joppe» por la forma tradicional española del topónimo, equivalente a Joppa.
- source_word: προκατελάβετο
  english_pob_choice: took it beforehand
  chosen_spanish: la tomó por adelantado
  alternatives_spanish:
  - la ocupó por adelantado
  - la capturó de antemano
  - la tomó antes que otros
  lexicon: LSJ
  rationale: El compuesto sugiere apoderarse con anterioridad a otro actor; «la tomó por adelantado» mantiene la anticipación sin forzar un término militar más fuerte que el griego por sí solo.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la ciudad
  - a ella
  lexicon: Greek grammar
  rationale: Aunque la referencia es una ciudad, el español concuerda naturalmente con el antecedente femenino implícito; «la» evita la aspereza de «lo» y conserva la referencia directa al topónimo.
theological_decisions:
- issue: Redacción del valor anticipatorio de προκατελάβετο
  english_pob_reading: took it beforehand
  chosen_spanish_reading: la tomó por adelantado
  alternative_spanish_readings:
  - la ocupó por adelantado
  - la capturó de antemano
  rationale: No se debe neutralizar la idea de precedencia estratégica del verbo. «Por adelantado» retiene la noción de acción previa frente a otro posible ocupante o autoridad, sin precisar más de lo que el griego exige.
  doctrine_reference: Lexical/theological caution on preemptive possession vs. simple capture
translation_notes:
  revision_awareness: 'El audit trail inglés revisó «seized it in advance» a «took it beforehand» para sonar más natural sin perder la fuerza de προκατελάβετο. La versión española sigue esa misma línea: conserva el matiz de anticipación con una formulación idiomática y no exagera la intensidad militar más allá de la evidencia griega.'
  spanish_consistency_notes:
  - Se mantiene el topónimo tradicional «Joppe» para coherencia con el uso bíblico español, equivalente a Joppa.
  - Se usa «Y» inicial por coordinación narrativa directa; no altera el contenido semántico.
  - Se preserva la distinción entre movimiento territorial («pasó hasta») y cambio de dirección («se desvió a»).
  - «Fortalezas» traduce con naturalidad ὀχυρώματα sin introducir una terminología eclesiástica o histórica ajena al pasaje.
