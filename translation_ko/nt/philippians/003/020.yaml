id: PHP.3.20
reference: Philippians 3:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡμῶν γὰρ τὸ πολίτευμα ἐν οὐρανοῖς ὑπάρχει, ἐξ οὗ καὶ σωτῆρα ἀπεκδεχόμεθα κύριον Ἰησοῦν Χριστόν,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/020.yaml
  text: For our citizenship is in heaven[a], from where we also eagerly await a Savior[d][c][b], the Lord Jesus Messiah.
  footnotes:
  - marker: a
    text: Or “commonwealth.”
    reason: lexical_alternative
  - marker: b
    text: Greek “in the heavens.”
    reason: lexical_alternative
  - marker: c
    text: Or “the Lord Jesus Christ.”
    reason: alternative_reading
  - marker: d
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러나 우리의 시민권은 하늘[a]에 있습니다. 그곳으로부터 우리는 또한 구주이신 주 예수 메시아[b]를 간절히 기다립니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 「하늘들 안에」(복수)이다. 한국어 관용상 단수 「하늘」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「주 예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: πολίτευμα
  english_pob_choice: citizenship
  chosen_korean: 시민권
  alternatives_korean:
  - 시민됨
  - 본향
  - 공동체
  lexicon: BDAG
  rationale: 19절의 「땅의 것」과의 대조에서 πολίτευμα는 시민적·정치적 소속을 가리킨다. 「시민권」이 그 시민적 함의를 분명히 한다. 한국 성서 전통의 「본향」도 가능하나 의미를 정치적 영역에서 영적 향수로 옮기는 경향이 있다.
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_korean: 하늘
  alternatives_korean:
  - 하늘들
  - 하늘에
  lexicon: BDAG
  rationale: 헬라어 복수형을 한국어 관용에 맞추어 단수 「하늘」로 옮긴다. 복수의 함의는 각주에 둔다.
- source_word: ὑπάρχει
  english_pob_choice: is
  chosen_korean: 있습니다
  alternatives_korean:
  - 존재합니다
  - 자리 잡고 있습니다
  lexicon: BDAG
  rationale: 실재적 존재를 단순한 「있다」로 자연스럽게 표현. 합쇼체 「있습니다」가 격식과 명료성을 함께 살린다.
- source_word: ἐξ οὗ
  english_pob_choice: from where
  chosen_korean: 그곳으로부터
  alternatives_korean:
  - 거기로부터
  - 그곳에서
  lexicon: BDAG
  rationale: 단수 관계사가 앞의 「하늘」(공간)을 지시. 「그곳으로부터」가 공간적 함의를 보존한다.
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_korean: 구주
  alternatives_korean:
  - 구원자
  - 구주이신
  lexicon: BDAG
  rationale: 「구주」가 한국 성서 전통의 기독론적 정착 어휘. 「~이신」으로 동격 관계(주 예수 메시아)를 분명히 한다.
- source_word: ἀπεκδεχόμεθα
  english_pob_choice: eagerly await
  chosen_korean: 간절히 기다립니다
  alternatives_korean:
  - 열망하며 기다립니다
  - 고대합니다
  lexicon: BDAG
  rationale: 합성동사가 지속적·간절한 기다림을 표현. 「간절히 기다리다」가 그 어조를 자연스럽게 담는다.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  - 주인
  lexicon: BDAG
  rationale: 글로사리 기본형 「주(主)」 유지. 「주 예수 메시아」 형태가 가장 간결하다.
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 일관 원칙에 따라 칭호 Χριστός는 「메시아」. 인명 「예수」 다음에 와도 종말론적 구원자 칭호의 의미가 살아 있다.
- source_word: γὰρ
  english_pob_choice: For
  chosen_korean: 그러나
  alternatives_korean:
  - 왜냐하면
  - 곧
  lexicon: BDAG
  rationale: 본 절의 γάρ는 단순한 인과보다 19절의 「땅의 것에 마음 두는 자들」과의 강한 대조를 도입한다. 「그러나」가 그 대조를 자연스럽게 살리며, 한국 성서 전통(개역개정 「그러나」)과도 일치한다.
theological_decisions:
- issue: κύριον Ἰησοῦν Χριστόν 칭호 묶음에서 Χριστόν의 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역은 칭호로 기능하는 Χριστός를 「메시아」로 옮긴다. 본 절의 종말론적 구원자 호명에서 칭호의 의미는 분명히 살아 있다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like).'
