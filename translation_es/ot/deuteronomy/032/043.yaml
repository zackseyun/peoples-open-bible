base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/032/043.yaml
  text: Rejoice[a], O nations, with his people, for he will avenge the blood of his servants; he will repay his adversaries[d][c][b], and he will make atonement for his land and his people.
  footnotes:
  - marker: a
    text: Or 'Sing for joy, O nations, with his people.' The Hebrew imperative can carry the sense of jubilant shouting or singing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the blood of his servants'; 'slaves' is also possible for the noun in other contexts.
    reason: lexical_alternative
  - marker: c
    text: The Greek Septuagint and a Dead Sea Scroll preserve a longer form of this verse, including additional calls for the heavens and divine beings to rejoice and for the nations to worship him. The main text here follows the Masoretic Hebrew.
    reason: textual_variant
  - marker: d
    text: Or 'he will cleanse/purge his land, his people.' The Hebrew verb can emphasize expiation or cleansing.
    reason: lexical_alternative
