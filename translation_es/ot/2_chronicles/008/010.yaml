translation:
  language: es
  text: 'Estos eran los jefes de los delegados[a] del rey Salomón: doscientos cincuenta,[b] que gobernaban al pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «supervisores» para «delegados»; el término hebreo se refiere a funcionarios nombrados bajo autoridad real.
    reason: lexical_alternative
  - marker: b
    text: O «que supervisaban al pueblo» o «que estaban a cargo del pueblo»; el verbo puede denotar autoridad en sentido administrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Y estos eran
  - Estos son
  lexicon: WLC/POB audit trail
  rationale: La frase introduce una lista histórica de funcionarios; el pasado español conserva el tono narrativo del contexto y evita un presente que sonaría menos natural en español.
- source_word: שָׂרֵי
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - oficiales
  - capitanes
  - príncipes
  lexicon: HALOT
  rationale: El término señala a funcionarios de rango superior. 'Jefes' preserva la idea de autoridad jerárquica sin cargar el pasaje con una connotación militar más fuerte de la que exige el hebreo.
- source_word: הַנְּצִיבִים
  english_pob_choice: deputies
  chosen_spanish: delegados
  alternatives_spanish:
  - supervisores
  - oficiales
  - gobernadores
  lexicon: HALOT
  rationale: Se trata de funcionarios nombrados bajo autoridad real. 'Delegados' comunica bien la idea de autoridad delegada y evita una lectura demasiado técnica o territorial que puede sugerir 'gobernadores'.
- source_word: אֲשֶׁר לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: of King Solomon
  chosen_spanish: de rey Salomón
  alternatives_spanish:
  - que pertenecían al rey Salomón
  - al servicio del rey Salomón
  lexicon: HALOT
  rationale: El hebreo expresa relación/posesión con el rey. La construcción 'de rey Salomón' es breve y fiel; se omite el artículo para mantener la economía del genitivo en español bíblico sin volverlo arcaizante.
- source_word: חֲמִשִּׁים וּמָאתָיִם
  english_pob_choice: two hundred and fifty
  chosen_spanish: doscientos cincuenta
  alternatives_spanish:
  - doscientos cincuenta y
  lexicon: HALOT
  rationale: Número cardinal estándar en español, directamente equivalente al hebreo.
- source_word: הָרֹדִים
  english_pob_choice: who ruled
  chosen_spanish: que gobernaban
  alternatives_spanish:
  - que supervisaban
  - que estaban a cargo
  - que ejercían autoridad
  lexicon: HALOT
  rationale: El verbo רדה puede abarcar ejercer dominio o autoridad administrativa. 'Gobernaban' mantiene la fuerza de 'ruled' en la POB inglesa sin sugerir necesariamente dominación hostil; el contexto administrativo orienta el sentido hacia autoridad funcional.
- source_word: בָּעָם
  english_pob_choice: over the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - sobre el pueblo
  - sobre la gente
  - entre el pueblo
  lexicon: HALOT
  rationale: Aunque ב con רדה suele implicar esfera de autoridad, en español 'gobernaban al pueblo' suena más natural que 'sobre el pueblo' y sigue expresando el objeto de la autoridad. Se conserva el sentido relacional sin sobrecargar la sintaxis.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la lectura auditada en inglés: lista histórica, funcionarios de rango, número exacto y verbo de autoridad administrativa. No se detectaron revisiones aplicadas en el pasaje fuente, por lo que no se introducen variantes textuales ni cambios de sentido.'
  spanish_consistency_notes:
  - Se mantiene 'Salomón' como nombre propio tradicional y transparente.
  - Se prefiere 'delegados' para נְצִיבִים, pero se deja abierta la alternativa administrativa en nota porque el término puede abarcar más de una función.
  - El verbo 'gobernaban' preserva el valor de autoridad de רדה sin imponer una lectura de opresión.
