  text: כִּ֤י הִנֵּ֪ה הָ/רְשָׁעִ֡ים יִדְרְכ֬וּ/ן קֶ֗שֶׁת כּוֹנְנ֣וּ חִצָּ֣/ם עַל יֶ֑תֶר לִ/יר֥וֹת בְּמוֹ אֹ֝֗פֶל לְ/יִשְׁרֵי לֵֽב־־־׃
