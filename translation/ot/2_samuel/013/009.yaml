id: 2SA.13.9
reference: 2 Samuel 13:9
source:
  edition: WLC
  text: וַ/תִּקַּ֤ח אֶת הַ/מַּשְׂרֵת֙ וַ/תִּצֹ֣ק לְ/פָנָ֔י/ו וַ/יְמָאֵ֖ן לֶ/אֱכ֑וֹל וַ/יֹּ֣אמֶר אַמְנ֗וֹן הוֹצִ֤יאוּ כָל אִישׁ֙ מֵֽ/עָלַ֔/י וַ/יֵּצְא֥וּ כָל אִ֖ישׁ מֵ/עָלָֽי/ו־־־׃
translation:
  text: Then she took the pan and poured them out before him[a], but he refused to eat. And Amnon said[b], “Send everyone out from me.” So everyone went out from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “poured them out before him” or “set it before him”; the Hebrew verb is literally “poured out,” used here in the context of serving food.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “every man.” Here it functions collectively for all those present.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂרֵת
  chosen: the pan
  alternatives:
  - the serving pan
  - the dish
  lexicon: HALOT
  rationale: מַשְׂרֵת here denotes the cooking or serving vessel from which Tamar presents the food. 'Pan' is the most natural concise English rendering in this narrative context; 'dish' is possible but less specific.
- source_word: וַתִּצֹק לְפָנָיו
  chosen: served them before him
  alternatives:
  - poured them out before him
  - set it before him
  lexicon: HALOT
  rationale: The verb יצק literally means 'pour out,' but in context of prepared cakes/food being presented, the idiomatic sense is serving or setting out the food before Amnon. 'Served them before him' preserves the action without wooden awkwardness. The plural object is implied from the broader context of the cakes.
- source_word: וַיְמָאֵן לֶאֱכֹל
  chosen: he refused to eat
  alternatives:
  - he was unwilling to eat
  lexicon: HALOT
  rationale: מָאֵן expresses refusal, not mere lack of appetite. 'Refused to eat' captures the deliberate rejection.
- source_word: הוֹצִיאוּ
  chosen: Send ... out
  alternatives:
  - Bring ... out
  - Take ... out
  lexicon: HALOT
  rationale: The Hiphil imperative of יצא means to cause to go out. In direct speech to attendants, 'Send ... out' is idiomatic English and reflects the causative force.
- source_word: כָל אִישׁ
  chosen: everyone
  alternatives:
  - every man
  - every person
  lexicon: HALOT
  rationale: Although אִישׁ is formally 'man,' in this dismissal formula it refers collectively to all persons present. 'Everyone' best conveys the intended scope in natural English. This is a contextual exception to a more formally gendered rendering and does not erase the source sense.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - away from me
  - from my presence
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'from upon me,' idiomatically 'away from me' or 'from my presence.' 'From me' is concise and natural in the command.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - away from him
  - from his presence
  lexicon: HALOT
  rationale: The narrative repeats the same idiom with third-person suffix. 'From him' preserves the parallelism with the command while remaining readable.
