base_translation:
  language: en
  yaml_path: translation/ot/zechariah/002/004.yaml
  text: Then I said[a], “What are these coming to do?” And he said, “These are the horns that scattered Judah, so that no one lifted up his head; and these have come to terrify them[c][b], to cast down the horns of the nations that lifted up a horn against the land of Judah to scatter her.”
  footnotes:
  - marker: a
    text: Or, 'so that no one lifted up his head.' The Hebrew reads literally, 'according to the mouth of a man, he did not lift up his head,' an idiom expressing humiliation or helplessness.
    reason: lexical_alternative
  - marker: b
    text: '''Horns'' symbolize power or aggressive strength; the image is kept rather than interpreted in the main text.'
    reason: cultural_note
  - marker: c
    text: Or, 'to throw down' the horns of the nations.
    reason: lexical_alternative
