  text: Then the king’s scribes were summoned in the first month[a], on the thirteenth day of it, and it was written exactly as Haman commanded to the king’s satraps, to the governors who were over each province, and to the officials of each people, to every province in its own script and to every people in its own language[b]. It was written in the name of King Ahasuerus and sealed with the king’s signet ring.
  footnotes:
