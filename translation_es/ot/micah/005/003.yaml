  yaml_path: translation/ot/micah/005/003.yaml
  text: And he will stand and shepherd in the strength of Yahweh[a], in the majesty of the name of Yahweh his God. And they will dwell secure[b], for now he will be great to the ends of the earth.
  footnotes:
