lexical_decisions:
- source_word: מְזִמָּה
  english_pob_choice: Discretion
  chosen_spanish: discreción
  alternatives_spanish:
  - prudencia
  - buen juicio
  - cordura
  lexicon: HALOT
  rationale: En Proverbios, el sustantivo suele expresar planificación sensata o discernimiento prudente, no 'maquinación' en sentido negativo. 'Discreción' conserva el valor sapiencial y funciona de forma natural en español.
- source_word: תִּשְׁמֹר עָלֶיךָ
  english_pob_choice: will watch over you
  chosen_spanish: te protegerá
  alternatives_spanish:
  - te guardará
  - velará por ti
  - te cuidará
  lexicon: HALOT
  rationale: שׁמר con la idea de vigilancia protectora admite varias opciones en español. 'Te protegerá' comunica bien la orientación benefactora hacia el destinatario, aunque se mantiene el matiz de custodia en la segunda cola con 'guardará'.
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la discernimiento
  - la inteligencia
  - la perspicacia
  lexicon: HALOT
  rationale: Término sapiencial estable en Proverbios. 'Entendimiento' es transparente y fiel al campo semántico de capacidad de discernir correctamente.
- source_word: תִנְצְרֶכָּה
  english_pob_choice: will guard you
  chosen_spanish: te guardará
  alternatives_spanish:
  - te preservará
  - te custodiará
  - te mantendrá a salvo
  lexicon: HALOT
  rationale: נצר expresa guardar, custodiar o preservar. 'Te guardará' mantiene el paralelismo con la primera línea y refleja con precisión la imagen protectora del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Proverbios 2:11 y el audit trail inglés, manteniendo el paralelismo entre vigilancia/protección y guardia/custodia sin añadir elementos interpretativos. No se aplicaron revisiones adicionales respecto del último pase auditado, que marcó alta concordancia.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras convenciones no presentes en el versículo.
  - '''Discreción'' se usa aquí como término sapiencial, no como simple cortesía social.'
  - La segunda cola conserva el verbo 'guardar' para reflejar el paralelismo hebreo.
  - El pronombre enclítico 'te' traduce la dirección personal del sufijo de segunda persona.
