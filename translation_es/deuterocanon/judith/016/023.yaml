translation:
  language: es
  text: Y siguió prosperando mucho[a], y envejeció en casa de su marido hasta los ciento cinco años, y dejó libre a su sirvienta[b]. Luego murió en Betulia, y la sepultaron en la cueva de su marido Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siguió llegando a ser muy grande»; el griego literalmente habla de «avanzar» o «hacerse grande» con fuerte intensificación.'
    reason: lexical_alternative
  - marker: b
    text: El término griego para la mujer que Judith liberó designa a una atendiente o sirvienta; como el texto dice que la dejó libre, el pasaje implica una condición servil o dependiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: προβαίνουσα
  english_pob_choice: continued to prosper
  chosen_spanish: siguió prosperando
  alternatives_spanish:
  - avanzó
  - siguió adelante
  - iba en aumento
  lexicon: LSJ
  rationale: El griego literalmente comunica ir avanzando o progresar; con μεγάλη σφόδρα describe un crecimiento o prosperidad continuada. «Siguió prosperando» conserva esa idea de continuidad y resultado favorable en español natural, sin perder la imagen de avance implícita.
- source_word: μεγάλη σφόδρα
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - muy grandemente
  - en gran manera
  - sumamente
  lexicon: LSJ
  rationale: La construcción intensifica fuertemente la idea verbal. «Grandemente» funciona como intensificador sobrio en español bíblico y refleja la acumulación de énfasis del griego sin sobretraducirlo.
- source_word: ἐγήρασεν
  english_pob_choice: grew old
  chosen_spanish: envejeció
  alternatives_spanish:
  - se hizo vieja
  - llegó a vieja edad
  - se volvió anciana
  lexicon: LSJ
  rationale: El verbo expresa llegar a la vejez. «Envejeció» es claro, digno y fiel al aspecto de proceso/resultado del verbo.
- source_word: ἐν τῷ οἴκῳ τοῦ ἀνδρὸς αὐτῆς
  english_pob_choice: in her husband's house
  chosen_spanish: en casa de su marido
  alternatives_spanish:
  - en la casa de su marido
  - en el hogar de su marido
  - en la casa de su esposo
  lexicon: LSJ
  rationale: «Casa de su marido» reproduce bien la relación posesiva y el marco doméstico del griego. Se prefirió «marido» por su tono narrativo y para evitar una posible elevación interpretativa de «esposo» si se leyera como matiz más moderno.
- source_word: ἔτη ἑκατὸν πέντε
  english_pob_choice: for one hundred five years
  chosen_spanish: por ciento cinco años
  alternatives_spanish:
  - durante ciento cinco años
  - a la edad de ciento cinco años
  - por espacio de ciento cinco años
  lexicon: LSJ
  rationale: La revisión inglesa entendió el giro como duración de vida. «Por ciento cinco años» conserva la duración y evita introducir una paráfrasis temporal más explicativa de lo que el griego requiere.
- source_word: ἀφῆκεν
  english_pob_choice: set ... free
  chosen_spanish: dejó libre
  alternatives_spanish:
  - liberó
  - puso en libertad
  - despidió
  lexicon: LSJ
  rationale: El verbo aquí indica soltar o liberar de una dependencia. «Dejó libre» es directo, fiel y suficientemente natural; mantiene el acto de manumisión sin forzar un tecnicismo jurídico.
- source_word: τὴν ἅβραν αὐτῆς
  english_pob_choice: maidservant
  chosen_spanish: su sirvienta
  alternatives_spanish:
  - su criada
  - su doncella
  - su esclava
  lexicon: LSJ
  rationale: ἅβρα designa una atendiente femenina o criada, y el contexto de «dejó libre» implica una relación de dependencia servil. «Sirvienta» comunica esa relación de servicio subordinado sin cargar de inmediato el texto con «esclava», aunque esa posibilidad permanece implícita en la acción de libertad.
- source_word: εἰς Βαιτυλουὰ
  english_pob_choice: in Bethulia
  chosen_spanish: en Betulia
  alternatives_spanish:
  - en Bethulia
  - a Betulia
  lexicon: LSJ
  rationale: Se opta por la forma castellana habitual del topónimo. El griego de la escena funeraria funciona locativamente; «en Betulia» refleja el uso narrativo sin añadir dirección.
- source_word: σπηλαίῳ
  english_pob_choice: cave
  chosen_spanish: cueva
  alternatives_spanish:
  - gruta
  - caverna
  lexicon: LSJ
  rationale: Aunque el término puede traducirse por «cueva», «gruta» o «caverna», «cueva» es la opción más natural y transparente en español bíblico contemporáneo.
- source_word: Μανασσῆ
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  - Manasés
  lexicon: LSJ
  rationale: Se usa la forma hispanizada del nombre propio, de uso estable en español bíblico, para mantener legibilidad y consistencia onomástica.
theological_decisions:
- issue: Estatus social de la mujer liberada por Judith
  english_pob_reading: Use 'maidservant' in the main text while making the manumission sense explicit with 'set ... free.'
  chosen_spanish_reading: Usar «sirvienta» en el texto principal y explicitar la liberación con «dejó libre».
  alternative_spanish_readings:
  - criada
  - esclava
  - doncella
  rationale: El griego no usa aquí δοῦλος, pero la acción de liberarla indica una relación de dependencia real. «Sirvienta» preserva el tono doméstico y evita cerrar demasiado pronto la cuestión social, mientras que «dejó libre» mantiene visible la manumisión. «Esclava» sería posible si se quisiera enfatizar más fuertemente el estatus servil, pero el texto griego no lo nombra con ese término estándar.
  doctrine_reference: 'DOCTRINE.md: precisión lexical; equivalencia óptima; no borrar tensiones sociales del texto'
- issue: Duración de vida y sintaxis temporal
  english_pob_reading: for one hundred five years
  chosen_spanish_reading: por ciento cinco años
  alternative_spanish_readings:
  - durante ciento cinco años
  - a la edad de ciento cinco años
  rationale: El giro griego se entiende como la duración total de su vejez y vida posterior en casa de su marido. «Por ciento cinco años» mantiene la lectura adoptada por el POB inglés y evita convertir el dato en una paráfrasis más interpretativa.
  doctrine_reference: 'DOCTRINE.md: fidelidad al sentido del original; evitar aclaraciones no exigidas'
- issue: Nombre divino y cristológico
  english_pob_reading: None in this verse
  chosen_spanish_reading: No aplica en este versículo.
  rationale: El versículo no contiene referencias directas a יהוה, κύριος como nombre divino, Χριστός ni Jesús; por tanto, no se introduce terminología teológica adicional.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que ajustó la duración a «for one hundred five years» para reflejar mejor la construcción griega y mantuvo la continuidad de la prosperidad y la liberación de la sirvienta. La versión española conserva esa decisión temporal y el mismo perfil semántico, con un ajuste natural de sintaxis para el español.
  spanish_consistency_notes:
  - Se mantiene «Betulia» como forma hispanizada estable del topónimo.
  - Se usa «Manasés» para el nombre propio, en línea con el uso bíblico español habitual.
  - Se evita «SEÑOR» o fórmulas de sustitución divina porque no hay aquí nombre divino alguno.
  - Se conserva el matiz servil de ἅβρα sin imponer «esclava» en el texto principal, pero se documenta la implicación de dependencia en nota.
