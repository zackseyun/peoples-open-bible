    text: Or 'and startled the nations,' or possibly 'and scattered the nations.' The Hebrew verb here is difficult, and the exact nuance is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'His goings are everlasting' or 'His paths are eternal.'
    reason: lexical_alternative
