translation:
  language: es
  text: 'Y dije[a]: «La sabiduría es mejor que la fuerza[b]»; pero la sabiduría del hombre pobre[c] es despreciada, y sus palabras no son escuchadas[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces dije».
    reason: lexical_alternative
  - marker: b
    text: O «poder» para «fuerza».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el hombre pobre»; probablemente retoma al sabio pobre del versículo anterior.'
    reason: cross_reference
  - marker: d
    text: O «no son atendidas» o «pasan inadvertidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתִּי אֲנִי
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y yo dije
  lexicon: HALOT
  rationale: El hebreo introduce la reflexión del hablante con una simple secuencia narrativa. En español, «Y dije» conserva esa continuidad sin añadir una relación discursiva más fuerte que la del original.
- source_word: טוֹבָה חָכְמָה מִגְּבוּרָה
  english_pob_choice: Wisdom is better than strength
  chosen_spanish: La sabiduría es mejor que la fuerza
  alternatives_spanish:
  - La sabiduría es mejor que el poder
  - La sabiduría es mejor que la valentía
  lexicon: HALOT
  rationale: «גְּבוּרָה» aquí puede abarcar fuerza, poder o vigor. «Fuerza» es una equivalencia natural y amplia en español, y mantiene el contraste con la sabiduría sin estrecharlo a una sola forma de poder.
- source_word: וְחָכְמַת הַמִּסְכֵּן
  english_pob_choice: but the wisdom of the poor man
  chosen_spanish: pero la sabiduría del pobre
  alternatives_spanish:
  - pero la sabiduría del pobre hombre
  - pero la sabiduría del necesitado
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo funciona sustantivamente como «el pobre». En español, «del pobre» conserva la referencia directa y deja abierta la conexión con el pobre sabio del versículo anterior, como en el audit trail inglés.
- source_word: בְּזוּיָה
  english_pob_choice: is despised
  chosen_spanish: es despreciada
  alternatives_spanish:
  - es desechada con desprecio
  - es tenida en poco
  lexicon: HALOT
  rationale: El pasivo expresa ser tratado con menosprecio. «Es despreciada» transmite bien esa valoración negativa en un español natural y fiel.
- source_word: וּדְבָרָיו
  english_pob_choice: and his words
  chosen_spanish: y sus palabras
  alternatives_spanish:
  - y sus dichos
  - y lo que dice
  lexicon: HALOT
  rationale: «דְּבָרָיו» puede referirse a palabras, dichos o discursos. «Sus palabras» es la opción más directa y clara en español.
- source_word: אֵינָם נִשְׁמָעִים
  english_pob_choice: are not heard
  chosen_spanish: no son escuchadas
  alternatives_spanish:
  - no se oyen
  - no son atendidas
  lexicon: HALOT
  rationale: El hebreo puede implicar tanto oír como prestar atención. «No son escuchadas» conserva esa ambigüedad útil en español mejor que una simple referencia acústica.
theological_decisions:
- issue: Relación entre "fuerza" y las alternativas "might/power" en el contraste sapiencial
  english_pob_reading: Wisdom is better than strength
  chosen_spanish_reading: La sabiduría es mejor que la fuerza
  alternative_spanish_readings:
  - La sabiduría es mejor que el poder
  - La sabiduría es mejor que la valentía
  rationale: El pasaje formula una comparación general entre sabiduría y una capacidad humana de imponerse. «Fuerza» conserva esa amplitud sin introducir una lectura militar o política que el hebreo no exige.
  doctrine_reference: Eclesiastés 9:16; sapiencial sobre la superioridad práctica de la sabiduría
- issue: Identificación del «pobre» como referencia específica al sabio pobre del versículo anterior
  english_pob_reading: Hebrew 'the poor man'; this likely refers back to the poor wise man in the preceding verse.
  chosen_spanish_reading: del pobre
  alternative_spanish_readings:
  - del pobre hombre
  - del necesitado
  rationale: La forma breve mantiene la referencia textual abierta y permite que el lector perciba la continuidad con el versículo previo sin explicitarla en el cuerpo del texto.
  doctrine_reference: Eclesiastés 9:15–16; coherencia literaria inmediata
- issue: Valor de «no son escuchadas» frente a «no son escuchadas / atendidas»
  english_pob_reading: are not heard
  chosen_spanish_reading: no son escuchadas
  alternative_spanish_readings:
  - no se oyen
  - no son atendidas
  rationale: La expresión puede abarcar tanto la percepción auditiva como la recepción atenta. «No son escuchadas» preserva esa doble posibilidad y encaja con la crítica del texto a la falta de reconocimiento.
  doctrine_reference: Eclesiastés 9:16; recepción social del sabio pobre
translation_notes:
  revision_awareness: 'Se revisó la línea de separación del contraste adversativo: el hebreo usa una conjunción simple, pero el sentido global exige oposición; por eso se mantuvo «pero» en español, como en la POB inglesa. No se introdujeron glosas explicativas en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה y «fuerza» para גְּבוּרָה, en continuidad con el audit trail inglés pero con una equivalencia natural en español.
  - Se conservó el artículo definido en «la sabiduría del pobre» para reflejar la forma sustantivada del hebreo.
  - «Escuchadas» se eligió para preservar el matiz de recepción/atención, no solo audición física.
  - El tono general busca ser bíblico pero contemporáneo, sin recurrir a fórmulas eclesiásticas innecesarias.
