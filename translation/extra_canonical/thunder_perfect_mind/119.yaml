  alternatives:
  - are complete
  - are perfect
  - are finished
  lexicon: Greek τέλειον/τέλειος loan; Coptic usage signals completeness/perfection
  rationale: Aspectually expresses a state resulting from completion; “completed”
    is less evaluative than “perfect,” fitting the probable context of finished texts.
