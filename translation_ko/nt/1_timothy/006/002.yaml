id: 1TI.6.2
reference: 1 Timothy 6:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ δὲ πιστοὺς ἔχοντες δεσπότας μὴ καταφρονείτωσαν, ὅτι ἀδελφοί εἰσιν· ἀλλὰ μᾶλλον δουλευέτωσαν, ὅτι πιστοί εἰσιν καὶ ἀγαπητοὶ οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι. Ταῦτα δίδασκε καὶ παρακάλει.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/002.yaml
  text: And those who have believing masters must not despise them because they are brothers[a]; rather, they must serve them all the more, because those who partake of the benefit are believers and beloved[b]. Teach and urge these things.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'those who receive the benefit' is difficult. It most likely refers to the believing masters as the beneficiaries of the slaves' service.
    reason: alternative_reading
translation:
  language: ko
  text: 또한 믿는 주인을 둔 노예들은, 그 주인이 형제[a]라는 이유로 그를 업신여기지 말고, 오히려 더욱 잘 섬겨야 합니다. 그 섬김의 유익을 받는 자들이[b] 믿는 자요 사랑받는 자들이기 때문입니다. 이것들을 가르치고 권면하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매」. 헬라어는 「형제들」이지만, 본 어구는 동료 신자 전체를 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 「유익을 받는 자들」 구절은 해석이 까다롭다. 노예들의 섬김의 수혜자인 믿는 주인을 가리키는 것으로 보는 것이 가장 자연스럽다.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ πιστοὺς ἔχοντες δεσπότας
  english_pob_choice: those who have believing masters
  chosen_korean: 믿는 주인을 둔 노예들
  alternatives_korean:
  - 신자인 주인을 둔 노예들
  lexicon: BDAG
  rationale: 1절을 이어받는 노예 대상 권면이므로 한국어로는 주어 「노예들」을 부가하여 흐름을 명시.
- source_word: μὴ καταφρονείτωσαν, ὅτι ἀδελφοί εἰσιν
  english_pob_choice: must not despise them because they are brothers
  chosen_korean: 형제라는 이유로 그를 업신여기지 말고
  alternatives_korean:
  - 형제라는 이유로 그를 우습게 여기지 말고
  lexicon: BDAG
  rationale: 4:12 καταφρονέω와 일관 「업신여기다」.
- source_word: μᾶλλον δουλευέτωσαν
  english_pob_choice: must serve them all the more
  chosen_korean: 오히려 더욱 잘 섬겨야 합니다
  alternatives_korean:
  - 도리어 더 충실히 섬겨야 합니다
  lexicon: BDAG
  rationale: δουλεύω의 「섬기다」.
- source_word: οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι
  english_pob_choice: those who partake of the benefit
  chosen_korean: 그 섬김의 유익을 받는 자들
  alternatives_korean:
  - 그 선행의 수혜자들
  - 그 은혜를 누리는 자들
  lexicon: BDAG
  rationale: εὐεργεσία의 「선행·유익」을 「섬김의 유익」으로 풀어 노예의 섬김 문맥을 살린다.
