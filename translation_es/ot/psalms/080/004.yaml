translation:
  language: es
  text: Dios[a], restáuranos, y haz resplandecer tu rostro[c][b], para que seamos salvos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haznos volver» o «vuélvenos». El verbo hebreo puede significar hacer volver a alguien o devolverlo a una condición previa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «haz resplandecer tu rostro»; es una imagen de favor y presencia divina, en eco con la bendición sacerdotal de Números 6:25.
    reason: cross_reference
  - marker: c
    text: O «y seremos salvos». La forma hebrea puede entenderse como petición de resultado o como afirmación del resultado esperado.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: El hebreo usa aquí el título divino con referencia singular; en español, «Dios» es el equivalente natural y directo para la invocación. No se añade «Oh» porque el vocativo ya queda claro por el contexto y la puntuación.
- source_word: הֲשִׁיבֵנוּ
  english_pob_choice: restore us
  chosen_spanish: restáuranos
  alternatives_spanish:
  - haznos volver
  - vuélvenos
  - regrésanos
  lexicon: HALOT
  rationale: El verbo en hifil expresa la idea causativa de hacer volver o devolver a una condición previa. «Restáuranos» conserva bien la fuerza de renovación/retorno y suena natural en español bíblico contemporáneo.
- source_word: וְהָאֵר
  english_pob_choice: and make ... shine
  chosen_spanish: y haz resplandecer
  alternatives_spanish:
  - y alumbra
  - y haz brillar
  lexicon: HALOT
  rationale: 'El hifil de אור tiene valor causativo: no solo «brillar», sino hacer que algo brille. «Haz resplandecer» mantiene esa causatividad y conserva la imagen luminosa del texto.'
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu presencia
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «rostro» para no diluir la metáfora hebrea de presencia/favor divinos. «Tu presencia» es interpretativo y queda como alternativa, no como texto principal.
- source_word: וְנִוָּשֵׁעָה
  english_pob_choice: that we may be saved
  chosen_spanish: para que seamos salvos
  alternatives_spanish:
  - y seremos salvos
  - y seamos salvados
  lexicon: HALOT
  rationale: La forma nifal volitiva puede leerse como resultado deseado de la petición anterior. «Para que seamos salvos» conserva el valor final/peticionario sin convertirlo en una simple predicción. «Salvos» mantiene el campo semántico bíblico de salvación.
theological_decisions:
- issue: Valor volitivo o resultativo del último verbo
  english_pob_reading: that we may be saved
  chosen_spanish_reading: para que seamos salvos
  alternative_spanish_readings:
  - y seremos salvos
  - para ser salvos
  rationale: La secuencia de imperativos pide restauración y luz divina como medio del rescate. En español, una finalidad con «para que» preserva la oración de deseo y evita imponer un futuro meramente declarativo.
  doctrine_reference: Translation philosophy §3 (preservar la tensión donde existe ambigüedad)
- issue: Imagen de la «cara/rostro» divino como señal de favor y presencia
  english_pob_reading: Literally 'make your face shine,' an image of divine favor and presence
  chosen_spanish_reading: haz resplandecer tu rostro
  alternative_spanish_readings:
  - haz brillar tu presencia
  - muéstranos tu favor
  rationale: Se mantiene la metáfora corporal del hebreo, que en este contexto alude a favor y presencia sin reducirse a una explicación abstracta. La frase sigue siendo comprensible para lectores en español y conserva el eco cultual del texto.
  doctrine_reference: Numbers 6:25; Psalm 80:3-7
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del registro inglés: no hubo cambios aplicados; el presente borrador sigue la misma lectura general y conserva la ambigüedad final en forma final/peticionaria.'
  spanish_consistency_notes:
  - Se mantiene «Dios» como vocativo natural, sin convertirlo en «SEÑOR», conforme al nombre/título del hebreo.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - Se traduce el lenguaje de luz con un verbo causativo en español («haz resplandecer») para reflejar el hifil hebreo.
  - Se conserva «rostro» y no se sustituye por «presencia» en el texto principal, aunque se reconoce esa implicación en nota.
