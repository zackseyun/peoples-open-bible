revisions:
- from: No hagas pesada tu mano sobre nosotros[a], para que no pequemos por necesidad.
  to: No cargues tu mano sobre nosotros[a], no sea que pequemos forzados.
  rationale: Se revisa para mejorar la naturalidad del español y la precisión semántica sin alejarse del griego ni del audit trail inglés. 'No cargues tu mano sobre nosotros' mantiene la imagen de la mano opresiva mejor que 'hagas pesada tu mano', y 'pequemos forzados' expresa con mayor claridad la idea de διʼ ἀνάγκην como constricción o compulsión. Se conserva una nota con la alternativa más literal previamente documentada.
