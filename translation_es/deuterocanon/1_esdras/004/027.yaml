translation:
  language: es
  text: Y muchos fueron destruidos, fueron extraviados y pecaron por causa de mujeres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposas». El griego γυναῖκες puede significar «mujeres» o «esposas» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - gran número de
  lexicon: LSJ
  rationale: «muchos» reproduce de forma natural y directa el cuantificador griego sin añadir énfasis no presente en el texto.
- source_word: ἀπώλοντο
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - perecieron
  - se perdieron
  lexicon: LSJ
  rationale: La forma griega expresa ruina o pérdida grave; «fueron destruidos» conserva la fuerza del pasivo/medio sin reducirlo a una mera pérdida física.
- source_word: ἐσφάλησαν
  english_pob_choice: were led astray
  chosen_spanish: fueron desviados
  alternatives_spanish:
  - tropezaron
  - se extraviaron
  - fueron engañados
  lexicon: LSJ
  rationale: En este contexto moral, «fueron desviados» comunica que salieron del camino correcto. «Tropezaron» sería demasiado físico; «fueron engañados» introduce un agente que el griego no exige.
- source_word: ἡμάρτοσαν
  english_pob_choice: sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - cometieron pecado
  - faltaron
  lexicon: LSJ
  rationale: «pecaron» es el equivalente español directo y formal para ἁμαρτάνω en contexto religioso/moral.
- source_word: διὰ τὰς γυναῖκας
  english_pob_choice: because of women
  chosen_spanish: por causa de mujeres
  alternatives_spanish:
  - a causa de mujeres
  - por causa de las mujeres
  - por causa de las esposas
  lexicon: LSJ
  rationale: «por causa de» conserva con claridad la relación causal de διά + acusativo. Se evita precisar «esposas» porque el contexto no obliga a esa restricción; se mantiene la amplitud de γυναῖκες como «mujeres».
theological_decisions:
- issue: La frase causal puede sonar acusatoria o misógina si se suaviza demasiado.
  english_pob_reading: because of women
  chosen_spanish_reading: por causa de mujeres
  alternative_spanish_readings:
  - por causa de las esposas
  - a causa de mujeres
  rationale: Se preserva la formulación directa del texto griego y el registro del POB en inglés, sin reinterpretar ni atenuar la causalidad. Al mismo tiempo, «mujeres» mantiene la amplitud léxica de γυναῖκες y deja abierta la tensión del pasaje en vez de resolverla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: Coincide con la última revisión reportada como sin cambios; el pasaje mantiene la lectura del audit trail inglés sin revisiones aplicadas.
  spanish_consistency_notes:
  - Se usa «fueron» para mantener la serie verbal en pasado pasivo/mediopasivo, en paralelo con el griego y con el inglés POB.
  - Se conservó «mujeres» como término principal por la amplitud semántica de γυναῖκες y por la ausencia de un contexto inmediato que exija «esposas».
  - La nota de pie de página señala explícitamente la alternativa léxica documentada sin introducir una lectura nueva.
