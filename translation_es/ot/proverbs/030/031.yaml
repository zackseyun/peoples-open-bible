translation:
  language: es
  text: un gallo erguido[a], un macho cabrío, y un rey contra quien nadie se levanta.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido «gallo erguido» es raro e incierto; otras traducciones incluyen «galgo» o «caballo de guerra».
    reason: lexical_alternative
  - marker: b
    text: 'O bien: «un rey con quien nadie puede alzarse». La expresión hebrea es difícil y admite más de una interpretación plausible.'
    reason: alternative_reading
lexical_decisions:
- source_word: זַרְזִיר מָתְנַיִם
  english_pob_choice: strutting rooster
  chosen_spanish: un gallo erguido[a]
  alternatives_spanish:
  - un gallo strutting
  - un gallo de loins
  - un ave de porte erguido
  - un animal de cintura ceñida
  lexicon: HALOT, BDB
  rationale: El hebreo es raro y la imagen exacta es incierta. Sigo la decisión POB inglesa de entender una criatura de porte orgulloso y andadura elegante, expresada en español como 'gallo erguido'. 'Erguido' comunica el matiz de porte y prestancia sin introducir una paráfrasis excesiva.
- source_word: תָּיִשׁ
  english_pob_choice: he-goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un macho de cabra
  - un cabrío
  lexicon: HALOT, BDB
  rationale: El término denota específicamente un macho de cabra. 'Macho cabrío' preserva la fuerza léxica y la imagen tradicional con claridad en español.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: un rey
  alternatives_spanish:
  - un monarca
  - un soberano
  lexicon: HALOT, BDB
  rationale: Traducción directa y natural del sustantivo común. 'Rey' mantiene el paralelismo con las otras figuras del proverbio.
- source_word: אַלְקוּם עִמּוֹ
  english_pob_choice: against whom there is no rising up
  chosen_spanish: contra quien no hay alzarse
  alternatives_spanish:
  - contra quien no se puede levantarse
  - a quien nadie puede resistir
  - contra quien no hay quien se levante
  lexicon: HALOT, BDB
  rationale: La expresión es difícil y admite más de una lectura. El español debe conservar la idea de imposibilidad de sublevación o resistencia. 'No hay alzarse' refleja el giro impersonal del hebreo y evita cerrar indebidamente la ambigüedad textual.
theological_decisions:
- issue: Ambigüedad del primer miembro poético (animal raro y expresión sobre los 'lomos')
  english_pob_reading: a strutting rooster
  chosen_spanish_reading: un gallo erguido
  alternative_spanish_readings:
  - un gallo de porte altivo
  - un ave de andar altivo
  - un gallo bien plantado
  rationale: No se fuerza una identificación demasiado precisa donde el hebreo es incierto. Se preserva la imagen de prestancia y movimiento seguro, coherente con la lista de criaturas majestuosas del proverbio.
  doctrine_reference: Principio de prudencia exegética; no hay implicación doctrinal directa
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final del audit trail inglés en la segunda mitad del versículo: ''against whom there is no rising up''. Mantiene la primera imagen dentro de la misma zona semántica que la opción final inglesa (''strutting rooster'') y conserva la incertidumbre léxica con una nota.'
  spanish_consistency_notes:
  - Se usa 'rey' y no 'monarca' para mantener el paralelismo poético.
  - Se evita 'SEÑOR' o terminología teológica no presente en el verso.
  - La nota a pie de página marca la incertidumbre del primer hemistiquio sin duplicar la del segundo, porque la ambigüedad principal del audit trail inglés recae allí y conviene señalarla una sola vez en español.
