    issue: La nota al pie [a] está anclada en «pueblo», pero explica βεβηλωθέντα («había sido profanado»).
    rationale: Esto crea una incoherencia editorial y puede confundir al lector, porque la nota no comenta «pueblo» sino el estado del templo.
  - severity: low
