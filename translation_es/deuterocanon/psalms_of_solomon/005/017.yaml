  to: Tu misericordia está sobre toda la tierra, oh Yahvé, con bondad.
  rationale: Se conserva la fidelidad léxica principal del borrador, pero se cambia «en bondad» por «con bondad» para un español más natural y digno que siga reflejando el sentido de χρηστότητι como cualidad benevolente con la que se manifiesta la misericordia.
