review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del hebreo: Dios abre la roca, sale el agua y esta avanza por lugares secos. Sin embargo, la nota al pie no corresponde bien a la alternativa inglesa auditada: en el inglés la alternativa afecta principalmente la cláusula final (''it flowed in the dry places, a river'' / sin ''like''), no la unión de las dos primeras acciones. Además, «pasaron» para הָלְכוּ es aceptable pero algo débil frente a la imagen de flujo; «fluyeron» o equivalente preserva mejor la relación con «como un río».'
  spanish_quality_summary: El español es natural y legible. «Abrió la peña» y «las aguas brotaron» funcionan bien, aunque «la roca» sería más transparente para lectores generales. «Parajes secos» es comprensible, pero «lugares secos» suena más directo y se alinea mejor con el razonamiento auditado. La frase mejora en viveza y cohesión poética si se cambia «pasaron» por «fluyeron».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La elección «peña» no es incorrecta, pero «roca» se alinea mejor con la decisión inglesa documentada ('the rock') y con la referencia narrativa del éxodo. La nota debe preservar la alternativa léxica documentada con mayor precisión.
  issues:
  - severity: medium
    issue: La nota al pie española no refleja con precisión la alternativa documentada en el POB inglés.
    rationale: La nota actual reestructura también la primera mitad del versículo ('las aguas brotaron, y pasaron...'), cuando la alternativa inglesa se centra en la cláusula final y en la posibilidad de leer el hebreo más literalmente sin hacer explícito «como».
  - severity: medium
    issue: «Pasaron» debilita la imagen de flujo en הָלְכוּ dentro del contexto hídrico.
    rationale: Aunque literalmente el verbo es 'fueron/anduvieron', el propio expediente inglés explica que en contexto se refiere al fluir del agua. «Fluyeron» comunica mejor el movimiento acuoso y armoniza con «como un río».
  - severity: low
    issue: «Peña» es menos transparente que «roca» para un registro neutral panhispánico.
    rationale: «Peña» puede sonar más literario o regional; «roca» es más ampliamente claro y además coincide mejor con la decisión contextual inglesa sobre the rock del episodio del desierto.
  - severity: low
    issue: «Parajes secos» es algo más marcado que la formulación más simple y directa.
    rationale: «Lugares secos» preserva el sentido de בַּצִּיּוֹת sin añadir color estilístico innecesario y se acerca más al razonamiento auditado ('dry places').
  revised_spanish_text: Abrió la roca[a], y las aguas brotaron; fluyeron por los lugares secos como un río.
  revised_footnotes:
