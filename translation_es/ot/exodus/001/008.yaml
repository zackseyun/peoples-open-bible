    text: O «otro rey»; el adjetivo hebreo es literalmente «nuevo», pero algunos entienden que implica una dinastía o régimen diferente.
    reason: lexical_alternative
  - marker: b
    text: O «no reconocía a Yosef»; «conocer» puede incluir el sentido de reconocer o tomar en cuenta a alguien, no solo carecer de información sobre él.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal porque es fiel al hebreo y al rastro de auditoría en inglés. Solo se corrige la ubicación de los marcadores de nota para que cada alternativa léxica quede anclada a la palabra o frase correspondiente en el texto español.
