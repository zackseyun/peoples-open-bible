  to: No te será permitido comer dentro de tus puertas[a] el diezmo de tu grano, de tu vino nuevo y de tu aceite, ni los primogénitos de tu ganado o de tu rebaño, ni ninguno de tus votos que hagas, ni tus ofrendas voluntarias, ni la contribución de tu mano[b][c].
