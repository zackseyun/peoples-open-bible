    text: 'Hebreo: «levantaste» o «llevaste» la iniquidad de mi pecado; el verbo lleva la imagen de quitar una carga y por eso idiomáticamente significa «perdonaste».'
    reason: lexical_alternative
  revision_rationale: 'Se aprueba el texto base con una reparación puntual pero necesaria: eliminar la nota errónea sobre «te hice saber» y restaurar la nota correcta sobre «perdonaste», anclándola en el verbo correspondiente. Esto alinea el español con el hebreo, con el audit trail inglés y con la justificación teológica documentada, sin necesidad de rehacer la redacción principal.'
