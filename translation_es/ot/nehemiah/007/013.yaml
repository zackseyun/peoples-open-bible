lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la casa de
  lexicon: HALOT
  rationale: En listas genealógicas y censales del período posexílico, בְּנֵי introduce con frecuencia un grupo familiar o clan. En español, «los hijos de» conserva ese idiomatismo formal sin volverlo innecesariamente pesado; «los descendientes de» sería más interpretativo y amplio.
- source_word: זַתּוּא
  english_pob_choice: Zattu
  chosen_spanish: Zatú
  alternatives_spanish:
  - Zattu
  - Zatúu
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se usa una adaptación española breve y clara, manteniendo la referencia al nombre hebreo sin traducirlo.
- source_word: שְׁמֹנֶה מֵאוֹת אַרְבָּעִים וַחֲמִשָּׁה
  english_pob_choice: eight hundred forty-five
  chosen_spanish: ochocientos cuarenta y cinco
  alternatives_spanish:
  - ochocientos y cuarenta y cinco
  lexicon: HALOT
  rationale: La secuencia hebrea expresa 845. En español, la forma moderna sin «y» en las centenas mantiene el valor exacto y suena natural en una lista numérica.
