review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría del POB inglés: conserva la deíxis enfática de הִנֵּה, el estado resultante de הָיוּ, la imagen de קַשׁ como material fácilmente consumible, el fracaso de escapar de la llama, y el contraste entre una conflagración destructora y un fuego doméstico útil. Sin embargo, hay un desajuste menor en la última cláusula: «sentarse frente a él» suena algo forzado en español y puede sugerir referencia pronominal innecesaria, mientras que el hebreo/inglés apuntan a «sentarse delante» o «ante» el fuego de hogar.'
  spanish_quality_summary: 'El español es claro y mayormente natural. «Se han vuelto como rastrojo» y «el fuego los consume» funcionan bien. «De la mano de la llama» preserva con fidelidad la metáfora hebrea, aunque es una expresión marcada; aquí es aceptable por la viveza poética. El principal ajuste de legibilidad es sustituir «frente a él» por una formulación más idiomática y digna: «delante del cual sentarse».'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas clave concuerdan con el POB: «rastrojo» por כקש, «consume» por שׂרף, «librarse» por נצל, y «brasa» por גחלת. Se mantiene correctamente el contraste entre fuego consumidor y fuego útil para calentarse.'
  issues:
  - severity: medium
    issue: La frase «ni fuego para sentarse frente a él» es poco idiomática y algo torpe en español.
    rationale: Aunque formalmente cercana a «to sit before», en español bíblico-natural suena mejor «ni fuego delante del cual sentarse» o «ni fuego ante el cual sentarse». Esto refleja mejor נֶגְדּוֹ sin introducir un pronombre suelto de referencia ambigua.
  - severity: low
    issue: La nota al pie usa comillas y puntuación poco limpias al iniciar con una comilla simple antes de O.
    rationale: 'No afecta el sentido, pero conviene normalizarla a una formulación editorial más natural en español: «O: “He aquí”. ...».'
  revised_spanish_text: ¡Mira![a] Se han vuelto como rastrojo; el fuego los consume. No pueden librarse de la mano de la llama. No hay brasa para calentarse, ni fuego delante del cual sentarse.
  revised_footnotes:
