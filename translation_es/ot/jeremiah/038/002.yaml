review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mantiene Yahvé para יְהוָה, conserva la oposición entre permanecer en la ciudad y salir a los caldeos, y preserva la repetición de vivirá. También traduce correctamente נַפְשׁוֹ como ''vida'' en el modismo de supervivencia. Sin embargo, la nota al pie no corresponde al énfasis principal preservado por el POB inglés: allí la nota documenta la alternativa del modismo ''su vida como botín'', no una variante sobre ''por peste''.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. La frase principal se lee bien. No obstante, 'morirá a espada, de hambre y de peste' mezcla preposiciones de manera algo desigual; 'por la espada, por el hambre y por la peste' suena más uniforme y solemne en español bíblico moderno. Además, la nota actual introduce una explicación distinta de la auditada en inglés y desplaza una nota más importante.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ''Yahvé''; הַכַּשְׂדִּים -> ''caldeos''; נֶפֶשׁ -> ''vida'', no ''alma''. También se conserva el campo semántico de לְשָׁלָל con ''botín''. La única desalineación relevante está en la nota al pie: debe acompañar el modismo ''su vida ... como botín'' y no la tríada de juicio.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'espada' y explica 'peste', en vez de documentar el modismo 'su vida ... como botín'.
    rationale: El POB inglés preserva una nota léxica sobre נַפְשׁוֹ לְשָׁלָל ('his life as spoil/plunder'). La nota española actual cambia el foco de la evidencia auditada y omite la alternativa más significativa.
  - severity: low
    issue: La tríada 'a espada, de hambre y de peste' mezcla construcciones preposicionales.
    rationale: No es infiel, pero 'por la espada, por el hambre y por la peste' mejora la fluidez y da paralelismo formal más claro en español.
  revised_spanish_text: 'Así dice Yahvé: El que permanezca en esta ciudad morirá por la espada, por el hambre y por la peste; pero el que salga a los caldeos vivirá, y su vida le será como botín[a], y vivirá.'
  revised_footnotes:
  - marker: a
    text: O, «y tendrá su vida como botín/despojo»; modismo hebreo que significa que escapará con vida.
    reason: lexical_alternative
  revision_rationale: Se reubica y reescribe la nota para reflejar la decisión léxica principal auditada en inglés sobre נַפְשׁוֹ לְשָׁלָל, y se ajusta la tríada de juicio a una formulación más paralela y natural en español sin cambiar el sentido.
