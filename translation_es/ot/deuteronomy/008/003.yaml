revisions:
- from: Y te humilló, y te dejó tener hambre, y te alimentó[a] con el maná, que no conocías ni conocieron tus padres; para hacerte saber que no solo de pan vivirá el hombre[b], sino que el hombre vivirá de todo lo que sale de la boca de Yahvé.
  to: Y te humilló, y te dejó pasar hambre, y te alimentó con el maná, que no habías conocido, ni tus padres habían conocido; para hacerte saber que no solo de pan vivirá el hombre[a], sino que el hombre vivirá de toda palabra que sale de la boca de Yahvé[b].
  rationale: La revisión alinea el español con la decisión principal documentada por la POB para מוֹצָא פִי יְהוָה, poniendo «toda palabra que sale de la boca de Yahvé» en el texto y trasladando la opción más amplia a una nota. También corrige la nota mal anclada, conserva la nota inclusiva sobre «el hombre», y mejora la naturalidad con «te dejó pasar hambre». Se ajusta además «no habías conocido... habían conocido» para reflejar mejor la anterior falta de experiencia indicada en el hebreo y en la auditoría inglesa.
  reviewer_model: gpt-5.4
