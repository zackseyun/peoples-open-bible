revisions:
- from: El temor de Yahvé[a] es instrucción de sabiduría, y la humildad precede al honor.
  to: El temor de Yahvé[a] es instrucción en sabiduría, y la humildad precede al honor.
  rationale: Se hizo una reparación menor para mejorar la fidelidad idiomática al sintagma hebreo מוּסַר חָכְמָה y al razonamiento léxico del POB en inglés. 'Instrucción en sabiduría' comunica mejor que el temor de Yahvé instruye/forma en el ámbito de la sabiduría. También se normalizó la nota al pie para español más limpio, sin cambiar su contenido esencial.
