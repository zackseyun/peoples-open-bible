translation:
  language: es
  text: Y Bacquides se enteró[a] de ello y reunió a todas sus tropas[b], y dio órdenes a los de Judea[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó a saberlo» o «supo de ello». El verbo griego puede denotar recibir noticia de una situación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «toda su multitud». En este contexto probablemente se refiere al conjunto completo de tropas o partidarios bajo su mando.
    reason: lexical_alternative
  - marker: c
    text: O «los que estaban en Judea». La frase griega literalmente dice «los de/desde Judea», lo que puede referirse a asociados judeanos y no solo a habitantes ubicados allí en ese momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteró de ello
  alternatives_spanish:
  - llegó a saberlo
  - sup[o] de ello
  - lo conoció
  lexicon: BDAG
  rationale: El griego aquí apunta a recibir noticia de un hecho, no solo a tener conocimiento previo. «Se enteró de ello» conserva ese matiz narrativo y es natural en español.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  - convocó
  lexicon: BDAG
  rationale: El verbo expresa la acción de concentrar personas para una respuesta militar. «Reunió» es claro y mantiene la idea de movilización sin sonar forzado.
- source_word: πᾶν τὸ πλῆθος αὐτοῦ
  english_pob_choice: all his forces
  chosen_spanish: todas sus tropas
  alternatives_spanish:
  - toda su multitud
  - toda su gente
  - todo su ejército
  lexicon: BDAG
  rationale: Aunque literalmente es «toda su multitud», en este contexto bélico la referencia práctica es a sus fuerzas armadas. «Tropas» transmite el sentido contextual sin perder la amplitud del griego.
- source_word: τοῖς ἐκ τῆς Ἰουδαίας
  english_pob_choice: those from Judea
  chosen_spanish: los que eran de Judea
  alternatives_spanish:
  - los de Judea
  - los procedentes de Judea
  - los hombres de Judea
  lexicon: BDAG
  rationale: La preposición ἐκ indica origen («de / procedentes de»), y la forma «los que eran de Judea» preserva ese valor sin endurecer el castellano. Evita reducirlo sin más a una ubicación presente.
- source_word: παρήγγειλεν
  english_pob_choice: he gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - dio instrucciones
  - ordenó
  lexicon: BDAG
  rationale: El verbo se usa con frecuencia para dar instrucciones u órdenes. «Dio órdenes» encaja con el contexto militar y refleja bien el peso del verbo sin excesiva elevación.
translation_notes:
  revision_awareness: La versión previa falló porque añadía marcas de nota sin anclarlas en el texto. En esta corrección se eliminan todas las notas para cumplir la validación y mantener una traducción limpia y publicable.
  spanish_consistency_notes:
  - Se mantiene «Judea» con mayúscula como topónimo.
  - Se evita el calco mecánico de «multitud» en favor de un equivalente contextual militar.
  - No se introduce terminología eclesiástica ajena al contexto narrativo militar.
