translation:
  language: es
  text: El tercero fue Zaccur[a], sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en contexto, «el tercer lote cayó sobre Zaccur; sus hijos y sus hermanos eran doce». El sustantivo «lote» está implícito por los versículos circundantes y no se repite aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁלִשִׁי
  english_pob_choice: The third
  chosen_spanish: El tercero
  alternatives_spanish:
  - el tercer lote
  - tercero
  lexicon: HALOT
  rationale: El hebreo funciona como marcador ordinal en la secuencia de turnos/lotes del contexto. En español, «El tercero» conserva esa función listativa sin introducir explícitamente «lote» en el texto principal, porque el sustantivo está implícito en el contexto inmediato.
- source_word: זַכּוּר
  english_pob_choice: Zaccur
  chosen_spanish: Zakur
  alternatives_spanish:
  - Zaccur
  - Zakkur
  lexicon: HALOT
  rationale: Es nombre propio y se translitera. Se eligió «Zakur» para una forma española transparente y cercana a la pronunciación, sin perder identificabilidad con la tradición inglesa «Zaccur».
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: Aunque el inglés POB precisa «sons», en español «hijos» puede conservar la referencia filial del plural masculino sin sonar forzado; aquí el contexto genealógico ya fija el referente masculino, por lo que «sus hijos» es natural y fiel.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos de clan
  - y sus hermanos
  lexicon: HALOT
  rationale: «Hermanos» reproduce directamente אחים con sufijo de 3 ms. No se amplía a «parientes» ni se arcaíza con «hermanos»/«brethren», porque el grupo enumerado se mantiene literal y claro en español moderno.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - doce en total
  lexicon: HALOT
  rationale: El hebreo es nominal y no requiere verbo expreso. En español, dejar «doce» al final conserva la concisión contable del original y evita añadir una cópula no presente.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente añadió el verbo implícito «was» para fluidez y mantuvo la enumeración sin dos puntos. En español se siguió una solución equivalente: se conserva una lectura appositiva natural («fue Zakur...») sin explicitar «lote» en el cuerpo, pero dejando la alternativa contextual en nota para no perder la tensión lexical del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino ni una cita directa.
  - Se preservó el orden breve de lista y el remate numérico final, acorde con el estilo genealógico del pasaje.
  - No se usó «Cristo» ni terminología doctrinal, porque el versículo es puramente enumerativo.
