translation:
  language: es
  text: Ocozías, hijo de Ahab, llegó a ser rey sobre Israel en Samaria, en el año decimoséptimo de Josafat, rey de Judá, y reinó sobre Israel dos años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲחַזְיָהוּ בֶן אַחְאָב
  english_pob_choice: Ahaziah son of Ahab
  chosen_spanish: Ocozías, hijo de Ahab
  alternatives_spanish:
  - Ocozías, el hijo de Ahab
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma española usual y el patronímico con «hijo de», que reproduce con naturalidad el constructo hebreo sin añadir matices no presentes en el texto.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - se hizo rey
  - reinó
  lexicon: HALOT
  rationale: El qatal aquí introduce la entronización. «Comenzó a reinar» comunica el inicio del reinado de modo natural en español y mantiene la distinción entre acceso al trono y duración del gobierno.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - para Israel
  lexicon: HALOT
  rationale: La preposición עַל con מלך expresa dominio sobre un pueblo o reino; «sobre Israel» conserva esa relación de gobierno sin suavizarla.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición בְּ marca ubicación. «En Samaria» es la forma más directa y transparente en español.
- source_word: בִּשְׁנַת שְׁבַע עֶשְׂרֵה
  english_pob_choice: in the seventeenth year
  chosen_spanish: en el año diecisiete
  alternatives_spanish:
  - en el año decimoséptimo
  lexicon: HALOT
  rationale: Se conserva la fórmula cronológica regnal estándar. «En el año diecisiete» suena natural en español y preserva el valor de datación histórica.
- source_word: לִיהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: of Jehoshaphat king of Judah
  chosen_spanish: de Josafat, rey de Judá
  alternatives_spanish:
  - de Josafat, el rey de Judá
  lexicon: HALOT
  rationale: El lamed del sistema de fechación se expresa idiomáticamente con «de». La aposición «rey de Judá» identifica a Josafat sin cambiar la estructura de sincronismo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: and he reigned
  chosen_spanish: y reinó
  alternatives_spanish:
  - y comenzó a reinar
  - y ejerció el reinado
  lexicon: HALOT
  rationale: Tras la nota de acceso al trono, la forma narrativa resume la duración del reinado; «y reinó» es la equivalencia más natural y ajustada.
- source_word: שְׁנָתָיִם
  english_pob_choice: two years
  chosen_spanish: dos años
  alternatives_spanish:
  - durante dos años
  lexicon: HALOT
  rationale: La forma dual indica una duración de dos años. «Dos años» es la expresión española directa y fiel.
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del audit trail en inglés: conserva la fórmula regnal, la secuencia sintáctica del hebreo y las decisiones léxicas principales (מלך = acceso al reinado / reinó; עַל = sobre; בְּשֹׁמְרוֹן = en Samaria). No hubo revisiones aplicadas en el expediente inglés, por lo que no se introducen cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se usa «Ocozías» como forma española del nombre propio, coherente con el uso bíblico en español.
  - Se mantiene «Samaria» como topónimo y «Judá» con acentuación española estándar.
  - La oración conserva el paralelismo de sincronismo cronológico típico de las fórmulas regias hebreas.
  - No se añadió puntuación interpretativa ni elementos explicativos fuera de los requeridos por el texto.
