translation:
  language: es
  text: 'Habla a los hijos de Israel[a], diciendo: El día quince de este séptimo mes es la fiesta de las enramadas, durante siete días, para Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «la fiesta de los Tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo introduce una instrucción divina formal; «Habla» conserva el tono directo y solemne del mandato mejor que una paráfrasis como «Di».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial y formulaica. «Hijos de Israel» preserva la forma fuente sin neutralizarla, como hace la POB en inglés con «sons of Israel».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y di
  - diciendo
  lexicon: HALOT
  rationale: El infinitivo quotativo se vierte de forma natural en español con «diciendo», manteniendo la relación sintáctica con el mandato anterior.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: On the fifteenth day
  chosen_spanish: En el día quince
  alternatives_spanish:
  - El día quince
  - A los quince días
  lexicon: HALOT
  rationale: Se conserva la fórmula calendárica de modo claro y literal. «En el día quince» refleja bien la estructura hebrea sin sonar forzado en español.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי הַזֶּה
  english_pob_choice: of this seventh month
  chosen_spanish: de este séptimo mes
  alternatives_spanish:
  - del séptimo mes, este
  - de este, el séptimo mes
  lexicon: HALOT
  rationale: La posición natural en español es «de este séptimo mes», que conserva tanto el ordinal como el demostrativo «este» presentes en el hebreo.
- source_word: חַג
  english_pob_choice: Feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - festividad
  - fiesta
  lexicon: HALOT
  rationale: «Fiesta» comunica el carácter celebrativo y cultual de חַג en un español bíblico claro y actual, sin perder la solemnidad del término.
- source_word: הַסֻּכּוֹת
  english_pob_choice: Booths
  chosen_spanish: las cabañas
  alternatives_spanish:
  - las tiendas
  - las enramadas
  - las cabañas
  lexicon: HALOT
  rationale: סֻכּוֹת son refugios temporales; «cabañas» transmite la idea de estructuras simples y provisionales de manera comprensible en español. Se evita «Tabernáculos» como forma tradicional menos transparente.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: «Por siete días» expresa con naturalidad la duración del período festivo y conserva el valor temporal del hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar editorial español del proyecto para el nombre divino, usando «Yahvé»; la preposición «para» refleja la dedicación o pertenencia implícita en ל.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton; la pauta del proyecto pide traducirlo como «Yahvé» en el texto principal, preservando el nombre del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adaptado al español del proyecto como Yahvé)'
- issue: Nombre de la festividad סֻכּוֹת
  english_pob_reading: Feast of Booths
  chosen_spanish_reading: fiesta de las cabañas
  alternative_spanish_readings:
  - fiesta de los tabernáculos
  - fiesta de las enramadas
  rationale: La POB inglesa prioriza el sentido transparente de סֻכּוֹת frente al nombre tradicional; en español, «las cabañas» comunica mejor la imagen de refugios temporales, manteniendo el sentido fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'El contexto auditado muestra acuerdo alto y sin cambios de revisión en la fuente inglesa; el español sigue la misma decisión central: nombre divino explícito y traducción transparente de סֻכּוֹת, con nota tradicional para reconocimiento del lector.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se conserva una sintaxis bíblica clara y sobria, sin calcos innecesarios.
  - «Hijos de Israel» y «diciendo» siguen la estructura formulaica del hebreo.
  - La nota al pie ofrece la alternativa tradicional sin desplazar la traducción principal.
