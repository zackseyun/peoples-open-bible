translation:
  language: es
  text: y dispersarás[a] la necedad de tus razonamientos, y, adoptando una mente digna de tu edad, filosofarás[b] sobre la verdad de lo que es beneficioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dispersarás la necedad de tus pensamientos' o 'ahuyentarás la necedad de tus argumentos'.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego significa 'filosofar' o 'dedicarse a la reflexión filosófica'; la redacción conserva deliberadamente ese matiz, no solo 'pensar'.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποσκεδάσεις
  english_pob_choice: you will scatter
  chosen_spanish: dispersarás
  alternatives_spanish:
  - esparcirás
  - ahuyentarás
  - desbaratarás
  lexicon: LSJ
  rationale: El verbo griego expresa la idea de dispersar o hacer pedazos un conjunto; en español, 'dispersarás' conserva esa imagen sin sonar artificial. 'Esparcirás' es posible, pero puede sugerir una difusión más neutra.
- source_word: λῆρον
  english_pob_choice: nonsense
  chosen_spanish: necedad
  alternatives_spanish:
  - disparate
  - palabrería
  - insensatez
  lexicon: LSJ
  rationale: λῆρος indica habla o contenido necio, vacío o absurdo. 'Necedad' conserva el juicio despectivo del término y funciona bien en español junto con 'razonamientos'.
- source_word: λογισμῶν
  english_pob_choice: reasonings
  chosen_spanish: razonamientos
  alternatives_spanish:
  - pensamientos
  - argumentos
  - cálculos
  lexicon: LSJ
  rationale: λογισμός puede referirse a razonamiento, pensamiento o argumento. 'Razonamientos' mantiene el matiz intelectual y el vínculo con el vocabulario filosófico de 4 Macabeos.
- source_word: ἄξιον τῆς ἡλικίας
  english_pob_choice: worthy of your age
  chosen_spanish: digno de tu edad
  alternatives_spanish:
  - conforme a tu edad
  - apropiado para tu madurez
  - acorde con tu edad
  lexicon: LSJ
  rationale: La frase apunta a lo que corresponde al estadio vital de la persona. 'Digno de tu edad' sigue de cerca la estructura griega y conserva la idea de adecuación sin explicarla de más.
- source_word: ἀναλαβὼν νοῦν
  english_pob_choice: taking up a mind
  chosen_spanish: al haber tomado un entendimiento
  alternatives_spanish:
  - adoptando una mente
  - tomando sensatez
  - asumiendo un modo de pensar
  lexicon: LSJ
  rationale: ἀναλαβών es literalmente 'habiendo tomado'; νοῦς es mente/entendimiento/sensatez. 'Al haber tomado un entendimiento' preserva la imagen verbal y mantiene el tono elevado del original.
- source_word: φιλοσοφήσεις
  english_pob_choice: you will philosophize
  chosen_spanish: filosofarás
  alternatives_spanish:
  - razonarás
  - practicarás la filosofía
  - reflexionarás filosóficamente
  lexicon: LSJ
  rationale: El verbo expresa de manera explícita actividad filosófica. 'Filosofarás' retiene ese dictionario técnico que el texto usa intencionalmente.
- source_word: τὴν τοῦ συμφέροντος ἀλήθειαν
  english_pob_choice: the truth of what is beneficial
  chosen_spanish: la verdad de lo que es beneficioso
  alternatives_spanish:
  - la verdad de lo provechoso
  - la verdad de lo conveniente
  - la verdad de lo útil
  lexicon: LSJ
  rationale: συμφέρον significa lo útil, provechoso o beneficioso. 'Beneficioso' conserva la fuerza positiva y evita reducir el término a mera conveniencia pragmática.
theological_decisions:
- issue: Diction filosófica explícita
  english_pob_reading: Retain explicit philosophical diction ('reasonings,' 'mind,' 'philosophize')
  chosen_spanish_reading: Conservar el léxico filosófico ('razonamientos', 'entendimiento', 'filosofarás')
  alternative_spanish_readings:
  - Usar lenguaje moral general ('pensamientos', 'reflexionarás')
  - Suavizar la filosofía a exhortación ética
  rationale: 4 Macabeos presenta la piedad judía en categorías filosóficas. En español conviene preservar esa coloración para no diluir el perfil intelectual del pasaje.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
translation_notes:
  revision_awareness: El pasaje fue revisado y se reporta alta concordancia con el texto fuente; no se requirieron cambios sustanciales respecto del criterio auditado. La formulación española mantiene la tensión entre λῆρος como necedad/absurdo, λογισμοί como razonamientos, y φιλοσοφέω como filosofar.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el registro filosófico propio de 4 Macabeos sin convertirlo en mera exhortación devocional.
  - '''Entendimiento'' se usa para νοῦς para evitar la rusticidad de ''mente'' en esta construcción participial.'
  - La puntuación reproduce la sintaxis acumulativa del griego con coordinación clara en español.
