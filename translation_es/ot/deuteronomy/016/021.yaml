translation:
  language: es
  text: No plantes para ti una Asherah[a] de ningún tipo de árbol junto al altar de Yahvé tu Dios que hagas para ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poste de Aserá»; el hebreo אֲשֵׁרָה puede referirse a un objeto de culto asociado con la diosa Asherah, no solo a la diosa misma.
    reason: alternative_reading
  - marker: b
    text: Se conserva «Asherah» en transliteración para no decidir de antemano si el término nombra a la diosa, un objeto de culto o ambos en este contexto.
    reason: theological_note
lexical_decisions:
- source_word: תִטַּע
  english_pob_choice: plant
  chosen_spanish: plantes
  alternatives_spanish:
  - establezcas
  - pongas
  lexicon: HALOT
  rationale: נטע normalmente significa «plantar». En español, «plantes» conserva la imagen verbal y la fuerza prohibitiva del hebreo, mejor que una paráfrasis más general como «establezcas».
- source_word: אֲשֵׁרָה
  english_pob_choice: Asherah
  chosen_spanish: Asherah
  alternatives_spanish:
  - poste de Aserá
  - palo de Aserá
  - imagen de Aserá
  lexicon: HALOT
  rationale: Se conserva la transliteración para mantener la ambigüedad documentada entre deidad y objeto de culto. Así no se resuelve de antemano una tensión semántica que el hebreo deja abierta.
- source_word: כָּל עֵץ
  english_pob_choice: any kind of tree
  chosen_spanish: de ningún tipo de árbol
  alternatives_spanish:
  - de cualquier árbol
  - de toda clase de árbol
  lexicon: HALOT
  rationale: La construcción expresa una prohibición extensiva. «De ningún tipo de árbol» comunica bien el alcance de «כָּל עֵץ» y su vínculo apposicional con «Asherah».
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: «Junto a» es el equivalente natural y concreto de proximidad para una prohibición legal.
- source_word: מִזְבַּח
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: HALOT
  rationale: Término estándar y directo; no requiere variación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma posesiva de segunda persona se traduce de modo directo y reverente como «tu Dios».
- source_word: אֲשֶׁר תַּעֲשֶׂה לָּךְ
  english_pob_choice: that you make for yourself
  chosen_spanish: que tú te hagas para ti
  alternatives_spanish:
  - que hagas para ti
  - que tú hagas para ti
  lexicon: HALOT
  rationale: עָשָׂה es amplio («hacer»/«fabricar»/«construir»). En el contexto de un altar, «te hagas para ti» mantiene la referencia reflexiva y la cercanía al hebreo sin forzar «construir».
theological_decisions:
- issue: Cómo traducir אֲשֵׁרָה sin resolver el debate entre deidad y objeto cultual
  english_pob_reading: Retain 'Asherah' in transliteration, with 'any kind of tree' clarifying the cultic/tree reference.
  chosen_spanish_reading: Retener «Asherah» en transliteración, con «de ningún tipo de árbol» como aclaración contextual.
  alternative_spanish_readings:
  - poste de Aserá
  - imagen de Aserá
  - árbol sagrado
  rationale: La transliteración conserva la tensión textual y evita imponer una identificación única donde el hebreo permite más de una. La frase siguiente aclara el carácter arbóreo/cultual sin eliminar la ambigüedad.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «an Asherah, any kind of tree» a «an Asherah of any kind of tree» para reflejar mejor la construcción hebrea. En español se optó por «Asherah de ningún tipo de árbol» para conservar la relación sintáctica y evitar una aposición extraña.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la transliteración «Asherah» por consistencia con la decisión inglesa y para mantener la ambigüedad semántica.
  - «Tu Dios» mantiene el paralelismo de segunda persona singular del hebreo.
  - El orden sintáctico busca sonar natural en español sin perder la estructura legal del mandato.
