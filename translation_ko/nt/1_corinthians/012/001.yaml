theological_decisions:
- issue: 12장 은사 목록 — 각 은사를 한국어로 구분된 명사로 옮긴다
  chosen_reading: 지혜의 말씀 / 지식의 말씀 / 믿음 / 치유의 은사들 / 능력의 역사들 / 예언 / 영 분별 / 방언 / 방언 통역 — 각 은사에 한국어 정착 어휘를 일대일로 배정한다
  alternative_readings:
  - 모든 은사를 「은사」로 평탄화
  rationale: 본문이 9가지 은사를 명시적으로 열거하므로 한국어 본문도 명사 어휘를 구분해 옮긴다. 「방언(γλῶσσα)」은 한국 교회 정착 어휘를 따르되, γλῶσσα가 「언어」와 「방언」 두 의미를 가질 수 있음을 12:10, 12:28의 각주로 표시한다.
  doctrine_reference: 'METHODOLOGY.md: lexical distinctness in gift lists'
