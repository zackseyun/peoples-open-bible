translation:
  language: es
  text: Ahora bien, Naomi tenía un pariente de su marido[a], un hombre de gran valía[b], de la familia de Elimelec[c], y se llamaba Booz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "un conocido de su marido" o "un pariente"; el hebreo señala a alguien vinculado con el marido de Naomi, y el contexto aclara una conexión familiar sin especificar todavía una función legal posterior.
    reason: lexical_alternative
  - marker: b
    text: O "un hombre poderoso", "un hombre prominente" o "un hombre rico"; la expresión hebrea reúne ideas de fuerza, capacidad, estatus y sustancia.
    reason: lexical_alternative
  - marker: c
    text: O "del clan de Elimelec"; el hebreo puede referirse a un grupo familiar amplio o clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: מידע
  english_pob_choice: relative
  chosen_spanish: pariente
  alternatives_spanish:
  - familiar
  - consanguíneo
  - pariente cercano
  lexicon: HALOT
  rationale: El hebreo indica a alguien conectado con el esposo de Naomi; en español, "pariente" comunica bien esa relación sin adelantar todavía la función legal posterior de redentor pariente.
- source_word: לְאִישָׁהּ
  english_pob_choice: of her husband
  chosen_spanish: de su marido
  alternatives_spanish:
  - de su esposo
  - perteneciente a su marido
  lexicon: HALOT
  rationale: La relación se vincula al marido de Naomi, no a Naomi directamente. "De su marido" es natural y fiel al valor relacional del sintagma.
- source_word: אִישׁ גִּבּוֹר חַיִל
  english_pob_choice: a man of great worth
  chosen_spanish: un hombre de gran valía
  alternatives_spanish:
  - un hombre poderoso
  - un hombre de gran honor
  - un hombre valeroso
  lexicon: HALOT
  rationale: La expresión hebrea combina fuerza, capacidad, posición y sustancia; en este contexto no militar, "gran valía" conserva la amplitud elogiosa sin reducirla a valentía bélica o riqueza únicamente.
- source_word: מִמִּשְׁפַּחַת
  english_pob_choice: from the clan of
  chosen_spanish: de la familia de
  alternatives_spanish:
  - del clan de
  - del linaje de
  - de la parentela de
  lexicon: HALOT
  rationale: Aunque "clan" refleja el alcance más amplio de מִשְׁפָּחָה, en español "familia de" mantiene la apertura semántica y suena natural; el contexto narrativo permite esa amplitud sin necesidad de tecnicismo.
- source_word: וּשְׁמוֹ
  english_pob_choice: and his name was
  chosen_spanish: y se llamaba
  alternatives_spanish:
  - y su nombre era
  - y su nombre era Booz
  lexicon: HALOT
  rationale: En español narrativo, "se llamaba" es una forma idiomática y sobria para introducir un personaje, equivalente al valor introductorio del hebreo.
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Booz
  alternatives_spanish:
  - Boaz
  lexicon: transliteration convention
  rationale: Se adopta la transliteración castellana tradicional "Booz", ampliamente reconocible y compatible con una redacción bíblica en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando los marcadores de nota [a] y [b] directamente en el texto base, de modo que cada nota queda anclada a la palabra o frase correspondiente. No se modificó el sentido del verso respecto del paquete fuente y el auditor inglés; solo se ajustó la formulación española y la anclación de las notas.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo del hebreo: introducción de Naomi, relación con el marido, caracterización de Boaz y presentación nominal final.'
  - '"Familia" se usa con amplitud de grupo de parentesco, coherente con el valor posible de מִשְׁפָּחָה.'
  - No se emplea "Mesías", "Yahvé" ni terminología doctrinal no presente en el verso.
  - La transliteración de nombres propios sigue una forma reconocible en español bíblico, sin alterar la identidad del nombre.
