translation:
  language: es
  text: 'Y dijo Caín a Yahvé: «Mi iniquidad[a] es demasiado grande para soportarla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi culpa es demasiado grande para soportarla»; también puede entenderse: «Mi iniquidad es demasiado grande para perdonarla». Los términos hebreos pueden referirse a la culpa/iniquidad o a su castigo, y el verbo puede significar «soportar» o, en algunos contextos, «perdonar».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva introduce una acción sucesiva; en español, «Y dijo» conserva la secuencia del relato de manera natural y fiel.
- source_word: קַיִן
  english_pob_choice: Cain
  chosen_spanish: Caín
  lexicon: Convención estándar de nombres propios
  rationale: Se translitera el nombre propio con la forma española usual y reconocible.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición de dirección o destinatario se expresa naturalmente en español con «a» en el habla dirigida a una persona.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma base del proyecto, en vez de sustituirlo por un título. Esto mantiene la referencia personal al Tetragrámaton.
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi pecado
  - mi castigo
  lexicon: HALOT
  rationale: עוֹן puede abarcar iniquidad, culpa o incluso la carga de la consecuencia; el español «iniquidad» refleja el valor moral principal que la revisión inglesa recuperó, sin cerrar la ambigüedad total del término.
- source_word: מִנְּשֹׂא
  english_pob_choice: than I can bear
  chosen_spanish: demasiado grande para soportarla
  alternatives_spanish:
  - demasiado grande para llevarla
  - demasiado grande para cargar con ella
  - demasiado grande para perdonarla
  lexicon: HALOT
  rationale: El verbo נָשָׂא permite la idea de llevar, soportar y en algunos contextos perdonar. «Soportarla» comunica bien la carga insoportable en español; el pronombre retoma la carga implícita de «mi iniquidad» y mantiene la tensión semántica sin forzar una sola lectura.
theological_decisions:
- issue: Ambigüedad de עֲוֹן y del verbo נָשָׂא en la frase de Caín
  english_pob_reading: The English POB keeps 'my iniquity is too great to bear' and footnotes alternatives such as guilt, punishment, and forgive.
  chosen_spanish_reading: «Mi iniquidad es demasiado grande para soportarla»
  alternative_spanish_readings:
  - «Mi culpa es demasiado grande para soportarla»
  - «Mi castigo es demasiado grande para soportarlo»
  - «Mi iniquidad es demasiado grande para perdonarla»
  rationale: La línea se dirige a Yahvé tras el anuncio del juicio. En español, «iniquidad» preserva el peso moral del término y «soportarla» mantiene la imagen de una carga intolerable. Se deja constancia de las lecturas alternativas porque el hebreo permite referirse a la culpa, al castigo o incluso al perdón, y esa tensión no debe borrarse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción inglesa pasó de «my punishment is greater than I can bear» a «my iniquity is too great to bear» para reflejar más directamente עֲוֹן, sin eliminar la ambigüedad contextual. La versión española sigue esa revisión, manteniendo «iniquidad» en el texto principal y una nota que preserva las alternativas semánticas relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se evita sustituir la ambigüedad del hebreo por una sola interpretación doctrinal cerrada.
  - La puntuación y las comillas siguen el uso español moderno y legible para publicación.
