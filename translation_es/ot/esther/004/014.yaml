translation:
  language: es
  text: Porque si callas en este tiempo, alivio y liberación surgirán para los judíos de otro lugar; pero tú y la casa de tu padre perecerán. ¿Y quién sabe si has llegado a la realeza[a] para un tiempo como este?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «para tal tiempo como este».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Pero si
  lexicon: HALOT
  rationale: Mantiene la relación explicativa y condicional del hebreo. «Porque si» conserva mejor el arranque causal/explanatorio de כִּי con el valor hipotético de אִם.
- source_word: הַחֲרֵשׁ תַּחֲרִישִׁי
  english_pob_choice: you keep silent
  chosen_spanish: callas
  alternatives_spanish:
  - guardas silencio
  - permaneces completamente en silencio
  lexicon: HALOT
  rationale: El hebreo usa una intensificación verbal. En español, «callas» es breve y natural; la fuerza de la intensificación queda preservada por el contexto y por la solemnidad de la advertencia, sin forzar una repetición artificial.
- source_word: בָּעֵת הַזֹּאת
  english_pob_choice: at this time
  chosen_spanish: en este tiempo
  alternatives_spanish:
  - en este momento
  - en esta hora
  lexicon: HALOT
  rationale: «En este tiempo» reproduce bien la referencia a la coyuntura presente y suena más natural en español bíblico que una calca rígida.
- source_word: רֶוַח
  english_pob_choice: relief
  chosen_spanish: alivio
  alternatives_spanish:
  - respiro
  - respiro de alivio
  lexicon: HALOT
  rationale: En este contexto de peligro, el sustantivo expresa un descanso o desahogo frente a la amenaza. «Alivio» es un equivalente claro y digno en español.
- source_word: וְהַצָּלָה
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - rescate
  - salvación
  lexicon: HALOT
  rationale: El término alude a ser rescatado de la destrucción. «Liberación» preserva el peso de rescate sin cargarlo necesariamente con un sentido soteriológico más amplio que el inmediato del pasaje.
- source_word: יַעֲמֹד
  english_pob_choice: will arise
  chosen_spanish: surgirán
  alternatives_spanish:
  - se levantarán
  - vendrán
  lexicon: HALOT
  rationale: El verbo puede expresar emergencia o aparición efectiva. En español, el plural concuerda con el doble sujeto («alivio y liberación») y «surgirán» comunica bien que aparecerán desde otra fuente.
- source_word: לַיְּהוּדִים
  english_pob_choice: for the Jews
  chosen_spanish: para los judíos
  alternatives_spanish:
  - para los judeanos
  lexicon: HALOT
  rationale: En Ester, el referente es el pueblo judío en el imperio persa; «judíos» es claro y natural en español.
- source_word: מִמָּקוֹם אַחֵר
  english_pob_choice: from another place
  chosen_spanish: de otro lugar
  alternatives_spanish:
  - de otra parte
  - de algún otro sitio
  lexicon: HALOT
  rationale: Conserva la indeterminación del hebreo. «De otro lugar» es fiel y no explicita la fuente de ayuda, manteniendo la tensión providencial del texto.
- source_word: וְאַתְּ וּבֵית אָבִיךְ
  english_pob_choice: but you and your father's house
  chosen_spanish: pero tú y la casa de tu padre
  alternatives_spanish:
  - pero tú y tu familia paterna
  - pero tú y tu casa paterna
  lexicon: HALOT
  rationale: «Casa de tu padre» preserva la expresión kinship del hebreo. Se mantiene el paralelismo con la amenaza personal y familiar.
- source_word: תֹּאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - morirán
  lexicon: HALOT
  rationale: '«Perecerán» conserva el alcance de אבד: muerte, ruina o desaparición, sin estrechar el sentido.'
- source_word: וּמִי יוֹדֵעַ
  english_pob_choice: And who knows
  chosen_spanish: ¿Y quién sabe?
  alternatives_spanish:
  - ¿Y quién puede saber?
  - ¿Y quién lo sabe?
  lexicon: HALOT
  rationale: Reproduce el giro retórico con naturalidad en español y mantiene la apertura de la incertidumbre.
- source_word: אִם לְעֵת כָּזֹאת
  english_pob_choice: whether for a time like this
  chosen_spanish: para un tiempo como este
  alternatives_spanish:
  - para un tiempo como éste
  - para una ocasión como esta
  lexicon: HALOT
  rationale: La revisión inglesa situó la frase como modificador del acceso al reino. En español, «para un tiempo como este» conserva esa relación con la finalidad o adecuación providencial sin convertirla en una afirmación más explícita de lo que el hebreo dice.
- source_word: הִגַּעַתְּ
  english_pob_choice: you have attained
  chosen_spanish: has llegado
  alternatives_spanish:
  - has alcanzado
  - has llegado a
  lexicon: HALOT
  rationale: El verbo expresa alcanzar o llegar a una condición o posición. «Has llegado» resulta más natural en español y mantiene la idea de haber arribado a una situación real de realeza.
- source_word: לַמַּלְכֽוּת
  english_pob_choice: royalty
  chosen_spanish: al reino
  alternatives_spanish:
  - a la realeza
  - al trono
  lexicon: HALOT
  rationale: Aunque «realeza» sería posible, en este contexto la expresión puede entenderse como el estado o ámbito real al que Ester ha sido llevada. «Al reino» mantiene la amplitud y evita precisar en exceso el matiz.
theological_decisions:
- issue: Providencia implícita sin nombrar a Dios
  english_pob_reading: Preserve the indirect wording without making God explicit in the main text
  chosen_spanish_reading: Conservar la referencia indirecta a «otro lugar» y a «un tiempo como este», sin añadir a Dios en el texto principal
  alternative_spanish_readings:
  - de parte de Dios
  - por providencia divina
  rationale: El hebreo no nombra a Dios en este versículo, aunque lo sugiere fuertemente. La versión española mantiene esa tensión teológica y no resuelve la implicación con una explicitación ausente en el original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés de referencia fue revisado para que «for a time like this» modifique de manera más natural a «have attained royalty». La redacción española sigue esa misma relación, situando «para un tiempo como este» al final de la cláusula sobre haber llegado al reino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Judíos» traduce לַיְּהוּדִים conforme al uso contextual de Ester.
  - Se evitó «SEÑOR» o una explicitación de Dios porque el hebreo no lo dice en este versículo.
  - La puntuación conserva la cadencia solemne y el contraste entre advertencia y posibilidad providencial.
