theological_decisions:
- issue: Referent and subject relationships in the sanctuary profanation clause
  chosen_reading: The suffix in 'to profane it' refers to 'my sanctuary,' with 'my house' as an appositional restatement; the subject of 'and they broke' is the introduced foreigners.
  alternative_readings:
  - The suffix refers forward to 'my house'
  - The subject of 'and they broke' is still 'you' rather than the foreigners
  rationale: The immediate antecedent of the suffix is 'my sanctuary,' and 'my house' naturally restates the same sacred space for emphasis. The shift to 3mp in וַיָּפֵרוּ is best explained by making the foreigners the subject. This preserves the Hebrew grammar without smoothing over the change in person/number.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it without documentation
