    rationale: Aunque עֲלוּ es imperativo plural, el inglés auditado justificó «you may go up» para reflejar que José libera a los demás. En español, «suban» suena principalmente a orden; «pero ustedes pueden subir en paz» preserva mejor el contraste con el castigado y sigue siendo natural.
