    rationale: La nota [c] explica el plural hebreo de 'los mares', pero en el borrador aparece anclada después de 'naves'. Esto rompe la correspondencia exigida entre ancla y contenido de nota.
  - severity: low
    issue: '''será junto a la orilla de las naves'' suena poco natural y no refleja tan bien el paralelismo espacial'
