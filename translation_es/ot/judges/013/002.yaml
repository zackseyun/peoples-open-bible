    text: O «de Zorah». El hebreo indica origen o procedencia; aquí se usa la forma española «Zora».
    reason: lexical_alternative
  - marker: b
    text: 'O «y no había tenido hijos». El hebreo literalmente dice: «y no había dado a luz», sin objeto expreso.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta ''familia'' a ''clan'' para reflejar mejor מִשְׁפָּחָה según la justificación léxica documentada. También se corrige la nota sobre וְלֹא יָלָדָה para alinearla con la auditoría inglesa: se mantiene en el texto la formulación literal y natural ''no había dado a luz'', pero la nota expresa correctamente la alternativa contextual sin afirmar indebidamente que el hebreo excluye toda referencia a hijos.'
