translation:
  language: es
  text: 'Y sus hermanos[a], según las casas de sus padres[b]: Micael, Mesulam, Seba, Jorai, Jaacán, Zía[c] y Eber[d]—siete.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes»; el hebreo «hermanos» puede abarcar también parientes de clan en contextos genealógicos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por/según la casa de sus padres»; una designación de clan o de casa paterna.
    reason: cultural_note
  - marker: c
    text: Algunos traducen este nombre como «Ziza» debido a variación textual o de transliteración.
    reason: alternative_reading
  - marker: d
    text: «Eber» también puede traducirse «Heber» en la tradición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus deudos
  lexicon: HALOT
  rationale: «Hermanos» conserva el vínculo familiar y la estructura genealógica del hebreo; en este contexto puede abarcar también parientes de clan, por lo que la nota explica la amplitud posible sin perder la forma básica del texto.
- source_word: לְבֵית אֲבוֹתֵיהֶם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según las casas de sus padres
  alternatives_spanish:
  - por sus casas paternas
  - según sus casas ancestrales
  lexicon: HALOT
  rationale: La fórmula genealogía-patrimonial se expresa de manera natural en español con «casas de sus padres», preservando el sentido de agrupación por linaje paterno sin sobreexplicar en el texto principal.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Micael
  alternatives_spanish:
  - Miguel
  lexicon: transliteración convencional
  rationale: Se mantiene la forma del nombre propio según la tradición transliterada más cercana al hebreo en este contexto genealógico. «Miguel» sería una adaptación tradicional, pero introduce una forma española asociada a otro uso onomástico.
- source_word: וּמְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
  - Mesullam
  lexicon: transliteración convencional
  rationale: La transliteración española busca reflejar la consonancia hebrea de forma legible. Se evita la grafía inglesa con doble ll donde el español puede representarla con una sola consonante geminada no necesaria.
- source_word: וְשֶׁבַע
  english_pob_choice: Sheba
  chosen_spanish: Seba
  alternatives_spanish:
  - Sheba
  - Seba
  lexicon: HALOT
  rationale: El nombre se vierte como nombre propio dentro de la lista. «Seba» es una forma española clara y plausible; se conserva la opción de transliteración tradicional en nota si se requiere comparar con otras tradiciones.
- source_word: וְיוֹרַי
  english_pob_choice: Jorai
  chosen_spanish: Jorai
  alternatives_spanish:
  - Yorai
  - Jurai
  lexicon: transliteración convencional
  rationale: Se conserva una forma sencilla y pronunciable en español, consistente con el valor del nombre propio y la práctica de transliteración en listas genealógicas.
- source_word: וְיַעְכָּן
  english_pob_choice: Jachan
  chosen_spanish: Jaacán
  alternatives_spanish:
  - Jacán
  - Jaakán
  lexicon: transliteración convencional
  rationale: La forma española reproduce la estructura vocálica del nombre hebreo y mantiene la marca de nombre propio; el acento ayuda a la lectura española sin alterar la identidad del nombre.
- source_word: וְזִיעַ
  english_pob_choice: Zia
  chosen_spanish: Zía
  alternatives_spanish:
  - Zia
  - Ziza
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre según el Masorético, con acento gráfico para lectura española. La nota permite recordar la variante tradicional «Ziza» reconocida en la auditoría inglesa.
- source_word: וָעֵבֶר
  english_pob_choice: and Eber
  chosen_spanish: y Eber
  alternatives_spanish:
  - y Heber
  lexicon: HALOT
  rationale: Se mantiene la forma del nombre personal con transliteración española directa. La variante «Heber» se registra en nota como tradición alternativa, sin sustituir la lectura base adoptada.
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete
  lexicon: HALOT
  rationale: El cardinal resume el total de nombres de la lista. En español, la colocación final «siete» conserva el valor apposicional y la clausura de la enumeración.
theological_decisions:
- issue: Alcance de «hermanos» en un contexto genealógico
  english_pob_reading: ‘brothers’ can denote wider clan-relatives in genealogical contexts.
  chosen_spanish_reading: «Hermanos» en el cuerpo del texto, con nota sobre posible sentido ampliado de parientes de clan.
  alternative_spanish_readings:
  - parientes
  - deudos
  rationale: No hay necesidad de abandonar el término base del hebreo. La ambigüedad documentada se preserva con una nota para evitar que el lector piense solo en hermanos biológicos si el contexto tribal indica un alcance mayor.
  doctrine_reference: Uso semántico genealógico del hebreo bíblico; no doctrinal.
- issue: Fórmula de pertenencia tribal/paterna
  english_pob_reading: Literally 'by/according to their fathers’ houses,' a clan or paternal-household designation.
  chosen_spanish_reading: «según las casas de sus padres»
  alternative_spanish_readings:
  - por sus casas paternas
  - según sus casas ancestrales
  rationale: La expresión española comunica la organización social del texto sin convertirla en una paráfrasis sociológica. Se conserva el carácter técnico-genealógico de la fórmula.
  doctrine_reference: Antiguo Oriente / genealogía bíblica; no doctrinal.
translation_notes:
  revision_awareness: Este borrador sigue el packet hebreo WLC y la auditoría inglesa POB sin cambios relevantes; la revisión más reciente indicó alta concordancia y no introdujo enmiendas. Se han adaptado los nombres propios y la fórmula genealógica al español con transliteración legible y notas donde la tradición inglesa documenta variantes.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton según la terminología del proyecto, pero este versículo no lo contiene.
  - Se prefirió «Mesulam» y «Micael» como transliteraciones españolas legibles en lugar de las formas inglesas con grafías más opacas.
  - Se mantuvo el orden de la lista y el cierre numérico «siete» para reflejar la fuerza resumidora del hebreo.
