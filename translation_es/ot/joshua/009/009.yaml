  rationale: Se cambia «esclavos» por «siervos» para reflejar la auto-designación diplomática deferente documentada en el expediente inglés y evitar una sobrecarga semántica impropia en español. Se elimina la nota [a] sobre «muy distante» por innecesaria. Se conserva la nota sobre la construcción cognada de «hemos oído su fama», que sí está documentada y aporta valor exegético. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
