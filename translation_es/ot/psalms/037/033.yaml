  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: Yahvé como sujeto, protección del justo frente a la mano del impío, y el registro judicial de la segunda cola. Sin embargo, la nota c invierte la relación de alternativa léxica y debe corregirse para preservar fielmente el sentido documentado de יַרְשִׁיעֶנּוּ.'
  spanish_quality_summary: 'El texto principal en español es natural, claro y digno: «Yahvé no lo dejará en su mano, ni lo condenará cuando sea juzgado». La sintaxis y el registro son adecuados para un español bíblico moderno. Las notas a y b también son correctas. La única reparación necesaria está en la formulación de la nota c.'
  glossary_alignment: 'La terminología del proyecto está bien observada: יְהוָה → «Yahvé»; el lenguaje judicial de יַרְשִׁיעֶנּוּ / בְּהִשָּׁפְטוֹ se conserva con «condenará» / «sea juzgado». No hay conflicto relevante con los glosarios, salvo un error menor en una alternativa del expediente léxico («forsácará») que no afecta el texto principal, pero no exige adjudicación mayor.'
  issues:
  - severity: medium
    issue: La nota c está redactada al revés.
    rationale: 'El texto principal usa «lo condenará» y la alternativa documentada es «lo declarará culpable». La nota actual dice «O “lo declarará culpable” para “lo condenará”», pero en español de estas notas la formulación natural y precisa es «O “condenará” para “lo declarará culpable”» si el texto principal fuera la segunda opción, o mejor aún aquí: «O “lo declarará culpable” por “lo condenará”». Conviene dejar explícito que «lo declarará culpable» es alternativa a la expresión elegida «lo condenará».'
  revised_spanish_text: Yahvé no lo dejará en su mano[a][b], ni lo condenará cuando sea juzgado[c].
