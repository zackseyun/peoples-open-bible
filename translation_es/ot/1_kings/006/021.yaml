    text: O «delante del santuario interior». El hebreo puede describir cadenas colocadas frente al santuario interior; «a través del frente de» refleja el sentido probable con el verbo «hizo pasar».
    reason: alternative_reading
  - marker: c
    text: «Santuario interior» corresponde al debir, la cámara más interna del templo, llamada después el Lugar Santísimo.
    reason: cultural_note
  revision_rationale: 'Se ajusta la cláusula central para reflejar mejor la decisión fuente y del POB inglés: no solo cadenas ubicadas delante del debir, sino cadenas tendidas a través de su frente. Se mantiene la alternativa más abierta en nota. El resto del versículo puede permanecer igual porque preserva bien el hebreo y la terminología ya documentada.'
