translation:
  language: es
  text: Asael, el hermano de Joab, estaba entre los Treinta; Elhanán, hijo de Dodo[a], de Belén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijo de Dodo»; el paralelo en 1 Crónicas 11:26 lee «Dodai».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲשָׂה אֵל
  english_pob_choice: Asahel
  chosen_spanish: Asael
  alternatives_spanish:
  - Asahel
  lexicon: HALOT
  rationale: El nombre propio se transcribe al español como Asael, forma breve y reconocible en uso bíblico; se preserva la equivalencia con la forma inglesa apoyada por la ortografía consonántica del hebreo.
- source_word: אֲחִי יוֹאָב
  english_pob_choice: the brother of Joab
  chosen_spanish: el hermano de Joab
  alternatives_spanish:
  - hermano de Joab
  - Joab’s brother
  lexicon: HALOT
  rationale: La construcción de estado constructo expresa relación familiar directa. En español, 'el hermano de Joab' mantiene la relación y suena natural sin perder la estructura semántica del hebreo.
- source_word: בַּשְּׁלֹשִׁים
  english_pob_choice: among the Thirty
  chosen_spanish: entre los Treinta
  alternatives_spanish:
  - en los Treinta
  - uno de los Treinta
  lexicon: HALOT
  rationale: La preposición hebrea con el numeral definido indica pertenencia al grupo élite. 'Entre los Treinta' conserva la idea de inclusión grupal con fluidez en español.
- source_word: אֶלְחָנָן
  english_pob_choice: Elhanan
  chosen_spanish: Elhanán
  alternatives_spanish:
  - Elhanan
  lexicon: HALOT
  rationale: Se hispaniza el nombre propio con acento prosódico natural en español, sin alterar la identificación del personaje.
- source_word: בֶּן דֹּד֖וֹ
  english_pob_choice: son of Dodo
  chosen_spanish: hijo de Dodo
  alternatives_spanish:
  - hijo de Dodai
  lexicon: HALOT
  rationale: El texto masorético lee Dodo; se conserva esa lectura en el cuerpo principal. La variante Dodai queda documentada en nota por el testimonio paralelo de 1 Crónicas 11:26.
- source_word: בֵּית לָחֶם
  english_pob_choice: of Bethlehem
  chosen_spanish: de Belén
  alternatives_spanish:
  - belenita
  - de la aldea de Belén
  lexicon: HALOT
  rationale: El topónimo se traduce como Belén en español bíblico. 'De Belén' reproduce de manera transparente la relación de procedencia del hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios; se conserva su decisión principal de identificar a Asahel y de mantener la nota textual sobre la variante de 1 Crónicas 11:26. La adaptación española solo ajusta nombre propio, sintaxis y puntuación para lectura natural.
  spanish_consistency_notes:
  - Se mantiene 'Treinta' con inicial mayúscula para el nombre del grupo élite, en paralelo con el uso inglés.
  - No se armoniza con 1 Crónicas en el texto principal; la variante queda en nota para respetar el testimonio del MT.
  - '''Belén'' se usa como topónimo estándar, no como gentilicio interpretativo.'
