base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/019.yaml
  text: Do not let my enemies falsely rejoice over me[b][a], nor let those who hate me without cause wink the eye.
  footnotes:
  - marker: a
    text: Or 'my enemies falsely' / 'my lying enemies.' The Hebrew phrase is compact and may describe either enemies characterized by falsehood or enemies acting falsely toward the psalmist.
    reason: lexical_alternative
  - marker: b
    text: '''Wink the eye'' is a Hebrew idiom for making a malicious or conspiratorial signal, often expressing scorn or secret hostility.'
    reason: cultural_note
