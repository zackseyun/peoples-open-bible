    reason: alternative_reading
  revision_rationale: Se corrige el plural al singular para ajustarse al hebreo y al razonamiento léxico/theológico documentado. También se añade una nota al pie para explicar la personificación implícita y se mejora la naturalidad del español con «hasta mí».
