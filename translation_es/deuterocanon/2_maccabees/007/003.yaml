translation:
  language: es
  text: Entonces el rey se enfureció y ordenó que se calentaran sartenes y calderos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "que se pusieran al rojo vivo"; el verbo griego implica calentamiento por fuego, quizá de manera intensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκθύμως
  english_pob_choice: furious
  chosen_spanish: se enfureció
  alternatives_spanish:
  - con furia
  - airado
  - furioso
  lexicon: LSJ
  rationale: El adverbio expresa una intensidad vehemente de ira. En español, el verbo intransitivo "se enfureció" comunica bien el ingreso en ese estado con naturalidad y fuerza, sin debilitar el tono.
- source_word: γενόμενος
  english_pob_choice: became
  chosen_spanish: se enfureció
  alternatives_spanish:
  - llegó a estar furioso
  - habiéndose enfurecido
  - estuvo furioso
  lexicon: BDAG
  rationale: 'El participio tiene sentido ingresivo: el rey entra en un estado de ira. En español, "se enfureció" integra ese cambio de estado de manera idiomática.'
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el soberano
  lexicon: BDAG
  rationale: El griego usa el título simple "el rey"; no hay motivo para añadir una especificación política ausente del texto.
- source_word: προσέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: BDAG
  rationale: El verbo expresa una orden autoritativa. "Ordenó" es directo, natural y conserva la fuerza del mandato.
- source_word: τήγανα
  english_pob_choice: frying pans
  chosen_spanish: sartenes
  alternatives_spanish:
  - sartenes para freír
  - parrillas
  - planchas
  lexicon: LSJ
  rationale: El sustantivo designa utensilios de cocción/fritura. "Sartenes" es el equivalente moderno más claro en español; evita un término demasiado técnico o arcaico.
- source_word: λέβητας
  english_pob_choice: cauldrons
  chosen_spanish: calderos
  alternatives_spanish:
  - calderas
  - ollas grandes
  - potes
  lexicon: LSJ
  rationale: El término alude a recipientes metálicos grandes. "Calderos" conserva el tamaño e intensidad de la escena sin sonar demasiado doméstico.
- source_word: ἐκπυροῦν
  english_pob_choice: to be heated
  chosen_spanish: que se calentaran
  alternatives_spanish:
  - que se pusieran al fuego
  - que se pusieran al rojo vivo
  - que se calentaran intensamente
  lexicon: LSJ
  rationale: El infinitivo indica calentar por fuego, posiblemente con mucha intensidad. "Que se calentaran" es fiel y fluido; la nota deja abierta la posible intensidad sin sobreinterpretarla.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto español, unido a la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo "rey" para ὁ βασιλεύς, en continuidad con la lectura inglesa y sin introducir un título más específico.
  - Se evitó "SEÑOR" u otra terminología no pertinente; el versículo no contiene referencias al nombre divino.
  - '"Sartenes" y "calderos" conservan la imaginería concreta del listado de utensilios, acorde con el contexto de tortura del pasaje.'
