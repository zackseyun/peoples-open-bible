revisions:
- from: 'Y Yahvé le dijo[a]: «Desciende, y luego subirás tú y Aarón contigo. Pero los sacerdotes y el pueblo no deben romper[a] para subir a Yahvé, no sea que él irrumpa contra ellos».'
  to: 'Y Yahvé le dijo: «Baja, y sube tú, con Aarón contigo. Pero los sacerdotes y el pueblo no deben abrirse paso[a] para subir hacia Yahvé, no sea que él irrumpa contra ellos».'
  rationale: Se corrige la fuerza verbal de וְעָלִיתָ con «sube» para mantener la secuencia directiva del original. Se reemplaza «romper» por «abrirse paso», que expresa naturalmente יֶהֶרְסוּ en español y preserva la nota del POB sobre la imaginería relacionada con «irrumpa». Se ajusta el anclaje de la nota al lugar pertinente y se mejora la legibilidad general sin apartarse del hebreo ni del audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:25:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del versículo, conserva correctamente «Yahvé» para יְהוָה, distingue a Moisés/Aarón de «los sacerdotes y el pueblo», y mantiene la advertencia final de juicio divino. Sin embargo, hay dos problemas de fidelidad y naturalidad: (1) «desciende, y luego subirás» debilita la secuencia imperativa/injuntiva de לֶךְ רֵד וְעָלִיתָ y suena más predictivo que directivo; (2) «no deben romper para subir a Yahvé» no expresa bien יֶהֶרְסוּ לַעֲלֹת אֶל יְהוָה, porque en español falta el objeto o la idea de traspasar/abrirse paso, y además el marcador [a] está mal anclado solo en «romper» cuando la nota abarca la imagen verbal compartida.'
  spanish_quality_summary: 'El español es mayormente claro, pero «romper» sin complemento resulta poco idiomático y ambiguo. «Subir a Yahvé» es entendible, pero en esta construcción queda más natural «subir hacia Yahvé» o «subir adonde está Yahvé»; con todo, puede mantenerse «a Yahvé» por cercanía al POB si el verbo previo se corrige. «Y luego subirás» introduce un matiz temporal no explícito. Una redacción más natural y fiel sería: «Baja, y luego sube tú, con Aarón contigo. Pero los sacerdotes y el pueblo no deben abrirse paso[a] para subir hacia Yahvé, no sea que él irrumpa contra ellos».'
  glossary_alignment: Alineación buena con la política del proyecto en «Yahvé». No hay términos doctrinales problemáticos adicionales. La decisión del POB de preservar la imaginería emparentada break through / break out debe reflejarse en español con un par natural como «abrirse paso» / «irrumpir», mejor que «romper» / «irrumpir».
  issues:
  - severity: high
    issue: «subirás» suena predictivo más que mandatorio
    rationale: וְעָלִיתָ en esta secuencia tiene fuerza injuntiva tras los imperativos; en español bíblico natural conviene un imperativo coordinado («sube») o una formulación igualmente directiva, no un futuro simple que suena a predicción.
  - severity: high
    issue: «no deben romper» es español defectuoso para יֶהֶרְסוּ
    rationale: El hebreo expresa irrumpir o forzar el paso a través de un límite; «romper» sin complemento en español no comunica bien la idea y puede malentenderse. «Abrirse paso» o «irrumpir» expresa mejor la intrusión.
  - severity: medium
    issue: El marcador [a] está ubicado de forma imprecisa
    rationale: La nota explica una alternativa léxica y la imaginería compartida del verbo principal de intrusión; debe anclarse a la frase relevante corregida, no quedar sobre un «romper» poco natural.
  - severity: low
    issue: «luego» añade un matiz temporal no explícito
    rationale: La secuencia hebrea implica orden de acciones, pero «luego» puede sonar interpretativo. No es gravemente incorrecto, pero puede omitirse para mayor cercanía al original.
  revised_spanish_text: 'Y Yahvé le dijo: «Baja, y sube tú, con Aarón contigo. Pero los sacerdotes y el pueblo no deben abrirse paso[a] para subir hacia Yahvé, no sea que él irrumpa contra ellos».'
  revised_footnotes:
  - marker: a
    text: O «irrumpir»; el hebreo usa una imagen verbal relacionada tanto para la intrusión del pueblo como para la irrupción del juicio de Yahvé.
    reason: lexical_alternative
  revision_rationale: Se corrige la fuerza verbal de וְעָלִיתָ con «sube» para mantener la secuencia directiva del original. Se reemplaza «romper» por «abrirse paso», que expresa naturalmente יֶהֶרְסוּ en español y preserva la nota del POB sobre la imaginería relacionada con «irrumpa». Se ajusta el anclaje de la nota al lugar pertinente y se mejora la legibilidad general sin apartarse del hebreo ni del audit trail inglés.
