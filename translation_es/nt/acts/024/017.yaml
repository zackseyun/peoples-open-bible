translation:
  language: es
  text: Ahora, después de varios años, vine para traer limosnas[a] a mi nación y ofrendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ayuda caritativa». El término griego se refiere a dádivas para los necesitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ἐτῶν δὲ πλειόνων
  english_pob_choice: Now after several years
  chosen_spanish: Ahora, después de varios años
  alternatives_spanish:
  - Pero después de muchos años
  - Después de un número de años
  lexicon: BDAG
  rationale: διά con genitivo en expresión temporal indica un lapso transcurrido; δέ funciona como enlace leve. «Ahora» da fluidez discursiva natural en español sin cargar un contraste que el griego no exige. «Varios años» comunica πλειόνων de forma idiomática y sobria.
- source_word: ἐλεημοσύνας
  english_pob_choice: alms
  chosen_spanish: limosnas
  alternatives_spanish:
  - almosnas
  - donativos caritativos
  lexicon: BDAG
  rationale: ἐλεημοσύνη designa ayuda caritativa para necesitados, especialmente limosna/almosna en sentido bíblico. En español «limosnas» conserva el valor léxico directo y evita expandirlo interpretativamente como «donativos caritativos».
- source_word: ποιήσων
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - hacer
  - dar
  lexicon: BDAG
  rationale: Con ἐλεημοσύνας, ποιέω forma un giro idiomático equivalente a «hacer/dar limosnas»; en español, «traer» expresa naturalmente que Pablo las llevaba consigo para entregarlas en Jerusalén.
- source_word: εἰς τὸ ἔθνος μου
  english_pob_choice: to my nation
  chosen_spanish: a mi nación
  alternatives_spanish:
  - a mi pueblo
  - para mi pueblo
  lexicon: BDAG
  rationale: ἔθνος puede significar nación o pueblo. Aquí Pablo habla de su propio pueblo judío; «nación» mantiene mejor el impulso léxico de ἔθνος, como en la opción inglesa auditada.
- source_word: παρεγενόμην
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - llegué
  - me presenté
  lexicon: BDAG
  rationale: παραγίνομαι indica llegada/presencia. «Vine» es conciso, natural y suficientemente amplio para la autoafirmación de Pablo en este contexto.
- source_word: προσφοράς
  english_pob_choice: offerings
  chosen_spanish: ofrendas
  alternatives_spanish:
  - ofrendas sacrificiales
  - ofrendas a Dios
  lexicon: BDAG
  rationale: προσφορά refiere a ofrenda, a menudo cultual. «Ofrendas» preserva la amplitud del término sin especificar más de lo que el griego dice; el contexto del templo puede completar el sentido.
theological_decisions:
- issue: Relación entre ἐλεημοσύνας y la tradición de «alms»
  english_pob_reading: The Greek term refers to charitable gifts for the needy; English finally settled on 'alms' for lexical directness.
  chosen_spanish_reading: «Limosnas» conserva la fuerza léxica directa de ἐλεημοσύνας sin introducir una ampliación explicativa.
  alternative_spanish_readings:
  - misericordias
  - donativos para los pobres
  rationale: La cuestión es principalmente léxica, no doctrinal. En español, «limosnas» es el equivalente más directo y reconoce el matiz de ayuda a necesitados sin paraphraseo interpretativo.
  doctrine_reference: Translation philosophy §6 (claridad moderna con fidelidad léxica)
translation_notes:
  revision_awareness: El inglés auditado pasó de «gifts for the poor» a «alms» para evitar expansión interpretativa y reflejar con mayor directividad ἐλεημοσύνας. La versión española sigue esa revisión, eligiendo «limosnas» como equivalente léxico directo y manteniendo «ofrendas» para προσφοράς sin especificación adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Limosnas» se usa por su valor léxico directo y no como término eclesiástico ornamental.
  - «Ofrendas» conserva la amplitud cultual de προσφοράς sin añadir «sacrificiales».
  - 'La estructura española conserva el paralelismo de dos complementos: limosnas... y ofrendas.'
