revisions:
- from: Si un hombre se acuesta con una mujer y tiene una emisión de semen[a], ambos lavaránse en agua y serán impuros hasta el atardecer[b].
  to: Si un hombre se acuesta con una mujer y tiene una emisión de semen[a], ambos se lavarán en agua y serán impuros hasta la tarde[b].
  rationale: Se corrige 'lavaránse' a 'se lavarán' por gramática y naturalidad del español moderno. Se ajusta 'hasta el atardecer' a 'hasta la tarde' para reflejar con mayor cercanía עַד הָעָרֶב y el patrón levítico repetido, en línea con el inglés auditado 'until the evening'. Se pule la nota léxica para un español más natural sin cambiar su contenido.
