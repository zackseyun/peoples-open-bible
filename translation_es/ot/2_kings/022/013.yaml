base_translation:
  language: en
  yaml_path: translation/ot/2_kings/022/013.yaml
  text: Go[a], inquire of Yahweh for me, and for the people, and for all Judah[b], concerning the words of this book that has been found. For great is the wrath of Yahweh that has been kindled against us, because our fathers have not listened to the words of this book, to do according to all that is written concerning us.
  footnotes:
  - marker: a
    text: Or 'seek the LORD' or 'consult the LORD.' The Hebrew verb can denote seeking God generally or inquiring of him for guidance; here the context favors formal inquiry.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' Hebrew 'our fathers' is retained in the main text because the source is explicitly masculine and refers to the nation's forefathers.
    reason: lexical_alternative
