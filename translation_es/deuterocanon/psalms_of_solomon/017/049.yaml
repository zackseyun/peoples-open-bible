translation:
  language: es
  text: Sus palabras son como las palabras de santos[a] entre pueblos santificados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Santos» traduce el sustantivo griego ἁγίων en sentido personal; también puede entenderse como «los santos» o, de forma más explicativa, «personas santas», sin imponer necesariamente un título eclesiástico técnico.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ λόγοι αὐτοῦ
  english_pob_choice: His words
  chosen_spanish: Sus palabras
  alternatives_spanish:
  - Sus dichos
  - Sus expresiones
  lexicon: LSJ / BDAG
  rationale: λόγοι se refiere de manera directa a palabras o dichos; «palabras» es la opción más transparente y natural en español, y conserva el paralelismo del verso.
- source_word: ὡς
  english_pob_choice: are like
  chosen_spanish: son como
  alternatives_spanish:
  - son como si fueran
  - son semejantes a
  lexicon: LSJ
  rationale: La partícula introduce comparación, no identidad. «Son como» expresa la semejanza de forma clara y fiel al griego.
- source_word: λόγοι ἁγίων
  english_pob_choice: the words of holy ones
  chosen_spanish: las palabras de seres santos
  alternatives_spanish:
  - las palabras de santos
  - las palabras de los santos
  lexicon: LSJ / BDAG
  rationale: ἁγίων funciona sustantivamente, refiriéndose a personas santas. En español, «seres santos» evita restringir de entrada a una categoría eclesiástica fija y mantiene el valor personal del sustantivo.
- source_word: ἐν μέσῳ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - en medio entre
  lexicon: LSJ
  rationale: El sentido espacial-relacional de ἐν μέσῳ puede expresarse naturalmente como «entre» en español, preservando la idea de estar en un grupo sin forzar un calco.
- source_word: λαῶν ἡγιασμένων
  english_pob_choice: sanctified peoples
  chosen_spanish: pueblos santificados
  alternatives_spanish:
  - pueblos consagrados
  - pueblos hechos santos
  - un pueblo santificado
  lexicon: LSJ / BDAG
  rationale: El plural λαῶν se conserva con «pueblos». ἡγιασμένων conserva el matiz verbal de haber sido hechos santos o consagrados; «santificados» lo refleja mejor que una simple adjetivación estática.
theological_decisions:
- issue: Cómo traducir ἁγίων sin imponer una lectura eclesiástica específica
  english_pob_reading: holy ones
  chosen_spanish_reading: seres santos
  alternative_spanish_readings:
  - santos
  - los santos
  rationale: El inglés POB eligió «holy ones» para evitar un término demasiado confesional o técnico. En español, «seres santos» mantiene esa apertura semántica y el valor sustantivo del griego sin convertirlo automáticamente en un tecnicismo litúrgico.
  doctrine_reference: Terminología bíblica de los santos/los consagrados; evitar sobre-especificación confesional donde el texto no la exige.
- issue: Preservación del plural en λαῶν ἡγιασμένων
  english_pob_reading: sanctified peoples
  chosen_spanish_reading: pueblos santificados
  alternative_spanish_readings:
  - un pueblo santificado
  - gentes santificadas
  rationale: El griego está en plural y la POB inglesa también lo conserva. Por eso se mantiene «pueblos» en plural para no suavizar una posible pluralidad étnica o colectiva que el texto deja abierta.
  doctrine_reference: Pluralidad de pueblos/naciones en la tradición bíblica; fidelidad morfológica al plural griego.
translation_notes:
  revision_awareness: La base inglesa revisó «in the midst of» a «among» por naturalidad. En español, «entre» conserva bien el mismo matiz relacional y evita una expresión más pesada como «en medio de», manteniendo la fidelidad al griego ἐν μέσῳ. No se siguió una traducción mecánica del inglés; se consultó el original griego y se preservó el plural de λαῶν.
  spanish_consistency_notes:
  - Se mantiene «santificados» para ἡγιασμένων, alineado con el valor verbal del participio y con la decisión inglesa de no rebajar el matiz a un simple adjetivo.
  - Se evita «SEÑOR» o lenguaje de nombre divino porque este versículo no contiene el tetragrámaton ni κύριος.
  - «Palabras» se usa de forma consistente para λόγοι, dado que el verso repite el sustantivo y favorece el paralelismo.
