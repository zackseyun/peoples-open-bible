review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa del hebreo: ''has amado'' para אָהַבְתָּ, ''el mal'' frente a ''el bien'', y ''la falsedad'' frente a ''hablar…''. También conserva correctamente ''Selah''. Sin embargo, la frase ''hablar rectitud'' no es español natural y no expresa con claridad la relación de צֶדֶק con el acto de hablar. El sentido fuente es ''hablar justicia/rectitud'' o, más idiomáticamente, ''hablar con rectitud'' o ''hablar lo recto''.'
  spanish_quality_summary: 'La redacción general es clara, pero ''la falsedad más que hablar rectitud'' suena forzada y poco idiomática en español eclesial general. Una reparación mínima mejora mucho la legibilidad sin apartarse del hebreo: ''la falsedad más que hablar con rectitud''.'
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. La decisión de usar 'rectitud' para צֶדֶק es defendible en este contexto de habla ética. 'La falsedad' preserva bien el valor abstracto de שֶׁקֶר. La nota actual, sin embargo, mezcla alternativas para dos términos y no refleja exactamente la nota inglesa, que contrasta 'falsehood' con 'speaking what is right'. Conviene ajustar la nota para conservar esa alternativa de forma más limpia.
  issues:
  - severity: medium
    issue: '''hablar rectitud'' es poco natural en español'
    rationale: Aunque calca de cerca el hebreo, en español moderno suena defectuoso. El sentido se preserva mejor con 'hablar con rectitud' o 'hablar lo recto'.
  - severity: low
    issue: La nota al pie no corresponde exactamente al alcance de la nota inglesa
    rationale: 'La nota inglesa ofrece la alternativa de frase completa: ''lies more than speaking what is right''. La nota española actual añade ''engaño'' y separa alternativas léxicas de manera menos precisa. Puede simplificarse para reflejar mejor la alternativa relevante.'
