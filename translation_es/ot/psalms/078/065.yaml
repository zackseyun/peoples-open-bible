translation:
  language: es
  text: Entonces Yahvé despertó como quien sale del sueño[a], como un guerrero que grita por efecto del vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un guerrero que se exalta por efecto del vino» o «como un hombre poderoso que grita por efecto del vino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַץ
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - despertó de su sueño
  lexicon: HALOT
  rationale: יקץ expresa despertar o salir del sueño; «despertó» es natural en español y conserva la imagen sin añadir explicación.
- source_word: כְּיָשֵׁן
  english_pob_choice: as from sleep
  chosen_spanish: como de un sueño
  alternatives_spanish:
  - como si durmiera
  - como un durmiente
  lexicon: HALOT
  rationale: La comparación con כ exige mantener el símil. «Como de un sueño» comunica que no se afirma literalmente que Dios durmiera.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: אֲדֹנָי es un título divino; en español, «el Señor» reproduce el sentido titular sin usar el Tetragrámaton, que no está aquí en el hebreo.
- source_word: כְּגִבּוֹר
  english_pob_choice: like a warrior
  chosen_spanish: como un guerrero
  alternatives_spanish:
  - como un hombre poderoso
  - como un héroe
  lexicon: HALOT
  rationale: גִבּוֹר denota un hombre fuerte o guerrero; «guerrero» mantiene la imaginería bélica del verso.
- source_word: מִתְרוֹנֵן
  english_pob_choice: shouting
  chosen_spanish: que grita
  alternatives_spanish:
  - que exclama
  - que lanza un grito
  - que prorrumpe en gritos
  lexicon: HALOT
  rationale: La forma reflexiva/intensiva comunica una voz fuerte o un clamor; «que grita» es claro y directo en español.
- source_word: מִיָּיִן
  english_pob_choice: because of wine
  chosen_spanish: por el vino
  alternatives_spanish:
  - a causa del vino
  - debido al vino
  - desde el vino
  lexicon: HALOT
  rationale: מן aquí expresa causa u ocasión; «por el vino» es breve y natural, y conserva la ambigüedad poética del hebreo mejor que una explicación más larga.
theological_decisions:
- issue: Antropomorfismo de Dios despertando y comparándose con un guerrero ebrio o animado por el vino
  english_pob_reading: Retain the simile as poetic anthropomorphic imagery without softening it.
  chosen_spanish_reading: Mantener el símil poético y antropomórfico sin atenuarlo ni explicarlo.
  alternative_spanish_readings:
  - Parafrasear para evitar antropomorfismo
  - Interpretar el vino de modo no literal
  rationale: El hebreo usa una imagen fuerte para describir la intervención decisiva de Yahvé tras parecer inactivo. La traducción debe conservar esa tensión literaria y teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto principal. No se alteró el sentido base del verso ni la tensión poética documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «el Señor» para אֲדֹנָי, no «Yahvé», porque el hebreo aquí contiene el título אדני y no el Tetragrámaton.
  - Se mantuvo la imagen verbal completa sin suavizar el antropomorfismo.
  - La nota [a] ofrece alternativas semánticas cercanas para מִתְרוֹנֵן y מִיָּיִן sin introducir una lectura doctrinal nueva.
