translation:
  language: es
  text: Hizo una cubierta para la tienda de pieles de carneros teñidas de rojo, y una cubierta de cuero fino[a] por encima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo תְּחָשִׁים es incierto; posibles traducciones incluyen ‘pieles de vaca marina’, ‘pieles de marsopa’, ‘pieles de dugongo’ o, tradicionalmente, ‘pieles de tejón’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada en secuencia. En español, ‘hizo’ transmite el sentido verbal directo y natural sin añadir elementos no presentes en el hebreo.
- source_word: מִכְסֶה
  english_pob_choice: a covering
  chosen_spanish: una cubierta
  alternatives_spanish:
  - una cobertura
  - un recubrimiento
  lexicon: HALOT
  rationale: El sustantivo designa una capa o cubierta protectora. ‘Cubierta’ suena natural en español y conserva la idea material de una capa colocada sobre otra.
- source_word: לָאֹהֶל
  english_pob_choice: for the tent
  chosen_spanish: para la tienda
  alternatives_spanish:
  - para la tienda de reunión
  - para el tabernáculo
  lexicon: HALOT
  rationale: אֹהֶל significa literalmente ‘tienda’. ‘Tienda’ refleja la primacía del término hebreo; ‘tabernáculo’ sería una interpretación contextual menos literal.
- source_word: עֹרֹת אֵלִים מְאָדָּמִים
  english_pob_choice: of ram skins dyed red
  chosen_spanish: de pieles de carneros teñidas de rojo
  alternatives_spanish:
  - de pieles de carneros rojas
  - de cueros de carneros teñidos de rojo
  lexicon: HALOT
  rationale: עֹרֹת son pieles/hides; אֵלִים son carneros; מְאָדָּמִים indica que fueron enrojecidas o teñidas de rojo. ‘Pieles de carneros teñidas de rojo’ preserva el material y el matiz resultativo sin forzar una identificación más específica.
- source_word: וּמִכְסֵה
  english_pob_choice: and a covering
  chosen_spanish: y una cubierta
  alternatives_spanish:
  - y otra cubierta
  - y una segunda cubierta
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo sin añadir ‘segunda’. Mantener ‘una cubierta’ conserva la repetición simple del original.
- source_word: עֹרֹת תְּחָשִׁים
  english_pob_choice: of fine leather
  chosen_spanish: de cuero fino
  alternatives_spanish:
  - de pieles finas
  - de cuero de tejas?
  - de pieles de animal no identificado
  lexicon: HALOT
  rationale: תְּחָשִׁים es léxicamente incierto. Siguiendo la cautela del POB en inglés, ‘cuero fino’ comunica una cubierta exterior durable sin elegir una especie animal especulativa; la nota preserva las alternativas tradicionales.
- source_word: מִלְמָעְלָה
  english_pob_choice: above
  chosen_spanish: por encima
  alternatives_spanish:
  - arriba
  - encima
  lexicon: HALOT
  rationale: La frase indica la posición superior de la segunda cubierta. ‘Por encima’ es claro en español y refleja la relación espacial sin añadir ‘eso’ o ‘lo anterior’ no expresados en el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo: conserva la secuencia verbal, el paralelismo de dos cubiertas y la cautela léxica para תְּחָשִׁים. Se ajustó la nota para anclarla correctamente en el texto mediante [a].'
  spanish_consistency_notes:
  - Se mantuvo ‘tienda’ para אֹהֶל, en vez de ‘tabernáculo’, para respetar la forma léxica hebrea.
  - Se evitó ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
  - Se prefirió ‘cuero fino’ como solución cauta para תְּחָשִׁים, en línea con la decisión inglesa de no identificar un animal específico.
  - La preposición final ‘por encima’ refleja מִלְמָעְלָה sin añadir un referente explícito que el hebreo no da.
