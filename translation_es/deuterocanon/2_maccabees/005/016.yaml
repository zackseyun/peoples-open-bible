    issue: «arrastraba» omite el matiz de remoción en συνσύρων
    rationale: El participio griego no solo indica arrastrar, sino arrastrar fuera o llevarse violentamente. En español, «arrastraba» solo puede sugerir el modo, pero no el hecho de llevárselo. «Arrastraba consigo» conserva ambas ideas sin añadir demasiado.
  - severity: low
