    rationale: El hebreo אֲשֶׁר בָּא מִיהוּדָה identifica al hombre de Dios como el que vino de Judá; en español, «que vino de Judá» basta y evita una acumulación pesada de tiempos compuestos.
  revised_spanish_text: 'Y su padre les dijo: «¿Por qué camino se fue?» Porque sus hijos habían visto el camino por el que se fue el hombre de Dios, que vino de Judá.'
  revision_rationale: Se revisa la pregunta para expresar de manera más idiomática la identificación de la ruta, y se simplifica la cláusula relativa final para conservar el sentido de procedencia sin sobrecargar el verso con pluscuamperfectos. La revisión preserva la repetición significativa de «camino» y mantiene la secuencia temporal explicativa.
