translation:
  language: es
  text: Aunque es una, puede hacerlo todo, y permaneciendo en sí misma renueva[a] todas las cosas; y pasando a almas santas[b] de generación en generación, las hace amigos de Dios y profetas;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace nuevas todas las cosas». El verbo griego puede significar renovar o hacer nuevo.
    reason: lexical_alternative
  - marker: b
    text: O «entrando en almas santas». El participio describe el movimiento de la Sabiduría hacia sucesivas almas santas a lo largo de las generaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: μία
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - sola
  - única
  lexicon: LSJ
  rationale: «Una» preserva la predicación breve sobre la unidad/singuralidad de Sabiduría sin añadir una idea de aislamiento que el griego no exige.
- source_word: πάντα δύναται
  english_pob_choice: can do all things
  chosen_spanish: puede hacerlo todo
  alternatives_spanish:
  - puede hacer todas las cosas
  - es capaz de todo
  lexicon: LSJ
  rationale: La frase comunica capacidad universal de manera natural en español. «Hacerlo todo» evita una formulación rígida y mantiene el alcance de πάντα.
- source_word: μένουσα ἐν αὐτῇ
  english_pob_choice: remaining in herself
  chosen_spanish: permaneciendo en sí misma
  alternatives_spanish:
  - abideciendo en sí misma
  - quedando en sí misma
  lexicon: LSJ
  rationale: «Permaneciendo» conserva el participio de duración y el matiz de continuidad; «en sí misma» refleja el valor reflexivo de αὐτῇ en este contexto personificado.
- source_word: τὰ πάντα καινίζει
  english_pob_choice: she renews all things
  chosen_spanish: renueva todas las cosas
  alternatives_spanish:
  - hace nuevas todas las cosas
  - renueva todo
  lexicon: LSJ
  rationale: «Renueva» es el equivalente directo de καινίζει. «Todas las cosas» mantiene el alcance de τὰ πάντα sin restringirlo a un solo ámbito.
- source_word: κατὰ γενεὰς
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - a través de las generaciones
  - en cada generación
  lexicon: LSJ
  rationale: Es la locución idiomática estándar en español para una acción repetida a lo largo de sucesivas generaciones.
- source_word: εἰς ψυχὰς ὁσίας μεταβαίνουσα
  english_pob_choice: passing into holy souls
  chosen_spanish: pasando a almas santas
  alternatives_spanish:
  - entrando en almas santas
  - pasando a personas santas
  lexicon: LSJ
  rationale: «Pasando a» reproduce el movimiento de μεταβαίνουσα sin sobreexplicar el mecanismo. «Almas» conserva ψυχὰς de manera explícita, y «santas» mantiene ὁσίας.
- source_word: φίλους θεοῦ
  english_pob_choice: friends of God
  chosen_spanish: amigas de Dios
  alternatives_spanish:
  - amigos de Dios
  - amigos de Dios y profetas
  lexicon: LSJ
  rationale: En concordancia con la personificación femenina de Sabiduría y del grupo precedente de «almas», «amigas» evita un masculino genérico innecesario. La relación de amistad con Dios se mantiene sin alterar el sentido.
- source_word: προφήτας
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - vaticinadores
  lexicon: LSJ
  rationale: «Profetas» es el equivalente normal y fiel para προφήτας, sin necesidad de un giro interpretativo.
- source_word: κατασκευάζει
  english_pob_choice: makes them
  chosen_spanish: las hace
  alternatives_spanish:
  - las prepara
  - las forma
  lexicon: LSJ
  rationale: En este contexto, el verbo expresa que Sabiduría las constituye en amigas de Dios y profetas. «Las hace» recoge bien ese valor causativo y evita una traducción demasiado débil como «prepara».
theological_decisions:
- issue: Personificación femenina de Sabiduría
  english_pob_reading: Use feminine pronouns for Wisdom ('she')
  chosen_spanish_reading: Mantener la personificación femenina con «una» y el femenino implícito en el verbo
  alternative_spanish_readings:
  - repetir «Sabiduría»
  - usar un impersonal
  rationale: El griego presenta a Sabiduría como sujeto femenino singular; el español puede mantener esa textura literaria sin explicitar constantemente el sustantivo. No se neutraliza la personificación.
  doctrine_reference: Transparencia al texto original; preservar la personificación poética sin resolverla teológicamente.
- issue: Relación entre «almas santas», «amigas de Dios» y «profetas»
  english_pob_reading: '''holy souls'' ... ''makes them friends of God and prophets'''
  chosen_spanish_reading: Conservar «almas santas» y entender que Sabiduría las hace amigas de Dios y profetas
  alternative_spanish_readings:
  - «personas santas»
  - «gente santa»
  rationale: «Almas» reproduce ψυχὰς y conserva el registro sapiencial-antropológico del griego. El relativo cambio a «amigas» y no solo «amigos» sigue la referencia femenina de Sabiduría y no altera la estructura semántica.
  doctrine_reference: Primacía del idioma original; mantener tensiones léxicas cuando el griego es explícito.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés, que cambió la idea de «prepares» a una causación más directa («makes them»). En español se reflejó con «las hace», manteniendo la lectura adjudicada como más precisa para κατασκευάζει.
  spanish_consistency_notes:
  - Se mantuvo «Sabiduría» implícita por la continuidad del contexto, pero el texto funciona como enunciado autónomo con sujeto femenino implícito.
  - Se evitó «Señor» u այլ sustituciones reverenciales, ya que el pasaje no contiene el Tetragrámaton ni κύριος en función de nombre divino.
  - La elección de «almas» conserva el sustantivo griego ψυχὰς, sin convertirlo en «personas», para no aplanar el registro sapiencial.
