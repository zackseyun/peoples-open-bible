translation:
  language: es
  text: Nabucodonosor también llevó algunos de los utensilios de la casa de Yahvé a Babilonia, y los puso en su templo[a] en Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palacio», pues la palabra hebrea puede referirse a un templo o a un palacio según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/כְּלֵי
  english_pob_choice: also brought some of the vessels
  chosen_spanish: también llevó algunos de los utensilios
  alternatives_spanish:
  - y llevó algunos de los vasos
  - y llevó algunos de los objetos
  - y tomó algunos de los utensilios
  lexicon: HALOT
  rationale: El hebreo combina un prefijo conjuntivo/aditivo con una idea partitiva; en español conviene expresar ambas cosas de forma natural con «también» y «algunos de». «Utensilios» conserva el sentido de objetos del servicio del templo sin estrecharlo innecesariamente.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: «Casa de Yahvé» reproduce de cerca la expresión hebrea בֵּית יְהוָה y mantiene el término preferido para el nombre divino en esta serie. «Templo» sería posible, pero la frase hebrea concreta habla de la casa, no solo del edificio cultual en sentido técnico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración directa, conforme a la convención del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma española estándar elegida para el Tetragrámaton.
- source_word: הֵבִיא
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - transportó
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede traducirse «trajo» o «llevó», aquí el movimiento es desde Jerusalén hacia Babilonia; en español «llevó» resulta más natural para el punto de llegada del objeto.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezar
  lexicon: convención onomástica
  rationale: Se usa la forma tradicional y ampliamente reconocible del nombre en español bíblico. La transliteración más técnica sería menos idiomática para lectores generales.
- source_word: לְ/בָבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - en Babilonia
  lexicon: HALOT
  rationale: La lamed direccional expresa destino; «a Babilonia» comunica con claridad el traslado.
- source_word: וַ/יִּתְּנֵם
  english_pob_choice: and put them
  chosen_spanish: y los puso
  alternatives_spanish:
  - y los colocó
  - y los depositó
  - y los dejó
  lexicon: HALOT
  rationale: נתן en este contexto significa poner o colocar los objetos en un lugar. «Los puso» es la solución española más directa y sobria.
- source_word: בְּ/הֵיכָל/וֹ
  english_pob_choice: in his temple
  chosen_spanish: en su templo
  alternatives_spanish:
  - en su palacio
  - en su edificio real
  - en su santuario
  lexicon: HALOT
  rationale: Se mantiene «templo» porque el contexto de vasos sagrados sugiere un edificio de culto. El sufijo posesivo se conserva como «su», refiriéndolo a Nabucodonosor, tal como hace el análisis auditado.
- source_word: בְּ/בָבֶל
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - dentro de Babilonia
  lexicon: HALOT
  rationale: La repetición locativa final se vierte de modo simple y natural. Se conserva la mención explícita del lugar tanto de destino como de depósito.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; por coherencia con la política del proyecto, no se oculta tras un sustituto litúrgico. «Yahvé» mantiene la referencia al nombre personal del Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de הֵיכָל en relación con el edificio de Nabucodonosor
  english_pob_reading: his temple
  chosen_spanish_reading: su templo
  alternative_spanish_readings:
  - su palacio
  - su santuario
  rationale: Aunque הֵיכָל puede significar «palacio», el contexto inmediato habla de utensilios procedentes de la casa de Yahvé y colocados en un recinto babélico asociado al culto o a la residencia real. En español, «templo» conserva la ambigüedad documentada sin forzar una identificación más precisa de lo que permite el verso.
  doctrine_reference: 'DOCTRINE.md: lexical ambiguity handled by context'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el último pase de revisión y con el resumen de alta concordancia; no se incorporaron cambios posteriores ni variantes textuales adicionales. La redacción española sigue la lectura auditada: nombre divino transliterado, verbo de movimiento natural en español y mantenimiento de la ambigüedad de הֵיכָל en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, sin sustituirlo por «SEÑOR».
  - Se mantiene la distinción entre el traslado de los utensilios y su colocación en un edificio babélico.
  - «Casa de Yahvé» conserva la estructura hebrea más directamente que una simple glosa con «templo».
  - La nota [a] se ancla en «utensilios» para reflejar la alternativa lexical de הֵיכָל sin alterar el texto principal.
