translation:
  language: es
  text: Y el bronce de la ofrenda mecida fue setenta talentos y dos mil cuatrocientos siclos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cobre’; hebreo נְחֹשֶׁת puede referirse ampliamente a cobre o bronce según el contexto.
    reason: lexical_alternative
  - marker: b
    text: ‘Ofrenda mecida’ es un término técnico para algo presentado ante Yahvé mediante un gesto ritual de mecer; también puede traducirse más generalmente como ‘ofrenda presentada’ o ‘contribución’.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede referirse a cobre o bronce según el contexto. En este inventario del tabernáculo, ‘bronce’ comunica mejor el metal trabajado de los objetos cultuales, siguiendo la decisión auditada del inglés POB.
- source_word: הַ/תְּנוּפָה
  english_pob_choice: the wave offering
  chosen_spanish: la ofrenda mecida
  alternatives_spanish:
  - la ofrenda alzada
  - la ofrenda presentada
  - la contribución mecida
  lexicon: HALOT
  rationale: תְּנוּפָה es un término técnico de ofrenda presentada mediante un gesto ritual de mecer o agitar ante Yahvé. ‘Ofrenda mecida’ conserva el valor técnico y evita una paráfrasis más general.
- source_word: שִׁבְעִים כִּכָּר
  english_pob_choice: seventy talents
  chosen_spanish: setenta talentos
  alternatives_spanish:
  - setenta unidades de peso
  lexicon: HALOT
  rationale: כִּכָּר es una unidad antigua de peso; ‘talentos’ mantiene la unidad histórica en lugar de convertirla a una medida moderna.
- source_word: וְאַלְפַּיִם וְאַרְבַּע מֵאוֹת שָׁקֶל
  english_pob_choice: and 2,400 shekels
  chosen_spanish: y dos mil cuatrocientos siclos
  alternatives_spanish:
  - y 2.400 siclos
  - y dos mil cuatrocientos pesos
  lexicon: HALOT
  rationale: שֶׁקֶל se traduce por ‘siclo’ como unidad de peso monetario/metalúrgico. Se conserva el número completo en palabras para una lectura bíblica fluida en español.
theological_decisions:
- issue: Traducción del término técnico de culto תְּנוּפָה
  english_pob_reading: Wave offering is a technical term for something presented before the LORD by a ritual waving motion.
  chosen_spanish_reading: ofrenda mecida
  alternative_spanish_readings:
  - ofrenda presentada
  - contribución mecida
  rationale: La decisión mantiene el carácter ritual y técnico del término sin neutralizarlo en una vaga ‘ofrenda’. En español, ‘mecida’ comunica el gesto cultual de forma reconocible y suficientemente literal.
  doctrine_reference: Levítico 7:30; Éxodo 29:24
translation_notes:
  revision_awareness: El texto inglés revisado quedó sin cambios en la última pasada, con acuerdo alto entre revisores; la traducción española sigue esa lectura estable sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ en el sistema terminológico del proyecto para el nombre divino, aunque en este versículo no aparece explícitamente.
  - Se conserva la unidad antigua ‘talentos’ y ‘siclos’ para máxima transparencia histórica.
  - No se convierte la cifra a una medida moderna; se respeta la forma del inventario bíblico.
  - ‘Bronce’ se usa como término metalúrgico cultual coherente con el contexto del tabernáculo.
