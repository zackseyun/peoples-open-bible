translation:
  language: es
  text: Las entrañas de un necio son como una vasija[a] quebrada, y no retendrán ningún conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jarro» o «cántaro» quebrado. El griego se refiere a un recipiente destrozado que no puede retener lo que se pone en él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγκατα
  english_pob_choice: the inward parts
  chosen_spanish: las entrañas
  alternatives_spanish:
  - las partes internas
  - el interior
  - el corazón
  lexicon: LSJ
  rationale: ἔγκατα nombra las partes internas o vísceras. En español, «entrañas» conserva el matiz corporal e imagístico mejor que una abstracción como «corazón» o «interior».
- source_word: μωροῦ
  english_pob_choice: of a fool
  chosen_spanish: de un necio
  alternatives_spanish:
  - de un insensato
  - de un tonto
  lexicon: LSJ
  rationale: En literatura sapiencial, μωρός describe a la persona necia en sentido moral e intelectual. «Necio» es un equivalente sobrio y bíblicamente reconocible sin perder fuerza proverbial.
- source_word: ὡς ἄγγιον συντετριμμένον
  english_pob_choice: like a broken vessel
  chosen_spanish: como un vaso quebrado
  alternatives_spanish:
  - como un jarro roto
  - como una vasija quebrada
  - como un cántaro roto
  lexicon: LSJ
  rationale: ἄγγιον es un recipiente/vasija; «vaso» funciona en español como término amplio y natural. «Quebrado» refleja bien συντετριμμένον y mantiene el carácter imagético sin sobreespecificar el objeto.
- source_word: πᾶσαν γνῶσιν
  english_pob_choice: any knowledge
  chosen_spanish: ningún conocimiento
  alternatives_spanish:
  - toda sabiduría
  - algún conocimiento
  - ninguna comprensión
  lexicon: LSJ
  rationale: El giro negado con οὐ κρατήσει expresa incapacidad de retener conocimiento alguno. «Ningún conocimiento» reproduce con naturalidad la totalidad negada y evita una lectura más amplia o teológica que el griego no exige.
- source_word: οὐ κρατήσει
  english_pob_choice: they will not hold any knowledge
  chosen_spanish: no retendrán
  alternatives_spanish:
  - no guardarán
  - no conservarán
  - no sostendrán
  lexicon: LSJ
  rationale: κρατέω puede significar retener o mantener. Dado el paralelo con un recipiente roto, «retendrán» comunica bien la idea de no poder contener o conservar conocimiento.
translation_notes:
  revision_awareness: La traducción sigue el texto griego de Swete 1909 y toma en cuenta la revisión inglesa más reciente, que ajustó el sujeto a plural («they will not hold») para concordar con «the inward parts». En español se reflejó esa concordancia con «no retendrán».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología cristológica porque el versículo no contiene esos elementos.
  - Se preservó la imagen concreta de recipiente roto para no espiritualizar indebidamente ἔγκατα.
  - «Necio» mantiene el tono sapiencial estándar y coherente con el registro bíblico del libro de Sirácides.
