revisions:
- from: 'y di[a]: «Escucha la palabra de Yahvé, rey de Judá, tú que te sientas sobre el trono de David: tú, tus esclavos y tu pueblo, los que entran por estas puertas».'
  to: 'y di: «Escucha la palabra de Yahvé, rey de Judá, que te sientas sobre el trono de David: tú, tus servidores[a] y tu pueblo, los que entran por estas puertas».'
  rationale: Se corrige עֲבָדֶיךָ a «servidores» para seguir la decisión contextual auditada del inglés («servants», no «slaves») y producir un español natural en contexto real. También se suaviza la sintaxis de la relativa para reflejar mejor «rey de Judá, que te sientas sobre el trono de David», reservando el «tú» enfático para la enumeración posterior, como en el hebreo.
