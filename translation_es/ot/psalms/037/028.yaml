translation:
  language: es
  text: Porque Yahvé ama la justicia y no abandona a sus fieles[a]; son guardados para siempre[b], pero la descendencia de los impíos será cortada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus santos', 'sus piadosos' o 'sus leales' para 'sus fieles'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo también puede entenderse de manera más estrecha como 'sus fieles son preservados para siempre'.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre divino del texto fuente, manteniendo el valor del nombre propio del pacto. En español, 'Yahvé' es la forma del proyecto para יהוה y evita la sustitución por un título enmascarador.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - rectitud
  - lo que es justo
  lexicon: HALOT
  rationale: En este contexto el término expresa el orden justo que Yahvé ama; 'justicia' es la equivalencia española natural y conserva el sentido ético-jurídico.
- source_word: יַעֲזֹב
  english_pob_choice: forsake
  chosen_spanish: abandona
  alternatives_spanish:
  - desampara
  - deja
  - abandona
  lexicon: HALOT
  rationale: '''Abandonar'' comunica bien el sentido de no dejar sin cuidado ni lealtad. En español bíblico moderno es más transparente que un calco rígido y sigue la fuerza de ''forsake''.'
- source_word: חֲסִידָיו
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - sus piadosos
  - sus leales
  lexicon: HALOT
  rationale: Se conserva la idea de personas caracterizadas por fidelidad/lealtad de pacto. 'Fieles' es la opción más natural en español y evita estrechar indebidamente el término a una categoría eclesiástica técnica.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' expresa duración continua de manera idiomática en español y preserva el alcance temporal amplio de עוֹלָם.'
- source_word: נִשְׁמָרוּ
  english_pob_choice: they are kept
  chosen_spanish: serán guardados
  alternatives_spanish:
  - son guardados
  - son preservados
  - serán preservados
  lexicon: HALOT
  rationale: El pasivo de שמר permite 'guardados' o 'preservados'. Se eligió 'serán guardados' para mantener la promesa de protección continua y sonar natural en español, sin perder la idea de custodia divina.
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - progenie
  - semilla
  lexicon: HALOT
  rationale: Aquí el sustantivo se refiere a posteridad; 'descendencia' es la opción clara y amplia en español, equivalente al valor colectivo de 'offspring'.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: '''Impíos'' mantiene el contraste moral del salmo y es una forma bíblica aceptable en español, sin perder la referencia a quienes viven sin reverencia a Dios.'
- source_word: נִכְרָת
  english_pob_choice: will be cut off
  chosen_spanish: será exterminada
  alternatives_spanish:
  - será cortada
  - será arrancada
  - será eliminada
  lexicon: HALOT
  rationale: כרת en este contexto comunica la eliminación judicial de la posteridad de los impíos. 'Exterminada' intensifica más que el inglés 'cut off', pero se usa aquí para captar el golpe final del hebreo en un español claro; aun así, 'será cortada' queda como alternativa más literal.
theological_decisions:
- issue: Identificación de חֲסִידָיו
  english_pob_reading: '''his faithful ones'' as covenant-loyal people devoted to the LORD.'
  chosen_spanish_reading: '''sus fieles'' como personas de lealtad y fidelidad a Yahvé.'
  alternative_spanish_readings:
  - sus santos
  - sus piadosos
  - sus leales
  rationale: Se evita una equivalencia eclesiástica restringida ('santos') salvo cuando el contexto lo exija. 'Fieles' conserva la relación de pacto y la dimensión ética sin imponer un tecnicismo posterior.
  doctrine_reference: Translation philosophy §§1, 3 y 6; mantener la fuerza relacional del término fuente.
- issue: Relación entre 'no abandona a sus fieles' y 'serán guardados para siempre'
  english_pob_reading: 'Two complementary assertions, with the second clause potentially read as a tighter unit: ''his faithful ones are preserved forever.'''
  chosen_spanish_reading: 'Dos afirmaciones complementarias: Yahvé no abandona a sus fieles, y ellos serán guardados para siempre.'
  alternative_spanish_readings:
  - Yahvé no abandona a sus fieles; sus fieles serán guardados para siempre.
  rationale: La puntuación con punto y coma preserva la doble afirmación y mantiene explícita la pasiva del hebreo. No se fuerza una sola cláusula compacta si ello oscurece la secuencia del texto.
  doctrine_reference: Translation philosophy §§1 y 3; preservar el sentido y la ambigüedad legítima del hebreo.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia en el control cruzado y no presenta revisiones aplicadas; la redacción española sigue la lectura estable del hebreo con atención especial a חֲסִידָיו, לְעוֹלָם y נִשְׁמָרוּ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino según la terminología del proyecto.
  - '''Fieles'' se usa para חֲסִידָיו, evitando ''santos'' en el texto principal por no ser la opción más neutra aquí.'
  - '''Para siempre'' conserva el alcance de לְעוֹלָם sin añadir matices doctrinales no presentes en el verso.'
  - La voz pasiva 'serán guardados' refleja נִשְׁמָרוּ y evita convertir la cláusula en una afirmación puramente estática.
