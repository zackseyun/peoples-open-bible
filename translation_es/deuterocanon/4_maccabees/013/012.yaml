translation:
  language: es
  text: 'Pero él seguía diciendo[a]: «Recuerden de dónde son, y por la mano de qué padre serán degollados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Recuerden de dónde proceden». La expresión griega puede señalar procedencia o filiación; aquí probablemente apunta al linaje familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἔλεγεν
  english_pob_choice: But he kept saying
  chosen_spanish: Pero él seguía diciendo
  alternatives_spanish:
  - Pero dijo
  - Y decía
  lexicon: BDAG
  rationale: El imperfecto ἔλεγεν expresa acción repetida o continuada; «seguía diciendo» conserva ese aspecto mejor que un pasado simple. δέ marca contraste/discurso, por eso se traduce con «Pero». "Él" mantiene la referencia explícita del sujeto sin añadir interpretación.
- source_word: Μνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Tengan presente
  lexicon: BDAG
  rationale: Es un imperativo aoristo dirigido a varios; «Acuérdense» suena natural en español y conserva el llamado decisivo a recordar. «Recuerden» también sería viable, pero «acuérdense» comunica mejor la apelación directa e intensa.
- source_word: πόθεν ἐστέ
  english_pob_choice: from where you are
  chosen_spanish: de dónde están
  alternatives_spanish:
  - de dónde vienen
  - de dónde son
  - de dónde proceden
  lexicon: BDAG
  rationale: El griego πόθεν apunta primariamente al origen; la revisión inglesa optó por una lectura más literal de la expresión. En español, «de dónde están» conserva esa forma interrogativa y deja abierta la fuerza contextual de origen/linaje sin forzar una paráfrasis explicativa.
- source_word: τίνος πατρὸς
  english_pob_choice: whose father's
  chosen_spanish: de qué padre
  alternatives_spanish:
  - de quién padre
  - de cuál padre
  lexicon: BDAG
  rationale: τίνος expresa posesión/identidad interrogativa. «De qué padre» es la forma natural en español para esa construcción y permite preservar la pregunta retórica sobre filiación ancestral sin añadir claridad interpretativa excesiva.
- source_word: χειρὶ
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - agencia
  lexicon: BDAG
  rationale: χείρ es literalmente «mano» y funciona aquí de manera concreta y vívida. Mantener «mano» conserva la imagen del instrumento o agente del acto violento, tal como en el texto griego.
- source_word: σφαγιασθῆναι
  english_pob_choice: to be slaughtered
  chosen_spanish: ser degollados
  alternatives_spanish:
  - ser sacrificados
  - ser muertos
  - ser inmolados
  lexicon: BDAG
  rationale: El verbo expresa una muerte violenta, literalmente de sacrificio o degüello. «Ser degollados» comunica con fuerza esa violencia sin suavizarla a un simple «ser muertos» ni introducir de manera más interpretativa un lenguaje sacrificial en el cuerpo del texto.
theological_decisions:
- issue: 'πόθεν ἐστέ: origen geográfico o filiación ancestral'
  english_pob_reading: Rendered as 'from where you are' to reflect the Greek expression more directly, while the English note recognizes that the phrase can denote family lineage.
  chosen_spanish_reading: «de dónde están» mantiene la forma abierta del griego y permite que el contexto determine si el énfasis recae en origen familiar, procedencia o identidad.
  alternative_spanish_readings:
  - de dónde vienen
  - de dónde proceden
  rationale: En este contexto martirial, la exhortación remite a la identidad y el linaje, pero el griego no obliga a explicitarlo en la línea principal. La redacción española conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §1, §5
- issue: 'σφαγιασθῆναι: intensidad de la muerte violenta'
  english_pob_reading: '''to be slaughtered'' preserves the brutality more clearly than ''to be slain.'''
  chosen_spanish_reading: «ser degollados» mantiene la crudeza del verbo y sugiere una muerte violenta, casi sacrificial, sin añadir un desarrollo doctrinal que el texto no explicita.
  alternative_spanish_readings:
  - ser sacrificados
  - ser inmolados
  - ser asesinados
  rationale: La opción elegida conserva la carga brutal del griego y del inglés POB. «Ser sacrificados» o «ser inmolados» introducirían con más fuerza un matiz cultual; «ser asesinados» sería más general y perdería la imagen concreta de la matanza.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se siguió el último ajuste del audit trail inglés: πόθεν se mantuvo con una expresión más directa y τίνος se resolvió idiomáticamente en español como «de qué padre». Sin embargo, para evitar sobrerresolver el sentido, la línea principal española conserva la ambigüedad controlada de origen/procedencia mediante «de dónde están», mientras la nota recoge la alternativa de filiación. La fuerza de σφαγιασθῆναι se conservó con un verbo español igualmente crudo.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en esta serie cuando aparezca el nombre divino; aquí no aplica.
  - Se mantuvo el tono solemne y directo, apto para lectura pública.
  - «Acuérdense» concuerda con el imperativo plural del griego.
  - «Degollados» evita suavizar el léxico de violencia y preserva la imagen corporal del original.
