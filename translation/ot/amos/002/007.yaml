theological_decisions:
- issue: Nature of the sexual offense in וְאִישׁ וְאָבִיו יֵלְכוּ אֶל הַנַּעֲרָה
  chosen_reading: The text condemns a man and his father having sexual relations with the same young woman, presented as a profanation of God's holy name.
  alternative_readings:
  - The phrase may allude specifically to cultic sexual abuse or exploitation of a servant/slave girl.
  - The phrase may emphasize incest-adjacent dishonor rather than formal incest law.
  rationale: The Hebrew itself states the shared sexual approach to 'the girl/young woman' and links it to profaning God's holy name. The translation should not over-interpret by specifying prostitution, slavery, or cultic setting in the main text, since those are possible but not explicit here.
  doctrine_reference: Preserve theological tension rather than resolve it.
