translation:
  language: es
  text: Pero tratas con miramiento a todas las cosas, porque son tuyas, oh Dueño que amas la vida[a]. Pues tu espíritu imperecedero está en todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amante de las almas». El griego φιλόψυχε puede entenderse más estrechamente en relación con los seres vivientes o las almas, pero aquí se traduce en sentido amplio porque el contexto habla del cuidado de Dios por toda la creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: φείδῃ
  english_pob_choice: you spare
  chosen_spanish: perdonas
  alternatives_spanish:
  - ahorras
  - dispensas
  - respetas
  lexicon: BDAG
  rationale: El verbo griego expresa la idea de abstenerse de dañar o de destruir. En español, "perdonas" comunica bien esa contención benévola en un contexto donde Dios preserva a la creación. Aunque "ahorras" sería más literal, suena más áspero; "perdonas" mantiene la relación personal sin perder la idea de no ejecutar daño.
- source_word: πάντων
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo creado
  - todas
  lexicon: LSJ
  rationale: El plural amplio apunta al total de lo creado. "Todas las cosas" conserva la amplitud cósmica y evita restringir indebidamente el alcance.
- source_word: σά ἐστιν
  english_pob_choice: they are yours
  chosen_spanish: son tuyas
  alternatives_spanish:
  - te pertenecen
  - son de ti
  - todo es tuyo
  lexicon: LSJ
  rationale: La frase compacta indica posesión. "Son tuyas" hace explícita la concordancia plural en español y conserva la relación de pertenencia.
- source_word: Δέσποτα
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Maestro
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: Δέσποτα denota señorío de propiedad y autoridad absoluta. "Dueño" mantiene esa fuerza léxica de posesión y dominio mejor que "Señor", que en español cristiano puede solaparse con el uso para κύριος. "Maestro" desviaría el sentido hacia enseñanza.
- source_word: φιλόψυχε
  english_pob_choice: who loves life
  chosen_spanish: que amas la vida
  alternatives_spanish:
  - amante de las almas
  - amante de la vida
  - que amas las almas
  lexicon: LSJ
  rationale: El compuesto puede aludir a 'vida' o 'alma'. Aquí el contexto de cuidado por toda la creación favorece la lectura amplia de la vida. "Que amas la vida" comunica el sentido sin estrecharlo a 'almas' humanas.
- source_word: ἄφθαρτόν
  english_pob_choice: imperishable
  chosen_spanish: imperecedero
  alternatives_spanish:
  - incorruptible
  - inmortal
  - que no perece
  lexicon: BDAG
  rationale: '"Imperecedero" expresa de forma natural en español lo que no está sujeto a corrupción o descomposición. Mantiene el registro teológico sin sonar técnico o arcaico.'
- source_word: πνεῦμά
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  lexicon: BDAG
  rationale: En este contexto se trata de la presencia vivificante de Dios, no de un simple soplo físico. "Espíritu" conserva la carga teológica y literaria.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todo lo creado
  - en todas
  lexicon: LSJ
  rationale: La frase refuerza el alcance universal del versículo. "En todas las cosas" mantiene el paralelismo con "todas las cosas" y evita limitar el sentido.
theological_decisions:
- issue: 'Alcance de φιλόψυχε: vida vs. almas'
  english_pob_reading: who loves life
  chosen_spanish_reading: que amas la vida
  alternative_spanish_readings:
  - amante de las almas
  - que amas las almas
  rationale: La secuencia del versículo habla del cuidado de Dios sobre todo lo creado y luego de su espíritu en todas las cosas. Eso favorece una lectura creacional amplia. Se conserva la tensión semántica del compuesto sin reducirlo a un sentido exclusivamente antropológico.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
- issue: Título Δέσποτα como expresión de señorío
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: El griego usa un título distinto de κύριος. "Dueño" preserva la idea de posesión y autoridad absoluta sin borrar esa diferencia léxica. Se evita equipararlo automáticamente con el habitual "Señor".
  doctrine_reference: Translate titles; do not flatten distinct Greek honorifics
translation_notes:
  revision_awareness: El texto griego de la capa de traducción auditada coincide sustancialmente con la edición de Swete 1909 para este versículo. Se conserva la decisión interpretativa del POB inglés de traducir φιλόψυχε en sentido amplio y de distinguir Δέσποτα de κύριος. No se introducen cambios textuales ni se resuelven tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene "espíritu" para πνεῦμα, no "aliento", porque el contexto es teológico y universal.
  - Se conserva una distinción léxica para Δέσποτα mediante "Dueño", evitando el uso automático de "Señor".
  - '"Todas las cosas" y "en todas las cosas" reproducen el alcance universal y el paralelismo del griego.'
  - La nota de pie de página se ancla en "amas la vida" porque ahí reside la ambigüedad semántica principal de φιλόψυχε.
