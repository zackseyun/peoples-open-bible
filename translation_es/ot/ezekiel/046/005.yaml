base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/046/005.yaml
  text: And the grain offering shall be an ephah with the ram[a], and with the lambs a grain offering as much as his hand can give[b], and a hin of oil with each ephah.
  footnotes:
  - marker: a
    text: Or 'for the ram' and 'for the lambs'; the Hebrew preposition can mark association or allocation in sacrificial instructions.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gift of his hand,' an idiom meaning according to what he is able to give.
    reason: lexical_alternative
