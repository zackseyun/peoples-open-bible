translation:
  language: es
  text: No confíen en un prójimo[a]; no pongan su confianza en un compañero cercano[b]. De la mujer que yace en tu regazo[c][d], guarda las puertas de tu boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amigo» para רֵעַ.
    reason: lexical_alternative
  - marker: b
    text: O «amigo íntimo» para אַלּוּף.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la mujer que yace en tu regazo»; es decir, la compañía más íntima, probablemente la esposa.
    reason: cultural_note
  - marker: d
    text: O «abrazo» para «regazo».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵעַ
  english_pob_choice: neighbor
  chosen_spanish: vecino
  alternatives_spanish:
  - amigo
  - compañero
  lexicon: HALOT
  rationale: רֵעַ puede abarcar una relación cercana de convivencia o trato social. «Vecino» conserva esa amplitud relacional en español y evita volver la frase demasiado íntima antes de la segunda línea, que ya intensifica la cercanía.
- source_word: אַלּוּף
  english_pob_choice: close companion
  chosen_spanish: compañero cercano
  alternatives_spanish:
  - amigo íntimo
  - confidente
  - compañero íntimo
  lexicon: HALOT
  rationale: Aquí אַלּוּף no funciona como ‘jefe’ sino como persona de trato estrecho y confiable. «Compañero cercano» transmite la proximidad personal sin repetir exactamente el término anterior.
- source_word: תַּאֲמִינוּ
  english_pob_choice: trust
  chosen_spanish: confíen
  alternatives_spanish:
  - crean
  - depositen su confianza
  lexicon: HALOT
  rationale: El verbo hebreo con ב expresa poner confianza en alguien. En español, «confiar en» es la equivalencia natural; se opta por la forma imperativa plural negativa «No confíen» para el tono exhortativo.
- source_word: תִּבְטְחוּ
  english_pob_choice: put confidence in
  chosen_spanish: pongan su confianza en
  alternatives_spanish:
  - confíen en
  - dependan de
  lexicon: HALOT
  rationale: Se conserva la fuerza paralela de בּטח con una variación estilística en español para evitar repetición mecánica, manteniendo el sentido de apoyo o dependencia personal.
- source_word: מִשֹּׁכֶבֶת חֵיקֶךָ
  english_pob_choice: From the woman who lies in your bosom
  chosen_spanish: De la mujer que yace en tu seno
  alternatives_spanish:
  - De la mujer que yace en tu abrazo
  - Incluso de tu esposa
  lexicon: HALOT
  rationale: «Seno» es el equivalente más cercano a חֵיק y preserva la imagen de intimidad corporal del hebreo. «Yace» refleja el participio verbal y el hebreo se mantiene sin convertirlo en una paráfrasis explicativa.
- source_word: חֵיק
  english_pob_choice: bosom
  chosen_spanish: seno
  alternatives_spanish:
  - abrazo
  - pecho
  lexicon: HALOT
  rationale: «Seno» es una opción digna y comprensible en español para la metáfora de cercanía íntima. Conserva mejor el valor idiomático que una simple glosa como «abrazo».
- source_word: שְׁמֹר
  english_pob_choice: guard
  chosen_spanish: guarda
  alternatives_spanish:
  - vigila
  - custodia
  lexicon: HALOT
  rationale: El imperativo exige vigilancia activa sobre la palabra. «Guarda» es breve, enérgico y apto para la imagen metafórica de controlar la boca.
- source_word: פִּתְחֵי פִיךָ
  english_pob_choice: the doors of your mouth
  chosen_spanish: las puertas de tu boca
  alternatives_spanish:
  - las entradas de tu boca
  - lo que sale de tu boca
  lexicon: HALOT
  rationale: Se conserva la metáfora literal de «puertas» para mantener la imaginería hebrea sobre el control del habla, en vez de explicarla como mera moderación verbal.
theological_decisions:
- issue: 'Alcance de la prohibición: confiar en relaciones humanas incluso las más íntimas'
  english_pob_reading: 'The verse stacks two prohibitions: do not trust a neighbor; do not put confidence in a close companion; even the most intimate domestic companion is not exempt from caution.'
  chosen_spanish_reading: 'El verso presenta una escalada de cautela: ni en el vecino ni en el compañero cercano, e incluso ante la relación más íntima, se debe depositar confianza absoluta.'
  alternative_spanish_readings:
  - Solo se prohíbe confiar en enemigos ocultos.
  - La frase se limita a una advertencia general sin matiz de intensidad.
  rationale: La sintaxis hebrea y la lectura inglesa muestran paralelismo intensificado. La traducción española debe conservar ese aumento de cercanía para no suavizar la advertencia ética del texto.
  doctrine_reference: Sabiduría bíblica sobre la falibilidad humana y la prudencia relacional, sin negar la posibilidad de amistad verdadera.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y sin cambios necesarios; esta propuesta mantiene la línea óptima del audit trail inglés, con adaptación natural al español y sin suavizar la progresión retórica del hebreo.
  spanish_consistency_notes:
  - Se preserva el paralelismo negativo con dos imperativos y la imagen final de las «puertas de tu boca».
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se mantiene la distinción entre «vecino» y «compañero cercano» para reflejar el escalonamiento semántico del hebreo.
  - La metáfora corporal se conserva con «seno» para no perder la intensidad idiomática del מקור hebreo.
