translation:
  language: es
  text: Yahvé ha cumplido su palabra que pronunció[a], y yo me he levantado en lugar de David mi padre y estoy sentado en el trono de Israel, como habló Yahvé, y he edificado la casa para el nombre de Yahvé[b], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha establecido su palabra» o «ha llevado a cabo su palabra». El verbo hebreo literalmente significa «ha hecho que su palabra permanezca».'
    reason: lexical_alternative
  - marker: b
    text: «La casa» se refiere al templo. El hebreo conserva la expresión pactual «casa para el nombre de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם / וָאָקוּם
  english_pob_choice: has fulfilled / I have risen
  chosen_spanish: ha cumplido / me he levantado
  alternatives_spanish:
  - ha establecido / me he alzado
  - ha llevado a cabo / he subido
  lexicon: HALOT
  rationale: En hebreo el verbo en hifil con דָּבָר expresa hacer que la palabra ‘se mantenga’, es decir, cumplirla o llevarla a efecto. Para la segunda ocurrencia, el paralelo con la sucesión real pide conservar el movimiento de ‘levantarse’ en lugar de una paráfrasis más libre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre divino como ‘Yahvé’, en vez de sustituirlo por un título o por otra forma tradicional.'
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su promesa
  - lo que dijo
  lexicon: HALOT
  rationale: ‘Palabra’ conserva la formulación hebrea y deja visible el vínculo con la acción de Yahvé de hacerla firme o cumplirla. ‘Promesa’ sería interpretativa y estrecha un poco el campo semántico.
- source_word: אֲשֶׁר דִּבֵּר
  english_pob_choice: that he spoke
  chosen_spanish: que habló
  alternatives_spanish:
  - que dijo
  - que había hablado
  lexicon: HALOT
  rationale: La cláusula relativa se mantiene de forma directa, con el mismo verbo de decir/hablar que el hebreo repite.
- source_word: תַּחַת דָּוִיד אָבִי
  english_pob_choice: in the place of David my father
  chosen_spanish: en lugar de David mi padre
  alternatives_spanish:
  - en vez de David mi padre
  - después de David mi padre
  lexicon: HALOT
  rationale: ‘En lugar de’ expresa bien la sucesión dinástica sin cargar el giro con matices ajenos. En español resulta natural y fiel al valor de תחת en este contexto.
- source_word: וָאֵשֵׁב
  english_pob_choice: sit
  chosen_spanish: me siento
  alternatives_spanish:
  - me he sentado
  - estoy sentado
  lexicon: HALOT
  rationale: El hebreo puede leerse como estado resultante de entronización. ‘Me siento sobre el trono’ mantiene la imagen real y suena natural en español, sin forzar un perfecto donde el contexto ya es estable.
- source_word: כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: the throne of Israel
  chosen_spanish: el trono de Israel
  alternatives_spanish:
  - el trono de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión real formal y transparente. ‘Trono de Israel’ refleja el sustantivo hebreo sin añadir interpretación.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: as Yahweh spoke
  chosen_spanish: como habló Yahvé
  alternatives_spanish:
  - como dijo Yahvé
  - tal como habló Yahvé
  lexicon: HALOT
  rationale: Se mantiene la repetición de דבר para enlazar la entronización con la palabra divina previa. ‘Como habló Yahvé’ reproduce bien el eco verbal del hebreo.
- source_word: וָאֶבְנֶה הַבַּיִת
  english_pob_choice: I have built the house
  chosen_spanish: he edificado la casa
  alternatives_spanish:
  - he construido la casa
  - edifiqué la casa
  lexicon: HALOT
  rationale: ‘Edificado’ conserva el tono elevado y la correspondencia con el verbo de construir el santuario. Se prefiere ‘la casa’ para reflejar el idiomatismo hebreo y no borrar su formulación cultual.
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: for the name of Yahweh
  chosen_spanish: para el nombre de Yahvé
  alternatives_spanish:
  - en honor del nombre de Yahvé
  - para la fama de Yahvé
  lexicon: HALOT
  rationale: Se preserva la expresión teológica ‘para el nombre de Yahvé’, que señala dedicación y finalidad del templo sin reducirla a una mera idea de honor. Es una fórmula bíblica importante que conviene mantener visible.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del templo
  lexicon: HALOT
  rationale: Aunque el referente es el templo, el hebreo dice ‘la casa’. Mantenerlo deja transparente el lenguaje original y su fórmula tradicional en el texto bíblico.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Designación pactual estándar; la traducción directa es la más fiel y clara.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de conservar el nombre divino como transliteración, no como sustitución reverencial. Esto preserva el dato teológico del nombre propio revelado a Israel.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fórmula ‘la casa para el nombre de Yahvé’
  english_pob_reading: the house for the name of Yahweh
  chosen_spanish_reading: la casa para el nombre de Yahvé
  alternative_spanish_readings:
  - el templo para el nombre de Yahvé
  - la casa en honor de Yahvé
  rationale: 'La formulación conserva la tensión bíblica: el edificio pertenece al ámbito del ‘nombre’ de Yahvé y no contiene a Dios. ‘Templo’ aclara, pero borra el giro hebreo que el audit trail pide mantener.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Verbo de cumplimiento de la palabra
  english_pob_reading: has fulfilled his word
  chosen_spanish_reading: ha cumplido su palabra
  alternative_spanish_readings:
  - ha establecido su palabra
  - ha llevado a cabo su palabra
  rationale: ‘Cumplido’ expresa bien el sentido de hacer firme la palabra dada. A la vez, no elimina la imagen hebrea subyacente de ‘hacer que la palabra permanezca’.
  doctrine_reference: 'Contested terms: קום in Hiphil with דבר'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefería ‘have risen’ frente a ‘have arisen’ por naturalidad, y esa preferencia se reflejó en español con ‘me he levantado’, manteniendo la relación semántica con el verbo de levantarse y la sucesión de David. También se conservó la lectura estable de la frase final como ‘la casa para el nombre de Yahvé’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de manera uniforme para יְהוָה.
  - Se conservó ‘la casa’ en vez de ‘el templo’ en el cuerpo principal para respetar la fórmula hebrea.
  - Se usó ‘me he levantado’ para el cambio de entronización, evitando una forma demasiado literal que sonara extraña en español.
  - La secuencia verbal busca reflejar el paralelismo y la repetición de ‘hablar/palabra’ del hebreo.
  - El registro es reverente pero moderno, sin recurrir a sustituciones eclesiásticas que oculten el nombre divino.
