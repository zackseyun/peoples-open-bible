translation:
  language: es
  text: ¡Aclamen con júbilo a Yahvé[a], toda la tierra[b]; prorrumpan y canten con alegría, y hagan música!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lancen un grito de júbilo a Yahvé»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «prorrumpan y canten con júbilo, y canten alabanzas»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִיעוּ
  english_pob_choice: Shout joyfully
  chosen_spanish: Aclamad con júbilo
  alternatives_spanish:
  - Levantad un grito de júbilo
  - Gritad con alegría
  - Dad una aclamación gozosa
  lexicon: HALOT
  rationale: El verbo en contexto de alabanza expresa un clamor jubiloso. «Aclamad con júbilo» conserva la fuerza imperativa y el tono de celebración sin caer en una fórmula demasiado litúrgica o anticuada.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: El hebreo marca dirección de la alabanza hacia el nombre divino. Se conserva «Yahvé» según el criterio del proyecto para יהוה, en vez de ocultarlo tras «SEÑOR».
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la tierra habitada
  - toda la creación
  lexicon: HALOT
  rationale: «הָאָרֶץ» aquí tiene alcance universal dentro del llamado a la alabanza. «Toda la tierra» es la forma más natural en español y mantiene ese sentido global.
- source_word: פִּצְחוּ
  english_pob_choice: break forth
  chosen_spanish: prorrumpid
  alternatives_spanish:
  - prorrumpid
  - estallad
  - brotad
  lexicon: HALOT
  rationale: El verbo sugiere una irrupción sonora, especialmente en canto o júbilo. «Prorrumpid» comunica bien esa salida repentina de voz y mantiene el encadenamiento poético con el verso.
- source_word: וְרַנְּנוּ
  english_pob_choice: sing for joy
  chosen_spanish: cantad con alegría
  alternatives_spanish:
  - cantad con júbilo
  - entonad gritos de alegría
  - regocijaos cantando
  lexicon: HALOT
  rationale: El piʿel de רנן expresa canto o clamor jubiloso. «Cantad con alegría» reproduce el contenido de gozo de forma clara y natural en español.
- source_word: וְזַמֵּרוּ
  english_pob_choice: make music
  chosen_spanish: haced música
  alternatives_spanish:
  - haced música
  - cantad salmos
  - tocad música
  lexicon: HALOT
  rationale: זמר puede implicar cantar con acompañamiento musical. «Haced música» es suficientemente amplio para abarcar la dimensión musical sin restringirla a una sola modalidad vocal.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traslada como «Yahvé» en el texto principal para mantener visible el nombre del pacto y no reemplazarlo por una convención de mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La traducción inglesa reciente mantiene un acuerdo alto y no introduce revisiones sustantivas; se preserva la secuencia verbal enfática del hebreo y el nombre divino como Yahvé, sin cambiar el sentido universal de «toda la tierra».
  spanish_consistency_notes:
  - Se conservó la cadena de imperativos poéticos en cuatro miembros, reflejando el paralelismo del hebreo.
  - Se evitó «SEÑOR» para יהוה conforme a la pauta del proyecto, manteniendo «Yahvé» en el texto base.
  - «Cantad con alegría» y «haced música» buscan respetar la distinción entre clamor jubiloso y expresión musical final.
  - Las notas al pie ofrecen alternativas plausibles sin debilitar el texto principal.
