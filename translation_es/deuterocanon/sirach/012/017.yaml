translation:
  language: es
  text: Así es el que se asocia con un hombre insolente y se revuelca en sus pecados.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La versión griega difiere de manera sustancial: «Si el mal te saliera al encuentro, lo encontrarías allí antes que tú, y como uno que ayuda te haría tropezar el talón». El hebreo conservado en el Cairo Geniza, en cambio, habla de asociarse con un hombre insolente y revolcarse en sus pecados.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So is
  chosen_spanish: Así es
  alternatives_spanish:
  - De este modo es
  - Tal es
  lexicon: HALOT
  rationale: La expresión introduce una comparación proverbial; «Así es» conserva esa fuerza aplicativa en español natural y claro.
- source_word: חוֹבֵר אֶל
  english_pob_choice: one who associates with
  chosen_spanish: se asocia con
  alternatives_spanish:
  - se junta con
  - se une a
  - se hace compañero de
  lexicon: HALOT
  rationale: חבר expresa la idea de vincularse o asociarse. En español, «se asocia con» comunica bien esa relación sin exagerar intimidad ni reducirla a mera proximidad.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular explícito. Se mantiene «un hombre» por fidelidad al texto fuente y por consistencia con la decisión inglesa.
- source_word: זָדוֹן
  english_pob_choice: insolence
  chosen_spanish: insolente
  alternatives_spanish:
  - arrogante
  - presuntuoso
  - malvado
  lexicon: HALOT
  rationale: En español, el sustantivo abstracto «insolencia» o la idea de «arrogancia» no encajan tan bien con la construcción atributiva del hebreo. «Un hombre insolente» conserva el valor moral de זָדוֹן y su tono de altivez culpable.
- source_word: וּמִתְגֹלֵל
  english_pob_choice: and wallows
  chosen_spanish: y se revuelca
  alternatives_spanish:
  - y se hunde
  - y se enreda
  - y se mete
  lexicon: HALOT
  rationale: El hitpael de גלל tiene la imagen de rodar/revolcarse. «Se revuelca» conserva la metáfora corporal y moral del hebreo mejor que una paráfrasis más abstracta.
- source_word: בַּעֲוֹנֹתָיו
  english_pob_choice: in his sins
  chosen_spanish: en sus pecados
  alternatives_spanish:
  - en su culpa
  - en sus iniquidades
  lexicon: HALOT
  rationale: עון puede abarcar culpa, iniquidad o pecado. «Pecados» es claro y natural en español; además mantiene la idea de quedar envuelto o chapoteando dentro de su propia culpa moral.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego divergente
  english_pob_reading: The Hebrew surviving in the Cairo Geniza reads about associating with an insolent man and rolling about in his sins, while the Greek witness gives a different warning about evil meeting a person and tripping up the heel.
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado: asociación con un hombre insolente y revuelco en sus pecados, con la variante griega registrada en nota.'
  alternative_spanish_readings:
  - Si el mal te sale al encuentro, lo encontrarás antes que tú, y como uno que ayuda te hará tropezar el talón.
  - Si el mal te encuentra, ya estaba allí antes que tú, y como ayudante te hará caer.
  rationale: La política del proyecto da primacía al hebreo cuando está conservado. Sin embargo, el griego no es una simple variante estilística sino una formulación sustancialmente distinta, por lo que se preserva como lectura alternativa para no ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; mantener honestamente las lecturas alternativas del griego paralelo.'
translation_notes:
  revision_awareness: La redacción española sigue el pasaje hebreo conservado como texto principal, pero incorpora la tensión con el paralelo griego señalada en el aparato inglés. Se eligió una forma española idiomática («se revuelca») que mantiene la imaginería corporal del hitpael sin diluirla.
  spanish_consistency_notes:
  - Se conserva el masculino singular «un hombre» conforme al hebreo y al criterio POB.
  - «Pecados» se usa como equivalente natural de עוֹנֹת, sin borrar su carga de culpa/iniquidad.
  - La nota reproduce la divergencia griega de forma explícita para evitar armonización artificial.
  - Se evita «SEÑOR» u այլ terminología de máscara; no aplica aquí, pero se mantiene la terminología POB sobre traducción directa de la fuente.
