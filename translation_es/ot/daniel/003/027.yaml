translation:
  language: es
  text: 'Y se reunieron los sátrapas, los prefectos, los gobernadores y los consejeros del rey, y vieron a estos hombres: que el fuego no había tenido poder sobre sus cuerpos, ni se había chamuscado el cabello de sus cabezas, ni sus mantos[a] habían sufrido cambio, y ningún olor a fuego les había llegado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vestiduras»; el término arameo para la prenda de vestir es algo incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִתְכַּנְּשִׁין
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El participio arameo expresa acción colectiva de convergencia. «Se reunieron» es natural en español y conserva el valor de asamblea oficial.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: satrapas
  alternatives_spanish:
  - sátrapas
  - gobernadores provinciales
  lexicon: HALOT
  rationale: Se conserva el título administrativo persa, como en el texto inglés, porque el término es técnico e histórico.
- source_word: סִגְנַיָּא
  english_pob_choice: prefects
  chosen_spanish: prefectos
  alternatives_spanish:
  - deputados
  - funcionarios
  lexicon: HALOT
  rationale: «Prefectos» comunica un rango administrativo alto sin diluir la distinción entre cargos.
- source_word: פַחֲוָתָא
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: HALOT
  rationale: El término designa autoridades provinciales; «gobernadores» es claro y fiel al contexto cortesano.
- source_word: וְהַדָּבְרֵי מַלְכָּא
  english_pob_choice: the king’s counselors
  chosen_spanish: los consejeros del rey
  alternatives_spanish:
  - los consejeros reales
  - los asesores del rey
  lexicon: HALOT
  rationale: La expresión alude a funcionarios de consejo en la corte. «Consejeros» reproduce bien la función consultiva sin sobrerretraducir el cargo.
- source_word: חָזַיִן
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaron
  - miraron
  lexicon: HALOT
  rationale: El verbo es פשוט «ver». En español, «vieron a estos hombres» conserva la observación directa del relato.
- source_word: לְגֻבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estos varones
  - a esos hombres
  lexicon: HALOT
  rationale: El לְ marca referencia en este contexto. En español conviene expresar el complemento con la preposición «a» para una sintaxis natural.
- source_word: לָא שְׁלֵט נוּרָא
  english_pob_choice: the fire had no power
  chosen_spanish: el fuego no había tenido poder
  alternatives_spanish:
  - el fuego no había prevalecido
  - el fuego no había tenido efecto
  lexicon: HALOT
  rationale: שׁלט expresa dominio o poder. «No había tenido poder» conserva la fuerza semántica que la versión inglesa ya destacó.
- source_word: בְּגֶשְׁמְהוֹן
  english_pob_choice: over their bodies
  chosen_spanish: sobre sus cuerpos
  alternatives_spanish:
  - en sus cuerpos
  - sobre sus personas
  lexicon: HALOT
  rationale: גשׁם en arameo bíblico se refiere al cuerpo. «Sobre sus cuerpos» mantiene la imagen de poder ejercido sobre ellos.
- source_word: וּשְׂעַר רֵאשְׁהוֹן
  english_pob_choice: the hair of their heads
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - el cabello de sus cabezas
  - el pelo de su cabeza
  lexicon: HALOT
  rationale: Se preserva el detalle enfático de integridad física. En español, «cabello» suena más digno y natural en este registro que «pelo».
- source_word: הִתְחָרַךְ
  english_pob_choice: was not singed
  chosen_spanish: no se había chamuscado
  alternatives_spanish:
  - no se había quemado
  - no se había escaldado
  lexicon: HALOT
  rationale: El valor es de quemadura leve/singed, especialmente del cabello. «Chamuscado» comunica mejor esa matización que «quemado».
- source_word: וְסָרְבָּלֵיהוֹן
  english_pob_choice: their cloaks
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus vestiduras
  - sus prendas
  lexicon: HALOT
  rationale: El término del arameo designa una prenda de ropa, pero su identificación exacta es incierta. «Mantos» preserva la dignidad del vestido y deja espacio para la incertidumbre léxica.
- source_word: לָא שְׁנוֹ
  english_pob_choice: were not changed
  chosen_spanish: no habían sufrido cambio
  alternatives_spanish:
  - no habían cambiado
  - no se habían alterado
  lexicon: HALOT
  rationale: El verbo significa «cambiar». «No habían sufrido cambio» refleja con claridad el estado intacto de las prendas.
- source_word: וְרֵיחַ נוּר לָא עֲדָת בְּהוֹן
  english_pob_choice: no smell of fire had come upon them
  chosen_spanish: no se les había pegado olor a fuego
  alternatives_spanish:
  - no les había llegado olor a fuego
  - no había quedado olor a fuego en ellos
  lexicon: HALOT
  rationale: עֲדָת indica llegar/alcanzar. «Se les había pegado» expresa bien en español la idea de olor adherido o persistente, sin perder la imagen concreta del texto.
theological_decisions:
- issue: Preservación milagrosa total de los tres hombres
  english_pob_reading: the fire had no power over their bodies... no smell of fire had come upon them
  chosen_spanish_reading: el fuego no había tenido poder sobre sus cuerpos... no se les había pegado olor a fuego
  alternative_spanish_readings:
  - el fuego no les había hecho daño...
  - no había olor a fuego en ellos
  rationale: 'El versículo subraya una preservación integral: cuerpo, cabello, ropa y hasta el olor. La traducción evita suavizar esa acumulación de evidencias del milagro.'
  doctrine_reference: Daniel 3:27; providencia y liberación divina
translation_notes:
  revision_awareness: La traducción inglesa revisada eliminó «concerning» después de «saw» para sonar más natural, sin cambiar el sentido del arameo. Por eso el español usa «vieron a estos hombres» con complemento directo natural, manteniendo la relación semántica del texto fuente sin forzar una calca.
  spanish_consistency_notes:
  - Se mantiene «satrapas» como título técnico, en continuidad con la tradición auditada del POB.
  - «Cabello» y «mantos» conservan un registro digno y narrativo, acorde con el contexto de corte imperial.
  - La nota sobre «mantos» refleja la incertidumbre léxica documentada sin introducir interpretaciones extrañas.
  - Se evitó «SEÑOR» u otros reemplazos no pertinentes; el versículo no contiene el nombre divino.
  - La cláusula final conserva la imagen concreta del olor adherido, siguiendo de cerca el valor verbal arameo.
