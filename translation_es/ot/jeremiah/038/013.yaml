translation:
  language: es
  text: Así lo sacaron a Jeremías con las cuerdas y lo hicieron subir de la cisterna[a], y Jeremías quedó en el patio de la guardia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del pozo». El hebreo bor puede denotar un pozo, una cisterna o una mazmorra; aquí «cisterna» encaja mejor con el contexto narrativo.
    reason: lexical_alternative
  - marker: b
    text: O «en el patio de la casa de guardia» o «en el patio de la prisión». La expresión hebrea se refiere al área de detención vigilada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְשְׁכוּ
  english_pob_choice: pulled
  chosen_spanish: sacaron
  alternatives_spanish:
  - tiraron de
  - jalaron de
  - arrastraron
  lexicon: HALOT
  rationale: En el contexto de extraer a Jeremías del pozo con cuerdas, «sacaron» comunica naturalmente la acción resultante de tirar de él, sin volver áspera la frase en español. Conserva la fuerza del verbo de extracción sin imponer una imagen más violenta que la escena requiere.
- source_word: בַּחֲבָלִים
  english_pob_choice: with the ropes
  chosen_spanish: con las cuerdas
  alternatives_spanish:
  - con las sogas
  - con los cordeles
  - por las cuerdas
  lexicon: HALOT
  rationale: חֲבָלִים puede referirse a cuerdas o sogas. «Cuerdas» es claro y natural en español; «sogas» sería posible, pero suena más regional o más fuerte de tono. Mantiene el instrumento del rescate.
- source_word: וַיַּעֲל֥וּ אֹת֖וֹ
  english_pob_choice: brought him up
  chosen_spanish: lo hicieron subir
  alternatives_spanish:
  - lo subieron
  - lo levantaron
  - lo alzaron
  lexicon: HALOT
  rationale: El causativo de עלה se expresa bien con «hacer subir». Esta opción preserva que otros lo causaron a subir, sin perder naturalidad. Evita repetir de modo torpe la idea de «sacar» y «subir» como dos acciones distintas en español.
- source_word: מִן הַבּוֹר
  english_pob_choice: out of the cistern
  chosen_spanish: desde la cisterna
  alternatives_spanish:
  - fuera de la cisterna
  - del pozo
  - desde el pozo
  lexicon: HALOT
  rationale: El contexto narrativo apunta a una cisterna, no simplemente a un pozo genérico. «Desde la cisterna» conserva el valor locativo de מִן y evita una redundancia pesada con «sacar... de la cisterna». Dado que el verbo anterior ya expresa el movimiento de salida, «desde» suena más fluido y fiel.
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: quedó
  alternatives_spanish:
  - permaneció
  - se quedó
  - estuvo
  lexicon: HALOT
  rationale: Aquí ישׁב indica que Jeremías siguió estando en un lugar después del rescate. «Quedó» comunica ese estado resultante con naturalidad narrativa. «Permaneció» también sería posible, pero resulta más formal y algo más pesado.
- source_word: בַּחֲצַר
  english_pob_choice: in the court
  chosen_spanish: en el patio
  alternatives_spanish:
  - en la corte
  - en el atrio
  - en el patio interior
  lexicon: HALOT
  rationale: חָצֵר puede traducirse por «patio» o «atrio». En este contexto de detención vigilada, «patio» comunica mejor el espacio físico concreto en español moderno. «Atrio» sería más eclesiástico y menos transparente.
- source_word: הַמַּטָּרָה
  english_pob_choice: of the guard
  chosen_spanish: de la guardia
  alternatives_spanish:
  - de la custodia
  - del guardia
  - del guardhouse
  lexicon: HALOT
  rationale: La expresión alude al área vigilada de custodia. «De la guardia» mantiene el vínculo con vigilancia y detención sin introducir «prisión» ni «cuartel» como especificaciones no obligadas por el hebreo. En español, esta forma reproduce bien el sentido de un lugar bajo custodia.
translation_notes:
  revision_awareness: The latest revision pass reports no changes needed and a high-agreement cross-check verdict, so this draft follows the established POB sense decisions without introducing new textual or lexical revisions.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino como norma del proyecto, pero este versículo no lo contiene.
  - Se evita «SEÑOR» o «prisión» como sustitutos interpretativos no requeridos por el hebreo.
  - La imagen de extracción física se mantiene con dos verbos coordinados («sacaron» / «lo hicieron subir») para reflejar la acción hebrea sin sobrecargar el español.
  - «Patio de la guardia» reproduce de manera breve y publicable la idea del área custodiada mencionada en el texto fuente.
