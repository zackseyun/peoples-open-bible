translation:
  language: es
  text: Entonces el padre de la joven y su madre tomarán y presentarán las pruebas de la virginidad de la joven[a] ante los ancianos de la ciudad, en la puerta de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «las virginidades de la joven», un giro idiomático que en este caso legal alude a las señales o pruebas presentadas como evidencia de virginidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - deberán tomar
  - han de tomar
  lexicon: HALOT
  rationale: En el contexto jurídico, el perfecto con waw funciona como instrucción futura. «Tomarán» conserva el valor procedimental y suena natural en español legal.
- source_word: אֲבִי הַנַּעַר וְאִמָּהּ
  english_pob_choice: the young woman’s father and her mother
  chosen_spanish: el padre de la joven y su madre
  alternatives_spanish:
  - el padre de la muchacha y su madre
  - el padre de la doncella y su madre
  lexicon: HALOT
  rationale: נַעֲרָה designa aquí a una joven en edad casadera. «Joven» evita el matiz infantil de «muchacha» en algunos contextos y el arcaísmo de «doncella».
- source_word: וְהוֹצִיאוּ
  english_pob_choice: bring out
  chosen_spanish: sacarán
  alternatives_spanish:
  - presentarán
  - traerán
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir o llevar afuera para presentar una evidencia. «Sacarán» reproduce esa acción concreta y legal.
- source_word: אֶת בְּתוּלֵי הַנַּעַר
  english_pob_choice: the evidence of the young woman’s virginity
  chosen_spanish: las pruebas de la virginidad de la joven
  alternatives_spanish:
  - los signos de la virginidad de la joven
  - la evidencia de la virginidad de la joven
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «las virginidades de la joven», un idiomatismo jurídico. «Pruebas» mantiene el valor probatorio sin forzar un literalismo oscuro.
- source_word: אֶל זִקְנֵי הָעִיר
  english_pob_choice: to the elders of the city
  chosen_spanish: a los ancianos de la ciudad
  alternatives_spanish:
  - ante los ancianos de la ciudad
  - para los ancianos de la ciudad
  lexicon: HALOT
  rationale: «Ancianos» reproduce el término de autoridad local y judicial. «A» conserva el movimiento hacia ese cuerpo de jueces.
- source_word: הַשַּׁעְרָה
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - a la puerta
  - en la puerta de la ciudad
  lexicon: HALOT
  rationale: El hebreo apunta al lugar de reunión y juicio en la entrada de la ciudad. «Puerta» es más breve y natural en español; el contexto ya aporta la función cívico-judicial.
translation_notes:
  revision_awareness: Se mantuvo la lectura jurídica y la fuerza procedimental del hebreo sin suavizar el idiomatismo de בְּתוּלֵי. No hubo revisiones aplicadas en el pasaje base, y la redacción española sigue de cerca la decisión auditada en inglés.
  spanish_consistency_notes:
  - Se prefirió «joven» para נַעֲרָה, coherente con la edad matrimonial implícita en el contexto legal.
  - Se mantuvo «ancianos» para זִקְנֵי, que en este marco funciona como autoridad judicial local y no como simple referencia etaria.
  - «Puerta» se conserva como lugar cívico-jurídico, siguiendo el sentido funcional del pasaje.
