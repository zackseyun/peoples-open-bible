review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y la línea del English POB: oír desde el cielo/la morada, responder al extranjero, propósito universal de conocer el nombre de Dios, temerle como Israel, y saber que su nombre está sobre la casa. Sin embargo, en el último miembro el español «es invocado sobre esta casa» se aleja del valor principal del hebreo נִקְרָא עַל, que aquí expresa que la casa lleva/ostenta el nombre de Dios, no que la gente lo invoque sobre ella.'
  spanish_quality_summary: 'El español es generalmente claro y digno. Hay dos mejoras menores de naturalidad y precisión: «desde el cielo» suena más idiomático en español bíblico que «desde los cielos» en este contexto, y «como tu pueblo Israel» queda algo elíptico; conviene explicitar «lo hace» para reflejar la comparación verbal del sentido. La nota al pie también debe corregirse para corresponder al idiomático hebreo y a la alternativa documentada por el English POB.'
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «El extranjero», «tu nombre», «te teman» y «esta casa» están bien alineados. La principal desalineación léxica es usar «invocado» para נִקְרָא עַל; mejor «es llamado sobre» en el texto con nota que explique la opción interpretativa «lleva tu nombre».
  issues:
  - severity: high
    issue: «tu nombre es invocado sobre esta casa» traduce de forma inexacta el modismo נִקְרָא עַל
    rationale: El hebreo pasivo «tu nombre es llamado sobre esta casa» señala pertenencia/designación por el nombre divino. «Invocado» introduce la idea de invocación cultual, distinta del sentido principal y más alejada del English POB auditado.
  - severity: medium
    issue: «desde los cielos» es menos natural que «desde el cielo» para מִן הַשָּׁמַיִם en español bíblico corriente
    rationale: Aunque el hebreo es plural morfológico, tanto el English POB como el uso idiomático en español favorecen el singular colectivo cuando se refiere a la morada divina.
  - severity: low
    issue: «como tu pueblo Israel» queda algo incompleto en español
    rationale: El sentido comparativo es ‘como lo hace tu pueblo Israel’. Añadir el verbo mejora la legibilidad sin apartarse del original.
  - severity: low
    issue: La nota al pie actual explica el hebreo literalmente, pero el texto no refleja esa literalidad
    rationale: Si el texto revisado dice «es llamado sobre», la nota debe conservar la alternativa interpretativa; si no, hay desajuste entre texto y nota.
