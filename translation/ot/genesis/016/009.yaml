id: GEN.16.9
reference: Genesis 16:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הּ֙ מַלְאַ֣ךְ יְהוָ֔ה שׁ֖וּבִי אֶל גְּבִרְתֵּ֑/ךְ וְ/הִתְעַנִּ֖י תַּ֥חַת יָדֶֽי/הָ־׃
translation:
  text: Then the angel of Yahweh said to her[c][b][a], “Return to your mistress and humble yourself under her hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “humble yourself under her hand” or “accept affliction under her authority.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: “under her hand,” meaning under her authority.'
    reason: cultural_note
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in Genesis narrative with divine encounter language, 'angel' is the most natural English rendering. יְהוָה is rendered 'the LORD' per doctrine default for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שׁוּבִי
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: Imperative feminine singular from שוב. 'Return' is a clear, direct rendering that preserves the command's force without unnecessary expansion.
- source_word: גְּבִרְתֵּךְ
  chosen: your mistress
  alternatives:
  - your lady
  - your mistress/owner
  lexicon: HALOT
  rationale: The noun refers to a female superior or mistress. 'Mistress' best fits the social hierarchy in the Hagar-Sarai context and is more precise than the vaguer 'lady.'
- source_word: וְהִתְעַנִּי
  chosen: submit yourself
  alternatives:
  - humble yourself
  - allow yourself to be afflicted
  lexicon: HALOT
  rationale: The Hitpael imperative of ענה here carries the sense of accepting a humbled or subordinate position. 'Submit yourself' communicates the reflexive force and the social sense in context better than the potentially misleading 'be afflicted,' while 'humble yourself' is possible but less explicit about the relational submission involved.
- source_word: תַּחַת יָדֶיהָ
  chosen: under her hand
  alternatives:
  - under her authority
  - under her power
  lexicon: HALOT
  rationale: The idiom literally reads 'under her hand.' Retaining 'under her hand' preserves the Hebrew imagery while remaining understandable in English; it also conveys authority/subjection without over-paraphrasing.
