translation:
  language: es
  text: Después de que volví a mi reino y me senté en el trono de mis padres[a], y tomé el control del gobierno, y aplasté a Demetrio y llegué a dominar nuestra tierra,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el trono de mis antepasados». El griego dice literalmente «el trono de mis padres», una expresión dinástica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεὶ
  english_pob_choice: After
  chosen_spanish: Después de que
  alternatives_spanish:
  - Cuando
  - Ya que
  lexicon: LSJ
  rationale: En este contexto narrativo y real, la partícula introduce la circunstancia previa inmediata. 'Después de que' conserva el valor temporal del inglés POB sin volverlo causal de manera indebida.
- source_word: ἀνέστρεψα
  english_pob_choice: returned
  chosen_spanish: volví
  alternatives_spanish:
  - regresé
  - retorné
  lexicon: LSJ
  rationale: Con εἰς τὴν βασιλείαν μου, el verbo expresa volver al propio dominio. 'Volví' es natural en español y mantiene el sentido de regreso al reino.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - realeza
  - dominio
  lexicon: LSJ
  rationale: Aquí el término refiere al ámbito político-territorial del rey. 'Reino' es el equivalente más directo y claro en español.
- source_word: ἐκάθισα ἐπὶ θρόνου πατέρων μου
  english_pob_choice: sat on the throne of my fathers
  chosen_spanish: me senté en el trono de mis padres[a]
  alternatives_spanish:
  - me senté en el trono de mis antepasados
  - tomé asiento en el trono de mis padres
  lexicon: LSJ
  rationale: Conservo el giro dinástico literal 'padres' porque el griego dice 'de mis padres' y la expresión tiene fuerza hereditaria. La nota aclara la posible lectura idiomática de 'antepasados'.
- source_word: ἐκράτησα τῆς ἀρχῆς
  english_pob_choice: took control of the rule
  chosen_spanish: tomé el control del gobierno
  alternatives_spanish:
  - asumí la autoridad
  - tomé posesión del poder
  lexicon: LSJ
  rationale: κρατέω con genitivo expresa dominio o control sobre algo. En español, 'tomé el control del gobierno' comunica la idea de ejercer autoridad efectiva sin cargar necesariamente una valoración negativa de usurpación.
- source_word: συνέτριψα
  english_pob_choice: crushed
  chosen_spanish: aplasté
  alternatives_spanish:
  - trituré
  - destrocé
  - derroté
  lexicon: LSJ
  rationale: El verbo es enérgico y militar. 'Aplasté' conserva la intensidad de 'crushed' mejor que una simple 'derroté'.
- source_word: τὸν Δημήτριον
  english_pob_choice: Demetrius
  chosen_spanish: a Demetrio
  alternatives_spanish:
  - Demetrio
  lexicon: LSJ
  rationale: Se conserva el nombre propio en su forma española habitual y con la preposición personal requerida por el verbo en español.
- source_word: ἐπεκράτησα τῆς χώρας ἡμῶν
  english_pob_choice: gained control of our land
  chosen_spanish: obtuvé el dominio de nuestra tierra
  alternatives_spanish:
  - me impuse sobre nuestra tierra
  - me adueñé de nuestra tierra
  lexicon: LSJ
  rationale: El verbo expresa predominio o control efectivo. 'Obtuvé el dominio de nuestra tierra' mantiene el matiz político-militar y evita anacronismos de 'país'.
theological_decisions:
- issue: θρόνος πατέρων μου como expresión dinástica
  english_pob_reading: my fathers' throne / my ancestors' throne
  chosen_spanish_reading: el trono de mis padres
  alternative_spanish_readings:
  - el trono de mis antepasados
  rationale: La frase es una fórmula dinástica hereditaria, no una referencia doctrinal. Mantener 'padres' conserva la textura literal del griego y la reivindicación de sucesión familiar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El inglés auditado pasó de 'took hold of the rule' a 'took control of the rule' para naturalidad. En español, 'tomé el control del gobierno' recoge esa decisión revisada con un equivalente idiomático y mantiene el tono político-militar del verso.
  spanish_consistency_notes:
  - Se prefirió 'reino' para βασιλεία y 'gobierno' para ἀρχή para evitar mezclar un dominio territorial con la autoridad de mando.
  - Se mantuvo el nombre propio 'Demetrio' con acusativo español 'a Demetrio'.
  - Se conservó la metáfora bélica de 'aplasté' para συνέτριψα, coherente con el énfasis del texto griego.
  - La nota de pie de página marca solo la alternativa léxica relevante del sintagma dinástico, sin sobrecargar el texto principal.
