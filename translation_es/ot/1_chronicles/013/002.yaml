  to: 'Y David dijo a toda la asamblea de Israel: «Si les parece bien[a], y si proviene de Yahvé nuestro Dios, enviemos aviso a nuestros hermanos que permanecen en todas las tierras de Israel, y también a los sacerdotes y a los levitas que están con ellos en las ciudades de sus tierras de pastoreo[b], para que se reúnan con nosotros».'
  rationale: Se recolocó la nota sobre la expresión idiomática hebrea al lugar correcto dentro del texto. Se reemplazó «ejidos» por «tierras de pastoreo» para reflejar mejor מִגְרְשֵׁיהֶם en un español neutral y conforme al razonamiento léxico documentado. Además, se hicieron ajustes leves de fluidez («enviemos aviso», «que permanecen») sin cambiar el sentido.
