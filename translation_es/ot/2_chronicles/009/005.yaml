translation:
  language: es
  text: 'Entonces ella dijo al rey[a]: «Era verdad lo que oí en mi tierra acerca de tus palabras y de tu sabiduría»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Verdadero era el asunto que oí en mi tierra acerca de tus asuntos y de tu sabiduría». Lit. «Verdad [es/era] la palabra/el asunto...»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then she said
  chosen_spanish: Entonces ella dijo
  alternatives_spanish:
  - Y ella dijo
  - Entonces dijo ella
  lexicon: HALOT
  rationale: La forma narrativa consecutiva introduce la siguiente acción en secuencia; «Entonces» conserva ese avance. «Ella» explicita el sujeto para una lectura clara en español sin cambiar el sentido.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey mismo
  - ante el rey
  lexicon: HALOT
  rationale: El hebreo marca el destinatario con אֶל; «al rey» es directo y natural en español. «Ante el rey» sugeriría una escena distinta y no es necesario.
- source_word: אֱמֶת הַדָּבָר
  english_pob_choice: The report ... was true
  chosen_spanish: Verdad es la palabra
  alternatives_spanish:
  - Es verdad la palabra
  - La noticia era verdadera
  - Verdadero es el asunto
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente dice «verdad [es] la palabra/materia». En español, «Verdad es la palabra» conserva la tensión léxica entre דָּבָר como «palabra/materia/cosa» y evita convertirlo por completo en «noticia» o «informe», que serían interpretativos. Se mantiene así la afirmación de veracidad sin borrar la ambigüedad del original.
- source_word: אֲשֶׁר שָׁמַעְתִּי
  english_pob_choice: that I heard
  chosen_spanish: que oí
  alternatives_spanish:
  - que escuché
  - que había oído
  lexicon: HALOT
  rationale: «Oí» reproduce con naturalidad el perfecto hebreo en este contexto narrativo. «Escuché» también sería posible, pero «oí» es más breve y fiel al hecho de haber recibido el informe.
- source_word: בְּאַרְצִי
  english_pob_choice: in my own land
  chosen_spanish: en mi tierra
  alternatives_spanish:
  - en mi país
  - en mi propia tierra
  lexicon: HALOT
  rationale: «Tierra» conserva el registro bíblico y el vínculo con el hebreo אַרְצִי. No se añade «propia» porque el posesivo ya está presente y la intensificación no es obligatoria en español.
- source_word: עַל דְּבָרֶיךָ
  english_pob_choice: about your words
  chosen_spanish: acerca de tus palabras
  alternatives_spanish:
  - sobre tus palabras
  - acerca de tus asuntos
  - sobre tus asuntos
  lexicon: HALOT
  rationale: El hebreo דְּבָרֶיךָ puede significar «palabras» o «asuntos». El POB inglés eligió «your words», y el español mantiene esa línea con «tus palabras», dejando abierta la posible referencia amplia sin sustituirla por un término más interpretativo.
- source_word: וְעַל חָכְמָתֶךָ
  english_pob_choice: and your wisdom
  chosen_spanish: y acerca de tu sabiduría
  alternatives_spanish:
  - y tu sabiduría
  - y sobre tu sabiduría
  lexicon: HALOT
  rationale: «Sabiduría» traduce directamente חָכְמָה y preserva el tema del pasaje. «Acerca de» coordina con la frase anterior y ayuda a entender que lo oído trataba tanto de las palabras como de la sabiduría de Salomón.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura aprobada en inglés y respeta el estado de revisión sin introducir cambios textuales adicionales. Se preserva la ambigüedad de דָּבָר con una formulación española que suena natural pero no expande el sentido más allá del hebreo y del audit trail en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece el nombre divino.
  - «Sabiduría» se mantiene de forma consistente para חָכְמָה.
  - Se conserva el tono narrativo y el paralelismo semántico entre «palabras» y «sabiduría».
