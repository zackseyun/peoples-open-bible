translation:
  language: es
  text: Entonces le harán lo mismo que él tenía pensado hacer a su hermano[a]. Así extirparás el mal de en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a su prójimo”; el hebreo dice literalmente “a su hermano”, término de comunidad del pacto en este contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: you shall do
  chosen_spanish: harán
  alternatives_spanish:
  - entonces harán
  - deberán hacer
  lexicon: HALOT
  rationale: La forma verbal con valor consecutivo en este contexto legal se expresa naturalmente en español con futuro de mandato/resultado. Se evita una calca pesada y se conserva la fuerza normativa de la instrucción.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El referente es el testigo falso en el contexto inmediato. En español, 'hacer con él' reproduce con naturalidad la relación de sanción dirigida a la persona afectada por el castigo judicial.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: lo mismo que
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: La comparación medida-por-medida queda bien expresada con 'lo mismo que', que mantiene la correspondencia judicial sin sonar mecánica.
- source_word: זָמַם
  english_pob_choice: he intended
  chosen_spanish: había intentado
  alternatives_spanish:
  - había planeado
  - había maquinado
  lexicon: HALOT
  rationale: En este marco legal, זָמַם puede abarcar intento o planificación hostil. 'Había intentado' conserva la idea de propósito previo sin añadir una carga interpretativa más fuerte que la evidencia directa.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - cometer
  - realizar
  lexicon: HALOT
  rationale: El infinitivo complemento se traduce de forma directa por 'hacer', que resulta natural en español dentro de la construcción 'intentar hacer a alguien'.
- source_word: לְאָחִיו
  english_pob_choice: to his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su prójimo
  - a su semejante
  - a su fellow
  lexicon: HALOT
  rationale: Se conserva el término de parentesco/cercanía del hebreo y la decisión POB de mantener 'hermano' como forma representativa en este contexto comunitario-legal, sin neutralizarlo en el texto principal.
- source_word: וּבִעַרְתָּ
  english_pob_choice: So you shall purge
  chosen_spanish: Así extirparás
  alternatives_spanish:
  - y purgarás
  - así eliminarás
  lexicon: HALOT
  rationale: בער en fórmulas deuteronómicas expresa remover por completo el mal de la comunidad. 'Extirparás' transmite mejor la fuerza de expulsión total y la seriedad judicial que 'purgar' en español moderno, sin perder el valor formulaico.
- source_word: הָרָע
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  lexicon: HALOT
  rationale: La expresión formulaica deuteronómica se preserva con 'el mal', que mantiene tanto el peso moral como el carácter colectivo/judicial del término.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu medio
  - de tu interior
  lexicon: HALOT
  rationale: La imagen comunitaria se expresa de manera idiomática en español con 'de en medio de ti', equivalente claro y natural de la fórmula covenantal hebrea.
theological_decisions:
- issue: Termino de parentesco/covenantal אָחִיו en contexto legal
  english_pob_reading: his brother; covenant-community term in this legal context
  chosen_spanish_reading: a su hermano
  alternative_spanish_readings:
  - a su prójimo
  - a su fellow israelita
  rationale: La POB mantiene la forma masculina singular del hebreo y no la neutraliza en el texto principal. 'Hermano' conserva la literalidad y deja que el contexto legal amplíe el sentido a un miembro de la comunidad del pacto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de וּבִעַרְתָּ en la fórmula deuteronómica
  english_pob_reading: So you shall purge the evil from your midst
  chosen_spanish_reading: Así extirparás el mal de en medio de ti
  alternative_spanish_readings:
  - Así purgarás el mal de en medio de ti
  - Así eliminarás el mal de en medio de ti
  rationale: No se atenúa la fórmula legal de limpieza comunitaria. 'Extirpar' comunica con mayor fuerza la remoción total del mal, coherente con la función de la sentencia en el marco deuteronómico.
  doctrine_reference: Deuteronomic holiness/judicial formula usage (cf. repeated refrain in Deuteronomy)
- issue: Correspondencia punitiva 'just as' en un caso de falso testimonio
  english_pob_reading: just as he intended to do
  chosen_spanish_reading: lo mismo que él había intentado hacer
  alternative_spanish_readings:
  - tal como él había planeado hacer
  - así como él había querido hacer
  rationale: Se conserva la lógica de medida por medida sin convertirla en una paráfrasis moralizante. El español refleja la intención previa del malhechor como base de la pena.
  doctrine_reference: Lex talionis / judicial reciprocity in legal context
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de alta concordancia del auditorío inglés y la ausencia de revisiones aplicadas. La redacción española sigue de cerca las decisiones léxicas del POB inglés, pero ajusta la fórmula final a un español natural y publicable, especialmente en la cláusula de remoción del mal.
  spanish_consistency_notes:
  - Se mantiene 'hermano' en el texto principal, con nota que explicita la alternativa comunitaria sin neutralizar el término.
  - Se evita 'SEÑOR' y no hay necesidad de introducir vocabulario divino en este versículo.
  - La fórmula legal final se traduce con un verbo fuerte ('extirpar') para conservar el peso deuteronómico de la expresión.
  - La puntuación divide con claridad las dos cláusulas del versículo y usa mayúscula inicial convencional en español.
