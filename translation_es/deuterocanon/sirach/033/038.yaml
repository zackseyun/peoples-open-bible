translation:
  language: es
  text: Porque hay amigo[a] por un tiempo, y ciertamente no permanecerá en el día de tu aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hay un amigo cuando le conviene» o «a su tiempo», destacando la idea de una amistad que dura solo mientras las condiciones son favorables.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλος
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  lexicon: BDAG
  rationale: φίλος designa aquí a una persona amiga o cercana. «Amigo» es el equivalente natural y directo en español, y conserva la observación del texto sobre una amistad condicionada por la conveniencia.
- source_word: ἐν καιρῷ αὐτοῦ
  english_pob_choice: in his own time
  chosen_spanish: en su propio tiempo
  alternatives_spanish:
  - a su tiempo
  - cuando le conviene
  - por un tiempo
  lexicon: BDAG
  rationale: καιρός apunta a un tiempo oportuno o conveniente. Con αὐτοῦ, la expresión puede referirse al tiempo propio del amigo o al momento que le resulta favorable. «En su propio tiempo» mantiene esa ambigüedad sin reducirla a una sola interpretación.
- source_word: οὐ μὴ παραμείνῃ
  english_pob_choice: he will certainly not remain
  chosen_spanish: ciertamente no permanecerá
  alternatives_spanish:
  - de ningún modo permanecerá
  - no se quedará
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo expresa una negación enfática. «Ciertamente no permanecerá» reproduce el énfasis y conserva la fuerza de permanencia/continuidad del verbo.
- source_word: ἐν ἡμέρᾳ θλίψεώς σου
  english_pob_choice: in the day of your distress
  chosen_spanish: en el día de tu angustia
  alternatives_spanish:
  - en el día de tu aflicción
  - cuando estés en apuro
  lexicon: BDAG
  rationale: θλῖψις puede significar angustia, aflicción o tribulación. «Angustia» comunica con claridad el peso de la situación y funciona bien en español bíblico actual; «día de tu angustia» conserva la expresión temporal idiomática.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en acuerdo general. Se conservó la ambigüedad de ἐν καιρῷ αὐτοῦ mediante una formulación española que no fuerza una lectura exclusivamente egoísta ni elimina la posibilidad de amistad circunstancial. No se introdujeron cambios de revisión relevantes respecto del pasaje auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - Se evitó «SEÑOR» como máscara, en coherencia con la política del proyecto cuando no aplica.
  - «Angustia» se eligió por fluidez y gravedad semántica, sin perder el sentido de θλίψις como aflicción o apuro.
