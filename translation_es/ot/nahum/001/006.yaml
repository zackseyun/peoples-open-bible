review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y de la POB inglesa: mantiene las dos preguntas retóricas de incapacidad ante la ira divina, conserva la metáfora de la ira derramada como fuego y traduce adecuadamente la cláusula final con agencia directa («por él»). Sin embargo, hay dos desajustes relevantes con la evidencia auditada: (1) el texto español usa «sostenerse» para יַעֲמוֹד, que se aleja de la imagen más simple y paralela de «estar en pie/stand» preservada por la POB; (2) la nota [a] no corresponde al punto donde la POB inglesa documentó alternativas. La nota existente sobre «la roca» no está apoyada por el paquete fuente ni por la auditoría inglesa, mientras que faltan las alternativas relevantes sobre las dos preguntas y/o sobre «rocas/peñascos/riscos».'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «En el ardor de su ira» funciona bien, y «Su furor se derrama como fuego» es legible. No obstante, «podrá sostenerse» suena algo interpretativo y menos idiomáticamente paralelo que «podrá mantenerse en pie» o «podrá estar en pie». Además, las notas al pie actuales introducen una posibilidad no documentada y por eso reducen la calidad editorial, aunque la redacción principal sigue siendo bastante buena.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. La variedad «indignación / ira / furor» está bien alineada con la decisión teológica inglesa de no aplanar los términos de ira. «Por él» también sigue la revisión inglesa más reciente. La principal corrección requerida es de precisión léxica y de aparato crítico, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: «podrá sostenerse» para יַעֲמוֹד
    rationale: Aunque comunica resistencia, desplaza la imagen básica de «estar en pie/stand» que la POB quiso conservar en paralelismo con «levantarse». «Mantenerse en pie» preserva mejor la forma y la fuerza retórica.
  - severity: high
    issue: La nota [a] sobre «la roca» no está sustentada por la auditoría fuente
    rationale: La POB inglesa documenta alternativas para las preguntas iniciales, para «rocas/cliffs/crags» y para la preposición final, pero no para un singular colectivo «la roca». Esa nota introduce evidencia no auditada.
  - severity: medium
    issue: Falta reflejar adecuadamente las alternativas significativas preservadas por la POB
    rationale: Si se usan notas, deben corresponder a alternativas reales del expediente. Aquí conviene conservar al menos la alternativa de las preguntas y la de «peñascos/riscos», además de la ambigüedad de «por/de él» en la cláusula final.
