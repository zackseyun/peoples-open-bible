    rationale: Aunque intenta reflejar el hebreo, en español contemporáneo tiene una asociación vulgar muy fuerte que distrae y daña la legibilidad digna requerida. Debe sustituirse por una adaptación menos problemática.
  - severity: medium
    issue: '''Shumatitas'' usa una grafía ajena al español general.'
    rationale: La secuencia inicial 'sh' no es natural en español bíblico corriente. 'Sumatitas' mantiene mejor la legibilidad sin alejarse significativamente del nombre fuente.
  - severity: low
    issue: La decisión principal 'familias' se aparta del énfasis del POB inglés en 'clans', aunque está mitigada por la nota.
    rationale: No constituye infidelidad, porque מִשְׁפְּחוֹת puede expresarse como 'familias' en contexto genealógico y la nota conserva la alternativa. Se puede mantener.
  revised_spanish_text: 'Y las familias de Quiriat-jearim: los itritas[a], los futitas, los sumatitas y los misraítas[b]. De estos salieron los zoratitas y los estaolitas.'
