translation:
  language: es
  text: 'Ahora bien, el rey de Aram había ordenado a los comandantes de los carros de guerra que eran suyos, diciendo: «No peleen ni con pequeño ni con grande[a], sino con el rey de Israel solamente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «No peleen con nadie, pequeño o grande, sino solamente con el rey de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ אֲרָם
  english_pob_choice: Now the king of Aram
  chosen_spanish: Ahora el rey de Aram
  alternatives_spanish:
  - Y el rey de Aram
  - Pero el rey de Aram
  lexicon: HALOT
  rationale: La conjunción inicial se vierte de manera narrativa con «Ahora» para introducir el trasfondo de la orden sin perder la conexión discursiva. «Aram» se conserva como nombre propio transliterado.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había ordenado
  alternatives_spanish:
  - ordenó
  - había mandado
  lexicon: HALOT
  rationale: El pluscuamperfecto español expresa que la orden antecede a la acción del contexto inmediato. «Ordenado» conserva el valor de mandato explícito.
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the commanders of the chariots
  chosen_spanish: los comandantes de los carros
  alternatives_spanish:
  - los capitanes de los carros
  - los comandantes de la fuerza de carros
  - los jefes de los carros
  lexicon: HALOT
  rationale: שָׂרֵי denota oficiales o comandantes; הָרֶכֶב se refiere al arma de carros. «Comandantes de los carros» mantiene la imagen militar con español natural.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that were his
  chosen_spanish: que eran suyos
  alternatives_spanish:
  - que le pertenecían
  - bajo su mando
  lexicon: HALOT
  rationale: La cláusula relativa indica pertenencia o subordinación. «Que eran suyos» es breve y fiel sin forzar una interpretación más específica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Es el introductorio estándar del discurso directo.
- source_word: לֹא תִּלָּחֲמוּ
  english_pob_choice: Do not fight
  chosen_spanish: No peleen
  alternatives_spanish:
  - No combatan
  - No hagan guerra
  lexicon: HALOT
  rationale: El valor prohibitivo se expresa de forma natural en imperativo negativo plural. «Peleen» es claro y fluido en español moderno, aunque «combatan» es una alternativa más formal.
- source_word: אֶת הַקָּטֹן אֶת הַגָּדוֹל
  english_pob_choice: with either small or great
  chosen_spanish: ni con pequeño ni con grande
  alternatives_spanish:
  - con pequeño o grande
  - con nadie, pequeño o grande
  - ni con el pequeño ni con el grande
  lexicon: HALOT
  rationale: La secuencia hebrea contrasta a los de menor y mayor rango. «Ni con pequeño ni con grande» conserva la pareja idiomática y la fuerza inclusiva, sin sobreparafrasear a «nadie».
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - sino únicamente
  - excepto
  - pero solo
  lexicon: HALOT
  rationale: La construcción marca excepción exclusiva; «sino solo» reproduce bien esa restricción en español.
- source_word: אֶת מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: with the king of Israel
  chosen_spanish: con el rey de Israel
  alternatives_spanish:
  - contra el rey de Israel
  - al rey de Israel
  lexicon: HALOT
  rationale: Aunque el verbo implícito es de combate y podría sugerir «contra», se prefiere «con» para mantener la correspondencia con la formulación hebrea y con la decisión inglesa de no intensificar la oposición más allá de lo necesario.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por sí solo
  - solamente
  lexicon: HALOT
  rationale: El término expresa exclusividad. «Solo» comunica que el rey de Israel es el objetivo único del ataque.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de POB: se mantuvo la estructura narrativa inicial, el pluscuamperfecto para la orden previa, la pareja idiomática «pequeño/grande» y la exclusividad final. La principal decisión de español fue conservar la restricción con «ni... ni...» para que la fórmula siga sonando natural sin perder el matiz inclusivo del hebreo.'
  spanish_consistency_notes:
  - Se emplea «rey de Aram» y no una glosa equivalente, por consistencia con la terminología POB y el nombre propio del reino.
  - Se mantuvo «rey de Israel» en singular y con artículo definido, como referente del objetivo exclusivo de la orden.
  - «Carros» traduce הָרֶכֶב con un término castellano comprensible; no se amplía a «carros de guerra» porque el contexto ya es militar y el hebreo es breve.
