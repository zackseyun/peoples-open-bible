translation:
  language: es
  text: Yahvé juzgue entre mí y ti, y Yahvé me vengue[a] contra ti; pero mi mano no será contra ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me vengue de ti». Con «vengar», el complemento puede expresarse en español de distintas maneras; aquí «contra ti» explicita con más claridad el objeto de la represalia.
    reason: lexical_alternative
  - marker: b
    text: Lit. «mi mano no será en ti/sobre ti»; en hebreo es una expresión idiomática para decir que David no actuará hostil o violentamente contra Saúl.
    reason: cultural_note
lexical_decisions:
- source_word: יִשְׁפֹּט
  english_pob_choice: May ... judge
  chosen_spanish: juzgue
  alternatives_spanish:
  - que juzgue
  - pueda juzgar
  lexicon: HALOT
  rationale: El yiqtol funciona aquí como deseo o invocación; en español, el subjuntivo presente expresa bien esa fuerza optativa sin volverlo meramente futuro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como nombre propio, según la convención del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: בֵּינִי וּבֵינֶךָ
  english_pob_choice: between me and you
  chosen_spanish: entre tú y yo
  alternatives_spanish:
  - entre nosotros
  - entre nosotros dos
  lexicon: HALOT
  rationale: La relación judicial directa se mantiene. En español, el orden natural coloca primero al interlocutor y luego al hablante, sin perder el contraste personal explícito.
- source_word: וּנְקָמַנִי
  english_pob_choice: and may ... avenge me
  chosen_spanish: y Yahvé me vengue
  alternatives_spanish:
  - y Yahvé tome venganza por mí
  - y Yahvé me haga justicia
  lexicon: HALOT
  rationale: Se conserva el campo semántico de נקם con 'vengue', que refleja el peso léxico de venganza/represalia. 'Hacer justicia' o 'vindicar' suavizarían demasiado el término.
- source_word: מִמֶּךָּ
  english_pob_choice: on you
  chosen_spanish: de ti
  alternatives_spanish:
  - contra ti
  - sobre ti
  lexicon: HALOT
  rationale: Con נקם, la preposición comunica el objeto de la represalia. En español, 'de ti' mantiene la estructura más cercana al hebreo y funciona bien con 'vengue'.
- source_word: וְיָדִי
  english_pob_choice: but my hand
  chosen_spanish: pero mi mano
  alternatives_spanish:
  - y mi mano
  - mas mi mano
  lexicon: HALOT
  rationale: '''Mano'' se conserva literalmente como idiomática para acción personal o violenta. ''Pero'' explicita el contraste con la acción de Yahvé y la renuncia de David.'
- source_word: לֹא תִהְיֶה בָּךְ
  english_pob_choice: will not be against you
  chosen_spanish: no estará sobre ti
  alternatives_spanish:
  - no será contra ti
  - no te tocará
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de una mano puesta sobre alguien como acción hostil, evitando una paráfrasis excesiva. 'No estará contra ti' sería más explícito pero menos cercano a la imagen hebrea.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura adoptada mantiene el nombre personal de Dios y evita la sustitución por un título. Esto conserva la identidad del hablante divino en el contexto del juramento/invocación.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נקם en la petición de David
  english_pob_reading: David appeals for the LORD to avenge him rather than taking personal vengeance himself
  chosen_spanish_reading: David pide que Yahvé lo vengue, sin tomar él mismo la represalia
  alternative_spanish_readings:
  - David pide que Yahvé lo vindique
  - David pide una justicia general
  rationale: La versión española conserva la tensión entre la venganza divina solicitada y la renuncia explícita de David a actuar con su propia mano. No se diluye נקם en un término demasiado abstracto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail inglés, que mantiene la formulación natural de la venganza divina y la aclaración idiomática sobre la mano de David. No se introdujeron cambios que contradigan las decisiones léxicas o teológicas auditadas.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el contraste entre la acción divina y la no acción de David mediante «pero mi mano no estará sobre ti».
  - Se evita traducir נקם como simple «vindicar», para no borrar la tensión de venganza presente en el hebreo.
