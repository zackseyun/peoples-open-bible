revisions:
- from: ¡Clama a gran voz[a]; no te detengas! Alza tu voz como trompeta, y denuncia a mi pueblo[b] sus rebeliones, y a la casa de Jacob sus pecados.
  to: ¡Clama a gran voz; no te contengas! Alza tu voz como trompeta[a], y declara a mi pueblo su rebelión[b], y a la casa de Jacob sus pecados.
  rationale: Se reubicaron las notas en las palabras correctas según el audit trail inglés. Se ajustó 'denuncia' a 'declara' para reflejar mejor וְהַגֵּד, 'no te detengas' a 'no te contengas' para mayor precisión semántica, y 'sus rebeliones' a 'su rebelión' para un español más natural y más cercano al inglés POB, manteniendo la nota alternativa lexical.
  reviewer_model: gpt-5.4
