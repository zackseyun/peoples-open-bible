  glossary_alignment: 'Alinea bien con ''Yahvé'' para יהוה y con ''la palabra'' para דְּבַר. La principal desalineación es con el inglés auditado ''shepherds'': el español ''pastores'' es posible, pero aquí requiere ajuste para preservar mejor la metáfora y evitar una interpretación demasiado eclesiástica.'
