review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura concesiva del hebreo, la imagen hiperbólica de Babilonia elevándose a los cielos, el sentido militar de תְבַצֵּר, y preserva correctamente «Yahvé» para יְהוָה. Sin embargo, hay dos desajustes con el audit trail: el anclaje de notas está invertido respecto a las notas inglesas documentadas, y «contra ella» explicita más de lo que dice לָהּ, donde el inglés POB mantuvo el sentido formal «to her».'
  spanish_quality_summary: 'El español es claro y digno, pero «de mí vendrán destruidores contra ella» suena algo forzado en el orden y sobreinterpreta la preposición final. Una redacción más natural y más cercana al hebreo y al POB inglés es «vendrán a ella destructores de parte mía» o similar. También conviene alinear las notas: una sobre «los cielos» y otra sobre «la altura de su fuerza».'
  glossary_alignment: Correcto en el uso de «Yahvé». No hay otros términos doctrinales sensibles aquí. «Destructores» es aceptable para שֹׁדְדִים, aunque conviene preservar en nota la alternativa «saqueadores», que es la alternativa léxica documentada en el inglés.
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden a los mismos puntos que en el audit trail inglés.
    rationale: La nota inglesa [a] está en «the heavens» y la [b] en «from me»/más exactamente la expresión «the height of her strength» según el registro provisto. En el borrador español [a] está en «se eleve» y [b] en «poder», lo que rompe la trazabilidad documental.
  - severity: medium
    issue: «contra ella» sobreinterpreta לָהּ.
    rationale: El hebreo dice literalmente «a ella/para ella». Aunque el contexto es hostil, el POB inglés conservó la forma más directa «to her». En español se puede mantener «a ella» sin pérdida de claridad.
  - severity: low
    issue: «de mí vendrán» suena menos idiomático que una formulación con «de parte mía» o con orden más natural.
    rationale: «De mí» es formalmente posible, pero en español bíblico legible resulta más natural posponerlo o expresarlo como fuente/envío divino sin perder fidelidad.
  - severity: low
    issue: La nota léxica sobre שֹׁדְדִים falta en comparación con la documentación inglesa.
    rationale: El inglés preservó la alternativa «plunderers». En español conviene conservar «saqueadores» como alternativa, especialmente porque «destructores» amplía el sentido.
  revised_spanish_text: Aunque Babilonia se eleve hasta los cielos[a], y aunque fortifique la altura de su fuerza[b], vendrán a ella destructores de parte mía[c], declara Yahvé.
  revised_footnotes:
