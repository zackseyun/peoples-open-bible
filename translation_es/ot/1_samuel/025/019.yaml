translation:
  language: es
  text: 'Y dijo a sus criados: «Pasen delante de mí. Miren, yo vengo detrás de ustedes[a]». Pero no se lo dijo a su marido Nabal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "yo vengo tras ustedes".
    reason: lexical_alternative
lexical_decisions:
- source_word: לִנְעָרֶיהָ
  english_pob_choice: to her young men
  chosen_spanish: a sus mozos
  alternatives_spanish:
  - a sus jóvenes
  - a sus servidores
  - a sus muchachos
  lexicon: HALOT
  rationale: נַעַר puede abarcar “joven”, “mozo”, “sirviente” o “asistente” según el contexto. Aquí Abigail se dirige al grupo que va con ella y le lleva la delantera, así que “mozos” conserva el matiz de hombres jóvenes sin perder la función narrativa.
- source_word: עִבְרוּ
  english_pob_choice: Go on ahead
  chosen_spanish: Pasen delante de mí
  alternatives_spanish:
  - Vayan adelante
  - Pasen adelante
  - Crucen
  lexicon: HALOT
  rationale: El imperativo de עבר aquí expresa avanzar por delante. En español, “pasen delante de mí” comunica bien el movimiento espacial y evita el calco rígido.
- source_word: לְפָנַי
  english_pob_choice: ahead of me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - antes de mí
  - en frente de mí
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “ante mi rostro / delante de mí”. En español, “delante de mí” es la formulación más natural con un verbo de movimiento.
- source_word: הִנְנִי
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  - Aquí voy
  lexicon: HALOT
  rationale: Con el valor deíctico de הִנְנִי, el español necesita una llamada de atención. “Miren” conserva ese impulso discursivo mejor que “he aquí” o “mirad” en registro más arcaico.
- source_word: אַחֲרֵיכֶם בָּאָה
  english_pob_choice: I am coming behind you
  chosen_spanish: yo vengo detrás de ustedes
  alternatives_spanish:
  - voy detrás de ustedes
  - vengo después de ustedes
  - vengo tras ustedes
  lexicon: HALOT
  rationale: El hebreo enfatiza la posición espacial posterior. “Vengo detrás de ustedes” mantiene el sentido sin introducir la ambigüedad temporal de “después de”.
- source_word: וּלְאִישָׁהּ
  english_pob_choice: But she did not tell her husband
  chosen_spanish: Pero no se lo dijo a su marido
  alternatives_spanish:
  - Pero no se lo contó a su esposo
  - Y a su marido no se lo dijo
  - Pero no le dijo nada a su marido
  lexicon: HALOT
  rationale: אִישׁ con sufijo femenino se refiere naturalmente al marido. “Su marido” es más preciso y menos ambiguo que “su hombre”, y mantiene el contraste marcado por la conjunción.
- source_word: לֹא הִגִּידָה
  english_pob_choice: she did not tell
  chosen_spanish: no se lo dijo
  alternatives_spanish:
  - no lo contó
  - no se lo informó
  - no se lo declaró
  lexicon: HALOT
  rationale: Hiphil de נגד significa “decir / contar / informar”. En este contexto doméstico, “no se lo dijo” suena natural y conserva la idea de que Abigail ocultó la noticia o intención a Nabal.
- source_word: נָבָל
  english_pob_choice: Nabal
  chosen_spanish: Nabal
  alternatives_spanish:
  - Nabál
  lexicon: Transliteración propia
  rationale: Es nombre propio; se conserva la transliteración estable del proyecto.
theological_decisions:
- issue: Si el hebreo exige una lectura literal de la fórmula deíctica הִנְנִי o una equivalencia idiomática en español.
  english_pob_reading: Look, I am coming behind you.
  chosen_spanish_reading: Miren, yo vengo detrás de ustedes.
  alternative_spanish_readings:
  - He aquí, yo vengo detrás de ustedes
  - Vean, vengo tras ustedes
  rationale: 'No hay tensión doctrinal, pero sí una decisión retórica: el hebreo usa una forma enfática de auto-presentación. En español, “Miren” conserva la función pragmática sin sonar arcaico ni demasiado interpretativo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y ningún cambio necesario; este borrador sigue la lectura estable del POB inglés y ajusta solo la formulación española para naturalidad y precisión semántica.
  spanish_consistency_notes:
  - Se mantiene “Nabal” como nombre propio sin adaptación adicional.
  - Se evita “SEÑOR” u otra sustitución teológica porque el verso no contiene el tetragrámaton ni títulos divinos.
  - Se preserva el contraste narrativo entre lo dicho a los mozos y lo no dicho a Nabal con “Pero”.
  - El sujeto explícito “yo” refuerza la intención del hebreo sin sobrecargar el estilo.
