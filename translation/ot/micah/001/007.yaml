id: MIC.1.7
reference: Micah 1:7
source:
  edition: WLC
  text: וְ/כָל פְּסִילֶ֣י/הָ יֻכַּ֗תּוּ וְ/כָל אֶתְנַנֶּ֨י/הָ֙ יִשָּׂרְפ֣וּ בָ/אֵ֔שׁ וְ/כָל עֲצַבֶּ֖י/הָ אָשִׂ֣ים שְׁמָמָ֑ה כִּ֠י מֵ/אֶתְנַ֤ן זוֹנָה֙ קִבָּ֔צָה וְ/עַד אֶתְנַ֥ן זוֹנָ֖ה יָשֽׁוּבוּ־־־־׃
translation:
  text: All her carved images will be smashed[a], and all her prostitute’s wages will be burned with fire; all her idols I will make desolate. For from the wages of a prostitute she gathered them[c][b], and to the wages of a prostitute they will return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'graven images.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her prostitute’s wages'; the phrase refers metaphorically to wealth gained through idolatrous unfaithfulness.
    reason: cultural_note
  - marker: c
    text: Or 'they will again become a prostitute’s wages.'
    reason: alternative_reading
lexical_decisions:
- source_word: פְּסִילֶיהָ
  chosen: her carved images
  alternatives:
  - her graven images
  - her idols
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image fashioned by carving or hewing, especially an idol. 'Carved images' preserves the concrete sense better than the more traditional but archaic 'graven images.'
- source_word: יֻכַּתּוּ
  chosen: will be smashed
  alternatives:
  - will be beaten down
  - will be broken to pieces
  lexicon: HALOT
  rationale: The passive form conveys violent destruction. 'Will be smashed' is vivid, natural English and fits the judgment context.
- source_word: אֶתְנַנֶּיהָ
  chosen: her prostitute’s wages
  alternatives:
  - her harlot's hire
  - her wages
  lexicon: HALOT
  rationale: אֶתְנַן refers to payment for prostitution. 'Prostitute’s wages' is clear modern English and preserves the sexualized metaphor of illicit gain.
- source_word: יִשָּׂרְפוּ בָאֵשׁ
  chosen: will be burned with fire
  alternatives:
  - will be burned in the fire
  - will be consumed by fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with/in the fire.' 'Burned with fire' keeps the emphatic idiom without sounding overly wooden.
- source_word: עֲצַבֶּיהָ
  chosen: her idols
  alternatives:
  - her images
  - her fashioned idols
  lexicon: HALOT
  rationale: עָצָב in this context refers to idols/images. Since פְּסִילֶיהָ already carries the carved-image nuance, 'idols' here provides readable variation while preserving the referent; the semantic overlap is intentional in the Hebrew.
- source_word: אָשִׂים שְׁמָמָה
  chosen: I will make a desolation
  alternatives:
  - I will make desolate
  - I will lay waste
  lexicon: HALOT
  rationale: The first-person verb with the noun שְׁמָמָה expresses making something into a devastated ruin. 'I will make a desolation' preserves the nominal force and solemnity.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the announced judgment. 'For' fits the explanatory connection smoothly.
- source_word: מֵאֶתְנַן זוֹנָה
  chosen: from the wages of a prostitute
  alternatives:
  - from a prostitute's hire
  - from harlot's wages
  lexicon: HALOT
  rationale: The phrase is metaphorical for wealth acquired through spiritual prostitution/idolatry. 'Wages of a prostitute' is transparent and contemporary while preserving the metaphor.
- source_word: קִבָּצָה
  chosen: she gathered them
  alternatives:
  - she collected them
  - she amassed them
  lexicon: HALOT
  rationale: 'The feminine singular subject is Samaria/city personified. ''Gathered them'' is a straightforward rendering of קבץ and leaves the object implicit from context: the wealth/items just mentioned.'
- source_word: וְעַד אֶתְנַן זוֹנָה יָשׁוּבוּ
  chosen: and to the wages of a prostitute they will return
  alternatives:
  - and they will again become a prostitute's wages
  - and they will go back to harlot's hire
  lexicon: HALOT
  rationale: 'The clause states reversal: what was gained through illicit means will revert to the same sphere. ''Return'' is the plain sense of שוב, and ''to the wages of a prostitute'' preserves the metaphor without over-interpreting the mechanism.'
