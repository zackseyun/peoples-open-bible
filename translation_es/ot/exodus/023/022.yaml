revisions:
- from: Pero si [a] escuchas atentamente su voz y haces todo lo que yo hablo[b], entonces yo seré enemigo de tus enemigos y adversario de tus adversarios.
  to: Pero si obedeces diligentemente[a] su voz y haces todo lo que yo digo[b], entonces yo seré enemigo de tus enemigos y adversario de tus adversarios.
  rationale: Se ajusta el primer verbo para expresar mejor la obediencia implícita en שׁמע con «voz» en este contexto, y se reemplaza «yo hablo» por «yo digo» para lograr un español natural sin borrar el cambio de referente a la primera persona divina. También se mueve la nota [a] al verbo, que es donde recae la intensificación hebrea.
