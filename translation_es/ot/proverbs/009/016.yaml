revisions:
- from: '¿Quién[a] es simple, que se aparte para acá; y al que le falta entendimiento, ella le dice:'
  to: 'El que sea simple, que entre aquí; y al que le falta entendimiento[a], ella le dice:'
  rationale: Se reemplaza la interrogación por una fórmula relativa que refleja mejor el uso idiomático de מִי como invitación general; se mejora la naturalidad de יָסֻר הֵנָּה con «que entre aquí» en contexto; y se corrige el anclaje de la nota para que corresponda a חֲסַר לֵב.
