base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/007/031.yaml
  text: They have built the high places of Topheth[a], which is in the Valley of Ben-hinnom, to burn their sons and their daughters in the fire—something I did not command, nor did it come up in my heart.
