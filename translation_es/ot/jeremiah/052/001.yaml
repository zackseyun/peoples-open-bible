- from: Sedequías tenía veintiún años cuando comenzó a reinar[a], y reinó once años en Jerusalén[b]. Su madre se llamaba Hamutal, hija de Jeremías de Libna.
  to: Sedequías tenía veintiún años cuando llegó a ser rey[a], y reinó once años en Jerusalén. Su madre se llamaba Hamutal, hija de Jeremías de Libna[b].
  rationale: Se ajusta el texto principal a 'cuando llegó a ser rey' para que la nota [a] preserve una alternativa real y coherente con la auditoría inglesa sobre בְמָלְכוֹ. También se mueve la nota [b] a 'Libna' y se corrige su contenido a 'O “desde Libna”', reflejando adecuadamente la alternativa de מִלִּבְנָה sin redundancia.
