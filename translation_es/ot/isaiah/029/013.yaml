translation:
  language: es
  text: 'Y dijo el Señor: «Porque este pueblo se acerca con su boca y me honra con sus labios[a], pero su corazón está lejos de mí, y su temor hacia mí ha llegado a ser un mandamiento de hombres que se enseña[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su reverencia por mí» o «su adoración de mí»; el hebreo dice literalmente «su temor de mí».
    reason: lexical_alternative
  - marker: b
    text: O «un mandamiento humano aprendido/enseñado». La frase critica una devoción reducida a instrucción meramente humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: La forma aquí es un título divino de habla profética; en español natural y reverente, 'el Señor' reproduce el valor titular sin introducir el nombre propio donde el hebreo no lo da explícitamente.
- source_word: יַעַן כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la denuncia divina. 'Porque' es la forma causal más directa y fluida en español contemporáneo.
- source_word: נִגַּשׁ
  english_pob_choice: draws near
  chosen_spanish: se acerca
  alternatives_spanish:
  - se aproxima
  - se allega
  lexicon: HALOT
  rationale: El verbo expresa acercamiento; 'se acerca' mantiene el sentido básico y funciona de modo natural en español. El matiz de acercamiento ritual o relacional queda disponible por el contexto.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo aquí
  - estas personas
  lexicon: HALOT
  rationale: El singular colectivo hebreo se conserva como 'este pueblo', que suena formal y profético en español.
- source_word: בְּפִיו וּבִשְׂפָתָיו
  english_pob_choice: with its mouth and with its lips
  chosen_spanish: con su boca y me honra con sus labios
  alternatives_spanish:
  - con su boca y con sus labios
  - con la boca y con los labios
  lexicon: HALOT
  rationale: Se conserva el paralelismo entre boca y labios; el segundo 'con' puede omitirse en español para evitar pesadez sintáctica, tal como la auditoría inglesa ya hizo por fluidez. El posesivo singular concuerda con el colectivo 'pueblo'.
- source_word: כִּבְּדוּנִי
  english_pob_choice: honors me
  chosen_spanish: me honra
  alternatives_spanish:
  - me glorifica
  - me trata como digno de peso
  lexicon: HALOT
  rationale: כבד en este contexto denota honrar. 'Me honra' es el equivalente idiomático y evita sobreinterpretar el verbo.
- source_word: וְלִבּוֹ רִחַק מִמֶּנִּי
  english_pob_choice: its heart is far from me
  chosen_spanish: su corazón está lejos de mí
  alternatives_spanish:
  - su corazón se ha alejado de mí
  - su corazón está distante de mí
  lexicon: HALOT
  rationale: Se mantiene la contraposición entre exterioridad religiosa e interioridad distante. El hebreo es más dinámico, pero el español copula bien la condición resultante.
- source_word: וַתְּהִי
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha vuelto
  - ha sido
  lexicon: HALOT
  rationale: '''Ha llegado a ser'' preserva el valor resultativo y sugiere un proceso de corrupción o reducción de la piedad a una forma aprendida.'
- source_word: יִרְאָתָם אֹתִי
  english_pob_choice: their fear of me
  chosen_spanish: su temor de mí
  alternatives_spanish:
  - su reverencia hacia mí
  - su culto hacia mí
  lexicon: HALOT
  rationale: '''Temor'' conserva el núcleo léxico de יִרְאָה y la tensión teológica entre miedo, reverencia y piedad; no se neutraliza en ''reverencia'' en el texto principal.'
- source_word: מִצְוַת אֲנָשִׁים
  english_pob_choice: a commandment of men
  chosen_spanish: un mandamiento de hombres
  alternatives_spanish:
  - un mandamiento humano
  - un precepto de hombres
  lexicon: HALOT
  rationale: La construcción genitiva se refleja de modo bastante literal. 'Hombres' conserva el plural masculino genérico del hebreo, como en la auditoría inglesa.
- source_word: מְלֻמָּדָה
  english_pob_choice: that is taught
  chosen_spanish: instruido
  alternatives_spanish:
  - enseñado
  - aprendido
  lexicon: HALOT
  rationale: El participio pasivo de למד apunta a algo inculcado/enseñado. 'Instruido' comunica bien la idea de religión aprendida y transmitida como norma humana.
theological_decisions:
- issue: 'יִרְאָה aplicada a Dios: temor, reverencia o culto'
  english_pob_reading: their fear of me
  chosen_spanish_reading: su temor de mí
  alternative_spanish_readings:
  - su reverencia hacia mí
  - su adoración hacia mí
  rationale: 'Se preserva ''temor'' para no diluir la fuerza semántica ni la denuncia profética: la piedad externa puede conservar formas correctas y, sin embargo, carecer del temor real de Dios. Las alternativas quedan documentadas por si el lector necesita el matiz de reverencia o culto.'
  doctrine_reference: Translation philosophy §§3, 6
- issue: Reducción de la obediencia a instrucción humana
  english_pob_reading: a commandment of men that is taught
  chosen_spanish_reading: un mandamiento de hombres instruido
  alternative_spanish_readings:
  - un mandamiento de hombres enseñado
  - un mandamiento humano aprendido
  rationale: 'La frase conserva la crítica teológica central: lo que debería ser respuesta viva a Dios se ha convertido en norma meramente humana, recibida por enseñanza. ''Instruido'' deja abierta la idea de algo aprendido sin borrar el carácter de mandamiento.'
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la lectura resultativa ('has become') y las notas léxicas sobre יִרְאָה y מְלֻמָּדָה; la redacción española sigue esas decisiones y solo ajusta la sintaxis para una lectura fluida y publicable sin perder la tensión teológica.
  spanish_consistency_notes:
  - Se usa 'el Señor' como título divino en esta fórmula profética, coherente con el registro del pasaje.
  - '''temor de mí'' preserva el núcleo semántico de יִרְאָה y permite las alternativas explicativas en nota.'
  - '''mandamiento de hombres'' conserva el genitivo del hebreo y el matiz de crítica a una norma de origen humano.'
  - '''instruido'' intenta reflejar la pasividad de מְלֻמָּדָה sin caer en una paráfrasis excesiva.'
  - El posesivo singular ('su') sigue al colectivo hebreo 'este pueblo'.
