review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: las vestiduras santas de Aarón pasan a sus hijos en sucesión sacerdotal. Sin embargo, en dos puntos importantes desplaza el sentido documentado. En לְמָשְׁחָה בָהֶם, el hebreo y el rastro POB enfatizan que la unción ocurre mientras llevan las vestiduras; «con ellas» sugiere instrumento. En וּלְמַלֵּא בָם אֶת יָדָם, «investirlos con ellas» también vuelve a interpretar ב como instrumental, cuando el expediente inglés preserva más bien el sentido situacional «en ellas», aunque ya haya optado por una paráfrasis funcional del modismo.'
  spanish_quality_summary: El español es fluido y digno, pero «con ellas» en ambos sintagmas crea una lectura menos fiel. «Investirlos» es aceptable como español natural, aunque «ordenarlos» sería más cercano al expediente inglés; con todo, «investirlos en ellas» mantiene bien el matiz ritual y la relación con las vestiduras. También conviene armonizar «sagradas» con el valor de הקֹדֶשׁ como «santas» o «sagradas»; ambas son posibles, pero «santas» se alinea mejor con la terminología POB de ‘holy’.
  glossary_alignment: No hay conflicto con Yahvé/Mesías/etc. El punto terminológico principal es preservar el modismo sacerdotal מלא יד con una solución natural pero auditável. La revisión propuesta conserva «investirlos» con nota explicativa del hebreo «llenar la mano». Además, corrige la preposición para reflejar mejor בָהֶם / בָם como estado o situación («en ellas») en vez de instrumento («con ellas»).
  issues:
  - severity: high
    issue: «con ellas» para לְמָשְׁחָה בָהֶם
    rationale: El hebreo indica unción mientras visten las prendas, no unción por medio de las prendas. El propio expediente inglés subraya «in them» y no «with them».
  - severity: high
    issue: «con ellas» para וּלְמַלֵּא בָם אֶת יָדָם
    rationale: De nuevo se pierde el valor local/situacional de ב. La formulación actual sugiere que las vestiduras son instrumento de investidura, no el contexto vestimental en el que ocurre la instalación sacerdotal.
  - severity: medium
    issue: Desajuste parcial con la preferencia léxica auditada para הקֹדֶשׁ
    rationale: «Vestiduras sagradas» es defendible, pero «vestiduras santas» se alinea más estrechamente con ‘holy garments’ y con el lenguaje bíblico-religioso normal en español.
  revised_spanish_text: Y las vestiduras santas que son de Aarón serán para sus hijos después de él, para ungirlos[a] en ellas y para investirlos[b] en ellas.
  revised_footnotes:
