translation:
  language: es
  text: Escucha a tu padre[a], el que te engendró, y no desprecies a tu madre cuando ya sea anciana[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escucha a tu padre, este que te engendró». El demostrativo hebreo («este») sigue inmediatamente a «tu padre» para darle énfasis; en español se vierte de manera más natural con una relativa.
    reason: alternative_reading
  - marker: b
    text: O «cuando haya envejecido». El perfecto hebreo puede resaltar el estado resultante de haber llegado a la vejez.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oíd
  - Presta atención
  lexicon: HALOT
  rationale: El imperativo pide atención obediente, no solo percepción auditiva. «Escucha» es natural en español moderno y conserva el tono exhortativo mejor que un calco como «oye» o una forma más arcaica.
- source_word: לְאָבִיךָ
  english_pob_choice: to your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu padre
  - tu padre
  lexicon: HALOT
  rationale: La preposición ל introduce el destinatario de la escucha. En español, «escucha a tu padre» reproduce mejor la construcción que omitir la preposición.
- source_word: זֶה
  english_pob_choice: who
  chosen_spanish: el que
  alternatives_spanish:
  - este que
  - quien
  - ese que
  lexicon: HALOT
  rationale: El demostrativo hebreo añade énfasis sobre el padre ya mencionado. En español, «el que» conserva la función explicativa sin sonar forzado como «este que».
- source_word: יְלָדֶךָ
  english_pob_choice: fathered you
  chosen_spanish: te engendró
  alternatives_spanish:
  - te engendró
  - te hizo nacer
  - te dio vida
  lexicon: HALOT
  rationale: El verbo ילד con sujeto masculino se refiere a la paternidad generativa. «Te engendró» es fiel y más directo que una paráfrasis; mantiene la relación biológica y de origen expresada por el hebreo.
- source_word: וְאַל תָּבוּז
  english_pob_choice: and do not despise
  chosen_spanish: y no desprecies
  alternatives_spanish:
  - y no desprecies
  - y no deshonres
  - y no menosprecies
  lexicon: HALOT
  rationale: בוז comunica tener en poco o tratar con desprecio. «No desprecies» reproduce bien la fuerza moral del mandato y es idiomático en español bíblico contemporáneo.
- source_word: כִּי זָקְנָה
  english_pob_choice: when she is old
  chosen_spanish: cuando ya sea vieja
  alternatives_spanish:
  - cuando esté vieja
  - cuando haya envejecido
  - cuando ya esté vieja
  lexicon: HALOT
  rationale: כִּי introduce la circunstancia temporal. El hebreo perfecto destaca el estado resultante de vejez; «ya sea vieja» expresa ese estado con naturalidad en español sin perder el valor circunstancial.
- source_word: אִמֶּךָ
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - tu madre
  lexicon: HALOT
  rationale: Equivalente directo y sin ambigüedad del sustantivo con sufijo de segunda persona masculina singular.
translation_notes:
  revision_awareness: 'Se mantiene la lectura de alta concordancia del texto fuente: la estructura exhortativa, el demostrativo enfático tras «tu padre» y el matiz temporal de «cuando» en la cláusula final. No se detectaron revisiones aplicadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «siervo»/«esclavo» porque el pasaje no contiene δοῦλος ni campo semántico relacionado.
  - «Escucha» mantiene el valor de obediencia atenta propio de proverbios de sabiduría.
  - Las notas [a] y [b] reproducen las alternativas documentadas en el audit trail inglés, adaptadas al español sin expandir el sentido.
