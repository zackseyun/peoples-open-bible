theological_decisions:
- issue: Providential interpretation of the slaughter at Shechem
  chosen_reading: Levi presents the destruction as ultimately a decree of God against a people marked by longstanding violence and sexual predation, while still confessing that he and his brothers sinned by acting against Jacob's judgment.
  alternative_readings:
  - The act was wholly justified and not sinful
  - The act was only sinful and not providentially used by God
  rationale: 'Verses 7-11 hold both claims together: ''we sinned'' and ''it was a decree of God.'' The translation preserves this tension rather than resolving it.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Reference to Sarah and Rebekah in verse 8
  chosen_reading: The text is translated as a claim about what the Shechemites intended to do to Sarah and Rebekah, paralleling Dinah.
  alternative_readings:
  - The line is corrupt and should be omitted from translation
  - The line refers more generally to ancestral women without naming them
  rationale: Though the sentence is textually awkward, the Greek witness explicitly names Sarah and Rebekah. Transparency requires translating the witness and noting the difficulty rather than silently smoothing it.
