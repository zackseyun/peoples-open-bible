revisions:
- from: Todavía se consumían nuestros ojos[a], buscando en vano nuestra ayuda; en nuestra vigilia vigilábamos a una nación que no podía salvar.
  to: Todavía nuestros ojos se consumían[a], esperando en vano nuestra ayuda; en nuestra espera vigilante[b], esperábamos a una nación que no podía salvar[c].
  rationale: La revisión conserva el sentido fuente y las decisiones léxicas del POB, pero mejora la naturalidad en español. «Esperando en vano nuestra ayuda» reproduce mejor la expectativa frustrada; «en nuestra espera vigilante, esperábamos» mantiene el paralelismo raíz-sustantivo/verbo sin sonar torpe; y la nota final recupera la alternativa documentada en la auditoría inglesa.
