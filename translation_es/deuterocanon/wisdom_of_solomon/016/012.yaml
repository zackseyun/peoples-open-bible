review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego general: contrasta remedios humanos concretos (Βοτάνη, μάλαγμα) con la palabra eficaz del Señor que sana. «Hierba», «emplasto», «palabra» y «sana todas las cosas» corresponden adecuadamente a las decisiones del POB inglés. Sin embargo, «Porque» introduce una causalidad no marcada por καὶ γὰρ de manera ideal en español bíblico aquí; «Pues» o simplemente omitirlo fluye mejor. Además, el vocativo «oh Señor» no sigue la preferencia terminológica del proyecto para Yahvé cuando κύριος se usa en dirección a Dios con clara referencia al nombre divino; conviene «oh Yahvé» y explicarlo en la reseña, aunque el griego tenga Κύριε.'
  spanish_quality_summary: 'El español es mayormente claro y digno. No obstante, «emplasto» suena algo menos transparente para lectores contemporáneos de América Latina que «cataplasma», aunque sigue siendo válido. El mayor ajuste necesario es terminológico-teológico: usar «Yahvé» en vez de «Señor» según la política del proyecto. También «Pues» da mejor tono y naturalidad que «Porque» en esta línea.'
  glossary_alignment: Alineación parcial. «Hierba», «palabra» y «todas las cosas» son correctas. El punto principal de desalineación es Κύριε -> «Señor» en vez de la pauta del proyecto de usar «Yahvé» para el nombre divino en el texto principal cuando la referencia es a Dios mismo. No hay carve-out documentado aquí que justifique conservar «Señor».
  issues:
  - severity: high
    issue: Uso de «Señor» en lugar de «Yahvé»
    rationale: La guía del proyecto pide «Yahvé» en el texto principal, no «SEÑOR» ni por extensión «Señor», cuando κύριος refiere al Dios de Israel en este tipo de invocación. Aquí no hay razón documentada para apartarse de esa norma.
  - severity: medium
    issue: «Porque» es menos natural que «Pues» al inicio
    rationale: καὶ γὰρ aquí introduce continuación/explicación. En español bíblico fluido, «Pues» reproduce mejor el matiz sin sonar excesivamente causal o pesado.
  - severity: low
    issue: «Emplasto» puede sonar menos claro que «cataplasma» para lectores modernos
    rationale: No es incorrecto, pero «cataplasma» puede ser más inmediatamente comprensible en un registro médico-tradicional actual. Aun así, el término base puede mantenerse con nota alternativa o invertirse según preferencia editorial.
  revised_spanish_text: Pues ni hierba[a] ni emplasto[b] los sanó, sino tu palabra, oh Yahvé, sana todas las cosas.
  revised_footnotes:
  - marker: a
    text: O «planta» para «hierba». El término griego puede referirse más ampliamente a la vegetación, pero aquí probablemente significa una hierba medicinal.
    reason: lexical_alternative
  - marker: b
    text: O «cataplasma» para «emplasto». El griego se refiere a una aplicación medicinal usada para sanar.
    reason: lexical_alternative
