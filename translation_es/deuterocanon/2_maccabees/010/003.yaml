    reason: lexical_alternative
  - marker: b
    text: O «puesto en venta cada año». El adjetivo griego πρατήν enfatiza que el sumo sacerdocio debía ser vendido.
    reason: lexical_alternative
  - marker: c
    text: El griego conservado aquí es sintácticamente comprimido; esta traducción sigue el sentido de la política descrita más que una frase griega completamente desarrollada.
    reason: textual_variant
