  text: 'And to the priests and to all this people I spoke[a], saying, “Thus says Yahweh: Do not listen to the words of your prophets who are prophesying to you, saying, ‘Behold, the vessels of the house of Yahweh are being brought back from Babylon now, quickly,’ for they are prophesying falsely to you.”'
  footnotes:
