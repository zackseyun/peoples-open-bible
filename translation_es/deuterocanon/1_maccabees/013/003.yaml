  rationale: Se corrigió el error de número en «los animó», se eliminó la duplicación incorrecta del marcador de nota y se reordenó la frase para un español más natural, conservando el énfasis, la amplitud de «las cosas santas» y la enumeración final sin añadir interpretaciones ausentes del griego.
