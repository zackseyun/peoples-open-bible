  yaml_path: translation/nt/acts/007/043.yaml
  text: And you took up the tent of Moloch and the star of the god Rephan[a], the images that you made to worship them[c][b], and I will deport you beyond Babylon.
  footnotes:
  - marker: a
    text: Some translations, reflecting the Hebrew source in Amos 5:26, read 'your god Rephan' instead of 'the god Rephan.' Acts here reads 'the god Rephan.'
    reason: alternative_reading
  - marker: b
    text: Acts reads 'beyond Babylon.' In Amos 5:27 the source passage is commonly rendered 'beyond Damascus.'
    reason: cross_reference
  - marker: c
    text: Or 'figures' or 'representations' for 'images.'
    reason: lexical_alternative
translation:
