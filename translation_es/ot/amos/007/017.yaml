  source_alignment_summary: 'El borrador español refleja bien la mayor parte del hebreo: mantiene la fórmula profética, Yahvé para יְהוָה, el juicio sobre la esposa, hijos e hijas, la división de la tierra y la muerte en tierra impura. Sin embargo, no preserva con suficiente precisión מֵעַל אַדְמָתוֹ, ya que ''lejos de su tierra'' añade expansión interpretativa frente al hebreo y frente a la revisión auditada en inglés, que ajustó explícitamente a ''from its land''.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'Se prostituirá', 'caerán a espada' y 'tierra impura' funcionan bien. 'Por medio de un cordel' suena algo más perifrástico que necesario; 'por cordel' o 'con cordel de medir' sería más directo, pero no es un error grave. El cambio necesario principal es quitar 'lejos de' para evitar una paráfrasis innecesaria.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente; no hay conflictos mayores con terminología doctrinal. Se mantiene la tensión de ''tierra impura''. La principal desalineación es con la decisión léxica auditada para מֵעַל אַדְמָתוֹ, que debe conservarse como ''de su tierra'' y no ampliarse a ''lejos de su tierra''.'
  issues:
  - severity: medium
    issue: '''Lejos de su tierra'' sobretraduce מֵעַל אַדְמָתוֹ'
    rationale: El hebreo expresa remoción 'de su tierra'; 'lejos de' añade una idea de distancia no requerida. El rastro de auditoría en inglés corrigió precisamente una expansión similar para acercarse más a la fuente.
  - severity: low
    issue: La nota [c] queda anclada solo a 'exilio' y no al conjunto verbal enfatizado
    rationale: No impide la comprensión, pero el énfasis afecta a 'ciertamente irá al exilio' como unidad. Puede mantenerse si el marcador se coloca al final de la frase verbal.
  - severity: low
    issue: '''Por medio de un cordel'' es algo más pesado de lo necesario'
    rationale: Transmite bien la imagen, pero una formulación más directa como 'por cordel[b]' mantiene mejor la concisión poética del hebreo. Aun así, no requiere adjudicación compleja.
