  - marker: a
    text: 'O: "saldrá por el camino por donde entró". El hebreo dice literalmente: "de su camino saldrá", probablemente con el sentido del mismo trayecto que acaba de mencionarse.'
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la referencia de בּוֹ de 'allí' a 'en ella' para reflejar mejor la localización explícita del hebreo y del audit trail, sin alterar el sentido general ni la fluidez. Se conserva la nota léxica existente con estilo español pulido.
