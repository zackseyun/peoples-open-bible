base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/002.yaml
  text: And Hezekiah appointed the divisions of the priests and the Levites according to their divisions[a], each man according to his service, both the priests and the Levites, for burnt offerings and peace offerings[c][b], to minister and to give thanks and to praise in the gates of the camp of Yahweh.
  footnotes:
