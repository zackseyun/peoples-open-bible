translation:
  language: es
  text: Y cruzó contra los hijos de Amón[a], y halló una fuerza poderosa y un pueblo numeroso[b], con Timoteo al frente de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los amonitas» para «los hijos de Amón».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «una mano fuerte»; aquí la expresión probablemente significa fuerza o poder militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπέρασεν
  english_pob_choice: crossed over
  chosen_spanish: pasó contra
  alternatives_spanish:
  - cruzó
  - pasó
  lexicon: LSJ
  rationale: El verbo griego expresa el cruce o paso hacia un destino; en este contexto militar, el complemento adversativo de ἐπί pide en español una formulación natural de avance hostil. «Pasó contra» conserva el movimiento y la dirección sin sobrecargar el texto.
- source_word: ἐπὶ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - a
  lexicon: LSJ
  rationale: En un contexto de campaña militar, ἐπί puede tener valor adversativo. «Contra» refleja mejor ese matiz hostil que una simple dirección neutral.
- source_word: τοὺς υἱοὺς Ἀμμών
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  lexicon: LSJ
  rationale: La expresión griega es literalmente «los hijos de Amón». Se mantiene esa forma para transparencia de fuente; «amonitas» es una equivalencia idiomática posible, pero menos literal.
- source_word: χεῖρα κραταιὰν
  english_pob_choice: a strong force
  chosen_spanish: una fuerza poderosa
  alternatives_spanish:
  - una mano fuerte
  - un poder fuerte
  lexicon: LSJ
  rationale: Aunque literalmente es «una mano fuerte», el inglés POB entendió el giro como fuerza militar. En español, «fuerza poderosa» preserva el sentido idiomático y evita una imagen corporal extraña en este contexto.
- source_word: λαὸν πολύν
  english_pob_choice: a large people
  chosen_spanish: un pueblo numeroso
  alternatives_spanish:
  - mucha gente
  - un ejército numeroso
  lexicon: LSJ
  rationale: λαός significa pueblo o gente; no dice explícitamente «ejército». «Pueblo numeroso» conserva la colectividad del griego y evita especificar más de lo que el texto da.
- source_word: ἡγούμενον
  english_pob_choice: leading
  chosen_spanish: al frente de
  alternatives_spanish:
  - dirigiéndolos
  - mandándolos
  lexicon: LSJ
  rationale: El participio expresa la función de liderazgo de Timoteo. «Al frente de» comunica bien esa posición de guía/comando en español, sin forzar un verbo más técnico de lo que el griego exige.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se registran revisiones aplicadas. La decisión principal en español fue conservar la expresión literal de «los hijos de Amón» y verter el giro militar de χεῖρα κραταιὰν con un equivalente idiomático natural.
  spanish_consistency_notes:
  - Se mantiene «Amón» como nombre propio siguiendo la forma tradicional española del topónimo.
  - Se usa «Timoteo» para el nombre propio, conforme al griego Τιμόθεον y al uso español estándar.
  - La puntuación y el orden sintáctico buscan claridad en español sin añadir contenido narrativo no presente en el griego.
