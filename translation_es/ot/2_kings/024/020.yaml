translation:
  language: es
  text: Pues por el enojo de Yahvé esto sucedió en Jerusalén y en Judá, hasta que los arrojó de su presencia[a]. Y Sedequías se rebeló contra el rey de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque la ira de Yahvé estaba sobre Jerusalén y Judá, hasta que los arrojó de delante de él». El hebreo de la primera cláusula es comprimido y puede traducirse de manera más formal así.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For because
  chosen_spanish: Porque a causa de
  alternatives_spanish:
  - Porque
  - Pues porque
  lexicon: HALOT
  rationale: El hebreo introduce una explicación causal. En español, «Porque a causa de» conserva la relación explicativa y la fuerza causal sin sonar tan mecánico como una doble partícula literal.
- source_word: עַל אַף יְהוָה
  english_pob_choice: because of the anger of the LORD
  chosen_spanish: a causa del enojo de Yahvé
  alternatives_spanish:
  - por el enojo de Yahvé
  - a causa de la ira de Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática comunica la ira divina. «Enojo» es natural y fiel; «ira» también sería posible, pero «enojo» sigue de cerca el matiz de la imagen hebrea sin perder dignidad.
- source_word: הָיְתָה
  english_pob_choice: it happened
  chosen_spanish: ocurrió
  alternatives_spanish:
  - sucedió
  - fue
  lexicon: HALOT
  rationale: El verbo es existencial/resultado, con sujeto implícito. «Ocurrió» reproduce bien el valor de acontecimiento y evita una construcción opaca en español.
- source_word: בִירוּשָׁלִַם וּבִיהוּדָה
  english_pob_choice: in Jerusalem and in Judah
  chosen_spanish: en Jerusalén y en Judá
  alternatives_spanish:
  - contra Jerusalén y Judá
  - entre Jerusalén y Judá
  lexicon: HALOT
  rationale: El ב local indica la esfera en que se produjo la situación. «En Jerusalén y en Judá» es directo y respeta el uso locativo.
- source_word: עַד הִשְׁלִכוֹ אֹתָם
  english_pob_choice: until he cast them out
  chosen_spanish: hasta que los arrojó
  alternatives_spanish:
  - hasta que los echó
  - hasta que los expulsó
  lexicon: HALOT
  rationale: El verbo tiene fuerza de expulsión/arrojo. «Los arrojó» conserva la energía del hebreo; la nota de presencia aclara el destino completo del gesto.
- source_word: מֵעַל פָּנָיו
  english_pob_choice: from his presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de delante de él
  - de su rostro
  lexicon: HALOT
  rationale: El modismo apunta a ser removidos de delante de Dios. «De su presencia» es la formulación más clara y reverente en español contemporáneo.
- source_word: וַיִּמְרֹד
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se revoltó
  lexicon: HALOT
  rationale: מרד exige un término de rebeldía política. «Se rebeló» es la equivalencia más natural en español y mantiene el sentido adversativo.
- source_word: בְּמֶלֶךְ בָּבֶל
  english_pob_choice: against the king of Babylon
  chosen_spanish: contra el rey de Babilonia
  alternatives_spanish:
  - al rey de Babilonia
  - frente al rey de Babilonia
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, con מרד la relación es de oposición. Por eso «contra» expresa correctamente el valor idiomático.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Zedequías
  lexicon: HALOT
  rationale: Forma castellana usual del nombre propio, ampliamente reconocible en lectura bíblica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: Contested divine-name rendering per project defaults
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en forma audible y no como sustituto reverencial.
theological_decisions:
- issue: Relación causa-resultado en la primera cláusula
  english_pob_reading: Jerusalem and Judah's fate occurred because of Yahweh's anger, leading to expulsion.
  chosen_spanish_reading: La frase presenta el juicio divino como causa del estado y del desenlace de Jerusalén y Judá.
  alternative_spanish_readings:
  - La ira de Yahvé estaba sobre Jerusalén y Judá hasta que los expulsó
  - Por el enojo de Yahvé sucedió en Jerusalén y en Judá
  rationale: El hebreo es comprimido y admite más de una expansión legítima. La redacción española conserva la causalidad sin forzar una interpretación única donde el original permite cierta tensión sintáctica.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it'
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo contiene explícitamente el nombre de pacto. En este proyecto no se enmascara con un sustituto tipográfico; se conserva como nombre propio divino en español.
  doctrine_reference: 'Contested terms table: יְהוָה / YHWH'
- issue: Valor de la expulsión final
  english_pob_reading: until he cast them out from his presence
  chosen_spanish_reading: hasta que los arrojó de su presencia
  alternative_spanish_readings:
  - hasta que los expulsó de su presencia
  - hasta que los echó de su presencia
  rationale: «Arrojó» mantiene la fuerza del verbo hebreo y deja visible el carácter violento del juicio. La expresión «de su presencia» conserva el sentido teológico de ser removidos de delante de Yahvé.
  doctrine_reference: Doctrine of divine judgment and covenant presence
translation_notes:
  revision_awareness: El borrador sigue el cierre de revisión más reciente del auditrial inglés en cuanto a traducir הָיְתָה con un verbo más directo y natural; por eso se eligió «ocurrió» en vez de una paráfrasis más expansiva. También se mantuvo la decisión doctrinal de usar Yahvé para יְהוָה y la lectura adversativa de בְּמֶלֶךְ בָּבֶל como «contra el rey de Babilonia».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante del nombre divino.
  - Se usa «Sedequías» para el nombre propio, coherente con la tradición bíblica en español.
  - «Presencia» traduce el modismo מֵעַל פָּנָיו sin suavizar su sentido teológico.
  - Se evita «SEÑOR» para no ocultar el nombre divino explícito del hebreo.
