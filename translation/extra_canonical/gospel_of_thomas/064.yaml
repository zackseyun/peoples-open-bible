translation:
  text: Jesus said[1], "A man had some guests. And when he had prepared the dinner,
    he sent his servant so that he might invite the guests. He went to the first.
    He said to him, 'My master invites you.' He said, 'I have some money with some
    merchants; they are coming to me in the evening. I will go to give them orders.
    I excuse myself from the dinner.' He went to another. He said to him[2], 'My master
    has invited you.' He said to him, 'I have bought a house, and they are asking
    for me for a day. I will not have time.' He came to another. He said to him, 'My
    master invites you.' He said to him, 'My friend is going to marry, and I am the
    one who will make the dinner. I will not go. I excuse myself from the dinner.'
    He went to another. He said to him, 'My master invites you.' He said to him, 'I
    have bought a village. I am going to collect rent. I will not go. I excuse myself.'
    The servant came. He said to his master, 'Those whom you invited to the dinner
    have excused themselves.' The master said to his servant, 'Go outside to the streets.
    Those whom you will find, bring them, so that they may dine[4][3]. Buyers and
    merchants will not enter the places of my father.'"
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:56:12Z'
  footnotes:
  - marker: '1'
    text: The second invitation uses the perfect tense (ⲁⲡⲁϫⲟⲉⲓⲥ, 'has invited'),
      while the others use the present tense (ⲡⲁϫⲟⲉⲓⲥ, 'invites'). This variation
      is preserved in the translation.
    reason: textual_variant
  - marker: '2'
    text: The Coptic ϯⲛⲁϣⲓ ⲁⲛ uses a variant of the verb ϣⲉ ('to go'). Earlier translations
      sometimes rendered this as 'I will not be able', confusing it with the verb
      ϣ ('to be able'), which would require a following infinitive.
    reason: lexical_alternative
  - marker: '3'
    text: 'The manuscript has a lacuna here: ⲙⲛ̄ⲛⲉϣⲟⲧ̣[ⲉ ⲥⲉⲛⲁⲃ]ⲱ̣ⲕ̣ ⲁⲛ⳿. The restoration
      ''[will] not [go] in'' is standard and fits the visible traces and space.'
    reason: textual_variant
  - marker: '4'
    text: Unlike the canonical parallels (Luke 14:16-24, Matt 22:1-10), Thomas explicitly
      frames all the excuses around commerce and business, concluding with a direct
      condemnation of 'buyers and merchants'. This reflects Thomas's ascetic rejection
      of worldly commerce.
    reason: theological_note
lexical_decisions:
- source_word: ϣⲙⲙⲟ
  chosen: guests
  rationale: The term ϣⲙⲙⲟ generally means 'stranger' or 'foreigner', but in the context
    of a dinner invitation, 'guests' is the appropriate rendering.
  lexicon: Crum 566a
- source_word: ⲟⲩⲉϩⲥⲁϩⲛⲉ
  chosen: give orders
  rationale: A compound verb meaning 'to command' or 'to give orders'.
  lexicon: Crum 506a
- source_word: ⲧⲟⲟⲩ
  chosen: bought
  rationale: A form of ⲧⲟⲩⲟ, meaning 'to buy'.
  lexicon: Crum 435a
- source_word: ⲥⲣϥⲉ
  chosen: have time
  rationale: Means 'to have leisure' or 'to have time'.
  lexicon: Crum 358a
- source_word: ⲣϣⲉⲗⲉⲉⲧ
  chosen: marry
  rationale: Means 'to take a bride' or 'to marry'.
  lexicon: Crum 560b
- source_word: ϣⲓ
  chosen: go
  rationale: A dialectal or variant spelling of ϣⲉ ('to go'). It is not the verb ϣ
    ('to be able'), as it lacks the required following infinitive.
  lexicon: Crum 549a
- source_word: ϫⲓ ⲛϣⲱⲙ
  chosen: collect rent
  rationale: An idiom meaning 'to receive rent'.
  lexicon: Crum 565b
- source_word: ⲣⲉϥⲧⲟⲟⲩ
  chosen: buyers
  rationale: Agent noun from ⲧⲟⲩⲟ ('to buy').
  lexicon: Crum 435a
- source_word: ϣⲟⲧⲉ
  chosen: merchants
  rationale: Plural of ϣⲱⲧ ('merchant' or 'trader').
  lexicon: Crum 590b
theological_decisions:
- issue: The explicit condemnation of 'buyers and merchants' (ⲣⲉϥⲧⲟⲟⲩ ⲙⲛ ⲛⲉϣⲟⲧⲉ).
  chosen_reading: Buyers and merchants will not enter the places of my father.
  rationale: Thomas diverges from the canonical parables of the great banquet by explicitly
    framing the excuses around commerce and concluding with a direct condemnation
    of business people. This reflects Thomas's ascetic theology, which views worldly
    commerce as incompatible with the kingdom. The translation preserves this sharp
    Thomasine diction without harmonizing it to the Synoptics.
  alternatives_noted: []
drafter_notes: This saying is Thomas's version of the Parable of the Great Banquet.
  The translation corrects a previous error where ϯⲛⲁϣⲓ ⲁⲛ was rendered 'I will not
  be able to come'; the verb is clearly ϣⲉ ('to go'). The distinct Thomasine emphasis
  on commerce as a distraction from the kingdom is preserved exactly as written, culminating
  in the explicit exclusion of 'buyers and merchants' from the 'places of my father'.
