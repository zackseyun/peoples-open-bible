    ܐܣܬܟܠ ܡܬܚܫܒ ܗܘܐ.

    ܘܚܡܫ ܚܫ̈ܒܬܐ ܐܬܚܫܒ.

    ܗܘ ܓܝܪ ܠܢܦܫܗ ܗܘܐ

    ܡܚܝܒܢܘܗܝ. ܐܦ ܒܡܠܐܟ̈ܐ

