translation:
  language: es
  text: Y cuando llegue el jubileo para los hijos de Israel, su herencia se añadirá a la herencia de la tribu a la que pertenezcan, y su herencia se quitará de la herencia de la tribu de nuestros padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And when
  chosen_spanish: Y si
  alternatives_spanish:
  - Y cuando
  - Y si llegara a haber
  lexicon: HALOT
  rationale: El hebreo mantiene una condición legal anticipada. En español, 'Y si' conserva con fidelidad la estructura condicional sin forzar una lectura temporal más fuerte de la que el texto exige.
- source_word: יִהְיֶה הַיֹּבֵל
  english_pob_choice: the Jubilee comes
  chosen_spanish: hubiera el jubileo
  alternatives_spanish:
  - llegara el jubileo
  - viniera el jubileo
  - se celebrara el jubileo
  lexicon: HALOT
  rationale: La idea es la aparición/ocurrencia del jubileo como evento calendarial. 'Hubiera el jubileo' reproduce de manera natural la condición del hebreo; 'jubileo' conserva el término técnico bíblico.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'para los hijos/los hijos varones de Israel'. En español, 'hijos de Israel' preserva la imagen familiar y la precisión lexical sin ocultar el rasgo del original.
- source_word: וְנוֹסְפָה
  english_pob_choice: will be added
  chosen_spanish: se añadiría
  alternatives_spanish:
  - sería añadida
  - se sumaría
  lexicon: HALOT
  rationale: El nifal de יסף expresa adición pasiva/resultativa. 'Se añadiría' comunica la consecuencia legal en español y mantiene el valor pasivo.
- source_word: נַחֲלָתָן
  english_pob_choice: their inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión heredada
  - su heredad
  lexicon: HALOT
  rationale: נחלה aquí es la porción heredada de tierra. 'Herencia' es claro y bíblico en español, y conserva el vínculo legal con el reparto tribal.
- source_word: עַל נַחֲלַת הַמַּטֶּה
  english_pob_choice: to the inheritance of the tribe
  chosen_spanish: a la herencia de la tribu
  alternatives_spanish:
  - sobre la herencia de la tribu
  - junto con la herencia de la tribu
  lexicon: HALOT
  rationale: La preposición על con יסף expresa incorporación/adición a otra porción. 'A la herencia' suena natural en español y refleja la relación de suma sin perder el sentido jurídico.
- source_word: אֲשֶׁר תִּהְיֶינָה לָהֶם
  english_pob_choice: to which they belong
  chosen_spanish: a la que pertenezcan
  alternatives_spanish:
  - que les pertenezca
  - a la cual pertenecerán
  lexicon: HALOT
  rationale: El hebreo describe la tribu a la que quedarán ligadas por matrimonio. 'Pertenecer' expresa bien esa vinculación relacional en español sin añadir elementos ajenos.
- source_word: וּמִנַּחֲלַת מַטֵּה אֲבֹתֵינוּ
  english_pob_choice: from the inheritance of the tribe of our fathers
  chosen_spanish: de la herencia de la tribu de nuestros padres
  alternatives_spanish:
  - de la herencia de nuestra tribu paterna
  - de nuestra herencia ancestral de tribu
  lexicon: HALOT
  rationale: '''Nuestros padres'' traduce directamente אבותינו y conserva el marco genealógico/legal del texto. ''Herencia de la tribu'' mantiene el orden y la fuerza posesiva del hebreo.'
- source_word: יִגָּרַע
  english_pob_choice: will be taken away
  chosen_spanish: se quitaría
  alternatives_spanish:
  - sería quitada
  - se disminuiría
  - sería retirada
  lexicon: HALOT
  rationale: El nifal de גרע implica disminución o remoción. En este contexto de reparto tribal, 'se quitaría' expresa con claridad la pérdida de territorio asignado.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido legal del hebreo y el auditable inglés POB, pero ajusta la sintaxis a un español fluido. Se preservó la terminología de herencia/tribu/jubileo por su valor técnico en el contexto de la distribución de tierras.
  spanish_consistency_notes:
  - Se mantuvo 'jubileo' como término técnico del año jubilar.
  - Se eligió 'herencia' para נחלה en coherencia con el contexto de posesión tribal heredada.
  - Se preservó la relación tribal con 'hijos de Israel' y 'tribu de nuestros padres' sin neutralizar el parentesco del original.
  - No se introdujeron notas textuales ni variantes porque el pasaje no presenta una tensión textual significativa en el paquete fuente provisto.
