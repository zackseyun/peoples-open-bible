  text: Then Johanan son of Kareah said privately to Gedaliah at Mizpah[a], saying, “Please let me go and strike down Ishmael son of Nethaniah, and no one will know. Why should he take your life, so that all the Judahites who are gathered to you would be scattered[c][b], and the remnant of Judah would perish?”
