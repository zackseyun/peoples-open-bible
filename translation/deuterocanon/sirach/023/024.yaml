theological_decisions:
- issue: Whether ἐκκλησία should be rendered with later ecclesial language
  chosen_reading: assembly
  alternative_readings:
  - congregation
  - church
  rationale: The verse concerns communal exposure and judgment in wisdom literature, not a developed Christian ecclesial institution. 'Assembly' best reflects the Greek in this deuterocanonical context.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy over translation tradition
- issue: How strongly to render ἐπισκοπή
  chosen_reading: inspection
  alternative_readings:
  - visitation
  - punishment
  - inquiry
  rationale: The noun can carry either neutral oversight/inspection or more ominous visitation. Because the immediate Greek does not explicitly state punishment in this clause, the main text preserves the official-investigative sense, while a footnote retains the stronger alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological tension rather than resolve it
