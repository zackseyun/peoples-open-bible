      another thought'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲱⲉⲓ
  chosen: be watchful
  alternatives:
  - be on your guard
  - be awake
  - pay attention
  lexicon: Crum; Layton
  rationale: Imperative exhortation to vigilance; chosen gloss preserves admonitory
    tone without over-smoothing.
- source_word: ⲥⲱⲧⲙ
  chosen: hear
  alternatives:
  - listen
  lexicon: Crum
  rationale: Default sense of the verb; imperative/relative context calls for a direct
    imperative in English.
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ
  chosen: do not be ignorant
  alternatives:
  - do not be unknowing
  - do not ignore
  lexicon: Crum
  rationale: Negative prohibitive + knowing verb yields the idiomatic admonition;
    preserves the strong warning cadence.
- source_word: ⲙⲁ
  chosen: place
  alternatives:
  - location
  - spot
  lexicon: Crum
  rationale: Common noun for spatial location; kept literal to support the paired
    preposition ⲕⲁⲧⲁ.
- source_word: ⲛⲕⲉⲟⲩⲙⲉⲩⲉ
  chosen: another thought
  alternatives:
  - other understanding
  - different idea
  - another opinion
  lexicon: Crum
  rationale: ⲟⲩⲙⲉⲩⲉ = thought/opinion; ⲕⲉ = other; plural article reflects indefinite
    ‘some other’ nuance; kept as ‘another thought’ to preserve strangeness.
- source_word: ⲕⲁⲧⲁ
  chosen: according to
  alternatives:
  - by
  - in accordance with
  lexicon: Greek loanword
  rationale: Prepositional sense best rendered with formal ‘according to’ in this
    poetic admonition.
- source_word: ⲉⲣⲟⲓ
  chosen: me
  alternatives: []
  lexicon: Crum
  rationale: Object pronoun; direct object of ‘hear.’
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - also
  lexicon: Crum
  rationale: Coordinating conjunction; basic connective preserved to sustain cadence.
- source_word: ⲧϣⲟⲣⲡ
  chosen: the first
  alternatives: []
  lexicon: Crum
  rationale: Set pair with ‘the last’ in Thunder’s self-identifications; kept literal.
- source_word: ⲑⲁⲉ
  chosen: the last
  alternatives:
  - the end
  lexicon: Crum
  rationale: Standard counterpart to ‘the first’ in the text’s paradoxical self-claims.
- source_word: ⲁⲛⲟⲕ (…ⲧⲉ)
  chosen: I am
  alternatives:
  - I
  lexicon: Layton (grammar)
  rationale: Subject pronoun used with predicative construction; English ‘I am’ must
    be repeated to preserve parallelism.
