translation:
  language: es
  text: 'Y dirás a ellos esta palabra: «Así dice Yahvé: el Dios de Israel: “Toda vasija[a] será llenada de vino”. Y te dirán: “¿Acaso no sabemos muy bien que toda vasija será llenada de vino?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «odre» o «jarra». El hebreo נֵבֶל puede designar un recipiente para líquidos, como un odre de cuero o una vasija.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: So you shall say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Entonces dirás
  - Así dirás
  lexicon: HALOT
  rationale: El waw con valor de avance discursivo en contexto profético se vierte naturalmente con una conjunción simple y futuro exhortativo. «Y dirás» mantiene la secuencia y la instrucción profética sin sonar forzado en español.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - esta palabra
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra» o «mensaje». En español, «esta palabra» conserva la forma singular del hebreo y funciona bien en un mandato profético directo. «Mensaje» sería más interpretativo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» reproduce con naturalidad el tono solemne sin recurrir a un arcaísmo excesivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé». Se preserva el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios de Israel
  lexicon: HALOT
  rationale: Es una construcción transparente y convencional en español. Mantiene el genitivo relacional del hebreo sin sobreinterpretarlo.
- source_word: כָּל נֵבֶל
  english_pob_choice: Every jar
  chosen_spanish: Toda vasija
  alternatives_spanish:
  - Todo odre
  - Toda jarra
  - Toda vasija
  lexicon: HALOT
  rationale: נֵבֶל puede referirse a un recipiente de líquido, como odre o jarra. El inglés POB optó por «jar» para evitar especificar en exceso; en español, «vasija» conserva la amplitud semántica del término y suena natural en un dicho proverbial.
- source_word: יִמָּלֵא יָיִן
  english_pob_choice: shall be filled with wine
  chosen_spanish: será llenada de vino
  alternatives_spanish:
  - será llenada de vino
  - será llena de vino
  - se llenará de vino
  lexicon: HALOT
  rationale: El nifal expresa pasivo/futuro. «Será llenada de vino» sigue de cerca la imagen hebrea y mantiene el paralelismo repetido del verso. «Se llenará» sería más idiomático, pero menos cercano a la estructura.
- source_word: הֲיָדֹעַ לֹא נֵדַע
  english_pob_choice: Do we not indeed know
  chosen_spanish: ¿Acaso no sabemos bien
  alternatives_spanish:
  - ¿No lo sabemos con certeza?
  - ¿Acaso no lo sabemos?
  - ¿No sabemos bien?
  lexicon: HALOT
  rationale: La combinación del interrogativo y la forma intensiva de ידע exige reflejar énfasis. «¿Acaso no sabemos bien?» conserva la fuerza retórica y suena natural en español. «Bien» intenta captar la intensificación más que una mera negación.
- source_word: וְאָמְרוּ אֵלֶיךָ
  english_pob_choice: And they will say to you
  chosen_spanish: Y te dirán
  alternatives_spanish:
  - Y te dirán
  - Y dirán a ti
  lexicon: HALOT
  rationale: Es la continuación narrativa directa y concisa, equivalente al hebreo y al inglés POB.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la decisión doctrinal y editorial del proyecto de transliterar יְהוָה como «Yahvé», preservando el nombre del pacto y evitando la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Ambigüedad lexical de נֵבֶל
  english_pob_reading: Every jar
  chosen_spanish_reading: Toda vasija
  alternative_spanish_readings:
  - Todo odre
  - Toda jarra
  - Toda vasija
  rationale: El hebreo permite varios tipos de recipiente. En esta frase proverbial, «vasija» mantiene la amplitud semántica y evita decidir prematuramente entre odre y jarra, tal como el audit trail reconoce la alternativa lexical.
  doctrine_reference: English footnote a; HALOT נֵבֶל
translation_notes:
  revision_awareness: El inglés auditado revisó «will be filled» a «shall be filled» para un registro más formal y «certainly know» a «indeed know» para una fuerza enfática más natural. La versión española conserva esa formalidad con futuro simple («será llenada») y una pregunta retórica enfática («¿Acaso no sabemos bien?»), sin perder la estructura repetida del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la política del proyecto.
  - Se traduce נֵבֶל de modo amplio como «vasija», con nota para las alternativas léxicas, a fin de no cerrar indebidamente la imagen del recipiente.
  - Se conserva el paralelismo de la declaración y la réplica, con comillas y puntuación españolas.
  - Se usa «Dios de Israel» en forma directa y natural, coherente con el registro bíblico en español.
