translation:
  language: es
  text: Todos estos han confiado en sus manos[a], y cada uno se hace hábil en su propio trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es algo difícil: la cláusula también puede entenderse como «han sido encomendados a sus manos» o «han puesto su confianza en sus manos». El texto principal mantiene el sentido probable de que estos artesanos dependen de su destreza manual.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες οὗτοι
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Todos estos hombres
  lexicon: LSJ
  rationale: La expresión griega es demostrativa y retoma a los artesanos mencionados antes. "Todos estos" conserva la referencia sin añadir "hombres", que el griego no explicita.
- source_word: εἰς χεῖρας αὐτῶν ἐνεπίστευσαν
  english_pob_choice: have trusted in their hands
  chosen_spanish: han confiado en sus manos
  alternatives_spanish:
  - han sido encomendados a sus manos
  - han puesto su confianza en sus manos
  lexicon: LSJ
  rationale: El giro es inusual y admite más de una relación sintáctica. En español, "confiado en sus manos" mantiene la idea de dependencia de la destreza manual, a la vez que deja abierta la tensión documentada por el texto griego y el audit trail inglés.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - cada uno de ellos
  lexicon: LSJ
  rationale: '"Cada uno" transmite con naturalidad el distributivo griego sin alterar el sentido.'
- source_word: ἐν τῷ ἔργῳ αὐτοῦ
  english_pob_choice: in his own work
  chosen_spanish: en su propia obra
  alternatives_spanish:
  - en su trabajo
  - en su oficio
  lexicon: LSJ
  rationale: '"Obra" es suficientemente amplio para abarcar el trabajo artesanal de este contexto, y "su propia" conserva el matiz posesivo del griego.'
- source_word: σοφίζεται
  english_pob_choice: becomes skillful
  chosen_spanish: se vuelve hábil
  alternatives_spanish:
  - se hace sabio
  - obra con destreza
  lexicon: LSJ
  rationale: En el contexto de oficios manuales, el verbo apunta a pericia práctica más que a sabiduría abstracta. "Se vuelve hábil" conserva esa fuerza sin forzar una equivalencia literal con "sabio".
translation_notes:
