translation:
  language: es
  text: Entonces los tres jóvenes[a], los guardaespaldas, los que custodiaban la persona del rey, se dijeron entre sí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: “los guardaespaldas, los que custodiaban el cuerpo del rey”. La expresión significa que custodiaban la persona del rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: LSJ
  rationale: Marca la secuencia narrativa de manera natural en español y conserva el valor temporal del adverbio griego.
- source_word: οἱ τρεῖς νεανίσκοι
  english_pob_choice: the three young men
  chosen_spanish: los tres jóvenes
  alternatives_spanish:
  - los tres muchachos
  - los tres jóvenes varones
  lexicon: LSJ
  rationale: νεανίσκοι significa jóvenes varones; 'jóvenes' es natural en español y mantiene el rasgo de edad/condición sin añadir énfasis innecesario.
- source_word: οἱ σωματοφύλακες
  english_pob_choice: the bodyguards
  chosen_spanish: los guardias del rey
  alternatives_spanish:
  - los guardias personales
  - los guardaespaldas
  lexicon: LSJ
  rationale: El compuesto literalmente alude a quienes guardan el cuerpo/persona; en español, 'guardias del rey' comunica la función cortesana sin sonar forzado, y conserva la referencia al servicio real.
- source_word: οἱ φυλάσσοντες
  english_pob_choice: who were guarding
  chosen_spanish: los que custodiaban
  alternatives_spanish:
  - los que guardaban
  - que estaban guardando
  lexicon: LSJ
  rationale: '''Custodiaban'' expresa bien una vigilancia continua y formal, equivalente al participio presente descriptivo del griego.'
- source_word: τὸ σῶμα τοῦ βασιλέως
  english_pob_choice: the king’s person
  chosen_spanish: la persona del rey
  alternatives_spanish:
  - el cuerpo del rey
  - el rey mismo
  lexicon: LSJ
  rationale: Sigo la decisión inglesa de entender σῶμα idiomáticamente en contexto de seguridad/corte. 'La persona del rey' evita una lectura corporal demasiado literal y preserva la función cortesana del giro.
- source_word: εἶπαν ἕτερος πρὸς τὸν ἕτερον
  english_pob_choice: said to one another
  chosen_spanish: se dijeron uno al otro
  alternatives_spanish:
  - se dijeron entre sí
  - hablaron uno con otro
  lexicon: LSJ
  rationale: Es una forma recíproca natural en español que reproduce la relación mutua del griego sin perder claridad narrativa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión adicional; la única tensión léxica relevante es el valor idiomático de σῶμα τοῦ βασιλέως, resuelto de forma consistente con el registro cortesano.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y bíblico, pero en español moderno.
  - '''persona del rey'' evita el calco rígido ''cuerpo del rey'' en el cuerpo principal, mientras la nota conserva la literalidad.'
  - No hay vocabulario teológico específico en este versículo; por ello no se incluyen decisiones doctrinales.
