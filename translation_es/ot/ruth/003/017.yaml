translation:
  language: es
  text: 'Ella dijo: «Él me dio estas seis medidas[a] de cebada, porque dijo: “No vayas a tu suegra con las manos vacías”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «estas seis cebadas». La unidad concreta no se expresa, así que «medidas» se añade solo para claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: She said
  chosen_spanish: Ella dijo
  alternatives_spanish:
  - Y dijo
  - Dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el informe de Rut; en español, ‘Ella dijo’ reproduce con naturalidad la escena sin añadir una conjunción innecesaria al nivel estilístico del verso.
- source_word: שֵׁשׁ
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - '6'
  lexicon: HALOT
  rationale: El cardinal es directo y no presenta ambigüedad.
- source_word: הַשְּׂעֹרִים הָאֵלֶּה
  english_pob_choice: these ... of barley
  chosen_spanish: estas seis medidas de cebada
  alternatives_spanish:
  - estos seis granos de cebada
  - estas seis cebadas
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘estas seis cebadas’, pero el contexto y la nota inglesa muestran que falta la unidad explícita. En español, ‘medidas de cebada’ comunica el sentido con claridad y conserva la tensión textual al no afirmar una unidad precisa del hebreo.
- source_word: נָתַן לִי
  english_pob_choice: he gave me
  chosen_spanish: me dio
  alternatives_spanish:
  - me ha dado
  lexicon: HALOT
  rationale: El perfecto narrativo se vierte de manera natural con pasado simple en español en discurso directo reportado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del gesto de Boaz; ‘porque’ expresa bien la relación causal en español contemporáneo.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - había dicho
  lexicon: HALOT
  rationale: Dentro de la cita reportada, el pasado simple es la opción más natural en español; el pluperfecto sería posible, pero no necesario.
- source_word: אַל תָּבֹאִי
  english_pob_choice: Do not go
  chosen_spanish: No vayas
  alternatives_spanish:
  - No vengas
  lexicon: HALOT
  rationale: El hebreo usa una prohibición dirigida a la mujer. En español, ‘No vayas’ conserva el movimiento de salida/retorno de Rut desde su perspectiva al volver con Noemí; ‘No vengas’ desplazaría indebidamente el punto de vista.
- source_word: רֵיקָם
  english_pob_choice: empty-handed
  chosen_spanish: con las manos vacías
  alternatives_spanish:
  - vacía
  - sin nada
  lexicon: HALOT
  rationale: La equivalencia idiomática española más natural es ‘con las manos vacías’, que comunica la ausencia de provisión o regalo sin sonar literalista.
- source_word: אֶל חֲמוֹתֵךְ
  english_pob_choice: to your mother-in-law
  chosen_spanish: a tu suegra
  alternatives_spanish:
  - con tu suegra
  - hacia tu suegra
  lexicon: HALOT
  rationale: חֲמוֹת es ‘suegra/madre política’; ‘a tu suegra’ es la forma idiomática directa y clara en español.
theological_decisions:
- issue: Unidad implícita en ‘estas seis ... de cebada’
  english_pob_reading: The specific unit is not stated, so 'measures' is supplied in English for clarity.
  chosen_spanish_reading: ‘estas seis medidas de cebada’ mantiene una unidad no especificada de forma prudente, sin fijar en el texto una medida que el hebreo no nombra.
  alternative_spanish_readings:
  - estas seis cebadas
  - estos seis granos de cebada
  rationale: 'El texto hebreo y la nota inglesa reconocen una indeterminación léxica: el sustantivo aparece sin unidad explícita. En español conviene reflejar esa misma prudencia con una formulación comprensible, sin cerrar artificialmente el dato.'
  doctrine_reference: Principio de transparencia textual y de no sobreespecificación del original
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: no hay cambios aplicados en la pasada revisión y el control cruzado reporta alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el Tetragrámaton; en este verso no aparece.
  - Se usa ‘suegra’ en lugar de ‘madre de tu esposo’ por ser la equivalencia idiomática estándar y fiel a חֲמוֹת.
  - La nota al pie preserva la tensión entre la literalidad hebrea y la claridad española respecto de la unidad implícita.
