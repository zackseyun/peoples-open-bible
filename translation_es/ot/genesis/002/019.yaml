  yaml_path: translation/ot/genesis/002/019.yaml
  text: Now Yahweh God formed from the ground every wild animal and every bird of the sky[a], and he brought them to the man to see what he would call them. Whatever the man called each living creature[b], that was its name.
  footnotes:
