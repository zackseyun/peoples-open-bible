review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: llegada, intento de tomar la ciudad y saquearla, fracaso por haberse conocido el asunto. Sin embargo, una mejora menor haría más natural y exacta la última cláusula en español, acercándola mejor al valor de τοῖς ἐκ τῆς πόλεως sin la formulación algo perifrástica ''entre los que estaban en la ciudad''.'
  spanish_quality_summary: 'El español es claro y legible, con buen registro narrativo. ''Apoderarse de la ciudad'' y ''saquearla'' funcionan bien, aunque ''tomar la ciudad'' sería más conciso. El principal ajuste necesario es estilístico-semántico: ''se supo el asunto entre los que estaban en la ciudad'' suena menos natural que ''el asunto llegó a ser conocido por los de la ciudad'' o ''por los habitantes de la ciudad''.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales concuerdan con el expediente inglés: καταλαβεῖν = ''apoderarse de/tomar'', προνομεῦσαι = ''saquear'', ἐγνώσθη = ''se supo/llegó a conocerse'', λόγος = ''asunto''. La nota al pie para προνομεῦσαι es aceptable, aunque una alternativa verbal en subjuntivo (''saqueara'', ''despojara'') no encaja tan bien con el infinitivo griego; conviene normalizarla.'
  issues:
  - severity: medium
    issue: La frase 'entre los que estaban en la ciudad' es menos natural y menos precisa que el griego.
    rationale: τοῖς ἐκ τῆς πόλεως significa literalmente 'a los de la ciudad'; en contexto, los habitantes o gente de la ciudad. 'Entre los que estaban en la ciudad' introduce una formulación circunstancial no necesaria y algo torpe.
  - severity: low
    issue: La nota al pie usa alternativas verbales finitas ('la saqueara', 'la despojara') para un infinitivo griego.
    rationale: 'Como el texto base tiene infinitivos coordinados, en español las alternativas deben reflejar mejor esa forma: ''saquearla'', ''despojarla''.'
  revised_spanish_text: Y llegó y procuró apoderarse de la ciudad y saquearla[a], pero no pudo, porque se supo el asunto entre la gente de la ciudad.
  revised_footnotes:
  - marker: a
    text: 'También: ''saquearla'' o ''despojarla''. El verbo griego προνομεῦσαι puede referirse al pillaje o a tomar botín.'
    reason: lexical_alternative
