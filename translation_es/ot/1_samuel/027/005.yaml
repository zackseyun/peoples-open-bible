translation:
  language: es
  text: 'Entonces David dijo a Aquis: «Si ahora he hallado favor[a] ante tus ojos, que me den un lugar en una de las ciudades de la campiña, para que habite allí[b]. ¿Por qué ha de vivir tu siervo contigo en la ciudad real[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «si ahora he hallado favor en tus ojos».
    reason: source_note
  - marker: b
    text: 'O: «y habite allí».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo literalmente, «la ciudad del reino».
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: I have now found favor in your eyes
  chosen_spanish: he hallado favor ante tus ojos
  alternatives_spanish:
  - he hallado gracia ante tus ojos
  - he encontrado favor en tus ojos
  lexicon: HALOT
  rationale: El modismo hebreo expresa haber obtenido aprobación o benevolencia. En español, «favor» comunica mejor la idea relacional que «gracia» en este contexto. «Ante tus ojos» conserva la imagen del original; «en tus ojos» suena posible, pero menos natural en español bíblico moderno.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  lexicon: HALOT
  rationale: Aquí נָא suaviza la petición en un contexto deferente. «Ahora» reproduce bien ese matiz sin cargar la frase con «por favor», que en español podría sonar más añadido que equivalente.
- source_word: יִתְּנוּ לִי
  english_pob_choice: let them give me
  chosen_spanish: que me den
  alternatives_spanish:
  - que me concedan
  - que se me dé
  lexicon: HALOT
  rationale: El imperfecto plural funciona como petición indirecta. «Que me den» conserva el valor volitivo e indefinido del verbo, con naturalidad en español. La pasiva «que se me dé» suaviza demasiado la acción.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un espacio
  lexicon: HALOT
  rationale: Es el equivalente más directo y natural para el término general hebreo. No especifica más de lo que el texto permite.
- source_word: בְּאַחַת עָרֵי הַשָּׂדֶה
  english_pob_choice: in one of the towns in the countryside
  chosen_spanish: en una de las ciudades de la campiña
  alternatives_spanish:
  - en una de las ciudades del campo
  - en una de las poblaciones de la campiña
  - en una de las ciudades rurales
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «ciudades del campo/campiña». «Campiña» mantiene el contraste con la ciudad real y suena natural en español bíblico. Se evita «capital» porque el hebreo no usa ese término.
- source_word: וְאֵשְׁבָה שָּׁם
  english_pob_choice: so that I may live there
  chosen_spanish: para que habite allí
  alternatives_spanish:
  - y habitaré allí
  - y viviré allí
  - para morar allí
  lexicon: HALOT
  rationale: El verbo ישב aquí es residir/habitar. «Habite» conserva la idea de residencia estable con un registro digno. La versión española sigue el valor final que el inglés POB también explicitó.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El POB inglés eligió «slave» por la fuerza léxica de עבד, y aquí la fórmula de auto-humillación en habla cortesana permite mantener esa dureza. «Esclavo» evita suavizar indebidamente el término; «siervo» diluiría el matiz social.
- source_word: בְּעִיר הַמַּמְלָכָה
  english_pob_choice: in the royal city
  chosen_spanish: en la ciudad real
  alternatives_spanish:
  - en la ciudad del reino
  - en la capital
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «la ciudad del reino». «Ciudad real» conserva el vínculo con la realeza sin introducir una interpretación más específica que el texto no exige. Se mantiene la distinción con las ciudades de la campiña.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto a ti
  lexicon: HALOT
  rationale: En español la forma enclítica «contigo» suena más natural que «con tú». El contexto de trato deferente conserva la relación cercana pero subordinada expresada en el hebreo.
theological_decisions:
- issue: Auto-referencia de cortesía de David a Aquis
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión de registro con peso social-teológico: David se presenta con máxima deferencia ante un rey extranjero. Mantener «esclavo» preserva la tensión del hebreo עבד y la auto-humillación del hablante, en vez de domesticarla con «siervo».'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del POB inglés y conserva sus decisiones clave: favor en vez de gracia, la localización rural contrastada con la ciudad real, la expresión final de residencia y la referencia literal a «la ciudad del reino». Donde el español pide mayor naturalidad, se ajustó el orden sin perder el trazado semántico del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preservó la distinción entre «favor» y «gracia», siguiendo la elección auditada del POB inglés.
  - Se eligió «tu esclavo» para reflejar la fuerza de עבד y no sustituirla por un término más suave.
  - «Ciudad real» traduce el contraste con las ciudades de la campiña sin imponer «capital».
