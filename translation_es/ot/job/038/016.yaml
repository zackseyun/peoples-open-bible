translation:
  language: es
  text: ¿Has llegado hasta los manantiales del mar[a], o has caminado por los recovecos del abismo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuentes» del mar.
    reason: lexical_alternative
  - marker: b
    text: O «has caminado por los confines más remotos del abismo» o «has caminado por los recovecos de lo profundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבָאתָ
  english_pob_choice: Have you come
  chosen_spanish: ¿Has llegado
  alternatives_spanish:
  - ¿Has venido
  - ¿Has entrado
  lexicon: HALOT
  rationale: El verbo בוא en pregunta retórica pide una forma natural en español que conserve la confrontación directa. «Has llegado» transmite bien el movimiento hacia un destino y evita sonar demasiado literal o artificial.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - así como
  lexicon: HALOT
  rationale: La preposición marca alcance o llegada a un punto límite; «hasta» expresa mejor ese valor de meta alcanzada que un simple «a».
- source_word: נִבְכֵי
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - orígenes
  - recesos
  lexicon: HALOT
  rationale: El término puede referirse a los lugares de donde brotan las aguas. En español, «manantiales» comunica con más claridad la imagen hidrológica que «fuentes», y mantiene la fuerza poética del desafío.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - del mar grande
  - del mar (como realidad cósmica)
  lexicon: HALOT
  rationale: Aquí el sustantivo es común y no un nombre propio; «mar» es la equivalencia directa y natural en español.
- source_word: וּבְחֵקֶר
  english_pob_choice: or walked in the recesses of the deep
  chosen_spanish: o has andado por los recovecos
  alternatives_spanish:
  - o has andado en los recessos
  - o has andado por las profundidades
  lexicon: HALOT
  rationale: חֵקֶר puede implicar lo recóndito, lo investigado hasta el fondo, o los rincones inaccesibles. «Recovecos» transmite bien la idea de lugares internos y ocultos sin caer en la frase difícil «recesos del abismo». Se mantiene el valor interrogativo paralelo del verso con «o».
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: del abismo
  alternatives_spanish:
  - de lo profundo
  - del océano primordial
  lexicon: HALOT
  rationale: תְּהוֹם designa el abismo acuático primigenio o las honduras marinas. «Abismo» conserva la densidad poética y el trasfondo cosmológico mejor que una paráfrasis más débil.
- source_word: הִתְהַלָּכְתָּ
  english_pob_choice: walked
  chosen_spanish: has andado
  alternatives_spanish:
  - has caminado
  - has vagado
  lexicon: HALOT
  rationale: El hitpael de הלך expresa andar de un lado a otro o recorrer. «Has andado» es natural en español y preserva la idea de desplazamiento repetido o recorrido en lugares inaccesibles.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «recesses» para חֵקֶר. En español se evitó una calca como «recesos del abismo» por resultar menos natural; se usó «recovecos» para conservar la idea de interior oculto y difícil de alcanzar. También se mantuvo la pareja interrogativa paralela del verso con un segundo miembro unido por «o».
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando aparezca el término divino explícito; en este versículo no aplica.
  - Se conserva el registro poético y de interrogación retórica propio del discurso de Yahvé en Job.
  - «Abismo» se emplea para תְּהוֹם por su fuerza semántica y porque no exige aclaración doctrinal adicional en este contexto.
