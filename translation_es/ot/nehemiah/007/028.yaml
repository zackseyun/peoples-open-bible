lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los hombres de
  lexicon: HALOT
  rationale: El hebreo es un plural constructo de אִישׁ que introduce un listado censal de pertenencia o procedencia. En español, 'los hombres de' conserva el valor masculino y la fórmula breve de censo sin añadir interpretaciones.
- source_word: בֵית עַזְמָוֶת
  english_pob_choice: Beth-azmaveth
  chosen_spanish: Bet-azmavet
  alternatives_spanish:
  - la casa de Azmavet
  - Bet Azmavet
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de lugar dentro de una lista de retornados, no como una expresión literal de 'casa'. Se translitera como topónimo; el guion no es necesario en español, pero puede usarse en algunas tradiciones editoriales. La forma 'Bet-azmavet' mantiene la transparencia del compuesto בית + nombre propio.
- source_word: אַרְבָּעִים וּשְׁנָיִם
  english_pob_choice: forty-two
  chosen_spanish: cuarenta y dos
  alternatives_spanish:
  - cuarenta y dos
  - cuarenta y dos
  lexicon: HALOT
  rationale: El número cardinal se rinde de manera estándar en español moderno para un registro claro y natural en un contexto censal.
