    rationale: La alternativa «para el servicio» no preserva mejor el sentido que «para servir» y añade una nota donde el original no presenta una ambigüedad importante.
  revised_spanish_text: Este es el servicio de las familias de los gersonitas, para servir y para llevar[a].
