translation:
  language: es
  text: Pues, según las últimas palabras de David[a], los hijos de Leví fueron contados de veinte años para arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por las últimas palabras de David». El hebreo puede indicar que esta numeración se realizó sobre la base de la instrucción final de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior. «Porque» mantiene la relación causal/explanatoria del hebreo sin volver la frase artificial en español.
- source_word: בְּדִבְרֵי דָוִיד הָאַחֲרֹנִים
  english_pob_choice: by the last words of David
  chosen_spanish: en las últimas palabras de David
  alternatives_spanish:
  - según las últimas palabras de David
  - por las últimas palabras de David
  - en las palabras finales de David
  lexicon: HALOT
  rationale: El ב + sustantivo puede expresar base, esfera o medio. En español, «en las últimas palabras de David» conserva la construcción y deja abierta la idea de que esas palabras funcionan como fundamento del censo, sin cerrar indebidamente la ambigüedad documentada por la POB inglesa.
- source_word: הָאַחֲרֹנִים
  english_pob_choice: last
  chosen_spanish: últimas
  alternatives_spanish:
  - finales
  - postreras
  - últimos
  lexicon: HALOT
  rationale: «Últimas» es la forma natural en español para indicar las instrucciones o palabras finales de David, y refleja mejor el valor temporal que un simple «posteriores».
- source_word: הֵמָּה מִסְפַּר
  english_pob_choice: were numbered
  chosen_spanish: se contó
  alternatives_spanish:
  - fueron contados
  - se registró
  - fueron numerados
  lexicon: HALOT
  rationale: El hebreo es elíptico y apunta a un censo o registro. «Se contó» expresa bien la pasiva impersonal en español y evita una literalidad extraña, sin perder la idea de enumeración.
- source_word: בְּנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica del hebreo. «Hijos de Leví» es más transparente que «levitas» y sigue de cerca la forma del original.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה
  english_pob_choice: from twenty years old
  chosen_spanish: desde los veinte años
  alternatives_spanish:
  - a partir de los veinte años
  - desde la edad de veinte años
  - de veinte años
  lexicon: HALOT
  rationale: Es la fórmula hebrea estándar de edad. «Desde los veinte años» es natural en español y conserva la referencia de inicio del rango.
- source_word: וּלְמַעְלָה
  english_pob_choice: and upward
  chosen_spanish: y más
  alternatives_spanish:
  - y arriba
  - y en adelante
  - y mayores
  lexicon: HALOT
  rationale: La expresión indica continuidad hacia edades superiores. «Y más» es breve, fiel y idiomática en español; evita forzar un calco como «y arriba».
theological_decisions:
- issue: Alcance de la frase «las últimas palabras de David» y su posible fuerza normativa
  english_pob_reading: The Hebrew may indicate that this numbering was carried out on the basis of David's final directive.
  chosen_spanish_reading: La frase se traduce de manera que pueda entenderse como base o marco de la numeración, sin especificar más allá de lo que exige el hebreo.
  alternative_spanish_readings:
  - según las últimas palabras de David
  - por mandato de David en sus últimas palabras
  rationale: El texto hebreo y la nota inglesa preservan una tensión entre simple localización («en») y base normativa («según/por»). El español mantiene esa apertura para no resolver artificialmente la ambigüedad.
  doctrine_reference: Principio de claridad textual y respeto a la ambigüedad semántica del original
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y se mantuvo sin cambios; la traducción española sigue esa lectura estable y conserva la ambigüedad documentada en la nota sobre בְּדִבְרֵי דָוִיד הָאַחֲרֹנִים.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se preservó la expresión genealógica «hijos de Leví» en lugar de sustituirla por «levitas», en coherencia con el hebreo y con el estilo formal del proyecto.
  - «Se contó» refleja la pasiva impersonal necesaria en español para el hebreo elíptico sin añadir sujetos inexistentes.
