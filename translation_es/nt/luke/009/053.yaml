review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: rechazo de Jesús por parte de los samaritanos, con ἐδέξαντο bien representado por ''recibieron'', y la cláusula causal con ὅτι correctamente como ''porque''. También preserva la imagen literal de τὸ πρόσωπον αὐτοῦ y la dirección hacia Jerusalén. Sin embargo, la colocación de las notas no sigue bien la auditoría inglesa: la nota sobre el giro idiomático de ''su rostro...'' debe anclarse en esa frase, no al final de ''Jerusalén'', y la nota sobre ''recibieron'' no debe absorber la otra referencia. Además, la nota b actual contiene una formulación española algo torpe (''estaba yendo'').'
  spanish_quality_summary: 'El texto principal es natural, claro y de registro bíblico digno: ''Y no lo recibieron, porque su rostro iba hacia Jerusalén.'' Suena bien en español neutro y evita tanto el calco rígido como la paráfrasis excesiva. La única reparación necesaria es de anclaje y pulido de notas; el texto principal puede mantenerse. En las notas, conviene mejorar la redacción inicial (''O:'' en vez de comillas mal puntuadas) y reemplazar ''estaba yendo'' por una alternativa más idiomática.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, esclavo, etc. La elección 'recibieron' para ἐδέξαντο concuerda con la decisión léxica documentada, y 'rostro' para πρόσωπον preserva la literalidad e idiomaticidad buscadas por la POB.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota sobre el giro idiomático
    rationale: La nota b explica 'su rostro iba...' pero en el borrador está anclada solo en 'Jerusalén', lo que debilita la conexión con la frase completa que refleja τὸ πρόσωπον αὐτοῦ ἦν πορευόμενον.
  - severity: low
    issue: Redacción poco idiomática en la nota b
    rationale: La opción 'su rostro estaba yendo a Jerusalén' suena poco natural en español. Puede conservarse la literalidad con 'su rostro iba a Jerusalén' y explicar el valor idiomático sin esa alternativa forzada.
  - severity: low
    issue: Puntuación/comillas mejorables en la nota a
    rationale: La formulación actual con comillas anidadas resulta poco limpia. Una redacción más directa mejora legibilidad sin cambiar el contenido.
  revised_spanish_text: Y no lo recibieron[a], porque su rostro iba hacia Jerusalén[b].
  revised_footnotes:
  - marker: a
    text: 'O: ''no lo acogieron''. El verbo puede significar recibir, aceptar o dar acogida; aquí probablemente alude al rechazo de hospitalidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: ''su rostro iba a Jerusalén''. El griego también puede expresarse como ''su rostro estaba orientado hacia Jerusalén''; es un giro que indica dirección fija o resolución.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal, que es fiel y natural, pero se corrigen el anclaje y la redacción de las notas para alinearlas mejor con la auditoría inglesa y con un español más idiomático.
