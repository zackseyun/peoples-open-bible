- source_word: אֱלֹהַ֣יִ/ךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Diosa
  - tu divinidad
  lexicon: HALOT
  rationale: La forma hebrea posee sufijo de 2.ª persona femenina singular y función singular referida al Dios de Israel. «Tu Dios» comunica ese valor con claridad y sin introducir matices ajenos.
- source_word: צִיּֽוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: nombre propio
  rationale: Nombre propio bíblico en forma española tradicional y ampliamente entendida, adecuada al paralelismo con Jerusalén.
