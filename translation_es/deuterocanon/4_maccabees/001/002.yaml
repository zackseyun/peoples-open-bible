translation:
  language: es
  text: Pues en verdad este discurso es necesario para el conocimiento[a], e incluye elogio de la mayor virtud, quiero decir, de la prudencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entendimiento». El griego εἰς ἐπιστήμην puede traducirse de ambas maneras.
    reason: alternative_reading
  - marker: b
    text: O «sabiduría práctica». El griego φρόνησις denota un juicio moral prudente.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναγκαῖος
  english_pob_choice: necessary
  chosen_spanish: necesario
  alternatives_spanish:
  - indispensable
  - necesario
  lexicon: LSJ
  rationale: Conserva la fuerza de necesidad del adjetivo sin volver la frase artificial en español. "Necesario" reproduce bien el valor argumentativo del griego en este contexto.
- source_word: εἰς ἐπιστήμην
  english_pob_choice: for understanding
  chosen_spanish: para el conocimiento
  alternatives_spanish:
  - para el entendimiento
  - para el conocimiento
  lexicon: LSJ
  rationale: El griego permite tanto "conocimiento" como un sentido más disciplinado de "entendimiento". En español, "para el conocimiento" sigue de cerca la apertura semántica documentada y mantiene el paralelo con la nota alternativa.
- source_word: λόγος
  english_pob_choice: discourse
  chosen_spanish: discurso
  alternatives_spanish:
  - argumento
  - tratado
  - palabra
  lexicon: LSJ
  rationale: Aquí λόγος designa una exposición razonada, no una sola palabra. "Discurso" conserva el registro retórico-filosófico de 4 Macabeos y es natural en español.
- source_word: ἄξιός
  english_pob_choice: contains praise of
  chosen_spanish: contiene elogio de
  alternatives_spanish:
  - es digno de
  - merece elogio por
  lexicon: LSJ
  rationale: Sigo el análisis sintáctico del audit trail, donde ἄξιός con περιέχει ἔπαινον funciona idiomáticamente como inclusión de elogio. "Contiene elogio de" evita una paráfrasis más libre y refleja la construcción del griego.
- source_word: τῆς μεγίστης ἀρετῆς
  english_pob_choice: the greatest virtue
  chosen_spanish: de la virtud más grande
  alternatives_spanish:
  - de la mayor virtud
  - de la excelencia más alta
  lexicon: LSJ
  rationale: '"Virtud" es el equivalente directo de ἀρετή en este marco moral-filosófico. "La virtud más grande" mantiene la comparación superlativa sin introducir categorías doctrinales ajenas.'
- source_word: φρονήσεως
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - sabiduría práctica
  - buen juicio
  lexicon: LSJ
  rationale: '"Prudencia" es la traducción filosófica estándar de φρόνησις y conserva su matiz de juicio moral e intelectual práctico. Se evita "sabiduría" para no diluir el término técnico.'
- source_word: περιέχει ἔπαινον
  english_pob_choice: contains praise
  chosen_spanish: contiene elogio
  alternatives_spanish:
  - incluye alabanza
  - encierra elogio
  lexicon: LSJ
  rationale: La frase expresa que el discurso incluye una valoración encomiástica de la virtud nombrada. "Contiene elogio" es cercano al griego y claro en español.
theological_decisions:
- issue: Registro filosófico de las virtudes sin carga doctrinal posterior
  english_pob_reading: Use 'virtue' and 'prudence' in their moral-philosophical sense
  chosen_spanish_reading: Mantener 'virtud' y 'prudencia' en sentido moral-filosófico
  alternative_spanish_readings:
  - usar 'excelencia' y 'sabiduría'
  - usar términos más devocionales
  rationale: 4 Macabeos abre en un registro filosófico. En español conviene conservar ese campo semántico con terminología de virtud, sin trasladarlo a vocabulario eclesiástico posterior.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y la pauta auditada en inglés. Se conserva la estructura retórica, se evita una traducción mecánica del inglés y se mantiene la ambigüedad documentada de εἰς ἐπιστήμην y φρόνησις mediante notas alternativas en español.
  spanish_consistency_notes:
  - Se usa 'discurso' para λόγος en coherencia con un contexto retórico-filosófico.
  - '''Virtud'' se mantiene para ἀρετή, sin sustituirlo por ''excelencia'' salvo nota alternativa implícita en la decisión léxica.'
  - '''Prudencia'' se usa como equivalente técnico de φρόνησις, de acuerdo con la tradición filosófica y el audit trail.'
  - Las notas [a] y [b] se colocan en los términos que presentan alternativa semántica real en español.
