base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/008/035.yaml
  text: Having been humbled by those whom he had considered the least[a], and by the Lord’s help having laid aside his splendid robe, he made himself a solitary fugitive through the inland country and came to Antioch[c][b], having fared exceedingly well in the destruction of his army.
  footnotes:
  - marker: a
    text: Or, more literally, 'through the interior.' The Greek term refers to inland territory, not the Mediterranean Sea.
    reason: lexical_alternative
  - marker: b
    text: '''Like a fugitive'' translates an expression that can more literally mean ''in the manner of a runaway.'''
    reason: lexical_alternative
  - marker: c
    text: 'The wording is ironic: he ''prospered'' only in relation to the destruction of his own army.'
    reason: lexical_alternative
