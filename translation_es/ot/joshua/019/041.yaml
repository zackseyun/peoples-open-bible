translation:
  language: es
  text: Y el límite de su heredad fue Zora, Estaol, e Ir-shemesh[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ir-shemesh significa «ciudad del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: Y ... fue
  alternatives_spanish:
  - Ahora ... fue
  - Y sucedió que ...
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce la cláusula narrativa; en español, 'Y' conserva la continuidad, y 'fue' mantiene la relación copulativa sin una perífrasis innecesaria.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - extremo
  lexicon: HALOT
  rationale: En contextos de repartición territorial, גְּבוּל denota el contorno o demarcación de la heredad. 'Límite' es natural en español y conserva esa idea.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión asignada
  lexicon: HALOT
  rationale: נַחֲלָה en Josué se refiere al lote territorial recibido por herencia. 'Heredad' comunica mejor ese valor bíblico-jurídico que 'herencia' o 'posesión'.
- source_word: צָרְעָה
  english_pob_choice: Zorah
  chosen_spanish: Zora
  alternatives_spanish:
  - Zorá
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar en forma castellana sobria y reconocible. 'Zora' evita una transliteración más pesada y se ajusta al uso toponímico en español.
- source_word: אֶשְׁתָּאוֹל
  english_pob_choice: Eshtaol
  chosen_spanish: Estaol
  alternatives_spanish:
  - Eshtaol
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del lugar con adaptación gráfica moderada al español, preservando la identificación geográfica.
- source_word: עִיר שָׁמֶשׁ
  english_pob_choice: Ir-shemesh
  chosen_spanish: Ir-shemes
  alternatives_spanish:
  - Ir-shemesh
  - Ciudad del sol
  lexicon: HALOT
  rationale: Como nombre de lugar compuesto, se translitera en vez de traducirse en el texto principal. Se adapta la terminación para una lectura más fluida en español, manteniendo la referencia al topónimo.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas. La única nota necesaria es la transparencia semántica de Ir-shemesh, preservando el nombre propio en el cuerpo principal y su sentido en la nota.
  spanish_consistency_notes:
  - Se mantiene el paralelismo nominal de la lista geográfica.
  - Se usa 'heredad' para reflejar el matiz de allotment territorial de נַחֲלָה.
  - Los topónimos se presentan con adaptación española moderada y nota explicativa para el compuesto final.
