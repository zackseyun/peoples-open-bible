translation:
  language: es
  text: 'Entonces estos se acercaron a Felipe[a], que era de Betsaida de Galilea, y le preguntaban, diciendo: «Señor, queremos ver a Jesús».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor, queremos ver a Jesús». El vocativo griego κύριε también puede ser una forma respetuosa de dirigirse a una persona, no solo «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - ellos
  - aquellos
  - estas personas
  lexicon: BDAG
  rationale: El demostrativo plural retoma a los griegos del contexto anterior. «Estos» conserva mejor la conexión discursiva que un pronombre más general, y es natural en español.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Marca continuidad narrativa. «Entonces» es idiomático en español y mantiene la progresión sin cargar demasiado la inferencia.
- source_word: προσῆλθον
  english_pob_choice: came to
  chosen_spanish: se acercaron a
  alternatives_spanish:
  - fueron a
  - vinieron a
  lexicon: BDAG
  rationale: El verbo puede expresar aproximación o venir a alguien. «Se acercaron a» conserva bien el movimiento hacia Felipe y resulta natural en español.
- source_word: Φιλίππῳ
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: τῷ ἀπὸ Βηθσαϊδὰ τῆς Γαλιλαίας
  english_pob_choice: who was from Bethsaida in Galilee
  chosen_spanish: que era de Betsaida de Galilea
  alternatives_spanish:
  - el de Betsaida de Galilea
  - que era originario de Betsaida de Galilea
  lexicon: BDAG
  rationale: La frase identificadora se expresa naturalmente como relativa. «De Galilea» conserva la relación geográfica sin introducir una paráfrasis más fuerte.
- source_word: ἠρώτων
  english_pob_choice: were asking
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - lo estaban pidiendo
  - le seguían preguntando
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso. En español, «le preguntaban» refleja bien esa continuidad y suena más natural que un calco progresivo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Participio introductorio de la cita directa. «Diciendo» preserva la construcción sin añadir contenido.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Caballero
  lexicon: BDAG
  rationale: En el texto griego puede ser un tratamiento respetuoso a Felipe o una forma de «Señor». En español, «Señor» conserva la ambigüedad y el valor reverencial que el registro del pasaje permite.
- source_word: θέλομεν
  english_pob_choice: we want
  chosen_spanish: queremos
  alternatives_spanish:
  - deseamos
  - queremos ver
  lexicon: BDAG
  rationale: «Θέλω» expresa voluntad/deseo. «Queremos» es el equivalente más natural y directo en español para esta petición.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús mismo
  - a Jesús
  lexicon: BDAG
  rationale: El acusativo con artículo se traduce con la marca personal adecuada en español. Se mantiene el nombre propio sin añadir matices no presentes.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - conocer
  - ir a ver
  lexicon: BDAG
  rationale: El infinitivo aoristo de ὁράω es literalmente «ver». «Ver» evita ampliar el sentido hacia una audiencia o entrevista que el texto no explicita.
theological_decisions:
- issue: Vocativo Κύριε en la petición dirigida a Felipe
  english_pob_reading: Lord, with footnoted alternative Sir
  chosen_spanish_reading: Señor, con nota que ofrece «Señor» o «Señor» como posible tratamiento respetuoso no cristológico?
  alternative_spanish_readings:
  - Señor
  - Caballero
  - Señor mío
  rationale: El griego admite un tratamiento respetuoso humano y también el valor de «Señor». Dado que el contexto inmediato sugiere que hablan a Felipe, la traducción principal conserva «Señor» por transparencia terminológica con el proyecto, y la nota aclara la ambigüedad sin resolverla de manera dogmática.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Aspecto imperfectivo de ἠρώτων
  english_pob_reading: were asking
  chosen_spanish_reading: le preguntaban
  alternative_spanish_readings:
  - seguían preguntando
  - le estaban preguntando
  rationale: El imperfecto presenta la acción como en desarrollo. En español, el imperfecto simple expresa esa continuidad de modo natural sin necesidad de un progresivo perifrástico.
  doctrine_reference: Aspecto verbal griego en narrativa
- issue: Finalidad de ἰδεῖν
  english_pob_reading: to see Jesus
  chosen_spanish_reading: ver a Jesús
  alternative_spanish_readings:
  - conocer a Jesús
  - entrevistar a Jesús
  rationale: El texto griego dice literalmente «ver». Aunque el contexto puede sugerir una audiencia o encuentro, no debe imponerse una ampliación interpretativa en la línea principal.
  doctrine_reference: Principio de no paráfrasis excesiva
translation_notes:
  revision_awareness: 'El contexto de revisión indica que la redacción inglesa final quedó estable y sin cambios. La propuesta española sigue ese estado: conserva la ambigüedad de κύριε, mantiene el aspecto imperfectivo de ἠρώτων y traduce ἰδεῖν de forma literal como «ver», sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a יהוה; aquí no aparece.
  - «Señor» se mantiene para κύριος según la decisión léxica auditada, con nota de ambigüedad respetuosa.
  - El nombre propio Jesús se conserva sin artículo en castellano.
  - La puntuación de la cita directa sigue el estilo español con comillas angulares implícitas en la presentación de la versión impresa; aquí se usan comillas dobles estándar por formato de datos.
