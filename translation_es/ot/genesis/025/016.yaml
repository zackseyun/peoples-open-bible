translation:
  language: es
  text: 'Estos son los hijos de Ismael, y estos son sus nombres, según[a] sus asentamientos y según sus campamentos: doce príncipes[b] según sus pueblos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aldeas' para 'asentamientos', y 'campamentos' para 'campamentos'.
    reason: lexical_alternative
  - marker: b
    text: O 'jefes' o 'caudillos' según sus pueblos.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה הֵם
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos fueron
  lexicon: HALOT
  rationale: La construcción demostrativa + pronombre introduce una enumeración genealógica; en español, el presente resulta natural y fiel al valor presentacional del hebreo.
- source_word: בְּנֵי יִשְׁמָעֵאל
  english_pob_choice: the sons of Ishmael
  chosen_spanish: los hijos de Ismael
  alternatives_spanish:
  - los descendientes de Ismael
  lexicon: HALOT
  rationale: Se conserva el sentido literal de בְּנֵי como 'hijos', apropiado en este cierre de lista nominal; 'descendientes' sería más amplio de lo que exige el contexto.
- source_word: שְׁמֹתָם
  english_pob_choice: their names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - los nombres de ellos
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo con sufijo de tercera persona plural.
- source_word: בְּחַצְרֵיהֶם
  english_pob_choice: by their settlements
  chosen_spanish: en sus asentamientos
  alternatives_spanish:
  - en sus aldeas
  - en sus poblados
  lexicon: HALOT
  rationale: חָצֵר puede referirse a asentamiento, aldea o habitáculo cercado; 'asentamientos' conserva el alcance geográfico-tribal sin reducirlo demasiado.
- source_word: וּבְטִירֹתָם
  english_pob_choice: by their encampments
  chosen_spanish: y en sus campamentos
  alternatives_spanish:
  - y en sus campamentos fortificados
  - y en sus campamentos militares
  lexicon: HALOT
  rationale: טִירָה puede denotar campamento o enclave fortificado; 'campamentos' mantiene la imagen seminómada y el paralelismo con חַצְרֵיהֶם.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: נְשִׂיאִם
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - caudillos
  - jefes
  lexicon: HALOT
  rationale: '''Príncipes'' conserva la dignidad del término y es una equivalencia estable en contextos patriarcales y tribales; ''jefes'' o ''caudillos'' estrechan o alteran el matiz.'
- source_word: לְאֻמֹּתָם
  english_pob_choice: according to their peoples
  chosen_spanish: según sus pueblos
  alternatives_spanish:
  - según sus pueblos y clanes
  - según sus naciones
  lexicon: HALOT
  rationale: אֻמָּה designa un grupo humano/pueblo; 'pueblos' refleja mejor el paralelo del inglés POB y evita la sobrecarga de 'naciones' en un contexto genealógico.
theological_decisions:
- issue: Valor de בְּ en la doble expresión locativa
  english_pob_reading: by their settlements and by their encampments
  chosen_spanish_reading: en sus asentamientos y en sus campamentos
  alternative_spanish_readings:
  - por sus asentamientos y por sus campamentos
  - según sus asentamientos y según sus campamentos
  rationale: El hebreo admite un valor locativo natural aquí; en español, 'en' expresa mejor la ubicación de los grupos y evita una construcción poco idiomática. Se preserva el paralelismo semántico sin perder el sentido geográfico.
  doctrine_reference: N/A
- issue: 'Título tribal: נְשִׂיאִם'
  english_pob_reading: princes
  chosen_spanish_reading: príncipes
  alternative_spanish_readings:
  - jefes
  - caudillos
  rationale: 'No hay una carga doctrinal, pero sí un matiz social importante: ''príncipes'' mantiene el tono elevado del hebreo y del POB inglés, sin introducir una lectura política moderna.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión inglesa en el punto semántico relevante: se entiende la frase preposicional como locativa y se mantiene la equivalencia de אֻמֹּתָם con ''pueblos''. No se adopta la alternativa inglesa anterior ''tribes'' porque el auditor final ya corrigió ese punto hacia ''peoples'', más cercano al hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'hijos' para בְּנֵי en coherencia con el valor literal y genealógico.
  - '''Asentamientos'' y ''campamentos'' conservan el paralelismo semántico del hebreo sin sobrerinterpretar como aldeas específicamente urbanas o militares.'
  - '''Pueblos'' evita confundir אֻמֹּתָם con ''naciones'' de escala excesiva en español.'
  - No se introduce mayúscula teológica innecesaria, porque el versículo no contiene un nombre divino ni una referencia cristológica.
