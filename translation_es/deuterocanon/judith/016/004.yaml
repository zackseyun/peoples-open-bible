translation:
  language: es
  text: Él dijo que prendería fuego a mis montañas, y mataría a mis jóvenes hombres con la espada, y arrojaría a mis niños de pecho al suelo, y daría a mis pequeños como botín, y despojaría a mis vírgenes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «violaría a mis vírgenes». El verbo griego significa más literalmente «despojar» o «desnudar», pero en este contexto de violencia de guerra puede implicar violación sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: He said he would
  chosen_spanish: Él dijo que ...ría
  alternatives_spanish:
  - Él dijo
  - Él declaró que ...ría
  lexicon: BDAG
  rationale: El aoristo introduce la intención expresada por el enemigo. En español, «dijo que ...ría» conserva con naturalidad la relación de futuro en discurso indirecto sin volver la frase rígidamente literal.
- source_word: ἐμπρήσειν
  english_pob_choice: set ... on fire
  chosen_spanish: prendería fuego a
  alternatives_spanish:
  - quemaría
  - incendiaría
  lexicon: LSJ
  rationale: El infinitivo expresa la acción de quemar/incendiar. «Prendería fuego a» conserva el valor causativo y la viveza del griego, de modo más idiomático que un simple «quemaría».
- source_word: τὰ ὅρη μου
  english_pob_choice: my mountains
  chosen_spanish: mis montañas
  alternatives_spanish:
  - mis montes
  - mi región montañosa
  lexicon: LSJ
  rationale: ὄρη significa literalmente «montañas». Se mantiene el plural y la imagen poética directa del texto griego.
- source_word: ἀνελεῖν
  english_pob_choice: kill
  chosen_spanish: mataría
  alternatives_spanish:
  - daría muerte a
  - destruiría
  lexicon: BDAG
  rationale: El verbo significa quitar la vida o matar. «Mataría» es claro, natural y suficientemente preciso en español moderno.
- source_word: τοὺς νεανίσκους μου
  english_pob_choice: my young men
  chosen_spanish: a mis jóvenes
  alternatives_spanish:
  - a mis mozos
  - a mis muchachos
  lexicon: BDAG
  rationale: νεανίσκοι son jóvenes varones o jóvenes hombres. «Mis jóvenes» comunica el sentido de manera breve y digna, sin introducir un matiz militar que no está explícito en el sustantivo.
- source_word: ῥομφαίᾳ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - con una espada
  lexicon: LSJ
  rationale: ῥομφαία es una espada. «Con la espada» es la manera natural de reproducir el instrumento de la violencia en español.
- source_word: τὰ θηλάζοντά μου
  english_pob_choice: my nursing children
  chosen_spanish: a mis niños de pecho
  alternatives_spanish:
  - a mis lactantes
  - a los que aún maman
  lexicon: LSJ
  rationale: El participio refiere a niños que todavía maman. «Niños de pecho» es una expresión clara y reconocible en español para este estado de lactancia.
- source_word: θήσει εἰς ἔδαφος
  english_pob_choice: throw ... to the ground
  chosen_spanish: arrojaría ... al suelo
  alternatives_spanish:
  - echaría ... por tierra
  - los pondría por tierra
  lexicon: LSJ
  rationale: La revisión inglesa prefirió «throw» para no añadir intensidad ajena al griego. «Arrojaría ... al suelo» preserva ese gesto violento sin exagerarlo más allá del texto.
- source_word: τὰ νήπιά μου
  english_pob_choice: my infants
  chosen_spanish: a mis pequeños
  alternatives_spanish:
  - a mis infantes
  - a mis bebés
  lexicon: BDAG
  rationale: νήπια designa niños muy pequeños. «Mis pequeños» es natural en español y mantiene la referencia a infantes sin sonar técnico o frío.
- source_word: δώσει εἰς προνομὴν
  english_pob_choice: give ... as plunder
  chosen_spanish: daría ... como botín
  alternatives_spanish:
  - entregaría ... como presa
  - los dejaría como despojo
  lexicon: LSJ
  rationale: προνομή denota botín, presa o despojo de guerra. «Como botín» transmite con claridad que los niños quedan tratados como presa bélica.
- source_word: τὰς παρθένους
  english_pob_choice: my virgins
  chosen_spanish: a mis vírgenes
  alternatives_spanish:
  - a mis doncellas
  - a mis jóvenes vírgenes
  lexicon: BDAG
  rationale: παρθένοι significa literalmente vírgenes o doncellas. Se conserva «vírgenes» para mantener el término sexualmente explícito del griego, conforme a la preferencia del proyecto por no suavizarlo sin razón textual.
- source_word: σκυλεῦσαι
  english_pob_choice: despoil
  chosen_spanish: despojaría
  alternatives_spanish:
  - saquearía
  - desnudaría
  lexicon: LSJ
  rationale: El verbo significa despojar, saquear o desvestir. «Despojaría» mantiene el núcleo léxico amplio sin convertirlo en una traducción más específica de lo que el griego exige.
theological_decisions:
- issue: Si la violencia contra las vírgenes debe explicitarse como sexual en el texto principal
  english_pob_reading: despoil my virgins
  chosen_spanish_reading: despojaría a mis vírgenes
  alternative_spanish_readings:
  - saquearía a mis vírgenes
  - violaría a mis vírgenes
  rationale: El verbo griego σκυλεῦσαι significa ante todo despojar o saquear. Aunque el contexto bélico puede sugerir violación sexual, el léxico no lo expresa de forma inequívoca. Por eso el texto principal conserva el sentido amplio, y la posible implicación queda abierta sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual y no importar una precisión que el verbo no obliga a afirmar.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al usar una construcción directa para θήσει εἰς ἔδαφος («arrojaría ... al suelo») y una formulación literal y natural para δώσει εἰς προνομὴν («daría ... como botín»), sin intensificar más allá del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - Se conserva «vírgenes» como término explícito y no se sustituye por «doncellas» o «jóvenes mujeres» sin base textual.
  - «Niños de pecho» y «pequeños» distinguen correctamente dos grupos distintos de menores en el paralelo griego.
  - La puntuación conserva el paralelismo acumulativo del original griego.
