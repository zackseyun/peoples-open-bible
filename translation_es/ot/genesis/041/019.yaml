base_translation:
  language: en
  yaml_path: translation/ot/genesis/041/019.yaml
  text: And behold[a], seven other cows came up after them, poor and very ugly in appearance and thin in flesh[b]. I had not seen any like them in all the land of Egypt for ugliness.
  footnotes:
  - marker: a
    text: Or 'for ugliness' or 'for wretchedness'; the Hebrew expression summarizes how exceptionally bad-looking and miserable the cows were.
    reason: lexical_alternative
  - marker: b
    text: Or 'for badness'.
    reason: previous_rendering
