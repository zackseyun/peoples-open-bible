theological_decisions:
- issue: Identification of the Father’s bosom with the Holy Spirit
  chosen_reading: 'Render the clause as an ontological identification: ‘his bosom
    is the Holy Spirit.’'
  alternative_readings:
  - Metaphorical bosom, i.e., intimate presence
  rationale: The Coptic explicitly uses the equative structure with the definite article
    (ⲡⲉⲑⲏⲡ … ⲡⲉ ⲡⲛⲁ ⲉⲧⲟⲩⲁⲁⲃ). Valentinian sources frequently make this identification;
    the translation preserves the doctrinal assertion without dilution.
- issue: Retention of technical cosmological terms
  chosen_reading: Keep ‘Aeon,’ ‘Unity,’ and ‘matter (hylē)’ in main text.
  alternative_readings:
  - Age; oneness; materiality
  rationale: The passage functions within a Valentinian cosmology where these are
    terms of art. Replacing them with generic English terms obscures the argument
    about the return from multiplicity to Unity.
revision_risk_note: Moderate. While the core theological clauses (‘bosom’ = ‘Holy
  Spirit’; ‘deficiency’ vs. ‘Unity’; the triad ‘matter/darkness/death’ undone by ‘fire/light/life’)
  are clear in the Codex I lines, several incipits are terse and the line breaks obscure
  one member of the final triad (‘life’). One minimal repair is supplied to restore
  rhetorical symmetry. The brief titular line about ‘Jesus … the Sweetness … fruit
  of his heart’ is condensed, as the surrounding catalog of divine attributes belongs
  to the preceding section and the OCR boundaries are tight. Future revision may refine
  the first sentences if clearer photos or a diplomatic edition suggests a different
  segmentation.
