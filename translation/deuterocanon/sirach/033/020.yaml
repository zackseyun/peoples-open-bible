  text: υἱῷ καὶ γυναικί, ἀδελφῷ καὶ φίλῳ, μὴ δῷς ἐξουσίαν ἐπὶ σὲ ἐν ζωῇ σου· καὶ μὴ δῷς ἑτέρῳ τὰ χρήματά σου, ἵνα μὴ μεταμεληθεὶς δέῃ περὶ αὐτῶν.
