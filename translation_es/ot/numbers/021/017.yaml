revisions:
- from: 'Entonces Israel cantó esta canción: «¡Brota, oh pozo[a]! ¡Respóndanle!»'
  to: 'Entonces Israel cantó esta canción: «¡Brota, oh fuente[a]! ¡Respóndanle!»'
  rationale: Se revisa «pozo» a «fuente» para conservar con más claridad en español el referente femenino de בְאֵר y el pronombre לָהּ, evitando una posible opacidad en «¡Respóndanle!». La imagen poética de agua que brota sigue intacta, y la nota se ajusta para reflejar el mismo sustantivo.
