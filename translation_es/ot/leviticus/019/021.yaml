translation:
  language: es
  text: 'Y traerá su ofrenda por la culpa[a] a Yahvé, a la entrada de la tienda de reunión: un carnero como ofrenda por la culpa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ofrenda de reparación». El término hebreo אָשָׁם puede referirse tanto a la culpa como a la ofrenda presentada en reparación por ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: And he shall bring
  chosen_spanish: Y traerá
  alternatives_spanish:
  - Y deberá traer
  - Entonces traerá
  lexicon: HALOT
  rationale: El perfecto hifil con waw en material legal expresa mandato o futuro prescriptivo. «Traerá» conserva el valor injuntivo en español bíblico moderno sin volverlo demasiado arcaico.
- source_word: אֲשָׁמוֹ
  english_pob_choice: his guilt offering
  chosen_spanish: su ofrenda por el pecado
  alternatives_spanish:
  - su ofrenda por la culpa
  - su ofrenda de reparación
  lexicon: HALOT
  rationale: En este contexto sacrificial, אָשָׁם puede abarcar tanto la culpa como la ofrenda relacionada con la reparación. «Ofrenda por el pecado» es un equivalente funcional comprensible en español, pero se conserva una nota para no borrar la tensión léxica entre culpa y reparación.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de verter יהוה como «Yahvé», preservando el nombre divino del texto hebreo en vez de sustituirlo por un título.
- source_word: אֶל פֶּתַח
  english_pob_choice: to the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - al umbral
  - a la puerta
  lexicon: HALOT
  rationale: פֶּתַח denota una entrada o acceso. «A la entrada» es natural en español y mantiene el sentido espacial sin forzar «umbral» o «puerta».
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: de la tienda de reunión
  alternatives_spanish:
  - del tabernáculo de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce el nombre técnico del santuario sin introducir un equivalente más tradicional que no está exigido por el hebreo. Se evita «tabernáculo» porque el hebreo dice literalmente «tienda».
- source_word: אֵיל
  english_pob_choice: a ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho carnero
  lexicon: HALOT
  rationale: אֵיל designa específicamente un carnero. «Carnero» es el equivalente normal y preciso en español.
- source_word: אָשָׁם
  english_pob_choice: as a guilt offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por la culpa
  - como ofrenda de reparación
  lexicon: HALOT
  rationale: La frase final funciona appositivamente para identificar la función sacrificial del carnero. Aunque el término hebreo tiene un campo semántico de culpa/reparación, se mantiene aquí una formulación sacrificial clara en español; la nota preserva la alternativa léxica importante.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene el nombre del pacto como forma visible en español, conforme a la decisión editorial del proyecto. Esto preserva la transparencia del texto hebreo y evita el reemplazo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אָשָׁם en contexto sacrificial
  english_pob_reading: guilt offering / reparation offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la culpa
  - ofrenda de reparación
  rationale: El hebreo conserva una tensión entre culpa y el sacrificio que trata con esa culpa. En español se opta por una forma breve y entendible, pero se deja constancia de la alternativa de reparación para no borrar el matiz.
  doctrine_reference: HALOT; nota lexical del POB en inglés
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y recibió acuerdo alto; por eso esta versión española sigue de cerca la lectura estable del POB inglés, pero reexpresa el valor sacrificial de אָשָׁם con una formulación española legible y mantiene la alternativa léxica en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se prefiere «tienda de reunión» a «tabernáculo de reunión» por fidelidad al hebreo y coherencia terminológica.
  - «Carnero» se emplea como término zoológico preciso para אֵיל.
  - La nota de אָשָׁם preserva la tensión entre culpa y reparación sin sobrecargar el texto principal.
