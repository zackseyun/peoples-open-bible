translation:
  language: es
  text: Sedequías tenía veintiún años cuando comenzó a reinar, y reinó once años en Jerusalén. El nombre de su madre era Hamutal[a], hija de Jeremías, de Libna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hamutal también se escribe Hamital en algunas traducciones en inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְאַחַת שָׁנָה
  english_pob_choice: was twenty-one years old
  chosen_spanish: tenía veintiún años
  alternatives_spanish:
  - era hijo de veintiún años
  - tenía la edad de veintiún años
  lexicon: HALOT
  rationale: El hebreo es un modismo de edad; en español natural se expresa con 'tenía veintiún años'. Mantiene el contenido sin calcar la estructura literal.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando se hizo rey
  - al comenzar a reinar
  lexicon: HALOT
  rationale: La construcción marca el momento de la entronización. 'Comenzó a reinar' comunica bien el inicio del reinado en español actual.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo denota el ejercicio del reinado; 'reinó' preserva con precisión la relación verbal y el registro regnal.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Correspondencia locativa directa y natural en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre fue
  - Su madre se llamaba
  lexicon: HALOT
  rationale: La fórmula regnal hebrea se conserva con una construcción idiomática en español que mantiene el tono documental.
- source_word: חמיטל
  english_pob_choice: Hamutal
  chosen_spanish: Hamutal
  alternatives_spanish:
  - Hamital
  lexicon: HALOT
  rationale: Se translitera el nombre propio. Se mantiene la forma principal 'Hamutal', que es la usada en la traducción inglesa auditada, sin ocultar la variante documentada.
- source_word: בַּת יִרְמְיָהוּ
  english_pob_choice: daughter of Jeremiah
  chosen_spanish: hija de Jeremías
  alternatives_spanish:
  - hija de Yirmeyahu
  - descendiente de Jeremías
  lexicon: HALOT
  rationale: Expresión genealógica estándar; 'hija de Jeremías' reproduce fielmente la filiación indicada por el hebreo.
- source_word: מִלִּבְנָה
  english_pob_choice: from Libnah
  chosen_spanish: de Libna
  alternatives_spanish:
  - procedente de Libna
  - originaria de Libna
  lexicon: HALOT
  rationale: La preposición de origen se vierte de manera natural con 'de'. 'Libna' conserva la forma toponímica habitual en español y evita una perífrasis innecesaria.
translation_notes:
  revision_awareness: 'La versión inglesa auditada y la revisión más reciente no muestran cambios sustantivos: se mantiene la lectura regnal estándar, sin variantes textuales ni ajustes doctrinales.'
  spanish_consistency_notes:
  - Se mantiene el patrón regnal con nombre del rey, edad al comenzar el reinado, duración del reinado y filiación materna.
  - Se usa 'reinó' para el verbo regnal y 'comenzó a reinar' para el momento de acceso al trono, evitando ambigüedad.
  - Los nombres propios se transliteran de forma consistente; la nota conserva la variante ortográfica documentada para Hamutal.
  - '''Libna'' se mantiene como topónimo breve y natural en español, sin añadir información geográfica no presente en el texto.'
