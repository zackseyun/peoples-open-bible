translation:
  language: es
  text: Y habitarán allí Judá y todas sus ciudades juntos, los labradores y los que viajan con el rebaño[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y los pastores que viajan con el rebaño». El hebreo dice literalmente «y viajan/se desplazan con el rebaño», probablemente en referencia a pastores o grupos pastoriles nómadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ בָהּ
  english_pob_choice: will dwell there
  chosen_spanish: habitarán allí
  alternatives_spanish:
  - vivirán allí
  - se establecerán allí
  lexicon: HALOT
  rationale: יָשַׁב expresa habitar, morar o establecerse. «Habitarán allí» conserva el valor de residencia/restauración sin añadir una precisión más fuerte que el hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá la región
  - la tierra de Judá
  lexicon: HALOT
  rationale: Es nombre propio y también puede funcionar colectivamente para el pueblo/territorio. «Judá» mantiene esa amplitud sin explicitar más de lo que el texto dice.
- source_word: וְכָל עָרָיו
  english_pob_choice: and all its cities
  chosen_spanish: y todas sus ciudades
  alternatives_spanish:
  - y todas las ciudades de ella
  - y todas las ciudades de Judá
  lexicon: HALOT
  rationale: El sufijo masculino singular remite a Judá como entidad colectiva. En español, «sus ciudades» reproduce bien esa referencia colectiva y naturaliza el posesivo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - todas juntas
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio indica convivencia unificada. «Juntas» conserva la idea de reunión común y fluidez en español.
- source_word: אִכָּרִים
  english_pob_choice: farmers
  chosen_spanish: los labradores
  alternatives_spanish:
  - los agricultores
  - los campesinos
  lexicon: HALOT
  rationale: אִכָּרִים son trabajadores de la tierra, cultivadores. «Labradores» es preciso, digno y más cercano al campo semántico agrícola que «campesinos», que puede sonar sociológicamente cargado.
- source_word: וְנָסְעוּ בָּעֵדֶר
  english_pob_choice: and those who journey with the flock
  chosen_spanish: y los que viajan con el rebaño
  alternatives_spanish:
  - y los que viajan con el flock
  - y los que se desplazan con el rebaño
  - y los pastores que viajan con el rebaño
  lexicon: HALOT
  rationale: נָסַע con בָּעֵדֶר describe moverse o viajar con grupos de animales. «Los que viajan con el rebaño» preserva el movimiento explícito y evita introducir «pastores», que sería interpretativo. «Rebaño» es el equivalente español más natural para עֵדֶר en este contexto pastoral.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo con la lectura auditada del POB en inglés: locativo «allí», posesivo colectivo «sus ciudades» y la imagen pastoral sin explicitar «pastores» en el texto principal. Se conserva la tensión entre el sentido literal de «viajar/moverse» y la posible referencia a pastores mediante nota.'
  spanish_consistency_notes:
  - Se mantiene «Judá» para el nombre propio colectivo, no «SEÑOR» ni otras convenciones de máscara, porque el versículo no contiene el nombre divino.
  - Se eligió «labradores» para אִכָּרִים y «rebaño» para עֵדֶר por claridad bíblica y naturalidad en español.
  - El marcador de nota [a] aparece en el punto donde el español necesita la misma alternativa lexical que conservó el POB en inglés.
