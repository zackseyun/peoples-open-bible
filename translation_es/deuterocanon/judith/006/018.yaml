translation:
  language: es
  text: Y el pueblo cayeron de rodillas y adoraron a Dios, y clamaron diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πεσόντες
  english_pob_choice: fell down
  chosen_spanish: cayó de rodillas
  alternatives_spanish:
  - cayeron
  - habiendo caído
  - postrándose
  lexicon: BDAG
  rationale: El aoristo participial describe la postura previa al acto de reverencia. En español, «cayó de rodillas» comunica la acción física con naturalidad y mantiene el matiz reverente sin exagerar hacia una paráfrasis más interpretativa.
- source_word: ὁ λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: «Pueblo» conserva el valor colectivo y solemne de λαός. «La gente» suena más coloquial y «la multitud» desplaza el énfasis hacia la masa reunida.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoró
  alternatives_spanish:
  - se postró ante
  - rindió culto a
  - adoraron
  lexicon: BDAG
  rationale: Con τῷ θεῷ, el verbo expresa reverencia religiosa dirigida a Dios. En español, «adoró» refleja bien ese acto de culto y evita la ambigüedad de una mera inclinación física.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  - al Dios
  lexicon: BDAG
  rationale: El dativo con προσεκύνησαν se vierte naturalmente con «a Dios» en español. Mantiene la relación verbal sin añadir un artículo marcado que no aporta valor en esta construcción.
- source_word: ἐβόησαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron la voz
  - exclamaron
  lexicon: BDAG
  rationale: «Clamaron» preserva la intensidad de un grito urgente y solemne, con un registro bíblico claro en español. «Gritaron» puede sonar más rudo y menos litúrgico.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - así diciendo
  lexicon: BDAG
  rationale: El participio presente que introduce la cita se vierte de forma directa con «diciendo», manteniendo la continuidad sintáctica y dejando abierta la conexión con lo que sigue.
theological_decisions:
- issue: El tipo de respuesta a Dios expresado por προσεκύνησαν
  english_pob_reading: worshiped God
  chosen_spanish_reading: adoró a Dios
  alternative_spanish_readings:
  - se postró ante Dios
  - rindió culto a Dios
  rationale: El contexto exige un acto de culto, no solo una inclinación corporal. «Adoró a Dios» conserva la dimensión religiosa central y es plenamente inteligible en español.
  doctrine_reference: Culto/reverencia debida solo a Dios; lectura contextual de προσκυνέω.
translation_notes:
