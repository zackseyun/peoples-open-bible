translation:
  language: es
  text: Será para señal y para testigo para Yahvé de los Ejércitos en la tierra de Egipto. Porque clamarán a Yahvé a causa de los opresores, y él les enviará un salvador y campeón[a], y los librará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un salvador y un campeón»; la expresión hebrea es difícil. El segundo término también puede entenderse más literalmente como «un grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: It will be
  chosen_spanish: Será
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: El perfecto/prospectivo con וְ introduce el resultado futuro; «será» suena natural en español y conserva el valor predictivo sin añadir explicación innecesaria.
- source_word: לְאוֹת
  english_pob_choice: for a sign
  chosen_spanish: para señal
  alternatives_spanish:
  - como señal
  - para un signo
  lexicon: HALOT
  rationale: «Señal» comunica bien אוֹת en sentido de marcador o indicio reconocible. Se omitió el artículo para mantener brevedad y fluidez, sin perder el sustantivo base.
- source_word: וּלְעֵד
  english_pob_choice: and for a witness
  chosen_spanish: y para testigo
  alternatives_spanish:
  - y para testimonio
  - y como testigo
  lexicon: HALOT
  rationale: «Testigo» preserva mejor la fuerza personal/jurídica de עֵד que «testimonio». Se mantiene el paralelismo con «señal».
- source_word: לַיהוָה צְבָאוֹת
  english_pob_choice: to Yahweh of Armies
  chosen_spanish: de Yahvé de los Ejércitos
  alternatives_spanish:
  - para Yahvé de los Ejércitos
  - de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según la norma del proyecto. Para צְבָאוֹת, «de los Ejércitos» refleja de forma transparente el hebreo y conserva la referencia al nombre divino.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: «Tierra» conserva el matiz territorial de אֶרֶץ mejor que la forma más breve «Egipto».
- source_word: יִצְעֲקוּ
  english_pob_choice: they will cry out
  chosen_spanish: clamarán
  alternatives_spanish:
  - gritarán
  - clamarán a voces
  lexicon: HALOT
  rationale: «Clamarán» expresa bien el grito de auxilio implícito en el contexto de aflicción y funciona de manera natural en español bíblico contemporáneo.
- source_word: מִפְּנֵי לֹחֲצִים
  english_pob_choice: because of oppressors
  chosen_spanish: a causa de los opresores
  alternatives_spanish:
  - por culpa de los opresores
  - ante los opresores
  lexicon: HALOT
  rationale: El hebreo expresa la situación de angustia/opresión que motiva el clamor. «A causa de» reproduce la relación causal sin forzar la sintaxis; «opresores» conserva el valor substantivado del participio.
- source_word: מוֹשִׁיעַ
  english_pob_choice: a savior
  chosen_spanish: un salvador
  alternatives_spanish:
  - un libertador
  - un rescatador
  lexicon: HALOT
  rationale: «Salvador» es el equivalente directo y mantiene el vínculo con el verbo final de librar/deliver. Se evita «libertador» para no desplazar el foco del léxico de salvar.
- source_word: וָרָב
  english_pob_choice: champion
  chosen_spanish: campeón
  alternatives_spanish:
  - defensor
  - paladín
  - grande
  lexicon: HALOT
  rationale: La forma es difícil; siguiendo la lectura funcional del POB en inglés, «campeón» comunica a alguien que contiende y sobresale por otro. Es más natural en español que «campeón» en sentido deportivo, pero aquí funciona como título de apoyo/valiente defensor. Se conserva la tensión del hebreo al no reducirlo a una sola explicación técnica.
- source_word: וְהִצִּילָם
  english_pob_choice: and he will deliver them
  chosen_spanish: y los librará
  alternatives_spanish:
  - y los rescatará
  - y los salvará
  lexicon: HALOT
  rationale: «Librará» mantiene registro bíblico y expresa היטיב el sentido de nצל en contexto de rescate efectivo. Se evita duplicar «salvará» ya usado para מוֹשִׁיעַ.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir directamente el Tetragrámaton como «Yahvé» para no ocultar el nombre propio del pacto. Esto conserva la transparencia auditiva y evita el reemplazo tradicional por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de los hosts
  rationale: Se adopta una traducción semántica transparente en español. «Ejércitos» conserva el contenido léxico del hebreo mejor que mantener el préstamo tradicional «hosts», y evita oscurecer el nombre divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Término difícil וָרָב
  english_pob_reading: champion
  chosen_spanish_reading: campeón
  alternative_spanish_readings:
  - defensor
  - paladín
  - grande
  rationale: El hebreo admite varias posibilidades. Se elige «campeón» por seguir la lectura funcional del audit trail inglés sin perder la idea de alguien que se levanta y contiende por otros. Se conserva la ambigüedad controlada mediante nota textual.
  doctrine_reference: HALOT; English audit note on lexical difficulty
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que cambió «defender» por «champion» para acercarse mejor al sentido del hebreo. La versión española adopta esa misma decisión funcional con «campeón» y mantiene el resto de la estructura de la frase sin cambios sustanciales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma uniforme para יהוה.
  - «Ejércitos» traduce צְבָאוֹת de manera transparente y coherente con el resto del proyecto.
  - «Salvador» y «librará» mantienen el campo semántico de salvar/liberar sin confundir los dos términos hebreos distintos.
  - La nota al pie se coloca solo en el sintagma difícil «un salvador y campeón» para reflejar la ambigüedad léxica documentada.
