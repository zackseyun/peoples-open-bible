lexical_decisions:
- source_word: לְגֵרְשׁוֹם
  english_pob_choice: To Gershom
  chosen_spanish: A Gersón
  alternatives_spanish:
  - Para Gersón
  - De Gersón
  lexicon: HALOT
  rationale: El ל prefijado marca aquí el encabezamiento genealógico de la línea descendiente. En español, «A Gersón» conserva la función de anuncio/encabezado sin forzar una paráfrasis más explicativa. Se usa la forma tradicional de transliteración castellana «Gersón» para el nombre propio.
- source_word: לִבְנִי
  english_pob_choice: Libni
  chosen_spanish: Libni
  alternatives_spanish:
  - Líbni
  lexicon: HALOT
  rationale: Nombre propio; se translitera sin traducir. Se mantiene la grafía breve y reconocible «Libni» como equivalente funcional del nombre hebreo en un registro bíblico en español.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: La relación filial expresa descendencia directa en la lista genealógica. En español, «su hijo» reproduce la relación de posesión/parentesco del sufijo pronominal masculino singular con claridad natural, sin añadir información que el hebreo no explicita.
- source_word: יַחַת
  english_pob_choice: Jahath
  chosen_spanish: Jahat
  alternatives_spanish:
  - Jahat
  lexicon: HALOT
  rationale: Nombre propio; se translitera. La forma «Jahat» conserva la lectura bíblica conocida en español y evita adaptar indebidamente el nombre a una transliteración inglesa.
- source_word: זִמָּה
  english_pob_choice: Zimmah
  chosen_spanish: Zimá
  alternatives_spanish:
  - Zimma
  - Zimmah
  lexicon: HALOT
  rationale: Aunque la raíz puede tener otros sentidos como sustantivo común, aquí funciona inequívocamente como nombre propio. Se opta por «Zimá», una adaptación castellana breve y legible; el acento ayuda a indicar pronunciación natural en español sin alterar el carácter del nombre.
translation_notes:
  revision_awareness: El texto hebreo presenta una simple cadena genealógica con repetición de בְנוֹ ('su hijo'); el inglés POB mantiene la estructura terse de lista, y no hubo revisiones ni notas textuales. La versión española conserva esa concisión y la función de encabezado con la preposición «A».
  spanish_consistency_notes:
  - Se mantiene un estilo genealógico breve y directo, sin introducir verbos copulativos ni explicaciones adicionales.
  - Se transliteran todos los nombres propios de forma consistente en castellano, preservando el carácter listado del versículo.
  - No se añaden notas porque el pasaje no presenta variantes textuales ni tensiones lexicográficas que requieran marcarse en español.
