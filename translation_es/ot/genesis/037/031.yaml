  rationale: Se cambió «sumergieron» por «mojaron» para reflejar mejor el sentido de «dipped» y evitar una intensificación innecesaria del hebreo. También se corrigió la nota al pie para mantener alternativas léxicas más cercanas al valor de כְּתֹנֶת y al rationale documentado en la auditoría inglesa.
