translation:
  language: es
  text: Por favor[a], que yo no muestre parcialidad hacia ningún hombre, ni adule a ninguna persona[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., 'levantar el rostro de un hombre', un hebraísmo que significa mostrar favoritismo o parcialidad.
    reason: lexical_alternative
  - marker: b
    text: O, 'ni dar títulos halagadores a ninguna persona'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל נָא
  english_pob_choice: Please, let me not
  chosen_spanish: Por favor, no muestre yo
  alternatives_spanish:
  - Por favor, no haga yo
  - Le ruego que no muestre yo
  lexicon: HALOT
  rationale: La combinación negativa con נָא expresa ruego cortés o insistente; en español, 'Por favor' conserva la cortesía, y la construcción con subjuntivo/volitivo evita un calco duro.
- source_word: אֶשָּׂא פְנֵי אִישׁ
  english_pob_choice: show partiality to any man
  chosen_spanish: muestre yo parcialidad a ningún hombre
  alternatives_spanish:
  - levante yo el rostro de ningún hombre
  - favorezca yo a ningún hombre
  - haga yo acepción de personas
  lexicon: HALOT
  rationale: La metáfora hebrea 'levantar el rostro' se entiende idiomáticamente como hacer acepción o mostrar favoritismo. 'Mostrar parcialidad' comunica bien el sentido ético y mantiene la fuerza del original sin traducir mecánicamente la imagen corporal.
- source_word: אִישׁ
  english_pob_choice: any man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - ninguna persona
  - nadie
  lexicon: HALOT
  rationale: El singular masculino hebreo se conserva con 'hombre', mientras 'ningún' refleja el valor indefinido negativo del contexto. 'Persona' habría suavizado el masculino explícito del texto fuente.
- source_word: וְאֶל אָדָם
  english_pob_choice: nor ... any person
  chosen_spanish: ni ... a ninguna persona
  alternatives_spanish:
  - ni ... a ningún ser humano
  - ni ... a ningún hombre
  lexicon: HALOT
  rationale: אָדָם en paralelismo aquí apunta a un ser humano en general; 'persona' evita redundancia excesiva en español y conserva el alcance humano-genérico del hebreo.
- source_word: לֹא אֲכַנֶּה
  english_pob_choice: nor flatter
  chosen_spanish: ni adule
  alternatives_spanish:
  - ni use halagos
  - ni dé títulos halagadores
  lexicon: HALOT
  rationale: El piʿel de כנה se refiere a usar lenguaje adulador o halagador. 'Adular' expresa el reproche moral de forma natural en español; se evita 'dar títulos' porque sería más interpretativo y menos directo.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada nota al pie tenga su marcador correspondiente en el texto español. También se alineó el registro con el contexto auditado: negativa cortés, paralelismo humano-genérico y sentido ético de כנה como adulación.'
  spanish_consistency_notes:
  - Se mantuvo 'hombre' para אַל / אִישׁ por fidelidad al masculino singular del hebreo, pero se usó 'persona' en אָדָם para el paralelismo humano-genérico.
  - '''Parcialidad'' y ''adule'' reflejan el sentido idiomático y ético del hebreo sin recurrir a una traducción mecánica.'
  - Los marcadores [a] y [b] aparecen exactamente en el texto donde corresponden.
