translation:
  language: es
  text: Y haré que tu lengua se pegue al paladar[a], y quedarás mudo[b] y no serás para ellos un hombre que reprende[c], porque son una casa rebelde[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a tu paladar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serás enmudecido» o «quedarás sin habla».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «un hombre que reprende»; es decir, uno que les reprocha o corrige.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «casa rebelde», expresión característica de Ezequiel para el pueblo como una familia corporativa en rebelión.'
    reason: cultural_note
lexical_decisions:
- source_word: וּלְשׁוֹנְךָ / לְשׁוֹן
  english_pob_choice: your tongue
  chosen_spanish: tu lengua
  alternatives_spanish:
  - tu lengua
  - tu boca
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta de la lengua, central en el acto profético de imposición de mutismo. "Lengua" es el equivalente natural y directo en español.
- source_word: אַדְבִּיק
  english_pob_choice: I will make ... cling
  chosen_spanish: haré que ... se pegue
  alternatives_spanish:
  - haré que ... se adhiera
  - haré que ... se apegue
  lexicon: HALOT
  rationale: El causativo expresa acción divina directa sobre la lengua. "Haré que se pegue" preserva la fuerza causal con español natural y reconocible.
- source_word: אֶל חִכֶּךָ
  english_pob_choice: to the roof of your mouth
  chosen_spanish: al paladar
  alternatives_spanish:
  - al techo de tu boca
  - al paladar
  lexicon: HALOT
  rationale: חֵךְ puede significar paladar/techo de la boca. En español, "paladar" comunica bien la imagen y evita una construcción pesada.
- source_word: וְנֶאֱלַמְתָּ
  english_pob_choice: you will be mute
  chosen_spanish: quedarás mudo
  alternatives_spanish:
  - serás enmudecido
  - quedarás silenciado
  - te quedarás sin habla
  lexicon: HALOT
  rationale: El nifal expresa volverse incapaz de hablar. "Quedarás mudo" conserva el estado resultante y la dimensión física del signo.
- source_word: לָהֶם לְאִישׁ מוֹכִיחַ
  english_pob_choice: you will not be for them a man who rebukes
  chosen_spanish: no serás para ellos un hombre que reprende
  alternatives_spanish:
  - no serás para ellos un hombre que corrige
  - no serás para ellos un hombre que reprende
  lexicon: HALOT
  rationale: Se conserva la estructura relacional del hebreo y el sustantivo masculino singular. "Reprende" mantiene la fuerza profética de יכח sin diluirla en una idea más suave.
- source_word: בֵּית מְרִי
  english_pob_choice: a rebellious house
  chosen_spanish: una casa rebelde
  alternatives_spanish:
  - una casa de rebeldía
  - un pueblo rebelde
  lexicon: HALOT
  rationale: Se preserva la expresión idiomática de Ezequiel, donde "casa" designa al pueblo como unidad corporativa. "Rebelde" traduce bien מְרִי sin suavizar el juicio.
theological_decisions:
- issue: Naturaleza de la incapacidad de hablar de Ezequiel
  english_pob_reading: A divinely imposed muteness that prevents prophetic rebuke except when God later opens his mouth.
  chosen_spanish_reading: Una mudez impuesta por Dios que le impide hablar proféticamente hasta que Dios vuelva a darle palabra.
  alternative_spanish_readings:
  - Una silenciación puramente figurada
  - Una incapacidad social general para persuadir
  rationale: La imagen concreta de la lengua y el paladar indica una restricción real y simbólica a la vez. El español mantiene el cuerpo del signo sin convertirlo en mera metáfora de ineficacia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor corporativo de בֵּית מְרִי
  english_pob_reading: a rebellious house
  chosen_spanish_reading: una casa rebelde
  alternative_spanish_readings:
  - un pueblo rebelde
  - una casa de rebelión
  rationale: '"Casa" conserva el idiomático hebreo de una comunidad tratada como hogar/casa del pacto. Evita aplanar la expresión profética en un término más general.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Forma masculina de לְאִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El referente es Ezequiel mismo, así que el masculino no es genérico sino contextual. El español debe mantener esa precisión sin neutralizarla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con la solución auditada en inglés. No se detectaron revisiones aplicadas en el pasaje fuente; por ello la redacción española conserva la misma estructura semántica y la misma tensión entre imagen corporal y sentido profético.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene «casa rebelde» como eco técnico de Ezequiel, no como simple sinónimo de «pueblo rebelde».
  - «Mudo» se eligió para preservar el estado resultante del nifal, sin borrar la imaginería física de la lengua y el paladar.
  - Las notas a pie distinguen entre alternativa léxica de «paladar» y alternativa de estado de mutismo, siguiendo el reparto del audit trail inglés.
