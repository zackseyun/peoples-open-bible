  yaml_path: translation/ot/jeremiah/026/020.yaml
  text: And there was also a man prophesying in the name of Yahweh[a], Uriah son of Shemaiah from Kiriath-jearim[b], and he prophesied against this city and against this land according to all the words of Jeremiah.
