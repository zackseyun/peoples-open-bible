translation:
  language: es
  text: Pero los judíos mantenían una buena voluntad y lealtad inquebrantables hacia los reyes;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ δὲ Ἰουδαῖοι
  english_pob_choice: But the Jews
  chosen_spanish: Pero los judíos
  alternatives_spanish:
  - Y los judíos
  - Ahora bien, los judíos
  lexicon: LSJ
  rationale: δέ marca contraste con lo anterior; «Pero» reproduce bien el giro adversativo. «Ἰουδαῖοι» se rinde naturalmente como «judíos».
- source_word: εὔνοιαν
  english_pob_choice: goodwill
  chosen_spanish: benevolencia
  alternatives_spanish:
  - buena voluntad
  - favor
  lexicon: LSJ
  rationale: εὔνοια expresa disposición favorable o buena voluntad hacia otros. En español, «benevolencia» conserva ese matiz relacional y mantiene un registro digno; «buena voluntad» también sería posible, pero es algo más descriptiva.
- source_word: πίστιν
  english_pob_choice: loyalty
  chosen_spanish: lealtad
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: En este contexto político, πίστις no se refiere a fe religiosa sino a fidelidad confiable hacia los reyes. «Lealtad» comunica con claridad esa relación de adhesión y constancia en español actual.
- source_word: ἀδιάστροφον
  english_pob_choice: unwavering
  chosen_spanish: firmes
  alternatives_spanish:
  - inquebrantables
  - constantes
  lexicon: LSJ
  rationale: El adjetivo modifica la combinación de benevolencia y lealtad, indicando que no se desvían ni se alteran. «Firmes» resume con naturalidad esa estabilidad en español; «inquebrantables» y «constantes» también reflejan el sentido.
- source_word: φυλάσσοντες
  english_pob_choice: maintaining
  chosen_spanish: estaban guardando
  alternatives_spanish:
  - mantenían
  - conservaban
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, conservar o mantener. Aquí rige actitudes abstractas, por lo que «estaban guardando» conserva el valor verbal del griego; en español, la perífrasis ayuda a expresar un estado continuo.
- source_word: πρὸς τοὺς βασιλεῖς
  english_pob_choice: toward the kings
  chosen_spanish: hacia los reyes
  alternatives_spanish:
  - para con los reyes
  - respecto de los reyes
  lexicon: LSJ
  rationale: πρός con acusativo indica relación dirigida hacia personas. «Hacia los reyes» reproduce esa orientación directa y conserva el plural del griego.
theological_decisions:
- issue: πίστις en contexto político-social y no religioso
  english_pob_reading: loyalty
  chosen_spanish_reading: lealtad
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: El contexto es la relación de los judíos con los reyes, no la fe en Dios. Por eso se evita «fe» y se elige un término de fidelidad política-social; «lealtad» es la opción más transparente en español.
  doctrine_reference: 'DOCTRINE.md: contested terms for πίστις; translation philosophy on context-sensitive renderings'
- issue: εὔνοια + πίστις como pareja de actitudes duraderas
  english_pob_reading: unwavering goodwill and loyalty
  chosen_spanish_reading: benevolencia y lealtad firmes
  alternative_spanish_readings:
  - buena voluntad y fidelidad constantes
  - benevolencia y fidelidad inquebrantables
  rationale: La pareja griega expresa tanto disposición favorable como confiabilidad persistente. La combinación española mantiene ambas ideas sin sobrerinterpretar el texto ni borrar la tensión semántica entre favor relacional y lealtad estable.
  doctrine_reference: Translation philosophy on preserving lexical distinction and rhetorical pairing
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando cualquier nota al pie no anclada en el texto. La versión mantiene la estructura del griego y conserva el valor político-social de πίστις sin trasladarlo a un sentido religioso.
  spanish_consistency_notes:
  - Se mantiene «judíos» para Ἰουδαῖοι.
  - Se conserva el plural «reyes» como en el griego.
  - No se introduce «Cristo», «Señor» ni terminología ajena al pasaje.
  - La frase completa funciona como una cláusula narrativa simple, sin añadir sujeto o énfasis no presentes en el original.
