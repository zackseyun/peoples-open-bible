translation:
  language: es
  text: Y entrará el príncipe por el camino del pórtico de la puerta desde afuera, y estará de pie junto al poste de la puerta; y los sacerdotes ofrecerán su holocausto y sus ofrendas de paz[a], y él se postrará en adoración en el umbral de la puerta. Luego saldrá, pero la puerta no se cerrará hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas de comunión» para «ofrendas de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: נָשִׂיא en la visión del templo designa a una figura reconocida con función pública y acceso ritual, pero el pasaje no obliga a identificarla como rey ni como Mesías. «Príncipe» conserva esa categoría sin resolver el debate interpretativo.
- source_word: דֶּרֶךְ אוּלָם הַשַּׁעַר מִחוּץ
  english_pob_choice: by way of the porch of the gate from outside
  chosen_spanish: por el camino del pórtico de la puerta desde afuera
  alternatives_spanish:
  - por el vestíbulo de la puerta desde afuera
  - por el camino del pórtico de la puerta exterior
  lexicon: HALOT
  rationale: דֶּרֶךְ expresa ruta o vía; אוּלָם es un pórtico/vestíbulo. «Por el camino del pórtico de la puerta desde afuera» mantiene la secuencia espacial y suena natural en español bíblico contemporáneo.
- source_word: מְזוּזַת הַשַּׁעַר
  english_pob_choice: the doorpost of the gate
  chosen_spanish: el poste de la puerta
  alternatives_spanish:
  - el marco de la puerta
  - el umbral lateral de la puerta
  lexicon: HALOT
  rationale: מְזוּזָה puede referirse al poste/jamba. «Poste de la puerta» comunica la pieza arquitectónica con claridad y evita la posible ambigüedad de «marco» en español.
- source_word: וְעָשׂוּ הַכֹּהֲנִים אֶת עֹלָתוֹ
  english_pob_choice: the priests shall offer his burnt offering
  chosen_spanish: los sacerdotes ofrecerán su holocausto
  alternatives_spanish:
  - los sacerdotes presentarán su holocausto
  - los sacerdotes harán su holocausto
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio completamente quemado; en español bíblico, «holocausto» conserva ese sentido técnico mejor que una paráfrasis general.
- source_word: שְׁלָמָיו
  english_pob_choice: his peace offerings
  chosen_spanish: sus ofrendas de paz
  alternatives_spanish:
  - sus ofrendas de comunión
  - sus ofrendas de reconciliación
  lexicon: HALOT
  rationale: שְׁלָמִים puede traducirse tradicionalmente «ofrendas de paz». Mantengo esa forma para preservar la conexión léxica con שָׁלוֹם/wholeness, con una opción española clara y de uso bíblico.
- source_word: וְהִשְׁתַּחֲוָה
  english_pob_choice: he shall bow down in worship
  chosen_spanish: él se postrará en adoración
  alternatives_spanish:
  - él se inclinará en adoración
  - él adorará postrándose
  lexicon: HALOT
  rationale: El verbo incluye tanto postración corporal como reverencia cultual. «Se postrará en adoración» conserva ambos componentes sin reducirlo a una simple inclinación.
- source_word: מִפְתַּן הַשַּׁעַר
  english_pob_choice: the threshold of the gate
  chosen_spanish: el umbral de la puerta
  alternatives_spanish:
  - el umbral de la puerta de entrada
  - el dintel de la puerta
  lexicon: HALOT
  rationale: מִפְתָּן es «umbral» o «sillar de entrada». «Umbral de la puerta» es la forma más transparente en español y mantiene la imagen arquitectónica.
- source_word: לֹא יִסָּגֵר עַד הָעָרֶב
  english_pob_choice: the gate shall not be shut until evening
  chosen_spanish: la puerta no se cerrará hasta la tarde
  alternatives_spanish:
  - la puerta no será cerrada hasta el anochecer
  - la puerta no se cerrará hasta la noche
  lexicon: HALOT
  rationale: El nifal de סגר indica ser cerrada/atrapada. «No se cerrará hasta la tarde» expresa el sentido con naturalidad en español y conserva la restricción temporal del hebreo.
theological_decisions:
- issue: Identidad y estatus del príncipe en la visión del templo
  english_pob_reading: Render נָשִׂיא as 'prince' without importing a messianic or fully royal interpretation.
  chosen_spanish_reading: Traducir נָשִׂיא como «príncipe» sin añadir una identificación mesiánica ni una lectura monárquica plena.
  alternative_spanish_readings:
  - líder
  - gobernante
  - príncipe mesiánico
  rationale: El versículo presenta a un participante con acceso y deberes rituales específicos, pero no define su identidad última. La traducción debe preservar esa tensión interpretativa sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente del POB en inglés no introdujo cambios; el texto quedó confirmado tras un pase de concordancia alta. Esta versión española sigue esa lectura estable y traslada las mismas decisiones léxicas y teológicas al español.
  spanish_consistency_notes:
  - Conservo «Yahvé» como norma de la serie solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Mantengo el registro cultual de «holocausto» y «ofrendas de paz» por continuidad léxica con el marco sacrificial del pasaje.
  - «Príncipe» se deja sin glosa interpretativa para no sobrecargar una figura que el texto no define explícitamente.
  - «Poste de la puerta» y «umbral de la puerta» distinguen dos elementos arquitectónicos diferentes del hebreo.
