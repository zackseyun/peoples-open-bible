translation:
  language: es
  text: No ocultaremos estas cosas de sus hijos, contando a la generación venidera[b] las obras dignas de alabanza de Yahvé[a], y su poder, y sus maravillas que él ha hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las alabanzas de Yahvé». El hebreo también puede referirse a alabanzas ofrecidas a Yahvé, pero el contexto aquí favorece sus obras dignas de alabanza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la próxima generación» o «una generación posterior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא נְכַחֵד
  english_pob_choice: we will not hide
  chosen_spanish: No ocultaremos
  alternatives_spanish:
  - No esconderemos
  - No ocultaremos ni encubriremos
  lexicon: HALOT
  rationale: El piel de כחד expresa ocultar o encubrir. «Ocultar» conserva bien esa fuerza y funciona con naturalidad en español bíblico contemporáneo.
- source_word: מִבְּנֵיהֶם
  english_pob_choice: from their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - de sus hijos
  - de sus descendientes
  lexicon: HALOT
  rationale: El contexto es intergeneracional; «hijos» en español comunica a la vez descendencia y transmisión a la siguiente generación sin restringirlo solo a varones.
- source_word: לְדוֹר אַחֲרוֹן
  english_pob_choice: the coming generation
  chosen_spanish: la generación venidera
  alternatives_spanish:
  - la próxima generación
  - la generación que viene
  lexicon: HALOT
  rationale: La expresión apunta a la generación posterior. «Venidera» mantiene la orientación futura y suena digno y natural.
- source_word: מְסַפְּרִים
  english_pob_choice: telling
  chosen_spanish: al contar
  alternatives_spanish:
  - relatando
  - narrando
  lexicon: HALOT
  rationale: 'El participio hebreo describe el modo de no ocultar: mediante la narración. En español, «al contar» refleja esa relación subordinada sin forzar una segunda cláusula principal.'
- source_word: תְּהִלּוֹת יְהוָה
  english_pob_choice: the praiseworthy deeds of Yahweh
  chosen_spanish: las obras dignas de alabanza de Yahvé
  alternatives_spanish:
  - las alabanzas de Yahvé
  - las obras alabables de Yahvé
  lexicon: HALOT
  rationale: 'La audit trail favorece el sentido objetivo: cosas acerca de Yahvé que deben ser proclamadas, no solo alabanzas dirigidas a él. «Obras dignas de alabanza» conserva esa tensión semántica y evita reducir el término a mera adoración humana.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la decisión del proyecto de transliterar el nombre divino. «Yahvé» preserva el nombre personal del pacto en lugar de sustituirlo por un título.
- source_word: עֱזוּזוֹ
  english_pob_choice: his strength
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su poderío
  lexicon: HALOT
  rationale: El sustantivo denota fuerza o poder. «Poder» encaja bien con el paralelismo con «maravillas» y es natural en español bíblico.
- source_word: נִפְלְאוֹתָיו
  english_pob_choice: his wonders
  chosen_spanish: sus maravillas
  alternatives_spanish:
  - sus obras maravillosas
  - sus prodigios
  lexicon: HALOT
  rationale: El término alude a actos extraordinarios que causan asombro. «Maravillas» es breve, fiel y ampliamente inteligible.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has done
  chosen_spanish: que él ha hecho
  alternatives_spanish:
  - que hizo
  - que ha realizado
  lexicon: HALOT
  rationale: El relativo modifica «sus maravillas» y presenta actos completados con relevancia continua para la memoria comunitaria. «Ha hecho» conserva ese matiz.
theological_decisions:
- issue: Sense of תְּהִלּוֹת יְהוָה
  english_pob_reading: 'objective sense: what is recounted about Yahweh (''the praiseworthy deeds of Yahweh'')'
  chosen_spanish_reading: 'sentido objetivo: las obras de Yahvé que son dignas de alabanza y deben ser narradas'
  alternative_spanish_readings:
  - 'sentido subjetivo: ''las alabanzas de Yahvé'''
  - '''las alabanzas que se ofrecen a Yahvé'''
  rationale: El paralelismo con «su poder» y «sus maravillas que él ha hecho» favorece una lista de actos/atributos divinos a transmitir, no solo alabanzas humanas. La traducción conserva esa ambigüedad controlada sin borrar la preferencia contextual.
  doctrine_reference: 'DOCTRINE.md: sentido contextual de תהלות en Sal 78:4'
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la transliteración del nombre del pacto revelado a Israel, conforme al estándar del proyecto. No se sustituye por un título, para conservar transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción española sigue de cerca la sintaxis hebrea, conservando el participio con «al contar» para reflejar מְסַפְּרִים y manteniendo la serie coordinada de «las obras... su poder... sus maravillas». Se tuvo en cuenta la revisión inglesa que favoreció una construcción participial más fiel al hebreo, pero sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «hijos» en el texto con nota para no estrechar indebidamente מִבְּנֵיהֶם a varones, pero manteniendo la posibilidad inclusiva de descendencia.
  - «Maravillas» y «poder» preservan el paralelismo poético y evitan una paráfrasis excesiva.
