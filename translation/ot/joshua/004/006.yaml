id: JOS.4.6
reference: Joshua 4:6
source:
  edition: WLC
  text: לְמַ֗עַן תִּֽהְיֶ֛ה זֹ֥את א֖וֹת בְּ/קִרְבְּ/כֶ֑ם כִּֽי יִשְׁאָל֨וּ/ן בְּנֵי/כֶ֤ם מָחָר֙ לֵ/אמֹ֔ר מָ֛ה הָ/אֲבָנִ֥ים הָ/אֵ֖לֶּה לָ/כֶֽם־׃
translation:
  text: so that this may be a sign among you[a]. When your children ask in time to come, saying[c][b], ‘What do these stones mean to you?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your sons.'' The term likely refers representatively to the next generation, hence ''your children.'''
    reason: lexical_alternative
  - marker: b
    text: Or more literally, 'What are these stones to you?'
    reason: lexical_alternative
  - marker: c
    text: '''Tomorrow'' here can idiomatically mean ''in time to come'' or ''later.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is natural modern English and preserves the purposive force.
- source_word: תִּהְיֶה
  chosen: may be
  alternatives:
  - will be
  - might become
  lexicon: HALOT
  rationale: Qal imperfect of היה here expresses intended result/purpose after לְמַעַן. 'May be' fits the purposive nuance better than a simple future.
- source_word: זֹאת
  chosen: this
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Feminine singular demonstrative referring to the memorial arrangement represented by the stones; in English 'this' is the natural deictic rendering.
- source_word: אוֹת
  chosen: sign
  alternatives:
  - memorial sign
  - token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or symbolic marker. 'Sign' is the most direct rendering; the memorial function is clarified by the surrounding context rather than built into the noun itself.
- source_word: בְּקִרְבְּכֶם
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: The phrase denotes location in the community. 'Among you' is idiomatic and clear; 'in your midst' is possible but slightly more formal.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the anticipated circumstance in which the sign functions. 'When' best captures the temporal sense in context.
- source_word: יִשְׁאָלוּן
  chosen: ask
  alternatives:
  - inquire
  - question
  lexicon: HALOT
  rationale: Straightforward rendering of שאל. 'Ask' is natural and sufficient in context.
- source_word: בְּנֵיכֶם
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Although the Hebrew form is literally 'your sons,' in this context it functions generically for descendants/children asking about the memorial. Per the translation philosophy, this is rendered according to intent rather than preserving a misleading male-only sense.
- source_word: מָחָר
  chosen: tomorrow
  alternatives:
  - in time to come
  - later
  lexicon: HALOT
  rationale: Literally 'tomorrow,' but in such contexts it can idiomatically point to the future. Retaining 'tomorrow' preserves the Hebrew wording while remaining understandable in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - asking
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the question.
- source_word: מָה ... לָכֶם
  chosen: What do these stones mean to you?
  alternatives:
  - What are these stones to you?
  - What do these stones belong to you for?
  lexicon: HALOT
  rationale: The Hebrew is literally 'What are these stones to you?' In idiomatic English, the sense is asking their significance. 'What do these stones mean to you?' best communicates the force without wooden awkwardness.
- source_word: הָאֲבָנִים הָאֵלֶּה
  chosen: these stones
  alternatives:
  - these particular stones
  lexicon: HALOT
  rationale: Direct rendering of the definite noun plus demonstrative.
