  text: Porque pensar en ella es la perfección del entendimiento, y el que vela por ella pronto estará libre de cuidados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνθυμηθῆναι
  english_pob_choice: thinking about
  chosen_spanish: pensar en ella
  alternatives_spanish:
  - reflexionar sobre ella
  - considerarla
  - tenerla en mente
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa el acto de darle pensamiento o meditar en ella. «Pensar en ella» es natural en español y conserva el foco cognitivo sin añadir interpretación extra.
- source_word: περὶ αὐτῆς
  english_pob_choice: about her
  chosen_spanish: en ella
  alternatives_spanish:
  - acerca de ella
  - sobre ella
  - en cuanto a ella
  lexicon: LSJ
  rationale: La referencia es a la sabiduría personificada. En español, «pensar en ella» comunica de modo idiomático la idea de pensar respecto de la sabiduría y mantiene la personificación femenina.
- source_word: φρονήσεως
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - discernimiento
  - sabiduría práctica
  lexicon: LSJ
  rationale: El término puede incluir prudencia o juicio práctico, pero aquí la afirmación describe una plenitud de comprensión mental. «Entendimiento» transmite bien esa fuerza en español y evita forzar un matiz exclusivamente ético.
- source_word: τελειότης
  english_pob_choice: the perfection
  chosen_spanish: la perfección
  alternatives_spanish:
  - la plenitud
  - la completud
  - la madurez
  lexicon: LSJ
  rationale: El sustantivo expresa estado de consumación o plenitud. «La perfección» conserva el peso formal del griego y la relación predicativa con «entendimiento».
- source_word: ἀγρυπνήσας
  english_pob_choice: the one who stays awake
  chosen_spanish: el que vela
  alternatives_spanish:
  - el que permanece despierto
  - el que está en vela
  - el que vigila
  lexicon: LSJ
  rationale: El participio se refiere literalmente a la vigilia. «El que vela» es breve, natural y mantiene la imagen de atención vigilante sin añadir una idea de horario o de levantarse temprano.
- source_word: δι' αὐτὴν
  english_pob_choice: for her
  chosen_spanish: por ella
  alternatives_spanish:
  - a causa de ella
  - en favor de ella
  - por amor de ella
  lexicon: LSJ
  rationale: La preposición con acusativo señala motivo o causa. «Por ella» refleja de forma directa la dedicación o vigilancia motivada por la sabiduría, conforme a la revisión inglesa más reciente.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  - de inmediato
  lexicon: LSJ
  rationale: El adverbio indica un resultado inmediato o cercano. «Pronto» suena natural en español bíblico contemporáneo y conserva la rapidez del efecto.
- source_word: ἀμέριμνος
  english_pob_choice: free from care
  chosen_spanish: libre de cuidados
  alternatives_spanish:
  - sin preocupaciones
  - libre de ansiedad
  - sin afán
  lexicon: LSJ
  rationale: El adjetivo significa exento de cuidado o preocupación. «Libre de cuidados» reproduce bien la relación semántica con el griego y evita que «despreocupado» suene trivial.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine reference ('her')
  chosen_spanish_reading: Mantener la referencia femenina («ella» / «por ella»)
  alternative_spanish_readings:
  - neutro impersonal («eso»)
  - abstracto sin pronombre
  rationale: El griego mantiene a la sabiduría como figura personificada en femenino. Conservar «ella» preserva el rasgo literario y teológico del texto en vez de volverlo impersonal.
  doctrine_reference: Principio de fidelidad al sentido del texto fuente; la personificación es parte del contenido, no un adorno reemplazable.
translation_notes:
