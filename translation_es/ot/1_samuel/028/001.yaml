    reason: lexical_alternative
  revision_rationale: Se reemplaza «sus campamentos» por «sus fuerzas» para reflejar mejor el sentido contextual y la revisión auditada del POB, conservando la alternativa literal en nota. Se reestructura la segunda cláusula para mantener el verbo dirigido a David en singular y expresar la expectativa/obligación contextual («tendrás que salir»), sin la discordancia de «tú y tus hombres saldrán». Se elimina la nota [b] porque la solución revisada ya preserva el sentido sin crear una tensión artificial en español.
