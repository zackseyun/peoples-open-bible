    issue: Vocativo 'oh Dios' sin coma y con formulación algo poco natural
    rationale: En español bíblico y literario, la invocación se expresa mejor como 'oh, Dios' o, más naturalmente en registro moderno digno, 'Dios'. Dado que el inglés usa 'O God' como señal de vocativo, el español debe marcar la invocación con puntuación adecuada sin sonar acartonado.
  - severity: low
    issue: La alternativa de nota 'mi clamor sonoro' suena poco idiomática
    rationale: Aunque intenta reflejar 'ringing cry', en español 'clamor sonoro' es una colocación torpe. 'Mi grito resonante' o 'mi grito fuerte' comunica mejor la posibilidad léxica sin dureza estilística.
  revised_spanish_text: Escucha mi clamor[a], oh, Dios; atiende a mi oración.
