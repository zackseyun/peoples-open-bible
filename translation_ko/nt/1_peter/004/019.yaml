  lexicon: BDAG
  rationale: κτίστης는 신약 단 한 번. 「창조주」로 옮긴다. 「신실하신」은 πιστός의 신적 신실함.
- source_word: ἐν ἀγαθοποιΐᾳ
  english_pob_choice: in doing good
  chosen_korean: 선을 행하면서
  alternatives_korean:
