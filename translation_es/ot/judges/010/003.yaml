translation:
  language: es
  text: Después de él surgió[a] Jair el galaadita, y juzgó a Israel veintidós años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino después de él» para la fórmula de sucesión inicial.
