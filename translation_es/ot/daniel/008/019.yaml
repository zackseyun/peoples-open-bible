translation:
  language: es
  text: 'Entonces dijo: «Mira[a], te doy a conocer lo que habrá de suceder en la última parte de la indignación[b], porque esto es para el tiempo señalado del fin»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí». El hebreo usa una partícula de atención solemne; «Mira» intenta conservar ese llamado directo en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la ira». El término hebreo puede denotar indignación intensa o ira, y aquí probablemente apunta a un contexto de juicio divinamente determinado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol avanza la escena; «Entonces dijo» conserva la secuencia y suena natural en español bíblico moderno.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, aquí
  lexicon: HALOT
  rationale: El deíctico introduce una declaración solemne. «Mira» mantiene la fuerza de atención sin depender de un giro arcaico; «He aquí» sería más tradicional, pero menos natural para esta línea de discurso.
- source_word: מוֹדִיעֲךָ
  english_pob_choice: I am making known to you
  chosen_spanish: te estoy dando a conocer
  alternatives_spanish:
  - te haré saber
  - te estoy informando
  lexicon: HALOT
  rationale: El participio hifil de ידע expresa el acto presente de revelación. «Te estoy dando a conocer» conserva la idea causativa de comunicar algo que antes no era sabido.
- source_word: אֵת אֲשֶׁר יִהְיֶה
  english_pob_choice: what will happen
  chosen_spanish: lo que habrá de suceder
  alternatives_spanish:
  - lo que será
  - lo que ocurrirá
  lexicon: HALOT
  rationale: La construcción introduce el contenido de la revelación y el futuro de יהיה. «Habrá de suceder» es más formal y conserva el matiz de evento futuro sin sonar mecánico.
- source_word: בְּאַחֲרִית
  english_pob_choice: in the latter part of
  chosen_spanish: en la última parte de
  alternatives_spanish:
  - al final de
  - en el postrer tiempo de
  lexicon: HALOT
  rationale: אַחֲרִית señala la parte final o posterior de un periodo. «Última parte» mantiene la temporalidad sin imponer una interpretación más amplia.
- source_word: הַזָּעַם
  english_pob_choice: the indignation
  chosen_spanish: la indignación
  alternatives_spanish:
  - la ira
  - el furor
  lexicon: HALOT
  rationale: Se conserva «indignación» para mantener el registro profético y la tensión lexical documentada en la base inglesa; «ira» o «furor» son posibles, pero no reproducen tan bien ese valor técnico en este contexto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón o fundamento de la afirmación anterior. «Porque» comunica con claridad la relación explicativa en español.
- source_word: לְמוֹעֵד
  english_pob_choice: for the appointed time
  chosen_spanish: para el tiempo señalado
  alternatives_spanish:
  - para el tiempo designado
  - para el tiempo establecido
  lexicon: HALOT
  rationale: מוֹעֵד denota tiempo fijado o señalado. «Tiempo señalado» reproduce la idea de una cita o designación previa y suena bíblico sin ser arcaico.
- source_word: קֵץ
  english_pob_choice: the end
  chosen_spanish: del fin
  alternatives_spanish:
  - del final
  - del término
  lexicon: HALOT
  rationale: En este sintagma, «fin» funciona naturalmente en español y conserva la fuerza escatológica de קֵץ. Se integra en la frase final sin añadir palabras innecesarias.
theological_decisions:
- issue: ¿Debe identificarse explícitamente la indignación como la ira divina?
  english_pob_reading: Renderized as 'the indignation' without explicitly specifying 'God's wrath' in the main text.
  chosen_spanish_reading: «la indignación» sin explicitar en el texto principal que se trata de la ira de Dios.
  alternative_spanish_readings:
  - la ira
  - el periodo de ira
  rationale: El hebreo nombra el estado/periodo de indignación, pero no nombra de forma directa a su sujeto. Mantener el término neutral preserva la tensión teológica y evita cerrar la frase más allá de lo que el hebreo dice expresamente.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Sintaxis de לְמוֹעֵד קֵץ
  english_pob_reading: Rendered 'for it is for the appointed time of the end.'
  chosen_spanish_reading: «porque es para el tiempo señalado del fin»
  alternative_spanish_readings:
  - porque concierne al tiempo señalado del fin
  - porque es para el tiempo fijado del fin
  rationale: La expresión hebrea es comprimida. La versión española conserva la relación preposicional y hace legible la frase, sin convertirla en una paráfrasis interpretativa más extensa.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción española sigue el último estado del audit trail inglés, pero traduce directamente desde el hebreo de WLC: conserva el marcador de atención de הִנְנִי, el participio de revelación de מוֹדִיעֲךָ, el futuro de יִהְיֶה, y la relación comprimida de לְמוֹעֵד קֵץ. También refleja la revisión inglesa que prefirió una formulación más formal en el arranque y una clausula final más clara.'
  spanish_consistency_notes:
  - Se mantiene «indignación» para הַזָּעַם, coherente con el criterio POB documentado.
  - «Tiempo señalado» se usa para מוֹעֵד de manera consistente con el valor de tiempo fijado/appointed time.
  - «Fin» se conserva para קֵץ en un contexto escatológico.
  - El registro es reverente pero no arcaizante; evita el calco rígido de «He aquí» en el texto principal, aunque se documenta como alternativa.
