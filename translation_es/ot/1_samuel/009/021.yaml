    text: O, «¿Por qué me has hablado tal cosa?»
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar mejor las decisiones léxicas del hebreo y del audit trail inglés: superlativo más definido («la más pequeña»), unidad social más precisa («clan»), adjetivo menos interpretativo («el menor») y una nota que preserva la alternativa para כַּדָּבָר הַזֶּה, tal como hace el POB inglés. También se corrige la puntuación para un español más natural.'
