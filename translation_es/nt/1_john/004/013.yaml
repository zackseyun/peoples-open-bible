translation:
  language: es
  text: 'Por esto sabemos que permanecemos en él y él en nosotros: porque nos ha dado de su Espíritu[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En esto sabemos…». La frase griega también puede expresarse con esa forma más literal.
    reason: lexical_alternative
  - marker: b
    text: O «moramos en él». El verbo μένω es un término joánico clave para la permanencia relacional en unión con Dios.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «de su Espíritu», destacando la procedencia o fuente; muchas traducciones lo suavizan simplemente como «su Espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - En esto
  - Con esto
  lexicon: BDAG
  rationale: La expresión funciona como fórmula joánica de evidencia o base para conocer algo. «Por esto» comunica con naturalidad en español la idea de fundamento/medio de conocimiento sin apartarse del sentido del griego.
- source_word: γινώσκομεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - llegamos a saber
  lexicon: BDAG
  rationale: El presente expresa conocimiento actual y continuo. «Sabemos» es la forma más natural en español para esta afirmación de certeza.
- source_word: ἐν αὐτῷ μένομεν
  english_pob_choice: we remain in him
  chosen_spanish: permanecemos en él
  alternatives_spanish:
  - moramos en él
  - seguimos en él
  lexicon: BDAG
  rationale: μένω en Juan tiene un valor relacional durativo. «Permanecemos» conserva bien esa continuidad y resulta claro en español moderno.
- source_word: καὶ αὐτὸς ἐν ἡμῖν
  english_pob_choice: and he in us
  chosen_spanish: y él en nosotros
  alternatives_spanish:
  - y él permanece en nosotros
  - y él está en nosotros
  lexicon: BDAG
  rationale: El griego omite el verbo repetido; el español puede suplirlo de manera implícita. Se mantiene la brevedad paralela del original sin expandir innecesariamente.
- source_word: ἐκ τοῦ πνεύματος αὐτοῦ
  english_pob_choice: of his Spirit
  chosen_spanish: de su Espíritu
  alternatives_spanish:
  - de parte de su Espíritu
  - desde su Espíritu
  - de su espíritu
  lexicon: BDAG
  rationale: ἐκ marca procedencia o fuente. «De su Espíritu» preserva esa relación sin sonar forzado en español. La mayúscula en «Espíritu» refleja el referente al Espíritu Santo en el contexto joánico.
- source_word: δέδωκεν
  english_pob_choice: he has given
  chosen_spanish: nos ha dado
  alternatives_spanish:
  - ha dado
  - nos dio
  lexicon: BDAG
  rationale: El perfecto griego indica una acción completada con efecto vigente. «Nos ha dado» conserva mejor ese valor que un pretérito simple.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: En español, con «ha dado» el clítico «nos» es idiomático y no añade contenido ajeno al texto.
theological_decisions:
- issue: Carácter del Espíritu mencionado en «su Espíritu»
  english_pob_reading: '''his Spirit'' refers to God, and ''Spirit'' is rendered with capitalization to indicate the Holy Spirit.'
  chosen_spanish_reading: «su Espíritu» se entiende como referencia a Dios, y la mayúscula señala al Espíritu Santo.
  alternative_spanish_readings:
  - «su espíritu» con minúscula como referencia más genérica
  - «su aliento» o «su espíritu» como don no personal
  rationale: En el contexto de 1 Juan, el don del Espíritu funciona como evidencia de la permanencia mutua entre Dios y los creyentes. La mayúscula ayuda a marcar el referente personal divino sin introducir una explicación ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Mutua permanencia / inhabitación
  english_pob_reading: Use 'remain in him and he in us' without expanding the second clause.
  chosen_spanish_reading: 'Se conserva la reciprocidad: «permanecemos en él y él en nosotros».'
  alternative_spanish_readings:
  - «habitamos en él y él habita en nosotros»
  - «moramos en él y él mora en nosotros»
  rationale: La versión mantiene el paralelismo y la tensión teológica del mutuo permanecer sin convertirlo en paráfrasis. «Permanecemos» es consistente con el término joánico μένω.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado más reciente del audit trail inglés: la cláusula final se entiende con valor causal («porque») y ἐκ se conserva con una expresión de procedencia («de su Espíritu»), sin simplificarla a una posesión plana. También se mantiene la mutua permanencia con la brevedad paralela del griego.'
  spanish_consistency_notes:
  - Se usó «permanecemos» para μένω, coherente con la decisión inglesa de «remain».
  - Se optó por «Espíritu» con mayúscula por el referente contextual al Espíritu Santo.
  - Se evitó «Cristo» o terminología eclesiástica no presente en el versículo.
  - La puntuación con dos puntos refleja bien la relación explicativa del segundo ὅτι.
