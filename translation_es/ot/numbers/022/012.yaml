translation:
  language: es
  text: 'Y Dios dijo a Balaam[a]: «No irás con ellos. No maldecirás al pueblo, porque es un pueblo bendito[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Balaam también puede transliterarse «Bileam».
    reason: nombre_propio_alternativo
  - marker: b
    text: 'Hebreo literalmente: «porque bendito es», con singular gramatical referido al pueblo como colectivo.'
    reason: alternativa_lexica_y_gramatical
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «dijo» fluye con naturalidad y mantiene el registro bíblico sin recargar con un conector innecesario.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El referente es el Dios verdadero hablando directamente a Balaam; «Dios» es la equivalencia natural y fiel en este contexto.
- source_word: לֹא תֵלֵךְ
  english_pob_choice: You shall not go
  chosen_spanish: No irás
  alternatives_spanish:
  - No vayas
  - No debes ir
  lexicon: HALOT
  rationale: La forma verbal con לֹא en discurso directo expresa prohibición; «No irás» conserva el tono solemne y prohibitivo sin sonar áspero ni excesivamente coloquial.
- source_word: עִמָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: La preposición y sufijo pronominal se traducen de manera directa y transparente; «con ellos» es el equivalente natural en español.
- source_word: לֹא תָאֹר
  english_pob_choice: You shall not curse
  chosen_spanish: No maldecirás
  alternatives_spanish:
  - No dirás maldición contra
  - No maldecirás contra
  lexicon: HALOT
  rationale: אָרַר expresa la acción de maldecir; «maldecir» comunica con claridad la fuerza léxica del verbo sin añadir una perífrasis innecesaria.
- source_word: אֶת הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo éste
  - a este pueblo
  lexicon: HALOT
  rationale: 'En español, el objeto directo con persona/colectivo suele requerir la a personal: «al pueblo». Mantiene la referencia colectiva de Israel.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición; «porque» es claro y fiel al valor causal del hebreo.
- source_word: בָרוּךְ הוּא
  english_pob_choice: for they are blessed
  chosen_spanish: bendito es
  alternatives_spanish:
  - porque está bendito
  - pues bendecido es
  lexicon: HALOT
  rationale: El hebreo usa un predicado singular con valor colectivo. En español, «bendito es» preserva la brevedad y el matiz declarativo sin forzar plural ni individualizar el referente.
theological_decisions:
- issue: Número gramatical del predicado final
  english_pob_reading: 'The clause refers to Israel collectively: ''for they are blessed.'''
  chosen_spanish_reading: 'La cláusula se refiere al pueblo como colectivo: «porque bendito es».'
  alternative_spanish_readings:
  - porque ellos son benditos
  - porque él es bendito
  rationale: El hebreo presenta בָרוּךְ הוּא con singular gramatical y un sustantivo colectivo. En español, se preserva ese dato manteniendo la formulación singular y evitando imponer un plural que suavizaría la tensión del texto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave y tratamiento de tensiones gramaticales documentadas)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB en su registro más formal y en la decisión de conservar la tensión del singular colectivo en la cláusula final, pero la adapta al español con una sintaxis natural y bíblicamente sobria.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים conforme al estándar del proyecto en contexto directo.
  - Se mantuvo «maldecir» para אָרַר por su fuerza léxica específica.
  - Se conservó la referencia colectiva de הָעָם como «el pueblo» sin individualizarla.
  - No se añadió nota al pie porque la opción española elegida permite expresar la tensión del singular colectivo sin ambigüedad excesiva.
