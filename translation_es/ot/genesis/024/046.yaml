translation:
  language: es
  text: 'Ella se apresuró y bajó su cántaro de su hombro[a] y dijo: «Bebe, y también daré de beber a tus camellos». Entonces bebí, y también dio de beber a los camellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de sobre ella». El contexto más amplio sugiere que el cántaro iba sobre el hombro, pero esa parte del cuerpo no está explícita en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  english_pob_choice: She quickly
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apresuró rápidamente
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa o rapidez en la acción. «Se apresuró» comunica bien la prontitud narrativa sin sonar mecánico en español.
- source_word: וַתּוֹרֶד
  english_pob_choice: lowered
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - lo bajó
  lexicon: HALOT
  rationale: El causativo de ירד indica hacer descender algo. «Bajó» es natural en español y mantiene la acción física de mover el cántaro hacia abajo.
- source_word: כַדָּהּ
  english_pob_choice: her jar
  chosen_spanish: su cántaro
  alternatives_spanish:
  - su jarra
  - su vaso
  lexicon: HALOT
  rationale: כד designa un recipiente para agua; «cántaro» es claro y digno en español bíblico, más específico que «jarra» en este contexto.
- source_word: מֵעָלֶיהָ
  english_pob_choice: from her shoulder
  chosen_spanish: de sobre su hombro
  alternatives_spanish:
  - de encima de ella
  - desde sobre su hombro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sobre ella». Siguiendo la revisión auditada del inglés, «de sobre su hombro» hace explícita la postura probable sin borrar la base literal del texto.
- source_word: שְׁתֵה
  english_pob_choice: Drink
  chosen_spanish: Bebe
  alternatives_spanish:
  - Toma
  - Beba
  lexicon: HALOT
  rationale: Es un imperativo directo de beber. «Bebe» conserva la forma inmediata del mandato y la cortesía implícita del diálogo se deja al contexto narrativo.
- source_word: גְּמַלֶּיךָ אַשְׁקֶה
  english_pob_choice: and I will also give water to your camels
  chosen_spanish: y también daré de beber a tus camellos
  alternatives_spanish:
  - y también regaré a tus camellos
  - y también les daré agua a tus camellos
  lexicon: HALOT
  rationale: El verbo שקה significa dar de beber/proveer agua. «Daré de beber» reproduce bien el valor verbal y evita la idea menos natural de «regar» animales.
- source_word: וָאֵשְׁתְּ
  english_pob_choice: So I drank
  chosen_spanish: Y bebí yo
  alternatives_spanish:
  - Y bebí
  - Así que bebí
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración. «Y bebí yo» conserva el sujeto enfático del hebreo sin forzar una construcción extraña.
- source_word: וְגַם הַגְּמַלִּים הִשְׁקָתָה
  english_pob_choice: and she also gave water to the camels
  chosen_spanish: y también dio de beber a los camellos
  alternatives_spanish:
  - y también les dio agua a los camellos
  - y también los abrevó
  lexicon: HALOT
  rationale: Se mantiene la misma raíz verbal en español para hacer audible la repetición del servicio. «Dar de beber» conserva el sentido de proveer agua sin introducir un tecnicismo innecesario.
translation_notes:
  revision_awareness: El inglés POB pasó de «from upon her» a «from her shoulder» por una revisión posterior; la presente versión española sigue esa lectura contextualizada, pero conserva una nota que reconoce el hebreo literal más cercano para no ocultar la tensión lexical.
  spanish_consistency_notes:
  - Se conserva la repetición de la idea de «dar de beber» para שקה en ambos miembros del versículo.
  - Se evita sustituir «Yahvé» o términos teológicos que no aparecen en este versículo.
  - 'El orden narrativo sigue de cerca el hebreo: prisa, descenso del cántaro, invitación, respuesta y servicio a los camellos.'
