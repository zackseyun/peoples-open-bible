translation:
  language: es
  text: Y todo el pueblo sabrá—Efraín y los habitantes de Samaria—, que dicen con soberbia y con grandeza de corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en grandeza de corazón». Se conserva «grandeza de corazón» para reflejar la expresión hebrea, aunque en contexto comunica autoexaltación orgullosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: And ... will know
  chosen_spanish: lo sabrá
  alternatives_spanish:
  - sabrá
  - llegará a saber
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético suele tener valor futuro o resultativo. En español, «lo sabrá» comunica ese valor de manera natural y concisa.
- source_word: הָעָם כֻּלּוֹ
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - la nación entera
  lexicon: HALOT
  rationale: La combinación expresa totalidad. «Todo el pueblo» mantiene la referencia colectiva de forma idiomática en español.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  - la tribu de Efraín
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado según la práctica del proyecto. En este contexto funciona metonímicamente para el reino del norte, pero el hebreo nombra a Efraín.
- source_word: וְיוֹשֵׁב שֹׁמְרוֹן
  english_pob_choice: and the inhabitants of Samaria
  chosen_spanish: y los habitantes de Samaria
  alternatives_spanish:
  - y el habitante de Samaria
  - y quienes habitan en Samaria
  lexicon: HALOT
  rationale: El participio singular tiene valor colectivo. En español, el plural es la forma natural y fiel para expresar ese colectivo sin forzar la sintaxis.
- source_word: בְּגַאֲוָה
  english_pob_choice: in pride
  chosen_spanish: con soberbia
  alternatives_spanish:
  - con orgullo
  - en soberbia
  lexicon: HALOT
  rationale: גַּאֲוָה expresa orgullo altivo. «Soberbia» conserva mejor la carga negativa que «orgullo» en este contexto de denuncia profética.
- source_word: וּבְגֹדֶל לֵבָב
  english_pob_choice: and in greatness of heart
  chosen_spanish: y con grandeza de corazón
  alternatives_spanish:
  - y con corazón grande
  - y con arrogancia de corazón
  lexicon: HALOT
  rationale: Se conserva la literalidad básica de «greatness of heart» porque el texto hebreo usa esa expresión; en español puede sonar marcada, pero permite mantener visible la tensión léxica entre literalidad e ironía profética.
- source_word: לֵאמֹר
  english_pob_choice: who say
  chosen_spanish: que dicen
  alternatives_spanish:
  - diciendo
  - al decir
  lexicon: HALOT
  rationale: Introduce el contenido de la afirmación que sigue en el versículo siguiente. «Que dicen» enlaza de modo claro la frase descriptiva con la cita venidera.
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión inglesa más reciente, que volvió a una formulación más literal de גֹדֶל לֵבָב («greatness of heart»). Por eso el español evita una paráfrasis más interpretativa y conserva «grandeza de corazón», mientras mantiene el matiz negativo del contexto por medio de «soberbia».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; aquí no aparece ningún término divino.
  - «Efraín» se conserva como nombre propio, no como glosa interpretativa de Israel.
  - La relación sintáctica queda abierta hacia la cita del versículo siguiente, como en el hebreo y en la edición inglesa.
