translation:
  language: es
  text: Y para el lado norte cien codos, sus veinte pilares y sus veinte basas de bronce; y los ganchos de los pilares y sus bandas[a] eran de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus filetes eran de plata’. El término hebreo se refiere a herrajes arquitectónicos de plata en los pilares; la forma precisa es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְאַת צָפוֹן
  english_pob_choice: for the north side
  chosen_spanish: para el lado norte
  alternatives_spanish:
  - en el lado norte
  - para el lado septentrional
  lexicon: HALOT
  rationale: פאה expresa una ‘cara/lado/orilla’; con צפון indica el lado norte del atrio. ‘Para el lado norte’ conserva el estilo inventarial del pasaje y evita una paráfrasis excesiva.
- source_word: מֵאָה בָאַמָּה
  english_pob_choice: a hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - ciento codos
  - una medida de cien codos
  lexicon: HALOT
  rationale: La unidad de longitud es codo. ‘Cien codos’ es natural en español y sigue de cerca la estructura hebrea sin agregar elementos.
- source_word: עַמּוּדֵיהֶם
  english_pob_choice: their twenty pillars
  chosen_spanish: sus veinte pilares
  alternatives_spanish:
  - sus veinte columnas
  - sus veinte postes
  lexicon: HALOT
  rationale: En este contexto tabernacular, עַמּוּדִים son soportes estructurales. ‘Pilares’ mantiene la terminología técnica tradicional del pasaje y es claro para el lector moderno.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their twenty bases
  chosen_spanish: sus veinte basas
  alternatives_spanish:
  - sus veinte bases
  - sus veinte zócalos
  lexicon: HALOT
  rationale: אַדֶן designa la pieza de apoyo de los pilares. ‘Basas’ conserva el valor arquitectónico con un tono más técnico; ‘bases’ sería una alternativa válida pero menos específica.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En las descripciones del tabernáculo, נְחֹשֶׁת suele referirse al metal traducido convencionalmente como ‘bronce’. Mantenemos esa equivalencia por coherencia material y terminológica.
- source_word: וָוֵי הָעַמּוּדִים
  english_pob_choice: the hooks of the pillars
  chosen_spanish: los ganchos de los pilares
  alternatives_spanish:
  - los garfios de los pilares
  - los ganchos de las columnas
  lexicon: HALOT
  rationale: וָוִים son piezas de sujeción; ‘ganchos’ es el equivalente más directo y comprensible en español, acorde con el sentido constructivo del texto.
- source_word: וַחֲשֻׁקֵיהֶם
  english_pob_choice: their bands
  chosen_spanish: sus bandas
  alternatives_spanish:
  - sus filetes
  - sus aros
  lexicon: HALOT
  rationale: El término es técnicamente incierto en la arquitectura del tabernáculo. ‘Bandas’ conserva la idea de una pieza alargada o envolvente sin forzar una identificación más precisa de lo que permite el hebreo.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - de plata fina
  - de plata
  lexicon: HALOT
  rationale: כֶּסֶף es el metal ‘plata’. En español, ‘de plata’ resulta más idiomático que repetir ‘plata’ como sustantivo aislado en esta construcción atributiva.
translation_notes:
  revision_awareness: El texto inglés auditado permanece en alta concordancia con la fuente hebrea; no se detectaron revisiones sustantivas. Se mantuvo la estructura inventarial y se conservó la ambigüedad documentada de חֲשֻׁקֵיהֶם mediante una nota alternativa.
  spanish_consistency_notes:
  - Se conserva el registro técnico y enumerativo propio de las descripciones del tabernáculo.
  - ‘Bronce’ y ‘plata’ siguen la terminología estándar del pasaje y evitan oscurecer la lectura.
  - La nota a pie de página se ancla en ‘bandas’ para reflejar la incertidumbre léxica sin recargar el cuerpo del texto.
