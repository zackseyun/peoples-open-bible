translation:
  language: es
  text: Canten un himno y alabanza a Dios[a], el que es digno de alabanza. Canten, y estén vigilantes ante su vigilancia[b]; porque bueno es un salmo para Dios de un corazón bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el digno de alabanza»; también puede entenderse «el alabado» o «el digno de ser alabado».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega es inusual y literalmente mantiene una relación cognada, algo como «estén vigilantes ante su vigilia/vigilancia»; también puede entenderse «por su velar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕμνον
  english_pob_choice: hymn
  chosen_spanish: himno
  alternatives_spanish:
  - cántico
  - salmo
  lexicon: LSJ
  rationale: ὕμνος nombra un canto de alabanza; "himno" conserva en español el carácter cultual y laudatorio mejor que el genérico "cántico".
- source_word: αἶνον
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - elogio
  lexicon: LSJ
  rationale: αἶνος significa alabanza; "alabanza" es el equivalente natural y mantiene la distinción léxica respecto de ὕμνον.
- source_word: ψάλλετε / ψάλλε
  english_pob_choice: sing
  chosen_spanish: canten / cantes
  alternatives_spanish:
  - canten con melodía
  - canten alabanzas
  lexicon: LSJ
  rationale: Aquí ψάλλω se refiere a cantar en contexto de adoración. "Canten" es natural en español y conserva el mandato sin añadir una paráfrasis innecesaria.
- source_word: τῷ θεῷ τῷ αἰνετῷ
  english_pob_choice: to God, the One worthy of praise
  chosen_spanish: a Dios, el que es digno de alabanza
  alternatives_spanish:
  - a Dios, el alabado
  - a Dios, el que merece alabanza
  lexicon: LSJ
  rationale: αἰνετός puede entenderse como "digno de alabanza" o "alabado". Opto por una forma que preserve con claridad el valor predicativo y evite ambigüedad en español.
- source_word: γρηγόρησον
  english_pob_choice: keep watch
  chosen_spanish: estén en vela
  alternatives_spanish:
  - mantengan la vigilancia
  - permanezcan vigilantes
  lexicon: LSJ
  rationale: El verbo tiene fuerza de vigilia/vigilancia. "Estén en vela" comunica bien la idea de estar despiertos y atentos, con un registro natural en español bíblico contemporáneo.
- source_word: ἐπὶ τὴν γρηγόρησιν αὐτοῦ
  english_pob_choice: for his watching / watchfulness
  chosen_spanish: por su vigilancia
  alternatives_spanish:
  - por su vigilancia
  - por su estar en vela
  lexicon: LSJ
  rationale: La construcción griega es inusual y mantiene un juego cognado con γρηγόρησον. "Por su vigilancia" conserva esa relación semántica en español sin forzar una explicación interpretativa.
- source_word: ψαλμός
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - cántico
  - poema
  lexicon: LSJ
  rationale: '"Salmo" preserva el carácter literario-religioso del término y corresponde bien al contexto devocional del texto.'
- source_word: ἐξ ἀγαθῆς καρδίας
  english_pob_choice: from a good heart
  chosen_spanish: desde un corazón bueno
  alternatives_spanish:
  - de un corazón bueno
  - desde un corazón recto
  lexicon: LSJ
  rationale: ἀγαθός significa básicamente "bueno". "Desde un corazón bueno" sigue de cerca el griego y evita introducir connotaciones más fuertes como "puro" o "recto" que el texto no exige.
theological_decisions:
- issue: Valor de αἰνετός aplicado a Dios
  english_pob_reading: the One worthy of praise / the praiseworthy One / God who is praised
  chosen_spanish_reading: el que es digno de alabanza
  alternative_spanish_readings:
  - el alabado
  - el digno de alabanza
  rationale: La frase puede describir a Dios como el que recibe alabanza o como el que la merece. En español, "el que es digno de alabanza" conserva ambas posibilidades sin reducir el sentido a una sola.
  doctrine_reference: Doxología y atribución de la alabanza a Dios
- issue: Imagen de vigilancia en γρηγόρησον / γρηγόρησις
  english_pob_reading: keep watch for his watchfulness / be vigilant for his vigilance
  chosen_spanish_reading: estén en vela por su vigilancia
  alternative_spanish_readings:
  - estén en vela por su vigilancia
  - permanezcan vigilantes por su vigilancia
  rationale: La repetición cognada es deliberada y algo extraña. La traducción conserva la tensión semántica entre la vigilancia humana y la vigilancia divina, sin suavizarla en exceso.
  doctrine_reference: Providencia y vigilancia de Dios
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa al mantener la pareja verbal 'canten... alaben' y la segunda cláusula con vigilancia, pero adapta la sintaxis para que el paralelismo sea natural en español y para conservar la repetición léxica de αἶνος / αἰνετός y γρηγόρησον / γρηγόρησις sin calco duro.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al criterio del proyecto.
  - Se traduce ψάλλω como «canten» en lugar de «hagan melodía», por fidelidad contextual y fluidez.
  - Se mantiene «salmo» para ψαλμός por su tono litúrgico y literario.
  - Se conserva «alabanza» para αἶνος y se evita fusionarlo con «himno» para no perder la duplicación del griego.
  - No se emplea «SEÑOR» porque el texto griego tiene θεός, no κύριος.
