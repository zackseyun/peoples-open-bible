translation:
  text: Jesus said[1], "If they say to you, 'From where have you come into being?',
    say to them, 'We have come forth from the light—the place where the light came
    into being by itself, stood, and was revealed in their image.' If they say to
    you, 'Are you it?', say, 'We are its children, and we are the chosen of the living
    father.' And if they ask you, 'What is the sign of your father who is in you?'[2],
    say to them[c][b][a][5][4][3], 'It is movement and rest.'"
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The clause 'the place where the light came into being by itself, stood,
      and was revealed' preserves three terse verbs (ϣⲱⲡⲉ, ⲟⲩⲱϩⲉ, ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ). The
      intervening prepositional phrase at NHAM02.41 lb35 is partially restored and
      its force ('for itself' / 'to itself') is uncertain.
    reason: lacuna_or_restoration
  - marker: '2'
    text: '''Their image'' translates ⲡⲉⲩϩⲓⲕⲱⲛ. The antecedent of ''their'' is ambiguous
      in context and has been left unresolved rather than harmonized to ''his'' or
      ''its''.'
    reason: textual_variant
  - marker: '3'
    text: '''The chosen'' renders ⲡⲥⲱⲧⲡ; ''the elect'' is an equally possible gloss
      that carries stronger traditional connotations.'
    reason: lexical_alternative
  - marker: '4'
    text: '''Movement'' renders ⲕⲓⲙ; ''motion'' is a viable alternative. ''Rest''
      renders ⲁⲛⲁⲡⲁⲩⲥⲓⲥ; ''repose'' is a stylistic alternative often used in Thomas
      translations.'
    reason: lexical_alternative
  - marker: '5'
    text: The question 'Are you it?' reflects an elliptical Coptic copular construction
      (ⲛⲧⲱⲧⲛ ⲡⲉ) with an implied predicate; the translation preserves the abruptness.
    reason: dialect_note
  - marker: a
    text: Or 'From where have you come forth?'.
    reason: previous_rendering
  - marker: b
    text: Or 'What is the sign of your father in you?'.
    reason: previous_rendering
  - marker: c
    text: Or 'It is a movement and a rest.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϫⲟⲟⲥ / ϫⲱⲛⲧⲟⲥ
  chosen: say
  alternatives:
  - speak
  lexicon: Crum; Layton Grammar
  rationale: Both spellings are dialectal/orthographic variants for 'to say'; rendered
    consistently as 'say' to preserve Thomas’s direct imperatives.
- source_word: ⲧⲱⲛ
  chosen: from where
  alternatives:
  - whence
  - where ... from
  lexicon: Crum s.v. ⲧⲱⲛ
  rationale: Interrogative of origin; 'from where' preserves the marked Coptic construction.
- source_word: ϣⲱⲡⲉ ⲉⲃⲟⲗ (with subject ⲧⲱⲧⲛ)
  chosen: come forth
  alternatives:
  - come out
  - issue forth
  lexicon: Lambdin §126; Crum s.v. ϣⲱⲡⲉ
  rationale: With ⲉⲃⲟⲗ the verb regularly means emergence; 'come forth' keeps the
    outward nuance.
- source_word: ⲡⲟⲩⲟⲉⲓⲛ
  chosen: light
  alternatives: []
  lexicon: Crum s.v. ⲟⲩⲟⲉⲓⲛ
  rationale: Basic sense 'light' fits Thomas’s cosmological diction.
- source_word: ϣⲱⲡⲉ (of light)
  chosen: came into being
  alternatives:
  - came to be
  - was generated
  lexicon: Crum s.v. ϣⲱⲡⲉ
  rationale: Denotes origination; 'came into being' is idiomatic and accurate.
- source_word: ϩⲓⲧⲟⲟⲧϥ
  chosen: by itself
  alternatives:
  - of itself
  - on its own
  lexicon: Crum s.v. ϩⲓⲧⲟⲟⲧ
  rationale: Instrumental/reflexive construction; 'by itself' keeps the reflexive
    force tied to the masculine antecedent (light).
- source_word: ⲟⲩⲱϩⲉ
  chosen: stood
  alternatives:
  - took its stand
  - stood firm
  lexicon: Crum s.v. ⲟⲩⲱϩⲉ
  rationale: Core meaning 'to stand'; terse rendering preserves Thomas’s rhythm.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: was revealed
  alternatives:
  - appeared
  - came to light
  - became manifest
  lexicon: Crum s.v. ⲟⲩⲱⲛϩ; Layton Grammar §125
  rationale: With ⲉⲃⲟⲗ the verb commonly means 'to become manifest'; 'was revealed'
    fits theophanic context.
- source_word: ⲡⲉⲩϩⲓⲕⲱⲛ
  chosen: their image
  alternatives:
  - their likeness
  lexicon: Crum s.v. ⲏⲕⲱⲛ
  rationale: Possessor ⲡⲉⲩ- is plural; retained as 'their' despite antecedent ambiguity
    to reflect the text.
- source_word: ⲡⲉϥϣⲏⲣⲉ
  chosen: its children
  alternatives:
  - its sons
  lexicon: Crum s.v. ϣⲏⲣⲉ
  rationale: Plural predicate with 1pl subject; 'children' is inclusive and contextually
    fitting.
- source_word: ⲡⲥⲱⲧⲡ
  chosen: the chosen
  alternatives:
  - the elect
  lexicon: Crum s.v. ⲥⲱⲧⲡ
  rationale: Nominal denotes what is 'chosen/selected'; 'the chosen' avoids ecclesial
    overtones while preserving sense; 'elect' noted as alternative.
- source_word: ⲡⲉⲓⲱⲧ ⲉⲧⲉⲣⲉⲱⲛϩ
  chosen: the living father
  alternatives:
  - the father who lives
  lexicon: Crum s.v. ⲓⲱⲧ; Layton Grammar §188
  rationale: Relative clause adjectivally qualifies 'father'; lowercase to avoid interpretive
    capitalization.
- source_word: ϫⲛⲟⲩⲛ
  chosen: ask
  alternatives:
  - question
  lexicon: Crum s.v. ϫⲛⲟⲩⲛ
  rationale: Common verb for putting a question.
- source_word: ⲡⲙⲁⲉⲓⲛ
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: Crum s.v. ⲙⲁⲉⲓⲛ
  rationale: Semantically 'sign, token'; 'sign' is concise and idiomatic.
- source_word: ⲕⲓⲙ
  chosen: movement
  alternatives:
  - motion
  lexicon: Crum s.v. ⲕⲓⲙ
  rationale: Both glosses are valid; 'movement' pairs well with 'rest' and preserves
    the gnomic terseness.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  chosen: rest
  alternatives:
  - repose
  lexicon: Crum s.v. ⲁⲛⲁⲡⲁⲩⲥⲓⲥ (Gk. loan)
  rationale: '''Rest'' is the usual sense; ''repose'' retained as stylistic alternative
    maintaining strangeness.'
textual_note: 'Dialect/orthography: The saying exhibits Sahidic with Lycopolitan features.
  Alternation between ϫⲟⲟⲥ and ϫⲱⲛⲧⲟⲥ for ''say'' reflects dialectal/graphic variation;
  both are rendered ''say''. The sequence with augmented preterites ⲁⲛⲧⲟϥⲱϩⲉ / ⲁⲛⲧⲟϥⲟⲩⲱⲛϩ
  shows the Lycopolitan-style ''ⲛⲧ-'' augment. Lacuna/restoration: At NHAM02.41 lb
  35 the manuscript reads ⲁϥⲱϩ[ⲉ ⲉⲣⲁⲧϥ]; Dilley normalizes to ⲁⲛⲧⲟϥⲱϩⲉ ⲉⲣⲁⲧⲛⲧⲟϥ. The
  restored prepositional phrase ⲉⲣⲁⲧϥ (''for its sake'' / ''to it'') is uncertain;
  the translation conservatively renders the core actions (''stood'' ... ''was revealed'')
  without supplying the prepositional nuance. Semantics: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ is taken as ''was
  revealed''/''became manifest'' (cf. Crum s.v. ⲟⲩⲱⲛϩ, esp. with ⲉⲃⲟⲗ). The plural
  possessor ⲡⲉⲩ- in ⲡⲉⲩϩⲓⲕⲱⲛ (''their image'') is retained; its antecedent is contextually
  ambiguous (possibly ''those who ask'' or a broader class), and is not harmonized.'
