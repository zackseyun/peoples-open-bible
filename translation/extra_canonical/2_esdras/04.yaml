translation:
  text: '1 Then the angel who had been sent to me[a], whose name was Uriel, answered me,

    2 and said to me, “Your heart has gone too far in this age, and do you think to comprehend the way of the Most High?”

    3 And I said, “Yes, my lord.” And he answered me and said, “I have been sent to show you three ways, and to set three comparisons before you.

    4 If you can explain one of these to me, then I also will show you the way that you desire to see, and I will teach you why there is an evil heart.”

    5 And I said, “Speak, my lord.” And he said to me, “Go, weigh for me the weight of fire, or measure for me a measure of wind, or call back for me the day that has passed.”

    6 And I answered and said, “Who among those born can do this, that you should ask me about such things?”

    7 And he said to me, “If I had asked you, saying, ‘How many dwellings are in the heart of the sea? Or how many springs are at the source of the deep? Or how many ways are above the firmament? Or what are the exits of paradise?’

    8 perhaps you would have said to me, ‘I have not gone down into the deep, nor yet into Hades, nor have I ever ascended into the heavens.’

    9 But now I have asked you only about fire and wind and day, things through which you have passed and without which you cannot exist, and you have not answered me about them.”

    10 “If you cannot understand what has grown up with you,

    11 how can your vessel grasp the way of the Most High, and, already worn out by the corrupt age, understand incorruption?” And when I heard these things, I fell on my face,

    12 and I said to him, “It would have been better for us not to exist than, having come, to live in ungodliness, and to suffer, and not to understand why.” And he answered me and said,

    13 “Once I went out into the forest of the trees of the plain, and they formed a plan[b],

    14 and said, ‘Come, let us go and make war against the sea, so that it may withdraw before us, and we may make for ourselves other forests.’ In the same way the waves of the sea also formed a plan,

    15 and said, ‘Come, let us go up and subdue the forest of the plain, so that there too we may gain for ourselves another region.’ But the plan of the forest was in vain, for fire came and consumed it.

    16 Likewise also the plan of the waves of the sea: for the sand stood fast and held them back.

    17 If, then, you were judge over these,

    18 which would you begin to justify, or which to condemn?” And I answered and said,

    19 “Both formed a vain plan, for the earth has been given to the forest, and the place of the sea is to bear its waves.” And he answered

    20 me and said, “You have judged rightly. Why then have you not judged in your own case?

    21 For just as the earth has been given to the forest, and the sea to its waves, so also those who dwell upon the earth can understand only what is on the earth, and those who are above the heavens, what is above the height of the heavens.”

    22 And I answered and said, “I beg you, Lord, why has understanding been given to me?

    23 For I did not want to ask about the ways above, but about the things that pass over us daily: why Israel has been given over as a reproach to the nations, why the people whom you loved has been given over to ungodly tribes, and the law of our fathers has been brought to nothing,

    24 and the written ordinances are nowhere to be found. And we pass away from the age like locusts, and our life is like vapor, and we are not worthy

    25 to obtain mercy. But what will he do for his name that has been called upon us? It was about these things that I asked.”

    26 And he answered me and said, “If you live, you will see; and if you live long enough, you will often marvel,

    27 because the age is hurrying swiftly to pass away. For it cannot bear to carry the things that have been promised in their times, because this age is full of griefs and weaknesses.

    28 For the evil about which you ask me has been sown, but its destruction has not yet come.

    29 So if what has been sown is not reaped, and the place where the evil was sown does not pass away, the field where the good is sown will not come.

    30 For a grain of evil seed was sown in Adam’s heart from the beginning, and how much ungodliness it has produced until now, and will still produce until the threshing floor comes!

    31 Consider now for yourself how much fruit of ungodliness a grain of evil seed has produced.

    32 When the ears of grain are sown whose number is beyond counting, how great a threshing floor they will make!”

    33 And I answered and said, “How long, and when will these things be? Why are our years few and evil?”

    34 And he answered me and said, “Do not hasten more than the Most High; for you hasten for your own sake, but the Most High for many.

    35 Did not the souls of the righteous also ask in their storehouses, saying, ‘How long shall I hope in this way? And when will the fruit of the threshing floor of our reward come?’

    36 And the archangel Jeremiel answered them and said, ‘When the number of those like you is completed; for he has weighed the age in a balance,

    37 and measured the times by measure, and numbered the times by number, and he will not stir or awaken them until the said measure is fulfilled.’”

    38 And I answered and said, “O sovereign Lord, but we also are all full of ungodliness.

    39 And perhaps because of us the threshing floor of the righteous is delayed, because of the sins of those who dwell on the earth.”

    40 And he answered me and said, “Go and ask a pregnant woman whether, when she has completed her nine months, her womb can still keep the child within herself.”

    41 And I said, “It cannot, Lord.” And he said to me, “In Hades the storehouses of souls are like the womb.

    42 For just as she who gives birth hastens to escape the necessity of childbirth, so these also hasten to give back those things that were entrusted to them from the beginning.

    43 Then what you desire to see will be shown to you.”

    44 And I answered and said, “If I have found favor before your eyes, and if it is possible, and if I am fit,

    45 show me this also: whether more is still to come than has passed, or whether more has passed than is to come.

    46 For what has passed I know, but what is to come I do not know.”

    47 And he said to me, “Stand on the right side, and I will show you the interpretation of the comparison.”

    48 So I stood and looked, and behold, a blazing furnace passed before me. And when the flame had passed by, I looked,

    49 and behold, smoke remained behind. After this a cloud full of water passed before me and poured out a violent rain, and when the force of the rain had passed, drops remained behind.

    50 And he said to me, “Consider for yourself: just as the rain is greater than the drops, and the fire greater than the smoke, so the measure of what has passed exceeded; but the drops and the smoke remained behind.”

    51 And I prayed and said, “Do you think I shall live until those days? Or who will be in those days?”

    52 He answered me and said, “Concerning the signs about which you ask me, I can tell you in part; but concerning your life, I have not been sent to tell you[c][d][e], and I do not know.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Latin phrase rendered 'measure for me a measure of wind' is textually awkward. The sense is clearly an impossible demand to quantify the wind, but the exact unit behind the wording is uncertain.
    reason: textual_variant
    anchor_ref: '4:5'
  - marker: b
    text: '''The written ordinances are nowhere to be found'' likely refers to the effective loss or nullification of Israel''s authoritative written order under catastrophe, not necessarily the physical disappearance of every manuscript.'
    reason: lexical_alternative
    anchor_ref: '4:24'
  - marker: e
    text: 'The image of souls in ''storehouses'' anticipates the childbirth analogy in vv. 40-42: they are kept in reserved places until the appointed number is complete.'
    reason: cross_reference
    anchor_ref: '4:35'
  - marker: d
    text: '''Hades'' here renders the realm of the dead, not specifically the place of final punishment.'
    reason: cultural_note
    anchor_ref: '4:41'
  - marker: c
    text: 'Uriel''s answer remains deliberately partial: he can disclose some signs, but not Ezra''s lifespan. The refusal is part of the book''s theology of limited human access to divine timing.'
    reason: compositional_layer
    anchor_ref: '4:52'
lexical_decisions:
- source_word: Altissimi / altissimi
  chosen: the Most High
  alternatives:
  - God
  - the Highest
  lexicon: Lewis & Short
  rationale: Project policy requires preserving the divine title rather than flattening it to a generic term. In this apocalyptic context the title carries theological weight.
- source_word: cor malignum
  chosen: evil heart
  alternatives:
  - wicked heart
  - malignant heart
  lexicon: Lewis & Short
  rationale: Kept the established thread visible across 4 Ezra. 'Evil heart' is idiomatic, direct, and preserves the conceptual continuity with Adam in v. 30 and later occurrences.
- source_word: saeculum
  chosen: age
  alternatives:
  - world
  - era
  lexicon: Lewis & Short
  rationale: In 4 Ezra the term often marks the present order over against the coming order. 'Age' preserves apocalyptic contrast better than 'world' in vv. 2, 11, 24, 27, 36.
- source_word: uis / uiam altissimi
  chosen: way of the Most High
  alternatives:
  - path of the Most High
  lexicon: Lewis & Short
  rationale: Retains the metaphor of a course or mode of divine action rather than reducing it to abstract 'purpose'.
- source_word: similitudines
  chosen: comparisons
  alternatives:
  - parables
  - likenesses
  lexicon: Lewis & Short
  rationale: The chapter presents illustrative analogies rather than full narrative parables; 'comparisons' is transparent and natural.
- source_word: satum uenti
  chosen: a measure of wind
  alternatives:
  - a bushel of wind
  - the quantity of the wind
  lexicon: Lewis & Short
  rationale: The Latin is awkward and likely reflects a translational crux, but the sense is to quantify wind. 'A measure of wind' keeps the challenge impossible without over-specifying the unit.
- source_word: infernum
  chosen: Hades
  alternatives:
  - the underworld
  - hell
  lexicon: Lewis & Short
  rationale: In this Jewish apocalyptic setting the term refers to the realm of the dead, not specifically final punishment. 'Hades' avoids misleading Christian infernal associations.
- source_word: uas tuum
  chosen: your vessel
  alternatives:
  - your container
  - your frame
  lexicon: Lewis & Short
  rationale: Preserves the metaphor for human capacity or constitution. The image is intentionally concrete and should not be paraphrased away.
- source_word: impietas / impietatibus
  chosen: ungodliness
  alternatives:
  - wickedness
  - impiety
  lexicon: Lewis & Short
  rationale: '''Ungodliness'' is readable modern English while retaining the religious-moral force of the Latin.'
- source_word: dispositionis scriptae
  chosen: the written ordinances
  alternatives:
  - the written decrees
  - the prescribed writings
  lexicon: Lewis & Short
  rationale: The phrase points to authoritative written prescriptions/orderings now lost or ineffective. 'Written ordinances' best captures that legal-covenantal sense.
- source_word: uapor
  chosen: vapor
  alternatives:
  - mist
  - breath
  lexicon: Lewis & Short
  rationale: A direct rendering that preserves the fleetingness image and echoes biblical mortality language.
- source_word: mesticia
  chosen: griefs
  alternatives:
  - sorrow
  - sadness
  lexicon: Lewis & Short
  rationale: Plural 'griefs' matches the age being filled with many afflictive burdens, alongside 'weaknesses.'
- source_word: destrictio
  chosen: destruction
  alternatives:
  - cutting off
  - eradication
  lexicon: Lewis & Short
  rationale: The context is the removal of sown evil before the good field arrives. 'Destruction' is clear and forceful without overreading the metaphor.
- source_word: granum seminis mali
  chosen: a grain of evil seed
  alternatives:
  - a grain of bad seed
  lexicon: Lewis & Short
  rationale: Keeps the agricultural metaphor vivid and preserves the link between seed and later harvest/threshing-floor imagery.
- source_word: Adam
  chosen: Adam’s heart
  alternatives:
  - the heart of Adam
  lexicon: Lewis & Short
  rationale: 'Possessive English is natural and keeps the anthropological-theological claim explicit: evil is traced back to Adam.'
- source_word: area
  chosen: threshing floor
  alternatives:
  - threshing place
  lexicon: Lewis & Short
  rationale: This is the concrete agricultural image underlying judgment and recompense; it should remain visible rather than be abstracted.
- source_word: promptuariis
  chosen: storehouses
  alternatives:
  - chambers
  - treasuries
  lexicon: Lewis & Short
  rationale: The image is of reserved places where souls await. 'Storehouses' preserves the concrete metaphor and matches the chapter's language.
- source_word: dominator domine
  chosen: sovereign Lord
  alternatives:
  - Lord Master
  - ruling Lord
  lexicon: Lewis & Short
  rationale: This double title is emphatic. 'Sovereign Lord' conveys the force in idiomatic English without sounding archaic.
- source_word: praegnantem
  chosen: a woman with child
  alternatives:
  - a pregnant woman
  lexicon: Lewis & Short
  rationale: Chosen for elevated but still readable cadence fitting the apocalyptic register.
- source_word: matrix
  chosen: womb
  alternatives:
  - uterus
  lexicon: Lewis & Short
  rationale: Natural English and appropriate to the childbirth analogy.
- source_word: commendata
  chosen: entrusted
  alternatives:
  - committed
  - deposited
  lexicon: Lewis & Short
  rationale: Conveys that the souls were placed in safekeeping from the beginning, fitting the storehouse metaphor.
- source_word: fornax ardens
  chosen: a blazing furnace
  alternatives:
  - a burning furnace
  lexicon: Lewis & Short
  rationale: Preserves the vivid visionary image with strong cadence.
- source_word: superauerunt
  chosen: remained behind
  alternatives:
  - were left over
  - survived
  lexicon: Lewis & Short
  rationale: In the vision the residue after the greater phenomenon is the point. 'Remained behind' makes the comparison clear.
theological_decisions:
- issue: Anthropological source of evil in v. 30
  chosen_reading: '''a grain of evil seed was sown in Adam’s heart from the beginning'''
  alternative_readings:
  - '''in the heart of Adam'''
  - more generalized renderings that detach the phrase from Adam personally
  rationale: The Latin explicitly ties the origin of subsequent ungodliness to Adam and to the heart. This should remain sharp, both for the chapter's argument and for the cross-chapter 'evil heart' thread.
  doctrine_reference: Preserve theological tension rather than resolve it; maintain the cor malignum / evil heart thread.
- issue: State of the dead in vv. 35-42
  chosen_reading: Souls of the righteous are in 'storehouses' in Hades, awaiting the completed number and final release
  alternative_readings:
  - more abstract 'resting places'
  - '''heaven'' instead of Hades'
  rationale: The Latin uses concrete waiting-place imagery and names infernum. Rendering this as 'Hades' plus 'storehouses' preserves the apocalyptic intermediate-state picture without importing later doctrinal systems.
  doctrine_reference: Original-language primacy; preserve theological tension rather than harmonize.
- issue: Temporal framework of saeculum
  chosen_reading: '''age'' throughout key occurrences'
  alternative_readings:
  - world
  - era
  rationale: The chapter contrasts the present corrupt order with what is promised in due time. 'Age' best preserves the apocalyptic temporal horizon and avoids cosmological flattening.
  doctrine_reference: Consistency of key terms, or documented exception.
