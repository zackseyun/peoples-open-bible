translation:
  language: es
  text: Como un sueño, vuela[a] y no se lo encuentra[b]; es ahuyentado como una visión de la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se va volando». El hebreo dice literalmente «vuela», preservando la imagen de rapidez y fuga.
    reason: lexical_alternative
  - marker: b
    text: O «no lo encuentran». El hebreo usa un verbo plural indefinido con sufijo de objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּחֲלוֹם
  english_pob_choice: Like a dream
  chosen_spanish: Como un sueño
  alternatives_spanish:
  - Tal como un sueño
  - Cual sueño
  lexicon: HALOT
  rationale: El prefijo comparativo כ marca semejanza; «como un sueño» conserva el símil de manera natural y fiel en español.
- source_word: יָעוּף
  english_pob_choice: he flies away
  chosen_spanish: vuela
  alternatives_spanish:
  - se va volando
  - desaparece
  lexicon: HALOT
  rationale: El verbo procede de עוּף, «volar». En este contexto expresa rapidez y fuga; «vuela» mantiene la imagen verbal sin convertirla solo en abstracción.
- source_word: וְלֹא יִמְצָאֻהוּ
  english_pob_choice: and is not found
  chosen_spanish: y no se le halla
  alternatives_spanish:
  - y no lo encuentran
  - y nadie lo encuentra
  lexicon: HALOT
  rationale: El hebreo tiene forma activa plural con sufijo de objeto, pero en español la pasiva refleja/impersonal «se le halla» comunica con naturalidad la misma idea de desaparición, sin añadir sujetos no explicitados.
- source_word: וְיֻדַּד
  english_pob_choice: he is driven away
  chosen_spanish: es expulsado
  alternatives_spanish:
  - es arrojado lejos
  - es echado fuera
  lexicon: HALOT
  rationale: La forma Hophal expresa ser hecho salir o ser arrojado/expulsado. «Expulsado» conserva la fuerza de ser removido por una acción externa y encaja con el paralelismo poético.
- source_word: כְּחֶזְיוֹן לָיְלָה
  english_pob_choice: like a vision of the night
  chosen_spanish: como una visión de la noche
  alternatives_spanish:
  - como una visión nocturna
  - como una visión en la noche
  lexicon: HALOT
  rationale: חֶזְיוֹן significa «visión», y לָיְלָה funciona como complemento genitivo. «Visión de la noche» reproduce de cerca la estructura y el tono poético del hebreo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que prefirió «driven away» sobre «chased away» por ser más natural y formal; en español se optó por «expulsado», que conserva la idea de ser removido por una fuerza externa y mantiene el paralelismo con la primera cola del versículo.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo imagen por imagen: sueño / volar / no ser hallado / expulsión / visión nocturna.'
  - Se evitó sustituir «Yahvé» o terminología teológica innecesaria, pues el versículo no contiene el nombre divino ni vocabulario doctrinal específico.
  - «Se le halla» se eligió por naturalidad en español y para reflejar la indefinición del hebreo sin introducir un sujeto explícito.
