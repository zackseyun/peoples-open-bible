revisions:
- from: Hizo cadenas en el santuario interior[a] y las puso sobre las cabezas de las columnas; hizo también cien granadas y las puso en las cadenas.
  to: Hizo cadenas[b] en el santuario interior[a] y las puso sobre la parte superior de las columnas; hizo también cien granadas y las puso en las cadenas[b].
  rationale: Se conserva la traducción principal del borrador, pero se ajusta «las cabezas de las columnas» a una formulación más natural en español («la parte superior de las columnas»), en línea con la equivalencia idiomática ya adoptada por el POB inglés para el hebreo «cabeza». Además, se añade la nota léxica necesaria para שַׁרְשְׁרוֹת, preservando las alternativas ornamentales documentadas en el expediente inglés.
