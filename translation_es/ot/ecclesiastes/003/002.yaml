lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: tiempo
  alternatives_spanish:
  - una temporada
  - un momento
  lexicon: HALOT
  rationale: עֵת denota un tiempo o momento señalado. En español, 'tiempo' conserva la repetición poética del texto y resulta natural en cada miembro de la serie.
- source_word: לָלֶדֶת
  english_pob_choice: to be born
  chosen_spanish: nacer
  alternatives_spanish:
  - ser nacido
  - dar a luz
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar el acto de nacer o de dar a luz según el contexto, aquí se contrapone a 'morir', por lo que el español más natural y fiel es el infinitivo 'nacer'.
- source_word: לָמוּת
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - fallecer
  lexicon: HALOT
  rationale: מות significa 'morir'. 'Morir' mantiene la antítesis directa con 'nacer' y preserva la sencillez del dicho.
- source_word: לָטַעַת
  english_pob_choice: to plant
  chosen_spanish: plantar
  alternatives_spanish:
  - sembrar
  lexicon: HALOT
  rationale: נטע se refiere a plantar. 'Plantar' conserva la imagen agrícola del texto con precisión y sin desviarla a una acción más general como 'sembrar'.
- source_word: לַעֲקוֹר נָטוּעַ
  english_pob_choice: to uproot what is planted
  chosen_spanish: arrancar lo plantado
  alternatives_spanish:
  - arrancar de raíz lo plantado
  - desarraigar lo plantado
  - arrancar lo que ha sido plantado
  lexicon: HALOT
  rationale: עקר implica sacar de raíz o arrancar. 'Arrancar lo plantado' es una forma natural en español que conserva el contraste agrícola con 'plantar'. La opción inglesa 'what is planted' admite en español la equivalencia nominal 'lo plantado' sin añadir contenido extra.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con el texto fuente fue alto; por eso se mantiene la estructura poética simple y la imagen agrícola literal sin expandirla.
  spanish_consistency_notes:
  - Se preserva la secuencia paralela de cuatro miembros con dos pares antitéticos.
  - Se usa 'tiempo' de manera uniforme para עֵת, conforme al patrón poético del versículo.
  - '''Lo plantado'' evita introducir un sustantivo no presente y mantiene la voz pasiva implícita del hebreo.'
  - No se emplea 'SEÑOR' ni terminología teológica ajena, porque el versículo no contiene el Tetragrámaton ni títulos divinos explícitos.
