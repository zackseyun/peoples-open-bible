translation:
  language: es
  text: En el año duodécimo de Acaz, rey de Judá, Oseas hijo de Ela comenzó a reinar en Samaria sobre Israel, y reinó nueve años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: In the twelfth year
  chosen_spanish: En el año duodécimo
  alternatives_spanish:
  - En el duodécimo año
  - En el año doce
  lexicon: HALOT
  rationale: La construcción temporal con ב se expresa naturalmente en español como 'en el año duodécimo'. Mantiene el valor de ordinal del hebreo y el estilo regnal formal.
- source_word: לְ/אָחָז מֶלֶךְ יְהוּדָה
  english_pob_choice: of Ahaz king of Judah
  chosen_spanish: de Acaz, rey de Judá
  alternatives_spanish:
  - de Acaz el rey de Judá
  - del rey Acaz de Judá
  lexicon: HALOT
  rationale: La referencia de reinado se conserva como un punto cronológico dependiente de Acaz. El apposicional 'rey de Judá' se mantiene de forma transparente y natural en español.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - se hizo rey
  - reinó
  lexicon: HALOT
  rationale: En fórmulas regales, מלך introduce la entronización o acceso al trono. 'Llegó a ser rey' conserva ese matiz sin convertirlo prematuramente en la duración total del reinado.
- source_word: הוֹשֵׁעַ בֶּן אֵלָה
  english_pob_choice: Hoshea son of Elah
  chosen_spanish: Oseas hijo de Ela
  alternatives_spanish:
  - Oseas, hijo de Ela
  - Hoshea hijo de Ela
  lexicon: HALOT
  rationale: Se translitera el nombre al uso español bíblico habitual 'Oseas', conservando el patronímico 'hijo de Ela' para reflejar la relación semítica del original.
- source_word: בְ/שֹׁמְרֹון
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - desde Samaria
  lexicon: HALOT
  rationale: La preposición ב indica ubicación; 'en Samaria' es la forma más directa y natural en español para el lugar desde donde reinó.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el Israel
  - sobre el reino de Israel
  lexicon: HALOT
  rationale: Se conserva la preposición de gobierno 'sobre' para reflejar el valor regnal de עַל con מלך sin ampliar innecesariamente el referente.
- source_word: תֵּשַׁע שָׁנִים
  english_pob_choice: nine years
  chosen_spanish: nueve años
  alternatives_spanish:
  - por nueve años
  - durante nueve años
  lexicon: HALOT
  rationale: La duración se traduce de manera directa y sobria. El verbo 'reinó' ya está explícito en español, así que no se repite una perífrasis adicional.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'began to reign' a 'became king' para reflejar mejor מָלַךְ sin perder formalidad. La versión española sigue esa decisión con 'llegó a ser rey', que conserva el matiz de entronización y evita traducirlo como simple duración del reinado.
  spanish_consistency_notes:
  - Se conserva el nombre bíblico españolizado 'Oseas' para el personaje, consistente con el uso bíblico en español.
  - '''Judá'' e ''Israel'' se mantienen como nombres geopolíticos del texto sin expansión interpretativa.'
  - La fórmula regnal se resuelve con un español natural y formal, sin añadir elementos no presentes en el hebreo.
