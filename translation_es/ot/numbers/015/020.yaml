revisions:
- from: De las primicias[a] de vuestra masa, levantaréis una torta[b] como ofrenda[c]; como la ofrenda de la era[d], así la levantaréis.
  to: De la primera parte[a] de vuestra masa, levantaréis un pan como contribución[b]; como la contribución de la era, así la levantaréis.
  rationale: Se reemplazó «primicias» por «la primera parte» para reflejar mejor el sentido partitivo de רֵאשִׁית en contexto de masa, evitando la asociación técnica con productos de cosecha. Se cambió «torta» por «pan» para evitar ambigüedad moderna en español. Se sustituyó «ofrenda» por «contribución» para seguir la decisión léxica documentada para תְּרוּמָה y preservar mejor su especificidad. Se redujeron las notas a las alternativas significativas realmente necesarias en la versión revisada.
