translation:
  language: es
  text: Estas seis ciudades servirán de refugio para los hijos de Israel[a], para el residente extranjero y para el residente[b] entre ellos, para que pueda huir allá cualquiera que mate a una persona[c] involuntariamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: '''Residente extranjero'' y ''residente'' traducen dos términos hebreos distintos (גֵּר y תּוֹשָׁב) para personas no nativas que viven dentro de la sociedad israelita.'
    reason: cultural_note
  - marker: c
    text: O 'cualquier homicida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la fórmula etnocovenantal literal de בני ישראל con 'hijos de Israel', que es fiel y natural en español bíblico; 'israelitas' sería más fluido pero menos transparente al hebreo.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - extranjero
  - sojourner
  - residente forastero
  lexicon: HALOT
  rationale: El hebreo גֵּר designa a una persona no nativa que vive dentro de la comunidad bajo cierta protección. 'Forastero' comunica esa extranjería sin el tecnicismo de 'extranjero' ni el calco 'sojourner'.
- source_word: תּוֹשָׁב
  english_pob_choice: resident
  chosen_spanish: residente
  alternatives_spanish:
  - habitante
  - residente temporal
  - morador
  lexicon: HALOT
  rationale: תּוֹשָׁב conserva la distinción respecto de גֵּר; 'residente' en español distingue bien a quien habita allí sin ser nativo pleno.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su midst
  lexicon: HALOT
  rationale: '''Entre ellos'' refleja la idea relacional de presencia dentro de la comunidad y suena natural en español contemporáneo.'
- source_word: תִּהְיֶינָה שֵׁשׁ הֶעָרִים הָאֵלֶּה
  english_pob_choice: These six cities shall be
  chosen_spanish: Estas seis ciudades serán
  alternatives_spanish:
  - Estas seis ciudades serán para
  - Estas seis ciudades estarán
  lexicon: HALOT
  rationale: La cláusula legal de designación se expresa en español con futuro simple; 'serán' mantiene el valor normativo de la ley sin sonar forzado.
- source_word: לְמִקְלָט
  english_pob_choice: for refuge
  chosen_spanish: para refugio
  alternatives_spanish:
  - como refugio
  - para asilo
  lexicon: HALOT
  rationale: מִקְלָט en este contexto se refiere al lugar de protección legal; 'para refugio' sigue de cerca la construcción preposicional hebrea y es claro en español.
- source_word: לָנוּס שָׁמָּה
  english_pob_choice: may flee there
  chosen_spanish: pueda huir allí
  alternatives_spanish:
  - pueda correr allí
  - pueda refugiarse allí
  lexicon: HALOT
  rationale: 'El infinitivo de propósito se vierte naturalmente como finalidad: la ciudad está allí para que el homicida accidental pueda huir. ''Huir'' conserva la urgencia del verbo hebreo.'
- source_word: כָּל מַכֵּה נֶפֶשׁ
  english_pob_choice: anyone who kills a person
  chosen_spanish: cualquiera que mate a una persona
  alternatives_spanish:
  - cualquiera que hiera de muerte a una persona
  - todo homicida
  lexicon: HALOT
  rationale: El hebreo literalmente habla de 'golpear una vida/persona' en un contexto jurídico de muerte. 'Mate a una persona' es claro y mantiene el sentido legal sin introducir un tecnicismo ajeno.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - vida
  - alma
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ designa a la víctima humana en un contexto legal, no 'alma'. 'Persona' evita ambigüedad y preserva el sentido forense.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: sin intención
  alternatives_spanish:
  - sin querer
  - por inadvertencia
  - accidentalmente
  lexicon: HALOT
  rationale: El término expresa falta de intención en el contraste legal con el homicidio deliberado. 'Sin intención' es preciso y suficientemente natural para el registro legislativo.
theological_decisions:
- issue: Designación etnocovenantal en בני ישראל
  english_pob_reading: Retain 'sons of Israel' in the main text
  chosen_spanish_reading: Conservar 'hijos de Israel' en el texto principal
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Sigo el valor formal del hebreo y mantengo la formulación masculina plural tradicional del etnónimo bíblico, sin neutralizarla en el texto principal. Esto conserva la forma de la fuente y la transparencia del trabajo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Distinción legal entre גֵּר y תּוֹשָׁב
  english_pob_reading: '''Sojourner'' and ''resident'' render two distinct Hebrew terms for non-native persons living within Israelite society.'
  chosen_spanish_reading: '''Forastero'' y ''residente'' distinguen dos términos hebreos distintos para personas no nativas dentro de la sociedad israelita.'
  alternative_spanish_readings:
  - '''extranjero'' y ''residente'''
  - '''forastero'' y ''habitante'''
  rationale: Mantengo la diferenciación lexical porque el texto distingue dos categorías sociales/legales. 'Forastero' y 'residente' comunican esa diferencia sin borrar la tensión terminológica.
  doctrine_reference: Lexical distinction in legal text; HALOT on גֵּר and תּוֹשָׁב
translation_notes:
  revision_awareness: 'Revisado contra el hebreo masorético y el expediente inglés: no hubo cambios en la valoración global del pasaje; la redacción española conserva el sentido legal, la distinción entre גֵּר y תּוֹשָׁב, y la finalidad de huida del homicida sin intención.'
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; por tanto no aplica la convención del nombre divino.'
  - '''Mesías/Cristo'' tampoco aplica aquí.'
  - Se mantuvo 'hijos de Israel' para reflejar la forma masculina plural del hebreo y la decisión auditada del POB inglés.
  - Se usó 'persona' para נֶפֶשׁ en un contexto jurídico, no 'alma'.
