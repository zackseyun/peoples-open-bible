translation:
  language: es
  text: Y los sacerdotes, los profetas y todo el pueblo oyeron a Jeremías hablar estas palabras en la casa de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo de Yahvé». Literalmente, «en la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: HALOT
  rationale: שׁמע aquí narra un hecho pasado de percepción auditiva. «Oyeron» conserva el valor básico sin añadir la idea de obediencia ni una intensificación innecesaria.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: כֹּהֲנִים en contexto del templo se refiere de manera natural a los sacerdotes. «Sacerdotes» es el equivalente claro y estándar en español.
- source_word: וְהַנְּבִאִים
  english_pob_choice: and the prophets
  chosen_spanish: y los profetas
  alternatives_spanish:
  - y los profetas
  lexicon: HALOT
  rationale: נְבִאִים corresponde directamente a «profetas». Se mantiene la coordinación simple del hebreo.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la población
  lexicon: HALOT
  rationale: כָּל הָעָם describe al conjunto reunido. «Todo el pueblo» preserva el alcance colectivo y suena natural en español bíblico contemporáneo.
- source_word: מְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - al hablar
  - mientras hablaba
  lexicon: HALOT
  rationale: El participio presenta a Jeremías en acción simultánea al acto de oír. «Hablando» conserva ese valor durativo/contemporáneo.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: En un contexto de discurso, דְּבָרִים se entiende mejor como «palabras». «Estas palabras» respeta el carácter verbal del pasaje.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea literal «casa» para בַּיִת, en coherencia con el nombre divino Yahvé exigido por el proyecto. «Templo» es contextual, pero menos fiel a la forma concreta del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», manteniendo la referencia al nombre divino sin sustituirlo por un título genérico.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre del pacto, no un título. La forma «Yahvé» preserva esa distinción teológica y sigue la línea editorial del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre «casa» y «templo» en בְּבֵית יְהוָה
  english_pob_reading: in the house of the LORD
  chosen_spanish_reading: en la casa de Yahvé
  alternative_spanish_readings:
  - en el templo de Yahvé
  - en la casa del SEÑOR
  rationale: Aunque «templo» expresa bien el lugar, el hebreo dice literalmente «casa». Mantener «casa» evita borrar la expresión original y su posible carga de presencia/posesión.
  doctrine_reference: Jeremiah 26:7 lexical context
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere expansión interpretativa. La única decisión sensible es mantener «casa de Yahvé» para reflejar el hebreo literal, con nota alternativa para el valor contextual de «templo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme para יְהוָה.
  - Se usa orden coordinado con comas y la conjunción final según el ritmo del hebreo y la puntuación española.
  - «Oyeron» y «hablando» preservan la simultaneidad narrativa sin reexpresar el verso como cláusula subordinada más interpretativa.
