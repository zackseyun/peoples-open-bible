translation:
  language: es
  text: Porque pacieron como caballos[a], y retozaron[b] como corderos, alabándote, Señor, el que los libró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron apacentados» / «fueron alimentados como caballos»; el verbo griego sugiere animales en pastura.
    reason: lexical_alternative
  - marker: b
    text: O «saltaron» como corderos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεμήθησαν
  english_pob_choice: grazed
  chosen_spanish: pacieron
  alternatives_spanish:
  - fueron apacentados
  - fueron pastoreados
  - comieron en el pasto
  lexicon: LSJ
  rationale: El verbo griego evoca la acción de alimentarse en el pasto. En español, "pacieron" conserva la imagen concreta de animales en pastura y mantiene el paralelo con "caballos" sin volver la frase demasiado abstracta.
- source_word: διεσκίρτησαν
  english_pob_choice: skipped about
  chosen_spanish: retozaron
  alternatives_spanish:
  - saltaron
  - brincaron
  - retozaron alrededor
  lexicon: LSJ
  rationale: El verbo expresa movimiento vivo y jubiloso. "Retozaron" transmite bien esa vivacidad natural de los corderos y preserva el tono festivo del pasaje.
- source_word: ἀμνοί
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - borregos jóvenes
  - ovejas jóvenes
  lexicon: LSJ
  rationale: Aunque el inglés usa "lambs", en español "corderos" es la equivalencia más clara y natural para el referente joven y tierno del símil.
- source_word: αἰνοῦντές
  english_pob_choice: praising
  chosen_spanish: alabándote
  alternatives_spanish:
  - dándote alabanza
  - ensalzándote
  - pidiéndote alabanza
  lexicon: LSJ
  rationale: El participio contemporáneo acompaña la acción principal. "Alabándote" reproduce el sentido de adoración/praise en forma participial y encaja con el español litúrgico contemporáneo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: El vocativo dirige la alabanza a Dios. En español bíblico, "Señor" es la forma natural y reverente para Κύριε, manteniendo la lectura teológica del texto.
- source_word: ῥυόμενον
  english_pob_choice: the one who delivered them
  chosen_spanish: el que los libró
  alternatives_spanish:
  - el que los rescató
  - el que los salvó
  - el que los iba librando
  lexicon: LSJ
  rationale: El participio articular señala a Dios como agente salvador. "El que los libró" conserva el valor de rescate/liberación y suena idiomático en español sin perder la referencia al acto salvador.
theological_decisions:
- issue: Vocativo divino κύριε aplicado a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: El contexto es una alabanza dirigida a Dios; traducir Κύριε por "Señor" preserva la confesión reverente y evita una reducción secular del vocativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord / Señor'
- issue: Participio articular τὸν ῥυόμενον αὐτούς
  english_pob_reading: the one who delivered them
  chosen_spanish_reading: el que los libró
  alternative_spanish_readings:
  - el que los rescató
  - el que los salvó
  rationale: La forma griega subraya a Dios como el agente que libera. En español, "el que los libró" refleja ese participio sustantivado de manera natural y mantiene la fuerza de rescate sin sobreinterpretar.
  doctrine_reference: Participio articular con sentido de agente salvador; cf. uso narrativo de ῥύομαι en contextos de liberación
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, que explicita el participio articular con "the one who delivered them". En español se refleja con "el que los libró", manteniendo la misma precisión sin volver la frase pesada. También se conservó la ambigüedad productiva de ἐνεμήθησαν mediante una nota léxica, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa "Señor" para Κύριε, conforme al tratamiento reverente de vocativos divinos en el proyecto.
  - Se eligió "libró" para ῥυόμενον porque en español bíblico comunica liberación/rescate de manera más natural que una calca participial.
  - '"Pacieron" mantiene la imagen pastoral concreta y combina bien con el símil animal del versículo.'
  - Las notas al pie se anclan solo en los puntos donde el inglés POB documentó alternativas léxicas significativas.
