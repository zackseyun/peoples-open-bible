translation:
  language: es
  text: Cuando Lea vio que había dejado de dar a luz[a], tomó a Zilpa, su esclava[b], y se la dio a Jacob como esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'había cesado de dar a luz'; el hebreo literalmente dice 'había dejado de dar a luz' o 'se había detenido de dar a luz'.
    reason: lexical_alternative
  - marker: b
    text: O 'su sierva' o 'su criada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración y en español se expresa con naturalidad mediante 'Cuando', que enlaza la percepción de Lea con la acción siguiente sin perder el valor temporal.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que Lea percibió, no una causa; por eso 'que' reproduce mejor la relación sintáctica.
- source_word: עָמְדָה מִלֶּדֶת
  english_pob_choice: had stopped bearing children
  chosen_spanish: había dejado de dar a luz
  alternatives_spanish:
  - había cesado de dar a luz
  - había dejado de tener hijos
  lexicon: HALOT
  rationale: El hebreo expresa la idea de cesar en la acción de dar a luz. 'Había dejado de dar a luz' conserva el sentido idiomático y suena natural en español; 'tener hijos' sería más interpretativo.
- source_word: שִׁפְחָתָהּ
  english_pob_choice: her female servant
  chosen_spanish: su sierva
  alternatives_spanish:
  - su criada
  - su sierva femenina
  - su esclava
  lexicon: HALOT
  rationale: El término hebreo designa a una mujer de estatus servil. 'Sierva' mantiene la relación de dependencia sin imponer la posible dureza de 'esclava' en este contexto narrativo, aunque la alternativa sigue siendo semánticamente cercana.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - para esposa
  - para que fuera su esposa
  - como mujer
  lexicon: HALOT
  rationale: La construcción de dar a alguien 'como esposa' refleja el valor matrimonial formal de la frase hebrea y evita reducirla a una mera relación informal.
- source_word: זִלְפָּה
  english_pob_choice: Zilpah
  chosen_spanish: Zilpa
  alternatives_spanish:
  - Zilpá
  lexicon: Onomasticon / transliteration standard
  rationale: Se translitera el nombre propio al español con adaptación ortográfica habitual para lectura eclesial, manteniendo la identidad del personaje.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: El destinatario del acto se expresa naturalmente con 'a Jacob' en español, preservando el objeto indirecto del hebreo.
theological_decisions:
- issue: Estado servil de Zilpa y lenguaje matrimonial formal
  english_pob_reading: Render שִׁפְחָה as 'female servant' and לְאִשָּׁה as 'as a wife' without softening either term.
  chosen_spanish_reading: Traducir שִׁפְחָה como 'sierva' y לְאִשָּׁה como 'como esposa', sin convertir a Zilpa en 'concubina' ni diluir su estatus doméstico.
  alternative_spanish_readings:
  - '''esclava'' para intensificar el vínculo servil'
  - '''criada'' o ''sirvienta'' por estilo'
  - '''concubina'' para una categoría matrimonial secundaria'
  rationale: 'El hebreo mantiene juntas dos realidades: el estatus subordinado de Zilpa en la casa de Lea y la formulación matrimonial con que se la entrega a Jacob. ''Sierva'' conserva esa subordinación sin introducir una categoría técnica no presente en el versículo; ''como esposa'' reproduce el lenguaje formal de la entrega matrimonial.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El texto coincide con el último pasaje revisado de la fuente inglesa: no hay revisiones aplicadas y el consenso de verificación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Jacob' y no 'Jacobo' por consistencia onomástica bíblica.
  - Se evita 'SEÑOR' u otro masking del nombre divino porque el versículo no lo contiene.
  - '''Sierva'' conserva el campo semántico de dependencia doméstica del hebreo שִׁפְחָה sin imponer una lectura más dura que la que el contexto inmediato exige.'
