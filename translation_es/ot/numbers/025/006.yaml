translation:
  language: es
  text: Y he aquí[a], un hombre de entre los hijos de Israel vino y trajo ante sus hermanos a una mujer madianita[b], ante los ojos de Moisés y ante los ojos de toda la congregación de los hijos de Israel, mientras ellos lloraban a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «He aquí» reproduce el marcador hebreo de atención repentina; también puede entenderse como «mira» o «ahora bien»
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «la madianita»; en español suele sonar más natural «una mujer madianita» al introducirla por primera vez en la narración
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Ahora bien, he aquí
  lexicon: HALOT
  rationale: Mantiene el marcador discursivo de sorpresa o choque. «He aquí» conserva la fuerza de atención repentina sin volverlo meramente explicativo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El sustantivo singular masculino designa a un individuo varón; «un hombre» es preciso y natural en español.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de entre los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva el giro genealógico y la formulación masculina del hebreo. «De entre» comunica bien el valor partitivo de מִן.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: HALOT
  rationale: Verbo narrativo simple de movimiento; «vino» reproduce bien el avance de la escena.
- source_word: וַיַּקְרֵב
  english_pob_choice: brought near
  chosen_spanish: acercó
  alternatives_spanish:
  - trajo cerca
  - presentó
  lexicon: HALOT
  rationale: El Hifil de קרב expresa hacer venir cerca; «acercó» conserva la acción deliberada y evita una paráfrasis interpretativa.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus fellow israelitas
  lexicon: HALOT
  rationale: Se conserva «hermanos», siguiendo la literalidad y la fuerza relacional del hebreo. En español, el posesivo funciona naturalmente con el dativo de destino/relación.
- source_word: הַמִּדְיָנִית
  english_pob_choice: a Midianite woman
  chosen_spanish: la madianita
  alternatives_spanish:
  - una madianita
  - la mujer madianita
  lexicon: HALOT
  rationale: El adjetivo femenino sustantivado del hebreo puede quedar de modo conciso como «la madianita». La forma definida refleja el hebreo; el contexto ya introduce a la mujer dentro de la narración.
- source_word: לְעֵינֵי ... וּלְעֵינֵי
  english_pob_choice: before the eyes of ... and before the eyes of
  chosen_spanish: ante los ojos de ... y ante los ojos de
  alternatives_spanish:
  - a la vista de ... y a la vista de
  - en presencia de ... y en presencia de
  lexicon: HALOT
  rationale: Se mantiene la repetición del hebraísmo para subrayar el carácter público y descarado del acto.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la asamblea de los hijos de Israel
  - toda la congregación de Israel
  lexicon: HALOT
  rationale: «Congregación» conserva el valor comunitario/covenantal de עֵדָה y «hijos de Israel» mantiene la correspondencia formal con el hebreo.
- source_word: וְהֵמָּה בֹכִים
  english_pob_choice: while they were weeping
  chosen_spanish: mientras ellos lloraban
  alternatives_spanish:
  - y ellos lloraban
  - mientras lloraban
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Mientras ellos lloraban» conserva la simultaneidad y la referencia explícita del pronombre.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la entrada del tabernáculo de reunión
  - a la entrada de la tienda de encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» es la forma establecida para אֹהֶל מוֹעֵד y mantiene la especificidad cultual del lugar.
theological_decisions:
- issue: Lenguaje de parentesco masculino en בני ישראל / אֶחָיו
  english_pob_reading: Preserve 'sons of Israel' and 'brothers' in the main text
  chosen_spanish_reading: Preservar «hijos de Israel» y «hermanos» en el texto principal
  alternative_spanish_readings:
  - «israelitas»
  - «parientes»
  - «compatriotas»
  rationale: El hebreo usa términos masculinos y familiares concretos. Se evita neutralizarlos sin una razón textual, preservando la tensión formal y relacional del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Carácter público y escandaloso del gesto
  english_pob_reading: before the eyes of Moses and before the eyes of all the congregation of the sons of Israel
  chosen_spanish_reading: «ante los ojos de Moisés» y «ante los ojos de toda la congregación de los hijos de Israel»
  alternative_spanish_readings:
  - «en presencia de Moisés»
  - «a la vista de toda la congregación»
  rationale: La repetición del hebraísmo destaca el desafío público y no debe suavizarse. El español conserva la fórmula para reflejar esa exposición deliberada.
  doctrine_reference: Principio de equivalencia óptima y fidelidad al énfasis narrativo del texto
translation_notes:
  revision_awareness: 'El inglés revisado ajustó el orden de «brought near» para hacerlo más natural: «brought a Midianite woman near to his brothers». La versión española sigue ese ajuste con «acercó a la madianita a sus hermanos», manteniendo la literalidad del movimiento hacia los hermanos y el efecto público del gesto.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» de forma consistente con el estilo del proyecto para בני ישראל.
  - Se conserva «congregación» para עֵדָה y «tienda de reunión» para אֹהֶל מוֹעֵד.
  - «Madianita» se usa como sustantivo/adjetivo femenino sustantivado, coherente con el hebreo.
  - Se preserva la duplicación de «ante los ojos de» para reflejar el paralelismo hebreo.
