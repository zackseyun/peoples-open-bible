review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: introduce la lista, conserva «los nombres de», ubica correctamente «en Jerusalén» y mantiene el matiz léxico de הַיְלוּדִים como «los nacidos» en vez de normalizarlo a «hijos». La nota también preserva adecuadamente la alternativa documentada en inglés. Sin embargo, «que tuvo» para אֲשֶׁר הָיוּ לוֹ suena algo posesivo-generativo y menos transparente que una formulación más cercana al valor de «le nacieron / nacidos para él».'
  spanish_quality_summary: 'El español es claro y legible, pero «los nacidos que tuvo» resulta algo rígido y poco idiomático en registro bíblico natural. Además, la nota alternativa repite esa rigidez. Una leve reparación mejora naturalidad sin perder precisión: «los hijos que le nacieron» en el texto principal, con nota que explique que el hebreo literalmente dice «los nacidos» y no el sustantivo normal para «hijos». Los nombres propios y la puntuación son adecuados para un español bíblico contemporáneo.'
  glossary_alignment: No hay términos del glosario mayor en juego. La principal decisión léxica relevante es הַיְלוּדִים. Aunque «los nacidos» refleja bien el hebreo, en español suena marcado; usar «los hijos[a] que le nacieron» en el texto principal, con nota aclaratoria, equilibra fidelidad y legibilidad. Esto sigue la racionalidad del POB al conservar en nota la diferencia entre «hijos» y el literal «los nacidos».
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «los nacidos[a] que tuvo»'
    rationale: Aunque formalmente defendible, en español suena forzado y menos idiomático que alternativas como «los hijos que le nacieron». El proyecto permite evitar calcos de madera cuando el español queda antinatural.
  - severity: low
    issue: La nota alternativa repite una formulación poco natural
    rationale: «los nacidos que tuvo en Jerusalén» conserva el problema estilístico del texto principal. Conviene que la nota explique el literal hebreo con más claridad para el lector español.
  revised_spanish_text: 'Y estos son los nombres de los hijos[a] que le nacieron en Jerusalén: Samúa, Sobab, Natán y Salomón.'
  revised_footnotes:
