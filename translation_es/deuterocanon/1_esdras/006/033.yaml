translation:
  language: es
  text: Yo, el rey Darío, he decretado que se haga cuidadosamente conforme a estas cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según estas cosas». La expresión apunta a las disposiciones precedentes del decreto de Darío.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: LSJ
  rationale: Se conserva el pronombre explícito para el énfasis solemne de la fórmula real.
- source_word: βασιλεὺς Δαρεῖος
  english_pob_choice: King Darius
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - Darío, el rey
  lexicon: LSJ
  rationale: Mantiene el título unido al nombre propio con orden natural en español y el tono oficial del decreto.
- source_word: δεδογμάτικα
  english_pob_choice: have decreed
  chosen_spanish: he decretado
  alternatives_spanish:
  - he ordenado
  - he promulgado
  lexicon: LSJ
  rationale: El perfecto expresa una decisión real ya establecida y vigente; 'he decretado' es la equivalencia más directa y formal.
- source_word: ἐπιμελῶς
  english_pob_choice: carefully
  chosen_spanish: cuidadosamente
  alternatives_spanish:
  - con cuidado
  - diligentemente
  lexicon: LSJ
  rationale: Reproduce la idea de ejecución atenta y precisa sin añadir un matiz de celo no exigido por el griego.
- source_word: κατὰ ταῦτα
  english_pob_choice: according to these things
  chosen_spanish: conforme a estas cosas
  alternatives_spanish:
  - según estas cosas
  - de acuerdo con esto
  lexicon: LSJ
  rationale: Se preserva la referencia concreta y cercana del demostrativo sin expandirlo a 'instrucciones', que sería interpretativo.
- source_word: γίνεσθαι
  english_pob_choice: be done
  chosen_spanish: se haga
  alternatives_spanish:
  - sea hecho
  - se lleve a cabo
  lexicon: LSJ
  rationale: El infinitivo pasivo se vierte con una construcción natural en español que conserva el sentido impersonal de ejecución.
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del audit trail al evitar 'estas instrucciones' y usar una fórmula más pegada al griego, sin perder la naturalidad en español.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras sustituciones no presentes, pues el pasaje no contiene lenguaje divino.
  - '''Decretado'' conserva el registro administrativo y real del original.'
  - '''Conforme a estas cosas'' mantiene la literalidad suficiente de κατὰ ταῦτα y la nota aclara su referencia contextual.'
