translation:
  language: es
  text: La asna me vio y se apartó delante de mí estas tres veces. Si no se hubiera apartado de delante de mí[a], seguramente ahora mismo te habría matado y la habría dejado con vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «quizá se apartó de delante de mí»; aquí se entiende de manera contrafactual: «si no se hubiera apartado de delante de mí», como exige el contexto y la frase siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּרְאַנִי
  english_pob_choice: saw me
  chosen_spanish: me vio
  alternatives_spanish:
  - me contempló
  - me percibió
  lexicon: HALOT
  rationale: ראה expresa percepción visual directa; en español 'me vio' es la opción más natural y fiel al sentido simple del contexto.
- source_word: הָאָתוֹן
  english_pob_choice: the donkey
  chosen_spanish: la asna
  alternatives_spanish:
  - la burra
  - el asno hembra
  lexicon: HALOT
  rationale: אָתוֹן designa una hembra de asno. 'Asna' conserva esa especificidad de sexo mejor que el genérico 'donkey' en inglés.
- source_word: וַתֵּט לְפָנַי
  english_pob_choice: turned aside before me
  chosen_spanish: se apartó delante de mí
  alternatives_spanish:
  - se desvió delante de mí
  - viró delante de mí
  lexicon: HALOT
  rationale: נטה aquí es apartarse o desviarse. 'Se apartó delante de mí' preserva la relación espacial de לְפָנַי sin calcar de forma extraña el inglés.
- source_word: זֶה שָׁלֹשׁ רְגָלִים
  english_pob_choice: these three times
  chosen_spanish: estas tres veces
  alternatives_spanish:
  - estas tres ocasiones
  - tres veces
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. En español, 'estas tres veces' comunica con claridad la repetición, sin perder el valor demostrativo del hebreo.
- source_word: אוּלַי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Quizá
  - Tal vez
  lexicon: HALOT
  rationale: Aunque אוּלַי suele significar 'quizá', aquí introduce una condición contrafactual. 'Si' refleja mejor la lectura contextual que el POB inglés documenta.
- source_word: נָטְתָה מִפָּנַי
  english_pob_choice: she had not turned aside from before me
  chosen_spanish: se hubiera apartado de delante de mí
  alternatives_spanish:
  - se hubiera desviado de delante de mí
  - no se hubiera apartado de delante de mí
  lexicon: HALOT
  rationale: El hebreo transmitido no incluye una negación explícita, pero el contexto exige una cláusula contrafactual. En español se conserva el giro de 'delante de mí' y se expresa la lectura contextual con el subjuntivo pluscuamperfecto.
- source_word: כִּי עַתָּה
  english_pob_choice: surely by now
  chosen_spanish: seguramente ahora mismo
  alternatives_spanish:
  - ciertamente ya
  - seguramente ya
  lexicon: HALOT
  rationale: La combinación funciona como apódosis enfática con sentido temporal inmediato. 'Seguramente ahora mismo' comunica la fuerza y la inmediatez sin sonar forzado.
- source_word: גַּם אֹתְכָה
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - incluso a ti
  - también a ti
  lexicon: HALOT
  rationale: גַּם añade énfasis. En español puede quedar implícito en la estructura; el objeto directo se resuelve naturalmente con 'te'.
- source_word: הָרַגְתִּי
  english_pob_choice: I would have killed
  chosen_spanish: habría matado
  alternatives_spanish:
  - habría asesinado
  - habría muerto
  lexicon: HALOT
  rationale: El perfecto en este contexto es parte de una consecuencia contrafactual. 'Habría matado' expresa bien la acción resultante sin elevar innecesariamente el tono.
- source_word: וְאֹתָהּ הֶחֱיֵיתִי
  english_pob_choice: and let her live
  chosen_spanish: y la habría dejado vivir
  alternatives_spanish:
  - y la habría dejado con vida
  - y la habría mantenido con vida
  lexicon: HALOT
  rationale: חיה en hiphil significa dejar vivir o mantener con vida. 'La habría dejado vivir' conserva el contraste con la muerte de Balaam y el paralelismo del condicional.
theological_decisions:
- issue: La cláusula con אוּלַי aparece sin negación explícita en hebreo, pero el sentido narrativo es contrafactual.
  english_pob_reading: Render the sense as 'If she had not turned aside from before me'
  chosen_spanish_reading: Traducir el sentido como 'Si no se hubiera apartado de delante de mí'
  alternative_spanish_readings:
  - Si se hubiera apartado de delante de mí
  - Quizá se apartó de delante de mí
  rationale: La lógica del relato requiere que el apartarse de la asna haya evitado la muerte de Balaam. Una traducción literal sin esa negación invertiría el sentido. La forma elegida mantiene la tensión textual documentada y expresa la lectura contextual necesaria.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el sentido claro del texto sin suavizar ni invertir la sintaxis hebrea más de lo necesario.'
translation_notes:
  revision_awareness: La versión española sigue el último pase del POB inglés, sin cambios en el juicio textual final. Se mantiene la solución contrafactual documentada para אוּלַי / נָטְתָה, y se conserva el contraste entre la muerte de Balaam y la vida concedida a la asna.
  spanish_consistency_notes:
  - Se usó 'asna' para reflejar el género específico del hebreo אָתוֹן.
  - Se mantuvo 'delante de mí' para conservar לְפָנַי / מִפָּנַי con consistencia espacial.
  - '''Habría matado'' y ''habría dejado vivir'' expresan el valor contrafactual del resultado.'
  - La nota a pie de página marca la tensión entre la literalidad hebrea y la lectura contextual, siguiendo el audit trail en inglés.
