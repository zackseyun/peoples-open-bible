translation:
  language: es
  text: Benjamín engendró a Bela, su primogénito, a Ashbel, el segundo, y a Aharah[a], el tercero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Aharah; algunas versiones leen Ahrah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Y Benjamín
  - Ahora Benjamín
  lexicon: HALOT
  rationale: Es un nombre propio; en español se conserva la forma tradicional Benjamín. El prefijo conjuntivo hebreo puede quedar implícito en el estilo genealógico español sin añadir una conjunción que altere el ritmo del listado.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, el hifil de ילד expresa la acción de engendrar o hacer nacer descendencia. 'Engendró' preserva el sentido genealógico masculino con dignidad y naturalidad en español.
- source_word: בֶּלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  alternatives_spanish:
  - Béla
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso bíblico en español.
- source_word: בְּכֹרוֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo primogénito
  - su primer hijo
  lexicon: HALOT
  rationale: '''Primogénito'' comunica el orden de nacimiento y conserva el valor técnico genealógico mejor que una paráfrasis como ''primer hijo''.'
- source_word: אַשְׁבֵּל
  english_pob_choice: Ashbel
  chosen_spanish: Ashbel
  alternatives_spanish:
  - Asbel
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio tal como aparece en la forma hebrea de este versículo.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo
  lexicon: HALOT
  rationale: El artículo más ordinal reproduce el valor enumerativo del hebreo y suena natural en una lista genealógica española.
- source_word: וְאַחְרַח
  english_pob_choice: Aharah
  chosen_spanish: Aharah
  alternatives_spanish:
  - Ahrah
  lexicon: HALOT
  rationale: Se sigue la forma consonántica del texto masorético de este versículo. Se conserva la forma Aharah, aunque algunas versiones inglesas leen Ahrah por vocalización o armonización alternativa.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: Se traduce el ordinal con artículo para reflejar el patrón del hebreo y mantener la cadencia de la enumeración.
theological_decisions:
- issue: Tratamiento del prefijo conjuntivo inicial וְ/וּ en una genealogía
  english_pob_reading: Benjamin fathered...
  chosen_spanish_reading: Benjamín engendró...
  alternative_spanish_readings:
  - Y Benjamín engendró...
  - Ahora Benjamín engendró...
  rationale: En listas genealógicas, el hebreo usa la conjunción sin introducir una transición narrativa fuerte. El español puede omitirla para evitar rigidez, sin perder el sentido del texto.
  doctrine_reference: Estilo narrativo/genealógico del texto bíblico; ninguna implicación doctrinal directa.
translation_notes:
  revision_awareness: 'El texto inglés POB sigue la forma del MT y deja constancia de la variante ''Ahrah'' en nota. El borrador español conserva la misma decisión base: Aharah en el texto principal y una nota breve con la alternativa tradicional/variantemente vocalizada.'
  spanish_consistency_notes:
  - Se conserva la terminología genealógica con 'engendró' y 'primogénito', en línea con el valor del hebreo y la preferencia POB por precisión lexical.
  - Los nombres propios se transliteran de manera estable y reconocible para lectores bíblicos en español.
  - No se añade conjunción inicial para mantener el estilo fluido de una lista genealógica breve.
