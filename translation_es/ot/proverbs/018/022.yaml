translation:
  language: es
  text: El que encuentra una esposa encuentra un bien[a] y obtiene favor de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien encuentra una esposa encuentra un bien y obtiene favor de Yahvé». El hebreo usa una forma masculina singular en sentido proverbial y representativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָא
  english_pob_choice: finds
  chosen_spanish: encuentra
  alternatives_spanish:
  - halla
  - ha encontrado
  lexicon: HALOT
  rationale: El perfecto hebreo en estilo proverbial expresa una verdad general. «Encuentra» comunica bien la fuerza gnómica en español natural, sin sonar forzado ni temporalmente limitado.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: En este contexto sapiencial y en esta combinación léxica, el sentido es marital. «Esposa» preserva mejor el alcance del proverbio que el más amplio «mujer».
- source_word: טוֹב
  english_pob_choice: a good thing
  chosen_spanish: un bien
  alternatives_spanish:
  - algo bueno
  - una cosa buena
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «Un bien» mantiene el valor indefinido y proverbial del hebreo, con una formulación idiomática y sobria en español.
- source_word: וַיָּפֶק
  english_pob_choice: obtains
  chosen_spanish: obtiene
  alternatives_spanish:
  - recibe
  - consigue
  - alcanza
  lexicon: HALOT
  rationale: El verbo expresa ganancia u obtención. «Obtiene» conserva la relación paralela con «encuentra» y evita una literalidad extraña.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - benevolencia
  - buena voluntad
  - aceptación
  lexicon: HALOT
  rationale: Cuando se refiere a la relación con Yahvé, רָצוֹן denota favor o benevolencia. «Favor» es claro, natural y suficientemente preciso en español.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Nombre divino. «De Yahvé» refleja de forma directa la preposición hebrea y evita el enmascaramiento litúrgico.
- source_word: implicit subject of מָצָא
  english_pob_choice: He who
  chosen_spanish: El que
  alternatives_spanish:
  - Quien
  - Quienquiera que
  lexicon: HALOT
  rationale: El hebreo omite el sujeto explícito y usa masculino singular de manera proverbial y representativa. «El que» preserva esa forma sin volver la frase artificial en español.
theological_decisions:
- issue: Sujeto masculino genérico en el proverbio
  english_pob_reading: He who finds a wife
  chosen_spanish_reading: El que encuentra una esposa
  alternative_spanish_readings:
  - Quien encuentra una esposa
  - La persona que encuentra una esposa
  rationale: La sintaxis hebrea es masculina singular, pero funciona como máxima general. Se conserva esa forma representativa en español para no neutralizar indebidamente la señal gramatical del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del proyecto, se mantiene el Nombre divino como «Yahvé» en lugar de sustituirlo por una máscara tradicional.
  doctrine_reference: 'DOCTRINE.md § Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto inglés auditado mantiene el sentido gnómico del perfecto hebreo, interpreta אִשָּׁה como «wife», רָצוֹן como «favor» y יְהוָה como el Nombre divino. No se registran revisiones posteriores que alteren estas decisiones, y el cotejo final indica alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la norma del proyecto para יְהוָה.
  - «Esposa» refleja el matiz marital del sustantivo en este proverbio; no se usa «mujer» por ser demasiado amplio.
  - «Un bien» conserva el valor sustantivado de טוֹב sin añadir una paráfrasis explicativa.
