translation:
  language: es
  text: En su vida hizo maravillas[a], y en su muerte sus obras fueron maravillosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca al griego: "y en su fin sus obras fueron maravillosas". El hebreo dice "y en su muerte", con una forma final algo difícil; el griego confirma el sentido de obras maravillosas vinculadas con su muerte.'
    reason: alternative_reading
lexical_decisions:
- source_word: בחייו / ἐν ζωῇ αὐτοῦ
  english_pob_choice: In his life
  chosen_spanish: En su vida
  alternatives_spanish:
  - Durante su vida
  - Mientras vivió
  lexicon: HALOT; paralelismo con griego ἐν ζωῇ αὐτοῦ
  rationale: La expresión temporal indica el período de su vida terrenal. 'En su vida' es natural en español, breve, y conserva el paralelo con el griego sin añadir matices ajenos.
- source_word: עשה / ἐποίησεν
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - obró
  lexicon: HALOT; uso básico verbal
  rationale: El verbo común 'hacer' refleja la simplicidad del hebreo עשה y del griego ἐποίησεν. 'Hizo' mantiene el tono sobrio y evita una elevación innecesaria.
- source_word: נפלאות / τέρατα
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - portentos
  lexicon: HALOT; correspondencia semántica con τέρατα
  rationale: '''Maravillas'' comunica actos extraordinarios con registro bíblico claro en español. Mantiene el sentido de maravilla/sobresalto sin forzar un tecnicismo.'
- source_word: ובמותו / ἐν τελευτῇ
  english_pob_choice: and in his death
  chosen_spanish: y en su muerte
  alternatives_spanish:
  - y al morir
  - y en su fin
  lexicon: HALOT; griego paralelo
  rationale: La forma hebrea y el paralelismo griego apuntan a la esfera de su muerte o final. 'En su muerte' preserva la forma del hebreo y sigue siendo inteligible en español.
- source_word: תמהי
  english_pob_choice: were marvelous
  chosen_spanish: fueron maravillosos
  alternatives_spanish:
  - fueron admirables
  - causaron asombro
  lexicon: HALOT; apoyo del griego θαυμάσια
  rationale: El hebreo presenta una forma algo difícil, pero el griego confirma un predicado de maravilla. En español, 'fueron maravillosos' refleja ese valor adjetival sin sobreinterpretar.
- source_word: מעשה / τὰ ἔργα αὐτοῦ
  english_pob_choice: his deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus obras realizadas
  lexicon: HALOT; griego plural τὰ ἔργα αὐτοῦ
  rationale: '''מעשה'' puede abarcar hechos, obras o acciones. ''Hechos'' suena natural en español y conserva el valor colectivo que el griego explicita en plural.'
theological_decisions:
- issue: Relación entre la lectura hebrea y el apoyo del griego en el final de la frase
  english_pob_reading: Translate the verse from the Hebrew, with the Greek used to confirm the sense of the final clause as 'his works were marvelous.'
  chosen_spanish_reading: Traducir desde el hebreo, dejando que el griego confirme el sentido de la cláusula final como una afirmación de hechos maravillosos vinculados con su muerte.
  alternative_spanish_readings:
  - Y en su fin sus obras fueron maravillosas
  - Y al final sus hechos fueron maravillosos
  rationale: El hebreo es la base principal, pero el formativo final es difícil y el griego apoya el sentido general. En español, la versión adoptada conserva la prioridad hebrea y la claridad literaria, sin borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: 'La redacción sigue el trayecto de revisión del inglés POB: se conserva el valor temporal de ''In his life'', se mantiene la simplicidad verbal de עשה, y se adopta una formulación española natural para el final de la cláusula, apoyada por el griego. También se incorpora la preferencia revisada por ''hechos'' como equivalente más natural de מעשה en este contexto.'
  spanish_consistency_notes:
  - Se evitó 'obras' en el texto principal para no sonar demasiado eclesiástico ni desplazar el matiz de actos concretos.
  - '''Maravillas'' y ''maravillosos'' preservan la familia léxica ligada a נפלאות / θαυμάσια.'
  - El pie de nota ofrece la alternativa más cercana al griego sin introducir una lectura dogmática.
  - No se usó 'Señor' ni terminología teológica ajena, pues el versículo no contiene el Tetragrámaton ni título divino explícito.
