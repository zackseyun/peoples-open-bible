translation:
  language: es
  text: Y sucedió[a] que el rey Ezequías, cuando lo oyó, rasgó sus vestiduras, se cubrió con saco y entró en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuando el rey Ezequías oyó»; el objeto es implícito en el contexto anterior y se expresa en español como «lo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce el desarrollo del relato; «Y sucedió» conserva ese valor discursivo en español sin caer en un giro demasiado arcaico.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard it
  chosen_spanish: cuando ... lo oyó
  alternatives_spanish:
  - al oír
  - así que oyó
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo constructo se refleja naturalmente con «cuando». El objeto es implícito en hebreo y se expresa en español como «lo» siguiendo el contexto inmediato, igual que la nota inglesa.
- source_word: הַמֶּלֶךְ חִזְקִיָּהוּ
  english_pob_choice: King Hezekiah
  chosen_spanish: el rey Ezequías
  alternatives_spanish:
  - Rey Ezequías
  - el rey, Ezequías
  lexicon: HALOT
  rationale: El hebreo presenta título + nombre en aposición; en español, «el rey Ezequías» conserva ambos elementos con sintaxis natural.
- source_word: וַיִּקְרַע אֶת בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestiduras
  alternatives_spanish:
  - rasgó su ropa
  - desgarró sus vestiduras
  lexicon: HALOT
  rationale: קרע con בגדים es un modismo de duelo o angustia. «Vestiduras» mantiene el tono bíblico y el matiz ritual mejor que «ropa»; «rasgó» conserva la acción física sin sobrerretorcerla.
- source_word: וַיִּתְכַּס בַּשָּׂק
  english_pob_choice: covered himself with sackcloth
  chosen_spanish: se cubrió con saco
  alternatives_spanish:
  - se vistió de saco
  - se envolvió en saco
  lexicon: HALOT
  rationale: El hebreo usa un reflexivo con כסה y el sustantivo de luto. «Saco» es el equivalente idiomático más breve y digno en español bíblico para saco de duelo; evita explicar de más el gesto ritual.
- source_word: וַיָּבֹא בֵּית יְהוָה
  english_pob_choice: went into the house of Yahweh
  chosen_spanish: entró en la casa de Yahvé
  alternatives_spanish:
  - fue a la casa de Yahvé
  - entró en la casa del SEÑOR
  lexicon: HALOT
  rationale: בוא + בית expresa entrada a un lugar. «Entró en la casa de Yahvé» sigue de cerca la fuerza del verbo y preserva el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Tetragrámaton en el texto principal, conforme a la convención del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. La lectura española sigue la decisión doctrinal del proyecto de preservar el nombre propio de Dios, no sustituirlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión inglesa establecida como "high_agreement" y no introduce cambios de contenido respecto al audit trail: conserva la secuencia narrativa, el objeto implícito de oír, el modismo de duelo y la rendición del nombre divino como Yahvé. Se adapta a un español bíblico moderno y publicable sin recalcar más allá de la evidencia del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Vestiduras» conserva el registro bíblico y el valor idiomático de duelo de בגדים.
  - «Saco» se emplea como equivalente natural de בַּשָּׂק en este contexto de humillación y luto.
  - La partícula inicial se traduce con una coordinación narrativa simple («Y sucedió») para mantener fluidez en español.
