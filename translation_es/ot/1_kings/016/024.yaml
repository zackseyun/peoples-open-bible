review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del hebreo: compra del monte/colina de Samaria a Shemer, precio de dos talentos de plata, construcción sobre el sitio, y denominación de la ciudad por referencia al nombre de Shemer, dueño del monte. Sin embargo, hay varios desajustes menores entre la evidencia fuente y el español elegido: «a Shemer» para מֵאֵת שֶׁמֶר es menos fiel que «de Shemer»; las notas al pie están invertidas respecto del rastro POB inglés; y algunas expresiones resultan demasiado calcadas o poco naturales en español.'
  spanish_quality_summary: El texto es comprensible, pero «llamó el nombre de la ciudad» y «por el nombre de Shemer» suenan rígidos en español. Puede preservarse la formalidad sin caer en un calco duro usando «llamó a la ciudad» y «en honor al nombre de Shemer» o similar. «Edificó sobre la colina» es aceptable, aunque «construyó sobre la colina» suena más natural; no obstante, «edificó» sigue siendo digno y claro.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Los nombres propios y la referencia de propiedad están bien encaminados: «Samaria», «Shemer», «dos talentos de plata», y «dueño de la colina/monte». La principal corrección léxica requerida es la preposición de adquisición: mejor «de Shemer» que «a Shemer».'
  issues:
  - severity: medium
    issue: La preposición «a Shemer» para מֵאֵת שֶׁמֶר es menos fiel que «de Shemer».
    rationale: El hebreo expresa la fuente/vendedor de la compra; en español bíblico y general, «compró ... de Shemer» refleja mejor el original que «a Shemer», que enfoca al receptor del pago.
  - severity: medium
    issue: Las notas al pie a y b están intercambiadas respecto a sus anclajes y al rastro inglés.
    rationale: En el inglés, [a] acompaña la alternativa léxica/sintáctica de la cláusula de nombrar, mientras [b] acompaña la nota cultural sobre «dos talentos de plata». En español actual, [a] está puesto tras «plata» pero contiene la nota cultural; [b] está tras «Shemer» pero contiene la alternativa. Deben ordenarse correctamente.
  - severity: medium
    issue: «Llamó el nombre de la ciudad» es un calco poco natural en español.
    rationale: Aunque refleja el hebreo, en español moderno y digno suena forzado. «Llamó a la ciudad» o «dio a la ciudad el nombre de» preserva el acto formal de nombrar con mejor legibilidad.
  - severity: low
    issue: «Por el nombre de Shemer» suena poco idiomático.
    rationale: La idea es que la ciudad fue nombrada en referencia al nombre de Shemer. Una formulación como «en honor al nombre de Shemer» o «por el nombre de Shemer» puede aclararse; la primera lee mejor en español sin perder el vínculo onomástico.
  revised_spanish_text: Compró la colina de Samaria de Shemer por dos talentos de plata[b], edificó sobre la colina y llamó a la ciudad que edificó Samaria[a], en honor al nombre de Shemer, el dueño de la colina.
