id: PRO.21.24
reference: Proverbs 21:24
source:
  edition: WLC
  text: זֵ֣ד יָ֭הִיר לֵ֣ץ שְׁמ֑/וֹ ע֝וֹשֶׂ֗ה בְּ/עֶבְרַ֥ת זָדֽוֹן׃
translation:
  text: “Proud[a], arrogant, a scoffer” is his name—one who acts in the fury of presumption.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Proud, haughty, a mocker is his name; he acts with arrogant fury.”
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵד
  chosen: proud
  alternatives:
  - insolent
  - presumptuous
  lexicon: HALOT
  rationale: זֵד denotes a person marked by arrogance or presumptuous pride. 'Proud' is natural English and fits the string of character labels; 'presumptuous' is preserved as an alternative nuance.
- source_word: יָהִיר
  chosen: arrogant
  alternatives:
  - haughty
  - boastful
  lexicon: HALOT
  rationale: This adjective intensifies the portrait of self-exaltation. 'Arrogant' is clear modern English and pairs well with 'proud' without collapsing the terms entirely.
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - mocker
  lexicon: HALOT
  rationale: לֵץ in Proverbs regularly refers to the scoffing/mockery type. 'Scoffer' preserves the established wisdom-category nuance slightly better than the more generic 'mocker'.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is his reputation
  - is he called
  lexicon: HALOT
  rationale: The idiom literally says 'his name,' functioning as a characterization formula. 'Is his name' keeps the Hebrew form while remaining intelligible in English.
- source_word: עֹשֶׂה
  chosen: one who acts
  alternatives:
  - he acts
  - doing
  lexicon: HALOT
  rationale: The participle describes habitual conduct. 'One who acts' captures the gnomic, character-defining force better than a simple finite verb.
- source_word: בְּעֶבְרַת
  chosen: in the fury of
  alternatives:
  - with overflowing wrath
  - in outburst of
  lexicon: HALOT
  rationale: עֶבְרָה often denotes overflowing anger, rage, or fury. Here it modifies the manner of action. 'In the fury of' is idiomatic and preserves the intensity.
- source_word: זָדוֹן
  chosen: presumption
  alternatives:
  - insolence
  - arrogance
  - pride
  lexicon: HALOT
  rationale: זָדוֹן is cognate with זֵד and conveys presumptuous arrogance. Rendering it 'presumption' avoids mere repetition of 'pride' while preserving the semantic link to insolent self-will.
