translation:
  language: es
  text: 'Que los sacerdotes[a], los ministros de Yahvé, lloren entre el pórtico y el altar, y que digan: «Perdona a tu pueblo, Yahvé, y no entregues tu heredad al oprobio, a burla[b] entre las naciones. ¿Por qué han de decir entre los pueblos: “¿Dónde está su Dios?”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre el vestíbulo y el altar» o «entre el portal y el altar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no entregues tu heredad al oprobio, para que las naciones se enseñoreen de ella». La frase hebrea puede entenderse como burla pública proverbial o como entrega a dominación extranjera; aquí el contexto favorece la idea de burla.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּין הָאוּלָם וְלַמִּזְבֵּחַ
  english_pob_choice: between the portico and the altar
  chosen_spanish: entre el pórtico y el altar
  alternatives_spanish:
  - entre el vestíbulo y el altar
  - entre el atrio y el altar
  lexicon: HALOT
  rationale: אוּלָם designa el espacio de entrada del templo; 'pórtico' comunica bien esa área cultual en español y preserva la precisión arquitectónica. 'Vestíbulo' y 'atrio' son posibles, pero menos ajustados al contexto del templo.
- source_word: יִבְכּוּ
  english_pob_choice: let ... weep
  chosen_spanish: lloren
  alternatives_spanish:
  - que lloren
  - lloren y se lamenten
  lexicon: HALOT
  rationale: El hebreo tiene fuerza exhortativa/jusiva en contexto; en español, la subordinada exhortativa 'que lloren' transmite mejor esa instrucción que un futuro o un indicativo.
- source_word: הַכֹּהֲנִים מְשָׁרְתֵי יְהוָה
  english_pob_choice: the priests, the ministers of Yahweh
  chosen_spanish: los sacerdotes, los ministros de Yahvé
  alternatives_spanish:
  - los sacerdotes que ministran a Yahvé
  - los sacerdotes, siervos de Yahvé
  lexicon: HALOT
  rationale: '''Sacerdotes'' conserva el término funcional básico; ''ministros'' refleja מְשָׁרְתֵי como designación cultual de servicio. ''Siervos'' sería posible, pero reduce el matiz institucional del cargo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, sin sustituirlo por un título. 'Yahvé' es la forma normativa del proyecto para יְהוָה.
- source_word: חוּסָה
  english_pob_choice: Spare
  chosen_spanish: Perdona
  alternatives_spanish:
  - Ten compasión de
  - Ahorra
  lexicon: HALOT
  rationale: El imperativo pide que Dios aparte la ruina merecida y actúe con misericordia. 'Perdona' funciona bien en español bíblico y expresa la solicitud de clemencia en este contexto, aunque 'ahorra' o 'ten compasión de' también son posibles.
- source_word: עַל עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - sobre tu pueblo
  - por tu pueblo
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es 'sobre', en español la petición con el verbo 'perdonar' se expresa naturalmente con objeto directo introducido por 'a'.
- source_word: וְאַל תִּתֵּן נַחֲלָתְךָ לְחֶרְפָּה
  english_pob_choice: and do not make your inheritance a reproach
  chosen_spanish: y no entregues tu heredad al oprobio
  alternatives_spanish:
  - y no hagas de tu heredad un reproche
  - y no entregues tu heredad a la vergüenza
  lexicon: HALOT
  rationale: '''Entregues'' conserva el valor resultativo de נָתַן; ''heredad'' mantiene el lenguaje de posesión pactual. ''Oprobio'' es una opción formal para חֶרְפָּה, adecuada al registro bíblico.'
- source_word: נַחֲלָתְךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: HALOT
  rationale: '''Heredad'' conserva la dimensión pactual y territorial del término mejor que ''herencia'', que en español puede sonar más abstracta o doméstica.'
- source_word: לְחֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: al oprobio
  alternatives_spanish:
  - a la vergüenza
  - a la deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה es deshonra pública y burla; 'oprobio' retiene bien esa carga de vergüenza social y religiosa.
- source_word: לִמְשָׁל בָּם גּוֹיִם
  english_pob_choice: a byword among the nations
  chosen_spanish: para que las naciones se enseñoreen de ella
  alternatives_spanish:
  - como burla entre las naciones
  - para que sirva de proverbio entre las naciones
  lexicon: HALOT
  rationale: El hebreo admite un posible sentido de dominio por extranjeras o de objeto de refrán burlón. La lectura adoptada sigue el POB inglés al preferir 'rule over them'; en español, 'se enseñoreen de ella' expresa con naturalidad la dominación sobre la heredad/pueblo, sin perder la humillación implícita.
- source_word: גּוֹיִם / בָעַמִּים
  english_pob_choice: the nations / the peoples
  chosen_spanish: las naciones / los pueblos
  alternatives_spanish:
  - las naciones / los pueblos
  - los gentiles / los pueblos
  lexicon: HALOT
  rationale: 'Se conserva la distinción léxica: גּוֹיִם como ''naciones'' y עַמִּים como ''pueblos''. En español, ambos términos mantienen el paralelismo y la diferencia de matiz.'
- source_word: לָמָּה יֹאמְרוּ
  english_pob_choice: Why should they say
  chosen_spanish: ¿Por qué han de decir
  alternatives_spanish:
  - ¿Por qué dirán?
  - ¿Por qué tendrían que decir?
  lexicon: HALOT
  rationale: La forma imperfecta en contexto expresa un resultado temido. 'Han de decir' comunica bien esa consecuencia prevista, sin endurecerla como futuro simple.
- source_word: אַיֵּה אֱלֹהֵיהֶם
  english_pob_choice: Where is their God?
  chosen_spanish: Dónde está su Dios
  alternatives_spanish:
  - ¿Dónde está su Dios?
  - ¿Dónde queda su Dios?
  lexicon: HALOT
  rationale: La pregunta insultante se entiende de modo natural en español como una fórmula de burla religiosa. Se mantiene la fuerza retórica sin añadir elementos interpretativos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto POB lo vierte como nombre propio y no como título sustitutivo; en español, 'Yahvé' conserva esa intención teológica y auditabilidad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לִמְשָׁל בָּם גּוֹיִם
  english_pob_reading: a byword among the nations
  chosen_spanish_reading: para que las naciones se enseñoreen de ella
  alternative_spanish_readings:
  - a modo de refrán entre las naciones
  - como burla entre las naciones
  - para que las naciones hablen de ella como proverbio
  rationale: Aquí seguí la lectura alternativa documentada por el inglés POB, que reconoce la posibilidad semántica de dominación extranjera. Dado que el hebreo puede leerse así y el español lo expresa con mayor naturalidad, 'se enseñoreen de ella' conserva la tensión sin forzar el giro proverbial.
  doctrine_reference: 'DOCTRINE.md: Text-critical and lexical alternatives — semantic range of לִמְשָׁל'
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente, con solo observaciones menores. Esta propuesta española sigue la lectura principal del POB, pero aprovecha la alternativa documentada para לִמְשָׁל בָּם גּוֹיִם, reflejando de modo explícito la posibilidad de dominación extranjera que el propio aparato reconoce.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el registro cultual con 'sacerdotes' y 'ministros'.
  - Se distingue 'naciones' de 'pueblos' para גּוֹיִם / עַמִּים.
  - La pregunta final se deja en estilo directo y breve para conservar la burla implícita.
