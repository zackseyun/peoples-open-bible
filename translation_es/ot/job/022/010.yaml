translation:
  language: es
  text: Por tanto, lazos[a] te rodean, y terror súbito te aterra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trampas hay alrededor de ti», o «el miedo de repente te aterra».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión o consecuencia; «Por tanto» conserva ese valor inferencial con registro digno y natural en español.
- source_word: סְבִיבוֹתֶיךָ
  english_pob_choice: are all around you
  chosen_spanish: hay alrededor de ti
  alternatives_spanish:
  - te rodean
  - están alrededor de ti
  lexicon: HALOT
  rationale: El hebreo expresa localización circundante; en español, «hay alrededor de ti» mantiene la imagen sin forzar una copulativa extraña en poesía.
- source_word: פַחִים
  english_pob_choice: snares
  chosen_spanish: trampas
  alternatives_spanish:
  - lazos
  - redes
  lexicon: HALOT
  rationale: El término denota artefactos para atrapar. «Trampas» es un equivalente claro y amplio; «lazos» podría sonar más específico, y «redes» desplaza la imagen.
- source_word: וִיבַהֶלְךָ
  english_pob_choice: terrifies you
  chosen_spanish: te aterra
  alternatives_spanish:
  - te espanta
  - te llena de pánico
  lexicon: HALOT
  rationale: בהל indica sobresalto, terror o pánico. «Te aterra» reproduce directamente la fuerza verbal y deja el sustantivo siguiente para el efecto intensivo.
- source_word: פַּחַד פִּתְאֹם
  english_pob_choice: sudden terror
  chosen_spanish: terror súbito
  alternatives_spanish:
  - terror repentino
  - pavor súbito
  lexicon: HALOT
  rationale: La combinación nominal conserva la intensidad y la abrupta inmediatez del hebreo. «Súbito» es un término digno y preciso para פִּתְאֹם.
translation_notes:
  revision_awareness: El inglés POB pasó de «sudden terror overwhelms you» a «sudden terror terrifies you» para seguir más de cerca el verbo hebreo. Por eso la versión española usa un verbo directo («te aterra») y no una interpretación más libre como «te abruma» o «te sobrecoge».
  spanish_consistency_notes:
  - Se mantiene «terror súbito» para conservar la repetición conceptual de פַּחַד con el verbo de causar terror.
  - La nota lexical de «trampas» preserva la alternativa semántica documentada sin recargar el texto principal.
