base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/006.yaml
  text: And they will fill your houses[a], the houses of all your servants[b], and the houses of all Egypt—something your fathers and your fathers’ fathers have not seen from the day they were on the land until this day.” Then he turned and went out from Pharaoh.
  footnotes:
  - marker: a
    text: Or, more literally, “which your fathers and your fathers’ fathers have not seen.” The clause refers to the unprecedented plague just described.
    reason: lexical_alternative
  - marker: b
    text: “The land” may also be rendered “the earth” or “the ground.”
    reason: lexical_alternative
