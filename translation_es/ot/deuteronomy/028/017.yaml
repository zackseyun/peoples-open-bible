lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed shall be
  chosen_spanish: Maldito será
  alternatives_spanish:
  - Cursed será
  - Sea maldito
  lexicon: HALOT
  rationale: El participio hebreo expresa una fórmula de maldición. En español, «maldito será» conserva el valor declarativo y encaja con el tono jurídico-del pacto del contexto, sin volverlo demasiado libre.
- source_word: טַנְאֲךָ
  english_pob_choice: your basket
  chosen_spanish: tu canasta
  alternatives_spanish:
  - tu cesta
  - tu canasto
  lexicon: HALOT
  rationale: El término designa un recipiente de uso doméstico para guardar o cargar productos. «Canasta» comunica bien la idea general en español moderno y mantiene la amplitud del sustantivo hebreo.
- source_word: וּמִשְׁאַרְתֶּךָ
  english_pob_choice: your kneading bowl
  chosen_spanish: tu artesa de amasar
  alternatives_spanish:
  - tu fuente para amasar
  - tu trough de amasar
  lexicon: HALOT
  rationale: El sustantivo se refiere a un recipiente para amasar masa. «Artesa de amasar» conserva el sentido de un contenedor doméstico de panificación y evita reducirlo a un simple tazón, que sería menos preciso.
translation_notes:
  revision_awareness: No se registran revisiones en el expediente; el texto inglés auditado también quedó sin cambios en la última pasada, con acuerdo alto entre revisiones.
  spanish_consistency_notes:
  - Se mantuvo «maldito» para reflejar la fórmula de maldición del hebreo.
  - Se eligió un término doméstico común para טַנְאֲךָ y un recipiente de amasado para מִשְׁאַרְתֶּךָ, preservando la imagen concreta del hogar.
  - Se evitó «SEÑOR» u otras sustituciones teológicas, porque el versículo no contiene el nombre divino.
