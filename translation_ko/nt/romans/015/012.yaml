id: ROM.15.12
reference: Romans 15:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ πάλιν Ἠσαΐας λέγει· Ἔσται ἡ ῥίζα τοῦ Ἰεσσαί, καὶ ὁ ἀνιστάμενος ἄρχειν ἐθνῶν· ἐπ’ αὐτῷ ἔθνη ἐλπιοῦσιν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/012.yaml
  text: 'And again Isaiah says, "The root of Jesse will be, and the one who rises to rule the Gentiles; in him the Gentiles will hope."'
translation:
  language: ko
  text: '또 이사야가 말합니다. 「이새의 뿌리가 나타날 것이니, 곧 이방인들을 다스리려고 일어나시는 분이다. 그에게 이방인들이 소망을 두리라.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ ῥίζα τοῦ Ἰεσσαί
  english_pob_choice: The root of Jesse
  chosen_korean: 이새의 뿌리
  lexicon: BDAG
  rationale: 이사야 11:10 인용. 정형 「이새」.
- source_word: Ἔσται
  english_pob_choice: will be
  chosen_korean: 나타날 것이다
  alternatives_korean:
  - 있을 것이다
  lexicon: BDAG
  rationale: 단순 「있을 것」이 자연스럽지 않으므로 메시아적 출현의 함의를 살려 「나타날 것이다」로.
- source_word: ὁ ἀνιστάμενος ἄρχειν ἐθνῶν
  english_pob_choice: the one who rises to rule the Gentiles
  chosen_korean: 이방인들을 다스리려고 일어나시는 분
  lexicon: BDAG
  rationale: 분사 「일어나시는 분」 + 부정사 목적 「다스리려고」. 메시아적 함의.
- source_word: ἐπ’ αὐτῷ ἔθνη ἐλπιοῦσιν
  english_pob_choice: in him the Gentiles will hope
  chosen_korean: 그에게 이방인들이 소망을 두리라
  alternatives_korean:
  - 그를 의지하리라
  lexicon: BDAG
  rationale: ἐπί + 여격 「~에게/위에」. 「소망을 두다」가 정형.
