translation:
  language: es
  text: Y en su juicio no hay nada injusto[a]. Y suya es la fuerza y el reino y la autoridad y la majestad por todos los siglos. Bendito sea el Dios de la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «de todos los siglos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - fallo
  - juicio judicial
  lexicon: LSJ
  rationale: En el contexto forense de ἐν τῇ κρίσει αὐτῆς, «juicio» conserva la idea de decisión o acto judicial sin sobrecargar el español con un tecnicismo innecesario. Mantiene el paralelo con la valoración de justicia en la frase.
- source_word: ἄδικον
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - injusto
  - inicuo
  - malo
  lexicon: LSJ
  rationale: «Injusto» reproduce de manera directa la negación de lo justo o recto en un marco judicial. «Inicuo» sería más fuerte y más teológico; «malo» es demasiado general.
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  - vigor
  lexicon: LSJ
  rationale: «Fuerza» es un equivalente natural y transparente en español, y permite distinguirla de ἐξουσία («autoridad») en la misma lista. Evita solaparse con el matiz jurisdiccional del siguiente término.
- source_word: βασίλειον
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reino
  - dominio real
  - realeza
  lexicon: LSJ
  rationale: En esta doxología, «reino» es la forma más idiomática y fiel al valor real de βασίλειον. «Dominio real» explicita el matiz, pero resulta más pesado; «realeza» desplaza el foco hacia la cualidad más que hacia el gobierno.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - autoridad
  - poder
  - derecho
  lexicon: LSJ
  rationale: «Autoridad» mantiene la noción de poder legítimo o jurisdicción y distingue bien este término de ἰσχύς. «Poder» podría confundirse con fuerza; «derecho» estrecha demasiado el alcance.
- source_word: μεγαλειότης
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - majestad
  - grandeza
  - magnificencia
  lexicon: LSJ
  rationale: «Majestad» es la equivalencia española más natural en una fórmula de alabanza y conserva el tono elevado del griego. «Grandeza» es válida pero menos solemne.
- source_word: τῶν πάντων αἰώνων
  english_pob_choice: of all the ages
  chosen_spanish: de todos los siglos
  alternatives_spanish:
  - de todos los siglos
  - por todos los siglos
  - por toda la eternidad
  lexicon: LSJ
  rationale: «De todos los siglos» sigue de cerca la estructura del griego y preserva la imagen temporal literal. La alternativa idiomática «por todos los siglos» suaviza la construcción, pero pierde la transparencia de la expresión original.
- source_word: εὐλογητός
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito sea
  - Alabado sea
  - Sea bendito
  lexicon: LSJ
  rationale: Como aclamación doxológica, «Bendito sea» transmite de forma natural la fuerza exhortativa/pasiva de la fórmula. «Alabado sea» cambia el foco; «Sea bendito» es posible, pero menos fluido en español actual.
- source_word: ὁ θεὸς τῆς ἀληθείας
  english_pob_choice: the God of truth
  chosen_spanish: el Dios de la verdad
  alternatives_spanish:
  - el Dios de la verdad
  - el Dios verdadero
  - el Dios fiel
  lexicon: LSJ
  rationale: El genitivo se conserva mejor con «de la verdad», que sigue la estructura del griego y evita convertirla en una simple afirmación atributiva («Dios verdadero»). «Fiel» es interpretativo y menos directo respecto de ἀλήθεια.
theological_decisions:
- issue: Referencia de los pronombres femeninos αὐτῆς / αὕτη
  english_pob_reading: The feminine pronouns refer to 'truth' personified from the immediate context, so the verse is rendered with 'her' and 'hers.'
  chosen_spanish_reading: Se conserva la referencia femenina implícita con «su/suya», sin forzar un pronombre femenino explícito que suene artificial en español.
  alternative_spanish_readings:
  - Y en su juicio no hay nada injusto. Y de ella es la fuerza...
  - Y en el juicio de ella no hay nada injusto...
  rationale: El español necesita ajustar el sistema pronominal para que el texto suene natural. Mantener «su/suya» conserva la continuidad con la personificación de la verdad sin introducir una construcción pesada o poco idiomática. La tensión literaria se mantiene de manera suficiente en español.
  doctrine_reference: 'DOCTRINE.md: preserve the source text''s plain sense and theological tension; do not smooth away significant features without cause.'
translation_notes:
  revision_awareness: El texto base en inglés y el audit trail muestran alta concordancia con el griego; no se reportaron revisiones aplicadas. La presente versión sigue de cerca la sintaxis y el valor léxico del original, preservando la lista doxológica y la fórmula final de bendición sin introducir expansiones doctrinales.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exige; aquí el griego dice ὁ θεός, por lo que corresponde «Dios».
  - Se mantuvo la distinción entre «fuerza» (ἰσχύς) y «autoridad» (ἐξουσία).
  - «De todos los siglos» conserva la literalidad auditada del griego; la nota ofrece la alternativa idiomática.
  - Se evitó «Cristo» y términos eclesiásticos no presentes en el pasaje.
  - La sintaxis española preserva el paralelismo de la doxología y la clausula final de bendición.
