translation:
  language: es
  text: Beltsasar[a], jefe de los magos, de quien sé que el espíritu de los dioses santos está en ti, y que ningún misterio te resulta difícil, declárame las visiones de mi sueño que vi y su interpretación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Espíritu del Dios santo» o «el espíritu del Dios santo».'
    reason: alternative_reading
lexical_decisions:
- source_word: רַב חַרְטֻמַיָּא
  english_pob_choice: chief of the magicians
  chosen_spanish: jefe de los magos
  alternatives_spanish:
  - jefe de los escribas
  - jefe de los ocultistas
  lexicon: HALOT
  rationale: La expresión aramea designa a una clase de sabios de corte en Babilonia; en español, «magos» comunica bien ese grupo en el marco narrativo de Daniel. רַב aporta la idea de rango superior, por eso se traduce «jefe».
- source_word: ר֣וּחַ אֱלָהִין קַדִּישִׁין
  english_pob_choice: the spirit of the holy gods
  chosen_spanish: el espíritu de los dioses santos
  alternatives_spanish:
  - el Espíritu del Dios santo
  - un espíritu de dioses santos
  lexicon: HALOT
  rationale: Se conserva el plural de אֱלָהִין y el adjetivo plural «santos» para reflejar la forma aramea y la perspectiva pagana del hablante. «Espíritu» mantiene la ambigüedad entre una cualidad espiritual o una presencia divina, sin resolverla artificialmente.
- source_word: וְכָל רָז
  english_pob_choice: and no mystery
  chosen_spanish: ningún misterio
  alternatives_spanish:
  - ningún secreto
  - ningún enigma
  lexicon: HALOT
  rationale: En Daniel, רָז es el término técnico para un secreto revelado o misterio de sueño; «misterio» preserva ese valor mejor que «secreto».
- source_word: לָא אָנֵס לָךְ
  english_pob_choice: is too difficult for you
  chosen_spanish: te resulta difícil
  alternatives_spanish:
  - te es imposible
  - está fuera de tu alcance
  - es demasiado difícil para ti
  lexicon: HALOT
  rationale: La frase aramea expresa que algo no está más allá de la capacidad de Daniel. «Te resulta difícil» suena natural en español y mantiene la idea de dificultad sin sobrerreforzar la imposibilidad.
- source_word: חֶזְוֵי חֶלְמִי
  english_pob_choice: the visions of my dream
  chosen_spanish: las visiones de mi sueño
  alternatives_spanish:
  - las visiones del sueño
  - las imágenes de mi sueño
  lexicon: HALOT
  rationale: Se conserva el plural constructo y la referencia al contenido visionario del sueño, en vez de reducirlo simplemente a «mi sueño».
- source_word: דִי חֲזֵית
  english_pob_choice: that I saw
  chosen_spanish: que he visto
  alternatives_spanish:
  - que vi
  - que contemplé
  lexicon: HALOT
  rationale: El perfecto español «he visto» comunica con naturalidad la experiencia reciente del rey y mantiene el vínculo con la visión narrada.
- source_word: וּפִשְׁרֵהּ
  english_pob_choice: and its interpretation
  chosen_spanish: y su interpretación
  alternatives_spanish:
  - y su significado
  - y la interpretación de ello
  lexicon: HALOT
  rationale: פִּשְׁרָא en Daniel es el término habitual para la interpretación de sueños o misterios; «interpretación» es la equivalencia precisa y estable.
- source_word: אֱמַר
  english_pob_choice: tell me
  chosen_spanish: declárame
  alternatives_spanish:
  - dime
  - háblame
  - expón
  lexicon: HALOT
  rationale: El imperativo dirige a Daniel para que exponga la explicación del sueño. «Declárame» conserva el tono formal y exhortativo del contexto cortesano.
theological_decisions:
- issue: Cómo traducir רוּחַ אֱלָהִין קַדִּישִׁין sin resolver la tensión entre lectura plural y singular
  english_pob_reading: the spirit of the holy gods
  chosen_spanish_reading: el espíritu de los dioses santos
  alternative_spanish_readings:
  - el Espíritu del Dios santo
  - el espíritu del Dios santo
  rationale: La morfología aramea favorece una lectura plural, y la voz de Nabucodonosor puede reflejar su perspectiva religiosa. En español se preserva esa lectura en el texto principal, y la nota ofrece la alternativa singular, porque el pasaje ha sido entendido de ambas maneras.
  doctrine_reference: Preservar la tensión interpretativa del texto
- issue: Si traducir חֶזְוֵי חֶלְמִי como una sola idea o mantener la pluralidad del hebreo/arameo
  english_pob_reading: the visions of my dream
  chosen_spanish_reading: las visiones de mi sueño
  alternative_spanish_readings:
  - mi sueño
  - las imágenes de mi sueño
  rationale: 'La pluralidad no es accidental: el texto distingue las visiones vistas dentro del sueño. La versión española conserva esa precisión para no aplanar el original.'
  doctrine_reference: Fidelidad a la estructura semántica del pasaje
translation_notes:
  revision_awareness: Se revisó la propuesta a la luz del paquete fuente arameo y del audit trail inglés. No hubo revisiones posteriores en el archivo fuente; el texto español mantiene la tensión interpretativa documentada en la expresión sobre el espíritu y conserva la estructura del mandato final.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiere; aquí no aparece el tetragrámaton.
  - Se prefirió «misterio» para רָז por coherencia con Daniel.
  - Se mantuvo un tono cortesano y formal adecuado al discurso directo del rey.
  - La nota[a] se ancla en «espíritu» para preservar la alternativa singular/plural documentada.
