translation:
  language: es
  text: Así fue llevada Ester al rey Asuero[a], a su palacio real, en el décimo mes, que es el mes de Tebet[b], en el séptimo año de su reinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "fue tomada". El verbo hebreo está en voz pasiva, destacando que Ester fue objeto de la acción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el mes Tebet", el nombre babilónico del décimo mes.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּלָּקַח
  english_pob_choice: was taken
  chosen_spanish: fue llevada
  alternatives_spanish:
  - fue tomada
  - fue conducida
  lexicon: HALOT
  rationale: El hebreo está en pasivo y presenta a Ester como objeto de la acción. En español, 'fue llevada' conserva bien esa pasividad narrativa sin sonar tan duro como 'fue tomada', y sigue la fuerza de que ella no inicia el movimiento.
- source_word: אֶל הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: to King Ahasuerus
  chosen_spanish: al rey Ahasuero
  alternatives_spanish:
  - al rey Asuero
  - ante el rey Ahasuero
  lexicon: HALOT
  rationale: Se conserva el título y el nombre propio. 'Ahasuero' sigue la transliteración habitual del hebreo en español bíblico; 'al' refleja el movimiento hacia el rey.
- source_word: אֶל בֵּית מַלְכוּתוֹ
  english_pob_choice: into his royal palace
  chosen_spanish: a su palacio real
  alternatives_spanish:
  - a la casa de su reino
  - a la casa real
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a la casa de su reino/realeza', pero en contexto se refiere a la residencia real. 'Palacio real' comunica ese sentido sin perder el marco cortesano.
- source_word: בַּחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el mes décimo
  alternatives_spanish:
  - en el décimo mes
  - durante el mes décimo
  lexicon: HALOT
  rationale: La fórmula temporal se vierte de manera natural en español con 'mes décimo', manteniendo el orden semítico y el valor calendárico.
- source_word: הוּא חֹדֶשׁ טֵבֵת
  english_pob_choice: which is the month Tebeth
  chosen_spanish: que es el mes de Tebet
  alternatives_spanish:
  - es decir, el mes de Tebet
  - o sea, el mes de Tebet
  lexicon: HALOT
  rationale: Se conserva la cláusula explicativa y el nombre del mes. 'Tebet' es una transliteración comprensible en español; 'que es' refleja la función appositiva del hebreo.
- source_word: בִּשְׁנַת שֶׁבַע לְמַלְכוּתוֹ
  english_pob_choice: in the seventh year of his reign
  chosen_spanish: en el séptimo año de su reinado
  alternatives_spanish:
  - en su año séptimo de reinado
  - en el séptimo año de su gobierno
  lexicon: HALOT
  rationale: '''Reinado'' es el equivalente idiomático de la fórmula regnal hebrea. Mantiene la referencia temporal formal sin introducir matices ajenos.'
theological_decisions:
- issue: La voz pasiva en la llegada de Ester
  english_pob_reading: The Hebrew verb is passive, emphasizing that Esther was acted upon.
  chosen_spanish_reading: Se mantiene la pasividad con 'fue llevada'.
  alternative_spanish_readings:
  - fue tomada
  - fue conducida
  rationale: No se neutraliza la pasividad del verbo hebreo. La traducción preserva que Ester es objeto de la acción, un matiz importante del relato.
  doctrine_reference: Narrative theology of providence and human agency in Esther
- issue: Identificación calendárica del mes Tebet
  english_pob_reading: Hebrew 'the month Tebeth,' the Babylonian name for the tenth month.
  chosen_spanish_reading: Tebet se conserva como nombre propio del mes, con la aclaración interna de que es el mes décimo.
  alternative_spanish_readings:
  - Tevet
  - Tebet (mes babilónico)
  rationale: Se mantiene el nombre calendárico ajeno al español común porque el texto identifica un mes babilónico/hebreo específico. La apposición 'que es el mes de Tebet' ya explica la equivalencia sin sobrecargar el verso.
  doctrine_reference: Historical-cultural setting of the Persian court narrative
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete fuente hebreo y el criterio auditado de la POB inglesa. No se detectaron revisiones posteriores que alteraran el sentido; se conservan la pasividad de וַתִּלָּקַח, la identificación explicativa del mes y la fórmula regnal estándar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Ahasuero' como transliteración coherente con el nombre propio en el libro de Ester.
  - '''Palacio real'' se elige por claridad contextual frente a una traducción demasiado literal de ''casa de su reino''.'
  - La nota del mes conserva la referencia cultural sin reemplazar el nombre del mes por una explicación en el cuerpo principal.
