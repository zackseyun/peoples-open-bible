revisions:
- from: Pero ustedes, los que se mantienen unidos[a] a Yahvé su Dios, todos están vivos hoy.
  to: Pero ustedes, los que se aferran[a] a Yahvé su Dios, todos están vivos hoy.
  rationale: Se reemplaza «se mantienen unidos» por «se aferran» para reflejar con más fuerza y naturalidad el valor de דבק en contexto de lealtad y apego de pacto. Se corrige y dignifica la nota al pie, preservando las alternativas léxicas relevantes sin errores ni coloquialismos impropios. No se requieren cambios doctrinales ni estructurales adicionales.
