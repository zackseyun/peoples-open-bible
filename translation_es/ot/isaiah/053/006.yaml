  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> «Yahvé», עָוֹן -> «iniquidad». No hay conflicto glosarial mayor. La decisión de usar «cada uno» para אִישׁ es aceptable en español, dada la revisión inglesa a «each of us», aunque conviene que la nota explique el singular masculino distributivo en el lugar correcto.'
