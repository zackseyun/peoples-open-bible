translation:
  language: es
  text: Reinó tres meses y diez días en Jerusalén[a], e hizo lo que era malo delante del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la vista del Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεύει
  english_pob_choice: He reigned
  chosen_spanish: Reinó
  alternatives_spanish:
  - Fue rey
  - Gobernó como rey
  lexicon: LSJ
  rationale: El verbo expresa ejercicio real del poder; en español, «reinó» es la forma más natural y fiel para la duración de un reinado.
- source_word: μῆνας τρεῖς καὶ ἡμέρας δέκα
  english_pob_choice: three months and ten days
  chosen_spanish: tres meses y diez días
  alternatives_spanish:
  - durante tres meses y diez días
  lexicon: LSJ
  rationale: La expresión de duración es directa; en español puede quedar natural sin añadir una preposición equivalente obligatoria.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: LSJ
  rationale: Mantiene el valor locativo del griego y nombra la sede de su reinado.
- source_word: ἐποίησεν τὸ πονηρόν
  english_pob_choice: he did what was evil
  chosen_spanish: hizo lo malo
  alternatives_spanish:
  - hizo el mal
  - actuó malvadamente
  lexicon: LSJ
  rationale: El griego usa un giro bíblico idiomático para conducta moralmente mala; «hizo lo malo» preserva el sentido sin sonar rígido en español.
- source_word: ἔναντι Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - en la presencia del Señor
  - a los ojos del Señor
  lexicon: LSJ
  rationale: «Delante del Señor» comunica evaluación divina con un giro natural en español; «Señor» refleja la decisión del POB inglés de κύριος como Lord, sin introducir la convención de mayúsculas litúrgicas.
theological_decisions:
- issue: Valor de Κυρίου en relación con el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto griego de 1 Esdras usa Κυρίου; el POB inglés traduce «the Lord». En español, «el Señor» conserva esa lectura sin importar la convención de sustituir el nombre divino por mayúsculas ni trasladar automáticamente el hebreo YHWH al texto principal.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; יְהוָה → Yahvé / the LORD en contextos hebreos directos'
translation_notes:
  revision_awareness: 'Concordancia alta con el texto base: no hubo revisiones aplicadas y el pasaje coincide plenamente con el audit trail inglés y el griego Swete 1909.'
  spanish_consistency_notes:
  - Se mantuvo la construcción verbal breve y cronológica del griego.
  - «Señor» se usó de manera consistente para Κυρίου, sin introducir «Yahvé» en este versículo griego.
  - 'La nota reproduce la alternativa semántica preservada por el POB inglés: «in the sight of the Lord».'
