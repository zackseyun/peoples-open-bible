translation:
  language: es
  text: Los carros de Dios son miríadas[a], millares y millares; el Señor está entre ellos[b][c], Sinaí en santidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "miles de shin''an"; el término raro probablemente comunica repetición o multiplicidad, de ahí "millares y millares".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "el Señor está entre ellos; Sinaí está en el santuario", o "el Señor ha venido desde Sinaí al lugar santo". El hebreo es muy comprimido y difícil.'
    reason: alternative_reading
  - marker: c
    text: 'O: "el Señor está entre ellos—Sinaí en santidad".'
    reason: previous_rendering
lexical_decisions:
- source_word: רֶכֶב אֱלֹהִים
  english_pob_choice: the chariots of God
  chosen_spanish: los carros de Dios
  alternatives_spanish:
  - el carro de Dios
  - la charrería de Dios
  - los carros divinos
  lexicon: HALOT
  rationale: רֶכֶב designa carro(s) o caballería/carrotría en sentido colectivo. En español, 'carros' comunica la imagen bélica de forma natural sin introducir un plural demasiado técnico. Se conserva el genitivo posesivo de אֱלֹהִים como 'de Dios'.
- source_word: רִבֹּתַיִם
  english_pob_choice: myriads
  chosen_spanish: miríadas
  alternatives_spanish:
  - veintenas de millares
  - decenas de millares
  - miles incontables
  lexicon: HALOT
  rationale: El dual intensivo sugiere una enorme cantidad; 'miríadas' conserva el registro poético y la idea de multitud sin fijar una cifra matemática. En español es una equivalencia idiomática más natural que una perífrasis numérica.
- source_word: אַלְפֵי שִׁנְאָן
  english_pob_choice: thousands upon thousands
  chosen_spanish: miles por miles
  alternatives_spanish:
  - miles y miles
  - miles innumerables
  - miles de repetición
  lexicon: HALOT
  rationale: שִׁנְאָן es raro y difícil; el inglés POB lo resolvió como repetición/multiplicidad. 'Miles por miles' reproduce el efecto acumulativo y poético en español sin cerrar indebidamente el sentido léxico oscuro.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Soberano
  lexicon: HALOT
  rationale: Aunque el proyecto suele usar 'Yahvé' para יהוה, aquí אֲדֹנָי es el título divino leído y rendido tradicionalmente como 'el Señor'. En español litúrgico y bíblico, esta forma expresa adecuadamente la función titular sin confundirla con el Nombre propio.
- source_word: בָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - con ellos
  - en ellos
  lexicon: HALOT
  rationale: La preposición puede significar 'en/entre/con'. 'Entre ellos' es la expresión española más natural para la presencia divina en medio del grupo aludido, conservando la relación espacial sin añadir movimiento.
- source_word: סִינַי
  english_pob_choice: Sinai
  chosen_spanish: Sinaí
  alternatives_spanish:
  - Sinai
  lexicon: HALOT
  rationale: Topónimo propio transliterado a la grafía española usual 'Sinaí'.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en el santuario
  - en lo santo
  - en el lugar santo
  lexicon: HALOT
  rationale: קֹדֶשׁ puede ser abstracto ('santidad') o locativo ('santuario'). Dado que el hebreo es comprimido y el audit trail inglés preserva la ambigüedad, 'en santidad' mantiene el valor abstracto sin imponer un lugar que el texto no explicita.
theological_decisions:
- issue: 'Cláusula final comprimida: אֲדֹנָי בָם סִינַי בַּקֹּדֶשׁ'
  english_pob_reading: the Lord is among them, Sinai in holiness
  chosen_spanish_reading: el Señor está entre ellos, Sinaí en santidad
  alternative_spanish_readings:
  - el Señor está entre ellos como en Sinaí, en santidad
  - el Señor está entre ellos; Sinaí está en santidad
  - el Señor ha venido desde Sinaí al santuario
  rationale: La línea hebrea es elíptica y admite varias lecturas. La redacción elegida conserva la tensión poética y la compresión sintáctica, evitando introducir un verbo de movimiento o una expansión explicativa no explicitados por el texto base. 'Sinaí en santidad' deja visible la dificultad sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión interpretativa del texto poético y no añadir movimiento o localización no explicitados.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente evitó la expansión ''as at'' para acercarse más al hebreo y conservar la cláusula final breve: ''the Lord is among them, Sinai in holiness''. Esta versión española sigue esa misma línea, manteniendo la compresión y la ambigüedad controlada sin añadir una lectura explicativa adicional.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para אֲדֹנָי como título divino, evitando mezclarlo con 'Yahvé' en un verso donde el hebreo usa el título y no el Nombre.
  - '''Miríadas'' y ''miles por miles'' conservan el paralelismo cuantitativo-poético del hebreo y del audit trail inglés.'
  - '''Sinaí en santidad'' reproduce la tersura sintáctica problemática del original; la nota a pie de página recoge las alternativas más probables sin fijar una sola.'
  - No se usa 'siervo' ni 'Cristo'; no hay base léxica para tales sustituciones en este verso.
