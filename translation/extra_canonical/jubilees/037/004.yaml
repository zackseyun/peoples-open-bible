  category: mistranslation
  from: made me swear, me and him
  to: made us swear, me and him
  rationale: The draft translates the verb with a singular object ('made me swear')
    but follows it with a compound appositional phrase ('me and him'). The Ge'ez source
    uses the first-person plural object suffix ('amḥalana' - made us swear) followed
    by the independent pronouns ('iyāya wa-kiyāhu' - me and him). Correcting 'me'
    to 'us' fixes both the translation accuracy and the English grammatical discord.
