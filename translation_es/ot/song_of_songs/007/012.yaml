translation:
  language: es
  text: Ven, mi amado, salgamos al campo; pasemos la noche entre las aldeas[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las aldeas».'
    reason: lexical_alternative
  - marker: b
    text: Algunos interpretan aquí «entre las flores de alheña», relacionando el término hebreo con la planta mencionada en Cantar 1:14; sin embargo, el contexto inmediato apunta más probablemente a aldeas del campo.
    reason: alternative_reading
lexical_decisions:
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Venid
  lexicon: HALOT
  rationale: El hebreo es una invitación o llamado idiomático. En español, «Ven» transmite mejor la cercanía afectiva del llamamiento al amado que una forma más literal como «anda» o «ve». Mantiene el tono directo y poético.
- source_word: דוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: amado mío
  alternatives_spanish:
  - mi amado
  - mi amor
  lexicon: HALOT
  rationale: «Amado mío» conserva el valor afectivo y poético de דּוֹדִי sin volverlo demasiado coloquial. «Mi amor» puede sonar más general o menos marcado en castellano bíblico-poético.
- source_word: נֵצֵא
  english_pob_choice: let us go out
  chosen_spanish: salgamos
  alternatives_spanish:
  - vayamos afuera
  - salgamos fuera
  lexicon: HALOT
  rationale: La forma cohortativa plural pide una invitación conjunta. «Salgamos» expresa bien la intención compartida y evita redundancia innecesaria en español.
- source_word: הַשָּׂדֶה
  english_pob_choice: to the countryside
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - a la campaña
  - al campo/rural
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por «countryside» para naturalidad, el sustantivo hebreo sigue siendo «campo». En español, «al campo» conserva la referencia rural sin sobreparafrasear.
- source_word: נָלִינָה
  english_pob_choice: let us spend the night
  chosen_spanish: pasemos la noche
  alternatives_spanish:
  - alojémonos
  - permanezcamos la noche
  lexicon: HALOT
  rationale: «Pasemos la noche» refleja el sentido de alojarse o pernoctar con naturalidad en español moderno. Mantiene el matiz de estadía nocturna sin introducir un tono demasiado técnico.
- source_word: בַּכְּפָרִים
  english_pob_choice: among the villages
  chosen_spanish: entre las aldeas
  alternatives_spanish:
  - en las aldeas
  - entre los pueblos
  - en los villorrios
  lexicon: HALOT
  rationale: «Aldeas» comunica bien la idea de asentamientos rurales pequeños y mantiene el plural distributivo. «Entre» reproduce el valor local/de tránsito del hebreo mejor que un simple «en».
theological_decisions:
- issue: Posible lectura alternativa de בַּכְּפָרִים como referencia botánica ('henna blossoms')
  english_pob_reading: Some interpret 'among the henna blossoms,' but the immediate context more likely refers to villages in the countryside.
  chosen_spanish_reading: «entre las aldeas» con nota de lectura alternativa botánica.
  alternative_spanish_readings:
  - «entre los hennares»
  - «entre las flores de alheña»
  - «entre las aldeas» sin nota
  rationale: La lectura contextual principal es geográfica/rural, no botánica. Sin borrar la tensión interpretativa, la nota conserva la alternativa tradicional relacionada con Cantar 1:14, pero la traducción principal mantiene el sentido más probable del contexto inmediato.
  doctrine_reference: Principio de prioridad del contexto inmediato y preservación de lecturas alternativas donde el hebreo admite ambigüedad léxica.
translation_notes:
  revision_awareness: El paquete auditado indica alta concordancia y ningún cambio necesario en la revisión más reciente; este borrador sigue esa línea, preservando la lectura contextual principal y la nota de ambigüedad lexical ya documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - Se usa un registro poético natural, evitando calcos como «go forth» o «lodgings» que no aportarían claridad en español.
  - Se preserva la ambigüedad de בַּכְּפָרִים mediante nota, sin imponer la lectura botánica en el texto principal.
