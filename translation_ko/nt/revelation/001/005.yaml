id: REV.1.5
reference: 'Revelation 1:5'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'καὶ ἀπὸ Ἰησοῦ Χριστοῦ, ὁ μάρτυς ὁ πιστός, ὁ πρωτότοκος τῶν νεκρῶν καὶ ὁ ἄρχων τῶν βασιλέων τῆς γῆς. Τῷ ἀγαπῶντι ἡμᾶς καὶ ⸀λύσαντι ἡμᾶς ⸀ἐκ τῶν ἁμαρτιῶν ἡμῶν ἐν τῷ αἵματι αὐτοῦ—'
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/005.yaml
  text: 'and from Jesus Messiah[a], the faithful witness, the firstborn of the dead, and the ruler of the kings of the earth[b]. To him who loves us and freed us from our sins by his blood—'
  footnotes:
  - marker: a
    text: Some manuscripts read 'washed us from our sins in his blood' instead of 'freed us from our sins by his blood.'
    reason: textual_variant
  - marker: b
    text: Or 'Jesus Christ.' The Greek title is 'Messiah.'
    reason: lexical_alternative
translation:
  language: ko
  text: '또한 신실한 증인이시며, 죽은 자들 가운데서 처음 나신 분이시며, 땅의 왕들의 통치자이신 예수 메시아께로부터, 은혜와 평강이 여러분에게 있기를 빕니다. 우리를 사랑하시고 자기 피로 우리를 우리의 죄들에서 풀어 주신[a] 그분—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '일부 사본은 「자기 피로 우리를 우리의 죄들에서 씻으신」으로 읽는다.'
    reason: textual_variant
lexical_decisions:
- source_word: ὁ μάρτυς ὁ πιστός
  english_pob_choice: the faithful witness
  chosen_korean: 신실한 증인
  alternatives_korean:
  - 충성된 증인
  lexicon: BDAG
  rationale: '「증인」은 법정적·공적 무게를 담고, μάρτυς의 후대 「순교자」 의미는 본문 자체가 결정하지 않으므로 보존한다.'
- source_word: πρωτότοκος τῶν νεκρῶν
  english_pob_choice: the firstborn of the dead
  chosen_korean: 죽은 자들 가운데서 처음 나신 분
  alternatives_korean:
  - 죽은 자의 처음 난 자
  lexicon: BDAG
  rationale: '부활을 통한 신적 장자권을 한국어로 자연스럽게 풀되, 「처음 나신 분」으로 어휘적 무게를 보존.'
