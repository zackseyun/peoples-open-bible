  yaml_path: translation/ot/1_samuel/026/021.yaml
  text: Then Saul said[a], “I have sinned. Return, my son David, for I will not do you harm again, because my life was precious in your eyes this day. Look[b], I have acted foolishly and have gone very far astray.”
