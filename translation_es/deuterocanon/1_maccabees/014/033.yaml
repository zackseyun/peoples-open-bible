translation:
  language: es
  text: Y fortificó las ciudades de Judea y a Bet-Sur, la que está en los límites de Judea, donde antes habían estado las armas de los enemigos, y puso allí una guarnición de hombres judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'judeanos'. El griego Ἰουδαίους puede referirse aquí a identidad étnico-religiosa ('judíos') o regional ('judeanos').
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠχύρωσεν
  english_pob_choice: fortified
  chosen_spanish: fortificó
  alternatives_spanish:
  - fortaleció
  - hizo seguras
  lexicon: LSJ
  rationale: El verbo indica hacer más fuerte un lugar con obras defensivas o preparación militar. En español, 'fortificó' conserva de manera natural ese valor militar y urbano.
- source_word: πόλεις
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - villas
  lexicon: LSJ
  rationale: El término designa centros urbanos; 'ciudades' es la equivalencia más directa y adecuada al contexto administrativo y militar.
- source_word: Βαιθσουρὰμ
  english_pob_choice: Bethsura
  chosen_spanish: Bet-Sur
  alternatives_spanish:
  - Bethsura
  - Betzur
  lexicon: transliteration
  rationale: Se adopta una transliteración española clara y reconocible del topónimo, cercana a la forma griega pero más natural en español bíblico.
- source_word: ἐπὶ τῶν ὁρίων
  english_pob_choice: on the borders
  chosen_spanish: en los límites
  alternatives_spanish:
  - en las fronteras
  - sobre los bordes
  lexicon: LSJ
  rationale: La frase sitúa Bet-Sur en la zona limítrofe de Judea. 'En los límites' conserva el sentido espacial de frontera o colindancia con un giro natural en español.
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - armas de guerra
  lexicon: LSJ
  rationale: En este contexto militar, 'armas' reproduce bien el sentido de equipo bélico previamente presente en el lugar.
- source_word: πολεμίων
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - fuerzas enemigas
  - adversarios
  lexicon: LSJ
  rationale: La referencia es a quienes poseían las armas antes; 'enemigos' es la traducción más directa y transparente.
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - primeramente
  lexicon: LSJ
  rationale: Marca una condición previa. 'Antes' es más natural en español narrativo y preserva el contraste temporal.
- source_word: ἔθετο
  english_pob_choice: stationed
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - estableció
  lexicon: LSJ
  rationale: Con φρουράν, el verbo puede expresarse de forma idiomática como 'puso' una guarnición; el español comunica la acción sin forzar una perífrasis excesiva.
- source_word: φρουρὰν
  english_pob_choice: a garrison
  chosen_spanish: una guarnición
  alternatives_spanish:
  - una guardia
  - una fuerza de vigilancia
  lexicon: LSJ
  rationale: El sustantivo designa una fuerza militar destinada a custodiar un lugar; 'guarnición' es el término español más exacto.
- source_word: ἄνδρας Ἰουδαίους
  english_pob_choice: Jewish men
  chosen_spanish: hombres judíos
  alternatives_spanish:
  - hombres judeanos
  - judíos varones
  lexicon: LSJ
  rationale: Se conserva la fuerza masculina explícita de ἄνδρας y se opta por 'judíos' como equivalente natural del etnónimo, manteniendo abierta la alternativa regional 'judeanos' en la nota.
theological_decisions:
- issue: 'Ἰουδαίας / Ἰουδαίους: Judea / Jewish men frente a Judean men'
  english_pob_reading: Judea / Jewish men
  chosen_spanish_reading: Judea / hombres judíos
  alternative_spanish_readings:
  - Judea / hombres judeanos
  rationale: Para el lugar, 'Judea' es claro. Para Ἰουδαίους, el griego puede señalar identidad étnico-religiosa o regional. El texto enfatiza que la guarnición está compuesta por varones locales; en español, 'hombres judíos' sigue la lectura más extendida sin borrar la alternativa regional documentada.
  doctrine_reference: Principio POB de decisiones léxicas auditables y preservación de alternativas significativas
translation_notes:
  revision_awareness: El testimonio auditado indica alta concordancia y sin cambios necesarios en la revisión más reciente; esta versión española sigue esa línea estable, adaptando solo la formulación al español natural y manteniendo la alternativa lexical documentada para Ἰουδαίους.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Bet-Sur'' se usa de modo consistente como transliteración española del topónimo Βαιθσουράμ.'
  - Se conserva la distinción entre la ciudad/territorio de 'Judea' y la etnicidad de 'judíos' sin sustituirla por un término más genérico.
