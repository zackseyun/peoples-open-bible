id: ROM.3.3
reference: Romans 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τί γάρ; εἰ ἠπίστησάν τινες, μὴ ἡ ἀπιστία αὐτῶν τὴν πίστιν τοῦ θεοῦ καταργήσει;
base_translation:
  language: en
  yaml_path: translation/nt/romans/003/003.yaml
  text: What then? If some were unfaithful[a], will their unfaithfulness nullify God's faithfulness?
  footnotes:
  - marker: a
    text: Or 'God's faith.' The Greek phrase is literally 'the faith of God,' but here likely means God's faithfulness.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러면 무엇입니까? 어떤 자들이 신실하지 못했다면, 그들의 불신실함이 하나님의 신실하심을 무효화하겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠπίστησαν
  english_pob_choice: were unfaithful
  chosen_korean: 신실하지 못했다
  alternatives_korean:
  - 믿지 않았다
  - 불신실했다
  lexicon: BDAG
  rationale: 문맥상 언약 신실성(πίστις τοῦ θεοῦ)의 대조이므로 「신실하지 못함」을 택한다.
- source_word: τὴν πίστιν τοῦ θεοῦ
  english_pob_choice: God's faithfulness
  chosen_korean: 하나님의 신실하심
  alternatives_korean:
  - 하나님의 믿음
  - 하나님의 진실하심
  lexicon: BDAG
  rationale: 속격을 주격적으로 읽고 πίστις를 「신실하심」(언약적 충실성)으로 옮긴다. 용어집의 단서 조항에 부합.
theological_decisions:
- issue: 3:3의 πίστις τοῦ θεοῦ를 「신실하심」으로 옮김
  chosen_reading: 하나님의 신실하심
  alternative_readings:
  - 하나님의 믿음
  - 하나님의 진리
  rationale: 문맥상 인간의 ἀπιστία와 대조되므로 πίστις는 「믿음」보다 「신실함/충실성」으로 읽는 것이 본문 의도에 맞다. 용어집의 πίστις→「믿음」 기본값에 대한 정당화된 예외이다.
  doctrine_reference: DOCTRINE.md §1 — author's meaning over default; glossary note on πίστις
