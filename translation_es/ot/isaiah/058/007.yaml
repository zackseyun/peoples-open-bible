  language: en
  yaml_path: translation/ot/isaiah/058/007.yaml
  text: Is it not to share your bread with the hungry[a], and bring the poor who are cast out into your house? When you see the naked, to cover him[b], and not hide yourself from your own flesh?
  footnotes:
