translation:
  language: es
  text: Y lo presentará delante de Yahvé y hará expiación por ella, y ella será purificada del manantial[a] de su sangre. Esta es la ley de la mujer que da a luz, ya sea a un varón o a una hembra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de la fuente de su sangre'. El hebreo dice literalmente 'del manantial/fuente de su sangre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיבוֹ
  english_pob_choice: he shall present it
  chosen_spanish: lo presentará
  alternatives_spanish:
  - lo ofrecerá
  - lo traerá
  lexicon: HALOT
  rationale: El הִפְעִיל de קרב en contexto ritual indica traer/presentar la ofrenda ante Yahvé. 'Presentará' conserva la acción cultual sin imponer más que el texto.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' conforme al criterio POB en español, y 'delante de' expresa bien la fórmula cultual de comparecer ante él.
- source_word: וְכִפֶּר עָלֶיהָ
  english_pob_choice: and make atonement for her
  chosen_spanish: hará expiación por ella
  alternatives_spanish:
  - hará expiación por ella y la purificará
  - hará reparación por ella
  lexicon: HALOT
  rationale: כפר en el marco sacerdotal se rinde mejor como 'hacer expiación'. 'Por ella' mantiene el objeto personal femenino del hebreo.
- source_word: וְטָהֲרָה
  english_pob_choice: and she shall be cleansed
  chosen_spanish: y ella será purificada
  alternatives_spanish:
  - y quedará limpia
  - y será limpiada
  lexicon: HALOT
  rationale: 'El perfecto con waw expresa el resultado ritual: pasa a estado puro. ''Será purificada'' mantiene la voz pasiva y el registro formal.'
- source_word: מִמְּקֹר דָּמֶיהָ
  english_pob_choice: from the source of her blood
  chosen_spanish: del manantial[a] de su sangre
  alternatives_spanish:
  - de la fuente de su sangre
  - del origen de su sangre
  - de su flujo de sangre
  lexicon: HALOT
  rationale: מָקוֹר significa literalmente 'fuente, manantial'. 'Manantial' preserva la imagen hebrea; se evita 'flujo' como más interpretativo, aunque la nota reconoce la alternativa literal/explicativa.
- source_word: זֹאת תּוֹרַת
  english_pob_choice: This is the law for
  chosen_spanish: Esta es la ley de
  alternatives_spanish:
  - Esta es la instrucción de
  - Esta es la norma de
  lexicon: HALOT
  rationale: En la fórmula levítica, תּוֹרָה funciona como 'ley' o 'norma' ritual. 'Ley de' suena natural en español bíblico y sigue la función regulativa del hebreo.
- source_word: הַיֹּלֶדֶת
  english_pob_choice: the woman who gives birth
  chosen_spanish: la mujer que da a luz
  alternatives_spanish:
  - la parturienta
  - la mujer que ha dado a luz
  lexicon: HALOT
  rationale: El participio designa a la mujer en relación con el parto. 'Da a luz' es claro, digno y no añade matices clínicos innecesarios.
- source_word: לַזָּכָר אֹו לַנְּקֵבָה
  english_pob_choice: whether to a male or to a female
  chosen_spanish: sea varón o hembra
  alternatives_spanish:
  - sea macho o hembra
  - sea niño o niña
  - sea hijo o hija
  lexicon: HALOT
  rationale: Se conservan los términos de sexo del hebreo. 'Varón o hembra' es fiel y formal; evita sustituirlos por 'hijo/hija', que sería más interpretativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. En el proyecto español POB se prefiere 'Yahvé' como forma principal, sin ocultar el nombre divino tras 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: כפר en contexto sacrificial/purificatorio
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - hacer reconciliación sacrificial
  rationale: '''Hacer expiación'' conserva el peso ritual y sacerdotal del verbo sin reducirlo a una sola teoría. La purificación del estado impuro queda expresada en la segunda mitad del versículo.'
  doctrine_reference: Levítico / lenguaje expiatorio sacerdotal
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: mantener el resultado pasivo ritual (''ser purificada/será purificada'') y conservar la fórmula cultual completa con el nombre divino en forma transliterada. La nota lexical para מָקוֹר se ancla explícitamente en el término español elegido.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה conforme al estándar del proyecto.
  - '''Expiación'' se usó como término técnico sacerdotal, sin sustituirlo por una paráfrasis teológica.'
  - '''Varón o hembra'' reproduce el contraste sexual formal del hebreo.'
  - La nota al pie está anclada correctamente en 'manantial[a]' y ofrece la alternativa literal reconocida por el audit trail.
