  yaml_path: translation/nt/revelation/011/019.yaml
  text: 'And the temple of God in heaven was opened[a], and the ark of his covenant was seen in his temple[c][b]; and there were flashes of lightning and voices and peals of thunder and an earthquake and great hail.'
  footnotes:
  - marker: a
    text: Or 'sanctuary' for 'temple' (Greek ναός), emphasizing the inner holy dwelling rather than the broader temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ark of the covenant'; the Greek explicitly says 'his covenant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sounds' or 'rumblings' for 'voices'; Revelation often uses this theophanic expression in scenes of divine majesty and judgment.
    reason: lexical_alternative
