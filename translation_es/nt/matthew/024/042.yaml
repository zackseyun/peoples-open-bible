translation:
  language: es
  text: Así que manténganse despiertos[a], porque no saben en qué día viene su Señor[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manténganse vigilantes» o «estén alerta».
    reason: lexical_alternative
  - marker: b
    text: O «en cuál día».
    reason: lexical_alternative
  - marker: c
    text: O «su Señor viene» o «su Señor vendrá». El griego usa una forma verbal en presente.
    reason: alternative_reading
lexical_decisions:
- source_word: γρηγορεῖτε
  english_pob_choice: stay awake
  chosen_spanish: manténganse despiertos
  alternatives_spanish:
  - estén alerta
  - velen
  - manténganse vigilantes
  lexicon: BDAG
  rationale: El imperativo plural presente pide vigilancia continua. «Manténganse despiertos» conserva la imagen de la vigilia y suena natural en español actual, sin perder la fuerza exhortativa.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia a partir de la enseñanza previa. «Así que» comunica bien la consecuencia en español contemporáneo y mantiene el tono discursivo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del mandato. «Porque» es la opción más directa y clara en español moderno.
- source_word: οὐκ οἴδατε
  english_pob_choice: you do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no saben con certeza
  lexicon: BDAG
  rationale: El verbo de conocimiento negado se expresa de manera sencilla y fiel. Se mantiene sin ampliación explicativa que el griego no exige.
- source_word: ποίᾳ ἡμέρᾳ
  english_pob_choice: on what day
  chosen_spanish: en qué día
  alternatives_spanish:
  - en cuál día
  - qué día
  lexicon: BDAG
  rationale: La frase temporal en dativo se traduce de forma natural en español con «en qué día», preservando la especificidad del día desconocido.
- source_word: ὁ κύριος ὑμῶν
  english_pob_choice: your Lord
  chosen_spanish: su Señor
  alternatives_spanish:
  - vuestro Señor
  - el Señor de ustedes
  lexicon: BDAG
  rationale: «Señor» conserva el título cristológico de κύριος. Se usa «su» como tratamiento reverente y ampliamente comprensible en español neutro; «vuestro» sonaría regional o menos neutral.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - vendrá
  - llega
  lexicon: BDAG
  rationale: El presente griego en contexto escatológico mantiene vivacidad e inmediatez. «Viene» conserva ese presente sin forzar una perífrasis menos natural en español.
theological_decisions:
- issue: Fuerza del presente escatológico ἔρχεται
  english_pob_reading: Render with a present-progressive English form ('is coming') to preserve the vivid, imminent force without overstating timing.
  chosen_spanish_reading: 'Traducir con presente simple: «viene», para conservar la vivacidad del presente griego sin fijar cronología que el texto no explicita.'
  alternative_spanish_readings:
  - está viniendo
  - vendrá
  rationale: En español, el presente simple expresa bien la escena viva y futura del griego en contexto profético. Se evita el futuro, que puede sonar más resolutivo de lo que el texto permite, y también una perífrasis que suene innecesariamente marcada.
  doctrine_reference: Preservar la tensión escatológica sin resolverla.
translation_notes:
  revision_awareness: El expediente inglés no requirió revisiones posteriores; la traducción española sigue la lectura confirmada de alta concordancia y mantiene las decisiones léxicas y teológicas principales del audit trail.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος, conforme al valor cristológico del pasaje.
  - «Manténganse despiertos» refleja la metáfora de vigilancia sin sustituirla por una paráfrasis más abstracta.
  - La puntuación separa claramente la exhortación y la causa, en línea con οὖν + ὅτι.
