translation:
  language: es
  text: Allí está Edom, sus reyes y todos sus príncipes, que fueron puestos entre los muertos por la espada, a pesar de su poder[a]. Yacen con los incircuncisos y con los que descienden al pozo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con su poder» o «en su poder»; el hebreo puede leerse de forma más literal, pero el contexto destaca la ironía de que su fuerza no impidió su caída.'
    reason: lexical_alternative
  - marker: b
    text: «Pozo» es una imagen hebrea común para el reino de los muertos o la tumba.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמָּה
  english_pob_choice: There is
  chosen_spanish: Allí está
  alternatives_spanish:
  - Allí
  - Allí hay
  lexicon: HALOT
  rationale: El adverbio deíctico introduce una presencia en la escena de la muerte; «Allí está» conserva la ubicación y suena natural en español.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: מְלָכֶיהָ
  english_pob_choice: her kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - los reyes de ella
  lexicon: HALOT
  rationale: El sufijo posesivo femenino se refiere a Edom como entidad nacional; en español, «sus reyes» mantiene la referencia sin forzar la personificación.
- source_word: וְכָל נְשִׂיאֶיהָ
  english_pob_choice: and all her princes
  chosen_spanish: y todos sus príncipes
  alternatives_spanish:
  - y todos sus jefes
  - y todos sus líderes
  lexicon: HALOT
  rationale: «Príncipes» conserva el registro elevado y político del hebreo, en paralelo con «reyes».
- source_word: אֲשֶׁר נִתְּנוּ
  english_pob_choice: who were laid
  chosen_spanish: que fueron puestos
  alternatives_spanish:
  - que fueron colocados
  - que fueron entregados
  lexicon: HALOT
  rationale: El nifal de נתן aquí es pasivo; «fueron puestos» refleja bien la idea de ser colocados entre los muertos sin añadir interpretación innecesaria.
- source_word: בִּגְבוּרָתָם
  english_pob_choice: despite their might
  chosen_spanish: a pesar de su poder
  alternatives_spanish:
  - con su poder
  - en su poder
  - por su poder
  lexicon: HALOT
  rationale: 'La frase conserva el matiz irónico del contexto: su poder no evitó su caída. «Poder» es una opción natural en español para el campo semántico de גבורה cuando el contexto resalta fuerza/valentía.'
- source_word: אֶת חַלְלֵי חָרֶב
  english_pob_choice: among those slain by the sword
  chosen_spanish: entre los muertos a espada
  alternatives_spanish:
  - entre los caídos a espada
  - entre los heridos de espada
  lexicon: HALOT
  rationale: La construcción señala asociación con los caídos violentamente; «muertos a espada» comunica con claridad la expresión idiomática hebrea.
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Ellos mismos
  lexicon: HALOT
  rationale: El pronombre resumptivo se puede expresar de forma simple con «Ellos» para mantener fluidez.
- source_word: עֲרֵלִים
  english_pob_choice: the uncircumcised
  chosen_spanish: los incircuncisos
  alternatives_spanish:
  - los no circuncidados
  lexicon: HALOT
  rationale: Se preserva el término covenantal de modo literal, porque en Ezequiel tiene carga de vergüenza y juicio; «incircuncisos» mantiene esa fuerza mejor que una paráfrasis.
- source_word: יִשְׁכָּבוּ
  english_pob_choice: lie
  chosen_spanish: yacen
  alternatives_spanish:
  - yacerán
  - están tendidos
  lexicon: HALOT
  rationale: En la escena visionaria del sepulcro, el imperfecto describe estado; «yacen» es natural y conserva la imagen de reposo mortuorio.
- source_word: וְאֶת יֹרְדֵי בֽוֹר
  english_pob_choice: and with those who go down to the pit
  chosen_spanish: y con los que descienden al pozo
  alternatives_spanish:
  - y con los que bajan al pozo
  - y con los que van al pozo
  lexicon: HALOT
  rationale: «Pozo» preserva la metáfora hebrea y el eco profético de la región de los muertos; «descienden» reproduce bien el movimiento de descenso.
theological_decisions:
- issue: Sentido de עֲרֵלִים en un oráculo de juicio
  english_pob_reading: Retain the covenantal term literally as 'the uncircumcised' rather than paraphrasing it as merely 'the dishonored dead' or 'the nations'.
  chosen_spanish_reading: Conservar «los incircuncisos» de forma literal en vez de diluirlo en «los deshonrados» o «las naciones».
  alternative_spanish_readings:
  - los deshonrados
  - las naciones
  rationale: El término tiene peso teológico y retórico en Ezequiel; una traducción literal preserva la tensión del juicio y la vergüenza pactal sin resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica; consistencia terminológica o excepción documentada.
translation_notes:
  revision_awareness: 'El español sigue el último pase de revisión del POB inglés: la expresión concesiva se mantiene unida al final de la cláusula («a pesar de su poder») para evitar sugerir una lectura más fuerte de la que exige el hebreo, y se conserva el paralelismo final con «los incircuncisos» y «los que descienden al pozo».'
  spanish_consistency_notes:
  - Se mantiene «Edom» como nombre propio sin adaptar.
  - Se conserva «incircuncisos» para reflejar la carga pactal del término.
  - «Pozo» se usa como imagen sepulcral consistente con el registro profético.
  - La puntuación separa las dos cláusulas para reflejar el paralelo poético del hebreo.
