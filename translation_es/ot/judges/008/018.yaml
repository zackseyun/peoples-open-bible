translation_notes:
  revision_awareness: El audit trail inglés indica una sola nota cultural para «Tabor» y ninguna revisión aplicada; el griego/hebreo no introducen variantes textuales relevantes. La versión española conserva la estructura narrativa y la comparación elíptica con una redacción natural, sin añadir interpretaciones doctrinales o expansiones geográficas en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo «Zebaj» y «Zalmuna» como transliteraciones consistentes con el hebreo propio.
  - Se eligió «hombres» para הָאֲנָשִׁים por su fuerza léxica y coherencia con el contexto de varones muertos.
  - La comparación final conserva la literalidad suficiente («Como tú, así eran ellos») para no perder la tensión descriptiva del hebreo.
  - «Hijos de un rey» mantiene el giro idiomático y evita sustituirlo por «príncipes», que sería más interpretativo.
