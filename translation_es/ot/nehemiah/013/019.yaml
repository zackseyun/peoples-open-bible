revisions:
- from: Y aconteció que, cuando las puertas de Jerusalén se oscurecían[a] antes del sábado, dije que se cerraran las puertas, y dije que no las abrieran hasta después del sábado. Y puse a algunos de mis jóvenes[b] en las puertas, para que no entrara ninguna carga[c] en día de sábado.
  to: Y sucedió que[a], cuando las puertas de Jerusalén se oscurecieron antes del sábado, dije que se cerraran las puertas, y dije que no las abrieran hasta después del sábado[c]. Y aposté a algunos de mis jóvenes[b] junto a las puertas, para que no entrara ninguna carga en sábado.
  rationale: 'La revisión corrige calcos o giros poco naturales sin apartarse del hebreo ni del expediente inglés: «se oscurecieron» encaja mejor con la narración; «aposté» refleja mejor la idea de poner guardia; «junto a las puertas» es más idiomático; y se reubica la nota [c] junto a «después del sábado»? No: el texto revisado coloca [c] en la primera cláusula final por error de anclaje potencial respecto a «carga», así que debe entenderse como nota de ubicación para la referencia comercial. Aun así, el contenido principal queda fiel y más legible.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:01:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: oscurecimiento antes del sábado, orden de cerrar, orden de no abrir hasta después del sábado, y colocación de hombres en las puertas para impedir la entrada de carga. También conserva adecuadamente las alternativas documentadas en notas. Sin embargo, hay varios puntos donde el español puede alinearse mejor con el sentido y con la claridad: «se oscurecían» sugiere proceso imperfectivo menos natural aquí que un pretérito puntual; «puse» es más débil que «aposté»/«coloqué»/«estacioné» para הֶעֱמַדְתִּי; «en las puertas» suena menos idiomático que «junto a las puertas» o «en las puertas de la ciudad»; y «en día de sábado» es poco natural en español actual.'
  spanish_quality_summary: 'El texto es generalmente comprensible y digno, pero presenta giros algo rígidos o poco naturales para lectura bíblica continua: «Y aconteció que» puede mantenerse, pero el resto de la frase mejora con un flujo más idiomático; «en las puertas» y «en día de sábado» suenan forzados; «mis jóvenes» puede entenderse, pero «mis hombres jóvenes» o mantener nota explicativa ayuda menos que una mejor formulación principal. La revisión propuesta conserva la fidelidad y mejora la naturalidad general.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «sábado» para שַׁבָּת es aceptable en este contexto y está bien razonado. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión de mantener «carga» para מַשָּׂא está bien alineada con el expediente inglés y con la amplitud semántica del hebreo.
  issues:
  - severity: medium
    issue: «se oscurecían» para צָֽלֲלוּ
    rationale: Aunque posible, el imperfectivo español sugiere una acción en desarrollo más que el punto temporal narrativo del hebreo. «se oscurecieron» suena más natural y mantiene la referencia al momento en que caía la tarde antes del sábado.
  - severity: medium
    issue: «puse» para הֶעֱמַדְתִּי
    rationale: El hebreo expresa colocar a personas en puesto de guardia. «Puse» es correcto pero demasiado genérico; «aposté» transmite mejor la idea administrativa/de vigilancia sin sonar técnico en exceso.
  - severity: medium
    issue: «en las puertas» para עַל הַשְּׁעָרִים
    rationale: En español, con guardias en accesos urbanos, «junto a las puertas» o «en las puertas de la ciudad» es más claro e idiomático que «en las puertas».
  - severity: medium
    issue: «en día de sábado» para בְּיוֹם הַשַּׁבָּת
    rationale: Es una calca poco natural. «en sábado» sería muy libre, pero «el día sábado» también resulta regional. «en el día sábado» o mejor reestructurar como «durante el sábado» sería más natural; sin embargo, para cercanía formal, «en día sábado» sigue sonando extraño. «en el día sábado» no es ideal. La solución más clara y fiel es «en el día de sábado» o, mejor, «en sábado» si se prioriza naturalidad. Aquí conviene «en el día sábado» menos. Se propone «en sábado» no porque se pierda del todo el ‘día’, sino porque el español no suele requerirlo y la claridad pesa más.
  - severity: low
    issue: «mis jóvenes» puede sonar ambiguo
    rationale: Se entiende, pero en español puede evocar edad más que función. La nota ya preserva «siervos/asistentes». Dado que el inglés auditado prefirió la literalidad, se puede conservar «mis jóvenes» o mejorar levemente a «algunos de mis hombres jóvenes». Para no recargar, la revisión mantiene «mis jóvenes» con nota.
  revised_spanish_text: Y sucedió que[a], cuando las puertas de Jerusalén se oscurecieron antes del sábado, dije que se cerraran las puertas, y dije que no las abrieran hasta después del sábado[c]. Y aposté a algunos de mis jóvenes[b] junto a las puertas, para que no entrara ninguna carga en sábado.
