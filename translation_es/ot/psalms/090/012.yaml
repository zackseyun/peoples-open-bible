translation:
  language: es
  text: Enséñanos a contar nuestros días[a], para que alcancemos un corazón de sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''Enséñanos así a contar nuestros días, y traeremos un corazón de sabiduría''. El hebreo de la cláusula final es difícil; muchos lo entienden como ''para que alcancemos un corazón de sabiduría''.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִמְנוֹת
  english_pob_choice: to number
  chosen_spanish: contar
  alternatives_spanish:
  - numerar
  - computar
  lexicon: HALOT
  rationale: El infinitivo denota la acción concreta de contar o enumerar. 'Contar' es natural en español y conserva la imagen sin volverla más abstracta de lo necesario.
- source_word: יָמֵינוּ
  english_pob_choice: our days
  chosen_spanish: nuestros días
  alternatives_spanish:
  - los días de nuestra vida
  - nuestra vida
  lexicon: HALOT
  rationale: El sufijo de primera persona plural exige una referencia posesiva directa. 'Nuestros días' mantiene la brevedad y la referencia a la duración limitada de la vida humana.
- source_word: הוֹדַע
  english_pob_choice: teach us
  chosen_spanish: enséñanos
  alternatives_spanish:
  - haznos saber
  - haznos conocer
  lexicon: HALOT
  rationale: El causativo de ידע expresa hacer conocer o instruir. 'Enséñanos' comunica bien la petición dirigida a Dios en español y conserva el sentido causativo de instrucción.
- source_word: וְנָבִא
  english_pob_choice: that we may gain
  chosen_spanish: para que alcancemos
  alternatives_spanish:
  - y traeremos
  - para que traigamos
  - y obtengamos
  lexicon: HALOT
  rationale: La cláusula final es sintácticamente difícil. 'Alcancemos' expresa de modo natural la idea de llegar a poseer o adquirir un resultado interior, sin forzar una solución demasiado cerrada.
- source_word: לְבַב חָכְמָה
  english_pob_choice: a heart of wisdom
  chosen_spanish: un corazón de sabiduría
  alternatives_spanish:
  - un corazón sabio
  - un corazón lleno de sabiduría
  lexicon: HALOT
  rationale: La construcción literal es 'corazón de sabiduría'. 'Corazón de sabiduría' preserva el valor antropológico del hebreo para el centro interior de la persona.
theological_decisions:
- issue: Sentido de la segunda mitad del versículo
  english_pob_reading: The verse asks God to teach proper awareness of life's brevity so that the worshipers may gain an inward disposition shaped by wisdom.
  chosen_spanish_reading: El versículo pide a Dios que nos enseñe a contar nuestros días, con el resultado de alcanzar un interior moldeado por la sabiduría.
  alternative_spanish_readings:
  - para que traigamos un corazón de sabiduría
  - y traeremos un corazón de sabiduría
  rationale: El hebreo permite más de una relación sintáctica entre las cláusulas finales. La elección mantiene la tensión sin resolverla en exceso y sigue la lectura devocional y sapiencial del contexto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la ubicación del marcador de nota al incluir [a] exactamente en el texto español. La redacción evita añadir 'así' porque no está explícito en la forma final elegida, pero conserva la nota alternativa documentada para la cláusula final difícil.
  spanish_consistency_notes:
  - Se prefirió 'enséñanos' para el causativo de ידע, en lugar de una paráfrasis más larga.
  - '''Corazón'' conserva el antropologismo hebreo para el centro interior de la persona.'
  - No se introdujo 'Yahvé' porque el verso no contiene el nombre divino ni una forma equivalente en el texto hebreo dado.
  - La nota al pie marca correctamente la alternativa textual/sintáctica y está anclada al texto principal.
