    text: 'O, más literalmente: «Traigan sus cuellos al yugo del rey de Babilonia».'
    reason: lexical_alternative
  - marker: b
    text: '«Y vivan» también puede entenderse con sentido consecuencial: «y vivirán» o «para que vivan».'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y corrección del español: ''sirvan a él'' se cambió por ''sírvanle a él'', que mantiene el referente explícito y lee con más fluidez. También se ancló correctamente la nota [b] en ''vivan'', ya que en el borrador la nota existía pero no aparecía en el texto. El resto del versículo conserva fielmente el sentido y las decisiones léxicas del original y del POB inglés.'
