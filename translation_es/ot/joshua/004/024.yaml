translation:
  language: es
  text: para que todos los pueblos de la tierra[a] sepan que la mano de Yahvé es fuerte, y para que ustedes teman[b] a Yahvé su Dios todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los pueblos del país», si הָאָרֶץ se toma en un sentido más local que global.'
    reason: alternative_reading
  - marker: b
    text: «Teman» aquí incluye reverencia y asombro ante Yahvé, no solo terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la finalidad de ambas cláusulas sin perder el valor purposivo del hebreo.
- source_word: דַּעַת
  english_pob_choice: may know
  chosen_spanish: sepan
  alternatives_spanish:
  - lleguen a saber
  - conozcan
  lexicon: HALOT
  rationale: El infinitivo de finalidad se vierte mejor con un subjuntivo finito en español; 'sepan' conserva la intención de conocimiento resultante.
- source_word: כָּל עַמֵּי הָאָרֶץ
  english_pob_choice: all the peoples of the earth
  chosen_spanish: todos los pueblos de la tierra
  alternatives_spanish:
  - todos los pueblos del país
  - todas las naciones de la tierra
  lexicon: HALOT
  rationale: '''Pueblos'' refleja עַמֵּי; ''tierra'' mantiene la amplitud global preferida por la POB inglesa, aunque la alternativa local permanece posible.'
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - el poder de Yahvé
  - la mano de Yahveh
  lexicon: HALOT
  rationale: Se conserva el giro antropomórfico 'mano' en lugar de reducirlo a 'poder', siguiendo la decisión lexical auditada.
- source_word: חֲזָקָה
  english_pob_choice: is strong
  chosen_spanish: es fuerte
  alternatives_spanish:
  - es poderosa
  - es vigorosa
  lexicon: HALOT
  rationale: '''Fuerte'' es el equivalente más directo y natural de חזק aplicada a ''mano'', sin añadir matiz interpretativo.'
- source_word: יְרָאתֶם
  english_pob_choice: you may fear
  chosen_spanish: ustedes teman
  alternatives_spanish:
  - ustedes reverencien
  - ustedes estén llenos de temor reverente
  lexicon: HALOT
  rationale: '''Teman'' preserva la fuerza del verbo ירא; el matiz de reverencia queda implícito y se explicita mejor en nota que en el texto principal.'
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios (Yahvé)
  lexicon: HALOT
  rationale: En español litúrgico claro, 'su Dios' fluye mejor en una exhortación directa; el referente singular queda claro por el contexto de Yahvé.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días
  - siempre
  lexicon: HALOT
  rationale: La expresión idiomática comunica duración de toda la vida; 'sus días' conserva el valor personal y covenantal del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el Nombre divino en español, evitando el ocultamiento con 'SEÑOR'.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: all the peoples of the earth
  chosen_spanish_reading: todos los pueblos de la tierra
  alternative_spanish_readings:
  - todos los pueblos del país
  - todos los pueblos de la región
  rationale: La audiencia universal es coherente con la demostración pública del poder de Yahvé; aun así, el hebreo permite una lectura más local, que se deja disponible en nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2'
- issue: Matiz de ירא
  english_pob_reading: fear, including reverence and awe
  chosen_spanish_reading: teman
  alternative_spanish_readings:
  - reverencien
  - sientan reverencia y temor
  rationale: '''Temer'' conserva la tensión bíblica entre reverencia y temor real, evitando suavizar el verbo más de lo que el texto exige; el matiz reverencial se aclara en nota.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Rendición del Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene la forma confesional y auditable del Nombre divino sin sustituirla por un título genérico; esto sigue la terminología del proyecto para יְהוָה.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El auditor inglés no propuso cambios sustanciales en la última revisión; se conserva la decisión central de traducir יְהוָה como Yahweh/Yahvé y de mantener el giro «la mano ... es fuerte». La única tensión menor es el alcance de הָאָרֶץ, que en español se mantiene con «tierra» y se documenta con nota como alternativa local.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se conserva el antropomorfismo 'mano' en lugar de 'poder' para no aplanar la imagen hebrea.
  - '''Teman'' preserva el verbo fuerte ירא; la nota aclara que incluye reverencia y temor.'
  - '''Tierra'' en español corresponde a la lectura global preferida, mientras la nota retiene la alternativa local.'
  - La segunda persona plural 'ustedes' evita ambigüedad en un mandato colectivo en español moderno.
