lexical_decisions:
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  - los cantores del templo
  lexicon: HALOT
  rationale: El sustantivo participial hebreo designa a quienes cantan. En español, "cantores" conserva mejor el valor de oficio o grupo litúrgico que "cantantes", que puede sonar más general o moderno. "Músicos" sería demasiado amplio, y "del templo" añade una precisión no explicitada en este versículo aislado.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En listas genealógicas o de clanes, בְּנֵי introduce una filiación/grupo. "Los hijos de" preserva la estructura formal del hebreo y es natural en español bíblico. "Descendientes" suaviza la forma, pero pierde la correspondencia más directa.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asafo
  lexicon: uso estándar de nombres propios bíblicos en español
  rationale: 'Se translitera el nombre propio según la forma habitual en español bíblico: "Asaf". "Asafo" no es la forma usual y no aporta ventaja de claridad.'
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: one hundred twenty-eight
  chosen_spanish: ciento veintiocho
  alternatives_spanish:
  - ciento veintiocho
  - ciento y veintiocho
  lexicon: HALOT
  rationale: El hebreo expresa 100 + 20 + 8 de forma directa. "Ciento veintiocho" es la formulación clara y estándar en español moderno, sin necesidad del "y".
theological_decisions:
- issue: Uso de una forma genealógica/grupal en "los hijos de"
  english_pob_reading: the sons of
  chosen_spanish_reading: los hijos de
  alternative_spanish_readings:
  - los descendientes de
  - la casa de
  rationale: La cuestión es de registro y forma de lista, no doctrinal. Se conserva la fórmula de pertenencia/clan propia del hebreo, sin convertirla en una paráfrasis más interpretativa.
  doctrine_reference: Ninguna; decisión de forma literaria y genealógica.
