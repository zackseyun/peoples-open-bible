review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido general del hebreo: el salmista se deleita en hacer la voluntad de Dios y afirma que la torá de Dios está en su interior. Sin embargo, se aparta innecesariamente del rastro auditado del POB inglés en un término clave: וְתוֹרָתְךָ fue elegido allí como ''your law'' con nota de alternativa ''your instruction''. En español, el borrador invierte esa relación al poner ''tu instrucción'' en el texto principal y además conserva una nota que repite la misma opción, lo que crea incoherencia con la decisión documentada y con la nota.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta un problema de nota al pie mal anclada semánticamente: la marca [a] aparece tras ''voluntad'' aunque la nota trata sobre torá/ley-instrucción. Además, ''dentro de mi ser interior'' suena algo redundante; ''en mi interior'' o ''dentro de mí'' sería más natural. ''Me deleito en hacer tu voluntad, mi Dios'' es correcto y fluido.'
  glossary_alignment: 'Buen alineamiento general con terminología POB: ''Dios'', ''voluntad'', y la interioridad de מֵעָי están bien resueltas. La principal desalineación es תּוֹרָה, donde por defecto y por la auditoría inglesa debe mantenerse ''ley'' en el texto principal, preservando ''instrucción'' como alternativa en nota. No hay otros choques con el glosario del proyecto.'
  issues:
  - severity: high
    issue: La traducción principal de תּוֹרָה como 'instrucción' contradice la decisión auditada del POB inglés ('law' con nota alternativa 'instruction').
    rationale: El encargo pide preservar el rastro lexical y teológico documentado salvo razón fuerte. Aquí no se justifica desplazar 'ley' del texto principal al margen; además la nota resultante se vuelve incoherente.
  - severity: high
    issue: La nota [a] está anclada a 'voluntad' pero su contenido se refiere a 'tu instrucción/tu ley'.
    rationale: Las notas deben marcar exactamente la palabra o frase relevante. Tal como está, induce al lector a pensar que la alternativa afecta a 'voluntad'.
  - severity: medium
    issue: '''Dentro de mi ser interior'' es redundante y menos natural en español.'
    rationale: '''Ser interior'' ya expresa interioridad; añadir ''dentro de'' recarga la frase. ''En mi interior'' conserva bien el sentido de בְּתוֹךְ מֵעָי y mejora la legibilidad.'
  revised_spanish_text: Me deleito en hacer tu voluntad, mi Dios, y tu ley[a] está en mi interior.
  revised_footnotes:
  - marker: a
    text: O "tu instrucción". El hebreo torá puede denotar la enseñanza de Dios en un sentido más amplio, no solo mandatos legales.
    reason: lexical_alternative
