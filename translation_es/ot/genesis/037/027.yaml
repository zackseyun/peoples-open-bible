translation:
  language: es
  text: «Vamos, vendámoslo a los ismaelitas, y no esté nuestra mano sobre él[a], porque es nuestro hermano, nuestra propia carne[b]». Y sus hermanos escucharon[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que nuestra mano no esté sobre él», un modismo que significa no hacerle daño directamente.'
    reason: lexical_alternative
  - marker: b
    text: O «nuestro propio pariente» para «nuestra propia carne».
    reason: lexical_alternative
  - marker: c
    text: «Escucharon» también puede entenderse como «accedieron» o «hicieron caso» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Vamos
  - Ven
  lexicon: HALOT
  rationale: El imperativo plural idiomático exhorta a actuar; «Venid» conserva el tono de llamado deliberativo y funciona bien en español bíblico sin volverse arcaizante en exceso.
- source_word: וְנִמְכְּרֶנּוּ
  english_pob_choice: let us sell him
  chosen_spanish: vendámoslo
  alternatives_spanish:
  - vendámoslo a él
  - y lo venderemos
  lexicon: HALOT
  rationale: La forma cohortativa expresa propuesta; el subjuntivo exhortativo español («vendámoslo») reproduce mejor esa fuerza volitiva que un futuro simple.
- source_word: לַיִּשְׁמְעֵאלִים
  english_pob_choice: to the Ishmaelites
  chosen_spanish: a los ismaelitas
  alternatives_spanish:
  - a los ismaelíes
  lexicon: HALOT
  rationale: Se conserva el etnónimo conocido y natural en español. El artículo plural refleja el grupo étnico del texto fuente.
- source_word: וְיָדֵנוּ אַל תְּהִי בוֹ
  english_pob_choice: and let not our hand be upon him
  chosen_spanish: y no esté nuestra mano sobre él
  alternatives_spanish:
  - y que no pongamos nuestra mano sobre él
  - y no lo dañemos
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de la mano como agente de daño, evitando sustituirla por una paráfrasis. El orden «no esté nuestra mano» sigue de cerca la estructura del hebreo y su registro formal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la propuesta; «porque» es la conexión causal más clara y natural en español.
- source_word: אָחִינוּ
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro propio hermano
  lexicon: HALOT
  rationale: Traslada directamente el parentesco sin suavizarlo. El texto apela a la relación fraterna como argumento moral.
- source_word: בְשָׂרֵנוּ
  english_pob_choice: our own flesh
  chosen_spanish: nuestra propia carne
  alternatives_spanish:
  - nuestra propia sangre
  - nuestro propio pariente
  lexicon: HALOT
  rationale: «Carne» mantiene la metáfora hebrea concreta de consanguinidad. Se añade «propia» para reflejar la intensificación posesiva del original y de la POB inglesa.
- source_word: וַיִּשְׁמְעוּ אֶחָיו
  english_pob_choice: And his brothers listened
  chosen_spanish: Y sus hermanos lo escucharon
  alternatives_spanish:
  - Y sus hermanos le hicieron caso
  - Y sus hermanos accedieron
  lexicon: HALOT
  rationale: שמע puede significar oír, escuchar o atender. «Lo escucharon» mantiene la ambigüedad narrativa sin cerrar indebidamente el sentido a «accedieron».
theological_decisions:
- issue: Sentido de «mano» en «no esté nuestra mano sobre él»
  english_pob_reading: Preserves the Hebrew idiom meaning not to harm him directly.
  chosen_spanish_reading: Se conserva la imagen de la mano como instrumento de daño, sin convertirla en una paráfrasis explícita.
  alternative_spanish_readings:
  - y no lo dañemos directamente
  - y no pongamos las manos sobre él
  rationale: El hebreo usa un modismo; la traducción española debe dejar visible esa tensión semántica. La formulación elegida es comprensible y mantiene el color del original.
  doctrine_reference: Hermenéutica bíblica; fidelidad al modismo hebreo
- issue: בְשָׂרֵנוּ como parentesco real y no mera metáfora
  english_pob_reading: our own flesh / our own kin
  chosen_spanish_reading: nuestra propia carne
  alternative_spanish_readings:
  - nuestro propio parentesco
  - nuestra propia sangre
  rationale: El término hebreo afirma relación de sangre/consanguinidad. «Carne» conserva el valor corporal y familiar del original; la alternativa «carne» mantiene mejor el eco bíblico que «pariente».
  doctrine_reference: Antropología bíblica y lenguaje de consanguinidad
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del inglés POB, que prefirió un orden más natural y formal en la cláusula idiomática («let not our hand be upon him») sin alterar el sentido del hebreo. La versión española conserva esa misma estrategia: mantener el modismo, pero con una sintaxis fluida y digna en español.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca en este versículo, sino porque el proyecto lo exige cuando corresponda; aquí no hay sustitución por nombre divino.
  - Se evitó «Cristo/Mesías» porque no hay término cristológico en el texto.
  - Se preservó la imagen concreta de «carne» en vez de neutralizarla como «pariente», para no borrar la tensión léxica del hebreo.
  - El cierre narrativo «Y sus hermanos lo escucharon» conserva la ambigüedad de שמע sin afirmar más de lo que el verso garantiza.
