    rationale: La glosa 'fortalezas de las fortalezas' y 'refugios/fuerzas' no suena tan clara ni tan cercana al razonamiento del POB inglés. Conviene simplificar hacia 'fortalezas fortificadas' / 'para las fortalezas de fortalezas' y explicar que la frase es compacta.
