translation:
  language: es
  text: hijo de hombre[a], pon tu rostro hacia Sidón, y profetiza contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser humano» o «mortal». El hebreo dice literalmente «hijo de hombre», una forma frecuente de dirigirse a Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el vocativo hebreo tradicional de Ezequiel y mantiene la repetición literaria del libro. En español, «Hijo de hombre» suena natural en este contexto profético y evita borrar la forma idiomática documentada por la tradición textual.
- source_word: שִׂים פָּנֶיךָ
  english_pob_choice: set your face
  chosen_spanish: pon tu rostro
  alternatives_spanish:
  - dirige tu rostro
  - fija tu rostro
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal concreto. «Pon tu rostro» conserva la imagen de orientar el rostro hacia un destino y resulta claro en español; «rostro» funciona mejor que «cara» en registro bíblico y evita una expresión demasiado coloquial.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - contra
  - a
  lexicon: HALOT
  rationale: En la construcción con el verbo de dirigir el rostro, la preposición expresa orientación espacial, no todavía hostilidad. «Hacia» reproduce esa dirección sin anticipar el valor adversativo de la cláusula siguiente.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidon
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del topónimo. Mantiene identificación inmediata para el lector en español.
- source_word: וְהִנָּבֵא
  english_pob_choice: and prophesy
  chosen_spanish: y profetiza
  alternatives_spanish:
  - y habla como profeta
  - y anuncia profecía
  lexicon: HALOT
  rationale: El imperativo niphal de נבא se rinde de manera directa con «profetiza». Es breve, preciso y conserva el mandato profético sin explicarlo en exceso.
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - acerca de ella
  - sobre ella
  lexicon: HALOT
  rationale: En contexto de juicio profético, על con נבא tiene fuerza adversativa. «Contra ella» preserva ese matiz y refleja que Sidón es personificada en femenino, como en el hebreo.
theological_decisions:
- issue: Valor de «Hijo de hombre» en Ezequiel
  english_pob_reading: Son of man as a human address to Ezekiel, not a messianic title here
  chosen_spanish_reading: «Hijo de hombre» como vocativo profético dirigido a Ezequiel, sin sentido mesiánico en este versículo
  alternative_spanish_readings:
  - «ser humano»
  - «mortal»
  rationale: La formulación conserva la tensión lexical del hebreo y la coherencia interna de Ezequiel. Traducirlo por un equivalente explicativo borraría la forma de dirección repetida en el libro y dificultaría el seguimiento del patrón literario.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave; mantener el valor literario y lexical cuando no hay necesidad contextual de paráfrasis.'
- issue: Relación entre la orientación y la hostilidad en la profecía
  english_pob_reading: set your face toward Sidon, and prophesy against her
  chosen_spanish_reading: «pon tu rostro hacia Sidón, y profetiza contra ella» mantiene la distinción entre orientación inicial y juicio posterior
  alternative_spanish_readings:
  - «pon tu rostro contra Sidón»
  - «dirígete contra Sidón»
  rationale: El hebreo separa la orientación del rostro del contenido adversativo de la profecía. Mantener esa distinción evita introducir hostilidad en la primera cláusula y respeta la progresión del mandato divino.
  doctrine_reference: 'DOCTRINE.md: fidelidad al detalle textual y a las relaciones semánticas del original.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al pasaje fuente; la redacción española mantiene la lectura auditada del original hebreo y del análisis inglés POB.'
  spanish_consistency_notes:
  - Se mantiene «Sidón» como topónimo castellano estándar.
  - Se conserva «Hijo de hombre» para reflejar el vocativo hebreo recurrente en Ezequiel.
  - «Contra ella» recoge la fuerza adversativa de על en contexto profético de juicio, sin desplazarla a la primera cláusula.
