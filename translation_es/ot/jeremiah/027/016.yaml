review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo: mantiene la doble introducción a sacerdotes y pueblo, la fórmula profética, la advertencia de no escuchar, los falsos profetas, los objetos de la casa de Yahvé, y la afirmación de falsedad. Sin embargo, hay varios desajustes de fidelidad y forma: לָכֶם se ha vertido repetidamente como «para ustedes», cuando aquí encaja mejor «a ustedes»; «ahora, pronto» debilita מְהֵרָה frente a una idea más inmediata como «rápidamente» o «muy pronto»; y la puntuación/cita en español necesita reparación. También hay un marcador de nota erróneo «[m]» que no corresponde a ninguna nota.'
  spanish_quality_summary: 'El español es comprensible, pero presenta problemas de naturalidad y corrección editorial: «son traídos de vuelta» suena calcado; «Miren» dentro de cita profética puede funcionar, pero «Miren»/«He aquí» depende del registro; y la secuencia completa de comillas y la colocación de «porque» dentro de la cita están torpes. Además, el marcador [m] es un error material. Una revisión menor produce un texto más claro, más idiomático y mejor puntuado sin apartarse del original.'
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «sacerdotes», «casa de Yahvé» y evita enmascarar el nombre divino. No hay conflicto doctrinal serio. La principal mejora terminológica es preferir «les profetizan / a ustedes» sobre «para ustedes» para reflejar mejor לָכֶם en este contexto discursivo.
  issues:
  - severity: high
    issue: Marcador de nota inválido «[m]» en el texto
    rationale: El borrador incluye «falsa[m]ente» pero no existe nota con marcador m. Esto incumple la disciplina requerida de notas y hace el texto inaceptable tal como está.
  - severity: medium
    issue: «para ustedes» debilita la dirección del discurso en הַנִּבְּאִים לָכֶם / נִבְּאִים לָכֶם
    rationale: En este contexto, los profetas hablan a los destinatarios; en español bíblico-natural, «les profetizan» o «profetizan a ustedes» refleja mejor la orientación del hebreo que «para ustedes».
  - severity: medium
    issue: «ahora, pronto» no preserva con suficiente fuerza עַתָּה מְהֵרָה
    rationale: El hebreo acumula inmediatez y rapidez. «Ahora, pronto» suena extraño y algo más débil; «ahora, rápidamente» o una nota con «muy pronto» conserva mejor la doble fuerza.
  - severity: low
    issue: «son traídos de vuelta» suena poco natural en español
    rationale: Aunque es fiel al pasivo, «están siendo devueltos» o «están siendo traídos de vuelta» suena más idiomático. Conviene mantener el matiz pasivo/causativo sin un calco rígido.
  - severity: low
    issue: Puntuación y anidación de comillas mejorables
    rationale: La cita interna y externa puede simplificarse para lectura fluida en español, manteniendo claramente que «Miren...» pertenece al discurso de los falsos profetas.
