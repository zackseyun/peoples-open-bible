translation:
  language: es
  text: Pero pronto algunos de los compañeros de Heliodoro instaban a Onías a invocar[a] al Altísimo y conceder la vida[b] al que yacía en su último aliento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamar al Altísimo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al que yacía en su último aliento», es decir, al borde de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταχὺ
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  lexicon: LSJ
  rationale: Adverbio de prontitud; 'pronto' comunica la rapidez de la acción en un español natural sin añadir una intensidad mayor que la del griego.
- source_word: τινες τῶν τῷ Ἡλιοδώρῳ συνηθῶν
  english_pob_choice: some of Heliodorus's companions
  chosen_spanish: algunos de los compañeros de Heliodoro
  alternatives_spanish:
  - algunos de los asociados de Heliodoro
  - algunos de los allegados de Heliodoro
  lexicon: LSJ
  rationale: La expresión señala personas vinculadas estrechamente con Heliodoro; 'compañeros' es idiomático y mantiene el valor narrativo del contexto.
- source_word: ἠξίουν
  english_pob_choice: were urging
  chosen_spanish: instaban
  alternatives_spanish:
  - pedían
  - rogaban
  - solicitaban
  lexicon: LSJ
  rationale: El imperfecto sugiere insistencia continua; 'instaban' transmite la presión persistente mejor que un simple 'pedían'.
- source_word: ἐπικαλέσασθαι τὸν ὕψιστον
  english_pob_choice: to call upon the Most High
  chosen_spanish: a invocar al Altísimo
  alternatives_spanish:
  - a llamar al Altísimo
  - a invocar al Dios Altísimo
  - a invocar al Altísimo Dios
  lexicon: LSJ
  rationale: En contexto religioso ἐπικαλέομαι significa invocar o llamar en oración; 'invocar' conserva ese matiz. 'Altísimo' reproduce el título divino con naturalidad en español.
- source_word: τὸ ζῆν χαρίσασθαι
  english_pob_choice: and grant life
  chosen_spanish: y conceder la vida
  alternatives_spanish:
  - y dar la vida
  - y otorgar la vida
  - y concederle la vida
  lexicon: LSJ
  rationale: χαρίζομαι expresa otorgar benignamente; 'conceder la vida' conserva el sentido de vida como don sin forzar una formulación más interpretativa.
- source_word: τῷ παντελῶς ἐν ἐσχάτῃ πνοῇ κειμένῳ
  english_pob_choice: to the one who was lying at his last breath
  chosen_spanish: al que yacía en su último aliento
  alternatives_spanish:
  - al que estaba en su último aliento
  - al que yacía al borde de la muerte
  - al que estaba tendido en su último aliento
  lexicon: LSJ
  rationale: La frase describe a alguien en estado terminal; 'yacía en su último aliento' es fiel y fluido. 'Último aliento' mantiene la imagen literal de πνοή sin añadir intensificación no atestiguada.
theological_decisions:
- issue: Título divino τὸν ὕψιστον
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Dios Altísimo
  - el Altísimo Dios
  rationale: Se conserva el título divino como forma nominal breve y reconocible en español, sin sustituirlo por una paráfrasis explicativa que vaya más allá del griego.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el intensificador 'very' para no sobreinterpretar παντελῶς; la redacción española evita igualmente cualquier intensificación adicional y mantiene 'último aliento' como equivalente sobrio y literal. La elección de 'Altísimo' sigue el criterio del audit trail inglés para τὸν ὕψιστον.
  spanish_consistency_notes:
  - Se mantiene el nombre propio Onías para Ὀνίαν, siguiendo la transliteración bíblica establecida.
  - Se usa 'Altísimo' como título divino consistente con la política POB y con la equivalencia auditada en inglés.
  - '''Conceder la vida'' conserva el matiz benévolo de χαρίζομαι sin imponer una lectura doctrinal adicional.'
