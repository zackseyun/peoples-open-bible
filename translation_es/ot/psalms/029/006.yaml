translation:
  language: es
  text: Hace que Líbano salte como un becerro, y Sirión[a] como un joven toro salvaje[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sirión es otro nombre del monte Hermón.
    reason: cross_reference
  - marker: b
    text: 'O: «como un toro joven». El hebreo dice literalmente «como un hijo de toros salvajes», un modismo para un joven toro salvaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְקִידֵם
  english_pob_choice: He makes them skip
  chosen_spanish: Él hace saltar
  alternatives_spanish:
  - Él los hace brincar
  - Él los hace saltar
  - Él los hace dar saltos
  lexicon: HALOT
  rationale: 'El hifil de רקד expresa una acción causativa: provocar saltos o brincos. En español, «hacer saltar» comunica bien ese sentido poético sin forzar una calca. Mantiene el movimiento vivaz de la imagen.'
- source_word: כְּמוֹ עֵגֶל
  english_pob_choice: like a calf
  chosen_spanish: como un becerro
  alternatives_spanish:
  - como un ternero
  - como un novillo joven
  - como un becerro pequeño
  lexicon: HALOT
  rationale: עֵגֶל designa un bovino joven; «becerro» es natural en español bíblico y conserva la vivacidad de la comparación. «Ternero» sería posible, pero «becerro» funciona mejor en registro poético y tradicional sin perder claridad.
- source_word: לְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: Líbano
  alternatives_spanish:
  - Lebanón
  lexicon: propio
  rationale: Es nombre propio de lugar; en español, la forma establecida es «Líbano». En esta línea poética conviene mantener la referencia geográfica directa.
- source_word: וְשִׂרְיֹן
  english_pob_choice: and Sirion
  chosen_spanish: y Sirión
  alternatives_spanish:
  - y Hermón
  lexicon: propio
  rationale: El hebreo usa el nombre Sirión, que se conserva como transliteración en la línea principal. La identificación con Hermón se reserva para nota, para no sustituir el nombre textual del hebreo.
- source_word: כְּמוֹ בֶן רְאֵמִים
  english_pob_choice: like a young wild ox
  chosen_spanish: como un novillo
  alternatives_spanish:
  - como un becerro de búfalos
  - como un toro joven
  - como el hijo de toros salvajes
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «como hijo de reemím», pero el sentido probable es un bovino joven y vigoroso. «Novillo» conserva la idea de juventud y fuerza, y evita el anacronismo de «unicornio».'
theological_decisions:
- issue: Identidad de Sirión
  english_pob_reading: Sirion is another name for Mount Hermon.
  chosen_spanish_reading: Sirión conserva el nombre hebreo, con identificación implícita en la nota.
  alternative_spanish_readings:
  - Sirión, es decir, Hermón
  - Hermón
  rationale: El texto hebreo dice Sirión, no Hermón. Para respetar el dato original y la decisión auditada de transliterar nombres propios, el cuerpo mantiene Sirión; la equivalencia con Hermón se explica aparte.
  doctrine_reference: No aplica; decisión de toponimia textual.
- issue: Sentido de רְאֵמִים
  english_pob_reading: The Hebrew reads literally 'like a son of wild oxen,' an idiom for a young wild ox.
  chosen_spanish_reading: «novillo» comunica el valor idiomático de juventud y fuerza.
  alternative_spanish_readings:
  - «hijo de toros salvajes»
  - «joven toro salvaje»
  rationale: El hebreo literal preserva la imagen, pero en español resulta más natural y claro traducir el modismo por su referente zoológico probable. Se evita una lectura mítica o desactualizada, manteniendo la tensión entre literalidad e inteligibilidad.
  doctrine_reference: No aplica; decisión léxica y zoológica.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste de la revisión inglesa que separa con claridad las dos comparaciones poéticas: Líbano como becerro y Sirión como novillo. Se evita repetir una construcción ambigua con pronombre implícito y se conserva la simetría del paralelismo hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando aparezca el Nombre divino; este versículo no lo contiene.
  - Se prefirió «Sirión» en el texto principal y se explicó su equivalencia con Hermón en nota, conforme a la política de conservar nombres hebreos cuando el texto los usa.
  - Se evitó «Cristo» y terminología eclesiástica ajena al versículo.
  - «Becerro/novillo» se eligieron por el matiz juvenil del hebreo y por la naturalidad del español bíblico.
