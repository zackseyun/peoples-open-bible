translation:
  language: es
  text: 'Y dijo a sus hijos: «Ensíllenme el asno». Y ellos le ensillaron el asno[a], y montó sobre él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y le ensillaron el asno».'
