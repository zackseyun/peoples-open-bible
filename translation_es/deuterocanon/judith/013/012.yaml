    issue: «reunieron» debilita el valor de συνεκάλεσαν
    rationale: El verbo griego significa convocar, llamar juntamente, reunir mediante convocatoria. En español, «reunieron» puede implicar solo que los juntaron, no necesariamente que los convocaron. «Convocaron» preserva mejor el matiz léxico documentado en el POB inglés.
  revised_spanish_text: Y cuando los hombres de su ciudad oyeron su voz, se apresuraron a bajar a la puerta de su ciudad y convocaron a los ancianos de la ciudad.
  revision_rationale: Se ajusta solo συνεκάλεσαν de «reunieron» a «convocaron» para reflejar con mayor precisión el sentido de llamar o reunir mediante convocatoria, en línea con la evidencia griega y la decisión léxica del POB inglés. No se requieren notas.
