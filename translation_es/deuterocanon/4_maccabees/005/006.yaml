review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del griego: temporal inicial, consejo cortés, finalidad de evitar el castigo, respeto por la edad/canas, y preserva correctamente el lenguaje de «filosofar». Sin embargo, hay dos desajustes importantes con la auditoría inglesa y el griego: el marcador [a] está anclado en «contra ti» cuando la nota alternativa corresponde a la cláusula sobre probar el cerdo y salvar la vida; y «te salvaras» en español puede sonar más soteriológico de lo deseable, mientras el contexto exige preservación física inmediata.'
  spanish_quality_summary: El español es claro y digno, pero «viejo» suena más brusco y menos eclesialmente legible que «anciano» en este contexto, sin perder la referencia a la edad avanzada. También conviene hacer más natural la cláusula final con «por aferrarte a la religión de los judíos» o similar; no obstante, el actual «practicando la religión de los judíos» es aceptable. La reparación principal es reubicar la nota y aclarar la preservación física con una formulación más idiomática.
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. Se conserva adecuadamente «filosofar» para φιλοσοφεῖν, en línea con la decisión temática del libro. «Carne de cerdo» para ὑείων es fiel. La cuestión principal es evitar que «salvaras» active asociaciones teológicas ajenas al contexto de σώζοιο.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: La nota explica una alternativa para ὅπως ἀπογευσάμενος τῶν ὑείων σώζοιο («por probar la carne de cerdo... preservar la vida»), no para «los tormentos contra ti». Debe anclarse en la frase de probar el cerdo / librar la vida.
  - severity: medium
    issue: «Te salvaras» puede sugerir salvación religiosa más que preservación física.
    rationale: La auditoría inglesa documenta explícitamente que σώζοιο aquí significa autopreservación corporal frente a la tortura/muerte. En español conviene «te libraras» o «salvaras tu vida» para evitar ambigüedad doctrinal.
  - severity: low
    issue: «Viejo» resulta algo áspero en español bíblico legible.
    rationale: Aunque el griego es directo, «anciano» comunica mejor la referencia etaria en un registro digno y ampliamente eclesial, sin convertirlo en título honorífico.
