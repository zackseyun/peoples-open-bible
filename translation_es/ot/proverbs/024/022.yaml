translation:
  language: es
  text: Porque su desastre surgirá de repente[a]; ¿y quién conoce la ruina de ambos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «su calamidad surgirá de repente».'
    reason: lexical_alternative
  - marker: b
    text: «Ambos» probablemente se refiere a Yahvé y al rey mencionados en el versículo anterior; también puede entenderse de manera más general o como otras partes implícitas del contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón del mandato anterior; «porque» expresa con naturalidad la relación causal en español y conserva el valor explicativo.
- source_word: פִתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - de improviso
  lexicon: HALOT
  rationale: El adverbio comunica abruptidad. «De repente» es claro, idiomático y mantiene el tono de advertencia.
- source_word: יָקוּם
  english_pob_choice: will rise
  chosen_spanish: surgirá
  alternatives_spanish:
  - se levantará
  - aparecerá
  lexicon: HALOT
  rationale: El qal imperfecto de קום conserva la imagen de irrupción/levantarse. «Surgirá» suena natural en español y preserva la idea de aparición repentina del desastre.
- source_word: אֵידָם
  english_pob_choice: their disaster
  chosen_spanish: su desastre
  alternatives_spanish:
  - su calamidad
  - su ruina
  lexicon: HALOT
  rationale: אֵיד denota calamidad o desastre. En español, «desastre» refleja bien la fuerza del término y evita una traducción demasiado débil.
- source_word: וּפִיד
  english_pob_choice: and ... the ruin
  chosen_spanish: y ... la ruina
  alternatives_spanish:
  - y ... la destrucción
  - y ... la calamidad
  lexicon: HALOT
  rationale: פִיד es un sinónimo poético de destrucción/ruina. «Ruina» preserva el paralelismo con «desastre» sin repetir exactamente el mismo sustantivo.
- source_word: שְׁנֵיהֶם
  english_pob_choice: of them both
  chosen_spanish: de ambos
  alternatives_spanish:
  - de los dos
  - de los dos juntos
  lexicon: HALOT
  rationale: La forma dual/plural con sufijo indica «los dos / ambos». «De ambos» mantiene la ambigüedad del referente que el POB inglés deja abierta, sin resolverla en el texto principal.
- source_word: מִי יוֹדֵעַ
  english_pob_choice: who knows
  chosen_spanish: ¿quién sabe?
  alternatives_spanish:
  - ¿quién puede saber?
  - ¿quién lo sabe?
  lexicon: HALOT
  rationale: La pregunta retórica expresa imposibilidad humana de prever. «¿Quién sabe?» es conciso, natural y fiel al valor retórico del hebreo.
theological_decisions:
- issue: Referente de «ambos» (שְׁנֵיהֶם)
  english_pob_reading: Likely refers to the LORD and the king mentioned in the previous verse; alternatively, some understand it more generally or as referring to other implied parties in the context.
  chosen_spanish_reading: Se conserva la ambigüedad en «ambos», con una nota que indica que probablemente alude a Yahvé y al rey del versículo anterior.
  alternative_spanish_readings:
  - Se refiere al pueblo rebelde y al rey
  - Se refiere de manera general a dos partes implícitas del contexto
  rationale: El contexto inmediato de 24:21 menciona a Yahvé y al rey; el sentido más coherente es que el proverbio advierte que el desastre asociado a esas dos autoridades llega de manera súbita e imprevisible. Sin embargo, el texto hebreo no elimina del todo la ambigüedad, y la traducción principal la preserva.
  doctrine_reference: 'Translation philosophy: preservar la tensión interpretativa cuando el texto la mantiene'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para capitalizar el inicio y mantiene como lectura preferente la idea de un desastre que irrumpe de forma súbita. La versión española sigue ese ajuste estilístico y conserva la misma ambigüedad interpretativa del referente plural.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para el nombre divino.
  - Se eligió «de repente»/«surgirá» para mantener abruptidad e imagen verbal sin calco rígido.
  - Se preservó la ambigüedad de «ambos» en el cuerpo del texto, con aclaración en nota.
  - El tono es proverbial, sobrio y apto para lectura pública.
  - Se evitó «Señor» como sustituto del nombre divino en la nota contextual.
