revisions:
- from: Nobles[a] vendrán de Egipto[b]; Cus se apresurará a extender sus manos hacia Dios.
  to: Los nobles[a] vendrán de Egipto; Cus[b] se apresurará a extender sus manos hacia Dios.
  rationale: La revisión corrige un anglicismo/no traducción en el texto principal («Nobles» → «Los nobles»), mejora la nota léxica («envíos» → «emisarios») y restituye la alternativa documentada sobre el singular personificado de Cus en la nota b. Se mantiene «hacia Dios» como opción aceptable de dirección, aunque «a Dios» también sería posible.
