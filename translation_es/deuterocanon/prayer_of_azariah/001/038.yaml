translation:
  language: es
  text: Que todo poder[a] bendiga al Señor; canten alabanzas y exáltenlo sobremanera por los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los poderes bendigan al Señor». El griego usa δύναμις en singular con πᾶσα, lo que puede entenderse de modo distributivo o colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογείτω
  english_pob_choice: Let ... bless
  chosen_spanish: Que ... bendiga
  alternatives_spanish:
  - Bendiga
  - Que ... bendigan
  lexicon: BDAG
  rationale: El griego es un imperativo de tercera persona; en español, una construcción exhortativa con «que» preserva ese valor imperativo sin forzar una forma poco natural.
- source_word: πᾶσα
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todas
  lexicon: LSJ
  rationale: Con δύναμις en singular, «toda» permite en español la misma ambigüedad distributiva/colectiva que el inglés POB quiso conservar con «every».
- source_word: ἡ δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - potestad
  - fuerza
  - poderes
  lexicon: LSJ
  rationale: «Poder» es el equivalente más directo y amplio; evita restringir indebidamente a «ejército» o «hoste», y mantiene el sentido colectivo/distributivo posible del sustantivo singular.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se conserva el título reverencial y la lectura de κύριος ya documentada por el POB en inglés; «el Señor» es idiomático y fiel en español.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - entonen alabanzas
  - alaben cantando
  lexicon: LSJ
  rationale: El verbo implica alabanza cantada; «canten alabanzas» comunica esa matiz musical con naturalidad en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exáltenlo sobremanera
  alternatives_spanish:
  - exáltenlo en gran manera
  - alábenlo muy alto
  lexicon: LSJ
  rationale: El compuesto intensifica la exaltación; «sobremanera» reproduce bien esa intensificación sin perder la cadencia litúrgica.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre átono de objeto directo es la forma natural en español y mantiene la referencia al Señor.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: «Por los siglos» conserva con suficiente literalidad la idea idiomática de duración indefinida y mantiene el registro litúrgico del pasaje.
theological_decisions:
- issue: Alcance de πᾶσα ἡ δύναμις
  english_pob_reading: every power
  chosen_spanish_reading: toda poder
  alternative_spanish_readings:
  - toda la fuerza
  - todos los poderes
  - todo poder
  rationale: El griego singular con πᾶσα permite una lectura distributiva o colectiva; la redacción española intenta mantener esa tensión sin cerrar el sentido a una sola categoría de seres o fuerzas.
  doctrine_reference: Contested terms / lexical scope of δύναμις
- issue: Tono litúrgico del cierre
  english_pob_reading: forever
  chosen_spanish_reading: por los siglos
  alternative_spanish_readings:
  - para siempre
  - por los siglos de los siglos
  rationale: Se preserva el registro de doxología con una fórmula tradicional pero todavía sobria; no se añade una intensificación ausente en el griego breve.
  doctrine_reference: Liturgical register and doxological duration
