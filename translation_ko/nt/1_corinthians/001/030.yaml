id: 1CO.1.30
reference: '1 Corinthians 1:30'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐξ αὐτοῦ δὲ ὑμεῖς ἐστε ἐν Χριστῷ Ἰησοῦ, ὃς ἐγενήθη ⸂σοφία ἡμῖν⸃ ἀπὸ θεοῦ, δικαιοσύνη τε καὶ ἁγιασμὸς καὶ ἀπολύτρωσις,
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/030.yaml
  text: And it is from him that you are in Messiah Jesus[a], who became for us wisdom from God, and righteousness and sanctification and redemption,
  footnotes:
  - marker: a
    text: 'Or ''justice.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 여러분은 그분으로 말미암아 메시아 예수 안에 있게 되었으니, 메시아는 우리에게 하나님으로부터 오는 지혜가 되셨고, 또한 의와 거룩함과 구속이 되셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from him
  chosen_korean: 그분으로 말미암아
  alternatives_korean:
  - 그분에게서
  lexicon: BDAG
  rationale: ἐκ + 속격, 기원과 매개의 함의.
- source_word: σοφία ἡμῖν ἀπὸ θεοῦ
  english_pob_choice: for us wisdom from God
  chosen_korean: 우리에게 하나님으로부터 오는 지혜
  alternatives_korean:
  - 하나님께로부터 우리에게 지혜
  lexicon: BDAG
  rationale: 24절 「하나님의 지혜」 선포의 연장—메시아 자신이 그 지혜다.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_korean: 의
  alternatives_korean:
  - 정의
  lexicon: BDAG
  rationale: 바울 구원론 문맥에서 「의」가 정착된 어휘.
- source_word: ἁγιασμὸς
  english_pob_choice: sanctification
  chosen_korean: 거룩함
  alternatives_korean:
  - 성화
  lexicon: BDAG
  rationale: 「성화」도 가능하나 본 절에서 메시아의 인격적 정체성과 동일시되므로 명사형 「거룩함」이 자연스럽다.
- source_word: ἀπολύτρωσις
  english_pob_choice: redemption
  chosen_korean: 구속
  alternatives_korean:
  - 속량
  lexicon: BDAG
  rationale: 몸값을 치러 자유롭게 함의 의미. 한국 신학 정착어 「구속」.
theological_decisions:
- issue: 메시아=지혜·의·거룩함·구속(기독론적 동일시)
  chosen_reading: 메시아가 신자에게 하나님으로부터 오는 지혜이며, 동시에 의·거룩함·구속이 되셨다
  alternative_readings:
  - 메시아가 지혜의 기원이 되시며, 의·거룩함·구속은 별개의 부수적 결과로 받는다
  rationale: 본 절은 18–24절의 「메시아 = 하나님의 지혜·능력」 선포의 절정으로, 구원론의 네 측면을 모두 메시아의 인격에 집중시킨다. 한국어 번역에서 「되셨고/되셨습니다」로 동일시 구조를 명시한다.
  doctrine_reference: 'DOCTRINE.md §1: 원저자가 청중에게 의도한 의미를 보존; §5: 강한 기독론적 선언을 약화시키지 않는다'
