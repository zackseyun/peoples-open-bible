revisions:
- from: Caín conoció a su esposa, y ella concibió y dio a luz a Enoc. Él estaba edificando una ciudad, y llamó a la ciudad por el nombre de su hijo Enoc[a][b][c][d].
  to: Caín conoció a su esposa[a], y ella concibió y dio a luz a Enoc. Estaba edificando una ciudad[b], y le puso a la ciudad el nombre de su hijo Enoc[c][d].
  rationale: Se ajusta la última cláusula a un español más natural y fiel al sentido, en línea con la revisión inglesa que abandonó la literalidad torpe de 'llamó el nombre'. Se elimina el pronombre explícito innecesario y se recolocan las notas en los segmentos exactos a los que se refieren. También se reduce la redundancia entre notas, preservando tanto la opción más literal como una alternativa idiomática clara.
