    rationale: El contenido de la nota explica todo el modismo «escuchar/obedecer la voz de Yahvé», por lo que es más preciso anclarla en la frase verbal relevante y no únicamente en el nombre divino.
  revised_spanish_text: Y tú volverás[a] y obedecerás la voz de Yahvé[b], y harás todos sus mandamientos que yo te estoy mandando hoy.
