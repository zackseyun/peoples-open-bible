translation:
  language: es
  text: 'Entonces Raquel dijo[a]: «Dios me ha juzgado, y también ha escuchado mi voz y me ha dado un hijo». Por eso le puso por nombre Dan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dan suena como el verbo hebreo «juzgar» o «ha juzgado».
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּנַנִּי
  english_pob_choice: has judged me
  chosen_spanish: me ha hecho justicia
  alternatives_spanish:
  - me ha juzgado
  - ha juzgado mi causa
  - me ha vindicado
  lexicon: HALOT
  rationale: El verbo דין en este contexto de nombramiento alude a una acción judicial favorable. «Me ha hecho justicia» conserva el campo semántico jurídico en español sin sonar tan rígido como una traducción literal de «me ha juzgado», y evita añadir una precisión forense no explícita en el hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios (con valor singular a partir del verbo)
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים es morfológicamente plural, el verbo es singular y el referente narrativo es el Dios de Israel; por eso corresponde «Dios» en singular.
- source_word: שָׁמַע בְּקֹלִי
  english_pob_choice: has also heard my voice
  chosen_spanish: también ha escuchado mi voz
  alternatives_spanish:
  - también me ha escuchado
  - también ha oído mi voz
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea «mi voz», porque la frase no solo indica oír, sino atender la súplica personal de Raquel. «Escuchado» comunica bien ese matiz en español.
- source_word: וַיִּתֶּן לִי בֵּן
  english_pob_choice: and given me a son
  chosen_spanish: y me ha dado un hijo
  alternatives_spanish:
  - y me ha dado un hijo varón
  - y me ha concedido un hijo
  lexicon: HALOT
  rationale: «Hijo» traduce de forma natural בן y mantiene el sentido específico masculino del texto. «Un hijo varón» sería posible, pero resulta más explicativo de lo necesario en español.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por consiguiente
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce la consecuencia explicativa del nombre. «Por eso» es natural en español y conserva la función inferencial del hebreo.
- source_word: קָרְאָה שְׁמ֖וֹ דָּן
  english_pob_choice: she called his name Dan
  chosen_spanish: llamó su nombre Dan
  alternatives_spanish:
  - le puso por nombre Dan
  - lo llamó Dan
  lexicon: HALOT
  rationale: Se conserva la fórmula semítica «llamó su nombre» para mantener visible el enlace entre el acto de nombrar y la explicación etimológica del verso. «Lo llamó Dan» sería más fluido, pero menos transparente al texto fuente.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tradicional en español y su relación con el juego de palabras con דין.
theological_decisions:
- issue: Cómo expresar la acción divina judicial en el nacimiento y nombramiento de Dan
  english_pob_reading: God has judged me
  chosen_spanish_reading: Dios me ha hecho justicia
  alternative_spanish_readings:
  - Dios me ha juzgado
  - Dios ha juzgado mi causa
  - Dios me ha vindicado
  rationale: La línea narrativa presenta una interpretación favorable de la acción divina en términos judiciales. «Me ha hecho justicia» transmite esa valoración sin convertirla en una afirmación doctrinal más amplia sobre justificación o vindicación legal. En español, además, suena natural y mantiene el peso del motivo del nombre Dan.
  doctrine_reference: Génesis 30:6; cf. traducción POB sobre el juego de palabras con דין
- issue: Mantenimiento del antropomorfismo relacional en 'ha escuchado mi voz'
  english_pob_reading: has also heard my voice
  chosen_spanish_reading: también ha escuchado mi voz
  alternative_spanish_readings:
  - también me ha escuchado
  - también ha oído mi voz
  rationale: Conservar «mi voz» respeta la forma concreta del hebreo y la dimensión personal de la súplica. No se suaviza a una formulación más abstracta, porque el texto habla de oír la voz de la persona que clama.
  doctrine_reference: Génesis 30:6; idioma de oración en el AT
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que prefirió «has judged me» frente a «has judged my case» para mayor cercanía léxica a דָּנַנִּי. En español, se mantuvo la cercanía semántica mediante «me ha hecho justicia», evitando una literalidad fría y conservando el sentido judicial del nombre Dan.
  spanish_consistency_notes:
  - Se usó «Dios» en singular conforme al verbo singular hebreo y al referente narrativo.
  - Se evitó «SEÑOR» porque el texto hebreo aquí dice אֱלֹהִים, no יהוה.
  - Se mantuvo la fórmula de nombramiento «llamó su nombre» para reflejar la estructura hebrea y el juego etimológico.
  - «Hijo» se conservó como traducción específica de בן, sin generalizar a «niño» o «bebé».
