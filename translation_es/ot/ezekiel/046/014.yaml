translation:
  language: es
  text: 'Prepararás también con él[a], mañana por mañana, una ofrenda vegetal de la sexta parte de un efa, y un tercio de un hin de aceite para humedecer[b] la flor de harina[c]: una ofrenda vegetal para Yahvé, como estatuto perpetuo[d], continuamente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para él» o «sobre él»; el hebreo probablemente remite a la ofrenda diaria del versículo anterior, de modo que esta ofrenda se prepara junto con ella.
    reason: alternative_reading
  - marker: b
    text: O «para mezclar»; el verbo hebreo es raro y sugiere humedecer la flor de harina con el aceite.
    reason: lexical_alternative
  - marker: c
    text: «Flor de harina» traduce la harina fina usada en ofrendas; es una equivalencia bíblica tradicional y transparente.
    reason: cultural_note
  - marker: d
    text: 'Hebreo: «estatutos de perpetuidad continuamente», un modismo que recalca un requisito duradero y regular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנְחָה
  english_pob_choice: a grain offering
  chosen_spanish: una ofrenda vegetal
  alternatives_spanish:
  - una ofrenda de cereal
  - una ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial designa la ofrenda vegetal/granaria; «ofrenda vegetal» comunica el carácter cultual sin sonar tan técnico como «de cereal» y evita una lectura genérica de «ofrenda».
- source_word: תַעֲשֶׂה
  english_pob_choice: you shall prepare
  chosen_spanish: prepararás
  alternatives_spanish:
  - harás
  - harás preparar
  lexicon: HALOT
  rationale: El hebreo usa un verbo amplio («hacer»), pero en instrucción sacrificial el sentido es de preparar/disponer la ofrenda. El futuro exhortativo en segunda persona conserva el mandato.
- source_word: עָלָיו
  english_pob_choice: with it
  chosen_spanish: con él
  alternatives_spanish:
  - para él
  - sobre él
  lexicon: HALOT
  rationale: La preposición עַל con sufijo probablemente remite a la ofrenda continua del verso previo; «con él» expresa acompañamiento en español natural sin forzar una lectura espacial.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana por mañana
  alternatives_spanish:
  - cada mañana
  - por la mañana, por la mañana
  lexicon: HALOT
  rationale: La repetición es distributiva e iterativa. «Mañana por mañana» conserva el paralelismo y la insistencia rítmica del hebreo.
- source_word: שִׁשִּׁית הָאֵיפָה
  english_pob_choice: a sixth of an ephah
  chosen_spanish: la sexta parte de un efa
  alternatives_spanish:
  - un sexto de efa
  lexicon: HALOT
  rationale: Es una medida simple; «la sexta parte» suena claro y natural en español bíblico contemporáneo.
- source_word: וְשֶׁמֶן שְׁלִישִׁית הַהִין
  english_pob_choice: and a third of a hin of oil
  chosen_spanish: un tercio de un hin de aceite
  alternatives_spanish:
  - aceite, un tercio de un hin
  lexicon: HALOT
  rationale: Se mantiene la medida antigua y el sustantivo «aceite» en aposición fluida, como en el hebreo.
- source_word: לָרֹס
  english_pob_choice: to moisten
  chosen_spanish: para humedecer
  alternatives_spanish:
  - para mezclar
  - para mojar
  lexicon: HALOT
  rationale: El verbo es raro y apunta a humedecer/saturar la harina con aceite; «humedecer» preserva la acción sin añadir la idea de mezclado total.
- source_word: אֶת־הַסֹּלֶת
  english_pob_choice: the fine flour
  chosen_spanish: la flor de harina
  alternatives_spanish:
  - la harina fina
  - la flor de harina fina
  lexicon: HALOT
  rationale: סֹלֶת es la harina selecta usada en ofrendas. «Flor de harina» es una equivalencia bíblica tradicional y comprensible, adecuada para el contexto sacrificial.
- source_word: מִנְחָה לַיהוָה
  english_pob_choice: a grain offering to Yahweh
  chosen_spanish: una ofrenda vegetal para Yahvé
  alternatives_spanish:
  - una ofrenda para Yahvé
  - una ofrenda de grano para Yahvé
  lexicon: HALOT
  rationale: Se repite y especifica la naturaleza cultual de la ofrenda. «Yahvé» sigue la directriz del proyecto para יהוה, y «para» expresa destinatario.
- source_word: חֻקּוֹת עוֹלָם
  english_pob_choice: a perpetual statute
  chosen_spanish: estatutos perpetuos
  alternatives_spanish:
  - un estatuto perpetuo
  - una ordenanza perpetua
  lexicon: HALOT
  rationale: El hebreo plural intensifica la permanencia normativa; en español conviene conservar el plural «estatutos» y el adjetivo «perpetuos».
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de continuo
  lexicon: HALOT
  rationale: Adverbio de regularidad continua; «continuamente» conserva el énfasis acumulativo del hebreo y evita sonar arcaizante.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: La línea terminológica del proyecto exige transliterar el Tetragrámaton como «Yahvé» en el texto principal. Se mantiene el nombre de pacto en lugar de sustituirlo por una convención eclesial de mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de la ofrenda מִנְחָה
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de grano
  - ofrenda de cereal
  rationale: La traducción debe reflejar que no es una ofrenda genérica, sino la ofrenda de harina/aceite propia del culto. «Vegetal» conserva la categoría sacrificial sin reducirla a un cereal específico.
  doctrine_reference: Terminología sacrificial de Levítico y Ezequiel; coherencia con el inventario de harina y aceite en el versículo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando todas las notas con sus marcas exactas en el texto español. También se ajustó el nombre divino al estándar español del proyecto («Yahvé») y se preservó la tensión léxica del verbo raro לָרֹס con una nota de alternativa.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia cultual del hebreo: ofrenda + medida de harina + aceite + acción de humedecer + reiteración final.'
  - Las medidas antiguas («efa», «hin») se conservan sin explicar en el texto para no sobrecargar el versículo.
  - La repetición «mañana por mañana» refleja el valor iterativo del hebreo y evita una paráfrasis demasiado libre.
  - Se usó puntuación em-dash para separar la aposición final, siguiendo el valor explicativo del hebreo y del POB inglés.
