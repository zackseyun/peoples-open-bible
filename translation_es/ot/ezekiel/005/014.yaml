translation:
  language: es
  text: Y yo te convertiré en ruina[a] y en oprobio[b] entre las naciones que están alrededor de ti, a los ojos de todo el que pasa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desolación» para «ruina».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «objeto de escarnio» para «oprobio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶתְּנֵךְ
  english_pob_choice: And I will make you
  chosen_spanish: Y yo te convertiré
  alternatives_spanish:
  - Y yo te haré
  - Y yo te pondré
  lexicon: HALOT
  rationale: נתן aquí funciona de manera causativa con el complemento siguiente, expresando el acto divino de reducir a Jerusalén a un estado determinado. En español, «convertiré en» comunica bien esa transición de estado sin perder la fuerza causativa.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - desolación
  - desierto
  lexicon: HALOT
  rationale: חָרְבָּה denota un estado de devastación o ruina. «Ruina» es concreto, natural y suficientemente cercano al hebreo. Se conserva la opción alternativa implícita de «desolación» mediante nota.
- source_word: וּלְחֶרְפָּה
  english_pob_choice: and a reproach
  chosen_spanish: y en oprobio
  alternatives_spanish:
  - y en reproche
  - y en escarnio
  lexicon: HALOT
  rationale: חֶרְפָּה puede significar reproche, vergüenza u oprobio. «Oprobio» mantiene el peso de deshonra pública y juicio comunitario, y suena natural en español bíblico contemporáneo. Se evita «reproche» por sonar más estrecho o menos idiomático aquí.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones gentiles
  lexicon: HALOT
  rationale: El hebreo se refiere a las naciones vecinas, no a una oposición técnica entre judíos y gentiles. «Entre las naciones» preserva el sentido geopolítico y profético.
- source_word: אֲשֶׁר סְבִיבוֹתָיִךְ
  english_pob_choice: that are around you
  chosen_spanish: que están alrededor de ti
  alternatives_spanish:
  - que te rodean
  - que están a tu alrededor
  lexicon: HALOT
  rationale: La cláusula relativa describe a las naciones circundantes. «Que están alrededor de ti» conserva la relación espacial y la estructura del hebreo sin sonar rígido.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: La locución hebrea equivale a una exposición pública y visible. «A los ojos de» refleja con bastante literalidad la imagen y sigue siendo comprensible en español bíblico; además, casa bien con el paralelo final.
- source_word: כָּל עוֹבֵר
  english_pob_choice: everyone who passes by
  chosen_spanish: todo el que pasa
  alternatives_spanish:
  - todo transeúnte
  - todo el que va pasando
  lexicon: HALOT
  rationale: 'עוֹבֵר es un participio distributivo: cualquiera que pase. «Todo el que pasa» es natural, inclusivo y fiel al valor generalizante de כָּל.'
theological_decisions:
- issue: Personificación de Jerusalén en singular femenino
  english_pob_reading: Retained singular 'you' throughout, referring to Jerusalem/city as addressed in the prophecy.
  chosen_spanish_reading: Conservar «te/ti» en singular, dirigido a Jerusalén como ciudad personificada.
  alternative_spanish_readings:
  - nombrar explícitamente «Jerusalén»
  - usar plural colectivo
  rationale: El hebreo mantiene el segundo femenino singular y la fuerza retórica del discurso directo. El español puede conservar esa personificación sin añadir un sustantivo ausente del versículo.
  doctrine_reference: Primacía del texto original; no expandir más allá de lo que el verso dice.
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail en cuanto al sentido de נתן + complemento, la referencia a las naciones circundantes y la personificación singular de Jerusalén. Se mantiene una traducción sobria y publicable, con notas breves para alternativas léxicas donde el hebreo admite más de una posibilidad.
  spanish_consistency_notes:
  - Se conserva la persona singular femenina implícita en «te/ti», conforme al hebreo.
  - «Yahvé» no aparece en este versículo, por lo que no se introduce terminología adicional.
  - «Oprobio» se usa por su carga pública de deshonra; no se reemplaza por un equivalente más débil.
  - La puntuación sigue el ritmo de una sola cláusula profética con cierre visible y público.
