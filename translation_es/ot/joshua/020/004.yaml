translation:
  language: es
  text: Él huirá a una de estas ciudades y estará a la entrada de la puerta de la ciudad, y hablará en presencia de los ancianos de aquella ciudad su caso[a]. Entonces lo recibirán en la ciudad, entre ellos[b], y le darán un lugar, y vivirá con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus palabras» o «su asunto»; el hebreo puede referirse tanto a las palabras que pronuncia como al caso que expone.
    reason: lexical_alternative
  - marker: b
    text: O «lo tomarán en la ciudad, junto a ellos»; el hebreo puede significar «reunir», «hacer entrar» o «recibir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָס
  english_pob_choice: He shall flee
  chosen_spanish: Él huirá
  alternatives_spanish:
  - Entonces huirá
  - Deberá huir
  lexicon: HALOT
  rationale: En este contexto legal e instruc­tivo, el hebreo funciona con valor injuntivo. «Huirá» conserva la fuerza de escape/huida sin añadir obligación explícita que no está en el hebreo.
- source_word: אַחַת מֵהֶעָרִים הָאֵלֶּה
  english_pob_choice: one of these cities
  chosen_spanish: una de estas ciudades
  alternatives_spanish:
  - una de las ciudades estas
  - una ciudad de estas
  lexicon: HALOT
  rationale: La construcción partitiva es directa; «una de estas ciudades» es natural y fiel.
- source_word: וְעָמַד פֶּתַח שַׁעַר הָעִיר
  english_pob_choice: stand at the entrance of the city gate
  chosen_spanish: se pondrá a la entrada de la puerta de la ciudad
  alternatives_spanish:
  - se detendrá a la entrada de la puerta de la ciudad
  - estará junto a la entrada de la puerta de la ciudad
  lexicon: HALOT
  rationale: «Péterḥ shaar» combina «entrada» y «puerta»; en español conviene mantener ambas imágenes sin forzar un calco. «Se pondrá» expresa la presentación pública ante el acceso de la ciudad.
- source_word: וְדִבֶּר בְּאָזְנֵי
  english_pob_choice: he shall speak ... in the hearing of
  chosen_spanish: hablará en presencia de
  alternatives_spanish:
  - hablará a oídos de
  - dirá en el oído de
  lexicon: HALOT
  rationale: La locución hebrea no pide un calco literal. «En presencia de» comunica el acto formal ante testigos/autoridades y evita un español áspero.
- source_word: זִקְנֵי הָעִיר הַהִיא
  english_pob_choice: the elders of that city
  chosen_spanish: los ancianos de aquella ciudad
  alternatives_spanish:
  - los ancianos de esa ciudad
  - los ancianos de la ciudad
  lexicon: HALOT
  rationale: «Aquella» conserva la deíxis específica del hebreo הַהִיא y mantiene el matiz de una ciudad determinada.
- source_word: אֶת דְּבָרָיו
  english_pob_choice: his case
  chosen_spanish: su caso
  alternatives_spanish:
  - sus palabras
  - su asunto
  lexicon: HALOT
  rationale: En este contexto judicial, דָּבָר refiere la presentación de la situación o causa. «Su caso» reproduce bien la decisión inglesa y el sentido forense.
- source_word: וְאָסְפוּ אֹתוֹ הָעִירָה אֲלֵיהֶם
  english_pob_choice: Then they shall take him into the city to themselves
  chosen_spanish: Entonces lo tomarán dentro de la ciudad, junto a ellos
  alternatives_spanish:
  - Entonces lo reunirán dentro de la ciudad, junto a ellos
  - Entonces lo recibirán dentro de la ciudad, entre ellos
  lexicon: HALOT
  rationale: אָסַף puede abarcar reunir, traer o recibir. «Lo tomarán dentro de la ciudad» sigue la revisión inglesa y conserva el movimiento de ingreso; «junto a ellos» intenta reflejar אֲלֵיהֶם sin diluir la referencia relacional.
- source_word: וְנָתְנוּ לוֹ מָקוֹם
  english_pob_choice: and they shall give him a place
  chosen_spanish: y le darán un lugar
  alternatives_spanish:
  - y le asignarán un lugar
  - y le darán alojamiento
  lexicon: HALOT
  rationale: מָקוֹם es deliberadamente amplio. «Un lugar» respeta esa amplitud y evita especificar más de lo que el texto dice.
- source_word: וְיָשַׁב עִמָּם
  english_pob_choice: and he shall live with them
  chosen_spanish: y vivirá con ellos
  alternatives_spanish:
  - y morará con ellos
  - y habitará con ellos
  lexicon: HALOT
  rationale: En contextos de residencia, יָשַׁב equivale a «vivir/dwell». «Vivirá con ellos» es natural en español y fiel al sentido de residencia estable.
theological_decisions:
- issue: Asilo en la ciudad de refugio y lenguaje de procedimiento legal
  english_pob_reading: The verse presents a formal legal process for a protected city, with the claimant speaking his case before the elders and being received into the city.
  chosen_spanish_reading: El versículo presenta un procedimiento legal formal para una ciudad de refugio, con el solicitante exponiendo su caso ante los ancianos y siendo recibido en la ciudad.
  alternative_spanish_readings:
  - El versículo describe solo una llegada física a la ciudad sin matiz judicial
  - El versículo enfatiza únicamente hospitalidad y convivencia
  rationale: La evidencia hebrea y la redacción inglesa muestran un marco jurídico, no solo hospitalidad. La traducción española conserva ese carácter procesal con «su caso», «ancianos» y «tomarán dentro de la ciudad».
  doctrine_reference: Josué 20; legislación de ciudades de refugio (Números 35:9–34; Deuteronomio 19:1–13)
- issue: Deíxis específica de «aquella ciudad»
  english_pob_reading: the elders of that city
  chosen_spanish_reading: los ancianos de aquella ciudad
  alternative_spanish_readings:
  - los ancianos de esa ciudad
  - los ancianos de la ciudad
  rationale: El hebreo usa un demostrativo específico; mantener «aquella» evita neutralizar la referencia y preserva la precisión del texto fuente.
  doctrine_reference: Principio de correspondencia semántica y deixis en traducción bíblica
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió «bring him into the city» por «take him into the city» para reflejar con más directa correspondencia el verbo hebreo אָסַף. La versión española sigue esa revisión con «lo tomarán dentro de la ciudad», manteniendo también el elemento relacional de אֲלֵיהֶם con «junto a ellos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «ancianos» para זִקְנֵי, siguiendo el sentido de autoridades/capacitados del pueblo sin introducir términos eclesiásticos.
  - No se sustituye el lenguaje jurídico por formulaciones devocionales; se conserva el marco de refugio y audiencia ante autoridades civiles.
  - «Caso» traduce el valor forense de דָּבָר en este contexto, en continuidad con la decisión inglesa de «his case».
