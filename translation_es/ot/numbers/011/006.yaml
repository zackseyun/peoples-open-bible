translation:
  language: es
  text: Pero ahora nuestro apetito[a] se ha secado; no hay nada en absoluto, sino el maná delante de nuestros ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra alma»; el hebreo נֶפֶשׁ (nephesh) puede significar «alma», «vida» o, en contextos relacionados con comida, «apetito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: El hebreo introduce una transición adversativa en el lamento; «pero ahora» preserva el contraste natural y el tono de queja del contexto.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our appetite
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nuestro apetito
  - nuestra vida
  - nosotros mismos
  lexicon: HALOT
  rationale: Aquí se preserva la ambigüedad léxica de נֶפֶשׁ. Aunque en contexto alimentario puede aludir al apetito, «alma» evita estrechar el sentido demasiado y mantiene la tensión documentada por el original y el audit trail inglés.
- source_word: יְבֵשָׁה
  english_pob_choice: is dried up
  chosen_spanish: está seca
  alternatives_spanish:
  - se ha secado
  - está marchita
  lexicon: HALOT
  rationale: El adjetivo describe sequedad/agotamiento; en español «está seca» expresa el estado resultante de manera directa y natural sin añadir más proceso del que el hebreo exige.
- source_word: אֵין כֹּל
  english_pob_choice: there is nothing at all
  chosen_spanish: no hay nada en absoluto
  alternatives_spanish:
  - no hay nada
  - no hay absolutamente nada
  lexicon: HALOT
  rationale: La negación con כֹּל es enfática. «No hay nada en absoluto» conserva esa intensificación de manera idiomática en español.
- source_word: בִּלְתִּי אֶל
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: La construcción excluye todo salvo un elemento; en español «sino» encaja bien tras una negación previa y mantiene la restricción de forma fluida.
- source_word: הַמָּן
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - maná
  lexicon: HALOT
  rationale: 'El artículo hebreo señala un referente específico y conocido. En español se refleja naturalmente con el artículo definido: «el maná».'
- source_word: עֵינֵינוּ
  english_pob_choice: before our eyes
  chosen_spanish: delante de nuestros ojos
  alternatives_spanish:
  - ante nuestros ojos
  - a la vista de nosotros
  lexicon: HALOT
  rationale: El idiomático hebreo presenta el maná como algo visible y constantemente expuesto. «Delante de nuestros ojos» mantiene la imagen concreta sin forzarla.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de hambre
  english_pob_reading: our appetite
  chosen_spanish_reading: nuestra alma
  alternative_spanish_readings:
  - nuestro apetito
  - nuestra vida
  rationale: El audit trail inglés opta por «appetite» por el contexto alimentario, pero el hebreo permite un rango más amplio. En español, «nuestra alma» conserva la polisemia y deja visible la posible tensión entre el sentido antropológico general y el sentido contextual de deseo/apetito.
  doctrine_reference: Antropología bíblica; léxico de נֶפֶשׁ en contexto narrativo.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el añadido «this» antes de manna por no estar en el hebreo. La redacción española sigue esa misma cautela y conserva únicamente «el maná».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se usa «el maná» con artículo definido, coherente con el referente específico del hebreo.
  - Se conserva la ambigüedad de נֶפֶשׁ mediante una nota, en lugar de fijar sin más «apetito», para no borrar la tensión léxica documentada.
