translation:
  language: es
  text: Han multiplicado sus caídos[a] en esta ciudad y han llenado sus calles[b] de caídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus muertos» / «sus cadáveres»; el hebreo se refiere específicamente a personas muertas de forma violenta, por eso se prefiere «caídos».
    reason: lexical_alternative
  - marker: b
    text: O «sus plazas» o «sus espacios abiertos» para «sus calles».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְבֵּיתֶם
  english_pob_choice: have multiplied
  chosen_spanish: han multiplicado
  alternatives_spanish:
  - han aumentado
  - han hecho muchos
  lexicon: HALOT
  rationale: El piel perfecto 2mp de רבה expresa que hicieron abundar algo; en español, «han multiplicado» conserva bien el valor causativo y el resultado consumado.
- source_word: חַלְלֵיכֶם
  english_pob_choice: your slain
  chosen_spanish: sus muertos
  alternatives_spanish:
  - sus caídos
  - sus cadáveres
  lexicon: HALOT
  rationale: El término hebreo alude a personas muertas violentamente. «Muertos» es natural en español; la nota preserva que el sentido es más específico que «muertos» en general y que el POB prefirió «slain».
- source_word: בָּעִיר הַזֹּאת
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - dentro de esta ciudad
  lexicon: HALOT
  rationale: La frase locativa es directa; «en esta ciudad» reproduce la demostración sin endurecer el español.
- source_word: וּמִלֵּאתֶם
  english_pob_choice: and filled
  chosen_spanish: y han llenado
  alternatives_spanish:
  - y llenaron
  - y han colmado
  lexicon: HALOT
  rationale: El verbo מלא en piel expresa llenar; el perfecto coordinado se vierte con perfecto compuesto para mantener la acción completada y la fluidez verbal del español.
- source_word: חוּצֹתֶיהָ
  english_pob_choice: its streets
  chosen_spanish: sus calles
  alternatives_spanish:
  - sus plazas
  - sus espacios abiertos
  lexicon: HALOT
  rationale: En contexto urbano, חוץ/חוּצוֹת puede referirse a calles o lugares públicos abiertos. «Calles» es la opción más natural en español; la nota conserva la alternativa «squares/open places» del POB.
- source_word: חָלָל
  english_pob_choice: the slain
  chosen_spanish: de muertos
  alternatives_spanish:
  - de los caídos
  - de cadáveres
  lexicon: HALOT
  rationale: El singular funciona colectivamente tras «han llenado». En español, «de muertos» mantiene la colectividad y evita una repetición dura; la nota explica la alternativa literal ligada a «slain».
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia con el texto fuente y sin cambios necesarios; este borrador sigue esa línea, manteniendo la imagen de multiplicar muertos y llenar las calles con los muertos, con notas que preservan las alternativas lexicográficas del POB.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre חַלְלֵיכֶם y חָלָל con dos ocurrencias de «muertos», como colectivo en español.
  - Se evita introducir vocabulario eclesiástico o interpretativo ajeno al hebreo.
  - La puntuación y el orden de la oración siguen de cerca la sintaxis del hebreo sin sonar forzados en español.
