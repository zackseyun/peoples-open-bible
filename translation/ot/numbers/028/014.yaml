id: NUM.28.14
reference: Numbers 28:14
source:
  edition: WLC
  text: וְ/נִסְכֵּי/הֶ֗ם חֲצִ֣י הַ/הִין֩ יִהְיֶ֨ה לַ/פָּ֜ר וּ/שְׁלִישִׁ֧ת הַ/הִ֣ין לָ/אַ֗יִל וּ/רְבִיעִ֥ת הַ/הִ֛ין לַ/כֶּ֖בֶשׂ יָ֑יִן זֹ֣את עֹלַ֥ת חֹ֨דֶשׁ֙ בְּ/חָדְשׁ֔/וֹ לְ/חָדְשֵׁ֖י הַ/שָּׁנָֽה׃
translation:
  text: 'And their drink offerings shall be: half a hin for the bull[a], a third of a hin for the ram, and a fourth of a hin for the lamb, of wine. This is the monthly burnt offering for each month throughout the months of the year.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This is the burnt offering of the new moon in its month, for the months of the year.' The Hebrew word חֹדֶשׁ can denote either 'month' or 'new moon'; here the main text renders the recurring monthly sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to a poured offering, regularly rendered in sacrificial contexts as 'drink offering.' 'Libation' is possible but less accessible in modern English.
- source_word: חֲצִי הַהִין
  chosen: half a hin
  alternatives:
  - half of the hin
  lexicon: HALOT
  rationale: A direct rendering preserves the ancient unit rather than converting it, which maintains formal transparency to the source text.
- source_word: לַפָּר
  chosen: for the bull
  alternatives:
  - for each bull
  lexicon: HALOT
  rationale: The singular with article here refers to the sacrificial animal category in context. 'For the bull' is the most straightforward rendering.
- source_word: וּשְׁלִישִׁת הַהִין
  chosen: a third of a hin
  alternatives:
  - one-third of a hin
  lexicon: HALOT
  rationale: Natural English equivalent of the fractional expression while preserving the ancient measure.
- source_word: לָאַיִל
  chosen: for the ram
  alternatives:
  - for each ram
  lexicon: HALOT
  rationale: As with 'bull,' the singular denotes the specified sacrificial animal.
- source_word: וּרְבִיעִת הַהִין
  chosen: a fourth of a hin
  alternatives:
  - one-fourth of a hin
  - a quarter of a hin
  lexicon: HALOT
  rationale: '''A fourth of a hin'' closely matches the Hebrew fractional form; ''a quarter'' is possible but slightly freer.'
- source_word: לַכֶּבֶשׂ
  chosen: for the lamb
  alternatives:
  - for each lamb
  lexicon: HALOT
  rationale: The singular with article is retained naturally in English as the specified sacrificial animal.
- source_word: יָיִן
  chosen: of wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Placed after the list in Hebrew, יָיִן specifies the substance of the drink offerings. 'Of wine' preserves that appositional/explicative force in readable English.
- source_word: זֹאת עֹלַת חֹדֶשׁ
  chosen: This is the monthly burnt offering
  alternatives:
  - This is the burnt offering of the month
  - This is the new moon burnt offering
  lexicon: HALOT
  rationale: חֹדֶשׁ can mean 'month' or 'new moon.' In this cultic context the offering is tied to the beginning of each month, but the following phrase 'for each month throughout the months of the year' broadens the reference across the yearly cycle. 'Monthly burnt offering' captures the recurring monthly observance in clear English.
- source_word: בְּחָדְשׁוֹ
  chosen: for each month
  alternatives:
  - in its month
  - in each month
  lexicon: HALOT
  rationale: The phrase literally means 'in its month.' In English, 'for each month' best conveys the distributive sense in context.
- source_word: לְחָדְשֵׁי הַשָּׁנָה
  chosen: throughout the months of the year
  alternatives:
  - for the months of the year
  - month by month through the year
  lexicon: HALOT
  rationale: This phrase marks the recurring pattern over the whole year. 'Throughout the months of the year' is idiomatic and preserves the temporal scope.
