translation:
  language: es
  text: He aquí[a], viene un pueblo del norte, y una gran nación y muchos reyes serán movilizados[b] desde las partes más remotas de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» o «Vean»; marcador profético de atención.
    reason: lexical_alternative
  - marker: b
    text: O «serán despertados» o «despertarán»; el verbo hebreo sugiere ser incitados o movilizados para la acción. También puede traducirse «desde los confines de la tierra» o «desde los extremos de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Miren ustedes!
  lexicon: HALOT
  rationale: Como marcador discursivo de atención, requiere una apertura viva y profética en español. «¡Miren!» comunica la misma llamada a fijarse en lo que sigue sin sonar arcaico, aunque conserva solemnidad suficiente para este contexto oracular.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: Un pueblo
  alternatives_spanish:
  - Una gente
  - Una nación
  lexicon: HALOT
  rationale: «Pueblo» preserva la distinción frente a גּוֹי en la línea paralela y evita borrar la matización entre grupo étnico/colectivo y entidad política.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ha venido
  lexicon: HALOT
  rationale: El perfecto hebreo con valor vívido en profecía puede expresarse naturalmente en presente. «Viene» mantiene la inmediatez y el tono de anuncio inminente.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: del norte
  alternatives_spanish:
  - desde el norte
  - de la parte norte
  lexicon: HALOT
  rationale: Equivalente directo y natural en español; conserva la referencia direccional sin añadir matices no presentes en el hebreo.
- source_word: גּוֹי גָּדוֹל
  english_pob_choice: a great nation
  chosen_spanish: una nación grande
  alternatives_spanish:
  - una gran nación
  - una nación poderosa
  lexicon: HALOT
  rationale: «Nación» mantiene el valor político de גּוֹי y evita fusionarlo con עַם. Se conserva «grande» en posposición para reflejar la secuencia hebrea, aunque «gran nación» sería la forma más idiomática.
- source_word: וּמְלָכִים רַבִּים
  english_pob_choice: and many kings
  chosen_spanish: y muchos reyes
  alternatives_spanish:
  - y numerosos reyes
  lexicon: HALOT
  rationale: Traducción directa y clara del plural coordinado. «Muchos» conserva la multiplicidad señalada por רַבִּים sin intensificar indebidamente.
- source_word: יֵעֹרוּ
  english_pob_choice: will be stirred up
  chosen_spanish: serán despertados
  alternatives_spanish:
  - serán movidos
  - serán despertados para la acción
  - serán roused
  lexicon: HALOT
  rationale: El nifal de עור puede implicar ser despertado, arrojado o movilizado para actuar. «Serán despertados» conserva la imagen básica y deja visible la tensión entre despertar y movilización; en este contexto profético puede implicar acción militar.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  english_pob_choice: from the farthest parts of the earth
  chosen_spanish: desde las partes más remotas de la tierra
  alternatives_spanish:
  - desde los confines de la tierra
  - desde los extremos de la tierra
  lexicon: HALOT
  rationale: La expresión señala regiones lejanas/extremas. «Partes más remotas» reproduce el sentido superlativo de lejanía que el inglés POB resalta, sin convertirlo en una fórmula bíblica más tradicional de lo que el texto exige.
theological_decisions:
- issue: Alcance profético de la movilización de los reyes y la nación
  english_pob_reading: The Hebrew verb suggests being aroused or mobilized for action.
  chosen_spanish_reading: El verbo sugiere ser despertados o movilizados para actuar.
  alternative_spanish_readings:
  - ser incitados a actuar
  - ser roused
  rationale: No se reduce a un simple despertar físico; en el contexto de juicio profético, la imagen apunta a una convocatoria o movilización de carácter activo. Se conserva la ambigüedad útil entre despertar e impulsar a la acción.
  doctrine_reference: Cf. el valor nifal de עור en contexto profético y militar; no implica una doctrina específica, sino una decisión semántica contextual.
translation_notes:
  revision_awareness: La fuente inglesa fue revisada recientemente y se mantuvo sin cambios; la redacción española sigue de cerca el juicio lexical del POB inglés, pero ajusta el orden y la naturalidad del español sin perder la distinción entre עַם y גּוֹי, ni el matiz de עור como movilización.
  spanish_consistency_notes:
  - Se usa «pueblo» para עַם y «nación» para גּוֹי para conservar la distinción lexical del hebreo.
  - Se mantiene un tono profético elevado sin caer en arcaísmos innecesarios.
  - La expresión final conserva la idea de lejanía extrema con una formulación comprensible en español contemporáneo.
  - Las notas al pie están ancladas donde corresponde y respetan la numeración única del registro.
