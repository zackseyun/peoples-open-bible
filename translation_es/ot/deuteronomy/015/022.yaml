translation:
  language: es
  text: Podrás comerlo dentro de tus puertas[a]; tanto el impuro como el limpio podrán comerlo[b], como la gacela y el ciervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “dentro de tus puertas”, un modismo para dentro de tus poblaciones o comunidades locales.'
    reason: cultural_note
  - marker: b
    text: Es decir, tanto los ritualmente impuros como los ritualmente limpios pueden comerlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus ciudades
  alternatives_spanish:
  - dentro de tus puertas
  - dentro de tus poblados
  - en tus ciudades
  lexicon: HALOT
  rationale: La imagen literal es “en tus puertas”, pero en español “ciudades” comunica mejor la idea idiomática de jurisdicción local o comunidad, sin perder el alcance territorial del hebreo. Se evita una expresión demasiado literal que sonaría opaca.
- source_word: תֹּאכֲלֶנּוּ
  english_pob_choice: you may eat it
  chosen_spanish: podrás comerlo
  alternatives_spanish:
  - puedes comerlo
  - te será permitido comerlo
  - comerás
  lexicon: HALOT
  rationale: El hebreo expresa una permisión dirigida al singular masculino. “Podrás” conserva bien la fuerza permisiva y mantiene naturalidad en español.
- source_word: הַטָּמֵא
  english_pob_choice: the unclean
  chosen_spanish: el impuro
  alternatives_spanish:
  - el inmundo
  - el ritualmente impuro
  - el ceremonialmente impuro
  lexicon: HALOT
  rationale: En este contexto la referencia es ritual, no moral. “Impuro” es conciso y readable en español; “ritualmente impuro” aclara el matiz, pero alarga innecesariamente el verso principal.
- source_word: וְהַטָּהוֹר
  english_pob_choice: the clean
  chosen_spanish: el limpio
  alternatives_spanish:
  - el puro
  - el ritualmente limpio
  - el ceremonialmente limpio
  lexicon: HALOT
  rationale: Se conserva el par tradicional de contraste ritual impuro/limpio. “Limpio” reproduce el contraste de manera directa y natural en español.
- source_word: יַחְדָּו
  english_pob_choice: alike
  chosen_spanish: ambos por igual
  alternatives_spanish:
  - juntos
  - de la misma manera
  - por igual
  lexicon: HALOT
  rationale: El valor distributivo no es principalmente “juntos” en sentido físico, sino igualdad de acceso. “Ambos por igual” evita ambigüedad y expresa con claridad la idea del hebreo.
- source_word: כַּצְּבִי
  english_pob_choice: as the gazelle
  chosen_spanish: como la gacela
  alternatives_spanish:
  - como el ciervo gacela
  - como la gacela montés
  - como la gacela salvaje
  lexicon: HALOT
  rationale: צְבִי designa una gacela; se mantiene el término zoológico preciso y natural en español.
- source_word: וְכָאַיָּל
  english_pob_choice: and the deer
  chosen_spanish: y el ciervo
  alternatives_spanish:
  - y el venado
  - y el ciervo macho
  - y el corzo
  lexicon: HALOT
  rationale: אַיָּל suele referirse a un ciervo, a veces específicamente un macho. “Ciervo” es el equivalente moderno más claro y general, coherente con “gacela” en la comparación.
theological_decisions:
- issue: Pureza ritual vs. pureza moral en “impuro/limpio”
  english_pob_reading: those who are ritually unclean and those who are ritually clean may both eat it
  chosen_spanish_reading: el impuro y el limpio, ambos por igual, podrán comerlo
  alternative_spanish_readings:
  - el ritualmente impuro y el ritualmente limpio podrán comerlo
  - el ceremonialmente impuro y el ceremonialmente limpio podrán comerlo
  rationale: El contexto de leyes alimentarias exige leer estas categorías como estados rituales, no como valoración ética. La redacción principal conserva la brevedad del hebreo y la lectura ritual está implícita por el contexto; la nota aclara el sentido para evitar mala interpretación.
  doctrine_reference: Levítico 11; Deuteronomio 14
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones en la última pasada; la versión española mantiene esa línea de decisión, pero adapta el idiomatismo de “within your gates” a un español más natural (“dentro de tus ciudades”) y preserva explícitamente el contraste ritual con una nota aclaratoria.
  spanish_consistency_notes:
  - Se mantiene el par ritual “impuro/limpio” para conservar la oposición terminológica del pasaje.
  - Se evita “SEÑOR” u otras máscaras porque este verso no contiene el Tetragrámaton.
  - La comparación final usa animales comunes y claros en español, en paralelo con la estrategia inglesa de nombres zoológicos modernos.
