    rationale: La documentación del POB inglés decidió explícitamente «righteousness» en el texto y «justice» en nota para no reducir el sentido moral amplio a un matiz jurídico. El español debe seguir esa decisión salvo razón muy fuerte, que aquí no queda justificada.
  - severity: medium
    issue: Las notas [a] y [b] están colocadas en un lugar incorrecto.
    rationale: La nota sobre הוֹן עָתֵק debe anclarse a «riqueza duradera», no a «conmigo». La nota sobre צְדָקָה debe anclarse al término final correspondiente.
