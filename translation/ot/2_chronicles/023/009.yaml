id: 2CH.23.9
reference: 2 Chronicles 23:9
source:
  edition: WLC
  text: וַ/יִּתֵּן֩ יְהוֹיָדָ֨ע הַ/כֹּהֵ֜ן לְ/שָׂרֵ֣י הַ/מֵּא֗וֹת אֶת הַֽ/חֲנִיתִים֙ וְ/אֶת הַ/מָּגִנּוֹת֙ וְ/אֶת הַ/שְּׁלָטִ֔ים אֲשֶׁ֖ר לַ/מֶּ֣לֶךְ דָּוִ֑יד אֲשֶׁ֖ר בֵּ֥ית הָ/אֱלֹהִֽים־־־׃
translation:
  text: Then Jehoiada the priest gave to the commanders of hundreds the spears[a], the shields, and the large shields that belonged to King David[c][b], which were in the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the captains of hundreds.' The Hebrew refers to military officers over units of one hundred.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew distinguishes between 'shields' and another defensive item here rendered 'large shields.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the temple of God.' Literally, 'the house of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - handed over
  - distributed
  lexicon: HALOT
  rationale: Common narrative use of נתן with straightforward transfer of objects; 'gave' is the most natural and sufficiently formal rendering.
- source_word: יְהוֹיָדָע הַכֹּהֵן
  chosen: Jehoiada the priest
  rationale: Personal name is transliterated per translation philosophy; appositional title translated.
- source_word: לְשָׂרֵי הַמֵּאוֹת
  chosen: to the commanders of hundreds
  alternatives:
  - to the captains of hundreds
  - to the centurions
  lexicon: HALOT
  rationale: Literally 'princes/commanders of the hundreds,' a military rank over units of one hundred. 'Commanders of hundreds' preserves the Hebrew structure without importing specifically Roman associations that 'centurions' would suggest.
- source_word: הַחֲנִיתִים
  chosen: the spears
  alternatives:
  - the lances
  lexicon: HALOT
  rationale: Standard rendering for חניתים, a common weapon term; 'spears' is clear modern English.
- source_word: הַמָּגִנּוֹת
  chosen: the shields
  alternatives:
  - the bucklers
  lexicon: HALOT
  rationale: מגנים denotes shields generally. 'Bucklers' is archaic; 'shields' is readable modern English.
- source_word: הַשְּׁלָטִים
  chosen: the large shields
  alternatives:
  - the round shields
  - the quivers
  lexicon: HALOT
  rationale: This term likely denotes a larger type of shield distinct from מגנים. Rendering it 'large shields' preserves the distinction between the two defensive items. 'Quivers' is a less likely lexical proposal and is not adopted.
- source_word: אֲשֶׁר לַמֶּלֶךְ דָּוִיד
  chosen: that had belonged to King David
  alternatives:
  - that were King David's
  - which belonged to King David
  lexicon: HALOT
  rationale: The relative clause marks possession. 'Had belonged to' fits the narrative context of royal weapons preserved from David's time.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: בית האלהים is literally 'house of God.' While it refers to the temple complex, the more literal rendering preserves the Chronicler's diction.
