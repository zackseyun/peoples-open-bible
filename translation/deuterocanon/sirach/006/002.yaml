translation:
  text: Do not fall into the power of your own desire[a], lest your strength be consumed against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Do not fall into the hand of your soul''; the Greek parallel reads, ''Do not exalt yourself in the counsel of your soul, lest your soul be torn apart like a bull.'' The Hebrew second clause is difficult, so the translation follows the shared sense of warning against self-indulgent desire leading to ruin.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּפּוֹל
  chosen: Do not give yourself over
  alternatives:
  - Do not fall
  - Do not hand yourself over
  lexicon: HALOT
  rationale: The Hebrew literally reads 'do not fall,' but with בְּיַד ('into the hand of') it idiomatically conveys yielding oneself up or giving oneself over. This is supported by the Greek parallel μὴ ἐπάρῃς σεαυτὸν ἐν βουλῇ ψυχῆς σου, which points to self-directed indulgence rather than a literal fall.
- source_word: בְּיַד נַפְשְׁךָ
  chosen: to your own desire
  alternatives:
  - into the hand of yourself
  - to your own soul
  - to your own appetite
  lexicon: HALOT
  rationale: נפש in wisdom literature often denotes the inner self, appetite, or desire, not merely 'soul' in a later metaphysical sense. The Greek βουλῇ ψυχῆς σου ('the counsel/desire of your soul') clarifies that the warning concerns following one's own impulses. 'Your own desire' communicates this in natural English.
- source_word: וּתְעַבֶּה
  chosen: lest ... be torn apart
  alternatives:
  - and it will desire
  - and you will make thick/fat
  - and it will crave
  lexicon: HALOT
  rationale: The Hebrew form is textually difficult in this composite Geniza reading and does not yield a straightforward sense as transmitted. The Greek parallel ἵνα μὴ διαρπαγῇ ('lest it be torn apart/ravaged') provides a strong control on the clause's meaning. Because the source validation flags a major mismatch, the translation follows the Hebrew where intelligible and uses the Greek to resolve this crux honestly.
- source_word: חֵילֵךָ
  chosen: your strength
  alternatives:
  - your wealth
  - your force
  - your vigor
  lexicon: HALOT
  rationale: חיל can mean strength, force, or wealth depending on context. Here, under the influence of the Greek's repeated ψυχή and the image of self-destruction, 'strength' best captures the sense of one's vital power being ruined by unchecked desire. 'Wealth' is possible lexically but fits the context less well.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: The preposition על commonly means 'upon,' but in this warning context 'against you' brings out the reflexive, self-destructive force of the line in idiomatic English.
