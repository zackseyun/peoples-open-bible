revisions:
- from: Yahvé reina[a]; que la tierra se alegre; que las muchas costas[b] se regocijen.
  to: Yahvé reina; que la tierra se alegre; que las numerosas costas lejanas[a] se regocijen.
  rationale: Se elimina la nota innecesaria sobre «reina» y se mejora «las muchas costas» a «las numerosas costas lejanas» para lograr un español más natural y una mejor representación de אִיִּים en este contexto poético universal, conservando en nota la alternativa «islas».
  reviewer_model: gpt-5.4
