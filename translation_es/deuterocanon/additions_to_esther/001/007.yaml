review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la enumeración griega y la mayoría de las decisiones auditadas del POB: conserva la fuerza interjectiva de ἰδοὺ, distingue σκότους/γνόφου, reproduce la serie de calamidades y mantiene la amplitud posible de γῆ. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada, porque el texto principal ya dice «sobre la tierra» y la nota repite esa misma lectura en lugar de ofrecer la alternativa «sobre el país» o «sobre la tierra/land».'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Y he aquí» funciona, aunque es algo solemne; la cadena «tinieblas y oscuridad, de aflicción y angustia, de miseria y gran tumulto» fluye bien. La principal falla de calidad editorial está en la nota, que resulta redundante y confusa al no presentar una alternativa real al lector.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías/Cristo, espíritu, etc. Las decisiones léxicas principales son compatibles con el rastro inglés. Conviene ajustar únicamente la nota de γῆ para que refleje fielmente la ambigüedad «tierra / país».
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de ofrecer una alternativa real para γῆ.
    rationale: El inglés documenta «upon the earth» con la alternativa «upon the land». En español, si el texto principal usa «sobre la tierra», la nota no debe decir otra vez «O ‘sobre la tierra’», sino una opción como «O ‘sobre el país’» o «O ‘sobre la tierra/land’». Tal como está, la nota no cumple su función lexical_alternative.
  revised_spanish_text: Y he aquí[a], un día de tinieblas y oscuridad, de aflicción y angustia, de miseria y gran tumulto sobre la tierra.
  revised_footnotes:
  - marker: a
    text: O «sobre el país». La palabra griega γῆ puede referirse tanto a la tierra en general como a una región o país concreto.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al griego y al POB inglés. Solo se corrige la nota al pie para que presente una alternativa léxica auténtica para γῆ, en vez de repetir la lectura ya adoptada en el texto.
