translation:
  language: es
  text: Entonces los dos hombres que tienen la disputa[a] comparecerán delante de Yahvé, delante de los sacerdotes y de los jueces que estén en funciones en aquellos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que tienen la disputa»; alternativamente, «que tienen el caso» o «entre quienes está la disputa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמְדוּ
  english_pob_choice: then ... shall stand
  chosen_spanish: se presentarán
  alternatives_spanish:
  - se pondrán de pie
  - comparecerán
  lexicon: HALOT
  rationale: En un contexto judicial, el hebreo expresa comparecer formalmente ante una autoridad. En español, 'se presentarán' comunica mejor la acción procesal sin perder la solemnidad del acto.
- source_word: שְׁנֵי הָאֲנָשִׁים
  english_pob_choice: the two men
  chosen_spanish: los dos hombres
  alternatives_spanish:
  - las dos partes
  - los dos litigantes
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino plural; 'hombres' conserva esa referencia. 'Partes' aclararía el sentido legal, pero suaviza la forma concreta del original.
- source_word: אֲשֶׁר לָהֶם הָרִיב
  english_pob_choice: who have the dispute
  chosen_spanish: que tienen la disputa
  alternatives_spanish:
  - entre quienes está la disputa
  - que tienen el caso
  - que están en disputa
  lexicon: HALOT
  rationale: La construcción hebrea puede leerse como posesión o pertenencia del pleito. 'Tienen la disputa' mantiene de manera bastante directa esa relación sin convertirla prematuramente en 'caso'.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se preserva el nombre divino como 'Yahvé' según la convención del proyecto, y 'delante de' conserva el matiz de comparecencia en presencia judicial y cultual.
- source_word: לִפְנֵי הַכֹּהֲנִים וְהַשֹּׁפְטִים
  english_pob_choice: before the priests and the judges
  chosen_spanish: delante de los sacerdotes y de los jueces
  alternatives_spanish:
  - ante los sacerdotes y los jueces
  lexicon: HALOT
  rationale: '''Sacerdotes'' y ''jueces'' reproducen fielmente los oficios mencionados. Se mantiene la repetición de la preposición para reflejar la estructura del hebreo y el paralelo con ''delante de Yahvé''.'
- source_word: אֲשֶׁר יִהְיוּ בַּיָּמִים הָהֵם
  english_pob_choice: who are in office in those days
  chosen_spanish: que estén en aquellos días
  alternatives_spanish:
  - que estén en funciones en aquellos días
  - que estén en el cargo en aquellos días
  - que se encuentren en aquellos días
  lexicon: HALOT
  rationale: La frase hebrea identifica a los funcionarios contemporáneos. 'Que estén en aquellos días' es breve y natural en español; el sentido de ejercicio del cargo queda implícito por el contexto judicial.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en un contexto judicial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: Se sigue la convención del POB en español para el Tetragrámaton. 'Yahvé' preserva el nombre propio del pacto, mientras que 'el Señor' ocultaría esa forma directa en el texto base.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Matiz de la expresión final אֲשֶׁר יִהְיוּ בַּיָּמִים הָהֵם
  english_pob_reading: who are in office in those days
  chosen_spanish_reading: que estén en aquellos días
  alternative_spanish_readings:
  - que estén en funciones en aquellos días
  - que estén en el cargo en aquellos días
  rationale: El hebreo señala a los jueces/sacerdotes que existan en el tiempo de ese caso. En español se opta por una forma sobria y fiel, sin imponer una explicitación administrativa que el hebreo no dice de manera directa.
  doctrine_reference: HALOT / contexto legal de Deuteronomio 19
- issue: Posible ambigüedad de הָרִיב
  english_pob_reading: who have the dispute
  chosen_spanish_reading: que tienen la disputa
  alternative_spanish_readings:
  - que tienen el caso
  - que están en disputa
  rationale: '''Disputa'' conserva el campo semántico de רִיב y evita borrar la tensión entre conflicto y litigio. ''Caso'' sería más jurídico, pero menos cercano al sustantivo hebreo.'
  doctrine_reference: HALOT, ריב
translation_notes:
  revision_awareness: El auditorio inglés revisó la cláusula final desde 'are serving' a 'are in office' para dar un matiz más natural y formal. En español, se evitó una perífrasis administrativa demasiado moderna y se optó por 'que estén en aquellos días', que mantiene el referente temporal y el carácter oficial sin sobreespecificar.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Delante de'' se mantuvo como fórmula judicial-litúrgica para לִפְנֵי, en lugar de alternar con ''ante'' para no introducir variación innecesaria.'
  - '''Disputa'' se conservó para רִיב, manteniendo el campo semántico legal de la frase.'
  - 'La puntuación reproduce la progresión del hebreo: comparecencia, presencia divina, luego presencia ante autoridades humanas.'
