base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/016.yaml
  text: And it will no longer be for the house of Israel a source of confidence[a], bringing iniquity to remembrance when they turn after them[c][b]; then they will know that I am the Lord GOD.
  footnotes:
