translation:
  language: es
  text: Ahora bien, Laban tenía dos hijas; el nombre de la mayor era Lea[a], y el nombre de la menor era Raquel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “para Laban [había/eran] dos hijas”, una manera idiomática de decir “Laban tenía dos hijas”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְלָבָן
  english_pob_choice: Now Laban had
  chosen_spanish: Ahora bien, Laban tenía
  alternatives_spanish:
  - Y Laban tenía
  - Laban tenía
  lexicon: HALOT
  rationale: El hebreo usa una construcción posesiva idiomática (“para/a Laban”) que expresa pertenencia. En español, “tenía” comunica esa posesión de manera natural. “Ahora bien” reproduce el valor discursivo del waw inicial como transición narrativa, sin forzar una traducción mecánica de la conjunción.
- source_word: שְׁתֵּי בָנוֹת
  english_pob_choice: two daughters
  chosen_spanish: dos hijas
  alternatives_spanish:
  - dos hijas mujeres
  lexicon: HALOT
  rationale: 'La expresión es directa: numeral + sustantivo. “Hijas” es el equivalente natural y fiel en español.'
- source_word: שֵׁם
  english_pob_choice: the name of
  chosen_spanish: el nombre de
  alternatives_spanish:
  - se llamaba
  - fue llamada
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal repetida del hebreo, como hace la versión inglesa, para mantener transparencia estructural. “El nombre de” refleja mejor el patrón de identificación del texto fuente que una parapráfrasis más idiomática.
- source_word: הַגְּדֹלָה
  english_pob_choice: the older
  chosen_spanish: la mayor
  alternatives_spanish:
  - la mayor de edad
  - la mayor de las dos
  lexicon: HALOT
  rationale: En el contexto de dos hermanas, el adjetivo señala la hermana de mayor edad/estatus relativo. “Mayor” es la forma española más natural y precisa; “mayor” evita introducir una noción de “anciana” o “más grande” que no corresponde aquí.
- source_word: לֵאָה
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Leah
  lexicon: standard transliteration
  rationale: Se adopta la transliteración española usual “Lea”, acorde con el uso bíblico en español y la adaptación gráfica natural del nombre propio.
- source_word: הַקְּטַנָּה
  english_pob_choice: the younger
  chosen_spanish: la menor
  alternatives_spanish:
  - la más joven
  - la pequeña
  lexicon: HALOT
  rationale: Aquí el adjetivo describe relación de edad entre hermanas. “La menor” expresa con claridad la relación comparativa sin perder el sentido del hebreo.
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Rachel
  lexicon: standard transliteration
  rationale: Se usa la forma española asentada “Raquel”, que conserva identificación bíblica clara y es la transliteración habitual en español.
theological_decisions:
- issue: No hay cuestión doctrinal explícita; el punto es una identificación genealógica y descriptiva.
  english_pob_reading: The verse simply identifies Laban's two daughters and orders them by age.
  chosen_spanish_reading: El versículo simplemente identifica a las dos hijas de Laban y las ordena según edad/posición relativa.
  alternative_spanish_readings:
  - El versículo simplemente presenta dos hijas de Laban sin énfasis en el orden de edad.
  - El versículo podría entenderse solo como una lista de nombres.
  rationale: No se introduce carga doctrinal donde el hebreo no la presenta. Se preserva el valor relacional del comparativo (“mayor/menor”) sin sobreinterpretarlo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo entre el texto hebreo y la auditoría inglesa; no se registran revisiones aplicadas en la fuente inglesa. La decisión principal en español fue conservar la estructura repetida “el nombre de… y el nombre de…” y traducir la posesión idiomática hebrea con una forma natural en español.
  spanish_consistency_notes:
  - Se mantuvo el orden narrativo breve y paratáctico del hebreo.
  - 'Se usó la forma española habitual de los nombres propios bíblicos: Lea y Raquel.'
  - Se preservó la repetición de “el nombre de” para transparencia textual.
  - Se evitó “SEÑOR” u otra terminología no pertinente, porque el versículo no contiene el nombre divino.
  - Se eligió “la mayor/la menor” para reflejar relación de edad de manera clara y no técnica.
