translation:
  language: es
  text: 'Por ti mi corazón dice[a]: «Busquen mi rostro». Tu rostro, Yahvé[c][b], busco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo inicial es difícil y también puede entenderse: «A ti mi corazón dice» o, con un pequeño cambio de construal, «Mi corazón dice de ti: “Busquen su rostro”».'
    reason: alternative_reading
  - marker: b
    text: O «Tu presencia, Yahvé, busco». En hebreo, «rostro» suele incluir la idea de presencia personal.
    reason: lexical_alternative
  - marker: c
    text: O «buscaré». El verbo hebreo puede expresar resolución presente o intención futura.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  english_pob_choice: On your behalf
  chosen_spanish: En tu nombre
  alternatives_spanish:
  - A ti
  - Por ti
  - Con referencia a ti
  lexicon: HALOT
  rationale: El hebreo inicial es sintácticamente difícil. «En tu nombre» comunica en español la referencia dirigida a Yahvé sin endurecerla como un simple dativo, y conserva el matiz de que el corazón habla con respecto a él.
- source_word: אָמַר לִבִּי
  english_pob_choice: my heart says
  chosen_spanish: mi corazón dice
  alternatives_spanish:
  - mi corazón dijo
  - mi corazón ha dicho
  lexicon: HALOT
  rationale: Aunque el verbo es perfecto, en la poesía hebrea expresa una declaración viva o resolución presente. «Dice» suena natural en español y mantiene el valor discursivo inmediato.
- source_word: בַּקְּשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busquen
  alternatives_spanish:
  - Buscad
  - Busquen ustedes
  lexicon: HALOT
  rationale: El plural imperativo pide una forma plural clara en español. «Busquen» conserva la fuerza exhortativa de בקשׁ sin añadir matices no presentes en el texto.
- source_word: פָנָי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi presencia
  - mi cara
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal básica, pero «rostro» es más idiomático y digno en español que «cara». Además, preserva la repetición con «tu rostro» en el segundo hemistiquio.
- source_word: אֶת פָּנֶיךָ
  english_pob_choice: Your face
  chosen_spanish: Tu rostro
  alternatives_spanish:
  - Tu presencia
  - Tu cara
  lexicon: HALOT
  rationale: «Rostro» conserva la correspondencia léxica con פָנִים y permite notar que el hebreo usa la misma imagen en ambos miembros. «Presencia» se reserva para una nota por ser una interpretación posible, no la forma principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino y evita la sustitución titulada «SEÑOR».'
- source_word: אֲבַקֵּשׁ
  english_pob_choice: I seek
  chosen_spanish: busco
  alternatives_spanish:
  - buscaré
  - estoy buscando
  lexicon: HALOT
  rationale: El imperfecto hebreo puede leerse como resolución presente o futura. «Busco» funciona naturalmente en español y deja abierta la posibilidad de intención futura, que se documenta en nota.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: La política del proyecto pide traducir el Tetragrámaton con el nombre divino. «Yahvé» mantiene la referencia al nombre de pacto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cláusula inicial difícil לְךָ אָמַר לִבִּי
  english_pob_reading: On your behalf my heart says, “Seek my face.”
  chosen_spanish_reading: 'En tu nombre mi corazón dice: «Busquen mi rostro».'
  alternative_spanish_readings:
  - 'A ti mi corazón dice: «Busquen mi rostro».'
  - 'Mi corazón dice de ti: «Busquen su rostro».'
  - 'Mi corazón dice con referencia a ti: «Busquen mi rostro».'
  rationale: La sintaxis hebrea es elíptica y admite varias construals. Se conserva el texto masorético sin emendarlo y se deja visible la dificultad mediante una formulación que no resuelve en exceso la relación entre el corazón y Yahvé.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Sentido de פָנִים como 'rostro' o 'presencia'
  english_pob_reading: Your face / Your presence
  chosen_spanish_reading: Tu rostro
  alternative_spanish_readings:
  - Tu presencia
  rationale: «Rostro» mantiene la repetición léxica con «mi rostro» y reproduce la imagen concreta del hebreo. «Presencia» es un sentido válido, pero se conserva para nota porque en el texto principal la repetición es parte del efecto poético.
  doctrine_reference: HALOT פָנִים; nota lexical del POB inglés
- issue: Valor temporal de אֲבַקֵּשׁ
  english_pob_reading: I seek / I will seek
  chosen_spanish_reading: busco
  alternative_spanish_readings:
  - buscaré
  rationale: El hebreo permite presente de resolución o futuro. «Busco» suena natural en el español poético y no elimina la posibilidad de futuro, que queda registrada como alternativa.
  doctrine_reference: HALOT בקשׁ; nota lexical del POB inglés
translation_notes:
  revision_awareness: 'Se verificó el último pase de revisión: no hubo cambios necesarios y el consenso de auditoría fue alto. La redacción española mantiene la ambigüedad sintáctica documentada, conserva la repetición de פָנִים mediante «rostro» y sigue la convención del proyecto para יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el Tetragrámaton conforme a la política del proyecto.
  - Se preservó la repetición «mi rostro / tu rostro» para reflejar el paralelismo hebreo.
  - 'La puntuación de cita se ajustó al español: dos puntos antes de la cita y comillas angulares.'
  - Se usó «busco» en primera persona para reflejar la resolución poética sin cerrar el matiz futuro.
