  to: Pero si lo golpeó con un instrumento de hierro y murió, es un asesino[a]; el asesino ciertamente debe morir.
  rationale: Se mantiene la mayor parte del borrador porque representa bien el caso legal y la clasificación de רֹצֵחַ como «asesino». Se revisa solo la cláusula penal final para reflejar mejor מוֹת יוּמַת, evitando el matiz añadido de una mera sentencia judicial en «ser condenado a muerte». «Ciertamente debe morir» preserva mejor la fuerza enfática y legal del hebreo en español natural y digno.
