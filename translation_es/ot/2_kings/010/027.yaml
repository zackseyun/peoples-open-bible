translation:
  language: es
  text: Derribaron el pilar de Baal, derribaron la casa de Baal[a], y la hicieron una letrina hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Baal». El hebreo dice literalmente «la casa de Baal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּצוּ
  english_pob_choice: they tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - demolieron
  - tumbaron
  lexicon: HALOT
  rationale: נָתַץ en este contexto expresa destrucción forzada de una estructura u objeto cultual. «Derribaron» comunica con naturalidad esa acción y funciona bien tanto para el pilar como para la casa.
- source_word: מַצְּבַת
  english_pob_choice: the pillar
  chosen_spanish: el pilar
  alternatives_spanish:
  - la piedra erguida
  - el poste
  lexicon: HALOT
  rationale: מַצֵּבָה puede referirse a una piedra/columna ritual erigida. «Pilar» es claro y suficientemente amplio en español; mantiene el sentido de objeto erguido sin añadir matices no explicitados por el texto.
- source_word: הַבָּעַל
  english_pob_choice: of Baal
  chosen_spanish: de Baal
  alternatives_spanish:
  - del Baal
  - del dios Baal
  lexicon: HALOT
  rationale: Baal es nombre/título propio de la deidad cananea; se translitera como «Baal» en español. «De Baal» reproduce la relación posesiva del hebreo sin forzar una explicación adicional.
- source_word: בֵּית הַבַּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». Aunque en contexto cultual puede equivaler a «templo», «casa de Baal» preserva mejor la expresión hebrea y deja visible la tensión léxica documentada en la tradición de traducción.
- source_word: וַיְשִׂמֻהוּ ל/מחראות
  english_pob_choice: made it a latrine
  chosen_spanish: la hicieron una letrina
  alternatives_spanish:
  - la convirtieron en letrina
  - la hicieron retrete
  lexicon: HALOT
  rationale: שׂוּם con complemento preposicional expresa hacer/poner algo en otra condición. «La hicieron una letrina» conserva el valor causativo y el tono deliberado de profanación. Se evita un eufemismo para mantener la fuerza del texto.
- source_word: למחראות
  english_pob_choice: a latrine
  chosen_spanish: una letrina
  alternatives_spanish:
  - un retrete
  - un excusado
  lexicon: HALOT
  rationale: El término designa un lugar para excrementos o una letrina. «Letrina» es el equivalente moderno más claro y conserva la degradación intencional del santuario.
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es el giro idiomático hebreo que indica la persistencia de la condición hasta el presente narrativo. «Hasta hoy» es natural, sobrio y fiel al modismo.
theological_decisions:
- issue: Naturaleza del sitio de Baal
  english_pob_reading: the house of Baal
  chosen_spanish_reading: la casa de Baal
  alternative_spanish_readings:
  - el templo de Baal
  rationale: No hay diferencia doctrinal, pero «casa» mantiene el hebreo literal y evita interpretar de antemano la arquitectura del santuario. La forma elegida deja visible el registro cultual y el gesto de deshonra del relato.
  doctrine_reference: Translation philosophy §1, §5
- issue: Intensidad de la profanación
  english_pob_reading: made it a latrine
  chosen_spanish_reading: la hicieron una letrina
  alternative_spanish_readings:
  - la convirtieron en letrina
  - la hicieron retrete
  rationale: El texto subraya la profanación total del lugar de Baal. «Letrina» comunica esa deshonra de manera directa en español contemporáneo, sin suavizar el efecto narrativo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo WLC y el aparato de la POB en inglés. La solución mantiene la oposición entre מַצֵּבָה y בֵּית הַבַּעַל, preserva la literalidad de בית como «casa» en el cuerpo principal y deja la alternativa «templo» como nota, y conserva la crudeza de למחראות con «letrina». No se detectaron revisiones textuales pendientes en el registro inglés; por eso la propuesta sigue el estado más reciente sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usa «Baal» de forma consistente como transliteración del nombre/título de la deidad.
  - Se evita «SEÑOR» y «templo» en el texto principal para no borrar la tensión léxica documentada por la POB.
  - «Hasta hoy» mantiene el valor idiomático de עַד הַיּוֹם en español natural.
  - La secuencia verbal conserva el paralelismo de dos derribos y una acción final de profanación.
