revisions:
- from: Así pues, de este modo falleció, dejando su propia muerte como ejemplo de valentía y memorial de virtud, no solo para los jóvenes, sino también para la mayoría de la nación.
  to: Así pues, de este modo falleció, dejando su propia muerte como ejemplo de valentía y recuerdo[a] de virtud, no solo para los jóvenes, sino también para la mayor parte de la nación.
  rationale: 'Se propone una reparación menor para mejorar la naturalidad del español sin apartarse del griego ni del razonamiento del POB: cambiar «memorial» por «recuerdo» en el texto principal, conservando «memorial» en nota como alternativa válida, y ajustar «la mayoría de la nación» a «la mayor parte de la nación» por mejor idiomaticidad contextual. No se requiere una revisión doctrinal o de fondo.'
