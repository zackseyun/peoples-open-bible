revisions:
- from: Así que Saúl y sus hombres fueron a buscarlo. Y se lo hicieron saber a David[a]; entonces él bajó a la peña y se quedó en el desierto de Maón. Cuando Saúl lo oyó, persiguió a David en el desierto de Maón.
  to: Entonces Saúl y sus hombres fueron a buscarlo. Y le dijeron a David que Saúl venía, así que él bajó a la peña[a] y se quedó en el desierto de Maón. Cuando Saúl lo oyó, persiguió a David en el desierto de Maón.
  rationale: Se reubica correctamente la nota en «peña», se simplifica וַיַּגִּדוּ לְדָוִד con una formulación más directa y natural en español narrativo, y se ajusta el conector inicial para una mejor fluidez bíblica sin alterar el sentido. Se añade «que Saúl venía» para explicitar el contenido implícito de la información comunicada, coherente con el contexto inmediato y con «lo oyó» en la cláusula siguiente.
  reviewer_model: gpt-5.4
