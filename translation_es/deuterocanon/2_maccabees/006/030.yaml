translation:
  language: es
  text: 'Pero, estando ya para morir bajo los golpes, gimió y dijo: «Señor, tú que tienes el santo conocimiento, sabes bien que, aunque podía ser librado de la muerte[a], sufro crueles dolores en mi cuerpo mientras soy azotado; pero en mi alma padezco con gusto estas cosas por temor de él[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ser librado de la muerte» significa quedar exento de la ejecución o escapar de la muerte por ceder.
    reason: lexical_alternative
  - marker: b
    text: O «por reverencia hacia él». El griego dice «temor», que puede incluir temor reverente hacia Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλων ... τελευτᾷν
  english_pob_choice: as he was about to die
  chosen_spanish: estando ya para morir
  alternatives_spanish:
  - a punto de morir
  - cuando estaba por morir
  lexicon: LSJ
  rationale: La construcción perifrástica expresa inminencia. «Estando ya para morir» suena natural en español y conserva el matiz de cercanía de la muerte.
- source_word: ταῖς πληγαῖς
  english_pob_choice: under the blows
  chosen_spanish: bajo los golpes
  alternatives_spanish:
  - por los golpes
  - a causa de los golpes
  lexicon: LSJ
  rationale: El dativo con τελευτᾷν indica circunstancia o medio del morir. «Bajo los golpes» reproduce bien la escena del martirio sin volverla más técnica de lo necesario.
- source_word: ἀναστενάξας
  english_pob_choice: he groaned
  chosen_spanish: lanzó un gemido
  alternatives_spanish:
  - gimió
  - suspiró profundamente
  lexicon: LSJ
  rationale: El participio señala una exhalación audible de dolor. «Lanzó un gemido» comunica ese matiz con dignidad narrativa en español.
- source_word: Τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: Al Señor
  alternatives_spanish:
  - al Señor
  - ante el Señor
  lexicon: LSJ
  rationale: Se conserva la forma de dirección personal del discurso. Aunque el texto griego usa dativo, en español la apertura natural del discurso es «Al Señor».
- source_word: τῷ τὴν ἁγίαν γνῶσιν ἔχοντι
  english_pob_choice: who has the holy knowledge
  chosen_spanish: que tiene el santo conocimiento
  alternatives_spanish:
  - que posee el santo conocimiento
  - que conoce la santa verdad
  lexicon: LSJ
  rationale: Se mantiene «conocimiento» para γνῶσις y «santo» para ἁγίαν, evitando sustituir el sustantivo por «verdad» o explicarlo de más.
- source_word: φανερὸν ἐστὶν
  english_pob_choice: it is clear
  chosen_spanish: le es evidente
  alternatives_spanish:
  - es claro
  - es manifiesto
  lexicon: LSJ
  rationale: La impersonalidad del griego se expresa de forma natural en español con «le es evidente», que conserva el carácter declarativo.
- source_word: δυνάμενος ἀπολυθῆναι τοῦ θανάτου
  english_pob_choice: though I could have been released from death
  chosen_spanish: aunque podía ser librado de la muerte
  alternatives_spanish:
  - aunque podía escapar de la muerte
  - aunque podía ser liberado de la muerte
  lexicon: LSJ
  rationale: ἀπολυθῆναι permite «librar/liberar» o «soltar». Se prefiere «ser librado de la muerte» por su fluidez y por conservar la idea de evitar la ejecución o quedar exento de ella.
- source_word: σκληρὰς ... ἀλγηδόνας
  english_pob_choice: cruel pains
  chosen_spanish: crueles dolores
  alternatives_spanish:
  - dolores severos
  - dolores crueles
  lexicon: LSJ
  rationale: σκληράς intensifica la dureza de ἀλγηδόνας. «Crueles dolores» conserva el efecto áspero y es idiomático en español.
- source_word: κατὰ σῶμα
  english_pob_choice: in my body
  chosen_spanish: en mi cuerpo
  alternatives_spanish:
  - corpóreamente
  - según el cuerpo
  lexicon: LSJ
  rationale: La oposición con κατὰ ψυχὴν se expresa claramente con «en mi cuerpo», manteniendo el contraste cuerpo/alma.
- source_word: μαστιγούμενος
  english_pob_choice: while being scourged
  chosen_spanish: mientras soy azotado
  alternatives_spanish:
  - mientras me flagelan
  - bajo el azote
  lexicon: LSJ
  rationale: El participio especifica el modo del sufrimiento físico. «Azotado» es claro y suficientemente fuerte en español, sin perder la gravedad del castigo.
- source_word: κατὰ ψυχὴν
  english_pob_choice: in my soul
  chosen_spanish: en mi alma
  alternatives_spanish:
  - interiormente
  - en mi espíritu
  lexicon: LSJ
  rationale: Se preserva el contraste antropológico explícito del griego. «Alma» reproduce ψυχή de manera directa y comprensible.
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - alegremente
  - de buen grado
  lexicon: LSJ
  rationale: El adverbio expresa aceptación voluntaria y no meramente resignada. «Con gusto» es natural en español y conserva el matiz positivo.
- source_word: διὰ τὸν αὐτοῦ φόβον
  english_pob_choice: because of fear of him
  chosen_spanish: por temor de él
  alternatives_spanish:
  - por reverencia hacia él
  - por miedo de él
  lexicon: LSJ
  rationale: Se conserva la tensión entre temor y reverencia sin resolverla de antemano. «Temor» mantiene el término más cercano al griego φόβος y es coherente con la lectura teológica del pasaje.
theological_decisions:
- issue: φόβος aplicado al Señor
  english_pob_reading: fear of him
  chosen_spanish_reading: por temor de él
  alternative_spanish_readings:
  - por reverencia hacia él
  - por miedo de él
  rationale: El contexto probablemente apunta a temor reverente, pero el griego dice φόβος y el POB inglés preserva esa tensión. En español se mantiene «temor» para no suavizar prematuramente el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Contraste entre σῶμα y ψυχή
  english_pob_reading: in my body / in my soul
  chosen_spanish_reading: en mi cuerpo / en mi alma
  alternative_spanish_readings:
  - corpóreamente / interiormente
  - en mi cuerpo / en mi espíritu
  rationale: El versículo contrapone sufrimiento corporal y aceptación interior. «Cuerpo» y «alma» conservan el paralelismo antropológico sin reinterpretarlo psicológicamente.
  doctrine_reference: DOCTRINE.md §Anthropology and lexical restraint
translation_notes:
  revision_awareness: 'El texto sigue de cerca el punto de acuerdo alto del audit trail inglés: se mantienen la inminencia de la muerte, el contraste cuerpo/alma, el matiz de φόβος y el sentido de ἀπολυθῆναι como posibilidad de evitar la muerte. No se introdujeron cambios sustantivos respecto del enfoque revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el texto griego dice κύριος y se traduce conforme al discurso dirigido a «el Señor».
  - Se preserva «alma» para ψυχή por su contraste directo con «cuerpo», sin reducirlo a mera emoción.
  - Se mantiene «temor» en lugar de «reverencia» en el cuerpo principal para no borrar la tensión léxica documentada.
