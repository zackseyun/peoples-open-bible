    rationale: En español, ‘embarazado’ con ‘vientre’ resulta torpe y poco idiomático; además, la propia nota reconoce ‘embarazada para siempre’ como alternativa mejor. El hebreo apunta al órgano materno en estado continuo de embarazo; conviene una formulación natural y fiel.
  - severity: low
