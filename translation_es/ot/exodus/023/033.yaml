translation:
  language: es
  text: No habitarán en tu tierra[a], no sea que te hagan pecar contra mí; porque si sirves a sus dioses[b], te será un lazo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «residirán», «morarán». El hebreo יֵשְׁבוּ puede expresar vivir o asentarse de manera continua.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pues servirías a sus dioses». La conjunción hebrea puede leerse de manera explicativa o como el resultado probable de la situación.'
    reason: alternative_reading
  - marker: c
    text: «Lazo» traduce el hebreo moqesh, una metáfora de trampa o cepo que conduce a ruina espiritual o apostasía.
    reason: cultural_note
lexical_decisions:
- source_word: יֵשְׁבוּ
  english_pob_choice: dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - vivirán
  - residirán
  lexicon: HALOT
  rationale: En este contexto de ocupación territorial, 'habitar' comunica residencia continua y suena natural en español bíblico moderno. Evita la rigidez de un calco y conserva el valor de permanencia del verbo hebreo.
- source_word: בְּאַרְצְךָ
  english_pob_choice: in your land
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - en tu país
  - en tu territorio
  lexicon: HALOT
  rationale: '''Tierra'' mantiene el sentido covenantal y territorial de אֶרֶץ mejor que ''país'', y encaja con el registro bíblico de Éxodo.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de modo que no
  lexicon: HALOT
  rationale: '''No sea que'' reproduce bien la fuerza preventiva y de advertencia del hebreo, con un tono natural en español.'
- source_word: יַחֲטִיאוּ אֹתְךָ לִי
  english_pob_choice: they cause you to sin against me
  chosen_spanish: te hagan pecar contra mí
  alternatives_spanish:
  - te hagan caer en pecado contra mí
  - te lleven a pecar contra mí
  lexicon: HALOT
  rationale: El Hiphil de חטא es causativo, por eso se traduce con 'hagan pecar'. 'Contra mí' conserva el valor ético-relacional de לִי, que no debe diluirse en un mero 'para mí'.
- source_word: תַעֲבֹד אֶת אֱלֹהֵיהֶם
  english_pob_choice: if you serve their gods
  chosen_spanish: si sirves a sus dioses
  alternatives_spanish:
  - si adoras a sus dioses
  - si rindes servicio a sus dioses
  lexicon: HALOT
  rationale: '''Servir'' mantiene el lenguaje de lealtad y culto que expresa עבד en contextos idolátricos. ''Dioses'' traduce de forma directa אֱלֹהֵיהֶם sin suavizar la polémica.'
- source_word: יִהְיֶה לְךָ לְמוֹקֵשׁ
  english_pob_choice: it will surely become a snare to you
  chosen_spanish: sin duda te será una trampa
  alternatives_spanish:
  - te será una trampa
  - llegará a ser una trampa para ti
  lexicon: HALOT
  rationale: מוֹקֵשׁ designa una trampa o lazo con valor metafórico de ruina espiritual. 'Trampa' es claro en español; 'sin duda' refleja el matiz enfático del resultado, aunque sin añadir un adverbio explícito en el hebreo.
theological_decisions:
- issue: Alcance del peligro advertido
  english_pob_reading: The verse warns specifically against covenantal unfaithfulness through idolatrous service to other gods.
  chosen_spanish_reading: La advertencia se mantiene centrada en la infidelidad del pacto mediante el servicio idólatra a otros dioses.
  alternative_spanish_readings:
  - Una advertencia general contra la influencia moral de vecinos extranjeros
  - Una prohibición meramente étnica o cultural
  rationale: 'El último miembro de la frase define el pecado en cuestión: servir a sus dioses. La traducción conserva esa especificidad y evita generalizar el texto hacia mera convivencia cultural o separación étnica.'
  doctrine_reference: Mantener la tensión teológica del texto; no ampliar el alcance más allá de la evidencia inmediata.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y el pasaje hebreo. No se observaron cambios de revisión pendientes; la lectura mantiene la relación causal del Hiphil, la advertencia de פֶּן y la posibilidad exegética de כִּי como explicación o consecuencia.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito, por lo que no se inserta.
  - Se mantuvo 'dioses' en plural para אֱלֹהֵיהֶם, sin suavizar el tono polémico del texto.
  - '''Trampa'' conserva el valor metafórico de moqesh sin convertirlo en una explicación interpretativa más amplia.'
