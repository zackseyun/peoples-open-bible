translation:
  language: es
  text: 'Esto es lo que Yahvé ha mandado: “Recojan de eso, cada uno según lo que coma; un omer por cabeza[a], según el número de las personas que tengan. Cada uno tomará para los que están en su tienda.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., “un omer por cabeza”.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the thing
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la palabra
  lexicon: HALOT
  rationale: En este contexto de una instrucción concreta, דָּבָר funciona como 'cosa' o 'asunto'. 'La cosa' sigue de cerca la lectura auditada del inglés ('the thing') y mantiene el tono formulaico sin forzar 'la palabra', que en español puede sonar más abstracto o desviado del objeto concreto mandado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto pide renderizar el nombre divino como 'Yahvé'. Se conserva el nombre propio del pacto, en lugar de sustituirlo por un título.
- source_word: לִקְטוּ
  english_pob_choice: Gather
  chosen_spanish: Recojan
  alternatives_spanish:
  - Recojan y junten
  - Junten
  lexicon: HALOT
  rationale: לקט se refiere a recoger o reunir alimento. 'Recojan' es natural en español y preserva el mandato distributivo dirigido al grupo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  lexicon: HALOT
  rationale: El pronombre retoma el maná en contexto. 'De ello' evita género indebido en español y conserva el referente impersonal.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ distributivamente. 'Cada uno' comunica ese valor sin imponer masculino genérico en la superficie del español.
- source_word: לְפִי אָכְלוֹ
  english_pob_choice: according to his eating
  chosen_spanish: según lo que coma
  alternatives_spanish:
  - según su comer
  - según su necesidad de comer
  lexicon: HALOT
  rationale: La expresión idiomática apunta a la porción necesaria para consumir. 'Según lo que coma' mantiene la referencia al acto de comer y resulta idiomático en español, sin perder el carácter distributivo.
- source_word: עֹמֶר
  english_pob_choice: an omer
  chosen_spanish: un omer
  alternatives_spanish:
  - una medida de omer
  lexicon: HALOT
  rationale: Se translitera la unidad de medida, porque no existe un equivalente moderno seguro y la precisión histórica es importante.
- source_word: לַגֻּלְגֹּלֶת
  english_pob_choice: per person
  chosen_spanish: por cabeza
  alternatives_spanish:
  - por persona
  - por cabeza
  lexicon: HALOT
  rationale: Literalmente significa 'por cabeza/skull'. 'Por cabeza' conserva la imagen hebrea y, en español, es una expresión comprensible para el reparto por individuo.
- source_word: מִסְפַּר נַפְשֹׁתֵיכֶם
  english_pob_choice: according to the number of your persons
  chosen_spanish: según el número de sus personas
  alternatives_spanish:
  - según el número de ustedes
  - según el número de sus vidas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa personas/vidas contables, no 'alma' en sentido abstracto. 'Personas' conserva el sentido de enumeración, y 'sus' refleja el plural colectivo dirigido a la comunidad.
- source_word: לַאֲשֶׁר בְּאָהֳלוֹ
  english_pob_choice: for those who are in his tent
  chosen_spanish: para los que están en su tienda
  alternatives_spanish:
  - para quienes están en su tienda
  - para los de su tienda
  lexicon: HALOT
  rationale: La frase señala a los que pertenecen o están presentes en la tienda de cada hombre. 'Están en su tienda' mantiene la imagen concreta y evita una paráfrasis social más interpretativa como 'hogar'.
- source_word: תִּקָּחוּ
  english_pob_choice: shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomarán
  - tomaréis
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es segunda persona plural, el español fluye mejor al reexpresar distributivamente con 'cada uno tomará'. Se conserva la fuerza imperativa y el alcance comunitario.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transparentar el Tetragrama con un nombre propio y no con un sustituto reverencial. 'Yahvé' corresponde al estándar español del proyecto y preserva la referencia al nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: נַפְשֹׁתֵיכֶם y el valor de 'personas'
  english_pob_reading: according to the number of your persons
  chosen_spanish_reading: según el número de sus personas
  alternative_spanish_readings:
  - según el número de sus almas
  - según el número de ustedes
  rationale: Se evita traducir נֶפֶשׁ como 'alma', porque aquí la unidad es contable e individual. 'Personas' preserva el sentido concreto y reduce el riesgo de una lectura doctrinal ajena al contexto.
  doctrine_reference: Lexical decision guided by Hebrew usage in counting contexts
translation_notes:
  revision_awareness: El antecedente inglés pasó de una redacción más literal con 'the word' y 'each man' a 'the thing' y 'each one'. La versión española sigue esa revisión al preferir 'la cosa' y 'cada uno', manteniendo a la vez la transparencia del mandato y el sentido distributivo. También se conservó la medida 'omer' y la imagen hebrea de 'por cabeza'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrama, conforme al estándar del proyecto.
  - Se usa 'cada uno' para el distributivo de אִישׁ, evitando un masculino genérico innecesario.
  - '''Personas'' traduce נֶפֶשׁ en contexto de conteo, no ''alma''.'
  - '''Omer'' permanece transliterado como unidad de medida técnica.'
  - La nota al pie conserva la alternativa literal 'por cabeza', porque la frase española principal la mantiene explícitamente.
