translation:
  language: es
  text: Porque no dejó a Joacaz gente alguna, sino cincuenta jinetes, diez carros de guerra y diez mil soldados de a pie, pues el rey de Aram los había destruido y los había dejado como polvo al trillar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como polvo para ser trillado». El hebreo puede evocar la imagen de polvo bajo el proceso de trilla o pisoteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁאִיר
  english_pob_choice: left
  chosen_spanish: no dejó
  alternatives_spanish:
  - dejó
  - hizo quedar
  lexicon: HALOT
  rationale: El verbo causativo expresa que quedó remanente por acción de otro. En español, «no dejó» conserva la idea de no permitir que quedara más, con naturalidad.
- source_word: עָם
  english_pob_choice: people
  chosen_spanish: gente
  alternatives_spanish:
  - pueblo
  - personas
  lexicon: HALOT
  rationale: Aquí el hebreo dice literalmente «gente»; aunque el contexto es militar, la revisión inglesa volvió de «army» a «people» por mayor precisión. «Gente» mantiene esa base léxica sin perder el sentido de población o fuerza humana restante.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: Después de una negación, la construcción natural en español es «no... sino». Conserva el valor exclusivo de la frase hebrea.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballeros
  - hombres de a caballo
  lexicon: HALOT
  rationale: El término designa tropas montadas. «Jinetes» es claro en español moderno y conserva el rasgo de ir a caballo.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: En este contexto militar, el hebreo refiere carros de guerra. «Carros» es breve y comprensible; el contexto bélico lo especifica.
- source_word: רַגְלִי
  english_pob_choice: foot soldiers
  chosen_spanish: soldados de a pie
  alternatives_spanish:
  - infantería
  - combatientes de a pie
  lexicon: HALOT
  rationale: La expresión señala tropas que combaten a pie. «Soldados de a pie» es transparente y no fuerza un tecnicismo.
- source_word: אִבְּדָם
  english_pob_choice: had destroyed them
  chosen_spanish: los había destruido
  alternatives_spanish:
  - los había aniquilado
  - los había hecho perecer
  lexicon: HALOT
  rationale: El verbo intensivo expresa destrucción severa. «Había destruido» reproduce bien la fuerza sin añadir matices no requeridos.
- source_word: וַיְשִׂמֵם
  english_pob_choice: made them
  chosen_spanish: los había hecho
  alternatives_spanish:
  - los había puesto
  - los había reducido
  lexicon: HALOT
  rationale: El verbo שׂים con comparación indica «hacer» o «convertir en». «Los había hecho» permite completar la comparación siguiente en español natural.
- source_word: כֶּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo fino
  - como polvo de la tierra
  lexicon: HALOT
  rationale: La imagen compara a las tropas con polvo, subrayando la completa pulverización o insignificancia. «Polvo» funciona de manera inmediata en español; «tierra» sería menos exacto.
- source_word: לָדוּשׁ
  english_pob_choice: for threshing
  chosen_spanish: para trillarlo
  alternatives_spanish:
  - para ser trillado
  - para el trillo
  lexicon: HALOT
  rationale: La raíz דושׁ puede evocar trillar o pisotear. La revisión inglesa favoreció «at threshing»; en español, «para trillarlo» conserva la imagen agrícola sin oscurecer la metáfora de aplastamiento.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió dos puntos: volvió עָם a un valor más literal («people») y prefirió la imagen de «threshing» sobre «trampling» para לָדוּשׁ. La redacción española sigue esas revisiones: usa «gente» y «para trillarlo», manteniendo además la progresión militar explícita de jinetes, carros y soldados de a pie.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparece en el texto fuente; aquí no aparece.
  - Se usa «Aram» y no «Siria» para respetar la forma del fuente y la tradición auditada del proyecto.
  - La sintaxis conserva la negación + exclusividad con «no... sino», equivalente funcional de כִּי אִם.
