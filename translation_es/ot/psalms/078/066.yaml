translation:
  language: es
  text: Él hirió a sus enemigos por la espalda[a]; puso sobre ellos oprobio perpetuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hirió a sus enemigos hacia atrás». El hebreo אָחוֹר puede entenderse como indicación del lugar golpeado («por la espalda») o adverbialmente («hacia atrás»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: He struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hizo caer
  - hirió de golpe
  lexicon: HALOT
  rationale: El hebreo נכה puede expresar golpear, herir o abatir según contexto. ‘Hirió’ conserva la acción violenta pasada sin implicar necesariamente muerte, y suena natural en español bíblico moderno.
- source_word: צָרָיו
  english_pob_choice: his foes
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - sus foes
  lexicon: HALOT
  rationale: El sustantivo señala opositores hostiles. ‘Enemigos’ es la opción más clara y natural en español; ‘adversarios’ sería posible pero menos directa en este contexto poético.
- source_word: אָחוֹר
  english_pob_choice: backward
  chosen_spanish: hacia atrás
  alternatives_spanish:
  - atrás
  - por la espalda
  lexicon: HALOT
  rationale: El término puede leerse adverbialmente como dirección del movimiento (‘hacia atrás’) o como lugar golpeado. La forma elegida mantiene abierta la imagen de retroceso y evita añadir una localización explícita no requerida por el hebreo.
- source_word: חֶרְפַת עוֹלָם
  english_pob_choice: everlasting disgrace
  chosen_spanish: vergüenza perpetua
  alternatives_spanish:
  - oprobio perpetuo
  - deshonra eterna
  lexicon: HALOT
  rationale: La construcción comunica reproche público duradero. ‘Vergüenza’ comunica bien el matiz social en español; ‘perpetua’ refleja עוֹלָם como duración continua en el contexto, sin forzar una idea filosófica de eternidad absoluta.
- source_word: נָתַן לָמוֹ
  english_pob_choice: he put on them
  chosen_spanish: puso sobre ellos
  alternatives_spanish:
  - les puso
  - impuso sobre ellos
  - echó sobre ellos
  lexicon: HALOT
  rationale: נתן + ל puede funcionar idiomáticamente como ‘poner/imponer sobre’. ‘Puso sobre ellos’ reproduce esa fuerza causal de manera natural en español y mantiene la imagen de una carga o estado impuesto.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: se conservó la ambigüedad de אָחוֹר con una nota, y se evitó intensificar וַיַּךְ a ‘mató’ o ‘derribó’, ya que el verso no lo afirma. La frase final refleja el idiomatismo de נתן לָמוֹ como imposición de vergüenza duradera.'
  spanish_consistency_notes:
  - Se prefirió ‘vergüenza perpetua’ por coherencia con el registro poético y porque ‘oprobio’ puede sonar más arcaico sin añadir precisión adicional.
  - Se evitó ‘SEÑOR’ o sustituciones teológicas porque no aparece el Tetragrámaton en este versículo.
  - ‘Enemigos’ se usa aquí como equivalente natural de ‘foes’ sin perder la hostilidad inherente del término hebreo.
