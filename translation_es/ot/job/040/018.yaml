translation:
  language: es
  text: Sus huesos son tubos de bronce[a]; su armazón es como barras de hierro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘canales de bronce’ para אֲפִיקֵי נְחוּשָׁה; el hebreo puede enfatizar conductos o canales más que específicamente ‘tubos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘sus huesos son como barras de hierro’ para גְּרָמָיו כִּמְטִיל בַּרְזֶל; גְּרָמָיו también puede traducirse ‘sus huesos’, preservando un paralelismo más estrecho con la primera cola.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצָמָיו
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - su armazón
  - su estructura ósea
  lexicon: HALOT
  rationale: El hebreo עֶצֶם significa normalmente ‘hueso/huesos’. En español, ‘sus huesos’ conserva el sentido anatómico directo y mantiene el paralelismo con la segunda cola.
- source_word: אֲפִיקֵי
  english_pob_choice: tubes of
  chosen_spanish: tubos de
  alternatives_spanish:
  - canales de
  - conductos de
  - tubos/canales de
  lexicon: HALOT
  rationale: La imagen hebrea puede sugerir conductos, cauces o formas alargadas y sólidas. ‘Tubos de’ reproduce bien la metáfora física en español sin volverla una mera abstracción de fuerza.
- source_word: נְחוּשָׁה
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En este contexto poético de resistencia y dureza, ‘bronce’ es la equivalencia más natural en español para נְחוּשָׁה, manteniendo la imaginería metálica clásica.
- source_word: גְּרָמָיו
  english_pob_choice: his limbs
  chosen_spanish: sus miembros
  alternatives_spanish:
  - sus huesos
  - su armazón
  - su cuerpo
  lexicon: HALOT
  rationale: El hebreo permite una referencia corporal fuerte pero no idéntica a ‘huesos’. ‘Sus miembros’ conserva la variación poética frente a la primera cola y evita repetir ‘huesos’.
- source_word: כִּמְטִיל
  english_pob_choice: like bars of
  chosen_spanish: como barras de
  alternatives_spanish:
  - como lingotes de
  - como varas de
  - como piezas fundidas de
  lexicon: HALOT
  rationale: La comparación apunta a una forma de metal sólida y pesada. ‘Barras de’ comunica mejor en español la rigidez y solidez que sugiere el original y encaja con la metáfora del hierro.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: بַּרְזֶל es ‘hierro’ en sentido estándar. Se conserva el metal específico para sostener la correspondencia con ‘bronce’ y la fuerza de la imagen.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el juicio del POB inglés con equivalencia óptima y conserva la tensión léxica documentada en el hebreo: אֲפִיקֵי puede ser ‘tubos’ o ‘canales’, y גְּרָמָיו puede referirse a ‘miembros’ o ‘huesos’. Se mantiene el paralelismo metálico entre bronce e hierro.'
  spanish_consistency_notes:
  - Se usa ‘bronce’ para נְחוּשָׁה, conforme al uso poético bíblico en español.
  - Se evita repetir ‘huesos’ en la segunda cola para preservar la variación poética del hebreo, siguiendo la decisión auditada del POB inglés.
  - La puntuación con punto y coma refleja la bipartición del verso y ayuda a mantener el ritmo paralelo.
