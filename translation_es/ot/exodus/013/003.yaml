translation:
  language: es
  text: 'Entonces Moisés dijo al pueblo: «Recuerden este día en que salieron de Egipto, de la casa de esclavitud, porque Yahvé los sacó de allí[a] con mano fuerte; y no se comerá nada fermentado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mano poderosa». La expresión hebrea comunica la acción enérgica de Yahvé al liberar a Israel.
    reason: lexical_alternative
  - marker: b
    text: 'O «y no se comerá pan fermentado». El hebreo usa una construcción pasiva general: «no será comido חָמֵץ», es decir, nada leudado o fermentado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה אֶל הָעָם
  english_pob_choice: Then Moses said to the people
  chosen_spanish: Entonces Moisés dijo al pueblo
  alternatives_spanish:
  - Y Moisés habló al pueblo
  - Entonces Moisés les dijo al pueblo
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa con 'Entonces'. 'Dijo al pueblo' refleja el destinatario colectivo sin añadir una formulación más libre que el hebreo.
- source_word: זָכוֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerda
  - Tengan en memoria
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular imperativa, en español el mandato dirigido al pueblo como colectivo suena natural en plural. Mantiene la fuerza memorial/covenantal sin sonar artificial.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - este mismo día
  - el día de hoy
  lexicon: HALOT
  rationale: '''Este día'' es directo y fiel. ''Este mismo día'' añadiría énfasis no requerido por el texto.'
- source_word: יְצָאתֶם
  english_pob_choice: you came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron de
  - ustedes salieron
  lexicon: HALOT
  rationale: '''Salieron'' expresa de forma natural el movimiento de salida. El sujeto queda implícito por el contexto del mandato al pueblo.'
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: '''De Egipto'' es la preposición normal en español y conserva la referencia geográfica sin sobreinterpretar el movimiento.'
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de esclavos
  - de la casa de servidumbre
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de 'casa de...' y se traduce עֲבָדִים con 'esclavitud' para conservar el sustantivo abstracto que el español acepta con naturalidad. Se evita suavizarlo a 'servidumbre' sin base contextual.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introducción causal directa y idiomática en español.
- source_word: בְּחֹזֶק יָד
  english_pob_choice: by a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - por una mano fuerte
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva con una formulación ya natural en español bíblico y contemporáneo. 'Con mano fuerte' mantiene el vínculo semántico con la imagen original y el acto poderoso de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrama: ''Yahvé'' como forma española estable, transparente y reverente, evitando la sustitución por ''Señor''.'
- source_word: הוֹצִיא
  english_pob_choice: brought you out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los condujo fuera
  lexicon: HALOT
  rationale: '''Sacar'' reproduce bien el valor causativo de הוֹצִיא en el contexto del éxodo y es natural en español.'
- source_word: מִזֶּה
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de este lugar
  lexicon: HALOT
  rationale: '''De allí'' recupera la referencia anafórica al lugar de esclavitud/Egipto sin redundancia.'
- source_word: וְלֹא יֵאָכֵל חָמֵץ
  english_pob_choice: and no leavened bread shall be eaten
  chosen_spanish: y no se comerá pan fermentado
  alternatives_spanish:
  - y no se comerá nada fermentado
  - y no será comido pan leudado
  lexicon: HALOT
  rationale: Se traduce el pasivo impersonal con una prohibición natural en español. 'Pan fermentado' comunica el sentido de חָמֵץ sin depender de un tecnicismo eclesiástico; 'fermentado' es el equivalente semántico más transparente en español moderno.
theological_decisions:
- issue: Nombre divino YHWH en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Señor
  rationale: La política del proyecto exige rendir יְהוָה con el nombre propio divino, no con una sustitución titulada. 'Yahvé' es la forma española adoptada para preservar transparencia y continuidad terminológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: עֲבָדִים en la fórmula del éxodo
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavitud
  alternative_spanish_readings:
  - casa de esclavos
  - casa de servidumbre
  rationale: 'Se conserva la tensión idiomática del hebreo: no se suaviza a ''servidumbre'' ni se cambia a ''bondad/servicio''. ''Esclavitud'' expresa claramente la condición de opresión que el texto subraya.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tratamiento léxico de bonded-status terms
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: usa ''in which'' como equivalente relacional para el hebreo relativo, adopta ''house of slavery'' como registro más formal del idiomático מִבֵּית עֲבָדִים, y mantiene la decisión final de renderizar el Nombre divino como Yahweh/Yahvé en vez de ''the LORD/Señor''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'esclavitud' para עֲבָדִים en esta fórmula fija del éxodo, por su fuerza semántica y registro bíblico claro.
  - '''Pan fermentado'' evita ''pan leudado'' por ser más comprensible para lectores amplios sin perder la referencia a חָמֵץ.'
  - El mandato se pluraliza en español ('Recuerden') para sonar natural ante un destinatario colectivo, sin cambiar la fuerza imperativa del hebreo.
