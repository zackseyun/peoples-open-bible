  rationale: Se ajustó גֵּר para reflejar mejor el matiz de residencia documentado por el POB, se hizo más natural el par «esclavo/esclava», se movió la nota del modismo «dentro de tus puertas» a su lugar correcto y se tradujeron todas las notas al español.
