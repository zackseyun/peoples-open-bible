translation:
  language: es
  text: Jacob huyó al campo de Aram[a]; Israel sirvió por una esposa, y por una esposa estuvo vigilando[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al país de Aram». El hebreo dice literalmente «el campo de Aram».
    reason: lexical_alternative
  - marker: b
    text: O «guardó», «veló» o «cuidó». El verbo puede referirse al cuidado o la vigilancia de rebaños.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: ברח expresa huida o fuga. «Huyó» conserva el movimiento de escape con naturalidad en español y mantiene la fuerza narrativa sin añadir matices que el hebreo no exige.
- source_word: שְׂדֵה אֲרָם
  english_pob_choice: to the field of Aram
  chosen_spanish: al campo de Aram
  alternatives_spanish:
  - al país de Aram
  - a la tierra de Aram
  - al campo abierto de Aram
  lexicon: HALOT
  rationale: שָׂדֶה significa literalmente «campo» o «campo abierto». Mantener «campo de Aram» conserva la imagen hebrea, como en la decisión inglesa, sin borrar la posibilidad geográfica del modismo.
- source_word: וַיַּעֲבֹד
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - trabajó
  - laboró
  lexicon: HALOT
  rationale: עבד puede significar servir o trabajar. «Sirvió» reproduce bien la relación de Jacob bajo Labán y conserva el vínculo semántico entre servicio y trabajo.
- source_word: בְּאִשָּׁה
  english_pob_choice: for a wife
  chosen_spanish: por una esposa
  alternatives_spanish:
  - por una mujer
  - a cambio de una esposa
  - para obtener una esposa
  lexicon: HALOT
  rationale: 'La preposición ב aquí expresa finalidad o compensación en el contexto: Jacob sirvió para obtener una esposa. «Por una esposa» es breve y fiel, aunque suena algo más literal que la alternativa interpretativa «para obtener una esposa».'
- source_word: וּבְאִשָּׁה
  english_pob_choice: and for a wife
  chosen_spanish: y por una esposa
  alternatives_spanish:
  - y por una mujer
  - y a cambio de una esposa
  lexicon: HALOT
  rationale: Se conserva la repetición retórica del hebreo. Repetir «por una esposa» evita suavizar la paralelismo y mantiene la estructura poética del verso.
- source_word: שָׁמָר
  english_pob_choice: kept watch
  chosen_spanish: guardó
  alternatives_spanish:
  - veló
  - cuidó
  - guardó los rebaños
  lexicon: HALOT
  rationale: שׁמר significa guardar, vigilar o cuidar. En este contexto puede aludir al cuidado de los rebaños; «guardó» es breve y deja abierta esa posible carga sin explicitarla de más.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  english_pob_choice: Jacob / Israel
  chosen_spanish: Jacob / Israel
  alternatives_spanish:
  - Jacobo / Israel
  lexicon: N/A
  rationale: Se preserva la alternancia intencional de nombres en el texto hebreo. Mantener ambos nombres distingue al patriarca y la identidad pactal/nacional evocada por el verso.
theological_decisions:
- issue: Alternancia de nombres Jacob/Israel
  english_pob_reading: Preserve both names distinctly in the main text
  chosen_spanish_reading: Conservar ambos nombres de forma distinta en el cuerpo principal
  alternative_spanish_readings:
  - Usar solo «Jacob» por fluidez
  - Usar solo «Israel» por énfasis temático
  rationale: El hebreo alterna deliberadamente los nombres, probablemente para evocar tanto al individuo como al pueblo descendiente de él. La traducción no debe aplanar esa tensión significativa.
  doctrine_reference: Poética hebrea y principios de equivalencia óptima
- issue: Valor de בְּאִשָּׁה en el contexto
  english_pob_reading: for a wife
  chosen_spanish_reading: por una esposa
  alternative_spanish_readings:
  - para una esposa
  - a cambio de una esposa
  - por causa de una esposa
  rationale: El contexto de Jacob y Labán sugiere finalidad o compensación por trabajo. «Por una esposa» mantiene la ambigüedad útil sin imponer una paráfrasis más explícita.
  doctrine_reference: Sintaxis hebrea y lectura contextual
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide en lo sustancial con la traducción inglesa auditada. La principal decisión estilística en español es condensar «kept watch» como «guardó», dejando abierta la posible referencia al cuidado de rebaños sin sobreexplicarla. También se adapta el matiz de בְּאִשָּׁה con «por una esposa», que conserva la relación de compensación/finalidad del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Esposa» traduce consistentemente אִשָּׁה en el paralelismo del verso.
  - La alternancia «Jacob / Israel» se mantiene para no borrar la tensión literaria del hebreo.
  - La nota [a] preserva la alternativa geográfica del hebreo sin abandonar la imagen de «campo».
  - La nota [b] preserva la ambigüedad verbal de שָׁמָר entre guardar, vigilar y cuidar.
