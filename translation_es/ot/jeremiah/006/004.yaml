    text: 'O: «Prepárense para la guerra contra ella». El hebreo usa literalmente lenguaje de consagración para la batalla.'
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente la traducción y la decisión léxica principal, pero se corrige la puntuación de la interjección para ajustarla al español natural y digno sin alterar el sentido.
