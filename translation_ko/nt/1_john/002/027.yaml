  text: καὶ ὑμεῖς τὸ χρῖσμα ὃ ἐλάβετε ἀπ’ αὐτοῦ ⸂μένει ἐν ὑμῖν⸃, καὶ οὐ χρείαν ἔχετε ἵνα τις διδάσκῃ ὑμᾶς· ἀλλ’ ὡς τὸ ⸀αὐτοῦ χρῖσμα διδάσκει ὑμᾶς περὶ πάντων, καὶ ἀληθές ἐστιν καὶ οὐκ ἔστιν ψεῦδος, καὶ καθὼς ἐδίδαξεν ὑμᾶς, ⸀μένετε ἐν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/027.yaml
  text: And as for you[a], the anointing that you received from him remains in you, and you have no need that anyone should teach you. But as his anointing teaches you about all things, and is true and is not a lie, and just as it taught you[b], remain in him.
  footnotes:
  - marker: a
    text: Or, in some manuscripts, 'and just as it taught you, you remain in him.'
    reason: textual_variant
  - marker: b
    text: Or 'abides in you' / 'abide in him'; the same Greek verb is used throughout this verse.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 여러분으로 말하면, 여러분이 그분에게서 받은 기름 부으심이 여러분 안에 머물러 있어서, 누가 여러분을 가르칠 필요가 없습니다. 그러나 그분의 기름 부으심이 여러분에게 모든 것을 가르치는 그대로 — 그것은 참되며 거짓이 아닙니다 — 그것이 여러분을 가르친 그대로, 여러분은 그분 안에 머무십시오.
  philosophy: optimal-equivalence
