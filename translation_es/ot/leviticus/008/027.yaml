review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Moisés puso todas las porciones sobre las palmas de Aarón y de sus hijos, y luego las presentó mediante el rito de mecimiento delante de Yahvé. Conserva correctamente «Yahvé», la referencia masculina de «sus hijos» y el tecnicismo cultual de תְּנוּפָה. Sin embargo, la nota al pie no es fiel ni clara: presenta como alternativa exactamente la misma frase del texto y además deja «upon» sin traducir al español.'
  spanish_quality_summary: El texto principal es natural, claro y digno en español bíblico moderno. «Puso todo sobre las palmas…» y «ofrenda mecida» son comprensibles y adecuados. El único problema real de calidad está en la nota, que necesita reparación para ser útil y plenamente en español.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», תְּנוּפָה → «ofrenda mecida», y בָּנָיו se mantiene como «sus hijos». No hay conflicto terminológico mayor.'
  issues:
  - severity: medium
    issue: La nota al pie repite el mismo texto del cuerpo como si fuera alternativa.
    rationale: El inglés ofrece una nota explicando la literalidad de «on/upon the palms» y una posible formulación alternativa. En español, la nota actual dice «O “sobre las palmas…”», que no aporta variante real porque el texto principal ya dice eso.
  - severity: medium
    issue: 'La nota contiene un anglicismo no traducido: «upon».'
    rationale: El proyecto exige español eclesial legible. Dejar una palabra inglesa en la nota degrada la calidad y no corresponde al objetivo de una edición española.
  revised_spanish_text: Puso todo sobre las palmas de Aarón y sobre las palmas de sus hijos[a], y los meció como ofrenda mecida delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: O «en las palmas de Aarón y en las palmas de sus hijos». El hebreo usa literalmente la preposición «sobre»; en español, la idea es que las porciones fueron colocadas en sus manos ahuecadas.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al historial POB. Solo se corrige la nota al pie para que ofrezca una alternativa real en español y elimine el anglicismo «upon».
