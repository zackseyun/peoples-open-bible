    rationale: קוֹל puede significar 'voz', pero aquí la construcción con el instrumento y el participio בֹּכִים favorece el valor más general 'sonido'. 'La voz de los que lloran' es posible, pero menos fiel a la decisión documentada y menos natural en el paralelismo.
  - severity: high
