translation:
  language: es
  text: 'Y Balaam dijo a Dios: «Balac, hijo de Zipor, rey de Moab, me[a] ha enviado»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha enviado por mí». El hebreo dice más literalmente «ha enviado a mí», con una preposición de dirección hacia la persona que habla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ... dijo» conserva ese flujo narrativo con naturalidad y sin añadir matiz temporal no asegurado por el hebreo.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaán
  lexicon: Convención onomástica bíblica
  rationale: Se conserva la forma española más reconocible y estable del nombre propio, sin alterar el referente.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a los dioses
  lexicon: HALOT
  rationale: El contexto inmediato identifica al destinatario como el Dios verdadero; en español, «a Dios» es la forma idiomática y fiel. No se explicita el artículo porque suena antinatural y no añade precisión útil.
- source_word: בָּלָק בֶּן צִפֹּר
  english_pob_choice: Balak son of Zippor
  chosen_spanish: Balac, hijo de Zipor
  alternatives_spanish:
  - Balac, hijo de Sipor
  - Balac hijo de Zipor
  lexicon: HALOT
  rationale: La relación constructa se expresa de manera natural en español con «hijo de». Se usa la transliteración española habitual «Balac» y «Zipor» para los nombres propios.
- source_word: מֶלֶךְ מוֹאָב
  english_pob_choice: king of Moab
  chosen_spanish: rey de Moab
  alternatives_spanish:
  - el rey de Moab
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma en aposición que identifica a Balac por su cargo. En español, «rey de Moab» reproduce la relación sin forzar el artículo.
- source_word: שָׁלַח אֵלַי
  english_pob_choice: has sent to me
  chosen_spanish: ha enviado a mí
  alternatives_spanish:
  - me ha enviado
  - ha enviado por mí
  - ha enviado a buscarme
  lexicon: HALOT
  rationale: 'Se mantiene el valor literal del preposición אֶל como dirección hacia el hablante: «a mí». Se evita convertirlo en «por mí» o «a buscarme», porque esas opciones ya interpretan más de lo que el hebreo exige.'
theological_decisions:
- issue: Referencia de הָאֱלֹהִים
  english_pob_reading: the one true God addressed by Balaam
  chosen_spanish_reading: Dios, entendido como el Dios verdadero al que Balaam se dirige
  alternative_spanish_readings:
  - un dios
  - dioses
  rationale: El contexto narrativo inmediato presenta a Balaam hablando con la deidad que acaba de encontrarse con él; por eso «Dios» comunica la referencia singular sin añadir formulaciones doctrinales ajenas al pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa POB mantiene «to me» en el texto principal y anota la alternativa idiomática «sent for me». Aquí se conserva la literalidad direccional del hebreo en el texto principal y se ofrece una nota que reconoce la alternativa española natural sin desplazar la relación semántica básica del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים por el contexto narrativo inmediato.
  - Se usa «Balac» y «Zipor» conforme a la forma española bíblica habitual.
  - Se conserva «a mí» para reflejar אֵלַי, aunque la españolización idiomática posible sería «me».
  - La puntuación con dos puntos introduce la cita directa de manera natural en español.
