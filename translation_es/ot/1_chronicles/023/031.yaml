review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y preserva correctamente «Yahvé», «lunas nuevas», «fiestas señaladas», «por número», «continuamente» y «delante de Yahvé». Sin embargo, dos elecciones principales se alejan del sentido más natural del original: «el subir de holocaustos» suena calcado y poco idiomático para הַעֲלוֹת עֹלוֹת, y «para los sábados / para las lunas nuevas / para las fiestas» expresa finalidad más que ocasión, cuando el hebreo en esta serie calendárica señala los momentos en que se ofrecen los holocaustos.'
  spanish_quality_summary: La redacción es mayormente clara, pero «el subir de holocaustos» no es español natural y puede confundir. También conviene cambiar «para los sábados…» a «en los sábados… / en las lunas nuevas… / en las fiestas señaladas…» para mejorar fidelidad y legibilidad litúrgica. «Conforme a la ordenanza acerca de ellos» o formulación equivalente transmite mejor el valor normativo de כמשפט que «orden establecido».
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé». «Holocaustos» es aceptable para עֹלוֹת. No hay conflicto con otros términos doctrinales principales. El único ajuste terminológico recomendable es preferir «ordenanza» en este contexto para reflejar mejor el valor cultual-normativo documentado para מִשְׁפָּט.
  issues:
  - severity: high
    issue: «el subir de holocaustos» es una formulación poco natural
    rationale: Aunque intenta conservar el infinitivo hebreo, en español resulta forzada y menos clara que «el ofrecer holocaustos» o «la presentación de los holocaustos». La nota alternativa ya contiene una solución mejor y más fiel al sentido sacrificial.
  - severity: medium
    issue: «para los sábados… para las lunas nuevas…» sugiere finalidad en vez de ocasión
    rationale: לַשַּׁבָּתוֹת / לֶחֳדָשִׁים / וְלַמּוֹעֲדִים en esta secuencia indican las ocasiones calendáricas de los sacrificios. En español, «en los sábados, en las lunas nuevas y en las fiestas señaladas» comunica mejor ese valor.
  - severity: medium
    issue: «orden establecido» debilita el matiz formal de מִשְׁפָּט
    rationale: El hebreo apunta a una norma/ordenanza prescrita para el culto. «Orden establecido» es comprensible, pero menos preciso que «ordenanza» en un contexto levítico.
  revised_spanish_text: y para todo el ofrecer holocaustos[a] a Yahvé en los sábados, en las lunas nuevas y en las fiestas señaladas, por número, conforme a la ordenanza acerca de ellos, continuamente delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «y para toda la presentación de holocaustos a Yahvé». El hebreo usa un infinitivo más el sustantivo «holocaustos» para expresar la acción sacrificial.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase verbal principal a un español natural y fiel al infinitivo hebreo; se cambian las preposiciones temporales para reflejar ocasión cultual en vez de finalidad; y se refuerza el valor normativo de כמשפט con «ordenanza», en línea con el análisis léxico y el sentido del pasaje.
