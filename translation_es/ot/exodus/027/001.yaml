    rationale: La nota inglesa preserva la alternativa «shall be foursquare». En español conviene conservar una alternativa como «será de cuatro lados iguales» o «será cuadrangular», anclada en «cuadrado», en lugar de presentar «cuadrado» como alternativa de sí mismo.
  revised_spanish_text: Harás el altar de madera de acacia, de cinco codos de largo y cinco codos de ancho; el altar será cuadrado[a], y su altura será de tres codos.
