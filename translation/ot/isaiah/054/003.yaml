id: ISA.54.3
reference: Isaiah 54:3
source:
  edition: WLC
  text: כִּי יָמִ֥ין וּ/שְׂמֹ֖אול תִּפְרֹ֑צִי וְ/זַרְעֵ/ךְ֙ גּוֹיִ֣ם יִירָ֔שׁ וְ/עָרִ֥ים נְשַׁמּ֖וֹת יוֹשִֽׁיבוּ־׃
translation:
  text: For you will spread out to the right and to the left[b][a], and your offspring will possess nations and will settle desolate cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will inherit nations' or 'will possess nations.' The Hebrew verb can carry the sense of inheriting, possessing, or dispossessing depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'cause desolate cities to be inhabited.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding exhortation/promise; 'for' best preserves the causal connection in context.
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right and to the left
  alternatives:
  - right and left
  - south and north
  lexicon: HALOT
  rationale: The pair is spatial and idiomatic for expansion in every direction. 'To the right and to the left' keeps the concrete imagery without over-interpreting it as compass directions.
- source_word: תִּפְרֹצִי
  chosen: you will spread out
  alternatives:
  - you will break forth
  - you will burst out
  lexicon: HALOT
  rationale: The verb פרץ conveys breaking out or bursting forth; here in context of territorial enlargement, 'spread out' communicates expansion naturally in English while retaining the image of forceful increase.
- source_word: וְזַרְעֵךְ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can be collective singular. 'Offspring' preserves the collective sense in readable modern English better than the more literal but less idiomatic 'seed.'
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: גוֹיִם most straightforwardly means 'nations' here. 'Gentiles' would import a later Jewish/Christian contrast not explicit in this context.
- source_word: יִירָשׁ
  chosen: will dispossess
  alternatives:
  - will inherit
  - will possess
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess. With 'nations' as the object, the sense is not merely receiving an inheritance but taking possession over against prior occupants; 'dispossess' best captures that force.
- source_word: עָרִים נְשַׁמּוֹת
  chosen: desolate cities
  alternatives:
  - deserted cities
  - ruined cities
  lexicon: HALOT
  rationale: The participial adjective from שׁמם describes cities laid waste or left deserted. 'Desolate cities' is concise and preserves the prophetic register.
- source_word: יוֹשִׁיבוּ
  chosen: will settle
  alternatives:
  - will inhabit
  - will cause to be inhabited
  - will resettle
  lexicon: HALOT
  rationale: The Hiphil of ישׁב is causative, literally 'cause to dwell/inhabit.' With 'your offspring' as subject and 'desolate cities' as object, 'will settle' expresses the causative result in natural English; 'will cause to be inhabited' is more wooden but less readable.
