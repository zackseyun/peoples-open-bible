    issue: «La mirada de sus rostros» es poco natural y semánticamente impreciso.
    rationale: El hebreo הַכָּרַת פְּנֵיהֶם apunta al aspecto/expresión reconocible del rostro. «Mirada» en español suele sugerir los ojos o el acto de mirar, no tanto el semblante como evidencia visible.
  - severity: medium
    issue: «se han causado mal a sí mismos» atenúa el valor moral de רָעָה frente al inglés auditado «evil».
    rationale: La rationale inglesa insiste en preservar el peso moral de רָעָה como «evil», no meramente daño. En español, «mal» puede funcionar, pero en esta construcción suena más a perjuicio. «han traído mal sobre sí mismos» preserva mejor consecuencia moral sin sobreinterpretar.
  - severity: low
    issue: «¡Ay de sí mismos!» es gramaticalmente posible pero rígido en español corriente.
    rationale: Para lectura pública y digna, «¡Ay de ellos mismos!» suena más natural y conserva el matiz reflexivo documentado para נֶפֶשׁ.
