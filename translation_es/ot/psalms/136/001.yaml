base_translation:
  language: en
  yaml_path: translation/ot/psalms/136/001.yaml
  text: Give thanks to Yahweh[a], for he is good[b], for his steadfast love endures forever.
  footnotes:
  - marker: a
    text: Or 'his covenant faithfulness is forever' or 'his mercy is forever.' The Hebrew חֶסֶד carries the sense of loyal, enduring love within covenant relationship.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Give thanks to Yahweh''; rendered ''the LORD'' in keeping with the translation''s standard practice for the divine name יְהוָה.'
