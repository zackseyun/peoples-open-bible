review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la progresión de la ἔχθρα como «hostilidad» y mantiene el valor plural de φόνους como «asesinatos». También preserva correctamente que el autor subraya la pertenencia del ejecutor al círculo aprobado por Simón. Sin embargo, «uno de los aprobados por Simón cometía asesinatos» desplaza levemente la sintaxis y el énfasis del griego: διὰ τινος + infinitivo pasivo presenta los asesinatos como cometidos por medio de / a manos de un individuo indefinido, no tanto como una afirmación durativa simple sobre lo que él hacía. Además, el matiz de «se cometían» refleja mejor el pasivo de συντελεῖσθαι.'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse para sonar más idiomático y a la vez más cercano al griego. «La hostilidad avanzaba tanto» funciona, aunque «había avanzado tanto» o «llegó tan lejos» sería más preciso contextualmente; no es indispensable cambiarlo. El ajuste principal es usar una construcción impersonal pasiva/refleja: «se cometían asesinatos por medio de uno de los aprobados por Simón» o una opción más natural equivalente. Esto evita que «uno... cometía asesinatos» sugiera hábito personal más que actos ejecutados dentro de la trama.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hostilidad», «Simón» y «asesinatos» están bien alineados. La revisión propuesta conserva la decisión léxica sobre δεδοκιμασμένων como «aprobados por Simón» y mantiene la indefinición de τινος.
  issues:
  - severity: medium
    issue: La cláusula verbal «uno de los aprobados por Simón cometía asesinatos» no refleja del todo el pasivo de συντελεῖσθαι.
    rationale: El griego dice literalmente que «asesinatos se estaban llevando a cabo / cometiendo»; poner como sujeto directo a «uno» cambia ligeramente la perspectiva del enunciado.
  - severity: medium
    issue: Se pierde parcialmente el matiz instrumental/mediado de διὰ τινος.
    rationale: Aunque la revisión inglesa optó por «by one of those approved by Simon» por naturalidad, el griego mantiene a la persona indefinida dentro de una construcción mediada. En español conviene una formulación que preserve mejor esa indefinición sin sonar forzada.
  - severity: low
    issue: La nota [b] explica bien la indefinición, pero el texto principal podría expresar mejor ese mismo matiz.
    rationale: Si el texto dice «se cometían asesinatos por medio de uno de los aprobados por Simón», la nota queda mejor apoyada por la redacción.
  revised_spanish_text: Pero la hostilidad avanzaba[a] tanto, que incluso se cometían asesinatos por medio de uno de los aprobados por Simón[b].
  revised_footnotes:
  - marker: a
    text: «Avanzaba» conserva la imagen de progreso o empeoramiento del conflicto que está presente en el participio griego.
    reason: lexical_alternative
  - marker: b
    text: 'El griego deja indefinida a la persona: no identifica cuál de ellos era, sino que subraya que pertenecía al círculo aprobado por Simón. También puede entenderse: «por medio de cierto uno de los aprobados por Simón».'
    reason: lexical_alternative
