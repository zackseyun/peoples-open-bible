translation:
  language: es
  text: No te negaré[a], oh disciplina formada por la ley, ni te escatimaré[b], amado dominio propio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te mostraré falsedad»; o «No te traicionaré». El verbo griego puede indicar tanto mentir como resultar falso ante una persona.'
    reason: lexical_alternative
  - marker: b
    text: El griego se dirige directamente a virtudes personificadas; literalmente, algo como «oh disciplina/entrenadora de la ley» y «amado dominio propio». La traducción hace más clara en español la relación formativa con la ley.
    reason: cultural_note
lexical_decisions:
- source_word: ψεύσομαί
  english_pob_choice: I will not deny
  chosen_spanish: No te negaré
  alternatives_spanish:
  - No te mentiré
  - No te seré falso
  - No te traicionaré
  lexicon: BDAG
  rationale: El futuro medio de ψεύδομαι, con objeto personal en un apostrofe retórico, expresa el sentido de mostrarse falso o negar fidelidad. «Negarte» conserva de modo idiomático la idea de no faltar a la lealtad sin volver la frase demasiado literal o dura en español.
- source_word: παιδευτὰ
  english_pob_choice: law-trained discipline
  chosen_spanish: disciplina instruida
  alternatives_spanish:
  - disciplinadora
  - maestra de disciplina
  - entrenadora
  lexicon: LSJ
  rationale: El vocativo personifica una realidad formativa. En español, «disciplina instruida» intenta conservar la idea de algo que forma y disciplina, evitando una concreción innecesaria como «entrenadora» y manteniendo el tono solemne del original.
- source_word: νόμε
  english_pob_choice: by the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - de la ley
  - según la ley
  - ley
  lexicon: LSJ
  rationale: Νόμε es un vocativo personificado de νόμος. «Por la ley» expresa la relación formativa con la ley sin ocultar el elemento causal/instrumental presente en la construcción y sin perder el eco jurídico-moral.
- source_word: φείσομαί
  english_pob_choice: will spare
  chosen_spanish: perdonaré
  alternatives_spanish:
  - te ahorraré
  - me guardaré de
  - te dispensaré
  lexicon: BDAG
  rationale: En este contexto de martirio y autocontrol, el verbo implica no rehuir ni retenerse frente a la disciplina. «Perdonaré» no es una equivalencia perfecta en sentido estricto, pero en español de registro alto puede funcionar con el valor de «ahorrarte» o «rehuirte»; aun así, se mantiene la tensión de una decisión voluntaria de no abstenerse. Se conserva el matiz de no ceder ante la virtud personificada.
- source_word: φίλη
  english_pob_choice: beloved
  chosen_spanish: amada
  alternatives_spanish:
  - querida
  - amada y querida
  - bien amada
  lexicon: LSJ
  rationale: El vocativo expresa afecto y personificación. «Amada» preserva el tono elevado y afectuoso mejor que «querida», que en español puede sonar más coloquial.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: autocontrol
  alternatives_spanish:
  - dominio propio
  - continencia
  - templanza
  lexicon: BDAG
  rationale: Ἐγκράτεια es la virtud del dominio sobre los impulsos. «Autocontrol» es claro y moderno en español, y evita el posible barniz eclesiástico de «templanza» o la mayor técnica de «continencia». En este pasaje personificado, «autocontrol» funciona como nombre de virtud.
theological_decisions:
- issue: Personificación de virtudes morales y de la ley
  english_pob_reading: Retain direct address to 'discipline that trains by the law' and 'beloved self-control' as personified virtues.
  chosen_spanish_reading: Mantener el apostrofe directo a «disciplina instruida por la ley» y a «amada autocontrol» como virtudes personificadas.
  alternative_spanish_readings:
  - Reducirlo a una afirmación abstracta sobre la disciplina y el autocontrol
  - Parafrasear sin vocativos
  rationale: El griego usa vocativos y una apelación retórica. Conservarla en español preserva el estilo literario y la fuerza ética del pasaje sin añadir interpretaciones ajenas.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador español toma como base la última revisión inglesa, que compacta παιδευτὰ νόμε como «law-trained discipline». Sin embargo, en español se prefirió una formulación que conservara la personificación y la relación con la ley sin calcarlos de manera rígida. También se mantuvo el sentido de fidelidad de ψεύσομαί y la tensión ética de φείσομαί en un registro publicable.
  spanish_consistency_notes:
  - Se usa «ley» para νόμος con el sentido moral y formativo indicado por el contexto.
  - Se conserva el tratamiento directo en segunda persona singular, coherente con el apóstrofe del griego.
  - «Autocontrol» se emplea como nombre de virtud, no como mera actitud psicológica.
  - No se sustituyó la personificación por un lenguaje abstracto, para respetar la retórica del pasaje.
