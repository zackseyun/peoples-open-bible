revisions:
- from: ¡Mira![a] Lo he puesto por testigo[b] a los pueblos, jefe y comandante para los pueblos[c].
  to: He aquí[a], lo he puesto por testigo a los pueblos[b][c], líder y comandante para los pueblos.
  rationale: Se ajusta הֵן a un registro profético más digno con «He aquí», se mejora נָגִיד con «líder» en lugar de «jefe», y se añade la nota necesaria sobre el referente ambiguo de «lo» para reflejar el rastro teológico y lexical de la POB inglesa. También se reordena la nota alternativa para que quede anclada donde corresponde en el texto revisado.
