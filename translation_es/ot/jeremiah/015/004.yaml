revisions:
- from: Y los convertiré en un horror[a] para todos los reinos de la tierra, por causa de Manasés, hijo de Ezequías, rey de Judá, por lo que hizo en Jerusalén.
  to: Y los haré un horror[a] para todos los reinos de la tierra, por causa de Manasés, hijo de Ezequías, rey de Judá, por causa de lo que hizo en Jerusalén.
  rationale: Se ajusta «los convertiré» a «los haré» para reflejar con mayor naturalidad en español la construcción hebrea resultativa y mantener un estilo bíblico sobrio. También se cambia «por lo que hizo» a «por causa de lo que hizo» para reproducir mejor la doble causalidad explícita del original y de la revisión inglesa auditada. La nota léxica se conserva sin cambios sustanciales.
