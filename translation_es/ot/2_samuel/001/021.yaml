translation:
  language: es
  text: Montes de Gilboa, no haya sobre ustedes rocío ni lluvia, ni campos de ofrendas[a]; porque allí quedó mancillado el escudo de los valientes, el escudo de Saúl[b], no ungido con aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni campos abundantes», «ni campos de primicias» o «ni campos de ofrendas elevadas». La expresión hebrea es difícil, y תְּרוּמוֹת a menudo se refiere a ofrendas apartadas para Dios.
    reason: lexical_alternative
  - marker: b
    text: La frase final puede aludir al escudo de Saúl ya no untado o frotado con aceite, una preparación habitual para la batalla, más que a Saúl como «el ungido».
    reason: cultural_note
lexical_decisions:
- source_word: הָרֵי בַּגִּלְבֹּעַ
  english_pob_choice: Mountains of Gilboa
  chosen_spanish: Montes de Gilboa
  alternatives_spanish:
  - Oh montes de Gilboa
  - Cerros de Gilboa
  lexicon: HALOT
  rationale: El hebreo es un vocativo poético dirigido a la región montañosa. «Montes» conserva el plural y la fuerza lírica; «Oh» es posible, pero en español puede omitirse sin perder la apelación directa.
- source_word: אַל טַל וְאַל מָטָר עֲלֵיכֶם
  english_pob_choice: let there be no dew or rain upon you
  chosen_spanish: no haya sobre ustedes rocío ni lluvia
  alternatives_spanish:
  - que no haya sobre ustedes rocío ni lluvia
  - no caiga sobre ustedes rocío ni lluvia
  lexicon: HALOT
  rationale: La forma hebrea expresa una imprecación/ deseo negativo. En español, «no haya» comunica bien el valor optativo; «sobre ustedes» preserva la dirección retórica hacia los montes.
- source_word: וּשְׂדֵי תְרוּמוֹת
  english_pob_choice: nor fields of offerings
  chosen_spanish: ni campos de ofrendas
  alternatives_spanish:
  - ni campos de primicias
  - ni campos de ofrendas elevadas
  - ni campos fértiles
  lexicon: HALOT
  rationale: La frase es difícil. La POB en inglés conservó el sentido cultual amplio de תְּרוּמוֹת; «campos de ofrendas» mantiene esa referencia sin forzar una paráfrasis interpretativa.
- source_word: נִגְעַל
  english_pob_choice: was defiled
  chosen_spanish: fue profanado
  alternatives_spanish:
  - fue contaminado
  - fue mancillado
  - fue despreciado
  lexicon: HALOT
  rationale: El nifal de געל denota quedar en estado de repulsión/ deshonra. En este lamento bélico, «profanado» comunica la deshonra ritual-poética que el contexto sugiere, sin suavizarla.
- source_word: מָגֵן גִּבּוֹרִים
  english_pob_choice: the shield of the mighty
  chosen_spanish: el escudo de los valientes
  alternatives_spanish:
  - el escudo de los poderosos
  - el escudo de los guerreros
  - el escudo de los héroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים alude a guerreros/muy valientes; «valientes» suena natural en español y conserva la elevación poética del texto.
- source_word: מָגֵן שָׁאוּל
  english_pob_choice: the shield of Saul
  chosen_spanish: el escudo de Saúl
  alternatives_spanish:
  - el escudo de Saúl mismo
  - el escudo de Saúl, el rey
  lexicon: HALOT
  rationale: Se conserva la repetición apposicional del hebreo sin colapsarla en una sola expresión posesiva, para mantener el paralelismo poético.
- source_word: בְּלִי מָשִׁיחַ בַּשָּׁמֶן
  english_pob_choice: not anointed with oil
  chosen_spanish: no ungido con aceite
  alternatives_spanish:
  - sin ungir con aceite
  - como si no hubiera sido ungido con aceite
  - no frotado con aceite
  lexicon: HALOT
  rationale: La proximidad de מָשִׁיחַ con «aceite» favorece el sentido verbal de ungir el escudo, no el título teológico. «No ungido con aceite» conserva la ambigüedad controlada del hebreo y la lectura de mantenimiento militar.
theological_decisions:
- issue: Posible lectura mesiánica de מָשִׁיחַ
  english_pob_reading: Rendered as the verbal idea 'anointed' in the phrase 'not anointed with oil,' referring to treatment of Saul's shield, not a messianic title.
  chosen_spanish_reading: 'Se traduce como «ungido» en el marco de una acción sobre el escudo: «no ungido con aceite», no como título mesiánico.'
  alternative_spanish_readings:
  - el escudo de Saúl, el ungido, con aceite
  - el escudo de Saúl, no de uno ungido con aceite
  rationale: El contexto inmediato habla del estado del escudo en la batalla. La cercanía de «con aceite» orienta a la práctica de mantenimiento, no a una proclamación doctrinal sobre el Ungido.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Se mantiene la línea de la auditoría inglesa sin cambios relevantes: el texto hebreo se entiende como un lamento poético que maldice los montes de Gilboa y describe la deshonra del escudo de Saúl. La revisión más reciente del registro inglés indicó que no hacían falta cambios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - «Mesías» no se introduce porque מָשִׁיחַ aquí funciona verbalmente dentro de la expresión con aceite.
  - Se prefirió «profanado» para mantener la carga de deshonra del verbo hebreo sin debilitarla.
  - «Valientes» mantiene el registro poético y es más natural que «mighty» literalizado como «poderosos» en español bíblico contemporáneo.
