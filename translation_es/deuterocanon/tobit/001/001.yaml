translation:
  language: es
  text: Libro de las palabras[a] de Tobit, hijo de Tobiel, hijo de Ananiel, hijo de Aduel, hijo de Gabael[b], de la descendencia de Asiel, de la tribu de Neftalí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «libro de las palabras», una fórmula formal de encabezado. También podría traducirse «registro» o «relato».
    reason: lexical_alternative
  - marker: b
    text: El nombre ancestral aparece en una forma griega difícil. Esta versión sigue la normalización auditada «Gabael»; otras tradiciones y testigos reflejan formas cercanas a «Gabiel» o «Bagabael».
    reason: alternative_reading
lexical_decisions:
- source_word: ΒΙΒΛΟΣ
  english_pob_choice: The book
  chosen_spanish: Libro
  alternatives_spanish:
  - El libro
  - Registro
  lexicon: LSJ
  rationale: βίβλος funciona como encabezado formal de un escrito. En español, «Libro» conserva el tono titulante y naturaliza el inicio sin añadir contenido ajeno.
- source_word: λόγων
  english_pob_choice: of the words
  chosen_spanish: de las palabras
  alternatives_spanish:
  - de los asuntos
  - de los relatos
  - del informe
  lexicon: LSJ
  rationale: λόγων mantiene el valor literal de «palabras» en la fórmula titulante. «De las palabras» preserva la estructura semítica y la correspondencia con la lectura auditada en inglés.
- source_word: Τωβείτ
  english_pob_choice: Tobit
  chosen_spanish: Tobit
  alternatives_spanish:
  - Tobith
  lexicon: transliteration
  rationale: Se conserva el nombre propio en transliteración estable y reconocible en español bíblico.
- source_word: τοῦ Τωβιὴλ
  english_pob_choice: son of Tobiel
  chosen_spanish: hijo de Tobiel
  alternatives_spanish:
  - de Tobiel
  lexicon: genealogical idiom
  rationale: El genitivo griego se vuelve filiación explícita en español para claridad genealógica, como en el audit trail inglés.
- source_word: τοῦ Ἀνανιὴλ
  english_pob_choice: son of Ananiel
  chosen_spanish: hijo de Ananiel
  alternatives_spanish:
  - de Ananiel
  lexicon: genealogical idiom
  rationale: Se mantiene la cadena genealógica con la misma solución de filiación explícita.
- source_word: τοῦ Ἀδουὴλ
  english_pob_choice: son of Aduel
  chosen_spanish: hijo de Aduel
  alternatives_spanish:
  - de Aduel
  lexicon: genealogical idiom
  rationale: Se conserva el paralelismo genealógico y la transliteración del nombre propio.
- source_word: τοῦ ΒαΓαβαήλ
  english_pob_choice: son of Gabael
  chosen_spanish: hijo de Gabael
  alternatives_spanish:
  - hijo de Bagabael
  - de Gabael
  lexicon: transliteration
  rationale: Sigo la normalización auditada del POB en inglés para el nombre difícil, evitando reproducir la forma griega awkward si existe una tradición paralela más clara. «Gabael» refleja esa decisión y mantiene legibilidad.
- source_word: ἐκ τοῦ σπέρματος
  english_pob_choice: from the seed of
  chosen_spanish: de la descendencia de
  alternatives_spanish:
  - de la semilla de
  - de la línea de
  - de la posteridad de
  lexicon: LSJ
  rationale: Aunque σπέρμα literalmente es «semilla», en genealogía expresa linaje. En español, «descendencia» comunica el valor genealógico con naturalidad y sin perder la relación de origen.
- source_word: Ἀσιήλ
  english_pob_choice: Asiel
  chosen_spanish: Asiel
  alternatives_spanish:
  - Assiel
  - Azael
  lexicon: transliteration
  rationale: Se adopta la transliteración directa del nombre griego, como en el audit trail inglés.
- source_word: ἐκ τῆς φυλῆς
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la tribu de
  lexicon: LSJ
  rationale: φυλή en contexto genealógico/patrimonial es «tribu». «De la tribu de» reproduce la fórmula de pertenencia sin sobrecargar la sintaxis.
- source_word: Νεφθαλείμ
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalím
  - Neftalím
  lexicon: standard biblical transliteration
  rationale: Se prefiere la forma bíblica habitual en español, «Neftalí», en lugar de una transliteración más mecánica del griego.
theological_decisions:
- issue: 'Fórmula de apertura del título: «libro de las palabras» frente a una simplificación a «relato» o «historia»'
  english_pob_reading: The book of the words of Tobit...
  chosen_spanish_reading: Libro de las palabras de Tobit...
  alternative_spanish_readings:
  - Libro del relato de Tobit...
  - Libro de la historia de Tobit...
  rationale: El griego presenta una superscripción formal con λόγων. Mantener «palabras» preserva la tensión del título literal y evita borrar el carácter de encabezado documental señalado en el POB inglés.
  doctrine_reference: No aplica; decisión de forma y fidelidad al título.
- issue: Normalización del nombre genealógico difícil ΒαΓαβαήλ
  english_pob_reading: Gabael with note on difficult Greek form and alternate witnesses
  chosen_spanish_reading: Gabael con nota sobre la variante textual
  alternative_spanish_readings:
  - Bagabael
  - Gabiel
  rationale: La evidencia auditada del POB inglés normaliza el nombre para legibilidad, pero reconoce variantes. En español se conserva esa normalización y se documenta la alternativa textual en nota, sin ocultar la tensión del testimonio.
  doctrine_reference: No aplica; decisión textual y onomástica.
translation_notes:
  revision_awareness: Se siguió el estado auditado de alta concordancia del expediente inglés, sin revisiones aplicadas. La versión española mantiene la estructura titulante, la cadena genealógica y la normalización onomástica documentada, evitando suavizar la formulación literal del griego.
  spanish_consistency_notes:
  - Se usó «Neftalí» como forma bíblica estable en español, coherente con la transliteración estándar de nombres tribales.
  - Se mantuvo «de la descendencia de» para σπέρματος, porque en español expresa mejor el linaje que una calca como «de la semilla de».
  - La nota a no se repite para otro sentido; la nota b queda reservada a la variante onomástica del nombre difícil.
