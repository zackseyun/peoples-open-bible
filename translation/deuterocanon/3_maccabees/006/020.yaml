translation:
  text: And even the king’s body became seized with shuddering[b][a], and his heavy-hearted boldness was overcome by forgetfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his grim audacity was seized by confusion/forgetfulness.' The Greek λήθη is literally 'forgetfulness,' but in context it may describe sudden mental disorientation that undid his resolve.
    reason: lexical_alternative
  - marker: b
    text: Or 'audacity' or 'insolence' for θράσος, highlighting the king's arrogant presumption rather than neutral courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόφρικον
  chosen: seized with shuddering
  alternatives:
  - shuddering
  - terrified
  - horrified
  lexicon: LSJ
  rationale: The adjective conveys a state of shuddering or creeping dread. 'Seized with shuddering' preserves the bodily, visceral sense better than a flatter 'afraid' or an overstrong 'horrified'.
- source_word: σῶμα
  chosen: body
  alternatives:
  - person
  - frame
  lexicon: LSJ
  rationale: The Greek explicitly says the king's 'body,' emphasizing a physical reaction rather than merely an inward emotion.
- source_word: λήθη
  chosen: forgetfulness
  alternatives:
  - oblivion
  - loss of nerve
  - confusion
  lexicon: LSJ
  rationale: The noun literally denotes forgetfulness. Although idiomatically it may imply mental disorientation or the collapse of resolve, the main text keeps the more transparent lexical sense.
- source_word: θράσος
  chosen: boldness
  alternatives:
  - audacity
  - insolence
  - presumption
  lexicon: LSJ
  rationale: The term can be negative ('audacity, insolence'), but here it refers to the king's prior brazen resolve. 'Boldness' is readable while allowing the context to supply its arrogant quality.
- source_word: βαρύθυμον
  chosen: heavy-hearted
  alternatives:
  - stubborn
  - sullen
  - fierce-tempered
  lexicon: LSJ
  rationale: The adjective literally suggests heaviness of spirit or temper. 'Heavy-hearted' is a close rendering, though in context it likely describes a grim, oppressive disposition. The literal choice preserves the wording without over-interpreting.
- source_word: ἔλαβεν
  chosen: was overcome by
  alternatives:
  - took
  - seized
  - came upon
  lexicon: LSJ
  rationale: Although the verb is literally 'took,' English idiom requires an adjustment because 'forgetfulness took his boldness' is awkward. 'Was overcome by' conveys the sense that forgetfulness overtook and displaced his resolve.
