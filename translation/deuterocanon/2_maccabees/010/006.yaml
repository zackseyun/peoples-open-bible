translation:
  text: But when those around Makkabaios[a], while besieging it, gained possession of the strongholds, with lamentations and tears they, together with the crowds[b], pleaded with the Lord to send a good angel for the salvation of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a benevolent angel.' The Greek says 'a good angel,' which may describe the angel's character or beneficent role.
    reason: lexical_alternative
  - marker: b
    text: The Greek pronoun in 'while he was besieging it' is syntactically terse; the object is best understood as the fortified place under siege rather than a person.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ περὶ τὸν Μακκαβαῖον
  chosen: those around Makkabaios
  alternatives:
  - Maccabeus and his men
  - the men with Makkabaios
  - those with Makkabaios
  lexicon: LSJ
  rationale: The idiom literally means 'those around Makkabaios,' referring to his party or companions. Rendering it this way preserves the Greek expression without over-specifying military rank or number.
- source_word: μετέλαβον
  chosen: took over
  alternatives:
  - gained possession of
  - captured
  - occupied
  lexicon: LSJ
  rationale: The verb can mean to take possession of or obtain a share in. In this military context, 'took over' communicates seizure/control of the strongholds without adding more than the Greek states.
- source_word: τὰ ὀχυρώματα
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the fortified positions
  lexicon: LSJ
  rationale: The term denotes fortified places. 'Strongholds' is natural modern English and fits the military setting.
- source_word: πολιορκοῦντα αὐτόν
  chosen: while he was besieging it
  alternatives:
  - while he was besieging him
  - as he besieged the city
  lexicon: LSJ
  rationale: The participle modifies the action contemporaneously. The pronoun αὐτόν is awkward in English because its antecedent is implicit from context; 'it' best reflects a besieged place rather than a person, likely the fortified site/city under attack. This also honestly reflects the source's syntactic roughness.
- source_word: μετὰ ὀδυρμῶν καὶ δακρύων
  chosen: with lamentations and tears
  alternatives:
  - with mourning and tears
  - with cries of grief and tears
  lexicon: LSJ
  rationale: ὀδυρμός conveys lamentation or mourning. 'Lamentations and tears' preserves the emotional intensity in elevated but readable English.
- source_word: ἱκέτευον
  chosen: pleaded
  alternatives:
  - implored
  - entreated
  - begged
  lexicon: LSJ
  rationale: The verb is stronger than a simple 'asked.' 'Pleaded' captures earnest supplication in idiomatic English.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this Jewish scriptural context it refers reverently to God.
- source_word: ἀγαθὸν ἄγγελον
  lemma: ἀγαθός
  chosen: a good angel
  alternatives:
  - a benevolent angel
  - a favorable angel
  lexicon: LSJ
  rationale: The adjective ἀγαθός straightforwardly means 'good.' Retaining 'good angel' avoids interpretive expansion while preserving the text's wording.
- source_word: ἀποστεῖλαι πρὸς σωτηρίαν τῷ Ἰσραήλ
  chosen: to send ... for the salvation of Israel
  alternatives:
  - to send ... to save Israel
  - to send ... for Israel's deliverance
  lexicon: LSJ
  rationale: σωτηρία can mean salvation or deliverance. 'For the salvation of Israel' stays close to the Greek while remaining clear in English.
