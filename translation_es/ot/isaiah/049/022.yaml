translation:
  language: es
  text: 'Así dice el Señor Yahvé: He aquí, alzaré mi mano a las naciones y levantaré mi estandarte[a] a los pueblos; y traerán a tus hijos en su seno[b], y tus hijas serán llevadas sobre el hombro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'levantaré mi señal' o 'levantaré mi estandarte mayor'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'en el seno' o 'en el pliegue del vestido'; la idea es que los niños son llevados pegados al cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Conservo la combinación titular con distinción entre el nombre divino y el título de soberanía. En español, 'Yahvé el Señor' preserva el valor de אֲדֹנָי + יְהוִה sin la convención de ocultar el Nombre, y evita la redundancia o la pérdida del nombre propio.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Ve
  lexicon: HALOT
  rationale: Mantiene el tono profético solemne y deíctico. 'He aquí' es natural en español bíblico y conserva la fuerza retórica del llamado de atención.
- source_word: אֶשָּׂא ... יָדִי
  english_pob_choice: I will lift up my hand
  chosen_spanish: alzaré mi mano
  alternatives_spanish:
  - levantaré mi mano
  lexicon: HALOT
  rationale: '''Alzar'' comunica bien el gesto de elevar la mano en señal pública o solemne. Retiene la imagen corporal sin sobreexplicar el valor idiomático.'
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: HALOT
  rationale: En Isaías, el término designa pueblos/naciones en sentido amplio. 'Naciones' es el equivalente más natural y evita el matiz técnico posterior de 'gentiles'.
- source_word: אָרִים נִסִּי
  english_pob_choice: raise my banner
  chosen_spanish: levantaré mi estandarte
  alternatives_spanish:
  - levantaré mi bandera
  - alzaré mi señal
  lexicon: HALOT
  rationale: '''Estandarte'' comunica el valor de נֵס como señal de convocatoria o reunión, en un registro más bíblico y preciso que ''bandera'' para el contexto profético.'
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: Conservo la variación paralela respecto de 'las naciones'. 'Pueblos' refleja bien la segunda mitad del paralelismo sin borrar la diferencia léxica.
- source_word: וְהֵבִיאוּ
  english_pob_choice: they will bring
  chosen_spanish: traerán
  alternatives_spanish:
  - llevarán
  lexicon: HALOT
  rationale: El verbo hebreo expresa el traslado de los hijos hacia el lugar señalado. En español, 'traerán' resulta natural desde la perspectiva del discurso profético.
- source_word: בָנַיִךְ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus varones
  - tus hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, el paralelismo con 'tus hijas' permite en español 'tus hijos' como genérico masculino natural, sin perder la referencia a la descendencia masculina y sin forzar una redundancia poco idiomática.
- source_word: בְּחֹצֶן
  english_pob_choice: in their bosom
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su pecho
  - en el pliegue de su vestido
  lexicon: HALOT
  rationale: 'Sigo la decisión revisada del POB inglés: el término apunta a cercanía corporal, al sostener al niño contra el cuerpo. ''En su seno'' conserva el registro formal y la imagen de proximidad física.'
- source_word: בְנֹתַיִךְ
  english_pob_choice: your daughters
  chosen_spanish: tus hijas
  alternatives_spanish:
  - tus niñas
  - tus hijas mujeres
  lexicon: HALOT
  rationale: Traducción directa y precisa del plural femenino, en paralelo con 'tus hijos'.
- source_word: עַל כָּתֵף תִּנָּשֶׂאנָה
  english_pob_choice: will be carried on the shoulder
  chosen_spanish: serán llevadas sobre el hombro
  alternatives_spanish:
  - serán cargadas sobre el hombro
  - irán sobre el hombro
  lexicon: HALOT
  rationale: El niphal pasivo queda bien reflejado con 'serán llevadas'. 'Sobre el hombro' mantiene la imagen concreta y formal del hebreo.
theological_decisions:
- issue: Tratamiento del Nombre divino en יְהוָה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: La base hebrea contiene explícitamente el Tetragrámaton. En la serie española se sigue el principio de traducir יְהוָה como 'Yahvé'. Al mismo tiempo, se conserva la función del título אֲדֹנָי con 'el Señor', de modo que la fórmula resulte reverente y distinguible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'in their arms' por 'in their bosom' para acercarse más a בְּחֹצֶן. En español, la elección 'en su seno' sigue esa revisión y conserva el registro elevado. También se mantuvo el valor de convocatoria pública en נֵס mediante 'estandarte'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto en español.
  - Se conserva la distinción paralela entre 'naciones' y 'pueblos'.
  - Se mantiene el sujeto plural implícito de 'traerán' y 'serán llevadas' sin añadir elementos no presentes en el hebreo.
  - '''Seno'' se emplea aquí en sentido corporal/formal, no afectivo.'
