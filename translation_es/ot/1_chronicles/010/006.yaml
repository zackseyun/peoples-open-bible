translation:
  language: es
  text: Entonces murió Saúl[a], y sus tres hijos, y toda su casa murieron juntamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo su hogar», «toda su familia» o «todo su linaje». El hebreo dice literalmente «toda su casa», que puede referirse al hogar, a la familia o a la línea dinástica asociada con Saúl.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: So Saul died
  chosen_spanish: Así murió Saúl
  alternatives_spanish:
  - Y murió Saúl
  - Entonces murió Saúl
  lexicon: HALOT
  rationale: El wayyiqtol introduce la continuación narrativa; «Así» comunica en español el resultado y el avance del relato sin forzar una repetición mecánica de «y». El verbo hebreo simplemente expresa que murió.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Nombre propio bíblico
  rationale: Se adapta el nombre propio a la forma habitual del español bíblico, con tilde por la acentuación natural de la palabra en español.
- source_word: וּשְׁלֹשֶׁת בָּנָיו
  english_pob_choice: and his three sons
  chosen_spanish: sus tres hijos
  alternatives_spanish:
  - y sus tres hijos
  - y los tres hijos de él
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se expresa de manera natural como «sus tres hijos». «Hijos» preserva el sentido de בָּנִים en español sin añadir interpretación.
- source_word: וְכָל בֵּיתוֹ
  english_pob_choice: and all his house
  chosen_spanish: toda su casa
  alternatives_spanish:
  - toda su casa[household]
  - todo su linaje
  - toda su familia
  lexicon: HALOT
  rationale: «Casa» conserva el término hebreo בַּיִת y su amplitud semántica de casa/casa real/hogar/casa dinástica. En español, «toda su casa» mantiene esa tensión mejor que reducirlo de inmediato a «familia» o «hogar».
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - todos a una
  lexicon: HALOT
  rationale: El adverbio expresa simultaneidad/colectividad de la muerte. «Juntamente» suena digno y conserva la idea de ocurrencia conjunta.
- source_word: מֵתוּ
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - murieron
  lexicon: HALOT
  rationale: En español, el primer verbo se coordina naturalmente en singular con Saúl; el hebreo luego retoma el plural para el conjunto. La repetición final de «murió» no sería idiomática en español, por lo que se refleja la acción con el verbo en singular inicial y el plural colectivo al final.
theological_decisions:
- issue: Alcance de «toda su casa»
  english_pob_reading: Retain 'all his house' in the main text without narrowing it to every member of Saul's extended family.
  chosen_spanish_reading: Mantener «toda su casa» sin reducirlo en el texto principal a «toda su familia» o «todo su linaje».
  alternative_spanish_readings:
  - toda su familia
  - todo su linaje
  - toda su casa / su casa real
  rationale: El hebreo puede referirse a la casa/hogar/linaje asociado con Saúl. «Casa» conserva esa amplitud y evita precisar más de lo que el texto afirma explícitamente. La formulación mantiene la tensión entre hogar, casa y descendencia sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura final del POB en inglés, que eliminó la pausa fuerte después de «sons» para conservar un flujo narrativo natural. En español, la secuencia con comas y el adverbio inicial «Así» mantiene ese flujo y la repetición del verbo en la cláusula final, sin añadir una separación no presente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «casa» como equivalente de בַּיִת en este contexto, coherente con el uso POB de preservar la amplitud semántica del hebreo.
  - Se evita «SEÑOR» o una sustitución interpretativa innecesaria, porque este versículo no contiene el nombre divino.
  - 'La coordinación con comas reproduce la acumulación hebrea: Saúl, sus hijos y su casa, todos incluidos en la muerte conjunta.'
