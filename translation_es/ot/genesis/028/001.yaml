translation:
  language: es
  text: 'Entonces Isaac llamó a Jacob, lo bendijo y le ordenó,[a] diciendo: «No tomarás esposa de las hijas de Canaán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de las hijas de Canaán», un giro idiomático que se refiere a mujeres cananeas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: HALOT
  rationale: קרא con אֶל + persona expresa llamar a alguien; en español «llamó a Jacob» conserva la acción narrativa natural sin añadir la formalidad de «convocó».
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - bendijo a él
  lexicon: HALOT
  rationale: ברך se traduce de forma directa por «bendecir»; el pronombre átono en español mantiene la referencia clara y la secuencia verbal del hebreo.
- source_word: וַיְצַוֵּהוּ
  english_pob_choice: commanded him
  chosen_spanish: le dio esta orden
  alternatives_spanish:
  - le mandó
  - le ordenó
  - le encargó
  lexicon: HALOT
  rationale: צוה comunica mandato/autorización paterna. «Le dio esta orden» conserva la fuerza imperativa en español con un tono natural; evita un calco demasiado rígido y no suaviza indebidamente la autoridad del acto.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  lexicon: HALOT
  rationale: Se mantiene la introducción del discurso directo con «diciendo», que refleja el encadenamiento verbal del hebreo sin sobrecargar la frase.
- source_word: לֹא תִקַּח
  english_pob_choice: You shall not take
  chosen_spanish: No tomarás
  alternatives_spanish:
  - No debes tomar
  - No tomarás por esposa
  lexicon: HALOT
  rationale: La prohibición en segunda masculina singular se expresa con futuro de mandato, natural y solemne en español bíblico contemporáneo. Evita el coloquial «no tomes» y preserva la fuerza normativa.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - una esposa
  lexicon: HALOT
  rationale: En contexto matrimonial, אִשָּׁה significa «esposa» más que «mujer». «Tomar esposa» suena natural en español y conserva el sentido de matrimonio, no solo de elección femenina.
- source_word: מִבְּנוֹת כְּנָעַן
  english_pob_choice: from the daughters of Canaan
  chosen_spanish: de las hijas de Canaán
  alternatives_spanish:
  - de entre las mujeres cananeas
  - de las cananeas
  lexicon: HALOT
  rationale: Se mantiene la textura literal del hebreo («hijas de Canaán») porque el POB inglés también conservó esa idiomática. En español es entendible y deja abierta la equivalencia idiomática a mujeres cananeas sin perder el sabor del original.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la secuencia narrativa, el mandato paterno y la idiomática «de las hijas de Canaán» sin expandir el sentido más allá de lo atestiguado. No se requirieron revisiones previas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; en este versículo no aparece.
  - «Esposa» se emplea aquí por el contexto matrimonial, no como sustituto general de אִשָּׁה en todos los pasajes.
  - Se conserva la idiomática «hijas de Canaán» con nota para mantener la transparencia del hebreo y la coherencia con la decisión inglesa.
