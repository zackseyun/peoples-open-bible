translation:
  language: es
  text: Entonces Semeí[a] se levantó, aparejó su asno y fue a Gat, a Aquis, para buscar a sus esclavos. Y Semeí fue y trajo a sus esclavos de Gat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus siervos'. El hebreo עֲבָדָיו puede denotar siervos o esclavos; aquí se usa 'esclavos' porque el contexto subraya su condición de servidumbre y la recuperación de fugitivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: קום expresa levantarse o ponerse en movimiento; en español, 'se levantó' comunica con naturalidad el inicio de la acción narrativa sin añadir matiz excesivamente literal o arcaizante.
- source_word: וַיַּחֲבֹשׁ אֶת חֲמֹרוֹ
  english_pob_choice: saddled his donkey
  chosen_spanish: aparejó su asno
  alternatives_spanish:
  - ensilló su asno
  - preparó su asno
  lexicon: HALOT
  rationale: חבש en contexto de viaje con un asno no solo implica 'sujetar', sino preparar el animal para el viaje. 'Aparejó' es un equivalente natural y digno; 'asno' conserva el referente animal del hebreo.
- source_word: גַּתָה
  english_pob_choice: to Gath
  chosen_spanish: a Gat
  alternatives_spanish:
  - hacia Gat
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia la ciudad; en español, 'a Gat' expresa bien esa dirección sin forzar una forma adverbial poco natural.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Akís
  alternatives_spanish:
  - Aquis
  lexicon: transliteration
  rationale: Se translitera el nombre propio al español. 'Akís' sigue una forma ampliamente inteligible y mantiene la transliteración del nombre sin convertirlo en título ni traducirlo.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: para buscar
  alternatives_spanish:
  - para buscar a
  - para buscar
  lexicon: HALOT
  rationale: בקש puede ser 'buscar' o 'buscar/indagar por'. En esta escena concreta, 'buscar' es claro y fiel en español; no se añade una paráfrasis como 'ir en busca de' porque el hebreo presenta un infinitivo simple de finalidad.
- source_word: עֲבָדָיו
  english_pob_choice: his slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  lexicon: HALOT
  rationale: עבד puede ser 'siervo' o 'esclavo', pero el contexto enfatiza la condición de propiedad y la recuperación de fugitivos, por lo que 'esclavos' preserva la fuerza léxica elegida en el audit trail inglés.
- source_word: וַיָּבֵא אֶת עֲבָדָיו מִגַּת
  english_pob_choice: brought his slaves from Gath
  chosen_spanish: trajo a sus esclavos de Gat
  alternatives_spanish:
  - los trajo de Gat
  - llevó a sus esclavos desde Gat
  lexicon: HALOT
  rationale: בוא en hiphil es 'traer'. En español, 'trajo ... de Gat' reproduce el contenido explícito del hebreo sin añadir 'de vuelta', que no está dicho de manera directa.
theological_decisions:
- issue: Estado social de עֲבָדָיו
  english_pob_reading: his slaves
  chosen_spanish_reading: sus esclavos
  alternative_spanish_readings:
  - sus siervos
  rationale: 'La traducción mantiene la tensión léxica documentada: aunque עבד puede significar ''siervo'', aquí el contexto narrativo apunta a personas esclavizadas o vinculadas por propiedad. La opción ''esclavos'' conserva esa fuerza sin suavizarla.'
  doctrine_reference: Lexical semantics / social-status terminology
translation_notes:
  revision_awareness: 'Se siguió el ajuste final del audit trail inglés: preferir un registro formal y no añadir ''de vuelta'' porque no está explicitado en el hebreo. La decisión sobre ''esclavos'' mantiene la elección léxica ya justificada en el inglés POB.'
  spanish_consistency_notes:
  - Se mantuvo la transliteración de nombres propios en español sin traducirlos como títulos.
  - '''asno'' conserva el referente del hebreo חמור, evitando modernizarlo a ''burro'' si pudiera alterar el tono bíblico.'
  - La construcción con dos oraciones coordinadas reproduce la repetición del sujeto y del movimiento en el hebreo.
