translation:
  language: es
  text: a causa de sus pecados que cometió[a], haciendo lo que era malo a los ojos de Yahvé, siguiendo el camino de Jeroboam y en su pecado que cometió, haciendo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el pecado que él hizo, para hacer pecar a Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - por motivo de
  lexicon: HALOT
  rationale: En esta fórmula de juicio, עַל introduce la base causal de la condena. «A causa de» comunica de manera natural esa relación causal en español y conserva el sentido de motivo o fundamento del juicio.
- source_word: חטאתו אֲשֶׁר חָטָא
  english_pob_choice: the sins that he committed
  chosen_spanish: sus pecados que cometió
  alternatives_spanish:
  - su pecado que cometió
  - el pecado que cometió
  lexicon: HALOT
  rationale: El hebreo usa una construcción cognada idiomática («su pecado que pecó») para hablar de actos reales de pecado. En español, el plural «pecados» refleja mejor el valor colectivo/abarcador que señaló la POB en inglés, y «que cometió» conserva el hecho de consumar esas acciones.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: doing what was evil
  chosen_spanish: haciendo lo malo
  alternatives_spanish:
  - para hacer el mal
  - haciendo el mal
  lexicon: HALOT
  rationale: La frase explica en qué consistió su pecado. «Haciendo lo malo» mantiene el valor verbal y evita una literalidad rígida, a la vez que conserva la categoría moral del hebreo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  lexicon: HALOT
  rationale: Se conserva el idiomático evaluativo hebreo con una equivalencia natural en español. «Ante los ojos de Yahvé» mantiene la imagen y expresa la valoración divina sin sustituir el nombre propio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la directriz del proyecto, el Tetragrámaton se traduce como «Yahvé», preservando el nombre personal del Dios de Israel en lugar de una sustitución titulada.
- source_word: לָלֶכֶת בְּדֶרֶךְ יָרָבְעָם
  english_pob_choice: walking in the way of Jeroboam
  chosen_spanish: andando en el camino de Jeroboam
  alternatives_spanish:
  - andando en la senda de Jeroboam
  - siguiendo el camino de Jeroboam
  lexicon: HALOT
  rationale: La metáfora hebrea de conducta o patrón de vida se conserva con «andando en el camino de Jeroboam», que suena natural y reproduce el sentido figurado de la expresión.
- source_word: וּבְחַטָּאתוֹ אֲשֶׁר עָשָׂה
  english_pob_choice: and in his sin that he committed
  chosen_spanish: y en su pecado que cometió
  alternatives_spanish:
  - y en el pecado que cometió
  - y en su pecado que hizo
  lexicon: HALOT
  rationale: La revisión inglesa restablece el posesivo y el verbo literal. En español, «su pecado que cometió» conserva esa relación posesiva y mantiene la estructura cognada sin forzar una paráfrasis más interpretativa.
- source_word: לְהַחֲטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: causing Israel to sin
  chosen_spanish: haciendo pecar a Israel
  alternatives_spanish:
  - causando que Israel pecara
  - llevando a Israel a pecar
  lexicon: HALOT
  rationale: 'El Hiphil de חטא es causativo: «hacer pecar». «Haciendo pecar a Israel» expresa de forma directa la causación sin perder la fuerza léxica del hebreo ni depender de una construcción más explicativa.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente; por coherencia con la política del proyecto y con la POB inglesa, se preserva el nombre propio como «Yahvé» en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que restauró el posesivo y el verbo en la segunda cláusula («his sin that he committed») y expresó con mayor directitud la causación final («causing Israel to sin»). En español se preserva esa distinción con «su pecado que cometió» y «haciendo pecar a Israel».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la política del proyecto.
  - Se usa «pecados» en plural para reflejar el valor colectivo/abarcador de חטאתו en el contexto.
  - Se conserva la metáfora conductual con «andar en el camino».
  - «Haciendo pecar» preserva el valor causativo del verbo hebreo לְהַחֲטִיא.
