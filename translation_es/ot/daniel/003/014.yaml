translation:
  language: es
  text: 'Nabucodonosor respondió y les dijo: «¿Es verdad[a], Sadrac, Mesac y Abed-nego, que ustedes no sirven a mi dios y no se postran ante la imagen de oro que he levantado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión aramea הַצְדָּא también puede significar «deliberadamente» o «a propósito»: «¿Es deliberado, Sadrac, Mesac y Abed-nego, que ustedes no sirven a mi dios…?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - respondió, diciendo
  - contestó y dijo
  lexicon: HALOT
  rationale: El binomio arameo es una fórmula narrativa idiomática para introducir discurso. En español, «respondió y dijo» suena más natural que un calco rígido, pero conserva el tono formal y la estructura repetida del original.
- source_word: לְהוֹן
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a los tres
  - a ellos todos
  lexicon: HALOT
  rationale: El sufijo pronominal plural masculino se refiere a los tres jóvenes hebreos como grupo. «A ellos» es directo y transparente en español.
- source_word: הַצְדָּא
  english_pob_choice: Is it true
  chosen_spanish: ¿Es verdad?
  alternatives_spanish:
  - ¿Es deliberado?
  - ¿Fue a propósito?
  lexicon: HALOT
  rationale: La lectura principal en el inglés POB toma el valor de verdad/realia en este contexto. «¿Es verdad?» comunica bien la pregunta inicial sin resolver del todo la ambigüedad entre verdad fáctica e intención.
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Shadrach, Meshach y Abed-nego
  - Sadrac, Mésac y Abed-Nego
  lexicon: HALOT
  rationale: Se usan las formas españolas consolidadas de estos nombres propios, manteniendo la reconocibilidad bíblica y evitando una transliteración innecesariamente cruda.
- source_word: לֵאלָהַי
  english_pob_choice: my god
  chosen_spanish: mi dios
  alternatives_spanish:
  - mi Dios
  - mis dioses
  lexicon: HALOT
  rationale: La forma aramea es singular con sufijo de primera persona. En la voz del rey pagano, «mi dios» mantiene la referencia singular y evita capitalizar indebidamente un referente no identificado como el Dios de Israel.
- source_word: פָּלְחִין
  english_pob_choice: serve
  chosen_spanish: sirven
  alternatives_spanish:
  - sirven con culto
  - rinden servicio
  lexicon: HALOT
  rationale: El verbo expresa servicio cultual o leal, no solo adoración interior. «Sirven» preserva la distinción respecto al verbo siguiente de postración y funciona de manera natural en español.
- source_word: וּלְצֶלֶם דַּהֲבָא
  english_pob_choice: the golden image
  chosen_spanish: la imagen de oro
  alternatives_spanish:
  - la imagen dorada
  - la estatua de oro
  lexicon: HALOT
  rationale: «Imagen» mantiene la terminología consistente con el capítulo, y el constructo arameo se refleja con «de oro», que reproduce bien la relación nominal sin forzar un adjetivo menos preciso.
- source_word: דִּי הֲקֵימֶת
  english_pob_choice: that I have set up
  chosen_spanish: que he levantado
  alternatives_spanish:
  - que he erigido
  - que he establecido
  lexicon: HALOT
  rationale: El verbo arameo indica erigir/poner en pie. «He levantado» expresa bien la acción de erigir la imagen en español corriente y conserva la referencia a una obra ya completada con relevancia presente.
- source_word: סָגְדִין
  english_pob_choice: bow down
  chosen_spanish: se postran
  alternatives_spanish:
  - se inclinan
  - se arrodillan
  lexicon: HALOT
  rationale: El verbo denota postración física, no solo respeto interior. «Se postran» mantiene la diferencia con «sirven» y refleja con claridad el gesto corporal de adoración.
theological_decisions:
- issue: Distinguir entre servicio cultual y postración física
  english_pob_reading: Retained 'serve' and 'bow down' as separate actions
  chosen_spanish_reading: Se conservaron «sirven» y «se postran» como acciones distintas
  alternative_spanish_readings:
  - usar «adoran» para uno o ambos verbos
  - fusionar ambos en «rinden culto»
  rationale: 'El arameo usa dos verbos distintos: uno para servicio/culto y otro para postración. Mantener la distinción evita reducir la acusación del rey a una sola categoría abstracta y refleja mejor el énfasis retórico del texto.'
  doctrine_reference: Translation philosophy §5 (Consistencia de términos clave, o excepción documentada)
- issue: Ambigüedad de הַצְדָּא
  english_pob_reading: Rendered as 'Is it true' in the main text
  chosen_spanish_reading: Se tradujo «¿Es verdad?» en el texto principal
  alternative_spanish_readings:
  - «¿Es deliberado?»
  - «¿Fue a propósito?»
  rationale: La expresión admite una oscilación entre verdad factual e intención deliberada. La redacción principal sigue el sentido inmediato de interrogación, mientras que la alternativa queda implícita en la forma de pregunta sin sobreexplicar la intención.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en lugar de resolverla)
- issue: Referencia divina en «mi dios»
  english_pob_reading: my god
  chosen_spanish_reading: Se mantuvo «mi dios» en minúscula
  alternative_spanish_readings:
  - «mi Dios»
  - «mis dioses»
  rationale: El hablante es Nabucodonosor, que se refiere a una deidad propia en el marco pagano del relato. La minúscula evita confundirla con el nombre del Dios de Israel y respeta la singularidad del morfema arameo.
  doctrine_reference: Translation philosophy §5 (Consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última pasada revisada: no se introdujeron cambios de sentido respecto del audit trail en inglés. Se conservó la ambigüedad de הַצְדָּא mediante nota, y se mantuvo la distinción entre «servir» y la postración ante la imagen.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Tetragrámaton cuando aparezca en el contexto bíblico general; aquí no aparece en el versículo.
  - Se mantiene «Mesac» y no «Mésac» para seguir la forma española bíblica más extendida y consistente en la serie de nombres.
  - «Imagen de oro» reproduce la terminología del capítulo y evita sustituirla por una paráfrasis moderna que debilite la consistencia textual.
