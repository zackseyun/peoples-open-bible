review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: puertas abiertas continuamente, día y noche no cerradas, con propósito de introducir la riqueza de las naciones y a sus reyes en condición pasiva. Sin embargo, no preserva del todo la decisión inglesa sobre וּמַלְכֵיהֶם como elemento acompañante (''with their kings''), y omite la nota alternativa documentada para נְהוּגִים. Además, ''para traer a ti'' suena poco natural en español para לְהָבִיא אֵלַיִךְ.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos puntos de naturalidad mejorables: ''para traer a ti'' es un calco poco idiomático, y ''y sus reyes'' puede leerse como coordinación menos estrecha que ''con sus reyes''. La frase final funciona mejor como ''para que te sea traída... con sus reyes llevados en procesión'' o equivalente.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'La riqueza de las naciones' concuerda con la decisión contextual para חֵיל. 'Llevados en procesión' mantiene adecuadamente el matiz pasivo de נְהוּגִים, pero conviene añadir la nota alternativa ya documentada en la auditoría inglesa.
  issues:
  - severity: medium
    issue: '''para traer a ti'' es español poco natural'
    rationale: Aunque refleja literalmente לְהָבִיא אֵלַיִךְ, en español bíblico natural se prefiere 'para traerte' o mejor una construcción final pasiva como 'para que te sea traída'.
  - severity: medium
    issue: '''y sus reyes'' debilita el valor acompañante de וּמַלְכֵיהֶם'
    rationale: La auditoría inglesa justificó 'with their kings' para mostrar que los reyes acompañan la riqueza traída; en español 'con sus reyes' preserva mejor esa relación que una simple coordinación con 'y'.
  - severity: low
    issue: Falta la nota alternativa sobre נְהוּגִים
    rationale: La POB inglesa conserva alternativas como 'siendo llevados' o 'llevados/dirigidos'; la revisión española debería mantener esa ambigüedad significativa, especialmente porque 'en procesión' es interpretativa.
  revised_spanish_text: Tus puertas estarán abiertas[a] continuamente; de día y de noche no serán cerradas, para que te sea traída la riqueza de las naciones[b], con sus reyes llevados en procesión[c].
  revised_footnotes:
