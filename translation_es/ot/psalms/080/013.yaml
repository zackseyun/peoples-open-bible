translation:
  language: es
  text: ¿Por qué has derribado su cerca[a], de modo que todos los que pasan por el camino le arrancan su fruto[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vallado» o «su muro de protección»; el hebreo se refiere al cerco protector de una viña.
    reason: lexical_alternative
  - marker: b
    text: O «lo recogen» o «lo arrancan»; el verbo hebreo sugiere arrancar o recoger lo producido de la viña más que una destrucción total en esta cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: HALOT
  rationale: Interrogativo de lamento y reproche. «¿Por qué?» es la equivalencia natural, clara y solemne en español.
- source_word: פָּרַצְתָּ
  english_pob_choice: have you broken down
  chosen_spanish: has derribado
  alternatives_spanish:
  - has hecho brecha en
  - has quebrantado
  lexicon: HALOT
  rationale: El verbo comunica la acción de romper o abrir violentamente la cerca protectora. «Derribado» funciona bien en español para una barrera/enrejado de viña y evita sonar demasiado abstracto.
- source_word: גְדֵרֶיהָ
  english_pob_choice: its walls
  chosen_spanish: su cerca
  alternatives_spanish:
  - su vallado
  - su muro de protección
  - su cerca protectora
  lexicon: HALOT
  rationale: El término hebreo designa el cerco protector de una viña, no muros urbanos. «Cerca» conserva la imagen agrícola y evita una identificación con murallas de ciudad.
- source_word: וְאָרוּהָ
  english_pob_choice: so that all who pass by the way pluck its fruit
  chosen_spanish: de modo que todos los que pasan por el camino la despojan
  alternatives_spanish:
  - y todos los que pasan por el camino la arrancan
  - de modo que todos los transeúntes le arrancan su fruto
  lexicon: HALOT
  rationale: El verbo sugiere arrancar/pluquear lo que produce la viña, no necesariamente destruirla por completo. En español «despojan» transmite la idea de quitarle lo producido sin forzar un objeto explícito que el hebreo deja implícito.
- source_word: כָּל עֹבְרֵי דָרֶךְ
  english_pob_choice: all who pass by the way
  chosen_spanish: todos los que pasan por el camino
  alternatives_spanish:
  - todos los transeúntes
  - todos los que van por el camino
  lexicon: HALOT
  rationale: Mantiene el sentido colectivo y la cadencia poética de «all who pass by the way», con una formulación natural en español.
theological_decisions:
- issue: Metáfora de la viña y referente femenino
  english_pob_reading: Render the suffixes as referring to the vine/vineyard with neuter English 'its' language
  chosen_spanish_reading: Mantener el referente implícito de la viña con «su/la» sin explicitar «Israel»
  alternative_spanish_readings:
  - explicitar «la viña de Israel»
  - reducir la imagen a una referencia directa al pueblo
  rationale: El contexto inmediato del salmo presenta a Israel como viña. El español puede conservar la metáfora con pronombres naturales («su», «la») sin borrar el referente ni convertir el verso en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto del expediente inglés muestra alta concordancia y sin revisiones aplicadas; por tanto, se mantiene la decisión léxica y metafórica básica, ajustando solo la redacción española para que suene natural y auditable.
  spanish_consistency_notes:
  - Se preserva la metáfora agrícola de la viña sin convertirla en una imagen urbana.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa que lo exija.
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis española moderna.
