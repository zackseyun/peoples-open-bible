    rationale: 'El inglés auditado eliminó comas para estilo formal más fluido. En español, ''a Zilpá su esclava a Lea su hija como esclava'' sería demasiado comprimido, pero sí conviene reducir la puntuación a lo necesario: mantener la aposición final de ''su hija'' sin cargar toda la oración.'
