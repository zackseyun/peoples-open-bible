translation:
  language: es
  text: Allí están Mesec y Tubal[a], y toda su multitud; sus sepulcros están alrededor de él. Todos ellos son incircuncisos, muertos a espada, porque sembraron su terror en la tierra de los vivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y toda su multitud; alrededor de él están sus sepulcros», con cambios de número y género en la línea poética.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There are
  chosen_spanish: Allí están
  alternatives_spanish:
  - Allí hay
  - Allí
  lexicon: HALOT
  rationale: El hebreo funciona de modo deíctico en un enunciado sin verbo pleno; en español, 'Allí están' conserva la localización y hace natural la cláusula nominal.
- source_word: מֶשֶׁךְ תֻּבַל
  english_pob_choice: Meshech and Tubal
  chosen_spanish: Mesec y Tubal
  alternatives_spanish:
  - Meshec y Tubal
  - Mesech y Tubal
  lexicon: HALOT
  rationale: Son nombres propios de pueblos/regiones; se transliteran. 'Mesec' mantiene una forma española más estable y legible, sin alterar la identificación.
- source_word: וְכָל הֲמוֹנָהּ
  english_pob_choice: and all her multitude
  chosen_spanish: y toda su multitud
  alternatives_spanish:
  - y toda su muchedumbre
  - y todo su gentío
  lexicon: HALOT
  rationale: '''Multitud'' preserva el sentido colectivo y el tono bíblico sin volverlo militar de más. Se conserva el sufijo femenino por el antecedente colectivo/nación.'
- source_word: סְבִיבוֹתָיו קִבְרוֹתֶיהָ
  english_pob_choice: their graves are all around him
  chosen_spanish: sus sepulcros están alrededor de él
  alternatives_spanish:
  - los sepulcros de ellos están alrededor de él
  - sus tumbas están alrededor de él
  lexicon: HALOT
  rationale: El hebreo presenta un cambio de sufijos de número y género. 'Sus sepulcros' regulariza el posesivo para el español, mientras 'alrededor de él' conserva el cierre pronominal singular y la imagen poética.
- source_word: עֲרֵלִים
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - no circuncidados
  - sin circuncisión
  lexicon: HALOT
  rationale: Se mantiene el término literal, porque en Ezequiel tiene fuerza de vergüenza pactal y no conviene suavizarlo con una paráfrasis.
- source_word: מְחֻלְלֵי חֶרֶב
  english_pob_choice: slain by the sword
  chosen_spanish: muertos a espada
  alternatives_spanish:
  - heridos por la espada
  - caídos por la espada
  lexicon: HALOT
  rationale: La construcción participial indica resultado letal; 'muertos a espada' es natural en español y conserva el valor de muerte violenta.
- source_word: נָתְנוּ חִתִּיתָם
  english_pob_choice: they spread their terror
  chosen_spanish: hicieron temblar su terror
  alternatives_spanish:
  - pusieron su terror
  - esparcieron su terror
  lexicon: HALOT
  rationale: El hebreo idiomático 'dar/poner terror' expresa causar pavor. 'Hicieron temblar su terror' intenta conservar la fuerza causativa y el sustantivo 'terror', aunque en español es una solución algo marcada para no perder el eco del original.
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivos
  alternatives_spanish:
  - en la tierra de la vida
  - en el país de los vivos
  lexicon: HALOT
  rationale: '''Tierra de los vivos'' es un hebraísmo comprensible; ''tierra'' mantiene el paralelismo con el binomio vida/muerte y el contraste con el ámbito de los muertos.'
theological_decisions:
- issue: Mantenimiento del lenguaje de incircuncisión como vergüenza de pacto
  english_pob_reading: uncircumcised
  chosen_spanish_reading: incircuncisos
  alternative_spanish_readings:
  - no circuncidados
  - sin circuncisión
  rationale: 'La palabra conserva la carga teológica y retórica del oráculo: muerte sin la señal del pacto y en condición de oprobio. No se debe reemplazar por un término más genérico.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Regularización parcial de los sufijos poéticos cambiantes
  english_pob_reading: their graves are all around him
  chosen_spanish_reading: sus sepulcros están alrededor de él
  alternative_spanish_readings:
  - los sepulcros de ellos están alrededor de él
  - sus tumbas están alrededor de él
  rationale: El hebreo alterna singular/plural y masculino/femenino en un giro poético comprimido. En español conviene regularizar el posesivo para legibilidad, sin borrar la rareza textual que se marca en la nota.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y quedó sin cambios en el último pase; la traducción española sigue esa lectura estable, pero resuelve en español la tensión de los sufijos cambiantes mediante una regularización leve y una nota breve.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa 'incircuncisos' por su valor pactal y su correspondencia directa con el hebreo.
  - Se prefieren nombres propios transliterados ('Mesec', 'Tubal') y vocabulario bíblico transparente ('sepulcros', 'tierra de los vivos').
