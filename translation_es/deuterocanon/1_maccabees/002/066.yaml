translation:
  language: es
  text: Y Judas Macabeo mismo[a], fuerte en poder desde su juventud, será para ustedes el comandante del ejército, y ustedes pelearán la guerra contra las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido dice literalmente algo como “fuerte en poder desde él, desde su juventud”; la frase es difícil, y aquí se da el sentido aparente: que Judas ha sido fuerte desde su juventud.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἰούδας ὁ Μακκαβαῖος
  english_pob_choice: Judas Maccabeus
  chosen_spanish: Judas Macabeo
  alternatives_spanish:
  - Judá el Macabeo
  - Judas el Macabeo
  lexicon: LSJ
  rationale: Ἰούδας se conserva como nombre propio en forma española tradicional, y ὁ Μακκαβαῖος funciona como epíteto/nombre de identificación. 'Macabeo' preserva el valor del sobrenombre sin convertirlo en una traducción explicativa.
- source_word: ἰσχυρὸς δυνάμει
  english_pob_choice: strong in might
  chosen_spanish: fuerte en poder
  alternatives_spanish:
  - fuerte en fuerza
  - poderoso en poder
  lexicon: LSJ
  rationale: La combinación es enfática y algo redundante en griego. 'Fuerte en poder' conserva esa intensificación sin sonar demasiado forzado en español, y mantiene la relación de ἰσχυρός con δύναμις.
- source_word: ἐκ αὐτοῦ ἐκ νεότητος αὐτοῦ
  english_pob_choice: from his youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - desde joven
  - desde su niñez
  lexicon: LSJ
  rationale: El texto griego transmitido tiene una construcción difícil y algo opaca. El sentido claro, según el audit trail inglés, es que Judas ha sido fuerte desde su juventud. 'Desde su juventud' comunica ese valor sin perder el matiz temporal.
- source_word: ἄρχοντα στρατιᾶς
  english_pob_choice: commander of the army
  chosen_spanish: caudillo del ejército
  alternatives_spanish:
  - comandante del ejército
  - jefe del ejército
  lexicon: LSJ
  rationale: '''Ἄρχων'' puede designar a un líder o jefe, y ''στρατιά'' aquí es un cuerpo militar. ''Caudillo'' transmite liderazgo militar con dignidad literaria, mientras ''del ejército'' conserva στρατιᾶς de forma natural en español.'
- source_word: πολεμήσετε πόλεμον
  english_pob_choice: you shall fight the war
  chosen_spanish: harán la guerra
  alternatives_spanish:
  - pelearán la guerra
  - librarán guerra
  lexicon: LSJ
  rationale: La construcción cognada enfatiza la acción bélica. Siguiendo la revisión inglesa más directa, 'harán la guerra' conserva el sentido de πολεμήσετε πόλεμον con naturalidad en español.
- source_word: λαῶν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: LSJ
  rationale: En este contexto militar y político, 'las naciones' expresa mejor a los colectivos extranjeros enfrentados. Evita introducir una carga teológica innecesaria que 'gentiles' podría sugerir en español cristiano.
theological_decisions:
- issue: Tratamiento de la frase difícil ἐκ αὐτοῦ ἐκ νεότητος αὐτοῦ
  english_pob_reading: 'Render the clause by its clear sense: Judas is strong from his youth.'
  chosen_spanish_reading: 'Traducir por el sentido claro: Judas es fuerte desde su juventud.'
  alternative_spanish_readings:
  - fuerte de él, desde su juventud
  - fuerte por él, desde su juventud
  rationale: No es una cuestión doctrinal mayor, pero sí un cruce textual/lexical real. El griego transmitido es torpe si se vierte literalmente; por eso el texto principal sigue el sentido evidente, mientras la nota documenta la dificultad para no borrar la tensión del original.
  doctrine_reference: Principio de equivalencia óptima con primacía del texto fuente y auditoría transparente de las decisiones.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió 'fight the war' sobre 'fight the battle' por ser más natural y más directamente ligada a πολεμήσετε πόλεμον. También conserva la nota sobre la dureza de ἐκ αὐτοῦ ἐκ νεότητος αὐτοῦ, sin ocultar el cruce textual.
  spanish_consistency_notes:
  - Se mantiene 'Macabeo' como epíteto propio, no como sustantivo común.
  - '''Poder'' y ''fuerte'' se usan para reflejar la intensificación ἰσχυρὸς δυνάμει sin rigidizar la frase.'
  - '''Las naciones'' conserva el referente colectivo del griego y sigue el criterio del audit trail inglés.'
  - La puntuación y el orden de las cláusulas buscan una lectura pública natural en español, sin separar innecesariamente los elementos del griego.
