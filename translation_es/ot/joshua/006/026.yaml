translation:
  language: es
  text: 'En aquel tiempo Josué los hizo jurar[a], diciendo: «Maldito delante de Yahvé el hombre que se levante y reconstruya esta ciudad, Jericó.[b] A costa de su primogénito pondrá sus cimientos[c], y a costa de su menor colocará sus puertas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los puso bajo juramento». El verbo hebreo es causativo: Josué hizo que otros juraran.'
    reason: lexical_alternative
  - marker: b
    text: O «Maldito delante de Yahvé cualquiera que se levante y reconstruya esta ciudad». «El hombre» es singular masculino y funciona aquí de manera genérica.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «con/en su primogénito ... y con/en su menor». La expresión probablemente significa «a costa de» ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבַּע
  english_pob_choice: made them swear
  chosen_spanish: hizo jurar
  alternatives_spanish:
  - los puso bajo juramento
  - los hizo jurar
  lexicon: HALOT
  rationale: 'El verbo en hifil es causativo: Josué no simplemente juró, sino que hizo que otros juraran. «Hizo jurar» conserva ese valor causativo en español de forma natural y sobria.'
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - En aquel momento
  lexicon: HALOT
  rationale: Es la fórmula temporal normal y clara en español bíblico contemporáneo.
- source_word: אָרוּר הָאִישׁ
  english_pob_choice: Cursed ... is the man
  chosen_spanish: Maldito ... el hombre
  alternatives_spanish:
  - Cursed is anyone
  - Maldito es cualquiera
  lexicon: HALOT
  rationale: «Maldito» mantiene la fórmula de maldición; «el hombre» conserva el singular masculino del hebreo, con valor genérico. No se difumina la referencia masculina del texto fuente.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto de traducir el nombre divino como «Yahvé». «Delante de» refleja bien לִפְנֵי como ubicación/presencia solemne.
- source_word: יָקוּם וּבָנָה
  english_pob_choice: rises up and rebuilds
  chosen_spanish: se levante y reconstruya
  alternatives_spanish:
  - se alce y construya de nuevo
  - se ponga de pie y reconstruya
  lexicon: HALOT
  rationale: El par verbal expresa iniciativa para emprender la obra; en el contexto de Jericó destruida, «reconstruya» comunica mejor el sentido que un simple «edifique».
- source_word: הָעִיר הַזֹּאת אֶת יְרִיחוֹ
  english_pob_choice: this city, Jericho
  chosen_spanish: esta ciudad, Jericó
  alternatives_spanish:
  - 'esta ciudad: Jericó'
  - esta ciudad, es decir, Jericó
  lexicon: HALOT
  rationale: La aposición se vuelve natural en español con una coma. Se conserva la identificación explícita de la ciudad.
- source_word: בִּבְכֹרוֹ
  english_pob_choice: At the cost of his firstborn
  chosen_spanish: Al costo de su primogénito
  alternatives_spanish:
  - Con su primogénito
  - Al precio de su primogénito
  lexicon: HALOT
  rationale: La preposición בְּ en esta fórmula de maldición comunica pérdida o costo. «Primogénito» es la correspondencia directa y más precisa para בְּכוֹר en este contexto.
- source_word: יְיַסְּדֶנָּה
  english_pob_choice: he will lay its foundation
  chosen_spanish: levantará sus cimientos
  alternatives_spanish:
  - pondrá sus cimientos
  - fundará la ciudad
  lexicon: HALOT
  rationale: יסד pide el lenguaje concreto de cimentar. «Levantará sus cimientos» suena natural en español y mantiene la imagen constructiva.
- source_word: וּבִצְעִירוֹ
  english_pob_choice: and at the cost of his youngest
  chosen_spanish: al costo de su menor
  alternatives_spanish:
  - con su menor
  - al precio de su menor
  lexicon: HALOT
  rationale: La correspondencia paralela con «primogénito» exige una solución simétrica. «Menor» reproduce la idea de el más joven/menor dentro de la familia sin añadir más de lo que el texto dice.
- source_word: יַצִּיב דְּלָתֶיהָ
  english_pob_choice: he will set up its gates
  chosen_spanish: colocará sus puertas
  alternatives_spanish:
  - pondrá sus puertas
  - levantará sus portones
  lexicon: HALOT
  rationale: דְּלָתֶיהָ puede referirse literalmente a puertas, y en el marco de una ciudad fortificada puede aludir a sus accesos/portones. «Puertas» es fiel al léxico; «colocará» reproduce el gesto de instalar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la terminología establecida del proyecto para el nombre divino.
theological_decisions:
- issue: Forma y gravedad de la maldición
  english_pob_reading: A covenantal curse formula declaring divine judgment on anyone who rebuilds Jericho
  chosen_spanish_reading: Una fórmula solemne de maldición delante de Yahvé sobre cualquiera que reconstruya Jericó
  alternative_spanish_readings:
  - Una simple advertencia de Josué
  - Una prohibición civil sin fuerza teológica
  rationale: «Maldito delante de Yahvé» conserva el tono ritual/jurídico y la referencia explícita a la presencia divina. No se reduce a una opinión privada ni se diluye su carga teológica.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no neutralizarla; rendir YHWH como «Yahvé».'
- issue: La pérdida vinculada al primogénito y al menor
  english_pob_reading: The rebuilder will forfeit his firstborn and youngest in connection with founding and gating the city
  chosen_spanish_reading: El que reconstruya sufrirá la pérdida de su primogénito y de su menor en conexión con los actos de cimentar y poner puertas
  alternative_spanish_readings:
  - Sacrificio infantil explícito
  - Pura desgracia arquitectónica sin víctimas
  rationale: '«Al costo de» preserva la ambigüedad del hebreo: indica pérdida severa sin especificar el mecanismo. Así no se importa una interpretación que el verso no formula explícitamente.'
  doctrine_reference: 'DOCTRINE.md: no añadir al texto una explicación doctrinal o narrativa que no esté expresada; mantener ambigüedad real.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje hebreo y el audit trail inglés, conservando la fuerza causativa de וַיַּשְׁבַּע, la fórmula de maldición, el nombre divino como Yahvé y la ambigüedad deliberada de las expresiones con בְּ. No se introdujeron cambios de revisión posteriores; el estado más reciente indicaba que no había cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva «primogénito» para בְּכוֹר y «menor» para צָעִיר en paralelo, sin suavizar la severidad del texto.
  - «Reconstruya» refleja el contexto de Jericó destruida y evita un simple «construya» que podría perder el matiz.
  - Las comillas españolas y la puntuación siguen el uso editorial moderno en español.
