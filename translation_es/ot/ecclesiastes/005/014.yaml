revisions:
- from: Como salió del vientre de su madre, desnudo volverá, yéndose como vino; y no llevará consigo nada de su labor[a], que pueda llevar en su mano.
  to: Como salió del vientre de su madre, desnudo volverá; como vino, así se irá; y no se llevará nada de su labor[a] que pueda tomar en su mano.
  rationale: Se ajustó la sintaxis para expresar con más naturalidad y fidelidad el paralelismo hebreo entre la llegada y la partida ('como vino, así se irá'). También se cambió 'llevar en su mano' por 'tomar en su mano' para reflejar mejor la imagen concreta preservada en la traducción inglesa auditada. Se mantuvo 'labor' en el texto principal y 'trabajo' como alternativa léxica en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:22:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido general del hebreo: el paralelismo entre nacer y partir, la desnudez, el retorno, y la imposibilidad de llevarse algo del fruto de su esfuerzo. Sin embargo, la cláusula final ''que pueda llevar en su mano'' se aparta ligeramente de la decisión inglesa auditada ''that he can take in his hand'' y suena menos natural y menos precisa en español. También ''yéndose'' es entendible, pero ''tal como se fue'' o una formulación equivalente refleja mejor el infinitivo adverbial לָלֶכֶת unido a ''volverá''.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos roces de naturalidad/precisión: ''yéndose como vino'' resulta algo extraño porque mezcla la idea de irse con ''vino'', y ''llevar en su mano'' no es tan idiomático como ''tomar en su mano'' o ''llevarse en la mano''. Una leve revisión mejora la fluidez sin perder literalidad. La nota al pie también debe ajustarse para corresponder exactamente al texto revisado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Desnudo', 'labor' y la estructura proverbial son adecuados. La alternativa 'trabajo' en nota es aceptable como variante léxica. No hay términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: La expresión 'yéndose como vino' suena poco natural y debilita el paralelismo del hebreo.
    rationale: לָלֶכֶת funciona adverbialmente con יָשׁוּב, y el sentido es que vuelve/parte del mismo modo que vino. En español, 'yéndose como vino' mezcla dos verbos que chocan estilísticamente. 'Tal como vino, así se irá' o 'como vino, así se irá' comunica mejor la comparación.
  - severity: medium
    issue: '''Que pueda llevar en su mano'' no refleja con la mejor precisión ni naturalidad la cláusula final.'
    rationale: La decisión auditada enfatiza 'take in his hand', preservando la imagen concreta. En español, 'tomar en su mano' o 'llevarse en la mano' es más natural que 'llevar en su mano', que suena algo forzado.
  - severity: low
    issue: La nota al pie debe corresponder exactamente a la redacción revisada.
    rationale: Si se corrige la cláusula final, la nota léxica alternativa también debe actualizarse para mantener consistencia formal y audit trail limpio.
  revised_spanish_text: Como salió del vientre de su madre, desnudo volverá; como vino, así se irá; y no se llevará nada de su labor[a] que pueda tomar en su mano.
  revised_footnotes:
  - marker: a
    text: 'O: «y no se llevará nada de su trabajo que pueda tomar en su mano»'
    reason: lexical_alternative
  revision_rationale: Se ajustó la sintaxis para expresar con más naturalidad y fidelidad el paralelismo hebreo entre la llegada y la partida ('como vino, así se irá'). También se cambió 'llevar en su mano' por 'tomar en su mano' para reflejar mejor la imagen concreta preservada en la traducción inglesa auditada. Se mantuvo 'labor' en el texto principal y 'trabajo' como alternativa léxica en nota.
