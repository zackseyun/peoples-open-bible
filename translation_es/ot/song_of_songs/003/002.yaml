translation:
  language: es
  text: Me levantaré ahora y recorreré la ciudad[a], en los mercados y en las calles; buscaré al que mi alma ama. Lo busqué, pero no lo hallé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «a quien ama mi alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָק֨וּמָה
  english_pob_choice: I will rise
  chosen_spanish: Me levantaré
  alternatives_spanish:
  - Me alzaré
  - Voy a levantarme
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución o intención. «Me levantaré» comunica ese propósito en español natural y mantiene el movimiento volitivo del verbo קום.
- source_word: נָּא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - ya
  lexicon: HALOT
  rationale: Aquí la partícula indica inmediatez o urgencia interna, no cortesía. «Ahora» reproduce bien ese matiz.
- source_word: וַאֲסוֹבְבָה
  english_pob_choice: and go about
  chosen_spanish: andaré
  alternatives_spanish:
  - iré recorriendo
  - me pasearé
  lexicon: HALOT
  rationale: סבב sugiere moverse por la ciudad en búsqueda. «Andaré» evita un giro demasiado literal o pesado, pero conserva la idea de recorrer.
- source_word: בָעִיר
  english_pob_choice: the city
  chosen_spanish: por la ciudad
  alternatives_spanish:
  - en la ciudad
  lexicon: HALOT
  rationale: La preposición hebrea marca el ámbito de desplazamiento. «Por la ciudad» suena natural con «andaré» y conserva la idea de atravesarla.
- source_word: בַּשְּׁוָקִים
  english_pob_choice: in the marketplaces
  chosen_spanish: por las plazas del mercado
  alternatives_spanish:
  - por los mercados
  - en las plazas
  lexicon: HALOT
  rationale: שׁוּק designa zonas de mercado o bazares. «Plazas del mercado» evita reducirlo a simples «mercados» y mantiene el espacio público.
- source_word: וּבָרְחֹבוֹת
  english_pob_choice: and in the streets
  chosen_spanish: y por las calles
  alternatives_spanish:
  - y por los espacios abiertos
  - y por las avenidas
  lexicon: HALOT
  rationale: רְחֹבוֹת se refiere a vías públicas amplias. «Calles» es la equivalencia más natural en español moderno para este paralelo poético.
- source_word: אֲבַקְשָׁה
  english_pob_choice: I will seek
  chosen_spanish: buscaré
  alternatives_spanish:
  - buscaré con empeño
  - me pondré a buscar
  lexicon: HALOT
  rationale: בקשׁ es «buscar/solicitar/seguir en busca de». Aquí el contexto amoroso favorece «buscaré», que en español mantiene la claridad y el tono poético.
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  english_pob_choice: the one my soul loves
  chosen_spanish: al que ama mi alma
  alternatives_spanish:
  - al que mi alma ama
  - al amado de mi alma
  lexicon: HALOT
  rationale: Se conserva el orden relacional del hebreo y el valor de נֶפֶשׁ como «alma». «Al que ama mi alma» expresa el referente personal sin perder la tensión poética del original.
- source_word: בִּקַּשְׁתִּיו
  english_pob_choice: I sought him
  chosen_spanish: Lo busqué
  alternatives_spanish:
  - Lo busqué con empeño
  - Lo solicité
  lexicon: HALOT
  rationale: El perfecto resume la acción ya realizada. «Lo busqué» mantiene la repetición con «buscaré» y suena natural en español.
- source_word: וְלֹא מְצָאתִיו
  english_pob_choice: but I did not find him
  chosen_spanish: pero no lo hallé
  alternatives_spanish:
  - y no lo hallé
  - pero no lo encontré
  lexicon: HALOT
  rationale: מָצָא significa «hallar/encontrar». «Hallar» conserva un registro literario adecuado al poema y reproduce bien el contraste adversativo.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registran cambios aplicados y el pasaje mantiene alta concordancia con la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantuvo la imagen poética del original con verbos breves y repetición léxica («buscaré / busqué»).
  - Se evitó introducir terminología eclesiástica ajena al contexto amoroso del Cantar.
  - La nota conserva la alternativa formal documentada en la traducción inglesa para el giro relativo final.
