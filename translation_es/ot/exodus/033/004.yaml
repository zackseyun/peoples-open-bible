translation:
  language: es
  text: Cuando el pueblo oyó esta mala noticia[a], estuvo de duelo, y ningún hombre se puso sus adornos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta mala palabra» o «este mal asunto». El hebreo conserva el sentido más literal de «palabra/cosa/asunto»; «noticia» es una adaptación idiomática natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «su adorno», «sus joyas» u «ornamentos». El término hebreo abarca de manera amplia objetos ornamentales; aquí el singular es distributivo en sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: שמע en este contexto significa recibir una noticia o declaración. «Oyó» es natural en español y conserva el valor de percepción auditiva del hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: עם designa al colectivo de Israel. «El pueblo» mantiene el valor colectivo y es claro en español bíblico actual.
- source_word: הַדָּבָר הָרָע הַזֶּה
  english_pob_choice: this bad news
  chosen_spanish: esta mala noticia
  alternatives_spanish:
  - esta mala palabra
  - este mal asunto
  - esta mala nueva
  lexicon: HALOT
  rationale: דבר puede significar «palabra», «asunto» o «cosa», pero aquí se refiere a la comunicación previa de Yahvé. En español, «noticia» comunica mejor el valor de mensaje recibido sin perder la referencia al contenido del anuncio; «mala» representa רָע.
- source_word: וַיִּתְאַבָּלוּ
  english_pob_choice: they mourned
  chosen_spanish: se lamentó
  alternatives_spanish:
  - estuvieron de duelo
  - lloraron
  lexicon: HALOT
  rationale: אבל expresa entrar en duelo o luto. «Se lamentó» transmite el impacto emocional y la respuesta de duelo de manera natural; el plural colectivo queda cubierto por «el pueblo».
- source_word: וְלֹא שָׁתוּ
  english_pob_choice: and no man put on
  chosen_spanish: y ningún hombre se puso
  alternatives_spanish:
  - y nadie se puso
  - y ningún varón se puso
  lexicon: HALOT
  rationale: שׂים aquí lleva el sentido de «poner(se)» ropa o adornos. En español, «se puso» reproduce bien la acción de colocárselos.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - nadie
  lexicon: HALOT
  rationale: אישׁ conserva un singular distributivo masculino. «Hombre» sigue el paralelo del inglés POB y mantiene la forma representativa del hebreo.
- source_word: עֶדְיוֹ
  english_pob_choice: his ornaments
  chosen_spanish: sus ornamentos
  alternatives_spanish:
  - su adorno
  - sus joyas
  lexicon: HALOT
  rationale: עדי denota ornamentos o adornos portables. «Ornamentos» preserva el término amplio y no restringe indebidamente a joyería específica.
- source_word: עָלָיו
  english_pob_choice: put on
  chosen_spanish: se puso
  alternatives_spanish:
  - sobre sí
  - los puso sobre sí
  lexicon: HALOT
  rationale: La preposición «sobre él» se integra idiomáticamente en español con el verbo reflexivo «se puso», que expresa bien la acción de colocarse los adornos.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión final del inglés POB, que prefirió «bad news» sobre «bad word» por naturalidad. En español se adopta una solución equivalente: «mala noticia», manteniendo en nota la alternativa más literal «palabra/asunto» para no borrar la tensión léxica del hebreo דבר.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el contexto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo el lenguaje colectivo con sujeto singular («el pueblo oyó… se lamentó») para reflejar el hebreo, sin forzar pluralización adicional.
  - «Ornamentos» se eligió por amplitud semántica, en consonancia con la nota auditada del inglés POB.
