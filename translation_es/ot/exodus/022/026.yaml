revisions:
- from: Porque es su única cubierta; es su manto para su piel. ¿En qué se acostará? Y si clama a mí[a], yo lo oiré, porque soy compasivo.
  to: Porque es su única cobertura; es su manto para su piel. ¿En qué se acostará? Y si me clama, lo oiré, porque soy compasivo[a].
  rationale: Se corrige la construcción verbal a un español natural y ampliamente legible («me clama») conservando el sentido de יִצְעַק אֵלַי. Se mantiene «compasivo» como principal por alineación con el POB inglés y el contexto legal de protección al vulnerable, pero se sustituye la alternativa inadecuada «gracioso» por «clemente». También se ancla correctamente la nota al término relevante.
