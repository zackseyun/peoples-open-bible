translation:
  language: es
  text: 'Entonces Sanbalat me envió a su siervo por quinta vez de esta manera: con una carta abierta[a] en su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una carta sin sello en su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Luego ... envió
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva la secuencia sin sonar forzado en español.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - contra mí
  lexicon: HALOT
  rationale: La preposición con sufijo 1cs normalmente indica dirección hacia el hablante; aquí marca al destinatario del mensajero.
- source_word: סַנְבַלַּט
  english_pob_choice: Sanballat
  chosen_spanish: Sanbalat
  alternatives_spanish:
  - Sanballat
  lexicon: Transliteración propia
  rationale: Se translitera el nombre al español según uso corriente y eufonía, manteniendo identificación clara con el personaje.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: in this manner
  chosen_spanish: de esta manera
  alternatives_spanish:
  - como esta palabra
  - como esto
  - de esta forma
  lexicon: HALOT
  rationale: La expresión idiomática mira al patrón repetido ya descrito; «de esta manera» conserva el valor anafórico sin calcar de modo rígido 'palabra' o 'cosa'.
- source_word: פַּעַם חֲמִישִׁית
  english_pob_choice: a fifth time
  chosen_spanish: por quinta vez
  alternatives_spanish:
  - la quinta vez
  lexicon: HALOT
  rationale: La construcción hebrea expresa repetición contada; «por quinta vez» es natural en español y mantiene el valor adverbial.
- source_word: אֶת נַעֲרוֹ
  english_pob_choice: his servant
  chosen_spanish: a su siervo
  alternatives_spanish:
  - a su joven
  - a su criado
  - a su asistente
  lexicon: HALOT
  rationale: נַעַר puede denotar joven, criado o servidor; en contexto de mensajero conviene «siervo» para reflejar la función de enviado sin imponer una edad.
- source_word: וְאִגֶּרֶת פְּתוּחָה
  english_pob_choice: with an open letter
  chosen_spanish: con una carta abierta
  alternatives_spanish:
  - y una carta abierta
  - con una carta sin sello
  lexicon: HALOT
  rationale: El hebreo presenta acompañamiento; «con una carta abierta» comunica de modo claro la carta que acompaña al mensajero.
- source_word: פְּתוּחָה
  english_pob_choice: open
  chosen_spanish: abierta
  alternatives_spanish:
  - sin sello
  - desprecintada
  lexicon: HALOT
  rationale: La idea literal es 'abierta'; en el contexto de una carta, implica no sellada. «Abierta» preserva la imagen principal y deja espacio a la nota alternativa.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: La frase es concreta e imagística; «en su mano» reproduce la escena de la carta llevada físicamente por el siervo.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado de «in this way» a «in this manner» por registro; el español adopta «de esta manera», que conserva tanto la formalidad como la referencia anafórica al patrón repetido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige; este versículo no contiene el Nombre divino.
  - Se usa «siervo» aquí por la función de enviado, no como sustituto automático de un término de esclavitud.
  - «Carta abierta» se conserva como formulación principal; la nota recoge la alternativa 'sin sello' por la ambigüedad lexical de פְּתוּחָה.
  - La puntuación sigue la sintaxis española natural sin añadir contenido interpretativo.
