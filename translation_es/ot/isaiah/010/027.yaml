translation:
  language: es
  text: Y en aquel día se quitará su carga de tu hombro, y su yugo de tu cuello; y el yugo será quebrado por la gordura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa del aceite»; tradicionalmente también se ha traducido «por causa de la unción».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... se quitará
  alternatives_spanish:
  - Y ... acontecerá
  - Y ... sucederá
  lexicon: HALOT
  rationale: La fórmula introduce una circunstancia futura en estilo profético. En español, "Y en aquel día" conserva el giro temporal idiomático sin volverlo arcaico.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Mantiene la fórmula profética tradicional con español natural. "Aquel" conserva la distancia textual y solemne del hebreo.
- source_word: יָסוּר
  english_pob_choice: will depart
  chosen_spanish: se quitará
  alternatives_spanish:
  - se apartará
  - será removida
  lexicon: HALOT
  rationale: El verbo expresa apartarse/removerse. En español, "se quitará" comunica con claridad la remoción de la carga sin perder la imagen de desplazamiento.
- source_word: סֻבֳּלוֹ
  english_pob_choice: his burden
  chosen_spanish: su carga
  alternatives_spanish:
  - su yugo
  - su fardo
  lexicon: HALOT
  rationale: '"Carga" refleja bien el peso opresivo del contexto y funciona de manera natural junto a "hombro". Conserva la idea de una imposición gravosa.'
- source_word: מֵעַל שִׁכְמֶךָ
  english_pob_choice: from your shoulder
  chosen_spanish: de sobre tu hombro
  alternatives_spanish:
  - de tu hombro
  - de encima de tu hombro
  lexicon: HALOT
  rationale: '"De sobre" preserva la imagen espacial del hebreo y evita la repetición poco natural de "de sobre" en exceso; aquí sigue siendo comprensible y formal. "Hombro" es la equivalencia natural de שִׁכְמָה.'
- source_word: וְעֻלּוֹ
  english_pob_choice: and his yoke
  chosen_spanish: y su yugo
  alternatives_spanish:
  - y su arnés
  - y su carga
  lexicon: HALOT
  rationale: Se mantiene la metáfora agrícola de dominación con "yugo", que es la equivalencia más estable y transparente en español.
- source_word: מֵעַל צַוָּארֶךָ
  english_pob_choice: from your neck
  chosen_spanish: de sobre tu cuello
  alternatives_spanish:
  - de tu cuello
  - de encima de tu cuello
  lexicon: HALOT
  rationale: Conserva el paralelismo con "hombro" y la imagen corporal. "Cuello" traduce naturalmente צַוָּאר.
- source_word: וְחֻבַּל
  english_pob_choice: will be broken
  chosen_spanish: será quebrado
  alternatives_spanish:
  - será destruido
  - será roto
  lexicon: HALOT
  rationale: El pasivo indica que el yugo queda inutilizado por daño. "Será quebrado" mantiene la concreción del objeto y el paralelismo con el campo semántico de ruptura.
- source_word: עֹל
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - un yugo
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, en español el artículo definido cohesiona con la referencia previa al mismo instrumento de opresión.
- source_word: מִפְּנֵי שָׁמֶן
  english_pob_choice: because of fatness
  chosen_spanish: por causa de la grasa[a]
  alternatives_spanish:
  - por causa del aceite[a]
  - por causa de la abundancia[a]
  lexicon: HALOT
  rationale: Se preserva la dificultad léxica del término שָׁמֶן. "Grasa" es la equivalencia más literal y evita importar la lectura teológica de "unción" que no está explícita en el hebreo.
theological_decisions:
- issue: Interpretación de מִפְּנֵי שָׁמֶן
  english_pob_reading: because of fatness
  chosen_spanish_reading: por causa de la grasa
  alternative_spanish_readings:
  - por causa del aceite
  - por causa de la unción
  rationale: El hebreo permite varias lecturas, pero el sentido básico de שָׁמֶן es "grasa/aceite". Para no adelantar una interpretación devocional posterior, el texto principal conserva la imagen material más directa; las alternativas quedan en nota.
  doctrine_reference: Principios de transparencia lexical y no importación de glosas doctrinales no exigidas por el texto
translation_notes:
  revision_awareness: La redacción inglesa auditada mantiene la estructura del hebreo y evita el calco forzado "from upon"; la versión española sigue esa decisión con "de sobre" para conservar la imagen corporal sin sonar antinatural. También se retiene la solución literal para שָׁמֶן, con nota de alternativas, para respetar la tensión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como convención general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se conserva la metáfora de "yugo" de manera consistente en ambas apariciones.
  - '"Hombro" y "cuello" siguen el paralelismo físico del hebreo.'
  - La nota al pie usa un marcador único y corresponde exactamente a la palabra señalada en el texto.
