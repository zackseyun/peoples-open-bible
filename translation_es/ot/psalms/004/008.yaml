translation:
  language: es
  text: Tú has puesto gozo en mi corazón más que cuando abundan[a] el grano y el vino nuevo de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «desde el tiempo en que aumentaron su grano y su vino nuevo». La frase hebrea se entiende comúnmente como una comparación: el gozo dado por Dios excede el gozo de la abundancia material.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַתָּה
  english_pob_choice: You have put
  chosen_spanish: Tú has puesto
  alternatives_spanish:
  - Tú has dado
  - Tú has dado
  lexicon: HALOT
  rationale: El perfecto qal 2ms expresa una acción completa con efecto presente. «Has puesto» conserva ese valor y suena natural en español devocional, manteniendo el sujeto enfático implícito en el hebreo.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  lexicon: HALOT
  rationale: שִׂמְחָה denota gozo/alegría. «Gozo» es una opción bíblica y clara en español, adecuada para el interior de la persona y con buen registro litúrgico sin sonar arcaica.
- source_word: בְלִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - dentro de mí
  - en mi interior
  lexicon: HALOT
  rationale: לֵב funciona como sede de la vida interior. «En mi corazón» reproduce la localización interna de forma idiomática en español y evita sobreinterpretar como emoción solamente.
- source_word: מֵעֵת
  english_pob_choice: more than when
  chosen_spanish: más que cuando
  alternatives_spanish:
  - más que en el tiempo en que
  - desde el tiempo en que
  lexicon: HALOT
  rationale: La construcción es comparativa en el contexto del verso. «Más que cuando» comunica esa comparación de manera natural y sigue la lectura auditada del POB en inglés.
- source_word: דְּגָנָם
  english_pob_choice: their grain
  chosen_spanish: su grano
  alternatives_spanish:
  - su cereal
  - su cosecha de grano
  lexicon: HALOT
  rationale: דָּגָן se refiere al grano/cereal producido. «Grano» es preciso y más amplio en español moderno; el singular colectivo funciona bien con el sustantivo hebreo de abundancia.
- source_word: וְתִירוֹשָׁם
  english_pob_choice: and their new wine
  chosen_spanish: su mosto
  alternatives_spanish:
  - su vino nuevo
  - su vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ apunta a vino nuevo o mosto, es decir, bebida reciente de la cosecha. «Mosto» preserva esa frescura agrícola con una sola palabra; como el hebreo usa un singular colectivo, el singular español es natural.
- source_word: רָבּוּ
  english_pob_choice: abound
  chosen_spanish: abundan
  alternatives_spanish:
  - se multiplican
  - crecen
  lexicon: HALOT
  rationale: רבה indica aumentar, hacerse numeroso, abundar. «Abundan» mantiene el sentido de prosperidad material en una forma verbal viva y acorde con el paralelismo del verso.
theological_decisions:
- issue: Lectura comparativa de מֵעֵת
  english_pob_reading: The psalmist says God-given inward joy exceeds the joy associated with abundant grain and new wine.
  chosen_spanish_reading: El gozo dado por Dios en el corazón supera el gozo asociado con la abundancia de grano y mosto.
  alternative_spanish_readings:
  - Desde el tiempo en que abundan su grano y su mosto.
  - Más que al tiempo de su abundancia de grano y mosto.
  rationale: Sigo la lectura comparativa auditada por el POB inglés, que entiende מֵעֵת como marcador de comparación y no meramente temporal. Esto preserva el contraste teológico entre el don interior de Dios y la prosperidad material.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado ya está asentado y fue revisado sin cambios; el español sigue esa lectura comparativa principal y solo desplaza la formulación para que resulte natural en español, sin perder la tensión entre gozo interior y abundancia agrícola.
  spanish_consistency_notes:
  - Se conservó la comparación «más que cuando» para reflejar la lectura auditada de מֵעֵת.
  - «Mosto» se eligió por la carga de vino nuevo/fresco de תירוש; no se sustituyó por «vino» genérico.
  - «Gozo» y «corazón» mantienen el registro bíblico natural sin recurrir a traducciones arcaizantes.
