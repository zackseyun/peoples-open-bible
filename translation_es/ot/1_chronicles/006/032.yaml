  lexicon: HALOT
  rationale: En esta genealogía repetitiva de Crónicas, el hebreo בֶּן se conserva con su valor genealógico normal. En español, ‘hijo de’ es la equivalencia más natural y fiel; ‘descendiente de’ solo se usaría si el contexto exigiera suavizar una relación filial directa, lo cual aquí no sucede.
- source_word: מַחְלִי
  english_pob_choice: Mahli
