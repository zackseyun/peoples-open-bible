revisions:
- from: No sea que Yahvé vea [a], y le parezca malo en sus ojos, y aparte de sobre él su enojo.
  to: No sea que Yahvé vea que eso[a] sea malo a sus ojos, y aparte de él su enojo.
  rationale: 'Se ajustó el español para conservar el sentido hebreo con mayor naturalidad: «sea malo a sus ojos» refleja mejor el modismo evaluativo que «le parezca malo en sus ojos», y «aparte de él su enojo» evita el calco rígido «de sobre él» sin perder el sentido. También se reubicó la nota para que ancle la cláusula a la que realmente corresponde la alternativa.'
