review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: כִּי causal, שֵׁבֶט como símbolo de dominio, גּוֹרַל como la porción asignada a los justos, y la cláusula final de prevención. También preserva correctamente la lectura teológica de no-permanencia del dominio impío. Sin embargo, hay un desajuste importante de anclaje de notas: la nota sobre «de los impíos» corresponde a «de la maldad», no a «los justos», y la secuencia de marcadores no sigue claramente el punto de anclaje en español. Además, «iniquidad» es fiel pero algo menos natural que «maldad» o «injusticia» en este giro idiomático.'
  spanish_quality_summary: El español es generalmente claro y digno. «Porque el cetro de la maldad no reposará…» suena natural y fiel. No obstante, conviene mejorar la colocación de notas para evitar confusión y hacer más idiomática la cláusula final con «se entreguen al mal» o mantener la imagen literal con una nota bien anclada. Para conservar mejor el hebreo y la pista del POB inglés, es preferible retener «extiendan sus manos al mal» con nota explicativa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justos» para הַצַּדִּיקִים y «cetro» para שֵׁבֶט están bien. «Suerte» es aceptable para גּוֹרַל, con nota que preserve «porción/herencia». La decisión «de la maldad» también es válida, pero la nota alternativa debe anclarse allí. «Iniquidad» no infringe glosario, aunque «mal» comunica mejor el valor amplio de עַוְלָה en este contexto idiomático.
  issues:
  - severity: high
    issue: Los marcadores de notas están mal anclados en el texto español.
    rationale: La nota a sobre «de los impíos» explica הָרֶשַׁע / «de la maldad», pero aparece después de «los justos». Esto puede hacer creer que la variante afecta a «los justos» en vez de al genitivo «de la maldad». Las notas deben aparecer exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: La secuencia y correspondencia de notas no sigue de forma transparente el modelo auditado.
    rationale: 'El inglés preserva tres alternativas relevantes: «of the wicked», «lot/portion/inheritance», y el giro idiomático final. En español deben mantenerse, pero con marcadores colocados en «maldad», «suerte» y la frase final, respectivamente.'
  - severity: low
    issue: «A la iniquidad» es fiel, pero menos natural en español actual dentro de este modismo.
    rationale: El hebreo describe involucrarse en el mal. «Extiendan sus manos al mal» conserva la imagen literal y suena más natural que «a la iniquidad», mientras la nota puede preservar «injusticia/iniquidad» como alternativas.
  revised_spanish_text: Porque el cetro de la maldad[a] no reposará sobre la suerte[b] de los justos, para que los justos no extiendan sus manos al mal[c].
  revised_footnotes:
  - marker: a
    text: O, «de los impíos». La construcción hebrea puede referirse a la maldad como cualidad o a los malvados como quienes empuñan el cetro.
    reason: lexical_alternative
  - marker: b
    text: '«Suerte» también puede significar «porción» o «herencia»: la parte asignada a los justos.'
    reason: lexical_alternative
  - marker: c
    text: O, «extiendan sus manos a la injusticia/iniquidad». El hebreo expresa la idea de involucrarse en el mal.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el problema principal de fidelidad editorial: el anclaje incorrecto de las notas. También mejora levemente la naturalidad de la expresión final sin perder la imagen hebrea ni las alternativas preservadas por el POB inglés. El resto del versículo puede mantenerse.'
