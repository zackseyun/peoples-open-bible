translation:
  language: es
  text: Ahora bien, entre los pasos por los que Jonatán buscaba cruzar hacia la guarnición filistea, había un peñasco rocoso[a] de un lado y un peñasco rocoso del otro lado; y el nombre del uno era Bozez, y el nombre del otro, Seneh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «un diente de roca ... y un diente de roca», un modismo para peñascos o salientes rocosos agudos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּעְבְּרוֹת
  english_pob_choice: the passes
  chosen_spanish: los pasos
  alternatives_spanish:
  - los cruces
  - los pasos de montaña
  lexicon: HALOT
  rationale: En este contexto topográfico, el hebreo indica lugares de paso o cruce. ‘Los pasos’ conserva la idea de una ruta estrecha entre peñas sin introducir una especificación innecesaria sobre agua o montaña.
- source_word: בִּקֵּשׁ ... לַעֲבֹר
  english_pob_choice: sought to cross over
  chosen_spanish: buscaba pasar
  alternatives_spanish:
  - intentaba cruzar
  - quería pasar
  lexicon: HALOT
  rationale: La construcción expresa intención y empeño. ‘Buscaba pasar’ conserva el impulso deliberado de Jonatán y suena natural en español bíblico moderno.
- source_word: מַצַּב פְּלִשְׁתִּים
  english_pob_choice: the Philistine garrison
  chosen_spanish: la guarnición filistea
  alternatives_spanish:
  - el puesto filisteo
  - la guarnición de los filisteos
  lexicon: HALOT
  rationale: En contexto militar, מַצָּב se refiere a una fuerza apostada o a un puesto militar. ‘Guarnición’ comunica bien esa idea en español y mantiene el matiz militar del pasaje.
- source_word: שֵׁן הַסֶּלַע
  english_pob_choice: a crag of rock
  chosen_spanish: un pico de roca
  alternatives_spanish:
  - un crag de roca
  - un saliente de roca
  lexicon: HALOT
  rationale: Literalmente, la expresión es ‘diente de la peña/roca’, un modismo para una formación rocosa saliente y aguda. ‘Pico de roca’ preserva la imagen de algo puntiagudo y prominente sin sonar forzado en español.
- source_word: מֵהָעֵבֶר מִזֶּה ... מֵהָעֵבֶר מִזֶּה
  english_pob_choice: on one side ... on the other side
  chosen_spanish: de este lado ... del otro lado
  alternatives_spanish:
  - de un lado ... del otro lado
  - por este lado ... por el otro lado
  lexicon: HALOT
  rationale: La repetición marca los dos lados opuestos del paso. ‘De este lado / del otro lado’ mantiene la simetría hebrea y es claro en español.
- source_word: שֵׁם הָאֶחָד ... וְשֵׁם הָאֶחָד
  english_pob_choice: the name of the one ... the name of the other
  chosen_spanish: el nombre de uno ... el nombre del otro
  alternatives_spanish:
  - uno se llamaba ... y el otro
  - el nombre de uno ... y el nombre del otro
  lexicon: HALOT
  rationale: Se conserva la estructura nominal formal del hebreo, sin convertirla en una paráfrasis más libre.
- source_word: בּוֹצֵץ
  english_pob_choice: Bozez
  chosen_spanish: Bozéz
  alternatives_spanish:
  - Bozez
  lexicon: nombre propio
  rationale: Se translitera el nombre propio con adaptación ortográfica mínima al español para facilitar la lectura y la pronunciación, sin alterar la identificación del topónimo.
- source_word: סֶנֶּה
  english_pob_choice: Seneh
  chosen_spanish: Sené
  alternatives_spanish:
  - Sene
  - Seneh
  lexicon: nombre propio
  rationale: Se conserva el nombre propio con adaptación ortográfica mínima al español. La forma aguda ayuda a la pronunciación en español sin perder la referencia al topónimo.
- source_word: וּבֵין
  english_pob_choice: Now between
  chosen_spanish: Ahora bien, entre
  alternatives_spanish:
  - Y entre
  - Entre
  lexicon: HALOT
  rationale: ‘Ahora bien’ funciona como transición discursiva natural al inicio del versículo y reproduce la conexión narrativa que el inglés POB expresa con ‘Now’.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo con apoyo del análisis POB en inglés. No se detectaron revisiones textuales en el expediente; se conservó la misma lectura topográfica y la identificación de los dos nombres propios.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece el nombre divino; aquí no aparece, así que no se introduce.
  - Se mantiene la terminología militar con ‘guarnición’ para מַצַּב, coherente con el contexto narrativo.
  - Los nombres propios se adaptan al español de forma mínima para lectura pública, sin añadir interpretaciones.
  - Se preserva el paralelismo espacial del hebreo (‘de este lado... del otro lado’) y la enumeración formal de los nombres.
