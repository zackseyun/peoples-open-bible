base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/010/001.yaml
  text: And in the one hundred sixtieth year[a], Alexander, the son of Antiochus Epiphanes, came up and took Ptolemais, and they received him[c][b], and he reigned there.
  footnotes:
  - marker: a
    text: Or 'went up' for 'came up'; the Greek preserves the conventional directional idiom often used for military movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'captured Ptolemais' for 'seized Ptolemais.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he reigned there'; the Greek verb may be understood either as accession ('became king') or as the exercise of kingship ('reigned').
    reason: alternative_reading
