translation:
  language: es
  text: Y ahora eres maldito[a] de la tierra, que abrió su boca para recibir la sangre de tu hermano de tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lejos de la tierra»; el hebreo puede sugerir tanto que la tierra es el ámbito o la fuente de la maldición como que Caín es alejado de ella.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y en este momento
  lexicon: HALOT
  rationale: Conserva la conexión conjuntiva del hebreo y el valor temporal inmediato; en español, «Y ahora» suena natural y mantiene la transición directa al veredicto.
- source_word: אָרוּר אָתָּה
  english_pob_choice: you are cursed
  chosen_spanish: eres maldito
  alternatives_spanish:
  - estás maldito
  - estás bajo maldición
  lexicon: HALOT
  rationale: La construcción hebrea expresa un estado/declaración de maldición. «Eres maldito» preserva la fuerza predicativa y el tono judicial, sin suavizarlo con una perífrasis más débil.
- source_word: מִן הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: lejos de la tierra
  alternatives_spanish:
  - de la tierra
  - desde la tierra
  - alejado de la tierra
  lexicon: HALOT
  rationale: El hebreo מִן permite una tensión entre procedencia y separación. En español, «lejos de la tierra» comunica con naturalidad el matiz de alejamiento sin cerrar la ambigüedad; se evita «por la tierra» porque introduciría una causalidad no explicitada por el texto.
- source_word: אֲשֶׁר פָּצְתָה אֶת פִּיהָ
  english_pob_choice: which has opened its mouth
  chosen_spanish: la cual abrió su boca
  alternatives_spanish:
  - que abrió su boca
  - la que ha abierto su boca
  lexicon: HALOT
  rationale: La tierra es personificada como si abriera la boca. «La cual abrió su boca» mantiene la imagen y el antecedente femenino de אֲדָמָה; se evita añadir explicaciones que borren la personificación.
- source_word: לָקַחַת
  english_pob_choice: to receive
  chosen_spanish: para recibir
  alternatives_spanish:
  - para tomar
  - para aceptar
  lexicon: HALOT
  rationale: Aunque el verbo básico es «tomar», en este contexto la imagen de la tierra que recibe la sangre vertida se expresa mejor con «recibir», como en el audit trail inglés, sin perder el movimiento del hebreo.
- source_word: דְּמֵי אָחִיךָ
  english_pob_choice: your brother’s blood
  chosen_spanish: la sangre de tu hermano
  alternatives_spanish:
  - la sangre derramada de tu hermano
  - la sangre de tu hermano, derramada
  lexicon: HALOT
  rationale: El hebreo usa el plural idiomático «sangres», que suele referirse a sangre derramada. En español, la singular «sangre» comunica el sentido de forma clara y digna; la nota preserva el trasfondo idiomático.
- source_word: מִיָּדֶךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tus manos
  - por tu mano
  lexicon: HALOT
  rationale: La imagen hebrea vincula responsabilidad directa con la mano. «De tu mano» conserva esa concreción y suena más natural en español que «desde tu mano».
theological_decisions:
- issue: Alcance de מִן הָאֲדָמָה
  english_pob_reading: Cain is cursed from the ground, preserving the ambiguity between source/sphere and separation away from the ground.
  chosen_spanish_reading: Caín es maldito lejos de la tierra, preservando la tensión entre separación y relación con la tierra sin decidir de antemano si la tierra es solo el ámbito del castigo o también su causa.
  alternative_spanish_readings:
  - maldito de la tierra
  - maldito por la tierra
  - maldito desde la tierra
  rationale: El hebreo admite más de una relación semántica con מִן. La redacción española conserva la ambigüedad útil para la lectura teológica y narrativa, en vez de resolverla en una sola dirección.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El texto inglés pasó por una corrección importante en el tratamiento de מִן הָאֲדָמָה: de «by the ground» se volvió a «from the ground» para reflejar con más precisión el hebreo. La versión española evita fijar el vínculo como causal («por») y mantiene abierta la relación semántica con «lejos de la tierra», con nota que recoge la alternativa «de la tierra».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - «Tierra» se usa para אֲדָמָה en un registro bíblico natural, aunque el hebreo también puede implicar «suelo» o «terreno»; la nota mantiene la ambigüedad.
  - Se conserva la personificación de la tierra sin introducir interpretaciones doctrinales ajenas al versículo.
  - La nota al pie marca la alternativa textual/semántica relevante en el mismo punto donde el español podría inclinarse hacia una lectura más concreta.
