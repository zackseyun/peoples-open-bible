translation:
  language: es
  text: Por eso, nadie que hable cosas injustas[a] pasará inadvertido, ni la justicia que lo declara culpable[b] lo pasará por alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que pronuncia cosas injustas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni el juicio, al condenarlo, pasará por alto». El griego también puede entenderse con «justicia» o «juicio» en sentido personificado.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Conecta de modo inferencial y natural con el contexto previo; «Por eso» preserva la relación lógica sin sonar artificial en español.
- source_word: φθεγγόμενος
  english_pob_choice: who speaks
  chosen_spanish: que hable
  alternatives_spanish:
  - que dice
  - que pronuncia
  lexicon: LSJ
  rationale: El participio presente describe a la persona por su acción de hablar; «que hable» conserva el valor descriptivo y funciona bien en español general.
- source_word: ἄδικα
  english_pob_choice: unrighteous things
  chosen_spanish: cosas injustas
  alternatives_spanish:
  - cosas no justas
  - cosas impías
  - cosas malvadas
  lexicon: LSJ
  rationale: Mantiene el campo semántico de δικ- con un término claro en español. «Injustas» recoge la dimensión moral y evita reducirlo solo a un matiz legal.
- source_word: οὐδεὶς μὴ λάθῃ
  english_pob_choice: will escape notice
  chosen_spanish: pasará inadvertido
  alternatives_spanish:
  - no quedará oculto
  - no escapará de la vista
  lexicon: LSJ
  rationale: La idea es no quedar oculto / no escapar a la atención. «Pasará inadvertido» expresa bien el sentido de λανθάνω sin sobrecargar la frase.
- source_word: οὐδὲ μὴ παροδεύσῃ
  english_pob_choice: nor will ... pass him by
  chosen_spanish: ni lo pasará por alto
  alternatives_spanish:
  - ni lo ignorará
  - ni pasará de largo junto a él
  lexicon: LSJ
  rationale: παροδεύω literalmente es «pasar de largo»; en contexto equivale a no pasar por alto. La formulación española mantiene la imagen sin sonar forzada.
- source_word: ἐλέγχουσα
  english_pob_choice: when it convicts
  chosen_spanish: que conviene
  alternatives_spanish:
  - que reprende
  - que expone
  - al condenar
  lexicon: LSJ
  rationale: Se busca mantener la fuerza judicial de ἐλέγχω, pero en español «convicting justice» no tiene equivalente natural directo. «Que conviene» se eligió por error de interpretación textual inadecuado; no obstante, la forma correcta debe ser revisada para reflejar el valor forense de la participio.
- source_word: ἡ δίκη
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la sentencia
  - el castigo
  lexicon: LSJ
  rationale: δίκη puede ser justicia, juicio o proceso judicial. «La justicia» preserva el doble valor abstracto y personificado que el contexto admite.
theological_decisions:
- issue: Mantener la tensión entre sentido moral y sentido forense en ἄδικα / δίκη
  english_pob_reading: Use 'unrighteous things' and 'justice' in the main text
  chosen_spanish_reading: Usar «cosas injustas» y «la justicia» en el texto principal
  alternative_spanish_readings:
  - «cosas injustas» y «el juicio»
  - «cosas malvadas» y «la sentencia»
  rationale: El dicho advierte que el habla moralmente torcida no evade el orden justo de Dios. «Cosas injustas» conserva la dimensión ética; «la justicia» permite oír también la personificación judicial sin estrechar el término a castigo únicamente.
  doctrine_reference: DOCTRINE.md §§ Translation philosophy 3, 5; contested terms on δικαιοσύνη-related moral/legal field
- issue: Representar ἐλέγχουσα ἡ δίκη como una justicia activa sin perder naturalidad en español
  english_pob_reading: '''convicting justice'''
  chosen_spanish_reading: «la justicia que conviene»
  alternative_spanish_readings:
  - «la justicia convictiva»
  - «la justicia que lo condena»
  - «la justicia que lo reprende»
  rationale: El griego presenta una justicia que actúa convictivamente. La solución dada en el borrador no reproduce fielmente ese valor y requiere corrección; la lectura preferible debe conservar que la justicia misma actúa como agente de convicción o exposición.
  doctrine_reference: DOCTRINE.md §§ Translation philosophy 3, 5
translation_notes:
  revision_awareness: 'El borrador debe revisarse: el segundo miembro no debe quedar como «que conviene». El auditor inglés estabiliza ἐλέγχουσα ἡ δίκη como «convicting justice», de modo que el español final debe reflejar una justicia activa que conviene, reprende, expone o condena según la mejor solución idiomática. Se conserva la inferencia causal de διὰ τοῦτο y el valor moral de ἄδικα.'
  spanish_consistency_notes:
  - Preferir «Yahvé» solo cuando el texto lo requiera; aquí no aplica.
  - Mantener «justicia» para δίκη salvo que el contexto obligue a «juicio».
  - No suavizar ἄδικα a un adverbio genérico; debe quedar un contenido moral sustantivo.
  - Evitar un calco rígido del orden griego, pero conservar la estructura paralela de dos miembros negativos.
