translation:
  language: es
  text: y Ayalón con sus tierras de pasto[a], y Gat-Rimón con sus tierras de pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tierras comunes’ o ‘tierras circundantes’ para ‘tierras de pasto’. El término hebreo se refiere al terreno abierto perteneciente a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDB
  rationale: El hebreo repite la conjunción y el marcador de objeto para encadenar una lista; en español, una sola conjunción coordinante por miembro produce una lista natural sin calcar el objeto directo.
- source_word: אַיָּלוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ayalón
  alternatives_spanish:
  - Aijalón
  - Ayalon
  lexicon: HALOT
  rationale: Es un topónimo propio. Se translitera como nombre de lugar; 'Ayalón' conserva mejor la forma hebrea y es inteligible en español bíblico.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus tierras comunes
  - sus tierras circundantes
  - su terreno abierto
  lexicon: HALOT
  rationale: מִגְרָשׁ designa la zona abierta perteneciente a una ciudad, usada aquí en el contexto de ciudades levíticas. 'Tierras de pasto' comunica esa franja abierta y utilizable sin imponer un tecnicismo ajeno al español bíblico.
- source_word: גַּת רִמּוֹן
  english_pob_choice: Gath-rimmon
  chosen_spanish: Gat-rimón
  alternatives_spanish:
  - Gat Rimón
  - Gat-Rimón
  lexicon: HALOT
  rationale: Topónimo compuesto transliterado. El guion ayuda a mostrar que se trata de un solo nombre compuesto, como en la tradición inglesa auditada.
translation_notes:
  revision_awareness: La revisión auditada no requirió cambios; se mantuvo el valor léxico de מִגְרָשׁ como terreno abierto asociado a la ciudad, y la estructura de lista se refleja con coordinación simple en español.
  spanish_consistency_notes:
  - Se usó 'Ayalón' y 'Gat-rimón' como transliteraciones coherentes de topónimos.
  - '''Tierras de pasto'' evita neutralizar el matiz urbano/periférico del hebreo מִגְרָשׁ, conservando la alternativa explicada en nota.'
  - La coordinación con 'y' reproduce la enumeración del hebreo sin sobrecargar la frase con repeticiones artificiales.
