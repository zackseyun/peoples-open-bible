translation:
  language: es
  text: Así les ha hecho Betel[a] por causa de su gran maldad[b]. Al amanecer, el rey de Israel será totalmente destruido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Betel es el nombre propio del lugar; no se traduce aquí como «casa de Dios».
    reason: source_note
  - marker: b
    text: 'La repetición hebrea intensifica la idea: literalmente, «la maldad de su maldad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «será completamente silenciado» o «será del todo eliminado». El hebreo usa un infinitivo absoluto con el verbo para intensificar la afirmación.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּכָה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: La partícula deíctica introduce la conclusión profética. «Así» mantiene la concisión y la relación con el juicio anunciado sin añadir interpretación.
- source_word: עָשָׂה לָכֶם
  english_pob_choice: has done to you
  chosen_spanish: ha hecho con ustedes
  alternatives_spanish:
  - ha hecho para ustedes
  - ha actuado así con ustedes
  - ha procedido con ustedes
  lexicon: HALOT
  rationale: El verbo en perfecto comunica una acción ya fijada o considerada cumplida en el anuncio profético. «Ha hecho con ustedes» evita un calco pesado y conserva la relación verbal directa.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - la casa de Dios
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar. En español bíblico «Betel» es la forma estable y no se debe descomponer en un sintagma común sin base contextual.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por
  - debido a
  lexicon: HALOT
  rationale: La preposición expresa motivo o causa del juicio. «Por causa de» es natural en español y preserva la relación causal explícita.
- source_word: רָעַת רָעַתְכֶם
  english_pob_choice: your great evil
  chosen_spanish: la gran maldad de ustedes
  alternatives_spanish:
  - la maldad de su maldad
  - su gran maldad
  - su extrema maldad
  lexicon: HALOT
  rationale: La repetición hebrea intensifica el sustantivo. «La gran maldad» comunica la fuerza enfática sin sonar forzado; se mantiene el plural de segunda persona para concordar con el discurso directo.
- source_word: בַּשַּׁחַר
  english_pob_choice: At dawn
  chosen_spanish: Al amanecer
  alternatives_spanish:
  - A la aurora
  - En la mañana
  - Al alba
  lexicon: HALOT
  rationale: El valor temporal apunta al inicio del día y puede sugerir inminencia. «Al amanecer» es claro y litúrgicamente sobrio en español.
- source_word: נִדְמֹה נִדְמָה
  english_pob_choice: will be utterly cut off
  chosen_spanish: será completamente cortado
  alternatives_spanish:
  - será totalmente destruido
  - será por completo silenciado
  - será enteramente eliminado
  lexicon: HALOT
  rationale: El juego de infinitivo absoluto + verbo finito intensifica la certeza y plenitud de la acción. «Será completamente cortado» conserva el valor de corte/eliminación propio del verbo sin cerrar indebidamente la gama semántica a una sola idea de destrucción.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: HALOT
  rationale: Construcción nominal directa y transparente. «Rey» es la forma natural y fiel al paralelo hebreo.
theological_decisions:
- issue: Nombre de Betel como lugar de juicio
  english_pob_reading: Bethel is retained as the cultic center/place standing metonymically for the idolatrous regime and its judgment.
  chosen_spanish_reading: Betel se conserva como nombre del lugar, manteniendo implícita su función como centro idolátrico juzgado.
  alternative_spanish_readings:
  - Betel como metonimia del becerro o del sistema idolátrico
  - Betel como simple topónimo sin carga simbólica
  rationale: El hebreo nombra el lugar directamente. En español conviene retener el topónimo sin explicitar en el texto principal una metonimia que el verso no desarrolla de forma verbalizada, pero sin perder su peso histórico-profético.
  doctrine_reference: 'Translation philosophy: transliterate names; original-language primacy over translation tradition.'
- issue: Intensificación de la expresión «maldad»
  english_pob_reading: An intensive expression rendered 'your great evil.'
  chosen_spanish_reading: La repetición se refleja como «la gran maldad», preservando la intensificación.
  alternative_spanish_readings:
  - la maldad de su maldad
  - su maldad extrema
  - su perversidad extrema
  rationale: El hebreo repite la raíz para intensificar. En español conviene mantener esa fuerza sin volver opaco el sentido ni introducir un giro excesivamente interpretativo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve emphasis without erasing lexical tension.'
- issue: Sentido de נִדְמֹה נִדְמָה
  english_pob_reading: 'A prediction of total removal/destruction: ''will be utterly cut off.'''
  chosen_spanish_reading: 'Se traduce como una eliminación total: «será completamente cortado».'
  alternative_spanish_readings:
  - será totalmente destruido
  - será completamente silenciado
  - será por completo eliminado
  rationale: El hebreo usa infinitivo absoluto con verbo finito para intensificar el juicio. «Completamente cortado» conserva la imagen verbal y la certeza del anuncio, sin resolver de más la tensión semántica hacia una sola paráfrasis doctrinal.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than flattening it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'El precedente inglés de la POB se mantiene sin cambios sustanciales en el sentido global: se conserva Betel como topónimo, se refleja la intensificación de la maldad repetida y se preserva la fuerza del infinitivo absoluto en la clausura del verso. La versión española sigue ese mismo perfil de equivalencia óptima con español natural.'
  spanish_consistency_notes:
  - Se usa «Betel» como topónimo estable, coherente con la política de transliteración de nombres.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton.
  - «Maldad» mantiene el campo semántico de רָעָה sin endurecerlo a un término más técnico.
  - «Será completamente cortado» conserva la imagen verbal del hebreo y no la reemplaza por una paráfrasis doctrinal.
