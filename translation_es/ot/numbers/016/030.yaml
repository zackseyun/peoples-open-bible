  source_alignment_summary: El borrador español preserva fielmente el sentido del hebreo y sigue bien la auditoría inglesa. Mantiene la condición («Pero si»), el nombre divino «Yahvé», la acción creadora extraordinaria («crea algo nuevo[a]»), la personificación de la tierra que «abre su boca», el engullimiento de las personas y de todo lo que les pertenece, el descenso «vivos» al «Seol[b]», y la conclusión inferencial de que «estos hombres han despreciado a Yahvé».
