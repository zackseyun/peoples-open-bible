translation:
  language: es
  text: E hizo las tablas para el tabernáculo de madera de acacia[a], erguidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las tablas para el tabernáculo, de madera de acacia, erguidas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he made
  chosen_spanish: E hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  - E fabricó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración con pasado simple. «Hizo» conserva la acción directa sin añadir matices de manufactura que el hebreo no exige.
- source_word: הַקְּרָשִׁים
  english_pob_choice: the boards
  chosen_spanish: las tablas
  alternatives_spanish:
  - los tablones
  - las planchas
  - los paneles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, קְרָשִׁים designa elementos estructurales. En español «tablas» es claro y natural; «tablones» puede sonar más pesado, y «paneles» podría sugerir una categoría demasiado moderna.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: for the tabernacle
  chosen_spanish: para el tabernáculo
  alternatives_spanish:
  - para la morada
  - para el santuario portátil
  - para la tienda de reunión
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico establecido para la estructura sagrada. «Tabernáculo» mantiene la precisión y la reconocibilidad eclesial sin reemplazar el término con una paráfrasis.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  - de shittim
  lexicon: HALOT
  rationale: El constructo expresa madera de acacia. En español, «madera de acacia» es idiomático y transparente. Se evita transliterar «shittim» porque el español común no la reconoce y el hebreo común de la especie queda suficientemente expresado.
- source_word: עֹמְדִים
  english_pob_choice: standing upright
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - erguidas
  - verticales
  lexicon: HALOT
  rationale: El participio describe la orientación de las tablas. «De pie» es breve y natural en español; aunque es menos explícito que «erguidas», conserva la imagen de verticalidad sin forzar una paráfrasis técnica.
translation_notes:
  revision_awareness: El inglés POB adopta «boards» y añade una nota alternativa que permite reanudar la construcción como «the boards for the tabernacle, of acacia wood, standing». La versión española conserva esa misma ambigüedad sintáctica mediante una nota equivalente, pero en el texto principal opta por una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «tabernáculo» como término técnico coherente con el POB en inglés.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - La nota conserva la alternativa de resegmentación del modificador final, como en el audit trail inglés.
  - «Tablas» se emplea en sentido arquitectónico; no implica tablas de ley.
