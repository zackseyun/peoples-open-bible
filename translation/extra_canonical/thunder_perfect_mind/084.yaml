translation:
  text: '...is the one who sees what comes before me[A]. I am the light.

    I have not gone out — I, I —.B

    a non-darkness and the root of darkness is from within me.

    I am the desire of a vision,

    and the self-control of the heart that exists within me[d][c][b][a][E][D][C][B],

    I am the hearing that is acceptable to everyone.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: A
    text: Heuristic mapping for this segment expects a 'near/far (day)' paradox; the
      OCR here contains a light/dark and faculties sequence. Translation follows the
      OCR with noted uncertainty.
    reason: alignment_note
  - marker: B
    text: ⲙⲡⲕⲱ ⲉⲃⲟⲗ can be read prohibitive ('do not go out') or past ('I did not
      go out'). The declarative 'I have not gone out' fits the surrounding 'I am'
      declarations.
    reason: lexical_alternative
  - marker: C
    text: ⲧⲛⲟⲩⲛⲉ is uncertain; possible senses include 'brightness' (to pair with
      'non-darkness') or a cognitive term like 'understanding/noēsis.' The rendering
      balances the immediate antithesis; context may favor a cognitive gloss.
    reason: lexical_alternative
  - marker: D
    text: ⲙⲫⲏⲧ ⲉⲥϣⲟⲟⲡ ⲛϩⲏⲧ is taken with 'vision' as 'vision of the heart that is
      within.' Other segmentations (‘that is within the heart’) are possible.
    reason: lexical_alternative
  - marker: E
    text: ⲟⲩⲟⲛ ('one') may nuance as 'unity' or 'alone.' 'In one' keeps the prepositional
      form; alternatives include 'in unity' or 'in the One.'
    reason: lexical_alternative
  - marker: a
    text: Or 'It is the one who sees the day.A\nI come before;'.
    reason: previous_rendering
  - marker: b
    text: Or 'and brightness.C\nDarkness is not outside; it is within.'.
    reason: previous_rendering
  - marker: c
    text: Or 'I am the desire of the mind,\nvision of the heart that is within,D\nand
      self-control.'.
    reason: previous_rendering
  - marker: d
    text: Or 'I am the hearing that is complete in one.E'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉϩⲣⲁⲓ ⲉⲧⲟⲟⲧ
  chosen: come before
  alternatives:
  - come forth before
  - appear in front
  lexicon: 'Coptic (Sahidic) verbal: ⲉϩⲣⲁⲓ = come; ⲉⲧⲟⲟⲧ = before/in front of'
  rationale: Keeps spatial/prepositional sense without over-specifying the object
    ('before you') which is not explicit.
- source_word: ⲫⲱⲧ
  chosen: light
  alternatives:
  - radiance
  - illumination
  lexicon: Greek loan φῶς via Coptic ⲫⲱⲧ
  rationale: Established gloss; simple and forceful in this paradox cluster.
- source_word: ⲙⲡⲕⲱ ⲉⲃⲟⲗ
  chosen: have not gone out
  alternatives:
  - did not go out
  - do not go out
  lexicon: Coptic negative perfect/prohibitive with ⲙⲡ- + ⲕⲱ ⲉⲃⲟⲗ = go out
  rationale: Declarative cadence suits the surrounding first-person assertions; prohibitive
    reading remains possible (see footnote).
- source_word: ⲟⲩⲁⲧⲛⲟⲕⲉ
  chosen: a non-darkness
  alternatives:
  - a place without darkness
  - an absence of darkness
  lexicon: Coptic privative ⲁⲧ- + ⲛⲟⲕⲉ (dark) with indefinite ⲟⲩ-
  rationale: Preserves the marked privative morphology rather than domesticating to
    a smoother abstract noun.
- source_word: ⲧⲛⲟⲩⲛⲉ
  chosen: brightness
  alternatives:
  - understanding
  - insight
  - noesis
  lexicon: Uncertain; possible Greek cognitive loan vs. light imagery
  rationale: Maintains the light/dark antithesis in immediate context; acknowledged
    uncertainty (footnote).
- source_word: ⲛⲟⲕⲉ / ⲟⲩⲉⲃⲟⲗ / ⲛϩⲏⲧ
  chosen: darkness / outside / within
  alternatives:
  - gloom / without / in the heart
  lexicon: 'Coptic: ⲛⲟⲕⲉ (dark); ⲟⲩⲉⲃⲟⲗ (outside); ⲛϩⲏⲧ (inside/heart)'
  rationale: Plain spatial and qualitative oppositions kept sharp to preserve paradox.
- source_word: ⲧⲉⲡⲓⲑⲩⲙⲓⲁ
  chosen: desire
  alternatives:
  - longing
  - passion
  - lust
  lexicon: Greek ἐπιθυμία via Coptic
  rationale: Neutral register covers positive/negative valence; fits triad of faculties.
- source_word: ⲛⲟⲩ (νοῦς)
  chosen: mind
  alternatives:
  - intellect
  - understanding
  lexicon: Greek νοῦς via Coptic ⲛⲟⲩ
  rationale: Standard philosophical term; avoids scholastic overtones.
- source_word: ϩⲟⲣⲁⲥⲓⲥ
  chosen: vision
  alternatives:
  - seeing
  - sight
  lexicon: Greek ὅρασις via Coptic
  rationale: Abstract noun aligning with 'desire' and 'self-control' as faculties.
- source_word: ⲉⲅⲕⲣⲁⲧⲓⲁ
  chosen: self-control
  alternatives:
  - temperance
  - self-restraint
  lexicon: Greek ἐγκράτεια via Coptic
  rationale: Modern, clear equivalent of the virtue term.
- source_word: ⲙⲫⲏⲧ ⲉⲥϣⲟⲟⲡ ⲛϩⲏⲧ
  chosen: of the heart that is within
  alternatives:
  - that is within the heart
  - of the inner heart
  lexicon: Coptic ⲡ/ⲫⲏⲧ (heart) with genitive ⲙ- and locative ⲛϩⲏⲧ
  rationale: Keeps the inner/within emphasis without recasting syntax.
- source_word: ⲡⲥⲱⲧⲙ
  chosen: hearing
  alternatives:
  - the ear
  - listening
  lexicon: Coptic nominal ⲡⲥⲱⲧⲙ from verb 'to hear'
  rationale: Abstract noun suits parallel to 'vision' and 'desire'.
- source_word: ϣⲏⲡ
  chosen: complete
  alternatives:
  - perfect
  - fulfilled
  lexicon: Coptic adjective ϣⲏⲡ
  rationale: Plain adjective preserves potential theological resonance without doctrinal
    color.
- source_word: ⲟⲩⲟⲛ
  chosen: one
  alternatives:
  - unity
  - alone
  lexicon: Coptic numeral/noun 'one'
  rationale: '''in one'' closely reflects prepositional construction; alternatives
    noted in footnote.'
parallelism_check: 'Two parallel clusters: (1) light/darkness antithesis — ''I am
  the light'' set against ''Darkness is not outside; it is within,'' with the privative
  ''non-darkness'' reinforcing paradox; (2) a triad of cognitive-moral faculties —
  ''desire of the mind / vision (of the heart within) / self-control'' — capped by
  a matching sensory faculty ''hearing that is complete in one.'' Repetition of ''I
  am'' frames each cluster; internal balance of opposites and enumerations retained.'
voice_check: First-person revelatory voice preserved with explicit 'I am' statements,
  including the emphatic 'I, I' and declarative cadence. No smoothing of paradox ('non-darkness'
  retained), no assimilation to consult phrasing. Imperative/prohibitive ambiguity
  in 'ⲙⲡⲕⲱ ⲉⲃⲟⲗ' was resolved in favor of declarative to maintain consistent self-revelation
  voice; alternative noted.
alignment_risk_note: 'Alignment confidence is medium and the consult snippet for this
  segment speaks of ''near/far on the day,'' whereas the OCR lines here concern light/darkness
  and cognitive faculties. This suggests a likely misalignment of segment mapping.
  Within the OCR itself, several lexemes are uncertain: ''ⲧⲛⲟⲩⲛⲉ'' may be cognitive
  rather than luminous; ''ⲙⲡⲕⲱ ⲉⲃⲟⲗ'' could be prohibitive or perfective; ''ⲙⲫⲏⲧ ⲉⲥϣⲟⲟⲡ
  ⲛϩⲏⲧ'' may attach either to ''vision'' or to the following clause. The draft privileges
  a coherent light/dark and inner/outer reading while flagging uncertainties.'
