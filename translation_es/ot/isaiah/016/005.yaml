  text: וְ/הוּכַ֤ן בַּ/חֶ֨סֶד֙ כִּסֵּ֔א וְ/יָשַׁ֥ב עָלָ֛י/ו בֶּ/אֱמֶ֖ת בְּ/אֹ֣הֶל דָּוִ֑ד שֹׁפֵ֛ט וְ/דֹרֵ֥שׁ מִשְׁפָּ֖ט וּ/מְהִ֥ר צֶֽדֶק׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/016/005.yaml
  text: A throne will be established in steadfast love[a], and one will sit on it in faithfulness in the tent of David[c][b], judging and seeking justice and swift to do righteousness.
  footnotes:
