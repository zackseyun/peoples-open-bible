translation:
  language: es
  text: ¡He aquí[a], el día de Yahvé viene, cruel, con ira y furor ardiente, para convertir la tierra en desolación[b], y destruirá de ella a sus pecadores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira». El hebreo הִנֵּה es un deíctico solemne de anuncio profético; «He aquí» preserva mejor ese tono.'
    reason: alternative_reading
  - marker: b
    text: 'O: «ruina» o «devastación». El hebreo לְשַׁמָּה expresa desolación devastadora.'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «y el día destruirá de ella a sus pecadores», tomando «el día» como sujeto inmediato; aquí se entiende a Yahvé como agente implícito del juicio.'
    reason: theological_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - ¡Mira, pues!
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y solemne del anuncio profético. En español, '¡Mira!' comunica inmediatez con naturalidad; 'He aquí' es más tradicional, pero algo más literario.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahvé
  - el día de Yahweh
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para יְהוָה: ''Yahvé''. Mantiene el valor profético de la fórmula sin sustituirla por una convención de máscara como ''SEÑOR''.'
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  lexicon: HALOT
  rationale: El perfecto profético comunica certeza e inmediatez. En español, 'viene' es natural y conserva el sentido de acontecimiento inminente.
- source_word: אַכְזָרִי
  english_pob_choice: cruel
  chosen_spanish: cruel
  alternatives_spanish:
  - impasible
  - sin piedad
  lexicon: HALOT
  rationale: '''Cruel'' es la correspondencia más directa y sobria para el adjetivo, manteniendo el tono de juicio sin suavizarlo.'
- source_word: וְעֶבְרָה
  english_pob_choice: with wrath
  chosen_spanish: con ira
  alternatives_spanish:
  - con furor
  - con indignación
  lexicon: HALOT
  rationale: La acumulación de términos de غضب/ira en el hebreo pide una traducción igualmente acumulativa. 'Ira' es clara y consistente con el registro bíblico en español.
- source_word: וַחֲרוֹן אָף
  english_pob_choice: and fierce anger
  chosen_spanish: ardor de enojo
  alternatives_spanish:
  - furor encendido
  - calor de la ira
  lexicon: HALOT
  rationale: El hebreo literalmente habla del 'ardor/quemazón del rostro/enojo'. 'Ardor de enojo' preserva el componente de calor/encendimiento sin sonar forzado; 'fierce anger' en inglés se resuelve aquí con una imagen más transparente en español.
- source_word: לָשׂוּם
  english_pob_choice: to make
  chosen_spanish: para convertir
  alternatives_spanish:
  - para hacer
  - para dejar
  lexicon: HALOT
  rationale: En este contexto de juicio, el infinitivo de propósito busca el resultado de devastación. 'Convertir' comunica el cambio hacia desolación sin perder la idea causativa.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aunque 'land' puede ser 'tierra' o 'país', en español 'la tierra' funciona bien y mantiene el alcance amplio del oráculo, sin forzar una lectura meramente territorial.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: en desolación
  alternatives_spanish:
  - en ruina
  - en un desierto
  lexicon: HALOT
  rationale: '''Desolación'' conserva el registro profético y la idea de devastación total. La preposición ''en'' expresa el resultado de ''convertir'' la tierra.'
- source_word: וְחַטָּאֶיהָ
  english_pob_choice: its sinners
  chosen_spanish: a sus pecadores
  alternatives_spanish:
  - a sus pecadores
  - a los pecadores de ella
  lexicon: HALOT
  rationale: '''Pecadores'' refleja el sustantivo hebreo, manteniendo el calificativo moral. El posesivo ''sus'' conserva el referente del sustantivo femenino ''tierra''.'
- source_word: יַשְׁמִיד
  english_pob_choice: he will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - exterminará
  - arrasará
  lexicon: HALOT
  rationale: El verbo expresa destrucción decisiva. En español, el futuro simple ya puede llevar sujeto implícito; aquí lo mantiene claro sin añadir un pronombre innecesario.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - de ella
  lexicon: HALOT
  rationale: Como 'tierra' es femenino en español, 'de ella' reproduce la referencia pronominal y evita una traducción más neutra que perdería la correspondencia gramatical.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El proyecto pide 'Yahvé' como forma principal para el Tetragrámaton. Esto preserva la identidad del nombre divino en el texto sin ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Subject of יַשְׁמִיד
  english_pob_reading: explicitly rendered as 'he will destroy,' referring to the LORD
  chosen_spanish_reading: destruirá, entendido de Yahvé
  alternative_spanish_readings:
  - destruirá
  - lo destruirá
  rationale: El hebreo admite que el antecedente inmediato sea 'el día', pero la sintaxis y la teología profética apuntan al agente divino. En español se conserva la ambigüedad gramatical del futuro simple, mientras el contexto identifica a Yahvé como sujeto implícito.
  doctrine_reference: Isaías 13:9; contexto profético del día de Yahvé como acto del propio Yahvé
translation_notes:
  revision_awareness: La auditoría inglesa revisó 'earth' a 'land' para הָאָרֶץ y mantuvo la lectura de juicio acumulativo. En español, 'la tierra' conserva mejor el alcance natural del oráculo y evita una restricción innecesaria; se mantiene la pila de términos de ira ('ira' / 'ardor de enojo') y la agencia divina implícita en el verbo final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'tierra' para הָאָרֶץ en este contexto de juicio profético amplio.
  - Se mantiene el registro de juicio con 'cruel', 'ira', 'ardor de enojo' y 'desolación'.
  - El sujeto de 'destruirá' queda contextualmente identificado con Yahvé, sin introducir un pronombre explícito que estreche la ambigüedad hebrea.
