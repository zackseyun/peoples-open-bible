review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: el ganado va con Israel, no quedará nada atrás, de ese ganado tomarán para servir a Yahvé, y aún no saben con qué servirán hasta llegar. Conserva correctamente la repetición de עבד con ''servir'' y usa ''Yahvé'' conforme al proyecto. Sin embargo, ''de él hemos de tomar'' suena menos natural en español con antecedente colectivo y puede oscurecer que se refiere a los animales del ganado; además, falta el matiz idiomático de énfasis en ''ni una pezuña'' y el anclaje de la nota está mejor sobre la frase verbal relevante que sobre ''pezuña''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero tiene dos asperezas. 'Y aun' es aceptable, aunque 'Y hasta' o 'Y también' serían más naturales; no es un problema grave. Más importante, 'de él hemos de tomar' resulta algo forzado en español bíblico moderno; 'de allí hemos de tomar' cambia el referente, así que la mejor reparación es 'de nuestro ganado hemos de tomar' o 'de ellos hemos de tomar'. También conviene 'no quedará ni una pezuña' para reproducir mejor la negación enfática y sonar idiomático. La nota al pie debe anclarse en 'servir' y no en 'pezuña'.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה -> ''Yahvé''; עבד -> ''servir'' con alternativa ''adorar'' en nota; מִקְנֶה -> ''ganado''. No hay conflicto doctrinal ni terminológico mayor. La principal mejora es estilística y de claridad referencial en español.'
  issues:
  - severity: medium
    issue: '''de él hemos de tomar'' suena forzado y ambiguo en español'
    rationale: Aunque el hebreo usa un singular colectivo, en español 'de él' con antecedente 'ganado' puede sonar rígido y poco natural. Una formulación explícita como 'de nuestro ganado hemos de tomar' preserva el referente sin añadir contenido indebido.
  - severity: medium
    issue: La negación enfática de 'no quedará una pezuña' puede expresarse mejor
    rationale: El hebreo singular tras negación es enfático; en español 'no quedará ni una pezuña' reproduce mejor esa fuerza y suena más idiomático que la forma sin 'ni'.
  - severity: low
    issue: La nota al pie está anclada en un lugar incorrecto
    rationale: La nota explica el valor de עבד ('servir/adorar'), por lo que el marcador debe ir sobre la frase 'servir a Yahvé', no sobre 'pezuña'.
  revised_spanish_text: Y aun nuestro ganado irá con nosotros; no quedará ni una pezuña, porque de nuestro ganado hemos de tomar para servir[a] a Yahvé nuestro Dios, y no sabemos con qué hemos de servir a Yahvé hasta que lleguemos allí.
  revised_footnotes:
  - marker: a
    text: O "adorar a Yahvé nuestro Dios" / "con qué hemos de adorar a Yahvé". El verbo hebreo puede significar "servir" o, según el contexto, "adorar".
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el español para mejorar claridad y naturalidad sin apartarse del hebreo ni del rastro de auditoría inglés: ''ni una pezuña'' refleja mejor la negación enfática; ''de nuestro ganado hemos de tomar'' aclara el referente colectivo de מִמֶּנּוּ en español; y la nota se movió al verbo ''servir'', que es donde corresponde la alternativa léxica.'
