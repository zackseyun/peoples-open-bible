translation:
  text: The disciples said to Jesus[a], “Tell us what the kingdom of the heavens is
    like.” He said to them, “It is like a mustard seed—the smallest of all seeds;
    but when it falls upon worked soil[f][e][d][c][b], it produces a great branch
    and becomes a shelter for the birds of the sky.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally “Tell us like-what the kingdom of the heavens [is].” ⲉⲛⲓⲙ is an
      interrogative “how/like what.”
    reason: dialect_note
  - marker: b
    text: Literally “a grain of mustard.” The Coptic noun ⲃⲗⲃⲓⲗⲉ is a kernel or grain.
    reason: lexical_alternative
  - marker: c
    text: “Worked soil” renders the relative clause “which they work (ⲣϩⲱⲃ) at it,”
      an agricultural idiom for tilled ground.
    reason: cultural_note
  - marker: d
    text: ⲥⲕⲉⲡⲏ can also mean “shade” or “covering.”
    reason: lexical_alternative
  - marker: e
    text: Unlike the Synoptic phrasing “kingdom of God,” the Coptic here reads “kingdom
      of the heavens” (ⲡⲡⲉ).
    reason: cross_reference
  - marker: f
    text: Or 'it produces a great plant'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ
  chosen: tell us
  alternatives:
  - say to us
  - speak to us
  lexicon: Layton; Lambdin (Coptic grammar)
  rationale: Imperative of ϫⲱⲛⲧⲟ “say to (someone)” takes dative ⲉⲁⲛⲟⲛ; idiomatic
    English is “tell us.”
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: Crum; Layton
  rationale: ⲙⲛⲧⲣⲣⲟ commonly renders “kingdom” (domain/reign). “Kingdom” preserves
    Thomas’s familiar idiom.
- source_word: ⲛⲡⲡⲉ (after ⲡⲙⲛⲧⲣⲣⲟ)
  chosen: of the heavens
  alternatives:
  - of heaven
  - of the sky
  lexicon: Crum
  rationale: ⲡⲡⲉ ranges from “sky” to “heaven(s).” With ⲡⲙⲛⲧⲣⲣⲟ, the set phrase “kingdom
    of the heavens” fits Thomas’s diction and keeps plural nuance.
- source_word: ⲉⲛⲓⲙ
  chosen: what … is like
  alternatives:
  - how it is
  - in what manner
  lexicon: Crum; Layton
  rationale: Interrogative construction meaning “like what?/how?” Here it complements
    “tell us” about resemblance.
- source_word: ⲁⲟⲩⲃⲗⲃⲓⲗⲉ ⲛϣⲗⲧⲁⲙ
  chosen: a mustard seed
  alternatives:
  - a grain of mustard
  lexicon: Crum (blbile ‘grain’); Crum (shltam ‘mustard’)
  rationale: ⲃⲗⲃⲓⲗⲉ denotes a kernel/grain; idiomatic English collocation is “mustard
    seed,” while noting literal “grain of mustard.”
- source_word: ⲛⲧⲟⲥ ⲥⲃⲟⲕ ⲡⲁⲣⲁⲡϭⲣⲟϭ ⲧⲏⲣⲛⲧⲟⲟⲩ
  chosen: the smallest of all seeds
  alternatives:
  - smaller than all the seeds
  lexicon: Crum (sbōk ‘small’)
  rationale: Independent pronoun ⲛⲧⲟⲥ + adjective gives predication; ⲡⲁⲣⲁ with ⲧⲏⲣⲛⲧⲟⲟⲩ
    yields superlative sense “of all.”
- source_word: ⲉⲣϣⲁⲛ ⲛⲧⲟⲥ ϩⲉ
  chosen: when it falls
  alternatives:
  - whenever it falls
  lexicon: Layton (ⲉⲣϣⲁⲛ temporal)
  rationale: 'ⲉⲣϣⲁⲛ + infinitive (here ⲕⲱ/ϩⲉ ‘fall’) forms a temporal clause: “when
    ….”'
- source_word: ⲉϫⲛ ⲡⲕⲁϩ
  chosen: upon the earth/soil
  alternatives:
  - on the ground
  lexicon: Crum (kah ‘earth, ground’)
  rationale: Context favors agricultural soil; “upon … soil” keeps concrete imagery.
- source_word: ⲉⲧⲉⲣⲉ ⲛⲧⲟⲟⲩ ⲣϩⲱⲃ ⲉⲛⲧⲟϥ
  chosen: (upon) worked soil
  alternatives:
  - tilled ground
  - which they have worked
  lexicon: Crum (rḥōb ‘work, do’)
  rationale: Relative clause literally “which they work at it”; condensed to “worked/tilled”
    to convey agricultural preparation.
- source_word: ϣⲁⲣⲉⲛⲧⲟϥ ⲧⲉⲩⲟ ⲉⲃⲟⲗ
  chosen: it produces a plant
  alternatives:
  - it brings forth a plant
  lexicon: Crum (teuo ‘plant’); Layton (ⲥⲁⲣⲉ…ⲉⲃⲟⲗ causative)
  rationale: ⲥⲁⲣⲉ + object + ⲉⲃⲟⲗ indicates producing/bringing forth.
- source_word: ⲛⲟⲩⲛⲟϭ
  chosen: a great
  alternatives:
  - a large
  lexicon: Crum (noč ‘great’)
  rationale: Adjective of size/intensity; either “great” or “large.” “Great” retains
    Thomas’s elevated register.
- source_word: ⲛⲧⲁⲣ ⲛⲧⲉⲛⲧⲟϥ ϣⲱⲡⲉ
  chosen: and it becomes
  alternatives:
  - and it turns into
  lexicon: Layton (stative ⲥⲱⲡⲉ ‘become’)
  rationale: ⲥⲱⲡⲉ used with subject “it” to denote change of state.
- source_word: ⲥⲕⲉⲡⲏ
  chosen: a shelter
  alternatives:
  - a shade
  - a cover
  lexicon: Crum (skepē; Gk σκέπη)
  rationale: Loanword means shelter/covering; “shelter” conveys function; “shade”
    is a valid nuance.
- source_word: ⲛϩⲁⲗⲏⲧ
  chosen: birds
  alternatives:
  - fowl
  lexicon: Crum (halēt ‘bird’)
  rationale: Plural noun for birds.
- source_word: ⲛⲡⲡⲉ (with birds)
  chosen: of the sky
  alternatives:
  - of heaven
  - of the heavens
  lexicon: Crum
  rationale: To avoid repetition and reflect concrete image, “sky” suits this occurrence,
    while same lexeme earlier is rendered “heavens.”
textual_note: Sahidic with Lycopolitan features. No major lacunae in Dilley’s text.
  The temporal ⲉⲣϣⲁⲛ_ⲛⲧⲟⲥϩⲉ (“when it falls”) is printed in the manuscript as ⲉⲥϣⲁ(ⲛ)…
  with a damaged or assimilated nasal, normalized by Dilley. The sequence ⲉⲧⲟⲩⲣ̄ϩⲱⲃ
  ⲉⲣⲟϥ (line-level) / ⲉⲧⲉⲣⲉⲛⲧⲟⲟⲩ ⲣϩⲱⲃ ⲉⲛⲧⲟϥ (normalized) is a relative clause with
  a resumptive pronoun (“which they work at it”), a known construction; we render
  it succinctly as “worked/tilled soil.” The angled bracket ⟨ⲥ⟩ in the printed ⟨ⲥ⟩ⲥⲟⲃⲕ
  signals an editorial restoration of the initial sigma to read ⲥⲃⲟⲕ (“small”). Orthography
  such as ⲁⲟⲩⲃⲗⲃⲓⲗⲉ reflects the common Coptic form for “grain.” No Greek POxy witness
  overlaps this saying.
