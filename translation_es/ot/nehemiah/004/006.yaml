translation:
  language: es
  text: 'Y cuando vinieron los judíos que vivían cerca de ellos, nos dijeron diez veces: «De todos los lugares donde ustedes se vuelvan[a], vendrán contra nosotros».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «adonde ustedes vuelvan» o «dondequiera que ustedes se vuelvan». El verbo hebreo puede significar «volver» o «girarse/dirigirse»; aquí el contexto probablemente expresa movimiento en cualquier dirección.'
    reason: lexical_alternative
  - marker: b
    text: El aviso implica que los atacantes vendrían desde toda dirección; el sentido de ataque se expresa en «vendrán contra nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y cuando
  - Y aconteció que, cuando
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea introduce un nuevo desarrollo; «Y sucedió que, cuando» conserva ese valor temporal y narrativo sin sonar demasiado arcaica en español.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron y
  lexicon: HALOT
  rationale: El verbo de movimiento se expresa naturalmente con «vinieron», que mantiene el sentido de llegada del grupo al relato.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeos
  - los judíos de Judá
  lexicon: HALOT
  rationale: En este contexto de Nehemías, el término designa al pueblo/comunidad judía; «los judíos» es la equivalencia más natural y fiel al uso contextual del texto fuente.
- source_word: הַיֹּשְׁבִים אֶצְלָם
  english_pob_choice: who lived near them
  chosen_spanish: que vivían cerca de ellos
  alternatives_spanish:
  - que habitaban junto a ellos
  - que moraban cerca de ellos
  lexicon: HALOT
  rationale: La partícula de residencia con אֶצְלָם indica proximidad local; «vivían cerca de ellos» comunica bien la cercanía geográfica y conserva la idea relacional del hebreo.
- source_word: וַיֹּאמְרוּ לָנוּ
  english_pob_choice: came and told us
  chosen_spanish: nos dijeron
  alternatives_spanish:
  - nos hablaron
  - nos avisaron
  lexicon: HALOT
  rationale: El hebreo enlaza la llegada con el reporte; en español, «nos dijeron» transmite el acto de comunicar el aviso sin añadir elementos no exigidos por el texto.
- source_word: עֶשֶׂר פְּעָמִים
  english_pob_choice: ten times
  chosen_spanish: diez veces
  alternatives_spanish:
  - repetidas veces
  - una y otra vez
  lexicon: HALOT
  rationale: Se conserva la expresión numérica explícita del hebreo, que el POB en inglés también retuvo por su fuerza textual y posible valor idiomático.
- source_word: מִכָּל הַמְּקֹמוֹת
  english_pob_choice: From all the places
  chosen_spanish: De todos los lugares
  alternatives_spanish:
  - Desde todos los lugares
  - De cada uno de los lugares
  lexicon: HALOT
  rationale: «Lugares» es un equivalente claro y natural para מְקֹמוֹת; se preserva el distributivo de la frase.
- source_word: אֲשֶׁר תָּשׁוּבוּ
  english_pob_choice: where you turn
  chosen_spanish: a donde vuelvan
  alternatives_spanish:
  - donde se vuelvan
  - por donde vuelvan
  lexicon: HALOT
  rationale: El verbo שוב puede expresar volver/dirigirse/torcerse; aquí se mantiene la ambigüedad funcional con una formulación española que siga el sentido de dirección cambiante. La tercera persona plural en español refleja el giro del discurso reportado («they» en la cita dentro de la cita), sin forzar una literalidad desusada.
- source_word: עָלֵינוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - a nosotros
  lexicon: HALOT
  rationale: En un contexto hostil, על expresa dirección adversaria; «contra nosotros» comunica esa fuerza con claridad idiomática en español.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo WLC y el expediente auditado en inglés. Se mantuvieron las decisiones clave del POB inglés: la expresión numérica «diez veces», la cercanía local de «who lived near them» y la ambigüedad de שוב en el aviso. No se introdujeron lecturas teológicas adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se prefieren equivalentes directos y auditablemente cercanos al hebreo, evitando ampliar el sentido narrativo más allá del aviso hostil.
  - Se conserva el plural inclusivo «nosotros»/«contra nosotros» para reflejar el discurso reportado a la comunidad de Nehemías.
