translation:
  language: es
  text: y Hashubá[a], Ohel, Berekías, Hasadía[b] y Jushab-hesed, cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «cinco», resumiendo la lista anterior de nombres. En español podría suplirse «eran» para dar fluidez, pero se conserva el estilo elíptico del original.
    reason: lexical_alternative
  - marker: b
    text: El nombre final aparece escrito en hebreo como dos elementos, pero se entiende mejor como un solo nombre personal compuesto; por eso se mantiene con guion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַחֲשֻׁבָה
  english_pob_choice: Hashubah
  chosen_spanish: Hasubá
  alternatives_spanish:
  - Hasubah
  - Jasubá
  lexicon: HALOT
  rationale: Nombre propio con prefijo conjuntivo. Se translitera al español como forma nominal, sin traducir el significado del nombre. La vocalización hebrea permite una adaptación breve y legible; se conserva el valor onomástico.
- source_word: וָאֹהֶל
  english_pob_choice: Ohel
  chosen_spanish: Ohel
  alternatives_spanish:
  - Ojel
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio, no como el sustantivo común 'tienda'. En español se mantiene la transliteración directa para respetar su uso genealógico.
- source_word: וּבֶרֶכְיָה
  english_pob_choice: Berekiah
  chosen_spanish: Berequías
  alternatives_spanish:
  - Berekías
  - Berecías
  lexicon: HALOT
  rationale: Nombre propio con valor genealógico. Se prefiere una transliteración española convencional con -qu- para reflejar mejor el sonido /k/ antes de 'i/a' en lectura hispana, manteniendo la terminación -ías del elemento יה.
- source_word: וַחֲסַדְיָה
  english_pob_choice: Hasadiah
  chosen_spanish: Hasadías
  alternatives_spanish:
  - Hasadía
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la terminación teofórica '-ías', equivalente habitual en español para nombres hebreos terminados en יה, y se evita traducir el nombre como sustantivo.
- source_word: י֥וּשַׁב חֶ֖סֶד
  english_pob_choice: Jushab-hesed
  chosen_spanish: Jushab-hesed
  alternatives_spanish:
  - Jushab Hesed
  - Josheb-hesed
  lexicon: HALOT
  rationale: El hebreo presenta dos elementos que funcionan como un solo nombre personal compuesto. Se conserva el guion para ayudar a la lectura y para no perder la unidad onomástica documentada por el texto y el audit trail inglés.
- source_word: חָמֵשׁ
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - eran cinco
  lexicon: HALOT
  rationale: El hebreo es elíptico y suma los nombres precedentes con un simple cardinal. En español se conserva la brevedad genealógica con 'cinco', sin añadir un verbo que el texto no explicita.
