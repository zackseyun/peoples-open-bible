translation:
  language: es
  text: Porque de él obtendrás entendimiento[a], en tiempo de necesidad para responder un dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene una lectura sustancialmente diferente: «No salgas fiador por encima de tus posibilidades, y si sales fiador, preocúpate como uno que va a pagar». Se sigue el texto hebreo de la Cairo Geniza para la traducción principal, porque en este versículo se conserva hebreo, pero la divergencia es importante.'
    reason: textual_variant
lexical_decisions:
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de este
  - de esa persona
  - por medio de él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino se entiende de manera personal en el contexto sapiencial; en español, «de él» conserva esa referencia y el valor relacional de procedencia sin volver impersonal el texto.
- source_word: תִּקַּח
  english_pob_choice: you will gain
  chosen_spanish: sacarás
  alternatives_spanish:
  - obtendrás
  - recibirás
  - tomarás
  lexicon: HALOT
  rationale: «Sacarás» expresa bien la idea de adquirir o extraer un beneficio/resultado desde una fuente personal, evitando el calco demasiado literal de «tomarás» y manteniendo el sentido de obtención indicado por el inglés POB.
- source_word: שֶׂכֶל
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - prudencia
  - sensatez
  lexicon: HALOT
  rationale: En este contexto, שֶׂכֶל apunta a juicio práctico y capacidad de discernir; «entendimiento» es amplio, natural en español bíblico contemporáneo y conserva el valor sapiencial sin estrecharlo excesivamente.
- source_word: בְּעֵת צֹרֶךְ
  english_pob_choice: at a time of need
  chosen_spanish: a tiempo de necesidad
  alternatives_spanish:
  - en tiempo de necesidad
  - cuando haya necesidad
  - en el momento oportuno de necesidad
  lexicon: HALOT
  rationale: La frase temporal/circunstancial se vierte de modo fluido con «a tiempo de necesidad», que preserva el matiz de ocasión requerida sin imponer una paráfrasis mayor.
- source_word: לְהַשִׁיב
  english_pob_choice: to answer
  chosen_spanish: responder
  alternatives_spanish:
  - contestar
  - replicar
  - dar respuesta
  lexicon: HALOT
  rationale: El verbo aquí introduce la acción de dar una respuesta; «responder» es la forma más natural y neutra en español para conservar ese valor verbal.
- source_word: פִּתְגָּם
  english_pob_choice: a saying
  chosen_spanish: un dicho
  alternatives_spanish:
  - una sentencia
  - un dicho sapiencial
  - una palabra
  lexicon: HALOT
  rationale: «Dicho» refleja con naturalidad una formulación breve o enunciado, y en español evita hacer más específico el término de lo que el hebreo exige. Mantiene el tono sapiencial sin forzar «proverbio».
theological_decisions:
- issue: Texto hebreo y lectura griega divergente en esta unidad
  english_pob_reading: The Hebrew Cairo Geniza text is followed for the main translation because Hebrew survives for this verse, but the Greek divergence is significant.
  chosen_spanish_reading: Se sigue el hebreo como texto principal; la lectura griega se registra como variante significativa en nota.
  alternative_spanish_readings:
  - No prestar fianza más allá de tus posibilidades, y si prestas fianza, preocúpate como uno que va a pagar.
  - No salgas fiador por encima de tu capacidad, y si sales fiador, mantente prevenido como quien ha de reembolsar.
  rationale: El hebreo conservado ofrece una sentencia sapiencial sobre obtener entendimiento; el griego transmite otra amonestación sobre la fianza. Dado que el expediente aporta ambos testigos y el inglés POB ya documenta la divergencia, el texto principal debe seguir el hebreo, dejando constancia transparente de la variante griega.
  doctrine_reference: Principio textual de seguimiento del testimonio conservado principal con nota de variante importante; no aplica doctrina dogmática específica.
translation_notes:
  revision_awareness: El inglés POB revisó «sense» a «understanding» y ajustó la segunda cláusula a una forma más natural («at a time of need»). La versión española refleja esa revisión con «entendimiento» y una locución temporal igualmente natural, sin perder la tensión textual entre hebreo y griego.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en esta unidad.
  - Se usa «entendimiento» como equivalente de שֶׂכֶל, en línea con la revisión inglesa y con registro sapiencial.
  - La nota de variante griega se ancla únicamente en el punto donde el texto principal y el alterno realmente divergen.
