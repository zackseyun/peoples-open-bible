id: GAL.1.10
reference: Galatians 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἄρτι γὰρ ἀνθρώπους πείθω ἢ τὸν θεόν; ἢ ζητῶ ἀνθρώποις ἀρέσκειν; ⸀εἰ ἔτι ἀνθρώποις ἤρεσκον, Χριστοῦ δοῦλος οὐκ ἂν ἤμην.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/001/010.yaml
  text: For am I now persuading people[a], or God? Or am I seeking to please people? If I were still pleasing people[b], I would not be Messiah’s slave.
  footnotes:
  - marker: a
    text: 'Or ''am I now seeking the approval of people, or of God?'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Christ’s servant.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 지금 내가 사람들의 환심을 사려는 것입니까, 아니면 하나님의 환심을 사려는 것입니까? 사람들을 기쁘게 하려는 것입니까? 내가 여전히 사람들을 기쁘게 하려는 것이라면, 나는 메시아의 노예[a]가 아닐 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δοῦλος. 「종」으로도 옮길 수 있으나, 바울이 자기 정체성을 메시아께 매인 자로 강조하는 본 구절에서는 매임의 무게를 살리는 「노예」가 적절하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθρώπους πείθω
  english_pob_choice: persuading people
  chosen_korean: 사람들의 환심을 사다
  alternatives_korean:
  - 사람들을 설득하다
  - 사람들의 인정을 구하다
  lexicon: BDAG
  rationale: 본문 πείθω는 단순 「설득」이 아니라 호의·승인을 얻으려는 노력의 뉘앙스를 띤다. 다음 구절의 ἀρέσκειν과 의미가 겹친다.
- source_word: Χριστοῦ δοῦλος
  english_pob_choice: Messiah’s slave
  chosen_korean: 메시아의 노예
  alternatives_korean:
  - 메시아의 종
  lexicon: BDAG
  rationale: DOCTRINE.md §1을 따라, 바울이 자신의 매인 신분을 신학적으로 강조할 때 「노예」를 택한다.
