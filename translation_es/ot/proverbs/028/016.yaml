    text: Or, 'and commits much extortion.' The Hebrew phrase is literally 'and great in oppressions.'
    reason: lexical_alternative
  - marker: b
    text: '''Unjust gain'' can also be rendered ''greedy profit'' or ''ill-gotten gain.'''
    reason: lexical_alternative
