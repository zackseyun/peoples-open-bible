  to: Y el pueblo de Israel y de Judá, que habitaba en las ciudades de Judá, también trajo el diezmo del ganado vacuno y de las ovejas, y el diezmo de las cosas santas[a], consagradas a Yahvé su Dios; y las pusieron en montones[b], montón tras montón.
  rationale: Se ajusta בני al sentido corporativo documentado por el POB («el pueblo de Israel y de Judá»), se mueve la nota [a] al sintagma que realmente comenta, y se suaviza levemente la redacción para mayor naturalidad en español sin apartarse del hebreo ni de la terminología del proyecto.
