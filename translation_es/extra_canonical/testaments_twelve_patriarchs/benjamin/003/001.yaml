translation:
  language: es
  text: Ahora pues, hijos míos, también ustedes amen a Yahvé[a], el Dios del cielo y de la tierra, y guarden sus mandamientos, imitando al hombre bueno y piadoso[b] José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. Κύριον ("Señor"), convención del texto griego para el nombre divino Yahvé (YHWH). Siguiendo el criterio de transparencia del POB, se restituye el nombre en el texto español. La traducción inglesa del POB mantiene "el Señor" como equivalente formal de la superficie griega.
    reason: theological_note
  - marker: b
    text: 'Gr. ὅσιον: denota piedad y rectitud de carácter (cf. BDAG), distinto de ἅγιος ("santo" en sentido cultual o de consagración). Alternativa: «santo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG κύριος §2; LXX Deut 6:5
  rationale: 'The Greek Κύριον functions here as a divine-name substitute for YHWH, echoing the deuteronomic formula ''love the LORD your God'' (Deut 6:5 LXX: ἀγαπήσεις Κύριον τὸν Θεόν σου). Per POB project defaults, when κύριος is quoting or alluding to the divine name, the Spanish text unmasks it as ''Yahvé'' rather than perpetuating the substitution convention ''Señor''. The English POB rendered it ''the Lord'', which is defensible as a formal-equivalent of the Greek surface text; the Spanish record makes the underlying divine-name reference explicit and notes the convention in footnote [a].'
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: LSJ τέκνον I.1
  rationale: '''Hijos míos'' is the most natural and dignified Spanish equivalent for τέκνα μου in a testamentary address. The postpositive possessive (''hijos míos'' vs. ''mis hijos'') adds the warm intimacy appropriate to a dying patriarch addressing his descendants, matching the rhetorical register of testament literature.'
- source_word: ἀγαπήσατε
  english_pob_choice: love (must love)
  chosen_spanish: amen
  alternatives_spanish:
  - quieran
  - tengan amor a
  lexicon: BDAG ἀγαπάω 1
  rationale: Aorist imperative rendered as present imperative 'amen' in Spanish, which carries the same volitive force. 'Amen' (from 'amar') is the standard dignified term for covenantal love; 'quieran' would be too volitional/weak for the deuteronomic register.
- source_word: φυλάξατε ἐντολὰς αὐτοῦ
  english_pob_choice: keep his commandments
  chosen_spanish: guarden sus mandamientos
  alternatives_spanish:
  - observen sus mandamientos
  - cumplan sus mandamientos
  lexicon: BDAG φυλάσσω 2b; ἐντολή 1
  rationale: '''Guardar mandamientos'' is the standard and broadly intelligible biblical idiom in Spanish for φυλάσσειν ἐντολάς, carrying the nuance of custodial keeping/observance. ''Observar'' is an acceptable alternative but slightly more formal; ''cumplir'' shifts toward mere performance rather than ongoing fidelity.'
- source_word: ὅσιον
  english_pob_choice: holy
  chosen_spanish: piadoso
  alternatives_spanish:
  - santo
  - devoto
  - íntegro
  lexicon: BDAG ὅσιος 1; LSJ ὅσιος II
  rationale: ὅσιος denotes conformity to divine will through personal piety and moral uprightness of character, distinct from ἅγιος (consecrated/set apart). Applied to Joseph as a human moral exemplar, 'piadoso' (devout/God-fearing in conduct) more precisely captures this ethical-religious sense in Spanish. 'Santo' is the conventional equivalent but often functions in Spanish as a liturgical title (San José) or reserved for ἅγιος; using it here risks blurring the distinction. Alternative noted in footnote [b].
- source_word: μιμούμενοι
  english_pob_choice: imitating
  chosen_spanish: imitando
  alternatives_spanish:
  - siguiendo el ejemplo de
  - tomando como modelo a
  lexicon: BDAG μιμέομαι
  rationale: '''Imitando'' is the direct, natural Spanish calque that preserves the participial force (manner clause: ''keep his commandments by imitating Joseph''). The longer paraphrases ''siguiendo el ejemplo de'' or ''tomando como modelo a'' are semantically equivalent but dilute the concision of the Greek.'
- source_word: Ἰωσήφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Yosef
  lexicon: Standard Spanish onomastic convention
  rationale: '''José'' is the standard Spanish equivalent of the biblical name Ἰωσήφ/יוֹסֵף and is broadly recognizable across all Spanish-speaking Christian communities. ''Yosef'' would be a transliteration preserving the Hebrew phonology but is unnecessarily unfamiliar in a broadly church-readable Spanish text.'
theological_decisions:
- issue: 'Rendering Κύριον τὸν Θεόν: divine name masking versus transparency'
  english_pob_reading: the Lord, the God of heaven and earth
  chosen_spanish_reading: Yahvé, el Dios del cielo y de la tierra
  alternative_spanish_readings:
  - el Señor, el Dios del cielo y de la tierra
  rationale: The phrase Κύριον τὸν Θεὸν τοῦ οὐρανοῦ καὶ τῆς γῆς closely mirrors the deuteronomic call to 'love YHWH your God' (Deut 6:5 LXX) and the cosmological divine epithet common in Second Temple Jewish texts (cf. Gen 24:3 LXX; Tob 7:17). In the Testaments of the Twelve Patriarchs, the pseudepigraphical patriarchs consistently invoke YHWH under the κύριος convention. The POB project standard is to unmask this substitution in the Spanish main text. The English POB retained 'the Lord' as a formally equivalent Greek-surface rendering; the Spanish record advances that by one step, placing 'Yahvé' in the text and explaining the decision here, consistent with transparency goals of the project.
  doctrine_reference: 'POB project terminology default: κύριος alluding to YHWH → ''Yahvé'' in Spanish main text; cf. Deut 6:5 LXX'
- issue: 'Joseph as moral exemplar: ''piadoso'' (ὅσιος) versus ''santo'' (ἅγιος)'
  english_pob_reading: the good and holy man Joseph
  chosen_spanish_reading: el hombre bueno y piadoso José
  alternative_spanish_readings:
  - el hombre bueno y santo José
  rationale: 'Benjamin''s call to imitate Joseph uses ὅσιος, not ἅγιος. The theological distinction matters: Joseph is presented as an ethical exemplar of pious human virtue, not a cultic or consecrated figure. Using ''santo'' in Spanish risks importing a hagiographic sense that ὅσιος does not carry. ''Piadoso'' preserves the ethical-devotional nuance and avoids confusion with the liturgical title (San José). This aligns with the testament''s paraenetic purpose: readers are exhorted to observable moral imitation.'
  doctrine_reference: 'BDAG ὅσιος 1: ''devout, pious, pleasing to God through uprightness''; distinguished from ἅγιος'
translation_notes:
  revision_awareness: La última revisión del registro fuente (gpt-5.4, 2026-04-23) no produjo cambios; el texto griego de Charles 1908 se considera estable. No hay revisiones aplicadas ni variantes textuales pendientes que afecten este borrador español. El apartado cross_check_summary está vacío, por lo que no hay lecturas alternativas de otras ediciones que requieran nota adicional.
  spanish_consistency_notes:
  - 'Yahvé: se aplica el término predeterminado del proyecto para κύριος con función de nombre divino, en lugar de ''Señor''; decisión documentada en nota teológica y en footnote [a].'
  - 'José: forma española estándar para Ἰωσήφ/Joseph; no se usa transliteración hebrea ''Yosef''.'
  - 'Mandamientos (ἐντολαί): término preferido sobre ''preceptos'' o ''leyes'' en contextos deuteronómicos de fidelidad covenant.'
  - 'Piadoso (ὅσιος): se distingue de ''santo'' (ἅγιος) para preservar la fuerza ética del término en contexto de exhortación moral.'
