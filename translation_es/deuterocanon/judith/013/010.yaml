review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador no preserva fielmente el referente ni la sintaxis básica del griego en dos puntos importantes: ἐπάταξεν... αὐτοῦ se refiere a que Judit golpeó el cuello de él, no a que hirió a una mujer; y ἀπεκύλισεν es causativo aquí, por lo que no conviene «rodó su cuerpo» sino «hizo rodar» o equivalente. El resto del contenido sigue bien el sentido fuente: dos golpes, con toda su fuerza, quitar la cabeza, sacar el cuerpo de la cama, y quitar el κωνώπιον de los postes.'
  spanish_quality_summary: 'El español es en general legible, pero contiene un error grave de género/referente («la hirió») y una construcción menos natural/precisa («rodó su cuerpo fuera de la cama»). Además, la nota [a] está mal anclada: comenta «le quitó la cabeza», no «con todas sus fuerzas».'
  glossary_alignment: No hay conflicto con la terminología global del proyecto. Las decisiones «le quitó la cabeza» para ἀφεῖλεν τὴν κεφαλήν y «dosel» con nota alternativa para κωνώπιον son defendibles y alineadas con el audit trail inglés. Se requiere corregir la realización verbal de ἐπάταξεν y ἀπεκύλισεν, y reubicar la nota sobre la decapitación.
  issues:
  - severity: high
    issue: Referente incorrecto en «Y la hirió en el cuello»
    rationale: 'El griego αὐτοῦ / αὐτοῦ / αὐτοῦ se refiere a Holofernes masculino: «golpeó su cuello». «La hirió» cambia el objeto y el género, alterando el sentido narrativo.'
  - severity: medium
    issue: «hirió» no refleja tan bien ἐπάταξεν como «golpeó»
    rationale: πατάσσω denota dar un golpe. «Hirió» enfatiza el resultado de herir y, en este contexto, además contribuye a la confusión con el pronombre femenino. «Golpeó» es más directo y fiel.
  - severity: medium
    issue: «rodó su cuerpo» es poco preciso para ἀπεκύλισεν
    rationale: El verbo significa hacer rodar/rodar fuera. En español transitivo directo con objeto humano suena extraño; «hizo rodar su cuerpo fuera de la cama» o «hizo rodar el cuerpo fuera de la cama» reproduce mejor el sentido causativo.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica la alternativa de «le quitó la cabeza», pero en el borrador aparece después de «con todas sus fuerzas». Debe colocarse junto a «le quitó la cabeza».
