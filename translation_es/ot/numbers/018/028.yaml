review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: instrucción correspondiente (כֵּן), énfasis en ''también ustedes'' (גַם אַתֶּם), la ''contribución'' apartada para Yahvé, el origen ''de todos sus diezmos'' recibidos de los hijos de Israel, y la entrega de una parte a Aarón el sacerdote. Sin embargo, hay dos ajustes necesarios para fidelidad y español natural: el anclaje de nota al pie está mal colocado en ''Yahvé'' en vez de en ''hijos de Israel'', y ''de todos sus diezmos'' suena menos preciso que ''de todos sus diezmos'' con ''de entre'' o ''de todos'' según contexto; además conviene explicitar mejor el valor partitivo de מִמֶּנּוּ con ''de ellos'' o ''de esos diezmos''.'
  spanish_quality_summary: El español es claro y digno, pero 'Así también ustedes' duplica torpemente el valor de כֵּן + גַם אַתֶּם; 'Así, también ustedes' o mejor 'Así también ustedes' es aceptable, aunque una formulación más fluida es 'Así también ustedes presentarán...'. La mayor falla formal es la nota [a] anclada en 'Yahvé', cuando la nota explica 'hijos de Israel'. También 'de ello darán' resulta algo impersonal; 'de ellos darán' o 'de esos diezmos darán' suena más natural y mantiene el partitivo.
  glossary_alignment: Alinea correctamente con el glosario del proyecto en 'Yahvé', 'diezmos', 'hijos de Israel' y 'sacerdote'. 'Contribución' es defendible para תְּרוּמָה y sigue el rastro inglés. No hay conflicto teológico relevante.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en 'Yahvé' pero su contenido explica 'hijos de Israel'.
    rationale: El requisito del proyecto exige que el marcador aparezca exactamente en la palabra o frase pertinente. Tal como está, induce a error y no cumple la disciplina de notas.
  - severity: medium
    issue: '''de ello darán'' suena poco natural en español para מִמֶּנּוּ.'
    rationale: 'El hebreo expresa un partitivo claro: dar una porción de lo recibido. En español bíblico legible, ''de ellos darán'' o ''de esos diezmos darán'' comunica mejor ese sentido.'
  - severity: low
    issue: La sintaxis inicial puede afinarse levemente para sonar más idiomática.
    rationale: Aunque 'Así también ustedes' no es incorrecto, el verso fluye mejor con una puntuación/ordenación más natural en español moderno.
  revised_spanish_text: Así también ustedes presentarán la contribución de Yahvé de todos sus diezmos que reciban de los hijos de Israel[a], y de esos diezmos darán la contribución de Yahvé a Aarón el sacerdote.
  revised_footnotes:
  - marker: a
    text: O 'los israelitas' para 'los hijos de Israel'. La expresión hebrea dice literalmente 'hijos de Israel'.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a 'hijos de Israel', conforme al audit trail y a la disciplina de notas. También se mejora 'de ello' a 'de esos diezmos' para expresar con naturalidad el partitivo de מִמֶּנּוּ sin perder precisión. El resto del verso se conserva porque representa bien el hebreo y el razonamiento léxico del POB.
