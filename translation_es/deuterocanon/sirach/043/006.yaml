    rationale: Aunque reproduce de cerca la personificación del inglés auditado, en español bíblico actual la expresión se percibe torpe. 'el dominio del fin' o 'el gobierno del fin' expresa mejor ממשלת sin sobreinterpretar y mantiene la ambigüedad sobre 'fin/límite/completación'.
