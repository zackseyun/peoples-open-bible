translation:
  language: es
  text: 'y dile: “Ten cuidado y permanece en calma. No temas, y no dejes que tu corazón se debilite a causa de estos dos cabos de tizones humeantes[a], por el ardor de la ira de Rezín, de Aram y del hijo de Remalías.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. “dos colas de estos tizones humeantes”. La imagen presenta a Rezín y al hijo de Remalías como extremos quemados de una vara que todavía echa humo, pero está por apagarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֵר
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Estate atento
  - Guárdate
  lexicon: HALOT
  rationale: El imperativo niphal aquí exhorta a la cautela y la atención. “Ten cuidado” expresa de forma natural y digna esa advertencia sin perder la fuerza exhortativa.
- source_word: וְהַשְׁקֵט
  english_pob_choice: stay calm
  chosen_spanish: quédate tranquilo
  alternatives_spanish:
  - permanece en calma
  - quédate en paz
  - está quieto
  lexicon: HALOT
  rationale: El verbo puede expresar quietud, reposo o calma. En este contexto de amenaza política, “quédate tranquilo” comunica mejor la serenidad interior que pide el texto.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: Es la forma directa y sobria del mandato negativo. Mantiene el registro bíblico sin sonar arcaico en exceso.
- source_word: וּלְבָבְךָ אַל יֵרַךְ
  english_pob_choice: do not let your heart be faint
  chosen_spanish: no dejes que tu corazón se debilite
  alternatives_spanish:
  - no dejes que tu corazón desmaye
  - no dejes que tu corazón pierda valor
  - no dejes que tu corazón sea cobarde
  lexicon: HALOT
  rationale: La imagen hebrea usa la idea de “ser blando/débil” para la pérdida de valor. “Se debilite” conserva esa fuerza literal y sigue siendo claro en español.
- source_word: מִשְּׁנֵי זַנְבוֹת
  english_pob_choice: because of these two ... stubs
  chosen_spanish: a causa de estos dos cabos
  alternatives_spanish:
  - a causa de estas dos colas
  - por estos dos extremos
  lexicon: HALOT
  rationale: זַנְבוֹת es literalmente “colas”, pero en la metáfora de tizones quemados designa los extremos o restos del palo ya consumido. “Cabos” transmite ese valor de remate o resto sin suavizar la burla del original.
- source_word: הָאוּדִים הָעֲשֵׁנִים
  english_pob_choice: smoldering stubs of firebrands
  chosen_spanish: tizones humeantes
  alternatives_spanish:
  - brasas humeantes
  - tizones que humean
  - maderos humeantes
  lexicon: HALOT
  rationale: אוּד denota un palo encendido o tizón, y עֲשֵׁנִים indica que aún humea. “Tizones humeantes” preserva la imagen de algo que parece amenazante pero está casi consumido.
- source_word: בָּחֳרִי אַף
  english_pob_choice: because of the burning anger
  chosen_spanish: por el ardor de la ira
  alternatives_spanish:
  - por la furia de la ira
  - por el calor de la ira
  - en el ardor de la ira
  lexicon: HALOT
  rationale: La construcción idiomática expresa ira ardiente o encendida. “Ardor de la ira” conserva la metáfora del fuego y resulta natural en español.
- source_word: רְצִין וַאֲרָם וּבֶן רְמַלְיָהוּ
  english_pob_choice: Rezin and Aram, and the son of Remaliah
  chosen_spanish: Rezín y de Aram, y del hijo de Remalías
  alternatives_spanish:
  - Rezín y Aram, y el hijo de Remalías
  - Rezín, Aram y el hijo de Remalías
  lexicon: HALOT
  rationale: Se conserva el modo despectivo de nombrar a Peka como “el hijo de Remalías”, en lugar de suplir su nombre. La coordinación en español sigue el relieve del original sin resolver la ironía profética.
theological_decisions:
- issue: Preservar la metáfora de los enemigos como amenazas casi extinguidas
  english_pob_reading: Retained the image 'smoldering stubs of firebrands' in the main text
  chosen_spanish_reading: Mantener “tizones humeantes” y “cabos” en la imagen principal
  alternative_spanish_readings:
  - Reducir la frase a “dos amenazas moribundas”
  - Explicar la imagen dentro del texto como “enemigos casi vencidos”
  rationale: 'La fuerza teológica y retórica del versículo está en la evaluación divina irónica: los enemigos parecen peligrosos, pero están casi apagados. Conservar la metáfora evita resolver la tensión y deja oír la voz profética original.'
  doctrine_reference: Principio de primacía del texto fuente; conservar la imaginería profética y su ironía
translation_notes:
  revision_awareness: El inglés POB revisó en su última pasada 'grow faint' por 'be faint' para ajustarse más de cerca al hebreo. En español se optó por 'se debilite' para reflejar directamente la idea verbal de רך sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el Tetragrámaton cuando aparezca; en este versículo no aplica.
  - Se mantiene ‘Rezín’ con acento ortográfico español y ‘Remalías’ como forma castellanizada del nombre.
  - Se conserva el referente despectivo ‘el hijo de Remalías’ como equivalente funcional de la alusión a Peka.
  - ‘Tizones humeantes’ mantiene el paralelo metafórico con la imagen del fuego y del humo, evitando una paráfrasis que atenúe la burla profética.
