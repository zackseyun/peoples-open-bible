  - severity: low
    issue: «Grandes aguas torrenciales» resulta algo pesado en español.
    rationale: Aunque comunica bien la imagen, la combinación de «grandes» + «torrenciales» puede sonar redundante. Una formulación más sencilla mantiene mejor la naturalidad sin perder la fuerza poética.
  revised_spanish_text: Por tanto, que todo piadoso ore a ti en un tiempo en que puedas ser hallado[a]; ciertamente, cuando vengan las grandes aguas desbordadas[b], no lo alcanzarán.
  revised_footnotes:
