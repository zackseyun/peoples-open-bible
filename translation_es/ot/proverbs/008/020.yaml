translation:
  language: es
  text: Voy por el camino de la rectitud[a], en medio de las sendas de la justicia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el camino de la justicia ... en medio de las sendas del juicio». Los términos hebreos צְדָקָה y מִשְׁפָּט se solapan en parte, pero el texto principal conserva su distinción poética como «rectitud» y «justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אֹרַח
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - en la senda de
  - en la ruta de
  lexicon: HALOT
  rationale: אֹרַח designa un camino o senda, y la preposición בְּ conserva la imagen de estar dentro de ese curso moral. 'Camino' es natural en español bíblico y mantiene la metáfora de conducta, sin volverla meramente abstracta.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'righteousness' para distinguirlo de מִשְׁפָּט, en español 'justicia' comunica bien la fuerza ética y permite una buena pareja poética con 'derecho'. 'Rectitud' era posible, pero suena menos natural aquí y podría debilitar el paralelismo con מִשְׁפָּט.
- source_word: אֲהַלֵּך
  english_pob_choice: I walk
  chosen_spanish: camino
  alternatives_spanish:
  - yo camino
  - ando
  lexicon: HALOT
  rationale: El verbo הלך en este contexto expresa conducta continua. En español, la primera persona verbal implícita en 'camino' mantiene el paralelismo poético y la voz de la Sabiduría sin añadir elementos innecesarios.
- source_word: בְּ/תוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - entre
  lexicon: HALOT
  rationale: תּוֹךְ significa medio, interior o centro. 'En medio de' reproduce con claridad la imagen espacial y conserva el tono poético del hebreo.
- source_word: נְתִיבוֹת
  english_pob_choice: the paths of
  chosen_spanish: las sendas de
  alternatives_spanish:
  - los caminos de
  - las veredas de
  lexicon: HALOT
  rationale: נְתִיבוֹת es el plural de 'sendas' o 'caminos'. 'Sendas' mantiene el registro poético y evita repetir 'camino' en ambas mitades del versículo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט abarca justicia, juicio y derecho. Aquí, para conservar la distinción poética con צְדָקָה y reflejar el matiz legal-normativo, 'derecho' funciona bien en español y cubre la idea de orden justo/judicial. En una nota se preserva la alternativa 'justicia'.
theological_decisions:
- issue: Distinción poética entre צְדָקָה y מִשְׁפָּט
  english_pob_reading: The Hebrew terms overlap semantically, but the main text preserves their poetic distinction as 'righteousness' and 'justice.'
  chosen_spanish_reading: El texto principal conserva una distinción poética entre 'justicia' y 'derecho'.
  alternative_spanish_readings:
  - '''justicia'' y ''justicia'''
  - '''rectitud'' y ''justicia'''
  rationale: El hebreo usa dos términos cercanos pero no idénticos. En español, conservar dos voces distintas evita borrar el paralelismo. 'Justicia' y 'derecho' permiten reflejar tanto la dimensión ética como la jurídico-normativa sin forzar una equivalencia total.
  doctrine_reference: Sabiduría poética; ética del pacto; justicia divina
- issue: Voz hablante de Sabiduría en primera persona
  english_pob_reading: I walk ...
  chosen_spanish_reading: camino ...
  alternative_spanish_readings:
  - yo camino
  - ando
  rationale: El hebreo presenta una primera persona verbal continua. En español, la forma verbal simple mantiene la voz sin necesidad de pronombre explícito, preservando la fluidez poética.
  doctrine_reference: Personificación sapiencial de la Sabiduría
- issue: Traducción de מִשְׁפָּט como 'derecho'
  english_pob_reading: justice
  chosen_spanish_reading: derecho
  alternative_spanish_readings:
  - justicia
  - juicio
  rationale: '''Derecho'' comunica el campo semántico jurídico de מִשְׁפָּט y ayuda a diferenciarlo de צְדָקָה en español. La alternativa ''justicia'' queda reconocida en nota para no perder la lectura principal del POB en inglés.'
  doctrine_reference: Lenguaje jurídico-bíblico; justicia normativa
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión más reciente; no se registraron cambios pendientes en el audit trail inglés. La presente redacción española sigue ese estado estable y solo ajusta la equivalencia para sonar natural en español manteniendo la distinción poética del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'camino/sendas' para reflejar la metáfora de conducta.
  - Se evita 'SEÑOR' porque el versículo no contiene el Nombre divino ni una cita directa del Tetragrámaton.
  - '''Justicia'' y ''derecho'' se usan como pareja semántica diferenciada para conservar el paralelismo del hebreo.'
  - El ritmo breve de dos colonias se preserva sin expandir el contenido más allá del texto fuente.
