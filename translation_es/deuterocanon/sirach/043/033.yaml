translation:
  language: es
  text: Yahvé hizo todo[a], y a los que lo temen les dio sabiduría[b]; la alabanza de los padres antiguos es eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testigo hebreo añade al final «la alabanza de los padres antiguos es eterna», una frase que probablemente fue arrastrada de la sección siguiente; el paralelo griego termina con «les dio sabiduría».
    reason: textual_variant
  - marker: b
    text: O «a los piadosos», siguiendo el paralelo griego; el hebreo dice más literalmente «a los que lo temen».
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα / את הכל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo cuanto existe
  lexicon: HALOT; BDAG
  rationale: El griego y el hebreo expresan un alcance total. En español, «todo» es natural y suficientemente amplio, sin perder la fuerza comprehensiva del original.
- source_word: ὁ κύριος / ה'
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: HALOT; Contested terms table
  rationale: El paralelo griego usa κύριος y el hebreo emplea la abreviatura reverencial del nombre divino. En español, «El Señor» funciona como título legible y reverente, manteniendo la identificación con el Dios de Israel.
- source_word: τοῖς εὐσεβέσιν / ליראיו
  english_pob_choice: to those who fear him
  chosen_spanish: a los que lo temen
  alternatives_spanish:
  - a los piadosos
  - a los reverentes
  lexicon: HALOT; BDAG
  rationale: El hebreo es literalmente «a sus temerosos»; el griego interpreta con εὐσεβέσιν, «piadosos». La forma española conserva la relación de temor/reverencia hacia Dios y permite la lectura más directa del hebreo.
- source_word: ἔδωκεν / נתן
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les concedió
  - les otorgó
  lexicon: HALOT; BDAG
  rationale: El aoristo del griego y el perfecto narrativo hebreo se vierten bien con pasado simple en español. «Les dio» es claro y fiel sin añadir matices no explícitos.
- source_word: σοφίαν / חכמה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - habilidad
  lexicon: HALOT; BDAG
  rationale: En Ben Sira, la sabiduría es un término teológico central; el griego confirma σοφία. «Sabiduría» preserva el valor conceptual y religioso del término.
- source_word: שבח אבות עולם
  english_pob_choice: the praise of the fathers is everlasting
  chosen_spanish: la alabanza de los padres de antaño es eterna
  alternatives_spanish:
  - la alabanza de los padres de los tiempos antiguos es eterna
  - la alabanza de los antepasados es perpetua
  lexicon: HALOT
  rationale: La frase hebrea final se incorpora siguiendo la revisión más reciente y la lectura de la tradición hebrea, aun cuando no aparece en el paralelo griego. «Padres de antaño» comunica el valor temporal de אבות עולם con español natural y digno.
theological_decisions:
- issue: Título divino en Ben Sira y paralelo griego κύριος
  english_pob_reading: The Lord
  chosen_spanish_reading: El Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto prefiere Yahvé para el Tetragrámaton, aquí el contexto de Sirácida y el paralelo griego κύριος favorecen un título reverente en español. «El Señor» mantiene la continuidad con la fuente y evita imponer una forma donde el texto transmitido ya funciona como título.
  doctrine_reference: 'DOCTRINE.md: translate titles; contested terms table'
- issue: Inclusión de שבח אבות עולם en la línea principal
  english_pob_reading: the praise of the fathers is everlasting
  chosen_spanish_reading: la alabanza de los padres de antaño es eterna
  alternative_spanish_readings:
  - omitirla como posible arrastre textual
  - tratarla solo en nota textual
  rationale: El expediente de revisión más reciente añadió esta frase, así que se refleja en la línea principal. La decisión conserva la tensión textual entre el hebreo y el griego sin resolverla por supresión.
  doctrine_reference: 'DOCTRINE.md: preserve textual tension; document revisions'
translation_notes:
  revision_awareness: 'Se revisó el expediente de auditoría: la última pasaba de exclusión a inclusión de la frase final hebrea, por lo que la línea principal la incorpora y la nota mantiene visible la variante textual con el griego.'
  spanish_consistency_notes:
  - Se mantuvo un registro uniforme de «El Señor» como título divino en esta unidad.
  - «Sabiduría» se usó de manera consistente para חכמה / σοφία.
  - La frase final se tradujo con un español natural y no se suavizó la tensión entre el hebreo y el griego.
