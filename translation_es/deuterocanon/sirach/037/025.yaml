translation:
  language: es
  text: Hay un hombre sabio que es sabio para muchos[a], pero para sí mismo no tiene valor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega en este punto presenta un dicho distinto: «La vida de un hombre está en el número de días, pero los días de Israel son innumerables». Aquí el hebreo y el griego no concuerdan estrechamente.'
    reason: textual_variant
  - marker: b
    text: El hebreo גוֹאָל es difícil. Puede dar la idea de estar manchado, contaminado o de no valer para uno mismo; «no tiene valor» refleja el contraste del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial se expresa de manera natural en español con «Hay», conservando el tono proverbial y general del hebreo.
- source_word: חָכָם
  english_pob_choice: wise man
  chosen_spanish: hombre sabio
  alternatives_spanish:
  - persona sabia
  - sabio
  lexicon: HALOT
  rationale: El hebreo presenta un masculino singular representativo; «hombre sabio» mantiene esa forma sin volverla forzadamente neutral.
- source_word: לְרַבִּים
  english_pob_choice: for many
  chosen_spanish: para muchos
  alternatives_spanish:
  - a muchos
  - entre muchos
  lexicon: HALOT
  rationale: 'El valor de ל aquí es benefactivo o de referencia: su sabiduría repercute en otros. «Para muchos» suena natural y preserva la amplitud del beneficio.'
- source_word: נֶחְכָּם
  english_pob_choice: is wise
  chosen_spanish: es sabio
  alternatives_spanish:
  - se muestra sabio
  - llega a ser sabio
  - actúa sabiamente
  lexicon: HALOT
  rationale: Aunque la forma verbal puede sugerir un matiz de hacerse o mostrarse sabio, la revisión inglesa decidió reflejar mejor el hebreo con una afirmación de estado. En español, «es sabio» comunica ese rasgo proverbial sin añadir proceso.
- source_word: וּלְנַפְשׁוֹ
  english_pob_choice: but for himself
  chosen_spanish: pero para sí mismo
  alternatives_spanish:
  - pero para su propia vida
  - pero para su persona
  lexicon: HALOT
  rationale: נפש aquí funciona de manera reflexiva y práctica. «Para sí mismo» reproduce bien el contraste sin introducir una antropología más pesada que la del dicho.
- source_word: גוֹאָל
  english_pob_choice: worthless
  chosen_spanish: inútil
  alternatives_spanish:
  - sin valor
  - impuro
  - contaminado
  - detestable
  lexicon: HALOT
  rationale: El término es difícil y el contexto proverbial pide una evaluación negativa. «Inútil» comunica la idea de no servir o no valer para sí mismo en español natural. Se evita fijar una connotación ritual que el contexto no obliga a adoptar.
theological_decisions:
- issue: Tensión textual hebreo/griego en la sentencia
  english_pob_reading: The Hebrew and Greek here do not match closely; the Hebrew proverb is translated, with the Greek noted as a different saying.
  chosen_spanish_reading: Se traduce el proverbio hebreo y se mantiene una nota sobre la tradición griega distinta.
  alternative_spanish_readings:
  - 'Seguir la sentencia griega: «La vida del hombre está en el número de días, y los días de Israel son innumerables».'
  rationale: La base principal del registro es el hebreo de Kahana, confirmado como de alta confianza. La tradición griega presenta otra formulación y no debe mezclarse con la hebrea en el texto principal.
  doctrine_reference: Principio de prioridad del texto fuente y respeto por variantes textuales documentadas
translation_notes:
  revision_awareness: La versión inglesa revisada reemplazó «becomes wise for many» por «is wise for many» para acercarse mejor al hebreo. La draft española sigue esa decisión y mantiene el contraste proverbial con una equivalencia natural.
  spanish_consistency_notes:
  - Se mantuvo la estructura proverbial breve y contrastiva.
  - Se evitó «SEÑOR» u այլ mascaramientos; no aplica aquí por ausencia del tetragrámaton.
  - Se conservó el valor singular representativo de חָכָם con «hombre sabio».
  - La nota textual se limita a la divergencia hebreo-griego documentada en el audit trail.
