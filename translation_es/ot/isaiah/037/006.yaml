  - marker: b
    text: 'O: «me han ultrajado», «me han injuriado» o «me han desafiado». El verbo hebreo puede implicar habla abusiva o despreciativa contra Dios.'
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores de estilo y léxico para mejorar la naturalidad del español y representar mejor el contexto cortesano del hebreo, sin alterar el sentido ni las decisiones teológicas principales. Se mantuvieron Yahvé, el mandato singular a Ezequías y la gravedad de «blasfemado».
