    rationale: El hebreo presenta a la muralla como llegando a su estado de terminación. En español, «terminó» con «la muralla» puede sonar más como verbo intransitivo simple; «quedó terminada» o «se terminó» conserva mejor el sentido de obra completada.
  revised_spanish_text: Así que la muralla quedó terminada el día veinticinco de Elul[a], en cincuenta y dos días.
