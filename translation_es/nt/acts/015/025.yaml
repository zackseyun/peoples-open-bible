translation:
  language: es
  text: Nos pareció bien[a], habiendo llegado a un mismo sentir, elegir hombres[b] y enviarlos a ustedes con nuestros amados Bernabé y Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siendo de un mismo sentir» o «con un mismo acuerdo».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, varones delegados; el griego dice específicamente «hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξεν
  english_pob_choice: it seemed good
  chosen_spanish: Nos pareció bien
  alternatives_spanish:
  - Nos pareció bueno
  - Se nos hizo bien
  - Nos pareció correcto
  lexicon: BDAG
  rationale: La fórmula deliberativa de δοκέω en Actos 15 expresa una aprobación o juicio corporativo. «Nos pareció bien» conserva ese tono formal sin convertirlo en una orden ni en una afirmación moral más fuerte que el griego.
- source_word: γενομένοις ὁμοθυμαδόν
  english_pob_choice: having come to one accord
  chosen_spanish: habiendo llegado a un mismo sentir
  alternatives_spanish:
  - estando unánimes
  - habiendo llegado a un acuerdo unánime
  - de común acuerdo
  lexicon: BDAG
  rationale: La combinación del participio con el adverbio indica que el grupo arribó a una decisión unificada. «Habiendo llegado a un mismo sentir» preserva el matiz de proceso y evita una expresión demasiado rígida o meramente formularia.
- source_word: ἐκλεξαμένοις
  english_pob_choice: to choose
  chosen_spanish: elegir
  alternatives_spanish:
  - seleccionar
  - escoger
  - haber elegido
  lexicon: BDAG
  rationale: Aunque formalmente es participio, en español conviene integrarlo en la secuencia infinitiva con «enviar». «Elegir» reproduce el sentido de escoger a los delegados sin cargar la frase con un participio artificial.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  - delegados
  lexicon: BDAG
  rationale: ἀνήρ aquí designa varones adultos y no un término genérico. «Hombres» mantiene la precisión léxica y el contraste con una paráfrasis neutralizante como «delegados» o «personas».
- source_word: πέμψαι
  english_pob_choice: send them
  chosen_spanish: enviarlos
  alternatives_spanish:
  - mandarlos
  - despacharlos
  - enviar a los elegidos
  lexicon: BDAG
  rationale: El español permite omitir el objeto explícito porque queda claro por el contexto inmediato. «Enviarlos» mantiene la naturalidad sin añadir contenido ajeno al griego.
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - acompañados de
  lexicon: BDAG
  rationale: Indica mera compañía. «Con» es la opción más natural y fiel en español.
- source_word: ἀγαπητοῖς ἡμῶν
  english_pob_choice: our beloved
  chosen_spanish: nuestros amados
  alternatives_spanish:
  - nuestros queridos
  - los amados de nosotros
  - nuestros muy amados
  lexicon: BDAG
  rationale: ἀγαπητός expresa afecto relacional. «Nuestros amados» conserva el tono cálido y digno del original, sin volverlo excesivamente devocional.
- source_word: Βαρναβᾷ καὶ Παύλῳ
  english_pob_choice: Barnabas and Paul
  chosen_spanish: Bernabé y Pablo
  alternatives_spanish:
  - Barnabás y Pablo
  lexicon: standard transliteration
  rationale: Se usa la transliteración hispana estándar de los nombres propios. «Bernabé» es la forma establecida en español bíblico para Βαρναβᾶς.
theological_decisions:
- issue: Tono deliberativo y corporativo del decreto apostólico
  english_pob_reading: The verse is rendered as a communal judgment ('it seemed good to us') rather than a stronger authoritative formula.
  chosen_spanish_reading: 'La frase se vierte como juicio colectivo: «Nos pareció bien».'
  alternative_spanish_readings:
  - Decidimos
  - Fue nuestra decisión
  - Nos pareció oportuno
  rationale: El griego δοκέω comunica aprobación conjunta, no una fórmula de mando. La traducción mantiene el carácter comunitario de la resolución sin intensificarla indebidamente.
  doctrine_reference: 'Translation philosophy: preserve the source''s communicative force without importing extra authority claims.'
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia; no se requirieron cambios de revisión adicionales. La redacción española sigue la misma línea de equivalencia óptima que el inglés, preservando la secuencia deliberativa y el énfasis en los delegados varones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se conserva el registro eclesial sobrio y moderno, evitando arcaísmos innecesarios.
  - «Bernabé» sigue la forma española asentada; «Pablo» permanece sin cambio.
