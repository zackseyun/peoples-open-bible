id: 3MA.2.26
reference: 3 Maccabees 2:26
source:
  edition: lxx-swete-1909
  text: οὐ μόνον ταῖς ἀναισχύστοις ἀσελγείαις ἐδηκέσθη, ἀλλὰ καὶ ἐπὶ τοσοῦτον θράσους προῆλθεν, ὥστε δυσφημίας ἐν τοῖς τόποις συνίστασθαι, καὶ πολλοὺς τῶν φίλων ἐντείνοντας εἰς τὴν τοῦ βασιλέως πρόθεσιν καὶ αὐτοὺς ἕπεσθαι τῇ ἐκείνου θελήσει.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: agree
translation:
  text: He was not only inflamed with shameless debaucheries[a], but also advanced to such a degree of audacity that slanders were being stirred up in the places, and many of his friends, straining toward the king’s purpose[b], were themselves following his will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil reports' or 'defamations' for 'slanders.' The Greek term can denote abusive or defamatory speech more broadly.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the places' may mean 'throughout the districts' or 'in the localities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδηκέσθη
  chosen: was inflamed
  alternatives:
  - was bitten
  - was consumed
  - was stung
  lexicon: LSJ
  rationale: The verb is literally related to being bitten or gnawed, but in this moral context it conveys being inwardly driven or tormented by vice. 'Was inflamed' gives idiomatic English while preserving the force of compulsive passion better than a wooden 'was bitten.'
- source_word: ἀναισχύστοις
  chosen: shameless
  alternatives:
  - impudent
  - brazen
  lexicon: LSJ
  rationale: The adjective denotes lack of shame. 'Shameless' is the most direct and natural modern equivalent.
- source_word: ἀσελγείαις
  chosen: debaucheries
  alternatives:
  - licentious acts
  - sensual excesses
  - wanton acts
  lexicon: LSJ
  rationale: The term refers to unrestrained sensual or morally outrageous conduct. 'Debaucheries' preserves the plural and the strong moral sense without becoming overly technical.
- source_word: ἐπὶ τοσοῦτον θράσους προῆλθεν
  chosen: advanced to such a degree of audacity
  alternatives:
  - went so far in boldness
  - proceeded to such insolence
  lexicon: LSJ
  rationale: The phrase marks escalation into extreme reckless insolence. 'Advanced to such a degree of audacity' keeps the movement metaphor and the intensifying construction.
- source_word: δυσφημίας
  chosen: slanders
  alternatives:
  - evil reports
  - defamations
  - blasphemies
  lexicon: LSJ
  rationale: The noun can denote abusive or defamatory speech. In this context of hostile agitation against the Jews, 'slanders' best fits the social and political sense. 'Blasphemies' would over-specify a religious target not explicit here.
- source_word: ἐν τοῖς τόποις
  chosen: in the places
  alternatives:
  - throughout the districts
  - in the localities
  - in the regions
  lexicon: LSJ
  rationale: The phrase is somewhat general. A more idiomatic expansion such as 'throughout the districts' is possible, but 'in the places' stays closer to the Greek while leaving the exact scope open.
- source_word: συνίστασθαι
  chosen: were being stirred up
  alternatives:
  - were being organized
  - were being set on foot
  - were being established
  lexicon: LSJ
  rationale: In context the infinitive describes defamatory activity being brought together or set in motion. 'Were being stirred up' captures the sense of active instigation better than the more neutral 'established.'
- source_word: ἐντείνοντας
  chosen: straining toward
  alternatives:
  - pressing toward
  - urging on toward
  - directing themselves toward
  lexicon: LSJ
  rationale: The participle suggests exertion or stretching in the direction of the king's intention. 'Straining toward' preserves that image and the sense of eager alignment.
- source_word: πρόθεσιν
  chosen: purpose
  alternatives:
  - plan
  - intention
  lexicon: LSJ
  rationale: The noun denotes a set intention or resolve. 'Purpose' is concise and natural here.
- source_word: θελήσει
  chosen: will
  alternatives:
  - wish
  - desire
  lexicon: LSJ
  rationale: The term denotes what he wants done. 'Will' is the standard rendering and fits the elevated tone.
