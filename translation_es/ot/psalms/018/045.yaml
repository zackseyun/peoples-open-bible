translation:
  language: es
  text: Al oír[a][b], me obedecen; los extranjeros me fingen obediencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En cuanto oyen, me obedecen».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al oír del oído»; el hebreo conserva una imagen concreta de respuesta al oír.
    reason: source_note
  - marker: c
    text: 'O: «me rinden obediencia fingida» o «se someten a mí de manera fingida». Literalmente, «hijos de extranjería / de tierra extraña».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֵׁמַע אֹזֶן
  english_pob_choice: At the hearing of the ear
  chosen_spanish: Al oírlo con el oído
  alternatives_spanish:
  - En cuanto lo oyen
  - Al oír
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y literalmente significa algo como 'para/at el oír del oído'. En español, 'Al oírlo con el oído' conserva la imagen del oír como punto de reacción, aunque suena un poco marcado; por eso se ofrecen alternativas más naturales que captan el sentido de respuesta inmediata sin perder del todo la estructura del hebreo.
- source_word: יִשָּׁמְעוּ לִי
  english_pob_choice: they obey me
  chosen_spanish: me obedecen
  alternatives_spanish:
  - me escuchan
  - me hacen caso
  lexicon: HALOT
  rationale: שׁמע con ל puede significar 'escuchar, obedecer'. En este contexto de victoria y dominio, 'obedecen' transmite mejor la fuerza de sumisión efectiva que solo 'escuchan'. La opción mantiene el contraste con la segunda cola, donde la sumisión es fingida.
- source_word: בְּנֵי נֵכָר
  english_pob_choice: foreigners
  chosen_spanish: los hijos de tierra extraña
  alternatives_spanish:
  - los extranjeros
  - los hijos de una tierra extranjera
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de extranjería / tierra extraña'. Como el texto poético conserva esa metáfora, 'hijos de tierra extraña' mantiene la fuerza figurada mejor que simplificar a 'extranjeros', aunque la alternativa más natural se conserva por claridad.
- source_word: יְכַחֲשׁוּ לִי
  english_pob_choice: feign obedience to me
  chosen_spanish: me fingen obediencia
  alternatives_spanish:
  - me someten fingidamente
  - me dan obediencia fingida
  - me mienten
  lexicon: HALOT
  rationale: כחש en este tipo de contexto puede expresar falsedad, negación o sumisión insincera. 'Me fingen obediencia' refleja bien la idea de una obediencia aparente, sin reducirla a mera mentira verbal. 'Me mienten' sería demasiado general y menos preciso en la imagen de sometimiento externo.
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta cambiar el sentido base: se mantiene la línea de interpretación del texto hebreo y del audit trail inglés, preservando la tensión entre obediencia real y sumisión fingida.'
  spanish_consistency_notes:
  - Se usa 'obedecen' para שׁמע con ל, siguiendo el valor contextual de respuesta obediente.
  - Se conserva la metáfora 'hijos de tierra extraña' para reflejar בְּנֵי נֵכָר.
  - No se emplea 'SEÑOR' ni 'Cristo', porque el versículo no contiene el tetragrámaton ni lenguaje mesiánico.
  - La puntuación y el orden intentan mantener el paralelismo poético sin sonar mecánicos en español.
