translation:
  language: es
  text: Y él hizo mi boca como una espada afilada; en la sombra de su mano me escondió. Y me hizo una flecha pulida[a]; en su aljaba me ocultó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una flecha escogida', 'una flecha aguzada' o 'una flecha purificada'. El adjetivo hebreo también puede transmitir la idea de algo refinado o cuidadosamente preparado para su uso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: he made
  chosen_spanish: puso
  alternatives_spanish:
  - hizo
  - colocó
  lexicon: HALOT
  rationale: El hebreo שׂוּם aquí introduce una predicación metafórica ('mi boca como...'). En español, 'puso' conserva la idea de disponer/poner en un estado sin forzar una explicación añadida; 'hizo' también sería posible, pero 'puso' mantiene mejor la imagen concreta.
- source_word: פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mis palabras
  - mi habla
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal de la boca para la palabra hablada, tal como en el texto fuente, evitando abstraerla a 'palabras' o 'habla'.
- source_word: כְּחֶרֶב חַדָּה
  english_pob_choice: like a sharp sword
  chosen_spanish: como espada afilada
  alternatives_spanish:
  - como espada aguda
  - como espada cortante
  lexicon: HALOT
  rationale: '''Afilada'' comunica naturalmente la cualidad de חַדָּה y mantiene la imagen de un arma preparada para cortar. ''Espada aguda'' es posible, pero suena menos idiomática en español moderno.'
- source_word: בְּצֵל יָדוֹ
  english_pob_choice: in the shadow of his hand
  chosen_spanish: en la sombra de su mano
  alternatives_spanish:
  - bajo la sombra de su mano
  - a la sombra de su mano
  lexicon: HALOT
  rationale: Se conserva la preposición e imagen de 'sombra' para reproducir el matiz de ocultamiento/protección. 'En la sombra de su mano' sigue de cerca el hebreo y es comprensible en español.
- source_word: הֶחְבִּיאָנִי
  english_pob_choice: he hid me
  chosen_spanish: me escondió
  alternatives_spanish:
  - me ocultó
  - me escondió y protegió
  lexicon: HALOT
  rationale: '''Escondió'' es un equivalente directo y natural. En español transmite bien el gesto de ocultar sin añadir la idea de protección, que queda implícita en el contexto.'
- source_word: וַיְשִׂימֵנִי
  english_pob_choice: he made me a polished arrow
  chosen_spanish: me puso como flecha pulida
  alternatives_spanish:
  - me hizo flecha pulida
  - me puso por flecha pulida
  lexicon: HALOT
  rationale: La construcción española 'me puso como...' refleja la predicación del hebreo sin añadir 'en' ni 'a' de más. 'Me hizo flecha pulida' es posible, pero 'puso' preserva mejor el paralelismo con el primer cola.
- source_word: לְחֵץ בָּרוּר
  english_pob_choice: a polished arrow
  chosen_spanish: flecha pulida
  alternatives_spanish:
  - flecha escogida
  - flecha purificada
  - flecha bruñida
  lexicon: HALOT
  rationale: בָּרוּר puede abarcar la idea de refinado, escogido o preparado. 'Pulida' funciona bien para una flecha cuidadosamente terminada y conserva el sentido de algo preparado con esmero, sin perder la ambigüedad lexical documentada.
- source_word: בְּאַשְׁפָּתוֹ
  english_pob_choice: in his quiver
  chosen_spanish: en su aljaba
  alternatives_spanish:
  - en su carcaj
  - en su arca de flechas
  lexicon: HALOT
  rationale: '''Aljaba'' es el término bíblico y comprensible en español para el recipiente de flechas. Se prefiere a ''carcaj'' por su registro más bíblico y amplio.'
- source_word: הִסְתִּירָנִי
  english_pob_choice: he concealed me
  chosen_spanish: me ocultó
  alternatives_spanish:
  - me escondió
  lexicon: HALOT
  rationale: '''Ocultó'' varía el verbo respecto del primer cola y conserva el sentido de esconder/concebir del hebreo. Mantiene la alternancia estilística del inglés POB entre ''hid'' y ''concealed''.'
theological_decisions:
- issue: Imágenes bélicas aplicadas al siervo
  english_pob_reading: Retain the concrete metaphors 'sharp sword' and 'polished arrow' without explicating them as preaching, prophecy, or messianic mission in the main text.
  chosen_spanish_reading: Conservar las metáforas concretas de espada y flecha sin explicarlas en el cuerpo principal.
  alternative_spanish_readings:
  - Explicitar que se trata de la palabra poderosa del siervo
  - Introducir una lectura mesiánica en la redacción
  rationale: El verso presenta imágenes poéticas intensas, pero no desarrolla por sí mismo su referencia teológica completa. La traducción debe respetar esa apertura y no añadir una interpretación doctrinal que el texto no formula explícitamente.
  doctrine_reference: Principios POB de no sobreexplicar la figura del siervo ni cerrar la ambigüedad poética del pasaje
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: ''made me a polished arrow'' se reflejó con una construcción española directa (''me puso como flecha pulida'') sin añadir fuerza paraprástica. También se mantuvo la variación estilística entre ''escondió'' y ''ocultó'' para distinguir los dos verbos hebreos de ocultación sin perder la cohesión poética.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera de este versículo porque el hebreo aquí no contiene el nombre divino.
  - Se preservó la metáfora concreta de boca/espada y flecha/aljaba, evitando abstraerla a 'palabras' o 'ministerio'.
  - '''Pulida'' se eligió como equivalente español de בָּרוּר, dejando abierta la gama semántica de refinado/escogido/preparado documentada por el inglés POB.'
  - '''Aljaba'' se usó como término bíblico natural en español para אַשְׁפָּה.'
