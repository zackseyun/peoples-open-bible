translation:
  language: es
  text: una pieza de oro[a], como es costumbre dar a los parientes de los reyes; y le dio Accarón[b] y todos sus territorios como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conserva solo el adjetivo femenino «χρυσῆν»; el sustantivo está implícito por el contexto anterior. La versión española completa la elipsis con una expresión abierta para no fijar indebidamente el objeto.
    reason: lexical_alternative
  - marker: b
    text: Accarón es la forma griega del nombre de lugar más conocido en español como «Ecrón».
    reason: alternative_reading
lexical_decisions:
- source_word: χρυσῆν
  english_pob_choice: gold
  chosen_spanish: pieza de oro
  alternatives_spanish:
  - oro
  - objeto de oro
  - aderezo de oro
  lexicon: LSJ
  rationale: El griego conserva solo el adjetivo femenino χρυσῆν, con un sustantivo implícito por el contexto previo. En español hace falta completar el sintagma; «pieza de oro» mantiene la materialidad sin imponer con demasiada precisión un objeto inexistente en este verso aislado.
- source_word: '[implied object from context]'
  english_pob_choice: buckle
  chosen_spanish: pieza
  alternatives_spanish:
  - broche
  - aderezo
  - hebilla
  - ornamento
  lexicon: contexto narrativo
  rationale: El texto fuente no nombra el objeto; la POB inglesa lo suplió como interpretación auditable. En español prefiero no fijar «hebilla» si el contexto inmediato no obliga, y uso un sustantivo más abierto para respetar la elipsis del griego.
- source_word: ἔθος
  english_pob_choice: customary
  chosen_spanish: es costumbre
  alternatives_spanish:
  - es lo habitual
  - es la costumbre
  - es el uso
  lexicon: LSJ
  rationale: La locución ὡς ἔθος ἐστὶν pide una construcción idiomática en español. «Es costumbre» comunica bien el valor adverbial de la frase sin perder la nota de práctica estable.
- source_word: συγγενεῦσιν
  english_pob_choice: kinsmen
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - deudos
  - parientes cercanos
  lexicon: LSJ
  rationale: El término designa a los miembros de la parentela. En español «parientes» es natural y neutral; no hace falta marcar el género masculino como en inglés, porque el plural genérico funciona con claridad.
- source_word: τῶν βασιλέων
  english_pob_choice: of kings
  chosen_spanish: de los reyes
  alternatives_spanish:
  - de los monarcas
  - de la realeza
  lexicon: LSJ
  rationale: Traducción directa y transparente del genitivo plural. Se mantiene la referencia a la costumbre cortesana de regalos a la parentela real.
- source_word: Ἀκκαρὼν
  english_pob_choice: Accaron
  chosen_spanish: Accarón
  alternatives_spanish:
  - Ekron
  - Accaron
  lexicon: LSJ
  rationale: Se conserva la forma griega del topónimo en transliteración española. La acentuación ayuda a la lectura en español; la forma tradicional «Ekron» puede consignarse como alternativa, pero no sustituye al nombre transmitido por la fuente griega.
- source_word: ὅρια
  english_pob_choice: territories
  chosen_spanish: territorios
  alternatives_spanish:
  - límites
  - fronteras
  - confines
  lexicon: LSJ
  rationale: Aquí ὅρια no se reduce a líneas fronterizas, sino al conjunto de tierras dentro de esos límites. «Territorios» reproduce bien el alcance administrativo y territorial del don.
- source_word: εἰς κληρονομίαν
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - en herencia
  - como posesión hereditaria
  - para herencia
  lexicon: LSJ
  rationale: La expresión indica la entrega con valor de posesión hereditaria. «Como herencia» es una formulación natural y fiel al sentido jurídico del pasaje.
translation_notes:
  revision_awareness: El texto griego y el audio de revisión coinciden en la lectura general. La única tensión auditable es la elipsis de χρυσῆν, que obliga a suplir un sustantivo en la lengua meta. También se conserva el topónimo en forma griega transliterada, como en la POB inglesa.
  spanish_consistency_notes:
  - Se usa «Accarón» para mantener la forma griega transmitida en el texto base, en vez de normalizar a «Ekron».
  - Se evita «SEÑOR» o terminología litúrgica no pertinente, porque el pasaje no contiene el tetragrámaton ni κύριος con sentido divino.
  - «Parientes» y «territorios» siguen el tono administrativo/cortesano del pasaje sin sobreinterpretarlo.
