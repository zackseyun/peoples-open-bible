  handling: context_only
  rationale: Thomas’s imagery and sequence (stripping, trampling garments, seeing
    the Son of the Living One) are distinctive; child motif noted only as background
    without harmonization to Synoptics.
revision_risk_note: 'Key review points: (1) The sequence ‘strip naked without being
  ashamed’—ensure ⲕⲱⲕ + ⲁϩⲏⲩ + neg. ϣⲓⲡⲉ is best captured by ‘strip naked’ rather
  than ‘take off your clothes’ (the latter follows in the next clause). (2) The comparative
  ‘like the little children’ arises from ⲛⲑⲉ/ⲛⲡϩⲉ plus the double diminutive; confirm
  that no additional ‘do’ needs to be supplied for ⲛⲡⲉⲧⲛⲟⲩⲉⲣⲏⲧⲉ beyond the explicit
  ‘trample’ (ϫⲟⲡϫⲡ). (3) ‘Under your feet’: possessive ‘your’ is supplied by context;
  Coptic uses ⲡⲉⲧⲛ earlier; verify no ambiguity. (4) ‘Son of the Living One’ retained
  rather than ‘living God’; confirm this matches project doctrine to preserve Thomas’s
  titles.'
