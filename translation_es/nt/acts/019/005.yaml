review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: ἀκούσαντες se expresa temporalmente con «al oír esto», ἐβαπτίσθησαν conserva la pasiva con «fueron bautizados», y «del Señor Jesús» representa adecuadamente τοῦ κυρίου Ἰησοῦ. La decisión de usar «en el nombre» sigue la revisión inglesa auditada y es aceptable en español por naturalidad idiomática, aunque el trasfondo de εἰς queda explicado en las decisiones léxicas.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno. Sin embargo, la nota al pie está mal anclada y no aporta una verdadera alternativa: el texto principal ya dice exactamente «en el nombre del Señor Jesús», y la nota repite esa misma redacción. Eso genera una incoherencia editorial. Conviene quitar la nota y dejar el versículo limpio.'
  glossary_alignment: 'La terminología clave está alineada con las pautas del proyecto: «Señor» para κύριος en contexto cristológico, «Jesús» para Ἰησοῦς, y una fórmula bautismal idiomática en español. No hay conflicto con los glosarios por defecto.'
  issues:
  - severity: medium
    issue: La nota al pie repite exactamente la misma lectura que el texto principal.
    rationale: El texto español dice «en el nombre del Señor Jesús», y la nota ofrece «O, más tradicionalmente, “en el nombre del Señor Jesús”». No hay variante real ni información adicional; la nota resulta editorialmente errónea.
  - severity: low
    issue: El marcador [a] está colocado sobre «esto» aunque la nota no comenta ese segmento.
    rationale: La nota trata la fórmula bautismal, no el complemento de ἀκούσαντες. Si hubiera nota, debería anclarse en «en el nombre...». Como la nota es redundante, lo mejor es eliminarla por completo.
  revised_spanish_text: Y al oír esto, fueron bautizados en el nombre del Señor Jesús.
  revised_footnotes: []
  revision_rationale: Se elimina la nota redundante y su marcador, porque no preserva ninguna alternativa real ni añade claridad. El texto principal puede aprobarse con esa pequeña reparación editorial.
