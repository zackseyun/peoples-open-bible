translation:
  language: es
  text: Y Josué no retiró su mano, que había extendido con la jabalina, hasta que hubo dedicado[a] a la destrucción a todos los habitantes de Hai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "destruyó por completo a todos los habitantes de Hai"; el hebreo usa un verbo asociado con poner algo bajo el ban, es decir, dedicarlo a la destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהוֹשֻׁעַ
  english_pob_choice: And Joshua
  chosen_spanish: Y Josué
  alternatives_spanish:
  - Y Joshua
  lexicon: N/A (nombre propio)
  rationale: Se conserva el nombre propio en su forma española usual, con la conjunción inicial mantenida para reflejar el encadenamiento narrativo del hebreo.
- source_word: הֵשִׁיב
  english_pob_choice: did not draw back
  chosen_spanish: no retiró
  alternatives_spanish:
  - no volvió a poner
  - no apartó
  - no retractó
  lexicon: HALOT
  rationale: El hiphil de שוב en este contexto expresa causar el regreso de la mano; en español, 'no retiró su mano' comunica naturalmente que la mantuvo extendida sin convertirlo en un calco rígido.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su mano
  lexicon: HALOT
  rationale: Referencia corporal literal, sin necesidad de paráfrasis.
- source_word: נָטָה
  english_pob_choice: had stretched out
  chosen_spanish: había extendido
  alternatives_spanish:
  - había alargado
  - había tendido
  lexicon: HALOT
  rationale: '''Extender'' reproduce bien el sentido de נטה en este gesto de combate y resulta natural en español.'
- source_word: בַּכִּידוֹן
  english_pob_choice: with the javelin
  chosen_spanish: con la jabalina
  alternatives_spanish:
  - con la lanza
  - con el venablo
  lexicon: HALOT
  rationale: כידון designa un arma arrojadiza o lanceada; 'jabalina' conserva el sentido específico y encaja con el contexto inmediato.
- source_word: הֶחֱרִים
  english_pob_choice: had devoted ... to destruction
  chosen_spanish: había dedicado[a] a la destrucción
  alternatives_spanish:
  - había destruido por completo
  - había puesto bajo el anatema
  lexicon: HALOT
  rationale: '''Dedicado a la destrucción'' conserva la carga técnico-teológica de חרם sin reducirla a simple aniquilación militar. En español, ''dedicar'' aquí funciona como equivalente formal del acto de poner bajo el ḥerem.'
- source_word: כָּל יֹשְׁבֵי הָעָי
  english_pob_choice: all the inhabitants of Ai
  chosen_spanish: a todos los habitantes de Hai
  alternatives_spanish:
  - a todos los residentes de Hai
  - a todos los que vivían en Hai
  lexicon: HALOT
  rationale: '''Habitantes'' es el equivalente natural de יֹשְׁבֵי; se usa ''Hai'' como adaptación española tradicional del topónimo.'
theological_decisions:
- issue: El sentido técnico de חרם en contexto de guerra/jucio
  english_pob_reading: devoted all the inhabitants of Ai to destruction
  chosen_spanish_reading: había dedicado a la destrucción a todos los habitantes de Hai
  alternative_spanish_readings:
  - había destruido por completo a todos los habitantes de Hai
  - había puesto bajo el anatema a todos los habitantes de Hai
  rationale: 'La formulación principal preserva la tensión lexicoteológica: no es solo ''destruir'', sino ejecutar el acto de ḥerem, una acción de juicio y consagración a destrucción. Se evita sustituirlo por un término eclesiástico tradicional sin apoyo directo del texto.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Relación entre 'mano' extendida y el gesto narrativo de la batalla
  english_pob_reading: did not draw back his hand, which he had stretched out with the javelin
  chosen_spanish_reading: no retiró su mano, que había extendido con la jabalina
  alternative_spanish_readings:
  - no apartó su mano, que había extendido con la jabalina
  - no volvió atrás su mano, que había extendido con la jabalina
  rationale: La combinación 'no retiró... había extendido' expresa con naturalidad en español la permanencia del gesto, manteniendo el paralelismo narrativo del hebreo.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: El pasaje coincide con el paquete fuente y con la traducción inglesa auditada; no se registran revisiones aplicadas en el histórico más reciente. La versión española sigue de cerca las decisiones léxicas del inglés, pero las expresa en español natural y mantiene la tensión técnica de חרם mediante una nota breve.
  spanish_consistency_notes:
  - Se usa 'Josué' para el nombre propio y 'Hai' para el topónimo, conforme al uso bíblico español estándar.
  - '''Jabalina'' mantiene el valor de arma del כידון sin sobreespecificar ni generalizar a ''lanza''.'
  - Se evita 'SEÑOR' o equivalentes porque el texto no contiene el nombre divino.
  - La nota de pie está anclada en ambas ocurrencias del marcador porque el mismo matiz de חרם afecta tanto a la construcción verbal como al resultado sobre los habitantes.
