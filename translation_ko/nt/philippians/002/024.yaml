id: PHP.2.24
reference: Philippians 2:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πέποιθα δὲ ἐν κυρίῳ ὅτι καὶ αὐτὸς ταχέως ἐλεύσομαι.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/024.yaml
  text: I am confident in the Lord that I myself will also come soon.
translation:
  language: ko
  text: 나는 주 안에서, 나 자신도 곧 가게 되리라고 확신합니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주 안에서, 나 자신도 곧 가게 될 것이라 신뢰합니다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέποιθα
  english_pob_choice: I am confident
  chosen_korean: 확신하다
  alternatives_korean:
  - 신뢰하다
  - 확신을 가지다
  lexicon: BDAG
  rationale: 완료 형태로 정착된 확신의 상태를 가리킨다. 「확신하다」가 현재적 무게를 가지면서 자연스럽다.
- source_word: δὲ
  english_pob_choice: '—'
  chosen_korean: ''
  alternatives_korean:
  - 그리고
  - 그러나
  lexicon: BDAG
  rationale: 약한 연결. 한국어 자연 흐름을 위해 명시적으로 옮기지 않고 흡수한다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주를 통해
  - 주께 의지하여
  lexicon: BDAG
  rationale: 신뢰의 영역·근거를 표시하는 바울적 표현. 「주 안에서」가 그 정형 표현을 보존한다.
- source_word: ὅτι
  english_pob_choice: that
  chosen_korean: ~리라고
  alternatives_korean:
  - ~라고
  lexicon: BDAG
  rationale: 확신의 내용을 자연스러운 한국어 인용 어미 「~리라고」로 옮긴다.
- source_word: καὶ αὐτὸς
  english_pob_choice: I myself will also
  chosen_korean: 나 자신도
  alternatives_korean:
  - 나 또한 친히
  - 나도 몸소
  lexicon: BDAG
  rationale: 추가의 καί와 강조의 αὐτός가 결합된 표현. 「나 자신도」가 두 의미를 함께 담는다.
- source_word: ταχέως
  english_pob_choice: soon
  chosen_korean: 곧
  alternatives_korean:
  - 머지않아
  - 속히
  lexicon: BDAG
  rationale: 시간적 가까움. 「곧」이 가장 자연스럽다.
- source_word: ἐλεύσομαι
  english_pob_choice: will come
  chosen_korean: 가다
  alternatives_korean:
  - 오다
  - 이르다
  lexicon: BDAG
  rationale: 헬라어 ἔρχομαι는 화자가 청자 쪽으로 「오다/가다」 둘 다 가능하다. 빌립보 성도에게 향하는 화자(바울)의 관점에서는 한국어 자연 흐름상 「가다」가 적합하다.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주인
  lexicon: BDAG
  rationale: DOCTRINE.md 기본형 「주」를 유지한다.
theological_decisions:
- issue: '「주 안에서」의 바울의 확신의 성격'
  chosen_reading: 「나는 주 안에서 ~ 확신합니다」 — 바울의 기대가 단순한 개인적 낙관이 아니라 주께 근거한 것임을 보존
  alternative_readings:
  - 「주를 신뢰합니다, 나 자신도 곧 가게 되리라고」
  rationale: 헬라어는 주의 뜻·작용 안에서 확신함의 의미를 함축한다. 본 번역은 그 신학적 의존을 직접적 계시로 과장하지 않으면서 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
