revisions:
- from: Y prendieron fuego a la casa del Señor[a], y derribaron los muros de Jerusalén, y prendieron fuego a sus torres[b].
  to: Y prendieron fuego a la casa del Señor[a][b], y derribaron los muros de Jerusalén, y quemaron sus torres con fuego.
  rationale: Se hizo una reparación menor para reflejar más explícitamente ἐν πυρί con «con fuego», mejorar la naturalidad del español al variar el segundo verbo a «quemaron», y reubicar correctamente la nota [b] en «la casa del Señor», que es la frase que la nota explica.
  reviewer_model: gpt-5.4
