id: HOS.10.4
reference: Hosea 10:4
source:
  edition: WLC
  text: דִּבְּר֣וּ דְבָרִ֔ים אָל֥וֹת שָׁ֖וְא כָּרֹ֣ת בְּרִ֑ית וּ/פָרַ֤ח כָּ/רֹאשׁ֙ מִשְׁפָּ֔ט עַ֖ל תַּלְמֵ֥י שָׂדָֽי׃
translation:
  text: They speak mere words[a], swearing false oaths, making covenants[d][c][b]; so judgment springs up like poison weed on the furrows of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false oaths'; the Hebrew noun can also carry the sense of an oath invoking a curse.
    reason: lexical_alternative
  - marker: b
    text: Literally 'cutting a covenant.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew רֹאשׁ refers to a poisonous or bitter plant; exact identification is uncertain. Some render 'hemlock' or 'gall.'
    reason: lexical_alternative
  - marker: d
    text: Or 'justice springs up like poison weed,' if מִשְׁפָּט is taken with bitter irony.
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבְּרוּ
  chosen: They speak
  alternatives:
  - They have spoken
  - They utter
  lexicon: HALOT
  rationale: Qal/perfect 3cp of דבר. In prophetic discourse the perfect can describe characteristic action; present English best captures the ongoing indictment.
- source_word: דְבָרִים
  chosen: words
  alternatives:
  - things
  - promises
  lexicon: HALOT
  rationale: Basic sense is 'words/matters.' Here with the cognate verb it forms an idiom emphasizing speech; 'words' preserves the rhetorical force.
- source_word: אָלוֹת שָׁוְא
  chosen: swearing empty oaths
  alternatives:
  - false oaths
  - curses of falsehood
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often with curse implications. In context of covenant-making and deceptive speech, 'swearing empty oaths' captures both the verbal action and the emptiness/falsity marked by שָׁוְא.
- source_word: כָּרֹת בְּרִית
  chosen: making covenants
  alternatives:
  - cutting a covenant
  - making a treaty
  lexicon: HALOT
  rationale: Standard Hebrew idiom literally 'cut a covenant.' 'Making covenants' is natural modern English while preserving the covenantal sense; plural/indefinite force fits the prophetic accusation of repeated political/religious agreements.
- source_word: וּפָרַח
  chosen: springs up
  alternatives:
  - blooms
  - flourishes
  lexicon: HALOT
  rationale: Verb means to bud/sprout/flower. With the simile of toxic growth, 'springs up' fits the image without the positive connotations of 'flourishes.'
- source_word: כָּרֹאשׁ
  chosen: like poison weed
  alternatives:
  - like hemlock
  - like gall
  - like bitterness
  lexicon: HALOT
  rationale: רֹאשׁ denotes a poisonous/bitter plant or its venomous effect; exact botanical identification is uncertain. 'Poison weed' communicates the toxic image without over-specifying the species.
- source_word: מִשְׁפָּט
  chosen: judgment
  alternatives:
  - justice
  - legal case
  lexicon: HALOT
  rationale: In this context the term refers not to righteous justice in the abstract but to the harmful judicial/political outcome produced by Israel's false dealings. 'Judgment' best fits the prophetic denunciation and the image of something noxious spreading.
- source_word: עַל תַּלְמֵי שָׂדָי
  chosen: on the furrows of the field
  alternatives:
  - in the furrows of the field
  - upon the plowed ridges of the open land
  lexicon: HALOT
  rationale: תֶּלֶם means furrow/ridge made by plowing. 'Furrows of the field' is idiomatic and preserves the agricultural simile.
