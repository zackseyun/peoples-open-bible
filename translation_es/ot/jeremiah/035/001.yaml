  text: 'La palabra que vino a Jeremías de parte de Yahvé en los días de Joacim, hijo de Josías, rey de Judá, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta palabra
  lexicon: HALOT
  rationale: En fórmulas proféticas, דָּבָר puede referirse a ‘palabra’, ‘asunto’ o ‘mensaje’. ‘La palabra’ conserva la fórmula de introducción profética y es natural en español.
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que llegó a
  - que fue a
  lexicon: HALOT
  rationale: La construcción hebrea introduce una comunicación revelada. ‘Vino a’ reproduce el movimiento de recepción de la palabra sin sonar forzado en español.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la forma española estándar.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahweh
  lexicon: HALOT
  rationale: מֵאֵת expresa procedencia/origen; ‘de parte de’ deja explícita la fuente personal de la revelación. YHWH se rinde como ‘Yahvé’ según el criterio del proyecto.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el reinado de
  - en tiempos de
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente temporal y formulaica. ‘En los días de’ conserva esa forma sin perder inteligibilidad.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joaquim
  alternatives_spanish:
  - Joaquim
  - Joiacim
  lexicon: convención onomástica
  rationale: Se adopta la forma española tradicional y ampliamente reconocible ‘Joaquim’ para el rey de Judá.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - hijo de Josías
  lexicon: HALOT
  rationale: Expresión genealógica directa y natural en español.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: Título real en construcción genitiva; ‘rey de Judá’ es la correspondencia directa y clara.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'diciendo:'
  - 'así:'
  - diciendo
  lexicon: HALOT
  rationale: Función introductoria de discurso. ‘Diciendo:’ mantiene la transición formal hacia la palabra siguiente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; el proyecto pide no ocultarlo con una sustitución titulativa. ‘Yahvé’ es la forma española usual del nombre divino en este marco editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue el texto fuente hebreo y el rastro auditado en inglés sin añadir notas textuales porque no hay variantes ni tensiones lexicográficas adicionales documentadas para este versículo. Se preserva la estructura profética fórmulaica en español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal del Tetragrámaton, conforme al estándar del proyecto.
  - Se usa ‘rey de Judá’ con orden natural del español, sin perder la relación constructa hebrea.
  - ‘Joaquim’ se adopta por convención española para el nombre real, evitando una transliteración híbrida.
