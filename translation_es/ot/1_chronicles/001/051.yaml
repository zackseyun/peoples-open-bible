    rationale: La nota textual sobre «Aliah/Alvah» debe ir en «Aliah», no en «murió»; y la nota sobre la grafía alternativa de «Timna» debe ir en «Timna», no en «Aliah». Tal como está, el lector recibe información incorrectamente asociada.
  - severity: medium
    issue: La presentación repetida de «jefe» en minúscula antes de nombres propios suena menos natural en español.
    rationale: Como título listado, «Jefe Timna, Jefe Aliah, Jefe Jetheth» funciona mejor y preserva la estructura del hebreo con mayor dignidad estilística.
  - severity: low
