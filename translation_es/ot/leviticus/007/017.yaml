- from: Pero lo que quede de la carne[a] del sacrificio en el tercer día será quemado en el fuego.
  to: Pero lo que quede de la carne[a] del sacrificio al tercer día será quemado en el fuego.
  rationale: Se ajusta la expresión temporal a un español más natural y fielmente temporal («al tercer día») y se pule la nota al pie para evitar una formulación anglicada innecesaria, manteniendo la decisión léxica principal sobre «carne».
