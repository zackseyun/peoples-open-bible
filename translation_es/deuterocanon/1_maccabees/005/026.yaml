translation:
  language: es
  text: y que muchos de ellos están encerrados en Bosora y Bosor[a], en Alamis, Casfor, Maked y Carnaín; todas estas son ciudades fortificadas y grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres geográficos griegos son difíciles y varían en la tradición inglesa; esta redacción conserva una transliteración cercana al texto de Swete en vez de armonizarlos con formas más familiares.
    reason: cultural_note
lexical_decisions:
- source_word: συνειλημμένοι
  english_pob_choice: are shut up
  chosen_spanish: están encerrados
  alternatives_spanish:
  - están cerrados
  - están confinados
  - están sitiados
  lexicon: LSJ
  rationale: El participio expresa estar retenidos o encerrados dentro de un lugar. 'Encerrados' comunica bien la situación resultante sin forzar un tecnicismo militar que el contexto inmediato no exige de manera explícita.
- source_word: εἰς
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  lexicon: BDAG
  rationale: Con un participio pasivo y nombres de lugares, la preposición funciona locativamente. 'En' reproduce de forma natural ese valor en español.
- source_word: Βοσσορὰ καὶ Βοσόρ, ἐν Ἀλάμοις, Κασφὼρ, Μακέδ, καὶ Καρναΐν
  english_pob_choice: Bosora and Bosor, in Alamis, Casphor, Maked, and Carnaim
  chosen_spanish: Bosora y Bosor, en Alamis, Casfor, Maked y Carnaín
  alternatives_spanish:
  - Bozora y Bosor, en Alama, Casfon, Maked y Karnain
  - Bosora y Bosor, en Alamis, Casphor, Maked y Carnaim
  lexicon: transliteración conservadora
  rationale: Se conservan los nombres propios como transliteraciones cercanas al testimonio griego de Swete, sin armonizarlos con formas más conocidas de otras tradiciones. Se mantiene 'en' ante la secuencia porque el griego lo introduce explícitamente con Ἀλάμοις.
- source_word: ὀχυραὶ
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - fuertes
  - bien fortificadas
  - amuralladas
  lexicon: LSJ
  rationale: El adjetivo se refiere a fortaleza defensiva de las ciudades. 'Fortificadas' es la opción más concreta y directa en español.
- source_word: μεγάλαι
  english_pob_choice: large
  chosen_spanish: grandes
  alternatives_spanish:
  - extensas
  - importantes
  lexicon: LSJ
  rationale: En una descripción directa de ciudades, 'grandes' expresa el tamaño sin añadir una valoración interpretativa como 'importantes'.
- source_word: πᾶσαι αἱ πόλεις αὗται
  english_pob_choice: all these cities
  chosen_spanish: todas estas ciudades
  alternatives_spanish:
  - todas estas urbes
  - todas estas poblaciones
  lexicon: BDAG
  rationale: πόλεις se traduce de manera normal por 'ciudades' en este contexto. La frase resume la lista anterior con un valor totalizador claro.
translation_notes:
  revision_awareness: Se siguió el último repaso inglés que cambió 'confined' por 'shut up' y sustituyó el guion por punto y coma para reflejar con más formalidad la estructura de la oración griega. En español, 'están encerrados' y el punto y coma buscan conservar esa relación sintáctica sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo la transliteración conservadora de los topónimos, coherente con el audit trail inglés.
  - Se evitó 'SEÑOR' u otra convención de sustitución porque no aparece aquí el tetragrámaton ni κύριος con valor divino.
  - '''Fortificadas y grandes'' conserva el paralelismo adjetival del griego.'
