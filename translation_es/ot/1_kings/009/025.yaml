base_translation:
  language: en
  yaml_path: translation/ot/1_kings/009/025.yaml
  text: And Solomon offered up burnt offerings and peace offerings on the altar that he had built for Yahweh three times a year[a], and he burned incense with it before Yahweh[b]. Thus he completed the house.
  footnotes:
  - marker: a
    text: Or 'he made offerings smoke with it'; the Hebrew verb can refer more broadly to turning a sacrifice into smoke, not only to burning incense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house,' referring to the temple.
    reason: lexical_alternative
