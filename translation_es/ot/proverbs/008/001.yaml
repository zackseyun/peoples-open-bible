translation:
  language: es
  text: ¿No clama la sabiduría[a], y el entendimiento alza su voz[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llama», «grita» o «proclama» para «clama».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «da su voz»; el modismo hebreo significa «alza su voz» o «habla en voz alta».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Does not
  chosen_spanish: ¿No... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No es que... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa; «¿No...?» conserva esa fuerza interrogativa de manera natural en español.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría personificada
  - Wisdom
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente directo y natural. Se mantiene el sustantivo abstracto, dejando que la personificación provenga del contexto poético, no de una mayúscula interpretativa.
- source_word: תִקְרָא
  english_pob_choice: call
  chosen_spanish: clama
  alternatives_spanish:
  - llama
  - grita
  - proclama
  lexicon: HALOT
  rationale: El verbo puede significar «llamar» o «clamar». Aquí «clama» conserva mejor el tono público y enfático del paralelo poético, sin volverse excesivamente interpretativo.
- source_word: וּתְבוּנָה
  english_pob_choice: and understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la comprensión
  - el discernimiento
  lexicon: HALOT
  rationale: «Entendimiento» es el equivalente más directo para תְבוּנָה y mantiene el paralelismo clásico con «sabiduría».
- source_word: תִּתֵּן קוֹלָהּ
  english_pob_choice: raise her voice
  chosen_spanish: da su voz
  alternatives_spanish:
  - levanta su voz
  - alza su voz
  - da voz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dar su voz», un idiomatismo que en español puede conservarse sin resultar imposible. Se prefiere «da su voz» para mantener la tensión entre literalidad e idioma; «levanta su voz» sería una explicación más interpretativa.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine personification with 'her voice' while translating the nouns as abstract qualities ('wisdom,' 'understanding').
  chosen_spanish_reading: Mantener la personificación femenina implícita en el verbo y el posesivo («clama», «su voz»), sin convertirla en una identificación doctrinal más fuerte.
  alternative_spanish_readings:
  - su voz
  - su propia voz
  - la Sabiduría clama
  rationale: El hebreo personifica la sabiduría y el entendimiento como voces femeninas que hablan públicamente. El español conserva esa imagen sin capitalizar «Sabiduría» ni forzar una identificación teológica adicional.
  doctrine_reference: Preservar la tensión literaria y teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: La traducción se ajusta al paralelo hebreo y corrige la validación anterior asegurando que cada nota [a] y [b] aparezca anclada en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin recurrir a «SEÑOR» ni a formulaciones eclesiásticas no exigidas por el hebreo.
  - «Sabiduría» y «entendimiento» reproducen el paralelismo semántico del original.
  - La solución «da su voz» conserva el idiomatismo hebreo con una nota explicativa para lectores que prefieran la equivalencia dinámica.
