translation:
  language: es
  text: El sol[a], apareciendo en su forma y con calor[c][b], ¡qué sobrecogedoras son las obras de Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «El sol, proclamando al aparecer en su salida, un instrumento maravilloso, obra del Altísimo». El testimonio hebreo, en cambio, subraya la forma visible del sol y su calor.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea es compacta y algo difícil en este punto; el sentido probable es que la apariencia visible del sol y su calor manifiestan las obras sobrecogedoras de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: Masada conserva esta línea solo de forma fragmentaria aquí, mientras que el texto de la Guenizá de El Cairo aporta la redacción hebrea más completa usada para la traducción principal.
    reason: textual_variant
lexical_decisions:
- source_word: שמש
  english_pob_choice: The sun
  chosen_spanish: El sol
  alternatives_spanish:
  - Sol
  lexicon: uso común; equivalencia directa al sustantivo celestial
  rationale: El hebreo nombra al astro de manera directa; en español, con artículo definido, 'El sol' suena natural y mantiene la referencia específica.
- source_word: מביע
  english_pob_choice: appearing
  chosen_spanish: apareciendo
  alternatives_spanish:
  - manifestándose
  - mostrándose
  - apareciendo en
  lexicon: uso contextual del participio
  rationale: El hebreo es compacto y el contexto, junto con el paralelo griego de la aparición visible, favorece una expresión de manifestación visual. 'Apareciendo' conserva ese matiz sin ampliar demasiado el sentido.
- source_word: בצורתו
  english_pob_choice: in its form
  chosen_spanish: en su forma
  alternatives_spanish:
  - en su apariencia
  - en su figura
  lexicon: forma/apariencia
  rationale: '''Forma'' reproduce de manera cercana la idea de apariencia visible de la creación, y funciona bien con el participio previo sin sonar forzado.'
- source_word: וחמה
  english_pob_choice: and hot
  chosen_spanish: y caliente
  alternatives_spanish:
  - y ardiente
  - y con calor
  - y abrasador
  lexicon: campo semántico de calor/ardor
  rationale: El hebreo transmitido es breve y algo áspero; 'caliente' conserva el dato básico de calor sin convertirlo en una paráfrasis más interpretativa. En nota se puede recordar que el griego paralelo difiere en este punto.
- source_word: מה נורא
  english_pob_choice: how awe-inspiring
  chosen_spanish: ¡qué sobrecogedoras!
  alternatives_spanish:
  - ¡qué imponentes!
  - ¡qué temibles!
  - ¡qué maravillosas!
  lexicon: nורא / temor reverente
  rationale: '''Sobrecogedoras'' comunica el temblor reverente de נורא mejor que un simple ''maravillosas'', y mantiene el tono de asombro ante las obras divinas.'
- source_word: מעשי ה'
  english_pob_choice: are the works of the Lord
  chosen_spanish: son las obras del Señor
  alternatives_spanish:
  - son las obras de Yahvé
  - son los hechos del Señor
  lexicon: plural constructo + nombre divino
  rationale: '''Obras'' conserva el plural hebreo y ''del Señor'' sigue la práctica del POB inglés para el abreviado reverencial ה''. En esta pieza se adopta la forma tradicional española ''Señor'' para reflejar ese mismo recurso reverencial en un registro eclesial legible.'
theological_decisions:
- issue: 'Lectura principal del verso: hebreo frente al paralelo griego'
  english_pob_reading: The main translation follows the Hebrew witness, while the Greek parallel is preserved in footnote as an alternative reading.
  chosen_spanish_reading: La traducción principal sigue el testimonio hebreo, mientras que el paralelo griego queda preservado en nota como lectura alternativa.
  alternative_spanish_readings:
  - 'Seguir el griego: ''El sol, proclamando al aparecer en su salida, un instrumento maravilloso, la obra del Altísimo.'''
  rationale: El paquete fuente da prioridad al hebreo de Kahana, considerado de alta confianza, pero el griego ofrece una forma notablemente distinta. Para no borrar esa tensión documental, la nota presenta la alternativa griega sin mezclarla en el cuerpo del texto.
  doctrine_reference: Sirach textual tradition / alternative reading handling
- issue: Representación del nombre divino abreviado ה'
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Aunque el proyecto general prefiere 'Yahvé' para el Tetragrámaton, aquí el testimonio hebreo de Sirácides usa la abreviatura reverencial ה'. En español, 'el Señor' reproduce con naturalidad el mismo registro reverencial y coincide con la solución auditada del inglés POB.
  doctrine_reference: 'DOCTRINE.md contested terms: YHWH'
translation_notes:
  revision_awareness: Se revisó el contexto textual y la nota de auditoría inglesa. La decisión principal mantiene el hebreo como base, pero registra el paralelo griego como lectura alternativa significativa. No se introducen divisiones de versículo ni se amplía el contenido más allá de lo atestiguado.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para la abreviatura reverencial del nombre divino, en coherencia con el registro litúrgico español y con la solución auditada del inglés POB para este versículo.
  - Se evitó 'Cristo' o terminología cristológica, ya que no corresponde al contenido del texto.
  - '''Sobrecogedoras'' se eligió por su valor reverente; no se usó ''maravillosas'' para no perder el matiz de temor/awe de נורא.'
