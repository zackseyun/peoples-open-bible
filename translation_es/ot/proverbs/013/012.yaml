  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. «Árbol de vida» preserva bien la imagen bíblica estable. «Deseo cumplido» encaja con la decisión inglesa «fulfilled».
