    issue: «Ellos fueron a Balaam» para וַיָּבֹאוּ
    rationale: El hebreo usa בוא, normalmente ‘venir/llegar’. «Fueron» desplaza el sentido hacia הלך y debilita la correspondencia con la decisión inglesa auditada «They came».
  - severity: low
    issue: Fluidez de «no te niegues a venir a mí»
    rationale: Es semánticamente defendible, pero en español suena algo rígido. «No te niegues a venir a mí» puede mantenerse por fidelidad, pero conviene mejorar el arranque de la oración para que el conjunto fluya mejor.
  - severity: low
    issue: Puntuación de cierre de cita
    rationale: En español, el punto final de la oración citada debe ir dentro de las comillas de cierre.
  revised_spanish_text: 'Llegaron a Balaam y le dijeron[a]: «Así dice Balac hijo de Zipor: Por favor, no te niegues a venir a mí.»'
  revised_footnotes:
  - marker: a
    text: O «de ir a mí». El hebreo usa el verbo común de movimiento הלך en el infinitivo; en español, «venir a mí» refleja mejor la perspectiva del hablante, mientras que «ir a mí» conserva más literalmente la dirección verbal.
    reason: lexical_alternative
