id: 1TI.5.16
reference: 1 Timothy 5:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ ⸀τις πιστὴ ἔχει χήρας, ⸀ἐπαρκείτω αὐταῖς, καὶ μὴ βαρείσθω ἡ ἐκκλησία, ἵνα ταῖς ὄντως χήραις ἐπαρκέσῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/016.yaml
  text: If any believing woman has widows[a], let her provide for them, and let the church not be burdened, so that it may provide for those who are truly widows.
  footnotes:
  - marker: a
    text: Some manuscripts read 'if any believing man or woman has widows' or 'if any believer has widows,' broadening the instruction beyond a specifically female subject.
    reason: textual_variant
translation:
  language: ko
  text: 어떤 믿는 여자[a]에게 [돌볼] 과부들이 있다면, 그가 그들을 돌봐야 합니다. 그래서 교회가 짐을 지지 않게 하여, 교회가 참으로 과부 된 자들을 돌볼 수 있게 해야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「어떤 믿는 남자나 여자에게 과부들이 있다면」 또는 「어떤 믿는 자에게 과부들이 있다면」으로 읽어, 본 가르침의 대상을 여자에 한정하지 않는다.
    reason: textual_variant
lexical_decisions:
