review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: conserva el paralelismo ‘ojos/oídos’, los participios sustantivados (‘los que ven / los que oyen’) y el matiz intensivo de תִּקְשַׁבְנָה con una formulación de escucha atenta. Sin embargo, ‘no estarán oscuros’ no representa bien el predicado sobre ‘ojos’ en español natural y suena semánticamente extraño; el sentido fuente es que no estarán atenuados/velados/tenues, no que los ojos sean ‘oscuros’ como cualidad. Además, el anclaje de nota tiene un espacio incorrecto antes de [a].'
  spanish_quality_summary: 'La redacción es generalmente clara, pero ‘ojos ... no estarán oscuros’ resulta poco idiomático y algo torpe. Una formulación como ‘no estarán velados’ transmite mejor la idea de impedimento visual sin sobreactuarla como ‘cegados’. También conviene ajustar la colocación de la nota al término anotado: ‘velados[a]’. El resto del versículo fluye bien en español bíblico moderno y digno.'
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. Las decisiones ‘los que ven’, ‘los que oyen’ y ‘prestarán atención’ encajan bien con el análisis léxico documentado. La única divergencia relevante es léxica/idiomática en תִשְׁעֶינָה: el POB auditado prefirió ‘will not be dim’, y en español ‘no estarán velados’ o ‘no estarán nublados’ se alinea mejor que ‘no estarán oscuros’.'
  issues:
  - severity: medium
    issue: ‘no estarán oscuros’ es una formulación poco natural y semánticamente imprecisa para describir los ojos
    rationale: El hebreo describe ojos ya no impedidos u oscurecidos; en español, ‘ojos oscuros’ normalmente describe color, no falta de claridad visual. ‘Velados’ comunica mejor el estado de visión afectada/restaurada.
  - severity: low
    issue: Espaciado incorrecto del marcador de nota
    rationale: 'El marcador debe ir pegado a la palabra o frase anotada: ‘velados[a]’, no ‘estarán [a] oscuros’.'
  revised_spanish_text: Entonces los ojos de los que ven no estarán velados[a], y los oídos de los que oyen prestarán atención.
