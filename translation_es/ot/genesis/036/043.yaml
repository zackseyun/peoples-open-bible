    text: O 'jefes de clan de Edom'. El término hebreo puede denotar dirigentes tribales o de clan.
    reason: lexical_alternative
  - marker: b
    text: O 'en la tierra que poseían'.
    reason: lexical_alternative
  - marker: c
    text: Es decir, Esaú fue el antepasado de los edomitas.
    reason: cultural_note
  - marker: d
    text: O 'Él es Esaú'.
    reason: alternative_reading
  revision_rationale: Se ajusta 'moradas' a 'asentamientos' para reflejar con más precisión y naturalidad el sentido clasificatorio de לְמֹשְׁבֹתָם en este contexto territorial/genealógico. También se eliminan comas innecesarias para mejorar la fluidez y alinearse con la revisión inglesa ya auditada. El resto del texto se conserva por ser fiel al hebreo y al razonamiento léxico-teológico documentado.
