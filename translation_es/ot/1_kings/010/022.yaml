review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue bien el sentido básico del hebreo y refleja correctamente el singular colectivo אֳנִי mediante «flota». También preserva la recurrencia temporal y la lista de mercancías. Sin embargo, en קֹפִים el inglés POB mantuvo el sentido más estrecho «apes» con una nota que abre a «monkeys»; el español invirtió esa jerarquía al poner «monos» en el texto principal y «simios» en nota, lo cual debilita la decisión léxica auditada. Además, «en el mar» puede mejorarse a «en alta mar» para reflejar mejor בַּיָּם / 'at sea'.
  spanish_quality_summary: 'El español es claro, natural y de registro digno. «Flota de naves de Tarsis» y «trayendo» son plenamente legibles. La principal mejora es léxica: usar «simios» en el texto principal y dejar «monos» como alternativa, ya que «simios» corresponde mejor a ''apes'' en español general. «En alta mar» suena más idiomático que «en el mar» en este contexto náutico.'
  glossary_alignment: 'No hay términos teológicos del glosario mayor implicados. La decisión sobre Tarsis está bien manejada con nota. La única desalineación relevante con el expediente POB es קֹפִים: debe conservarse la preferencia principal equivalente a ''apes'' -> «simios», con «monos» como alternativa más amplia en nota. «Pavos reales» con nota sobre posible «loros/papagayos» está bien.'
  issues:
  - severity: medium
    issue: קֹפִים se tradujo como «monos» en el texto principal.
    rationale: El expediente inglés eligió 'apes' como sentido principal y dejó 'monkeys' como alternativa más amplia. En español, «simios» corresponde mejor a 'apes', mientras que «monos» es más amplio y no preserva la misma decisión léxica.
  - severity: low
    issue: La nota c invierte la relación principal/alternativa para קֹפִים.
    rationale: Si el texto principal usa «simios», la nota debe indicar que también puede entenderse más ampliamente como «monos», no al revés.
  - severity: low
    issue: «En el mar» es menos idiomático que «en alta mar» para בַּיָּם en este contexto.
    rationale: El inglés auditado usa 'at sea'; «en alta mar» comunica mejor la operación marítima de una flota que «en el mar», sin apartarse del sentido fuente.
  revised_spanish_text: Porque el rey tenía en alta mar una flota de naves de Tarsis[a], junto con la flota de Hiram. Una vez cada tres años venía la flota de naves de Tarsis, trayendo oro y plata, marfil, simios[c], y pavos reales[b].
  revised_footnotes:
