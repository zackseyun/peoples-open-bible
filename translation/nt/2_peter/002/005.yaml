id: 2PE.2.5
reference: 2 Peter 2:5
source:
  edition: SBLGNT
  text: καὶ ἀρχαίου κόσμου οὐκ ἐφείσατο, ἀλλὰ ὄγδοον Νῶε δικαιοσύνης κήρυκα ἐφύλαξεν, κατακλυσμὸν κόσμῳ ἀσεβῶν ἐπάξας,
translation:
  text: and if he did not spare the ancient world[a], but preserved Noah, an eighth person, a herald of righteousness, when he brought a flood upon a world of the ungodly[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Noah, one of eight' or 'Noah the eighth'; the Greek expression ὄγδοον Νῶε is compressed and may mean that Noah was preserved along with seven others.
    reason: lexical_alternative
  - marker: b
    text: Or 'a preacher of righteousness'; the noun can denote a public proclaimer or herald.
    reason: lexical_alternative
  - marker: c
    text: Or 'justice' for 'righteousness' (δικαιοσύνη), though 'righteousness' is the default rendering here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρχαίου κόσμου
  chosen: the ancient world
  alternatives:
  - the old world
  lexicon: BDAG
  rationale: ἀρχαῖος with κόσμος refers to the world of former times, especially the pre-flood world. 'Ancient world' is natural modern English and preserves the temporal contrast.
- source_word: οὐκ ἐφείσατο
  chosen: did not spare
  alternatives:
  - did not refrain from punishing
  - did not hold back from
  lexicon: BDAG
  rationale: φείδομαι commonly means 'spare' in judgment contexts. This matches the clause's judicial force and aligns with the surrounding examples of divine judgment.
- source_word: ὄγδοον Νῶε
  chosen: Noah, an eighth person
  alternatives:
  - Noah, one of eight
  - Noah the eighth
  lexicon: BDAG
  rationale: The accusative ὄγδοον modifying Νῶε is idiomatic and somewhat compressed. 'An eighth person' preserves the Greek form more closely while still being understandable, indicating Noah as one among eight preserved persons.
- source_word: δικαιοσύνης κήρυκα
  chosen: a herald of righteousness
  alternatives:
  - a preacher of righteousness
  - a herald of justice
  lexicon: BDAG
  rationale: κῆρυξ is more literally 'herald' than 'preacher,' emphasizing proclamation. δικαιοσύνη is rendered 'righteousness' per the project's default; 'justice' is possible lexically but less likely here given the traditional characterization of Noah.
- source_word: ἐφύλαξεν
  chosen: preserved
  alternatives:
  - kept safe
  - guarded
  lexicon: BDAG
  rationale: φυλάσσω can mean guard, keep, or preserve. In this context of deliverance through judgment, 'preserved' best captures the result without implying merely physical guarding.
- source_word: κατακλυσμὸν
  chosen: a flood
  alternatives:
  - the flood
  - a deluge
  lexicon: BDAG
  rationale: κατακλυσμός denotes a flood or deluge. The anarthrous noun is well represented by 'a flood' in English, though the referent is the well-known flood of Noah's day.
- source_word: κόσμῳ ἀσεβῶν
  chosen: a world of the ungodly
  alternatives:
  - the world of the ungodly
  - an ungodly world
  lexicon: BDAG
  rationale: 'The dative with ἐπάξας expresses the object upon which the flood came. The genitive ἀσεβῶν is best taken as descriptive/possessive: a world characterized by ungodly people. ''A world of the ungodly'' preserves the Greek structure more closely than the adjectival alternative.'
- source_word: ἐπάξας
  chosen: when he brought
  alternatives:
  - having brought
  - by bringing
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous or antecedent relative to the main verb in a compressed construction. 'When he brought' reads smoothly in English and preserves the temporal relation without awkwardness.
