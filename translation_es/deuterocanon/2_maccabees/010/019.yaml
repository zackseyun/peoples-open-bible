translation:
  language: es
  text: Si, pues, mantienen la buena disposición[a] hacia estos asuntos, también yo procuraré, desde ahora, ser causa de bienes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para estos asuntos». La frase griega es amplia y puede referirse al conjunto del asunto o a la materia tratada.
    reason: alternative_reading
  - marker: b
    text: O «ser causa de cosas buenas» / «producir bienes». αἰτιαῖος subraya la agencia en producir lo bueno.
    reason: lexical_alternative
lexical_decisions:
- source_word: συντηρήσητε
  english_pob_choice: you maintain
  chosen_spanish: mantenéis
  alternatives_spanish:
  - preserváis
  - conserváis
  - mantenéis firme
  lexicon: BDAG
  rationale: El verbo expresa sostener o conservar algo en continuidad. «Mantenéis» comunica bien esa continuidad y encaja con la construcción condicional sin forzar un giro más abstracto.
- source_word: τὴν εἰς τὰ πράγματα
  english_pob_choice: toward these matters
  chosen_spanish: hacia estos asuntos
  alternatives_spanish:
  - para estos asuntos
  - en estos asuntos
  - respecto de estos asuntos
  lexicon: LSJ
  rationale: πράγματα puede abarcar asuntos, cuestiones o el conjunto de lo que se trata. «Estos asuntos» preserva esa amplitud; «hacia» reproduce la orientación de εἰς sin volver la frase demasiado rígida.
- source_word: εὔνοιαν
  english_pob_choice: goodwill
  chosen_spanish: buena disposición
  alternatives_spanish:
  - buena voluntad
  - benevolencia
  - favor
  lexicon: BDAG
  rationale: En este contexto de relación y respuesta al trato recibido, εὔνοιαν apunta a una disposición favorable. «Buena disposición» es natural en español y conserva el matiz relacional mejor que una fórmula más técnica.
- source_word: εἰς τὸ λοιπόν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - en adelante
  - de aquí en adelante
  - para lo que sigue
  lexicon: BDAG
  rationale: La expresión marca el tiempo que sigue a lo dicho. «Desde ahora» es claro, breve y fiel al valor prospectivo del giro griego.
- source_word: πειράσομαι
  english_pob_choice: I will try
  chosen_spanish: procuraré
  alternatives_spanish:
  - intentaré
  - me esforzaré
  - haré lo posible
  lexicon: BDAG
  rationale: El futuro medio expresa intención de emprender una acción. «Procuraré» suena natural en español y conserva la idea de intento deliberado sin perder solemnidad.
- source_word: αἰτιαῖος
  english_pob_choice: the cause of
  chosen_spanish: causa de
  alternatives_spanish:
  - responsable de
  - ocasionador de
  - origen de
  lexicon: LSJ
  rationale: El adjetivo tiene fuerza causativa. «Causa de» refleja esa agencia de forma directa y mantiene la formulación elevada que el texto exige.
- source_word: ἀγαθῶν
  english_pob_choice: good things
  chosen_spanish: bienes
  alternatives_spanish:
  - cosas buenas
  - beneficios
  - lo bueno
  lexicon: BDAG
  rationale: El plural adjetival funciona sustantivado y es amplio. «Bienes» permite un español más idiomático y sobrio, sin cerrar el sentido a meros beneficios materiales.
theological_decisions:
- issue: Agencia positiva en αἰτιαῖος ἀγαθῶν
  english_pob_reading: be the cause of good things
  chosen_spanish_reading: ser causa de bienes
  alternative_spanish_readings:
  - ser responsable de bienes
  - producir bienes
  - traer beneficios
  rationale: No se suaviza la afirmación a mera intención piadosa; el griego mantiene un valor causativo real. «Ser causa de bienes» conserva esa tensión de agencia y beneficio sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Providencia y responsabilidad moral en el lenguaje de acción humana; no hay atribución divina directa aquí.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: πράγματα se entendió de manera más natural como «asuntos» y αἰτιαῖος se preservó con una formulación formal de causalidad. La versión española evita «afairs/affairs» anglicado y mantiene la amplitud semántica del griego.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Mesías/Cristo», «esclavo/siervo» y otros términos de política terminológica no intervienen en este versículo.
  - El tono es epistolar/formal, acorde con 2 Macabeos 10:19, sin sobrecargar la sintaxis española.
