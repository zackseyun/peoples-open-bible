translation:
  language: es
  text: Estas son las generaciones[a] de Aarón y de Moisés, en el día en que Yahvé habló a Moisés[b] en el monte Sinaí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Aarón y de Moisés». El encabezado hebreo usa «generaciones», una fórmula estándar que puede introducir una línea familiar o lo que procede de una persona.
    reason: lexical_alternative
  - marker: b
    text: O «habló con Moisés». La construcción hebrea puede expresarse en español como discurso dirigido a Moisés o como habla con Moisés.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «en el día en que», un giro idiomático que también puede entenderse como «cuando» o «al tiempo en que».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Ahora estos son
  - Y estos son
  lexicon: HALOT
  rationale: La fórmula deíctica introduce una nueva sección. En español, «Estos son» conserva la función estructural sin cargar innecesariamente la conjunción.
- source_word: תּוֹלְדֹת
  english_pob_choice: the generations
  chosen_spanish: los descendientes
  alternatives_spanish:
  - la descendencia
  - la familia
  - el linaje
  lexicon: HALOT
  rationale: En este encabezado, el hebreo puede señalar descendencia o lo que procede de una persona. Dado el contenido inmediato y la legibilidad en español, «descendientes» comunica la referencia genealógica sin perder la forma de encabezado.
- source_word: אַהֲרֹן וּמֹשֶׁה
  english_pob_choice: Aaron and Moses
  chosen_spanish: Aarón y Moisés
  alternatives_spanish:
  - Aarón y Moisés
  lexicon: Nombres propios estándar
  rationale: Los nombres propios se conservan en su forma bíblica habitual en español. El orden y la coordinación se mantienen porque ambos nombres aparecen explícitamente en el hebreo.
- source_word: בְּ/י֗וֹם
  english_pob_choice: in the day when
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día en que
  - cuando
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y suele significar «cuando» o «en el tiempo en que». «En el día en que» preserva más de cerca la forma hebrea sin sonar completamente extraño en español.
- source_word: דִּבֶּר
  english_pob_choice: spoke to
  chosen_spanish: habló
  alternatives_spanish:
  - habló con
  - dijo
  lexicon: HALOT
  rationale: El hebreo tiene aquí el verbo de hablar; en español, «habló» conserva el sentido básico sin forzar una preposición que no está exigida por el texto. Evita además sobreinterpretar la relación como exclusivamente «a» o «con».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: Tetragrámaton / transliteración del nombre divino
  rationale: Se mantiene el nombre divino con la transliteración española habitual del proyecto, en lugar de sustituirlo por un título. Esto preserva la referencia al nombre propio revelado de Dios.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - con Moisés
  lexicon: HALOT
  rationale: El marcador objeto directo pide expresar a Moisés como receptor del discurso. En español, «a Moisés» es la forma natural y exacta para este contexto.
- source_word: בְּ/הַר סִינָי
  english_pob_choice: on Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - sobre el monte Sinaí
  - en el monte del Sinaí
  lexicon: HALOT
  rationale: La localización se expresa de manera idiomática en español con «en el monte Sinaí». Mantiene el valor geográfico y evita una calca rígida de la preposición inglesa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva como nombre propio en español para no sustituirlo por un título genérico y para mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Encabezado genealógico con Aarón y Moisés
  english_pob_reading: the generations of Aaron and Moses
  chosen_spanish_reading: los descendientes de Aarón y de Moisés
  alternative_spanish_readings:
  - la descendencia de Aarón y de Moisés
  - el linaje de Aarón y de Moisés
  rationale: 'El hebreo conserva una tensión interpretativa: el encabezado nombra a Aarón y a Moisés, aunque la lista siguiente se centra en Aarón. «Descendientes» transmite la lectura genealógica, pero sin borrar que Moisés también está incluido en el encabezado.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Verbo דִּבֶּר con אֶת מֹשֶׁה
  english_pob_reading: spoke to Moses
  chosen_spanish_reading: habló a Moisés
  alternative_spanish_readings:
  - habló con Moisés
  - dijo a Moisés
  rationale: La construcción hebrea indica a Moisés como el destinatario del habla. En español, «habló a Moisés» expresa la dirección del discurso de manera clara y fiel.
  doctrine_reference: Uso sintáctico estándar para discurso dirigido
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, especialmente la preferencia por una equivalencia más formal en la fórmula temporal («in the day when») y la expresión directa del discurso a Moisés. En español, se optó por una solución que preserva esa literalidad funcional sin caer en una calca innecesariamente dura.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio general del proyecto.
  - Se mantiene «monte Sinaí» como topónimo bíblico estable en español.
  - Se eligió «descendientes» para תּוֹלְדֹת, pero se dejó nota de la alternativa «generaciones» para preservar la tensión del encabezado.
  - Los marcadores de nota se colocan solo donde hay una verdadera ambigüedad o alternativa relevante en español.
