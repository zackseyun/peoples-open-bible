review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del hebreo: anterioridad enfática («Incluso antes de que»), quema ritual de la grasa, llegada del subordinado del sacerdote, demanda imperativa de carne para asar, y contraste entre carne cocida y carne cruda. Sin embargo, la nota al pie está anclada en «grasa» cuando la variante léxica documentada corresponde a נַעַר הַכֹּהֵן («el servidor/joven/ayudante del sacerdote»), no a «grasa». Además, «cocida» debilita la precisión de מְבֻשָּׁל, que aquí contrasta específicamente con «cruda» y conviene reflejar mejor como «hervida».'
  spanish_quality_summary: El español es claro y digno, pero necesita un pequeño ajuste técnico. «El servidor del sacerdote» es entendible, aunque «el sirviente del sacerdote» suena algo más natural narrativamente; no es indispensable cambiarlo. El problema principal de legibilidad/editorial es la colocación incorrecta de la nota. También conviene mejorar la precisión culinaria con «hervida» en vez de «cocida», ya que el hebreo no contrasta simplemente preparado/no preparado sino hervido/crudo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sacerdote», «carne» y la construcción general son apropiadas. La decisión sobre נַעַר está bien explicada en la nota, pero el anclaje debe moverse al sintagma correspondiente. La precisión léxica de מְבֻשָּׁל se alinea mejor con «hervida» que con «cocida».
  issues:
  - severity: high
    issue: La nota [a] está anclada a «grasa» en lugar de al sintagma «el servidor del sacerdote».
    rationale: La nota explica alternativas para נַעַר הַכֹּהֵן, no para הַחֵלֶב. Tal como está, induce al lector a pensar que la variante afecta «grasa», lo cual es incorrecto.
  - severity: medium
