translation:
  language: es
  text: Yahvé de los ejércitos levantará un látigo[a] contra él, como en la matanza de Madián en la peña de Oreb[b]; y su vara estará sobre el mar, y la levantará como en Egipto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el golpe contra Madián». El hebreo compara el juicio venidero con el golpe asestado por Yahvé a Madián.'
    reason: lexical_alternative
  - marker: b
    text: «La peña de Oreb» recuerda Jueces 7:25, donde Oreb, un jefe madianita, fue muerto.
    reason: cross_reference
  - marker: c
    text: 'O: «a la manera de Egipto»; probablemente alude a Yahvé levantando la vara sobre el mar en el éxodo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעוֹרֵר
  english_pob_choice: will stir up
  chosen_spanish: levantará
  alternatives_spanish:
  - despertará
  - suscitará
  lexicon: HALOT
  rationale: El hifil de עור expresa hacer surgir o poner en acción; en español, 'levantará' comunica con naturalidad la puesta en marcha del instrumento de juicio sin perder la fuerza dinámica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal conforme al proyecto, evitando la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  lexicon: HALOT
  rationale: En español, 'ejércitos' preserva el sentido amplio de fuerzas celestiales y terrenales bajo el mando de Yahvé, con buena inteligibilidad.
- source_word: שׁוֹט
  english_pob_choice: a whip
  chosen_spanish: un látigo
  alternatives_spanish:
  - un azote
  - un látigo de castigo
  lexicon: HALOT
  rationale: El sustantivo nombra un instrumento de golpe; 'látigo' es concreto y natural en español, manteniendo la imagen de juicio.
- source_word: כְּמַכַּת
  english_pob_choice: as at the slaughter of
  chosen_spanish: como en la matanza de
  alternatives_spanish:
  - como en el golpe contra
  - como en la derrota de
  lexicon: HALOT
  rationale: La comparación remite a un acto histórico de herir/matar; 'matanza' conserva la fuerza nominal del hebreo y la referencia al episodio de Madián.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del nombre propio bíblico.
- source_word: בְּצוּר עוֹרֵב
  english_pob_choice: at the rock of Oreb
  chosen_spanish: en la peña de Oreb
  alternatives_spanish:
  - junto a la peña de Oreb
  - en la roca de Oreb
  lexicon: HALOT
  rationale: '''Peña'' transmite bien el valor de צוּר en un contexto geográfico narrativo y suena natural en español bíblico sin caer en un calco rígido.'
- source_word: וּמַטֵּהוּ
  english_pob_choice: and his staff
  chosen_spanish: y su vara
  alternatives_spanish:
  - y su bastón
  - y su cayado
  lexicon: HALOT
  rationale: '''Vara'' permite conservar la imagen del instrumento levantado sobre el mar y su asociación con el Éxodo; evita confundirlo con el látigo anterior.'
- source_word: עַל הַיָּם
  english_pob_choice: will be over the sea
  chosen_spanish: estará sobre el mar
  alternatives_spanish:
  - estará encima del mar
  - estará sobre el mar
  lexicon: HALOT
  rationale: '''Sobre el mar'' reproduce la imagen espacial del hebreo y mantiene la alusión al mar del Éxodo.'
- source_word: וּנְשָׂאוֹ
  english_pob_choice: and he will lift it
  chosen_spanish: y la levantará
  alternatives_spanish:
  - y la alzará
  - y la alzará en alto
  lexicon: HALOT
  rationale: El verbo נשׂא aquí pide un movimiento de alzar/levantar; 'la levantará' mantiene claridad y relación con la vara antecedente.
- source_word: בְּדֶרֶךְ מִצְרַיִם
  english_pob_choice: as in Egypt
  chosen_spanish: como en Egipto
  alternatives_spanish:
  - en el camino de Egipto
  - a la manera de Egipto
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más natural y la alusión exodica; 'como en Egipto' comunica la comparación sin sobrecargarla con literalidad innecesaria.
theological_decisions:
- issue: Referente de los posesivos en la segunda cola
  english_pob_reading: The suffixes refer to the LORD's staff, which he lifts in an Exodus-like act of judgment/deliverance.
  chosen_spanish_reading: Se deja la referencia abierta de modo que 'su vara' y 'la levantará' pueden leerse en continuidad con la acción de Yahvé, evocando el Éxodo.
  alternative_spanish_readings:
  - Los posesivos se refieren a la vara del enemigo, vuelta contra él.
  - Los posesivos se refieren explícitamente a la vara de Yahvé.
  rationale: El hebreo y el contexto permiten una tensión referencial; la traducción evita resolverla de forma excesiva y conserva la alusión al mar y a Egipto.
  doctrine_reference: Preservar la tensión textual y la intertextualidad del pasaje
- issue: Alusión histórica doble
  english_pob_reading: The verse intentionally recalls both the defeat of Midian (Judg 7) and the Exodus at the sea.
  chosen_spanish_reading: 'La frase mantiene las dos alusiones: la derrota de Madián en Oreb y el acto de Yahvé junto al mar en Egipto.'
  alternative_spanish_readings:
  - Solo una alusión a Madián.
  - Solo una alusión al Éxodo.
  rationale: Las dos referencias son parte del sentido del texto y ayudan a explicar por qué se conservan 'peña de Oreb', 'mar' y 'Egipto' sin aclaraciones explicativas en el texto principal.
  doctrine_reference: Intertextualidad bíblica y continuidad de los actos salvíficos de Yahvé
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió una frase natural para la comparación final (''como en Egipto'') y se mantuvo el enlace con el Éxodo; también se siguió el ajuste de ''slaughter'' con ''matanza'' para la referencia a Madián. La solución española conserva la lectura auditada y la tensión referencial sin añadir explicación al texto principal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se usa 'de los ejércitos' para צְבָאוֹת por transparencia y naturalidad.
  - Se distingue entre 'látigo' y 'vara' para evitar confusión de imágenes.
  - Se preservan los topónimos bíblicos 'Madián', 'Oreb', 'Egipto' y 'mar' sin modernización innecesaria.
  - Las notas al pie mantienen alternativas reales sin duplicar marcadores.
