revisions:
- from: 'Porque así ha dicho Yahvé: He aquí[a], te convierto en terror para ti y para todos tus seres amados[b]; caerán a espada de sus enemigos, mientras tus ojos lo ven. Y pondré a todo Judá en mano del rey de Babilonia, y lo exiliará a Babilonia[c] y los herirá con espada.'
  to: 'Porque así ha dicho Yahvé: He aquí[a], te haré un terror para ti mismo y para todos los que te aman[b]; caerán a espada de sus enemigos mientras tus ojos miran. Y entregaré a todo Judá en mano del rey de Babilonia, y él los llevará al destierro a Babilonia[c] y los herirá con espada.'
  rationale: La revisión corrige un error importante de número en el objeto de 'exiliar', refuerza el matiz reflexivo de לְךָ, mejora la naturalidad de אֹהֲבֶיךָ en español, elimina una referencia pronominal ambigua y limpia la nota española para que conserve el contenido del audit trail sin anglicismo.
