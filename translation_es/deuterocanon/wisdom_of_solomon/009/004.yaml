    text: 'O: «la sabiduría que está sentada junto a tus tronos». El griego dice «tus tronos» en plural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de entre tus siervos», porque el griego puede significar «hijos» o «siervos» según el contexto.'
    reason: alternative_reading
  revision_rationale: Se restaura el plural 'tus tronos' para reflejar con mayor fidelidad el griego θρόνων y el razonamiento léxico documentado. También se corrige la nota [a] para que realmente ofrezca una alternativa válida y explique el plural del original sin contradicción.
