translation:
  language: es
  text: Pero hice esto para no poner la gloria del hombre por encima de la gloria de Dios; y no me inclinaré ante nadie excepto a ti[a], mi Señor, y no haré estas cosas con soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no adoraré a nadie excepto a ti, mi Señor». El verbo griego puede referirse tanto a inclinarse en homenaje como a adorar, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησα
  english_pob_choice: I did
  chosen_spanish: hice
  alternatives_spanish:
  - he hecho
  - actué
  lexicon: BDAG
  rationale: El aoristo ἐποίησα expresa una acción pasada puntual. "Hice" es natural en español y conserva la sencillez directa del griego.
- source_word: ἵνα μὴ θῶ
  english_pob_choice: so that I might not place
  chosen_spanish: para no poner
  alternatives_spanish:
  - para no colocar
  - para que no pusiera
  lexicon: BDAG
  rationale: θῶ, de τίθημι, literalmente es "poner/colocar". "Para no poner" mantiene la imagen de asignar un rango superior sin volver la frase rígida en español.
- source_word: δόξαν ἀνθρώπου
  english_pob_choice: the glory of man
  chosen_spanish: la gloria del hombre
  alternatives_spanish:
  - la gloria humana
  - el honor del hombre
  lexicon: BDAG
  rationale: δόξα puede ser gloria, honra o reputación. Se conserva "gloria" para sostener el contraste teológico con "la gloria de Dios". El singular ἀνθρώπου se refleja con "del hombre".
- source_word: ὑπεράνω
  english_pob_choice: above
  chosen_spanish: por encima de
  alternatives_spanish:
  - sobre
  - más alta que
  lexicon: BDAG
  rationale: 'La idea comparativa es clara: una gloria elevada por encima de otra. "Por encima de" suena natural y preserva la relación jerárquica.'
- source_word: οὐ προσκυνήσω
  english_pob_choice: I will bow down
  chosen_spanish: no me inclinaré
  alternatives_spanish:
  - no me postraré
  - no adoraré
  lexicon: BDAG
  rationale: προσκυνέω puede significar inclinarse o adorar según el contexto. Aquí el acto es de reverencia ante una persona, así que "me inclinaré" preserva la acción concreta sin imponer de entrada un sentido cultual.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: ante nadie
  alternatives_spanish:
  - a nadie
  - ninguna persona
  lexicon: BDAG
  rationale: La negación indefinida se expresa de forma idiomática en español. "Ante nadie" encaja con el verbo de inclinación y mantiene la universalidad de la negación.
- source_word: πλὴν σοῦ
  english_pob_choice: except you
  chosen_spanish: excepto ante ti
  alternatives_spanish:
  - salvo ante ti
  - excepto tú
  lexicon: BDAG
  rationale: πλήν marca excepción. Se integra con la construcción española de dependencia del verbo, manteniendo claro que la excepción recae sobre la persona a quien se habla.
- source_word: τοῦ κυρίου μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor y amo
  - mi dueño
  lexicon: BDAG
  rationale: κύριος puede ser "señor", "amo" o "maestro". En este contexto de dirigirse a un superior humano, "mi señor" es la opción más natural y evita introducir una lectura divina no exigida por el griego.
- source_word: οὐ ποιήσω αὐτὰ
  english_pob_choice: I will not do these things
  chosen_spanish: no haré estas cosas
  alternatives_spanish:
  - no haré esto
  - no actuaré así
  lexicon: BDAG
  rationale: El plural αὐτά se conserva explícitamente como "estas cosas" para no aplanar la referencia múltiple de las acciones en discusión.
- source_word: ἐν ὑπερηφανίᾳ
  english_pob_choice: in pride
  chosen_spanish: con soberbia
  alternatives_spanish:
  - con orgullo
  - por arrogancia
  lexicon: BDAG
  rationale: ὑπερηφανία denota orgullo/arrogancia. "Con soberbia" comunica bien la actitud interior en español y mantiene el matiz negativo.
theological_decisions:
- issue: Sentido de προσκυνέω en la negativa de obediencia
  english_pob_reading: Rendered as 'bow down' rather than 'worship'
  chosen_spanish_reading: '"me inclinaré" en vez de "adoraré"'
  alternative_spanish_readings:
  - adoraré
  - me postraré
  rationale: El contexto inmediato trata de una reverencia negativa ante una autoridad humana. Traducir con "me inclinaré" preserva la tensión entre un gesto físico-social y un acto religioso más fuerte, sin resolverla de antemano.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; traducir desde el sentido llano del original'
- issue: Fuerza de ἀνθρώπου
  english_pob_reading: Singular 'man' retained
  chosen_spanish_reading: '"del hombre" en singular'
  alternative_spanish_readings:
  - humano
  - de la humanidad
  rationale: El griego es singular y contrasta la gloria humana con la gloria de Dios. Mantener el singular conserva la forma del texto y evita generalizar innecesariamente.
  doctrine_reference: 'DOCTRINE.md: precisión del original antes que neutralización interpretativa'
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado del inglés POB, especialmente la revisión que prefirió 'glory of man' sobre 'the glory of a man' y 'my lord' en minúscula para evitar importar un título divino. En español, se refleja con 'la gloria del hombre' y 'mi señor', manteniendo el mismo equilibrio entre literalidad, naturalidad y cautela teológica.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ, en paralelo con la terminología POB.
  - Se conserva 'gloria' de forma consistente para δόξα, a fin de mantener el contraste con 'la gloria de Dios'.
  - Se eligió 'mi señor' para κύριος en un contexto humano, evitando mezclarlo con el uso teológico reservado para Yahvé.
  - La nota al pie marca la ambigüedad de προσκυνέω sin romper la fluidez del texto principal.
