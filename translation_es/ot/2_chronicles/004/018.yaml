revisions:
- from: Salomón hizo todos estos utensilios en muy gran abundancia[a], porque no se podía calcular el peso del bronce.
  to: Salomón hizo todos estos utensilios en grandísima abundancia, pues no se pudo determinar[a] el peso del bronce.
  rationale: Se reubicó el marcador de nota para que corresponda al verbo hebreo נֶחְקַר, se ajustó «calcular» a «determinar» para seguir más de cerca la decisión léxica del POB, y se mejoró la naturalidad de «en muy gran abundancia» a «en grandísima abundancia» sin perder la intensificación del hebreo. «Pues» mantiene bien el valor explicativo de כִּי en un registro bíblico natural.
