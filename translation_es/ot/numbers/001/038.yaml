review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la fórmula censal hebrea y preserva bien las distinciones técnicas: «hijos», «generaciones», «clanes», «casas paternas», «número de nombres», el umbral de edad, y la referencia masculina del censo militar. Sin embargo, la nota al pie introduce una alternativa menos fiel al inglés auditado y al hebreo al decir «sale al ejército / a la guerra». El modismo fuente es «salir a la guerra», no «salir al ejército».'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial amplio. «Todo varón apto para salir a la guerra» funciona bien. La única mejora necesaria es en la nota al pie, para evitar una glosa confusa y una alternativa demasiado alejada del modismo hebreo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías/etc. La decisión de mantener «varón» concuerda con la documentación teológica y léxica del inglés POB.
  issues:
  - severity: medium
    issue: La nota al pie añade «al ejército», que no refleja con precisión el modismo hebreo ni la nota inglesa auditada.
    rationale: El inglés preserva la alternativa «fit for military service» y aclara que el hebreo literalmente habla de «going out to war». En español, «sale al ejército» sugiere incorporarse a una institución más que el modismo militar del texto. Conviene mantener «salir a la guerra» como literal y ofrecer «apto para el servicio militar» como alternativa interpretativa.
  revised_spanish_text: 'Para los hijos de Dan[a], por sus generaciones, por sus clanes, por sus casas paternas, según el número de nombres, desde los veinte años en adelante, todo varón apto para salir a la guerra:'
  revised_footnotes:
  - marker: a
    text: O «todo varón apto para el servicio militar». El hebreo dice literalmente «todo el que sale a la guerra».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal, que es fiel y natural. Solo se corrige la nota para alinearla mejor con el modismo hebreo y con la nota inglesa auditada, evitando la formulación menos precisa «sale al ejército».
