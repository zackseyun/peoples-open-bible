translation:
  language: es
  text: De un muerto[a], como de uno que ya no existe, perece la alabanza; pero quien está vivo y sano alabará al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confesión»; el sustantivo griego puede indicar reconocimiento, alabanza agradecida o acción de gracias. Aquí «alabanza» encaja mejor con el paralelismo de «alabará».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ νεκροῦ
  english_pob_choice: From the dead
  chosen_spanish: Del muerto
  alternatives_spanish:
  - De entre los muertos
  - Desde el muerto
  lexicon: BDAG
  rationale: 'El griego marca origen o punto de partida: la alabanza no procede del muerto. En español, «del muerto» conserva la concisión proverbial y la fuerza colectiva/singular del sustantivo sin añadir explicaciones ajenas al texto.'
- source_word: ὡς μηδὲ ὄντος
  english_pob_choice: as from one who no longer exists
  chosen_spanish: como de uno que ya no existe
  alternatives_spanish:
  - como de uno que no es
  - como de uno que no existe
  lexicon: BDAG
  rationale: La comparación intensifica la idea del muerto como alguien ausente de la esfera de acción. «Ya no existe» comunica esa fuerza idiomática en español sin convertirla en una afirmación filosófica más fuerte que la del proverbio.
- source_word: ἀπόλλυται
  english_pob_choice: perishes
  chosen_spanish: se pierde
  alternatives_spanish:
  - perece
  - desaparece
  lexicon: BDAG
  rationale: El verbo puede expresar pérdida o perecimiento. Aquí «se pierde» mantiene el paralelismo natural con «alabanza» y suena más fluido en español, aunque «perece» sigue siendo una alternativa válida si se quisiera mayor literalidad.
- source_word: ἐξομολόγησις
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - confesión
  - acción de gracias
  lexicon: LEH
  rationale: En la LXX, el término puede abarcar confesión, agradecimiento y alabanza. Dado el paralelismo con «alabará» en el segundo hemistiquio, «alabanza» preserva mejor la relación semántica en español que «confesión» o «acción de gracias».
- source_word: ζῶν
  english_pob_choice: one who is alive
  chosen_spanish: quien está vivo
  alternatives_spanish:
  - el que vive
  - el viviente
  lexicon: BDAG
  rationale: El participio funciona sustantivamente. «Quien está vivo» es natural y claro en español, sin perder el contraste con el muerto.
- source_word: ὑγιὴς
  english_pob_choice: well
  chosen_spanish: sano
  alternatives_spanish:
  - saludable
  - en buen estado
  lexicon: BDAG
  rationale: El adjetivo significa sano, íntegro o saludable. «Sano» conserva la concreción física del griego y mantiene el paralelismo con «vivo».
- source_word: αἰνέσει
  english_pob_choice: will praise
  chosen_spanish: alabará
  alternatives_spanish:
  - dará alabanza
  - pregonará alabanza
  lexicon: BDAG
  rationale: El futuro mantiene el valor verbal gnómico del griego y el paralelismo con la primera cláusula. «Alabará» es la forma más directa y natural en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - a Yahvé
  lexicon: BDAG
  rationale: En este contexto bíblico, κύριος se traduce de manera reverente como «Señor». Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el griego presenta el título κύριος; por eso se mantiene «Señor» como la opción más fiel al texto fuente y al paralelismo litúrgico del verso.
theological_decisions:
- issue: Si la comparación sobre el muerto debe leerse ontológicamente o retóricamente
  english_pob_reading: Render as rhetorical comparison, not as a doctrinal denial of any postmortem existence.
  chosen_spanish_reading: Mantener la comparación como recurso retórico sapiencial, no como una negación doctrinal exhaustiva de la existencia posterior a la muerte.
  alternative_spanish_readings:
  - Leerla como una negación absoluta de toda existencia tras la muerte
  - Suavizarla a una simple metáfora sin carga teológica
  rationale: El verso contrapone a los muertos con los vivos en términos de alabanza activa en esta vida. La redacción española conserva esa tensión sin resolverla ni sobrecargarla con una doctrina que el proverbio no desarrolla.
  doctrine_reference: Preservar la tensión teológica en literatura sapiencial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la primera propuesta inglesa de «thanksgiving» a «praise» para ajustar ἐξομολόγησις al paralelismo con αἰνέσει. Por eso la versión española también opta por «alabanza» y no por «acción de gracias».
  spanish_consistency_notes:
  - Se conserva el contraste muerto/vivo con un registro sobrio y sapiencial.
  - «Señor» se mantiene por fidelidad al κύριος griego en este contexto, evitando una sustitución automática por «Yahvé» cuando el source text no usa el nombre divino explícito.
  - El estilo busca ser publicable y natural en español, sin perder la densidad semántica del original.
