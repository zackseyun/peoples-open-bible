lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ahora mismo
  lexicon: HALOT
  rationale: El adverbio temporal expresa inmediatez y se repite tres veces para conservar el énfasis retórico del hebreo.
- source_word: אָקוּם
  english_pob_choice: I will arise
  chosen_spanish: me levantaré
  alternatives_spanish:
  - me alzaré
  - me pondré de pie
  lexicon: HALOT
  rationale: קום en primera persona singular futura comunica acción decisiva; en español, «me levantaré» mantiene naturalidad y el matiz de irrupción/levantamiento.
- source_word: יֹאמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte con presente idiomático. YHWH se traduce como «Yahvé» según la convención del proyecto, no como un título sustituto.
- source_word: אֵרוֹמָם
  english_pob_choice: I will lift myself up
  chosen_spanish: seré exaltado
  alternatives_spanish:
  - me alzaré
  - me levantaré
  lexicon: HALOT
  rationale: El verbo en esta posición admite un sentido de exaltación/levantamiento. Se eligió una pasiva verbal natural en español para reflejar la elevación sin forzar reflexividad donde el hebreo ya permite una lectura de engrandecimiento.
- source_word: אֶנָּשֵׂא
  english_pob_choice: I will be exalted
  chosen_spanish: me alzaré
  alternatives_spanish:
  - seré exaltado
  - seré levantado
  lexicon: HALOT
  rationale: El nifal de נשׂא puede tener sentido pasivo o medio. Se optó por distinguirlo del verbo anterior con «me alzaré», manteniendo la progresión poética y la diferencia verbal atestiguada por el texto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. La política del proyecto pide transliterarlo como «Yahvé» para preservar el nombre propio del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving the distinction between the final two exaltation verbs
  english_pob_reading: Render אֵרוֹמָם as 'I will lift myself up' and אֶנָּשֵׂא as 'I will be exalted'
  chosen_spanish_reading: Distinguirlos como «seré exaltado» y «me alzaré»
  alternative_spanish_readings:
  - Traducir ambos simplemente como «seré exaltado»
  - Traducir ambos como reflexivos
  rationale: El hebreo usa dos verbos distintos y la revisión inglesa subrayó que no conviene aplanarlos. En español se conserva la progresión poética con dos soluciones diferentes para no borrar la tensión léxica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: 'La revisión más reciente en inglés reordenó las dos cláusulas finales para seguir más de cerca la secuencia del hebreo. En español se ha respetado ese orden: primero «seré exaltado» y luego «me alzaré», manteniendo también la repetición tripartita de «Ahora».'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, según la convención del proyecto.
  - Se evitó «SEÑOR» como sustituto, porque el texto fuente nombra explícitamente al Dios de Israel.
  - La primera persona futura se mantuvo uniforme en todo el versículo.
  - Se preservó la repetición de «Ahora» tres veces para conservar el paralelismo y la escalada retórica del hebreo.
