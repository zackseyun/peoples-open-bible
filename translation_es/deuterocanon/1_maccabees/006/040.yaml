translation:
  language: es
  text: Y parte del campamento del rey se extendió sobre los montes altos[a], y otra parte por las tierras bajas; y avanzaban con seguridad y en formación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra parte por los lugares más bajos». El griego contrasta los montes altos con terreno más bajo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξετάθη
  english_pob_choice: spread out
  chosen_spanish: se extendió
  alternatives_spanish:
  - se desplegó
  - se distribuyó
  lexicon: LSJ
  rationale: El aoristo pasivo expresa la extensión o despliegue de la tropa sobre el terreno. «Se extendió» conserva la imagen de expansión espacial sin añadir más que el griego.
- source_word: μέρος τι
  english_pob_choice: part
  chosen_spanish: parte
  alternatives_spanish:
  - una parte
  - una porción
  lexicon: LSJ
  rationale: La expresión indica una porción indefinida del campamento. «Parte» reproduce esa indefinición de manera natural en español.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campo militar
  - encampamento
  lexicon: LSJ
  rationale: En contexto militar, el término se refiere al campamento o fuerza acampada. «Campamento» es claro y conserva el sentido militar sin forzar tecnicismos.
- source_word: ἐπὶ τὰ ὑψηλὰ ὄρη
  english_pob_choice: over the high mountains
  chosen_spanish: sobre los montes altos
  alternatives_spanish:
  - sobre las altas montañas
  - sobre los montes elevados
  lexicon: LSJ
  rationale: La preposición con acusativo expresa extensión sobre el terreno. «Montes altos» mantiene el contraste topográfico con el siguiente miembro y suena más natural en español que una calca rígida.
- source_word: τινες ἐπὶ τὰ ταπεινά
  english_pob_choice: some over the lowlands
  chosen_spanish: algunos sobre las tierras bajas
  alternatives_spanish:
  - algunos sobre los lugares bajos
  - algunos sobre el terreno más bajo
  lexicon: LSJ
  rationale: El adjetivo sustantivado contrasta con «los montes altos» y designa terreno bajo. «Tierras bajas» comunica con claridad el contraste espacial, como hace el inglés POB con «lowlands».
- source_word: ἤρχοντο
  english_pob_choice: they advanced
  chosen_spanish: avanzaban
  alternatives_spanish:
  - venían
  - marchaban
  - proseguían
  lexicon: LSJ
  rationale: En esta narración militar, el imperfecto describe el movimiento continuado de las tropas. «Avanzaban» comunica mejor la progresión ordenada que un simple «venían».
- source_word: ἀσφαλῶς
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - sin peligro
  - seguramente
  lexicon: LSJ
  rationale: El adverbio indica desplazamiento sin riesgo o con firmeza. «Con seguridad» conserva esa idea de movimiento resguardado sin introducir una interpretación excesiva.
- source_word: τεταγμένως
  english_pob_choice: in formation
  chosen_spanish: en formación
  alternatives_spanish:
  - en orden
  - en orden de batalla
  - disciplinadamente
  lexicon: LSJ
  rationale: El adverbio procede de la idea de ordenar/colocar y, en contexto militar, sugiere disposición disciplinada. «En formación» expresa bien el arreglo ordenado de las tropas en español actual.
translation_notes:
  revision_awareness: 'El texto griego y el contexto de auditoría inglesa muestran pleno acuerdo: no se requieren correcciones de sentido ni ajustes textuales. La revisión más reciente indicó que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo topográfico entre «montes altos» y «tierras bajas» para reflejar el contraste del griego.
  - «Campamento» se usa con sentido militar, en continuidad con el POB inglés, sin convertirlo en un término eclesial o abstracto.
  - Se preserva el matiz de movimiento ordenado mediante «avanzaban ... en formación», evitando una paráfrasis excesiva.
