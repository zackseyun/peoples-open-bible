translation:
  language: es
  text: Los que bajan al mar en barcos[a], ocupados en su labor sobre grandes aguas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trabajando en muchas aguas» o «comerciando en aguas poderosas». La frase hebrea puede denotar labor o comercio realizado sobre el mar abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹרְדֵי
  english_pob_choice: those who go down
  chosen_spanish: los que bajan
  alternatives_spanish:
  - los que descienden
  - quienes bajan
  lexicon: HALOT
  rationale: El participio qal plural funciona de manera sustantiva, designando una clase de personas. «Los que bajan» conserva el valor verbal y suena natural en español; «descienden» sería más formal pero menos idiomático aquí.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar abierto
  - el océano
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «sea», en español «mar» es la forma más natural y equivalente para el sentido marítimo general del hebreo, sin convertirlo en un nombre propio.
- source_word: בָּאֳנִיּוֹת
  english_pob_choice: in ships
  chosen_spanish: en barcos
  alternatives_spanish:
  - en naves
  - a bordo de barcos
  lexicon: HALOT
  rationale: La preposición ב con «ships» se entiende de manera locativa. «En barcos» conserva la imagen de ir embarcado y es claro en español; «naves» es posible pero menos corriente.
- source_word: עֹשֵׂי
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - trabajando
  - ejecutando
  lexicon: HALOT
  rationale: El participio introduce la actividad en que están ocupados. «Haciendo» mantiene la relación directa con el sustantivo siguiente sin sobreespecificar la clase de actividad.
- source_word: מְלָאכָה
  english_pob_choice: business
  chosen_spanish: negocio
  alternatives_spanish:
  - trabajo
  - comercio
  - ocupación
  lexicon: HALOT
  rationale: En este contexto marítimo el término puede abarcar labor u ოპερación comercial. «Negocio» refleja la posible dimensión comercial señalada por el POB en inglés, aunque en español también puede oírse como actividad/ocupación; por eso se conserva la ambigüedad relativa sin cerrar el sentido a solo «trabajo» o solo «comercio».
- source_word: בְּמַיִם רַבִּים
  english_pob_choice: on great waters
  chosen_spanish: sobre grandes aguas
  alternatives_spanish:
  - en muchas aguas
  - sobre aguas poderosas
  lexicon: HALOT
  rationale: La expresión poética alude al mar abierto. «Sobre grandes aguas» reproduce el valor intensivo de רַבִּים y mantiene un registro bíblico claro en español sin forzar una literalidad torpe.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo masorético y el audit trail inglés. La versión inglesa no requiere cambios textuales, y la traducción española preserva la imagen poética y la ambigüedad lexical de מְלָאכָה entre labor y actividad comercial.
  spanish_consistency_notes:
  - Se mantuvo «mar» por naturalidad idiomática frente a «el mar»/«la mar», sin perder el sentido general del hebreo.
  - «Negocio» se eligió para reflejar la decisión inglesa «business», con nota para conservar la alternativa de labor/comercio.
  - La construcción completa conserva el paralelismo participial del hebreo con una frase fluida y publicable en español.
