translation:
  language: es
  text: Oh, Dios, cantaré un cántico nuevo a ti; con un arpa[a] de diez cuerdas te tocaré música.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un laúd de diez cuerdas» o, más en general, «con un instrumento de diez cuerdas»; la identidad exacta del instrumento antiguo designado por נֵבֶל es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: Oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo en una invocación directa. En español, «Oh Dios» conserva el tono poético y orante sin añadir contenido ajeno. No se usa «Señor» porque el texto hebreo dice אֱלֹהִים, no יהוה.
- source_word: שִׁיר חָדָשׁ
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - una canción nueva
  - un nuevo cántico
  lexicon: HALOT
  rationale: «שִׁיר חָדָשׁ» es un sintagma nominal simple. «Cántico nuevo» comunica bien el registro poético y litúrgico en español; «canción» sería más moderno pero menos elevado en este contexto.
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: cantaré
  alternatives_spanish:
  - quiero cantar
  - cantaría
  - permíteme cantar
  lexicon: HALOT
  rationale: 'La forma cohortativa expresa intención o resolución. En español, el futuro simple transmite de manera natural esa determinación: «cantaré».'
- source_word: לָּךְ
  english_pob_choice: to you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: Aunque el hebreo marca al destinatario con la preposición correspondiente, en español la relación de dedicación o dirección de la alabanza suena más natural con «para ti». «A ti» también es posible, pero menos idiomático aquí.
- source_word: בְּנֵבֶל עָשׂוֹר
  english_pob_choice: on a ten-stringed harp
  chosen_spanish: con un arpa de diez cuerdas
  alternatives_spanish:
  - con un instrumento de diez cuerdas
  - con un laúd de diez cuerdas
  - con una lira de diez cuerdas
  lexicon: HALOT
  rationale: נֵבֶל designa un instrumento de cuerdas cuya identificación exacta es incierta; la POB inglesa conserva esa cautela con una opción concreta. En español, «arpa de diez cuerdas» es claro y natural, y «con» preserva el valor instrumental sin decidir de forma excesiva la preposición interpretativa.
- source_word: אֲזַמְּרָה
  english_pob_choice: I will make music
  chosen_spanish: haré música
  alternatives_spanish:
  - cantaré alabanzas
  - tocaré
  - haré melodía
  lexicon: HALOT
  rationale: El piel de זמר puede implicar hacer música o cantar alabanzas, con acompañamiento instrumental. Dado que el instrumento ya está explicitado, «haré música» evita redundancia y conserva la amplitud del verbo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés, manteniendo el tono poético, la dirección vocativa y la cautela sobre el instrumento de cuerdas. No se detectan revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en la invocación directa, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el nombre divino subyacente no es יהוה en este versículo.
  - «Cántico» se prefiere a «canción» por registro poético y bíblico.
  - La nota de pie conserva la incertidumbre lexical sobre נֵבֶל, como en el inglés auditado.
