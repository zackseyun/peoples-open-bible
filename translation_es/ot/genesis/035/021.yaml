translation:
  language: es
  text: Entonces Israel siguió viajando y montó su tienda más allá de Migdal-eder[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Migdal-eder significa «torre del rebaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: journeyed on
  chosen_spanish: siguió su camino
  alternatives_spanish:
  - viajó
  - prosiguió
  - se puso en marcha
  lexicon: HALOT
  rationale: El hebreo indica la acción narrativa de partir y continuar el viaje. En español, «siguió su camino» comunica con naturalidad la progresión del relato sin perder el valor de movimiento hacia adelante que el inglés POB resolvió con «journeyed on».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: N/A
  rationale: El texto hebreo nombra a Israel, no a Jacob, y la traducción conserva esa forma como lo hace el POB en inglés.
- source_word: וַיֵּט
  english_pob_choice: pitched
  chosen_spanish: plantó su tienda
  alternatives_spanish:
  - puso su tienda
  - levantó su tienda
  - acampó
  lexicon: HALOT
  rationale: Con objeto «tienda», נטה funciona idiomáticamente como «plantar/instalar una tienda». «Plantó su tienda» es natural en español y mantiene la imagen concreta de campamento.
- source_word: אָהֳלֹה
  english_pob_choice: his tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su carpa
  - su tienda de campaña
  lexicon: HALOT
  rationale: El sustantivo es simplemente «tienda» con sufijo posesivo de tercera persona masculina singular. «Su tienda» es suficiente y no añade elementos ajenos al hebreo.
- source_word: מֵהָלְאָה
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - más lejos de
  - al otro lado de
  - más adelante de
  lexicon: HALOT
  rationale: El adverbio señala ubicación o movimiento «más allá» de un punto de referencia. «Más allá de» reproduce bien el sentido espacial y corresponde al valor que el POB inglés expresó con «beyond».
- source_word: לְמִגְדַּל עֵדֶר
  english_pob_choice: Migdal-eder
  chosen_spanish: Migdal-eder
  alternatives_spanish:
  - la torre de Eder
  - la torre del rebaño
  lexicon: HALOT
  rationale: Aquí la expresión funciona como topónimo, por lo que se conserva la transliteración. Se evita traducirla en el texto principal para no borrar la referencia geográfica que el POB inglés mantuvo.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo masorético y con el audit trail en inglés; no se registran revisiones ni variantes textuales relevantes en esta unidad.
  spanish_consistency_notes:
  - Se mantiene «Israel» como nombre propio según el hebreo, sin armonizarlo a «Jacob».
  - Se conserva la transliteración «Migdal-eder» en el cuerpo del texto y se explicita su sentido léxico en nota.
  - El verbo de movimiento y la imagen de la tienda se han rendido en español con equivalentes naturales, sin añadir detalles no presentes en el hebreo.
