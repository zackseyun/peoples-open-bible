translation:
  language: es
  text: Porque tuve envidia de los arrogantes, al ver la paz de los impíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'prosperidad' o 'bienestar' para 'paz' (שָׁלוֹם), destacando la aparente holgura y facilidad de los impíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la causa o explicación de lo dicho antes; en español, 'Porque' expresa con naturalidad el valor explicativo-causal de כִּי en este contexto.
- source_word: קִנֵּאתִי
  english_pob_choice: I was envious
  chosen_spanish: tuve envidia
  alternatives_spanish:
  - envidié
  - estuve celoso
  lexicon: HALOT
  rationale: קנא aquí expresa envidia más que celos posesivos; 'tuve envidia' conserva el estado afectivo del hablante sin sonar forzado en español.
- source_word: בַּהוֹלְלִים
  english_pob_choice: the arrogant
  chosen_spanish: los arrogantes
  alternatives_spanish:
  - los soberbios
  - los fanfarrones
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'arrogant' sobre 'boastful'; 'arrogantes' refleja bien el matiz moral de הוֹלְלִים y mantiene la lectura contextual de orgullo insolente.
- source_word: שְׁלוֹם
  english_pob_choice: peace
  chosen_spanish: bienestar
  alternatives_spanish:
  - paz
  - prosperidad
  - bienestar aparente
  lexicon: HALOT
  rationale: En este salmo שָׁלוֹם apunta a la aparente holgura y prosperidad de los impíos; 'bienestar' comunica mejor esa idea en español sin perder la amplitud semántica del término.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  lexicon: HALOT
  rationale: '''Impíos'' preserva la categoría moral y bíblica de רְשָׁעִים con un registro digno y ampliamente entendible en español.'
- source_word: אֶרְאֶה
  english_pob_choice: when I saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vi
  - cuando observé
  - al mirar
  lexicon: HALOT
  rationale: El imperfecto funciona aquí como marco temporal de la experiencia de envidia; 'al ver' expresa con naturalidad esa relación temporal en español.
theological_decisions:
- issue: שָׁלוֹם como 'paz' versus 'prosperidad/bienestar'
  english_pob_reading: peace with a footnote noting 'prosperity' as an alternative for the wicked's apparent well-being and ease
  chosen_spanish_reading: bienestar, con nota alternativa a 'prosperidad'
  alternative_spanish_readings:
  - paz
  - prosperidad
  - bienestar aparente
  rationale: El hebreo puede referirse no a paz interior sino al estado externo de holgura de los impíos. 'Bienestar' evita reducirlo a un solo matiz y la nota preserva la alternativa semántica destacada por el POB inglés.
  doctrine_reference: Salmo 73:3; uso semántico de שָׁלוֹם en literatura sapiencial y salmódica
translation_notes:
  revision_awareness: La versión inglesa base pasó de 'the boastful' a 'the arrogant' en la revisión final, y la traducción española sigue esa decisión con 'los arrogantes'. También se retuvo la observación léxica sobre שָׁלוֹם, pero en español se optó por 'bienestar' como equivalente más natural del valor contextual que el inglés expresa con 'peace'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - '''impíos'' se mantiene como término bíblico estándar para רְשָׁעִים.'
  - La nota de pie conserva la alternativa semántica de שָׁלוֹם sin introducir una paráfrasis más amplia en el texto principal.
