translation:
  language: es
  text: Y Dios volverá a tener misericordia de ellos y los hará volver a la tierra, y edificarán la casa, aunque no como la anterior, hasta que se cumplan los tiempos de la era[b]. Y después de estas cosas volverán de las cautividades[a] y edificarán Jerusalén honorablemente, y la casa de Dios en ella será edificada gloriosamente[c], tal como hablaron de ella los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “del exilio”. El griego tiene el plural “de las cautividades”, que puede apuntar a múltiples lugares o episodios de cautiverio.'
    reason: lexical_alternative
  - marker: b
    text: “Los tiempos de la era” es una expresión idiomática que puede referirse a los tiempos fijados que conducen a una restauración más plena de Dios; el griego se deja intencionalmente abierto aquí.
    reason: lexical_alternative
  - marker: c
    text: 'Jerusalén es referida con pronombres femeninos en griego: “en ella” y “de ella”.'
    reason: cultural_note
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: volverá a tener
  alternatives_spanish:
  - de nuevo tendrá
  - otra vez tendrá
  lexicon: BDAG
  rationale: En español, la repetición se expresa con naturalidad mediante “volverá a tener”; mantiene la idea de acción renovada sin forzar un calco adverbial innecesario.
- source_word: ἐλεήσει
  english_pob_choice: will have mercy on
  chosen_spanish: tendrá misericordia de
  alternatives_spanish:
  - mostrará misericordia a
  - se compadecerá de
  lexicon: BDAG
  rationale: “Tendrá misericordia de” conserva el tono bíblico y la fuerza de compasión divina del verbo griego, sin convertirlo en una mera amabilidad general.
- source_word: ἐπιστρέψει αὐτοὺς εἰς τὴν γῆν
  english_pob_choice: bring them back to the land
  chosen_spanish: los traerá de nuevo a la tierra
  alternatives_spanish:
  - los restaurará a la tierra
  - los volverá a llevar a la tierra
  lexicon: BDAG
  rationale: Se conserva el movimiento de retorno/restauración y la referencia no posesiva a “la tierra”, siguiendo el valor del artículo griego sin añadir “su”. Se evita “restaurará” como principal porque el texto expresa también desplazamiento concreto.
- source_word: οἰκοδομήσουσιν τὸν οἶκον
  english_pob_choice: they will build the house
  chosen_spanish: edificarán la casa
  alternatives_spanish:
  - reconstruirán la casa
  - edificarán el templo
  lexicon: BDAG
  rationale: Se mantiene “la casa” para respetar el modo bíblico original y dejar que el contexto identifique el templo. “Edificarán” suena más solemne que “construirán” y funciona bien en registro bíblico.
- source_word: οὐχ οἷος ὁ πρότερος
  english_pob_choice: though not like the former one
  chosen_spanish: aunque no como la anterior
  alternatives_spanish:
  - no como la primera
  - aunque no semejante a la anterior
  lexicon: LSJ
  rationale: La concesiva española “aunque no como la anterior” transmite la comparación con naturalidad y preserva la relación con el edificio previo sin sobreexplicarla.
- source_word: ἕως πληρωθῶσιν καιροὶ τοῦ αἰῶνος
  english_pob_choice: until the times of the age are fulfilled
  chosen_spanish: hasta que se cumplan los tiempos de la era[b]
  alternatives_spanish:
  - hasta que se cumplan los tiempos del siglo
  - hasta que se cumplan los tiempos del age
  lexicon: BDAG
  rationale: “Era” comunica mejor en español moderno la amplitud de αἰών sin caer en “siglo”, que puede sonar demasiado cronológico y estrecho. Se conserva la ambigüedad escatológica del giro.
- source_word: ἐκ τῶν αἰχμαλωσιῶν
  english_pob_choice: from the captivities
  chosen_spanish: de las cautividades
  alternatives_spanish:
  - del cautiverio
  - de las captividades
  lexicon: LSJ
  rationale: Se preserva el plural explícito del griego con “cautividades”, manteniendo la posibilidad de múltiples exilios o situaciones de cautiverio.
- source_word: ἐντίμως
  english_pob_choice: honorably
  chosen_spanish: honorablemente
  alternatives_spanish:
  - con honor
  - dignamente
  - con honra
  lexicon: BDAG
  rationale: “Honorablemente” reproduce de forma directa el adverbio y conserva el matiz de dignidad en la reconstrucción de Jerusalén.
- source_word: ἐν αὐτῇ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella misma
  - dentro de ella
  lexicon: BDAG
  rationale: En español, “en ella” conserva la referencia a Jerusalén con la necesaria naturalidad idiomática. Se mantiene la personificación de la ciudad sin forzar un giro artificial.
- source_word: ἐνδόξως
  english_pob_choice: gloriously
  chosen_spanish: gloriosamente
  alternatives_spanish:
  - con gloria
  - espléndidamente
  lexicon: BDAG
  rationale: “Gloriosamente” preserva la relación con δόξα y el tono solemne del pasaje, más allá de una simple belleza arquitectónica.
- source_word: καθὼς ἐλάλησαν περὶ αὐτῆς οἱ προφῆται
  english_pob_choice: just as the prophets spoke concerning her
  chosen_spanish: tal como hablaron de ella los profetas
  alternatives_spanish:
  - como hablaron de ella los profetas
  - tal como los profetas hablaron acerca de ella
  lexicon: BDAG
  rationale: Se conserva el referente femenino de Jerusalén y la fórmula profética de cumplimiento. “Hablaron de ella” suena natural en español y evita el peso de un calco excesivo.
theological_decisions:
- issue: Sentido de καιροὶ τοῦ αἰῶνος
  english_pob_reading: until the times of the age are fulfilled
  chosen_spanish_reading: hasta que se cumplan los tiempos de la era[b]
  alternative_spanish_readings:
  - hasta que se cumplan los tiempos del siglo
  - hasta que se cumplan los tiempos decretados de la era
  rationale: Se mantiene la apertura escatológica del griego y del POB inglés. “Era” es suficientemente amplia para no fijar una cronología doctrinal que el texto no especifica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referente de 'the house'
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Aunque el contexto identifica el templo, la primera formulación conserva el lenguaje idiomático del original. La aclaración llega después con “la casa de Dios”.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Personificación de Jerusalén en los pronombres
  english_pob_reading: in her / concerning her
  chosen_spanish_reading: en ella / de ella
  alternative_spanish_readings:
  - en eso / acerca de eso
  rationale: Se conserva la femineidad gramatical de Jerusalén presente en el griego. En español, “ella” mantiene ese rasgo sin necesidad de explicar o neutralizar la personificación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: La revisión más reciente indica que no se hicieron cambios sustanciales y que el estado de acuerdo con la auditoría es alto; esta redacción sigue de cerca la lectura inglesa aprobada, ajustando únicamente la sintaxis para un español natural y manteniendo las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí; el texto usa θεός como “Dios”.
  - Se conserva “la casa” en el primer tramo y “la casa de Dios” después, siguiendo el patrón del griego y del audit trail.
  - Se preserva el plural de αἰχμαλωσίαι con “cautividades”, tal como recomienda la auditoría.
  - Los pronombres femeninos para Jerusalén se mantienen de forma natural con “ella”.
  - No se introduce “templo” en el texto principal para no resolver prematuramente la metáfora del original.
