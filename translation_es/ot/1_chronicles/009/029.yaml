translation:
  language: es
  text: Y algunos de ellos fueron puestos a cargo de los utensilios, de todos los utensilios sagrados[a], y de la flor de harina, del vino, del aceite, del olíbano y de las especias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los utensilios del santuario».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  english_pob_choice: And some of them
  chosen_spanish: Y de entre ellos
  alternatives_spanish:
  - Y algunos de ellos
  - Y de ellos
  lexicon: HALOT
  rationale: El hebreo expresa un sentido partitivo de selección dentro del grupo. «De entre ellos» conserva ese matiz de procedencia y selección sin volver la frase demasiado literal o torpe en español.
- source_word: מְמֻנִּים
  english_pob_choice: were appointed
  chosen_spanish: fueron puestos a cargo
  alternatives_spanish:
  - fueron नियुक्तados
  - fueron designados
  - fueron encargados
  lexicon: HALOT
  rationale: El participio pasivo indica personas asignadas a una responsabilidad. «Fueron puestos a cargo» comunica la idea de encargo/delegación de función con naturalidad en español y mantiene el valor de responsabilidad, no solo de nombramiento formal.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: a cargo de
  alternatives_spanish:
  - sobre
  - encargados de
  - responsables de
  lexicon: HALOT
  rationale: En esta serie repetida, עַל marca esfera de responsabilidad. En español, «a cargo de» expresa esa función con claridad mejor que «sobre», que sonaría demasiado físico.
- source_word: הַכֵּלִים
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los recipientes
  - los implementos
  lexicon: HALOT
  rationale: כֵּלִים puede abarcar utensilios, implementos o recipientes. En el contexto del santuario, «utensilios» es amplio y natural; evita restringirlo a vasos o recipientes solamente.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  english_pob_choice: all the holy vessels
  chosen_spanish: todos los utensilios del santuario
  alternatives_spanish:
  - todos los utensilios santos
  - todos los vasos sagrados
  - todos los utensilios santos del santuario
  lexicon: HALOT
  rationale: La construcción puede entenderse como «utensilios de santidad / del santuario». En español, «del santuario» hace explícito el ámbito cultual que el inglés POB dejó en nota alternativa, sin perder la idea de consagración.
- source_word: הַסֹּלֶת
  english_pob_choice: the fine flour
  chosen_spanish: la flor de harina
  alternatives_spanish:
  - la harina fina
  - la harina selecta
  lexicon: HALOT
  rationale: סֹלֶת designa harina fina para ofrendas. «Flor de harina» es una equivalencia tradicional y precisa en español bíblico, perfectamente adecuada al contexto sacrificial.
- source_word: הַיַּיִן
  english_pob_choice: the wine
  chosen_spanish: el vino
  alternatives_spanish:
  - el vino para ofrenda
  lexicon: HALOT
  rationale: יַיִן se traduce directamente por «vino». El contexto del templo ya orienta su uso cultual sin necesidad de añadir especificación que no está en el hebreo.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  lexicon: HALOT
  rationale: שֶׁמֶן es «aceite»; el texto no especifica oliva. Mantener «aceite» evita introducir un detalle no explícito aunque sea probable en el trasfondo cultual.
- source_word: הַלְּבוֹנָה
  english_pob_choice: the frankincense
  chosen_spanish: el incienso
  alternatives_spanish:
  - el olíbano
  - el incienso de olíbano
  lexicon: HALOT
  rationale: Aunque el término hebreo puede referirse específicamente al olíbano/frankincense, en español bíblico «incienso» es la equivalencia cultual más clara y entendible. Se conserva el referente aromático-sacrificial sin tecnicismo innecesario.
- source_word: הַבְּשָׂמִים
  english_pob_choice: the spices
  chosen_spanish: las especias
  alternatives_spanish:
  - los aromas
  - las sustancias aromáticas
  - los perfumes
  lexicon: HALOT
  rationale: בְּשָׂמִים nombra sustancias aromáticas. «Especias» es un equivalente amplio y natural; «perfumes» sonaría más moderno/cosmético, y «aromas» sería demasiado genérico.
theological_decisions:
- issue: Ámbito cultual de los objetos y provisiones
  english_pob_reading: all the holy vessels
  chosen_spanish_reading: todos los utensilios del santuario
  alternative_spanish_readings:
  - todos los utensilios santos
  - todos los vasos sagrados
  rationale: El hebreo puede entenderse como objetos consagrados al santuario. En español, «del santuario» expresa de manera directa ese ámbito sagrado sin suavizarlo ni volverlo ambiguo. La formulación conserva el carácter cultual del texto.
  doctrine_reference: santidad/consagración del culto en el templo
- issue: Valor de מְמֻנִּים como responsabilidad delegada
  english_pob_reading: were appointed
  chosen_spanish_reading: fueron puestos a cargo
  alternative_spanish_readings:
  - fueron designados
  - fueron nombrados
  - fueron encargados
  rationale: La frase no solo dice que recibieron un título, sino que quedaron responsables de objetos y provisiones sagradas. «Puestos a cargo» mantiene la tensión entre nombramiento y responsabilidad funcional.
  doctrine_reference: administración fiel de bienes consagrados
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra un pasaje estable, con una sola nota lexical para כֵּלִים / כְּלֵי הַקֹּדֶשׁ. No se aplicaron revisiones posteriores; la propuesta mantiene esa estabilidad y traslada la alternativa principal al español en una nota breve.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece, por lo que no se introduce.
  - Se prefirió «utensilios» para כֵּלִים y «utensilios del santuario» para כְּלֵי הַקֹּדֶשׁ, preservando la distinción entre el conjunto general y el conjunto santo.
  - «Flor de harina» conserva un registro bíblico comprensible y evita una paráfrasis excesiva.
  - No se capitalizaron indebidamente los términos cultuales, salvo donde el español requiere mayúscula inicial por posición en la oración.
