revisions:
- from: Así se apartaron de alrededor del recinto de Coré[a], Datán y Abiram. Y Datán y Abiram salieron, quedándose de pie a la entrada de sus tiendas, con sus esposas, sus hijos[b] y sus pequeños.
  to: Así se apartaron de los alrededores de la morada de Coré[a], Datán y Abiram. Y Datán y Abiram salieron, de pie a la entrada de sus tiendas, con sus esposas, sus hijos varones[b] y sus pequeños.
  rationale: 'La revisión corrige tres puntos: reemplaza ‘recinto’ por ‘morada’ para reflejar mejor מִשְׁכַּן en este contexto no cultual; cambia ‘quedándose de pie’ a ‘de pie’ para una lectura más natural y más cercana al participio hebreo; y ajusta ‘sus hijos’ a ‘sus hijos varones’ para preservar la distinción léxica entre בְּנֵיהֶם y טַפָּם, tal como la auditoría inglesa la consideró significativa. También se incorpora en la nota [a] la aclaración cultural de que no se trata del tabernáculo de Yahvé.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del versículo: el pueblo se aparta de la zona asociada con Coré, Datán y Abiram; luego Datán y Abiram salen y están a la entrada de sus tiendas con sus familias. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la pista auditada en inglés: (1) מִשְׁכַּן aquí se entiende mejor como ‘morada/vivienda’ y no ‘recinto’, porque el hebreo apunta al lugar de residencia o campamento asociado a los rebeldes, no a un perímetro cercado; (2) בְּנֵיהֶם fue preservado por el POB inglés como ‘sons’, precisamente para mantener la distinción con טַפָּם. En español, ‘hijos varones’ o ‘sus hijos varones’ conserva mejor esa distinción que el simple ‘hijos’, que puede neutralizar el contraste. También conviene suavizar ‘quedándose de pie’, que en español sugiere una acción progresiva no presente en el participio.'
  spanish_quality_summary: El texto es legible, pero ‘de alrededor del recinto’ suena algo forzado y ‘quedándose de pie’ no es la formulación más natural para describir postura. ‘Se apartaron de los alrededores de la morada...’ y ‘salieron, de pie a la entrada...’ o ‘salieron y se quedaron de pie...’ leen con mayor naturalidad. ‘Sus pequeños’ es aceptable, aunque ‘sus niños pequeños’ sería más explícito; no es obligatorio cambiarlo.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto. Sí hay que alinear mejor la decisión sobre מִשְׁכַּן con la nota inglesa: evitar cualquier término que sugiera santuario, pero también evitar un matiz espacial demasiado específico como ‘recinto’. Además, la racionalidad léxica auditada para בְּנֵיהֶם favorece mantener la distinción específica frente a טַפָּם; por eso conviene ‘hijos varones’ en español.'
  issues:
  - severity: medium
    issue: ‘recinto’ para מִשְׁכַּן introduce un matiz no ideal
    rationale: La evidencia y la auditoría inglesa explican que se trata de la morada/residencia asociada a Coré, Datán y Abiram, no del tabernáculo de Yahvé. ‘Recinto’ evita la confusión cultual, pero desplaza el sentido hacia un área delimitada más que hacia una vivienda o lugar de habitación.
  - severity: medium
    issue: ‘sus hijos’ debilita la distinción entre בְּנֵיהֶם y טַפָּם
    rationale: El POB inglés mantuvo ‘sons’ precisamente porque el siguiente término menciona aparte a los pequeños/dependientes. En español, ‘sus hijos’ puede abarcar a todo el grupo filial y borrar parcialmente el contraste; ‘sus hijos varones’ lo preserva mejor.
  - severity: low
    issue: ‘quedándose de pie’ suena menos natural que el participio hebreo
    rationale: נִצָּבִים describe postura, no necesariamente un proceso de empezar a quedarse de pie. ‘De pie’ o ‘parados’ refleja mejor la escena sin añadir matiz aspectual innecesario.
  - severity: low
    issue: Falta la nota cultural sobre מִשְׁכַּן que sí conserva la auditoría inglesa
    rationale: La nota inglesa aclara que ‘dwelling’ no significa el tabernáculo de Yahvé. Dado que el español también puede generar confusión al usar un término cercano al ámbito cultual o espacial, conviene conservar una nota explicativa en español.
  revised_spanish_text: Así se apartaron de los alrededores de la morada de Coré[a], Datán y Abiram. Y Datán y Abiram salieron, de pie a la entrada de sus tiendas, con sus esposas, sus hijos varones[b] y sus pequeños.
  revised_footnotes:
