translation:
  language: es
  text: o jorobado[a], o atrofiado[b], o con un defecto en su ojo[c], o con sarna[d], o con costras[e], o con testículos aplastados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'corcovado' para jorobado.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo es incierto; puede referirse más generalmente a una forma corporal disminuida o atrofiada.
    reason: lexical_alternative
  - marker: c
    text: O 'con una mancha en su ojo'; el defecto ocular exacto es incierto.
    reason: lexical_alternative
  - marker: d
    text: El término hebreo parece referirse a una afección cutánea con picazón; la diagnosis moderna precisa es incierta.
    reason: cultural_note
  - marker: e
    text: O 'erupción cutánea'; este segundo término hebreo también alude a una afección de la piel, distinta de la anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִבֵּן
  english_pob_choice: hunchbacked
  chosen_spanish: jorobado
  alternatives_spanish:
  - corcovado
  - giboso
  lexicon: HALOT
  rationale: El hebreo designa una deformidad de la espalda; en español, "jorobado" comunica con claridad la curvatura visible sin tecnicismo excesivo. "Corcovado" es posible pero menos natural en español actual.
- source_word: דַק
  english_pob_choice: dwarfed
  chosen_spanish: enano
  alternatives_spanish:
  - raquítico
  - atrofiado
  - pequeño
  lexicon: HALOT
  rationale: El término es incierto y probablemente alude a una conformación corporal disminuida o encogida. "Enano" conserva la fuerza corporal del defecto listando una limitación visible, aunque se entiende aquí de manera descriptiva y no como insulto social.
- source_word: תְּבַלֻּל בְּעֵינוֹ
  english_pob_choice: with a defect in his eye
  chosen_spanish: con defecto en su ojo
  alternatives_spanish:
  - con una mancha en su ojo
  - con catarata en su ojo
  - con una imperfección en su ojo
  lexicon: HALOT
  rationale: La lesión ocular exacta no es segura. "Defecto en su ojo" preserva la ambigüedad del hebreo y evita precisar una afección médica no demostrable.
- source_word: גָרָב
  english_pob_choice: with an itch
  chosen_spanish: sarna
  alternatives_spanish:
  - picazón
  - comezón
  - erupción cutánea
  lexicon: HALOT
  rationale: En español, "sarna" es un equivalente tradicional para una afección cutánea pruriginosa en este tipo de lista. Aunque no agota el rango posible, mantiene la referencia a un mal de la piel sin suavizarla.
- source_word: יַלֶּפֶת
  english_pob_choice: with scabs
  chosen_spanish: costras
  alternatives_spanish:
  - erupción
  - dermatosis
  - sarpullido
  lexicon: HALOT
  rationale: El segundo término alude a otra afección cutánea distinta de גָרָב. "Costras" es una traducción directa, breve y comprensible que conserva la concreción corporal del texto.
- source_word: מְרֹחַ אָשֶׁךְ
  english_pob_choice: with crushed testicles
  chosen_spanish: con testículos aplastados
  alternatives_spanish:
  - con testículos dañados
  - con testículos magullados
  - con testículos machacados
  lexicon: HALOT
  rationale: La frase hebrea se refiere a daño físico en los testículos. "Aplastados" reproduce la violencia corporal del original sin eufemismo y mantiene la claridad anatómica.
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: HALOT
  rationale: La partícula disyuntiva se repite en una lista de impedimentos físicos; "o" preserva la estructura acumulativa del hebreo de forma natural en español.
theological_decisions:
- issue: Listado de defectos corporales en ley de santidad sacerdotal
  english_pob_reading: Use direct physical-language renderings without softening or importing moral judgment.
  chosen_spanish_reading: Usar lenguaje corporal directo sin suavizarlo ni convertirlo en juicio moral.
  alternative_spanish_readings:
  - emplear eufemismos para atenuar la dureza
  - usar terminología médica técnica
  rationale: El versículo enumera condiciones físicas que afectan el servicio sacerdotal; no acusa pecado personal. La versión española mantiene el foco corporal y evita insinuar que la discapacidad sea culpa moral.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Coincide con la última revisión del texto fuente inglés, que no introdujo cambios; se conservó la lista de impedimentos físicos y su incertidumbre léxica sin añadir precisión médica no sustentada.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista con repeticiones de 'o'.
  - Se evitó traducir con eufemismos para no borrar el carácter físico del hebreo.
  - Se preservó la incertidumbre de los términos dermatológicos y oculares mediante redacciones amplias y notas.
  - Se usó 'testículos' en sentido anatómico explícito para reflejar la fuerza del hebreo.
