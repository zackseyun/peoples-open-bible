    issue: «se volvieron de seguirlo» es una construcción poco natural en español
    rationale: Aunque intenta reflejar el hebreo «volvieron de detrás de él», en español moderno esta combinación no suena idiomática. El sentido es que dejaron de perseguirlo/seguirlo.
  - severity: low
    issue: La nota al pie está redactada de manera algo torpe
    rationale: «Hebreo literalmente» no necesita ir entre comillas iniciales; además puede formularse con mayor naturalidad en español e identificar mejor el valor idiomático.
