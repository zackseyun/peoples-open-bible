translation:
  language: es
  text: Ben-adad escuchó al rey Asa, y envió a los comandantes de sus tropas contra las ciudades de Israel, y atacaron a Ijón, Dan, Abel-maim[a] y todas las ciudades de almacenamiento de Neftalí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abel-maim es la lectura del texto hebreo aquí; algunos lo identifican con Abel-bet-maacá, conocido por pasajes paralelos.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened to
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - prestó atención a
  lexicon: HALOT
  rationale: En este contexto Ben-adad responde favorablemente a la petición anterior de Asa; «escuchó» conserva la idea de oír con atención y asentimiento sin forzar «obedeció».
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of his armies
  chosen_spanish: los comandantes de sus tropas
  alternatives_spanish:
  - los jefes de sus fuerzas
  - los capitanes de sus ejércitos
  lexicon: HALOT
  rationale: שָׂרֵי expresa líderes o comandantes, y הַחֲיָלִים remite a fuerzas militares. «Tropas» comunica bien el conjunto militar en español moderno, y el posesivo «sus» refleja el hebreo אֲשֶׁר לוֹ.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - que le pertenecían
  - que eran suyos
  lexicon: HALOT
  rationale: La frase modifica a los comandantes/fuerzas como pertenecientes a Ben-adad. En español, «sus» evita una construcción pesada y mantiene la relación de posesión.
- source_word: עָרֵי יִשְׂרָאֵל
  english_pob_choice: the cities of Israel
  chosen_spanish: las ciudades de Israel
  alternatives_spanish:
  - las ciudades israelitas
  lexicon: HALOT
  rationale: Es una referencia geográfica y política directa al reino del norte; la forma simple y natural «las ciudades de Israel» conserva esa referencia.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck
  chosen_spanish: golpearon
  alternatives_spanish:
  - atacaron
  - hirieron
  lexicon: HALOT
  rationale: נכה en narrativa militar puede significar golpear, derrotar o atacar. «Golpearon» mantiene la fuerza verbal sin caer en un arcaísmo excesivo.
- source_word: עִיּוֹן
  english_pob_choice: Ijon
  chosen_spanish: Ijón
  alternatives_spanish:
  - Iyon
  - Iyón
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acentuación para lectura natural.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  lexicon: HALOT
  rationale: Nombre propio bíblico mantenido en su forma usual en español.
- source_word: אָבֵל מָיִם
  english_pob_choice: Abel-maim
  chosen_spanish: Abel-maim
  alternatives_spanish:
  - Abel-bet-maacá
  lexicon: HALOT
  rationale: El hebreo aquí lee אָבֵל מָיִם, por lo que se traduce directamente como «Abel-maim» en lugar de armonizar con el topónimo más conocido de pasajes paralelos.
- source_word: מִסְכְּנוֹת
  english_pob_choice: store-cities
  chosen_spanish: ciudades de provisiones
  alternatives_spanish:
  - ciudades de almacenes
  - ciudades de depósito
  - ciudades de almacén
  lexicon: HALOT
  rationale: El término designa ciudades usadas para guardar suministros. «Ciudades de provisiones» comunica esa función en español actual con buena inteligibilidad.
- source_word: עָרֵי נַפְתָּלִי
  english_pob_choice: of Naphtali
  chosen_spanish: de Neftalí
  alternatives_spanish:
  - de la tribu de Neftalí
  - en Neftalí
  lexicon: HALOT
  rationale: 'La cadena constructa indica pertenencia o relación territorial: «las ciudades de provisiones de Neftalí». La forma mantiene el vínculo regional sin añadir explicación innecesaria.'
theological_decisions:
- issue: Topónimo hebreo frente a armonización con paralelos
  english_pob_reading: The Hebrew text here reads Abel-maim; some identify it with Abel-beth-maacah known from parallel passages.
  chosen_spanish_reading: Abel-maim
  alternative_spanish_readings:
  - Abel-bet-maacá
  rationale: Se conserva la lectura del texto hebreo tal como está, sin armonizarla con pasajes paralelos. La identificación alternativa se preserva en nota para no borrar la tensión textual documentada.
  doctrine_reference: Texto bíblico y crítica textual
translation_notes:
  revision_awareness: No se aplicaron revisiones previas; la redacción sigue de cerca el hebreo consonante/vocalizado de WLC y conserva la decisión auditada de no armonizar Abel-maim con el topónimo paralelo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; este versículo no contiene el nombre divino.
  - 'Se mantiene la transliteración estable de nombres propios: Ben-adad, Asa, Ijón, Dan, Abel-maim y Neftalí.'
  - «Ciudades de provisiones» se eligió para evitar el calco más técnico «ciudades de almacén» sin perder el matiz funcional militar-económico.
