id: PSA.102.24
reference: Psalms 102:24
source:
  edition: WLC
  text: עִנָּ֖ה בַ/דֶּ֥רֶךְ כח/ו קִצַּ֥ר יָמָֽ/י׃
translation:
  text: He afflicted my strength on the way[b][a]; he shortened my days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'his strength'; many understand this as 'my strength' in light of the surrounding first-person context.
    reason: alternative_reading
  - marker: b
    text: Or 'in the course of life'; literally 'on the way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִנָּה
  chosen: afflicted
  alternatives:
  - humbled
  - weakened
  lexicon: HALOT
  rationale: The Piel of ענה commonly conveys afflicting, humbling, or weakening. Here the object is 'his strength,' so the sense is that strength was brought low or afflicted. 'Afflicted' preserves the verbal force and leaves the somewhat abrupt Hebrew expression intact better than a smoother paraphrase.
- source_word: בַדֶּרֶךְ
  chosen: on the way
  alternatives:
  - in the course of life
  - along the journey
  lexicon: HALOT
  rationale: Literally 'in/on the way.' In context it likely refers metaphorically to the course of life, but the Hebrew image is straightforward and should be preserved in the main text.
- source_word: כחו
  chosen: his strength
  alternatives:
  - my strength
  lexicon: HALOT
  rationale: The ketiv points to third masculine singular suffix, 'his strength.' This is the plain consonantal reading reflected in the supplied text. Because the surrounding context and many translations understand first person ('my strength'), the alternative is preserved in a footnote as a likely contextual smoothing or variant understanding.
- source_word: קִצַּר
  chosen: shortened
  alternatives:
  - cut short
  lexicon: HALOT
  rationale: The verb קצר means to shorten or cut short. 'Shortened' is clear modern English and fits the poetic parallelism.
- source_word: יָמָי
  chosen: my days
  lexicon: HALOT
  rationale: Straightforward construct with first person suffix; the psalmist speaks of the shortening of his lifespan.
