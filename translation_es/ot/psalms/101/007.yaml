review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: exclusión del que practica el engaño de la casa del salmista y del que habla mentiras de su presencia. Conserva correctamente los posesivos en primera persona y el carácter habitual de los participios. Sin embargo, invierte los anclajes de las notas respecto del audit trail inglés: la nota sobre ''el que hace engaño'' pertenece a la primera cláusula, mientras que la alternativa de ''ser establecido/estar firme'' pertenece a la segunda cláusula. Además, ''No habitará...'' con el sujeto pospuesto suena menos natural y algo ambiguo en español que una formulación con sujeto inicial paralela a la segunda cláusula.'
  spanish_quality_summary: 'El español es generalmente claro y digno. ''Practica el engaño'' y ''delante de mis ojos'' son buenas opciones. La mejora principal es estilística y de claridad sintáctica: iniciar ambas cláusulas con ''El que...'' da paralelismo más natural. También conviene alinear la segunda cláusula más de cerca con el inglés auditado y el hebreo usando ''no estará delante de mis ojos'' o similar; ''no permanecerá'' es defendible, pero el audit trail privilegia la imagen de estar de pie/presente, con la alternativa de ''ser establecido'' en nota.'
  glossary_alignment: 'No hay términos del glosario de proyecto especialmente activados aquí. Las decisiones léxicas principales son coherentes con el POB: יֵשֵׁב -> ''habitará'', עֹשֵׂה רְמִיָּה -> ''practica el engaño'', דֹּבֵר שְׁקָרִים -> ''habla mentiras'', לְנֶגֶד עֵינַי -> ''delante de mis ojos''. La única desalineación relevante es la distribución de notas y una ligera divergencia del matiz preferido para יִכּוֹן.'
  issues:
  - severity: medium
    issue: Los marcadores de notas no corresponden al mismo punto semántico que en el audit trail inglés.
    rationale: La nota 'el que hace engaño' debe anclarse en la primera cláusula (עֹשֵׂה רְמִיָּה), y la nota sobre 'ser establecido/estar firme' debe anclarse en la segunda (יִכּוֹן). En el borrador, [a] y [b] quedaron asociados al orden inglés invertido, lo que confunde la evidencia fuente.
  - severity: medium
    issue: La sintaxis 'No habitará dentro de mi casa el que...' es menos natural que una estructura paralela con sujeto inicial.
    rationale: El hebreo permite ese orden, pero en español bíblico claro y moderno, 'El que practica el engaño no habitará dentro de mi casa' mejora la legibilidad y preserva el paralelismo con 'el que habla mentiras...'.
  - severity: low
    issue: '''No permanecerá delante de mis ojos'' es posible, pero se aparta del matiz principal preferido por el audit trail para יִכּוֹן.'
    rationale: El POB inglés escoge 'will not stand' como texto principal y deja 'be established' en nota. En español, 'no estará delante de mis ojos' o 'no se mantendrá delante de mis ojos' refleja mejor la presencia inmediata; 'no permanecerá' tiende a interpretar más que a traducir.
  revised_spanish_text: El que practica el engaño[a] no habitará dentro de mi casa; el que habla mentiras no estará[b] delante de mis ojos.
