  from: and Malachi, who is also called the messenger of the Lord.”
  to: and Malachi, who is also called the angel of the Lord.”
  rationale: In 2nd–3rd century Christian Latin (the original language of 5 Ezra), 'angelus' overwhelmingly means 'angel,' not a generic human 'messenger' (which would typically be 'nuntius'). The author is referencing a specific early Jewish and Christian tradition (derived from the LXX of Mal 1:1) that Malachi was an angel. Translating 'angelus' as 'messenger' to align with the Hebrew etymology of Malachi's name obscures the Latin author's actual word choice and the specific tradition they are invoking. The footnote confirms this was a defensive translation choice.
