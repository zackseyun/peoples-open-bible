translation:
  language: es
  text: 'Los hijos de Isacar: Tola, Puah[a], Jasub[b] y Shimron—cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Puah; algunas tradiciones inglesas tienen «Puvah» por una forma paralela en otras listas genealógicas.
    reason: alternative_reading
  - marker: b
    text: Hebreo Jasub; Génesis 46:13 presenta la forma paralela «Ishvi».
    reason: cross_reference
lexical_decisions:
- source_word: וְ/לִ/בְנֵ֣י
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y de los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: La construcción hebrea introduce una lista genealógica. En español, «Los hijos de» reproduce con naturalidad la fórmula de encabezado sin forzar el matiz conjuntivo inicial, que aquí funciona solo como enlace.
- source_word: יִשָׂשכָ֗ר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issachar
  lexicon: HALOT
  rationale: Nombre propio tribal. En español bíblico actual, «Isacar» es la forma más estable y legible; conserva la referencia al nombre sin depender de la grafía inglesa.
- source_word: תּוֹלָ֧ע
  english_pob_choice: Tola
  chosen_spanish: Tola
  lexicon: HALOT
  rationale: Nombre propio en genealogía; se translitera como nombre, sin intentar traducirlo.
- source_word: וּ/פוּאָ֛ה
  english_pob_choice: Puah
  chosen_spanish: Puah
  alternatives_spanish:
  - Puvah
  - Puá
  lexicon: HALOT
  rationale: La forma masorética de Crónicas apoya «Puah». Mantengo la vocalización cercana al hebreo y la forma breve usada en la tradición inglesa auditada.
- source_word: ישיב
  english_pob_choice: Jashub
  chosen_spanish: Jashub
  alternatives_spanish:
  - Ishvi
  lexicon: HALOT
  rationale: El texto de Crónicas presenta esta forma consonántica; por eso se sigue «Jashub» y no la forma paralela de Génesis 46:13, «Ishvi».
- source_word: וְ/שִׁמְר֖וֹן
  english_pob_choice: and Shimron
  chosen_spanish: y Shimrón
  alternatives_spanish:
  - y Shimron
  lexicon: HALOT
  rationale: Nombre propio final de la lista. En español se adapta la acentuación gráfica como «Shimrón» para lectura natural, manteniendo el nombre reconocible.
- source_word: אַרְבָּעָֽה
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Número cardinal que resume el total de hijos enumerados. Se conserva la función sumaria del hebreo en estilo genealógico.
translation_notes:
  revision_awareness: La auditoría inglesa indica alta concordancia y sin cambios sustanciales. La decisión principal en español fue adaptar el encabezado genealógico con la fórmula natural «Los hijos de» y uniformar los nombres propios a formas castellanas legibles, sin alterar las alternativas textuales documentadas.
  spanish_consistency_notes:
  - Se mantuvo el orden y la estructura de lista genealógica del hebreo.
  - Se conservaron las alternativas históricas en notas al pie donde el audit trail inglés documenta variantes significativas.
  - Se optó por «Isacar» como forma española estándar del nombre tribal, mientras que los demás nombres se transliteran de manera transparente.
