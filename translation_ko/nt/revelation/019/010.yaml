  text: καὶ ἔπεσα ἔμπροσθεν τῶν ποδῶν αὐτοῦ προσκυνῆσαι αὐτῷ. καὶ λέγει μοι· Ὅρα μή· σύνδουλός σού εἰμι καὶ τῶν ἀδελφῶν σου τῶν ἐχόντων τὴν μαρτυρίαν Ἰησοῦ· τῷ θεῷ προσκύνησον· ἡ γὰρ ⸀μαρτυρία Ἰησοῦ ἐστιν τὸ πνεῦμα τῆς προφητείας.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/010.yaml
  text: And I fell before his feet to worship him[a]. But he says to me, “See that you do not! I am a fellow slave with you and with your brothers who hold the testimony of Jesus. Worship God[c][b], for the testimony of Jesus is the spirit of prophecy.”
  footnotes:
  - marker: a
    text: Or 'who have the testimony of Jesus.' The phrase 'the testimony of Jesus' may mean 'the testimony about Jesus' or 'Jesus’ own testimony.' The same ambiguity applies in the final clause.
    reason: alternative_reading
  - marker: b
    text: Or 'your brothers and sisters,' with 'brothers' functioning representatively for fellow believers.
    reason: lexical_alternative
  - marker: c
    text: Or 'I am a fellow servant with you.'
    reason: lexical_alternative
translation:
  language: ko
  text: '그래서 나는 그에게 경배하려고 그의 발 앞에 엎드렸습니다. 그러나 그가 나에게 말하였습니다. 「그리하지 마시오! 나는 그대와 그대의 형제들, 곧 예수의 증언을 굳게 지니는 자들과 함께한 동료 종일 뿐이오. 하나님께 경배하시오. 예수의 증언이 곧 예언의 영이기 때문이오.」'
  philosophy: optimal-equivalence
