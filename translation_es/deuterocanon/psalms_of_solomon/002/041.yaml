revisions:
- from: ¡Bendito sea el Señor para siempre delante de sus siervos!
  to: Bendito es el Señor para siempre delante de sus siervos.
  rationale: Se ajusta «Bendito sea» a «Bendito es» para reflejar la fuerza declarativa del griego y del audit trail inglés, y se eliminan las exclamaciones por no estar motivadas por la fuente. Se conserva «el Señor» y «sus siervos» como opciones españolas naturales y contextualmente justificadas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:24:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: una doxología declarativa sobre el Señor, con duración continua y referencia pública ante sus servidores. Sin embargo, «Bendito sea» cambia la fuerza predicativa/declarativa de εὐλογητὸς a una formulación más optativa, mientras que el audit trail inglés documenta preferencia por «Blessed is».'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para ajustarse mejor al valor declarativo del original. «Bendito es» suena plenamente idiomático en una doxología breve y evita introducir un matiz desiderativo. El resto del verso es legible y digno; «delante de sus siervos» funciona, aunque «ante sus siervos» sería también posible.
  glossary_alignment: 'Hay una desviación menor respecto al default del proyecto para κύριος/YHWH: el borrador usa «el Señor». Dado que el texto fuente aquí tiene κύριος y el audit trail inglés lo toma como título divino, no es obligatorio forzar «Yahvé» en este versículo; no obstante, conviene señalar que no se trata de una máscara del nombre divino en el español. La decisión «siervos» para δούλων está bien justificada por el contexto cultual.'
  issues:
  - severity: medium
    issue: «Bendito sea» introduce matiz optativo no requerido por εὐλογητὸς.
    rationale: El griego usa el adjetivo predicativamente en una afirmación doxológica. El audit trail inglés explícitamente prefirió «Blessed is» sobre «Blessed be» para no volver el texto más optativo de lo que exige el original. En español, «Bendito es» preserva mejor esa fuerza.
  - severity: low
    issue: Uso de signos de exclamación no exigidos por la fuente.
    rationale: La frase es doxológica, pero el griego no marca exclamación. En español pueden omitirse para una correspondencia más sobria y directa con el original.
  revised_spanish_text: Bendito es el Señor para siempre delante de sus siervos.
  revision_rationale: Se ajusta «Bendito sea» a «Bendito es» para reflejar la fuerza declarativa del griego y del audit trail inglés, y se eliminan las exclamaciones por no estar motivadas por la fuente. Se conserva «el Señor» y «sus siervos» como opciones españolas naturales y contextualmente justificadas.
