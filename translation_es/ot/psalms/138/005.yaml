translation:
  language: es
  text: y cantarán de los caminos de Yahvé[a], porque grande es la gloria de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en los caminos de Yahvé»; la frase probablemente significa cantar acerca de los caminos de Yahvé o sobre ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשִׁירוּ
  english_pob_choice: and they will sing
  chosen_spanish: y cantarán
  alternatives_spanish:
  - y canten
  - y que canten
  - y cantarán
  lexicon: HALOT
  rationale: El imperfecto qal 3mp de שׁיר admite valor futuro o modal. En español, 'cantarán' comunica con naturalidad la secuencia poética y el valor futuro que la POB inglesa privilegia; 'canten' o 'que canten' intensificarían indebidamente un matiz volitivo.
- source_word: בְּדַרְכֵי
  english_pob_choice: of the ways
  chosen_spanish: en los caminos
  alternatives_spanish:
  - de los caminos
  - sobre los caminos
  - en los caminos
  lexicon: HALOT
  rationale: La preposición ב con 'caminos' después de 'cantar' puede señalar tema u objeto de canto. En español, 'cantar en los caminos' sería más literal pero puede sonar locativo; aun así, aquí se conserva una cercanía sintáctica al hebreo y se deja la aclaración interpretativa en la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'' en lugar de sustituirlo por un título. ''SEÑOR'' ocultaría el nombre propio; ''Jehová'' no corresponde al criterio documental adoptado.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: '''Porque'' expresa con claridad la relación causal del verso: la razón del canto es la grandeza de la gloria de Yahvé. ''Pues'' también sería posible, pero aquí ''porque'' resulta más directo y natural.'
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - magnífico
  - enorme
  - grande
  lexicon: HALOT
  rationale: El adjetivo significa simplemente 'grande'. 'Grande' conserva el valor básico sin sobreinterpretar con matices de magnificencia o peso que pertenecen más al sustantivo siguiente.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  - gloria
  lexicon: HALOT
  rationale: '''Gloria'' es el equivalente español más asentado para כָּבוֹד en referencia a Dios. ''Honor'' desplaza el campo semántico hacia lo social; ''majestad'' interpreta más de lo que traduce.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. La lectura española 'Yahvé' preserva el nombre personal de Dios conforme a la política doctrinal del proyecto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo cruzado mostró alta concordancia; por tanto, se mantiene la línea de traducción estable sin ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme al criterio del proyecto.
  - '''Gloria'' se conserva para כְּבוֹד por consistencia teológica y lexical.'
  - La nota al pie conserva la alternativa semántica entre ubicación literal y tema del canto, como en el audit trail inglés.
