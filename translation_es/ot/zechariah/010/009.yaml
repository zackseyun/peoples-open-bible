translation:
  language: es
  text: Los sembraré entre los pueblos[a], y en lugares distantes me recordarán; vivirán con sus hijos[b] y volverán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los dispersaré entre los pueblos’. El verbo hebreo dice literalmente ‘sembrar’, y puede implicar tanto dispersión como una siembra intencional para futuro incremento.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘y vivirán con sus hijos’, o ‘ellos y sus hijos vivirán’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶזְרָעֵם
  english_pob_choice: I will sow them
  chosen_spanish: Los sembraré
  alternatives_spanish:
  - Los esparciré
  - Los plantaré
  lexicon: HALOT
  rationale: זרע conserva en español la imagen agrícola de sembrar, que mantiene tanto la dispersión como la intención de futuro crecimiento. ‘Esparcir’ reduciría la metáfora a dispersión; ‘plantar’ desplaza la imagen desde la siembra hacia el establecimiento.
- source_word: בָּעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: עַמִּים puede significar ‘pueblos’ o ‘naciones’. En español, ‘pueblos’ preserva mejor el matiz étnico-colectivo sin cargar la frase con la connotación moderna de Estado que puede tener ‘naciones’.
- source_word: וּבַמֶּרְחַקִּים
  english_pob_choice: in distant places
  chosen_spanish: en lugares distantes
  alternatives_spanish:
  - en regiones lejanas
  - en tierras lejanas
  - a la distancia
  lexicon: HALOT
  rationale: מֶרְחָק expresa distancia o lejanía espacial. ‘Lugares distantes’ es natural en español y mantiene el sentido locativo sin añadir interpretación geográfica precisa.
- source_word: יִזְכְּרוּנִי
  english_pob_choice: they will remember me
  chosen_spanish: me recordarán
  alternatives_spanish:
  - me tendrán presente
  - se acordarán de mí
  lexicon: HALOT
  rationale: זכר con sufijo de primera persona singular significa ‘recordar me’. ‘Me recordarán’ es la forma más directa y sobria; no se añade ‘allí’ porque el hebreo no lo expresa explícitamente.
- source_word: וְחָיוּ
  english_pob_choice: they will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - seguirán viviendo
  - tendrán vida
  lexicon: HALOT
  rationale: חיה en este contexto futuro comunica vida continuada o renovada. ‘Vivirán’ preserva esa amplitud sin forzar una lectura de mera supervivencia o resurrección.
- source_word: אֶת בְּנֵיהֶם
  english_pob_choice: with their children
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - y sus hijos
  - junto con sus hijos
  lexicon: HALOT
  rationale: Aquí אֶת funciona en sentido comitativo. ‘Con sus hijos’ reproduce la relación de compañía y evita convertir la frase en dos acciones separadas.
- source_word: וָשָׁבוּ
  english_pob_choice: they will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - retornarán
  lexicon: HALOT
  rationale: שוב expresa volver o regresar. ‘Volverán’ es la opción más natural y mantiene tanto la idea física de regreso como el trasfondo de restauración covenantal.
theological_decisions:
- issue: Metáfora de sembrar en contexto de restauración
  english_pob_reading: The verse speaks of purposeful dispersion that leads to remembrance and eventual return.
  chosen_spanish_reading: La siembra expresa una dispersión con propósito, ordenada a que recuerden a Yahvé y después vuelvan.
  alternative_spanish_readings:
  - La frase describe solo un castigo de dispersión.
  - La imagen describe solo una plantación para aumento entre los pueblos.
  rationale: En el contexto inmediato, la metáfora no debe reducirse ni a juicio puro ni a crecimiento puramente positivo. ‘Sembraré’ conserva la tensión entre dispersión y futuro fructífero, en línea con la lectura auditada del inglés POB.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Relación entre recordar y volver
  english_pob_reading: Memory of God precedes lived restoration.
  chosen_spanish_reading: Primero me recordarán, y luego vivirán y volverán.
  alternative_spanish_readings:
  - Recordarán a Dios como simple remembranza mental.
  - El regreso se entiende como arrepentimiento interior בלבד.
  rationale: El hebreo presenta el recuerdo de Dios como parte del movimiento restaurador, no como un mero acto mental aislado. La traducción mantiene la secuencia y no añade una lectura explícitamente penitencial que el texto no formula.
  doctrine_reference: Translation philosophy §3; coherencia con el hebreo sintáctico
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada del inglés POB que ajustó el final para reflejar mejor la sintaxis hebrea: ‘vivirán con sus hijos y volverán’. La versión española reproduce esa relación sin separar indebidamente el vivir del volver.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino según el estándar del proyecto.
  - Se conserva el verbo ‘sembrar’ para preservar la metáfora agrícola y su tensión semántica.
  - ‘Pueblos’ se usa para עַמִּים por consistencia con el sentido colectivo y étnico.
  - ‘Con sus hijos’ refleja el valor comitativo de אֶת en este contexto.
  - ‘Volverán’ evita sobrecargar שוב con ‘arrepentirse’, que no está explícito aquí.
