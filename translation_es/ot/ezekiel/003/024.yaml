translation:
  language: es
  text: 'Entonces el Espíritu entró en mí y me puso de pie[a], y me habló y me dijo: «Ve[b], enciérrate dentro de tu casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu entró en mí».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo literalmente: «Ven, enciérrate dentro de tu casa». Aquí se prefiere «Ve» por ser la forma idiomática en español en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֔וּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - viento
  - aliento
  lexicon: HALOT
  rationale: En este contexto de investidura profética en Ezequiel, רוּחַ se entiende mejor como el Espíritu divino; por eso se conserva la mayúscula en español. La ausencia de artículo en hebreo no obliga a un indefinido si el referente es claro por el contexto.
- source_word: וַ/תָּבֹא בִ֣/י
  english_pob_choice: entered into me
  chosen_spanish: entró en mí
  alternatives_spanish:
  - vino a mí
  - vino dentro de mí
  lexicon: HALOT
  rationale: La construcción con בּוֹא y la preposición בְּ + objeto personal expresa entrada en la persona. «Entró en mí» reproduce con naturalidad y fidelidad esa imagen sin sobrecargar el español.
- source_word: וַ/תַּעֲמִדֵ֖/נִי עַל רַגְלָ֑/י
  english_pob_choice: set me on my feet
  chosen_spanish: me puso sobre mis pies
  alternatives_spanish:
  - me hizo ponerme de pie
  - me hizo estar sobre mis pies
  - me levantó
  lexicon: HALOT
  rationale: El hifil de עמד tiene fuerza causativa. «Me puso sobre mis pies» preserva la idea de causar que el profeta quede erguido, y mantiene una imagen corporal cercana al hebreo.
- source_word: וַ/יְדַבֵּר אֹתִ/י֙
  english_pob_choice: he spoke to me
  chosen_spanish: me habló
  alternatives_spanish:
  - habló conmigo
  - me dijo
  lexicon: HALOT
  rationale: Aunque la construcción hebrea con אֹתִי es inusual, el contexto introduce discurso dirigido al profeta. «Me habló» conserva la dirección interpersonal del acto de hablar sin forzar una literalidad extraña en español.
- source_word: בֹּ֥א
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Ven
  - Anda
  lexicon: HALOT
  rationale: El hebreo literal sería «ven», pero en este mandato de desplazamiento el español idiomático y natural es «ve». Se conserva la tensión documentada por la nota inglesa sobre el valor literal versus el uso idiomático.
- source_word: הִסָּגֵ֖ר
  english_pob_choice: shut yourself inside
  chosen_spanish: enciérrate
  alternatives_spanish:
  - ciérrate
  - déjate encerrar
  - encuádrate
  lexicon: HALOT
  rationale: 'El nifal imperativo tiene valor reflexivo/pasivo: retirarse y quedar encerrado. «Enciérrate» transmite la orden de permanecer apartado de manera clara y natural en español.'
- source_word: בְּ/ת֥וֹךְ בֵּיתֶֽ/ךָ
  english_pob_choice: inside your house
  chosen_spanish: dentro de tu casa
  alternatives_spanish:
  - en medio de tu casa
  - en tu casa
  lexicon: HALOT
  rationale: בְּתוֹךְ literalmente es «en medio de», pero aquí el sentido es estar dentro de la casa. «Dentro de tu casa» conserva el matiz espacial de interioridad con buena naturalidad.
theological_decisions:
- issue: Identificación de רוּחַ
  english_pob_reading: the Spirit refers to the divine Spirit empowering Ezekiel
  chosen_spanish_reading: el Espíritu se refiere al Espíritu divino que capacita a Ezequiel
  alternative_spanish_readings:
  - un espíritu entró en mí
  - un aliento entró en mí
  rationale: El contexto inmediato de Ezequiel presenta al profeta siendo habilitado para su comisión; por eso se mantiene una lectura definida y teológicamente coherente con el pasaje. La mayúscula en «Espíritu» sigue esa lectura sin añadir contenido ajeno al texto.
  doctrine_reference: Ezequiel 2:2; 3:12; 37:1
translation_notes:
  revision_awareness: Se siguió el ajuste final del audit trail inglés que prefirió «spoke to me» frente a «spoke with me», reflejado en español como «me habló». También se mantuvo la nota de alternativa para el valor literal de בֹּא, pero el cuerpo principal usa la forma idiomática «Ve»/«enciérrate» conforme al uso natural del español.
  spanish_consistency_notes:
  - Se conserva «Espíritu» con mayúscula por la lectura contextual del Espíritu divino.
  - Se evita «SEÑOR» o sustituciones litúrgicas porque el verso no contiene el tetragrámaton.
  - «Pies» y «casa» se mantienen en registros sencillos y fieles al hebreo, sin amplificación interpretativa.
  - La combinación «Ve, enciérrate» sigue la tensión literal/idiomática documentada en la nota inglesa, sin ocultarla.
