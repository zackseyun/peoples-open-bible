translation:
  language: es
  text: Pero si se asombraron de su poder y actividad[a], que entiendan, a partir de ellos, cuánto más poderoso es el que los hizo;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su poder y su obrar'. El griego yuxtapone δύναμις con ἐνέργεια para describir la fuerza impresionante y el funcionamiento activo de las cosas creadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμει
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: El dativo va en paralelo con ἐνεργείᾳ y describe la capacidad impresionante de las cosas creadas. 'Poder' conserva bien esa idea y permite mantener el contraste con 'más poderoso' al final.
- source_word: ἐνεργείᾳ
  english_pob_choice: activity
  chosen_spanish: actividad
  alternatives_spanish:
  - operación
  - obrar
  - funcionamiento
  lexicon: BDAG
  rationale: La palabra señala la acción eficaz o funcionamiento activo. 'Actividad' es natural en español y conserva el paralelismo con 'poder' sin introducir una carga filosófica innecesaria.
- source_word: ἐκπλαγέντες
  english_pob_choice: were astonished
  chosen_spanish: se asombraron
  alternatives_spanish:
  - quedaron pasmados
  - quedaron asombrados
  lexicon: BDAG
  rationale: El participio expresa quedar fuertemente impresionados o maravillados. 'Se asombraron' es idiomático y comunica bien la reacción intensa.
- source_word: νοησάτωσαν
  english_pob_choice: let them understand
  chosen_spanish: que entiendan
  alternatives_spanish:
  - que perciban
  - que consideren
  lexicon: BDAG
  rationale: El imperativo llama a una conclusión intelectual. 'Que entiendan' transmite de forma clara la inferencia racional exigida por el autor.
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: a partir de ellos
  alternatives_spanish:
  - desde ellos
  - a partir de estas cosas
  lexicon: BDAG
  rationale: La inferencia se extrae de las cosas creadas mencionadas antes. 'A partir de ellos' hace explícito ese valor inferencial sin añadir contenido nuevo.
- source_word: πόσῳ
  english_pob_choice: how much more
  chosen_spanish: cuánto más
  alternatives_spanish:
  - mucho más
  - por cuánto más
  lexicon: BDAG
  rationale: La construcción comparativa es intensiva e inferencial. 'Cuánto más' es la forma natural en español para este razonamiento comparativo.
- source_word: ὁ κατασκευάσας
  english_pob_choice: the one who made
  chosen_spanish: el que los hizo
  alternatives_spanish:
  - el que los formó
  - el que los construyó
  lexicon: BDAG
  rationale: El participio designa al autor/hacedor de las criaturas. 'El que los hizo' es fiel, claro y evita un término demasiado técnico o menos idiomático.
- source_word: δυνατώτερός
  english_pob_choice: more powerful
  chosen_spanish: más poderoso
  alternatives_spanish:
  - más fuerte
  - más capaz
  lexicon: BDAG
  rationale: El comparativo responde directamente a la mención previa del 'poder' de lo creado. 'Más poderoso' conserva la conexión léxica y el énfasis argumentativo.
theological_decisions:
- issue: Referente implícito del hacedor
  english_pob_reading: Render generically as 'the one who made them' without inserting 'God' into the main text.
  chosen_spanish_reading: 'Mantener la referencia descriptiva: ''el que los hizo'', sin añadir ''Dios'' en el texto principal.'
  alternative_spanish_readings:
  - el Creador
  - Dios que los hizo
  rationale: El griego nombra al creador por descripción, no por título explícito. Conservar esa forma respeta la estrategia retórica del pasaje, que razona desde lo creado hacia su autor.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la decisión inglesa de mantener la comparación inferencial. Se trasladó ἐνεργείᾳ como 'actividad' en el texto principal por naturalidad en español, mientras la nota conserva la alternativa 'obrar' para reflejar la fuerza léxica del término. Se mantuvo el referente del hacedor de forma descriptiva, sin insertar 'Dios' en el cuerpo principal.
  spanish_consistency_notes:
  - Se preserva el paralelismo entre 'poder' y 'actividad' para reflejar δύναμις / ἐνέργεια.
  - '''Cuánto más'' reproduce el valor comparativo de πόσῳ de manera idiomática.'
  - '''El que los hizo'' mantiene el referente descriptivo del griego y armoniza con el enfoque auditado en inglés.'
  - El tono es formal y apto para publicación, sin calco rígido ni paráfrasis libre.
