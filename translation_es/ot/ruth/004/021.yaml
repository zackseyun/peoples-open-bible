review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura genealógica hebrea y el sentido de הוֹלִיד como verbo genealógico. La coordinación con «Y ... y ...» está bien preservada. Sin embargo, la nota al pie no preserva bien la alternativa inglesa porque repite «engendró» como principal y como alternativa; debe reflejar la alternativa «fue padre de» o «llegó a ser padre de».
  spanish_quality_summary: El español es claro y natural para una genealogía bíblica. «Engendró» funciona bien en registro digno y legible. Los nombres «Salmón», «Booz» y «Obed» son formas tradicionales y plenamente comprensibles en español eclesial. El único problema real es la nota, que resulta redundante e inexacta frente al expediente inglés.
  glossary_alignment: No hay términos teológicos sensibles aquí. El uso de «engendró» para הוֹלִיד está alineado con la rationale documentada. La elección de «Booz» en vez de «Boaz» es una adaptación española aceptable y más idiomática en contexto bíblico.
  issues:
  - severity: medium
    issue: La nota al pie repite «engendró» como alternativa lexical.
    rationale: El inglés documenta una alternativa real («begot» / «became the father of»). En español, decir «O “engendró”» no añade información porque ya es la forma usada en el texto principal. Debe ofrecerse una alternativa distinta y fiel al sentido, como «fue padre de».
  revised_spanish_text: Y Salmón engendró a Booz[a], y Booz engendró a Obed.
  revised_footnotes:
  - marker: a
    text: O «fue padre de». El verbo hebreo es un término genealógico estándar que significa «engendró» o «fue padre de».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural. Solo se corrige la nota al pie para que presente una alternativa léxica real y coherente con la evidencia fuente y el audit trail inglés.
