translation:
  language: es
  text: 'Entonces Arauná dijo a David: «Que mi señor el rey tome y ofrezca lo que le parezca bueno[a]. Mire, los bueyes son para el holocausto, y los trillos y los implementos[b] de los bueyes son para la leña».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo bueno ante sus ojos». El hebreo dice literalmente «lo bueno en sus ojos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el equipo de los bueyes». La frase hebrea es amplia y puede referirse en general a los aparejos de madera de los bueyes usados como combustible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרַוְנָה / Araunah
  english_pob_choice: Araunah
  chosen_spanish: Arauná
  alternatives_spanish:
  - Araunah
  lexicon: WLC / uso propio del nombre
  rationale: Se conserva el nombre propio del personaje con adaptación gráfica mínima al español para facilitar la lectura, sin cambiar la identificación histórica.
- source_word: יִקַּח
  english_pob_choice: Let ... take
  chosen_spanish: Tome
  alternatives_spanish:
  - Que tome
  - Puede tomar
  lexicon: HALOT
  rationale: El jussivo en el discurso directo expresa permiso o invitación. «Tome» mantiene el tono deferente y suena natural en español.
- source_word: וְיַעַל
  english_pob_choice: and offer up
  chosen_spanish: y haga subir
  alternatives_spanish:
  - y ofrezca
  - y sacrifique
  lexicon: HALOT
  rationale: עלה en contexto sacrificial mantiene el matiz de ‘hacer subir’ una ofrenda; se conserva la relación verbal con «holocausto» y se evita perder la imagen del hebreo.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  lexicon: HALOT
  rationale: Se reproduce el giro cortesano con el orden natural del español, manteniendo respeto y título real sin recargar la puntuación.
- source_word: הַטּוֹב בְּעֵינָיו
  english_pob_choice: what is good in his eyes
  chosen_spanish: lo bueno a sus ojos
  alternatives_spanish:
  - lo que le parezca bueno
  - lo que sea bueno ante sus ojos
  lexicon: HALOT
  rationale: Se preserva la idiomática hebrea de forma transparente. «A sus ojos» conserva la metáfora sin explicarla en exceso, como hace la POB inglesa.
- source_word: רְאֵה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mire
  - Ve
  lexicon: HALOT
  rationale: Interjección discursiva para llamar la atención sobre lo ofrecido. «Mira» es claro y moderno en español.
- source_word: הַבָּקָר
  english_pob_choice: the oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - los oxen
  - el ganado
  lexicon: HALOT
  rationale: En este contexto son animales de labor ligados al trillo y aptos para sacrificio; «bueyes» es el equivalente más natural y específico en español.
- source_word: לָעֹלָה
  english_pob_choice: for the burnt offering
  chosen_spanish: para el holocausto
  alternatives_spanish:
  - para la ofrenda quemada
  - para el sacrificio quemado
  lexicon: HALOT
  rationale: «Holocausto» es el término tradicional y preciso en español para la ofrenda totalmente quemada; mantiene la conexión terminológica con la práctica sacrificial.
- source_word: הַמֹּרִגִּים
  english_pob_choice: the threshing sledges
  chosen_spanish: los trillos
  alternatives_spanish:
  - los trillos de trillar
  - los trineos de trillar
  lexicon: HALOT
  rationale: מורג se refiere al instrumento de trilla; «trillos» es el equivalente español breve y comprensible, más natural que una perífrasis.
- source_word: כְלֵי הַבָּקָר
  english_pob_choice: the implements of the oxen
  chosen_spanish: los implementos de los bueyes
  alternatives_spanish:
  - el equipo de los bueyes
  - los aperos de los bueyes
  lexicon: HALOT
  rationale: El hebreo es amplio y puede abarcar el equipo de madera asociado a los bueyes. Se evita especificar indebidamente «yugos», siguiendo la revisión inglesa que corrigió una restricción excesiva.
- source_word: לָעֵצִים
  english_pob_choice: for the wood
  chosen_spanish: para la leña
  alternatives_spanish:
  - para la madera
  - como leña
  lexicon: HALOT
  rationale: El contexto indica uso como combustible para el sacrificio. «Leña» comunica mejor en español la función de combustible que «madera».
theological_decisions:
- issue: La frase de permiso/invitación frente a una orden
  english_pob_reading: Let my lord the king take and offer up...
  chosen_spanish_reading: Tome mi señor el rey... y haga subir
  alternative_spanish_readings:
  - Que mi señor el rey tome...
  - Mi señor el rey puede tomar...
  rationale: El hebreo jussivo en discurso directo expresa cortesía y autorización, no mandato duro. La formulación elegida conserva esa deferencia.
  doctrine_reference: Pragmática del imperativo/jussivo en narrativa bíblica; cf. HALOT y uso contextual del discurso directo.
- issue: Naturaleza de כְלֵי הַבָּקָר
  english_pob_reading: the implements of the oxen
  chosen_spanish_reading: los implementos de los bueyes
  alternative_spanish_readings:
  - los aperos de los bueyes
  - el equipo de los bueyes
  rationale: Se mantiene la amplitud semántica sin fijar indebidamente el sentido a un solo objeto. Esto evita perder la tensión léxica documentada por la revisión inglesa.
  doctrine_reference: Principio de transparencia lexical y cautela exegética en términos de equipo agrícola.
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió «yokes of the oxen» por «implements of the oxen» para reflejar el sentido más amplio de כְלֵי. La versión española sigue esa revisión y evita una especificación excesiva, manteniendo la amplitud del hebreo. También conserva la relación entre «haga subir» y «holocausto» para no diluir el vínculo verbal del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se prefirió «holocausto» por su precisión sacrificial en español y por la correspondencia tradicional con עֹלָה.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque aquí no aparece el tetragrámaton.
  - «Arauná» adapta el nombre para fluidez en español sin alterar la referencia textual.
  - La puntuación con comillas angulares se usa para una presentación bíblica moderna y legible.
