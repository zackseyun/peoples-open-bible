translation:
  language: es
  text: 'Y David tomó de su mano lo que ella le había traído, y le dijo: «Sube en paz a tu casa. Mira, he escuchado tu voz y te he aceptado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «te he mostrado favor» o «te he aceptado»; el hebreo literalmente dice: «he levantado tu rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  lexicon: HALOT
  rationale: לקח expresa la acción concreta de tomar. «Tomó» conserva esa concreción mejor que una versión más interpretativa como «recibió».
- source_word: מִיָּדָהּ
  english_pob_choice: from her hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de ella
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de su mano». Mantener «mano» conserva la vividez idiomática del texto fuente.
- source_word: אֵת אֲשֶׁר הֵבִיאָה לוֹ
  english_pob_choice: what she had brought him
  chosen_spanish: lo que ella le había traído
  alternatives_spanish:
  - aquello que ella le había traído
  - lo que ella había traído para él
  lexicon: HALOT
  rationale: 'La frase relativa se vierte de forma natural en español sin perder el contenido: el obsequio/provisión que Abigail llevó a David.'
- source_word: עֲלִי
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve
  - Regresa
  lexicon: HALOT
  rationale: עלה significa literalmente «sube». En español, «sube» conserva el sentido verbal directo; «ve» o «regresa» serían más interpretativos.
- source_word: לְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: La expresión idiomática indica partida bajo paz y seguridad. «En paz» es natural y fiel al hebreo.
- source_word: לְבֵיתֵךְ
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  lexicon: HALOT
  rationale: בית aquí señala la casa como destino; «casa» es la opción más directa y transparente.
- source_word: רְאִי
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Observa
  - Fíjate
  lexicon: HALOT
  rationale: Es un imperativo de llamado a la atención. «Mira» resulta claro y natural en español moderno.
- source_word: שָׁמַעְתִּי בְקוֹלֵךְ
  english_pob_choice: I have listened to your voice
  chosen_spanish: he escuchado tu voz
  alternatives_spanish:
  - te he escuchado
  - he prestado atención a tu voz
  - he hecho caso a lo que dijiste
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «oír la voz de». «He escuchado tu voz» preserva el giro semítico y sigue siendo comprensible; en contexto implica haber atendido la petición.
- source_word: וָאֶשָּׂא פָּנָיִךְ
  english_pob_choice: accepted you
  chosen_spanish: te he aceptado
  alternatives_spanish:
  - te he mostrado favor
  - te he favorecido
  - te he levantado el rostro
  lexicon: HALOT
  rationale: El hebreo contiene el modismo de «levantar el rostro», que puede significar mostrar favor o aceptar. Dado el pasaje y la revisión inglesa final, «te he aceptado» es la forma más natural y fiel en español, sin ocultar la tensión idiomática.
theological_decisions:
- issue: Modismo hebreo de נשׂא פנים en v. 35
  english_pob_reading: accepted you
  chosen_spanish_reading: te he aceptado
  alternative_spanish_readings:
  - te he mostrado favor
  - te he favorecido
  - te he levantado el rostro
  rationale: No se trata de una cuestión doctrinal mayor, pero sí de un modismo importante. En español, «te he aceptado» comunica el resultado pragmático del gesto, mientras que las alternativas conservan con más detalle el trasfondo idiomático si se necesita anotación.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que prefirió «accepted you» frente a «accepted your person». Por eso la versión principal usa «te he aceptado», manteniendo la naturalidad en español y dejando constancia del modismo hebreo en la nota.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo de segunda persona singular femenino («tu», «te») conforme al hebreo.
  - «Sube en paz» refleja la secuencia verbal e idiomática del original sin reemplazarla por una paráfrasis más libre.
  - Se mantuvo «mano» y «voz» para conservar los sustantivos concretos del hebreo, como hace el POB inglés.
  - No se introdujo «SEÑOR» ni terminología cristianizada ajena al texto; este versículo no contiene el Tetragrámaton ni títulos divinos.
