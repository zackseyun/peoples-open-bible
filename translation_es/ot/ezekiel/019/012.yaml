translation:
  language: es
  text: Pero fue arrancada en furor; fue arrojada a tierra[a]. Y el viento del oriente secó su fruto; su rama fuerte[b] se quebró y se secó; fuego lo consumió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al suelo'.
    reason: alternative_reading
  - marker: b
    text: O 'cetro poderoso' o 'vara de su fuerza'; el hebreo puede llevar tanto la imagen de una rama como un trasfondo de autoridad real en este lamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֻּתַּשׁ
  english_pob_choice: was uprooted
  chosen_spanish: fue arrancada
  alternatives_spanish:
  - fue desarraigada
  - fue arrancada de raíz
  lexicon: HALOT
  rationale: El hebreo transmite una remoción violenta de la planta, con imagen de arranque desde la raíz. 'Fue arrancada' es natural en español y conserva la violencia del acto sin sobrecargar la frase.
- source_word: בְּחֵמָה
  english_pob_choice: in wrath
  chosen_spanish: en furor
  alternatives_spanish:
  - en ira
  - con furor
  lexicon: HALOT
  rationale: חֵמָה expresa ira ardiente o furor. 'En furor' mantiene la concisión preposicional y el tono de juicio. 'Ira' también sería posible, pero 'furor' refleja mejor la intensidad del término.
- source_word: לָאָרֶץ הֻשְׁלָכָה
  english_pob_choice: was cast down to the ground
  chosen_spanish: fue arrojada a tierra
  alternatives_spanish:
  - fue echada a tierra
  - fue lanzada al suelo
  lexicon: HALOT
  rationale: La combinación verbal y preposicional subraya humillación y caída violenta. 'Arrojada a tierra' conserva el movimiento hacia abajo y el registro formal. 'A tierra' evita forzar un equivalente más interpretativo como 'al suelo'.
- source_word: וְר֥וּחַ הַקָּדִים
  english_pob_choice: the east wind
  chosen_spanish: el viento del oriente
  alternatives_spanish:
  - el viento oriental
  - el viento de oriente
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y designa el viento destructivo procedente del este. 'Del oriente' es una forma clara y natural en español, y mantiene el valor direccional sin perder el tono bíblico.
- source_word: הוֹבִ֣ישׁ פִּרְיָ֑הּ
  english_pob_choice: dried up her fruit
  chosen_spanish: secó su fruto
  alternatives_spanish:
  - secó su fruto de raíz
  - hizo secar su fruto
  lexicon: HALOT
  rationale: El causativo del verbo indica que el viento hizo secar el fruto. 'Secó su fruto' es breve y fiel; el objeto singular colectivo funciona bien en español como imagen de la descendencia o producción de la vid.
- source_word: הִתְפָּרְק֧וּ
  english_pob_choice: was broken off
  chosen_spanish: se quebró
  alternatives_spanish:
  - se rompió
  - fue quebrada
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, la imagen poética concentra la referencia en la rama principal. 'Se quebró' conserva la idea de ruptura y suena más natural que una construcción pasiva más pesada. Responde al ajuste de la revisión inglesa hacia 'broken off'.
- source_word: וְיָבֵ֛שׁוּ
  english_pob_choice: and withered
  chosen_spanish: y se secó
  alternatives_spanish:
  - y se marchitó
  - y quedó seca
  lexicon: HALOT
  rationale: Después de la quiebra, el texto describe el estado resultante. 'Se secó' evita repetir excesivamente 'secó' del fruto y mantiene el paralelismo agrícola. 'Marchitó' sería posible, pero 'se secó' sigue más de cerca el campo semántico del hebreo.
- source_word: מַטֵּה עֻזָּהּ
  english_pob_choice: her strong branch
  chosen_spanish: su rama fuerte
  alternatives_spanish:
  - su rama poderosa
  - su vara fuerte
  - su cetro de fuerza
  lexicon: HALOT
  rationale: מַטֶּה puede referirse a rama, vara o cetro según el contexto. En esta estrofa de vid, la imagen vegetal es primaria, por eso se traduce 'rama'. 'Fuerte' preserva עֻזָּהּ. El posible matiz real queda documentado en nota.
- source_word: אֵשׁ אֲכָלָתְהוּ
  english_pob_choice: fire consumed it
  chosen_spanish: fuego la consumió
  alternatives_spanish:
  - el fuego la devoró
  - fuego la devoró
  lexicon: HALOT
  rationale: La construcción final describe destrucción total por fuego. 'La consumió' es idiomático y solemne en español bíblico, y mantiene el cierre abrupto del verso.
theological_decisions:
- issue: Mantener la tensión entre imagen de vid y posible eco real en מַטֵּה עֻזָּהּ
  english_pob_reading: her strong branch; footnote notes possible 'mighty scepter' or 'rod of her strength'
  chosen_spanish_reading: su rama fuerte[b]
  alternative_spanish_readings:
  - su cetro poderoso
  - la vara de su fuerza
  - su vara de poder
  rationale: 'El contexto inmediato es una lamentación con metáfora vegetal: vid, fruto, rama, secado y fuego. Por eso la lectura principal debe conservar la imagen arbórea. Sin embargo, el término puede resonar con el gobierno real de la dinastía; la nota preserva esa tensión sin borrar la metáfora local.'
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente en la preferencia por un registro formal ('cast down' -> 'arrojada') y por 'broken off' como 'se quebró'. También conserva la decisión auditada de mantener la imagen de la vid en el texto principal y documentar el matiz real en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - '''Furor'' se usa aquí por el valor intenso de חֵמָה, sin desplazarlo por ''ira'' para conservar el tono del juicio.'
  - '''Rama'' se eligió en vez de ''cetro'' para no perder la metáfora agrícola dominante; la ambigüedad queda señalada en nota.'
  - '''Consumió'' reproduce el cierre total del acto del fuego sin introducir mayor explicitación que la del hebreo.'
