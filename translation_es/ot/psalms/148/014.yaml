  text: וַ/יָּ֤רֶם קֶ֨רֶן לְ/עַמּ֡/וֹ תְּהִלָּ֤ה לְֽ/כָל חֲסִידָ֗י/ו לִ/בְנֵ֣י יִ֭שְׂרָאֵל עַֽם קְרֹב֗/וֹ הַֽלְלוּ יָֽהּ׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/148/014.yaml
  text: And he has raised up a horn for his people[a], praise for all his faithful ones, for the sons of Israel, the people near to him[d][c][b]. Praise Yah!
  footnotes:
  - marker: a
    text: Or 'a praise for all his faithful ones'; the Hebrew syntax after 'raised up a horn for his people' is compressed and may be taken appositionally or resultatively.
    reason: alternative_reading
  - marker: b
    text: '''Horn'' is a Hebrew metaphor for strength, honor, or exalted power.'
    reason: cultural_note
  - marker: c
    text: Or 'for the children of Israel.' The Hebrew is literally 'for the sons of Israel.'
    reason: lexical_alternative
  - marker: d
    text: '''Praise Yah'' is the meaning of the liturgical expression ''Hallelujah.'''
    reason: lexical_alternative
