translation:
  language: es
  text: 'Maldito el que deshonra[a] a su padre o a su madre. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trata con ligereza», «menosprecia» o «muestra desprecio por». El verbo hebreo expresa tratar a alguien como insignificante o despreciable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldito
  - Bajo maldición
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula de maldición legal-cúltica. En español, «maldito» comunica con naturalidad ese estado de estar bajo maldición sin perder la fuerza solemne del enunciado.
- source_word: מַקְלֶה
  english_pob_choice: dishonors
  chosen_spanish: desprecia
  alternatives_spanish:
  - trata con ligereza
  - menosprecia
  - muestra desprecio por
  lexicon: HALOT
  rationale: El verbo expresa tratar como algo ligero o sin valor, con sentido de menosprecio público/social. «Desprecia» conserva bien esa carga de deshonra sin volver el texto demasiado técnico o abstracto.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - a su papá
  lexicon: HALOT
  rationale: La construcción con sufijo de tercera persona masculina singular se vierte de forma directa e idiomática en español con «a su padre».
- source_word: וְאִמּוֹ
  english_pob_choice: or his mother
  chosen_spanish: o a su madre
  alternatives_spanish:
  - y a su madre
  - o su madre
  lexicon: HALOT
  rationale: Aunque el hebreo usa la conjunción «y», la función distributiva del precepto en este contexto legal queda mejor expresada en español con «o», como en la traducción inglesa auditada.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo el pueblo». Se mantiene esa formulación sin añadir «de Israel», que no está explícito en el texto.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: La aclamación litúrgica se preserva por transliteración, que es la forma habitual y mantiene el carácter ritual de respuesta.
theological_decisions:
- issue: Naturaleza del agravio contra los padres
  english_pob_reading: Rendered the offense as public/social dishonor rather than merely emotional dislike or only verbal cursing.
  chosen_spanish_reading: Se expresó como desprecio/deshonor social, no sólo como antipatía interna o insulto verbal aislado.
  alternative_spanish_readings:
  - deshonra a su padre o a su madre
  - trata con ligereza a su padre o a su madre
  - menosprecia a su padre o a su madre
  rationale: El verbo hebreo denota tratar a alguien como algo liviano o despreciable. «Desprecia» comunica esa tensión ética sin reducir el mandato a un solo acto externo ni resolver de más la amplitud del original.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión léxico-teológica sin sobrerresolverla
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios aplicados en el expediente inglés y el consenso de revisión es alto.'
  spanish_consistency_notes:
  - Se preservó la fórmula legal de maldición con un español natural y solemne.
  - Se mantuvo «pueblo» sin ampliar innecesariamente a «pueblo de Israel».
  - Se conservó «Amén» como respuesta litúrgica estándar.
  - La nota de pie de página se ancló en el verbo principal para reflejar la alternativa léxica documentada.
