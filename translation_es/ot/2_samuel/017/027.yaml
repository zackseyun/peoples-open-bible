translation:
  language: es
  text: Cuando David llegó a Mahanaím, Sobí hijo de Nahás, de Rabá de los amonitas, y Maquir hijo de Amiel, de Lo-debar, y Barzilái el galaadita, de Rogelim,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: Y cuando ...
  alternatives_spanish:
  - Ahora ...
  - Y aconteció que ...
  lexicon: HALOT
  rationale: La función discursiva de וַיְהִי aquí introduce una nueva escena narrativa. En español, un enlace simple con 'Y cuando' conserva la transición sin cargar el texto con una fórmula demasiado mecánica.
- source_word: כְּבוֹא
  english_pob_choice: when ... came
  chosen_spanish: llegó
  alternatives_spanish:
  - cuando vino
  - cuando llegó
  lexicon: HALOT
  rationale: El infinitivo constructo temporal expresa la llegada de David; 'llegó' comunica de forma natural el valor temporal y el movimiento hacia Mahanaim.
- source_word: מַחֲנָיְמָה
  english_pob_choice: to Mahanaim
  chosen_spanish: a Mahanaim
  alternatives_spanish:
  - hacia Mahanaim
  - a Mahanaim
  lexicon: HALOT
  rationale: El sufijo direccional apunta al destino del movimiento. 'A Mahanaim' es claro y fiel en español.
- source_word: שֹׁבִי
  english_pob_choice: Shobi
  chosen_spanish: Shobi
  alternatives_spanish:
  - Sobi
  lexicon: HALOT
  rationale: Se translitera el nombre propio; se conserva la forma del inglés POB como apoyo auditivo, sin castellanizar de manera no documentada.
- source_word: בֶן נָחָשׁ
  english_pob_choice: son of Nahash
  chosen_spanish: hijo de Nahash
  alternatives_spanish:
  - hijo de Najas
  lexicon: HALOT
  rationale: La construcción patronímica se mantiene de forma directa. 'Hijo de Nahash' es la equivalencia natural y transparente en español.
- source_word: מֵרַבַּת בְּנֵי עַמּוֹן
  english_pob_choice: from Rabbah of the Ammonites
  chosen_spanish: de Rabá de los amonitas
  alternatives_spanish:
  - de Rabá de los hijos de Amón
  - de Rabá de los amonitas
  lexicon: HALOT
  rationale: El topónimo se adapta a la forma habitual 'Rabá', y el grupo étnico/geopolítico se expresa como 'amonitas'. Se preserva la relación locativa sin sobrerrepresentar la construcción hebrea.
- source_word: מָכִיר
  english_pob_choice: Machir
  chosen_spanish: Macir
  alternatives_spanish:
  - Machir
  lexicon: HALOT
  rationale: Se opta por 'Macir' para una ortografía española más natural, manteniendo la transliteración del nombre propio. La forma alternativa 'Machir' queda documentada como posibilidad.
- source_word: בֶּן עַמִּיאֵל
  english_pob_choice: son of Ammiel
  chosen_spanish: hijo de Amiel
  alternatives_spanish:
  - hijo de Ammiel
  lexicon: HALOT
  rationale: El patronímico se conserva. 'Amiel' es una forma española más fluida y ampliamente inteligible, sin alterar el nombre hebreo.
- source_word: מִלֹּא דְבָר
  english_pob_choice: from Lo-debar
  chosen_spanish: de Lo-debar
  alternatives_spanish:
  - de Lo Debar
  lexicon: HALOT
  rationale: Se mantiene el nombre del lugar en forma transliterada con guion, siguiendo el uso convencional en español bíblico y evitando una glosa interpretativa.
- source_word: בַרְזִלַּי
  english_pob_choice: Barzillai
  chosen_spanish: Barzilay
  alternatives_spanish:
  - Barzilai
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación gráfica española. 'Barzilay' refleja mejor la pronunciación natural en español sin apartarse del nombre hebreo.
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - el de Galaad
  - el gileadita
  lexicon: HALOT
  rationale: El gentilicio se vierte como 'galaadita', una forma española transparente para indicar procedencia regional. Se evita reemplazarlo por una etiqueta eclesiástica o una paráfrasis.
- source_word: מֵרֹגְלִים
  english_pob_choice: from Rogelim
  chosen_spanish: de Rogelim
  alternatives_spanish:
  - de Rogelim
  lexicon: HALOT
  rationale: Se conserva el topónimo mediante transliteración. La preposición 'de' comunica la procedencia indicada por el hebreo.
theological_decisions:
- issue: Tratamiento de los nombres propios y topónimos sin domesticación doctrinal
  english_pob_reading: The verse is a purely narrative identification list with no added theological gloss.
  chosen_spanish_reading: Se mantiene una trasliteración sobria de los nombres y lugares, sin reinterpretarlos ni sustituirlos por equivalentes tradicionales no atestiguados.
  alternative_spanish_readings:
  - normalizar más los nombres con ortografías tradicionales
  - parafrasear los topónimos para mayor fluidez
  rationale: No hay carga doctrinal especial en el versículo; la fidelidad aquí consiste en conservar la información histórica y geográfica con claridad española.
  doctrine_reference: Principio de transparencia textual y precisión histórica; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo crítico reportado es alto y el texto base se considera estable. Por ello, la versión española sigue de cerca el sentido narrativo del hebreo y del POB inglés sin añadir notas textuales innecesarias.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el Tetragrámaton ni un título divino.
  - Se conserva un registro bíblico sobrio y narrativo, evitando arcaísmos innecesarios.
  - Se mantiene la secuencia de nombres y procedencias en el mismo orden del hebreo.
  - Se prefiere 'amonitas' sobre una traducción literal de 'hijos de Amón' por fluidez, sin perder el referente histórico.
