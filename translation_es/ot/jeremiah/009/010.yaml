translation:
  language: es
  text: 'Y haré de Jerusalén un montón de ruinas[a], morada de chacales; y haré de las ciudades de Judá una desolación[c][b], sin habitante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «montones de ruinas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo tannim; en este contexto de desolación, probablemente «chacales», aunque tradicionalmente también se ha vertido «dragones».'
    reason: lexical_alternative
  - marker: c
    text: 'O «sin que nadie habite allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré de
  alternatives_spanish:
  - Y daré
  - Y pondré
  lexicon: HALOT
  rationale: El hebreo נתן aquí funciona de manera resultativa en un anuncio de juicio. En español, «haré de» comunica bien la idea de convertir/reducir a ese estado sin forzar un calco de «dar» o «poner».
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: Nombre propio
  rationale: Se conserva el nombre geográfico en su forma castellana establecida, como corresponde a un topónimo bíblico.
- source_word: לְגַלִּים
  english_pob_choice: a heap of ruins
  chosen_spanish: un montón de ruinas
  alternatives_spanish:
  - montones de ruinas
  - un montón de escombros
  lexicon: HALOT
  rationale: El sustantivo plural apunta a montones o cúmulos de ruina/escombro. «Un montón de ruinas» mantiene la imagen de una ciudad reducida a escombros y suena natural en español.
- source_word: מְעוֹן
  english_pob_choice: a haunt of
  chosen_spanish: morada de
  alternatives_spanish:
  - habitación de
  - lugar de morada de
  lexicon: HALOT
  rationale: El término indica lugar de habitación. En español, «morada de» conserva el valor locativo sin introducir una expresión demasiado coloquial como «guarida», que podría desplazar el matiz.
- source_word: תַּנִּים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - dragones
  - serpientes
  lexicon: HALOT
  rationale: En contexto profético de desolación, el referente más probable es el animal carroñero. «Chacales» reproduce esa imagen y evita las lecturas míticas o tradicionales menos probables.
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las ciudades de Judáh
  - las ciudades judías
  lexicon: Construcción nominal
  rationale: Se conserva la referencia político-geográfica del hebreo con una estructura directa y transparente.
- source_word: אֶתֵּן
  english_pob_choice: I will make
  chosen_spanish: haré de
  alternatives_spanish:
  - daré
  - pondré
  lexicon: HALOT
  rationale: Como en la primera cláusula, el verbo expresa la acción divina de convertir esas ciudades en desolación. «Haré de» evita la rigidez de «daré» y preserva el sentido causativo-resultativo.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto
  lexicon: HALOT
  rationale: El sustantivo nombra el estado de devastación. La traducción nominal conserva la sintaxis hebrea y su paralelismo con la cláusula anterior.
- source_word: מִבְּלִי יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin que nadie habite allí
  - sin nadie que la habite
  lexicon: HALOT
  rationale: La expresión hebrea significa ausencia total de ocupante. «Sin habitante» es breve, formal y fiel; además mantiene el tono oracular del pasaje.
theological_decisions:
- issue: Fuerza judicial de la acción divina expresada por נתן
  english_pob_reading: Render with 'make' to express divine action causing Jerusalem and Judah's cities to become ruins and desolation.
  chosen_spanish_reading: Renderizar con «haré de» para expresar la acción judicial de Dios que convierte a Jerusalén y a las ciudades de Judá en ruinas y desolación.
  alternative_spanish_readings:
  - «daré»
  - «pondré»
  rationale: El hebreo no describe simplemente un acto de entrega, sino una transformación judicial del estado de la ciudad. «Haré de» comunica esa causalidad sin suavizar el juicio ni introducir una interpretación extraña al texto.
  doctrine_reference: Principio de primacía del original; equivalencia óptima en texto profético de juicio.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión del contexto inglés, sin cambios sustantivos respecto al sentido: mantiene la lectura resultativa de נתן, conserva la imaginería de ruina y desolación, y preserva la opción zoológica de «chacales» para תַּנִּים en un contexto profético de abandono.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología por defecto solo cuando aparece el nombre divino; este versículo no lo contiene explícitamente.
  - Se mantiene «Jerusalén» y «Judá» como topónimos estándar en castellano.
  - Se evita «SEÑOR» porque no hay reemplazo del nombre divino en este versículo.
  - La secuencia paralela «un montón de ruinas / una desolación» conserva la simetría del hebreo.
  - «Sin habitante» se deja en registro bíblico sobrio, sin expandir innecesariamente la frase.
