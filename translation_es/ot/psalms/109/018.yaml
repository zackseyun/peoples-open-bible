translation:
  language: es
  text: Se vistió de maldición como su vestido[a]; entró en sus entrañas como agua[b], y como aceite en sus huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se puso una maldición como su vestido».'
    reason: lexical_alternative
  - marker: b
    text: «Entrañas» también puede traducirse «interior» o «ser íntimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְבַּשׁ
  english_pob_choice: He clothed himself
  chosen_spanish: Se vistió
  alternatives_spanish:
  - Se puso
  - Se cubrió
  lexicon: HALOT
  rationale: El verbo לבשׁ expresa vestirse o ponerse algo encima. En español, «se vistió» conserva bien el valor reflexivo y la imagen de adoptar la maldición como algo que se lleva puesto.
- source_word: קְלָלָה
  english_pob_choice: cursing
  chosen_spanish: maldición
  alternatives_spanish:
  - maldición continua
  - maldecir
  lexicon: HALOT
  rationale: En este contexto poético, el sustantivo apunta al objeto del vestido metafórico. «Maldición» reproduce con naturalidad el término básico y evita forzar un matiz verbal que el español no exige aquí.
- source_word: כְּמַדּוֹ
  english_pob_choice: as his garment
  chosen_spanish: como de su vestido
  alternatives_spanish:
  - como su vestido
  - como de su ropa
  lexicon: HALOT
  rationale: מַד puede referirse a una prenda o vestido. «Como de su vestido» mantiene la comparación poética y suena natural en español, sin sobreespecificar «manto» o «túnica».
- source_word: וַתָּבֹא
  english_pob_choice: it came
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «vino/llegó», el paralelo con «entrañas» y «huesos» pide en español una imagen de penetración interna. «Entró» preserva esa fuerza sin alejarse del movimiento implícito.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: into his inward parts
  chosen_spanish: en sus entrañas
  alternatives_spanish:
  - en su interior
  - en su ser íntimo
  lexicon: HALOT
  rationale: קֶרֶב puede significar interior, entrañas o interioridad. Aquí el paralelismo somático con «huesos» favorece una traducción corporal. «En sus entrañas» conserva el tono vívido y visceral del hebreo.
- source_word: וְכַשֶּׁמֶן
  english_pob_choice: and like oil
  chosen_spanish: y como aceite
  alternatives_spanish:
  - y como óleo
  - y como ungüento
  lexicon: HALOT
  rationale: «Aceite» es la equivalencia directa y clara. El símil mantiene la idea de penetración profunda, no una referencia necesariamente cultual.
- source_word: בְּעַצְמוֹתָיו
  english_pob_choice: into his bones
  chosen_spanish: en sus huesos
  alternatives_spanish:
  - en sus mismos huesos
  - dentro de sus huesos
  lexicon: HALOT
  rationale: עַצְמוֹתָיו son literalmente los huesos. «En sus huesos» conserva la imagen corporal y el paralelismo con «entrañas»; el español puede expresar la penetración sin añadir necesariamente «muy» o «mismos».
theological_decisions:
- issue: Imagen imprecatoria y agencia divina
  english_pob_reading: The verse describes the wicked man's self-embraced cursing rebounding upon him, without adding explicit divine causation in the translation.
  chosen_spanish_reading: El verso presenta la maldición como algo asumido por el impío y luego penetrante en su propio ser, sin explicitar en la traducción un agente divino directo.
  alternative_spanish_readings:
  - La maldición le fue impuesta por Dios
  - Solo describe un efecto psicológico interno
  rationale: El hebreo enfatiza la relación del hombre con la maldición y su penetración en lo íntimo; no nombra aquí el mecanismo de aplicación. La traducción conserva esa tensión poética y no resuelve dogmáticamente la causalidad.
  doctrine_reference: Preservar la tensión teológica sin imponer una causalidad explícita donde el texto no la formula.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se adoptó una solución española más natural que la calca directa, especialmente en el verbo de movimiento («entró») y en el sustantivo corporal («entrañas»), manteniendo intacta la imaginería poética de vestido, interior y huesos.
  spanish_consistency_notes:
  - Se usa «maldición» para קְלָלָה, coherente con la fuerza nominal del hebreo y con la terminología POB sin introducir un giro litúrgico ajeno.
  - Se evita «SEÑOR» o una máscara del nombre divino porque el verso no contiene el Tetragrámaton.
  - Se mantiene la progresión corporal «entrañas / huesos» para reflejar el paralelismo somático del hebreo.
  - Las notas a pie de página preservan alternativas semánticas reales sin duplicar marcadores.
