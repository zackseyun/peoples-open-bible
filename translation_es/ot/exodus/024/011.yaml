translation:
  language: es
  text: Pero no extendió su mano contra los nobles de los hijos de Israel; vieron a Dios[a], y comieron y bebieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contemplaron a Dios»; el verbo puede implicar una visión atenta o contemplativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲצִילֵי
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - jefes
  - príncipes
  - líderes
  lexicon: HALOT
  rationale: «Nobles» conserva la idea de personas prominentes o distinguidas del grupo y mantiene un registro formal sin añadir una interpretación más específica de la que exige el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo en vez de sustituirla por una forma más general; así se mantiene la transparencia del texto fuente.
- source_word: שָׁלַח יָדוֹ
  english_pob_choice: did not stretch out his hand
  chosen_spanish: no extendió su mano
  alternatives_spanish:
  - no alzó su mano
  - no tendió su mano
  - no alargó su mano
  lexicon: HALOT
  rationale: La imagen idiomática de la mano extendida se reproduce de manera natural en español. En el contexto, comunica que no actuó contra ellos con juicio o violencia sin convertir el idiom en una paráfrasis más explícita.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Aunque el hebreo usa una dirección más literal, la combinación con «extender su mano» en este contexto expresa oposición hostil. «Contra» preserva ese valor idiomático en español.
- source_word: וַיֶּחֱזוּ
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - contemplaron
  - divisaron
  - miraron
  lexicon: HALOT
  rationale: «Vieron» es la opción más clara y directa. La intensidad posible del verbo hebreo se conserva mediante una nota, en lugar de cargar el texto principal con una palabra menos natural.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: HALOT
  rationale: El complemento directo con «a» es lo normal en español con un referente personal definido. Se evita «el Dios» por ser menos idiomático; el texto sigue afirmando sin atenuación que tuvieron visión de Dios.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  english_pob_choice: and they ate and drank
  chosen_spanish: y comieron y bebieron
  alternatives_spanish:
  - y comían y bebían
  - y se pusieron a comer y beber
  lexicon: HALOT
  rationale: Los verbos simples en perfecto narrativo español reproducen la secuencia breve y sobria del hebreo. Se evita añadir matices no presentes en el texto.
theological_decisions:
- issue: Visión de Dios
  english_pob_reading: they saw God
  chosen_spanish_reading: vieron a Dios
  alternative_spanish_readings:
  - contemplaron a Dios
  - vieron una manifestación de Dios
  rationale: Se mantiene la afirmación directa del hebreo y del POB inglés, sin suavizarla para resolver tensiones con otros pasajes. La traducción conserva la fuerza del enunciado y deja la tensión bíblica intacta.
  doctrine_reference: Preservar la tensión teológica en lugar de armonizarla artificialmente.
- issue: Sujeto implícito de la acción negativa
  english_pob_reading: he did not stretch out his hand
  chosen_spanish_reading: no extendió su mano
  alternative_spanish_readings:
  - no extendió la mano
  - no alargó su mano
  rationale: El hebreo deja el sujeto implícito, pero el contexto inmediato identifica naturalmente a Yahvé como el agente. En español, la omisión del sujeto es posible y conserva esa continuidad contextual sin sobreexplicarla.
  doctrine_reference: Clarificar la sintaxis sin introducir una nueva afirmación doctrinal.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustanciales: mantiene la formulación directa «vieron a Dios» y la imagen idiomática de «no extendió su mano», con una nota breve para la alternativa verbal de הֶחֱזוּ.'
  spanish_consistency_notes:
  - Se mantiene «Dios» sin artículo en la cláusula principal, conforme al uso normal del español cuando el referente es el Dios de Israel.
  - Se conserva el estilo sobrio y narrativo del hebreo, con coordinación simple de verbos en pretérito.
  - La nota textual/lexical no introduce una lectura distinta, solo una alternativa semántica ya reconocida en el audit trail inglés.
