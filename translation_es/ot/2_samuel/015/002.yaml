translation:
  language: es
  text: 'Absalón se levantaba temprano y se ponía junto al camino hacia la puerta. Cuando algún hombre tenía un pleito[a] y venía al rey para juicio, Absalón lo llamaba y le decía: «¿De qué ciudad eres?». Y él decía: «Tu siervo es de una de las tribus de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «litigio» o «caso legal» para «pleito»; el hebreo רִיב puede denotar disputa, reclamo o caso judicial en un contexto forense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁכִּים
  english_pob_choice: would rise early
  chosen_spanish: se levantaba temprano
  alternatives_spanish:
  - se alzaba temprano
  - se levantaba de madrugada
  lexicon: HALOT
  rationale: El verbo expresa levantarse temprano; en el contexto iterativo del relato, el imperfecto español «se levantaba» comunica hábito repetido, y «temprano» preserva el matiz de prontitud sin sonar forzado.
- source_word: וְעָמַד
  english_pob_choice: stand
  chosen_spanish: se ponía
  alternatives_spanish:
  - estaba de pie
  - se mantenía de pie
  lexicon: HALOT
  rationale: El sentido básico es «estar de pie». En español narrativo, «se ponía junto» transmite la postura asumida de manera natural y conserva la acción continuada.
- source_word: עַל יַד
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto al
  lexicon: HALOT
  rationale: El hebreo indica proximidad espacial. «Junto a» es natural en español y conserva la relación de cercanía mejor que un calco literal.
- source_word: דֶּרֶךְ הַשַּׁעַר
  english_pob_choice: the road to the gate
  chosen_spanish: el camino de la puerta
  alternatives_spanish:
  - el camino hacia la puerta
  - la vía de la puerta
  lexicon: HALOT
  rationale: La construcción refiere al acceso que conduce a la puerta/portón. «Camino de la puerta» mantiene la imagen del acceso sin perder legibilidad. «Puerta» puede referir al portón urbano, y no se especifica más en el texto.
- source_word: רִיב
  english_pob_choice: dispute
  chosen_spanish: pleito
  alternatives_spanish:
  - disputa
  - litigio
  - causa
  lexicon: HALOT
  rationale: En este contexto judicial, רִיב puede ser disputa, reclamo o caso legal. «Pleito» comunica bien el conflicto llevado ante el rey y conserva la tensión jurídico-contenciosa sin estrecharlo demasiado.
- source_word: מִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - justicia
  - fallo
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט tiene sentido forense/de adjudicación. «Juicio» expresa el acto de decidir una causa en español moderno; evita tanto la ambigüedad de «justicia» como la rigidez de «sentencia».
- source_word: וַיִּקְרָא ... אֵלָיו
  english_pob_choice: would call to him
  chosen_spanish: lo llamaba
  alternatives_spanish:
  - lo llamaba a él
  - le hacía llamar
  lexicon: HALOT
  rationale: El verbo indica llamar. En el patrón habitual del relato, el imperfecto español «lo llamaba» conserva la repetición; es más natural que una construcción más literal con duplicación pronominal.
- source_word: אֵי מִזֶּה עִיר אַתָּה
  english_pob_choice: From what city are you?
  chosen_spanish: ¿De qué ciudad eres?
  alternatives_spanish:
  - ¿De qué ciudad vienes?
  - ¿De cuál ciudad eres?
  lexicon: HALOT
  rationale: La pregunta hebrea pide la ciudad de origen. En español, «¿De qué ciudad eres?» suena natural y directo; el sentido de procedencia queda implícito y claro en el contexto.
- source_word: מֵאַחַד שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from one of the tribes of Israel
  chosen_spanish: de una de las tribus de Israel
  alternatives_spanish:
  - de alguna de las tribus de Israel
  - pertenezco a una de las tribus de Israel
  lexicon: HALOT
  rationale: La respuesta identifica el origen tribal. «De una de las tribus de Israel» reproduce bien la fórmula y mantiene la indefinición del hebreo.
- source_word: עַבְדֶּךָ
  english_pob_choice: Your servant
  chosen_spanish: Tu siervo
  alternatives_spanish:
  - Tu servidor
  - Tu esclavo
  lexicon: HALOT
  rationale: Aquí funciona como auto-referencia deferente ante una figura real. «Siervo» conserva el registro reverencial y la relación de subordinación; «esclavo» sería demasiado fuerte para este uso formular.
theological_decisions:
- issue: El alcance de רִיב y מִשְׁפָּט en un contexto judicial
  english_pob_reading: A dispute and came to the king for judgment; footnote notes רִיב can mean dispute, complaint, or legal case.
  chosen_spanish_reading: Un pleito y venía al rey para juicio; el contexto sigue siendo judicial y de adjudicación.
  alternative_spanish_readings:
  - una disputa y venía al rey para juicio
  - un litigio y venía al rey para juicio
  - un caso legal y venía al rey para juicio
  rationale: La combinación de רִיב con ir al rey para מִשְׁפָּט apunta a un conflicto llevado a resolución judicial. «Pleito» y «juicio» conservan esa tensión forense sin reducir el término a una sola categoría técnica.
  doctrine_reference: none
translation_notes:
  revision_awareness: Coincide con la traducción auditada inglesa en la estructura iterativa y en el sentido judicial general; se ha optado por un español natural que conserva la amplitud semántica de רִיב y מִשְׁפָּט sin endurecerlos en tecnicismos innecesarios. No se reportan revisiones aplicadas en el contexto inglés, y el chequeo cruzado indicó alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «siervo» para עַבְדֶּךָ por el registro deferente de la escena real, en línea con la pauta del proyecto para este valor contextual.
  - «Juicio» traduce מִשְׁפָּט en sentido de adjudicación judicial, no de condena.
  - El imperfecto español («se levantaba», «se ponía», «lo llamaba») reproduce la acción habitual del relato.
