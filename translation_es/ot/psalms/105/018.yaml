translation:
  language: es
  text: Afligieron sus pies con grilletes[a]; su cuello entró en el hierro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en cadenas'.
    reason: lexical_alternative
  - marker: b
    text: O 'su alma entró en el hierro'; también puede entenderse 'el hierro vino sobre su alma'. La frase hebrea es difícil, y 'alma' (néfesh) puede referirse más ampliamente a la persona o, por extensión en este contexto, al cuello o la garganta; es decir, fue puesto en un collar o cadena de hierro.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִנּוּ
  english_pob_choice: They afflicted
  chosen_spanish: Lo maltrataron
  alternatives_spanish:
  - Lo afligieron
  - Lo oprimieron
  - Lo humillaron
  lexicon: HALOT
  rationale: El piel de ענה admite las ideas de afligir, oprimir y humillar. En español, "maltrataron" comunica con claridad la violencia y la severidad del contexto de José sin añadir agentes ni detalles que el hebreo no especifica.
- source_word: בַכֶּבֶל
  english_pob_choice: with shackles
  chosen_spanish: con grilletes
  alternatives_spanish:
  - con cadenas
  - con ataduras
  - con esposas
  lexicon: HALOT
  rationale: כבל designa una atadura o fetro; "grilletes" conserva el valor concreto de restricción física y suena natural en español actual.
- source_word: רַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus piernas
  lexicon: HALOT
  rationale: La forma con sufijo se refiere de manera natural a los pies de José. En español, "pies" es la opción más precisa y menos interpretativa.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - cadena de hierro
  - collar de hierro
  lexicon: HALOT
  rationale: El sustantivo significa literalmente "hierro". Mantener "hierro" en el texto principal respeta la forma hebrea sin introducir un objeto específico que el texto no nombra explícitamente.
- source_word: בָּאָה
  english_pob_choice: came upon / came into
  chosen_spanish: llegó al
  alternatives_spanish:
  - entró en
  - vino sobre
  lexicon: HALOT
  rationale: El verbo בוא con este contexto poético admite una relación de entrada o llegada. "Llegó al" permite una construcción natural en español y evita forzar la imagen.
- source_word: נַפְשׁוֹ
  english_pob_choice: his neck / his soul
  chosen_spanish: su cuello
  alternatives_spanish:
  - su alma
  - su persona
  - su vida
  lexicon: HALOT
  rationale: La tradición auditada señala la dificultad de נֶפֶשׁ aquí y preserva la lectura concreta de "cuello"/"garganta" en el contexto de un yugo o collar de hierro. En español, "cuello" comunica esa imagen de manera clara y mantiene la tensión textual sin espiritualizarla.
theological_decisions:
- issue: Lectura de נַפְשׁוֹ en una línea poética difícil
  english_pob_reading: The Hebrew phrase is difficult; 'soul' can sometimes refer more broadly to the person or, by extension in context, the neck/throat.
  chosen_spanish_reading: Se mantiene una lectura concreta de la expresión como "su cuello" para reflejar la imagen de sujeción física.
  alternative_spanish_readings:
  - '"su alma"'
  - '"su persona"'
  - '"su vida"'
  rationale: La línea habla de cautiverio físico y el propio audit trail reconoce una posibilidad concreta vinculada al cuello/garganta. En español, "cuello" hace visible esa tensión sin borrar la dificultad del hebreo.
  doctrine_reference: Salmo 105:18; nota lexical del texto auditado
- issue: Relación entre 'hierro' y la imagen de sujeción
  english_pob_reading: '''iron came upon his soul'' / ''his neck came into iron'' with a note about an iron collar or chain.'
  chosen_spanish_reading: '"su cuello llegó al hierro" deja abierta la imagen de un hierro de sujeción, sin especificar más allá del texto.'
  alternative_spanish_readings:
  - '"su cuello entró en hierro"'
  - '"le pusieron un collar de hierro"'
  - '"cayó sobre él hierro"'
  rationale: El hebreo no nombra un collar o cadena; por eso el texto principal evita sobretraducir. La formulación elegida conserva la fuerza de la imagen y permite la interpretación de encierro o argolla de hierro.
  doctrine_reference: Salmo 105:18; revisión auditada del pasaje
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que prefiere una lectura concreta de נַפְשׁוֹ vinculada al cuello, y el historial que reconoce la dificultad del hebreo. La versión española evita la forma descartada 'su alma llegó al hierro' y conserva la tensión interpretativa con una redacción natural.
  spanish_consistency_notes:
  - Se prefirió 'hierro' literalmente para בַּרְזֶל, evitando añadir 'cadena' o 'collar' al texto principal.
  - Se usó 'grilletes' para בַכֶּבֶל como equivalente claro y sobrio de fetros.
  - La solución mantiene una imagen física de cautiverio y no espiritualiza נַפְשׁוֹ.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, como exige la validación.
