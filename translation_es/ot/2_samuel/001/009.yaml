review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: discurso referido, súplica cortés, petición de causarle la muerte, término raro הַשָּׁבָץ con nota alternativa, y נֶפֶשׁ entendido correctamente como ''vida''. Sin embargo, varias elecciones españolas no son fieles al registro ni a la naturalidad exigida: ''ponte sobre mí'' suena físicamente impropio aquí, ''ponme a muerte'' no es español idiomático, ''me ha atrapado'' debilita el matiz de ''me ha asido/se ha apoderado de mí'', y la nota b mezcla inglés (''soul'') y además no refleja bien el literal del hebreo.'
  spanish_quality_summary: La legibilidad general es aceptable, pero hay giros poco naturales o incorrectos para español bíblico moderno y digno. 'Ponte sobre mí' puede sugerir subirse encima; 'ponme a muerte' no es una expresión estable; 'mi vida todavía está en mí' es comprensible pero puede afinarse a 'aún está en mí'. Las notas necesitan español limpio y consistente.
  glossary_alignment: No hay conflicto con terminología doctrinal del proyecto. La decisión de traducir נֶפֶשׁ como 'vida' está bien alineada. La principal necesidad es mejorar equivalencia idiomática y precisión léxica en español.
  issues:
  - severity: high
    issue: '''ponme a muerte'' no es una expresión natural en español'
    rationale: Aunque intenta reflejar 'put me to death', en español estándar y eclesial suena antinatural. 'Dame muerte' o 'mátame' son opciones idiomáticas; dado el registro digno, 'dame muerte' funciona bien.
  - severity: medium
    issue: '''ponte sobre mí'' suena demasiado literal y físicamente extraño'
    rationale: El hebreo expresa colocarse sobre alguien caído/herido, pero en español 'ponte sobre mí' puede sugerir montarse encima. 'Párate junto a mí' pierde el matiz; 'ven, ponte sobre mí' tampoco mejora mucho. 'Ponte sobre mí' podría tolerarse, pero una formulación como 'quédate sobre mí' tampoco es ideal. 'Ponte sobre mí' puede mantenerse solo si se equilibra con mejor fluidez en el resto; aun así sigue siendo la parte más dudosa del verso.
  - severity: medium
    issue: '''me ha atrapado'' no transmite bien el matiz de ''has seized me'''
    rationale: '''Atrapar'' suele usarse para captura más concreta; aquí conviene una afección que se apodera del herido. ''Se ha apoderado de mí'' o ''me ha sobrevenido'' son más naturales con ''angustia''.'
  - severity: medium
    issue: La nota b contiene inglés ('soul') y un literal mal formulado
    rationale: 'Debe estar completamente en español y reflejar mejor el hebreo: ''Lit., «porque toda mi vida/alma aún está en mí»'' o similar. Además, el marcador b en el texto corresponde a una nota que debe ser plenamente utilizable por lectores hispanos.'
  - severity: low
    issue: '''todavía'' puede simplificarse a ''aún'' para mayor dignidad y concisión'
    rationale: No es error, pero 'aún está en mí' suena más bíblico-natural y sobrio en este contexto.
