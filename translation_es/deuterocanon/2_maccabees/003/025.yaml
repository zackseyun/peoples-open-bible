    issue: Las notas al pie están ancladas a palabras incorrectas.
    rationale: La nota [a] explica una alternativa para σαγή/equipo del caballo, pero está puesta en «jinete». La nota [b] explica ἔσεισεν/«golpeó», pero está puesta en «manto». Esto rompe la trazabilidad del audit trail y la disciplina editorial requerida.
  - severity: medium
    issue: «Manto» no refleja con suficiente precisión σαγή.
    rationale: Aunque intenta expresar una cubierta visible, «manto» en español se asocia fácilmente con una prenda humana. El contexto y la auditoría inglesa apuntan a una cubierta/adorno ecuestre; «gualdrapa» es más preciso y legible en registro bíblico-literario.
  - severity: low
    issue: «Jinete terrible» es comprensible, pero «jinete temible» suena más idiomático.
    rationale: φοβερός aquí significa que infunde temor. «Temible» expresa mejor esa cualidad en español actual sin sugerir ambigüedad moral o un simple intensificador.
