translation:
  language: es
  text: Entonces tres de los treinta jefes bajaron[a] a la roca, a David, en la cueva de Adulam, mientras el campamento de los filisteos estaba apostado en el Valle de Refaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «tres de los treinta jefes bajaron sobre la roca, a David, a la cueva de Adulam». La sintaxis hebrea es condensada, y «en la cueva de Adulam» en el texto principal aclara la ubicación de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - vinieron abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa movimiento descendente; en español, «bajaron» es natural, claro y conserva el sentido direccional sin sonar forzado.
- source_word: שְׁלוֹשָׁה מִן־הַשְּׁלוֹשִׁים
  english_pob_choice: three of the thirty
  chosen_spanish: tres de los treinta
  alternatives_spanish:
  - tres entre los treinta
  - tres de los treinta guerreros
  lexicon: HALOT
  rationale: La construcción identifica un subgrupo dentro de «los treinta». «Tres de los treinta» reproduce la relación cuantitativa de forma directa y readable.
- source_word: רֹאשׁ
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  - capitanes
  lexicon: HALOT
  rationale: Aquí רֹאשׁ funciona como un calificativo de rango o prominencia. «Jefes» comunica bien la idea de líderes principales sin imponer un término militar más específico que el hebreo no exige.
- source_word: עַל־הַצּוּר
  english_pob_choice: to the rock
  chosen_spanish: a la roca
  alternatives_spanish:
  - sobre la roca
  - hacia la roca
  lexicon: HALOT
  rationale: El hebreo admite un matiz de movimiento hacia/unto la roca. «A la roca» mantiene la referencia topográfica y evita una literalidad rígida como «sobre la roca», que podría sonar extraña en español.
- source_word: אֶל־דָּוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - hacia David
  lexicon: HALOT
  rationale: אֶל indica dirección hacia David; «a David» es la correspondencia más natural en español.
- source_word: אֶל־מְעָרַת עֲדֻלָּם
  english_pob_choice: at the cave of Adullam
  chosen_spanish: en la cueva de Adulam
  alternatives_spanish:
  - a la cueva de Adulam
  - junto a la cueva de Adulam
  lexicon: HALOT
  rationale: La POB inglesa clarifica locativamente la posición de David. En español, «en la cueva de Adulam» expresa esa ubicación de modo natural y conserva la aclaración contextual del original y del audit trail.
- source_word: וּמַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: the camp of the Philistines
  chosen_spanish: el campamento de los filisteos
  alternatives_spanish:
  - el ejército de los filisteos
  - el campamento filisteo
  lexicon: HALOT
  rationale: מַחֲנֶה es «campamento»; el genitivo plural se vierte naturalmente como «de los filisteos».
- source_word: חֹנָה
  english_pob_choice: was encamped
  chosen_spanish: estaba acampado
  alternatives_spanish:
  - estaba acampando
  - estaba establecido
  lexicon: HALOT
  rationale: El participio expresa estado circunstancial y durativo. «Estaba acampado» conserva el valor estático del contexto narrativo en español moderno.
- source_word: בְּעֵמֶק רְפָאִים
  english_pob_choice: in the Valley of Rephaim
  chosen_spanish: en el Valle de Refaim
  alternatives_spanish:
  - en el valle de Refaim
  - en el Valle de los Refaim
  lexicon: HALOT
  rationale: Es un topónimo. Se mantiene la forma tradicional/transliterada «Refaim» y la mayúscula en «Valle» para reflejar un nombre geográfico reconocido.
theological_decisions:
- issue: Lectura de עַל־הַצּוּר como movimiento hacia/unto la roca, sin forzar una imagen espacial única
  english_pob_reading: went down to the rock; footnote notes that more formally it can be read as 'went down upon the rock to David, to the cave of Adullam'
  chosen_spanish_reading: bajaron a la roca, a David, en la cueva de Adulam
  alternative_spanish_readings:
  - bajaron sobre la roca, a David, en la cueva de Adulam
  - bajaron hasta la roca, a David, en la cueva de Adulam
  rationale: El hebreo es comprimido y admite más de una relación sintáctica entre la roca, David y la cueva. La redacción principal conserva la direccionalidad sin absolutizar una sola reconstrucción espacial; la nota recoge la alternativa más formal para no borrar la tensión documentada.
  doctrine_reference: Ninguna; cuestión de sintaxis y topografía narrativa.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «chief men» a «chiefs» para una representación más directa de רֹאשׁ. La redacción española sigue esa revisión con «jefes», sin añadir especificaciones militares no exigidas por el hebreo. También conserva la decisión de la POB de aclarar locativamente la referencia a la cueva de Adulam, pero en un español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el Tetragrámaton en el proyecto; este versículo no lo contiene.
  - «Filisteos» se conserva como etnónimo estándar en español bíblico.
  - La mayúscula en «Valle de Refaim» sigue el tratamiento de topónimo propio.
  - No se usa «Cristo», «Señor» ni terminología teológica adicional porque el versículo es narrativo y topográfico.
