    rationale: Aunque fiel, la construcción es ligeramente calcada. 'Hizo pesado su yugo' mantiene la metáfora y la causalidad del hebreo con mejor fluidez.
  revised_spanish_text: Y ahora, mi padre hizo pesado su yugo, pero yo añadiré a su yugo. Mi padre los disciplinó con látigos, pero yo con escorpiones[a].
