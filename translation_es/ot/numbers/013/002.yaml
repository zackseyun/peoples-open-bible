review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en la mayor parte: conserva לְךָ, mantiene ''hombres'', ''la tierra de Canaán'', el aspecto progresivo de נֹתֵן y ''los hijos de Israel''. También preserva la idea distributiva y el valor de נָשִׂיא como cargo de liderazgo. Sin embargo, ''por cada tribu de sus padres'' no refleja con suficiente naturalidad ni precisión לְמַטֵּה אֲבֹתָיו; en español suena ambiguo y puede parecer que se envía ''por'' una tribu, no ''de/según'' su tribu ancestral. Además, la concordancia de segunda persona cambia de singular a plural en el hebreo, pero en español conviene mantener una instrucción coherente y natural sin introducir una construcción torpe.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos puntos mejorables: ''Envía para ti mismo'' es transparente, aunque ''Envía para ti'' suena menos rígido en español bíblico moderno; y ''por cada tribu de sus padres'' resulta poco idiomático. ''Líder'' es aceptable, pero ''jefe'' o ''principal'' pueden sonar más bíblicos; aun así, ''líder'' sigue siendo comprensible. Conviene simplificar algunas notas para evitar redundancia y anclar solo las que verdaderamente ayudan.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: no hay nombres divinos ni términos sensibles fuera de בני ישראל, que se conserva correctamente como ''hijos de Israel''. No hay conflicto con defaults mayores. La decisión de mantener לְךָ en el texto principal concuerda con la rationale inglesa. Se debe ajustar la expresión de la pertenencia tribal ancestral para reflejar mejor ''tribu de sus padres''.'
  issues:
  - severity: medium
    issue: La frase 'uno por cada tribu de sus padres' es poco natural y semánticamente imprecisa.
    rationale: לְמַטֵּה אֲבֹתָיו expresa pertenencia a la tribu ancestral/paterna. En español, 'por cada tribu' puede leerse como representación 'en favor de' cada tribu más que procedencia. 'De cada tribu de sus padres' o 'de la tribu de sus padres' preserva mejor el sentido.
  - severity: low
    issue: '''Envía para ti mismo'' suena algo rígido en español.'
    rationale: Aunque es fiel a לְךָ, una forma como 'Envía para ti' o 'Envía tú' con nota puede sonar más natural. No obstante, mantener la transparencia del hebreo es valioso, así que basta una leve suavización.
  - severity: low
    issue: La nota a mezcla alternativas y explicación de forma algo recargada.
    rationale: La nota puede simplificarse para resaltar el matiz personal de לְךָ sin repetir innecesariamente la misma opción ya usada en el texto.
