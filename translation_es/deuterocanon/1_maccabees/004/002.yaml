translation:
  language: es
  text: para caer sobre el campamento de los judíos y golpearlos de repente; y los hombres de la ciudadela[a] eran sus guías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres de la Akra eran sus guías». «Akra» es el nombre griego usado a menudo para la ciudadela fortificada de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so as to
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - para
  lexicon: BDAG
  rationale: En este contexto introduce la intención del movimiento militar previo; «de modo que» conserva esa relación final sin volverla meramente consecutiva.
- source_word: ἐπιβαλεῖν ἐπὶ
  english_pob_choice: fall upon
  chosen_spanish: cayeran sobre
  alternatives_spanish:
  - atacaran
  - se abalanzaran sobre
  lexicon: LSJ
  rationale: «Cayeran sobre» mantiene la imagen de irrupción violenta y se ajusta bien al valor militar del griego, sin añadir un matiz más técnico que el texto no exige.
- source_word: παρεμβολή
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LEH
  rationale: En un contexto bélico, «campamento» comunica con naturalidad el sentido de παρεμβολή. «Real» sería más tradicional, pero menos transparente.
- source_word: πατάξαι
  english_pob_choice: strike
  chosen_spanish: los golpearan
  alternatives_spanish:
  - los hirieran
  - los atacaran
  lexicon: BDAG
  rationale: El verbo puede significar golpear o herir con fuerza. «Los golpearan» conserva la acción directa sin decidir aquí si el resultado fue letal.
- source_word: ἄφνω
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - inesperadamente
  lexicon: BDAG
  rationale: «De repente» es el equivalente natural en español moderno y conserva la idea de suddenness sin añadir una explicitación interpretativa de emboscada.
- source_word: οἱ υἱοὶ τῆς ἄκρας
  english_pob_choice: the men of the citadel / the sons of the citadel
  chosen_spanish: los hombres de la ciudadela
  alternatives_spanish:
  - los hijos de la ciudadela
  - los hombres del Akra
  lexicon: LSJ
  rationale: La expresión es literalmente «los hijos de la Akra/ciudadela», pero en español «hombres de la ciudadela» comunica mejor el valor etnopolítico y evita una lectura biológica extraña.
- source_word: ἄκρα
  english_pob_choice: citadel
  chosen_spanish: ciudadela
  alternatives_spanish:
  - Akra
  - fortaleza
  lexicon: LSJ
  rationale: «Ciudadela» es una traducción clara para ἄκρα y preserva el carácter de fortificación en Jerusalén. Se evita la transliteración en el texto principal por legibilidad.
- source_word: ὁδηγοί
  english_pob_choice: guides
  chosen_spanish: guías
  alternatives_spanish:
  - conductores
  - guiadores
  lexicon: BDAG
  rationale: «Guías» reproduce con naturalidad la función de quienes lo conducían en el ataque. «Guiadores» sería demasiado literal y menos idiomático.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y el audit trail inglés, manteniendo la finalidad de ὥστε, la violencia abrupta de ἐπιβαλεῖν/πατάξαι y la ambigüedad histórica de οἱ υἱοὶ τῆς ἄκρας con una opción principal natural en español. La nota preserva la alternativa ligada al nombre Akra que el inglés documenta.
  spanish_consistency_notes:
  - Se usa «campamento» para παρεμβολή, en línea con el valor militar del término.
  - Se usa «ciudadela» para ἄκρα en el texto principal y se preserva «Akra» en la nota como alternativa lexical.
  - Se evita «SEÑOR» u otros equivalentes no pertinentes porque no hay léxico divino en este versículo.
  - Se mantiene un registro bíblico claro, pero con sintaxis española natural y sin arcaísmos innecesarios.
