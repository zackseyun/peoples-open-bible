    text: O «polvo y tierra suelta». El hebreo acumula dos sustantivos emparentados (אָבָק, עָפָר) para intensificar la imagen de la lluvia convertida en sequedad y devastación.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «arena» por «tierra» para reflejar con mayor fidelidad el campo semántico de עָפָר y la lógica de la nota léxica inglesa. Se corrige además la colocación del marcador de nota al formato requerido. El resto del versículo puede mantenerse tal como está.
