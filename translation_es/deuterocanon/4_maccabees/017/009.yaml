review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: «Aquí» por Ἐντάφθα, «yacen sepultados» por ἐγκεκήδευνται, «a causa de la violencia de un tirano» por διὰ τυράννου βίαν, y «que quería abolir» por θέλοντος + καταλῦσαι. Sin embargo, falla de manera importante al dejar «commonwealth» en inglés dentro del texto español, lo que no preserva adecuadamente la legibilidad ni la política terminológica del proyecto. Además, «siete niños» no es la mejor opción para παῖδες en este contexto epitáfico; aunque posible, sugiere edad infantil más fuertemente que el griego y que el inglés auditado.'
  spanish_quality_summary: El texto suena mayormente natural y solemne, pero «la commonwealth de los hebreos» es impropio en español e interrumpe la fluidez. «Siete niños» también resulta algo estrecho y menos digno que «siete hijos», que en español puede conservar el vínculo familiar sin imponer necesariamente sexo explícito en el mismo grado que «hijos varones». Conviene mover la nota al término español que traduzca πολιτεία.
  glossary_alignment: 'No hay conflictos con términos doctrinales mayores del glosario del proyecto. El principal problema léxico es πολιτεία: debe expresarse en español, con nota que preserve alternativas como «constitución» u «orden de vida». Para παῖδες, el inglés auditado quedó en «children», pero en español «hijos» encaja mejor con el contexto narrativo-familiar y evita la connotación de infancia pequeña de «niños».'
  issues:
  - severity: high
    issue: Uso de «commonwealth» en inglés dentro del texto español
    rationale: Aunque el inglés POB escogió «commonwealth» para marcar el alcance de πολιτεία, en español dejar el anglicismo sin adaptar no es natural ni ampliamente inteligible en lectura bíblica. Debe traducirse con una opción española principal y conservar las alternativas en nota.
  - severity: medium
    issue: «Siete niños» estrecha innecesariamente παῖδες
    rationale: παῖδες puede significar niños, hijos o muchachos. En este contexto son los descendientes de la mujer ya conocidos en la obra; «siete hijos» es más natural, más solemne y menos marcado hacia la infancia que «siete niños».
  - severity: low
    issue: La nota al pie está anclada en «sacerdote anciano» en vez del término problemático
    rationale: La nota explica πολιτεία, por lo que debe ir anclada en la traducción de ese sintagma, no en una frase no discutida léxicamente.
