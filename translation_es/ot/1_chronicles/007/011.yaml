  to: Todos estos eran hijos de Jediael[a], conforme a los jefes de las casas paternas[b], poderosos guerreros[c], diecisiete mil doscientos[d], que podían salir al ejército para la guerra.
  rationale: Se ajustó «según las cabezas» a «conforme a los jefes» para lograr un español natural y conservar la función de clasificación genealógica del hebreo. También se revisó la cláusula final para incluir explícitamente «al ejército», preservando mejor יֹצְאֵי צָבָא y alineándola con la evidencia fuente y la nota léxica ya documentada.
