translation:
  language: es
  text: Y haré volver a Israel a su pastizal, y pastará en Carmel y en Basán; y en la sierra de Efraín y de Galaad su apetito[a] quedará satisfecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «su alma quedará satisfecha».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֹׁבַבְתִּי
  english_pob_choice: I will bring ... back
  chosen_spanish: haré volver
  alternatives_spanish:
  - lo restauraré
  - lo traeré de vuelta
  lexicon: HALOT
  rationale: La forma causativa expresa que Yahvé hace regresar a Israel. En español, «haré volver» conserva tanto el movimiento de retorno como la idea de restauración sin volverlo más abstracto que el hebreo.
- source_word: נָוֵהוּ
  english_pob_choice: his pasture
  chosen_spanish: su pastizal
  alternatives_spanish:
  - su pasto
  - su morada
  - su redil
  lexicon: HALOT
  rationale: 'El contexto inmediato es pastoril: «pastará». «Pastizal» comunica de forma natural el lugar donde el rebaño se alimenta, sin perder la imagen concreta del texto fuente.'
- source_word: וְרָעָה
  english_pob_choice: and he will graze
  chosen_spanish: pastará
  alternatives_spanish:
  - y comerá pasto
  - y apacentará
  - y se alimentará
  lexicon: HALOT
  rationale: El verbo es pastoril e intransitivo. «Pastará» mantiene la imagen del rebaño y suena natural en español bíblico contemporáneo.
- source_word: הַכַּרְמֶל
  english_pob_choice: Carmel
  chosen_spanish: Carmel
  alternatives_spanish:
  - el Carmelo
  lexicon: HALOT
  rationale: Es un nombre propio geográfico. Se conserva «Carmel» como transliteración coherente con la política POB, en vez de traducirlo por una forma tradicional no documentada aquí.
- source_word: הַבָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Bashán
  - la Basán
  lexicon: HALOT
  rationale: Topónimo regional. «Basán» es la forma española natural y mantiene la identificación geográfica sin añadir artículo innecesario.
- source_word: וּבְהַר אֶפְרַיִם
  english_pob_choice: and on the hill country of Ephraim
  chosen_spanish: y en la sierra de Efraín
  alternatives_spanish:
  - y en la montaña de Efraín
  - y en la región montañosa de Efraín
  - y en el monte de Efraín
  lexicon: HALOT
  rationale: הַר puede referirse a una zona montañosa, no solo a un monte puntual. «Sierra» expresa bien el territorio elevado y preserva la referencia regional.
- source_word: וְהַגִּלְעָד
  english_pob_choice: and Gilead
  chosen_spanish: y de Galaad
  alternatives_spanish:
  - y Galaad
  - y en Galaad
  lexicon: HALOT
  rationale: Nombre propio regional. Con el segundo complemento final, la coordinación en español fluye mejor con «de Galaad», sin perder el valor locativo del hebreo.
- source_word: תִּשְׂבַּע נַפְשׁוֹ
  english_pob_choice: his appetite will be satisfied
  chosen_spanish: su alma quedará satisfecha
  alternatives_spanish:
  - su apetito quedará satisfecho
  - su vida quedará satisfecha
  - quedará satisfecho
  lexicon: HALOT
  rationale: El hebreo literalmente dice «su nefeš será satisfecha». Aquí se opta por «alma» para conservar la tensión léxica y porque el contexto de provisión abundante permite esa traducción; se evita imponer «apetito» como si fuera la única lectura posible.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio colectivo. Se conserva «Israel» para respetar la personificación singular del hebreo.
theological_decisions:
- issue: Personificación singular de Israel
  english_pob_reading: Use singular pronouns ('his,' 'he') for Israel
  chosen_spanish_reading: Mantener la personificación con formas singulares implícitas en «haré volver» y «pastará»; explicitar «su» en singular.
  alternative_spanish_readings:
  - usar plural («haré volverlos», «ellos pastarán»)
  rationale: El hebreo trata a Israel como entidad colectiva singular. El español permite conservar esa personificación sin forzar el plural colectivo, y así no se diluye la gramática del original.
  doctrine_reference: Translation philosophy §1, §5
- issue: נֶפֶשׁ en contexto pastoril
  english_pob_reading: Translate idiomatically as 'appetite' in the main text
  chosen_spanish_reading: Traducir «נַפְשׁוֹ» como «su alma» y dejar abierta la lectura literal en nota.
  alternative_spanish_readings:
  - su apetito
  - su ser
  - su vida
  rationale: Aunque el contexto permite una lectura de apetito o deseo, «alma» preserva la ambigüedad bíblica del término y evita reducirlo demasiado a una función fisiológica. La nota mantiene transparencia sobre la alternativa literal.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue el contexto auditado de Jeremías 50:19 y toma en cuenta la decisión inglesa de mantener la imaginería pastoril y la personificación singular de Israel. Se aparta de la elección inglesa de «appetite» en favor de «alma» para preservar la tensión semántica de נֶפֶשׁ en español bíblico, pero deja la alternativa literal en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito como sujeto por continuidad del contexto, sin introducirlo en el versículo porque el hebreo presenta la acción en primera persona.
  - «Carmel» y «Basán» se mantienen como topónimos.
  - «Pastará» conserva la metáfora pastoral sin necesidad de paráfrasis.
  - La nota de «alma» reconoce la alternativa léxica sin imponerla como lectura única.
