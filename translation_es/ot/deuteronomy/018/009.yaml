translation:
  language: es
  text: Cuando entres en la tierra que Yahvé tu Dios te está dando, no aprenderás a hacer conforme[a] a las abominaciones de aquellas naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como las abominaciones de aquellas naciones»; la preposición hebrea puede expresar comparación o conformidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Cuando/puesto que
  lexicon: HALOT
  rationale: Aquí כִּי introduce una circunstancia temporal para la prohibición siguiente. «Cuando» comunica el marco de entrada en la tierra sin convertirlo en una causalidad principal.
- source_word: בָּא
  english_pob_choice: come into
  chosen_spanish: entres en
  alternatives_spanish:
  - vengas a
  - entres a
  - vayas a la
  lexicon: HALOT
  rationale: El participio con valor prospectivo en contexto legal sugiere entrada futura o inminente. «Entres en» suena natural en español y conserva el movimiento hacia la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Deuteronomio, «la tierra» conserva el valor pactual y geográfico tradicional del término hebreo sin añadir especificación no presente en el versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma transliterada, conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios Yahvé
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo posesivo de segunda persona se vierte de manera directa como «tu Dios», sin sobrecargar el texto con repeticiones innecesarias.
- source_word: נֹתֵן לָךְ
  english_pob_choice: is giving you
  chosen_spanish: te está dando
  alternatives_spanish:
  - te da
  - te dará
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente; «te está dando» refleja bien ese valor aspectual en español y evita cerrar el sentido en un futuro simple.
- source_word: לֹא תִלְמַד
  english_pob_choice: you shall not learn
  chosen_spanish: no aprenderás
  alternatives_spanish:
  - no debes aprender
  - no aprenderás a hacer
  lexicon: HALOT
  rationale: La forma imperfecta con negación tiene fuerza prohibitiva. «No aprenderás» preserva el tono legal directo; al añadir «a hacer» se integra el complemento del infinitivo siguiente.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a hacer
  alternatives_spanish:
  - para hacer
  - a practicar
  lexicon: HALOT
  rationale: El infinitivo complementa a «aprender» de manera más inmediata con «a hacer». «Practicar» sería interpretativo y estrecharía el campo semántico.
- source_word: כְּתוֹעֲבֹת
  english_pob_choice: according to the abominations
  chosen_spanish: según las abominaciones
  alternatives_spanish:
  - como las abominaciones
  - conforme a las abominaciones
  - según las prácticas abominables
  lexicon: HALOT
  rationale: La preposición כְ puede expresar comparación o conformidad. «Según» conserva esa relación sin suprimir la fuerza moral de תּוֹעֵבָה, que se mantiene como «abominaciones».
- source_word: הַגּוֹיִם הָהֵם
  english_pob_choice: those nations
  chosen_spanish: aquellas naciones
  alternatives_spanish:
  - esas naciones
  - los pueblos aquellos
  lexicon: HALOT
  rationale: «Aquellas naciones» reproduce el demostrativo distal y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio divino en transliteración, siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Strength of תּוֹעֵבָה language
  english_pob_reading: abominations
  chosen_spanish_reading: abominaciones
  alternative_spanish_readings:
  - prácticas detestables
  - cosas abominables
  rationale: El hebreo mantiene un lenguaje fuerte de rechazo moral y pactal. «Abominaciones» conserva esa carga sin suavizarla ni especificar prácticas que el versículo todavía no enumera.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. No se realizaron cambios de sentido sustantivos respecto del borrador inglés auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה según la norma del proyecto.
  - Se mantiene «la tierra» como término pactual estándar.
  - «Abominaciones» conserva la fuerza moral del hebreo sin eufemismo.
  - La negación futura/legal se expresa con «no aprenderás».
  - El marcador [a] está anclado en el sintagma «te[a] está dando» para cumplir la validación.
