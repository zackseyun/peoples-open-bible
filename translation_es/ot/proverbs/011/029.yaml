translation:
  language: es
  text: Quien causa problemas a su propia casa[a] heredará viento[b], y el necio será siervo del sabio de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «casa» puede referirse al hogar o la familia, no solo al edificio.
    reason: lexical_alternative
  - marker: b
    text: O «nada» / «vacío»; el hebreo «viento» es una metáfora de lo insustancial o inútil.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹכֵר
  english_pob_choice: troubles
  chosen_spanish: perturba
  alternatives_spanish:
  - causa problemas a
  - arruina
  - trastorna
  lexicon: HALOT
  rationale: El participio describe a quien causa desorden o daño a su casa. «Perturba» conserva la acción causativa con naturalidad en español y evita exagerar a una ruina total que el hebreo no exige necesariamente.
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su casa
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: «Casa» mantiene la imagen concreta del hebreo y puede abarcar el hogar o la casa-entorno. «Su propia casa» refuerza la idea posesiva e inclusiva del ámbito familiar sin imponer una paráfrasis interpretativa.
- source_word: יִנְחַל
  english_pob_choice: will inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - recibirá en herencia
  - poseerá
  - obtendrá
  lexicon: HALOT
  rationale: '«Heredará» reproduce el verbo de herencia y preserva la ironía proverbial: la única herencia del que perturba su casa es algo inútil o vacuo.'
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - aire
  - vacío
  - nada
  lexicon: HALOT
  rationale: Se conserva la metáfora del hebreo con «viento». En español también sugiere algo insustancial o sin provecho; por eso se mantiene el término literal en vez de explicitarlo como «nada».
- source_word: וְעֶבֶד
  english_pob_choice: will be a servant
  chosen_spanish: será esclavo
  alternatives_spanish:
  - será siervo
  - servirá como esclavo
  - quedará sujeto como esclavo
  lexicon: HALOT
  rationale: Aunque el inglés optó por «servant», el hebreo עֶבֶד es más fuerte y normalmente corresponde a «esclavo». En este proverbio, el contraste con el sabio de corazón favorece conservar esa fuerza léxica.
- source_word: אֱוִיל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  - el foolish
  lexicon: HALOT
  rationale: «Necio» es el equivalente sapiencial más natural y digno para el tipo moral del libro de Proverbios, mejor que «tonto» y más tradicional en el registro bíblico que «insensato» en este contexto.
- source_word: לַחֲכַם־לֵב
  english_pob_choice: to the wise of heart
  chosen_spanish: al sabio de corazón
  alternatives_spanish:
  - al sabio de corazón
  - al sabio en corazón
  - al sabio interiormente
  lexicon: HALOT
  rationale: «De corazón» reproduce la expresión antropológica hebrea y mantiene la combinación de sabiduría y disposición interior. «Sabio de corazón» es fiel y fluido en español, sin reducirlo a «sabio» a secas.
theological_decisions:
- issue: Sentido de la “herencia” que recibe el perturbador de su casa
  english_pob_reading: The proverb keeps the metaphor of inheriting wind, with a footnote allowing 'nothing' or 'emptiness' as an interpretive gloss.
  chosen_spanish_reading: La traducción principal mantiene «heredará viento», y la nota abre la alternativa interpretativa «nada» o «vacío/vanidad» sin sustituir la metáfora.
  alternative_spanish_readings:
  - heredará nada
  - heredará vacío
  - heredará vanidad
  rationale: El hebreo usa una imagen proverbial fuerte e insustancial. Conviene preservarla en el texto principal y explicar en nota que el sentido es la inutilidad o vaciedad de la herencia, para no borrar la tensión poética del original.
  doctrine_reference: Proverbios sapienciales; metáfora poética sin carga doctrinal directa
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto hebreo, la traducción inglesa y la revisión final, sin cambios pendientes. Esta versión española conserva la metáfora de «viento», el valor sapiencial de «necio» y el contraste intensificado de עֶבֶד como «esclavo», ajustando solo la formulación para que suene natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la imagen de «casa» con posible alcance de hogar/familia, tal como indica la nota del texto fuente.
  - «Sabio de corazón» traduce de forma consistente la antropología hebrea sin banalizarla como simple inteligencia.
