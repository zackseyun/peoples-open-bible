    rationale: Aunque fiel, la combinación ‘dentro del territorio’ duplica la idea espacial. ‘En el territorio de su heredad’ mantiene el sentido de área asignada y suena más natural en español bíblico moderno.
  revised_spanish_text: Y lo sepultaron en el territorio de su heredad[a], en Timnat-seraj, que está en la región montañosa de Efraín, al norte del monte Gaas.
