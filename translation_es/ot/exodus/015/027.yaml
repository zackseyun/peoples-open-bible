translation:
  language: es
  text: Entonces llegaron a Elim[a], donde había doce manantiales de agua y setenta palmeras[b], y acamparon allí junto al agua[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y allí había doce manantiales de agua y setenta palmeras».
    reason: lexical_alternative
  - marker: b
    text: «Palmeras» también puede traducirse más específicamente como «palmeras datileras».
    reason: lexical_alternative
  - marker: c
    text: O «junto a las aguas». El hebreo usa una forma plural de «agua», a menudo con valor colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹ֣אוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y llegaron
  - Entonces vinieron
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial. «Entonces llegaron» conserva ese progreso y suena natural en español; «llegaron» sin conector perdería parte del encadenamiento, y «vinieron» sería menos idiomático aquí.
- source_word: אֵילִ֔מָה
  english_pob_choice: to Elim
  chosen_spanish: a Elim
  alternatives_spanish:
  - hacia Elim
  - a Elim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar con dirección implícita. En español, la preposición «a» comunica el destino sin sobrecargar la frase.
- source_word: וְ/שָׁ֗ם
  english_pob_choice: where there were
  chosen_spanish: donde había
  alternatives_spanish:
  - y allí había
  - y allí estaban
  lexicon: HALOT
  rationale: El adverbio locativo se integra mejor en español como una relativa de lugar. «Donde había» preserva la referencia espacial y evita una construcción rígida.
- source_word: שְׁתֵּ֥ים עֶשְׂרֵ֛ה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce (lit. dos diez)
  lexicon: HALOT
  rationale: Número cardinal estándar; no requiere nota porque no hay tensión semántica en español.
- source_word: עֵינֹ֥ת מַ֖יִם
  english_pob_choice: springs of water
  chosen_spanish: manantiales de agua
  alternatives_spanish:
  - fuentes de agua
  - manantiales
  lexicon: HALOT
  rationale: עין puede referir a una fuente natural de agua. «Manantiales de agua» es claro, preciso y mantiene el valor de fuente hídrica del oasis; «fuentes» podría sonar menos específico en español.
- source_word: וְ/שִׁבְעִ֣ים תְּמָרִ֑ים
  english_pob_choice: and seventy palm trees
  chosen_spanish: y setenta palmeras[b]
  alternatives_spanish:
  - y setenta palmas
  - y setenta palmeras de dátil
  lexicon: HALOT
  rationale: תְּמָרִים designa palmeras; «palmeras» es la forma natural en español. «Palmeras de dátil» es más específica pero excede la información explícita del hebreo.
- source_word: וַ/יַּחֲנוּ
  english_pob_choice: and they camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y se asentaron en campamento
  - y acamparon
  lexicon: HALOT
  rationale: Verbo de acampar/establecer campamento. «Acamparon» es directo, actual y fiel al contexto narrativo.
- source_word: עַל הַ/מָּֽיִם
  english_pob_choice: by the water
  chosen_spanish: junto a las aguas[c]
  alternatives_spanish:
  - junto al agua
  - junto a las aguas
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa cercanía/ubicación junto a una fuente de agua, no encima de ella. En español, el plural «las aguas» preserva la forma plural hebrea y la nota aclara el valor colectivo.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo de WLC y coincide con el audit trail en inglés: mantiene la secuencia narrativa, el nombre propio Elim, la enumeración de doce manantiales y setenta palmeras, y el matiz locativo de עַל הַמָּיִם. No se registran revisiones aplicadas en el paquete auditado.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «manantiales de agua» para evitar una literalidad opaca y conservar el valor de fuente natural en el contexto de oasis.
  - Se mantuvo el plural «las aguas» como reflejo del hebreo, con nota para el valor colectivo en español.
  - «Palmeras» sigue la precisión general del hebreo sin forzar «palmeras de dátil» en el texto principal.
