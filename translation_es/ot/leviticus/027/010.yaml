translation:
  language: es
  text: No lo sustituirá[a] ni lo cambiará, bueno por malo o malo por bueno; y si de hecho cambia[b] un animal por otro, entonces ambos, el animal original y su sustituto, quedarán consagrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo reemplazará»; el hebreo usa dos verbos relacionados pero distintos para la sustitución.
    reason: lexical_alternative
  - marker: b
    text: O «ciertamente cambia»; la construcción hebrea intensifica la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֲלִיפֶנּוּ
  english_pob_choice: replace it
  chosen_spanish: lo sustituirá
  alternatives_spanish:
  - lo reemplazará
  - lo sustituirá
  lexicon: HALOT
  rationale: El hebreo expresa la idea de poner otro en lugar de este animal votivo. En español, «sustituir» conserva la noción de reemplazo y deja espacio para distinguir este verbo del siguiente sin forzar el estilo.
- source_word: יָמִיר אֹתוֹ
  english_pob_choice: exchange it
  chosen_spanish: lo cambiará
  alternatives_spanish:
  - lo intercambiará
  - lo cambiará
  lexicon: HALOT
  rationale: El segundo verbo denota el acto de trocar un animal por otro. «Cambiar» es natural en español y mantiene la distinción legal con «sustituir».
- source_word: טוֹב בְּרָע אוֹ רַע בְּטוֹב
  english_pob_choice: good for bad or bad for good
  chosen_spanish: bueno por malo, o malo por bueno
  alternatives_spanish:
  - un bueno por un malo, o un malo por un bueno
  - bueno por malo, o malo por bueno
  lexicon: HALOT
  rationale: Los adjetivos funcionan sustantivamente; en español conviene conservar la brevedad del contraste legal con la preposición «por», que expresa bien el intercambio.
- source_word: וְאִם הָמֵר יָמִיר
  english_pob_choice: if he does indeed exchange
  chosen_spanish: si de hecho cambia
  alternatives_spanish:
  - si ciertamente cambia
  - si en verdad cambia
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la acción. «De hecho» transmite ese énfasis en un registro formal y fluido.
- source_word: בְּהֵמָה בִּבְהֵמָה
  english_pob_choice: one animal for another
  chosen_spanish: un animal por otro
  alternatives_spanish:
  - un animal por un animal
  - uno por otro
  lexicon: HALOT
  rationale: En español, «un animal por otro» expresa con claridad la sustitución recíproca sin repetir innecesariamente el sustantivo.
- source_word: וְהָיָה הוּא וּתְמוּרָתוֹ
  english_pob_choice: then both it and its substitute
  chosen_spanish: entonces tanto él como su sustituto
  alternatives_spanish:
  - entonces él y su sustituto
  - entonces tanto el original como su sustituto
  lexicon: HALOT
  rationale: El hebreo refiere al animal original y a su reemplazo. «Su sustituto» conserva el valor de תְּמוּרָה y «tanto él como» hace explícita la inclusión de ambos.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrado
  - consagrados
  lexicon: HALOT
  rationale: En este contexto legal-cúltico, קֹדֶשׁ designa un estatus perteneciente a Dios. «Santos» preserva la fuerza sacra del término, aunque en español «consagrados» también podría explicitar el sentido.
theological_decisions:
- issue: Resultado de un intercambio intentado sobre un animal votivo
  english_pob_reading: Both the original animal and the substituted animal become holy.
  chosen_spanish_reading: Tanto el animal original como el sustituto quedan santos.
  alternative_spanish_readings:
  - Solo el sustituto queda santo
  - El versículo solo invalida el intercambio sin extender santidad a ambos
  rationale: La cláusula final atribuye el estado de קֹדֶשׁ a ambos referentes, no solo al reemplazo. Por eso la traducción mantiene explícita la doble santidad.
  doctrine_reference: Levítico 27:10; cf. la lógica de consagración votiva en la ley de santidad
- issue: Alcance de קֹדֶשׁ en español
  english_pob_reading: holy
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - sagrados
  - consagrados
  rationale: «Santos» conserva la cualidad cultual absoluta del hebreo. No se reduce a una mera categoría moral ni se suaviza a un término más general que podría perder la fuerza ritual.
  doctrine_reference: HALOT, lema קֹדֶשׁ; contexto sacrificial/votivo
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «in fact» a «indeed» para reflejar mejor la intensidad del hebreo. En español se optó por «de hecho» como equivalente natural y formal del énfasis, manteniendo la distinción entre los dos verbos de sustitución y la conclusión dual de santidad.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - Se mantuvo la distinción entre dos verbos de cambio/sustitución para reflejar el paralelismo hebreo.
  - «Santos» se usó como equivalente cultual directo de קֹדֶשׁ en una ley votiva.
