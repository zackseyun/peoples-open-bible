translation:
  language: es
  text: El árbol del campo dará su fruto, y la tierra dará su producto; y estarán seguros en su tierra. Y sabrán que yo soy Yahvé, cuando quiebre las barras de su yugo y los libre de la mano de los que los esclavizaban[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que los hacían servir' o 'los que trabajaban con ellos'. El participio hebreo puede traducirse más literalmente, pero el contexto de un yugo quebrado favorece el sentido más fuerte de 'esclavizaban'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵץ הַשָּׂדֶה
  english_pob_choice: the tree of the field
  chosen_spanish: el árbol del campo
  alternatives_spanish:
  - los árboles del campo
  - el árbol del campo (como colectivo)
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo; en español, 'el árbol del campo' conserva la imagen y deja implícito el valor colectivo sin forzar un plural que suavice la forma del original.
- source_word: פִּרְיוֹ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su fruta
  - su producción
  lexicon: HALOT
  rationale: '''Fruto'' mantiene el paralelo agrícola y el registro bíblico natural en español; ''su'' refleja el posesivo del hebreo.'
- source_word: יְבוּלָהּ
  english_pob_choice: its produce
  chosen_spanish: su producto
  alternatives_spanish:
  - su cosecha
  - su rendimiento
  lexicon: HALOT
  rationale: יבול alude al rendimiento o producto agrícola. 'Producto' es una opción clara y amplia en español; 'cosecha' podría restringir demasiado el matiz a la recolección.
- source_word: וְהָיוּ עַל אַדְמָתָם לָבֶטַח
  english_pob_choice: they will be secure on their land
  chosen_spanish: estarán sobre su suelo con seguridad
  alternatives_spanish:
  - habitarán con seguridad en su tierra
  - estarán seguros en su tierra
  lexicon: HALOT
  rationale: '''Sobre su suelo'' sigue de cerca עַל אַדְמָתָם, y ''con seguridad'' expresa לבטח. Evité añadir ''habitarán'' porque el verbo no aparece explícitamente en el hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto en español: el Tetragrama se translitera como ''Yahvé'', preservando el nombre divino en vez de sustituirlo por un título.'
- source_word: מֹטוֹת עֻלָּם
  english_pob_choice: the bars of their yoke
  chosen_spanish: las barras de su yugo
  alternatives_spanish:
  - las varas de su yugo
  - los travesaños de su yugo
  lexicon: HALOT
  rationale: '''Barras'' comunica bien la metáfora de los travesaños de un yugo y conserva la imagen de opresión. Mantiene el valor figurado sin introducir una explicación ajena al texto.'
- source_word: וְהִצַּלְתִּים מִיַּד
  english_pob_choice: and deliver them from the hand of
  chosen_spanish: y los libre de la mano de
  alternatives_spanish:
  - y los rescate de la mano de
  - y los saque de la mano de
  lexicon: HALOT
  rationale: '''Librar'' es un verbo natural y solemne en español para נצל y conserva la idea de rescate/liberación. ''De la mano de'' reproduce el hebraísmo de poder o dominio.'
- source_word: הָעֹבְדִים בָּהֶם
  english_pob_choice: those who enslaved them
  chosen_spanish: los que los esclavizaban
  alternatives_spanish:
  - los que los hacían servir
  - los que trabajaban con ellos
  - los que los oprimían
  lexicon: HALOT
  rationale: El participio de עבד con ב admite un sentido más literal de 'los que los hacían servir' o 'los que trabajaban con ellos', pero el contexto del yugo quebrado favorece la fuerza opresiva de 'esclavizaban', como en el audit trail inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Según la línea editorial del proyecto, en español se preserva como 'Yahvé' para evitar la sustitución por un título y mantener auditable el nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de oppression en הָעֹבְדִים בָּהֶם
  english_pob_reading: those who enslaved them
  chosen_spanish_reading: los que los esclavizaban
  alternative_spanish_readings:
  - los que los hacían servir
  - los que trabajaban con ellos
  rationale: El marco inmediato es la ruptura del yugo, por lo que conviene conservar la lectura fuerte de opresión y cautiverio. 'Esclavizaban' comunica esa relación de dominio sin debilitarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el consenso de auditoría es de alta concordancia. Esta versión española sigue el mismo sentido aprobado y conserva la tensión léxica entre una traducción más literal del participio hebreo y la opción contextual más fuerte.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar española del Tetragrama, coherente con el proyecto.
  - '''Su fruto'' y ''su producto'' conservan el paralelismo agrícola del hebreo sin sobreexplicar.'
  - '''Sobre su suelo con seguridad'' respeta la preposición עַל y el adverbio לָבֶטַח sin añadir ''habitarán''.'
  - '''Los que los esclavizaban'' conserva la fuerza opresiva apoyada por la imagen del yugo quebrado.'
