translation:
  language: es
  text: 'Un hombre pobre tambalea[a]; habla, y le gritan: «¡Fuera, fuera!»; pero un hombre inteligente habla[b], y no hay lugar para él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea es breve e idiomática; comunica un grito repetido de rechazo o reprensión. El paralelo griego amplía la idea: cuando el humilde falla, recibe reproche.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se le da oído». Literalmente, «no hay lugar para él», es decir, su palabra no encuentra espacio ni aceptación social.'
    reason: alternative_reading
lexical_decisions:
- source_word: דַּל
  english_pob_choice: a poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - un necesitado
  - un hombre humilde en su condición
  lexicon: HALOT
  rationale: דל designa a alguien pobre o socialmente bajo. En español, «un pobre» conserva la forma proverbial breve del hebreo y evita añadir matices no explicitados por el texto.
- source_word: נָמוֹט
  english_pob_choice: totters
  chosen_spanish: tambalea
  alternatives_spanish:
  - resbala
  - vacila
  - se tambalea
  lexicon: HALOT
  rationale: מוט expresa inestabilidad, deslizamiento o tambaleo. «Tambalea» reproduce bien la imagen de precariedad sin decidir si la caída es moral o circunstancial.
- source_word: מְדַבֵּר
  english_pob_choice: he speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - se expresa
  - hablando
  lexicon: HALOT
  rationale: El participio/forma verbal se entiende naturalmente como acción verbal simple. «Habla» funciona de manera idiomática y deja abierta la clase de discurso.
- source_word: גָּע גָּע
  english_pob_choice: Away, away!
  chosen_spanish: «¡Fuera, fuera!»
  alternatives_spanish:
  - «¡Vete, vete!»
  - «¡Aparta, aparta!»
  - un grito de rechazo o reprensión
  lexicon: HALOT
  rationale: La expresión duplicada es abrupta e idiomática. «¡Fuera, fuera!» conserva la repetición y el tono de expulsión o rechazo, sin sobreinterpretar el matiz exacto.
- source_word: יִשֶּׂא
  english_pob_choice: they cry
  chosen_spanish: le gritan
  alternatives_spanish:
  - claman contra él
  - levantan el grito
  - lo increpan
  lexicon: HALOT
  rationale: La secuencia pide un verbo que exprese una reacción social hostil. «Le gritan» comunica el alzamiento de una exclamación contra él y encaja con el hebreo breve y el paralelo griego.
- source_word: מַשְׂכִּיל
  english_pob_choice: an intelligent man
  chosen_spanish: un hombre inteligente
  alternatives_spanish:
  - un hombre entendido
  - un hombre prudente
  - un hombre con entendimiento
  lexicon: HALOT
  rationale: מַשְׂכִּיל subraya entendimiento o inteligencia práctica. «Un hombre inteligente» sigue de cerca la revisión inglesa y comunica la fuerza cognitiva del término, sin reducirlo a mera erudición.
- source_word: וְאֵין לוֹ מָקוֹם
  english_pob_choice: there is no place for him
  chosen_spanish: no se le da lugar
  alternatives_spanish:
  - no hay lugar para él
  - no se le concede espacio
  - no encuentra acogida
  lexicon: HALOT
  rationale: La frase literalmente dice «no hay lugar para él». «No se le da lugar» mantiene la imagen espacial y hace explícita la pasiva impersonal que está implícita también en el griego («no se le dio lugar»).
theological_decisions:
- issue: Reproducción del contraste social sin moralizar la caída del pobre
  english_pob_reading: A poor man totters...; but an intelligent man speaks, and there is no place for him.
  chosen_spanish_reading: Un pobre tambalea...; pero un hombre inteligente habla, y no se le da lugar.
  alternative_spanish_readings:
  - Un pobre tropieza...
  - Un pobre cae...
  rationale: El proverbio contrapone trato social y recepción de la palabra, no una condena moral del pobre. «Tambalea» preserva la precariedad sin transformar el verso en una sentencia ética sobre fracaso personal.
  doctrine_reference: Sabiduría proverbial; respeto al paralelismo y al sentido social del texto.
- issue: Aforismo de rechazo verbal frente a la sabiduría no escuchada
  english_pob_reading: he speaks, and they cry, “Away, away!” ... he is given no hearing / there is no place for him.
  chosen_spanish_reading: 'habla, y le gritan: «¡Fuera, fuera!»; ... no se le da lugar.'
  alternative_spanish_readings:
  - 'le gritan: «¡Vete, vete!»'
  - no se le escucha
  rationale: 'El hebreo y el griego presentan dos formas de rechazo: una exclamación hostil y la negación de espacio social para la palabra sabia. La redacción española conserva ambas tensiones sin fusionarlas en una sola idea de «no escuchar».'
  doctrine_reference: Recepción de la sabiduría; contraste sapiencial en Sirácida.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al preferir un equivalente directo de מַשְׂכִּיל como «inteligente» y al mantener una puntuación más fluida. También integra el matiz del texto hebreo base con apoyo del paralelo griego para expresar tanto el grito de rechazo como la falta de lugar para la voz sabia.
  spanish_consistency_notes:
  - Se usa «pobre» para דַּל, en línea con el contraste social del proverbio.
  - Se usa «tambalea» para מוט, manteniendo la imagen de inestabilidad sin cargar el verbo con un sentido moral.
  - Se usa «hombre inteligente» para מַשְׂכִּיל, coherente con la revisión inglesa reciente.
  - 'Se conserva la estructura antitética del verso: rechazo al pobre que habla y ausencia de lugar para el hablante sabio.'
  - La nota b se formula como alternativa de recepción («oír / dar oído») porque el hebreo dice literalmente «no hay lugar para él».
