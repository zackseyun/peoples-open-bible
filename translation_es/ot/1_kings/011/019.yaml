    issue: El cuerpo del texto deja ambiguo el referente de 'su propia mujer'.
    rationale: El audit trail inglés escogió explícitamente que el pronombre se refiere a Faraón, no a Hadad. El español propuesto ('su propia mujer') no fija con suficiente claridad ese referente y contradice la decisión principal al mantener la ambigüedad en el texto.
  - severity: high
