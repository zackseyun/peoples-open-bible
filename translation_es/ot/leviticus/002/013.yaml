translation:
  language: es
  text: Y toda ofrenda de tu ofrenda vegetal la sazonarás con sal[a]. No dejarás que falte la sal[b] del pacto de tu Dios de tu ofrenda vegetal; con todas tus ofrendas ofrecerás sal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la salarás». El hebreo es más literalmente «con sal sazonarás/salarás».
    reason: lexical_alternative
  - marker: b
    text: «La sal del pacto de tu Dios» es una traducción literal de una expresión pactual asociada con la fidelidad y la permanencia sacrificial.
    reason: cultural_note
  - marker: c
    text: O «sobre todas tus ofrendas ofrecerás sal». El hebreo puede leerse con matiz locativo o de acompañamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבַּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - don
  - oblación
  lexicon: HALOT
  rationale: קָרְבַּן es un término sacrificial amplio. «Ofrenda» es el equivalente natural y digno en español, y permite mantener ambas ocurrencias del versículo sin volverlo arcaico. «Oblación» sería más técnico y menos transparente para una lectura pública.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  lexicon: HALOT
  rationale: En Levítico 2, מִנְחָה designa la ofrenda cereal/vegetal. «Vegetal» comunica bien la ofrenda no animal en español bíblico moderno y evita la ambigüedad de repetir solo «ofrenda». «De cereal» y «de grano» son viables, pero «vegetal» funciona mejor como término cultual breve y comprensible.
- source_word: בַּמֶּלַח תִּמְלָח
  english_pob_choice: you shall season with salt
  chosen_spanish: la sazonarás con sal
  alternatives_spanish:
  - la salgarás
  - la salarás
  lexicon: HALOT
  rationale: El hebreo usa un verbo intensivo con sal. «La sazonarás con sal» conserva la idea ritual y suena natural en español. «La salarás» es más literal, pero menos idiomático; «la salgarás» suena demasiado técnico o regional.
- source_word: תַשְׁבִּית
  english_pob_choice: let ... be lacking
  chosen_spanish: dejarás que falte
  alternatives_spanish:
  - harás que falte
  - quitarás
  - cesará
  lexicon: HALOT
  rationale: El valor causativo del verbo pide expresar que no se debe provocar ausencia. «Dejarás que falte» reproduce bien la prohibición sin perder el matiz de falta/ausencia. «Harás que falte» es más explicativo; «cesará» no encaja bien en español.
- source_word: מֶלַח בְּרִית אֱלֹהֶיךָ
  english_pob_choice: the salt of the covenant of your God
  chosen_spanish: la sal del pacto de tu Dios
  alternatives_spanish:
  - la sal del pacto de tu Dios
  - la sal pactal de tu Dios
  - la sal del pacto de tu Dios
  lexicon: HALOT
  rationale: Se preserva la cadena genitiva y la expresión covenantal sin reinterpretarla. «Pacto» mantiene el valor jurídico-teológico del hebreo, y «tu Dios» conserva el poseedor de segunda persona como en el original.
- source_word: מֵעַל
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de encima de
  - desde
  lexicon: HALOT
  rationale: Tras «faltar» en español, la preposición simple «de» expresa de modo natural la idea de separación o ausencia. «De encima de» sería demasiado literal y pesado.
- source_word: עַל כָּל קָרְבָּנְךָ
  english_pob_choice: with all your offerings
  chosen_spanish: con todas tus ofrendas
  alternatives_spanish:
  - sobre todas tus ofrendas
  - en todas tus ofrendas
  lexicon: HALOT
  rationale: Aunque עַל puede ser «sobre» o «en», aquí el sentido es de acompañamiento requerido. «Con todas tus ofrendas» comunica mejor en español la exigencia ritual de que la sal vaya junto a cada ofrenda.
- source_word: תַּקְרִיב
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - presentarás
  - acercarás
  lexicon: HALOT
  rationale: En contexto sacrificial, קרב se traduce naturalmente por «ofrecer». «Presentarás» es posible, pero «ofrecerás» corresponde mejor al registro bíblico español y evita una formulación demasiado analítica.
theological_decisions:
- issue: Si explicar simbólicamente la frase «sal del pacto de tu Dios» o mantenerla literal
  english_pob_reading: Retain 'the salt of the covenant of your God' in the main text
  chosen_spanish_reading: Mantener «la sal del pacto de tu Dios» en el texto principal
  alternative_spanish_readings:
  - la sal que simboliza el pacto de tu Dios
  - la sal pactal requerida por tu Dios
  rationale: El versículo no interpreta su propia imagen. La traducción conserva la tensión teológica y el lenguaje cultual, en lugar de resolverlo con una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Cómo reflejar la obligatoriedad del rito sin atenuar el mandamiento
  english_pob_reading: You shall not let the salt of the covenant of your God be lacking from your grain offering
  chosen_spanish_reading: No dejarás que falte de tu ofrenda vegetal la sal del pacto de tu Dios
  alternative_spanish_readings:
  - No omitirás la sal del pacto de tu Dios de tu ofrenda vegetal
  - No harás que falte la sal del pacto de tu Dios de tu ofrenda vegetal
  rationale: «Dejarás que falte» reproduce la estructura prohibitiva con claridad y mantiene el matiz de ausencia indebida. Así se conserva la fuerza normativa sin sobreexplicar.
  doctrine_reference: HALOT; norma ritual de Levítico 2:13
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que prefirió 'be lacking' y 'offer salt' por un registro más formal y una terminología sacrificial más consistente. En español, eso se reflejó con «dejarás que falte» y «ofrecerás sal», manteniendo la misma dirección auditada sin calcar mecánicamente el inglés.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como nombre divino por norma del proyecto; aquí el versículo usa אֱלֹהֶיךָ, por lo que se tradujo «tu Dios» sin introducir el Tetragrámaton.
  - Se mantuvo «pacto» como equivalente estable de בְּרִית.
  - Se eligió «ofrenda vegetal» para מִנְחָה en el contexto levítico específico; en otros contextos podría requerir otra solución.
  - Se evitó «siervo» u otras terminologías no pertinentes; no hay δοῦλος en este versículo.
  - Se conservó el paralelismo entre las dos menciones de קרבן/קָרְבָּן con el mismo equivalente español «ofrenda».
