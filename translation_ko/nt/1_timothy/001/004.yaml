id: 1TI.1.4
reference: 1 Timothy 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μηδὲ προσέχειν μύθοις καὶ γενεαλογίαις ἀπεράντοις, αἵτινες ⸀ἐκζητήσεις παρέχουσι μᾶλλον ἢ οἰκονομίαν θεοῦ τὴν ἐν πίστει—
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/004.yaml
  text: nor to pay attention to myths and endless genealogies[c][b][a], which promote speculations rather than the stewardship from God that is by faith—
  footnotes:
  - marker: a
    text: Or 'which produce controversies' or 'which give rise to investigations.' The Greek term can denote inquiries or disputes, here with a negative sense of unproductive speculation.
    reason: lexical_alternative
  - marker: b
    text: Or 'God’s administration,' 'God’s plan,' or 'the stewardship from God.' The Greek οἰκονομία can refer to stewardship, administration, or an ordered plan.
    reason: lexical_alternative
  - marker: c
    text: Or 'in faith'; for 'faith,' some understand a nuance closer to 'faithfulness' or 'trust.'
    reason: alternative_reading
translation:
  language: ko
  text: 또한 신화와 끝없는 족보에 마음을 두지 못하도록 명하여라.[a] 그런 것들은 믿음 안에 있는 하나님의 경륜[b]보다는 헛된 사변을 일으킬 뿐이다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「논쟁을 일으키는 것들」 「조사·추궁을 야기하는 것들」. 헬라어 ἐκζήτησις는 비생산적 사변·논쟁의 어감을 띤다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님의 경영」 「하나님의 계획」 「하나님께로부터 온 청지기 직분」. οἰκονομία는 청지기 직분·경륜·질서 잡힌 계획의 폭을 가진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχειν
  english_pob_choice: to pay attention to
  chosen_korean: 마음을 두다
  alternatives_korean:
  - 몰두하다
  - 마음을 빼앗기다
  lexicon: BDAG
  rationale: 「마음을 두다」가 헌신적 주의의 어감을 자연스럽게 담는다.
- source_word: μύθοις
  english_pob_choice: myths
  chosen_korean: 신화
  alternatives_korean:
  - 옛이야기
  - 허구
  lexicon: BDAG
  rationale: 「신화」가 가장 직접적이고 현대적인 등가어이다. 「우화」는 아동용 어감을 가져 본문 무게에 맞지 않는다.
- source_word: γενεαλογίαις ἀπεράντοις
  english_pob_choice: endless genealogies
  chosen_korean: 끝없는 족보
  alternatives_korean:
  - 무한한 계보
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「족보」를 사용하며, ἀπέραντος의 무한·무결말 어감을 「끝없는」으로 옮긴다.
- source_word: ἐκζητήσεις
  english_pob_choice: speculations
  chosen_korean: 헛된 사변
  alternatives_korean:
  - 논쟁
  - 추궁
  - 탐구
  lexicon: BDAG
  rationale: 무익한 도그마적 호기심의 결과를 가리키므로 「사변」이 본문 어감에 가장 맞다. 부정 평가를 살리기 위해 「헛된」을 명시한다.
- source_word: παρέχουσι
  english_pob_choice: promote
  chosen_korean: 일으키다
  alternatives_korean:
  - 야기하다
  - 가져오다
  lexicon: BDAG
  rationale: 지속적 산출의 어감을 「일으킬 뿐이다」로 표현하여 무익함을 강조한다.
- source_word: οἰκονομίαν θεοῦ
  english_pob_choice: the stewardship from God
  chosen_korean: 하나님의 경륜
  alternatives_korean:
  - 하나님의 경영
  - 하나님의 계획
  - 하나님께로부터 온 청지기 직분
  lexicon: BDAG
  rationale: οἰκονομία는 청지기 직분·하나님의 구원 경륜·질서 잡힌 계획의 폭을 가진다. 한국 신학 어휘 「경륜」은 그 폭을 가장 잘 담는 절제된 표현이다.
- source_word: τὴν ἐν πίστει
  english_pob_choice: that is by faith
  chosen_korean: 믿음 안에 있는
  alternatives_korean:
  - 믿음으로 이루어지는
  - 믿음 안에서 운영되는
  lexicon: BDAG
  rationale: ἐν의 영역적 어감을 「~안에 있는」으로 살려 헛된 사변의 영역과 대비되는 신앙의 영역을 보여준다.
theological_decisions:
- issue: οἰκονομίαν θεοῦ의 의미 범위
  chosen_reading: 하나님의 경륜
  alternative_readings:
  - 하나님의 계획
  - 하나님의 경영
  - 하나님께로부터 온 청지기 직분
  rationale: 「경륜」은 하나님의 구원 질서·교회 안의 청지기 직분 두 가지 해석을 모두 담을 수 있는 한국 신학 정립 어휘이다. 한 가지 해석으로 좁히지 않고 본문의 의미 폭을 보존한다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; original-language primacy'
