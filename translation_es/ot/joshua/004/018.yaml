translation:
  language: es
  text: Y aconteció que, cuando los sacerdotes que llevaban el arca del pacto de Yahvé subieron de en medio del Jordán, y las plantas de los pies de los sacerdotes fueron levantadas a tierra seca, las aguas del Jordán volvieron a su lugar y corrieron como antes[a] sobre todas sus riberas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como ayer y el tercer día», un modismo que significa «como antes» o «como anteriormente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: El wayyiqtol introductorio marca avance narrativo. «Aconteció» conserva el tono bíblico sin sonar arcaico en español.
- source_word: בעלות
  english_pob_choice: when ... came up
  chosen_spanish: cuando ... subieron
  alternatives_spanish:
  - cuando ... llegaron arriba
  - mientras ... subían
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal. «Subieron» refleja el movimiento de salida del lecho del Jordán hacia tierra seca.
- source_word: נֹשְׂאֵי
  english_pob_choice: carrying
  chosen_spanish: que llevaban
  alternatives_spanish:
  - que portaban
  - que cargaban
  lexicon: HALOT
  rationale: El participio describe a los sacerdotes como portadores del arca. «Llevaban» es natural y mantiene la función descriptiva.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of the LORD
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de YHWH
  - el arca del pacto del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la cadena constructa con «arca del pacto». El nombre divino se rinde como «Yahvé» según el estándar del proyecto, evitando la sustitución por título.
- source_word: מִתּוֹךְ הַיַּרְדֵּן
  english_pob_choice: from the midst of the Jordan
  chosen_spanish: desde en medio del Jordán
  alternatives_spanish:
  - desde el centro del Jordán
  - desde dentro del Jordán
  lexicon: HALOT
  rationale: «En medio» reproduce la idea de interioridad del río. Se añade «desde» para la salida desde el cauce hacia tierra firme.
- source_word: נִתְּקוּ
  english_pob_choice: were lifted up
  chosen_spanish: se alzaron
  alternatives_spanish:
  - se levantaron
  - fueron alzadas
  lexicon: HALOT
  rationale: El verbo expresa que los pies fueron separados del lecho acuático y puestos sobre tierra seca. «Se alzaron» conserva el movimiento físico sin forzar una traducción mecánica de «detached».
- source_word: כַּפּוֹת רַגְלֵי
  english_pob_choice: the soles of ... feet
  chosen_spanish: las plantas de los pies
  alternatives_spanish:
  - las soles de los pies
  - la planta de los pies
  lexicon: HALOT
  rationale: כף para el pie apunta a la parte inferior/plantar. «Plantas de los pies» es la expresión española más clara y natural.
- source_word: אֶל הֶחָרָבָה
  english_pob_choice: to the dry ground
  chosen_spanish: hasta la tierra seca
  alternatives_spanish:
  - a la tierra seca
  - sobre la tierra seca
  lexicon: HALOT
  rationale: חרבה designa tierra seca frente al agua. «Hasta» en español comunica el punto de llegada del movimiento.
- source_word: וַיָּשֻׁבוּ מֵי הַיַּרְדֵּן לִמְקוֹמָם
  english_pob_choice: the waters of the Jordan returned to their place
  chosen_spanish: las aguas del Jordán volvieron a su lugar
  alternatives_spanish:
  - las aguas del Jordán regresaron a su lugar
  - las aguas del Jordán volvieron a su sitio
  lexicon: HALOT
  rationale: Se mantiene el retorno personificado de las aguas con una formulación directa y transparente.
- source_word: וַיֵּלְכ֥וּ
  english_pob_choice: went
  chosen_spanish: siguieron
  alternatives_spanish:
  - fueron
  - avanzaron
  lexicon: HALOT
  rationale: Aunque literalmente es «ir», en español «siguieron» comunica mejor el continuar del fluir sobre las riberas sin perder la secuencia verbal.
- source_word: כִּתְמוֹל שִׁלְשׁוֹם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como ayer y anteayer
  - como anteriormente
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático del hebreo, que alude a la situación previa/familiar, con una expresión breve y natural.
- source_word: עַל כָּל גְּדוֹתָיו
  english_pob_choice: over all its banks
  chosen_spanish: sobre todas sus riberas
  alternatives_spanish:
  - sobre todos sus bancos
  - a lo largo de todas sus riberas
  lexicon: HALOT
  rationale: גְּדוֹתָיו son las riberas o márgenes del río. «Riberas» es el equivalente español más claro en este contexto fluvial.
theological_decisions:
- issue: Nombre divino יְהוָה en el arca del pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - YHWH
  - el SEÑOR
  rationale: El texto hebreo tiene el Tetragrama en forma directa. Conforme al estándar del proyecto, se traduce como «Yahvé» para preservar el nombre personal del Dios del pacto sin recurrir a una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Marcador temporal idiomático כִּתְמוֹל שִׁלְשׁוֹם
  english_pob_reading: as before
  chosen_spanish_reading: como antes
  alternative_spanish_readings:
  - como ayer y anteayer
  - como anteriormente
  rationale: La expresión hebrea es un modismo que significa «como antes / como anteriormente». Se preserva el valor idiomático sin literalizar una frase extraña en español.
  doctrine_reference: Uso idiomático sustentado por el audit trail léxico de la fuente
- issue: Movimiento de los pies desde el río a tierra seca
  english_pob_reading: the soles of the priests’ feet were lifted up to the dry ground
  chosen_spanish_reading: las plantas de los pies de los sacerdotes se alzaron hasta la tierra seca
  alternative_spanish_readings:
  - las plantas de los pies de los sacerdotes fueron levantadas a la tierra seca
  - las plantas de los pies de los sacerdotes se levantaron sobre la tierra seca
  rationale: El hebreo describe el desprendimiento/salida de los pies del lecho del río, no una elevación abstracta. «Se alzaron» mantiene la imagen corporal y el resultado narrativo.
  doctrine_reference: Precisión semántica del verbo נתק y su contexto narrativo
translation_notes:
  revision_awareness: 'Tomé en cuenta el ajuste reciente del flujo sintáctico en el inglés auditado: la secuencia narrativa se expresa como una sola oración con el evento introductorio, la circunstancia temporal, el alzarse de los pies y el retorno de las aguas. En español mantuve esa misma progresión, evitando separar indebidamente los eventos o convertir el temporal en una subordinación pesada. También atendí la revisión que favorece una correspondencia más cercana a «to the dry ground», pero opté por «hasta la tierra seca» para sonar natural en español y conservar el valor direccional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «arca del pacto» y no una paráfrasis litúrgica más libre.
  - «Jordán» se conserva como nombre del río; no se añade artículo innecesario.
  - «Como antes» refleja el modismo hebreo sin sobreliteralidad.
  - La puntuación conserva una sola oración narrativa larga, coherente con el hebreo y el audit trail en inglés.
