translation:
  language: es
  text: No desprecian al ladrón[a] si roba para saciarse[b] cuando tiene hambre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desestiman»; el verbo hebreo expresa tratar con desprecio o en poco.
    reason: lexical_alternative
  - marker: b
    text: O «para satisfacer su apetito»; literalmente, «para llenar su alma/yo».
    reason: lexical_alternative
  - marker: c
    text: O «porque tiene hambre».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָב֣וּזוּ
  english_pob_choice: do not despise
  chosen_spanish: no desprecian
  alternatives_spanish:
  - no desprecian
  - no desestiman
  - no tienen en poco
  lexicon: HALOT / בוז
  rationale: «Despreciar» es fiel al valor de בוז, pero en español «no desprecian» suena natural en un proverbio general y conserva la evaluación social negativa sin volverlo más fuerte de lo que exige el hebreo.
- source_word: לַ֭/גַּנָּב
  english_pob_choice: a thief
  chosen_spanish: al ladrón
  alternatives_spanish:
  - al ladrón
  - al que roba
  - al hurón
  lexicon: HALOT / גנב
  rationale: El hebreo tiene forma definida, pero en español proverbial funciona mejor un referente genérico. «Ladrón» mantiene la fuerza léxica y la concisión del original.
- source_word: כִּ֣י יִגְנ֑וֹב
  english_pob_choice: if he steals
  chosen_spanish: si roba
  alternatives_spanish:
  - si roba
  - cuando roba
  - porque roba
  lexicon: HALOT / כי
  rationale: Aquí כִּי introduce la circunstancia condicional. «Si roba» reproduce bien ese matiz en español y evita que la frase suene causal cuando el sentido es situacional.
- source_word: לְ/מַלֵּ֥א נַ֝פְשׁ֗/וֹ
  english_pob_choice: to satisfy himself
  chosen_spanish: para saciarse
  alternatives_spanish:
  - para saciarse
  - para llenar su vida
  - para satisfacer su apetito
  lexicon: HALOT / מלא + נפש
  rationale: La expresión hebrea literalmente es «llenar su nefesh/vida/yo». En este contexto de hambre, «saciarse» conserva el impulso de satisfacción sin imponer «apetito» donde el hebreo dice «alma/yo/vida».
- source_word: נַ֝פְשׁ֗וֹ
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - su apetito
  - su alma
  - su vida
  lexicon: HALOT / נפש
  rationale: En español, el reflexivo «se» resume naturalmente el valor de נֶפֶשׁ como el propio yo o la propia persona. Evita forzar una equivalencia rígida con «alma» o «apetito».
- source_word: כִּ֣י יִרְעָֽב
  english_pob_choice: when he is hungry
  chosen_spanish: cuando tiene hambre
  alternatives_spanish:
  - cuando tiene hambre
  - porque tiene hambre
  - pues tiene hambre
  lexicon: HALOT / רעב
  rationale: «Cuando tiene hambre» preserva el valor circunstancial. Aunque la lectura causal también es posible, el español suena más claro con la relación temporal/situacional que presenta la cláusula.
translation_notes:
  revision_awareness: 'La versión sigue el alto acuerdo del audit trail inglés y mantiene las mismas decisiones semánticas clave: בוז como desprecio/desestimar, גנב como ladrón genérico, כי con valor condicional, מלא־נפש como saciar/llenar el yo, y רעב como hambre circunstancial. Se optó por una frase española más natural y proverbialeable sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y terminología no pertinente porque el versículo no contiene el Tetragrámaton ni títulos divinos.
  - Se conserva un sujeto genérico singular («al ladrón») acorde con el valor proverbial del hebreo.
  - Las notas mantienen la ambigüedad de נֶפֶשׁ entre yo/vida/apetito sin cerrarla de modo indebido.
  - La puntuación refleja una lectura fluida en español, con la cláusula final temporal/circunstancial separada por coma implícita en la cadencia del proverbio.
