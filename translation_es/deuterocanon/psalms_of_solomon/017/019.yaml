  - marker: b
    text: Greek ψυχή can mean 'life' or 'soul'; here 'life' fits the survival context best.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the eyes of the exile' / 'diaspora'; the Greek παροικία denotes a community living away from its homeland.
    reason: lexical_alternative
  - marker: d
    text: Or 'to save their lives'.
    reason: previous_rendering
