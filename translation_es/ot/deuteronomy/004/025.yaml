  - marker: b
    text: Or 'you have been long in the land.' The Hebrew verb can emphasize becoming old or being long-settled.
    reason: lexical_alternative
  - marker: c
    text: Or 'the likeness of anything' or 'any form.'
    reason: lexical_alternative
