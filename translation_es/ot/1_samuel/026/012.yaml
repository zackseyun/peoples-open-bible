revisions:
- from: Entonces David tomó la lanza y el cántaro de agua de junto a la cabeza[a] de Saúl, y se fueron. No hubo quien lo viera, ni quien lo supiera, ni quien despertara, porque todos estaban durmiendo, pues un profundo sueño de Yahvé había caído sobre ellos.
  to: Entonces David tomó la lanza y la jarra de agua de junto a la cabeza de Saúl[a], y se fueron. No hubo quien lo viera, ni quien lo supiera, ni quien despertara, porque todos estaban durmiendo, pues un sueño profundo de parte de Yahvé había caído sobre ellos.
  rationale: Se ajusta la frase sobre el sueño para expresar con claridad la procedencia divina documentada en el expediente («from Yahweh»), se mejora la naturalidad de «jarra de agua», y se corrige la ubicación del marcador de nota para que corresponda a toda la expresión locativa. No se requiere adjudicación adicional porque los cambios son menores y bien sustentados por la evidencia dada.
