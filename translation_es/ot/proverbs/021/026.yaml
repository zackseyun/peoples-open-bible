base_translation:
  language: en
  yaml_path: translation/ot/proverbs/021/026.yaml
  text: All day long he craves greedily[b][a], but the righteous gives and does not hold back.
  footnotes:
  - marker: a
    text: 'Or, more smoothly, ''he keeps craving all day long.'' The Hebrew uses a verb with a cognate noun for emphasis: literally, ''he craves craving.'''
    reason: lexical_alternative
  - marker: b
    text: '''The righteous man'' is grammatically masculine singular in Hebrew and functions here as a representative singular; the proverb describes the character of a righteous person generally.'
    reason: lexical_alternative
