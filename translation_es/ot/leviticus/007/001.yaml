translation:
  language: es
  text: 'Ahora bien, esta es la ley de la ofrenda por la culpa[a]: es santísima.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda de reparación’ u ‘ofrenda de compensación’. El hebreo אָשָׁם nombra un sacrificio asociado con culpa y restitución.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  english_pob_choice: Now this
  chosen_spanish: Y esta
  alternatives_spanish:
  - Ahora esta
  - Y esto
  lexicon: HALOT
  rationale: La forma hebrea introduce una nueva sección normativa. En español, ‘Y esta’ conserva el enlace discursivo del ו y la deíxis de זֹאת con naturalidad; ‘Ahora esta’ sería más explicativo, pero menos directo.
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la norma de
  lexicon: HALOT
  rationale: En contexto sacrificial, תּוֹרָה designa la regulación prescrita para este rito. ‘Ley’ mantiene el valor normativo y la estructura en constructo de manera clara y reconocible en español.
- source_word: הָ/אָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de reparación
  - la ofrenda de compensación
  lexicon: HALOT
  rationale: ‘Ofrenda por la culpa’ comunica el sentido cultual y moral de אָשָׁם sin perder la categoría sacrificial. Se evita imponer solo una lectura técnica (‘reparación’/‘compensación’) que el hebreo también puede sugerir, y esa tensión se preserva en nota.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - santísima
  - santísimo de santidades
  lexicon: HALOT
  rationale: La construcción superlativa hebrea expresa el grado máximo de santidad. ‘Cosa santísima’ refleja bien el predicado nominal aplicado al sacrificio; ‘santísima’ solo, aunque posible, pierde el matiz sustantivado del hebreo.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - es ella
  - esto es
  lexicon: HALOT
  rationale: El hebreo usa un predicado nominal con pronombre para identificar la ofrenda como perteneciente a esta categoría. En español, el copulativo ‘es’ basta y suena natural sin añadir un sujeto innecesario.
theological_decisions:
- issue: Clasificación sacrificial de אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda de compensación
  rationale: La decisión principal conserva la categoría sacrificial reconocible y, a la vez, deja espacio al trasfondo de culpa y restitución que el hebreo אָשָׁם puede implicar. Las alternativas se mantienen como matiz léxico, no como sustitución del término principal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'Coincide con la última pasada del texto fuente en inglés: no se registraron cambios posteriores y el consenso de revisión fue alto, por lo que la versión española sigue directamente el estado auditado más reciente.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita ‘sacrificio’ como traducción principal de אָשָׁם para conservar la categoría específica de ‘ofrenda’.
  - ‘Cosa santísima’ preserva la superlatividad de קֹדֶשׁ קָדָשִׁים sin confundirla con el espacio ‘Lugar Santísimo’.
