translation:
  language: es
  text: Y contrató de Israel[a] a cien mil guerreros valientes, por cien talentos de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre Israel». La preposición hebrea indica procedencia; en este contexto se refiere a tropas tomadas del reino del norte. También, «guerreros valientes» puede traducirse «hombres valerosos» o «hombres poderosos de valor», es decir, combatientes capaces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂכֹּר
  english_pob_choice: he hired
  chosen_spanish: alquiló
  alternatives_spanish:
  - contrató
  - hizo venir a sueldo
  lexicon: HALOT
  rationale: El hebreo שׂכר en qal expresa contratar por pago. En español, «alquiló» puede sonar más general, pero aquí refleja la relación de pago sin añadir la idea de mercenarios. «Contrató» también es posible, pero «alquiló» mantiene la idea de obtener servicio a cambio de dinero de manera breve y directa.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - desde Israel
  - tomados de Israel
  lexicon: HALOT
  rationale: La preposición מן indica origen o procedencia. «De Israel» es natural en español y conserva que el contingente provenía de Israel, es decir, del reino del norte en este contexto.
- source_word: מֵאָה אֶלֶף
  english_pob_choice: one hundred thousand
  chosen_spanish: cien mil
  alternatives_spanish:
  - ciento mil
  lexicon: HALOT
  rationale: La construcción numeral se vierte directamente. «Cien mil» es la forma más natural y estándar en español moderno.
- source_word: גִּבּוֹר חָיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres de guerra, valientes para la batalla
  alternatives_spanish:
  - guerreros valientes
  - hombres valerosos
  lexicon: HALOT
  rationale: La expresión hebrea designa combatientes capaces y valientes. Opto por desdoblarla para conservar el sentido militar y la fuerza del hebreo sin forzar una fórmula demasiado arcaica. «Hombres de guerra» refleja la cualidad de combatientes; «valientes para la batalla» conserva el matiz de capacidad y valor.
- source_word: בְּמֵאָה כִכַּר כָּסֶף
  english_pob_choice: for one hundred talents of silver
  chosen_spanish: por cien talentos de plata
  alternatives_spanish:
  - a cambio de cien talentos de plata
  - por el precio de cien talentos de plata
  lexicon: HALOT
  rationale: La preposición ב introduce aquí el precio o pago. «Por cien talentos de plata» es idiomático en español y mantiene la unidad antigua «talentos» sin convertirla a medidas modernas.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una lectura directa y sin cambios en la revisión más reciente; el español sigue esa misma línea, preservando el valor de pago, procedencia y la fuerza militar de גִּבּוֹר חָיִל sin añadir interpretaciones como «mercenarios».
  spanish_consistency_notes:
  - Se mantiene «talentos» como unidad antigua, en coherencia con el valor histórico del texto.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - La nota al pie se usa solo para alternativas léxicas reales del sintagma militar hebreo.
