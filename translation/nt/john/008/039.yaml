id: JHN.8.39
reference: John 8:39
source:
  edition: SBLGNT
  text: Ἀπεκρίθησαν καὶ εἶπαν αὐτῷ· Ὁ πατὴρ ἡμῶν Ἀβραάμ ἐστιν. λέγει αὐτοῖς ὁ Ἰησοῦς· Εἰ τέκνα τοῦ Ἀβραάμ ⸀ἐστε, τὰ ἔργα τοῦ Ἀβραὰμ ⸀ἐποιεῖτε·
translation:
  text: They answered and said to him[a], “Abraham is our father.” Jesus says to them, “If you are Abraham’s children, you would be doing Abraham’s works.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If you were Abraham’s children, you would do the works of Abraham.” The Greek imperfect verb can be understood as implying a contrary-to-fact condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπεκρίθησαν καὶ εἶπαν
  chosen: They answered and said
  alternatives:
  - They answered
  - They replied and said
  lexicon: BDAG
  rationale: Retains the Johannine double-verb formulation rather than collapsing it entirely, while still sounding natural in English. This preserves the narrative emphasis of response plus speech.
- source_word: Ὁ πατὴρ ἡμῶν Ἀβραάμ ἐστιν
  chosen: Abraham is our father
  alternatives:
  - Our father is Abraham
  lexicon: BDAG
  rationale: English predicate order is smoothed for naturalness while preserving the emphatic claim of descent from Abraham.
- source_word: λέγει
  chosen: Jesus says
  alternatives:
  - Jesus said
  lexicon: BDAG
  rationale: The Greek uses the present tense λέγει, a common historical present in narrative. Rendering it as 'says' preserves the discourse vividness and aspectual force of the Greek.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and refers to filial relationship rather than specifically male descent. 'Children' is the most accurate and natural rendering.
- source_word: Εἰ τέκνα τοῦ Ἀβραάμ ἐστε
  chosen: If you are Abraham’s children
  alternatives:
  - If you are children of Abraham
  - If you were Abraham’s children
  lexicon: BDAG
  rationale: Uses a straightforward present-condition rendering. 'Abraham’s children' is idiomatic English and preserves the relational/genitival force.
- source_word: τὰ ἔργα τοῦ Ἀβραὰμ
  chosen: Abraham’s works
  alternatives:
  - the works of Abraham
  - what Abraham did
  lexicon: BDAG
  rationale: ἔργα is rendered 'works' to preserve the concrete ethical sense and Johannine contrast between claimed lineage and actual deeds.
- source_word: ἐποιεῖτε
  chosen: you would be doing
  alternatives:
  - you do
  - you would do
  - you would be doing the works
  lexicon: BDAG
  rationale: 'The imperfect form in this conditional context is best represented as contrary-to-fact in English: if they truly were Abraham''s children, their ongoing conduct would match Abraham''s. ''Would be doing'' captures both the unreal condition and the imperfective sense better than a simple present.'
