translation:
  language: es
  text: Y el rey Ptolomeo murió el tercer día, y los que estaban en sus fortalezas[a] fueron destruidos por los que estaban en las fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego repite «en las fortalezas» en ambos miembros. Probablemente distingue entre los que estaban en las fortalezas de Ptolomeo y los que estaban en las fortalezas y se volvieron contra ellos, pero la relación exacta queda comprimida en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὁ βασιλεὺς Πτολεμαῖος ἀπέθανεν
  english_pob_choice: And King Ptolemy died
  chosen_spanish: Y el rey Ptolomeo murió
  alternatives_spanish:
  - Y el rey Ptolomeo falleció
  lexicon: BDAG
  rationale: ἀπέθανεν expresa muerte directa; en español, «murió» es el equivalente más simple y fiel. Se conserva «rey Ptolomeo» como título personal sin suavizar el hecho.
- source_word: ἐν τῇ ἡμέρᾳ τῇ τρίτῃ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: BDAG
  rationale: La expresión temporal se entiende naturalmente en español como «al tercer día». Mantiene el valor idiomático sin añadir un punto de referencia que el griego no explicita.
- source_word: οἱ ὄντες
  english_pob_choice: those who were
  chosen_spanish: los que estaban
  alternatives_spanish:
  - los que eran
  - los que se hallaban
  lexicon: BDAG
  rationale: El participio se refiere de forma general a las personas presentes en el lugar. «Los que estaban» es natural en español y preserva la referencia amplia sin introducir masculino explícito innecesario.
- source_word: ὀχυρώμασιν
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortificaciones
  - baluartes
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado. «Fortalezas» comunica bien el sentido militar y es fluido en español, aunque «fortificaciones» también sería posible.
- source_word: ἀπώλοντο
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - perecieron
  - fueron aniquilados
  lexicon: BDAG
  rationale: El aoristo pasivo/intransitivo expresa que sufrieron destrucción. «Fueron destruidos» conserva esa fuerza sin restringir el resultado a una sola forma de muerte.
- source_word: ὑπὸ τῶν ἐν τοῖς ὀχυρώμασιν
  english_pob_choice: by those in the strongholds
  chosen_spanish: por los que estaban en las fortalezas
  alternatives_spanish:
  - por los de las fortalezas
  - por los que se hallaban en las fortalezas
  lexicon: BDAG
  rationale: La preposición ὑπό marca agente. La repetición de «en las fortalezas» en ambos miembros se conserva para reflejar la compresión del griego y la posible oposición entre dos grupos en posiciones fortificadas.
translation_notes:
  revision_awareness: 'La versión actual coincide con la evaluación más reciente: no se requieren cambios textuales respecto del pasaje fuente y la lectura inglesa de auditoría. Se conservó la repetición retórica del griego en español para no aplanar una posible relación de contraste entre los dos grupos fortificados.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponde; este versículo no lo contiene.
  - Se mantiene «Mesías»/«Cristo» fuera del pasaje porque no aplica aquí.
  - Se eligió lenguaje directo («murió», «fueron destruidos») para conservar el tono narrativo histórico del texto griego.
  - La repetición de «fortalezas» refleja la compresión sintáctica del original y evita una interpretación demasiado interpretativa.
