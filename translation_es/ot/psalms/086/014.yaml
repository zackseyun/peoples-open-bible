    rationale: El texto principal dice «hombres violentos», pero la nota afirma «Lit. “hombres violentos”», lo cual no añade información útil ni corresponde al tipo de nota del POB inglés. La decisión inglesa principal fue «ruthless men», con «violent men» como alternativa, no al revés.
  - severity: medium
    issue: Falta una nota para el cierre «no te han puesto delante de ellos».
    rationale: 'El audit trail inglés conserva una alternativa significativa: «before their eyes», con explicación de que no tienen consideración por Dios. En español conviene preservar esa alternativa por nota, especialmente porque «delante de ellos» puede sonar menos transparente.'
  - severity: low
    issue: «Una banda de hombres violentos» puede sonar algo coloquial en español e intensifica menos precisamente el matiz de עָרִיצִים.
    rationale: «Banda» funciona por el contexto hostil, pero «hombres despiadados» corresponde mejor a «ruthless men» y suena más natural en registro bíblico amplio que «hombres violentos».
