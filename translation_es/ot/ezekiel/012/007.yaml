translation:
  language: es
  text: 'Así hice, tal como se me mandó: de día saqué mis enseres, como los enseres del destierro[a]; y al atardecer abrí un boquete en el muro a mano. En la oscuridad lo saqué[b]; lo cargué sobre mi hombro ante sus ojos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como los enseres de un deportado». El hebreo se refiere a pertenencias preparadas para ir al destierro.
    reason: lexical_alternative
  - marker: b
    text: O «en la penumbra» o «al anochecer». El término hebreo denota oscuridad y puede insinuar también ocultamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעַשׂ כֵּן
  english_pob_choice: So I did
  chosen_spanish: Así hice
  alternatives_spanish:
  - Y así hice
  - Entonces hice así
  lexicon: HALOT
  rationale: La respuesta narrativa y obediente se expresa de forma natural con «Así hice», que conserva la secuencia y la sumisión al mandato sin sonar forzada.
- source_word: כַּאֲשֶׁר צֻוֵּיתִי
  english_pob_choice: as I was commanded
  chosen_spanish: como se me mandó
  alternatives_spanish:
  - como se me ordenó
  - tal como se me había mandado
  lexicon: HALOT
  rationale: El pasivo hebreo se vierte de manera natural en español con una construcción impersonal/reflexiva. «Mandó» mantiene el valor de una orden recibida.
- source_word: כֵּלַי
  english_pob_choice: my baggage
  chosen_spanish: mis enseres
  alternatives_spanish:
  - mi equipaje
  - mis cosas
  - mis pertenencias
  lexicon: HALOT
  rationale: En este gesto profético, כְּלִי refiere pertenencias portátiles preparadas para salir. «Enseres» es amplio y digno, y comunica mejor el conjunto de objetos que «equipaje» en español.
- source_word: כִּכְלֵי גוֹלָה
  english_pob_choice: like the baggage of exile
  chosen_spanish: como los enseres del destierro
  alternatives_spanish:
  - como el equipaje del destierro
  - como los enseres de un deportado
  - como el bagaje del exilio
  lexicon: HALOT
  rationale: «Destierro» conserva la idea de desplazamiento forzoso y suena natural en español bíblico. «Enseres del destierro» mantiene la imagen concreta del hebreo sin introducir una interpretación ajena.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en pleno día
  lexicon: HALOT
  rationale: Adverbio temporal sencillo y natural que conserva la visibilidad pública del acto.
- source_word: חָתַרְתִּי לִי בַקִּיר
  english_pob_choice: I dug through the wall by hand
  chosen_spanish: abrí un boquete en el muro
  alternatives_spanish:
  - horadé el muro
  - perforé el muro
  - abrí un hueco en el muro
  lexicon: HALOT
  rationale: חָתַר transmite la acción de excavar/abrir paso en una pared. «Abrí un boquete» comunica con claridad el resultado físico del acto y evita un calco duro; el detalle instrumental se conserva en el complemento siguiente.
- source_word: בְּיָד
  english_pob_choice: by hand
  chosen_spanish: con la mano
  alternatives_spanish:
  - a mano
  - manualmente
  lexicon: HALOT
  rationale: La frase instrumental subraya que fue una acción manual y personal. «Con la mano» es natural y visible en español; en este contexto puede entenderse como uso de las manos.
- source_word: בָּעֲלָטָה
  english_pob_choice: In the dark
  chosen_spanish: En la oscuridad
  alternatives_spanish:
  - En la sombra
  - En la penumbra
  - En lo oscuro
  lexicon: HALOT
  rationale: El término denota oscuridad/gloom. «En la oscuridad» conserva el sentido literal sin añadir de forma innecesaria la matiz interpretativo de secreto.
- source_word: הוֹצֵאתִי
  english_pob_choice: I brought it out
  chosen_spanish: lo saqué
  alternatives_spanish:
  - lo traje afuera
  - lo puse fuera
  lexicon: HALOT
  rationale: El verbo חוז/הוציא aquí describe sacar algo al exterior. «Lo saqué» es la equivalencia más directa y natural en español.
- source_word: עַל כָּתֵף נָשָׂאתִי
  english_pob_choice: I carried it on my shoulder
  chosen_spanish: lo cargué sobre mi hombro
  alternatives_spanish:
  - lo llevé sobre mi hombro
  - lo porté sobre el hombro
  lexicon: HALOT
  rationale: «Cargar sobre el hombro» conserva la imagen corporal del signo profético y resulta idiomático en español.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - a la vista de ellos
  - ante sus ojos
  lexicon: HALOT
  rationale: La fórmula hebrea expresa acción pública y visible. «Delante de ellos» mantiene la escena sin sonar demasiado arcaica; «ante sus ojos» sería posible, pero más marcado.
theological_decisions:
- issue: Carácter del acto profético como señal pública
  english_pob_reading: Render the actions concretely and publicly without allegorizing within the verse.
  chosen_spanish_reading: Traducir las acciones de forma concreta y pública, sin convertir el versículo en una paráfrasis simbólica.
  alternative_spanish_readings:
  - foregrounding the exile symbolism in the translation
  - hacer más explícito el simbolismo del destierro dentro del mismo versículo
  rationale: El contexto explica el signo, pero aquí el texto narra la acción. La traducción debe preservar la materialidad del gesto —sacar, abrir un boquete, cargar— y dejar que el simbolismo emerja del contexto inmediato.
  doctrine_reference: 'Principio de traducción POB: fidelidad al sentido textual y al desarrollo contextual'
- issue: Valor de גּוֹלָה en la expresión «כִּכְלֵי גוֹלָה»
  english_pob_reading: like the baggage of exile / baggage of a deportee
  chosen_spanish_reading: como los enseres del destierro
  alternative_spanish_readings:
  - como los enseres de un deportado
  - como el equipaje del exilio
  rationale: «Destierro» comunica la experiencia forzada de salir de la tierra y conserva el tono profético. No se suaviza a mero viaje, ni se reemplaza por un término eclesiástico o tradicional no solicitado por el hebreo.
  doctrine_reference: POB lexical policy on exile/deportation language
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditorio en inglés del POB. Se evitó un traslado mecánico de «baggage», prefiriendo «enseres» por naturalidad y amplitud semántica. También se mantuvo la secuencia temporal día/noche y la visibilidad pública del signo, sin añadir explicaciones que el versículo no incluye.
  spanish_consistency_notes:
  - Se mantiene «destierro» para גוֹלָה, coherente con el lenguaje profético de exilio.
  - «Enseres» se usa con valor colectivo para bienes portátiles; el singular/plural se ajusta al español natural sin perder la imagen hebrea.
  - «Delante de ellos» preserva la dimensión pública del signo-acto.
  - No se introdujo «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
