lexical_decisions:
- source_word: לִ/דְלָיָהוּ
  english_pob_choice: for Delaiah
  chosen_spanish: para Delaía
  alternatives_spanish:
  - a Delaía
  - corresponde a Delaía
  lexicon: HALOT
  rationale: El ל prefijado expresa asignación dentro del reparto de suertes o turnos. En español, «para» comunica mejor la idea de adjudicación en una lista enumerativa, manteniendo el nombre con transliteración breve y naturalizada.
- source_word: שְׁלֹשָׁה וְ/עֶשְׂרִים
  english_pob_choice: the twenty-third
  chosen_spanish: el vigésimo tercero
  alternatives_spanish:
  - veintitrés
  - el tercero y vigésimo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tres y veinte», el valor contextual es ordinal en la secuencia de divisiones sacerdotales. En español, el ordinal expresa mejor la función listada que el cardinal.
- source_word: לְ/מַעַזְיָהוּ
  english_pob_choice: for Maaziah
  chosen_spanish: para Mazaías
  alternatives_spanish:
  - a Mazaías
  - corresponde a Mazaías
  lexicon: HALOT
  rationale: Como en el primer miembro, el ל indica asignación. «Para» conserva ese sentido distributivo. Se conserva el nombre mediante transliteración coherente al castellano.
- source_word: אַרְבָּעָה וְ/עֶשְׂרִים
  english_pob_choice: the twenty-fourth
  chosen_spanish: el vigésimo cuarto
  alternatives_spanish:
  - veinticuatro
  - el cuarto y vigésimo
  lexicon: HALOT
  rationale: La forma hebrea es cardinal en apariencia, pero en contexto funciona como ordinal. «El vigésimo cuarto» reproduce ese valor secuencial con claridad y sin perder precisión.
