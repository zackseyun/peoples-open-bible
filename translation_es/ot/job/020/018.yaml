review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: devolver lo obtenido por el trabajo, no poder consumirlo, y no alegrarse por la riqueza adquirida. Sin embargo, «lo que trabajó» suena poco natural en español y expresa la labor realizada más que el producto o fruto de esa labor, que es el matiz contextual documentado en la auditoría inglesa.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «devuelve lo que trabajó» resulta forzada en español. «No lo traga» preserva la imagen concreta y es aceptable. «Conforme a la riqueza de su intercambio» es algo rígido pero defendible, especialmente con la nota. Conviene mejorar la primera frase para naturalidad sin perder la concisión.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son coherentes con el POB inglés. La excepción necesaria es ajustar יָגָע a una formulación española que exprese mejor el fruto de la labor: «lo que obtuvo con su trabajo» o similar.'
  issues:
  - severity: medium
    issue: «lo que trabajó» es poco idiomático en español
    rationale: 'Aunque intenta reflejar de cerca el hebreo, en español neutro suena antinatural y puede entenderse como la actividad trabajada, no como lo ganado por ella. El POB inglés documenta explícitamente el valor contextual de objeto: «what he labored for».'
  - severity: low
    issue: La nota al pie abre con comillas y «O:» de forma algo torpe
    rationale: 'Se entiende, pero una formulación más limpia en español bíblico moderno mejora la legibilidad: «O bien: …». No afecta el sentido.'
