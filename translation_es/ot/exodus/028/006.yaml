  to: Y harán el efod de oro[a], azul, púrpura, hilo carmesí y lino fino torcido, obra de un hábil diseñador[b].
  rationale: Se corrigió «carmesí» a «hilo carmesí» para conservar el sentido textil de תּוֹלַעַת שָׁנִי; se cambió «hilo de lino fino» por «lino fino torcido» para reflejar mejor שֵׁשׁ מָשְׁזָר; y se reubicó la nota [b] al sintagma «obra de un hábil diseñador», que es el segmento al que realmente corresponde según la auditoría inglesa. También se suavizó la enumeración con una coordinación más natural en español.
