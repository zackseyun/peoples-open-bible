translation:
  language: es
  text: 'Pero él le dijo: «Hombre, ¿quién me nombró juez o divisor[a] sobre ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego también puede referirse, más concretamente, a quien reparte o divide bienes, probablemente en una disputa de herencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν αὐτῷ
  english_pob_choice: But he said to him
  chosen_spanish: Pero él le dijo
  alternatives_spanish:
  - Y él le dijo
  lexicon: BDAG
  rationale: δέ introduce una transición contraria o marcadamente responsiva; «Pero» conserva mejor ese giro que «Y». Se mantiene el pronombre explícito por claridad narrativa en español.
- source_word: Ἄνθρωπε
  english_pob_choice: Man
  chosen_spanish: Hombre
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: La vocación directa de ἄνθρωπος aquí es brusca y genérica; «Hombre» refleja mejor el tono del griego que la opción respetuosa «Señor».
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - qué persona
  lexicon: BDAG
  rationale: Interrogativo personal directo; «quién» es la equivalencia natural y transparente en español.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: ha puesto
  alternatives_spanish:
  - nombró
  - designó
  - estableció
  lexicon: BDAG
  rationale: El verbo aquí expresa designación para una función. En español, «ha puesto» comunica la idea de asignar o colocar en un rol, y mantiene el impulso retórico de la pregunta. «Nombró» o «designó» serían más formales; «ha puesto» suena más natural sin perder el sentido de autorización.
- source_word: κριτὴν
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - árbitro
  lexicon: BDAG
  rationale: κριτής es quien decide un caso; «juez» es la equivalencia directa y comprensible. «Árbitro» podría funcionar, pero en español moderno suele sonar más deportivo o contractual.
- source_word: μεριστὴν
  english_pob_choice: divider
  chosen_spanish: divisor[a]
  alternatives_spanish:
  - árbitro
  - repartidor
  - arbitrador
  lexicon: BDAG
  rationale: La POB inglesa (revertida a «divider» por doctrine-realignment) preserva el sentido más literal de μεριστής como quien divide o reparte bienes. En español, «divisor» traduce este valor con precisión; la nota preserva el matiz de repartición patrimonial en una disputa de herencia.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: over you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - entre ustedes
  - respecto de ustedes
  lexicon: BDAG
  rationale: ἐπί con acusativo indica ámbito de autoridad o jurisdicción; «sobre ustedes» conserva ese valor relacional y de competencia. Se usa el plural de tratamiento neutro latinoamericano «ustedes».
theological_decisions:
- issue: Negativa de Jesús a ejercer adjudicación civil en esta disputa
  english_pob_reading: Render the statement as a rhetorical refusal to accept appointment as judge or divider over this dispute, without importing a broader denial of all judicial authority.
  chosen_spanish_reading: La frase se traduce como una negativa retórica a asumir un cargo de juez o arbitrador en este pleito, sin ampliarla a una negación absoluta de toda autoridad judicial.
  alternative_spanish_readings:
  - Una renuncia a toda función legal o social
  - Una crítica general a la ley de herencias
  rationale: El griego se limita a la pregunta de quién lo nombró para esa función concreta «sobre ustedes». La traducción conserva esa limitación y evita resolver la tensión hacia una postura más amplia que el texto no exige.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el pasaje.
translation_notes:
  revision_awareness: La redacción sigue el texto inglés revisado por doctrine-realignment, que revirtió 'arbitrator' a 'divider' para restaurar la traducción del redactor. En español, «divisor» refleja directamente μεριστής como quien divide o reparte bienes, con la nota preservando el contexto de disputa de herencia.
  spanish_consistency_notes:
  - Se conserva «juez» para κριτής y un segundo término funcionalmente distinto para μεριστής, evitando colapsar ambos en una sola palabra.
  - Se mantiene el registro breve y directo del original, con puntuación de cita adecuada al español.
  - Se usa «ustedes» para el destinatario plural implícito del griego, sin introducir singularidad no presente en el texto.
