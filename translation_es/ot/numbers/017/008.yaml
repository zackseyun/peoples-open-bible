  rationale: Se corrige el verbo principal para reflejar con más precisión el movimiento narrativo de בוא y se sustituye «Tabernáculo» por «Tienda» para alinearse mejor con אֹהֶל y con la decisión auditada «Tent of Meeting». Se mantiene una nota literal sobre «faz» para preservar la imagen de אֶל־פְּנֵי sin recargar el texto principal.
