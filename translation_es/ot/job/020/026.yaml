    rationale: Con אֵשׁ como antecedente y el paralelismo con «lo consumirá», una traducción más fuerte como «consumirá lo que quede» o «devorará lo que quede» preserva mejor la fuerza poética. La nota puede seguir registrando la alternativa «dañará al sobreviviente».
