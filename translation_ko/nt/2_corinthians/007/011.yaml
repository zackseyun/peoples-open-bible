id: 2CO.7.11
reference: 2 Corinthians 7:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἰδοὺ γὰρ αὐτὸ τοῦτο τὸ κατὰ θεὸν ⸀λυπηθῆναι πόσην κατειργάσατο ὑμῖν σπουδήν, ἀλλὰ ἀπολογίαν, ἀλλὰ ἀγανάκτησιν, ἀλλὰ φόβον, ἀλλὰ ἐπιπόθησιν, ἀλλὰ ζῆλον, ἀλλὰ ἐκδίκησιν· ἐν παντὶ συνεστήσατε ἑαυτοὺς ἁγνοὺς ⸀εἶναι τῷ πράγματι.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/007/011.yaml
  text: 'For see what earnestness this very grief according to God has produced in you: but also a defense, but also indignation, but also fear, but also longing, but also zeal, but also vindication. In every way you proved yourselves to be pure in the matter.'
  footnotes:
  - marker: a
    text: Or 'this very godly grief.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a clearing of yourselves' for 'a defense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'punishment' or 'justice' for 'vindication.'
    reason: lexical_alternative
translation:
  language: ko
  text: 보십시오, 하나님께서 원하시는 방식으로 슬퍼한 바로 그 일이 여러분에게 얼마나 큰 열심을 이루었습니까. 또한 변호와 분개와 두려움과 사모함과 열심과 신원을 이루었습니다. 여러분은 모든 면에서 이 일에 자신이 깨끗하다는 것을 입증하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπουδήν
  english_pob_choice: earnestness
  chosen_korean: 열심
  alternatives_korean:
  - 진지함
  - 열의
  lexicon: BDAG
  rationale: 7:7의 ζῆλος와 인접 어휘이나 σπουδή는 「부지런함·진지함」.
- source_word: ἀπολογίαν
  english_pob_choice: defense
  chosen_korean: 변호
  alternatives_korean:
  - 해명
  lexicon: BDAG
  rationale: 법정 용어.
- source_word: ἀγανάκτησιν
  english_pob_choice: indignation
  chosen_korean: 분개
  alternatives_korean:
  - 분노
  lexicon: BDAG
  rationale: 의로운 분노.
- source_word: ἐκδίκησιν
  english_pob_choice: vindication
  chosen_korean: 신원
  alternatives_korean:
  - 징벌
  - 정당화
  lexicon: BDAG
  rationale: ἐκδίκησις는 「복수·정당한 처벌·신원」. 본 문맥에서는 잘못 행한 자에 대한 정당한 조치를 의미.
- source_word: ἁγνοὺς
  english_pob_choice: pure
  chosen_korean: 깨끗하다
  alternatives_korean:
  - 결백하다
  lexicon: BDAG
  rationale: 6:6의 ἁγνότης와 동근.
