  source_alignment_summary: 'El borrador sigue bien el hebreo principal: preserva «hacerse culpable», distingue «asamblea» y «congregación», y mantiene la difícil expresión «puertas de Dios» con nota al paralelo griego. Sin embargo, «no te bajes» no representa fielmente la fuerza de וְאַל תַּפִּילְךָ / «do not bring yourself down» y suena coloquial y semánticamente débil en español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «no te bajes» resulta poco natural en este contexto, sugiere movimiento físico o registro coloquial, y no comunica bien la idea de rebajarse o arruinarse uno mismo en medio de la comunidad. Además, el marcador de nota está mal ubicado sobre «te» en vez de anclar la variante al sintagma problemático «puertas de Dios».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para אֵל. «Asamblea»/«congregación» respetan la diferenciación documentada. La revisión propuesta conserva la prioridad del hebreo y la nota alternativa griega.
  issues:
  - severity: medium
    issue: «no te bajes» es coloquial y semánticamente impreciso
    rationale: La forma española no expresa bien la idea de causarse caída, rebajamiento o ruina; puede entenderse como ‘descenderse’ físicamente. «No te rebajes» o «no te degrades» comunica mejor el valor reflexivo y la dignidad del registro.
  - severity: low
    issue: El marcador de nota [b] está anclado en «te»
    rationale: La nota explica la variante sobre «puertas de Dios»/«multitud de la ciudad», por lo que debe colocarse junto a «Dios» o al sintagma correspondiente, no sobre un pronombre sin relación semántica.
  - severity: low
    issue: Marcador de nota no secuencial
    rationale: Solo hay una nota en el registro; debe comenzar con «a», no con «b», para cumplir la convención requerida.
