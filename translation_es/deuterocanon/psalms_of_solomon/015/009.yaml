    text: Or 'from the godly' for 'from the holy ones.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'as those pursued by war' is compressed Greek and may also be understood more dynamically as 'like people driven off by war.'
    reason: alternative_reading
  - marker: c
    text: Or 'from the holy ones'.
    reason: previous_rendering
