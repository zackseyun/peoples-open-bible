review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: posesión familiar (''Tenemos una hermana''), pequeñez/inmadurez (''pequeña''), la mención física directa (''no tiene pechos'') y la deliberación (''¿Qué haremos...?''). Sin embargo, no sigue fielmente la decisión auditada de la POB inglesa en el último miembro. El inglés principal escogió ''when she is spoken for'' por el probable contexto matrimonial, preservando ''spoken about'' solo en nota. El español invierte esa relación al poner como texto principal ''cuando se hable de ella'' y además la nota repite sustancialmente la misma lectura, por lo que se pierde la fuerza contextual documentada.'
  spanish_quality_summary: 'El español es en general claro y legible, pero ''en el día cuando'' suena poco natural en español bíblico contemporáneo. ''¿Qué haremos por nuestra hermana el día en que sea pedida en matrimonio?'' o una formulación equivalente conserva la dignidad y mejora la fluidez. ''No tiene pechos'' es directo; aunque puede resultar fuerte, corresponde al hebreo y es defendible. La nota actual está mal anclada: el marcador [a] aparece en ''hermana'' pero explica el último miembro del versículo.'
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías. Las decisiones léxicas importantes son mayormente adecuadas, excepto שֶׁיְּדֻבַּר בָּהּ, donde el español debería reflejar en el texto principal la opción contextual preferida por la auditoría (''ser pedida/prometida/hablada para matrimonio'') y dejar ''se hable de ella'' como alternativa en nota. También conviene alinear la sintaxis temporal con un español natural: ''el día en que''.'
  issues:
  - severity: high
    issue: La cláusula final no sigue la decisión principal de la POB inglesa.
    rationale: La auditoría inglesa eligió como texto principal 'when she is spoken for' y dejó 'when she is spoken about' en nota. El borrador español hace lo contrario, alterando el balance semántico documentado.
  - severity: medium
    issue: La nota al pie está anclada en el lugar incorrecto.
    rationale: El marcador [a] aparece tras 'hermana', pero la nota explica la ambigüedad de שֶׁיְּדֻבַּר בָּהּ al final del versículo. Debe anclarse en la frase correspondiente.
  - severity: medium
    issue: La secuencia 'en el día cuando' es poco natural en español.
    rationale: Aunque reproduce elementos de la estructura hebrea, en español resulta forzada. 'El día en que' conserva el sentido con mejor legibilidad.
  - severity: low
    issue: La nota actual duplica el texto principal en vez de ofrecer una alternativa real.
    rationale: Si el texto principal dice 'se hable de ella' y la nota ofrece 'cuando se hable de ella', la nota no cumple su función de preservar la alternativa significativa.
  revised_spanish_text: Tenemos una hermana pequeña, y no tiene pechos. ¿Qué haremos por nuestra hermana el día en que sea pedida en matrimonio[a]?
  revised_footnotes:
