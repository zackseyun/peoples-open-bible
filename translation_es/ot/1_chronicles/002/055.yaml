  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. No aparecen Yahvé/Mesías u otros términos sensibles. «Escribas» para סֹפְרִים y «padre de la casa de Recab» para אֲבִי בֵית רֵכָב concuerdan con el audit trail. «Queneos» es una forma castellana válida para קֵינִים.
