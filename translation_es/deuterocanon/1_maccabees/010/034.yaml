  to: Y que todas las fiestas, los sábados, las lunas nuevas y los días señalados, y los tres días antes de una fiesta y los tres días después de una fiesta, sean días de exención de tributo y de remisión[a] para todos los judíos que están en todo mi reino.
  rationale: Se ajusta ἀφέσεως a «remisión» para reflejar mejor el sentido administrativo documentado en el POB inglés, evitando la ambigüedad de «liberación». También se aligera «sean todos días» a «sean días» para un español más natural sin apartarse del sentido fuente. No se necesita nota en «días señalados», pues el borrador ya representa fielmente ἡμέραι ἀποδεδειγμέναι.
