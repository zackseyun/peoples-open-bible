review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: Jonatán y Ahimaaz apostados en En-rógel, una servidora que les comunica, ellos que van a informar al rey David, y la razón de ese arreglo: no podían ser vistos al entrar en la ciudad. Sin embargo, hay dos desajustes menores con el expediente auditado: (1) la nota [a] dice «estando», pero el hebreo literalmente es «de pie/estando parados», y (2) «sierva» en español bíblico puede sugerir más fuertemente una relación religiosa o de sumisión personal, mientras que aquí el sentido funcional de שִׁפְחָה se expresa con más claridad como «sirvienta» o «criada».'
  spanish_quality_summary: El texto es claro y natural, con buen registro narrativo. «Ahora bien» funciona, pero es algo innecesario; el versículo fluye mejor sin ello. «Iba y les avisaba; y ellos iban y avisaban» es entendible, aunque algo repetitivo; aun así conserva bien el valor procedimental. El principal ajuste de legibilidad es preferir «sirvienta» en el texto principal para evitar ambigüedad devocional de «sierva».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El manejo de nombres propios y de la sintaxis narrativa es adecuado. La elección de «sierva» no viola un glosario fijo, pero sí se aparta de la justificación léxica del inglés POB, que prioriza una designación funcional de servidora mujer; «sirvienta» o «criada» se alinean mejor aquí.
  issues:
  - severity: medium
    issue: «una sierva» puede sonar más devocional o solemne que funcional
    rationale: שִׁפְחָה aquí designa a una servidora mujer en una cadena de mensajería. En español eclesial, «sierva» puede evocar «sierva de Dios» más que una empleada doméstica o mensajera. «Sirvienta» comunica mejor la función inmediata sin añadir matiz teológico ajeno.
  - severity: low
    issue: La nota [a] no expresa con precisión la literalidad del participio
    rationale: Dice «literalmente “estando”», pero el valor léxico más cercano de עֹמְדִים es «estando de pie/puestos». Conviene ajustar la nota para que el lector no pienda la imagen básica del hebreo.
  - severity: low
    issue: «Ahora bien» es prescindible y algo discursivo
    rationale: No corresponde a un elemento explícito del hebreo y puede omitirse para una apertura más directa y natural en español.
  revised_spanish_text: Jonatán y Ahimaaz estaban en En-rógel[a], y una sirvienta[b] iba y les avisaba; y ellos iban y avisaban al rey David, porque no podían ser vistos al entrar en la ciudad.
  revised_footnotes:
  - marker: a
    text: O «estaban de pie»; el participio hebreo dice literalmente «de pie/puestos», pero en contexto indica que estaban apostados allí.
    reason: lexical_alternative
  - marker: b
    text: O «criada». El hebreo שִׁפְחָה designa específicamente a una servidora mujer.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la precisión léxica y la naturalidad del español: se omitió «Ahora bien» por innecesario, se cambió «sierva» por «sirvienta» para reflejar mejor la función de שִׁפְחָה en contexto, y se corrigió la nota [a] para representar con más exactitud la literalidad del participio hebreo.'
