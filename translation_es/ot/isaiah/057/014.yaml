translation:
  language: es
  text: 'Y se dirá[a]: «Allanen, allanen; despejen el camino; quiten la piedra de tropiezo del camino de mi pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «Allanen, allanen; preparen el camino». El hebreo usa imaginería de construcción de caminos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: And it will be said
  chosen_spanish: Y se dirá
  alternatives_spanish:
  - Y dirán
  - Entonces se dirá
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal sin sujeto explícito que funciona como anuncio impersonal. «Se dirá» conserva esa indeterminación y evita añadir un hablante no especificado.
- source_word: סֹלּוּ סֹלּוּ
  english_pob_choice: Build up, build up
  chosen_spanish: Levanten, levanten
  alternatives_spanish:
  - Levanten el camino, levanten
  - Aterricen, aterricen
  lexicon: HALOT
  rationale: El verbo סלל tiene la imagen de amontonar o elevar una vía. En español, «levanten» reproduce mejor la metáfora de construcción de camino que una traducción más tradicional pero menos transparente como «allanad» o «preparad».
- source_word: פַּנּוּ דָרֶךְ
  english_pob_choice: clear the way
  chosen_spanish: despejen el camino
  alternatives_spanish:
  - preparen el camino
  - allanen el camino
  lexicon: HALOT
  rationale: פנה en imperativo comunica quitar lo que estorba para abrir paso. «Despejen el camino» suena natural en español y mantiene la idea de quitar obstáculos para poder pasar.
- source_word: הָרִימוּ
  english_pob_choice: remove
  chosen_spanish: quiten
  alternatives_spanish:
  - levanten
  - saquen
  lexicon: HALOT
  rationale: Aunque el verbo literalmente es «levantar», en este contexto rige el objeto «piedra de tropiezo» y expresa retirarla del trayecto. «Quiten» recoge la función contextual sin perder la concreción de la acción.
- source_word: מִכְשׁוֹל
  english_pob_choice: stumbling block
  chosen_spanish: piedra de tropiezo
  alternatives_spanish:
  - obstáculo
  - tropezadero
  lexicon: HALOT
  rationale: מכשול designa algo que hace tropezar. «Piedra de tropiezo» preserva la metáfora bíblica habitual en español y mantiene la fuerza figurada del término.
- source_word: מִדֶּרֶךְ עַמִּי
  english_pob_choice: from the way of my people
  chosen_spanish: del camino de mi pueblo
  alternatives_spanish:
  - de la senda de mi pueblo
  - del camino de mi gente
  lexicon: HALOT
  rationale: La preposición מן marca salida o alejamiento de la vía perteneciente al pueblo de Dios. «Del camino de mi pueblo» refleja con naturalidad el valor espacial y posesivo del hebreo.
theological_decisions:
- issue: Identificación del hablante en la fórmula inicial
  english_pob_reading: An impersonal announcement ('it will be said') without specifying the speaker
  chosen_spanish_reading: 'Una fórmula impersonal: ''Y se dirá'''
  alternative_spanish_readings:
  - Y dirá
  - Entonces dirán
  rationale: El hebreo no nombra sujeto y permite una proclamación impersonal. Mantenerlo en español evita resolver una ambigüedad que el texto no resuelve.
  doctrine_reference: Preservar la tensión interpretativa sin introducir un sujeto explícito.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente del POB en inglés, que prefirió 'remove the stumbling block' por ser más natural y más cercano al hebreo. En español se refleja esa misma decisión con 'quiten la piedra de tropiezo'.
  spanish_consistency_notes:
  - Se usa «mi pueblo» para mantener el posesivo del hebreo y la continuidad con el audit trail inglés.
  - Se evita «Cristo», «SEÑOR» u otra terminología de sustitución porque el versículo no los contiene.
  - La imagen de camino se mantiene de forma concreta, sin convertirla en una paráfrasis abstracta.
