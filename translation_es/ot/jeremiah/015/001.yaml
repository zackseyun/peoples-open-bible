translation:
  language: es
  text: 'Entonces Yahvé me dijo[a]: «Aun si Moisés y Samuel estuvieran de pie ante mí, mi alma no estaría hacia este pueblo. Envíalos lejos de delante de mí[b], y que salgan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «mi corazón no estaría hacia este pueblo» o «no tendría yo consideración por este pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de delante de mí»; es decir, «fuera de mi presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en español como transliteración reverente y reconocible, en línea con la política del proyecto; no se sustituye por un título que oculte el Tetragrámaton.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» comunica esa secuencia en español con naturalidad.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En español, el dativo átono «me» funciona con naturalidad después de «dijo», sin perder el sentido del destinatario del habla.
- source_word: אִם יַעֲמֹד
  english_pob_choice: Even if ... were to stand
  chosen_spanish: Aunque ... se pusieran delante de mí
  alternatives_spanish:
  - Si ... se pusieran delante de mí
  - Aun si ... se levantaran delante de mí
  lexicon: HALOT
  rationale: La construcción hebrea es concesiva e hipotética. En español, «aunque» expresa mejor la fuerza concesiva; «se pusieran delante de mí» conserva la imagen idiomática de presentarse ante una autoridad.
- source_word: יַעֲמֹד ... לְפָנַי
  english_pob_choice: were to stand before me
  chosen_spanish: se pusieran delante de mí
  alternatives_spanish:
  - estuvieran delante de mí
  - comparecieran ante mí
  lexicon: HALOT
  rationale: Se mantiene la imagen de estar delante/ante la presencia de Yahvé, sin introducir explícitamente el verbo «interceder» que no aparece en el hebreo.
- source_word: מֹשֶׁה וּשְׁמוּאֵל
  english_pob_choice: Moses and Samuel
  chosen_spanish: Moisés y Samuel
  alternatives_spanish:
  - Mosés y Samuel
  lexicon: HALOT
  rationale: Se conservan los nombres propios en su forma española establecida y ampliamente reconocible.
- source_word: אֵין נַפְשִׁי אֶל־הָעָם הַזֶּה
  english_pob_choice: my soul would not be toward this people
  chosen_spanish: no estaría mi alma inclinada hacia este pueblo
  alternatives_spanish:
  - no tendría yo mi corazón hacia este pueblo
  - no me mostraría favorable a este pueblo
  lexicon: HALOT
  rationale: Se preserva la tensión antropomórfica de נֶפֶשׁ con «mi alma», evitando una paráfrasis que la diluya. «Inclinada hacia» reproduce con claridad la orientación/disposición expresada por אֶל.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - estas personas
  - este gente
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo del hebreo, más acorde con el sentido pactual y nacional del término.
- source_word: שַׁלַּח
  english_pob_choice: Send
  chosen_spanish: Despídelos
  alternatives_spanish:
  - Envíalos
  - Suéltalos
  lexicon: HALOT
  rationale: En este contexto, el objeto implícito son las personas sobre las que se habla; «despídelos» comunica mejor la fuerza imperativa de apartarlos de la presencia divina que un simple «envíalos».
- source_word: מֵעַל פָּנַי
  english_pob_choice: away from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - fuera de mi presencia
  - lejos de mi rostro
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea concreta y natural en español. La opción más idiomática de «fuera de mi presencia» queda implícitamente disponible sin borrar la imagen original.
- source_word: וְיֵצֵאוּ
  english_pob_choice: and let them go out
  chosen_spanish: y que se vayan
  alternatives_spanish:
  - y salgan
  - y salgan de allí
  lexicon: HALOT
  rationale: El valor jussivo se expresa en español con «que se vayan», natural y claro; conserva la idea de salida sin forzar el calco «salgan».
theological_decisions:
- issue: Lenguaje antropomórfico de נַפְשִׁי aplicado a Yahvé
  english_pob_reading: Retain the anthropomorphic wording 'my soul would not be toward this people'.
  chosen_spanish_reading: no estaría mi alma inclinada hacia este pueblo
  alternative_spanish_readings:
  - no tendría yo mi corazón hacia este pueblo
  - no me mostraría favorable a este pueblo
  rationale: Se mantiene el lenguaje personal y antropomórfico del hebreo en lugar de resolverlo con una paráfrasis abstracta. Esto preserva la tensión retórica del texto y su fuerza profética.
  doctrine_reference: Translation philosophy §3
- issue: La expresión 'estar delante de mí' respecto de Moisés y Samuel
  english_pob_reading: Preserve the idiom 'stand before me' and let readers infer the intercessory setting from context.
  chosen_spanish_reading: se pusieran delante de mí
  alternative_spanish_readings:
  - intercedieran ante mí
  - comparecieran ante mí
  rationale: La frase principal conserva el modismo hebreo sin añadir explícitamente 'interceder'. Así se respeta la primacía del texto original y se evita sobreinterpretar el verbo.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene la lectura óptima-equivalente del audit trail, con ajustes mínimos para una sintaxis española más natural sin perder la imagen hebrea ni las tensiones antropomórficas documentadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, en coherencia con el estándar del proyecto.
  - «Pueblo» se conserva en singular colectivo, conforme al hebreo y al audit trail inglés.
  - No se introduce «Mesías» ni terminología cristológica ajena al versículo.
  - Las dos notas al pie reproducen las alternativas semánticas preservadas en el POB inglés.
