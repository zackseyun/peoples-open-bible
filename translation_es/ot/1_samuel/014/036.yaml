  to: 'Entonces Saúl dijo: «Descendamos tras los filisteos de noche y los despojemos[a] hasta la luz de la mañana, y no dejemos entre ellos a ningún hombre». Y ellos dijeron: «Haz todo lo que bien te parezca». Pero el sacerdote dijo: «Acercuémonos aquí a Dios».'
