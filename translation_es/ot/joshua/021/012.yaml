  glossary_alignment: No hay términos del glosario principal en juego como Yahvé, Mesías, esclavo, etc. 'Caleb' y 'Jefone' son apropiados. La elección 'aldeas' para חֲצֵרֶיהָ es compatible con la revisión inglesa que prefirió 'villages', siempre que la nota preserve la alternativa de asentamientos/terrenos dependientes.
