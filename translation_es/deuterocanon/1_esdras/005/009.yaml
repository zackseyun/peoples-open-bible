translation:
  language: es
  text: 'El número de los procedentes de la nación, y sus líderes: los hijos de Foros[a], setenta y dos mil[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Phoros». La tradición paralela de la lista hebrea difiere aquí tanto en los nombres como en los números; el texto griego de 1 Esdras parece preservar una forma de lista distinta.'
    reason: alternative_reading
  - marker: b
    text: El griego lee «setenta y dos mil». Esta cifra, inusualmente grande para este contexto, difiere marcadamente del paralelo masorético aproximado y puede reflejar una alteración textual o una tradición de lista distinta.
    reason: textual_variant
lexical_decisions:
- source_word: ἀριθμὸς
  english_pob_choice: The number
  chosen_spanish: El número
  alternatives_spanish:
  - El conteo
  - La cifra
  lexicon: LSJ
  rationale: Mantiene el sentido de encabezado de lista/censo sin añadir interpretación. «El número» es natural y fiel al valor formal del griego.
- source_word: τῶν ἀπὸ τοῦ ἔθνους
  english_pob_choice: of those from the nation
  chosen_spanish: de los procedentes de la nación
  alternatives_spanish:
  - de los que provienen de la nación
  - de los del pueblo
  lexicon: LSJ
  rationale: ἔθνος aquí funciona como grupo colectivo; «procedentes de la nación» conserva la relación de origen que expresa el griego sin volverlo demasiado idiomático o genérico.
- source_word: οἱ προηγούμενοι αὐτῶν
  english_pob_choice: their leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - sus jefes
  - los que iban delante de ellos
  lexicon: LSJ
  rationale: Aunque el participio significa literalmente «los que van delante», en este contexto de lista administrativa/genealógica la función es la de cabezas o dirigentes. «Sus líderes» preserva ese valor contextual.
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: LSJ
  rationale: Se conserva la fórmula genealógica bíblica estándar. En español, «los hijos de» transmite el patrón de lista familiar sin sobreexplicar la relación.
- source_word: Φορὸς
  english_pob_choice: Phoros
  chosen_spanish: Phoros
  alternatives_spanish:
  - Foros
  - Parosh
  lexicon: Greek proper name
  rationale: Se translitera el nombre tal como aparece en el testimonio griego principal. Se evita sustituirlo por una forma tomada de otra tradición textual.
- source_word: ἑβδομήκοντα δύο χιλιάδες
  english_pob_choice: seventy-two thousand
  chosen_spanish: setenta y dos mil
  alternatives_spanish:
  - '72.000'
  lexicon: LSJ
  rationale: Es la lectura directa del griego transmitido. Aunque el número resulta llamativo frente a la tradición paralela, la traducción debe reflejar el texto base sin corregirlo.
theological_decisions:
- issue: Diferencia entre el testimonio griego de 1 Esdras y la tradición paralela hebrea/masorética en el nombre y el número
  english_pob_reading: The Greek text of 1 Esdras appears to preserve a divergent list form; the large number may reflect a textual disturbance or different list tradition.
  chosen_spanish_reading: Se conserva la forma divergente del griego, con nota explicativa sobre la variación textual.
  alternative_spanish_readings:
  - armonizar con la tradición paralela
  - normalizar el nombre y el número según el paralelo hebreo
  rationale: La fidelidad al testimonio principal exige no armonizar automáticamente con el paralelo. La nota permite al lector ver la tensión textual sin ocultarla ni resolverla artificialmente.
  doctrine_reference: Principio de crítica textual y transparencia de fuentes
translation_notes:
  revision_awareness: Se revisó el testimonio griego principal y el paralelo hebreo/masorético indicado en el paquete fuente. No hubo revisiones editoriales adicionales aplicadas en el registro inglés; por tanto, la versión española conserva la lectura transmitida y solo explicita la discrepancia textual ya documentada.
  spanish_consistency_notes:
  - Se mantuvo «Phoros» como transliteración del nombre griego, evitando armonizarlo con otras tradiciones.
  - Se usó «setenta y dos mil» para reproducir literalmente la cifra del griego.
  - La sintaxis sigue el orden de lista del original, pero se ajusta al español para mantener legibilidad sin añadir contenido.
