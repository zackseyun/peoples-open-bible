    reason: lexical_alternative
  - marker: b
    text: «Como posesión» también puede traducirse «como herencia».
    reason: lexical_alternative
  - marker: c
    text: «Monte Seír» puede referirse también a la región montañosa o serranía de Seír.
    reason: cultural_note
  revision_rationale: Se ajusta el español para mayor naturalidad ('No entren en conflicto con ellos') mientras se mantiene el sentido de hostilidad prohibida del hebreo. Se simplifica levemente el modismo del pie para evitar una construcción forzada. Sobre todo, se restaura la nota léxica documentada para יְרֻשָּׁה ('posesión/herencia'), anclándola correctamente en el texto, y se conserva la nota cultural sobre Monte Seír.
