translation:
  language: es
  text: 'Entonces toma el frasco de aceite, derrámalo sobre su cabeza y dile: «Así dice Yahvé: Yo te he ungido rey sobre Israel[a]». Luego abre la puerta y huye; no esperes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Israel»; en esta fórmula de investidura real, el sentido es «sobre Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַךְ
  english_pob_choice: flask
  chosen_spanish: frasco
  alternatives_spanish:
  - vasija pequeña
  - botella
  lexicon: HALOT
  rationale: פַךְ designa un recipiente pequeño para líquidos. En español, «frasco» comunica con naturalidad un recipiente de ese tipo sin volverlo demasiado técnico o arcaico.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: aceite
  alternatives_spanish:
  - el aceite
  - aceite de oliva
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el aceite». En español, «aceite» funciona de forma natural en este contexto ritual; añadir «de oliva» iría más allá del dato explícito del texto.
- source_word: וְיָצַקְתָּ עַל רֹאשׁוֹ
  english_pob_choice: pour it on his head
  chosen_spanish: derrámalo sobre su cabeza
  alternatives_spanish:
  - viértelo sobre su cabeza
  - échalo sobre su cabeza
  lexicon: HALOT
  rationale: יצק con עַל expresa verter o derramar sobre. «Derrámalo» mantiene el acto concreto y suena natural en español; «sobre su cabeza» conserva el objeto directo del rito.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa en español con naturalidad como «Así dice». Se conserva «Yahvé» para el nombre divino conforme al criterio del proyecto.
- source_word: מְשַׁחְתִּיךָ
  english_pob_choice: I have anointed you
  chosen_spanish: Yo te he ungido
  alternatives_spanish:
  - te unjo
  - yo te ungí
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la unción como acto ya realizado en la proclamación. «Te he ungido» refleja bien ese valor perfectivo y la dimensión performativa del anuncio.
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  - para rey
  lexicon: HALOT
  rationale: En este nombramiento real, לְ marca designación a un cargo. «Rey» reproduce de manera directa y clara la función conferida.
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - a Israel
  lexicon: HALOT
  rationale: Aunque el hebreo usa אֶל, la fórmula de investidura tiene sentido de gobierno respecto del pueblo. «Sobre Israel» transmite esa relación de autoridad sin perder la fuerza idiomática.
- source_word: וּפָתַחְתָּ הַדֶּלֶת
  english_pob_choice: Then open the door
  chosen_spanish: Luego abre la puerta
  alternatives_spanish:
  - y abre la puerta
  - después abre la puerta
  lexicon: HALOT
  rationale: La cadena de verbos en waw consecutiva se expresa mejor con una secuencia natural en español. «Luego» marca el paso siguiente de manera clara.
- source_word: וְנַסְתָּה
  english_pob_choice: and flee
  chosen_spanish: y huye
  alternatives_spanish:
  - y escapa
  - y corre
  lexicon: HALOT
  rationale: נוס denota huida rápida ante peligro. «Huye» conserva la urgencia y el tono imperativo del mandato.
- source_word: וְלֹא תְחַכֶּה
  english_pob_choice: do not wait
  chosen_spanish: no te quedes
  alternatives_spanish:
  - no esperes
  - no te demores
  lexicon: HALOT
  rationale: חכה en este contexto manda no demorarse. «No te quedes» comunica en español la idea de no permanecer allí ni entretenerse, con la urgencia implícita del original.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Se mantiene la transliteración «Yahvé» para preservar el nombre propio del Dios del pacto, conforme al criterio del proyecto y a la lectura auditada del inglés POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la fórmula de nombramiento «rey sobre Israel»
  english_pob_reading: I have anointed you king over Israel
  chosen_spanish_reading: Yo te he ungido rey sobre Israel
  alternative_spanish_readings:
  - Yo te he ungido como rey de Israel
  - Yo te he ungido rey para Israel
  rationale: La combinación de ungimiento y cargo real expresa investidura oficial. «Rey sobre Israel» mantiene la fuerza del hebreo y la lectura del POB, que toma la preposición con sentido de autoridad sobre el pueblo.
  doctrine_reference: Notas de fórmula real e investidura en el texto de 2 Reyes 9:3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la lectura auditada en inglés POB: recipiente pequeño + aceite, verter sobre la cabeza, fórmula profética con el nombre divino, unción real, mandato de huida y prohibición de esperar. No se identificaron revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «ungido» para מָשַׁח en sentido ritual y real.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - La secuencia verbal española preserva la rapidez de la instrucción final.
