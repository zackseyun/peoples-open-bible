base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/003/023.yaml
  text: And the sons of Hagar also[a], who seek understanding on the earth—the merchants of Merran and Teman, and the myth-makers and seekers of understanding—did not know the way of wisdom[b], nor did they remember her paths.
  footnotes:
  - marker: a
    text: Greek reads 'Merran,' an unusual place name in this witness; some traditions identify or normalize it differently. The translation preserves the extant Greek form rather than silently emending it.
    reason: textual_variant
  - marker: b
    text: Or 'myth-makers' for 'storytellers'; the Greek refers to people occupied with tales or myths.
    reason: lexical_alternative
