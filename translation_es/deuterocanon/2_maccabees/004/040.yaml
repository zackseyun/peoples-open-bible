translation:
  language: es
  text: Pero cuando la multitud se alzaba y se llenaba de ira[a], Lisímaco armó a unos tres mil hombres[c] y comenzó una violencia injusta[b], con cierto Auranos al frente, un hombre ya entrado en años y no menos en ignorancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se llenaba de enojo». El griego ὀργαῖς puede expresarse con un término más fuerte o más moderado; aquí se conserva «ira» por el tono del contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. «comenzó manos injustas». Es un giro idiomático griego para una acción violenta y culpable; por eso se vierte como «una violencia injusta».
    reason: lexical_alternative
  - marker: c
    text: O «como tres mil hombres». La construcción griega con el numeral puede indicar una cantidad aproximada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεγειρομένων
  english_pob_choice: were rising up
  chosen_spanish: se alzaban
  alternatives_spanish:
  - se levantaban
  - se agitaban
  lexicon: LSJ
  rationale: El participio presenta a las multitudes entrando en acción; «se alzaban» conserva el movimiento inceptivo y el tono de levantamiento colectivo sin forzar una causalidad externa.
- source_word: ὄχλων
  english_pob_choice: crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la gente
  lexicon: LSJ
  rationale: «Las multitudes» es natural en español y mantiene neutralidad. «Turbas» añadiría una valoración negativa que el sustantivo por sí solo no exige.
- source_word: ταῖς ὀργαῖς διεμπιπλαμένων
  english_pob_choice: being filled with anger
  chosen_spanish: se llenaban de ira
  alternatives_spanish:
  - se llenaban de enojo
  - se inflamaban de furor
  lexicon: LSJ
  rationale: «Ira» expresa con mayor intensidad la carga emocional del contexto violento que «enojo», y sigue de cerca el sentido de ὀργαῖς sin exagerar a «furor».
- source_word: καθοπλίσας
  english_pob_choice: armed
  chosen_spanish: armó
  alternatives_spanish:
  - equipó
  - aprestó
  lexicon: LSJ
  rationale: El verbo indica dotar de armas; «armó» es la forma más directa y transparente en español.
- source_word: πρὸς τρισχιλίους
  english_pob_choice: about three thousand
  chosen_spanish: a unos tres mil hombres
  alternatives_spanish:
  - como tres mil hombres
  - alrededor de tres mil hombres
  lexicon: LSJ
  rationale: La preposición con numeral puede ser aproximativa. «A unos tres mil hombres» comunica esa aproximación con claridad y fluidez.
- source_word: κατήρξατο χειρῶν ἀδίκων
  english_pob_choice: began unjust violence
  chosen_spanish: comenzó una violencia injusta
  alternatives_spanish:
  - comenzó actos de violencia injusta
  - inició una violencia inicua
  lexicon: LSJ
  rationale: La expresión literal «manos injustas» es idiomática en griego para acción violenta y culpable. «Violencia injusta» reproduce el juicio moral y la fuerza del giro sin volverlo oscuro para el lector español.
- source_word: προηγησαμένου
  english_pob_choice: taking the lead
  chosen_spanish: encabezando
  alternatives_spanish:
  - yendo delante
  - liderando
  lexicon: LSJ
  rationale: El participio en genitivo absoluto presenta a Auranos como el que va al frente. «Encabezando» es idiomático y mantiene el sentido de dirección de la acción.
- source_word: τινὸς Αὑρανοῦ
  english_pob_choice: a certain Auranus
  chosen_spanish: cierto Auranos
  alternatives_spanish:
  - un tal Auranos
  - uno llamado Auranos
  lexicon: LSJ
  rationale: τινός marca a un individuo no identificado previamente. «Cierto» conserva esa función discursiva; se translitera el nombre como Auranos para una forma española consistente.
- source_word: προβεβηκότος τὴν ἡλικίαν
  english_pob_choice: advanced in age
  chosen_spanish: avanzado en años
  alternatives_spanish:
  - de edad avanzada
  - ya entrado en años
  lexicon: LSJ
  rationale: La frase alude a la vejez o a una edad ya avanzada. «Avanzado en años» es digno, claro y se ajusta bien al registro bíblico español.
- source_word: οὐδὲν δὲ ἧττον καὶ τὴν ἄγνοιαν
  english_pob_choice: and no less in ignorance
  chosen_spanish: y no menos en ignorancia
  alternatives_spanish:
  - y no menos ignorante
  - y con no menos ignorancia
  lexicon: LSJ
  rationale: La construcción mantiene el paralelo irónico entre la edad avanzada y la ignorancia. «No menos en ignorancia» preserva la comparación del griego con mínima expansión.
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado del audit trail inglés: se mantiene la elección más directa y natural para ὀργαῖς como «ira/enojo» en vez de «furor», y para κατήρξατο χειρῶν ἀδίκων como una expresión de violencia injusta, evitando una calca opaca de «manos injustas». También se conserva la aproximación numérica de πρὸς τρισχιλίους.'
  spanish_consistency_notes:
  - 'Se mantiene la transliteración de nombres propios griegos en forma española consistente: Lisímaco, Auranos.'
  - 'Se conserva el paralelismo irónico del final: avanzada edad / ignorancia.'
  - La puntuación reproduce una sola oración larga con incisos, conforme al flujo del griego.
