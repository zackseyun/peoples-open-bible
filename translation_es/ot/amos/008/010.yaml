translation:
  language: es
  text: Haré que sus fiestas se conviertan en luto[a], y todos sus cantos en lamentación[b]; traeré cilicio sobre toda cintura y calvicie sobre toda cabeza; lo haré como luto por un hijo único[c], y su fin como un día amargo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus festivales».
    reason: lexical_alternative
  - marker: b
    text: O «en un canto fúnebre» para «en lamentación».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «como luto por un único». El sentido suele entenderse como el duelo por un hijo único.'
    reason: lexical_alternative
  - marker: d
    text: O «como un día de amargura».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָפַכְתִּי
  english_pob_choice: I will turn
  chosen_spanish: haré que se conviertan
  alternatives_spanish:
  - las volveré
  - las trocaré
  - haré que cambien
  lexicon: HALOT
  rationale: הָפַךְ expresa un cambio de estado. En español, «haré que se conviertan» conserva la transformación desde celebración a duelo sin sonar mecánico.
- source_word: חַגֵּיכֶם
  english_pob_choice: your feasts
  chosen_spanish: sus fiestas
  alternatives_spanish:
  - sus festivales
  - sus fiestas solemnes
  lexicon: HALOT
  rationale: «Fiestas» conserva bien el sentido de celebraciones cultuales y comunitarias. «Festivales» sería posible, pero menos natural en este registro bíblico.
- source_word: לְאֵבֶל
  english_pob_choice: into mourning
  chosen_spanish: en luto
  alternatives_spanish:
  - en duelo
  - en lamento
  lexicon: HALOT
  rationale: אֵבֶל apunta al estado de duelo. «Luto» es una equivalencia natural y digna en español; mantiene la dimensión pública y ritual mejor que «duelo» en este contexto.
- source_word: שִׁירֵיכֶם
  english_pob_choice: your songs
  chosen_spanish: sus cantos
  alternatives_spanish:
  - sus canciones
  - sus himnos
  lexicon: HALOT
  rationale: «Cantos» evita una sonoridad demasiado moderna de «canciones» y conserva mejor el tono cultual o festivo del plural hebreo.
- source_word: לְקִינָה
  english_pob_choice: into lamentation
  chosen_spanish: en lamentación
  alternatives_spanish:
  - en un lamento
  - en un canto fúnebre
  - en una elegía
  lexicon: HALOT
  rationale: קִינָה es una lamentación formal, a menudo fúnebre. «Lamentación» preserva el registro elevado y el carácter ritual.
- source_word: וְהַעֲלֵיתִי
  english_pob_choice: I will bring
  chosen_spanish: traeré
  alternatives_spanish:
  - haré venir
  - pondré
  - haré recaer
  lexicon: HALOT
  rationale: El causativo de עלה puede expresar hacer que algo venga sobre alguien. «Traeré» es idiomático en español y conserva la agencia divina.
- source_word: עַל כָּל מָתְנַיִם שָׂק
  english_pob_choice: sackcloth on every waist
  chosen_spanish: cilicio sobre todo cinturón
  alternatives_spanish:
  - saco sobre toda cintura
  - cilicio sobre toda cintura
  - saco sobre todo lomo
  lexicon: HALOT
  rationale: מָתְנַיִם designa la zona de la cintura/loins. «Cinturón» traduce la imagen de una prenda colocada alrededor de la cintura de modo claro para el lector español; «cilicio» transmite la tela penitencial equivalente al sackcloth bíblico.
- source_word: וְעַל כָּל רֹאשׁ קָרְחָה
  english_pob_choice: baldness on every head
  chosen_spanish: calvicie sobre toda cabeza
  alternatives_spanish:
  - rapa en toda cabeza
  - cabeza rapada sobre toda cabeza
  lexicon: HALOT
  rationale: קָרְחָה es la calvicie o desnudez del cuero cabelludo como signo de duelo. «Calvicie» conserva la imagen literal y el carácter profético sin añadir explicación.
- source_word: וְשַׂמְתִּיהָ
  english_pob_choice: I will make it
  chosen_spanish: lo haré
  alternatives_spanish:
  - la haré
  - lo pondré
  - la pondré
  lexicon: HALOT
  rationale: El sufijo femenino admite un referente colectivo implícito. «Lo haré» mantiene la ambigüedad del referente y suena natural en español, sin forzar «la» ni especificar más de lo que el hebreo obliga.
- source_word: כְּאֵבֶל יָחִיד
  english_pob_choice: like mourning for an only son
  chosen_spanish: como luto por un hijo único
  alternatives_spanish:
  - como duelo por un hijo único
  - como luto por un único hijo
  - como duelo por un solo hijo
  lexicon: HALOT
  rationale: יָחִיד significa «único/solo». La tradición entiende aquí el dolor por un hijo único. «Hijo único» mantiene la fuerza idiomática y la referencia afectiva; «luto» enlaza con la primera mitad del verso.
- source_word: וְאַחֲרִיתָהּ
  english_pob_choice: its end
  chosen_spanish: su fin
  alternatives_spanish:
  - su final
  - su desenlace
  - su postrimería
  lexicon: HALOT
  rationale: אַחֲרִית es el final o desenlace de una situación. «Su fin» es breve, directo y conserva la referencia colectiva/abstracta ambigua.
- source_word: כְּיוֹם מָר
  english_pob_choice: like a bitter day
  chosen_spanish: como un día amargo
  alternatives_spanish:
  - como un día de amargura
  - como un día cruel
  - como un día de dolor
  lexicon: HALOT
  rationale: מָר expresa amargura. «Amargo» reproduce el valor adjetival del hebreo y mantiene la intensidad emocional del cierre.
theological_decisions:
- issue: Referencia del sufijo femenino en וְשַׂמְתִּיהָ / וְאַחֲרִיתָהּ
  english_pob_reading: Rendered with impersonal 'it' to refer to the coming national condition of mourning/judgment.
  chosen_spanish_reading: Se mantiene una referencia impersonal («lo» / «su») para no resolver el antecedente con más precisión de la que ofrece el hebreo.
  alternative_spanish_readings:
  - «la haré» refiriéndose a la tierra
  - «la haré» refiriéndose a la ciudad
  - «la haré» refiriéndose a la fiesta
  rationale: El sufijo femenino puede aludir a un colectivo implícito o a la situación nacional resultante. El español impersonal preserva la ambigüedad y evita decidir entre posibles antecedentes no explicitados.
  doctrine_reference: Preservar la tensión textual sin sobreespecificar el referente.
translation_notes:
  revision_awareness: El texto español sigue la lectura estable del POB inglés y del hebreo masorético, sin cambios de revisión relevantes en el expediente auditado. Se conservan las decisiones léxicas y la ambigüedad del sufijo femenino tal como quedaron en el pase más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando el tetragrámaton no aparece explícitamente en este versículo.
  - «Luto» / «lamentación» mantiene el paralelismo semántico entre אֵבֶל y קִינָה.
  - «Cilicio» traduce el saco de duelo con un término comprensible y tradicional en español bíblico.
  - Se evita introducir «Cristo», «SEÑOR» o equivalentes no presentes en el versículo.
  - La ambigüedad del referente final se conserva con pronombres impersonales en español.
