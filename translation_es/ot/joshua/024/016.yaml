    rationale: Aunque transmite la idea general, esa construcción no es idiomática en español general. Una alternativa más natural y fiel sería 'Dios no permita que abandonemos a Yahvé y sirvamos a otros dioses'.
  revised_spanish_text: 'Entonces el pueblo respondió y dijo[a]: «Lejos esté de nosotros abandonar a Yahvé y servir a otros dioses.»'
  revised_footnotes:
