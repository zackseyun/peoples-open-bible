translation:
  language: es
  text: 'Y he aquí, Barac perseguía a Sísara. Jael salió a su encuentro y le dijo: «Ven, y te mostraré al hombre que estás buscando». Él entró donde ella, y he aquí, Sísara estaba caído, muerto[a], con la estaca de la tienda en su sien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «caído, muerto»; se conserva la yuxtaposición para no perder el efecto visual del resultado final de la acción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: La partícula introduce una nueva escena con tono de atención repentina. «Y he aquí» conserva el valor discursivo y el registro elevado del auditable inglés «behold», sin caer en una traducción mecánica ni demasiado coloquial.
- source_word: רֹדֵף
  english_pob_choice: was pursuing
  chosen_spanish: perseguía
  alternatives_spanish:
  - iba persiguiendo
  - estaba persiguiendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso; en español, el pretérito imperfecto «perseguía» transmite esa continuidad de manera natural y precisa.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarlo
  - para salirle al encuentro
  lexicon: HALOT
  rationale: Es un modismo de movimiento hacia alguien. «Salió a su encuentro» reproduce bien la imagen sin sobrecargarla.
- source_word: לֵךְ
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  - Vamos
  lexicon: HALOT
  rationale: Aunque el imperativo básico es «ir», en la invitación directa la equivalencia natural en español es «ven», porque Jael está llamando a Sisara a acercarse a ella.
- source_word: וְאַרְאֶךָּ
  english_pob_choice: and I will show you
  chosen_spanish: te mostraré
  alternatives_spanish:
  - y te mostraré
  - déjame mostrarte
  lexicon: HALOT
  rationale: La forma verbal expresa una invitación/propósito con fuerza futura. «Te mostraré» conserva la transparencia sintáctica y la claridad narrativa.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - a la persona
  lexicon: HALOT
  rationale: El sustantivo masculino singular se refiere específicamente a Sísara; el español requiere el objeto directo con la preposición «a».
- source_word: מְבַקֵּשׁ
  english_pob_choice: are seeking
  chosen_spanish: estás buscando
  alternatives_spanish:
  - andas buscando
  - estás procurando
  lexicon: HALOT
  rationale: El campo semántico incluye buscar/solicitar; en este contexto narrativo «estás buscando» es la opción más natural y clara en español. Se conserva la fuerza de búsqueda sin volverlo más teológico o abstracto de lo que pide el texto.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: So he went in to her
  chosen_spanish: Él entró donde ella
  alternatives_spanish:
  - Entonces entró a donde ella
  - Así que fue hacia ella
  lexicon: HALOT
  rationale: El hebreo indica movimiento de entrada en el espacio de ella, probablemente su tienda. «Entró donde ella» comunica ese ingreso sin añadir explícitamente un lugar que el versículo no nombra aquí.
- source_word: נֹפֵל מֵת
  english_pob_choice: was lying dead
  chosen_spanish: estaba caído, muerto
  alternatives_spanish:
  - yacía muerto
  - estaba tendido muerto
  lexicon: HALOT
  rationale: El hebreo yuxtapone «caído» y «muerto». «Estaba caído, muerto» preserva la tensión lexical e imagística sin suavizarla ni convertirla en una simple paráfrasis.
- source_word: הַיָּתֵד
  english_pob_choice: the tent peg
  chosen_spanish: la estaca de la tienda
  alternatives_spanish:
  - la clavija de la tienda
  - el clavo de la tienda
  lexicon: HALOT
  rationale: En contexto se trata del objeto usado en una tienda; «estaca de la tienda» es natural en español y mantiene el referente concreto sin perder precisión.
- source_word: בְּרַקָּתוֹ
  english_pob_choice: in his temple
  chosen_spanish: en su sien
  alternatives_spanish:
  - en su temple
  - en la sien
  lexicon: HALOT
  rationale: רַקָּה nombra la región temporal/lateral de la cabeza. En español contemporáneo, «sien» es más natural que «temple» y conserva la localización anatómica exacta.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el registro formal de «behold» se reflejó con «y he aquí», y la escena final se mantuvo concisa con «estaba caído, muerto» sin añadir elementos no explícitos como «allí».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el tetragrámaton aparezca; este versículo no lo contiene.
  - «Sísara» y «Barac» se transliteran de forma estándar en español bíblico.
  - Se preserva el tono narrativo elevado mediante «y he aquí» en ambas ocurrencias.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al pasaje.
  - «Estaca de la tienda» evita el tecnicismo innecesario y sigue siendo fiel al objeto del contexto.
