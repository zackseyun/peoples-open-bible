  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה -> ''Yahvé''; גוים -> ''naciones'' con alternativa ''gentiles''; minchah -> ''ofrenda'' con nota; vocabulario cultual preservado. No hay conflicto doctrinal mayor. El único ajuste léxico importante es reemplazar ''nacimiento'' por ''salida''.'
