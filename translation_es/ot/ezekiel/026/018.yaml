translation:
  language: es
  text: Ahora las costas[a] temblarán el día de tu caída, y las islas que están en el mar quedarán aterradas por tu salida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Costas» traduce aquí el término hebreo en su sentido amplio de regiones marítimas distantes; también puede entenderse como «islas».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «por tu salida» o «a causa de tu salida». En contexto, la expresión probablemente se refiere a la desaparición de Tiro bajo el juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: HALOT
  rationale: El adverbio marca la consecuencia inmediata del juicio; «Ahora» es natural en español y conserva ese valor temporal.
- source_word: יֶחְרְדוּ
  english_pob_choice: will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - temblarán de miedo
  lexicon: HALOT
  rationale: El verbo expresa temblor con temor; «temblarán» mantiene la fuerza física y emocional sin añadir más de lo que dice el hebreo.
- source_word: הָאִיִּן
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las tierras costeras
  lexicon: HALOT
  rationale: En este primer caso la POB inglesa opta por el sentido amplio de regiones marítimas distantes; «costas» funciona como equivalente natural en español para esa amplitud geográfica. Se preserva la alternativa de «islas» en nota porque el hebreo permite ambos sentidos.
- source_word: יוֹם מַפַּלְתֵּךְ
  english_pob_choice: on the day of your downfall
  chosen_spanish: el día de tu caída
  alternatives_spanish:
  - el día de tu caída y ruina
  - el día de tu derrumbe
  lexicon: HALOT
  rationale: La construcción señala el momento de la ruina de Tiro. «Caída» es breve, idiomática y suficientemente fiel; «downfall» no exige una expansión mayor en español.
- source_word: וְנִבְהֲלוּ
  english_pob_choice: will be terrified
  chosen_spanish: serán aterradas
  alternatives_spanish:
  - quedarán aterradas
  - serán aterrorizadas
  - serán turbadas
  lexicon: HALOT
  rationale: El nifal de בהל expresa alarma o desasosiego intenso. «Serán aterradas» conserva la pasividad del verbo y el campo semántico del temor; evita suavizarlo con «dismay».
- source_word: הָאִיִּים אֲשֶׁר בַּיָּם
  english_pob_choice: the islands that are in the sea
  chosen_spanish: las islas que están en el mar
  alternatives_spanish:
  - las costas que están en el mar
  - las islas del mar
  lexicon: HALOT
  rationale: Aquí el modificador «en el mar» inclina el hebreo hacia el sentido literal de «islas»; se distingue así del primer איים, que en la POB inglesa se traduce más ampliamente como «coastlands».
- source_word: מִצֵּאתֵךְ
  english_pob_choice: from your going out
  chosen_spanish: por tu desaparición
  alternatives_spanish:
  - por tu salida
  - a causa de tu salida
  - al salir tú
  lexicon: HALOT
  rationale: Literalmente es «de tu salida / al salir». En el contexto del juicio contra Tiro, la idea parece ser su desaparición del escenario; «por tu desaparición» comunica ese efecto sin abandonar la base semántica del verbo יצא.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hubo alto acuerdo entre las evaluaciones; por ello se mantiene la división semántica entre el primer איים como sentido amplio («costas») y el segundo como sentido literal («islas»).
  spanish_consistency_notes:
  - Se preserva la distinción del hebreo entre el primer איים con sentido amplio y el segundo con valor más literal.
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Aterradas» conserva la intensidad del hebreo sin introducir explicaciones doctrinales ajenas al versículo.
