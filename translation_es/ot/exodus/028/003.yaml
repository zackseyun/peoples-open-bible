translation:
  language: es
  text: Y tú hablarás a todos los sabios de corazón[a], a quienes he llenado de un espíritu de sabiduría, y ellos harán las vestiduras de Aarón para consagrarlo[b], para que me sirva como sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sabios de corazón» o «hábiles de corazón». La expresión designa a personas dotadas de entendimiento y pericia para la labor requerida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para consagrarlo, para servirme él como sacerdote». El hebreo encadena dos expresiones de propósito.'
    reason: previous_rendering
lexical_decisions:
- source_word: תְּדַבֵּר
  english_pob_choice: you shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - dirás
  - les hablarás
  lexicon: HALOT
  rationale: El verbo דבר en este contexto instruccional pide una orden directa. «Hablarás» conserva el mandato sin volverlo más fuerte que el hebreo ni añadir matices de anuncio que no están explícitos.
- source_word: חַכְמֵי לֵב
  english_pob_choice: the wise of heart
  chosen_spanish: los sabios de corazón
  alternatives_spanish:
  - los sabios de mente
  - los hábiles de corazón
  - los sabios de ánimo
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático para personas dotadas de sabiduría y pericia interior. «Sabios de corazón» mantiene la metáfora del corazón como sede del entendimiento y evita reducirla solo a habilidad artesanal.
- source_word: מִלֵּאתִי רוּחַ חָכְמָה
  english_pob_choice: whom I have filled with a spirit of wisdom
  chosen_spanish: a quienes he llenado con un espíritu de sabiduría
  alternatives_spanish:
  - a quienes he llenado con el Espíritu de sabiduría
  - a quienes he dotado de sabiduría
  - a quienes he llenado de un espíritu sabio
  lexicon: HALOT
  rationale: El hebreo no lleva artículo en רוּחַ, por lo que «un espíritu de sabiduría» refleja mejor la forma y conserva la ambigüedad entre disposición interior y don divino, sin identificarlo de manera explícita con el Espíritu Santo.
- source_word: בִּגְדֵי אַהֲרֹן
  english_pob_choice: Aaron’s garments
  chosen_spanish: las vestiduras de Aarón
  alternatives_spanish:
  - las ropas de Aarón
  - los vestidos de Aarón
  - las vestiduras sacerdotales de Aarón
  lexicon: HALOT
  rationale: «Vestiduras» es un equivalente natural y solemne para בִּגְדֵי. No se añade «sacerdotales» en el texto principal porque esa especificación proviene del contexto inmediato más que de la frase nominal misma.
- source_word: לְקַדְּשׁוֹ
  english_pob_choice: to consecrate him
  chosen_spanish: para consagrarlo
  alternatives_spanish:
  - para santificarlo
  - para apartarlo en santidad
  - para hacerlo santo
  lexicon: HALOT
  rationale: En contexto sacerdotal, קדשׁ expresa la puesta aparte para un oficio sagrado. «Consagrarlo» es la forma más precisa e idiomática en español para esa dedicación.
- source_word: לְכַהֲנוֹ לִי
  english_pob_choice: for him to serve me as priest
  chosen_spanish: para que me sirva como sacerdote
  alternatives_spanish:
  - para ejercer ante mí como sacerdote
  - para ministrarme como sacerdote
  - para ser mi sacerdote
  lexicon: HALOT
  rationale: El verbo כהן indica actuar/servir como sacerdote. «Me sirva como sacerdote» conserva la relación de servicio a Dios y evita una fórmula demasiado eclesiástica o más técnica de lo que el hebreo exige.
- source_word: וְעָשׂוּ
  english_pob_choice: and they shall make
  chosen_spanish: y harán
  alternatives_spanish:
  - y harán de él
  - y confeccionarán
  - y prepararán
  lexicon: HALOT
  rationale: En secuencia instructiva, el perfecto con waw funciona como continuación imperativa. «Harán» mantiene el tono directivo y encaja de forma natural con el resto de la oración.
theological_decisions:
- issue: Cómo traducir רוּחַ חָכְמָה sin forzar una identificación trinitaria
  english_pob_reading: a spirit of wisdom
  chosen_spanish_reading: un espíritu de sabiduría
  alternative_spanish_readings:
  - el Espíritu de sabiduría
  - el Espíritu Santo de sabiduría
  - una disposición de sabiduría
  rationale: El hebreo es anartro y el contexto habla de capacitación para una labor concreta. «Un espíritu de sabiduría» preserva la ambigüedad del texto y deja abierta la posibilidad de un don divino sin imponer una lectura doctrinal posterior.
  doctrine_reference: Mantener la tensión textual entre don divino y formulación no explícita; prioridad del hebreo original sobre la especificación teológica posterior.
- issue: Si לְקַדְּשׁוֹ לְכַהֲנוֹ לִי debe expresarse como dos fines distintos o como una sola finalidad compacta
  english_pob_reading: to consecrate him, for him to serve me as priest
  chosen_spanish_reading: para consagrarlo, para que me sirva como sacerdote
  alternative_spanish_readings:
  - para consagrarlo y servirme como sacerdote
  - para consagrarlo a fin de que me sirva como sacerdote
  - para consagrarlo para su sacerdocio
  rationale: El hebreo encadena dos infinitivos de propósito. En español, la doble finalidad se vuelve clara con «para consagrarlo, para que me sirva como sacerdote», conservando la relación lógica sin añadir una interpretación litúrgica más específica que la del texto.
  doctrine_reference: Función sacerdotal en el marco del tabernáculo; no introducir terminología eclesial posterior como sustituto del oficio bíblico.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa en conservar «a spirit of wisdom» y en reflejar la doble finalidad del final del versículo. También toma en cuenta la preferencia revisada por «wise of heart» frente a «skillful of heart», manteniendo en español la metáfora del corazón y el registro de instrucción divina.
  spanish_consistency_notes:
  - Se usa «Y tú» para reproducir el énfasis inicial del hebreo.
  - Se mantiene «Aarón» con grafía española estándar y «Yahvé» no aparece porque el verso usa la primera persona divina.
  - Se eligió «sacerdote» para כהן, coherente con el oficio levítico del contexto.
  - «Espíritu» se escribe con minúscula porque no hay artículo ni indicación textual suficiente para identificar explícitamente al Espíritu Santo.
  - La puntuación separa claramente la consagración y la finalidad sacerdotal, sin fusionarlas en una sola idea.
