base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/028/004.yaml
  text: And I will bring back to this place Jeconiah son of Jehoiakim[a], king of Judah, and all the exiles of Judah who came to Babylon, declares Yahweh, for I will break the yoke of the king of Babylon.
  footnotes:
  - marker: a
    text: Or 'who came to Babylon.' The Hebrew participle is literally 'the ones coming to Babylon,' but English idiom from Judah's perspective often uses 'went.'
