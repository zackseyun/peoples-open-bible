translation:
  language: es
  text: Las montañas se derriten como cera delante de[a] Yahvé[b], delante del Señor de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘de delante de / de la presencia de’; se traduce con ‘delante de’ por naturalidad en español poético.'
    reason: lexical_alternative
  - marker: b
    text: El nombre divino יְהוָה se vierte aquí como ‘Yahvé’, conforme al criterio del proyecto.
    reason: source_note
lexical_decisions:
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - montañas
  lexicon: HALOT
  rationale: El hebreo usa plural con artículo; en español se mantiene el artículo para reflejar el valor definido y la imagen poética del conjunto de la creación.
- source_word: כַּדּוֹנַג
  english_pob_choice: like wax
  chosen_spanish: como cera
  alternatives_spanish:
  - como la cera
  - como wax
  lexicon: HALOT
  rationale: La comparación es directa. En español bíblico y moderno, 'cera' expresa con naturalidad la misma imagen material que 'wax' en inglés.
- source_word: נָמַסּוּ
  english_pob_choice: melt
  chosen_spanish: se derriten
  alternatives_spanish:
  - se derritieron
  - se derritan
  - se funden
  lexicon: HALOT
  rationale: El verbo expresa derretirse/disolverse; en español el presente histórico mantiene la vividez poética que el inglés POB buscó con 'melt'.
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de delante de / de la presencia de'. 'Delante de' conserva la relación espacial y resulta natural en español poético; 'en presencia de' queda como alternativa más explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre divino sin sustituirlo por un título.
- source_word: אֲד֣וֹן
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - soberano
  lexicon: HALOT
  rationale: Aquí el hebreo usa un título divino de señorío. En español, 'Señor' es el equivalente más natural y reverente; no se sustituye por 'Yahvé' porque el texto ya diferencia entre el nombre divino y el título.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de la tierra entera
  - sobre toda la tierra
  lexicon: HALOT
  rationale: La cadena constructa expresa alcance universal. 'De toda la tierra' reproduce directamente la relación genitiva y el ámbito total del señorío.
theological_decisions:
- issue: Distinción entre el nombre divino יְהוָה y el título אֲדוֹן
  english_pob_reading: before Yahweh, before the Lord of all the earth
  chosen_spanish_reading: delante de Yahvé, delante del Señor de toda la tierra
  alternative_spanish_readings:
  - delante de Yahvé, delante del Dueño de toda la tierra
  - delante de Yahvé, delante del Soberano de toda la tierra
  rationale: El hebreo distingue el nombre propio del Señor del título de soberanía. Mantener 'Yahvé' y 'Señor' preserva esa tensión textual y evita borrar una distinción que el original sí marca.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé; אֲדוֹן → Señor'
- issue: Imagen teofánica de derretimiento
  english_pob_reading: The mountains melt like wax
  chosen_spanish_reading: Las montañas se derriten como cera
  alternative_spanish_readings:
  - Las montañas se funden como cera
  - Las montañas se derriten como la cera
  rationale: La forma verbal poética comunica el efecto de la presencia divina sobre la creación. 'Se derriten' conserva la fuerza imaginativa sin convertir la imagen en una explicación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense in readable modern Spanish'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene el paralelismo, conserva la diferencia entre el nombre divino y el título ‘Señor’, y usa un presente poético para reproducir el efecto vívido del perfecto hebreo. No se detectaron revisiones previas que obliguen a ajustar la formulación.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה conforme al criterio del proyecto.
  - Se mantiene ‘Señor’ para אֲדוֹן como título distinto del nombre divino.
  - ‘Delante de’ conserva el valor relacional de מִלִּפְנֵי sin sobrecargar la frase.
  - ‘Se derriten’ comunica el efecto poético del hebreo sin perder claridad en español.
