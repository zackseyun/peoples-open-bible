translation:
  language: es
  text: 'Entonces Yahvé extendió su mano y tocó mi boca[a], y Yahvé me dijo: «He aquí, he puesto mis palabras en tu boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (tradicionalmente traducido «el SEÑOR»); alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח / stretched out
  english_pob_choice: stretched out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - tendió su mano
  lexicon: HALOT
  rationale: שלח con 'mano' expresa el gesto de extenderla; en español, 'extendió su mano' conserva la imagen concreta y suena natural y solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el Señor
  lexicon: HALOT
  rationale: Siguiendo la decisión proyectual para el Tetragrámaton, se translitera el nombre divino como 'Yahvé' y no se oculta tras un título.
- source_word: וַיַּגַּע עַל־פִּי
  english_pob_choice: touched my mouth
  chosen_spanish: tocó mi boca
  alternatives_spanish:
  - tocó mis labios
  - tocó sobre mi boca
  lexicon: HALOT
  rationale: נגע con עַל se vierte de forma idiomática como 'tocó'; 'boca' mantiene el paralelismo directo con 'en tu boca' al final del versículo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: '''Mira'' conserva la fuerza de llamado de atención de הִנֵּה con registro natural en español; ''He aquí'' sería más formal pero menos fluido.'
- source_word: נָתַתִּי
  english_pob_choice: I have put
  chosen_spanish: he puesto
  alternatives_spanish:
  - he dado
  - puse
  lexicon: HALOT
  rationale: Con 'mis palabras' y 'en tu boca', 'he puesto' reproduce la acción figurada de manera idiomática y mantiene el valor perfectivo del hebreo.
- source_word: דְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi mensaje
  lexicon: HALOT
  rationale: '''Palabras'' preserva la concreción del hebreo דְבָרַי y evita interpretar de más como ''mensaje''.'
- source_word: בְּפִיךָ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - sobre tus labios
  lexicon: HALOT
  rationale: La preposición ב con פֶּה se mantiene literalmente como 'en tu boca', sosteniendo la imagen profética de la palabra depositada en el profeta.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: La traducción española sigue la decisión del proyecto de preservar el nombre personal de Dios en vez de sustituirlo por un título. 'Yahvé' es la forma establecida en español bíblico académico y eclesial amplio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de la palabra colocada en la boca del profeta
  english_pob_reading: I have put my words in your mouth
  chosen_spanish_reading: he puesto mis palabras en tu boca
  alternative_spanish_readings:
  - he dado mis palabras en tu boca
  - puse mis palabras en tu boca
  rationale: Se conserva la metáfora de comisión profética sin reducirla a una mera paráfrasis. La frase comunica que Dios autoriza y capacita la proclamación profética.
  doctrine_reference: Jeremías 1:9; comisión profética
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del audit trail que elevó el registro de ''Look'' a ''Behold''; en español se optó por ''Mira'' por naturalidad y fuerza deíctica, sin perder solemnidad. También se conservó la estructura paralela del hebreo: acción divina, contacto con la boca, y declaración de comisión.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Boca'' se conservó de forma consistente tanto en el gesto inicial como en la clausula final, reproduciendo el paralelismo del hebreo.'
  - El perfecto hebreo se reflejó con pretérito perfecto compuesto ('he puesto') para expresar resultado vigente en español.
