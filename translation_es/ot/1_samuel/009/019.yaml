revisions:
- from: 'Samuel respondió a Saúl y dijo: «Yo soy el vidente. Sube delante de mí[a] al lugar alto[b], y comerán conmigo hoy. Por la mañana te enviaré, y te declararé todo lo que está en tu corazón».'
  to: 'Samuel respondió a Saúl y dijo: «Yo soy el vidente[a]. Sube delante de mí al lugar alto, y come conmigo hoy[b]. Por la mañana te despediré, y te haré saber todo lo que está en tu corazón».'
  rationale: Se corrigieron los anclajes de notas para que correspondan a las palabras explicadas. Se cambió «y comerán conmigo hoy» por «y come conmigo hoy[b]» para mantener un español natural y seguir la lógica de la auditoría inglesa, preservando en nota el matiz del plural hebreo. Se ajustó «te enviaré» a «te despediré» para reflejar mejor el sentido contextual de dejarlo partir al día siguiente. Se sustituyó «te declararé» por «te haré saber» por mayor naturalidad sin perder fidelidad semántica.
