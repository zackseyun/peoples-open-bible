  source_alignment_summary: 'El borrador español transmite bien el sentido del griego: una condición general introducida por καὶ ἐὰν, la idea de división interna con ἐφ’ ἑαυτὴν μερισθῇ, y la consecuencia futura de incapacidad para ''estar en pie''. También preserva correctamente la repetición de οἰκία como ''casa'' y evita desplazar la metáfora hacia un sentido meramente social.'
