revisions:
- from: Si sois honestos[a], uno de vuestros hermanos quedará confinado[b] en la casa de vuestra custodia; y vosotros, id y traed grano[c] para el hambre de vuestras casas.
  to: Si son honestos[a], que uno de sus hermanos quede confinado[b] en el lugar donde están bajo custodia, y ustedes[c], vayan y lleven grano para la hambruna de sus hogares.
  rationale: Se revisa para ajustarlo al español meta del proyecto y mejorar la naturalidad sin perder precisión. Se sustituyen formas peninsulares por formas ampliamente legibles en América Latina. «Quede confinado» mantiene bien el sentido custodial de יֵאָסֵר. «En el lugar donde están bajo custodia» hace explícito en español natural el valor de בְּבֵית מִשְׁמַרְכֶם, mientras la literalidad queda en nota. «La hambruna de sus hogares» preserva mejor רַעֲבוֹן + בָּתֵּיכֶם que «el hambre de sus casas».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:26:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo en la estructura principal: condición sobre כֵּנִים, sentido partitivo de אֲחִיכֶם אֶחָד, retención de un hermano, contraste con וְאַתֶּם, y mandato de ir y llevar grano. Sin embargo, dos decisiones debilitan la fidelidad semántica en español: «para el hambre de vuestras casas» suena poco natural y desplaza רַעֲבוֹן hacia hambre doméstica en vez de «hambruna/famine» que afecta a los hogares; y el uso de «sois / vuestros / id / traed» contradice el estilo meta requerido de español neutro latinoamericano amplio.'
  spanish_quality_summary: La redacción es comprensible, pero mezcla registro bíblico peninsular arcaizante con giros poco idiomáticos para el proyecto («sois», «vuestros», «id», «traed»). «En la casa de vuestra custodia» puede mantenerse por literalidad en nota, pero en texto principal es más claro «en el lugar donde están bajo custodia» o «en su lugar de custodia». También conviene evitar «hambre de vuestras casas», que en español no suena natural ni digno moderno.
  glossary_alignment: 'No hay términos teológicos mayores en juego. Las decisiones léxicas relevantes piden ajuste de estilo meta: «honestos» está bien; «uno de sus hermanos» preserva el partitivo; «sea confinado» o «quede confinado» sirve para יֵאָסֵר; «grano» acierta para שֶׁבֶר; «sus hogares» refleja mejor el valor de בָּתֵּיכֶם que «sus casas» en español actual cuando va con la necesidad de alimento. No hay conflicto con glosario doctrinal.'
  issues:
  - severity: high
    issue: Uso de formas peninsulares («sois», «vuestros», «id», «traed»)
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. Estas formas reducen la adecuación estilística aunque no cambien el sentido básico.
  - severity: medium
    issue: «Para el hambre de vuestras casas» es poco natural y semánticamente torpe
    rationale: El hebreo/POB apunta a grano necesario por la hambruna que sufren sus hogares. «Hambre de sus hogares» o mejor «hambruna de sus hogares»/«para la hambruna de sus hogares» comunica mejor que el hambre pertenece a las casas.
  - severity: low
    issue: La nota c no refleja exactamente la razón inglesa de estilo previo
    rationale: La nota puede conservar la alternativa de orden verbal, pero sería mejor formularla en español neutro y con puntuación natural.
