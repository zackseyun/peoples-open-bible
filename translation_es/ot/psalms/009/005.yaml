revisions:
- from: Porque has hecho justicia a mi justicia y a mi causa[a]; te has sentado en el trono[b], juzgando con rectitud.
  to: Porque has defendido mi justicia y mi causa[a]; te has sentado en el trono, juzgando con rectitud[b].
  rationale: Se reemplaza «has hecho justicia a mi justicia» por «has defendido mi justicia y mi causa» para expresar de manera idiomática y fiel el sentido forense de עָשִׂיתָ con מִשְׁפָּטִי וְדִינִי. Se mantiene el campo semántico judicial documentado por la POB inglesa y se conserva la distinción entre «justicia» y «causa». También se ancla correctamente la nota [b] en el texto revisado y se simplifica su redacción.
