translation:
  language: es
  text: Estoy cansado con mi gemir; cada noche inundo mi cama[a]; con mis lágrimas empapo mi lecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «hago nadar mi cama»; la expresión es una hipérbole poética para decir que la empapa con lágrimas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגַעְתִּי
  english_pob_choice: I am weary
  chosen_spanish: estoy cansado
  alternatives_spanish:
  - estoy fatigado
  - estoy agotado
  lexicon: HALOT
  rationale: יָגַע expresa cansancio o agotamiento por aflicción continua. En español, «estoy cansado» comunica el estado presente de desgaste de forma natural y fiel al lamento, sin volver la frase demasiado idiomática o débil.
- source_word: בְּאַנְחָתִי
  english_pob_choice: with my groaning
  chosen_spanish: de tanto gemir
  alternatives_spanish:
  - con mi gemido
  - con mi suspirar
  lexicon: HALOT
  rationale: אַנְחָה abarca gemido, suspiro o lamento. Opto por «de tanto gemir» para reflejar la carga continua de la preposición בְּ como causa/acompañamiento y mantener el tono poético en español.
- source_word: אַשְׂחֶה
  english_pob_choice: I drench
  chosen_spanish: inundo
  alternatives_spanish:
  - empapo
  - hago nadar
  lexicon: HALOT
  rationale: 'El verbo es literalmente hiperbolico: ‘hacer nadar’ la cama. «Inundo» conserva la imagen intensa de saturación y la fuerza poética sin sonar mecánico; en la siguiente cola se mantiene la variación paralela con «empapo».'
- source_word: בְכָל לַיְלָה
  english_pob_choice: every night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - cada noche
  - noche tras noche
  lexicon: HALOT
  rationale: El hebreo comunica repetición habitual o prolongada. «Toda la noche» es una equivalencia natural en español para el sufrimiento continuo durante la noche, aunque también puede leerse como repetición noche tras noche; esa amplitud sigue la ambigüedad contextual.
- source_word: מִטָּתִי
  english_pob_choice: my bed
  chosen_spanish: mi cama
  alternatives_spanish:
  - mi lecho
  - mi cama
  lexicon: HALOT
  rationale: מִטָּה es el lugar de descanso o la cama. «Cama» es la opción más clara y corriente en español moderno para la primera cola del paralelismo.
- source_word: בְּדִמְעָתִי
  english_pob_choice: with my tears
  chosen_spanish: con mis lágrimas
  alternatives_spanish:
  - con mis llantos
  - con mis lágrimas
  lexicon: HALOT
  rationale: דִמְעָה significa lágrima/llanto. «Con mis lágrimas» conserva el medio instrumental y mantiene el paralelismo poético con «de tanto gemir».
- source_word: עַרְשִׂי
  english_pob_choice: my couch
  chosen_spanish: mi lecho
  alternatives_spanish:
  - mi sofá
  - mi diván
  - mi lecho
  lexicon: HALOT
  rationale: עֶרֶשׂ puede ser lecho, cama o diván. Uso «mi lecho» para diferenciarlo de מִטָּה y conservar la variación lexical del hebreo en un registro digno y bíblico.
- source_word: אַמְסֶה
  english_pob_choice: I soak
  chosen_spanish: empapo
  alternatives_spanish:
  - remojo
  - sojo
  lexicon: HALOT
  rationale: El verbo transmite la idea de empapar o derretir figuradamente por abundancia de lágrimas. «Empapo» comunica bien la hipérbole y la acción resultante sobre el lecho.
translation_notes:
  revision_awareness: La base inglesa pasó de «I am worn out» a «I am weary» para mayor formalidad y cercanía al hebreo. La versión española sigue esa línea con «estoy cansado», evitando un giro demasiado coloquial y preservando el estado de desgaste del salmista. También se conservó el paralelismo poético de los dos hemistiquios, con dos verbos distintos («inundo» / «empapo») para reflejar la intensificación hebrea sin volver la línea repetitiva.
  spanish_consistency_notes:
  - Mantengo «lecho» en la segunda cola para distinguir עַרְשִׂי de מִטָּתִי, siguiendo la variación léxica del original.
  - No se introduce terminología eclesiástica añadida; el versículo permanece en registro poético y directo.
  - Las notas a y b preservan las alternativas de sentido más relevantes del hebreo sin sobrecargar el texto principal.
