  revision_rationale: Se corrige la imagen excesivamente interpretativa «garra» y se la reemplaza por «poder», que comunica bien el sentido idiomático de control hostil detrás de מִכַּף sin introducir metáfora ajena. Se reubica y corrige la nota [c] para que corresponda a עָרִצִים, conforme al audit trail inglés. También se mejora «hombres malos» a «hombres malvados» por mayor naturalidad y precisión moral en español bíblico.
