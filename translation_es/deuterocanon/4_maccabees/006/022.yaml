  timestamp: '2026-05-07T22:36:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: πρὸς ταῦτα = «En respuesta a esto», vocativo «oh hijos de Abraham», εὐγενῶς = «noblemente», y τελευτᾶτε = «mueren». Sin embargo, ὑπὲρ τῆς εὐσεβείας queda mejor en español como «por causa de la devoción a Dios» o equivalente, porque el English POB privilegia «godliness» sobre «piety» para evitar una palabra potencialmente más estrecha o ambigua. Además, en español suena más natural el imperativo exhortativo «mueran» que el indicativo «mueren», dado el tono directo del contexto.'
  spanish_quality_summary: El texto es claro y digno, pero «mueren noblemente» suena menos natural en una exhortación directa que «mueran noblemente». También «piedad» es comprensible, pero puede percibirse como más estrecha o devocional en español contemporáneo; «devoción a Dios» comunica mejor la fuerza de εὐσέβεια para lectura amplia eclesial. El resto del registro es adecuado.
  glossary_alignment: 'No hay conflicto con las pautas principales del glosario. La cuestión clave es εὐσέβεια: aunque «piedad» es defendible y aparece en la nota inglesa como alternativa, la decisión auditada en inglés favorece un término más transparente para la devoción reverente a Dios. Por eso conviene ajustar el texto principal a «devoción a Dios» y conservar «piedad» como alternativa en nota.'
  issues:
  - severity: medium
    issue: Modo verbal de τελευτᾶτε
    rationale: En este contexto retórico de exhortación directa, «mueran» suena más fiel y natural que el indicativo «mueren», que en español puede leerse como simple descripción en vez de llamado solemne.
  - severity: medium
    issue: Renderización principal de εὐσέβεια
    rationale: El borrador usa «piedad», pero la auditoría inglesa eligió «godliness» precisamente para expresar devoción reverente a Dios de manera más clara. En español, «devoción a Dios» evita ambigüedad y preserva mejor esa racionalidad documentada.
  revised_spanish_text: En respuesta a esto, ustedes, oh hijos de Abraham, mueran noblemente por causa de la devoción a Dios[a].
  revised_footnotes:
  - marker: a
    text: O «por causa de la piedad». El griego εὐσέβεια denota devoción reverente a Dios expresada en conducta fiel.
    reason: lexical_alternative
  revision_rationale: Se ajusta τελευτᾶτε a «mueran» para reflejar mejor la exhortación directa del griego en español natural, y se cambia «piedad» en el texto principal a «devoción a Dios» para alinearse con la decisión léxico-teológica auditada en inglés, dejando «piedad» como alternativa en nota.
