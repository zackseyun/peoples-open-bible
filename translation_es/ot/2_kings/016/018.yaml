revisions:
- from: Y el corredor cubierto para el sábado[a], que habían construido en la casa, y la entrada exterior del rey[b], la desvió[c] de la casa de Yahvé[d], a causa del rey de Asiria[e].
  to: Y el pasadizo cubierto para el sábado[a], que habían construido en la casa, y la entrada exterior del rey[b], los desvió[c] de la casa de Yahvé, a causa del rey de Asiria[d].
  rationale: Se corrige la sintaxis para que el verbo rija claramente los dos objetos coordinados, se elimina una nota innecesaria sobre «la casa de Yahvé», y se ajustan levemente el término arquitectónico principal y las notas para reflejar mejor el inglés POB auditado y el sentido del hebreo.
