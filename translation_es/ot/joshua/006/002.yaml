translation:
  language: es
  text: 'Y Yahvé dijo a Josué: «Mira, he entregado en tu mano a Jericó, junto con su rey y los poderosos guerreros[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los valientes guerreros' o 'los guerreros valerosos'. La frase hebrea combina las ideas de fuerza y valor militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: DOCTRINE.md default / project terminology
  rationale: Se sigue el término propio del proyecto para el nombre divino YHWH. En español, 'Yahvé' preserva la referencia al nombre personal del pacto sin ocultarlo tras una convención tipográfica.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Yahvé habló
  lexicon: HALOT
  rationale: La waw narrativa avanza la acción; 'Y ... dijo' conserva el flujo hebreo sin forzar una relación temporal más específica de la que exige el texto.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Mira, observa
  lexicon: HALOT
  rationale: Como imperativo de atención, 'Mira' es natural en español moderno y conserva el tono directo del hebreo mejor que una forma más arcaica.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he entregado
  alternatives_spanish:
  - he dado
  - estoy dando
  - daré
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción presentada como ya asegurada desde la perspectiva divina. 'He entregado' mantiene ese valor perfectivo y comunica bien la idea de concesión/sometimiento en contexto militar.
- source_word: בְיָדְךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - entregada en tus manos
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de dominio y control. 'En tu mano' es idiomático en español bíblico y deja ver la imagen original sin neutralizarla del todo.
- source_word: יְרִיחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericho
  lexicon: toponym
  rationale: Topónimo estándar en español.
- source_word: מַלְכָּהּ
  english_pob_choice: its king
  chosen_spanish: su rey
  alternatives_spanish:
  - el rey de ella
  - su monarca
  lexicon: HALOT
  rationale: El sufijo femenino se refiere a la ciudad Jericó; en español se expresa naturalmente como 'su rey'. Se evita personificar la ciudad más de lo que pide el texto.
- source_word: גִּבּוֹרֵי הֶחָיִל
  english_pob_choice: the mighty men of valor
  chosen_spanish: los valientes guerreros
  alternatives_spanish:
  - los guerreros valientes
  - los hombres valientes de guerra
  - los poderosos guerreros
  lexicon: HALOT
  rationale: La expresión combina fuerza y valor militar. 'Valientes guerreros' conserva ambos matices de manera fluida en español; se evita una fórmula demasiado fija o militarizada que pudiera sonar artificial.
theological_decisions:
- issue: Valor del perfecto נָתַתִּי como promesa segura antes de la conquista
  english_pob_reading: A divine declaration of certain victory rendered as 'I have given'
  chosen_spanish_reading: Una declaración divina de victoria ya asegurada, rendida como 'he entregado'
  alternative_spanish_readings:
  - '''doy'''
  - '''daré'''
  - '''he dado'''
  rationale: El español puede sonar más natural con 'he entregado', pero conserva la fuerza perfectiva y la seguridad de la promesa. No se rebaja la certeza del acto divino ni se lo convierte en una simple previsión humana.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente; el pasaje presenta alto acuerdo entre revisores y no requiere nota textual adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de acuerdo con el estándar del proyecto para יהוה.
  - Se conserva la metáfora 'en tu mano' por su valor idiomático y teológico.
  - '''Valientes guerreros'' intenta reflejar la doble carga de גִּבּוֹרֵי הֶחָיִל sin sobretraducirla.'
