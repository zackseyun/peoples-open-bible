revisions:
- from: para que su corazón no se engrandezca sobre sus hermanos[a], y para que no se aparte del mandamiento ni a la derecha ni a la izquierda, a fin de que prolongue sus días en su reino, él y sus hijos, en medio de Israel.
  to: para que su corazón no se engrandezca sobre sus hermanos[a], y para que no se aparte del mandamiento ni a la derecha ni a la izquierda, a fin de que prolongue sus días en su reino, él y sus hijos varones, en medio de Israel.
  rationale: Se mantiene casi todo el borrador porque es fiel y legible, pero se corrige 'él y sus hijos' a 'él y sus hijos varones' para reflejar con más precisión el hebreo בָּנָיו y la decisión auditada del POB de preservar 'sons' en contexto dinástico, evitando una ampliación implícita a descendencia en general. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
