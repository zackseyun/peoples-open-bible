translation:
  language: es
  text: Pero la palabra del rey prevaleció contra Joab[a]. Entonces Joab salió y recorrió[b] todo Israel, y llegó a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el mandato del rey prevaleció contra Joab’.
    reason: lexical_alternative
  - marker: b
    text: O ‘viajó por todo Israel’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְבַר הַמֶּלֶךְ
  english_pob_choice: But the king’s word
  chosen_spanish: Pero la palabra del rey
  alternatives_spanish:
  - Pero el mandato del rey
  - Y la palabra del rey
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o, por extensión, una orden expresada. Conservé ‘palabra’ para mantener la forma hebrea y la lectura auditada por la POB, sin perder el sentido de una directiva real en el contexto.
- source_word: חָזַק עַל
  english_pob_choice: prevailed against
  chosen_spanish: prevaleció contra
  alternatives_spanish:
  - se impuso sobre
  - fue más fuerte que
  lexicon: HALOT
  rationale: La expresión hebrea comunica que la declaración del rey venció la resistencia de Joab. ‘Prevaleció contra’ preserva la fuerza idiomática sin convertirlo en una paráfrasis excesiva.
- source_word: וַיֵּצֵא יוֹאָב
  english_pob_choice: So Joab went out
  chosen_spanish: Entonces Joab salió
  alternatives_spanish:
  - Así que Joab salió
  - Y Joab salió
  lexicon: HALOT
  rationale: יָצָא se traduce de forma directa como ‘salió’. ‘Entonces’ refleja la secuencia narrativa implícita por la frase anterior.
- source_word: וַיִּתְהַלֵּךְ בְּכָל יִשְׂרָאֵל
  english_pob_choice: went throughout all Israel
  chosen_spanish: recorrió todo Israel
  alternatives_spanish:
  - anduvo por todo Israel
  - viajó por todo Israel
  lexicon: HALOT
  rationale: El hitpael de הָלַךְ sugiere desplazarse de un lugar a otro. ‘Recorrió’ comunica ese movimiento continuo en español natural y mantiene la amplitud geográfica de ‘todo Israel’.
- source_word: בְּכָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: La frase distributiva indica el alcance nacional completo. ‘Todo Israel’ es una formulación breve y fiel, más natural que una expansión explicativa.
- source_word: וַיָּבֹא יְרוּשָׁלִָם
  english_pob_choice: and he came to Jerusalem
  chosen_spanish: y llegó a Jerusalén
  alternatives_spanish:
  - y vino a Jerusalén
  - y fue a Jerusalén
  lexicon: HALOT
  rationale: בּוֹא suele equivaler a ‘venir/llegar’. ‘Llegó’ expresa el arribo sin añadir la idea de retorno que el hebreo no formula explícitamente.
theological_decisions:
- issue: Sentido de la ‘palabra’ del rey como mandato efectivo
  english_pob_reading: the king’s word prevailed against Joab
  chosen_spanish_reading: la palabra del rey prevaleció contra Joab
  alternative_spanish_readings:
  - el mandato del rey prevaleció contra Joab
  - la orden del rey se impuso sobre Joab
  rationale: El texto no presenta una simple ‘palabra’ informativa, sino una declaración con autoridad que supera la resistencia de Joab. Mantener ‘palabra’ conserva la formulación hebrea; ‘prevaleció contra’ expresa su eficacia coercitiva.
  doctrine_reference: Autoridad real en el contexto narrativo; sin implicación doctrinal directa
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del pasaje fuente; la redacción española sigue de cerca el hebreo y el audit trail inglés, sin ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió ‘recorrió’ para el verbo de desplazamiento continuo, evitando ‘viajó’ como opción secundaria más explícita.
  - ‘Jerusalén’ se conserva como topónimo estándar en español.
  - La puntuación reproduce la pausa narrativa de dos cláusulas principales unidas por ‘Entonces’.
