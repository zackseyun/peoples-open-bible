  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → «Yahvé»; עבד → «servir»; no hay aplanamiento teológico indebido. «Los Baales» es aceptable como plural transparente. «Las Astartes» es defendible en español, aunque la nota debe anclarse allí y la alternativa debe expresarse con más claridad.'
