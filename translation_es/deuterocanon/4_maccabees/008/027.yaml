lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce un contraste natural en español y conserva la fuerza adversativa del griego sin sobrecargar el registro.
- source_word: τούτων οὐδὲν
  english_pob_choice: none of these things
  chosen_spanish: nada de eso
  alternatives_spanish:
  - ninguna de estas cosas
  - nada de estas cosas
  lexicon: BDAG
  rationale: La referencia es a contenidos ya mencionados; en español 'nada de eso' suena natural y mantiene el valor partitivo y anafórico.
- source_word: οἱ νεανίαι
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: BDAG
  rationale: '''Jóvenes'' comunica bien la edad y el grupo masculino en español bíblico sin sonar pesado; el contexto ya identifica a los hermanos.'
- source_word: βασανίζεσθαι μέλλοντες
  english_pob_choice: who were about to be tortured
  chosen_spanish: que estaban a punto de ser torturados
  alternatives_spanish:
  - que iban a ser torturados
  - estando a punto de ser torturados
  - destinados a ser torturados
  lexicon: BDAG
  rationale: '''Estaban a punto de'' reproduce la inminencia de μέλλοντες, y ''ser torturados'' preserva la fuerza de βασανίζεσθαι en contexto martirial.'
- source_word: εἶπον
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - pronunciaron
  lexicon: BDAG
  rationale: Verbo narrativo simple y directo; en español plural concuerda naturalmente con el sujeto.
- source_word: οὐδὲ ἐνεθυμήθησαν
  english_pob_choice: nor did they even think them
  chosen_spanish: ni siquiera lo pensaron
  alternatives_spanish:
  - ni siquiera lo consideraron
  - ni siquiera albergaron tales pensamientos
  lexicon: BDAG
  rationale: El griego puede significar pensar, considerar o meditar interiormente; 'ni siquiera lo pensaron' mantiene la brevedad paralela y comunica la negación interna.
