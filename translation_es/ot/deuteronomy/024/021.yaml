  text: כִּ֤י תִבְצֹר֙ כַּרְמְ/ךָ֔ לֹ֥א תְעוֹלֵ֖ל אַחֲרֶ֑י/ךָ לַ/גֵּ֛ר לַ/יָּת֥וֹם וְ/לָ/אַלְמָנָ֖ה יִהְיֶֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/024/021.yaml
  text: When you gather the grapes of your vineyard[a], you shall not glean after yourself; it shall be for the sojourner, the fatherless[c][b], and the widow.
  footnotes:
  - marker: a
    text: Or 'you shall not glean it afterward' or 'you shall not pick over it again.' The Hebrew verb refers to making a second pass to collect what remains.
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a non-native resident living among Israel; alternatively, ''resident alien.'''
    reason: cultural_note
  - marker: c
    text: Or 'orphan.' The Hebrew term is literally 'fatherless' in many contexts.
    reason: lexical_alternative
