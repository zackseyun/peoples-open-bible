translation:
  language: es
  text: 'Y Dios le dijo: «Porque has pedido esta cosa, y no has pedido para ti muchos días[a], y no has pedido para ti riquezas, y no has pedido la vida de tus enemigos[b], sino que has pedido para ti entendimiento para oír juicio[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'muchos días', un modismo que significa 'larga vida'.
    reason: lexical_alternative
  - marker: b
    text: O 'la muerte de tus enemigos'; literalmente, 'la vida de tus enemigos'.
    reason: lexical_alternative
  - marker: c
    text: O 'justicia' o 'lo que es correcto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto narrativo, el sujeto es claramente Dios; en español, 'Dios' conserva la referencia directa sin introducir mayúsculas de sustitución ni perífrasis innecesarias.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues que
  - Ya que
  lexicon: HALOT
  rationale: La causalidad del hebreo se expresa de forma natural con 'porque', manteniendo el valor explicativo de la respuesta divina.
- source_word: שָׁאַל
  english_pob_choice: asked
  chosen_spanish: has pedido
  alternatives_spanish:
  - has solicitado
  - has preguntado
  lexicon: HALOT
  rationale: '''Pedir'' conserva la repetición retórica del verbo hebreo y su fuerza de solicitud concreta, mejor que ''preguntar'' en este contexto.'
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esta petición
  lexicon: HALOT
  rationale: Se mantiene la referencia demostrativa directa y algo sobria del hebreo. 'Esta petición' sería más interpretativo; 'esta cosa' refleja mejor la literalidad que sostuvo el POB inglés.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - larga vida
  - muchos años
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'muchos días' en vez de resolverla en el texto principal como 'larga vida'; la expresión sigue siendo clara en español y deja visible la posible lectura idiomática.
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: '''Riquezas'' reproduce el plural conceptual del inglés POB y comunica bien la referencia a prosperidad material.'
- source_word: נֶפֶשׁ אֹיְבֶיךָ
  english_pob_choice: the life of your enemies
  chosen_spanish: la vida de tus enemigos
  alternatives_spanish:
  - la muerte de tus enemigos
  - las vidas de tus enemigos
  lexicon: HALOT
  rationale: '''Vida'' conserva la fuerza del hebreo נֶפֶשׁ sin suavizar la tensión idiomática. La posible implicación de muerte o destrucción queda implícita, como en el POB inglés.'
- source_word: הָבִין
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - capacidad de entender
  lexicon: HALOT
  rationale: '''Entendimiento'' expresa la capacidad discernidora solicitada por Salomón y encaja bien con el paralelismo de la cláusula final.'
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para atender
  lexicon: HALOT
  rationale: '''Oír'' preserva el vínculo léxico con el hebreo y evita sobreinterpretar como ''obedecer''. En este contexto judicial, implica audición atenta.'
- source_word: מִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - justicia
  - juzgar
  lexicon: HALOT
  rationale: '''Juicio'' refleja mejor el valor judicial de מִשְׁפָּט en este contexto y sigue la revisión más reciente del POB inglés, sin cargarlo demasiado hacia ''justicia'' o ''sentencia''.'
theological_decisions:
- issue: La solicitud de Salomón en clave judicial
  english_pob_reading: understanding to hear judgment
  chosen_spanish_reading: entendimiento para oír juicio
  alternative_spanish_readings:
  - un corazón entendido para juzgar
  - discernimiento para administrar justicia
  rationale: La frase hebrea es compacta y algo idiomática. La versión española mantiene la tensión entre capacidad interna ('entendimiento') y función judicial ('oír juicio') sin expandirla innecesariamente, en consonancia con la filosofía de equivalencia óptima del POB.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: 'He tomado como guía la revisión más reciente del texto inglés del POB: se eliminó el ''for'' redundante antes de ''this thing'', se prefirió repetir la estructura negativa en lugar de ''nor'', y se ajustó מִשְׁפָּט a ''judgment''. En español, mantengo esa estructura causal y negativa con paralelismo claro, sin añadir notas porque no es necesario desambiguar el texto principal.'
  spanish_consistency_notes:
  - Uso 'Dios' para אֱלֹהִים en narración directa.
  - Uso 'pedir' para שָׁאַל a lo largo del versículo para conservar la repetición.
  - Conservo 'muchos días' en el texto principal para dejar visible la imagen hebrea.
  - Traduje מִשְׁפָּט como 'juicio' para alinear el giro judicial con la revisión inglesa más reciente.
  - No introduje notas al pie para evitar marcadores sin anclaje en el texto español.
