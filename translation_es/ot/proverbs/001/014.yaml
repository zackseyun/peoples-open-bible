translation:
  language: es
  text: Echa tu suerte entre nosotros[a]; todos tendremos una sola bolsa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Arroja tu suerte entre nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una sola bolsa de dinero pertenecerá a todos nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹרָלְךָ
  english_pob_choice: your lot
  chosen_spanish: tu suerte
  alternatives_spanish:
  - tu parte
  - tu porción
  - tu lote
  lexicon: HALOT
  rationale: גוֹרָל nombra la suerte o porción asignada por sorteo. En este llamado a unirse a una banda violenta, ‘tu suerte’ mantiene la idea de compartir destino con el grupo sin forzar una expresión más abstracta como ‘porción’.
- source_word: תַּפִּיל
  english_pob_choice: Throw in
  chosen_spanish: Echa
  alternatives_spanish:
  - Tira
  - Arroja
  - Echa dentro
  lexicon: HALOT
  rationale: El hifil de נפל es literalmente ‘hacer caer’, pero con גּוֹרָל forma la expresión idiomática de echar o lanzar la suerte. ‘Echa’ conserva la fuerza imperativa y suena natural en español.
- source_word: בְּתוֹכֵנוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestra compañía
  lexicon: HALOT
  rationale: La frase significa ‘en medio de nosotros’. ‘Entre nosotros’ es el equivalente español más natural para la invitación social del verso.
- source_word: כִּיס
  english_pob_choice: purse
  chosen_spanish: bolsa
  alternatives_spanish:
  - bolsa de dinero
  - monedero
  - zurrón
  lexicon: HALOT
  rationale: כִּיס se refiere a una bolsa o saquito para dinero. ‘Bolsa’ mantiene el sentido concreto sin sonar forzado; se evita ‘bolsa de dinero’ por ser más explicativa que el hebreo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: una sola
  alternatives_spanish:
  - una
  - única
  - la misma
  lexicon: HALOT
  rationale: אֶחָד expresa unidad numérica. ‘Una sola’ refuerza la idea de un único receptáculo compartido, coherente con el paralelismo del verso.
- source_word: יִהְיֶה לְכֻלָּנוּ
  english_pob_choice: we will all have
  chosen_spanish: todos tendremos
  alternatives_spanish:
  - será para todos nosotros
  - nos pertenecerá a todos
  lexicon: HALOT
  rationale: La construcción dice literalmente ‘será para todos nosotros’. ‘Todos tendremos’ comunica con claridad la posesión compartida en español y preserva el sentido distributivo.
translation_notes:
  revision_awareness: El texto hebreo presenta un llamado de cómplices a compartir botín o recursos. La versión española sigue de cerca la imagen de la suerte/porción y de una única bolsa compartida, como en el texto hebreo y la decisión inglesa auditada.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por norma editorial solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantuvo ‘bolsa’ para כִּיס, reservando ‘bolsa de dinero’ solo en la nota como alternativa explicativa.
  - La primera cláusula conserva el imperativo idiomático ‘Echa’ para reflejar תַּפִּיל sin calco excesivo.
