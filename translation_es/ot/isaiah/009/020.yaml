translation:
  language: es
  text: Manasés[a] devora a Efraín, y Efraín a Manasés; juntos están contra Judá. A pesar de todo esto, su furor no se ha apartado, y su mano sigue extendida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Manasés [contra/devorando] a Efraín, y Efraín [contra/devorando] a Manasés». El hebreo omite el verbo; aquí se suplió «devora» por la imagen inmediata del versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנַשֶּׁה / אֶפְרַיִם
  english_pob_choice: Manasseh / Ephraim
  chosen_spanish: Manasés / Efraín
  alternatives_spanish:
  - Manasés / Efraím
  - la tribu de Manasés / la tribu de Efraín
  lexicon: HALOT
  rationale: Son nombres propios tribales; se transliteran en español. Mantengo la forma bíblica usual y legible, sin convertirlos en explicaciones descriptivas.
- source_word: אֶת
  english_pob_choice: '[object marker, untranslated]'
  chosen_spanish: '[marcador de objeto, no traducido]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El hebreo usa el marcador directo de objeto sin equivalente natural en español. No se expresa como palabra independiente en la traducción.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - juntamente
  lexicon: HALOT
  rationale: En español, 'juntos' transmite de forma natural la acción unida de ambos sujetos en el paralelismo.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: están
  alternatives_spanish:
  - ellos están
  - son
  lexicon: HALOT
  rationale: El pronombre enfático queda implícito en español por el sujeto expreso repetido; el verbo ayuda a que la frase suene natural sin perder el énfasis contextual.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: En este contexto hostil y militar, 'contra' reproduce la fuerza adversativa del hebreo mejor que un término más general.
- source_word: בְּכָל זֹאת
  english_pob_choice: For all this
  chosen_spanish: Con todo esto
  alternatives_spanish:
  - A pesar de todo esto
  - Pese a todo
  lexicon: HALOT
  rationale: La fórmula refránica introduce la persistencia del juicio divino; 'Con todo esto' es una equivalencia idiomática natural en español.
- source_word: לֹא שָׁב אַפּוֹ
  english_pob_choice: his anger has not turned away
  chosen_spanish: su furor no se ha apartado
  alternatives_spanish:
  - su ira no ha vuelto atrás
  - su enojo no se ha retirado
  lexicon: HALOT
  rationale: אַף es literalmente 'nariz', pero idiomáticamente 'ira/furor'. 'Se ha apartado' conserva el valor verbal de שׁוב con el refrán de juicio y evita una mecanicidad extraña en español.
- source_word: וְעוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - y todavía
  lexicon: HALOT
  rationale: Marca continuidad del juicio; 'todavía' es breve y natural en la clausula final.
- source_word: יָדוֹ נְטוּיָה
  english_pob_choice: his hand is still stretched out
  chosen_spanish: su mano está extendida
  alternatives_spanish:
  - su mano sigue extendida
  - su mano permanece extendida
  lexicon: HALOT
  rationale: Conservo la imagen corporal de la mano extendida, que en este contexto significa poder/jucio en curso. 'Extendida' refleja el participio sin añadir interpretaciones no explicitadas.
theological_decisions:
- issue: Referente de 'su furor' y 'su mano' en el refrán
  english_pob_reading: The pronouns refer to God, left as 'his' rather than expanded to 'the LORD's' in the main text.
  chosen_spanish_reading: Los pronombres quedan implícitamente referidos a Dios en el ritmo del refrán, sin explicitar 'de Yahvé' en el texto principal.
  alternative_spanish_readings:
  - el furor de Yahvé no se ha apartado, y todavía su mano está extendida
  - su furor no se ha apartado, y todavía la mano de Yahvé está extendida
  rationale: La estructura literaria del pasaje apunta al juicio divino; mantener el pronombre conserva el paralelismo y la cadencia del hebreo, sin borrar el referente teológico que el contexto ya hace claro.
  doctrine_reference: Preservar la forma retórica y la tensión del refrán profético; primacía del texto original sobre la expansión interpretativa de la tradición.
translation_notes:
  revision_awareness: 'El borrador sigue el contexto inmediato de Isaías 9:19–20 y el audit trail inglés: conserva el refrán de juicio, la imagen corporal de la mano extendida y la referencia implícita al furor divino, con una solución española natural y auditable. No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del proyecto cuando sea necesario explicitar el nombre divino; en este versículo, el texto principal conserva el pronombre poseído como en el inglés auditado.
  - '''Manasés'' y ''Efraín'' se mantienen como nombres propios tribales transliterados.'
  - '''furor'' se prefirió aquí por el registro profético y por la fuerza del hebreo אַף en el refrán de juicio.'
  - La imagen de 'su mano está extendida' se conserva sin suavizarla, porque funciona como señal de juicio continuo en el contexto inmediato.
