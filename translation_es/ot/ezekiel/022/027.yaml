translation:
  language: es
  text: Sus príncipes dentro de ella son como lobos que desgarran[a] la presa, derramando sangre, destruyendo vidas[b], para obtener ganancia deshonesta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'despedazan la presa'.
    reason: lexical_alternative
  - marker: b
    text: O 'destruyendo personas' o 'destruyendo almas'; hebreo nephashot puede denotar personas, vidas o almas según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O 'obtener lucro injusto' o 'ganar por extorsión'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֶיהָ
  english_pob_choice: her princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus oficiales
  - sus líderes
  lexicon: HALOT
  rationale: שַׂר designa aquí a gobernantes o autoridades. 'Príncipes' conserva el sentido político elevado del hebreo y sigue de cerca la elección del POB en inglés.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - en su interior
  lexicon: HALOT
  rationale: La expresión marca que la corrupción está en el interior de la ciudad/comunidad. 'Dentro de ella' es natural en español y conserva esa imagen.
- source_word: כִּזְאֵבִים
  english_pob_choice: like wolves
  chosen_spanish: como lobos
  alternatives_spanish:
  - cual lobos
  lexicon: HALOT
  rationale: El כ comparativo introduce un símil. 'Como lobos' es claro, idiomático y fiel.
- source_word: טֹרְפֵי טָרֶף
  english_pob_choice: tearing prey
  chosen_spanish: que desgarran la presa
  alternatives_spanish:
  - devorando presa
  - que despedazan la presa
  lexicon: HALOT
  rationale: El participio con objeto cognado intensifica la violencia depredadora. 'Desgarran la presa' conserva la imagen vívida sin sonar arcaico en español.
- source_word: לִשְׁפָּךְ דָּם
  english_pob_choice: shedding blood
  chosen_spanish: derramando sangre
  alternatives_spanish:
  - para derramar sangre
  - vertiendo sangre
  lexicon: HALOT
  rationale: Es un modismo hebreo para matar violentamente. 'Derramando sangre' comunica el acto y mantiene la secuencia participial del contexto.
- source_word: לְאַבֵּד נְפָשׁוֹת
  english_pob_choice: destroying lives
  chosen_spanish: destruyendo vidas
  alternatives_spanish:
  - destruyendo personas
  - quitando la vida
  - destruyendo almas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí apunta a vidas/personas concretas, no a un uso doctrinal restringido de 'alma'. 'Vidas' preserva el sentido concreto y evita sobreinterpretación teológica.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para obtener
  alternatives_spanish:
  - con el fin de obtener
  - a fin de obtener
  lexicon: HALOT
  rationale: La partícula expresa propósito. 'Para obtener' transmite la finalidad de la violencia en un español fluido.
- source_word: בְּצֹעַ בָּצַע
  english_pob_choice: gain dishonest profit
  chosen_spanish: ganancia deshonesta
  alternatives_spanish:
  - lucro injusto
  - ganancia injusta
  - lucro extorsivo
  lexicon: HALOT
  rationale: La construcción enfatiza la codicia por ganancia ilícita. 'Ganancia deshonesta' conserva la carga moral negativa del POB inglés sin introducir un matiz demasiado específico no requerido por el hebreo.
theological_decisions:
- issue: Sentido de נְפָשׁוֹת en contexto de violencia judicial/social
  english_pob_reading: '''lives'' referring to persons being destroyed'
  chosen_spanish_reading: '''vidas'' refiriéndose a personas destruidas'
  alternative_spanish_readings:
  - '''almas'''
  - '''personas'''
  rationale: El contexto trata de sangre derramada y víctimas humanas; por eso נֶפֶשׁ se entiende como vida/persona concreta. Mantener 'vidas' preserva la tensión semántica sin imponer una antropología doctrinal ajena al pasaje.
  doctrine_reference: Preservar la tensión léxica sin importar debates doctrinales posteriores sobre alma/cuerpo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente, que ajustó las formas infinitivas a participios para reflejar con más naturalidad la secuencia del hebreo. En español se mantuvo esa progresión participial: ''desgarran'', ''derramando'', ''destruyendo'', con finalidad expresada por ''para obtener''.'
  spanish_consistency_notes:
  - Se mantuvo 'príncipes' para שָׂרִים por coherencia con la tradición léxica del POB y por su valor político.
  - Se evitó 'SEÑOR' o equivalentes de máscara porque el versículo no contiene el Tetragrámaton ni cita directa del nombre divino.
  - '''Vidas'' se prefirió sobre ''almas'' para no cargar el texto con un sentido doctrinal ajeno al contexto profético de violencia.'
  - '''Ganancia deshonesta'' conserva el juicio moral del hebreo בָּצַע sin convertirlo en un tecnicismo económico más fuerte de lo necesario.'
