translation:
  language: es
  text: 'Entonces mandó al que estaba a cargo de su casa, diciendo: «Llena de comida los costales de los hombres, cuanto puedan llevar, y pon el dinero de cada uno en la boca de su costal[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la boca de su costal», es decir, en la abertura de su costal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: Then he commanded
  chosen_spanish: Entonces mandó
  alternatives_spanish:
  - Y mandó
  - Luego mandó
  lexicon: HALOT c/6680
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia narrativa en español. «Mandó» expresa con naturalidad el valor de צוה sin perder el tono directivo.
- source_word: אֲשֶׁר עַל בֵּיתוֹ
  english_pob_choice: the one over his house
  chosen_spanish: el que estaba sobre su casa
  alternatives_spanish:
  - el encargado de su casa
  - su mayordomo
  lexicon: HALOT 1004
  rationale: La frase hebrea describe a quien tenía autoridad administrativa sobre la casa. «El que estaba sobre su casa» sigue de cerca el hebreo y mantiene la referencia funcional; «mayordomo» sería más interpretativo.
- source_word: מַלֵּא
  english_pob_choice: Fill
  chosen_spanish: Llena
  alternatives_spanish:
  - Llena de
  - Rellena
  lexicon: HALOT 4390
  rationale: Imperativo directo de מלא. «Llena» es el equivalente natural en español; se añade «de comida» para explicitar el complemento ya implícito en el objeto hebreo.
- source_word: אַמְתְּחֹת
  english_pob_choice: sacks
  chosen_spanish: costales
  alternatives_spanish:
  - sacos
  - sacos de provisiones
  lexicon: HALOT 572
  rationale: En español bíblico actual, «costales» comunica bien el contenedor de viaje y provisiones. «Sacos» también es posible, pero «costales» resulta más concreto y fluido en este contexto.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - provisiones
  - grano
  lexicon: HALOT 400
  rationale: El término hebreo es amplio. «Comida» es una opción clara y natural en español; «provisiones» sería más técnico y «grano» sería demasiado específico para el sustantivo usado aquí.
- source_word: כַּאֲשֶׁר יוּכְלוּן שְׂאֵת
  english_pob_choice: as much as they can carry
  chosen_spanish: cuanto puedan llevar
  alternatives_spanish:
  - tanto como puedan cargar
  - hasta donde puedan llevar
  lexicon: HALOT 3201, 5375
  rationale: La construcción combina capacidad y carga. «Cuanto puedan llevar» reproduce el sentido idiomático con naturalidad y evita la repetición excesiva de «cargar» en español.
- source_word: וְשִׂים
  english_pob_choice: and put
  chosen_spanish: y pon
  alternatives_spanish:
  - y coloca
  - y deposita
  lexicon: HALOT 7760
  rationale: Imperativo simple y directo. «Pon» es la forma más natural y fiel al carácter instructivo del hebreo.
- source_word: כֶּסֶף אִישׁ
  english_pob_choice: each man's silver
  chosen_spanish: el dinero de cada uno
  alternatives_spanish:
  - la plata de cada uno
  - la plata de cada hombre
  lexicon: HALOT 3701
  rationale: En el contexto narrativo, כֶּסֶף apunta al pago en plata, pero en español «el dinero de cada uno» comunica con claridad el valor monetario sin obligar al lector moderno a reconstruir la economía antigua. «La plata de cada uno» sería más literal, pero menos transparente.
- source_word: בְּפִי אַמְתַּחְתּוֹ
  english_pob_choice: in the mouth of his sack
  chosen_spanish: en la boca de su costal
  alternatives_spanish:
  - en la abertura de su costal
  - en la boca de su saco
  lexicon: HALOT 6310, 572
  rationale: Se conserva el hebraísmo «boca» para reflejar el original, como en la nota auditada inglesa. «Costal» mantiene la consistencia con el término escogido para אַמְתַּחְתּוֹ; la expresión puede entenderse naturalmente como la abertura del costal.
theological_decisions:
- issue: Término para el recipiente del viaje y su relación con el hebraísmo «boca»
  english_pob_reading: in the mouth of his sack
  chosen_spanish_reading: en la boca de su costal
  alternative_spanish_readings:
  - en la abertura de su costal
  - en la boca de su saco
  rationale: Se preserva el hebraísmo de la expresión sin eliminar su sentido. La nota aclara que «boca» significa la abertura del recipiente, manteniendo la tensión entre literalidad y claridad sin ocultar el giro original.
  doctrine_reference: Principio de fidelidad al texto y transparencia lexical; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios sustantivos respecto al audit trail inglés. La versión española conserva el orden narrativo, la imagen hebrea de la «boca» del recipiente y la distribución individual del dinero/plata sin introducir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo la terminología del recipiente como «costal» en todo el versículo para evitar alternancia innecesaria con «saco».
  - Se eligió «dinero» para כֶּסֶף porque la frase española resulta más clara y natural, aunque la noción de plata permanece implícita en el contexto.
  - El verbo principal se rindió con un imperativo simple («Llena», «pon») para conservar la fuerza directiva del hebreo.
  - La nota al pie se ancló en «casa[a]» siguiendo el patrón del audit trail, aunque su contenido explica la frase final «boca de su costal» conforme al texto hebreo.
