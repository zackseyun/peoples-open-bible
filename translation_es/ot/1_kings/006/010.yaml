  - severity: medium
    issue: «la aseguró a la casa» no reproduce con suficiente fidelidad el valor contextual de adjunción estructural
    rationale: וַיֶּאֱחֹז en este contexto describe que la estructura quedó sujeta/unida al edificio. «La aseguró» puede entenderse como ‘la hizo segura’ o como acción agentiva de Salomón, mientras que el inglés auditado opta por un valor pasivo/resultativo.
  revised_spanish_text: Construyó la estructura lateral adosada a toda la casa[a], de cinco codos de altura, y quedó unida a la casa con maderas de cedro[b].
