id: ISA.38.22
reference: Isaiah 38:22
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר חִזְקִיָּ֖הוּ מָ֣ה א֑וֹת כִּ֥י אֶעֱלֶ֖ה בֵּ֥ית יְהוָֽה׃ס
translation:
  text: And Hezekiah said[a], “What is the sign that I shall go up to the house of Yahweh?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What sign is there that I will go up to the house of the LORD?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' is a natural, sufficiently formal rendering that preserves the simple narrative sequence without overinterpreting discourse flow.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  alternatives:
  - Hezekiahu
  rationale: Personal names are transliterated by standard English convention. 'Hezekiah' is the established and recognizable English form of the Hebrew name.
- source_word: מָה
  chosen: What
  alternatives:
  - What kind of
  lexicon: HALOT
  rationale: The interrogative simply asks for identification of the sign. 'What' is the most direct equivalent and avoids adding nuance not explicit in the Hebrew.
- source_word: אוֹת
  chosen: the sign
  alternatives:
  - a sign
  - the proof
  - the pledge
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' in prophetic and narrative contexts. The noun here is anarthrous in Hebrew, but English idiom naturally uses 'the sign' for a specific confirming sign expected in context; this best fits the discourse with the surrounding narrative about a confirming sign.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  - that indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what the sign will confirm: that Hezekiah will go up to the house of the LORD. ''That'' is the clearest English complementizer in this context.'
- source_word: אֶעֱלֶה
  chosen: I will go up
  alternatives:
  - I may go up
  - I shall go up
  - I will ascend
  lexicon: HALOT
  rationale: The Qal imperfect of עלה here is best rendered as a future, referring to Hezekiah's anticipated ascent to the temple. 'Go up' preserves both the common idiom for going to Jerusalem/the temple and the concrete upward movement.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is a standard expression for the temple. 'The house of the LORD' preserves the Hebrew wording more closely than 'temple' while remaining natural English. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving the reverential convention and matching the stated doctrine guidance.
