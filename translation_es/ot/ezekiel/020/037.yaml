translation:
  language: es
  text: Os haré pasar bajo la vara[b], y os haré entrar en el vínculo del pacto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la atadura» o «a la obligación del pacto». El término hebreo traducido aquí como «vínculo» es raro y expresa la idea de quedar atado o constreñido en relación con el pacto.
    reason: lexical_alternative
  - marker: b
    text: «Pasar bajo la vara» probablemente alude a la práctica de contar o inspeccionar un rebaño al pasar bajo la vara del pastor.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַעֲבַרְתִּי
  english_pob_choice: I will make ... pass
  chosen_spanish: os haré pasar
  alternatives_spanish:
  - os haré cruzar
  - os causaré pasar
  lexicon: HALOT
  rationale: El hiphil de עבר expresa causación; «haré pasar» conserva mejor esa fuerza causativa que un simple «traeré» o una forma menos directa. El objeto directo plural se adapta naturalmente con «os».
- source_word: תַּחַת הַשָּׁבֶט
  english_pob_choice: under the rod
  chosen_spanish: bajo la vara
  alternatives_spanish:
  - bajo el bastón
  - bajo la vara de pastor
  lexicon: HALOT
  rationale: «Vara» reproduce el valor básico de שֵׁבֶט como ‘rod/staff’ y suena natural en español. Se evita «bastón» por sonar menos acorde con el campo simbólico de inspección/autoridad; el matiz pastoral queda sugerido en la nota.
- source_word: וְהֵבֵאתִי
  english_pob_choice: I will bring
  chosen_spanish: os traeré
  alternatives_spanish:
  - os introduciré
  - os conduciré
  lexicon: HALOT
  rationale: El hiphil de בוא aquí se vierte con «traer», que mantiene el paralelismo con la primera cláusula y la relación directa con el complemento preposicional.
- source_word: בְּמָסֹרֶת
  english_pob_choice: into the bond
  chosen_spanish: al vínculo
  alternatives_spanish:
  - a la atadura
  - a la obligación
  lexicon: HALOT
  rationale: מָסֹרֶת es un término raro y en este contexto comunica algo que ata o vincula. «Vínculo» preserva la metáfora sin concretarla en exceso; «atadura» o «obligación» siguen siendo alternativas posibles, pero una puede sonar demasiado física y la otra demasiado abstracta.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: En español bíblico «pacto» comunica bien בְּרִית y conserva el peso jurídico-teológico del término. «Alianza» es posible, pero en este contexto «pacto» es más estable y preciso.
theological_decisions:
- issue: Metáfora de examen/juicio y pertenencia pactual
  english_pob_reading: The verse depicts YHWH's sovereign examination and binding of the people into covenant obligation, without specifying here whether the emphasis is primarily punitive or restorative.
  chosen_spanish_reading: El versículo presenta la acción soberana de Yahvé al examinar y encuadrar al pueblo en una relación de obligación pactual, sin decidir aquí si el énfasis principal es punitivo o restaurador.
  alternative_spanish_readings:
  - El versículo describe principalmente un acto de juicio y disciplinamiento.
  - El versículo describe principalmente una reanudación restauradora de la pertenencia al pacto.
  rationale: La imagen de pasar bajo la vara y entrar en el vínculo del pacto admite ambas lecturas. La redacción española preserva esa tensión en lugar de resolverla, respetando la ambigüedad teológica documentada por el POB en inglés.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla; cf. disciplina divina y restauración pactual.
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto en el audit trail inglés; no se registran revisiones sustantivas posteriores. Se ha mantenido la tensión entre inspección/juicio y reingreso/restauración, y se ha seguido la decisión léxica inglesa para  עבר, שֵׁבֶט, בְּמָסֹרֶת y בְּרִית.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el estándar del proyecto para el nombre divino cuando corresponde al trasfondo hebreo.
  - Se prefirió «pacto» para בְּרִית, en lugar de «alianza», por estabilidad terminológica en español bíblico.
  - «Vara» se mantiene sin intensificarla a «cetro» o «bastón», para no desplazar el imaginario de inspección pastoral/propietaria documentado por el POB.
