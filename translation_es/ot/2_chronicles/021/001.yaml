translation:
  language: es
  text: Jehosafat durmió con sus padres, y fue sepultado con sus padres en la ciudad de David[a][b], y Jehoram su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «murió»; literalmente, «durmió con sus padres».
    reason: lexical_alternative
  - marker: b
    text: «Con sus padres» es un modismo hebreo para indicar que uno se reúne con sus antepasados en la muerte y la sepultura.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo idiomático en anuncios reales de muerte. En español, «se acostó» conserva la imagen literal sin forzar una traducción más interpretativa como «murió».
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático de parentesco ancestral. «Padres» refleja de cerca la forma bíblica tradicional y la POB inglesa; «antepasados» explicaría el sentido pero se aparta más del texto.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: «Sepultado» expresa con dignidad el pasivo narrativo del verbo קבר. «Enterrado» es posible, pero «sepultado» encaja mejor con el registro bíblico solemne.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: Se conserva la expresión geográfica estable y transparente del hebreo, ya fijada en la tradición bíblica.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: La fórmula sucesoria se expresa naturalmente con «reinó», que mantiene el estilo de nota real del hebreo sin añadir matices no presentes.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: «En su lugar» comunica la sucesión con claridad y cercanía semántica a תחתיו. «En vez de él» puede sonar más contrastivo; «después de él» pierde la idea de reemplazo.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Jehosafat
  alternatives_spanish:
  - Josafat
  lexicon: Convención transliterada al español a partir del hebreo
  rationale: Se adapta el nombre al uso español sin depender de la forma inglesa. «Josafat» es la forma tradicional, pero «Jehosafat» conserva más de cerca la sonoridad y la base hebrea del nombre en este proyecto.
- source_word: יְהוֹרָם
  english_pob_choice: Jehoram
  chosen_spanish: Jehoram
  alternatives_spanish:
  - Joram
  lexicon: Convención transliterada al español a partir del hebreo
  rationale: Se conserva la forma más directa del hebreo יְהוֹרָם. «Joram» es una variante abreviada usada en otros contextos, pero aquí la forma plena es la más transparente.
theological_decisions:
- issue: Eufemismo de muerte en el verbo «se acostó»
  english_pob_reading: '''Slept'' preserves the Hebrew idiom; ''died'' is only an explanatory alternative.'
  chosen_spanish_reading: «Se acostó» conserva el eufemismo hebreo; no se reemplaza por «murió».
  alternative_spanish_readings:
  - murió
  - durmió
  rationale: No se borra el valor idiomático del hebreo, que en notices reales alude a la muerte mediante el lenguaje de dormir/acostarse. La elección permite que el lector perciba el giro original y su tono memorial.
  doctrine_reference: Uso bíblico del eufemismo para la muerte; cf. 2 Re 20:21; 1 Co 15:18-20 (por contraste conceptual, no como equivalente idiomático).
- issue: Expresión de pertenencia ancestral «con sus padres»
  english_pob_reading: '''With his fathers'' is a Hebrew idiom for joining one''s ancestors in death and burial.'
  chosen_spanish_reading: «Con sus padres» mantiene el idiomático enlace con sus antepasados en muerte y sepultura.
  alternative_spanish_readings:
  - con sus antepasados
  rationale: 'Se preserva la tensión entre literalidad y sentido idiomático: «padres» sigue la forma del hebreo, mientras el contexto explica que se trata de sus antepasados. No se sustituye directamente por una paráfrasis más explícita.'
  doctrine_reference: Idiomatismo funerario de la memoria dinástica en los relatos reales.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del aviso real con el mismo contenido del hebreo y del POB inglés: eufemismo de muerte, sepultura en la ciudad de David y sucesión de Jehoram. No hubo necesidad de revisión sustantiva respecto del contexto auditado.'
  spanish_consistency_notes:
  - Se usó «Jehosafat» para coherencia con transliteración directa al español, evitando depender de la forma inglesa.
  - Se mantuvo «Jehoram» por ser la transliteración más directa del hebreo en este versículo.
  - La fórmula sucesoria «reinó en su lugar» se conserva como equivalente natural de תחתיו.
  - El registro es solemne y narrativo, apropiado para una nota histórica real.
