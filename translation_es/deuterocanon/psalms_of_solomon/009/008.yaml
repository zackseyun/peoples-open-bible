review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: καὶ = ''y'', ἐν τῇ δικαιοσύνῃ σου = ''en tu justicia'', ἐπεσκέπτῃ = ''visitas'', y υἱοὺς ἀνθρώπων = ''los hijos de los hombres''. También respeta el rastro de auditoría inglés al mantener ''visit'' como texto principal y reservar el matiz judicial para nota.'
  spanish_quality_summary: La redacción principal es clara y digna. Sin embargo, la nota [a] no preserva fielmente las alternativas del inglés, que distinguen entre una opción inclusiva ('human beings') y otra más formalmente cercana ('the children of men'). 'La humanidad' se aleja de esa forma. Conviene ajustar la nota para reflejar mejor las alternativas documentadas y mantener la expresión idiomática principal.
  glossary_alignment: 'Alineado con los criterios del proyecto: δικαιοσύνη como ''justicia'' es adecuado en este contexto de juicio; υἱοὺς ἀνθρώπων se conserva con formulación masculina representativa; ἐπεσκέπτῃ se mantiene como ''visitas'' conforme a la revisión final del audit trail, con nota para el sentido judicial alternativo.'
  issues:
  - severity: medium
    issue: La nota [a] no corresponde con precisión a las alternativas preservadas en el audit trail inglés.
    rationale: El inglés ofrece 'human beings' / 'the children of men'. El borrador español pone 'los seres humanos' / 'la humanidad'. La segunda opción neutraliza y parafrasea demasiado; una alternativa más fiel sería 'los hijos de los hombres' ~ 'los hijos de la humanidad' no suena natural, así que mejor 'los seres humanos' / 'los hijos de la humanidad' tampoco convence. En español, 'los seres humanos' / 'los hijos de los hombres' no funciona como alternativa porque repite el texto principal; la mejor correspondencia idiomática y formal es 'los seres humanos' / 'los hijos del hombre' o 'los hijos de la humanidad', pero esta última es poco natural. Lo más fiel y legible es conservar solo la alternativa inclusiva y una alternativa formal cercana como 'los hijos del hombre'.
  - severity: low
    issue: La nota [b] está bien orientada, pero puede formularse con mayor cercanía al rationale inglés.
    rationale: El audit trail final volvió a 'visit' para evitar expansión interpretativa. La nota puede seguir ofreciendo 'examinas' / 'inspeccionas' como lectura contextual judicial, pero conviene presentarla claramente como sentido contextual, no como reemplazo preferido.
  revised_spanish_text: y en tu justicia visitas a los hijos de los hombres[a][b];
  revised_footnotes:
  - marker: a
    text: O 'los seres humanos' / 'los hijos del hombre'.
    reason: lexical_alternative
  - marker: b
    text: O 'examinas' / 'inspeccionas', en sentido judicial contextual.
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego y al audit trail inglés. Solo se ajustan las notas para reflejar mejor las alternativas documentadas y evitar una paráfrasis excesiva ('la humanidad').
