    rationale: El valor reflexivo de אֵלָיו puede expresarse más naturalmente como «consigo». No es un error de fidelidad, pero sí una mejora estilística menor.
  revised_spanish_text: Así David no trajo el arca[a] consigo, a la Ciudad de David; más bien[b], la apartó a la casa de Obed-edom el gitita.
