    issue: Se añadieron notas [a] y [d] sin respaldo en la auditoría ni necesidad clara en español.
    rationale: La instrucción pide preservar alternativas significativas cuando el inglés las preservó o cuando el español crea una nueva ambigüedad. La nota sobre «Y ella dijo» no aporta una decisión significativa, y la alternativa «los escritos» para «las cartas» no está preservada por la auditoría inglesa de este versículo.
