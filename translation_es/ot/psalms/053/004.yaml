translation:
  language: es
  text: Todos ellos se han desviado; juntos se han corrompido; no hay quien haga el bien[a], ni siquiera uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se han vuelto inmundos». El verbo hebreo puede denotar llegar a ser moralmente corruptos o estar contaminados.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻלּוֹ
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Cada uno de ellos
  - Todos
  lexicon: HALOT
  rationale: La forma hebrea tiene fuerza colectiva e idiomática. «Todos ellos» reproduce bien el referente grupal sin volverlo demasiado abstracto en español.
- source_word: סָג
  english_pob_choice: have turned aside
  chosen_spanish: se han desviado
  alternatives_spanish:
  - se han apartado
  - han vuelto atrás
  - se han desviado del camino
  lexicon: HALOT
  rationale: El verbo expresa apartarse o desviarse de la vía recta. «Se han desviado» conserva la idea moral sin añadir un objeto explícito que el hebreo no dice.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - en conjunto
  lexicon: HALOT
  rationale: Mantiene el matiz colectivo y el paralelismo con «Todos ellos». «Todos juntos» suena natural en español y conserva la intensificación.
- source_word: נֶאֱלָחוּ
  english_pob_choice: have become corrupt
  chosen_spanish: se han corrompido
  alternatives_spanish:
  - se han vuelto corruptos
  - se han hecho impuros
  - se han vuelto inmundos
  lexicon: HALOT
  rationale: El nifal describe un llegar a ser moralmente malo o contaminado. «Se han corrompido» expresa bien la decadencia ética y deja abierta la posible tensión con la alternativa de «ensuciarse/volverse inmundos».
- source_word: אֵין
  english_pob_choice: there is none
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: HALOT
  rationale: En español, «no hay» transmite con naturalidad la negación existencial absoluta del hebreo poético.
- source_word: עֹשֵׂה
  english_pob_choice: who does
  chosen_spanish: quien haga
  alternatives_spanish:
  - quien hace
  - el que haga
  lexicon: HALOT
  rationale: El participio funciona como caracterización general. En español, una relativa con subjuntivo («quien haga») suena natural tras la negación existencial y preserva la fuerza general del hebreo.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien moral
  lexicon: HALOT
  rationale: En este contexto el adjetivo funciona sustantivamente. «El bien» comunica con claridad el valor moral global que el verbo «hacer» lleva implícito.
- source_word: גַּם אֶחָד
  english_pob_choice: not even one
  chosen_spanish: no, ni uno solo
  alternatives_spanish:
  - ni siquiera uno
  - ni uno
  lexicon: HALOT
  rationale: La fórmula intensifica la negación absoluta. «No, ni uno solo» reproduce el énfasis enfático del hebreo y mantiene buen ritmo poético en español.
theological_decisions:
- issue: Alcance universal de la acusación moral
  english_pob_reading: 'Render the verse as a universal moral indictment within the psalm''s poetic context: ''All of them... there is none who does good, not even one.'''
  chosen_spanish_reading: 'La traducción conserva la acusación universal del poema: «Todos ellos... no hay quien haga el bien, no, ni uno solo».'
  alternative_spanish_readings:
  - Restringirlo solo al grupo de impíos de la escena
  - Suavizarlo a una generalización menos absoluta
  rationale: El hebreo usa lenguaje abarcador («todos», «no hay», «ni uno solo»). La versión española mantiene esa amplitud sin añadir una síntesis doctrinal externa ni atenuar el enunciado del texto.
  doctrine_reference: Mantener la tensión teológica del texto; no resolverla por importación doctrinal externa.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el auditable English POB: ''All of them'' -> ''Todos ellos'', ''have turned aside'' -> ''se han desviado'', ''together'' -> ''todos juntos'', ''have become corrupt'' -> ''se han corrompido'', y la negación enfática final se conserva como ''no, ni uno solo''. No hay revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - La nota al pie preserva la alternativa léxica documentada para נֶאֱלָחוּ sin borrar la tensión entre 'corrompidos' e 'inmundos'.
