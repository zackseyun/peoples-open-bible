revisions:
- from: ¡Lamenta[a], ciprés, porque cayó el cedro, porque los majestuosos[b] han sido destruidos! ¡Lamentad, encinos de Basán, porque ha descendido el bosque[c] denso!
  to: ¡Lamenta, ciprés[a], porque cayó el cedro, porque los majestuosos[b] han sido destruidos! ¡Lamenten, robles de Basán, porque el bosque denso[c] ha venido abajo!
  rationale: Se corrige la ubicación de la nota léxica para que quede anclada en «ciprés[a]», que es donde corresponde la alternativa «abeto». Se mejora la naturalidad del español con «Lamenten» en la segunda exhortación y con «ha venido abajo» para reflejar יָרַד de forma idiomática sin perder la imagen de colapso. Se recomienda «robles de Basán» por mayor alcance panhispánico y reconocimiento bíblico, manteniendo intacta la metáfora y las alternativas documentadas.
