translation:
  language: es
  text: Y los asideos fueron los primeros entre los hijos de Israel[a], y procuraban obtener paz de parte de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los israelitas». El griego dice literalmente «entre los hijos de Israel», una expresión tradicional de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτοι
  english_pob_choice: the first
  chosen_spanish: los primeros
  alternatives_spanish:
  - los primeros en hacerlo
  - los primeros que tomaron la iniciativa
  - entre los primeros
  lexicon: LSJ
  rationale: El griego usa πρῶτοι con ἦσαν de forma predicativa, indicando prioridad o iniciativa. «Los primeros» conserva esa idea de antecedencia sin añadir más de lo que el texto dice.
- source_word: Ἀσιδαῖοι
  english_pob_choice: Hasideans
  chosen_spanish: los asideos
  alternatives_spanish:
  - los hasideos
  - los jasideos
  - los hasidim
  lexicon: LSJ
  rationale: Se mantiene el nombre de grupo como transliteración reconocible en castellano. «Asideos» reproduce la forma tradicional hispana del etnónimo y evita una paráfrasis interpretativa.
- source_word: ἐν υἱοῖς Ἰσραήλ
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - entre los hijos de Jacob
  lexicon: LSJ
  rationale: «ἐν» con este plural expresa pertenencia o ubicación dentro del conjunto; «entre» comunica bien esa relación. Se conserva «hijos de Israel» para respetar la expresión de pacto del griego y la decisión de no neutralizarla sin nota.
- source_word: ἐπεζήτουν
  english_pob_choice: sought
  chosen_spanish: buscaban
  alternatives_spanish:
  - buscaban obtener
  - procuraban
  - solicitaban
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continua o intento en desarrollo. En español, «buscaban» comunica esa continuidad mejor que un simple pasado puntual y mantiene naturalidad narrativa.
- source_word: παρʼ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de parte de ellos
  - a ellos
  - con ellos
  lexicon: LSJ
  rationale: La preposición παρά con genitivo suele significar «de, desde». «De ellos» es la forma más directa y natural en español para expresar el origen de lo buscado.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - paz y reconciliación
  - acuerdo de paz
  lexicon: LSJ
  rationale: El sustantivo básico εἰρήνην se traduce fielmente por «la paz». Se evita expandir a «acuerdo de paz» o «reconciliación», porque el griego no lo especifica.
theological_decisions:
- issue: Expresión covenantal/nacional υἱοῖς Ἰσραήλ
  english_pob_reading: among the sons of Israel
  chosen_spanish_reading: entre los hijos de Israel
  alternative_spanish_readings:
  - entre los israelitas
  rationale: El griego conserva la fórmula tradicional «hijos de Israel». Aunque en español podría neutralizarse como «israelitas», se preserva la formulación heredada porque el texto la usa explícitamente y no hay necesidad exegética de suavizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de manera alta; no se registran revisiones sustantivas. La draft española sigue esa lectura estable, preservando el nombre de grupo, la fórmula «hijos de Israel» y el valor aspectual del imperfecto en español natural.
  spanish_consistency_notes:
  - Se emplea «los asideos» como nombre de grupo transliterado y en plural, en paralelo con el artículo del original gramaticalmente plural.
  - «La paz» mantiene el sustantivo simple εἰρήνην sin añadir matices políticos no explicitados por el griego.
  - La nota al pie ofrece la alternativa documentada sin reemplazar la forma principal del texto.
