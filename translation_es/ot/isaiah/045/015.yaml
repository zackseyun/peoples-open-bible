translation:
  language: es
  text: Verdaderamente[a], tú eres un Dios que se oculta, el Dios de Israel, el Salvador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un Dios oculto». El participio hebreo puede entenderse de modo reflexivo («que se oculta») o de manera más estática («oculto»).'
    reason: alternative_reading
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: Truly
  chosen_spanish: Verdaderamente
  alternatives_spanish:
  - Ciertamente
  - En verdad
  lexicon: HALOT
  rationale: Expresa la afirmación enfática del hebreo con un adverbio natural en español, manteniendo el tono confesional y solemne.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: HALOT
  rationale: El hebreo usa segunda persona singular directa; 'tú' conserva la inmediatez del خطاب dirigido a Dios en español bíblico actual.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - el Poderoso
  lexicon: HALOT
  rationale: En este contexto se trata claramente del Dios de Israel; la mayúscula conserva el referente divino y evita una lectura genérica.
- source_word: מִסְתַּתֵּר
  english_pob_choice: who hides himself
  chosen_spanish: que se oculta
  alternatives_spanish:
  - que se esconde a sí mismo
  - que está oculto
  lexicon: HALOT
  rationale: El hitpael admite un matiz reflexivo o medio. 'Se oculta' mantiene la fuerza verbal sin forzar una explicación más estrecha que el hebreo no exige.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La frase funciona como aposición identificadora, no como vocativo separado en español. 'El Dios de Israel' preserva esa identificación directa.
- source_word: מוֹשִׁיעַ
  english_pob_choice: the Savior
  chosen_spanish: el Salvador
  alternatives_spanish:
  - el que salva
  - el libertador
  lexicon: HALOT
  rationale: El participio hifil de ישׁע designa al que salva; 'el Salvador' es el equivalente español natural y plenamente fiel al valor titular del término.
theological_decisions:
- issue: Sentido de la ocultación divina
  english_pob_reading: Render the phrase as a confession that God hides himself, without explaining whether this refers to inscrutability, hidden providence, or temporary concealment.
  chosen_spanish_reading: Traducir la frase como una confesión de que Dios se oculta, sin precisar si alude a su inescrutabilidad, a una providencia oculta o a una retirada temporal.
  alternative_spanish_readings:
  - un Dios oculto
  - un Dios que está oculto
  rationale: El participio hebreo permite tanto un sentido reflexivo como uno estático. La versión española conserva esa tensión teológica sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del texto
- issue: Relación entre aposición e identificación divina
  english_pob_reading: the God of Israel, the Savior
  chosen_spanish_reading: el Dios de Israel, el Salvador
  alternative_spanish_readings:
  - el Dios de Israel, Salvador
  - el Dios de Israel y Salvador
  rationale: La puntuación y los artículos en español ayudan a mantener la serie appositiva del hebreo y la revisión inglesa, identificando al mismo sujeto con ambos predicados.
  doctrine_reference: Aposición nominal en el texto bíblico
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'O God of Israel, Savior' por 'the God of Israel, the Savior' para reflejar aposición y no vocativo. La redacción española sigue esa decisión con 'el Dios de Israel, el Salvador'. También se respetó la nota lexical sobre מִסְתַּתֵּר, manteniendo la ambigüedad entre sentido reflexivo y estático mediante una nota textual.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' con mayúscula para el referente divino único.
  - '''el Salvador'' reproduce el valor titular de מוֹשִׁיעַ sin añadir explicaciones doctrinales.'
  - La frase 'se oculta' evita 'esconde' porque 'ocultar(se)' suena más sobrio y más cercano al matiz de ocultamiento del participio.
  - La puntuación con comas conserva la estructura appositiva del hebreo y de la revisión inglesa.
