translation:
  language: es
  text: El pueblo de la tierra ha practicado opresión y ha cometido robo; ha maltratado al pobre y al necesitado, y ha oprimido al extranjero[a] sin justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el forastero» o «el residente extranjero». El término hebreo designa a una persona nacida fuera que vive entre el pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el pueblo del país
  lexicon: HALOT
  rationale: La expresión hebrea se conserva de manera transparente en español. "Pueblo de la tierra" reproduce la construcción sin convertirla en una categoría técnica ajena al contexto de Ezequiel.
- source_word: עָשְׁקוּ עֹשֶׁק
  english_pob_choice: have practiced oppression
  chosen_spanish: ha practicado opresión
  alternatives_spanish:
  - ha oprimido con opresión
  - ha cometido extorsión
  lexicon: HALOT
  rationale: El sustantivo cognado intensifica la acción; en español, "practicar opresión" mantiene el carácter habitual o caracterizador que el inglés POB buscó con "practiced oppression".
- source_word: וְגָזְלוּ גָּזֵל
  english_pob_choice: and committed robbery
  chosen_spanish: y cometido robo
  alternatives_spanish:
  - y robado con robo
  - y arrebatado despojo
  lexicon: HALOT
  rationale: '"Cometer robo" expresa con naturalidad la acción criminal del binomio verbal-sustantivo sin perder la fuerza del hebreo.'
- source_word: וְעָנִי וְאֶבְיוֹן
  english_pob_choice: the poor and needy
  chosen_spanish: al pobre y al necesitado
  alternatives_spanish:
  - al afligido y al necesitado
  - al pobre y al indigente
  lexicon: HALOT
  rationale: La pareja semántica se traduce de forma idiomática y clara. Se mantiene la distinción social y económica sin arcaísmo.
- source_word: הוֹנוּ
  english_pob_choice: have mistreated
  chosen_spanish: han maltratado
  alternatives_spanish:
  - han hecho daño
  - han defraudado
  - han oprimido
  lexicon: HALOT
  rationale: El verbo hebreo comunica trato abusivo o explotador. "Maltratar" abarca ese abuso sin duplicar exactamente "oprimir" en la primera cláusula.
- source_word: הַגֵּר
  english_pob_choice: the foreigner
  chosen_spanish: al extranjero
  alternatives_spanish:
  - al forastero
  - al residente forastero
  - al forastero residente
  lexicon: HALOT
  rationale: '"Extranjero" comunica bien en español moderno la idea de una persona no nativa que vive entre el pueblo; se evita "forastero" por sonar más regional o menos preciso en este contexto.'
- source_word: עָשְׁקוּ
  english_pob_choice: have oppressed
  chosen_spanish: han oprimido
  alternatives_spanish:
  - han explotado
  - han extorsionado
  lexicon: HALOT
  rationale: Se conserva la fuerza verbal de עָשַׁק con el mismo núcleo semántico de opresión que en la primera mitad del versículo, como hace la traducción inglesa en la segunda ocurrencia.
- source_word: בְּלֹא מִשְׁפָּט
  english_pob_choice: without justice
  chosen_spanish: sin justicia
  alternatives_spanish:
  - sin derecho
  - sin debido juicio
  - injustamente
  lexicon: HALOT
  rationale: '"Sin justicia" preserva el peso sustantivo de מִשְׁפָּט y evita reducirlo a un adverbio más débil. Mantiene la dimensión legal y moral del término.'
theological_decisions:
- issue: Tratamiento del extranjero (גֵּר)
  english_pob_reading: foreign-born person residing among the people; footnote offers sojourner/resident alien.
  chosen_spanish_reading: extranjero residente entre el pueblo, indicado en nota como alternativa interpretativa.
  alternative_spanish_readings:
  - forastero
  - residente forastero
  - forastero residente
  rationale: El POB inglés eligió "foreigner" para claridad moderna y añadió una nota sobre el matiz de residente no nativo. En español, "extranjero" es claro y la nota preserva el trasfondo semántico sin imponer una terminología más técnica.
  doctrine_reference: Éxodo 22:21; Levítico 19:33-34; Deuteronomio 24:14-22
- issue: Condena profética de injusticia social
  english_pob_reading: Retain concrete categories of injustice without softening them into generic wrongdoing.
  chosen_spanish_reading: Mantener categorías concretas de opresión, robo, maltrato e injusticia.
  alternative_spanish_readings:
  - maldad general
  - conducta injusta
  - pecado social
  rationale: El versículo enumera abusos específicos. La redacción española conserva esa concreción covenantal y no la diluye en lenguaje moral genérico.
  doctrine_reference: Isaías 1:17; Miqueas 2:1-2; Amós 5:11-12
translation_notes:
  revision_awareness: Se siguió el rastro auditado de la versión inglesa POB, manteniendo sus decisiones léxicas clave y su nota sobre גֵּר. No hubo revisiones aplicadas en el paquete fuente, así que la redacción española refleja directamente el estado más reciente aprobado.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como término del proyecto, pero este versículo no lo contiene.
  - Se mantuvo una alternancia útil entre «oprimido/opresión» y «maltratado» para evitar redundancia y reflejar las dos ocurrencias de עָשַׁק con matices distintos.
  - Se evitó "siervo" o "extranjero residente" en el texto principal para no introducir tecnicismos innecesarios en la lectura pública.
