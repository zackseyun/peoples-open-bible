translation:
  language: es
  text: Y la trilla alcanzará la vendimia[a], y la vendimia alcanzará la siembra; comerán su pan hasta saciarse y habitarán con seguridad en su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «La trilla sobrepasará la vendimia, y la vendimia sobrepasará la siembra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשִּׂיג
  english_pob_choice: will reach to / will overtake
  chosen_spanish: alcanzará
  alternatives_spanish:
  - sobrepasará
  - llegará hasta
  lexicon: HALOT
  rationale: El verbo expresa la idea de una estación agrícola que se extiende hasta alcanzar la siguiente. «Alcanzará» conserva la imagen de alcance/continuidad sin forzar una paráfrasis explicativa excesiva.
- source_word: דַּיִשׁ
  english_pob_choice: threshing
  chosen_spanish: el trillar
  alternatives_spanish:
  - la trilla
  - la temporada de trilla
  lexicon: HALOT
  rationale: En español, «trillar» como sustantivación verbal mantiene el proceso/tiempo de la trilla de forma breve y natural. «Trilla» también sería posible, pero «el trillar» conserva mejor el valor de proceso.
- source_word: בָּצִיר
  english_pob_choice: grape harvest
  chosen_spanish: la vendimia
  alternatives_spanish:
  - la cosecha de uvas
  - la recolección de uvas
  lexicon: HALOT
  rationale: «Vendimia» es el término español preciso para la cosecha de uvas y preserva la secuencia agrícola concreta del texto.
- source_word: זָרַע
  english_pob_choice: sowing
  chosen_spanish: la siembra
  alternatives_spanish:
  - la sementera
  - la siembra de la semilla
  lexicon: HALOT
  rationale: El sustantivo designa el tiempo de sembrar; «siembra» comunica con claridad esa etapa agrícola en español actual.
- source_word: לַחְמְכֶם
  english_pob_choice: your bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su comida
  lexicon: HALOT
  rationale: Se conserva «pan» por su valor concreto y covenantal; en español bíblico sigue funcionando como metonimia de alimento sin perder claridad.
- source_word: לָשֹׂבַע
  english_pob_choice: to the full
  chosen_spanish: hasta saciarse
  alternatives_spanish:
  - hasta llenarse
  - en abundancia
  lexicon: HALOT
  rationale: «Hasta saciarse» expresa el matiz de satisfacción/plenitud del comer. Es más natural que un calco como «hasta lo lleno» y no pierde el sentido de abundancia suficiente.
- source_word: וִישַׁבְתֶּם
  english_pob_choice: dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - vivirán
  - morarán
  lexicon: HALOT
  rationale: «Habitar» conserva el tono formal y la resonancia territorial del pacto. «Vivirán» sería más común, pero menos preciso para el contexto de residencia estable en la tierra.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en paz
  lexicon: HALOT
  rationale: La expresión comunica la ausencia de amenaza o temor. «Con seguridad» es natural en español y evita ambigüedad con «seguramente» como adverbio epistémico.
- source_word: בְּאַרְצְכֶם
  english_pob_choice: in your land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en la tierra de ustedes
  - en su país
  lexicon: HALOT
  rationale: «Tierra» preserva el término pactual y su peso teológico. Se usa «su» en lugar de «vuestra/ vuestra tierra» para un registro bíblico neutral y ampliamente comprensible.
theological_decisions:
- issue: 'Promesa de bendición pactual concreta: ciclos agrícolas, alimento y seguridad en la tierra'
  english_pob_reading: Retain concrete agricultural and land terminology without spiritualizing
  chosen_spanish_reading: Mantener el lenguaje agrícola y territorial concreto sin espiritualizarlo
  alternative_spanish_readings:
  - generalizar como prosperidad material
  - reinterpretar la tierra de forma simbólica
  rationale: 'La estructura del verso promete bendición tangible: continuidad de cosechas, comida suficiente y residencia segura. La traducción evita convertirlo en una afirmación abstracta de prosperidad y conserva el carácter histórico-pactual del texto.'
  doctrine_reference: Principios de traducción POB §§1, 5
- issue: Tensión semántica de los verbos de alcance agrícola
  english_pob_reading: will reach to / more literally, 'will overtake'
  chosen_spanish_reading: alcanzará
  alternative_spanish_readings:
  - sobrepasará
  - se impondrá sobre
  rationale: El hebreo usa un verbo de alcance que puede leerse como «alcanzar» u «sobrepasar». En español, «alcanzará» preserva la tensión sin decidir innecesariamente entre una lectura más literal y una más idiomática.
  doctrine_reference: HALOT; notas de equivalencia óptima POB
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente al preferir un verbo de alcance directo («alcanzará») y una clausula final formal de residencia segura («habitarán con seguridad») en vez de expandir el sentido a una duración más interpretativa. También se conserva el orden agrícola del hebreo: trilla → vendimia → siembra → pan suficiente → residencia segura en la tierra.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no hay nombre divino explícito.
  - Se prefirió «tierra» para בְּאַרְצְכֶם por su valor pactual, no «país» o «territorio».
  - «Pan» se conserva como metonimia bíblica de alimento, coherente con el uso POB.
  - La alternancia verbal («trillar», «vendimia», «siembra») preserva la secuencia agrícola sin nivelarla en un término genérico de cosecha.
