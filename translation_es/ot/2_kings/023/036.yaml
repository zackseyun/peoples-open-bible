  to: Joacim tenía veinticinco años cuando comenzó a reinar[a], y reinó once años en Jerusalén. El nombre de su madre era Zebidá, hija de Pedaías[b], de Rumah.
  rationale: Se mantiene la estructura y el sentido del borrador, pero se corrigen nombres propios para mayor fidelidad al hebreo y al audit trail del POB, y se pule la nota literal para que el español siga siendo claro sin perder el matiz formal.
