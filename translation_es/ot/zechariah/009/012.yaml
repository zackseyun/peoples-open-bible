review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: imperativo plural de retorno, imagen de lugar fortificado, metáfora de los cautivos/prisioneros ligados a la esperanza, inmediatez temporal y promesa de restauración doble. Sin embargo, añade demasiadas notas frente al rastro auditado en inglés y desplaza los anclajes de las alternativas: en la POB inglesa sólo se preservan dos notas significativas, una sobre la metáfora de אֲסִירֵי הַתִּקְוָה y otra sobre מִשְׁנֶה/אָשִׁיב לָךְ. Además, «presos de esperanza» es comprensible pero menos fiel léxica y estilísticamente que «prisioneros de esperanza», que conserva mejor la fuerza metafórica documentada.'
  spanish_quality_summary: El español es legible, pero «Volved» suena peninsular y menos neutral para el objetivo latinoamericano; «Vuelvan» encaja mejor con el estilo pedido. «A la fortaleza» y «aun hoy declaro» son naturales. «Te devolveré el doble» es entendible, pero «te restauraré el doble» se alinea mejor con la decisión restitutiva de la POB y evita un matiz demasiado cotidiano de devolución.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. La principal cuestión es de fidelidad léxica interna: mantener la metáfora fuerte de «prisioneros de esperanza» y la idea de restauración en אָשִׁיב. También conviene no multiplicar notas no sustentadas por el audit trail cuando no son necesarias para el español.'
  issues:
  - severity: medium
    issue: Registro verbal «Volved»
    rationale: Aunque fiel, es más propio del español peninsular; para español neutro latinoamericano conviene «Vuelvan».
  - severity: medium
    issue: «Presos de esperanza» debilita la elección lexical auditada
    rationale: La POB inglesa destacó «prisoners of hope» como metáfora marcada. «Prisioneros de esperanza» reproduce mejor esa fuerza que «presos de esperanza».
  - severity: medium
    issue: Exceso y mala distribución de notas al pie
    rationale: El borrador crea cinco notas donde el audit trail inglés sólo preserva dos alternativas significativas. Esto sobrecarga el verso y no sigue bien la disciplina de notas.
  - severity: low
    issue: «Te devolveré el doble» puede sonar demasiado coloquial/transaccional
    rationale: «Te restauraré el doble» conserva mejor la noción de reversión/restauración abundante documentada por la POB, aunque «devolveré» no es incorrecto.
  revised_spanish_text: Vuelvan a la fortaleza, prisioneros de esperanza[a]; aun hoy declaro que te restauraré el doble[b].
