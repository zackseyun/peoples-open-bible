translation:
  language: es
  text: Mis tiempos están en tu mano[a]; líbrame de la mano de mis enemigos y de mis perseguidores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “mis tiempos señalados” o “mis circunstancias”. El hebreo “mis tiempos” puede referirse en sentido amplio a las temporadas y eventos de la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - bajo tu control
  lexicon: HALOT
  rationale: Conservo la metáfora hebrea de la “mano” como ámbito de autoridad y control. En español, “en tu mano” es natural, bíblico y mantiene el paralelismo con “de la mano de” en la segunda mitad del verso.
- source_word: עִתֹּתַי
  english_pob_choice: my times
  chosen_spanish: mis tiempos
  alternatives_spanish:
  - mis tiempos señalados
  - mis circunstancias
  - mi destino
  lexicon: HALOT
  rationale: “Mis tiempos” reproduce la amplitud poética del hebreo, que puede abarcar temporadas, momentos y circunstancias de la vida. Evita estrechar el sentido a “destino” o a un mero calendario de citas.
- source_word: הַצִּילֵנִי
  english_pob_choice: rescue me
  chosen_spanish: líbrame
  alternatives_spanish:
  - rescátame
  - sálvame
  lexicon: HALOT
  rationale: “Líbrame” comunica liberación concreta del peligro y suena natural en español bíblico sin perder fuerza. “Rescátame” también es posible, pero “líbrame” encaja mejor con la petición de ser apartado de enemigos y perseguidores.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Mantengo la metáfora de la mano para conservar el contraste deliberado con “en tu mano”. Ese paralelismo es importante tanto poética como teológicamente.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  lexicon: HALOT
  rationale: Es la equivalencia directa y clara para el plural de hostilidad personal presente en el hebreo.
- source_word: וּמֵרֹדְפָי
  english_pob_choice: and from my pursuers
  chosen_spanish: y de mis perseguidores
  alternatives_spanish:
  - y de los que me persiguen
  - y de mis acosadores
  lexicon: HALOT
  rationale: “Perseguidores” conserva la imagen concreta del hebreo participial sin pasar a un término más abstracto o institucional como “perseguidores” en sentido penal o teológico. En español suena natural y mantiene el movimiento del verso.
theological_decisions:
- issue: Alcance de “mis tiempos”
  english_pob_reading: A broad reference to the psalmist's life seasons and circumstances under God's sovereign control
  chosen_spanish_reading: Una referencia amplia a las etapas, momentos y circunstancias de la vida del salmista bajo el control soberano de Dios
  alternative_spanish_readings:
  - mi destino
  - mis tiempos señalados solamente
  - mis circunstancias solamente
  rationale: La expresión española conserva la amplitud del hebreo sin resolverla en una sola idea. Así se mantiene la tensión entre tiempos señalados, temporadas vitales y circunstancias presentes, tal como lo permite el original.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo: conserva la metáfora de la mano en ambas mitades del verso, mantiene la amplitud semántica de עִתֹּתַי con una nota de alternativa, y evita estrechar la petición de salvación a un matiz más abstracto que el del peligro inmediato.'
  spanish_consistency_notes:
  - Se prefirió “en tu mano” y “de la mano de” para preservar la simetría del verso.
  - “Mis tiempos” se deja abierto con nota, siguiendo la decisión inglesa de no fijar el sentido en una sola opción.
  - “Líbrame” traduce la acción concreta de הַצִּילֵנִי sin perder naturalidad en español.
  - No se introduce “SEÑOR” ni “Cristo”; el verso no contiene esos términos.
