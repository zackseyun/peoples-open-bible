translation:
  language: es
  text: No le falta[a] ningún entendimiento, y ninguna cosa[b] se le ha escapado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «No le falta ningún entendimiento»; paralelo griego: «Ningún pensamiento pasó de largo ante él». Ambos testigos afirman que nada escapa al conocimiento de Dios, aunque usan formulaciones algo distintas.'
    reason: alternative_reading
  - marker: b
    text: El hebreo puede entenderse en sentido amplio como «cosa», «asunto» o «materia»; el paralelo griego dice «ni una sola palabra». La traducción mantiene la amplitud del hebreo en el texto principal y deja constancia de la formulación más específica del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: לא נעדר ממנו כל שכל
  english_pob_choice: No understanding is lacking to him
  chosen_spanish: No le falta ningún entendimiento
  alternatives_spanish:
  - No le falta inteligencia
  - No le falta discernimiento
  - No está ausente de él ningún entendimiento
  lexicon: HALOT
  rationale: נעדר ממנו expresa ausencia o carencia en relación con Dios. «No le falta» conserva la idea de que nada de esta clase está ausente de su conocimiento. «Entendimiento» representa שכל con naturalidad en español y mantiene el valor cognitivo general del hebreo y del paralelo griego.
- source_word: כל שכל
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - inteligencia
  - discernimiento
  - pensamiento
  lexicon: HALOT
  rationale: שכל puede abarcar entendimiento, inteligencia o discernimiento. «Entendimiento» es la opción más sobria y fiel al contexto de omnisciencia, sin estrechar innecesariamente el sentido.
- source_word: ולא חלפו כל דבר
  english_pob_choice: no thing has escaped him
  chosen_spanish: ningún asunto se ha ocultado de él
  alternatives_spanish:
  - nada se ha ocultado de él
  - ninguna cosa se le ha escapado
  - ningún asunto ha pasado de él
  lexicon: HALOT
  rationale: דבר puede significar cosa, asunto, materia o palabra. Dado que el hebreo y el griego convergen en la idea de que nada queda fuera del alcance divino, «asunto» conserva amplitud semántica sin forzar una lectura demasiado específica. «Se ha ocultado de él» refleja el paralelo griego οὐκ ἐκρύβη ἀπ' αὐτοῦ, «no fue escondido de él».
- source_word: οὐδὲ εἷς λόγος
  english_pob_choice: no thing / no word
  chosen_spanish: ningún asunto
  alternatives_spanish:
  - ni una sola palabra
  - ni una sola cosa
  - ningún dicho
  lexicon: LSJ
  rationale: El griego añade la especificación «ni una sola palabra», mientras que el hebreo usa דבר con mayor amplitud. En español, «asunto» permite mantener la amplitud del hebreo sin perder de vista que el punto es la total ausencia de cualquier dato o contenido fuera de su alcance. Se conserva así la tensión entre los dos testigos sin introducir una especificación que el texto hebreo no exige.
theological_decisions:
- issue: Omnisciencia divina
  english_pob_reading: The verse affirms that no understanding is lacking to God and that no thing escapes him.
  chosen_spanish_reading: El versículo afirma que no le falta ningún entendimiento y que ningún asunto se oculta de él.
  alternative_spanish_readings:
  - No le falta ningún entendimiento, y nada se le escapa.
  - No le falta discernimiento, y ni una sola palabra se oculta de él.
  rationale: La formulación española conserva la afirmación de omnisciencia sin borrar la diferencia entre el hebreo, que habla de «entendimiento» y «asunto», y el griego, que intensifica la segunda cola hacia «palabra». La traducción evita resolver la tensión imponiendo solo uno de los testigos.
  doctrine_reference: Sabiduría divina / omnisciencia
- issue: Relación entre hebreo y griego en la segunda cola
  english_pob_reading: The Hebrew broad sense is preserved, while the Greek can clarify the specificity of 'word'.
  chosen_spanish_reading: «asunto» mantiene el alcance amplio del hebreo, con la nota de que el griego habla de «palabra».
  alternative_spanish_readings:
  - «palabra» siguiendo más de cerca el griego
  - «cosa» siguiendo más de cerca el hebreo
  rationale: El POB inglés revisó la segunda cola entre «word» y «thing» para balancear ambos testigos. En español, «asunto» funciona como término intermedio y respetuoso de esa tensión textual, mientras la nota preserva la variante griega.
  doctrine_reference: Crítica textual / concordancia de testigos
translation_notes:
  revision_awareness: Tomo en cuenta la revisión inglesa que movió la segunda cola de «word» a «thing» para reflejar más naturalmente דבר, pero en español opté por «asunto» como solución intermedia que conserva la amplitud del hebreo y, a la vez, evita una formulación demasiado genérica. También mantengo visible la tensión con el griego mediante la nota.
  spanish_consistency_notes:
  - Usé «entendimiento» para שכל, en línea con el valor cognitivo principal del hebreo.
  - Preferí «se oculta de él» para reflejar el pasivo griego y el sentido de que nada queda fuera de su conocimiento.
  - Evité «SEÑOR» u otra sustitución reverencial, porque el versículo no contiene el nombre divino explícitamente.
  - Mantuve un registro sobrio y bíblico, pero con español natural para lectura pública.
