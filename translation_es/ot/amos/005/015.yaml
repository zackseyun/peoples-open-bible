review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura imperativa del hebreo, el contraste ético 'mal/bien', la referencia judicial de 'la puerta', el nombre divino 'Yahvé' y 'el remanente de José'. Sin embargo, יֶחֱנַן ('será benigno / mostrará gracia / será propicio') no queda del todo fiel con 'tendrá compasión', que desplaza el foco de gracia/favor a misericordia/compasión. Además, 'Dios de los ejércitos' es posible en español bíblico, pero el proyecto privilegia el título equivalente a 'God of hosts', y 'de los ejércitos' puede sonar más estrechamente militar que el hebreo צְבָאוֹת.
  spanish_quality_summary: 'El español es comprensible, pero usa formas peninsulares arcaizantes (''odiad'', ''amad'', ''estableced'') que chocan con la guía de español neutral latinoamericano y de lectura eclesial amplia. Conviene reformular con imperativos naturales de segunda persona plural de valor general (''Odien... amen... establezcan'') sin perder dignidad. Las notas son útiles, pero la nota b está mal formulada tipográficamente (''O: «en la puerta»'') y además repite exactamente la lectura principal en vez de ofrecer la alternativa documentada ''a la puerta''.'
  glossary_alignment: Alinea correctamente יְהוָה -> 'Yahvé', מִשְׁפָּט -> 'justicia', שְׁאֵרִית -> 'remanente', and יוֹסֵף -> 'José'. Requiere ajuste en אֱלֹהֵי צְבָאוֹת hacia 'Dios de los Ejércitos' o preferiblemente 'Dios de las huestes' para reflejar mejor 'hosts'; y en יֶחֱנַן hacia 'será propicio' o 'mostrará su favor/gracia' para seguir la decisión auditada 'will be gracious'.
  issues:
  - severity: medium
    issue: Registro verbal poco natural para español neutral
    rationale: Las formas 'odiad', 'amad', 'estableced' suenan marcadamente peninsulares/arcaizantes y no encajan bien con el objetivo de español neutral latinoamericano.
  - severity: high
    issue: יֶחֱנַן traducido como 'tendrá compasión'
    rationale: חנן en este contexto apunta a gracia/favor inmerecido; 'compasión' introduce otro matiz semántico y se aparta de la decisión auditada 'will be gracious'.
  - severity: medium
    issue: Título divino 'Dios de los ejércitos' puede estrechar צְבָאוֹת
    rationale: '''Ejércitos'' es tradicional, pero ''hosts'' tiene amplitud mayor. En español bíblico, ''Dios de las huestes'' o ''Dios de los Ejércitos'' con mayúscula son opciones mejores; la primera refleja mejor la amplitud semántica.'
  - severity: low
    issue: Nota b no presenta correctamente la alternativa
    rationale: 'Dice ''O: «en la puerta»'', que repite la lectura principal; debería reflejar la alternativa documentada ''O "a la puerta"'' o equivalente.'
  revised_spanish_text: Odien el mal[a] y amen el bien; establezcan la justicia en la puerta. Quizá Yahvé, Dios de las huestes[c][b], sea propicio al remanente de José.
  revised_footnotes:
