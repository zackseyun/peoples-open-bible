translation:
  language: es
  text: Y el cerdo[a], porque tiene la pezuña dividida pero no rumia[b], es inmundo para ustedes. No comerán nada de su carne, ni tocarán su cadáver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el puerco'.
    reason: lexical_alternative
  - marker: b
    text: O 'no mastica el bolo alimenticio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזִיר
  english_pob_choice: the pig
  chosen_spanish: el cerdo
  alternatives_spanish:
  - el puerco
  - el verraco
  - el jabalí
  lexicon: HALOT
  rationale: El hebreo nombra al animal doméstico conocido como cerdo; en español, 'cerdo' es claro, natural y suficientemente preciso. 'Puerco' sería posible, pero 'cerdo' es más neutral y ampliamente inteligible.
- source_word: מַפְרִיס פַּרְסָה
  english_pob_choice: has a split hoof
  chosen_spanish: tiene la pezuña dividida
  alternatives_spanish:
  - tiene la pezuña partida
  - parte la pezuña
  - divide la pezuña
  lexicon: HALOT
  rationale: La imagen idiomática describe una pezuña dividida. 'Tiene la pezuña dividida' comunica la condición zoológica con naturalidad en español sin perder el rasgo legal del texto.
- source_word: גֵרָה
  english_pob_choice: chew the cud
  chosen_spanish: rumia
  alternatives_spanish:
  - masca el bolo
  - mastica el bolo alimenticio
  - rumia el alimento
  lexicon: HALOT
  rationale: En español, el verbo 'rumiar' reproduce bien la acción técnica y concisa del criterio dietético. 'Rumiar' es más breve y más natural que una paráfrasis explicativa.
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - inmundo ritualmente
  - ritualmente impuro
  lexicon: HALOT
  rationale: En español contemporáneo, 'impuro' puede sonar más natural que 'inmundo', pero mantiene la categoría ritual/legal sin llevarla a una acusación moral. Se conserva la tensión entre pureza ritual y estado cultual, sin convertirla en pecado moral.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ustedes mismos
  lexicon: HALOT
  rationale: '''Para ustedes'' expresa la aplicabilidad comunitaria de la prohibición en español latinoamericano neutral. Mantiene la orientación al pueblo destinatario.'
- source_word: מִבְּשָׂרָם
  english_pob_choice: any of its flesh
  chosen_spanish: nada de su carne
  alternatives_spanish:
  - de su carne
  - ninguna de su carne
  - ninguna parte de su carne
  lexicon: HALOT
  rationale: El partitivo hebreo permite expresar la prohibición de comer cualquier porción. 'Nada de su carne' es fluido y conserva el sentido prohibitivo; 'carne' mantiene la concreción material del hebreo mejor que 'carne' como simple 'carne' alimentaria.
- source_word: נִבְלָתָם
  english_pob_choice: its carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su carroña
  - su carcasa
  - su cadáver animal
  lexicon: HALOT
  rationale: '''Nivláh'' designa el cuerpo muerto de un animal. ''Cadáver'' es comprensible y directo en español; evita suavizar la prohibición y preserva la referencia a un cuerpo muerto no apto para contacto.'
- source_word: תִגָּעוּ
  english_pob_choice: touch
  chosen_spanish: tocar
  alternatives_spanish:
  - palpar
  - manipular
  - entrar en contacto con
  lexicon: HALOT
  rationale: El verbo básico 'tocar' reproduce el mandato de forma directa y precisa. No se amplía ni se debilita la prohibición.
theological_decisions:
- issue: Estado ritual de lo impuro en la ley alimentaria
  english_pob_reading: Render טָמֵא as 'unclean' without importing later theological interpretation.
  chosen_spanish_reading: Traducir טָמֵא como 'impuro' sin convertir la categoría ritual en una afirmación moral.
  alternative_spanish_readings:
  - inmundo
  - ritualmente impuro
  - contaminado
  rationale: La frase describe una condición legal/cultual dentro de la Torá. 'Impuro' conserva el valor ritual y evita sobrecargar el texto con connotaciones morales posteriores.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de la prohibición sobre tocar el cadáver
  english_pob_reading: Translate as a direct prohibition ('You shall not touch') rather than softening it.
  chosen_spanish_reading: 'Mantener una prohibición directa: ''ni tocarán su cadáver''.'
  alternative_spanish_readings:
  - ni manipularán su cadáver
  - ni se acercarán a su cadáver
  - ni lo tocarán
  rationale: El hebreo usa una prohibición simple y directa. 'Tocar' preserva esa fuerza sin expandir el mandato.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El inglés POB revisó el posesivo plural de una versión anterior para ajustarlo al singular hebreo de la referencia al cerdo; en español se mantuvo esa concordancia singular con 'su carne' y 'su cadáver'. También se conservó la lectura legal de טָמֵא como una condición ritual, evitando una moralización del término.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero esta unidad no contiene el Tetragrámaton.
  - Se prefirió 'cerdo' sobre 'puerco' por claridad moderna, con nota alternativa preservada.
  - '''Impuro'' se usa como equivalente funcional de טָמֵא en contexto ritual.'
  - La prohibición sobre el contacto se tradujo de forma directa con 'tocar', sin ampliar el alcance del verbo.
