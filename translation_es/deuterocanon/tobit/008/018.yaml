translation:
  language: es
  text: Entonces ordenó a los sirvientes que rellenaran la sepultura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden
  lexicon: BDAG
  rationale: El aoristo de κελεύω expresa dar una orden o mandato. «Ordenó» conserva la fuerza autoritativa de manera natural en español y corresponde bien al valor del texto griego y de la versión inglesa auditada.
- source_word: τοῖς οἰκέταις
  english_pob_choice: the servants
  chosen_spanish: los siervos
  alternatives_spanish:
  - los sirvientes
  - los criados
  - los servidores domésticos
  lexicon: BDAG
  rationale: οἰκέτης designa a un servidor de casa, con posible matiz de esclavo doméstico. «Siervos» es una opción idiomática y amplia en español bíblico, sin perder del todo la relación de servicio doméstico; «sirvientes» o «criados» suenan más coloquiales o regionales.
- source_word: χῶσαι
  english_pob_choice: to fill in
  chosen_spanish: rellenaran
  alternatives_spanish:
  - cubrieran con tierra
  - taparan
  - colmaran
  lexicon: LSJ
  rationale: χῶσαι significa echar tierra encima, cubrir o rellenar. Con τὸν τάφον, la acción es cerrar el hueco del sepulcro o fosa; «rellenaran» comunica con precisión la acción física sin introducir una idea distinta de enterramiento.
- source_word: τὸν τάφον
  english_pob_choice: the grave
  chosen_spanish: la tumba
  alternatives_spanish:
  - la fosa
  - el sepulcro
  - la sepultura
  lexicon: BDAG
  rationale: τάφος puede significar grave o tumba. Aquí el contexto pide la cavidad funeraria que se va a volver a cubrir; «tumba» funciona de forma natural en español y mantiene el sentido concreto del lugar de enterramiento.
translation_notes:
  revision_awareness: 'No se requiere revisión adicional: el griego breve y directo coincide con la lectura inglesa auditada, y la traducción española mantiene el mismo contenido sin añadir matices no presentes en la fuente.'
  spanish_consistency_notes:
  - Se mantuvo el orden narrativo simple con «Entonces» para reflejar δὲ de manera natural.
  - Se evitó «SEÑOR» o vocabulario teológico ajeno, porque el versículo no contiene referencias divinas explícitas.
  - «Tumba» se prefirió sobre «sepulcro» por fluidez, aunque ambas son posibles; no se añadió nota porque la diferencia no cambia el sentido básico en este contexto.
