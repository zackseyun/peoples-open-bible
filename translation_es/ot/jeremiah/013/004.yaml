revisions:
- from: Toma el cinturón[a] que compraste, que está sobre tus lomos, y levántate, ve a Perat[b], y escóndelo allí, en la hendidura de la peña.
  to: Toma la faja que compraste, que está en tu cintura, y levántate, ve a Perat[a], y escóndela allí, en la hendidura de la roca.
  rationale: 'Se corrige el anclaje de la nota para que recaiga sobre «Perat», se elimina la nota redundante, y se ajustan varias elecciones léxicas para mayor fidelidad y naturalidad: «faja» por אֵזוֹר, «en tu cintura» por עַל מָתְנֶיךָ y «la roca» por הַסָּלַע. También se concuerda el pronombre con el género de «faja» («escóndela»).'
  reviewer_model: gpt-5.4
