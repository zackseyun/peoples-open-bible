review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: Aarón y sus hijos como sujeto, el lavado de manos y pies, y el tono instructivo con valor directivo/futuro. Sin embargo, «con ella» no preserva con suficiente fidelidad מִמֶּנּוּ («de él/de ello; desde él/ello»), cuyo referente es la fuente o lavatorio. En español, «de él» suena forzado si se aplica directamente al acto de lavar, pero «con agua de él»/«con agua de ella» explicita el sentido contextual ya documentado en la nota inglesa. Dado que el borrador actual usa un pronombre femenino ambiguo que podría referirse al recipiente mismo más que al agua, conviene ajustar el texto principal.'
  spanish_quality_summary: El español es claro y digno en general. «Aarón y sus hijos lavarán sus manos y sus pies» suena natural. No obstante, «con ella» resulta algo ambiguo e incluso ligeramente extraño en contexto, porque el antecedente no aparece en el versículo mismo y el femenino puede entorpecer la lectura. «Con agua de ella» mejora la inteligibilidad sin exceder el contexto inmediato.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Aarón», «hijos», «manos» y «pies» están bien. El punto clave es la preposición de מִמֶּנּוּ: el inglés POB mantuvo «from it» y relegó «with water from it» a nota; en español, por naturalidad y claridad, la explicitación «con agua de ella» es preferible en el texto principal en este caso.'
  issues:
  - severity: medium
    issue: «con ella» no refleja con suficiente precisión מִמֶּנּוּ
    rationale: El hebreo indica procedencia desde el lavatorio/fuente; «con ella» desplaza la idea hacia un instrumento femenino ambiguo. En español, la forma más fiel y clara aquí es explicitar «agua».
  - severity: low
    issue: La nota actual queda desalineada si el texto principal ya usa una formulación instrumental
    rationale: Si se adopta «con agua de ella» en el texto principal, ya no corresponde mantener una nota que ofrezca exactamente esa formulación como alternativa.
  revised_spanish_text: Aarón y sus hijos lavarán sus manos y sus pies con agua de ella.
  revision_rationale: Se revisa únicamente la expresión de מִמֶּנּוּ para preservar mejor el sentido de procedencia y evitar la ambigüedad de «con ella». La explicitación de «agua» está justificada por el contexto inmediato del lavatorio y produce un español más natural y fiel. Al pasar esa explicitación al texto principal, la nota deja de ser necesaria.
