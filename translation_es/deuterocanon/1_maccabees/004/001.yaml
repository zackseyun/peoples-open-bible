translation:
  language: es
  text: Y Gorgias tomó cinco mil hombres y mil de caballería escogida, y el campamento[a] salió de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fuerza salió de noche»; el griego «el campamento» puede referirse colectivamente a las tropas acampadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - tomó consigo
  - asumió el mando de
  lexicon: BDAG
  rationale: En este contexto militar, el verbo expresa que Gorgias reunió o llevó consigo a la fuerza mencionada. «Tomó» es breve y natural en español, y no añade la especificación de mando que el griego no exige de forma explícita.
- source_word: πεντακισχιλίους ἄνδρας
  english_pob_choice: five thousand men
  chosen_spanish: cinco mil hombres
  alternatives_spanish:
  - cinco mil soldados
  lexicon: LSJ
  rationale: ἄνδρας es literalmente «hombres». Aunque el contexto es militar, conservar «hombres» sigue de cerca el original; «soldados» sería más interpretativo.
- source_word: χιλίαν ἵππον ἐκλεκτήν
  english_pob_choice: one thousand chosen horsemen
  chosen_spanish: mil jinetes escogidos
  alternatives_spanish:
  - mil caballería escogida
  - mil jinetes elegidos
  - mil soldados de caballería escogidos
  lexicon: LSJ
  rationale: ἵππον es un singular colectivo que designa caballería o jinetes. «Jinetes escogidos» comunica bien el sentido colectivo y el matiz de ἐκλεκτήν («escogidos») sin sonar forzado en español.
- source_word: ἀπῆρεν
  english_pob_choice: set out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se puso en marcha
  - marchó
  lexicon: BDAG
  rationale: El verbo indica partida o salida. «Salió» funciona de manera natural con el complemento temporal «de noche» y no intensifica más de lo que el texto dice.
- source_word: ἡ παρεμβολή
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la fuerza
  - el ejército acampado
  lexicon: LSJ
  rationale: παρεμβολή significa normalmente «campamento» o «encampamento»; en contexto puede extenderse al grupo acampado. «El campamento» conserva la imagen del griego y evita interpretar demasiado.
- source_word: νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - por la noche
  lexicon: BDAG
  rationale: La construcción genitiva adverbial indica tiempo. «De noche» es una forma idiomática y natural en español, equivalente a «by night».
translation_notes:
  revision_awareness: El texto español sigue la última revisión del inglés POB al reflejar «chosen horsemen» como una expresión más natural y formalmente precisa. Aquí se ha vertido como «jinetes escogidos», manteniendo el valor colectivo de ἵππον ἐκλεκτήν sin imponer un tecnicismo innecesario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» donde corresponda en el proyecto; este versículo no contiene esos términos.
  - Se conserva un registro bíblico claro y sobrio, sin calcos innecesarios.
  - La nota de pie refleja la ambigüedad colectiva de ἡ παρεμβολή, tal como la auditoría inglesa la documenta.
