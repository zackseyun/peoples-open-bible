translation:
  language: es
  text: 'Entonces dijo a Jéter, su primogénito: «Levántate; mátalos». Pero el joven[a] no desenvainó su espada, porque tenía miedo, pues todavía era joven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchacho» o «joven». El hebreo naʿar puede abarcar desde la niñez hasta la adultez joven. Aquí se traduce «joven» porque lleva espada y se le ordena ejecutar a los cautivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la acción; «Entonces» mantiene la secuencia natural en español sin perder el enlace narrativo.
- source_word: לְיֶתֶר
  english_pob_choice: to Jether
  chosen_spanish: a Jéter
  alternatives_spanish:
  - a Yéter
  lexicon: Transliteración propia
  rationale: Se translitera el nombre propio al español. «Jéter» sigue la pronunciación hispanizable más natural y conserva la identidad del personaje.
- source_word: בְּכוֹרוֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo primogénito
  - su hijo mayor
  lexicon: HALOT
  rationale: בכור denota al hijo con primacía de nacimiento; «primogénito» preserva esa fuerza léxica mejor que una paráfrasis como «hijo mayor».
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: HALOT
  rationale: El imperativo de קום se expresa de modo natural y directo con «Levántate», que funciona bien como orden inmediata.
- source_word: הֲרֹג אוֹתָם
  english_pob_choice: kill them
  chosen_spanish: mátalos
  alternatives_spanish:
  - derríbalos
  - mátalos a ellos
  lexicon: HALOT
  rationale: הרג es el verbo común para matar; «mátalos» es la forma más directa y fiel en español, sin atenuación ni arcaísmo.
- source_word: וְלֹא שָׁלַף
  english_pob_choice: But ... did not draw
  chosen_spanish: Pero ... no desenvainó
  alternatives_spanish:
  - Y ... no sacó
  - Pero ... no sacó
  lexicon: HALOT
  rationale: En español, con una espada, «desenvainar» comunica con precisión la acción de sacar la espada de la vaina y evita ambigüedad con «sacar».
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  lexicon: HALOT
  rationale: נער puede abarcar desde muchacho hasta joven adulto; aquí «el joven» mantiene la amplitud semántica y encaja con el contexto del portador de espada.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su arma
  lexicon: HALOT
  rationale: El posesivo se expresa de manera simple y transparente; «espada» es la equivalencia directa de חרב.
- source_word: כִּי יָרֵא
  english_pob_choice: because he was afraid
  chosen_spanish: porque tenía miedo
  alternatives_spanish:
  - porque estaba asustado
  - pues tenía miedo
  lexicon: HALOT
  rationale: El פחד/ירא aquí indica temor; «tenía miedo» es idiomático y claro en español contemporáneo.
- source_word: כִּי עוֹדֶנּוּ נָעַר
  english_pob_choice: for he was still a young man
  chosen_spanish: pues aún era joven
  alternatives_spanish:
  - porque seguía siendo joven
  - pues todavía era un joven
  lexicon: HALOT
  rationale: עוֹדֶנּוּ marca continuidad («aún/todavía»). Repetir «joven» conserva la referencia de נַעַר sin sonar redundante de forma artificial.
translation_notes:
  revision_awareness: 'Se siguió el audio-trail en inglés: se mantuvo la secuencia narrativa de waw consecutivo, se conservó el valor de בכור como «primogénito», y se respetó la ambigüedad amplia de נער con una solución contextual («el joven»). No se adoptaron cambios textuales ni revisiones posteriores; el pasaje muestra alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «espada» para חרב por correspondencia léxica directa y claridad contextual.
  - «Jéter» se presenta con ortografía hispanizada uniforme para nombres propios bíblicos.
