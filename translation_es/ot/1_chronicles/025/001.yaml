translation:
  language: es
  text: 'Y David y los comandantes del ejército apartaron para el servicio a los hijos de Asaf[a], Hemán y Jedutún, que profetizaban con liras, arpas y címbalos; y su número, los hombres para la obra de su servicio[b], fue:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «los profetas con liras, arpas y címbalos». El hebreo puede leerse con «los profetas» en aposición a Asaf, Hemán y Jedutún.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hijos de Asaf, Hemán y Jedutún»; esto puede referirse a sus descendientes o a miembros de su gremio, no solo a hijos inmediatos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְדֵּל
  english_pob_choice: set apart
  chosen_spanish: apartaron
  alternatives_spanish:
  - separaron
  - destinaron
  - designaron
  lexicon: HALOT
  rationale: El hifil de בדל expresa separar o poner aparte. «Apartaron» conserva la acción de distinguir para un fin específico sin introducir una fórmula más administrativa que la del hebreo.
- source_word: שָׂרֵי הַצָּבָא
  english_pob_choice: the commanders of the army
  chosen_spanish: los comandantes del ejército
  alternatives_spanish:
  - los jefes del ejército
  - los oficiales militares
  - los comandantes de la hueste
  lexicon: HALOT
  rationale: שָׂרִים son dirigentes o jefes, y צָבָא normalmente es ejército. En este contexto, aunque participan en la organización del culto, la referencia básica sigue siendo militar, por lo que «comandantes del ejército» es claro y fiel.
- source_word: לַעֲבֹדָה
  english_pob_choice: for the service
  chosen_spanish: para el servicio
  alternatives_spanish:
  - para la obra
  - para el ministerio
  - para el trabajo
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto cultual denota servicio organizado. «Servicio» mantiene el valor técnico sin forzar una terminología eclesiástica posterior.
- source_word: לִבְנֵי אָסָף וְהֵימָן וִידוּתוּן
  english_pob_choice: the sons of Asaph, Heman, and Jeduthun
  chosen_spanish: a los hijos de Asaf, Hemán y Jedutún
  alternatives_spanish:
  - a los descendientes de Asaf, Hemán y Jedutún
  - a la casa de Asaf, Hemán y Jedutún
  lexicon: HALOT
  rationale: בְּנֵי puede significar hijos literales o miembros/descendientes de un linaje o gremio. «Hijos» preserva el giro hebreo; la nota marca la posible amplitud semántica sin resolverla por adelantado.
- source_word: הנביאים
  english_pob_choice: who prophesied
  chosen_spanish: los profetas
  alternatives_spanish:
  - que profetizaban
  - que ejercían profecía
  - los que profetizaban
  lexicon: HALOT
  rationale: 'El hebreo puede leerse en aposición: «los profetas». En español, la aposición nominal es natural y preserva la tensión entre identidad profética y ministerio musical sin convertirlo obligatoriamente en una cláusula verbal.'
- source_word: בְּכִנֹּרוֹת
  english_pob_choice: with lyres
  chosen_spanish: con arpas
  alternatives_spanish:
  - con liras
  - con cítaras
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerda; en español bíblico y moderno, «arpa» es comprensible y tradicionalmente estable, aunque la imagen exacta sea más amplia que el arpa moderna. Se mantiene el contraste con el siguiente instrumento.
- source_word: בִּנְבָלִים
  english_pob_choice: harps
  chosen_spanish: con liras
  alternatives_spanish:
  - con arpas
  - con salterios
  - con instrumentos de cuerda
  lexicon: HALOT
  rationale: נֵבֶל es otro instrumento de cuerda distinto de כִּנּוֹר. Para conservar la distinción terminológica, se usa «liras» aquí, mientras que en כִּנּוֹרוֹת se optó por «arpas» como equivalente más accesible; así se evita colapsar ambos términos en una sola palabra española.
- source_word: וּבִמְצִלְתָּיִם
  english_pob_choice: and cymbals
  chosen_spanish: y címbalos
  alternatives_spanish:
  - con címbalos
  - y platillos
  lexicon: HALOT
  rationale: מְצִלְתַּיִם son címbalos. «Címbalos» es el término español más directo y mantiene la serie instrumental.
- source_word: וַיְהִי מִסְפָּרָם
  english_pob_choice: '''and their number ... was:'''
  chosen_spanish: 'y su número ... fue:'
  alternatives_spanish:
  - 'y el número de ellos fue:'
  - 'y su cuenta fue:'
  - 'y su número era:'
  lexicon: HALOT
  rationale: La cláusula introduce la enumeración de los versículos siguientes. El dos puntos preserva la apertura hacia la lista, como en el audit trail inglés.
- source_word: אַנְשֵׁי מְלָאכָה
  english_pob_choice: the men for the work
  chosen_spanish: los hombres para la obra
  alternatives_spanish:
  - los hombres para el trabajo
  - los hombres de la obra
  - los trabajadores
  lexicon: HALOT
  rationale: מְלָאכָה denota labor o tarea asignada. «Obra» funciona bien en español bíblico para una tarea encomendada y evita sugerir únicamente destreza técnica.
- source_word: לַעֲבֹדָתָם
  english_pob_choice: of their service
  chosen_spanish: de su servicio
  alternatives_spanish:
  - para su servicio
  - en su servicio
  lexicon: HALOT
  rationale: La frase final especifica el ámbito de la labor. «De su servicio» conserva la relación posesiva del hebreo y el matiz cultual de עֲבֹדָה.
theological_decisions:
- issue: Cómo reflejar הַנְּבִיאִים sin borrar la relación entre profecía y música
  english_pob_reading: Rendered as 'who prophesied' to express that Asaph, Heman, and Jeduthun exercised prophetic ministry through music.
  chosen_spanish_reading: «los profetas», manteniendo la aposición nominal y la tensión interpretativa.
  alternative_spanish_readings:
  - que profetizaban
  - que ejercían profecía
  - los que profetizaban
  rationale: 'El hebreo permite leer la expresión en aposición. En español, «los profetas» conserva la ambigüedad documentada: puede ser una identificación de estos líderes o una descripción de su ministerio. Así no se pierde la tensión teológica ni se la resuelve artificialmente.'
  doctrine_reference: Preservar tensión interpretativa; equivalencia óptima
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto (0,95) con observaciones menores. Se mantuvo la estructura de lista y la ambigüedad de «los profetas» sin sobreespecificarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiría; este versículo no contiene el Tetragrámaton.
  - Se evitó «SEÑOR» como sustituto teológico no presente en el hebreo.
  - Se mantuvo el lenguaje cultual con «servicio» y «obra» sin convertirlo en terminología eclesiástica posterior.
  - Se conservó la distinción instrumental mediante dos equivalentes diferentes para כִּנּוֹרוֹת y בִּנְבָלִים, aunque ambos sean instrumentos de cuerda.
