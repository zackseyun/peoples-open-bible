translation:
  language: es
  text: 'Y la banda tejida artísticamente de su efod[a], que está sobre el efod, será de la misma hechura, de una sola pieza con él: oro, azul, púrpura, hilo escarlata[b] y lino fino torcido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la banda de su efod, que está sobre el efod, será de la misma hechura que él; de él será”. El hebreo subraya que la banda no era una pieza aparte, sino integrada al efod en su confección.'
    reason: lexical_alternative
  - marker: b
    text: Los colores “azul, púrpura e hilo escarlata” aluden a materiales textiles teñidos usados en el tabernáculo y en las vestiduras sacerdotales.
    reason: cultural_note
lexical_decisions:
- source_word: חֵשֶׁב
  english_pob_choice: skillfully woven band
  chosen_spanish: banda tejida artísticamente
  alternatives_spanish:
  - banda
  - cinta tejida
  - cinturón tejido
  lexicon: HALOT
  rationale: En contexto sacerdotal, חֵשֶׁב no significa “pensamiento”, sino una pieza textil trabajada para el efod. “Tejida artísticamente” conserva la idea de elaboración cuidadosa sin volver la frase demasiado técnica o dura en español.
- source_word: אֲפֻדָּתוֹ
  english_pob_choice: his ephod
  chosen_spanish: su efod
  alternatives_spanish:
  - su efod sacerdotal
  - su vestidura
  lexicon: HALOT
  rationale: Se mantiene el término técnico “efod”, ya asentado en castellano bíblico, y el posesivo “su” refleja el sufijo pronominal hebreo.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: which is on it
  chosen_spanish: que está sobre él
  alternatives_spanish:
  - que va sobre él
  - que está sobre ello
  lexicon: HALOT
  rationale: El antecedente inmediato es el efod; “sobre él” conserva la relación espacial del hebreo sin forzar una paráfrasis explicativa.
- source_word: כְּמַעֲשֵׂהוּ
  english_pob_choice: like its workmanship
  chosen_spanish: de la misma hechura
  alternatives_spanish:
  - según su hechura
  - como su hechura
  - de la misma obra
  lexicon: HALOT
  rationale: La frase expresa correspondencia de manufactura. “De la misma hechura” transmite la idea de conformidad en la elaboración y evita perder el matiz que el inglés POB recuperó explícitamente en la revisión.
- source_word: מִמֶּנּוּ יִהְיֶה
  english_pob_choice: shall be of one piece with it
  chosen_spanish: de una sola pieza con él
  alternatives_spanish:
  - será parte de él
  - saldrá de él
  - será hecho con él
  lexicon: HALOT
  rationale: El hebreo apunta a una unión integral, no a una pieza separada añadida después. “De una sola pieza con él” comunica esa unidad material y funcional.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: Término material directo; “oro” es la equivalencia natural y fiel en español.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul
  - azul celeste
  lexicon: HALOT
  rationale: En las listas de materiales del tabernáculo, el término de color se traduce de forma simple. “Azul” es claro y no añade precisiones no sustentadas por el texto.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura
  lexicon: HALOT
  rationale: “Púrpura” preserva el color/dye de tradición tabernacular y mantiene mejor el registro bíblico que un color moderno más amplio como “morado”.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - hilo escarlata
  - lana escarlata
  - escarlata
  lexicon: HALOT
  rationale: El hebreo designa material teñido de rojo intenso; como el español exige decidir entre color y soporte textil, se opta por “escarlata” en la línea principal para no añadir un sustantivo (“hilo” o “lana”) que el hebreo no explicita aquí. La lista de materiales ya hace evidente el ámbito textil.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino fino trenzado
  - lino fino torcido
  lexicon: HALOT
  rationale: שֵׁשׁ es lino fino y מָשְׁזָר indica torsión del hilo. “Lino fino torcido” conserva ambos componentes con un español sobrio y comprensible.
translation_notes:
  revision_awareness: 'La revisión inglesa restauró explícitamente la idea de כְּמַעֲשֵׂהוּ (“like its workmanship”) y mantuvo la unidad integral expresada por מִמֶּנּוּ יִהְיֶה. La versión española refleja ambas decisiones: “de la misma hechura” y “de una sola pieza con él”.'
  spanish_consistency_notes:
  - Se conserva “efod” como tecnicismo estable.
  - Se evita “SEÑOR” u otras sustituciones para el nombre divino porque este versículo no lo contiene.
  - Se traduce la serie de materiales con registro bíblico claro y sin añadir “yarn” o “hilo” donde el español no lo exige en la línea principal.
  - La puntuación con dos puntos mantiene la enumeración de materiales como cierre explicativo del versículo.
