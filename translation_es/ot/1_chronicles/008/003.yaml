lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: had
  chosen_spanish: tuvo
  alternatives_spanish:
  - había
  - fueron
  lexicon: HALOT
  rationale: La construcción genealógica hebrea ‘y hubo / y fueron’ se vierte de forma natural en español como ‘tuvo hijos’, manteniendo el sentido de descendencia directa sin calco pesado.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  lexicon: HALOT
  rationale: En genealogías, בָנִים se refiere a los hijos varones; en español, ‘hijos’ comunica bien la relación familiar y evita una redundancia artificial, ya que los nombres propios muestran que se trata de varones.
- source_word: לְבָלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estable en español, sin traducirlo.
- source_word: אַדָּר
  english_pob_choice: Addar
  chosen_spanish: Addar
  alternatives_spanish:
  - Adar
  lexicon: nombre propio
  rationale: Se conserva la forma que refleja mejor la duplicación consonántica del hebreo, siguiendo la decisión inglesa de preferir ‘Addar’; ‘Adar’ queda como variante posible.
- source_word: וְגֵרָא
  english_pob_choice: Gera
  chosen_spanish: Gera
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar y reconocible en español.
- source_word: וַאֲבִיהוּד
  english_pob_choice: Abihud
  chosen_spanish: Abihud
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar y reconocible en español.
