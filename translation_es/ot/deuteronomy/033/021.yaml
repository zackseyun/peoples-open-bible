    text: Or 'the portion of the lawgiver was reserved.' The Hebrew term can mean 'ruler' or 'lawgiver,' and some take it as a reference to Moses.
    reason: alternative_reading
  - marker: b
    text: Or 'the justice of the LORD' or 'the righteous acts of the LORD.'
    reason: lexical_alternative
