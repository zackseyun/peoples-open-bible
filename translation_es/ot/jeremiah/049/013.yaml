translation:
  language: es
  text: Pues por mí mismo[a] he jurado —declara Yahvé— que Bosrá se convertirá en un horror, en oprobio, en desolación y en maldición[b], y todas sus ciudades serán ruinas perpetuas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mí»; el hebreo expresa el juramento divino con una fórmula idiomática de autojuramento.
    reason: lexical_alternative
  - marker: b
    text: O «en objeto de maldición»; el hebreo puede enfatizar que la ciudad llega a ser una fórmula usada en maldiciones.
    reason: lexical_alternative
  - marker: c
    text: O «ruinas para siempre»; la expresión hebrea transmite ruinas que perduran indefinidamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִי
  english_pob_choice: by myself
  chosen_spanish: por mí mismo
  alternatives_spanish:
  - por mí
  - por mi propia persona
  lexicon: HALOT
  rationale: La expresión hebrea con ב y sufijo de 1ª persona sigue el modismo de jurar en referencia a uno mismo. «Por mí mismo» transmite de manera natural en español la solemnidad y la autosuficiencia del juramento.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I have sworn
  chosen_spanish: he jurado
  alternatives_spanish:
  - juré
  - he prometido bajo juramento
  lexicon: HALOT
  rationale: El perfecto expresa un juramento ya pronunciado con fuerza vigente en el contexto profético. «He jurado» conserva mejor ese peso que un simple pasado narrativo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con el nombre divino según el criterio del proyecto. «Declara» es la equivalencia idiomática clara y digna para נְאֻם.
- source_word: לְשַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - una desolación
  - un espanto
  lexicon: HALOT
  rationale: El término apunta a algo tan devastado que produce asombro atónito. «Horror» conserva tanto la ruina como la reacción de espanto que la ruina provoca.
- source_word: לְחֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - vergüenza
  - deshonra
  lexicon: HALOT
  rationale: «Oprobio» preserva el registro de vergüenza pública y deshonra colectiva sin sonar demasiado moderno ni demasiado eclesiástico. Es una opción muy cercana a «reproach» en este contexto judicial.
- source_word: לְחֹרֶב
  english_pob_choice: a waste
  chosen_spanish: desolación
  alternatives_spanish:
  - ruina
  - yermo
  - desierto
  lexicon: HALOT
  rationale: Dado que el inglés revisó este término para distinguirlo del plural final «ruins», en español «desolación» comunica mejor la condición de devastación del lugar sin confundirlo con las ruinas finales.
- source_word: וְלִקְלָלָה
  english_pob_choice: and a curse
  chosen_spanish: y en maldición
  alternatives_spanish:
  - y maldición
  - y objeto de maldición
  lexicon: HALOT
  rationale: «Maldición» mantiene la fuerza del sustantivo hebreo y permite captar el valor de algo convertido en fórmula de maldecir. El complemento «en» conserva la idea resultativa de devenir en tal condición.
- source_word: תִּהְיֶה בָצְרָה
  english_pob_choice: Bozrah will become
  chosen_spanish: Bosrá se convertirá
  alternatives_spanish:
  - Bosrá será
  - Bosrá llegará a ser
  lexicon: HALOT
  rationale: «Se convertirá» expresa bien el cambio de estado implicado por היה con predicados nominales. El topónimo se adapta como «Bosrá» para seguir la transliteración habitual en español bíblico de este nombre.
- source_word: וְכָל עָרֶיהָ
  english_pob_choice: and all her cities
  chosen_spanish: y todas sus ciudades
  alternatives_spanish:
  - y todas las ciudades de ella
  - y todas sus poblaciones
  lexicon: HALOT
  rationale: El sufijo femenino remite a la ciudad principal, pero en español «sus ciudades» comunica con naturalidad la relación posesiva y la referencia colectiva.
- source_word: לְחָרְבוֹת עוֹלָם
  english_pob_choice: everlasting ruins
  chosen_spanish: ruinas perpetuas
  alternatives_spanish:
  - ruinas eternas
  - ruinas para siempre
  lexicon: HALOT
  rationale: «Perpetuas» reproduce la fuerza durativa de עוֹלָם sin sonar excesivamente absoluta en un español bíblico de lectura fluida. Mantiene el matiz de permanencia indefinida que el hebreo exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se preserva el nombre del pacto como «Yahvé» en vez de ocultarlo detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz entre שַׁמָּה, חֶרְפָּה, חֹרֶב y קְלָלָה
  english_pob_reading: horror, reproach, waste, curse
  chosen_spanish_reading: horror, oprobio, desolación y maldición
  alternative_spanish_readings:
  - espanto, vergüenza, yermo y maldición
  - horror, deshonra, ruina y maldición
  rationale: Conviene mantener la cadena de términos de juicio sin colapsarlos en un solo sinónimo. «Desolación» ayuda a distinguir חֹרֶב de las «ruinas» finales, y «oprobio» conserva la vergüenza pública del contexto profético.
  doctrine_reference: Jeremías 49:13, juicio oracular contra Bosrá y sus ciudades
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que distinguió el término singular central como «a waste» para separarlo de las ruinas plurales finales. La versión española refleja esa distinción con «desolación» frente a «ruinas perpetuas». También se respetó la decisión posterior de conservar el valor fuerte de «curse» como maldición resultativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se translitera el topónimo como «Bosrá», forma apta para español bíblico y reconocible.
  - Se conserva la serie de cuatro sustantivos de juicio sin suavizar su intensidad.
  - La nota [a] queda anclada en «mí mismo», [b] en «maldición» y [c] en «perpetuas», respetando la correspondencia texto-nota.
