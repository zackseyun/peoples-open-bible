translation:
  language: es
  text: Vendrán allí y quitarán de ella todas sus cosas detestables y todas sus abominaciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos sus ídolos'; el hebreo suele referirse a objetos idolátricos detestables.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: They will come
  chosen_spanish: Vendrán
  alternatives_spanish:
  - Y vendrán
  - Entonces vendrán
  lexicon: HALOT
  rationale: El hebreo qal perfecto con waw en discurso profético expresa futuro/resultativo; en español, el futuro simple comunica mejor la expectativa profética que un presente o una perífrasis demasiado pesada.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - aquel lugar
  lexicon: HALOT
  rationale: El adverbio direccional se conserva con un adverbio natural en español. 'Allí' mantiene la referencia espacial sin sobreespecificar el lugar.
- source_word: וְהֵסִירוּ
  english_pob_choice: and remove
  chosen_spanish: y quitarán
  alternatives_spanish:
  - y removerán
  - y apartarán
  lexicon: HALOT
  rationale: El hiphil de סור aquí tiene sentido de retirar/eliminar. 'Quitar' es claro y fiel en español, sin suavizar la fuerza de eliminar objetos impuros.
- source_word: אֶת כָּל שִׁקּוּצֶיהָ
  english_pob_choice: all its detestable things
  chosen_spanish: todas sus cosas detestables
  alternatives_spanish:
  - todos sus objetos detestables
  - todos sus ídolos
  lexicon: HALOT
  rationale: שִׁקּוּץ puede referirse a objetos idolátricos detestables, pero el término es más amplio que 'ídolos'. 'Cosas detestables' preserva esa amplitud; 'sus' mantiene el referente femenino del lugar/comunidad.
- source_word: וְאֶת כָּל תּוֹעֲבוֹתֶיהָ
  english_pob_choice: and all its abominations
  chosen_spanish: y todas sus abominaciones
  alternatives_spanish:
  - y todas sus cosas abominables
  - y todas sus prácticas abominables
  lexicon: HALOT
  rationale: תּוֹעֵבָה tiene carga cultual y moral fuerte; 'abominaciones' conserva el peso teológico y la distinción respecto de שִׁקּוּץ.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de allí
  alternatives_spanish:
  - de ella
  - de ello
  lexicon: HALOT
  rationale: La preposición con sufijo remite a la entidad femenina mencionada en contexto. En español, con 'quitar de allí' se evita una referencia pronominal torpe y se mantiene la naturalidad.
theological_decisions:
- issue: Posible especificación de idolatría en שִׁקּוּצִים
  english_pob_reading: Use the broader phrase 'detestable things' in the main text; note the possible sense 'idols'
  chosen_spanish_reading: Mantener 'cosas detestables' en el texto principal, con nota sobre 'ídolos' como posibilidad contextual
  alternative_spanish_readings:
  - ídolos
  - objetos idolátricos detestables
  rationale: El contexto de purificación de idolatría permite la lectura 'ídolos', pero el hebreo es más amplio. El texto principal no debe estrechar el alcance más allá de lo que la forma lexical garantiza.
  doctrine_reference: Principio de primacía del texto original y no sobre-interpretación en la traducción; el contexto puede sugerir, pero no obligar, una glosa más estrecha.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; este borrador sigue el acuerdo alto del control cruzado y conserva la misma decisión de no estrechar שִׁקּוּצִים a 'ídolos' en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo el futuro simple para el valor profético de la forma verbal hebrea.
  - '''Allí'' conserva el adverbio direccional sin forzar un antecedente explícito en la línea.'
  - '''Abominaciones'' se conserva como término técnico fuerte y coherente con la terminología bíblica del libro.'
  - La nota en [a] preserva la alternativa léxica documentada sin duplicar el sentido principal.
