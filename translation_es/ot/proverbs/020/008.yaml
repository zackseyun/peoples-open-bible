translation:
  language: es
  text: Un rey sentado sobre un trono de juicio aventea[a] toda maldad[b] con sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esparce' o 'criba'. El verbo hebreo evoca la imagen de aventar el grano, separando lo inútil de lo bueno.
    reason: lexical_alternative
  - marker: b
    text: O 'todo malvado'. El hebreo puede referirse en general al mal o, por implicación, a las personas malvadas sometidas a juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: A king
  chosen_spanish: Un rey
  alternatives_spanish:
  - El rey
  lexicon: HALOT
  rationale: El hebreo presenta una afirmación proverbial general; el indefinido español comunica mejor el valor gnómico que un rey específico.
- source_word: יוֹשֵׁב
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - que está sentado
  - entronizado
  lexicon: HALOT
  rationale: El participio describe una postura característica. «Sentado» conserva la imagen con naturalidad en español.
- source_word: עַל כִּסֵּא דִין
  english_pob_choice: on a throne of judgment
  chosen_spanish: sobre un trono de juicio
  alternatives_spanish:
  - sobre el trono de juicio
  - sobre un asiento de juicio
  lexicon: HALOT
  rationale: «Trono» mantiene el ámbito real; «de juicio» refleja דִין como juicio/decisión judicial sin reducirlo a un mero tribunal.
- source_word: מְזָרֶה
  english_pob_choice: winnows
  chosen_spanish: avienta
  alternatives_spanish:
  - avienta y separa
  - zarandea
  - aventea
  lexicon: HALOT
  rationale: El verbo hebreo procede del campo agrícola de aventar/cribar el grano. «Avienta» preserva la metáfora concreta y puede abarcar la idea de separar lo inútil.
- source_word: בְעֵינָיו
  english_pob_choice: with his eyes
  chosen_spanish: con sus ojos
  alternatives_spanish:
  - por su mirada
  - con su mirada
  lexicon: HALOT
  rationale: La preposición expresa instrumento o medio; en español «con sus ojos» mantiene la imagen directa del discernimiento judicial.
- source_word: כָּל רָע
  english_pob_choice: all evil
  chosen_spanish: toda maldad
  alternatives_spanish:
  - todo mal
  - todo lo malo
  - todo malvado
  lexicon: HALOT
  rationale: «רָע» puede ser maldad en sentido abstracto o personas malvadas por implicación. «Toda maldad» preserva la amplitud sin forzar una referencia exclusiva a individuos.
translation_notes:
  revision_awareness: Corregí el problema de validación anterior asegurando que cada marca de nota aparezca exactamente en el texto. Evité crear notas sin anclaje y mantuve una sola marca combinada [ab] para un único punto léxico.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este verso no contiene el nombre divino.
  - Se mantuvo «juicio» para דִין por su valor forense y real.
  - «Maldad» se eligió como equivalente amplio de רָע, sin restringirlo a «personas malvadas».
