translation:
  language: es
  text: 'Entonces pronunció su discurso y dijo: «La declaración de Balaam hijo de Beor, la declaración del hombre cuyo ojo es abierto[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuyo ojo está cerrado» o «cerrado/tapado». La expresión hebrea es difícil y ha sido entendida de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  english_pob_choice: Then he took up his discourse
  chosen_spanish: Entonces alzó su discurso
  alternatives_spanish:
  - Entonces tomó su discurso
  - Entonces levantó su discurso
  lexicon: HALOT
  rationale: La construcción hebrea introduce una fórmula solemne de oráculo/poesía. En español, «alzó su discurso» conserva la imagen idiomática sin sonar tan rígida como un calco y mantiene el sentido formal del inicio del dicho.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  lexicon: HALOT
  rationale: Es la continuación narrativa normal de la cita directa y no requiere expansión.
- source_word: נְאֻם
  english_pob_choice: the declaration of
  chosen_spanish: la declaración de
  alternatives_spanish:
  - el oráculo de
  - la palabra de
  lexicon: HALOT
  rationale: «Declaración» transmite el tono solemne y autoritativo del término hebreo sin imponer un tecnicismo más cargado como «oráculo» si no es necesario. Al repetirse dos veces, se conserva la misma equivalencia para mantener la cadencia del texto.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: Convención onomástica estándar
  rationale: Nombre propio transliterado de forma usual y reconocible en español bíblico.
- source_word: בְּנוֹ בְעֹר
  english_pob_choice: son of Beor
  chosen_spanish: hijo de Beor
  alternatives_spanish:
  - hijo de Beór
  lexicon: Convención patronímica estándar
  rationale: La relación patronímica es directa; se mantiene clara y natural en español. Se conserva la forma del nombre propio tal como aparece en la tradición transliterada.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: del varón
  alternatives_spanish:
  - del hombre
  lexicon: HALOT
  rationale: «Varón» preserva mejor el matiz formal y algo enfático de גֶּבֶר que el genérico «hombre», sin añadir una interpretación de fuerza que el contexto inmediato no exige.
- source_word: שְׁתֻם הָעָיִן
  english_pob_choice: whose eye is opened
  chosen_spanish: de ojo abierto
  alternatives_spanish:
  - cuyos ojos están abiertos
  - de ojo cerrado
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y admite más de una comprensión. En español, «de ojo abierto» preserva la ambigüedad de forma concisa y deja visible la tensión interpretativa que el audit trail inglés también conserva en nota.
theological_decisions:
- issue: Sentido de שְׁתֻם הָעָיִן en la autodescripción de Balaam
  english_pob_reading: 'Render as revelatory perception: ''whose eye is opened'''
  chosen_spanish_reading: «de ojo abierto»
  alternative_spanish_readings:
  - «de ojo cerrado»
  - «cuyos ojos están abiertos»
  rationale: El contexto cercano presenta a Balaam como receptor de visión profética, pero el hebreo sigue siendo discutido. Se opta por una formulación que favorece la lectura de percepción revelada sin cerrar la ambigüedad textual; así se preserva la tensión documentada en la traducción inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; preserve genuine ambiguity in footnotes.'
translation_notes:
  revision_awareness: La versión española sigue la lectura auditada del inglés POB y conserva la ambigüedad principal de שְׁתֻם הָעָיִן. No se registran revisiones aplicadas en el expediente fuente; por eso se mantiene una redacción estable y conservadora respecto del texto hebreo.
  spanish_consistency_notes:
  - Se mantiene «declaración» para נְאֻם en ambas apariciones, por consistencia formal.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se prefiere «varón» para הַגֶּבֶר por su matiz léxico más preciso que «hombre» en este contexto.
  - La nota sobre la expresión difícil se deja anclada en la frase española correspondiente para no borrar la tensión interpretativa.
