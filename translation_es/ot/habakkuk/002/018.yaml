    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura a un español más natural y más cercano a la pregunta de utilidad del hebreo, y se sustituye 'modelado' por 'tallado' para preservar el matiz léxico de פְסָלוֹ y la lógica del contraste con la nota alternativa 'imagen tallada'. Se mantienen las demás decisiones porque son fieles al source y al audit trail.
