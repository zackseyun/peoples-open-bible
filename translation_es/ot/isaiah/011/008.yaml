revisions:
- from: El niño de pecho jugará sobre el agujero de la cobra[b][a], y el niño destetado pondrá su mano sobre la madriguera de la víbora.
  to: El niño de pecho jugará junto al agujero de la cobra[b][a], y el niño destetado pondrá su mano en la guarida de la víbora.
  rationale: La revisión hace ajustes menores de español idiomático y de imagen espacial sin cambiar el sentido fuente ni las decisiones léxicas principales del POB. «Junto al agujero» y «en la guarida» representan mejor la escena en español natural.
