review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: brevedad de los días medida en palmos, la vida como nada delante de Dios, y la conclusión enfática sobre la condición humana como vapor. También preserva adecuadamente el sentido concesivo de נִצָּב con «aunque esté firme». Sin embargo, «es solo vapor» debilita el valor totalizador de כָּל הֶבֶל, que el rastro POB documenta como «altogether vapor»; en español conviene una formulación como «es del todo vapor» o «es enteramente vapor». Además, falta la nota inclusiva para «todo hombre», que el POB inglés sí preserva por decisión doctrinal documentada.'
  spanish_quality_summary: El español es claro y ampliamente legible, con tono digno y natural. No obstante, «¡Mira!» con signos de exclamación suena un poco coloquial para poesía sapiencial; «Mira» sin exclamación funciona mejor. «Has puesto mis días en apenas unos pocos palmos» es entendible pero algo rígido; «Has hecho que mis días midan apenas unos pocos palmos» suena más idiomático y expresa mejor la medida. «mi vida» está bien, aunque «mi tiempo de vida» sería menos natural; no requiere cambio. «Selah.» puede mantenerse sin punto final o con punto según estilo, pero sin problema grave.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. La elección de «vapor» para הֶבֶל está alineada con la decisión POB. La elección de «todo hombre» para כָּל אָדָם también sigue el rastro doctrinal, pero debe conservarse la nota aclaratoria inclusiva correspondiente. «Selah» respeta la transliteración tradicional documentada.
  issues:
  - severity: medium
    issue: La traducción de כָּל הֶבֶל como «solo vapor» no conserva bien el matiz de totalidad
    rationale: El POB inglés justificó «altogether vapor» para reflejar la fuerza totalizadora de כָּל en la predicación. «Solo» en español puede sonar meramente restrictivo, mientras que «del todo/enteramente» reproduce mejor el énfasis.
  - severity: medium
    issue: Falta la nota léxica inclusiva para «todo hombre»
    rationale: El rastro inglés incluyó una nota porque el hebreo usa singular genérico con sentido humano inclusivo. Dado que el español mantiene «todo hombre», conviene preservar esa información para fidelidad documental y claridad contemporánea.
  - severity: low
    issue: «¡Mira!» resulta algo coloquial para el registro poético
    rationale: Aunque fiel a הִנֵּה como llamada de atención, sin exclamación queda más digno y menos abrupto en español bíblico contemporáneo.
  - severity: low
    issue: «Has puesto mis días en apenas unos pocos palmos» es algo poco idiomático
    rationale: La idea de medida queda más natural en español con una construcción explícita como «has hecho que mis días midan…», sin perder la imagen concreta de los palmos.
  revised_spanish_text: Mira[a], has hecho que mis días midan apenas unos pocos palmos, y mi vida es como nada delante de ti; ciertamente todo hombre[b], aunque esté firme[c], es del todo vapor[d]. Selah
  revised_footnotes:
