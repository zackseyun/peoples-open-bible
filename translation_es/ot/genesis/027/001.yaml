translation:
  language: es
  text: 'Y sucedió que, cuando Isaac era anciano y sus ojos estaban demasiado nublados para ver, llamó a Esaú, su hijo mayor[a], y le dijo: «Hijo mío». Y él le respondió: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hijo primogénito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y fue que
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio. «Y sucedió que» conserva ese valor discursivo en español natural y digno, sin caer en un calco rígido ni en una fórmula demasiado arcaica.
- source_word: כִּי
  english_pob_choice: that when
  chosen_spanish: cuando
  alternatives_spanish:
  - que cuando
  - al
  lexicon: HALOT
  rationale: Aquí כִּי marca la circunstancia temporal después del encabezado narrativo. En español, «cuando» expresa mejor la relación temporal sin sobrecargar la frase con una construcción menos natural como «que cuando».
- source_word: זָקֵן
  english_pob_choice: was old
  chosen_spanish: era viejo
  alternatives_spanish:
  - había envejecido
  - estaba anciano
  lexicon: HALOT
  rationale: El participio/adjetivo describe la avanzada edad de Isaac. «Era viejo» es simple, claro y fiel al valor descriptivo del hebreo.
- source_word: וַתִּכְהֶיןָ עֵינָיו מֵרְאֹת
  english_pob_choice: his eyes were too dim to see
  chosen_spanish: sus ojos se habían nublado[a] de tal manera que no podía ver
  alternatives_spanish:
  - sus ojos estaban tan débiles que no podía ver
  - su vista se había debilitado
  lexicon: HALOT
  rationale: כהה con ojos denota el oscurecimiento o debilitamiento de la vista. «Se habían nublado» comunica bien la imagen y el resultado funcional («no podía ver») sin perder la tensión lexical entre la metáfora visual y la incapacidad real para ver.
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - mandó llamar
  - convocó
  lexicon: HALOT
  rationale: En este contexto קרא significa llamar a alguien para dirigirse a él. «Llamó» es la equivalencia más directa y natural en español.
- source_word: אֶת עֵשָׂו בְּנוֹ הַגָּדֹל
  english_pob_choice: Esau his older son
  chosen_spanish: a Esaú, su hijo mayor
  alternatives_spanish:
  - a Esaú, su hijo primogénito
  - a Esaú, su hijo mayor de edad
  lexicon: HALOT
  rationale: הגדל aquí distingue a Esaú como el mayor en relación con Jacob. «Hijo mayor» mantiene esa relación familiar y evita imponer innecesariamente una formalidad como «primogénito» si se quiere conservar la flexibilidad del término.
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo
  lexicon: HALOT
  rationale: La forma de tratamiento directo con sufijo posesivo se expresa de manera natural en español con «Hijo mío», que conserva el tono afectuoso y la estructura vocativa.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Presente
  lexicon: HALOT
  rationale: La fórmula responsiva indica presencia y disponibilidad. «Aquí estoy» es idiomática y fiel, mientras que «Heme aquí» sería más tradicional pero menos natural para este registro.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y se mantuvo sin cambios; la versión española sigue ese mismo entendimiento del hebreo, con atención especial a la imagen de los ojos que pierden capacidad visual y al valor relacional de «su hijo mayor».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se usa «hijo mayor» para הַגָּדֹל siguiendo el sentido relacional documentado en el audit trail inglés; «primogénito» queda como alternativa viable, no preferida.
  - «Aquí estoy» conserva la fórmula de respuesta hebrea sin forzar un giro litúrgico.
  - La puntuación busca una lectura pública fluida sin alterar la secuencia narrativa del original.
