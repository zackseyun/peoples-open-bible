base_translation:
  language: en
  yaml_path: translation/ot/hosea/007/004.yaml
  text: All of them are adulterers[a], like an oven heated by a baker[c][b], who stops stirring from the kneading of the dough until its leavening.
  footnotes:
  - marker: a
    text: Or 'burning' instead of 'heated.' The Hebrew participle can emphasize the oven's active heat.
    reason: lexical_alternative
  - marker: b
    text: Or 'who stops stoking it' or 'who ceases stirring it.' The Hebrew verb is difficult in this context and may refer to the baker's pausing his tending of the oven.
    reason: lexical_alternative
  - marker: c
    text: Or 'until it rises.' The Hebrew likely refers to the dough's fermenting or leavening process.
    reason: lexical_alternative
