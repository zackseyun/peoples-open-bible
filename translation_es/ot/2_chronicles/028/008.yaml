translation:
  language: es
  text: Y los hijos de Israel tomaron cautivos de entre sus hermanos[a] doscientas mil mujeres, hijos e hijas. Además, tomaron mucho botín de ellos y llevaron el botín a Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus parientes» o «de entre sus compatriotas». El hebreo dice literalmente «de sus hermanos», subrayando el parentesco compartido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: took captive
  chosen_spanish: tomaron cautivos
  alternatives_spanish:
  - capturaron
  - se llevaron cautivos
  lexicon: HALOT
  rationale: El verbo hebreo expresa tomar personas como cautivas en guerra. «Tomaron cautivos» conserva ese sentido militar con español natural y solemne.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» sigue de cerca la expresión del hebreo y mantiene el contraste con «sus hermanos», preservando la fuerza de parentesco.
- source_word: מֵאֲחֵיהֶם
  english_pob_choice: from their brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de sus parientes
  - de entre sus compatriotas
  - de entre sus hermanos de raza
  lexicon: HALOT
  rationale: En español, «de entre sus hermanos» conserva el valor literal y la carga ética/covenantal del término, sin suavizarlo a una lectura más general.
- source_word: מָאתַיִם אֶלֶף
  english_pob_choice: two hundred thousand
  chosen_spanish: doscientos mil
  alternatives_spanish:
  - doscientos mil en total
  lexicon: HALOT
  rationale: Equivalencia numérica directa y transparente.
- source_word: נָשִׁים בָּנִים וּבָנוֹת
  english_pob_choice: women, sons, and daughters
  chosen_spanish: mujeres, hijos e hijas
  alternatives_spanish:
  - mujeres, niños e hijas
  - mujeres, hijos y hijas
  lexicon: HALOT
  rationale: El hebreo enumera tres grupos. En español, «hijos e hijas» mantiene la enumeración abierta sin reducirla a «niños», que borraría la estructura del original. Dado el contexto de cautiverio, «hijos» puede abarcar varones menores sin imponer una relectura cerrada.
- source_word: וְגַם
  english_pob_choice: They also
  chosen_spanish: Además
  alternatives_spanish:
  - Y también
  - Encima
  lexicon: HALOT
  rationale: «Además» reproduce el avance aditivo del conector con fluidez en español formal.
- source_word: שָׁלָל רָב
  english_pob_choice: much spoil
  chosen_spanish: mucho botín
  alternatives_spanish:
  - gran botín
  - mucho despojo
  lexicon: HALOT
  rationale: «Botín» es el equivalente idiomático normal para שָׁלָל en contexto bélico. «Mucho botín» conserva el cuantificador y evita un calco torpe.
- source_word: בָּזְזוּ
  english_pob_choice: took much spoil
  chosen_spanish: tomaron
  alternatives_spanish:
  - saquearon
  - despojaron
  lexicon: HALOT
  rationale: La acción ya está expresada por el sustantivo «botín»; por eso «tomaron» conserva la economía del hebreo y la revisión inglesa («took much spoil») sin duplicar de modo innecesario un verbo más fuerte.
- source_word: וַיָּבִיאוּ אֶת הַשָּׁלָל לְשֹׁמְרוֹן
  english_pob_choice: brought the spoil to Samaria
  chosen_spanish: llevaron el botín a Samaria
  alternatives_spanish:
  - trajeron el botín a Samaria
  - llevaron el despojo a Samaria
  lexicon: HALOT
  rationale: «Llevaron» funciona bien en español narrativo y mantiene la dirección del movimiento hacia Samaria; «botín» conserva la repetición léxica del sustantivo hebreo.
theological_decisions:
- issue: Kinship language in intra-Israelite violence
  english_pob_reading: from their brothers
  chosen_spanish_reading: de entre sus hermanos
  alternative_spanish_readings:
  - de sus parientes
  - de entre sus compatriotas
  rationale: 'Se conserva la tensión teológica y moral del texto: no se trata de enemigos extranjeros, sino de parientes/covenant kin. «De entre sus hermanos» mantiene la dureza del original y su acusación implícita sin suavizarla.'
  doctrine_reference: 'Translation philosophy §3: preserve tension rather than resolve it'
- issue: Gendered enumeration of captives
  english_pob_reading: women, sons, and daughters
  chosen_spanish_reading: mujeres, hijos e hijas
  alternative_spanish_readings:
  - mujeres, niños y niñas
  - mujeres, hijos y hijas
  rationale: Se evita colapsar la lista a «niños», porque el hebreo enumera categorías distintas. «Hijos e hijas» preserva la forma del texto y su alcance sin forzar una reinterpretación.
  doctrine_reference: 'Translation philosophy §4: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente en un punto importante: para בָּזְזוּ, la frase inglesa revisada pasó de «plundered much spoil» a «took much spoil» por mayor naturalidad. En español, eso se reflejó evitando un verbo redundante y manteniendo la acción en «tomaron» junto con «botín».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton cuando aparezca; aquí no hay mención explícita.
  - Se usa «botín» de manera consistente para שָׁלָל, manteniendo la repetición léxica del verso.
  - Se mantiene una sintaxis narrativa directa, acorde con el tono histórico del libro.
  - La nota al pie marca una alternativa léxica real sin debilitar la lectura principal.
