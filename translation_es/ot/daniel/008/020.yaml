translation:
  language: es
  text: El carnero que viste[a], el de los dos cuernos, son los reyes de Media y Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «el carnero que viste, poseedor de los dos cuernos, [son] los reyes de Media y Persia»; la expresión «el de los dos cuernos» vierte de forma natural el sentido atributivo hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el ram
  - el macho carnero
  lexicon: HALOT
  rationale: אַיִל designa un carnero; en español, «carnero» es el equivalente natural y preciso en este contexto visionario. Conserva la imagen animal sin introducir una glosa innecesaria.
- source_word: רָאִיתָ
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - has visto
  - habías visto
  lexicon: HALOT
  rationale: 'El perfecto qal 2ms de ראה en una explicación narrativa de visión se expresa con el pretérito simple: «viste». Es más natural en español y mantiene el valor de la referencia directa a la visión.'
- source_word: בַּעַל הַקְּרָנַיִם
  english_pob_choice: the one with the two horns
  chosen_spanish: el de los dos cuernos
  alternatives_spanish:
  - el que tiene los dos cuernos
  - el poseedor de los dos cuernos
  - el que posee los dos cuernos
  lexicon: HALOT
  rationale: 'בעל en esta construcción funciona de modo atributivo: no afirma propiedad literal, sino rasgo identificador. «El de los dos cuernos» comunica con naturalidad la identificación del símbolo y preserva la fuerza descriptiva.'
- source_word: מַלְכֵי
  english_pob_choice: is the kings of
  chosen_spanish: es los reyes de
  alternatives_spanish:
  - representa a los reyes de
  - son los reyes de
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal sin verbo explícito. La auditoría inglesa decidió acercarse al hebreo con «is»; en español, para no perder esa relación directa entre símbolo y referente, se mantiene «es», aunque la concordancia resulte tensa. Se conserva así la tensión gramatical del original sin diluirla con una paráfrasis interpretativa.
- source_word: מָדַי
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - los medos
  lexicon: HALOT
  rationale: El nombre propio se vierte con la forma geográfica convencional «Media», que en español es clara y estándar en este pasaje.
- source_word: וּפָרָס
  english_pob_choice: and Persia
  chosen_spanish: y Persia
  alternatives_spanish:
  - y los persas
  lexicon: HALOT
  rationale: El nombre propio se traduce con la forma convencional «Persia». La coordinación con «Media» mantiene el paralelismo del texto fuente.
theological_decisions:
- issue: Cláusula nominal identificadora entre símbolo y referente
  english_pob_reading: The ram ... is the kings of Media and Persia.
  chosen_spanish_reading: El carnero ... es los reyes de Media y Persia.
  alternative_spanish_readings:
  - El carnero ... representa a los reyes de Media y Persia.
  - El carnero ... son los reyes de Media y Persia.
  rationale: La revisión inglesa optó por acercarse más al hebreo usando «is» en vez de «represents». En español se conserva esa decisión de correspondencia directa, aun cuando la construcción exija una tensión gramatical visible. No se reemplaza por una explicación más fluida, porque eso suavizaría la identificación simbólica que el texto presenta.
  doctrine_reference: Principio de equivalencia óptima; mantener la relación simbólica explícita del texto profético sin añadir interpretación extrínseca.
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión reciente que cambió «represents» por «is» para ceñirse más al hebreo. Esta versión española sigue esa última decisión, preservando la identificación directa del carnero con los reyes de Media y Persia y evitando una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se mantiene «carnero» para אַיִל por precisión léxica y naturalidad en español.
  - Se conserva la tensión de la cláusula nominal con «es», en línea con la revisión inglesa y con el hebreo sin verbo explícito.
  - «Media» y «Persia» siguen la forma convencional de nombres propios en español.
  - La nota al pie marca la alternativa literal que explicita la estructura subyacente del hebreo.
