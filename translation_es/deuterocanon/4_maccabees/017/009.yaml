  to: Aquí yacen sepultados un sacerdote anciano, y una mujer anciana, y siete hijos, a causa de la violencia de un tirano, que quería abolir la vida comunitaria[a] de los hebreos.
  rationale: Se reemplaza el anglicismo «commonwealth» por «vida comunitaria», una opción española clara que conserva el sentido corporativo de πολιτεία sin reducirlo a religión privada. La nota mantiene las alternativas «constitución» y «orden de vida» para preservar el campo semántico documentado en el audit trail. También se cambia «siete niños» por «siete hijos» para una lectura más natural, solemne y contextual en español. Se reubica el marcador de nota al término realmente explicado.
