review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: todas las criaturas dependen de Dios y esperan recibir su alimento en el tiempo apropiado. Sin embargo, «esperan de ti» suena menos idiomático y algo ambiguo en español; además, «para que les des» introduce un matiz más final que de contenido de la espera. Una formulación más fiel y natural es «Todos ellos esperan que tú les des su alimento a su tiempo».'
  spanish_quality_summary: El español es claro y comprensible, pero la combinación «esperan de ti» no suena del todo natural en registro bíblico moderno, y la coma antes de «para que» entorpece el flujo. La revisión propuesta mejora naturalidad, precisión sintáctica y dignidad estilística sin alejarse del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Alimento» y «a su tiempo» están bien elegidos. La única corrección necesaria es sintáctico-lexical en la expresión de la espera dirigida a Dios.
  issues:
  - severity: medium
    issue: «esperan de ti» es poco idiomático en este contexto
    rationale: Aunque intenta reflejar la dependencia expresada por אֵלֶיךָ con שׂבר, en español suena forzado. «Esperan que tú les des» o «esperan en ti» serían más naturales; la primera además conecta mejor con el infinitivo siguiente.
  - severity: medium
    issue: «para que les des» añade matiz de finalidad
    rationale: 'לָתֵת expresa el contenido de la espera: esperan que Dios les dé alimento. «Para que» puede sugerir propósito más que contenido. «Que tú les des» representa mejor la relación sintáctica en español.'
  revised_spanish_text: Todos ellos esperan que tú les des su alimento a su tiempo[a][b].
  revised_footnotes:
  - marker: a
    text: O «miran expectantemente hacia ti» o «esperan en ti».
    reason: lexical_alternative
  - marker: b
    text: O «en su tiempo debido» o «a su debido tiempo».
    reason: lexical_alternative
