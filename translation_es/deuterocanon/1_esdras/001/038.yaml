translation:
  language: es
  text: Después de él subió Nabucodonosor, rey de Babilonia[a], y lo ató con cadenas de bronce y lo llevó a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue hacia arriba». El verbo griego puede rendirse de ambas maneras; «subió» conserva la imagen direccional convencional de un rey que avanza contra una tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετʼ αὐτὸν
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Después de esto
  - Luego de él
  lexicon: LSJ
  rationale: La secuencia temporal es la fuerza principal del griego. «Después de él» conserva la referencia personal directa del antecedente, igual que el inglés POB con «After him».
- source_word: ἀνέβη
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - fue hacia arriba
  - ascendió
  lexicon: LSJ
  rationale: El verbo literalmente expresa movimiento ascendente. En español, «subió» mantiene la imagen idiomática sin añadir explícitamente el matiz militar que el griego no desarrolla de forma completa en esta sola cláusula.
- source_word: Ναβουχοδονόσορ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nabouchodonosor
  lexicon: tradición onomástica bíblica
  rationale: Se usa la forma española bíblica convencional para inteligibilidad y reconocimiento, manteniendo la identidad del personaje sin mecanizar la transliteración griega.
- source_word: βασιλεὺς Βαβυλῶνος
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: LSJ
  rationale: La construcción titulativa es directa y debe traducirse con naturalidad al español. Se omite el artículo porque el español permite la lectura titular sin él.
- source_word: ἔδησεν
  english_pob_choice: bound
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo encadenó
  lexicon: LSJ
  rationale: «Lo ató» es el equivalente amplio y natural. La frase siguiente especifica el medio, por lo que no conviene duplicar el detalle en el verbo.
- source_word: ἐν χαλκεῖς δεσμοῖς
  english_pob_choice: with bronze chains
  chosen_spanish: con cadenas de bronce
  alternatives_spanish:
  - con grillos de bronce
  - con cadenas broncíneas
  lexicon: LSJ
  rationale: «Cadenas de bronce» conserva el material y el valor concreto de las ataduras metálicas. «Bronce» refleja mejor el término griego que «latón» o «brass».
- source_word: ἀπήγαγεν
  english_pob_choice: carried away
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo llevó consigo
  - lo arrastró
  lexicon: LSJ
  rationale: El verbo indica traslado forzoso. «Lo llevó» mantiene la idea de deportación sin introducir una imagen más específica que la del griego. El complemento «a Babilonia» aclara el destino.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - hasta Babilonia
  lexicon: LSJ
  rationale: «A Babilonia» expresa destino de manera idiomática en español y conserva la sencillez del griego.
theological_decisions:
- issue: Leer el movimiento de ἀνέβη sin forzar armonización con paralelos hebreos/MT
  english_pob_reading: Translate the Greek sequence as Nebuchadnezzar's ascent, binding, and deportation of the king.
  chosen_spanish_reading: 'Traducir la secuencia griega tal como está: subida de Nabucodonosor, atadura y traslado a Babilonia.'
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo para reordenar la escena
  - explicitar un matiz militar no dicho en el verso
  rationale: El testimonio base de esta sección es el griego de 1 Esdras; el paralelo hebreo funciona solo como comprobación de nombres y contexto. No se debe alterar el orden ni sobreexplicar el verbo para concordar con otra tradición narrativa.
  doctrine_reference: 'PHILOSOPHY.md: primacía del testimonio fuente seleccionado; uso de paralelos como control, no como reemplazo'
- issue: Mantener el detalle material de las ataduras
  english_pob_reading: bronze chains
  chosen_spanish_reading: cadenas de bronce
  alternative_spanish_readings:
  - grillos de bronce
  - cadenas broncíneas
  rationale: El griego especifica el material de las cadenas, y la traducción debe conservar esa concreción. En español, «cadenas de bronce» es clara y no borra el detalle lexical del original.
  doctrine_reference: LSJ; fidelidad a los elementos concretos del texto fuente
translation_notes:
  revision_awareness: 'La revisión previa indica que no se requirieron cambios: el texto fuente griego es claro y la traducción inglesa ya fijó las decisiones léxicas clave. La versión española sigue esas mismas decisiones, manteniendo el valor direccional de ἀνέβη, la secuencia temporal de μετʼ αὐτόν y el detalle concreto de «bronze chains» sin armonizar el verso con el paralelo hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Nabucodonosor» como forma española reconocible y consistente con el uso bíblico en español.
  - Se usa «Babilonia» como destino simple, sin añadir matices preposicionales innecesarios.
  - Se conserva la concreción de «cadenas de bronce» para no debilitar el énfasis material del griego.
  - La nota al pie solo se aplica a la decisión léxica sobre ἀνέβη y aparece anclada en el verbo «subió».
