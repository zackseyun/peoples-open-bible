    text: 'O: «lo levanté en justicia». El verbo puede entenderse también como «lo suscité».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «edificará mi ciudad». El hebreo dice simplemente «construirá»; «reconstruirá» refleja el contexto histórico de la restauración de Jerusalén.'
    reason: lexical_alternative
  - marker: c
    text: 'Tradicional: «el SEÑOR de los Ejércitos». Aquí se mantiene la forma transparente del título divino.'
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente יְשַׁלֵּחַ para reflejar mejor el verbo fuente (‘dejar ir’) en lugar de la interpretación más libre ‘poner en libertad’. También se ajusta ‘mis exiliados’ para alinearse más de cerca con גָּלוּתִי / ‘my exiles’, y se corrige la nota sobre la forma tradicional del título divino.
