  text: בְּֽ/תוֹכָ֘ח֤וֹת עַל עָוֺ֨ן יִסַּ֬רְתָּ אִ֗ישׁ וַ/תֶּ֣מֶס כָּ/עָ֣שׁ חֲמוּד֑/וֹ אַ֤ךְ הֶ֖בֶל כָּל אָדָ֣ם סֶֽלָה־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/039/012.yaml
  text: With rebukes for iniquity you discipline a man[a], and like a moth you consume what is precious to him; surely every man is vapor[b]. Selah
  footnotes:
  - marker: a
    text: Or 'you make his precious things waste away like a moth'; the Hebrew for 'what is precious to him' can also be understood more specifically as 'his beauty' or more broadly as 'his treasured things.'
    reason: lexical_alternative
  - marker: b
    text: '''Vapor'' renders Hebrew hebel, a word used for breath-like transience or insubstantiality; traditionally, ''vanity.'''
    reason: lexical_alternative
