    issue: «pensaron» debilita el matiz de ὑπειληφότες
    rationale: El participio expresa una suposición o presunción equivocada; «supusieron» refleja mejor el valor léxico documentado en el expediente inglés.
  - severity: low
    issue: «fuertemente atados» resulta algo pesado
    rationale: Aunque es fiel, la frase suena más explicativa que imagética. «Atados por una larga noche» conserva bien el sentido y mejora el flujo en español bíblico.
  - severity: low
    issue: La nota b puede afinar la alternativa léxica
    rationale: «Fuertemente sujetos» es menos natural que una formulación con «encadenados» o «atados», y conviene mantener la imaginería de restricción de πεδῆται.
