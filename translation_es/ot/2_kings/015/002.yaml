lexical_decisions:
- source_word: בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: sixteen years old
  chosen_spanish: dieciséis años
  alternatives_spanish:
  - de dieciséis años
  - un hijo de dieciséis años
  lexicon: HALOT
  rationale: La fórmula hebrea es idiomática para expresar edad. En español, la forma natural y fiel es «tenía dieciséis años», que mantiene el valor exacto de la edad sin calco innecesario.
- source_word: הָיָה בְמָלְכֹו
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - al comenzar a reinar
  lexicon: HALOT
  rationale: La construcción marca la edad en el momento de la entronización. «Comenzó a reinar» comunica con claridad el inicio del reinado y preserva el sentido temporal del hebreo.
- source_word: וַחֲמִשִּׁים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: fifty-two years
  chosen_spanish: cincuenta y dos años
  alternatives_spanish:
  - cincuenta y dos años de duración
  - cincuenta y dos años completos
  lexicon: HALOT
  rationale: Es el equivalente numérico directo y natural en español, sin pérdida de precisión.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: HALOT
  rationale: En fórmulas regnales, «reinó» es el equivalente español más preciso y sobrio para מלך.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa indica el lugar del reinado; «en Jerusalén» reproduce directamente el valor espacial.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: Su madre se llamaba
  alternatives_spanish:
  - El nombre de su madre era
  - Su madre tenía por nombre
  lexicon: HALOT
  rationale: La fórmula hebrea se expresa de modo idiomático en español con «se llamaba», manteniendo la información genealógica sin rigidez.
- source_word: יְכָלְיָהוּ
  english_pob_choice: Jecoliah
  chosen_spanish: Jecolías
  alternatives_spanish:
  - Jecolía
  - Jecolíasu
  lexicon: HALOT
  rationale: Se sigue una transliteración española tradicional y legible del nombre propio, adaptada a la ortografía castellana estándar de nombres bíblicos.
- source_word: מִירוּשָׁלָם
  english_pob_choice: of Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: Aunque מן puede significar «desde/de», en este contexto genealógico o de procedencia la relación natural en español es «de Jerusalén», como indica también el audit trail inglés.
translation_notes:
  revision_awareness: El texto base muestra alto acuerdo entre revisiones y no presenta cambios sustantivos. Se mantiene la decisión auditada de tratar מִירוּשָׁלָם como procedencia/proveniencia en la nota, sin alterar el cuerpo del versículo.
  spanish_consistency_notes:
  - Se preserva el registro sobrio y formular de los libros de Reyes.
  - «Jerusalén» se mantiene uniforme en todo el versículo.
  - La nota alternativa recoge la ambigüedad de מִן sin introducir una lectura más fuerte que la sustentada por el contexto.
