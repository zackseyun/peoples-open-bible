  glossary_alignment: Cumple con la conservación de «Abadón» como término poético, pero no sigue adecuadamente la racionalidad documentada para חסד = «steadfast love». En español, «amor constante» o «amor fiel» preserva mejor el matiz que «misericordia». No hay conflicto con otras directrices terminológicas del proyecto.
