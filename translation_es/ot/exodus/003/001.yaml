  text: וּ/מֹשֶׁ֗ה הָיָ֥ה רֹעֶ֛ה אֶת צֹ֛אן יִתְר֥וֹ חֹתְנ֖/וֹ כֹּהֵ֣ן מִדְיָ֑ן וַ/יִּנְהַ֤ג אֶת הַ/צֹּאן֙ אַחַ֣ר הַ/מִּדְבָּ֔ר וַ/יָּבֹ֛א אֶל הַ֥ר הָ/אֱלֹהִ֖ים חֹרֵֽבָ/ה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/003/001.yaml
  text: Now Moses was shepherding the flock of Jethro his father-in-law[a], the priest of Midian. He led the flock beyond the wilderness and came to the mountain of God, Horeb.
