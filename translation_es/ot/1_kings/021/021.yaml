  text: הִנְ/נִ֨י מבי אֵלֶ֨י/ךָ֙ רָעָ֔ה וּ/בִעַרְתִּ֖י אַחֲרֶ֑י/ךָ וְ/הִכְרַתִּ֤י לְ/אַחְאָב֙ מַשְׁתִּ֣ין בְּ/קִ֔יר וְ/עָצ֥וּר וְ/עָז֖וּב בְּ/יִשְׂרָאֵֽל׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/021.yaml
