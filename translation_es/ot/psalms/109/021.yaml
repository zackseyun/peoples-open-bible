source:
  edition: WLC
  text: וְ/אַתָּ֤ה יְה֘וִ֤ה אֲדֹנָ֗/י עֲֽשֵׂה אִ֭תִּ/י לְמַ֣עַן שְׁמֶ֑/ךָ כִּי ט֥וֹב חַ֝סְדְּ/ךָ֗ הַצִּילֵֽ/נִי׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/109/021.yaml
  text: But you[a], O Lord Yahweh, deal with me for your name’s sake; because your steadfast love is good[d][c][b], deliver me.
  footnotes:
  - marker: a
    text: 'Hebrew: “O LORD my Lord.” The text uses two divine titles in sequence: יְהוָה (YHWH) and אֲדֹנָי. Some translations render the phrase “O Lord GOD.”'
    reason: alternative_reading
  - marker: b
    text: Or “deal with me” or more literally “do with me.”
    reason: lexical_alternative
  - marker: c
    text: “Steadfast love” translates Hebrew חֶסֶד, a term often associated with loyal, covenantal love; alternatively “lovingkindness,” “mercy,” or “covenant faithfulness.”
    reason: lexical_alternative
  - marker: d
    text: Or 'act on my behalf for your name’s sake; because your steadfast love is good, deliver me.'.
    reason: previous_rendering
