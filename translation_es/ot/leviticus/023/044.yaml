translation:
  language: es
  text: Así Moisés declaró los tiempos señalados de Yahvé a los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o tradicionalmente «los hijos de Israel». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: declared
  chosen_spanish: declaró
  alternatives_spanish:
  - habló
  - anunció
  - proclamó
  lexicon: HALOT
  rationale: En este cierre resumido del calendario festivo, דִּבֵּר en piel puede expresar comunicar formalmente. «Declaró» conserva esa fuerza de hacer saber estas disposiciones, y en español suena natural en una fórmula narrativa concluyente.
- source_word: מֹעֲדֵי
  english_pob_choice: appointed times
  chosen_spanish: tiempos señalados
  alternatives_spanish:
  - tiempos appointedos
  - festividades señaladas
  - fechas señaladas
  lexicon: HALOT
  rationale: «מֹעֵד» abarca tiempos designados o fijados, no solo fiestas en sentido estrecho. «Tiempos señalados» preserva el alcance del calendario sagrado y evita reducirlo a celebraciones puntuales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» en el texto español conforme al criterio del proyecto, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca con claridad el destinatario de la comunicación de Moisés; «a» es la forma normal y precisa en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal «los hijos de Israel», como equivalente formal transparente. Aunque «los israelitas» es más idiomático, atenúa la forma masculina representativa del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo usa el nombre del pacto directamente. «Yahvé» mantiene esa referencia personal y evita la sustitución por una designación genérica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; el texto ahora no contiene marcadores de nota, por lo que no hay pie suelto. El contenido sigue el mismo sentido del texto fuente y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la fórmula masculina literal «los hijos de Israel» siguiendo el hebreo.
  - «Tiempos señalados» cubre el rango semántico de מֹעֲדֵי sin restringirlo a fiestas únicamente.
