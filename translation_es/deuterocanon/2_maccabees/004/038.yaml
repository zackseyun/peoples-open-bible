translation:
  language: es
  text: Y, encendido de ira, enseguida le quitó el manto púrpura de Andronico y le rasgó los vestidos; y, después de hacerlo recorrer toda la ciudad hasta el mismo lugar donde había cometido su impiedad contra Onías, allí despachó al homicida[a], al darle el Señor el castigo que merecía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego μιαφόνον tiene una fuerza mayor que «homicida»: alguien manchado por sangre, culpable de derramamiento de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πυρωθεὶς τοῖς θυμοῖς
  english_pob_choice: inflamed with anger
  chosen_spanish: encendido de ira
  alternatives_spanish:
  - inflamado de ira
  - ardiendo en ira
  lexicon: LSJ
  rationale: El participio metafórico conserva la imagen de fuego/ardor, y τοῖς θυμοῖς expresa ira intensa. «Encendido de ira» es natural en español y mantiene esa imagen sin endurecer el estilo.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: en seguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: LSJ
  rationale: Marca prontitud narrativa. «En seguida» comunica rapidez con buen ritmo en español bíblico moderno.
- source_word: τὴν τοῦ Ἀνδρονίκου πορφύραν
  english_pob_choice: Andronikos's purple robe
  chosen_spanish: la púrpura de Andronico
  alternatives_spanish:
  - la ropa púrpura de Andronico
  - el manto púrpura de Andronico
  lexicon: LSJ
  rationale: πορφύρα puede designar la prenda de púrpura como distintivo de rango. En español, «la púrpura de Andronico» conserva la concreción del símbolo sin añadir más de lo que el griego exige.
- source_word: τοὺς χιτῶνας περιρρήξας
  english_pob_choice: tore off his garments
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus túnicas
  - desgarró sus vestidos
  lexicon: LSJ
  rationale: χιτών son prendas de vestir/túnicas; «vestidos» es más idiomático en español y mantiene la humillación pública. «Rasgó» conserva la violencia del gesto; el prefijo de περιρρήξας queda reflejado por el verbo pleno en español.
- source_word: περιαγαγὼν καθʼ ὅλην τὴν πόλιν
  english_pob_choice: after leading him around through the whole city
  chosen_spanish: después de hacerlo recorrer toda la ciudad
  alternatives_spanish:
  - después de pasearlo por toda la ciudad
  - tras conducirlo por toda la ciudad
  lexicon: LSJ
  rationale: El participio expresa un recorrido público por la ciudad. «Hacerlo recorrer» evita sobreespecificar una procesión formal y conserva el movimiento completo.
- source_word: ἐπʼ αὐτὸν τὸν τόπον
  english_pob_choice: to the very place
  chosen_spanish: al mismo lugar
  alternatives_spanish:
  - a ese mismo lugar
  - al lugar mismo
  lexicon: LSJ
  rationale: El énfasis de αὐτόν se transmite con «al mismo lugar», una fórmula clara y natural en español.
- source_word: οὗπερ τὸν Ὀνίαν ἠσέβησεν
  english_pob_choice: where he had committed his impiety against Onias
  chosen_spanish: donde había cometido su impiedad contra Onias
  alternatives_spanish:
  - donde había actuado impíamente contra Onias
  - donde había profanado a Onias
  lexicon: LSJ
  rationale: ἠσέβησεν conserva la fuerza religiosa de una ofensa impía, no solo un agravio común. «Su impiedad contra Onias» preserva esa tensión moral y teológica.
- source_word: τὸν μιαφόνον
  english_pob_choice: the murderer
  chosen_spanish: al homicida[a]
  alternatives_spanish:
  - al asesino
  - al hombre manchado de sangre
  lexicon: LSJ
  rationale: 'μιαφόνος tiene una carga más fuerte que un simple «murderer»: alguien manchado por sangre culpable. «Homicida» mantiene el golpe semántico sin ser menos preciso; la nota preserva la alternativa más intensa.'
- source_word: ἀπεκόντισεν
  english_pob_choice: dispatched
  chosen_spanish: atravesó
  alternatives_spanish:
  - derribó
  - mató
  lexicon: LSJ
  rationale: El verbo sugiere matar mediante un arma arrojadiza o punzante, pero en contexto indica que lo ejecutó allí. «Atravesó» mantiene viveza narrativa y puede implicar arma, sin forzar una precisión que el texto no detalla.
- source_word: τοῦ κυρίου τὴν ἄξιαν αὐτῷ κόλασιν ἀποδόντος
  english_pob_choice: the Lord rendering to him the punishment he deserved
  chosen_spanish: cuando el Señor le dio el castigo que merecía
  alternatives_spanish:
  - cuando el Señor le retribuyó el castigo debido
  - cuando el Señor le dio la pena merecida
  lexicon: LSJ
  rationale: La construcción genitiva absoluta explica el hecho como retribución divina. «El Señor» sigue la convención POB para κύριος, y «el castigo que merecía» expresa ἄξιαν ... κόλασιν con claridad natural.
theological_decisions:
- issue: Cómo traducir κύριος en una narrativa de juicio divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  - el Señor Yahvé
  rationale: El griego tiene τοῦ κυρίου, y el marco narrativo lo presenta como el agente que retribuye el castigo. «El Señor» respeta la convención POB para κύριος y preserva la referencia divina sin introducir una formulación más interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Si explicitar la retribución divina o dejarla implícita
  english_pob_reading: the Lord rendering to him the punishment he deserved
  chosen_spanish_reading: cuando el Señor le dio el castigo que merecía
  alternative_spanish_readings:
  - cuando el Señor le retribuyó la pena debida
  - como justicia divina
  rationale: El genitivo absoluto hace explícito que el desenlace se atribuye al Señor. La redacción española conserva ese juicio teológico sin ampliar más allá del texto.
  doctrine_reference: DOCTRINE.md §1, §3
translation_notes:
  revision_awareness: 'La versión inglesa revisada afinó dos puntos: cambió ''tore'' por ''tore off'' para reflejar mejor περιρρήξας, y ''cut down'' por ''dispatched'' para ἀπεκόντισεν. En español se conservó la violencia del gesto con «rasgó» y se eligió «atravesó» para mantener la imagen de ejecución con arma, sin introducir una precisión no explicitada por el griego. También se mantuvo la retribución divina explícita con «el Señor le dio el castigo que merecía».'
  spanish_consistency_notes:
  - Se usa «Andronico» sin tilde para concordar con el nombre griego transliterado de forma estable en español.
  - Se mantiene «Señor» para κύριος, conforme a la política del proyecto.
  - «Impiedad» conserva la carga religiosa de ἠσέβησεν, evitando reducirla a simple injusticia.
  - La nota de una sola alternativa léxica se ancla en «homicida[a]» para preservar la tensión semántica de μιαφόνος.
