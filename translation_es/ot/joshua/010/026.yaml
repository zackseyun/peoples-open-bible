  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea: אַחֲרֵי כֵן = «Después de esto», distingue וַיַּכֵּם de וַיְמִיתֵם, mantiene תלה como suspensión/cuelgue y preserva עֵצִים como «árboles». También conserva correctamente el estado durativo de וַיִּהְיוּ תְּלוּיִם y el límite temporal «hasta la tarde/el atardecer».'
  spanish_quality_summary: 'El español es claro y natural, pero dos elecciones necesitan ajuste. «Los hizo morir» suena poco idiomático en español bíblico general; «los mató» colapsa demasiado, pero «les dio muerte» preserva mejor el tono formal y la distinción verbal. Además, la nota al pie está anclada en el verbo equivocado: la alternativa «los colgó» corresponde a וַיִּתְלֵם, no a «los hizo morir». También conviene mejorar «quedaron colgados» a «permanecieron colgados» para reflejar con más precisión el estado continuo de היה + participio pasivo.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Josué», «árboles» y «colgó» concuerdan con las decisiones auditadas. No aparece el nombre divino ni terminología mesiánica o doctrinal sensible. La nota sobre posible «empaló» debe mantenerse como alternativa léxica de תלה.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada a «los hizo morir[a]», pero el contenido de la nota explica una alternativa de «los colgó».
    rationale: Esto desaline­a el aparato crítico con el hebreo y con la auditoría inglesa. La nota debe ir en el verbo que traduce וַיִּתְלֵם.
  - severity: medium
    issue: «Los hizo morir» es demasiado forzado en español para וַיְמִיתֵם.
    rationale: Aunque refleja la causatividad, en español suena antinatural. «Les dio muerte» conserva mejor el registro formal de ejecución y mantiene la distinción frente a «los hirió/derribó».
  - severity: low
    issue: «Quedaron colgados» expresa resultado más que duración continua.
    rationale: וַיִּהְיוּ תְּלוּיִם indica estado sostenido. «Permanecieron colgados» refleja mejor el matiz durativo sin perder naturalidad.
  revised_spanish_text: Después de esto, Josué los hirió y les dio muerte, y los colgó[a] sobre cinco árboles; y permanecieron colgados en los árboles hasta el atardecer.
  revised_footnotes:
  - marker: a
    text: O «los suspendió». El verbo hebreo se refiere a colgar o suspender cuerpos sobre madera o árbol; «los empaló» es una posibilidad, pero menos segura aquí.
    reason: lexical_alternative
