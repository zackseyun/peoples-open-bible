translation:
  language: es
  text: Y murió Josué hijo de Nun, el siervo[a] de Yahvé, a la edad de ciento diez años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el esclavo de Yahvé'. La palabra hebrea puede significar cualquiera de las dos cosas, pero aquí se usa como un título honorífico para Josué.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de מות introduce un hecho sucesivo; en español, 'murió' comunica de forma natural el evento, y la conjunción narrativa se mantiene en el nivel de la cláusula con 'Y'.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  - Josua
  lexicon: HALOT
  rationale: Se usa la forma española estable y reconocible del nombre propio, preservando la identificación del personaje sin transliteración innecesaria.
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - hijo de Nun
  lexicon: HALOT
  rationale: La cadena constructa expresa filiación; 'hijo de Nun' es la equivalencia directa y transparente en español.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el siervo de Yahvé
  alternatives_spanish:
  - el servidor de Yahvé
  - el esclavo de Yahvé
  lexicon: HALOT
  rationale: Aquí עֶבֶד funciona como título honorífico para Josué en relación con Dios. 'Siervo' conserva el matiz reverente y tradicional en español bíblico, mientras que 'esclavo' introduciría una fuerza de subordinación no requerida por el contexto. Se mantiene 'Yahvé' según el criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se vierte como 'Yahvé' conforme al estándar del proyecto en español, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: בֶּן מֵאָה וָעֶשֶׂר שָׁנִים
  english_pob_choice: at the age of one hundred and ten years
  chosen_spanish: a la edad de ciento diez años
  alternatives_spanish:
  - cuando tenía ciento diez años
  - siendo de ciento diez años
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de edad; en español, 'a la edad de ciento diez años' expresa con claridad el dato numérico sin calco incómodo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino en vez de la sustitución tradicional por un título, siguiendo la política del proyecto y manteniendo la transparencia respecto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Título aplicado a Josué: עֶבֶד יְהוָה'
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: el siervo de Yahvé
  alternative_spanish_readings:
  - el esclavo de Yahvé
  - el servidor de Yahvé
  rationale: Aunque עֶבֶד puede significar 'esclavo', aquí el contexto lo presenta como un título de honor. 'Siervo' preserva esa carga honorífica sin perder la relación de dependencia y fidelidad a Yahvé.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tratamiento contextual de δοῦλος / עֶבֶד
translation_notes:
  revision_awareness: El texto inglés auditado no recibió cambios en la última pasada; el acuerdo del revisor fue alto y no se registraron revisiones aplicadas. La versión española sigue de cerca las decisiones léxicas y teológicas del auditor inglés, ajustándolas a un español bíblico natural y transparente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en toda la unidad.
  - Se conserva la fórmula honorífica 'el siervo de Yahvé' para עֶבֶד יְהוָה.
  - La edad se expresa con la misma claridad idiomática que el inglés auditado, sin calco hebraizante excesivo.
  - El nombre propio se normaliza como 'Josué', la forma estándar en español bíblico.
