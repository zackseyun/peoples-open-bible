translation:
  language: es
  text: Y ahora vean[a], nobles de la tierra, el juicio de Yahvé, que él es un rey grande y justo, juzgando lo que está bajo el cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «grandes hombres», «magnates» o «gobernantes».'
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente, la frase es elíptica: «juzgando la región bajo el cielo»; también puede entenderse como «juzgando la tierra bajo el cielo» o «el mundo bajo el cielo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδετε
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: El imperativo pide atención inmediata al acto judicial de Dios. «Vean» comunica con naturalidad la exhortación directa sin volverse arcaico, y mantiene la fuerza apelativa del griego.
- source_word: μεγιστᾶνες
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes hombres
  - gobernantes
  lexicon: BDAG
  rationale: En el contexto, el vocativo se dirige a los hombres de alto rango político y social. «Nobles» conserva ese tono elevado y es más idiomático en español que «magnates».
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del mundo
  lexicon: BDAG
  rationale: La expresión marca el ámbito terrestre de esos poderosos. «De la tierra» reproduce el genitivo con claridad y mantiene el contraste implícito con la esfera celestial.
- source_word: τὸ κρίμα
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - el juicio
  - la sentencia
  - el veredicto
  lexicon: BDAG
  rationale: «Juicio» cubre tanto el acto judicial como su sentencia en español y es la forma más natural para el contexto de retribución divina.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se sigue la convención del proyecto para κύριος como título divino. En español, «Señor» es la forma adecuada y reverente para el genitivo «del Señor».
- source_word: μέγας βασιλεὺς καὶ δίκαιος
  english_pob_choice: a great and righteous king
  chosen_spanish: un gran rey y justo
  alternatives_spanish:
  - un gran y justo rey
  - un rey grande y justo
  - un gran rey, justo
  lexicon: BDAG
  rationale: El griego une los adjetivos con βασιλεύς; en español, «un gran rey y justo» conserva ambos predicados sin forzar una expresión demasiado pesada. «Justo» expresa la rectitud moral del rey, equivalente al inglés «righteous».
- source_word: κρίνων τὴν ὑπʼ οὐρανόν
  english_pob_choice: judging what is under heaven
  chosen_spanish: juzgando lo que está bajo el cielo
  alternatives_spanish:
  - juzgando lo que está bajo el cielo
  - juzgando la tierra bajo el cielo
  - juzgando el mundo bajo el cielo
  lexicon: BDAG
  rationale: La frase griega es elíptica y alude al ámbito entero subordinado al cielo. «Lo que está bajo el cielo» conserva esa amplitud sin añadir una palabra inexistente en el texto; «bajo el cielo» es una manera natural de expresar la región cósmica/terrenal.
theological_decisions:
- issue: Cómo explicitar la relación entre «el juicio del Señor» y la oración introducida por ὅτι
  english_pob_reading: that he is a great and righteous king
  chosen_spanish_reading: que él es un gran rey y justo
  alternative_spanish_readings:
  - porque él es un gran rey y justo
  - pues él es un gran rey y justo
  rationale: El ὅτι puede introducir contenido explicativo o declarativo. Se eligió «que» para reflejar más directamente la estructura del griego y mantener la conexión con «el juicio del Señor» sin convertirla en una causalidad interpretativa que el texto no exige.
  doctrine_reference: Preservar la relación sintáctica y teológica entre el juicio divino y la realeza justa de Yahvé, sin resolver la ambigüedad más allá de lo que el griego afirma.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se conserva ὅτι como «que» y se evita añadir «todos» en la cláusula final, ya que el griego dice simplemente τὴν ὑπʼ οὐρανόν. También se mantiene el paralelismo entre «el juicio del Señor» y la descripción de su realeza justa.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al estilo del proyecto, y no «Yahvé», porque el texto griego citado no escribe el nombre divino explícito.
  - «Justo» se prefiere aquí frente a «recto» para corresponder mejor al valor judicial-moral de δίκαιος en este contexto.
  - Se mantiene «bajo el cielo» como fórmula transparente y bíblica para la esfera entera del dominio juzgado.
