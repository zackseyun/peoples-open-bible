translation:
  language: es
  text: 'Entonces el capitán[a] se acercó a él y le dijo: «¿Qué te pasa, dormido?[b] Levántate, invoca a tu dios. Quizá el dios[c] tenga consideración con nosotros[d], para que no perezcamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el jefe de los marineros» o «el patrón de la nave».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es una reprensión muy escueta, literalmente algo como: «¿qué a ti, dormido?», es decir, «¿cómo puedes estar dormido?»'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Dios». El hebreo usa aquí una referencia genérica en la boca del capitán pagano, por lo que el texto principal mantiene «el dios».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «nos preste atención» o «nos tome en cuenta». El verbo hebreo puede expresar consideración, atención o preocupación favorable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב הַחֹבֵל
  english_pob_choice: the captain
  chosen_spanish: el capitán
  alternatives_spanish:
  - el jefe de los marineros
  - el contramaestre
  - el capitán de la nave
  lexicon: HALOT
  rationale: La expresión hebrea designa al jefe de la tripulación náutica. «Capitán» es el equivalente español más natural y claro para el oficio de mando en una nave, sin perder el sentido de autoridad que tiene el hebreo.
- source_word: וַיִּקְרַב אֵלָיו
  english_pob_choice: came near to him
  chosen_spanish: se acercó a él
  alternatives_spanish:
  - se aproximó a él
  - llegó a él
  lexicon: HALOT
  rationale: El verbo קָרַב comunica movimiento de acercamiento. «Se acercó a él» conserva la acción física en español natural y corresponde bien al matiz narrativo del original.
- source_word: מַה לְּךָ נִרְדָּם
  english_pob_choice: What do you mean, sleeper?
  chosen_spanish: ¿Qué quieres decir, dormilón?
  alternatives_spanish:
  - ¿Qué te pasa, dormido?
  - ¿Cómo puedes estar dormido?
  - ¿Qué quieres decir, tú que duermes?
  lexicon: HALOT
  rationale: La frase hebrea es una reprensión idiomática muy breve, literalmente cercana a «¿qué a ti, dormido?». «¿Qué quieres decir, dormilón?» reproduce la sorpresa y el reproche sin suavizar demasiado el tono ni convertirlo en una paráfrasis extensa.
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Despierta
  lexicon: HALOT
  rationale: El imperativo de קום pide una acción inmediata. «Levántate» es claro, urgente y fiel al valor del mandato en español.
- source_word: קְרָא אֶל אֱלֹהֶיךָ
  english_pob_choice: call on your god
  chosen_spanish: invoca a tu dios
  alternatives_spanish:
  - clama a tu dios
  - llama a tu dios
  - ora a tu dios
  lexicon: HALOT
  rationale: קרא אל implica invocar o clamar a una deidad. «Invoca a tu dios» expresa bien la llamada urgente a la oración, y evita una formulación más eclesiástica que no está en el hebreo.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Puede ser que
  lexicon: HALOT
  rationale: אוּלַי expresa posibilidad incierta. «Quizá» es una equivalencia breve y natural en español.
- source_word: יִתְעַשֵּׁת
  english_pob_choice: will give thought to
  chosen_spanish: tenga consideración con
  alternatives_spanish:
  - nos tome en cuenta
  - nos preste atención
  - nos tenga en cuenta
  lexicon: HALOT
  rationale: El verbo es raro y puede abarcar la idea de prestar atención, considerar o tomar en cuenta. «Tenga consideración con» preserva esa amplitud en un español natural; por eso se deja el matiz abierto en vez de imponer una interpretación demasiado específica.
- source_word: הָאֱלֹהִים
  english_pob_choice: the god
  chosen_spanish: el dios
  alternatives_spanish:
  - Dios
  - la deidad
  lexicon: HALOT
  rationale: En el habla del capitán pagano, el artículo no presenta al Dios de Israel por nombre, sino a la deidad a la que Jonah pertenece. «El dios» mantiene ese valor genérico y evita una mayúscula teológica no explicitada por la escena.
- source_word: לָנוּ
  english_pob_choice: to us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - para nosotros
  - sobre nosotros
  lexicon: HALOT
  rationale: El complemento hebreo marca el objeto del posible interés o atención divina. En español, con el verbo elegido, «con nosotros» transmite bien la idea de intervención favorable o consideración para nuestro bien.
- source_word: וְלֹא נֹאבֵד
  english_pob_choice: so that we may not perish
  chosen_spanish: y no perezcamos
  alternatives_spanish:
  - para que no perezcamos
  - y no muramos
  - para que no nos perdamos
  lexicon: HALOT
  rationale: El último miembro expresa una finalidad o resultado deseado. «Y no perezcamos» conserva la concisión del hebreo y su tono de urgencia, sin forzar una estructura más explicativa de la necesaria.
theological_decisions:
- issue: Referencia de אֱלֹהֶיךָ / הָאֱלֹהִים en la voz del capitán pagano
  english_pob_reading: Render Jonah's deity as 'your god' and the hoped-for responder as 'the god' rather than 'God' or 'the LORD.'
  chosen_spanish_reading: «tu dios» y «el dios», no «tu Dios» ni «el SEÑOR/Yahvé» en la voz del capitán
  alternative_spanish_readings:
  - tu Dios ... Dios
  - tu dios ... Dios
  - tu dios ... el SEÑOR
  rationale: El hablante es un pagano que aún no nombra al Dios de Israel como Yahvé ni lo confiesa explícitamente como el único Dios. Mantener minúsculas en la voz del capitán preserva esa distancia narrativa y la ironía del pasaje, sin borrar que el lector sabe quién es realmente el Dios aludido.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió una reproducción más literal de מַה־לְּךָ נִרְדָּם («What do you mean, sleeper?»). La versión española refleja ese giro idiomático con una reprensión breve y directa («¿Qué quieres decir, dormilón?»), manteniendo el tono de sorpresa y reproche. También se respetó la decisión revisada de conservar la ambigüedad del verbo raro יִתְעַשֵּׁת con una expresión española igualmente abierta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar para el nombre divino cuando el texto lo exige; aquí no aparece el Tetragrámaton ni una cita directa que obligue a usarlo en la voz del capitán.
  - Se emplea «dios» en minúscula para la voz pagana, conforme a la decisión inglesa de no elevar la referencia más de lo que el texto indica.
  - Se usa un español natural y digno, evitando calcos duros como «clamar a» cuando «invocar» comunica mejor la función del mandato.
  - La puntuación respeta el contraste narrativo con comillas latinas y la secuencia imperativa del original.
