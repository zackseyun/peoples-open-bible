translation:
  language: es
  text: Y aquella noche el ángel de Yahvé salió y mató en el campamento de Asiria a ciento ochenta y cinco mil. Al levantarse[a] por la mañana, he aquí que todos eran cadáveres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, 'y se levantaron por la mañana'. El hebreo deja el sujeto indefinido.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''cadáveres, muertos'', una expresión enfática para los abatidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּלַּיְלָה הַהוּא
  english_pob_choice: And that night
  chosen_spanish: Y aquella noche
  alternatives_spanish:
  - Y sucedió aquella noche
  - Y esa noche
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el marco temporal de forma directa; en español, 'Y aquella noche' transmite ese enlace sin forzar un calco pesado como 'y sucedió'. La elección preserva la inmediatez del relato.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - un ángel de Yahvé
  lexicon: HALOT
  rationale: '''מַלְאַךְ'' puede significar ''mensajero'' o ''ángel''; en este contexto de intervención sobrenatural, ''ángel'' es el equivalente natural. Se conserva ''Yahvé'' conforme al criterio del proyecto para el nombre divino.'
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - se fue
  lexicon: HALOT
  rationale: '''יצא'' en este contexto narrativo se expresa con naturalidad como ''salió''. Mantiene el movimiento del agente sin añadir matices.'
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - hirió
  - mató
  - golpeó
  lexicon: HALOT
  rationale: '''נכה'' puede significar ''herir/golpear'' y, en contextos de juicio o guerra, implica una derrota mortal. ''Derribó'' comunica el golpe con su efecto letal sin volverlo demasiado explicativo. La frase final ''cadáveres muertos'' conserva la contundencia del hebreo.'
- source_word: בְּמַחֲנֵה אַשּׁוּר
  english_pob_choice: in the camp of Assyria
  chosen_spanish: en el campamento de Asiria
  alternatives_spanish:
  - en el campamento asirio
  - en el campamento de los asirios
  lexicon: HALOT
  rationale: Se conserva la estructura locativa básica. 'Asiria' refleja el metónimo territorial/político del hebreo, y 'campamento' es la equivalencia natural de 'מחנה'.
- source_word: מֵאָה שְׁמוֹנִים וַחֲמִשָּׁה אָלֶף
  english_pob_choice: one hundred eighty-five thousand
  chosen_spanish: ciento ochenta y cinco mil
  alternatives_spanish:
  - ciento ochenta y cinco millares
  lexicon: HALOT
  rationale: Se vierte el cardinal de forma estándar en español, sin alterar el valor numérico.
- source_word: וַיַּשְׁכִּימוּ בַבֹּקֶר
  english_pob_choice: When they rose early in the morning
  chosen_spanish: y cuando ellos se levantaron de mañana
  alternatives_spanish:
  - y al levantarse de mañana
  - y se levantaron temprano por la mañana
  lexicon: HALOT
  rationale: El hebreo presenta un sujeto indefinido en tercera plural; 'ellos' refleja esa indefinición sin introducir un sustantivo ajeno al texto. 'De mañana' conserva el ritmo bíblico y el sentido temporal.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: '''הִנֵּה'' es un marcador discursivo de sorpresa y atención. ''He aquí'' mantiene bien la fuerza retórica en español bíblico contemporáneo.'
- source_word: כֻלָּם
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los muertos
  lexicon: HALOT
  rationale: El pronombre totalizador se expresa de modo breve y natural con 'todos'. El contexto ya identifica a los asirios muertos.
- source_word: פְּגָרִים מֵתִים
  english_pob_choice: dead bodies
  chosen_spanish: cadáveres muertos
  alternatives_spanish:
  - cuerpos muertos
  - cadáveres
  lexicon: HALOT
  rationale: El hebreo combina un sustantivo ('cadáveres') con un participio ('muertos') para un énfasis enfático. 'Cadáveres muertos' conserva mejor esa duplicación que una simplificación a 'cadáveres'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Según el criterio terminológico del proyecto, en español se traslada como 'Yahvé' para no ocultar el nombre del pacto ni sustituirlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujeto implícito en וַיַּשְׁכִּימוּ
  english_pob_reading: When they rose early in the morning
  chosen_spanish_reading: y cuando ellos se levantaron de mañana
  alternative_spanish_readings:
  - y al amanecer
  - cuando se levantaron temprano
  rationale: El hebreo emplea un verbo en tercera plural sin sujeto explícito. Se conserva esa indefinición con 'ellos', evitando precisar un sujeto que el texto no nombra.
  doctrine_reference: Hebrew narrative syntax; POB revision awareness on indefinite subject
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que corrigió 'people' por 'they' para reflejar el sujeto indefinido del hebreo. En español se siguió esa decisión con una construcción igualmente indefinida ('ellos') y no se añadieron notas porque no fue necesario anclar variantes en el texto final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene un registro bíblico claro pero moderno, evitando arcaísmos innecesarios.
  - La expresión final conserva la duplicación enfática del hebreo con 'cadáveres muertos'.
  - No se introducen notas al pie porque no hay ambigüedades que requieran marcadores en el texto español final.
