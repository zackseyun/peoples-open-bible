translation:
  language: es
  text: Porque no conoció la quietud en su vientre; con sus cosas preciadas[a] no escapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con lo que le deleita; no se salvará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o razón del juicio anterior. En español, «Porque» conserva bien la relación causal/discursiva sin sonar forzado en poesía.
- source_word: לֹא יָדַע
  english_pob_choice: he knew no
  chosen_spanish: no conoció
  alternatives_spanish:
  - no supo
  - no conocía
  lexicon: HALOT
  rationale: El perfecto con negación expresa un hecho asentado. «No conoció» mantiene la fuerza verbal y evita una traducción demasiado abstracta.
- source_word: שָׁלֵו
  english_pob_choice: quiet
  chosen_spanish: la quietud
  alternatives_spanish:
  - el sosiego
  - la tranquilidad
  - el descanso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo apunta a sosiego o tranquilidad interior. «La quietud» es natural en español y conserva la idea de reposo interior sin ampliar demasiado el sentido.
- source_word: בְּבִטְנוֹ
  english_pob_choice: in his belly
  chosen_spanish: en su vientre
  alternatives_spanish:
  - en su estómago
  - dentro de él
  lexicon: HALOT
  rationale: בטן tiene sentido literal de vientre/entrañas. «Vientre» conserva la imaginería corporal y resulta más idiomático que «estómago» en español bíblico-poético.
- source_word: בַּחֲמוּדוֹ
  english_pob_choice: with his desirable things
  chosen_spanish: con sus cosas deseables
  alternatives_spanish:
  - con sus tesoros
  - con lo que desea
  - con sus cosas preciosas
  lexicon: HALOT
  rationale: La base de חמד es lo deseable, lo precioso, lo codiciado. «Cosas deseables» mantiene la amplitud semántica del hebreo mejor que «tesoros», que estrecha el campo a riqueza material.
- source_word: לֹא יְמַלֵּט
  english_pob_choice: he will not escape
  chosen_spanish: no escapará
  alternatives_spanish:
  - no se librará
  - no se salvará
  - no podrá huir
  lexicon: HALOT
  rationale: 'El piel de מלט puede significar escapar o librarse. «No escapará» es breve, poético y fiel al contraste: ni sus bienes ni su deseo le darán salida.'
translation_notes:
  revision_awareness: El draft sigue de cerca el hebreo WLC y el auditable English POB, pero ajusta el sintagma final para evitar la ambigüedad de «escape» sin sujeto explícito en español y para mantener la imagen corporal de בטן con «vientre».
  spanish_consistency_notes:
  - Se mantiene el registro poético sobrio y publicable.
  - Se evita «SEÑOR» o terminología litúrgica no presente en el verso.
  - «Cosas deseables» preserva la amplitud de חמוּדוֹ sin convertirlo automáticamente en «tesoros».
  - La puntuación reproduce la bisagra causal y el cierre sentencioso del hebreo.
