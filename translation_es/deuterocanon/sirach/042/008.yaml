    reason: lexical_alternative
  revision_rationale: Se ajustó «simple» a «ingenuo» para comunicar mejor el sentido de פותה en español actual; se reparó la elipsis de la exhortación final con «y sé un hombre modesto»; y se mejoró la fluidez con «ante». Se mantuvieron la estructura, la prioridad del hebreo y las dos notas realmente necesarias del expediente inglés.
