translation:
  language: es
  text: Y sacrificaron la Pascua para todos los hijos del cautiverio[a], y para sus hermanos, los sacerdotes[b], y para ellos mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para todos los exiliados». El griego dice literalmente «para todos los hijos del cautiverio», una expresión corporativa para la comunidad exílica retornada.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «la Pascua» se refiere al sacrificio u observancia pascual; el griego no dice explícitamente «cordero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθυσαν
  english_pob_choice: sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron
  - inmolaron
  lexicon: BDAG
  rationale: θύω se usa para la acción sacrificial de degollar/ofrecer un sacrificio. En español, "sacrificaron" conserva el acto cultual y el paralelismo con el sustantivo implícito πάσχα sin introducir una paráfrasis más amplia como "celebraron".
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el cordero pascual
  - la Pascua
  lexicon: BDAG
  rationale: El griego no explicita "cordero"; el objeto directo del verbo es πάσχα, que puede abarcar la ofrenda/observancia pascual. "La Pascua" es idiomático en español y mantiene la relación rito-sacrificio sin sobreespecificar lo que el texto no dice.
- source_word: πᾶσιν τοῖς υἱοῖς τῆς αἰχμαλωσίας
  english_pob_choice: for all the sons of the captivity
  chosen_spanish: para todos los hijos de la cautividad
  alternatives_spanish:
  - para todos los exiliados
  - para todos los hijos del cautiverio
  lexicon: BDAG
  rationale: Se conserva la expresión corporativa y algo idiomática del griego. "Cautividad" reproduce mejor la fórmula que "exilio"; "hijos" mantiene la correspondencia formal con υἱοῖς sin neutralizar el término base.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - correligionarios
  lexicon: BDAG
  rationale: ἀδελφοί significa literalmente "hermanos". Aquí conserva el tono familiar y comunitario del retorno posexílico.
- source_word: ἱερεῦσιν
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - sacerdotes
  lexicon: BDAG
  rationale: 'Se mantiene el artículo para reflejar la apposición del griego: "sus hermanos, los sacerdotes". Es una designación clara en español y preserva la identificación del grupo.'
- source_word: ἑαυτοῖς
  english_pob_choice: for themselves
  chosen_spanish: para ellos mismos
  alternatives_spanish:
  - para sí mismos
  - por su propia cuenta
  lexicon: BDAG
  rationale: El dativo reflexivo se vierte de manera directa y natural en español. "Para ellos mismos" sigue la secuencia de destinatarios del versículo sin añadir matiz interpretativo.
theological_decisions:
- issue: Lenguaje corporativo masculino en υἱοῖς y ἀδελφοῖς
  english_pob_reading: Retain 'sons' and 'brothers' in the main text
  chosen_spanish_reading: Retener "hijos" y "hermanos" en el texto principal
  alternative_spanish_readings:
  - '"personas"'
  - '"exiliados"'
  - '"comunidad"'
  rationale: El griego usa términos masculinos con valor corporativo. En español, se conserva la forma fuente para no aplanar la referencia comunitaria y para mantener la trazabilidad auditada del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: πάσχα como sacrificio/fiesta sin añadir "cordero"
  english_pob_reading: The Passover here refers to the Passover sacrifice/observance; the Greek does not explicitly say 'lamb'.
  chosen_spanish_reading: '"La Pascua" como observancia/sacrificio pascual, sin añadir "cordero"'
  alternative_spanish_readings:
  - '"el cordero pascual"'
  - '"la víctima pascual"'
  rationale: El contexto sacrificial permite entender el rito, pero el texto griego no nombra el animal. Por eso se conserva el término general y se documenta la posible referencia sacrificial en nota.
  doctrine_reference: BDAG; audit trail de la POB en inglés
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el pase más reciente; el dictamen de revisión indicó alta concordancia y que no eran necesarios cambios sustanciales.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando el tetragrámaton aparezca; en este versículo no aparece.
  - '"Pascua" se usa como equivalente idiomático de πάσχα sin añadir explicaciones en el cuerpo del texto.'
  - Se conservan "hijos" y "hermanos" para reflejar el lenguaje corporativo masculino del original.
  - La puntuación y el orden de beneficiarios siguen de cerca la sintaxis griega, con adaptación natural al español.
