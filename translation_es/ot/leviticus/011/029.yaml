translation:
  language: es
  text: 'Y estas son inmundas para ustedes entre los seres que pululan sobre la tierra: el ratón topo[a], el ratón y el gran lagarto, según su especie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identidad precisa de חֹלֶד y צָב es incierta; entre las traducciones tradicionales se cuentan 'comadreja' o 'topo' para חֹלֶד, y 'tortuga' o simplemente 'lagarto' para צָב.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה
  english_pob_choice: And these are
  chosen_spanish: Y estas son
  alternatives_spanish:
  - Y esto es
  - Y estos son
  lexicon: HALOT
  rationale: Aunque זֶה es formalmente singular, introduce una lista plural. En español, 'estas son' conserva mejor la referencia deíctica y la fluidez natural ante la enumeración de animales.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ti
  lexicon: HALOT
  rationale: La relación covenantal con el destinatario plural se expresa de manera natural con 'para ustedes' en español latinoamericano.
- source_word: הַטָּמֵא
  english_pob_choice: unclean
  chosen_spanish: impuras
  alternatives_spanish:
  - inmundas
  - no puras
  lexicon: HALOT
  rationale: En Levítico, טָמֵא pertenece al campo ritual de pureza. 'Impuras' comunica ese estado de impureza ritual de forma clara y sobria en español.
- source_word: בַּשֶּׁרֶץ / הַשֹּׁרֵץ
  english_pob_choice: among the swarming things that swarm
  chosen_spanish: entre los seres que pululan
  alternatives_spanish:
  - entre los animales que pululan
  - entre los seres que se multiplican
  lexicon: HALOT
  rationale: 'Se preserva la raíz repetida con una solución natural en español: ''seres que pululan'' refleja la imagen de criaturas pequeñas que se mueven en gran número sin forzar un calco duro.'
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra firme
  - por la tierra
  lexicon: HALOT
  rationale: '''Tierra'' es una equivalencia directa y estilísticamente adecuada para אָרֶץ en este contexto de criaturas terrestres.'
- source_word: הַחֹלֶד
  english_pob_choice: the mole-rat
  chosen_spanish: el topo ratón
  alternatives_spanish:
  - el ratón-topo
  - la comadreja
  - el topo
  lexicon: HALOT
  rationale: La identificación zoológica es incierta. 'Topo ratón' intenta mantener el carácter de pequeño animal subterráneo sin afirmar con demasiada precisión una especie moderna concreta.
- source_word: הָעַכְבָּר
  english_pob_choice: the mouse
  chosen_spanish: el ratón
  alternatives_spanish:
  - la rata
  - el ratón de campo
  lexicon: HALOT
  rationale: עַכְבָּר se traduce de manera estándar como 'ratón'; en español, también puede abarcar roedores similares, pero 'ratón' es la opción más natural y reconocible.
- source_word: הַצָּב
  english_pob_choice: the great lizard
  chosen_spanish: el gran lagarto
  alternatives_spanish:
  - la tortuga
  - el lagarto
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa y el contexto de criaturas terrestres pequeñas, 'gran lagarto' conserva la incertidumbre del término sin retroceder a una identificación tradicional menos probable.
- source_word: לְמִינֵהוּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su género
  - de acuerdo con su clase
  lexicon: HALOT
  rationale: '''Según su especie'' transmite con claridad la fórmula clasificatoria מִין y funciona bien en español contemporáneo sin perder el sentido taxonómico.'
translation_notes:
  revision_awareness: Se siguió la decisión inglesa de conservar la incertidumbre zoológica de חֹלֶד y צָב, pero se adaptó la solución al español con términos naturales y sobrios. También se mantuvo la repetición semántica de la raíz de 'pulular' para reflejar el efecto del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo dice יהוה; aquí no aparece.
  - '''Impuras'' mantiene el registro ritual de pureza/impureza de Levítico.'
  - '''Según su especie'' conserva la fórmula de clasificación de manera consistente con otros pasajes de POB.'
