id: TIT.1.6
reference: Titus 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ τίς ἐστιν ἀνέγκλητος, μιᾶς γυναικὸς ἀνήρ, τέκνα ἔχων πιστά, μὴ ἐν κατηγορίᾳ ἀσωτίας ἢ ἀνυπότακτα.
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/006.yaml
  text: if anyone is above reproach[a], the husband of one wife[c][b], having faithful children not under accusation of debauchery or insubordinate.
  footnotes:
  - marker: a
    text: Or 'having believing children.' The Greek πιστά can mean 'faithful' or 'believing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a one-woman man.'
    reason: lexical_alternative
  - marker: c
    text: Or 'wild living' for 'debauchery.'
    reason: lexical_alternative
translation:
  language: ko
  text: 누구든지 책망할 것이 없고, 한 아내의 남편이며[b], 신실한[a] 자녀를 두되 그 자녀들이 방탕[c]의 책망을 받거나 순종하지 않는 일이 없는 자라야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿는」 자녀. 헬라어 πιστά는 「신실한」과 「믿는」 양쪽으로 읽힐 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「한 여자의 남자」. 헬라어 직역.
    reason: lexical_alternative
  - marker: c
    text: 또는 「방탕한 삶」. ἀσωτία는 절제 없는 방종한 삶을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέγκλητος
  english_pob_choice: above reproach
  chosen_korean: 책망할 것이 없고
  alternatives_korean:
  - 흠 잡을 데 없고
  - 비난받을 일이 없고
  lexicon: BDAG
  rationale: 법적·도덕적 책망의 근거가 없는 상태. 한국어 「책망할 것이 없다」는 직무 자격 문맥에서 정립된 표현.
- source_word: μιᾶς γυναικὸς ἀνήρ
  english_pob_choice: the husband of one wife
  chosen_korean: 한 아내의 남편
  alternatives_korean:
  - 한 여자의 남자
  - 일부일처의 남편
  lexicon: BDAG
  rationale: 헬라어 어구를 그대로 옮긴 형태가 가장 충실하다. 본 어구의 정확한 함의(중혼 금지·이혼 후 재혼 금지·도덕적 충실성 등)는 해석사적으로 분기하므로 본문은 직역을 유지한다.
- source_word: τέκνα ἔχων πιστά
  english_pob_choice: having faithful children
  chosen_korean: 신실한 자녀를 두되
  alternatives_korean:
  - 믿는 자녀를 두되
  - 충실한 자녀를 두되
  lexicon: BDAG
  rationale: πιστός는 「신실한」과 「믿는」 양의적이다. 부모의 양육·자녀의 인격을 강조하는 본문 흐름에서는 「신실한」이 더 포괄적이며, 각주로 「믿는」을 둔다.
- source_word: ἐν κατηγορίᾳ ἀσωτίας
  english_pob_choice: under accusation of debauchery
  chosen_korean: 방탕의 책망을 받거나
  alternatives_korean:
  - 방탕의 고발을 받거나
  - 무절제의 책망을 받거나
  lexicon: BDAG
  rationale: ἀσωτία는 절제 없는 무모한 삶을 가리킨다. 「방탕」이 정립된 한국어 어휘.
- source_word: ἀνυπότακτα
  english_pob_choice: insubordinate
  chosen_korean: 순종하지 않는
  alternatives_korean:
  - 거역하는
  - 통제되지 않는
  lexicon: BDAG
  rationale: ὑποτάσσω의 부정형. 자녀가 부모의 권위에 복종하지 않는 상태를 가리킨다.
