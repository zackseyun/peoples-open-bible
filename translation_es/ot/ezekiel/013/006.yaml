    issue: La conjunción final «y esperan» debilita el matiz adversativo contextual de וְיִחֲלוּ.
    rationale: 'Aunque el hebreo usa waw simple, en contexto el sentido es concesivo/adversativo: ellos no fueron enviados por Yahvé, y aun así esperan que su palabra resulte confirmada. El inglés POB lo auditó como «yet they hope». En español conviene reflejarlo en el texto principal.'
  - severity: low
