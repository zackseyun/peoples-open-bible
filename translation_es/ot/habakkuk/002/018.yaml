translation:
  language: es
  text: '¿Qué provecho tiene un ídolo[a] cuando su artífice lo ha tallado: una imagen fundida[b] y un maestro de mentira[c]? Porque el que lo forma confía en él, haciendo ídolos mudos[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘imagen tallada’; ‘ídolo’ hace explícito que el objeto tallado es objeto de falsa adoración.
    reason: lexical_alternative
  - marker: b
    text: O ‘imagen de fundición’.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘maestro de mentira’, probablemente personificando al ídolo como algo que engaña a sus adoradores.'
    reason: lexical_alternative
  - marker: d
    text: אֱלִילִים puede llevar el sentido de ‘ídolos sin valor’ o ‘nadas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה הוֹעִיל
  english_pob_choice: What profit is
  chosen_spanish: ¿De qué le aprovecha
  alternatives_spanish:
  - ¿Qué provecho tiene
  - ¿De qué sirve
  lexicon: HALOT
  rationale: La pregunta retórica pide por la utilidad o beneficio del ídolo; '¿De qué le aprovecha' conserva el sentido de provecho y suena natural en español contemporáneo.
- source_word: פֶּסֶל
  english_pob_choice: an idol
  chosen_spanish: un ídolo
  alternatives_spanish:
  - una imagen tallada
  - una imagen esculpida
  lexicon: HALOT
  rationale: פֶּסֶל puede referirse a una imagen tallada, pero en este contexto polémico el POB inglés explicita 'idol' para dejar claro el objeto de falsa adoración; 'ídolo' es el equivalente más directo en español.
- source_word: כִּי פְסָלוֹ יֹצְרוֹ
  english_pob_choice: when its maker has carved it
  chosen_spanish: cuando su artífice lo ha modelado
  alternatives_spanish:
  - pues su artífice lo ha tallado
  - porque su hacedor lo ha formado
  lexicon: HALOT
  rationale: El hebreo introduce la ironía del objeto fabricado por su propio creador; 'artífice' recoge el sentido de fabricante, y 'modelado' expresa la acción de dar forma sin restringirla solo al tallado en piedra o madera.
- source_word: יֹצְרוֹ
  english_pob_choice: its maker
  chosen_spanish: su artífice
  alternatives_spanish:
  - su hacedor
  - su formador
  lexicon: HALOT
  rationale: El participio de יצר señala al que forma o da forma; 'artífice' es natural y mantiene la idea de fabricación intencional.
- source_word: מַסֵּכָה
  english_pob_choice: a cast image
  chosen_spanish: una imagen fundida
  alternatives_spanish:
  - una imagen moldeada
  - una imagen de fundición
  lexicon: HALOT
  rationale: מַסֵּכָה alude a una imagen hecha por fundición, a menudo metal; 'imagen fundida' conserva el proceso de fabricación y es entendible para lectoras y lectores actuales.
- source_word: וּמוֹרֶה שָּׁקֶר
  english_pob_choice: and a teacher of lies
  chosen_spanish: y un maestro de mentira
  alternatives_spanish:
  - y un maestro de falsedad
  - y un enseñador de mentiras
  lexicon: HALOT
  rationale: La frase personifica al ídolo como algo que enseña engaño; 'maestro de mentira' preserva la metáfora y la fuerza polémica sin suavizarla.
- source_word: כִּי בָטַח
  english_pob_choice: For ... trusts
  chosen_spanish: Porque ... confía
  alternatives_spanish:
  - Pues ... confía
  - Ya que ... confía
  lexicon: HALOT
  rationale: El כי introduce la razón de la denuncia; 'Porque' mantiene el vínculo explicativo y el tono profético del pasaje.
- source_word: יֹצֵר יִצְרוֹ
  english_pob_choice: the one who formed it trusts in it
  chosen_spanish: el que lo forma confía en él
  alternatives_spanish:
  - el que lo modela confía en él
  - su formador confía en su obra
  lexicon: HALOT
  rationale: Se conserva la ironía del formado que es tratado como confiable. Evito 'obra de sus manos' porque el hebreo enfatiza el objeto formado mismo, no solo la labor del artesano.
- source_word: עָלָיו
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - en torno a
  lexicon: HALOT
  rationale: Con בטח, el español idiomático es 'confiar en'; así se refleja el sentido sin calcar la preposición hebrea.
- source_word: לַעֲשׂוֹת
  english_pob_choice: making
  chosen_spanish: haciendo
  alternatives_spanish:
  - para hacer
  - al hacer
  lexicon: HALOT
  rationale: El infinitivo expresa resultado/propósito; 'haciendo' fluye en español y mantiene la acción continua del artesano.
- source_word: אֱלִילִים
  english_pob_choice: mute idols
  chosen_spanish: ídolos mudos
  alternatives_spanish:
  - ídolos sin voz
  - ídolos inútiles
  lexicon: HALOT
  rationale: Se conserva el adjetivo pejorativo del hebreo, que señala incapacidad de hablar; 'mudos' es preciso y claro, y mantiene el paralelo con la mofa profética.
- source_word: אִלְּמִים
  english_pob_choice: mute
  chosen_spanish: mudos
  alternatives_spanish:
  - sin voz
  - callados
  lexicon: HALOT
  rationale: El adjetivo significa incapaz de hablar; 'mudos' es la opción más directa y natural en español.
theological_decisions:
- issue: Personificación del ídolo como 'maestro de mentira'
  english_pob_reading: The idol is described metaphorically as instructing falsehood through its deceptive religious function.
  chosen_spanish_reading: El ídolo aparece personificado como un 'maestro de mentira', conservando la ironía profética.
  alternative_spanish_readings:
  - El artesano es el maestro de mentira
  - Un falso maestro enseña por medio de la imagen
  rationale: La sintaxis del hebreo y la solución inglesa del POB juntan 'imagen fundida' y 'maestro de mentira' como descripciones del ídolo. La traducción española conserva esa personificación sin desplazarla al artesano ni convertirla en un comentario doctrinal más amplio.
  doctrine_reference: Cf. crítica profética a la idolatría en Isaías 44:9-20; Jeremías 10:8-16.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la revisión más reciente del POB inglés: mantiene la apposición sin coma innecesaria entre ''imagen fundida'' y ''maestro de mentira'', y refleja que el sujeto de ''confía en él'' es el formador que confía en el propio ídolo, no en una abstracción como ''su obra''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene 'ídolo' para פֶּסֶל conforme al marco del POB, con nota de alternativa literal.
  - Se conserva el tono polémico profético con 'maestro de mentira' y 'ídolos mudos'.
  - '''Confía en él'' sigue el hebreo y la revisión inglesa, evitando ampliar el objeto de confianza.'
  - La puntuación reproduce la relación appositiva del original y de la revisión auditada.
