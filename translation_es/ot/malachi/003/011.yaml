revisions:
- from: Y reprenderé al devorador[a] por ustedes, para que no destruya el fruto de la tierra para ustedes, ni la vid en el campo[b] les dé fruto defectuoso, dice Yahvé de los Ejércitos.
  to: Y reprenderé al devorador por ustedes, para que no destruya para ustedes el fruto de la tierra, ni la vid en el campo[a] pierda su fruto para ustedes, dice Yahvé de los ejércitos.
  rationale: Se corrige la cláusula de תְשַׁכֵּל para expresar pérdida del fruto, no fruto defectuoso; se elimina la nota defectuosa [a] del borrador y se conserva una sola nota útil sobre la imagen literal. También se ajusta la capitalización de «ejércitos» al uso natural del español.
