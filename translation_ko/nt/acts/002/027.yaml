  text: 주께서[a] 내 영혼을 하데스에[b] 버려두지 아니하시며, 주의 거룩한 자에게 썩음을 보지 않게 하실 것이기 때문이다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 16:10 인용. 이 부분은 다윗이 야훼께 드리는 직접 발화이므로 인용자 자신을 향한 호칭(2인칭)에서는 「주」를 그대로 살린다.
    reason: cross_reference
  - marker: b
    text: 또는 「스올」. 헬라어 ᾅδης는 죽은 자들의 영역을 가리키며, 최종 심판의 장소가 아니다. 히브리어 원문은 「스올」이다.
