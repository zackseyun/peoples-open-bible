  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales concuerdan con el expediente inglés: חוֹמָה = «muro», שָׁדַי = «mis pechos», כַּמִּגְדָּלוֹת = «como torres», בְּעֵינָיו = «a sus ojos», שָׁלוֹם = «la paz», con nota para el rango semántico.'
