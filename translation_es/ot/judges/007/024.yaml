  to: 'Y Gedeón envió mensajeros por toda la región montañosa de Efraín, diciendo: «Bajen contra Madián y apodérense de las aguas[a] hasta Bet-bará y el Jordán». Entonces todo hombre de Efraín[b] fue llamado[c], y se apoderaron de las aguas hasta Bet-bará y el Jordán.'
  rationale: Se ajustó la geografía a un español más fiel al sentido regional de הַר אֶפְרַיִם, se mejoró la naturalidad de la sintaxis, se sustituyó «y del Jordán» por «y el Jordán» para reflejar mejor la coordinación hebrea, y se añadió la nota faltante sobre el verbo difícil וַיִּצָּעֵק, en línea con el expediente auditado en inglés.
