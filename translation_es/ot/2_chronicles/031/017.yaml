base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/017.yaml
  text: The genealogical registration of the priests was by their fathers’ houses[a], and that of the Levites from twenty years old and upward[b], in their duties by their divisions.
  footnotes:
  - marker: a
    text: Or 'those enrolled by genealogy among the priests ... and the Levites.' The Hebrew is compressed and elliptical, so the English supplies a smoother administrative expression.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family groupings used for official registration and service organization.'
    reason: cultural_note
