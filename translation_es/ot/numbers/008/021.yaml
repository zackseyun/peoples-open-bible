translation:
  language: es
  text: Y los levitas se purificaron y lavaron sus vestidos; y Aarón los presentó como ofrenda mecida[a] delante de Yahvé, y Aarón hizo expiación por ellos para purificarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los meció como ofrenda mecida'. La expresión hebrea es la fórmula ritual estándar para presentar algo delante de Yahvé como תְּנוּפָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּֽתְחַטְּא֣וּ
  english_pob_choice: purified themselves
  chosen_spanish: se purificaron
  alternatives_spanish:
  - se limpiaron
  - se purificaron de impureza ritual
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el hitpael comunica una acción reflexiva de purificación ritual. 'Se purificaron' conserva la categoría cultual sin añadir explícitamente 'del pecado', que el hebreo de este versículo no formula de manera directa.
- source_word: הַ/לְוִיִּ֗ם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los de la tribu de Leví
  lexicon: HALOT
  rationale: El nombre colectivo del grupo se rinde de forma directa y estándar en español bíblico contemporáneo.
- source_word: וַֽ/יְכַבְּסוּ֙ בִּגְדֵי/הֶ֔ם
  english_pob_choice: washed their garments
  chosen_spanish: lavaron sus vestidos
  alternatives_spanish:
  - lavaron sus ropas
  - lavaron sus prendas
  lexicon: HALOT
  rationale: '''Vestidos'' mantiene el tono ritual y más formal de בְּגָדִים mejor que ''ropa'', y sigue de cerca la distinción lexical usada en el texto fuente.'
- source_word: וַ/יָּ֨נֶף ... תְּנוּפָ֖ה
  english_pob_choice: presented them as a wave offering
  chosen_spanish: los presentó como ofrenda mecida
  alternatives_spanish:
  - los meció como ofrenda mecida
  - los presentó como ofrenda mecida ante Yahvé
  lexicon: HALOT
  rationale: La expresión ritual de נוף + תְּנוּפָה se comunica en español con el término técnico 'ofrenda mecida'. Como el objeto directo son las mismas personas, 'los presentó' evita una imagen demasiado literal de movimiento físico sin perder el sentido cultual.
- source_word: לִ/פְנֵ֣י יְהוָ֑ה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según el criterio del proyecto, y 'delante de' reproduce con naturalidad la fórmula espacial/cultual de לִפְנֵי.
- source_word: וַ/יְכַפֵּ֧ר עֲלֵי/הֶ֛ם
  english_pob_choice: made atonement for them
  chosen_spanish: hizo expiación por ellos
  alternatives_spanish:
  - hizo propiciación por ellos
  - hizo expiación sobre ellos
  lexicon: HALOT
  rationale: '''Hizo expiación'' mantiene el valor sacerdotal de כפר sin forzar una sola equivalencia doctrinal en español. ''Por ellos'' sigue el sentido relacional del preposición עֲלֵי/הֶם en este contexto.'
- source_word: לְ/טַהֲרָֽ/ם
  english_pob_choice: to cleanse them
  chosen_spanish: para purificarlos
  alternatives_spanish:
  - para limpiarlos ritualmente
  - para dejarlos puros
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito o resultado. 'Purificarlos' evita la repetición exacta de 'se purificaron' sin perder el paralelo léxico entre טהר y la purificación ritual ya mencionada.
theological_decisions:
- issue: Distinguir purificación ritual, expiación y limpieza sin fusionarlas en una sola idea
  english_pob_reading: Use 'purified themselves,' 'made atonement,' and 'to cleanse them'
  chosen_spanish_reading: Use 'se purificaron,' 'hizo expiación' y 'para purificarlos'
  alternative_spanish_readings:
  - se limpiaron / hizo propiciación / para limpiarlos
  - se purificaron de impureza / hizo expiación / para dejarlos puros
  rationale: 'El versículo presenta tres acciones relacionadas pero no idénticas: la preparación de los levitas, el acto sacerdotal de Aarón y el efecto final de purificación. Mantener esas distinciones ayuda a no borrar la tensión terminológica del hebreo sacerdotal.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Renderización del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide 'Yahvé' como forma principal en español para יהוה. Se evita 'el SEÑOR' porque funcionaría como máscara y no como representación transparente del nombre propio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión en inglés retiró 'from sin' de 'purified themselves' porque el hebreo de este versículo habla de purificación/limpieza ritual, no de una formulación explícita de 'del pecado'. La redacción española sigue ese ajuste y mantiene la distinción entre purificación inicial, ofrenda mecida y expiación final.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' conforme al estándar del proyecto.
  - '''Ofrenda mecida'' se usa como término técnico para תְּנוּפָה y se explica en nota.'
  - '''Se purificaron'' y ''para purificarlos'' mantienen el campo semántico de טהר sin introducir ''pecado'' donde el texto no lo explicita.'
  - '''Hizo expiación'' preserva el lenguaje sacerdotal de כפר sin sustituirlo por una paráfrasis teológica.'
