translation:
  language: es
  text: 'Entonces su hermana dijo a la hija de Faraón: «¿Quieres que vaya y te llame a una mujer que esté amamantando[a] de entre las hebreas, para que amamante al niño para ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una nodriza de entre las hebreas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: WLC/HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» conserva la secuencia narrativa con fluidez natural en español.
- source_word: אֲחֹתוֹ
  english_pob_choice: his sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana del niño
  - la hermana de Moisés
  lexicon: WLC/HALOT
  rationale: El sufijo masculino singular se mantiene de forma directa e implícita, como en el hebreo; el referente se entiende por el contexto inmediato.
- source_word: בַּת פַּרְעֹה
  english_pob_choice: Pharaoh’s daughter
  chosen_spanish: la hija de Faraón
  alternatives_spanish:
  - la hija del Faraón
  lexicon: WLC/HALOT
  rationale: La construcción hebrea se vierte con la relación genitiva natural del español. Se mantiene «Faraón» como nombre/título propio reconocido.
- source_word: הַאֵלֵךְ
  english_pob_choice: Shall I go
  chosen_spanish: ¿Iré?
  alternatives_spanish:
  - ¿Puedo ir?
  - ¿Me dejarás ir?
  lexicon: WLC/HALOT
  rationale: La forma interrogativa con imperfecto de primera persona expresa propuesta/ofrecimiento; en español, «¿Iré?» conserva esa apertura sin añadir matices no explícitos.
- source_word: וְקָרָאתִי
  english_pob_choice: and call
  chosen_spanish: y llamaré
  alternatives_spanish:
  - y convocaré
  - y buscaré
  lexicon: WLC/HALOT
  rationale: קרא aquí es «llamar»/«convocar». «Llamaré» es el equivalente más transparente y natural.
- source_word: אִשָּׁה מֵינֶקֶת
  english_pob_choice: a nursing woman
  chosen_spanish: una mujer que amamante
  alternatives_spanish:
  - una nodriza
  - una mujer lactante
  lexicon: WLC/HALOT
  rationale: La frase literal describe a una mujer que está amamantando o capacitada para hacerlo. Se evita «nodriza» por ser más tradicional y menos transparente; «amamante» preserva la fuerza verbal de ינק.
- source_word: מִן הָעִבְרִיֹּת
  english_pob_choice: from the Hebrew women
  chosen_spanish: de entre las hebreas
  alternatives_spanish:
  - de las hebreas
  - entre las hebreas
  lexicon: WLC/HALOT
  rationale: La preposición indica procedencia/grupo. «De entre» comunica mejor la selección dentro del grupo, como en la nota inglesa alternativa «among».
- source_word: וְתֵינִק
  english_pob_choice: so that she may nurse
  chosen_spanish: para que ella críe
  alternatives_spanish:
  - para que ella amamante
  - y amamantará
  lexicon: WLC/HALOT
  rationale: El hebreo expresa finalidad/resultado. «Criar» en español abarca el cuidado del infante en contexto y evita una redundancia pesada con el verbo anterior; se conserva la posibilidad de amamantamiento sin reducir el sentido al acto físico únicamente.
- source_word: הַיָּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el niño pequeño
  - el infante
  - el niño/a
  lexicon: WLC/HALOT
  rationale: El contexto identifica al bebé varón; «niño» es natural en español y no sobreespecifica edad de manera innecesaria.
theological_decisions:
- issue: Referencia del posesivo en «su hermana»
  english_pob_reading: his sister
  chosen_spanish_reading: su hermana
  alternative_spanish_readings:
  - la hermana del niño
  - la hermana de Moisés
  rationale: Se conserva la referencia implícita del hebreo sin explicitar más de lo que el texto hace. El antecedente se entiende por el contexto narrativo inmediato, sin perder la tensión de identificación progresiva.
  doctrine_reference: No aplica; decisión narrativa/textual.
- issue: Relación entre amamantar y criar
  english_pob_reading: a nursing woman ... so that she may nurse the child
  chosen_spanish_reading: una mujer que amamante ... para que ella críe
  alternative_spanish_readings:
  - una mujer que amamante ... para que ella amamante al niño
  - una nodriza ... para que ella críe
  rationale: El hebreo presenta una mujer que amamante/succiona y la finalidad de que el niño sea alimentado por ella. En español, «críe» puede abarcar el cuidado integral del bebé y, en este contexto, no niega el acto de amamantar; además evita que la repetición suene forzada. La nota del POB inglés conserva la alternativa más literal.
  doctrine_reference: No aplica; decisión semántica contextual.
translation_notes:
  revision_awareness: 'Se ha seguido el pasaje fuente hebreo con apoyo del audit trail inglés: se mantiene la progresión narrativa de la waw consecutiva, la referencia implícita del posesivo, la idea de procedencia «de entre las hebreas» y la finalidad del verbo final. La versión española adopta una equivalencia óptima: conserva el sentido lexical central y la fluidez natural sin introducir explicaciones no presentes en el texto.'
  spanish_consistency_notes:
  - Se usa «Faraón» como nombre/título propio en lugar de una forma reverencial sustitutiva.
  - Se conserva la referencia implícita del hebreo en «su hermana».
  - Se prefirió «amamante» en el cuerpo y se reservó «nodriza» como alternativa en nota para reflejar el matiz léxico del original.
  - Se evitó «Señor» o equivalentes de máscara porque no aparece el Tetragrámaton en este versículo.
  - La puntuación de diálogo sigue el español moderno con comillas angulares y dos puntos narrativos.
