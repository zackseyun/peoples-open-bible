- from: Presta atención, para que no resbales en ello[a], para que no caigas delante de uno que está al acecho.
  to: Ten cuidado, no sea que resbales en ella[a], no sea que caigas delante de alguien que está al acecho.
  rationale: Se ajusta el pronombre a «ella» para reflejar ἐν αὐτῇ y la nota auditada sobre el antecedente femenino contextual. También se mejora la naturalidad y precisión admonitoria con «Ten cuidado» y «no sea que», y se pule «uno» a «alguien» para un español más fluido sin alterar el sentido.
  reviewer_model: gpt-5.4
