translation:
  language: es
  text: El pecado de Judá está escrito con un estilete de hierro; con punta de diamante[a] está grabado en la tabla de su corazón y en los cuernos de vuestros altares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'punta de adamante'; la identidad exacta de שָׁמִיר es incierta y alude, en general, a una sustancia extremadamente dura usada para grabar.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - culpa
  lexicon: HALOT
  rationale: En contexto profético de acusación, el término apunta a la culpa moral de Judá, no a una ofrenda. 'Pecado' conserva esa referencia y resulta natural en español bíblico moderno.
- source_word: כְּתוּבָה
  english_pob_choice: is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - escrito está
  - está inscrito
  lexicon: HALOT
  rationale: El participio expresa un estado resultante y duradero; 'está escrito' comunica bien esa permanencia sin añadir matiz no sustentado.
- source_word: עֵט
  english_pob_choice: stylus
  chosen_spanish: cálamo
  alternatives_spanish:
  - estilete
  - pluma
  - instrumento de escritura
  lexicon: HALOT
  rationale: Como el contexto habla de grabar con hierro y piedra dura, se trata de un instrumento de inscripción, no de una pluma moderna. 'Cálamo' funciona en español bíblico como herramienta de escritura/inscripción, aunque el soporte aquí sea duro.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - de hierro
  lexicon: HALOT
  rationale: Traducción directa y transparente del material, que mantiene la fuerza de permanencia y dureza de la imagen.
- source_word: צִפֹּרֶן
  english_pob_choice: point
  chosen_spanish: punta
  alternatives_spanish:
  - extremo
  - filo
  - punta de grabado
  lexicon: HALOT
  rationale: Aquí designa la punta del instrumento de grabar. 'Punta' conserva el sentido funcional y evita una traducción demasiado literal como 'uña' o 'garra'.
- source_word: שָׁמִיר
  english_pob_choice: diamond
  chosen_spanish: diamante
  alternatives_spanish:
  - adamante
  - piedra durísima
  - esmeril
  lexicon: HALOT
  rationale: La identificación exacta es incierta, pero el sentido es el de una sustancia extremadamente dura para grabar. 'Diamante' sigue la decisión del POB inglés y es la equivalente moderna más clara; la incertidumbre se conserva en nota.
- source_word: חֲרוּשָׁה
  english_pob_choice: it is engraved
  chosen_spanish: está grabado
  alternatives_spanish:
  - está inciso
  - está labrado
  lexicon: HALOT
  rationale: El participio pasivo intensifica la imagen de inscripción permanente. 'Está grabado' comunica ese carácter fijo y la acción de incidir en una superficie dura.
- source_word: ל֣וּחַ לִבָּם
  english_pob_choice: the tablet of their heart
  chosen_spanish: la tabla de su corazón
  alternatives_spanish:
  - la tabla de su mente
  - la tabla de su interior
  lexicon: HALOT
  rationale: '''Tabla'' conserva la metáfora de inscripción; ''su corazón'' respeta el sufijo colectivo de tercera persona sin forzar un plural en español, y mantiene el centro afectivo y volitivo del hebreo.'
- source_word: קַרְנוֹת
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - haces
  - puntas
  - salientes
  lexicon: HALOT
  rationale: En el contexto cultual se trata de los cuernos del altar. El término literal debe preservarse para no perder el elemento técnico del santuario.
- source_word: מִזְבְּחוֹתֵיכֶם
  english_pob_choice: your altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - vuestros altares
  - tus altares
  lexicon: HALOT
  rationale: El texto hebreo cambia de tercera persona a segunda persona plural. En español, 'sus' mantiene una referencia colectiva compatible con el cambio retórico, aunque no reproduce con total nitidez el golpe de la segunda persona; por eso se explica en la decisión teológica.
theological_decisions:
- issue: Cambio de referencia pronominal de tercera a segunda persona
  english_pob_reading: 'Retain the Hebrew shift: ''their heart'' ... ''your altars'''
  chosen_spanish_reading: Mantener la transición retórica, expresando 'su corazón' ... 'sus altares' como referencia colectiva de Judá, con nota sobre el giro al hablarles directamente.
  alternative_spanish_readings:
  - la tabla de su corazón ... en los cuernos de vuestros altares
  - la tabla de su corazón ... en los cuernos de sus altares
  rationale: El hebreo conserva un contraste deliberado entre hablar de Judá en tercera persona y dirigirse después a ellos en segunda persona. En español, 'sus altares' permite una lectura colectiva fluida, pero la nota debe advertir que el original intensifica la acusación con un giro directo al oyente.
  doctrine_reference: Retórica profética y discurso directo en el texto masorético
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el expediente inglés del POB, conservando la imaginería de inscripción permanente, la dureza del instrumento y la tensión retórica del pasaje. Se evita suavizar la acusación o sustituir el vocabulario técnico del altar por formulaciones más devocionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el Tetragrámaton en la forma visible del texto.
  - '''Tabla'' se conserva para reproducir la metáfora de una superficie destinada a ser grabada.'
  - '''Cuernos'' mantiene el sentido cultual técnico del altar.'
  - La nota sobre שָׁמִיר preserva la incertidumbre léxica del original sin fijar indebidamente una identificación mineral única.
