translation:
  language: es
  text: maravillas en la tierra de Cam[a], cosas asombrosas junto al mar Rojo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cam» es un nombre poético para Egipto en este contexto.
    reason: cultural_note
  - marker: b
    text: Hebreo «Yam Suf»; tradicionalmente, «mar Rojo». Alternativamente, «mar de Juncos».
