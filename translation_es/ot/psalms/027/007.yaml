translation:
  language: es
  text: Escucha[a], Yahvé, mi voz cuando clamo; muéstrate favorable conmigo[b] y respóndeme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Escucha, oh Yahvé, mi voz cuando clamo». También podría expresarse más dinámicamente: «cuando clamo en voz alta».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ten misericordia de mí». El verbo hebreo puede expresar favor o gracia inmerecida; «muéstrate favorable conmigo» procura reflejar ese matiz más directamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha, Yahvé
  lexicon: HALOT
  rationale: El imperativo pide atención directa y urgente en oración. «Escucha» comunica bien la súplica y suena natural en español, manteniendo el tono formal sin volverse arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» reproduce el Tetragrámaton sin máscara litúrgica. En español es la forma más estable dentro del marco dado.'
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: cuando clamo
  alternatives_spanish:
  - mi voz
  - cuando clamo con mi voz
  - cuando alzo mi voz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi voz», pero en este contexto de súplica la expresión funciona como un modismo de oración audible. Se optó por «cuando clamo» para evitar una construcción pesada en español y conservar el sentido pragmático que el audit trail reconoce.
- source_word: אֶקְרָא
  english_pob_choice: when I cry
  chosen_spanish: cuando clamo
  alternatives_spanish:
  - cuando llamo
  - cuando grito
  - cuando invoco
  lexicon: HALOT
  rationale: קרא aquí expresa el acto de invocar o clamar a Dios. «Clamo» preserva el sentido de llamada urgente y se integra bien con el verso en español.
- source_word: וְחָנֵּנִי
  english_pob_choice: be gracious to me
  chosen_spanish: sé bondadoso conmigo
  alternatives_spanish:
  - ten gracia de mí
  - muéstrate favorable conmigo
  - ten misericordia de mí
  lexicon: HALOT
  rationale: El verbo חנן pide favor inmerecido. Se evitó «ten misericordia» porque en español suele acercarse más a רחם; «sé bondadoso conmigo» transmite la idea de gracia/favor con claridad y sin perder dignidad.
- source_word: וַעֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - hazme respuesta
  lexicon: HALOT
  rationale: ענה en esta oración significa responder. «Respóndeme» es la equivalencia natural y directa en español para la petición final del salmo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. Conforme al criterio del proyecto, se conserva el nombre propio divino en vez de sustituirlo por un título. «Yahvé» mantiene la referencia al pacto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue el ajuste reciente del audit trail para evitar una versión demasiado literal de «con mi voz» y refleja el giro más natural «cuando clamo», manteniendo el tono de oración directa y la precisión semántica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con el estándar del proyecto.
  - Se eligió «clamo» para unir en español la noción de voz y llamada urgente sin añadir explicaciones que el hebreo no exige.
  - «Respóndeme» preserva la brevedad paralela del final hebreo.
  - El registro es reverente pero moderno, sin depender de fórmulas tradicionales como «SEÑOR» o «misericordia» salvo cuando el hebreo lo requiriera.
