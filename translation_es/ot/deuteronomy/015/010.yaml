review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato enfático de dar, prohibición de una mala disposición interior al dar, causalidad de la bendición divina, y las dos esferas finales de bendición. También respeta correctamente יהוה como «Yahvé». Sin embargo, «no se entristecerá tu corazón» no representa con suficiente precisión el matiz de וְלֹא יֵרַע לְבָבְךָ en este contexto, que apunta a dar sin mezquindad, resentimiento o mala gana, no simplemente a tristeza.'
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos puntos mejorables: «darás sin falta a él» suena menos natural que «ciertamente le darás» o «de veras le darás»; y «no se entristecerá tu corazón» suena algo rígido y semánticamente desviado. «En toda tu obra» es aceptable, pero «en todo tu trabajo» sería más idiomático; aun así, «obra» puede mantenerse por amplitud semántica. La frase final con «lo que emprendas con tu mano» es comprensible y digna.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה → «Yahvé» correctamente; אֱלֹהֶיךָ → «tu Dios» correctamente. No hay términos doctrinales conflictivos adicionales. La principal desalineación es lexical: el inglés auditado fijó «grudging», y el hebreo favorece una idea de mezquindad/resentimiento al dar más que mera tristeza.'
  issues:
  - severity: medium
    issue: «no se entristecerá tu corazón» debilita o desvía el sentido de וְלֹא יֵרַע לְבָבְךָ
    rationale: En Deut 15:10 el contexto es el acto de dar al necesitado. El hebreo aquí no describe solo aflicción emocional sino una reacción interior negativa de mala gana, resentimiento o mezquindad. «Entristecerse» puede sonar a pesar legítimo, mientras que el texto prohíbe una disposición tacaña o resentida.
  - severity: low
    issue: «Darás sin falta a él» es poco natural en español
    rationale: Aunque preserva el énfasis de נָתוֹן תִּתֵּן, el orden y la construcción suenan calcados. «Ciertamente le darás» conserva mejor la fuerza y mejora la fluidez.
  - severity: low
    issue: La nota b ofrece «no te dolerá el corazón», formulación poco idiomática
    rationale: Como alternativa española suena forzada y menos precisa que opciones como «no será mezquino tu corazón» o «no darás de mala gana».
  revised_spanish_text: Ciertamente le darás[a], y tu corazón no será mezquino[b] cuando le des; porque por causa de esto Yahvé tu Dios te bendecirá en toda tu obra y en todo lo que emprendas con tu mano[c].
  revised_footnotes:
