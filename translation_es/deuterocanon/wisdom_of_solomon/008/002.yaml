translation:
  language: es
  text: La amé y la busqué desde mi juventud, y busqué tomarla como esposa[a], y me hice amante de su belleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "busqué tomarla como esposa para mí".'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταύτην
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - esta
  lexicon: LSJ
  rationale: El griego remite a la Sabiduría personificada en femenino; en español, el pronombre átono femenino conserva esa referencia natural sin volver la frase rígida.
- source_word: ἐφίλησα
  english_pob_choice: loved
  chosen_spanish: la amé
  alternatives_spanish:
  - la quise
  - la amé entrañablemente
  lexicon: LSJ
  rationale: Aquí el verbo expresa afecto intenso hacia una persona personificada, no un beso literal. 'La amé' comunica bien la fuerza afectiva y es idiomático en español.
- source_word: ἐξεζήτησα
  english_pob_choice: sought ... out
  chosen_spanish: la busqué
  alternatives_spanish:
  - la busqué con empeño
  - la indagué
  lexicon: LSJ
  rationale: El compuesto intensifica la búsqueda. En español, 'busqué' ya funciona de manera natural; el contexto de la frase completa conserva la perseverancia de la acción. Se evita una sobrecarga como 'busqué con empeño' por no ser necesaria.
- source_word: ἐκ νεότητός μου
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - desde joven
  lexicon: LSJ
  rationale: '''Desde mi juventud'' refleja con claridad el valor temporal de la expresión griega y su continuidad desde esa etapa hasta el presente.'
- source_word: ἐζήτησα
  english_pob_choice: I sought
  chosen_spanish: quise
  alternatives_spanish:
  - busqué
  - deseé
  lexicon: LSJ
  rationale: En la cláusula de matrimonio, el verbo de búsqueda se orienta a una intención concreta. 'Quise tomarla por mi esposa' transmite la finalidad matrimonial sin perder el matiz de deseo y propósito.
- source_word: νύμφην
  english_pob_choice: my bride
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi novia
  - mi prometida
  lexicon: LSJ
  rationale: Aunque el griego dice 'novia/esposa joven' con imaginería nupcial, en español 'mi esposa' comunica el sentido marital de manera clara y digna. 'Mi novia' sería demasiado moderno y reduciría el tono poético; 'mi prometida' introduciría una etapa no explícita en el texto.
- source_word: ἀγαγέσθαι ἐμαυτῷ
  english_pob_choice: to take ... as my bride
  chosen_spanish: tomarla por mi esposa
  alternatives_spanish:
  - tomarla como esposa
  - casarme con ella
  lexicon: LSJ
  rationale: La locución griega es un idiomatismo matrimonial. 'Tomarla por mi esposa' conserva la imagen de adquisición/matrimonio sin volverla mecánica. Se evita 'casarme con ella' porque desplaza el énfasis del sujeto sobre la esposa y atenúa el paralelo poético.
- source_word: ἐραστὴς
  english_pob_choice: a lover
  chosen_spanish: amante
  alternatives_spanish:
  - enamorado
  - admirador
  lexicon: LSJ
  rationale: '''Amante'' mantiene la intensidad afectiva del sustantivo griego y el registro poético del versículo. ''Enamorado'' sería más interpretativo y menos denso; ''admirador'' debilitaría el matiz amoroso.'
- source_word: τοῦ κάλλους αὐτῆς
  english_pob_choice: of her beauty
  chosen_spanish: de su belleza
  alternatives_spanish:
  - de su hermosura
  - de su hermosor
  lexicon: LSJ
  rationale: '''Belleza'' es la correspondencia directa y más natural para κάλλος. En español también conserva el tono contemplativo y atractivo del original.'
theological_decisions:
- issue: Sabiduría personificada con lenguaje nupcial y amoroso
  english_pob_reading: Retain feminine personal language and bridal imagery straightforwardly
  chosen_spanish_reading: Mantener el femenino personal y la imaginería nupcial sin abstraerla
  alternative_spanish_readings:
  - Valorarla como sabiduría de manera abstracta
  - Suavizar el lenguaje amoroso para evitar connotaciones eróticas
  rationale: El texto griego personifica la Sabiduría como mujer y recurre explícitamente a la búsqueda amorosa y matrimonial. En español conviene conservar esa tensión poética en vez de resolverla con abstracciones, porque eso preserva el peso literario y teológico del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión que eliminó 'for myself' por redundante. En español, ese matiz reflexivo ya queda naturalizado en 'tomarla por mi esposa', por lo que no se añadió una expresión equivalente innecesaria. También se tuvo en cuenta que el inglés conserva la personificación femenina de la Sabiduría y el lenguaje nupcial sin suavizarlos.
  spanish_consistency_notes:
  - Se mantuvo 'Sabiduría' como referente implícito femenino mediante pronombres y posesivos femeninos, acorde con el contexto inmediato del libro.
  - Se prefirió 'desde mi juventud' para conservar la marca temporal simple y elegante del griego.
  - '''Amante'' se eligió como equivalente fuerte de ἐραστὴς, en consonancia con el tono poético del verso.'
  - La nota al pie refleja la alternativa léxica principal preservada por el inglés POB para la locución matrimonial griega.
