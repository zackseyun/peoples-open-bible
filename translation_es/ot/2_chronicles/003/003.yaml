translation:
  language: es
  text: 'Estas son los cimientos[a] que Salomón echó para edificar la casa de Dios: la longitud, en codos, según la medida anterior[b], era de sesenta codos, y la anchura de veinte codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fundamentos». El hebreo de «cimientos/echó» es algo difícil, y también puede entenderse como la base o disposición fundacional para la obra de construcción.
    reason: lexical_alternative
  - marker: b
    text: Es decir, conforme a una medida anterior o más antigua del codo; el hebreo deja abierto el referente histórico exacto.
    reason: cultural_note
lexical_decisions:
- source_word: הוּסַד
  english_pob_choice: foundations / laid
  chosen_spanish: fundamentos
  alternatives_spanish:
  - cimientos
  - fundamentos puestos
  lexicon: HALOT
  rationale: El hebreo de יסד en esta construcción es difícil y, según la auditoría en inglés, puede referirse a los fundamentos o a lo que Salomón estableció para la obra. «Fundamentos» mantiene la ambigüedad útil entre base arquitectónica y disposición fundacional, y funciona bien con el plural que introduce la oración.
- source_word: לִבְנוֹת
  english_pob_choice: for building
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - al edificar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para edificar» conserva el propósito y encaja con un registro bíblico natural en español sin perder precisión.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: Se sigue de cerca la imagen hebrea de «casa» y no se sustituye por «templo» porque el texto fuente usa el sustantivo בית. «La casa de Dios» es claro y fiel al idiomático original.
- source_word: הָאֹרֶךְ
  english_pob_choice: the length
  chosen_spanish: la longitud
  alternatives_spanish:
  - la medida del largo
  - el largo
  lexicon: HALOT
  rationale: Término arquitectónico estándar; «longitud» es preciso y sobrio en español contemporáneo.
- source_word: אַמּוֹת
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos de medida
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para no convertirla ni explicitarla indebidamente.
- source_word: בַּמִּדָּה הָרִאשׁוֹנָה
  english_pob_choice: according to the former measure
  chosen_spanish: según la medida anterior
  alternatives_spanish:
  - según la medida antigua
  - de acuerdo con la medida anterior
  lexicon: HALOT
  rationale: «La medida anterior» reproduce el sentido de un estándar previo sin fijar más de lo que el hebreo permite. Evita forzar una interpretación histórica específica y mantiene la tensión lexical documentada en la fuente.
- source_word: שִׁשִּׁים
  english_pob_choice: sixty
  chosen_spanish: sesenta
  lexicon: HALOT
  rationale: Número cardinal directo y sin variación interpretativa.
- source_word: וְרֹחַב
  english_pob_choice: and the width
  chosen_spanish: y la anchura
  alternatives_spanish:
  - y el ancho
  lexicon: HALOT
  rationale: «Anchura» mantiene paralelismo formal con «longitud» y conserva el tono medido del pasaje arquitectónico.
- source_word: עֶשְׂרִים
  english_pob_choice: twenty
  chosen_spanish: veinte
  lexicon: HALOT
  rationale: Número cardinal directo para la anchura del edificio.
theological_decisions:
- issue: Divine-name rendering in בית הָאֱלֹהִים
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - la casa del Señor
  - el templo de Dios
  rationale: No hay כאן un tetragrámaton ni un κύριος griego a resolver; el hebreo dice explícitamente אֱלֹהִים. Por eso se traduce «Dios» sin sustitución devocional por «Señor».
  doctrine_reference: Terminología bíblica básica; fidelidad al nombre/título del texto fuente
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que suaviza la sintaxis a «the foundations Solomon laid for building the house of God» y conserva «according to the former measure». La versión española refleja esa redacción revisada sin perder la ambigüedad lexical del verbo יסד ni la referencia a la medida anterior.
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» conforme al hebreo בית הָאֱלֹהִים y al criterio del proyecto de no enmascarar el título con «Señor».
  - «Codos» se conservó como unidad de medida antigua, paralela al inglés POB.
  - 'La estructura general sigue el orden informativo del original: introducción, finalidad, identificación del edificio y dimensiones.'
  - Se evitó traducir mecánicamente desde el inglés cuando el español permitía una formulación más natural sin alterar la base hebrea.
