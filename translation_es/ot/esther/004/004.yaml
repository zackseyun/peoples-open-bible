translation:
  language: es
  text: Las jóvenes que atendían a Ester y sus eunucos vinieron y le informaron[a]; y la reina quedó muy angustiada. Envió prendas para vestir a Mardoqueo y para quitarle su cilicio[c][b], pero él no las aceptó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus asistentes femeninas'; el hebreo dice literalmente 'las jóvenes de Ester'.
    reason: lexical_alternative
  - marker: b
    text: '''Eunucos'' puede en algunos contextos designar funcionarios de la corte; aquí, por el ambiente palaciego de Ester, el sentido más probable es el más específico.'
    reason: cultural_note
  - marker: c
    text: '''Cilicio'' traduce el hebreo para una prenda tosca usada como señal de duelo, aflicción o humillación.'
    reason: cultural_note
lexical_decisions:
- source_word: נַעֲר֨וֹת אֶסְתֵּר
  english_pob_choice: Esther’s young women
  chosen_spanish: las jóvenes de Ester
  alternatives_spanish:
  - las sirvientas de Ester
  - las doncellas de Ester
  - las mujeres jóvenes de Ester
  lexicon: HALOT
  rationale: נעָרוֹת en este contexto palaciego puede referirse a acompañantes femeninas de Ester. 'Jóvenes' mantiene la correspondencia más directa con el hebreo y suena natural en español; 'sirvientas' explicita función, pero introduce más interpretación.
- source_word: וְסָרִיסֶיהָ
  english_pob_choice: and her eunuchs
  chosen_spanish: sus eunucos
  alternatives_spanish:
  - sus funcionarios
  - sus oficiales de la corte
  lexicon: HALOT
  rationale: En el marco persa de Ester, סָרִיסִים se entiende mejor como eunucos de palacio, no simplemente funcionarios. 'Eunucos' conserva el sentido histórico y lexical; las alternativas suavizan demasiado el término.
- source_word: וַיַּגִּידוּ לָהּ
  english_pob_choice: came and told her
  chosen_spanish: vinieron y le informaron
  alternatives_spanish:
  - vinieron y le dijeron
  - le comunicaron
  - le informaron
  lexicon: HALOT
  rationale: El hebreo combina movimiento y comunicación. 'Vinieron y le informaron' preserva ambos elementos y evita una paraphrasis excesiva; 'le dijeron' sería más coloquial.
- source_word: וַתִּתְחַלְחַל
  english_pob_choice: was greatly distressed
  chosen_spanish: quedó muy angustiada
  alternatives_spanish:
  - se estremeció mucho
  - quedó profundamente conmovida
  - se perturbó grandemente
  lexicon: HALOT
  rationale: El verbo expresa agitación intensa. 'Angustiada' comunica bien la conmoción emocional en español contemporáneo; 'estremeció' sería más físico y menos claro en este contexto.
- source_word: הַמַּלְכָּה
  english_pob_choice: the queen
  chosen_spanish: la reina
  alternatives_spanish:
  - la reina Ester
  lexicon: HALOT
  rationale: El título definido apunta a Ester en su papel real. 'La reina' es suficiente y fiel; añadir 'Ester' sería redundante.
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropa
  - prendas
  - vestiduras
  lexicon: HALOT
  rationale: '''Vestidos'' funciona como plural genérico de ropa en español y mantiene un tono digno. ''Vestiduras'' suena más litúrgico; ''ropa'' es demasiado coloquial.'
- source_word: לְהַלְבִּישׁ אֶת מָרְדֳּכַי
  english_pob_choice: to clothe Mordecai
  chosen_spanish: para vestir a Mardoqueo
  alternatives_spanish:
  - para vestirlo a Mardoqueo
  - para ponerle ropa a Mardoqueo
  lexicon: HALOT
  rationale: El infinitivo de finalidad se expresa naturalmente con 'para'. 'Vestir a Mardoqueo' conserva la acción sin sobreexplicar; 'clothe' en español suena más forzado que 'vestir'.
- source_word: וּלְהָסִיר שַׂקּוֹ מֵעָלָיו
  english_pob_choice: and to remove his sackcloth from him
  chosen_spanish: y para quitarle su cilicio
  alternatives_spanish:
  - y para quitarle el cilicio
  - y para quitarle la ropa de luto
  - y para retirarle su saco
  lexicon: HALOT
  rationale: שַׂק es el saco de penitencia/luto; en español bíblico 'cilicio' comunica el valor cultural del atuendo de duelo. 'Saco' podría sonar como bolsa; 'ropa de luto' pierde la especificidad del término.
- source_word: שַׂקּוֹ
  english_pob_choice: his sackcloth
  chosen_spanish: su cilicio
  alternatives_spanish:
  - su saco de luto
  - su ropa áspera de duelo
  lexicon: HALOT
  rationale: '''Cilicio'' es el equivalente tradicional y preciso del atuendo áspero de humillación y duelo. Aunque menos cotidiano, evita confusión con otros tipos de ropa.'
- source_word: וְלֹא קִבֵּל
  english_pob_choice: but he did not accept them
  chosen_spanish: pero él no los aceptó
  alternatives_spanish:
  - pero no los recibió
  - pero se negó a aceptarlos
  lexicon: HALOT
  rationale: El verbo puede implicar rechazo. 'No los aceptó' sigue de cerca el sentido de negativa; 'recibió' es más débil y 'se negó' añade explícitamente una intención no expresada.
theological_decisions:
- issue: 'Término de duelo/aflicción: שַׂק / sackcloth / cilicio'
  english_pob_reading: Sackcloth was a coarse garment worn as a sign of mourning, grief, or humiliation.
  chosen_spanish_reading: cilicio como prenda áspera de luto, duelo y humillación
  alternative_spanish_readings:
  - ropa de luto
  - saco
  - vestidura de humillación
  rationale: 'No hay un problema doctrinal, pero sí cultural-teológico: el atuendo señala duelo público y aflicción. ''Cilicio'' conserva la carga simbólica que la traducción inglesa anotó y evita borrar la señal visible de lamento.'
  doctrine_reference: Contexto bíblico de duelo y humillación; cf. señal de luto en narrativas y profetas.
translation_notes:
  revision_awareness: 'La versión inglesa revisada añadió un segundo ''to'' para equilibrar el paralelismo entre ''to clothe'' y ''to remove''. En español se conserva ese paralelismo con dos infinitivos de finalidad coordinados: ''para vestir'' y ''para quitarle''.'
  spanish_consistency_notes:
  - Se mantuvo 'Mardoqueo' como forma española consistente con la tradición bíblica y el nombre propio del libro de Ester.
  - Se usó 'la reina' para הַמַּלְכָּה, sin añadir el nombre propio, porque el contexto ya identifica a Ester.
  - Se evitó 'SEÑOR' o cualquier máscara nominal, ya que este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se preservó la fuerza concreta de 'cilicio' en lugar de diluirla en 'ropa de luto', siguiendo el valor ritual del hebreo.
