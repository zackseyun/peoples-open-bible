  yaml_path: translation/deuterocanon/3_maccabees/004/006.yaml
  text: And the young women who had just entered the bridal chamber for the sharing of life in marriage[a], taking up lamentation instead of joy, and with their perfume-drenched hair smeared with dust, were being led away unveiled, and with one accord raised a dirge instead of wedding songs[c][b], as though torn apart by abuse from foreigners.
