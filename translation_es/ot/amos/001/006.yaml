base_translation:
  language: en
  yaml_path: translation/ot/amos/001/006.yaml
  text: 'Thus says Yahweh: “For three transgressions of Gaza[a], and for four, I will not revoke it[b], because they carried into exile a whole people to hand them over to Edom.”'
  footnotes:
  - marker: a
    text: 'Hebrew: ''I will not turn it back''; the sense in this judgment formula is that the LORD will not revoke the announced punishment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they exiled a whole captivity'—that is, they deported an entire population or full company of captives.
    reason: lexical_alternative
