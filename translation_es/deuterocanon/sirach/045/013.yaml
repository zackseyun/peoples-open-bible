translation:
  language: es
  text: Antes de él no hubo tales vestiduras,[a] y ningún extranjero las vestirá jamás; solo sus hijos y sus descendientes a lo largo de sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil en la segunda mitad del versículo: literalmente, algo como «Él se lo confió/confirmó a él y a sus hijos igualmente, y así sus hijos por sus generaciones». El paralelo griego aclara el sentido como la exclusión de cualquier extranjero y la inclusión solamente de los hijos y descendientes de Aarón.'
    reason: alternative_reading
lexical_decisions:
- source_word: לפניו / πρὸ αὐτοῦ
  english_pob_choice: Before him
  chosen_spanish: Antes de él
  alternatives_spanish:
  - En su presencia
  - Anterior a él
  lexicon: HALOT / LXX parallel
  rationale: 'La preposición marca prioridad temporal: nadie antes de Aarón había tenido estas vestiduras. En español, «Antes de él» conserva la relación temporal sin volverla rígida o demasiado literal.'
- source_word: לא היה כן / οὐ γέγονεν τοιαῦτα
  english_pob_choice: there had not been such
  chosen_spanish: no hubo tales vestiduras
  alternatives_spanish:
  - no había habido cosa semejante
  - no existieron vestiduras como estas
  lexicon: HALOT / LXX τοιαῦτα
  rationale: El sentido es que no existían vestiduras comparables antes de Aarón. Como el contexto habla de la indumentaria sacerdotal, «tales vestiduras» explicita el referente implícito sin añadir material ajeno al texto.
- source_word: זר / ἀλλογενής
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - ajeno
  - de otro linaje
  lexicon: HALOT / BDAG
  rationale: Ambos testigos excluyen a alguien fuera de la línea autorizada. «Extranjero» es claro y natural en español; en este contexto comunica bien la exclusión de quien no pertenece al linaje sacerdotal.
- source_word: לעולם / ἕως αἰῶνος
  english_pob_choice: ever
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - por siempre
  lexicon: HALOT / BDAG
  rationale: La frase negativa expresa exclusión perpetua. «Jamás» conserva la fuerza idiomática del inglés POB y del hebreo/griego sin sonar arcaico.
- source_word: לבש / ἐνδύσατο
  english_pob_choice: wear them
  chosen_spanish: las vestirá
  alternatives_spanish:
  - se las pondrá
  - las llevará puestas
  lexicon: HALOT / BDAG
  rationale: El verbo de vestir/ponerse ropa se traduce de modo natural con «vestirá» en español. El complemento directo femenino plural concuerda con «vestiduras».
- source_word: האמין לו ולבניו כזה, וכן בניו לדורותם / τὰ ἔκγονα αὐτοῦ διὰ παντός
  english_pob_choice: only his sons and his descendants throughout their generations
  chosen_spanish: solo sus hijos y sus descendientes por todas sus generaciones
  alternatives_spanish:
  - solo sus hijos y su descendencia por todas las generaciones
  - únicamente sus hijos y sus descendientes para siempre
  lexicon: HALOT / BDAG
  rationale: La tradición textual hebrea es difícil aquí, pero el sentido convergente del hebreo y del griego es la exclusividad hereditaria en la línea sacerdotal. «Por todas sus generaciones» preserva el alcance continuo sin suavizar la tensión textual.
theological_decisions:
- issue: Exclusividad hereditaria del vestuario sacerdotal
  english_pob_reading: 'The verse states hereditary exclusivity: no outsider may wear these garments; they belong only to Aaron''s sons and descendants.'
  chosen_spanish_reading: El versículo afirma que estas vestiduras pertenecen de manera exclusiva a los hijos de Aarón y a sus descendientes; ningún extranjero puede usarlas.
  alternative_spanish_readings:
  - El versículo podría entenderse de forma más vaga como una simple transmisión confiada a Aarón y a sus hijos.
  - Podría leerse sin destacar tanto la exclusión, pero el contexto favorece la idea de restricción hereditaria.
  rationale: 'La lectura principal sigue el sentido claro del contexto y del paralelo griego: exclusión de extraños e inclusión solo de la línea sacerdotal. La ambigüedad hebrea se reconoce en la decisión lexical, pero no se borra el alcance teológico del pasaje.'
  doctrine_reference: Preservar la tensión textual; primacía de la evidencia original con uso del paralelo griego cuando el hebreo es difícil.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al omitir cualquier adorno no sustentado por el hebreo y al mantener una formulación sobria para la exclusión y la herencia sacerdotal. Se evita añadir 'bello' o 'glorioso' porque el hebreo aquí es más austero que la primera solución inglesa, aunque el griego subraya la calidad de las vestiduras. La última cláusula refleja la idea de continuidad genealógica sin resolver artificialmente la dificultad textual hebrea.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, pero aquí no se requiere.
  - Se mantiene «extranjero» como término de exclusión cultual/social, no como comentario étnico genérico.
  - «Vestiduras» se usa para conservar el campo semántico sacerdotal; no se reduce a simple 'ropa'.
  - «Sus descendientes por todas sus generaciones» procura reproducir la fuerza hereditaria del final sin sobreinterpretar la sintaxis hebrea.
