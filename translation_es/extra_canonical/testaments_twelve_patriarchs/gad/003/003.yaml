id: T12P.GAD.3.3
reference: Testament of Gad 3:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 3. Τὴν ἀλήθειαν ψέγει²⁵, *τῷ κατορθοῦντι φθονεῖ²⁶, *καταλαλιὰν ἀσπάζεται²⁷, ὑπερηφανίαν ἀγαπᾷ²⁸, ὅτι τὸ μῖσος ἐκτυφλοῖ²⁹ τὴν ψυχὴν αὐτοῦ, ὡς³⁰ κἀγὼ³¹. Γτότε³² ἔβλεπον³³ *τὸν Ἰωσήφ³⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/003/003.yaml
  text: He reproaches the truth, envies the one who prospers, embraces slander, and loves arrogance, because hatred blinds his soul, as it did mine when I looked at Joseph.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:48Z'
    unchanged: false
    changes_summary: Refined the final clause from 'just as it did mine' to 'as it did mine' for slightly more formal, natural register while preserving the Greek sense. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: Reprocha la verdad, envidia al que prospera[a], abraza la calumnia[b], ama la arrogancia, porque el odio ciega su alma, como cegó la mía cuando miraba a José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''El que prospera'' puede también traducirse como ''el que tiene éxito'' o posiblemente ''el que obra rectamente''; el contexto inmediato de envidia favorece la acción exitosa.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego καταλαλιά: ''calumnia'' o ''maledicencia''; ambos sentidos están presentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ψέγει
  english_pob_choice: reproaches
  chosen_spanish: reprocha
  alternatives_spanish:
  - censura
  - vitupera
  lexicon: LSJ
  rationale: Verbo fuerte de censura adecuado para la cadencia retórica del catálogo de vicios.
- source_word: τῷ κατορθοῦντι φθονεῖ
  english_pob_choice: envies the one who prospers
  chosen_spanish: envidia al que prospera
  alternatives_spanish:
  - envidia al que tiene éxito
  - envidia al que obra rectamente
  lexicon: LSJ
  rationale: El contexto con envidia favorece acción próspera o exitosa más que acción meramente correcta; 'prospera' explicita el objeto de envidia.
- source_word: καταλαλιὰν ἀσπάζεται
  english_pob_choice: embraces slander
  chosen_spanish: abraza la calumnia
  alternatives_spanish:
  - acoge la maledicencia
  - se aferra al chisme
  lexicon: LSJ
  rationale: Conserva la metáfora viva del afecto por la difamación.
- source_word: ὑπερηφανίαν
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - soberbia
  - altivez
  lexicon: LSJ
  rationale: Evita el más amplio 'orgullo' y conserva la nitidez del catálogo de vicios.
- source_word: ἐκτυφλοῖ τὴν ψυχήν
  english_pob_choice: blinds his soul
  chosen_spanish: ciega su alma
  alternatives_spanish:
  - enceguece su alma
  - oscurece el alma
  lexicon: LSJ
  rationale: Directo y vivaz; el verbo compuesto griego intensifica la ceguera, pero 'ciega' transmite la metáfora con claridad.
translation_notes:
  revision_awareness: El revision_pass inglés cambió 'just as it did mine' a 'as it did mine' por concisión y registro más formal; en español 'como cegó la mía' fluye naturalmente sin necesidad del 'tal' o 'así'.
  spanish_consistency_notes:
  - '''el odio'' para τὸ μῖσος consistentemente.'
  - '''el alma'' para ψυχή.'
  - '''José'' como nombre propio sin ε griega.'
