translation:
  language: es
  text: Ciertamente no hubo nadie como Acab, que se vendió para hacer lo malo a los ojos de Yahvé, porque Jezabel, su esposa, lo incitó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: רַק
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Únicamente
  - Sin duda
  lexicon: HALOT
  rationale: La partícula aquí es enfática más que restrictiva; «Ciertamente» conserva el tono aseverativo natural en español sin perder el matiz de énfasis.
- source_word: לֹא הָיָה כְאַחְאָב
  english_pob_choice: there was no one like Ahab
  chosen_spanish: no hubo nadie como Acab
  alternatives_spanish:
  - no hubo uno como Acab
  - nadie fue como Acab
  lexicon: HALOT
  rationale: La expresión hebrea comunica incomparabilidad. «No hubo nadie como Acab» es idiomático en español y mantiene la fuerza absoluta del original.
- source_word: הִתְמַכֵּר
  english_pob_choice: sold himself
  chosen_spanish: se vendió a sí mismo
  alternatives_spanish:
  - se entregó
  - se dio por completo
  lexicon: HALOT
  rationale: Se conserva la imagen vívida del verbo reflexivo-metafórico. «Se vendió a sí mismo» reproduce la fuerza lexical de la autoentrega al mal mejor que una paráfrasis más suave.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: to do what was evil
  chosen_spanish: para hacer lo malo
  alternatives_spanish:
  - para hacer el mal
  - para hacer lo que era malo
  lexicon: HALOT
  rationale: «Lo malo» refleja bien el valor evaluativo del hebreo sin sonar excesivamente pesado. Mantiene la categoría moral del texto.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la vista de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo evaluativo hebreo con una fórmula natural en español. «Yahvé» sigue la convención doctrinal del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se translitera como «Yahvé» conforme al estándar del proyecto, evitando la sustitución titular y manteniendo el nombre personal del pacto.
- source_word: הֵסַתָּה
  english_pob_choice: incited
  chosen_spanish: lo incitaba
  alternatives_spanish:
  - lo instigaba
  - lo inducía
  lexicon: HALOT
  rationale: «Incitaba» expresa la acción de provocar o empujar hacia una conducta mala con la carga negativa adecuada para el contexto.
- source_word: אֹתוֹ אִיזֶבֶל אִשְׁתּוֹ
  english_pob_choice: because Jezebel his wife incited him
  chosen_spanish: porque Jezabel, su esposa, lo incitaba
  alternatives_spanish:
  - porque Jezabel, su mujer, lo incitaba
  - ya que Jezabel, su esposa, lo incitaba
  lexicon: HALOT
  rationale: La relación causal indicada en la revisión inglesa se expresa de forma natural con «porque». El orden mantiene a Jezabel como causa y a Acab como paciente de la incitación.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español se conserva como «Yahvé» para no ocultar el nombre propio de Dios detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH'
- issue: 'Sentido de la frase final: causalidad de la incitación'
  english_pob_reading: because Jezebel his wife incited him
  chosen_spanish_reading: porque Jezabel, su esposa, lo incitaba
  alternative_spanish_readings:
  - a quien Jezabel, su esposa, incitó
  - por la incitación de Jezabel, su esposa
  rationale: La revisión inglesa resuelve la relación sintáctica como causal, no como simple relativo. El español mantiene esa lectura y evita hacer de Jezabel el sujeto principal de la oración.
  doctrine_reference: Texto hebreo y passus revisado en el audit trail inglés
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una construcción relativa ambigua por una causal explícita. El español sigue esa decisión para reflejar mejor la fuerza del hebreo y la claridad del passus final, manteniendo la evaluación negativa de Acab y la agencia de Jezabel como causa de su conducta.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Acab» como forma española tradicional del nombre propio.
  - La construcción «se vendió a sí mismo» preserva la metáfora verbal del original sin suavizarla.
  - «Ante los ojos de Yahvé» conserva el modismo evaluativo hebreo de manera natural en español.
