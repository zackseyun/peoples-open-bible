  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones auditadas del POB: «Pero» por δὲ, el matiz imperfectivo de διεκώλυεν, «diciendo» por λέγων, «Yo necesito» por χρείαν ἔχω, «por ti» como agente de ὑπὸ σοῦ, y la pregunta retórica final. La teología también se mantiene sobria, sin explicar más de lo que dice el texto.'
