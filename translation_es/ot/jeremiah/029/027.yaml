translation:
  language: es
  text: Y ahora[a], ¿por qué no has reprendido a Jeremías, el anatotita, que está profetizando a ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Anatot». El hebreo usa un gentilicio, literalmente «el anatotita».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva de ו y el valor temporal/discursivo de עתה. En español, «Y ahora» mantiene la transición acusatoria del contexto.
- source_word: לָמָּה
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿para qué?
  lexicon: HALOT
  rationale: Es una interrogación causal directa y natural en español.
- source_word: לֹא גָעַרְתָּ
  english_pob_choice: have you not rebuked
  chosen_spanish: no has reprendido
  alternatives_spanish:
  - no has reprochado
  - no has censurado
  - no has reprendido severamente
  lexicon: HALOT
  rationale: גער expresa una reprensión fuerte. «Reprendido» comunica bien la censura disciplinaria y suena más natural en español que un calco más pesado.
- source_word: בְּיִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: a Jeremías
  alternatives_spanish:
  - contra Jeremías
  - sobre Jeremías
  lexicon: HALOT
  rationale: El hebreo marca al objeto de la acción con ב. En este contexto de reprensión, «a Jeremías» expresa al destinatario de la acción de manera natural en español.
- source_word: הָעֲנְּתֹתִי
  english_pob_choice: the Anathothite
  chosen_spanish: el anatotita
  alternatives_spanish:
  - el de Anatot
  - el de Anatot
  lexicon: HALOT
  rationale: Se preserva el gentilicio hebreo con una forma española transparente. «Anatotita» mantiene la referencia étnico-toponímica sin expandirla en el texto principal.
- source_word: הַמִּתְנַבֵּא
  english_pob_choice: who is prophesying
  chosen_spanish: que está profetizando
  alternatives_spanish:
  - que profetiza
  - que profetiza continuamente
  - que actúa como profeta
  lexicon: HALOT
  rationale: El participio describe una acción en curso; «está profetizando» conserva ese aspecto progresivo con naturalidad en español.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - les
  lexicon: HALOT
  rationale: Aunque ל puede marcar dirección hacia oyentes, en español «para ustedes» resulta idiomático aquí y conserva la idea de mensaje dirigido al grupo. Se evita una repetición torpe de «a» inmediatamente después de «reprendido a».
translation_notes:
  revision_awareness: Alineado con el pasaje hebreo y el audit trail inglés; no se requieren revisiones registradas. Se mantiene el carácter acusatorio de la pregunta y el matiz de gentilicio en el texto principal con nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparece explícitamente en el original; aquí no aplica.
  - Se prefirió «reprendido» para גער, consistente con el valor de reprensión fuerte documentado en el audit trail.
  - Se conservó el gentilicio «anatotita» en el cuerpo del texto y se señaló la alternativa locativa en la nota.
  - Se eligió «profetizando» para reflejar el participio presente/activo del hebreo.
  - Se mantuvo un registro bíblico moderno y claro, sin depender de fórmulas tradicionales de una versión específica.
