review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: seis días de trabajo permitido, séptimo día como sábado intensificado, asamblea santa, prohibición de trabajo, dedicación a Yahvé y alcance en todos los lugares habitados. Sin embargo, los marcadores de notas están mal anclados respecto del contenido documentado: [a] aparece sobre «trabajo», pero la nota trata de שַׁבַּת שַׁבָּתוֹן; [b] aparece sobre la prohibición de trabajo, pero la nota trata de «en todas sus moradas». Además, «habrá» añade un matiz existencial/futuro menos ceñido que «es» en la cláusula nominal del hebreo.'
  spanish_quality_summary: El español es claro y digno. «Se puede hacer trabajo» es entendible, aunque «puede hacerse trabajo» o «se puede trabajar» sonarían más fluidos; no obstante, mantener «trabajo» ayuda a la consistencia con מְלָאכָה. «Asamblea santa» es legible. «Moradas» es aceptable, aunque algo literario. La reparación necesaria es principalmente de precisión y anclaje de notas, con un ajuste menor de «habrá» a «es».
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé», מְלָאכָה → «trabajo», מִקְרָא קֹדֶשׁ → «asamblea santa». La intensificación de שַׁבַּת שַׁבָּתוֹן está bien reflejada como «un sábado de completo reposo». No hay conflicto doctrinal; solo debe corregirse la ubicación de las notas para reflejar las decisiones léxicas auditadas.'
  issues:
  - severity: high
    issue: El marcador [a] está colocado en «trabajo», pero la nota explica la frase «un sábado de completo reposo».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. Tal como está, induce a pensar que la alternativa afecta מְלָאכָה, no שַׁבַּת שַׁבָּתוֹן.
  - severity: high
    issue: El marcador [b] está colocado en «No harán ningún trabajo», pero la nota explica «en todas sus moradas / asentamientos».
    rationale: La nota documenta una alternativa para בְּכֹל מוֹשְׁבֹתֵיכֶם, no para la prohibición de trabajo. El anclaje actual falsea la evidencia léxica.
  - severity: medium
    issue: «Habrá un sábado de completo reposo» es menos fiel que una cláusula nominal simple.
    rationale: El hebreo presenta «en el séptimo día, sábado de completo reposo...», no un futuro existencial. «Es» o una construcción nominal directa preserva mejor la forma y el sentido.
