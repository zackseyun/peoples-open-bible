    reason: cultural_note
  revision_rationale: Se cambió «se extenderá» por «colgará» para reflejar con mayor precisión תִּסְרַח y la decisión léxica auditada en inglés («shall hang»), preservando la imagen del material sobrante que cae sobre la parte posterior del tabernáculo. Se mantuvieron las demás opciones porque son fieles, claras y conservan la distinción técnica entre «tienda» y «tabernáculo».
