translation:
  language: es
  text: 'Entonces los oficiales seguirán hablando al pueblo y dirán[a]: «¿Quién es el hombre que teme y es de corazón débil? Que vaya y regrese a su casa[b], no sea que derrita el corazón de sus hermanos como su propio corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «temeroso y blando/tierno de corazón»; el hebreo literalmente habla de alguien «temeroso y tierno/blando de corazón».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se refiere a sus compatriotas israelitas o a sus compañeros de armas.
    reason: cultural_note
lexical_decisions:
- source_word: וְיָסְפוּ
  english_pob_choice: shall continue
  chosen_spanish: seguirán
  alternatives_spanish:
  - continuarán
  - proseguirán
  lexicon: HALOT
  rationale: 'El hebreo con יסף + infinitivo expresa continuidad: no “añadir” en sentido mecánico, sino “seguir” hablando. “Seguirán” conserva el valor idiomático y el tono narrativo.'
- source_word: הַשֹּׁטְרִים
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los funcionarios
  - los supervisores
  lexicon: HALOT
  rationale: En este contexto militar-administrativo, שֹׁטְרִים designa oficiales designados, no policías en sentido moderno. “Oficiales” es natural en español y mantiene la función pública/militar.
- source_word: לְדַבֵּר אֶל־הָעָם
  english_pob_choice: to speak to the people
  chosen_spanish: hablando al pueblo
  alternatives_spanish:
  - para hablar al pueblo
  - para dirigirse al pueblo
  lexicon: HALOT
  rationale: 'La construcción infinitiva queda bien en español como continuidad de la acción: “seguirán hablando al pueblo”. “Pueblo” conserva el referente colectivo del hebreo.'
- source_word: מִי הָאִישׁ
  english_pob_choice: Who is the man
  chosen_spanish: ¿Quién es el hombre
  alternatives_spanish:
  - ¿Quién es el varón
  - ¿Quién es la persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y presenta a un individuo representativo en lenguaje militar. “Hombre” preserva el marcador de género y la textura del original.
- source_word: הַיָּרֵא
  english_pob_choice: fearful
  chosen_spanish: que teme
  alternatives_spanish:
  - que tiene miedo
  - temeroso
  lexicon: HALOT
  rationale: En español, “teme” evita la posible rigidez de “temeroso” y refleja con claridad el estado de miedo del soldado. Mantiene la sencillez del hebreo.
- source_word: וְרַךְ הַלֵּבָב
  english_pob_choice: fainthearted
  chosen_spanish: y es blando de corazón
  alternatives_spanish:
  - y es tierno de corazón
  - y es débil de corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente “blando/tierno de corazón”. Se preserva la metáfora para no diluirla en una sola abstracción como “cobarde”, aunque “blando” requiere una nota por su fuerza idiomática en español.
- source_word: יֵלֵךְ וְיָשֹׁב לְבֵיתוֹ
  english_pob_choice: Let him go and return to his house
  chosen_spanish: Vaya y regrese a su casa
  alternatives_spanish:
  - Que vaya y regrese a su casa
  - Déjenlo ir y volver a su casa
  lexicon: HALOT
  rationale: Los imperfectos con valor exhortativo se traducen mejor en español con mandato directo. “Casa” conserva la correspondencia formal con בֵיתוֹ.
- source_word: וְלֹא יִמַּס
  english_pob_choice: lest he melt
  chosen_spanish: para que no haga desfallecer
  alternatives_spanish:
  - para que no derrita
  - no sea que ablande
  lexicon: HALOT
  rationale: El verbo מסס conserva la imagen de “derretirse/desfallecer” con un objeto interior (el corazón). En español, “hacer desfallecer” comunica el efecto de desánimo sin perder del todo la metáfora.
- source_word: לְבַב אֶחָיו
  english_pob_choice: the heart of his brothers
  chosen_spanish: el corazón de sus hermanos
  alternatives_spanish:
  - el corazón de sus compañeros
  - el ánimo de sus hermanos
  lexicon: HALOT
  rationale: “Hermanos” sigue el audit trail inglés y el uso bíblico de compañeros del mismo pueblo o ejército. “Corazón” preserva el centro volitivo/afectivo del hebreo.
- source_word: כִּלְבָבוֹ
  english_pob_choice: like his own heart
  chosen_spanish: como el suyo propio
  alternatives_spanish:
  - como su propio corazón
  - igual que su corazón
  lexicon: HALOT
  rationale: La comparación final retoma el pronombre posesivo en forma natural en español. “Suyo propio” evita redundancia y mantiene la referencia al mismo campo semántico de לבב.
theological_decisions:
- issue: Metáfora de “blando/tierno de corazón”
  english_pob_reading: Or 'afraid and soft of heart'; the Hebrew literally speaks of one who is 'fearful and tender/soft of heart.'
  chosen_spanish_reading: “que teme y es blando de corazón” con nota sobre la alternativa “temeroso y tierno/blando de corazón”
  alternative_spanish_readings:
  - que teme y es temeroso de corazón
  - que tiene miedo y es tierno de corazón
  rationale: La frase hebrea conserva una imagen interna del corazón, no solo un concepto de cobardía. La versión principal mantiene esa metáfora para no borrar la tensión lexical; la nota ofrece la alternativa más literal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referencia de “hermanos”
  english_pob_reading: '''Brothers'' here refers to his fellow Israelites or fellow soldiers.'
  chosen_spanish_reading: “sus hermanos”
  alternative_spanish_readings:
  - sus compañeros
  - sus correligionarios
  rationale: Se conserva el parentesco social del hebreo y la lectura auditada del POB. En el contexto militar, “hermanos” comunica la solidaridad del grupo sin neutralizar la imagen bíblica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza de la advertencia final
  english_pob_reading: lest he melt the heart of his brothers like his own heart
  chosen_spanish_reading: “para que no haga desfallecer el corazón de sus hermanos como el suyo propio”
  alternative_spanish_readings:
  - no sea que derrita el corazón de sus hermanos como el suyo propio
  - para que no ablande el corazón de sus hermanos como el suyo propio
  rationale: El hebreo usa una advertencia preventiva con “no sea que/lest”. En español, “para que no” expresa ese propósito negativo de manera natural y mantiene la idea de contagio del desánimo entre los combatientes.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB, que prefirió una advertencia directa con “lest he melt the heart of his brothers” en lugar de una expansión explicativa. En español se reflejó esa concisión con “para que no haga desfallecer el corazón de sus hermanos”, evitando perífrasis más largas y preservando la relación entre el miedo individual y el desánimo colectivo.
  spanish_consistency_notes:
  - Se usó “Yahvé” de forma consistente solo cuando el texto del versículo lo requiriera; aquí no aparece el Tetragrámaton.
  - Se mantuvo “oficiales” para שֹׁטְרִים por su valor administrativo-militar.
  - Se preservó “hermanos” por coherencia con la lectura POB y con el campo semántico del hebreo.
  - Se evitó “SEÑOR” y “Cristo”, ya que no corresponden a este versículo.
  - La metáfora de לבב se mantuvo con “corazón” para conservar el paralelismo interno del verso.
