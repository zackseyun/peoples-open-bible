    rationale: Aunque semánticamente posible, en español general y eclesial «restringir» suele aplicarse más a derechos, acceso o movimiento que a contener a una persona contenciosa. «Contiene» expresa mejor la imagen proverbial de intentar retener algo incontrolable.
  - severity: low
