translation:
  language: es
  text: La morada del muerto[b] es su lugar de reposo, y consuélate cuando su vida[a] se vaya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'su alma'. נפש puede significar vida, alma, persona o aliento vital.
    reason: lexical_alternative
  - marker: b
    text: 'El griego paralelo dice sustancialmente otra cosa: ''Recuerda que su juicio es como el tuyo: mío ayer y tuyo hoy''. Esto probablemente refleja una forma textual distinta de la hebrea conservada.'
    reason: textual_variant
lexical_decisions:
- source_word: מושבת
  english_pob_choice: resting place
  chosen_spanish: lugar de reposo
  alternatives_spanish:
  - morada
  - morada de reposo
  - sepultura
  lexicon: HALOT
  rationale: El sustantivo derivado de ישב puede referirse a un lugar de residencia o asiento; en este contexto funerario, con מתו, la idea más natural en español es un lugar de reposo. 'Lugar de reposo' conserva el matiz memorial sin añadir 'sepultura' de forma demasiado interpretativa.
- source_word: מתו
  english_pob_choice: his
  chosen_spanish: del muerto
  alternatives_spanish:
  - del difunto
  - del que ha muerto
  - de su muerto
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'su muerto / su hombre muerto'. En español, 'del muerto' expresa la relación posesiva de modo natural y breve, sin perder el referente funerario.
- source_word: שבת
  english_pob_choice: remember
  chosen_spanish: consuélate
  alternatives_spanish:
  - acuérdate
  - piensa en ello
  - tenlo presente
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil y el contexto hebreo no es tan firme como el paralelo griego; siguiendo la revisión más reciente del expediente, la primera cláusula se entiende como una afirmación sobre la morada del muerto, no como un imperativo. Por eso no se traduce como 'acuérdate'.
- source_word: והנחם
  english_pob_choice: be comforted
  chosen_spanish: consuélate
  alternatives_spanish:
  - sé consolado
  - toma consuelo
  - recibe consuelo
  lexicon: HALOT
  rationale: El reflexivo/exhortativo se expresa bien en español con 'consuélate', que conserva el tono de exhortación y evita un giro demasiado pasivo.
- source_word: עם
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - en el momento en que
  - mientras
  lexicon: HALOT
  rationale: 'Aquí la preposición marca tiempo: ''cuando'' comunica de forma natural la circunstancia temporal de la muerte.'
- source_word: צאת
  english_pob_choice: departs
  chosen_spanish: salga
  alternatives_spanish:
  - salga fuera
  - parta
  - se vaya
  lexicon: HALOT
  rationale: El infinitivo 'salir' conserva la imagen semítica de la salida del aliento/vida. En español, 'salga' es claro y no carga el verbo con una interpretación doctrinal adicional.
- source_word: נפשו
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su aliento
  - su ser
  lexicon: HALOT
  rationale: נפש puede significar vida, alma, persona o aliento vital. En este contexto de muerte, 'vida' es una equivalencia natural y evita resolver indebidamente la tensión antropológica. La alternativa 'alma' sigue siendo viable y se preserva en nota.
theological_decisions:
- issue: Valor de נפש en contexto de muerte
  english_pob_reading: his life departs
  chosen_spanish_reading: su vida salga / su vida se vaya
  alternative_spanish_readings:
  - su alma salga
  - su alma se vaya
  rationale: Se preserva la amplitud semántica de נפש sin afirmar más de lo que el verso exige. 'Vida' mantiene el sentido de muerte como partida vital, mientras que 'alma' queda disponible como alternativa legítima.
  doctrine_reference: 'DOCTRINE.md: preservar tensión teológica; no resolver antropología innecesariamente.'
- issue: Divergencia fuerte entre hebreo y paralelo griego
  english_pob_reading: The resting place of the dead is his dwelling; and be comforted when his life departs.
  chosen_spanish_reading: La morada del muerto es su lugar de reposo; y consuélate cuando salga su vida.
  alternative_spanish_readings:
  - 'Recuerda que su juicio es como el tuyo: mío ayer y tuyo hoy.'
  - 'Su juicio es como el tuyo: mío ayer y tuyo hoy.'
  rationale: Dado que el expediente señala una divergencia importante con el griego, la redacción principal sigue el hebreo transmitido y deja constancia de la alternativa griega. En español, se evita mezclar ambos testimonios en el cuerpo principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como testimonio paralelo, no como sustituto.'
translation_notes:
  revision_awareness: El expediente muestra una revisión reciente que corrigió la primera cláusula para reflejar más literalmente מושבת מתו como una afirmación ('La morada del muerto es su lugar de reposo') y no como un imperativo de recordar. La versión española sigue esa revisión y mantiene la segunda cláusula como exhortación de consuelo en la partida de la vida.
  spanish_consistency_notes:
  - Se usa 'vida' para נפש en el cuerpo principal, en coherencia con una equivalencia natural y no doctrinalmente cerrada.
  - Se evita 'SEÑOR' o terminología litúrgica ajena porque el verso no contiene el Tetragrámaton.
  - La nota del paralelo griego se conserva por la divergencia textual marcada en el expediente.
  - El tono es sobrio y bíblico, pero con español moderno y legible.
