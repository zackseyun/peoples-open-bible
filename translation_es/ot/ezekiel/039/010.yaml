    text: 'O, más literalmente: «porque con las armas quemarán fuego», es decir, usarán las armas de los invasores como combustible.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite términos de la misma raíz: «despojarán a sus despojadores y saquearán a sus saqueadores», para enfatizar la reversión y la retribución.'
    reason: lexical_alternative
  revision_rationale: Se ajustó una expresión para un español más natural y más cercano al sentido contextual del hebreo («harán fuego» en vez de «encenderán fuego»), y se sustituyó la nota a por la alternativa léxica principal atestiguada en la auditoría inglesa. Se mantuvo el resto porque es fiel al fuente y al criterio terminológico del proyecto.
