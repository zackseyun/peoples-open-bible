revisions:
- from: ¿Cómo podré describir el afecto de los padres por sus hijos[a] —el ardor que imprime la maravillosa semejanza de alma y forma en el pequeño rasgo de un niño—, sobre todo porque los padres hacen a las madres más compasivas con su descendencia?
  to: ¿Cómo podré describir el afecto de los padres por sus hijos[a], el ardor que imprime la maravillosa semejanza de alma y forma en la pequeña impronta de un niño, sobre todo porque los padres hacen a las madres más tiernamente afectuosas hacia su descendencia?
  rationale: Se reemplazó «rasgo» por «impronta» para conservar la metáfora de sello/estampado de παιδοχαρακτήρ y ἐναποσφραγίζοντα. Se cambió «más compasivas» por «más tiernamente afectuosas» para reflejar mejor el valor de συμπαθεστέρας en español natural y evitar la connotación de lástima. También se simplificó la puntuación del inciso y se ajustó la nota para concordar con el texto revisado.
