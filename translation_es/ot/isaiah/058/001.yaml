review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura imperativa, la imagen del shofar/trompeta, la distinción entre ''mi pueblo'' y ''la casa de Jacob'', y la diferencia semántica entre פֶּשַׁע y חטאות. Sin embargo, los anclajes de notas están mal colocados respecto a la evidencia inglesa auditada: [a] corresponde a שופר/trompeta, no a ''Clama a gran voz''; y [b] corresponde a ''rebelión/transgresión'', no a ''mi pueblo''. Además, ''no te detengas'' es aceptable pero algo menos preciso que el matiz de no refrenarse/no contenerse.'
  spanish_quality_summary: El español es claro y digno. 'Clama a gran voz' suena natural y preserva intensidad, aunque cambia la concreción corporal de 'con tu garganta'. 'Denuncia' es defendible, pero 'declara' refleja mejor el verbo fuente y el audit trail sin añadir un matiz jurídico que no es necesario. La puntuación es correcta. La principal reparación necesaria es de notas y un leve ajuste léxico para mayor fidelidad.
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto. Los términos clave están bien encaminados: ''trompeta'', ''mi pueblo'', ''casa de Jacob'', ''pecados''. Para פִּשְׁעָם, en singular ''su rebelión'' se alinea mejor con el inglés POB y con el uso colectivo natural en español; la alternativa ''sus transgresiones'' puede mantenerse en nota.'
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [b] están anclados en lugares equivocados del texto.
    rationale: La nota [a] explica שופר, así que debe ir en 'trompeta'; la nota [b] explica פִּשְׁעָם, así que debe ir en 'rebelión' o equivalente. Actualmente [a] está en 'Clama a gran voz' y [b] en 'mi pueblo', lo cual rompe la trazabilidad auditada.
  - severity: medium
    issue: '''y denuncia'' añade un matiz más acusatorio que ''וְהַגֵּד / declare''.'
    rationale: Aunque el contexto sí es de acusación profética, 'declara' o 'haz saber' preserva mejor el valor de comunicación autoritativa del verbo sin estrecharlo a denuncia judicial.
  - severity: medium
    issue: '''sus rebeliones'' es posible, pero ''su rebelión'' suena más natural y se alinea mejor con el inglés POB ''their rebellion''.'
    rationale: פֶּשַׁע puede funcionar de manera colectiva; en español bíblico actual, el singular colectivo evita rigidez y conserva el matiz de rebeldía deliberada. La pluralidad posible puede reflejarse en nota alternativa si se desea.
  - severity: low
    issue: '''no te detengas'' es algo menos preciso que ''no te contengas'' o ''no te refrenes''.'
    rationale: El hebreo apunta a no retener o refrenar la proclamación, no simplemente a no parar en medio de una acción. El borrador sigue siendo inteligible, pero un ajuste mejoraría la precisión.
