review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en líneas generales la lectura adoptada por el POB inglés: Yahvé reúne a los que están de duelo por la fiesta señalada, y la cláusula final mantiene la secuencia «reproche ... carga» con el referente femenino implícito. Sin embargo, dos decisiones debilitan la fidelidad inmediata al expediente auditado: el texto principal usa «Reuniré» aunque el inglés base eligió «I have gathered» como forma principal, y las notas b/c quedaron ancladas en lugares equivocados respecto de lo que explican.'
  spanish_quality_summary: El español es comprensible, pero «de ti» separado por coma suena torpe, y la distribución de notas produce confusión. «He reunido» suena natural y refleja mejor la elección principal del POB, mientras que «de ti» sin coma preserva la compresión del hebreo. La cláusula final «fueron un reproche sobre ella, una carga» es aceptable y suficientemente literal, aunque marcada; conserva bien la dificultad del original.
  glossary_alignment: No hay conflicto con la terminología teológica principal del proyecto. Las decisiones léxicas «fiesta señalada», «reproche» y «carga» son defendibles. La única desalineación relevante es que el valor principal de אָסַפְתִּי en el texto español debería seguir la decisión auditada del POB («he reunido») y dejar «reuniré» como alternativa en nota.
  issues:
  - severity: medium
    issue: Tiempo verbal principal de אָסַפְתִּי
    rationale: El expediente inglés eligió como texto principal «I have gathered» y dejó «I will gather» en nota. El borrador invierte esa prioridad al poner «Reuniré» en el texto y «he reunido» en nota, apartándose de la decisión auditada sin necesidad suficiente.
  - severity: medium
    issue: Anclaje incorrecto de notas b y c
    rationale: La nota b explica alternativas para אָסַפְתִּי, por lo que debe anclarse en «He reunido», no en «fueron». La nota c explica el pronombre femenino «ella», por lo que debe anclarse en «ella», no en «carga».
  - severity: low
    issue: Puntuación poco natural en «de ti;» con coma previa
    rationale: 'La coma antes de «de ti» entorpece la lectura en español. El complemento puede ir sin coma: «... fiesta señalada de ti» sería ambiguo, por lo que conviene mantener «de ti» separado pero sin la pausa artificial: «... fiesta señalada de ti;» aún suena raro. La forma más natural y fiel es «... fiesta señalada, de ti» no mejora; mejor simplemente «... fiesta señalada de entre ti» sería más interpretativo. Dado el expediente, «de ti» sin coma dentro de la secuencia es la reparación mínima más segura: «... fiesta señalada de ti;» sigue siendo algo duro, pero aceptable. Más natural todavía: «... fiesta señalada de entre ti» añadiría matiz. La mejor solución conservadora es «... fiesta señalada de ti» no es idiomática; por eso se prefiere mantener «de ti» tras el verbo: «He reunido de ti a los que...», pero altera el orden. Se adopta una reparación mínima: quitar la coma y dejar la frase compacta.'
  revised_spanish_text: He reunido[b] a los que se afligen por la fiesta señalada, de ti; fueron un reproche sobre ella[c], una carga.
  revised_footnotes:
  - marker: a
    text: 'O: «he reunido a los afligidos por la asamblea señalada»; el hebreo es difícil y la frase puede referirse tanto a personas que lamentan la privación de la fiesta como a quienes fueron apartados de la reunión festiva.'
    reason: alternative_reading
  - marker: b
    text: 'O: «reuní» o, en contexto profético, «reuniré».'
    reason: lexical_alternative
  - marker: c
    text: La referencia femenina probablemente alude a Sion o Jerusalén.
    reason: cross_reference
  revision_rationale: Se corrige el verbo principal para ajustarlo a la decisión auditada del POB («he reunido»), y se reubican las notas para que expliquen exactamente los elementos a los que corresponden. También se preserva la ambigüedad difícil del hebreo sin paraprasear. La nota alternativa sobre la lectura difícil del inicio debe mantenerse, pero en esta revisión mínima no se ancla en el texto porque el borrador original tampoco la anclaba correctamente al segmento; si el sistema exige anclaje explícito de toda nota incluida, habría que insertar [a] tras «fiesta señalada».
