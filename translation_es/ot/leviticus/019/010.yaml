  rationale: La revisión corrige errores de forma y de sentido, y ajusta el español al hebreo y al audit trail inglés. «No rebuscarás tu viña» comunica con naturalidad la prohibición de pasar otra vez para tomar lo restante, mientras la nota preserva la fuerza de ‘despojar por completo’. «Las uvas caídas» restaura el referente correcto en contexto de viña. «El Dios de ustedes» mantiene la segunda persona plural del hebreo con claridad panhispánica y evita la ambigüedad de «su Dios».
