translation:
  language: es
  text: Y sacrificarás sacrificios de paz[a], y comerás allí, y te alegrarás delante de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas de comunión» o «ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זָבַחְתָּ
  english_pob_choice: you shall sacrifice
  chosen_spanish: sacrificarás
  alternatives_spanish:
  - ofrecerás
  - inmolarás
  lexicon: HALOT
  rationale: En contexto cultual, זבח denota la acción de realizar un sacrificio. «Sacrificarás» conserva el sentido ritual y evita tanto la generalidad de «ofrecerás» como la dureza potencial de «inmolarás» en este pasaje instruccional.
- source_word: שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: El término nombra una clase sacrificial; en español, «sacrificios de paz» mantiene la forma del nombre del rito y conserva la relación semántica con paz/bienestar sin sustituirla por una paráfrasis interpretativa. Las alternativas reflejan el mismo campo léxico, pero son menos directas para el lector español.
- source_word: וְ/אָכַ֣לְתָּ שָּׁ֑ם
  english_pob_choice: and you shall eat there
  chosen_spanish: y comerás allí
  alternatives_spanish:
  - y comerás en ese lugar
  - y comerás allá
  lexicon: HALOT
  rationale: אָכַל significa simplemente «comer»; «allí» preserva el deíctico שָׁם y la referencia al lugar del sacrificio. Se mantiene el futuro exhortativo español para reflejar el tono instructivo del hebreo.
- source_word: וְ/שָׂ֣מַחְתָּ
  english_pob_choice: and you shall rejoice
  chosen_spanish: y te alegrarás
  alternatives_spanish:
  - y te gozarás
  - y regocijarás
  lexicon: HALOT
  rationale: שׂמח expresa alegría festiva y cultual. «Te alegrarás» es natural y digno en español; «regocijarás» suena más marcado, mientras «te gozarás» puede sonar menos universal en español contemporáneo.
- source_word: לִ/פְנֵ֖י
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: En contexto religioso, לִפְנֵי puede traducirse con una locución de presencia. «Delante de» es claro y bíblicamente natural en español, sin ocultar la idea de estar ante Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se usa la forma española establecida «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto de no sustituir el nombre divino por un título. Se evita «SEÑOR» como máscara y también «Jehová» por su menor adecuación al estándar editorial del proyecto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios,
  - tu Dios mismo
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular queda reflejado con «tu». «Dios» conserva el referente divino covenantal sin añadir determinaciones no presentes en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre propio divino. La versión española debe conservar ese nombre en lugar de sustituirlo por un título genérico; «Yahvé» es la forma elegida para la publicación en español del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: שְׁלָמִים como categoría sacrificial
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: No se debe diluir el término en una explicación libre. La traducción principal conserva el carácter técnico de la ofrenda y deja espacio a las alternativas léxicas reconocidas por la tradición exegética.
  doctrine_reference: 'Lexical category: sacrificial terminology (no doctrinal claim beyond cultic classification)'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y coincide con la auditoría inglesa: no se requieren revisiones registradas. Se mantiene la estructura exhortativa y la secuencia cultual de sacrificar, comer y alegrarse ante Yahvé.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente con el criterio del proyecto para el nombre divino.
  - Se usa el futuro exhortativo («sacrificarás», «comerás», «te alegrarás») para reflejar la instrucción hebrea.
  - «Sacrificios de paz» se mantiene como término técnico principal, con nota de variantes semánticas.
  - La preposición «delante de» reproduce con naturalidad el valor de לִפְנֵי en contexto cultual.
