translation:
  language: es
  text: Gebal[a], Amón y Amalec; Filistea[b] con los habitantes de Tiro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gebal» puede referirse a la ciudad fenicia asociada con Biblos.
    reason: cultural_note
  - marker: b
    text: Algunas traducciones entienden aquí «los filisteos» cuando el nombre regional se toma por sus habitantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבָל
  english_pob_choice: Gebal
  chosen_spanish: Gebal
  alternatives_spanish:
  - Biblos
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; la forma española auditable más directa es la transliteración. "Biblos" sería una identificación histórica posible, pero no es la forma hebrea del texto y no conviene sustituirla en el cuerpo principal.
- source_word: וְעַמּוֹן
  english_pob_choice: Ammon
  chosen_spanish: Amón
  alternatives_spanish:
  - Amón
  lexicon: HALOT
  rationale: El hebreo nombra al territorio/pueblo con el etnónimo habitual; en español bíblico moderno, "Amón" mantiene la referencia histórica y es la forma natural en contexto de lista geográfica/étnica.
- source_word: וַעֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalec
  lexicon: HALOT
  rationale: Nombre propio étnico; "Amalec" es la forma establecida en español y conserva la identificación del grupo.
- source_word: פְּלֶשֶׁת
  english_pob_choice: Philistia
  chosen_spanish: Filistea
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: La forma hebrea señala la región/territorio; por eso se conserva el valor geográfico con "Filistea". La alternativa "los filisteos" expresa el pueblo, pero borra la precisión formal del hebreo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Preposición simple de acompañamiento o adición; "con" reproduce de manera natural la relación sintáctica sin añadir matiz innecesario.
- source_word: יֹשְׁבֵי צֽוֹר
  english_pob_choice: the inhabitants of Tyre
  chosen_spanish: los habitantes de Tiro
  alternatives_spanish:
  - los que habitan en Tiro
  - los residentes de Tiro
  lexicon: HALOT
  rationale: La construcción de estado constructo significa literalmente "los habitantes de Tiro". Esta opción es clara en español y conserva el valor colectivo del sintagma.
- source_word: צֽוֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español bíblico; "Tiro" es la forma tradicional y precisa.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: nombres propios transliterados, Filistea como nombre regional y habitantes de Tiro como sintagma colectivo; no se introdujeron revisiones textuales.'
  spanish_consistency_notes:
  - Se mantuvo la puntuación de lista con punto y coma antes del último miembro para reflejar la pausa del hebreo y del inglés POB.
  - Se prefirió «Filistea» para conservar el valor territorial del término hebreo.
  - Se usaron formas españolas bíblicas habituales («Amón», «Amalec», «Tiro») para máxima legibilidad sin perder auditabilidad.
