translation:
  language: es
  text: Los que bajan al mar relatan sus confines[a]; cuando nuestros oídos oyen[b], nos asombramos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «su extremo», «su límite» o «sus confines». El griego, en cambio, lee «su peligro»; la traducción principal sigue el testimonio hebreo y conserva en nota la variante interpretativa griega.
    reason: alternative_reading
  - marker: b
    text: El hebreo dice literalmente «los que bajan al mar», una expresión idiomática para los navegantes o la gente de mar.
    reason: cultural_note
lexical_decisions:
- source_word: יורדי הים / οἱ πλέοντες τὴν θάλασσαν
  english_pob_choice: Those who go down to the sea
  chosen_spanish: Los que bajan al mar
  alternatives_spanish:
  - Los que navegan el mar
  - Marineros
  - Los que van al mar
  lexicon: HALOT; paralelo griego
  rationale: Conservo la imagen idiomática hebrea de «bajar al mar» en vez de reducirla a un simple oficio. En español, «bajan al mar» mantiene el movimiento hacia el ámbito marítimo y sigue siendo natural. El griego confirma el sentido marítimo con «los que navegan el mar».
- source_word: י ספרו / διηγοῦνται
  english_pob_choice: recount
  chosen_spanish: relatan
  alternatives_spanish:
  - cuentan
  - narran
  - describen
  lexicon: HALOT
  rationale: El verbo pide un sentido testimonial de relatar lo experimentado. «Relatan» suena natural en español y conserva ese matiz de narración de primera mano.
- source_word: קצהו / τὸν κίνδυνον αὐτῆς
  english_pob_choice: its far reaches
  chosen_spanish: su extremo
  alternatives_spanish:
  - su fin
  - su extremidad
  - su peligro
  lexicon: HALOT; paralelo griego
  rationale: Sigo el testimonio hebreo, que habla del «extremo» o límite del mar. «Su extremo» es breve y fiel. El griego ofrece «su peligro», pero la lectura hebrea está claramente atestiguada; por eso dejo esa tensión reflejada en una nota.
- source_word: לשמע אזנינו
  english_pob_choice: when our ears hear
  chosen_spanish: al oírlo nuestros oídos
  alternatives_spanish:
  - cuando oímos
  - al escuchar nuestros oídos
  - al escucharlo
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y enfática, literalmente cercana a «al oído de nuestros oídos». En español, «al oírlo nuestros oídos» conserva la imagen sensorial sin volverse torpe.
- source_word: נשתומם / θαυμάζομεν
  english_pob_choice: we are astonished
  chosen_spanish: nos asombramos
  alternatives_spanish:
  - nos maravillamos
  - quedamos atónitos
  - nos quedamos asombrados
  lexicon: HALOT; paralelo griego
  rationale: «Nos asombramos» expresa bien el impacto de la noticia. Evita tanto el exceso de dramatización como una atenuación demasiado débil. El griego «maravillamos» queda cercano en sentido.
translation_notes:
  revision_awareness: El pasaje fue revisado en la última pasada y quedó sin cambios; la presente versión mantiene la decisión de seguir el hebreo para קצהו, dejando la variante griega como nota textual.
  spanish_consistency_notes:
  - Se conserva el registro sobrio y bíblico sin recurrir a «SEÑOR» ni a terminología eclesiástica innecesaria.
  - «Mar» se usa en singular como en el hebreo y el griego, sin expandir a «océanos» o «aguas».
  - La puntuación reproduce una pausa semicolon-like con punto y coma, acorde con la estructura bimembre del verso.
