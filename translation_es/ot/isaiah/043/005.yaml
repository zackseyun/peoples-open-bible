translation:
  language: es
  text: No temas, porque yo estoy contigo; desde el oriente traeré a tu descendencia[a], y desde el occidente te reuniré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un singular colectivo; alternativamente, 'tus descendientes'.
    reason: lexical_alternative
  - marker: b
    text: El singular 'tu'/'te' dirige la promesa a Israel de manera corporativa; el hebreo no usa un plural explícito.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: La partícula prohibitiva exige una negación directa. "No temas" preserva la fuerza breve y solemne del hebreo sin añadir explicación.
- source_word: תִּירָא
  english_pob_choice: fear
  chosen_spanish: temas
  alternatives_spanish:
  - tengas miedo
  - te asustes
  lexicon: HALOT
  rationale: El verbo ירא en esta construcción prohibitiva expresa temor. "Temas" mantiene el tono bíblico sobrio y es natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base de la prohibición. "Porque" comunica bien la relación explicativa y es plenamente idiomático en español.
- source_word: אִתְּךָ אָנִי
  english_pob_choice: I am with you
  chosen_spanish: yo estoy contigo
  alternatives_spanish:
  - estoy contigo
  - yo estoy a tu lado
  lexicon: HALOT
  rationale: El hebreo expresa presencia personal. "Yo estoy contigo" conserva el énfasis del pronombre y la cercanía relacional sin forzar el español.
- source_word: מִמִּזְרָח
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - desde el este
  - del oriente
  lexicon: HALOT
  rationale: '"Oriente" transmite el valor geográfico de מִזְרָח con un registro bíblico claro en español. "Este" sería más cotidiano, pero menos elevado.'
- source_word: אָבִיא
  english_pob_choice: I will bring
  chosen_spanish: traeré
  alternatives_spanish:
  - haré venir
  - llevaré
  lexicon: HALOT
  rationale: En este contexto de restauración, el hiphil de בוא puede rendirse como "traer". "Traeré" es conciso y natural, y no añade el matiz explícito de retorno que no está en el verbo.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  - tu prole
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo. "Descendencia" reproduce bien la colectividad y suena natural en español; "simiente" sería demasiado arcaico y "descendientes" desplaza el singular colectivo.
- source_word: וּמִמַּעֲרָב
  english_pob_choice: and from the west
  chosen_spanish: y desde el occidente
  alternatives_spanish:
  - y desde el oeste
  - y del occidente
  lexicon: HALOT
  rationale: '"Occidente" mantiene el paralelismo con "oriente" y conserva un tono digno. "Oeste" sería correcto, pero menos consistente con el registro bíblico elegido.'
- source_word: אֲקַבְּצֶךָּ
  english_pob_choice: I will gather you
  chosen_spanish: te reuniré
  alternatives_spanish:
  - te juntaré
  - te congregaré
  - te reuniré a ti
  lexicon: HALOT
  rationale: קבץ en piel expresa reunir/recoger/convocar. "Te reuniré" comunica la acción sin sonar artificial; "congregaré" puede sugerir un matiz eclesial no exigido por el hebreo.
theological_decisions:
- issue: Pronombres singulares con referente corporativo
  english_pob_reading: Retain singular 'you' throughout while allowing the corporate referent to remain implicit.
  chosen_spanish_reading: Mantener el singular "tú/te/tu" en todo el versículo, dejando implícito que se trata de Israel como colectivo.
  alternative_spanish_readings:
  - 'usar plural explícito: "ustedes"'
  - 'explicitar: "tu pueblo"'
  rationale: El hebreo habla al pueblo en singular corporativo. El español puede conservar esa misma forma sin perder claridad, y así se respeta el estilo profético y la precisión del texto base.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
- issue: Alcance de "descendencia" frente a una lectura más literal de זֶרַע
  english_pob_reading: Hebrew 'your offspring' is a collective singular; alternatively, 'your descendants.'
  chosen_spanish_reading: '"tu descendencia" como equivalente principal, con el sentido colectivo implícito.'
  alternative_spanish_readings:
  - '"tu simiente"'
  - '"tus descendientes"'
  rationale: '"Descendencia" conserva la idea colectiva sin caer en un calco opaco. En español, la tensión entre singular colectivo y plural de miembros se entiende bien con esta opción, por lo que no hace falta expandirla en el texto principal.'
  doctrine_reference: 'HALOT; Translation philosophy #1, #3'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura ya validada del POB en inglés: mantiene la prohibición directa, la presencia divina, el paralelismo geográfico oriente/occidente y el singular corporativo. Se ajustó solo el registro para que suene natural y digno en español, sin añadir matices de regreso que el hebreo no expresa explícitamente.'
  spanish_consistency_notes:
  - Se mantiene "oriente/occidente" para conservar el paralelismo y el registro bíblico.
  - Se prefirió "tu descendencia" por su capacidad de expresar un singular colectivo en español.
  - '"Te reuniré" preserva la idea de קבץ sin introducir "congregar" como término eclesiástico.'
  - La puntuación reproduce el quiebre del verso en dos miembros principales separados por punto y coma.
