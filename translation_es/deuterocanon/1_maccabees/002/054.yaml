translation:
  language: es
  text: Finés, nuestro padre[a], porque ardió de celo, recibió una alianza de sacerdocio santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque tuvo celo con celo». El griego usa una expresión cognada intensiva, literalmente «al sentir celo con celo», para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φινεὲς
  english_pob_choice: Phinehas
  chosen_spanish: Finés
  alternatives_spanish:
  - Finees
  - Finees
  lexicon: LSJ
  rationale: Se translitera el nombre propio en forma reconocible en español bíblico. «Finés» conserva la referencia a Phinehas y evita una adaptación excesivamente anglicada; la forma breve mantiene la fluidez del texto.
- source_word: ὁ πατὴρ ἡμῶν
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  - nuestro padre ancestral
  lexicon: LSJ
  rationale: Se conserva el término familiar del griego, que en este contexto honra a un antepasado de la fe. «Antepasado» explicita el sentido, pero «nuestro padre» preserva mejor la fuerza retórica y la cercanía del original.
- source_word: ἐν τῷ ζηλῶσαι ζῆλον
  english_pob_choice: because he was zealous with zeal
  chosen_spanish: porque mostró celo con celo
  alternatives_spanish:
  - porque fue celoso con celo
  - cuando mostró celo
  - por su celo
  lexicon: LSJ
  rationale: La construcción griega tiene valor causal y un énfasis cognado. «Mostró celo con celo» mantiene la redundancia enfática sin volverlo antinatural en español, y conserva la tensión retórica del texto.
- source_word: ἔλαβε
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - obtuvo
  - tomó
  lexicon: LSJ
  rationale: «Recibió» expresa mejor que el pacto fue concedido, no tomado por iniciativa propia. Es la equivalencia más natural y fiel al valor de ἔλαβε en este contexto.
- source_word: διαθήκην
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - una alianza
  - un convenio
  lexicon: LSJ
  rationale: Aunque «covenant» suele corresponder a «pacto» o «alianza», aquí se elige «pacto» por claridad en español y por su capacidad de reflejar el acuerdo otorgado a Finés sin perder el trasfondo bíblico.
- source_word: ἱερωσύνης
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - oficio sacerdotal
  - ministerio sacerdotal
  lexicon: LSJ
  rationale: «Sacerdocio» es el equivalente natural y bíblico de ἱερωσύνη. Mantiene el sustantivo abstracto y evita una paráfrasis que debilitaría la forma del texto.
- source_word: ἁγίας
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: LSJ
  rationale: Para el español bíblico, «santo» comunica mejor la cualidad consagrada y apartada de Dios. «Sagrado» es posible, pero «santo» preserva mejor la resonancia teológica del adjetivo.
theological_decisions:
- issue: Valor causal de la construcción con ἐν τῷ + infinitivo y la relación con la concesión del pacto
  english_pob_reading: because he was zealous with zeal
  chosen_spanish_reading: porque mostró celo con celo
  alternative_spanish_readings:
  - cuando mostró celo
  - por haber mostrado celo
  rationale: Se refleja la fuerza causal del griego, según la revisión del texto inglés, sin convertir la frase en una paráfrasis explicativa. La formulación mantiene el vínculo entre el celo de Finés y el pacto recibido.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la causalidad textual sin suavizar el énfasis.'
- issue: Cómo rendir la expresión tradicional del 'holy priesthood' sin borrar la santidad inherente al don
  english_pob_reading: holy priesthood
  chosen_spanish_reading: sacerdocio santo
  alternative_spanish_readings:
  - sacerdocio sagrado
  - sacerdocio consagrado
  rationale: «Sacerdocio santo» preserva la santidad como rasgo constitutivo del don y su asociación con Dios. Evita sustituir el lenguaje bíblico por formulaciones más institucionales que podrían diluir la referencia intertextual.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica y fidelidad al léxico bíblico.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que interpreta ἐν τῷ + infinitivo con matiz causal y prefiere «holy priesthood» sin artículo. La versión española refleja esa decisión con «porque» y «sacerdocio santo», manteniendo además el énfasis cognado del original.
  spanish_consistency_notes:
  - Se usó «celo» para ζηλῶσαι ζῆλον, preservando la repetición enfática del griego.
  - Se eligió «pacto» para διαθήκη en coherencia bíblica, aunque «alianza» sería una alternativa posible.
  - Se mantuvo un orden de frase natural en español sin añadir información ausente del texto fuente.
  - El nombre propio se transliteró de forma breve y reconocible en español bíblico.
