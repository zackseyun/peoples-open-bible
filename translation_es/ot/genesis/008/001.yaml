translation:
  language: es
  text: Pero Dios recordó[a] a Noé, y a todos los animales salvajes, y a todo el ganado que estaba con él en el arca. Y Dios hizo pasar un viento[b] sobre la tierra, y las aguas disminuyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios tuvo presente a Noé». El hebreo «recordó» suele implicar acción fiel, no simple memoria.
    reason: lexical_alternative
  - marker: b
    text: El hebreo רוּחַ puede significar «viento», «aliento» o «espíritu». Aquí «viento» encaja mejor con el contexto, aunque algunos ven un eco del Espíritu/viento sobre las aguas en Génesis 1:2.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְכֹּר
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - tuvo presente
  lexicon: HALOT
  rationale: זכר en contextos narrativos y de pacto suele implicar acción fiel, no simple rememoración mental. «Recordó» preserva el giro idiomático hebreo y deja ver el efecto narrativo sin explicarlo en exceso.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים funciona con sentido singular y se refiere al Dios de Israel. «Dios» es la equivalencia natural y precisa en español.
- source_word: כָּל הַחַיָּה
  english_pob_choice: all the wild animals
  chosen_spanish: a todos los animales salvajes
  alternatives_spanish:
  - a todas las bestias
  - a todos los animales
  lexicon: HALOT
  rationale: חַיָּה suele designar animales, a menudo salvajes, y aquí contrasta con בְּהֵמָה. «Animales salvajes» mantiene esa distinción frente al término siguiente.
- source_word: כָּל הַבְּהֵמָה
  english_pob_choice: all the livestock
  chosen_spanish: a todo el ganado
  alternatives_spanish:
  - a todos los animales domésticos
  - a todo el ganado doméstico
  lexicon: HALOT
  rationale: בְּהֵמָה en este contraste apunta a animales domesticados. «Ganado» es una solución natural en español y conserva la diferencia con חַיָּה.
- source_word: בַּתֵּבָה
  english_pob_choice: in the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - en la arca
  - dentro del arca
  lexicon: HALOT
  rationale: תֵּבָה es el término establecido para el arca de Noé. «Arca» es la forma tradicional y clara en español.
- source_word: וַיַּעֲבֵר ... רוּחַ
  english_pob_choice: caused a wind to pass
  chosen_spanish: hizo pasar un viento
  alternatives_spanish:
  - envió un viento
  - hizo soplar un viento
  lexicon: HALOT
  rationale: La forma causativa de עבר se refleja mejor con «hizo pasar». רוּחַ se traduce aquí como «viento» por el contexto inmediato de las aguas que descienden, sin excluir el trasfondo de eco creador.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra firme
  - sobre el mundo
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «tierra/país». En el relato del diluvio, «tierra» comunica bien el alcance amplio del pasaje sin sonar demasiado técnico.
- source_word: וַיָּשֹׁכּוּ הַמָּיִם
  english_pob_choice: the waters subsided
  chosen_spanish: las aguas se calmaron
  alternatives_spanish:
  - las aguas se apaciguaron
  - las aguas disminuyeron
  lexicon: HALOT
  rationale: El verbo expresa aquietarse o amainar. «Se calmaron» es natural en español y transmite la cesación del furor de las aguas de manera clara.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: Hebrew grammar
  rationale: El waw inicial puede ser simplemente coordinante, pero aquí «Pero» ayuda a marcar el giro narrativo desde el juicio hacia la misericordia sin añadir contenido nuevo.
theological_decisions:
- issue: Lenguaje antropomórfico en «Dios recordó a Noé»
  english_pob_reading: Retain the anthropomorphic idiom as 'God remembered Noah'
  chosen_spanish_reading: Conservar el giro idiomático «Dios recordó a Noé»
  alternative_spanish_readings:
  - Dios tuvo presente a Noé
  - Dios se acordó de Noé
  rationale: 'El hebreo debe preservarse como expresión narrativa de fidelidad divina, no suavizarse hasta una mera explicación. La frase mantiene la tensión teológica: no implica olvido previo, sino intervención fiel en favor de Noé.'
  doctrine_reference: Translation philosophy §3
- issue: Sentido de רוּחַ en el relato del diluvio
  english_pob_reading: Render רוּחַ as 'wind' in the main text
  chosen_spanish_reading: Traducir רוּחַ como «viento» en el texto principal
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: En este contexto inmediato, el resultado es la disminución de las aguas, por lo que «viento» es el sentido contextual más directo. La posible resonancia con Génesis 1:2 se conserva como trasfondo, no como traducción principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto coincide con la última revisión disponible, que no introdujo cambios respecto del borrador previo; el acuerdo de revisión y control cruzado fue alto y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en singular contextual.
  - Se conserva la distinción léxica entre «animales salvajes» y «ganado».
  - «Arca» se usa como término fijo para תֵּבָה en este contexto.
  - «Hizo pasar» refleja la causatividad del hebreo mejor que una simple equivalencia como «envió».
  - La nota de «viento» preserva la ambigüedad semántica relevante sin mover el sentido principal del versículo.
