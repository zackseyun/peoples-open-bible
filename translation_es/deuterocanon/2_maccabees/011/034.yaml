translation:
  language: es
  text: 'Los romanos también les enviaron una carta, redactada así: “Quinto Memio y Tito Manio, ancianos de los romanos[a], al pueblo de los judíos: saludos.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ancianos romanos» o, en contexto, «embajadores de los romanos». El término griego significa literalmente «ancianos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπέμψαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: LSJ
  rationale: El aoristo de πέμπω indica enviar. «Enviaron» es natural en español y conserva el sentido simple y directo del verbo sin añadir matices de autoridad o solemnidad no exigidos por el griego.
- source_word: οἱ Ῥωμαῖοι
  english_pob_choice: the Romans
  chosen_spanish: los romanos
  alternatives_spanish:
  - las autoridades romanas
  lexicon: LSJ
  rationale: El plural étnico-político se mantiene como «los romanos». No se introduce «autoridades», porque el griego no lo dice explícitamente.
- source_word: πρὸς αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: LSJ
  rationale: Con «enviaron», el complemento indirecto español «les» comunica de manera natural el valor de πρὸς αὐτούς sin perder el referente.
- source_word: ἐπιστολήν
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - una epístola
  - un escrito
  lexicon: LSJ
  rationale: «Carta» es el equivalente más natural y público en español moderno. «Epístola» suena más eclesiástico y no es necesario aquí.
- source_word: ἔχουσαν οὕτως
  english_pob_choice: worded as follows
  chosen_spanish: que decía así
  alternatives_spanish:
  - redactada así
  - con estas palabras
  lexicon: LSJ
  rationale: La construcción participial introduce el contenido de la carta. «Que decía así» reproduce con naturalidad la fórmula documental sin sobrecargarla.
- source_word: Κόιντος Μέμμιος, Τίτος Μάνιος
  english_pob_choice: Quintus Memmius and Titus Manius
  chosen_spanish: Quinto Memio y Tito Manio
  alternatives_spanish:
  - Quinto Memmio y Tito Manio
  lexicon: Nombres propios transliterados según convención editorial
  rationale: Se conservan los nombres propios en español con adaptación gráfica habitual. La forma «Memio/Manio» respeta la pronunciación hispana y la convención de transliteración del proyecto.
- source_word: πρεσβυταὶ Ῥωμαίων
  english_pob_choice: elders of the Romans
  chosen_spanish: ancianos de los romanos
  alternatives_spanish:
  - ancianos romanos
  - embajadores de los romanos
  lexicon: LSJ
  rationale: πρεσβυταί significa literalmente «ancianos». Se conserva esa lectura en el cuerpo principal para no resolver prematuramente la posible función diplomática; la alternativa contextual queda reflejada en nota.
- source_word: τῷ δήμῳ τῶν Ἰουδαίων
  english_pob_choice: to the people of the Jews
  chosen_spanish: al pueblo de los judíos
  alternatives_spanish:
  - al pueblo judío
  - a la nación de los judíos
  lexicon: LSJ
  rationale: δήμος se refiere al pueblo en sentido corporativo/cívico. «Al pueblo de los judíos» sigue de cerca la estructura griega y mantiene el tono formal de la salutación.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - que prosperen
  - regocíjense
  lexicon: LSJ
  rationale: En apertura epistolar, χαίρειν equivale a una fórmula de saludo. «Saludos» transmite esa función de forma sobria y clara en español.
theological_decisions:
- issue: 'πρεσβυταὶ Ῥωμαίων: oficio o función diplomática'
  english_pob_reading: “elders of the Romans,” with a footnote allowing “Roman elders” or contextually “ambassadors of the Romans.”
  chosen_spanish_reading: «ancianos de los romanos», con nota que permite «ancianos romanos» o, contextualmente, «embajadores de los romanos»
  alternative_spanish_readings:
  - ancianos romanos
  - embajadores de los romanos
  rationale: No se fija en el texto principal una función diplomática que el griego no explicita. La nota conserva la tensión lexical entre el valor literal de πρεσβυταί y su posible sentido contextual como enviados de rango alto.
  doctrine_reference: Precisión léxica y prudencia histórica; no aplica un pasaje doctrinal específico.
translation_notes:
  revision_awareness: 'Coincide con el último control de revisión: no se registran cambios sustantivos respecto del texto base auditado; la versión española mantiene la misma decisión central sobre πρεσβυταὶ y la fórmula epistolar.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otras entradas según norma del proyecto, pero aquí el versículo no contiene el nombre divino.
  - Se prefirió «saludos» para χαίρειν por ser una fórmula epistolar natural en español, sin convertirla en paráfrasis.
  - Se mantuvo «ancianos» en el texto principal para preservar la tensión lexical documentada, con la alternativa contextual en nota.
