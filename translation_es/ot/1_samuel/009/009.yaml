base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/009.yaml
  text: Formerly in Israel[a], when a man went to inquire of God, he would say, “Come, and let us go to the seer,” for he who is called a prophet today was formerly called a seer.
