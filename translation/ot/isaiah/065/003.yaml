  rationale: The verse condemns illicit worship practices. Because the immediate context is sacrificial and incense-offering activity, rendering the final phrase as 'on the brick altars' communicates the probable referent in natural English. The more formally literal 'on the bricks' is preserved in a footnote because the Hebrew noun itself names the material, not explicitly the structure.
