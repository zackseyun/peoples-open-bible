translation:
  language: es
  text: Y los levitas, los cantores, todos ellos—Asaf, Hemán, Jedutún, y sus hijos y sus hermanos—vestidos de lino fino, con címbalos, arpas[a] y liras, estaban de pie al oriente del altar[b]; y con ellos había ciento veinte sacerdotes que tocaban las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrumentos semejantes al arpa» para נְבָלִים; la distinción precisa entre los antiguos instrumentos de cuerda mencionados aquí no es segura.
    reason: lexical_alternative
  - marker: b
    text: O «estaban de pie al lado oriental del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Se conserva el grupo cultual/tribal con el artículo definido; en español, el nombre común 'levitas' es claro y natural.
- source_word: הַמְשֹׁרֲרִים
  english_pob_choice: who were the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores
  - los que cantaban
  lexicon: HALOT
  rationale: El participio identifica a los levitas por su función. 'Cantores' mantiene el valor descriptivo y suena más natural que una perífrasis larga.
- source_word: לְכֻלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos juntos
  lexicon: HALOT
  rationale: Expresa la inclusión total de los mencionados y conserva el énfasis distributivo del hebreo.
- source_word: לְאָסָף לְהֵימָן לִידֻתוּן
  english_pob_choice: Asaph, Heman, Jeduthun
  chosen_spanish: Asaf, Hemán, Jedutún
  alternatives_spanish:
  - Asaf, Hemán, Jedutún
  lexicon: HALOT
  rationale: Se transliteran los nombres propios de modo estándar en español bíblico, sin adaptar innecesariamente la forma.
- source_word: וְלִבְנֵיהֶם וְלַאֲחֵיהֶם
  english_pob_choice: and their sons and their brothers
  chosen_spanish: y sus hijos y sus hermanos
  alternatives_spanish:
  - y sus hijos y sus hermanos
  - y sus hijos y sus parientes
  lexicon: HALOT
  rationale: Se mantiene la pareja de términos familiares del hebreo. 'Hermanos' puede abarcar a los varones asociados del mismo ámbito clan/culto, y no se suaviza a 'parientes' sin necesidad textual.
- source_word: מְלֻבָּשִׁים בּוּץ
  english_pob_choice: were clothed in fine linen
  chosen_spanish: vestidos de lino fino
  alternatives_spanish:
  - vestidos de lino fino
  - vestidos de lino
  lexicon: HALOT
  rationale: בוץ se entiende como lino de alta calidad; 'lino fino' refleja la dignidad del atuendo cultual y coincide con el valor semántico amplio del término.
- source_word: בִּמְצִלְתַּיִם
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con címbalos
  lexicon: HALOT
  rationale: Se usa el equivalente español tradicional y claro para el instrumento de percusión.
- source_word: וּבִנְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - arpas
  - instrumentos semejantes al arpa
  lexicon: HALOT
  rationale: La lista musical permite una designación convencional en español. 'Arpas' sigue la elección inglesa sin perder la cautela sobre la taxonomía exacta del instrumento.
- source_word: וְכִנֹּרוֹת
  english_pob_choice: lyres
  chosen_spanish: liras
  alternatives_spanish:
  - liras
  - cítaras
  lexicon: HALOT
  rationale: '''Liras'' distingue mejor este instrumento de נבל y corresponde al equivalente moderno usual para כִּנּוֹר.'
- source_word: עֹמְדִים מִזְרָח לַמִּזְבֵּחַ
  english_pob_choice: standing east of the altar
  chosen_spanish: estaban de pie al oriente del altar
  alternatives_spanish:
  - estaban de pie al oriente del altar
  - estaban de pie al lado oriental del altar
  lexicon: HALOT
  rationale: '''Al oriente'' conserva el sentido locativo de מִזְרָח y respeta la formulación bíblica sin volverla artificial. Se mantiene la imagen espacial de la posición litúrgica.'
- source_word: וְעִמָּהֶם כֹּהֲנִים
  english_pob_choice: and with them were ... priests
  chosen_spanish: y con ellos había sacerdotes
  alternatives_spanish:
  - y con ellos había sacerdotes
  - y con ellos estaban sacerdotes
  lexicon: HALOT
  rationale: El hebreo indica acompañamiento; en español se expresa de forma natural con una construcción existencial.
- source_word: לְמֵאָה וְעֶשְׂרִים
  english_pob_choice: one hundred twenty
  chosen_spanish: ciento veinte
  alternatives_spanish:
  - ciento veinte
  lexicon: HALOT
  rationale: Se usa la forma numérica natural y digna en español.
- source_word: מְחַצְרְרִים בַּחֲצֹצְרוֹת
  english_pob_choice: blowing trumpets
  chosen_spanish: que tocaban las trompetas
  alternatives_spanish:
  - que tocaban las trompetas
  - que hacían sonar las trompetas
  lexicon: HALOT
  rationale: El participio denominativo se traduce con un verbo idiomático español. 'Tocar las trompetas' preserva la acción instrumental sin sonar técnico o torpe.
theological_decisions:
- issue: 'La dirección espacial del culto: ''oriente del altar'' frente a ''lado oriental del altar'''
  english_pob_reading: standing east of the altar
  chosen_spanish_reading: estaban de pie al oriente del altar
  alternative_spanish_readings:
  - estaban de pie al lado oriental del altar
  - estaban de pie al este del altar
  rationale: No hay motivo para convertir la expresión en una explicación interpretativa. 'Al oriente' mantiene la referencia litúrgica y la ambigüedad mínima del hebreo, tal como el POB inglés dejó abierta la opción de 'east of' o 'on the east side of'.
  doctrine_reference: No aplica; decisión espacial y cultual, no doctrinal.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés quedó sin cambios y con alto grado de acuerdo; por eso esta versión española sigue de cerca la solución auditada, conservando la lista musical, la posición cultual y el verbo instrumental sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conserva la distinción entre 'arpas' y 'liras' para reflejar la diferencia entre נבל y כִּנּוֹר.
  - '''Cantores'' traduce el participio atributivo sin añadir una cláusula explicativa excesiva.'
  - Se usa 'oriente' para el valor locativo de מִזְרָח, en línea con el español bíblico moderno y legible.
