translation:
  language: es
  text: Pero cuando Dios manda a las nubes a moverse sobre todo el mundo habitado, cumplen lo que fue dispuesto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cumplen lo que fue ordenado». El griego τὸ ταχθέν puede enfatizar tanto lo que ha sido ordenado como lo que ha sido dispuesto para ellas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νεφέλαις
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - nubes
  lexicon: LSJ
  rationale: El dativo plural aquí funciona dentro de una construcción condicional-temporal; en español conviene nombrar el sujeto de forma natural como plural definido, sin añadir matices ajenos.
- source_word: ἐπιταγῇ
  english_pob_choice: are commanded
  chosen_spanish: son mandadas
  alternatives_spanish:
  - son ordenadas
  - reciben un mandato
  lexicon: BDAG
  rationale: El pasivo conserva la agencia divina del texto. "Son mandadas" es más natural en español actual que una calca rígida, y mantiene la idea de mandato sin perder claridad.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de parte de Dios
  lexicon: BDAG
  rationale: La construcción con ὑπό + genitivo expresa agencia personal en pasiva; "por Dios" es el equivalente directo y transparente.
- source_word: ἐπιπορεύεσθαι
  english_pob_choice: to move
  chosen_spanish: moverse
  alternatives_spanish:
  - ir
  - proseguir
  - avanzar
  lexicon: LSJ
  rationale: El infinitivo describe el desplazamiento de las nubes sobre la tierra; "moverse" es la opción más clara y fiel al movimiento meteorológico, evitando el arcaísmo de "ir adelante" o "salir".
- source_word: ἐφʼ ὅλην τὴν οἰκουμένην
  english_pob_choice: over the whole inhabited world
  chosen_spanish: sobre todo el mundo habitado
  alternatives_spanish:
  - por todo el mundo habitado
  - sobre toda la tierra habitada
  lexicon: BDAG
  rationale: '"οἰκουμένη" suele referirse al mundo habitado; "todo el mundo habitado" preserva el alcance geográfico y evita reducirlo sin más a "tierra".'
- source_word: συντελοῦσι
  english_pob_choice: they accomplish
  chosen_spanish: cumplen
  alternatives_spanish:
  - llevan a cabo
  - acaban
  - realizan
  lexicon: BDAG
  rationale: En contexto, el verbo expresa llevar a efecto lo que se les ha asignado. "Cumplen" transmite con sobriedad la idea de ejecutar eficazmente lo ordenado.
- source_word: τὸ ταχθέν
  english_pob_choice: what was appointed
  chosen_spanish: lo que fue dispuesto
  alternatives_spanish:
  - lo que fue ordenado
  - lo que fue asignado
  - lo establecido
  lexicon: BDAG
  rationale: El participio pasivo articular de τάσσω puede significar lo ordenado o dispuesto. "Lo que fue dispuesto" conserva el pasivo y la apertura semántica sin forzar una lectura más técnica o más determinista de lo que el contexto exige.
theological_decisions:
- issue: Matiz de la acción divina en τὸ ταχθέν
  english_pob_reading: what was appointed
  chosen_spanish_reading: lo que fue dispuesto
  alternative_spanish_readings:
  - lo que fue ordenado
  - lo establecido
  rationale: La frase expresa una tarea fijada por Dios para las nubes. "Dispuesto" mantiene la soberanía divina y, a la vez, deja espacio al matiz de designación/orden sin imponer una carga doctrinal más fuerte que la del contexto inmediato.
  doctrine_reference: Preservar la tensión lexical entre orden, disposición y designación divina sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa concuerdan de manera alta; no se requirieron revisiones textuales. La elección española sigue la misma lectura de fondo, manteniendo el paralelismo entre mandato divino, movimiento de las nubes y ejecución de lo dispuesto.
  spanish_consistency_notes:
  - Se usa "Dios" de manera directa, conforme al griego θεοῦ y al criterio POB para el nombre divino cuando no aparece el Tetragrámaton.
  - Se evita "SEÑOR" porque el texto no contiene κύριος ni una cita del nombre divino en esta unidad.
  - '"Mundo habitado" conserva οἰκουμένη sin reducirlo a un mero "mundo" ni expandirlo innecesariamente.'
  - '"Dispuesto" y la nota a pie preservan la alternativa "ordenado", tal como la auditoría inglesa señaló la tensión léxica de τὸ ταχθέν.'
