translation:
  language: es
  text: Y el ancho[a] del frente del templo[b] y del área separada hacia el oriente[c] era de cien codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anchura» en lugar de «ancho».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa»; en esta visión del templo, se refiere al edificio del templo.'
    reason: lexical_alternative
  - marker: c
    text: O «hacia el este» o «al este».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - bastura
  lexicon: HALOT
  rationale: El término hebreo designa una medida horizontal. En español, ‘ancho’ es natural y claro en un contexto arquitectónico; ‘anchura’ también sería posible, pero suena un poco más técnico y menos fluido en esta construcción.
- source_word: פְּנֵי
  english_pob_choice: front of
  chosen_spanish: frente de
  alternatives_spanish:
  - cara de
  - fachada de
  lexicon: HALOT
  rationale: En uso espacial/arquitectónico, פְּנֵי comunica la parte frontal u orientada hacia el observador. ‘Frente de’ conserva esa orientación sin forzar un calco demasiado literal como ‘cara de’.
- source_word: הַבַּיִת
  english_pob_choice: the temple
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘la casa’. Aunque el contexto visionario se refiere al templo, aquí conviene conservar la forma hebrea porque el dato textual es parte de la descripción arquitectónica y el español lo admite con naturalidad. La aclaración interpretativa ya estaba en el audit trail inglés.
- source_word: הַגִּזְרָה
  english_pob_choice: the separate area
  chosen_spanish: el área separada
  alternatives_spanish:
  - el lugar separado
  - la zona separada
  lexicon: HALOT
  rationale: El término apunta a una porción distinguida o apartada dentro del complejo. ‘Área separada’ comunica bien la función espacial sin imponer una terminología eclesiástica o tradicional no sustentada por el hebreo.
- source_word: לַקָּדִים
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: HALOT
  rationale: La preposición marca orientación. ‘Hacia el oriente’ preserva la dirección sin convertirla en un adverbio abstracto ni perder la referencia espacial.
- source_word: מֵאָה אַמָּה
  english_pob_choice: a hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - cien codos de medida
  - cien unidades de codo
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua de medida, como en el inglés POB. ‘Cien codos’ es idiomático en español bíblico y fiel al valor metrológico del texto.
translation_notes:
  revision_awareness: El inglés auditado fue revisado de ‘on the east side’ a ‘toward the east’ para alinearse más de cerca con el hebreo. La redacción española sigue esa orientación direccional con ‘hacia el oriente’.
  spanish_consistency_notes:
  - Se mantuvo ‘Y’ inicial para reflejar el enlace coordinante del hebreo.
  - Se preservó la unidad antigua ‘codos’ en lugar de convertirla a medidas modernas.
  - Se evitó ‘SEÑOR’ u otros términos teológicos ajenos porque el versículo no los contiene.
  - ‘Casa’ se dejó en el texto principal con nota explicativa, siguiendo el valor literal del hebreo y el contexto visionario.
