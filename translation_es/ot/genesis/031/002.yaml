translation:
  language: es
  text: Y vio Jacob el rostro[a] de Labán, y he aquí[b], no era el mismo con él como antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el rostro de Labán»; en hebreo, «rostro» puede señalar también la disposición o actitud visible de una persona.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y mira».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  - notó
  lexicon: HALOT
  rationale: El verbo narrativo básico ראה se expresa naturalmente en español con «vio». Conserva el sentido simple de percepción sin añadir interpretación.
- source_word: פְּנֵי לָבָן
  english_pob_choice: Laban’s face
  chosen_spanish: el rostro de Labán
  alternatives_spanish:
  - la cara de Labán
  - el semblante de Labán
  lexicon: HALOT
  rationale: «Rostro» mantiene la imagen concreta de פנים y funciona bien en español para sugerir la disposición visible de una persona, sin convertirlo de entrada en una paráfrasis psicológica.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y, he aquí
  - y entonces
  lexicon: HALOT
  rationale: «Y he aquí» reproduce la fuerza discursiva de atención y sorpresa del hebreo, con un giro bíblico inteligible en español.
- source_word: אֵינֶנּוּ עִמּוֹ
  english_pob_choice: it was not toward him
  chosen_spanish: no estaba hacia él
  alternatives_spanish:
  - no estaba con él
  - ya no estaba de su lado
  - su actitud no era la misma hacia él
  lexicon: HALOT
  rationale: El hebreo tiene el sentido idiomático de una disposición relacional cambiada. «No estaba hacia él» conserva la imagen espacial/relacional y evita borrar la tensión semántica que el inglés POB también preservó con «toward him».
- source_word: כִּתְמֹל שִׁלְשׁוֹם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como ayer y anteayer
  - como antiguamente
  - como en tiempos pasados
  lexicon: HALOT
  rationale: El modismo significa literalmente «como ayer y anteayer», es decir, previamente. «Como antes» comunica de manera natural la comparación temporal y mantiene la brevedad del hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión para resolver la ambigüedad de «he was not with him» y aclarar el idiomatismo en dirección/actitud. La presente versión española sigue esa línea de claridad sin abandonar la concreción hebrea de «rostro» y la expresión relacional de עִם/אֶל implícita en el contexto.
  spanish_consistency_notes:
  - Se mantuvo «Labán» como forma fija del nombre propio.
  - Se usó «rostro» en el texto principal, con nota para su valor idiomático, para evitar perder la imagen hebrea.
  - «Como antes» conserva la economía del modismo y es idiomático en español moderno.
  - No se introdujeron términos doctrinales o eclesiales ajenos al pasaje.
