  yaml_path: translation/ot/ezra/004/012.yaml
  text: Let it be known to the king that the Jews who came up from you to us have come to Jerusalem[a]. They are rebuilding the rebellious and wicked city[b], finishing the walls and repairing the foundations.
  footnotes:
  - marker: a
    text: Or “the Judeans.” The Aramaic term can denote the people of Judah/Judea as well as the Jews more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or “laying/setting the foundations.” The Aramaic expression is somewhat difficult and may refer either to repairing existing foundations or setting them in place.
    reason: lexical_alternative
