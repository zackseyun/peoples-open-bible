source:
  edition: WLC
  text: וְ/דִ֣י אֲמַ֗רוּ לְ/מִשְׁבַּ֞ק עִקַּ֤ר שָׁרְשׁ֨וֹ/הִי֙ דִּ֣י אִֽילָנָ֔/א מַלְכוּתָ֖/ךְ לָ֣/ךְ קַיָּמָ֑ה מִן דִּ֣י תִנְדַּ֔ע דִּ֥י שַׁלִּטִ֖ן שְׁמַיָּֽ/א־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/023.yaml
  text: And because they said to leave the stump of the tree with its roots[a], your kingdom will remain yours from the time that you know that Heaven rules.
  footnotes:
  - marker: a
    text: Or, 'the heavens rule.' The Aramaic uses 'heavens' as a reverential expression for God's sovereign authority.
    reason: alternative_reading
