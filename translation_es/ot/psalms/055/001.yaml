translation:
  language: es
  text: 'Para el director del coro: con instrumentos de cuerda. Maskil de David[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un salmo instructivo» o «un canto contemplativo»; el sentido preciso de Maskil en los encabezamientos de salmos es incierto.
    reason: lexical_alternative
  - marker: b
    text: La expresión «de David» también puede significar «por David» o «para David».
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director musical
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el participio con ל indica dirección/dedicación a una autoridad musical. «Director del coro» comunica de manera natural la función litúrgica sin volver demasiado arcaico el español.
- source_word: בִּנְגִינֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - sobre instrumentos de cuerda
  - con acompañamiento de cuerda
  lexicon: HALOT
  rationale: נְגִינֹות se refiere a acompañamiento musical de cuerdas. «Con instrumentos de cuerda» preserva el sentido de acompañamiento y evita una calca menos natural en español.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - un salmo didáctico
  - un canto contemplativo
  lexicon: HALOT
  rationale: El término técnico de los encabezamientos es incierto. Se conserva transliterado para no resolver indebidamente su género/función; la nota recoge las alternativas documentadas.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: La preposición ל en los superscritos puede señalar autoría, pertenencia, dedicación o asociación. «De David» mantiene esa ambigüedad mejor que una opción más específica.
theological_decisions:
- issue: Relación exacta de David con el salmo en el superscrito
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a precisar una única relación. «De David» preserva la tensión textual y no afirma más de lo que el encabezamiento garantiza.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo (WLC) y el audit trail inglés. No se observan revisiones posteriores que obliguen a cambiar la solución adoptada; se conserva la ambigüedad de מַשְׂכִּיל y de לְדָוִד.
  spanish_consistency_notes:
  - Se usó «director del coro» como equivalente funcional de לַמְנַצֵּחַ, en vez de «músico principal» o «maestro de coro», por naturalidad y claridad litúrgica.
  - Se mantuvo «Maskil» transliterado para respetar la incertidumbre semántica del término técnico.
  - Se optó por «instrumentos de cuerda» para בִּנְגִינֹת, evitando una traducción demasiado literal como «sobre cuerdas» que podría oscurecer el sentido de acompañamiento.
  - 'La puntuación sigue el estilo español: dos puntos en la primera cláusula y punto final antes de las notas.'
