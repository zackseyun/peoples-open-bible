translation:
  language: es
  text: Los preceptos de Yahvé son rectos, alegran el corazón; el mandamiento de Yahvé es puro[a], ilumina los ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «claro» para «puro»; el adjetivo hebreo puede entenderse como énfasis en la pureza, con el sentido resultante de claridad que encaja con el paralelismo «ilumina los ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּקּוּדֵי
  english_pob_choice: precepts
  chosen_spanish: preceptos
  alternatives_spanish:
  - estatutos
  - instrucciones
  - mandatos
  lexicon: HALOT
  rationale: פִּקּוּדִים pertenece al campo de los términos de la Torá y designa disposiciones o mandatos concretos. 'Preceptos' conserva ese matiz técnico y evita diluirlo en 'instrucciones', que es más amplio, o en 'estatutos', que podría no corresponder al contraste poético del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se traduce con el nombre propio divino, no con una sustitución titulada. En español, 'Yahvé' comunica ese nombre revelado y sigue la convención del proyecto, preservando la referencia personal del texto hebreo.
- source_word: יְשָׁרִים
  english_pob_choice: right
  chosen_spanish: rectos
  alternatives_spanish:
  - justos
  - upright
  - derechos
  lexicon: HALOT
  rationale: '''Rectos'' expresa de forma natural en español la idea de corrección moral de los preceptos. ''Justos'' desplazaría el matiz hacia el ámbito jurídico; ''derechos'' puede sonar más físico que ético.'
- source_word: מְשַׂמְּחֵי לֵב
  english_pob_choice: rejoicing the heart
  chosen_spanish: alegran el corazón
  alternatives_spanish:
  - regocijan el corazón
  - hacen feliz el corazón
  lexicon: HALOT
  rationale: 'El participio causativo expresa un efecto continuo: hacen que el corazón se alegre. ''Alegan el corazón'' suena natural en español y conserva el objeto concreto ''corazón'' sin abstraerlo a ''mente'' o ''interior''.'
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - ser interior
  lexicon: HALOT
  rationale: En poesía hebrea, לֵב abarca interioridad, pensamiento y voluntad, pero 'corazón' es el equivalente español más amplio y fiel en este contexto.
- source_word: מִצְוַת
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - orden
  - precepto
  lexicon: HALOT
  rationale: El singular funciona de manera colectiva o representativa dentro de la serie de sinónimos de la Torá. 'Mandamiento' preserva el contraste con 'preceptos' y mantiene el matiz covenantal/legal del hebreo.
- source_word: בָּרָה
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - claro
  - radiante
  lexicon: HALOT
  rationale: '''Puro'' retiene el sentido básico de limpieza/pureza del adjetivo. Aunque ''claro'' puede captar la resonancia con la frase siguiente, ese valor es más interpretativo que léxico y no conviene fijarlo en el texto principal.'
- source_word: מְאִירַת עֵינָיִם
  english_pob_choice: enlightening the eyes
  chosen_spanish: ilumina los ojos
  alternatives_spanish:
  - da luz a los ojos
  - hace brillar los ojos
  lexicon: HALOT
  rationale: 'El participio hiphil de אור es causativo: dar luz, iluminar. ''Ilumina los ojos'' preserva la imagen concreta y funciona bien en paralelo con la cláusula anterior.'
- source_word: עֵינָיִם
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  - entendimiento
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo concreto 'ojos' como imagen de percepción y vitalidad. Mantenerlo evita convertir demasiado pronto la metáfora en una abstracción.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. La lectura española 'Yahvé' conserva el nombre divino del pacto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene conforme al estado de alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se conservó la distinción entre 'preceptos' y 'mandamiento' para reflejar dos términos hebreos distintos.
  - Se eligió 'Yahvé' de manera consistente con la política del proyecto para יְהוָה.
  - '''Corazón'' y ''ojos'' se mantuvieron concretos para respetar la imaginería poética hebrea.'
  - La nota al pie se ancla en 'rectos' porque 'claro' es una alternativa semántica vinculada al valor de בָּרָה en el paralelo del verso.
