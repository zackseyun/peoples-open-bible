  to: Cuando David había pasado un poco más allá de la cumbre[a], he aquí que Ziba, el siervo de Mefiboset[b], salió a recibirlo con un par de asnos ensillados, y sobre ellos había doscientos panes, cien racimos de pasas, cien frutos de verano[c] y un odre de vino.
