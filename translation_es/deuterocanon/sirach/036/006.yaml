translation:
  language: es
  text: Un caballo para montar es como un amigo burlón[a]; bajo cualquiera que lo monte, relincha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego es algo terso e inusual. La expresión traducida «para montar» puede, en otros contextos, tener sentido sexual; aquí, la imagen inmediata de alguien montado en el caballo favorece claramente el sentido de montar en el sentido de cabalgar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵππος
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - caballo de montar
  - jamelgo
  lexicon: LSJ
  rationale: ἵππος designa de manera ordinaria un caballo; en español, «caballo» conserva el sentido básico sin añadir matices no exigidos por el contexto.
- source_word: εἰς ὀχείαν
  english_pob_choice: for mounting
  chosen_spanish: para montar
  alternatives_spanish:
  - para ser montado
  - para cabalgar
  - para copulación
  lexicon: LSJ
  rationale: La POB inglesa escogió el sentido de montar/riding por el contexto inmediato de alguien sentado sobre el caballo. En español, «para montar» mantiene esa lectura y evita introducir el sentido sexual posible en otros contextos.
- source_word: ὡς φίλος μῶκος
  english_pob_choice: like a mocking friend
  chosen_spanish: como un amigo burlón
  alternatives_spanish:
  - como un amigo que se burla
  - como un amigo ridiculizador
  - como un amigo necio
  lexicon: LSJ
  rationale: μῶκος remite a burla, mofa o ridículo; «burlón» conserva la idea de alguien que se burla. «Amigo» preserva la imagen relacional del símil, tal como en la POB inglesa.
- source_word: ὑποκάτω παντὸς ἐπικαθημένου
  english_pob_choice: under anyone who sits on it
  chosen_spanish: debajo de cualquiera que se siente sobre él
  alternatives_spanish:
  - bajo cualquier jinete
  - debajo de todo el que lo monta
  - bajo quienquiera que lo monte
  lexicon: LSJ
  rationale: παντός da una amplitud universal; ἐπικαθημένου es el que se sienta sobre el animal. «Debajo de cualquiera que se siente sobre él» conserva esa universalidad con español natural.
- source_word: χρεμετίζει
  english_pob_choice: it neighs
  chosen_spanish: relincha
  alternatives_spanish:
  - hennila
  - necesita relinchar
  lexicon: LSJ
  rationale: χρεμετίζει es el verbo normal para el sonido del caballo. En español, «relincha» es el equivalente más directo y digno; «hennila» suena más regional o menos estándar.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «under anyone sitting on it» a «under anyone who sits on it» para mayor naturalidad. La propuesta española ya expresa ese valor con una relativa explícita («que se siente»), manteniendo la amplitud indefinida del griego.
  spanish_consistency_notes:
  - Se mantiene «caballo» y no «jamelgo» porque el pasaje no denigra al animal por su especie sino que usa una comparación figurada con su conducta.
  - Se usa «relincha» como verbo estándar de caballo; no se introduce «chilla» ni otro equivalente coloquial.
  - La nota [a] conserva la tensión léxica documentada en el original y en la POB inglesa sobre εἰς ὀχείαν.
