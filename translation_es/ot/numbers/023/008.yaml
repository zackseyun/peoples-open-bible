translation:
  language: es
  text: ¿Cómo podría yo maldecir a quien Dios no ha maldecido? ¿Y cómo podría yo denunciar a quien Yahvé no ha denunciado?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Y cómo podría yo indignarme contra quien Yahvé no se ha indignado?» El verbo hebreo de la segunda línea puede enfatizar indignación o denuncia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: How can
  chosen_spanish: ¿Cómo podría yo
  alternatives_spanish:
  - ¿Cómo puedo yo?
  - ¿Cómo habría de yo?
  lexicon: HALOT
  rationale: La pregunta retórica expresa imposibilidad, no solicitud de información. «¿Cómo podría yo» comunica bien esa fuerza en español natural y mantiene el tono oracular.
- source_word: אֶקֹּב
  english_pob_choice: I curse
  chosen_spanish: maldecir
  alternatives_spanish:
  - maldecir con maldición
  - invocar maldición sobre
  lexicon: HALOT
  rationale: En el contexto de Balaam, el verbo apunta a pronunciar maldición. «Maldecir» es claro, idiomático y conserva la correspondencia con la primera línea.
- source_word: קַבֹּה
  english_pob_choice: has cursed
  chosen_spanish: ha maldecido
  alternatives_spanish:
  - ha maldito
  - ha proferido maldición contra
  lexicon: HALOT
  rationale: Se mantiene el mismo campo léxico que en la primera mitad para preservar el paralelismo y la relación verbal entre lo que Balaam no puede hacer y lo que Dios no ha hecho.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino común; «Dios» transmite el sentido sin transliterar el título, en línea con el criterio auditado en inglés.
- source_word: וּמָה
  english_pob_choice: And how can
  chosen_spanish: ¿Y cómo podría yo
  alternatives_spanish:
  - ¿Y cómo habría de yo?
  - ¿Y cómo podría?
  lexicon: HALOT
  rationale: La conjunción suma una segunda pregunta paralela. «¿Y cómo podría yo» reproduce la fuerza retórica y mantiene el paralelismo poético en español.
- source_word: אֶזְעֹם
  english_pob_choice: I denounce
  chosen_spanish: denunciar
  alternatives_spanish:
  - indignarme contra
  - maldecir
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de diferenciar este verbo del primero. «Denunciar» conserva la idea de una declaración hostil/impugnadora y permite distinguirlo de «maldecir».
- source_word: זָעַם
  english_pob_choice: has not denounced
  chosen_spanish: no ha denunciado
  alternatives_spanish:
  - no se ha indignado
  - no ha maldecido
  lexicon: HALOT
  rationale: Se preserva la relación léxica con אֶזְעֹם mediante el mismo verbo español. Aunque «indignarse» también es posible, «denunciar» mantiene mejor la correspondencia con el acto verbal señalado en la nota inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», manteniendo el nombre propio divino en vez de sustituirlo por un título.'
theological_decisions:
- issue: Distinguir entre el nombre divino común אֵל y el Tetragrámaton יְהוָה
  english_pob_reading: Translate אֵל as 'God' and יְהוָה as 'Yahweh'
  chosen_spanish_reading: Traducir אֵל como «Dios» y יְהוָה como «Yahvé»
  alternative_spanish_readings:
  - Traducir ambos como «Dios»
  - Mantener ambos como nombres transliterados
  rationale: La estrofa distingue entre un título divino común y el nombre de pacto. Conservar esa distinción en español evita borrar el contraste poético y teológico del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Valor semántico del segundo verbo: indignación/denuncia'
  english_pob_reading: The Hebrew verb in the second line can emphasize indignation or denunciation.
  chosen_spanish_reading: La segunda línea se vierte con «denunciar», dejando abierta la posibilidad semántica de indignación hostil
  alternative_spanish_readings:
  - «indignarme»
  - «maldecir»
  rationale: La nota inglesa mantiene la tensión entre indignación y denuncia. «Denunciar» preserva un acto verbal hostil, mientras que la nota permite reconocer la alternativa de énfasis afectivo sin ocultarla.
  doctrine_reference: Principio POB de no borrar tensiones léxicas documentadas
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios; este borrador sigue la lectura auditada en inglés y conserva la distinción léxica documentada entre las dos líneas poéticas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, según la terminología del proyecto.
  - «Dios» se reserva para אֵל como título común, sin transliterar «El».
  - Se mantiene la diferencia entre «maldecir» y «denunciar» para no aplanar el paralelismo hebreo.
  - La puntuación conserva las dos preguntas retóricas coordinadas por «Y».
