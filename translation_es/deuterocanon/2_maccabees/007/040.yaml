translation:
  language: es
  text: Y así también este otro murió en pureza[a], habiendo puesto su plena confianza en el Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «murió puramente», es decir, de un modo puro o sin mancha. El adverbio griego probablemente lleva fuerza moral.
    reason: lexical_alternative
  - marker: b
    text: O «habiendo confiado por completo en el Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ οὗτος οὖν
  english_pob_choice: And so this one also
  chosen_spanish: Y así también este otro
  alternatives_spanish:
  - Y este también
  - Así que este también
  lexicon: LSJ
  rationale: Conserva la fuerza conjuntiva de καὶ...οὖν y el énfasis demostrativo de οὗτος, con un español natural y de registro narrativo.
- source_word: καθαρῶς
  english_pob_choice: in purity
  chosen_spanish: en pureza
  alternatives_spanish:
  - puramente
  - en estado puro
  - sin mancha
  lexicon: LSJ
  rationale: Mantiene el valor adverbial y la carga moral/religiosa que el audit trail señala, sin reducirlo a una simple elegancia estilística.
- source_word: μετήλλαξεν
  english_pob_choice: passed away
  chosen_spanish: pasó
  alternatives_spanish:
  - murió
  - partió
  - falleció
  lexicon: LSJ
  rationale: En este contexto es un eufemismo reverente para morir; «pasó» conserva ese tono, aunque en español queda mejor si se entiende como elipsis de «pasó de esta vida». La alternativa más explícita queda implícita en la cadencia.
- source_word: παντελῶς ... πεποιθώς
  english_pob_choice: having placed his full confidence
  chosen_spanish: habiendo puesto su plena confianza
  alternatives_spanish:
  - confiando por completo
  - habiendo confiado plenamente
  - con entera confianza
  lexicon: BDAG
  rationale: «Plena confianza» comunica el alcance total de παντελῶς y preserva el estado duradero de πεποιθώς con un giro natural en español.
- source_word: ἐπὶ τῷ κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - sobre el Señor
  - en Yahvé
  lexicon: BDAG
  rationale: La construcción con πεποιθώς pide en español la preposición de confianza «en». Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el griego κύριος funciona como título en el contexto de la narración griega; «Señor» mantiene la correspondencia inmediata con el texto fuente y la fórmula de confianza.
theological_decisions:
- issue: Cómo reflejar la valoración moral de καθαρῶς en el martirio
  english_pob_reading: The phrase indicates that he died in a state or manner of purity/integrity.
  chosen_spanish_reading: La expresión indica que pasó de esta vida de un modo puro, con integridad moral y fidelidad.
  alternative_spanish_readings:
  - murió simplemente de manera noble
  - falleció sin contaminación ritual
  rationale: El contexto inmediato es el martirio fiel a la ley de Dios; por eso conviene retener una lectura moralmente cargada. «En pureza» conserva la tensión sin especificar en exceso si el matiz es ritual, moral o ambos.
  doctrine_reference: Preservar la tensión teológica y lexical en vez de resolverla de forma reductiva.
translation_notes:
  revision_awareness: 'La versión inglesa revisada mantuvo «passed away in purity» y cambió «complete confidence» por «full confidence» para mayor naturalidad. La propuesta española sigue esa misma línea: conserva el tono reverente de la muerte y expresa la totalidad de la confianza con «plena confianza».'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος en coherencia con el valor inmediato del griego y con la fórmula de confianza.
  - «Pureza» se usó para sostener el matiz moral señalado por el audit trail, sin imponer una lectura exclusivamente ritual.
  - La formulación evita traducir mecánicamente la perífrasis inglesa y busca una sintaxis española fluida pero pegada al sentido del original.
