translation:
  language: es
  text: Yahvé[a], el Dios de Israel, entregó a Sihón y a todo su pueblo en manos de Israel, y los abatieron. Así Israel tomó posesión de toda la tierra de los amorreos que habitaban en aquella tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en manos de Israel'', un modismo que significa bajo el poder de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español, 'Yahvé' preserva ese nombre revelado y sigue la convención POB de no ocultarlo bajo una sustitución titulística.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelito
  lexicon: HALOT
  rationale: La construcción de estado ligado identifica a Yahvé de manera pactual como el Dios perteneciente a Israel; 'el Dios de Israel' es la equivalencia directa y natural en español.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - cedió
  - entregó en
  lexicon: HALOT
  rationale: Aunque 'dio' sería más literal, en este contexto bélico 'entregó' expresa mejor la acción de poner a Sihón bajo el poder de Israel sin perder la base verbal de נתן.
- source_word: בְּיַד יִשְׂרָאֵל
  english_pob_choice: into the hand of Israel
  chosen_spanish: en mano de Israel
  alternatives_spanish:
  - en la mano de Israel
  - en el poder de Israel
  - en manos de Israel
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de 'mano' como esfera de poder. 'En mano de Israel' mantiene el giro bíblico y deja visible la imagen idiomática; por eso se añade el referente con la acción siguiente, 'los derrotaron'.
- source_word: וַיַּכּוּם
  english_pob_choice: they struck them down
  chosen_spanish: ellos los derrotaron
  alternatives_spanish:
  - los golpearon
  - los hirieron
  - los abatieron
  lexicon: HALOT
  rationale: נכה en narrativa militar puede implicar derrota decisiva. 'Derrotaron' comunica el resultado bélico de forma clara en español, aunque pierde algo de concreción física; esa tensión se compensa con la primera cláusula sobre la entrega en mano de Israel.
- source_word: וַיִּירַשׁ
  english_pob_choice: took possession of
  chosen_spanish: tomó posesión de
  alternatives_spanish:
  - heredó
  - poseyó
  - ocupó
  lexicon: HALOT
  rationale: ירש aquí expresa la ocupación hereditaria/territorial tras la victoria. 'Tomó posesión de' reproduce mejor ese valor que 'heredó' o 'ocupó' aislados.
- source_word: כָּל אֶרֶץ הָאֱמֹרִי
  english_pob_choice: all the land of the Amorites
  chosen_spanish: toda la tierra de los amorreos
  alternatives_spanish:
  - todo el territorio de los amorreos
  - toda la tierra del amorreo
  lexicon: HALOT
  rationale: En español es más natural el plural étnico 'los amorreos' que el singular colectivo. 'Tierra' conserva el vocabulario bíblico directo; 'territorio' sería una alternativa más abstracta.
- source_word: יוֹשֵׁב הָאָרֶץ הַהִיא
  english_pob_choice: who lived in that land
  chosen_spanish: que habitaban en aquella tierra
  alternatives_spanish:
  - que vivían en aquella tierra
  - habitantes de aquella tierra
  - que moraban en aquella tierra
  lexicon: HALOT
  rationale: El participio califica colectivamente a 'los amorreos'. 'Habitaban' retiene el matiz bíblico de residir/ocupar el lugar, sin sonar tan coloquial como 'vivían'.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal de preservar el nombre personal de Dios en vez de sustituirlo por un título. 'Yahvé' es la forma española elegida para esa preservación y es coherente con el audit trail en inglés.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahweh'
- issue: Valor idiomático de 'en mano de Israel'
  english_pob_reading: into the hand of Israel
  chosen_spanish_reading: en mano de Israel
  alternative_spanish_readings:
  - en las manos de Israel
  - bajo el poder de Israel
  - en poder de Israel
  rationale: Se conserva la metáfora hebrea de 'mano' como poder/autoridad en lugar de aplanarla completamente. El sentido bélico queda aclarado por la segunda cláusula ('ellos los derrotaron'), de modo que la imagen no se pierde ni se vuelve opaca.
  doctrine_reference: Uso narrativo del idiomatismo hebreo בְּיַד
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con el ajuste final del audit trail inglés al eliminar una pausa innecesaria antes de la cláusula relativa final. También conserva la secuencia causal/narrativa: entrega divina, derrota militar y toma de posesión territorial.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el tetragrámaton, conforme al estándar del proyecto.
  - Se mantiene 'amorreos' en plural por naturalidad del español, sin borrar el referente colectivo del hebreo.
  - '''En mano de Israel'' preserva la imagen idiomática; la nota explica el valor semántico para lectores que no lo reconozcan de inmediato.'
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones no sustentadas por el source packet.
