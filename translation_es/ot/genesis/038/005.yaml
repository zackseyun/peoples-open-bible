translation:
  language: es
  text: Concibió de nuevo y dio a luz un hijo, y le puso por nombre Selá. Y él estaba[a] en Chezib[b] cuando ella lo dio a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo algunos testigos antiguos e intérpretes, «y ella estaba en Chezib cuando lo dio a luz». El hebreo dice «él estaba», pero el sujeto es debatido.
    reason: alternative_reading
  - marker: b
    text: Chezib también se escribe Kezib en algunos pasajes; ambas formas se refieren al mismo lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּסֶף עוֹד
  english_pob_choice: She conceived again
  chosen_spanish: Concibió de nuevo
  alternatives_spanish:
  - Concibió otra vez
  - Volvió a concebir
  lexicon: HALOT
  rationale: El hebreo expresa repetición de una acción de concebir/engendrar en secuencia narrativa. En español, «concibió de nuevo» comunica la reiteración con naturalidad y mantiene el valor aspectual del hebreo sin añadir contenido ajeno.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y parió un hijo
  - y tuvo un hijo
  lexicon: HALOT
  rationale: «Dio a luz» es una equivalencia directa y digna para ילד en este contexto narrativo. «Hijo» conserva el referente explícito del hebreo.
- source_word: וַתִּקְרָא אֶת שְׁמֹו שֵׁלָה
  english_pob_choice: and she called his name Shelah
  chosen_spanish: y le puso por nombre Sela
  alternatives_spanish:
  - y llamó su nombre Sela
  - y nombró a Sela
  lexicon: HALOT
  rationale: En español, «poner por nombre» transmite bien la fórmula hebrea de nombrar sin sonar forzada. Se usa «Sela» como forma habitual en español para el nombre propio, preservando la identificación del personaje.
- source_word: וְהָיָה
  english_pob_choice: And he was
  chosen_spanish: Y él estaba
  alternatives_spanish:
  - Y estaba
  - Y ella estaba
  lexicon: HALOT
  rationale: El texto hebreo masorético tiene forma masculina singular; por eso se conserva «él». «Estaba» reproduce el estado o ubicación en curso. Se evita adoptar la lectura femenina como texto principal, porque el POB inglés la trató como variante debatida.
- source_word: בִכְזִיב
  english_pob_choice: at Chezib
  chosen_spanish: en Chezib
  alternatives_spanish:
  - en Kezib
  - en Cezib
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado. «En» funciona de modo natural en español para ubicación en un lugar. Se conserva «Chezib» por fidelidad a la forma del texto hebreo y al audit trail en inglés.
- source_word: בְּלִדְתָּהּ אֹתֹו
  english_pob_choice: when she bore him
  chosen_spanish: cuando ella lo dio a luz
  alternatives_spanish:
  - cuando lo dio a luz
  - al darle a luz
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo con prefijo ב se vierte de manera natural como «cuando». Se explicita el sujeto femenino «ella» para claridad española, y el objeto «lo» mantiene el referente masculino.
theological_decisions:
- issue: Lectura del sujeto en וְהָיָה (¿él o ella?)
  english_pob_reading: The Hebrew text reads 'he was,' but the subject is debated; some ancient witnesses and interpreters read 'she was.'
  chosen_spanish_reading: Se mantiene «él estaba» en el texto principal, con la lectura alternativa femenina reservada a nota si se necesitara.
  alternative_spanish_readings:
  - Y ella estaba
  - Y estaba ella
  rationale: El consonantal/masorético favorece la tercera persona masculina singular. Para no borrar la tensión textual documentada, la redacción principal sigue esa lectura, mientras que la alternativa queda reconocida como variante interpretativa sin desplazar el texto base.
  doctrine_reference: Crítica textual y atención al testimonio masorético vs. versiones antiguas
translation_notes:
  revision_awareness: Se revisó a la luz del pasaje paralelo/audit trail inglés y no se detectaron cambios aplicados en la última pasada; la lectura principal conserva el acuerdo alto con el texto hebreo, manteniendo la variante textual documentada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; aquí no aparece.
  - Se mantiene el nombre propio del lugar como «Chezib» por consistencia con el audit trail, con variante «Kezib» en nota.
  - Se conserva el valor narrativo simple del hebreo sin expandir a interpretación causal o teológica.
  - Se prefirió «dio a luz» en lugar de «parió» o «tuvo» por registro digno y claridad contemporánea.
