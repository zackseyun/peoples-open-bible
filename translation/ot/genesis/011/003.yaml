id: GEN.11.3
reference: Genesis 11:3
source:
  edition: WLC
  text: וַ/יֹּאמְר֞וּ אִ֣ישׁ אֶל רֵעֵ֗/הוּ הָ֚בָ/ה נִלְבְּנָ֣ה לְבֵנִ֔ים וְ/נִשְׂרְפָ֖ה לִ/שְׂרֵפָ֑ה וַ/תְּהִ֨י לָ/הֶ֤ם הַ/לְּבֵנָה֙ לְ/אָ֔בֶן וְ/הַ֣/חֵמָ֔ר הָיָ֥ה לָ/הֶ֖ם לַ/חֹֽמֶר־׃
translation:
  text: And each man said to his neighbor[a], “Come, let us make bricks and burn them thoroughly.” And the brick served them for stone[b], and the bitumen served them for mortar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “And they had brick for stone.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew חֵמָר refers to bitumen or asphalt-like tar used in construction.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ אֶל רֵעֵהוּ
  chosen: each man ... to his neighbor
  alternatives:
  - one man ... to another
  - each one ... to his companion
  lexicon: HALOT
  rationale: The distributive sense of אִישׁ with אֶל רֵעֵהוּ is idiomatically 'each man to his neighbor' or 'one to another.' 'Each man' preserves the singular distributive force and the gender-accurate policy, while remaining natural English.
- source_word: הָבָה
  chosen: Come
  alternatives:
  - Come now
  - Go to
  lexicon: HALOT
  rationale: This particle introduces an exhortation. 'Come' is clear modern English and avoids the archaic 'Go to' of older translations. 'Come now' is possible but slightly more interpretive.
- source_word: נִלְבְּנָה לְבֵנִים
  chosen: let us make bricks
  alternatives:
  - let us mold bricks
  - let us brick bricks
  lexicon: HALOT
  rationale: The verb from לבן is a denominative meaning to make bricks. 'Let us make bricks' is the most natural and accurate rendering in English.
- source_word: וְנִשְׂרְפָה לִשְׂרֵפָה
  chosen: and burn them thoroughly
  alternatives:
  - and fire them thoroughly
  - and burn them for burning
  lexicon: HALOT
  rationale: The infinitive with cognate noun intensifies the action. 'Burn them thoroughly' captures the emphatic sense in idiomatic English. 'Fire them' is possible in brickmaking context, but 'burn them thoroughly' stays closer to the Hebrew wording while still readable.
- source_word: וַתְּהִי לָהֶם הַלְּבֵנָה לְאָבֶן
  chosen: And the brick became stone for them
  alternatives:
  - And brick served them for stone
  - And they had brick for stone
  lexicon: HALOT
  rationale: 'The clause expresses functional substitution: brick in place of stone. ''Became stone for them'' is a fairly literal rendering of היה + ל and preserves the contrast. A smoother English alternative is preserved in a footnote.'
- source_word: הַחֵמָר
  chosen: the bitumen
  alternatives:
  - the asphalt
  - the slime
  lexicon: HALOT
  rationale: חֵמָר here refers to natural tar/bitumen used in construction. 'Bitumen' is precise and modern; 'slime' is archaic and misleading in contemporary English.
- source_word: לַחֹמֶר
  chosen: mortar
  alternatives:
  - clay
  - cement
  lexicon: HALOT
  rationale: חֹמֶר can denote clay or mortar-like building material. In this construction context, 'mortar' best conveys the functional role of the substance binding bricks, especially in contrast with stone construction.
