revisions:
- from: Y levantarás el tabernáculo conforme a su ordenanza[a], como te fue mostrado en el monte.
  to: Y levantarás el tabernáculo conforme a su ordenanza[a], la cual te fue mostrada en el monte.
  rationale: Se cambia «como te fue mostrado» por «la cual te fue mostrada» para reflejar fielmente la cláusula relativa hebrea אֲשֶׁר, mantener la aclaración idiomática auditada por el POB inglés, y mejorar la claridad sintáctica en español sin apartarse del sentido fuente.
