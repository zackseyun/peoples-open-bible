review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Yahvé como nombre divino, «tu Dios», «la tierra», la doble idea de ירשׁ con «poseyeron / poseerás», y la bendición comparativa «más que tus padres». Sin embargo, la nota [b] está anclada a «la poseerás» pero su contenido («O “te hará bien”») corresponde a וְהֵיטִבְךָ, no a וִירִשְׁתָּהּ. Eso rompe la fidelidad del aparato crítico.'
  spanish_quality_summary: El texto es claro y digno. «Te hará entrar» es natural y fiel. La secuencia final suena mejor en español con «más que a tus padres» o «más que tus padres»; el borrador es aceptable. La corrección principal es mover la nota [b] al segmento correcto para evitar confusión del lector.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהֶיךָ -> «tu Dios», הָאָרֶץ -> «la tierra», אֲבֹתֶיךָ -> «tus padres». No hay conflictos teológicos ni léxicos sustanciales; el problema es de colocación de nota.'
  issues:
  - severity: medium
    issue: La nota [b] está colocada en la frase equivocada.
    rationale: En el inglés POB, la alternativa «he will do you good» corresponde a וְהֵיטִבְךָ, no a «and you will possess it». En español, anclar [b] a «la poseerás» hace pensar erróneamente que la alternativa pertenece a ese verbo.
  revised_spanish_text: Yahvé tu Dios te hará entrar en la tierra que tus padres poseyeron[a], y tú la poseerás; y te hará bien[b] y te multiplicará más que a tus padres.
  revised_footnotes:
  - marker: a
    text: O «que tus padres heredaron» / «que tus padres tomaron posesión de». El verbo hebreo puede llevar el matiz de heredar o de poseer.
    reason: lexical_alternative
  - marker: b
    text: O «te prosperará».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto base casi intacto, pero se corrige la ubicación de la nota [b] para que corresponda al verbo hebreo וְהֵיטִבְךָ («te hará bien»). Además, se ajusta su contenido para reflejar la alternativa inglesa documentada en el audit trail: la traducción principal española adopta la opción más literal («te hará bien»), por lo que la nota debe ofrecer la alternativa contextual «te prosperará».'
