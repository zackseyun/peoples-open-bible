translation:
  language: es
  text: Somos doce hermanos[a], hijos de nuestro padre. Uno ya no está[b], y el menor está hoy con nuestro padre en la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'doce hermanos, hijos de nuestro padre'. El hebreo presenta una cláusula nominal; en español se expresa naturalmente con 'somos'.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, 'uno no está' o 'uno no es'. El hebreo puede indicar que el hermano está ausente, perdido o presumiblemente muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en número
  lexicon: HALOT
  rationale: El cardinal se expresa de manera directa y natural en español como 'doce', sin necesidad de ampliar la frase.
- source_word: אֲנַחְנוּ
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - nosotros somos
  - somos nosotros
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal; en español, 'somos' completa la oración de forma idiomática sin añadir contenido.
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - consanguíneos
  lexicon: HALOT
  rationale: En este contexto familiar literal, 'hermanos' comunica con precisión la relación fraterna entre varones.
- source_word: בְּנֵי אָבִינוּ
  english_pob_choice: sons of our father
  chosen_spanish: hijos de nuestro padre
  alternatives_spanish:
  - los hijos de nuestro padre
  - nuestros hijos de nuestro padre
  lexicon: HALOT
  rationale: '''Hijos de nuestro padre'' conserva el paralelismo semítico y es natural en español. ''Sons'' en inglés puede sonar más formal; en español ''hijos'' evita un calco duro.'
- source_word: הָאֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  lexicon: HALOT
  rationale: El sustantivo referido a uno de los hermanos se traduce de manera simple como 'uno'; 'el uno' suena más pesado en español.
- source_word: אֵינֶנּוּ
  english_pob_choice: is no more
  chosen_spanish: ya no existe
  alternatives_spanish:
  - ya no está
  - no es
  lexicon: HALOT
  rationale: La idiomática hebrea indica ausencia o pérdida; 'ya no existe' transmite bien la fuerza del dicho sin afirmar más de lo que los hablantes saben. Se preserva la tensión entre ausencia y posible muerte.
- source_word: וְהַקָּטֹן
  english_pob_choice: the youngest
  chosen_spanish: el menor
  alternatives_spanish:
  - el más pequeño
  - el más joven
  lexicon: HALOT
  rationale: '''El menor'' es la expresión más natural para el hijo más joven entre hermanos y mantiene el sentido relacional del hebreo.'
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - ahora
  lexicon: HALOT
  rationale: '''Hoy'' reproduce el adverbio temporal de forma directa y clara.'
- source_word: אֶת אָבִינוּ
  english_pob_choice: with our father
  chosen_spanish: con nuestro padre
  alternatives_spanish:
  - junto a nuestro padre
  - al lado de nuestro padre
  lexicon: HALOT
  rationale: Aquí אֶת expresa compañía; 'con nuestro padre' es la equivalencia natural y transparente en español.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en el país de Canaán
  - en Canaán
  lexicon: HALOT
  rationale: Se mantiene 'tierra' para reflejar explícitamente el sustantivo hebreo 'land', y 'Canaán' sigue la forma tradicional/geográfica en español.
theological_decisions:
- issue: Sentido idiomático de אֵינֶנּוּ respecto del hermano ausente
  english_pob_reading: '''One is no more'' with a note that Hebrew can mean missing, gone, or presumed dead.'
  chosen_spanish_reading: '''Uno ya no existe'' con una nota que permite también ''uno no está / uno no es'' como lectura más literal.'
  alternative_spanish_readings:
  - uno no está
  - uno no es
  - uno ya no está
  rationale: El español necesita una formulación natural que conserve la ambigüedad deliberada del hebreo. 'Ya no existe' comunica pérdida y ausencia sin cerrar indebidamente el estado del hermano; la nota preserva la alternativa literal.
  doctrine_reference: Génesis 42:32; cf. el uso idiomático de ausencia/pérdida en relatos de José
- issue: Relación entre 'hijos de nuestro padre' y la identidad fraterna
  english_pob_reading: sons of our father
  chosen_spanish_reading: hijos de nuestro padre
  alternative_spanish_readings:
  - hermanos de nuestro padre
  - los hijos de nuestro padre
  rationale: La expresión subraya la misma filiación compartida que justifica la confesión de fraternidad. En español, 'hijos' mantiene el nexo genealógico sin introducir un matiz ajeno.
  doctrine_reference: Génesis 42:32; genealogía familiar en el relato patriarcal
translation_notes:
  revision_awareness: 'El texto español sigue el sentido del hebreo y del POB inglés con ajuste idiomático: mantiene la estructura de dos cláusulas coordinadas, conserva la referencia a la tierra de Canaán, y reproduce la ambigüedad del idiomático אֵינֶנּוּ sin endurecerlo en una afirmación más precisa de lo que el contexto autoriza. No se adoptó el orden inglés ''está con nuestro padre hoy'' porque en español ''hoy con nuestro padre'' o ''hoy está con nuestro padre'' serían posibles, pero ''está hoy con nuestro padre'' mantiene mejor la cercanía al original y suena natural.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma, pero este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aplica aquí.'
  - '''esclavo/siervo'' no aplica aquí.'
  - Se prefirió 'tierra de Canaán' para mantener la transparencia del sustantivo 'land'.
  - Se empleó 'menor' para el superlativo relacional de hermanos, siguiendo uso español corriente y la fuerza del hebreo.
