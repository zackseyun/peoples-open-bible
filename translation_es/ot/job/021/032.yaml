translation:
  language: es
  text: Pero él es llevado a la sepultura[a], y sobre el montículo[b] alguien vela[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente “a las sepulturas”, en plural; aquí puede entenderse de manera colectiva, es decir, como el lugar de entierro.
    reason: lexical_alternative
  - marker: b
    text: “Montículo” traduce un término hebreo para un montón o masa apilada; en este contexto probablemente se refiere a la tierra alzada sobre una tumba.
    reason: cultural_note
  - marker: c
    text: O bien, “y él vela sobre el montículo”, si el verbo final se entiende con el difunto como sujeto; el hebreo no lo expresa de forma explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: Yet he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Sin embargo, él
  lexicon: HALOT
  rationale: El hebreo introduce contraste con el contexto previo; en español, 'Pero' comunica mejor ese giro adversativo que un simple 'y'. Se conserva el pronombre explícito 'él' para reflejar la estructura del hebreo.
- source_word: לִקְבָרוֹת
  english_pob_choice: to the graves
  chosen_spanish: a la sepultura
  alternatives_spanish:
  - a las sepulturas
  - a los sepulcros
  - al lugar de entierro
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, el contexto funerario y el ajuste idiomático en español favorecen una referencia colectiva/abstracta expresada naturalmente como 'a la sepultura'. Se preserva la idea de destino funerario sin forzar un plural poco natural en español.
- source_word: יוּבָל
  english_pob_choice: is carried
  chosen_spanish: es llevado
  alternatives_spanish:
  - es cargado
  - es conducido
  - es traído
  lexicon: HALOT
  rationale: El hofal de יבל expresa ser llevado o conducido. 'Es llevado' es la opción más natural y fiel en español para una procesión funeraria, sin añadir matices no presentes en el hebreo.
- source_word: גָּדִישׁ
  english_pob_choice: the mound
  chosen_spanish: el montículo
  alternatives_spanish:
  - el montón
  - el túmulo
  - el montículo funerario
  lexicon: HALOT
  rationale: El sustantivo puede significar montón o pila; en este contexto probablemente alude al relieve de tierra sobre la tumba. 'Montículo' comunica la imagen concreta con naturalidad en español, y evita un tecnicismo innecesario.
- source_word: יִשְׁקֹד
  english_pob_choice: one keeps watch
  chosen_spanish: se vigila
  alternatives_spanish:
  - uno vela
  - se vela
  - él vela
  lexicon: HALOT
  rationale: Como el hebreo no explicita el sujeto, conviene una construcción impersonal en español. 'Se vigila' mantiene la indeterminación y la idea de guardia/vigilia sin decidir injustificadamente quién realiza la acción.
translation_notes:
  revision_awareness: 'El texto inglés revisado pasó de “the graves” a “the grave” y de una pasiva impersonal a “one keeps watch”. La versión española sigue esa revisión en dos sentidos: conserva un único destino funerario en estilo natural y mantiene la indefinición del sujeto final con una construcción impersonal.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió 'sepultura' por claridad y naturalidad; el plural hebreo queda explicado en nota.
  - Se evitó 'Cristo' o terminología litúrgica no presente en el texto.
  - La pasiva española se mantuvo simple y sobria para reflejar el paralelismo hebreo sin sobreexplicación.
