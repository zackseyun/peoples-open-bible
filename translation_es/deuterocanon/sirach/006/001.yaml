    issue: La nota textual a describe de manera inexacta la relación entre el hebreo y el griego.
    rationale: La auditoría inglesa dice que el hebreo conservado es más breve y lee aproximadamente la frase principal, mientras que el griego añade la advertencia inicial y explicita el final como 'double-tongued'. La nota española actual da a entender que el griego suministra la forma proverbial principal del texto traducido, lo que desdibuja la evidencia fuente.
  - severity: low
    issue: La nota b conserva 'double-tongued' en inglés dentro de una nota española.
    rationale: Debe expresarse plenamente en español para mantener calidad editorial y coherencia del aparato.
  - severity: low
    issue: El giro 'así le sucede al pecador' es algo más interpretativo que 'así es el pecador' o 'así sucede con el pecador'.
    rationale: No es un error grave, pero una formulación más directa conserva mejor el valor proverbial comparativo del texto base.
  revised_spanish_text: Un nombre malo hereda vergüenza y oprobio[a][b]; así es el pecador de doble lengua.
