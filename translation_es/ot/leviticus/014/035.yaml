revisions:
- from: 'Entonces el dueño de la casa[a] se acercará y dirá al sacerdote: “Algo parecido a una plaga se me ha aparecido en la casa”.'
  to: 'Entonces el dueño de la casa vendrá y dirá al sacerdote[a]: «Algo parecido a una plaga me ha parecido ver en la casa».'
  rationale: Se ajusta «vendrá» para reflejar mejor וּבָא sin sobreespecificar movimiento. Se reemplaza «se me ha aparecido» por «me ha parecido ver» para comunicar una observación tentativa y visual, fiel a כְּנֶגַע נִרְאָה לִי y mucho más natural en español. Se mantiene «plaga» conforme al audit trail inglés revisado y la nota sobre el carácter no definitivo del reporte. Se ancla la nota al «sacerdote[a]» como en el POB inglés, ya que la explicación aplica a la cita completa reportada.
