translation:
  language: es
  text: Elías, en su celo por la ley, fue llevado al cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «como al cielo». El griego incluye ὡς, que puede introducir un matiz comparativo o caracterizador.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: nombre propio
  rationale: El nombre propio se adapta de manera estándar al español bíblico como «Elías», forma transparente y plenamente reconocible.
- source_word: ἐν τῷ ζηλῶσαι ζῆλον
  english_pob_choice: in his zeal for the law
  chosen_spanish: en su celo
  alternatives_spanish:
  - en su celo ardiente
  - cuando mostró celo
  - por su celo
  lexicon: LSJ
  rationale: La construcción griega de infinitivo articular con sustantivo cognado expresa circunstancia o ocasión; «en su celo» reproduce de forma natural esa relación sin volverla excesivamente causal.
- source_word: ζῆλον
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - zeal
  - ardor
  - celos
  lexicon: LSJ
  rationale: «Celo» comunica bien la intensidad religiosa y la fuerza del término griego en este contexto; «celos» introduciría una connotación incorrecta y «ardor» sería menos preciso.
- source_word: νόμου
  english_pob_choice: for the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - de la ley
  - por la Ley
  - de la Ley
  lexicon: LSJ
  rationale: En el contexto macabeo, νόμος alude a la ley judía/Torá. «Por la ley» mantiene la relación de motivo o ámbito de su celo y suena natural en español.
- source_word: ἀνελήμφθη
  english_pob_choice: was taken up
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue arrebatado
  - fue tomado
  - fue llevado arriba
  lexicon: LSJ
  rationale: El pasivo aoristo de ἀναλαμβάνω expresa ser llevado hacia arriba; «fue llevado» es natural en español y conserva el movimiento ascensional implícito sin añadir más de lo que el texto dice.
- source_word: ὡς εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - como al cielo
  - al cielo, como
  - como si al cielo
  lexicon: LSJ
  rationale: El griego incluye ὡς, que introduce una comparación o matiz caracterizador. «Al cielo» rinde el destino de manera idiomática en español; el matiz comparativo se conserva en la nota para no forzarlo dentro de una frase menos natural.
theological_decisions:
- issue: Cómo tratar el matiz de ὡς antes de εἰς τὸν οὐρανόν
  english_pob_reading: 'Preserve the comparative nuance: ''as into heaven.'''
  chosen_spanish_reading: Mantener el destino «al cielo» y señalar en nota que el griego dice literalmente «como al cielo».
  alternative_spanish_readings:
  - como al cielo
  - casi al cielo
  - como si al cielo
  rationale: El español más natural para lectura pública es «al cielo», pero el texto griego no omite ὡς. Por eso se preserva el matiz comparativo en una nota, evitando resolver la expresión de forma más tajante de lo que permite el original.
  doctrine_reference: Preservar la tensión exegética del texto sin sobreinterpretar la forma de la ascensión de Elías.
translation_notes:
  revision_awareness: 'El borrador sigue el sentido del texto griego y del audit trail inglés: conserva la relación circunstancial de ἐν τῷ ζηλῶσαι ζῆλον νόμου, evita una causalidad demasiado explícita, y trata ὡς εἰς τὸν οὐρανόν con una lectura española natural mientras documenta el matiz comparativo en nota.'
  spanish_consistency_notes:
  - Se usa «Elías» para el nombre propio, conforme al uso bíblico español estándar.
  - Se prefirió «celo» para ζῆλον por su adecuación religiosa y su cercanía semántica.
  - «Ley» se mantiene en minúscula como referencia contextual a la ley de Dios/Torá, sin introducir una capitalización interpretativa.
  - «Al cielo» es una forma idiomática para uso público; la nota preserva la transparencia frente al ὡς griego.
