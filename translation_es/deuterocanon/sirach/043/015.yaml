    text: Masada conserva solo el comienzo del versículo ('Y por su poder la nube es fuerte'), mientras que el hebreo de la Guenizá de El Cairo continúa con la cláusula del granizo; la traducción completa sigue esa línea hebrea conservada, con apoyo del paralelo griego para la imagen del granizo.
    reason: textual_variant
