base_translation:
  language: en
  yaml_path: translation/ot/joshua/023/016.yaml
  text: If you transgress the covenant of Yahweh your God[a], which he commanded you, and go and serve other gods and bow down to them, then the anger of Yahweh will burn against you[b], and you will perish quickly from the good land that he has given you.
  footnotes:
