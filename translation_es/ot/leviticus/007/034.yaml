  to: Porque he tomado el pecho de la ofrenda mecida y el muslo de la contribución[a] de los hijos de Israel, de los sacrificios de sus ofrendas de paz[b][c], y se los he dado a Aarón el sacerdote y a sus hijos como estatuto perpetuo de los hijos de Israel.
  rationale: Se corrige la precisión anatómica de שׁוֹק con 'muslo', se reemplaza 'de entre' por 'de' para reflejar mejor מֵאֵת, y se reordena/reformula el aparato de notas para que las alternativas correspondan a los términos correctos. También se ajusta 'se las he dado' a 'se los he dado' porque los referentes coordinados ('pecho' y 'muslo') son masculinos.
