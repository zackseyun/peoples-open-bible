  from: petty corruption
  to: the brevity of corruption
  rationale: 'The noun μικρότης here denotes shortness or brevity of time (LSJ: ''shortness''), directly contrasting with the eternal planting (''forever'') and ''all the days of heaven'' in verse 3. Furthermore, ''petty corruption'' is a strong modern English idiom for minor political bribery or graft, which introduces a highly misleading anachronism. The author''s point is that the sinners'' desire is for something fleeting and decaying, not that they are engaged in low-level fraud.'
