translation:
  language: es
  text: ¿No es tu temor a Dios[a] tu confianza[b], y la integridad[c] de tus caminos tu esperanza?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «tu temor»; el hebreo no expresa explícitamente el objeto, aunque en la literatura sapiencial comúnmente se refiere al temor a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «tu confianza» también puede entenderse como «tu seguridad» o «tu trust» en el sentido de apoyo confiado; aquí se refiere a la confianza, no a la necedad.
    reason: lexical_alternative
  - marker: c
    text: O «la rectitud intachable de tus caminos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: '¿No es...?

    '
  alternatives_spanish:
  - ¿No será...?
  - ¿Acaso no es...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. En español, «¿No es...?» conserva el tono formal y la estructura interrogativa sin volverla demasiado coloquial ni añadir matices especulativos.
- source_word: יִרְאָתְךָ
  english_pob_choice: your fear of God
  chosen_spanish: tu temor de Dios
  alternatives_spanish:
  - tu temor
  - tu reverencia
  - tu piedad
  lexicon: HALOT
  rationale: En lenguaje sapiencial, ירא suele referirse al temor reverente orientado a Dios. «Temor de Dios» comunica ese sentido de manera natural en español y mantiene la explicitación contextual adoptada por la POB inglesa, sin convertirlo en «piedad», que sería más interpretativo.
- source_word: כִּסְלָתֶךָ
  english_pob_choice: your confidence
  chosen_spanish: tu confianza
  alternatives_spanish:
  - tu seguridad
  - tu confianza en Dios
  - tu certidumbre
  lexicon: HALOT
  rationale: La POB inglesa entendió el sustantivo aquí como una cualidad de confianza más que como «necedad». «Confianza» es la equivalencia más natural y directa en español para este contexto poético; «seguridad» es posible, pero menos cercana al paralelismo interno.
- source_word: תִּקְוָתְךָ
  english_pob_choice: your hope
  chosen_spanish: tu esperanza
  alternatives_spanish:
  - tu expectativa
  lexicon: HALOT
  rationale: «Esperanza» es la traducción idiomática estándar de תקוה y preserva tanto el sentido de expectativa como el de confianza futura.
- source_word: וְתֹם
  english_pob_choice: and the integrity
  chosen_spanish: y la integridad
  alternatives_spanish:
  - y la blamelessness
  - y la inocencia
  lexicon: HALOT
  rationale: תם puede expresar integridad, completitud o blamelessness. «Integridad» captura bien el valor ético del término y funciona naturalmente en español junto con «caminos».
- source_word: דְּרָכֶיךָ
  english_pob_choice: of your ways
  chosen_spanish: de tus caminos
  alternatives_spanish:
  - de tu conducta
  - de tus sendas
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora sapiencial hebrea y su uso frecuente para la conducta de una persona. Es más literal y estilísticamente fiel que «conducta», que sería más explicativo.
theological_decisions:
- issue: Objeto implícito de «temor»
  english_pob_reading: Rendered as 'fear of God' in the main text
  chosen_spanish_reading: «temor de Dios» en el texto principal
  alternative_spanish_readings:
  - «tu temor»
  - «tu reverencia»
  rationale: Aunque el hebreo no explicita el objeto, en la literatura sapiencial el temor reverente suele referirse a Dios. La explicitación ayuda al lector moderno y sigue la decisión auditada de la POB inglesa sin sobrecargar el verso.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación sintáctica de los dos miembros poéticos
  english_pob_reading: 'Two parallel predicates: ''your fear of God [is] your confidence'' and ''the integrity of your ways [is] your hope'''
  chosen_spanish_reading: 'Dos miembros paralelos: «tu temor de Dios [es] tu confianza» y «la integridad de tus caminos [es] tu esperanza»'
  alternative_spanish_readings:
  - «¿No son tu temor de Dios, tu confianza, tu esperanza y la integridad de tus caminos?»
  rationale: El hebreo presenta dos pares nominales balanceados. Mantenerlos como dos predicados paralelos preserva la poesía y evita convertir el cierre en una lista menos clara.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: el contexto auditado indica alta concordancia y ningún cambio necesario.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según el estándar del proyecto.
  - Se usa «temor de Dios» como explicitación contextual, no como sustitución doctrinal.
  - «Confianza» y «esperanza» sostienen el paralelismo semántico con el texto hebreo y con la decisión inglesa auditada.
  - Se conserva la metáfora de «caminos» para דְּרָכֶיךָ en armonía con el lenguaje sapiencial bíblico.
