base_translation:
  language: en
  yaml_path: translation/ot/job/001/017.yaml
  text: While this one was still speaking[a], another came and said, “The Chaldeans formed three raiding parties, swept down on the camels and took them, and they struck down the young men with the edge of the sword[c][b]. And I alone have escaped to tell you.”
  footnotes:
  - marker: a
    text: Or “made three divisions” or “deployed in three bands”; literally, “set three heads.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “struck ... by the mouth/edge of the sword,” meaning they killed them with swords.'
    reason: lexical_alternative
  - marker: c
    text: “Young men” may refer to household attendants or servants in this context.
    reason: lexical_alternative
