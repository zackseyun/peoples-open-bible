base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/012.yaml
  text: They will come and shout for joy on the height of Zion[a], and they will stream to the goodness of Yahweh, to the grain, the new wine, and the fresh oil, and to the young of the flock and the herd. Their soul will be like a well-watered garden[d][c][b], and they will never again languish.
  footnotes:
  - marker: a
    text: Or 'to the bounty of the LORD.' The Hebrew 'goodness' here includes the good things he provides, as the following list shows.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will flow to the goodness of the LORD.' The Hebrew verb can picture a flowing movement toward Zion's blessings.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'their soul.' Here it refers to their life or whole self, not only the immaterial aspect of a person.
    reason: lexical_alternative
  - marker: d
    text: Or 'they will sorrow no more' / 'they will no longer languish.' The Hebrew expression can denote grief that causes one to pine away.
    reason: lexical_alternative
