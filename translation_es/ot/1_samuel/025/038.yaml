translation:
  language: es
  text: Unos diez días después[a], Yahvé hirió a Nabal, y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de unos diez días». La expresión hebrea indica un período aproximado de diez días.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... later
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y fue que
  lexicon: HALOT
  rationale: El waw consecutivo introduce la siguiente acción narrativa. En español, «Y aconteció que» conserva el giro narrativo de transición sin sonar tan literal como una repetición mecánica de «y sucedió»; además mantiene el enlace temporal con la cláusula siguiente.
- source_word: כַּעֲשֶׂרֶת הַיָּמִים
  english_pob_choice: about ten days later
  chosen_spanish: como a los diez días
  alternatives_spanish:
  - después de unos diez días
  - alrededor de diez días después
  lexicon: HALOT
  rationale: El prefijo כ indica aproximación. «Como a los diez días» comunica con naturalidad la idea de un período aproximado y temporalmente posterior, sin perder la elasticidad del hebreo.
- source_word: וַיִּגֹּף
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - azotó
  - hirió con un golpe
  lexicon: HALOT
  rationale: El verbo נָגַף puede expresar golpear, herir o abatir por acción divina. «Hirió» conserva la fuerza del acto divino sin especificar un mecanismo más allá del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: usar «Yahvé» como nombre propio divino en el texto principal en español, en lugar de sustituirlo por un título.'
- source_word: נָבָל
  english_pob_choice: Nabal
  chosen_spanish: Nabal
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y expiró
  lexicon: HALOT
  rationale: El verbo מוּת se traduce de forma directa y sobria como «murió». Esto conserva la secuencia narrativa y no intensifica más allá de lo que el hebreo afirma.
theological_decisions:
- issue: Cómo expresar la acción divina sobre Nabal sin añadir causalidad interpretativa
  english_pob_reading: the LORD struck Nabal, and he died
  chosen_spanish_reading: Yahvé hirió a Nabal, y murió.
  alternative_spanish_readings:
  - Yahvé lo hirió de muerte, y murió.
  - Yahvé afligió a Nabal, y murió.
  rationale: 'El hebreo presenta dos verbos sucesivos: primero Yahvé hiere, luego Nabal muere. La redacción española conserva esa secuencia y la atribución directa a Yahvé sin convertirla en una fórmula más interpretada como «hirió de muerte», que cerraría la tensión narrativa.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preservar la tensión teológica en vez de resolverla'
- issue: Uso del nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El proyecto establece «Yahvé» para יְהוָה. Mantenerlo en español hace auditable la referencia al nombre divino y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto inglés presenta acuerdo alto y no registra revisiones aplicadas en esta unidad. Se conservó la lectura narrativa y teológica del audit trail: aproximación temporal, acción directa de Yahvé y muerte subsiguiente de Nabal, sin intensificar ni suavizar el verbo hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - Se prefirió «hirió» para נָגַף por su equilibrio entre literalidad y naturalidad en español.
  - «Murió» conserva la sobriedad narrativa del hebreo sin añadir matices no explicitados.
