revisions:
- from: mostrando amor firme[a] a millares, y pagando la iniquidad de los padres en el regazo de sus hijos después de ellos—el Dios grande, el Poderoso, Yahvé de los Ejércitos[b], es su nombre.
  to: mostrando amor leal[a] a millares, y retribuyendo la iniquidad de los padres en el regazo de sus hijos después de ellos—el gran Dios, el poderoso, Yahvé de los ejércitos[b], es su nombre.
  rationale: 'La revisión mejora la fidelidad semántica y la naturalidad del español sin apartarse del hebreo ni del rastro de auditoría inglés: «amor leal» expresa mejor חֶסֶד en español eclesial moderno; «retribuyendo la iniquidad» evita la ambigüedad de «pagando»; y «el gran Dios, el poderoso» mantiene el tono doxológico con sintaxis más idiomática. Se conservan las notas léxicas relevantes y la terminología principal del proyecto.'
