lexical_decisions:
- source_word: דֹּב
  english_pob_choice: bear
  chosen_spanish: oso
  alternatives_spanish:
  - un oso
  lexicon: HALOT
  rationale: 'El sustantivo designa claramente a un oso. En español, el predicado nominal suena natural sin artículo explícito en poesía, pero aquí se conserva con artículo por la paralela predicativa y la lectura idiomática: «Él es un oso».'
- source_word: אֹרֵב
  english_pob_choice: lying in wait
  chosen_spanish: que está al acecho
  alternatives_spanish:
  - acechando
  - en emboscada
  lexicon: HALOT
  rationale: El participio expresa una acción hostil y deliberada de emboscada. «Al acecho» preserva bien el matiz predatorio en español y mantiene el valor aspectual continuo del hebreo.
- source_word: הוּא
  english_pob_choice: He is
  chosen_spanish: Él es
  alternatives_spanish:
  - él
  lexicon: HALOT
  rationale: El pronombre independiente es explícito y funciona como sujeto del predicado nominal. En español conviene expresar el verbo copulativo para que la cláusula sea natural.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: En el contexto de emboscada, la preposición marca orientación hostil hacia el hablante. «Para mí» mantiene la equivalencia idiomática de la POB inglesa y el objetivo de la agresión.
- source_word: אַרְיֵה
  english_pob_choice: a lion
  chosen_spanish: un león
  alternatives_spanish:
  - león
  lexicon: HALOT
  rationale: El sustantivo denota un león. El artículo indefinido ayuda a conservar el paralelismo con «un oso» y la predicación nominal en español.
- source_word: בְּמִסְתָּרִים
  english_pob_choice: in hiding places
  chosen_spanish: en lugares ocultos
  alternatives_spanish:
  - en escondites
  - en sitios secretos
  lexicon: HALOT
  rationale: El plural se refiere a lugares escondidos o cubiertos. «Lugares ocultos» es claro y natural en español, sin perder la imagen de ocultamiento deliberado.
translation_notes:
  revision_awareness: El texto en español sigue de cerca el hebreo y la lectura auditada de la POB inglesa. Se conserva la ambigüedad léxica de בְּמִסְתָּרִים con una nota alternativa equivalente a la nota inglesa («secret places» / «hiding places»), sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Él» como sujeto explícito para reflejar הוּא.
  - Se evita sustituir la imaginería animal por paráfrasis explicativas.
  - «Al acecho» conserva la fuerza hostil del participio hebreo.
  - La nota al pie usa un marcador único y corresponde exactamente al segmento «lugares ocultos».
