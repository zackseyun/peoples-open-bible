translation:
  language: es
  text: 'Por tanto, profetiza[a], hijo de hombre, y di a Gog: «Así dice el Señor Dios Yahvé: En aquel día, cuando mi pueblo Israel viva[b] seguro[c], ¿no lo sabrás?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habla proféticamente». El imperativo hebreo exige una acción de profetizar.
    reason: alternative_reading
  - marker: b
    text: 'O «habite». El hebreo בְּשֶׁבֶת expresa el hecho de morar o vivir, con sentido temporal: «cuando ... habite/viva».'
    reason: alternative_reading
  - marker: c
    text: O «en seguridad». לָבֶטַח puede expresar vivir «seguro» o «en seguridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión inferencial desde el contexto previo; «Por tanto» conserva el vínculo lógico con un registro natural y digno en español.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - profetiza de nuevo
  - habla proféticamente
  lexicon: HALOT
  rationale: El imperativo dirigido a Ezequiel pide una acción profética directa. «Profetiza» es el equivalente claro y formal en español.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se mantiene el giro tradicional y recurrente de Ezequiel para conservar la continuidad literaria y la dirección divina establecida.
- source_word: וְאָמַרְתָּ לְגוֹג
  english_pob_choice: and say to Gog
  chosen_spanish: y di a Gog
  alternatives_spanish:
  - y dirás a Gog
  - y habla a Gog
  lexicon: HALOT
  rationale: Refleja la secuencia imperativa de forma idiomática en español sin añadir contenido.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Preserva la fórmula profética solemne y su valor de mensajero.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se vierte el Tetragrámaton como «Yahvé» conforme a la pauta del proyecto, y אֲדֹנָי como «Señor». La combinación evita la máscara «SEÑOR» y conserva el nombre divino explícito.
- source_word: הֲלוֹא
  english_pob_choice: will you not
  chosen_spanish: ¿no lo sabrás?
  alternatives_spanish:
  - ¿acaso no lo sabrás?
  - ¿no llegarás a saberlo?
  lexicon: HALOT
  rationale: La pregunta retórica espera afirmación y el hebreo apunta a una toma de conciencia. En español, «¿no lo sabrás?» conserva la fuerza interrogativa y el objeto implícito del contexto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: Equivale al deíctico profético estándar con un tono natural y bíblico en español.
- source_word: בְּשֶׁבֶת
  english_pob_choice: when ... dwell
  chosen_spanish: cuando ... habite
  alternatives_spanish:
  - cuando ... more
  - mientras ... habita
  lexicon: HALOT
  rationale: La construcción temporal de infinitivo se expresa de modo natural con «cuando» en español, manteniendo la idea de una permanencia en curso.
- source_word: עַמִּי יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  - Israel, mi pueblo
  lexicon: HALOT
  rationale: Conserva la relación de posesión pactual entre Yahvé e Israel, sin introducir una glosa explicativa innecesaria.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en seguridad
  lexicon: HALOT
  rationale: La alternativa inglesa entre «securely» y «in safety» se resuelve en español con «con seguridad», que comunica bien el estado de protección sin sonar forzado.
- source_word: תֵּדָע
  english_pob_choice: will you not know it
  chosen_spanish: ¿no lo sabrás?
  alternatives_spanish:
  - ¿no conocerás eso?
  - ¿no te darás cuenta?
  lexicon: HALOT
  rationale: El verbo ידע aquí implica percibir o tomar conciencia de la situación. Se mantiene un verbo de conocimiento con objeto pronominal, evitando expandir demasiado el sentido.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: La lectura hebrea contiene explícitamente el Nombre divino; siguiendo la pauta del proyecto, se evita la sustitución por una convención tipográfica y se vierte YHWH como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del archivo fuente: se prefirió un español formal y natural para la construcción temporal, manteniendo sin cambios el sentido central y la tensión lexical de לָבֶטַח (seguridad / seguridad protegida). También se respetó la actualización doctrinal del proyecto para traducir YHWH como Yahvé en lugar de una máscara tipográfica.'
  spanish_consistency_notes:
  - Se mantuvo «hijo de hombre» como fórmula fija de Ezequiel para preservar continuidad intertextual.
  - Se eligió «Yahvé» en vez de «SEÑOR» para reflejar el Nombre divino explícito conforme a la política del proyecto.
  - La pregunta final se dejó breve y retórica para conservar el tono de advertencia del hebreo.
  - «Con seguridad» busca equilibrar la alternativa del audit trail entre «securely» e «in safety» sin perder naturalidad en español.
