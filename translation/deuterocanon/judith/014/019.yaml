  text: ὡς δὲ ἤκουσαν τὰ ῥήματα οἱ ἄρχοντες τῆς δυνάμεως Ἀσσούρ, τοὺς χιτῶνας αὐτῶν διέρρηξαν, καὶ ἐταράχθη αὐτῶν ἡ ψυχὴ σφόδρα, καὶ ἐγένετο αὐτῶν κραυγὴ καὶ βοὴ μεγάλη σφόδρα ἐν μέσῳ τῆς παρεμβολῆς.
