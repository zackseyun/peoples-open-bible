translation:
  language: es
  text: Sin embargo[a], los lugares altos no fueron quitados; el pueblo todavía sacrificaba y quemaba incienso en los lugares altos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuarios»; el hebreo «los lugares altos» se refiere a sitios locales elevados de culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Solo
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: En español, «Sin embargo» conserva bien el valor adversativo que introduce una excepción respecto del balance positivo anterior, sin sonar tan abrupto como «pero» ni tan ambiguo como «solo».
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - las alturas
  - los santuarios
  - los altos lugares
  lexicon: HALOT
  rationale: «Lugares altos» comunica el sentido cultual y topográfico de בָּמוֹת. Se prefirió esta forma en vez de «santuarios» porque el término hebreo no designa simplemente un edificio religioso, sino sitios elevados de culto.
- source_word: לֹא סָרוּ
  english_pob_choice: were not removed
  chosen_spanish: no fueron quitados
  alternatives_spanish:
  - no fueron removidos
  - no se apartaron
  - no desaparecieron
  lexicon: HALOT
  rationale: Con «los lugares altos» como sujeto, el español natural expresa el pasivo con «no fueron quitados», que reproduce la idea de que no se eliminaron físicamente. «No se apartaron» sonaría menos transparente en español.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - seguían
  - todavía seguía
  lexicon: HALOT
  rationale: «Todavía» conserva la noción de continuidad temporal presente en עוֹד y encaja bien con la acción habitual expresada por los participios.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo del país
  - la población
  lexicon: HALOT
  rationale: «El pueblo» es la manera más natural y fiel de traducir el colectivo hebreo en este contexto histórico-religioso.
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaba
  alternatives_spanish:
  - estaba sacrificando
  - ofrecía sacrificios
  - seguía sacrificando
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción continua o habitual. En español, el pretérito imperfecto («sacrificaba») comunica mejor esa continuidad que una perífrasis más pesada.
- source_word: וּמְקַטְּרִים
  english_pob_choice: and burning incense
  chosen_spanish: y quemaba incienso
  alternatives_spanish:
  - y ofrecía incienso
  - y hacía humear incienso
  - y perfumaba con incienso
  lexicon: HALOT
  rationale: En este contexto cultual, קטר se entiende mejor como «quemar incienso» o hacer humo ritual. Se mantiene la forma tradicional y clara en español, evitando una paráfrasis más interpretativa.
- source_word: בַּבָּמוֹת
  english_pob_choice: on the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - sobre los lugares altos
  - en las alturas
  - allí
  lexicon: HALOT
  rationale: La preposición hebrea se refleja de modo natural con «en». Repetir la expresión al final preserva el énfasis del hebreo y la referencia cultual concreta.
theological_decisions:
- issue: Persistencia de culto no autorizado en los lugares altos
  english_pob_reading: Retain the historically descriptive term 'high places' without softening or explicating it in the main text.
  chosen_spanish_reading: Mantener «lugares altos» en el texto principal, sin convertirlo en una explicación interpretativa.
  alternative_spanish_readings:
  - los santuarios no fueron quitados; el pueblo seguía sacrificando y quemando incienso allí
  - los lugares de culto no fueron eliminados
  rationale: El versículo informa de la continuidad de esos sitios de culto y no desarrolla la evaluación teológica por sí mismo. Mantener el término heredado del hebreo preserva la tensión histórica y religiosa, sin resolverla en favor de una explicación más explícita.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios adicionales y confirmó alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se empleó «lugares altos» de forma consistente para בָּמוֹת, en paralelo con el inglés POB.
  - Se mantuvo el pasado imperfecto en la acción cultual para reflejar la habitualidad/continuidad de los participios hebreos.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
