revisions:
- from: Sus casas serán entregadas a otros[a], junto con sus campos y sus mujeres; porque extenderé mi mano contra los habitantes de la tierra[b] —declara Yahvé—.
  to: Sus casas serán entregadas a otros, junto con sus campos y sus esposas[a]; porque extenderé mi mano contra los habitantes del país[b], declara Yahvé.
  rationale: La revisión corrige el anclaje de la nota léxica, ajusta וְנָשִׁים a la opción contextual preferida («esposas») con nota de alternativa, y alinea יֹשְׁבֵי הָאָרֶץ con la lectura local documentada («habitantes del país»), manteniendo un español natural y la fórmula profética con «Yahvé».
