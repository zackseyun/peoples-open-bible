translation:
  language: es
  text: Y Simón andaba recorriendo las ciudades de la región y atendiendo a su administración, y descendió a Jericó, él y sus hijos Matatías y Judas, en el año ciento setenta y siete, en el mes undécimo; este es el mes Sabat[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el mes Sabat»; se conserva aquí la transliteración «Sabat» del nombre del mes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοδεύων
  english_pob_choice: making a circuit of
  chosen_spanish: andaba recorriendo
  alternatives_spanish:
  - visitando
  - dando vueltas por
  - haciendo un recorrido por
  lexicon: LSJ
  rationale: El participio expresa movimiento repetido e inspección/recorrido por las ciudades, no mera presencia. «Andaba recorriendo» conserva la idea de circuito itinerante con naturalidad en español.
- source_word: τὰς πόλεις τὰς ἐν τῇ χώρᾳ
  english_pob_choice: the cities in the country
  chosen_spanish: las ciudades de la región
  alternatives_spanish:
  - las ciudades del país
  - las ciudades de la tierra
  - las ciudades del territorio
  lexicon: LSJ
  rationale: χώρᾳ admite «campo», «país», «territorio» o «región». Aquí «región» evita una posible lectura moderna de «country» como nación rural y preserva el alcance territorial.
- source_word: φροντίζω τὰς ἐπιμελίας αὐτῶν
  english_pob_choice: taking care of their administration
  chosen_spanish: atendiendo a su administración
  alternatives_spanish:
  - cuidando de sus asuntos
  - velando por su gobierno
  - ocupándose de su administración
  lexicon: LSJ
  rationale: La frase apunta al cuidado administrativo/organizativo de las ciudades. «Atendiendo a su administración» mantiene el matiz de supervisión y gestión sin exagerar el tecnicismo.
- source_word: κατέβη εἰς Ἰεριχώ
  english_pob_choice: went down to Jericho
  chosen_spanish: descendió a Jericó
  alternatives_spanish:
  - bajó a Jericó
  - fue a Jericó
  lexicon: LSJ
  rationale: καταβαίνω conserva la direccionalidad «bajar/descender». «Descendió» es fiel y solemne; «a Jericó» reproduce bien el movimiento hacia una zona geográficamente más baja.
- source_word: αὐτὸς καὶ Ματταθίας καὶ Ἰούδας καὶ οἱ υἱοὶ αὐτοῦ
  english_pob_choice: he and Mattathias and Judas his sons
  chosen_spanish: él, Matatías y Judas sus hijos
  alternatives_spanish:
  - él mismo, y Matatías y Judas sus hijos
  - él, junto con Matatías y Judas, sus hijos
  lexicon: LSJ
  rationale: El griego enumera a Simón primero y luego a sus hijos. El español queda más claro al separar a Simón de los nombres en aposición y conservar la relación filial con «sus hijos».
- source_word: ἔτους ἑβδόμου καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred seventy-seventh year
  chosen_spanish: en el año ciento setenta y siete
  alternatives_spanish:
  - en el año 177
  lexicon: LSJ
  rationale: Es la forma natural y formal de expresar el año seleúcida en español, manteniendo la equivalencia numérica del original.
- source_word: μηνὶ ἐνδεκάτῳ
  english_pob_choice: in the eleventh month
  chosen_spanish: en el mes undécimo
  alternatives_spanish:
  - en el undécimo mes
  - en el mes once
  lexicon: LSJ
  rationale: «Mes undécimo» conserva el orden y el registro formal del griego, además de sonar más bíblico que una formulación aritmética.
- source_word: Σαβάτ
  english_pob_choice: Shebat
  chosen_spanish: Sabat
  alternatives_spanish:
  - Shebat
  - Sabat
  lexicon: LSJ
  rationale: El nombre del mes se translitera desde el griego como «Sabat», siguiendo el propio texto fuente. Se conserva como nombre de mes semítico sin normalizarlo a una forma posterior distinta.
theological_decisions:
- issue: Nombre del mes semítico y su transliteración
  english_pob_reading: Rendered 'Shebat' as a standard English transliteration of the month name.
  chosen_spanish_reading: «Sabat» en el texto, con explicación del nombre como mes.
  alternative_spanish_readings:
  - Shebat
  - Shevat
  rationale: El griego de Swete dice explícitamente Σαβάτ; por fidelidad al fuente, el texto español conserva una transliteración cercana al griego. No se sustituye por una forma hebrea posterior sin necesidad textual.
  doctrine_reference: Textual fidelity / onomástica histórica
translation_notes:
  revision_awareness: El contexto inglés ya fue revisado y quedó sin cambios sustantivos; el presente borrador sigue esa lectura estable (circuito administrativo, descenso a Jericó, datación seleúcida y nombre del mes).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto, pero este versículo no contiene el nombre divino.
  - «Simón» y los nombres propios se han castellanizado de forma habitual y reconocible.
  - Se evita «SEÑOR» o cualquier otra sustitución no presente en el texto fuente.
  - La puntuación reproduce la estructura del original con una aclaración final del mes semítico.
