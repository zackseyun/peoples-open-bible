lexical_decisions:
- source_word: וְ/אֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - además
  - también
  lexicon: HALOT
  rationale: En esta lista continua de nombres, el hebreo une cada elemento con וְ/אֵת; como el marcador de objeto directo no se expresa en español, la equivalencia natural es repetir ‘y’ para conservar la estructura enumerativa sin añadir matices no presentes en el original.
- source_word: פּוֹרָתָא
  english_pob_choice: Poratha
  chosen_spanish: Porata
  alternatives_spanish:
  - Poratha
  lexicon: HALOT
  rationale: Nombre propio persa/hebreo transliterado. Se adapta a la ortografía española con una vocal final abierta (‘a’) para mantener una lectura natural en español, sin alterar la identidad del nombre.
- source_word: אֲדַלְיָא
  english_pob_choice: Adalia
  chosen_spanish: Adalía
  alternatives_spanish:
  - Adalia
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se prefiere ‘Adalía’ para una pronunciación española clara y para reflejar la secuencia vocálica del nombre sin introducir una forma tradicional no atestiguada en el texto fuente.
- source_word: אֲרִידָתָא
  english_pob_choice: Aridatha
  chosen_spanish: Aridata
  alternatives_spanish:
  - Aridata
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma ‘Aridata’ conserva el valor consonántico del hebreo y evita una aspiración final no necesaria en español; se mantiene el final vocálico para reproducir la cadencia del listado.
theological_decisions:
- issue: Lista nominal dependiente del verbo del versículo anterior
  english_pob_reading: This verse continues the list of Haman's sons from the previous verse; the verb 'killed' is understood from Esther 9:7.
  chosen_spanish_reading: Este versículo continúa la lista de los hijos de Amán del versículo anterior; el verbo ‘mataron’ se sobreentiende por el contexto de Ester 9:7.
  alternative_spanish_readings:
  - simplemente nombres propios sin nota
  - mantener una traducción más literal sin explicitar el verbo elidido
  rationale: El hebreo presenta solo la secuencia nominal; para evitar que el lector español perciba un fragmento incompleto, la nota aclara que el verbo está elidido y se recupera del contexto inmediato, siguiendo el audit trail inglés.
  doctrine_reference: Ester 9:7-8; continuidad narrativa del pasaje
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el control de revisión más reciente: no hubo cambios aplicados y el cotejo final reportó alto acuerdo, así que no se requieren ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de ‘y’ para reflejar la cadena hebrea sin omitir la estructura enumerativa.
  - Se optó por transliteraciones adaptadas al español para nombres propios, con la mínima acomodación ortográfica necesaria para una lectura natural.
  - La nota al pie conserva el antecedente contextual del verbo elidido, en línea con el audit trail en inglés.
