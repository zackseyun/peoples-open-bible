lexical_decisions:
- source_word: וְאַרְבָּעָה / אַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: HALOT
  rationale: El numeral cardinal se traduce de manera directa y natural como «cuatro». No requiere expansión ni adaptación idiomática.
- source_word: פָנִים
  english_pob_choice: faces
  chosen_spanish: rostros
  alternatives_spanish:
  - caras
  - faz
  lexicon: HALOT
  rationale: En español, «rostros» comunica con claridad la referencia a las cuatro apariencias distintivas de cada ser viviente y evita la posible dureza de «caras». «Faz» sería más literario, pero menos natural aquí.
- source_word: לְאֶחָת / לְאַחַת
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada criatura
  - uno por uno
  lexicon: HALOT
  rationale: 'La construcción distributiva hebrea se expresa en español de forma natural con «cada uno». Así se conserva el sentido de distribución sin forzar un calco como «a una». '
- source_word: כְּנָפַיִם
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - plumas
  lexicon: HALOT
  rationale: «Alas» es el equivalente directo y natural en español para este contexto visionario.
theological_decisions:
- issue: Construcción distributiva hebrea aplicada a los seres vivientes
  english_pob_reading: Each had four faces, and each had four wings.
  chosen_spanish_reading: Cada uno tenía cuatro rostros, y cada uno tenía cuatro alas.
  alternative_spanish_readings:
  - Tenía cuatro rostros y cuatro alas cada uno.
  - Cada uno tenía cuatro rostros y cuatro alas.
  rationale: El hebreo usa una formulación distributiva que en español se expresa mejor repitiendo «cada uno» para mantener la distribución sobre cada ser viviente. Esto preserva el sentido colectivo e individual sin añadir información doctrinal.
  doctrine_reference: Ninguna doctrina específica; cuestión de sintaxis distributiva hebrea.
translation_notes:
  revision_awareness: 'El texto inglés auditado fue suavizado para eliminar la redundancia «of them» sin perder el sentido distributivo. La versión española refleja directamente ese mismo sentido con una construcción natural: «Cada uno tenía... y cada uno tenía...».'
  spanish_consistency_notes:
  - Se mantiene «cada uno» de forma paralela para reproducir el valor distributivo de las dos cláusulas hebreas.
  - Se eligió «rostros» en vez de «caras» por registro bíblico claro y por concordancia con la imaginería visionaria del pasaje.
  - La nota al pie conserva la tensión literal/distributiva del hebreo sin convertirla en paráfrasis interpretativa.
