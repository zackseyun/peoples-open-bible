  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: וַיּוֹצִא = «sacó», עַמּוֹ = «su pueblo», בְשָׂשׂוֹן = «con alegría», y בְּחִירָיו = «sus escogidos». También conserva correctamente la nota alternativa para רִנָּה. Sin embargo, el anclaje de notas no corresponde al sentido fuente/POB: la nota sobre «sus elegidos» debe ir en «escogidos», no en «alegría».'
  spanish_quality_summary: El español es claro y digno. No obstante, «con cántico» suena algo menos natural en español general que «con cantos», y la colocación de las notas en «alegría» produce confusión semántica. La revisión mejora legibilidad sin apartarse del original.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Sus escogidos» sigue bien la decisión POB para בְּחִירָיו y evita tecnicismo excesivo. No intervienen términos sensibles como Yahvé/Mesías.
  issues:
  - severity: high
    issue: Las notas [a][b] están ancladas en «alegría», pero una de ellas corresponde a «escogidos».
    rationale: La nota b («O “sus elegidos”») explica בְּחִירָיו, no בְשָׂשׂוֹן. Debe marcarse en «escogidos» para preservar la trazabilidad semántica.
  - severity: medium
    issue: «Con cántico» es comprensible, pero menos idiomático que «con cantos» o «cantando».
    rationale: רִנָּה denota expresión audible jubilosa. «Con cantos» mantiene bien el paralelismo y suena más natural en español eclesial general, mientras la nota conserva la alternativa «con gritos de júbilo».
  revised_spanish_text: Así sacó a su pueblo con alegría, a sus escogidos[b] con cantos[a].
  revised_footnotes:
  - marker: a
    text: O «con gritos de júbilo». El hebreo puede referirse también a un clamor jubiloso, no solo al canto.
    reason: lexical_alternative
  - marker: b
    text: O «sus elegidos».
    reason: alternative_reading
