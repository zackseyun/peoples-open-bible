lexical_decisions:
- source_word: אֲשֶׁר / עִמּוֹ
  english_pob_choice: with whom
  chosen_spanish: con quien
  alternatives_spanish:
  - con el cual
  - con el que
  lexicon: HALOT
  rationale: El relativo introduce una cláusula que depende de la relación previa con el rey elegido; en español, “con quien” conserva el valor relacional de עִם + sufijo y mantiene un registro natural y bíblico sin añadir explicaciones ajenas al verso.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi mano de poder
  - mi poder
  lexicon: HALOT
  rationale: Se preserva la imagen corporal del hebreo. En este contexto poético, “mano” funciona como metáfora de acción y apoyo divinos, por lo que no conviene abstraerla en el texto principal.
- source_word: תִּכּוֹן
  english_pob_choice: will be established
  chosen_spanish: será establecida
  alternatives_spanish:
  - será firme
  - permanecerá firme
  - será afirmada
  lexicon: HALOT
  rationale: El nifal de כון expresa quedar fijado o firme. “Será establecida” refleja bien el matiz pasivo/resultativo y sigue de cerca la decisión inglesa revisada, manteniendo el tono formal.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - aun
  - ciertamente
  lexicon: HALOT
  rationale: Aquí אַף introduce una continuación enfática del paralelismo. En español, “sí” comunica una confirmación enfática breve y sonora; no se usa para añadir contenido nuevo, sino para intensificar la segunda cola.
- source_word: זְרוֹעִי
  english_pob_choice: my arm
  chosen_spanish: mi brazo
  alternatives_spanish:
  - mi brazo poderoso
  - mi fuerza
  lexicon: HALOT
  rationale: Se conserva la imagen literal del miembro corporal, que en poesía hebrea simboliza fuerza y poder. “Brazo” es el equivalente español más natural y mantiene visible la metáfora.
- source_word: תְאַמְּצֶנּוּ
  english_pob_choice: will strengthen him
  chosen_spanish: lo fortalecerá
  alternatives_spanish:
  - lo hará fuerte
  - lo robustecerá
  lexicon: HALOT
  rationale: 'El piel de אמץ tiene sentido causativo/intensivo: fortalecer, hacer fuerte. “Lo fortalecerá” es idiomático en español y conserva tanto la acción divina como el pronombre de objeto masculino singular.'
theological_decisions:
- issue: Metáfora corporal aplicada a Dios
  english_pob_reading: Retain 'my hand' and 'my arm' as poetic metaphors for God's sustaining power.
  chosen_spanish_reading: Conservar ‘mi mano’ y ‘mi brazo’ como metáforas poéticas del poder y apoyo de Dios.
  alternative_spanish_readings:
  - parafrasear como ‘mi poder’ y ‘mi fuerza’
  - explicitar ‘mi mano de poder’
  rationale: El hebreo usa imaginería corporal para la acción pactal de Yahvé. En español, la metáfora es comprensible y debe preservarse para no aplanar el texto ni borrar la fuerza poética.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor temporal de los imperfectos
  english_pob_reading: Render the verbs as future ('will be established,' 'will strengthen').
  chosen_spanish_reading: Verter los verbos en futuro (“será establecida”, “lo fortalecerá”) para reflejar promesa y continuidad.
  alternative_spanish_readings:
  - 'presente gnómico: ‘está establecida’ / ‘lo fortalece’'
  - perífrasis de valor durativo
  rationale: Los imperfectos hebreos en este contexto de pacto expresan compromiso promisor. El futuro español reproduce mejor esa orientación sin convertirla en una mera verdad general.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El inglés POB pasó de ‘with whom my hand will stand firm’ a ‘with whom my hand will be established’ para reflejar más directamente תכון. La versión española adopta ‘será establecida’ en la cola principal para alinearse con esa revisión, pero mantiene una nota alternativa que preserva la lectura más idiomática de firmeza.
  spanish_consistency_notes:
  - Se mantiene el tratamiento poético literal de ‘mano’ y ‘brazo’ en lugar de abstraerlos en ‘poder’ o ‘fuerza’.
  - Se usa ‘Yahvé’ en el marco terminológico del proyecto cuando corresponda, aunque este verso no lo nombra explícitamente.
  - ‘Lo fortalecerá’ conserva el objeto masculino singular del hebreo, coherente con la referencia al rey del contexto inmediato.
  - La puntuación y el registro buscan ser bíblicos y legibles en español latinoamericano contemporáneo.
