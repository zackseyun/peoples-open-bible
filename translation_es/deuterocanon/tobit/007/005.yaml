translation:
  language: es
  text: 'Ellos dijeron[a]: «Está vivo y está bien». Y Tobiah dijo[b]: «Es mi padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «vive y está sano»; se vierte de manera idiomática como «está vivo y está bien».'
    reason: lexical_alternative
  - marker: b
    text: La forma tradicional en español suele ser «Tobías»; aquí se usa «Tobiah» para reflejar más de cerca la forma semítica detrás del griego.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: They said
  chosen_spanish: Ellos dijeron
  alternatives_spanish:
  - Dijeron
  lexicon: BDAG
  rationale: El griego introduce una respuesta plural y directa en estilo narrativo. «Ellos dijeron» comunica con naturalidad el sujeto explícito; el sujeto puede omitirse en español, pero aquí se mantiene para reflejar el griego y evitar ambigüedad inmediata en la escena.
- source_word: ζῇ
  english_pob_choice: is alive
  chosen_spanish: está vivo
  alternatives_spanish:
  - vive
  lexicon: BDAG
  rationale: Para una respuesta conversacional sobre el estado de una persona, «está vivo» suena natural en español y conserva el valor de estado presente del verbo griego.
- source_word: ὑγιαίνει
  english_pob_choice: is well
  chosen_spanish: está bien
  alternatives_spanish:
  - goza de salud
  - está sano
  lexicon: BDAG
  rationale: ὑγιαίνω expresa estar sano o en buen estado. «Está bien» reproduce la fórmula idiomática breve de la respuesta griega sin añadir matiz excesivo; «goza de salud» sería más explícito pero menos conversacional.
- source_word: Τωβίας
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobiah
  lexicon: transliteration
  rationale: Se conserva la forma tradicional española del nombre propio, que es comprensible y estable en el uso bíblico en español. Aunque la política POB suele favorecer transliteraciones semíticas, aquí «Tobías» funciona como forma asentada del antropónimo en español.
- source_word: Πατήρ μου ἐστιν
  english_pob_choice: He is my father
  chosen_spanish: Es mi padre
  alternatives_spanish:
  - Él es mi padre
  lexicon: BDAG
  rationale: La cópula griega con posesivo se expresa de forma natural en español como «Es mi padre». La omisión del sujeto explícito corresponde al español idiomático y no altera el sentido.
theological_decisions:
- issue: Forma del nombre propio Τωβίας
  english_pob_reading: Tobiah
  chosen_spanish_reading: Tobías
  alternative_spanish_readings:
  - Tobiah
  rationale: No hay una implicación doctrinal aquí; la decisión es de consistencia onomástica y legibilidad. En español bíblico, «Tobías» es la forma tradicional ampliamente reconocible, y evita una forma menos usual para el lector general.
  doctrine_reference: Translate titles; transliterate names when appropriate, but preserve established Spanish biblical forms where readability and recognition are materially improved.
translation_notes:
  revision_awareness: 'El pasaje griego y la auditoría en inglés coinciden en el sentido básico: una respuesta de que Tobit está vivo y sano, seguida de la identificación de Tobit como el padre de Tobías. No se requirieron revisiones textuales ni decisiones de variante.'
  spanish_consistency_notes:
  - Se mantuvo un registro conversacional breve, acorde con el griego.
  - Se preservó la distinción entre estado de vida y estado de salud en «está vivo y está bien».
  - Se usó «Tobías» por consistencia con el uso bíblico español tradicional, señalándolo en nota para transparencia.
