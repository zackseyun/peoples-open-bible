    text: 'La LXX dice: «mandamientos» en plural, en lugar de «el mandamiento».'
    reason: textual_variant
  - marker: b
    text: 'La LXX lee: «para enseñar a Jacob el pacto, y a Israel sus juicios»; el hebreo dice: «sus estatutos ... sus testimonios y sus juicios».'
    reason: alternative_reading
  revision_rationale: Se reubica la nota [a] sobre «el mandamiento», porque esa variante no corresponde a «su voz». Además, se mejora la naturalidad española con «Le hizo oír» y se corrige el verbo teofánico a «lo acercó a la nube oscura» para reflejar mejor el hebreo primario y el audit trail inglés.
