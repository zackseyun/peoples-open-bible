base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/055.yaml
  text: For the sons of Israel are my servants[a]; they are my servants, whom I brought out of the land of Egypt[b]. I am Yahweh your God.
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the children of Israel.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my servants.' The Hebrew term denotes bonded service; 'slaves' is used here because the verse emphasizes Israel's belonging to the LORD rather than to human masters.
    reason: lexical_alternative
