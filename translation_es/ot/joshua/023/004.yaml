    text: 'Hebreo: «hacia donde se pone el sol», es decir, hacia el occidente.'
    reason: lexical_alternative
  revision_rationale: Se corrige el imperativo inicial al plural («Miren») para reflejar רְאוּ. Se cambia «he exterminado» por «he eliminado» para acercarse mejor a הִכְרַתִּי según la decisión auditada «cut off», sin suavizar indebidamente el juicio. Se mueve la nota al lugar correcto, anclándola en la expresión que explica.
