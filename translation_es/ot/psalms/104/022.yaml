translation:
  language: es
  text: Sale el sol; ellos se recogen[a] y se echan en sus guaridas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se retiran' o 'son recogidos'. El verbo hebreo puede entenderse como pasivo ('ser recogidos') o reflexivo/intransitivo ('recogerse', 'retirarse').
    reason: lexical_alternative
  - marker: b
    text: O 'sus cuevas' o 'sus moradas'. La palabra hebrea denota un lugar de habitación; aquí, por el contexto animal, 'guaridas' encaja bien.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּזְרַח
  english_pob_choice: rises
  chosen_spanish: sale
  alternatives_spanish:
  - asoma
  - sale a la luz
  - amanece
  lexicon: HALOT
  rationale: El verbo qal imperfecto de זרח con el sol como sujeto expresa su aparición o salida. En español, 'sale el sol' es una forma natural y fiel al movimiento de amanecer sin forzar un calco.
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: HALOT
  rationale: El sustantivo definido se traduce de manera directa y natural como 'el sol'.
- source_word: יֵאָסֵפוּן
  english_pob_choice: they gather themselves
  chosen_spanish: se retiran
  alternatives_spanish:
  - se reúnen
  - son recogidos
  - se apartan
  lexicon: HALOT
  rationale: El nifal de אסף admite matiz pasivo o reflexivo/intransitivo. En este contexto de animales nocturnos al amanecer, 'se retiran' comunica bien la idea de apartarse o retirarse sin imponer demasiado una voz pasiva explícita.
- source_word: וְאֶל
  english_pob_choice: and ... in
  chosen_spanish: en
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: La preposición elíptica de movimiento se resuelve naturalmente en español con 'en' al unirla con el verbo de movimiento 'se retiran' y el complemento locativo.
- source_word: מְעוֹנֹתָם
  english_pob_choice: their dens
  chosen_spanish: sus cuevas
  alternatives_spanish:
  - sus guaridas
  - sus moradas
  - sus madrigueras
  lexicon: HALOT
  rationale: מָעוֹן designa un lugar de habitación. En este contexto animal, 'cuevas' funciona bien en español por su naturalidad y por el valor de refugio/habitación; 'guaridas' o 'madrigueras' también son posibles, pero 'cuevas' es más general y readable.
- source_word: יִרְבָּצֽוּן
  english_pob_choice: lie down
  chosen_spanish: se echan
  alternatives_spanish:
  - se recuestan
  - se acuestan
  - se tumban
  lexicon: HALOT
  rationale: El qal de רבץ describe a animales echándose o tendiéndose para reposar. 'Se echan' conserva el matiz corporal y animal sin sonar artificioso en español.
translation_notes:
  revision_awareness: El inglés POB revisó 'they withdraw' a 'they gather themselves' para reflejar mejor יֵאָסֵפוּן. En español, 'se retiran' conserva esa retirada al amanecer y evita perder el matiz reflexivo/intransitivo del hebreo, sin necesidad de una nota adicional.
  spanish_consistency_notes:
  - Se mantiene 'el sol' para הַשֶּׁמֶשׁ, siguiendo un registro natural y no litúrgico.
  - Se eligió 'sus cuevas' como equivalente contextual de מְעוֹנֹתָם; no se usó 'guaridas' para evitar un tono más marcado de depredación que no es obligatorio en el hebreo.
  - '''Se echan'' preserva el comportamiento animal de רבץ mejor que una expresión más abstracta como ''descansan''.'
