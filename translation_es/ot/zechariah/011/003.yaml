    reason: lexical_alternative
  - marker: c
    text: O «la majestad del Jordán»; la expresión puede referirse específicamente a los matorrales exuberantes a lo largo de las orillas del Jordán.
    reason: lexical_alternative
  revision_rationale: Se ajusta גְּאוֹן en el texto principal a «orgullo» para seguir la decisión auditada final del POB («the pride of the Jordan»), dejando «majestad» como alternativa en nota. También se cambia «cachorros de león» por «leones jóvenes» para una equivalencia más natural y más cercana a כְּפִירִים en registro bíblico-poético. Se mantiene el resto de la sintaxis y el paralelismo del borrador.
