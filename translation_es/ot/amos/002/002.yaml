    issue: Traducción de אַרְמְנוֹת como 'ciudades fortificadas'
    rationale: El hebreo denota ciudadelas/palacios/fortalezas, no ciudades como tales. El POB inglés escogió 'citadels' precisamente para conservar la doble carga palacial y defensiva. 'Ciudades fortificadas' amplía y desplaza el referente.
  - severity: high
