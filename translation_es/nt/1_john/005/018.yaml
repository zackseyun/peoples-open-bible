translation:
  language: es
  text: Sabemos que todo el que ha nacido de Dios no sigue pecando[a]; más bien, el que nació de Dios lo guarda[b], y el maligno no lo toca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no peca»; el presente griego puede señalar conducta continua o habitual, no necesariamente la negación de todo acto de pecado.'
    reason: cross_reference
  - marker: b
    text: 'O: «el nacido de Dios se guarda a sí mismo». Sin embargo, muchos intérpretes entienden que «el que nació de Dios» se refiere a Jesús, el Hijo, quien guarda al creyente.'
    reason: alternative_reading
  - marker: c
    text: «Tocar» puede implicar sujetar o hacer daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: We know
  chosen_spanish: Sabemos
  alternatives_spanish:
  - Hemos conocido
  - Conocemos
  lexicon: BDAG
  rationale: οἴδαμεν funciona aquí como un perfecto con sentido estativo de presente. «Sabemos» transmite ese valor idiomático de manera natural en español.
- source_word: πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ
  english_pob_choice: everyone who has been born of God
  chosen_spanish: todo el que ha nacido de Dios
  alternatives_spanish:
  - todo el que es nacido de Dios
  - todo nacido de Dios
  lexicon: BDAG
  rationale: La construcción distributiva πᾶς ὁ + participio se rinde con «todo el que». «Ha nacido de Dios» conserva el estado resultante del perfecto pasivo y evita un calco rígido.
- source_word: οὐχ ἁμαρτάνει
  english_pob_choice: does not keep sinning
  chosen_spanish: no sigue pecando
  alternatives_spanish:
  - no peca
  - no está pecando
  lexicon: BDAG
  rationale: El presente en Juan suele tener fuerza imperfectiva; en español «no sigue pecando» preserva la idea de conducta continua o habitual sin afirmar impecabilidad absoluta.
- source_word: ἀλλ’
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - pero
  - sino
  lexicon: BDAG
  rationale: «Más bien» expresa el contraste correctivo de ἀλλά con naturalidad en español y mantiene el matiz de rectificación.
- source_word: ὁ γεννηθεὶς ἐκ τοῦ θεοῦ
  english_pob_choice: the one who was born of God
  chosen_spanish: el que nació de Dios
  alternatives_spanish:
  - el nacido de Dios
  - el que ha nacido de Dios
  lexicon: BDAG
  rationale: La frase es sintácticamente ambigua en el griego y la POB inglesa la conserva de forma abierta. «El que nació de Dios» mantiene esa ambigüedad sin añadir explícitamente «Jesús» al texto principal.
- source_word: τηρεῖ αὐτόν
  english_pob_choice: keeps him
  chosen_spanish: lo guarda
  alternatives_spanish:
  - lo protege
  - lo cuida
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, vigilar o preservar. «Lo guarda» es formalmente cercano y en español permite percibir el matiz protector del contexto sin sobreinterpretarlo.
- source_word: ὁ πονηρὸς
  english_pob_choice: the evil one
  chosen_spanish: el maligno
  alternatives_spanish:
  - el malo
  - el perverso
  lexicon: BDAG
  rationale: Con artículo y en el uso joánico, ὁ πονηρός se entiende como referencia personal a Satanás. «El maligno» es la opción más estable y clara en español.
- source_word: οὐχ ἅπτεται αὐτοῦ
  english_pob_choice: does not touch him
  chosen_spanish: no lo toca
  alternatives_spanish:
  - no le hace daño
  - no lo alcanza
  - no se le acerca
  lexicon: BDAG
  rationale: ἅπτομαι significa literalmente «tocar», con posible fuerza de sujetar o dañar según el contexto. «No lo toca» preserva la forma lexical y deja que el contexto comunique la fuerza protectora.
theological_decisions:
- issue: Sentido de οὐχ ἁμαρτάνει en presente
  english_pob_reading: The clause denies ongoing/practiced sin rather than asserting absolute sinless perfection.
  chosen_spanish_reading: La cláusula niega el pecado continuo o habitual, no la posibilidad de que el creyente cometa algún pecado.
  alternative_spanish_readings:
  - No peca en absoluto.
  - No comete pecado.
  rationale: El presente imperfectivo en Juan apunta mejor a una conducta persistente que a una impecabilidad absoluta. La traducción conserva la tensión con 1 Juan 1:8-10 y 2:1 sin resolverla artificialmente.
  doctrine_reference: 1 Juan 1:8-10; 2:1
- issue: Referente de ὁ γεννηθεὶς ἐκ τοῦ θεοῦ
  english_pob_reading: Rendered ambiguously in the main text as 'the one who was born of God,' with footnote preserving the alternative identification as Jesus/the Son.
  chosen_spanish_reading: 'El texto principal mantiene la ambigüedad: «el que nació de Dios».'
  alternative_spanish_readings:
  - Se refiere al creyente nacido de Dios.
  - Se refiere específicamente a Jesús, el Hijo.
  rationale: El griego admite más de una identificación; la POB inglesa conserva esa tensión. El español principal no resuelve el referente y la nota recoge la alternativa cristológica.
  doctrine_reference: Preservar la tensión interpretativa del original
- issue: Referente de αὐτόν y αὐτοῦ
  english_pob_reading: Both pronouns are rendered 'him,' preserving the likely sense that the protected person is the believer.
  chosen_spanish_reading: 'Ambos pronombres quedan como objeto directo/indirecto de tercera persona singular: «lo».'
  alternative_spanish_readings:
  - «se guarda a sí mismo» si se adopta lectura reflexiva.
  - «lo guarda» referido al creyente.
  rationale: El griego usa formas no reflexivas; por eso el español mantiene la referencia con «lo» y no introduce una paráfrasis reflexiva en el texto principal. La nota documenta la posibilidad interpretativa alternativa.
  doctrine_reference: Primacía del original y preservación de la ambigüedad genuina
translation_notes:
  revision_awareness: La revisión más reciente del inglés indica que no hubo cambios y que el acuerdo textual es alto; la presente propuesta mantiene esa lectura estable, conservando la tensión interpretativa y el matiz aspectual del presente griego.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «el maligno» para ὁ πονηρός, siguiendo el uso joánico y la convención POB.
  - Se mantiene «nacido de Dios» con fórmula verbal natural en español para conservar el perfecto griego y la ambigüedad del referente.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni una cita directa del nombre divino.
