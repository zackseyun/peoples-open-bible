lexical_decisions:
- source_word: ἐκχέαι
  english_pob_choice: to pour out
  chosen_spanish: derramar
  alternatives_spanish:
  - verter
  - vaciar
  - derramar
  lexicon: BDAG
  rationale: «Derramar» conserva la imagen verbal de algo que se vierte o se echa fuera, sin perder naturalidad en español.
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - ira
  - enojo
  - furor
  lexicon: BDAG
  rationale: «Ira» es el equivalente más natural y solemne en español para el sentido punitivo de ὀργή en este contexto de juicio.
- source_word: ἐν ἁρπάγματι
  english_pob_choice: in plundering
  chosen_spanish: en medio de saqueo
  alternatives_spanish:
  - con saqueo
  - en saqueo
  - por saqueo
  - en medio de saqueo
  lexicon: LSJ
  rationale: La expresión griega es compacta y difícil; «en medio de saqueo» comunica el marco violento de despojo sin forzar una equivalencia demasiado literal o ambigua.
- source_word: χρονίσῃς
  english_pob_choice: do not delay
  chosen_spanish: no tardes
  alternatives_spanish:
  - no demores
  - no te retrases
  - no tardes
  lexicon: BDAG
  rationale: «No tardes» preserva la súplica urgente con un español claro y reverente.
- source_word: ἀποδοῦναι αὐτοῖς εἰς κεφαλάς
  english_pob_choice: to repay them on their own heads
  chosen_spanish: retribuirles sobre sus propias cabezas
  alternatives_spanish:
  - pagarles sobre sus propias cabezas
  - recompensarles sobre sus cabezas
  - devolverles sobre sus cabezas
  lexicon: BDAG
  rationale: «Retribuirles sobre sus propias cabezas» mantiene el idiomismo de retribución recaída sobre los culpables; «sobre sus propias cabezas» conserva la imagen semítica sin suavizarla.
theological_decisions:
- issue: Idiomatic retribution formula
  english_pob_reading: The line is rendered as a prayer for God to repay the aggressors on their own heads.
  chosen_spanish_reading: La línea se mantiene como oración para que Dios haga recaer el juicio sobre los mismos agresores.
  alternative_spanish_readings:
  - que les devuelva el mal que hicieron
  - que caiga sobre ellos su castigo
  rationale: La imagen de que la retribución vuelva sobre la cabeza del culpable es bíblica e intencional; el español debe conservarla sin reemplazarla por una formulación más abstracta.
  doctrine_reference: Retribución divina / justicia retributiva bíblica
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que prefirió 'in plundering' por sobre 'in plunder' para evitar ambigüedad; por eso la versión española opta por una expresión circunstancial natural («en medio de saqueo») que conserva la idea de despojo violento sin convertirla en una fórmula rígida. No se detectaron cambios posteriores en la lectura inglesa final.
  spanish_consistency_notes:
  - Se usó «ira» para ὀργή y no «enojo», porque el contexto es judicial y punitivo.
  - Se conservó la imagen de retribución en «sobre sus propias cabezas», ya que el giro es parte del sentido del versículo y no solo un recurso estilístico.
  - «Dios» se mantiene por la lectura griega ὁ θεός, sin necesidad de máscara nominal.
  - No se introdujo «Cristo» ni terminología cristológica; el pasaje no lo requiere.
