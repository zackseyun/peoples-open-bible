lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los niños de
  - Ahora los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי se expresa de manera natural y fiel como «hijos de». Mantiene la estructura de linaje sin introducir un sentido más amplio como «niños» o una expansión discursiva innecesaria.
- source_word: גֹּמֶר
  english_pob_choice: Gomer
  chosen_spanish: Gomer
  lexicon: HALOT
  rationale: Nombre propio; se conserva por transliteración estándar en español.
- source_word: אַשְׁכֲּנַז
  english_pob_choice: Ashkenaz
  chosen_spanish: Askenaz
  alternatives_spanish:
  - Ashkenaz
  lexicon: HALOT
  rationale: Nombre propio. En español, «Askenaz» sigue la adaptación gráfica más asentada y pronunciable, sin cambiar el referente. Se mantiene la identidad del nombre bíblico como transliteración adaptada.
- source_word: וְ/רִיפַת
  english_pob_choice: and Riphath
  chosen_spanish: Rifat
  alternatives_spanish:
  - Rifat
  - Difat
  lexicon: HALOT
  rationale: Nombre propio con conjunción. El hebreo masorético lee רִיפַת, por lo que se conserva «Rifat» en el texto principal. «Difat» queda como alternativa conocida por el paralelo de 1 Crónicas 1:6, sin desplazar la lectura base.
- source_word: וְ/תֹגַרְמָה
  english_pob_choice: and Togarmah
  chosen_spanish: Togarma
  alternatives_spanish:
  - Togarmá
  lexicon: HALOT
  rationale: Nombre propio; se translitera como «Togarma» para una forma española breve y reconocible. La acentuación no es necesaria en esta adaptación, y el nombre permanece identificable como topónimo/etnónimo bíblico.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se requieren cambios de fondo. Se preserva la variante textual documentada en una nota, sin alterar la lectura principal del hebreo masorético.
  spanish_consistency_notes:
  - Se mantiene el orden genealógico del hebreo.
  - Se usa «hijos de» para בְּנֵי por ser la opción más natural y exacta en listas de ascendencia.
  - Los nombres propios se conservan como transliteraciones adaptadas al español, evitando traducciones interpretativas.
  - La variante de 1 Crónicas 1:6 se documenta como nota textual sin incorporarla al texto principal.
