translation:
  language: es
  text: Porque la tierra[a] se llenará del conocimiento de la gloria de Yahvé, como las aguas cubren el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» en un sentido más local, es decir, «el país» o «la región»; aquí se prefiere el sentido universal.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, pues
  lexicon: HALOT
  rationale: El conector introduce la explicación o fundamento del anuncio anterior. «Porque» preserva bien esa relación causal/explicativa en español y suena natural en un registro bíblico sobrio.
- source_word: תִּמָּלֵא
  english_pob_choice: will be filled
  chosen_spanish: será llena
  alternatives_spanish:
  - será llenada
  - estará llena
  - se llenará
  lexicon: HALOT
  rationale: El nifal imperfecto expresa pasivo/resultativo futuro. «Será llena» conserva la fuerza futura y el sentido de plenitud sin forzar una paráfrasis. «Será llenada» es posible, pero suena más pesado en español moderno.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra habitada
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «the earth» por el alcance universal, en español «la tierra» comunica ese mismo horizonte amplio y es más natural que «la tierra habitada». No se estrecha a un sentido meramente local de «land».
- source_word: לָדַעַת
  english_pob_choice: with the knowledge of
  chosen_spanish: del conocimiento de
  alternatives_spanish:
  - con el conocimiento de
  - para conocer
  lexicon: HALOT
  rationale: La construcción expresa plenitud respecto de «conocimiento». En español, «será llena del conocimiento de» reproduce la relación sustantiva de manera idiomática y evita convertir la frase en un infinitivo final menos directo.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: «Gloria» es la correspondencia usual y teológicamente adecuada para כָּבוֹד en relación con Yahvé. «Honor» o «majestad» captarían solo matices parciales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, conforme al criterio del proyecto. «Yahvé» es la forma española establecida aquí para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: כַּמַּיִם
  english_pob_choice: as the waters
  chosen_spanish: como las aguas
  alternatives_spanish:
  - como aguas
  - así como las aguas
  lexicon: HALOT
  rationale: El prefijo comparativo כ pide una comparación directa. «Como las aguas» preserva el paralelismo poético y el plural del hebreo.
- source_word: יְכַסּוּ
  english_pob_choice: cover
  chosen_spanish: cubren
  alternatives_spanish:
  - cubrirán
  - cubren por completo
  lexicon: HALOT
  rationale: 'En el símil, el imperfecto hebreo puede expresarse de modo gnómico o general: «cubren». Esto evita una doble futurización innecesaria dentro de la comparación y mantiene el flujo poético.'
- source_word: עַל יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - sobre el mar
  lexicon: HALOT
  rationale: En español, «cubren el mar» es la forma más natural del símil. «Sobre el mar» conserva más literalmente la preposición, pero suena menos idiomático y menos claro.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: universal 'earth' rather than localized 'land'
  chosen_spanish_reading: la tierra con alcance universal
  alternative_spanish_readings:
  - la tierra como región local
  - el país
  rationale: La decisión inglesa de leer el verso con amplitud universal se mantiene. En español, «la tierra» permite ese mismo alcance sin limitarlo a una región específica ni introducir una glosa excesiva.
  doctrine_reference: Principio de primacía del sentido del texto original sobre la tradición de traducción; mantener la amplitud escatológica del pasaje.
translation_notes:
  revision_awareness: El texto español sigue de cerca la resolución auditada del original hebreo y conserva la decisión del POB inglés de preferir un alcance universal para הָאָרֶץ. No se introdujeron cambios respecto del paquete de control, salvo la adaptación idiomática normal del comparativo y del símil en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto.
  - Se usa «gloria» para כְּבוֹד, sin sustituirlo por «honor» o «majestad».
  - La estructura «será llena del conocimiento de» preserva la idea sustantiva de לָדַעַת sin convertirla en paráfrasis.
  - El símil final conserva el paralelismo hebreo y la lectura universal del verso.
