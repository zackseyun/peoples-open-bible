revisions:
- from: Lo llamó Eupátor[a]. Y los de la acrópolis iban cercando a Israel alrededor de los lugares santos[b], buscando mal continuamente y siendo un apoyo para las naciones.
  to: Le puso por nombre Eupátor. Y los de la ciudadela iban cercando a Israel alrededor de los lugares santos[a], procurando daño continuamente y sirviendo de apoyo a las naciones.
  rationale: Se ajusta «Le puso por nombre» para expresar con naturalidad el giro de asignación de nombre; se reemplaza «acrópolis» por «ciudadela» por fidelidad contextual y claridad; se mejora «buscando mal» a «procurando daño» para un español más idiomático sin perder el matiz hostil; se elimina la nota ortográfica innecesaria sobre el nombre y se conserva únicamente la nota útil sobre «los lugares santos/santuario».
  reviewer_model: gpt-5.4
