    rationale: El contenido de la nota b explica el hebreo «desde hombre hasta bestia», pero el marcador aparece en «Míos serán[b]». Esto incumple la disciplina requerida de que cada nota aparezca exactamente en la palabra o frase relevante del texto.
  - severity: low
