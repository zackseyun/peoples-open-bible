review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: sujeto genérico, acción de hacer una mezcla semejante, propósito de olerla y sanción comunitaria. Sin embargo, «será eliminado» no preserva tan fielmente la fórmula jurídica hebrea וְנִכְרַת como una forma más literal y tradicional en español, y además corre más hacia un resultado concreto. También conviene suavizar «algo igual» a una formulación más natural y precisa para כָמֹהָ.'
  spanish_quality_summary: El español es claro y legible, pero «algo igual» suena un poco tosco en contexto ritual, y «será eliminado» es menos idiomático para una fórmula legal bíblica que «será excluido» o, mejor aún, una forma que conserve la tensión del original. El resto del verso y las notas se leen bien en español eclesial neutral.
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. La cuestión principal es la fórmula legal נִכְרַת, donde el inglés POB retiene expresamente la tensión con «shall be cut off»; en español conviene alinearse mejor con esa decisión usando «será cortado de entre su pueblo» en vez de «será eliminado».
  issues:
  - severity: medium
    issue: «será eliminado» interpreta demasiado la fórmula legal וְנִכְרַת
    rationale: El expediente inglés decidió conservar la fórmula «shall be cut off» precisamente para no resolver si se trata de muerte, expulsión o juicio divino. «Será eliminado» en español sugiere más directamente remoción o destrucción, y preserva peor la tensión jurídica-teológica.
  - severity: low
    issue: «algo igual» es menos natural que una expresión más idiomática para כָמֹהָ
    rationale: Aunque es comprensible, «algo igual» suena rígido. «Algo semejante» mantiene mejor la referencia a una mezcla comparable sin implicar identidad exacta ni sonar forzado.
  revised_spanish_text: Cualquiera que haga algo semejante para olerlo[a] será cortado[b] de entre su pueblo.
  revised_footnotes:
