translation:
  language: es
  text: Se avergüenzan[a] porque confiaron; llegaron allí[b] y quedaron decepcionados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedaron avergonzados ... y se confundieron / quedaron humillados». El hebreo usa dos verbos emparentados con la vergüenza; el segundo también puede entenderse como «se sonrojaron de vergüenza» o «quedaron abochornados».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «llegaron a ella», en referencia al torrente o wadi del contexto anterior.'
    reason: cross_reference
lexical_decisions:
- source_word: בֹּשׁוּ
  english_pob_choice: are ashamed
  chosen_spanish: se avergüenzan
  alternatives_spanish:
  - quedaron avergonzados
  - son puestos en vergüenza
  - se sienten avergonzados
  lexicon: HALOT
  rationale: El verbo expresa vergüenza o quedar en vergüenza. «Se avergüenzan» conserva el valor resultativo/emocional del hebreo sin forzar un giro demasiado pasivo. Mantiene la distinción frente a la segunda mitad del versículo, donde el segundo verbo aporta la idea de desilusión/confusión.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la vergüenza de manera natural en español. «Porque» preserva el sentido causal directo que el contexto exige.
- source_word: בָטָח
  english_pob_choice: they trusted
  chosen_spanish: confiaron
  alternatives_spanish:
  - tuvieron confianza
  - se sintieron seguros
  - esperaron
  lexicon: HALOT
  rationale: Aunque la forma es morfológicamente singular, el contexto colectivo del versículo lleva a una referencia plural implícita. «Confiaron» conserva el peso léxico de בטח como confianza/seguridad y es el equivalente más natural en español.
- source_word: בָּאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - acudieron
  - arribaron
  lexicon: HALOT
  rationale: «Llegaron» expresa el movimiento de arribo de forma clara y sobria en español. Conserva la idea de alcanzar el lugar esperado.
- source_word: עָדֶיהָ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - a él
  - a eso
  - hasta ella
  lexicon: HALOT
  rationale: El sufijo femenino remite al torrente o cauce del contexto previo, pero en español resulta más natural decir «allí» que reproducir la referencia pronominal de manera literal. «Allí» mantiene la dirección y evita una construcción extraña.
- source_word: וַיֶּחְפָּרוּ
  english_pob_choice: were disappointed
  chosen_spanish: quedaron decepcionados
  alternatives_spanish:
  - quedaron confundidos
  - se sintieron humillados
  - quedaron avergonzados
  lexicon: HALOT
  rationale: El campo semántico incluye quedar abochornados, confundidos o desilusionados. «Quedaron decepcionados» comunica bien la experiencia de llegar esperando agua y no hallarla, sin perder el matiz de frustración/bochorno que acompaña al verbo.
translation_notes:
  revision_awareness: 'Se ha seguido el sentido ya auditado en la POB inglesa: vergüenza por confiar en el agua esperada, llegada al lugar señalado y desenlace de decepción. No se introducen cambios de sentido respecto del análisis léxico existente; solo se adapta a un español natural y fiel.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre el primer verbo de vergüenza («se avergüenzan») y el segundo de desilusión/confusión («quedaron decepcionados»).
  - Se evita traducir el referente femenino de עָדֶיהָ de forma literal, porque en español la referencia implícita al torrente anterior se expresa mejor con «allí».
  - Se conserva una dicción digna y contemporánea, sin recurrir a fórmulas eclesiásticas tradicionales no motivadas por el hebreo.
