base_translation:
  language: en
  yaml_path: translation/ot/1_kings/015/017.yaml
  text: Then Baasha king of Israel went up against Judah and built Ramah[b][a], so as not to allow anyone to go out or come in to Asa king of Judah.
  footnotes:
  - marker: a
    text: Or 'fortified Ramah'; the Hebrew verb is simply 'built,' but the context suggests a strategic military construction.
    reason: lexical_alternative
  - marker: b
    text: The expression 'go out or come in' is a Hebrew idiom for ordinary movement or access; the sense is that Baasha sought to block traffic to Asa king of Judah.
    reason: cultural_note
