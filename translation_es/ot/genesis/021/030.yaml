translation:
  language: es
  text: 'Y él dijo[a]: «Tomarás estas siete corderas de mi mano, para que sean un testimonio para mí de que cavé este pozo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea un testimonio para mí». El hebreo presenta un verbo singular, mientras que el referente inmediato son las siete corderas; el singular puede tratarlas como un conjunto o referirse al acto o acuerdo como testimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la acción; «Y él dijo» conserva el flujo narrativo hebreo en español natural. Se explicita el sujeto para evitar ambigüedad sin añadir contenido.
- source_word: שֶׁבַע כְּבָשֹׂת
  english_pob_choice: these seven ewe lambs
  chosen_spanish: estas siete ovejas
  alternatives_spanish:
  - estas siete crías de oveja
  - estas siete ovejas hembras
  lexicon: HALOT
  rationale: כְבָשֹׂת señala ovejas hembras; en español «ovejas» comunica bien el referente sin forzar un tecnicismo poco natural. Se conserva «siete» y el demostrativo «estas» para reflejar la escena inmediata.
- source_word: תִּקַּח
  english_pob_choice: you are to take
  chosen_spanish: tú tomarás
  alternatives_spanish:
  - toma
  - tú has de tomar
  lexicon: HALOT
  rationale: El imperfecto en discurso directo expresa instrucción o acción esperada. «Tomarás» mantiene la fuerza directiva con un español sobrio y claro.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mí
  lexicon: HALOT
  rationale: Se retiene la imagen concreta de entrega o transferencia formal. «De mi mano» es fiel y natural en español.
- source_word: בַּעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Aquí expresa propósito. «Para que» es la forma más directa y natural en español moderno.
- source_word: תִּהְיֶה לִּי לְעֵדָה
  english_pob_choice: they may be a witness for me
  chosen_spanish: sirvan como testimonio para mí
  alternatives_spanish:
  - sean testimonio para mí
  - sirvan como testigo para mí
  lexicon: HALOT
  rationale: El hebreo presenta una tensión entre el sujeto plural inmediato («siete ovejas») y el verbo singular, que en la traducción inglesa fue resuelto como plural por revisión. En español, «sirvan» acomoda el sujeto plural explícito y «testimonio» conserva el valor evidencial/legal del sustantivo, sin perder la posibilidad de lectura colectiva.
- source_word: לְעֵדָה
  english_pob_choice: as a witness
  chosen_spanish: como testimonio
  alternatives_spanish:
  - como testigo
  - como evidencia
  lexicon: HALOT
  rationale: En el contexto pactal-legal, «testimonio» transmite bien la función probatoria del término. «Testigo» sería más personal y menos idiomático respecto del objeto ofrecido.
- source_word: חָפַרְתִּי
  english_pob_choice: that I dug
  chosen_spanish: de que cavé
  alternatives_spanish:
  - de que excavé
  - de que yo cavé
  lexicon: HALOT
  rationale: «Cavé» es el verbo español más natural para un pozo y reproduce el acto afirmado en el hebreo. Se mantiene la declaración directa de autoría.
- source_word: הַבְּאֵר הַזֹּאת
  english_pob_choice: this well
  chosen_spanish: este pozo
  alternatives_spanish:
  - este aljibe
  - esta cisterna
  lexicon: HALOT
  rationale: הַבְּאֵר designa un pozo; «pozo» es exacto y transparente. «Este» conserva el deíctico de la escena.
theological_decisions:
- issue: Valor colectivo o singular de «testimonio» en la cláusula final
  english_pob_reading: The Hebrew verb is singular, while the immediate referent is the seven ewe lambs; the singular may treat them collectively or refer to the act/arrangement as the witness.
  chosen_spanish_reading: Se traduce con sujeto plural explícito («sirvan») y sustantivo singular de valor colectivo («testimonio»), dejando abierta la lectura de conjunto.
  alternative_spanish_readings:
  - «sea un testimonio para mí»
  - «sean un testimonio para mí»
  rationale: 'El hebreo admite una tensión entre verbo singular y referente plural. La solución española mantiene esa tensión de modo inteligible: el plural concuerda con las ovejas, mientras «testimonio» conserva la idea de una sola prueba o señal pactal.'
  doctrine_reference: Uso semántico y sintáctico del hebreo; no implica una doctrina específica.
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió la concordancia de «it may serve as a witness» a «they may be a witness» para ajustarse al sujeto plural «seven ewe lambs» y al verbo hebreo singular. La redacción española adopta esa resolución funcional con una concordancia plural natural («sirvan») y conserva el matiz colectivo/legal del sustantivo «testimonio».
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefiere vocabulario concreto y jurídico («testimonio», «pozo», «de mi mano») sin elevarlo a formulaciones eclesiásticas no exigidas por el hebreo.
  - La nota textual en el pie de página preserva la tensión hebrea entre plural de las ovejas y singular verbal, sin ocultarla.
