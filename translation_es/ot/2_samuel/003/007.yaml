translation:
  language: es
  text: 'Ahora bien, Saúl tenía una concubina llamada Rizpa, hija de Aías. E Is-bóset dijo a Abner[a]: «¿Por qué te llegaste a la concubina de mi padre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «¿Por qué tuviste relaciones con la concubina de mi padre?». El hebreo dice «llegar a» o «entrar a», un eufemismo sexual común.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשָׁאוּל
  english_pob_choice: Now Saul had
  chosen_spanish: Ahora bien, Saúl tenía
  alternatives_spanish:
  - Y Saúl tenía
  - Saúl tenía entonces
  - Saúl contaba con
  lexicon: HALOT
  rationale: El hebreo introduce información de trasfondo; en español, «Ahora bien» conserva ese valor discursivo mejor que una simple «Y». «Tenía» expresa naturalmente la relación posesiva/existencial de ל con un contexto narrativo fluido.
- source_word: פִּלֶגֶשׁ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - segunda esposa
  - mujer secundaria
  lexicon: HALOT
  rationale: «Concubina» es el equivalente léxico directo y conserva la categoría social-jurídica del hebreo sin atenuarla con una paráfrasis.
- source_word: וּשְׁמָהּ
  english_pob_choice: whose name was
  chosen_spanish: llamada
  alternatives_spanish:
  - cuyo nombre era
  - y su nombre era
  lexicon: HALOT
  rationale: En español, «llamada» suena más natural y mantiene la función identificadora del giro hebreo sin perder información.
- source_word: רִצְפָּה
  english_pob_choice: Rizpah
  chosen_spanish: Rizpa
  alternatives_spanish:
  - Rizpá
  lexicon: transliteration convention
  rationale: Se usa la transliteración española habitual del nombre propio, adaptando la forma al sistema gráfico del español.
- source_word: בַת אַיָּה
  english_pob_choice: daughter of Aiah
  chosen_spanish: hija de Aías
  alternatives_spanish:
  - hija de Aiah
  - la hija de Aías
  lexicon: HALOT
  rationale: La construcción patronímica se vierte de modo directo. «Aías» sigue la convención española más extendida para el nombre, manteniendo el referente propio.
- source_word: אֶל אַבְנֵר
  english_pob_choice: to Abner
  chosen_spanish: a Abner
  alternatives_spanish:
  - contra Abner
  - con Abner
  lexicon: HALOT
  rationale: Con verbos de decir, אֶל se expresa naturalmente como «a». No se requiere una preposición más marcada en español.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué propósito
  - ¿Para qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, conservando la fuerza acusatoria de la pregunta.
- source_word: בָּאתָה
  english_pob_choice: did you go in
  chosen_spanish: entraste
  alternatives_spanish:
  - fuiste a
  - te acercaste a
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. En español, «entraste» conserva la metáfora espacial y, con el contexto, la insinuación sexual sin volverla más explícita que el texto base.
- source_word: אֶל פִּילֶגֶשׁ אָבִי
  english_pob_choice: to my father’s concubine
  chosen_spanish: a la concubina de mi padre
  alternatives_spanish:
  - con la concubina de mi padre
  - a la concubina de mi padre
  lexicon: HALOT
  rationale: Se mantiene la preposición y la relación posesiva. «A la concubina de mi padre» reproduce el hebreo de forma natural y deja visible el eufemismo.
theological_decisions:
- issue: Eufemismo sexual de בּוֹא / «go in to»
  english_pob_reading: The Hebrew says “go in to,” a common sexual euphemism.
  chosen_spanish_reading: «entraste a» conserva el eufemismo sin explicitar la relación sexual en el cuerpo principal.
  alternative_spanish_readings:
  - «tuviste relaciones con»
  - «te acostaste con»
  rationale: El texto hebreo usa una expresión indirecta. En el cuerpo principal conviene preservar esa forma figurada; la explicitación puede quedar como nota si se quisiera abrir la ambigüedad. No se debe despojar al hebreo de su estrategia retórica.
  doctrine_reference: N/A
