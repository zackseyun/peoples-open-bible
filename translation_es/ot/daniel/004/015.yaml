  text: This is the dream that I[a], King Nebuchadnezzar, saw. And you, Belteshazzar, tell the interpretation, because all the wise men of my kingdom are not able to make the interpretation known to me, but you are able, for the spirit of the holy gods is in you.
  footnotes:
