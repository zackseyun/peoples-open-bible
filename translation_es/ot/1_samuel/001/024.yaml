translation:
  language: es
  text: Cuando lo hubo destetado[a], lo subió consigo, con tres toros, un efa de harina y un odre de vino, y lo llevó a la casa de Yahvé en Silo. Y el muchacho era aún pequeño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tres toros»; algunos testigos antiguos e intérpretes leen «un toro de tres años».'
    reason: textual_variant
lexical_decisions:
- source_word: וַתַּעֲלֵהוּ
  english_pob_choice: she took him up
  chosen_spanish: la llevó con ella
  alternatives_spanish:
  - lo llevó
  - la hizo subir con ella
  lexicon: HALOT
  rationale: 'El verbo hebreo tiene el sentido de movimiento hacia arriba o hacia el santuario. En español, «la llevó con ella» refleja la dirección y el acompañamiento sin forzar un calco. Aquí el referente es Samuel; el pronombre femenino se entiende por la madre en el sujeto de la acción, pero en español el objeto debe concordar con el niño: por eso se expresa «lo» en la cláusula siguiente, mientras que el arrastre del verbo se resuelve naturalmente en la secuencia narrativa.'
- source_word: כַּאֲשֶׁר גְּמָלַתּוּ
  english_pob_choice: When she had weaned him
  chosen_spanish: Cuando lo hubo destetado
  alternatives_spanish:
  - Después de destetarlo
  - Cuando lo destetó
  lexicon: HALOT
  rationale: El contexto exige el acto de destetar, no un sentido general de «completar» o «retribuir». El giro «cuando lo hubo destetado» conserva el valor temporal y resulta digno y claro en español bíblico moderno.
- source_word: בְּפָרִים שְׁלֹשָׁה
  english_pob_choice: with three bulls
  chosen_spanish: con tres toros
  alternatives_spanish:
  - con tres becerros
  - con un toro de tres años
  lexicon: HALOT
  rationale: 'Se sigue el sentido más directo del hebreo masorético: plural de «toros». Se evita armonizar con la lectura interpretativa de «un toro de tres años», que queda reservada como alternativa textual en nota.'
- source_word: וְאֵיפָה אַחַת קֶמַח
  english_pob_choice: one ephah of flour
  chosen_spanish: un efa de harina
  alternatives_spanish:
  - un efa de flor de harina
  - un efa de trigo molido
  lexicon: HALOT
  rationale: «Efa» se translitera como medida antigua. «Harina» es el equivalente natural de קֶמַח en español; «flor de harina» sería más específico pero no está exigido por el hebreo.
- source_word: וְנֵבֶל יַיִן
  english_pob_choice: a skin of wine
  chosen_spanish: un pellejo de vino
  alternatives_spanish:
  - un odre de vino
  - un recipiente de vino
  lexicon: HALOT
  rationale: נֵבֶל designa aquí un recipiente flexible de cuero; «pellejo» y «odre» son opciones válidas. Se elige «pellejo» por ser natural y mantener la imagen concreta del contenedor.
- source_word: וַתְּבִאֵהוּ
  english_pob_choice: and brought him
  chosen_spanish: y lo llevó
  alternatives_spanish:
  - y lo trajo
  - y ella lo llevó
  lexicon: HALOT
  rationale: El hiphil de בוא es «hacer venir / llevar». Dado que ya se usó «llevó» para עלה, la repetición verbal en español se mantiene de forma estilística con «lo llevó» para evitar monotonía y conservar el progreso narrativo hacia el santuario.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino con la forma editorial estable del proyecto: «Yahvé». «Casa» traduce בית de manera más literal que «templo», que sería demasiado específico para este contexto temprano.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de no ocultar el Tetragrama tras un título. «Yahvé» es la forma española estable del nombre divino en esta serie.
- source_word: שִׁלֹה
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Shiloh
  - a Silo
  lexicon: HALOT
  rationale: El topónimo se adapta a la forma castellana usual «Silo», ampliamente reconocible y natural en español bíblico.
- source_word: וְהַנַּעַר נָעַר
  english_pob_choice: Now the boy was young
  chosen_spanish: Ahora bien, el muchacho era aún pequeño
  alternatives_spanish:
  - Y el muchacho era joven
  - Ahora el muchacho era joven
  lexicon: HALOT
  rationale: La repetición hebrea de נער intensifica la idea de juventud. «Aún pequeño» comunica mejor la edad temprana de Samuel que un simple «joven», y evita el eco artificial «el muchacho era un muchacho».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama. Se conserva el nombre propio divino en español como «Yahvé», coherente con la política del proyecto y con la distinción entre nombre personal y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura de בְּפָרִים שְׁלֹשָׁה
  english_pob_reading: three bulls
  chosen_spanish_reading: tres toros
  alternative_spanish_readings:
  - un toro de tres años
  - tres becerros
  rationale: Se mantiene la lectura del texto masorético, que habla de tres animales. La nota permite registrar la armonización antigua o interpretativa sin borrarla.
  doctrine_reference: Textual note on MT priority with preserved variant in footnote
- issue: Edad del muchacho al final del versículo
  english_pob_reading: Now the boy was young
  chosen_spanish_reading: el muchacho era aún pequeño
  alternative_spanish_readings:
  - el muchacho era joven
  - el niño era pequeño
  rationale: La repetición de נער sugiere énfasis en la corta edad. «Aún pequeño» expresa mejor el matiz narrativo que «joven», que en español puede sonar más amplio o menos infantil.
  doctrine_reference: Narrative sense and lexical emphasis in the Hebrew repetition
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «along with» por «with» para alinearse mejor con el hebreo; la redacción española ya usa una preposición simple («con») y, por tanto, refleja esa decisión revisada sin necesidad de ajuste adicional. También se conservó la prioridad del texto masorético en «tres toros», dejando la lectura alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - «Casa» se conserva para בֵּית, no «templo», por fidelidad al estadio narrativo del relato.
  - «Efa» mantiene la medida antigua; no se moderniza a equivalentes aproximados.
  - La nota textual marca la variante de los «tres toros» sin alterar el texto principal.
  - «Ahora bien» funciona como transición narrativa y conserva el tono bíblico sin arcaísmo excesivo.
