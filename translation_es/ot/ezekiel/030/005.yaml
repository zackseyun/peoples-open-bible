translation:
  language: es
  text: Cus y Put y Lud y todos los pueblos mezclados[a] y Cub[b] y los hijos de la tierra del pacto[c], con ellos caerán a espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda Arabia», «todos los mercenarios» o «toda la multitud mezclada» para «todos los pueblos mezclados» (heb. עֶרֶב).
    reason: lexical_alternative
  - marker: b
    text: «Cub» es un topónimo raro; su identificación es incierta. También puede traducirse «Kub».
    reason: lexical_alternative
  - marker: c
    text: O «la gente de la tierra del pacto». La expresión puede referirse a personas aliadas por tratado, y algunos la entienden como una referencia a judíos que vivían en Egipto.
    reason: alternative_reading
lexical_decisions:
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración; «Cus» refleja mejor el hebreo que la forma tradicional interpretativa «Etiopía», que es menos precisa etnogeográficamente.
- source_word: פּוּט
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Phut
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa y reconocible en español bíblico.
- source_word: לוּד
  english_pob_choice: Lud
  chosen_spanish: Lud
  alternatives_spanish:
  - Lidia
  - Lidios
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no importar una identificación geográfica posterior que el hebreo no explicita.
- source_word: כָל הָעֶרֶב
  english_pob_choice: all the mixed people
  chosen_spanish: todos los pueblos mezclados
  alternatives_spanish:
  - toda Arabia
  - todos los mercenarios
  - toda la multitud mezclada
  lexicon: HALOT
  rationale: «עֶרֶב» aquí se entiende mejor como población heterogénea o mezcla de pueblos. «Pueblos mezclados» preserva la idea sin obligar a una sola identificación histórica.
- source_word: כּוּב
  english_pob_choice: Cub
  chosen_spanish: Cub
  alternatives_spanish:
  - Kub
  lexicon: HALOT
  rationale: Nombre propio raro; se conserva la forma tradicional en inglés de la POB, ya que en español «Cub» funciona como transliteración mínima y deja abierta la identificación incierta.
- source_word: בְנֵי אֶרֶץ הַבְּרִית
  english_pob_choice: the sons of the land of the covenant
  chosen_spanish: los hijos de la tierra del pacto
  alternatives_spanish:
  - la gente de la tierra del pacto
  - los hijos de la tierra aliada por pacto
  lexicon: HALOT
  rationale: 'Se mantiene la cercanía formal al hebreo: בְנֵי como «los hijos» y אֶרֶץ הַבְּרִית como «la tierra del pacto». «Pacto» conserva el sentido contractual/covenantal sin interpretar el referente.'
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  lexicon: HALOT
  rationale: La preposición indica asociación directa con los pueblos enumerados; «con ellos» es la equivalencia más natural en español.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - por guerra
  - por violencia
  lexicon: HALOT
  rationale: Se conserva la imagen bélica idiomática hebrea, pero en español profético «caer a espada» es una expresión natural y fiel al registro.
- source_word: יִפֹּלוּ
  english_pob_choice: they will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - caerán muertos
  - serán derribados
  lexicon: HALOT
  rationale: El verbo literal es «caer»; aquí implica muerte en juicio/batalla. El español mantiene el valor figurado sin explicitar más de lo que el hebreo dice.
theological_decisions:
- issue: Identificación de עֶרֶב
  english_pob_reading: mixed people, with alternative possibilities noted
  chosen_spanish_reading: pueblos mezclados, con alternativas preservadas en nota
  alternative_spanish_readings:
  - Arabia
  - mercenarios
  - multitud mezclada
  rationale: La frase es lexicográficamente debatida; no se debe fijar una sola identidad. La nota preserva las alternativas del audit trail y evita borrar la tensión documental.
  doctrine_reference: Lexical ambiguity / historical geography
- issue: Sentido de בְנֵי אֶרֶץ הַבְּרִית
  english_pob_reading: the sons of the land of the covenant; possible reference to treaty-aligned people, perhaps Judeans in Egypt
  chosen_spanish_reading: los hijos de la tierra del pacto, con nota explicativa
  alternative_spanish_readings:
  - la gente de la tierra del pacto
  - los habitantes de la tierra del pacto
  rationale: La frase admite referencia a pueblos aliados por tratado y, según la nota inglesa, quizá a judíos en Egipto. La traducción principal conserva la ambigüedad sin resolverla prematuramente.
  doctrine_reference: Historical referent uncertainty
- issue: Imagen judicial de morir en guerra
  english_pob_reading: they will fall by the sword
  chosen_spanish_reading: caerán a espada
  alternative_spanish_readings:
  - serán muertos a espada
  - caerán por la espada
  rationale: La fórmula profética conserva la imagen de derrumbe bajo juicio bélico. «Caer a espada» reproduce el hebreo con naturalidad en español.
  doctrine_reference: Prophetic judgment formula
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y se indicó que no había cambios necesarios; se mantiene esa lectura estable, con atención a la ambigüedad léxica señalada por el auditorio inglés.
  spanish_consistency_notes:
  - 'Se mantuvo una transliteración uniforme para nombres propios: Cus, Put, Lud, Cub.'
  - Se preservó el paralelismo enumerativo del hebreo con repetición de «y».
  - Se evitó introducir explicaciones interpretativas en el texto base; estas quedan en notas.
  - La expresión final se tradujo con el giro bíblico natural «caer a espada» para conservar el registro profético.
