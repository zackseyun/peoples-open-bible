  text: וְ/הַ/כְּלָבִ֣ים עַזֵּי נֶ֗פֶשׁ לֹ֤א יָֽדְעוּ֙ שָׂבְעָ֔ה וְ/הֵ֣מָּה רֹעִ֔ים לֹ֥א יָדְע֖וּ הָבִ֑ין כֻּלָּ/ם֙ לְ/דַרְכָּ֣/ם פָּנ֔וּ אִ֥ישׁ לְ/בִצְע֖/וֹ מִ/קָּצֵֽ/הוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/056/011.yaml
  text: And the dogs are greedy in appetite[a]; they do not know satisfaction. And they are shepherds who do not know understanding; all of them have turned to their own way, each one to his own gain[c][b], every one without exception.
  footnotes:
  - marker: a
    text: Or 'insatiable'; literally 'strong/fierce of appetite.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not understand' / 'know nothing of discernment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from every quarter' for 'every one without exception'; the Hebrew phrase is difficult and may emphasize the total extent of their corruption.
    reason: alternative_reading
