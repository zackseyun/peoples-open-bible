translation:
  language: es
  text: Y ya no había quien aterrara a los hijos de Israel en los días de Judit y durante muchos días después de su muerte. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἦν ἔτι
  english_pob_choice: there was no longer
  chosen_spanish: ya no había
  alternatives_spanish:
  - no había ya
  - no había más
  lexicon: BDAG
  rationale: La locución expresa la cesación de una situación previa. En español, 'ya no había' comunica con naturalidad la desaparición de esa condición y conserva la fuerza temporal de ἔτι.
- source_word: ὁ ἐκφοβῶν
  english_pob_choice: anyone to terrify
  chosen_spanish: quien aterrara
  alternatives_spanish:
  - el que aterraba
  - nadie que aterrara
  - alguien que aterrara
  lexicon: BDAG
  rationale: 'El participio con artículo funciona de manera sustantiva: ''el que aterroriza/amedrenta''. En este contexto, ''quien aterrara'' transmite bien la idea de un agente hostil indefinido sin sonar rígido en español.'
- source_word: τοὺς υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israelita(s)
  - a los israelitas
  - a los hijos de Jacob
  lexicon: BDAG
  rationale: Se conserva la expresión familiar y genealógica del griego. 'Hijos de Israel' refleja con transparencia υἱούς y mantiene el registro bíblico sin aplanarlo a un etnónimo más general.
- source_word: ἐν ταῖς ἡμέραις Ἰουδεὶθ
  english_pob_choice: in the days of Judith
  chosen_spanish: en los días de Judit
  alternatives_spanish:
  - durante la vida de Judit
  - a lo largo de los días de Judit
  lexicon: BDAG
  rationale: Es una fórmula temporal bíblica estándar. 'En los días de Judit' preserva la estructura y el tono del original con naturalidad en español.
- source_word: μετὰ τὸ ἀποθανεῖν αὐτήν
  english_pob_choice: after her death
  chosen_spanish: después de su muerte
  alternatives_spanish:
  - después de que murió
  - tras morir ella
  lexicon: BDAG
  rationale: El infinitivo articular con μετά indica posterioridad respecto de su muerte. 'Después de su muerte' es idiomático en español y mantiene la referencia temporal de forma directa.
- source_word: ἡμέρας πολλάς
  english_pob_choice: for many days
  chosen_spanish: durante muchos días
  alternatives_spanish:
  - por muchos días
  - muchos días
  lexicon: BDAG
  rationale: El acusativo expresa duración. 'Durante muchos días' hace explícita esa extensión temporal en un español claro y fiel al valor aspectual del griego.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén así sea
  - Así sea
  lexicon: BDAG
  rationale: Como fórmula litúrgica conclusiva, se translitera en español como 'Amén' y no se parafrasea.
theological_decisions:
- issue: Designación corporativa masculina en τοὺς υἱοὺς Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - a los israelitas
  - a los hijos de Israel
  rationale: Se conserva la expresión masculina/familiar del texto fuente, que es transparente al griego y evita neutralizar un rasgo léxico real del original. En este contexto étnico-corporativo, 'hijos de Israel' es claro y bíblicamente reconocible.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Inclusión del Amen final en el texto principal
  english_pob_reading: Amen
  chosen_spanish_reading: Amén
  alternative_spanish_readings:
  - omitirlo como cierre secundario
  rationale: El testimonio griego incluye ἀμήν y no hay advertencia textual que justifique omitirlo. Por fidelidad al testimonio base, se mantiene en el cuerpo del texto.
  doctrine_reference: PHILOSOPHY.md § What we are translating; transparency from source witness
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última forma auditada del inglés POB, que ajustó el final a 'after her death' y unió la cláusula final sin coma. Se mantuvo esa secuencia temporal en español con una formulación igualmente natural.
  spanish_consistency_notes:
  - Se emplea 'Judit' como forma española del nombre propio, coherente con el uso bíblico en español.
  - Se mantiene 'Amén' en mayúscula inicial como fórmula conclusiva litúrgica.
  - La estructura 'ya no había...' preserva la cesación de un estado previo sin introducir matices interpretativos adicionales.
