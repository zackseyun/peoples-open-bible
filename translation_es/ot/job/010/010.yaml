translation:
  language: es
  text: ¿No me derramaste como leche y me cuajaste como queso[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hiciste cuajar como cuajada». El hebreo puede entenderse más específicamente como un producto lácteo cuajado, no solo como «queso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Did you not
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es verdad que…?
  lexicon: HALOT
  rationale: La partícula abre una pregunta retórica que espera respuesta afirmativa; en español, «¿No…?» conserva la fuerza interrogativa sin añadir énfasis innecesario.
- source_word: כֶּחָלָב
  english_pob_choice: like milk
  chosen_spanish: como leche
  alternatives_spanish:
  - como leche fresca
  - como la leche
  lexicon: HALOT
  rationale: El כ comparativo pide una similitud directa. «Leche» es la equivalencia natural y transparente en español para conservar la imagen láctea.
- source_word: תַּתִּיכֵנִי
  english_pob_choice: pour me out
  chosen_spanish: me derramaste
  alternatives_spanish:
  - me vertiste
  - me vaciaste
  lexicon: HALOT
  rationale: El verbo en hifil comunica la idea de hacer salir un líquido; «derramar» reproduce mejor esa imagen que opciones más abstractas y mantiene el paralelismo con «leche».
- source_word: וְכַגְּבִנָּה
  english_pob_choice: like cheese
  chosen_spanish: como queso
  alternatives_spanish:
  - como cuajada
  - como requesón
  lexicon: HALOT
  rationale: גְּבִנָּה denota un producto lácteo cuajado; «queso» es la equivalencia más clara y general en español, aunque «cuajada» o «requesón» pueden captar con más precisión la formación del producto.
- source_word: תַּקְפִּיאַנִי
  english_pob_choice: curdle me
  chosen_spanish: me cuajaste
  alternatives_spanish:
  - me coagulaste
  - me hiciste cuajar
  lexicon: HALOT
  rationale: El hifil de קפא expresa causar cuajamiento o solidificación. «Cuajar» preserva la metáfora de la leche transformándose en un producto sólido y suena natural en español.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones y mantiene alta concordancia con el hebreo; la versión española sigue de cerca esa lectura, preservando la metáfora física de derramar y cuajar sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene el tratamiento retórico en segunda persona singular, acorde con el hebreo y el inglés auditado.
  - Se conserva la secuencia de dos símiles lácteos para no borrar la imagen paralela del original.
  - «Leche» y «queso» funcionan como equivalentes amplios; la nota recoge la alternativa más específica «cuajada» para transparentar la tensión léxica del hebreo.
