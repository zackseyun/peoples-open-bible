translation:
  language: es
  text: Yahvé empobrece[a] y enriquece; rebaja y también levanta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despoja»; el verbo hebreo puede abarcar la idea más amplia de causar pérdida o desposesión.
    reason: lexical_alternative
  - marker: b
    text: O «enaltece» o «exalta».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en transliteración española, conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma tradicional en español académico y bíblico para el nombre propio de Dios.
- source_word: מוֹרִישׁ
  english_pob_choice: makes poor
  chosen_spanish: empobrece
  alternatives_spanish:
  - hace pobre
  - reduce a la pobreza
  - despoja
  lexicon: HALOT
  rationale: El Hifil de ירשׁ puede implicar causar pérdida o desposesión, pero en el paralelismo con «enriquece» la idea central es el contraste económico. «Empobrece» conserva esa fuerza causativa en español y suena natural en un registro bíblico digno.
- source_word: וּמַעֲשִׁיר
  english_pob_choice: and makes rich
  chosen_spanish: y enriquece
  alternatives_spanish:
  - y hace rico
  - y hace próspero
  lexicon: HALOT
  rationale: Se mantiene la acción causativa del verbo y el paralelismo con «empobrece». «Enriquece» es la opción más directa y idiomática para el balance poético del verso.
- source_word: מַשְׁפִּיל
  english_pob_choice: he brings low
  chosen_spanish: humilla
  alternatives_spanish:
  - rebaja
  - lo abate
  - lo abaja
  lexicon: HALOT
  rationale: El verbo expresa hacer que alguien quede bajo o abatido. En español, «humilla» comunica bien la idea de rebajamiento, aunque el matiz físico-vertical de la imagen se desarrolla de inmediato con «enaltece» en el hemistiquio opuesto.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: אַף añade extensión o énfasis al segundo miembro. «También» reproduce de forma natural la fuerza aditiva del hebreo sin sobrecargar el verso.
- source_word: מְרוֹמֵם
  english_pob_choice: lifts up
  chosen_spanish: enaltece
  alternatives_spanish:
  - levanta
  - exalta
  - alza
  lexicon: HALOT
  rationale: Aunque el inglés opta por una imagen vertical concreta, en español «enaltece» transmite con precisión el sentido de elevar o exaltar a alguien y mantiene el paralelismo con «humilla». Se evita «levanta» por sonar más físico y menos idiomático en este contexto poético.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre del pacto directamente. La forma española «Yahvé» preserva ese nombre propio sin reemplazarlo por un título, siguiendo la decisión doctrinal del proyecto de transparentar יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: The line's economic and vertical parallelism
  english_pob_reading: makes poor and makes rich; he brings low and also lifts up
  chosen_spanish_reading: empobrece y enriquece; humilla y también enaltece
  alternative_spanish_readings:
  - despoja y enriquece; abate y levanta
  - hace pobre y hace rico; rebaja y exalta
  rationale: 'La lectura inglesa mantiene dos pares antitéticos: pobreza/riqueza y abatimiento/elevación. En español se conserva el mismo contraste conceptual con verbos naturales y poéticos, sin diluir la relación paralela ni convertirla en una paráfrasis doctrinal.'
  doctrine_reference: Poetics and antithetical parallelism in wisdom/poetic Hebrew
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo alto del audit trail y no requiere cambios respecto del sentido base: conserva el nombre divino, el paralelismo antitético y las alternativas léxicas documentadas para los dos hemistiquios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - 'Se preserva el paralelismo verbal con pares concisos: «empobrece/enriquece» y «humilla/enaltece».'
  - 'Las notas a pie de página se anclan en las palabras con mayor carga lexical: «empobrece» y «enaltece».'
  - El registro es bíblico y sobrio, evitando tanto el calco rígido como la paráfrasis expansiva.
