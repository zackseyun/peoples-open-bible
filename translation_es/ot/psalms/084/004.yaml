translation:
  language: es
  text: Hasta el gorrión ha encontrado un hogar, y la golondrina un nido para sí, donde ponga[a] sus polluelos—junto a tus altares[b], Yahvé de los ejércitos, mi Rey y mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde ha puesto sus polluelos». El verbo hebreo puede entenderse como una acción ya realizada, no solo como una descripción general del propósito del nido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cerca de tus altares» o «al lado de tus altares». La construcción hebrea es compacta y puede expresar proximidad más que colocación literal sobre los altares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Hasta
  alternatives_spanish:
  - Incluso
  - También
  lexicon: HALOT
  rationale: 'Introduce el matiz enfático de sorpresa o intensificación: no solo el salmista, sino aun un ave pequeña encuentra lugar. «Hasta» comunica bien esa fuerza en español natural.'
- source_word: צִפּוֹר
  english_pob_choice: sparrow
  chosen_spanish: gorrión
  alternatives_spanish:
  - ave pequeña
  - pájaro
  lexicon: HALOT
  rationale: La POB inglesa opta por una especie concreta y plausible. «Gorrión» conserva esa especificidad y resulta natural en español bíblico moderno.
- source_word: מָצְאָה בַיִת
  english_pob_choice: has found a home
  chosen_spanish: ha hallado una casa
  alternatives_spanish:
  - ha encontrado un hogar
  - ha hallado un hogar
  lexicon: HALOT
  rationale: «Casa» refleja el sustantivo hebreo más de cerca que «hogar», sin perder inteligibilidad. «Ha hallado» conserva el resultado completado del perfecto poético.
- source_word: דְּרוֹר
  english_pob_choice: swallow
  chosen_spanish: golondrina
  alternatives_spanish:
  - vencejo
  lexicon: HALOT
  rationale: «Golondrina» es la equivalencia más extendida y clara en español para el ave mencionada aquí.
- source_word: קֵן לָהּ
  english_pob_choice: a nest for herself
  chosen_spanish: un nido para sí
  alternatives_spanish:
  - un nido propio
  - un nido para ella
  lexicon: HALOT
  rationale: «Para sí» conserva la función beneficiaria/posesiva de la forma pronominal y suena natural en español elevado.
- source_word: אֲשֶׁר שָׁתָה
  english_pob_choice: where she may lay her young
  chosen_spanish: donde ponga sus polluelos
  alternatives_spanish:
  - donde ha puesto sus polluelos
  - donde puede poner sus polluelos
  lexicon: HALOT
  rationale: El verbo hebreo puede entenderse como acción situada o ya cumplida; aquí se mantiene la idea funcional del nido. «Ponga» reproduce bien la relación de finalidad/sitio sin fijar indebidamente el tiempo.
- source_word: אֶפְרֹחֶיהָ
  english_pob_choice: her young
  chosen_spanish: sus polluelos
  alternatives_spanish:
  - sus crías
  - sus hijos
  lexicon: HALOT
  rationale: «Polluelos» preserva el campo semántico de crías de ave y mantiene la imagen poética.
- source_word: אֶת מִזְבְּחוֹתֶיךָ
  english_pob_choice: at your altars
  chosen_spanish: junto a tus altares
  alternatives_spanish:
  - cerca de tus altares
  - al lado de tus altares
  lexicon: HALOT
  rationale: La construcción hebrea puede expresar proximidad más que ubicación literal sobre el altar. «Junto a» expresa con claridad esa cercanía en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración establecida por el proyecto en español, en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: «Ejércitos» comunica de manera transparente el título hebreo y conserva su fuerza soberana y militar.
- source_word: מַלְכִּי וֵאלֹהָי
  english_pob_choice: my King and my God
  chosen_spanish: mi Rey y mi Dios
  alternatives_spanish:
  - mi rey y mi Dios
  lexicon: HALOT
  rationale: Se mantienen los dos títulos personales dirigidos a Dios, con capitalización titular en «Rey» y «Dios» para reflejar el carácter confesional del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El proyecto en español emplea «Yahvé» como equivalente principal para conservar el nombre personal de Dios sin la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of צְבָאוֹת in the divine title
  english_pob_reading: of Armies
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos
  rationale: «De los ejércitos» mantiene la transparencia semántica para lectores modernos y preserva la imagen de poder soberano asociada al título.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Locative sense of אֶת מִזְבְּחוֹתֶיךָ
  english_pob_reading: at your altars
  chosen_spanish_reading: junto a tus altares
  alternative_spanish_readings:
  - cerca de tus altares
  - al lado de tus altares
  rationale: Como en la POB inglesa, la construcción compacta se entiende mejor como proximidad al santuario, no como ubicación literal sobre los altares. La frase española evita la literalidad engañosa.
  doctrine_reference: POB lexical note on compact locative construction
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el verbo sobre los polluelos de «place» a «lay» para mayor correspondencia léxica y naturalidad. En español se conservó la imagen de finalidad del nido con «donde ponga sus polluelos», evitando fijar indebidamente un tiempo verbal y manteniendo la ambigüedad poética presente en el hebreo y en la nota inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto en español para יְהוָה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «de los ejércitos» traduce צְבָאוֹת con transparencia y sin arcaísmo.
  - Los dos marcadores de nota [a] y [b] aparecen exactamente en el texto y corresponden a las alternativas léxicas relevantes.
  - «Rey» y «Dios» se mantienen como títulos personales en la confesión final.
