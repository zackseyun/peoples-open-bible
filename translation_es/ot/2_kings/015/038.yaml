translation:
  language: es
  text: Yotam se acostó con sus padres[a], y fue sepultado con sus padres en la ciudad de David, su padre[b], y Ahaz, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «con sus antepasados»; el hebreo conserva la fórmula real literal «con sus padres».
    reason: lexical_alternative
  - marker: b
    text: Aquí «padre» se entiende en sentido de antepasado o ascendiente dinástico, no de padre biológico inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se durmió
  - descansó
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de muerte en una fórmula real. En español, «se acostó» conserva la imagen corporal sin sonar tan ambiguo o eufemístico como «se durmió»; además armoniza con la cláusula siguiente de sepultura.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: La POB inglesa retiene «fathers» por su correspondencia formal y su sentido dinástico/ancestral. En español, «padres» reproduce esa forma tradicional y el valor genealógico del hebreo, aunque en el contexto signifique antecesores.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: «Fue sepultado» es una equivalencia natural y digna para la pasiva hebrea. Mantiene el registro funerario sin introducir matices coloquiales de «enterrado».
- source_word: בְּעִיר דָּוִד אָבִיו
  english_pob_choice: in the city of David his father
  chosen_spanish: en la ciudad de David, su padre
  alternatives_spanish:
  - en la ciudad de David, su antepasado
  - en la ciudad de David, su padre dinástico
  lexicon: HALOT
  rationale: Se conserva la estructura apposicional del hebreo. El sintagma «su padre» se mantiene porque el texto fuente usa «padre» en sentido dinástico/ancestral; la referencia no puede ser el padre inmediato de Jotam, sino David como antepasado de la línea real.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a ser rey
  lexicon: HALOT
  rationale: «Reinó» es la correspondencia directa y estándar en noticias de sucesión real.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: «En su lugar» expresa de forma idiomática la idea de reemplazo sucesorio que presenta el hebreo.
theological_decisions:
- issue: «David, su padre» como referencia genealógica, no biológica inmediata
  english_pob_reading: dynastic ancestor rather than immediate biological father
  chosen_spanish_reading: David es padre en sentido dinástico/ancestral
  alternative_spanish_readings:
  - David como padre inmediato
  - David como mero homónimo o referencia honorífica
  rationale: El contexto histórico impide entender a David como padre biológico de Jotam. La traducción mantiene «su padre» porque el hebreo lo dice así, pero el sentido queda explicado como ancestral/dinástico, en continuidad con la nota auditada de la POB inglesa.
  doctrine_reference: 2 Reyes 15:38; uso genealógico de אָב (padre) en fórmulas dinásticas
translation_notes:
  revision_awareness: La revisión auditada más reciente no introdujo cambios; el texto inglés fue confirmado como correcto. Esta versión española sigue la misma lectura, preservando la fórmula real de muerte/sepultura y la nota genealógica de «David, su padre».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «padres» en la fórmula funeraria para reflejar el hebreo y la tradición de noticias reales.
  - Se evita introducir puntuación o glosas que alteren el paralelismo de las dos cláusulas de muerte y sepultura.
  - «Ahaz» se conserva como «Ahaz» siguiendo la transliteración habitual del nombre propio en este proyecto.
