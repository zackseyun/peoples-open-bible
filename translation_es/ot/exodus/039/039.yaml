translation:
  language: es
  text: el altar de bronce[a], y el enrejado de bronce que le correspondía, sus varas y todos sus utensilios; la fuente y su base[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bronce» traduce el metal del mobiliario del tabernáculo; en este contexto también podría entenderse «cobre», pero «bronce» es la opción más estable en español bíblico y coincide con la POB inglesa.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «la fuente y su base».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar del holocausto
  - altar de los holocaustos
  lexicon: HALOT
  rationale: El sustantivo básico es «altar». Aunque por contexto tabernacular se trata del altar específico del holocausto, aquí el hebreo no repite la designación más extensa, así que «altar» preserva la concisión del texto fuente y coincide con la decisión inglesa.
- source_word: הַנְּחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede referirse a cobre o bronce según el contexto. En este pasaje de mobiliario del tabernáculo, «bronce» es la equivalencia más natural y la misma opción adoptada en la POB inglesa.
- source_word: מִכְבַּר
  english_pob_choice: grating
  chosen_spanish: enrejado
  alternatives_spanish:
  - rejilla
  - reja
  - trama
  lexicon: HALOT
  rationale: El término designa una pieza de celosía o parrilla vinculada al altar. «Enrejado» comunica bien la estructura física en español y evita un tecnicismo que sonaría menos natural.
- source_word: אֲשֶׁר ל֔וֹ
  english_pob_choice: that was for it
  chosen_spanish: que era para él
  alternatives_spanish:
  - que pertenecía a él
  - que estaba para él
  lexicon: HALOT
  rationale: La frase relativa vincula el enrejado con el altar. «Era para él» conserva esa relación funcional sin añadir una precisión de ubicación que el hebreo no exige.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus postes
  - sus barras de transporte
  lexicon: HALOT
  rationale: בַּדִּים son las piezas para cargar el mobiliario sagrado. «Varas» es una forma bíblica y clara en español, y refleja mejor la función portátil que «postes».
- source_word: כָּל־כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus enseres
  - todos sus implementos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos/equipos. «Utensilios» mantiene la amplitud concreta del término y sigue de cerca la elección inglesa.
- source_word: הַכִּיֹּר
  english_pob_choice: basin
  chosen_spanish: la fuente
  alternatives_spanish:
  - el lavabo
  - la vasija para lavar
  - el lavatorio
  lexicon: HALOT
  rationale: Aunque «basin» en inglés es más general, en español bíblico «fuente» comunica con naturalidad el recipiente para lavarse. Evita el arcaísmo de «laver» y conserva la referencia funcional.
- source_word: כַנּוֹ
  english_pob_choice: its stand
  chosen_spanish: su soporte
  alternatives_spanish:
  - su base
  - su pedestal
  lexicon: HALOT
  rationale: El sustantivo nombra el apoyo de la fuente. «Soporte» es fiel y claro en español, y mantiene la relación funcional que la POB inglesa expresa con «stand».
translation_notes:
  revision_awareness: La versión revisada en inglés no introdujo cambios sustanciales; el punto más sensible para el español fue mantener la terminología del mobiliario del tabernáculo con un registro bíblico claro, especialmente en מִכְבַּר, כִּיֹּר y כַּנּוֹ. Se conservó la estructura enumerativa del hebreo.
  spanish_consistency_notes:
  - Se mantiene «bronce» para נְחֹשֶׁת, conforme al criterio del proyecto y a la POB inglesa.
  - Se evita «SEÑOR» porque el versículo no contiene el Nombre divino.
  - «Fuente» y «soporte» se eligen para una lectura natural en español, aunque «laver/base» sea la tradición inglesa.
  - 'La enumeración respeta la secuencia del hebreo: altar, enrejado, varas, utensilios, fuente, soporte.'
