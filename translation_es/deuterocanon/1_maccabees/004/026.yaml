translation:
  language: es
  text: Pero los extranjeros que escaparon, cuando llegaron, informaron a Lisias de todo lo que había sucedido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὅσοι
  english_pob_choice: those of the foreigners who
  chosen_spanish: los de entre los extranjeros que
  alternatives_spanish:
  - cuantos de los extranjeros que
  - aquellos de los extranjeros que
  - los extranjeros que
  lexicon: LSJ
  rationale: El griego marca un subconjunto cuantificado, no solo un grupo nuevo. «Los de entre los extranjeros que» conserva esa selección dentro de un conjunto mayor sin sonar artificial en español.
- source_word: ἀλλοφύλων
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - gentiles
  - gentes de otra nación
  - forasteros
  lexicon: LSJ
  rationale: En este contexto militar y narrativo, el término indica gente de otro pueblo o nación. «Extranjeros» preserva el sentido étnico/político sin introducir un matiz teológico ajeno.
- source_word: διεσώθησαν
  english_pob_choice: escaped
  chosen_spanish: escaparon
  alternatives_spanish:
  - se salvaron
  - sobrevivieron
  - lograron huir
  lexicon: LSJ
  rationale: El verbo describe a los que sobrevivieron y huyeron del combate. «Escaparon» refleja bien ese resultado narrativo sin cargarlo de un sentido soteriológico.
- source_word: παραγενηθέντες
  english_pob_choice: when they arrived
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - después de llegar
  - habiendo llegado
  - al llegar
  lexicon: LSJ
  rationale: El participio indica llegada/presencia previa a la acción principal de informar. «Cuando llegaron» expresa con naturalidad esa secuencia temporal en español.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - reportaron
  - dieron cuenta
  - avisaron
  lexicon: LSJ
  rationale: El verbo presenta un informe dado a una autoridad en un contexto militar. «Informaron» conserva la idea de comunicación formal sin sonar demasiado técnico.
- source_word: πάντα τὰ συμβεβηκότα
  english_pob_choice: all that had happened
  chosen_spanish: de todo lo que había sucedido
  alternatives_spanish:
  - de todo lo que había acontecido
  - de todos los hechos ocurridos
  - de todo lo que había pasado
  lexicon: LSJ
  rationale: La construcción sustantivada en perfecto se refiere a los acontecimientos ya ocurridos. «De todo lo que había sucedido» es idiomático y mantiene el valor perfecto del griego.
theological_decisions:
- issue: ¿Debe traducirse ἀλλόφυλοι con un término étnico neutral o con «gentiles»?
  english_pob_reading: foreigners
  chosen_spanish_reading: extranjeros
  alternative_spanish_readings:
  - gentiles
  - forasteros
  rationale: La escena habla de combatientes de otro pueblo, no de una categoría religiosa. «Extranjeros» reproduce el sentido de alteridad nacional que la POB inglesa quiso mantener con 'foreigners'.
  doctrine_reference: Criterio lexicográfico y narrativo; evita importar el uso neotestamentario de 'gentiles'.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés POB, que prefirió 'those of the foreigners who escaped' y 'when they arrived' por naturalidad. La versión española conserva ese mismo valor de subconjunto y secuencia temporal.
  spanish_consistency_notes:
  - Se mantiene «Lisias» como forma propia del nombre.
  - Se evita «SEÑOR» o equivalentes, porque no hay aquí nombre divino ni cita indirecta del tetragrama.
  - «Informaron a Lisias de todo lo que había sucedido» conserva el complemento de reporte con preposición natural en español.
  - El registro es sobrio y narrativo, acorde con una crónica militar deuterocanónica.
