id: JER.33.5
reference: Jeremiah 33:5
source:
  edition: WLC
  text: בָּאִ֗ים לְ/הִלָּחֵם֙ אֶת הַ/כַּשְׂדִּ֔ים וּ/לְ/מַלְאָ/ם֙ אֶת פִּגְרֵ֣י הָ/אָדָ֔ם אֲשֶׁר הִכֵּ֥יתִי בְ/אַפִּ֖/י וּ/בַ/חֲמָתִ֑/י וַ/אֲשֶׁ֨ר הִסְתַּ֤רְתִּי פָנַ/י֙ מֵ/הָ/עִ֣יר הַ/זֹּ֔את עַ֖ל כָּל רָעָתָֽ/ם־־־־׃
translation:
  text: They are coming to fight against the Chaldeans but only to fill them with the corpses of the men whom I struck down in my anger and in my wrath[c][b][a], and from this city I have hidden my face because of all their evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to fill them,' likely referring to the houses or fortifications mentioned in the previous verse.
    reason: cross_reference
  - marker: c
    text: Or 'the corpses of humankind' / 'human corpses.' Hebrew 'adam' can denote man or humankind depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאִים
  chosen: They are coming
  alternatives:
  - They come
  - Men are coming
  lexicon: HALOT
  rationale: Qal participle masculine plural of בוא functions verbally here, describing an ongoing or imminent action. English progressive best captures the participial sense in context.
- source_word: לְהִלָּחֵם אֶת הַכַּשְׂדִּים
  chosen: to fight against the Chaldeans
  alternatives:
  - to fight the Chaldeans
  - to wage war with the Chaldeans
  lexicon: HALOT
  rationale: The infinitive construct of לחם with אֶת here indicates hostile engagement directed toward the Chaldeans. 'Fight against' makes the adversative sense explicit in natural English.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although historically associated with Babylon, the source text uses the ethnic term, so it is preserved in the main text.
- source_word: וּלְמַלְאָם
  chosen: but only to fill them
  alternatives:
  - and to fill them
  - and to fill these places
  - and to fill it
  lexicon: HALOT
  rationale: 'The form is an infinitive construct of מלא with 3mp suffix, literally ''and to fill them.'' In context the referent is the houses/palisades mentioned in the preceding verse, but the suffix itself is plural and should be represented. ''But only'' brings out the grim resultative force in context: their coming to fight results instead in the filling of the structures with corpses.'
- source_word: פִּגְרֵי הָאָדָם
  chosen: the corpses of the men
  alternatives:
  - human corpses
  - the dead bodies of the people
  - the corpses of humankind
  lexicon: HALOT
  rationale: פגר denotes carcass/corpse, especially a dead body after violent death. אָדָם here is collective but refers concretely to human beings slain in the city; 'men' is a natural gender-accurate rendering in this war context, while 'corpses' preserves the starkness of the Hebrew.
- source_word: אֲשֶׁר הִכֵּיתִי
  chosen: whom I struck down
  alternatives:
  - whom I killed
  - whom I struck
  lexicon: HALOT
  rationale: נכה often means 'strike' but in judgment contexts commonly implies lethal striking. 'Struck down' preserves both the verbal imagery and the fatal outcome indicated by 'corpses.'
- source_word: בְאַפִּי וּבַחֲמָתִי
  chosen: in my anger and in my wrath
  alternatives:
  - in my nose/anger and in my fury
  - in my anger and in my fury
  lexicon: HALOT
  rationale: אַף and חֵמָה are overlapping judgment terms. Rendering both distinctly as 'anger' and 'wrath' preserves the Hebrew intensification without collapsing the pair.
- source_word: וַאֲשֶׁר הִסְתַּרְתִּי פָנַי מֵהָעִיר הַזֹּאת
  chosen: and because of all their evil I have hidden my face from this city
  alternatives:
  - and from whom I hid my face in this city
  - and I hid my face from this city
  lexicon: HALOT
  rationale: The relative clause is syntactically compressed. The sense is that because of the people's evil, God has hidden his face from the city. 'Hidden my face' preserves the covenantal idiom of withdrawal/favor removed; 'from this city' follows the preposition מִן with the city as object.
- source_word: עַל כָּל רָעָתָם
  chosen: because of all their evil
  alternatives:
  - on account of all their wickedness
  - for all their evil deeds
  lexicon: HALOT
  rationale: עַל here is causal, and רָעָה denotes evil/wickedness. 'Because of all their evil' is concise and preserves the moral force of the Hebrew.
