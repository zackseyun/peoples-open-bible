translation:
  language: es
  text: Matan a la viuda y al extranjero[a]; asesinan al huérfano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el residente extranjero'. El hebreo גֵר se refiere a una persona no israelita que vive entre el pueblo, no solo a un extraño de paso.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, 'los que no tienen padre' o 'los sin padre'. El hebreo es más específico que 'huérfano'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֭לְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - viudas
  lexicon: HALOT
  rationale: El singular hebreo funciona de manera representativa para una clase vulnerable; el singular con artículo en español conserva ese valor genérico y suena natural.
- source_word: גֵר
  english_pob_choice: the sojourner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el residente extranjero
  - el sojourner
  lexicon: HALOT
  rationale: גֵר designa al no nativo que vive entre el pueblo, no simplemente a un visitante de paso. 'Extranjero' comunica bien la condición de persona ajena en español actual, aunque 'forastero' también sería posible; 'sojourner' no es idiomático en español.
- source_word: יַהֲרֹגוּ
  english_pob_choice: kill
  chosen_spanish: mataban
  alternatives_spanish:
  - mataron
  - matan
  - daban muerte a
  lexicon: HALOT
  rationale: El verbo expresa matar de manera general. En este contexto, el imperfecto en español puede reflejar el valor aspectual del hebreo y el tono de denuncia continua del salmo.
- source_word: יְתוֹמִים
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - los huérfanos
  - el desamparado
  - el padreless
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'los carentes de padre', en español 'huérfano' comunica de forma clara y digna la misma categoría vulnerable. Se mantiene el singular con valor genérico, como en el hebreo y en la estrategia inglesa de clase representativa.
- source_word: יְרַצֵּחוּ
  english_pob_choice: murder
  chosen_spanish: asesinaban
  alternatives_spanish:
  - asesinan
  - asesinaron
  - matan
  lexicon: HALOT
  rationale: רצח denota homicidio ilícito; 'asesinar' preserva mejor esa fuerza moral-jurídica que el simple 'matar'. Se usa el imperfecto para mantener paralelismo y continuidad discursiva.
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de 'foreigner' a 'sojourner' para ajustarse mejor a גֵר; en español se optó por 'extranjero' por claridad y naturalidad, dejando constancia de la alternativa más cercana al valor técnico del término. También se conserva la distinción entre el verbo general de matar y el más fuerte de asesinar.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos miembros con sujetos vulnerables y verbos de violencia progresiva.
  - Se preserva la categoría social del hebreo sin introducir lenguaje eclesiástico tradicional no atestiguado por la fuente.
  - No se usa 'SEÑOR' ni 'Cristo' por no corresponder al pasaje.
  - '''Huérfano'' funciona aquí como equivalente contextual de ''fatherless'' sin borrar el matiz léxico, que queda explicado en nota.'
