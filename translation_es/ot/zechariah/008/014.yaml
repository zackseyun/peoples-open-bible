  rationale: Se ajusta la fórmula profética a un español más idiomático ('dice' en vez de 'ha dicho') y se corrige וְלֹא נִחָמְתִּי a 'no desistí', que refleja mejor el sentido contextual de no relentar del juicio. Se conservan la terminología del proyecto y las alternativas ya documentadas. También se mantiene la coma final porque el versículo continúa en la siguiente línea del discurso.
