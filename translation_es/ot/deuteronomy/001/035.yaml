review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la fórmula negativa enfática, la partitiva «de entre estos hombres», «la buena tierra» y «que juré dar». Sin embargo, no preserva con precisión la persona pronominal de לַאֲבֹתֵיכֶם, que en este discurso directo debe ser «vuestros/sus» según la voz escogida; el español actual del borrador mezcla el marco narrativo con una referencia de tercera persona («sus padres») donde el hebreo tiene segunda persona plural («vuestros padres»).
  spanish_quality_summary: El texto es legible, pero «de entre estos hombres, de esta generación mala» suena algo trabado por la doble cadena con comas. «Generación mala» es comprensible, aunque «generación perversa» o «malvada» refleja mejor el matiz moral de הָרָע; aun así, no es un error grave. La reparación principal es ajustar el pronombre posesivo y alisar ligeramente la frase.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la política de género-precisión para «padres». Debe mantenerse «padres» en el texto principal, con nota opcional «antepasados».
  issues:
  - severity: high
    issue: «a sus padres» no refleja la segunda persona plural de לַאֲבֹתֵיכֶם
    rationale: El hebreo dice literalmente «a vuestros padres». En un discurso divino dirigido al pueblo, «sus padres» cambia la relación deíctica y debilita la fidelidad al original y al rastro auditado en inglés («your fathers»).
  - severity: low
    issue: La puntuación y la repetición «de entre estos hombres, de esta generación mala» resulta algo pesada
    rationale: No es infiel, pero una redacción más continua mejora la naturalidad sin perder estructura. También conviene evitar una coma que separa elementos estrechamente ligados.
  revised_spanish_text: Ningún hombre[a] de entre estos hombres de esta generación mala verá la buena tierra que juré dar a vuestros padres.
  revised_footnotes:
  - marker: a
    text: 'O «antepasados». Hebreo: «a vuestros padres».'
    reason: lexical_alternative
  revision_rationale: Se corrige la persona pronominal para reflejar fielmente לַאֲבֹתֵיכֶם («vuestros padres») y se suaviza la sintaxis eliminando una coma innecesaria. Se mantiene «padres» en el texto principal conforme a la decisión teológica y léxica auditada, con «antepasados» en nota como alternativa explicativa.
