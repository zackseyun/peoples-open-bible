  yaml_path: translation/nt/revelation/004/005.yaml
  text: 'And from the throne come flashes of lightning and sounds and peals of thunder[a]; and before the throne were seven lamps of fire burning[c][b], which are the seven spirits of God.'
  footnotes:
  - marker: a
    text: Or 'voices' for 'sounds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'seven torches of fire burning before the throne.'
    reason: lexical_alternative
  - marker: c
    text: Many understand 'the seven spirits of God' as a symbolic way of speaking about the fullness of the one Holy Spirit; the Greek text itself reads 'seven spirits.'
    reason: alternative_reading
translation:
  language: ko
  text: '보좌에서 번개와 음성[a]과 우렛소리가 나왔습니다. 또 보좌 앞에는 일곱 등불[b]이 타고 있었는데, 이것은 하나님의 일곱 영[c]입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「소리」 대신 「음성」으로 옮길 수도 있다.'
    reason: lexical_alternative
  - marker: b
    text: '또는 「보좌 앞에 타고 있는 일곱 횃불」.'
    reason: lexical_alternative
  - marker: c
    text: '「하나님의 일곱 영」을 한 분 거룩하신 영의 일곱 겹 충만함을 가리키는 상징으로 보는 견해가 많다. 본문 자체는 「일곱 영」이라 쓴다.'
    reason: alternative_reading
