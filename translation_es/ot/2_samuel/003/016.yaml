translation:
  language: es
  text: 'Su esposo fue con ella, caminando y llorando detrás de ella[a] hasta Bahurim. Entonces Abner le dijo: «Ve[b], vuelve». Entonces él volvió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tras ella» para אַחֲרֶיהָ.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Ve, vuelve», un mandato doble enfático; alternativamente, «Ve, regresa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su hombre
  - su marido
  lexicon: HALOT
  rationale: En este contexto אִישׁ con sufijo posesivo se refiere al cónyuge de la mujer. «Esposo» comunica la relación matrimonial con naturalidad en español y conserva la precisión contextual que el inglés POB captó con 'husband'.
- source_word: הָל֧וֹךְ וּ/בָכֹה
  english_pob_choice: walking and weeping
  chosen_spanish: caminando y llorando
  alternatives_spanish:
  - yendo y llorando
  - andando y llorando continuamente
  lexicon: HALOT
  rationale: La secuencia verbal intensiva/durativa se expresa mejor en español con dos gerundios coordinados. «Caminando y llorando» mantiene el valor de acción en curso sin sobrecargar el verso con una paráfrasis.
- source_word: אַחֲרֶיהָ
  english_pob_choice: behind her
  chosen_spanish: detrás de ella
  alternatives_spanish:
  - tras ella
  - después de ella
  lexicon: HALOT
  rationale: La relación es espacial, no temporal. «Detrás de ella» reproduce el sentido de seguimiento físico que el inglés POB aclaró con 'behind her'.
- source_word: עַד בַּחֻרִים
  english_pob_choice: as far as Bahurim
  chosen_spanish: hasta Bahurim
  alternatives_spanish:
  - así como Bahurim
  - hasta el punto de Bahurim
  lexicon: HALOT
  rationale: Con un nombre de lugar, עַד marca el límite del trayecto. «Hasta Bahurim» es una forma natural en español y conserva el valor de extensión hasta el destino indicado.
- source_word: בַּחֻרִים
  english_pob_choice: Bahurim
  chosen_spanish: Bahurim
  alternatives_spanish:
  - Bajurim
  lexicon: HALOT
  rationale: Se conserva el topónimo por transliteración, conforme al criterio del proyecto y al audit trail inglés.
- source_word: לֵךְ שׁוּב
  english_pob_choice: Go, return
  chosen_spanish: Ve, vuelve
  alternatives_spanish:
  - Ve, regresa
  - Anda, vuelve
  - Ve, regresa
  lexicon: HALOT
  rationale: Los dos imperativos hebreos se mantienen como dos mandatos breves. «Ve, vuelve» conserva el énfasis de la doble orden sin diluirla en un solo verbo.
- source_word: וַיָּשֹׁב
  english_pob_choice: So he returned
  chosen_spanish: Y él volvió
  alternatives_spanish:
  - Entonces volvió
  - Así que volvió
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Y él volvió» es la continuación más directa y transparente en español, sin añadir interpretación causal no necesaria.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés con concordancia alta y sin revisiones aplicadas en la fuente base; por ello no se introducen cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se evita el calco rígido «después de ella» porque en español sugiere prioridad temporal más que posición física.
  - Se usa «esposo» para una referencia matrimonial explícita; «marido» sería igualmente posible, pero «esposo» mantiene un registro ligeramente más neutral y claro.
  - Se conserva la doble orden hebrea en forma breve para no perder el énfasis del original.
