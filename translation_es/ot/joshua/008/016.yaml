  yaml_path: translation/ot/joshua/008/016.yaml
  text: And all the people who were in the city were called out to pursue them[b][a], and they pursued Joshua and were drawn away from the city.
  footnotes:
  - marker: a
    text: Or 'cried out'; the Hebrew verb can denote shouting, but here likely carries the sense of being summoned or mobilized for pursuit.
    reason: lexical_alternative
  - marker: b
    text: Or 'were cut off from the city' or 'were detached from the city.' The Hebrew suggests being drawn out so as to be separated from the city.
    reason: lexical_alternative
