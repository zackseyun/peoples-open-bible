translation:
  language: es
  text: Pero no me escucharon[a], declara Yahvé, para provocarme a ira por la obra de sus propias manos, para su propio daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por las obras de sus manos'; la frase a menudo se refiere a ídolos o a obras idólatras en Jeremías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: Yet you did not listen
  chosen_spanish: Pero no me escuchaste
  alternatives_spanish:
  - Y no me escuchaste
  - Sin embargo, no me escuchaste
  lexicon: HALOT
  rationale: El hebreo introduce una continuación adversativa de la acusación; en español, 'Pero' comunica mejor esa oposición que un simple 'y'. Se conserva la negación y la segunda persona plural del verbo.
- source_word: שְׁמַעְתֶּם
  english_pob_choice: you did not listen
  chosen_spanish: no me escuchaste
  alternatives_spanish:
  - no oíste mi voz
  - no obedeciste
  lexicon: HALOT
  rationale: שמַע puede significar oír, escuchar u obedecer. Aquí el objeto es 'a mí', por lo que 'escuchaste' mantiene la recepción de la palabra sin forzar 'obedeciste' como sentido principal.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - a mi voz
  lexicon: HALOT
  rationale: En español, con el verbo 'escuchar' el complemento indirecto se expresa naturalmente como 'me'; el sentido directo de la preposición y sufijo se conserva sin pesadez estilística.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética solemne con el nombre divino en la forma establecida por el proyecto, 'Yahvé', en lugar de 'SEÑOR'.
- source_word: לְמַעַן
  english_pob_choice: to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - a fin de provocarme a ira
  - para enojarme
  lexicon: HALOT
  rationale: El valor de propósito/resultado se expresa naturalmente con 'para'. 'Provocarme a ira' conserva la fuerza causativa del hebreo y el tono profético sin suavizarlo.
- source_word: הכעסו/ני
  english_pob_choice: provoke me to anger
  chosen_spanish: provocarme a ira
  alternatives_spanish:
  - irritarme
  - despertar mi ira
  lexicon: HALOT
  rationale: El causativo de כעס pide una expresión que refleje 'hacer enojar'. 'Provocarme a ira' es la equivalencia más fiel y suficientemente digna para español bíblico contemporáneo.
- source_word: בְּמַעֲשֵׂה יְדֵיכֶם
  english_pob_choice: by the work of your hands
  chosen_spanish: por la obra de sus manos
  alternatives_spanish:
  - por el trabajo de sus manos
  - por lo que hicieron sus manos
  lexicon: HALOT
  rationale: La construcción idiomática se conserva de forma clara en español. 'Obra de sus manos' suena natural y mantiene la posible referencia a producciones humanas sin explicitar 'ídolos' en el texto principal.
- source_word: לְרַע לָכֶם
  english_pob_choice: to your own harm
  chosen_spanish: para su propio daño
  alternatives_spanish:
  - para su propio mal
  - para su perjuicio
  lexicon: HALOT
  rationale: La frase final expresa consecuencia dañina que recae sobre ellos mismos. 'Para su propio daño' conserva el sentido reflexivo y es idiomático en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se traduce con 'Yahvé' para preservar el nombre del pacto sin la convención de mayúsculas sustituta.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether בְּמַעֲשֵׂה יְדֵיכֶם should be made explicit as idolatry
  english_pob_reading: by the work of your hands
  chosen_spanish_reading: por la obra de sus manos
  alternative_spanish_readings:
  - por los ídolos hechos por sus manos
  - por lo que sus manos han hecho
  rationale: Aunque en Jeremías esta expresión puede aludir a ídolos, el verso no los menciona de modo explícito. Se conserva la amplitud del hebreo para no añadir una interpretación no verbalizada por el texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; no import doctrinal claims not explicit in the source'
translation_notes:
  revision_awareness: La revisión reciente del inglés eliminó 'so as' para hacer más directa la relación de לְמַעַן; por eso el español usa 'para' y no una perífrasis más pesada, manteniendo el registro formal y la fuerza causal/purpose del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma constante del nombre divino.
  - '''Escuchaste'' conserva el matiz receptivo de שׁמע sin convertirlo automáticamente en ''obedeciste''.'
  - La nota a pie marca la posible referencia idólatra sin imponerla en el cuerpo principal.
  - '''Obra de sus manos'' respeta la idiomática hebrea y el plural contextual de la segunda persona plural implícita en el texto.'
