translation:
  language: es
  text: 'Recuerda esto: el enemigo ha afrentado[a] a Yahvé, y un pueblo necio[b] han despreciado[c] tu nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha reprochado», «ha escarnecido» o «se ha burlado de» Yahvé.
    reason: lexical_alternative
  - marker: b
    text: «Necio» aquí tiene un sentido moral, no meramente de falta de inteligencia; compárese el «necio» en el Salmo 14:1.
    reason: cross_reference
  - marker: c
    text: O «han tratado tu nombre con desprecio»; posiblemente «han blasfemado tu nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: HALOT
  rationale: Imperativo qal de segunda persona masculina singular. En español bíblico y de súplica, «Recuerda» conserva la apelación directa y natural a Dios sin añadir una estructura reflexiva innecesaria.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  lexicon: HALOT
  rationale: El demostrativo se refiere al hecho denunciado. «Esto» es la forma más natural y breve en español, equivalente al inglés auditado y fiel al deíctico hebreo.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: Aunque el hebreo es singular sin artículo, el contexto poético lo usa de modo genérico/colectivo. «El enemigo» suena natural en español y mantiene la fuerza hostil del término.
- source_word: חֵרֵף
  english_pob_choice: has mocked
  chosen_spanish: ha afrentado
  alternatives_spanish:
  - ha burlado
  - ha reprochado
  - ha escarnecido
  lexicon: HALOT
  rationale: חרף implica reproche insultante, burla o afrenta. «Afrontado» comunica con dignidad la idea de injuriar/insultar a Dios sin reducirla solo a broma; conserva mejor la gravedad del verbo que una burla liviana.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino directo del Tetragrámaton, siguiendo la convención del proyecto en español. «Yahvé» es la forma principal del record y evita la sustitución por un título.
- source_word: וְעַם
  english_pob_choice: and a ... people
  chosen_spanish: y un pueblo
  alternatives_spanish:
  - y el pueblo
  - y una nación
  lexicon: HALOT
  rationale: El sustantivo colectivo עַם funciona como un grupo humano definido por su conducta. «Un pueblo» respeta la indefinición del hebreo y la paralelismo poético.
- source_word: נָבָל
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - falto de juicio
  - impío
  lexicon: HALOT
  rationale: El término tiene peso moral y religioso, no solo intelectual. «Necio» transmite bien esa carga en español bíblico contemporáneo y conserva la conexión con el uso sapiencial del necio.
- source_word: נִאֲצוּ
  english_pob_choice: have despised
  chosen_spanish: ha despreciado
  alternatives_spanish:
  - han desechado con desprecio
  - han tratado con contempto
  - han blasfemado
  lexicon: HALOT
  rationale: נאץ expresa desprecio insultante o rechazo despectivo. Se opta por «ha despreciado» para una lectura natural y sobria; la idea de blasfemar queda disponible como alternativa, pero no se impone en el texto principal.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  lexicon: HALOT
  rationale: En hebreo, «nombre» puede abarcar identidad, reputación y carácter revelado. «Tu nombre» mantiene la literalidad necesaria y deja el alcance semántico en el contexto.
theological_decisions:
- issue: Cómo verter el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo nombra directamente a Dios con el Tetragrámaton. La forma española adoptada en el proyecto es «Yahvé», que preserva el nombre propio sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza moral de נָבָל
  english_pob_reading: foolish
  chosen_spanish_reading: necio
  alternative_spanish_readings:
  - insensato
  - impío
  - falto de juicio
  rationale: El hebreo no describe mera torpeza intelectual; tiene una dimensión moral. «Necio» comunica esa carga sin exagerar el diagnóstico más allá de lo que el verso afirma.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada sin cambios sustantivos respecto del último repaso: se mantiene la sintaxis breve del lamento, el nombre divino directo «Yahvé» y el valor moral de נָבָל. La elección principal se ajusta a la evidencia hebrea y al historial inglés, sin introducir paráfrasis añadidas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - «Necio» conserva el matiz moral de נָבָל, evitando rebajarlo a simple falta de inteligencia.
  - Se usa «tu nombre» para conservar la densidad hebrea de שֵׁם como identidad/reputación revelada.
  - La nota alternativa para חֵרֵף se adjunta al verbo principal porque en español varias opciones son plausibles y la POB auditada preserva esa tensión lexical.
