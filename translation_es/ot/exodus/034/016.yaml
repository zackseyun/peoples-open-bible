review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: conserva la secuencia de advertencia, el partitivo en ‘algunas de sus hijas’, la metáfora de זנה con ‘se prostituirán’, y el causativo de הִזְנוּ con ‘harán que... se prostituyan’. Sin embargo, no refleja una decisión teológica/documental importante del expediente inglés: la nota que aclara que la prostitución es metáfora de ir tras otros dioses, y la nota explicativa de que las hijas llevarían a los hijos a la idolatría. Además, ‘tus hijos’ debilita ligeramente la precisión de בָּנֶיךָ (‘tus hijos varones / tus hijos’ en sentido masculino específico) en un contexto contrastado con ‘hijas’.'
  spanish_quality_summary: 'El español es claro, natural y digno. ‘Tras sus dioses’ suena bien y mantiene el giro hebreo. La frase es legible y fiel. La mejora principal es terminológica-contextual: en este versículo conviene ‘tus hijos[a]’ con nota explicativa para preservar la precisión masculina de ‘sons’ sin forzar el español con ‘hijos varones’ en el texto principal. También conviene añadir las notas que el POB inglés ya documentó.'
  glossary_alignment: 'No hay conflicto con los términos del proyecto: אֱלֹהִים se vierte correctamente como ‘dioses’ en plural pagano; la metáfora de זנה se conserva. No aparece Yahvé ni Mesías/Cristo ni otros términos sensibles del glosario. La única observación es preferir una nota para la referencia específica a ‘sons’ frente al español más amplio ‘hijos’.'
  issues:
  - severity: medium
    issue: Faltan las notas del expediente inglés sobre la metáfora de prostitución y su sentido idolátrico.
    rationale: 'El POB inglés preserva dos notas significativas: una lexical sobre זנה y una cultural/explicativa sobre cómo las hijas inducen a los hijos a ir tras sus dioses. Omitirlas pierde parte de la justificación auditada y de la claridad para el lector español.'
  - severity: low
    issue: ‘Tus hijos’ puede sonar más amplio que el contraste explícito ‘hijas’/‘sons’ del hebreo.
    rationale: Aunque ‘hijos’ puede funcionar en español, aquí el hebreo distingue hijas e hijos en un contexto matrimonial. Una nota breve resuelve la posible ambigüedad sin volver rígido el texto principal.
  revised_spanish_text: y tomarás algunas de sus hijas para tus hijos[a], y sus hijas se prostituirán[b] tras sus dioses, y harán que tus hijos vayan tras sus dioses.
  revised_footnotes:
  - marker: a
    text: Es decir, ellas llevarían a tus hijos a la idolatría al hacer que fueran tras sus dioses.
    reason: cultural_note
  - marker: b
    text: O ‘se harán prostitutas’ / ‘cometerán prostitución’. El hebreo usa lenguaje de infidelidad sexual de manera metafórica para ir tras otros dioses.
    reason: lexical_alternative
  revision_rationale: Se añade la documentación en notas ya presente en el POB inglés y se ajusta la última cláusula a ‘harán que tus hijos vayan tras sus dioses’ para expresar con más claridad en español el resultado idolátrico del causativo, tal como explica la nota auditada. Así se conserva tanto la metáfora en la segunda cláusula como la claridad del efecto en la tercera.
