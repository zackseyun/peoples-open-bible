translation:
  language: es
  text: 'En un día de prosperidad[a], alégrate; y en un día de adversidad, considera: Dios ha hecho tanto lo uno como lo otro, para que el hombre[b] no descubra nada de lo que vendrá después de él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en un día de bien»; la expresión hebrea es idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el hombre», usado aquí en sentido representativo de la humanidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «descubrir nada después de él», es decir, averiguar lo que sucederá en el futuro.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹם טוֹבָה
  english_pob_choice: In a day of prosperity
  chosen_spanish: En un día de prosperidad
  alternatives_spanish:
  - En un día de bien
  - Cuando los tiempos son buenos
  lexicon: HALOT
  rationale: יוֹם con un sustantivo abstracto expresa un tiempo o circunstancia; טוֹבָה aquí denota bienestar/prosperidad, no bondad moral. 'Prosperidad' conserva el valor de circunstancias favorables con naturalidad en español.
- source_word: הֱיֵה בְטוֹב
  english_pob_choice: be joyful
  chosen_spanish: sé alegre
  alternatives_spanish:
  - alégrate
  - goza
  lexicon: HALOT
  rationale: La construcción es idiomática. 'Sé alegre' comunica la exhortación sin volverla mecánica; mantiene el tono de respuesta positiva ante el bienestar.
- source_word: וּבְיוֹם רָעָה
  english_pob_choice: and in a day of adversity
  chosen_spanish: y en un día de adversidad
  alternatives_spanish:
  - y en un día de mal
  - y cuando llega la desgracia
  lexicon: HALOT
  rationale: רָעָה en literatura sapiencial suele indicar calamidad o infortunio. 'Adversidad' refleja mejor el contraste con 'prosperidad' que 'mal' en español.
- source_word: רְאֵה
  english_pob_choice: consider
  chosen_spanish: considera
  alternatives_spanish:
  - ve
  - toma nota
  lexicon: HALOT
  rationale: El imperativo de ראה aquí pide percepción reflexiva, no mera visión. 'Considera' expresa adecuadamente esa atención meditativa.
- source_word: גַּם אֶת זֶה לְעֻמַּת זֶה
  english_pob_choice: the one as well as the other
  chosen_spanish: lo uno tanto como lo otro
  alternatives_spanish:
  - una cosa tanto como la otra
  - una como la otra
  lexicon: HALOT
  rationale: לְעֻמַּת indica correspondencia o contraposición puesta en paralelo. 'Lo uno tanto como lo otro' preserva el balance sin perder fluidez en español.
- source_word: עָשָׂה הָאֱלֹהִים
  english_pob_choice: God has made
  chosen_spanish: Dios ha hecho
  alternatives_spanish:
  - Dios hizo
  - Dios ha creado
  lexicon: HALOT
  rationale: עָשָׂה puede significar hacer o disponer. 'Ha hecho' mantiene la afirmación gnómica y deja intacta la atribución divina de ambas realidades.
- source_word: עַל דִּבְרַת
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: La expresión introduce finalidad o resultado. 'Para que' es la forma más natural y precisa en español.
- source_word: שֶׁלֹּא יִמְצָא הָאָדָם
  english_pob_choice: that man may not find out
  chosen_spanish: para que el hombre no pueda descubrir
  alternatives_spanish:
  - para que el hombre no encuentre
  - para que la humanidad no descubra
  lexicon: HALOT
  rationale: יִמְצָא aquí significa descubrir o averiguar. 'El hombre' conserva el singular genérico del hebreo; 'no pueda descubrir' refleja la idea de incapacidad para conocer el futuro.
- source_word: אַחֲרָיו
  english_pob_choice: that will come after him
  chosen_spanish: de lo que vendrá después de él
  alternatives_spanish:
  - después de él
  - lo que vendrá luego
  lexicon: HALOT
  rationale: La frase alude a lo que sucede en el futuro, después de la persona. La expansión hace explícito el sentido temporal sin añadir contenido ajeno.
- source_word: מְאוּמָה
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - algo
  - cosa alguna
  lexicon: HALOT
  rationale: En contexto negativo, מְאוּמָה puede equivaler a 'nada' o 'nada en absoluto'. 'Nada' es natural y transmite bien el alcance de la negación.
theological_decisions:
- issue: Agencia divina en prosperidad y adversidad
  english_pob_reading: God has made both prosperity and adversity
  chosen_spanish_reading: Dios ha hecho lo uno tanto como lo otro
  alternative_spanish_readings:
  - Dios ha hecho ambas cosas
  - Dios ha hecho la una y la otra
  rationale: El hebreo atribuye ambas realidades contrastantes a la acción de Dios. La traducción conserva esa tensión teológica sin suavizarla ni explicarla más de lo que el versículo permite.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica.'
- issue: Uso genérico de הָאָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - la humanidad
  rationale: El sustantivo es masculino singular pero funciona de manera representativa para la humanidad. Se conserva 'el hombre' para respetar la forma del hebreo y la decisión auditada de la POB inglesa.
  doctrine_reference: Translation philosophy §4; tabla de términos en disputa para אָדָם.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'be joyful' sobre 'be in good spirits' por ser una versión más directa y natural del hebreo, manteniendo el tono formal. También respeta la lectura auditada de 'the one as well as the other' y la nota sobre el carácter genérico de 'man'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparece el Tetragrámaton; aquí el versículo habla de 'Dios' (הָאֱלֹהִים), por lo que se mantiene 'Dios'.
  - '''Prosperidad/adversidad'' preserva el paralelismo sapiencial y evita moralizar ''bueno/malo''.'
  - '''Sé alegre'' mantiene la fuerza exhortativa de הֱיֵה בְטוֹב sin caer en un calco.'
  - La negación se formula con 'nada' para reflejar mejor מְאוּמָה en contexto negativo.
