base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/014.yaml
  text: Joab said[a], “Not so[b]; I will not linger like this before you.” Then he took three darts in his hand and thrust them into the heart of Absalom while he was still alive in the heart of the terebinth.
  footnotes:
  - marker: a
    text: Or 'three rods/staffs'; the Hebrew term can denote a rod, staff, or scepter, but here likely refers to weapons used for thrusting.
    reason: lexical_alternative
  - marker: b
    text: Or 'oak.' The Hebrew אֵלָה often refers to a terebinth; some translations render it more generally as 'oak.'
    reason: lexical_alternative
