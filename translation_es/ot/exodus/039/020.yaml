  language: en
  yaml_path: translation/ot/exodus/039/020.yaml
  text: They made two gold rings and put them on the two shoulder pieces of the ephod[a], below, on its front side, opposite its joining[b], above the skillfully woven band of the ephod.
  footnotes:
