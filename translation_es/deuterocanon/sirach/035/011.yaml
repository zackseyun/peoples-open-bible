translation:
  language: es
  text: Ten misericordia de la ciudad de tu santuario[a], Jerusalén[b], el lugar establecido para tu morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la ciudad de tu santidad». También puede entenderse como «tu ciudad santa» o, más interpretativamente, «la ciudad de tu santuario».'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego suministrado difiere de manera sustancial y exhorta, más bien, a levantarse a tiempo e ir a casa sin demora. Como aquí se conserva el hebreo, se sigue el hebreo en el texto principal y el griego se considera una variante textual.
    reason: textual_variant
lexical_decisions:
- source_word: רחם
  english_pob_choice: Have mercy
  chosen_spanish: Ten misericordia
  alternatives_spanish:
  - Sé compasivo con
  - Muestra misericordia a
  lexicon: HALOT
  rationale: El imperativo de רחם pide una acción de misericordia. «Ten misericordia» es idiomático en español bíblico moderno, conserva el tono de súplica y evita una paráfrasis más explicativa.
- source_word: קרית
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  lexicon: HALOT
  rationale: קריה/קרית designa una ciudad. «Ciudad» es la equivalencia natural y clara para Jerusalén en un registro digno.
- source_word: קדשך
  english_pob_choice: your holiness / your sanctuary
  chosen_spanish: tu santidad
  alternatives_spanish:
  - tu santuario
  - tu ciudad santa
  lexicon: HALOT
  rationale: La forma hebrea es compacta y literalmente dice «tu santidad». En español, «ciudad de tu santidad» conserva esa construcción genitiva y mantiene abierta la tensión entre santidad, santuario y ciudad santa sin imponer una sola interpretación.
- source_word: ירושלים
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico en su forma usual española.
- source_word: מכון
  english_pob_choice: established place
  chosen_spanish: lugar establecido
  alternatives_spanish:
  - morada establecida
  - lugar fijo
  lexicon: HALOT
  rationale: מכון expresa un lugar fijado o establecido. «Lugar establecido» conserva el valor de estabilidad y evita fundirlo con la idea de morada, que ya aparece en el segundo miembro.
- source_word: שבתך
  english_pob_choice: your dwelling
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu vivienda
  - tu habitación
  lexicon: HALOT
  rationale: שבתך aquí comunica la idea de residencia. «Tu morada» es claro, reverente y reproduce bien la relación con Jerusalén como lugar del habitar divino.
theological_decisions:
- issue: Cómo rendir la expresión compacta קדשך
  english_pob_reading: the city of your sanctuary
  chosen_spanish_reading: la ciudad de tu santidad
  alternative_spanish_readings:
  - la ciudad de tu santuario
  - tu ciudad santa
  rationale: Se preserva la densidad del hebreo y su ambigüedad productiva. «Tu santidad» deja visible que el texto no usa la palabra habitual para «santuario», por lo que no se borra la tensión lexical, aunque se anoten posibles equivalentes interpretativos.
  doctrine_reference: Principios POB de transparencia textual y prioridad del hebreo conservado
- issue: Relación entre el hebreo conservado y el paralelo griego divergente
  english_pob_reading: The Hebrew is followed in the main text and the Greek is treated as a textual variant.
  chosen_spanish_reading: Se sigue el hebreo en el texto principal; el griego se reconoce como variante textual divergente.
  alternative_spanish_readings:
  - Traducir el griego en el texto principal
  - armonizar hebreo y griego
  rationale: La evidencia hebrea superviviente tiene primacía para esta línea. El griego suministrado es sustancialmente distinto, así que no debe absorberse en el cuerpo principal ni armonizarse sin aviso.
  doctrine_reference: 'Principio POB: transparencia y prioridad del testimonio hebreo cuando existe'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «city of your sanctuary» y ajustó la segunda mitad a «the place established for your dwelling». Sin embargo, para el español se optó por una solución que preserve mejor la literalidad y la tensión del hebreo: «la ciudad de tu santidad» y «el lugar establecido para tu morada».'
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio estándar.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Misericordia» se usa en sentido verbal idiomático para רחם.
  - «Morada» conserva el registro reverente sin introducir un término eclesiástico más cargado.
