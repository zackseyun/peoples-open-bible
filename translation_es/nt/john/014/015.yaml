review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego básico: condición real con «Si», objeto «me», futuro indicativo en «guardarán», y «mandamientos» para ἐντολάς. También preserva correctamente la decisión teológica clave de no convertir τηρήσετε en imperativo. Sin embargo, la nota al pie no preserva fielmente la alternativa del POB inglés: repite la lectura principal en vez de ofrecer la alternativa léxica correspondiente a «obedecer».'
  spanish_quality_summary: El español es claro y natural. «Si me aman, ustedes guardarán mis mandamientos» es plenamente comprensible, aunque «ustedes» es opcional y puede mantenerse por claridad. La única reparación necesaria está en la nota, cuya formulación actual es internamente errónea porque presenta como alternativa exactamente la misma frase del texto principal.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «mandamientos» y «guardarán» encajan bien con las decisiones auditadas; «guardarán» conserva mejor el alcance de τηρέω que «obedecerán».
  issues:
  - severity: medium
    issue: La nota al pie alternativa está mal formulada
    rationale: El texto principal ya dice «guardarán mis mandamientos», pero la nota dice «O «guardarán mis mandamientos»». Según la auditoría inglesa, la alternativa debía corresponder a «you will obey my commands», por lo que en español debe ofrecer una alternativa real como «obedecerán mis mandamientos» o similar.
  revised_spanish_text: Si me aman[a], ustedes guardarán mis mandamientos.
  revised_footnotes:
  - marker: a
    text: O «obedecerán mis mandamientos». El verbo puede significar guardar, observar, custodiar u obedecer; «guardarán» conserva el sentido más amplio.
    reason: lexical_alternative
  revision_rationale: Se aprueba el texto principal con una corrección menor en la nota al pie para que preserve de manera fiel la alternativa léxica documentada en el POB inglés y evite repetir la lectura principal como si fuera variante.
