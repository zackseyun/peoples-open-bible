review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: תַּחַת אָוֶן como condición previa, רָאִיתִי como reporte visionario, אָהֳלֵי כוּשָׁן y יְרִיעוֹת אֶרֶץ מִדְיָן como paralelo poético, y יִרְגְּזוּן como temblor. Sin embargo, «cortinas» por sí sola debilita la imagen concreta de יְרִיעוֹת como cortinas/cubiertas de tienda, especialmente al estar en paralelo con «tiendas».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse con una formulación más precisa y natural en el segundo hemistiquio. «Las cortinas de la tierra de Madián» suena algo extraña en español, como si la tierra misma tuviera cortinas. «Las cortinas de las tiendas de la tierra de Madián» o «las cortinas de tienda de la tierra de Madián» explicita el referente y preserva mejor el paralelismo. También conviene ajustar la nota a para no introducir «mal» como alternativa principal, ya que el inglés auditado documenta «trouble», no «evil» como alternativa preferida en este contexto.
  glossary_alignment: No hay conflicto con terminología teológica principal. El nombre propio כוּשָׁן puede mantenerse como «Cusan» si el proyecto español acepta esa castellanización; no exige adjudicación adicional. La decisión sobre אָוֶן debe seguir el matiz contextual de aflicción/trouble más que «mal» en la nota.
  issues:
  - severity: medium
    issue: «las cortinas de la tierra de Madián» es ambiguo y menos fiel al referente de יְרִיעוֹת
    rationale: Aunque el hebreo no repite «tiendas», יְרִיעוֹת se refiere a paños/cortinas de tienda. En español, sin ese apoyo léxico, la frase puede sugerir erróneamente que «la tierra» posee cortinas.
  - severity: low
    issue: La nota [a] dice «O “bajo el mal”»
    rationale: El expediente inglés conserva como alternativa inmediata «under trouble». Aunque אָוֶן puede significar maldad/iniquidad en otros contextos, aquí la nota debería priorizar «problema/trouble» o «calamidad», no «mal», para no desviar el sentido contextual.
  revised_spanish_text: Bajo la aflicción vi las tiendas de Cusan[a][b]; las cortinas de las tiendas de la tierra de Madián temblaban.
  revised_footnotes:
  - marker: a
    text: O «bajo la calamidad» o «bajo la desgracia»; אָוֶן puede denotar aflicción, calamidad o, en algunos contextos, maldad/iniquidad.
    reason: lexical_alternative
  - marker: b
    text: Cusan puede referirse a Cus o relacionarse con Cusan-Risataim (Jue. 3:8), pero el hebreo aquí dice simplemente «Cusan».
    reason: alternative_reading
  revision_rationale: Se mantiene la sintaxis y el sentido del borrador, pero se explicita que יְרִיעוֹת son cortinas de tienda para evitar una ambigüedad poco natural en español y preservar mejor el paralelismo poético con «tiendas». También se ajusta la nota léxica sobre אָוֶן para alinearla con el análisis contextual del expediente inglés.
