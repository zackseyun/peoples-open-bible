translation:
  text: 'For she is wise[a], and she is a small one[e][d][c][b];

    nor turn away great things in parts

    from smallness—

    for they know smallness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲟⲩⲕⲟⲩⲉⲓ literally ‘small/child’; here rendered ‘fool’ to sharpen the antithesis
      with ‘wise.’ ‘Simple/ignorant’ are viable alternatives.
    reason: lexical_alternative
  - marker: b
    text: If ⲥⲟⲩⲱⲛ is not ⲥⲟⲟⲩⲛ ‘know’ but a removal verb, the line could read ‘until
      they remove ignorance.’
    reason: alternative_reading
  - marker: c
    text: ‘Do not take away greatness in parts’ could also be ‘do not remove the great
      things by portions.’ The object may be implicit or resumed elsewhere in the
      larger unit.
    reason: alignment_note
  - marker: d
    text: Or 'For be wise—and be a fool;'.
    reason: previous_rendering
  - marker: e
    text: Or 'and do not take away greatness in parts;\nin ignorance, until they come
      to know ignorance—\nfor they know ignorance.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϫⲉ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: Crum; Layton (particles)
  rationale: ϫⲉ commonly introduces causal or explanatory clauses; here it naturally
    opens the admonitory unit as “for/indeed.”
- source_word: ⲥⲁⲃⲉ (in ⲥⲥⲁⲃⲉⲕ)
  chosen: wise
  alternatives:
  - sage
  - learned
  lexicon: Crum s.v. ⲥⲁⲃⲉ
  rationale: ⲥⲁⲃⲉ denotes ‘wise/wise man’; rendered adjectivally to maintain the paradox
    with ⲟⲩⲕⲟⲩⲉⲓ.
- source_word: ⲟⲩⲕⲟⲩⲉⲓ
  chosen: fool
  alternatives:
  - small one
  - ignorant one
  - simple one
  lexicon: Crum s.v. ⲕⲟⲩⲉⲓ; NH usage
  rationale: Literally ‘small/childlike’; in NH literature it often connotes ignorance.
    ‘Fool’ sharpens the antithesis with ‘wise’; ‘small/ignorant’ noted as alternatives.
- source_word: ⲙⲡⲣⲧⲥⲧⲟ
  chosen: do not take away
  alternatives:
  - do not remove
  - do not strip off
  lexicon: Crum s.v. ⲧⲥⲧⲱ
  rationale: Negative jussive/imperative sense; ‘take away’ keeps the concrete feel
    of ⲧⲥⲧⲱ.
- source_word: ⲙⲛⲧⲛⲟϭ
  chosen: greatness
  alternatives:
  - great things
  - the great
  lexicon: Crum s.v. ⲛⲟϭ
  rationale: Abstract ⲙⲛⲧ- formation; ‘greatness’ suits the parallel with ‘parts’
    and the admonition not to fragment it.
- source_word: ϩⲉⲛⲙⲉⲣⲟⲥ
  chosen: parts
  alternatives:
  - portions
  - pieces
  lexicon: Crum s.v. ⲙⲉⲣⲟⲥ (from Gk meros)
  rationale: Loan from Greek μέρος; ‘parts’ is the natural English equivalent.
- source_word: ⲉⲃⲟⲗ
  chosen: '[out/away]'
  alternatives:
  - out
  - away
  lexicon: Crum s.v. ⲉⲃⲟⲗ
  rationale: Directional particle; force captured by ‘take away.’ Retained in brackets
    in notes through the verb choice.
- source_word: ϩⲛ ⲧⲙⲛⲧⲕⲟⲩⲉⲓ
  chosen: in ignorance
  alternatives:
  - amid ignorance
  - within senselessness
  lexicon: Crum s.v. ⲕⲟⲩⲉⲓ
  rationale: ⲙⲛⲧⲕⲟⲩⲉⲓ is the abstract ‘ignorance’; preposition ϩⲛ ‘in’ is straightforward.
- source_word: ⲉϣⲁⲩ
  chosen: until they [will]
  alternatives:
  - so that they will
  - till they
  lexicon: Layton, Coptic Grammar (future ⲉϣⲁ- construction)
  rationale: Temporal/goal marker with 3pl; rendered ‘until they (will)’ to preserve
    aspect.
- source_word: ⲥⲟⲩⲱⲛ (ⲥⲟⲟⲩⲛ)
  chosen: know
  alternatives:
  - recognize
  - come to know
  lexicon: Crum s.v. ⲥⲟⲟⲩⲛ
  rationale: Taken as the common verb ‘to know’; vocalism varies in manuscripts/OCR;
    ‘come to know’ kept in the English cadence.
- source_word: ⲅⲁⲣ
  chosen: for
  alternatives:
  - indeed
  lexicon: Crum; standard Gk particle loan
  rationale: Causal/explanatory; maintains the connective cadence.
parallelism_check: The opening pair ‘be wise—and be a fool’ preserves the paradoxical
  coupling (wise vs. small/ignorant). The second line’s negative imperative balances
  the first with an antithetical action (‘do not take away’). The third and fourth
  lines hinge on ‘ignorance/know ignorance,’ mirroring the poem’s pattern of holding
  opposites together (being in ignorance until knowing ignorance). Repetition of ‘ignorance’
  retains the hammering cadence of the source.
voice_check: 'Thunder’s commanding, paradox-voiced address is kept: imperative/admonitory
  tone without domesticating the strangeness. Though the ‘I am’ voice isn’t explicit
  in this fragment, the authoritative instructive register matches the surrounding
  ‘Embrace me’ section.'
alignment_risk_note: 'Alignment confidence was only medium. Specific risks: (1) ⲥⲥⲁⲃⲉⲕ
  is read as an admonitory ‘be wise’ + antithesis with ⲟⲩⲕⲟⲩⲉⲓ (‘small/ignorant’);
  OCR doubling and suffixing are uncertain. (2) ⲥⲟⲩⲱⲛ is taken as ⲥⲟⲟⲩⲛ ‘to know’;
  if it is another verb (e.g., ‘remove’/‘cast out’), the third/fourth lines’ sense
  would shift. (3) Syntactic boundaries across lines 2–3 (‘do not take away greatness
  in parts’) are reconstructed; pronominal objects (‘me’) are not visible in the excerpt
  and thus not supplied. (4) The consult text mentions ‘grief,’ but no clear Coptic
  equivalent appears here; we did not import that reading.'
