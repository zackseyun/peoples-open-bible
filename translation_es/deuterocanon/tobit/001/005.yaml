translation:
  language: es
  text: y todas las tribus que habían apostatado sacrificaban a Baal la becerra[a], incluyendo la casa de mi padre[b], Neftalí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Baal el becerro». El griego usa un término para una vaca joven o becerra; la expresión probablemente alude a la imagen bovina asociada con el culto de Israel del norte.
    reason: lexical_alternative
  - marker: b
    text: 'La sintaxis griega al final es comprimida: literalmente, «y la casa de Neftalí de mi padre». El sentido es que incluso la propia casa ancestral de Tobit quedaba incluida entre los que participaban.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶσαι αἱ φυλαί
  english_pob_choice: all the tribes
  chosen_spanish: todas las tribus
  alternatives_spanish:
  - todas las clanes
  - cada tribu
  lexicon: LSJ
  rationale: φυλαί en este contexto histórico-nacional se refiere a las tribus de Israel; en español, 'tribus' conserva mejor ese valor que 'clanes'.
- source_word: αἱ συναποστᾶσαι
  english_pob_choice: that had apostatized
  chosen_spanish: que se habían apostatado
  alternatives_spanish:
  - que se habían rebelado conjuntamente
  - que habían abandonado la fe con los demás
  - que se habían apartado
  lexicon: LSJ
  rationale: El participio compuesto expresa una defección compartida; 'apostatar' mantiene el sentido religioso/covenantal que el contexto exige.
- source_word: ἔθυον
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaban
  alternatives_spanish:
  - estaban sacrificando
  - ofrecían sacrificios
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción habitual o continua en pasado; en español, el imperfecto simple 'sacrificaban' transmite bien ese aspecto sin sonar forzado.
- source_word: τῇ Βάαλ
  english_pob_choice: to Baal
  chosen_spanish: a Baal
  alternatives_spanish:
  - para Baal
  lexicon: LSJ
  rationale: El dativo con θύω indica la deidad receptora del sacrificio; 'a Baal' es la correspondencia natural en español.
- source_word: τῇ δαμάλει
  english_pob_choice: the heifer
  chosen_spanish: la becerra
  alternatives_spanish:
  - la vaquilla
  - la ternera
  lexicon: LSJ
  rationale: δαμάλις puede designar una hembra joven del ganado. 'Becerra' preserva la referencia bovina con una forma más natural en español bíblico contemporáneo; la nota mantiene abierta la alternativa 'calf/becerro' de la tradición inglesa.
- source_word: ὁ οἶκος Νεφθαλεὶμ τοῦ πατρός μου
  english_pob_choice: including the house of my father, Naphtali
  chosen_spanish: incluyendo la casa de mi padre, Neftalí
  alternatives_spanish:
  - y la casa de Neftalí, mi padre
  - e incluso la casa de mi padre Neftalí
  lexicon: LSJ
  rationale: La sintaxis griega es comprimida; 'incluyendo' hace explícita la inclusión que el inglés POB ya interpretó. 'Neftalí' se conserva como nombre propio.
theological_decisions:
- issue: Sentido religioso de συναποστᾶσαι
  english_pob_reading: apostasy
  chosen_spanish_reading: apostatado
  alternative_spanish_readings:
  - rebelado
  - desviado
  rationale: Dado que el versículo describe sacrificios a Baal, la ruptura es cultual y de pacto, no solo política. 'Apostatar' conserva esa fuerza teológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Identificación de τῇ δαμάλει
  english_pob_reading: Baal the heifer
  chosen_spanish_reading: Baal la becerra
  alternative_spanish_readings:
  - Baal el becerro
  - la imagen bovina asociada con Baal
  rationale: El texto griego vincula Βάαλ y δαμάλει en aposición. Traducirlo de manera directa preserva la ambigüedad cultual sin resolverla artificialmente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: He seguido el pasaje griego de Swete como ancla principal, en línea con el POB inglés revisado que prefirió 'had apostatized' y conservó la imagen bovina en 'Baal the heifer'. La versión española mantiene esa misma decisión base, haciendo explícita la inclusión sintáctica con 'incluyendo' y usando una nota para conservar la alternativa 'becerro/calve' donde el griego admite más de una lectura.
  spanish_consistency_notes:
  - Se usa 'Dios'/'Yahvé' según corresponda en el proyecto, pero este versículo no contiene esos términos.
  - '''Apostatar'' se mantiene como verbo técnico para la defección religiosa.'
  - '''Baal'' se deja sin transliteración adicional, siguiendo el audit trail inglés y el texto griego.'
  - La frase final se entiende como inclusión de la casa ancestral de Tobit, no como una nueva entidad distinta.
