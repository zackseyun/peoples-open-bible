translation:
  language: es
  text: Como diamante[a], más duro que el pedernal, he hecho tu frente. No los temas, ni te desalientes delante de ellos, porque son una casa rebelde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adamante, más duro que el pedernal»; el hebreo שָׁמִיר puede denotar una piedra o sustancia muy dura.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמִיר
  english_pob_choice: diamond
  chosen_spanish: diamante
  alternatives_spanish:
  - adamante
  - emery
  - piedra muy dura
  lexicon: HALOT
  rationale: En este contexto de dureza comparada con el pedernal, el término designa una sustancia extremadamente dura. «Diamante» comunica con naturalidad la comparación en español moderno y conserva la fuerza imagística del original.
- source_word: חָזָק
  english_pob_choice: harder than
  chosen_spanish: más duro que
  alternatives_spanish:
  - más fuerte que
  - duro
  lexicon: HALOT
  rationale: Aquí funciona en una construcción comparativa con מִן/‘que’. «Más duro que» refleja mejor la imagen física de dureza que «más fuerte que», que en español suena más general.
- source_word: צֹר
  english_pob_choice: flint
  chosen_spanish: pedernal
  alternatives_spanish:
  - sílex
  - piedra
  - roca
  lexicon: HALOT
  rationale: El sustantivo se refiere a una piedra muy dura, comúnmente flint. «Pedernal» es una equivalencia natural y precisa en español bíblico contemporáneo.
- source_word: מִצְחֶךָ
  english_pob_choice: your forehead
  chosen_spanish: tu frente
  alternatives_spanish:
  - tu frente
  - tu ceño
  lexicon: HALOT
  rationale: El hebreo nombra la frente y conserva la metáfora corporal de firmeza. «Tu frente» es el equivalente más directo y claro en español.
- source_word: תִירָא
  english_pob_choice: do not fear
  chosen_spanish: No los temas
  alternatives_spanish:
  - No tengas temor de ellos
  - No temas
  lexicon: HALOT
  rationale: En este contexto de exhortación/aseguramiento, el valor es imperativo. «No los temas» conserva el objeto explícito y la naturalidad del español.
- source_word: תֵחַת
  english_pob_choice: do not be dismayed
  chosen_spanish: ni te desalientes
  alternatives_spanish:
  - ni te asustes
  - ni te derrumbes
  - ni te intimides
  lexicon: HALOT
  rationale: El nifal de חתת expresa ser quebrantado, abatido o desanimado. «Desalentarse» comunica bien el efecto emocional sin volver la frase extraña en español.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - ante ellos
  lexicon: HALOT
  rationale: La expresión idiomática conserva la idea de estar frente a su presencia. «Delante de ellos» es idiomático y claro en español.
- source_word: בֵּית מְרִי
  english_pob_choice: a rebellious house
  chosen_spanish: una casa rebelde
  alternatives_spanish:
  - una casa de rebelión
  - un pueblo rebelde
  lexicon: HALOT
  rationale: Se mantiene el sustantivo corporativo «casa», importante en Ezequiel para la identidad pactal del pueblo. «Rebelde» reproduce el rasgo caracterizador sin suavizarlo.
theological_decisions:
- issue: Preservación del término corporativo «casa» para Israel
  english_pob_reading: a rebellious house
  chosen_spanish_reading: una casa rebelde
  alternative_spanish_readings:
  - un pueblo rebelde
  - una casa de rebelión
  rationale: El hebreo usa בית, término significativo para una comunidad pactal y familiar. Conservar «casa» preserva la carga profética y evita aplanar la metáfora a «pueblo».
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del contexto auditado en inglés: mantiene la imagen de dureza extrema, la orden de no temer ni desalentarse, y la designación corporativa «casa rebelde». No se registraron revisiones pendientes en el contexto fuente.'
  spanish_consistency_notes:
  - Se prefirió «pedernal» por ser el equivalente natural de flint en español bíblico.
  - Se usó «frente» y no una paráfrasis como «fortaleza mental», para conservar la metáfora corporal del hebreo.
  - «Desalentarse» se eligió para reflejar el abatimiento del nifal de חתת sin añadir intensidad no atestiguada.
  - Se conservó «casa» en sentido corporativo, en continuidad con el uso profético de Ezequiel.
