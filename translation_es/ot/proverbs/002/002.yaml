translation:
  language: es
  text: poniendo atento tu oído a la sabiduría, inclinando tu corazón al entendimiento,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘al discernimiento’ para ‘al entendimiento’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַקְשִׁיב
  english_pob_choice: making ... attentive
  chosen_spanish: haciendo atento
  alternatives_spanish:
  - poniendo atento
  - prestando atención
  - haciendo que atienda
  lexicon: HALOT
  rationale: 'El Hifil infinitivo expresa una acción causativa: ‘hacer que esté atento / prestar atención’. En español, ‘haciendo atento’ conserva esa fuerza causal y el paralelismo con el siguiente miembro sin volverse áspero o demasiado explicativo.'
- source_word: לַחָכְמָה
  english_pob_choice: to wisdom
  chosen_spanish: a la sabiduría
  alternatives_spanish:
  - para la sabiduría
  - hacia la sabiduría
  lexicon: HALOT
  rationale: La preposición ל aquí señala dirección u objeto de la atención. ‘A la sabiduría’ reproduce bien esa orientación en español y evita convertir el sustantivo en una finalidad más abstracta de lo que el hebreo sugiere.
- source_word: אָזְנֶךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tus oídos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘tu oído / tu oreja’, en español ‘oído’ suena más natural y digno en este contexto sapiencial. Mantiene la imagen corporal singular y la atención receptiva.
- source_word: תַּטֶּה
  english_pob_choice: inclining
  chosen_spanish: inclinando
  alternatives_spanish:
  - doblando
  - dirigiendo
  - volviendo
  lexicon: HALOT
  rationale: נטה significa inclinar, tender, volver. ‘Inclinando’ conserva la imagen de movimiento intencional y enlaza bien con el primer hemistiquio, manteniendo el estilo participial del inglés POB.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: ‘Corazón’ reproduce el hebreo לֵב como centro de la vida interior, incluyendo pensamiento, voluntad y afecto. ‘Mente’ estrecharía indebidamente el alcance antropológico.
- source_word: לַתְּבוּנָה
  english_pob_choice: to understanding
  chosen_spanish: al entendimiento
  alternatives_spanish:
  - al discernimiento
  - a la inteligencia
  lexicon: HALOT
  rationale: תְּבוּנָה en Proverbios suele referirse a entendimiento/discernimiento. ‘Entendimiento’ es la equivalencia más natural y permite conservar el paralelismo con ‘sabiduría’; ‘discernimiento’ queda como alternativa válida donde se quiera destacar el matiz perceptivo.
theological_decisions:
- issue: Relación entre sabiduría y entendimiento en el paralelismo hebreo
  english_pob_reading: making your ear attentive to wisdom, inclining your heart to understanding
  chosen_spanish_reading: haciendo atento tu oído a la sabiduría, inclinando tu corazón al entendimiento
  alternative_spanish_readings:
  - prestando atención a la sabiduría, inclinando tu corazón al discernimiento
  - haciendo atento tu oído a la sabiduría, volviendo tu corazón al discernimiento
  rationale: Se conserva el paralelismo sapiencial sin forzar una equivalencia técnica entre los dos términos. ‘Entendimiento’ mantiene la pareja tradicional con ‘sabiduría’, mientras que ‘discernimiento’ queda visible como posibilidad lexical ya reconocida por el texto base inglés.
  doctrine_reference: Sabiduría sapiencial / literatura de Proverbios; no implica una doctrina sistemática específica.
translation_notes:
  revision_awareness: El borrador inglés revisado eliminó la conjunción ‘and’ para alinearse más de cerca con el paralelismo hebreo. El español sigue esa misma decisión estructural, evitando añadir una conjunción entre los dos miembros poéticos.
  spanish_consistency_notes:
  - Se mantiene el paralelismo sin conjunción explícita, como en el hebreo y la revisión inglesa.
  - ‘Sabiduría’ y ‘entendimiento’ conservan el registro sapiencial estándar y evitan una paráfrasis doctrinal.
  - El uso de ‘tu oído’ en singular respeta la imagen concreta del hebreo y su sufijo de segunda persona singular.
