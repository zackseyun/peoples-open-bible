base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/005/006.yaml
  text: But Jason kept carrying out merciless slaughter of his own fellow citizens[a], not understanding that prosperity against kinsmen is the greatest calamity[b], and thinking that he was winning trophies over enemies and not over his own countrymen.
  footnotes:
  - marker: a
    text: Or 'unsparingly' for 'merciless.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not understanding that prosperity toward kinsmen is the greatest misfortune,' meaning that apparent success won against one's own kin is actually ruinous.
    reason: lexical_alternative
