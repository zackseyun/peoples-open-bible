reference: 1 Peter 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὡς Σάρρα ὑπήκουσεν τῷ Ἀβραάμ, κύριον αὐτὸν καλοῦσα· ἧς ἐγενήθητε τέκνα ἀγαθοποιοῦσαι καὶ μὴ φοβούμεναι μηδεμίαν πτόησιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/006.yaml
  text: 'just as Sarah obeyed Abraham, calling him lord. You have become her children if you do good and do not fear any intimidation.'
translation:
  language: ko
  text: '곧 사라가 아브라함을 「주인」이라 부르며 그에게 순종한 것처럼 말입니다. 여러분이 선을 행하고 어떤 위협도 두려워하지 아니한다면, 여러분은 사라의 딸들이 된 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριον αὐτὸν καλοῦσα
  english_pob_choice: calling him lord
  chosen_korean: 「주인」이라 부르며
  alternatives_korean:
  - 「주」라 부르며
  - 「상전」이라 부르며
  lexicon: BDAG
  rationale: 창 18:12의 사라가 아브라함을 부른 표현 (히브리어 אדן, LXX κύριος). 여기서는 신적 호칭이 아니라 가내 위계의 호칭이므로 「주인」으로 옮긴다 — 「주」(예수 호칭)와 구별.
- source_word: ἧς ἐγενήθητε τέκνα
  english_pob_choice: You have become her children
  chosen_korean: 여러분은 사라의 딸들이 된 것입니다
  alternatives_korean:
  - 너희는 그의 자녀가 된 것입니다
  - 너희는 그녀의 자손이 되었습니다
  lexicon: BDAG
  rationale: 「딸들」로 옮겨 본문이 아내들을 향한 것임을 분명히 한다 (τέκνα는 중성 복수지만 문맥상 여성).
- source_word: μὴ φοβούμεναι μηδεμίαν πτόησιν
  english_pob_choice: do not fear any intimidation
  chosen_korean: 어떤 위협도 두려워하지 아니한다면
  alternatives_korean:
  - 아무런 두려움에도 떨지 아니한다면
  - 어떤 위협에도 동요하지 않는다면
  lexicon: BDAG
  rationale: πτόησις는 「놀라게 하는 것·위협」. 잠언 3:25 LXX와 유사 표현.
