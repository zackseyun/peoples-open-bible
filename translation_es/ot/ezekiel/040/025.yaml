translation:
  language: es
  text: Y tenía ventanas por todo alrededor, y también su pórtico[a] tenía ventanas por todo alrededor, como estas ventanas. La longitud era de cincuenta codos, y la anchura de veinticinco codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestíbulo» o «pórtico» para «pórtico» (hebreo אֵילָם), un término arquitectónico en la visión del templo de Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלּוֹנִים
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - aberturas
  - marcos de ventana
  lexicon: HALOT
  rationale: El hebreo se refiere de manera directa a ventanas o aberturas con función de ventana en la estructura arquitectónica. «Ventanas» es el equivalente natural y transparente en español.
- source_word: לוֹ
  english_pob_choice: it had
  chosen_spanish: tenía
  alternatives_spanish:
  - le había
  - eran para él
  lexicon: HALOT
  rationale: 'El sufijo pronominal se expresa mejor en español con posesión/existencia natural: «tenía ventanas», en vez de una construcción literal y pesada.'
- source_word: וְלְאֵילָמָו
  english_pob_choice: and its porch also had windows
  chosen_spanish: y también su pórtico tenía ventanas
  alternatives_spanish:
  - y su vestíbulo tenía ventanas
  - y su pórtico también
  lexicon: HALOT
  rationale: אֵילָם en esta visión arquitectónica se entiende como un espacio de entrada tipo pórtico. «Pórtico» conserva el sentido arquitectónico; «también» refleja la adición de la cláusula.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: La duplicación intensifica la idea circunferencial. «Todo alrededor» comunica bien esa repetición sin sonar artificial.
- source_word: כְּהַחֲלּוֹנוֹת הָאֵלֶּה
  english_pob_choice: like these windows
  chosen_spanish: como estas ventanas
  alternatives_spanish:
  - como aquellas ventanas
  - según estas ventanas
  lexicon: HALOT
  rationale: La comparación conserva el demostrativo y la relación con las ventanas ya descritas. «Estas» mantiene la referencia textual inmediata.
- source_word: חֲמִשִּׁים אַמָּה אֹרֶךְ
  english_pob_choice: The length was fifty cubits
  chosen_spanish: La longitud era de cincuenta codos
  alternatives_spanish:
  - Medía cincuenta codos de largo
  - El largo era de cincuenta codos
  lexicon: HALOT
  rationale: La fórmula de medida se vierte de forma clara y formal en español. «Longitud» preserva el registro arquitectónico del pasaje.
- source_word: וְרֹחַב חָמֵשׁ וְעֶשְׂרִים אַמָּה
  english_pob_choice: and the width twenty-five cubits
  chosen_spanish: y la anchura de veinticinco codos
  alternatives_spanish:
  - y el ancho de veinticinco codos
  - y veinte y cinco codos de ancho
  lexicon: HALOT
  rationale: «Anchura» reproduce con naturalidad la medida correspondiente. Se mantiene el valor numérico explícito y la terminología de arquitectura.
theological_decisions:
- issue: Término arquitectónico אֵילָם en la visión del templo
  english_pob_reading: porch
  chosen_spanish_reading: pórtico
  alternative_spanish_readings:
  - vestíbulo
  - portal
  rationale: No hay carga doctrinal directa aquí, pero sí una decisión terminológica. «Pórtico» conserva el valor arquitectónico amplio que el inglés POB marcó con nota de alternativa; se evita una domesticación excesiva.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al término al que se refiere. La redacción conserva el paralelismo arquitectónico y las medidas sin añadir contenido no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se usa «codos» para אַמָּה, coherente con el uso bíblico estándar y con la medida técnica del pasaje.
  - Se mantiene «ventanas todo alrededor» para reflejar la duplicación hebrea סָבִיב סָבִיב.
  - Se preserva la simetría sintáctica de las dos cláusulas descriptivas y la frase final de medidas.
