lexical_decisions:
- source_word: בֵית לְבָאוֹת
  english_pob_choice: Beth-lebaoth
  chosen_spanish: Bet-lebaot
  alternatives_spanish:
  - Bet-lebaot
  - Bet-lebaot
  lexicon: HALOT
  rationale: Se trata de un topónimo; por eso se translitera. Conservar Bet- refleja el hebreo בֵית y mantiene la forma propia del nombre sin interpretarlo como una frase común.
- source_word: שָׁרוּחֶן
  english_pob_choice: Sharuhen
  chosen_spanish: Sharuhén
  alternatives_spanish:
  - Sharuhen
  - Saruhén
  lexicon: HALOT
  rationale: Se conserva el nombre de lugar en transliteración. El acento ayuda a la lectura en español sin alterar el valor toponímico. Se mantiene la forma del texto masorético, no la variante paralela.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - ciudades
  - pueblos
  lexicon: HALOT
  rationale: En listas de repartición territorial, עִיר suele verterse como 'ciudad' o 'ciudades'. Se mantiene el equivalente más convencional y fiel al registro de catálogo geográfico.
- source_word: שְׁלֹשׁ עֶשְׂרֵה
  english_pob_choice: thirteen
  chosen_spanish: trece
  alternatives_spanish:
  - trece
  - trece en total
  lexicon: HALOT
  rationale: El numeral cardinal se expresa de modo directo y natural en español, sin necesidad de ampliar la construcción hebrea.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus aldeas
  - sus poblados
  - sus asentamientos
  lexicon: HALOT
  rationale: En este contexto territorial, חָצֵר se refiere a asentamientos dependientes o satélites de las ciudades nombradas. 'Aldeas' comunica bien esa relación en español sin sobreinterpretar más allá del contexto.
translation_notes:
  revision_awareness: El texto hebreo base y el audit trail inglés coinciden en que se trata de una lista territorial sin revisiones sustantivas; se conserva la topografía y la variante textual documentada para Sharuhén.
  spanish_consistency_notes:
  - Se mantiene una transliteración consistente para topónimos hebreos con grafía adaptada al español.
  - '''Bet-'' preserva el elemento nominal hebreo del lugar; no se traduce como ''casa'' por tratarse de un nombre propio.'
  - '''Aldeas'' funciona como equivalente natural de ''villages'' en este contexto de reparto de territorio.'
