translation:
  language: es
  text: O si toca la impureza humana[a] —cualquier impureza por la cual uno se vuelve impuro— y le fue oculto[b], y llega a saberlo, entonces es culpable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inmundicia humana». El término hebreo se refiere, en este contexto legal, a impureza ritual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y le fue oculto»; es decir, no lo supo en el momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגַּע בְּ
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - entra en contacto con
  - contacta con
  lexicon: HALOT
  rationale: נגע con ב expresa contacto físico; en español, «toca» es la forma más directa y natural sin perder la referencia concreta al contacto.
- source_word: טֻמְאַת אָדָם
  english_pob_choice: human uncleanness
  chosen_spanish: la impureza humana
  alternatives_spanish:
  - la inmundicia humana
  - la impureza del ser humano
  lexicon: HALOT
  rationale: En contexto levítico, טֻמְאָה nombra una categoría ritual, no una culpa moral. «Impureza» conserva el campo cultual; «humana» refleja que אָדָם funciona aquí de manera genérica.
- source_word: לְכֹל טֻמְאָתוֹ
  english_pob_choice: any uncleanness
  chosen_spanish: cualquier impureza
  alternatives_spanish:
  - toda su impureza
  - cualquier inmundicia
  lexicon: HALOT
  rationale: La frase amplía la categoría a cualquier clase de impureza asociada con la fuente humana. «Cualquier impureza» mantiene la amplitud sin sonar forzado en español.
- source_word: אֲשֶׁר יִטְמָא בָּהּ
  english_pob_choice: by which one becomes unclean
  chosen_spanish: por la cual uno se vuelve impuro
  alternatives_spanish:
  - con la cual se hace impuro
  - por medio de la cual queda impuro
  lexicon: HALOT
  rationale: La cláusula relativa explica el efecto de la impureza. «Se vuelve impuro» conserva el valor pasivo/medio del hebreo y evita personalizar innecesariamente el pronombre.
- source_word: וְנֶעְלַם מִמֶּנּוּ
  english_pob_choice: and it is hidden from him
  chosen_spanish: y le ha pasado inadvertido
  alternatives_spanish:
  - y le fue oculto
  - y le quedó oculto
  lexicon: HALOT
  rationale: El nifal de עלם indica que el asunto quedó fuera de su percepción. «Le ha pasado inadvertido» reproduce la idea de ignorancia efectiva en un español idiomático y formal.
- source_word: וְהוּא יָדַע
  english_pob_choice: and he comes to know it
  chosen_spanish: y luego llega a saberlo
  alternatives_spanish:
  - y después lo sabe
  - y lo llega a conocer
  lexicon: HALOT
  rationale: El hebreo marca conocimiento posterior tras la ignorancia previa. «Llega a saberlo» comunica ese cambio de estado sin añadir contenido no presente en la fuente.
- source_word: וְאָשֵׁם
  english_pob_choice: he is guilty
  chosen_spanish: es culpable
  alternatives_spanish:
  - queda culpable
  - incurre en culpa
  lexicon: HALOT
  rationale: En este marco legal-sacrificial, אָשֵׁם expresa culpa/ responsabilidad incurrida. «Es culpable» es conciso, jurídico y fiel al desenlace del versículo.
theological_decisions:
- issue: Naturaleza de טֻמְאָה en Levítico
  english_pob_reading: Render as 'uncleanness' rather than a moralized term like 'sinfulness.'
  chosen_spanish_reading: Traducir como «impureza» y no como un término moralizado como «pecado» o «suciedad ritual».
  alternative_spanish_readings:
  - inmundicia
  - contaminación
  rationale: El pasaje trata de impureza ritual en un marco legal-sacrificial, no de una maldad moral en sí. «Impureza» preserva la categoría cultual y evita resolver una tensión que el texto no resuelve.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Valor genérico de אָדָם
  english_pob_reading: Translate generically as 'human' in the phrase 'human uncleanness.'
  chosen_spanish_reading: Usar «humana» en sentido genérico, sin convertirlo en un masculino exclusivo.
  alternative_spanish_readings:
  - del hombre
  - humana/ de la persona
  rationale: אָדָם aquí es genérico y no apunta específicamente a varón. «Humana» conserva la referencia general al ser humano y mantiene la precisión semántica exigida por la fuente.
  doctrine_reference: 'Contested terms table: אָדָם = man / humankind (context); Translation philosophy §4 gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa: mantiene la secuencia «se le pasó inadvertido / luego llega a saberlo / entonces es culpable» sin añadir un «entonces» intermedio antes del conocimiento, para conservar el flujo del original y la forma final del audit trail.'
  spanish_consistency_notes:
  - Se eligió «Yahvé» como convención del proyecto solo cuando el hebreo nombra el tetragrámaton; en este versículo no aparece.
  - «Impureza» se mantiene de manera consistente para טֻמְאָה en contexto ritual.
  - «Es culpable» refleja el valor legal de אָשֵׁם, evitando suavizarlo a una mera sensación de culpa.
  - La frase «llega a saberlo» conserva el cambio de estado cognitivo posterior a la ignorancia, como en el inglés auditado.
  - Los marcadores de nota a y b están anclados en el texto en los puntos correspondientes.
