id: GEN.2.19
reference: Genesis 2:19
source:
  edition: WLC
  text: וַ/יִּצֶר֩ יְהוָ֨ה אֱלֹהִ֜ים מִן הָֽ/אֲדָמָ֗ה כָּל חַיַּ֤ת הַ/שָּׂדֶה֙ וְ/אֵת֙ כָּל ע֣וֹף הַ/שָּׁמַ֔יִם וַ/יָּבֵא֙ אֶל הָ֣/אָדָ֔ם לִ/רְא֖וֹת מַה יִּקְרָא ל֑/וֹ וְ/כֹל֩ אֲשֶׁ֨ר יִקְרָא ל֧/וֹ הָֽ/אָדָ֛ם נֶ֥פֶשׁ חַיָּ֖ה ה֥וּא שְׁמֽ/וֹ־־־־־־־׃
translation:
  text: Now Yahweh God formed from the ground every wild animal and every bird of the sky[a], and he brought them to the man to see what he would call them. Whatever the man called each living creature[b], that was its name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'formed' instead of 'had formed.' The Hebrew verb can be rendered as a simple past; the past perfect reflects the likely prior action in context.
    reason: alternative_reading
  - marker: b
    text: Or 'Adam' for 'the man.' The Hebrew has ha'adam, literally 'the man.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּצֶר
  chosen: had formed
  alternatives:
  - formed
  - fashioned
  lexicon: HALOT
  rationale: Although the wayyiqtol form normally advances narrative with a simple past ('formed'), in this context English can naturally use a past perfect to reflect that the forming of the animals is prior to the bringing of them to the man, and to avoid implying a chronological contradiction with the creation sequence in Genesis 1. This is a discourse-sensitive but source-grounded rendering, not a paraphrase.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The compound divine title is conventionally and accurately rendered 'the LORD God.'
- source_word: מִן הָאֲדָמָה
  chosen: from the ground
  alternatives:
  - out of the ground
  - from the soil
  lexicon: HALOT
  rationale: אֲדָמָה refers to the ground/soil. 'From the ground' is natural English and preserves the connection with the man's origin from the ground in the surrounding context.
- source_word: כָּל חַיַּת הַשָּׂדֶה
  chosen: every wild animal
  alternatives:
  - every beast of the field
  - every animal of the field
  lexicon: HALOT
  rationale: The phrase denotes land animals associated with the open country/field. 'Wild animal' communicates the sense in readable modern English better than the traditional but less transparent 'beast of the field.'
- source_word: כָּל עוֹף הַשָּׁמַיִם
  chosen: every bird of the sky
  alternatives:
  - every bird of the heavens
  - every fowl of the air
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures, but in this context 'bird' is the most natural and likely sense. 'Of the sky' is clear modern English and close to the Hebrew.
- source_word: וַיָּבֵא אֶל הָאָדָם
  chosen: he brought them to the man
  alternatives:
  - he brought them to Adam
  lexicon: HALOT
  rationale: The verb is singular with a plural object understood from the preceding collective nouns. English requires the object to be explicit, hence 'them.' הָאָדָם here is best rendered 'the man' rather than the proper name 'Adam,' since the narrative is still exploiting the common-noun sense of אָדָם in close connection with אֲדָמָה.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to observe
  lexicon: HALOT
  rationale: 'A straightforward infinitive of purpose: God brought the animals to the man ''to see'' what he would call them.'
- source_word: מַה יִּקְרָא לוֹ
  chosen: what he would call them
  alternatives:
  - what he would call each one
  - what he would name them
  lexicon: HALOT
  rationale: קרא + ל can mean 'call/name.' Because the antecedent is plural, English idiom prefers 'them.' 'Call' preserves the lexical link with the repeated verb in the second clause.
- source_word: וְכֹל אֲשֶׁר יִקְרָא לוֹ הָאָדָם
  chosen: Whatever the man called each living creature
  alternatives:
  - And whatever the man called every living creature
  - Whatever the man named each living being
  lexicon: HALOT
  rationale: 'The clause is generalized: whatever the man called any given creature. English smooths the distributive sense with ''each'' while preserving the open-ended force of כֹל אֲשֶׁר.'
- source_word: נֶפֶשׁ חַיָּה
  chosen: living creature
  alternatives:
  - living being
  - living soul
  lexicon: HALOT
  rationale: In Genesis, נֶפֶשׁ חַיָּה refers to animate living creatures. 'Living creature' is the clearest modern rendering. 'Living soul' would import later theological associations not required by the Hebrew.
- source_word: הוּא שְׁמוֹ
  chosen: that was its name
  alternatives:
  - that became its name
  - that was his name
  lexicon: HALOT
  rationale: The pronoun refers back to the creature named. English idiom renders the verbless clause naturally as 'that was its name.' 'Its' fits the nonhuman referent in English.
