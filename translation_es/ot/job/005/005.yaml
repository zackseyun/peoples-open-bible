translation:
  language: es
  text: Los hambrientos comen su cosecha[a], y la toman aun de entre las espinas, y los sedientos jadean tras su riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y una trampa se traga su riqueza». El hebreo de la última cláusula es difícil; el texto principal sigue la lectura común que pone en paralelo «los hambrientos» con «los sedientos».'
    reason: alternative_reading
lexical_decisions:
- source_word: קְצִירוֹ
  english_pob_choice: his harvest
  chosen_spanish: su cosecha
  alternatives_spanish:
  - su cosecha recogida
  - su siega
  lexicon: HALOT
  rationale: קָצִיר puede referirse al producto cosechado; en español, «cosecha» comunica de modo natural el resultado del campo y conserva el posesivo «su».
- source_word: רָעֵב
  english_pob_choice: the hungry
  chosen_spanish: los hambrientos
  alternatives_spanish:
  - el hambriento
  - los que tienen hambre
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «Los hambrientos» mantiene el sentido colectivo e idiomático sin añadir una persona singular que el hebreo no exige.
- source_word: וְאֶל מִצִּנִּים יִקָּחֵהוּ
  english_pob_choice: and take it even from among the thorns
  chosen_spanish: y la toman aun de entre las espinas
  alternatives_spanish:
  - y la toman de entre las espinas
  - y la arrancan aun de entre las espinas
  lexicon: HALOT
  rationale: La imagen agrícola es difícil; «de entre las espinas» conserva el valor preposicional y la idea de una extracción pese a obstáculos. «Espinas» es el equivalente más natural en español para צִנִּים en este contexto.
- source_word: צִנִּים
  english_pob_choice: thorns
  chosen_spanish: espinas
  alternatives_spanish:
  - espinos
  - zarzas
  lexicon: HALOT
  rationale: En este entorno poético-agropecuario, «espinas» comunica el obstáculo punzante sin sobreinterpretar la clase exacta de planta.
- source_word: וְשָׁאַף
  english_pob_choice: pant after
  chosen_spanish: ansían
  alternatives_spanish:
  - jadean tras
  - suspiran por
  - sorben con avidez
  lexicon: HALOT
  rationale: El hebreo puede denotar jadear, ansiar o abalanzarse con avidez. En español, «ansían» preserva el matiz de deseo vehemente que encaja con el paralelismo y evita una imagen demasiado física donde el contexto parece metafórico.
- source_word: צַמִּים
  english_pob_choice: the thirsty
  chosen_spanish: los sedientos
  alternatives_spanish:
  - los que tienen sed
  - los sedientos
  lexicon: HALOT
  rationale: La lectura más común del consonantal es «los sedientos», que paraleliza bien con «los hambrientos» y mantiene el retrato de deseo insaciable.
- source_word: חֵילָם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - su hacienda
  - sus recursos
  lexicon: HALOT
  rationale: חֵיל puede significar riqueza, bienes o recursos; «riqueza» funciona bien en el contexto sapiencial y conserva el valor de posesión del sufijo plural.
theological_decisions:
- issue: Clausula final textual/lexicalmente debatida
  english_pob_reading: the thirsty pant after their wealth, with the alternative note that the final clause may read as a snare/trap swallowing their wealth.
  chosen_spanish_reading: los sedientos ansían su riqueza
  alternative_spanish_readings:
  - una trampa se traga su riqueza
  - la trampa devora su riqueza
  rationale: Se sigue la lectura principal del texto consonantal entendida como paralela a «los hambrientos». La alternativa se preserva como nota porque el hebreo final es difícil y el propio aparato inglés la documenta.
  doctrine_reference: Job 5:5; lexical/textual note in the POB audit trail
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el rastro auditado en inglés de la POB. No se requirieron cambios respecto a la última revisión registrada, y se mantuvo la lectura principal con nota alternativa para la cláusula final difícil.
  spanish_consistency_notes:
  - Se prefirió «espinas» para צִנִּים por claridad y naturalidad en español, sin perder la imagen de obstáculo.
  - Se mantuvo la paralela «los hambrientos / los sedientos» porque el propio audit trail inglés la considera la lectura común del pasaje.
  - El verbo «ansían» preserva el valor de deseo intenso de שָׁאַף sin forzar una traducción demasiado literal de «jadear» en un contexto poético.
