translation:
  language: es
  text: 'Y en Ecbatana[a], la fortaleza[b] que está en la provincia de Media, se halló un rollo, y esto estaba escrito en él como registro[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede transliterarse «Achmetha», forma más cercana al nombre arameo de Ecbatana.
    reason: lexical_alternative
  - marker: b
    text: O «ciudadela». El término arameo se refiere a un complejo fortificado real o administrativo.
    reason: lexical_alternative
  - marker: c
    text: O «memorando». El término denota un recuerdo escrito oficial o una nota archivística.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁתְּכַח
  english_pob_choice: was found
  chosen_spanish: se halló
  alternatives_spanish:
  - se encontró
  - fue hallado
  lexicon: HALOT
  rationale: El pasivo arameo expresa que el documento fue localizado en un archivo. «Se halló» mantiene la pasividad y suena natural en español formal sin añadir matiz interpretativo.
- source_word: אַחְמְתָא
  english_pob_choice: Ecbatana
  chosen_spanish: Ecbatana
  alternatives_spanish:
  - Acmeta
  - Achmetha
  lexicon: HALOT
  rationale: Se conserva la forma histórica más شنا/ reconocible en español, en línea con la elección inglesa, porque identifica la capital meda para el lector moderno.
- source_word: בִּירְתָא
  english_pob_choice: the fortress
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la ciudadela
  - la fortificación
  lexicon: HALOT
  rationale: El término arameo denota un complejo fortificado administrativo o real. «Fortaleza» comunica ese núcleo semántico con naturalidad; «ciudadela» sería posible, pero algo más específico y menos amplio.
- source_word: דִּי בְּמָדַי מְדִינְתָּה
  english_pob_choice: that is in the province of Media
  chosen_spanish: que está en la provincia de Media
  alternatives_spanish:
  - que se halla en la provincia de Media
  - en la provincia de Media
  lexicon: HALOT
  rationale: La relativa se conserva explícitamente para reflejar la designación administrativa. «Provincia» mantiene el valor político-administrativo del arameo y coincide con la lectura inglesa.
- source_word: מְגִלָּה חֲדָה
  english_pob_choice: a scroll
  chosen_spanish: un rollo
  alternatives_spanish:
  - un pergamino
  - un rollo escrito
  lexicon: HALOT
  rationale: En español bíblico «rollo» comunica bien el soporte escrito antiguo sin forzar una equivalencia técnica moderna. Se evita sobrecargar con «pergamino», que no está exigido por el término.
- source_word: וְכֵן כְּתִיב
  english_pob_choice: and this was written
  chosen_spanish: y en él estaba escrito
  alternatives_spanish:
  - y así estaba escrito
  - y esto estaba escrito
  lexicon: HALOT
  rationale: La construcción española fluye de modo natural al introducir el contenido documental. Se mantiene la deixis de «en él» y el valor pasivo de «estaba escrito».
- source_word: בְּגַוַּהּ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - en su interior
  lexicon: HALOT
  rationale: El referente inmediato es el rollo, masculino en español. «En él» es la forma más directa y idiomática para el texto archivístico.
- source_word: דִּכְרוֹנָה
  english_pob_choice: as a record
  chosen_spanish: como memoria
  alternatives_spanish:
  - como recordatorio
  - como registro
  - como memorial
  lexicon: HALOT
  rationale: El sustantivo arameo apunta a un escrito memorial o recordatorio oficial. «Memoria» conserva ese campo semántico y permite una traducción sobria; «registro» sería también posible, pero desplaza más el énfasis hacia lo administrativo moderno.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión; no se registran correcciones textuales relevantes para este versículo.
  spanish_consistency_notes:
  - Se conserva «Ecbatana» como nombre histórico estándar, con nota de transliteración alternativa.
  - Se evita «SEÑOR» o terminología de máscara porque el versículo no contiene el Tetragrámaton ni referencias divinas directas.
  - «Rollo» y «memoria» preservan el tono documental del pasaje sin introducir vocabulario eclesiástico posterior.
  - 'La puntuación introduce dos pausas naturales: primero la localización del hallazgo, luego la cláusula que introduce el contenido del documento.'
