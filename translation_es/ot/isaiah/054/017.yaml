translation:
  language: es
  text: Ningún arma formada contra ti prosperará, y toda lengua que se levante contra ti en juicio, tú la condenarás[a]. Esta es la herencia de los siervos de Yahvé, y su justicia[b] procede de mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la declararás culpable’. El verbo hebreo puede significar declarar a alguien culpable o condenarlo en sentido jurídico.
    reason: lexical_alternative
  - marker: b
    text: O ‘su vindicación procede de mí’. El hebreo puede tener un sentido forense en este contexto legal.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּלִי
  english_pob_choice: weapon
  chosen_spanish: arma
  alternatives_spanish:
  - arma ofensiva
  - instrumento
  - utensilio
  lexicon: HALOT
  rationale: En este contexto de hostilidad y de algo 'formado contra ti', español natural exige un término que indique un implemento de ataque. 'Arma' conserva la fuerza semántica de 'weapon' mejor que 'instrumento' o 'utensilio'.
- source_word: יוּצַר
  english_pob_choice: formed
  chosen_spanish: formada
  alternatives_spanish:
  - forjada
  - hecha
  - moldeada
  lexicon: HALOT
  rationale: El pasivo de יצר expresa algo modelado o hecho con intención. 'Formada' es fiel y natural en español sin restringir indebidamente el material o el modo de fabricación.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: El contexto es hostil y judicial, así que la relación preposicional se expresa mejor como 'contra ti' en español, no con un valor meramente espacial.
- source_word: יִצְלָח
  english_pob_choice: will succeed
  chosen_spanish: prosperará
  alternatives_spanish:
  - tendrá éxito
  - prevalecerá
  lexicon: HALOT
  rationale: El verbo puede significar prosperar o tener éxito. 'Prosperará' mantiene el alcance del hebreo y suena más bíblico y natural que una expresión demasiado técnica.
- source_word: לָשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - acusación
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. 'Lengua' reproduce bien el paralelismo y la imagen de una acusación verbal.
- source_word: תָּקוּם
  english_pob_choice: rises
  chosen_spanish: se levante
  alternatives_spanish:
  - se alce
  - surja
  lexicon: HALOT
  rationale: En un contexto de disputa legal, קום expresa surgir o ponerse en pie contra alguien. 'Se levante' conserva la imagen y suena idiomático en español.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en juicio
  alternatives_spanish:
  - para juicio
  - ante el juicio
  - en tribunal
  lexicon: HALOT
  rationale: La expresión tiene un valor forense. 'En juicio' comunica bien el ámbito legal sin forzar una referencia moderna demasiado específica.
- source_word: תַּרְשִׁיעִי
  english_pob_choice: you will condemn
  chosen_spanish: la condenarás
  alternatives_spanish:
  - la declararás culpable
  - la harás culpable
  lexicon: HALOT
  rationale: El hiphil de רשע significa declarar culpable o condenar. 'La condenarás' preserva la fuerza jurídica y mantiene el paralelismo con la lengua acusadora.
- source_word: נַחֲלַת
  english_pob_choice: heritage
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - posesión heredada
  - heredad
  lexicon: HALOT
  rationale: '''Herencia'' transmite bien la idea de posesión recibida por derecho de pacto y es claro para lectores contemporáneos; conserva el tono de pertenencia heredada.'
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: HALOT
  rationale: Aunque el giro puede entenderse como título de pacto, el proyecto privilegia 'esclavo' cuando el léxico עבד lo permite y la fuerza del término debe mantenerse. 'Esclavos' conserva esa fuerza lexémica mejor que 'siervos'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé''. Preserva el nombre divino personal en lugar de sustituirlo por un título.'
- source_word: צִדְקָתָם
  english_pob_choice: their righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su vindicación
  - su rectitud
  lexicon: HALOT
  rationale: En español, 'justicia' mantiene el campo semántico de צדק y puede abarcar el matiz forense sin eliminar la lectura ética. En nota se preserva la alternativa 'vindicación' porque el contexto legal la hace plausible.
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: procede de mí
  alternatives_spanish:
  - viene de mí
  - es de mí
  lexicon: HALOT
  rationale: '''Procede de mí'' expresa origen y fuente de manera elegante y clara en español, y refuerza que la justicia/ vindicación no se origina en los fieles sino en Yahvé.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de forma sobria como 'declara Yahvé', equivalente a 'declares Yahweh' y apropiada para un registro bíblico contemporáneo.
theological_decisions:
- issue: Valor de צִדְקָתָם en la cláusula final
  english_pob_reading: their righteousness is from me
  chosen_spanish_reading: su justicia procede de mí
  alternative_spanish_readings:
  - su vindicación procede de mí
  - su rectitud procede de mí
  rationale: El hebreo puede aludir tanto a justicia/rectitud como a vindicación forense. La redacción principal conserva 'justicia' por coherencia léxica con צדק y porque el sentido jurídico no se pierde con 'procede de mí'. La alternativa 'vindicación' se mantiene implícitamente para no borrar la tensión entre cualidad moral y sentencia favorable.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; principio análogo al tratamiento de justicia/rectitud/vindicación en vocabulario de צדק.'
- issue: Traducción de עַבְדֵי יְהוָה
  english_pob_reading: the servants of Yahweh
  chosen_spanish_reading: los esclavos de Yahvé
  alternative_spanish_readings:
  - los siervos de Yahvé
  rationale: Se mantiene la fuerza del sustantivo עבד sin suavizarlo automáticamente. Aunque puede funcionar como título de pacto, el texto no exige atenuarlo; por eso se conserva 'esclavos' en el cuerpo del versículo.
  doctrine_reference: 'DOCTRINE.md: no suavizar léxicos de subordinación sin justificación contextual; preservar fuerza semántica cuando el original lo permite.'
translation_notes:
  revision_awareness: 'La revisión más reciente del archivo inglés no introdujo cambios; el estado final quedó como acuerdo alto y sin modificaciones. La versión española refleja ese texto estable y conserva las dos ambigüedades relevantes: el valor forense de תַּרְשִׁיעִי y la posible lectura de צִדְקָתָם como justicia o vindicación.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה en todo el versículo.
  - Se usa 'arma' y 'lengua' para conservar el paralelismo hebreo y el registro bíblico.
  - Se conservó la tensión entre justicia moral y vindicación forense en la cláusula final.
  - Se prefirió 'esclavos' por la política terminológica solicitada para עבד, en contraste con el inglés POB que optó por 'servants'.
