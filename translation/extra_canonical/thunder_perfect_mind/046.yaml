lexical_decisions:
- source_word: ⲧⲉⲙⲛⲧⲉⲥⲉⲓⲛⲉ ⲙⲙⲁⲩ
  chosen: why have you hated me
  alternatives:
  - why have you despised me
  - why do you hate me
  lexicon: Crum, Coptic Dictionary (general sense of hatred/despising; phrase-level
    inference)
  rationale: Fits the well-attested rhetorical question in this passage and balances
    the love/hate antithesis that follows.
- source_word: ⲛⲃⲁⲣⲃⲁⲣⲟⲥ
  chosen: the barbarians
  alternatives:
  - foreigners
  - outsiders
  lexicon: Greek loan in Coptic; standard meaning
  rationale: Greek loanword ‘barbaros’ is transparent in Coptic; preserving ‘barbarian(s)’
    keeps the cultural tension of Greek vs. non-Greek.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  chosen: I am
  alternatives:
  - it is I
  - I indeed am
  lexicon: Standard Coptic copular emphasis
  rationale: Maintain the poem’s repeated “I am” cadence rather than smoothing to
    English idiom.
- source_word: ⲛⲧⲁⲩⲙⲉⲥⲧⲱⲥ
  chosen: they have hated
  alternatives:
  - they have despised
  - they reviled
  lexicon: Contextual; parallels in Thunder’s antithetical pairs
  rationale: Chosen to pair cleanly with ‘loved’ in the next line to preserve the
    stark antithesis.
- source_word: ⲛⲧⲁⲩⲙⲉⲣⲓⲧⲥ
  chosen: they have loved
  alternatives:
  - they have desired
  - they valued
  lexicon: Coptic mer- root for love/affection (contextual)
  rationale: The love/hate parallel is a hallmark of the poem; ‘loved’ keeps the force
    of the contrast.
- source_word: ϩⲛ ⲙⲁⲛⲓⲙ
  chosen: in many places
  alternatives:
  - among peoples
  - in places
  - everywhere
  lexicon: Contextual; form likely a locative plural expression
  rationale: Repeated phrase suggests location-distribution; ‘in many places’ preserves
    the breadth without overclaiming universality.
- source_word: ⲙⲟⲩⲧⲉ ⲉⲣⲟⲛ/ⲉⲣⲟⲥ
  chosen: call (me)
  alternatives:
  - name (me)
  - label (me)
  lexicon: Coptic verb ‘moute’ = to call/name
  rationale: ‘Call’ is the most straightforward English for naming/labeling in this
    formulaic line.
- source_word: ⲡⲙⲟⲩ
  chosen: Death
  alternatives:
  - the death
  - death
  lexicon: Standard Coptic noun
  rationale: Capitalized to signal the titular sense used in the poem’s self-namings.
- source_word: ϣⲁⲩⲙⲟⲩⲧⲉ
  chosen: they will call
  alternatives:
  - they shall call
  - they have called
  lexicon: Coptic future marker ϣⲁ- (prospective); morphology can vary by dialect
  rationale: Read as prospective; marked as uncertain given OCR and dialectal variation.
- source_word: ⲡⲛⲟⲙⲟⲥ
  chosen: the Law
  alternatives:
  - Law
  - custom
  - norm
  lexicon: Greek ‘nomos’ as a Coptic loan
  rationale: ‘The Law’ preserves the Greek cultural-legal nuance likely intended by
    the title.
parallelism_check: 'The rendering keeps the rhetorical question pair (hate/Greeks
  → barbarian/barbarians) and the subsequent balanced antitheses: “they have hated
  … in many places / they have loved … in many places,” followed by two parallel naming
  lines: “I am the one they call ‘Death’ / … they will call ‘the Law.’” The repeated
  “I am the one …” formula is preserved to maintain cadence and structural symmetry.'
voice_check: 'The first-person, declarative, paradox-embracing voice is preserved:
  direct address (“you Greeks”), self-identification (“I am”), and self-naming (“they
  call me ‘Death’ … ‘the Law’”). The tone remains sharp and strange rather than explanatory.'
