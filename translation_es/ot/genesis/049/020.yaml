translation:
  language: es
  text: La comida de Asher será abundante[a], y él dará manjares reales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El pan de Asher será rico/graso, y él dará delicias de rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאָשֵׁר
  english_pob_choice: Asher's / From Asher
  chosen_spanish: de Asher
  alternatives_spanish:
  - de parte de Asher
  - procedente de Asher
  lexicon: HALOT
  rationale: La preposición con el nombre propio expresa origen o pertenencia tribal. En español, 'de Asher' conserva esa relación sin forzar una paráfrasis. Se evita añadir un verbo inexistente en hebreo.
- source_word: שְׁמֵנָה
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - graso
  - abundante
  - fértil
  lexicon: HALOT
  rationale: El adjetivo apunta a riqueza, abundancia o gordura en sentido de prosperidad. 'Rico' comunica bien la idea aplicada al pan/alimento en español actual, mientras 'graso' suena más físico o culinario y 'abundante' pierde el matiz de calidad/untuosidad.
- source_word: לַחְמוֹ
  english_pob_choice: food
  chosen_spanish: el pan
  alternatives_spanish:
  - su pan
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aunque לֶחֶם puede ampliarse a alimento, el paralelismo con la segunda línea permite mantener 'pan' sin empobrecer el sentido. En español, 'el pan de Asher' refleja bien la provisión o producción de Asher y conserva la imagen concreta del hebreo.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - y él mismo
  - y también él
  lexicon: HALOT
  rationale: El pronombre independiente refuerza el sujeto. 'Y él' reproduce con naturalidad ese énfasis sin sobrecargar la frase.
- source_word: יִתֵּן
  english_pob_choice: will provide
  chosen_spanish: dará
  alternatives_spanish:
  - proveerá
  - dará como provisión
  lexicon: HALOT
  rationale: El verbo básico es 'dar'. En el contexto poético de bendición, 'dará' es suficiente y evita introducir una noción interpretativa adicional; el contenido de provisión se entiende por el objeto.
- source_word: מַעֲדַנֵּי
  english_pob_choice: delicacies
  chosen_spanish: delicias
  alternatives_spanish:
  - manjares
  - exquisiteces
  - golosinas
  lexicon: HALOT
  rationale: El término alude a cosas delicadas, agradables, lujosas o sabrosas, especialmente alimentos selectos. 'Delicias' es una opción digna y clara; 'manjares' sería válida pero algo más marcada en registro.
- source_word: מֶלֶךְ
  english_pob_choice: royal / of a king
  chosen_spanish: reales
  alternatives_spanish:
  - de rey
  - regias
  lexicon: HALOT
  rationale: El constructo indica pertenencia o relación con un rey. 'Reales' funciona como adjetivo natural en español y conserva la idea de comida digna de la mesa real.
translation_notes:
  revision_awareness: La revisión inglesa reciente optó por una construcción más directa de pertenencia ('Asher's food will be rich') frente a una lectura más expansiva de origen ('From Asher comes'). La versión española sigue esa dirección y conserva el futuro, la imagen de pan/alimento rico y el cierre de delicias reales.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - '''Pan'' se emplea como imagen concreta de provisión sin excluir el sentido más amplio de alimento.'
  - '''Reales'' preserva la relación con el rey sin requerir una perífrasis más pesada.'
  - 'La nota al pie conserva la alternativa lexical principal del hebreo: ''graso/abundante'' y ''delicias de rey''.'
