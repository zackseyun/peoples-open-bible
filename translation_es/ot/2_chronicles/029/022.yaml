  rationale: Se reemplaza 'rociaron' por 'salpicaron' para reflejar mejor la fuerza ritual de ויזרקו según el expediente inglés y el uso sacrificial hebreo. Además, se añade la nota léxica correspondiente para preservar las alternativas documentadas y evitar que el español sugiera una aspersión suave.
