translation:
  language: es
  text: Y su esposa la judía[a] dio a luz a Jered, padre de Gedor,[b] y a Heber, padre de Soco, y a Jecutiel, padre de Zanoah. Estos son los hijos de Bitiya, hija de Faraón[c], a quien Mered tomó por esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''la mujer judeana'' o ''la mujer judía''.'
    reason: lexical_alternative
  - marker: b
    text: '''Padre de'' en Crónicas también puede significar fundador, antepasado o jefe de clan asociado con un lugar.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo es difícil: la relación entre ''su esposa la judía'' y ''Bitiya, hija de Faraón'' se debate; algunos entienden que se trata de la misma mujer, otros de dos esposas distintas de Mered.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַיְהֻדִיָּה
  english_pob_choice: the Jewess
  chosen_spanish: la judía
  alternatives_spanish:
  - la judeana
  - la mujer judía
  lexicon: HALOT
  rationale: El femenino gentilicio de יהודי se entiende mejor en español como 'la judía'. Mantiene el valor étnico del término sin introducir una paráfrasis más larga. 'Judeana' es posible, pero puede sonar más geográfico que el hebreo en este contexto genealógico.
- source_word: יָלְדָה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: HALOT
  rationale: En genealogías, ילד expresa el acto de dar a luz. 'Dio a luz' es natural en español moderno y conserva el sentido biológico sin forzar un calco inglés.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: padre de
  alternatives_spanish:
  - fundador de
  - antepasado de
  lexicon: HALOT
  rationale: En Crónicas, la expresión puede señalar padre, fundador o jefe de clan asociado con un lugar. Se mantiene 'padre de' para preservar el giro hebreo y no resolver más de lo que el texto decide.
- source_word: שׂוֹכ֔וֹ
  english_pob_choice: Soco
  chosen_spanish: Soco
  alternatives_spanish:
  - Sokó
  - Socoh
  lexicon: HALOT
  rationale: Se conserva la transliteración convencional del topónimo. 'Soco' coincide con el uso habitual en español bíblico y evita variar innecesariamente el nombre.
- source_word: יְקֽוּתִיאֵל
  english_pob_choice: Jekuthiel
  chosen_spanish: Jecutiel
  alternatives_spanish:
  - Jekutiel
  - Yecutiel
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación ortográfica española para facilitar la lectura, manteniendo reconocible la forma hebrea.
- source_word: זָנ֑וֹחַ
  english_pob_choice: Zanoah
  chosen_spanish: Zanoah
  alternatives_spanish:
  - Zanoj
  - Zanóaj
  lexicon: HALOT
  rationale: Se mantiene la transliteración convencional del nombre de lugar. No hay motivo para alterar la forma estándar.
- source_word: בְּנֵי
  english_pob_choice: sons
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'hijos', en español genealógico 'los hijos de' suena más natural que 'los varones de'. Además, el texto sigue con una identificación familiar que puede abarcar descendencia/clan, sin necesidad de restringirlo demasiado.
- source_word: בִּתְיָה בַת פַּרְעֹה
  english_pob_choice: Bithiah daughter of Pharaoh
  chosen_spanish: Bitiya, hija de Faraón
  alternatives_spanish:
  - Bitía, hija de Faraón
  - Bitiya, la hija de Faraón
  lexicon: HALOT
  rationale: Se conserva la relación posesiva explícita del hebreo ('hija de Faraón') y se adapta el nombre a una forma legible en español. La puntuación separa el nombre del appositivo sin imponer una identificación interpretativa.
- source_word: לָקַח
  english_pob_choice: took as wife
  chosen_spanish: tomó por esposa
  alternatives_spanish:
  - tomó
  - se casó con
  lexicon: HALOT
  rationale: En contexto matrimonial, לקח indica tomar a una mujer como esposa. 'Tomó por esposa' es una fórmula natural en español y comunica el sentido marital sin perder la literalidad básica del verbo.
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Y he aquí
  lexicon: HALOT
  rationale: La fórmula introductoria se vierte con una expresión breve y fluida en español. Se omite la 'y' inicial para lograr un arranque natural, como hace la auditoría inglesa.
theological_decisions:
- issue: Tensión genealógica entre 'su esposa la judía' y 'Bitiya, hija de Faraón'
  english_pob_reading: Retain the Hebrew sequence without harmonizing the apparent genealogical tension; present Bithiah as the woman whom Mered took as wife and leave the relationship as stated.
  chosen_spanish_reading: 'Se conserva la secuencia hebrea sin armonizar la tensión aparente: la traducción presenta a la esposa judía y luego a Bitiya, hija de Faraón, dejando abierta la relación exacta entre ambas menciones.'
  alternative_spanish_readings:
  - Identificar a la judía con Bitiya
  - Reformular para distinguir con claridad dos esposas
  rationale: El hebreo es sintácticamente difícil y la tradición de interpretación no es unánime. La traducción debe mantener la dificultad textual en vez de resolverla artificialmente. La cláusula final 'a quien Mered tomó por esposa' refleja el sentido marital de לקח sin cerrar la cuestión identitaria.
  doctrine_reference: Preservar la tensión interpretativa del texto en lugar de armonizarla sin base textual.
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; se mantuvo la lectura auditada de alto acuerdo, conservando la tensión genealógica y la traducción marital de לקח.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma de proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantuvo 'padre de' para אֲבִי conforme al giro cronístico y su posible valor de fundador o jefe de clan.
  - Se evitó 'Cristo' o terminología confesional no presente en el texto.
  - Se transliteraron los nombres propios de manera consistente y legible para el español bíblico.
