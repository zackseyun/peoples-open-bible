translation:
  language: es
  text: Ahora bien, el consejo de Ahitofel que él daba en aquellos días era como si se consultara a Dios[a]; así era todo el consejo de Ahitofel, tanto para David como para Absalón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como cuando uno consulta a Dios». El hebreo compara la calidad y autoridad del consejo con consultar a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַת
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - asesoramiento
  - plan
  lexicon: HALOT
  rationale: El sustantivo apunta a la deliberación o consejo dado por un consejero. «Consejo» conserva el registro formal y cortesano, y permite repetir el término como en el hebreo.
- source_word: יָעַץ
  english_pob_choice: he gave
  chosen_spanish: daba
  alternatives_spanish:
  - daba su consejo
  - aconsejaba
  lexicon: HALOT
  rationale: En español, «el consejo ... que él daba» suena natural y mantiene la idea verbal de proporcionar consejo sin forzar una forma poco idiomática como «aconsejaba el consejo».
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: Es una expresión temporal estándar y solemne en español, equivalente natural de la fórmula hebrea.
- source_word: כַּאֲשֶׁר יִשְׁאַל בִּדְבַר הָאֱלֹהִים
  english_pob_choice: as if one inquired of God
  chosen_spanish: como si se consultara a Dios
  alternatives_spanish:
  - como cuando uno consulta a Dios
  - como si se preguntara a Dios
  lexicon: HALOT
  rationale: La comparación hebrea no identifica el consejo con revelación divina, sino que lo pone al nivel de consultar a Dios. «Se consultara a Dios» comunica bien la fuerza del símil en español y conserva la tensión teológica.
- source_word: כֵּן
  english_pob_choice: so was
  chosen_spanish: así era
  alternatives_spanish:
  - así fue
  - de ese modo era
  lexicon: HALOT
  rationale: Introduce la correspondencia de manera breve y clara, con el mismo valor resultativo del hebreo.
- source_word: כָּל עֲצַת אֲחִיתֹפֶל
  english_pob_choice: all the counsel of Ahithophel
  chosen_spanish: todo el consejo de Ahitofel
  alternatives_spanish:
  - todo el consejo de Ahitofel
  - cada consejo de Ahitofel
  lexicon: HALOT
  rationale: «Todo el consejo» conserva la estructura repetida del hebreo y el sentido colectivo del sustantivo.
- source_word: גַּם לְדָוִד גַּם לְאַבְשָׁלֹם
  english_pob_choice: both to David and to Absalom
  chosen_spanish: tanto para David como para Absalón
  alternatives_spanish:
  - tanto a David como a Absalón
  - para David y para Absalón
  lexicon: HALOT
  rationale: La correlación hebrea גַּם ... גַּם se expresa bien con «tanto ... como ...». «Para» refleja adecuadamente la relación de consejo dirigido a cada uno.
theological_decisions:
- issue: Alcance de la comparación con consultar a Dios
  english_pob_reading: Ahithophel’s counsel is described as being regarded with the authority and reliability of an inquiry of God, without asserting that it was itself inspired revelation.
  chosen_spanish_reading: El texto compara la autoridad percibida del consejo de Ahitofel con la de consultar a Dios, sin afirmar que su consejo fuera revelación divina.
  alternative_spanish_readings:
  - Solo afirma que su consejo era muy estimado.
  - Implica que su consejo funcionaba prácticamente como un oráculo.
  rationale: El hebreo usa una comparación, no una identificación. La traducción mantiene el símil y evita resolver la tensión teológica, respetando la fuerza extraordinaria atribuida al consejo.
  doctrine_reference: Preservar la tensión teológica sin suavizarla ni exagerarla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el ajuste reciente del audit trail inglés: se evita introducir «la palabra de Dios» y se conserva la comparación directa con consultar a Dios, que refleja con mayor precisión בִּדְבַר הָאֱלֹהִים como una consulta sobre la cuestión divina, no una cita literal de «palabra».'
  spanish_consistency_notes:
  - Se mantiene «Ahitofel» sin acento por consistencia onomástica en español bíblico habitual del proyecto.
  - Se usa «Dios» en lugar de una circunlocución, porque el hebreo habla de consultar a Dios, no de una fórmula de sustitución del nombre divino.
  - «Consejo» se repite dos veces para reflejar la repetición del hebreo y no borrar el paralelismo.
  - «Tanto ... como ...» conserva la doble aplicación a David y a Absalón.
