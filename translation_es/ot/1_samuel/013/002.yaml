  language: en
  yaml_path: translation/ot/1_samuel/013/002.yaml
  text: And Saul chose for himself three thousand men from Israel[a]. Two thousand were with Saul at Michmash and in the hill country of Bethel, and a thousand were with Jonathan at Gibeah of Benjamin. The rest of the people he sent away[b], each man to his tent.
  footnotes:
