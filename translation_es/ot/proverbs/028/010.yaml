translation:
  language: es
  text: Quien desvía a los rectos por un mal camino él mismo caerá en su propia fosa[a], pero los íntegros heredarán el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su propia destrucción» o «su propia ruina». El término hebreo puede denotar una fosa o una ruina/destrucción; el texto principal conserva la imagen de trampa.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁגֶּה
  english_pob_choice: Whoever leads ... astray
  chosen_spanish: Quien desvía
  alternatives_spanish:
  - Quien lleva ... por mal camino
  - Quien hace errar
  lexicon: HALOT
  rationale: El participio causativo expresa a quien hace extraviar a otros; en español, «Quien desvía» conserva la fuerza causal y suena natural en un proverbio general.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: El término sapiencial apunta a personas moralmente rectas; «los rectos» mantiene la imagen ética básica y es idiomático en español.
- source_word: בְּדֶרֶךְ רָע
  english_pob_choice: in an evil way
  chosen_spanish: por un camino malo
  alternatives_spanish:
  - en un camino malo
  - por un mal camino
  lexicon: HALOT
  rationale: דֶרֶךְ conserva la metáfora de camino/conducta. En español, «por un camino malo» refleja bien el medio o modo del desvío sin perder naturalidad.
- source_word: בִּשְׁחוּתוֹ
  english_pob_choice: into his own pit
  chosen_spanish: en su propia fosa
  alternatives_spanish:
  - en su propia destrucción
  - en su propio hoyo
  - en su propia ruina
  lexicon: HALOT
  rationale: El término hebreo puede significar fosa, foso o ruina. Se preserva la imagen concreta de trampa/caída con «fosa», y el posesivo refleja el sufijo pronominal.
- source_word: הוּא יִפּוֹל
  english_pob_choice: will himself fall
  chosen_spanish: caerá
  alternatives_spanish:
  - él mismo caerá
  - caerá él mismo
  lexicon: HALOT
  rationale: El pronombre explícito en hebreo añade énfasis; en español se puede mantener implícito en el contexto proverbial, evitando una rigidez innecesaria.
- source_word: וּתְמִימִים
  english_pob_choice: but the blameless
  chosen_spanish: pero los intachables
  alternatives_spanish:
  - pero los irreprensibles
  - pero los blameless
  lexicon: HALOT
  rationale: תְמִימִים en sabiduría suele denotar integridad o ausencia de culpa. «Intachables» comunica bien esa cualidad en español contemporáneo.
- source_word: יִנְחֲלוּ
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - recibirán como herencia
  lexicon: HALOT
  rationale: «Heredarán» preserva el valor de נחל como recibir en posesión hereditaria, sin perder la resonancia sapiencial y de don recibido.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - bendición
  - prosperidad
  lexicon: HALOT
  rationale: El sustantivo es amplio y no especifica si se trata de prosperidad material o bien moral; «el bien» mantiene esa amplitud y evita sobreinterpretación.
theological_decisions:
- issue: Imagen de retribución en בִּשְׁחוּתוֹ
  english_pob_reading: Concrete metaphor 'his own pit' retained in the main text
  chosen_spanish_reading: Se mantiene la imagen concreta de «su propia fosa»
  alternative_spanish_readings:
  - su propia destrucción
  - su propia ruina
  rationale: El proverbio expresa justicia retributiva mediante imagen de trampa/caída. Conservar la fosa evita diluir la metáfora en un sentido abstracto y respeta el lenguaje sapiencial.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el control cruzado indicó alta concordancia con observaciones menores. La redacción española sigue la decisión auditada de preservar la metáfora concreta de la fosa y la amplitud semántica de טוֹב como «el bien».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando formulaciones eclesiásticas tradicionales no requeridas por la fuente.
  - «Rectos», «intachables» y «el bien» conservan el paralelismo sapiencial sin introducir matices doctrinales ajenos al verso.
  - La nota de pie de página está anclada en «fosa» para preservar la alternativa semántica documentada en el POB inglés.
