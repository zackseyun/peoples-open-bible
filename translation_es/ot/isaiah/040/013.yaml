revisions:
- from: ¿Quién ha medido el Espíritu de Yahvé[a][b], o qué hombre ha hecho saber su consejo a él?
  to: ¿Quién ha medido el Espíritu de Yahvé[a][b], o qué hombre le ha dado a conocer su consejo?
  rationale: Se reemplaza «ha hecho saber su consejo a él» por «le ha dado a conocer su consejo» para lograr un español más natural y fiel a la función causativa del verbo hebreo, sin alterar el sentido ni la documentación léxica del POB.
