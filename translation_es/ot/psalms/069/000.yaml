translation:
  language: es
  text: 'Para el director musical: según «Lirios»[a]. De David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «al son de Lirios»; la expresión probablemente nombra una melodía o un estilo musical.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo «De David» puede indicar autoría, dedicación o asociación; por sí solo no resuelve la cuestión.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de canto
  - Al director musical
  lexicon: HALOT
  rationale: En encabezamientos de salmos, la expresión introduce una indicación musical/litúrgica dirigida al responsable de la ejecución. «Director del coro» comunica bien la función en español sin forzar una formulación demasiado técnica o arcaica.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con la melodía de
  - al son de
  lexicon: HALOT
  rationale: En superscripciones musicales, la preposición puede señalar una melodía, estilo o indicación de interpretación. «Según» preserva esa relación flexible sin decidir demasiado entre título, melodía o modo.
- source_word: שׁוֹשַׁנִּים
  english_pob_choice: Lilies
  chosen_spanish: «Lirios»
  alternatives_spanish:
  - «Lirios»
  - lirios
  - «Las Lirios»
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «lirios». En un encabezamiento de salmo probablemente funciona como nombre de una melodía o estilo. Se conserva el término traducido y entre comillas para señalar su posible valor de título sin transliterarlo.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos de salmos puede indicar autoría, dedicación o asociación. «De David» conserva mejor esa ambigüedad que «Por David», que sería más resolutivo, o «Para David», que suena menos natural aquí.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la colocación de la nota sobre «Of David», moviéndola al final de esa frase. La versión española sigue esa misma distribución: la nota [a] queda en «Lirios» y la nota [b] en «De David».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en otros contextos, pero este versículo no lo contiene.
  - Se evita «SEÑOR» porque aquí no hay יהוה en el texto fuente.
  - «Director del coro» conserva la función litúrgico-musical del encabezamiento sin introducir una equivalencia demasiado cerrada.
