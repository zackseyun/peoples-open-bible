translation:
  language: es
  text: Escuchen y den testimonio contra la casa de Jacob[a], declara el Señor Yahvé[b], Dios de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atestigüen contra la casa de Jacob»; el verbo hebreo puede tener el sentido jurídico de dar testimonio o prestar testimonio contra alguien.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Adonai YHWH». Se traduce «el Señor Yahvé» para reflejar el título אֲדֹנָי junto con el nombre divino יְהוָה, que en esta serie se vierte «Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: ¡Escuchen!
  alternatives_spanish:
  - Oigan
  - Escuchad
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide un llamado profético dirigido al pueblo. «Escuchen» conserva el tono solemne y es natural en español actual; «Oigan» sería más directo, pero algo menos elevado en este contexto.
- source_word: וְהָעִידוּ
  english_pob_choice: testify against
  chosen_spanish: den testimonio contra
  alternatives_spanish:
  - testifiquen contra
  - den testimonio
  - declaren contra
  lexicon: HALOT
  rationale: El verbo puede expresar testimonio en sentido jurídico. En español, «dar testimonio contra» reproduce bien esa fuerza forense sin añadir una paráfrasis excesiva.
- source_word: בְּבֵית יַעֲקֹב
  english_pob_choice: against the house of Jacob
  chosen_spanish: la casa de Jacob
  alternatives_spanish:
  - contra la casa de Jacob
  - en la casa de Jacob
  - a la casa de Jacob
  lexicon: HALOT
  rationale: La preposición hebrea admite valor hostil/forense en este contexto, pero en español la idea ya queda marcada por «den testimonio contra». Por eso se conserva «la casa de Jacob» como designación pactal de Israel, sin repetir innecesariamente la preposición de oposición.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - pronuncia
  lexicon: HALOT
  rationale: La fórmula profética se vierte con «declara», que suena solemne y natural en español contemporáneo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor DIOS
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: Según la política del proyecto, יְהוָה se vierte «Yahvé». En español, el compuesto אֲדֹנָי יְהוִה crea una tensión formal; aquí se preserva el nombre divino revelado sin duplicar artificialmente el título. La autoridad del enunciado queda reforzada por «declara» y por la designación siguiente.
- source_word: אֱלֹהֵי הַצְּבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de las huestes
  - Dios de los ejércitos del cielo
  lexicon: HALOT
  rationale: «Hosts» puede traducirse por «ejércitos» en español bíblico claro y tradicionalmente inteligible. «Huestes» sería más litúrgico, pero menos transparente para lectura pública moderna.
theological_decisions:
- issue: Traducción del Tetragrámaton en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / Lord Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor DIOS
  rationale: La línea editorial del proyecto pide «Yahvé» para יהוה. Aunque el compuesto hebreo contiene un título y el nombre divino, el español puede expresar la referencia de forma más directa y reverente con el nombre propio divino. Se evita el enmascaramiento tradicional por «SEÑOR» y también la duplicación poco natural de títulos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El testimonio inglés auditado mantiene la lectura forense de וְהָעִידוּ, el valor pactal de «house of Jacob» y la fórmula profética נְאֻם. También documenta la tensión del título divino compuesto; la versión española adopta la política del proyecto para יהוה («Yahvé») sin perder el registro solemne del versículo. No se registraron revisiones posteriores con cambios.
  spanish_consistency_notes:
  - Se mantiene «casa de Jacob» como designación de Israel, coherente con el tono profético del pasaje.
  - «Dios de los ejércitos» conserva el peso del título צְבָאוֹת con lenguaje claro para lectores hispanos.
  - La exclamación inicial refleja el imperativo plural del hebreo y el carácter exhortativo/judicial del verso.
  - Los marcadores de nota se colocan solo donde la redacción española introduce una alternativa útil o una aclaración del título divino.
