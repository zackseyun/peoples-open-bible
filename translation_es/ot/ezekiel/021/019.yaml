translation:
  language: es
  text: 'Y tú[a], hijo de hombre, profetiza y golpea palma contra palma, y que la espada sea duplicada por tercera vez[b]: la espada de los caídos. Es la espada del gran caído, la que irrumpe sobre ellos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘aplaude’; el hebreo dice literalmente ‘golpea palma contra palma’, describiendo un gesto profético.
    reason: lexical_alternative
  - marker: b
    text: O ‘triplicada’. La expresión hebrea puede indicar una espada intensificada por un tercer golpe o hecha triple.
    reason: lexical_alternative
  - marker: c
    text: O ‘la que penetra en ellos’. El participio final puede transmitir el efecto de la espada al penetrar, presionar o cercar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática de Ezequiel con un equivalente tradicional y transparente en español. ‘Hijo de hombre’ mantiene el eco representativo del hebreo y evita reinterpretarlo demasiado.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - profetiza contra
  - habla proféticamente
  lexicon: HALOT
  rationale: El imperativo simple reproduce la comisión profética sin añadir un objeto que el hebreo no expresa aquí.
- source_word: וְהַךְ כַּף אֶל כָּף
  english_pob_choice: strike palm to palm
  chosen_spanish: golpea palma contra palma
  alternatives_spanish:
  - aplaude
  - golpea mano contra mano
  lexicon: HALOT
  rationale: Se mantiene el gesto literal del hebreo, con un español natural. ‘Golpea palma contra palma’ conserva mejor la imagen que un simple ‘aplaude’.
- source_word: וְתִכָּפֵל חֶרֶב
  english_pob_choice: and let the sword be doubled
  chosen_spanish: y que la espada sea duplicada
  alternatives_spanish:
  - y sea doblada la espada
  - y la espada se duplique
  lexicon: HALOT
  rationale: Se preserva la pasiva/jussiva y la intensificación del verbo sin convertirla en una paráfrasis como ‘golpee dos veces’.
- source_word: שְׁלִישִׁתָה
  english_pob_choice: a third time
  chosen_spanish: por tercera vez
  alternatives_spanish:
  - una tercera vez
  - de manera triplicada
  lexicon: HALOT
  rationale: ‘Por tercera vez’ expresa con claridad la iteración o intensificación que el hebreo señala.
- source_word: חֶרֶב חֲלָלִים
  english_pob_choice: the sword of the slain
  chosen_spanish: la espada de los muertos
  alternatives_spanish:
  - la espada de los heridos
  - la espada de los caídos
  lexicon: HALOT
  rationale: Aunque el inglés POB usa ‘slain’, en español ‘muertos’ comunica de forma natural el resultado del verbo y evita un giro demasiado pesado. Se conserva la fuerza de juicio y muerte del sintagma.
- source_word: חֶרֶב חָלָל הַגָּדוֹל
  english_pob_choice: the sword of the great slain one
  chosen_spanish: la espada del gran herido
  alternatives_spanish:
  - la espada del gran caído
  - la espada del gran muerto
  lexicon: HALOT
  rationale: ‘Herido’ mantiene la idea de alguien abatido o alcanzado por muerte/violencia sin forzar un sustantivo masculino marcado. La ambigüedad entre ‘herido’ y ‘muerto’ se conserva en parte del contexto de juicio.
- source_word: הַחֹדֶרֶת לָהֶם
  english_pob_choice: the one that presses in on them
  chosen_spanish: la que se cierne sobre ellos
  alternatives_spanish:
  - la que penetra en ellos
  - la que los acosa
  lexicon: HALOT
  rationale: El participio hebreo sugiere irrupción/penetración/acecho. ‘Se cierne sobre ellos’ comunica bien la presión amenazante en español, sin imponer una imagen más gráfica de la que exige el texto.
theological_decisions:
- issue: Identidad y alcance de la fórmula de dirección 'hijo de hombre'
  english_pob_reading: Conventional rendering of Ezekiel’s address formula, preserving the Hebrew idiom and its representative masculine form.
  chosen_spanish_reading: Se conserva 'hijo de hombre' como fórmula profética estable, sin sustituirla por una abstracción como 'ser humano'.
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: En Ezequiel la expresión funciona como vocativo y conviene preservar su forma idiomática. Traducirla de manera más interpretativa debilitaría la interpelación profética característica del libro.
  doctrine_reference: Ezequiel 2:1; 21:19
- issue: Valor del signo-acto de golpear palma contra palma
  english_pob_reading: The Hebrew literally says 'strike palm to palm,' describing a prophetic gesture.
  chosen_spanish_reading: Se mantiene como gesto literal y no se reduce a un simple 'aplaudir'.
  alternative_spanish_readings:
  - aplaude
  - golpea mano contra mano
  rationale: El texto presenta un acto profético concreto. 'Aplaudir' sería una equivalencia funcional, pero perdería parte de la literalidad y del carácter simbólico del gesto.
  doctrine_reference: Ezequiel 21:14, 17, 19
- issue: Intensificación de la espada en tres fases
  english_pob_reading: The Hebrew expression may denote the sword being intensified to a third stroke or made threefold.
  chosen_spanish_reading: Se traduce como una duplicación 'por tercera vez', dejando abierta la intensificación o repetición.
  alternative_spanish_readings:
  - espada triplicada
  - la espada de tres dobleces
  rationale: El hebreo es deliberadamente enigmático; conviene preservar la tensión entre repetición e intensificación en vez de resolverla demasiado pronto.
  doctrine_reference: Ezequiel 21:14, 17, 19
translation_notes:
  revision_awareness: 'Se revisó el auditorial inglés y el contexto hebreo; no se adoptó una traducción mecánica del inglés, sino una formulación española que conserva los puntos de tensión documentados: el vocativo profético, el signo-acto manual, la intensificación de la espada y el participio final de amenaza. No hubo revisiones aplicadas en el historial reciente; se mantiene una lectura de acuerdo moderado con observación de problemas menores.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma general cuando aparezca el nombre divino; en este versículo no aparece.
  - Se preserva 'hijo de hombre' como fórmula fija de Ezequiel.
  - Se evita ‘SEÑOR’ como sustituto no motivado por este texto.
  - Se mantiene la repetición rítmica de ‘espada’ para reflejar la acumulación hebrea.
  - Las notas al pie distinguen alternativas léxicas reales y no introducen una interpretación doctrinal nueva.
