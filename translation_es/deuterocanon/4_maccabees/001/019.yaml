revisions:
- from: Pero la prudencia[a] es la más soberana de todas[b], de la cual, en efecto, la razón prevalece sobre las pasiones.
  to: Pero la prudencia es la más soberana[a] de todas, de la cual procede, en efecto, el dominio de la razón sobre las pasiones[b].
  rationale: 'Se ajustó la sintaxis para que ἐξ ἧς exprese con claridad la procedencia desde la prudencia y para que la frase suene natural en español. También se reubicaron las notas al pie en los puntos léxicos correctos: κυριωτάτη en ''más soberana'' y ἐπικρατεῖ en la expresión de ''dominio ... sobre las pasiones''.'
