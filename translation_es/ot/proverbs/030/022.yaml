- from: Debajo de un esclavo cuando reina[a], y de un necio cuando se sacia de pan[b].
  to: Bajo un esclavo cuando llega a ser rey[a], y un necio cuando se sacia de pan[b].
  rationale: Se reemplaza «Debajo de» por «Bajo» para lograr un español más natural sin perder la estructura fuente. Se cambia «cuando reina» por «cuando llega a ser rey» para reflejar mejor el matiz de inversión social que el contexto y la auditoría inglesa consideran central. Se conservan «esclavo», «necio» y «pan» por fidelidad léxica y claridad sapiencial.
