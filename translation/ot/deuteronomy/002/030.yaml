theological_decisions:
- issue: Divine hardening and human unwillingness
  chosen_reading: Retain both Sihon's unwillingness and the LORD's hardening without softening either element.
  alternative_readings:
  - Paraphrasing to emphasize only Sihon's self-hardening
  - Paraphrasing to make God merely permit rather than effect the hardening
  rationale: The Hebrew explicitly states both that Sihon 'was not willing' and that the LORD 'hardened his spirit' and 'made his heart stubborn.' To preserve theological tension rather than resolve it, both are translated straightforwardly.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
