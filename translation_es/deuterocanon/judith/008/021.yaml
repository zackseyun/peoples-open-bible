    text: Or 'when we are taken thus.' The Greek opening is syntactically awkward, but the sense is that if they are captured in this condition, disaster follows.
    reason: alternative_reading
  - marker: b
    text: '''Will sit down'' may imply being brought low or left helpless; the translation preserves the image of the Greek verb.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their profanation' or 'the desecration of them.' The sense is the violation of the sacred things.
    reason: lexical_alternative
  - marker: d
    text: The Greek leaves the subject of 'will require' unstated; context likely implies God will call for an accounting for the desecration, at the cost of their blood.
    reason: alternative_reading
