translation:
  language: es
  text: ¿Has dado órdenes a la mañana, en tus días[a], y has hecho saber al alba su lugar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En tus días» conserva el modismo hebreo, que significa «en tu vida» o «alguna vez desde que vives».
    reason: cultural_note
lexical_decisions:
- source_word: הֲמִיָּמֶיךָ
  english_pob_choice: in your days
  chosen_spanish: en tus días
  alternatives_spanish:
  - en tu vida
  - desde tus días
  - en el curso de tus días
  lexicon: HALOT
  rationale: La pregunta idiomática no apunta a una fecha literal, sino al lapso de la vida de Job. «En tus días» conserva la forma hebrea con naturalidad en español y evita explicitar más de lo que el texto dice.
- source_word: צִוִּיתָ
  english_pob_choice: commanded
  chosen_spanish: mandado
  alternatives_spanish:
  - ordenado
  - dado órdenes a
  lexicon: HALOT
  rationale: «Mandar» conserva la fuerza de una orden autoritativa y funciona bien en poesía. En español bíblico, «mandado» es la forma verbal más directa y solemne sin perder el valor imperativo del hebreo.
- source_word: בֹּקֶר
  english_pob_choice: the morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - el amanecer
  - la aurora
  lexicon: HALOT
  rationale: El hebreo personifica el amanecer como una realidad cósmica. «La mañana» mantiene esa personificación de manera clara y relativamente literal; «el amanecer» sería una alternativa interpretativa aceptable, pero menos paralela con «el alba».
- source_word: יָדַעְתָּה / יָדַעְתָּ
  english_pob_choice: caused the dawn to know
  chosen_spanish: hecho que el alba conozca
  alternatives_spanish:
  - causado que el alba conozca
  - hecho saber al alba
  - mostrado al alba
  lexicon: HALOT
  rationale: El verbo está en sentido causativo; por eso «hecho que... conozca» expresa la acción sin volverla meramente informativa. Se conserva la personificación de la alba como sujeto que «conoce» su lugar.
- source_word: שַׁחַר
  english_pob_choice: the dawn
  chosen_spanish: el alba
  alternatives_spanish:
  - la aurora
  - el amanecer
  lexicon: HALOT
  rationale: «Alba» es un equivalente poético y natural en español para שחר, y mantiene bien el paralelismo con «la mañana». Además, suena más idiomático que una repetición de «amanecer».
- source_word: מְקוֹמוֹ
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - su puesto
  - su lugar asignado
  lexicon: HALOT
  rationale: «Lugar» es la correspondencia más directa de מקום. Se evita añadir «asignado» en el texto principal porque el hebreo no lo explicita; la idea de ubicación propia ya está presente en el contexto poético.
theological_decisions:
- issue: Personificación del amanecer/mañana
  english_pob_reading: The morning and dawn are treated as realities that can receive command and instruction.
  chosen_spanish_reading: La mañana y el alba quedan personificadas como realidades que pueden obedecer y conocer su lugar.
  alternative_spanish_readings:
  - Tratar el verso como mera metáfora sin personificación explícita
  - Suavizarlo a una formulación impersonal
  rationale: El hebreo presenta una pregunta retórica sobre el dominio creador de Dios sobre fenómenos cósmicos. La traducción debe mantener esa personificación, porque es parte del argumento del discurso divino en Job 38.
  doctrine_reference: Providencia y soberanía creadora de Dios; poesía sapiencial de Job 38
translation_notes:
  revision_awareness: Se siguió el ajuste de la revisión inglesa que prefirió una expresión más natural para el modismo temporal y una forma causativa más clara. En español se optó por «en tus días» y «hecho que... conozca» para reflejar ambos puntos sin perder la poesía del paralelismo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca en este versículo, sino por coherencia editorial general del proyecto cuando corresponda.
  - Se eligió «alba» para שחר y «mañana» para בֹּקֶר para preservar la distinción poética entre ambos términos.
  - La puntuación con coma reproduce la cadencia interrogativa y el paralelismo del hebreo.
