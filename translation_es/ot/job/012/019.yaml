- from: Él lleva a los sacerdotes[a] despojados[b], y derriba a los poderosos.
  to: Él se lleva cautivos a los sacerdotes, despojados[a], y derriba a los poderosos[b].
  rationale: Se fortaleció מוֹלִיךְ para reflejar mejor 'leads away' en un contexto de juicio y humillación. Se eliminó una nota innecesaria sobre 'sacerdotes' no sustentada por la presentación inglesa al lector, y se añadió la nota requerida para אֵתָנִים, preservando la alternativa semántica de firmeza/estabilidad documentada en la auditoría. El resto del verso se mantiene fiel, natural y claro en español.
