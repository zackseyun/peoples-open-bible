translation:
  language: es
  text: Entonces colocaron el altar sobre sus bases[a], porque el temor estaba sobre ellos[b] por causa de los pueblos de las tierras, y ofrecieron sobre él holocaustos a Yahvé, holocaustos por la mañana y por la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre su base» o «en su lugar fijo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el temor estaba sobre ellos de los pueblos de las tierras», es decir, tenían temor por causa de los pueblos circundantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכִינוּ
  english_pob_choice: They set up
  chosen_spanish: Y prepararon
  alternatives_spanish:
  - y lo establecieron
  - y lo colocaron
  lexicon: HALOT
  rationale: El verbo en hifil de כון aquí expresa poner en lugar o dejar listo para uso. En español, «prepararon» conserva la idea de disponer el altar para el culto, aunque el contexto inmediato también sugiere su reinstalación.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: Renderización directa y estable en contexto sacrificial.
- source_word: עַל מְכֹנוֹתָיו
  english_pob_choice: on its foundations
  chosen_spanish: sobre sus bases
  alternatives_spanish:
  - sobre sus fundamentos
  - en su lugar fijo
  lexicon: HALOT
  rationale: מְכוֹנוֹת admite «bases», «fundamentos» o «soportes fijos». «Bases» conserva el valor concreto y resulta natural en español. La nota mantiene la alternativa de ubicación fija para no perder la tensión lexical.
- source_word: כִּי בְּאֵימָה עֲלֵיהֶם
  english_pob_choice: for fear was upon them
  chosen_spanish: porque el temor estaba sobre ellos
  alternatives_spanish:
  - pues el temor estaba sobre ellos
  - porque estaban llenos de temor
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea del temor que «está sobre» ellos, con un español idiomático pero todavía cercano al original. «Temor» es más sobrio que «terror» y funciona bien en registro bíblico.
- source_word: מֵעַמֵּי הָאֲרָצוֹת
  english_pob_choice: because of the peoples of the lands
  chosen_spanish: a causa de los pueblos de las tierras
  alternatives_spanish:
  - por causa de los pueblos de las tierras
  - debido a los pueblos de las tierras
  lexicon: HALOT
  rationale: El מִן aquí expresa causa o fuente del temor. «A causa de» traduce bien ese valor causal y conserva el plural y el matiz regional de «las tierras».
- source_word: וַיַּעַל עָלָיו עֹלוֹת
  english_pob_choice: and they offered up burnt offerings on it
  chosen_spanish: y ofrecieron sobre él holocaustos
  alternatives_spanish:
  - y ofrecieron holocaustos sobre él
  - y subieron holocaustos sobre él
  lexicon: HALOT
  rationale: El idiomático hifil de עלה con עֹלוֹת se expresa naturalmente con «ofrecieron». «Holocaustos» es el término bíblico tradicional para עֹלוֹת y mantiene la fuerza sacrificial específica; se evita «sacrificios» por ser demasiado general.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: el Tetragrámaton se vierte «Yahvé» en el texto principal, sin la convención de ocultarlo con «SEÑOR».'
- source_word: עֹלוֹת לַבֹּקֶר וְלָעָרֶב
  english_pob_choice: burnt offerings morning and evening
  chosen_spanish: holocaustos por la mañana y por la tarde
  alternatives_spanish:
  - holocaustos mañana y tarde
  - holocaustos de mañana y de tarde
  lexicon: HALOT
  rationale: Se conserva la repetición de עֹלוֹת y el ritmo hebreo «mañana y tarde». «Por la mañana y por la tarde» es claro en español y mantiene la idea de ofrecimientos regulares diarios.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y la política del proyecto pide transliterarlo como «Yahvé» en el texto principal. Se evita la sustitución litúrgica por «SEÑOR» para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de עֹלוֹת
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - sacrificios quemados
  rationale: עֹלוֹת designa la ofrenda que asciende totalmente en humo; «holocaustos» es la equivalencia bíblica tradicional y precisa en español. Se evita una generalización a «sacrificios» para no perder la especificidad cultual.
  doctrine_reference: Lexical-theological consistency for sacrificial terminology
- issue: Relación causal en מֵעַמֵּי הָאֲרָצוֹת
  english_pob_reading: because of the peoples of the lands
  chosen_spanish_reading: a causa de los pueblos de las tierras
  alternative_spanish_readings:
  - por temor a los pueblos de las tierras
  - por causa de los pueblos de las tierras
  rationale: La construcción no describe solamente origen espacial sino causa del temor. El español «a causa de» comunica de forma clara la relación causal sin borrar la imagen hebrea de un temor provocado por los pueblos circundantes.
  doctrine_reference: Syntax and discourse-level source fidelity
translation_notes:
  revision_awareness: La redacción inglesa auditada mantuvo la imagen de «fear was upon them» y ajustó la cola final a «morning and evening» sin preposiciones repetidas; la versión española sigue esa misma línea, conservando la causalidad y el ritmo breve del cierre. También se tomó en cuenta la decisión revisada de no expandir innecesariamente la frase final.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con la norma del proyecto para יהוה.
  - Se mantiene «holocaustos» para עֹלוֹת, en lugar de un término más general.
  - «Pueblos de las tierras» conserva el plural hebreo y el matiz regional.
  - 'La frase final conserva el paralelismo temporal breve: «por la mañana y por la tarde».'
