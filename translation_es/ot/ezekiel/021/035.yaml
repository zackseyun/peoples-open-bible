translation:
  language: es
  text: Vuelve a tu vaina[a]. En el lugar donde fuiste creada, en la tierra de tus orígenes[b], te juzgaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ponla de nuevo en su vaina». El hebreo dice directamente «Vuelve a su vaina», con la espada personificada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la tierra de tu nacimiento» o «de tu natividad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשַׁב
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve atrás
  lexicon: HALOT
  rationale: El imperativo hebreo de שוב exige un mandato breve y directo. «Vuelve» conserva la orden y suena natural en español para el objeto personificado del verso.
- source_word: תַּעְרָהּ
  english_pob_choice: your sheath
  chosen_spanish: tu vaina
  alternatives_spanish:
  - su vaina
  - tu funda
  lexicon: HALOT
  rationale: תער significa «vaina» o «funda de espada». Se mantiene la segunda persona para conservar la dirección retórica del texto, aunque el sufijo hebreo sea 3.ª femenina singular y la imagen personifique a la espada.
- source_word: בִּמְקוֹם
  english_pob_choice: In the place
  chosen_spanish: En el lugar
  alternatives_spanish:
  - En el sitio
  - En la posición
  lexicon: HALOT
  rationale: La expresión locativa es simple y directa; «en el lugar» reproduce bien la función sintáctica sin añadir matices innecesarios.
- source_word: נִבְרֵאת
  english_pob_choice: you were created
  chosen_spanish: fuiste creado
  alternatives_spanish:
  - fuiste formada
  - fuiste hecha
  lexicon: HALOT
  rationale: El nifal de ברא normalmente significa «ser creado». Aunque la imagen de una espada puede sugerir «forjada» o «hecha», «fuiste creado» conserva mejor la redacción hebrea y la tensión metafórica.
- source_word: בְּאֶרֶץ מְכֻרוֹתַיִךְ
  english_pob_choice: in the land of your origins
  chosen_spanish: en la tierra de tus orígenes
  alternatives_spanish:
  - en la tierra de tu nacimiento
  - en la tierra de tu natividad
  lexicon: HALOT
  rationale: מכורות puede referirse a origen, nacimiento o natividad. «Orígenes» es natural en español y mantiene la amplitud semántica sin estrechar demasiado el sentido.
- source_word: אֶשְׁפֹּט אֹתָךְ
  english_pob_choice: I will judge you
  chosen_spanish: te juzgaré
  alternatives_spanish:
  - ejecutaré juicio sobre ti
  - te haré juicio
  lexicon: HALOT
  rationale: שפט en primera persona singular con objeto directo se traduce de manera natural por «juzgar». «Te juzgaré» conserva la fuerza judicial del verbo sin sobrecargar el texto principal.
theological_decisions:
- issue: Referente inmediato de la segunda persona femenina y de la imagen de la espada
  english_pob_reading: The command is addressed to the sword personified, while the judgment ultimately falls on the people/entity symbolized by the sword.
  chosen_spanish_reading: La orden se dirige inmediatamente a la espada personificada; el juicio, en cambio, recae en la realidad representada por esa espada.
  alternative_spanish_readings:
  - La orden se dirige directamente al pueblo o al rey simbolizado por la espada.
  - La espada funciona solo como metáfora y no como interlocutora real.
  rationale: El hebreo conserva la personificación mediante la vaina y los sufijos femeninos. Conviene mantener esa tensión en español en vez de resolverla prematuramente en una referencia puramente literal.
  doctrine_reference: Preservar la tensión literaria y profética del texto
- issue: Valor judicial de שפט
  english_pob_reading: I will judge you
  chosen_spanish_reading: te juzgaré
  alternative_spanish_readings:
  - haré juicio contra ti
  - ejecutaré juicio sobre ti
  rationale: El español «juzgar» ya incluye el marco judicial necesario. Las alternativas más explícitas son posibles, pero no son requeridas por el hebreo principal.
  doctrine_reference: Lexical force of biblical judicial language
translation_notes:
  revision_awareness: Se revisó el equivalente inglés del POB y no se detectaron cambios textuales aplicados en la última pasada; la formulación española mantiene la personificación de la espada, la referencia locativa y el matiz judicial sin resolver la tensión metafórica.
  spanish_consistency_notes:
  - Se preserva «vaina» para תער y se evita «SEÑOR» o equivalentes no pertinentes.
  - Se mantiene el tuteo singular para reproducir la dirección retórica del hebreo.
  - «Te juzgaré» conserva el valor jurídico sin introducir expansión interpretativa.
