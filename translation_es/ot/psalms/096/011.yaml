revisions:
- from: Que se alegren los cielos[a], y que se goce la tierra; que retumbe el mar, y cuanto lo llena.
  to: Que se alegren los cielos, y que se regocije la tierra; que retumbe el mar[a], y cuanto lo llena.
  rationale: Se reemplaza «que se goce la tierra» por «que se regocije la tierra» para lograr español natural y a la vez preservar la diferenciación poética entre שׂמח y גיל. Se mueve el marcador de nota al segmento del mar, que es donde corresponde la alternativa lexical documentada por el POB inglés. No se requiere adjudicación adicional.
