base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/006/021.yaml
  text: But those who had been appointed over the unlawful sacrifice[a], because of their long-standing acquaintance with the man, took him aside privately and urged him to bring meat that it was proper for him to use, prepared by himself, and to pretend that he was eating the meat from the sacrifice that had been ordered by the king[b],
  footnotes:
  - marker: a
    text: Or 'out of compassion, because of their acquaintance with him from long ago.' The Greek explicitly includes the idea of pity/compassion (σπλαγχνισμοῦ).
    reason: lexical_alternative
  - marker: b
    text: Literally 'the meats from the sacrifice'; that is, meat from pagan sacrificial offerings that the king had ordered him to eat.
    reason: cultural_note
