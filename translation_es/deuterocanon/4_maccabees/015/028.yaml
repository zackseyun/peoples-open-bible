translation:
  language: es
  text: Pero la hija recordó la perseverancia de Abraham[a], temeroso de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el piadoso Abraham» o «Abraham, temeroso de Dios».
