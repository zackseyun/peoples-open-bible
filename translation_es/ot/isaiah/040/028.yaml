translation:
  language: es
  text: ¿No has sabido? ¿No has oído? Yahvé[a] es el Dios eterno, el Creador de los confines de la tierra. No se fatiga ni se cansa; su entendimiento es insondable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; también puede transliterarse ‘Yahweh’.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No lo has sabido?
  alternatives_spanish:
  - ¿No lo sabes?
  - ¿Acaso no lo has sabido?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de reprensión o recordatorio. En español, ‘¿No lo has sabido?’ conserva ese golpe retórico y el perfectivo del pasado con valor de conocimiento ya debido.
- source_word: יָדַעְתָּ
  english_pob_choice: known
  chosen_spanish: sabido
  alternatives_spanish:
  - conocido
  - entendido
  lexicon: HALOT
  rationale: El verbo básico es ‘saber/conocer’. ‘Has sabido’ mantiene el paralelismo con ‘has oído’ y suena más natural que una forma más abstracta.
- source_word: אִם לֹא שָׁמַעְתָּ
  english_pob_choice: Have you not heard
  chosen_spanish: ¿No lo has oído?
  alternatives_spanish:
  - ¿No has oído?
  - ¿Acaso no lo has oído?
  lexicon: HALOT
  rationale: La secuencia funciona como segunda pregunta retórica paralela, no como condicional. ‘¿No lo has oído?’ preserva la forma y el paralelismo con la primera pregunta.
- source_word: אֱלֹהֵי עוֹלָם
  english_pob_choice: the everlasting God
  chosen_spanish: el Dios eterno
  alternatives_spanish:
  - el Dios de la eternidad
  - el Dios perpetuo
  lexicon: HALOT
  rationale: El hebreo expresa ‘Dios de eternidad/siempre’. ‘El Dios eterno’ es la equivalencia más natural en español y conserva el sentido durativo sin sobrecargar la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal según la convención POB en español. ‘Yahvé’ es la forma natural y reconocible en español para el Tetragrámaton, evitando la sustitución por título.
- source_word: בּוֹרֵא
  english_pob_choice: the Creator
  chosen_spanish: el Creador
  alternatives_spanish:
  - el que crea
  - Creador
  lexicon: HALOT
  rationale: El participio funciona de modo apposicional/titular. ‘El Creador’ conserva el valor de designación del sujeto divino en un español fluido.
- source_word: קְצוֹת הָאָרֶץ
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - los fines de la tierra
  lexicon: HALOT
  rationale: Es un modismo de alcance geográfico. ‘Los confines de la tierra’ es idiomático en español bíblico y preserva la imagen de los límites remotos.
- source_word: לֹא יִיעַף
  english_pob_choice: does not grow faint
  chosen_spanish: No se fatiga
  alternatives_spanish:
  - No desfallece
  - No se cansa
  lexicon: HALOT
  rationale: El verbo denota desfallecimiento por agotamiento. ‘No se fatiga’ comunica el sentido sin duplicar demasiado el siguiente miembro.
- source_word: וְלֹא יִיגָע
  english_pob_choice: or become weary
  chosen_spanish: ni se cansa
  alternatives_spanish:
  - ni se fatiga
  - ni se vuelve cansado
  lexicon: HALOT
  rationale: El segundo verbo expresa cansancio por labor. ‘Ni se cansa’ mantiene el paralelismo con el miembro anterior y diferencia bien los dos verbos.
- source_word: אֵין חֵקֶר
  english_pob_choice: is unsearchable
  chosen_spanish: es insondable
  alternatives_spanish:
  - no se puede investigar
  - es inescrutable
  lexicon: HALOT
  rationale: La idea es ‘no hay investigación/indagación posible’. ‘Insondable’ es una forma natural en español que conserva la noción de imposibilidad de abarcar su profundidad.
- source_word: לִתְבוּנָתוֹ
  english_pob_choice: his understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su inteligencia
  - su discernimiento
  lexicon: HALOT
  rationale: תבונה abarca entendimiento, discernimiento e inteligencia. ‘Entendimiento’ es amplio, solemne y adecuado al contexto de la sabiduría divina.
theological_decisions:
- issue: Rendering the divine name יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. En la línea del POB, se evita la sustitución por un título y se usa la forma establecida en español, ‘Yahvé’, para preservar el nombre personal revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto en inglés muestra alta concordancia y sin revisiones aplicadas; la redacción española sigue de cerca el análisis lexical ya validado, adaptándolo al español natural sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton, conforme al estándar español del proyecto.
  - Se conserva el paralelismo retórico de dos preguntas y de dos verbos de cansancio.
  - ‘Los confines de la tierra’ se eligió como equivalente idiomático de ‘the ends of the earth’.
  - ‘Insondable’ traduce la imposibilidad de investigar la comprensión divina sin debilitarla a mera dificultad.
