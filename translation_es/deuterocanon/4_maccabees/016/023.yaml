review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la idea central del griego: la piedad/devoción no es irracional y, con ese conocimiento, los mártires no se echaron atrás ante el sufrimiento. Sin embargo, «no se resistieron a los dolores» en español suena menos natural y puede sugerir pasividad frente al dolor más que firmeza ante los padecimientos. Dado μὴ ἀνθίστασθαι τοῖς πόνοις, conviene una formulación más idiomática que preserve la idea de no oponerse ni retroceder ante los padecimientos.'
  spanish_quality_summary: El español es claro, pero «ser devoto» puede sonar algo estrecho o confesional en algunos contextos; aun así es aceptable por seguir la auditoría inglesa. El problema principal es la expresión «resistirse a los dolores», que no suena tan natural en español bíblico actual como «resistir los dolores» o, mejor, «oponerse a los dolores/padecimientos»; además «dolores» podría oírse demasiado físico. «Padecimientos» encaja mejor con el contexto martirial y sigue siendo moderado, sin llegar a «tormentos».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Devoto» es admisible para εὐσεβεῖν en este contexto, aunque «piadoso» también sería posible. No aparecen términos sensibles del glosario mayor. La revisión propuesta mantiene fidelidad al razonamiento teológico documentado: la piedad concuerda con la razón.'
  issues:
  - severity: medium
    issue: «no se resistieron a los dolores» es poco idiomático
    rationale: En español, «resistirse a» suele implicar negarse a aceptar algo; aquí el griego expresa más bien no oponerse o no retroceder ante los sufrimientos. La frase actual puede sonar torpe o ambigua.
  - severity: low
    issue: «dolores» puede resultar demasiado estrecho
    rationale: πόνοις en contexto martirial puede abarcar sufrimientos o padecimientos, no solo dolor físico puntual. «Padecimientos» mejora la amplitud semántica sin sobreinterpretar.
  revised_spanish_text: Porque, sabiendo que ser devoto no es irracional, no se opusieron a los padecimientos.
  revision_rationale: Se ajusta únicamente la cola verbal para un español más natural y una mejor correspondencia contextual con μὴ ἀνθίστασθαι τοῖς πόνοις. «No se opusieron a los padecimientos» preserva el sentido de no resistir ni echarse atrás ante el sufrimiento, y «padecimientos» refleja mejor el contexto martirial que «dolores».
