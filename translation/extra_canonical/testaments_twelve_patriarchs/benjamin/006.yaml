translation:
  text: The purpose of a good man is not in the hand of the spirit of Beliar’s deceit[a], for the angel of peace guides his soul. He does not look with passion on perishable things, nor does he gather wealth for pleasure. He does not delight in pleasure, nor grieve his neighbor; he is not filled with luxury, nor led astray by the wanderings of the eyes. For the Lord is his portion. A good purpose does not accept the glory or the dishonor that comes from men, and it knows no deceit or falsehood or strife or reviling. For the Lord dwells in him and gives light to his soul, and he rejoices toward all people at all times. The good mind does not have two tongues, of blessing and cursing, of insult and honor, of quietness and disturbance, of hypocrisy and truth, of poverty and wealth; rather, it has one sincere and pure disposition toward all. It does not have double sight or hearing; for in everything that it does, or speaks, or sees, it knows that the Lord is looking on his soul. And it cleanses the mind, so as not to be condemned by men and by God. But the disposition of Beliar is twofold, and it has no singleness. Flee, therefore, evil-mindedness, my children, and love the good mind, which the law of God knows, so that you may rest in hope, because the good-minded man does not have a darkened eye. He shows mercy to all, even if they are sinners; even if they devise evil against him, by doing good he overcomes evil, being shielded by what is good. And he loves the righteous as his own soul. If anyone is glorified, he does not envy him; if anyone is enriched, he is not jealous; if anyone is valiant, he praises him; the virtuous man he commends; on the poor man he has mercy; with the weak he has compassion; to God he sings praise[d][c][b]. The one who has the grace of a good spirit he loves as his own soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'counsel' or 'resolve' for 'purpose' (διαβούλιον).
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' reflects the Greek form in this witness; many readers will know the name as ''Belial.'''
    reason: lexical_alternative
  - marker: c
    text: '''Double sight or hearing'' preserves the chapter''s imagery of duplicity versus singleness rather than paraphrasing it as mere hypocrisy.'
    reason: lexical_alternative
  - marker: d
    text: '''A darkened eye'' may also suggest the idiom ''an evil eye,'' that is, envy or grudging hostility.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβούλιον
  chosen: purpose
  alternatives:
  - counsel
  - resolve
  - intention
  lexicon: LSJ
  rationale: In this paraenetic context the term denotes the inward aim or settled moral intention of the good man, not merely external advice. 'Purpose' preserves the ethical-volitional sense and reads naturally in English.
- source_word: πλάνης
  chosen: deceit
  alternatives:
  - error
  - wandering
  - delusion
  lexicon: LSJ
  rationale: With 'spirit of Beliar' the sense is moral-spiritual misleading rather than innocent mistake. 'Deceit' foregrounds the corrupting agency at work.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Greek witness tradition
  rationale: The Greek form here is Beliar; transliteration preserves the witness rather than normalizing to the more familiar Hebrew-derived 'Belial'.
- source_word: ἐμπαθῶς
  chosen: with passion
  alternatives:
  - lustfully
  - with craving
  - passionately
  lexicon: LSJ
  rationale: The adverb marks disordered desire broadly, not only sexual lust. 'With passion' keeps the wider moral sense while fitting the context of perishable goods and wealth.
- source_word: τὰ φθαρτά
  chosen: perishable things
  alternatives:
  - corruptible things
  - things that decay
  lexicon: LSJ
  rationale: The phrase contrasts transient material objects with the Lord as one's portion. 'Perishable things' is idiomatic and preserves the temporal-moral contrast.
- source_word: εἰς φιληδονίαν
  chosen: for pleasure
  alternatives:
  - for self-indulgence
  - for love of pleasure
  lexicon: LSJ
  rationale: The phrase indicates accumulation directed toward sensual enjoyment. 'For pleasure' is concise; the surrounding clauses already make the negative moral force clear.
- source_word: μετεωρισμοῖς ὀφθαλμῶν
  chosen: the wandering of the eyes
  alternatives:
  - roving glances
  - restless visions of the eyes
  lexicon: LSJ
  rationale: A vivid idiom for unstable, desire-driven looking. 'Wandering of the eyes' preserves the metaphor and the exhortational texture.
- source_word: μερὶς
  chosen: portion
  alternatives:
  - inheritance
  - share
  lexicon: LSJ
  rationale: A traditional covenantal expression for what one possesses as one's true lot. 'Portion' preserves the scriptural resonance without overexpansion.
- source_word: δόξης ... οὐκ ἀτιμίας ἀνθρώπων
  chosen: the glory or the dishonor that comes from men
  alternatives:
  - human praise or contempt
  - honor or shame from people
  lexicon: LSJ
  rationale: The line contrasts human valuation in either direction. 'Glory or dishonor' keeps the elevated register and the rhetorical pairing.
- source_word: λοιδωρίαν
  chosen: reviling
  alternatives:
  - abuse
  - insult
  lexicon: LSJ
  rationale: The vice list benefits from a strong, formal term. 'Reviling' matches the testamentary register better than the flatter 'insult'.
- source_word: διάνοια
  chosen: mind
  alternatives:
  - understanding
  - thought
  lexicon: LSJ
  rationale: In this chapter the term denotes the inward moral faculty. 'Mind' is simple and consistent, while the adjective 'good' carries the ethical force.
- source_word: δύο γλώσσας
  chosen: two tongues
  alternatives:
  - double speech
  - a forked tongue
  lexicon: LSJ
  rationale: The literal image is rhetorically powerful and should be preserved. It introduces the ensuing paired opposites effectively.
- source_word: διάθεσιν
  chosen: disposition
  alternatives:
  - attitude
  - state
  - inclination
  lexicon: LSJ
  rationale: The term refers to settled inward orientation toward others. 'Disposition' is elevated yet clear and suits the ethical contrast.
- source_word: ὅρασιν ... ἀκοὴν διπλῆν
  chosen: double sight or hearing
  alternatives:
  - duplicity in seeing or hearing
  - twofold perception
  lexicon: LSJ
  rationale: The literal phrasing extends the theme of singleness versus doubleness. Retaining the image is preferable to paraphrasing it away.
- source_word: καθαρίζει τὸν νοῦν
  chosen: cleanses the mind
  alternatives:
  - purifies the mind
  - keeps the mind clean
  lexicon: LSJ
  rationale: The moral-purity language is important in this testament. 'Cleanses' preserves the ethical and almost cultic resonance.
- source_word: ἁπλότης / μὴ ἁπλοῦν implied by δίπτυχον
  chosen: singleness
  alternatives:
  - simplicity
  - single-heartedness
  lexicon: LSJ
  rationale: The contrast in the chapter is between duplicity and unified moral intention. 'Singleness' captures that theme without sounding simplistic.
- source_word: κακόνοια / evil-mindedness
  chosen: evil-mindedness
  alternatives:
  - malice
  - wicked intent
  lexicon: LSJ
  rationale: The chapter contrasts good and evil inward orientation. 'Evil-mindedness' mirrors 'good mind' and preserves the conceptual symmetry.
- source_word: σκοτεινὸν ὀφθαλμόν
  chosen: a darkened eye
  alternatives:
  - an evil eye
  - a gloomy eye
  lexicon: LSJ
  rationale: The phrase can suggest envy or moral darkness. 'Darkened eye' keeps the imagery broad, while the following lines about envy clarify the ethical sense.
- source_word: ἐλεεῖ
  chosen: shows mercy
  alternatives:
  - has mercy on
  - pities
  lexicon: LSJ
  rationale: This is active benevolence, not mere feeling. 'Shows mercy' communicates enacted compassion.
- source_word: νικᾷ τὸ κακὸν ἐν τῷ ἀγαθῷ
  chosen: by doing good he overcomes evil
  alternatives:
  - he conquers evil with good
  - in goodness he defeats evil
  lexicon: LSJ
  rationale: The instrumental sense should be explicit in English. This rendering is clear and preserves the moral paradox.
- source_word: χάρις πνεύματος ἀγαθοῦ
  chosen: the grace of a good spirit
  alternatives:
  - the favor of a good spirit
  - the gracious gift of a good spirit
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. 'Grace of a good spirit' preserves the wording without overinterpreting whether the reference is disposition, angelic agency, or divine gift.
