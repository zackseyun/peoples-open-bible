    rationale: «Yo aborrezco» no es incorrecto, pero en español bíblico natural el sujeto ya está claro en el verbo. Omitir «Yo» mejora la fluidez sin perder fuerza.
  revised_spanish_text: Aborrezco, rechazo sus fiestas, y no oleré[a] sus asambleas solemnes.
