theological_decisions:
- issue: Rendering of unclean meat in a martyrdom context
  chosen_reading: pork
  alternative_readings:
  - swine's flesh
  rationale: The verse's theological weight lies in forced violation of Jewish dietary law, but the Greek itself simply names pig flesh. 'Pork' communicates the referent clearly without importing extra doctrinal explanation into the main text.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic or academic.'
