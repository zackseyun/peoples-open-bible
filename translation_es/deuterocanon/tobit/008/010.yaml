  - severity: medium
    issue: La nota al pie contiene una alternativa en inglés
    rationale: Las notas del texto español deben estar en español. «Lest perhaps he too die» debe traducirse, por ejemplo, como «No sea que quizá él también muera».
  revised_spanish_text: 'Y Ragüel se levantó[a], fue y cavó una sepultura, diciendo: «Quizá él también muera».'
