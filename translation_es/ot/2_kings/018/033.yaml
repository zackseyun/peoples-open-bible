    rationale: El rastro de auditoría inglés documenta que el infinitivo absoluto + verbo finito en contexto interrogativo se expresa mejor como desafío enfático tipo «¿han... alguna vez...?»/«have ... ever delivered», no meramente «realmente». La nota actual puede desviar la interpretación.
  - severity: low
    issue: La formulación principal podría reflejar mejor el matiz retórico con «alguna vez».
    rationale: «¿Acaso han librado...?» es aceptable, pero «¿Acaso han librado alguna vez...?» reproduce de forma más explícita la decisión lexical inglesa y el énfasis interrogativo del hebreo, con español más natural.
  revised_spanish_text: ¿Acaso han librado[a] alguna vez los dioses de las naciones, cada uno, su tierra de la mano del rey de Asiria?
