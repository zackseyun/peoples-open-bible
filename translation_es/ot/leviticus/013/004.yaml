base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/004.yaml
  text: But if the bright spot is white in the skin of his flesh[a], and its appearance is not deeper than the skin, and its hair has not turned white[c][b], then the priest shall isolate the affected area for seven days.
  footnotes:
  - marker: a
    text: Or 'bright patch' or 'shining spot' for the skin lesion described here.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall quarantine'; the Hebrew refers to placing the case under temporary isolation for observation.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the affliction/lesion'; the term refers to the affected spot being examined by the priest.
    reason: lexical_alternative
