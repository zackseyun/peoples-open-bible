translation:
  language: es
  text: 'cuyas sepulturas fueron puestas en lo más recóndito del pozo[a], y su asamblea estaba alrededor de su sepultura: todos ellos, muertos, caídos por la espada, que infundieron terror[b] en la tierra de los vivientes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las profundidades del pozo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «causaron terror en la tierra de los vivientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִתְּנוּ
  english_pob_choice: were set
  chosen_spanish: fueron puestas
  alternatives_spanish:
  - fueron colocadas
  - fueron dispuestas
  lexicon: HALOT
  rationale: El pasivo de נתן aquí describe la ubicación de las sepulturas. "Fueron puestas" conserva la pasividad y suena natural en español sin perder la idea de instalación o asignación del lugar.
- source_word: קִבְרֹתֶיהָ
  english_pob_choice: her graves
  chosen_spanish: sus sepulturas
  alternatives_spanish:
  - sus tumbas
  - sus sepulcros
  lexicon: HALOT
  rationale: El sufijo femenino singular se entiende mejor en español como referencia a la entidad personificada; "sus" evita forzar el género en una construcción que en español puede sonar más fluida que "sus graves de ella". "Sepulturas" conserva el registro solemne del contexto.
- source_word: בְּיַרְכְּתֵי בוֹר
  english_pob_choice: in the remotest parts of the pit
  chosen_spanish: en lo más recóndito del pozo
  alternatives_spanish:
  - en las partes más remotas del pozo
  - en lo más profundo del pozo
  lexicon: HALOT
  rationale: יַרְכְּתֵי expresa las zonas más alejadas o escondidas. "Lo más recóndito" transmite esa idea de interioridad/remotísima lejanía con naturalidad en español. "Pozo" conserva la imagen del hebreo בוֹר sin introducir un término más interpretativo.
- source_word: קְהָלָהּ
  english_pob_choice: her assembly
  chosen_spanish: su asamblea
  alternatives_spanish:
  - su compañía
  - su multitud
  lexicon: HALOT
  rationale: קהל se refiere a un grupo reunido. "Asamblea" mantiene el valor colectivo y el tono formal del pasaje.
- source_word: סְבִיבוֹת קְבֻרָתָהּ
  english_pob_choice: around her grave
  chosen_spanish: alrededor de su sepultura
  alternatives_spanish:
  - alrededor de su tumba
  - en torno a su sepultura
  lexicon: HALOT
  rationale: La expresión espacial se vierte de forma directa. "Sepultura" encaja con el registro funerario y evita una modernización excesiva.
- source_word: כֻּלָּם חֲלָלִים
  english_pob_choice: all of them slain
  chosen_spanish: todos ellos, caídos, heridos
  alternatives_spanish:
  - todos ellos, muertos
  - todos ellos, asesinados
  lexicon: HALOT
  rationale: 'חֲלָלִים designa a los caídos en batalla o muertos violentamente. En español, "caídos" y "heridos" preservan la tensión semántica: el primero reproduce el resultado general, y el segundo mantiene el matiz de los abatidos por violencia, sin borrar la fuerza bélica del término.'
- source_word: נֹפְלִים בַּחֶרֶב
  english_pob_choice: fallen by the sword
  chosen_spanish: caídos, heridos por la espada
  alternatives_spanish:
  - caídos por la espada
  - muertos por la espada
  lexicon: HALOT
  rationale: Aunque el inglés POB armoniza la frase como "fallen by the sword", el hebreo presenta un participio que describe a los abatidos por el arma. "Heridos por la espada" conserva el instrumental y deja visible la violencia; se añade "caídos" para reflejar el valor de חֲלָלִים y el tono enumerativo del verso.
- source_word: נָתְנוּ חִתִּית
  english_pob_choice: spread terror
  chosen_spanish: infundieron terror
  alternatives_spanish:
  - causaron terror
  - pusieron terror
  lexicon: HALOT
  rationale: La locución נתן + חִתִּית expresa producir terror en otros. "Infundieron terror" es una equivalencia natural y precisa en español, adecuada al registro profético.
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los vivos
  - en el país de los vivientes
  lexicon: HALOT
  rationale: La expresión estable en español bíblico es "tierra de los vivientes"; mantiene el contraste tradicional con el ámbito de los muertos sin alterar el sentido idiomático.
theological_decisions:
- issue: Personificación de la entidad en femenino singular
  english_pob_reading: Render the suffixes as 'her' throughout
  chosen_spanish_reading: 'Mantener la personificación con posesivos femeninos implícitos en el español: "sus" / "su"'
  alternative_spanish_readings:
  - usar "de ella" de manera explícita
  - usar "sus" pero interpretar la entidad como neutra
  rationale: El hebreo usa sufijos femeninos singulares para la nación/persona colectiva. En español, los posesivos "su/sus" preservan la personificación sin sobrecargar el verso con repeticiones artificiales de "de ella". La lectura sigue siendo coherente con la retórica profética.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imagen subterránea de בוֹר
  english_pob_reading: Translate בוֹר as 'pit' rather than interpretively as 'Sheol'
  chosen_spanish_reading: Traducir בוֹר como "pozo" y no como "Seol"
  alternative_spanish_readings:
  - '"sepulcro"'
  - '"Seol"'
  rationale: El texto hebreo dice בוֹר, no שְׁאוֹל. "Pozo" preserva la imagen concreta del original y evita introducir una identificación más específica que la del propio versículo. Además, en español "pozo" mantiene mejor la verticalidad imagética del pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tensión semántica entre חֲלָלִים y נֹפְלִים בַּחֶרֶב
  english_pob_reading: all of them slain, fallen by the sword
  chosen_spanish_reading: '"todos ellos, caídos, heridos por la espada"'
  alternative_spanish_readings:
  - '"todos ellos, muertos por la espada"'
  - '"todos ellos, caídos por la espada"'
  rationale: 'El hebreo combina un sustantivo de muertos violentos con un participio que describe la forma de su caída. La versión española intenta no aplanar esa doblez: "caídos" refleja la condición general, y "heridos por la espada" conserva el matiz de violencia mortal. Así no se borra la tensión lexical del original.'
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La revisión más reciente indicó concordancia alta y ningún cambio necesario; este borrador sigue esa lectura estable, con una única adaptación española en la frase de חֲלָלִים/נֹפְלִים para evitar perder la doble referencia a los caídos violentamente.
  spanish_consistency_notes:
  - Se conserva la personificación con posesivos de tercera persona en femenino implícito por contexto, usando "su/sus" de forma natural en español.
  - Se mantiene "pozo" para בוֹר, en línea con la imagen concreta del hebreo y con la decisión inglesa de no sustituirla por "Seol".
  - El registro es sobrio y bíblico, pero con sintaxis española fluida; no se introduce terminología eclesiástica ajena al texto.
