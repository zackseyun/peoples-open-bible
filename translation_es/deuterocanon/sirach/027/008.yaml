translation:
  language: es
  text: Si persigues la rectitud[a], la alcanzarás, y te la pondrás como una túnica de gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que es justo»; también «justicia». El griego es lo bastante amplio como para incluir tanto la rectitud moral personal como la conducta justa.
    reason: lexical_alternative
lexical_decisions:
- source_word: διώκῃς
  english_pob_choice: pursue
  chosen_spanish: buscas
  alternatives_spanish:
  - persigues
  - sigues tras
  - te esfuerzas por
  lexicon: BDAG
  rationale: En español, «persigues» puede sonar demasiado físico o persecutorio; «buscas» comunica mejor la acción intencional y perseverante de ir tras un bien moral. Conserva el sentido dinámico del griego sin volverlo pesado.
- source_word: τὸ δίκαιον
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - lo recto
  - lo que es justo
  - la rectitud
  lexicon: LSJ
  rationale: El griego admite un sentido abstracto de lo correcto/justo. En español, «la justicia» mantiene esa amplitud ética y encaja bien con la imagen de vestirla. «Lo recto» o «lo que es justo» serían posibles, pero aquí resultan menos naturales en la metáfora.
- source_word: καταλήμψῃ
  english_pob_choice: attain
  chosen_spanish: la alcanzarás
  alternatives_spanish:
  - la obtendrás
  - la tomarás
  - la lograrás
  lexicon: BDAG
  rationale: «Alcanzar» expresa bien la idea de llegar con éxito a lo perseguido, sin endurecer el verbo con un matiz de asir o capturar que en español podría sonar extraño en este contexto sapiencial.
- source_word: ἐνδύσῃ
  english_pob_choice: put it on
  chosen_spanish: te la pondrás
  alternatives_spanish:
  - te la vestirás
  - la vestirás sobre ti
  - te la colocarás
  lexicon: BDAG
  rationale: El verbo de vestirse se expresa de manera natural con «ponerse» en español. El reflexivo preserva la imagen de apropiarse personalmente de la justicia como vestidura.
- source_word: ποδήρη
  english_pob_choice: robe
  chosen_spanish: una túnica
  alternatives_spanish:
  - una ropa larga
  - un manto
  - una vestidura
  lexicon: LSJ
  rationale: «Túnica» es un equivalente digno y suficientemente concreto para una prenda larga. En español bíblico es claro, pero menos arcaizante que otras opciones; «de gloria» conserva el tono elevado.
- source_word: δόξης
  english_pob_choice: of glory
  chosen_spanish: de gloria
  alternatives_spanish:
  - de honor
  - gloriosa
  lexicon: LSJ
  rationale: La construcción genitiva se mantiene literalmente como «de gloria» para conservar la metáfora elevada del original. «De honor» es posible, pero atenúa la fuerza imagética y teológica del término.
theological_decisions:
- issue: τὸ δίκαιον como virtud moral amplia
  english_pob_reading: righteousness; alternatively, what is right / justice
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - lo recto
  - lo que es justo
  - la rectitud
  rationale: La POB inglesa preserva la amplitud del término y evita cerrarlo solo a un sentido jurídico. En español, «la justicia» puede abarcar tanto el obrar recto como la cualidad moral buscada, y además armoniza con la metáfora de vestir una virtud.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (δικαιοσύνη → righteousness; justice preserved where relevant)'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente del audit trail en que no se requieren cambios sustantivos. La traducción mantiene la equivalencia óptima del inglés POB, pero reexpresa la metáfora en español natural y reverente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - Se conserva la metáfora de vestidura con «túnica», en coherencia con el paralelismo del griego y con el tono sapiencial.
  - «Justicia» se usa aquí como término amplio y no meramente forense; la nota aclara la alternativa contextual.
