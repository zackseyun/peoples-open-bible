review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo principal: una lista tripartita de autoridades honoradas, contrastada con la superioridad de quien teme a Dios. También preserva bien la variante griega mayor en nota. Sin embargo, la construcción inicial «A un gobernante..., a un gobernador y a un juez se les honra» introduce un giro marcado y menos directo que el pasivo plural hebreo; una formulación nominativa coordina mejor con el original y con la dignidad del estilo.'
  spanish_quality_summary: El español es claro y fiel, pero el arranque con objeto preposicional duplicado suena algo forzado y menos elegante de lo necesario. «Son honrados» mejora la fluidez, mantiene el pasivo de sentido y evita una estructura pesada. El resto del versículo es natural y eclesialmente legible.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Dios» para אֱלֹהִים y «teme a Dios» preserva bien el idiomatismo bíblico. La nota textual griega usa correctamente «esclavo», en línea con la política léxica. La diferenciación «gobernante / gobernador / juez» refleja adecuadamente las decisiones auditadas.'
  issues:
  - severity: medium
    issue: Construcción inicial algo forzada en español
    rationale: «A un gobernante..., a un gobernador y a un juez se les honra» es comprensible, pero menos natural y menos digna que una formulación nominativa simple. El hebreo presenta sujetos plurales seguidos por un predicado pasivo; «son honrados» lo refleja mejor.
  - severity: low
    issue: Opción verbal mejorable para נִכְבָּדוּ
    rationale: Aunque «se les honra» es aceptable, «son honrados» corresponde más directamente al pasivo plural y mejora el ritmo de la enumeración.
  revised_spanish_text: Un gobernante[a], un gobernador y un juez son honrados, pero ninguno es mayor que el que teme a Dios.
