revisions:
- from: Entonces sabrán que he enviado esta orden[a] a ustedes, para que mi pacto con Leví[b] sea, dice Yahvé de los Ejércitos.
  to: Entonces sabrán que les he enviado esta orden, para que mi pacto con Leví[a] llegue a ser, dice Yahvé de los Ejércitos.[b]
  rationale: Se corrige el anclaje de la nota para que recaiga sobre la cláusula hebrea ambigua, no sobre «esta orden». Se mejora la fluidez española con «les he enviado». Se cambia «sea» por «llegue a ser» como reparación mínima de legibilidad, manteniendo la literalidad básica de לִהְיוֹת y evitando introducir la interpretación más fuerte de «continúe». Se preserva «Yahvé» conforme al proyecto y se mantiene la nota sobre la alternativa tradicional.
