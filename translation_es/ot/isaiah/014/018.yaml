translation:
  language: es
  text: Todos los reyes de las naciones, todos ellos, yacen en gloria[a], cada uno en su propia casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con honor».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su casa»; en contexto, esto puede referirse a su tumba o cámara funeraria.
    reason: cultural_note
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno
  - Todo
  lexicon: HALOT
  rationale: El hebreo introduce la totalidad del grupo. «Todos» es la opción natural en español para una construcción colectiva.
- source_word: מַלְכֵי גוֹיִם
  english_pob_choice: the kings of the nations
  chosen_spanish: los reyes de las naciones
  alternatives_spanish:
  - los reyes de los pueblos
  - los reyes extranjeros
  lexicon: HALOT
  rationale: «Naciones» conserva el valor usual de גוֹיִם en este contexto de contraste y mantiene el tono amplio del hebreo.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - cada uno de ellos
  lexicon: HALOT
  rationale: El pronombre resumptivo intensifica la afirmación anterior. «Todos ellos» preserva esa reiteración sin suavizarla.
- source_word: שָׁכְבוּ
  english_pob_choice: lie
  chosen_spanish: yacen
  alternatives_spanish:
  - han yacido
  - reposan
  - duermen
  lexicon: HALOT
  rationale: En contexto funerario, el verbo expresa la condición de estar tendidos en la muerte o el sepulcro. «Yacen» es natural y conserva la imagen.
- source_word: בְּכָבוֹד
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - con honor
  - en honor
  lexicon: HALOT
  rationale: כָּבוֹד puede referirse aquí a un entierro digno o a un estado de honor. «En gloria» mantiene la literalidad y el paralelismo con el texto hebreo.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - un hombre
  - todo hombre
  lexicon: HALOT
  rationale: En esta construcción distributiva, אִישׁ funciona idiomáticamente como «cada uno». En español, esa forma preserva el sentido sin forzar un calco.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his own house
  chosen_spanish: en su propia casa
  alternatives_spanish:
  - en su casa
  - en su tumba
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en su casa». «Su propia casa» conserva la imagen y el matiz de posesión. La posible referencia contextual a la tumba queda implícita sin abandonar el texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audit trail inglés. Conserva la repetición enfática («todos... todos ellos») y la imagen funeraria literal («en gloria», «en su propia casa»), dejando en nota la alternativa interpretativa de «con honor» y la posible referencia al sepulcro.
  spanish_consistency_notes:
  - Se usa «naciones» para גוֹיִם, en línea con el valor estándar del término en este pasaje.
  - Se mantiene «gloria» en el cuerpo del texto para no diluir el paralelismo hebreo con una glosa interpretativa.
  - «Cada uno» refleja el distributivo אִישׁ sin introducir lenguaje genérico innecesario.
  - «En su propia casa» preserva la literalidad de בְּבֵיתוֹ y permite la lectura contextual de tumba en la nota.
