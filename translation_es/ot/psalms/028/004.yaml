review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura imperativa y retributiva del hebreo: mantiene los tres mandatos de petición a Dios y la lógica de correspondencia ''según... según... según...''. También conserva adecuadamente ''la obra de sus manos'' como imagen hebrea. Sin embargo, el cierre ''retribúyeles su debido'' no suena idiomático en español bíblico actual y debilita la claridad del sentido de גְּמוּלָם como ''retribución debida'' o ''pago merecido''. Además, la nota [a] está anclada en ''obra'', pero su contenido comenta la cláusula final, por lo que no corresponde al lugar señalado en el texto.'
  spanish_quality_summary: El español es en general claro y digno, pero 'su debido' resulta poco natural; 'la retribución que merecen' o 'su retribución merecida' sería más claro y fiel. También conviene reubicar la nota al segmento final pertinente. El resto del verso es legible y conserva bien el paralelismo sin caer en calcos torpes.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones ''obra'', ''maldad'', ''hechos'', y ''obra de sus manos'' son defendibles. La principal corrección necesaria es estilístico-lexical en גְּמוּלָם: evitar ''su debido'' por falta de naturalidad en español.'
  issues:
  - severity: medium
    issue: '''su debido'' es poco idiomático en español'
    rationale: Aunque intenta reflejar 'their due', en español neutro eclesial suena forzado y ambiguo. El hebreo גְּמוּלָם pide una expresión clara de retribución merecida o debida.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica una alternativa para la cláusula final ('repay them their recompense'), no para 'su obra'. Debe colocarse junto al segmento final correspondiente.
  revised_spanish_text: Dales según su obra, y según la maldad de sus hechos; según la obra de sus manos, dales; retribúyeles la retribución que merecen[a].
  revised_footnotes:
  - marker: a
    text: O, de manera más formal, «retribúyeles su retribución».
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'su debido' por 'la retribución que merecen' para expresar de manera natural y clara el sentido de גְּמוּלָם en español. También se mueve la nota al segmento final, donde realmente aplica la alternativa léxica documentada en la auditoría inglesa.
