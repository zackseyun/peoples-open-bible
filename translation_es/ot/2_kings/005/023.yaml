translation:
  language: es
  text: 'Naamán dijo: «Por favor, toma dos talentos». E insistió con él[a], y ató dos talentos de plata en dos bolsas[b], con dos cambios de ropa, y se los dio a dos de sus sirvientes, y ellos los llevaron delante de él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Insistió con él» refleja la idea de presión o apremio; también puede entenderse como «lo instó».
    reason: lexical_alternative
  - marker: b
    text: Es decir, dos bolsas o talegas que contenían la plata.
    reason: cultural_note
  - marker: c
    text: También puede entenderse «delante de él» o «ante él», indicando que los sirvientes llevaban los regalos al frente de Gehazi.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹאֵל
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Si te place
  lexicon: HALOT
  rationale: La partícula expresa una súplica cortés antes del imperativo. En español, «Por favor» comunica la misma fuerza de petición amable sin sonar arcaico.
- source_word: קַח
  english_pob_choice: take
  chosen_spanish: acepta
  alternatives_spanish:
  - toma
  - recibe
  lexicon: HALOT
  rationale: En este contexto no es solo agarrar físicamente, sino aceptar lo ofrecido. «Acepta» expresa mejor la intención pragmática del don sin alejarse del mandato implícito.
- source_word: כִּכָּרָיִם
  english_pob_choice: two talents
  chosen_spanish: dos talentos
  alternatives_spanish:
  - dos medidas de talento
  - dos talentos de peso
  lexicon: HALOT
  rationale: כִּכָּר es una unidad de peso estándar que en español bíblico se rinde bien como «talento». Mantener la unidad preserva la equivalencia auditiva y cultural del texto.
- source_word: וַיִּפְרָץ בּוֹ
  english_pob_choice: he urged him
  chosen_spanish: insistió con él
  alternatives_spanish:
  - lo instó
  - lo apremió
  lexicon: HALOT
  rationale: El giro comunica presión insistente para que acepte más. «Insistió con él» conserva la relación interpersonal del hebreo y evita un matiz demasiado moderno o demasiado suave.
- source_word: וַיָּצַר
  english_pob_choice: tied up
  chosen_spanish: ató
  alternatives_spanish:
  - envolvió
  - aseguró
  lexicon: HALOT
  rationale: El verbo describe la acción de sujetar o asegurar el dinero dentro de recipientes. «Ató» es breve, concreto y compatible con la imagen de preparar los paquetes.
- source_word: כִּכְּרַיִם כֶּסֶף
  english_pob_choice: two talents of silver
  chosen_spanish: dos talentos de plata
  alternatives_spanish:
  - dos talentos de dinero
  - dos talentos en plata
  lexicon: HALOT
  rationale: La construcción especifica el material del peso. «De plata» es la forma natural en español y conserva la precisión del original.
- source_word: חֲרִטִים
  english_pob_choice: bags
  chosen_spanish: bolsas
  alternatives_spanish:
  - sacos
  - bolsitas
  lexicon: HALOT
  rationale: El término alude a recipientes para transportar objetos valiosos. «Bolsas» es amplio, natural y suficiente sin imponer una imagen demasiado pequeña como «bolsitas».
- source_word: שְׁתֵּי חֲלִפוֹת בְּגָדִים
  english_pob_choice: two changes of clothes
  chosen_spanish: dos mudas de ropa
  alternatives_spanish:
  - dos cambios de ropa
  - dos juegos de ropa
  lexicon: HALOT
  rationale: La expresión hebrea apunta a conjuntos completos de vestimenta. «Mudas de ropa» es idiomático en español y transmite bien la idea de cambio completo de prendas.
- source_word: שְׁנֵי נְעָרָיו
  english_pob_choice: two of his servants
  chosen_spanish: dos de sus servidores
  alternatives_spanish:
  - dos de sus siervos
  - dos de sus jóvenes
  lexicon: HALOT
  rationale: Aquí נַעַר designa subordinados encargados de llevar los regalos. «Servidores» mantiene la función y evita forzar una lectura de edad cuando el contexto pide dependencia laboral.
- source_word: וַיִּשְׂאוּ לְפָנָיו
  english_pob_choice: they carried them before him
  chosen_spanish: las llevaron delante de él
  alternatives_spanish:
  - las llevaron ante él
  - las llevaron delante suyo
  lexicon: HALOT
  rationale: La expresión indica que los sirvientes iban con los presentes al frente de Gehazi. «Delante de él» conserva la dirección espacial del hebreo y funciona con naturalidad en español.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés; no se detectaron revisiones aplicadas en la pasada más reciente. Se conservaron la partícula de súplica, la idea de insistencia, la unidad de peso «talento», y la imagen de los sirvientes llevando los presentes al frente del destinatario.
  spanish_consistency_notes:
  - Se mantuvo «talentos» para כִּכָּרָיִם por coherencia con el tratamiento estándar de unidades de peso.
  - Se usó «servidores» para נְעָרָיו por el valor funcional del contexto, no por edad.
  - Se prefirió «delante de él» en el texto principal para mantener la orientación espacial del hebreo; la nota aclara la alternativa «ante él».
  - No se introdujo terminología eclesiástica ajena al texto, y no hubo necesidad de decisiones teológicas doctrinales en este versículo.
