review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: vocativo profético, permanencia de Ezequiel entre el pueblo, metáfora corporativa de ''casa'', y la caracterización de tener ojos/oídos sin ver ni oír. Sin embargo, en español el relativo singular ''que tiene... no ve... no oye'' debilita el sentido colectivo explícito del hebreo, donde los verbos finales están en plural. Conviene explicitar el valor corporativo con plural en la cláusula relativa.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero ''Hijo de hombre'' suena menos idiomático y menos establecido en español bíblico que ''Hijo de Adán'' o ''hijo de hombre''; aun así, puede mantenerse por cercanía formal. El problema principal es de concordancia semántica: ''una casa rebelde, que tiene... no ve... no oye'' personifica en singular de manera algo rígida, mientras que el hebreo y la nota inglesa resaltan al grupo. También mejora la fluidez usar ''tienen ojos... no ven; tienen oídos... no oyen''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva 'casa' para בֵּית מְרִי, conforme a la decisión teológica documentada. No aparecen términos como Yahvé/Mesías/esclavo que requieran control especial aquí.
  issues:
  - severity: medium
    issue: La cláusula relativa usa singular ('que tiene... no ve... no oye') donde el hebreo caracteriza a un colectivo con verbos en plural.
    rationale: Aunque 'casa' es singular gramatical, el hebreo dice literalmente que 'ellos' tienen ojos/oídos y 'no vieron/no oyeron'. La traducción inglesa también conserva el valor colectivo. En español, mantener el plural comunica mejor la metáfora corporativa sin perder 'casa'.
  - severity: low
    issue: La nota b suena poco natural en español con 'ojos hay para ellos'.
    rationale: 'La explicación literal puede formularse con más naturalidad manteniendo la literalidad básica: ''ojos son para ellos para ver...'' o mejor ''hay ojos para ellos para ver...''. Pero como es una nota de literalidad, basta una redacción más clara.'
  revised_spanish_text: Hijo de hombre[a], tú habitas en medio de una casa rebelde, que tiene ojos para ver, pero no ven; y oídos para oír, pero no oyen[b], porque son una casa rebelde.
  revised_footnotes:
  - marker: a
    text: O 'un pueblo rebelde' o 'una casa de rebelión'. El hebreo 'casa' es un término corporativo para el pueblo en su conjunto.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'ojos para ellos para ver, y no ven; oídos para ellos para oír, y no oyen'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula relativa al plural semántico del hebreo para reflejar mejor que 'casa' es una designación corporativa del pueblo. Se mantiene 'casa rebelde' en el texto principal por consistencia teológica y léxica con Ezequiel. También se alisa la nota literal para que sea más comprensible en español sin dejar de indicar la forma fuente.
