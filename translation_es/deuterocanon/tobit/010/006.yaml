translation:
  language: es
  text: 'Y Tobit le dijo: «Calla; no te inquietes[a]. Estate bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «No tengas palabra/asunto». La frase se vierte de modo idiomático como «no te inquietes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ Τωβείτ
  english_pob_choice: And Tobit
  chosen_spanish: Y Tobit
  alternatives_spanish:
  - Entonces Tobit
  - Y dijo Tobit
  lexicon: nombre propio / narrativa
  rationale: Se conserva el nombre propio transliterado y la conjunción narrativa inicial, natural en español bíblico sin sobrecargar el estilo.
- source_word: λέγει αὐτῇ
  english_pob_choice: said to her
  chosen_spanish: le dijo a ella
  alternatives_spanish:
  - le dijo
  - dijo a ella
  lexicon: LSJ
  rationale: El griego usa presente histórico; en español narrativo se expresa de forma natural como pasado. Se mantiene el destinatario explícito por claridad.
- source_word: Σίγα
  english_pob_choice: Be quiet
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Silencio
  lexicon: LSJ
  rationale: Imperativo breve y directo de σιγάω. «Calla» transmite mejor la exhortación inmediata que una forma más larga o más suave.
- source_word: μὴ λόγον ἔχε
  english_pob_choice: do not be anxious
  chosen_spanish: no te inquietes
  alternatives_spanish:
  - no te preocupes
  - no te angusties
  - no le des importancia
  lexicon: LSJ
  rationale: La expresión es idiomática y literalmente significa algo como «no tengas palabra/asunto». En contexto, Tobit calma la ansiedad de ella; «no te inquietes» conserva esa fuerza sin perder el matiz idiomático.
- source_word: ὑγίαινε
  english_pob_choice: Be well
  chosen_spanish: Está bien
  alternatives_spanish:
  - Que estés bien
  - Sé sano
  - Que te vaya bien
  lexicon: LSJ
  rationale: El imperativo de ὑγιαίνω apunta a salud/bienestar. «Está bien» funciona como deseo breve y natural en español, preservando la idea de bienestar sin sonar clínico.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Tobit 10:6 y el expediente inglés, especialmente la decisión de tratar μὴ λόγον ἔχε como una expresión idiomática de calma/animo en vez de una traducción literal oscura. Se ajustó la nota al pie para que su marcador [a] aparezca en el texto principal.
  spanish_consistency_notes:
  - Se usa «Tobit» como nombre propio transliterado, en línea con el expediente inglés.
  - Se mantiene un registro bíblico moderno y sobrio, sin recurrir a formulaciones arcaicas innecesarias.
  - «Calla» conserva la brevedad del imperativo griego Σίγα.
  - «No te inquietes» refleja mejor el valor contextual de calma que una literalidad rígida.
  - «Está bien» mantiene el matiz de bienestar de ὑγίαινε.
