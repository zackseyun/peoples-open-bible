translation:
  language: es
  text: Así que Hanún tomó a los servidores de David[a], los rasuró, cortó sus vestidos en dos hasta las caderas[b], y los envió de vuelta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo de 2 Samuel 10:4 especifica que Hanún les rasuró la mitad de la barba; Crónicas solo dice que 'los rasuró'.
    reason: cross_reference
  - marker: b
    text: O 'hasta las nalgas'. El hebreo se refiere a la parte trasera del cuerpo y subraya la humillación pública por la exposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - esclavos
  lexicon: HALOT
  rationale: El término puede abarcar servidores o esclavos. En este contexto se trata de los hombres de David en misión diplomática, por lo que 'siervos' conserva la relación de servicio sin imponer la fuerza de 'esclavos'.
- source_word: וַיְגַלְּחֵם
  english_pob_choice: shaved them
  chosen_spanish: los rasuró
  alternatives_spanish:
  - los afeitó
  - les rapó el cabello
  lexicon: HALOT
  rationale: El verbo significa 'rasurar/afeitar'. Como Crónicas no especifica el objeto del rasurado, 'los rasuró' mantiene la indeterminación del hebreo y evita importar el detalle de 2 Samuel 10:4.
- source_word: מַדְוֵי/הֶם
  english_pob_choice: their garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: El término se refiere a la vestimenta. 'Vestidos' es natural y solemne en español bíblico, y comunica la humillación pública asociada con cortar la ropa.
- source_word: בַּ/חֵצִי
  english_pob_choice: in half
  chosen_spanish: en dos
  alternatives_spanish:
  - por la mitad
  - en mitad
  lexicon: HALOT
  rationale: La expresión indica división en dos partes. 'En dos' es claro y evita una formulación demasiado mecánica.
- source_word: עַד הַ/מִּפְשָׂעָה
  english_pob_choice: up to the hips
  chosen_spanish: hasta las caderas
  alternatives_spanish:
  - hasta los glúteos
  - hasta las nalgas
  - hasta la ingle
  lexicon: HALOT
  rationale: El hebreo alude al área posterior/cadera y enfatiza la deshonra por exposición. 'Caderas' refleja mejor el registro formal y el sentido espacial que una traducción demasiado anatómica.
- source_word: וַֽ/יְשַׁלְּחֵם
  english_pob_choice: sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió lejos
  - los mandó fuera
  lexicon: HALOT
  rationale: '''Despedir'' reproduce el sentido de enviar fuera con una carga de rechazo o desaire, acorde con la humillación previa.'
theological_decisions:
- issue: Tratamiento del nombre divino ausente en el versículo
  english_pob_reading: No divine-name issue is present in this verse.
  chosen_spanish_reading: No se introduce ninguna equivalencia teológica adicional.
  alternative_spanish_readings:
  - —
  rationale: El versículo no contiene referencia a יהוה, אֱלֹהִים ni κύριος, así que no hay decisión teológica especial que documentar aquí.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'La redacción sigue el sentido más reciente del audit trail inglés: la frase equivalente a ''up to the hips'' se refleja con una formulación formal y no con una referencia más cruda al área anatómica posterior, manteniendo la intención de humillación sin sobreespecificar. También se preserva la indeterminación de ''shaved them'' sin importar el detalle de Samuel.'
  spanish_consistency_notes:
  - Se usa 'siervos' para עַבְדֵי en coherencia con la decisión inglesa de no forzar 'esclavos' cuando el contexto es diplomático.
  - Se evita 'Cristo', 'SEÑOR' o mayúsculas convencionales porque el versículo no contiene esas formas.
  - '''Despidió'' conserva el matiz de expulsión/descortesía mejor que un simple ''envió''.'
  - Se mantiene la ambigüedad de la acción de rasurar, ya que el hebreo no especifica barba ni cabello en este versículo.
