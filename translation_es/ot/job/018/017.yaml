review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: desaparición del recuerdo desde la tierra y ausencia de nombre en el espacio público. También preserva la alternativa léxica de «land/public square». Sin embargo, «sobre la faz de la calle» suena demasiado calcado y poco natural en español; además, la nota usa «de la tierra» otra vez donde la alternativa inglesa es «from the land».'
  spanish_quality_summary: La línea es comprensible y bastante fiel, pero «sobre la faz de la calle» resulta rígido y poco idiomático para español bíblico moderno. «En la calle» o «en la plaza pública» comunica mejor el hebreo חוץ como espacio público. «Su recuerdo perece» es aceptable, aunque «desaparece» o «se pierde» serían más naturales; no hace falta cambiarlos porque «perece» conserva bien la fuerza poética.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. Las decisiones «recuerdo», «perece», «tierra» y «nombre» concuerdan con la justificación del POB. Se recomienda ajustar solo la representación de עַל־פְּנֵי חוּץ para mejor español sin perder el valor de esfera pública.
  issues:
  - severity: medium
    issue: «sobre la faz de la calle» es un calco poco natural
    rationale: Aunque עַל־פְּנֵי se tradujo literalmente en inglés para preservar textura poética, en español esa formulación con «la calle» suena extraña y poco digna. El sentido se preserva mejor con «en la calle», manteniendo la referencia al ámbito público.
  - severity: low
    issue: La nota alternativa no refleja «from the land»
    rationale: La nota repite «de la tierra» donde la alternativa inglesa distingue «from the land». En español conviene marcar esa alternativa como «de la tierra» / «del país» o mantener «de la tierra» en texto principal y «del país» en nota si se quiere preservar el contraste.
  revised_spanish_text: Su recuerdo perece de la tierra[a], y no tiene nombre en la calle.
  revised_footnotes:
  - marker: a
    text: 'O: «Su recuerdo se desvanece del país, y no tiene nombre en la plaza pública».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva la fidelidad al hebreo y al POB, pero se reemplaza un calco poco natural por un español más claro y digno: «en la calle» transmite bien el espacio público de חוּץ. La nota se ajusta para reflejar mejor la alternativa «from the land/public square».'
