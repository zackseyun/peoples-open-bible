translation:
  language: es
  text: Porque al hombre que es bueno delante de él le ha dado sabiduría, conocimiento y alegría[a]; pero al pecador le ha dado la tarea de reunir y amontonar, para dar al que es bueno delante de Dios. También esto es vanidad y correr tras el viento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘que le agrada’ / ‘que agrada a Dios’. El hebreo dice literalmente ‘que es bueno delante de él/Dios’.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘afanarse tras el viento’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאָדָם
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a una persona
  - a la humanidad
  lexicon: HALOT
  rationale: אָדָם aquí contrasta con ‘el pecador’ y se refiere a una persona individual, no a la humanidad en general. ‘Al hombre’ conserva ese contraste y el valor masculino genérico del hebreo sin volverlo impersonal.
- source_word: שֶׁטּוֹב לְפָנָיו
  english_pob_choice: who is good before him
  chosen_spanish: que es bueno delante de él
  alternatives_spanish:
  - que le agrada
  - que es bueno a sus ojos
  lexicon: HALOT
  rationale: La frase hebrea es literalmente ‘que es bueno delante de él’. Mantener ‘delante de él’ preserva la imagen y deja transparente la evaluación moral/relacional del texto, sin resolverla de inmediato como ‘agradar’.
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  lexicon: HALOT
  rationale: 'El perfecto hebreo se expresa bien con el pretérito perfecto compuesto en español para una realidad estable y vigente: lo que Dios ha asignado permanece como condición reconocible.'
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: ‘Sabiduría’ es el equivalente directo y natural en español para חָכְמָה en Eclesiastés, donde designa capacidad práctica y reflexiva.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  lexicon: HALOT
  rationale: ‘Conocimiento’ reproduce el sentido más inmediato de דַעַת y mantiene el paralelismo con ‘sabiduría’ sin superponer demasiado ambas nociones.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  lexicon: HALOT
  rationale: ‘Alegría’ es claro y natural en español moderno. ‘Gozo’ sería posible, pero suele sonar más marcado devocionalmente; aquí el término comunica bien el don concedido.
- source_word: לַחוֹטֵא
  english_pob_choice: to the sinner
  chosen_spanish: al pecador
  alternatives_spanish:
  - al que peca
  - al que está en pecado
  lexicon: HALOT
  rationale: El participio designa un tipo de persona, no solo un acto puntual. ‘El pecador’ conserva el contraste con ‘el hombre que es bueno delante de él’.
- source_word: עִנְיָן
  english_pob_choice: the task
  chosen_spanish: la tarea
  alternatives_spanish:
  - la ocupación
  - el quehacer
  - el trabajo
  lexicon: HALOT
  rationale: En este contexto, עִנְיָן apunta a una labor asignada o impuesta. ‘Tarea’ transmite bien la idea de una ocupación encomendada sin introducir matices más fuertes de los que exige el hebreo.
- source_word: לֶאֱסוֹף וְלִכְנוֹס
  english_pob_choice: of gathering and collecting
  chosen_spanish: de reunir y amontonar
  alternatives_spanish:
  - de recoger y acumular
  - de juntar y acumular
  lexicon: HALOT
  rationale: Los dos infinitivos son casi sinónimos y enfatizan la acumulación. ‘Reunir y amontonar’ conserva la repetición y el movimiento de acopio; ‘amontonar’ refleja bien el matiz de acumulación intensiva.
- source_word: לָתֵת לְטוֹב לִפְנֵי הָאֱלֹהִים
  english_pob_choice: to give to the one who is good before God
  chosen_spanish: para dar al que es bueno delante de Dios
  alternatives_spanish:
  - para dar al que agrada a Dios
  - para dar al hombre que es bueno delante de Dios
  lexicon: HALOT
  rationale: La construcción repite la idea inicial y ahora nombra explícitamente a Dios. ‘Delante de Dios’ preserva la misma estructura evaluativa que el hebreo y la conexión interna con la primera cláusula.
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vapor
  - futilidad
  - vacío
  lexicon: HALOT
  rationale: ‘Vanidad’ conserva el término tradicional de Eclesiastés y su carga temática. Aunque ‘vapor’ es más literal, ‘vanidad’ mantiene mejor la red de resonancias del libro en español.
- source_word: רְעוּת רוּחַ
  english_pob_choice: a chasing after wind
  chosen_spanish: persecución del viento
  alternatives_spanish:
  - correr tras el viento
  - afán por el viento
  - seguir el viento
  lexicon: HALOT
  rationale: La expresión idiomática comunica una búsqueda inútil. ‘Persecución del viento’ conserva la imagen y su fuerza metafórica; aunque ‘correr tras el viento’ suena más natural, ‘persecución’ mantiene el sustantivo abstracto compatible con el paralelo de ‘vanidad’.
theological_decisions:
- issue: Sujeto implícito de נָתַן (‘ha dado’),
  english_pob_reading: God is the implied giver throughout the verse
  chosen_spanish_reading: Dios es el dador implícito en toda la versículo, aunque solo se menciona explícitamente al final
  alternative_spanish_readings:
  - un sujeto impersonal o genérico
  - el destino como agente
  rationale: El contexto inmediato ya atribuye el don a Dios, y la referencia explícita a Dios en la segunda mitad del versículo confirma ese trasfondo. Traducir con sujeto implícito evita añadir palabras innecesarias y conserva la unidad teológica del versículo.
  doctrine_reference: Eclesiastés 2:24–26; filosofía de traducción §3, §5
- issue: Sentido de טוב לפני האלהים
  english_pob_reading: good before God
  chosen_spanish_reading: bueno delante de Dios
  alternative_spanish_readings:
  - agradable a Dios
  - aceptado por Dios
  rationale: Se preserva la relación lexical con טוב (‘bueno’) y la imagen espacial ‘delante de’. La alternativa ‘agradable a Dios’ es válida, pero interpretaría más de lo que el hebreo dice literalmente.
  doctrine_reference: HALOT; Eclesiastés 2:26
- issue: Sentido de רְעוּת רוּחַ
  english_pob_reading: a chasing after wind
  chosen_spanish_reading: persecución del viento
  alternative_spanish_readings:
  - afán por el viento
  - correr tras el viento
  - búsqueda del viento
  rationale: La expresión final es idiomática y figura un esfuerzo inútil. ‘Persecución del viento’ conserva el núcleo metafórico y puede leerse junto con ‘vanidad’ como una doble valoración del carácter fútil de esa labor.
  doctrine_reference: HALOT; Eclesiastés 1:14; 2:11
translation_notes:
  revision_awareness: 'Se mantiene la lectura del texto hebreo y la solución inglesa auditada: ‘good before him/God’ se conserva como ‘bueno delante de él/Dios’, y la clausula final se reproduce con imagen de esfuerzo inútil. No se detectaron revisiones aplicadas en el expediente inglés reciente.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ donde el hebreo dice הָאֱלֹהִים, y se conserva ‘delante de él/Dios’ para mantener la ambigüedad controlada del hebreo.
  - Se eligió ‘vanidad’ por coherencia con la terminología temática de Eclesiastés en español.
  - Se evitó sustituir ‘espíritu’ por ‘viento’ porque aquí רוּחַ es claramente la imagen de viento en la expresión idiomática final.
  - ‘Al hombre’ y ‘al pecador’ preservan el contraste antropológico del versículo.
