translation:
  language: es
  text: 'Y uno llamó al otro y dijo: «Santo, santo, santo es Yahvé[b] de los ejércitos[a]; toda la tierra está llena de su gloria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las huestes». La expresión hebrea צְבָאוֹת se refiere al conjunto de fuerzas bajo el mando de Yahvé, tanto celestiales como terrenales.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: YHWH, tradicionalmente traducido «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְקָרָא
  english_pob_choice: called
  chosen_spanish: clamaba
  alternatives_spanish:
  - llamaba
  - decía en voz alta
  lexicon: HALOT
  rationale: En el contexto antífonaI, el verbo expresa un clamor proclamado de un ser a otro. «Clamaba» conserva el matiz de voz fuerte o proclamación y suena natural en español bíblico sin volverlo demasiado interpretativo.
- source_word: זֶה אֶל זֶה
  english_pob_choice: one to another
  chosen_spanish: al otro
  alternatives_spanish:
  - uno a otro
  - el uno al otro
  lexicon: HALOT
  rationale: La expresión es recíproca e idiomática. «Al otro» dentro de «uno... al otro» mantiene la reciprocidad con buena fluidez en español.
- source_word: וְאָמַר
  english_pob_choice: and said
  chosen_spanish: y decía
  alternatives_spanish:
  - y dijo
  - y exclamaba
  lexicon: HALOT
  rationale: En español, la secuencia narrativa y el tono litúrgico se expresan bien con imperfecto progresivo/iterativo. «Decía» preserva la continuidad del acto de proclamación.
- source_word: קָדוֹשׁ קָדוֹשׁ קָדוֹשׁ
  english_pob_choice: Holy, holy, holy
  chosen_spanish: Santo, santo, santo
  alternatives_spanish:
  - Santo, santo, santo
  lexicon: HALOT
  rationale: La triple repetición se conserva literalmente por su fuerza enfática y litúrgica. «Santo» es el equivalente directo y más transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre divino personal sin sustituirlo por un título.'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los anfitriones
  lexicon: HALOT
  rationale: «Hosts» en español eclesial suele sonar opaco; «los ejércitos» comunica mejor la imagen de fuerzas celestiales y terrenales bajo su mando. La elección prioriza claridad sin perder el rango semántico del título.
- source_word: מְלֹא כָל הָאָרֶץ
  english_pob_choice: the whole earth is full
  chosen_spanish: toda la tierra está llena
  alternatives_spanish:
  - la tierra entera está llena
  - está llena toda la tierra
  lexicon: HALOT
  rationale: La construcción nominal hebrea se vierte naturalmente con predicado en español. «Toda la tierra está llena» mantiene el sentido de plenitud de forma clara y fiel.
- source_word: כְּבוֹדוֹ
  english_pob_choice: of his glory
  chosen_spanish: de su gloria
  alternatives_spanish:
  - con su gloria
  - su gloria
  lexicon: HALOT
  rationale: 'La relación final es posesiva y complementa la idea de llenura: la tierra está llena de la gloria de Dios. «De su gloria» es la expresión más natural y precisa.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el principio doctrinal del POB de no ocultar el Tetragrámaton tras «SEÑOR». «Yahvé» es la forma establecida en el proyecto para preservar el nombre revelado de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: Se conserva la amplitud teológica del título con una expresión comprensible en español. «Los ejércitos» comunica el dominio de Yahvé sobre las fuerzas celestiales y terrenales, manteniendo la dignidad del título.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6; Contested terms for יְהוָה
- issue: Intensificación triplicada de «Santo»
  english_pob_reading: Holy, holy, holy
  chosen_spanish_reading: Santo, santo, santo
  alternative_spanish_readings:
  - Santo, tres veces santo
  rationale: No se parafrasea la triple repetición, porque la fuerza retórica y litúrgica del texto depende precisamente de esa reiteración. La traducción literal es la más fiel.
  doctrine_reference: HALOT; poesía y liturgia profética
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios respecto del estado auditado; se ha mantenido la estructura antífonaI y la triple proclamación, con adaptación idiomática natural en español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton en coherencia con la terminología del proyecto.
  - Se usa «de los ejércitos» para צְבָאוֹת por claridad semántica en español, aunque se deja nota alternativa sobre «huestes».
  - La repetición triple de «santo» se mantiene sin expansión interpretativa.
  - La puntuación con comillas angulares y dos puntos reproduce bien el discurso directo y la solemnidad del pasaje.
