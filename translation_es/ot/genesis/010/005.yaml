translation:
  language: es
  text: De estos quedaron divididas las costas de las naciones[a], en sus tierras, cada uno según su lengua[b], por sus clanes, en sus naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «las islas de las naciones». El hebreo puede referirse a islas o, más ampliamente, a regiones costeras y marítimas.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «hombre según su lengua», una expresión distributiva que significa «cada uno según su lengua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֵלֶּה
  english_pob_choice: From these
  chosen_spanish: De estos
  alternatives_spanish:
  - A partir de estos
  - De ellos
  lexicon: HALOT
  rationale: El hebreo marca origen o procedencia; «De estos» conserva ese punto de partida de manera natural en español.
- source_word: נִפְרְדוּ
  english_pob_choice: were separated
  chosen_spanish: se separaron
  alternatives_spanish:
  - fueron separados
  - se dividieron
  lexicon: HALOT
  rationale: El nifal expresa separación/dispersion pasiva o media. «Se separaron» suena natural en español y conserva la idea de dispersión sin forzar un agente explícito.
- source_word: אִיֵּי הַגּוֹיִם
  english_pob_choice: the coastlands of the nations
  chosen_spanish: las costas de las naciones
  alternatives_spanish:
  - las islas de las naciones
  - las regiones costeras de las naciones
  lexicon: HALOT
  rationale: אִיִּים puede designar islas o costas/regiones marítimas. Se eligió «costas» para mantener la amplitud geográfica del término y su naturalidad en español, sin reducirlo solo a islas.
- source_word: בְּאַרְצֹתָם
  english_pob_choice: in their lands
  chosen_spanish: en sus tierras
  alternatives_spanish:
  - en sus territorios
  - en sus países
  lexicon: HALOT
  rationale: אֶרֶץ aquí refiere a territorios habitados; «tierras» es claro y suficientemente amplio.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque literalmente es «hombre», en construcción distributiva significa «cada uno». «Cada uno» preserva la distribución sin introducir un masculino genérico innecesario.
- source_word: לִלְשֹׁנוֹ
  english_pob_choice: according to his language
  chosen_spanish: según su lengua
  alternatives_spanish:
  - según su idioma
  - conforme a su lengua
  lexicon: HALOT
  rationale: לָשׁוֹן puede significar lengua/idioma; en este contexto etnográfico, «lengua» comunica bien el criterio de clasificación. «Según» reproduce la relación distributiva.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en listas genealógicas suele ser un grupo de parentesco amplio, es decir, un clan. «Clanes» evita reducirlo a la familia nuclear.
- source_word: בְּגוֹיֵהֶם
  english_pob_choice: in their nations
  chosen_spanish: en sus naciones
  alternatives_spanish:
  - entre sus naciones
  - como sus naciones
  lexicon: HALOT
  rationale: גּוֹי designa nación/pueblo. «En sus naciones» conserva el paralelismo con «en sus tierras» y el sentido de agrupación étnico-política.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial auditado en inglés: se evitó una formulación que hiciera sonar el verso como una mera partición geográfica, pero se mantuvo la referencia completa de אִיֵּי הַגּוֹיִם y el valor distributivo de אִישׁ לִלְשֹׁנוֹ. También se conservó la estructura final paralela del versículo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «clanes» para מִשְׁפְּחֹתָם por su valor genealógico/etnográfico.
  - «Lengua» se prefirió a «idioma» por la cercanía formal con el hebreo y porque sigue siendo natural en español bíblico contemporáneo.
