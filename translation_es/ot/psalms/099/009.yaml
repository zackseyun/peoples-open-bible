review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: dos imperativos dirigidos al pueblo, el nombre divino como ''Yahvé'', ''nuestro Dios'', y la razón final basada en la santidad de Yahvé. Sin embargo, ''ante su santo monte'' y la nota correspondiente se apartan del rastro auditado en inglés, que finalmente fijó ''at his holy mountain''. En español, ''en su santo monte'' preserva mejor esa decisión sin sugerir que el monte sea objeto de culto.'
  spanish_quality_summary: El texto es claro y digno, pero 'ante su santo monte' suena algo interpretativo frente al valor locativo/relacional que el inglés auditado resolvió como 'at'. 'Póstrense' es una buena opción para conservar la corporalidad de הִשְׁתַּחֲווּ. La sintaxis general es natural y eclesialmente legible.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé''; אֱלֹהֵינוּ -> ''nuestro Dios''; קָדוֹשׁ -> ''santo''. La principal corrección es alinear לְהַר קָדְשׁוֹ con la resolución auditada ''at his holy mountain'', mejor vertida aquí como ''en su santo monte''.'
  issues:
  - severity: medium
    issue: La frase 'ante su santo monte' no sigue la resolución final del audit trail inglés.
    rationale: El registro aplicado cambió 'toward' a 'at'. Aunque 'ante' es defendible desde el hebreo, el encargo pide preservar también la racionalidad documentada del POB inglés. 'En su santo monte' alinea mejor con esa decisión final.
  - severity: medium
    issue: La nota al pie usa 'adórenlo', introduciendo un objeto explícito no presente en el texto base.
    rationale: 'El hebreo solo manda ''postrarse/adorar'' en relación con el monte santo; añadir el pronombre ''lo'' hace más explícita la referencia al objeto de adoración de lo que hace la nota inglesa. Conviene mantener la alternativa más cercana: ''adoren en su santo monte'' o similar.'
  - severity: low
    issue: La nota explica la preposición como 'ante' o 'en relación con', pero no refleja la alternativa auditada 'at'.
    rationale: Para coherencia con la pista inglesa y mayor claridad para lectores en español, la nota debe mencionar 'en' como alternativa principal y, si se desea, 'hacia' o 'ante' como matices secundarios.
  revised_spanish_text: Exalten a Yahvé nuestro Dios[a], y póstrense en su santo monte, porque santo es Yahvé nuestro Dios.
  revised_footnotes:
  - marker: a
    text: O ‘adoren en su santo monte’. El verbo hebreo puede expresar tanto postrarse como adorar, y la preposición puede entenderse como ‘en’ o ‘hacia’.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase preposicional a 'en su santo monte' para seguir la resolución final del audit trail inglés ('at his holy mountain') y se corrige la nota para evitar el añadido interpretativo 'adórenlo', manteniendo la alternativa léxica del verbo y la ambigüedad espacial de la preposición con mejor fidelidad al expediente.
