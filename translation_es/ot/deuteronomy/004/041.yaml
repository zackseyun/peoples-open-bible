translation:
  language: es
  text: Entonces Moisés apartó tres ciudades al otro lado del Jordán[a], hacia donde sale el sol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá del Jordán» o «del otro lado del Jordán». El hebreo usa un giro geográfico idiomático cuya forma exacta en español depende de la perspectiva narrativa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia el salir del sol»; es decir, «hacia el este».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - At that time
  - Luego
  lexicon: HALOT
  rationale: El adverbio temporal introduce la siguiente acción narrativa; «Entonces» conserva la secuencia con un español natural y directo.
- source_word: יַבְדִּיל
  english_pob_choice: set apart
  chosen_spanish: apartó
  alternatives_spanish:
  - separó
  - designó
  - puso aparte
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar separación con un fin concreto. «Apartó» comunica bien la acción de reservar esas ciudades para un propósito especial sin añadir interpretación innecesaria.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosés
  lexicon: Transliteration standard
  rationale: Se usa la transliteración española estándar del nombre propio.
- source_word: שָׁלֹשׁ עָרִים
  english_pob_choice: three cities
  chosen_spanish: tres ciudades
  alternatives_spanish:
  - tres urbes
  lexicon: HALOT
  rationale: La construcción numeral + sustantivo se rinde de forma directa y transparente; «ciudades» mantiene el sentido básico.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático geográfico cuyo punto de referencia depende de la perspectiva narrativa. «Al otro lado del Jordán» conserva esa relatividad sin forzar una equivalencia más interpretativa.
- source_word: מִזְרְחָה שָׁמֶשׁ
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia el nacimiento del sol
  alternatives_spanish:
  - hacia el amanecer
  - hacia el oriente
  - hacia donde sale el sol
  lexicon: HALOT
  rationale: La imagen literal es «hacia el salir/rise del sol». «Nacimiento del sol» mantiene la concreción hebrea y su orientación espacial; «oriente» sería más idiomático pero menos transparente a la metáfora original.
translation_notes:
  revision_awareness: 'El texto inglés auditado usa una solución optimal-equivalence: «set apart» para יַבְדִּיל, y mantiene el valor idiomático de בְּעֵבֶר הַיַּרְדֵּן con una nota alternativa. La versión española sigue esas decisiones, conservando también la imagen concreta de מִזְרְחָה שָׁמֶשׁ mediante una frase transparente y natural. No hay cambios revisados aplicados en el pasaje fuente.'
  spanish_consistency_notes:
  - Se prefirió «Moisés» como nombre propio estándar en español.
  - Se mantuvo «Jordán» con mayúscula por referirse al río.
  - «Apartó» evita sobretraducir a «designó», que añadiría un matiz administrativo no explicitado por el hebreo.
  - Se preservó la tensión geográfica de la expresión del «otro lado del Jordán» con una nota alternativa, en línea con el audit trail inglés.
  - «Nacimiento del sol» conserva la imaginería del hebreo; la nota aclara su equivalencia direccional al este.
