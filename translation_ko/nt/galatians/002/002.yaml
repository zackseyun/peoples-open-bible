  text: 내가 올라간 것은 계시를 따른 것이었습니다[a]. 그리고 나는 내가 이방인 가운데 전하는 복음을 그들에게, 특히 인정받는 이들[b]에게는 따로 제시했습니다. 혹시라도 내가 헛되이 달리거나 달려왔을까 염려해서였습니다.
