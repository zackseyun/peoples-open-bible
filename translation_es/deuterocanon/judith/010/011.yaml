review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: movimiento en imperfecto, desplazamiento por el patio y encuentro con una fuerza asiria, además de conservar correctamente el singular «ella» frente al plural previo. Sin embargo, «en línea recta» suena algo rígido y geométrico para εἰς εὐθεῖαν en este contexto narrativo; una formulación como «seguían derecho por el patio» o «iban derecho por el patio» preserva mejor el sentido de avanzar directamente. También «destacamento avanzado» comunica la idea, pero «guardia de avanzada» se alinea más de cerca con «advance guard» y con προφυλακή como fuerza adelantada de vigilancia.'
  spanish_quality_summary: 'El español es generalmente claro, pero hay dos puntos de naturalidad mejorables: «en línea recta» resulta menos idiomático en narrativa, y «se encontró con ella» aplicado a un destacamento suena algo pesado. Una redacción más fluida y digna sería: «Y seguían derecho por el patio, y una guardia de avanzada asiria[a] salió a su encuentro» o «le salió al encuentro». Esta última además evita la repetición analítica de «se encontró con».'
  glossary_alignment: No hay términos teológicos principales implicados. La referencia étnica «asirios/asiria» está bien. La decisión de mantener el foco singular en Judit mediante «le/su» concuerda con la nota del POB. No hay conflicto con el glosario maestro.
  issues:
  - severity: medium
    issue: «en línea recta» suena demasiado literal y poco narrativo para εἰς εὐθεῖαν
    rationale: La frase griega es adverbial y expresa avance directo; en español bíblico-natural «derecho» o «directamente» suele sonar mejor que una imagen geométrica.
  - severity: medium
    issue: «destacamento avanzado» es aceptable, pero menos preciso/idiomático que «guardia de avanzada»
    rationale: προφυλακή aquí apunta a una fuerza adelantada o avanzada de vigilancia; «guardia de avanzada» conserva mejor ese matiz militar y se acerca más a la decisión inglesa auditada.
  - severity: low
    issue: «se encontró con ella» atribuido a un destacamento es algo torpe
    rationale: Aunque semánticamente válido, «le salió al encuentro» es más idiomático para una unidad militar que intercepta a alguien y mantiene el enfoque singular en Judit.
  revised_spanish_text: Y seguían derecho por el patio, y una guardia de avanzada asiria[a] le salió al encuentro.
  revised_footnotes:
  - marker: a
    text: El griego usa singular en «le salió al encuentro», aunque la primera cláusula dice «seguían». Eso estrecha el foco narrativo en Judit.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la frase para mejorar la naturalidad del español y acercarla mejor al valor del griego y del audit trail inglés: «seguían derecho» expresa mejor εἰς εὐθεῖαν en contexto narrativo; «guardia de avanzada asiria» refleja con más precisión προφυλακή τῶν Ἀσσυρίων; y «le salió al encuentro» comunica de forma más idiomática el encuentro con Judit manteniendo el singular destacado por la nota.'
