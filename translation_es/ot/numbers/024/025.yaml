translation:
  language: es
  text: Entonces Balaam se levantó, se fue y volvió a su lugar, y Balac también siguió su camino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El hebreo en secuencia narrativa puede expresar el acto de ponerse en movimiento o levantarse para partir. En español, «se levantó» comunica con naturalidad esa transición sin añadir información que el texto no da.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaán
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en su forma usual en español bíblico, Balaam, por claridad y continuidad canónica.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  lexicon: HALOT
  rationale: El verbo הָלַךְ en narrativa simple suele ser «ir». Aquí, «fue» mantiene la sucesión verbal breve del hebreo sin sonar rígido.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió atrás
  lexicon: HALOT
  rationale: שׁוּב con complemento de lugar indica regreso. «Volvió» es una equivalencia natural y directa en español.
- source_word: לִמְקֹמֹו
  english_pob_choice: to his place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su sitio
  - a su propio lugar
  lexicon: HALOT
  rationale: מָקוֹם significa literalmente «lugar». El hebreo no especifica «casa»; por eso se conserva la imagen sobria con «a su lugar».
- source_word: וְגַם
  english_pob_choice: and ... also
  chosen_spanish: y ... también
  alternatives_spanish:
  - y además
  - también
  lexicon: HALOT
  rationale: La construcción añade a Balac como participante paralelo. «También» preserva el valor aditivo sin sobrecargar la frase.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: nombre propio
  rationale: En español bíblico, Balac es la forma tradicional y más reconocible del nombre, manteniendo la referencia sin alterar el sentido.
- source_word: הָלַךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: Aunque el hebreo repite el verbo de ir, el contexto de cierre narrativo en español se expresa con naturalidad mediante «se fue», que conserva el movimiento de salida.
- source_word: לְדַרְכּוֹ
  english_pob_choice: on his way
  chosen_spanish: por su camino
  alternatives_spanish:
  - en su camino
  - a su camino
  lexicon: HALOT
  rationale: דֶּרֶךְ es «camino» o «ruta». «Por su camino» transmite el giro idiomático de manera natural y mantiene el paralelismo narrativo con el inglés auditado.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones aplicadas; el pasaje mantiene un cierre narrativo directo. La versión española sigue de cerca la estructura hebrea, pero ajusta el orden y la elección verbal para una lectura natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo la secuencia narrativa breve con verbos simples, evitando ampliaciones interpretativas.
  - Se respetó la diferencia entre «lugar» y «camino» para reflejar מָקוֹם y דֶּרֶךְ sin fusionarlos.
  - Se usó Balac en lugar de una transliteración más cercana al inglés para coherencia con el uso bíblico español.
  - No se añadieron notas porque no hay tensiones léxicas o textuales significativas en este versículo.
