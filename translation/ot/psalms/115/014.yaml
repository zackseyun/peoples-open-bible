  from: to you, to you and to your children
  to: to you—to you and to your children
  rationale: The current rendering with commas creates a slightly awkward list structure that can be read as redundant ('increase is given to you, and also to the group of you-and-your-children'). The Hebrew structure, marked by the Etnahta accent, suggests the second half of the verse is an emphatic apposition or expansion. Using an em dash better captures this clarifying relationship in English, preserving the repetition noted by the drafter while improving the rhetorical flow.
