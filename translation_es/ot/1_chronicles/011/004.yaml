    issue: La nota al pie está mal anclada
    rationale: La nota explica específicamente הַיְבוּסִי como singular colectivo traducido en plural; por eso debe marcar «los jebuseos», no el final del versículo.
  - severity: low
    issue: Puntuación parentética poco natural
    rationale: «Jerusalén —es decir, Jebús—, donde...» es entendible, pero en español fluye mejor «Jerusalén (es decir, Jebús), donde...» o con comas simples.
  - severity: low
    issue: «los habitantes de la tierra» puede sonar demasiado amplio
    rationale: Aunque literal, aquí אָרֶץ apunta a la tierra/región local ocupada por los jebuseos. «La región» suena más natural en español y recoge mejor la nota lexical inglesa.
