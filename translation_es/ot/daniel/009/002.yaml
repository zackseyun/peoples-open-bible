base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/002.yaml
  text: 'In the first year of his reign[a], I, Daniel, understood from the books the number of the years concerning which the word of Yahweh had come to Jeremiah the prophet, to fulfill the desolations of Jerusalem: seventy years.'
  footnotes:
  - marker: a
    text: Or 'from the scrolls.' The Hebrew term can refer broadly to written documents; 'books' is used in the main text for natural English, while 'scrolls' preserves the ancient medium more explicitly.
    reason: cultural_note
