theological_decisions:
- issue: Anthropomorphic and pastoral imagery for God's care
  chosen_reading: Retain the concrete imagery of drawing, lifting the yoke, bending down, and feeding without allegorical expansion.
  alternative_readings:
  - Interpret the verse more abstractly as God guiding Israel kindly and providing for them
  rationale: 'The Hebrew presents vivid relational and husbandry imagery. Preserving the imagery maintains the text''s theological tension: God is both tender and authoritative, without importing later doctrinal categories not explicit in the verse.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Singular pronoun אֵלָיו following plural references
  chosen_reading: Keep the singular 'to him'/'fed him' in the main text.
  alternative_readings:
  - Normalize to plural 'to them'/'fed them'
  rationale: The source text's singular should be respected unless there is compelling reason to emend or smooth it. The singular may reflect Israel conceived corporately as one son. The alternative is preserved in a footnote rather than resolved away.
  doctrine_reference: Translation philosophy §§1, 3, 5
