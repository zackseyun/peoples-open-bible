translation:
  text: Jesus said[a], "Whoever has become rich, let him be king; and whoever has
    power[c][b], let him renounce it."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲣⲣⲣⲟ can be rendered "reign" or "rule"; "be king" reflects the verbal nuance
      tied to ⲣⲟ (king) and preserves Thomas’s stark phrasing.
    reason: lexical_alternative
  - marker: b
    text: ⲇⲩⲛⲁⲙⲓⲥ (Greek loan) may also mean "might" or "ability," and in some contexts
      "miraculous power." "Power" is kept here for broadness and parallelism.
    reason: lexical_alternative
  - marker: c
    text: The object of ⲁⲣⲛⲁ is implicit in Coptic; supplying "it" (i.e., the power)
      clarifies the sense without altering the structure.
    reason: dialect_note
lexical_decisions:
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - Jesus says
  - Jesus spoke
  lexicon: Layton (Grammar) on narrative verb usage; Crum (Dictionary) s.v. ⲡⲉϫⲉ
  rationale: Standard rendering of the quotative verb ⲡⲉϫⲉ with proper name; present
    the saying directly rather than with "that" to keep Thomasine terseness.
- source_word: ⲡⲉⲧⲉⲣⲉ ⲁⲛⲧⲟϥ ⲣⲣⲙⲙⲁⲟ
  chosen: Whoever has become rich
  alternatives:
  - The one who has become wealthy
  - Whoever has grown great (in wealth)
  lexicon: Crum s.v. ⲣⲣⲙⲙⲁⲟ; Layton (Grammar) on relative perfect ⲡⲉⲧⲉⲣⲉ + dependent
    pronoun
  rationale: ⲡⲉⲧⲉⲣⲉ + ⲁⲛⲧⲟϥ forms a relative perfect "the one who has..."; ⲣⲣⲙⲙⲁⲟ
    denotes becoming rich/wealthy.
- source_word: ⲙⲁⲣⲉⲛⲧⲟϥ ⲣⲣⲣⲟ
  chosen: let him be king
  alternatives:
  - let him reign
  - let him rule
  lexicon: Crum s.v. ⲣⲣⲣⲟ; Layton (Grammar) on jussive ⲙⲁⲣⲉ-
  rationale: ⲙⲁⲣⲉ- marks jussive/exhortation; ⲣⲣⲣⲟ is the verbal form of "king" meaning
    "be king/ reign." Retaining "be king" preserves Thomas’s sharp diction.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - also
  - and moreover
  lexicon: Crum s.v. ⲁⲩⲱ
  rationale: Simple connective; Thomas favors terse coordination.
- source_word: ⲡⲉⲧⲉⲣⲉ ⲟⲩⲛⲧⲁ ⲛⲧⲟϥ ⲛⲟⲩⲇⲩⲛⲁⲙⲓⲥ
  chosen: whoever has power
  alternatives:
  - whoever possesses power
  - whoever has a power/ability
  lexicon: Crum s.v. ⲟⲩⲛ̄ (existential ‘there is’) + dative possession; Crum s.v.
    ⲇⲩⲛⲁⲙⲓⲥ (loan from Greek); Layton (Grammar) on ⲟⲩⲛ̄ⲧⲁϥ possession
  rationale: Possession construction ⲟⲩⲛ̄ⲧⲁⲛⲧⲟϥ + noun gives "he has [noun]"; ⲇⲩⲛⲁⲙⲓⲥ
    is Greek ‘power, might’—rendered simply as “power.”
- source_word: ⲙⲁⲣⲉⲛⲧⲟϥ ⲁⲣⲛⲁ
  chosen: let him renounce it
  alternatives:
  - let him deny it
  - let him renounce
  - let him disown it
  lexicon: Crum s.v. ⲁⲣⲛⲁ
  rationale: ⲁⲣⲛⲁ means ‘deny/renounce.’ The direct object is implicit in Coptic and
    refers to the immediately preceding ⲇⲩⲛⲁⲙⲓⲥ; supplying “it” clarifies the parallelism
    without smoothing Thomas’s structure.
textual_note: 'NHAM02.47 lines 15–17 are intact for Saying 81; no lacunae or conjectural
  restorations are indicated in Dilley 2025. The normalized reading resolves the compacted
  morphology of the codex: the printed ⲡⲉⲛⲧⲁϩⲣ̄ⲣⲙ̄ⲙⲁⲟ corresponds to the relative
  perfect construction ⲡⲉⲧⲉⲣⲉ ⲁⲛⲧⲟϥ ⲣⲣⲙⲙⲁⲟ (Layton), with ⲁⲛⲧⲟϥ as the 3ms dependent
  pronoun. Likewise, ⲡⲉⲧⲉⲣⲉ ⲟⲩⲛⲧⲁ ⲛⲧⲟϥ ⲛⲟⲩⲇⲩⲛⲁⲙⲓⲥ is the standard possessive construction
  (existential ⲟⲩⲛ̄ + dative ‘to him’). ⲙⲁⲣⲉ- marks jussive imperatives in both cola.
  ⲇⲩⲛⲁⲙⲓⲥ is a Greek loanword with a semantic range of ‘power, might, capability’;
  there is no explicit object after ⲁⲣⲛⲁ, which in context refers back to ⲇⲩⲛⲁⲙⲓⲥ.
  No Greek POxy fragment overlaps Saying 81.'
