revisions:
- from: Nadie podrá ponerse[a] delante de ustedes. Yahvé su Dios pondrá el miedo y el temor de ustedes sobre la faz de toda la tierra[b] por la que pisen, tal como les habló.
  to: Nadie podrá hacerles frente[a]. Yahvé su Dios pondrá el miedo y el temor de ustedes sobre toda la tierra[b] que pisen, tal como les habló.
  rationale: Se ajusta el texto principal para reflejar mejor el sentido contextual de הָאָרֶץ como territorio y para mejorar la naturalidad española del modismo de oposición. Se conservan en notas tanto la imagen literal hebrea como la aclaración contextual auditada.
