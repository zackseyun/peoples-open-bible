translation:
  language: es
  text: 'Así, los correos fueron con las cartas de mano del rey y de sus oficiales por todo Israel y Judá, conforme al mandato del rey, diciendo: «Hijos de Israel, vuelvan a Yahvé, el Dios de Abraham, Isaac e Israel[a], para que él vuelva al remanente que ha escapado y queda para ustedes[b] de la mano de los reyes de Asiria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Israel», no el más familiar «Jacob».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el remanente que ha escapado, que queda para ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָרָצִים
  english_pob_choice: the couriers
  chosen_spanish: los corredores
  alternatives_spanish:
  - los mensajeros
  - los correos
  lexicon: HALOT
  rationale: El participio de רוץ puede referirse literalmente a quienes corren; en este contexto administrativo de llevar cartas reales, ‘corredores’ conserva la imagen verbal del hebreo sin perder la función de mensajería. ‘Mensajeros’ o ‘correos’ serían más explicativos, pero menos cercanos al verbo base.
- source_word: בָּאִגְּרוֹת
  english_pob_choice: with the letters
  chosen_spanish: con las cartas
  alternatives_spanish:
  - con los escritos
  - con los despachos
  lexicon: HALOT
  rationale: אִגְּרוֹת son cartas o despachos escritos. En español, ‘con las cartas’ es natural y mantiene el sentido de documentos enviados por autoridad real.
- source_word: מִיַּד הַמֶּלֶךְ וְשָׂרָיו
  english_pob_choice: from the hand of the king and his officials
  chosen_spanish: desde la mano del rey y de sus oficiales
  alternatives_spanish:
  - por orden del rey y de sus oficiales
  - de parte del rey y de sus oficiales
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de ‘mano’ para reflejar la autorización directa del rey. ‘Oficiales’ rinde bien שָׂרִים en este marco administrativo; ‘principes’ sería más tradicional, pero menos preciso aquí.
- source_word: בְּכָל יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: throughout all Israel and Judah
  chosen_spanish: por todo Israel y Judá
  alternatives_spanish:
  - en todo Israel y Judá
  - a través de todo Israel y Judá
  lexicon: HALOT
  rationale: La frase marca extensión territorial; ‘por todo’ comunica mejor el recorrido de los corredores que una simple localización.
- source_word: וּכְמִצְוַת הַמֶּלֶךְ
  english_pob_choice: according to the command of the king
  chosen_spanish: conforme al mandamiento del rey
  alternatives_spanish:
  - según la orden del rey
  - de acuerdo con el mandato del rey
  lexicon: HALOT
  rationale: מִצְוָה puede ser ‘mandamiento’ u ‘orden’. Aquí es una directiva real, y ‘conforme al mandamiento del rey’ conserva el tono formal sin implicar un uso específicamente litúrgico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: Sons of Israel
  chosen_spanish: Hijos de Israel
  alternatives_spanish:
  - Sons de Israel
  - Pueblos de Israel
  lexicon: HALOT
  rationale: Se opta por una forma natural en español que sigue de cerca el plural masculino del hebreo. ‘Hijos de Israel’ es bíblico y claro, mientras que ‘pueblo de Israel’ ya interpreta el colectivismo.
- source_word: שׁוּבוּ אֶל יְהוָה
  english_pob_choice: return to Yahweh
  chosen_spanish: vuelvan a Yahvé
  alternatives_spanish:
  - retornen a Yahvé
  - vuélvanse a Yahvé
  lexicon: HALOT
  rationale: שׁוּב en este llamado de pacto implica regresar/volver. ‘Vuelvan a Yahvé’ es natural, directo y conserva el movimiento de retorno espiritual exigido por el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino según la convención POB para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי אַבְרָהָם יִצְחָק וְיִשְׂרָאֵל
  english_pob_choice: the God of Abraham, Isaac, and Israel
  chosen_spanish: el Dios de Abraham, Isaac e Israel
  alternatives_spanish:
  - el Dios de Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Se respeta el texto hebreo, que aquí dice ‘Israel’ y no ‘Jacob’. En español, la coordinación ‘e Israel’ es la forma correcta por eufonía.
- source_word: וְיָשֹׁב
  english_pob_choice: that he may return
  chosen_spanish: para que él vuelva
  alternatives_spanish:
  - y vuelva
  - para que regrese
  lexicon: HALOT
  rationale: 'El imperfecto con valor consecutivo/final expresa resultado o propósito: si Israel vuelve a Yahvé, él volverá. ‘Para que él vuelva’ hace explícita esa relación recíproca sin perder el matiz del hebreo.'
- source_word: הַפְּלֵיטָה
  english_pob_choice: the remnant that has escaped
  chosen_spanish: al remanente que ha escapado
  alternatives_spanish:
  - a los sobrevivientes
  - al remanente sobreviviente
  lexicon: HALOT
  rationale: פְּלֵיטָה designa a los que escaparon de la destrucción. ‘Remanente’ preserva el peso teológico del término; ‘ha escapado’ conserva la concreción del verbo hebreo.
- source_word: הַנִּשְׁאֶרֶת לָכֶם
  english_pob_choice: that remains to you
  chosen_spanish: y queda para ustedes
  alternatives_spanish:
  - que les queda
  - que permanece para ustedes
  lexicon: HALOT
  rationale: El participio de שׁאר expresa lo que queda o permanece. ‘Y queda para ustedes’ conserva la idea de residuo disponible para el pueblo destinatario, con español natural.
- source_word: מִכַּף מַלְכֵי אַשּׁוּר
  english_pob_choice: from the hand of the kings of Assyria
  chosen_spanish: de la mano de los reyes de Asiria
  alternatives_spanish:
  - del poder de los reyes de Asiria
  - del dominio de los reyes de Asiria
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de ‘mano’ para conservar la fuerza del dominio asirio y la coherencia con la frase anterior ‘desde la mano del rey’.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política POB pide transliterar el Tetragrámaton en lugar de sustituirlo por ‘SEÑOR’. ‘Yahvé’ es la forma española habitual en este proyecto para mantener el Nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula patriarcal con ‘Israel’
  english_pob_reading: the God of Abraham, Isaac, and Israel
  chosen_spanish_reading: el Dios de Abraham, Isaac e Israel
  alternative_spanish_readings:
  - el Dios de Abraham, Isaac y Jacob
  rationale: El hebreo leído por el POB dice ‘Israel’; no se armoniza a la forma tradicional ‘Jacob’. Esto preserva la primacía del texto fuente sobre la fórmula familiar.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Relación recíproca entre volver a Yahvé y el retorno divino
  english_pob_reading: that he may return
  chosen_spanish_reading: para que él vuelva
  alternative_spanish_readings:
  - y vuelva
  - para que regrese
  rationale: 'La cláusula final expresa respuesta pactal: el retorno del pueblo se vincula con el retorno de Yahvé a su remanente. ‘Para que él vuelva’ conserva esa reciprocidad sin convertirla en una simple secuencia temporal.'
  doctrine_reference: DOCTRINE.md Covenant language / reciprocal return
translation_notes:
  revision_awareness: 'Tomé en cuenta el historial de revisión: se corrigió la cláusula final para reflejar mejor el valor relacional de וְיָשֹׁב y la unidad semántica de הַפְּלֵיטָה הַנִּשְׁאֶרֶת. En español, por claridad y fidelidad, mantuve la idea de ‘remanente que ha escapado’ junto con ‘queda para ustedes’, evitando una paráfrasis más interpretativa.'
  spanish_consistency_notes:
  - Conservé Yahvé como forma POB para יְהוָה, coherente con el resto del proyecto.
  - Usé ‘mano’ de manera consistente en la doble idiomática del versículo.
  - Mantuve ‘remanente’ para פְּלֵיטָה por su peso teológico, sin sustituirlo por un simple ‘supervivientes’.
  - Respeté ‘Israel’ en la fórmula patriarcal, conforme al texto hebreo.
  - La puntuación de cita y la capitalización siguen normas españolas modernas.
