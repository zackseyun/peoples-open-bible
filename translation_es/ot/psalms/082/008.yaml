review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB en lo esencial: imperativos directos a Dios («Levántate», «juzga»), sentido global de «la tierra», y la motivación causal «porque». También conserva correctamente «heredarás» para תִנְחַל, manteniendo el matiz de posesión legítima/covenantal. Sin embargo, hay dos problemas formales y de fidelidad menor: la nota [b] está anclada en «la tierra» aunque su contenido corresponde a «heredarás»; y «heredarás a todas las naciones» es menos natural en español que «heredarás todas las naciones» o «tomarás posesión de todas las naciones».'
  spanish_quality_summary: 'El español es claro y digno, pero requiere un pequeño ajuste de puntuación y anclaje de nota. «Oh Dios» funciona, aunque en español bíblico actual suele leerse con coma vocativa: «oh, Dios». La frase final mejora en naturalidad si se elimina la preposición personal: «heredarás todas las naciones».'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים se traduce apropiadamente como «Dios», no aparece YHWH ni términos mesiánicos. La elección «heredarás» está alineada con la decisión léxica inglesa para נחל.'
  issues:
  - severity: medium
    issue: La nota [b] está colocada en el lugar equivocado.
    rationale: En el texto español, [b] aparece tras «la tierra», pero la nota explica la alternativa de «poseerás», que corresponde a תִנְחַל / «heredarás», no a הָאָרֶץ / «la tierra». Esto rompe la trazabilidad del aparato de notas.
  - severity: medium
    issue: «Heredarás a todas las naciones» suena menos idiomático en español.
    rationale: Con «heredar», la preposición personal «a» no es necesaria aquí y resulta algo forzada. «Heredarás todas las naciones» conserva mejor el sentido del hebreo y del POB, con mejor fluidez española.
  - severity: low
    issue: Puntuación vocativa mejorable en «oh Dios».
    rationale: «oh, Dios» es más natural según la puntuación vocativa en español. No afecta el sentido, pero mejora la legibilidad y corrección estilística.
  revised_spanish_text: ¡Levántate[a], oh, Dios; juzga la tierra, porque tú heredarás[b] todas las naciones.
