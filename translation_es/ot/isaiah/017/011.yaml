translation:
  language: es
  text: El día que siembras, la haces crecer exuberante; y por la mañana haces brotar tu semilla. Pero la cosecha[a] huye en un día de aflicción y dolor incurable[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «un montón de cosecha» para la expresión «la cosecha huye». El hebreo es difícil, y algunos entienden נֵד como «montón» en vez de una expresión de desaparición.
    reason: lexical_alternative
  - marker: b
    text: «En un día de aflicción» también puede verterse «en un día de enfermedad» o «en un día de dolor».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִטְעֵךְ
  english_pob_choice: you plant
  chosen_spanish: tu siembra
  alternatives_spanish:
  - tu plantación
  - cuando plantas
  lexicon: HALOT
  rationale: El hebreo tiene forma nominal con sufijo de 2.ª f. sing. ('tu plantación / tu siembra'), aunque el POB inglés lo volvió verbal para fluidez. En español, 'tu siembra' conserva mejor la forma nominal y el ámbito agrícola sin perder claridad.
- source_word: תְּשַׂגְשֵׂגִי
  english_pob_choice: you make it grow luxuriantly
  chosen_spanish: la haces crecer exuberantemente
  alternatives_spanish:
  - la haces florecer
  - la haces prosperar
  lexicon: HALOT
  rationale: El verbo expresa crecimiento exuberante o florecimiento. 'Crecer exuberantemente' retiene la imagen viva y la fuerza del verbo mejor que un verbo más genérico; se explicita 'la' para referir la siembra/plantación.
- source_word: זַרְעֵךְ תַּפְרִיחִי
  english_pob_choice: you make your seed sprout
  chosen_spanish: haces brotar tu semilla
  alternatives_spanish:
  - haces florecer tu semilla
  - haces germinar tu semilla
  lexicon: HALOT
  rationale: 'El hiphil de פרח es causativo: ''hacer brotar / hacer florecer''. ''Haces brotar'' es natural en español para la imagen agrícola de la semilla y conserva la causalidad.'
- source_word: נֵד
  english_pob_choice: flees away
  chosen_spanish: huye
  alternatives_spanish:
  - se va
  - desaparece
  - es un montón
  lexicon: HALOT
  rationale: Es un término difícil y debatido. El contexto de juicio favorece una idea de desaparición o retirada súbita del resultado esperado. 'Huye' reproduce esa imagen verbal sin cerrar la ambigüedad léxica; la alternativa más literal queda en la nota.
- source_word: קָצִיר
  english_pob_choice: the harvest
  chosen_spanish: la cosecha
  alternatives_spanish:
  - la siega
  - la mies
  lexicon: HALOT
  rationale: En español 'cosecha' comunica con naturalidad el fruto esperado de la siembra. Conserva el campo semántico agrícola y es claro para lector moderno.
- source_word: בְּיוֹם נַחֲלָה
  english_pob_choice: in a day of grief
  chosen_spanish: en un día de aflicción
  alternatives_spanish:
  - en un día de enfermedad
  - en un día de dolor
  lexicon: HALOT
  rationale: נַחֲלָה aquí suele entenderse como calamidad, aflicción o enfermedad, no como 'herencia'. 'Aflicción' es suficientemente amplio y evita especificar más de lo que el contexto exige.
- source_word: וּכְאֵב אָנושׁ
  english_pob_choice: and incurable pain
  chosen_spanish: y dolor incurable
  alternatives_spanish:
  - y dolor desesperado
  - y dolor grave
  - y dolor mortal
  lexicon: HALOT
  rationale: כאב es 'dolor' y אנושׁ aporta la idea de severidad e incurabilidad. 'Dolor incurable' sigue de cerca el sentido del POB inglés y mantiene la intensidad del juicio profético.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el juicio del POB inglés, pero adapta a un español natural la secuencia nominal-verbal de נִטְעֵךְ y conserva en nota la dificultad de נֵד y la amplitud semántica de נַחֲלָה.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando el Tetragrámaton aparece; aquí no aparece en el versículo.
  - Se usa 'semilla', 'cosecha' y 'aflicción' en un registro agrícola-profético claro para lectores de iglesia amplia.
  - No se introduce 'Cristo' ni terminología doctrinal ajena al verso.
