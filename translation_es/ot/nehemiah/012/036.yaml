translation:
  language: es
  text: y sus hermanos—Semaías[a], Azarel, Milalai, Gilalai, Maai, Netanel, Judá y Hanani—con los instrumentos musicales de David, el hombre de Dios, y Esdras el escriba delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con instrumentos de canto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus compañeros levitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hermanos». Conservo esa relación familiar/afín en español, sin generalizar indebidamente a «compañeros» o «levitas», porque el contexto de lista procesional no exige restringir el sentido.
- source_word: שְׁמַעְיָה ... חֲנָנִי
  english_pob_choice: Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani
  chosen_spanish: Semaías, Azarel, Milalai, Gilalai, Maai, Netanel, Judá y Hanani
  alternatives_spanish:
  - Shemaya, Azarel, Milalai, Gilalai, Maai, Natanel, Judá y Hanani
  lexicon: Nombres propios del texto hebreo
  rationale: Son nombres propios y se transliteran. Opto por la forma castellana más reconocible de algunos nombres bíblicos, manteniendo la identificación con el hebreo.
- source_word: בִּכְלֵי שִׁיר
  english_pob_choice: with the musical instruments
  chosen_spanish: con los instrumentos musicales
  alternatives_spanish:
  - con los instrumentos de canto
  - con los instrumentos del canto
  lexicon: HALOT
  rationale: כְּלֵי son «instrumentos» o «utensilios» y שִׁיר remite a canto/música. «Instrumentos musicales» transmite con naturalidad la función del conjunto sin perder el valor léxico de la expresión.
- source_word: דָּוִיד אִישׁ הָאֱלֹהִים
  english_pob_choice: of David the man of God
  chosen_spanish: de David, el hombre de Dios
  alternatives_spanish:
  - de David, el varón de Dios
  - de David, el hombre de Yahvé
  lexicon: HALOT
  rationale: Conservo el título honorífico «el hombre de Dios», que es idiomático en español bíblico y refleja la apposición hebrea sin añadir interpretación.
- source_word: וְעֶזְרָא הַסּוֹפֵר
  english_pob_choice: and Ezra the scribe
  chosen_spanish: y Esdras el escriba
  alternatives_spanish:
  - y Esdras, el escriba
  lexicon: HALOT
  rationale: הַסּוֹפֵר es «el escriba»; uso «Esdras» por la forma española establecida del nombre. La coordinación con וְ mantiene que él va junto con el grupo en la escena.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: לִפְנֵי indica posición frontal en el cortejo. «Delante de ellos» es natural en español y conserva la idea espacial de precedencia.
theological_decisions:
- issue: Título honorífico אִישׁ הָאֱלֹהִים
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el varón de Dios
  - el hombre del verdadero Dios
  rationale: No hay necesidad de intensificar ni reinterpretar el título. Mantener la fórmula tradicional preserva el eco bíblico y evita introducir matices doctrinales no presentes en el hebreo.
  doctrine_reference: Uso bíblico del título honorífico; traducción transparente sin expansión teológica.
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo WLC y el audit trail inglés. La única variación relevante es que el español coloca el grupo nominal en orden natural («los instrumentos musicales de David, el hombre de Dios») y mantiene la relación procesional con «delante de ellos». No se detectaron tensiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general, pero este versículo no contiene el nombre divino explícito.
  - Se usó «Esdras» y no «Ezra» para la forma española estándar del nombre.
  - Se preservó la estructura de lista y la apposición de «el hombre de Dios» sin convertirla en comentario interpretativo.
  - La nota a aclara la alternativa léxica de בִּכְלֵי שִׁיר sin sobrecargar el texto principal.
