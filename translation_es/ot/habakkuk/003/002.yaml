  text: יְהוָ֗ה שָׁמַ֣עְתִּי שִׁמְעֲ/ךָ֮ יָרֵאתִי֒ יְהוָ֗ה פָּֽעָלְ/ךָ֙ בְּ/קֶ֤רֶב שָׁנִים֙ חַיֵּ֔י/הוּ בְּ/קֶ֥רֶב שָׁנִ֖ים תּוֹדִ֑יעַ בְּ/רֹ֖גֶז רַחֵ֥ם תִּזְכּֽוֹר׃
base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/002.yaml
  text: Yahweh[a], I have heard the report of you; I stand in awe. Yahweh, revive your work in the midst of the years; in the midst of the years make it known[e][d][c][b]; in wrath remember mercy.
  footnotes:
  - marker: a
    text: Or 'your fame' or 'the hearing of you.' The Hebrew expression refers to what has been heard concerning the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'I feared' / 'I was afraid.' The Hebrew can express fear or reverential awe.
    reason: lexical_alternative
  - marker: c
    text: Or 'preserve it alive' or 'renew it.' The Hebrew literally has 'make it live.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in turmoil' or 'in rage.'
    reason: lexical_alternative
  - marker: e
    text: 'Hebrew: ''remember compassion'' or ''remember to have mercy.'''
    reason: lexical_alternative
