revisions:
- from: Cuando no había abismos[a], fui dada a luz, cuando no había fuentes abundantes en agua.
  to: Cuando no había abismos[a], fui dada a luz, cuando no había manantiales rebosantes de agua.
  rationale: Se revisa «fuentes abundantes en agua» a «manantiales rebosantes de agua» para expresar con español natural la idea de fuentes naturales cargadas de agua. Se mantiene la imaginería de nacimiento en «fui dada a luz». La nota se ajusta para ofrecer alternativas idiomáticas en español y conservar la justificación léxica del inglés auditado.
