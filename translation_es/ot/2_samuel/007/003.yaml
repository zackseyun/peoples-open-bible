translation:
  language: es
  text: 'Y Natán dijo al rey[a]: «Ve, haz todo lo que está en tu corazón, porque Yahvé está contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ve y haz todo lo que está en tu corazón». El hebreo también puede expresarse como «todo lo que está sobre tu corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / And ... said
  english_pob_choice: And Nathan said
  chosen_spanish: Y Natán dijo
  alternatives_spanish:
  - Entonces Natán dijo
  - Y Natán habló
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Y» conserva la secuencia sin sobreinterpretar el enlace. «Dijo» mantiene el verbo directo y natural para un diálogo narrativo.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: Convención onomástica española
  rationale: Los nombres propios bíblicos suelen adaptarse a la forma española establecida; «Natán» es la forma inteligible y estándar en español bíblico.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey David
  - ante el rey
  lexicon: HALOT
  rationale: El hebreo dice literalmente «al rey», con artículo común y sin nombrarlo David; por eso se mantiene la referencia genérica sin añadir identificación no expresada en el verso.
- source_word: כֹּל אֲשֶׁר בִּלְבָבְךָ
  english_pob_choice: all that is in your heart
  chosen_spanish: todo lo que está en tu corazón
  alternatives_spanish:
  - todo lo que está en tu mente
  - todo lo que está en tu interior
  - todo lo que llevas en el corazón
  lexicon: HALOT
  rationale: «Corazón» reproduce el valor hebreo de לֵבָב como sede de intención, voluntad y resolución, no solo de emoción. «Está en tu corazón» conserva el idioma semítico sin volverlo rígido.
- source_word: לֵךְ עֲשֵׂה
  english_pob_choice: Go, do
  chosen_spanish: Ve, haz
  alternatives_spanish:
  - Anda y haz
  - Ve y haz
  lexicon: HALOT
  rationale: Los dos imperativos expresan autorización y estímulo inmediato. «Ve, haz» es breve, natural y preserva el impulso del original sin añadir explicaciones.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del consejo de Natán. «Porque» comunica con claridad la fuerza explicativa causal en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue la política del proyecto de verter el Tetragrámaton como «Yahvé», preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: עִמָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está con ustedes
  - está de tu lado
  lexicon: HALOT
  rationale: La preposición con sufijo indica acompañamiento/presencia. «Está contigo» mantiene la cercanía teológica y relacional sin ampliar el sentido con apoyo interpretativo.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre. Conforme a la doctrina del proyecto, se evita la sustitución por un título y se conserva el nombre propio de Dios en español como «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor semántico de «corazón» en la frase idiomática
  english_pob_reading: all that is in your heart
  chosen_spanish_reading: todo lo que está en tu corazón
  alternative_spanish_readings:
  - todo lo que piensas
  - todo lo que deseas
  rationale: La expresión hebrea abarca intención, voluntad y resolución. «Corazón» mantiene esa amplitud; no se reduce a emoción ni se reemplaza por una paráfrasis psicológica más estrecha.
  doctrine_reference: Uso bíblico de לֵבָב / corazón como centro interior de la persona
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios necesarios respecto del sentido base; la redacción española sigue de cerca la estructura del hebreo y conserva las decisiones terminológicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se evitó añadir «David» porque el hebreo dice solo «el rey».
  - Se conservó la idiomaticidad de «corazón» para לֵבָב sin reducirla a emoción o mente.
  - La puntuación y comillas se ajustan a las convenciones editoriales del español.
