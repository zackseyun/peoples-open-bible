translation:
  language: es
  text: El cual fue llevado cautivo en los días de Enemessaros[a], rey de los asirios, de Thisbe, que está a la derecha de Kydios, de Neftalí, en Galilea, por encima de Aser[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes identifican «Enemessaros» con el rey asirio Salmanasar, pero el texto griego aquí tiene la forma transliterada «Enemessaros».
    reason: alternative_reading
  - marker: b
    text: Las designaciones de lugar en este versículo son difíciles y pueden reflejar incertidumbre textual o geográfica. «Kydios» puede representar un sitio identificado de otro modo, y se conservan de manera relativamente literal las expresiones espaciales «a la derecha de» y «por encima de Aser» en vez de convertirlas en una dirección cartográfica más interpretativa.
    reason: cultural_note
lexical_decisions:
- source_word: ᾐχμαλωτεύθη
  english_pob_choice: was taken captive
  chosen_spanish: fue llevado cautivo
  alternatives_spanish:
  - fue hecho cautivo
  - fue tomado cautivo
  - fue llevado preso
  lexicon: BDAG
  rationale: El pasivo griego expresa ser arrebatado como cautivo. «Fue llevado cautivo» conserva la fuerza de traslado forzado y suena natural en español bíblico moderno.
- source_word: ἐν ἡμέραις
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el reinado de
  - en tiempos de
  lexicon: BDAG
  rationale: Es una fórmula temporal estándar y la traducción literal es clara en español.
- source_word: Ἐνεμεσσαάρου
  english_pob_choice: Enemessaros
  chosen_spanish: Enemessaros
  alternatives_spanish:
  - Salmanasar
  lexicon: LSJ
  rationale: Se conserva la transliteración atestiguada en el texto griego, en vez de armonizarla con la forma histórica más conocida.
- source_word: ἐκ Θίσβης
  english_pob_choice: from Thisbe
  chosen_spanish: de Thisbe
  alternatives_spanish:
  - desde Thisbe
  lexicon: BDAG
  rationale: ἐκ indica origen/procedencia; «de» mantiene esa relación geográfica de manera simple y natural.
- source_word: ἐκ δεξιῶν
  english_pob_choice: to the right of
  chosen_spanish: a la derecha de
  alternatives_spanish:
  - al sur de
  - del lado derecho de
  lexicon: LSJ
  rationale: La expresión griega es literalmente direccional y la equivalencia más cercana y transparente en español es «a la derecha de». Se evita resolverla como «al sur de» porque el texto griego mantiene cierta ambigüedad geográfica.
- source_word: Κυδίως
  english_pob_choice: Kydios
  chosen_spanish: Kydios
  alternatives_spanish:
  - Kedesh
  - Cidios
  lexicon: LSJ
  rationale: El nombre es oscuro en la tradición griega; se conserva la forma transliterada del griego para no sobreidentificarlo sin base segura.
- source_word: τῆς Νεφθαλεὶμ
  english_pob_choice: of Naphtali
  chosen_spanish: de Neftalí
  alternatives_spanish:
  - en Neftalí
  lexicon: LSJ
  rationale: El genitivo marca pertenencia o adscripción territorial; «de Neftalí» preserva esa relación.
- source_word: ἐν τῇ Γαλειλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - en la Galilea
  lexicon: BDAG
  rationale: Topónimo geográfico estándar en español bíblico contemporáneo.
- source_word: ὑπεράνω Ἀσήρ
  english_pob_choice: above Asher
  chosen_spanish: encima de Aser
  alternatives_spanish:
  - sobre Aser
  - al norte de Aser
  lexicon: LSJ
  rationale: «Encima de» conserva la imagen espacial literal del griego y no fuerza una precisión cartográfica que el texto no explicita.
theological_decisions:
- issue: Tratamiento de nombres propios oscuros y posibles identificaciones históricas
  english_pob_reading: The Greek text retains Enemessaros and an uncertain place-name complex; the English audit trail prefers transliteration and notes uncertainty.
  chosen_spanish_reading: Se conservan Enemessaros y Kydios como transliteraciones, sin resolverlos en nombres históricos más conocidos.
  alternative_spanish_readings:
  - Salmanasar
  - Kedesh
  rationale: La POB en inglés documenta que la forma griega transmitida es la base principal y que hay incertidumbre toponímica. En español, conservar la forma griega evita borrar esa tensión y mantiene trazabilidad con el original.
  doctrine_reference: Principio de fidelidad textual y transparencia audit-able; no aplica una armonización historicista sin apoyo directo del texto base.
- issue: Dirección geográfica de ἐκ δεξιῶν / ὑπεράνω
  english_pob_reading: The English audit trail keeps a relatively literal directional rendering and notes that the geography is uncertain.
  chosen_spanish_reading: «a la derecha de» y «encima de» se mantienen literales, con la ambigüedad intacta.
  alternative_spanish_readings:
  - al sur de
  - al norte de
  rationale: El griego permite una lectura espacial concreta, pero el propio contexto textual no obliga a una equivalencia cartográfica exacta. Mantener la literalidad evita sobreinterpretar el dato geográfico.
  doctrine_reference: Transparencia filológica; principio de no resolver indebidamente una incertidumbre textual o geográfica.
translation_notes:
  revision_awareness: La auditoría inglesa pasó por una revisión que favoreció «Kedesh» y «to the south of» para mayor identificación convencional. Esta versión española sigue el anclaje griego principal y la línea de transliteración documentada en el contexto auditado, preservando la incertidumbre geográfica en vez de resolverla.
  spanish_consistency_notes:
  - Se usó «Neftalí» para el topónimo tribal, según el uso bíblico estándar en español.
  - Se evitó «SEÑOR» u otras sustituciones porque no hay aquí el nombre divino, y los nombres propios se mantuvieron transliterados cuando el griego es incierto.
  - El tono es bíblico contemporáneo, pero sin arcaísmos innecesarios.
