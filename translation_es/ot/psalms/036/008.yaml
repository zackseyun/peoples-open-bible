review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la exclamación, el vocativo a Dios, la imagen de refugio bajo las alas y el sentido de חֶסֶד como amor leal/fiel. Sin embargo, «los hijos de hombre» no preserva bien el sentido colectivo idiomático de וּבְנֵי אָדָם en español y además la nota b está mal anclada: explica esa frase pero está colocada sobre «amor leal».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «los hijos de hombre» suena forzado y poco natural en español eclesial general. «Los hijos del hombre» introduciría otra lectura posible, y «hijos de Adán» sería más interpretativo. Una solución fiel y legible es «los seres humanos», con nota que preserve la alternativa más literal «los hijos del hombre / hijos de hombre» si se desea reflejar la textura hebrea.
  glossary_alignment: No hay conflicto con la terminología base del proyecto en este versículo. «Dios» para אֱלֹהִים y «amor leal» para חֶסֶד son defendibles; la nota sobre hesed debe mantenerse. La principal desviación está en la representación de בְּנֵי אָדָם, donde conviene priorizar español natural sin perder la nota léxica.
  issues:
  - severity: medium
    issue: «Los hijos de hombre» es poco idiomático y puede sonar incorrecto en español.
    rationale: Aunque intenta conservar la textura hebrea, en español general no funciona bien como expresión colectiva para la humanidad. La fidelidad al sentido colectivo y la legibilidad se preservan mejor con «los seres humanos» y una nota léxica.
  - severity: medium
    issue: La nota [b] está anclada al lugar equivocado en el texto.
    rationale: La nota [b] explica «los hijos de hombre», pero en el borrador aparece junto a «amor leal». Esto rompe la correspondencia exigida entre marcador y término anotado.
  - severity: low
    issue: «oh Dios» podría puntuarse de modo más natural en español poético con coma vocativa.
    rationale: «¡Cuán precioso es tu amor leal[a], oh Dios!» es más natural y normativo que colocar el marcador doble antes del vocativo.
  revised_spanish_text: ¡Cuán precioso es tu amor leal[a], oh Dios! Los seres humanos[b] se refugian a la sombra de tus alas.
