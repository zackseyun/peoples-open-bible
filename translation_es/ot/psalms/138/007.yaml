  text: אִם אֵלֵ֤ךְ בְּ/קֶ֥רֶב צָרָ֗ה תְּחַ֫יֵּ֥/נִי עַ֤ל אַ֣ף אֹ֭יְבַ/י תִּשְׁלַ֣ח יָדֶ֑/ךָ וְ/ת֖וֹשִׁיעֵ֣/נִי יְמִינֶֽ/ךָ־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/138/007.yaml
  text: If I walk in the midst of trouble[a], you preserve my life; you stretch out your hand against the anger of my enemies[c][b], and your right hand saves me.
  footnotes:
  - marker: a
    text: Or 'Though I walk in the midst of trouble.' The Hebrew אִם can introduce a clause with conditional or concessive force in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you revive me' / 'you keep me alive.' The Hebrew verb can denote reviving or preserving life.
    reason: lexical_alternative
  - marker: c
    text: Literally 'upon/against the anger of my enemies'; אַף ('nose') is a Hebrew idiom for anger or wrath.
    reason: cultural_note
