review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Yahvé habla a Moisés, ordena descender con urgencia, conserva el distanciamiento retórico en ''tu pueblo, que tú sacaste de Egipto'', mantiene la repetición de urgencia, el desvío ''del camino'', y la concreción de מַסֵּכָה como imagen hecha por fundición. La única desalineación significativa está en ''se han hecho una imagen de fundición'', que en español sugiere que ellos mismos se convirtieron en esa imagen, mientras que el hebreo עָשׂוּ לָהֶם indica ''hicieron para sí'' o ''se hicieron para sí mismos'' una imagen.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Yahvé', 'Levántate', 'baja rápidamente de aquí' y 'se ha corrompido' funcionan bien. El problema principal es idiomático-semántico en 'se han hecho una imagen de fundición', que debe reformularse para expresar correctamente el benefactivo reflexivo. El resto del verso suena natural y fiel.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; מַסֵּכָה conservado como ''imagen de fundición'' en vez de un genérico ''ídolo''; ''camino'' preserva la metáfora bíblica. No hay conflicto con los defaults teológicos o léxicos principales. La nota alternativa también está bien orientada.'
  issues:
  - severity: high
    issue: '''se han hecho una imagen de fundición'' expresa en español un sentido equivocado'
    rationale: El hebreo עָשׂוּ לָהֶם מַסֵּכָה significa que hicieron una imagen para sí mismos, no que se hicieron a sí mismos en una imagen. En español, la construcción actual suena reflexiva directa y distorsiona el referente del objeto fabricado.
  - severity: low
    issue: La nota [a] está anclada en 'me dijo' en vez de en 'imagen de fundición'
    rationale: La nota explica מַסֵּכָה, por lo que el anclaje natural en español debería ir junto al término correspondiente. No es un error doctrinal, pero sí de precisión editorial y usabilidad.
  revised_spanish_text: 'Y Yahvé me dijo: «Levántate, baja rápidamente de aquí, porque tu pueblo, que tú sacaste de Egipto, se ha corrompido. Se han apartado rápidamente del camino que les mandé; se han hecho para sí mismos una imagen de fundición[a]».'
  revised_footnotes:
  - marker: a
    text: O 'imagen fundida'. El hebreo se refiere a una imagen hecha por fundición de metal.
    reason: lexical_alternative
  revision_rationale: Se corrige la construcción de עָשׂוּ לָהֶם para expresar el sentido benefactivo reflexivo ('para sí mismos') sin introducir la ambigüedad de 'se han hecho una imagen'. También se mueve el anclaje de la nota al término que realmente explica, 'imagen de fundición'. No se requieren cambios adicionales.
