translation:
  language: es
  text: ¡Arriba! ¡Arriba! Huyan de la tierra del norte, declara Yahvé, porque los he dispersado a los cuatro vientos de los cielos[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como los cuatro vientos de los cielos». El hebreo puede entenderse como un modismo direccional («a los cuatro vientos») o como una comparación («como los cuatro vientos»).
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי הוֹי
  english_pob_choice: Up! Up!
  chosen_spanish: ¡Arriba! ¡Arriba!
  alternatives_spanish:
  - ¡Ea! ¡Ea!
  - ¡Alto! ¡Alto!
  - ¡Vamos! ¡Vamos!
  lexicon: HALOT
  rationale: En este contexto הוֹי funciona como un llamado urgente a actuar, no como lamento. «¡Arriba! ¡Arriba!» conserva la repetición y la urgencia en un español natural y digno.
- source_word: וְנֻסוּ
  english_pob_choice: Flee
  chosen_spanish: Huyan
  alternatives_spanish:
  - Escapen
  - Corran
  - Fugit
  lexicon: HALOT
  rationale: El imperativo plural pide huida inmediata. «Huyan» transmite con claridad el movimiento urgente sin añadir matices ajenos al texto.
- source_word: מֵאֶרֶץ צָפוֹן
  english_pob_choice: from the land of the north
  chosen_spanish: de la tierra del norte
  alternatives_spanish:
  - del país del norte
  - de la tierra septentrional
  - del norte
  lexicon: HALOT
  rationale: «Tierra del norte» reproduce de forma directa la construcción hebrea y conserva su resonancia geográfica.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según el estándar del proyecto. «Dice» refleja con naturalidad la fórmula profética נְאֻם sin volverla más técnica de lo que el español requiere.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la base de la orden; «porque» es la conexión causal más clara y natural en español.
- source_word: כְּאַרְבַּע רוּחוֹת הַשָּׁמַיִם
  english_pob_choice: to the four winds of the heavens
  chosen_spanish: hacia los cuatro vientos de los cielos
  alternatives_spanish:
  - a los cuatro vientos del cielo
  - hacia los cuatro vientos del cielo
  - a los cuatro vientos de los cielos
  lexicon: HALOT
  rationale: La revisión inglesa corrigió la comparación por una dirección de dispersión. En español, «hacia» expresa bien ese movimiento. «Vientos» conserva la metáfora hebrea, y «de los cielos» mantiene la pluralidad del hebreo, aunque «del cielo» sería una alternativa idiomática.
- source_word: פֵּרַשְׂתִּי אֶתְכֶם
  english_pob_choice: I have spread you abroad
  chosen_spanish: los he dispersado
  alternatives_spanish:
  - los he esparcido
  - los he extendido
  - los he dispersado ampliamente
  lexicon: HALOT
  rationale: El hebreo literalmente dice «he extendido/espaciado». En este contexto, el resultado es dispersión; «he dispersado» comunica el sentido contextual sin perder la imagen de expansión territorial.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. Conforme al criterio del proyecto, se translitera como «Yahvé» para no ocultarlo tras una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Matiz de dispersión en פֵּרַשְׂתִּי אֶתְכֶם
  english_pob_reading: I have spread you abroad to the four winds of the heavens
  chosen_spanish_reading: los he dispersado hacia los cuatro vientos de los cielos
  alternative_spanish_readings:
  - los he extendido hacia los cuatro vientos de los cielos
  - los he esparcido a los cuatro vientos del cielo
  rationale: La frase hebrea combina la idea de extensión con el destino de dispersión. «Dispersado» capta el efecto histórico y profético sin borrar la imagen original de ser extendidos hacia los cuatro vientos.
  doctrine_reference: DOCTRINE.md Prophetic imagery and dispersion language
translation_notes:
  revision_awareness: La base inglesa fue revisada para evitar el valor comparativo de «like the four winds» y reflejar mejor un movimiento direccional hacia «the four winds». La presente versión española sigue esa corrección con «hacia los cuatro vientos» y mantiene la urgencia de la orden inicial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para el Nombre divino, conforme al estándar del proyecto.
  - «Huyan» conserva el plural imperativo y la fuerza exhortativa de וְנֻסוּ.
  - Se prefirió «los he dispersado» por claridad contextual, aunque «he extendido» preservaría más literalmente el verbo hebreo.
  - «Cielos» conserva el plural hebreo; en español bíblico también sería posible «cielo», pero aquí se privilegia la cercanía al texto fuente.
