translation:
  language: es
  text: Estas son las etapas del viaje de los hijos de Israel[b], que salieron de la tierra de Egipto, según sus compañías[c], bajo la mano de Moisés y Aarón[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O 'los israelitas'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: c
    text: O 'según sus ejércitos' o 'en sus divisiones'. El hebreo puede tener un sentido organizado, incluso militar.
    reason: lexical_alternative
  - marker: d
    text: 'Modismo hebreo: ''bajo la mano de Moisés y Aarón'', es decir, bajo su agencia o liderazgo.'
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El demostrativo abre una fórmula de encabezado o lista; en español conviene explicitar el verbo copulativo para una frase natural y fiel al valor introductorio del hebreo.
- source_word: מַסְעֵי
  english_pob_choice: the stages of the journey
  chosen_spanish: las etapas del viaje
  alternatives_spanish:
  - los viajes
  - las jornadas
  - las partidas
  lexicon: HALOT
  rationale: El sustantivo describe tramos sucesivos de un itinerario. 'Etapas del viaje' preserva la idea de secuencia sin reducirla a 'viajes' ni a una sola 'partida'.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israelitas
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: '''Hijos de Israel'' refleja con mayor literalidad el constructo hebreo que ''israelitas''; se mantiene la fórmula heredada y transparente sin masculinizar innecesariamente el sentido colectivo.'
- source_word: אֲשֶׁר יָצְאוּ
  english_pob_choice: who went out
  chosen_spanish: que salieron
  alternatives_spanish:
  - que fueron
  - que salieron fuera
  lexicon: HALOT
  rationale: '''Salir'' conserva el movimiento direccional de יצא y resulta natural en español para el éxodo desde Egipto.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se mantiene 'tierra' porque el hebreo la expresa explícitamente; 'Egipto' solo sería una abreviación idiomática menos formal.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their companies
  chosen_spanish: según sus compañías
  alternatives_spanish:
  - según sus ejércitos
  - en sus divisiones
  - por sus compañías
  lexicon: HALOT
  rationale: צָבָא puede tener matiz militar u organizado. 'Compañías' comunica agrupación ordenada sin forzar un cuadro bélico; 'según' recoge el valor distributivo/organizativo del preposición לְ.
- source_word: בְּיַד
  english_pob_choice: under the hand of
  chosen_spanish: bajo la mano de
  alternatives_spanish:
  - por la mano de
  - bajo la autoridad de
  - bajo el liderazgo de
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo para la agencia/mediación. 'Bajo la mano de' es más transparente como eco del original que una paráfrasis interpretativa.
- source_word: מֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  alternatives_spanish:
  - Moisés y Aarón
  lexicon: HALOT
  rationale: Se usan las formas españolas estándar de los nombres propios bíblicos.
theological_decisions:
- issue: 'Valor de לְצִבְאֹתָם: orden organizativo frente a sentido militar'
  english_pob_reading: by their companies; the Hebrew can carry an organized, even military, sense
  chosen_spanish_reading: según sus compañías
  alternative_spanish_readings:
  - según sus ejércitos
  - en sus divisiones
  rationale: La frase española conserva la organización por grupos sin imponer una lectura militar más fuerte de la que el contexto inmediato exige. 'Compañías' deja abierta la tensión semántica documentada por el audit trail.
  doctrine_reference: N/A
- issue: Modismo בְּיַד como agencia/autoridad humana bajo comisión divina
  english_pob_reading: under the hand of Moses and Aaron, meaning under their agency or leadership
  chosen_spanish_reading: bajo la mano de Moisés y Aarón
  alternative_spanish_readings:
  - por la mano de Moisés y Aarón
  - bajo la autoridad de Moisés y Aarón
  rationale: Se mantiene el hebraísmo para no borrar el matiz idiomático de agencia delegada. En español, 'bajo la mano de' suena marcado pero comprensible y conserva el enlace con el original.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se registraron cambios necesarios en el texto fuente inglés; la versión española preserva esa estabilidad y mantiene las tensiones léxicas documentadas por el audit trail.'
  spanish_consistency_notes:
  - Se prefirió 'hijos de Israel' por coherencia con la fórmula hebrea literal y con el tratamiento del grupo como constructo genealógico.
  - '''Etapas del viaje'' evita tanto la ambigüedad de ''viajes'' como la estrechez de ''partidas''.'
  - '''Según sus compañías'' conserva la organización del desplazamiento sin afirmar de manera explícita un cuadro militar.'
  - Se mantuvo el hebraísmo 'bajo la mano de' para reflejar la idiomática de agencia/autoridad del original.
