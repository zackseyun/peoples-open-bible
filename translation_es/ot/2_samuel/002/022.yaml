translation:
  language: es
  text: 'Abner dijo de nuevo a Asael[a]: «Apártate de seguirme. ¿Por qué tendría que golpearte al suelo? Entonces, ¿cómo podría alzar mi rostro ante Joab, tu hermano?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo podría hacerle frente a Joab, tu hermano?». El hebreo dice literalmente: «¿Cómo podría alzar mi rostro ante Joab, tu hermano?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד
  english_pob_choice: said again
  chosen_spanish: dijo de nuevo
  alternatives_spanish:
  - siguió diciendo
  - volvió a decir
  lexicon: HALOT
  rationale: La fórmula hebrea expresa una repetición del habla; en español, «dijo de nuevo» conserva el valor iterativo sin sonar forzado.
- source_word: סוּר לְךָ מֵאַחֲרַי
  english_pob_choice: Turn aside from following me
  chosen_spanish: Apártate de seguirme
  alternatives_spanish:
  - Apártate de detrás de mí
  - Aléjate de seguirme
  lexicon: HALOT
  rationale: סוּר pide la idea de apartarse/retirarse, y מֵאַחֲרַי funciona idiomáticamente como «de seguirme». «Apártate de seguirme» preserva la imagen y suena natural en español.
- source_word: לָמָּה אַכֶּכָּה אַרְצָה
  english_pob_choice: Why should I strike you to the ground?
  chosen_spanish: ¿Por qué tendría que golpearte hasta el suelo?
  alternatives_spanish:
  - ¿Por qué tendría que golpearte al suelo?
  - ¿Por qué tendría que derribarte al suelo?
  lexicon: HALOT
  rationale: El verbo en causativo expresa golpear/derribar; אַרְצָה añade dirección hacia el suelo. «Golpearte hasta el suelo» mantiene la fuerza concreta sin sobretraducir como muerte explícita.
- source_word: וְאֵיךְ אֶשָּׂא פָנַי
  english_pob_choice: Then how could I lift up my face
  chosen_spanish: Entonces, ¿cómo podría alzar mi rostro
  alternatives_spanish:
  - Entonces, ¿cómo podría levantar mi rostro
  - Entonces, ¿cómo podría hacerle frente
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para presentarse sin vergüenza. Se conserva la imagen corporal con «alzar mi rostro», como hace la POB inglesa con «lift up my face».
- source_word: אֶל יוֹאָב אָחִיךָ
  english_pob_choice: to Joab your brother
  chosen_spanish: ante Joab, tu hermano
  alternatives_spanish:
  - a Joab, tu hermano
  - frente a Joab, tu hermano
  lexicon: HALOT
  rationale: אֶל con este giro idiomático señala la persona ante quien uno tendría que comparecer. «Ante Joab» comunica mejor el sentido pragmático en español que un simple «a».
- source_word: עֲשָׂהאֵל / אַבְנֵר / יוֹאָב
  english_pob_choice: Asahel / Abner / Joab
  chosen_spanish: Asael / Abner / Joab
  alternatives_spanish:
  - Azael / Abner / Joab
  lexicon: standard transliteration
  rationale: Se usa la transliteración española común «Asael» para el nombre עֲשָׂהאֵל, manteniendo los demás nombres en formas reconocibles en español bíblico.
theological_decisions:
- issue: La expresión idiomática de vergüenza/honor en «alzar mi rostro»
  english_pob_reading: How could I lift up my face to Joab your brother?
  chosen_spanish_reading: ¿Cómo podría alzar mi rostro ante Joab, tu hermano?
  alternative_spanish_readings:
  - ¿Cómo podría hacerle frente a Joab, tu hermano?
  - ¿Cómo podría mirar a Joab, tu hermano, de frente?
  rationale: Se conserva el idioma de honor/vergüenza del hebreo, porque el texto no solo describe ver a alguien, sino presentarse ante él sin deshonra.
  doctrine_reference: No aplica; decisión semántica y pragmática del hebreo bíblico.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: «strike you to the ground» se refleja con una formulación cercana y natural en español, sin añadir la idea explícita de muerte. También se conserva la imagen idiomática de «alzar mi rostro», que la auditoría inglesa decidió mantener.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando corresponda, aunque este versículo no lo contiene.
  - Los nombres propios se transliteran de forma consistente en español bíblico.
  - Se preserva la imagen corporal de «alzar mi rostro» para respetar el valor idiomático del hebreo, coherente con la estrategia POB.
  - «Golpearte hasta el suelo» evita interpretar de más el hebreo y sigue la corrección reciente de la auditoría inglesa.
