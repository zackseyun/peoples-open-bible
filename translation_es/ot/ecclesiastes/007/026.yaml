translation:
  language: es
  text: Y encuentro más amarga que la muerte a la mujer cuyo corazón es[a] trampas y redes, y cuyas manos son cadenas. El que es bueno delante de Dios[b] escapará de ella, pero el pecador será atrapado por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuyo corazón es lazos y redes».
    reason: lexical_alternative
  - marker: b
    text: O, «El que agrada a Dios escapará de ella».
    reason: alternative_reading
lexical_decisions:
- source_word: וּמוֹצֶא אֲנִי
  english_pob_choice: And I find
  chosen_spanish: Y encuentro
  alternatives_spanish:
  - Y he encontrado
  - Y estoy encontrando
  lexicon: HALOT
  rationale: El participio con sujeto explícito puede funcionar como una afirmación de observación presente. «Y encuentro» conserva el matiz discursivo y la voz personal de Qohelet con español natural.
- source_word: מַר מִמָּוֶת
  english_pob_choice: more bitter than death
  chosen_spanish: más amarga que la muerte
  alternatives_spanish:
  - más amarga que la muerte misma
  - más amarga que morir
  lexicon: HALOT
  rationale: El comparativo con מן se expresa de forma directa en español con «más amarga que la muerte», manteniendo la fuerza proverbial de la comparación.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  - mujer
  lexicon: HALOT
  rationale: El artículo hebreo está presente. «La mujer» reproduce mejor la sintaxis, aunque el sentido sea tipológico o representativo.
- source_word: אֲשֶׁר הִיא
  english_pob_choice: whose
  chosen_spanish: cuyo / cuyas
  alternatives_spanish:
  - que tiene
  - cuyo corazón y cuyas manos
  lexicon: HALOT
  rationale: La relación posesiva encaja naturalmente en español con «cuyo/cuyas», que permite conservar el paralelismo entre corazón y manos sin expandir el sentido.
- source_word: מְצוֹדִים וַחֲרָמִים
  english_pob_choice: traps and nets
  chosen_spanish: trampas y redes
  alternatives_spanish:
  - lazos y redes
  - snares y redes
  lexicon: HALOT
  rationale: Ambos sustantivos pertenecen al campo de captura. «Trampas y redes» es claro, idiomático y conserva la imagen de atrapamiento sin tecnicismos.
- source_word: לִבָּהּ
  english_pob_choice: whose heart is traps and nets
  chosen_spanish: cuyo corazón son trampas y redes
  alternatives_spanish:
  - su corazón son trampas y redes
  - en su corazón hay trampas y redes
  lexicon: HALOT
  rationale: El hebreo predica la imagen de captura del corazón. Se mantiene «corazón» para conservar el centro antropológico de intención y deseo.
- source_word: אֲסוּרִים יָדֶיהָ
  english_pob_choice: whose hands are chains
  chosen_spanish: y cuyas manos son cadenas
  alternatives_spanish:
  - y cuyas manos son ataduras
  - y cuyas manos son grilletes
  lexicon: HALOT
  rationale: אֲסוּרִים alude a cosas atadas o encadenadas. «Cadenas» es concreto, comprensible y mantiene el paralelo con trampas y redes.
- source_word: טוֹב לִפְנֵי הָאֱלֹהִים
  english_pob_choice: The one who is good before God
  chosen_spanish: El que es bueno delante de Dios
  alternatives_spanish:
  - El que agrada a Dios
  - El que es bueno ante Dios
  lexicon: HALOT
  rationale: Se preserva el valor léxico de טוֹב con una traducción lexicalmente cercana. «Delante de Dios» refleja היטב la construcción idiomática sin reemplazarla por una glosa más interpretativa.
- source_word: יִמָּלֵט מִמֶּנָּה
  english_pob_choice: will escape from her
  chosen_spanish: escapará de ella
  alternatives_spanish:
  - se escapará de ella
  - será librado de ella
  lexicon: HALOT
  rationale: El nifal de מלט suele significar escapar o librarse. «Escapará de ella» es natural en español y conserva la imagen de salir de una trampa.
- source_word: וְחוֹטֵא
  english_pob_choice: but the sinner
  chosen_spanish: pero el pecador
  alternatives_spanish:
  - pero el que peca
  - pero un pecador
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivo. «El pecador» mantiene el contraste moral con el justo o el bueno delante de Dios.
- source_word: יִלָּכֶד בָּהּ
  english_pob_choice: will be caught by her
  chosen_spanish: será atrapado por ella
  alternatives_spanish:
  - será capturado por ella
  - quedará atrapado por ella
  lexicon: HALOT
  rationale: El nifal de לכד expresa ser capturado/atrapado. «Ser atrapado» conserva la relación de cautiverio y el paralelismo con trampas y redes.
theological_decisions:
- issue: Mantener la singularidad de «la mujer» sin generalizar a «las mujeres» ni suavizar la imagen
  english_pob_reading: Retain the singular 'the woman' as stated in the Hebrew, without broadening to 'women' or paraphrasing away the imagery
  chosen_spanish_reading: Mantener «la mujer» en singular, sin convertirla en plural ni neutralizar la metáfora
  alternative_spanish_readings:
  - las mujeres
  - la mujer seductora
  - la necedad personificada
  rationale: El hebreo presenta singularidad y una descripción metafórica intensa. La traducción debe preservar esa tensión textual; las lecturas interpretativas quedan mejor para notas o comentario, no para el cuerpo principal.
  doctrine_reference: Translation philosophy §3, §6
- issue: Cómo rendir טוֹב לִפְנֵי הָאֱלֹהִים
  english_pob_reading: The one who is good before God
  chosen_spanish_reading: El que es bueno delante de Dios
  alternative_spanish_readings:
  - El que agrada a Dios
  - El que es agradable delante de Dios
  rationale: La versión principal conserva el valor léxico de טוֹב y la construcción idiomática de לִפְנֵי הָאֱלֹהִים. La lectura más interpretativa, «agrada a Dios», se deja como alternativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente con acuerdo alto y sin cambios aplicados, manteniendo las decisiones léxicas y teológicas ya auditadas en el paquete fuente.
  spanish_consistency_notes:
  - Se conserva «Dios» para הָאֱלֹהִים conforme al estándar del proyecto.
  - Se usa «escapará»/«será atrapado» para reflejar el valor verbal de מלט y לכד sin añadir explicaciones.
  - 'Se mantiene el paralelismo retórico del hebreo: corazón / manos, escapar / ser atrapado.'
  - Se evita «SEÑOR» porque el versículo usa אֱלֹהִים, no el Tetragrámaton.
