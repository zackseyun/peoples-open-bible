revisions:
- from: Entonces la ira de Yahvé se encendió[a] contra Israel, y los entregó en manos de saqueadores, que los saqueaban. Los vendió en manos de sus enemigos por todos lados[b][c], de modo que ya no pudieron resistir delante de sus enemigos.
  to: Entonces la ira de Yahvé se encendió[a] contra Israel, y los entregó en mano de saqueadores, y los saquearon. Los vendió en mano de sus enemigos por todos lados[b][c], de modo que ya no pudieron mantenerse firmes ante sus enemigos.
  rationale: 'La revisión hace ajustes menores pero importantes: 1) conserva mejor el modismo hebreo con «en mano de»; 2) reemplaza «resistir delante de» por «mantenerse firmes ante», que refleja mejor לַעֲמֹד לִפְנֵי y suena natural en español; 3) cambia «que los saqueaban» por «y los saquearon» para una secuencia narrativa más fluida; 4) corrige la nota c para que sea una alternativa real y útil.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:55:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: ira de Yahvé, entrega a saqueadores, venta en mano de enemigos circundantes, e incapacidad de sostenerse ante ellos. También preserva correctamente «Yahvé» y «Los vendió». Sin embargo, hay pequeños desajustes: el texto dice «en manos de» donde el hebreo singulariza el modismo («en mano de»), y «resistir delante de» suena menos natural y menos cercano a לַעֲמֹד לִפְנֵי que «mantenerse firmes ante» o «estar en pie ante».'
  spanish_quality_summary: El español es claro y digno, pero requiere pulido menor para mayor naturalidad bíblica y precisión idiomática. «Que los saqueaban» es comprensible, aunque en esta secuencia narrativa resulta más natural «y los saquearon». La nota c repite exactamente la frase del texto y por tanto no aporta una verdadera alternativa; conviene ajustar la redacción principal a «por todos lados» y dejar como alternativa «por todos lados / en derredor», o mejor reformular la principal como «por todos lados» y conservar la alternativa útil. También conviene armonizar «en mano de» con la nota explicativa del modismo.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה -> «Yahvé», שֹׁסִים/וַיָּשֹׁסּוּ -> «saqueadores / saquearon», וַיִּמְכְּרֵם -> «Los vendió». La principal mejora es escoger una formulación española que preserve mejor לַעֲמֹד לִפְנֵי sin dureza artificial: «mantenerse firmes ante» conserva el matiz de sostenerse frente al enemigo.'
  issues:
  - severity: medium
    issue: «resistir delante de sus enemigos» es poco natural en español y no refleja con la mayor precisión «estar de pie / mantenerse» ante ellos.
    rationale: לַעֲמֹד לִפְנֵי significa literalmente estar de pie ante, y en contexto bélico sostenerse o mantenerse firme frente al enemigo. «Mantenerse firmes ante» suena mejor y conserva más del hebreo.
  - severity: low
    issue: «en manos de» debería preferirse como «en mano de» en ambos casos para reflejar mejor el modismo hebreo singular y la nota cultural.
    rationale: 'El hebreo usa בְּיַד, singular. En español bíblico «en mano de» es natural y además coordina mejor con la nota «Hebreo: “en mano de”».'
  - severity: low
    issue: La nota c no ofrece una alternativa real, porque repite prácticamente la redacción principal.
    rationale: Una nota de alternativa debe preservar una opción distinta; «por todos lados» y «en derredor» o «por todos lados / en todo su alrededor» sí aportan valor.
  - severity: low
    issue: «que los saqueaban» es posible, pero en narrativa hebrea secuencial «y los saquearon» fluye mejor en español.
    rationale: La cláusula relativa se usó en inglés por naturalidad; en español la coordinación simple mantiene bien el vínculo cognado con «saqueadores» y evita un matiz imperfectivo innecesario.
  revised_spanish_text: Entonces la ira de Yahvé se encendió[a] contra Israel, y los entregó en mano de saqueadores, y los saquearon. Los vendió en mano de sus enemigos por todos lados[b][c], de modo que ya no pudieron mantenerse firmes ante sus enemigos.
  revised_footnotes:
