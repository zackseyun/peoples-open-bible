review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite con fidelidad la comparación principal de fundición, la repetición de «en medio de», la fórmula de reconocimiento y el nombre divino «Yahvé». Sin embargo, la nota al pie [a] está mal anclada: la alternativa «dentro de ella» corresponde a בְתוֹכָהּ («en medio de ella»), no a «un horno».'
  spanish_quality_summary: El texto es claro y digno, pero mezcla un tratamiento peninsular («seréis», «sabréis», «vosotros») con la pauta solicitada de español neutral latinoamericano / ampliamente legible en la iglesia. También conviene mover la nota al pie al sintagma correcto para evitar confusión. «Furor» es posible, pero «ira» suena más natural y ampliamente comprensible en este registro sin perder fuerza.
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé». No hay conflicto mayor en los demás términos. Se recomienda ajustar el plural de segunda persona a una forma más neutral («ustedes») para mejor adecuación al estilo meta, y anclar correctamente la nota lexical a «ella[a]».
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «horno» pero explica «ella».
    rationale: La nota dice «O “dentro de ella”; el pronombre femenino singular…», lo cual claramente corresponde a בְתוֹכָהּ y no a בְּתוֹךְ כּוּר. Debe anclarse en «ella[a]».
  - severity: medium
    issue: Uso de «vosotros/seréis/sabréis» en lugar de español neutral latinoamericano.
    rationale: La guía del proyecto pide español neutral latinoamericano / ampliamente legible. «Ustedes/serán/sabrán» cumple mejor ese objetivo sin afectar el sentido.
  - severity: low
    issue: «mi furor» es menos natural que «mi ira» para lectura eclesial amplia.
    rationale: חֲמָתִי puede traducirse como «ira», «furor» o «cólera». «Ira» mantiene la fuerza profética y suele leerse con mayor naturalidad panhispánica que «furor».
  revised_spanish_text: Como se funde la plata en medio de un horno, así serán fundidos en medio de ella[a]; y sabrán que yo, Yahvé, he derramado mi ira sobre ustedes.
  revised_footnotes:
  - marker: a
    text: O «dentro de ella»; el pronombre femenino singular se refiere a la ciudad (Jerusalén) en el contexto inmediato.
    reason: lexical_alternative
