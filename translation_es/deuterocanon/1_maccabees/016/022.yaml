  glossary_alignment: No hay términos teológicos especiales en juego. La consistencia léxica con ἀπολέσαι se preserva correctamente mediante «destruir», repetido en ambas cláusulas. «Los hombres» y «los mató» están bien alineados con la política de fidelidad léxica.
