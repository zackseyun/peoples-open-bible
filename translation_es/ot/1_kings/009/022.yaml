base_translation:
  language: en
  yaml_path: translation/ot/1_kings/009/022.yaml
  text: But from the sons of Israel Solomon made no slaves[a], for they were the men of war, his slaves, his commanders, his officers, and the commanders of his chariots and his horsemen.
  footnotes:
