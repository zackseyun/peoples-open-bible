id: 2SA.11.23
reference: 2 Samuel 11:23
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מַּלְאָךְ֙ אֶל דָּוִ֔ד כִּֽי גָבְר֤וּ עָלֵ֨י/נוּ֙ הָֽ/אֲנָשִׁ֔ים וַ/יֵּצְא֥וּ אֵלֵ֖י/נוּ הַ/שָּׂדֶ֑ה וַ/נִּהְיֶ֥ה עֲלֵי/הֶ֖ם עַד פֶּ֥תַח הַ/שָּֽׁעַר־־־׃
translation:
  text: The messenger said to David[a], “The men were stronger than we were, and they came out against us into the open field[b]; but we pressed them back as far as the entrance of the gate.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The men prevailed against us.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we were upon them,' an idiom meaning that David’s men pressed the enemy back or took the offensive against them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the envoy
  lexicon: HALOT
  rationale: In this narrative context the term refers to a human military courier, not an angelic being. 'Messenger' is the most natural and contextually accurate English rendering.
- source_word: כִּי
  chosen: The men were stronger than we were
  alternatives:
  - For the men prevailed against us
  - Indeed, the men overpowered us
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the report. Rendering it implicitly in English as part of the quoted clause is more natural than a wooden 'for' after 'said.'
- source_word: גָבְרוּ עָלֵינוּ
  chosen: were stronger than we were
  alternatives:
  - prevailed against us
  - overpowered us
  lexicon: HALOT
  rationale: גבר with עַל conveys prevailing or being stronger than someone. 'Were stronger than we were' preserves the comparative force in idiomatic English, while fitting the messenger's battlefield report.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the soldiers
  lexicon: HALOT
  rationale: The Hebrew is simply 'the men.' While the referent is enemy fighters, 'the men' stays closer to the source and remains clear in context.
- source_word: וַיֵּצְאוּ אֵלֵינוּ הַשָּׂדֶה
  chosen: they came out against us into the open field
  alternatives:
  - they came out to us in the field
  - they sallied out against us to the field
  lexicon: HALOT
  rationale: The phrase describes the defenders coming out from the city to engage in the field. 'Against us' makes the hostile force of אֵלֵינוּ explicit in idiomatic English, and 'open field' clarifies the battlefield setting.
- source_word: וַנִּהְיֶה עֲלֵיהֶם
  chosen: we pressed them back
  alternatives:
  - we came upon them
  - we were against them
  - we got the better of them
  lexicon: HALOT
  rationale: Literally the clause is 'we were upon them,' an idiom for taking the offensive or pressing the enemy. 'We pressed them back' best captures the military sense in natural English and fits the following limit clause.
- source_word: עַד פֶּתַח הַשָּׁעַר
  chosen: as far as the entrance of the gate
  alternatives:
  - up to the entrance of the gate
  - to the gateway
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening' and שַׁעַר is 'gate.' The phrase marks the extent of pursuit. 'As far as the entrance of the gate' preserves that spatial limit clearly.
