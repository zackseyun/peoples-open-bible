translation:
  language: es
  text: el arca y sus varas, el propiciatorio[a] y el velo de la cortina,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cubierta de expiación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  - el arca del pacto
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, אָרוֹן designa el receptáculo sagrado. «Arca» es el equivalente español establecido y preciso; «cofre» resulta demasiado genérico, y «arca del pacto» añade un elemento no presente en este versículo.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus postes
  - sus bastones
  lexicon: HALOT
  rationale: בַּדִּים son los palos para cargar el arca. «Varas» conserva el sentido de piezas para transporte y es el término tradicional y claro en español; «postes» suena más fijo y «bastones» no es natural en este contexto.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la tapa de expiación
  lexicon: HALOT
  rationale: Para כַּפֹּרֶת, «propiciatorio» es el término bíblico-teológico asentado en español y conserva la carga cultual del objeto. «Cubierta de expiación» explicita el valor semántico, pero pierde el término técnico tradicional.
- source_word: פָּרֹכֶת
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el separador
  lexicon: HALOT
  rationale: פָּרֹכֶת se refiere al telón divisorio del santuario. «Velo» preserva su función sagrada y separadora mejor que «cortina», que es más neutro.
- source_word: הַמָּסָךְ
  english_pob_choice: the screen
  chosen_spanish: del biombo
  alternatives_spanish:
  - de la pantalla
  - de la cortina
  lexicon: HALOT
  rationale: מָסָךְ denota una pantalla o cubierta. En español, «biombo» comunica la idea de una pieza de separación, pero aquí se usa de forma descriptiva y no doméstica; se eligió para distinguirlo de פָּרֹכֶת y conservar la duplicación del hebreo. La alternativa «pantalla» suena tecnológica, y «cortina» borraría la diferencia léxica.
theological_decisions:
- issue: הַכַּפֹּרֶת como objeto cultual con asociación expiatoria
  english_pob_reading: the mercy seat
  chosen_spanish_reading: el propiciatorio
  alternative_spanish_readings:
  - la cubierta de expiación
  rationale: «Propiciatorio» mantiene la referencia cultual al lugar/cubierta del arca y deja visible la relación con expiación y acceso a la presencia divina. La alternativa explicativa se conserva como posibilidad semántica, pero no como término principal para no perder el léxico técnico bíblico.
  doctrine_reference: Éxodo 25:17-22; Hebreos 9:5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa que cambió «for the screen» por «of the screen»; por eso se opta por la relación constructa «del biombo» y no por una frase final de finalidad. Se mantiene además la coordinación simple del hebreo: arca, varas, propiciatorio y velo del biombo.'
  spanish_consistency_notes:
  - Se conserva el singular colectivo «arca» para אָרוֹן, como término técnico del santuario.
  - Se evita traducir los marcadores directos hebreos; la coordinación en español queda marcada solo por la puntuación y la conjunción «y».
  - «Propiciatorio» se usa como término técnico consistente con el uso bíblico español y con la carga expiatoria documentada en el aparato inglés.
  - Se mantiene la distinción entre «velo» y «biombo» para reflejar la duplicación de פָּרֹכֶת + הַמָּסָךְ sin fusionar ambos sustantivos.
