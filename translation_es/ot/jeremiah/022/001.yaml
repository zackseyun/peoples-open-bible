translation:
  language: es
  text: 'Así[a] dice Yahvé: Baja a la casa[b] del rey de Judá, y habla allí esta palabra[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esto dice Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa del rey de Judá»; probablemente se refiere al palacio real.'
    reason: cultural_note
  - marker: c
    text: 'O: «este mensaje».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética introductoria se expresa en español con una cadencia natural y solemne. «Así dice» conserva el valor actual de anuncio directo, y «Yahvé» sigue la norma del proyecto para el nombre divino.
- source_word: רֵד
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ve hacia abajo
  lexicon: HALOT
  rationale: El imperativo de ירד puede ser literalmente «desciende» o idiomáticamente «baja». Aquí «desciende» mantiene mejor la dirección física implícita y el tono profético sin sonar forzado.
- source_word: בֵּית מֶלֶךְ יְהוּדָה
  english_pob_choice: the house of the king of Judah
  chosen_spanish: la casa del rey de Judá
  alternatives_spanish:
  - el palacio del rey de Judá
  - la casa real de Judá
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar con fidelidad la forma hebrea literal, como hace el POB inglés, aunque el referente probable sea el palacio. «Rey de Judá» traduce el sintagma sin añadir interpretaciones.
- source_word: וְדִבַּרְתָּ שָׁם
  english_pob_choice: and speak there
  chosen_spanish: y habla allí
  alternatives_spanish:
  - y hablarás allí
  - y proclama allí
  lexicon: HALOT
  rationale: El verbo se vuelve a expresar como mandato directo en español. «Habla allí» reproduce el valor imperativo del contexto sin intensificar indebidamente a «proclama».
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - esta declaración
  lexicon: HALOT
  rationale: El hebreo usa דָּבָר en singular para la fórmula profética específica. En español, «palabra» conserva el carácter concreto del dicho que sigue, y mantiene la correspondencia con el idiomatismo bíblico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre del pacto. «Yahvé» es la forma objetivo en español para esta serie textual, en lugar de la sustitución reverencial «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo cambió la puntuación final a dos puntos para introducir el discurso siguiente; en español se refleja con dos puntos al final de la frase, manteniendo el contenido léxico y sintáctico acordes al texto fuente.
  spanish_consistency_notes:
  - He mantenido la fórmula profética breve y solemne sin introducir material ausente en el hebreo.
  - No se añadió nota de palacio, porque el pedido exige que todo marcador aparezca en el texto; la lectura literal «casa del rey de Judá» ya es audit-able y suficiente.
  - «Palabra» traduce el singular de דבר y evita pluralizar indebidamente el objeto del mandato.
