translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «El hombre debe morir sin falta[a]; toda la congregación lo apedreará con piedras[b] fuera del campamento»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «ciertamente debe ser muerto».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «apedrearlo con piedras», expresión judicial enfática para la ejecución por lapidación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre del pacto como nombre propio divino. "Yahvé" preserva el referente del Tetragrama sin convertirlo en un título genérico, y concuerda con el criterio del proyecto.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; "Entonces" comunica bien la secuencia en español natural sin perder el flujo narrativo.
- source_word: מֹות יוּמַת
  english_pob_choice: must surely be put to death
  chosen_spanish: Sin falta debe ser muerto
  alternatives_spanish:
  - debe ser muerto sin falta
  - ciertamente debe morir
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la obligación o certeza. "Sin falta" intenta reflejar esa fuerza enfática en español, y "debe ser muerto" conserva el pasivo legal del hebreo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  lexicon: HALOT
  rationale: El sustantivo definido singular apunta al culpable ya identificado en el contexto. "El hombre" es directo y adecuado en registro legal.
- source_word: רָגוֹם ... בָאֲבָנִים
  english_pob_choice: stone him with stones
  chosen_spanish: lo apedreará con piedras
  alternatives_spanish:
  - lo lapidará
  - lo apedreará
  lexicon: HALOT
  rationale: El hebreo expresa ejecución por apedreamiento con énfasis verbal. "Apedrear" conserva el acto judicial; se mantiene "con piedras" para reflejar la forma enfática del original sin volverlo redundante en exceso.
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: '"Congregación" mantiene el sentido corporativo y formal de עֵדָה en contexto legal/narrativo, acorde con el término usado en el POB inglés.'
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del recinto del campamento
  lexicon: HALOT
  rationale: Es una expresión locativa idiomática. "Fuera del campamento" es la equivalencia natural y precisa en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre divino revelado en el texto hebreo y no se sustituye por un título ocultante. "Yahvé" es la forma elegida por el proyecto para el Tetragrama.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Construcción legal de condena a muerte
  english_pob_reading: must surely be put to death
  chosen_spanish_reading: Sin falta debe ser muerto
  alternative_spanish_readings:
  - debe morir sin falta
  - debe ser ejecutado
  rationale: La forma hebrea expresa intensidad jurídica/solemne. La traducción evita suavizarla a una mera posibilidad o a una paráfrasis menos directa, preservando el tono judicial del mandato.
  doctrine_reference: Lexical force of infinitive absolute with finite verb in legal judgment contexts
translation_notes:
  revision_awareness: El paquete auditado muestra alta concordancia y sin cambios sustanciales en la última revisión. La versión española sigue la decisión estable del POB inglés para el Nombre divino, la intensificación verbal y la expresión judicial de la lapidación, adaptándolas a español natural sin borrar su fuerza legal.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente para יְהוָה.
  - Se usa "congregación" para עֵדָה en sentido corporativo-formal.
  - '"Fuera del campamento" conserva la locución locativa idiomática.'
  - '"Apedrear con piedras" se mantiene en el cuerpo del texto con nota explicativa, porque el hebreo usa una forma enfática que el POB inglés también documenta.'
