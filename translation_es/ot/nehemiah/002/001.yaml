  rationale: Se corrige la nota para alinearla con la evidencia y el audit trail del POB, trasladando la alternativa formal y la observación literal al modismo final, donde realmente pertenecen. También se mejora la naturalidad de la cláusula escénica con «el vino estaba delante de él», sin apartarse del hebreo. El resto del versículo es fiel y no requiere cambios mayores.
