translation:
  language: es
  text: Toda su maldad está en Gilgal[a]; sí, allí los aborrecí, por la maldad de sus obras. Los expulsaré de mi casa[b]; ya no seguiré amándolos. Todos sus príncipes son rebeldes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque allí los aborrecí'. La conjunción hebrea puede leerse con valor causal ('porque') o enfático ('sí, en verdad').
    reason: lexical_alternative
  - marker: b
    text: '''Mi casa'' puede referirse más específicamente a la tierra de Yahvé, a su santuario o a su casa del pacto; el hebreo deja la imagen condensada.'
    reason: cultural_note
  - marker: c
    text: O 'Todos sus gobernantes son rebeldes/obstinados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל רָעָתָם
  english_pob_choice: All their evil
  chosen_spanish: Toda su maldad
  alternatives_spanish:
  - Toda su maldad
  - Toda su perversidad
  - Todo su mal
  lexicon: HALOT
  rationale: 'כָּל + el sustantivo singular abstracto רָעָה tiene sentido colectivo: la totalidad de su maldad. ''Maldad'' es natural en español y conserva el peso moral del término sin diluirlo.'
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en Gilgal
  - en el Gilgal
  lexicon: HALOT
  rationale: La preposición בּ aquí es locativa. En español, 'en Gilgal' es la forma más natural para un topónimo, y mantiene la referencia al lugar.
- source_word: כִּי שָׁם
  english_pob_choice: indeed, there
  chosen_spanish: sí, allí
  alternatives_spanish:
  - porque allí
  - ciertamente allí
  - pues allí
  lexicon: HALOT
  rationale: כִּי puede ser causal o enfático. Dado el contexto, 'sí, allí' conserva el énfasis retórico y permite que la relación causal quede expresada por el contexto y la frase siguiente.
- source_word: שְׂנֵאתִים
  english_pob_choice: I hated them
  chosen_spanish: los aborrecí
  alternatives_spanish:
  - los odié
  - los rechacé
  lexicon: HALOT
  rationale: שׂנא expresa rechazo/odio con fuerza. 'Aborrecer' es una opción digna y fuerte en español bíblico-registral, sin suavizar la intensidad del verbo.
- source_word: עַל רֹעַ מַעַלְלֵיהֶם
  english_pob_choice: because of the evil of their deeds
  chosen_spanish: por la maldad de sus obras
  alternatives_spanish:
  - por la maldad de sus hechos
  - a causa de la maldad de sus acciones
  - por el mal de sus obras
  lexicon: HALOT
  rationale: עַל aquí expresa base o causa. 'Maldad' traduce רֹעַ y 'obras' mantiene מַעַלְלֵי־ con el matiz de actos realizados, en un español claro y sobrio.
- source_word: מִבֵּיתִי
  english_pob_choice: out of my house
  chosen_spanish: de mi casa
  alternatives_spanish:
  - fuera de mi casa
  - de mi casa, expulsados
  lexicon: HALOT
  rationale: Con גָּרַשׁ, la preposición מִ marca salida/expulsión. 'De mi casa' conserva el sintagma compacto del hebreo y permite la imagen metafórica sin especificarla en exceso.
- source_word: אֲגָרְשֵׁם
  english_pob_choice: I will drive them out
  chosen_spanish: Los expulsaré
  alternatives_spanish:
  - Los echaré
  - Los sacaré
  - Los desterraré
  lexicon: HALOT
  rationale: גָּרַשׁ denota expulsar/ahuyentar. 'Expulsaré' es el equivalente directo más claro y mantiene la severidad judicial del verbo.
- source_word: לֹא אוֹסֵף אַהֲבָתָם
  english_pob_choice: I will no longer love them
  chosen_spanish: ya no seguiré amándolos
  alternatives_spanish:
  - ya no los amaré
  - no volveré a amarlos
  - dejaré de amarlos
  lexicon: HALOT
  rationale: אָסַף en esta construcción expresa añadir/continuar. 'Ya no seguiré amándolos' comunica bien la cesación de amor en español sin perder el valor aspectual del hebreo.
- source_word: כָּל שָׂרֵיהֶם
  english_pob_choice: All their princes
  chosen_spanish: Todos sus príncipes
  alternatives_spanish:
  - Todos sus jefes
  - Todos sus gobernantes
  - Todos sus oficiales
  lexicon: HALOT
  rationale: שָׂרִים son líderes con tono político elevado. 'Príncipes' preserva ese matiz honorífico y tradicional, coherente con el registro profético.
- source_word: סֹרְרִים
  english_pob_choice: are rebels
  chosen_spanish: son rebeldes
  alternatives_spanish:
  - son obstinados
  - son contumaces
  - son rebeldes y tercos
  lexicon: HALOT
  rationale: El participio de סרר denota rebeldía obstinada. 'Son rebeldes' mantiene una predicación clara y fiel sin añadir interpretaciones psicológicas.
theological_decisions:
- issue: Lenguaje de odio divino
  english_pob_reading: Retain the direct wording 'I hated them' without softening.
  chosen_spanish_reading: 'Mantener el lenguaje directo: ''los aborrecí''.'
  alternative_spanish_readings:
  - los odié
  - los rechacé
  rationale: El verbo hebreo שׂנא se mantiene con fuerza de rechazo/odio. No se suaviza para evitar borrar la dureza del juicio pactal que el texto expresa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de 'mi casa'
  english_pob_reading: Preserve the metaphor as 'my house' rather than interpret it as land, temple, or people in the main text.
  chosen_spanish_reading: Conservar 'mi casa' como imagen metafórica, sin especificarla.
  alternative_spanish_readings:
  - mi tierra
  - mi templo
  - mi casa real
  rationale: El hebreo comprime una imagen que puede abarcar casa/casa de Dios/esfera de pacto. Mantener la metáfora evita resolver una tensión que el texto no aclara.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto base y con la revisión más reciente: no se documentaron cambios sustanciales posteriores; se preserva el acuerdo alto del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto cuando aparezca el nombre divino; aquí no aparece.
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - '''Espíritu'', ''esclavo'' y otros términos normativos del proyecto no aparecen aquí.'
  - Se mantiene el paralelismo entre juicio ('los expulsaré') y cesación del favor ('ya no seguiré amándolos') sin añadir explicación doctrinal en el texto principal.
