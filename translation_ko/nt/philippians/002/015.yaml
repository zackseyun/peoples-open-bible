id: PHP.2.15
reference: Philippians 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα γένησθε ἄμεμπτοι καὶ ἀκέραιοι, τέκνα θεοῦ ⸂ἄμωμα μέσον⸃ γενεᾶς σκολιᾶς καὶ διεστραμμένης, ἐν οἷς φαίνεσθε ὡς φωστῆρες ἐν κόσμῳ
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/015.yaml
  text: 'so that you may become blameless and pure, children of God without blemish in the midst of a crooked and twisted generation, among whom you shine as lights in the world'
translation:
  language: ko
  text: 이는 여러분이 비뚤어지고 굽은 세대[b] 가운데서 흠 없는 하나님의 자녀가 되어, 책망받을 것 없고 순전하게 되며[a], 그들 가운데서 세상의 빛[c]으로 빛나게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분이 빛으로 나타나게」. 헬라어 φαίνομαι는 「빛나다」와 「나타나다」 둘 다 가능하나, 이어지는 「빛」과의 연결에서는 「빛나다」가 자연스럽다.
    reason: lexical_alternative
  - marker: b
    text: '「비뚤어지고 굽은 세대」는 신명기 32:5의 어구를 반영하며, 부패한 세대와 하나님의 자녀를 대조한다.'
    reason: cross_reference
  - marker: c
    text: 또는 「발광체」, 「별」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: 이는 ~하시려는 것
  alternatives_korean:
  - ~하도록
  - ~하기 위하여
  lexicon: BDAG
  rationale: 목적·결과를 도입한다. 한국어 자연 구문 「이는 ~하시려는 것」으로 옮긴다.
- source_word: γένησθε
  english_pob_choice: you may become
  chosen_korean: 되다
  alternatives_korean:
  - 되어 있다
  - 드러나다
  lexicon: BDAG
  rationale: γίνομαι는 「되어 가는」 의미. 단순 「있다」보다 권면적 어조를 살리는 「되다」가 적절하다.
- source_word: ἄμεμπτοι
  english_pob_choice: blameless
  chosen_korean: 책망받을 것 없다
  alternatives_korean:
  - 흠잡을 데 없다
  - 비난할 수 없다
  lexicon: BDAG
  rationale: 도덕적 무흠을 가리키는 표준 의미. 「책망받을 것 없는」이 자연스럽다.
- source_word: ἀκέραιοι
  english_pob_choice: pure
  chosen_korean: 순전하다
  alternatives_korean:
  - 순수하다
  - 섞임 없다
  lexicon: BDAG
  rationale: 「순전하다」가 도덕적 순수·정직의 의미를 한국어 권면에서 자연스럽게 담는다.
- source_word: τέκνα θεοῦ
  english_pob_choice: children of God
  chosen_korean: 하나님의 자녀
  alternatives_korean:
  - 하나님의 아들들
  lexicon: BDAG
  rationale: τέκνα는 성중립적 「자녀」. 본 번역은 그 폭을 보존한다.
- source_word: ἄμωμα
  english_pob_choice: without blemish
  chosen_korean: 흠 없는
  alternatives_korean:
  - 결점 없는
  - 티 없는
  lexicon: BDAG
  rationale: ἄμεμπτοι와 어휘 구분을 살리기 위해 「흠 없는」으로 옮긴다. 제사적·언약적 함의를 보존한다.
- source_word: μέσον γενεᾶς
  english_pob_choice: in the midst of a generation
  chosen_korean: 세대 가운데서
  alternatives_korean:
  - 세대 한가운데
  - 세대 사이에서
  lexicon: BDAG
  rationale: 「가운데」가 어떤 사람 집단 속에 놓여 있음을 자연스럽게 표현한다.
- source_word: σκολιᾶς καὶ διεστραμμένης
  english_pob_choice: crooked and twisted
  chosen_korean: 비뚤어지고 굽은
  alternatives_korean:
  - 굽고 패역한
  - 어그러지고 비뚤어진
  lexicon: BDAG
  rationale: 신명기 32:5의 반향을 살리는 강한 도덕 어휘. 「패역」 같은 현대 부정 함의가 짙은 단어보다 「비뚤어지고 굽은」이 본문의 형상적 어휘에 가깝다.
- source_word: ἐν οἷς
  english_pob_choice: among whom
  chosen_korean: 그들 가운데서
  alternatives_korean:
  - 그들 안에서
  - 그 가운데서
  lexicon: BDAG
  rationale: 대상이 세대의 사람들이므로 인격적 「그들」로 옮긴다.
- source_word: φαίνεσθε
  english_pob_choice: you shine
  chosen_korean: 빛나다
  alternatives_korean:
  - 나타나다
  - 보이다
  lexicon: BDAG
  rationale: 「빛」(φωστῆρες)과 연결되는 문맥에서 「빛나다」가 가장 자연스럽다. 「나타나다」 의미는 각주로 보존한다.
- source_word: φωστῆρες
  english_pob_choice: lights
  chosen_korean: 빛
  alternatives_korean:
  - 발광체
  - 별들
  lexicon: BDAG
  rationale: 「빛」이 한국어로 가장 자연스럽다. 「발광체」나 「별」은 너무 형식적이거나 좁다.
- source_word: ἐν κόσμῳ
  english_pob_choice: in the world
  chosen_korean: 세상의
  alternatives_korean:
  - 세상에서
  - 우주에서
  lexicon: BDAG
  rationale: κόσμος는 여기서 인간 세상을 가리킨다. 「세상의 빛」으로 풀어 자연스럽게 옮긴다.
theological_decisions:
- issue: '「흠 없음」과 「하나님의 자녀」의 관계, 신명기 32:5 반향'
  chosen_reading: '「흠 없는 하나님의 자녀」로 옮기고, 윤리적·언약적 반향은 본문에서 명시화하지 않고 보존한다'
  alternative_readings:
  - 「흠 없음」을 전체 절에 더 일반적으로 적용
  - 신명기 32:5에 대한 더 강한 해석적 암시
  rationale: 헬라어는 「하나님의 자녀」를 직접 수식하며, 「비뚤어진 세대」와의 대조에서 본문 간 메아리가 자연스럽게 들린다. 본문은 그 어휘를 보존하면서 반향을 함의적으로 남겨 둔다.
