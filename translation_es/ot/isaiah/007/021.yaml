translation:
  language: es
  text: Y en aquel día, un hombre mantendrá con vida una vaquilla[a] y dos ovejas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una novilla'. El hebreo describe una hembra joven del ganado vacuno.
    reason: lexical_alternative
  - marker: b
    text: Hebreo צֹאן es un término colectivo para ganado menor, a menudo ovejas y cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will
  chosen_spanish: Y ... mantendrá
  alternatives_spanish:
  - Y ... será
  - Y ... sucederá
  lexicon: HALOT
  rationale: La fórmula hebrea abre una cláusula profética/narrativa. En español, una simple conjunción con verbo futuro o perifrástico conserva el avance del enunciado sin volverlo artificial.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - ese día
  lexicon: HALOT
  rationale: La expresión profética fija se traduce de manera natural con 'en aquel día', que conserva el tono temporal y solemne del hebreo.
- source_word: יְחַיֶּה
  english_pob_choice: will keep alive
  chosen_spanish: mantendrá con vida
  alternatives_spanish:
  - hará vivir
  - conservará con vida
  - sostendrá con vida
  lexicon: HALOT
  rationale: El piel de חיה aquí indica conservar vivo o mantener con vida, aplicado a animales. 'Mantendrá con vida' comunica bien la acción concreta y evita sugerir cría o engorde.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino אִישׁ. Se conserva esa referencia representativa sin neutralizarla innecesariamente.
- source_word: עֶגְלַת בָּקָר
  english_pob_choice: a young cow
  chosen_spanish: una vaquilla
  alternatives_spanish:
  - una novilla
  - una ternera
  lexicon: HALOT
  rationale: La construcción designa una hembra joven del ganado vacuno. 'Vaquilla' es una equivalencia natural y suficientemente precisa en español, más breve que una glosa explicativa.
- source_word: וּשְׁתֵּי צֹאן
  english_pob_choice: and two sheep
  chosen_spanish: y dos ovejas
  alternatives_spanish:
  - y dos corderas
  - y dos cabezas de ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, frecuentemente ovejas y cabras. En español corriente, 'ovejas' es la opción más natural y legible; se mantiene abierta la colectividad en la nota.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier marcador no anclado en el texto. Ahora solo aparecen [a] y [b], y ambos están presentes exactamente en el span de traducción.
  spanish_consistency_notes:
  - Se prefirió 'en aquel día' para conservar el valor profético fijo de la expresión temporal.
  - '''Vaquilla'' comunica el sentido de una hembra joven del ganado vacuno sin caer en un calco rígido.'
  - '''Ovejas'' es una concreción natural del colectivo צֹאן; la nota preserva la amplitud semántica del hebreo.'
  - No se usó 'SEÑOR' ni terminología litúrgica porque el versículo no contiene el nombre divino ni una cita directa pertinente.
