revisions:
- from: 'Y Josué les dijo: “No teman ni se atemoricen. Esfuércense y cobren ánimo, porque así hará Yahvé a todos sus enemigos, contra los cuales ustedes pelean.”'
  to: 'Y Josué les dijo: “No teman ni se desalienten. Esfuércense y cobren ánimo, porque así hará Yahvé a todos sus enemigos, contra quienes ustedes pelean.”'
  rationale: Se reemplaza 'ni se atemoricen' por 'ni se desalienten' para distinguir mejor ירא de חתת y evitar repetición semántica. También se suaviza la relativa a 'contra quienes ustedes pelean' para un español más natural, manteniendo el sentido adversativo del hebreo. No se requieren notas al pie nuevas.
