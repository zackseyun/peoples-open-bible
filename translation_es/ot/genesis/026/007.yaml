translation:
  language: es
  text: 'Cuando los hombres del lugar preguntaron por su esposa, él dijo: «Es mi hermana», porque tenía miedo de decir: «Es mi esposa», no fuera que[a] los hombres del lugar me mataran por causa de Rebeca, pues ella era de hermoso aspecto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por temor a que los hombres del lugar me mataran por causa de Rebeca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאֲלוּ
  english_pob_choice: asked
  chosen_spanish: preguntaron
  alternatives_spanish:
  - interrogaron
  - inquirieron
  lexicon: HALOT
  rationale: El verbo expresa una pregunta o indagación sencilla. «Preguntaron» es natural en español y conserva el valor básico sin sobredimensionarlo.
- source_word: אַנְשֵׁי הַמָּקוֹם
  english_pob_choice: the men of the place
  chosen_spanish: los hombres del lugar
  alternatives_spanish:
  - los hombres de aquel lugar
  - la gente del lugar
  lexicon: HALOT
  rationale: Se conserva el referente masculino explícito de אַנְשֵׁי con «hombres». «Del lugar» sigue de cerca la construcción hebrea y funciona bien en español.
- source_word: לְאִשְׁתּוֹ
  english_pob_choice: about his wife
  chosen_spanish: por su esposa
  alternatives_spanish:
  - acerca de su esposa
  - sobre su esposa
  lexicon: HALOT
  rationale: En este contexto la preposición con שׁאל introduce el tema de la pregunta. «Por su esposa» comunica la idea de preguntar por ella de forma idiomática en español.
- source_word: אֲחֹתִי הִוא
  english_pob_choice: She is my sister
  chosen_spanish: Es mi hermana
  alternatives_spanish:
  - Mi hermana es ella
  lexicon: HALOT
  rationale: Se traduce el enunciado directo con el predicado nominal natural en español, sin perder la identificación deliberadamente engañosa.
- source_word: כִּי יָרֵא
  english_pob_choice: because he was afraid
  chosen_spanish: porque tenía miedo
  alternatives_spanish:
  - porque temía
  - pues estaba atemorizado
  lexicon: HALOT
  rationale: יַרֵא aquí expresa temor. «Tenía miedo» es claro y fiel al matiz básico, sin añadir intensidad que el contexto no exige.
- source_word: לֵאמֹר
  english_pob_choice: to say
  chosen_spanish: de decir
  alternatives_spanish:
  - para decir
  - al decir
  lexicon: HALOT
  rationale: El infinitivo tras el verbo de temor se expresa naturalmente en español con «de decir».
- source_word: אִשְׁתִּי
  english_pob_choice: She is my wife
  chosen_spanish: Es mi esposa
  alternatives_spanish:
  - Mi esposa es ella
  lexicon: HALOT
  rationale: Se explicita el predicado como exige el español y se mantiene la oposición con «hermana».
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no fuera que
  alternatives_spanish:
  - para que no
  - no sea que
  lexicon: HALOT
  rationale: La partícula introduce una consecuencia temida. «No fuera que» reproduce bien el valor preventivo y la subordinación de riesgo.
- source_word: יַהַרְגֻנִי
  english_pob_choice: kill me
  chosen_spanish: me mataran
  alternatives_spanish:
  - me matasen
  - me mataran a mí
  lexicon: HALOT
  rationale: הרג designa matar de forma directa. «Me mataran» es natural y suficientemente exacto en español.
- source_word: עַל רִבְקָה
  english_pob_choice: because of Rebekah
  chosen_spanish: por causa de Rebeca
  alternatives_spanish:
  - a causa de Rebeca
  - por Rebeca
  lexicon: HALOT
  rationale: עַל expresa aquí motivo o ocasión. «Por causa de» conserva con claridad la relación causal sin suavizarla.
- source_word: טוֹבַת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: de hermoso aspecto
  alternatives_spanish:
  - hermosa de apariencia
  - bella de aspecto
  lexicon: HALOT
  rationale: La expresión hebrea alude a una apariencia agradable o hermosa. «De hermoso aspecto» mantiene el sentido descriptivo con buena naturalidad en español.
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebeca
  lexicon: HALOT
  rationale: Se usa la forma habitual en español para el nombre propio, plenamente reconocible y fiel a la transliteración tradicional.
theological_decisions:
- issue: No hay tensión doctrinal explícita; sí una narración de ocultamiento y temor humano.
  english_pob_reading: The verse reports Isaac's fear-driven claim that Rebekah was his sister.
  chosen_spanish_reading: El versículo relata que Isaac, por miedo, dijo que Rebeca era su hermana.
  alternative_spanish_readings:
  - El versículo presenta una mentira por temor.
  - El versículo narra un ocultamiento motivado por miedo.
  rationale: Conviene mantener el lenguaje narrativo sin cargarlo con una explicación moral que el texto no formula aquí. La traducción conserva el hecho y su motivación de temor.
  doctrine_reference: Génesis 26:7; cf. el desarrollo narrativo inmediato en el contexto
- issue: La partícula de finalidad/temor פֶּן requiere una lectura preventiva, no meramente causal.
  english_pob_reading: '''lest the men of the place kill me because of Rebekah'''
  chosen_spanish_reading: «no fuera que los hombres del lugar me mataran por causa de Rebeca»
  alternative_spanish_readings:
  - «para que los hombres del lugar no me mataran por causa de Rebeca»
  - «no sea que los hombres del lugar me maten por causa de Rebeca»
  rationale: Se preserva la relación de temor y posible consecuencia, manteniendo el matiz precautorio del hebreo.
  doctrine_reference: Uso semántico de פֶּן en hebreo bíblico
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail en inglés: inquiry, fear, indirect speech, and the causal phrase are preserved without introducing doctrinal expansion. La principal adaptación fue elegir equivalentes españoles idiomáticos para לְאִשְׁתּוֹ y פֶּן, manteniendo el registro narrativo y el paralelismo hermano/esposa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como default POB, pero este versículo no lo contiene.
  - Se usa «Rebeca» según la convención española usual para רִבְקָה.
  - Se conserva «hombres del lugar» para reflejar el masculino explícito del hebreo.
  - «Es mi hermana / Es mi esposa» mantiene el paralelismo de discurso directo.
  - La nota al pie refleja una alternativa sintáctica posible en español sin alterar el contenido básico.
