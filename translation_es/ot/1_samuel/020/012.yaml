base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/012.yaml
  text: And Jonathan said to David[a], “As Yahweh, the God of Israel, lives, when I have sounded out my father about this time tomorrow, or on the third day, and behold, if it is favorable toward David[c][b], shall I not then send to you and disclose it to you?"
  footnotes:
  - marker: a
    text: Hebrew literally, “and uncover your ear,” an idiom meaning “tell you” or “disclose it to you.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew wording is elliptical and difficult; the sense is a solemn oath or pledge invoking the LORD as witness.
    reason: textual_variant
  - marker: c
    text: Or “about this time tomorrow, on the third day”; the Hebrew temporal expression is compressed.
    reason: alternative_reading
