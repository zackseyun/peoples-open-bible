translation:
  language: es
  text: En el día de mi angustia te invoco, pues tú me respondes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tú me responderás». El verbo hebreo también puede entenderse con sentido futuro.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: In the day of
  chosen_spanish: En el día de
  alternatives_spanish:
  - En el tiempo de
  - El día de
  lexicon: HALOT
  rationale: La expresión temporal בְּיוֹם se vierte de modo natural en español con una construcción temporal explícita. «En el día de» conserva el giro hebreo y mantiene un registro sobrio y bíblico sin sonar forzado.
- source_word: צָרָתִי
  english_pob_choice: my distress
  chosen_spanish: mi angustia
  alternatives_spanish:
  - mi aflicción
  - mi aflicción
  - mi aflicción y dolor
  lexicon: HALOT
  rationale: צָרָה puede abarcar ‘distress’, ‘trouble’ o ‘adversity’. «Angustia» comunica bien el peso personal y emocional del salmo en español actual, sin precisar indebidamente la causa del sufrimiento.
- source_word: אֶקְרָאֶךָּ
  english_pob_choice: I call to you
  chosen_spanish: te invoco
  alternatives_spanish:
  - te llamo
  - clamo a ti
  lexicon: HALOT
  rationale: En contexto de oración, קרא no es solo ‘llamar’ sino invocar a Dios. «Te invoco» preserva la fuerza devocional del verbo y resulta natural en español eclesial contemporáneo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón de la invocación. «Pues» conserva la relación causal con un tono formal y conciso, cercano al matiz del texto base revisado en inglés.
- source_word: תַעֲנֵנִי
  english_pob_choice: you answer me
  chosen_spanish: tú me respondes
  alternatives_spanish:
  - tú me responderás
  - tú me contestas
  lexicon: HALOT
  rationale: ענה aquí puede entenderse como respuesta presente o futura segura. «Me respondes» mantiene la confianza presente del hablante y deja abierta la tensión aspectual que el inglés POB preservó con nota.
theological_decisions:
- issue: Aspecto del imperfecto final תַעֲנֵנִי
  english_pob_reading: 'present gnomic/confident sense: ''you answer me'' with future sense preserved as an alternative'
  chosen_spanish_reading: 'presente de confianza: «tú me respondes»'
  alternative_spanish_readings:
  - «tú me responderás»
  - «tú respondes a mi llamado»
  rationale: El hebreo permite tanto una certeza habitual/presente como una expectativa futura. Se conserva la confianza del salmista en una forma presente española, sin eliminar la alternativa futura que sigue siendo viable y teológicamente significativa.
  doctrine_reference: Preservar la tensión aspectual del hebreo en lugar de resolverla
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'because' por 'for' para un enlace causal más formal y conciso. La versión española adopta «pues» por la misma razón de registro, y mantiene el mismo equilibrio entre inmediatez presente y posible sentido futuro en el verbo final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; aquí no aplica.
  - Se evita «Señor» como sustituto automático, porque el versículo no contiene el nombre divino.
  - Se conserva un tono bíblico contemporáneo, con causalidad breve y clara.
  - La nota de pie mantiene la tensión interpretativa del imperfecto hebreo, sin cerrar la posibilidad futura.
