review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del versículo y mantiene correctamente ''Yahvé'', ''tu Dios'', ''la tierra'', ''muchas naciones'' y la lista de pueblos. Sin embargo, hay un desajuste importante: la cláusula אֲשֶׁר אַתָּה בָא שָׁמָּה לְרִשְׁתָּהּ significa ''a la cual entras para poseerla'' o ''que estás entrando para poseer'', no ''que vas a poseer''. El borrador fusiona indebidamente la entrada con la posesión y omite el matiz explícito de entrar. Además, la nota [a] quedó anclada en ''poseer'' pero su contenido corresponde a וְנָשַׁל (''expulse/desposea'') y debe anclarse en el verbo de expulsar, no en la posesión de la tierra.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'te introduzca' suena algo menos natural que 'te haga entrar en' o 'te lleve a entrar en' en este contexto. También conviene corregir la puntuación para que la aposición de las siete naciones fluya mejor. Los etnónimos son legibles, aunque 'gergeseos' probablemente refleja tradición textual española más que el hebreo 'girgaseos'; no es un problema grave, pero 'girgaseos' se alinea mejor con Girgashite.
  glossary_alignment: 'Buena alineación con el glosario en ''Yahvé'' para יְהוָה y ''Dios'' para אֱלֹהֶיךָ. No hay conflictos doctrinales. La principal corrección es lexical y sintáctica: respetar por separado בָא שָׁמָּה (''entras allí'') y לְרִשְׁתָּהּ (''para poseerla''). La nota alternativa de וְנָשַׁל debe acompañar ''expulse'' o equivalente.'
  issues:
  - severity: high
    issue: La relativa 'que vas a poseer[a]' no representa fielmente אֲשֶׁר אַתָּה בָא שָׁמָּה לְרִשְׁתָּהּ.
    rationale: 'El hebreo contiene dos ideas: entrar en la tierra y poseerla. El borrador elimina el componente explícito de entrada y lo sustituye por posesión solamente.'
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota 'O desposea de delante de ti a muchas naciones' corresponde a וְנָשַׁל ('expulse/desposea'), no a 'poseer' de לְרִשְׁתָּהּ.
  - severity: medium
    issue: '''Te introduzca'' es menos natural en español bíblico actual que ''te haga entrar en''.'
    rationale: Aunque semánticamente posible, 'te haga entrar en la tierra' refleja mejor el causativo hebreo y suena más idiomático en este registro.
  - severity: low
    issue: Posible mejora del etnónimo 'gergeseos' a 'girgaseos'.
    rationale: '''Girgaseos'' reproduce con más cercanía el hebreo גִּרְגָּשִׁי y el inglés auditado ''Girgashites''. No es una cuestión doctrinal ni grave.'
  revised_spanish_text: Cuando Yahvé tu Dios te haga entrar en la tierra a la que vas para poseerla, y expulse[a] de delante de ti a muchas naciones —los hititas, los girgaseos, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos—, siete naciones más numerosas y más poderosas que tú[b],
  revised_footnotes:
  - marker: a
    text: O 'desposea de delante de ti a muchas naciones'.
    reason: lexical_alternative
  - marker: b
    text: O 'más numerosas y más fuertes que tú'.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula relativa para preservar explícitamente el sentido de 'entrar' más 'poseerla', se reubica la nota [a] al verbo que realmente traduce וְנָשַׁל, y se mejora la naturalidad española con 'te haga entrar en'. También se ajusta 'girgaseos' para alinearlo mejor con el hebreo y la audit trail inglesa.
