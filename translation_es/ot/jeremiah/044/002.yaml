translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Ustedes mismos han visto toda la desgracia que yo traje sobre Jerusalén y sobre todas las ciudades de Judá. Y he aquí, han quedado en ruinas[b] en este día, y no hay quien habite en ellas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de las huestes'; hebreo צְבָאוֹת aquí designa al Dios soberano de los ejércitos celestiales y terrenales.
    reason: lexical_alternative
  - marker: b
    text: O 'son una ruina en este día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se translitera en la tradición POB como Yahweh; en español, la forma equivalente y reverente es Yahvé. Se evita la sustitución por un título impersonal, para conservar el nombre propio del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: La expresión fija יְהוָה צְבָאוֹת se entiende bien en español como 'Yahvé de los ejércitos'. 'Ejércitos' conserva la amplitud semántica de 'hosts' sin estrecharla innecesariamente.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es un sintagma posesivo directo; 'el Dios de Israel' reproduce con claridad la relación del pacto sin añadir matices no presentes en el hebreo.
- source_word: אַתֶּם
  english_pob_choice: You yourselves
  chosen_spanish: Ustedes mismos
  alternatives_spanish:
  - Ustedes
  lexicon: HALOT
  rationale: El pronombre explícito da énfasis. 'Ustedes mismos' conserva esa fuerza enfática de manera natural en español.
- source_word: רְאִיתֶם
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: El perfecto en español expresa una experiencia pasada con relevancia presente, acorde con el sentido del hebreo y con el contexto exhortativo.
- source_word: כָּל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: toda la desgracia
  alternatives_spanish:
  - todo el mal
  - toda la calamidad
  lexicon: HALOT
  rationale: Aquí רָעָה no significa mal moral, sino desastre/jucio devastador. 'Desgracia' comunica la calamidad sufrida por Jerusalén y Judá sin sugerir que Dios haga el mal moral.
- source_word: הֵבֵאתִי עַל
  english_pob_choice: I brought on
  chosen_spanish: yo traje sobre
  alternatives_spanish:
  - yo traje encima de
  - yo traje sobre
  lexicon: HALOT
  rationale: '''Traje sobre'' sigue de cerca la construcción causativa con עַל y conserva la idea de juicio que recae sobre las ciudades.'
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las urbes de Judá
  - los poblados de Judá
  lexicon: HALOT
  rationale: '''Ciudades de Judá'' es la correspondencia directa y suficientemente amplia para עָרֵי יְהוּדָה.'
- source_word: וְהִנָּם
  english_pob_choice: And behold, they
  chosen_spanish: Y he aquí, ellas
  alternatives_spanish:
  - Y he aquí, están
  - Y miren, ellas
  lexicon: HALOT
  rationale: '''He aquí'' mantiene la fuerza deíctica y el registro bíblico sin caer en una calca rígida; el referente plural se expresa con ''ellas'' por concordancia con Jerusalén y las ciudades.'
- source_word: חָרְבָּה
  english_pob_choice: are a ruin
  chosen_spanish: son una ruina
  alternatives_spanish:
  - están en ruinas
  - están desoladas
  lexicon: HALOT
  rationale: El sustantivo verbal expresa el estado de ruina/desolación. 'Son una ruina' preserva la fuerza nominal y funciona bien con el plural referente colectivo.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - hasta hoy
  lexicon: HALOT
  rationale: '''Hoy'' es la forma natural y compacta en español para el demostrativo temporal del hebreo, sin añadir duración no explícita.'
- source_word: וְאֵין בָּהֶם יוֹשֵׁב
  english_pob_choice: and there is no one living in them
  chosen_spanish: y no hay en ellas habitante
  alternatives_spanish:
  - y no hay quien habite en ellas
  - y no hay morador en ellas
  lexicon: HALOT
  rationale: La construcción hebrea niega la presencia de un habitante. 'No hay en ellas habitante' conserva el paralelismo y la sobriedad del original; 'morador' sería posible, pero más literario que necesario.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio divino en español como Yahvé, coherente con el enfoque POB y con la decisión auditada de no mascarar el tetragrama con un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH'
- issue: Sentido de רָעָה en contexto de juicio
  english_pob_reading: all the disaster
  chosen_spanish_reading: toda la desgracia
  alternative_spanish_readings:
  - todo el mal
  - toda la calamidad
  rationale: La referencia es al juicio devastador llevado por Yahvé, no a maldad moral. 'Desgracia' evita atribuir mal moral a Dios y conserva la noción de calamidad histórica.
  doctrine_reference: Uso contextual de רָעָה en textos de juicio
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'look' a 'behold' para adecuar el registro. En español se optó por 'he aquí', que conserva mejor la solemnidad y la función deíctica del hebreo y del texto inglés final. También se mantuvo la elección semántica de רָעָה como calamidad/desgracia, no como mal moral.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יְהוָה, conforme al estándar POB.
  - 'Se traduce צְבָאוֹת con una construcción nominal natural en español: ''de los ejércitos''.'
  - Se conserva el plural referencial 'ellas' para Jerusalén y las ciudades de Judá, evitando singularizar indebidamente el hebreo colectivo.
  - Se mantiene el registro profético formal sin arcaísmos excesivos, con 'he aquí' como equivalente deíctico de וְהִנָּם.
  - No se usa 'SEÑOR' como sustituto del nombre divino.
