translation:
  language: es
  text: Tú los harás como un horno de fuego en el tiempo de tu presencia; Yahvé, en su enojo, los tragará[a], y el fuego los consumirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al tiempo de tu aparición»; literalmente, «al tiempo de tu rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשִׁיתֵמוֹ
  english_pob_choice: You will make them
  chosen_spanish: Tú los harás
  alternatives_spanish:
  - Tú los pondrás
  - Tú los colocarás
  lexicon: HALOT
  rationale: שׁית puede significar poner, colocar o hacer. En este contexto, con la comparación siguiente, «los harás» comunica mejor el resultado producido sobre ellos que una mera colocación.
- source_word: כְּתַנּוּר אֵשׁ
  english_pob_choice: like a fiery furnace
  chosen_spanish: como horno de fuego
  alternatives_spanish:
  - como un horno ardiente
  - como un horno de fuego
  lexicon: HALOT
  rationale: תנור designa un horno/hogar/furnace. En español, «horno de fuego» conserva la imagen intensa y sigue de cerca la construcción hebrea sin sonar forzado.
- source_word: לְעֵת פָּנֶיךָ
  english_pob_choice: at the time of your presence
  chosen_spanish: en el tiempo de tu presencia
  alternatives_spanish:
  - al tiempo de tu aparición
  - cuando te hagas presente
  - en el tiempo de tu faz
  lexicon: HALOT
  rationale: פָּנִים literalmente es «rostro», pero aquí expresa presencia o manifestación. «Tu presencia» mantiene el sentido natural en español y conserva la fuerza temporal de לְעֵת.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino conforme a la norma del proyecto para יְהוָה. «Yahvé» es la forma establecida en el texto principal español, evitando la sustitución por un título.
- source_word: בְּאַפּוֹ
  english_pob_choice: in his anger
  chosen_spanish: en su enojo
  alternatives_spanish:
  - en su ira
  - con su enojo
  lexicon: HALOT
  rationale: אַף literalmente es «nariz/nostril», pero idiomáticamente significa enojo. «En su enojo» comunica el sentido idiomático de manera clara y sobria en español.
- source_word: יְבַלְּעֵם
  english_pob_choice: will swallow them up
  chosen_spanish: los tragará
  alternatives_spanish:
  - los engullirá
  - los absorberá
  lexicon: HALOT
  rationale: בלע significa «tragar/engullir». «Los tragará» preserva el verbo vivo y directo del hebreo, y en español expresa bien la imagen de destrucción.
- source_word: וְתֹאכְלֵם אֵשׁ
  english_pob_choice: and fire will consume them
  chosen_spanish: y el fuego los consumirá
  alternatives_spanish:
  - y el fuego los devorará
  - y el fuego los comerá
  lexicon: HALOT
  rationale: El verbo con אשׁ expresa la acción destructiva del fuego. «Consumirá» es natural en español y mantiene la fuerza de la imagen sin literalismo incómodo.
theological_decisions:
- issue: Expresión antropomórfica en לְעֵת פָּנֶיךָ
  english_pob_reading: at the time of your presence
  chosen_spanish_reading: en el tiempo de tu presencia
  alternative_spanish_readings:
  - al tiempo de tu aparición
  - cuando te hagas presente
  rationale: La frase hebrea usa «rostro» para hablar de la presencia manifiesta de Dios. «Tu presencia» conserva la referencia a la manifestación divina sin convertirla en una formulación técnica más precisa de lo que el texto exige.
  doctrine_reference: Translation philosophy §3
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton con el nombre divino transliterado, no con una sustitución reverencial. Esto preserva la identidad personal del Dios del pacto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra acuerdo alto y ninguna revisión aplicada. La redacción española sigue de cerca las decisiones léxicas principales: שׁית como «hacer», תנור אֵשׁ como «horno de fuego», פָּנִים como «presencia», YHWH como «Yahvé», בְּאַפּוֹ como «en su enojo», בלע como «tragar», y אֵשׁ como «el fuego».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se usó «presencia» para פָּנִים, evitando calcar «rostro» en el texto principal y reservando la alternativa en nota.
  - «Enojo» se prefirió a «ira» por ser idiomático y suficientemente fuerte en este contexto poético.
  - 'La estructura del verso conserva el paralelismo y la progresión de imagen: horno, presencia, enojo, tragar, consumir.'
