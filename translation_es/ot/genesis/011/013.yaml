translation:
  language: es
  text: Arpacsad vivió 403 años después de haber engendrado a Selaj[a], y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Arpacsad vivió, después de haber engendrado a Selaj, 403 años, y engendró hijos e hijas».'
    reason: Orden alternativo más cercano a la sintaxis hebrea y al historial de traducción inglés.
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En las fórmulas genealógicas, חיה expresa la duración de la vida. «Vivió» es natural en español y conserva el sentido de vida continuada.
- source_word: אַרְפַּכְשַׁד
  english_pob_choice: Arpachshad
  chosen_spanish: Arpaxsad
  alternatives_spanish:
  - Arfaxad
  - Arpacsad
  lexicon: Transliteración directa del hebreo
  rationale: Se sigue más de cerca la forma hebrea y la decisión POB de preferir una transliteración transparente frente a la forma tradicional greco-latina.
- source_word: אַֽחֲרֵי הוֹלִידוֹ
  english_pob_choice: after he fathered
  chosen_spanish: después de haber engendrado a
  alternatives_spanish:
  - después de que engendrara a
  - tras engendrar a
  lexicon: HALOT
  rationale: La construcción temporal indica posterioridad al acto de engendrar. «Engendrado» preserva el valor genealógico y el matiz masculino del verbo, sin sonar forzado en español.
- source_word: אֶת שֶׁלַח
  english_pob_choice: Shelah
  chosen_spanish: Selaj
  alternatives_spanish:
  - Sela
  - Shelaj
  lexicon: Transliteración directa del hebreo
  rationale: El nombre se translitera desde el hebreo con la consonante final gutural representada de manera cercana en español como «j». Se evita la forma tradicional inglesa/española si no refleja bien la forma hebrea.
- source_word: שָׁלֹשׁ שָׁנִים וְאַרְבַּע מֵאוֹת שָׁנָה
  english_pob_choice: 403 years
  chosen_spanish: 403 años
  alternatives_spanish:
  - cuatrocientos tres años
  - tres años y cuatrocientos años
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «tres años y cuatrocientos años», es decir, 403. La cifra en numerales es clara y fiel al valor total.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: En este contexto genealógico, ילד en hifil se refiere al acto de engendrar. «Engendró» conserva esa precisión y evita una formulación más débil.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - descendientes
  lexicon: HALOT
  rationale: El hebreo especifica ambos sexos de la descendencia. «Hijos e hijas» lo comunica con naturalidad en español y mantiene la distinción explícita.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal. La redacción mantiene la equivalencia óptima del POB inglés, incluyendo el orden natural español y la cifra exacta de 403 años.
  spanish_consistency_notes:
  - Se mantiene la transliteración hebrea directa de nombres propios para mayor transparencia.
  - Se conserva «engendró» en ambos casos para reflejar el paralelismo genealógico del hebreo.
  - La nota [a] ofrece la alternativa de orden sintáctico que el inglés POB documentó como lectura posible.
