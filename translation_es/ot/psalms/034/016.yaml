revisions:
- from: Los ojos de Yahvé están hacia los justos[a], y sus oídos hacia su clamor por ayuda.
  to: Los ojos de Yahvé están vueltos hacia los justos[a], y sus oídos hacia su clamor de auxilio.
  rationale: Se corrige un calco poco natural ('están hacia') con una formulación más idiomática que aún preserva la orientación expresada por אֶל y mantiene la imagen antropomórfica. También se mejora la naturalidad de la frase final y se ajusta la nota para reflejar mejor el matiz de angustia del término hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:08:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura básica del hebreo: mantiene ''ojos'' y ''oídos'' de manera literal, usa ''Yahvé'' para יְהוָה y refleja שַׁוְעָתָם como un clamor de auxilio. Sin embargo, ''están hacia'' suena poco natural en español para el valor relacional de אֶל y debilita la legibilidad sin aportar mayor fidelidad. Además, el posesivo en singular ''su clamor'' puede entenderse colectivamente, pero ''su'' resulta algo ambiguo en español; ''su clamor de auxilio'' funciona, aunque el giro completo conviene pulirse.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero ''Los ojos de Yahvé están hacia los justos'' es un calco poco idiomático. En español bíblico natural, ''están sobre'' o simplemente omitir el verbo sería mejor; dado el hebreo אֶל y la decisión inglesa ''toward'', ''están sobre'' sería demasiado interpretativo, mientras que ''miran hacia'' añadiría un verbo no expreso. Una solución fiel y legible es ''Los ojos de Yahvé están puestos en los justos'', pero eso también interpreta. La opción más equilibrada es ''Los ojos de Yahvé están atentos a los justos'' si se privilegiara naturalidad, pero perdería la imagen concreta documentada. Por eso conviene una reparación mínima pero más natural: ''Los ojos de Yahvé están vueltos hacia los justos''. También es preferible ''clamor de auxilio'' frente a ''clamor por ayuda'' por fluidez e idiomaticidad eclesial.'
  glossary_alignment: 'Alineación buena en términos del proyecto: יְהוָה → ''Yahvé'' correctamente; lenguaje antropomórfico preservado; no hay conflictos con terminología doctrinal mayor. ''Los justos'' encaja bien para צַדִּיקִים. La nota léxica debe ajustarse al nuevo giro si se revisa el sustantivo final.'
  issues:
  - severity: medium
    issue: '''están hacia'' es un calco poco natural en español'
    rationale: Aunque intenta reflejar אֶל de forma cercana, el resultado suena forzado y reduce la calidad del español. Debe mejorarse sin borrar la orientación relacional del hebreo ni reinterpretar excesivamente la imagen.
  - severity: low
    issue: '''su clamor por ayuda'' es comprensible pero menos idiomático que ''su clamor de auxilio'''
    rationale: El hebreo denota un clamor surgido de angustia. 'De auxilio' suena más natural y preciso en español eclesial general.
  - severity: low
    issue: La nota alternativa usa 'plegaria'
    rationale: '''Plegaria'' puede sonar un poco más culta y menos ligada a un grito de angustia que el hebreo שַׁוְעָה. Una alternativa como ''súplica de auxilio'' refleja mejor el campo semántico.'
  revised_spanish_text: Los ojos de Yahvé están vueltos hacia los justos[a], y sus oídos hacia su clamor de auxilio.
  revised_footnotes:
  - marker: a
    text: O 'su súplica de auxilio'. El término hebreo se refiere a un clamor que brota de la angustia.
    reason: lexical_alternative
  revision_rationale: Se corrige un calco poco natural ('están hacia') con una formulación más idiomática que aún preserva la orientación expresada por אֶל y mantiene la imagen antropomórfica. También se mejora la naturalidad de la frase final y se ajusta la nota para reflejar mejor el matiz de angustia del término hebreo.
