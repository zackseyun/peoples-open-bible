translation:
  language: es
  text: 'Y sucedió que, después de haberlo sepultado, dijo a sus hijos: «Cuando yo muera, sepúltenme en el sepulcro donde está sepultado el hombre de Dios; pongan mis huesos junto a sus huesos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: Conserva la apertura narrativa del wayyiqtol sin sonar arcaico; en español, «sucedió que» reproduce bien la fórmula de relato.
- source_word: אַחֲרֵי קָבְרוֹ אֹתוֹ
  english_pob_choice: after he had buried him
  chosen_spanish: después de haberlo sepultado
  alternatives_spanish:
  - después de sepultarlo
  - después de que lo sepultó
  lexicon: HALOT
  rationale: La relación temporal anterior al discurso se expresa de forma natural con infinitivo compuesto; «sepultado» mantiene el tono funerario del pasaje.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos / a sus hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos», el contexto patriarcal permite traducir de manera amplia sin perder el referente familiar; se evita añadir «varones» porque el español ya puede entenderlo por contexto, pero se deja constancia de la especificidad posible del hebreo.
- source_word: בְּמוֹתִי
  english_pob_choice: When I die
  chosen_spanish: Cuando yo muera
  alternatives_spanish:
  - Al morir yo
  - Cuando muera
  lexicon: HALOT
  rationale: Expresa con naturalidad la referencia futura y personal del hebreo; se mantiene el pronombre para la primera persona enfática implícita.
- source_word: וּקְבַרְתֶּם אֹתִי
  english_pob_choice: bury me
  chosen_spanish: sepúltenme
  alternatives_spanish:
  - y entiérrenme
  - entérrenme
  lexicon: HALOT
  rationale: El imperativo plural con valor de instrucción se conserva en español; «sepultar» sostiene el registro reverente del contexto funerario mejor que «enterrar».
- source_word: בַּקֶּבֶר
  english_pob_choice: in the tomb
  chosen_spanish: en el sepulcro
  alternatives_spanish:
  - en la tumba
  - en el sepulcro funerario
  lexicon: HALOT
  rationale: «Sepulcro» es adecuado para una sepultura concreta compartida, más precisa que «tumba» en este contexto narrativo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  lexicon: HALOT
  rationale: Se mantiene el título bíblico tradicional y directo sin reinterpretarlo como «profeta»; «hombre de Dios» es transparente y fiel al hebreo.
- source_word: קָבוּר בּוֹ
  english_pob_choice: is buried
  chosen_spanish: está sepultado
  alternatives_spanish:
  - está enterrado
  - está allí sepultado
  lexicon: HALOT
  rationale: El participio pasivo describe un estado presente; «está sepultado» conserva la imagen de entierro y armoniza con el léxico del versículo.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto al
  lexicon: HALOT
  rationale: «Junto a» es la preposición más natural y precisa para proximidad inmediata entre los huesos.
- source_word: עַצְמֹתָיו ... עַצְמֹתָי
  english_pob_choice: his bones ... my bones
  chosen_spanish: los huesos de él ... mis huesos
  alternatives_spanish:
  - sus huesos ... mis huesos
  - los huesos suyos ... mis huesos
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «huesos», importante para la imaginería sepulcral y la conexión narrativa posterior; «de él» evita ambigüedad pronominal en español.
- source_word: הַנִּיחוּ
  english_pob_choice: lay
  chosen_spanish: pongan
  alternatives_spanish:
  - dejen
  - coloquen
  lexicon: HALOT
  rationale: La orden final pide una acción física concreta; «pongan» comunica bien el matiz de colocar los huesos junto a otros restos.
theological_decisions:
- issue: Tratamiento del título הָאֱלֹהִים
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el varón de Dios
  - el profeta de Dios
  rationale: Se conserva el título hebreo tradicional sin especificarlo como «profeta», porque el texto no lo dice aquí y la POB inglesa mantiene la forma directa.
  doctrine_reference: Neutral, lexically faithful title usage
- issue: Sepulcro único con huesos de dos personas
  english_pob_reading: in the tomb where the man of God is buried; lay my bones beside his bones
  chosen_spanish_reading: en el sepulcro donde está sepultado el hombre de Dios; pongan mis huesos junto a los huesos de él
  alternative_spanish_readings:
  - en la tumba donde está enterrado el hombre de Dios; coloquen mis huesos al lado de los suyos
  rationale: La escena presupone una sepultura compartida o reutilizada; «sepulcro» y «huesos» preservan la tensión narrativa y funeraria sin suavizarla.
  doctrine_reference: Narrative burial practice; no doctrinal claim beyond the text
translation_notes:
  revision_awareness: The English POB audit trail is internally consistent and shows no applied revisions; the Spanish draft follows the same source-grounded decisions without introducing new textual or theological moves.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - «Sepultar/sepulcro» se usa de manera coherente para el campo funerario del versículo.
  - Se conserva la concreción de «huesos» porque el hebreo la repite y es relevante para la escena.
  - No se introducen notas al pie porque el versículo no presenta una alternativa textual o semántica que el texto español deba marcar explícitamente.
