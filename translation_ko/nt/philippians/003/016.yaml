id: PHP.3.16
reference: Philippians 3:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πλὴν εἰς ὃ ἐφθάσαμεν, τῷ αὐτῷ ⸀στοιχεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/016.yaml
  text: Only[a], let us keep in step with what we have attained.
  footnotes:
  - marker: a
    text: 'Or: “let us walk by the same rule” / “let us keep to the same standard.”'
    reason: alternative_reading
translation:
  language: ko
  text: 다만[a], 우리가 이미 이른 그 자리에서 같은 보조로 걸어갑시다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「같은 규례를 따라 행합시다」 또는 「같은 표준을 지킵시다」. 일부 사본은 「같은 규례를 따라 같은 마음을 품으며」와 같이 확장한다. SBLGNT의 짧은 본문은 표준을 명시하지 않으므로, 본 번역도 「규례」를 본문에 보충하지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: πλήν
  english_pob_choice: Only
  chosen_korean: 다만
  alternatives_korean:
  - 그러나
  - 어쨌든
  - 다만 한 가지
  lexicon: BDAG
  rationale: 한정·교정의 전환 표지. 「다만」이 간결하고 바울의 범위 좁힘을 자연스럽게 살린다.
- source_word: εἰς ὃ ἐφθάσαμεν
  english_pob_choice: with what we have attained
  chosen_korean: 우리가 이미 이른 그 자리에서
  alternatives_korean:
  - 우리가 도달한 곳에서
  - 우리가 이른 정도에서
  lexicon: BDAG
  rationale: ἐφθάσαμεν의 「이미 이름」(아오리스트의 현재적 결과)을 「이미 이른」으로 살리고, 「그 자리에서」가 다음 동사 「같은 보조로 걸어가다」와 자연스럽게 결합한다.
- source_word: ἐφθάσαμεν
  english_pob_choice: we have attained
  chosen_korean: 이미 이른
  alternatives_korean:
  - 다다른
  - 도달한
  lexicon: BDAG
  rationale: 아오리스트가 도달된 수준을 가리킨다. 「이르다」가 합쇼체 권면 문맥에 자연스럽다.
- source_word: τῷ αὐτῷ
  english_pob_choice: with (the same)
  chosen_korean: 같은 보조로
  alternatives_korean:
  - 같은 규례를 따라
  - 같은 표준에 따라
  lexicon: BDAG
  rationale: 짧은 SBLGNT 본문은 「규례·표준」을 명시하지 않는다. στοιχεῖν과 결합하여 한국어 관용 「같은 보조로 걸어가다」로 옮기되, 명시적 명사를 본문에 보충하지 않는다.
- source_word: στοιχεῖν
  english_pob_choice: keep in step
  chosen_korean: 걸어갑시다
  alternatives_korean:
  - 보조를 맞추어 걸어갑시다
  - 발맞추어 걸어갑시다
  - 따라 살아갑시다
  lexicon: BDAG
  rationale: στοιχέω는 「대열·기준에 맞추어 걷다」의 비유. 「같은 보조로 걸어가다」가 그 비유를 한국어로 자연스럽게 살린다.
theological_decisions:
- issue: τῷ αὐτῷ에 「규례·표준」 같은 명시적 명사를 보충할 것인지
  chosen_reading: 본문에 「규례」를 보충하지 않고 관용적으로 「같은 보조로 걸어갑시다」로 옮긴다.
  alternative_readings:
  - '''같은 규례를 따라 행합시다'''
  - '''같은 표준을 지킵시다'''
  rationale: 짧은 SBLGNT 본문은 표준을 암시적으로 남긴다. 「규례」를 보충하면 후대의 사본 확장이나 전통적 영어 번역을 본문에 도입하게 된다. 권면의 핵심을 살리되 본문에 없는 명사를 더하지 않는다.
  doctrine_reference: 'Original-language primacy over translation tradition; preserve ambiguity where possible.'
