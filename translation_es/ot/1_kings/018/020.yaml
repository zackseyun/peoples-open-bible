translation:
  language: es
  text: Entonces Acab envió a todos los hijos de Israel y reunió a los profetas al monte Carmelo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos los israelitas». El hebreo dice literalmente «a todos los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió mensaje
  lexicon: HALOT
  rationale: שׁלח expresa aquí la acción de enviar. En español, «envió» reproduce con naturalidad la idea básica sin añadir explícitamente «mensaje», que el texto hebreo no dice de forma directa. «Mandó» es posible, pero puede sonar más a orden que a envío.
- source_word: בְּכָל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todos los israelitas
  - entre todos los hijos de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de Israel». Se conserva esa forma para mantener el matiz léxico y la elección del POB inglés. «Israelitas» sería una equivalencia natural, pero borra la formulación concreta del hebreo.
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  lexicon: HALOT
  rationale: קבץ significa «juntar/reunir/recoger». «Reunió» es idiomático en español y conserva el sentido de convocar o agrupar a los profetas para este encuentro.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas
  lexicon: HALOT
  rationale: נביאים se traduce de manera directa como «profetas». No hay razón contextual para alterar el término.
- source_word: אֶל הַר הַכַּרְמֶל
  english_pob_choice: to Mount Carmel
  chosen_spanish: en el monte Carmelo
  alternatives_spanish:
  - al monte Carmelo
  - al monte del Carmelo
  lexicon: HALOT
  rationale: La construcción hebrea con אֶל indica movimiento hacia el lugar; en español, «en el monte Carmelo» comunica el destino del encuentro de forma natural y breve. «Al monte Carmelo» también es válida, pero «en» encaja bien con el sentido de reunión en ese lugar. Se conserva el nombre geográfico tradicional «Carmelo».
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para eliminar «word», porque no está explícito en el hebreo; la redacción española sigue esa decisión y evita añadir «mensaje».
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para respetar la formulación literal y la política de conservar el matiz masculino-familiar cuando el hebreo lo usa.
  - Se conserva «Carmelo» como topónimo bíblico estándar en español.
  - No se introduce «SEÑOR» ni terminología teológica adicional porque este versículo no contiene el Tetragrámaton ni vocabulario doctrinal relevante.
