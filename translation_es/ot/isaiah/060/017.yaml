    issue: 'Marcador de nota inválido en el texto: ''tu[ª]'''
    rationale: El proyecto exige marcadores únicos en orden (a, b, c...) y que toda nota tenga un anclaje exacto en `spanish_text`. '[ª]' no es un marcador válido ni corresponde a ninguna nota.
  - severity: high
    issue: La cláusula final no preserva bien el paralelismo del hebreo ni la decisión auditada del POB
    rationale: '''Tu administración'' + ''tus gobernantes'' mezcla abstracción institucional con agentes personales. El hebreo y el English POB revisado presentan dos funciones de autoridad en paralelo con personificación poética.'
  - severity: medium
    issue: '''Pondré ... como'' añade una mediación interpretativa innecesaria'
    rationale: Aunque no es imposible, 'haré que ... sea ...' o 'haré ... tu ...' refleja mejor el valor predicativo de שַׂמְתִּי en esta construcción y suena más natural en español bíblico contemporáneo.
  - severity: medium
    issue: Las notas b y c no corresponden idealmente a la redacción más fiel en español
    rationale: Si se corrige a términos personales paralelos, las alternativas deben reexpresarse para explicar la posible lectura abstracta o coercitiva del hebreo sin desalinearse del texto principal.
