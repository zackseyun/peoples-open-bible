translation:
  language: es
  text: Que sepan[a] que esta es tu mano; tú, Yahvé, la has hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y que sepan» o «Que sepan» con sentido de deseo: «Que lleguen a saber»; el verbo hebreo puede tener valor jussivo en contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵדְעוּ
  english_pob_choice: Let them know
  chosen_spanish: Que sepan
  alternatives_spanish:
  - Y que sepan
  - Permite que sepan
  - Ojalá sepan
  lexicon: HALOT
  rationale: El hebreo imperfecto con וְ funciona en contexto con sentido jussivo/optativo. En español, «Que sepan» comunica bien la petición o deseo sin volverlo una simple afirmación futura.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben saber; «que» es la forma natural y fiel en español.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu acción
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo para mantener la imagen de la agencia divina, sin explicitarla como «poder» o «acción».
- source_word: זֹּאת
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta cosa
  - este acto
  lexicon: HALOT
  rationale: El demostrativo femenino singular apunta a la intervención mencionada; «esta» permite dejar abierta la referencia inmediata y mantener la conexión con la cláusula siguiente.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - y tú
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; en español se conserva con la anteposición enfática «tú» antes del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La directriz del proyecto pide rendir el Tetragrámaton como «Yahvé» en español. Mantiene el nombre propio divino sin sustituirlo por un título.
- source_word: עֲשִׂיתָהּ
  english_pob_choice: have done it
  chosen_spanish: lo has hecho
  alternatives_spanish:
  - lo has realizado
  - lo has hecho tú
  lexicon: HALOT
  rationale: El sufijo femenino remite al acto/intervención aludido por el demostrativo. «Lo has hecho» es idiomático en español y conserva la acción divina sin restringirla a «hacer» en sentido creativo.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; la política del proyecto exige preservarlo como nombre propio en español. «Yahvé» evita la sustitución por un título y conserva la identidad pactual del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza volitiva de וְיֵדְעוּ
  english_pob_reading: Let them know / May they know / And let them know
  chosen_spanish_reading: Que sepan
  alternative_spanish_readings:
  - Y que sepan
  - Ojalá sepan
  rationale: El contexto pide un valor jussivo u optativo, no un futuro meramente descriptivo. «Que sepan» refleja esa fuerza de deseo/petición de forma natural en español.
  doctrine_reference: HALOT; lectura contextual del imperfecto jussivo
translation_notes:
  revision_awareness: 'El pasaje presenta acuerdo alto con el audit trail inglés: se mantuvieron la fuerza jussiva de וְיֵדְעוּ, la metáfora de «mano», el referente implícito de זֹּאת y la preservación del nombre divino como «Yahvé». No se observaron revisiones posteriores que exigieran cambios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en todo el proyecto.
  - Se preserva la metáfora «mano» en vez de explicarla como «poder» para no perder la imagen hebrea.
  - Se usa «lo has hecho» para reflejar el verbo genérico עשה sin añadir matices no garantizados por el texto.
