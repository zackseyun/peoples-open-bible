  from: above the image
  to: on top of the image
  rationale: The Syriac phrase 'l'l mn ṣlm'' can mean 'above' or 'on top of.' Given
    that this describes the fifth face of a single statue, 'on top of the image' or
    'at the summit of the image' provides a clearer physical description than 'above,'
    which could imply hovering or being detached.
- timestamp: '2026-04-28T07:48:00Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/064/003.job-75715.json
  category: lexical
  from: as though in opposition to
  to: as a rival to
  rationale: The Syriac word 'ḥrwy'' is a noun meaning 'rival' or 'adversary.' Translating
    it as 'as a rival to' or 'as an adversary of' captures the idolatrous affront
    more directly and accurately than the slightly abstract 'as though in opposition
    to.'
