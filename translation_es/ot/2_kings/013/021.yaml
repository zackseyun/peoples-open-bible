base_translation:
  language: en
  yaml_path: translation/ot/2_kings/013/021.yaml
  text: And it happened[a], as they were burying a man, that behold, they saw the raiding band; so they threw the man into Elisha’s grave. And when the man touched Elisha’s bones[c][b], he came to life and stood up on his feet.
  footnotes:
  - marker: a
    text: Or 'the marauding band' or 'the troop.' The Hebrew refers to a hostile raiding group.
    reason: lexical_alternative
  - marker: b
    text: Or 'tomb.' The Hebrew word can refer broadly to a grave or burial place.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'and the man went and touched Elisha’s bones,' likely describing the body's movement within the grave before contact.
    reason: cultural_note
