    text: 'O: «Mírenme y hagan lo mismo».'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y del POB inglés, pero se corrige «voy» a «llegue» para reflejar mejor בָא en contexto, se reemplaza «al extremo» por «al borde» por naturalidad y fidelidad, y se suaviza «Y miren:» a «Miren,» para representar וְהִנֵּה sin repetición torpe. La nota existente sigue siendo válida y está correctamente anclada.
