review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador refleja bien el hebreo y el rastro de auditoría inglés: יָלַד = «engendró», הֵחֵל לִהְיוֹת = «comenzó a ser», גִּבּוֹר = «un hombre poderoso», y אֶרֶץ = «tierra» con alternativas en nota. Sin embargo, el texto español introduce erróneamente «Yahvé» al inicio, que no existe en la fuente hebrea ni en el inglés POB. Además, las notas c y d están intercambiadas respecto de sus anclajes y de los sentidos documentados para אֶרֶץ.'
  spanish_quality_summary: El español es legible y digno. «Cush engendró a Nimrod; él comenzó a ser un hombre poderoso en la tierra» suena natural, aunque conviene añadir la conjunción inicial «Y» para reflejar וְ. El principal problema de calidad es la intrusión de «Yahvé», que vuelve la frase incorrecta e ininteligible. También debe corregirse la correspondencia de marcadores de nota para evitar confusión.
  glossary_alignment: No aparece terminología teológica sensible salvo el error grave de insertar «Yahvé», contrario tanto a la fuente como al uso contextual. Fuera de eso, «Nimrod», «engendró», «hombre poderoso» y «tierra» se alinean bien con las decisiones léxicas del proyecto y con las alternativas preservadas en notas.
  issues:
  - severity: high
    issue: Se añadió «Yahvé» al inicio del texto español.
    rationale: El hebreo comienza con וְכּוּשׁ, «Y Cush», no con el nombre divino. Esta inserción altera el sentido fuente y produce una lectura falsa.
  - severity: medium
    issue: Falta la conjunción inicial «Y».
    rationale: 'La וְ conjuntiva sí está en la fuente y en el inglés POB («And Cush»). En una genealogía conviene conservarla en español: «Y Cush…».'
  - severity: medium
    issue: Los marcadores de notas c y d están mal asignados.
    rationale: La nota sobre «país/land» corresponde al término «tierra», mientras que la nota «sobre la tierra» corresponde a una alternativa preposicional. En el borrador, c está anclada a «Yahvé» y d a «tierra», lo cual desordena la evidencia y la legibilidad editorial.
  revised_spanish_text: Y Cush engendró a Nimrod; él comenzó a ser un hombre poderoso[a][b] en la tierra[c].
  revised_footnotes:
  - marker: a
    text: 'También: «un poderoso».'
    reason: lexical_alternative
  - marker: b
    text: «Poderoso» puede entenderse también como «héroe» o «guerrero», según la amplitud con que se tome גִּבּוֹר aquí.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en el país» o «sobre la tierra». El hebreo אֶרֶץ puede significar «tierra» o «país», y la preposición puede expresarse de forma más idiomática como «sobre» en español.'
    reason: lexical_alternative
