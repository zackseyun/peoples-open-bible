review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca las decisiones del POB en cuanto a pluralidad de ‘tiendas’, el matiz de ‘pabellón real’, la ubicación ‘entre los mares’ y el desenlace ‘llegará a su fin’. También preserva correctamente la ambigüedad del referente del rey. Sin embargo, hay un desajuste importante en la colocación de las notas: en el inglés POB la nota [a] corresponde a ‘his royal pavilion’ (אַפַּדְנוֹ), mientras que la nota [b] corresponde al sintagma ‘beautiful/glorious holy mountain’ (צְבִי קֹדֶשׁ). El borrador español invierte esos anclajes, de modo que las notas no explican las palabras correctas del texto.'
  spanish_quality_summary: El español es claro, natural y digno. ‘las tiendas de su pabellón real’ suena bien y comunica la idea de un complejo real de tiendas. ‘Clavará’ es comprensible, pero ‘plantará’ o ‘instalará’ sería algo más neutro panhispánicamente; aun así, no exige rechazo. La corrección necesaria es principalmente editorial y de fidelidad al aparato de notas. El resto del verso lee con fluidez.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas clave siguen adecuadamente el expediente inglés: אַפַּדְנוֹ -> ‘pabellón real’; צְבִי -> ‘hermoso’ con alternativa ‘glorioso’; וּבָא עַד קִצּוֹ -> ‘llegará a su fin’. Conviene mantener las alternativas en las notas, pero ancladas a las expresiones correctas.'
  issues:
  - severity: high
    issue: Las notas [a] y [b] están ancladas a los lugares equivocados en el texto español.
    rationale: La nota [a] documenta alternativas para אַפַּדְנוֹ (‘su palacio’, ‘su tienda palaciega’, ‘su pabellón’), por lo que debe ir con ‘su pabellón real’. La nota [b] documenta la alternativa ‘el glorioso monte santo’ para לְהַר צְבִי קֹדֶשׁ, por lo que debe ir con ‘el hermoso monte santo’. Tal como está, el aparato crítico deja de corresponder al original y al audit trail.
  - severity: low
    issue: ‘Clavará’ puede sonar algo más marcado regionalmente que una opción más neutra.
    rationale: Aunque es defendible con tiendas, ‘plantará’ o ‘instalará’ sería más ampliamente neutral. No obstante, no afecta de forma seria la fidelidad y no requiere cambio obligatorio en esta revisión.
  revised_spanish_text: Clavará las tiendas de su pabellón real[a] entre los mares y el hermoso monte santo[b]; pero llegará a su fin, y no habrá quien lo ayude.
  revised_footnotes:
