translation:
  text: Then[a], when what had been written by King Artaxerxes was read, Rathymus and Samellius the scribe, and those aligned with them[b], hurried up to Jerusalem with horsemen and a battle formation of a crowd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek names: ''Rathymus'' and ''Samellius''; the Hebrew parallel identifies these figures with Rehum and Shimshai.'
    reason: alternative_reading
  - marker: b
    text: Or 'with cavalry and a multitude drawn up in battle order.' The Greek phrase is compressed and may describe an armed escort or forceful detachment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνωσθέντων
  chosen: when ... was read
  alternatives:
  - after ... was read
  - when ... had been read aloud
  lexicon: BDAG
  rationale: Aorist passive participle in a genitive absolute; English temporal clause best captures the construction naturally without losing the passive sense.
- source_word: τῶν παρὰ τοῦ βασιλέως Ἀρταξέρξου γραφέντων
  chosen: what King Artaxerxes had written
  alternatives:
  - the things written by King Artaxerxes
  - the letter sent from King Artaxerxes
  lexicon: BDAG
  rationale: The Greek is broader than a single technical term for 'letter' and literally refers to written things from the king. The MT parallel concerns a document sent and read, but the Greek wording is retained while rendered idiomatically.
- source_word: Ῥάθυμος
  chosen: Rathymus
  alternatives:
  - Rehum
  rationale: Personal names are transliterated from the Greek source per project philosophy. The Hebrew parallel supports identification with Rehum, but the main text follows the Greek form.
- source_word: Σαμέλλιος
  chosen: Samellius
  alternatives:
  - Shimshai
  rationale: As with Rathymus, the Greek form is transliterated in the main text. The MT parallel likely reflects Shimshai; that identification is preserved as an alternative rather than replacing the Greek witness.
- source_word: ὁ γραμματεὺς
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: BDAG
  rationale: γραμματεύς can denote an official secretary or scribe. 'The scribe' is more formally transparent and fits the administrative context.
- source_word: οἱ τούτοις συντασσόμενοι
  chosen: those aligned with them
  alternatives:
  - those joining them
  - their associates
  - those in league with them
  lexicon: BDAG
  rationale: The participle indicates people arranging themselves with or siding with these officials. 'Aligned with them' is clear modern English and preserves the sense of affiliation.
- source_word: ἀναζεύξαντες
  chosen: hurried up
  alternatives:
  - set out
  - marched up
  - went up
  lexicon: LSJ
  rationale: In context with κατὰ σπουδήν and the movement to Jerusalem, the verb conveys setting out/upward movement with urgency. 'Hurried up' captures both motion and haste without over-specifying military nuance.
- source_word: κατὰ σπουδήν
  chosen: hurried
  alternatives:
  - with haste
  - quickly
  lexicon: BDAG
  rationale: This phrase explicitly marks urgency. It is folded into the verbal expression in English for natural style.
- source_word: μεθʼ ἵππου
  chosen: with horsemen
  alternatives:
  - with cavalry
  - with horses
  lexicon: LSJ
  rationale: The singular ἵππου is likely collective or idiomatic in context. 'With horsemen' best conveys an armed mounted accompaniment; 'with horses' would sound too literal and vague in English.
- source_word: ὄχλου παρατάξεως
  chosen: a battle formation of a crowd
  alternatives:
  - an arrayed multitude
  - a formation of troops
  - a mass drawn up for battle
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and unusual. ὄχλος is a crowd/multitude, while παράταξις suggests ordered battle array. The rendering preserves both elements and signals the militarized character without smoothing away the Greek's roughness.
