translation:
  language: es
  text: Y los de las casas salían apresuradamente en grupos para una súplica pública[a], porque el lugar estaba a punto de caer en desprecio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el recinto del templo; el griego dice simplemente «el lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἐκ τῶν οἰκιῶν
  english_pob_choice: those from the houses
  chosen_spanish: los que salían de las casas
  alternatives_spanish:
  - los que estaban en las casas
  - las personas de las casas
  - los de las casas
  lexicon: LSJ
  rationale: El griego presenta a personas que salen de sus viviendas. En español, «los que salían de las casas» conserva el movimiento implícito sin añadir posesivo inexistente; «de las casas» mantiene la cercanía al original.
- source_word: ἀγεληδὸν
  english_pob_choice: in groups
  chosen_spanish: en grupos
  alternatives_spanish:
  - en tropel
  - en manadas
  - en multitudes
  lexicon: LSJ
  rationale: El adverbio sugiere una salida colectiva. «En grupos» comunica esa agrupación sin introducir un matiz animalizante que sería inapropiado en español.
- source_word: ἐξεπήδων
  english_pob_choice: were rushing out
  chosen_spanish: se apresuraban
  alternatives_spanish:
  - salen con rapidez
  - iban corriendo
  - saltaban afuera
  lexicon: LSJ
  rationale: El imperfecto describe acción en curso y el verbo tiene fuerza vivaz. «Se apresuraban» reproduce la urgencia de manera natural en español, sin volver demasiado literal la imagen de “saltar”.
- source_word: ἐπὶ πανδήμῳ ἱκετείᾳ
  english_pob_choice: for a public supplication
  chosen_spanish: para una súplica pública
  alternatives_spanish:
  - para una petición pública
  - para una súplica de todo el pueblo
  - para una rogativa pública
  lexicon: LSJ
  rationale: ἱκετεία es una súplica solemne o imploración; πανδήμῳ añade el sentido de algo hecho por todo el pueblo o públicamente. «Súplica pública» conserva ambos rasgos con claridad y dignidad.
- source_word: διὰ τὸ μὴ μέλλειν
  english_pob_choice: because ... was about to
  chosen_spanish: porque ... estaba a punto de
  alternatives_spanish:
  - porque ... no iba a tardar en
  - porque ... estaba por
  lexicon: LSJ
  rationale: La construcción expresa inminencia. «Estaba a punto de» es la forma más natural en español para ese valor prospectivo.
- source_word: εἰς καταφρόνησιν ἔρχεσθαι
  english_pob_choice: to come into contempt
  chosen_spanish: caer en desprecio
  alternatives_spanish:
  - venir a ser objeto de desprecio
  - ser tratado con desprecio
  - caer en oprobio
  lexicon: LSJ
  rationale: La expresión griega indica entrar en una condición de desprecio o deshonra. «Caer en desprecio» mantiene la idea de deterioro reputacional y evita suavizarla.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el templo
  - el santuario
  - el recinto del templo
  lexicon: LSJ
  rationale: El griego dice literalmente «el lugar». En la traducción principal se conserva ese término, dejando que el contexto identifique que se trata del área del templo; esto sigue la cautela del POB inglés.
theological_decisions:
- issue: Referente de τὸν τόπον
  english_pob_reading: the place, understood contextually as the temple/sanctuary
  chosen_spanish_reading: el lugar, entendido por el contexto como el recinto del templo
  alternative_spanish_readings:
  - el templo
  - el santuario
  rationale: El texto griego no nombra explícitamente «templo» aquí, sino «lugar». Mantener «el lugar» respeta la formulación original y preserva la tensión lexical, mientras la nota aclara el referente contextual.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se ha seguido el pasaje griego de Swete 1909 y el audit trail inglés POB sin cambios textuales recientes; la versión española conserva la equivalencia óptima del inglés y la reserva lexical sobre τόπος.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda a יהוה; en este verso no aparece.
  - Se usa «súplica» para ἱκετεία, en consonancia con el registro solemne del contexto.
  - Se conserva «el lugar» en el texto principal para reflejar τόπος, con nota aclaratoria sobre el templo.
  - La elección «caer en desprecio» busca reflejar la fuerza de καταφρόνησις sin forzar un término eclesiástico posterior.
