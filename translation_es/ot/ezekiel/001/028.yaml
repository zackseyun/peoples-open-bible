base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/028.yaml
  text: Like the appearance of the rainbow that is in the cloud on a day of rain[a], so was the appearance of the brightness all around. This was the appearance of the likeness of the glory of Yahweh. When I saw it, I fell on my face[d][c][b], and I heard the voice of one speaking.
  footnotes:
  - marker: a
    text: Hebrew 'the bow'; in this context, with cloud and rain, it refers to a rainbow.
    reason: lexical_alternative
  - marker: b
    text: Or 'radiance' for 'brightness.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression is literally 'the appearance of the likeness of the glory of the LORD,' preserving multiple layers of qualification in Ezekiel's vision report.
    reason: cultural_note
  - marker: d
    text: Or 'I heard a voice speaking.' The Hebrew does not explicitly identify the speaker in this clause.
    reason: alternative_reading
