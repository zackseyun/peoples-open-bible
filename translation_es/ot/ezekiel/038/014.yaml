  text: לָ/כֵן֙ הִנָּבֵ֣א בֶן אָדָ֔ם וְ/אָמַרְתָּ֣ לְ/ג֔וֹג כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הֲ/ל֣וֹא בַּ/יּ֣וֹם הַ/ה֗וּא בְּ/שֶׁ֨בֶת עַמִּ֧/י יִשְׂרָאֵ֛ל לָ/בֶ֖טַח תֵּדָֽע־׀׃
