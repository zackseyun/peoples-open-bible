  text: תְּמ֣וֹל בּוֹאֶ֗/ךָ וְ/הַ/יּ֞וֹם אנוע/ך עִמָּ֨/נוּ֙ לָ/לֶ֔כֶת וַ/אֲנִ֣י הוֹלֵ֔ךְ עַ֥ל אֲשֶׁר אֲנִ֖י הוֹלֵ֑ךְ שׁ֣וּב וְ/הָשֵׁ֧ב אֶת אַחֶ֛י/ךָ עִמָּ֖/ךְ חֶ֥סֶד וֶ/אֱמֶֽת׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/020.yaml
  text: You came only yesterday[a], and today should I make you wander with us, while I go wherever I can go? Return, and take your brothers back with you[c][b]. May steadfast love and faithfulness be with you.
  footnotes:
  - marker: a
    text: Or, more literally, 'while I am going where I am going.' The Hebrew expression is idiomatic and conveys the uncertainty of David's flight.
    reason: lexical_alternative
  - marker: b
    text: '''Your brothers'' likely refers to Ittai''s companions or kinsmen who came with him.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'steadfast love and faithfulness,' a common expression for loyal love and reliability.
    reason: lexical_alternative
