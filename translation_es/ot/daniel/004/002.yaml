translation:
  language: es
  text: Vi un sueño[a], y me espantó; y los pensamientos en mi cama y las visiones en mi cabeza me aterraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “las reflexiones en mi cama y las visiones en mi cabeza me alarmaron”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶם
  english_pob_choice: a dream
  chosen_spanish: un sueño
  alternatives_spanish:
  - un sueño
  - el sueño
  lexicon: HALOT
  rationale: El sustantivo arameo significa “sueño”. En español, el indefinido “un sueño” reproduce bien la introducción narrativa y evita imponer una lectura más específica que la del texto.
- source_word: חֲזֵית
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - Había visto
  - Contemplé
  lexicon: HALOT
  rationale: El perfecto 1cs de חזי se expresa de forma natural y directa con “vi”, manteniendo el reporte en primera persona sin añadir matices no requeridos.
- source_word: וִידַחֲלִנַּנִי
  english_pob_choice: and it frightened me
  chosen_spanish: y me espantó
  alternatives_spanish:
  - y me dio miedo
  - y me aterrorizó
  lexicon: HALOT
  rationale: La forma causativa/resultativa de דחל pide un verbo que exprese causar miedo. “Me espantó” conserva la fuerza del verbo y suena natural en español, sin debilitarlo a un mero “me dio miedo”.
- source_word: וְהַרְהֹרִין
  english_pob_choice: and the thoughts
  chosen_spanish: y los pensamientos
  alternatives_spanish:
  - y las reflexiones
  - y las imaginaciones
  lexicon: HALOT
  rationale: El término apunta a pensamientos o reflexiones mentales. “Pensamientos” es la equivalencia más clara y estándar; “reflexiones” quedaría como alternativa válida pero menos directa.
- source_word: עַֽל מִשְׁכְּבִ֔י
  english_pob_choice: on my bed
  chosen_spanish: sobre mi cama
  alternatives_spanish:
  - en mi cama
  - mientras yacía en mi cama
  lexicon: HALOT
  rationale: La preposición עַל conserva la imagen espacial de algo ocurrido mientras estaba acostado. “Sobre mi cama” mantiene más de cerca la imagen del original, aunque “en mi cama” sería una adaptación idiomática posible.
- source_word: וְחֶזְוֵ֥י רֵאשִׁ֖י
  english_pob_choice: and the visions of my head
  chosen_spanish: y las visiones de mi cabeza
  alternatives_spanish:
  - y las visiones en mi mente
  - y las visiones de mi cabeza
  lexicon: HALOT
  rationale: El hebreo/arameo usa una expresión semítica con “cabeza” para referirse a la sede de las visiones. “De mi cabeza” preserva esa imagen textual, aunque en español suene menos idiomático que “en mi mente”.
- source_word: יְבַהֲלֻנַּנִי
  english_pob_choice: terrified me
  chosen_spanish: me aterrorizaron
  alternatives_spanish:
  - me alarmaron
  - me atemorizaron
  lexicon: HALOT
  rationale: El verbo בהל, en plural, se refiere a causar gran perturbación o terror. “Me aterrorizaron” preserva la intensidad y refleja bien el plural del sujeto (“los pensamientos” y “las visiones”).
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y el audit trail inglés. Se mantuvo la distinción entre el efecto inicial del sueño (“me espantó”) y la perturbación posterior de pensamientos/visiones (“me aterrorizaron”), como en la lectura auditada.
  spanish_consistency_notes:
  - Se conservó “sueño” y no “visión”, porque el sustantivo base es חֵלֶם.
  - Se mantuvo “cabeza” para preservar la imagen semítica de רֵאשִׁי, aunque la nota ofrece “mente” como alternativa interpretativa.
  - Se usó “me espantó” para el verbo singular y “me aterrorizaron” para el plural, reflejando la diferencia gramatical y semántica del original.
  - No se introdujo terminología teológica adicional, ya que el versículo es descriptivo y no doctrinal.
