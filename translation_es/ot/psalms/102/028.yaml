translation:
  language: es
  text: Pero tú eres el mismo[a], y tus años no tendrán fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «pero tú eres él»; un modismo que significa «eres el mismo» o «permaneces inmutable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente introduce contraste con la creación que perece en el contexto inmediato. «Pero tú» conserva ese matiz adversativo de forma natural en español.
- source_word: הוּא
  english_pob_choice: are the same
  chosen_spanish: eres el mismo
  alternatives_spanish:
  - eres él
  - permaneces igual
  - eres el mismo/a
  lexicon: HALOT
  rationale: El hebreo «tú eres él» es idiomático y expresa identidad duradera e inmutabilidad. En español, «eres el mismo» comunica ese valor sin sonar artificial.
- source_word: וּ/שְׁנוֹתֶיךָ
  english_pob_choice: and your years
  chosen_spanish: y tus años
  alternatives_spanish:
  - y tus años de vida
  - y tus días
  lexicon: HALOT
  rationale: שָׁנָה se refiere aquí a años en sentido temporal. «Tus años» mantiene el paralelismo poético y el sentido directo del hebreo.
- source_word: לֹא יִתָּמּוּ
  english_pob_choice: will not come to an end
  chosen_spanish: no tendrán fin
  alternatives_spanish:
  - no acabarán
  - no se terminarán
  - no llegarán a su fin
  lexicon: HALOT
  rationale: יִתָּמּוּ expresa ser consumidos o llegar a su término. «No tendrán fin» es una forma idiomática y fiel en español que preserva la idea de duración sin añadir matices ajenos.
theological_decisions:
- issue: La identidad divina expresada por «tú eres él» / inmovilidad de Dios
  english_pob_reading: Translated as 'you are the same'
  chosen_spanish_reading: «eres el mismo»
  alternative_spanish_readings:
  - «eres él»
  - «permanece inmutable»
  - «sigues siendo el mismo»
  rationale: El hebreo usa una fórmula elíptica e idiomática que contrasta la mutabilidad de la creación con la permanencia de Dios. «Eres el mismo» conserva esa fuerza teológica sin introducir un lenguaje filosófico más técnico que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue el sentido confirmado por la revisión más reciente: no se requirieron cambios sustanciales, y la lectura refleja el contraste poético del versículo con la creación que se desgasta.'
  spanish_consistency_notes:
  - Se mantiene «tú» en registro reverente pero directo, coherente con el tratamiento del hebreo.
  - Se evita «SEÑOR» porque aquí el texto hebreo no contiene el Tetragrámaton en este versículo; el contraste se expresa mediante el pronombre y la continuidad temporal.
  - «No tendrán fin» conserva la fuerza poética de la negación del término y suena natural para lectura pública.
