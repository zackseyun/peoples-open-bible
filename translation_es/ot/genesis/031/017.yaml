translation:
  language: es
  text: Entonces Jacob se levantó y puso a sus hijos varones y a sus esposas en los camellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre los camellos». La preposición hebrea puede traducirse de cualquiera de estas dos maneras en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El verbo קום en esta secuencia narrativa marca que Jacob se incorpora para actuar. En español, «se levantó» comunica con naturalidad ese movimiento inicial y conserva el avance narrativo sin sonar arcaico.
- source_word: וַיִּשָּׂא
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - levantó
  - cargó
  - colocó
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente puede implicar «levantar» o «cargar», aquí con על הַגְּמַלִּים el sentido idiomático es hacer que los suban a los camellos. «Puso» refleja bien la acción resultante en español corriente; «colocó» sería posible, pero menos directo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo usa el masculino plural בָּנָיו. En español, «hijos» puede abarcar a los hijos varones de manera natural y readable, y evita una explicación innecesaria en el texto principal.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus mujeres y esposas
  lexicon: HALOT
  rationale: El contexto de Jacob identifica claramente el plural como sus esposas. «Esposas» es preciso y digno en español actual.
- source_word: עַל הַגְּמַלִּים
  english_pob_choice: on the camels
  chosen_spanish: sobre los camellos
  alternatives_spanish:
  - en los camellos
  - encima de los camellos
  lexicon: HALOT
  rationale: La preposición עַל permite en este contexto una relación de superficie/ubicación. «Sobre los camellos» es la forma más natural en español; «encima de» sería más explícito pero menos sobrio. La alternativa inglesa «onto» queda absorbida por el contexto verbal sin necesidad de marcarla en el cuerpo principal.
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo masorético y con la evaluación de alta concordancia del audit trail en inglés. No se registraron revisiones textuales ni cambios de sentido que requieran notas adicionales.
  spanish_consistency_notes:
  - Se preservó el orden narrativo simple del hebreo con «Entonces… y…».
  - Se optó por «esposas» en lugar de «mujeres» para evitar ambigüedad y mantener precisión contextual.
  - «Sobre los camellos» mantiene la imagen básica del hebreo; la nota recoge la alternativa espacial reconocida por el POB en inglés.
  - No se introdujo terminología teológica ajena al versículo.
