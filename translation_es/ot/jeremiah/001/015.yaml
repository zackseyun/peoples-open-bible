  text: כִּ֣י הִנְ/נִ֣י קֹרֵ֗א לְ/כָֽל מִשְׁפְּח֛וֹת מַמְלְכ֥וֹת צָפ֖וֹנָ/ה נְאֻם יְהוָ֑ה וּ/בָ֡אוּ וְֽ/נָתְנוּ֩ אִ֨ישׁ כִּסְא֜/וֹ פֶּ֣תַח שַׁעֲרֵ֣י יְרוּשָׁלִַ֗ם וְ/עַ֤ל כָּל חוֹמֹתֶ֨י/הָ֙ סָבִ֔יב וְ/עַ֖ל כָּל עָרֵ֥י יְהוּדָֽה׀־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/001/015.yaml
  text: For behold[a], I am calling all the clans of the kingdoms of the north, declares Yahweh, and they will come, and each will set his throne at the entrance of the gates of Jerusalem, against all her walls all around[b], and against all the cities of Judah.
  footnotes:
  - marker: a
    text: Or 'all the families of the kingdoms of the north.' The Hebrew term can denote extended family groups, clans, or similar social units.
    reason: lexical_alternative
  - marker: b
    text: '''Each will set his throne'' pictures invading rulers taking up positions of authority and judgment at Jerusalem''s gates.'
    reason: cultural_note
