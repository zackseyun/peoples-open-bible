translation:
  language: es
  text: Todos los registrados para el campamento de Efraín fueron 108.100, por sus divisiones[a][b]. Partirán en tercer lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Divisiones» también puede traducirse «compañías» o «ejércitos»; el hebreo צִבְאֹתָם conserva un matiz organizativo y militar.
    reason: lexical_alternative
  - marker: b
    text: «Registrados» traduce el participio de פּקד; también puede verterse «contados» o «alistados», según se quiera resaltar el censo o la revista militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - El total de
  - La totalidad de
  lexicon: HALOT
  rationale: En la fórmula censal, כָּל introduce el total de los registrados; «Todos» es natural en español y conserva el valor de suma total sin sobreexplicar.
- source_word: הַפְּקֻדִים
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los musterados
  - los enumerados
  lexicon: HALOT
  rationale: פקד en este contexto remite a personas pasadas por censo o revista militar. «Los contados» preserva la referencia numérica y la tensión censal-militar mejor que una paráfrasis más libre.
- source_word: לְמַחֲנֵה
  english_pob_choice: for the camp of
  chosen_spanish: para el campamento de
  alternatives_spanish:
  - del campamento de
  - pertenecientes al campamento de
  lexicon: HALOT
  rationale: La preposición לְ expresa pertenencia o relación con el campamento; «para el campamento de» mantiene la construcción relacional del hebreo y suena natural en español.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Ephraim
  lexicon: HALOT
  rationale: 'Nombre propio tribal estándar en español bíblico: «Efraín».'
- source_word: מְאַת אֶלֶף וּשְׁמֹנַת אֲלָפִים וּמֵאָה
  english_pob_choice: 108,100
  chosen_spanish: '108.100'
  alternatives_spanish:
  - ciento ocho mil cien
  lexicon: HALOT
  rationale: El hebreo da la cifra exacta; en español bíblico moderno, la cifra arábiga facilita la lectura y conserva plenamente el valor numérico.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus compañías
  - por sus ejércitos
  lexicon: HALOT
  rationale: צִבְאֹתָם puede referirse a formaciones organizadas con matiz militar. «Por sus divisiones» reproduce la idea de ordenamiento tribal sin imponer una traducción más militarizada que la que el contexto inmediato exige.
- source_word: וּשְׁלִשִׁים
  english_pob_choice: third
  chosen_spanish: como tercer grupo
  alternatives_spanish:
  - terceramente
  - en tercer lugar
  lexicon: HALOT
  rationale: El ordinal tiene fuerza adverbial en el orden de marcha. «Como tercer grupo» expresa con claridad la función de orden sin volverlo una mera etiqueta abstracta.
- source_word: יִסָּעוּ
  english_pob_choice: They shall set out
  chosen_spanish: Saldrán
  alternatives_spanish:
  - se pondrán en marcha
  - partirán
  - levantarán el campamento
  lexicon: HALOT
  rationale: נסע en contexto de campamento significa ponerse en marcha o partir. «Saldrán» es conciso y natural en español, y conserva el sentido de movimiento ordenado.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el sentido del registro auditado en inglés, manteniendo la fórmula censal, el número exacto y el orden de marcha sin añadir elementos no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se usó «Efraín» como forma española estable del nombre tribal.
  - Se preservó la tensión censal/militar de פְּקֻדִים con «los contados», en lugar de una expansión interpretativa.
  - «Por sus divisiones» conserva el valor relacional de לְצִבְאֹתָם sin forzar una lectura exclusivamente militar.
  - El ordinal se volvió adverbial en español («como tercer grupo») para reflejar la función de orden en la marcha.
