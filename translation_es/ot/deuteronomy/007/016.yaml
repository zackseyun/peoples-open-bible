base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/007/016.yaml
  text: And you shall consume all the peoples whom Yahweh your God is giving to you[a]. Your eye shall not spare them, and you shall not serve their gods[c][b], for that would be a snare to you.
  footnotes:
  - marker: a
    text: Or 'you shall eat up' or 'you shall destroy.' The Hebrew verb literally means 'eat/consume' and is used here idiomatically of total defeat.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall not pity them.' Literally, 'your eye shall not spare them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for it is a snare to you.' The Hebrew pronoun may refer generally to the idolatrous situation, though the most immediate sense is serving their gods.
    reason: alternative_reading
