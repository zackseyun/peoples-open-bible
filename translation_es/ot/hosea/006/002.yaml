base_translation:
  language: en
  yaml_path: translation/ot/hosea/006/002.yaml
  text: He will revive us after two days[a]; on the third day he will raise us up[d][c][b], that we may live before him.
  footnotes:
  - marker: a
    text: Or 'in two days'; the Hebrew temporal expression may denote a short interval leading into the third day.
    reason: lexical_alternative
  - marker: b
    text: '''Raise us up'' may also be understood more generally as ''restore us'' or ''set us on our feet.'''
    reason: lexical_alternative
  - marker: c
    text: Many Christians see the 'third day' wording as typologically anticipating the Messiah's resurrection, though the verse directly speaks of the people's restoration.
    reason: cross_reference
  - marker: d
    text: Or 'live in his presence.'
    reason: lexical_alternative
