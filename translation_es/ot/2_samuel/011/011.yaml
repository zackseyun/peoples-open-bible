  text: וַ/יֹּ֨אמֶר אוּרִיָּ֜ה אֶל דָּוִ֗ד הָ֠/אָרוֹן וְ/יִשְׂרָאֵ֨ל וִֽ/יהוּדָ֜ה יֹשְׁבִ֣ים בַּ/סֻּכּ֗וֹת וַ/אדֹנִ֨/י יוֹאָ֜ב וְ/עַבְדֵ֤י אֲדֹנִ֨/י עַל פְּנֵ֤י הַ/שָּׂדֶה֙ חֹנִ֔ים וַ/אֲנִ֞י אָב֧וֹא אֶל בֵּיתִ֛/י לֶ/אֱכֹ֥ל וְ/לִ/שְׁתּ֖וֹת וְ/לִ/שְׁכַּ֣ב עִם אִשְׁתִּ֑/י חַיֶּ֨/ךָ֙ וְ/חֵ֣י נַפְשֶׁ֔/ךָ אִֽם אֶעֱשֶׂ֖ה אֶת הַ/דָּבָ֥ר הַ/זֶּֽה־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/011/011.yaml
  text: Uriah said to David[a], “The ark, and Israel and Judah, are staying in shelters, and my lord Joab and the servants of my lord are camped in the open field. Shall I then go to my house to eat and to drink and to lie with my wife? As surely as you live, and as your soul lives[c][b], I will not do this thing.”
  footnotes:
  - marker: a
    text: Hebrew 'booths' or 'temporary shelters'; the term refers to makeshift dwellings used in the field.
    reason: lexical_alternative
  - marker: b
    text: Or 'Shall I go to my house...?' The Hebrew wording is a rhetorical question expressing Uriah's refusal.
    reason: alternative_reading
  - marker: c
    text: 'Hebrew oath formula: ''As you live, and as your soul lives, if I do this thing''—with ''if'' expressing a strong negative after the oath.'
    reason: lexical_alternative
