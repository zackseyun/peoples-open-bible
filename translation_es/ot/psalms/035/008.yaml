  text: תְּבוֹאֵ֣/הוּ שׁוֹאָה֮ לֹֽא יֵ֫דָ֥ע וְ/רִשְׁתּ֣/וֹ אֲשֶׁר טָמַ֣ן תִּלְכְּד֑/וֹ בְּ֝/שׁוֹאָ֗ה יִפָּל בָּֽ/הּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/008.yaml
  text: Let destruction come upon him unawares[a], and let the net that he hid catch him[c][b]; into that very destruction let him fall.
  footnotes:
