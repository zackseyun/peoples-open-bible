translation:
  language: es
  text: y en el altar deben ofrecer holocaustos cada día[a], según tienen el mandato de ofrecer diecisiete, y otros diez talentos al año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este versículo es difícil y parece estar comprimido en varios puntos, especialmente en el verbo traducido aquí «deben ofrecer» y en la cláusula final sobre «otros diez talentos al año». La traducción sigue el sentido principal del texto griego conservado sin afirmar certeza sobre cada detalle.
    reason: textual_variant
lexical_decisions:
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - lugar de sacrificio
  lexicon: LSJ
  rationale: Es el término cultual normal para el altar sacrificial. En español, «altar» conserva la referencia ritual con claridad y sin añadir explicación innecesaria.
- source_word: ὁλοκαυτώματα
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - sacrificios totalmente consumidos
  lexicon: LSJ
  rationale: El griego designa ofrendas consumidas por fuego. «Holocaustos» mantiene el valor técnico sacrificial y es fiel al uso bíblico; se evita una paráfrasis más explicativa que alteraría el registro cultual.
- source_word: καρποῦσθαι
  english_pob_choice: offer
  chosen_spanish: ofrecerían
  alternatives_spanish:
  - presentarían
  - darían
  lexicon: LSJ
  rationale: El verbo griego es inusual aquí y el texto está marcado como difícil. En contexto sacrificial, la idea principal es la acción cultual de ofrecer; «ofrecerían» refleja ese sentido sin forzar una traducción literal que sonarí­a extraña en español.
- source_word: καθʼ ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  lexicon: LSJ
  rationale: «Cada día» reproduce con naturalidad el valor distributivo de la expresión griega y encaja mejor en español publicado que un adverbio más compacto.
- source_word: ἐντολήν
  english_pob_choice: command
  chosen_spanish: orden
  alternatives_spanish:
  - mandato
  - instrucción
  lexicon: LSJ
  rationale: En este contexto administrativo-cultual, «orden» comunica bien la fuerza autoritativa del término. «Mandato» sería posible, pero «orden» resulta más natural en la frase española.
- source_word: ἑπτὰ καὶ δέκα
  english_pob_choice: seventeen
  chosen_spanish: diecisiete
  alternatives_spanish:
  - diez y siete
  lexicon: LSJ
  rationale: La combinación numérica se expresa de forma idiomática en español como «diecisiete».
- source_word: προσφέρειν
  english_pob_choice: present/offer
  chosen_spanish: ofrecer
  alternatives_spanish:
  - presentar
  - entregar
  lexicon: LSJ
  rationale: El audit trail inglés vacila entre «offer» y «present» por la compresión del pasaje. En español, «ofrecer» conserva mejor el campo sacrificial y evita la repetición artificial de otro verbo distinto dentro de la misma cláusula.
- source_word: ἄλλα τάλαντα, δέκα κατʼ ἐνιαυτόν
  english_pob_choice: another ten talents yearly
  chosen_spanish: otros diez talentos al año
  alternatives_spanish:
  - y otros diez talentos cada año
  - aparte de otros diez talentos al año
  lexicon: LSJ
  rationale: El griego es conciso y algo difícil. «Otros diez talentos al año» conserva el valor aditivo de ἄλλα y el dato anual sin sobreinterpretar la construcción comprimida.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje inglés revisado del audit trail, que sustituyó una formulación administrativa más neutra por una más consistente con el lenguaje sacrificial («offer») y ajustó la cláusula final para reflejar con mayor literalidad ἄλλα. La presente versión española sigue esa línea y opta por un verbo cultual único («ofrecer») y por una expresión aditiva simple («otros diez talentos al año»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el lenguaje sacrificial técnico sin sustituirlo por equivalentes eclesiásticos más genéricos.
  - La forma verbal en condicional («ofrecerían») refleja la dependencia sintáctica del pasaje y evita una literalidad torpe en español.
