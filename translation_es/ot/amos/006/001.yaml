revisions:
- from: ¡Ay de los que están tranquilos en Sion[a], y de los que se sienten seguros en el monte de Samaria, los hombres distinguidos de lo primero de las naciones[b][c], a quienes se acerca la casa de Israel!
  to: ¡Ay de los que están tranquilos en Sion, y de los que se sienten seguros en el monte de Samaria, los hombres distinguidos[a] de lo principal entre las naciones[b], a quienes viene la casa de Israel[c]!
  rationale: Se corrige la ubicación de la nota [a] para que explique el término correcto, se mejora «de lo primero de las naciones» a una formulación idiomática y fiel («de lo principal entre las naciones»), y se ajusta la cláusula final para reflejar con más claridad el movimiento del hebreo sin dejar de sonar natural en español.
