  to: En aquel día[a], declara Yahvé, yo reuniré a la coja[b], y agruparé a la desterrada[c], incluso a la que he afligido[d].
  rationale: 'La revisión conserva mejor la lógica del hebreo: mantiene la fórmula profética, el nombre divino, la distinción entre los dos verbos de restauración y la agencia divina explícita. Además, repara dos detalles importantes: introduce el valor inclusivo de וַאֲשֶׁר con «incluso», y preserva la coherencia del singular femenino colectivo en toda la línea. «Agruparé» evita el tono algo coloquial de «juntaré» sin perder la diferenciación léxica respecto de «reuniré».'
