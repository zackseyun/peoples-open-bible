  yaml_path: translation/deuterocanon/1_esdras/005/067.yaml
  text: Then Zerubbabel and Jeshua and the heads of the fathers’ houses of Israel said to them[b][a], “It is not for you to build the house for the Lord our God.”
  footnotes:
