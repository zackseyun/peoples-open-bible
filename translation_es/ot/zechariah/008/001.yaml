translation:
  language: es
  text: Y vino la palabra de Yahvé de los ejércitos[b], diciendo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y sucedió: la palabra de Yahvé de los ejércitos vino, diciendo».'
    reason: lexical_alternative
  - marker: b
    text: «Ejércitos» también puede traducirse «huestes»; el título enfatiza el gobierno de Yahvé sobre las fuerzas celestiales y terrenales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El waw-consecutivo introduce aquí una fórmula profética de aparición del mensaje divino. En español, «Y vino» conserva el movimiento de llegada de la palabra sin caer en un calco demasiado pesado como «y aconteció», que suena menos natural en esta construcción.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la voz
  lexicon: HALOT
  rationale: En las fórmulas proféticas, דְּבַר designa la palabra o mensaje procedente de Dios. «La palabra» preserva la fórmula estable y el valor de mensaje revelado que el texto requiere.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración directa del Tetragrámaton. «Yahvé» sigue la convención del proyecto para יְהוָה y evita la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Hosts» en inglés se vierte aquí de forma transparente como «ejércitos», manteniendo la imagen de poder y mando sobre fuerzas militares y cósmicas. En español resulta más claro que el calco «huestes» en registro contemporáneo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo introduciendo discurso se expresa de manera natural con «diciendo», que conserva el encabezamiento de la palabra divina sin añadir matices que el hebreo no exige.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea doctrinal del proyecto preserva el nombre propio de Dios en vez de ocultarlo tras un título. «Yahvé» es la forma española estable para el Tetragrámaton y mantiene la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Traducción del título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: Se conserva el título en una equivalencia suficientemente formal. «De los ejércitos» reproduce צְבָאוֹת con claridad y mantiene la carga militar/cósmica sin sustituirla por una paráfrasis interpretativa como «Todopoderoso».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés más reciente se mantuvo sin cambios tras la revisión final; no se registraron enmiendas aplicadas. La versión española conserva esa lectura estable y reproduce la fórmula profética con el mismo grado de formalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para el Tetragrámaton.
  - Se usa «de los ejércitos» para צְבָאוֹת por claridad en español, en línea con el valor de «hosts» del texto fuente.
  - «Diciendo» conserva la fórmula introductoria sin añadir contenido interpretativo.
