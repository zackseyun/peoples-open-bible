  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Siervo» para עַבְדְּךָ está bien justificado como fórmula cortesana. La principal desalineación es metodológica: el inglés POB documentó conservar «said ... said», y el español debería reflejar esa misma decisión salvo impedimento fuerte, que aquí no existe.'
