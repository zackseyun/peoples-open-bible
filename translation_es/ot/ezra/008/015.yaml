translation:
  language: es
  text: Yo los reuní al río que va a Ahavá[a], y acampamos allí tres días. Entonces examiné al pueblo y a los sacerdotes[b], pero no hallé a ninguno de los hijos de Leví allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el canal que va a Ahavá». El término hebreo puede designar un río o un cauce artificial en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de los hijos de Leví», es decir, levitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקְבְּצֵם
  english_pob_choice: I gathered them
  chosen_spanish: Yo los reuní
  alternatives_spanish:
  - Yo los junté
  - Yo los congregué
  lexicon: HALOT
  rationale: קבץ expresa reunir o juntar. «Reuní» comunica con naturalidad la acción deliberada de Esdras y conserva el sentido de agrupar personas.
- source_word: הַנָּהָר הַבָּא אֶל אַהֲוָא
  english_pob_choice: the river that comes to Ahava
  chosen_spanish: el río que va a Ahavá
  alternatives_spanish:
  - el río que viene a Ahavá
  - el canal que va a Ahavá
  lexicon: HALOT
  rationale: נָהָר suele ser «río», pero en este contexto puede aludir a un cauce artificial. En español, «río» mantiene la forma más directa, y «que va a» conserva la idea direccional del participio hebreo sin forzar una calca. Se conserva «Ahavá» como topónimo transliterado.
- source_word: וַנַּחֲנֶה
  english_pob_choice: we camped
  chosen_spanish: acampamos
  alternatives_spanish:
  - acamparamos
  - hicimos campamento
  lexicon: HALOT
  rationale: חנה significa acampar. «Acampamos» es la equivalencia moderna más clara y fiel.
- source_word: יָמִים שְׁלֹשָׁה
  english_pob_choice: three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  lexicon: HALOT
  rationale: La expresión numérica se traslada de forma directa y natural al español.
- source_word: וָאָבִינָה
  english_pob_choice: I examined
  chosen_spanish: examiné
  alternatives_spanish:
  - consideré
  - inspeccioné
  - entendí
  lexicon: HALOT
  rationale: El verbo בין en este uso apunta a examinar/discernir con atención. «Examiné» preserva la observación cuidadosa de Esdras sobre la composición del grupo.
- source_word: בָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la comunidad
  lexicon: HALOT
  rationale: עָם aquí se refiere al grupo reunido en general, en contraste con sacerdotes y levitas. «Pueblo» refleja esa colectividad de manera natural.
- source_word: וּבַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - a los sacerdotes consagrados
  lexicon: HALOT
  rationale: כֹּהֲנִים se traduce de manera estándar como «sacerdotes». Se mantiene la distinción frente al pueblo y a los levitas.
- source_word: וּמִבְּנֵי לֵוִי
  english_pob_choice: of the sons of Levi
  chosen_spanish: a ninguno de los hijos de Leví
  alternatives_spanish:
  - a ninguno de los levitas
  - a ninguno de los descendientes de Leví
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «de los hijos de Leví». Se conserva esa expresión genealógica en el cuerpo principal para reflejar el hebreo; en español «hijos de Leví» es inteligible y mantiene la tensión entre literalidad y sentido colectivo.
- source_word: לֹא מָצָאתִי שָׁם
  english_pob_choice: I found none ... there
  chosen_spanish: no hallé allí
  alternatives_spanish:
  - no encontré allí
  - allí no hallé ninguno
  lexicon: HALOT
  rationale: La negación con ausencia implícita se expresa de modo natural como «no hallé allí». El complemento pronominal «a ninguno» lleva al español la fuerza de la falta de levitas sin añadir más de lo que el hebreo exige.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético y la lectura auditada de la POB inglesa; no se requieren revisiones textuales adicionales, y la única tensión léxica principal es נָהָר, que puede ser «río» o «canal» en este contexto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino como norma del proyecto, pero este versículo no lo contiene.
  - Se conservó el topónimo «Ahavá» transliterado para evitar sustituirlo por una glosa interpretativa.
  - «Hijos de Leví» se mantiene en el texto con una nota para explicitar que el sentido es «levitas».
  - Se usó un registro sobrio y publicable, evitando calcos como «encampamos» que suenan menos naturales en español actual.
