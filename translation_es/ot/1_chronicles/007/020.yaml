translation:
  language: es
  text: 'Los hijos de Efraín: Shutelá[a], y Bered, su hijo, y Tahat, su hijo, y Eleadá, su hijo, y Tahat, su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías, la palabra hebrea traducida «hijo» puede señalar a un descendiente más remoto; aquí se conserva la forma literal «su hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En genealogías, בן/בני funciona de manera natural como relación de filiación. «Los hijos de» conserva el encabezado genealógico sin un calco innecesario del conector inicial.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraim
  lexicon: HALOT
  rationale: Nombre propio bíblico; la forma española estándar y más reconocible es «Efraín».
- source_word: שׁוּתָלַח
  english_pob_choice: Shuthelah
  chosen_spanish: Shutélah
  alternatives_spanish:
  - Sutélah
  - Shutelah
  lexicon: HALOT
  rationale: Nombre propio transliterado. La acentuación gráfica ayuda a la pronunciación en español sin alterar el referente.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: El valor léxico básico es «hijo». Aunque en genealogías puede haber salto generacional, la forma literal del hebreo se mantiene y la posible amplitud genealógica no se explicita en el texto principal.
- source_word: וְתַחַת
  english_pob_choice: and Tahath
  chosen_spanish: y Tahat
  alternatives_spanish:
  - y Táhat
  lexicon: HALOT
  rationale: Aquí תַחַת es nombre propio, no la preposición/nombre común «debajo». Se translitera como nombre de persona.
- source_word: וְאֶלְעָדָה
  english_pob_choice: and Eleadah
  chosen_spanish: y Elada
  alternatives_spanish:
  - y Eleada
  lexicon: HALOT
  rationale: Nombre propio en la secuencia genealógica; se adapta a una forma española legible sin traducirlo.
- source_word: וְתַחַת בְּנוֹ
  english_pob_choice: and Tahath his son
  chosen_spanish: y Tahat, su hijo
  alternatives_spanish:
  - y Tahat su hijo
  - y Tahat, su descendiente
  lexicon: HALOT
  rationale: Se preserva la repetición del patrón genealógico. La coma refleja la aposición explicativa natural en español sin borrar la literalidad de «su hijo».
theological_decisions:
- issue: Genealogías telescópicas y el alcance de בְּנוֹ ('su hijo')
  english_pob_reading: Hebrew 'son' in genealogies can sometimes denote a more remote descendant, but the text literally reads 'his son' at each step.
  chosen_spanish_reading: «su hijo» en el texto principal, con la posibilidad de un descendiente más remoto implícita solo por el género genealógico, no por una paráfrasis explicativa.
  alternative_spanish_readings:
  - «su descendiente»
  - «su hijo/descendiente»
  rationale: La fuente hebrea usa literalmente בן con sufijo posesivo. Para no borrar la tensión entre literalidad y uso genealógico ampliado, se mantiene «su hijo» y se deja la amplitud semántica para la nota.
  doctrine_reference: Observación filológica/genealógica; no doctrinal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios y que el acuerdo con la fuente es alto. Por eso el borrador español sigue de cerca la estructura genealógica del hebreo y no introduce explicaciones que el texto no requiere.
  spanish_consistency_notes:
  - Se mantiene «Efraín» para el nombre tribal/persona y se usa «Tahat» de manera uniforme para la misma forma hebrea repetida.
  - Se conserva la repetición del patrón genealógico con comas y la conjunción «y» para reflejar la cadena del hebreo.
  - La nota al pie se ancla en «Shutélah[a]» porque el texto principal omite una explicación explícita sobre el valor de «hijo» en genealogías, preservando así la literalidad del versículo.
