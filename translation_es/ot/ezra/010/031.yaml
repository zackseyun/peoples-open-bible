  - marker: b
    text: Isshijah también puede transliterarse «Jeshiah» o «Ishijah».
    reason: lexical_alternative
  - marker: c
    text: Shimeón se traduce tradicionalmente «Simeón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y entre los hijos de
  lexicon: HALOT
  rationale: El hebreo introduce un subgrupo familiar dentro de la lista; en español, «de los hijos de» comunica bien la pertenencia/clan sin forzar un verbo añadido. Se conserva la conexión inicial con «Y».
- source_word: חָרִם
  english_pob_choice: Harim
  chosen_spanish: Harim
  lexicon: HALOT
  rationale: Nombre propio de linaje; se translitera de forma directa.
- source_word: אֱלִיעֶזֶר
  english_pob_choice: Eliezer
  chosen_spanish: Eliezer
  lexicon: HALOT
  rationale: Nombre propio; la transliteración española estándar es clara y fiel.
- source_word: יִשִּׁיָּה
  english_pob_choice: Isshijah
  chosen_spanish: Isshijah
  alternatives_spanish:
  - Jeshiah
  - Ishijah
  lexicon: HALOT
  rationale: Se conserva la transliteración escogida por la POB inglesa para reflejar con transparencia la forma hebrea, manteniendo las variantes documentadas como alternativas de transliteración.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malkijah
  chosen_spanish: Malkijah
  alternatives_spanish:
  - Malquías
  lexicon: HALOT
  rationale: Se mantiene la transliteración transparente del nombre hebreo. No se sustituye por una forma castellana tradicional para no perder la correspondencia auditada con el original.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Shemaiah
  alternatives_spanish:
  - Semaías
  lexicon: HALOT
  rationale: Se conserva la transliteración establecida en el texto base para nombres propios, por fidelidad y consistencia de lista.
- source_word: שִׁמְעוֹן
  english_pob_choice: Shimeon
  chosen_spanish: Shimeón
  alternatives_spanish:
  - Simeón
  - Shimeón
  lexicon: HALOT
  rationale: En español, la forma acentuada «Shimeón» reproduce la transliteración auditada del inglés POB y evita confundirlo con el nombre bíblico tradicional «Simeón», que aquí es una convención distinta del hebreo consonántico documentado.
