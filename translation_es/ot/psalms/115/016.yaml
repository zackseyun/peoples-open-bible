translation:
  language: es
  text: Los cielos son de Yahvé[a][c], pero la tierra la ha dado a los hijos de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los cielos, los cielos pertenecen a Yahvé». El hebreo repite «cielos» para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos de los hombres» es una expresión hebrea que significa seres humanos o la humanidad.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Los cielos son los cielos de Yahvé».'
    reason: previous_rendering
lexical_decisions:
- source_word: הַשָּׁמַיִם ... שָׁמַיִם
  english_pob_choice: The heavens are Yahweh's heavens / The heavens are the LORD's heavens
  chosen_spanish: Los cielos son los cielos de Yahvé
  alternatives_spanish:
  - Los cielos, los cielos pertenecen a Yahvé
  - El cielo, sí, los cielos, son de Yahvé
  lexicon: WLC + English POB audit trail
  rationale: Conservo la repetición de שָׁמַיִם para reflejar el énfasis hebreo. En español, una estructura posesiva simple mantiene la relación de pertenencia sin forzar una construcción poco natural.
- source_word: לַיהוָה
  english_pob_choice: Yahweh's / the LORD's
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - pertenecen a Yahvé
  - de YHWH
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El Tetragrámaton se vierte como 'Yahvé' según el criterio del proyecto, preservando el nombre del pacto y evitando la convención de máscara 'SEÑOR'.
- source_word: וְהָאָרֶץ
  english_pob_choice: but the earth
  chosen_spanish: pero la tierra
  alternatives_spanish:
  - y la tierra
  - mas la tierra
  lexicon: WLC + English POB audit trail
  rationale: El hebreo marca contraste poético con ו; en español 'pero' comunica bien la antítesis entre los cielos y la tierra sin añadir contenido ajeno.
- source_word: נָתַן
  english_pob_choice: he has given
  chosen_spanish: la ha dado
  alternatives_spanish:
  - la dio
  - ha dado
  lexicon: WLC + English POB audit trail
  rationale: El perfecto hebreo presenta una acción completa; en español el perfecto compuesto conserva bien el estado resultante. El sujeto divino se sobreentiende por el contexto.
- source_word: לִבְנֵי אָדָם
  english_pob_choice: to the sons of man
  chosen_spanish: a los hijos de hombre
  alternatives_spanish:
  - a los seres humanos
  - a la humanidad
  - a los hijos de los hombres
  lexicon: HALOT / English POB audit trail
  rationale: Mantengo la forma representativa del hebreo, que es una expresión idiomática para seres humanos. 'Hijos de hombre' conserva la textura del original; una nota puede explicitar el sentido colectivo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto; el español del proyecto lo vierte como 'Yahvé' para preservar la transparencia textual y la identificación del nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido colectivo de בְנֵי אָדָם
  english_pob_reading: sons of man = human beings or humankind
  chosen_spanish_reading: hijos de hombre
  alternative_spanish_readings:
  - seres humanos
  - humanidad
  - mankind
  rationale: La expresión hebrea es idiomática y genérica, pero el proyecto prefiere conservar la forma masculina representativa en el cuerpo principal y explicarla en nota, en vez de sustituirla por una abstracción que borre la huella del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés en cuanto a la estructura enfática: la repetición hebrea se conserva sin convertir el verso en una paráfrasis. También toma en cuenta que la versión previa inglesa pasó por una corrección para hacer más natural la primera cláusula; por eso el español usa una posesión directa natural («son los cielos de Yahvé») en vez de una glosa más pesada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva la repetición de «cielos» como recurso enfático del hebreo.
  - «Hijos de hombre» preserva la expresión idiomática y su nota aclara el sentido inclusivo.
  - «Tierra» se usa para הָאָרֶץ en paralelo poético con «cielos».
