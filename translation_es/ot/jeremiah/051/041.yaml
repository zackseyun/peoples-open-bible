translation:
  language: es
  text: ¡Cómo ha sido capturada Sésac[a], y la alabanza de toda la tierra[b] ha sido capturada! ¡Cómo Babilonia ha llegado a ser una desolación[c] entre las naciones!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sésac se entiende ampliamente como un nombre cifrado de Babilonia.
    reason: alternative_reading
  - marker: b
    text: O, «la gloria de toda la tierra» o «la jactancia de toda la tierra».
    reason: lexical_alternative
  - marker: c
    text: O, «ha llegado a ser un objeto de espanto»; el hebreo puede sugerir tanto ruina como el espanto que provoca.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¿Cómo?
  lexicon: HALOT
  rationale: Expresa el tono exclamativo de asombro y lamento. En español, '¡Cómo!' conserva la fuerza retórica sin convertirlo en pregunta real.
- source_word: נִלְכְּדָה
  english_pob_choice: has been captured
  chosen_spanish: ha sido capturada
  alternatives_spanish:
  - fue capturada
  - ha sido tomada
  lexicon: HALOT
  rationale: El pasivo verbal transmite bien el sentido de 'ser tomada/capturada' en un hecho ya consumado con relevancia presente.
- source_word: שֵׁשַׁךְ
  english_pob_choice: Sheshak
  chosen_spanish: Sésac
  alternatives_spanish:
  - Sheshak
  - Sesac
  lexicon: HALOT
  rationale: Se translitera el nombre cifrado en una forma española natural. Se conserva la identificación tradicional con Babilonia en nota, sin reemplazar el nombre en el texto principal.
- source_word: וַתִּתָּפֵשׂ
  english_pob_choice: and ... seized
  chosen_spanish: ha sido presa
  alternatives_spanish:
  - ha sido tomada
  - ha sido capturada
  lexicon: HALOT
  rationale: La construcción impersonal en español evita una pasiva forzada y mantiene la imagen de captura/secuestro del objeto 'la alabanza de toda la tierra'.
- source_word: תְּהִלַּת כָּל הָאָרֶץ
  english_pob_choice: the praise of the whole earth
  chosen_spanish: la alabanza de toda la tierra
  alternatives_spanish:
  - la gloria de toda la tierra
  - la alabanza de la tierra entera
  lexicon: HALOT
  rationale: '''תהלה'' se rinde de manera directa como ''alabanza'', siguiendo la decisión inglesa de preservar el valor lexical básico. ''Toda la tierra'' conserva el alcance universal.'
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un desierto
  - una ruina
  - una devastación
  lexicon: HALOT
  rationale: '''שַׁמָּה'' denota desolación/ruina; ''desolación'' es el equivalente español más cercano y mantiene la sobriedad del hebreo.'
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones de la tierra
  lexicon: HALOT
  rationale: '''Goyim'' se refiere aquí al ámbito de las naciones. ''Entre las naciones'' es natural en español y preserva el marco internacional del juicio.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del audit trail inglés, que corrigió 'a horror' por 'a desolation' para לְשַׁמָּה. También preserva el nombre cifrado Sheshak en el texto principal, tal como hace el POB inglés, con la identificación en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el tetragrámaton; aquí no aparece, así que no se introduce.
  - '''Alabanza'' mantiene la decisión lexical directa para תְּהִלָּה, evitando sustituirla por ''gloria'' en el texto principal.'
  - '''Desolación'' reproduce mejor el ajuste revisado del inglés POB y evita intensificar innecesariamente el sentido a ''horror''.'
  - La transliteración 'Sésac' busca legibilidad en español; la equivalencia con 'Sheshak' queda explicitada en la nota.
  - La puntuación exclamativa refleja el tono de lamentación/ asombro del hebreo.
