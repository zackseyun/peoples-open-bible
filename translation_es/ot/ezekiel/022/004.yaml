    issue: Marcadores de notas desalineados con su contenido
    rationale: La nota [a] en español explica «Has apresurado tus días...», pero en el texto está colocada después de «has derramado». Esto altera el rastro de auditoría y puede confundir al lector sobre qué expresión se está explicando. La nota sobre «ídolos» debe permanecer anclada a «ídolos», y la nota idiomática debe anclarse a la cláusula correspondiente.
  - severity: medium
    issue: Se añadió una nota [c] no respaldada por el rastro inglés
    rationale: La tarea permite preservar alternativas o ambigüedades reales, pero aquí la información ya está cubierta por la nota idiomática existente. Mantener una nota adicional separada para «años» recarga el versículo y duplica la explicación.
  - severity: low
    issue: «Te has contaminado» es menos preciso que una formulación resultativa de impureza
    rationale: טָמֵאת está bien representado como estado resultante de impureza. «Te has vuelto impura» o «has quedado impura» refleja mejor el paralelismo con «te has hecho culpable», aunque «te has contaminado» no es erróneo.
