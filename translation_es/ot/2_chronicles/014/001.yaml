translation:
  language: es
  text: Asa hizo lo bueno y lo recto[a] a los ojos de Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a los ojos de». Idioma que significa «según la evaluación/juicio de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - actuó
  - practicó
  lexicon: HALOT
  rationale: En este contexto evaluativo, עשה expresa conducta o práctica moral. «Hizo» es la opción natural en español y conserva la idea de acción concreta sin añadir matices ajenos.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  alternatives_spanish:
  - Asa
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la forma española estándar y en continuidad con el texto inglés de referencia.
- source_word: הַטּוֹב
  english_pob_choice: what was good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - lo que era bueno
  - el bien
  lexicon: HALOT
  rationale: La expresión con artículo funciona como evaluación moral. «Lo bueno» mantiene la concisión y el valor cualitativo del hebreo sin forzar una perífrasis innecesaria.
- source_word: וְהַיָּשָׁר
  english_pob_choice: and right
  chosen_spanish: y lo recto
  alternatives_spanish:
  - y lo correcto
  - y lo recto
  - y lo justo
  lexicon: HALOT
  rationale: יָשָׁר en contextos éticos denota lo recto/upright. «Lo recto» conserva la pareja moral con «lo bueno» y evita una interpretación demasiado moderna o abstracta de «correcto».
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la opinión de
  - ante
  lexicon: HALOT
  rationale: La imagen hebrea expresa evaluación desde la perspectiva de alguien. «A los ojos de» reproduce esa metáfora de manera transparente y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene el nombre divino del tetragrámaton como «Yahvé», conforme al estándar del proyecto en español, en lugar de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológico, el referente es singular y personal. «Su Dios» refleja correctamente la referencia y la posesión.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El texto hebreo usa directamente el nombre del pacto. En español del proyecto se conserva como «Yahvé», evitando la sustitución por un equivalente titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido idiomático de בְּעֵינֵי
  english_pob_reading: in the eyes of
  chosen_spanish_reading: a los ojos de
  alternative_spanish_readings:
  - ante
  - en la opinión de
  rationale: La frase no describe visión física, sino evaluación o juicio. «A los ojos de» conserva la metáfora y el valor de juicio/perspectiva que el inglés POB también preserva.
  doctrine_reference: HALOT / evaluación idiomática
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase de revisión indicó que no eran necesarios cambios, con acuerdo alto entre revisores. La versión española sigue de cerca la lectura auditada del inglés POB y preserva la metáfora idiomática de בְּעֵינֵי mediante una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton, conforme a la terminología del proyecto en español.
  - Se mantiene la estructura evaluativa «lo bueno y lo recto» para reflejar el paralelismo hebreo.
  - La nota de pie de página explica el hebraísmo sin sustituirlo por una paráfrasis que borre la imagen original.
  - Se evita «Señor» como sustituto del nombre divino, en coherencia con el marco doctrinal del proyecto.
