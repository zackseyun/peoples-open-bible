translation:
  language: es
  text: Y siete gradas subían a él, y su vestíbulo[a] estaba delante de ellos; y tenía adornos de palmeras, uno a este lado y otro a aquel lado[b], en sus jambas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «porche» para el hebreo אֵילָם, una traducción tradicional en contextos de visión del templo.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «postes» o «pilares laterales» para el hebreo אֵילָו.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלוֹת
  english_pob_choice: steps
  chosen_spanish: gradas
  alternatives_spanish:
  - escalones
  - peldaños
  - gradas de acceso
  lexicon: HALOT
  rationale: En este contexto arquitectónico de una puerta/entrada, «gradas» comunica bien la idea de peldaños de acceso sin sonar demasiado coloquial. Mantiene la imagen de una subida escalonada.
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: עֲלוֹתוֹ
  english_pob_choice: seven steps went up to it
  chosen_spanish: subían a él
  alternatives_spanish:
  - subían hacia él
  - ascendían a él
  - iban a él
  lexicon: HALOT
  rationale: El hebreo expresa la idea de una subida asociada a la estructura. En español, «subían a él» conserva el movimiento ascendente sin forzar una construcción nominal poco natural.
- source_word: וְאֵילַמּוֹ
  english_pob_choice: vestibule
  chosen_spanish: vestíbulo
  alternatives_spanish:
  - pórtico
  - porche
  - atrio
  lexicon: HALOT
  rationale: «Vestíbulo» refleja la función arquitectónica indicada en la visión y evita la ambigüedad de «porche», que en español puede sonar demasiado doméstico.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: Expresa de forma natural la ubicación frontal del vestíbulo respecto a los escalones o la subida.
- source_word: וְתִמֹרִים
  english_pob_choice: palm-tree ornaments
  chosen_spanish: adornos de palmeras
  alternatives_spanish:
  - ornamentos de palmera
  - motivos de palmera
  - palmas ornamentales
  lexicon: HALOT
  rationale: El contexto arquitectónico apunta a motivos decorativos, no a árboles literales. «Adornos de palmeras» comunica esa lectura sin perder la imagen vegetal.
- source_word: לוֹ
  english_pob_choice: it had
  chosen_spanish: tenía
  alternatives_spanish:
  - había para él
  - poseía
  lexicon: HALOT
  rationale: En español, la posesión o pertenencia estructural se expresa naturalmente con «tenía». Mantiene la relación del rasgo ornamental con la puerta o acceso.
- source_word: אֶחָד מִפֹּה וְאֶחָד מִפֹּה
  english_pob_choice: one on this side and one on that side
  chosen_spanish: uno a un lado y otro al otro
  alternatives_spanish:
  - uno de este lado y otro de aquel
  - uno a uno y otro al otro lado
  lexicon: HALOT
  rationale: Preserva la simetría distributiva del hebreo con una formulación fluida y clara en español.
- source_word: אֵילָו
  english_pob_choice: jambs
  chosen_spanish: jambas
  alternatives_spanish:
  - postes
  - pilares laterales
  - montantes
  lexicon: HALOT
  rationale: «Jambas» es el equivalente técnico más preciso en español para los elementos laterales de un vano o puerta. Mantiene el sentido arquitectónico exacto del término.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que prefirió una expresión verbal simple para la subida («went up to it») en lugar de una formulación nominal. En español se refleja esa misma decisión con «subían a él», manteniendo además el registro arquitectónico de «vestíbulo», «adornos de palmeras» y «jambas».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se usa «jambas» como término técnico, coherente con el equivalente inglés «jambs».
  - «Adornos de palmeras» conserva el valor ornamental del hebreo en un contexto de arquitectura sagrada.
  - La referencia pronominal «él» se entiende como la entrada o puerta descrita en el versículo, sin añadir un sujeto explícito inexistente en el hebreo.
