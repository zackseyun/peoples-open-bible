translation:
  language: es
  text: Nosotros, pues, pondremos delante alimentos cocinados[a]; pero tú, fingiendo probar carne de cerdo, sálvate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «alimentos asados». El griego se refiere a comida preparada por cocción; el contexto puede sugerir específicamente alimentos asados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡψημένων
  english_pob_choice: roasted
  chosen_spanish: asados
  alternatives_spanish:
  - cocidos
  - tostados
  lexicon: LSJ
  rationale: El griego apunta a alimentos preparados por cocción; «asados» conserva la imagen culinaria concreta y funciona con naturalidad en español.
- source_word: βρωμάτων
  english_pob_choice: foods
  chosen_spanish: alimentos
  alternatives_spanish:
  - comidas
  - manjares
  lexicon: LSJ
  rationale: βρῶμα es un término amplio para alimento/comida. «Alimentos» mantiene esa amplitud sin restringirlo indebidamente a carne.
- source_word: παραθήσομεν
  english_pob_choice: we will set out
  chosen_spanish: pondremos delante
  alternatives_spanish:
  - serviremos
  - presentaremos
  lexicon: LSJ
  rationale: En contexto de mesa, el verbo significa poner delante o disponer para comer. «Pondremos delante» conserva la acción concreta sin sonar forzado.
- source_word: ὑποκρινόμενος
  english_pob_choice: by pretending
  chosen_spanish: fingiendo
  alternatives_spanish:
  - simulando
  - haciendo como si
  lexicon: LSJ
  rationale: El participio expresa disimulo o actuación fingida. «Fingiendo» reproduce bien el valor instrumental del participio en español.
- source_word: τῶν ὑείων
  english_pob_choice: pork
  chosen_spanish: cerdo
  alternatives_spanish:
  - carne de cerdo
  - carne de puerco
  lexicon: LSJ
  rationale: La frase se refiere a alimento procedente del cerdo. «Cerdo» es claro y natural en español; en este contexto basta para identificar la carne prohibida.
- source_word: ἀπογεύσασθαι
  english_pob_choice: to taste
  chosen_spanish: probar
  alternatives_spanish:
  - gustar
  - degustar
  lexicon: LSJ
  rationale: El infinitivo medio aoristo indica probar o tomar un bocado. «Probar» es la opción más directa y idiomática en español.
- source_word: σώθητι
  english_pob_choice: save yourself
  chosen_spanish: sálvate
  alternatives_spanish:
  - escápate con vida
  - sal tú mismo
  lexicon: LSJ
  rationale: El imperativo aquí exhorta a preservar la vida en sentido inmediato. «Sálvate» conserva la urgencia y evita cargar el verbo con un sentido teológico no exigido por el contexto.
theological_decisions:
- issue: Referencia a la carne de cerdo prohibida en un contexto judío de martirio
  english_pob_reading: pork
  chosen_spanish_reading: cerdo
  alternative_spanish_readings:
  - carne de cerdo
  - carne de puerco
  rationale: El punto moral del pasaje depende de la transgresión alimentaria. «Cerdo» comunica de forma sobria y comprensible el alimento implicado sin atenuar la tensión legal-religiosa.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Fuerza de σώθητι como urgencia de autopreservación
  english_pob_reading: save yourself
  chosen_spanish_reading: sálvate
  alternative_spanish_readings:
  - escápate con vida
  - sé salvo
  rationale: Aquí el contexto es la supervivencia física inmediata, no una formulación doctrinal de salvación. «Sálvate» conserva la urgencia del mandato y evita sobreinterpretación teológica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa reciente se mantuvo sin cambios en el pasaje auditado. La redacción española sigue esa lectura estable, con ajuste idiomático para que el mandato final suene natural en español sin perder la presión narrativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca en el contexto; este versículo no lo contiene.
  - Se usa «cerdo»/«carne de cerdo» para reflejar la referencia específica del griego a alimento porcino, en línea con la nota inglesa.
  - «Sálvate» se eligió por el matiz inmediato de preservación de la vida, no como equivalente doctrinal de salvación eterna.
