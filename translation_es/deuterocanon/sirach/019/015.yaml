    rationale: El griego οὐκ ἀπὸ ψυχῆς significa literalmente «no desde/de la alma» o idiomáticamente «no intencionalmente». «Por el alma» sugiere causa o motivo y no reproduce bien ἀπό ni ayuda al lector a captar el contraste con una falta involuntaria.
