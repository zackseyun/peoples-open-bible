review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: prohibición directa, objeto cultual erigido, y cláusula relativa con Yahvé como sujeto del rechazo. Sin embargo, «piedra erigida» suena definicional y algo torpe en español, y además duplica en el sustantivo la idea ya expresada por «levantarás». El hebreo מַצֵּבָה se representa mejor en el texto principal como «pilar», dejando las alternativas más explicativas en nota, como ya hace el rastro inglés.'
  spanish_quality_summary: El español es comprensible, pero «una piedra erigida» resulta poco natural y redundante con «levantarás». «La cual» es aceptable, aunque «que» fluye mejor en español bíblico moderno. «Aborrece» y «Yahvé tu Dios» están bien. Una leve revisión mejora naturalidad y fidelidad léxica sin ampliar el sentido.
  glossary_alignment: 'Se alinea correctamente con el glosario en «Yahvé» para יהוה y «Dios» para אֱלֹהֶיךָ. No hay conflicto doctrinal. La principal cuestión terminológica es מַצֵּבָה: el proyecto inglés dejó «pillar» en el texto principal con nota para «standing stone / cultic pillar». En español, «pilar» reproduce mejor esa decisión que «piedra erigida».'
  issues:
  - severity: medium
    issue: «piedra erigida» para מַצֵּבָה
    rationale: Aunque semánticamente se acerca al referente, no es la mejor opción en español para el término nominal. Suena explicativa, poco idiomática, y repite la noción de erigir ya contenida en «levantarás». «Pilar» preserva mejor la concisión del hebreo y la decisión auditada en inglés.
  - severity: low
    issue: «la cual» suena más pesado que «que»
    rationale: No es incorrecto, pero en español moderno y digno «que» lee con más naturalidad sin pérdida de precisión.
  - severity: low
    issue: Nota al pie mejorable
    rationale: Si el texto principal usa «pilar», conviene conservar en nota las alternativas «piedra erigida» o «piedra de culto / piedra en pie» para reflejar el campo semántico del hebreo y evitar pérdida de matiz.
  revised_spanish_text: Y no levantarás para ti un pilar[a], que Yahvé tu Dios aborrece.
  revised_footnotes:
  - marker: a
    text: O «piedra erigida» o «piedra de culto». El término hebreo se refiere a una piedra levantada asociada con la adoración.
    reason: lexical_alternative
