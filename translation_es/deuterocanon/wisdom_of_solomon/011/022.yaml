translation:
  language: es
  text: Porque todo el mundo ante ti es como una partícula en la balanza[a], y como una gota de rocío de la mañana que cae sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como el giro de la balanza' o 'como una pequeña pesa en la balanza'; la imagen griega subraya una pequeñez extrema.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι ὡς ῥοπὴ ἐκ πλαστίγγων
  english_pob_choice: like a speck on the scales
  chosen_spanish: como una partícula en la balanza
  alternatives_spanish:
  - como un grano en la balanza
  - como el giro de la balanza
  - como una pequeña pesa en la balanza
  lexicon: LSJ
  rationale: ῥοπὴ en este giro expresa algo extremadamente leve en el contexto de una balanza. En español, 'partícula' comunica mejor la pequeñez casi imperceptible que 'giro' o 'pesa', y 'en la balanza' conserva la imagen del pesaje sin sonar forzado.
- source_word: πλαστίγγων
  english_pob_choice: the scales
  chosen_spanish: la balanza
  alternatives_spanish:
  - las balanzas
  - los platos de la balanza
  lexicon: LSJ
  rationale: El plural griego alude al aparato de pesar. 'La balanza' es el equivalente natural y suficientemente preciso en español; 'los platos' sería más técnico de lo necesario para este verso poético.
- source_word: ὅλος ὁ κόσμος
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - todo el mundo creado
  - todo el cosmos
  lexicon: LSJ
  rationale: κόσμος aquí designa la totalidad del mundo ordenado. 'Todo el mundo' es idiomático y mantiene la amplitud sin introducir una lectura más técnica como 'cosmos' o más interpretativa como 'mundo creado'.
- source_word: ἐναντίον σου
  english_pob_choice: before you
  chosen_spanish: en comparación contigo
  alternatives_spanish:
  - delante de ti
  - ante ti
  - frente a ti
  lexicon: LSJ
  rationale: Aunque literalmente puede leerse como 'delante de ti', el sentido comparativo está guiado por las dos símiles del verso. 'En comparación contigo' explicita ese valor sin convertir la imagen en una afirmación abstracta de nulidad.
- source_word: ῥανὶς
  english_pob_choice: a drop
  chosen_spanish: una gota
  alternatives_spanish:
  - una gota menuda
  - una gota de rocío
  lexicon: LSJ
  rationale: ῥανίς significa una gota. 'Una gota' es la opción más directa y natural; el complemento siguiente ya identifica que se trata de rocío.
- source_word: δρόσου ὄρθρινὴ
  english_pob_choice: of morning dew
  chosen_spanish: de rocío de la mañana
  alternatives_spanish:
  - de rocío matutino
  - de rocío temprano
  lexicon: LSJ
  rationale: ὄρθρινος indica la franja temprana de la mañana. 'De rocío de la mañana' es claro, digno y fiel al matiz temporal.
- source_word: κατελθοῦσα ἐπὶ γῆν
  english_pob_choice: that falls upon the earth
  chosen_spanish: que cae sobre la tierra
  alternatives_spanish:
  - que desciende sobre la tierra
  - que ha bajado a la tierra
  lexicon: LSJ
  rationale: El participio expresa el movimiento descendente del rocío. 'Que cae sobre la tierra' reproduce la imagen en español natural y sin sobrecargarla con una construcción demasiado literal.
theological_decisions:
- issue: Insignificancia comparativa del mundo ante Dios
  english_pob_reading: Render the similes straightforwardly without intensifying them into a metaphysical claim about creation's worthlessness.
  chosen_spanish_reading: Mantener las dos comparaciones concretas sin convertirlas en una declaración abstracta de que el mundo 'no es nada'.
  alternative_spanish_readings:
  - porque todo el mundo es como nada delante de ti
  - todo el mundo es insignificante ante ti
  rationale: 'El griego presenta dos imágenes poéticas: una partícula en la balanza y una gota de rocío. La traducción conserva esa forma figurada y no resuelve la tensión interpretativa con una abstracción más fuerte de la que el texto exige.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de más.
translation_notes:
  revision_awareness: Coincide con el pasaje base adjudicado sin revisiones recientes; se mantiene la lectura poética concreta del griego y la equivalencia óptima ya validada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - Se evita 'Señor' como sustituto porque el verso habla directamente en segunda persona, no mediante un título divino.
  - '''Mundo'' traduce κόσμος en sentido totalizante, no como ''universo''.'
  - '''Balanza'' se prefiere a una formulación demasiado técnica para preservar legibilidad y la imagen poética.'
