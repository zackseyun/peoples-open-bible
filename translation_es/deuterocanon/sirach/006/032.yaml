review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente el texto hebreo primario ni el rastro auditado del POB. El hebreo dice «si deseas…, llegarás a ser sabio; y si pones tu corazón [en ello], llegarás a ser sagaz/shrewd». El inglés POB sigue correctamente ese hebreo en el texto principal y deja el griego en nota. En cambio, el borrador español trasladó al texto principal dos lecturas griegas secundarias: «serás instruido» y «entregas tu vida», invirtiendo la prioridad de fuentes documentada.'
  spanish_quality_summary: El español es legible, pero «entregas tu vida» introduce un sentido más fuerte y menos preciso que el modismo hebreo «poner el corazón». «Serás prudente» es aceptable, aunque «serás sagaz» o «llegarás a ser sagaz» refleja mejor el filo de תַּעֲרֹם / 'shrewd'. Conviene ajustar el texto para que suene natural y a la vez preserve el modismo hebreo con nota explicativa.
  glossary_alignment: 'No hay conflicto con la glosa teológica del proyecto, pero sí con la metodología léxica del POB: el texto principal debe seguir el hebreo «llegar a ser sabio» y «poner tu corazón», dejando «ser instruido» y «dar tu alma» en nota como variante griega. «Hijo mío» está bien alineado con בְּנִי.'
  issues:
  - severity: high
    issue: El texto principal adopta «serás instruido» en lugar de «llegarás a ser sabio».
    rationale: La evidencia primaria hebrea תִּתְחַכָּם y el English POB principal exigen «te harás/llegarás a ser sabio». La lectura griega παιδευθήσῃ debe ir en nota, no desplazar al hebreo en el texto principal.
  - severity: high
    issue: El texto principal usa «si entregas tu vida» en lugar de reflejar el modismo hebreo «si pones tu corazón [en ello]».
    rationale: וְאִם תָּשִׂים לִבְּךָ significa fijar el corazón/atención con compromiso. «Entregar tu vida» sobreinterpreta y mezcla indebidamente la variante griega «dar tu alma».
  - severity: medium
    issue: «Serás prudente» suaviza el matiz de sagacidad/shrewdness.
    rationale: Aunque positivo en contexto sapiencial, תַּעֲרֹם tiene un filo de sagacidad práctica. «Sagaz» reproduce mejor el inglés auditado «shrewd», sin caer en connotación negativa como «astuto».
  - severity: low
    issue: La nota a dice que «aquí se sigue el énfasis griego en la instrucción».
    rationale: Eso contradice el expediente POB, que indica que el texto principal debe seguir el hebreo y la nota preservar el matiz griego.
  revised_spanish_text: Si lo deseas[a], hijo mío, llegarás a ser sabio; y si pones tu corazón en ello[b], llegarás a ser sagaz.
