reference: 1 Corinthians 15:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶτα τὸ τέλος, ὅταν ⸀παραδιδῷ τὴν βασιλείαν τῷ θεῷ καὶ πατρί, ὅταν καταργήσῃ πᾶσαν ἀρχὴν καὶ πᾶσαν ἐξουσίαν καὶ δύναμιν,
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/024.yaml
  text: Then comes the end[a], when he hands over the kingdom to God the Father[c][b], when he abolishes every rule and every authority and power.
  footnotes:
  - marker: a
    text: Or 'the consummation.' The Greek τέλος can mean 'end,' 'goal,' or 'consummation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he delivers up the kingdom to God and Father.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when he nullifies' or 'brings to nothing' every ruler and every authority and power.
    reason: lexical_alternative
translation:
  language: ko
  text: 그 후에 끝이 옵니다. 그때에 그분께서 모든 통치와 모든 권세와 능력을 폐하시고, 나라를 하나님 아버지께 넘겨드리실 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέλος
  english_pob_choice: the end
  chosen_korean: 끝
  alternatives_korean:
