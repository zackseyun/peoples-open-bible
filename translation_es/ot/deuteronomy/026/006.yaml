review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la secuencia de tres acciones del hebreo: וַיָּרֵעוּ, וַיְעַנּוּנוּ, y וַיִּתְּנוּ עָלֵינוּ עֲבֹדָה קָשָׁה. También mantiene correctamente el sujeto definido הַמִּצְרִים como ''los egipcios''. Sin embargo, la nota [c] del inglés fue mal trasladada: en el audit trail inglés la alternativa ''imposed harsh labor on us'' corresponde a toda la cláusula final, no a ''hard labor'' aislado, y el borrador español la convierte en ''una carga pesada'', que desplaza el significado de עֲבֹדָה desde ''labor/trabajo'' hacia ''carga''.'
  spanish_quality_summary: El texto es natural y claro en español eclesial moderno. 'Nos trataron mal' y 'nos afligieron' funcionan bien como verbos diferenciados. El punto más débil es 'una dura labor', que suena algo menos idiomático que 'trabajo forzado' o 'duro trabajo', pero sigue siendo comprensible. Para una reparación mínima y más fiel al rastro inglés, conviene conservar la cláusula principal y corregir la nota [c].
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. La decisión de distinguir los tres verbos de opresión está bien alineada con la rationale documentada. 'Labor' es aceptable para עֲבֹדָה, pero la nota alternativa debe seguir hablando de 'labor/trabajo', no de 'carga'.
  issues:
  - severity: medium
    issue: La nota [c] introduce 'carga pesada' en lugar de una alternativa sobre 'labor/trabajo duro'.
    rationale: עֲבֹדָה significa labor/trabajo/servicio, no 'carga' como sustantivo principal. Además, la nota inglesa c comenta la cláusula completa 'laid/imposed harsh labor on us', no un cambio semántico a 'burden'.
  - severity: low
    issue: '''Una dura labor'' es algo menos idiomático en español actual que otras opciones posibles.'
    rationale: No es infiel, pero suena un poco calcado. Aun así, puede conservarse en una revisión mínima porque comunica correctamente el sentido.
  revised_spanish_text: Y los egipcios nos trataron mal[a], nos afligieron[b], y nos impusieron una dura labor[c].
  revised_footnotes:
  - marker: a
    text: O 'nos trataron con dureza' para 'nos trataron mal'.
    reason: lexical_alternative
  - marker: b
    text: O 'nos oprimieron' para 'nos afligieron'.
    reason: lexical_alternative
  - marker: c
    text: O 'nos impusieron labor dura' para 'nos impusieron una dura labor'.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es esencialmente fiel y legible, pero se corrige la nota [c] para reflejar con precisión el campo semántico de עֲבֹדָה קָשָׁה y el alcance de la alternativa documentada en el audit trail inglés.
