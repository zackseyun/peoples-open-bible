review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien los tres elementos del encabezado hebreo: לַמְנַצֵּחַ como instrucción musical, מִזְמוֹר como «Salmo», y לְדָוִד como «de David». También conserva correctamente en nota la ambigüedad de לְדָוִד («por / para David»). Sin embargo, el marcador de nota está mal anclado en «el» dentro de «Para el[a] director del coro», cuando la nota explica «de David».'
  spanish_quality_summary: 'El español es claro y natural, pero la colocación del marcador de nota genera confusión y rompe la correspondencia entre texto y nota. Además, «Salmo de David» suena mejor con artículo indefinido en paralelo con el inglés auditado y con el carácter de encabezado: «Un salmo de David».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Director del coro» es una opción española aceptable para לַמְנַצֵּחַ; «Salmo» para מִזְמוֹר y «de David» para לְדָוִד siguen correctamente la pauta auditada. La excepción necesaria es solo el reanclaje de la nota a «David[a]».
  issues:
  - severity: high
    issue: Marcador de nota anclado al término equivocado
    rationale: La nota [a] trata la ambigüedad de לְדָוִד («de / por / para David»), no la expresión «Para el director del coro». Debe colocarse junto a «David», como en la auditoría inglesa revisada.
  - severity: low
    issue: Falta de artículo en «Salmo de David»
    rationale: Aunque «Salmo de David» no es incorrecto, «Un salmo de David» reproduce mejor la estructura encabezatoria del original y del texto inglés auditado («A psalm of David»), y suena más natural en español bíblico contemporáneo.
  revised_spanish_text: Para el director del coro. Un salmo de David[a].
  revised_footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al sintagma «de David», que es donde reside la ambigüedad del hebreo לְדָוִד. Además, se ajusta «Salmo» a «Un salmo» para reflejar con mayor fidelidad y naturalidad la forma encabezatoria auditada.
