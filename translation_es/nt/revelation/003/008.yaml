review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro POB en casi todos los elementos: «Conozco tus obras», «he puesto delante de ti una puerta abierta», la cláusula causal con «porque», «has guardado mi palabra» y «no has negado mi nombre» preservan adecuadamente el sentido y la tensión teológica. También mantiene bien la imagen literal de la puerta abierta sin interpretarla. La única desviación significativa está en la nota de ἰδού: la alternativa «Mira aquí» no refleja bien el uso discursivo del griego ni el audit trail inglés, que ofrece alternativas equivalentes a «He aquí / Mira / Mira bien» pero no una expresión locativa.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. La sintaxis funciona bien y evita calcos innecesarios. «Mira» es una buena opción principal para ἰδού. El texto no requiere cambios mayores; solo conviene reparar la nota para que sea más fiel y útil. Como mejora menor de estilo, «la cual» podría explicitar la referencia a «puerta», pero «que nadie puede cerrar» sigue siendo correcto y natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/esclavo u otros términos sensibles del glosario. Las decisiones para λόγος -> «palabra», δύναμις -> «fuerza» y ἀρνέομαι -> «negar» están alineadas con el audit trail y son adecuadas en español.
  issues:
  - severity: medium
    issue: La nota al pie ofrece «Mira aquí» como alternativa para ἰδού.
    rationale: ἰδού es un marcador de atención, no un adverbio locativo. «Mira aquí» introduce un matiz espacial ausente en el griego y no sigue la rationale del POB inglés. Debe sustituirse por una alternativa como «He aquí» o una explicación de «Mira» como llamada de atención.
  revised_spanish_text: Conozco tus obras. Mira[a], he puesto delante de ti una puerta abierta, que nadie puede cerrar, porque tienes poca fuerza, y has guardado mi palabra, y no has negado mi nombre.
  revised_footnotes:
  - marker: a
    text: O «He aquí». El griego funciona como llamado de atención; la traducción principal usa «Mira» por ser más natural en español.
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y natural; solo se corrige la nota al pie para eliminar una alternativa impropia («Mira aquí») y alinearla con la función discursiva de ἰδού y con el audit trail inglés.
