revisions:
- from: Pero ellos se burlaron de sus mensajeros[a], y siempre que el Señor hablaba, se entretenían escarneciendo a sus profetas, hasta que, en su ira contra su nación por causa de sus actos impíos[b], ordenó hacer subir contra ellos a los reyes de los caldeos.
  to: Pero ellos se burlaron de sus mensajeros[a], y siempre que Yahvé hablaba, se burlaban de sus profetas, hasta que, en su ira contra su nación por causa de sus actos impíos[b], ordenó que los reyes de los caldeos subieran contra ellos.
  rationale: 'Se cambió «el Señor» por «Yahvé» para alinearlo con la terminología del proyecto para el nombre divino. También se suavizaron dos giros poco naturales: «se entretenían escarneciendo» pasó a «se burlaban de», y «ordenó hacer subir» a «ordenó que ... subieran contra ellos», manteniendo el sentido de burla reiterada y de avance militar ordenado.'
