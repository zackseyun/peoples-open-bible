translation:
  language: es
  text: Aun en el camino, cuando el necio anda, su corazón carece de juicio, y dice a todos que es un necio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y dice a todos: “Él es un necio.”» El hebreo puede entenderse de dos maneras: que el necio se delata a sí mismo como necio, o que llama necio a otro; el contexto favorece la primera.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - También
  - Además
  lexicon: HALOT
  rationale: Introduce una observación adicional con énfasis leve. «Incluso» comunica esa suma enfática de manera natural en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la calle
  - por el camino
  lexicon: HALOT
  rationale: La imagen espacial de un trayecto o esfera pública se conserva mejor con «en el camino», que suena natural y amplia en español.
- source_word: כשהסכל
  english_pob_choice: when the fool
  chosen_spanish: cuando el necio
  alternatives_spanish:
  - cuando el insensato
  - al necio
  lexicon: HALOT
  rationale: El término hebreo סָכָל se refleja con «necio», que mantiene el valor sapiencial y evita suavizar la fuerza del sustantivo.
- source_word: הֹלֵךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - va
  lexicon: HALOT
  rationale: «Anda» conserva el movimiento continuo del participio hebreo y funciona bien en contexto proverbial.
- source_word: לִבּוֹ חָסֵר
  english_pob_choice: his heart lacks sense
  chosen_spanish: le falta el corazón de juicio
  alternatives_spanish:
  - su corazón carece de juicio
  - le falta juicio en el corazón
  - le falta entendimiento
  lexicon: HALOT
  rationale: 'Se preserva la metáfora de לֵב como sede de juicio/entendimiento. «Corazón de juicio» intenta retener la tensión entre literalidad y sentido: no se borra el «corazón», pero se explicita que la falta es de discernimiento, no solo de emoción.'
- source_word: וְאָמַר
  english_pob_choice: and he says
  chosen_spanish: y dice
  alternatives_spanish:
  - y afirma
  - y declara
  lexicon: HALOT
  rationale: Verbo simple y directo, adecuado para continuar la secuencia proverbial sin cargar el tono.
- source_word: לַכֹּל
  english_pob_choice: to everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todos los que encuentra
  lexicon: HALOT
  rationale: «A todos» es la forma más natural y compacta en español para el alcance colectivo del hebreo.
- source_word: סָכָל הוּא
  english_pob_choice: that he is a fool
  chosen_spanish: que es un necio
  alternatives_spanish:
  - que es un tonto
  - que él mismo es un necio
  - que es insensato
  lexicon: HALOT
  rationale: 'La lectura principal sigue la POB inglesa: el hablante se delata a sí mismo como necio. «Necio» conserva el registro sapiencial y la fuerza nominal del hebreo mejor que «tonto» o el adjetivo «insensato».'
theological_decisions:
- issue: 'Ambigüedad de la última cláusula: autodescubrimiento de necedad vs. llamar necios a otros'
  english_pob_reading: The Hebrew may be taken either as the fool exposing himself as a fool, or as him calling others fools; the former best fits the context of self-disclosing folly.
  chosen_spanish_reading: 'La cláusula se traduce de modo que el necio queda expuesto como tal: «dice a todos que es un necio».'
  alternative_spanish_readings:
  - 'y dice a todos: «¡Eres un necio!»'
  - y dice a todos que son necios
  rationale: La sintaxis española sigue la solución contextual preferida por la POB inglesa, evitando fijar la frase en la alternativa menos probable. Así se conserva la tensión interpretativa sin forzar una lectura polémica.
  doctrine_reference: Sabiduría bíblica; pragmática del discurso proverbio-sapiencial
translation_notes:
  revision_awareness: La POB inglesa revisó la frase sobre לִבּוֹ חָסֵר desde una formulación más abstracta a «his heart lacks sense» para acercarse más al hebreo. La redacción española sigue esa revisión manteniendo el término «corazón» y añadiendo «de juicio» para hacerla inteligible y fiel al giro sapiencial.
  spanish_consistency_notes:
  - Se mantiene «necio» como equivalente constante de סָכָל en tono sapiencial.
  - «Corazón» se conserva para לֵב, en línea con el uso bíblico del centro de la facultad de juicio.
  - La nota textual se ancla solo en la ambigüedad realmente documentada en el aparato inglés; no se añaden variantes no atestiguadas.
