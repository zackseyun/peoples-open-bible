translation:
  language: es
  text: Y los que queden entre ustedes se consumirán[a] por su iniquidad en las tierras de sus enemigos; y también, por las iniquidades de sus padres, con ellos[b], se consumirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se desgastarán», «se pudrirán» o «se irán consumiendo»; el verbo hebreo comunica consumirse o decaer bajo juicio.
    reason: lexical_alternative
  - marker: b
    text: «Con ellos» puede significar que las iniquidades de sus padres permanecen con ellos, o que ellos se consumen junto con esas iniquidades ancestrales que todavía los afectan.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַנִּשְׁאָרִים
  english_pob_choice: those of you who remain
  chosen_spanish: los que queden entre ustedes
  alternatives_spanish:
  - los que permanezcan entre ustedes
  - los sobrevivientes de entre ustedes
  lexicon: HALOT
  rationale: El participio indica a los que quedan como remanente después del juicio. «Los que queden entre ustedes» conserva la idea de resto/remanente y expresa con naturalidad la referencia al pueblo tratado en segunda persona.
- source_word: בָּכֶם
  english_pob_choice: of you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de ustedes
  - en ustedes
  lexicon: HALOT
  rationale: La relación del participio con el grupo адресado se expresa bien con «entre ustedes», que en español evita una formulación pesada y mantiene la idea de remanente dentro del pueblo al que se habla.
- source_word: יִמַּקּוּ
  english_pob_choice: will waste away
  chosen_spanish: se consumirán
  alternatives_spanish:
  - se marchitarán
  - se desharán
  - se pudrirán
  lexicon: HALOT
  rationale: El nifal de מקק en contextos de maldición de pacto comunica descomposición, desgaste o consumirse bajo juicio. «Se consumirán» es una opción natural en español y conserva esa fuerza de deterioro sin suavizarla.
- source_word: בַּעֲוֺנָם
  english_pob_choice: because of their iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - a causa de su iniquidad
  - por su culpa
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa y la carga de la culpa. «Por su iniquidad» mantiene el valor judicial del término y la relación causal del hebreo sin introducir explicación adicional.
- source_word: בְּאַרְצֹת אֹיְבֵיכֶם
  english_pob_choice: in the lands of your enemies
  chosen_spanish: en las tierras de sus enemigos
  alternatives_spanish:
  - en las tierras de sus enemigos
  - en los territorios de sus enemigos
  lexicon: HALOT
  rationale: El plural constructo se refleja mejor con «tierras». «Sus enemigos» sigue al destinatario plural del versículo y conserva el tono de exilio del texto.
- source_word: וְאַף
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - y aun
  - y además
  lexicon: HALOT
  rationale: La partícula añade continuidad e intensificación. «Y también» reproduce la fuerza acumulativa del hebreo de modo claro y sobrio.
- source_word: בַּעֲוֺנֹת אֲבֹתָם
  english_pob_choice: because of the iniquities of their fathers
  chosen_spanish: por las iniquidades de sus padres
  alternatives_spanish:
  - a causa de las iniquidades de sus padres
  - por las culpas de sus padres
  lexicon: HALOT
  rationale: Se mantiene el plural «iniquidades» y se traduce אבותם como «padres», que es la equivalencia directa y más fiel aquí. No se sustituye por «antepasados» para no perder el lenguaje genealógico del texto.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - sobre ellos
  lexicon: HALOT
  rationale: La preposición es breve y algo ambigua en cuanto a si las iniquidades permanecen con ellos o si ellos mismos se consumen junto con ese peso heredado. «Con ellos» preserva esa apertura interpretativa.
- source_word: יִמָּקּוּ
  english_pob_choice: will waste away
  chosen_spanish: se consumirán
  alternatives_spanish:
  - se desharán
  - se marchitarán
  lexicon: HALOT
  rationale: La repetición del verbo al final del versículo se mantiene con la misma traducción para reflejar la estructura hebrea y la insistencia del juicio.
theological_decisions:
- issue: Lenguaje de iniquidad heredada e intergeneracional
  english_pob_reading: Retain the text's statement that the remnant wastes away because of their own iniquity and also because of the iniquities of their fathers, without softening or resolving how inherited consequences relate to personal culpability.
  chosen_spanish_reading: Mantener que los que queden se consumirán por su propia iniquidad y también por las iniquidades de sus padres, sin resolver si se trata de culpa heredada, consecuencias heredadas o ambas cosas.
  alternative_spanish_readings:
  - Reducirlo solo a las consecuencias del pecado de los padres
  - Interpretarlo solo como participación en los mismos pecados de los padres
  rationale: El hebreo menciona explícitamente tanto «su iniquidad» como «las iniquidades de sus padres». Además, «con ellos» conserva la ambigüedad de si esas iniquidades los acompañan o si ellos se consumen junto con ese legado. La traducción debe preservar esa tensión.
  doctrine_reference: Preservar la tensión teológica sin armonizarla por paráfrasis.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y quedó sin cambios; por eso el borrador español sigue de cerca su lectura de causa, repetición verbal y ambigüedad en אִתָּם, sin introducir aclaraciones doctrinales no presentes en el fuente.
  spanish_consistency_notes:
  - Se conservó el mismo verbo «se consumirán» en ambas ocurrencias de יִמַּקּוּ para reflejar la repetición del hebreo.
  - Se mantuvo «padres» para אבותם, en coherencia con el valor genealógico directo del término.
  - No se añadió nota al texto porque no había una alternativa española que requiriera anclaje puntual en este versículo.
