  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ταύτας οὖν ἔχοντες τὰς ἐπαγγελίας, ἀγαπητοί, καθαρίσωμεν ἑαυτοὺς ἀπὸ παντὸς μολυσμοῦ σαρκὸς καὶ πνεύματος, ἐπιτελοῦντες ἁγιωσύνην ἐν φόβῳ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/007/001.yaml
  text: Therefore, since we have these promises, beloved, let us cleanse ourselves from every defilement of flesh and spirit, bringing holiness to completion in the fear of God.
  footnotes:
  - marker: a
    text: Or 'from every impurity of body and spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'perfecting holiness in the fear of God.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'fear of God' carries the sense of reverent awe before God, not mere terror.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 사랑하는 자 여러분, 우리에게 이런 약속이 있으니, 육과 영의 모든 더러움에서 우리 자신을 깨끗하게 하고, 하나님을 두려워하는 가운데 거룩함을 온전히 이루어 가십시다.
  philosophy: optimal-equivalence
