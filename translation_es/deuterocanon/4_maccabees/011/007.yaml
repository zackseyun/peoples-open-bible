lexical_decisions:
- source_word: εἴπερ
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si realmente
  - puesto que en verdad
  lexicon: LSJ
  rationale: Conserva la fuerza condicional con matiz enfático y polémico. 'Si en verdad' suena natural en español y mantiene el desafío retórico.
- source_word: ἠσθάνου
  english_pob_choice: you had ... feeling/awareness
  chosen_spanish: tenías sentimientos
  alternatives_spanish:
  - percibías
  - tenías conciencia
  - sentías
  lexicon: LSJ
  rationale: El verbo αἰσθάνομαι puede abarcar percepción o sentir. En este contexto, 'sentimientos' comunica experiencia afectiva sin convertirlo en mera cognición.
- source_word: ἀνθρώπους πόθων
  english_pob_choice: human feelings of desire
  chosen_spanish: humanos de deseo
  alternatives_spanish:
  - humanos anhelos
  - humanos deseos
  - de deseo humano
  lexicon: LSJ
  rationale: El griego presenta un giro adjetival compacto; en español, 'sentimientos humanos de deseo' conserva la relación entre lo humano y el deseo, evitando una paráfrasis excesiva.
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: LSJ
  rationale: '''Esperanza'' es la equivalencia directa y natural en español, manteniendo el tono sobrio del texto.'
- source_word: παρὰ θεῷ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - con Dios
  - de Dios
  - ante Dios
  lexicon: LSJ
  rationale: '''De parte de Dios'' refleja con naturalidad la idea de procedencia o fuente. ''De Dios'' también sería posible, pero ''de parte de'' hace explícita la relación sin sonar brusco.'
- source_word: σωτηρίου
  english_pob_choice: for deliverance
  chosen_spanish: para la liberación
  alternatives_spanish:
  - para la salvación
  - para el rescate
  lexicon: LSJ
  rationale: En este contexto martirial, 'liberación' expresa el rescate esperado sin imponer de inmediato una carga doctrinal posterior. 'Salvación' queda como alternativa válida.
theological_decisions:
- issue: σωτηρίου en contexto de martirio y esperanza divina
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: El verso habla de una esperanza concreta de intervención divina frente al sufrimiento. 'Liberación' mantiene el sentido inmediato y deja abierta la resonancia salvífica sin resolverla de antemano.
  doctrine_reference: 'Translation philosophy: preserve source-level tension; do not over-systematize salvation language'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que prefirió un lenguaje más natural para αἰσθάνομαι + πόθων. En español se optó por una solución igualmente natural, manteniendo el matiz afectivo y la tensión condicional del griego.
  spanish_consistency_notes:
  - Se mantiene 'Dios' como equivalente de θεῷ, conforme al criterio del proyecto.
  - '''Liberación'' preserva la apertura semántica de σωτηρίου sin cerrar el sentido únicamente en clave doctrinal.'
  - La nota al pie recoge la alternativa 'salvación' porque el griego permite ambas lecturas y el inglés POB también la documenta.
