translation:
  language: es
  text: 'Yo digo[a]: guarda[b] el mandato del rey, por causa de tu juramento[c] ante Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Guarda el mandato del rey, y por causa del juramento de Dios»; el hebreo es comprimido y puede leerse con una sintaxis ligeramente distinta.'
    reason: alternative_reading
  - marker: b
    text: Lit., «la boca del rey».
    reason: lexical_alternative
  - marker: c
    text: «Tu juramento ante Dios» también puede entenderse como «juramento a Dios» o «el juramento de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I say
  chosen_spanish: Yo digo
  alternatives_spanish:
  - Yo
  - Yo mismo digo
  lexicon: HALOT
  rationale: El hebreo inicia de forma abrupta con el pronombre independiente. En español, solo «Yo» suena demasiado elíptico; «Yo digo» suplanta la mínima elipsis verbal implícita y conserva la afirmación personal del hablante sin añadir contenido ajeno.
- source_word: פִּי מֶלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: el mandato del rey
  alternatives_spanish:
  - la boca del rey
  - la palabra del rey
  - la orden del rey
  lexicon: HALOT
  rationale: La expresión literal «la boca del rey» es idiomática para lo que el rey pronuncia. En español, «mandato del rey» comunica con naturalidad la fuerza autoritativa del dicho real y evita un calco poco transparente.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - guarda bien
  - observa
  - obedece
  lexicon: HALOT
  rationale: El verbo hebreo abarca «guardar, observar, mantener». «Guarda» conserva esa amplitud y deja que el complemento real lleve la idea de obediencia, tal como ocurre en el inglés POB.
- source_word: וְעַל / דִּבְרַת
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - por causa de
  - a causa de
  - en razón de
  lexicon: HALOT
  rationale: La secuencia está sintácticamente comprimida. «Por» expresa de manera breve la base o motivo de la orden sin forzar una reconstrucción excesiva; en una nota se conserva la posibilidad de leer la conexión como una coordinación con «y por».
- source_word: שְׁבוּעַת אֱלֹהִים
  english_pob_choice: your oath before God
  chosen_spanish: el juramento de Dios
  alternatives_spanish:
  - tu juramento ante Dios
  - el juramento ante Dios
  - el juramento a Dios
  lexicon: HALOT
  rationale: El hebreo admite varias relaciones de constructo. Dado que la forma masorética no explicita un pronombre, y el inglés POB preserva la tensión entre varias lecturas, se opta en el texto por una formulación literal y abierta, «el juramento de Dios», que mantiene la ambigüedad entre juramento relacionado con Dios, ante Dios o perteneciente a Dios.
theological_decisions:
- issue: Relación entre obediencia al rey y el juramento delante/de Dios
  english_pob_reading: an oath made by the hearer in God's presence, grounding obedience to the king
  chosen_spanish_reading: un juramento relacionado con Dios que fundamenta la obediencia al rey
  alternative_spanish_readings:
  - un juramento hecho ante Dios
  - un juramento hecho a Dios
  - el juramento de Dios
  rationale: El verso es sintácticamente comprimido y no resuelve por sí mismo la relación exacta del juramento con Dios. La traducción española conserva esa tensión en vez de cerrarla; así se mantiene la conexión entre la autoridad real y la responsabilidad religiosa sin imponer una lectura doctrinal más fuerte que la evidencia textual.
  doctrine_reference: Preservar la tensión textual y teológica del pasaje
translation_notes:
  revision_awareness: Se siguió el alto acuerdo del audit trail inglés sin aplicar revisiones adicionales; la redacción española conserva la compresión sintáctica del hebreo y la ambigüedad del constructo final.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se prefirió «mandato» para el sentido idiomático de פִּי מֶלֶךְ, evitando la calca «boca del rey» en el texto principal.
  - Se evitó convertir el pasaje en una explicación doctrinal; la ambigüedad del hebreo se deja visible en nota.
