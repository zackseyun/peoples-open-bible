translation:
  language: es
  text: Que tu mano sea levantada sobre tus adversarios[a], y que todos tus enemigos sean destruidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu mano será levantada sobre tus adversarios, y todos tus enemigos serán destruidos». Los imperfectos hebreos también pueden leerse como enunciados futuros.'
    reason: alternative_reading
lexical_decisions:
- source_word: תָּרֹם
  english_pob_choice: be lifted up
  chosen_spanish: sea levantada
  alternatives_spanish:
  - sea exaltada
  - se alce
  - suba
  lexicon: HALOT
  rationale: El verbo רוּם en este contexto, con 'mano' como sujeto, expresa elevación victoriosa o superioridad. 'Sea levantada' conserva la imagen concreta y la pasiva/ingresiva que refleja bien el hebreo; 'sea exaltada' suena más abstracto y menos imagético en español.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano derecha
  - tu brazo
  - tu poder
  lexicon: HALOT
  rationale: La traducción literal mantiene la imagen corporal del texto hebreo, que en español es natural y comunica poder o fuerza sin explicitar más de lo que el verso dice.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' reproduce el valor vertical y de superioridad que la audit trail inglesa destacó con ''over''. ''Contra'' sería posible, pero desplaza el matiz de elevación sobre los adversarios.'
- source_word: צָרֶיךָ
  english_pob_choice: your adversaries
  chosen_spanish: tus adversarios
  alternatives_spanish:
  - tus enemigos
  - tus opositores
  - los que te hostigan
  lexicon: HALOT
  rationale: Se conserva la distinción frente al segundo hemistiquio, donde aparece 'enemigos'. 'Adversarios' refleja el sentido de opositores o hostiles sin repetir el mismo término.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y cada uno de
  - y todo
  lexicon: HALOT
  rationale: Equivale de manera directa y conserva la totalidad enfática del hebreo.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - tus foes
  - los que te odian
  lexicon: HALOT
  rationale: Es el equivalente habitual de אֹיֵב y mantiene la distinción léxica con צָרֶיךָ. La forma plural expresa el alcance total del juicio anunciado.
- source_word: יִכָּרֵתוּ
  english_pob_choice: be cut off
  chosen_spanish: sean cortados
  alternatives_spanish:
  - sean destruidos
  - sean exterminados
  - sean eliminados
  lexicon: HALOT
  rationale: '''Ser cortados'' preserva la metáfora verbal hebrea y su resonancia judicial/covenantal, evitando intensificar indebidamente el modo de destrucción.'
theological_decisions:
- issue: Fuerza modal de los imperfectos hebreos en el contexto profético
  english_pob_reading: May your hand... and may all your enemies...
  chosen_spanish_reading: Que tu mano sea levantada... y que todos tus enemigos sean cortados.
  alternative_spanish_readings:
  - Tu mano será levantada... y todos tus enemigos serán cortados.
  - Que tu mano se levante... y que todos tus enemigos sean destruidos.
  rationale: El hebreo imperfecto puede leerse con matiz volitivo o como futuro profético. En español, 'que' conserva bien el valor desiderativo/suplicatorio sin negar la certeza profética. Se evita 'serán' como opción principal porque pierde el matiz que el POB inglés preservó con 'May'.
  doctrine_reference: Gramática verbal profética y modalidad jussiva/optativa en textos poéticos y oraculares
- issue: Relación semántica entre 'adversarios' y 'enemigos'
  english_pob_reading: adversaries ... enemies
  chosen_spanish_reading: adversarios ... enemigos
  alternative_spanish_readings:
  - enemigos ... enemigos
  - opositores ... enemigos
  rationale: 'Se mantiene la distinción que el inglés auditado quiso conservar: el primer término es más general o relacional, y el segundo más directo y hostil. Esto preserva el paralelismo sin aplanarlo.'
  doctrine_reference: Paralelismo semítico y diferenciación léxica en poesía hebrea
translation_notes:
  revision_awareness: 'Coincide con la última revisión del contexto inglés: no se requieren cambios adicionales; se mantiene la decisión de traducir los imperfectos con matiz optativo/future-like y la distinción léxica entre ''adversarios'' y ''enemigos''.'
  spanish_consistency_notes:
  - Se usa 'tus' de forma uniforme para las dos direcciones del paralelismo.
  - Se evita 'SEÑOR' u otra convención de sustitución porque el versículo no contiene el nombre divino.
  - La puntuación reproduce dos miembros paralelos unidos por coma y 'y', como en el hebreo poético.
