  to: Los aventarás[a], y el viento los llevará, y la tormenta los esparcirá; pero tú te alegrarás en Yahvé[b]; en el Santo de Israel te gloriarás[c].
  rationale: 'Se recomienda una reparación puntual: sustituir «te jactarás» por «te gloriarás» para reflejar con fidelidad el sentido positivo de תִּתְהַלָּל en este contexto y evitar una connotación española de arrogancia censurable. Se mantiene el resto del versículo, incluida la nota sobre «aventarás» y el uso de «Yahvé». La nota [c] se ajusta para ofrecer una alternativa natural y semánticamente cercana al rastro inglés (''you will glory in'' / posibilidad de solapar con el gozo en el Santo de Israel).'
