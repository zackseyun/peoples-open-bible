translation:
  language: es
  text: Por eso llamó a aquel lugar Beerseba[a], porque allí los dos hicieron juramento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Beerseba» suena en hebreo tanto como «pozo de siete» como «pozo de juramento»; aquí la explicación del relato vincula el nombre especialmente con el juramento hecho allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: HALOT
  rationale: La expresión hebrea introduce una consecuencia o explicación causal. «Por eso» conserva esa relación de manera natural en español moderno, sin volver el texto demasiado formal.
- source_word: קָרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - llamó a
  lexicon: HALOT
  rationale: En este contexto el verbo funciona como acto de nombrar un lugar. «Llamó» expresa con claridad el hecho de dar nombre sin forzar una paráfrasis.
- source_word: לַמָּקוֹם הַהוּא
  english_pob_choice: that place
  chosen_spanish: a aquel lugar
  alternatives_spanish:
  - a ese lugar
  - a ese sitio
  lexicon: HALOT
  rationale: El demostrativo hebreo subraya un lugar ya identificado en el relato. «Aquel» preserva la distancia narrativa y suena natural en español.
- source_word: בְּאֵר שָׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beerseba
  - Beersheba
  lexicon: HALOT
  rationale: Como nombre propio de lugar, se translitera de forma estable en español. «Beerseba» es la forma tradicional y ampliamente reconocible, y permite mantener el juego de palabras con la explicación siguiente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del nombre del lugar. «Porque» es la correspondencia directa y natural en español.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo apunta al sitio donde ocurrió el juramento. «Allí» mantiene la referencia espacial con claridad.
- source_word: נִשְׁבְּעוּ
  english_pob_choice: swore an oath
  chosen_spanish: juraron
  alternatives_spanish:
  - hicieron juramento
  - prestaron juramento
  lexicon: HALOT
  rationale: El hebreo tiene la fuerza de jurar solemnemente; en español, «juraron» comunica esa acción de manera natural. El contexto de nombre explicativo ya aporta la solemnidad del juramento sin necesidad de una frase más larga.
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos entre sí
  lexicon: HALOT
  rationale: La forma dual indica claramente a las dos partes implicadas. «Los dos» conserva esa referencia sin añadir elementos no presentes en el hebreo.
translation_notes:
  revision_awareness: 'Alineado con la auditoría inglesa: se conserva la lógica causal de עַל כֵּן, el valor nominal de קָרָא, la referencia demostrativa de לַמָּקוֹם הַהוּא, y el juego de palabras asociado a בְּאֵר שָׁבַע mediante una nota breve. No se detectaron revisiones pendientes en el pass más reciente.'
  spanish_consistency_notes:
  - Se usó «Beerseba» como forma de nombre propio estable en español, con nota explicativa para el trasfondo hebreo.
  - Se evitó una expansión interpretativa como «hicieron un juramento» para no sobretraducir el hebreo.
  - «Los dos» mantiene el énfasis dual del texto fuente.
  - La puntuación sigue un registro bíblico claro y publicable, con coma causal antes de la cláusula explicativa.
