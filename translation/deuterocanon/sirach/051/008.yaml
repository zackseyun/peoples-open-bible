theological_decisions:
- issue: Rendering of חסד in a context of divine saving action
  chosen_reading: his acts of covenant faithfulness
  alternative_readings:
  - his steadfast love
  - his loyal love
  - his kindnesses
  rationale: The verse recalls YHWH's long-standing saving character and immediately explains it with deliverance and redemption. Rendering חסד with covenantal weight best reflects the theological force of God's loyal saving action while still sounding natural in English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Temporal force of מֵעוֹלָם
  chosen_reading: from of old
  alternative_readings:
  - from everlasting
  - from eternity
  rationale: The phrase can be heard either as ancient continuity or everlasting duration. The context emphasizes remembered historical divine action, so 'from of old' preserves the tension without forcing a stronger metaphysical claim than the verse itself requires.
  doctrine_reference: Translation philosophy §3
