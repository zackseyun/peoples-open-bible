translation:
  language: es
  text: No están en la aflicción del hombre mortal[a], ni son afligidos junto con la humanidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''No están en el trabajo penoso del hombre, ni son golpeados junto con la humanidad.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲמַל
  english_pob_choice: in the trouble of
  chosen_spanish: en el trabajo de
  alternatives_spanish:
  - en el afán de
  - en la aflicción de
  - en la dificultad de
  lexicon: HALOT
  rationale: עָמָל puede abarcar ‘trabajo’, ‘fatiga’ o ‘penalidad/trabajo penoso’. En este verso, la idea es que los impíos no comparten la carga penosa que afecta a otros. ‘Trabajo’ conserva el campo semántico de labor/fatiga sin volverlo demasiado interpretativo; el contexto de lamento permite la connotación de esfuerzo o penuria.
- source_word: אֱנוֹשׁ
  english_pob_choice: mortal man
  chosen_spanish: mortal hombre
  alternatives_spanish:
  - hombre mortal
  - ser humano mortal
  - humano mortal
  lexicon: HALOT
  rationale: אֱנוֹשׁ subraya la fragilidad humana. En español, ‘mortal’ delante de ‘hombre’ preserva esa nota de finitud. Se mantiene la distinción con אָדָם en la segunda cola, que apunta más genéricamente a la humanidad.
- source_word: אֵינֵמוֹ
  english_pob_choice: they are not
  chosen_spanish: no están
  alternatives_spanish:
  - no les toca
  - no les acontece
  - no tienen
  lexicon: HALOT
  rationale: La construcción negativa con sufijo pronominal se expresa de manera natural en español como ‘no están’ para comunicar la ausencia de esa condición o carga en ellos, sin añadir una perífrasis extraña al ritmo poético.
- source_word: וְעִם
  english_pob_choice: with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al lado de
  lexicon: HALOT
  rationale: La preposición marca asociación/compañía. ‘Junto con’ reproduce esa relación de manera clara en español y mantiene el paralelo con la primera cola.
- source_word: אָדָם
  english_pob_choice: mankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el género humano
  - los hombres
  - mankind
  lexicon: HALOT
  rationale: אָדָם aquí es genérico y colectivo. ‘La humanidad’ evita una lectura exclusivamente masculina y conserva el alcance universal del término.
- source_word: יְנֻגָּעוּ
  english_pob_choice: are plagued
  chosen_spanish: son castigados
  alternatives_spanish:
  - son afligidos
  - son golpeados
  - son heridos
  lexicon: HALOT
  rationale: 'De נגע en voz pasiva/intensiva: ‘ser tocado/golpeado/afligido’. ‘Castigados’ comunica el impacto adverso que el contexto describe y funciona bien en español poético, aunque pierde algo de la imagen física de ‘golpeados’ o ‘afligidos’. Se conserva la tensión lexical sin imponer un sentido demasiado técnico.'
theological_decisions:
- issue: Alcance de ‘אָדָם’ en paralelo con ‘אֱנוֹשׁ’
  english_pob_reading: mankind
  chosen_spanish_reading: la humanidad
  alternative_spanish_readings:
  - los hombres
  - el género humano
  rationale: No se trata de varones individualizados sino de una referencia genérica a la condición humana. ‘La humanidad’ mantiene ese alcance colectivo y evita masculinizar indebidamente el verso.
  doctrine_reference: Antropología bíblica / uso genérico de ‘adam’
- issue: Imagen de ausencia de aflicción o juicio
  english_pob_reading: they are not plagued with mankind
  chosen_spanish_reading: no son castigados junto con la humanidad
  alternative_spanish_readings:
  - no son afligidos junto con la humanidad
  - no sufren con la humanidad
  rationale: El hebreo permite la idea de ser alcanzados por golpes/aflicciones. ‘Castigados’ comunica de manera comprensible que no comparten la suerte dolorosa del resto, sin convertir el verso en una afirmación doctrinal sobre retribución divina específica.
  doctrine_reference: Teología poética de la prosperidad aparente de los impíos
translation_notes:
  revision_awareness: La redacción española sigue de cerca el último estado auditado en inglés, pero ajusta la sintaxis para sonar natural en español. Se preservó la distinción entre אֱנוֹשׁ (‘mortal’) y אָדָם (‘humanidad’), y se mantuvo el contraste entre la carga penosa y la aflicción compartida. A diferencia del inglés auditado, se evitó ‘plagued’ como calco directo y se optó por ‘castigados’ para una lectura más idiomática, reconociendo que el hebreo también admite ‘afligidos’ como alternativa legítima.
  spanish_consistency_notes:
  - Se usa ‘humanidad’ para אָדָם en sentido genérico colectivo, coherente con el proyecto.
  - Se conserva ‘mortal’ para אֱנוֹשׁ para reflejar fragilidad humana.
  - La nota [a] recoge la alternativa semántica de עָמָל sin saturar el cuerpo principal con opciones.
  - Se mantiene un registro reverente y poético, sin recurrir a formulaciones eclesiásticas rígidas.
