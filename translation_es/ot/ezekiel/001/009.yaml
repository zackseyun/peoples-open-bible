translation:
  language: es
  text: Sus alas estaban unidas[a], cada una con su hermana. Al moverse, no se volvían[b]; cada una iba recto hacia adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «una mujer a su hermana», un modismo que describe partes correspondientes unidas entre sí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada una iba en la dirección de su rostro».'
    reason: alternative_reading
lexical_decisions:
- source_word: חֹבְרֹת
  english_pob_choice: were joined
  chosen_spanish: estaban unidas
  alternatives_spanish:
  - estaban juntadas
  - estaban enlazadas
  - estaban conectadas
  lexicon: HALOT
  rationale: El participio pasivo de חבר expresa unión o conexión estable. «Estaban unidas» conserva el estado resultante y suena natural en español sin perder la idea de enlace físico.
- source_word: אִשָּׁה אֶל אֲחוֹתָהּ
  english_pob_choice: each to her sister
  chosen_spanish: cada una con la otra
  alternatives_spanish:
  - una con la otra
  - cada una a su hermana
  - cada una con su hermana
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente «una mujer a su hermana», y señala partes correspondientes unidas entre sí. En español, «cada una con la otra» comunica la reciprocidad sin introducir innecesariamente la imagen de «hermana», que en castellano puede sonar extraña si se traslada demasiado literalmente.
- source_word: כַּנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - las alas de ellos
  - sus plumas
  lexicon: HALOT
  rationale: Es la correspondencia directa y clara de «their wings». Se mantiene el posesivo plural sin forzar una construcción más pesada.
- source_word: לֹא יִסַּבּוּ
  english_pob_choice: they did not turn
  chosen_spanish: no se volvían
  alternatives_spanish:
  - no giraban
  - no se desviaban
  - no daban vuelta
  lexicon: HALOT
  rationale: El verbo סבב aquí indica girar o cambiar de dirección al avanzar. «No se volvían» preserva la idea de no desviarse y encaja bien con el contexto narrativo-visionario.
- source_word: בְּלֶכְתָּן
  english_pob_choice: as they moved
  chosen_spanish: al moverse
  alternatives_spanish:
  - cuando iban
  - mientras andaban
  - en su caminar
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo indica acción simultánea. «Al moverse» transmite esa simultaneidad de forma natural en español.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada una
  alternatives_spanish:
  - cada uno
  - cada ser
  lexicon: HALOT
  rationale: Aunque el hebreo usa un sustantivo masculino singular distributivo, el contexto inmediato de «alas» pide concordancia femenina en español. «Cada una» conserva el valor distributivo sin perder la referencia a las alas.
- source_word: אֶל עֵבֶר פָּנָיו
  english_pob_choice: straight ahead
  chosen_spanish: derecho hacia adelante
  alternatives_spanish:
  - en la dirección de su rostro
  - hacia el frente
  - en línea recta
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hacia la parte de su rostro», un modo de decir la dirección de avance. «Derecho hacia adelante» comunica el sentido idiomático sin ocultar la fuerza direccional del original.
- source_word: יֵלֵכוּ
  english_pob_choice: went
  chosen_spanish: iban
  alternatives_spanish:
  - andaban
  - seguían
  - marchaban
  lexicon: HALOT
  rationale: El verbo básico es ir/andar. En español, «iban» funciona bien con el imperfecto descriptivo del pasaje y conserva el flujo de la visión.
translation_notes:
  revision_awareness: La revisión más reciente no indicó cambios; el texto se mantiene conforme al pasaje hebreo y al análisis auditado en inglés, con adaptación natural al español para preservar la imagen idiomática y el paralelismo.
  spanish_consistency_notes:
  - Se mantiene «alas» en femenino plural para concordar con el contexto inmediato y evitar una discordancia artificial.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino ni un equivalente contextual.
  - «Derecho hacia adelante» conserva la lectura idiomática de dirección, mientras la nota ofrece la alternativa más literal para transparencia auditora.
  - La formulación «cada una con la otra» reproduce la reciprocidad del hebreo sin cargar el verso con una literalidad opaca.
