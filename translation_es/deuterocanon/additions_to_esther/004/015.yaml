lexical_decisions:
- source_word: ἐν δὲ τῷ διαλέγεσθαι
  english_pob_choice: while she was speaking
  chosen_spanish: y mientras ella hablaba
  alternatives_spanish:
  - y mientras conversaba
  - y mientras hablaba
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa simultaneidad temporal. En español, «mientras ella hablaba» comunica de forma natural y fiel ese valor temporal; «conversaba» sería posible, pero añade una matización interpersonal que el contexto inmediato no exige.
- source_word: αὐτήν
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - la
  lexicon: Gramática griega
  rationale: Aunque la forma griega es acusativa, en esta construcción la referencia es a Ester como sujeto del infinitivo en el discurso narrativo. En español conviene explicitar «ella» para conservar claridad sintáctica sin perder la referencia.
- source_word: ἔπεσεν
  english_pob_choice: collapsed
  chosen_spanish: cayó
  alternatives_spanish:
  - se desmayó
  - se desplomó
  - cayó desmayada
  lexicon: BDAG
  rationale: El verbo básico significa «cayó». Dado que el contexto describe un colapso físico, «cayó» mantiene de cerca el griego; «se desplomó» sería más interpretativo, y «se desmayó» ya anticipa más de lo que el verbo por sí solo dice.
- source_word: ἀπὸ ἐκλύσεως
  english_pob_choice: from faintness
  chosen_spanish: por desfallecimiento
  alternatives_spanish:
  - por debilidad
  - por agotamiento
  - en un desmayo
  lexicon: BDAG
  rationale: ἐκλύσις denota debilidad, desfallecimiento o colapso. En español, «por desfallecimiento» conserva la idea causal de ἀπό y refleja bien el estado físico indicado; «por debilidad» es posible, pero menos específico, y «en un desmayo» cambiaría la construcción causal.
translation_notes:
  revision_awareness: El inglés POB revisó «fell from faintness» a «collapsed from faintness» para sonar más natural sin abandonar ἔπεσεν; el español mantiene la imagen verbal básica «cayó» y conserva el matiz causal de ἀπὸ ἐκλύσεως con «por desfallecimiento».
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y narrativo, apto para lectura pública.
  - No se introdujo «Cristo», «Señor» ni otras fórmulas ajenas al pasaje.
  - «Desfallecimiento» conserva mejor la fuerza del sustantivo griego que una simple «debilidad» en este contexto de colapso físico.
