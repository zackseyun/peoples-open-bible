revisions:
- from: La ira[a] del necio se conoce al instante[b], pero el prudente encubre la vergüenza.
  to: El necio da a conocer su ira de inmediato[a], pero el prudente encubre la vergüenza[b].
  rationale: La revisión mejora la naturalidad del español sin apartarse del hebreo ni de la filosofía de equivalencia óptima de la POB. También restaura la alternativa semántica importante del segundo hemistiquio y elimina una nota menos necesaria.
