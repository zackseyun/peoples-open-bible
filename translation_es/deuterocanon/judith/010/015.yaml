translation:
  language: es
  text: 'Y ellos le dijeron: «Has salvado tu vida al apresurarte a bajar a la presencia de nuestro señor. Y ahora acércate a su tienda[a], y algunos de entre nosotros te escoltarán hasta entregarte en sus manos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego σκηνή significa literalmente «tienda» en este contexto militar.
    reason: lexical_alternative
  - marker: b
    text: La expresión «en sus manos» reproduce un modismo griego que puede significar «bajo su control» o «a su custodia».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σέσωκας τὴν ψυχήν σου
  english_pob_choice: You have saved your life
  chosen_spanish: Has salvado tu vida
  alternatives_spanish:
  - Has preservado tu vida
  - Has librado tu vida
  lexicon: LSJ
  rationale: σῴζω con ψυχή en este giro idiomático se refiere a la vida/la persona. «Has salvado tu vida» sigue de cerca la elección inglesa revisada y mantiene la fuerza del perfecto sin oscurecer el sentido idiomático.
- source_word: σπεύσασα καταβῆναι
  english_pob_choice: by hurrying down
  chosen_spanish: al apresurarte a bajar
  alternatives_spanish:
  - al darte prisa en bajar
  - por haberte dado prisa en bajar
  lexicon: LSJ
  rationale: El participio expresa circunstancia o medio; en español, una construcción con infinitivo pronominal resulta natural y conserva la relación causal/circunstancial sin añadir interpretación.
- source_word: εἰς πρόσωπον τοῦ κυρίου ἡμῶν
  english_pob_choice: into the presence of our lord
  chosen_spanish: a la presencia de nuestro señor
  alternatives_spanish:
  - ante nuestro señor
  - frente a nuestro señor
  lexicon: LSJ
  rationale: La idiomática εἰς πρόσωπον se vierte mejor como una expresión de acceso o comparecencia. «Presencia» conserva el matiz cortesano; «señor» se usa aquí para el superior humano, no como título divino.
- source_word: πρόσελθε ἐπὶ τὴν σκηνὴν αὐτοῦ
  english_pob_choice: come to his tent
  chosen_spanish: acércate a su tienda
  alternatives_spanish:
  - ven a su tienda
  - aproxímate a su tienda
  lexicon: LSJ
  rationale: σκηνή en contexto militar es «tienda». «Acércate» reproduce bien el imperativo πρόσελθε sin sonar forzado en español.
- source_word: ἀφʼ ἡμῶν προπέμψουσίν σε
  english_pob_choice: some from among us will escort you
  chosen_spanish: algunos de entre nosotros te escoltarán
  alternatives_spanish:
  - algunos de entre nosotros te acompañarán
  - te conducirán algunos de entre nosotros
  lexicon: LSJ
  rationale: προπέμπω puede ser acompañar/escortar en un tramo. «Escoltarán» expresa el acompañamiento protector implicado por el contexto y corresponde al valor de conducción hacia adelante.
- source_word: ἕως παραδῶσίν σε εἰς χεῖρας αὐτοῦ
  english_pob_choice: until they hand you over into his hands
  chosen_spanish: hasta entregarte en sus manos
  alternatives_spanish:
  - hasta ponerte en sus manos
  - hasta entregarte a su custodia
  lexicon: LSJ
  rationale: παραδίδωμι εἰς χεῖρας es un modismo de entrega a control o custodia. «En sus manos» preserva la imagen concreta; «entregarte» mantiene el verbo de transferencia.
theological_decisions:
- issue: κύριος referido a un superior humano
  english_pob_reading: our lord
  chosen_spanish_reading: nuestro señor
  alternative_spanish_readings:
  - nuestro señor
  - nuestro amo
  rationale: El contexto muestra que κύριος alude a un jefe o superior humano. «Señor» en minúscula conserva el valor social del título sin importar una lectura divina; se evita «SEÑOR» por la regla del proyecto para el nombre divino.
  doctrine_reference: 'DOCTRINE.md: títulos de respeto para κύριος; distinguir uso humano de uso divino por contexto'
- issue: Modismo de entrega «en sus manos»
  english_pob_reading: into his hands
  chosen_spanish_reading: en sus manos
  alternative_spanish_readings:
  - a su poder
  - a su custodia
  rationale: El modismo bíblico se mantiene porque expresa control, dominio o custodia de manera concreta. En español, «en sus manos» es natural y auditable como equivalencia idiomática.
  doctrine_reference: 'DOCTRINE.md: equivalencia idiomática y conservación de imágenes bíblicas'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'spared your life' por 'saved your life' para ajustar más directamente Σέσωκας; la versión española sigue esa corrección con «Has salvado tu vida». También conserva las decisiones estables sobre πρόσωπον ως «presencia», σκηνή como «tienda» y εἰς χεῖρας como «en sus manos», alineadas con el audit trail.
  spanish_consistency_notes:
  - Mantengo «nuestro señor» en minúscula porque aquí κύριος designa a un superior humano, no al nombre divino.
  - Conservo la imagen de «manos» por su peso idiomático y su transparencia auditables.
  - Uso un español sobrio y actual, evitando calcos excesivos pero sin expandir el sentido del versículo.
