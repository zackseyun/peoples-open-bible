translation:
  language: es
  text: Yo soy menor que mis hermanos en edad, pero en entendimiento soy su igual.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: N/A
  rationale: El griego enfatiza el sujeto con Ἐγὼ; en español, 'Yo soy' conserva ese énfasis sin sonar artificial.
- source_word: ἡλικίᾳ
  english_pob_choice: in age
  chosen_spanish: en edad
  alternatives_spanish:
  - en años
  - en estatura
  lexicon: LSJ
  rationale: ἡλικία puede referirse a edad o estatura; aquí el contraste con el hermano hace natural 'edad'.
- source_word: νεώτερος
  english_pob_choice: younger
  chosen_spanish: menor
  alternatives_spanish:
  - más joven
  - más joven que
  lexicon: LSJ
  rationale: '''Menor'' funciona bien en una comparación de edad y suena natural en español bíblico; mantiene la idea de ser de menos edad que los hermanos.'
- source_word: τῶν ἀδελφῶν μου
  english_pob_choice: than my brothers
  chosen_spanish: que mis hermanos
  alternatives_spanish:
  - que mis hermanos varones
  - que mis hermanos
  lexicon: LSJ
  rationale: ἀδελφῶν es masculino plural; 'mis hermanos' reproduce con precisión la referencia fraterna.
- source_word: διανοίᾳ
  english_pob_choice: in understanding
  chosen_spanish: en entendimiento
  alternatives_spanish:
  - en mente
  - en inteligencia
  - en pensamiento
  lexicon: LSJ
  rationale: διανοία aquí expresa capacidad mental o comprensión; 'entendimiento' es claro y fiel al contraste con la edad física.
- source_word: ἡλικιώτης
  english_pob_choice: their equal
  chosen_spanish: su igual
  alternatives_spanish:
  - un par en entendimiento
  - de la misma madurez
  - de igual juicio
  lexicon: LSJ
  rationale: Aunque etimológicamente se relaciona con la edad, en este contraste retórico no puede significar igualdad literal de edad; 'su igual' comunica la equivalencia en entendimiento o madurez que exige el contexto.
theological_decisions:
- issue: Relación entre edad física y madurez mental
  english_pob_reading: Younger in age, but equal in understanding
  chosen_spanish_reading: Menor en edad, pero su igual en entendimiento
  alternative_spanish_readings:
  - más joven en edad, pero igual en entendimiento
  - menor en años, pero de igual juicio
  rationale: El texto contrapone deliberadamente edad biológica con capacidad de discernimiento. La traducción debe preservar esa tensión sin convertir la segunda cláusula en una igualdad literal de edad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: 'El texto griego y la auditoría inglesa concuerdan estrechamente; no se requieren revisiones ni notas textuales. La decisión principal es lexical: elegir un español natural que preserve el contraste entre edad y entendimiento sin perder el énfasis del sujeto.'
  spanish_consistency_notes:
  - Se evita 'Cristo', 'Señor' u otra terminología no presente en el verso.
  - '''Entendimiento'' conserva el campo semántico de διανοία sin sobreinterpretar.'
  - '''Su igual'' mantiene la igualdad funcional en la segunda cláusula, coherente con la lectura inglesa auditada.'
