  to: Y las cámaras laterales se ensancharon[a] al subir, porque la estructura alrededor del templo subía y subía, por todos lados alrededor del templo[b]. Por tanto, el templo tenía mayor anchura hacia arriba, y así se subía desde el piso inferior hasta el superior, pasando por el piso intermedio[c].
