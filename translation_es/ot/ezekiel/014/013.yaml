    issue: '''Hijo de hombre'' en el texto principal'
    rationale: Aunque formalmente cercano, en español bíblico suena menos establecido y menos natural que 'hijo de hombre', que preserva mejor la fórmula vocativa de Ezequiel.
  - severity: medium
