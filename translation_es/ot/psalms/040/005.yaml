translation:
  language: es
  text: Bienaventurado[a] el hombre que ha puesto en Yahvé su confianza, y no ha acudido a los soberbios[b] ni a los que se desvían hacia la falsedad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dichoso». El hebreo אַשְׁרֵי expresa tanto bienaventuranza como felicidad; «Bienaventurado» preserva mejor el tono sapiencial y de pacto.
    reason: lexical_alternative
  - marker: b
    text: O «los arrogantes». El hebreo רְהָבִים se entiende mejor aquí como personas soberbias, no como el nombre propio Rahab.
    reason: lexical_alternative
  - marker: c
    text: O «mentira» o «engaño». El hebreo כָזָב denota falsedad o mentira.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: La fórmula hebrea funciona como exclamación de bienaventuranza. «Bienaventurado» conserva mejor el tono sapiencial y de pacto que «feliz», y suena más natural en un registro bíblico digno que una calca más literal.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: HALOT
  rationale: El sustantivo es masculino singular con fuerza representativa. «El hombre» refleja ese valor sin borrar la forma gramatical del hebreo; «la persona» neutralizaría indebidamente el texto.
- source_word: שָׂם
  english_pob_choice: has made
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha hecho
  - ha establecido
  lexicon: HALOT
  rationale: El hebreo permite la idea de poner/colocar. En español, con «confianza» resulta más natural «ha puesto en Yahvé su confianza» que «ha hecho su confianza».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La consigna del proyecto pide «Yahvé» en el texto principal español para el Tetragrámaton. Se conserva el nombre divino, no una sustitución por título.
- source_word: מִבְטַחוֹ
  english_pob_choice: his trust
  chosen_spanish: su confianza
  alternatives_spanish:
  - su refugio
  - su seguridad
  lexicon: HALOT
  rationale: El sustantivo nombra aquello en lo que uno confía. «Su confianza» mantiene la relación nominal directa y suena idiomático en español.
- source_word: פָנָה אֶל
  english_pob_choice: has not turned to
  chosen_spanish: no se ha vuelto a
  alternatives_spanish:
  - no ha mirado a
  - no ha puesto su atención en
  lexicon: HALOT
  rationale: La expresión idiomática implica volverse con atención o adhesión. «No se ha vuelto a» conserva la imagen direccional sin sobretraducirla.
- source_word: רְהָבִים
  english_pob_choice: the proud
  chosen_spanish: los orgullosos
  alternatives_spanish:
  - los arrogantes
  - los soberbios
  lexicon: HALOT
  rationale: El contexto favorece un nombre común para personas altivas, no el nombre propio Rahab. «Orgullosos» preserva la lectura ética y funciona bien en paralelo con la siguiente cola.
- source_word: וְשָׂטֵי
  english_pob_choice: those who turn aside
  chosen_spanish: los que se apartan
  alternatives_spanish:
  - los que se desvían
  - los que se apartan del camino
  lexicon: HALOT
  rationale: El participio expresa a quienes se desvían o se apartan. «Los que se apartan» mantiene el valor verbal y el paralelo con la frase siguiente.
- source_word: כָזָב
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  - el engaño
  lexicon: HALOT
  rationale: El sustantivo abstracto pide una forma igualmente abstracta. «Falsedad» reproduce bien el matiz de falsehood sin pluralizar innecesariamente.
theological_decisions:
- issue: Beatitud con sujeto masculino singular representativo
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el que
  rationale: Se mantiene la singularidad masculina gramatical del hebreo con fuerza representativa. En español, «el hombre» es la opción más fiel y clara dentro del registro bíblico del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tratamiento del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente; por norma del proyecto, el español debe conservar el nombre divino como «Yahvé» y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Posible referencia a personas soberbias frente al nombre propio Rahab
  english_pob_reading: the proud
  chosen_spanish_reading: los orgullosos
  alternative_spanish_readings:
  - los arrogantes
  - Rahab
  rationale: El contexto y la decisión auditada en inglés favorecen un sustantivo común. Se evita leerlo como el nombre propio Rahab, lo cual añadiría una referencia no requerida por este verso.
  doctrine_reference: HALOT; POB lexical note on רְהָבִים
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado auditado es de alta concordancia y sin modificaciones textuales necesarias. Se mantuvo la decisión de traducir el Tetragrámaton con el nombre propio y de entender רְהָבִים como un sustantivo común.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Se mantuvo el paralelismo hebreo con dos miembros: rechazo de los orgullosos y de los que se apartan hacia la falsedad.'
  - «Bienaventurado» se eligió por su registro bíblico y por captar el valor de beatitud covenantal sin caer en una traducción mecánica.
