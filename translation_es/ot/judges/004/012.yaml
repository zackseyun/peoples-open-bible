- from: 'Y se lo informaron a Sísara: «Barac, hijo de Abinoam, había subido al monte Tabor».'
  to: Y le informaron a Sísara que Barac, hijo de Abinoam, había subido al monte Tabor.
  rationale: Se corrige la puntuación y la sintaxis para reflejar mejor la subordinación introducida por כִּי (‘que’) en vez de convertirla en discurso directo. También se suaviza la expresión verbal a una forma más natural en español narrativo, manteniendo el mismo contenido y orden semántico. No se requieren notas.
