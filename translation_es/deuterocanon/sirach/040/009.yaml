translation:
  language: es
  text: Pestilencia y sangre derramada[a], destrucción[b] y la espada, devastación y ruina, calamidad y muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente «sangre»; se expresa como «sangre derramada» para comunicar el sentido probable de violencia mortal en esta lista de calamidades.
    reason: lexical_alternative
  - marker: b
    text: El hebreo aquí es difícil, y un término (חרחר) es incierto. El paralelo griego dice «muerte y sangre y contienda y espada», lo que podría apoyar «contienda» para ese elemento; aquí se vierte de manera más amplia como «destrucción».
    reason: alternative_reading
lexical_decisions:
- source_word: דבר
  english_pob_choice: Pestilence
  chosen_spanish: Pestilencia
  alternatives_spanish:
  - plaga
  - peste
  lexicon: HALOT
  rationale: En la lista de calamidades, el sentido es de azote o epidemia devastadora. «Pestilencia» conserva el valor de desastre mortal y suena natural en español bíblico contemporáneo.
- source_word: דם
  english_pob_choice: bloodshed
  chosen_spanish: sangre derramada
  alternatives_spanish:
  - sangre
  - derramamiento de sangre
  lexicon: HALOT
  rationale: Aunque literalmente es «sangre», en este catálogo de desastres la idea es violencia mortal. «Sangre derramada» mantiene la imagen concreta y evita la ambigüedad de solo «sangre».
- source_word: חרחר
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - contienda
  - discordia
  - strife
  lexicon: HALOT
  rationale: El hebreo es difícil y la tradición auditada muestra revisión hacia una lectura más amplia dentro del campo de los desastres violentos. En español, «destrucción» refleja mejor esa actualización que un término relacional como «contienda», y evita exagerar una certeza léxica que el texto no sostiene con firmeza.
- source_word: חרב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - espada
  - la guerra
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto y la metonimia bélica habitual. «La espada» es natural y fiel al hebreo.
- source_word: שד
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - destrucción
  - ruina
  - violencia
  lexicon: HALOT
  rationale: El término denota ruina arrasadora. «Devastación» reproduce bien la fuerza acumulativa de la lista.
- source_word: שבר
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - quebrantamiento
  - destrucción
  - quiebre
  lexicon: HALOT
  rationale: En este contexto, el resultado de romperse o colapsar se expresa mejor con «ruina», que es idiomático y mantiene el paralelismo con «devastación».
- source_word: רעה
  english_pob_choice: calamity
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - mal
  - desastre
  lexicon: HALOT
  rationale: Aquí no se trata de mal moral sino de infortunio fatal. «Calamidad» preserva ese campo semántico.
- source_word: מות
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Traducción directa y plenamente transparente del sustantivo hebreo, confirmada además por el paralelo griego θάνατος.
theological_decisions:
- issue: Uso del hebreo difícil con apoyo del paralelo griego en Sirácida 40:9
  english_pob_reading: Translate primarily from the Hebrew list of calamities, but let the Greek parallel inform the difficult term חרחר as 'strife.'
  chosen_spanish_reading: Traducir primariamente la lista hebrea de calamidades, reconociendo que el término difícil se vierte de modo amplio como «destrucción» en lugar de forzar una precisión incierta.
  alternative_spanish_readings:
  - Seguir más de cerca el griego y traducir el término como «contienda» o «discordia»
  - Tomarlo como una afección corporal y elegir otra calamidad física
  rationale: La pauta del proyecto da primacía al hebreo conservado, pero el expediente auditado marca desajuste importante y revisiones posteriores. Por eso la versión española debe reflejar honestamente la incertidumbre sin convertirla en una afirmación demasiado específica; «destrucción» mantiene el tono del catálogo y respeta el carácter problemático del vocablo.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use parallel Greek as input/check. DOCTRINE.md: original-language primacy and preserve ambiguity honestly.'
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión que reemplazó una lectura más relacional del término difícil por «destruction», y luego una verificación general de alto acuerdo. La redacción española sigue esa dirección revisada, pero conserva la transparencia sobre la incertidumbre léxica mediante una formulación amplia y una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el tetragrámaton; aquí no ocurre.
  - Se evita «Cristo»/«Mesías» porque no hay vocabulario cristológico en el versículo.
  - «Pestilencia», «destrucción», «devastación», «ruina», «calamidad» y «muerte» forman una serie de desastres coherente con el hebreo y con el paralelo griego.
  - Se prefirió «sangre derramada» sobre un literal desnudo para no perder el matiz de violencia homicida.
