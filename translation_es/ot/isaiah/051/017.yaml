base_translation:
  language: en
  yaml_path: translation/ot/isaiah/051/017.yaml
  text: Awake[a], awake, rise up, Jerusalem, you who have drunk from the hand of Yahweh the cup of his wrath; you have drunk the bowl, the cup of staggering[c][b]; you have drained it dry.
  footnotes:
  - marker: a
    text: Or 'the cup of reeling'; traditionally 'the cup of trembling.' The Hebrew term refers to the staggering effect of the drink.
    reason: lexical_alternative
  - marker: b
    text: Or 'the goblet' for 'the bowl.' The Hebrew word denotes a bowl-shaped drinking vessel.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the hand of the LORD,' an idiom indicating that Jerusalem's suffering came from the LORD's judicial action.
    reason: cultural_note
