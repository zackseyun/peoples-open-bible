translation:
  language: es
  text: Sobre tus muros[a], Jerusalén, he asignado vigilantes; todo el día y toda la noche, continuamente, nunca callarán. Ustedes que hacen mención de Yahvé, no se den descanso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tus murallas». La expresión hebrea «ustedes que hacen mención de Yahvé» también puede entenderse como «ustedes que invocan a Yahvé» o «ustedes que ponen a Yahvé en memoria». Es una imagen especialmente vívida de apelación persistente a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמֹתַיִךְ
  english_pob_choice: your walls
  chosen_spanish: tus muros
  alternatives_spanish:
  - tus murallas
  - tus paredes
  lexicon: HALOT
  rationale: חוֹמָה se refiere a una muralla o muro de defensa de ciudad. En español, 'muros' es natural y conserva la imagen urbana-fortificada sin sonar más pesado que 'murallas'.
- source_word: הִפְקַדְתִּי
  english_pob_choice: I have appointed
  chosen_spanish: he puesto
  alternatives_spanish:
  - he nombrado
  - he designado
  - he asignado
  lexicon: HALOT
  rationale: El Hifil de פקד puede significar nombrar, asignar o poner a cargo. 'He puesto' comunica la idea de instalar vigilantes en un lugar determinado sin forzar un matiz administrativo más técnico.
- source_word: שֹׁמְרִים
  english_pob_choice: watchmen
  chosen_spanish: vigilantes
  alternatives_spanish:
  - guardianes
  - atalayas
  - centinelas
  lexicon: HALOT
  rationale: El sustantivo deriva de שמר, 'guardar/velar'. 'Vigilantes' mantiene la función de estar alerta. 'Centinelas' o 'atalayas' serían posibles, pero 'vigilantes' fluye bien en español moderno y conserva la imagen.
- source_word: כָּל הַיּוֹם וְכָל הַלַּיְלָה תָּמִיד
  english_pob_choice: all day and all night, continually
  chosen_spanish: todo el día y toda la noche, continuamente
  alternatives_spanish:
  - todo el día y toda la noche, sin cesar
  - día y noche, continuamente
  lexicon: HALOT
  rationale: La secuencia intensifica la duración ininterrumpida. Mantener los tres elementos preserva el énfasis hebreo sin sobreexplicarlo.
- source_word: יֶחֱשׁוּ
  english_pob_choice: they will never be silent
  chosen_spanish: nunca callarán
  alternatives_spanish:
  - no callarán jamás
  - no guardarán silencio
  lexicon: HALOT
  rationale: חשה expresa callar/estar en silencio. 'Nunca callarán' es idiomático en español y refleja bien la fuerza durativa de la forma negativa.
- source_word: הַמַּזְכִּרִים אֶת־יְהוָה
  english_pob_choice: You who remind Yahweh
  chosen_spanish: ustedes que recuerdan a Yahvé
  alternatives_spanish:
  - ustedes que hacen memoria de Yahvé
  - ustedes que ponen a Yahvé en memoria
  - ustedes que invocan a Yahvé
  lexicon: HALOT
  rationale: El participio causativo de זכר puede expresar 'hacer recordar', 'mencionar' o 'recordar'. En español, 'recuerdan a Yahvé' conserva la imagen vívida sin sonar tan extraña como una calca directa, pero mantiene la tensión interpretativa del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el Nombre divino como 'Yahvé', preservando el nombre propio en lugar de sustituirlo por un título.
- source_word: אַל דֳּמִי לָכֶם
  english_pob_choice: take no rest for yourselves
  chosen_spanish: no se den reposo para ustedes mismos
  alternatives_spanish:
  - no descansen
  - no se queden en silencio
  - no se concedan descanso
  lexicon: HALOT
  rationale: דֳּמִי contiene la idea de silencio, quietud o reposo. 'No se den reposo para ustedes mismos' intenta reflejar el giro idiomático y mantener la exhortación a una persistencia activa, aunque la expresión siga siendo marcada en español.
theological_decisions:
- issue: Identidad de los vigilantes y de quienes 'recuerdan' a Yahvé
  english_pob_reading: The translation preserves the image without specifying whether the figures are angelic, prophetic, priestly, or intercessory.
  chosen_spanish_reading: La traducción conserva la imagen sin precisar si se trata de seres angelicales, profetas, sacerdotes o intercesores humanos.
  alternative_spanish_readings:
  - vigilantes angelicales
  - vigilantes proféticos
  - intercesores en oración
  rationale: El hebreo no identifica de manera explícita a estos vigilantes. Conviene mantener la ambigüedad teológica del texto en vez de resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios sustanciales en el pasaje, y la solución española sigue de cerca la lectura óptima del texto hebreo con la misma ambigüedad intencional del original y del POB inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del Nombre divino en coherencia con el estándar del proyecto.
  - '''Vigilantes'' conserva el campo semántico de שמר sin imponer una identificación específica.'
  - La nota al pie preserva la alternativa tradicional de 'murallas' y la posibilidad de entender el participio como 'hacer memoria' o 'invocar'.
