translation:
  language: es
  text: Toda carne perecería juntamente, y el hombre[a] volvería al polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad volvería al polvo». El hebreo אָדָם es singular, pero puede representar colectivamente a la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְוַע
  english_pob_choice: would perish
  chosen_spanish: perecería
  alternatives_spanish:
  - moriría
  - expiraría
  lexicon: HALOT
  rationale: גוּע comunica la idea de expirar o perecer, con fuerza de muerte inevitable. «Perecería» conserva ese matiz grave y encaja bien con el valor condicional del contexto.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todos los seres humanos
  lexicon: HALOT
  rationale: «Toda carne» reproduce de manera directa el modismo hebreo y mantiene su amplitud retórica; en este contexto apunta a la totalidad de los mortales, sin estrecharlo prematuramente.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - al mismo tiempo
  - todos a una
  lexicon: HALOT
  rationale: El adverbio expresa simultaneidad o acción colectiva. «Juntamente» suena natural en español bíblico sin perder la idea de que todos perecen como una sola masa humana.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: El singular hebreo אָדָם puede funcionar colectivamente. «El hombre» conserva esa forma singular colectiva y la tensión lexical entre un individuo genérico y la humanidad como tal.
- source_word: עַל עָפָר
  english_pob_choice: to dust
  chosen_spanish: al polvo
  alternatives_spanish:
  - a polvo
  - hasta el polvo
  lexicon: HALOT
  rationale: Con שוב en esta fórmula de mortalidad, el español natural es «volver al polvo». «Polvo» mantiene el eco bíblico de la fragilidad humana y del origen/retorno a la tierra.
- source_word: יָשׁוּב
  english_pob_choice: would return
  chosen_spanish: volvería
  alternatives_spanish:
  - regresaría
  - retornaría
  lexicon: HALOT
  rationale: שׁוּב significa volver/retornar. «Volvería» reproduce bien el valor condicional y conserva la sobriedad del hebreo.
theological_decisions:
- issue: Valor colectivo de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: Mantengo el singular genérico porque el hebreo lo usa con fuerza colectiva, en paralelo con «toda carne». El español puede entender «el hombre» en sentido representativo sin perder la tensión del original; la alternativa inclusiva queda disponible si se prefiere explicitar el sentido colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para eliminar el artículo antes de «dust» y conservar la fórmula sobria «return to dust». La versión española sigue esa precisión con «al polvo», manteniendo el paralelismo y el valor colectivo de אָדָם mediante una nota alternativa.
  spanish_consistency_notes:
  - Usé «carne» para בָּשָׂר, en coherencia con el modismo hebreo y con el uso POB de preservar su fuerza idiomática.
  - Mantuve el tiempo condicional en español («perecería», «volvería») para reflejar el valor contextual del hebreo dentro del discurso precedente.
  - «Polvo» conserva el campo semántico bíblico de mortalidad y regreso a la tierra, sin añadir artículo innecesario.
