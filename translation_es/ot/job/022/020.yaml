revisions:
- from: Ciertamente nuestros adversarios[a] han sido cortados[b], y el fuego ha consumido lo que quedaba de ellos.
  to: Ciertamente nuestros adversarios[a] han sido destruidos, y el fuego ha consumido lo que quedaba de ellos.
  rationale: Se reemplaza «han sido cortados» por «han sido destruidos» para expresar con español más natural y fiel la fuerza de נִכְחַד en este contexto. Se simplifican las notas para conservar la principal dificultad textual en קִימָנוּ sin añadir una nota innecesaria sobre «cortados/destruidos». También se moderniza «substancia» a «bienes/posesiones».
  reviewer_model: gpt-5.4
