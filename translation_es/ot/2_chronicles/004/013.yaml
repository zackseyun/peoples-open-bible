base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/004/013.yaml
  text: and the four hundred pomegranates for the two latticeworks[a], two rows of pomegranates for each latticework[b], to cover the two bowl-shaped capitals that were on top of the pillars.
  footnotes:
  - marker: a
    text: Or 'networks' instead of 'latticeworks.' The Hebrew term refers to netted ornamental work on the capitals.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the two bowls of the capitals.' The Hebrew uses imagery for the rounded upper portions of the capitals.
    reason: lexical_alternative
