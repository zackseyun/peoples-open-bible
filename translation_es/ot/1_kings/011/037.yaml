translation:
  language: es
  text: Y yo te tomaré, y reinarás sobre todo lo que desea tu alma[a], y serás rey sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que deseas»; literalmente: «todo lo que desea tu alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקַּח
  english_pob_choice: I will take
  chosen_spanish: te tomaré
  alternatives_spanish:
  - te escogeré
  - te tomaré para mí
  - te arrebataré
  lexicon: HALOT
  rationale: Tomar conserva la fuerza concreta de לקח, como en la decisión inglesa 'I will take', y en este contexto de designación divina suena natural en español sin convertirlo en una paráfrasis interpretativa como 'escogeré'.
- source_word: וּמָלַכְתָּ
  english_pob_choice: you shall reign
  chosen_spanish: reinarás
  alternatives_spanish:
  - gobernarás como rey
  - serás rey y reinarás
  lexicon: HALOT
  rationale: מלך expresa ejercer la realeza; 'reinarás' mantiene el valor verbal y evita reducirlo solo al estado de ser rey.
- source_word: בְּכֹל אֲשֶׁר
  english_pob_choice: over all that
  chosen_spanish: sobre todo lo que
  alternatives_spanish:
  - sobre todo aquello que
  - sobre cuanto
  lexicon: HALOT
  rationale: Con מלך, ב indica la esfera de dominio. 'Sobre todo lo que' comunica con naturalidad el alcance del reinado y conserva el sentido extensivo del hebreo.
- source_word: תְּאַוֶּה נַפְשֶׁךָ
  english_pob_choice: your soul desires
  chosen_spanish: desea tu alma
  alternatives_spanish:
  - anhela tu alma
  - deseas
  - lo que tu alma desea
  lexicon: HALOT
  rationale: Se mantiene 'alma' para reflejar נֶפֶשׁ con transparencia lexical, como hizo la POB inglesa con 'soul'. El orden se ajusta al español para fluidez, sin borrar la imagen antropológica del original.
- source_word: וְהָיִיתָ מֶּלֶךְ
  english_pob_choice: you shall be king
  chosen_spanish: serás rey
  alternatives_spanish:
  - llegarás a ser rey
  - serás el rey
  lexicon: HALOT
  rationale: היה + sustantivo expresa estado resultante. 'Serás rey' es la forma española más directa y fiel, equivalente a la formulación inglesa idiomática.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - encima de Israel
  - por encima de Israel
  lexicon: HALOT
  rationale: Con realeza, עַל se traduce naturalmente 'sobre' para indicar autoridad sobre el pueblo, como en la decisión inglesa 'over Israel'.
theological_decisions:
- issue: Traducción de נֶפֶשׁ en una expresión de deseo
  english_pob_reading: Rendered literally as 'soul' rather than interpretively as 'heart' or simply 'you.'
  chosen_spanish_reading: '''alma'' en ''desea tu alma'''
  alternative_spanish_readings:
  - '''corazón'''
  - '''deseas'''
  - '''lo que anhelas'''
  rationale: La frase hebrea usa נֶפֶשׁ y la POB inglesa preserva 'soul' para mantener transparencia textual. En español, 'alma' reproduce esa decisión sin trivializar la expresión ni convertirla en una mera paráfrasis psicológica.
  doctrine_reference: 'Translation philosophy #1 y #5'
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión inglesa aprobada, que mantiene 'take', 'reign', 'soul desires' y 'be king' sin cambios. No se detectan correcciones textuales adicionales en el pasaje base.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiere explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se evita 'SEÑOR' como sustituto no pedido, manteniendo la transparencia con el hebreo.
  - '''alma'' se conserva por coherencia con la política POB de no suavizar נֶפֶשׁ cuando la imagen lexical importa.'
  - La nota al pie conserva la alternativa semántica principal y aclara la literalidad del hebreo.
