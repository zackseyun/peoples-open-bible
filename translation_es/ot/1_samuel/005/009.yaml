revisions:
- from: Y sucedió que, después de haberlo trasladado[a], la mano de Yahvé estuvo sobre la ciudad, causando un gran pánico; hirió a los hombres de la ciudad, desde el más pequeño hasta el más grande, y les brotaron tumores[b].
  to: Y sucedió que, después de haberlo trasladado[a], la mano de Yahvé vino contra la ciudad, causando un pánico muy grande; hirió a los hombres de la ciudad, desde el más pequeño hasta el más grande, y les brotaron tumores[b].
  rationale: Se ajusta «sobre la ciudad» a «contra la ciudad» para reflejar mejor el juicio divino implícito en la expresión y en el contexto. Se añade «muy» para conservar la intensidad de מְאֹד. Se corrige la nota b para que ofrezca una alternativa genuina en vez de repetir el texto principal.
