translation:
  language: es
  text: Benaía el piratonita, Hiddai[a] de los wadis[b] de Gaas;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo en 1 Crónicas 11:32 lee «Hurai» en lugar de «Hiddai».
    reason: cross_reference
