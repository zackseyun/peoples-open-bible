revisions:
- from: Llamó hambre sobre la tierra[a]; quebró todo sustento de pan.
  to: Llamó hambruna sobre la tierra[a]; quebró todo bastón de pan.
  rationale: 'Se revisa para mejorar la naturalidad y fidelidad al hebreo y al rastro de auditoría del POB inglés: «hambruna» refleja mejor רָעָב que «hambre» en este contexto, y «bastón de pan» conserva en el texto principal la metáfora de מַטֵּה לֶחֶם, mientras la nota explica el sentido idiomático. Se mantiene «quebró» por buena correspondencia léxica con שָׁבָר y se preserva la agencia divina implícita.'
