translation:
  language: es
  text: Para el director del coro. Un salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de canto
  - Al director de música
  - Para el líder musical
  lexicon: HALOT
  rationale: En los encabezados de salmo, el término indica una instrucción musical dirigida al responsable de la ejecución. «Director del coro» conserva esa función de manera natural en español y evita añadir precisión no garantizada por el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Melodía
  - Poesía
  lexicon: HALOT
  rationale: El sustantivo designa un salmo o canto asociado a ejecución musical. «Salmo» es la equivalencia estable y más precisa en este contexto literario.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados puede señalar autoría, asociación o dedicación. «De David» preserva esa ambigüedad sin decidir indebidamente entre autoría y dedicación.
theological_decisions:
- issue: Ambigüedad del encabezado davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a resolver si el encabezado indica autoría, atribución o dedicación. Mantener «de David» conserva la tensión documental y se alinea con la práctica auditada de la POB en inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que movió el marcador de nota desde «choirmaster» hacia «David»; por eso la nota española se ancla en «David» y no en «director del coro».
  spanish_consistency_notes:
  - Se usa «Salmo» como término literario estándar, coherente con la POB en inglés y con el género del encabezado.
  - Se evita «SEÑOR» porque aquí no aparece el tetragrámaton ni una cita explícita de YHWH.
  - La puntuación sigue el formato de encabezado breve y publicable en español.
