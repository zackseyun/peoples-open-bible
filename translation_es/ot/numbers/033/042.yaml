translation:
  language: es
  text: Partieron de Zalmoná y acamparon en Punón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Salieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa salir de un campamento y avanzar al siguiente punto. «Partieron» conserva bien ese valor secuencial en español sin sonar tan genérico como «viajaron».
- source_word: מִצַּלְמֹנָה
  english_pob_choice: from Zalmonah
  chosen_spanish: de Zalmoná
  alternatives_spanish:
  - desde Zalmoná
  lexicon: HALOT
  rationale: La preposición מִן se traduce naturalmente como «de» en español con verbos de movimiento. El nombre propio se translitera como Zalmoná, manteniendo el topónimo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y establecieron campamento
  lexicon: HALOT
  rationale: חנה en este contexto de itinerario significa hacer campamento. «Acamparon» es la equivalencia más natural y clara en español contemporáneo.
- source_word: בְּפוּנֹן
  english_pob_choice: at Punon
  chosen_spanish: en Punón
  alternatives_spanish:
  - en Punón
  - a Punón
  lexicon: HALOT
  rationale: La preposición בְּ con un lugar de parada se puede expresar de manera natural como «en» en español. Se mantiene la transliteración del topónimo como Punón.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones sustantivas; el pasaje es una fórmula itineraria breve y el español sigue de cerca el valor léxico del hebreo con adaptación idiomática mínima.
  spanish_consistency_notes:
  - Se mantienen los nombres propios como Zalmoná y Punón de forma transliterada y con acentuación española.
  - Se evita «encamparon» porque «acamparon» es más natural en español moderno sin perder el sentido del hebreo.
  - No se añade ningún elemento interpretativo, ya que el versículo es puramente narrativo e itinerario.
