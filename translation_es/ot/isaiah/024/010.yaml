translation:
  language: es
  text: La ciudad del caos[a] está destruida; cada casa está cerrada[b] para que nadie entre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la ciudad del vacío» o «la ciudad de la desolación». El hebreo תֹּהוּ puede significar caos, vacío o desolación.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cada casa está cerrada para entrar»; es decir, se impide la entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁבְּרָה
  english_pob_choice: is broken down
  chosen_spanish: está derribada
  alternatives_spanish:
  - está rota
  - está quebrantada
  - está destruida
  lexicon: HALOT
  rationale: El hebreo expresa un estado pasivo/resultativo de una ciudad que ha sufrido quiebre o ruina. «Está derribada» comunica bien en español una ciudad caída o arruinada, con un matiz urbano más natural que «rota» o «quebrantada».
- source_word: קִרְיַת
  english_pob_choice: city of
  chosen_spanish: la ciudad de
  alternatives_spanish:
  - la urbe de
  - la villa de
  lexicon: HALOT
  rationale: El sustantivo en constructo pide una relación posesiva o genitiva. «La ciudad de» es la forma más clara y natural en español y conserva el registro profético.
- source_word: תֹּהוּ
  english_pob_choice: chaos
  chosen_spanish: caos
  alternatives_spanish:
  - vacío
  - desolación
  - desierto
  lexicon: HALOT
  rationale: La POB en inglés eligió «chaos» para retener el valor abstracto e imagístico de תֹּהוּ. «Caos» funciona bien en español para la idea de desorden, ruina y colapso social, sin reducir el término a un lugar físico.
- source_word: סֻגַּר
  english_pob_choice: is shut up
  chosen_spanish: está cerrada
  alternatives_spanish:
  - está clausurada
  - está cerrada con llave
  - está sellada
  lexicon: HALOT
  rationale: El pasivo de סגר indica cierre/bloqueo. «Está cerrada» es más natural en español que un calco como «está encerrada» y conserva la idea de acceso impedido. En el contexto de casas, transmite que no se puede entrar.
- source_word: כָּל בַּיִת
  english_pob_choice: every house
  chosen_spanish: cada casa
  alternatives_spanish:
  - toda casa
  - cada hogar
  - toda vivienda
  lexicon: HALOT
  rationale: El distributivo singular con כָּל se vierte bien como «cada». «Casa» mantiene el sentido físico del texto y evita suavizarlo con «hogar».
- source_word: מִבּוֹא
  english_pob_choice: so that none may enter
  chosen_spanish: para que nadie entre
  alternatives_spanish:
  - de modo que nadie entre
  - impidiendo la entrada
  - sin que nadie pueda entrar
  lexicon: HALOT
  rationale: La construcción hebrea literalmente apunta a «desde entrar» o «de entrar», pero el sentido resultante es de acceso impedido. «Para que nadie entre» expresa fielmente la fuerza de resultado/finalidad sin sonar forzado en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés de la POB. Se conservó la imagen profética de ruina urbana y el cierre total de las casas, evitando una paráfrasis más interpretativa que borrara la ambigüedad lexical de תֹּהוּ y la construcción final de מִבּוֹא.
  spanish_consistency_notes:
  - Se usa «caos» para תֹּהוּ en el texto principal, conforme a la decisión inglesa de preservar el valor abstracto del término.
  - Se eligió «cada casa» en lugar de «cada hogar» para mantener el enfoque físico y urbano del verso.
  - «Está cerrada» y la nota explicativa preservan la idea de acceso impedido sin imponer una lectura excesivamente técnica al lector general.
