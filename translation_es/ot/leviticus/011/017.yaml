translation:
  language: es
  text: el mochuelo[a], el cormorán y el gran búho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las identificaciones de estas aves son inciertas. “Mochuelo”, “cormorán” y “gran búho” son traducciones tradicionales o plausibles; también pueden proponerse “búho” o “lechuza” para כּוֹס, “pelícano” para שָׁלָךְ, y “búho cornudo” o “búho real” para יַנְשׁוּף.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכּוֹס
  english_pob_choice: the little owl
  chosen_spanish: el mochuelo
  alternatives_spanish:
  - la lechuza
  - el búho pequeño
  - el búho
  lexicon: HALOT
  rationale: El hebreo nombra un ave impura cuya identificación exacta es incierta. “Mochuelo” comunica en español una rapaz nocturna pequeña sin forzar una especie exacta, y evita el término demasiado genérico “búho”, que borraría parte de la especificidad del listado.
- source_word: הַשָּׁלָךְ
  english_pob_choice: the cormorant
  chosen_spanish: el cormorán
  alternatives_spanish:
  - el pelícano
  - el ave acuática
  - el ave pescadora
  lexicon: HALOT
  rationale: La identificación de שָׁלָךְ sigue siendo debatida. “Cormorán” conserva la decisión de la POB en inglés y encaja con un ave acuática o zambullidora, sin pretender mayor certeza de la que permite el hebreo.
- source_word: הַיַּנְשׁוּף
  english_pob_choice: the great owl
  chosen_spanish: el gran búho
  alternatives_spanish:
  - la lechuza grande
  - el búho cornudo
  - el búho real
  lexicon: HALOT
  rationale: יַנְשׁוּף parece designar un ave nocturna grande, probablemente un tipo de búho. “Gran búho” refleja la amplitud y la cautela de la POB inglesa, manteniendo la incertidumbre taxonómica.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  lexicon: grammatical function marker (object marker + conjunction)
  rationale: La secuencia repetida de conjunción más marcador de objeto introduce una lista; en español basta con una enumeración natural con “y” al final, sin repetir marcas innecesarias.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo consonante y la solución auditada de la POB en inglés. No se registran revisiones aplicadas; la versión inglesa más reciente quedó sin cambios y con alta concordancia.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio de lista nominal propio del pasaje.
  - Se evita “SEÑOR” u otro término teológico porque no aparece el Nombre divino en este versículo.
  - Se conserva la cautela taxonómica del original mediante una nota al pie sobre la incertidumbre de identificación.
