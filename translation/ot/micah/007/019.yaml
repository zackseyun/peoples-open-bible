id: MIC.7.19
reference: Micah 7:19
source:
  edition: WLC
  text: יָשׁ֣וּב יְרַֽחֲמֵ֔/נוּ יִכְבֹּ֖שׁ עֲוֺֽנֹתֵ֑י/נוּ וְ/תַשְׁלִ֛יךְ בִּ/מְצֻל֥וֹת יָ֖ם כָּל חַטֹּאותָֽ/ם־׃
translation:
  text: He will again have compassion on us[a]; he will subdue our iniquities[b]. He will cast all their sins into the depths of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts unexpectedly from 'He will' to direct address, 'You will cast.' Some ancient witnesses and translations smooth this to 'and he will cast.'
    reason: alternative_reading
  - marker: b
    text: Hebrew reads 'their sins'; many translations render 'our sins' to harmonize with the earlier 'our iniquities.'
    reason: textual_variant
lexical_decisions:
- source_word: יָשׁוּב
  chosen: again
  alternatives:
  - return
  - turn back
  lexicon: HALOT
  rationale: 'The verb literally means ''return/turn back,'' but with the following finite verb it idiomatically conveys repetition: ''he will again have compassion.'' Rendering it as ''again'' is natural English and preserves the sense without awkwardness.'
- source_word: יְרַחֲמֵנוּ
  chosen: have compassion on us
  alternatives:
  - show us mercy
  - have mercy on us
  lexicon: HALOT
  rationale: רחם denotes deep compassion/mercy. 'Have compassion on us' is clear modern English and preserves the affective force better than the more formulaic 'have mercy on us,' though that remains a viable alternative.
- source_word: יִכְבֹּשׁ
  chosen: subdue
  alternatives:
  - trample down
  - bring into subjection
  lexicon: HALOT
  rationale: כבש commonly means to subdue or bring under control. Here the object is 'our iniquities,' so 'subdue' communicates decisive conquest over sin without over-paraphrasing. 'Trample down' is possible in context but more interpretive.
- source_word: עֲוֺנֹתֵינוּ
  chosen: our iniquities
  alternatives:
  - our sins
  - our guilt
  lexicon: HALOT
  rationale: עון often carries the sense of iniquity/guilt rather than the broader חטאת 'sin.' Keeping 'iniquities' preserves the lexical distinction from the later 'sins' in the verse.
- source_word: וְתַשְׁלִיךְ
  chosen: You will cast
  alternatives:
  - and he will cast
  - you will throw
  lexicon: HALOT
  rationale: The form is morphologically 2ms, creating a shift from third person verbs earlier in the verse. Retaining 'You will cast' preserves the Masoretic form and the prayer-like direct address to God. 'And he will cast' reflects ancient versions and some translations smoothing the person shift, but the MT is best preserved in the main text.
- source_word: בִּמְצֻלוֹת יָם
  chosen: into the depths of the sea
  alternatives:
  - into the deep places of the sea
  - into the depths of the ocean
  lexicon: HALOT
  rationale: מצולות refers to depths or deep places, especially of the sea. 'Into the depths of the sea' is idiomatic and vivid, preserving the image of complete removal.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The totalizing force is important to the verse's assurance of full forgiveness; 'all' is the most natural rendering.
- source_word: חַטֹּאותָם
  chosen: their sins
  alternatives:
  - their offenses
  lexicon: HALOT
  rationale: The suffix is 3mp ('their'), not 1cp ('our'). The main text preserves the received Hebrew as written, even though the shift from 'our iniquities' to 'their sins' is stylistically abrupt. This may reflect a shift from communal confession to a broader statement, or a textual issue preserved in the tradition.
