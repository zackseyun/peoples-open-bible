review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido global del griego: los objetos sagrados sacados por Nabucodonosor del templo en Jerusalén y llevados a Babilonia deben ser restituidos al templo en Jerusalén para ser puestos allí. Sin embargo, hay un problema menor en la nota [a]: presenta como alternativa exactamente la misma palabra usada en el texto principal, en vez de reflejar la alternativa documentada (''holy'' / ''sacred'').'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico. 'Vasos sagrados', 'casa del Señor', 'sacó', 'llevó a Babilonia' y 'han de ser devueltos' funcionan bien. 'Donde estaban puestos' es comprensible, pero 'donde estaban colocados' suena algo más natural; no es indispensable corregirlo. La reparación necesaria es en la redacción de la nota [a].
  glossary_alignment: 'La terminología está bien alineada con el proyecto para este contexto griego: Κυρίου se traduce apropiadamente como ''Señor'' y no requiere ''Yahvé'' en el texto principal; Ναβουχοδονοσόρ como ''Nabucodonosor'' es estándar; ἱερὰ σκεύη como ''vasos sagrados'' encaja con la decisión léxica auditada. No hay conflicto doctrinal ni terminológico mayor.'
  issues:
  - severity: medium
    issue: La nota [a] no preserva correctamente la alternativa léxica.
    rationale: El texto principal usa 'vasos sagrados[a]', pero la nota dice 'O “sagrados”', que repite la misma elección y omite la alternativa relevante documentada en inglés ('sacred vessels' como alternativa a 'holy vessels'). En español, si el texto principal mantiene 'sagrados', la alternativa debería ser algo como 'vasos santos' o 'utensilios sagrados'.
  revised_spanish_text: Y los vasos sagrados[a] de la casa del Señor, tanto los de oro como los de plata, que Nabucodonosor sacó de la casa que estaba en Jerusalén y llevó a Babilonia, han de ser devueltos a la casa que está en Jerusalén, donde estaban puestos[b], para que sean colocados allí.
  revised_footnotes:
  - marker: a
    text: O “vasos santos”. La expresión griega se refiere a objetos del templo consagrados al uso santo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “casa del Señor”, es decir, el templo.
    reason: lexical_alternative
  revision_rationale: El texto principal es esencialmente fiel y idiomático; solo se corrige la nota [a] para que preserve una alternativa léxica real en español en vez de repetir la misma palabra del texto principal.
