translation:
  language: es
  text: Y ha puesto en su corazón la capacidad de enseñar[a], tanto él como Oholiab, hijo de Ahisamac, de la tribu de Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'instruir'. El infinitivo hebreo puede abarcar enseñanza en sentido amplio, incluida la instrucción en trabajo especializado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהוֹרֹת
  english_pob_choice: the ability to teach
  chosen_spanish: la capacidad de enseñar
  alternatives_spanish:
  - enseñar
  - instruir
  - la instrucción
  lexicon: HALOT
  rationale: El infinitivo de ירה en hifil puede significar 'enseñar' o 'instruir'. En español, 'la capacidad de enseñar' conserva el valor funcional del don interior y suena natural junto con 'ha puesto en su corazón', sin reducir indebidamente el alcance de una enseñanza que puede incluir instrucción técnica.
- source_word: נָתַן בְּלִבּוֹ
  english_pob_choice: has put in his heart
  chosen_spanish: ha puesto en su corazón
  alternatives_spanish:
  - ha puesto en su mente
  - ha colocado dentro de él
  - ha puesto en lo íntimo de su ser
  lexicon: HALOT
  rationale: La locución hebrea expresa una disposición o dotación interior. 'Corazón' preserva el antropologismo bíblico y en español mantiene bien la idea de una iniciativa divina interior.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre enfático se conserva de forma simple en la correlación 'tanto él como...', sin sobrecargar el énfasis más allá del hebreo.
- source_word: וְאָהֳלִיאָב
  english_pob_choice: and Oholiab
  chosen_spanish: Oholiab
  alternatives_spanish:
  - Aholiab
  - y Oholiab
  lexicon: standard transliteration
  rationale: Se conserva la transliteración del nombre propio usada en la base inglesa, adaptada a ortografía española. El 'y' queda implicado por la estructura 'tanto... como...'.
- source_word: בֶּן אֲחִיסָמָךְ
  english_pob_choice: son of Ahisamach
  chosen_spanish: hijo de Ahisamac
  alternatives_spanish:
  - hijo de Ahisamaj
  - el hijo de Ahisamac
  lexicon: standard genealogical formula
  rationale: Se mantiene la fórmula genealógica directa. 'Ahisamac' sigue la transliteración española más natural del hebreo, sin añadir artículos innecesarios.
- source_word: לְמַטֵּה דָן
  english_pob_choice: of the tribe of Dan
  chosen_spanish: de la tribu de Dan
  alternatives_spanish:
  - perteneciente a la tribu de Dan
  - para la tribu de Dan
  lexicon: HALOT
  rationale: לְ + מַטֶּה marca afiliación tribal. 'De la tribu de Dan' es la equivalencia española más idiomática y precisa.
translation_notes:
  revision_awareness: El texto inglés más reciente se mantuvo sin cambios sustanciales; la única tensión relevante es léxica en וּלְהוֹרֹת, donde 'teach' puede reflejar tanto enseñanza como instrucción técnica. La versión española preserva esa amplitud con 'capacidad de enseñar' y la nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el Tetragrámaton en el hebreo dado.
  - Se conserva un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - Los nombres propios siguen transliteración consistente y legible para lectores hispanohablantes.
