lexical_decisions:
- source_word: אֲשֶׁר שָׁם
  english_pob_choice: where
  chosen_spanish: allí
  alternatives_spanish:
  - donde
  - en donde
  lexicon: HALOT
  rationale: La combinación relativa-local אֲשֶׁר שָׁם apunta al lugar descrito por el contexto. En español, 'allí' conserva la referencia espacial de manera natural dentro de la oración poética, sin forzar una construcción demasiado literal.
- source_word: צִפֳּרִים
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: HALOT
  rationale: El término hebreo es genérico para aves. 'Las aves' es un equivalente amplio, digno y natural en español bíblico contemporáneo.
- source_word: יְקַנֵּנוּ
  english_pob_choice: make their nests
  chosen_spanish: anidan
  alternatives_spanish:
  - hacen sus nidos
  - hacen nido
  lexicon: HALOT
  rationale: El verbo expresa la acción de hacer nido. 'Anidan' comunica la acción de forma idiomática y poética en español, sin perder el sentido verbal del hebreo.
- source_word: חֲסִידָה
  english_pob_choice: the stork
  chosen_spanish: la cigüeña
  alternatives_spanish:
  - la garza
  lexicon: HALOT
  rationale: El sustantivo designa convencionalmente a la cigüeña. Se mantiene la identificación zoológica tradicional reflejada por la POB inglesa.
- source_word: בְּרוֹשִׁים
  english_pob_choice: the cypresses
  chosen_spanish: los cipreses
  alternatives_spanish:
  - los abetos
  - los enebros
  - los pinos
  lexicon: HALOT
  rationale: El hebreo בְּרוֹשִׁים nombra una conífera de identificación incierta. 'Cipreses' es una opción moderna, clara y adecuada al hábitat del verso, conservando la nota de incertidumbre en la nota al pie.
- source_word: בֵּיתָהּ
  english_pob_choice: has its home
  chosen_spanish: tiene su casa
  alternatives_spanish:
  - tiene su hogar
  - hace su nido
  lexicon: HALOT
  rationale: Literalmente es 'su casa/hogar'. 'Tiene su casa' refleja bien la idea de morada y preserva la concreción del hebreo, manteniendo la imagen poética del ave instalada en los árboles.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y el recorrido de decisiones de la POB inglesa. Se conservó la estructura local del relativo ('allí') y la imagen poética de aves que anidan en árboles, con una nota que mantiene la incertidumbre léxica sobre בְּרוֹשִׁים.
  spanish_consistency_notes:
  - Se usó 'aves' como término genérico, coherente con el hebreo plural no específico.
  - Se optó por 'cigüeña' para חֲסִידָה conforme al valor léxico estándar.
  - '''Cipreses'' mantiene la decisión inglesa principal y la nota al pie preserva alternativas botánicas sin cerrar indebidamente la identificación.'
