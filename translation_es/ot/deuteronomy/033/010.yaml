revisions:
- from: Enseñarán tus juicios a Jacob y tu ley a Israel[a][b]; pondrán incienso delante de ti y holocaustos completos sobre tu altar.
  to: Enseñarán tus juicios a Jacob y tu ley a Israel[a][b]; pondrán incienso delante de ti y holocaustos sobre tu altar.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y fidelidad funcional del español: ''holocaustos completos'' se simplificó a ''holocaustos'', ya que el término español ya incorpora la idea de una ofrenda totalmente quemada. También se normalizó la nota antropomórfica al español, eliminando la mezcla con inglés.'
  reviewer_model: gpt-5.4
