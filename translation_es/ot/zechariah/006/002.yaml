translation:
  language: es
  text: En el primer carro había caballos rojos, y en el segundo carro había caballos negros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּמֶּרְכָּבָה
  english_pob_choice: in the chariot
  chosen_spanish: en el carro
  alternatives_spanish:
  - en el carruaje
  - sobre el carro
  lexicon: HALOT
  rationale: מֶרְכָּבָה designa un carro de guerra o carroza en contextos visionarios. En español, "carro" comunica el vehículo sin introducir una solemnidad extra ni una imagen demasiado moderna. El valor locativo de la preposición ב se conserva naturalmente con "en".
- source_word: הָרִאשֹׁנָה
  english_pob_choice: the first
  chosen_spanish: el primer
  alternatives_spanish:
  - el primero
  - el anterior
  lexicon: HALOT
  rationale: El hebreo marca orden secuencial entre los carros. En español, "el primer" es la forma natural ante un sustantivo masculino singular como "carro" y mantiene la referencia ordinal.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - yeguas
  - corceles
  lexicon: HALOT
  rationale: סוּסִים es el plural ordinario de "caballo". "Caballos" es la correspondencia directa y no fuerza un matiz poético no presente en el texto.
- source_word: אֲדֻמִּים
  english_pob_choice: red
  chosen_spanish: rojos
  alternatives_spanish:
  - rojizos
  - bermejos
  lexicon: HALOT
  rationale: El adjetivo expresa el color rojo. "Rojos" es la opción más clara y natural en español; "rojizos" debilita el tono directo y "bermejos" sería más arcaico.
- source_word: וּבַמֶּרְכָּבָה
  english_pob_choice: and in the chariot
  chosen_spanish: y en el segundo carro
  alternatives_spanish:
  - y en el carro
  - y sobre el segundo carro
  lexicon: HALOT
  rationale: La cláusula repite la estructura del primero con coordinación explícita. En español, repetir "y en el segundo carro" conserva el paralelismo y hace fluida la sintaxis.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  - el siguiente
  lexicon: HALOT
  rationale: El ordinal indica la secuencia del segundo carro dentro de la visión. "El segundo" es preciso y directo.
- source_word: שְׁחֹרִים
  english_pob_choice: black
  chosen_spanish: negros
  alternatives_spanish:
  - oscuros
  - pardos
  lexicon: HALOT
  rationale: El adjetivo básico significa negro. "Negros" preserva el contraste visual con "rojos" y evita suavizar el color hacia una descripción más vaga.
translation_notes:
  revision_awareness: El texto inglés POB ya resuelve el hebreo como una descripción visual sencilla de dos carros con caballos de distintos colores. No hay notas textuales ni variantes relevantes en el paquete recibido; por eso la versión española sigue de cerca esa estructura paralela sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo "carro" para מֶרְכָּבָה por ser el equivalente más natural en español para este contexto visionario.
  - Se evitó "SEÑOR" u otra terminología teológica porque el versículo no contiene el nombre divino ni vocabulario doctrinal relevante.
  - 'Se preservó el paralelismo sintáctico con dos miembros coordinados: primer carro/caballos rojos; segundo carro/caballos negros.'
