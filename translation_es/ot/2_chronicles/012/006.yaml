translation:
  language: es
  text: 'Entonces se humillaron los dirigentes[a] de Israel y el rey, y dijeron: «Yahvé es justo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los dirigentes de Israel». En este contexto, algunos entienden que se refiere específicamente a los dirigentes de Judá bajo Roboam; sin embargo, el texto mismo dice «Israel».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכָּנְעוּ
  english_pob_choice: humbled themselves
  chosen_spanish: se humillaron
  alternatives_spanish:
  - se sometieron
  - se abajaron
  lexicon: HALOT
  rationale: El nifal de כנע expresa aquí una acción reflexiva de humillarse ante la reprensión profética. «Se humillaron» conserva esa fuerza moral y espiritual en español natural.
- source_word: שָׂרֵי
  english_pob_choice: leaders
  chosen_spanish: jefes
  alternatives_spanish:
  - líderes
  - príncipes
  - oficiales
  lexicon: HALOT
  rationale: שָׂרִים designa a personas con autoridad o mando. «Jefes» comunica bien ese rango en español moderno sin depender del tono arcaico de «príncipes».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: El hebreo dice «Israel». Se conserva el término, aunque el contexto histórico inmediato pueda hacer pensar en Judá, para no armonizar el texto más allá de lo que la fuente dice.
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: and the king
  chosen_spanish: y el rey
  lexicon: HALOT
  rationale: Es una coordinación directa y simple; «el rey» distingue claramente a Roboam de los jefes.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y dijeron ellos
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa con un equivalente natural en español.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - en lo justo
  lexicon: HALOT
  rationale: Aquí צַדִּיק califica a Yahvé como moralmente recto en su juicio. «Justo» conserva bien esa afirmación en español bíblico sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: «Yahvé», en lugar de una sustitución por título.'
theological_decisions:
- issue: Conservar el Nombre divino frente a la sustitución tradicional por un título
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La lectura española sigue la decisión doctrinal del proyecto de transliterar el Nombre, preservando la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantener «Israel» sin armonizarlo a «Judá»
  english_pob_reading: Israel
  chosen_spanish_reading: Israel
  alternative_spanish_readings:
  - Judá
  rationale: La fuente hebrea dice explícitamente «Israel». Cambiarlo por «Judá» resolvería una tensión interpretativa que la traducción debe conservar y dejar visible al lector.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente aprobada: no se requieren cambios respecto del audit trail inglés; se ha conservado la tensión entre la forma hebrea «Israel» y la posible referencia histórica a Judá.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Nombre divino.
  - Se usa «justo» para צַדִּיק por claridad y fidelidad teológica.
  - La nota al pie conserva la alternativa interpretativa documentada sin armonizar el texto principal.
