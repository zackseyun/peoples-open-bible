translation:
  language: es
  text: 'Y allí el pueblo tuvo sed de agua, y el pueblo murmuró contra Moisés y dijo: «¿Por qué nos sacaste de Egipto, para matarme a mí[a] y a mis hijos y a mi ganado con sed?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo mantiene formas singulares: «matarme a mí y a mis hijos y a mi ganado». Probablemente es un singular representativo de la queja de cada miembro del pueblo; muchas traducciones lo suavizan al plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְמָא
  english_pob_choice: thirsted
  chosen_spanish: tuvo sed
  alternatives_spanish:
  - sintió sed
  - estaba sediento
  lexicon: HALOT
  rationale: צמא expresa la experiencia de quedar con sed; en español, «tuvo sed» es natural y conserva el carácter verbal de la acción narrativa sin sonar rígido.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: HALOT
  rationale: El adverbio locativo פשוט se rinde con «allí», que es claro y directo en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto, עם se refiere a la comunidad del éxodo; «el pueblo» preserva la forma breve del hebreo sin expandir innecesariamente.
- source_word: לַמַּיִם
  english_pob_choice: for water
  chosen_spanish: de agua
  alternatives_spanish:
  - por agua
  - con necesidad de agua
  lexicon: HALOT
  rationale: Con צמא, la preposición ל marca el objeto de la sed; en español, «tener sed de agua» expresa de manera idiomática esa relación.
- source_word: וַיָּלֶן
  english_pob_choice: grumbled
  chosen_spanish: murmuró
  alternatives_spanish:
  - se quejó
  - refunfuñó
  lexicon: HALOT
  rationale: En los relatos del desierto, לון tiene el matiz de queja hostil contra el liderazgo. «Murmuró» mantiene esa fuerza y corresponde al registro bíblico común, sin aplanarlo demasiado.
- source_word: עַל מֹשֶׁה
  english_pob_choice: against Moses
  chosen_spanish: contra Moisés
  alternatives_spanish:
  - a Moisés
  - sobre Moisés
  lexicon: HALOT
  rationale: עַל en este verbo de queja señala oposición dirigida al líder; «contra Moisés» conserva bien el valor adversativo.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why did you
  chosen_spanish: ¿Por qué nos sacaste
  alternatives_spanish:
  - ¿Para qué nos sacaste
  - ¿Por qué fue que nos sacaste
  lexicon: HALOT
  rationale: La frase hebrea introduce una pregunta reprochadora; en español, la forma natural y fiel es «¿Por qué nos sacaste?». Se evita un calco más rígido que oscurezca el sentido.
- source_word: הֶעֱלִיתָנוּ מִמִּצְרַיִם
  english_pob_choice: you brought us up from Egypt
  chosen_spanish: nos sacaste de Egipto
  alternatives_spanish:
  - nos hiciste subir de Egipto
  - nos trajiste de Egipto
  lexicon: HALOT
  rationale: עלה en este contexto del éxodo funciona como el idioma establecido de salida/liberación. En español, «sacar de Egipto» es la manera más natural de reproducir esa imagen y su función narrativa.
- source_word: לְהָמִית
  english_pob_choice: to kill
  chosen_spanish: para matar
  alternatives_spanish:
  - para hacer morir
  - con el fin de matarnos
  lexicon: HALOT
  rationale: El infinitivo causativo de מות expresa provocar la muerte; «para matar» reproduce la acusación con claridad y sin suavizarla.
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - nos
  - a mí
  lexicon: HALOT
  rationale: El hebreo conserva el singular «me» aunque el sujeto colectivo sea plural. Se mantiene esa tensión en español para no normalizarla.
- source_word: בָּנַי
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos e hijas
  - mis niños
  lexicon: HALOT
  rationale: בנים puede ser «hijos» en sentido general; «mis hijos» preserva la concisión del hebreo y sigue el valor familiar más amplio del término.
- source_word: מִקְנַי
  english_pob_choice: my livestock
  chosen_spanish: mi ganado
  alternatives_spanish:
  - mis rebaños
  - mis animales
  lexicon: HALOT
  rationale: מקנה se refiere al ganado/livestock poseído. «Mi ganado» es breve, exacto y suficientemente amplio para el contexto pastoral.
- source_word: בַּצָּמָא
  english_pob_choice: with thirst
  chosen_spanish: con sed
  alternatives_spanish:
  - por la sed
  - a causa de la sed
  lexicon: HALOT
  rationale: La preposición ב indica circunstancia o medio; «con sed» conserva la imagen de morir en condición de sed, que es la idea del hebreo.
theological_decisions:
- issue: Singular pronominal sequence in the complaint
  english_pob_reading: Retain the singular sequence 'me ... my children ... my livestock'
  chosen_spanish_reading: Mantener la secuencia singular «me ... mis hijos ... mi ganado»
  alternative_spanish_readings:
  - 'Suavizar a plural: «nos ... nuestros hijos ... nuestro ganado»'
  rationale: El hebreo pasa de un sujeto colectivo a pronombres singulares, probablemente como queja representativa de un individuo que habla por todos. El español debe conservar esa tensión textual en vez de nivelarla.
  doctrine_reference: Translation philosophy §1, §5
- issue: Complaint verb nuance
  english_pob_reading: Render לון as 'grumbled'
  chosen_spanish_reading: Renderizar לון como «murmuró»
  alternative_spanish_readings:
  - «se quejó»
  - «refunfuñó»
  rationale: En la narrativa del desierto, el verbo tiene la carga de una protesta contra el liderazgo establecido por Dios. «Murmuró» comunica bien esa nota sin volverlo demasiado moderno o demasiado débil.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Se siguió de cerca el último estado revisado del inglés POB: se mantuvo la estructura narrativa básica, la queja contra Moisés y el singular representativo en la acusación final. Se ajustó la pregunta hebrea a un español natural («¿Por qué nos sacaste de Egipto…?») sin perder la fuerza reprochadora.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma programática en el proyecto, pero este versículo no contiene el nombre divino.
  - «Moisés» se mantiene como nombre propio estándar.
  - «murmuró» conserva el matiz de oposición/queja comunitaria del desierto.
  - Se evitó «SEÑOR» o una paráfrasis que borrara la tensión textual del singular representativo.
