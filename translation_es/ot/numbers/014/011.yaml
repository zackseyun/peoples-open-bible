translation:
  language: es
  text: 'Y Yahvé dijo a Moisés: «¿Hasta cuándo me menospreciará este pueblo[a]? ¿Y hasta cuándo no creerán en mí[b], a pesar de todas las señales que he hecho entre ellos[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo me tratará este pueblo con desprecio?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿hasta cuándo no confiarán en mí?»'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en medio de él», con referencia al pueblo como colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Transliteración reverente del Tetragrama
  rationale: El hebreo usa el nombre divino propio, no un título. En español se adopta 'Yahvé' para conservar el nombre del pacto y seguir la pauta del proyecto de no sustituirlo por 'SEÑOR'.
- source_word: עַד אָ֥נָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Hasta cuándo?
  lexicon: HALOT
  rationale: '''¿Hasta cuándo'' es la equivalencia idiomática natural del lamento/interrogación temporal hebrea y conserva el tono retórico repetido del versículo.'
- source_word: יְנַאֲצֻנִי
  english_pob_choice: will this people treat me with contempt
  chosen_spanish: tratará este pueblo de menos
  alternatives_spanish:
  - me despreciará
  - me tratará con desprecio
  - me menospreciará
  lexicon: HALOT
  rationale: נאץ expresa desprecio, rechazo con desdén o menosprecio. 'Tratar de menos' comunica en español el matiz de menosprecio/desdén sin volverlo demasiado interpretativo; se conserva la alternativa más explícita en nota.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta nación
  - estas personas
  lexicon: HALOT
  rationale: '''Este pueblo'' preserva el singular colectivo y el tono de distancia reprochadora del hebreo.'
- source_word: לֹא יַאֲמִינוּ בִי
  english_pob_choice: will they not believe in me
  chosen_spanish: no creerán en mí
  alternatives_spanish:
  - no confiarán en mí
  - no me creerán
  lexicon: HALOT
  rationale: El verbo אמן en esta construcción puede implicar creer o confiar. Se mantiene 'creer en mí' como renderización principal; la alternativa de confiar se conserva para reflejar la tensión semántica documentada.
- source_word: בְּכֹל הָאֹתֹות
  english_pob_choice: despite all the signs
  chosen_spanish: a pesar de todas las señales
  alternatives_spanish:
  - con todas las señales
  - en vista de todas las señales
  lexicon: HALOT
  rationale: El valor concesivo de בְּ aquí se expresa de manera natural con 'a pesar de', preservando la idea de incredulidad pese a evidencias dadas por Dios. 'Señales' mantiene el sentido de אות sin añadir 'milagrosas' que no está explícito.
- source_word: עָשִׂיתִי
  english_pob_choice: I have done
  chosen_spanish: he hecho
  alternatives_spanish:
  - hice
  - he realizado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con perfecto español para mantener la relevancia presente de los actos pasados de Dios.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su interior
  lexicon: HALOT
  rationale: Aunque el sufijo es singular, refiere al colectivo 'este pueblo'. 'Entre ellos' conserva el sentido colectivo y evita una literalidad extraña en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del Dios del pacto, no un título sustituto, conforme a la convicción editorial del proyecto y a la evidencia del Tetragrama en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre 'creer' y 'confiar' en לֹא יַאֲמִינוּ בִי
  english_pob_reading: will they not believe in me
  chosen_spanish_reading: no creerán en mí
  alternative_spanish_readings:
  - no confiarán en mí
  - no me creerán
  rationale: Se mantiene la relación más directa con el verbo hebreo, sin borrar la posible nota de confianza que el contexto también permite. La alternativa 'confiar' se reserva para reflejar esa amplitud semántica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where genuine ambiguity exists
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; el borrador sigue de alta concordancia con el audit trail inglés y la fuente hebrea.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular del nombre divino en todo el texto.
  - Se conserva el paralelo retórico de las dos preguntas con '¿Hasta cuándo...?'
  - '''Señales'' se usa de modo consistente para אות sin añadir especificación interpretativa.'
  - Las notas distinguen entre el matiz de menosprecio y el de incredulidad/confianza sin eliminar la tensión semántica del hebreo.
