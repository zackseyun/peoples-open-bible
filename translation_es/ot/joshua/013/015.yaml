translation:
  language: es
  text: Y Moisés dio a la tribu de los hijos de Rubén[a] según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los rubenitas». El hebreo dice literalmente «los hijos de Rubén».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: And ... gave
  chosen_spanish: Y ... dio
  alternatives_spanish:
  - Entonces ... dio
  lexicon: HALOT
  rationale: El wayyiqtol de נתן mantiene la secuencia narrativa. En español, «Y ... dio» conserva la progresión simple y directa sin añadir matiz temporal que el hebreo no exige necesariamente.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: N/A
  rationale: Nombre propio estándar en español bíblico y plenamente transparente.
- source_word: לְמַטֵּה
  english_pob_choice: to the tribe of
  chosen_spanish: a la tribu de
  alternatives_spanish:
  - a la vara de
  - a la tribu
  lexicon: HALOT
  rationale: En contexto de repartición tribal, מַטֶּה significa «tribu». El dativo hebreo se expresa naturalmente en español con «a la tribu de».
- source_word: בְנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  - los hijos de Reubén
  lexicon: HALOT
  rationale: Se conserva la expresión literal «hijos de» para reflejar de cerca la forma hebrea. «Rubenitas» es posible, pero borra la transparencia lexical que el audit trail inglés preserva.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - según sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí señala divisiones claniles dentro de la tribu. «Clanes» reproduce mejor esa organización social que el más general «familias»; «según» expresa el valor distributivo de la construcción.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una coma por naturalidad estilística; en español no era necesaria. El contenido base permanece estable y de alta concordancia con el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio habitual en español.
  - Se traduce מַטֶּה por «tribu» en contexto genealógico/territorial, no por el sentido literal de «vara».
  - Se conserva «hijos de Rubén» para transparencia formal frente al hebreo.
  - «Clanes» se usa para reflejar la unidad social de מִשְׁפָּחָה dentro de la tribu.
