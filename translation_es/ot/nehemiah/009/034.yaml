base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/034.yaml
  text: Even our kings[a], our officials, our priests, and our fathers did not keep your law[c][b], and they did not listen to your commandments and your testimonies with which you warned them.
  footnotes:
