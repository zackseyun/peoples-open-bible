id: 2SA.14.22
reference: 2 Samuel 14:22
source:
  edition: WLC
  text: וַ/יִּפֹּל֩ יוֹאָ֨ב אֶל פָּנָ֥י/ו אַ֛רְצָ/ה וַ/יִּשְׁתַּ֖חוּ וַ/יְבָ֣רֶךְ אֶת הַ/מֶּ֑לֶךְ וַ/יֹּ֣אמֶר יוֹאָ֡ב הַ/יּוֹם֩ יָדַ֨ע עַבְדְּ/ךָ֜ כִּי מָצָ֨אתִי חֵ֤ן בְּ/עֵינֶ֨י/ךָ֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ אֲשֶׁר עָשָׂ֥ה הַ/מֶּ֖לֶךְ אֶת דְּבַ֥ר עבד/ו־־־־־׃
translation:
  text: Then Joab fell with his face to the ground[a], bowed down, and blessed the king. Joab said, “Today your servant knows that I have found favor in your eyes, my lord the king, because the king has done the word of his servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'has done the word of his servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל ... אֶל פָּנָיו אַרְצָה
  chosen: fell with his face to the ground
  alternatives:
  - fell on his face to the ground
  - fell facedown to the ground
  lexicon: HALOT
  rationale: The Hebrew idiom literally describes falling toward/on one's face earthward. 'Fell with his face to the ground' preserves the physical posture in natural English without over-paraphrasing.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: This verb often denotes bowing/prostration before a superior. 'Bowed down' is readable modern English and fits the courtly setting; 'worshiped' would overstate the action here toward a human king.
- source_word: וַיְבָרֶךְ אֶת־הַמֶּלֶךְ
  chosen: blessed the king
  alternatives:
  - thanked the king
  - praised the king
  lexicon: HALOT
  rationale: The piel of ברך with a human object commonly means to bless. In context it expresses respectful gratitude, but 'blessed' stays closer to the Hebrew while remaining intelligible.
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - This day
  lexicon: HALOT
  rationale: Straightforward temporal adverb; 'Today' is contemporary English.
- source_word: יָדַע עַבְדְּךָ
  chosen: your servant knows
  alternatives:
  - your servant has come to know
  - your servant knows now
  lexicon: HALOT
  rationale: The perfect can express present realization from a completed event. 'Knows' communicates Joab's present acknowledgment succinctly.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal self-reference this is a conventional deferential expression rather than emphasizing bonded status. 'Your servant' best matches the register.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: I have found favor in your eyes
  alternatives:
  - I have found favor with you
  - I am in your favor
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. Retaining 'in your eyes' preserves the source imagery and remains understandable in English.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  - my lord, O king
  lexicon: HALOT
  rationale: Court address is best rendered with 'my lord the king,' preserving both respect and the appositional title.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - inasmuch as
  lexicon: HALOT
  rationale: Here the relative particle introduces the content explaining why Joab knows he has favor. In idiomatic English, 'because' best conveys the causal force.
- source_word: עָשָׂה ... אֶת דְּבַר עַבְדּוֹ
  chosen: has granted his servant’s request
  alternatives:
  - has done the word of his servant
  - has carried out his servant’s word
  lexicon: HALOT
  rationale: Literally 'has done the word of his servant.' In this context the sense is that the king complied with Joab's petition. 'Granted his servant’s request' expresses the idiomatic meaning clearly while staying within the source sense.
