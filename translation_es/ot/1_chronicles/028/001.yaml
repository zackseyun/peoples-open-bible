    text: O 'eunucos'; el término hebreo puede referirse a eunucos literales o, más generalmente, a oficiales de la corte real.
    reason: lexical_alternative
  revision_rationale: Se ajustó la frase sobre רכוש ומקנה para expresar que esos líderes estaban a cargo de los bienes y el ganado, no que fueran 'líderes de las propiedades' en sentido literal. Se cambió 'centenas' por 'cientos' por mayor naturalidad panhispánica. Se sustituyó 'todo hombre valiente de guerra' por 'todo hombre valeroso' para evitar una sobreespecificación de חָיִל y acercarse mejor al rationale auditado.
