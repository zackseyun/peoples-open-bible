translation:
  language: es
  text: 'Y ella dijo[a]: «¡Vive Yahvé, tu Dios! No tengo ninguna torta de pan, sino solo un puñado de harina en la tinaja y un poco de aceite en el jarro. Y mira, estoy recogiendo dos palos, para entrar y prepararlo para mí y para mi hijo; lo comeremos y moriremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No tengo ningún panecillo» o «No tengo nada de pan cocido». El hebreo מָעוֹג se refiere a una pequeña torta o pan cocido.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh your God lives
  chosen_spanish: ¡Vive Yahvé, tu Dios!
  alternatives_spanish:
  - ¡Por la vida de Yahvé, tu Dios!
  - ¡Vive Yahvé, tu Dios, como testigo!
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne; en español, «¡Vive Yahvé, tu Dios!» reproduce la invocación o juramento con naturalidad y mantiene el nombre divino sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La pauta del proyecto pide «Yahvé» para el Tetragrámaton. Se conserva el nombre propio divino y no se lo enmascara con un sustituto tradicional.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  - tu Dios que tú adoras
  lexicon: HALOT
  rationale: El posesivo directo es claro y natural en español; «tu Dios» expresa la relación de pertenencia y apelación al interlocutor.
- source_word: אִם יֶשׁ לִי מָעוֹג
  english_pob_choice: I have no bread-cake
  chosen_spanish: No tengo ningún pan-cake
  alternatives_spanish:
  - No tengo ningún pastel de pan
  - No tengo ninguna torta de pan
  lexicon: HALOT
  rationale: Se conserva el valor lexical de מָעוֹג como un pequeño pan redondo/masa cocida. «Pan-cake» mantiene el intento de la POB inglesa de no banalizar el término, aunque en español queda como una forma marcada; se deja sin suavizar para no perder la tensión lexical documentada.
- source_word: כִּי אִם
  english_pob_choice: only
  chosen_spanish: sino solo
  alternatives_spanish:
  - excepto que solo
  - sino únicamente
  lexicon: HALOT
  rationale: La construcción exceptiva introduce contraste con lo que sí posee. «Sino solo» comunica bien la exclusión en español actual.
- source_word: מְלֹא כַף קֶמַח
  english_pob_choice: a handful of flour
  chosen_spanish: un puñado de harina
  alternatives_spanish:
  - una palma llena de harina
  - un puñado colmado de harina
  lexicon: HALOT
  rationale: «Puñado» es el equivalente natural de la medida manual implicada por «la palma/la mano llena». Mantiene la pequeñez de la cantidad sin tecnicismos.
- source_word: בַּכַּד
  english_pob_choice: in the jar
  chosen_spanish: en el jarro
  alternatives_spanish:
  - en la tinaja
  - en el cántaro
  lexicon: HALOT
  rationale: Para el recipiente de harina, «jarro» funciona bien en español y permite distinguirlo de la vasija del aceite. Se evita una rigidez artificial con «jarra» o «tinaja».
- source_word: וּמְעַט שֶׁמֶן
  english_pob_choice: a little oil
  chosen_spanish: un poco de aceite
  alternatives_spanish:
  - una pequeña cantidad de aceite
  lexicon: HALOT
  rationale: Equivalencia directa y natural; mantiene la escasez señalada por el hebreo.
- source_word: בַּצַּפָּחַת
  english_pob_choice: in the jug
  chosen_spanish: en la vasija
  alternatives_spanish:
  - en el jarrito
  - en la aceitera
  lexicon: HALOT
  rationale: La palabra designa un recipiente pequeño. «Vasija» es suficientemente amplia y evita imponer una forma demasiado específica donde el español podría sonar forzado.
- source_word: וְהִנְנִי
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y aquí estoy
  lexicon: HALOT
  rationale: La partícula deíctica introduce inmediatez. «Y mira» conserva el gesto oral de llamar la atención sin recurrir a un arcaísmo pesado.
- source_word: מְקֹשֶׁשֶׁת
  english_pob_choice: I am gathering
  chosen_spanish: estoy recogiendo
  alternatives_spanish:
  - estoy juntando
  - estoy reuniendo
  lexicon: HALOT
  rationale: El participio indica acción en curso; «estoy recogiendo» expresa una actividad presente y concreta en contexto doméstico.
- source_word: שְׁנַיִם עֵצִים
  english_pob_choice: two sticks
  chosen_spanish: dos leños
  alternatives_spanish:
  - dos palitos
  - dos ramitas
  lexicon: HALOT
  rationale: Aunque «sticks» en inglés apunta a una cantidad mínima de combustible, en español «leños» puede sonar más natural y digno sin perder la idea de poca madera. Se conserva la modestia de la provisión.
- source_word: וּבָאתִי וַעֲשִׂיתִיהוּ
  english_pob_choice: so that I may go in and prepare it
  chosen_spanish: para entrar, prepararlo
  alternatives_spanish:
  - para ir y prepararlo
  - para volver y hacerlo
  lexicon: HALOT
  rationale: 'Se vierte como finalidad implícita: recoger la madera con el propósito de entrar y preparar la comida. «Prepararlo» mantiene el objeto implícito del alimento sin añadir explicaciones.'
- source_word: לִי וְלִבְנִי
  english_pob_choice: for myself and for my son
  chosen_spanish: para mí y para mi hijo
  alternatives_spanish:
  - para mí y para mi hijo pequeño
  - para mí y para mi muchacho
  lexicon: HALOT
  rationale: La relación filial es explícita en el contexto; «mi hijo» es la forma más natural y sobria en español.
- source_word: וַאֲכַלְנֻהוּ
  english_pob_choice: and we may eat it
  chosen_spanish: y comerlo
  alternatives_spanish:
  - y lo comeremos
  - y podamos comerlo
  lexicon: HALOT
  rationale: En español, el infinitivo final («para... y comerlo») transmite bien la secuencia de propósito sin forzar un subjuntivo. El pronombre retoma el alimento preparado.
- source_word: וָמָתְנוּ
  english_pob_choice: and die
  chosen_spanish: y morir
  alternatives_spanish:
  - y después morir
  - y luego perecer
  lexicon: HALOT
  rationale: El hebreo expresa un resultado final tajante; el infinitivo simple conserva la dureza y brevedad del cierre.
theological_decisions:
- issue: Cómo renderizar el Tetragrámaton en una fórmula de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה de forma directa, y la norma del proyecto exige «Yahvé». En una fórmula de juramento, mantener el nombre propio evita diluir el peso teológico y retórico del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: El valor de מָעוֹג en una confesión de extrema escasez
  english_pob_reading: bread-cake
  chosen_spanish_reading: pan-cake
  alternative_spanish_readings:
  - panecillo
  - torta de pan
  rationale: La POB inglesa documenta que מָעוֹג no es simplemente «bread» sino un pequeño pastel/pan cocido. En español, se deja una forma marcada para conservar la distinción léxica y la tensión textual, sin normalizarla a un término demasiado genérico.
  doctrine_reference: 'DOCTRINE.md: Lexical fidelity over smoothing'
- issue: El tono final de la frase de muerte
  english_pob_reading: and die
  chosen_spanish_reading: y morir
  alternative_spanish_readings:
  - y vamos a morir
  - y morirnos
  rationale: El final hebreo es abrupto y sombrío. «Y morir» mantiene esa sequedad, en vez de expandirla con explicaciones o suavizantes.
  doctrine_reference: 'DOCTRINE.md: Preserve documented tensions'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducirlo mecánicamente: se mantuvo el nombre divino como Yahvé, se conservó la tensión de מָעוֹג con una forma marcada y se respetó la secuencia breve y desesperada del cierre. No hubo revisiones posteriores que alteraran la lectura base; el último pase inglés indicó high_agreement y sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se prefirió «tu Dios» para אֱלֹהֶיךָ por naturalidad y fidelidad sintáctica.
  - «Puñado de harina» y «un poco de aceite» preservan la escasez sin añadir matices inexistentes.
  - La nota a pie de página está anclada en «pan-cake» porque ahí reside la decisión léxica más delicada.
  - Se evitó «SEÑOR» para no ocultar el nombre divino revelado en el hebreo.
