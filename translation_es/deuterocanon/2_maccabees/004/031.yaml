translation:
  language: es
  text: Así pues, el rey llegó pronto para poner en orden los asuntos, dejando a Andrónico, uno de los que ocupaban un cargo elevado, en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θᾶττον
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  - con prontitud
  lexicon: LSJ
  rationale: El adverbio expresa premura; "pronto" suena natural en español y conserva la idea de urgencia sin intensificar más de lo que exige el griego.
- source_word: ἧκεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  - se presentó
  lexicon: LSJ
  rationale: En este contexto narrativo, "llegó" comunica con claridad la llegada del rey para intervenir. Mantiene el valor básico del verbo sin sonar artificial.
- source_word: καταστεῖλαι
  english_pob_choice: to settle
  chosen_spanish: poner en orden
  alternatives_spanish:
  - arreglar
  - calmar
  - restablecer
  lexicon: LSJ
  rationale: 'Con τὰ πράγματα, el sentido es administrativo y político: traer los asuntos a orden. "Poner en orden" conserva esa idea mejor que una traducción demasiado violenta o abstracta.'
- source_word: τὰ πράγματα
  english_pob_choice: the affairs
  chosen_spanish: los asuntos
  alternatives_spanish:
  - las cosas
  - los asuntos públicos
  - la situación
  lexicon: LSJ
  rationale: La expresión griega es amplia y apunta al estado de los asuntos. "Los asuntos" preserva esa amplitud con un giro natural en español.
- source_word: καταλείπων
  english_pob_choice: leaving
  chosen_spanish: dejando
  alternatives_spanish:
  - abandonando
  - encargando
  - dejando atrás
  lexicon: LSJ
  rationale: El participio indica que el rey dejó a Andrónico allí al irse. "Dejando" sigue de cerca la relación sintáctica sin añadir matices no presentes en el griego.
- source_word: τὸν διαδεχόμενον
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - como su sucesor
  - para sucederlo
  - ocupando su puesto
  lexicon: LSJ
  rationale: La revisión inglesa corrigió una lectura demasiado fuerte de sucesión formal. "En su lugar" refleja mejor que Andrónico quedó allí haciendo las veces del rey, sin afirmar necesariamente una investidura oficial de sucesor.
- source_word: Ἀνδρόνικον
  english_pob_choice: Andronicus
  chosen_spanish: Andrónico
  alternatives_spanish:
  - Andrónico
  lexicon: transliteration standard
  rationale: Se usa la forma española habitual del nombre propio griego, adaptada a la ortografía y acentuación del español.
- source_word: τῶν ἐν ἀξιώματι κειμένων
  english_pob_choice: one of those holding high office
  chosen_spanish: uno de los que ocupaban un cargo elevado
  alternatives_spanish:
  - uno de los dignatarios
  - uno de los que tenían alto cargo
  - uno de los oficiales de rango
  lexicon: LSJ
  rationale: La frase describe a personas situadas en dignidad o rango. "Ocupaban un cargo elevado" mantiene el sentido oficial y evita una fórmula más interpretativa como "dignatarios".
translation_notes:
  revision_awareness: La base inglesa pasó de "as his successor" a "in his place" para ajustarse más al griego; por eso el español evita "sucesor" y adopta una formulación locativa/funcional más cercana al texto fuente.
  spanish_consistency_notes:
  - Se mantuvo "Andrónico" como forma española estable del nombre propio.
  - No se introdujeron términos eclesiásticos ajenos al contexto político del versículo.
  - '"Poner en orden los asuntos" conserva el matiz administrativo de καταστεῖλαι τὰ πράγματα sin sobretraducir.'
