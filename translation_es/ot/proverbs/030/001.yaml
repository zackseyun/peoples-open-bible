translation:
  language: es
  text: 'Las palabras de Agur hijo de Jakeh[a], oráculo: la declaración del hombre a Ithiel[b], a Ithiel y Ucal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente, «Las palabras de Agur hijo de Jakeh de Masa», entendiendo הַמַּשָּׂא como un nombre geográfico o tribal y no como «oráculo».
    reason: alternative_reading
  - marker: b
    text: O, posiblemente, «Estoy cansado, oh Dios; estoy cansado, oh Dios, y agotado», si las últimas palabras se vocalizan de otra manera como una cláusula verbal en vez de leerse como los nombres Ithiel y Ucal.
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  lexicon: HALOT
  rationale: El constructo plural de דבר introduce un conjunto de enunciados o una inscripción de encabezado. «Las palabras de» es la fórmula más directa y natural en español para un título sapiencial, mientras que «los dichos de» sería algo más interpretativo.
- source_word: אָג֥וּר
  english_pob_choice: Agur
  chosen_spanish: Agur
  lexicon: Nombre propio
  rationale: Es un nombre propio y se translitera, no se traduce.
- source_word: בִּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: HALOT
  rationale: Es el marcador genealógico estándar; «hijo de» reproduce con naturalidad el sentido relacional.
- source_word: יָקֶה
  english_pob_choice: Jakeh
  chosen_spanish: Jakeh
  lexicon: Nombre propio
  rationale: Nombre propio transliterado.
- source_word: הַמַּשָּׂא
  english_pob_choice: the oracle
  chosen_spanish: el oráculo
  alternatives_spanish:
  - Masa
  - la carga
  lexicon: HALOT
  rationale: En este encabezado sapiencial, el sustantivo común «oráculo» preserva el valor de pronunciamiento solemne. La lectura alternativa como nombre propio («Masa») o como «carga» es real, pero el artículo favorece el sustantivo común; por eso se mantiene la tensión en nota.
- source_word: נְאֻם
  english_pob_choice: the declaration of
  chosen_spanish: la declaración de
  alternatives_spanish:
  - el dicho de
  - la proclamación de
  lexicon: HALOT
  rationale: Es una fórmula de pronunciamiento solemne. «Declaración» conserva el tono formal sin caer en arcaísmo.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el hombre fuerte
  lexicon: HALOT
  rationale: גבר puede implicar fuerza, pero aquí funciona bien como designación de persona en el encabezado. «El hombre» es la opción menos interpretativa en español.
- source_word: לְאִיתִיאֵל
  english_pob_choice: to Ithiel
  chosen_spanish: a Ithiel
  alternatives_spanish:
  - a respecto de Ithiel
  - para Ithiel
  lexicon: HALOT
  rationale: La preposición ל se puede renderizar naturalmente como «a» en español para introducir al destinatario. «A Ithiel» evita sobreinterpretar la relación.
- source_word: לְאִיתִיאֵל
  english_pob_choice: to Ithiel
  chosen_spanish: a Ithiel
  alternatives_spanish:
  - a respecto de Ithiel
  - para Ithiel
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo sin armonizarla, porque puede ser enfática o parte de la fórmula de encabezado.
- source_word: וְאֻכָל
  english_pob_choice: and Ucal
  chosen_spanish: y Ucal
  alternatives_spanish:
  - y estoy cansado
  - y agotado
  lexicon: HALOT
  rationale: La puntuación masorética lo presenta como nombre propio, por lo que se preserva «Ucal» en el texto principal. La repuntuación verbal es una alternativa conocida y se documenta en nota.
theological_decisions:
- issue: Interpretación de הַמַּשָּׂא
  english_pob_reading: Read as common noun, 'the oracle,' not as the place-name/title 'Massa.'
  chosen_spanish_reading: Leerlo como sustantivo común, «el oráculo», no como el topónimo/título «Masa».
  alternative_spanish_readings:
  - Leerlo como nombre propio, «Masa» o «de Masa»
  rationale: Es una decisión principalmente léxico-sintáctica. El artículo favorece la lectura común y el contexto de encabezamiento sapiencial hace natural «oráculo». Como la alternativa es plausible y de larga discusión, se preserva en nota.
  doctrine_reference: 'Principio POB: preservar tensiones interpretativas genuinas cuando el hebreo no obliga a una sola lectura.'
- issue: Interpretación de וְאֻכָל
  english_pob_reading: Treat as the proper name 'Ucal' in line with the Masoretic pointing.
  chosen_spanish_reading: Tratarlo como el nombre propio «Ucal» siguiendo la vocalización masorética.
  alternative_spanish_readings:
  - 'Repuntuarlo como una cláusula verbal: «y estoy cansado»'
  - Repuntuarlo como «y agotado»
  rationale: El texto masorético lo presenta como nombre propio y esa lectura produce una secuencia coherente de encabezamiento. La alternativa verbal altera de modo importante el sentido, por lo que se deja constancia de ella en una nota.
  doctrine_reference: 'Principio POB: mantener la ambigüedad textual real sin resolverla sin aviso.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo masorético y conserva las dos tensiones principales documentadas por el POB inglés: la posible lectura de הַמַּשָּׂא como «el oráculo» o como «Masa», y la posible repuntuación de וְאֻכָל como cláusula verbal en lugar de nombre propio. Se ajustó la puntuación final para un encabezado castellano publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «el oráculo» y «la declaración» para conservar el registro formal del encabezado sapiencial.
  - Se preserva la duplicación de «a Ithiel» como en el hebreo, sin simplificarla.
  - Se transliteran los nombres propios sin castellanizarlos artificialmente.
