translation:
  text: '1 Sons of Zebulun[a], pay attention to the words of your father.

    2 I, Zebulun, became a good gift to my parents; for when I was born, my father prospered greatly, and the sheep and the cattle also, when with the variegated rods he had his share.

    3 And I do not know that I sinned in my days, except in intention.

    4 I do not remember that I committed lawlessness, except for the ignorance that I showed concerning Joseph, in that I gave my brothers my word not to tell my father what had happened.

    5 But I wept in secret for many days because of Joseph. For I was afraid of my brothers, because they had all agreed that whoever disclosed the secret should be put to death.

    6 Yet when they wanted to kill him, I pleaded with them with tears not to commit this sin[b].

    7 For Simeon and Dan and Gad came against Joseph to kill him, and he said to them with tears,

    8 “Have mercy on me, my brothers; pity the inward compassion of Jacob our father. Do not lay your hands on me to shed innocent blood, for I have not sinned against you.

    9 But even if I have sinned, discipline me with correction, my brothers; yet do not bring your hand to the murder of your brother, for the sake of Jacob your father.”

    10 And as he spoke these words in grief, while I could not bear his cries, I began to weep, and my liver was poured out, and all the substance of my inward parts grew faint.

    11 And I wept together with Joseph, and my heart thundered, and the joints of my body trembled[c][d], and I had no strength.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The mention of the variegated rods alludes to Jacob's breeding of the flocks in Genesis 30.
    reason: cross_reference
    anchor_ref: '2:2'
  - marker: b
    text: The Greek phrase rendered 'except in intention' is difficult and may point to inward thought rather than outward deed.
    reason: lexical_alternative
    anchor_ref: '2:3'
  - marker: d
    text: Literally, 'pity the inward parts of Jacob our father'—an ancient bodily expression for deep compassion.
    reason: cultural_note
    anchor_ref: '2:8'
  - marker: c
    text: Literally, 'my liver was poured out,' a vivid ancient expression of intense grief.
    reason: cultural_note
    anchor_ref: '2:10'
lexical_decisions:
- source_word: προσέχετε
  chosen: pay attention
  alternatives:
  - listen
  - give heed
  lexicon: BDAG
  rationale: Imperatival exhortation in testamentary address; 'pay attention' is strong and readable without sounding archaic.
- source_word: δόσις ἀγαθή
  chosen: a good gift
  alternatives:
  - a good present
  - a blessing
  lexicon: LSJ
  rationale: Keeps the concrete noun 'gift' and preserves Zebulun's self-description in relation to his parents rather than paraphrasing it as mere 'blessing'.
- source_word: ηὐξήνθη
  chosen: prospered greatly
  alternatives:
  - increased greatly
  - grew greatly
  lexicon: BDAG
  rationale: In context of Jacob's household wealth and flocks, 'prospered greatly' communicates increase in estate more naturally than a literal 'grew'.
- source_word: ποικίλαις ῥάβδοις
  chosen: variegated rods
  alternatives:
  - striped rods
  - speckled rods
  lexicon: LSJ
  rationale: Retains the allusion to the Genesis breeding episode while staying close to the adjective's sense of varied or mottled appearance.
- source_word: παρεκτὸς ἐννοίας
  chosen: except in intention
  alternatives:
  - except in thought
  - except in my mind
  lexicon: LSJ
  rationale: The phrase is textually awkward, but it appears to qualify sin as inward intention rather than overt deed; 'in intention' preserves that tension compactly.
- source_word: παρανομίαν
  chosen: lawlessness
  alternatives:
  - transgression
  - wrongdoing
  lexicon: BDAG
  rationale: Keeps the moral-legal force of the term rather than reducing it to generic 'wrongdoing'.
- source_word: ἄγνοιαν
  chosen: ignorance
  alternatives:
  - unknowing error
  - lack of understanding
  lexicon: BDAG
  rationale: Preserves Zebulun's self-characterization of fault as ignorance rather than deliberate rebellion.
- source_word: ἐβεβαίωσα
  chosen: gave my brothers my word
  alternatives:
  - confirmed to my brothers
  - bound myself with my brothers
  lexicon: BDAG
  rationale: In context the sense is that he assented firmly to the pact of silence; this rendering communicates commitment rather than mere verbal confirmation.
- source_word: μυστήριον
  chosen: the secret
  alternatives:
  - the mystery
  - the hidden matter
  lexicon: BDAG
  rationale: Here it refers to the concealed plot concerning Joseph, not a theological 'mystery' in later technical usage.
- source_word: ἀναιρεθῆναι
  chosen: should be put to death
  alternatives:
  - be killed
  - be done away with
  lexicon: BDAG
  rationale: Passive infinitive in a death-threat context; 'put to death' is explicit and suitably grave.
- source_word: προσεκάλουν
  chosen: pleaded with them
  alternatives:
  - begged them
  - called upon them
  lexicon: BDAG
  rationale: Captures earnest appeal with tears; stronger than the more wooden 'called upon'.
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - wrong
  - offense
  lexicon: BDAG
  rationale: The moral-religious force is central in Zebulun's exhortative voice.
- source_word: ἐλεήσατέ με
  chosen: Have mercy on me
  alternatives:
  - show me mercy
  - take pity on me
  lexicon: BDAG
  rationale: Preserves the direct plea and the mercy vocabulary important to this testament's ethos.
- source_word: οἰκτειρήσατε σπλάγχνα
  chosen: pity the inward compassion
  alternatives:
  - have compassion for
  - respect the tender affections
  lexicon: LSJ
  rationale: The Greek is vivid and bodily; this rendering keeps the unusual appeal to Jacob's compassionate inward parts rather than flattening it into generic sentiment.
- source_word: ἐπαγάγετε τὰς χεῖρας ὑμῶν
  chosen: lay your hands on me
  alternatives:
  - bring your hands against me
  - raise your hands against me
  lexicon: LSJ
  rationale: Idiomatic English for hostile physical action, while still reflecting the bodily imagery of the Greek.
- source_word: παιδείᾳ παιδεύσατέ
  chosen: discipline me with correction
  alternatives:
  - chasten me with discipline
  - punish me with instruction
  lexicon: BDAG
  rationale: Preserves the cognate emphasis of corrective discipline rather than simple punishment.
- source_word: φόνῳ
  chosen: the murder
  alternatives:
  - bloodshed
  - slaughter
  lexicon: BDAG
  rationale: Specific fratricidal killing is in view; 'murder' best conveys the moral charge.
- source_word: ὀδυρόμενος
  chosen: in grief
  alternatives:
  - lamenting
  - wailing
  lexicon: LSJ
  rationale: Fits the narrative flow and avoids overloading the line with another explicit cry-word since 'cries' follows.
- source_word: τὰ ἤπατά μου ἐξεχύθησαν
  chosen: my liver was poured out
  alternatives:
  - my heart was poured out
  - my inward parts were poured out
  lexicon: LSJ
  rationale: Ancient physiology locates deep emotion in the liver; retaining the organ keeps the embodied intensity of the Greek.
- source_word: ὑπόστασις τῶν σπλάγχνων
  chosen: the substance of my inward parts
  alternatives:
  - the strength of my inward being
  - the frame of my entrails
  lexicon: LSJ
  rationale: Difficult phrase, but this preserves the concrete bodily imagery rather than abstracting it away.
- source_word: ἐχαυνοῦτο
  chosen: grew faint
  alternatives:
  - was weakened
  - melted away
  lexicon: LSJ
  rationale: Conveys collapse of inner strength in natural English while matching the emotional context.
- source_word: ἐβόμβει
  chosen: thundered
  alternatives:
  - roared
  - pounded
  lexicon: LSJ
  rationale: The verb suggests a loud resonant sound; 'thundered' preserves the dramatic force of Zebulun's bodily reaction.
