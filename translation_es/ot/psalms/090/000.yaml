    text: 'O: «refugio» o «habitación» para «morada».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre «morada», que es el término correspondiente a מָעוֹן en el texto principal según el audit trail inglés («dwelling place»). Se reemplazó «refugio» por «morada» para seguir más fielmente la decisión principal del POB y se consolidaron las notas redundantes en una sola nota alternativa clara.
