  text: And the priest shall examine it[a], and behold, the hair in the bright spot has turned white and its appearance is deeper than the skin, it is a leprous disease that has broken out in the burn scar; and the priest shall pronounce him unclean. It is an infection of leprous disease.
  footnotes:
