translation:
  language: es
  text: 'Entonces todos los ancianos y todo el pueblo le dijeron: «No escuches, y no consientas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No obedezcas, y no accedas». Los verbos hebreos pueden abarcar los sentidos de escuchar/obedecer (שׁמע) y estar dispuesto/consentir (אבה).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; «Entonces» preserva ese valor secuencial en español natural, y «dijeron» mantiene el verbo de habla sin añadir matices no presentes en el texto.
- source_word: כָּל הַזְּקֵנִים
  english_pob_choice: all the elders
  chosen_spanish: todos los ancianos
  alternatives_spanish:
  - todos los líderes mayores
  - todos los viejos
  lexicon: HALOT
  rationale: En este contexto, זְקֵנִים designa a los ancianos/líderes de la comunidad, no simplemente a hombres de edad avanzada. «Ancianos» es la equivalencia española más fiel y comprensible.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la población
  lexicon: HALOT
  rationale: עָם se refiere al conjunto del pueblo junto con los ancianos. «Pueblo» mantiene el alcance colectivo y suena natural en español bíblico contemporáneo.
- source_word: אַל תִּשְׁמַע
  english_pob_choice: Do not listen
  chosen_spanish: No escuches
  alternatives_spanish:
  - No oigas
  - No obedezcas
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír, escuchar y obedecer. Aquí la súplica/consejo inmediato a un rey en negociación se expresa mejor con «escuches»; la alternativa obedecer queda como posibilidad semántica sin imponerse como única lectura.
- source_word: וְלֹא תֹאבֶה
  english_pob_choice: and do not consent
  chosen_spanish: y no consientas
  alternatives_spanish:
  - y no estés dispuesto
  - y no accedas
  lexicon: HALOT
  rationale: אבה comunica disposición o consentimiento. «Consientas» reproduce bien la negativa voluntaria y empareja con «No escuches» como una segunda negativa climática.
theological_decisions:
- issue: Relación entre שׁמע y obediencia en un contexto de consejo político
  english_pob_reading: Do not listen, and do not consent. The Hebrew verbs can carry the senses of listening/obeying and being willing/consenting.
  chosen_spanish_reading: No escuches, y no consientas.
  alternative_spanish_readings:
  - No obedezcas, y no accedas.
  - No oigas, y no quieras hacerlo.
  rationale: 'No se borra la tensión semántica de שׁמע: en este contexto incluye escuchar y potencialmente obedecer. Sin embargo, «escuches» conserva la lectura primaria sin cerrar indebidamente el sentido. La segunda cláusula mantiene el rechazo a la voluntad/consentimiento implícito en אבה.'
  doctrine_reference: HALOT; uso contextual de שׁמע y אבה en discurso de negociación
- issue: Referencia del pronombre implícito «le / a él»
  english_pob_reading: to him
  chosen_spanish_reading: le
  alternative_spanish_readings:
  - a él
  - al rey
  rationale: El hebreo usa un pronombre explícito, pero el antecedente inmediato ya está establecido por el contexto. El dativo átono «le» es natural en español y no añade información no presente en el verso.
  doctrine_reference: Contexto narrativo; antecedente discursivo
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios relevantes; la elección española conserva el valor secuencial de וַיֹּאמְרוּ, el alcance comunitario de זְקֵנִים/עָם y la tensión semántica de שׁמע/אבה. No se detectaron revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «ancianos» para זְקֵנִים, conforme al uso contextual de líderes comunitarios.
  - Se usa «pueblo» para עָם y no términos más restrictivos como «gente» o «población».
  - Se conserva la doble negativa con imperativos en segunda persona singular para reflejar el discurso directo al rey.
  - La nota al pie presenta una alternativa lexical sin desplazar la lectura principal del texto.
