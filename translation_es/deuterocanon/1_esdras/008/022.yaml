base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/022.yaml
  text: And it is also declared to you that no tax or other burden is to be imposed on any of the priests[a], Levites, temple singers, gatekeepers, temple servants, or workers of this temple[b], and that no one is to have authority to impose it on them.
  footnotes:
  - marker: a
    text: Or 'other burden' or 'other imposition.' The Greek term can denote an additional imposed obligation; the fiscal context favors 'levy.'
    reason: lexical_alternative
  - marker: b
    text: '''Workers of this temple'' renders a term for those occupied with the temple''s affairs or business; ''officials'' is also possible but may sound too narrow.'
    reason: lexical_alternative
