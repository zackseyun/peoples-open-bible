translation:
  language: es
  text: Porque no te deleitas en sacrificio[a]; si no, lo daría; no te complace el holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque no deseas sacrificio; de otro modo, lo daría». El hebreo permite una formulación más formal por la conjunción y el orden de la cláusula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: כִּי introduce la razón o explicación de la afirmación precedente. En español, «Porque» conserva la conexión argumentativa de modo natural y fiel al valor causal.
- source_word: לֹא תַחְפֹּץ
  english_pob_choice: you do not delight in
  chosen_spanish: no te deleitas en
  alternatives_spanish:
  - no deseas
  - no te complaces en
  lexicon: HALOT
  rationale: חפץ expresa una inclinación de agrado o deleite, no solo deseo abstracto. «No te deleitas en» preserva mejor ese matiz afectivo que «no deseas».
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda sacrificial
  - sacrificio ritual
  lexicon: HALOT
  rationale: El término cultual estándar זֶבַח corresponde naturalmente a «sacrificio» en español, manteniendo precisión y legibilidad.
- source_word: וְאֶתֵּנָה
  english_pob_choice: or I would give it
  chosen_spanish: o yo lo daría
  alternatives_spanish:
  - y yo lo daría
  - de otro modo yo lo daría
  lexicon: HALOT
  rationale: 'La construcción en contexto es contrastiva o resultativa: si Dios se deleitara en el sacrificio, el hablante lo ofrecería. «O yo lo daría» conserva la relación condicional implícita y el objeto pronominal recuperado del sustantivo previo.'
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrenda quemada
  - sacrificios quemados
  lexicon: HALOT
  rationale: עוֹלָה es el término técnico para la ofrenda totalmente quemada. «Holocaustos» es un equivalente tradicional en español bíblico para este rito; se conserva aquí por su precisión cultual, aunque la forma es más marcada que «ofrenda quemada».
- source_word: לֹא תִרְצֶה
  english_pob_choice: you do not take pleasure in
  chosen_spanish: no te complacen
  alternatives_spanish:
  - no aceptas con agrado
  - no te agradan
  lexicon: HALOT
  rationale: רצה en este contexto comunica aceptación favorable o agrado respecto de una ofrenda. «No te complacen» mantiene esa idea de favor/agrado sin reducirla a simple aceptación jurídica.
theological_decisions:
- issue: Relación entre sacrificio y la voluntad divina
  english_pob_reading: The verse denies that sacrifice by itself is what God desires in the psalmist's repentant situation, rather than abolishing the sacrificial system altogether.
  chosen_spanish_reading: El versículo niega que el sacrificio, por sí solo, sea lo que Dios desea en la situación de arrepentimiento del salmista, sin abolir por eso todo el sistema sacrificial.
  alternative_spanish_readings:
  - Rechazo universal de todo sacrificio
  - Abolición definitiva del culto sacrificial
  rationale: 'La redacción española mantiene la tensión teológica del salmo: la insuficiencia del rito sin la actitud adecuada, en vez de convertir el texto en una negación absoluta del sacrificio.'
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios, y el cotejo posterior mostró alta concordancia; por eso se mantiene una solución cercana al texto fuente y al audit trail inglés, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando corresponde el nombre divino; aquí no aparece.
  - Se conservó el contraste implícito de la cláusula condicional sin explicitarlo con glosa interpretativa en el texto principal.
  - «Holocaustos» se usa como término cultual tradicional para עוֹלָה, aunque la nota o la equivalencia alternativa pueden optar por «ofrendas quemadas» si se desea mayor neutralidad semántica.
