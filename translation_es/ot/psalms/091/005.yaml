translation:
  language: es
  text: No temerás[a] el terror de la noche[b], ni la flecha que vuela de día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No necesitas temer», para hacer explícito el sentido de seguridad.
    reason: lexical_alternative
  - marker: b
    text: O «pavor» para «terror».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִירָא
  english_pob_choice: you will not fear
  chosen_spanish: No temerás
  alternatives_spanish:
  - No necesitas temer
  - No temas
  - No tendrás temor
  lexicon: HALOT
  rationale: El imperfecto con לֹא en este contexto poético expresa una seguridad futura o asegurada, no un mandato. «No temerás» conserva ese valor de promesa/certeza mejor que una prohibición directa como «No temas».
- source_word: פַּחַד
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - pavor
  - temor
  - dread
  lexicon: HALOT
  rationale: פַּחַד nombra un miedo que amenaza o aterroriza; «terror» mantiene mejor esa fuerza que «temor», que en español puede sonar más débil o genérico.
- source_word: לָיְלָה
  english_pob_choice: of the night
  chosen_spanish: de la noche
  alternatives_spanish:
  - en la noche
  - por la noche
  - de noche
  lexicon: HALOT
  rationale: La relación nominal se expresa de manera natural en español como «de la noche», preservando el paralelismo poético con «de día» en el segundo hemistiquio.
- source_word: חֵץ
  english_pob_choice: arrow
  chosen_spanish: flecha
  alternatives_spanish:
  - flecha
  - dardo
  - proyectil
  lexicon: HALOT
  rationale: «Flecha» es la equivalencia concreta y directa del término hebreo, y conserva la imaginería literal del verso sin añadir interpretación.
- source_word: יָעוּף
  english_pob_choice: flies
  chosen_spanish: vuela
  alternatives_spanish:
  - vuela
  - se lanza
  - sale volando
  lexicon: HALOT
  rationale: El verbo qal de עוּף significa volar; «vuela» reproduce la imagen de movimiento aéreo de forma natural en español.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - por el día
  - durante el día
  - de día
  lexicon: HALOT
  rationale: «De día» es la forma idiomática y breve en español para el adverbio temporal, y preserva el contraste con «de la noche».
theological_decisions:
- issue: 'Valor de לֹא + imperfecto: promesa o mandato'
  english_pob_reading: 'promise/assurance: ''You will not fear'''
  chosen_spanish_reading: 'promesa/seguridad: «No temerás»'
  alternative_spanish_readings:
  - 'mandato: «No temas»'
  - 'paráfrasis de permiso: «No necesitas temer»'
  rationale: La forma hebrea no exige una prohibición imperativa; en este salmo funciona como garantía de protección. Mantenerlo como seguridad futura respeta la tensión observada por el POB inglés y evita imponer un tono exhortativo que el hebreo no requiere.
  doctrine_reference: Primacía del texto original; preservar la fuerza modal del hebreo sin resolver la ambigüedad hacia una formulación más tradicional de mandato.
translation_notes:
  revision_awareness: 'Se siguió el cierre de revisión más reciente del expediente inglés: no hubo cambios tras la última pasada, y la concordancia general del control cruzado fue alta. La redacción española mantiene esa lectura estable sin introducir ajustes no motivados por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo nocturno/diurno con «de la noche» / «de día».
  - Se preserva la imagen concreta de la «flecha» y el movimiento de «vuela».
  - Se evita reemplazar el valor asegurativo del imperfecto con un imperativo español.
  - El texto usa español neutral y sobrio, apto para lectura eclesial amplia.
