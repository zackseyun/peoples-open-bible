translation:
  language: es
  text: Por eso, Dios[a] llenó su corazón y lo hirió[b], y lo derribó por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «el Señor» donde el testimonio hebreo dice «Dios».
    reason: alternative_reading
  - marker: b
    text: 'El hebreo transmitido es breve y difícil aquí; literalmente sería algo como: «Por eso Dios llenó su corazón, hirió». El paralelo griego dice: «Por eso el Señor hizo extraordinarios los azotes/juicios, y los destruyó por completo».'
    reason: textual_variant
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor inferencial del hebreo, manteniendo la relación causal con lo anterior sin sobrecargar el estilo.
- source_word: מִלֵּא לִבּוֹ
  english_pob_choice: filled his heart
  chosen_spanish: llenó su corazón
  alternatives_spanish:
  - colmó su corazón
  - llenó su interior
  lexicon: HALOT
  rationale: Sigue de cerca el hebreo transmitido y conserva la imagen del 'corazón' como sede interior; no se explicita un complemento no presente en el texto base.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: La tradición hebrea conservada lee אֱלֹהִים; por eso la traducción principal usa 'Dios'. Se preserva la variante 'el Señor' solo como testimonio alterno en nota.
- source_word: נָגַע
  english_pob_choice: struck
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo afligió
  - lo tocó
  lexicon: HALOT
  rationale: En contexto punitivo, נגע puede expresar un golpe o herida infligida. 'Hirió' mantiene la fuerza del acto divino sin sonar demasiado mecánico en español.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo derribó
  alternatives_spanish:
  - lo golpeó
  - lo abatió
  - lo destruyó
  lexicon: HALOT
  rationale: El hebreo intensifica la acción de golpear; 'derribó' comunica bien el efecto destructivo y encaja con el resultado total del verso.
- source_word: עַד כַּלֵּה
  english_pob_choice: completely
  chosen_spanish: por completo
  alternatives_spanish:
  - totalmente
  - hasta el fin
  - por entero
  lexicon: HALOT
  rationale: La expresión indica consumación total o ruina completa; 'por completo' es claro, natural y fiel al sentido de totalidad.
theological_decisions:
- issue: Título divino en un testimonio hebreo con paralelo griego divergente
  english_pob_reading: God / the Lord
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  rationale: Como el hebreo transmitido conserva אֱלֹהִים, la lectura principal sigue ese testimonio. La variante griega Κύριος ('el Señor') se conserva únicamente como alternativa documentada, sin armonizarla en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde sobreviva; DOCTRINE.md: preservar lecturas testigos y variantes textuales'
- issue: Cómo reflejar una cláusula hebrea breve y algo difícil sin importar directamente la expansión griega
  english_pob_reading: filled his heart and struck him
  chosen_spanish_reading: llenó su corazón y lo hirió
  alternative_spanish_readings:
  - llenó su corazón y lo golpeó
  - llenó su corazón y lo afligió
  - llenó su corazón y lo castigó
  rationale: La redacción principal conserva la imaginería del hebreo ('corazón') y el acto de herir/afectar, sin convertir la frase en una paráfrasis interpretativa más larga. La plenitud del golpe final se expresa después con 'lo derribó por completo'.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión textual y no resolverla artificialmente; PHILOSOPHY.md: transparencia ante la incertidumbre de la fuente'
translation_notes:
  revision_awareness: 'Se revisó el verso para anclar claramente ambas notas al texto español: [a] va en el verbo de la primera cláusula, que refleja la dificultad textual del hebreo frente al paralelo griego; [b] va en la cláusula final para señalar el matiz de totalidad corroborado por el griego εἰς τέλος. La redacción principal permanece basada en el hebreo conservado, sin fusionar silenciosamente la variante griega en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים conforme al testimonio hebreo principal, reservando 'el Señor' para la variante griega en nota.
  - '''corazón'' conserva la antropología bíblica del hebreo; no se sustituye por un equivalente más explicativo.'
  - '''lo hirió'' y ''lo derribó'' evitan una paráfrasis excesiva y conservan el registro punitivo del pasaje.'
  - '''por completo'' expresa la totalidad de עַד כַּלֵּה sin sonar arcaico.'
