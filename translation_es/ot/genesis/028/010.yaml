  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Jacob sale de Beerseba y va a Harán. También preserva adecuadamente la nota sobre el sufijo direccional de חָרָנָה. Sin embargo, hay un ajuste menor de fidelidad y estilo: en español bíblico estándar el nombre propio suele ser «Jacobo», no «Jacob», y la nota mezcla inglés («toward») innecesariamente.'
  spanish_quality_summary: La oración es clara y natural, pero «Jacob» suena menos idiomático en español bíblico ampliamente legible que «Jacobo». «Salió de Beerseba y fue a Harán» es fluido y digno. La nota al pie necesita español completo y más concisión.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego aquí. El topónimo «Beerseba» es aceptable. El principal punto terminológico es el antropónimo: para legibilidad e idiomaticidad en español bíblico, «Jacobo» encaja mejor que «Jacob».'
  issues:
