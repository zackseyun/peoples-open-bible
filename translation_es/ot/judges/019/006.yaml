revisions:
- from: 'Así que ambos se sentaron, comieron y bebieron juntos. Entonces el padre de la joven[a] dijo al hombre: «Por favor, consiente en pasar la noche, y que tu corazón se alegre».'
  to: 'Entonces ambos se sentaron, comieron y bebieron juntos. Luego el padre de la joven dijo al hombre[a]: «Por favor, quédate a pasar la noche, y alégrate de corazón».'
  rationale: Se ajustó el inicio narrativo para un registro más natural y digno, se eliminó la nota innecesaria sobre «la muchacha», y se reformuló הוֹאֶל נָא con «quédate a pasar la noche» para un español más fluido, preservando la invitación cortés. Se añadió una nota léxica útil que conserva más explícitamente la idea de consentimiento de הוֹאֶל.
