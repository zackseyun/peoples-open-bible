  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: los malos/hombres perversos se humillan ante los buenos, y los impíos aparecen en dependencia ante la entrada del justo. Sin embargo, en la segunda cola introduce ''están'', que no está en el texto fuente ni en el POB inglés; el hebreo coordina el mismo predicado de humillación/bajada, por lo que conviene mantener la elipsis con una construcción que preserve mejor la fuerza paralela.'
  spanish_quality_summary: El español es claro y natural, con tono proverbial adecuado. 'Los malvados', 'ante', 'los buenos' y 'el justo' funcionan bien. La principal mejora es evitar 'están a las puertas', que suena demasiado estático y debilita la imagen de sometimiento o reconocimiento implícita en el verso y en la nota cultural.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones léxicas son en general fieles. 'Los impíos' para רְשָׁעִים es aceptable en registro sapiencial, aunque 'los malvados' o 'los malvados' repetiría más de cerca el campo semántico. La revisión propuesta conserva 'los impíos' pero corrige la estructura verbal para alinearse mejor con שַׁחוּ y con la lógica del paralelismo.
  issues:
  - severity: medium
    issue: La segunda cola añade el verbo explícito 'están'.
    rationale: El hebreo no introduce un nuevo verbo existencial; la segunda cola depende del mismo cuadro de humillación del primer miembro. 'Están a las puertas' reduce el sentido a mera ubicación y diluye la imagen de sometimiento/comparecencia.
  - severity: low
    issue: La nota [b] explica dependencia o súplica, pero el texto principal no lo deja sentir con suficiente fuerza.
    rationale: Con 'están a las puertas' la nota compensa una pérdida creada por la redacción española. Una formulación más compacta y paralela permite que la nota funcione como aclaración, no como corrección implícita del texto.
  revised_spanish_text: Los malvados se inclinan ante los buenos[a], y los impíos, a las puertas del justo[b].
