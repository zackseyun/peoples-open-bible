translation:
  language: es
  text: 'Así que la multitud que estaba de pie allí y lo había oído decía que había tronado; otros decían[a]: «Un ángel le ha hablado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hubo trueno» o «que había habido un trueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad inferencial/narrativa. «Así que» suena natural en español y conserva la relación con lo anterior sin volver el texto excesivamente formal.
- source_word: ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: En este contexto narrativo, «multitud» comunica bien un grupo reunido y evita una lectura demasiado coloquial de «gente».
- source_word: ὁ ἑστὼς
  english_pob_choice: that stood there
  chosen_spanish: que estaba de pie allí
  alternatives_spanish:
  - que estaba allí
  - que permanecía allí
  lexicon: BDAG
  rationale: El participio perfecto funciona adjetivalmente para describir la postura/presencia del grupo. «Estaba de pie allí» mantiene la escena y es natural en español.
- source_word: ἀκούσας
  english_pob_choice: and heard it
  chosen_spanish: y lo había oído
  alternatives_spanish:
  - y lo oyó
  - y habiendo oído
  lexicon: BDAG
  rationale: El aoristo participial antecede a la acción principal; el pluscuamperfecto español expresa bien esa anterioridad. «Lo» remite al sonido/voz del contexto inmediato.
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: decía
  alternatives_spanish:
  - estaba diciendo
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto indica repetición o continuidad. En español, «decía» transmite ese valor de manera natural y fluida.
- source_word: βροντὴν γεγονέναι
  english_pob_choice: that it had thundered
  chosen_spanish: que había tronado
  alternatives_spanish:
  - que había habido trueno
  - que había sido trueno
  lexicon: BDAG
  rationale: La construcción griega literalmente expresa «que el trueno había llegado a ser / ocurrido». En español, «había tronado» es la forma más idiomática y cercana al sentido; conserva la interpretación auditiva del suceso sin forzar una calca.
- source_word: ἄλλοι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - algunos otros
  - los demás
  lexicon: BDAG
  rationale: Contrasta un segundo grupo dentro de la multitud. «Otros» es la opción más directa y fiel.
- source_word: Ἄγγελος
  english_pob_choice: An angel
  chosen_spanish: Un ángel
  alternatives_spanish:
  - Un mensajero
  lexicon: BDAG
  rationale: El contexto presenta la interpretación del grupo como una voz celestial; por eso se mantiene «ángel» y no «mensajero».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto con λαλέω se expresa de forma natural en español con «le». El referente es Jesús en el contexto.
- source_word: λελάληκεν
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El perfecto señala una acción completada con relevancia presente. «Ha hablado» preserva ese valor mejor que el pretérito simple.
theological_decisions:
- issue: Identidad del ser celestial en la interpretación de la multitud
  english_pob_reading: An angel has spoken to him
  chosen_spanish_reading: Un ángel le ha hablado
  alternative_spanish_readings:
  - Un mensajero le ha hablado
  rationale: La frase refleja la interpretación de la multitud, no una afirmación doctrinal del narrador. Mantener «ángel» sigue la lectura más probable del contexto de una voz celestial y evita suavizarla hacia «mensajero».
  doctrine_reference: Affirmations; traducción fiel al contexto narrativo
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del POB inglés que prefirió una formulación más natural para βροντὴν γεγονέναι («it had thundered») frente a un calco más rígido. En español se optó por «había tronado» como equivalente idiomático que conserva el sentido auditivo del griego y la distinción entre el primer grupo y los otros.
  spanish_consistency_notes:
  - Se mantiene «multitud» como equivalente de ὄχλος en sentido narrativo colectivo.
  - Se conserva el dativo indirecto con pronombre átono («le») para αὐτῷ, según el contexto de Jesús.
  - No se usa «SEÑOR» ni otros sustitutos para nombres divinos porque este versículo no los requiere.
