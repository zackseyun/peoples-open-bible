    reason: cultural_note
  revision_rationale: Se reemplaza «todo su ejército» por «todas sus huestes» para preservar mejor el sentido de צְבָאָם en contexto cosmológico, alinearse con la revisión auditada del inglés («hosts»), y mejorar la naturalidad y precisión en español sin perder la imagen léxica tradicional.
