translation:
  language: es
  text: Sus iniquidades han apartado estas cosas[a], y sus pecados les han privado del bien[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas»; el referente son las bendiciones mencionadas en el contexto inmediato anterior.
    reason: lexical_alternative
  - marker: b
    text: O «las cosas buenas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲוֺנוֹתֵיכֶם
  english_pob_choice: your iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - sus culpas
  - sus pecados
  - su culpa
  lexicon: HALOT
  rationale: עָוֹן comunica iniquidad/culpa con peso moral y efecto de responsabilidad. «Iniquidades» conserva esa fuerza y mantiene la distinción con el segundo término, חַטֹּאותֵיכֶם, que se traduce aparte como «pecados».
- source_word: הִטּוּ
  english_pob_choice: have turned ... away
  chosen_spanish: han apartado
  alternatives_spanish:
  - han desviado
  - han apartado de su curso
  - han torcido
  lexicon: HALOT
  rationale: El verbo נטה aquí expresa desviar o volver aparte. «Han apartado» transmite bien la acción causal sobre el objeto implícito, en español natural y sin añadir más de lo que dice el hebreo.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas cosas
  - éstas
  lexicon: HALOT
  rationale: El demostrativo permanece deíctico y anafórico. «Estas» conserva la referencia implícita a las bendiciones o beneficios mencionados en el contexto previo, sin explicitarlos en el texto principal.
- source_word: וְחַטֹּאותֵיכֶם
  english_pob_choice: and your sins
  chosen_spanish: y sus pecados
  alternatives_spanish:
  - y sus ofensas
  - y sus faltas
  lexicon: HALOT
  rationale: חַטָּאת es el término corriente para pecado/ofensa. «Pecados» es la equivalencia más clara en español y preserva la distinción lexical respecto de «iniquidades».
- source_word: מָנְעוּ
  english_pob_choice: have withheld
  chosen_spanish: han retenido
  alternatives_spanish:
  - han impedido
  - han retenido de ustedes
  - han apartado
  lexicon: HALOT
  rationale: מנע significa retener, impedir o privar de algo. «Han retenido» funciona bien con «el bien» y comunica el resultado de privación sin forzar el matiz.
- source_word: הַטּוֹב
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - las cosas buenas
  - el bien/lo bueno
  lexicon: HALOT
  rationale: El sustantivo con artículo puede ser colectivo o abstracto. «El bien» preserva esa amplitud en español y evita decidir prematuramente entre prosperidad material y bondad general.
- source_word: מִכֶּם
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de ustedes mismos
  - de ustedes para sí
  lexicon: HALOT
  rationale: La preposición מן marca separación o privación. «De ustedes» es la forma natural en español para completar «han retenido el bien de ustedes», manteniendo el sentido de pérdida causada por el pecado.
theological_decisions:
- issue: Referente implícito de «estas»
  english_pob_reading: Retain the demonstrative 'these' without explicit expansion in the main text.
  chosen_spanish_reading: Conservar «estas» sin expandir a «estas cosas», «estas bendiciones» ni «la lluvia» en el texto principal.
  alternative_spanish_readings:
  - estas cosas
  - estas bendiciones
  - la lluvia
  rationale: El hebreo deja el referente implícito y remite al contexto anterior. Mantener el demostrativo sin explicitarlo respeta la primacía del texto fuente y evita añadir una interpretación no expresada en el versículo.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrase beyond source warrant.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo directo y el criterio auditado de la POB en inglés: mantener la deixis de אֵלֶּה, diferenciar עָוֹן de חַטָּאת y conservar הַטּוֹב como un sustantivo amplio. No hubo revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se prefirió «sus» en ambos miembros para reflejar el paralelismo posesivo del hebreo y mantener consistencia estilística.
  - «El bien» se conserva como sustantivo singular para no cerrar indebidamente el rango semántico del hebreo.
  - La puntuación separa con coma las dos cláusulas coordinadas, siguiendo el paralelismo poético del verso.
