translation:
  language: es
  text: Nos entregas[a] como ovejas como alimento, y entre las naciones nos has dispersado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Nos das». El verbo hebreo puede significar «dar», pero aquí también tiene el matiz de entregar a alguien a un destino hostil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְּנֵנוּ
  english_pob_choice: You give us over
  chosen_spanish: Nos entregas[a]
  alternatives_spanish:
  - Nos das
  - Nos entregas
  - Nos abandonas
  lexicon: HALOT
  rationale: נתן expresa aquí la idea de entregar o poner a alguien en manos ajenas; en español, «entregar» comunica mejor esa cesión a una situación hostil que un simple «dar», sin añadir todavía la imagen de abandono.
- source_word: כְּצֹאן
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - como rebaño
  - como ganado
  lexicon: HALOT
  rationale: El hebreo usa una comparación con צאן, un término colectivo para ovejas/rebaño. «Ovejas» conserva la imagen concreta y es natural en español; «rebaño» sonarÍa más colectivo y menos incisivo en la comparación.
- source_word: מַאֲכָל
  english_pob_choice: for food
  chosen_spanish: para alimento
  alternatives_spanish:
  - como comida
  - para comer
  - para ser comidos
  lexicon: HALOT
  rationale: El sustantivo significa alimento/comida, no «sacrificio» ni necesariamente «degüello». «Para alimento» mantiene la idea de presa destinada a ser consumida sin intensificar el texto a «para matanza» o «para ser comidos».
- source_word: וּבַגּוֹיִם
  english_pob_choice: and among the nations
  chosen_spanish: y entre las naciones
  alternatives_spanish:
  - y entre los pueblos
  - y entre los gentiles
  - y en las naciones
  lexicon: HALOT
  rationale: גוים se refiere a naciones/pueblos extranjeros. «Entre las naciones» conserva el valor general y evita un tecnicismo como «gentiles», que en español puede sonar excesivamente eclesiástico o confuso fuera de contexto.
- source_word: זֵרִיתָנוּ
  english_pob_choice: you have scattered us
  chosen_spanish: nos has dispersado
  alternatives_spanish:
  - nos has esparcido
  - nos has dispersado y aventado
  - nos has winnowed
  lexicon: HALOT
  rationale: זרה tiene el sentido de esparcir/dispersar; en contexto de exilio, «dispersar» es el equivalente más claro y fiel. «Esparcir» es posible, pero «dispersar» suena más adecuado para la dispersión de un pueblo entre naciones. No se traduce literalmente «aventado» o «winnowed» porque oscurecería el sentido contextual.
theological_decisions:
- issue: Imagen del pueblo como ovejas destinadas al consumo
  english_pob_reading: Retained the image 'like sheep for food' without softening it to a generalized statement of defeat.
  chosen_spanish_reading: Conserva la imagen «como ovejas para alimento» sin reemplazarla por una paráfrasis más general.
  alternative_spanish_readings:
  - como ovejas para matanza
  - como ovejas para ser devoradas
  - como ovejas destinadas al sacrificio
  rationale: El hebreo habla de ovejas destinadas a ser alimento; la traducción española mantiene la crudeza de la metáfora sin añadir la noción específica de matanza o sacrificio, que no está explícita en el sustantivo מַאֲכָל.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Desplazamiento entre las naciones
  english_pob_reading: The Hebrew says 'nations'; in this context it refers to foreign peoples among whom Israel has been dispersed.
  chosen_spanish_reading: «Las naciones» se conserva como referencia a pueblos extranjeros entre los cuales Israel ha sido dispersado.
  alternative_spanish_readings:
  - entre los pueblos
  - entre los gentiles
  - entre las naciones extranjeras
  rationale: En este salmo, «las naciones» no es una abstracción política neutra, sino la designación de pueblos extranjeros. El español mantiene la expresión bíblica estándar y el contexto aclara su referente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el ajuste final del audit trail inglés («give us over») se refleja en «nos entregas», aunque en español se eligió «nos has dispersado» para el perfecto de resultado y «entre las naciones» para mantener la referencia cultural sin sobreexplicarla.
  spanish_consistency_notes:
  - Se preserva el paralelismo de dos miembros con verbo en segunda persona y objeto directo de primera plural.
  - «Naciones» se mantiene como término bíblico estable, sin sustituirlo por una glosa interpretativa en el texto principal.
  - La metáfora animal se conserva sin intensificarla a «matanza», conforme al valor léxico de מַאֲכָל.
  - El tiempo verbal español usa presente e indefinido compuesto para reflejar el valor perfecto del hebreo con efecto vigente.
