lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En los relatos de itinerario del desierto, נסע expresa la salida o partida de un campamento. «Salieron» comunica de manera natural esa acción secuencial sin añadir matices ajenos al hebreo.
- source_word: מֵחַשְׁמֹנָה
  english_pob_choice: from Hashmonah
  chosen_spanish: de Hashmona
  alternatives_spanish:
  - desde Hashmona
  lexicon: HALOT
  rationale: El prefijo מֵ indica origen o punto de partida; en español «de» es la preposición más natural en este tipo de itinerario. El topónimo se translitera como nombre propio.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה describe el acto concreto de establecer campamento. «Acamparon» es una equivalencia clara y moderna que conserva la acción física del texto.
- source_word: בְּמֹסֵרֽוֹת
  english_pob_choice: at Moseroth
  chosen_spanish: en Moserot
  alternatives_spanish:
  - en Moserot
  - a Moserot
  lexicon: HALOT
  rationale: La preposición בְ en avisos de ruta puede marcar ubicación en una estación de paso; en español «en» es la forma más natural. El nombre propio se translitera sin adaptación interpretativa.
translation_notes:
  revision_awareness: El inglés POB mantiene una formulación itineraria sobria («set out ... and camped at»), con una nota alternativa para el segundo verbo. La presente versión conserva la misma secuencia verbal y la transliteración de los topónimos, ajustando solo la preposición final a un español más natural sin alterar el sentido del pasaje.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los topónimos sin traducirlos.
  - «Salieron» y «acamparon» conservan el estilo itinerario breve del hebreo.
  - La nota al pie refleja la alternativa verbal reconocida en el audit trail inglés con una formulación española equivalente.
