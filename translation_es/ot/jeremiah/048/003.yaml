translation:
  language: es
  text: 'El sonido de un clamor[a] de Horonaim: devastación[b] y gran destrucción.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Una voz de clamor de Horonaim’.
    reason: lexical_alternative
  - marker: b
    text: ‘Devastación’ también puede traducirse como ‘despojo’ o ‘ruina’; el término hebreo puede denotar tanto el despojo violento como la destrucción resultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  english_pob_choice: The sound
  chosen_spanish: El sonido
  alternatives_spanish:
  - Una voz
  - El clamor
  lexicon: HALOT
  rationale: קוֹל puede significar ‘sonido’ o ‘voz’. Aquí introduce un reporte auditivo de angustia, por lo que ‘El sonido’ conserva el valor perceptivo sin convertirlo en una voz humana específica.
- source_word: צְעָקָ֖ה
  english_pob_choice: of a cry
  chosen_spanish: de un clamor
  alternatives_spanish:
  - de un grito
  - de un llanto
  - de un alarido
  lexicon: HALOT
  rationale: צְעָקָה denota un grito o clamor de angustia. ‘Clamor’ comunica bien la intensidad y resulta natural en español bíblico contemporáneo.
- source_word: מֵ/חֹֽרוֹנָ֑יִם
  english_pob_choice: from Horonaim
  chosen_spanish: desde Horonaim
  alternatives_spanish:
  - de Horonaim
  lexicon: topónimo
  rationale: La preposición מִן marca origen; ‘desde’ expresa con claridad el punto de procedencia del clamor. El nombre propio se translitera para mantener la referencia geográfica.
- source_word: שֹׁ֖ד
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - despojo
  - ruina
  - desolación
  lexicon: HALOT
  rationale: שֹׁד puede abarcar despojo violento y ruina resultante. En este paralelismo profético, ‘devastación’ preserva la fuerza del juicio sin restringirlo solo al saqueo.
- source_word: וָ/שֶׁ֥בֶר
  english_pob_choice: and great destruction
  chosen_spanish: y gran destrucción
  alternatives_spanish:
  - y gran ruina
  - y gran quebranto
  - y gran quebradura
  lexicon: HALOT
  rationale: שֶׁבֶר literalmente implica ‘quiebre’ o ‘fractura’, pero en contexto profético designa colapso o destrucción. ‘Gran destrucción’ comunica el paralelo con fuerza y naturalidad en español.
- source_word: גָּדֽוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - severa
  - mucha
  lexicon: HALOT
  rationale: גָּדוֹל intensifica el sustantivo siguiente. En español, ‘gran’ es la forma idiomática y concisa antes de un sustantivo femenino.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de ‘A sound’ a ‘The sound’ para mayor naturalidad. En español, se optó por ‘El sonido’ sin nota textual porque el hebreo nominal puede expresarse con artículo definido en español de forma natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo el tono profético y sobrio, sin añadir verbos ausentes en el hebreo.
  - ‘Horonaim’ se translitera de manera consistente con el tratamiento de nombres propios en POB.
  - No se introdujeron notas al pie porque no hay una variante que requiera anclaje explícito en esta línea española.
