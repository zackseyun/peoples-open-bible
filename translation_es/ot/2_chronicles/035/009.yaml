translation:
  language: es
  text: Conanías[a], y Semaías y Netanel, sus hermanos, y Hashabías, Jeiel y Jozabad, jefes de los levitas, contribuyeron a los levitas, para los sacrificios de la Pascua, cinco mil, y quinientas cabezas de ganado vacuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para los sacrificios de Pascua»; o, más literalmente, «para las Pascuas». El plural hebreo probablemente se refiere a los animales destinados a la observancia de la Pascua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כונניהו
  english_pob_choice: Conaniah
  chosen_spanish: Conanías
  alternatives_spanish:
  - Conanías
  - Conanyahu
  - Cononías
  lexicon: N/A (nombre propio)
  rationale: Se translitera el nombre propio en forma natural para el español bíblico, conservando la base consonántica y la terminación hispanizada -ías.
- source_word: שְׁמַעְיָהוּ
  english_pob_choice: Shemaiah
  chosen_spanish: Shemaías
  alternatives_spanish:
  - Shemaías
  - Semaías
  - Shemayahu
  lexicon: N/A (nombre propio)
  rationale: Se mantiene la transliteración del nombre propio con forma comprensible en español y cercana a la vocalización hebrea.
- source_word: נְתַנְאֵל
  english_pob_choice: Nethanel
  chosen_spanish: Netanel
  alternatives_spanish:
  - Netanel
  - Natanael
  lexicon: N/A (nombre propio)
  rationale: Se conserva el nombre propio directamente del hebreo. Se evita Natanael por su asociación más fija con la forma griega del NT y para respetar la forma hebrea del texto.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos
  - sus parientes cercanos
  lexicon: HALOT
  rationale: Se conserva el valor familiar literal de אֶחָיו. En español, 'sus hermanos' reproduce mejor la fuerza del término que una generalización como 'parientes cercanos'.
- source_word: חֲשַׁבְיָהוּ
  english_pob_choice: Hashabiah
  chosen_spanish: Hashabías
  alternatives_spanish:
  - Hashabías
  - Jasabías
  - Hashabyahu
  lexicon: N/A (nombre propio)
  rationale: Transliteración del nombre propio en forma española estándar y legible.
- source_word: יעיאל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Jeiel
  - Yeiel
  lexicon: N/A (nombre propio)
  rationale: Se conserva la transliteración breve y reconocible del nombre propio.
- source_word: יוֹזָבָד
  english_pob_choice: Jozabad
  chosen_spanish: Jozabad
  alternatives_spanish:
  - Jozabad
  - Yozabad
  lexicon: N/A (nombre propio)
  rationale: Se conserva la transliteración tradicional del nombre propio, fácilmente reconocible para el lector bíblico en español.
- source_word: שָׂרֵי הַלְוִיִּם
  english_pob_choice: the chiefs of the Levites
  chosen_spanish: jefes de los levitas
  alternatives_spanish:
  - jefes de los levitas
  - líderes de los levitas
  - principes de los levitas
  lexicon: HALOT
  rationale: שָׂרֵי expresa autoridad o jefatura. 'Jefes' mantiene el matiz formal de liderazgo sin sonar excesivamente arcaico; se traduce el complemento con 'los levitas' para claridad natural en español.
- source_word: הֵרִימוּ
  english_pob_choice: contributed
  chosen_spanish: hicieron una contribución
  alternatives_spanish:
  - contribuyeron
  - hicieron una ofrenda
  - levantaron una contribución
  lexicon: HALOT
  rationale: El verbo הֵרִימוּ en este contexto de donación cultual/administrativa expresa 'apartar' o 'hacer una contribución'. 'Hicieron una contribución' comunica la acción sin perder el matiz de entrega deliberada; evita tanto el calco de 'levantaron' como una lectura demasiado sacrificial de 'ofrenda'.
- source_word: לַ/לְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: para los levitas
  alternatives_spanish:
  - para los levitas
  - a los levitas
  lexicon: HALOT
  rationale: Aunque el hebreo marca destinatario, en español este contexto administrativo suena más natural con 'para', que expresa el destino de la contribución.
- source_word: לַ/פְּסָחִים
  english_pob_choice: for the Passover offerings
  chosen_spanish: para los sacrificios de la Pascua
  alternatives_spanish:
  - para los sacrificios de la Pascua
  - para las ofrendas de Pascua
  - para los pascuas
  lexicon: HALOT
  rationale: El plural פְּסָחִים en contexto sacrificial no se traduce literalmente como plural de la fiesta. 'Sacrificios de la Pascua' preserva el sentido cultual sin concretarlo innecesariamente como 'corderos', dado que el versículo también menciona ganado vacuno.
- source_word: חֲמֵשֶׁת אֲלָפִים
  english_pob_choice: five thousand
  chosen_spanish: cinco mil
  alternatives_spanish:
  - cinco mil
  lexicon: N/A
  rationale: Equivalencia cardinal directa.
- source_word: וּבָקָר חֲמֵשׁ מֵאוֹת
  english_pob_choice: and five hundred head of cattle
  chosen_spanish: y quinientas reses
  alternatives_spanish:
  - y quinientas reses
  - y quinientas cabezas de ganado
  - y quinientos bovinos
  lexicon: HALOT
  rationale: בָּקָר es un colectivo para ganado vacuno. En español, 'reses' ofrece una equivalencia natural, breve y digna; se evita una expresión más técnica o pesada como 'cabezas de ganado'.
theological_decisions:
- issue: Sentido de לַפְּסָחִים en un contexto sacrificial
  english_pob_reading: for the Passover offerings; the Hebrew plural likely refers to the animals designated for Passover observance
  chosen_spanish_reading: para los sacrificios de la Pascua
  alternative_spanish_readings:
  - para las ofrendas de Pascua
  - para los corderos de la Pascua
  - para los pascuas
  rationale: Se conserva la ambigüedad controlada del hebreo plural. El texto no obliga a restringirlo solo a corderos, porque el versículo menciona también ganado vacuno; por eso 'sacrificios de la Pascua' es más amplio y fiel al contexto.
  doctrine_reference: N/A (cuestión léxica y cultual, no doctrinal)
- issue: Valor de הֵרִימוּ como donación cultual/administrativa
  english_pob_reading: contributed
  chosen_spanish_reading: hicieron una contribución
  alternative_spanish_readings:
  - contribuyeron
  - hicieron una ofrenda
  - levantaron una contribución
  rationale: El verbo puede evocar 'elevar' o 'apartar', pero aquí la función narrativa es registrar una entrega de recursos para un uso litúrgico. 'Hicieron una contribución' preserva esa función sin introducir una connotación exclusivamente sacrificial.
  doctrine_reference: N/A (matiz semántico)
- issue: Alcance de שָׂרֵי הַלְוִיִּם
  english_pob_reading: the chiefs of the Levites
  chosen_spanish_reading: jefes de los levitas
  alternative_spanish_readings:
  - líderes de los levitas
  - principes de los levitas
  rationale: No se atenúa la autoridad de los personajes, pero se evita 'príncipes', que en español podría sugerir nobleza hereditaria más que cargo. 'Jefes' conserva la función de mando.
  doctrine_reference: N/A (organización levítica)
translation_notes:
  revision_awareness: El inglés POB fue revisado para decir 'five hundred head of cattle' en lugar de solo 'five hundred cattle' por naturalidad contable; en español se reflejó con 'quinientas reses', que suena natural sin perder el valor colectivo de בָּקָר. También se mantuvo la decisión del POB de traducir הֵרִימוּ como una acción de contribución en vez de un calco literal de 'levantar'.
  spanish_consistency_notes:
  - Se usó 'Pascua' con mayúscula por tratarse del nombre de la celebración, mientras que 'sacrificios' permanece en minúscula por su valor común.
  - Se prefirió 'levitas' en minúscula dentro de la frase común, conforme al uso español corriente para el grupo tribal.
  - Los nombres propios se hispanizan de manera uniforme con terminaciones compatibles con la ortografía española, sin forzar formas latinizadas no atestiguadas en el contexto dado.
