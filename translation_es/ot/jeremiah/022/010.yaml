base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/010.yaml
  text: Do not weep for the dead[a], and do not mourn for him. Weep bitterly for the one going away[b], for he will never return or see the land of his birth.
  footnotes:
  - marker: a
    text: Or 'weep, weep'—the Hebrew uses an imperative with an infinitive absolute for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''The one going away'' refers contextually to the ruler being taken away into exile.'
    reason: cultural_note
