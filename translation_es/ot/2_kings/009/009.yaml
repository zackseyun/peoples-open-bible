    issue: Uso de «Ahab» en lugar de «Acab»
    rationale: En español bíblico y eclesial, «Acab» es la forma normal y más legible. «Ahab» se siente anglicado y rompe la naturalidad del texto meta.
  - severity: medium
    issue: Nota [b] innecesaria sobre transliteración de «Ahías»
    rationale: El hebreo no presenta ambigüedad que deba trasladarse a nota, y el POB inglés no incluye nota correspondiente. La nota introduce información no requerida y distrae del sentido del versículo.
  - severity: low
