revisions:
- from: Porque conspiraron con un mismo corazón[a][b]; contra ti hacen un pacto.
  to: Porque conspiraron juntos de un solo corazón[a][b]; contra ti hacen un pacto.
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad sin cambiar el sentido: se añadió «juntos» para reflejar explícitamente יַחְדָּו, se cambió «con un mismo corazón» por «de un solo corazón» por ser más idiomático en español y mantener la metáfora hebrea, y se afinó la nota alternativa para alinearla mejor con el rastro inglés auditado. No se requiere adjudicación adicional.'
