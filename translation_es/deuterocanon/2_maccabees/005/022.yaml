translation:
  language: es
  text: 'También dejó encargados para maltratar[a] a la nación: en Jerusalén, a Felipe, frigio por nacimiento, pero en carácter más bárbaro que el que lo nombró[b];'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para oprimir al pueblo». El infinitivo griego τοῦ κακοῦν puede denotar hacer daño, maltratar u oprimir.
    reason: lexical_alternative
  - marker: b
    text: '«Más bárbaro que el que lo nombró» intensifica el juicio moral del autor: Felipe es presentado como todavía más duro que el gobernante que lo instaló.'
    reason: cultural_note
lexical_decisions:
- source_word: κατέλειπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó puestos
  - dejó establecidos
  - dejó encargados
  lexicon: LSJ
  rationale: κατέλειπεν significa dejar/abandonar/dejar en un lugar. «Dejó» conserva la forma verbal del griego y permite inferir el sentido administrativo de haberlos dejado a cargo.
- source_word: ἐπιστάτας
  english_pob_choice: overseers
  chosen_spanish: supervisores
  alternatives_spanish:
  - encargados
  - gobernadores
  - inspectores
  lexicon: LSJ
  rationale: El término designa a personas puestas sobre otros. «Supervisores» mantiene la idea de autoridad delegada sin imponer un cargo técnico más fuerte que el griego.
- source_word: τοῦ κακοῦν
  english_pob_choice: to mistreat
  chosen_spanish: para maltratar
  alternatives_spanish:
  - para oprimir
  - para dañar
  - para afligir
  lexicon: LSJ
  rationale: 'El infinitivo articular expresa finalidad: fueron dejados con el propósito de hacer daño. «Maltratar» conserva la fuerza de abuso sostenido y evita restringirlo solo a una opresión política.'
- source_word: τὸ γένος
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la raza
  lexicon: LSJ
  rationale: Aquí se refiere al conjunto nacional-étnico judío. «La nación» refleja bien ese colectivo; «el pueblo» también es posible, pero es menos preciso para la carga étnica del contexto.
- source_word: τὸ μὲν γένος Φρύγα
  english_pob_choice: a Phrygian by birth
  chosen_spanish: frigio por nacimiento
  alternatives_spanish:
  - frigio de nacimiento
  - frigio de origen
  - frigio por linaje
  lexicon: LSJ
  rationale: La frase identifica el origen étnico/geográfico de Felipe. «Por nacimiento» reproduce de modo natural la fuerza de γένος en español y conserva la distinción respecto de su carácter.
- source_word: τὸν δὲ τρόπον
  english_pob_choice: in character
  chosen_spanish: en carácter
  alternatives_spanish:
  - en conducta
  - en manera
  - en disposición
  lexicon: LSJ
  rationale: τρόπος aquí alude a manera de ser o carácter. «En carácter» funciona bien en español y prepara la comparación moral con el gobernante que lo nombró.
- source_word: βαρβαρώτερον ἔχοντα
  english_pob_choice: more barbarous
  chosen_spanish: más bárbaro
  alternatives_spanish:
  - más brutal
  - más salvaje
  lexicon: LSJ
  rationale: El comparativo griego es explícito. «Más bárbaro» conserva el juicio retórico e histórico del autor sin suavizarlo ni reemplazarlo por un término más interpretativo.
- source_word: τοῦ καταστήσαντος
  english_pob_choice: than the one who appointed him
  chosen_spanish: que el que lo nombró
  alternatives_spanish:
  - que el que lo puso en el cargo
  - que su nombrador
  - que el que lo estableció
  lexicon: LSJ
  rationale: El participio remite al gobernante que lo instaló. «Lo nombró» es claro y natural en español; mantiene la comparación personal del texto sin sobrecargarla con terminología institucional.
theological_decisions:
- issue: 'Valor de τοῦ κακοῦν: daño general o opresión política'
  english_pob_reading: Or 'to oppress the people.' The Greek infinitive τοῦ κακοῦν can denote harming, mistreating, or oppressing.
  chosen_spanish_reading: «para maltratar» mantiene la amplitud de daño abusivo; no limita el sentido a una sola forma de opresión.
  alternative_spanish_readings:
  - para oprimir
  - para dañar
  - para afligir
  rationale: El griego permite una gama de violencia o abuso. «Maltratar» conserva esa amplitud y la fuerza ética del pasaje, mientras que «oprimir» estrecharía el sentido a una categoría política más específica.
  doctrine_reference: Lexical semantics; historical narrative tone
- issue: 'Juicio moral de βαρβαρώτερον: intensificación comparativa'
  english_pob_reading: '''More barbarous than the one who appointed him'' intensifies the author''s moral judgment: Philip is portrayed as even harsher than the ruler who installed him.'
  chosen_spanish_reading: «más bárbaro que el que lo nombró» conserva la intensificación comparativa y el juicio moral del autor.
  alternative_spanish_readings:
  - más brutal que el que lo nombró
  - más salvaje que el que lo nombró
  rationale: La comparación no es solo descriptiva; expresa una evaluación hostil. «Más bárbaro» reproduce esa retórica sin suavizarla ni sustituirla por un adjetivo que cambie el registro.
  doctrine_reference: Historical narrative rhetoric
translation_notes:
  revision_awareness: La traducción sigue el texto griego de Swete 1909 y coincide con la auditoría inglesa de alta concordancia. No se aplicaron revisiones posteriores; se preservó la ambigüedad léxica de τοῦ κακοῦν con una nota alternativa en español y se mantuvo el tono evaluativo de βαρβαρώτερον sin suavizarlo.
  spanish_consistency_notes:
  - Se mantuvo «la nación» para τὸ γένος, en línea con la referencia colectiva étnico-nacional del contexto.
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo», «espíritu» y otras terminología doctrinal no aplican aquí.
  - 'La estructura con dos incisos conserva la sintaxis acumulativa del griego: acción, ubicación, identidad y evaluación moral.'
