revisions:
- from: Puso en pie los pilares junto al pórtico del templo[a]. Puso en pie el pilar derecho y llamó su nombre Jaquín; luego puso en pie el pilar izquierdo y llamó su nombre Boaz.
  to: Erigió los pilares en el pórtico del templo[a]. Erigió el pilar derecho y le puso por nombre Jaquín; luego erigió el pilar izquierdo y le puso por nombre Boaz.
  rationale: Se ajusta la ubicación a «en el pórtico del templo» para reflejar mejor el sentido locativo del hebreo y la auditoría inglesa; se reemplaza la nota para que preserve la decisión documentada sobre la transliteración de los nombres; y se suavizan dos giros demasiado calcados («puso en pie», «llamó su nombre») con formulaciones españolas más naturales y fieles al mismo sentido.
