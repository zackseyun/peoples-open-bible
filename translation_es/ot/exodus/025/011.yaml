translation:
  language: es
  text: Lo revestirás de oro puro; por dentro y por fuera lo revestirás, y le harás una moldura[a] de oro alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un ribete» o «un borde» de oro; tradicionalmente, «una corona de oro». El hebreo זֵר se refiere a un remate ornamental alrededor del objeto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִפִּיתָ / תְּצַפֶּנּוּ
  english_pob_choice: overlay / you shall overlay it
  chosen_spanish: revestirás / lo revestirás
  alternatives_spanish:
  - cubrirás
  - plaquearás
  lexicon: HALOT
  rationale: En este contexto de construcción del tabernáculo, צפה no es cubrir en sentido general, sino aplicar una capa de metal al objeto. En español, 'revestir' comunica mejor esa acción artesanal y evita la idea demasiado vaga de una simple cobertura.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro limpio
  - oro refinado
  lexicon: HALOT
  rationale: La expresión describe oro refinado, apto para uso sagrado. 'Oro puro' es la formulación más natural en español y conserva la cualidad material sin añadir interpretación extra.
- source_word: מִבַּיִת
  english_pob_choice: from the inside
  chosen_spanish: por dentro
  alternatives_spanish:
  - desde el interior
  - desde dentro
  lexicon: HALOT
  rationale: Aunque literalmente expresa un movimiento 'desde el interior', en español la relación con la superficie del objeto se dice con naturalidad 'por dentro'. Mantiene el paralelismo con 'por fuera'.
- source_word: וּמִחוּץ
  english_pob_choice: from the outside
  chosen_spanish: por fuera
  alternatives_spanish:
  - desde afuera
  - desde el exterior
  lexicon: HALOT
  rationale: El contraste con מִבַּיִת pide una pareja natural en español. 'Por fuera' conserva el paralelo y describe la superficie exterior con claridad.
- source_word: וְעָשִׂיתָ עָלָיו
  english_pob_choice: and you shall make on it
  chosen_spanish: le harás
  alternatives_spanish:
  - harás sobre él
  - le harás encima
  lexicon: HALOT
  rationale: El hebreo indica colocar o fabricar un elemento aplicado al objeto. En español, 'le harás' expresa bien la acción de añadir un adorno sin sonar torpe; el objeto indirecto mantiene la referencia al arca con fluidez.
- source_word: זֵר
  english_pob_choice: molding
  chosen_spanish: borde
  alternatives_spanish:
  - ribete
  - moldura
  - canto ornamental
  lexicon: HALOT
  rationale: זֵר designa un remate ornamental alrededor del objeto. 'Borde' es una opción clara y sobria en español; evita 'corona', que puede inducir una imagen regia ajena al mobiliario sagrado, y evita también una tecnificación excesiva.
- source_word: זֵר זָהָב
  english_pob_choice: a gold molding
  chosen_spanish: un borde de oro
  alternatives_spanish:
  - una moldura de oro
  - un ribete de oro
  lexicon: HALOT
  rationale: La relación de constructo se expresa naturalmente como 'de oro'. 'Un borde de oro' conserva el valor ornamental y la materia especificada, con estilo bíblico moderno y legible.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: El término indica que el borde rodea completamente el objeto. 'Alrededor' es natural y directo en español; preserva la fuerza distributiva sin añadir redundancia.
translation_notes:
  revision_awareness: He seguido de cerca el hebreo base y el audit trail en inglés. La principal decisión de estilo fue usar 'revestir' para צפה y 'borde' para זֵר, manteniendo el sentido de recubrimiento y remate ornamental sin introducir la lectura tradicional 'corona' en el texto principal.
  spanish_consistency_notes:
  - He mantenido 'oro puro' para זָהָב טָהוֹר, coherente con la traducción directa del material refinado.
  - La alternancia 'por dentro / por fuera' refleja el paralelismo del hebreo con naturalidad en español.
  - Se conserva un solo marcador de nota para la alternativa lexical de זֵר, porque es la única ambigüedad relevante en este verso.
