  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido básico del hebreo: prohibición para los sacerdotes de comer cualquier נְבֵלָה o טְרֵפָה, tanto de aves como de ganado. Sin embargo, «carroña» no es la mejor equivalencia para נְבֵלָה en este contexto legal, porque en español suele evocar carne putrefacta o comida de animales carroñeros, mientras que el hebreo se refiere más precisamente a un animal que murió por sí mismo o no fue sacrificado debidamente. Además, el rastro auditado del POB inglés ya explicitó «animal torn by beasts», por lo que conviene reflejar también en español ese matiz en el texto principal o al menos de forma más clara.'
