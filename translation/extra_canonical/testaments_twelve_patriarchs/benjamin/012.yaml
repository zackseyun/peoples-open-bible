id: T12P.BEN.12
reference: Testament of Benjamin 12
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: XII. ¹Καὶ ταῦτα εἰπὼν ἐκτείνας τοὺς πόδας αὐτοῦ ἐκοιμήθη †ὕπνῳ² καλῷ [καὶ ἀγαθῷ]³. Οἱ δὲ υἱοὶ αὐτοῦ ἐποίησαν ὡς προσέταξεν αὐτοῖς, καὶ ἄραντες τὸ σῶμα αὐτοῦ ἔθαψαν αὐτὸ⁴ ἐν Χεβρὼν μετὰ τῶν πατέρων αὐτοῦ. Καὶ⁶ *ὡς ἐπλήρωσε τοὺς λόγους αὐτοῦ⁷ εἶπεν⁸. Ἐντέλλομαι ὑμῖν, *τέκνα μου⁹, ἀνενέγκατε¹⁰ τὰ ὀστᾶ μου ἐξ Αἰγύπτου, καὶ *θάψατέ με¹¹ εἰς¹² Χεβρὼν ἐγγὺς¹³ τῶν πατέρων μου. 2. Καὶ¹⁴ ἀπέθανε Βενιαμίν¹⁵ *ἑκατὸν εἴκοσι πέντε¹⁶ ἐτῶν ἐν γήρει καλῷ· καὶ ἔθηκαν αὐτὸν ἐν παραθήκῃ¹⁷. 3. Καὶ¹⁸ ἐνενηκοστῷ¹⁹ πρώτῳ²⁰ ἔτει ⌜τῆς²¹ †ἐξόδου²² τῶν υἱῶν Ἰσραὴλ †ἐξ Αἰγύπτου²³⌝, *αὐτοὶ καὶ οἱ ἀδελφοὶ αὐτῶν²⁴ ἀνήγαγον τὰ ὀστᾶ τῶν πατέρων²⁵ αὐτῶν ἐν κρυφῇ *ἐν τῷ πολέμῳ Χαναάν²⁶, καὶ ἔθαψαν αὐτοὺς²⁷ ἐν Χεβρών²⁸ *παρὰ τοὺς πόδας²⁹ τῶν πατέρων αὐτῶν. 4. *Καὶ αὐτοὶ ἐπέστρεψαν³⁰ ἐκ γῆς³¹ Χαναάν, καὶ³² ᾤκησαν ἐν Αἰγύπτῳ ἕως ἡμέρας ἐξόδου αὐτῶν ἐκ ⌜γῆς⌝ Αἰγύπτου³³.
