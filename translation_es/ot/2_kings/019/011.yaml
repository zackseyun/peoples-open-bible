translation:
  language: es
  text: Mira[a], tú has oído lo que han hecho los reyes de Asiria a todas las tierras, consagrándolas a la destrucción[b]; ¿y tú serás librado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». La partícula hebrea es un llamado enfático a prestar atención.
    reason: lexical_alternative
  - marker: b
    text: O «destruyéndolas por completo»; el hebreo expresa la idea de ponerlas bajo ḥerem, es decir, consagrarlas a la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce un llamado enfático a prestar atención. «Mira» conserva esa fuerza discursiva en un español natural y menos arcaico que «He aquí».
- source_word: שָׁמַעְתָּ
  english_pob_choice: have heard
  chosen_spanish: has oído
  alternatives_spanish:
  - has escuchado
  - oíste
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un hecho pasado con relevancia actual; en español «has oído» comunica bien ese valor de conocimiento ya adquirido y vigente.
- source_word: אֵת אֲשֶׁר עָשׂוּ
  english_pob_choice: what ... have done
  chosen_spanish: lo que han hecho
  alternatives_spanish:
  - lo que hicieron
  - aquello que hicieron
  lexicon: HALOT
  rationale: La combinación del marcador objeto y la relativa pide una forma natural en español. «Lo que han hecho» mantiene el contenido reportado sin calcar la estructura hebrea.
- source_word: מַלְכֵי אַשּׁוּר
  english_pob_choice: the kings of Assyria
  chosen_spanish: los reyes de Asiria
  alternatives_spanish:
  - los reyes asirios
  - los reyes de Asur
  lexicon: HALOT
  rationale: 'El constructo se vierte de manera idiomática como posesión o pertenencia: «los reyes de Asiria».'
- source_word: לְכָל הָאֲרָצוֹת
  english_pob_choice: to all the lands
  chosen_spanish: a todas las tierras
  alternatives_spanish:
  - a todos los países
  - a todas las naciones
  lexicon: HALOT
  rationale: «Tierras» conserva el valor geográfico-político plural de אֲרָצוֹת mejor que «países» o «naciones», sin perder claridad en español.
- source_word: לְהַחֲרִימָם
  english_pob_choice: devoting them to destruction
  chosen_spanish: entregándolas a destrucción
  alternatives_spanish:
  - devotándolas a destrucción
  - poniéndolas bajo anatema
  - consagrándolas a la destrucción
  lexicon: HALOT
  rationale: El verbo causativo de חרם remite al concepto de ḥerem, no solo a destrucción genérica. «Entregándolas a destrucción» conserva la idea de ponerlas bajo sentencia de destrucción sin introducir un término técnico opaco en el texto principal.
- source_word: וְאַתָּה תִּנָּצֵל
  english_pob_choice: and will you be delivered?
  chosen_spanish: ¿y tú serás librado?
  alternatives_spanish:
  - ¿y tú escaparás?
  - ¿y tú serás rescatado?
  lexicon: HALOT
  rationale: El nifal de נצל expresa ser librado/rescatado. La forma interrogativa mantiene la ironía retórica del desafío del hablante.
theological_decisions:
- issue: Cómo reflejar el concepto de חרם / ḥerem
  english_pob_reading: devoting them to destruction
  chosen_spanish_reading: entregándolas a destrucción
  alternative_spanish_readings:
  - bajo anatema
  - devotándolas a destrucción
  - destruyéndolas por completo
  rationale: El texto no describe mera derrota militar, sino un acto de destrucción bajo juicio. La traducción elegida preserva esa carga judicial-teológica sin reducirla a destrucción general ni reemplazarla por un tecnicismo eclesiástico poco transparente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el audit trail más reciente; el texto inglés y la evaluación cruzada muestran alto acuerdo y ninguna modificación pendiente relevante. La redacción española sigue de cerca esas decisiones auditadas, conservando la tensión de ḥerem y la pregunta retórica final.
  spanish_consistency_notes:
  - Se usa «Asiria» de forma consistente para אַשּׁוּר.
  - Se mantiene «tierras» para el plural territorial de אֲרָצוֹת.
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton; no hay motivo para usar un equivalente de masking.
  - La pregunta final conserva el tono desafiante del hebreo con inversión interrogativa en español.
