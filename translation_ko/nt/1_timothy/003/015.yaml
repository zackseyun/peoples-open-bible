id: 1TI.3.15
reference: 1 Timothy 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν δὲ βραδύνω, ἵνα εἰδῇς πῶς δεῖ ἐν οἴκῳ θεοῦ ἀναστρέφεσθαι, ἥτις ἐστὶν ἐκκλησία θεοῦ ζῶντος, στῦλος καὶ ἑδραίωμα τῆς ἀληθείας·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/015.yaml
  text: But if I am delayed[a], I write so that you may know how one ought to conduct oneself in the household of God, which is the assembly of the living God[b], the pillar and support of the truth.
  footnotes:
  - marker: a
    text: Or traditionally, 'church of the living God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pillar and bulwark of the truth'; 'foundation' is also proposed for 'support.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 내가 늦어지더라도 하나님의 집에서 어떻게 처신해야 할지를 그대가 알게 하려는 것입니다. 그 집은 살아 계신 하나님의 교회[a]요, 진리의 기둥과 터[b]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 전통적으로 「살아 계신 하나님의 회중」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「진리의 기둥과 보루」; 「터」 대신 「토대」도 제안된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ βραδύνω
  english_pob_choice: But if I am delayed
  chosen_korean: 그러나 내가 늦어지더라도
  alternatives_korean:
  - 만일 내가 지체된다면
  lexicon: BDAG
  rationale: βραδύνω의 「늦다·지체하다」를 자연스럽게.
- source_word: ἐν οἴκῳ θεοῦ ἀναστρέφεσθαι
  english_pob_choice: to conduct oneself in the household of God
  chosen_korean: 하나님의 집에서 ~ 처신해야 할지
  alternatives_korean:
  - 하나님의 가정에서 어떻게 살아야 할지
  lexicon: BDAG
  rationale: ἀναστρέφομαι의 「(공동체 안에서의) 처신·생활」을 「처신」으로 옮긴다.
- source_word: ἐκκλησία θεοῦ ζῶντος
  english_pob_choice: the assembly of the living God
  chosen_korean: 살아 계신 하나님의 교회
  alternatives_korean:
  - 살아 계신 하나님의 회중
  lexicon: BDAG
  rationale: 5절과 일관 「교회」 (목회서신의 제도적 어감).
- source_word: στῦλος καὶ ἑδραίωμα τῆς ἀληθείας
  english_pob_choice: the pillar and support of the truth
  chosen_korean: 진리의 기둥과 터
  alternatives_korean:
  - 진리의 기둥과 보루
  - 진리의 기둥과 토대
  lexicon: BDAG
  rationale: ἑδραίωμα의 「견고한 기초」를 한국 신학 어휘 「터」로 옮긴다.
