- from: 'Y Ozías le dijo: “Bendita eres, hija, por el Dios Altísimo, sobre todas las mujeres que hay sobre la tierra”[a].'
  to: 'Y Ozías le dijo: «Bendita eres, hija, por el Dios Altísimo[a], más que todas las mujeres de la tierra».'
  rationale: Se reubicó la nota al sintagma que realmente explica, y se suavizó la expresión comparativa para evitar la repetición poco natural de «sobre… sobre», manteniendo el sentido del griego y la decisión lexical del POB inglés.
