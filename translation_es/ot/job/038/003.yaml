  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: imperativo idiomático de preparación (אֱזָר ... חֲלָצֶיךָ), partícula de urgencia נָא, comparación כגבר, interrogación futura וְאֶשְׁאָלְךָ, y causativo preciso וְהוֹדִיעֵנִי. La única desalineación significativa está en la nota b, donde la alternativa «y me darás a conocer» cambia indebidamente el objeto: el hebreo dice ‘hacerme saber algo’, no ‘darse a conocer a mí’.'
  spanish_quality_summary: El español principal es claro, digno y muy legible. Sin embargo, «como varón» suena más rígido y menos natural que «como hombre» en español contemporáneo general; además, la nota b contiene una formulación poco natural y semánticamente desviada. Conviene afinar ambos puntos para mejor fidelidad y legibilidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión sobre גבר debe conservar el masculino singular; en este contexto «hombre» comunica mejor el sentido que «varón» sin neutralizar el género. «Cíñete los lomos» y «me lo harás saber» están bien alineados con la filosofía léxica auditada.
  issues:
  - severity: medium
    issue: «como varón» suena innecesariamente rígido en español general
    rationale: Aunque es fiel al masculino singular, «como hombre» refleja mejor el hebreo כגבר en registro natural y digno para una audiencia amplia. «Varón» puede sonar eclesiástico o marcado sin aportar una ventaja semántica real aquí.
  - severity: medium
    issue: 'La nota b ofrece una alternativa semánticamente incorrecta: «y me darás a conocer»'
    rationale: Esa formulación en español normalmente significa ‘darme a conocer a alguien/algo’ o ‘presentarte/manifestarte a mí’, no ‘hacerme saber algo’. El hebreo causativo de ידע requiere un complemento de contenido, mejor «y me lo darás a conocer» o «y me lo harás saber».
  revised_spanish_text: Ahora cíñete los lomos como hombre[a]; yo te preguntaré[b], y tú me lo harás saber.
