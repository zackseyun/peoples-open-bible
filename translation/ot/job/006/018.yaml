id: JOB.6.18
reference: Job 6:18
source:
  edition: WLC
  text: יִ֭לָּ֣פְתוּ אָרְח֣וֹת דַּרְכָּ֑/ם יַעֲל֖וּ בַ/תֹּ֣הוּ וְ/יֹאבֵֽדוּ׃
translation:
  text: The paths of their course wind away[a]; they go up into wasteland and perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The caravan tracks turn aside; they go up into the waste and vanish.' The Hebrew imagery is difficult, and some understand the verse to speak of caravans rather than the paths or channels themselves.
    reason: alternative_reading
lexical_decisions:
- source_word: יִלָּפְתוּ
  chosen: wind away
  alternatives:
  - turn aside
  - twist themselves
  - are turned aside
  lexicon: HALOT
  rationale: 'The Niphal imperfect 3mp of לפת conveys twisting, winding, or turning aside. In context of wadis/streams and their tracks, an intransitive sense fits well: the channels or courses wind away from their expected route. ''Wind away'' preserves the image without over-paraphrasing.'
- source_word: אָרְחוֹת
  chosen: paths
  alternatives:
  - tracks
  - caravans
  lexicon: HALOT
  rationale: אָרְחוֹת commonly means paths or tracks. Some interpreters take it metonymically of caravan routes or even caravans themselves because of the surrounding context, but the immediate pairing with 'their course/way' favors a literal route image in the main text.
- source_word: דַּרְכָּם
  chosen: their course
  alternatives:
  - their way
  - their road
  lexicon: HALOT
  rationale: Though דֶּרֶךְ often means 'way/road,' here 'their course' better suits the imagery of streambeds or channels changing direction. It avoids awkward repetition with 'paths' while staying close to the Hebrew sense.
- source_word: יַעֲלוּ
  chosen: go up
  alternatives:
  - rise
  - ascend
  lexicon: HALOT
  rationale: The Qal imperfect of עלה normally means 'go up/ascend.' The main text keeps the concrete motion. Because the exact image is difficult, a more interpretive rendering like 'vanish' is avoided in the main text.
- source_word: בַתֹּהוּ
  chosen: into wasteland
  alternatives:
  - into desolation
  - into emptiness
  - into the waste
  lexicon: HALOT
  rationale: תֹהוּ denotes emptiness, waste, or desolation. 'Wasteland' is natural modern English and fits the desert setting of Job 6. The preposition is rendered 'into' to reflect movement.
- source_word: וְיֹאבֵדוּ
  chosen: and perish
  alternatives:
  - and are lost
  - and vanish
  lexicon: HALOT
  rationale: אבד in Qal commonly means perish or be lost. 'Perish' preserves the stronger sense of coming to ruin/disappearance, fitting the image of waters disappearing in the desert.
