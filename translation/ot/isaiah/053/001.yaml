theological_decisions:
- issue: Metaphorical force of 'the arm of the LORD'
  chosen_reading: Retain the metaphor 'the arm of the LORD' in the main text
  alternative_readings:
  - the power of the LORD
  rationale: The phrase is a theologically rich biblical metaphor for the LORD's manifested power, especially in salvation and judgment. Preserving the metaphor maintains intertextual resonance and avoids over-interpreting the image in translation.
  doctrine_reference: 'Translation philosophy §1, §5; Contested terms: יְהוָה → the LORD'
- issue: Sense of שְׁמוּעָה
  chosen_reading: Render as 'what we have heard' rather than the traditional 'our report'
  alternative_readings:
  - our report
  - our message
  rationale: The Hebrew noun is semantically broad. 'What we have heard' stays closer to the hearing-root and avoids locking the phrase into a narrower communicative category where the context does not require it. The traditional alternative is worth preserving because of its prominence in English Bible tradition and possible contextual fit.
  doctrine_reference: Translation philosophy §1, §6
