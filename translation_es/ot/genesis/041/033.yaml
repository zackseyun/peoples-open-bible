revisions:
- from: Ahora, busque Faraón un hombre[a] inteligente y sabio, y póngalo sobre la tierra de Egipto.
  to: Ahora, que Faraón busque[a] un hombre inteligente y sabio, y lo nombre sobre la tierra de Egipto.
  rationale: Se reubica la nota al verbo correspondiente para reflejar correctamente la alternativa léxica documentada para יֵרֶא. También se cambia «póngalo» por «lo nombre» para expresar con español más natural el sentido administrativo de designar a alguien para autoridad, manteniendo «sobre la tierra de Egipto» como reflejo fiel de la construcción hebrea. No se requiere adjudicación adicional.
