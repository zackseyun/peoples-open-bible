translation:
  language: es
  text: Ahora el pueblo estaba como quienes se quejan por la adversidad[a] a oídos de Yahvé[b]; Yahvé lo oyó, y su furor se encendió, y el fuego de Yahvé[c] ardió entre ellos y consumió a algunos al borde del campamento[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como quejumbrosos», «como quienes se quejaban» o quizá «como si se quejaran». La forma hebrea es rara y algo difícil.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en los oídos de Yahvé», un modismo que indica que la queja llegó a su atención.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un fuego de parte de Yahvé ardió entre ellos».'
    reason: alternative_reading
  - marker: d
    text: 'Hebreo: «al borde / en la periferia / en el extremo del campamento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... were
  chosen_spanish: Ahora ... estaba
  alternatives_spanish:
  - Y aconteció que ...
  - Y el pueblo fue
  - Y el pueblo estaba
  lexicon: HALOT
  rationale: El hebreo abre la escena narrativa con una forma verbal de desarrollo; en español, «Ahora» conserva la transición y «estaba» refleja mejor el valor descriptivo de la frase que un calco como «aconteció».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto colectivo, «el pueblo» comunica naturalmente a Israel como comunidad pactal sin añadir información no explícita.
- source_word: כְּמִתְאֹנְנִים
  english_pob_choice: like those who complain of hardship
  chosen_spanish: como quienes se quejan de la desgracia
  alternatives_spanish:
  - como quejumbrosos
  - como quienes murmuraban
  - como si se quejaran
  lexicon: HALOT
  rationale: La forma hebrea es rara y difícil; se conserva el valor comparativo de כְּ con «como», y se traduce el matiz de lamento por una adversidad real. «Desgracia» evita moralizar el término y mantiene el tono de queja por aflicción.
- source_word: רַע
  english_pob_choice: of hardship
  chosen_spanish: de la desgracia
  alternatives_spanish:
  - del mal
  - de la aflicción
  - de la calamidad
  lexicon: HALOT
  rationale: Aquí רַע no apunta principalmente a maldad moral, sino a algo penoso o adverso. «Desgracia» comunica esa carga de sufrimiento de modo natural en español.
- source_word: בְּאָזְנֵי יְהוָה
  english_pob_choice: in the hearing of Yahweh
  chosen_spanish: al oído de Yahvé
  alternatives_spanish:
  - en el oído de Yahvé
  - ante Yahvé
  - a los oídos de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática del hebreo de manera transparente. «Al oído de Yahvé» mantiene la audición como metáfora de que la queja llegó a su atención.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del POB en español, el Tetragrámaton se vierte como «Yahvé» para preservar el nombre divino revelado, no sustituido por un título.
- source_word: וַיִּשְׁמַע יְהוָה
  english_pob_choice: and Yahweh heard it
  chosen_spanish: Yahvé lo oyó
  alternatives_spanish:
  - Yahvé escuchó aquello
  - Yahvé lo escuchó
  lexicon: HALOT
  rationale: El objeto está implícito en el contexto; «lo» lo hace explícito sin añadir contenido. «Oyó» mantiene la relación con el modismo previo del oído.
- source_word: וַיִּחַר אַפּוֹ
  english_pob_choice: and his anger burned
  chosen_spanish: y su furor se encendió
  alternatives_spanish:
  - y se encendió su ira
  - y su enojo ardió
  - y se encendió su cólera
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal de ira encendida; «furor» preserva la intensidad y «se encendió» mantiene la metáfora del calor, evitando una paráfrasis desdibujada.
- source_word: וַתִּבְעַר בָּם אֵשׁ יְהוָה
  english_pob_choice: and the fire of Yahweh burned among them
  chosen_spanish: y el fuego de Yahvé ardió entre ellos
  alternatives_spanish:
  - y un fuego de Yahvé ardió entre ellos
  - y el fuego de Yahvé se encendió entre ellos
  lexicon: HALOT
  rationale: Se conserva la relación genitiva directa «fuego de Yahvé» y el lugar «entre ellos», sin suavizar la atribución de juicio divino.
- source_word: וַתֹּאכַל
  english_pob_choice: and consumed
  chosen_spanish: y consumió
  alternatives_spanish:
  - y devoró
  - y se los comió
  - y abrasó
  lexicon: HALOT
  rationale: Para el fuego como sujeto, «consumió» es la equivalencia natural y mantiene la fuerza destructiva del hebreo sin literalismo innecesario.
- source_word: בִּקְצֵה הַמַּחֲנֶה
  english_pob_choice: at the edge of the camp
  chosen_spanish: al borde del campamento
  alternatives_spanish:
  - en la orilla del campamento
  - en el extremo del campamento
  - a los confines del campamento
  lexicon: HALOT
  rationale: La expresión señala la zona exterior del campamento; «borde» es claro y fiel, y conserva el sentido espacial del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En la línea doctrinal del proyecto en español, se conserva el nombre propio «Yahvé» para evitar la sustitución por un título y mantener la transparencia de la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Attribution del fuego como juicio divino
  english_pob_reading: the fire of Yahweh burned among them
  chosen_spanish_reading: el fuego de Yahvé ardió entre ellos
  alternative_spanish_readings:
  - un fuego de Yahvé ardió entre ellos
  - el fuego enviado por Yahvé ardió entre ellos
  rationale: Se mantiene la atribución directa del fuego a Yahvé, sin explicitar un agente adicional ni diluir el carácter de juicio del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La auditoría inglesa revisó «became» por «were» para ajustar mejor la apertura narrativa hebrea; la versión española sigue ese ajuste con «estaba». También se mantuvo la lectura óptima de la frase difícil כְּמִתְאֹנְנִים רַע, preservando tanto el valor comparativo como la idea de queja por aflicción, y la atribución directa del fuego a Yahvé sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «El pueblo» se usa para הָעָם en sentido colectivo.
  - Se conserva el paralelismo de imágenes de oído, ira/furor encendido y fuego ardiente.
  - La nota del versículo difícil queda anclada en la frase correspondiente sin añadir explicaciones doctrinales ajenas al texto.
