translation:
  language: es
  text: Presta a tu prójimo en su tiempo de necesidad[a], y devuélvele a tu prójimo a su vez, a su debido tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y devuélvele a tu prójimo, de nuevo, a su debido tiempo». El griego πάλιν puede leerse más literalmente como «de nuevo», y εἰς τὸν καιρόν como «en el tiempo apropiado».
    reason: lexical_alternative
lexical_decisions:
- source_word: δάνεισον
  english_pob_choice: Lend
  chosen_spanish: Presta
  alternatives_spanish:
  - Préstale
  - Haz un préstamo a
  lexicon: BDAG
  rationale: El imperativo aoristo de δανείζω pide una acción concreta de préstamo; en español, «prestar» es la forma más natural y directa para conservar el sentido financiero sin sobreexplicar.
- source_word: τῷ πλησίον
  english_pob_choice: to your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  lexicon: BDAG
  rationale: πλησίον aquí designa al prójimo en sentido ético, no simplemente al vecino geográfico. «Prójimo» mantiene ese alcance relacional y moral.
- source_word: ἐν καιρῷ χρείας αὐτοῦ
  english_pob_choice: in his time of need
  chosen_spanish: en su tiempo de necesidad
  alternatives_spanish:
  - cuando esté en necesidad
  - en el momento de su necesidad
  lexicon: BDAG
  rationale: 'Se conservan ambos elementos: καιρός como tiempo oportuno/apropiado y χρεία como necesidad. «Tiempo de necesidad» refleja con claridad esa doble carga sin volverlo pesado.'
- source_word: πάλιν
  english_pob_choice: in turn
  chosen_spanish: a su vez
  alternatives_spanish:
  - de nuevo
  - en retorno
  lexicon: BDAG
  rationale: 'El valor discursivo de πάλιν en este contexto es recíproco: tras recibir el préstamo, corresponde devolverlo. «A su vez» expresa bien esa reciprocidad en español formal.'
- source_word: ἀπόδος
  english_pob_choice: repay
  chosen_spanish: repaga
  alternatives_spanish:
  - devuelve
  - paga de vuelta
  lexicon: BDAG
  rationale: En un contexto de préstamo, ἀποδίδωμι exige la idea de devolver lo debido. «Repaga» conserva la fuerza financiera y evita la ambigüedad de un simple «devuelve».
- source_word: εἰς τὸν καιρόν
  english_pob_choice: at the appointed time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el tiempo señalado
  - en el momento oportuno
  lexicon: BDAG
  rationale: La frase apunta al momento apropiado o convenido para el pago. «A su debido tiempo» es una equivalencia natural en español y preserva la noción de tiempo fijado u oportuno.
theological_decisions:
- issue: Reciprocidad moral en la obligación de devolver un préstamo
  english_pob_reading: repay your neighbor in turn at the appointed time
  chosen_spanish_reading: repaga a tu prójimo, a su debido tiempo
  alternative_spanish_readings:
  - repaga a tu prójimo en turno, a su debido tiempo
  - devuelve a tu prójimo, a su debido tiempo
  rationale: 'El griego no presenta una simple recomendación social, sino una obligación recíproca: el que recibe debe devolver. La redacción española mantiene esa exigencia sin suavizarla.'
  doctrine_reference: Sirácides 29:2; principio ético de justicia en los préstamos
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete: δάνεισον / ἀπόδος se reflejan con dos imperativos de préstamo y devolución; πάλιν se mantiene como reciprocidad discursiva («a su vez» en la decisión léxica, con posibilidad de lectura más literal «de nuevo» en la nota); εἰς τὸν καιρόν se vierte como «a su debido tiempo», ajustando la revisión inglesa que prefirió «at the appointed time».'
  spanish_consistency_notes:
  - Se usa «prójimo» para πλησίον por coherencia con el registro ético bíblico.
  - Se evita «SEÑOR» u otra terminología no presente en el versículo.
  - «Repaga» conserva la relación semántica con un préstamo; no se reemplaza por un genérico que diluya la obligación financiera.
  - La nota conserva la alternativa de πάλιν porque la ambigüedad léxica es real y el auditable trail la preserva.
