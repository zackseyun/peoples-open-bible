translation:
  language: es
  text: 'Y los hijos de José dijeron: «La región montañosa[a] no es suficiente para nosotros, y todos los cananeos que habitan en la región del valle tienen carros de hierro[b], tanto los que están en Bet-seán y sus ciudades dependientes[c] como los que están en el valle de Jezreel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «la montaña» o «la región montañosa no se encuentra para nosotros»; en contexto, el sentido es que la región montañosa no les basta a las tribus de José.
    reason: lexical_alternative
  - marker: b
    text: 'O: «carros hechos de hierro».'
    reason: lexical_alternative
  - marker: c
    text: «Ciudades dependientes» refleja el hebreo «hijas», es decir, asentamientos menores vinculados a una ciudad principal.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - las tribus de José
  - los descendientes de José
  lexicon: HALOT
  rationale: El hebreo nombra a la colectividad como “los hijos de José”; en español, “hijos” conserva esa formulación genealógica y territorial sin introducir una explicación ajena al texto.
- source_word: הָהָר / לֹא יִמָּצֵא לָנוּ
  english_pob_choice: the hill country is not enough for us
  chosen_spanish: la región montañosa no es suficiente para nosotros
  alternatives_spanish:
  - la montaña no se encuentra para nosotros
  - la región montañosa no nos alcanza
  - la tierra montañosa no cabe para nosotros
  lexicon: HALOT
  rationale: Sigo el valor contextual de suficiencia que la POB inglesa documenta para לֹא יִמָּצֵא לָנוּ. “Región montañosa” comunica mejor el territorio asignado que un literal “montaña”, y “no es suficiente para nosotros” evita una calca extraña en español.
- source_word: רֶכֶב בַּרְזֶל
  english_pob_choice: iron chariots
  chosen_spanish: carros de hierro
  alternatives_spanish:
  - carros de hierro forjado
  - carros acorazados
  lexicon: HALOT
  rationale: “Carros de hierro” reproduce de forma directa la expresión técnica y militar del hebreo. En español “carro” es la forma más natural y transparente para este tipo de vehículo antiguo.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  - los cananeos de Canaán
  lexicon: HALOT
  rationale: Aunque el hebreo puede aparecer en singular morfológico, aquí funciona como colectivo. El plural español expresa con claridad el grupo poblacional referido por el original y por la POB inglesa.
- source_word: הַיֹּשֵׁב
  english_pob_choice: who live
  chosen_spanish: que habitan
  alternatives_spanish:
  - que viven
  - que moran
  lexicon: HALOT
  rationale: El participio singular hebreo con sustantivo colectivo se vierte naturalmente en plural relativo en español. “Habitan” conserva un registro digno y bíblico sin sonar arcaico.
- source_word: אֶרֶץ הָעֵמֶק
  english_pob_choice: the valley land
  chosen_spanish: la tierra del valle
  alternatives_spanish:
  - la tierra del llano
  - la llanura
  - el valle
  lexicon: HALOT
  rationale: “Tierra del valle” preserva el contraste territorial con “región montañosa” y refleja el hebreo más de cerca que una simple “llanura”, que podría ser demasiado interpretativa.
- source_word: בְּבֵית שְׁאָן
  english_pob_choice: Beth-shean
  chosen_spanish: Bet-seán
  alternatives_spanish:
  - Bet-shean
  - Betsán
  lexicon: HALOT
  rationale: Uso una transliteración española sobria y reconocible. “Bet-seán” conserva mejor la forma hebrea que una adaptación plenamente castellanizada y evita duplicar grafías inglesas.
- source_word: וּבְנוֹתֶיהָ
  english_pob_choice: and its daughter towns
  chosen_spanish: sus ciudades dependientes
  alternatives_spanish:
  - sus ciudades hijas
  - sus poblados dependientes
  - sus aldeas
  lexicon: HALOT
  rationale: La imagen hebrea de “hijas” designa asentamientos subordinados. En español, “ciudades dependientes” mantiene la relación jerárquica con mayor claridad que una metáfora literal que podría sonar extraña; la nota preserva la alternativa idiomática.
- source_word: עֵמֶק יִזְרְעֶאל
  english_pob_choice: the Valley of Jezreel
  chosen_spanish: el valle de Jezreel
  alternatives_spanish:
  - la llanura de Jezreel
  - el valle de Esdrelón
  lexicon: HALOT
  rationale: “Valle de Jezreel” sigue de cerca el constructo hebreo y coincide con el designado geográfico. Es más directo y menos interpretativo que una equivalencia tradicional como “Esdrelón”.
theological_decisions:
- issue: Valor territorial de la queja de los hijos de José
  english_pob_reading: The hill country is not enough for us; the sense is insufficiency in context, not mere inability to locate a mountain.
  chosen_spanish_reading: La región montañosa no es suficiente para nosotros.
  alternative_spanish_readings:
  - La montaña no se encuentra para nosotros.
  - La región montañosa no nos alcanza.
  rationale: La decisión refleja una queja sobre insuficiencia territorial, no una afirmación literal sobre la existencia de una montaña. La redacción evita borrar la tensión del hebreo, pero la expresa de manera natural en español.
  doctrine_reference: Joshua 17:16 in its immediate territorial context
- issue: Interpretación de בְנוֹתֶיהָ como asentamientos subordinados
  english_pob_reading: ‘Daughter towns’ refers to smaller dependent settlements belonging to a larger city.
  chosen_spanish_reading: sus ciudades dependientes
  alternative_spanish_readings:
  - sus ciudades hijas
  - sus aldeas dependientes
  rationale: Se conserva la idea de subordinación urbana sin imponer un tecnicismo ajeno. La alternativa literal queda disponible, pero el texto principal comunica con claridad la relación municipal implícita.
  doctrine_reference: Lexical/cultural note on ancient Near Eastern settlement terminology
translation_notes:
  revision_awareness: La redacción sigue de cerca la POB inglesa revisada sin cambios sustantivos, pero ajusta el español para preservar el contraste territorial, la fuerza colectiva de “los cananeos” y la imagen cultural de las “ciudades hijas” con una formulación natural y auditable.
  spanish_consistency_notes:
  - Se usa “José” como nombre propio y “hijos” para la colectividad, conforme al hebreo y al registro bíblico.
  - Se mantiene “región montañosa” para evitar un calco áspero de הָהָר y conservar el contraste con “tierra del valle”.
  - Se prefiere “carros de hierro” por transparencia léxica y coherencia con la POB inglesa.
  - La transliteración “Bet-seán” sigue un criterio español uniforme con nombres hebreos territoriales.
  - “Valle de Jezreel” conserva la forma geográfica más directa y coherente con el resto del versículo.
