translation:
  language: es
  text: 'Y esta era la construcción del soporte: tenía marcos,[a] y había marcos entre los travesaños.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paneles» (hebreo מִסְגְּרֹת), refiriéndose a secciones enmarcadas del soporte.
    reason: lexical_alternative
  - marker: b
    text: El término traducido «travesaños» también puede verterse «soportes», «montantes» o «barras»; la pieza arquitectónica exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה
  english_pob_choice: And this
  chosen_spanish: Y esta
  alternatives_spanish:
  - Y esto
  - Y así
  lexicon: HALOT
  rationale: La secuencia introductoria presenta una descripción técnica; «Y esta» conserva la deixis y el flujo discursivo sin volverlo artificial en español.
- source_word: מַעֲשֵׂה
  english_pob_choice: construction
  chosen_spanish: construcción
  alternatives_spanish:
  - obra
  - trabajo
  - estructura
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el sustantivo apunta al modo en que está hecho el objeto; «construcción» comunica bien esa idea en español moderno.
- source_word: הַמְּכוֹנָה
  english_pob_choice: the stand
  chosen_spanish: el soporte
  alternatives_spanish:
  - la base
  - el pedestal
  - el armazón
  lexicon: HALOT
  rationale: El término designa la pieza/estructura sobre la que se asentaba el conjunto. «Soporte» es natural en español y mantiene la función estructural sin imponer más de lo que el contexto garantiza.
- source_word: מִסְגְּרֹת
  english_pob_choice: frames
  chosen_spanish: marcos
  alternatives_spanish:
  - frames
  - paneles
  - bastidores
  lexicon: HALOT
  rationale: POB en inglés optó finalmente por «frames» para corresponder mejor al hebreo; en español, «marcos» preserva esa correspondencia y sugiere secciones enmarcadas de la estructura.
- source_word: לָהֶם
  english_pob_choice: they had
  chosen_spanish: tenía
  alternatives_spanish:
  - tenían
  - les pertenecían
  - había para ellos
  lexicon: HALOT
  rationale: La preposición con sufijo expresa posesión/adscripción. En español, «tenía» reproduce la idea de que el soporte poseía esas secciones sin una perífrasis torpe.
- source_word: וּמִסְגְּרֹת
  english_pob_choice: and there were frames
  chosen_spanish: y había marcos
  alternatives_spanish:
  - y marcos
  - y estaban los marcos
  - y había bastidores
  lexicon: HALOT
  rationale: Se conserva la repetición del sustantivo para reflejar la estructura hebrea. «Había» hace natural la frase y mantiene el carácter descriptivo.
- source_word: בֵּין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - dentro de
  lexicon: HALOT
  rationale: Es la equivalencia espacial directa y más clara en español.
- source_word: הַשְׁלַבִּים
  english_pob_choice: the supports
  chosen_spanish: los travesaños
  alternatives_spanish:
  - los soportes
  - los montantes
  - las barras
  lexicon: HALOT
  rationale: La pieza exacta es algo incierta; el audit trail inglés reconoce esa incertidumbre. «Travesaños» es una opción arquitectónica plausible en español y evita fijar de forma demasiado rígida un elemento no totalmente seguro.
translation_notes:
  revision_awareness: La redacción sigue el giro final del audit trail inglés, que cambió de «panels» a «frames» para corresponder mejor con מִסְגְּרֹת. En español se mantuvo esa preferencia por una solución equivalente («marcos») y se conservó la cautela del texto ante la incertidumbre del elemento estructural final.
  spanish_consistency_notes:
  - Se usó «soporte» para הַמְּכוֹנָה por coherencia con el uso técnico de la pieza en este contexto.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; el versículo es puramente descriptivo.
  - Se preservó la repetición de מִסְגְּרֹת en ambos miembros de la frase mediante la repetición de «marcos».
