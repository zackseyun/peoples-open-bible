  glossary_alignment: 'Buen alineamiento con la política del proyecto en «Seol». No hay conflicto con terminología teológica principal. La principal desviación está en la decisión léxica para מוֹקְשֵׁי: debe reflejar mejor «trampa/lazo/cepo» y no repetir el término usado para חֶבְלֵי.'
