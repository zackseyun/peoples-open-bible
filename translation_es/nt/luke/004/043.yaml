translation:
  language: es
  text: 'Pero él les dijo: «También a las otras ciudades me es necesario anunciar las buenas noticias del reino de Dios, porque para esto fui enviado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para este propósito fui enviado»
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν πρὸς αὐτοὺς
  english_pob_choice: But he said to them
  chosen_spanish: Pero él les dijo
  alternatives_spanish:
  - Y les dijo
  - Pero les habló
  lexicon: BDAG
  rationale: δέ marca un giro suave de contraste; en español, «Pero» mantiene bien la transición narrativa. Se añade «él» para claridad natural en español sin cambiar el referente.
- source_word: εὐαγγελίσασθαί
  english_pob_choice: proclaim the good news
  chosen_spanish: anunciar las buenas noticias
  alternatives_spanish:
  - proclamar las buenas noticias
  - predicar las buenas noticias
  lexicon: BDAG
  rationale: εὐαγγελίζω significa traer o anunciar buenas noticias. «Anunciar las buenas noticias» suena natural en español y conserva el sentido verbal sin volverlo una fórmula eclesiástica fija. Se evita «predicar» como opción principal porque puede sonar más técnica que el griego aquí.
- source_word: δεῖ
  english_pob_choice: I must
  chosen_spanish: me es necesario
  alternatives_spanish:
  - debo
  - tengo que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad, a menudo con peso de misión o necesidad divina en Lucas. «Me es necesario» conserva ese matiz con más fuerza formal que «debo», y evita suavizar la obligación.
- source_word: ἑτέραις πόλεσιν
  english_pob_choice: the other cities
  chosen_spanish: las otras ciudades
  alternatives_spanish:
  - las demás ciudades
  - otras ciudades
  lexicon: BDAG
  rationale: ἕτερος con πόλις indica ciudades distintas de la presente. «Las otras ciudades» reproduce bien el contraste y mantiene la referencia geográfica simple y transparente.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la soberanía de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia más transparente y reconoce la fórmula lucana central. Aunque «reinado» subraya el aspecto dinámico, el texto fuente y la tradición de la frase favorecen «reino».
- source_word: ἐπὶ τοῦτο
  english_pob_choice: for this
  chosen_spanish: para esto
  alternatives_spanish:
  - por esto
  - con este fin
  lexicon: BDAG
  rationale: La frase expresa finalidad. «Para esto» es breve, natural y suficientemente precisa en español; «con este fin» sería más explicativa de lo que exige el griego.
- source_word: ἀπεστάλην
  english_pob_choice: I was sent
  chosen_spanish: he sido enviado
  alternatives_spanish:
  - fui enviado
  - he sido mandado
  lexicon: BDAG
  rationale: El aoristo pasivo comunica una acción ya realizada con énfasis en la misión. «He sido enviado» suena natural en español y preserva el sentido de comisión sin introducir un término más técnico como «comisionado».
theological_decisions:
- issue: Necesidad y envío en la misión de Jesús
  english_pob_reading: The verse presents a divinely necessary mission to proclaim God's kingdom in multiple cities, without specifying more than the text states about the sender in the main line.
  chosen_spanish_reading: El versículo presenta una misión necesaria de anunciar el reino de Dios en varias ciudades, y mantiene en la línea principal el énfasis en el envío sin explicitar más de lo que dice el texto.
  alternative_spanish_readings:
  - La frase podría ampliarse a una necesidad divina explícita
  - 'Podría decirse de modo más interpretativo: ''porque Dios me envió para esto'''
  rationale: Lucas usa δεῖ con frecuencia para necesidad ligada al plan de Dios, y el pasivo ἀπεστάλην sugiere fuertemente un envío con autoridad. La redacción española conserva esa carga mediante «me es necesario» y «he sido enviado», sin resolver del todo quién aparece explícitamente como remitente en la superficie del enunciado.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: 'La redacción coincide sustancialmente con la última pasada revisada del texto fuente: no se detectaron cambios aplicados en el audit trail reciente, y el consenso de revisión fue alto con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y no se sustituye por fórmulas de máscara como «Señor».
  - Se usa «reino de Dios» como término estable de Lucas.
  - Se prefiere «anunciar las buenas noticias» para εὐαγγελίζω, evitando un calco rígido y preservando el matiz de mensaje gozoso.
  - La pasiva «he sido enviado» conserva la voz pasiva del griego y el tono de misión.
  - La puntuación con comillas españolas y el orden de miembros siguen un estilo bíblico moderno, claro y publicable.
