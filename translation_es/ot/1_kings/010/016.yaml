translation:
  language: es
  text: El rey Salomón hizo doscientos escudos grandes[a] de oro batido; seiscientos siclos de oro se aplicaban a cada escudo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo para «escudo» aquí se refiere a un escudo grande, probablemente distinto de los escudos más pequeños mencionados en el versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «seiscientos de oro subía sobre el un escudo»; «siclos» está implícito como unidad de peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: עשה aquí expresa producir o hacer los objetos; «hizo» es natural, digno y fiel al acto de fabricación sin añadir matices no presentes.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - rey Salomón
  - Salomón, el rey
  lexicon: HALOT
  rationale: En español, el sintagma completo conserva con claridad el título y el nombre propios sin forzar un orden menos natural.
- source_word: מָאתַיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - doscientos en número
  lexicon: HALOT
  rationale: Cardinal directo y exacto.
- source_word: צִנָּה
  english_pob_choice: large shields
  chosen_spanish: escudos grandes
  alternatives_spanish:
  - grandes escudos
  - escudos
  lexicon: HALOT
  rationale: צִנָּה designa un escudo grande. «Escudos grandes» conserva la distinción léxica sin sonar artificial en español.
- source_word: זָהָב שָׁחוּט
  english_pob_choice: beaten gold
  chosen_spanish: oro batido
  alternatives_spanish:
  - oro martillado
  - oro forjado a golpes
  lexicon: HALOT
  rationale: שָׁחוּט describe oro trabajado por golpeo o laminado; «oro batido» es breve, idiomático y corresponde bien al procedimiento artesanal.
- source_word: שֵׁשׁ מֵאוֹת זָהָב
  english_pob_choice: six hundred shekels of gold
  chosen_spanish: seiscientos siclos de oro
  alternatives_spanish:
  - seiscientos de oro
  - seiscientos pesos de oro
  lexicon: HALOT
  rationale: El hebreo omite la unidad, pero el contexto de peso la presupone. «Siclos» la hace explícita y sigue la convención métrica tradicional sin ocultar el dato.
- source_word: יַעֲלֶה עַל
  english_pob_choice: went onto
  chosen_spanish: iban sobre
  alternatives_spanish:
  - subían sobre
  - se aplicaban sobre
  lexicon: HALOT
  rationale: La construcción hebrea puede expresar la cantidad de oro que se aplicaba o subía sobre el escudo. «Iban sobre» conserva la imagen concreta de aplicación sin sobreexplicar.
- source_word: הַצִּנָּה הָאֶחָת
  english_pob_choice: each shield
  chosen_spanish: cada escudo
  alternatives_spanish:
  - el único escudo
  - a cada escudo
  lexicon: HALOT
  rationale: Aunque literalmente es «el uno escudo», el sentido distributivo del contexto exige «cada escudo» en español para transmitir correctamente la cantidad por unidad.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el auditor inglés: mantiene la distinción de צִנָּה como «escudos grandes», explicita la unidad implícita «siclos» y conserva la construcción distributiva de יַעֲלֶה עַל como una relación de cantidad aplicada a cada escudo. No se introdujeron revisiones textuales ni cambios doctrinales.'
  spanish_consistency_notes:
  - Se mantiene «oro» para זָהָב y «siclos» para la unidad implícita, conforme al uso bíblico castellano claro y auditable.
  - Se prefirió el verbo simple «hizo» por fidelidad y naturalidad.
  - La nota al pie preserva la ambigüedad/precisión léxica de צִנָּה sin sustituirla por un término más genérico.
