    rationale: El contenido de la nota [a] ofrece alternativas para πίστις («confianza», «fidelidad»), pero en el texto está anclada a «tormentos». Esto induce al lector a pensar erróneamente que la variante afecta a στρεβλῶν en lugar de πίστιν.
