translation:
  text: Jesus said[1], "The harvest indeed is plentiful, but the workers are few.
    Beseech the master, then[2], that he may send out workers to the harvest."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:25:00Z'
  footnotes:
  - marker: '1'
    text: Unlike the canonical parallels in Matthew 9:38 and Luke 10:2, Thomas lacks
      the phrase 'of the harvest' after 'master' (or 'Lord'), and lacks 'his' before
      the final 'harvest'.
    reason: textual_variant
  - marker: '2'
    text: The Coptic ⲡϫⲟⲉⲓⲥ (pjoeis) can be translated as 'the Lord' or 'the master'.
      In the context of an agricultural estate, 'master' is used here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲱϩⲥ
  chosen: harvest
  rationale: Standard term for 'harvest' or 'reaping'.
  lexicon: Crum 283a
  alternatives:
  - reaping
- source_word: ⲛⲁϣⲱϥ
  chosen: plentiful
  rationale: From ⲛⲁϣⲉ- (to be many/great) + ⲱϥ (it). 'Plentiful' or 'abundant' fits
    the agricultural context well.
  lexicon: Crum 242a
  alternatives:
  - great
  - abundant
  - much
- source_word: ⲥⲟⲃⲕ
  chosen: few
  rationale: Standard term for 'few' or 'small'.
  lexicon: Crum 320b
  alternatives:
  - small
- source_word: ⲥⲟⲡⲥ
  chosen: Beseech
  rationale: Means 'to entreat, beseech, pray'. 'Beseech' captures the urgency of
    the request.
  lexicon: Crum 351b
  alternatives:
  - Beg
  - Pray
  - Entreat
- source_word: ϫⲟⲉⲓⲥ
  chosen: master
  rationale: While ⲡϫⲟⲉⲓⲥ is the standard Coptic rendering for 'Lord' (κύριος), 'master'
    fits the agricultural parable context of an estate owner sending workers.
  lexicon: Crum 785a
  alternatives:
  - Lord
- source_word: ⲛⲁⲛⲉϫ ... ⲉⲃⲟⲗ
  chosen: send out
  rationale: ⲛⲟⲩϫⲉ ⲉⲃⲟⲗ literally means 'cast out' or 'throw out', matching the Greek
    ἐκβάλλω in the Synoptic parallels. 'Send out' is the idiomatic English equivalent.
  lexicon: Crum 232a
  alternatives:
  - cast out
  - throw out
theological_decisions:
- issue: Translation of ⲡϫⲟⲉⲓⲥ (pjoeis)
  chosen_reading: master
  rationale: Translating as 'master' grounds the saying in its parabolic, agricultural
    context rather than immediately elevating it to a theological title ('Lord'),
    though both are valid translations of the underlying term.
  alternatives_noted:
  - Lord
drafter_notes: This saying closely parallels Matthew 9:37-38 and Luke 10:2, but with
  characteristic Thomasine brevity, omitting the redundant 'of the harvest' after
  'master'. The translation preserves the Coptic syntax, including the use of 'to
  the harvest' (ⲉⲡⲱϩⲥ) rather than 'into his harvest'.
previous_drafts:
- archived_at: '2026-04-22T09:25:00Z'
  reason: redraft_coptic_strict
  english_text: Jesus said, "The harvest indeed is great, but the workers are few.
    Beseech then the master that he may send out workers into the harvest."
  previous_translation_block:
    text: Jesus said, "The harvest indeed is great, but the workers are few. Beseech
      then the master that he may send out workers into the harvest."
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: 'The Coptic is elliptical here, reading literally: “So then, the master,
        that he may send out workers into the harvest.” An explicit verb of asking/praying
        is not written. ''[ask]'' is supplied to make the exhortation explicit in
        English.'
      reason: alternative_reading
    - marker: b
      text: 'Compare Matt 9:37–38; Luke 10:2: “pray the Lord of the harvest to send
        out laborers.” Thomas lacks both “pray” and “of the harvest,” and uses the
        simpler “the master.”'
      reason: cross_reference
    - marker: c
      text: The verb ⲛⲟⲩϫⲉ can mean 'send' or 'throw/cast'; 'send out' is chosen by
        context. The Synoptic Greek uses ἐκβάλλειν ('throw out').
      reason: lexical_alternative
    - marker: d
      text: Lycopolitan-featured spelling ϣⲓⲛⲁ for expected ϩⲓⲛⲁ; meaning is the same
        ('in order that').
      reason: dialect_note
    - marker: e
      text: ⲡϫⲟⲉⲓⲥ is rendered 'master' rather than 'Lord' to avoid anachronistic
        ecclesial sense; both are lexically possible.
      reason: lexical_alternative
    - marker: f
      text: Or 'So then, [ask]'.
      reason: previous_rendering
