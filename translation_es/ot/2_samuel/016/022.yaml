  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: instalación de una tienda para Absalón, ubicación elevada, eufemismo sexual y carácter público del acto. Sin embargo, hay dos problemas de fidelidad expresiva en español: el marcador de nota [a] está anclado en «techo» cuando la nota corresponde a «a la vista de todo Israel», y «entró a las concubinas» no es un eufemismo idiomático natural en español y puede sonar incorrecto o confuso.'
  spanish_quality_summary: El texto es mayormente claro, pero «sobre el techo» suena menos natural en este contexto que «en la azotea», y «entró a las concubinas» no funciona bien en español bíblico moderno. «Se llegó a las concubinas» preserva mejor el eufemismo con dignidad y legibilidad. También conviene mover la nota al segmento final, donde corresponde semánticamente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Concubinas» es adecuado. El punto principal es preservar el eufemismo de ויבא ... אל con una formulación española natural; «se llegó a» lo hace mejor que «entró a».
  issues:
  - severity: high
    issue: El eufemismo sexual «entró a las concubinas» es poco idiomático en español.
    rationale: Aunque intenta calcar el hebreo, en español suena defectuoso y puede distraer del sentido. «Se llegó a las concubinas» preserva la sobriedad bíblica y comunica correctamente la relación sexual implícita.
  - severity: medium
    issue: La nota [a] está anclada en «techo» pero su contenido explica «a la vista de todo Israel».
    rationale: El anclaje debe coincidir exactamente con la frase a la que aplica la alternativa léxica, según las reglas del proyecto.
  - severity: low
    issue: «Sobre el techo» es menos natural que «en la azotea» para un acto público en la parte superior de una casa.
    rationale: El hebreo על הגג admite una superficie superior de casa; en español bíblico general «azotea» comunica mejor ese escenario narrativo sin perder fidelidad.
  revised_spanish_text: Así que le armaron a Absalón la tienda en la azotea, y Absalón se llegó a las concubinas de su padre a la vista[a] de todo Israel.
  revised_footnotes:
