  text: ἀναγεγεννημένοι οὐκ ἐκ σπορᾶς φθαρτῆς ἀλλὰ ἀφθάρτου, διὰ λόγου ζῶντος θεοῦ καὶ μένοντος·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/023.yaml
  text: 'having been born again, not from perishable seed but imperishable, through the living and abiding word of God.'
translation:
  language: ko
  text: '여러분은 썩어질 씨가 아니라 썩지 아니하는 씨로, 살아 있고 영원히 머무는 하나님의 말씀으로 말미암아 거듭난 자들이기 때문입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναγεγεννημένοι
  english_pob_choice: having been born again
  chosen_korean: 거듭난 자들
  alternatives_korean:
  - 새로 태어난 자들
  - 다시 나신 자들
  lexicon: BDAG
  rationale: 1:3의 ἀναγεννήσας와 일관성을 위해 「거듭난」으로 옮긴다. 완료 수동분사로 「~한 자들」의 상태 의미를 살린다.
- source_word: ἐκ σπορᾶς φθαρτῆς ἀλλὰ ἀφθάρτου
  english_pob_choice: not from perishable seed but imperishable
  chosen_korean: 썩어질 씨가 아니라 썩지 아니하는 씨로
  alternatives_korean:
  - 부패할 씨가 아닌 불멸의 씨로
  lexicon: BDAG
  rationale: 1:4·1:18과 어휘 일관성을 위해 「썩어질/썩지 아니하는」 짝을 유지한다.
- source_word: διὰ λόγου ζῶντος θεοῦ καὶ μένοντος
  english_pob_choice: through the living and abiding word of God
  chosen_korean: 살아 있고 영원히 머무는 하나님의 말씀으로 말미암아
  alternatives_korean:
  - 하나님의 살아 있는 말씀, 곧 영원히 머무는 말씀으로
  - 살아 있고 거하는 하나님의 말씀을 통하여
  lexicon: BDAG
  rationale: 두 현재분사 ζῶντος, μένοντος를 「살아 있고 영원히 머무는」으로 옮겨 1:25 인용으로 연결.
