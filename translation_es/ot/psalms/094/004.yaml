translation:
  language: es
  text: Brotan[a]; hablan con arrogancia; todos los que obran iniquidad se jactan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Brotan; hablan insolencia; todos los obradores de maldad se exaltan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַבִּיעוּ
  english_pob_choice: they gush forth
  chosen_spanish: Brotan
  alternatives_spanish:
  - brotan con fuerza
  - desbordan
  - manan
  lexicon: HALOT
  rationale: El verbo hiphil de נבע expresa salir o brotar con abundancia. En español, 'brotan' comunica bien la imagen de un flujo verbal abundante sin añadir una imagen demasiado mecánica. La nota conserva la alternativa de 'gush forth' como matiz poético de desbordamiento.
- source_word: יְדַבְּרוּ
  english_pob_choice: they speak
  chosen_spanish: hablan
  alternatives_spanish:
  - dicen
  - pronuncian
  - hablan
  lexicon: HALOT
  rationale: דבר en piel se traduce de forma neutra como 'hablar'. 'Hablan' mantiene el paralelismo con el primer verbo y suena natural en español bíblico contemporáneo.
- source_word: עָתָק
  english_pob_choice: arrogantly
  chosen_spanish: con arrogancia
  alternatives_spanish:
  - con insolencia
  - palabras insolentes
  - con soberbia
  lexicon: HALOT
  rationale: El término describe discurso altivo o insolente. En español, la frase adverbial 'con arrogancia' conserva la fuerza del modismo sin forzar una reordenación extraña; también deja visible la tensión entre actitud y contenido de la խոս.
- source_word: יִתְאַמְּרוּ
  english_pob_choice: boast
  chosen_spanish: se enaltecen
  alternatives_spanish:
  - se jactan
  - se glorían
  - se exaltan
  lexicon: HALOT
  rationale: El hitpael sugiere autoexaltación. 'Se enaltecen' conserva la idea reflexiva de elevarse a sí mismos, algo más cercano al hebreo que 'se jactan', aunque esta última sería una alternativa idiomática.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: the workers of wickedness
  chosen_spanish: los que hacen iniquidad
  alternatives_spanish:
  - los obreros de iniquidad
  - los hacedores de maldad
  - los malhechores
  lexicon: HALOT
  rationale: La construcción hebrea 'trabajadores/doers de אָוֶן' se mantiene con una frase verbal transparente en español. 'Iniquidad' preserva el peso moral y la forma genitiva del hebreo mejor que un simple 'maldad'.
translation_notes:
  revision_awareness: El español sigue la revisión más reciente del audit trail, que prefirió una forma más directa de 'gush forth' y mantuvo la estructura poética en tres miembros. Para el español se evitó añadir 'palabras' porque el hebreo no lo dice explícitamente; se eligió una construcción que preserve el paralelismo y la intensidad del discurso arrogante.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' por norma del proyecto cuando aparece el nombre divino; en este versículo no aparece.
  - Se prefirió 'iniquidad' para אָוֶן, coherente con el peso moral del hebreo y con el registro bíblico.
  - La nota alternativa refleja la tensión entre una traducción verbal literal y una más interpretativa del contenido del habla.
