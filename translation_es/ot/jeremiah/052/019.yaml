revisions:
- from: Y las vasijas[a], los incensarios[b], las tazas, los pucheros, los candelabros, los cuencos y los utensilios para derramar—todo lo que era de oro, oro, y todo lo que era de plata, plata—lo tomó el capitán de la guardia.
  to: Y los cuencos[a], los braseros[b], las fuentes, las ollas, los candelabros, las copas, y los utensilios para derramar—todo lo que era oro, oro, y todo lo que era plata, plata[c]—lo tomó el capitán de la guardia[d].
  rationale: 'Se corrigen las elecciones léxicas para reflejar mejor las distinciones del hebreo y el expediente del POB inglés: ''cuencos'' para הַסִּפִּים, ''braseros'' para הַמַּחְתּוֹת, ''fuentes'' para הַמִּזְרָקוֹת, ''copas'' para הַכַּפּוֹת, y ''ollas'' por mayor neutralidad. También se acerca la frase metálica al hebreo con ''era oro/plata'' sin ''de'', y se restauran las notas relevantes del aparato inglés.'
