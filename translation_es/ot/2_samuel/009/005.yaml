translation:
  language: es
  text: Entonces el rey David envió y lo tomó de la casa de Makhir hijo de Ammiel[a], de Lo-debar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «envió por él y lo trajo de la casa de Makhir hijo de Ammiel, de Lo-debar». El hebreo une «envió» + «tomó», y el español puede sonar más natural con «envió por» o «trajo», pero se mantuvo una redacción más cercana al verbo de base.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió por
  lexicon: HALOT
  rationale: El hebreo וַיִּשְׁלַח expresa el acto básico de enviar. En español, «envió» conserva ese valor directo sin añadir una interpretación más explícita que el hebreo no dice por sí mismo.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - rey David
  - David, el rey
  lexicon: HALOT
  rationale: La frase aposicional se vierte de manera natural como título más nombre. «El rey David» preserva la definitud y la identificación personal sin perder fluidez en español.
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: took him
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo trajo
  - lo hizo venir
  - lo llevó
  lexicon: HALOT
  rationale: לקח puede implicar traer o llevar en contexto narrativo, pero el valor léxico básico es «tomar». «Lo tomó» sigue de cerca el hebreo y mantiene la tensión entre literalidad y contextualización que el POB inglés conserva.
- source_word: מִבֵּית
  english_pob_choice: from the house of
  chosen_spanish: de la casa de
  alternatives_spanish:
  - del hogar de
  - de la familia de
  - de la casa/linaje de
  lexicon: HALOT
  rationale: בַּיִת puede referirse a casa física o a casa/linaje. Aquí se mantiene «casa» para reflejar la estructura hebrea y la opción inglesa auditada, sin forzar a «familia» o «linaje» más allá del texto.
- source_word: מָכִיר בֶּן עַמִּיאֵל
  english_pob_choice: Machir son of Ammiel
  chosen_spanish: Makhir hijo de Ammiel
  alternatives_spanish:
  - Machir hijo de Ammiel
  - Makir hijo de Ammiel
  lexicon: HALOT
  rationale: Se translitera el nombre propio con forma española corriente y se conserva la relación patronímica con «hijo de». La variante «Makhir» refleja mejor la vocalización hebrea que una transliteración puramente inglesa.
- source_word: מִלּוֹ דְבָר
  english_pob_choice: from Lo-debar
  chosen_spanish: de Lo-debar
  alternatives_spanish:
  - de Lo Debar
  - de Lodebar
  lexicon: HALOT
  rationale: Se trata de un topónimo, no de una expresión descriptiva. Se conserva la transliteración con guion convencional en español bíblico para reflejar el nombre propio y la forma heredada de uso.
translation_notes:
  revision_awareness: El inglés POB vigente ya opta por «sent» + «took him» y ofrece en nota la posibilidad idiomática «sent for him and brought him». Este borrador español sigue esa misma línea de cercanía al hebreo, pero conserva una nota que señala la alternativa natural «envió por»/«trajo» para que la tensión léxica quede auditable en español.
  spanish_consistency_notes:
  - Se mantiene «casa de» para reflejar בית sin reinterpretarlo como parentesco o clan en el texto principal.
  - Se translitera el topónimo como «Lo-debar» para alinearlo con la convención POB y con el nombre propio del hebreo.
  - «Makhir» sigue la pronunciación hebrea más que la forma inglesa «Machir», pero sin abandonar la identificación bíblica estándar.
  - No se introduce «SEÑOR» ni otras sustituciones teológicas porque el versículo no contiene el Tetragrámaton ni un título divino.
