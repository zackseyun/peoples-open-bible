translation:
  language: es
  text: Y quedaron pocos hombres en el santuario[a], porque el hambre los había dominado; y quedaron dispersos, cada uno a su propio lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el lugar santo» o «en los recintos santos». El griego dice literalmente «en las cosas/lugares santos», una expresión que se refiere al área sagrada del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπελείφθησαν
  english_pob_choice: were left
  chosen_spanish: quedaron
  alternatives_spanish:
  - fueron dejados
  - permanecieron
  - quedaron atrás
  lexicon: LSJ
  rationale: El pasivo expresa que solo un resto quedó después de la deserción o pérdida de los demás. «Quedaron» es natural en español y conserva esa idea sin sobrecargar la pasiva.
- source_word: ἐν τοῖς ἁγίοις
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en los recintos santos
  - en las cosas santas
  lexicon: LSJ
  rationale: En este contexto cultual y militar, la expresión apunta al área sagrada del templo. «Santuario» comunica con claridad el espacio sagrado aludido por el griego.
- source_word: ἄνδρες ὀλίγοι
  english_pob_choice: a few men
  chosen_spanish: pocos hombres
  alternatives_spanish:
  - unos pocos hombres
  - un pequeño número de hombres
  - unos hombres pocos
  lexicon: LSJ
  rationale: ἄνδρες es masculino específico, y «pocos hombres» mantiene esa referencia con una formulación fluida en español.
- source_word: κατεκράτησεν αὐτῶν ὁ λιμός
  english_pob_choice: the famine had overpowered them
  chosen_spanish: el hambre los había dominado
  alternatives_spanish:
  - el hambre los había sobrepujado
  - el hambre había prevalecido sobre ellos
  - el hambre los había vencido
  lexicon: LSJ
  rationale: κατακρατέω expresa dominio o triunfo de una fuerza sobre alguien. «Había dominado» conserva la idea de sometimiento eficaz del hambre, en un español idiomático.
- source_word: ἐσκορπίσθησαν
  english_pob_choice: they were scattered
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - fueron esparcidos
  - se dispersaron
  - quedaron dispersos
  lexicon: LSJ
  rationale: El pasivo indica el resultado de quedar desunidos y distribuidos. «Fueron dispersados» mantiene bien la pasividad y la imagen.
- source_word: ἕκαστος εἰς τὸν τόπον αὐτοῦ
  english_pob_choice: each to his own place
  chosen_spanish: cada uno a su propio lugar
  alternatives_spanish:
  - cada uno a su lugar
  - cada cual a su propio lugar
  - cada uno a su casa
  lexicon: LSJ
  rationale: τόπος significa de manera amplia «lugar»; «propio lugar» preserva esa amplitud sin restringir indebidamente a «casa».
theological_decisions:
- issue: Sentido cultual de ἐν τοῖς ἁγίοις
  english_pob_reading: in the sanctuary
  chosen_spanish_reading: en el santuario
  alternative_spanish_readings:
  - en el lugar santo
  - en los recintos santos
  rationale: La frase es espacial y refiere al ámbito sagrado del templo. «Santuario» ofrece una equivalencia clara y reverente, sin diluir el carácter cultual del pasaje.
  doctrine_reference: 'Translation philosophy: optimal equivalence; claridad moderna sin perder la referencia templaria.'
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego de Swete 1909 y con el audit trail inglés: pasivo de ὑπελείφθησαν, sentido cultual de ἐν τοῖς ἁγίοις, fuerza de κατακρατέω como dominio/avasallamiento, y pasivo final de ἐσκορπίσθησαν. No se identifican revisiones posteriores que alteren la solución.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se evitó «SEÑOR» por no tratarse de κύριος ni de una cita del nombre divino.
  - «Santuario» se usa aquí como equivalente funcional de una expresión templaria, no como sinónimo doctrinalmente ampliado.
  - 'Se preservó el paralelismo de los dos pasivos: «quedaron» / «fueron dispersados».'
