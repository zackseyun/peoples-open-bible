translation:
  language: es
  text: Y aconteció[a] que, cuando iba entrando en el palacio real de sus antepasados, las tropas apresaron a Antíoco y a Lisias para llevarlos ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «la casa del reino de sus padres». También puede expresarse como «la casa real de sus antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς
  english_pob_choice: And it happened, as
  chosen_spanish: Y aconteció, que, cuando
  alternatives_spanish:
  - Y sucedió, cuando
  - Y ocurrió, cuando
  lexicon: LSJ
  rationale: La fórmula narrativa griega marca transición temporal e histórica. «Aconteció» conserva el tono bíblico sin resultar arcaico en exceso, y el complemento «cuando» refleja bien el valor temporal de ὡς.
- source_word: εἰσεπορεύετο
  english_pob_choice: he was entering
  chosen_spanish: iba entrando
  alternatives_spanish:
  - entraba
  - estaba entrando
  lexicon: LSJ
  rationale: El imperfecto expresa acción en curso. «Iba entrando» comunica progresividad de manera natural en español y mantiene el aspecto del original.
- source_word: οἶκον βασιλείας
  english_pob_choice: the royal house
  chosen_spanish: la casa real
  alternatives_spanish:
  - el palacio real
  - la casa del reino
  lexicon: LSJ
  rationale: La nota inglesa reconoce que la expresión puede entenderse idiomáticamente como residencia real. En español, «casa real» preserva la imagen de «casa» y su sentido dinástico sin sonar forzado.
- source_word: πατέρων αὐτοῦ
  english_pob_choice: of his fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  - de sus padres y mayores
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «de sus padres», en español «sus padres» puede sonar restringido a progenitores inmediatos. Dado el contexto dinástico, «sus padres» aquí conserva la expresión hereditaria y sigue de cerca el griego; la frase completa evita una traducción demasiado interpretativa.
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: apresaron
  alternatives_spanish:
  - se apoderaron de
  - capturaron
  lexicon: LSJ
  rationale: En contexto militar, el verbo admite el sentido de arrestar o prender. «Apresaron» expresa la captura con fuerza y sin introducir tecnicismos legales ajenos al pasaje.
- source_word: αἱ δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las tropas
  alternatives_spanish:
  - las fuerzas
  - el ejército
  lexicon: LSJ
  rationale: «Tropas» es una equivalencia natural en español para un plural militar concreto. Conserva el referente bélico sin perder claridad.
- source_word: ἀγαγεῖν αὐτοὺς αὐτῷ
  english_pob_choice: to bring them to him
  chosen_spanish: para llevarlos ante él
  alternatives_spanish:
  - para conducirlos hasta él
  - para traerlos ante él
  lexicon: LSJ
  rationale: El infinitivo de propósito indica que debían ser presentados al destinatario de la captura. «Llevarlos ante él» reproduce esa finalidad con naturalidad en español.
translation_notes:
  revision_awareness: 'El inglés POB revisó la frase desde una calca más rígida («house of the kingdom») a «royal house» por naturalidad, manteniendo la imagen dinástica. En español se siguió esa misma línea: se evitó una calca como «casa del reino» en el cuerpo principal, pero se dejó constancia en nota de la alternativa más literal. También se mantuvo el matiz imperfectivo de εἰσεπορεύετο y el propósito de ἀγαγεῖν con una construcción final clara.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - No hay términos cristológicos ni teológicos especiales en este versículo.
  - Se prefirió «apresaron» sobre «capturaron» para conservar el matiz de prender con rapidez en contexto narrativo militar.
  - La puntuación separa adecuadamente la prótasis temporal de la cláusula principal en español.
