revisions:
- from: En cuanto a los avvitas[a], que habitaban en aldeas[b] hasta Gaza, los caftoritas, que salieron de Caftor, los destruyeron y habitaron en su lugar.
  to: En cuanto a los Avvim[a], que habitaban en aldeas[b] hasta Gaza, los caftoritas, que salieron de Caftor, los destruyeron y se establecieron en su lugar.
  rationale: Se ajusta el etnónimo principal a «Avvim» para seguir la decisión documentada del POB y se corrige la nota [a] para que presente una alternativa verdadera («avvitas»). Además, se mejora «habitaron en su lugar» a «se establecieron en su lugar» para reflejar mejor el matiz de reemplazo y asentamiento del hebreo, manteniendo un español natural y digno. Se conserva «aldeas» con nota explicativa, en línea con la revisión inglesa auditada.
