base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/013/023.yaml
  text: He attacked those around Judas[a], but was defeated. Having become desperate, he took Philip in Antioch, the one left in charge of affairs; he was confounded, appealed to the Jews, submitted, and swore to all the just terms. He was reconciled and offered sacrifice, honored the sanctuary and the place[b], and showed kindness.
  footnotes:
