theological_decisions:
- issue: Moral-religious force of δυσσεβῆ
  chosen_reading: Rendered as 'impious' rather than a merely secular term like 'wicked.'
  alternative_readings:
  - wicked
  - godless
  rationale: The term carries irreverence toward God, not only general moral corruption. The translation preserves that religious dimension without adding doctrinal content beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; readable modern English'
