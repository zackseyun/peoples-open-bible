review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo: duración de siete días, mandato de comer pan sin levadura, y una festividad dedicada a Yahvé en el séptimo día. Sin embargo, omite la conjunción explícita antes de la segunda cláusula (''y el séptimo día''), y una nota al pie está mal anclada y no corresponde a la alternativa léxica inglesa sobre חַג.'
  spanish_quality_summary: El español es natural y claro, con buen registro bíblico moderno. 'Durante siete días comerás pan sin levadura' funciona bien. Conviene restaurar la conjunción 'y' para reflejar mejor וּבַיּוֹם. También debe corregirse la nota [b], que actualmente repite el sentido de 'para Yahvé' en vez de ofrecer la alternativa de 'festival'.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה → ''Yahvé'', מַצּוֹת → ''pan sin levadura''. ''Fiesta'' para חַג es aceptable y coincide con la decisión inglesa principal; la alternativa en nota debe reflejar ''festival''/''festividad'' y no la frase preposicional con Yahvé.'
  issues:
  - severity: medium
    issue: Falta la conjunción 'y' antes de 'el séptimo día'.
    rationale: El hebreo tiene וּבַיּוֹם הַשְּׁבִיעִי, y la decisión inglesa auditada también conserva 'and on the seventh day'. En español su ausencia no destruye el sentido, pero sí reduce la correspondencia formal con el original.
  - severity: high
    issue: La nota [b] no refleja la alternativa léxica documentada para חַג.
    rationale: 'La nota inglesa [b] dice ''Or “a festival to the LORD.”'' La nota española actual (''También puede entenderse: “una fiesta para Yahvé”'') no aporta alternativa real, porque repite la lectura principal. Debe ofrecer una variante como ''una festividad para Yahvé'' o ''un festival para Yahvé''.'
  - severity: low
    issue: El anclaje de [b] sobre 'pan sin levadura' es engañoso.
    rationale: La nota [b] trata de חַג en la segunda cláusula, no de מַצּוֹת. El marcador debe colocarse junto a 'fiesta' o al sintagma correspondiente.
  revised_spanish_text: Durante siete días comerás pan sin levadura[a], y el séptimo día habrá una fiesta[b] para Yahvé.
