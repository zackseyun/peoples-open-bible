translation:
  language: es
  text: Y castigaré a los que habitan en la tierra de Egipto[a], como castigué a Jerusalén, con la espada, con hambruna[b] y con la peste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «visitaré con juicio a los que habitan en la tierra de Egipto ... como visité Jerusalén». El verbo hebreo פקד puede significar «atender», «visitar» o, en contextos de juicio como este, «castigar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «plaga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: And I will punish
  chosen_spanish: Y castigaré
  alternatives_spanish:
  - Y visitaré con juicio
  - Y visitaré castigo sobre
  - Y traeré juicio sobre
  lexicon: HALOT
  rationale: En este contexto de juicio, פקד expresa una acción punitiva. «Castigaré» comunica de forma natural en español la fuerza judicial del verbo sin borrar su amplitud semántica básica de «visitar/atender».
- source_word: הַיֹּשְׁבִים
  english_pob_choice: those who dwell
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los habitantes
  - los que viven
  lexicon: HALOT
  rationale: El participio señala a los residentes o moradores. «Los que habitan» conserva bien el valor verbal del hebreo y suena natural en español bíblico contemporáneo.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se mantiene la expresión completa «tierra de Egipto» para reflejar con más fidelidad la formulación hebrea, en paralelo con el inglés auditado.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: En español, «como» introduce de manera natural la comparación. El contexto ya hace claro que se trata de una correspondencia exacta en juicio.
- source_word: פָּקַדְתִּי
  english_pob_choice: I punished
  chosen_spanish: castigué
  alternatives_spanish:
  - visité con juicio
  - traje castigo sobre
  lexicon: HALOT
  rationale: 'Se mantiene la misma decisión léxica que en el primer verbo: el paralelo con Jerusalén pide un verbo explícitamente punitivo y consistente en la traducción.'
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - contra Jerusalén
  lexicon: HALOT
  rationale: En español, el complemento directo con «castigar» se expresa de manera idiomática con «a Jerusalén», sin necesidad de conservar el valor preposicional hebreo de forma literal.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: «Con la espada» reproduce el instrumento del juicio de forma clara y tradicionalmente comprensible en español.
- source_word: בָּרָעָב
  english_pob_choice: with famine
  chosen_spanish: con el hambre
  alternatives_spanish:
  - con la escasez de alimento
  - con el hambre y la carestía
  lexicon: HALOT
  rationale: Aunque el inglés opta por «famine», en español «hambre» comunica el mismo juicio de manera natural y directa; evita una palabra más técnica que puede sonar menos inmediata al lector.
- source_word: וּבַדָּבֶר
  english_pob_choice: and with pestilence
  chosen_spanish: y con la peste
  alternatives_spanish:
  - y con la pestilencia
  - y con la plaga
  lexicon: HALOT
  rationale: «דָּבֶר» en fórmulas proféticas de juicio alude a enfermedad mortífera o epidemia. «Peste» preserva bien la triada espada-hambre-peste y es más natural en español que una perífrasis.
theological_decisions:
- issue: Verbo de juicio en פקד
  english_pob_reading: 'Explicit punitive sense: ''punish'''
  chosen_spanish_reading: 'Sentido punitivo explícito: «castigar»'
  alternative_spanish_readings:
  - «visitar con juicio»
  - «visitar castigo sobre»
  rationale: El versículo describe un juicio covenantal sobre Egipto en paralelo con Jerusalén. «Castigar» deja explícita la fuerza judicial sin introducir contenido doctrinal extra; una opción más formal como «visitar» sería menos transparente en español.
  doctrine_reference: Transparencia del texto original; equivalencia óptima; juicio divino en lenguaje profético.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el borrador español sigue de cerca la lectura auditada y mantiene la misma decisión semántica para פקד en ambos casos.
  spanish_consistency_notes:
  - Se mantiene la misma raíz semántica en ambos verbos de פקד mediante «castigar» y «castigué», para reflejar el paralelismo hebreo.
  - «Tierra de Egipto» se conserva de modo consistente con el paquete inglés y con el hebreo, aunque en español podría abreviarse a «Egipto».
  - La triada de juicio queda unificada como «espada, hambre y peste», coherente con el patrón profético del texto.
