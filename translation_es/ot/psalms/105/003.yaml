review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y mantiene correctamente Yahvé por יְהוָה. Sin embargo, הִתְהַלְלוּ en hitpael aquí se acerca más a 'gloriarse/jactarse/exultar' que a 'alabarse'; 'alábense' puede sugerir alabarse a sí mismos o simplemente dar alabanza, debilitando el matiz reflexivo documentado por la POB. Además, aunque el hebreo tiene singular colectivo לֵב, en español 'gócese el corazón de los que buscan a Yahvé' suena menos natural y el propio audit trail inglés ya ajustó a plural por claridad idiomática; en español conviene 'alégrense los corazones...' o equivalente.
  spanish_quality_summary: El español es entendible y digno, pero 'Alábense' suena semánticamente desviado y algo rígido. 'Gócese el corazón de los que buscan a Yahvé' es gramatical, pero menos natural para lectura pública que una formulación con plural expreso de 'corazones' o con sujeto plural directo. La revisión propuesta mejora fidelidad léxica y fluidez sin apartarse del hebreo.
  glossary_alignment: 'Alineación general buena: ''Yahvé'' cumple la política del nombre divino; ''santo nombre'' es adecuado. El punto principal de glosario/lexema es הִתְהַלְלוּ, donde la documentación inglesa favorece ''boast/glory/exult'', y en español ''Gloríense'' preserva mejor ese valor que ''Alábense''.'
  issues:
  - severity: high
    issue: הִתְהַלְלוּ fue vertido como 'Alábense'
    rationale: El hitpael de הלל aquí no significa primariamente 'alabar' sino gloriarse/jactarse/exultar en alguien o algo. 'Alábense' en español puede leerse como 'alábense ustedes mismos' o como exhortación a alabar, y no preserva bien la decisión léxica auditada ('Boast', con nota 'Glory').
  - severity: medium
    issue: '''gócese el corazón de los que buscan a Yahvé'' suena poco natural en español'
    rationale: Aunque reproduce el singular לֵב, en español litúrgico y natural resulta más claro 'alégrense los corazones de los que buscan a Yahvé'. Esto también armoniza con el ajuste ya documentado en inglés hacia el plural idiomático.
  revised_spanish_text: Gloríense[a] en su santo nombre; alégrense los corazones de los que buscan a Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «Jáctense en su santo nombre». El verbo hebreo puede llevar el sentido de exultar o de hacer de alguien el objeto de la propia jactancia.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'Alábense' por 'Gloríense' para reflejar mejor el valor hitpael de הִתְהַלְלוּ y alinearse con la nota léxica de la POB. Se cambia la segunda cláusula a 'alégrense los corazones...' para lograr un español más natural y claro, manteniendo el sentido jussivo del hebreo y la referencia interior de לֵב. Se conserva 'Yahvé' y 'santo nombre' por fidelidad terminológica.
