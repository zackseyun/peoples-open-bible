translation:
  language: es
  text: Y los servidores del rey que los habían echado dentro no cesaban de avivar el horno con nafta[a], pez, estopa y leña menuda[b], manteniéndolo encendido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bitumen» para ἀφθάλτῳ; el griego nombra una sustancia petrolífera altamente inflamable.
    reason: lexical_alternative
  - marker: b
    text: O «sarmientos» para κληματίδα; el término puede referirse específicamente a brotes de vid cortados como combustible.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ διέλειπον
  english_pob_choice: did not stop
  chosen_spanish: no cesaban
  alternatives_spanish:
  - no dejaban de
  - no se detenían
  - seguían sin cesar
  lexicon: LSJ
  rationale: El imperfecto con negación expresa acción continua; en español, «no cesaban» conserva bien la duración sin sonar forzado.
- source_word: οἱ ἐμβάλλοντες αὐτοὺς
  english_pob_choice: who threw them in
  chosen_spanish: que los echaban dentro
  alternatives_spanish:
  - que los arrojaban dentro
  - que los metieron dentro
  lexicon: LSJ
  rationale: El participio identifica a los mismos servidores que los arrojaron al horno. «Echaban dentro» mantiene el sentido narrativo y la continuidad de la acción.
- source_word: ὑπηρέται τοῦ βασιλέως
  english_pob_choice: the king’s attendants
  chosen_spanish: los servidores del rey
  alternatives_spanish:
  - los asistentes del rey
  - los oficiales del rey
  lexicon: LSJ
  rationale: ὑπηρέται designa subordinados al servicio del rey. «Servidores» es fiel y natural en español; «oficiales» sería demasiado técnico.
- source_word: καίοντες τὴν κάμινον
  english_pob_choice: feeding the furnace ... keeping it burning
  chosen_spanish: alimentando el horno ... manteniéndolo encendido
  alternatives_spanish:
  - avivando el horno ... manteniéndolo encendido
  - quemando el horno ... manteniéndolo ardiendo
  lexicon: LSJ
  rationale: Literalmente es «quemando el horno», pero en español la idea es la de alimentarlo para que siga ardiendo. «Alimentando» conserva el acto de echar combustible y «manteniéndolo encendido» expresa el resultado continuo.
- source_word: ἀφθάλτῳ
  english_pob_choice: naphtha
  chosen_spanish: nafta
  alternatives_spanish:
  - naphtha
  - bitumen
  - asfalto
  lexicon: LSJ
  rationale: La palabra nombra una sustancia combustible parecida al petróleo. «Nafta» es un equivalente español reconocido y comunica bien el referente; se mantiene la distinción frente a la pez.
- source_word: πίσσῃ
  english_pob_choice: pitch
  chosen_spanish: pez
  alternatives_spanish:
  - brea
  - alquitrán
  lexicon: LSJ
  rationale: El término griego alude a una resina combustible; «pez» es el equivalente tradicional y preciso en español, mejor que «alquitrán» por su color semántico más moderno.
- source_word: στιππύῳ
  english_pob_choice: tow
  chosen_spanish: estopa
  alternatives_spanish:
  - hilaza
  - fibra de lino
  - toca
  lexicon: LSJ
  rationale: El vocablo denota fibra usada como yesca o material inflamable. «Estopa» expresa bien esa materia fibrosa combustible en español bíblico y moderno.
- source_word: κληματίδα
  english_pob_choice: brushwood
  chosen_spanish: ramas
  alternatives_spanish:
  - sarmientos
  - ramaje
  - leña menuda
  lexicon: LSJ
  rationale: El término puede referirse a sarmientos de vid o a ramas cortadas para combustible. «Ramas» es claro y sobrio; «sarmientos» sería más específico, pero el contexto no obliga a limitarlo solo a la vid.
translation_notes:
  revision_awareness: Se mantuvo la lectura estable del texto griego normalizado sin introducir cambios textuales. La redacción española sigue de cerca el valor aspectual de los participios y conserva la lista de combustibles con equivalentes lexicográficos claros.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige explícitamente; aquí no aparece.
  - Se evitó «SEÑOR» porque no hay un tetragrámaton en este versículo.
  - «Nafta» y «pez» mantienen la distinción entre los dos combustibles principales mencionados por el griego.
  - «Echaban dentro» conserva la imagen narrativa de arrojar al horno sin añadir matices ajenos al texto.
