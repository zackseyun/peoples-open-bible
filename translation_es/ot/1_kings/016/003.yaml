    rationale: La traducción principal no sigue la decisión auditada de expresar el modismo como eliminación total idiomática. En español, «consumir a Baasa» es poco natural y puede malinterpretarse. Debe comunicarse la destrucción total de Baasa y su casa con una formulación idiomática clara.
  - severity: low
