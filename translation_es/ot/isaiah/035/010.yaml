revisions:
- from: Y los redimidos de Yahvé volverán y vendrán a Sion con júbilo; alegría eterna estará sobre sus cabezas. Gozo y alegría los alcanzarán[a], y huirán la tristeza y el gemido.
  to: Y los redimidos de Yahvé volverán y vendrán a Sion con canto; alegría eterna estará sobre sus cabezas. Gozo y alegría los alcanzarán[a], y la tristeza y el gemido huirán.
  rationale: 'Se requiere una reparación menor para alinear mejor el español con el hebreo y con la auditoría inglesa: «con canto» refleja mejor בְּרִנָּה que «con júbilo», y la cláusula final se reordena para que quede claro y natural que «la tristeza y el gemido» son quienes huyen. El resto del versículo está bien orientado y no necesita cambios mayores.'
