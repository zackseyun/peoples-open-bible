base_translation:
  language: en
  yaml_path: translation/ot/genesis/043/016.yaml
  text: When Joseph saw Benjamin with them[a], he said to the one over his household, “Bring the men into the house, slaughter an animal, and prepare it[c][b], because the men will eat with me at noon.”
  footnotes:
  - marker: a
    text: Or “to the steward of his house.” The Hebrew literally says “to the one over his household.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “slaughter a slaughter,” meaning to butcher an animal for a meal.'
    reason: cultural_note
  - marker: c
    text: Or “at midday.”
    reason: lexical_alternative
