translation:
  language: es
  text: Yo soy el hombre que ha visto aflicción[a][b] bajo la vara de su furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la vara de su furor». La preposición hebrea puede traducirse de varias maneras.'
    reason: alternative_reading
  - marker: b
    text: «Aflicción» también puede rendirse como «miseria» o «sufrimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy
  lexicon: HALOT
  rationale: El pronombre independiente al inicio es enfático. En español, 'Yo soy' preserva bien esa autoidentificación enfática de una frase nominal/verbal breve y suena natural sin perder el énfasis.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el hombre fuerte
  - el guerrero
  lexicon: HALOT
  rationale: El término se usa aquí como designación personal definida. 'El hombre' conserva el artículo definido y la referencia masculina singular sin introducir matices no garantizados por el contexto.
- source_word: רָאָה
  english_pob_choice: has seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - vio
  - ha experimentado
  lexicon: HALOT
  rationale: El qatal se refleja bien con perfecto compuesto en español, adecuado para una auto-descripción presente de una experiencia pasada. 'Visto' mantiene el sentido directo de 'ver' sin interpretarlo como 'experimentar' en el texto principal.
- source_word: עֳנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - sufrimiento
  - afán
  lexicon: HALOT
  rationale: '''Aflicción'' reproduce el campo semántico amplio de dolor, opresión y angustia. Es suficientemente formal y no restringe el término a pobreza material.'
- source_word: בְּשֵׁבֶט
  english_pob_choice: under the rod
  chosen_spanish: bajo la vara
  alternatives_spanish:
  - por la vara
  - con la vara
  - bajo el bastón
  lexicon: HALOT
  rationale: La preposición ב puede traducirse de varias maneras. 'Bajo la vara' conserva la imagen de sometimiento a disciplina o castigo, de forma idiomática en español. Se prefiere 'vara' por su naturalidad bíblica y por corresponder al objeto de corrección/juicio.
- source_word: עֶבְרָתוֹ
  english_pob_choice: his wrath
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su cólera
  - su enojo
  lexicon: HALOT
  rationale: '''עֶבְרָה'' expresa ira intensa, furia o furor. ''Furor'' mantiene la fuerza solemne del término y su intensidad retórica. Se conserva el pronombre posesivo sin explicitar el referente en el texto principal.'
theological_decisions:
- issue: Referente implícito de 'su' en 'su furor'
  english_pob_reading: Retain the Hebrew pronoun as 'his' without explicitly supplying 'God' or 'the LORD' in the main text.
  chosen_spanish_reading: Mantener 'su' sin añadir 'de Yahvé' en el texto principal.
  alternative_spanish_readings:
  - la furia de Yahvé
  - la ira de Dios
  rationale: El hebreo solo presenta un sufijo de tercera persona masculina singular. Aunque el contexto mayor hace claro el referente divino, el texto de este versículo no lo nombra de forma explícita. Conservar 'su' respeta esa economía literaria y evita sobreexplicar.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de la preposición ב en בְּשֵׁבֶט
  english_pob_reading: '''under the rod'' with note ''by the rod'' as an alternative.'
  chosen_spanish_reading: '''bajo la vara'' con la posibilidad implícita de ''por la vara''.'
  alternative_spanish_readings:
  - por la vara
  - con la vara
  rationale: La preposición permite varias relaciones. 'Bajo' comunica mejor la idea de sometimiento o castigo recibido, mientras que 'por' puede sugerir agencia instrumental. El español principal debe conservar el matiz de subordinación que la POB quiso retener.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje quedó confirmado sin cambios en la última pasada, con alta concordancia entre revisores.
  spanish_consistency_notes:
  - Se conserva el pronombre posesivo de tercera persona sin explicitar su referente en el texto principal, siguiendo el expediente inglés.
  - Se opta por 'vara' y no 'vara de corrección' o 'cetro' para mantener la imagen inmediata de castigo/juicio.
  - '''Furor'' se prefiere a ''ira'' en el texto principal por la intensidad retórica del sustantivo hebreo y la tonalidad poética de Lamentaciones.'
