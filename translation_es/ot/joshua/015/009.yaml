translation:
  language: es
  text: Entonces el límite se curvó desde la cima del monte hasta la fuente de las aguas de Nephtoah[a], y salió hacia las ciudades del monte Efrón; entonces el límite se curvó hacia Baalá, es decir, Quiriat-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el límite fue trazado» / «el límite se volvió». El verbo hebreo en este contexto de fronteras puede indicar el trazado de la línea o un cambio de dirección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָאַר
  english_pob_choice: curved
  chosen_spanish: se extendió
  alternatives_spanish:
  - se curvó
  - fue trazado
  - se desvió
  lexicon: HALOT
  rationale: En descripciones de fronteras, el verbo indica el avance o recorrido del límite más que un movimiento físico. «Se extendió» conserva el sentido direccional y funciona con naturalidad en español; «se curvó» sería demasiado gráfico y «fue trazado» desplaza la imagen hacia el acto de cartografiar.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En repartos territoriales, «límite» expresa mejor la línea de demarcación que «frontera», que suena más moderna y política. «Borde» resulta menos preciso para este contexto.
- source_word: מֵרֹאשׁ הָהָר
  english_pob_choice: from the top of the mountain
  chosen_spanish: desde la cima del monte
  alternatives_spanish:
  - desde la cumbre del monte
  - desde la cabeza del monte
  lexicon: HALOT
  rationale: «Cima» comunica de manera natural רֹאשׁ en un contexto topográfico. «Monte» reproduce el valor geográfico de הָהָר; «cabeza» sería demasiado literal para el español.
- source_word: מַעְיַן מֵי נֶפְתּוֹחַ
  english_pob_choice: the spring of the waters of Nephtoah
  chosen_spanish: la fuente de las aguas de Nephtoah
  alternatives_spanish:
  - la fuente junto a las aguas de Nephtoah
  - la fuente de Nephtoah
  lexicon: HALOT
  rationale: Se conserva la cadena constructa con una formulación natural en español. «Fuente» y «aguas» mantienen el valor del hebreo sin borrar la estructura nominal; «Nephtoah» se translitera como topónimo.
- source_word: וְיָצָא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - continuó
  - avanzó
  - se dirigió
  lexicon: HALOT
  rationale: En fórmulas de frontera, יצא describe que el trazado «sale» hacia otro punto. «Salió» preserva el giro hebreo sin sobrecargar la frase; otras opciones explicitan en exceso la direccionalidad.
- source_word: עָרֵי הַר עֶפְרוֹן
  english_pob_choice: the cities of Mount Ephron
  chosen_spanish: las ciudades del monte Efrón
  alternatives_spanish:
  - las ciudades del monte de Efrón
  - las ciudades de la región montañosa de Efrón
  lexicon: HALOT
  rationale: «Ciudades» corresponde a עָרֵי y «monte Efrón» reproduce el constructo de manera compacta. Se evita expandir a «región montañosa», porque eso iría más allá del hebreo inmediato.
- source_word: בַּעֲלָה
  english_pob_choice: Baalah
  chosen_spanish: Baalá
  alternatives_spanish:
  - Baalah
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación ortográfica española mínima. «Baalá» facilita la lectura en español sin alterar la identidad del topónimo.
- source_word: הִיא קִרְיַת יְעָרִים
  english_pob_choice: that is, Kiriath-jearim
  chosen_spanish: es decir, Quiriat-jearim
  alternatives_spanish:
  - esto es, Quiriat-jearim
  - o sea, Quiriat-jearim
  lexicon: HALOT
  rationale: La identificación appositiva se expresa con «es decir», fórmula clara y sobria en español. «Quiriat-jearim» mantiene la transliteración del nombre tradicionalmente conocido en español bíblico, sin reemplazarlo por una traducción libre.
translation_notes:
  revision_awareness: 'Se revisó el punto de partida en inglés y se mantuvo la misma decisión interpretativa principal para וְתָאַר: un verbo de recorrido/dirección en contexto de frontera. La redacción española evita calcar el inglés cuando el hebreo permite una formulación más natural, pero conserva la misma tensión léxica documentada mediante nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando el texto no emplea el nombre divino explícitamente; este versículo no lo contiene.
  - 'Se usan transliteraciones estables para topónimos: Nephtoah, Efrón, Baalá, Quiriat-jearim.'
  - «Límite» se usa de manera consistente para el territorio delimitado por la frontera.
  - La nota sobre וְתָאַר se ancla solo en el primer punto relevante y no se duplica en la segunda ocurrencia, porque la misma idea rige ambas frases dentro del versículo.
