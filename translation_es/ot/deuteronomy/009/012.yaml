translation:
  language: es
  text: 'Y Yahvé me dijo: «Levántate, baja rápidamente de aquí, porque tu pueblo, que tú sacaste de Egipto, se ha corrompido. Se han apartado rápidamente del camino que les mandé; se han hecho para sí mismos una imagen de fundición[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'imagen fundida'. El hebreo se refiere a una imagen hecha por fundición de metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: terminología POB del nombre divino
  rationale: Se sigue el default del proyecto para el nombre divino, preservando la referencia explícita al nombre propio y evitando la ocultación tras un título.
- source_word: ק֣וּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: HALOT
  rationale: El imperativo transmite una orden abrupta y solemne. En español, 'Levántate' conserva el impulso verbal con naturalidad; 'ponte de pie' sería más descriptivo que exhortativo.
- source_word: רֵ֤ד
  english_pob_choice: go down
  chosen_spanish: baja
  alternatives_spanish:
  - desciende
  - ve abajo
  lexicon: HALOT
  rationale: El verbo expresa movimiento descendente literal desde el lugar actual de Moisés. 'Baja' es la forma más natural y directa en español.
- source_word: מַהֵר֙
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - enseguida
  lexicon: HALOT
  rationale: El adverbio de urgencia se repite en el verso; 'rápidamente' permite mantener esa repetición con registro claro y digno.
- source_word: מִ/זֶּ֔ה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: La deixis apunta al lugar presente de Moisés. 'De aquí' es breve, natural y fiel al referente espacial.
- source_word: שִׁחֵ֣ת
  english_pob_choice: have corrupted themselves
  chosen_spanish: se ha corrompido
  alternatives_spanish:
  - se han corrompido
  - han actuado corruptamente
  - se han pervertido
  lexicon: HALOT
  rationale: La hebreo presenta una corrupción moral/relacional intensa. En español, el singular colectivo 'tu pueblo' permite 'se ha corrompido'; la alternativa plural quedaría menos ajustada al sujeto gramatical español.
- source_word: עַמְּ/ךָ֔
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - el pueblo que es tuyo
  - tu gente
  lexicon: HALOT
  rationale: Es una equivalencia idiomática directa que conserva el matiz de posesión y la distancia retórica del discurso divino a Moisés.
- source_word: הוֹצֵ֖אתָ מִ/מִּצְרָ֑יִם
  english_pob_choice: whom you brought out from Egypt
  chosen_spanish: que tú sacaste de Egipto
  alternatives_spanish:
  - que tú sacaste de la tierra de Egipto
  - que tú trajiste de Egipto
  lexicon: HALOT
  rationale: El hifil de יצא funciona como 'sacar'. 'Sacaste de Egipto' reproduce bien el idiomático éxodo y el sentido causativo sin sobrecargar la frase.
- source_word: סָ֣רוּ מַהֵ֗ר
  english_pob_choice: They have quickly turned aside
  chosen_spanish: Se han apartado rápidamente
  alternatives_spanish:
  - Se han desviado rápidamente
  - Se han apartado de inmediato
  lexicon: HALOT
  rationale: '''סור מן'' expresa desviación de una norma o camino. ''Apartarse'' conserva la imagen sin sonar mecánica; ''rápidamente'' refleja el adverbio repetido.'
- source_word: מִן הַ/דֶּ֨רֶךְ֙
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la ruta
  lexicon: HALOT
  rationale: '''Camino'' preserva la metáfora bíblica habitual de conducta prescrita. En español resulta claro y teológicamente cargado sin explicitar más de lo que el texto da.'
- source_word: צִוִּיתִ֔/ם
  english_pob_choice: that I commanded them
  chosen_spanish: que les mandé
  alternatives_spanish:
  - que yo les ordené
  - que les di por mandato
  lexicon: HALOT
  rationale: '''Mandar'' es un equivalente natural de צוה y mantiene la autoridad del hablante divino. ''Les mandé'' evita un giro pesado y conserva la relación verbal directa.'
- source_word: מַסֵּכָֽה
  english_pob_choice: a cast image
  chosen_spanish: una imagen de fundición
  alternatives_spanish:
  - una imagen fundida
  - un ídolo de metal fundido
  - una imagen de metal fundido
  lexicon: HALOT
  rationale: La POB inglesa opta por la forma concreta del objeto idolátrico. En español, 'imagen de fundición' mantiene esa concreción y la referencia al proceso de vaciado/casting, sin reducirla a 'ídolo'.
theological_decisions:
- issue: Distanciamiento retórico en 'tu pueblo, que tú sacaste de Egipto'
  english_pob_reading: Preserved the wording as a divine rebuke to Moses without softening it.
  chosen_spanish_reading: Se conserva el reproche divino dirigido a Moisés, manteniendo 'tu pueblo' y 'que tú sacaste de Egipto'.
  alternative_spanish_readings:
  - tu pueblo que sacaste de Egipto
  - el pueblo que sacaste de Egipto
  rationale: El hebreo intensifica la amonestación al atribuir a Moisés una relación que ahora se pone en tensión. La traducción mantiene esa tensión sin neutralizarla mediante una reformulación conciliadora.
  doctrine_reference: Principio POB de preservar la tensión teológica y retórica del texto fuente
- issue: Descripción del becerro o imagen idolátrica con מַסֵּכָה
  english_pob_reading: cast image
  chosen_spanish_reading: imagen de fundición
  alternative_spanish_readings:
  - imagen fundida
  - ídolo de metal fundido
  - ídolo
  rationale: El término hebreo especifica la forma material del objeto, no solo su función idolátrica. 'Imagen de fundición' preserva el elemento concreto y evita generalizar prematuramente con 'ídolo'.
  doctrine_reference: Principio POB de mantener la precisión léxica y no diluir el referente material del pecado
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB en inglés, que prefirió 'have corrupted themselves' por encima de 'have acted corruptly' para reflejar con más precisión el verbo hebreo y su sentido reflexivo. El español adopta 'se ha corrompido' para el sujeto colectivo singular 'tu pueblo', manteniendo ese mismo énfasis sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene 'camino' para דֶּרֶךְ, como metáfora de conducta prescrita.
  - Se conserva la repetición de 'rápidamente' para reflejar מַהֵר en ambos lugares.
  - '''Mandé'' reproduce el tono de autoridad de צִוִּיתִם sin recurrir a formulaciones eclesiásticas menos directas.'
  - '''Imagen de fundición'' evita sustituir el objeto concreto por un término más genérico que borraría la precisión del hebreo.'
