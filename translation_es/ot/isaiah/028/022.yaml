revisions:
- from: Así que ahora[a], no se burlen, no sea que se fortalezcan sus ataduras[b]; porque he oído de parte del Señor Yahvé de los Ejércitos una destrucción completa y decretada contra toda la tierra.
  to: Así que ahora, no se burlen, no sea que se fortalezcan sus ataduras; porque he oído de parte del Señor Yahvé de los ejércitos[b] una destrucción completa y decretada contra toda la tierra[a].
  rationale: Se reubicaron las notas en las expresiones que realmente comentan. La nota sobre הָאָרֶץ ahora va con 'tierra' y ofrece la alternativa contextual 'país', que alinea mejor con la auditoría. La nota léxica sobre צְבָאוֹת ahora va junto al título divino y da la alternativa española natural 'de las huestes'. Se mantuvo 'el Señor Yahvé' para preservar אֲדֹנָי + יְהוִה conforme a la política del proyecto, y el resto del texto se conservó por ser fiel y claro.
