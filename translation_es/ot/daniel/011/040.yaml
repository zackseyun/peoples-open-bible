translation:
  language: es
  text: En el tiempo del fin, el rey del Sur chocará con él, y el rey del Norte se lanzará contra él con carros, jinetes y muchas naves[d][c][b]; entrará en las tierras y se desbordará[a] y pasará a través.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arrasará» o «inundará». El verbo hebreo sugiere desbordamiento u oleada abrumadora, usado aquí de manera figurada para el avance militar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como una tormenta» / «como un torbellino». El verbo sugiere un avance violento e impetuoso.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «países» para «tierras». El plural hebreo puede abarcar varios territorios o naciones.'
    reason: lexical_alternative
  - marker: d
    text: El pronombre «él» no se identifica de manera expresa en el hebreo; los intérpretes difieren sobre su referente exacto en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְעֵת קֵץ
  english_pob_choice: At the time of the end
  chosen_spanish: Al tiempo del fin
  alternatives_spanish:
  - En el tiempo del fin
  - Al tiempo del fin
  lexicon: HALOT
  rationale: La expresión temporal conserva el valor escatológico de עֵת + קֵץ. «Al tiempo del fin» suena natural en español y mantiene la referencia a un período final sin precisar más de lo que el hebreo dice.
- source_word: יִתְנַגַּח
  english_pob_choice: will clash with
  chosen_spanish: chocará con
  alternatives_spanish:
  - embestirá contra
  - se enfrentará con
  - chocará con
  lexicon: HALOT
  rationale: El verbo hebreo evoca el embestir/dar cornadas y aquí funciona figuradamente como choque hostil. «Chocará con» conserva la imagen de colisión y la oposición recíproca sin volverlo demasiado interpretativo.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - contra él
  lexicon: HALOT
  rationale: Se mantiene la referencia pronominal indefinida del hebreo. En español, tras «chocará», «con él» comunica la oposición sin resolver el antecedente del pronombre.
- source_word: מֶלֶךְ הַנֶּגֶב
  english_pob_choice: the king of the South
  chosen_spanish: el rey del Sur
  alternatives_spanish:
  - el rey del Neguev
  - el rey meridional
  lexicon: HALOT
  rationale: Es un título geopolítico establecido en Daniel 11. «Del Sur» es más claro y fiel al uso funcional del título que transliterar Neguev.
- source_word: וְיִשְׂתָּעֵר עָלָיו
  english_pob_choice: will storm against him
  chosen_spanish: se lanzará contra él
  alternatives_spanish:
  - se abatirá sobre él
  - arremeterá contra él
  - se lanzará contra él
  lexicon: HALOT
  rationale: El verbo expresa irrupción violenta o embate impetuoso. «Se lanzará contra él» comunica bien el ímpetu bélico en español moderno y conserva la fuerza del movimiento.
- source_word: מֶלֶךְ הַצָּפוֹן
  english_pob_choice: the king of the North
  chosen_spanish: el rey del Norte
  alternatives_spanish:
  - el rey septentrional
  lexicon: HALOT
  rationale: Se conserva la designación geopolítica recurrente de Daniel 11 con terminología consistente y clara en español.
- source_word: בְּרֶכֶב
  english_pob_choice: with chariots
  chosen_spanish: con carros
  alternatives_spanish:
  - con carros de guerra
  - con carros de combate
  lexicon: HALOT
  rationale: «Carros» reproduce de forma directa el vehículo militar del hebreo. En español bíblico y moderno es suficiente y no añade especificaciones no presentes en el texto.
- source_word: וּבְפָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres a caballo
  lexicon: HALOT
  rationale: פָרָשִׁים son montados/jinetes. «Jinetes» es natural en español y mantiene el inventario militar sin generalizar demasiado como «caballería».
- source_word: וּבָאֳנִיּוֹת רַבּוֹת
  english_pob_choice: and many ships
  chosen_spanish: y muchas naves
  alternatives_spanish:
  - y muchos barcos
  - y muchas naves
  lexicon: HALOT
  rationale: «Naves» es un equivalente digno y amplio para embarcaciones de guerra, acorde con el tono del pasaje. «Muchas» preserva רַבּוֹת sin sobreinterpretar el tipo exacto de embarcación.
- source_word: וּבָא בָאֲרָצוֹת
  english_pob_choice: he will enter the lands
  chosen_spanish: entrará en las tierras
  alternatives_spanish:
  - entrará en los países
  - entrará en las tierras
  lexicon: HALOT
  rationale: El plural אֲרָצוֹת puede referirse a tierras o territorios. «Tierras» mantiene la amplitud semántica y evita cerrar el alcance a una sola entidad política.
- source_word: וְשָׁטַף
  english_pob_choice: and overflow
  chosen_spanish: las inundará
  alternatives_spanish:
  - las arrasará
  - las desbordará
  - las inundará
  lexicon: HALOT
  rationale: El hebreo usa la imagen de desbordamiento/inundación para el avance militar. «Las inundará» conserva esa metáfora con fuerza, sin abandonar la imagen original.
- source_word: וְעָבָר
  english_pob_choice: and pass through / pass on
  chosen_spanish: y pasará adelante
  alternatives_spanish:
  - y pasará
  - y pasará through
  lexicon: HALOT
  rationale: Tras la imagen de inundación, «pasará adelante» expresa la continuación del avance y evita una repetición demasiado mecánica. La idea de מעבר se conserva como paso/avance sucesivo.
theological_decisions:
- issue: Referente del pronombre en «él»
  english_pob_reading: Retain the pronoun as 'him' without identifying the figure
  chosen_spanish_reading: Mantener «él» sin identificar explícitamente al referente
  alternative_spanish_readings:
  - el rey del Sur
  - el rey del Norte
  - el personaje del contexto anterior
  rationale: El hebreo deja el antecedente implícito y el contexto interpretativo sigue discutido. Se conserva la ambigüedad para no imponer una lectura escatológica concreta donde el texto no la explicita.
  doctrine_reference: Preservar la tensión interpretativa en lugar de resolverla artificialmente.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del expediente inglés, que prefirió una mayor precisión léxica en la cláusula final («overflow and pass through») y mantuvo la ambigüedad del pronombre. Por eso se eligió una traducción que conserve la metáfora de inundación y el avance continuo, sin resolver el referente pronominal.
  spanish_consistency_notes:
  - Se mantiene «rey del Sur» / «rey del Norte» de forma consistente como títulos geopolíticos.
  - Se prefirió «tierras» para reproducir la amplitud de אֲרָצוֹת, con nota alternativa «países».
  - 'La secuencia verbal final conserva la progresión del hebreo: entrar → inundar → pasar.'
  - Se evitó sustituir la imaginería militar por un lenguaje más interpretativo que atenuara la fuerza del texto.
