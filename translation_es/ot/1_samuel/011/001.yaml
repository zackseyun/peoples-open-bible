review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa y las decisiones léxicas principales del hebreo: «subió» para וַיַּעַל, «acampó» para וַיִּחַן, «todos los hombres» para כָּל אַנְשֵׁי, y «te serviremos» para וְנַעַבְדֶךָּ. Sin embargo, omite la nota de alternativa léxica que el POB inglés conservó para la expresión idiomática כְּרָת ... בְרִית, y conviene ajustar «frente a» a una formulación más directamente hostil para reflejar mejor עַל en contexto militar.'
  spanish_quality_summary: El español es claro y natural, con registro digno y legible. «Nahás», «Jabés de Galaad» y «todos los hombres de Jabés» funcionan bien. La frase «acampó frente a» es comprensible, pero «acampó contra» o «acampó frente a ... para atacarla» expresaría mejor la orientación militar; la opción más concisa y fiel es «acampó contra». Además, falta la nota que preserve el literal hebreo «cortar un pacto».
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. «Pacto» preserva bien ברית mejor que «alianza» en este contexto; «te serviremos» respeta la fuerza de עבד. No aparecen Yahvé, Mesías/Cristo ni otros términos de política terminológica global.
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre la expresión idiomática «cortar un pacto»
    rationale: El POB inglés conservó explícitamente la alternativa literal para כְּרָת ... בְרִית. El español debería preservar esa misma evidencia con una nota anclada en el texto.
  - severity: low
    issue: «Acampó frente a» atenúa ligeramente la fuerza hostil de עַל en contexto militar
    rationale: Aunque es defendible, «encamped against» en el POB inglés y el hebreo militar con עַל se reflejan mejor en español con «acampó contra», que sigue siendo natural y no sobreinterpreta como «asedió».
  revised_spanish_text: 'Entonces Nahás el amonita subió y acampó contra Jabés de Galaad. Y todos los hombres de Jabés dijeron a Nahás: «Haz un pacto[a] con nosotros, y te serviremos».'
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «corta un pacto con nosotros».
    reason: lexical_alternative
  revision_rationale: Se añade la nota requerida para preservar la literalidad documentada de כְּרָת ... בְרִית y se ajusta «frente a» a «contra» para reflejar con más precisión la postura hostil del campamento en contexto militar, sin volver la frase menos natural en español.
