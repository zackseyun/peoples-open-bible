translation:
  language: es
  text: La justicia del íntegro endereza su camino[a], pero el malvado cae por su maldad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dirige su camino» o «allana su senda». El verbo hebreo conserva la imagen de hacer recto el camino.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en su maldad». La expresión puede señalar la esfera de su conducta o el medio por el que llega a su ruina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקַת
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: HALOT
  rationale: En este contexto sapiencial, צִדְקַת expresa la cualidad moral de estar en lo correcto. 'Justicia' conserva el campo semántico de conducta recta y es idiomática en español bíblico, sin perder el peso ético del término.
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - irreprensible
  - recto
  - sin culpa
  lexicon: HALOT
  rationale: El hebreo describe integridad moral o entereza, no perfección absoluta. 'Íntegro' comunica bien esa totalidad ética en español moderno y evita la rigidez de una traducción demasiado judicial.
- source_word: תְּיַשֵּׁר
  english_pob_choice: makes straight
  chosen_spanish: endereza
  alternatives_spanish:
  - dirige
  - allana
  - hace recto
  lexicon: HALOT
  rationale: El verbo pi‘el de ישר conserva la imagen de poner recto o enderezar un camino. 'Endereza' retiene la metáfora sin sonar forzado y refleja la idea de hacer el camino moralmente recto.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  - su vía
  lexicon: HALOT
  rationale: '''Camino'' es el equivalente natural en español para la metáfora sapiencial de modo de vida. Además mantiene la correspondencia con la imagen de rectitud del verbo anterior.'
- source_word: וּבְרִשְׁעָתוֹ
  english_pob_choice: by his wickedness
  chosen_spanish: por su maldad
  alternatives_spanish:
  - en su maldad
  - mediante su maldad
  lexicon: HALOT
  rationale: 'El ב puede ser instrumental o locativo. ''Por su maldad'' preserva la causalidad: la propia maldad del malvado es el medio o causa de su caída, sin forzar una sola lectura exclusiva.'
- source_word: יִפֹּל
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - caerá
  - se derrumba
  - tropieza
  lexicon: HALOT
  rationale: En proverbios, el imperfecto expresa verdad general. 'Cae' transmite la fuerza gnómica de manera natural en español y mantiene la imagen de ruina moral.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el malo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado designa al tipo de persona injusta. 'Malvado' funciona bien en español neutral y conserva el contraste moral con 'íntegro'.
theological_decisions:
- issue: Lectura causal de 'por su maldad' frente a lectura locativa 'en su maldad'
  english_pob_reading: The wicked falls by his wickedness.
  chosen_spanish_reading: el malvado cae por su maldad
  alternative_spanish_readings:
  - el malvado cae en su maldad
  - el malvado cae mediante su maldad
  rationale: Se preserva la relación de causa/instrumento que el audit trail inglés considera probable y que el hebreo permite por el ב. La formulación española mantiene la tensión sin cerrarla solo a una lectura espacial.
  doctrine_reference: Principio de transparencia textual y preservación de ambigüedad legítima en el texto fuente
translation_notes:
  revision_awareness: 'El texto inglés revisado reordenó la segunda cláusula para reflejar más naturalmente el hebreo/greco sin cambiar el sentido: ''the wicked falls by his wickedness''. La versión española sigue esa misma orientación causal con ''cae por su maldad''.'
  spanish_consistency_notes:
  - Se mantiene 'justicia' para צִדְקַת y 'íntegro' para תָּמִים, en coherencia con el campo moral sapiencial.
  - '''Camino'' conserva la metáfora sapiencial estándar y se alinea con la decisión inglesa de ''way''.'
  - Se evita 'SEÑOR' u otra sustitución no pertinente, porque el versículo no contiene el Nombre divino.
  - La caída del malvado se expresa en presente gnómico, como verdad general proverbial.
