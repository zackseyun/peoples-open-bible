translation:
  language: es
  text: No se apagará ni será quebrado[a] hasta que establezca justicia en la tierra, y las costas lejanas esperarán su instrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘será aplastado’. El verbo hebreo comunica la idea de ser quebrantado o aplastado.
    reason: lexical_alternative
  - marker: b
    text: O ‘pondrán su esperanza en su instrucción’. El verbo hebreo incluye la idea de espera expectante.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכְהֶה
  english_pob_choice: grow dim
  chosen_spanish: se debilitará
  alternatives_spanish:
  - se apagará
  - se pondrá débil
  lexicon: HALOT
  rationale: El POB inglés conserva la idea de menguar o apagarse; en español, 'se debilitará' comunica de forma natural esa pérdida de vigor sin romper el vínculo con la imagen previa del canto del Siervo. 'Se apagará' sería posible, pero suena más específico al fuego y menos flexible aquí.
- source_word: וְלֹא יָרוּץ
  english_pob_choice: be crushed
  chosen_spanish: será quebrado
  alternatives_spanish:
  - será aplastado
  - será triturado
  lexicon: HALOT
  rationale: Aunque el verbo hebreo connota 'aplastar/crush', el español 'será quebrado' transmite bien la pasividad de sufrir daño o ruptura y es idiomático en un contexto poético. Mantiene la tensión metafórica sin endurecer innecesariamente la imagen.
- source_word: עַד יָשִׂים
  english_pob_choice: until he establishes
  chosen_spanish: hasta que establezca
  alternatives_spanish:
  - hasta que ponga
  - hasta que asiente
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'ponga/coloque', pero con מִשְׁפָּט el sentido es establecerlo. 'Hasta que establezca' reproduce ese valor resultativo de modo claro en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en el mundo
  lexicon: HALOT
  rationale: '''Tierra'' en español conserva la amplitud de אֶרֶץ y permite la resonancia universal que el contexto sugiere. ''Mundo'' explicitaría la universalidad, pero iría más allá del término hebreo.'
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  lexicon: HALOT
  rationale: '''Justicia'' es la correspondencia más directa y natural aquí, y preserva el sentido de orden justo más que un acto judicial aislado. Se mantiene la fuerza ética y pública del término.'
- source_word: לְתוֹרָתוֹ
  english_pob_choice: his instruction
  chosen_spanish: su instrucción
  alternatives_spanish:
  - su enseñanza
  - su ley
  lexicon: HALOT
  rationale: El POB inglés eligió 'instruction' para no reducir תּוֹרָה a 'ley' en sentido legalista. 'Instrucción' conserva ese alcance y suena más cercano al español bíblico contemporáneo que 'ley' en este contexto.
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las costas lejanas
  - las islas
  lexicon: HALOT
  rationale: El término profético apunta a tierras marítimas o lejanas. 'Las costas' comunica bien esa extensión geográfica en español y evita restringirlo a 'islas', que sería demasiado estrecho.
- source_word: יְיַחֵילוּ
  english_pob_choice: will wait for
  chosen_spanish: esperarán
  alternatives_spanish:
  - esperarán con esperanza
  - aguardarán
  lexicon: HALOT
  rationale: El hebreo puede incluir espera expectante; el inglés POB preserva 'will wait for' y su nota alternativa 'hope for'. En español, 'esperarán' es natural y permite que la expectativa implícita quede en el contexto. 'Aguardarán' es posible, pero menos usual.
theological_decisions:
- issue: Alcance universal del juicio/justicia del Siervo
  english_pob_reading: universal scope implied by 'earth' and 'coastlands'
  chosen_spanish_reading: alcance universal sugerido por 'la tierra' y 'las costas'
  alternative_spanish_readings:
  - ámbito principalmente nacional con extensión secundaria
  - referencia solo a Israel
  rationale: La combinación de 'la tierra' y 'las costas' en el verso empuja la escena más allá de un marco local. La traducción conserva ese horizonte universal sin resolverlo artificialmente en una formulación doctrinal posterior.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Relación entre 'justicia' y 'instrucción'
  english_pob_reading: justice ... and the coastlands will wait for his instruction
  chosen_spanish_reading: justicia ... y las costas esperarán su instrucción
  alternative_spanish_readings:
  - justicia ... y las costas esperarán su ley
  - justicia ... y las costas esperarán su enseñanza
  rationale: '''Instrucción'' mantiene la amplitud de תּוֹרָה y evita que el texto se reduzca a un código legal. Al mismo tiempo, no elimina la autoridad normativa que el término tiene en el marco del pacto.'
  doctrine_reference: Lexical/theological consistency with Torah language
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje hebreo de Isaías 42:4 y el audit trail inglés: conserva el par verbal de debilitamiento/ruptura, el valor resultativo de ‘establecer justicia’, la amplitud de אֶרֶץ, el sentido de תּוֹרָה como ‘instrucción’ y la espera expectante de אִיִּים. No se detectaron revisiones adicionales en el historial reciente; se mantiene la lectura de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'tierra' para אֶרֶץ y 'costas' para אִיִּים, manteniendo la amplitud geográfica del texto.
  - '''Instrucción'' refleja el valor de תּוֹרָה según el POB inglés y evita un estrechamiento a ''ley''.'
  - La nota de pie sobre 'esperarán' preserva la alternativa semántica de espera con esperanza sin alterar el cuerpo del verso.
  - '''Justicia'' se mantiene como traducción de מִשְׁפָּט por su fuerza ética y pública en Isaías.'
