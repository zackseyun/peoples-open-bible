translation:
  language: es
  text: Hicieron entre ellos las palabras de sus señales[a][b], y prodigios en la tierra de Cam[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los asuntos de sus señales’; literalmente, ‘las palabras de sus señales’.
    reason: lexical_alternative
  - marker: b
    text: O ‘las palabras de sus señales’.
    reason: previous_rendering
  - marker: c
    text: ‘La tierra de Cam’ es un nombre poético de Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: שָׂמוּ
  english_pob_choice: performed
  chosen_spanish: hicieron
  alternatives_spanish:
  - realizaron
  - efectuaron
  - pusieron
  lexicon: HALOT
  rationale: El hebreo שׂוּם literalmente es 'poner/colocar', pero en este contexto con señales y prodigios expresa la ejecución o realización de esos actos. 'Hicieron' conserva esa fuerza de acción cumplida en español sin sonar artificial.
- source_word: בָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural se refiere a los egipcios; el sentido contextual es que las señales ocurrieron en medio de ellos. 'Entre ellos' comunica mejor esa ubicación que un 'en ellos' más interno o ambiguo.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los asuntos de
  - los hechos de
  lexicon: HALOT
  rationale: La forma en constructo de דָּבָר es literalmente 'palabras de'. Aunque puede tener un matiz idiomático de 'asuntos' o 'cosas', 'las palabras de' mantiene la transparencia al hebreo y preserva la tensión lexical documentada por el POB inglés.
- source_word: אֹתוֹתָיו
  english_pob_choice: his signs
  chosen_spanish: sus señales
  alternatives_spanish:
  - sus signos
  - sus portentos
  lexicon: HALOT
  rationale: אֹתוֹת suele significar 'señales' o 'signos'. 'Señales' es claro en español bíblico moderno y encaja con el contexto del éxodo y con el paralelismo con 'prodigios'.
- source_word: וּמֹפְתִים
  english_pob_choice: and wonders
  chosen_spanish: y prodigios
  alternatives_spanish:
  - y maravillas
  - y portentos
  lexicon: HALOT
  rationale: מוֹפְתִים forma el binomio tradicional 'señales y prodigios'. 'Prodigios' conserva el valor de hechos asombrosos y evita reducirlo solo a 'milagros', manteniendo una resonancia bíblica amplia.
- source_word: בְּאֶרֶץ חָם
  english_pob_choice: in the land of Ham
  chosen_spanish: en la tierra de Cam
  alternatives_spanish:
  - en la tierra de Ham
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva el nombre poético 'Cam' para reflejar el hebreo חָם. El POB inglés mantuvo la designación poética; en español, 'tierra de Cam' es comprensible y mantiene la referencia cultural sin sustituirla por 'Egipto' en el texto principal.
theological_decisions:
- issue: Cómo rendir דִּבְרֵי אֹתוֹתָיו sin borrar la rareza hebrea
  english_pob_reading: Retain 'the words of his signs' in the main text, with a note allowing 'the matters of his signs'.
  chosen_spanish_reading: Mantener 'las palabras de sus señales' en el texto principal, con nota de alternativa semántica.
  alternative_spanish_readings:
  - los asuntos de sus señales
  - los hechos de sus señales
  - los prodigios de sus señales
  rationale: El hebreo une 'palabras' y 'señales' de manera poco común. Traducirlo como 'las palabras de sus señales' preserva la correspondencia formal y evita borrar la tensión lexical documentada por el POB inglés. La nota ofrece una lectura idiomática alternativa sin imponerla como sustitución.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El POB inglés pasó por revisiones que intentaron suavizar la literalidad de דִּבְרֵי (por ejemplo, 'events of his signs'), pero la forma final volvió a 'the words of his signs'. Este borrador español sigue esa decisión final, manteniendo una traducción formal y transparente, con nota para la alternativa idiomática.
  spanish_consistency_notes:
  - Se mantiene 'señales' para אֹתוֹת y 'prodigios' para מֹפְתִים, evitando mezclar 'milagros' salvo en nota.
  - Se conserva 'Cam' en el texto principal por coherencia con la designación poética del hebreo y del POB inglés.
  - La sintaxis española busca ser legible sin sustituir la estructura source-grounded del paralelismo hebreo.
