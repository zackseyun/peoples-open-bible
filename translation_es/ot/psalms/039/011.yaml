translation:
  language: es
  text: Quita de mí tu plaga[a]; por el golpe de tu mano yo me consumo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sobre mí».
    reason: previous_rendering
  - marker: b
    text: O «tu golpe» o «tu aflicción» para «tu plaga».
    reason: lexical_alternative
  - marker: c
    text: O «del hostigamiento/ataque de tu mano»; o «me agoto» o «estoy agotado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵר
  english_pob_choice: Remove
  chosen_spanish: Quita
  alternatives_spanish:
  - Retira
  - Aparta
  - Quita de mí
  lexicon: HALOT
  rationale: El hiphil imperativo de סור/סיר expresa una petición directa para que algo sea retirado. «Quita» es natural en español y conserva la fuerza imperativa sin volver la frase rígida.
- source_word: מֵעָלַי
  english_pob_choice: from me
  chosen_spanish: de sobre mí
  alternatives_spanish:
  - de mí
  - de encima de mí
  lexicon: HALOT
  rationale: La expresión combina «de/desde» con la idea de estar «sobre» la persona. «De sobre mí» mantiene mejor la imagen espacial que un simple «de mí», aunque sigue siendo comprensible en español.
- source_word: נִגְעֶךָ
  english_pob_choice: your plague
  chosen_spanish: tu plaga
  alternatives_spanish:
  - tu golpe
  - tu aflicción
  lexicon: HALOT
  rationale: נגע puede abarcar plaga, golpe o aflicción. En este lamento, el texto presenta un mal o aflicción enviada por Dios sin precisar su forma. «Plaga» conserva esa fuerza y la amplitud semántica documentada en el POB inglés.
- source_word: מִתִּגְרַת
  english_pob_choice: by the blow of
  chosen_spanish: por el golpe de
  alternatives_spanish:
  - por el ataque de
  - por la hostilidad de
  - por el embate de
  lexicon: HALOT
  rationale: תִּגְרָה denota contienda, hostilidad o arremetida. El POB inglés revisado optó por «blow» para una formulación más directa; en español, «golpe» comunica bien esa presión o impacto de la mano divina sin añadir más de lo que el hebreo dice.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  lexicon: HALOT
  rationale: Debe conservarse la imagen antropomórfica de la mano como acción o poder de Dios. «Mano» es la traducción directa y mantiene la concreción del hebreo.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis en hebreo. «Yo» lo preserva con naturalidad en español.
- source_word: כָלִיתִי
  english_pob_choice: am consumed
  chosen_spanish: me consumo
  alternatives_spanish:
  - me agoto
  - me extingo
  - estoy consumido
  lexicon: HALOT
  rationale: כלה puede expresar consumirse, acabarse o desfallecer. «Me consumo» conserva la idea de desgaste y agotamiento bajo la acción divina, sin decidir en exceso entre fin literal, desgaste o consumo.
theological_decisions:
- issue: Naturaleza de la aflicción en נִגְעֶךָ
  english_pob_reading: Rendered as a direct divine affliction ('your plague') without specifying disease or judgment beyond the text.
  chosen_spanish_reading: Se traduce como una aflicción divina directa («tu plaga») sin especificar si se trata de enfermedad, castigo u otra forma de sufrimiento.
  alternative_spanish_readings:
  - tu golpe
  - tu aflicción
  rationale: El hebreo presenta el sufrimiento como proveniente de Dios, pero no determina su forma exacta. La versión española conserva esa tensión teológica y evita introducir una precisión doctrinal que el texto no ofrece.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que cambió «assault» por «blow» para hacer más directa la frase de תִּגְרַת. La redacción española sigue esa decisión con «golpe», manteniendo además la posibilidad de lectura alternativa donde el POB la documenta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando corresponda; en este verso no aparece el Tetragrámaton explícito.
  - «Plaga» se usa en sentido léxico amplio, no necesariamente de enfermedad específica.
  - «Mano» conserva la metáfora corporal divina sin sustituirla por «poder».
  - La forma verbal «me consumo» intenta preservar el matiz de desgaste continuo compatible con כָלִיתִי.
