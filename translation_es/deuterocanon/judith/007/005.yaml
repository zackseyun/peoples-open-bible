translation:
  language: es
  text: Y cada uno tomó sus armas de guerra, y después de encender hogueras en sus torres, se quedaron en guardia toda aquella noche.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναλαβόντες
  english_pob_choice: took up
  chosen_spanish: tomó
  alternatives_spanish:
  - recogió
  - tomó en sus manos
  - alzó
  lexicon: BDAG
  rationale: El participio indica una acción preparatoria de asumir o tomar el armamento para la defensa. En español, «tomó» es natural y suficientemente concreto; «tomó en sus manos» sería más explícito pero innecesariamente pesado.
- source_word: ἕκαστος
  english_pob_choice: each of them
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ellos
  - cada hombre
  lexicon: LSJ
  rationale: El distributivo es explícito. «Cada uno» reproduce bien el sentido sin añadir «hombres», que no está en el griego.
- source_word: τὰ σκεύη τὰ πολεμικὰ
  english_pob_choice: weapons of war
  chosen_spanish: armas de guerra
  alternatives_spanish:
  - armamento de guerra
  - equipo militar
  - armas
  lexicon: LSJ
  rationale: Aunque σκεύη puede significar equipo o pertrechos, el modificador πολεμικά fija un campo militar. «Armas de guerra» conserva la fuerza bélica de la expresión y suena natural en español.
- source_word: ἀνακαύσαντες πυρὰς
  english_pob_choice: after kindling fires
  chosen_spanish: después de encender fuegos
  alternatives_spanish:
  - después de prender fuegos
  - habiendo encendido fuegos
  lexicon: LSJ
  rationale: El participio aoristo indica anterioridad respecto del verbo principal. «Después de encender fuegos» preserva esa secuencia y mantiene la imagen concreta sin sonar artificial.
- source_word: ἐπὶ τοὺς πύργους αὐτῶν
  english_pob_choice: on their towers
  chosen_spanish: sobre sus torres
  alternatives_spanish:
  - en sus torres
  - encima de sus torres
  lexicon: LSJ
  rationale: La preposición con acusativo indica ubicación sobre/upon. «Sobre sus torres» es claro y fiel al marco defensivo.
- source_word: ἔμενον φυλάσσοντες
  english_pob_choice: they remained on guard
  chosen_spanish: permanecieron en guardia
  alternatives_spanish:
  - se mantuvieron vigilando
  - siguieron velando
  - permanecieron vigilando
  lexicon: BDAG
  rationale: La construcción expresa continuidad de la vigilancia. «Permanecieron en guardia» conserva el valor durativo y militar sin añadir un sujeto o matiz que el griego no exige.
- source_word: ὅλην τὴν νύκτα ἐκείνην
  english_pob_choice: through that whole night
  chosen_spanish: toda aquella noche
  alternatives_spanish:
  - toda la noche
  - durante toda aquella noche
  - esa noche entera
  lexicon: LSJ
  rationale: La frase subraya la duración completa de una noche específica. «Toda aquella noche» transmite la totalidad temporal y el deíctico demostrativo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan acuerdo alto y no requieren revisión textual; la decisión principal fue trasladar con naturalidad los matices de preparación militar, anterioridad participial y duración total de la vigilancia al español.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, adecuado para prosa bíblica en español contemporáneo.
  - Se evitó «SEÑOR» u otras fórmulas teológicas no presentes en el versículo.
  - Se prefirió «armas de guerra» para conservar el matiz militar de τὰ σκεύη τὰ πολεμικά sin volverlo técnico o demasiado abstracto.
