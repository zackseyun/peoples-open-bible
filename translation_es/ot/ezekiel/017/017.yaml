translation:
  language: es
  text: Faraón no le ayudará en la guerra con un gran ejército y una gran compañía[a], cuando levanten un terraplén de asedio y construyan una muralla de asedio para quitar muchas vidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un gran contingente». El hebreo קָהָל significa literalmente un grupo reunido o asamblea; en este contexto militar se refiere a un gran cuerpo reunido que acompaña al ejército.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְחַיִל גָּדוֹל
  english_pob_choice: with a great army
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con gran fuerza
  - con una gran hueste
  lexicon: HALOT
  rationale: En contexto militar, חַיִל se refiere naturalmente a fuerza armada, tropas o ejército. 'Ejército' comunica con claridad el valor militar sin perder la intensidad del adjetivo 'grande'.
- source_word: וּבְקָהָל רָב
  english_pob_choice: and a large company
  chosen_spanish: y una gran multitud
  alternatives_spanish:
  - y una gran compañía
  - y una gran asamblea
  - y mucha gente
  lexicon: HALOT
  rationale: קָהָל conserva la idea de un grupo reunido; en este contexto bélico, 'multitud' funciona de manera natural en español y evita el matiz eclesial de 'asamblea' o el anglicismo de 'compañía'.
- source_word: יַעֲשֶׂה אֹתוֹ
  english_pob_choice: will not help him
  chosen_spanish: no le ayudará
  alternatives_spanish:
  - no actuará por él
  - no lo apoyará
  - no obrará por él
  lexicon: HALOT
  rationale: El hebreo usa עשה con objeto pronominal de forma idiomática para expresar acción eficaz en favor de alguien. 'Ayudará' sigue la revisión inglesa y suena natural en español, manteniendo la idea de actuar a favor de él.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the war
  chosen_spanish: en la guerra
  alternatives_spanish:
  - en la batalla
  - en la guerra de campaña
  lexicon: HALOT
  rationale: La forma singular con artículo admite 'guerra' en español y conserva el marco bélico amplio del texto.
- source_word: בִּשְׁפֹּךְ סֹלְלָה
  english_pob_choice: when they cast up a siege ramp
  chosen_spanish: cuando levanten un terraplén de asedio
  alternatives_spanish:
  - cuando arrojen un terraplén de asedio
  - cuando alcen un terraplén de asedio
  - cuando construyan una rampa de asedio
  lexicon: HALOT
  rationale: שׁפך + סֹלְלָה describe el levantamiento de una obra de tierra por acumulación. 'Levantar un terraplén de asedio' transmite la imagen sin endurecerla con un calco de 'verter'.
- source_word: וּבִבְנוֹת דָּיֵק
  english_pob_choice: and build a siege wall
  chosen_spanish: y construyan una muralla de asedio
  alternatives_spanish:
  - y construyan un muro de asedio
  - y levanten una obra de asedio
  - y construyan una torre de asedio
  lexicon: HALOT
  rationale: דָּיֵק designa una estructura de sitio; 'muralla de asedio' conserva el carácter fortificado y mantiene la paralela con el terraplén de asedio. 'Torre de asedio' es posible, pero menos seguro aquí.
- source_word: לְהַכְרִית נְפָשׁוֹת רַבּוֹת
  english_pob_choice: to cut off many lives
  chosen_spanish: para cortar muchas vidas
  alternatives_spanish:
  - para quitar muchas vidas
  - para exterminar a muchas personas
  - para segar muchas vidas
  lexicon: HALOT
  rationale: הכרית tiene el sentido fuerte de 'cortar, cortar de raíz, exterminar'. 'Cortar muchas vidas' preserva la dureza idiomática del hebreo y sigue de cerca la elección inglesa, sin suavizarla con una paráfrasis más explícita.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir un equivalente español natural para יַעֲשֶׂה אֹתוֹ ('no le ayudará') y al reflejar el ajuste de קָהָל רָב hacia una designación más compatible con el contexto militar. También conserva el par de términos de sitio como imágenes concretas de ingeniería militar, en línea con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce חַיִל con 'ejército' y קָהָל con 'multitud' para diferenciar fuerza militar y grupo reunido.
  - Se conserva la fuerza idiomática de הכרית con 'cortar' en vez de suavizarla a 'matar'.
  - '''Terraplén de asedio'' y ''muralla de asedio'' ofrecen un español claro para las obras de sitio sin introducir términos eclesiásticos o anacrónicos.'
