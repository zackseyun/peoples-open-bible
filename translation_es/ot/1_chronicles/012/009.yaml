revisions:
- from: Algunos de los gaditas se separaron para ir a David, al refugio en el desierto[a]; hombres valientes, hombres entrenados para la guerra, capaces de manejar escudo y lanza[b], cuyos rostros eran como rostros de león, y que eran veloces como gacelas sobre los montes[c].
  to: Algunos de los gaditas se apartaron hacia David, a la fortaleza en el desierto[a]; hombres poderosos y valientes, hombres entrenados para la guerra, capaces de manejar escudo y lanza[b], cuyos rostros eran como rostros de león, y que eran veloces como gacelas sobre los montes[c].
  rationale: Se ajusta «para ir a David» a «hacia David» para evitar añadir finalidad no explícita; «refugio» se cambia a «fortaleza» para preservar mejor el valor militar de מְצַד; y «hombres valientes» se refuerza a «hombres poderosos y valientes» para reflejar con mayor fidelidad גִּבֹּרֵי הַחַיִל sin perder naturalidad en español.
