  lexicon: HALOT
  rationale: En una lista genealógica, בְנֵי se conserva de forma natural como «hijos de». En español, «hijos de» es más idiomático que «los hijos varones de» y más preciso que «descendientes de» para reproducir la forma breve del hebreo.
