source:
  edition: SBLGNT
  text: Περὶ ἧς σωτηρίας ἐξεζήτησαν καὶ ἐξηραύνησαν προφῆται οἱ περὶ τῆς εἰς ὑμᾶς χάριτος προφητεύσαντες,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/010.yaml
  text: 'Concerning this salvation, the prophets who prophesied about the grace for you searched and investigated carefully,'
translation:
  language: ko
  text: '이 구원에 관하여는, 여러분에게 임할 은혜를 두고 예언했던 예언자들이 깊이 찾고 자세히 살폈습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξεζήτησαν
  english_pob_choice: searched
  chosen_korean: 깊이 찾고
  alternatives_korean:
  - 두루 찾았으며
  - 탐구하였으며
  lexicon: BDAG
  rationale: ἐκ- 접두사의 강조 어감을 「깊이」로 살린다.
- source_word: ἐξηραύνησαν
  english_pob_choice: investigated carefully
  chosen_korean: 자세히 살폈습니다
  alternatives_korean:
  - 면밀히 조사하였습니다
  - 정밀히 탐구하였습니다
  lexicon: BDAG
  rationale: ἐραυνάω는 면밀한 조사를 뜻하며, 「자세히 살피다」로 옮긴다.
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_korean: 예언자들
  alternatives_korean:
  - 선지자들
  lexicon: BDAG
  rationale: 현대 표준어로 「예언자」를 채택. 한국 성서 전통의 「선지자」는 한자어로 의미가 좁아질 수 있다.
- source_word: τῆς εἰς ὑμᾶς χάριτος
  english_pob_choice: the grace for you
  chosen_korean: 여러분에게 임할 은혜
  alternatives_korean:
  - 너희를 향한 은혜
  - 너희에게 주실 은혜
  lexicon: BDAG
  rationale: εἰς + 대격의 도착·수혜 의미를 「임할」로 살린다.
