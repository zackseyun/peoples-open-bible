translation:
  language: es
  text: La vid se ha secado, y la higuera se ha marchitado; el granado, también la palmera y el manzano[a]—todos los árboles del campo se han secado. En verdad, la alegría se ha secado entre los hijos de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'el albaricoquero'; la especie exacta denotada por el hebreo tappuach es incierta.
    reason: lexical_alternative
  - marker: b
    text: 'O ''de la humanidad'' / ''entre la humanidad''. Hebreo: ''entre los hijos de los hombres''.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַגֶּפֶן
  english_pob_choice: the vine
  chosen_spanish: la vid
  alternatives_spanish:
  - la parra
  - la viña
  lexicon: HALOT
  rationale: בַּטֶּקְסְטוֹ agrícola se refiere a la planta de la vid; 'vid' es el equivalente natural y preciso en español bíblico moderno.
- source_word: הוֹבִישָׁה
  english_pob_choice: has dried up
  chosen_spanish: se ha secado
  alternatives_spanish:
  - se ha marchitado
  - se ha agostado
  lexicon: HALOT
  rationale: En contexto botánico expresa la pérdida de humedad y vitalidad; 'se ha secado' conserva el campo semántico de drying y mantiene la cohesión con יָבֵשׁוּ más adelante.
- source_word: הַתְּאֵנָה
  english_pob_choice: the fig tree
  chosen_spanish: la higuera
  alternatives_spanish:
  - la higuera de higos
  - la higuera
  lexicon: HALOT
  rationale: En español, 'higuera' es la manera idiomática de nombrar el árbol frutal; evita la forma menos natural 'árbol de higos'.
- source_word: אֻמְלָלָה
  english_pob_choice: has withered
  chosen_spanish: se ha marchitado
  alternatives_spanish:
  - se ha debilitado
  - se ha ajado
  lexicon: HALOT
  rationale: Transmite la idea de debilitamiento y desecación secundaria, distinguiéndola de 'se ha secado' y preservando el paralelismo poético.
- source_word: רִמּוֹן
  english_pob_choice: the pomegranate
  chosen_spanish: la granada
  alternatives_spanish:
  - el granado
  - la granada
  lexicon: HALOT
  rationale: La lista combina árboles frutales; 'granada' funciona naturalmente en español como el fruto/metonimia del árbol, igual que en el inglés auditado.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: Marca continuidad aditiva en la enumeración; 'también' es la opción más directa y natural.
- source_word: תָּמָר
  english_pob_choice: the palm
  chosen_spanish: la palmera
  alternatives_spanish:
  - la palmera datilera
  - la palma
  lexicon: HALOT
  rationale: '''Palmera'' es el término común y comprensible en español; ''palma'' puede sonar más genérico o ambigua en ciertos contextos.'
- source_word: תַפּוּחַ
  english_pob_choice: the apple tree
  chosen_spanish: el manzano
  alternatives_spanish:
  - el árbol de manzanas
  - el albaricoquero
  lexicon: HALOT
  rationale: Para un árbol frutal concreto, 'manzano' conserva la estructura arbórea mejor que 'manzana' sola y sigue la lectura tradicional, aunque la especie precisa sea incierta.
- source_word: כָּל עֲצֵי הַשָּׂדֶה
  english_pob_choice: all the trees of the field
  chosen_spanish: todos los árboles del campo
  alternatives_spanish:
  - todos los árboles del campo
  - todos los árboles del terreno
  lexicon: HALOT
  rationale: '''Del campo'' reproduce bien la imagen hebrea de vegetación agrícola/campestre y es idiomático en español.'
- source_word: יָבֵשׁוּ
  english_pob_choice: have dried up
  chosen_spanish: se han secado
  alternatives_spanish:
  - se han marchitado
  - se han agostado
  lexicon: HALOT
  rationale: Repite el mismo verbo base en español que al inicio para conservar el efecto de inclusión y deterioro total.
- source_word: כִּי
  english_pob_choice: Indeed
  chosen_spanish: En verdad
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introducción enfática de la explicación final; 'En verdad' conserva el matiz retórico sin volverlo causal de manera demasiado técnica.
- source_word: הֹבִישׁ
  english_pob_choice: has dried up
  chosen_spanish: se ha secado
  alternatives_spanish:
  - ha desaparecido
  - se ha marchitado
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo que al principio para reproducir la metáfora verbal de la alegría 'secada'.
- source_word: שָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: la alegría
  alternatives_spanish:
  - el gozo
  - la regocijación
  lexicon: HALOT
  rationale: '''Alegría'' es claro, digno y plenamente natural; ''gozo'' también sería posible, pero ''alegría'' se ajusta bien al lamento.'
- source_word: מִן בְּנֵי אָדָם
  english_pob_choice: from the sons of man
  chosen_spanish: de entre los hijos de los hombres
  alternatives_spanish:
  - de la humanidad
  - entre la humanidad
  lexicon: HALOT
  rationale: Conserva la forma hebrea masculina representativa documentada por la POB inglesa, evitando neutralizar el giro sin base textual; 'de entre' refleja היטב la salida/retirada de la alegría del ámbito humano.
theological_decisions:
- issue: Expresión masculina genérica בְּנֵי אָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: La lectura inglesa preserva la forma masculina representativa del hebreo en el texto principal y solo sugiere una alternativa inclusiva en nota. En español se conserva esa forma para no borrar la huella idiomática del original.
  doctrine_reference: 'DOCTRINE.md: género-accurate over gender-neutral; אָדָם / בְּנֵי אָדָם como expresión humana convencional'
- issue: Metáfora de sequedad aplicada a la alegría
  english_pob_reading: joy has dried up
  chosen_spanish_reading: la alegría se ha secado
  alternative_spanish_readings:
  - la alegría se ha apagado
  - la alegría ha desaparecido
  rationale: Mantener 'se ha secado' preserva la continuidad poética con los árboles secos y la tensión metafórica del hebreo; no se suaviza a un simple 'desapareció'.
  doctrine_reference: Poética semítica y correspondencia léxica conservadora
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente indicado en el paquete fuente: no hubo cambios adicionales tras la última pasada; el consenso de auditoría fue alto con solo observaciones menores. La redacción española respeta ese estado sin introducir novedades textuales.'
  spanish_consistency_notes:
  - Se conservó la repetición de 'se ha secado' para la vid y la alegría, como en la cadena de imágenes del hebreo y la decisión inglesa.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas no presentes en el versículo.
  - '''Higuera'' y ''manzano'' se eligieron por naturalidad en español, manteniendo la incertidumbre botánica documentada en nota.'
  - La puntuación con raya se usa para reflejar el cambio de lista a conclusión enfática.
