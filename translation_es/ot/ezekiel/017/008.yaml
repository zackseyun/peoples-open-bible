  to: Fue plantada en un buen campo, junto a aguas abundantes[a], para producir ramas y dar fruto, para llegar a ser una vid majestuosa[b].
  rationale: Se ajusta el texto principal a la decisión léxica auditada del POB inglés ('aguas abundantes') y se conserva 'muchas aguas' como alternativa en nota. También se reubican y normalizan las notas para que el español sea más natural. Se añade la alternativa documentada para אַדָּרֶת en la posición correcta, ya que en el inglés la nota b corresponde a 'splendid vine', no a 'bear fruit'.
