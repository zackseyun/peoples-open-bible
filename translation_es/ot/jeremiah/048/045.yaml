base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/045.yaml
  text: In the shadow of Heshbon the fugitives stand without strength[a], for a fire has gone out from Heshbon, and a flame from the midst of Sihon[d][c][b]; it has consumed the corner of Moab and the crown of the head of the sons of tumult.
  footnotes:
  - marker: a
    text: Or 'stood, lacking strength'; the Hebrew perfect may be rendered as a past tense, and the phrase מִכֹּחַ can mean 'for lack of strength.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from between Sihon.' 'Sihon' may stand metonymically for the city or realm associated with him.
    reason: lexical_alternative
  - marker: c
    text: Or 'the edge of Moab.' The Hebrew 'corner' is a poetic image for an extremity or border.
    reason: lexical_alternative
  - marker: d
    text: Or 'the crown of the head of the noisy ones' / 'the sons of uproar.'
    reason: lexical_alternative
