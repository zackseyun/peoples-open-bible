translation:
  language: es
  text: Pero si no, den quinientos talentos de plata en lugar de ellos, y otros quinientos talentos por la destrucción que ustedes han causado y por los impuestos[a] de las ciudades. Pero si no, vendrán y harán guerra contra ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La sintaxis griega es comprimida; esta traducción toma los últimos quinientos talentos como una suma adicional que cubre tanto la destrucción causada como los impuestos de las ciudades. O: «el tributo de las ciudades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ μή
  english_pob_choice: But if not
  chosen_spanish: Pero si no
  alternatives_spanish:
  - Si no
  - De lo contrario
  lexicon: LSJ
  rationale: Conserva la estructura condicional y la fuerza de ultimátum del griego, con un español natural y sobrio.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - paguen
  - entreguen
  lexicon: LSJ
  rationale: El imperativo de dar/entregar es el más cercano al griego; en un contexto monetario, 'den' mantiene la forma directa sin introducir una paráfrasis excesiva.
- source_word: ἀντʼ αὐτῶν
  english_pob_choice: in place of them
  chosen_spanish: en lugar de ellos
  alternatives_spanish:
  - en vez de ellos
  - como compensación por ellos
  lexicon: LSJ
  rationale: '''En lugar de ellos'' reproduce la idea de sustitución o intercambio sin añadir explícitamente ''compensación'', que sería una interpretación más fuerte.'
- source_word: πεντακόσια τάλαντα ἀργυρίου
  english_pob_choice: five hundred talents of silver
  chosen_spanish: quinientos talentos de plata
  alternatives_spanish:
  - quinientos talentos de dinero
  - quinientos talentos de argén
  lexicon: LSJ
  rationale: '''Talentos de plata'' es la manera natural y fiel de expresar la unidad monetaria antigua. Se conserva el valor histórico sin modernizar la medida.'
- source_word: τῆς καταφθορᾶς
  english_pob_choice: the destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - el daño
  - la devastación
  lexicon: LSJ
  rationale: '''Destrucción'' corresponde bien al sustantivo griego y preserva la gravedad del reclamo.'
- source_word: ἧς κατεφθάρατε
  english_pob_choice: that you have caused
  chosen_spanish: que ustedes han causado
  alternatives_spanish:
  - que ustedes han hecho
  - que ustedes han provocado
  lexicon: LSJ
  rationale: La construcción refleja la responsabilidad por el daño de manera idiomática en español y mantiene el vínculo verbal con 'destrucción'.
- source_word: τῶν φόρων τῶν πόλεων
  english_pob_choice: the taxes of the cities
  chosen_spanish: los impuestos de las ciudades
  alternatives_spanish:
  - el tributo de las ciudades
  - las cargas de las ciudades
  lexicon: LSJ
  rationale: '''Impuestos'' comunica con claridad el sentido financiero de φόροι; se preserva la alternativa ''tributo'' como posibilidad léxica histórica.'
- source_word: ἀλλὰ τάλαντα πεντακόσια
  english_pob_choice: another five hundred talents
  chosen_spanish: otros quinientos talentos
  alternatives_spanish:
  - además quinientos talentos
  - quinientos talentos más
  lexicon: LSJ
  rationale: En esta cláusula aditiva y comprimida, 'otros quinientos talentos' expresa de forma natural que se suma una segunda cantidad.
- source_word: παραγενόμενοι
  english_pob_choice: they will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  - se presentarán
  lexicon: LSJ
  rationale: El participio con valor prospectivo se vierte de forma idiomática con un futuro simple en español.
- source_word: ἐκπολεμήσουσιν ὑμᾶς
  english_pob_choice: make war against you
  chosen_spanish: harán guerra contra ustedes
  alternatives_spanish:
  - pelearán contra ustedes
  - les harán guerra
  lexicon: LSJ
  rationale: '''Harán guerra contra ustedes'' conserva la fuerza militar formal del verbo compuesto y suena natural en español bíblico contemporáneo.'
theological_decisions:
- issue: Tratamiento de φόροι ως impuestos o tributo
  english_pob_reading: the taxes of the cities
  chosen_spanish_reading: los impuestos de las ciudades
  alternative_spanish_readings:
  - el tributo de las ciudades
  rationale: 'No hay una carga doctrinal explícita aquí, pero sí una decisión semántica importante: ''impuestos'' hace claro el carácter fiscal de la exigencia, mientras ''tributo'' conserva una resonancia política antigua. Se prefirió la claridad sin perder la posibilidad histórica.'
  doctrine_reference: n/a
- issue: Intensidad de la amenaza militar
  english_pob_reading: they will come and make war against you
  chosen_spanish_reading: vendrán y harán guerra contra ustedes
  alternative_spanish_readings:
  - vendrán a guerrear contra ustedes
  - vendrán y pelearán contra ustedes
  rationale: Se mantiene la amenaza formal y explícita del texto griego sin suavizarla. 'Hacer guerra' preserva el registro bélico y la gravedad del ultimátum.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente: separa con claridad la primera suma de quinientos talentos de la segunda suma adicional, y conserva la repetición del ultimátum ''Pero si no'' para reflejar la estructura enfática del griego.'
  spanish_consistency_notes:
  - Se mantuvo 'talentos de plata' para la unidad monetaria antigua, en coherencia con el uso de POB y con el griego ἀργυρίου.
  - Se prefirió 'impuestos' como lectura principal de φόροι, dejando 'tributo' como alternativa contextual.
  - Se conservó la duplicación de la cláusula condicional para reflejar el tono de amenaza reiterada del original.
