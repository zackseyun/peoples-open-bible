translation:
  language: es
  text: Y entre los sacerdotes se hallaron algunos que tenían mujeres extranjeras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «los reunidos, teniendo mujeres extranjeras». El texto transmitido es algo abrupto; el paralelo hebreo confirma el sentido de quienes habían tomado mujeres extranjeras.
    reason: textual_variant
lexical_decisions:
- source_word: εὑρέθησαν
  english_pob_choice: there were found
  chosen_spanish: se hallaron
  alternatives_spanish:
  - fueron hallados
  - se encontraron
  lexicon: LSJ
  rationale: El pasivo aoristo expresa un hallazgo o constatación; «se hallaron» reproduce bien la voz pasiva impersonal en español y sugiere el carácter de registro oficial del contexto.
- source_word: τῶν ἱερέων
  english_pob_choice: among the priests
  chosen_spanish: entre los sacerdotes
  alternatives_spanish:
  - de los sacerdotes
  - en medio de los sacerdotes
  lexicon: LSJ
  rationale: 'El genitivo es partitivo: los hallados pertenecían al grupo sacerdotal. «Entre los sacerdotes» comunica claramente esa relación en español natural.'
- source_word: οἱ ἐπισυναχθέντες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - los reunidos
  - los congregados
  lexicon: LSJ
  rationale: El griego transmitido es sintácticamente difícil y el audit trail inglés opta por no forzar «the gathered ones». En español, «algunos» conserva el referente de subgrupo sin imponer una lectura incierta del participio.
- source_word: ἀλλογενεῖς γυναῖκας
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres de otro pueblo
  - mujeres de otra nación
  - mujeres extrañas
  lexicon: LSJ
  rationale: ἀλλογενής significa de otro pueblo o raza; «mujeres extranjeras» es idiomático, preciso y evita el arcaísmo de «extrañas».
- source_word: ἔχοντες
  english_pob_choice: had taken / had foreign women
  chosen_spanish: tenían
  alternatives_spanish:
  - habían tomado
  - habían contraído matrimonio con
  lexicon: LSJ
  rationale: La revisión inglesa reciente se acercó a «had foreign women» para reflejar más literalmente ἔχοντες ('having'). En español, «tenían» mantiene ese valor sin añadir la inferencia matrimonial que el griego visible no explicita, aunque el paralelo hebreo confirma ese trasfondo.
theological_decisions:
- issue: Relación entre el griego transmitido y el paralelo hebreo respecto del sentido marital
  english_pob_reading: Render the offense as priests who had foreign women
  chosen_spanish_reading: sacerdotes que tenían mujeres extranjeras
  alternative_spanish_readings:
  - sacerdotes que habían tomado mujeres extranjeras
  - sacerdotes que habían contraído matrimonio con mujeres extranjeras
  - sacerdotes que tenían mujeres de otro pueblo
  rationale: El griego de la línea principal dice literalmente que los sacerdotes 'tenían' mujeres extranjeras, mientras que el paralelo hebreo aclara el sentido de haberlas tomado en matrimonio. La traducción española conserva el verbo más cercano al griego («tenían») y deja visible la tensión textual sin borrar el trasfondo marital confirmado por el paralelo.
  doctrine_reference: 'PHILOSOPHY.md: Greek primary, Hebrew parallel as sanity check; preserve source tension when present'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la frase desde «had taken foreign women» a «had foreign women» para acercarse más a ἔχοντες. La versión española sigue esa revisión y evita introducir de manera explícita la noción de «tomar» o «casarse» en el cuerpo principal, aunque la nota reconoce el apoyo del paralelo hebreo.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «extrañas» porque en español podría sugerir una valoración de rareza y no la idea étnica de ἀλλογενεῖς.
  - «Sacerdotes» se mantuvo de forma literal y estable, sin recurrir a equivalentes litúrgicos más amplios.
