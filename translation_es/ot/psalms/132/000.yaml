  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת זְכוֹר יְהוָ֥ה לְ/דָוִ֑ד אֵ֝ת כָּל עֻנּוֹתֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/132/000.yaml
  text: A Song of Ascents[a]. Remember, Yahweh[b], for David all his affliction.
  footnotes:
  - marker: a
    text: Or “for David”; the Hebrew preposition may be rendered more literally, but here it likely means “on David’s behalf” or “in regard to David.”
    reason: lexical_alternative
  - marker: b
    text: Or “all his hardships” or “all his humiliation.” The Hebrew term can cover suffering, hardship, or being brought low.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:44Z'
    unchanged: false
    changes_summary: Added the omitted content after the superscription and rendered יְהוָה as 'Yahweh.'
translation:
  language: es
  text: Cántico de las subidas[a]. Recuerda, Yahvé, por David, toda su aflicción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Cántico de ascensos”. El hebreo es un título litúrgico tradicional y admite más de una forma natural en español.
    reason: lexical_alternative
  - marker: b
    text: O “todo su sufrimiento” o “toda su humillación”. El hebreo puede abarcar aflicción, sufrimiento o ser abatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascenso
  alternatives_spanish:
  - Canción de ascenso
  - Cántico de las subidas
  lexicon: שִׁיר = “cántico/canción”; הַמַּעֲלוֹת = “ascensos/subidas”
  rationale: Mantiene el valor de título litúrgico sin forzar una paráfrasis. “Ascenso” conserva la imagen de subida y suena más natural en español bíblico que una traducción demasiado literal o explicativa.
- source_word: זְכוֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: זכר = recordar, traer a la memoria, tener presente
  rationale: “Recuerda” preserva el imperativo dirigido a Dios y es claro en español. “Acuérdate” también sería posible, pero “recuerda” evita un tono demasiado coloquial y mantiene la fuerza directa del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: יהוה = nombre propio divino
  rationale: Se sigue el estándar del proyecto para el nombre divino, conservando el referente explícito del hebreo y evitando la sustitución por “Señor”.
- source_word: לְדָוִד
  english_pob_choice: for David
  chosen_spanish: para David
  alternatives_spanish:
  - en favor de David
  - con respecto a David
  lexicon: לְ + nombre propio = relación beneficiaria, referencia o dativo de interés
  rationale: La preposición puede expresar relación amplia; se adopta “para David” porque refleja la revisión inglesa más reciente y deja abierta la lectura de beneficio o referencia sin sobreespecificarla.
- source_word: כָּל עֻנּוֹתֹו
  english_pob_choice: all his affliction
  chosen_spanish: todo su sufrimiento
  alternatives_spanish:
  - toda su aflicción
  - toda su humillación
  - todas sus aflicciones
  lexicon: עֻנָּה / עֹנִי = aflicción, sufrimiento, humillación, abatimiento
  rationale: “Sufrimiento” comunica bien la carga del término en español contemporáneo. Se mantiene el singular “todo su sufrimiento”, en línea con la revisión inglesa que conservó el singular formal de la idea colectiva.
theological_decisions:
- issue: Nombre divino en una súplica poética
  english_pob_reading: Remember, Yahweh, for David all his affliction.
  chosen_spanish_reading: Recuerda, Yahvé, para David todo su sufrimiento.
  alternative_spanish_readings:
  - Recuerda, Yahvé, en favor de David toda su aflicción.
  - Recuerda, Yahvé, respecto de David toda su humillación.
  rationale: No se suaviza el vocativo ni se reemplaza el nombre divino por una forma de ocultamiento. La petición se mantiene como súplica directa a Yahvé, con un dativo relacional que conserva la ambigüedad útil del hebreo.
  doctrine_reference: Salmo 132:1; uso reverente del nombre divino en el texto bíblico
- issue: Alcance de עֻנּוֹתֹו
  english_pob_reading: all his affliction
  chosen_spanish_reading: todo su sufrimiento
  alternative_spanish_readings:
  - toda su aflicción
  - toda su humillación
  rationale: El término hebreo puede abarcar dolor, opresión o abatimiento. “Sufrimiento” es suficientemente amplio en español y evita estrechar indebidamente el sentido. Se preserva la posibilidad de las otras lecturas en nota.
  doctrine_reference: Lamentaciones/poesía sapiencial sobre la aflicción humana; Salmo 132 como memoria de la aflicción de David
translation_notes:
  revision_awareness: 'La fuente inglesa revisada añadió explícitamente el contenido después del encabezamiento y fijó la relación לְדָוִד como “for David”, además de mantener el singular formal en “affliction”. La versión española sigue esa revisión reciente: no deja el verso reducido al título, usa el nombre divino “Yahvé” y conserva la ambigüedad semántica de עֻנּוֹתֹו en una nota.'
  spanish_consistency_notes:
  - Se conserva “Yahvé” conforme al estándar del proyecto.
  - Se usa “Cántico de ascenso” para mantener un título breve y legible; la nota preserva la alternativa tradicional del plural.
  - No se introduce “Cristo”, “Señor” ni fórmulas eclesiásticas que no estén en el hebreo.
  - El tono es poético pero claro, sin añadir información no presente en el texto fuente.
