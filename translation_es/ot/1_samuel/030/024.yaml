translation:
  language: es
  text: ¿Y quién les hará caso en este asunto? Porque, así como es la parte del que baja a la batalla[a], así es la parte del que se queda junto al equipaje[b]; juntos repartirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desciende a la batalla». «Baja a la batalla» conserva el giro hebreo de descender al combate.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pertrechos» o «equipo». El hebreo puede referirse ampliamente al bagaje o los artículos guardados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִי
  english_pob_choice: And who
  chosen_spanish: ¿Y quién
  alternatives_spanish:
  - ¿Pero quién
  - ¿Quién
  lexicon: HALOT
  rationale: La conjunción más el interrogativo introducen una pregunta retórica de respuesta implícita negativa. '¿Y quién?' conserva la ligazón del hebreo y suena natural en español; '¿Pero quién?' también sería posible por el matiz de refutación.
- source_word: יִשְׁמַע לָכֶם
  english_pob_choice: will listen to you
  chosen_spanish: les escuchará
  alternatives_spanish:
  - les hará caso
  - les obedecerá
  - les atenderá
  lexicon: HALOT
  rationale: שׁמע con ל puede ser 'escuchar', 'hacer caso' u 'obedecer' según contexto. Aquí David rechaza la propuesta de reparto desigual; 'les escuchará' mantiene el valor amplio de oír y dar crédito, sin endurecerlo innecesariamente a 'obedecer'.
- source_word: לַדָּבָר הַזֶּה
  english_pob_choice: in this matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - sobre esta propuesta
  - en esta cosa
  lexicon: HALOT
  rationale: דבר aquí no es simplemente 'palabra', sino el tema o propuesta en discusión. 'Asunto' comunica bien esa referencia sin sobreparáfrasis.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la respuesta retórica. 'Porque' expresa bien la función explicativa en español actual.
- source_word: כְּחֵלֶק
  english_pob_choice: as is the share
  chosen_spanish: así como es la parte
  alternatives_spanish:
  - como es la porción
  - tal como es la parte
  lexicon: HALOT
  rationale: חלק designa una porción/parte asignada, especialmente de botín. 'Parte' es claro y fiel; 'porción' también es viable, pero 'parte' se integra mejor con el paralelismo de la frase.
- source_word: הַיֹּרֵד בַּמִּלְחָמָה
  english_pob_choice: the one who goes down into the battle
  chosen_spanish: del que baja a la batalla
  alternatives_spanish:
  - del que desciende a la batalla
  - del que entra en la batalla
  lexicon: HALOT
  rationale: El participio sustantivado conserva el movimiento idiomático 'bajar' hacia el lugar del combate. 'Baja a la batalla' reproduce mejor el hebreo que una versión general como 'va a la guerra'.
- source_word: וּכְחֵלֶק הַיֹּשֵׁב עַל הַכֵּלִים
  english_pob_choice: so is the share of the one who stays by the supplies
  chosen_spanish: así será la parte del que se queda junto a los suministros
  alternatives_spanish:
  - así será la parte del que permanece junto al equipaje
  - así será la parte del que se queda con los pertrechos
  - así será la parte del que se queda junto a los utensilios
  lexicon: HALOT
  rationale: יֹשֵׁב expresa quedarse/permanecer; aquí es permanecer atrás con lo que no se lleva al combate. כֵּלִים puede abarcar artículos, equipo o bagaje; 'suministros' hace inteligible el sentido práctico en este contexto, mientras que 'equipaje' o 'pertrechos' quedan como alternativas más literales.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - igualmente
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio señala participación común o igual. 'Juntos' conserva esa idea de manera clara y natural.
- source_word: יַחֲלֹקוּ
  english_pob_choice: they shall divide
  chosen_spanish: repartirán
  alternatives_spanish:
  - dividirán
  - se distribuirán
  lexicon: HALOT
  rationale: El verbo significa dividir/apartar en partes. 'Repartirán' comunica bien la acción concreta de distribuir el botín y suena más natural en español que un calco rígido.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético de 1 Samuel 30:24 y el audit trail inglés POB. Mantiene la pregunta retórica, el paralelismo de 'parte/parte', el verbo idiomático 'bajar' y la ambigüedad léxica de כֵּלִים con una solución contextual. No se requieren revisiones respecto al pasaje base, y la formulación final busca ser publicable en español sin perder las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como terminología de proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evita reemplazar por vocabulario eclesiástico tradicional donde el hebreo es más concreto ('parte', 'repartirán', 'suministros').
  - La elección 'les escuchará' mantiene la amplitud semántica de שׁמע sin forzar 'obedecer', siguiendo el contexto retórico.
  - '''Suministros'' funciona como equivalencia contextual de כֵּלִים en este caso, sin borrar que el término puede abarcar equipo o bagaje.'
