translation:
  language: es
  text: Josías también quitó todas las casas de los lugares altos que estaban en las ciudades de Samaria[a], que los reyes de Israel habían hecho para provocar ira, e hizo con ellas lo mismo que había hecho en Betel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente según el contexto más amplio: «para provocar a Yahvé a ira».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - y también
  lexicon: HALOT
  rationale: La partícula agrega esta acción a la narración anterior; «también» conserva el valor aditivo con naturalidad en español.
- source_word: בָּתֵּי הַבָּמוֹת
  english_pob_choice: the houses of the high places
  chosen_spanish: las casas de los lugares altos
  alternatives_spanish:
  - los santuarios de los lugares altos
  - las casas de los sitios altos
  lexicon: HALOT
  rationale: «Casas» mantiene la concreción del hebreo; «lugares altos» preserva el término técnico de cultos ilícitos sin sustituirlo por una explicación más interpretativa.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  english_pob_choice: in the cities of Samaria
  chosen_spanish: en las ciudades de Samaria
  alternatives_spanish:
  - en las ciudades samaritanas
  - en Samaria
  lexicon: HALOT
  rationale: La construcción se vierte de forma directa; «Samaria» aquí funciona como región/territorio, no solo como ciudad.
- source_word: לְהַכְעִיס
  english_pob_choice: to provoke to anger
  chosen_spanish: para provocar a ira
  alternatives_spanish:
  - para provocar
  - para provocar a enojo
  lexicon: HALOT
  rationale: Conserva el valor causativo y el sustantivo «ira» es una forma sobria y bíblica en español. No se explicita el objeto en el texto principal porque el hebreo no lo expresa en esta cláusula.
- source_word: הֵסִיר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - eliminó
  lexicon: HALOT
  rationale: En un contexto de reforma religiosa, «quitó» es natural y concreto en español, y transmite bien la acción de retirar algo establecido.
- source_word: וַיַּעַשׂ לָהֶם
  english_pob_choice: he did to them
  chosen_spanish: hizo con ellas
  alternatives_spanish:
  - las trató
  - procedió con ellas
  lexicon: HALOT
  rationale: La frase hebrea es idiomática; en español, «hizo con ellas» conserva la relación verbal con la comparación siguiente sin precisar indebidamente el tipo exacto de acción.
- source_word: כְּכָל הַמַּעֲשִׂים
  english_pob_choice: according to all the deeds
  chosen_spanish: conforme a todas las acciones
  alternatives_spanish:
  - según todos los actos
  - de acuerdo con todas las obras
  lexicon: HALOT
  rationale: «Acciones» o «actos» reproduce el plural del hebreo y mantiene el paralelismo con la referencia retrospectiva al obrar de Josías. «Conforme a» expresa el valor comparativo de כְּ.
- source_word: בְּבֵית אֵל
  english_pob_choice: at Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Bet-el
  - en Betel
  lexicon: HALOT
  rationale: Se usa la forma española usual del topónimo bíblico, «Betel», para mayor naturalidad y reconocimiento lector.
theological_decisions:
- issue: Objeto implícito de la provocación en לְהַכְעִיס
  english_pob_reading: 'Leave the object unstated in the main text: ''to provoke to anger.'''
  chosen_spanish_reading: 'Dejar el objeto implícito en el texto principal: «para provocar a ira».'
  alternative_spanish_readings:
  - para provocar a ira de Yahvé
  - para provocar a Yahvé a ira
  rationale: El contexto mayor muestra que la provocación es contra Yahvé, pero la cláusula hebrea no lo dice explícitamente. El texto principal mantiene esa implicación sin añadir una palabra no presente; la posible aclaración se deja para nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado auditado más reciente del inglés POB (última pasada: sin cambios; acuerdo alto). No se detectaron revisiones aplicadas que obliguen a desviar la traducción española del trazado auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo en la nota, porque el hebreo de esta cláusula expresa el objeto de la ira de manera implícita, siguiendo la decisión auditada en inglés.
  - Se evitó «SEÑOR» como convención de máscara en el texto principal, conforme a la terminología del proyecto.
  - «Betel» se conservó como topónimo bíblico establecido en español, coherente con el uso estándar y con la auditable referencia al lugar.
  - La estructura verbal «quitó... e hizo con ellas» intenta preservar el vínculo retórico del hebreo entre la remoción y el tratamiento que siguió.
