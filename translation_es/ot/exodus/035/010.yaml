revisions:
- from: Y todo sabio[a] de corazón entre ustedes vendrá y hará todo lo que Yahvé ha mandado.
  to: Y toda persona hábil[a] entre ustedes vendrá y hará todo lo que Yahvé ha mandado.[b]
  rationale: Se reemplaza la calca poco idiomática «sabio de corazón» en el texto principal por «persona hábil», que comunica mejor el sentido contextual de destreza artesanal, mientras la literalidad idiomática se preserva en nota. También se añade una nota para la alternativa distributiva documentada en la POB inglesa. Se mantiene «Yahvé» conforme al glosario del proyecto.
