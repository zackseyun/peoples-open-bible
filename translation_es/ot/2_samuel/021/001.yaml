revisions:
- from: 'Ahora bien, hubo una hambruna en los días de David por tres años[a], año tras año. Y David buscó el rostro de Yahvé, y Yahvé dijo: “Es por causa de Saúl y de su casa de sangre[b], porque dio muerte a los gabaonitas.”'
  to: 'Ahora bien, hubo una hambruna en los días de David por tres años, año tras año. Y David buscó el rostro[a] de Yahvé, y Yahvé dijo: «Es por causa de Saúl y de su casa culpable de sangre[b], porque dio muerte a los gabaonitas»'
  rationale: Se reubica la nota [a] al sintagma que realmente explica. Se ajusta 'casa de sangre' a 'casa culpable de sangre' para reflejar mejor el sentido judicial del hebreo y la decisión léxica documentada en el audit trail, manteniendo una nota que preserva el literal 'casa de sangres'.
