translation:
  language: es
  text: 'Estos fueron los años de la vida de Ismael: ciento treinta y siete años. Y expiró[a] y murió, y fue reunido con su pueblo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dio su último aliento'. El hebreo aquí usa un verbo distinto del siguiente 'murió', por lo que se conservan ambos matices en la traducción.
    reason: lexical_alternative
  - marker: b
    text: «Fue reunido con su pueblo» es un modismo hebreo usado en notices de muerte; puede referirse a la reunión con sus antepasados, al entierro entre los suyos, o a ambas cosas.
    reason: cultural_note
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estas fueron
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: En el encabezado narrativo, el hebreo introduce un resumen retrospectivo. En español, el pretérito 'fueron' comunica con naturalidad el cierre biográfico, sin perder el valor de introducción resumida.
- source_word: שְׁנֵי חַיֵּי
  english_pob_choice: the years of ... life
  chosen_spanish: las vidas de
  alternatives_spanish:
  - los años de la vida de
  - los años de la vida
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática en notices de muerte. 'Las vidas de' conserva la estructura semítica más de cerca que una paráfrasis demasiado explicativa; en español suena breve y comprensible en un encabezado de duración vital. Se evita 'años de la vida de' por ser más explicativo de lo necesario para esta cláusula inicial.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ismael
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio bíblico estándar en español.
- source_word: מְאַת שָׁנָה וּשְׁלֹשִׁים שָׁנָה וְשֶׁבַע שָׁנִים
  english_pob_choice: one hundred and thirty-seven years
  chosen_spanish: ciento treinta y siete años
  alternatives_spanish:
  - ciento treinta y siete años
  lexicon: HALOT
  rationale: Se condensa la secuencia numérica hebrea a su total exacto, manteniendo el valor cronológico completo sin oscurecer la lectura natural en español.
- source_word: וַיִּגְוַע
  english_pob_choice: he breathed his last
  chosen_spanish: expiró
  alternatives_spanish:
  - dio su último aliento
  - exhaló su último aliento
  lexicon: HALOT
  rationale: Se conserva la distinción léxica entre גוע y el verbo siguiente 'murió'. 'Expiró' es un equivalente digno y breve que mantiene una diferencia real con 'murió' mejor que fusionarlos en una sola fórmula.
- source_word: וַיָּמָת
  english_pob_choice: and died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: Se mantiene el segundo verbo de muerte de manera separada, como en el hebreo. 'Murió' es la correspondencia directa y más neutra.
- source_word: וַיֵּאָסֶף אֶל־עַמָּיו
  english_pob_choice: and was gathered to his people
  chosen_spanish: y fue reunido con su pueblo
  alternatives_spanish:
  - y fue reunido a su pueblo
  - y fue recogido con su pueblo
  lexicon: HALOT
  rationale: Se preserva el modismo funerario sin resolverlo. 'Fue reunido con su pueblo' mantiene el sentido idiomático y evita sustituirlo por una explicación interpretativa.
theological_decisions:
- issue: Sentido del modismo funerario 'fue reunido con su pueblo'
  english_pob_reading: Retain the idiomatic wording without resolving whether it refers strictly to burial with ancestors, to reunion with one's forebears after death, or to both.
  chosen_spanish_reading: Mantener el modismo 'fue reunido con su pueblo' sin decidir si alude solo al entierro con los antepasados, a una reunión con los suyos después de la muerte, o a ambas cosas.
  alternative_spanish_readings:
  - fue enterrado con sus antepasados
  - se unió a su pueblo
  rationale: El hebreo no obliga a especificar el alcance del giro. Conservar la fórmula permite dejar abierta la tensión interpretativa y teológica que el propio texto bíblico deja en pie.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditor inglés: se mantiene la secuencia con ''Y'' antes de los dos verbos finales para reflejar con mayor transparencia la cadena hebrea de waw-consecutivos, y se conserva la distinción entre el primer verbo de muerte y el segundo. Se adapta al español con una formulación breve y publicable sin perder la diferencia léxica observada en el texto fuente.'
  spanish_consistency_notes:
  - Se usa 'Ismael' como forma bíblica estándar en español.
  - Se evita 'SEÑOR' o formulaciones equivalentes porque el pasaje no contiene el nombre divino.
  - '''Pueblo'' traduce el modismo sin precisar ''familia'' o ''antepasados'', para no resolver la ambigüedad del hebreo.'
  - 'La nota al pie marca solo la alternativa léxica realmente relevante en este versículo: ''expiró'' versus ''murió''.'
