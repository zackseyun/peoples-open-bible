revisions:
- from: Yahvé juzgue entre tú y yo, y Yahvé me[a] vengue de ti[b]; pero mi mano no estará sobre ti.
  to: Yahvé juzgue entre mí y ti, y Yahvé me vengue[a] contra ti; pero mi mano no será contra ti[b].
  rationale: 'La revisión conserva el sentido fuente y la lógica teológica del versículo, pero mejora tres puntos: restituye el orden más fiel «entre mí y ti», aclara el complemento de «vengar» en español natural, y reemplaza una frase torpe («no estará sobre ti») por una formulación más clara («no será contra ti») apoyada por nota idiomática. También corrige la correspondencia entre marcadores y notas.'
