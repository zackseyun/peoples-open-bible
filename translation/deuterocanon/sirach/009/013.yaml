translation:
  text: Keep far away from a man who has authority to kill, and you will not have to fear death.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew witness for this verse reads a different saying: ''Do not abandon an old friend, for a new one will not compare with him.'' The Greek tradition instead reads the warning reflected in the main text.'
    reason: alternative_reading
lexical_decisions:
- source_word: μακρὰν ἄπεχε
  chosen: Keep far away
  alternatives:
  - Stay far from
  - Hold yourself far away from
  lexicon: LSJ
  rationale: The Greek parallel gives an imperative of deliberate distancing. 'Keep far away' is idiomatic modern English and preserves the force of the command. The Hebrew in Zone 1 is a major mismatch to the Greek here, so the Greek is used as actual translation input and likely primary for this verse's wording.
- source_word: ἀπὸ ἀνθρώπου
  chosen: from a man
  alternatives:
  - from a person
  - from someone
  lexicon: LSJ
  rationale: The Greek singular ἀνθρώπου is naturally rendered 'a man.' Per project philosophy, gender-accurate rendering is preferred unless context clearly demands a generic abstraction. Here the warning concerns a concrete individual.
- source_word: ὃς ἔχει ἐξουσίαν
  chosen: who has authority
  alternatives:
  - who has power
  - who has the right
  lexicon: BDAG
  rationale: ἐξουσία denotes authority or power to act. 'Authority' best captures socially sanctioned power, which fits the warning better than mere physical ability.
- source_word: τοῦ φονεῦσαι
  chosen: to kill
  alternatives:
  - to murder
  - to put to death
  lexicon: LSJ
  rationale: The infinitive expresses capacity/authority to take life. 'To kill' is the broadest and most natural rendering. 'To murder' would over-specify unlawfulness, and 'put to death' may imply formal execution more narrowly than the text requires.
- source_word: καὶ οὐ μὴ ὑποπτεύσῃς
  chosen: and you will not have to fear
  alternatives:
  - and you will not suspect
  - and you will not dread
  - and you will not be anxious about
  lexicon: LSJ
  rationale: The verb literally can mean 'suspect' or 'be apprehensive about.' In context with 'fear of death,' the sense is practical dread or anxious expectation. 'Will not have to fear' communicates the result clause clearly in English.
- source_word: φόβον θανάτου
  chosen: death
  alternatives:
  - the fear of death
  lexicon: LSJ
  rationale: The full phrase is literally 'fear of death.' In English, 'you will not have to fear death' preserves the sense while reading naturally. The object 'death' carries the implied fear from the verb phrase.
