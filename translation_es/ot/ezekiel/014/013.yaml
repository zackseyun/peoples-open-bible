    rationale: No comunica con claridad el sentido idiomático de מַטֵּה לָחֶם. La decisión inglesa ya privilegia claridad en el texto principal y deja la imagen literal para nota.
  - severity: medium
    issue: '''enviaré hambre sobre ella'' no es la mejor opción para רָעָב'
    rationale: En este contexto de juicio territorial, 'hambruna' es más preciso y natural que 'hambre', que puede leerse como sensación individual.
  - severity: medium
