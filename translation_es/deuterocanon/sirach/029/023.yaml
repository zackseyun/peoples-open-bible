translation:
  language: es
  text: Conténtate[a] con poco y con mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Ten satisfacción con poco y con mucho». El griego usa el sustantivo «satisfacción» o «agrado» con el verbo «tener».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ μικρῷ καὶ μεγάλῳ
  english_pob_choice: with little and with much
  chosen_spanish: en lo poco y en lo mucho
  alternatives_spanish:
  - con poco y con mucho
  - en lo pequeño y en lo grande
  - sea poco o mucho
  lexicon: LSJ
  rationale: La construcción griega expresa contraste de cantidad o circunstancia, y la preposición con dativo funciona idiomáticamente con la idea de una disposición mantenida ante escasez y abundancia. En español, «en lo poco y en lo mucho» conserva ese contraste de manera natural y sobria.
- source_word: εὐδοκίαν
  english_pob_choice: be content
  chosen_spanish: Complácete
  alternatives_spanish:
  - Ten contentamiento
  - Ten satisfacción
  - Tenga agrado
  lexicon: LSJ
  rationale: El sustantivo puede significar buena voluntad, agrado, placer o satisfacción. En esta expresión imperativa, el sentido es adoptar una disposición satisfecha o complacida. «Complácete» mantiene la fuerza exhortativa sin perder el matiz de aceptación gozosa.
- source_word: ἔχε
  english_pob_choice: be
  chosen_spanish: Complácete
  alternatives_spanish:
  - Ten
  - Mantén
  - Esté satisfecho
  lexicon: LSJ
  rationale: Aunque ἔχε es literalmente «ten», en esta construcción el español suena más idiomático con un verbo reflexivo que exprese estado o disposición. «Complácete» conserva el mandato y la idea de sostener una actitud interior.
translation_notes:
  revision_awareness: El texto griego breve coincide sustancialmente con el sentido auditado en inglés; la única decisión relevante es cómo verter εὐδοκίαν ἔχε de modo idiomático en español sin perder su valor literal de «tener satisfacción».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras fórmulas no pertinentes porque el verso no contiene el nombre divino.
  - «Poco» y «mucho» conservan el contraste cuantitativo del original mejor que una paráfrasis moralizante.
  - La nota a pie conserva la alternativa literal documentada por el audit trail en inglés.
