translation:
  language: es
  text: el día trece del mes de Adar, y descansando el día catorce de ese mes[a], y haciéndolo un día de banquete y alegría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el día catorce del mes de Adar.
    reason: cultural_note
  - marker: b
    text: O «y lo hicieron un día de banquete y alegría». La forma verbal hebrea puede expresarse en contexto con un sentido más finito.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: on the ... day
  chosen_spanish: el día ...
  alternatives_spanish:
  - en el día ...
  lexicon: HALOT
  rationale: En español, la construcción temporal natural para datar un acontecimiento es «el día...», sin necesidad de repetir una preposición que vuelva rígida la frase. Mantiene el valor temporal del hebreo sin sobrecargarlo.
- source_word: שְׁלֹשָׁה עָשָׂר
  english_pob_choice: thirteenth
  chosen_spanish: trece
  alternatives_spanish:
  - decimotercero
  lexicon: HALOT
  rationale: El hebreo usa el numeral en contexto de fecha. En español, «el día trece» comunica el dato con claridad y naturalidad; «decimotercero» sería posible, pero menos fluido aquí.
- source_word: לְחֹדֶשׁ אֲדָר
  english_pob_choice: of the month of Adar
  chosen_spanish: del mes de Adar
  alternatives_spanish:
  - en el mes de Adar
  - del mes Adar
  lexicon: HALOT
  rationale: «Del mes de Adar» conserva la fórmula cronológica y translitera el nombre del mes. Es equivalente al patrón hebreo sin perder legibilidad.
- source_word: וְנוֹחַ
  english_pob_choice: and resting
  chosen_spanish: y en reposo
  alternatives_spanish:
  - y descansando
  - y teniendo reposo
  lexicon: HALOT
  rationale: La raíz נוח aquí expresa cesación de la lucha o descanso. Opto por «en reposo» para reflejar el estado resultante y evitar una lectura demasiado dinámica que pudiera sugerir solo una acción momentánea.
- source_word: בְּאַרְבָּעָה עָשָׂר בּוֹ
  english_pob_choice: on the fourteenth day of it
  chosen_spanish: el día catorce de él
  alternatives_spanish:
  - el catorce de él
  - el día catorce de ese mes
  lexicon: HALOT
  rationale: «De él» mantiene el referente pronominal del mes, como en el hebreo, y evita aclararlo más de lo que el texto hace en su forma breve. La construcción es idiomática en español aunque algo más literal que una paráfrasis.
- source_word: וְעָשֹׂה אֹתוֹ
  english_pob_choice: and making it
  chosen_spanish: y haciéndolo
  alternatives_spanish:
  - y lo hicieron
  - y lo establecieron
  lexicon: HALOT
  rationale: El infinitivo/forma verbal coordinada continúa la descripción de la acción de instituir o tratar ese día de cierto modo. «Haciéndolo» conserva la forma abierta del hebreo sin decidir en exceso entre valor resultativo o narrativo.
- source_word: יוֹם מִשְׁתֶּה
  english_pob_choice: a day of feasting
  chosen_spanish: día de banquete
  alternatives_spanish:
  - día de festín
  - día de comida y bebida
  lexicon: HALOT
  rationale: «מִשְׁתֶּה» es un banquete o festín. «Banquete» conserva mejor la dignidad y el tono ritual-social del texto que «fiesta», que podría ser demasiado general.
- source_word: וְשִׂמְחָה
  english_pob_choice: and gladness
  chosen_spanish: y alegría
  alternatives_spanish:
  - y regocijo
  - y gozo
  lexicon: HALOT
  rationale: El sustantivo denota alegría/celebración. «Alegría» es la correspondencia más natural y clara en español, y mantiene el paralelismo con el banquete.
theological_decisions:
- issue: Descripción del día como reposo y celebración institucionalizada
  english_pob_reading: and resting ... and making it a day of feasting and gladness.
  chosen_spanish_reading: y en reposo ... y haciéndolo día de banquete y alegría.
  alternative_spanish_readings:
  - y descansando ... y haciéndolo un día de banquete y alegría
  - y en reposo ... y estableciéndolo como día de banquete y alegría
  rationale: 'No hay una carga doctrinal explícita, pero sí una tensión aspectual: el hebreo presenta una secuencia que puede oírse como estado («reposo») y como acción continuada o instituyente («haciéndolo»). La traducción conserva esa ambigüedad sin convertirla en una afirmación interpretativa más fuerte.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: fecha con fórmula hebrea conservada, נוח rendido como estado de reposo, el referente pronominal de בּוֹ mantenido, y la secuencia verbal final dejada con ambigüedad moderada («haciéndolo») en vez de forzar un pretérito o una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se usó «Adar» como nombre propio del mes, sin traducirlo ni explicarlo en el texto principal.
  - Se prefirió «banquete» sobre «fiesta» para conservar el valor de מִשְׁתֶּה.
  - «Alegría» mantiene el paralelismo nominal con «banquete».
  - No se introdujo «Cristo», «SEÑOR» ni terminología teológica ajena al versículo.
