  language: en
  yaml_path: translation/ot/numbers/020/012.yaml
  text: And Yahweh said to Moses and to Aaron[a], “Because you did not believe me, to treat me as holy before the eyes of the sons of Israel[c][b], therefore you shall not bring this assembly into the land that I have given them.”
  footnotes:
  - marker: a
    text: Or “you did not trust me.” The Hebrew verb can carry the sense of believing or trusting.
    reason: lexical_alternative
  - marker: b
    text: Or “to sanctify me” or “to uphold me as holy.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “the sons of Israel”; traditionally “the children of Israel.”
    reason: lexical_alternative
