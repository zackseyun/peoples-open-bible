translation:
  language: es
  text: Y sucedió que, cuando Israel hubo terminado de matar a todos los habitantes de Hai en el campo, en la región desierta donde los habían perseguido, y todos ellos habían caído a filo de espada hasta ser destruidos[a], todo Israel volvió a Hai y la golpeó a filo de espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que fueron consumidos» / «hasta que llegaron a su fin» para la expresión «hasta ser destruidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo tramo del relato. «Y sucedió» conserva el valor discursivo sin sonar arcaica en español.
- source_word: כְּכַלּוֹת
  english_pob_choice: when ... had finished
  chosen_spanish: cuando ... hubo terminado
  alternatives_spanish:
  - al terminar de...
  - después de que ... terminó
  lexicon: HALOT
  rationale: El infinitivo constructo con כְּ expresa temporalidad; el pretérito anterior español refleja bien la acción concluida antes del regreso a Hai.
- source_word: לַהֲרֹג
  english_pob_choice: killing
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - matar de
  lexicon: HALOT
  rationale: הרג significa matar o dar muerte. «Matar» es directo, fiel y natural en español para este contexto bélico.
- source_word: יֹשְׁבֵי הָעַי
  english_pob_choice: the inhabitants of Ai
  chosen_spanish: los habitantes de Hai
  alternatives_spanish:
  - los moradores de Hai
  - los que habitaban Hai
  lexicon: HALOT
  rationale: El participio sustantivado designa a quienes vivían allí. «Habitantes» es preciso e idiomático.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el llano
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «field» por mayor cercanía léxica; en español, «campo» es la equivalencia más directa y natural.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto agreste
  - en la estepa
  lexicon: HALOT
  rationale: Aquí el contraste espacial con la ciudad permite «desierto» como zona despoblada y áspera. En español bíblico sigue siendo una opción clara, aunque «wilderness» también podría rendirse como «desierto» o «estepa».
- source_word: אֲשֶׁר רְדָפוּם בּוֹ
  english_pob_choice: where they had pursued them
  chosen_spanish: donde los habían perseguido
  alternatives_spanish:
  - en el que los habían perseguido
  - donde los persiguieron
  lexicon: HALOT
  rationale: La cláusula relativa vincula el lugar con la persecución previa. El pluscuamperfecto mantiene la secuencia narrativa del hebreo y del inglés auditado.
- source_word: וַיִּפְּלוּ כֻלָּם
  english_pob_choice: and all of them had fallen
  chosen_spanish: y todos ellos habían caído
  alternatives_spanish:
  - y todos cayeron
  - y cayeron todos
  lexicon: HALOT
  rationale: נפל en contexto bélico funciona como eufemismo convencional de morir en combate. «Habían caído» conserva ese matiz y la anterioridad.
- source_word: לְפִי חֶרֶב
  english_pob_choice: by the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - por el filo de la espada
  - a la espada
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se corresponde bien con «a filo de espada», forma natural y fiel en español.
- source_word: עַד תֻּמָּם
  english_pob_choice: until they were destroyed
  chosen_spanish: hasta ser destruidos
  alternatives_spanish:
  - hasta quedar destruidos
  - hasta que fueron destruidos
  lexicon: HALOT
  rationale: La forma pasiva/completiva de כלה señala consumación total. «Hasta ser destruidos» mantiene la fuerza formal del cierre sin suavizarla.
- source_word: וַיָּשֻׁבוּ כָל יִשְׂרָאֵל הָעַי
  english_pob_choice: then all Israel returned to Ai
  chosen_spanish: todo Israel volvió a Hai
  alternatives_spanish:
  - entonces todo Israel regresó a Hai
  - y todo Israel volvió a Hai
  lexicon: HALOT
  rationale: שוב con destino indica retorno. «Volvió» reproduce el movimiento del relato; el singular colectivo «todo Israel» es natural en español.
- source_word: וַיַּכּוּ אֹתָהּ
  english_pob_choice: and struck it
  chosen_spanish: y la hirió
  alternatives_spanish:
  - y la golpeó
  - y la atacó
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o abatir. Dado que el objeto es la ciudad, «la hirió» comunica la acción militar sin forzar un objeto humano no expresado aquí.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con la espada
  - por el filo de la espada
  lexicon: HALOT
  rationale: Se preserva la misma locución idiomática que antes en el versículo para mantener consistencia terminológica.
theological_decisions:
- issue: Mantener el lenguaje de violencia total sin atenuarlo
  english_pob_reading: Retain the text's explicit language of killing and total defeat in straightforward English
  chosen_spanish_reading: Conservar el lenguaje explícito de matar, caer y ser destruidos en español claro
  alternative_spanish_readings:
  - rebajar a 'derrotar' o 'vencer'
  - explicitar una interpretación teológica que no está en el versículo
  rationale: El texto narra una destrucción militar concreta; la traducción debe preservar su severidad sin eufemismos ni expansión doctrinal.
  doctrine_reference: Principio de primacía del texto fuente; no suavizar ni ampliar el alcance narrativo más allá de lo que dice el versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió 'field' sobre 'open field' y 'until they were destroyed' sobre 'until they were finished off'. En español se reflejan esas decisiones con 'en el campo' y 'hasta ser destruidos'.
  spanish_consistency_notes:
  - Se mantiene «Hai» para el topónimo, conforme a la transliteración usual en español bíblico y la forma del pasaje.
  - Se conserva «a filo de espada» en ambas apariciones de לְפִי חֶרֶב para uniformidad léxica.
  - El singular colectivo «todo Israel» sigue el uso narrativo hebreo y evita una pluralización artificial.
