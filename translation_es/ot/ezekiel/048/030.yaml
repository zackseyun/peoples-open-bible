translation:
  language: es
  text: 'Y estas son las salidas[a] de la ciudad: en el lado norte[b], cuatro mil quinientas medidas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las extensiones exteriores de la ciudad». El término hebreo puede denotar las salidas o las proyecciones exteriores de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo ordena los números como «quinientas y cuatro mil»; aquí se expresa el total de forma natural en español como «cuatro mil quinientas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estas son
  alternatives_spanish:
  - Ahora estas son
  - Estas son
  lexicon: HALOT
  rationale: La conjunción y el demostrativo introducen una nueva sección descriptiva. «Y estas son» conserva el enlace y el tono de enumeración formal del hebreo.
- source_word: תּוֹצְאֹת
  english_pob_choice: the exits
  chosen_spanish: las salidas
  alternatives_spanish:
  - las salidas hacia afuera
  - los accesos
  - los puntos de salida
  lexicon: HALOT
  rationale: El término puede expresar «salidas» u «outgoings». En este contexto de medida perimetral de la ciudad, «las salidas» mantiene la idea de los puntos/extensiones exteriores sin forzar «puertas».
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Equivalencia directa y natural para el sustantivo definido.
- source_word: מִפְּאַת
  english_pob_choice: on the ... side
  chosen_spanish: por el lado
  alternatives_spanish:
  - desde el lado
  - por el costado
  - desde el borde
  lexicon: HALOT
  rationale: פֵּאָה puede significar lado, borde o esquina. En un contexto de levantamiento y medición, «por el lado» es natural en español y conserva el valor direccional.
- source_word: צָפוֹן
  english_pob_choice: north
  chosen_spanish: norte
  alternatives_spanish:
  - septentrión
  lexicon: HALOT
  rationale: Dirección cardinal expresada de manera idiomática y clara en español.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  english_pob_choice: four thousand five hundred
  chosen_spanish: cuatro mil quinientas
  alternatives_spanish:
  - cuatro mil quinientos
  lexicon: HALOT
  rationale: El hebreo presenta el orden «quinientas y cuatro mil», pero el total es 4500. En español, «cuatro mil quinientas» preserva el número y concuerda con «medidas».
- source_word: מִדָּה
  english_pob_choice: measures
  chosen_spanish: medidas
  alternatives_spanish:
  - en medida
  - medición
  - medidas de longitud
  lexicon: HALOT
  rationale: «Medidas» sigue de cerca la solución final del POB en inglés y mantiene la generalidad del hebreo, que no especifica la unidad en este versículo.
theological_decisions:
- issue: Terminología de la descripción urbana y mensural
  english_pob_reading: A formal measurement statement without adding unspecified units
  chosen_spanish_reading: Una declaración formal de medida sin añadir una unidad no explícita
  alternative_spanish_readings:
  - Mencionar codos
  - Traducir como 'en medida'
  rationale: El hebreo no explicita la unidad; por fidelidad al texto y a la revisión inglesa, se evita introducir 'codos' o una paráfrasis más libre.
  doctrine_reference: Precisión textual y respeto al alcance del dato en el texto profético
translation_notes:
  revision_awareness: La revisión inglesa final sustituyó una formulación más analítica por «measures» para reflejar mejor מִדָּה. El español sigue esa decisión con «medidas», evitando importar una unidad no explícita y manteniendo el registro formal del versículo.
  spanish_consistency_notes:
  - Se mantuvo la estructura introductoria de lista («Y estas son...»).
  - Se evitó «SEÑOR» o terminología teológica ajena, pues el versículo es descriptivo y topográfico.
  - «Salidas» conserva la amplitud semántica de תּוֹצְאֹת sin convertirla en 'puertas'.
  - El número se ajustó al orden natural del español, con nota sobre el orden hebreo.
