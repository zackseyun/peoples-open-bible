translation:
  language: es
  text: 'Entonces Moisés dijo a Yahvé: «Por favor, Señor, no soy hombre de palabras[a]; ni de ayer ni de anteayer, ni desde que has hablado a tu siervo, porque soy pesado de boca y pesado de lengua[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «no soy elocuente». El hebreo dice literalmente: «no soy un hombre de palabras».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «pesado de boca y pesado de lengua», una metáfora de dificultad para hablar; puede implicar falta de elocuencia o algún impedimento del habla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se preserva en español como nombre propio divino. 'Yahvé' sigue la decisión del POB en inglés y evita la sustitución por un título, manteniendo la referencia al nombre personal del pacto.
- source_word: בִּי אֲדֹנָי
  english_pob_choice: Please, Lord
  chosen_spanish: Por favor, Señor
  alternatives_spanish:
  - Pardon, Señor
  - Oh, Señor
  lexicon: HALOT
  rationale: בִּי funciona aquí como súplica cortés, no como contenido semántico literal. 'Por favor, Señor' comunica la petición reverente de Moisés con naturalidad en español.
- source_word: לֹא אִישׁ דְּבָרִים אָנֹכִי
  english_pob_choice: I am not a man of words
  chosen_spanish: no soy hombre de palabras
  alternatives_spanish:
  - no soy un hombre elocuente
  - no soy hombre de habla
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de 'hombre de palabras' en una forma idiomática y publicable en español. Evita resolver de antemano la tensión entre falta de elocuencia y posible dificultad al hablar.
- source_word: גַּם מִתְּמוֹל גַּם מִשִּׁלְשֹׁם
  english_pob_choice: neither yesterday nor the day before
  chosen_spanish: ni de ayer ni de anteayer
  alternatives_spanish:
  - ni ayer ni anteayer
  - ni desde ayer ni desde anteayer
  lexicon: HALOT
  rationale: La pareja temporal se vierte con una expresión natural que conserva la secuencia hebrea y su fuerza idiomática de continuidad negativa.
- source_word: גַּם מֵאָז דַּבֶּרְךָ אֶל עַבְדֶּךָ
  english_pob_choice: nor since you have spoken to your servant
  chosen_spanish: ni desde que has hablado a tu siervo
  alternatives_spanish:
  - ni desde que hablaste a tu siervo
  - ni aun desde que has hablado a tu siervo
  lexicon: HALOT
  rationale: '''Desde que'' expresa adecuadamente el valor temporal de מֵאָז. ''Tu siervo'' conserva el registro deferente de la autodesignación de Moisés ante Dios.'
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En este contexto de dirección reverente a Dios, 'siervo' reproduce el tono deferencial del original. 'Esclavo' sería demasiado fuerte para el español litúrgico y alteraría el registro de súplica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior; 'porque' es la opción más clara y natural en español, manteniendo la fuerza explicativa.
- source_word: כְבַד פֶּה
  english_pob_choice: heavy of mouth
  chosen_spanish: pesado de boca
  alternatives_spanish:
  - lento de boca
  - torpe de habla
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'pesadez' para no ocultar la metáfora ni cerrar el sentido a una sola explicación interpretativa.
- source_word: וּכְבַד לָשׁוֹן
  english_pob_choice: and heavy of tongue
  chosen_spanish: y pesado de lengua
  alternatives_spanish:
  - y lento de lengua
  - y torpe de lengua
  lexicon: HALOT
  rationale: Mantiene el paralelismo con 'pesado de boca' y preserva la ambigüedad del hebreo respecto de la naturaleza exacta de la dificultad al hablar.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión del POB de transliterar el nombre propio divino se traslada a español como 'Yahvé', preservando el nombre del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Si explicitar la condición de habla de Moisés
  english_pob_reading: Preserve the metaphorical description 'heavy of mouth and heavy of tongue'
  chosen_spanish_reading: Preservar 'pesado de boca y pesado de lengua'
  alternative_spanish_readings:
  - hacerlo explícito como 'no soy elocuente'
  - interpretarlo como 'hablo con dificultad'
  rationale: El hebreo mantiene una descripción metafórica abierta. La versión española conserva esa tensión para no resolver prematuramente si se trata de falta de elocuencia, inseguridad o una limitación del habla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no cambió el texto base; el acuerdo de revisión fue alto y no se identificaron cambios necesarios. Esta versión sigue el dictamen de mantener el nombre divino, la metáfora del habla y el tono reverente del discurso de Moisés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con el estándar del proyecto en español.
  - '''Siervo'' se usa de forma consistente para עבד en dirección reverente a Dios.'
  - La metáfora 'pesado de boca / pesado de lengua' conserva la ambigüedad lexical y teológica documentada en el auditoría inglesa.
  - Se evita 'Cristo' u otra terminología no pertinente; no hay ajuste doctrinal adicional necesario.
