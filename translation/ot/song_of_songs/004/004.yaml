id: SNG.4.4
reference: Song of Songs 4:4
source:
  edition: WLC
  text: כְּ/מִגְדַּ֤ל דָּוִיד֙ צַוָּארֵ֔/ךְ בָּנ֖וּי לְ/תַלְפִּיּ֑וֹת אֶ֤לֶף הַ/מָּגֵן֙ תָּל֣וּי עָלָ֔י/ו כֹּ֖ל שִׁלְטֵ֥י הַ/גִּבּוֹרִֽים׃
translation:
  text: Your neck is like the tower of David[a], built in rows of stone; a thousand shields hang on it[b], all the small shields of the warriors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'built for armories,' 'built with battlements,' or 'built in courses.' The Hebrew term translated 'in rows of stone' (תלפיות) is rare and its precise sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew uses two different words for defensive gear: מָגֵן (''shield'') and שֶׁלֶט, here rendered ''small shield'' to preserve the distinction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמִגְדַּל
  chosen: is like the tower
  alternatives:
  - is like a tower
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and מגדל is literally 'tower.' Retaining the simile is important to the poem's imagery. The construct with דָּוִיד favors 'the tower of David' rather than the more indefinite 'a tower.'
- source_word: דָּוִיד
  chosen: David
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: צַוָּארֵךְ
  chosen: your neck
  lexicon: HALOT
  rationale: Direct, literal rendering of the body-part metaphor in the love poem.
- source_word: בָּנוּי
  chosen: built
  alternatives:
  - built up
  lexicon: HALOT
  rationale: Passive participle from בנה, straightforwardly 'built.' English keeps the architectural image concise.
- source_word: לְתַלְפִּיּוֹת
  chosen: in rows of stone
  alternatives:
  - for armories
  - for battlements
  - with courses
  lexicon: HALOT
  rationale: תלפיות is rare and uncertain. In this poetic architectural context, 'in rows of stone' best fits the image of a carefully constructed tower and avoids overclaiming a speculative military sense. Because the term is disputed, alternatives are preserved in a footnote.
- source_word: אֶלֶף הַמָּגֵן
  chosen: a thousand shields
  alternatives:
  - a thousand bucklers
  lexicon: HALOT
  rationale: Natural English rendering of the numeral plus singular collective noun. 'Shields' is contemporary and clear; 'bucklers' is archaic.
- source_word: תָּלוּי עָלָיו
  chosen: hang on it
  alternatives:
  - are hung on it
  - hang upon it
  lexicon: HALOT
  rationale: The participle plus preposition expresses a present stative image. 'Hang on it' is readable modern English while preserving the visual scene.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Collective sense suits the inventory-like poetic line.
- source_word: שִׁלְטֵי
  chosen: small shields
  alternatives:
  - quivers
  - weapons
  - shields
  lexicon: HALOT
  rationale: שלט is commonly understood as a type of shield, likely smaller than מגן. Rendering it 'small shields' preserves the distinction between the two shield terms in the verse rather than flattening both to the same English word.
- source_word: הַגִּבּוֹרִים
  chosen: of the warriors
  alternatives:
  - of the mighty men
  - of the heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים denotes strong or valiant fighters. 'Warriors' is idiomatic modern English and fits the martial imagery without sounding archaic.
