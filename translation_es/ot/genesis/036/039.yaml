translation:
  language: es
  text: Baal-hanán, hijo de Acbor, murió, y Hadar[a] reinó en su lugar. El nombre de su ciudad fue Pau[b], y el nombre de su esposa fue Mehetabel, hija de Matred, hija de Me-zahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Hadar; algunas tradiciones textuales y 1 Crónicas 1:50 leen Hadad.'
    reason: textual_variant
  - marker: b
    text: 'Hebreo: Pau; 1 Crónicas 1:50 lee Pai.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - muerto
  lexicon: HALOT
  rationale: El verbo hebreo מות indica muerte de forma directa. En español, «murió» es la equivalencia natural y sobria, sin eufemismo innecesario.
- source_word: בַּעַל חָנָן
  english_pob_choice: Baal-hanan
  chosen_spanish: Baal-hanán
  alternatives_spanish:
  - Baal Hanan
  lexicon: HALOT
  rationale: Es nombre propio transliterado; se conserva la forma con guion y acento para la lectura española.
- source_word: בֶּן עַכְבּוֹר
  english_pob_choice: son of Achbor
  chosen_spanish: hijo de Acbor
  alternatives_spanish:
  - el hijo de Acbor
  lexicon: HALOT
  rationale: La relación genealógica se expresa de manera directa con «hijo de». Se adopta «Acbor» como transliteración española natural del nombre propio.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó en vez de él
  - se hizo rey en su lugar
  lexicon: HALOT
  rationale: La construcción comunica sucesión y reemplazo. «Reinó en su lugar» reproduce con claridad ese sentido en español.
- source_word: הֲדַר
  english_pob_choice: Hadar
  chosen_spanish: Hadar
  alternatives_spanish:
  - Hadad
  lexicon: HALOT
  rationale: Se sigue el texto hebreo masorético con la forma «Hadar». La variante «Hadad» se documenta aparte en nota textual.
- source_word: וְשֵׁם עִירוֹ
  english_pob_choice: The name of his city was
  chosen_spanish: El nombre de su ciudad fue
  alternatives_spanish:
  - Y el nombre de su ciudad fue
  lexicon: HALOT
  rationale: La fórmula se conserva de manera transparente y natural en español.
- source_word: פָּעוּ
  english_pob_choice: Pau
  chosen_spanish: Pau
  alternatives_spanish:
  - Pai
  lexicon: HALOT
  rationale: Nombre propio transliterado según el texto masorético. La variante paralela «Pai» se registra en nota textual.
- source_word: וְשֵׁם אִשְׁתּוֹ
  english_pob_choice: and the name of his wife was
  chosen_spanish: y el nombre de su esposa fue
  alternatives_spanish:
  - y el nombre de su mujer fue
  lexicon: HALOT
  rationale: «Esposa» comunica el vínculo matrimonial con tono más formal y amplio que «mujer» en español bíblico contemporáneo.
- source_word: מְהֵיטַבְאֵל
  english_pob_choice: Mehetabel
  chosen_spanish: Mehetabel
  lexicon: HALOT
  rationale: Nombre propio transliterado por convención.
- source_word: בַּת מַטְרֵד
  english_pob_choice: daughter of Matred
  chosen_spanish: hija de Matred
  alternatives_spanish:
  - descendiente de Matred
  lexicon: HALOT
  rationale: La relación genealógica inmediata se mantiene con «hija de». No se fuerza un sentido más amplio que el hebreo no exige aquí.
- source_word: בַּת מֵי זָהָב
  english_pob_choice: daughter of Me-zahab
  chosen_spanish: hija de Me-zahab
  alternatives_spanish:
  - nieta de Me-zahab
  lexicon: HALOT
  rationale: Se conserva la repetición genealógica del hebreo, que puede señalar descendencia inmediata o línea familiar. No se explicita «nieta» porque el texto no lo exige y la forma literal preserva la tensión genealógica.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y refleja el estado más reciente del audit trail inglés: mantiene «Hadar» y «Pau» como lecturas principales, con variantes textuales en notas; conserva además la cadena genealógica de Mehetabel sin expandirla a «nieta», siguiendo la revisión final que prefirió la apposición directa.'
  spanish_consistency_notes:
  - Se usó «hijo/hija de» para genealogías, en lugar de parafrasear con «descendiente».
  - 'Se mantuvo la transliteración consistente de nombres propios: Baal-hanán, Acbor, Hadar, Pau, Mehetabel, Matred, Me-zahab.'
  - «Reinó en su lugar» conserva el matiz de sucesión de תַּחְתָּיו sin añadir interpretación.
  - Las notas al pie distinguen variante textual de lectura alternativa genealógica, como en el audit trail inglés.
