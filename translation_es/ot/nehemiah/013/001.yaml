translation:
  language: es
  text: Aquel día se leyó el Libro de Moisés[a] a oídos del pueblo, y se halló escrito en él que ningún amonita ni moabita debía entrar jamás[c] en la asamblea de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el rollo de Moisés». El hebreo puede referirse a un rollo o libro.
    reason: lexical_alternative
  - marker: b
    text: O, «la congregación de Dios».
    reason: lexical_alternative
  - marker: c
    text: Es decir, «para siempre» o «por siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - En aquel día
  - Ese día
  lexicon: HALOT
  rationale: La expresión marca un momento específico ya conocido por el contexto. «Aquel día» conserva la deixis temporal del hebreo y suena natural en español bíblico actual.
- source_word: נִקְרָא
  english_pob_choice: was read
  chosen_spanish: se leyó
  alternatives_spanish:
  - fue leído
  - se hizo la lectura
  lexicon: HALOT
  rationale: El nifal aquí es pasivo/impersonal en un contexto de lectura pública. «Se leyó» comunica bien la acción sin añadir «en voz alta», que no está explícito en el hebreo.
- source_word: בְּסֵפֶר מֹשֶׁה
  english_pob_choice: the Book of Moses
  chosen_spanish: el Libro de Moisés
  alternatives_spanish:
  - el libro de Moisés
  - el rollo de Moisés
  lexicon: HALOT
  rationale: «Sēfer» puede ser libro, rollo o documento. La forma con mayúscula mantiene la referencia reconocible al cuerpo mosaico de escritura, como en el audit trail inglés, sin forzar una sola materialidad del soporte.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: en oídos del pueblo
  alternatives_spanish:
  - ante el pueblo
  - para el pueblo
  lexicon: HALOT
  rationale: La imagen literal hebrea es «en los oídos de». En español, «en oídos del pueblo» conserva la metáfora auditiva y el sentido de lectura pública, aunque suene más literal que una paráfrasis como «ante el pueblo».
- source_word: וְנִמְצָא כָּתוּב בּוֹ
  english_pob_choice: and it was found written in it
  chosen_spanish: y se halló escrito en él
  alternatives_spanish:
  - y se encontró escrito en él
  - y se encontró que estaba escrito en él
  lexicon: HALOT
  rationale: Se mantiene la secuencia pasiva y el tono administrativo del hebreo. «En él» remite al libro mencionado y respeta la sobriedad del original.
- source_word: עַמֹּנִי וּמֹאָבִי
  english_pob_choice: Ammonite or Moabite
  chosen_spanish: ningún amonita ni moabita
  alternatives_spanish:
  - ningún ammonita ni moabita
  - ningún amonita o moabita
  lexicon: HALOT
  rationale: Bajo la negación, el hebreo enumera dos clases excluidas. En español, «ni» expresa mejor la coordinación negativa. Se usa el gentilicio común «amonita/moabita».
- source_word: בִּקְהַל הָאֱלֹהִים
  english_pob_choice: the assembly of God
  chosen_spanish: la asamblea de Dios
  alternatives_spanish:
  - la congregación de Dios
  - la reunión de Dios
  lexicon: HALOT
  rationale: «Qāhāl» designa la asamblea reunida. «Asamblea de Dios» preserva la relación posesiva y evita sustituirla por terminología eclesial posterior sin necesidad.
- source_word: עַד עוֹלָם
  english_pob_choice: should ever
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - por toda la eternidad
  lexicon: HALOT
  rationale: En esta fórmula legal de exclusión, la fuerza es de prohibición perpetua. «Jamás» comunica con concisión esa duración indefinida, en línea con el valor de «for all time/forever» del audit trail inglés.
theological_decisions:
- issue: Naturaleza de בִּקְהַל הָאֱלֹהִים
  english_pob_reading: the assembly of God
  chosen_spanish_reading: la asamblea de Dios
  alternative_spanish_readings:
  - la congregación de Dios
  - la asamblea del pueblo de Dios
  rationale: El texto habla de la comunidad convocada bajo Dios, no de una institución posterior. «Asamblea de Dios» mantiene el genitivo divino y el matiz de reunión covenantal sin introducir un término eclesiástico ajeno.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Fuerza de עַד עוֹלָם en una prohibición legal
  english_pob_reading: should ever enter
  chosen_spanish_reading: debía entrar jamás
  alternative_spanish_readings:
  - no debía entrar nunca
  - no debía entrar para siempre
  rationale: La frase cita una norma de exclusión con duración indefinida. «Jamás» evita una lectura meramente temporal y conserva la fuerza legal perpetua sin sobrerrepresentar la sintaxis como si fuera una promesa escatológica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó «aloud» porque no está explícito en el hebreo. Por eso el español evita añadir «en voz alta» y conserva una lectura pública sobria, equivalente al audit trail inglés y al idiomático «en oídos del pueblo».
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «asamblea» para קָהָל, en coherencia con la política del proyecto.
  - Se conserva la fórmula negativa con «ningún... ni...» para reflejar la exclusión distributiva del hebreo bajo negación.
  - «Jamás» se usa para expresar la permanencia legal de עַד עוֹלָם sin recurrir a una glosa más larga dentro del cuerpo del texto.
  - El estilo general es formal y publicable, pero sin arcaísmos innecesarios.
