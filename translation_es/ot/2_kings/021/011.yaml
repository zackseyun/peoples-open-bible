  glossary_alignment: No hay conflicto con la terminología del proyecto. «Judá», «abominaciones», «ha hecho pecar» e «ídolos» están bien. La nota sobre גִּלּוּלִים preserva correctamente el matiz peyorativo. No aparecen términos sensibles como Yahvé/Mesías que exijan ajuste.
