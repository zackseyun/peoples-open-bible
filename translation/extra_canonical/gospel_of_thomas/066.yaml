translation:
  text: Jesus said, "Show me this stone that the builders threw out; it is the cornerstone."[a][b][c][d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic ϯⲧⲥⲁⲃⲟⲁⲛⲟⲕ, lit. ‘give me to see,’ i.e., ‘show me.’
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘threw it out’; commonly rendered ‘rejected.’
    reason: lexical_alternative
  - marker: c
    text: Lit. ‘stone of the corner.’
    reason: lexical_alternative
  - marker: d
    text: Echoes Ps 118:22 (LXX 117:22) and is cited in Mark 12:10; Matt 21:42; Luke
      20:17; Acts 4:11; 1 Pet 2:7.
    reason: cross_reference
lexical_decisions:
- source_word: ϯⲧⲥⲁⲃⲟⲁⲛⲟⲕ
  chosen: show me
  alternatives:
  - let me see
  lexicon: Crum s.v. ⲥⲁⲃⲟ; Layton, Grammar (ϯ + infinitive permissive)
  rationale: Periphrastic ϯ + infinitive yields ‘grant me to see’; idiomatic English
    is ‘show me’ while preserving the imperative challenge.
- source_word: ⲡⲱⲛⲉ ⲡⲁⲓ
  chosen: this stone
  alternatives:
  - this very stone
  - the stone (this)
  lexicon: Crum s.v. ⲱⲛⲉ; Layton on demonstratives ⲡⲁⲓ
  rationale: Deictic demonstrative ⲡⲁⲓ modifies ‘stone’; ‘this stone’ preserves Thomas’s
    pointedness.
- source_word: ⲛ̄ⲧⲁⲩⲥⲧⲟϥ ⲉⲃⲟⲗ
  chosen: (they) threw it out
  alternatives:
  - rejected it
  - cast it out
  lexicon: Crum s.v. ⲥⲧⲟ ‘throw’
  rationale: Formal rendering of the verb ‘throw…out’ keeps Thomas’s vivid diction;
    ‘rejected’ is a well-known idiomatic sense.
- source_word: ⲛ̄ϭⲓ ⲛⲉⲧ ⲕⲱⲧ
  chosen: the builders
  alternatives:
  - those who build
  lexicon: Crum s.v. ⲕⲱⲧ ‘build’; Layton on subject identifier ⲛ̄ϭⲓ
  rationale: ⲛ̄ϭⲓ marks the subject after the verb; idiomatic English ‘the builders’
    suits the appositive subject.
- source_word: ⲡⲱⲛⲉ ⲛⲕⲱϩ
  chosen: the cornerstone
  alternatives:
  - the stone of the corner
  - corner-stone
  lexicon: Crum s.v. ⲕⲱϩ ‘corner’; ⲱⲛⲉ ‘stone’
  rationale: Established idiom in English is ‘cornerstone’; note the literal ‘stone
    of the corner’ in footnote to preserve nuance.
textual_note: 'Dialect: Sahidic with standard constructions. The clause order places
  the aorist ‘they threw it out’ (ⲛ̄ⲧⲁⲩⲥⲧⲟϥ ⲉⲃⲟⲗ) before the explicit subject marked
  by ⲛ̄ϭⲓ (‘the ones who build’), a common Coptic pattern. The periphrastic ϯ + infinitive
  (ϯⲧⲥⲁⲃⲟⲁⲛⲟⲕ) functions as an imperative ‘show me’. No lacunae or conjectural restorations
  in Dilley’s text for this saying. Note that the normalized block in the prompt appears
  to conflate segmentation, but the line-by-line printed text clearly reads ⲛ̄ⲧⲁⲩⲥⲧⲟϥ
  ⲉⲃⲟⲗ ⲛ̄ϭⲓ ⲛⲉⲧ ⲕⲱⲧ.'
